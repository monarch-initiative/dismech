# Pinned snapshot of the ClinGen Gene-Disease Validity CSV.
#
# `just refresh-clingen` downloads the CSV to data/clingen/gene_validity.csv
# and verifies its sha256 against the pinned value below. The CSV itself is
# not required to be committed; this manifest is the reproducible source pin
# used to rebuild references_cache/CGGV_*.md.
#
# To bump to a newer ClinGen release:
#   1. Download the CSV from the URL below
#   2. `sha256sum` the file
#   3. Update `sha256` and `snapshot_date` here
#   4. `just structured-rebuild-clingen` and review the cache diff

source: ClinGen Gene-Disease Validity
snapshot_date: "2026-01-24"
schema_tag: "gene_validity.csv"

bulk_files:
  - name: gene_validity.csv
    url: https://search.clinicalgenome.org/kb/gene-validity/download
    sha256: 5083ad8f183c61b9504cd1a32503ee6da23429af27c114bebd32b67c54a75da3
    size_bytes: 1036633
    description: ClinGen Gene-Disease Validity Curations CSV
