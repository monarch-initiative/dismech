# Pinned snapshot of CIViC accepted assertion and clinical evidence summaries.
#
# `just civic-refresh` downloads the TSVs to data/civic/ and verifies their
# sha256 values against the pins below. The TSVs themselves are not committed;
# this manifest is the reproducible source pin used to rebuild
# references_cache/CIVIC_*.md.
#
# To bump to a newer CIViC release:
#   1. Download the accepted assertion and clinical evidence TSVs
#   2. `sha256sum` the files
#   3. Update `sha256`, `size_bytes`, `snapshot_date`, and `schema_tag`
#   4. `just civic-rebuild` and review the cache diff

source: CIViC
snapshot_date: "2026-05-01"
schema_tag: "01-May-2026"

