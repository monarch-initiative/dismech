# Manifest for the NCIT ontology-edge structured source.
#
# This source does NOT cache the whole NCI Thesaurus. It selects a small set
# of curated predicates out of the OAK-managed `sqlite:obo:ncit` database and
# renders one quotable per-subject cache file (references_cache/NCIT_*.md) for
# each subject that carries one of those predicates.
#
# The ontology SQLite is downloaded/managed by OAK (semsql); it is never
# committed. This manifest only pins the ontology version for provenance and
# drift detection, plus the predicate selection.
#
# See src/dismech/structured_sources/ontology_edges.py and CLAUDE.md.

source: ncit-edges
prefix: NCIT
adapter: sqlite:obo:ncit
ontology_name: NCI Thesaurus
ontology_short: NCIT
ontology_version: "26.02d"
snapshot_date: "2026-06-26"
homepage: https://ncithesaurus.nci.nih.gov/ncitbrowser/
license: >-
  NCI Thesaurus is released under terms that permit reuse with attribution
  (https://evsexplore.semantics.cancer.gov/evsexplore/welcome).

predicates:
  # Accepted_Therapeutic_Use_For: free-text disease/condition for which the
  # subject drug is an accepted treatment. Range xsd:string -> annotation.
  - id: NCIT:P302
    label: Accepted_Therapeutic_Use_For
    kind: annotation
