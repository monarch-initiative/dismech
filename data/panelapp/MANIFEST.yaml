# Pinned snapshot of Genomics England PanelApp gene-panel associations.
#
# PanelApp (https://panelapp.genomicsengland.co.uk/) is a publicly available
# knowledgebase of expert-curated "virtual" gene panels for human disorders.
# It is the crowdsourced, panel-level companion to the gene-disease validity
# resources already wired into dismech (ClinGen Gene-Disease Validity, `CGGV:`;
# EBI Gene2Phenotype, used by `dismech.compare.g2p`), and is most useful as a
# broad disease-to-gene (d2g) signal carrying mode of inheritance and a
# Green/Amber/Red confidence rating.
#
# Unlike the single-file structured sources, PanelApp has no bulk download:
# `just panelapp-refresh` walks the paginated REST API (`/api/v1/genes/`) and
# writes a deterministic, sorted JSON-Lines snapshot to
# data/panelapp/panelapp_snapshot.jsonl. That file is gitignored; this manifest
# is the reproducible source pin used to rebuild references_cache/PANELAPP_*.md.
#
# The snapshot is a point-in-time view — PanelApp panels are versioned and
# updated continuously, so the sha256 below records *which* state was captured
# and will drift on a fresh re-walk. Once a PANELAPP_*.md cache file is
# committed, a curator's snippet validates against that committed file
# regardless of later API drift.
#
# License: PanelApp gene lists are provided by Genomics England in good faith
# for the benefit of the research community and are publicly available to
# browse, download, and query; users must verify accuracy before any use.
#
# To refresh the snapshot:
#   1. `just panelapp-refresh --force`
#   2. `sha256sum data/panelapp/panelapp_snapshot.jsonl`
#   3. Update `sha256`, `size_bytes`, `record_count`, and `snapshot_date` here
#   4. `just panelapp-rebuild` and review the references_cache/PANELAPP_*.md diff

source: Genomics England PanelApp
snapshot_date: "2026-06-27"
schema_tag: "api/v1/genes"
api_base: https://panelapp.genomicsengland.co.uk/api/v1
record_count: 30172

bulk_files:
  - name: panelapp_snapshot.jsonl
    url: ""  # built locally by walking the PanelApp REST API
    sha256: aea7b071c40ee4edcdc267bb840a107b36bf6ba589079d2bb92f201be8dcd239
    size_bytes: 20499381
    description: PanelApp gene-panel associations (API snapshot, JSON-Lines)
