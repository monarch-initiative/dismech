# Pinned snapshot of the ClinGen Dosage Sensitivity curated gene TSV.
#
# `just clingen-dosage-refresh` downloads the ClinGen dosage gene CSV and
# curated-gene GRCh38 TSV to data/clingen-dosage/ and verifies their sha256s
# against the pinned values below. The bulk files are not required to be
# committed; this manifest is the reproducible source pin used to rebuild
# references_cache/CGDS_*.md.
#
# To bump to a newer ClinGen release:
#   1. Download the TSV from the URL below
#   2. `sha256sum` the file
#   3. Update `sha256` and `snapshot_date` here
#   4. `just clingen-dosage-rebuild` and review the cache diff

source: ClinGen Dosage Sensitivity
snapshot_date: "2026-05-08"
schema_tag: "ClinGen_gene_curation_list_GRCh38.tsv"

bulk_files:
  - name: gene_dosage.csv
    url: https://search.clinicalgenome.org/kb/gene-dosage/download
    sha256: d7e107d0112c87fe4382fddbb4531a6a55f94abcf25e4768e566e129b75afe44
    size_bytes: 320791
    description: ClinGen Dosage Sensitivity gene download
  - name: gene_dosage_grch38.tsv
    url: https://ftp.clinicalgenome.org/ClinGen_gene_curation_list_GRCh38.tsv
    sha256: df69614a04c1462987212131f5352350df146094044895352485b8c75b436c69
    size_bytes: 264826
    description: ClinGen Dosage Sensitivity curated gene list, GRCh38
