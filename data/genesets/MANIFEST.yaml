# Pinned source for curated gene-set GO interpretations.
#
# `just genesets-refresh` fetches the GeneSetInterpretation YAMLs from the
# pinned commit of `monarch-initiative/genesets` into
# data/genesets/interpretations/, and joins gene membership from mygeneset.info
# into data/genesets/membership/. Neither is committed (see .gitignore); the
# committed references_cache/MYGENESET_*.md files are the durable artifact and
# this manifest is the reproducible pin.
#
# To bump to a newer genesets release:
#   1. Update `genesets_ref` to the new commit SHA (and `snapshot_date`)
#   2. `just genesets-refresh`
#   3. `just genesets-rebuild` and review the references_cache/MYGENESET_*.md diff
#
# Identifier scheme: reference_id = MYGENESET:<_id> where <_id> is the
# mygeneset.info primary key (the bare set name, e.g. KEGG_ASTHMA). See
# projects/GENESETS.md.

source: monarch-initiative/genesets + mygeneset.info
snapshot_date: "2026-06-26"
schema_tag: "GeneSetInterpretation"

genesets_repo: monarch-initiative/genesets
genesets_ref: 08115aa072e23459c24d77c60161526ded6b54c9
interpretation_dir: curation/genesets
mygeneset_base: https://mygeneset.info/v1
# mygeneset.info has no HGNC field; membership NCBIGene ids are resolved to HGNC
# (dismech's canonical gene namespace) via mygene.info.
mygene_base: https://mygene.info/v3

# Interpretation files are CC-BY-style curation in the genesets repo; gene
# membership is redistributed via mygeneset.info from its upstream sources
# (MSigDB, etc.). Cite the upstream gene_set_id (e.g. MSIGDB:KEGG_ASTHMA) for
# membership provenance.
licence: "see monarch-initiative/genesets and mygeneset.info source terms"
