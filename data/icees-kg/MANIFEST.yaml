# Pinned snapshot of the ICEES Knowledge Graph (KGX node/edge JSON-Lines).
#
# ICEES (Integrated Clinical and Environmental Exposures Service) is a
# regulatory-compliant open EHR + environmental-exposure service from RENCI /
# UNC Chapel Hill, distributed for the NCATS Biomedical Data Translator as
# `infores:automat-icees-kg`. It is the sibling resource to Columbia Open
# Health Data (COHD): both expose chi-square disease-disease co-occurrence from
# real-world EHR data, but ICEES nodes are already MONDO/HP-normalized.
#
# `just icees-refresh` downloads the pinned KGX files to data/icees-kg/ and
# verifies their sha256s. The bulk files are gitignored; this manifest is the
# reproducible source pin used to rebuild references_cache/ICEES_*.md.
#
# To bump to a newer ICEES KG release:
#   1. Find the new build under https://stars.renci.org/var/plater/<biolink>/icees-kg/
#   2. Update the URLs, sha256s, graph_version, and snapshot_date below
#   3. `just icees-rebuild` and review the references_cache/ICEES_*.md diff

