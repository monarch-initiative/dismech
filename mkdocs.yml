---
site_name: "DisMech"
theme:
  name: material
  palette:
    - scheme: default
      primary: teal
      accent: teal
  features:
    - content.tabs.link
    - navigation.top
    - navigation.instant
    - navigation.sections
    - search.highlight
    - search.suggest
  font: false

# for adding extra css/js see https://www.mkdocs.org/user-guide/customizing-your-theme/
extra_css:
  - stylesheets/dismech-mkdocs.css

# Provide Mermaid ourselves (from jsdelivr) so Material does not rely on its
# runtime unpkg fetch, which can fail and leave schema-page diagrams unrendered.
extra_javascript:
  - path: javascripts/mermaid.js
    type: module

plugins:
  - search:
      lang: en
      separator: '[\s\-]+'
  - mknotebooks:
      execute: false
  # TODO rebuild docs on schema change (https://github.com/dalito/linkml-project-copier/issues/39)
  # - gen-files:
  #     scripts:
  #       - gen_pages.py  # or any other name or path

markdown_extensions:
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

watch:
  - src/dismech/schema

validation:
  nav:
    omitted_files: ignore

# Navigation is organized along Diátaxis lines (About / How-to / Explanation),
# with the auto-generated schema reference kept separate from the hand-written
# guides and from code/tool docs (issue #2737). Working notes and reports are
# surfaced under their own section so nothing in docs/ is hidden (issue #4210).
nav:
  - Home: index.md
  - About: about.md
  - Curation Primers:
      - Phenotype Association Context: primers/phenotype-context.md
      - Preferred Term vs Ontology Label: primers/preferred-term-vs-label.md
      - Modules & Conformance: primers/modules-and-conformance.md
  - How-to Guides:
      - Quality Control & Compliance: quality-control.md
      - Frequency Evidence Guidelines: frequency-evidence-guidelines.md
      - Cancer Curation SOP: cancer-curation-sop.md
      - Psychiatric / Neurodevelopmental Curation SOP: psychiatric-curation-sop.md
  - Explanation:
      - Design Decisions: explanation/design-decisions.md
      - Contextualization: explanation/contextualization.md
      - Post-composition Terms: explanation/post-composition.md
      - Computational Models: explanation/computational-models.md
      - Individual Data: explanation/individual-data.md
      - Ontology Term Caches: explanation/ontology-caches.md
      - Pathographs: pathographs.md
      - Use Cases: use-cases.md
  - Data Model: data-model.md
  - Schema Reference: schema/schemas/dismech.md
  - Tools & Scripts:
      - MONDO Prioritizer: mondo-prioritizer.md
      - CX2 and NDEx Publishing: cx2-ndex-publishing.md
      - Embeddings: embeddings.md
  - Working Notes & Reports:
      - Notes: notes.md
      - Causal Modeling Integration Plan: causal-modeling-integration-plan.md
      - Frequency Evidence Proposal: frequency-evidence-proposal.md
      - GWAS / T-cell Validation Report: gwas-tcell-validation-report.md
      - K562 PoC Validation: k562-poc-validation.md
      - Slides: slides/dismech-slides.md
      - Reports:
          - reports/deep_research_eval_framework-2026-04-24.md
          - reports/drug_indication_priority_analysis-2026-04-21.md
          - reports/top_level_references_analysis-2026-04-24.md
      - Research:
          - research/cystic_fibrosis_datasets.md
          - research/g2p_all_genes_audit_2026_03_28.md
          - research/g2p_database_alignment.md
      - Curation Notes:
          - curation-notes/Achondrogenesis_Type_II-phenotype-curation-2026-04-18.md
          - curation-notes/Acromesomelic_Dysplasia_Maroteaux_Type-phenotype-issue-1456-2026-04-24.md
          - curation-notes/Atelosteogenesis_Type_I-phenotype-curation-issue-1479-2026-04-24.md
          - curation-notes/Brachydactyly_Type_A1-phenotype-curation-2026-04-19.md
          - curation-notes/Brachyolmia-phenotype-curation-2026-04-18.md
          - curation-notes/Chronic_Myelomonocytic_Leukemia-curation-notes-2026-04-24.md
          - curation-notes/Cleidocranial_Dysplasia-phenotype-issue-1499-2026-04-24.md
          - curation-notes/Fanconi_Anemia-Phenotypes-openai-2026-04-24.md
          - curation-notes/Fanconi_Anemia_Clinical_Care_Guidelines_5thEdition_web.extracted-2026-04-24.md
          - curation-notes/Fibrodysplasia_Ossificans_Progressiva-phenotype-curation-2026-04-19.md
          - curation-notes/Hypochondrogenesis-phenotype-evidence-2026-04-19.md
          - curation-notes/Hypochondroplasia-phenotype-curation-2026-04-19.md
          - curation-notes/IgA_Nephropathy-second-pass-review-2026-04-24.md
          - curation-notes/Kniest_Dysplasia-phenotype-curation-2026-04-18.md
          - curation-notes/Leri-Weill_Dyschondrosteosis-phenotype-curation-codex-2026-04-24.md
          - curation-notes/Nemaline_Myopathy-curation-interaction-2026-04-24.md
          - curation-notes/Oculodentodigital_Dysplasia-phenotype-research-codex-2026-04-24.md
          - curation-notes/Okur_Chung_neurodevelopmental_syndrome-2026-04-24.md
          - curation-notes/Osteogenesis_Imperfecta_Type_II-phenotype-evidence-codex-2026-04-24.md
          - curation-notes/Osteogenesis_Imperfecta_Type_VII-phenotype-curation-manual-2026-04-24.md
          - curation-notes/PRPH2-Related_Retinopathy-curation-notes-2026-04-24.md
          - curation-notes/Sclerosteosis-phenotype-curation-codex-2026-04-24.md
          - curation-notes/Spondylocarpotarsal_Synostosis_Syndrome-phenotype-refresh-manual-2026-04-24.citations.md
          - curation-notes/Spondylocarpotarsal_Synostosis_Syndrome-phenotype-refresh-manual-2026-04-24.md
          - curation-notes/Spondyloepimetaphyseal_Dysplasia_Strudwick_Type-phenotype-curation-2026-04-18.md
          - curation-notes/Spondylometaphyseal_Dysplasia_Kozlowski_Type-phenotype-curation-codex-2026-04-24.md
          - curation-notes/Thanatophoric_Dysplasia_Type_1-phenotype-curation-2026-04-18.md
          - curation-notes/Thanatophoric_Dysplasia_Type_2-phenotype-curation-codex-issue-1458-2026-04-24.md
          - curation-notes/issue-1451-campomelic-dysplasia-phenotypes-2026-04-24.md

exclude_docs: |
  /templates-linkml/
  /elements/
  /issues/
  /todo/
  /ntr/

site_url: https://dismech.monarchinitiative.org/elements/
site_dir: elements
repo_url: https://github.com/monarch-initiative/dismech

