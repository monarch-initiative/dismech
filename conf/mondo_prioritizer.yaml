    # do not populate `is_obsolete: true`.
    - "^obsolete\\b"
  subtype_series_patterns:
    - "^(?P<stem>.+?),\\s*type\\s+[IVX0-9A-Za-z-]+$"
    - "^(?P<stem>.+?)\\s+type\\s+[IVX0-9A-Za-z-]+$"
    - "^(?P<stem>.+?),\\s*[0-9]+[A-Za-z]?$"
    - "^(?P<stem>.+?)\\s+[0-9]+[A-Za-z]?$"
