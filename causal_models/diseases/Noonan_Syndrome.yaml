disease_model:
  id: noonan_syndrome
  name: Noonan Syndrome
  disorder_ref: Noonan_Syndrome.yaml
  disease_term:
    id: MONDO:0018997
    label: Noonan syndrome

  has_phenotype:
  - phenotype: pulmonic_stenosis
    relation: {id: RO:0002200, label: has phenotype}
    eco: {id: ECO:0000305, label: curator inference used in manual assertion}
    evidence: []
  - phenotype: hypertrophic_cardiomyopathy
    relation: {id: RO:0002200, label: has phenotype}
    eco: {id: ECO:0000305, label: curator inference used in manual assertion}
    evidence: []
  - phenotype: short_stature
    relation: {id: RO:0002200, label: has phenotype}
    eco: {id: ECO:0000305, label: curator inference used in manual assertion}
    evidence: []
  - phenotype: hypertelorism
    relation: {id: RO:0002200, label: has phenotype}
    eco: {id: ECO:0000305, label: curator inference used in manual assertion}
    evidence: []
  - phenotype: global_developmental_delay
    relation: {id: RO:0002200, label: has phenotype}
    eco: {id: ECO:0000305, label: curator inference used in manual assertion}
    evidence: []
  - phenotype: lymphedema
    relation: {id: RO:0002200, label: has phenotype}
    eco: {id: ECO:0000305, label: curator inference used in manual assertion}
    evidence: []

  imports:
  - module: ras_mapk_cascade

  hypothesis_groups:
  # --- PTPN11-driven (~50% of cases) ---
  - id: ptpn11_driven
    name: PTPN11-driven (SHP2 gain-of-function)
    frequency: "~50%"
    description: >
      Gain-of-function missense mutations in PTPN11 destabilize the autoinhibitory
      interaction between the N-SH2 and PTP domains, resulting in constitutively
      elevated SHP2 phosphatase activity and enhanced downstream RAS-ERK signaling.

    perturbations:
    - target_activity: ras_mapk_cascade:shp2_phosphatase
      variant_class:
        id: GENO:0000015
        label: missense variant
      perturbed_state: constitutively_active
      eco:
        id: ECO:0000315
        label: mutant phenotype evidence used in manual assertion
      evidence:
      - type: literature
        reference: PMID:11992261
        snippet: "The vast majority of mutations altered amino acid residues located in or around the interacting surfaces of the N-SH2 and PTP domains"
      - type: literature
        reference: PMID:17143285
        snippet: "SHP2 is required for RAS-ERK MAP kinase (MAPK) cascade activation, and Noonan syndrome mutants enhance ERK activation ex vivo and in mice."

    propagated_states:
    - activity: ras_mapk_cascade:ras_gtpase
      perturbed_state: increased

    - activity: ras_mapk_cascade:raf_kinase
      perturbed_state: increased

    - activity: ras_mapk_cascade:mek_kinase
      perturbed_state: increased

    - activity: ras_mapk_cascade:erk_kinase
      perturbed_state: increased

  # --- SOS1-driven (~10% of cases) ---
  - id: sos1_driven
    name: SOS1-driven (GEF hyperactivity)
    frequency: "~10%"
    description: >
      Gain-of-function SOS1 mutations encode GEF variants with enhanced catalytic
      activity, increasing the rate of RAS-GDP to RAS-GTP conversion.

    perturbations:
    - target_activity: ras_mapk_cascade:sos1_gef
      variant_class:
        id: GENO:0000015
        label: missense variant
      perturbed_state: constitutively_active
      eco:
        id: ECO:0000315
        label: mutant phenotype evidence used in manual assertion
      evidence:
      - type: literature
        reference: PMID:17143285
        snippet: "Noonan syndrome-associated SOS1 mutations are hypermorphs encoding products that enhance RAS and ERK activation."

    propagated_states:
    - activity: ras_mapk_cascade:ras_gtpase
      perturbed_state: increased

    - activity: ras_mapk_cascade:raf_kinase
      perturbed_state: increased

    - activity: ras_mapk_cascade:mek_kinase
      perturbed_state: increased

    - activity: ras_mapk_cascade:erk_kinase
      perturbed_state: increased

  # --- RAF1-driven (~5% of cases) ---
  - id: raf1_driven
    name: RAF1-driven (kinase hyperactivation)
    frequency: "~5%"
    description: >
      RAF1 mutations at Ser259 and flanking residues disrupt 14-3-3 binding and
      autoinhibition, resulting in constitutively elevated serine-threonine kinase
      activity. Strongly associated with hypertrophic cardiomyopathy.

    perturbations:
    - target_activity: ras_mapk_cascade:raf_kinase
      variant_class:
        id: GENO:0000015
        label: missense variant
      perturbed_state: constitutively_active
      eco:
        id: ECO:0000315
        label: mutant phenotype evidence used in manual assertion
      evidence:
      - type: literature
        reference: PMID:17603483
        snippet: "Most mutations altered a motif flanking Ser259, a residue critical for autoinhibition of RAF1 through 14-3-3 binding."

    propagated_states:
    - activity: ras_mapk_cascade:mek_kinase
      perturbed_state: increased

    - activity: ras_mapk_cascade:erk_kinase
      perturbed_state: increased

  # --- LZTR1-driven (proteostasis defect) ---
  - id: lztr1_driven
    name: LZTR1-driven (RAS proteostasis defect)
    frequency: "<5%"
    description: >
      Loss of LZTR1-mediated RAS ubiquitination through CRL3 E3 ligase increases
      RAS-family protein levels. Can follow autosomal dominant (dominant-negative)
      or autosomal recessive inheritance.

    perturbations:
    - target_activity: ras_mapk_cascade:lztr1_ubiquitination
      variant_class:
        id: GENO:0000134
        label: loss of function variant
      perturbed_state: absent
      eco:
        id: ECO:0000315
        label: mutant phenotype evidence used in manual assertion
      evidence:
      - type: literature
        reference: PMID:39352760
        snippet: "Cardiomyocyte size and the expression of RAS subfamily members, including MRAS and RIT1, were significantly increased in the left ventricles (LVs) of mutant male mice."

    propagated_states:
    - activity: ras_mapk_cascade:ras_gtpase
      perturbed_state: substrate_accumulated
      # Loss of ubiquitin-mediated degradation → RAS protein accumulation

    - activity: ras_mapk_cascade:raf_kinase
      perturbed_state: increased

    - activity: ras_mapk_cascade:mek_kinase
      perturbed_state: increased

    - activity: ras_mapk_cascade:erk_kinase
      perturbed_state: increased

  phenotype_routes:
  - id: pulmonic_stenosis_route
    name: Pulmonic stenosis pathway
    description: >
      Sustained ERK signaling perturbs endocardial-mesenchymal transition during
      semilunar valve development, leading to pulmonary valve dysplasia and stenosis.
    intermediates:
    - id: endocardial_mesenchymal_transition_dysregulation
      name: Endocardial-mesenchymal transition dysregulation
      perturbed_state: increased
      driven_by:
      - source: ras_mapk_cascade:erk_kinase
        relation:
          id: RO:0002304
          label: causally upstream of, positive effect
        eco:
          id: ECO:0000305
          label: curator inference used in manual assertion
        evidence:
        - type: literature
          reference: PMID:11992261
          snippet: "...pulmonic stenosis was more prevalent among the group of subjects with NS who had PTPN11 mutations than it was in the group without them (70.6% vs. 46.2%; P<.01)..."
      biological_process:
        id: GO:0060317
        label: cardiac epithelial to mesenchymal transition
      tissue:
        cell_type:
          id: CL:0000359
          label: vascular associated smooth muscle cell
        anatomy:
          id: UBERON:0002146
          label: pulmonary valve
    targets:
    - id: pulmonic_stenosis
      preferred_term: Pulmonic stenosis
      perturbed_state: increased
      term:
        id: HP:0001642
        label: Pulmonic stenosis
      driven_by:
      - source: endocardial_mesenchymal_transition_dysregulation
        relation:
          id: RO:0003303
          label: causes condition
        eco:
          id: ECO:0000305
          label: curator inference used in manual assertion
        evidence: []

  - id: hcm_route
    name: Hypertrophic cardiomyopathy pathway
    description: >
      ERK-driven fetal gene reprogramming in cardiomyocytes promotes hypertrophic
      growth. Particularly prominent in RAF1-driven Noonan syndrome.
    intermediates:
    - id: cardiomyocyte_hypertrophic_gene_program
      name: Cardiomyocyte hypertrophic gene program
      perturbed_state: increased
      driven_by:
      - source: ras_mapk_cascade:erk_kinase
        relation:
          id: RO:0002304
          label: causally upstream of, positive effect
        eco:
          id: ECO:0000305
          label: curator inference used in manual assertion
        evidence:
        - type: literature
          reference: PMID:17603483
          snippet: "Our findings further implicate increased RAS signaling in pathological cardiomyocyte hypertrophy."
      biological_process:
        id: GO:0003300
        label: cardiac muscle hypertrophy
      tissue:
        cell_type:
          id: CL:0000746
          label: cardiac muscle cell
        anatomy:
          id: UBERON:0000948
          label: heart
    targets:
    - id: hypertrophic_cardiomyopathy
      preferred_term: Hypertrophic cardiomyopathy
      perturbed_state: increased
      term:
        id: HP:0001639
        label: Hypertrophic cardiomyopathy
      driven_by:
      - source: cardiomyocyte_hypertrophic_gene_program
        relation:
          id: RO:0003303
          label: causes condition
        eco:
          id: ECO:0000305
          label: curator inference used in manual assertion
        evidence: []

  - id: short_stature_route
    name: Short stature pathway
    description: >
      RAS-MAPK hyperactivation disrupts GH/IGF1 signaling and growth plate
      chondrocyte differentiation, leading to proportionate short stature.
    intermediates:
    - id: growth_plate_signaling_disruption
      name: Growth plate signaling disruption
      perturbed_state: increased
      driven_by:
      - source: ras_mapk_cascade:erk_kinase
        relation:
          id: RO:0002304
          label: causally upstream of, positive effect
        eco:
          id: ECO:0000305
          label: curator inference used in manual assertion
        evidence:
        - type: literature
          reference: PMID:17143285
          snippet: "Noonan syndrome, the most common single-gene cause of congenital heart disease, is characterized by short stature, characteristic facies, learning problems and leukemia predisposition."
      biological_process:
        id: GO:0003416
        label: endochondral bone growth
      tissue:
        cell_type:
          id: CL:0000743
          label: hypertrophic chondrocyte
        anatomy:
          id: UBERON:0006658
          label: growth plate cartilage
    targets:
    - id: short_stature
      preferred_term: Short stature
      perturbed_state: increased
      term:
        id: HP:0004322
        label: Short stature
      driven_by:
      - source: growth_plate_signaling_disruption
        relation:
          id: RO:0003303
          label: causes condition
        eco:
          id: ECO:0000305
          label: curator inference used in manual assertion
        evidence: []

  - id: craniofacial_route
    name: Craniofacial dysmorphism pathway
    description: >
      ERK signaling dysregulation during neural crest cell migration and
      craniofacial patterning produces the characteristic facial gestalt
      (hypertelorism, downslanted palpebral fissures, low-set ears).
    intermediates:
    - id: neural_crest_patterning_disruption
      name: Neural crest patterning disruption
      perturbed_state: increased
      driven_by:
      - source: ras_mapk_cascade:erk_kinase
        relation:
          id: RO:0002304
          label: causally upstream of, positive effect
        eco:
          id: ECO:0000305
          label: curator inference used in manual assertion
        evidence:
        - type: literature
          reference: PMID:17222357
          snippet: "The main facial features of NS are hypertelorism with down-slanting palpebral fissures, ptosis and low-set posteriorly rotated ears with a thickened helix."
      biological_process:
        id: GO:0014033
        label: neural crest cell differentiation
      tissue:
        anatomy:
          id: UBERON:0001084
          label: skin of head
    targets:
    - id: hypertelorism
      preferred_term: Hypertelorism
      perturbed_state: increased
      term:
        id: HP:0000316
        label: Hypertelorism
      driven_by:
      - source: neural_crest_patterning_disruption
        relation:
          id: RO:0003303
          label: causes condition
        eco:
          id: ECO:0000305
          label: curator inference used in manual assertion
        evidence: []

  - id: neurodevelopmental_route
    name: Neurodevelopmental delay pathway
    description: >
      Sustained RAS-MAPK signaling perturbs cortical neuronal lineage patterning
      and synaptic maturation, contributing to developmental delay and mild
      intellectual disability.
    intermediates:
    - id: cortical_layer_development_abnormality
      name: Cortical layer development abnormality
      perturbed_state: increased
      driven_by:
      - source: ras_mapk_cascade:erk_kinase
        relation:
          id: RO:0002304
          label: causally upstream of, positive effect
        eco:
          id: ECO:0000305
          label: curator inference used in manual assertion
        evidence:
        - type: literature
          reference: GEO:GSE213798
          snippet: "...single-cell transcriptomic analysis represented increment of EN population and overexpression of cortical layer markers in NS-COs."
      biological_process:
        id: GO:0021987
        label: cerebral cortex development
      tissue:
        anatomy:
          id: UBERON:0001870
          label: frontal cortex
    targets:
    - id: global_developmental_delay
      preferred_term: Global developmental delay
      perturbed_state: increased
      term:
        id: HP:0001263
        label: Global developmental delay
      driven_by:
      - source: cortical_layer_development_abnormality
        relation:
          id: RO:0003303
          label: causes condition
        eco:
          id: ECO:0000305
          label: curator inference used in manual assertion
        evidence: []

  - id: lymphatic_route
    name: Lymphatic anomaly pathway
    description: >
      RAS-MAPK pathway overactivation contributes to lymphatic structural
      abnormalities including lymphedema and chylothorax.
    intermediates:
    - id: lymphatic_endothelial_proliferation
      name: Lymphatic endothelial proliferation
      perturbed_state: increased
      driven_by:
      - source: ras_mapk_cascade:erk_kinase
        relation:
          id: RO:0002304
          label: causally upstream of, positive effect
        eco:
          id: ECO:0000305
          label: curator inference used in manual assertion
        evidence:
        - type: literature
          reference: PMID:17222357
          snippet: "Other associated features are webbed neck, chest deformity, mild intellectual deficit, cryptorchidism, poor feeding in infancy, bleeding tendency and lymphatic dysplasias."
      biological_process:
        id: GO:0001946
        label: lymphangiogenesis
      tissue:
        cell_type:
          id: CL:0002138
          label: endothelial cell of lymphatic vessel
        anatomy:
          id: UBERON:0001473
          label: lymphatic vessel
    targets:
    - id: lymphedema
      preferred_term: Lymphedema
      perturbed_state: increased
      term:
        id: HP:0001004
        label: Lymphedema
      driven_by:
      - source: lymphatic_endothelial_proliferation
        relation:
          id: RO:0003303
          label: causes condition
        eco:
          id: ECO:0000305
          label: curator inference used in manual assertion
        evidence: []
