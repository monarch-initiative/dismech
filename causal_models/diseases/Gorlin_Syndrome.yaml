id: gorlin_syndrome
name: Gorlin Syndrome
description: >-
  Gorlin syndrome (nevoid basal cell carcinoma syndrome) is caused by germline loss-of-function
  variants in PTCH1 (rarely SUFU), leading to constitutive Hedgehog/GLI activation and a
  multi-system tumour predisposition syndrome.

disorder_ref: Gorlin_Syndrome.yaml

realises_disease:
  id: MONDO:0007187
  label: nevoid basal cell carcinoma syndrome

sources:
  - type: literature
    reference: PMID:19032739
  - type: literature
    reference: PMID:28596197

imports:
  - module: hedgehog_signaling

hypothesis_groups:
  - id: ptch1_driven
    name: PTCH1-driven
    frequency: "~85%"
    description: >-
      Germline PTCH1 loss-of-function. Following somatic loss of the second allele,
      SMO becomes constitutively active, driving unopposed GLI transcriptional activation.
  - id: sufu_driven
    name: SUFU-driven
    frequency: "~5%"
    description: >-
      Germline SUFU loss-of-function. SUFU normally sequesters GLI proteins; its loss
      leads to constitutive GLI1/GLI2 nuclear activity and elevated medulloblastoma risk.

variants:
  - id: ptch1_lof
    gene:
      symbol: PTCH1
      hgnc_id: hgnc:9585
    variant_type:
      id: SO:0002054
      label: loss_of_function_variant
    hypotheses:
      - ptch1_driven
  - id: sufu_lof
    gene:
      symbol: SUFU
      hgnc_id: hgnc:16466
    variant_type:
      id: SO:0002054
      label: loss_of_function_variant
    hypotheses:
      - sufu_driven

molecular_entities:
  - id: sonic_hedgehog
    entity:
      id: PR:000013760
      label: sonic hedgehog protein
    description: >-
      The SHH ligand that normally binds PTCH1 to relieve SMO inhibition.
      In Gorlin syndrome, constitutive Hedgehog activation occurs independently
      of SHH ligand, as PTCH1 loss-of-function permanently derepresses SMO.

molecular_activities:
  - id: gli1_upregulation
    gene:
      symbol: GLI1
      hgnc_id: hgnc:4317
    molecular_function:
      id: GO:0001228
      label: DNA-binding transcription activator activity, RNA polymerase II-specific
    biological_process:
      id: GO:0007224
      label: smoothened signaling pathway
    quality: GAIN_OF_FUNCTION
    description: >-
      Constitutive GLI1 transcriptional activation drives target gene expression.
      Disease-local perturbation of the module's gli1_activation node.

  - id: ccnd1_upregulation
    gene:
      symbol: CCND1
      hgnc_id: hgnc:1582
    biological_process:
      id: GO:0044843
      label: cell cycle G1/S phase transition
    quality: INCREASED
    description: GLI1 target gene; drives G1/S transition in basal cells.

  - id: bcl2_upregulation
    gene:
      symbol: BCL2
      hgnc_id: hgnc:990
    biological_process:
      id: GO:0043066
      label: negative regulation of apoptotic process
    quality: INCREASED
    description: >-
      GLI1 transcriptional target; BCL2 upregulation in BCC cells suppresses apoptosis,
      allowing clonal expansion of Hh-driven keratinocytes.

  - id: mycn_upregulation
    gene:
      symbol: MYCN
      hgnc_id: hgnc:7559
    biological_process:
      id: GO:0008283
      label: cell population proliferation
    quality: INCREASED
    description: >-
      GLI1 transcriptional target; MYCN drives cell cycle progression and is a key
      mediator of Hh-dependent proliferation in cerebellar granule precursors (medulloblastoma)
      and BCC.

  - id: gli3_ar_imbalance
    gene:
      symbol: GLI3
      hgnc_id: hgnc:4319
    biological_process:
      id: GO:0007224
      label: smoothened signaling pathway
    description: >-
      When GLI3 repressor (GLI3R) production is reduced (due to inactive PKA/BTRC cascade)
      and GLI3 activator (GLI3A) increases, the A/R ratio shifts toward activation,
      disrupting the precise GLI3 A/R balance required for normal skeletal patterning.
      Drives rib and vertebral anomalies in Gorlin syndrome.

cellular_processes:
  - id: basal_keratinocyte_proliferation
    cell_type:
      id: CL:0000312
      label: keratinocyte
    biological_process:
      id: GO:0008283
      label: cell population proliferation
    quality: INCREASED
    description: >-
      Constitutive GLI1 activation drives basal keratinocyte proliferation;
      cellular-level upstream of the tissue-level epidermis phenotype.

  - id: cerebellar_granule_precursor_proliferation
    cell_type:
      id: CL:0002362
      label: cerebellar granule cell precursor
    biological_process:
      id: GO:0021930
      label: cerebellar granule cell precursor proliferation
    quality: INCREASED
    hypotheses:
      - sufu_driven
    description: >-
      Constitutive Hh/GLI activation in cerebellar granule neuron precursors drives
      aberrant proliferation; the initiating event for desmoplastic medulloblastoma
      in SUFU-driven Gorlin syndrome.

tissue_processes:
  - id: basal_cell_proliferation
    anatomy:
      id: UBERON:0001003
      label: skin epidermis
    biological_process:
      id: GO:0008283
      label: cell population proliferation
    quality: INCREASED
    description: >-
      Constitutive Hedgehog/GLI activation drives uncontrolled basal cell proliferation
      in the epidermis, the initiating event for basal cell carcinoma.

phenotypes:
  - id: bcc
    hpo_term:
      id: HP:0002671
      label: Basal cell carcinoma
    description: Multiple BCCs, often appearing in the second decade. Frequency ~90% lifetime risk.
  - id: odontogenic_keratocysts
    hpo_term:
      id: HP:0010603
      label: Odontogenic keratocysts of the jaw
    description: Jaw cysts driven by constitutive Hh signalling in odontogenic epithelium.
  - id: macrocephaly
    hpo_term:
      id: HP:0000256
      label: Macrocephaly
    description: Increased head circumference; present in ~50% of affected individuals.
  - id: palmar_pits
    hpo_term:
      id: HP:0010610
      label: Palmar pits
    description: >-
      Punctate epidermal pits on palms (and soles); present in ~87% of adults.
      Result from focal Hh-driven basal cell proliferation with incomplete keratin maturation.
  - id: falx_calcification
    hpo_term:
      id: HP:0005462
      label: Calcification of falx cerebri
    description: >-
      Lamellar (sheet-like) calcification of the falx cerebri; a radiological hallmark
      present in >90% of adults with Gorlin syndrome. Pathomechanism not fully established.
  - id: medulloblastoma
    hpo_term:
      id: HP:0002885
      label: Medulloblastoma
    hypotheses:
      - sufu_driven
    description: >-
      Desmoplastic medulloblastoma arising from cerebellar granule neuron precursors.
      Risk is substantially higher in SUFU-driven (~7–9%) than PTCH1-driven (~0.4–1%) disease.

modulators:
  - id: vismodegib
    agent:
      id: CHEBI:66903
      label: vismodegib
    role: therapeutic
    description: SMO inhibitor; approved for locally advanced or metastatic BCC.

