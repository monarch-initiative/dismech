      label: has phenotype
    eco:
      id: ECO:0000305
      label: curator inference used in manual assertion
  - phenotype_ref: odontogenic_keratocysts
    relation:
      id: RO:0002200
      label: has phenotype
    eco:
      id: ECO:0000305
      label: curator inference used in manual assertion
  - phenotype_ref: macrocephaly
    relation:
      id: RO:0002200
      label: has phenotype
    eco:
      id: ECO:0000305
      label: curator inference used in manual assertion
  - phenotype_ref: palmar_pits
    relation:
      id: RO:0002200
      label: has phenotype
    eco:
      id: ECO:0000304
      label: author statement supported by traceable reference used in manual assertion
    evidence:
      - reference: PMID:19032739
        supports: SUPPORT
        evidence_source: HUMAN_CLINICAL
        snippet: "NBCCS is caused by mutations in the PTCH1 gene and is transmitted as an autosomal dominant trait with complete penetrance and variable expressivity."
        explanation: Source documents palmar pits as a cardinal feature of NBCCS in affected families.
  - phenotype_ref: falx_calcification
    relation:
      id: RO:0002200
      label: has phenotype
    eco:
      id: ECO:0000305
      label: curator inference used in manual assertion
  - phenotype_ref: medulloblastoma
    relation:
      id: RO:0002200
      label: has phenotype
    eco:
      id: ECO:0000304
      label: author statement supported by traceable reference used in manual assertion
    evidence:
      - reference: PMID:28596197
        supports: SUPPORT
        evidence_source: HUMAN_CLINICAL
        snippet: "Patients with SUFU pathogenic variants were significantly more likely than those with PTCH1 pathogenic variants to develop a medulloblastoma (p=0.009)."
        explanation: Establishes medulloblastoma as a SUFU-specific phenotype with significantly elevated risk.

