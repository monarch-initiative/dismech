  imports:
  - module: collagen_v_assembly

  hypothesis_groups:
  # --- COL5A1 haploinsufficiency (~50% of cEDS) ---
  - id: col5a1_haploinsufficiency
    name: COL5A1 haploinsufficiency
    frequency: "~50% of cEDS"
    description: >
      Heterozygous loss-of-function variants in COL5A1 result in haploinsufficiency
      of the alpha-1(V) collagen chain. With only one functional allele, insufficient
      alpha-1(V) is produced to form normal quantities of type V collagen heterotrimers,
      impairing fibril nucleation and reducing ECM tensile strength throughout
      connective tissues.

    perturbations:
    - target_activity: collagen_v_assembly:col5a1_structural
      variant_class:
        id: GENO:0000134
        label: loss of function variant
      perturbed_state: decreased
      eco:
        id: ECO:0000315
        label: mutant phenotype evidence used in manual assertion
      evidence:
      - type: literature
        reference: PMID:20847697
        snippet: "In the majority of patients with molecularly characterized classic Ehlers-Danlos syndrome, the disease is caused by a mutation leading to a nonfunctional COL5A1 allele and resulting in haploinsufficiency of type V collagen."

    propagated_states:
    - activity: collagen_v_assembly:colv_heterotrimer
      perturbed_state: decreased

    - activity: collagen_v_assembly:heterotypic_fibril_formation
      perturbed_state: decreased

  phenotype_routes:
  # --- Hub-and-spoke: all routes branch from heterotypic_fibril_formation ---

  - id: joint_hypermobility_route
    name: Joint hypermobility pathway
    description: >
      Reduced collagen fibril density in ligaments and joint capsules decreases
      tensile strength, permitting excessive joint excursion.
    intermediates:
    - id: ligament_ecm_weakness
      name: Ligamentous ECM weakness
      perturbed_state: decreased
      driven_by:
      - source: collagen_v_assembly:heterotypic_fibril_formation
        relation: {id: RO:0002304, label: causally upstream of, positive effect}
        eco: {id: ECO:0000305, label: curator inference used in manual assertion}
        evidence:
        - type: literature
          reference: PMID:34807421
          snippet: "Currently, musculoskeletal manifestations related to joint hypermobility are perceived as the most prevalent determinants of the quality of life of affected individuals."
      biological_process:
        id: GO:0030198
        label: extracellular matrix organization
      tissue:
        cell_type: {id: CL:0000057, label: fibroblast}
        anatomy: {id: UBERON:0000211, label: ligament}
    targets:
    - id: joint_hypermobility
      preferred_term: Joint hypermobility
      perturbed_state: increased
      term: {id: HP:0001382, label: Joint hypermobility}
      driven_by:
      - source: ligament_ecm_weakness
        relation: {id: RO:0003303, label: causes condition}
        eco: {id: ECO:0000305, label: curator inference used in manual assertion}
        evidence: []

  - id: skin_hyperextensibility_route
    name: Skin hyperextensibility pathway
    description: >
      Reduced dermal collagen fibril density allows abnormal skin stretching
      and fragility.
    intermediates:
    - id: dermal_ecm_weakness
      name: Dermal ECM weakness
      perturbed_state: decreased
      driven_by:
      - source: collagen_v_assembly:heterotypic_fibril_formation
        relation: {id: RO:0002304, label: causally upstream of, positive effect}
        eco: {id: ECO:0000305, label: curator inference used in manual assertion}
        evidence:
        - type: literature
          reference: PMID:20847697
          snippet: "Classic Ehlers-Danlos syndrome is a heritable connective tissue disorder characterized by skin hyperextensibility, fragile and soft skin, delayed wound healing with formation of atrophic scars, easy bruising, and generalized joint hypermobility."
      biological_process:
        id: GO:0030198
        label: extracellular matrix organization
      tissue:
        cell_type: {id: CL:0002620, label: skin fibroblast}
        anatomy: {id: UBERON:0002067, label: dermis}
    targets:
    - id: skin_hyperextensibility
      preferred_term: Skin hyperextensibility
      perturbed_state: increased
      term: {id: HP:0000974, label: Hyperextensible skin}
      driven_by:
      - source: dermal_ecm_weakness
        relation: {id: RO:0003303, label: causes condition}
        eco: {id: ECO:0000305, label: curator inference used in manual assertion}
        evidence: []

  - id: wound_healing_route
    name: Delayed wound healing / atrophic scarring pathway
    description: >
      Impaired collagen deposition in wounds slows re-epithelialization and
      produces thin, papyraceous (cigarette-paper) scars.
    intermediates:
    - id: dermal_repair_defect
      name: Dermal repair defect
      perturbed_state: decreased
      driven_by:
      - source: collagen_v_assembly:heterotypic_fibril_formation
        relation: {id: RO:0002304, label: causally upstream of, positive effect}
        eco: {id: ECO:0000305, label: curator inference used in manual assertion}
        evidence:
        - type: literature
          reference: PMID:20847697
          snippet: "Classic Ehlers-Danlos syndrome is a heritable connective tissue disorder characterized by skin hyperextensibility, fragile and soft skin, delayed wound healing with formation of atrophic scars, easy bruising, and generalized joint hypermobility."
      biological_process:
        id: GO:0042060
        label: wound healing
      tissue:
        cell_type: {id: CL:0002620, label: skin fibroblast}
        anatomy: {id: UBERON:0002067, label: dermis}
    targets:
    - id: delayed_wound_healing
      preferred_term: Delayed wound healing
      perturbed_state: increased
      term: {id: HP:0001058, label: Poor wound healing}
      driven_by:
      - source: dermal_repair_defect
        relation: {id: RO:0003303, label: causes condition}
        eco: {id: ECO:0000305, label: curator inference used in manual assertion}
        evidence: []
    - id: atrophic_scars
      preferred_term: Atrophic scars
      perturbed_state: increased
      term: {id: HP:0001075, label: Atrophic scars}
      driven_by:
      - source: dermal_repair_defect
        relation: {id: RO:0003303, label: causes condition}
        eco: {id: ECO:0000305, label: curator inference used in manual assertion}
        evidence: []

  - id: easy_bruising_route
    name: Easy bruising pathway
    description: >
      Perivascular connective tissue fragility increases capillary vulnerability
      to mechanical stress.
    intermediates:
    - id: perivascular_ecm_weakness
      name: Perivascular ECM weakness
      perturbed_state: decreased
      driven_by:
      - source: collagen_v_assembly:heterotypic_fibril_formation
        relation: {id: RO:0002304, label: causally upstream of, positive effect}
        eco: {id: ECO:0000305, label: curator inference used in manual assertion}
        evidence:
        - type: literature
          reference: PMID:19592142
          snippet: "The bleeding tendency is most prominent in the Ehlers-Danlos syndrome (EDS), a heterogeneous group of HDCT sharing clinical manifestations of fragility in skin, ligaments, blood vessels and internal organs."
      biological_process:
        id: GO:0030198
        label: extracellular matrix organization
      tissue:
        anatomy: {id: UBERON:0004537, label: blood vasculature}
    targets:
    - id: easy_bruising
