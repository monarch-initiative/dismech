      - source: perivascular_ecm_weakness
        relation: {id: RO:0003303, label: causes condition}
        eco: {id: ECO:0000305, label: curator inference used in manual assertion}
        evidence: []

  - id: mvp_route
    name: Mitral valve prolapse pathway
    description: >
      Valve leaflet connective tissue laxity from reduced collagen fibrils
