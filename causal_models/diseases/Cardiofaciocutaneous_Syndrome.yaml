disease_model:
  id: cardiofaciocutaneous_syndrome
  name: Cardiofaciocutaneous Syndrome
  disorder_ref: Cardiofaciocutaneous_Syndrome.yaml
  disease_term:
    id: MONDO:0015280
    label: cardiofaciocutaneous syndrome

  has_phenotype:
  - phenotype: pulmonic_stenosis
    relation: {id: RO:0002200, label: has phenotype}
    eco: {id: ECO:0000305, label: curator inference used in manual assertion}
    evidence: []
  - phenotype: keratosis_pilaris
    relation: {id: RO:0002200, label: has phenotype}
    eco: {id: ECO:0000305, label: curator inference used in manual assertion}
    evidence: []
  - phenotype: abnormal_facial_shape
    relation: {id: RO:0002200, label: has phenotype}
    eco: {id: ECO:0000305, label: curator inference used in manual assertion}
    evidence: []
  - phenotype: intellectual_disability
    relation: {id: RO:0002200, label: has phenotype}
    eco: {id: ECO:0000305, label: curator inference used in manual assertion}
    evidence: []
  - phenotype: short_stature
    relation: {id: RO:0002200, label: has phenotype}
    eco: {id: ECO:0000305, label: curator inference used in manual assertion}
    evidence: []
  - phenotype: seizures
    relation: {id: RO:0002200, label: has phenotype}
    eco: {id: ECO:0000305, label: curator inference used in manual assertion}
    evidence: []

  imports:
  - module: ras_mapk_cascade

  hypothesis_groups:
  # --- BRAF-driven (~75% of cases) ---
  - id: braf_driven
    name: BRAF-driven (kinase-impaired paradoxical activation)
    frequency: "~75%"
    description: >
      Germline BRAF mutations in CFC are distinct from the somatic V600E seen in
      cancer. Most CFC mutations (Q257R, E501G) are kinase-impaired but activate
      the pathway through enhanced RAF dimerization, driving constitutive MEK-ERK
      signaling via a paradoxical activation mechanism.

    perturbations:
    - target_activity: ras_mapk_cascade:raf_kinase
      variant_class:
        id: GENO:0000015
        label: missense variant
      perturbed_state: constitutively_active
      mechanism: gain_of_function
      eco:
        id: ECO:0000315
        label: mutant phenotype evidence used in manual assertion
      evidence:
      - type: literature
        reference: PMID:16439621
        snippet: "The majority of cases (18 out of 23) are caused by mutations in BRAF, a gene frequently mutated in cancer. Of the 11 mutations identified, two result in amino acid substitutions that occur in tumors, but most are unique and suggest previously unknown mechanisms of B-Raf activation."

    propagated_states:
    - activity: ras_mapk_cascade:mek_kinase
      perturbed_state: increased

    - activity: ras_mapk_cascade:erk_kinase
      perturbed_state: increased

  # --- MAP2K1/MEK1-driven (~14% of cases) ---
  - id: mek1_driven
    name: MAP2K1-driven (MEK1 gain-of-function)
    frequency: "~14%"
    description: >
      Gain-of-function mutations in MAP2K1 (MEK1) increase kinase activity,
      directly hyperactivating ERK signaling without requiring upstream RAS or
      RAF perturbation.

    perturbations:
    - target_activity: ras_mapk_cascade:mek_kinase
      variant_class:
        id: GENO:0000015
        label: missense variant
      perturbed_state: constitutively_active
      mechanism: gain_of_function
      eco:
        id: ECO:0000315
        label: mutant phenotype evidence used in manual assertion
      evidence:
      - type: literature
        reference: PMID:16439621
        snippet: "three of five individuals without BRAF mutations had missense mutations in either MEK1 or MEK2, downstream effectors of B-Raf"

    propagated_states:
    - activity: ras_mapk_cascade:erk_kinase
      perturbed_state: increased

  # --- MAP2K2/MEK2-driven (~5% of cases) ---
  - id: mek2_driven
    name: MAP2K2-driven (MEK2 gain-of-function)
    frequency: "~5%"
    description: >
      Gain-of-function mutations in MAP2K2 (MEK2) similarly increase MEK kinase
      activity and ERK activation. MAP2K2 cases may have a lower seizure
      prevalence than BRAF or MAP2K1 cases.

    perturbations:
    - target_activity: ras_mapk_cascade:mek_kinase
      variant_class:
        id: GENO:0000015
        label: missense variant
      perturbed_state: constitutively_active
      mechanism: gain_of_function
      eco:
        id: ECO:0000315
        label: mutant phenotype evidence used in manual assertion
      evidence:
      - type: literature
        reference: PMID:16439621
        snippet: "three of five individuals without BRAF mutations had missense mutations in either MEK1 or MEK2, downstream effectors of B-Raf"

    propagated_states:
    - activity: ras_mapk_cascade:erk_kinase
      perturbed_state: increased

  # --- KRAS-driven (rare) ---
  - id: kras_driven
    name: KRAS-driven (GTPase gain-of-function)
    frequency: "<2%"
    description: >
      Rare activating KRAS mutations cause CFC syndrome with phenotypic overlap
      with Noonan syndrome. These mutations impair GTPase activity, keeping KRAS
      in the active GTP-bound state.

    perturbations:
    - target_activity: ras_mapk_cascade:ras_gtpase
      variant_class:
        id: GENO:0000015
        label: missense variant
      perturbed_state: constitutively_active
      mechanism: gain_of_function
      eco:
        id: ECO:0000315
        label: mutant phenotype evidence used in manual assertion
      evidence:
      - type: literature
        reference: PMID:38136934
        snippet: "It is an autosomal dominant syndrome, with complete penetrance, caused by heterozygous pathogenic variants in the genes BRAF, MAP2K1/MEK1, MAP2K2/MEK2, KRAS or, rarely, YWHAZ, all part of the RAS-MAPK pathway."

    propagated_states:
    - activity: ras_mapk_cascade:raf_kinase
      perturbed_state: increased

    - activity: ras_mapk_cascade:mek_kinase
      perturbed_state: increased

    - activity: ras_mapk_cascade:erk_kinase
      perturbed_state: increased

  phenotype_routes:
  - id: pulmonic_stenosis_route
    name: Pulmonic stenosis pathway
    description: >
      Sustained ERK signaling perturbs semilunar valve development, leading to
      pulmonary valve dysplasia and stenosis. Shared mechanism with Noonan syndrome.
    intermediates:
    - id: endocardial_mesenchymal_transition_dysregulation
      name: Endocardial-mesenchymal transition dysregulation
      perturbed_state: increased
      driven_by:
      - source: ras_mapk_cascade:erk_kinase
        relation:
          id: RO:0002304
          label: causally upstream of, positive effect
        eco:
          id: ECO:0000305
          label: curator inference used in manual assertion
        evidence:
        - type: literature
          reference: PMID:16439621
          snippet: "Cardio-facio-cutaneous (CFC) syndrome is a sporadic developmental disorder involving characteristic craniofacial features, cardiac defects, ectodermal abnormalities, and developmental delay."
      biological_process:
        id: GO:0060317
        label: cardiac epithelial to mesenchymal transition
      tissue:
        cell_type:
          id: CL:0000359
          label: vascular associated smooth muscle cell
        anatomy:
          id: UBERON:0002146
          label: pulmonary valve
    targets:
    - id: pulmonic_stenosis
      preferred_term: Pulmonic stenosis
      perturbed_state: increased
      term:
        id: HP:0001642
        label: Pulmonic stenosis
      driven_by:
      - source: endocardial_mesenchymal_transition_dysregulation
        relation:
          id: RO:0003303
          label: causes condition
        eco:
          id: ECO:0000305
          label: curator inference used in manual assertion
        evidence: []

  - id: ectodermal_route
    name: Ectodermal abnormality pathway
    description: >
      ERK hyperactivation disrupts keratinocyte differentiation and hair follicle
      cycling, producing the characteristic sparse/curly hair, keratosis pilaris,
      and ichthyosis that distinguish CFC from Noonan syndrome.
    intermediates:
    - id: keratinocyte_differentiation_disruption
      name: Keratinocyte differentiation disruption
      perturbed_state: increased
      driven_by:
      - source: ras_mapk_cascade:erk_kinase
        relation:
          id: RO:0002304
          label: causally upstream of, positive effect
        eco:
          id: ECO:0000305
          label: curator inference used in manual assertion
        evidence:
        - type: literature
          reference: PMID:38136934
          snippet: "Cardiofaciocutaneous (CFC) syndrome is one of the rarest RASopathies characterized by multiple congenital ectodermal, cardiac and craniofacial abnormalities with a mild to severe ocular, gastrointestinal and neurological involvement."
      biological_process:
        id: GO:0030216
        label: keratinocyte differentiation
      tissue:
        cell_type:
          id: CL:0000312
          label: keratinocyte
        anatomy:
          id: UBERON:0002097
          label: skin of body
    targets:
    - id: keratosis_pilaris
      preferred_term: Keratosis pilaris
      perturbed_state: increased
      term:
        id: HP:0032152
        label: Keratosis pilaris
      driven_by:
      - source: keratinocyte_differentiation_disruption
        relation:
          id: RO:0003303
          label: causes condition
        eco:
          id: ECO:0000305
          label: curator inference used in manual assertion
        evidence: []

  - id: craniofacial_route
    name: Craniofacial dysmorphism pathway
    description: >
      ERK signaling dysregulation during neural crest cell migration and
      craniofacial patterning produces characteristic facial features
      (high forehead, bitemporal narrowing, downslanting palpebral fissures).
    intermediates:
    - id: neural_crest_patterning_disruption
      name: Neural crest patterning disruption
      perturbed_state: increased
      driven_by:
      - source: ras_mapk_cascade:erk_kinase
        relation:
          id: RO:0002304
          label: causally upstream of, positive effect
        eco:
          id: ECO:0000305
          label: curator inference used in manual assertion
        evidence:
        - type: literature
          reference: PMID:16439621
          snippet: "Cardio-facio-cutaneous (CFC) syndrome is a sporadic developmental disorder involving characteristic craniofacial features, cardiac defects, ectodermal abnormalities, and developmental delay."
      biological_process:
        id: GO:0014033
        label: neural crest cell differentiation
      tissue:
        anatomy:
          id: UBERON:0001084
          label: skin of head
    targets:
    - id: abnormal_facial_shape
      preferred_term: Abnormal facial shape
      perturbed_state: increased
      term:
        id: HP:0001999
        label: Abnormal facial shape
      driven_by:
      - source: neural_crest_patterning_disruption
        relation:
          id: RO:0003303
          label: causes condition
        eco:
          id: ECO:0000305
          label: curator inference used in manual assertion
        evidence: []

  - id: neurodevelopmental_route
    name: Neurodevelopmental delay pathway
    description: >
      Sustained RAS-MAPK signaling perturbs cortical neuronal differentiation
      and synaptic maturation. CFC has more severe cognitive impairment than
      other RASopathies, possibly due to direct perturbation at the RAF/MEK
      level rather than upstream modulation.
    intermediates:
    - id: cortical_layer_development_abnormality
      name: Cortical layer development abnormality
      perturbed_state: increased
      driven_by:
      - source: ras_mapk_cascade:erk_kinase
        relation:
          id: RO:0002304
          label: causally upstream of, positive effect
        eco:
          id: ECO:0000305
          label: curator inference used in manual assertion
        evidence:
        - type: literature
          reference: PMID:38136934
          snippet: "Neurological involvement in CFC is more severe than in other RASopathies."
      biological_process:
        id: GO:0021987
        label: cerebral cortex development
      tissue:
        anatomy:
          id: UBERON:0001870
          label: frontal cortex
    targets:
    - id: intellectual_disability
      preferred_term: Intellectual disability
      perturbed_state: increased
      term:
        id: HP:0001249
        label: Intellectual disability
      driven_by:
      - source: cortical_layer_development_abnormality
        relation:
          id: RO:0003303
          label: causes condition
        eco:
          id: ECO:0000305
          label: curator inference used in manual assertion
        evidence: []

  - id: short_stature_route
    name: Short stature pathway
    description: >
      RAS-MAPK hyperactivation disrupts GH/IGF1 signaling and growth plate
      chondrocyte differentiation. Shared mechanism with Noonan syndrome.
    intermediates:
    - id: growth_plate_signaling_disruption
      name: Growth plate signaling disruption
      perturbed_state: increased
      driven_by:
      - source: ras_mapk_cascade:erk_kinase
        relation:
          id: RO:0002304
          label: causally upstream of, positive effect
        eco:
          id: ECO:0000305
          label: curator inference used in manual assertion
        evidence:
        - type: literature
          reference: PMID:38136934
          snippet: "Cardiofaciocutaneous (CFC) syndrome is one of the rarest RASopathies characterized by multiple congenital ectodermal, cardiac and craniofacial abnormalities with a mild to severe ocular, gastrointestinal and neurological involvement."
      biological_process:
        id: GO:0003416
        label: endochondral bone growth
      tissue:
        cell_type:
          id: CL:0000743
          label: hypertrophic chondrocyte
        anatomy:
          id: UBERON:0006658
          label: growth plate cartilage
    targets:
    - id: short_stature
      preferred_term: Short stature
      perturbed_state: increased
      term:
        id: HP:0004322
        label: Short stature
      driven_by:
      - source: growth_plate_signaling_disruption
        relation:
          id: RO:0003303
          label: causes condition
        eco:
          id: ECO:0000305
          label: curator inference used in manual assertion
        evidence: []

  - id: seizure_route
    name: Epilepsy pathway
    description: >
      ERK-mediated disruption of cortical excitatory/inhibitory balance
      contributes to epilepsy. Gene-specific frequencies suggest pathway
      position matters: BRAF 57%, MAP2K1 61%, MAP2K2 30%.
    intermediates:
    - id: cortical_excitation_inhibition_imbalance
      name: Cortical excitation/inhibition imbalance
      perturbed_state: increased
      driven_by:
      - source: ras_mapk_cascade:erk_kinase
        relation:
          id: RO:0002304
          label: causally upstream of, positive effect
        eco:
          id: ECO:0000305
          label: curator inference used in manual assertion
        evidence:
        - type: literature
          reference: PMID:38136934
          snippet: "Neurological involvement in CFC is more severe than in other RASopathies."
      biological_process:
        id: GO:0021987
        label: cerebral cortex development
      tissue:
        anatomy:
          id: UBERON:0001870
          label: frontal cortex
    targets:
    - id: seizures
      preferred_term: Seizures
      perturbed_state: increased
      term:
        id: HP:0001250
        label: Seizure
      driven_by:
      - source: cortical_excitation_inhibition_imbalance
        relation:
          id: RO:0003303
          label: causes condition
        eco:
          id: ECO:0000305
          label: curator inference used in manual assertion
        evidence: []
