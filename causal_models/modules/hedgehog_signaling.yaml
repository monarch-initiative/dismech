module:
  id: hedgehog_signaling
  name: Hedgehog Signaling Pathway
  description: >
    Core Hedgehog signal transduction from ligand reception at the primary cilium
    through SMO activation, SUFU-mediated GLI sequestration, and GLI transcription
    factor processing. Includes the GPR161/PKA negative regulatory arm with
    GSK3B/BTRC-mediated GLI3 repressor processing, DYRK2/MAPK1 intermediaries
    for SUFU release, and BBSome/IFT-B ciliary transport.

  sources:
  - type: go_cam
    id: "gomodel:693b3c0900001389"
    name: "SMO activation promotes GLI1 transcription activator activity (Human)"
  - type: go_cam
    id: "gomodel:693b3c0900001575"
    name: "SMO activation promotes GLI2 transcription activator activity via DYRK2 (Human)"
  - type: go_cam
    id: "gomodel:693b3c0900001501"
    name: "SMO activation promotes GLI3 transcription activator activity via DYRK2 (Human)"
  - type: go_cam
    id: "gomodel:693b3c0900000331"
    name: "GPR161 negative regulation via GLI2 degradation (Human)"
  - type: go_cam
    id: "gomodel:693b3c0900000434"
    name: "GPR161 negative regulation via GLI1 degradation (Human)"
  - type: go_cam
    id: "gomodel:693b3c0900000716"
    name: "GPR161 ciliary export via beta-arrestin/BBSome (Human)"
  - type: go_cam
    id: "gomodel:693b3c0900000157"
    name: "GLI3 repressor processing via PKA/GSK3B/BTRC (Human)"
  - type: literature
    reference: PMID:19032739
  - type: literature
    reference: PMID:28596197

  activities:
  # --- Ligand reception and SMO regulation ---
  - id: ptch1_inhibition
    source:
      type: literature
      reference: PMID:19032739
    gene:
      symbol: PTCH1
      hgnc_id: HGNC:9585
    molecular_function:
      id: GO:0038108
      label: Hedgehog receptor activity
    location:
      id: GO:0098804
      label: non-motile cilium membrane
    # PTCH1 is not in GO-CAMs as enabled_by — it acts as a constitutive inhibitor
    # of SMO in the absence of Hedgehog ligand. Added from literature.

  - id: smo_activity
    source:
      type: go_cam
      id: "gomodel:693b3c0900001389"
    gene:
      symbol: SMO
      hgnc_id: HGNC:11119
    molecular_function:
      id: GO:0004930
      label: G protein-coupled receptor activity
    location:
      id: GO:0098804
      label: non-motile cilium membrane
    biological_process:
      id: GO:0007224
      label: smoothened signaling pathway

  # --- SMO effector kinases ---
  - id: mapk1_kinase
    source:
      type: go_cam
      id: "gomodel:693b3c0900001389"
    gene:
      symbol: MAPK1
      hgnc_id: HGNC:6871
    molecular_function:
      id: GO:0004674
      label: protein serine/threonine kinase activity
    location:
      id: GO:0005737
      label: cytoplasm
    # MAPK1/ERK2 mediates SMO-dependent release of GLI1 from SUFU
    # (from gomodel:693b3c0900001389)

  - id: dyrk2_kinase
    source:
      type: go_cam
      id: "gomodel:693b3c0900001501"
    gene:
      symbol: DYRK2
      hgnc_id: HGNC:3093
    molecular_function:
      id: GO:0004674
      label: protein serine/threonine kinase activity
    location:
      id: GO:0005737
      label: cytoplasm
    # DYRK2 mediates SMO-dependent release of GLI3 from SUFU
    # (from gomodel:693b3c0900001501)

  # --- SUFU sequestration of GLI proteins ---
  - id: sufu_sequestering_gli1
    source:
      type: go_cam
      id: "gomodel:693b3c0900001389"
    gene:
      symbol: SUFU
      hgnc_id: HGNC:16466
    molecular_function:
      id: GO:0140311
      label: protein sequestering activity
    substrate:
      symbol: GLI1
      hgnc_id: HGNC:4317
    location:
      id: GO:0005737
      label: cytoplasm
    biological_process:
      id: GO:0045879
      label: negative regulation of smoothened signaling pathway

  - id: sufu_sequestering_gli3
    source:
      type: go_cam
      id: "gomodel:693b3c0900001501"
    gene:
      symbol: SUFU
      hgnc_id: HGNC:16466
    molecular_function:
      id: GO:0140311
      label: protein sequestering activity
    substrate:
      symbol: GLI3
      hgnc_id: HGNC:4319
    location:
      id: GO:0005737
      label: cytoplasm
    biological_process:
      id: GO:0045879
      label: negative regulation of smoothened signaling pathway

  # --- GLI transcription factors ---
  - id: gli1_activation
    source:
      type: go_cam
      id: "gomodel:693b3c0900001389"
    gene:
      symbol: GLI1
      hgnc_id: HGNC:4317
    molecular_function:
      id: GO:0001228
      label: DNA-binding transcription activator activity, RNA polymerase II-specific
    location:
      id: GO:0005634
      label: nucleus
    biological_process:
      id: GO:0007224
      label: smoothened signaling pathway

  - id: gli3a_activation
    source:
      type: go_cam
      id: "gomodel:693b3c0900001501"
    display_name: GLI3A
    gene:
      symbol: GLI3
      hgnc_id: HGNC:4319
    molecular_function:
      id: GO:0001228
      label: DNA-binding transcription activator activity, RNA polymerase II-specific
    location:
      id: GO:0005634
      label: nucleus
    biological_process:
      id: GO:0007224
      label: smoothened signaling pathway

  - id: gli3r_production
    source:
      type: go_cam
      id: "gomodel:693b3c0900000157"
    display_name: GLI3R
    gene:
      symbol: GLI3
      hgnc_id: HGNC:4319
    molecular_function:
      id: GO:0001227
      label: DNA-binding transcription repressor activity, RNA polymerase II-specific
    location:
      id: GO:0005634
      label: nucleus
    biological_process:
      id: GO:0045879
      label: negative regulation of smoothened signaling pathway
    # GLI3R is produced by proteolytic processing when Hh signaling is OFF.
    # PKA → GSK3B → BTRC phosphorylation/ubiquitination cascade targets GLI3
    # for partial proteasomal degradation to the repressor form.

  # --- GPR161/PKA negative regulatory arm ---
  - id: bbsome_transport
    source:
      type: go_cam
      id: "gomodel:693b3c0900000716"
    complex: BBSome
    molecular_function:
      id: GO:0140597
      label: protein carrier chaperone activity
    location:
      id: GO:0098804
      label: non-motile cilium membrane
    # BBSome mediates GPR161 ciliary export (from gomodel:693b3c0900000716)

  - id: iftb_transport
    source:
      type: go_cam
      id: "gomodel:693b3c0900000716"
    complex: IFT-B
    molecular_function:
      id: GO:0140597
      label: protein carrier chaperone activity
    location:
      id: GO:0098804
      label: non-motile cilium membrane
    # IFT-B complex works with BBSome for GPR161 export (from gomodel:693b3c0900000716)

  - id: gpr161_activity
    source:
      type: go_cam
      id: "gomodel:693b3c0900000331"
    gene:
      symbol: GPR161
      hgnc_id: HGNC:23846
    molecular_function:
      id: GO:0004930
      label: G protein-coupled receptor activity
    location:
      id: GO:0098804
      label: non-motile cilium membrane
    biological_process:
      id: GO:0007189
      label: adenylate cyclase-activating G protein-coupled receptor signaling pathway

  - id: pka_activity
    source:
      type: go_cam
      id: "gomodel:693b3c0900000157"
    gene:
      symbol: PRKACA
      hgnc_id: HGNC:9380
    molecular_function:
      id: GO:0004691
      label: cAMP-dependent protein kinase activity
    biological_process:
      id: GO:0045879
      label: negative regulation of smoothened signaling pathway

  # --- GLI3 repressor processing cascade ---
  - id: gsk3b_kinase
    source:
      type: go_cam
      id: "gomodel:693b3c0900000157"
    gene:
      symbol: GSK3B
      hgnc_id: HGNC:4617
    molecular_function:
      id: GO:0004674
      label: protein serine/threonine kinase activity
    location:
      id: GO:0005737
      label: cytoplasm
    # GSK3B phosphorylates GLI3 after PKA priming, creating the degron
    # recognized by BTRC (from gomodel:693b3c0900000157)

  - id: btrc_ubiquitination
    source:
      type: go_cam
      id: "gomodel:693b3c0900000157"
    gene:
      symbol: BTRC
      hgnc_id: HGNC:1144
    molecular_function:
      id: GO:1990756
      label: ubiquitin-like ligase-substrate adaptor activity
    substrate:
      symbol: GLI3
      hgnc_id: HGNC:4319
    location:
      id: GO:0005737
      label: cytoplasm
    # BTRC/beta-TrCP recognizes phospho-degron on GLI3 and targets it for
    # partial proteasomal processing to repressor form (from gomodel:693b3c0900000157)

  edges:
  # PTCH1 constitutively inhibits SMO (literature-grounded, not in GO-CAMs)
  - source: ptch1_inhibition
    target: smo_activity
    relation:
      id: RO:0002630
      label: directly negatively regulates
    eco:
      id: ECO:0000304
      label: traceable author statement used in manual assertion
    evidence:
    - type: literature
      reference: PMID:19032739
      snippet: "NBCCS is caused by mutations in the PTCH1 gene and is transmitted as an autosomal dominant trait with complete penetrance and variable expressivity."
    - type: literature
      reference: PMID:28596197
      snippet: "Heterozygous germline variants in PTCH1 and SUFU encoding components of the Sonic hedgehog pathway explain the majority of cases."

  # --- SMO positive arm: ciliary transport → GPR161 removal ---
  # SMO activates BBSome-mediated ciliary transport
  - source: smo_activity
    target: bbsome_transport
    relation:
      id: RO:0002629
      label: directly positively regulates
    eco:
      id: ECO:0007669
      label: computational evidence used in automatic assertion
    evidence:
    - type: go_cam
      id: "gomodel:693b3c0900000716"

  # BBSome recruits IFT-B for retrograde transport
  - source: bbsome_transport
    target: iftb_transport
    relation:
      id: RO:0002629
      label: directly positively regulates
    eco:
      id: ECO:0007669
      label: computational evidence used in automatic assertion
    evidence:
    - type: go_cam
      id: "gomodel:693b3c0900000716"

  # IFT-B removes GPR161 from cilium
  - source: iftb_transport
    target: gpr161_activity
    relation:
      id: RO:0002630
      label: directly negatively regulates
    eco:
      id: ECO:0007669
      label: computational evidence used in automatic assertion
    evidence:
    - type: go_cam
      id: "gomodel:693b3c0900000716"

  # --- GPR161/PKA/GLI3R negative regulatory arm ---
  # GPR161 activates PKA (via cAMP)
  - source: gpr161_activity
    target: pka_activity
    relation:
      id: RO:0002629
      label: directly positively regulates
    eco:
      id: ECO:0007669
      label: computational evidence used in automatic assertion
    evidence:
    - type: go_cam
      id: "gomodel:693b3c0900000331"

  # PKA phosphorylates GLI3 (priming for GSK3B)
  - source: pka_activity
    target: gsk3b_kinase
    relation:
      id: RO:0002413
      label: directly provides input for
    eco:
      id: ECO:0007669
      label: computational evidence used in automatic assertion
    evidence:
    - type: go_cam
      id: "gomodel:693b3c0900000157"

  # GSK3B further phosphorylates GLI3 (creating BTRC degron)
  - source: gsk3b_kinase
    target: btrc_ubiquitination
    relation:
      id: RO:0002413
      label: directly provides input for
    eco:
      id: ECO:0007669
      label: computational evidence used in automatic assertion
    evidence:
    - type: go_cam
      id: "gomodel:693b3c0900000157"

  # BTRC ubiquitinates GLI3 → partial proteasomal processing to GLI3R
  - source: btrc_ubiquitination
    target: gli3r_production
    relation:
      id: RO:0002629
      label: directly positively regulates
    eco:
      id: ECO:0007669
      label: computational evidence used in automatic assertion
    evidence:
    - type: go_cam
      id: "gomodel:693b3c0900000157"

  # PKA inhibits GLI1 (phosphorylation targets for full degradation via SCF/BTRC)
  - source: pka_activity
    target: gli1_activation
    relation:
      id: RO:0002630
      label: directly negatively regulates
    eco:
      id: ECO:0007669
      label: computational evidence used in automatic assertion
    evidence:
    - type: go_cam
      id: "gomodel:693b3c0900000434"

  # --- SMO positive arm: kinase-mediated SUFU release ---
  # SMO activates MAPK1/ERK2 (mediates GLI1 release from SUFU)
  - source: smo_activity
    target: mapk1_kinase
    relation:
      id: RO:0002629
      label: directly positively regulates
    eco:
      id: ECO:0007669
      label: computational evidence used in automatic assertion
    evidence:
    - type: go_cam
      id: "gomodel:693b3c0900001389"

  # MAPK1 inhibits SUFU sequestration of GLI1
  - source: mapk1_kinase
    target: sufu_sequestering_gli1
    relation:
      id: RO:0002630
      label: directly negatively regulates
    eco:
      id: ECO:0007669
      label: computational evidence used in automatic assertion
    evidence:
    - type: go_cam
      id: "gomodel:693b3c0900001389"

  # SMO activates DYRK2 (mediates GLI3 release from SUFU)
  - source: smo_activity
    target: dyrk2_kinase
    relation:
      id: RO:0002629
      label: directly positively regulates
    eco:
      id: ECO:0007669
      label: computational evidence used in automatic assertion
    evidence:
    - type: go_cam
      id: "gomodel:693b3c0900001501"

  # DYRK2 inhibits SUFU sequestration of GLI3
  - source: dyrk2_kinase
    target: sufu_sequestering_gli3
    relation:
      id: RO:0002630
      label: directly negatively regulates
    eco:
      id: ECO:0007669
      label: computational evidence used in automatic assertion
    evidence:
    - type: go_cam
      id: "gomodel:693b3c0900001501"

  # SUFU sequesters GLI1 (prevents nuclear translocation)
  - source: sufu_sequestering_gli1
    target: gli1_activation
    relation:
      id: RO:0002630
      label: directly negatively regulates
    eco:
      id: ECO:0007669
      label: computational evidence used in automatic assertion
    evidence:
    - type: go_cam
      id: "gomodel:693b3c0900001389"

  # SUFU sequesters GLI3 (prevents activator form)
  - source: sufu_sequestering_gli3
    target: gli3a_activation
    relation:
      id: RO:0002630
      label: directly negatively regulates
    eco:
      id: ECO:0007669
      label: computational evidence used in automatic assertion
    evidence:
    - type: go_cam
      id: "gomodel:693b3c0900001501"
