module:
  id: ras_mapk_cascade
  name: RAS-MAPK Signaling Cascade
  description: >
    Core RAS-MAPK signal transduction from receptor tyrosine kinase activation
    through SHP2/SOS1-mediated RAS-GTP loading, the RAF-MEK-ERK kinase cascade,
    and LZTR1-mediated RAS proteostasis. This module captures the signaling axis
    disrupted in RASopathies (Noonan, CFC, Costello, NF1).

  sources:
  - type: go_cam
    id: "gomodel:67c10cc400009089"
    name: "EGF signaling pathway (Human)"
  - type: go_cam
    id: "gomodel:662af8fa00002332"
    name: "CD28/GRB2 axis leading to RAS activation (Human)"
  - type: go_cam
    id: "gomodel:68b0f0d000006733"
    name: "CUL3/LZTR1/RBX1 complex ubiquitinates HRAS (Human)"
  - type: go_cam
    id: "gomodel:68d5ebd600002406"
    name: "CRLF-CLCF1 signaling pathway involving PTPN11 (Human)"
  - type: go_cam
    id: "gomodel:67c10cc400009138"
    name: "ANTXR1/PLAU interaction leading to EGF signaling (Human)"
  - type: literature
    reference: PMID:11992261
  - type: literature
    reference: PMID:17143285
  - type: literature
    reference: PMID:17603483

  activities:
  # --- Receptor layer ---
  - id: rtk_activation
    source:
      type: go_cam
      id: "gomodel:67c10cc400009089"
    gene:
      symbol: EGFR
      hgnc_id: HGNC:3236
    molecular_function:
      id: GO:0005006
      label: epidermal growth factor-activated receptor activity
    location:
      id: GO:0005886
      label: plasma membrane
    biological_process:
      id: GO:0007173
      label: epidermal growth factor receptor signaling pathway
    # Representative RTK. In different tissues, other RTKs (FGFR, PDGFR)
    # activate the same cascade via GRB2/SOS1.

  # --- Adaptor/phosphatase layer ---
  - id: shp2_phosphatase
    source:
      type: go_cam
      id: "gomodel:68d5ebd600002406"
    gene:
      symbol: PTPN11
      hgnc_id: HGNC:9644
    molecular_function:
      id: GO:0004725
      label: protein tyrosine phosphatase activity
    location:
      id: GO:0005829
      label: cytosol
    biological_process:
      id: GO:0007265
      label: Ras protein signal transduction

  - id: grb2_adaptor
    source:
      type: go_cam
      id: "gomodel:67c10cc400009089"
    gene:
      symbol: GRB2
      hgnc_id: HGNC:4566
    molecular_function:
      id: GO:0030674
      label: protein-macromolecule adaptor activity
    location:
      id: GO:0005829
      label: cytosol

  # --- GEF/GTPase layer ---
  - id: sos1_gef
    source:
      type: go_cam
      id: "gomodel:67c10cc400009089"
    gene:
      symbol: SOS1
      hgnc_id: HGNC:11187
    molecular_function:
      id: GO:0005088
      label: Ras guanyl-nucleotide exchange factor activity
    location:
      id: GO:0005886
      label: plasma membrane
    biological_process:
      id: GO:0007265
      label: Ras protein signal transduction

  - id: ras_gtpase
    source:
      type: go_cam
      id: "gomodel:67c10cc400009089"
    gene:
      symbol: HRAS
      hgnc_id: HGNC:5173
    molecular_function:
      id: GO:0003924
      label: GTPase activity
    location:
      id: GO:0005886
      label: plasma membrane
    biological_process:
      id: GO:0007265
      label: Ras protein signal transduction
    # Represents HRAS/KRAS/NRAS — the specific paralog varies by context.
    # Noonan: primarily KRAS. Costello: HRAS.

  # --- Kinase cascade ---
  - id: raf_kinase
    source:
      type: literature
      reference: PMID:17603483
    gene:
      symbol: RAF1
      hgnc_id: HGNC:9829
    molecular_function:
      id: GO:0004674
      label: protein serine/threonine kinase activity
    location:
      id: GO:0005829
      label: cytosol
    biological_process:
      id: GO:0000165
      label: MAPK cascade
    # Represents RAF1/BRAF. Not in GO-CAMs as enabled_by actor — added
    # from literature. RAF1 and BRAF are both Noonan/RASopathy genes.

  - id: mek_kinase
    source:
      type: literature
      reference: PMID:17603483
    gene:
      symbol: MAP2K1
      hgnc_id: HGNC:6840
    molecular_function:
      id: GO:0004708
      label: MAP kinase kinase activity
    location:
      id: GO:0005829
      label: cytosol
    biological_process:
      id: GO:0000165
      label: MAPK cascade

  - id: erk_kinase
    source:
      type: go_cam
      id: "gomodel:67c10cc400009089"
    gene:
      symbol: MAPK1
      hgnc_id: HGNC:6871
    molecular_function:
      id: GO:0004707
      label: MAP kinase activity
    location:
      id: GO:0005829
      label: cytosol
    biological_process:
      id: GO:0000165
      label: MAPK cascade
    # Represents ERK1 (MAPK3) / ERK2 (MAPK1). GO-CAMs show MAPK3 in
    # EGF signaling models.

  # --- Proteostasis ---
  - id: lztr1_ubiquitination
    source:
      type: go_cam
      id: "gomodel:68b0f0d000006733"
    gene:
      symbol: LZTR1
      hgnc_id: HGNC:6742
    molecular_function:
      id: GO:1990756
      label: ubiquitin-like ligase-substrate adaptor activity
    substrate:
      symbol: HRAS
      hgnc_id: HGNC:5173
    location:
      id: GO:0005829
      label: cytosol
    biological_process:
      id: GO:0016567
      label: protein ubiquitination

  edges:
  # RTK activates SHP2 (via receptor phosphorylation)
  - source: rtk_activation
    target: shp2_phosphatase
    relation:
      id: RO:0002629
      label: directly positively regulates
    eco:
      id: ECO:0007669
      label: computational evidence used in automatic assertion
    evidence:
    - type: go_cam
      id: "gomodel:68d5ebd600002406"

  # RTK recruits GRB2 adaptor
  - source: rtk_activation
    target: grb2_adaptor
    relation:
      id: RO:0002629
      label: directly positively regulates
    eco:
      id: ECO:0007669
      label: computational evidence used in automatic assertion
    evidence:
    - type: go_cam
      id: "gomodel:67c10cc400009089"

  # SHP2 promotes RAS activation (dephosphorylates inhibitory sites)
  - source: shp2_phosphatase
    target: ras_gtpase
    relation:
      id: RO:0002629
      label: directly positively regulates
    eco:
      id: ECO:0000304
      label: traceable author statement used in manual assertion
    evidence:
    - type: literature
      reference: PMID:17143285
      snippet: "SHP2 is required for RAS-ERK MAP kinase (MAPK) cascade activation, and Noonan syndrome mutants enhance ERK activation ex vivo and in mice."

  # GRB2 recruits SOS1
  - source: grb2_adaptor
    target: sos1_gef
    relation:
      id: RO:0002629
      label: directly positively regulates
    eco:
      id: ECO:0007669
      label: computational evidence used in automatic assertion
    evidence:
    - type: go_cam
      id: "gomodel:67c10cc400009089"
    - type: go_cam
      id: "gomodel:662af8fa00002332"

  # SOS1 activates RAS (GDP→GTP exchange)
  - source: sos1_gef
    target: ras_gtpase
    relation:
      id: RO:0002629
      label: directly positively regulates
    eco:
      id: ECO:0000304
      label: traceable author statement used in manual assertion
    evidence:
    - type: literature
      reference: PMID:17143285
      snippet: "Noonan syndrome-associated SOS1 mutations are hypermorphs encoding products that enhance RAS and ERK activation."

  # RAS-GTP activates RAF
  - source: ras_gtpase
    target: raf_kinase
    relation:
      id: RO:0002629
      label: directly positively regulates
    eco:
      id: ECO:0000304
      label: traceable author statement used in manual assertion
    evidence:
    - type: literature
      reference: PMID:17603483
      snippet: "...have missense mutations in RAF1, which encodes a serine-threonine kinase that activates MEK1 and MEK2."

  # RAF phosphorylates MEK
  - source: raf_kinase
    target: mek_kinase
    relation:
      id: RO:0002629
      label: directly positively regulates
    eco:
      id: ECO:0000304
      label: traceable author statement used in manual assertion
    evidence:
    - type: literature
      reference: PMID:17603483
      snippet: "...have missense mutations in RAF1, which encodes a serine-threonine kinase that activates MEK1 and MEK2."

  # MEK phosphorylates ERK
  - source: mek_kinase
    target: erk_kinase
    relation:
      id: RO:0002629
      label: directly positively regulates
    eco:
      id: ECO:0007669
      label: computational evidence used in automatic assertion
    evidence:
    - type: go_cam
      id: "gomodel:67c10cc400009089"
    # In the GO-CAM, SOS1 directly activates MAPK3 — the intermediate
    # RAF/MEK steps are implicit. We make them explicit here.

  # LZTR1 ubiquitinates and degrades RAS (negative regulation)
  - source: lztr1_ubiquitination
    target: ras_gtpase
    relation:
      id: RO:0002630
      label: directly negatively regulates
    eco:
      id: ECO:0007669
      label: computational evidence used in automatic assertion
    evidence:
    - type: go_cam
      id: "gomodel:68b0f0d000006733"
