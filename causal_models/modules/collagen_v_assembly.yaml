module:
  id: collagen_v_assembly
  name: Type V Collagen Assembly
  description: >
    Collagen V heterotrimeric assembly (two alpha-1(V) + one alpha-2(V) chains),
    fibril nucleation, and integration into the extracellular matrix. Type V collagen
    nucleates heterotypic fibrils with type I collagen, regulating fibril diameter
    and spacing in connective tissues.

  sources:
  - type: literature
    reference: PMID:20847697
  - type: literature
    reference: PMID:15095409
  - type: literature
    reference: PMID:9042913

  activities:
  # --- Collagen chain synthesis ---
  - id: col5a1_structural
    source:
      type: literature
      reference: PMID:9042913
    gene:
      symbol: COL5A1
      hgnc_id: HGNC:2209
    molecular_function:
      id: GO:0005201
      label: extracellular matrix structural constituent
    biological_process:
      id: GO:0030199
      label: collagen fibril organization
    location:
      id: GO:0005788
      label: endoplasmic reticulum lumen
    # Alpha-1 chain of type V collagen. Two copies assemble with one alpha-2
    # chain to form the [alpha1(V)]2[alpha2(V)] heterotrimer.

  - id: col5a2_structural
    source:
      type: literature
      reference: PMID:20847697
    gene:
      symbol: COL5A2
      hgnc_id: HGNC:2210
    molecular_function:
      id: GO:0005201
      label: extracellular matrix structural constituent
    biological_process:
      id: GO:0030199
      label: collagen fibril organization
    location:
      id: GO:0005788
      label: endoplasmic reticulum lumen

  # --- Heterotrimer assembly ---
  - id: colv_heterotrimer
    source:
      type: literature
      reference: PMID:9042913
    complex: Type V collagen heterotrimer
    molecular_function:
      id: GO:0005201
      label: extracellular matrix structural constituent
    biological_process:
      id: GO:0030199
      label: collagen fibril organization
    location:
      id: GO:0031012
      label: extracellular matrix
    # The assembled [alpha1(V)]2[alpha2(V)] heterotrimer seeds heterotypic
    # fibril formation with type I collagen.

  # --- Heterotypic fibril formation ---
  - id: heterotypic_fibril_formation
    source:
      type: literature
      reference: PMID:15095409
    complex: Type I/V heterotypic fibril
    molecular_function:
      id: GO:0005201
      label: extracellular matrix structural constituent
    biological_process:
      id: GO:0030199
      label: collagen fibril organization
    location:
      id: GO:0031012
      label: extracellular matrix
    # Type V collagen heterotrimers nucleate fibril formation; type I collagen
    # forms the bulk of the mature fibril. Fibril diameter and spacing are
    # regulated by the ratio of type V to type I.

  edges:
  # COL5A1 chains provide input to heterotrimer assembly
  - source: col5a1_structural
    target: colv_heterotrimer
    relation:
      id: RO:0002413
      label: directly provides input for
    eco:
      id: ECO:0000304
      label: traceable author statement used in manual assertion
    evidence:
    - type: literature
      reference: PMID:9042913
      snippet: "The mutation causes the substitution of the most 5' cysteine residue by a serine within a highly conserved sequence of the pro(alpha)1(V) C-propeptide domain and causes reduction of collagen V by preventing incorporation of the mutant pro(alpha)1(V) chains in the collagen V trimers."

  # COL5A2 chains provide input to heterotrimer assembly
  - source: col5a2_structural
    target: colv_heterotrimer
    relation:
      id: RO:0002413
      label: directly provides input for
    eco:
      id: ECO:0000304
      label: traceable author statement used in manual assertion
    evidence:
    - type: literature
      reference: PMID:20847697
      snippet: "In the majority of patients with molecularly characterized classic Ehlers-Danlos syndrome, the disease is caused by a mutation leading to a nonfunctional COL5A1 allele and resulting in haploinsufficiency of type V collagen."

  # Heterotrimer nucleates heterotypic fibril formation with type I collagen
  - source: colv_heterotrimer
    target: heterotypic_fibril_formation
    relation:
      id: RO:0002629
      label: directly positively regulates
    eco:
      id: ECO:0000304
      label: traceable author statement used in manual assertion
    evidence:
    - type: literature
      reference: PMID:15095409
      snippet: "a reduction of type V collagen, in the EDS derived cells, was associated with the assembly of significantly fewer fibrils compared to control and OI cells."
