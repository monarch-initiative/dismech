// --- Tooltip pin/unpin ---
let _tooltipPinned = false;
let _escHandler = null;
let _backdropHandler = null;

function pinTooltip(event) {
  event.stopPropagation();
  const tt = document.getElementById("tooltip");
  if (_tooltipPinned) {
    unpinTooltip();
    return;          // toggle OFF — don't re-pin
  }
  tt.classList.add("pinned");
  _tooltipPinned = true;

  // Close button
  tt.querySelector(".tt-close").onclick = (e) => { e.stopPropagation(); unpinTooltip(); };

  // Escape to close
  _escHandler = (e) => { if (e.key === "Escape") unpinTooltip(); };
  document.addEventListener("keydown", _escHandler);

  // Click elsewhere to close (delayed to avoid immediate trigger)
  setTimeout(() => {
    _backdropHandler = (e) => {
      if (!tt.contains(e.target)) unpinTooltip();
    };
    document.addEventListener("click", _backdropHandler);
  }, 50);
}

function unpinTooltip() {
  const tt = document.getElementById("tooltip");
  tt.classList.remove("pinned");
  tt.style.display = "none";
  _tooltipPinned = false;
  if (_escHandler) { document.removeEventListener("keydown", _escHandler); _escHandler = null; }
  if (_backdropHandler) { document.removeEventListener("click", _backdropHandler); _backdropHandler = null; }
}

function guardMouseout() {
  if (_tooltipPinned) return;
  document.getElementById("tooltip").style.display = "none";
}

// --- Single-pass dagre layout ---
function layoutGraph(data) {
  const g = new dagre.graphlib.Graph();
  g.setGraph({ rankdir: "LR", ranksep: 80, nodesep: 40, marginx: 40, marginy: 40 });
  g.setDefaultEdgeLabel(() => ({}));

  // ALL activity nodes (module + disease-local)
  data.nodes.forEach(n => {
    const w = Math.max(140, n.short_label.length * 8 + 30);
    g.setNode(n.id, { label: n.short_label, width: w, height: 60 });
  });

  // ALL edges
  data.edges.forEach(e => {
    g.setEdge(e.source, e.target);
  });

  // Intermediate nodes
  (data.intermediate_nodes || []).forEach(n => {
    const w = Math.max(130, n.short_label.length * 7 + 24);
    g.setNode(n.id, { label: n.short_label, width: w, height: 50 });
  });

  // Intermediate edges
  (data.intermediate_edges || []).forEach(e => {
    g.setEdge(e.source, e.target);
  });

  // Phenotype nodes
  data.phenotype_routes.forEach(pr => {
    const pid = "pheno:" + pr.id;
    g.setNode(pid, { label: pr.phenotype_label, width: 140, height: 54 });
  });

  // Disease node
  if (data.disease_node) {
    g.setNode(data.disease_node.id, { label: data.disease_node.name, width: 180, height: 54 });
  }

  // Phenotype-disease edges
  (data.phenotype_disease_edges || []).forEach(e => {
    g.setEdge(e.source, e.target);
  });

  dagre.layout(g);
  return g;
}

function _defineArrow(defs, id, color) {

    .attr("id", id).attr("viewBox", "0 0 10 10")

// --- Edge drawing with hypothesis colors ---
function offsetPath(points, offset) {
  if (offset === 0 || points.length < 2) return points;
  return points.map((p, i) => {
    let dx, dy;
    if (i === 0) {
      dx = points[1].x - p.x;
      dy = points[1].y - p.y;
    } else if (i === points.length - 1) {
      dx = p.x - points[i - 1].x;
      dy = p.y - points[i - 1].y;
    } else {
      dx = points[i + 1].x - points[i - 1].x;
      dy = points[i + 1].y - points[i - 1].y;
    }
    const len = Math.sqrt(dx * dx + dy * dy) || 1;
    const px = -dy / len;
    const py = dx / len;
    return { x: p.x + px * offset, y: p.y + py * offset };
  });
}

function clipToRect(cx, cy, hw, hh, px, py) {
  // Find intersection of ray from (cx,cy) toward (px,py) with rect centered at (cx,cy)
  const dx = px - cx, dy = py - cy;
  if (dx === 0 && dy === 0) return { x: cx, y: cy };
  // Scale factor to reach rect edge
  const sx = hw / (Math.abs(dx) || 1);
  const sy = hh / (Math.abs(dy) || 1);
  const s = Math.min(sx, sy);
  return { x: cx + dx * s, y: cy + dy * s };
}

function clipEndpoints(points, g, sourceId, targetId) {
  if (!points || points.length < 2) return points;
  const pts = points.slice();
  const srcPos = g.node(sourceId);
  const tgtPos = g.node(targetId);
  if (srcPos) {
    const hw = (srcPos.width || 140) / 2;
    const hh = (srcPos.height || 60) / 2;
    // Direction: from center toward next point
    const next = pts[1];
    pts[0] = clipToRect(srcPos.x, srcPos.y, hw, hh, next.x, next.y);
  }
  if (tgtPos) {
    const hw = (tgtPos.width || 140) / 2;
    const hh = (tgtPos.height || 60) / 2;
    // Direction: from center toward previous point
    const prev = pts[pts.length - 2];
    const clipped = clipToRect(tgtPos.x, tgtPos.y, hw, hh, prev.x, prev.y);
    // Push outward by marker size so arrowhead is visible outside the node
    const edx = clipped.x - tgtPos.x, edy = clipped.y - tgtPos.y;
    const elen = Math.sqrt(edx * edx + edy * edy) || 1;
    pts[pts.length - 1] = { x: clipped.x + (edx / elen) * 4, y: clipped.y + (edy / elen) * 4 };
  }
  return pts;
}

function drawSingleEdge(edgeGroup, points, edgeData, nodeLabels, dashStyle, g, sourceId, targetId) {
  if (g && sourceId && targetId) {
    points = clipEndpoints(points, g, sourceId, targetId);
  }
  const hypothesisIds = edgeData.hypothesis_ids || [];
  const hgColors = DATA.hypothesis_colors || {};
  // All edges use regular arrowheads (no T-bar distinction for negative regulation)

  let strokeDash = "";
  if (dashStyle === "dashed") strokeDash = "6,3";
  else if (dashStyle === "dotted") strokeDash = "2,3";

  if (hypothesisIds.length === 0) {
    const line = d3.line().x(d => d.x).y(d => d.y).curve(d3.curveBasis);
    const eg = edgeGroup.append("g").attr("class", "edge");
    const pathD = line(points);
    eg.append("path")
      .attr("d", pathD)
      .attr("stroke", "#ccc")
      .attr("stroke-width", 1)
      .attr("fill", "none")
      .attr("stroke-dasharray", strokeDash)
      .attr("marker-end", "url(#arrow-gray)");
    eg.append("path").attr("class", "edge-hover").attr("d", pathD);
    attachEdgeTooltip(eg, edgeData, nodeLabels);
    // Label at midpoint
    if (edgeData.relation) {
      const mid = points[Math.floor(points.length / 2)];
      const shortRel = edgeData.relation.replace("directly ", "").replace("regulates", "reg.");
      eg.append("text").attr("class", "edge-label")
        .attr("x", mid.x).attr("y", mid.y - 6)
        .attr("text-anchor", "middle").text(shortRel);
    }
    return;
  }

  const numLines = hypothesisIds.length;
  const OFFSET = 8;
  const totalSpread = (numLines - 1) * OFFSET;

  hypothesisIds.forEach((hgId, idx) => {
    const offset = -totalSpread / 2 + idx * OFFSET;
    const color = hgColors[hgId] || "#999";
    const offsetPts = offsetPath(points, offset);
    const line = d3.line().x(d => d.x).y(d => d.y).curve(d3.curveBasis);
    const eg = edgeGroup.append("g").attr("class", "edge");
    const pathD = line(offsetPts);
    eg.append("path")
      .attr("d", pathD)
      .attr("stroke", color)
      .attr("stroke-width", 1.5)
      .attr("fill", "none")
      .attr("stroke-dasharray", strokeDash)
      .attr("marker-end", "url(#arrow-" + hgId + ")");
    if (idx === 0) {
      eg.append("path").attr("class", "edge-hover").attr("d", pathD);
      attachEdgeTooltip(eg, edgeData, nodeLabels);
      // Label at midpoint
      if (edgeData.relation) {
        const mid = points[Math.floor(points.length / 2)];
        const shortRel = edgeData.relation.replace("directly ", "").replace("regulates", "reg.");
        eg.append("text").attr("class", "edge-label")
          .attr("x", mid.x).attr("y", mid.y - 6)
          .attr("text-anchor", "middle").text(shortRel);
      }
    }
  });
}

// --- Module background shading ---
function drawModuleBackgrounds(g, bgGroup) {
  const moduleNodes = DATA.module_nodes || {};
  const moduleNameMap = {};
  (DATA.modules || []).forEach(m => { moduleNameMap[m.id] = m.name; });

  Object.entries(moduleNodes).forEach(([modId, nodeIds]) => {
    let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
    nodeIds.forEach(nid => {
      const pos = g.node(nid);
      if (!pos) return;
      const w = pos.width || 140;
      const h = pos.height || 60;
      minX = Math.min(minX, pos.x - w/2);
      minY = Math.min(minY, pos.y - h/2);
      maxX = Math.max(maxX, pos.x + w/2);
      maxY = Math.max(maxY, pos.y + h/2);
    });
    if (minX === Infinity) return;
    const pad = 24;
    const labelHeight = 18;
    bgGroup.append("rect")
      .attr("x", minX - pad).attr("y", minY - pad - labelHeight)
      .attr("width", maxX - minX + pad * 2)
      .attr("height", maxY - minY + pad * 2 + labelHeight)
      .attr("rx", 12)
      .attr("fill", "#eef1f8")
      .attr("stroke", "#c8cfe0")
      .attr("stroke-width", 1);
    const modName = moduleNameMap[modId] || modId;
    bgGroup.append("text")
      .attr("x", minX - pad + 12).attr("y", minY - pad - labelHeight + 14)
      .attr("font-size", "10px").attr("font-weight", "600")
      .attr("fill", "#7080a0")
      .text(modName);
  });
}

// --- Draw ALL activity nodes ---
function drawAllNodes(g, nodeGroup, nodeLabels, nodeMap) {
  const hgColors = DATA.hypothesis_colors || {};

  DATA.nodes.forEach(n => {
    const pos = g.node(n.id);
    if (!pos) return;
    const w = Math.max(140, n.short_label.length * 8 + 30);
    const hw = w / 2;

    // Check if perturbation target
    let isPerturbation = false;
    let pertHgId = null;
    let pertFreq = "";
    DATA.hypothesis_groups.forEach(hg => {
      if (hg.states[n.id] && hg.states[n.id].is_primary) {
        isPerturbation = true;
        pertHgId = hg.id;
        pertFreq = hg.frequency;
      }
    });

    const kindCls = n.node_kind ? " kind-" + n.node_kind : "";
    const baseClass = n.type === "local_activity" ? "node local-activity" + kindCls + " state-normal" : "node" + kindCls + " state-normal";
    const ng = nodeGroup.append("g")
      .attr("class", baseClass)
      .attr("transform", `translate(${pos.x - hw},${pos.y - 30})`)
      .attr("data-id", n.id);

    ng.append("rect").attr("width", w).attr("height", 60);

    if (isPerturbation && pertHgId) {
      ng.select("rect")
        .attr("stroke", hgColors[pertHgId] || "#999")
        .attr("stroke-width", 2.5);
      if (pertFreq) {
        ng.append("text")
          .attr("x", hw).attr("y", 74)
          .attr("text-anchor", "middle").attr("font-size", "9px")
          .attr("fill", "#495057").attr("font-weight", "600")
          .text(pertFreq);
      }
    }

    ng.append("text").attr("class", "gene-label")
      .attr("x", hw).attr("y", 22).attr("text-anchor", "middle").text(n.short_label);
    ng.append("text").attr("class", "func-label")
      .attr("x", hw).attr("y", 36).attr("text-anchor", "middle")
      .text(truncate(n.function_short || n.function, Math.floor(w / 6)));
    ng.append("text").attr("class", "state-badge")
      .attr("x", hw).attr("y", 52).attr("text-anchor", "middle").text("");
    nodeMap[n.id] = ng;

    attachActivityTooltip(ng, n, nodeLabels);
  });
}

// --- Draw ALL edges ---
function drawAllEdges(g, edgeGroup, nodeLabels) {
  // Module + cross-boundary edges
  DATA.edges.forEach(e => {
    const pts = g.edge(e.source, e.target);
    if (!pts || !pts.points) return;
    drawSingleEdge(edgeGroup, pts.points, e, nodeLabels, "solid", g, e.source, e.target);
  });

  // Intermediate edges
  (DATA.intermediate_edges || []).forEach(e => {
    const pts = g.edge(e.source, e.target);
    if (!pts || !pts.points) return;
    const dashStyle = e.edge_type === "intermediate_to_phenotype" ? "dashed" : "solid";
    drawSingleEdge(edgeGroup, pts.points, e, nodeLabels, dashStyle, g, e.source, e.target);
  });
}

// --- Draw intermediate nodes ---
function drawIntermediateNodes(og, nodeGroup, nodeLabels, nodeMap) {
  (DATA.intermediate_nodes || []).forEach(n => {
    const pos = og.node(n.id);
    if (!pos) return;
    const w = Math.max(130, n.short_label.length * 7 + 24);
    const hw = w / 2;
    const ng = nodeGroup.append("g")
      .attr("class", "process-node" + (n.state ? " state-" + n.state : ""))
      .attr("transform", `translate(${pos.x - hw},${pos.y - 25})`);
    ng.append("rect").attr("width", w).attr("height", 50);
    ng.append("text").attr("class", "gene-label")
      .attr("x", hw).attr("y", 18).attr("text-anchor", "middle")
      .text(n.short_label);
    ng.append("text").attr("class", "func-label")
      .attr("x", hw).attr("y", 30).attr("text-anchor", "middle")
      .text(truncate(n.process, Math.floor(w / 6)));
    const stateLabel = n.state ? n.state.replace(/_/g, " ") : "";
    ng.append("text").attr("class", "state-badge")
      .attr("x", hw).attr("y", 43).attr("text-anchor", "middle")
      .text(stateLabel);
    // Tooltip
    ng.on("mouseover", (event) => {
      if (_tooltipPinned) return;
      const tt = d3.select("#tooltip");
      tt.style("display", "block")
        .style("left", (event.pageX + 12) + "px")
        .style("top", (event.pageY - 10) + "px");
      let html = `<div class="tt-title">${n.name}</div>`;
      if (n.gene) html += `<div class="tt-subtitle">${n.gene} (${n.hgnc_id})</div>`;
      if (n.process) html += `<div class="tt-detail"><b>Process:</b> ${n.process}</div>`;
      if (n.process_id) html += `<div class="tt-detail" style="font-size:10px;color:#6c757d">${n.process_id}</div>`;
      if (n.state) {
        const stClass = "tt-state tt-state-" + n.state;
        html += `<div class="tt-detail"><b>State:</b> <span class="${stClass}">${n.state.replace(/_/g, " ")}</span></div>`;
      }
      if (n.hypothesis_ids && n.hypothesis_ids.length) {
        const hgColors = DATA.hypothesis_colors || {};
        html += '<div class="tt-section"><b>Reached by:</b>';
        n.hypothesis_ids.forEach(hgId => {
          const color = hgColors[hgId] || "#999";
          const hg = DATA.hypothesis_groups.find(h => h.id === hgId);
          const name = hg ? hg.name : hgId;
          const freq = hg ? hg.frequency : "";
          html += '<div class="tt-detail">';
          html += '<span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:' + color + ';margin-right:4px"></span>';
          html += name;
          if (freq) html += ' (' + freq + ')';
          html += '</div>';
        });
        html += '</div>';
      }
      if (n.driven_by_details && n.driven_by_details.length) {
        html += `<div class="tt-section"><b>Driven by:</b>`;
        n.driven_by_details.forEach((db, idx) => {
          const srcLabel = nodeLabels[db.source] || db.source;
          html += `<div class="tt-detail" style="margin-left:8px">• ${srcLabel}`;
          if (db.relation) html += ` <span style="font-size:10px;color:#6c757d">(${db.relation})</span>`;
          html += `</div>`;
          if (db.eco_label) html += `<div class="tt-detail" style="margin-left:16px"><span class="tt-eco">${db.eco_label}</span></div>`;
          if (db.evidence && db.evidence.length) {
            db.evidence.forEach(ev => {
              html += `<div class="tt-ref" style="margin-left:16px">📄 ${ev.reference}</div>`;
              if (ev.snippet) html += `<div class="tt-evidence" style="margin-left:16px">"${ev.snippet}"</div>`;
            });
          }
        });
        html += `</div>`;
      } else if (n.driven_by && n.driven_by.length === 0) {
        html += `<div class="tt-detail"><b>Driven by:</b> convergence of upstream intermediates</div>`;
      }
      html += `<div class="tt-detail"><b>Route:</b> ${n.route_name || n.route_id.replace(/_/g, " ")}</div>`;
      if (n.tissue) {
        html += `<div class="tt-detail"><b>Tissue:</b> ${n.tissue}</div>`;
        const td = n.tissue_detail || {};
        let tissueIds = [];
        if (td.cell_type_id) tissueIds.push(td.cell_type_id);
        if (td.anatomy_id) tissueIds.push(td.anatomy_id);
        if (tissueIds.length) html += `<div class="tt-detail" style="font-size:10px;color:#6c757d">${tissueIds.join(" / ")}</div>`;
      }
      html += `<div style="margin-top:6px;font-size:10px;color:#adb5bd">${n.id}</div>`;
      if (n.raw_yaml) html += `<details class="tt-raw"><summary>Raw data (YAML)</summary><pre>${n.raw_yaml}</pre></details>`;
      tt.html(html);
    }).on("mouseout", () => guardMouseout()).on("click", (event) => pinTooltip(event));
  });
}

// --- Draw phenotype nodes ---
function drawPhenotypeNodes(og, nodeGroup, nodeLabels) {
  DATA.phenotype_routes.forEach(pr => {
    const pid = "pheno:" + pr.id;
    const pos = og.node(pid);
    if (!pos) return;
    let phenoCls = "phenotype-node";
    if (pr.phenotype_state) phenoCls += " state-" + pr.phenotype_state;
    if (pr.unrouted) phenoCls += " unrouted";
    const ng = nodeGroup.append("g")
      .attr("class", phenoCls)
      .attr("transform", `translate(${pos.x - 70},${pos.y - 27})`);
    ng.append("rect").attr("width", 140).attr("height", 54);
    ng.append("text")
      .attr("x", 70).attr("y", 16).attr("text-anchor", "middle")
      .text(truncate(pr.phenotype_label, 20));
    ng.append("text")
      .attr("x", 70).attr("y", 30).attr("text-anchor", "middle")
      .style("font-size", "9px").style("fill", "#a17c10")
      .text(pr.phenotype_id);
    const phenoStateLabel = pr.phenotype_state ? pr.phenotype_state.replace(/_/g, " ") : "";
    ng.append("text").attr("class", "state-badge")
      .attr("x", 70).attr("y", 44).attr("text-anchor", "middle")
      .text(phenoStateLabel);

    ng.on("mouseover", (event) => {
      if (_tooltipPinned) return;
      const tt = d3.select("#tooltip");
      tt.style("display", "block")
        .style("left", (event.pageX + 12) + "px")
        .style("top", (event.pageY - 10) + "px");
      let html = `<div class="tt-title">${pr.phenotype_label}</div>`;
      html += `<div class="tt-subtitle">${pr.phenotype_id}</div>`;
      if (pr.phenotype_state) {
        const stClass = "tt-state tt-state-" + pr.phenotype_state;
        html += `<div class="tt-detail"><b>State:</b> <span class="${stClass}">${pr.phenotype_state.replace(/_/g, " ")}</span></div>`;
      }
      const phenoEdge = (DATA.phenotype_disease_edges || []).find(e => e.source === pid);
      if (phenoEdge && phenoEdge.hypothesis_ids && phenoEdge.hypothesis_ids.length) {
        const hgColors = DATA.hypothesis_colors || {};
        html += '<div class="tt-section"><b>Reached by:</b>';
        phenoEdge.hypothesis_ids.forEach(hgId => {
          const color = hgColors[hgId] || "#999";
          const hg = DATA.hypothesis_groups.find(h => h.id === hgId);
          const name = hg ? hg.name : hgId;
          const freq = hg ? hg.frequency : "";
          html += '<div class="tt-detail">';
          html += '<span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:' + color + ';margin-right:4px"></span>';
          html += name;
          if (freq) html += ' (' + freq + ')';
          html += '</div>';
        });
        html += '</div>';
      }
      if (pr.phenotype_relation) {
        html += `<div class="tt-detail"><b>Relation:</b> ${pr.phenotype_relation}</div>`;
        if (pr.phenotype_relation_id) html += `<div class="tt-detail" style="font-size:10px;color:#6c757d">${pr.phenotype_relation_id}</div>`;
      }
      html += `<div class="tt-detail"><b>Route:</b> ${pr.name}</div>`;
      if (pr.tissue) {
        html += `<div class="tt-detail"><b>Tissue:</b> ${pr.tissue}</div>`;
        const td = pr.tissue_detail || {};
        let tissueIds = [];
        if (td.cell_type_id) tissueIds.push(td.cell_type_id);
        if (td.anatomy_id) tissueIds.push(td.anatomy_id);
        if (tissueIds.length) html += `<div class="tt-detail" style="font-size:10px;color:#6c757d">${tissueIds.join(" / ")}</div>`;
      }
      html += `<div class="tt-detail" style="margin-top:6px">${pr.description}</div>`;
      if (pr.intermediates && pr.intermediates.length) {
        html += `<div class="tt-section"><b>Intermediates:</b>`;
        pr.intermediates.forEach(inter => {
          html += `<div class="tt-detail">• ${inter.name}`;
          if (inter.gene) html += ` (${inter.gene})`;
          if (inter.process) html += ` — ${inter.process}`;
          html += `</div>`;
        });
        html += `</div>`;
      }
      if (pr.evidence && pr.evidence.length) {
        html += `<div class="tt-section"><b>Evidence:</b>`;
        pr.evidence.forEach(ev => {
          html += `<div class="tt-ref">📄 ${ev.reference}</div>`;
          if (ev.snippet) html += `<div class="tt-evidence">"${ev.snippet}"</div>`;
        });
        html += `</div>`;
      }
      if (pr.raw_yaml) html += `<details class="tt-raw"><summary>Raw data (YAML)</summary><pre>${pr.raw_yaml}</pre></details>`;
      tt.html(html);
    }).on("mouseout", () => guardMouseout()).on("click", (event) => pinTooltip(event));
  });
}

// --- Draw phenotype → disease edges ---
function drawPhenotypeDiseaseEdges(og, edgeGroup, nodeLabels) {
  (DATA.phenotype_disease_edges || []).forEach(e => {
    const pts = og.edge(e.source, e.target);
    if (!pts || !pts.points) return;
    drawSingleEdge(edgeGroup, pts.points, e, nodeLabels, "dotted", og, e.source, e.target);
  });
}

// --- Draw disease node ---
function drawDiseaseNode(og, nodeGroup) {
  if (DATA.disease_node) {
    const dpos = og.node(DATA.disease_node.id);
    if (dpos) {
      const dw = 180, dh = 54;
      const dng = nodeGroup.append("g")
        .attr("class", "disease-node")
        .attr("transform", `translate(${dpos.x - dw/2},${dpos.y - dh/2})`);
      dng.append("rect").attr("width", dw).attr("height", dh);
      dng.append("text")
        .attr("x", dw/2).attr("y", 22).attr("text-anchor", "middle")
        .text(DATA.disease_node.name);
      dng.append("text").attr("class", "disease-term")
        .attr("x", dw/2).attr("y", 38).attr("text-anchor", "middle")
        .text(DATA.disease_node.term_id);
      dng.on("mouseover", (event) => {
        if (_tooltipPinned) return;
        const tt = d3.select("#tooltip");
        tt.style("display", "block")
          .style("left", (event.pageX + 12) + "px")
          .style("top", (event.pageY - 10) + "px");
        const phenoCount = DATA.phenotype_routes.length;
        let html = `<div class="tt-title">${DATA.disease_node.name}</div>`;
        html += `<div class="tt-subtitle">${DATA.disease_node.term_id} — ${DATA.disease_node.term_label}</div>`;
        html += `<div class="tt-detail"><b>Associated phenotypes:</b> ${phenoCount}</div>`;
        tt.html(html);
      }).on("mouseout", () => guardMouseout()).on("click", (event) => pinTooltip(event));
    }
  }
}

function truncate(s, max) {
  return s && s.length > max ? s.slice(0, max - 1) + "…" : (s || "");
}

// --- Render ---
function render() {
  const svg = d3.select("svg");
  svg.selectAll("*").remove();

  const g = layoutGraph(DATA);
  const graphInfo = g.graph();

  // Zoom/pan
  const zoom = d3.zoom().scaleExtent([0.3, 3]).on("zoom", (e) => {
    container.attr("transform", e.transform);
  });
  svg.call(zoom);
  const container = svg.append("g");

  // Fit to view
  const svgEl = svg.node();
  const W = svgEl.clientWidth || 900;
  const H = svgEl.clientHeight || 600;
  const gW = graphInfo.width || 800;
  const gH = graphInfo.height || 400;
  const scale = Math.min(W / (gW + 80), H / (gH + 80), 1.2);
  const tx = (W - gW * scale) / 2;
  const ty = (H - gH * scale) / 2;
  svg.call(zoom.transform, d3.zoomIdentity.translate(tx, ty).scale(scale));

  // Arrow markers
  const defs = svg.append("defs");
  defineArrowMarkers(defs);

  // Build label lookups
  const nodeLabels = {};
  DATA.nodes.forEach(n => { nodeLabels[n.id] = n.short_label; });
  (DATA.intermediate_nodes || []).forEach(n => { nodeLabels[n.id] = n.short_label; });

  // Draw layers in order: backgrounds, edges, nodes
  const bgGroup = container.append("g").attr("class", "backgrounds");
  const edgeGroup = container.append("g").attr("class", "edges");
  const nodeGroup = container.append("g").attr("class", "nodes");
  const nodeMap = {};

  // Module background shading
  drawModuleBackgrounds(g, bgGroup);

  // Draw ALL activity nodes
  drawAllNodes(g, nodeGroup, nodeLabels, nodeMap);

  // Draw all edges (module + cross-boundary)
  drawAllEdges(g, edgeGroup, nodeLabels);

  // Draw intermediate nodes
  drawIntermediateNodes(g, nodeGroup, nodeLabels, nodeMap);

  // Draw phenotype nodes
  drawPhenotypeNodes(g, nodeGroup, nodeLabels);

  // Draw disease node
  drawDiseaseNode(g, nodeGroup);

  // Draw phenotype->disease edges
  drawPhenotypeDiseaseEdges(g, edgeGroup, nodeLabels);

  window._nodeMap = nodeMap;
  applyAllHypotheses();
}

// --- Apply all hypotheses simultaneously ---
function applyAllHypotheses() {
  const nodeMap = window._nodeMap;
  if (!nodeMap) return;
  const hgColors = DATA.hypothesis_colors || {};

  // Reset all module nodes to normal
  DATA.nodes.forEach(n => {
    const ng = nodeMap[n.id];
    if (!ng) return;
    const kindCls = n.node_kind ? " kind-" + n.node_kind : "";
    const base = n.type === "local_activity" ? "node local-activity" : "node";
    ng.attr("class", base + kindCls + " state-normal");
    ng.select(".state-badge").text("");
  });

  // Collect all states across all hypotheses
  const nodeStates = {};
  DATA.hypothesis_groups.forEach(hg => {
    Object.entries(hg.states).forEach(([nodeId, info]) => {
      if (!nodeStates[nodeId]) nodeStates[nodeId] = {};
      nodeStates[nodeId][hg.id] = info;
    });
  });

  Object.entries(nodeStates).forEach(([nodeId, hgStates]) => {
    const ng = nodeMap[nodeId];
    if (!ng) return;
    const nodeType = DATA.nodes.find(n => n.id === nodeId);
    const kindCls = nodeType && nodeType.node_kind ? " kind-" + nodeType.node_kind : "";
    const base = nodeType && nodeType.type === "local_activity" ? "node local-activity" : "node";

    const states = Object.values(hgStates);
    const uniqueStates = [...new Set(states.map(s => s.state))];

    if (uniqueStates.length === 1) {
      const state = uniqueStates[0];
      const isPrimary = states.some(s => s.is_primary);
      let cls = base + kindCls + " state-" + state;
      if (isPrimary) cls += " state-primary";
      ng.attr("class", cls);
      const label = state.replace(/_/g, " ");
      ng.select(".state-badge").text(isPrimary ? "● " + label : label);
    } else {
      ng.attr("class", base + kindCls + " state-split");
      const labels = Object.entries(hgStates).map(([hgId, info]) => {
        return info.state.replace(/_/g, " ");
      }).join(" / ");
      ng.select(".state-badge").text(labels);
    }
  });
}

// --- Init ---
document.addEventListener("DOMContentLoaded", () => {
  const hgColors = DATA.hypothesis_colors || {};
  const legendEl = document.getElementById("hypothesis-legend");
  DATA.hypothesis_groups.forEach(hg => {
    const color = hgColors[hg.id] || "#999";
    const item = document.createElement("div");
    item.className = "hg-legend-item";
    item.innerHTML = '<div class="hg-legend-swatch" style="background:' + color + '"></div>'
      + '<span>' + hg.name + '</span>'
      + (hg.frequency ? '<span class="hg-legend-freq">(' + hg.frequency + ')</span>' : '');
    legendEl.appendChild(item);
  });

  render();
});
