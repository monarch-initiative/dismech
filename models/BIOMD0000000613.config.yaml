model_id: BIOMD0000000613
sbml_file: BIOMD0000000613.xml
extension_file: BIOMD0000000613.ext.ant

gene_effects:
  CASR:
    parameter: ScaEffGam
    LoF: 0.4
    GoF: 2.0
    description: "Ca-sensing receptor sensitivity (ScaEff = (2.35/CaConc)^ScaEffGam)"
  CYP27B1:
    species: A
    LoF: 0.3
    description: "1-alpha-hydroxylase initial activity"
  CYP24A1:
    parameter: T69
    LoF: 0.2
    description: "Calcitriol degradation rate (B -> ; T69 * B)"
  SLC20A1:
    parameter: kin_VascCa
    in_extension: true
    GoF: 3.0
    description: "Vascular phosphate uptake rate (Pit-1)"
  KL:
    parameter: kin_Klotho
    in_extension: true
    LoF: 0.2
    description: "Klotho production rate"
  SOST:
    parameter: kin_SOST
    in_extension: true
    LoF: 0.1
    description: "Sclerostin production rate"
  GPD1:
    parameter: kin_FGF23
    in_extension: true
    LoF: 0.3
    description: "FGF23 production rate (G-3-P pathway)"

variable_mappings:
  PTH:
    sbml_species: PTH
    label: "PTH (pg/mL)"
  Calcitriol:
    sbml_species: B
    label: "Calcitriol (relative)"
  PO4:
    sbml_species: ECCPhos
    label: "Phosphate (mg/dL)"
  Ca:
    sbml_species: P
    label: "Plasma Ca (mmol/L)"
  Bone:
    sbml_species: Qbone
    label: "Bone Ca store"
  OC:
    sbml_species: OC
    label: "Osteoclasts"
  OB:
    sbml_species: OB
    label: "Osteoblasts"
  FGF23:
    extension_species: FGF23
    label: "FGF23 (pg/mL)"
  Klotho:
    extension_species: sKlotho
    label: "sKlotho (pg/mL)"
  VascCa:
    extension_species: VascCa
    label: "Vasc. Calcification"
  SOST:
    extension_species: SOST
    label: "Sclerostin (pmol/L)"
  CaPO4_product:
    extension_assignment: CaPO4_product
    label: "Ca x PO4 product"

phenotype_thresholds:
  - hp_id: "HP:0004349"
    hp_label: "Reduced bone mineral density"
    model_variable: Bone
    direction: below
    threshold: 0.85
    severity_scale:
      - [0.85, "mild"]
      - [0.70, "moderate"]
      - [0.50, "severe"]
  - hp_id: "HP:0002756"
    hp_label: "Pathologic fracture"
    model_variable: Bone
    direction: below
    threshold: 0.70
    severity_scale:
      - [0.70, "moderate risk"]
      - [0.50, "high risk"]
  - hp_id: "HP:0003207"
    hp_label: "Arterial calcification"
    model_variable: VascCa
    direction: above
    threshold: 50
    severity_scale:
      - [50, "mild"]
      - [150, "moderate"]
      - [300, "severe"]
  - hp_id: "HP:0001712"
    hp_label: "Left ventricular hypertrophy"
    model_variable: VascCa
    direction: above
    threshold: 100
    severity_scale:
      - [100, "mild"]
      - [200, "moderate"]
  - hp_id: "HP:0025520"
    hp_label: "Calcinosis cutis"
    model_variable: VascCa
    direction: above
    threshold: 250
    severity_scale:
      - [250, "calciphylaxis risk"]
  - hp_id: "HP:0000989"
    hp_label: "Pruritus"
    model_variable: CaPO4_product
    direction: above
    threshold: 600
    severity_scale:
      - [600, "mild"]
      - [800, "severe"]
  - hp_id: "HP:0002653"
    hp_label: "Bone pain"
    model_variable: PTH
    direction: above
    threshold: 70
    severity_scale:
      - [70, "mild"]
      - [100, "moderate"]
      - [150, "severe"]
  - hp_id: "HP:0003701"
    hp_label: "Proximal muscle weakness"
    model_variable: Calcitriol
    direction: below
    threshold: 0.50
    severity_scale:
      - [0.50, "mild"]
      - [0.25, "moderate"]
  - hp_id: "HP:0004322"
    hp_label: "Short stature"
    model_variable: Bone
    direction: below
    threshold: 0.75
    severity_scale:
      - [0.75, "growth impairment"]

