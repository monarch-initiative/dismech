coupling:
  dt_hours: 168
  duration_hours: 26280
  base_to_extension:
    ECCPhos: ECCPhos_ext
    PTH: PTH_ext
    B: Calcitriol_ext
    P: Ca_ext
    OC: OC_ext
  gfr_parameter: GFR
  gfr_ext_parameter: GFR_ext
  feedback:
    fgf23_suppression:
      source: FGF23
      target_parameter: T69
      base_value: 0.1
      formula: "base_value / max(1 / (1 + (FGF23/50)^1.5), 0.01)"
