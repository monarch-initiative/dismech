model_id: BIOMD0000000613
sbml_file: BIOMD0000000613.xml
extension_file: BIOMD0000000613.ext.ant

gene_effects:
  CASR:
    parameter: T61
    LoF: 3.0
    GoF: 0.3
    description: "CaSR controls PTH suppression floor (T61 = min PTH secretion rate). LoF raises floor → PTH stays high. GoF (calcimimetic) lowers floor → PTH suppressed."
  CYP27B1:
    species: A
    LoF: 0.3
    description: "1-alpha-hydroxylase initial activity"
  CYP24A1:
    parameter: T69
    LoF: 0.2
    description: "Calcitriol degradation rate (B -> ; T69 * B)"
  SLC20A1:
    parameter: kin_VascCa
    in_extension: true
    GoF: 3.0
    description: "Vascular phosphate uptake rate (Pit-1)"
  KL:
    parameter: kin_Klotho
    in_extension: true
    LoF: 0.2
    description: "Klotho production rate"
  SOST:
    parameter: kin_SOST
    in_extension: true
    LoF: 0.1
    description: "Sclerostin production rate"
  GPD1:
    parameter: kin_FGF23
    in_extension: true
    LoF: 0.3
    description: "FGF23 production rate (G-3-P pathway)"

scenarios:
  CASR_LoF:
    label: "CASR loss-of-function"
    gene: CASR
    effect: LoF
    gfr: 2.0
    causal_root: Secondary Hyperparathyroidism
  CYP27B1_LoF:
    label: "CYP27B1 loss-of-function"
    gene: CYP27B1
    effect: LoF
    gfr: 2.0
    causal_root: Calcitriol Deficiency
  CYP24A1_LoF:
    label: "CYP24A1 loss-of-function"
    gene: CYP24A1
    effect: LoF
    gfr: 2.0
    causal_root: Calcitriol Deficiency
  KLOTHO_deficiency:
    label: "KLOTHO deficiency"
    gene: KL
    effect: LoF
    gfr: 2.0
    causal_root: Phosphate Retention and FGF23 Axis
  SLC20A1_GoF:
    label: "SLC20A1 gain-of-function"
    gene: SLC20A1
    effect: GoF
    gfr: 2.0
    causal_root: Vascular Calcification
  SOST_LoF:
    label: "SOST loss-of-function"
    gene: SOST
    effect: LoF
    gfr: 2.0
    causal_root: Bone-Vascular Paradox (Sclerostin/Wnt Axis)
  GPD1_LoF:
    label: "GPD1 loss-of-function"
    gene: GPD1
    effect: LoF
    gfr: 2.0
    causal_root: Kidney Glycolysis-G3P Phosphate Sensing
  high_phosphate_diet:
    label: "High-phosphate diet"
    gfr: 2.0
    param_overrides:
      OralPhos: 2.0
    causal_root: Phosphate Retention and FGF23 Axis
  low_calcium_diet:
    label: "Low-calcium diet"
    gfr: 2.0
    param_overrides:
      OralCa: 0.5
    causal_root: Calcitriol Deficiency
  phosphate_binders:
    label: "Phosphate binder therapy"
    gfr: 1.0
    param_overrides:
      OralPhos: 0.5
    causal_root: Phosphate Retention and FGF23 Axis
  calcimimetic:
    label: "Calcimimetic (cinacalcet)"
    gene: CASR
    effect: GoF
    gfr: 1.0
    causal_root: Secondary Hyperparathyroidism

coupling:
  dt_hours: 168
  duration_hours: 26280
  base_to_extension:
    ECCPhos: ECCPhos_ext
    PTH: PTH_ext
    B: Calcitriol_ext
    P: Ca_ext
    OC: OC_ext
  gfr_parameter: GFR
  gfr_ext_parameter: GFR_ext
  feedback:
    fgf23_suppression:
      source: FGF23
      target_parameter: T69
      base_value: 0.1
      formula: "base_value / max(1 / (1 + (FGF23/50)^1.5), 0.01)"
