reactome_disease:
  doid: DOID:0060233
  name: cardiofaciocutaneous syndrome
  definition: A syndrome characterized by unusually sparse, brittle, curly hair, macrocephaly, a prominent forehead and bi-temporal
    narrowing, intellectual disability, failure to thrive, congenital heart defects, short stature and skin abnormalities,
    and has_material_basis_in mutation in the BRAF, MAP2K1, MAP2kK2 and KRAS genes.
  synonyms:
  - CFC syndrome
  - cardio-facial-cutaneous syndrome
