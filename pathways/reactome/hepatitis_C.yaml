  doid: DOID:1883
  name: hepatitis C
  definition: A viral infectious disease that results_in inflammation located_in liver, has_material_basis_in Hepatitis C
    virus, which is transmitted_by blood from an infected person enters the body of an uninfected person. The infection has_symptom
    fever, has_symptom fatigue, has_symptom loss of appetite, has_symptom nausea, has_symptom vomiting, has_symptom abdominal
    pain, has_symptom clay-colored bowel movements, has_symptom joint pain, and has_symptom jaundice.
  synonyms:
  - hepatitis nonA nonB
  - chronic hepatitis C
  - NANBH
  - hepatitis C infection
  - Viral hepatitis C
