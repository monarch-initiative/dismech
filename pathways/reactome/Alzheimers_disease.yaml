reactome_disease:
  doid: DOID:10652
  name: Alzheimer's disease
  definition: A tauopathy that results in progressive memory loss, impaired thinking, disorientation, and changes in personality
    and mood starting and leads in advanced cases to a profound decline in cognitive and physical functioning and is marked
    histologically by the degeneration of brain neurons especially in the cerebral cortex and by the presence of neurofibrillary
    tangles and plaques containing beta-amyloid. It is characterized by memory lapses, confusion, emotional instability and
    progressive loss of mental ability.
  synonyms:
  - AD
  - Alzheimers dementia
  - Alzheimer disease
