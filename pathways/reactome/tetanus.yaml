reactome_disease:
  doid: DOID:11338
  name: tetanus
  definition: A primary bacterial infectious disease that results_in prolonged contraction of skeletal muscle fibers, has_material_basis_in
    Clostridium tetani, which produces tetanospasmin, a neurotoxin, which is carried to the brain and spinal cord, where it
    binds irreversibly to receptors inhibiting neurotransmission. Damaged upper motor neurons cannot control reflex responses
    to afferent sensory stimuli.
  synonyms:
  - clostridial tetanus
  - Tetanus (disorder)
  - Infection due to Clostridium tetani (disorder)
  total_genes: 2
  total_pmids: 0
  genes:
  - VAMP2
  - tetX
  pathways:
  - id: R-HSA-5250982
    name: toxicity of tetanus toxin (tetx)
    genes:
    - VAMP2
    - tetX
    url: https://reactome.org/PathwayBrowser/#/R-HSA-5250982
