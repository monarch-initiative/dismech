reactome_disease:
  doid: DOID:12132
  name: granulomatosis with polyangiitis
  definition: "An autoimmune hypersensitivity disease that is characterized by necrotizing granulomatous inflammation of the\
    \ upper and lower respiratory tract, glomerulonephritis, vasculitis, and the presence of antineutrophil cytoplasmatic\
    \ autoantibodies (ANCAs) in patient sera, and is \nlocated_in lung, located_in kidney, located_in skin resulting from\
    \ an autoimmune attack by antineutrophil cytoplasmic antibodies against small and medium-size blood vessels."
  synonyms:
  - Wegener granulomatosis, formerly
  - Necrotizing respiratory granulomatosis
