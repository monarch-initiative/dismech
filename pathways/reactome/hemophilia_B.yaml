reactome_disease:
  doid: DOID:12259
  name: hemophilia B
  definition: An inherited blood coagulation disease that has_material_basis_in Factor IX deficiency, which makes coagulation
    much more prolonged. The disease is inherited as an X-linked recessive trait.
  synonyms:
  - factor IX deficiency
  - Congenital factor IX deficiency
  - deficiency, functional factor IX
  - Congenital factor IX disorder
  total_genes: 1
  total_pmids: 26
