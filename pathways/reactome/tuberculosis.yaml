  name: tuberculosis
  definition: A primary bacterial infectious disease that is located_in lungs, located_in lymph nodes, located_in pericardium,
    located_in brain, located_in pleura and located_in gastrointestinal tract, has_material_basis_in Mycobacterium tuberculosis,
    which is transmitted_by droplets released into the air when an infected person coughs or sneezes.
