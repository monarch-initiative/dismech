reactome_disease:
  doid: DOID:0060224
  name: atrial fibrillation
  definition: A heart conduction disease that is characterized by uncoordinated electrical activity in the heart's upper chambers
    (the atria), which causes the heartbeat to become fast and irregular and has symptoms palpitations, weakness, fatigue,
    lightheadedness, dizziness, confusion, shortness of breath and chest pain.
  synonyms:
  - A-fib
