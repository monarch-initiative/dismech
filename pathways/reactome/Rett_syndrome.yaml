reactome_disease:
  doid: DOID:1206
  name: Rett syndrome
  definition: A pervasive developmental disease that is characterized by normal early growth and development followed by a
    slowing of development, loss of purposeful use of the hands, distinctive hand movements, slowed brain and head growth,
    problems with walking, seizures, and intellectual disability.
  synonyms:
  - Rett's disorder
  - cerebroatrophic hyperammonemia
  total_genes: 1
  total_pmids: 6
