reactome_disease:
  doid: DOID:2339
  name: Crouzon syndrome
  definition: A craniosynostosis that involves premature fusion of certain skull bones. This early fusion prevents the skull
    from growing normally and affects the shape of the head and face. The disease is associated with mutations in the FGFR2
    gene.
  synonyms:
  - Craniofacial Dysostosis
  total_genes: 2
