reactome_disease:
  doid: DOID:0112258
  name: N-acetylglutamate synthase deficiency
  definition: A urea cycle disorder characterized by accumulation of ammonia in the blood that has_material_basis_in homozygous
    or compound heterozygous mutation in the NAGS gene on chromosome 17q21.31.
  synonyms:
  - NAG synthetase deficiency
  - NAGS deficiency
  - N-acetylglutamate synthetase deficiency
  - N-acetyl glutamate synthetase deficiency
  - hyperammonemia due to N-acetylglutamate synthase deficiency
  total_genes: 1
  total_pmids: 5
  genes:
  - NAGS
  pathways:
