reactome_disease:
  doid: DOID:13636
  name: Fanconi anemia
  definition: A congenital hypoplastic anemia characterized by progressive pancytopenia with bone marrow failure, variable
    congenital malformations and predisposition to develop hematological or solid tumors. It is a result of a genetic defect
    in a cluster of proteins responsible for DNA repair.
  synonyms:
  - Fanconi pancytopenia
  - Fanconi anaemia
  - Fanconi's anaemia
  - Fanconi's anemia
  - Fanconi panmyelopathy
  total_genes: 1
  total_pmids: 15
  genes:
