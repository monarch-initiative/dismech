reactome_disease:
  doid: DOID:12971
  name: hereditary spherocytosis
  definition: A congenital hemolytic anemia characterized_by the production of red blood cells with a sphere shape, rather
    than the normal biconcave disk shape.
  synonyms:
  - Minkowski Chauffard syndrome
  - Congenital spherocytic hemolytic anemia
  - spherocytic anemia
  total_genes: 1
  total_pmids: 4
  genes:
  - SLC4A1
  pathways:
  - id: R-HSA-5619050
    name: Defective SLC4A1 causes hereditary spherocytosis type 4 (HSP4),  distal renal tubular acidosis (dRTA) and dRTA with
      hemolytic anemia (dRTA-HA)
    genes:
    - SLC4A1
    url: https://reactome.org/PathwayBrowser/#/R-HSA-5619050
    normal_pathway:
      id: R-HSA-1237044
