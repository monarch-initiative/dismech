  name: ankylosing spondylitis
  definition: A bone inflammation disease that results_in inflammation in the joints of the spine and pelvis. The disease
    has_symptom pain, has_symptom stiffness in the spine, has_symptom stiffness in the neck, has_symptom stiffness in the
    hips, has_symptom stiffness in the jaw and has_symptom stiffness in the rib cage.
  synonyms:
  - Bekhterev syndrome
  - Marie-Strumpell disease
  - Bekhterev's disease
