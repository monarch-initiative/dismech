reactome_disease:
  doid: DOID:12365
  name: malaria
  definition: A parasitic protozoa infectious disease characterized as a vector-borne infectious disease caused by the presence
    of protozoan parasites of the genus Plasmodium in the red blood cells, transmitted from an infected to an uninfected individual
    by the bite of anopheline mosquitoes, and characterized by periodic attacks of chills and fever that coincide with mass
    destruction of blood cells and the release of toxic substances by the parasite at the end of each reproductive cycle.
  synonyms:
  - induced malaria
