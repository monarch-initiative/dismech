reactome_disease:
  doid: DOID:0050424
  name: familial adenomatous polyposis
  definition: An autosomal dominant disease that is has material basis in mutations in the APC gene and involves formation
    of numerous polyps in the epithelium of the large intestine which are initially benign and later transform into colon
    cancer.
  synonyms:
  - adenomatous polyposis of the colon
  total_genes: 2
  total_pmids: 19
  genes:
