reactome_disease:
  doid: DOID:10608
  name: celiac disease
  definition: An autoimmune disease of gastrointestinal tract that is caused by a reaction located_in small intestine to gliadin,
    a prolamin (gluten protein) found in wheat, and similar proteins found in the crops of the tribe Triticeae. The disease
    is associated with HLA-DQ gene. It has_symptom abdominal pain, has_symptom constipation, has_symptom diarrhea, has_symptom
    nausea and vomiting, and has_symptom loss of appetite.
  synonyms:
  - idiopathic steatorrhea
  - coeliac disease
  - celiac sprue
