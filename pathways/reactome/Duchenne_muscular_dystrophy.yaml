reactome_disease:
  doid: DOID:11723
  name: Duchenne muscular dystrophy
  definition: A muscular dystrophy that has_material_basis_in X-linked mutations in the DMD gene found on the X chromosome.
    It is characterized by rapidly progressing muscle weakness and muscle atrophy initially involving the lower extremities
    and eventually affecting the whole body. It affects males whereas females can be carriers. The symptoms start before the
    age of six and may appear at infancy.
  synonyms:
  - Muscular dystrophy, Duchenne
