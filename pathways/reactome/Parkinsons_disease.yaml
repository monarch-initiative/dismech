reactome_disease:
  doid: DOID:14330
  name: Parkinson's disease
  definition: A synucleinopathy that has_material_basis_in degeneration of the central nervous system that often impairs motor
    skills, speech, and other functions.
  synonyms:
  - Parkinson disease
  - paralysis agitans
  total_genes: 0
  total_pmids: 0
  genes: []
  pathways: []
  notes: >
    Reactome's disease variant curation does not annotate canonical idiopathic Parkinson's disease
    (DOID:14330) variants. The genes curated in Reactome's Parkinson's Disease pathways (LRRK2,
    PINK1, PARK2/Parkin, SNCA) are not linked to DOID:14330 in the variant TSV or DOID API.
    The only Reactome entries whose pathway names contain "Parkinsonism" are tagged with
    DOID:1289 (neurodegenerative disease) and describe infantile parkinsonism-dystonia (PKDYS)
    caused by SLC6A3 variants — a categorically different disease. This file is intentionally
    empty to avoid misrepresenting PKDYS data as idiopathic Parkinson's disease.
