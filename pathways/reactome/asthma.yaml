reactome_disease:
  doid: DOID:2841
  name: asthma
  definition: A bronchial disease that is characterized by chronic inflammation and narrowing of the airways, which is caused
    by a combination of environmental and genetic factors. The disease has_symptom recurring periods of wheezing (a whistling
    sound while breathing), has_symptom chest tightness, has_symptom shortness of breath, has_symptom mucus production and
    has_symptom coughing. The symptoms appear due to a variety of triggers such as allergens, irritants, respiratory infections,
    weather changes, exercise, stress, reflux disease, medications, foods and emotional anxiety.
  synonyms:
  - chronic obstructive asthma with acute exacerbation
  - chronic obstructive asthma
  - exercise-induced asthma
  - chronic obstructive asthma with status asthmaticus
  - Exercise induced asthma
  - bronchial hyperreactivity
  total_genes: 0
  total_pmids: 0
  genes: []
  pathways: []
