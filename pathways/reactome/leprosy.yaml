  doid: DOID:1024
  name: leprosy
  definition: A primary bacterial infectious disease that results_in infection located_in superficial peripheral nerves, located_in
    skin, located_in mucous membranes of the upper respiratory tract, located_in anterior chamber of the eyes, or located_in
    testes, has_material_basis_in Mycobacterium leprae, which is transmitted_by aerosol spread from infected nasal secretions
    to exposed nasal and oral mucosa. The infection has_symptom skin lesions, has_symptom sensory loss, has_symptom motor
    loss and has_symptom eye damage.
