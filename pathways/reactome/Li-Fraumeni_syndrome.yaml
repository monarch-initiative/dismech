  name: Li-Fraumeni syndrome
  definition: A syndrome characterized by autosomal dominant inheritance of increased risk of developing several types of
    cancer, including breast cancer, osteosarcomata and soft tissue sarcomata.
  synonyms:
  - sarcoma, breast, leukaemia and adrenal gland syndrome
  - SBLA syndrome
  - Li-Fraumeni Familiar cancer Susceptibility syndrome
