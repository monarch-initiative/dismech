    summary: >-
      Created the molecular_mimicry_autoimmunity mechanism module and wired
      Guillain-Barre syndrome and MIS-C as worked conformers.
    details: |
      Added kb/modules/molecular_mimicry_autoimmunity.yaml, a conserved
      mechanism module for post-infectious / antigen-triggered autoimmunity
      initiated by molecular mimicry. The module models a five-node chain:
      infection-associated cross-reactive antigen exposure (trigger) ->
      cross-reactive autoreactive lymphocyte activation (central_effector; the
      canonical conformance target) -> autoreactive effector-mediated tissue
      injury (effector) -> epitope spreading and autoimmune amplification
      (amplifier) -> tissue-specific autoimmune disease (consequence).

      The module binds GO and CL terms only (no gene/CHEBI bindings), per the
      module convention. Every node carries verified evidence: generic
      molecular-mimicry reviews (Rojas et al. PMID:30509385; Cusick et al.
      PMID:22095454), an epitope-spreading review (Vanderlugt & Miller
      PMID:11910899), and two worked-example primary/secondary sources already
      in the cache (C. jejuni / nerve-ganglioside mimicry PMID:24000328; the
      MIS-C SARS-CoV-2 nucleocapsid / SNX8 cross-reactivity Nature paper
      DOI:10.1038/s41586-024-07722-4). All eleven snippets were confirmed as
      exact substrings of their cached abstracts.

      Wired two conformers by adding conforms_to:
      "molecular_mimicry_autoimmunity#Cross-Reactive Autoreactive Lymphocyte
      Activation" to the existing molecular-mimicry pathophysiology node in
      Guillain_Barre_Syndrome.yaml (also added a B cell cell_type to match the
      module's expected lymphocyte processes) and in
      Multisystem_Inflammatory_Syndrome_in_Children_MIS-C.yaml (which already
      carried T cell and B cell types).

      Validation: schema (linkml-validate) and term validation pass for the
      module and for the edited GBS file; conforms_to references resolve to the
      module node; snippet substring checks pass. Note: MIS-C term validation
      surfaces a pre-existing, unrelated label-mismatch warning on the
      MONDO:0100163 disease_term (a mojibake en-dash from the local OAK mondo
      adapter), not introduced by this change.

      Rationale: dismech had 40+ autoimmune entries but no conserved-mechanism
      module for autoimmunity. Molecular mimicry is a recurrent
      final-common-pathway with many ready conformers (Guillain-Barre, MIS-C,
      ADEM, MOGAD, narcolepsy, reactive/post-infectious vasculitis), making it
      the strongest candidate for a first immunology mechanism module, distinct
      from the existing tumor-immune (immune_checkpoint_blockade) and
      drug-hypersensitivity (drug_hypersensitivity_scar) modules.
