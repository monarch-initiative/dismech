    summary: "Deep-research enrichment: variant spectrum, JAACD, mechanism, JAK-inhibitor outcomes"
    details: |
      Enriched the JAK1 gain-of-function entry using a deep-research harness
      (fan-out search -> adversarial verification -> synthesis), then
      independently re-verified every citation per the dismech anti-hallucination
      SOP: each new PMID was fetched, each snippet confirmed as an exact
      substring of the cached abstract (29/29 snippets pass), and all ontology
      terms verified via OAK. The specific Horesh variant names/domains
      (E139K/R506C/S700N/V985I) were confirmed against the article full text
      (PMC10986756) because the abstract does not enumerate them.

      Added three primary references:
        - PMID:36546480 (Biggs/Turvey, JCI Insight 2022) — same A634D family
          with longer ruxolitinib follow-up; zebrafish/iPSC models showing
          enhanced myelopoiesis; IL-4/IL-13/IFN core dysregulated gene set;
          growth/eosinophilia improvement.
        - PMID:32750333 (Gruber, Immunity 2020) — mosaic S703I GoF; hypermorphic
          + neomorphic transactivation of partner JAKs; tofacitinib response.
        - PMID:38563820 (Horesh/Bogunovic, J Exp Med 2024) — 59-individual JAACD
          cohort; four GoF variants across all JAK1 domains; hyperactive baseline
          + cytokine-induced STAT phosphorylation and ISGs; baricitinib response.

      New content: variant spectrum expanded from 1 to 6 variants (A634D, S703I,
      E139K, R506C, S700N, V985I); treatments expanded to ruxolitinib,
      tofacitinib, baricitinib (plus corticosteroid non-response); added Colitis
      phenotype and JAACD framing; added a second (EMERGING) mechanistic
      hypothesis on the multi-domain JAACD spectrum and cis-activation/neomorphic
      mechanism; added Th2 cell, type I IFN signaling, and eosinophil
      differentiation process annotations.

      Validation: linkml schema clean; enum/term validation clean; 29/29 evidence
      snippets are exact substrings of cached abstracts; tests/test_data.py
      subset (uniqueness, required fields, evidence references, variants,
