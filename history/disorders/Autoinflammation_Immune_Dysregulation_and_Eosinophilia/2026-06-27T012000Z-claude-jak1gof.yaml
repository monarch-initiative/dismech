    summary: "Create JAK1 gain-of-function syndrome (AIIDE) entry from Del Bel et al 2017"
    details: |
      Created a new dismech Disease entry for autoinflammation, immune
      dysregulation, and eosinophilia (AIIDE; MONDO:0033558, OMIM:618999), the
      germline JAK1 gain-of-function disorder, curated primarily from the
      disease-defining report:

        Del Bel KL, Ragotte RJ, Saferali A, et al. JAK1 gain-of-function causes
        an autosomal dominant immune dysregulatory and hypereosinophilic
        syndrome. J Allergy Clin Immunol. 2017;139(6):2016-2020.e5.
        PMID:28111307.

      NEC preflight: the disease name was confirmed against MONDO before
      curation. The ADMIO series (autoimmune disease, multisystem, infantile-
      onset) was ruled OUT — ADMIO2 (MONDO:0014861) is ZAP70, not JAK1. The
      correct JAK1 GoF entity is MONDO:0033558 (gene JAK1, hgnc:6190, OMIM
      618999), verified by the MONDO RO:0004003 gene relationship and OMIM xref.

      Source-fidelity note: the PubMed record for PMID:28111307 is a Letter with
      no structured abstract, so only the article title is available as a
      validated cache substring. Core defining claims (germline JAK1 GoF,
      autosomal dominant inheritance, hypereosinophilia, immune dysregulation,
      corticosteroid non-response) are anchored on that title quote, with
      specific clinical features from the letter body / Table E1 recorded in
      phenotype `notes` rather than fabricated snippets. Mechanistic, model, and
      drug-class claims are supported by independent references with verified
      abstracts: PMID:18362173 (somatic JAK1 GoF, functional validation),
      PMID:27111231 (Jak1 GoF mouse pruritic dermatitis + JAK1 inhibition),
      PMID:25587654 (JAK-STAT pathway review).

      Validation: linkml schema validation clean; enum/term validation clean
      (all HP/CL/GO/MONDO/HGNC/CHEBI terms verified via OAK); all 13 evidence
      snippets confirmed as exact substrings of their cached references;
      tests/test_data.py subset (uniqueness, required fields, evidence
      references) passed.
