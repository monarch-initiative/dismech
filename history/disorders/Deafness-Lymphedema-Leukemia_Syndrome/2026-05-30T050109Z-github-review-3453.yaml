      ## Findings

      1. **GeneReviews exists for GATA2 deficiency and should be the baseline.** The current entry is a narrow Emberger/deafness-lymphedema-leukemia presentation, but GATA2 deficiency GeneReviews covers the broader disease spectrum and management. Source: https://www.ncbi.nlm.nih.gov/books/NBK114843/
      2. **Disease boundary needs explicit GATA2-deficiency framing.** The YAML title is DLL syndrome, but phenotypes include recurrent infections and warts; this overlaps MonoMAC, DCML deficiency, Emberger syndrome, familial MDS/AML, and broader GATA2 deficiency. Scope should be stated.
      3. **Management is too narrow.** HSCT is present, but management should include hematologic surveillance, infection prophylaxis/monitoring, HPV/viral/wart care, lymphedema management, audiology, pulmonary alveolar proteinosis/NTM evaluation where relevant, and family donor testing.
      4. **Diagnosis should include hematologic/immunologic workup.** GATA2 molecular testing is present; add CBC/monocytes/B/NK/dendritic-cell deficiency, bone marrow surveillance, cytogenetics, and infection evaluation.
      5. **Pathophysiology is good but incomplete.** GATA2 haploinsufficiency, lymphatic valve development, and dysregulated hematopoiesis are present; add monocyte/dendritic/B/NK deficiency and MDS/AML progression.

      ## Research-artifact cross-check

      Matching artifacts: `research/Deafness-Lymphedema-Leukemia_Syndrome-deep-research-asta.md` and `.citations.md`. Asta output should be treated as leads; GeneReviews/GATA2 consensus sources should anchor updates.

