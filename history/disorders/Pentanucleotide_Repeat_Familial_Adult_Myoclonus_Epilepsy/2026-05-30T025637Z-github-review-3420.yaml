      ## Completed curation review

      - Disease: **Pentanucleotide Repeat Familial Adult Myoclonus Epilepsy**
      - Entry: `kb/disorders/Pentanucleotide_Repeat_Familial_Adult_Myoclonus_Epilepsy.yaml`
      - Selection basis: #33 of 50 least-recently edited Mendelian entries
      - Review decision: **Changes required**
      - Validation stance: assumes schema/term/reference validation passes; this is a biological and clinical-content review.

      ## Findings

      1. **Subtype/locus completeness needs review.** The YAML has SAMD12, STARD7, MARCHF6, YEATS2, TNRC6A, RAPGEF2, and RAI1 repeat forms. Literature reviews describe at least six established loci and evolving additional loci; the curator should verify that RAI1 is appropriate for this disease label and whether any newer loci should be included.
      2. **Diagnosis should emphasize repeat-expansion testing limitations.** The entry has molecular repeat expansion testing, but FAME expansions are noncoding TTTTA/TTTCA pentanucleotide expansions often missed by standard exome sequencing. Long-read sequencing, repeat-primed PCR, Southern blot, or locus-specific assays should be discussed where evidence supports them.
      3. **Phenotype content mixes core and locus-specific features.** Tremor, myoclonus, seizures, photosensitivity, cognitive impairment, migraine, night blindness, and cerebellar atrophy are listed. Core FAME features are adult-onset cortical myoclonus/tremor and generalized seizures; night blindness/cerebellar atrophy may be locus- or family-specific and should be mapped accordingly.
      4. **Treatment evidence should be conservative.** Anticonvulsants, perampanel, DBS experimental therapy, and genetic counseling are present. Perampanel and DBS evidence should be clearly labeled by case series/experimental strength, not treated as standard-of-care equivalently.
      5. **Mechanism is detailed but may be over-modeled.** The pathophysiology has 13 nodes including locus-specific repeats, RNA toxicity, NOVA2 splicing, repeat-associated effects, etc. Ensure each mechanistic node has direct evidence and does not infer a common mechanism across all loci without support.

