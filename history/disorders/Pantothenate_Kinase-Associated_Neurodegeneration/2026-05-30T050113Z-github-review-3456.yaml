      ## Findings

      1. **GeneReviews exists and should be used.** NBIA/PANK2-related GeneReviews provides baseline phenotype, MRI diagnosis, genotype, and management. Source: https://www.ncbi.nlm.nih.gov/books/NBK1490/
      2. **Treatment evidence needs current evidence grading.** The YAML lists symptomatic pharmacotherapy, iron chelation, DBS, pantothenate replacement, and metabolic supplements. Deferiprone/iron chelation, pantothenate/fosmetpantotenate, and DBS have different evidence levels; the issue is not whether they are plausible, but whether each treatment claim matches evidence.
      3. **Subtype-specific natural history should be strengthened.** Classic and atypical PKAN are present, but phenotypes should map to onset, progression, retinal degeneration, speech/swallowing, psychiatric/cognitive manifestations, and dystonia severity.
      4. **Diagnosis should include the eye-of-the-tiger MRI sign carefully.** Brain MRI and genetic testing are present; add MRI sign specificity/limitations and differential diagnosis among NBIA disorders.
      5. **Pathophysiology is good but may over-specify downstream mechanisms.** CoA depletion, mitochondrial energy dysfunction, phosphopantetheinyl-protein loss, lipoylation/PDH, and basal ganglia iron accumulation should be evidence-source stratified.

      ## Research-artifact cross-check

      Matching artifacts: `research/Pantothenate_Kinase-Associated_Neurodegeneration-deep-research-asta.md` and `.citations.md`. Asta is lead material; GeneReviews and current trial literature should anchor treatment claims.

      ## Content-completeness summary

      - **Phenotypes:** good but subtype/natural-history mapping needed.
