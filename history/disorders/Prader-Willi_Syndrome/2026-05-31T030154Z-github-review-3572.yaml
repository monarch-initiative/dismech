      ## Findings

      1. Blocking: the entry has no `diagnosis` section. Add disease-specific diagnostic criteria, recommended tests/imaging/biochemical markers, and molecular confirmation strategy for Prader-Willi Syndrome; this is necessary for curators to evaluate whether the modeled mechanism and phenotype scope match the intended disease.
      2. Research-artifact consumption: matching deep-research artifact(s) exist and should be treated as first-class review inputs. Compare the YAML against the artifact(s), especially for central mechanisms, subtype-specific features, treatments/trials, and diagnostic/surveillance details rather than only schema-valid content.
      3. Disease-boundary check: no subtypes are modeled. Confirm this is intentionally a single pathomechanism entry and not a spectrum that should expose subtypes, genotype classes, or clinically distinct forms.
      4. Pathophysiology review: the main modeled mechanisms include Loss of Paternally Expressed Genes at 15q11.2-q13, SNORD116 as Minimal Critical Region, Hypothalamic Dysfunction, Circadian and Epigenetic Dysregulation. Check that each is an atomic event with direct evidence and that downstream edges do not encode multi-step chains or unsupported causal leaps from gene/product defect to organ-level phenotype.
      5. Treatment modeling: treatments are present (Growth Hormone Therapy, Dietary Management, Hormone Replacement Therapy, Diazoxide Choline Extended-Release). Check therapeutic agents, subtype applicability, evidence strength, and surveillance/supportive-care needs; avoid broad treatment claims that are not tied to the relevant phenotype or disease stage.
      6. Evidence/reference check: top references include ORPHA:739, PMID:40708003, PMID:12598399, PMID:28659150. Spot-check that snippets directly support the specific claim, frequency, and evidence_source classification, especially where the same PMID is reused across phenotype, mechanism, and treatment assertions.

      ## Content-Completeness Checklist

      - Phenotype coverage: review major phenotypes such as Neonatal Hypotonia, Hyperphagia, Obesity, Intellectual Disability, Short Stature.
      - Subtype completeness: N/A or not modeled; confirm no required subtype split.
      - Pathophysiology depth: mechanisms present but require atomicity/evidence review.
      - Treatments and trials: present; verify standard-vs-investigational scope.
      - Genetics: genetic section present; verify inheritance, variant classes, and genotype-phenotype claims.
      - Biomarkers/diagnostics: gap noted; diagnosis absent.
      - References/research consumption: compare the YAML against listed sources and local research artifacts; do not treat retrieval-heavy papers as issues unless they are disease-specific and directly modelable.

      ## Suggested Remediation

      Resolve the blocking diagnostic/baseline gaps first, then tighten subtype-specific claims, pathophysiology atomicity, treatment/trial scope, and evidence-to-claim alignment. Keep deterministic schema/term/reference validation separate from this biological review.

