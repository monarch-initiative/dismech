      ## Completed curation review

      - Disease: **Camurati-Engelmann Disease**
      - Entry: `kb/disorders/Camurati-Engelmann_Disease.yaml`
      - Selection basis: #2 of 50 least-recently edited Mendelian entries
      - Review decision: **Changes required**
      - Validation stance: this review assumes schema, ontology-term, and reference validation pass; findings below are biological/clinical/content issues.

      ## Findings

      1. **GeneReviews exists but is not tagged or consumed.** The current entry has no top-level `GeneReviews` tag. NCBI Bookshelf has a current GeneReviews article for **Camurati-Engelmann Disease** (PMID:20301335; updated 2023-08-31). Under the review rubric, this should be a mandatory baseline reference for a Mendelian entry. Source: https://www.ncbi.nlm.nih.gov/books/NBK1156/

      2. **Diagnosis and surveillance are clinically under-modeled.** The YAML has phenotypes and treatments but no `diagnosis:` section. CED is radiographically defined by progressive bilateral diaphyseal cortical thickening/sclerosis, with clinically important skull-base involvement, cranial nerve compression, hearing/vision complications, intracranial-pressure complications, and variable expressivity/incomplete penetrance. A curator should add diagnostic/radiographic evaluation and monitoring content rather than leaving these implications implicit in phenotype text.

      3. **Pathophysiology is directionally correct but too compressed for the research artifact.** The YAML has `Constitutive TGF-beta 1 Activation` and `Impaired Bone Remodeling Balance`. The Falcon research artifact surfaced a more specific chain: TGFB1 LAP-region variants weaken latent-complex restraint -> increased active TGF-beta1 -> canonical SMAD2/3-SMAD4 signaling and non-canonical Rho/MAPK/integrin pathways -> altered osteoblast, osteoclast, and osteocyte coupling -> high-turnover cortical thickening, medullary narrowing, and skull-base hyperostosis. Several of those are central, disease-specific mechanisms and should be represented as atomic nodes where evidence supports them.

      4. **Treatment evidence needs clearer separation of established symptomatic care versus case-based/mechanism-based pharmacotherapy.** Corticosteroids and losartan are listed, and this is clinically plausible, but a curator should verify that each evidence snippet supports the specific claimed treatment effect and not merely the molecular mechanism or phenotype. The research artifact also surfaced antiresorptive/zoledronic-acid reports as treatment leads; these should be evaluated for inclusion or explicitly left out as lower-evidence case-based therapy.

      5. **Ontology specificity could improve for cell types and anatomy.** The YAML includes osteoblasts and osteoclasts but omits osteocytes, even though the reviewed research frames CED as abnormal bone-cell coupling. The key anatomy is not just generic diaphysis: skull base and medullary cavity narrowing are clinically important because they explain cranial neuropathy, hearing/vision complications, and marrow/pressure symptoms.

      ## Research-artifact cross-check

      Checked:
      - `research/Camurati-Engelmann_Disease-deep-research-cyberian-codex.md`
      - `research/Camurati-Engelmann_Disease-deep-research-cyberian-codex.md.citations.md`
      - `research/Camurati-Engelmann_Disease-deep-research-falcon.md`
      - `research/Camurati-Engelmann_Disease-deep-research-falcon.md.citations.md`

      The YAML consumes the core TGFB1/LAP/latent TGF-beta mechanism and the major clinical features from PMID:15894597. It under-consumes the newer mechanistic synthesis in the Falcon artifact: canonical SMAD signaling, non-canonical Rho/MAPK effects on osteoclast migration/cytoskeletal remodeling, osteoblast maturation/mineralization imbalance, osteocyte involvement, age-dependent activity/attenuation, and skull-base/medullary anatomic consequences.

      ## Content-completeness checklist

      - **Phenotypes:** Mostly adequate for classic long-bone pain/gait/weakness/skull/hearing features, but cranial complications and intracranial-pressure/vision consequences should be checked against GeneReviews.
      - **Subtype / lumping-splitting:** Adequate as a unified TGFB1-associated CED entry; no separate subtype requirement identified from reviewed sources.
      - **Pathophysiology:** Gaps noted. Split the broad remodeling node into more specific TGFB1 activation, SMAD signaling, non-canonical Rho/MAPK/integrin osteoclast effects, osteoblast maturation/mineralization imbalance, and skull-base/diaphyseal consequences where supported.
      - **Treatments / clinical trials:** Gaps noted. Corticosteroids and losartan need claim-evidence verification; zoledronic acid/antiresorptive reports should be evaluated as lower-evidence treatment leads.
      - **Genetics:** Mostly adequate: autosomal dominant TGFB1 variants, variable expressivity, and reduced penetrance are present.
      - **Diagnostics / biomarkers:** Missing. Add radiographic diagnostic criteria and monitoring/surveillance content.
      - **References:** Blocking baseline gap: GeneReviews should be fetched/tagged if the YAML is updated.
      - **Overall consumption:** Good core entry, but the GeneReviews and deep-research mechanisms were under-consumed enough to require curation changes.

      ## Suggested remediation

      Add/tag GeneReviews; add a diagnosis/surveillance section; decompose pathophysiology into TGFB1 activation, SMAD and Rho/MAPK branches, osteoblast/osteoclast/osteocyte coupling, and anatomic consequences; and re-check treatment evidence for corticosteroids, losartan, and possible antiresorptive therapy.

