      ## Completed curation review

      - Disease: **Alternating Hemiplegia of Childhood**
      - Entry: `kb/disorders/Alternating_Hemiplegia_of_Childhood.yaml`
      - Selection basis: #32 of 50 least-recently edited Mendelian entries
      - Review decision: **Changes required**
      - Validation stance: assumes schema/term/reference validation passes; this is a biological and clinical-content review.

      ## Findings

      1. **GeneReviews exists and should be used.** ATP1A3-related disorder GeneReviews covers AHC and related ATP1A3 phenotypes. The YAML should use it as a baseline for inheritance, phenotype spectrum, and management. Source: https://www.ncbi.nlm.nih.gov/books/NBK1115/
      2. **Inheritance is missing.** The entry has ATP1A3 in `genetic:` but no `inheritance:` section. AHC is usually autosomal dominant and de novo; recurrence counseling and parental mosaicism should be addressed.
      3. **Clinical-trial coverage should be rechecked.** The YAML lists NCT02408354, NCT06248645, and NCT03857607. Earlier/current ClinicalTrials.gov searches also surface other AHC studies such as sodium oxybate and observational/natural-history work. The trial list should be checked for completeness and whether each trial is interventional, observational, or disease-registry evidence.
      4. **Progression/natural history needs more detail.** The YAML captures episodic hemiplegia, developmental delay, dystonia, nystagmus, seizures, autonomic dysfunction, ataxia, and choreoathetosis. GeneReviews also emphasizes persistent neurologic dysfunction with age, speech/language impairment, oculomotor findings, social-skill impairment, and overlapping ATP1A3 phenotypes.
      5. **Pathophysiology should connect ATP1A3 ion-pump dysfunction to both paroxysmal and chronic deficits.** The YAML has ATP1A3-dependent membrane transport dysfunction and network instability; add Na/K-ATPase alpha-3 neuronal excitability/energy homeostasis detail and distinguish acute spells from long-term neurodevelopmental impairment.

      ## Research-artifact cross-check

      Checked `research/Alternating_Hemiplegia_of_Childhood-deep-research-asta.md` and `.citations.md`. Because the artifact is Asta retrieval, GeneReviews and AHC/ATP1A3 narrative review sources should anchor updates.

      ## Content-completeness summary

      - **Phenotypes:** good core set; add progression, speech/social/oculomotor and ATP1A3-overlap context.
      - **Subtype/lumping:** clarify AHC within ATP1A3-related disorder spectrum.
      - **Pathophysiology:** deepen ATP1A3 pump dysfunction and chronic/paroxysmal branch distinction.
      - **Management/diagnosis:** inheritance missing; treatment/trials need current review and evidence typing.
      - **References:** add/tag GeneReviews if updating YAML.

      ## Suggested remediation

      Add inheritance, GeneReviews baseline, trial-status review, and stronger natural-history/pathophysiology modeling.

