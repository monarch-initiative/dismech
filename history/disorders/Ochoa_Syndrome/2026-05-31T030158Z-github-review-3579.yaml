      ## Findings

      1. Blocking: the entry has no `diagnosis` section. Add disease-specific diagnostic criteria, recommended tests/imaging/biochemical markers, and molecular confirmation strategy for Ochoa syndrome; this is necessary for curators to evaluate whether the modeled mechanism and phenotype scope match the intended disease.
      2. Research-artifact consumption: matching deep-research artifact(s) exist and should be treated as first-class review inputs. Compare the YAML against the artifact(s), especially for central mechanisms, subtype-specific features, treatments/trials, and diagnostic/surveillance details rather than only schema-valid content.
      3. Disease-boundary check: no subtypes are modeled. Confirm this is intentionally a single pathomechanism entry and not a spectrum that should expose subtypes, genotype classes, or clinically distinct forms.
      4. Pathophysiology review: the main modeled mechanisms include Biallelic HPSE2 or LRIG2 dysfunction, Aberrant urinary bladder autonomic innervation, Functional bladder outlet obstruction and incomplete emptying, Urinary stasis and vesicoureteral reflux. Check that each is an atomic event with direct evidence and that downstream edges do not encode multi-step chains or unsupported causal leaps from gene/product defect to organ-level phenotype.
      5. Treatment modeling: treatments are present (Bladder-directed pharmacotherapy, Intermittent catheterization or vesicostomy, Lubricant eye drops and nighttime eye ointment, Antibiotic therapy for urinary tract infection). Check therapeutic agents, subtype applicability, evidence strength, and surveillance/supportive-care needs; avoid broad treatment claims that are not tied to the relevant phenotype or disease stage.
      6. Evidence/reference check: top references include ORPHA:2704, PMID:23967498, PMID:20560210, PMID:23313374. Spot-check that snippets directly support the specific claim, frequency, and evidence_source classification, especially where the same PMID is reused across phenotype, mechanism, and treatment assertions.

