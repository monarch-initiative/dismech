      ## Completed curation review

      - Disease: **RNU12-related minor spliceopathy**
      - Entry: `kb/disorders/RNU12-related_Minor_Spliceopathy.yaml`
      - Selection basis: #57 of the least-recently edited Mendelian entries
      - Review decision: **Changes required**
      - Validation stance: assumes schema/term/reference validation passes; this is a biological and clinical-content review.

      ## Findings

      1. **The entry is currently too sparse.** It has two phenotypes and two pathophysiology nodes, with no genetics evidence details, diagnosis, treatments, or management. RNU12-related disease needs enough content for CDAGS and SCAR33 to be independently interpretable.
      2. **Subtype-specific phenotypes are missing.** CDAGS includes craniosynostosis, clavicular hypoplasia, anal anomalies, genitourinary anomalies, and skin eruption; SCAR33 is early-onset cerebellar ataxia. The YAML only has craniosynostosis and early-onset cerebellar ataxia.
      3. **Inheritance and genetics need variant detail.** Autosomal recessive is present, but the entry should specify RNU12 snRNA/minor spliceosome pathogenic variants and subtype-associated alleles where known.
      4. **Diagnosis and management are absent.** Add molecular testing, neurologic evaluation/MRI for SCAR33, craniofacial/anorectal/GU/skeletal evaluation for CDAGS, and supportive/surgical/rehabilitative management.
      5. **Mechanism should connect U12-type intron retention to tissue phenotypes.** Minor spliceosome dysfunction is correct but should be linked to transcriptome dysregulation and developmental/neurodegenerative consequences by subtype.

      ## Research-artifact cross-check

      Matching artifact: `research/RNU12-related_Minor_Spliceopathy-deep-research-manual.md`. The YAML under-consumes the artifact's subtype framing and clinical details.

      ## Content-completeness summary

      - **Phenotypes:** insufficient for both CDAGS and SCAR33.
      - **Subtype/lumping:** subtypes exist but need phenotype/diagnosis/mechanism mapping.
      - **Pathophysiology:** high-level mechanism present; downstream specificity missing.
      - **Management/diagnosis:** absent.
      - **References:** add primary CDAGS/SCAR33 RNU12 references if updating YAML.

