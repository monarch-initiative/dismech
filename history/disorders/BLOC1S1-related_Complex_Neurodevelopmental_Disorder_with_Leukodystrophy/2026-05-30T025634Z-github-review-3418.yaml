      ## Completed curation review

      - Disease: **BLOC1S1-related Complex Neurodevelopmental Disorder with Leukodystrophy**
      - Entry: `kb/disorders/BLOC1S1-related_Complex_Neurodevelopmental_Disorder_with_Leukodystrophy.yaml`
