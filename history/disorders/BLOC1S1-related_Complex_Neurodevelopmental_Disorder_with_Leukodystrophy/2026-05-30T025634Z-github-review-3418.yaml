      ## Content-completeness summary

      - **Phenotypes:** good core set; add severity/progression/MRI detail.
      - **Subtype/lumping:** clarify BLOC1S1-specific disease versus broader BLOC-1/BORC/HPS disorders.
      - **Pathophysiology:** good but needs complex-specific evidence boundaries.
      - **Management/diagnosis:** missing; add MRI, molecular testing, epilepsy, rehab, ophthalmology, counseling.
      - **References:** add current primary BLOC1S1 paper if updating YAML.

      ## Suggested remediation

      Add diagnosis and supportive management; refine BLOC-1/BORC mechanism boundaries; add MRI/progression and variant-class detail.

