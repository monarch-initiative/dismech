      ## Completed curation review

      - Disease: **Delpire-McNeill Syndrome**
      - Entry: `kb/disorders/Delpire-McNeill_Syndrome.yaml`
      - Selection basis: #68 of the least-recently edited Mendelian entries
      - Review decision: **Changes required**
      - Validation stance: assumes schema/term/reference validation passes; this is a biological and clinical-content review.

      ## Findings

      1. **Disease boundary with Kilquist/SLC12A2 disorders should be explicit.** This entry is autosomal dominant SLC12A2/NKCC1 loss-of-function disease, while the earlier Kilquist syndrome entry is autosomal recessive. The YAML should clearly distinguish heterozygous Delpire-McNeill from biallelic SLC12A2 disease.
      2. **Diagnosis is missing.** The entry has no diagnosis section. Add SLC12A2 molecular testing, audiology/vestibular evaluation, neurodevelopmental assessment, EEG/MRI where supported, and secretory/feeding evaluation.
      3. **Management is reasonable but incomplete.** Speech/PT, hearing aids/cochlear implantation, counseling, and supportive care are present. Add seizure management, vestibular therapy, feeding/respiratory/secretory-system care where relevant, and developmental/behavioral supports.
      4. **Pathophysiology should be evidence-source stratified.** SLC12A2 loss, GABAergic neurogenesis disruption, inner-ear endolymph dysfunction, and secretory epithelial dysfunction are plausible; distinguish direct patient observations from animal/cell biology.
      5. **Phenotype coverage should include vestibular/hearing specificity.** Bilateral sensorineural hearing loss and vestibular areflexia are present; clarify onset, severity, and treatment response.

      ## Research-artifact cross-check

      Matching artifacts: `research/Delpire-McNeill_Syndrome-deep-research-perplexity.md` and `.citations.md`. The YAML uses central mechanisms but under-consumes diagnosis and disease-boundary clarity.

      ## Content-completeness summary

      - **Phenotypes:** strong core list; refine hearing/vestibular/seizure/secretory details.
      - **Subtype/lumping:** distinguish dominant Delpire-McNeill from recessive Kilquist syndrome.
      - **Pathophysiology:** good but source-type stratification needed.
      - **Management/diagnosis:** diagnosis missing; management needs seizure/vestibular/feeding additions.

