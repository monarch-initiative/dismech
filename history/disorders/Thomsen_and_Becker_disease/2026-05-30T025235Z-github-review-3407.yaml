      ## Completed curation review

      - Disease: **Thomsen and Becker disease**
      - Entry: `kb/disorders/Thomsen_and_Becker_disease.yaml`
      - Selection basis: #20 of 50 least-recently edited Mendelian entries
      - Review decision: **Changes required**
      - Validation stance: assumes schema/term/reference validation passes; this is a biological and clinical-content review.

      ## Findings

      1. **GeneReviews exists and should be tagged/used.** Myotonia congenita GeneReviews explicitly covers autosomal dominant Thomsen disease and autosomal recessive Becker disease. The YAML has no top-level inheritance and should use this as a baseline. Source: https://www.ncbi.nlm.nih.gov/books/NBK1355/
      2. **Top-level inheritance is missing despite subtype definitions.** The entry has `has_subtypes` for Thomsen and Becker but no `inheritance:` section. Curators should model AD Thomsen and AR Becker, with subtype-specific counseling.
      3. **Subtype-specific phenotype severity is under-modeled.** Myotonia, stiffness, weakness, and hypertrophy are listed, but Becker disease is usually more severe with transient weakness and later onset; Thomsen is typically milder/AD. These differences should be attached to the subtypes rather than collapsed.
      4. **Treatment section needs stronger evidence and safety framing.** Mexiletine, carbamazepine, and physical therapy are present. Curators should verify treatment evidence and add avoidance/precaution content where relevant, including anesthesia considerations and drug-trigger/caution guidance from GeneReviews if supported.
      5. **Diagnosis should include EMG and genetic testing but also differential diagnosis.** EMG and CLCN1 genetic testing are present; the entry should also distinguish nondystrophic myotonia from myotonic dystrophy and sodium-channel myotonias where clinically relevant.

      ## Research-artifact cross-check

      Checked `research/Thomsen_and_Becker_disease-deep-research-asta.md` and `.citations.md`. The Asta artifact is a lead list; GeneReviews should be the authoritative clinical baseline for subtype inheritance, diagnosis, and management.

      ## Content-completeness summary

      - **Phenotypes:** present but needs subtype-specific onset/severity/weakness.
      - **Subtype/lumping:** subtypes are present; top-level inheritance and subtype counseling are missing.
      - **Pathophysiology:** adequate CLCN1 chloride-channel hyperexcitability chain.
      - **Treatments/diagnosis:** diagnosis present but incomplete; treatment needs evidence/safety refinement.
      - **References:** add/tag GeneReviews if updating YAML.

      ## Suggested remediation

      Add GeneReviews, explicit AD/AR inheritance, subtype-specific clinical distinctions, and expanded diagnosis/management safety guidance.

