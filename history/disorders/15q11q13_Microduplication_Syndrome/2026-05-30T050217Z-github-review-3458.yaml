      ## Completed curation review

      - Disease: **15q11q13 Microduplication Syndrome**
      - Entry: `kb/disorders/15q11q13_Microduplication_Syndrome.yaml`
      - Selection basis: #66 of the least-recently edited Mendelian entries
      - Review decision: **Changes required**
      - Validation stance: assumes schema/term/reference validation passes; this is a biological and clinical-content review.

      ## Findings

      1. **GeneReviews exists and should be used as baseline.** 15q Duplication Syndrome GeneReviews covers maternal interstitial duplication and idic(15)/isodicentric chromosome 15 forms, diagnosis, inheritance, and management. Source: https://www.ncbi.nlm.nih.gov/books/NBK367946/
      2. **Inheritance/parent-of-origin is missing.** The YAML has maternal dosage in pathophysiology and subtypes, but no inheritance section. Parent-of-origin, de novo versus inherited interstitial duplications, and recurrence counseling are central.
      3. **Subtype differences need stronger mapping.** int15, idic15, and mosaic idic15 are present, but phenotypes and severity should be subtype-specific where possible; idic15 generally has higher dosage and more severe epilepsy/developmental involvement.
      4. **Management is too generic.** Supportive care and antiseizure medication are present; add developmental therapies, autism/behavioral supports, sleep/feeding/GI management, EEG/seizure subtype care, orthopedic hypotonia/motor care, and genetic counseling.
      5. **Mechanism should avoid overconfident single-gene attribution.** GABAergic signaling, sodium-channel dysfunction, and epileptogenic network mechanisms are plausible in the 15q11-q13 interval, but evidence should distinguish dosage-region effects from specific gene claims.

      ## Research-artifact cross-check

      Matching artifacts: `research/15q11q13_Microduplication_Syndrome-deep-research-asta.md` and `.citations.md`. Asta should be treated as leads; GeneReviews should anchor curation.

      ## Content-completeness summary

      - **Phenotypes:** core NDD/autism/hypotonia/seizure features present; expand sleep/feeding/behavioral/course details.
      - **Subtype/lumping:** map int15/idic15/mosaic idic15.
