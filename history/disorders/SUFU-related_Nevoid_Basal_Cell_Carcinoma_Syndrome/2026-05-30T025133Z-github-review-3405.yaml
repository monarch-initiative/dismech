      ## Completed curation review

      - Disease: **SUFU-related nevoid basal cell carcinoma syndrome**
      - Entry: `kb/disorders/SUFU-related_Nevoid_Basal_Cell_Carcinoma_Syndrome.yaml`
      - Selection basis: #18 of 50 least-recently edited Mendelian entries
      - Review decision: **Changes required**
      - Validation stance: assumes schema/term/reference validation passes; this is a biological and clinical-content review.

      ## Findings

      1. **GeneReviews baseline should be used for NBCCS/Gorlin surveillance.** GeneReviews covers nevoid basal cell carcinoma syndrome and distinguishes PTCH1- versus SUFU-related risks. The YAML should be checked against this baseline. Source: https://www.ncbi.nlm.nih.gov/books/NBK1151/
      2. **SUFU-specific surveillance needs more detail.** The entry has `SUFU-Targeted Surveillance Strategy`, but SUFU pathogenic variants have particularly high childhood medulloblastoma risk. Current recommendations include brain MRI surveillance in early childhood for SUFU carriers; this should be modeled explicitly with age window and rationale where the schema allows.
      3. **Radiation avoidance is clinically central.** NBCCS management often avoids radiotherapy when possible because radiation can induce basal cell carcinomas. This is especially relevant if a SUFU carrier develops medulloblastoma. The treatment section should include avoidance/precaution, not only surgery/chemotherapy-centered management.
      4. **Phenotype risks should distinguish SUFU from PTCH1.** The YAML lists medulloblastoma, meningioma, ovarian fibroma, basal cell carcinoma, and odontogenic keratocysts. SUFU-related NBCCS generally has high medulloblastoma risk and lower jaw keratocyst burden than classic PTCH1-related NBCCS; the entry should avoid importing PTCH1 frequencies/features without SUFU-specific support.
      5. **Treatment-pathway statement needs precision.** `Downstream-Pathway Therapeutic Constraint` is important because SUFU is downstream of SMO; SMO inhibitors may not work the same way for SUFU-driven tumors. This should be stated carefully and backed by direct evidence.

      ## Research-artifact cross-check

      Checked `research/SUFU-related_Nevoid_Basal_Cell_Carcinoma_Syndrome-deep-research-falcon.md` and `.citations.md`. The YAML captures SUFU/GLI derepression and medulloblastoma orientation, but the highest-value missing content is SUFU-specific surveillance, radiation avoidance, and PTCH1-versus-SUFU feature separation.

      ## Content-completeness summary

      - **Phenotypes:** needs SUFU-specific risk/frequency distinctions.
      - **Subtype/lumping:** clarify SUFU-related NBCCS versus PTCH1-related NBCCS.
      - **Pathophysiology:** good; refine downstream SMO-inhibitor implications.
      - **Management/diagnosis:** add explicit medulloblastoma MRI surveillance and radiation avoidance.
      - **References:** add/tag GeneReviews or surveillance guideline references if updating YAML.

      ## Suggested remediation

      Use GeneReviews/surveillance guidance; add age-specific SUFU medulloblastoma surveillance; add radiation avoidance; and refine PTCH1-versus-SUFU phenotype and treatment distinctions.

