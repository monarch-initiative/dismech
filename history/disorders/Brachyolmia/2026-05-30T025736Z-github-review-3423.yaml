      ## Completed curation review

      - Disease: **Brachyolmia**
      - Entry: `kb/disorders/Brachyolmia.yaml`
      - Selection basis: #36 of 50 least-recently edited Mendelian entries
      - Review decision: **Changes required**
      - Validation stance: assumes schema/term/reference validation passes; this is a biological and clinical-content review.

      ## Findings

      1. **Diagnosis and management are missing.** The entry has rich subtype/phenotype/pathophysiology/genetic sections but no diagnosis or treatment/management. Brachyolmia needs clinical-radiographic diagnosis, molecular testing, orthopedic/spine monitoring, physical therapy, pain/mobility support, dental management for LTBP3-related amelogenesis-imperfecta forms, and genetic counseling.
      2. **Subtype boundaries need careful handling.** The YAML includes AD-TRPV4, AR-PAPSS2, and LTBP3. These differ in inheritance, mechanism, extraskeletal features, and overlap with broader TRPV4-related skeletal dysplasia and PAPSS2/LTBP3 syndromes. Phenotypes and mechanisms should be subtype-specific.
      3. **TRPV4-related disorders GeneReviews should be used for the AD-TRPV4 branch.** GeneReviews covers autosomal dominant TRPV4-related skeletal dysplasias including brachyolmia and metatropic dysplasia. Source: https://www.ncbi.nlm.nih.gov/books/NBK201366/
      4. **Asta research should be treated cautiously.** One matching artifact is Asta; do not convert every retrieved paper into a review issue. Prioritize subtype-defining evidence and central diagnostic/management gaps.
      5. **Pathophysiology is detailed but needs clinical integration.** TRPV4 calcium signaling, PAPSS2 sulfation, and LTBP3/TGF-beta/dental mechanisms are present; they should be linked to vertebral/growth-plate/dental phenotypes by subtype.

      ## Research-artifact cross-check

      Checked `research/Brachyolmia-deep-research-openai.md`, `.citations.md`, `research/Brachyolmia-deep-research-asta.md`, and `.citations.md`. The YAML consumes subtype mechanisms well but under-consumes diagnosis and management.

      ## Content-completeness summary

      - **Phenotypes:** extensive; ensure subtype-specific assignment.
      - **Subtype/lumping:** main issue; TRPV4/PAPSS2/LTBP3 branches should remain distinct.
      - **Pathophysiology:** strong but needs subtype-to-phenotype integration.
      - **Management/diagnosis:** missing.
      - **References:** add TRPV4 GeneReviews for AD branch if updating YAML.

      ## Suggested remediation

      Add diagnosis/management, map phenotypes and mechanisms to subtypes, and use TRPV4 GeneReviews for the AD-TRPV4 branch.

