      ## Completed curation review

      - Disease: **EFL1-related Shwachman-Diamond syndrome**
      - Entry: `kb/disorders/EFL1-related_Shwachman-Diamond_syndrome.yaml`
      - Selection basis: #92 of the least-recently edited Mendelian entries
