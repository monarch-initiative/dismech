      4. Pathophysiology review: the main modeled mechanisms include ACTH-regulated aldosterone synthase expression, CLCN2 gain-of-function channel opening, KCNJ5 selectivity filter loss and sodium conductance, CACNA1H gain-of-function calcium influx. Check that each is an atomic event with direct evidence and that downstream edges do not encode multi-step chains or unsupported causal leaps from gene/product defect to organ-level phenotype.
      5. Treatment modeling: treatments are present (Mineralocorticoid receptor antagonist therapy, Glucocorticoid suppression for type I disease, Adrenalectomy for severe or lateralizing disease). Check therapeutic agents, subtype applicability, evidence strength, and surveillance/supportive-care needs; avoid broad treatment claims that are not tied to the relevant phenotype or disease stage.
