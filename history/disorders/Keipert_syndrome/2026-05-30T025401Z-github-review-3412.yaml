      ## Completed curation review

      - Disease: **Keipert syndrome**
      - Entry: `kb/disorders/Keipert_syndrome.yaml`
      - Selection basis: #25 of 50 least-recently edited Mendelian entries
      - Review decision: **Changes required**
      - Validation stance: assumes schema/term/reference validation passes; this is a biological and clinical-content review.

      ## Findings

      1. **No management section is present.** The entry includes diagnosis but no treatment/supportive care. Keipert syndrome needs hearing management, developmental/educational supports, lacrimal anomaly care, orthopedic/hand evaluation, and genetic counseling.
      2. **Phenotype coverage should be checked against the defining family and GPC4 reports.** The YAML lists facial shape, brachydactyly, hearing impairment, developmental delay, intellectual disability, autism, and lacrimal punctal agenesis. Keipert/nasodigitoacoustic syndrome also involves distinctive nasal/facial features and digital anomalies that should be more specific than broad terms where evidence supports them.
      3. **Mechanism is too generic.** `GPC4 loss of function`, abnormal craniofacial morphogenesis, and abnormal digital morphogenesis are present. GPC4 is a heparan sulfate proteoglycan/glypican affecting morphogen signaling; the pathophysiology should explain the relevant developmental signaling context rather than stop at morphology.
      4. **Hearing phenotype needs specificity.** The entry should clarify conductive versus sensorineural/mixed hearing loss if the primary evidence supports it, and connect that to audiologic management.
      5. **Evidence base is small.** Frequencies and phenotype generalizations should be conservative and explicitly case-family based.

      ## Research-artifact cross-check

      Checked `research/Keipert_syndrome-deep-research-asta.md` and `.citations.md`. Because it is an Asta artifact, the curation should be re-anchored to the GPC4 discovery paper and any subsequent cases.

      ## Content-completeness summary

      - **Phenotypes:** present but too broad; refine facial/digital/hearing/lacrimal terms.
      - **Subtype/lumping:** appropriate as GPC4-related Keipert syndrome if scoped to the known X-linked condition.
      - **Pathophysiology:** expand GPC4/glypican morphogen-signaling biology.
      - **Management/diagnosis:** add audiology, development, lacrimal, orthopedic, and counseling care.
      - **References:** use the primary GPC4 paper and cautious case-level frequency wording.

      ## Suggested remediation

      Add management, refine phenotypes and hearing type, and deepen GPC4 developmental mechanism with direct evidence.

