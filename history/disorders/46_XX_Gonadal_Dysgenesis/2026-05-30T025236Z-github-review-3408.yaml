      ## Completed curation review

      - Disease: **46,XX Gonadal Dysgenesis**
      - Entry: `kb/disorders/46_XX_Gonadal_Dysgenesis.yaml`
      - Selection basis: #21 of 50 least-recently edited Mendelian entries
      - Review decision: **Changes required**
      - Validation stance: assumes schema/term/reference validation passes; this is a biological and clinical-content review.

      ## Findings

      1. **Disease boundary is too broad without subtype structure.** The YAML includes NUP107, PSMC3IP, FSHR, and NR5A1 under one disease entry but has no inheritance or subtype structure. 46,XX gonadal dysgenesis is genetically heterogeneous and overlaps ovarian dysgenesis, primary ovarian insufficiency, Perrault-spectrum disease, and broader DSD/differences-of-sex-development contexts.
      2. **Inheritance is missing.** Several listed genes have recessive forms, while NR5A1 can be dominant/de novo or variably penetrant. The entry should not have a gene list without inheritance/subtype mapping.
      3. **Diagnosis is missing.** Core clinical evaluation should include 46,XX karyotype, hypergonadotropic hypogonadism labs, pelvic ultrasound/MRI for uterus/ovaries/streak gonads, pubertal development assessment, and molecular testing when a hereditary form is suspected.
      4. **Management is too narrow.** Hormone replacement therapy is present, but fertility counseling, pubertal induction/maintenance, bone-health monitoring, psychosocial care, and gene-/karyotype-specific tumor-risk considerations should be reviewed.
      5. **Pathophysiology should map genes to ovarian-development steps.** The current mechanisms describe generic female gonad development, hormonal signaling/folliculogenesis, streak gonads, and hypoestrogenism. Curators should connect NUP107, PSMC3IP, FSHR, and NR5A1 to their specific roles and evidence.

      ## Research-artifact cross-check

      Checked `research/46_XX_Gonadal_Dysgenesis-deep-research-openai.md` and `.citations.md`. The artifact supports heterogeneity, but the YAML under-consumes inheritance/subtype and diagnostic/management distinctions.

      ## Content-completeness summary

      - **Phenotypes:** core puberty/amenorrhea/hypergonadotropic hypogonadism features present.
      - **Subtype/lumping:** major gap; map genes/inheritance/subtypes or narrow scope.
      - **Pathophysiology:** needs gene-specific ovarian-development mechanisms.
      - **Management/diagnosis:** missing diagnosis; management should include fertility, bone health, and pubertal induction.
      - **References:** verify gene-specific evidence before adding subtype claims.

      ## Suggested remediation

      Add inheritance/subtype structure, diagnostic evaluation, and gene-specific pathophysiology; broaden management beyond hormone replacement alone.

