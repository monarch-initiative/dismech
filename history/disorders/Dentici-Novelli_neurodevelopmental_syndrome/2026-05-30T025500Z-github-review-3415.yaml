      ## Findings

      1. **Management is missing.** The entry has diagnosis but no treatments/supportive management. Severe ZNF526-related neurodevelopmental disease needs seizure management, feeding/nutrition/developmental support where relevant, ophthalmology/cataract management, movement-disorder care, and genetic counseling.
      2. **Phenotype coverage should be expanded carefully.** The YAML captures developmental delay, microcephaly, seizure, hypotonia, dystonia, simplified gyral pattern, and cataract. Primary literature emphasizes severe microcephaly, simplified gyral pattern, epileptic encephalopathy, bilateral cataracts, and brain/eye-predominant involvement; later case literature may add details.
      3. **Mechanism claims need evidence-source clarity.** `ZNF526-related transcriptional dysregulation`, abnormal brain development, and abnormal eye development are plausible, but if model or expression data are used, source types should be explicit.
      4. **Evidence base is very small.** Frequencies and phenotype generalizations should remain case-based until more patients are available.
      5. **Diagnosis should mention differential/assay context.** ZNF526 molecular testing is present, but the entry should include brain MRI and ophthalmologic diagnosis for cataracts where supported.

      ## Research-artifact cross-check

      Checked `research/Dentici-Novelli_neurodevelopmental_syndrome-deep-research-asta.md` and `.citations.md`. Because it is an Asta artifact, the primary 2021 ZNF526 paper and 2025 case review should be used for concrete curation.

      ## Content-completeness summary

      - **Phenotypes:** mostly core but needs case-review comparison.
      - **Subtype/lumping:** appropriate as ZNF526-related DENNED if scoped to biallelic disease.
      - **Pathophysiology:** needs source-type clarity.
      - **Management/diagnosis:** add seizure, ophthalmology/cataract, developmental, movement, and genetic counseling management.
      - **References:** add verified primary ZNF526 references.

      ## Suggested remediation

      Add management, expand diagnosis, and re-anchor phenotype/mechanism claims to primary ZNF526 literature.

