      ## Completed curation review

      - Disease: **Meacham syndrome**
      - Entry: `kb/disorders/Meacham_syndrome.yaml`
      - Selection basis: #95 of the least-recently edited Mendelian entries
      - Review decision: **Changes required**
      - Validation stance: assumes schema/term/reference validation passes; this is a biological and clinical-content review.

      ## Findings

      1. **Disease boundary with WT1-related syndromes needs explicit handling.** Meacham syndrome overlaps WT1-related Denys-Drash/Frasier/WAGR-like DSD/nephropathy/tumor spectrum. The entry should define whether renal disease/Wilms tumor risk is in or out of scope.
      2. **Diagnosis is missing.** Add karyotype/DSD evaluation, WT1 molecular testing, renal ultrasound/urinalysis, gonadal imaging/histology, cardiac/diaphragm evaluation, and differential diagnosis with other 46,XY DSD and diaphragmatic hernia syndromes.
      3. **Management is incomplete.** Diaphragm repair, gonadectomy, and DSD care are present. Add renal/nephropathy and Wilms tumor surveillance if WT1-related risk applies, hormone replacement/puberty care, cardiac management, and genetic counseling.
      4. **Phenotype coverage is narrow.** Male pseudohermaphroditism/46,XY DSD, persistent Mullerian structures, congenital diaphragmatic hernia, and heart morphology are present; check pulmonary hypoplasia, renal anomalies, and tumor/nephrotic features.
      5. **Pathophysiology should connect WT1 zinc-finger dysfunction to coelomic/mesothelial development and gonadal/diaphragm/heart phenotypes with evidence-source clarity.**

      ## Research-artifact cross-check

      Matching artifacts: Meacham syndrome Asta files. Asta should be treated as leads; WT1 syndrome literature should anchor scope decisions.

      ## Content-completeness summary

      - **Phenotypes:** add renal/tumor/pulmonary features or explicitly scope them out.
      - **Subtype/lumping:** clarify Meacham within WT1-related disorders.
      - **Pathophysiology:** good but needs organ-specific links.
      - **Management/diagnosis:** diagnosis missing; management needs renal/tumor/DSD detail.

