      ## Completed curation review

      - Disease: **Kilquist syndrome**
      - Entry: `kb/disorders/Kilquist_Syndrome.yaml`
      - Selection basis: #19 of 50 least-recently edited Mendelian entries
      - Review decision: **Changes required**
      - Validation stance: assumes schema/term/reference validation passes; this is a biological and clinical-content review.

      ## Findings

      1. **The entry needs a stronger diagnosis/management layer.** It has no diagnosis section and only one generic treatment. Kilquist syndrome / SLC12A2-related disorder should include molecular testing, audiology, neurodevelopmental evaluation, nutrition/growth support, salivary/secretory complications, and multidisciplinary supportive care.
      2. **Phenotype coverage is probably incomplete.** The YAML lists sensorineural hearing impairment, global developmental delay, hypotonia, failure to thrive, and xerostomia. Reported SLC12A2/NKCC1 disease includes severe developmental impairment, congenital/profound hearing loss, vestibular dysfunction in some reports, GI/respiratory/secretory epithelial issues, and potentially broader neurologic findings. These should be compared against the primary cases.
      3. **Evidence is sparse and should be signposted.** This is a very rare disorder. Frequency and pathophysiology statements should avoid appearing cohort-level when based on single families or a handful of cases.
      4. **Pathophysiology is rich but needs evidence-source stratification.** The YAML contains nine mechanism nodes, including cochlear endolymph secretion failure, neuronal ion homeostasis, epithelial secretion failure, and GI/respiratory complications. Ensure each is clearly supported by human, model, or inference evidence; do not overstate tissue-specific effects from general NKCC1 biology.
      5. **Inheritance scope should include variant heterogeneity.** The YAML has autosomal recessive inheritance, but recent literature also reports de novo SLC12A2 variants with vestibular/hearing phenotypes; the entry should decide whether it is strictly biallelic Kilquist syndrome or broader SLC12A2-related disease.

      ## Research-artifact cross-check

      Checked `research/Kilquist_Syndrome-deep-research-asta.md` and `.citations.md`. Because this is an Asta artifact and the disease is ultra-rare, it should be treated as a lead list. PubMed primary literature from 2019 and 2025 should be used to re-anchor the entry.

      ## Content-completeness summary

      - **Phenotypes:** likely incomplete and needs cohort/case-level wording.
      - **Subtype/lumping:** define biallelic Kilquist syndrome versus broader SLC12A2-related disease.
      - **Pathophysiology:** substantial but should distinguish direct evidence from inferred NKCC1 biology.
      - **Management/diagnosis:** missing/too generic; add molecular, audiologic, developmental, nutritional, and secretory-system care.
      - **References:** add primary SLC12A2 disease papers if updating YAML.

      ## Suggested remediation

      Add diagnosis and management, re-check phenotypes against primary cases, and clarify whether the file is Kilquist syndrome strictly or broader SLC12A2-related disease.

