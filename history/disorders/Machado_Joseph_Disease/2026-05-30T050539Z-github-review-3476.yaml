      ## Findings

      1. **GeneReviews exists and should be used.** Spinocerebellar Ataxia Type 3 GeneReviews covers Machado-Joseph disease, repeat testing, subtypes, anticipation, and management. Source: https://www.ncbi.nlm.nih.gov/books/NBK1196/
      2. **Treatment section includes experimental therapies that need status precision.** ASO therapy and intravenous trehalose are listed; these should be explicitly investigational with NCT status/outcomes, not modeled as established treatment. Supportive/rehabilitative care remains the standard.
      3. **Diagnosis is good but repeat-testing details should be added.** ATXN3 CAG repeat testing is present; add repeat-size interpretation, family testing, anticipation, and differential diagnosis among SCAs.
      4. **Subtype mapping needs strengthening.** Type 1-4 subtypes are present; phenotypes should be mapped by age of onset, pyramidal/extrapyramidal signs, neuropathy, and progression.
      5. **Pathophysiology is rich but should distinguish human pathology from model mechanisms.** Ataxin-3 aggregation, deubiquitinase/proteostasis, oligodendrocyte dysfunction, neurodegeneration, and RNA splicing nodes should be evidence-source annotated.

      ## Research-artifact cross-check

      Matching artifacts: Machado-Joseph Disease Falcon files. The YAML captures important mechanisms and trials but under-consumes GeneReviews clinical management and trial-status caution.

      ## Content-completeness summary

      - **Phenotypes:** broad; map to subtype/onset/progression.
      - **Subtype/lumping:** strengthen subtype phenotype mapping.
      - **Pathophysiology:** good but source-type clarity needed.
      - **Management/diagnosis:** add GeneReviews-based management and trial status.

