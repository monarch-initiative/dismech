      ## Completed curation review

      - Disease: **COPA Syndrome**
      - Entry: `kb/disorders/COPA_Syndrome.yaml`
      - Selection basis: #79 of the least-recently edited Mendelian entries
      - Review decision: **Changes required**
      - Validation stance: assumes schema/term/reference validation passes; this is a biological and clinical-content review.

      ## Findings

      1. **Diagnosis is missing.** The entry has extensive phenotype/pathophysiology/treatment content but no diagnosis. Add COPA genetic testing, lung imaging/HRCT, pulmonary function, bronchoscopy/hemorrhage evaluation, autoantibodies, renal urine/biopsy evaluation, and differential diagnosis with SAVI/interferonopathies.
      2. **Genetic section should not imply STING1 is causal for COPA syndrome.** The YAML lists COPA and `STING1 (HAQ allele)`. STING1 HAQ may modify STING signaling; it should be represented as a modifier/therapeutic biology item, not a causal COPA gene.
      3. **Treatment claims need evidence-strength labels.** JAK inhibitors, immunosuppression, lung/kidney transplantation, and STING-directed experimental therapy are present. COPA syndrome treatment evidence is case-series/observational for many therapies; the entry should distinguish established care from experimental mechanisms.
      4. **Clinical-trial NCT should be checked.** NCT06878365 is listed; verify status, intervention, and direct disease relevance.
      5. **Pathophysiology is strong but complex.** COPI cargo recognition, ER-Golgi retrieval, STING activation, ER stress, type I interferon, NF-kappaB, TH17, and organ inflammation are present; link these to lung/kidney/joint phenotypes and evidence type.

      ## Research-artifact cross-check

      Matching artifacts: COPA Syndrome Falcon files. The YAML consumes the STING/interferon mechanism well but needs diagnosis, treatment evidence grading, and STING1 modifier correction.

      ## Content-completeness summary

      - **Phenotypes:** extensive; organ-specific diagnosis/surveillance missing.
      - **Subtype/lumping:** do not conflate COPA causal variants with STING1 modifiers.
      - **Pathophysiology:** strong; connect to clinical endpoints.
      - **Management/diagnosis:** diagnosis missing; treatment evidence/status needs precision.

