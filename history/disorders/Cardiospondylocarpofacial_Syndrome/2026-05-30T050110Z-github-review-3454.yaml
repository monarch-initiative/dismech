      ## Findings

      1. **Management is missing despite multiple actionable organ systems.** The entry has diagnosis and references but no treatment/management. CSCS requires cardiology surveillance, hearing/audiology, orthopedic/spine/joint management, developmental/therapy support, and genetic counseling.
      2. **Phenotype coverage should be checked for MAP3K7-spectrum features.** Short stature, hypotonia, craniofacial dysmorphism, vertebral/carpal/tarsal synostosis, joint hypermobility, hearing impairment, inner-ear malformation, and ASD are present. Add aortic/valvular, skeletal progression, growth, and developmental features if supported.
      3. **Pathophysiology is unusually rich but needs evidence-source clarity.** MAP3K7 haploinsufficiency, TGF-beta/BMP-MAPK-p38 signaling, fibroblast cytoskeleton/autophagy, ciliary cardiomyogenesis, connective tissue, and skeletal segmentation nodes should be separated by direct human evidence versus experimental models.
      4. **Diagnosis is good but should drive surveillance.** MAP3K7 testing, echocardiography, and skeletal radiography are present. Add audiology and orthopedic/spine imaging if supported.
      5. **Disease boundary with frontometaphyseal/synostosis-like disorders should be clear.** The title and phenotype are specific, but the entry should state MAP3K7-related CSCS scope.

      ## Research-artifact cross-check

      Matching artifacts: `research/Cardiospondylocarpofacial_Syndrome-deep-research-asta.md` and `.citations.md`. Asta should be used cautiously; the entry already cites multiple PMIDs and needs management translation more than more mechanisms.

      ## Content-completeness summary

