      ## Findings

      1. **GeneReviews exists and should be used as the baseline.** Inclusion body myopathy with Paget disease and/or frontotemporal dementia / VCP multisystem proteinopathy GeneReviews covers clinical spectrum, surveillance, and management. Source: https://www.ncbi.nlm.nih.gov/books/NBK1476/
      2. **Clinical trials need evidence/status review.** NCT04823143 and NCT01353430 are listed; issue curation should state whether these are active/completed, interventional/observational, and whether they directly target VCP-MSP.
      3. **Phenotype coverage is broad but progression/surveillance should be added.** Muscle weakness, rimmed vacuoles, Paget disease, FTD, ALS, cardiomyopathy, dysphagia, dyspnea, and respiratory failure are present. Add surveillance timing for muscle, bone/Paget, cognition/behavior, respiratory, and cardiac involvement.
      4. **Treatment is supportive but should include Paget/FTD/ALS-specific management.** Current management includes PT, NIV, heart failure drugs, counseling. Consider bisphosphonates for Paget disease, speech/swallow, assistive devices, respiratory monitoring, and dementia/ALS supportive care.
      5. **Pathophysiology is good but could be more atomic.** VCP proteostasis/autophagy/lysosome failures are present; connect to muscle, bone, motor neuron, and CNS tissue degeneration by evidence.

      ## Research-artifact cross-check

      Matching artifacts: VCP Asta and Falcon files. The YAML covers the multisystem phenotype well but under-consumes GeneReviews surveillance/management and trial-status detail.

      ## Content-completeness summary

      - **Phenotypes:** strong; add progression/surveillance.
      - **Subtype/lumping:** appropriate as VCP-MSP; phenotype combinations should be noted.
      - **Pathophysiology:** good; strengthen tissue-specific branches.
      - **Management/diagnosis:** diagnosis present; management needs multisystem surveillance detail.

