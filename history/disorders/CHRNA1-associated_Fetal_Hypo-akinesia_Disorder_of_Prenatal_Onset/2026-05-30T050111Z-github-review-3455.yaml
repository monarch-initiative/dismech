      - Validation stance: assumes schema/term/reference validation passes; this is a biological and clinical-content review.

      ## Findings

      1. **Diagnosis and perinatal management are too limited.** The only treatment is genetic counseling. This prenatal-onset neuromuscular junction disorder needs prenatal ultrasound diagnosis, molecular testing, fetal akinesia sequence evaluation, delivery/perinatal planning, respiratory support/palliative care as appropriate, and recurrence counseling.
      2. **Phenotype coverage should include severity/lethality and neuromuscular junction specificity.** Fetal akinesia, contractures, arthrogryposis, pterygium, cystic hygroma, hydrops, micrognathia, and pulmonary hypoplasia are present. Add reduced fetal movement, polyhydramnios, respiratory failure, and lethal multiple pterygium syndrome overlap where supported.
      3. **Mechanism is correct but needs receptor-complex context.** CHRNA1 encodes the acetylcholine receptor alpha-1 subunit. Biallelic loss-of-function reduces fetal neuromuscular transmission, producing akinesia and contracture sequence. This should be explicit.
      4. **Lumping with congenital myasthenic syndromes should be addressed.** CHRNA1 variants can also cause congenital myasthenic syndrome; this entry should clarify the fetal akinesia/lethal prenatal phenotype boundary.
      5. **Evidence base should be prenatal case-level.** Frequency and phenotype certainty should not be overgeneralized.

      ## Research-artifact cross-check

      Matching artifact: `research/CHRNA1-associated_Fetal_Hypo-akinesia_Disorder_of_Prenatal_Onset-deep-research-codex.md`. The YAML captures the central fetal akinesia mechanism but under-consumes prenatal/perinatal diagnosis and management.

