      ## Completed curation review

      - Disease: **CHRNA1-Associated Fetal Hypo-akinesia Disorder of Prenatal Onset**
      - Entry: `kb/disorders/CHRNA1-associated_Fetal_Hypo-akinesia_Disorder_of_Prenatal_Onset.yaml`
