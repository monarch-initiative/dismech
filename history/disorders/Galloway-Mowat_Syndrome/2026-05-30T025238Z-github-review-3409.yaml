      ## Completed curation review

      - Disease: **Galloway-Mowat syndrome**
      - Entry: `kb/disorders/Galloway-Mowat_Syndrome.yaml`
      - Selection basis: #22 of 50 least-recently edited Mendelian entries
      - Review decision: **Changes required**
      - Validation stance: assumes schema/term/reference validation passes; this is a biological and clinical-content review.

      ## Findings

      1. **Subtype structure exists but needs stronger gene-to-subtype/phenotype mapping.** The YAML has 11 GAMOS subtypes and AR/X-linked inheritance, but phenotypes, mechanisms, and treatments are not clearly subtype-specific. GAMOS is genetically heterogeneous, and KEOPS, WDR73, nuclear pore, and other forms can differ in nephrotic timing, brain malformation, and severity.
      2. **Neuro-renal management is incomplete.** Genetic counseling and kidney transplantation are listed, but the entry should include nephrotic syndrome/proteinuria monitoring, renal failure management, seizure management, nutrition/growth support, neurodevelopmental care, and transplant considerations by subtype.
      3. **Diagnosis is missing.** This disorder needs diagnosis content for microcephaly plus steroid-resistant nephrotic syndrome, renal biopsy/clinical nephrology evaluation where appropriate, brain MRI findings, and molecular testing panels/exome sequencing.
      4. **Phenotype coverage is too narrow for the syndrome.** The YAML includes microcephaly, steroid-resistant nephrotic syndrome, developmental delay, hypotonia, seizures, pachygyria, and brain atrophy. GAMOS literature also reports cerebellar/corpus-callosum abnormalities, optic atrophy, dysmorphism, hiatal hernia in classic descriptions, and variable onset of nephrotic syndrome.
      5. **Mechanism nodes need subtype provenance.** KEOPS/t6A biogenesis, WDR73 cytoskeleton/RNA processing, nuclear pore dysfunction, podocyte failure, and impaired brain growth are all plausible, but each should point to the correct GAMOS subtype/gene evidence.

      ## Research-artifact cross-check

      Checked `research/Galloway-Mowat_Syndrome-deep-research-manual.md`. The YAML captures the major neuro-renal structure but under-consumes subtype-specific clinical and diagnostic distinctions.

      ## Content-completeness summary

      - **Phenotypes:** core features present; expand subtype-relevant neurologic, ocular, GI, and renal timing features.
      - **Subtype/lumping:** subtypes present but not sufficiently connected to mechanisms/phenotypes.
      - **Pathophysiology:** good mechanism categories, but subtype provenance needed.
      - **Management/diagnosis:** major gap; add nephrology, neurology, MRI, molecular diagnosis, transplant/supportive care.
      - **References:** verify gene-subtype mappings with primary literature before updating YAML.

      ## Suggested remediation

      Connect each subtype/gene to its mechanism and phenotype, add diagnosis, and expand neuro-renal management.

