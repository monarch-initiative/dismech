      ## Completed curation review

      - Disease: **Donnai-Barrow syndrome**
      - Entry: `kb/disorders/Donnai-Barrow_syndrome.yaml`
      - Selection basis: #29 of 50 least-recently edited Mendelian entries
      - Review decision: **Changes required**
      - Validation stance: assumes schema/term/reference validation passes; this is a biological and clinical-content review.

      ## Findings

      1. **GeneReviews exists and should be tagged/used.** Donnai-Barrow syndrome GeneReviews is available and should be the baseline. The current entry has no indication of GeneReviews consumption. Source: https://www.ncbi.nlm.nih.gov/books/NBK1878/
      2. **Clinical phenotype coverage is incomplete.** The YAML lists developmental delay, sensorineural hearing impairment, ocular anomalies, seizures, autistic behavior, facial shape, and proteinuria. GeneReviews emphasizes agenesis/hypogenesis of the corpus callosum, diaphragmatic hernia and/or omphalocele, high myopia/retinal detachment risk, sensorineural hearing loss, distinctive facial features, intellectual disability, and low-molecular-weight proteinuria.
      3. **Diagnosis should include the biochemical clue.** The YAML has `LRP2 molecular genetic testing` but not the characteristic low-molecular-weight proteinuria diagnostic pattern that GeneReviews highlights.
      4. **Management is too narrow.** Only antiseizure medication therapy is listed. Donnai-Barrow care should include ophthalmologic surveillance for high myopia/retinal detachment, audiology, renal/proteinuria monitoring, developmental therapies, congenital diaphragmatic/abdominal-wall management when present, and genetic counseling.
      5. **Pathophysiology is too compressed.** `LRP2-related megalin endocytic dysfunction` is the correct anchor, but the entry should connect megalin-mediated endocytosis to renal tubular proteinuria, eye/brain development, and congenital malformation phenotypes.

      ## Research-artifact cross-check

      Checked `research/Donnai-Barrow_syndrome-deep-research-asta.md` and `.citations.md`. Because it is an Asta artifact, GeneReviews should anchor phenotype, diagnostic, and management updates.

      ## Content-completeness summary

      - **Phenotypes:** major gaps relative to GeneReviews: corpus callosum, diaphragmatic hernia/omphalocele, high myopia/retinal detachment, renal tubular proteinuria details.
      - **Subtype/lumping:** appropriate as LRP2-related Donnai-Barrow/FOAR syndrome.
      - **Pathophysiology:** deepen megalin endocytosis-to-organ phenotype links.
      - **Management/diagnosis:** major gap beyond antiseizure therapy and molecular testing.
      - **References:** add/tag GeneReviews if updating YAML.

      ## Suggested remediation

      Use GeneReviews as baseline, add low-molecular-weight proteinuria diagnosis, expand phenotypes, and add ophthalmic/audiologic/renal/developmental management.

