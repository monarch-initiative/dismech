      ## Completed curation review

      - Disease: **UNC13A-Related Congenital NDD with Epilepsy**
      - Entry: `kb/disorders/UNC13A_Congenital_NDD_with_Epilepsy.yaml`
      - Selection basis: #75 of the least-recently edited Mendelian entries
      - Review decision: **Changes required**
      - Validation stance: assumes schema/term/reference validation passes; this is a biological and clinical-content review.

      ## Findings

      1. **Diagnosis is missing.** Add molecular testing for biallelic UNC13A variants, EEG, brain MRI, neuromuscular junction testing where relevant, feeding/respiratory evaluation, and differential diagnosis with congenital myasthenic syndromes and developmental epileptic encephalopathies.
      2. **Treatment evidence needs strong caution.** Pyridostigmine and 3,4-diaminopyridine are listed; these are mechanistically plausible if neuromuscular junction transmission is involved but should be backed by direct case evidence and not generalized to all UNC13A congenital NDD.
      3. **Disease boundary with dominant UNC13A NDD should be explicit.** This entry is autosomal recessive, severe congenital NDD with epilepsy and possible NMJ involvement, while a separate dominant UNC13A movement/seizure disorder exists. The boundary should be clear.
      4. **Phenotype coverage is strong but severity/progression should be added.** Neonatal hypotonia, epilepsy, absent speech, profound ID, microcephaly, thin corpus callosum, ptosis, feeding difficulty, respiratory failure, and hyporeflexia are present. Add survival/course and seizure type where supported.
      5. **Pathophysiology should distinguish synaptic vesicle priming from NMJ effects.** Loss of vesicle priming, cortical hyperexcitability, and impaired NMJ transmission are present; evidence-source distinctions are important.

      ## Research-artifact cross-check

      Matching artifacts: UNC13A congenital NDD Asta and Falcon files. The YAML captures core biology but under-consumes diagnosis and treatment evidence caution.

      ## Content-completeness summary

      - **Phenotypes:** strong; add course/seizure subtype.
      - **Subtype/lumping:** clarify recessive congenital disorder versus dominant UNC13A NDD.
      - **Pathophysiology:** good; split CNS synapse versus NMJ evidence.
      - **Management/diagnosis:** diagnosis missing; treatment evidence needs verification.

