      ## Completed curation review

      - Disease: **Osteogenesis Imperfecta Type VII**
      - Entry: `kb/disorders/Osteogenesis_Imperfecta_Type_VII.yaml`
      - Selection basis: #50 of 50 least-recently edited Mendelian entries
      - Review decision: **Changes required**
      - Validation stance: assumes schema/term/reference validation passes; this is a biological and clinical-content review.

      ## Findings

      1. **OI baseline should be used but this entry needs CRTAP specificity.** General OI GeneReviews is useful for bone-fragility management, but OI type VII is autosomal recessive CRTAP-related disease, not COL1A1/COL1A2-related. The entry should preserve CRTAP-specific mechanism and counseling. Source: https://www.ncbi.nlm.nih.gov/books/NBK1295/
      2. **Diagnosis is missing.** Treatments are present, but there is no diagnosis section. Add clinical/radiographic OI diagnosis, molecular testing for CRTAP and other 3-hydroxylation-complex genes, and differential diagnosis among recessive OI forms.
      3. **Pathophysiology is too compressed.** The YAML has collagen 3-hydroxylation deficiency and osteoblast dysfunction. It should represent the CRTAP-P3H1-cyclophilin B collagen prolyl 3-hydroxylation/chaperone complex, abnormal collagen folding/post-translational modification, bone matrix defects, and potentially lung/connective-tissue consequences where evidence supports them.
      4. **Phenotype coverage should map type VII severity spectrum.** Recurrent fractures, rhizomelia, growth delay, blue sclerae, coxa vara, low BMD, skeletal deformities, Wormian bones, platybasia, dentinogenesis imperfecta, scoliosis, and respiratory insufficiency are present. The entry should distinguish moderate/severe and lethal presentations by evidence.
      5. **Management should include genetic counseling and multisystem surveillance.** Existing treatments are bisphosphonates, orthopedic management, PT, and counseling. Add respiratory, craniovertebral, dental, hearing, pain/mobility, and growth monitoring where supported.

      ## Research-artifact cross-check

      Checked OI type VII cyberian-codex and Falcon artifacts. The YAML captures core CRTAP/OI features but under-consumes diagnostic and CRTAP-complex mechanism depth.

      ## Content-completeness summary

      - **Phenotypes:** broad; map severity/lethality spectrum.
      - **Subtype/lumping:** clarify CRTAP/OI VII versus other recessive OI forms.
      - **Pathophysiology:** deepen collagen 3-hydroxylation complex mechanism.
      - **Management/diagnosis:** diagnosis missing; expand multisystem surveillance.
      - **References:** add OI baseline and CRTAP-specific references if updating YAML.

      ## Suggested remediation

      Add diagnosis, CRTAP-complex mechanism depth, severity-specific phenotype notes, and broader multisystem OI management.

