    summary: >-
      Initial creation of LGMD autosomal dominant entry (MONDO:0015151) with
      four subtypes (D1–D4) and 9 fetched PMIDs.
    details: |
      Created the initial entry for autosomal dominant limb-girdle muscular
      dystrophies (LGMD-D, MONDO:0015151) covering four MONDO-confirmed subtypes:
      - LGMD-D1 (DNAJB6): Z-disc proteostasis / co-chaperone dysfunction
      - LGMD-D2 (TNPO3): splicing factor nuclear import defect
      - LGMD-D3 (HNRNPDL): RNA-binding protein phase separation / impaired fibrillation
      - LGMD-D4 (CAPN3 dominant): sarcomere remodeling defect

      NEC preflight performed: issue #5095 listed incorrect gene assignments
      (D2=TNS3, D4=CAV3). Corrected per MONDO + ENMC 2018 nomenclature:
      D2=TNPO3 (hgnc:17103) and D4=CAPN3 dominant (MONDO:0029133).

      Evidence sourced from 9 PMIDs all fetched and cached:
      PMID:20301490, PMID:26362252, PMID:30055862, PMID:30604053,
      PMID:31034989, PMID:32690349, PMID:36646699, PMID:37346979,
      PMID:39215466.

      Includes investigational DNAJB6b isoform-specific ASO knockdown entry
      (morpholino, RNASE_H_KNOCKDOWN) from PMID:37346979.

      Validations: schema passed, reference validation passed, term validation
      passed (linkml-term-validator direct invocation, CHEBI cache pre-populated).
