    details: |
      Follow-up session addressing the ai4c-agent review of PR #5141.

      Correction to the initial-curation record: the investigational
      DNAJB6b isoform-specific ASO treatment was originally recorded with
      aso_mechanism RNASE_H_KNOCKDOWN. This is biochemically incorrect —
      morpholino (phosphorodiamidate morpholino) oligonucleotides cannot
      recruit RNase H. The value was corrected to STERIC_BLOCKADE, matching
      the morpholino chemistry and PMID:37346979 (isoform-specific knockdown
      via steric blockade of translation). This event supersedes the
      "RNASE_H_KNOCKDOWN" mention in the append-only 2026-07-01 initial record.

      Also in this session:
      - Added evidence blocks to the D2 (PMID:32690349), D3 (PMID:30604053),
        and D4 (PMID:20301490) pathophysiology downstream causal edges to the
        shared "Progressive Proximal Myofiber Degeneration and Weakness" node,
        so all four subtype edges now carry evidence (D3/D4 in the prior push,
        D2 in this one).
      - Added a progression block (adult-onset, slowly progressive,
        proximal-predominant) backed by PMID:31034989.
      - Reverted six unrelated XLA/BTK references_cache files (PMID_16862044,
        PMID_34241796, PMID_37454339, PMID_8332901, PMID_8380905,
        PMID_8425221) to origin/main; they carried only a cosmetic
        reference_id quoting change.
      - Repaired two term-cache CSVs (cache/mondo/terms.csv and
        cache/enums/diseaseterm_f618932bb23f.csv) whose header rows had been
        sorted into the file body, which had failed the validate-terms-schema
        CI step.

      Deferred (documented in the PR): classifications block (harrisons_chapter
      enum lives outside the main schema) and prevalence block (no citable
      source cached). Onset descriptors not added: OnsetEnum has no ADULT value
      and onset is variable across subtypes — captured in the progression block
      instead.

      Validations: schema passed; reference validation passed (all snippets are
      whitespace-normalized exact substrings of their cached abstracts).
