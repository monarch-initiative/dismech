      Completed curation review for `kb/disorders/Thanatophoric_Dysplasia_Type_2.yaml`.

      ## Findings

      1. Blocking: the entry has no `diagnosis` section. TD2 is a highly recognizable prenatal/neonatal skeletal dysplasia and the YAML should include diagnostic handling: prenatal ultrasound findings, radiographic distinction from TD1, molecular confirmation of heterozygous FGFR3 p.Lys650Glu/K650E, and counseling around de novo recurrence risk. The pathophysiology is detailed, but the entry currently lacks the clinical path used to establish the diagnosis.

      2. Blocking/claim-strength issue: the prevalence block infers a TD2-specific birth prevalence from overall thanatophoric dysplasia prevalence and the subtype share in a molecular series. That inference should be clearly marked as approximate and secondary, or split so directly sourced overall TD prevalence is not presented as a directly measured TD2 prevalence. The existing text is transparent, but it still risks over-interpreting the source as population-based TD2 epidemiology.

      3. Non-blocking but actionable: the `Statin therapy (preclinical)` treatment must remain clearly non-clinical. The supporting evidence is iPSC/model work in FGFR3 skeletal dysplasia, including TD1/ACH contexts, not clinical TD2 treatment evidence. Consider moving this to a research/experimental-therapy note or tightening the treatment text so curators do not read it as a candidate clinical intervention for TD2 newborns.

      4. Non-blocking: supportive/palliative care should better separate typical TD2 perinatal lethality from the broader thanatophoric dysplasia long-term-survivor literature. The cited survivor paper is useful, but the entry should state whether the management claims apply to TD generally or to documented TD2 survivors specifically.

      5. Non-blocking: the Falcon research artifact highlights brain/cortical malformations, foramen magnum stenosis, and prenatal exome sequencing utility. These are present in the mechanistic narrative to varying degrees, but diagnosis/management should explicitly consume them where clinically relevant.

      ## Research Cross-Check

      - Phenotype coverage: strong for the skeletal core, thoracic insufficiency, cloverleaf skull, and severe limb shortening; check neurologic/cranial-base complications against the phenotype list.
      - Subtype completeness: TD2 vs TD1 distinction is noted; diagnosis should make the boundary operational.
      - Pathophysiology depth: strong. FGFR3 K650E, STAT/MAPK/PLCgamma, chondrocyte arrest, synchondrosis closure, and cortical effects are well covered.
      - Treatments and clinical trials: supportive care is appropriate; statin therapy should be constrained to preclinical/research context.
      - Genetics: adequate for de novo FGFR3 K650E, but diagnostic confirmation and recurrence counseling are missing.
      - Biomarkers/diagnostics: diagnosis section missing.
      - Research consumption: Asta/Falcon research is substantially consumed mechanistically, but under-consumed for diagnosis and clinical management.

      ## Sources Used

      - Local research artifacts: `research/Thanatophoric_Dysplasia_Type_2-deep-research-asta.md`, `research/Thanatophoric_Dysplasia_Type_2-deep-research-falcon.md`
