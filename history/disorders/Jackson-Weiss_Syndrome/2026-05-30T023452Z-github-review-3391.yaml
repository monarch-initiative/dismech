      ## Completed curation review

      - Disease: **Jackson-Weiss Syndrome**
      - Entry: `kb/disorders/Jackson-Weiss_Syndrome.yaml`
      - Selection basis: #5 of 50 least-recently edited Mendelian entries
      - Review decision: **Changes required**
      - Validation stance: this review assumes schema, ontology-term, and reference validation pass; findings below are biological/clinical/content issues.

      ## Findings

      1. **The pathophysiology is too shallow for a mechanism entry.** The YAML has one pathophysiology node, `FGFR2 Gain-of-Function Signaling`, followed directly by craniosynostosis and foot deformities. The research artifact supports a more informative chain: FGFR2 IgIII cysteine substitutions can cause constitutive or hypersensitive receptor signaling; downstream MAPK/ERK, PI3K/AKT, PLC-gamma, RUNX2, and BMP crosstalk alter osteoprogenitor/osteoblast differentiation; this produces premature suture osteogenesis and foot/tarsal developmental abnormalities. At least the FGFR2 -> MAPK/ERK/RUNX2 -> premature osteoblast differentiation -> craniosynostosis branch should be modeled.

      2. **The entry does not sufficiently distinguish Jackson-Weiss from neighboring FGFR2 craniosynostosis syndromes.** Current genetics evidence explicitly says Crouzon, Jackson-Weiss, and Pfeiffer can be a spectrum and that C342 variants occur in multiple syndromes. That makes the disease-boundary issue central, not optional. The YAML includes `Absence of Hand Abnormalities`, which is good, but it should more clearly frame the diagnostic phenotype as craniosynostosis plus foot anomalies, especially broad great toes/tarsal-metatarsal fusion, with relative hand sparing, rather than treating the disorder as generic FGFR2 craniosynostosis.

      3. **Clinical management is under-modeled.** The treatment section lists cranial vault surgery and foot surgery, but the entry lacks diagnostic/surveillance content for craniosynostosis evaluation, intracranial pressure risk, ophthalmologic/proptosis/vision surveillance, airway/sleep-breathing concerns where relevant, and orthopedic functional assessment of feet. These are clinically actionable consequences of the modeled disease and should not be left implicit.

      4. **Phenotype coverage is missing common craniofacial and complication context.** The YAML covers craniosynostosis, midface retrusion, broad great toes, tarsal-metatarsal fusion, short first metatarsal, and absence of hand abnormalities. The research artifact also emphasizes variable multisuture craniosynostosis, proptosis/shallow orbits, ocular hypertelorism/strabismus/ptosis, cleft/high palate/dental/ear findings in some individuals, increased intracranial pressure as a secondary complication, and generally normal intelligence with appropriate treatment. A curator should add high-value features or explicitly scope them out.

      5. **Variant-specific content should be presented as allelic/spectrum evidence, not a clean genotype-phenotype rule.** The YAML has p.Cys342Arg and p.Cys342Ser items. Evidence says these variants have been reported across Jackson-Weiss, Crouzon, and Pfeiffer phenotypes. The curation should avoid implying either variant uniquely defines Jackson-Weiss; use them to support FGFR2 allelism and variable expressivity.

      ## Research-artifact cross-check

      Checked:
      - `research/Jackson-Weiss_Syndrome-deep-research-cyberian-codex.md`
      - `research/Jackson-Weiss_Syndrome-deep-research-cyberian-codex.md.citations.md`
      - `research/Jackson-Weiss_Syndrome-deep-research-perplexity.md`
      - `research/Jackson-Weiss_Syndrome-deep-research-perplexity.md.citations.md`

      The YAML captures the causal gene and the distinguishing foot phenotype, but it under-consumes the mechanistic and management parts of the research artifact. The artifact's most useful additions are downstream FGFR2 signaling branches, RUNX2/osteoblast differentiation, suture mesenchyme biology, secondary intracranial-pressure/ophthalmic risks, and the explicit Crouzon/Pfeiffer/Apert spectrum boundary.

      ## Content-completeness checklist

      - **Phenotypes:** Gaps noted. Add/refine craniofacial, ophthalmologic, and secondary intracranial-pressure complications where supported.
      - **Subtype / lumping-splitting:** Needs explicit boundary handling with Crouzon/Pfeiffer/Apert and other FGFR2 craniosynostosis syndromes.
      - **Pathophysiology:** Gaps noted. Current one-node mechanism is insufficient for the available FGFR2 signaling evidence.
      - **Treatments / management:** Gaps noted. Surgery labels exist but diagnostic/surveillance/complication management are missing.
      - **Genetics:** Partial. FGFR2 and C342 variants are present, but allelic heterogeneity and variable expressivity need stronger framing.
      - **Diagnostics / biomarkers:** Missing. Add clinical/radiographic craniosynostosis and foot evaluation; include genetic testing scope across FGFR craniosynostosis genes if supported.
      - **References:** Existing PMIDs support key claims; any new mechanistic additions should use verified abstracts/cached references.
      - **Overall consumption:** The entry is accurate at a high level but too thin mechanistically and clinically for independent curation readiness.

      ## Suggested remediation

      Expand the pathograph downstream of FGFR2, strengthen disease-boundary text around foot-predominant Jackson-Weiss versus other FGFR2 syndromes, add surveillance/diagnostic content, and clarify that C342 variants support allelic-spectrum biology rather than a Jackson-Weiss-only variant rule.

