      ## Findings

      1. GeneReviews/diagnosis consumption check: the entry has diagnosis content and a GeneReviews tag. Re-check that the diagnostic criteria and Clinical Characteristics from the GeneReviews baseline are fully reflected in phenotypes, diagnosis, treatment/surveillance, and genetic counseling.
      2. Research-artifact consumption: matching deep-research artifact(s) exist and should be treated as first-class review inputs. Compare the YAML against the artifact(s), especially for central mechanisms, subtype-specific features, treatments/trials, and diagnostic/surveillance details rather than only schema-valid content.
      3. Lumping/splitting review needed: this entry appears to cover a spectrum or umbrella concept with multiple subtypes (SCA5, SCA6, SCA11, SCA14). Confirm that one disease-level pathomechanism is defensible; otherwise split gene/subtype-specific mechanisms or make subtype-specific phenotype, treatment, diagnosis, and genetic assertions explicit.
      4. Pathophysiology review: the main modeled mechanisms include Purkinje Cell Calcium Dysregulation, Cytoskeletal and Scaffold Protein Defects in Purkinje Cells, Tau-Tubulin Kinase 2 Loss and Purkinje Cell Dysfunction, PKC Gamma Signaling Dysregulation. Check that each is an atomic event with direct evidence and that downstream edges do not encode multi-step chains or unsupported causal leaps from gene/product defect to organ-level phenotype.
      5. Treatment modeling: treatments are present (Supportive care and rehabilitation, Acetazolamide for episodic features (SCA6)). Check therapeutic agents, subtype applicability, evidence strength, and surveillance/supportive-care needs; avoid broad treatment claims that are not tied to the relevant phenotype or disease stage.
      6. Evidence/reference check: top references include PMID:15362569, PMID:18687887, PMID:28554312, PMID:21827906. Spot-check that snippets directly support the specific claim, frequency, and evidence_source classification, especially where the same PMID is reused across phenotype, mechanism, and treatment assertions.

