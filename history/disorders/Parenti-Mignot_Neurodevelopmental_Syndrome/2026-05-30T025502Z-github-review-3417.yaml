      ## Completed curation review

      - Disease: **Parenti-Mignot Neurodevelopmental Syndrome**
      - Entry: `kb/disorders/Parenti-Mignot_Neurodevelopmental_Syndrome.yaml`
      - Selection basis: #30 of 50 least-recently edited Mendelian entries
      - Review decision: **Changes required**
      - Validation stance: assumes schema/term/reference validation passes; this is a biological and clinical-content review.

      ## Findings

      1. **Inheritance is missing.** The YAML has no `inheritance:` section despite CHD5-related Parenti-Mignot syndrome being a dominant neurodevelopmental disorder, often de novo. This is an actionable curation gap for recurrence-risk counseling.
      2. **Phenotype coverage should incorporate newer natural-history data.** The YAML lists developmental delay, intellectual disability, language impairment, behavioral abnormality, epilepsy, hypotonia, craniosynostosis, and facial shape. A 2026 adult case report reiterates behavioral disturbances, autism/social problems, obsessive-compulsive/aggressive behavior, epilepsy, hypotonia, subtle facial dysmorphism, and craniosynostosis; adult cognitive/behavioral course should be checked.
      3. **Treatment evidence is generic.** Supportive care, speech therapy, physical therapy, and genetic counseling are present, but seizure management/EEG follow-up, behavioral/psychiatric supports, and craniosynostosis management should be represented when supported.
      4. **Diagnosis is good but could be more syndrome-specific.** Exome sequencing, neuropsychological assessment, and EEG are present. Craniosynostosis imaging/evaluation and developmental/behavioral assessment should be linked to the phenotype set.
      5. **Pathophysiology needs evidence-source caution.** CHD5/NuRD dysfunction and cortical/synaptic development are plausible, but the entry should distinguish patient-derived genetic evidence from experimental chromatin/neurodevelopment models.

      ## Research-artifact cross-check

      Checked `research/Parenti-Mignot_Neurodevelopmental_Syndrome-deep-research-asta.md` and `.citations.md`. This Asta artifact should be supplemented with the original 2021 CHD5 cohort and newer 2026 adult case literature.

      ## Content-completeness summary

      - **Phenotypes:** good core set; add behavior/adult course details where supported.
      - **Subtype/lumping:** appropriate as CHD5-related syndrome.
      - **Pathophysiology:** needs evidence-source stratification.
      - **Management/diagnosis:** add inheritance, seizure/behavior/craniosynostosis management.
      - **References:** add primary CHD5 cohort and recent adult case if updating YAML.

      ## Suggested remediation

      Add autosomal dominant/de novo inheritance, update phenotype/management against primary and 2026 literature, and refine mechanism evidence strength.

