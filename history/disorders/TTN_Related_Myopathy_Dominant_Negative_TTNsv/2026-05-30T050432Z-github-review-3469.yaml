      - Validation stance: assumes schema/term/reference validation passes; this is a biological and clinical-content review.

      ## Findings

      1. **Diagnosis and management are missing.** The entry has inheritance/phenotypes/pathophysiology/genetics but no diagnosis or treatments. Add muscle MRI/biopsy, CK, EMG, cardiac evaluation, respiratory assessment, TTN structural-variant testing, and multidisciplinary neuromuscular/cardiology care.
      2. **Disease boundary needs precision.** TTN-related disease is extremely heterogeneous. This entry is specifically in-frame multi-exon structural variants with dominant-negative internally deleted titin, not truncating TTN dilated cardiomyopathy or recessive congenital titinopathy. The scope should be explicit.
      3. **Phenotype coverage is too narrow.** Limb-girdle/distal weakness, contractures, and DCM are present. Add respiratory involvement, axial weakness, progression, age of onset, myopathy pattern, and cardiac penetrance where supported.
      4. **Pathophysiology is useful but needs sarcomere detail.** Internally deleted titin and disrupted sarcomeric architecture are correct; connect to myofibrillar structure, passive elasticity, force transmission, and cardiomyopathy.
      5. **Genetic testing should mention SV detection limitations.** In-frame TTN structural variants may require CNV/SV-aware sequencing analysis, MLPA, genome sequencing, or RNA confirmation.

      ## Research-artifact cross-check

      Matching artifacts: `research/TTN_Related_Myopathy_Dominant_Negative_TTNsv-deep-research-asta.md` and `.citations.md`. Asta should be treated as leads; TTN structural variant primary papers should anchor updates.

      ## Content-completeness summary

      - **Phenotypes:** incomplete for onset/progression/respiratory/cardiac detail.
      - **Subtype/lumping:** major issue: TTNsv-specific scope versus broader titinopathies.
      - **Pathophysiology:** good but should deepen sarcomeric mechanism.
      - **Management/diagnosis:** absent.

