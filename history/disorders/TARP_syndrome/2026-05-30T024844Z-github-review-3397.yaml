      ## Completed curation review

      - Disease: **TARP syndrome**
      - Entry: `kb/disorders/TARP_syndrome.yaml`
      - Selection basis: #10 of 50 least-recently edited Mendelian entries
      - Review decision: **Changes required**
      - Validation stance: assumes schema/term/reference validation passes; this is a biological and clinical-content review.

      ## Findings

      1. **The genetic section incorrectly includes downstream splicing targets as disease genes.** The YAML lists `RBM10`, `NUMB`, `VCL`, `CD44`, and `TNC` under `genetic:`. RBM10 is the causal gene for TARP syndrome; the others are better treated as affected transcripts/pathway targets if evidence supports them. Keeping them in `genetic:` risks implying multiple causal Mendelian genes.
      2. **Treatment evidence needs claim-evidence verification.** Cardiac surgery, palatal cleft repair, orthopedic surgery, airway management, and multidisciplinary supportive care are plausible, but TARP literature is mostly case-based and often documents phenotype rather than treatment efficacy. Each treatment claim should be checked to ensure the snippet supports intervention/management, not just the feature.
      3. **Frequency and phenotype certainty should be conservative.** The entry has 12 phenotypes, including less classic findings such as vitelline vascular remnant, horseshoe kidney, optic nerve atrophy, esotropia, and hearing impairment. Because TARP has historically few affected individuals and long-term survivors are uncommon but increasingly reported, frequency bands should not be over-inferred from single families/case reports.
      4. **Mechanism should distinguish splicing dysregulation from DNA-replication/fork dysfunction.** The YAML includes both RBM10-mediated alternative splicing dysregulation and splicing-independent replication fork dysfunction. These may both be relevant, but they should be linked to distinct evidence sources and downstream disease features rather than combined as equally established TARP mechanisms.
      5. **Clinical scope should include survival variability.** Newer reports show milder/long-surviving TARP-like presentations. The entry should capture that the classic acronym phenotype is not the full modern RBM10 spectrum.

      ## Research-artifact cross-check

      Checked `research/TARP_syndrome-deep-research-cyberian-codex.md`, `.citations.md`, `research/TARP_syndrome-deep-research-falcon.md`, and `.citations.md`. The artifacts support RBM10 as the causal gene and splicing biology, but they also reinforce that many downstream genes are mechanistic targets rather than Mendelian causal genes.

      ## Content-completeness summary

      - **Phenotypes:** broad but frequency confidence needs caution.
      - **Subtype/lumping:** consider classic TARP versus broader RBM10-related phenotypic spectrum.
      - **Pathophysiology:** distinguish splicing and replication-fork mechanisms with evidence strength.
      - **Treatments/diagnosis:** add molecular diagnosis and phenotype-driven supportive/surgical care with evidence-appropriate wording.
      - **Genetics:** move NUMB/VCL/CD44/TNC out of causal `genetic:` content unless there is direct gene-disease evidence.

      ## Suggested remediation

      Limit `genetic:` to RBM10, move downstream transcripts to pathophysiology if needed, re-check treatment evidence, and make phenotype/frequency statements appropriately case-series based.

