      ## Completed curation review

      - Disease: **Osteopetrosis**
      - Entry: `kb/disorders/Osteopetrosis.yaml`
      - Selection basis: #56 of the least-recently edited Mendelian entries
      - Review decision: **Changes required**
      - Validation stance: assumes schema/term/reference validation passes; this is a biological and clinical-content review.

      ## Findings

      1. **The entry is a heterogeneous umbrella and needs subtype-specific modeling.** The YAML has ARO, ADO2, and IRO subtypes, but many phenotype, genetic, and treatment claims are global. TCIRG1, CLCN7, OSTM1, TNFSF11, TNFRSF11A, and SNX10 map to different inheritance, severity, osteoclast-rich/poor biology, and treatment response.
      2. **HSCT must be subtype-qualified.** Hematopoietic stem cell transplantation is appropriate for many severe osteoclast-intrinsic ARO forms, but not for all genetic forms, especially osteoclast-poor RANKL/RANK pathway distinctions or ADO2. The treatment section should not imply uniform benefit.
      3. **Diagnosis and surveillance are missing or too implicit.** Add radiographic skeletal survey, blood counts/marrow failure, cranial nerve/vision/hearing monitoring, dental/osteomyelitis risk, calcium/phosphate management, genetic testing, and subtype-specific workup.
      4. **Pathophysiology is good but too broad.** Defective acidification, osteoclast differentiation defects, and marrow obliteration are the correct pillars. Link them to specific genes/subtypes and downstream phenotypes.
      5. **GeneReviews exists for CLCN7-related osteopetrosis and should be considered for the CLCN7 branch.** Source: https://www.ncbi.nlm.nih.gov/books/NBK1127/

      ## Research-artifact cross-check

      Matching artifacts include osteopetrosis Asta/OpenAI files and subtype Falcon files for autosomal dominant type II and autosomal recessive osteopetrosis. The YAML consumes umbrella mechanisms but under-consumes subtype-specific diagnosis, treatment, and genetic distinctions.

      ## Content-completeness summary

      - **Phenotypes:** broad and useful; assign severity/features to ARO/ADO2/IRO where supported.
      - **Subtype/lumping:** major action item.
      - **Pathophysiology:** split by osteoclast acidification versus differentiation and gene.
      - **Management/diagnosis:** add subtype-specific HSCT, supportive, cranial nerve, dental, marrow, and calcium monitoring.
      - **References:** use subtype-specific GeneReviews/primary sources.

      ## Sources used

      - GeneReviews, CLCN7-Related Osteopetrosis: https://www.ncbi.nlm.nih.gov/books/NBK1127/
      - MedlinePlus osteopetrosis: https://medlineplus.gov/genetics/condition/osteopetrosis/

