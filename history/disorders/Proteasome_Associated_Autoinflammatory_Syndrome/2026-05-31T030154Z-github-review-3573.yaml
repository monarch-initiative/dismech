      4. Pathophysiology review: the main modeled mechanisms include Proteasome Subunit and Assembly-Factor Loss of Function, Impaired Proteasome Biogenesis and Activity, Proteotoxic and Endoplasmic Reticulum Stress, PKR-Mediated Type I Interferon Signaling. Check that each is an atomic event with direct evidence and that downstream edges do not encode multi-step chains or unsupported causal leaps from gene/product defect to organ-level phenotype.
      5. Treatment modeling: treatments are present (Baricitinib therapy, Anifrolumab therapy). Check therapeutic agents, subtype applicability, evidence strength, and surveillance/supportive-care needs; avoid broad treatment claims that are not tied to the relevant phenotype or disease stage.
      6. Evidence/reference check: top references include PMID:31827472, PMID:37600812, PMID:21129723, PMID:31046790. Spot-check that snippets directly support the specific claim, frequency, and evidence_source classification, especially where the same PMID is reused across phenotype, mechanism, and treatment assertions.

