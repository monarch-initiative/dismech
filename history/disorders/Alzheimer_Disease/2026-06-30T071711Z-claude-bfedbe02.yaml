    details: |
      Curated from Tyagi et al., "Arc mediates intercellular tau transmission via
      extracellular vesicles," Cell 2026 (PMID:42372723; DOI:10.1016/j.cell.2026.06.008).

      Additions to kb/disorders/Alzheimer_Disease.yaml:
      - New EMERGING mechanistic_hypotheses group 'ev_mediated_tau_propagation_model'
        (Arc-Dependent EV-Mediated Tau Propagation Model) with MODEL_ORGANISM and
        HUMAN_CLINICAL evidence.
      - New PROVISIONAL pathophysiology node 'Intercellular Tau Transmission via
        Extracellular Vesicles': Arc (hgnc:648) directly binds tau and, with IRSp53/
        BAIAP2 (hgnc:947), packages seed-competent (phospho)tau into neuronal EVs;
        EV-tau is taken up by recipient neurons and seeds endogenous tau aggregation.
        Genes ARC, MAPT, BAIAP2; GO processes EV biogenesis (GO:0140112), protein
        secretion (GO:0009306), amyloid fibril formation (GO:1990000).
      - Downstream edges: Neurofibrillary Tangle Formation -> Intercellular Tau
        Transmission (Arc packages intracellular tau into EVs) and Intercellular Tau
        Transmission -> Neurofibrillary Tangle Formation (EV-tau seeding in recipient
        neurons).

      All snippets verified as exact substrings of the cached PubMed abstract.
