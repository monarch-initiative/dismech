      ## Completed curation review

      - Disease: **46,XY complete gonadal dysgenesis**
      - Entry: `kb/disorders/46_XY_complete_gonadal_dysgenesis.yaml`
      - Selection basis: #53 of the least-recently edited Mendelian entries
      - Review decision: **Changes required**
      - Validation stance: assumes schema/term/reference validation passes; this is a biological and clinical-content review.

      ## Findings

      1. **Inheritance and subtype structure are missing.** The YAML lists SRY, DHH, and NR5A1 but has no inheritance section or subtype mapping. 46,XY complete gonadal dysgenesis is genetically heterogeneous; SRY is often de novo or Y-linked, DHH can be autosomal recessive, and NR5A1 can be autosomal dominant with variable expressivity.
      2. **Management is incomplete and too narrow.** Prophylactic gonadectomy is essential because dysgenetic gonads with Y-chromosome material carry gonadoblastoma risk, but the entry should also include estrogen replacement/puberty induction, fertility counseling, bone-health monitoring, DSD multidisciplinary care, psychosocial support, and genetic counseling.
      3. **Diagnosis should include the full clinical workup.** Karyotype, gonadal histopathology, and targeted molecular testing are present; add endocrine labs, pelvic/abdominal imaging for uterus/gonads, tumor-risk evaluation, and differential diagnosis with androgen insensitivity and other 46,XY DSD.
      4. **Phenotype coverage is too narrow.** The YAML captures gonadal dysgenesis, delayed puberty, primary amenorrhea, hypergonadotropic hypogonadism, and female phenotype with 46,XY karyotype. Add streak gonads, normal Mullerian structures/uterus where applicable, infertility, and tumor predisposition.
      5. **Mechanisms should map by gene.** `Failure of testis-determining signaling` is correct but should distinguish SRY testis-determination failure, DHH/Sertoli-Leydig development, and NR5A1 steroidogenic/gonadal development effects.

      ## Research-artifact cross-check

      Matching artifacts: `research/46_XY_complete_gonadal_dysgenesis-deep-research-asta.md` and `.citations.md`. Because this is Asta retrieval, gene-specific claims should be verified against primary DSD literature before updating YAML.

      ## Content-completeness summary

      - **Phenotypes:** add tumor risk, streak gonads, infertility, Mullerian anatomy.
      - **Subtype/lumping:** major gap; map genes to inheritance and clinical subtypes.
      - **Pathophysiology:** needs gene-specific testis-determination branches.
      - **Management/diagnosis:** expand beyond gonadectomy.
      - **References:** verify gene-specific evidence before adding claims.

