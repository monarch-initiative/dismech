      ## Completed curation review

      - Disease: **Spondylocarpotarsal Synostosis Syndrome**
      - Entry: `kb/disorders/Spondylocarpotarsal_Synostosis_Syndrome.yaml`
      - Selection basis: #46 of 50 least-recently edited Mendelian entries
