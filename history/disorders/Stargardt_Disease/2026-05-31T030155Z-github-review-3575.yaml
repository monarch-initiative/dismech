      ## Findings

      1. Actionable baseline check: a `diagnosis` section exists, but no top-level GeneReviews tag was detected in the YAML. For this Mendelian entry, confirm whether a GeneReviews article exists and either add/tag it or record why no GeneReviews baseline applies.
      2. Research-artifact consumption: matching deep-research artifact(s) exist and should be treated as first-class review inputs. Compare the YAML against the artifact(s), especially for central mechanisms, subtype-specific features, treatments/trials, and diagnostic/surveillance details rather than only schema-valid content.
      3. Subtype completeness: `has_subtypes` is present (Stargardt disease 1 (STGD1), Stargardt disease 3 (STGD3), Stargardt disease 4 (STGD4)). Verify that subtype-specific phenotypes, mechanisms, treatments, diagnosis, and genetic contexts are attached to the correct subtype rather than left as broad disease-level claims.
      4. Pathophysiology review: the main modeled mechanisms include ABCA4 transporter dysfunction, Retinoid-adduct retention and bisretinoid precursor formation, Lipofuscin and A2E accumulation in RPE, RPE endo-lysosomal dysfunction. Check that each is an atomic event with direct evidence and that downstream edges do not encode multi-step chains or unsupported causal leaps from gene/product defect to organ-level phenotype.
      5. Treatment/trial alignment: both `treatments` and `clinical_trials` are present. Verify that trial interventions, phases/statuses, target phenotypes, and treatment entries agree, and distinguish approved/standard care from investigational or case-report therapy.
      6. Evidence/reference check: top references include PMID:37834872, PMID:20633576, PMID:29416601, PMID:9054934. Spot-check that snippets directly support the specific claim, frequency, and evidence_source classification, especially where the same PMID is reused across phenotype, mechanism, and treatment assertions.

