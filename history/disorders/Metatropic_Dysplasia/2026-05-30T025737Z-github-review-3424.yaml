      ## Completed curation review

      - Disease: **Metatropic Dysplasia**
      - Entry: `kb/disorders/Metatropic_Dysplasia.yaml`
      - Selection basis: #37 of 50 least-recently edited Mendelian entries
      - Review decision: **Changes required**
      - Validation stance: assumes schema/term/reference validation passes; this is a biological and clinical-content review.

      ## Findings

      1. **TRPV4 GeneReviews should be used as baseline.** Autosomal dominant TRPV4-related disorders GeneReviews includes metatropic dysplasia and places it in the TRPV4 skeletal dysplasia continuum. Source: https://www.ncbi.nlm.nih.gov/books/NBK201366/
      2. **Management is too generic for the risk profile.** The YAML has one treatment, `Supportive Respiratory and Orthopedic Management`. Metatropic dysplasia requires cervical spine/odontoid assessment, spinal stenosis/myelopathy monitoring, progressive kyphoscoliosis care, respiratory/thoracic restriction management, anesthesia precautions, and orthopedic/rehab planning.
      3. **Diagnosis is present but should be more specific.** The diagnosis section says clinical, radiographic, and molecular diagnosis; add key radiographic hallmarks and TRPV4 testing context, including differential diagnosis with other TRPV4 skeletal dysplasias.
      4. **Phenotype coverage is strong but needs progression.** Kyphoscoliosis and spinal canal stenosis are present; the characteristic transition from short-limb infant habitus to short-trunk/progressive spinal disease should be captured if supported.
      5. **Pathophysiology should connect TRPV4 channel hyperactivity to chondrocyte/growth-plate and spinal outcomes.** Current mechanism is only two nodes; more atomic calcium/channel, chondrocyte differentiation, endochondral ossification, and vertebral/spinal consequences would make the pathograph more actionable.

      ## Research-artifact cross-check

      Checked `research/Metatropic_Dysplasia-deep-research-codex.md`, `research/Metatropic_Dysplasia-deep-research-manual.md`, and `.citations.md`. The YAML covers central features but under-consumes GeneReviews-style management and TRPV4 continuum context.

      ## Content-completeness summary

      - **Phenotypes:** broad; add clinical-course/progression framing.
      - **Subtype/lumping:** clarify position in TRPV4-related skeletal dysplasia continuum.
      - **Pathophysiology:** deepen TRPV4 channel-to-growth-plate/spine sequence.
      - **Management/diagnosis:** major gap in cervical/spinal/respiratory/anesthesia care.
      - **References:** add TRPV4 GeneReviews if updating YAML.

      ## Suggested remediation

      Add TRPV4 baseline, refine diagnosis/progression, expand management, and deepen the pathograph.

