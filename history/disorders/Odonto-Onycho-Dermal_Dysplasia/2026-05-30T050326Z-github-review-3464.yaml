      ## Completed curation review

      - Disease: **Odonto-Onycho-Dermal Dysplasia**
      - Entry: `kb/disorders/Odonto-Onycho-Dermal_Dysplasia.yaml`
      - Selection basis: #72 of the least-recently edited Mendelian entries
      - Review decision: **Changes required**
      - Validation stance: assumes schema/term/reference validation passes; this is a biological and clinical-content review.

      ## Findings

      1. **Subtype structure needs disease-boundary review.** The YAML includes OODD, Schopf-Schulz-Passarge syndrome, and STHAG4 under WNT10A. These are allelic ectodermal dysplasia presentations, but phenotype/management should be subtype-specific.
      2. **Diagnosis is too generic.** `Clinical Diagnosis` is insufficient. Add WNT10A molecular testing, dental radiographs, dermatologic/nail/hair evaluation, eyelid apocrine hidrocystoma assessment for SSPS, and differential diagnosis with EDA/EDAR/EDARADD ectodermal dysplasias.
      3. **Management should be subtype- and organ-specific.** Dental prosthetics/implants, dermatologic care, and counseling are present. Add palmoplantar keratoderma/hyperhidrosis management, nail/hair care, ophthalmology/eyelid lesion management for SSPS, and long-term dental surveillance.
      4. **Pathophysiology is too compressed.** WNT10A loss and ectodermal appendage defects are correct; add Wnt signaling effects on tooth, hair, nail, sweat gland, and palmoplantar epidermal development.
      5. **Phenotypes need subtype assignment.** Oligodontia, selective tooth agenesis, smooth tongue, PPK, hyperhidrosis, dry skin, nail dystrophy, sparse hair, and hidrocystomas should be mapped to OODD/SSPS/STHAG4 as appropriate.

      ## Research-artifact cross-check

      Matching artifacts: `research/Odonto-Onycho-Dermal_Dysplasia-deep-research-falcon.md` and `.citations.md`. The YAML covers the WNT10A umbrella but under-consumes diagnosis and subtype assignment.

      ## Content-completeness summary

      - **Phenotypes:** broad; map by subtype.
      - **Subtype/lumping:** clarify WNT10A allelic spectrum.
      - **Pathophysiology:** add organ-specific Wnt development detail.
      - **Management/diagnosis:** expand diagnosis and organ-specific care.

