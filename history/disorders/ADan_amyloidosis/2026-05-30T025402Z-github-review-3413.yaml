      ## Completed curation review

      - Disease: **ADan amyloidosis**
      - Entry: `kb/disorders/ADan_amyloidosis.yaml`
      - Selection basis: #26 of 50 least-recently edited Mendelian entries
      - Review decision: **Changes required**
      - Validation stance: assumes schema/term/reference validation passes; this is a biological and clinical-content review.

      ## Findings

      1. **Diagnosis and management are largely absent.** The YAML has ITM2B genetic testing but no clinical diagnostic, neuroimaging, neuropathology, audiology/ophthalmology, dementia/ataxia care, or family counseling management.
      2. **Human ADan amyloid pathology should be separated from model-derived BRI2/synaptic mechanisms.** The YAML includes human amyloid deposition and neurofibrillary degeneration, plus `Synaptic BRI2 loss` and `Impaired glutamatergic transmission`. The latter are likely model/mechanistic inferences and should not be presented at the same certainty level as human Danish dementia pathology unless direct evidence supports it.
      3. **Phenotype coverage is too narrow.** Cataract, sensorineural hearing impairment, ataxia, and dementia are present. Familial Danish dementia/ADan amyloidosis also includes progressive neuropsychiatric/cognitive decline, spasticity or motor findings in some descriptions, cerebral amyloid angiopathy, and neuropathologic overlap with Alzheimer-like changes.
      4. **Progression/natural history should be modeled.** This is a progressive adult-onset neurodegenerative amyloidosis; the entry should not read as a static four-feature syndrome.
      5. **Pathology and biomarker content should be explicit.** ADan peptide generated by the ITM2B Danish mutation, parenchymal/vascular amyloid deposition, neurofibrillary tangles, and cerebral amyloid angiopathy are central disease mechanisms/diagnostic context.

      ## Research-artifact cross-check

      Checked `research/ADan_amyloidosis-deep-research-asta.md` and `.citations.md`. Because the artifact is Asta retrieval, the entry should be rechecked against primary familial Danish dementia/ITM2B literature before adding mechanistic detail.

      ## Content-completeness summary

      - **Phenotypes:** incomplete for progression and neuropsychiatric/motor/pathologic context.
      - **Subtype/lumping:** clarify ADan/familial Danish dementia versus ABri/familial British dementia under ITM2B.
      - **Pathophysiology:** split human amyloid pathology from animal/model synaptic mechanisms.
      - **Management/diagnosis:** add genetic testing, neuro/ophthalmic/audiologic evaluation, dementia care, and counseling.
      - **References:** verify primary human and model evidence separately.

      ## Suggested remediation

      Add progressive natural history, diagnostic/pathology content, management/counseling, and evidence-source distinctions for model-derived mechanisms.

