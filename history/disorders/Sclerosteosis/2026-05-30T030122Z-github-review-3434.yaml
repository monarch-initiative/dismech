      ## Completed curation review

      - Disease: **Sclerosteosis**
      - Entry: `kb/disorders/Sclerosteosis.yaml`
      - Selection basis: #47 of 50 least-recently edited Mendelian entries
      - Review decision: **Changes required**
      - Validation stance: assumes schema/term/reference validation passes; this is a biological and clinical-content review.

      ## Findings

      1. **GeneReviews exists and should be used.** SOST-related sclerosing bone dysplasias GeneReviews covers SOST-related sclerosteosis and van Buchem disease and should be the baseline. Source: https://www.ncbi.nlm.nih.gov/books/NBK587318/
      2. **No matching research artifact exists.** This makes GeneReviews and primary SOST/sclerosteosis literature especially important; the YAML should not be considered fully reviewed without a strong external baseline.
      3. **Management is too narrow.** Surgical decompression and genetic counseling are present, but the entry should include monitoring/management of increased intracranial pressure, cranial nerve compression, hearing loss, optic atrophy/vision risk, facial palsy, syndactyly, dental/mandibular issues, and life-threatening complications from cranial hyperostosis.
      4. **Disease boundary needs SOST-spectrum framing.** Sclerosteosis should be distinguished from van Buchem disease/endosteal hyperostosis and from LRP4-related sclerosteosis-like disease. The current entry lists SOST mutations but should clarify whether it covers SOST-related sclerosteosis only.
      5. **Pathophysiology is good but should connect to surveillance.** Loss of sclerostin -> unopposed Wnt/beta-catenin osteoblast activation -> progressive cranial hyperostosis and nerve compression is correct; this should drive monitoring for intracranial-pressure and cranial-nerve complications.

      ## Research-artifact cross-check

      No matching `research/Sclerosteosis-*` artifact was found. This review used GeneReviews/public sources as baseline.

      ## Content-completeness summary

      - **Phenotypes:** core list present; management implications need stronger links.
      - **Subtype/lumping:** clarify SOST-related sclerosteosis versus van Buchem/LRP4-related disorders.
      - **Pathophysiology:** strong; connect to progressive surveillance.
      - **Management/diagnosis:** expand beyond decompression/counseling.
      - **References:** add/tag SOST GeneReviews if updating YAML.

      ## Suggested remediation

      Add GeneReviews, SOST-spectrum boundary, and surveillance/management for cranial hyperostosis complications.

