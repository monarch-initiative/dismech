      ## Completed curation review

      - Disease: **COL11A2-Related Hearing Loss**
      - Entry: `kb/disorders/COL11A2_Hearing_Loss.yaml`
      - Selection basis: #12 of 50 least-recently edited Mendelian entries
      - Review decision: **Changes required**
      - Validation stance: assumes schema/term/reference validation passes; this is a biological and clinical-content review.

      ## Findings

      1. **Disease scope needs to separate dominant and recessive forms more clearly.** The YAML has DFNA13 and DFNB53 subtypes and both inheritance modes, which is good. But the disease title and one-phenotype structure flatten clinically distinct presentations: dominant DFNA13 classically involves nonsyndromic sensorineural hearing loss, while recessive DFNB53 can present with congenital/prelingual profound hearing loss.
      2. **Phenotype coverage is too thin.** The entire phenotype section contains only `Sensorineural Hearing Impairment`. The pathophysiology includes non-progressive mid-frequency hearing loss and prelingual profound hearing loss, but those distinctions are not represented in the phenotype section. Audiometric pattern, onset, severity, and progression should be subtype-specific.
      3. **Diagnosis is missing.** The entry should include audiologic evaluation and molecular testing for COL11A2, with subtype-specific interpretation. Genetic hearing loss entries should not rely only on treatment labels and causal pathophysiology.
      4. **Management is reasonable but incomplete.** Hearing aids, cochlear implantation, and genetic counseling are present. They should be connected to severity/onset and subtype context rather than modeled generically.
      5. **Syndromic COL11A2 conditions should be explicitly out of scope.** COL11A2 is also associated with Stickler/otospondylomegaepiphyseal-spectrum disease. The entry should state that this file is restricted to nonsyndromic DFNA13/DFNB53 hearing loss if that is intended.

      ## Research-artifact cross-check

      Checked `research/COL11A2_Hearing_Loss-deep-research-falcon.md` and `.citations.md`. The artifact supports separate DFNA13/DFNB53 framing and the tectorial-membrane/type XI collagen mechanism, but the YAML under-consumes onset/severity/audiometric distinctions in the clinical phenotype layer.

      ## Content-completeness summary

      - **Phenotypes:** gap: add subtype-specific onset, severity, audiogram pattern, and progression.
      - **Subtype/lumping:** DFNA13/DFNB53 present but need stronger clinical separation and syndromic exclusion.
      - **Pathophysiology:** adequate directionally; connect dominant-negative versus biallelic loss mechanisms to phenotype.
      - **Treatments/diagnosis:** add audiologic/molecular diagnosis and tie hearing aids/cochlear implantation to clinical severity.
      - **References:** verify any subtype-specific additions against cached PMIDs.

      ## Suggested remediation

      Make DFNA13 and DFNB53 clinically separable in phenotypes, add diagnosis, and explicitly scope out syndromic COL11A2 disorders.

