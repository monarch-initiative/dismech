      ## Completed curation review

      - Disease: **CTCF-related Neurodevelopmental Disorder**
      - Entry: `kb/disorders/CTCF-related_Neurodevelopmental_Disorder.yaml`
      - Selection basis: #1 of 50 least-recently edited Mendelian entries
      - Review decision: **Changes required**
      - Validation stance: this review assumes schema, ontology-term, and reference validation pass; findings below are biological/clinical/content issues.

      ## Findings

      1. **GeneReviews is available but the entry does not use it as a baseline.** The current top-level `references:` block contains DOI/PMID items but no `tags: [GeneReviews]`. NCBI Bookshelf has a current GeneReviews article for **CTCF-Related Disorder** that explicitly treats CTCF-related neurodevelopmental disorder / autosomal dominant intellectual disability 21 as the same clinical entity. Under the dismech review rubric, this is a blocking omission for a Mendelian entry because GeneReviews should be tagged and checked against the clinical-characteristics baseline. Source: https://www.ncbi.nlm.nih.gov/books/NBK603087/

      2. **Clinical phenotype coverage under-consumes the GeneReviews baseline.** The YAML captures intellectual disability, developmental delay, feeding difficulty, hypotonia, behavioral anomalies, congenital heart defects, cleft palate, hearing loss, seizures, microcephaly, short stature, and dysmorphism. The GeneReviews baseline additionally emphasizes dysphagia and GI issues such as GERD/IBS contributing to growth deficiency, eye anomalies such as strabismus/refractive errors, scoliosis, sleep disturbance, tooth anomalies, gastrointestinal malrotation, genitourinary anomalies, and aortic ectasia. Several of those are central enough to affect clinical recognition/surveillance and are absent from the current phenotype, diagnosis, progression, and management sections.

      3. **Inheritance is described but not modeled.** The description says the disease is caused by heterozygous de novo CTCF mutations, but the entry has no `inheritance:` section. The research artifact and GeneReviews both support an autosomal dominant condition that is usually de novo but can be inherited from a mildly affected/subclinical parent. This should be modeled explicitly so recurrence-risk counseling is not left implicit.

      4. **The hearing-loss phenotype is too narrow for its own evidence.** The YAML phenotype is `Hearing Loss` with `phenotype_term` set to sensorineural hearing impairment, but the evidence snippet from PMID:31239556 says `Conductive and/or sensorineuronal hearing loss were reported in 10`. That supports hearing loss broadly, not exclusively sensorineural hearing impairment. The curator should either use a broader hearing-loss term or split conductive and sensorineural hearing-loss claims if there is evidence for each.

      5. **Management is plausible but not evidence-linked or surveillance-complete.** The treatment section lists supportive developmental therapies, educational support, feeding support, behavioral management, and genetic counseling, mostly without evidence. That is clinically plausible, but the entry lacks disease-specific surveillance/management for eye anomalies, scoliosis, sleep disturbance, GI complications, dental anomalies, congenital heart disease/aortic ectasia, genitourinary anomalies, and seizure care, all of which are surfaced by GeneReviews or the research artifact. Supportive care should be retained, but it needs to be separated from specific recommended evaluations/surveillance where the literature supports them.

      ## Research-artifact cross-check

      Checked:
      - `research/CTCF-related_Neurodevelopmental_Disorder-deep-research-cyberian-codex.md`
      - `research/CTCF-related_Neurodevelopmental_Disorder-deep-research-cyberian-codex.md.citations.md`
      - `research/CTCF-related_Neurodevelopmental_Disorder-deep-research-perplexity.md`
      - `research/CTCF-related_Neurodevelopmental_Disorder-deep-research-perplexity.md.citations.md`

      The YAML consumes the central chromatin-architecture mechanism well: CTCF haploinsufficiency, disrupted enhancer-promoter interactions, TAD/chromatin organization disruption, broad neurodevelopmental gene dysregulation, and the R567/protocadherin/neural progenitor model are represented. The main under-consumption is clinical rather than molecular: the research artifact includes a broader clinical spectrum, predominantly de novo autosomal dominant inheritance with rare inherited mild/subclinical cases, and broader auditory/vision/GI/skeletal/dental features than the YAML currently models.

      ## Content-completeness checklist

      - **Phenotypes:** Gaps noted. Add or justify omission of GeneReviews-supported GI/dysphagia/GERD or IBS, ocular anomalies, scoliosis, sleep disturbance, dental anomalies, genitourinary anomalies, and aortic ectasia/cardiac surveillance features. Fix the hearing-loss term mismatch.
      - **Subtype / lumping-splitting:** No disease subtype modeling appears necessary from the reviewed sources; this is appropriately a CTCF-related disorder entry. The synonym/autosomal dominant intellectual disability 21 relationship should be clear through the disease term/reference baseline.
      - **Pathophysiology:** Mostly adequate. The current nodes cover the major CTCF dosage, chromatin architecture, neurodevelopmental gene expression, and neural progenitor/cortical maturation mechanisms.
      - **Treatments / management:** Gaps noted. Current supportive management is too generic and not connected to the organ-system risks surfaced by GeneReviews.
      - **Genetics:** Gaps noted. Add autosomal dominant, usually de novo inheritance and inherited/mild-parent recurrence-risk nuance; keep variant-class details already present.
      - **Diagnostics / biomarkers:** Partial. Genetic testing is present, but diagnostic evaluation should reflect a multisystem CTCF baseline rather than only molecular confirmation.
      - **References:** Blocking baseline gap: add/tag the GeneReviews reference after fetching through the repo-supported reference workflow if a YAML fix is made.
      - **Overall consumption:** Molecular consumption is strong; clinical/GeneReviews consumption is incomplete enough to require curation changes.

      ## Suggested remediation

      Use GeneReviews as the clinical baseline; add the GeneReviews reference/tag; add an inheritance section; broaden/split the hearing-loss phenotype; add or explicitly scope out the missing clinical features; and convert the generic supportive-care list into evidence-backed management/surveillance items for the major organ systems.

