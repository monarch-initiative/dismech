      ## Findings

      1. Blocking: the entry has no `diagnosis` section. Add disease-specific diagnostic criteria, recommended tests/imaging/biochemical markers, and molecular confirmation strategy for Gitelman syndrome; this is necessary for curators to evaluate whether the modeled mechanism and phenotype scope match the intended disease.
      2. Research-artifact consumption: matching deep-research artifact(s) exist and should be treated as first-class review inputs. Compare the YAML against the artifact(s), especially for central mechanisms, subtype-specific features, treatments/trials, and diagnostic/surveillance details rather than only schema-valid content.
      3. Disease-boundary check: no subtypes are modeled. Confirm this is intentionally a single pathomechanism entry and not a spectrum that should expose subtypes, genotype classes, or clinically distinct forms.
      4. Pathophysiology review: the main modeled mechanisms include NCC loss in distal convoluted tubule, Extracellular volume contraction, Secondary RAAS activation, Collecting-duct potassium and hydrogen wasting. Check that each is an atomic event with direct evidence and that downstream edges do not encode multi-step chains or unsupported causal leaps from gene/product defect to organ-level phenotype.
      5. Treatment modeling: treatments are present (Liberal salt intake, Potassium supplementation, Magnesium supplementation, Potassium-sparing medication). Check therapeutic agents, subtype applicability, evidence strength, and surveillance/supportive-care needs; avoid broad treatment claims that are not tied to the relevant phenotype or disease stage.
      6. Evidence/reference check: top references include ORPHA:358, PMID:28003083, PMID:17329572, PMID:41278357. Spot-check that snippets directly support the specific claim, frequency, and evidence_source classification, especially where the same PMID is reused across phenotype, mechanism, and treatment assertions.

