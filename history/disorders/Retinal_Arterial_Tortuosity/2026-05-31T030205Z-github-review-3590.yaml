      ## Findings

      1. Actionable baseline check: a `diagnosis` section exists, but no top-level GeneReviews tag was detected in the YAML. For this Mendelian entry, confirm whether a GeneReviews article exists and either add/tag it or record why no GeneReviews baseline applies.
      2. Research-artifact consumption: matching deep-research artifact(s) exist and should be treated as first-class review inputs. Compare the YAML against the artifact(s), especially for central mechanisms, subtype-specific features, treatments/trials, and diagnostic/surveillance details rather than only schema-valid content.
      3. Disease-boundary check: no subtypes are modeled. Confirm this is intentionally a single pathomechanism entry and not a spectrum that should expose subtypes, genotype classes, or clinically distinct forms.
      4. Pathophysiology review: the main modeled mechanisms include COL4A1 collagen IV basement membrane defect, Primary retinal vascular structural defect, Retinal hemorrhage episodes, Reactive Muller glial response. Check that each is an atomic event with direct evidence and that downstream edges do not encode multi-step chains or unsupported causal leaps from gene/product defect to organ-level phenotype.
      5. Treatment modeling: treatments are present (Observation for resolving retinal hemorrhage, neodymium-doped YAG laser membranotomy for selected premacular hemorrhage). Check therapeutic agents, subtype applicability, evidence strength, and surveillance/supportive-care needs; avoid broad treatment claims that are not tied to the relevant phenotype or disease stage.
      6. Evidence/reference check: top references include DOI:10.1007/s00417-014-2800-6, DOI:10.1002/ajmg.c.32099, DOI:10.1186/s12886-020-01413-0, DOI:10.1016/j.ajoc.2019.03.001. Spot-check that snippets directly support the specific claim, frequency, and evidence_source classification, especially where the same PMID is reused across phenotype, mechanism, and treatment assertions.

