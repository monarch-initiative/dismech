      ## Completed curation review

      - Disease: **Episodic Ataxia**
      - Entry: `kb/disorders/Episodic_Ataxia.yaml`
      - Selection basis: #73 of the least-recently edited Mendelian entries
      - Review decision: **Changes required**
      - Validation stance: assumes schema/term/reference validation passes; this is a biological and clinical-content review.

      ## Findings

      1. **The entry is too narrow if titled simply `Episodic Ataxia`.** It models only EA1 and EA2, but episodic ataxia includes additional genetic forms. Either retitle/scope to KCNA1/CACNA1A EA1/EA2 or add the broader subtype structure.
      2. **Inheritance is missing.** EA1 and EA2 are typically autosomal dominant; recurrence counseling and de novo/inherited contexts should be represented.
      3. **Diagnosis is missing.** Add molecular testing, attack history/triggers, interictal neurologic findings, EEG/seizure/migraine differential where appropriate, and channelopathy differential diagnosis.
      4. **Treatment should be subtype-specific.** Acetazolamide, 4-aminopyridine, and carbamazepine are present, but response differs by EA subtype: acetazolamide/4-AP often EA2; carbamazepine may be more relevant to EA1/myokymia in some contexts. Evidence should be claim-specific.
      5. **Phenotypes and mechanisms should be subtype-mapped.** Myokymia is EA1; interictal nystagmus/migraine are more EA2-associated. The pathophysiology already separates KCNA1 and CACNA1A but phenotype/treatment mapping should align.

      ## Research-artifact cross-check

      Matching artifacts: `research/Episodic_Ataxia-deep-research-falcon.md` and `.citations.md`. The YAML consumes EA1/EA2 mechanisms but under-consumes scope, inheritance, diagnosis, and treatment specificity.

      ## Content-completeness summary

      - **Phenotypes:** map by EA subtype.
      - **Subtype/lumping:** title is broader than modeled EA1/EA2 content.
      - **Pathophysiology:** strong subtype mechanisms.
      - **Management/diagnosis:** diagnosis and inheritance missing; treatment needs subtype mapping.

