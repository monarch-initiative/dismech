      ## Completed curation review

      - Disease: **UNC13A-Related NDD with Seizures and Movement Disorder**
      - Entry: `kb/disorders/UNC13A_NDD_with_Seizures_and_Movement_Disorder.yaml`
      - Selection basis: #76 of the least-recently edited Mendelian entries
      - Review decision: **Changes required**
      - Validation stance: assumes schema/term/reference validation passes; this is a biological and clinical-content review.

      ## Findings

      1. **Diagnosis is missing.** Add molecular testing for de novo UNC13A variants, EEG/seizure characterization, movement-disorder assessment, developmental/neuropsychological evaluation, and MRI if supported.
      2. **Subtype/type labels need clearer explanation.** The YAML lists Type B and Type C but does not make clear how these categories map to variant class, phenotype severity, or published nomenclature.
      3. **Treatment is too generic.** Antiseizure medication and supportive care are present; add movement-disorder management, rehab, speech/developmental therapy, behavioral support, and genetic counseling. Treatment response should be evidence-specific.
      4. **Disease boundary with recessive congenital UNC13A disorder must be explicit.** This entry is dominant/de novo gain-of-function or altered neurotransmission; it should not merge with biallelic loss-of-function congenital disease.
      5. **Pathophysiology needs source-type clarity.** Gain-of-function neurotransmission and second-messenger regulation are plausible but should be tied to functional assay evidence and not overgeneralized.

      ## Research-artifact cross-check

      Matching artifacts: `research/UNC13A_NDD_with_Seizures_and_Movement_Disorder-deep-research-asta.md` and `.citations.md`. Asta should be treated as leads; primary UNC13A dominant NDD papers should anchor curation.

      ## Content-completeness summary

      - **Phenotypes:** core seizure/movement/development features present; refine subtype and severity.
      - **Subtype/lumping:** clarify Type B/Type C and dominant versus recessive disease.
      - **Pathophysiology:** needs evidence-source clarity.
      - **Management/diagnosis:** diagnosis missing; management too generic.

