      ## Completed curation review

      - Disease: **Cowden Syndrome**
      - Entry: `kb/disorders/Cowden_Syndrome.yaml`
      - Selection basis: #78 of the least-recently edited Mendelian entries
      - Review decision: **Changes required**
      - Validation stance: assumes schema/term/reference validation passes; this is a biological and clinical-content review.

      ## Findings

      1. **GeneReviews exists and should be used as the surveillance baseline.** PTEN Hamartoma Tumor Syndrome GeneReviews covers Cowden syndrome diagnostic criteria, cancer risks, and surveillance. Source: https://www.ncbi.nlm.nih.gov/books/NBK1488/
      2. **Subtype/gene list likely overstates non-PTEN causes.** The YAML lists Cowden syndrome 1 PTEN plus KLLN, PIK3CA, and SDHB. Modern curation usually treats PTEN hamartoma tumor syndrome as the primary Cowden entity, while PTEN-like/Cowden-like conditions require careful evidence. The gene list should be reviewed.
      3. **Cancer surveillance needs organ-specific detail.** Enhanced cancer surveillance is listed but should include breast, thyroid, endometrial, colon, renal, dermatologic, and CNS/Lhermitte-Duclos surveillance with age/interval guidance where schema permits.
      4. **Treatment section should not overemphasize mTOR inhibitor therapy.** mTOR inhibitors may be mechanistically plausible/selected-use, but the core management is surveillance, risk-reducing surgery when indicated, and lesion-specific care.
      5. **Diagnosis is missing.** Add clinical diagnostic criteria, PTEN molecular testing, macrocephaly/mucocutaneous criteria, and genetic counseling/testing of relatives.

      ## Research-artifact cross-check

      Matching artifacts: Cowden Syndrome Falcon files. The YAML captures PTEN/PI3K/AKT/mTOR and cancer-risk biology but under-consumes GeneReviews surveillance and gene-boundary nuance.

      ## Content-completeness summary

      - **Phenotypes:** broad; align with PTEN/PHTS diagnostic criteria.
      - **Subtype/lumping:** review KLLN/PIK3CA/SDHB inclusion.
      - **Pathophysiology:** PTEN mechanism good; avoid overextending to Cowden-like genes.
      - **Management/diagnosis:** add detailed cancer surveillance and diagnosis.

      ## Sources used

      - GeneReviews, PTEN Hamartoma Tumor Syndrome: https://www.ncbi.nlm.nih.gov/books/NBK1488/
      - NCCN-derived surveillance review: https://pmc.ncbi.nlm.nih.gov/articles/PMC8799482/

