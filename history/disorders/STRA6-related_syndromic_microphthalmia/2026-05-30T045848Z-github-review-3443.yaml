      ## Completed curation review

      - Disease: **STRA6-related syndromic microphthalmia**
      - Entry: `kb/disorders/STRA6-related_syndromic_microphthalmia.yaml`
      - Selection basis: #51 of the least-recently edited Mendelian entries
      - Review decision: **Changes required**
      - Validation stance: assumes schema/term/reference validation passes; this is a biological and clinical-content review.

      ## Findings

      1. **Diagnosis and management are missing.** The entry has inheritance, phenotypes, pathophysiology, and genetics, but no diagnosis or treatment/management. STRA6-related Matthew-Wood/syndromic microphthalmia needs prenatal imaging, ophthalmologic evaluation, cardiopulmonary/diaphragm assessment, brain/developmental evaluation, molecular testing, and genetic counseling.
      2. **Phenotype coverage is too narrow for the syndrome.** The YAML covers anophthalmia/microphthalmia, pulmonary hypoplasia, congenital diaphragmatic hernia, abnormal heart morphology, and intellectual disability. STRA6 disease also commonly involves bilateral ocular malformations, developmental/brain anomalies, growth or renal/urogenital findings in some cases, and severe prenatal/neonatal outcomes; these should be checked against primary cohorts.
      3. **Pathophysiology is directionally correct but should be tied to tissue timing.** Impaired cellular retinol uptake and abnormal retinoic-acid signaling are central, but the organ-specific eye, lung, diaphragm, and cardiac branches should be linked to embryologic retinoid-dependent development and evidence type.
      4. **Clinical severity/prognosis should be represented.** Pulmonary hypoplasia and diaphragmatic hernia can be perinatal-lethal; the entry should distinguish survivable syndromic microphthalmia from severe prenatal presentations.
      5. **Asta research should be treated as leads.** Matching research is Asta retrieval, so new claims should be verified against primary STRA6 disease literature before YAML updates.

      ## Research-artifact cross-check

      Matching artifacts: `research/STRA6-related_syndromic_microphthalmia-deep-research-asta.md` and `.citations.md`. The artifact exists but is retrieval-heavy; the YAML should be rechecked against primary STRA6/Matthew-Wood syndrome sources before adding claims.

      ## Content-completeness summary

      - **Phenotypes:** core features present; expand ocular, brain/developmental, renal/urogenital, and prognosis features where supported.
      - **Subtype/lumping:** clarify STRA6-related Matthew-Wood/syndromic microphthalmia scope.
      - **Pathophysiology:** retinoid mechanism is good; add embryologic/tissue specificity.
      - **Management/diagnosis:** missing; add prenatal, ophthalmic, cardiopulmonary, diaphragm, developmental, and counseling care.
      - **References:** verify Asta-suggested sources before curation.

