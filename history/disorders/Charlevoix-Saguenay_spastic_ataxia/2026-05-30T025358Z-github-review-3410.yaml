      ## Completed curation review

      - Disease: **Charlevoix-Saguenay spastic ataxia**
      - Entry: `kb/disorders/Charlevoix-Saguenay_spastic_ataxia.yaml`
      - Selection basis: #23 of 50 least-recently edited Mendelian entries
      - Review decision: **Changes required**
      - Validation stance: assumes schema/term/reference validation passes; this is a biological and clinical-content review.

      ## Findings

      1. **GeneReviews exists and should be used as the clinical baseline.** ARSACS GeneReviews covers SACS-related autosomal recessive spastic ataxia. The YAML should use it for clinical features, progression, diagnosis, and management. Source: https://www.ncbi.nlm.nih.gov/books/NBK1255/
      2. **Phenotype coverage is too narrow.** The entry lists gait ataxia, spasticity, peripheral neuropathy, and lower limb weakness. ARSACS baseline features also include early-childhood onset, dysarthria, nystagmus/ocular motor abnormalities, retinal nerve fiber hypermyelination/thickening, pes cavus, distal amyotrophy, and progressive functional decline.
      3. **Progression/natural history is missing.** ARSACS is progressive; the entry should model clinical course rather than only static features.
      4. **Diagnosis should be richer.** SACS genetic testing and MRI are present, but classic MRI signs, nerve conduction/electrophysiology, ophthalmologic findings, and differential diagnosis among hereditary ataxias should be represented where supported.
      5. **Management is incomplete.** Physical therapy and supportive care are present; add multidisciplinary rehab, spasticity management, mobility/orthotics, speech/swallow assessment, ophthalmology, and counseling.

      ## Research-artifact cross-check

      Checked `research/Charlevoix-Saguenay_spastic_ataxia-deep-research-asta.md` and `.citations.md`. Because this is an Asta artifact, GeneReviews and primary ARSACS clinical literature should drive the final curation.

      ## Content-completeness summary

      - **Phenotypes:** incomplete for retinal, ocular motor, speech, orthopedic, and progression features.
      - **Subtype/lumping:** appropriate as SACS/ARSACS; founder-population context can be noted without limiting global scope.
      - **Pathophysiology:** sacsin/proteostasis/mitochondrial/cytoskeletal mechanisms are plausible; tie each to evidence source.
      - **Management/diagnosis:** expand diagnostic and rehab/symptom-management sections.
      - **References:** add/tag GeneReviews if updating YAML.

      ## Suggested remediation

      Add GeneReviews, progression, richer phenotype/diagnosis coverage, and a fuller supportive-management plan.

