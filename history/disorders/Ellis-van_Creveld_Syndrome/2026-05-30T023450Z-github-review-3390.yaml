      ## Completed curation review

      - Disease: **Ellis-van Creveld Syndrome**
      - Entry: `kb/disorders/Ellis-van_Creveld_Syndrome.yaml`
      - Selection basis: #4 of 50 least-recently edited Mendelian entries
      - Review decision: **Changes required**
      - Validation stance: this review assumes schema, ontology-term, and reference validation pass; findings below are biological/clinical/content issues.

      ## Findings

      1. **GeneReviews exists but is not tagged or consumed as the baseline.** The current entry has no top-level `GeneReviews` tag. NCBI Bookshelf has a GeneReviews article for **Ellis-van Creveld Syndrome**, and it should be used as a baseline for clinical features, surveillance, and genotype/spectrum framing. Source: https://www.ncbi.nlm.nih.gov/books/NBK596643/

      2. **The pathophysiology is correct but under-specific for the EvC-zone mechanism.** The YAML has `Hedgehog Signaling Disruption`, `Primary Cilium Dysfunction`, and `Cardiac Septation Defect`, which are directionally right. The research artifact is more precise: the EVC-EVC2 complex localizes to the EvC zone, interacts with Smoothened, regulates SUFU/GLI dissociation and GLI trafficking, and affects IHH-dependent growth-plate chondrocyte proliferation/differentiation. WDR35/IFT-A can phenocopy EvC by impairing ciliary recruitment of EVC/EVC2 and SMO. The entry should model these as atomic mechanisms rather than leaving the pathograph at generic cilium/Hedgehog disruption.

      3. **Cardiac phenotype and surveillance are under-modeled.** The YAML has a broad `Congenital Heart Defect` phenotype and `Cardiac Septation Defect` mechanism. GeneReviews and the research artifact emphasize atrioventricular canal defects/common atrium as particularly important in EvC. Early echocardiographic evaluation/surveillance is clinically central and should be represented explicitly, not only inferred from cardiac surgery treatment.

      4. **Clinical completeness misses several GeneReviews frequency anchors.** The entry includes short stature, postaxial polydactyly, short ribs/narrow chest, congenital heart defect, nail dysplasia, dental anomalies, upper-lip/frenula, and genu valgum. GeneReviews also frames ectodermal dysplasia, radiologic short tubular bones, facial variability, postaxial polydactyly of feet, and developmental delay as part of the broader clinical description/frequency table. A curator should compare the YAML feature set directly against GeneReviews Table 2 and either add missing high-frequency features or explain the intended scope.

      5. **Genotype/spectrum nuance is incomplete.** The YAML has separate EVC and EVC2 genetic items, but the research artifact surfaced hypomorphic EVC alleles causing a milder subtype dominated by common atrium/atrioventricular canal defect and postaxial polydactyly, plus ciliary-recruitment phenocopies involving IFT components. If the entry remains limited to classic biallelic EVC/EVC2 EvC, the scope should be explicit; otherwise subtype/spectrum notes should be added.

      ## Research-artifact cross-check

      Checked:
      - `research/Ellis-van_Creveld_Syndrome-deep-research-cyberian-codex.md`
      - `research/Ellis-van_Creveld_Syndrome-deep-research-cyberian-codex.md.citations.md`
      - `research/Ellis-van_Creveld_Syndrome-deep-research-falcon.md`
      - `research/Ellis-van_Creveld_Syndrome-deep-research-falcon.md.citations.md`

      The YAML uses the main clinical and genetic anchors but under-consumes the Falcon artifact's mechanistic detail. The highest-value omitted themes are the EvC-zone signaling platform, EVC/EVC2-SMO-SUFU/GLI chain, growth-plate chondrocyte mechanism, AV canal/common atrium specificity, hypomorphic EVC subtype/spectrum, and IFT/WDR35 ciliary-recruitment phenocopy context.

      ## Content-completeness checklist

      - **Phenotypes:** Gaps noted. Compare against GeneReviews and add/refine high-frequency ectodermal, radiologic, cardiac, and developmental features where supported.
      - **Subtype / lumping-splitting:** Needs scoping. Classic EVC/EVC2 EvC is covered, but hypomorphic EVC presentations and IFT phenocopies need either explicit inclusion or exclusion.
      - **Pathophysiology:** Gaps noted. Decompose generic Hedgehog/cilium disruption into EVC-EVC2 EvC-zone complex, SMO interaction, SUFU/GLI effects, growth-plate chondrocyte/endocardial-cushion consequences, and ciliary recruitment defects where relevant.
      - **Treatments / management:** Partial. Cardiac, orthopedic, dental, and respiratory treatments are present, but diagnostic/surveillance actions such as echocardiography are not modeled.
      - **Genetics:** Partial. EVC and EVC2 are present; add variant/spectrum nuance if supported by fetched references.
      - **Diagnostics / biomarkers:** Missing/weak. Molecular diagnosis plus cardiac imaging and skeletal/radiographic evaluation should be explicit.
      - **References:** Blocking baseline gap: GeneReviews should be fetched/tagged if the YAML is updated.
      - **Overall consumption:** The entry is a solid skeleton but under-consumes GeneReviews and mechanistic research enough to require curation changes.

      ## Suggested remediation

      Add/tag GeneReviews; add diagnosis/surveillance content, especially echocardiography; refine cardiac phenotype to include AV canal/common atrium where evidence supports it; and deepen the ciliary pathograph around the EvC-zone EVC/EVC2-SMO-SUFU/GLI mechanism.

