      ## Completed curation review

      - Disease: **Omodysplasia**
      - Entry: `kb/disorders/Omodysplasia.yaml`
      - Selection basis: #38 of 50 least-recently edited Mendelian entries
      - Review decision: **Changes required**
      - Validation stance: assumes schema/term/reference validation passes; this is a biological and clinical-content review.

      ## Findings

      1. **Autosomal recessive and dominant omodysplasia need stronger separation.** The YAML has OMOD1 and OMOD2 subtypes and GPC6/FZD2 genetics, but many phenotypes are listed together. GPC6-related AR omodysplasia and FZD2-related AD omodysplasia differ in height, limb distribution, facial findings, and developmental involvement.
      2. **Diagnosis should be added.** The entry lacks diagnosis despite the need for radiographic pattern recognition, molecular testing of GPC6/FZD2, and differential diagnosis among rhizomelic skeletal dysplasias.
      3. **Management is present but generic.** Orthopedic surgery, physical therapy, and genetic counseling are appropriate but should be connected to subtype-specific elbow/knee limitation, radial head dislocation, hip/knee/limb function, and growth/mobility needs.
      4. **Mechanism should distinguish GPC6/Hedgehog from FZD2/Wnt.** The YAML has separate mechanism nodes, which is good; downstream effects on chondrocyte proliferation, long-bone growth, and limb-patterning should be linked by subtype.
      5. **Asta retrieval should not drive curation.** Matching Asta and OpenAI artifacts exist; rely on primary GPC6/FZD2 papers and review only high-value disease-specific findings.

      ## Research-artifact cross-check

      Checked `research/Omodysplasia-deep-research-openai.md`, `.citations.md`, `research/Omodysplasia-deep-research-asta.md`, and `.citations.md`. The YAML under-consumes subtype-specific clinical differentiation and diagnosis.

      ## Content-completeness summary

      - **Phenotypes:** extensive but needs subtype-specific assignment.
      - **Subtype/lumping:** major action item: AR GPC6 versus AD FZD2 separation.
      - **Pathophysiology:** good starting split; connect to tissue outcomes.
      - **Management/diagnosis:** add diagnosis and more subtype-specific management.
      - **References:** use primary omodysplasia papers for subtype claims.

      ## Suggested remediation

      Add diagnosis, map phenotypes/management to OMOD1/OMOD2, and refine GPC6/FZD2 mechanism-to-phenotype chains.

