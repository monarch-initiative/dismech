      ## Completed curation review

      - Disease: **Acrodysostosis**
      - Entry: `kb/disorders/Acrodysostosis.yaml`
      - Selection basis: #67 of the least-recently edited Mendelian entries
      - Review decision: **Changes required**
      - Validation stance: assumes schema/term/reference validation passes; this is a biological and clinical-content review.

      ## Findings

      1. **Subtype-specific clinical differences need strengthening.** The YAML has type 1 and type 2, and PRKAR1A/PDE4D mechanisms. Phenotypes and endocrine resistance should be mapped by subtype: PRKAR1A is more associated with multi-hormone resistance, while PDE4D has stronger neurodevelopmental/facial skeletal effects in many reports.
      2. **Management is incomplete.** Recombinant growth hormone is the only treatment. Acrodysostosis requires endocrine evaluation/management of hormone resistance, orthopedic/growth monitoring, developmental/educational supports, hand/foot radiographic management, and genetic counseling.
      3. **Diagnosis is good but should include subtype-specific endocrine testing.** Clinicoradiologic suspicion, PRKAR1A/PDE4D testing, and endocrine assessment are present. Add PTH/TSH/other hormone resistance workup and differential diagnosis with pseudohypoparathyroidism/AHO.
      4. **Pathophysiology should connect cAMP/PKA signaling to growth plate and hormone resistance.** Existing mechanisms are good but should be linked to chondrocyte differentiation and endocrine target-organ resistance by subtype.
      5. **Treatment evidence for growth hormone needs review.** GH therapy may be case-dependent; avoid implying routine effectiveness without evidence.

      ## Research-artifact cross-check

      Matching artifacts: `research/Acrodysostosis-deep-research-asta.md` and `.citations.md`. Asta should be treated as leads; subtype-specific endocrine genetics literature should anchor updates.

      ## Content-completeness summary

      - **Phenotypes:** core skeletal/endocrine/NDD features present; map by subtype.
      - **Subtype/lumping:** major curation axis: PRKAR1A versus PDE4D.
      - **Pathophysiology:** good but needs subtype/organ linkage.
      - **Management/diagnosis:** expand endocrine and supportive care beyond GH.

