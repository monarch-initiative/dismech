      ## Completed curation review

      - Disease: **Lenz-Majewski hyperostotic dwarfism**
      - Entry: `kb/disorders/Lenz-Majewski_hyperostotic_dwarfism.yaml`
      - Selection basis: #27 of 50 least-recently edited Mendelian entries
      - Review decision: **Changes required**
      - Validation stance: assumes schema/term/reference validation passes; this is a biological and clinical-content review.

      ## Findings

      1. **GeneReviews now exists and should be used.** A GeneReviews chapter for PTDSS1-related Lenz-Majewski hyperostotic dysplasia is available and should be the baseline for clinical features, surveillance, and management. Source: https://www.ncbi.nlm.nih.gov/books/n/gene/ptdss1-lmhd/
      2. **Management is too generic.** The YAML has only `Supportive multidisciplinary care`. This syndrome has progressive skeletal hyperostosis/cranial involvement, hearing/seizure/developmental issues, dental/orthopedic needs, and skin/cutis laxa findings that require specific surveillance and management.
      3. **Pathophysiology is too compressed.** `PTDSS1 gain-of-function phosphatidylserine biosynthesis dysregulation` and `Progressive hyperostotic skeletal dysplasia` are directionally right, but the entry should explain the gain-of-function feedback-insensitive phosphatidylserine synthase mechanism and how phosphatidylserine/metabolic disruption plausibly connects to hyperostosis/cutis laxa/development.
      4. **Phenotype coverage should be checked against the GeneReviews baseline.** Current phenotypes include cutis laxa, short stature, brachydactyly, cranial hyperostosis, facial shape, intellectual disability, hearing impairment, and seizure. Additional craniofacial, dental, progressive skeletal, skin, and neurologic features may need inclusion.
      5. **Diagnosis should include molecular testing and radiographic progression.** PTDSS1 testing is present, but the diagnostic section should include clinical/radiographic pattern and progression of bone sclerosis/hyperostosis.

      ## Research-artifact cross-check

      Checked `research/Lenz-Majewski_hyperostotic_dwarfism-deep-research-asta.md` and `.citations.md`. The Asta artifact is only a lead list; GeneReviews and primary PTDSS1 reports should anchor the update.

      ## Content-completeness summary

      - **Phenotypes:** broad but needs GeneReviews comparison.
      - **Subtype/lumping:** appropriate as PTDSS1-related LMHD.
      - **Pathophysiology:** deepen PTDSS1 gain-of-function/metabolic mechanism.
      - **Management/diagnosis:** expand beyond generic supportive care.
      - **References:** add/tag GeneReviews if updating YAML.

      ## Suggested remediation

      Add GeneReviews, expand surveillance/management, deepen PTDSS1 mechanism, and refine phenotype coverage against current clinical baseline.

