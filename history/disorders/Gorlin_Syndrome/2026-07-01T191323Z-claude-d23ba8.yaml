    summary: >-
      Labelled all 12 Gorlin pathophysiology nodes with the new
      biological_scale: slot and split two bundled nodes into
      single-scale atomic entries (net 12 → 15 nodes).
    details: |
      Worked exemplar for the optional biological_scale: slot addition to
      the Pathophysiology class. Gorlin was chosen for its familiarity as
      an early pathograph example, its moderate node count (12), and its
      lack of open PRs.

      Two co-equal tasks were applied per node:

      1. Label — each of the 12 pathophysiology nodes was assigned a
         single value from BiologicalScaleEnum (MOLECULAR / CELLULAR /
         TISSUE / ORGANISM). Seed labels came from the v3 classifier
         prompt from the feasibility survey; each was reviewed by the
         curator before commit. Final distribution: 4 MOLECULAR,
         4 CELLULAR, 3 TISSUE, 1 ORGANISM.

      2. Split — two nodes were flagged as bundled by the classifier and
         reviewed with the curator, then split into atomic per-scale
         nodes:

         (a) "PTCH1 Germline Mutations" (etiology-with-consequence
             bundle) → "PTCH1 Germline First-Hit Loss-of-Function" +
             "PTCH1 Somatic Second-Hit Loss", capturing Knudson's
             two-hit model as an atomic causal chain. Adds PMID:8681379
             (Hahn et al 1996, Cell) as LOH evidence for the somatic
             second hit.

         (b) "SUFU-Associated Extra-Cutaneous Tumor Predisposition"
             (multi-organ enumeration bundle at ORGANISM scale) →
             "SUFU-Associated Meningioma Predisposition" +
             "SUFU-Associated Ovarian Fibroma Predisposition" +
             "SUFU-Associated Gonadal Tumor Predisposition", each at
             TISSUE scale. The incoming edge from SUFU Germline
             Mutations was fanned out to all three.

      All foreign-key targets in downstream[] edges were rewired; no
      orphans. Full triple-check (schema + terms + references) passes.
