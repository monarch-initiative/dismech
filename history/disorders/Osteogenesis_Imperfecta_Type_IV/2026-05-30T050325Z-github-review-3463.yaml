      ## Findings

      1. **OI GeneReviews should be used and legacy terminology mapped.** COL1A1/COL1A2 OI GeneReviews covers moderate OI and current descriptive nomenclature. Source: https://www.ncbi.nlm.nih.gov/books/NBK1295/
      2. **Diagnosis and surveillance are missing.** Add COL1A1/COL1A2 molecular diagnosis, fracture/radiographic evaluation, spine/craniovertebral monitoring, dental/hearing evaluation, respiratory risk, and bone-health follow-up.
      3. **Pathophysiology is good but needs collagen-specific detail.** Procollagen processing/trafficking, matrix assembly, and remodeling are present; connect structural collagen variants to moderate deforming OI, normal sclerae, DI, and basilar invagination risk.
      4. **Treatment should be severity-specific.** Bisphosphonate, orthopedic care, and PT are present. Add rodding/fracture management, dental/hearing care, pain/mobility, respiratory/spine surveillance, and counseling.
      5. **Phenotype coverage should be checked for type IV boundaries.** Normal scleral hue, DI, recurrent fractures, short stature, bowing, scoliosis, hearing impairment, basilar invagination, and Wormian bones are present; ensure not mixing type III or V features.

      ## Research-artifact cross-check

      Matching artifacts: OI IV Falcon and cyberian-codex files. The YAML covers core features but under-consumes GeneReviews diagnosis/surveillance and modern OI nomenclature.

      ## Content-completeness summary

      - **Phenotypes:** good; verify type-IV-specific scope.
      - **Subtype/lumping:** map old type IV to current moderate OI terminology.
      - **Pathophysiology:** deepen collagen mechanism.
      - **Management/diagnosis:** diagnosis missing; broaden surveillance.

