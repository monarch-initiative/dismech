      ## Completed curation review

      - Disease: **Keratoderma Hereditarium Mutilans**
      - Entry: `kb/disorders/Keratoderma_Hereditarium_Mutilans.yaml`
      - Selection basis: #54 of the least-recently edited Mendelian entries
      - Review decision: **Changes required**
      - Validation stance: assumes schema/term/reference validation passes; this is a biological and clinical-content review.

      ## Findings

      1. **Subtype-specific scope needs tightening.** The YAML correctly separates classic Vohwinkel syndrome and loricrin keratoderma, with GJB2 and LOR genetics. Phenotypes and treatments should be subtype-specific because hearing loss is classic for GJB2 Vohwinkel, while loricrin keratoderma has ichthyosis without the same connexin/hearing mechanism.
      2. **Diagnosis is missing.** The entry has no diagnosis section. Add clinical dermatologic diagnosis, audiology, family history, molecular testing for GJB2/LOR, and differential diagnosis among palmoplantar keratodermas and ichthyoses.
      3. **Pseudoainhum management needs priority.** Keratolytics/emollients/retinoids/surgery are present, but pseudoainhum/digital constriction can require monitoring and timely surgical release to prevent autoamputation.
      4. **Mechanism should not merge GJB2 and LOR biology.** Gap-junction dysfunction, abnormal epidermal differentiation, mutant loricrin nuclear accumulation, digital constriction, and cochlear dysfunction are present; ensure GJB2-to-cochlear and LOR-to-nuclear/ichthyosis branches are separated.
      5. **Hearing management should be tied to GJB2 subtype.** Hearing aids/cochlear implants are appropriate only when hearing loss is present and should be tied to audiologic surveillance.

      ## Research-artifact cross-check

      Matching artifacts: cyberian-codex and Falcon deep research files. The YAML consumes the major subtypes and mechanisms but under-consumes diagnosis and subtype-specific clinical management.

      ## Content-completeness summary

      - **Phenotypes:** broad; assign to classic versus loricrin subtype.
      - **Subtype/lumping:** main issue: keep GJB2 and LOR distinct.
      - **Pathophysiology:** good but needs subtype-specific evidence boundaries.
      - **Management/diagnosis:** diagnosis missing; pseudoainhum and audiology need stronger management framing.
      - **References:** verify subtype-specific claims before YAML updates.

