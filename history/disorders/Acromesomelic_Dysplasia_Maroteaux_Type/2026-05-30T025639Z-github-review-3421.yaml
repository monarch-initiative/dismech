      ## Completed curation review

      - Disease: **Acromesomelic Dysplasia Maroteaux Type**
      - Entry: `kb/disorders/Acromesomelic_Dysplasia_Maroteaux_Type.yaml`
      - Selection basis: #34 of 50 least-recently edited Mendelian entries
      - Review decision: **Changes required**
      - Validation stance: assumes schema/term/reference validation passes; this is a biological and clinical-content review.

      ## Findings

      1. **Diagnosis and routine management are missing.** The YAML has phenotypes, mechanisms, genetics, and recombinant human growth hormone treatment, but no diagnosis section or standard orthopedic/genetic counseling management.
      2. **NPR2/CNP/cGMP mechanism is good but should be connected to growth-plate cells.** The entry has impaired CNP-NPR-B-cGMP signaling, reduced longitudinal bone growth, and FGF-NPR2 crosstalk. Add growth-plate chondrocyte proliferation/hypertrophy and endochondral ossification consequences explicitly.
      3. **Treatment evidence for growth hormone needs review.** Recombinant human growth hormone is listed as the only treatment. AMDM is caused by NPR2 loss of function; any rhGH response is not the core mechanism and should be presented with evidence strength. CNP/NPR-B pathway therapies may be mechanistically relevant but require careful evidence before inclusion.
      4. **Phenotype coverage is good but should distinguish AMDM from other acromesomelic dysplasias.** The entry has many skeletal features; it should make clear that NPR2-related Maroteaux type has normal intelligence and characteristic acromesomelic/mesomelic shortening with vertebral/hand/foot features, distinct from GDF5/BMPR1B/PRKG2 forms.
      5. **Genetic counseling should be present.** Autosomal recessive inheritance is present; add molecular testing and family/reproductive counseling.

      ## Research-artifact cross-check

      Checked `research/Acromesomelic_Dysplasia_Maroteaux_Type-deep-research-openai.md` and `.citations.md`. The YAML consumes the central NPR2 signaling mechanism but under-consumes diagnosis/management and disease-boundary distinctions.

      ## Content-completeness summary

      - **Phenotypes:** strong skeletal coverage; add normal intelligence/differential notes if supported.
      - **Subtype/lumping:** clarify Maroteaux/NPR2 versus other acromesomelic dysplasias.
      - **Pathophysiology:** add growth-plate chondrocyte/endochondral ossification detail.
      - **Management/diagnosis:** major gap beyond rhGH.
      - **References:** verify treatment evidence before retaining or expanding therapy claims.

      ## Suggested remediation

      Add diagnosis/genetic counseling, refine growth-plate mechanism, distinguish other acromesomelic dysplasias, and re-evaluate rhGH treatment evidence.

