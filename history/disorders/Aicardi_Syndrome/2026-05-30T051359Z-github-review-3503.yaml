      Completed curation review for `kb/disorders/Aicardi_Syndrome.yaml`.

      ## Findings

      1. Blocking: a GeneReviews article exists for Aicardi syndrome, but the entry has no top-level `references:` item tagged `GeneReviews`. Add the GeneReviews reference and use it as the baseline source for clinical characteristics, diagnosis, management, and inheritance nuance.

      2. Blocking: the entry has no `diagnosis` section. Aicardi syndrome is diagnosed clinically/neuro-ophthalmologically because no definitive causal gene is known. The YAML should add diagnostic criteria: the classic triad, revised criteria allowing two classic features plus major/supporting features, brain MRI findings, ophthalmologic exam for chorioretinal lacunae, EEG context, and the important distinction from Aicardi-Goutieres syndrome.

      3. Blocking/claim-strength issue: genetic language needs to avoid implying that candidate genes are established causes. The entry correctly notes an unknown X-linked gene and genetic heterogeneity, but the description lists candidate genes in a way that could be over-read as causal. Keep the candidate-gene evidence as unresolved/heterogeneous, and make the unknown-gene status the primary assertion.

      4. Non-blocking but actionable: the pathophysiology section is mostly a structured decomposition of clinical malformations and seizure manifestations. That is useful for a disorder with unknown molecular cause, but the entry should explicitly distinguish observed developmental abnormalities from proven causal mechanisms, so the pathograph does not imply that corpus callosum agenesis or chorioretinal lacunae are upstream molecular events.

      5. Non-blocking: management is broader than the current treatment set. The entry covers antiseizure therapy, ketogenic diet, epilepsy surgery, scoliosis surgery, rehabilitation, and genetic counseling, but GeneReviews/MedlinePlus-level management should also prompt ophthalmology/vision care, feeding/GI support, respiratory/sleep/aspiration management, orthopedic surveillance before surgery, and developmental/communication supports.

      ## Research Cross-Check

      - Phenotype coverage: broad and mostly adequate for the triad, brain malformations, eye findings, seizures, developmental disability, scoliosis, GI/respiratory issues, and survival.
      - Subtype completeness: not applicable.
      - Pathophysiology depth: appropriate caution is needed because the causal gene is unknown; distinguish clinical abnormalities from causal mechanism.
      - Treatments and clinical trials: several core seizure and orthopedic interventions are present; multisystem supportive management should be expanded.
      - Genetics: unknown X-linked/de novo framing is mostly correct, but candidate-gene wording needs tighter caveats.
      - Biomarkers/diagnostics: diagnosis section missing; GeneReviews baseline not tagged.
      - Research consumption: the Perplexity artifact and GeneReviews/MedlinePlus sources support a fuller diagnostic and management block than the YAML currently has.

