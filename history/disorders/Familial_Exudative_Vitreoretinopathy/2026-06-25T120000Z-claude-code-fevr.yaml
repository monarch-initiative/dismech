    summary: 'Enhance FEVR stub with Edison research: ZNF408/CTNNB1 genes, iBRB pathophysiology, staging, and new phenotypes'
    details: |
      Enhanced the Familial_Exudative_Vitreoretinopathy stub based on FutureHouse
      Edison Falcon deep research (run 2026-06-17) and manual reference curation per
      dismech issue #4008.

      ## NEC Preflight
      PASSED — Edison report consistently discusses FEVR caused by FZD4/LRP5/NDP/TSPAN12
      via the Norrin/Wnt/beta-catenin pathway (OMIM 133780). No disease confusion.

      ## Changes Made

      ### Genetic section — new entries
      - ZNF408 (hgnc:20041): Added as CAUSATIVE with evidence from Le 2023 Cells review.
        ZNF408 variants cause mild FEVR phenotypes, partly outside canonical Norrin/Wnt pathway.
      - CTNNB1 (hgnc:2514): Added as CAUSATIVE; beta-catenin is the intracellular Wnt effector.

      ### Pathophysiology — new node + downstream link
      - Added downstream link from "Impaired Norrin/beta-catenin signaling" to new
        "Inner Blood-Retinal Barrier Dysfunction" node.
      - New node "Inner Blood-Retinal Barrier Dysfunction": models iBRB failure as a
        distinct pathophysiological element (Le 2023: aberrant iBRB function alongside
        irregular retinal vascular development). Uses CL:0002585, GO:1990963.

      ### Phenotypes — new entries
      - Myopia (HP:0000545, subtype: FZD4-FEVR, FREQUENT): Lähteenoja 2024 — 62% of
        FZD4+ study eyes in Finnish cohort. First myopia documentation in a FEVR subtype.
      - Strabismus (HP:0000486, OCCASIONAL): Chen 2022 infant cohort — 20% at first visit.
      - Vitreous hemorrhage (HP:0007902, OCCASIONAL): Orphanet ORPHA:891.
      - Added GeneReviews (PMID:20301326) evidence to peripheral retinal avascularization:
        "bilateral peripheral retinal avascularity, seen temporally, by indirect
        ophthalmoscope and scleral indentation, or by fundus fluorescein angiography"

      ### Progression — 5-stage system added
      - Stages 1-5 per Pendergast/Kashani classification:
        1. Peripheral avascular zone
        2. Extraretinal neovascularization (2a flat, 2b with exudate)
        3. Extramacular retinal detachment
        4. Subtotal retinal detachment involving macula
        5. Total retinal detachment
      - Stage-specific outcomes from Chen 2022 infant cohort (n=335).

      ### Clinical trials — new entry
      - NCT05107921 (Phase II, Seoul): Bromfenac sodium hydrate eye drops in pediatric
        FEVR post diode laser photocoagulation. Novel NSAID adjunct approach.

      ### References — new DOI entries added
      - DOI:10.3390/cells12212579 (Le et al. 2023, Cells): iBRB and FEVR mechanisms review
      - DOI:10.1111/aos.16701 (Lähteenoja et al. 2024/2025, Acta Ophthalmologica):
        Finnish FZD4 natural history, n=35
      - DOI:10.1186/s12886-022-02522-8 (Chen et al. 2022, BMC Ophthalmology):
        335-infant single-gene positive FEVR cohort
      - clinicaltrials:NCT05107921 (bromfenac FEVR trial)

      ### Cache fixes
      - PMID:20301326: En dash in title replaced with ASCII hyphen to prevent
        Windows cp1252/UTF-8 encoding mismatch in reference validator.

