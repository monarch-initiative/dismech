      ## Findings

      1. **Management is too generic.** Supportive multidisciplinary management is the only treatment. Ayme-Gripp syndrome needs cataract/ophthalmology management, audiology/hearing aids or cochlear consideration, seizure management, developmental therapies, growth/nutrition, and genetic counseling.
      2. **Diagnosis is missing.** Add MAF molecular testing, ophthalmologic cataract evaluation, audiology, neurologic/developmental evaluation, and differential diagnosis with other congenital cataract-hearing-NDD syndromes.
      3. **Phenotype coverage is incomplete.** Cataract, hearing impairment, developmental delay, seizure, growth delay, brachycephaly, and flat profile are present. Reports include distinctive facial features, dental anomalies, radiologic/skeletal findings, pericarditis/serositis in some cases, and variable neurodevelopment.
      4. **Mechanism is good but needs evidence-source clarity.** Impaired GSK3-mediated MAF phosphorylation, stabilized MAF, and dysregulated transcription should be tied to specific variants and experimental evidence.
      5. **Inheritance needs de novo/recurrence nuance.** Autosomal dominant is present; most cases are de novo, which affects counseling.

      ## Research-artifact cross-check

      Matching artifacts: `research/Ayme-Gripp_Syndrome-deep-research-asta.md` and `.citations.md`. Asta should be treated as leads; primary MAF/Ayme-Gripp cohort literature should anchor updates.

