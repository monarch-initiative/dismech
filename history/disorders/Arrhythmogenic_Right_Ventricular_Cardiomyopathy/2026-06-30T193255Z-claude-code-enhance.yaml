    summary: 'Evidence and module-conformance enhancement: Arrhythmogenic Right Ventricular Cardiomyopathy'
    details: |
      Compliance-driven enhancement of the existing ARVC entry (no new file;
      "familial isolated ARVD/C" is the inherited/desmosomal form of the same
      MONDO:0016587 entity, already covered here). All added snippets are exact
      substrings of the cached abstract for PMID:24817548 (Groeneweg et al.,
      Neth Heart J 2014), verified before commit.

      Changes:
      1. Added inheritance evidence supporting incomplete penetrance and
         variable expressivity of the autosomal dominant substrate.
      2. Declared module conformance on the "Fibrofatty replacement of
         cardiomyocytes" node:
         conforms_to: cardiomyopathy_maladaptive_remodeling#Ventricular Remodeling
         (the module explicitly lists desmosomal defects as an intended
         substitution); noted the ARVC-specific fibrofatty—rather than
         interstitial-collagen—remodeling.
      3. Added evidence to previously unsupported downstream causal edges:
         gap-junction uncoupling -> ventricular tachycardia (DIRECT) and
         -> syncope (INDIRECT_KNOWN_INTERMEDIATES); conduction slowing ->
         ventricular tachycardia (DIRECT) and -> sudden cardiac death
         (INDIRECT_KNOWN_INTERMEDIATES); fibrofatty replacement -> right
         ventricular dilatation and -> congestive heart failure. The
         conduction-slowing -> T-wave inversion edge was intentionally left
         without forced evidence (no clean supporting quote; the link is a
         repolarization phenotype, not a direct depolarization consequence).
      4. Added target_mechanisms evidence for antiarrhythmic pharmacotherapy
         (sotalol/amiodarone/flecainide) and substrate-based catheter ablation.
      5. Removed the deprecated updated_date field per project policy.

      Validation: schema, term, and reference validation pass; causal-graph
      check clean for this entry. Global compliance rose 91.9% -> 98.6%
      (weighted 92.4% -> 99.3%).
