      ## Completed curation review

      - Disease: **FAS-related Autoimmune Lymphoproliferative Syndrome**
      - Entry: `kb/disorders/FAS-related_Autoimmune_Lymphoproliferative_Syndrome.yaml`
      - Selection basis: #52 of the least-recently edited Mendelian entries
      - Review decision: **Changes required**
      - Validation stance: assumes schema/term/reference validation passes; this is a biological and clinical-content review.

      ## Findings

      1. **GeneReviews exists and should be used as the baseline.** ALPS GeneReviews covers FAS-related ALPS, diagnostic criteria, biomarkers, lymphoma risk, and management. The current entry should have a tagged GeneReviews reference and be checked against it. Source: https://www.ncbi.nlm.nih.gov/books/NBK1108/
      2. **Treatment coverage is incomplete.** Sirolimus and mycophenolate are present, but ALPS management also includes acute autoimmune cytopenia treatment, steroid-sparing strategies, infection prevention, immunoglobulin replacement in selected patients, splenectomy avoidance/risks, lymphoma surveillance, and HSCT only in selected severe cases.
      3. **Diagnosis is strong but could be updated to diagnostic-criteria framing.** DNT flow cytometry, serum biomarkers, Fas apoptosis assay, and molecular testing are present. Add ALPS diagnostic criteria context, vitamin B12/IL-10/FASL biomarkers, and distinction between germline, somatic, and dominant-negative FAS variants where supported.
      4. **Inheritance/penetrance needs nuance.** Autosomal dominant is present, but FAS ALPS has incomplete penetrance, somatic FAS variants, and genotype-function correlations that influence recurrence and family screening.
      5. **Phenotype coverage should include infection/splenectomy context and immune phenotype.** Lymphadenopathy, splenomegaly, autoimmune cytopenias, DNT expansion, and lymphoma are present; add chronic nonmalignant lymphoproliferation age/course and immunoglobulin abnormalities where supported.

      ## Research-artifact cross-check

      Matching artifacts: Falcon and manual deep research files. The YAML consumes the central Fas-apoptosis/DNT/autoimmune cytopenia model but under-consumes GeneReviews management, penetrance/somatic-variant nuance, and lymphoma/splenectomy surveillance details.

      ## Content-completeness summary

      - **Phenotypes:** core ALPS features present; add immune/lab and course details.
      - **Subtype/lumping:** distinguish germline FAS, somatic FAS, and related ALPS-like disorders.
      - **Pathophysiology:** strong Fas apoptosis mechanism.
      - **Management/diagnosis:** diagnosis good; management incomplete beyond sirolimus/MMF.
      - **References:** add/tag ALPS GeneReviews if updating YAML.

