      ## Findings

      1. **GeneReviews exists and should be used.** RYR1-related disorders GeneReviews covers central core disease, malignant hyperthermia susceptibility, inheritance, diagnosis, and management. Source: https://www.ncbi.nlm.nih.gov/books/NBK537423/
      2. **Diagnosis should be explicit.** The entry has no diagnosis section. Add muscle biopsy/core pathology, RYR1 sequencing/deletion testing, EMG/CK/MRI, clinical neuromuscular assessment, and malignant hyperthermia risk evaluation.
      3. **Management is good but should include perioperative planning.** Avoidance of MH triggers and dantrolene are present; add anesthesia alerting, family testing, emergency preparedness, respiratory/orthopedic surveillance, scoliosis/hip management, and rehab.
      4. **Inheritance and genotype-mechanism distinctions should be subtype-aware.** AD and AR inheritance are present; dominant hotspot variants, recessive reduced-expression variants, and MH-associated variants should be mapped to clinical/mechanistic differences.
      5. **Phenotype coverage should include ophthalmoplegia/respiratory if supported.** The current list is broad; check for congenital severity and adult mild presentations.

      ## Research-artifact cross-check

      Matching artifacts: Central Core Myopathy Falcon files. The YAML has strong RYR1 mechanism and management elements but needs GeneReviews diagnosis and perioperative/family risk completeness.

