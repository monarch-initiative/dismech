      ## Completed curation review

      - Disease: **Ogden syndrome**
      - Entry: `kb/disorders/Ogden_syndrome.yaml`
      - Selection basis: #55 of the least-recently edited Mendelian entries
      - Review decision: **Changes required**
      - Validation stance: assumes schema/term/reference validation passes; this is a biological and clinical-content review.

      ## Findings

      1. **Disease boundary with NAA10- and NAA15-related disorders needs review.** The YAML lists both NAA10 and NAA15 under genetics. Classic Ogden syndrome is NAA10-related X-linked disease, while NAA15-related NDD is usually autosomal dominant and clinically overlapping but distinct. Listing both under Ogden syndrome risks conflating disorders.
      2. **Management is incomplete.** Cardiac surveillance, speech therapy, and physical therapy are present, but the entry should include feeding/growth support, seizure management, developmental/behavioral therapies, ophthalmology/hearing assessment where relevant, and genetic counseling with X-linked recurrence.
      3. **Phenotype coverage should include mortality/severity spectrum.** Prematurely aged appearance, developmental delay, hypotonia, growth delay, cardiac anomalies/arrhythmia, and seizures are present. Classic NAA10 Ser37Pro Ogden syndrome had infant male lethality; broader NAA10 variants include variable female and male phenotypes.
      4. **Pathophysiology should distinguish NatA catalytic versus complex-assembly defects and variant classes.** The YAML has NatA catalytic activity/assembly, substrate hypoacetylation, and fibroblast migration/proliferation defects, but should not assume NAA15 mechanisms are identical to NAA10 Ogden syndrome.
      5. **Diagnosis is missing.** Add NAA10 molecular testing, cardiac ECG/echo, developmental assessment, and variant-specific family testing.

      ## Research-artifact cross-check

      Matching artifacts: `research/Ogden_syndrome-deep-research-asta.md` and `.citations.md`. Asta output should be treated as leads; NAA10/NAA15 disease-boundary claims need primary-source verification.

      ## Content-completeness summary

      - **Phenotypes:** add severity, feeding/growth, sex-specific and variant-specific course.
      - **Subtype/lumping:** major gap: separate NAA10 Ogden from NAA15-related NDD unless intentionally scoped.
      - **Pathophysiology:** needs variant/gene-specific evidence boundaries.
      - **Management/diagnosis:** diagnosis missing; management incomplete.
      - **References:** verify against primary NAA10/NAA15 cohort literature.

