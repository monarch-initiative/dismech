      4. Pathophysiology review: the main modeled mechanisms include Inappropriate activation of testis determination in 46,XX gonad, SRY translocation onto an X chromosome, SOX9 or SOX3 dysregulation in SRY-negative cases, RSPO1-dependent canonical beta-catenin pro-ovarian signaling loss. Check that each is an atomic event with direct evidence and that downstream edges do not encode multi-step chains or unsupported causal leaps from gene/product defect to organ-level phenotype.
      5. Treatment/trial alignment: both `treatments` and `clinical_trials` are present. Verify that trial interventions, phases/statuses, target phenotypes, and treatment entries agree, and distinguish approved/standard care from investigational or case-report therapy.
