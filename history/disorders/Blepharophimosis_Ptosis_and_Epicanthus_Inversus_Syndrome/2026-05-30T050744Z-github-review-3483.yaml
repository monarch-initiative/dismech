      ## Findings

      1. **GeneReviews is referenced and should be fully consumed.** BPES GeneReviews covers type I/II, FOXL2 variant classes, ophthalmologic management, and ovarian insufficiency. Source: https://www.ncbi.nlm.nih.gov/books/NBK1441/
      2. **Diagnosis is missing.** Add ophthalmologic clinical criteria, visual/amblyopia evaluation, FOXL2 sequencing/deletion testing, and endocrine/reproductive evaluation in females at risk for POI.
      3. **Management needs staging and timing.** Medial canthoplasty, frontalis suspension, HRT, and assisted reproduction are present. Add amblyopia prevention, timing of eyelid surgery, refractive/strabismus management, fertility preservation counseling, and genetic counseling.
      4. **Subtype mapping should be stronger.** Type I includes POI; Type II generally lacks POI. Phenotypes/treatments should map to type I versus type II.
      5. **Mechanism should be variant-class specific.** FOXL2 eyelid development, ovarian reserve maintenance, and variant-class severity are present; connect truncating/polyalanine/whole-gene deletions to subtype evidence where supported.

      ## Research-artifact cross-check

      Matching artifact: `research/Blepharophimosis_Ptosis_and_Epicanthus_Inversus_Syndrome-deep-research-manual.md`. The YAML captures the main BPES split but under-consumes diagnosis, surgical timing, and reproductive counseling.

