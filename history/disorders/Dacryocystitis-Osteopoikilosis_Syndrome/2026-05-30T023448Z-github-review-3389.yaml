      ## Completed curation review

      - Disease: **Dacryocystitis-Osteopoikilosis Syndrome**
      - Entry: `kb/disorders/Dacryocystitis-Osteopoikilosis_Syndrome.yaml`
      - Selection basis: #3 of 50 least-recently edited Mendelian entries
      - Review decision: **Changes required / human-curator attention recommended**
      - Validation stance: this review assumes schema, ontology-term, and reference validation pass; findings below are biological/clinical/content issues.

      ## Findings

      1. **The entry overstates the molecular certainty for the combined syndrome.** The YAML presents a single LEMD3/MAN1 loss-of-function -> TGF-beta/BMP-SMAD -> osteopoikilosis/lacrimal stenosis/fibroproliferation pathograph. That is well supported for osteopoikilosis / Buschke-Ollendorff spectrum, but the syndrome-defining dacryocystitis + osteopoikilosis report was a small family report and the research artifact explicitly notes that direct mechanistic studies in dacryocystitis-osteopoikilosis syndrome are sparse. The lacrimal component should be marked as a hypothesis or indirect inference, not presented at the same certainty level as LEMD3-caused osteopoikilosis.

      2. **The LEMD3 gene-disease claim needs scope control.** Current `genetic:` content cites LEMD3 evidence from osteopoikilosis/BOS studies. That supports the osteopoikilosis component, but it does not directly prove that LEMD3 causes the named combined lacrimal-bone syndrome in the original family unless that family was molecularly tested. The issue for a curator is not the validity of LEMD3 in osteopoikilosis; it is whether the dismech entry should state LEMD3 as the causal gene for `dacryocystitis-osteopoikilosis syndrome` without a qualifying note.

      3. **Frequency labels for associated fibroproliferative findings may exceed the disease-specific evidence.** Dacryocystitis and osteopoikilosis as diagnostic/obligate features are supported by the original five-person family. Dupuytren contracture, keloids, and digital flexor tenosynovitis are supported by adjacent osteopoikilosis/fibroproliferative-spectrum literature, not clearly by the named syndrome. These should be scoped as related-spectrum manifestations or removed from this disease entry unless direct disease-specific evidence exists.

      4. **The lacrimal duct stenosis claim is mechanistically plausible but evidence-light.** The original report supports dacryocystitis with osteopoikilosis and proposed stenosis of the lacrimal sac/canal as the prerequisite. The current YAML's downstream statement that excessive TGF-beta signaling in fibroblasts drives nasolacrimal fibroproliferative stenosis goes beyond direct tissue evidence. It should be phrased as a proposed mechanism, with the evidence explanation explicitly distinguishing direct clinical observation from inferred mechanism.

      5. **Diagnostics and management should emphasize avoiding misclassification and treating complications.** The entry lists dacryocystorhinostomy and antibiotic therapy, but has no diagnosis section. For this rare entity, practical curation should include confirmation of chronic dacryocystitis/nasolacrimal obstruction, radiographic osteopoikilosis, consideration of LEMD3-spectrum/BOS differential diagnosis, and the common osteopoikilosis pitfall of mistaking sclerotic bone islands for metastatic disease.

      ## Research-artifact cross-check

      Checked:
      - `research/Dacryocystitis-Osteopoikilosis_Syndrome-deep-research-falcon.md`
      - `research/Dacryocystitis-Osteopoikilosis_Syndrome-deep-research-falcon.md.citations.md`

      The Falcon artifact is unusually important here because it highlights the evidence boundary: the named syndrome comes from the original small family report; the molecular mechanism comes from LEMD3 osteopoikilosis/BOS literature; and direct lacrimal-tissue mechanistic validation was not found. The current YAML uses most of the artifact's proposed model but does not sufficiently mark the lacrimal mechanism and LEMD3-to-named-syndrome mapping as indirect.

      ## Content-completeness checklist

      - **Phenotypes:** Core dacryocystitis and osteopoikilosis are covered. Adjacent fibroproliferative findings need scope qualifiers or direct disease-specific support.
      - **Subtype / lumping-splitting:** Needs curator judgment. This may be a very small named syndrome within the broader LEMD3/osteopoikilosis/BOS spectrum; the entry should make that boundary explicit.
      - **Pathophysiology:** Osteopoikilosis mechanism is adequate. Lacrimal/fibroproliferative mechanism is overconfident and should be downgraded to proposed/indirect unless stronger evidence is found.
      - **Treatments / management:** Partial. Dacryocystorhinostomy/antibiotics address lacrimal disease, but the entry should distinguish syndrome-specific evidence from standard dacryocystitis care and include diagnostic/radiographic management considerations.
      - **Genetics:** Needs qualification. LEMD3 is strong for osteopoikilosis/BOS but direct genetic confirmation for the named combined syndrome is not established in the reviewed artifact.
      - **Diagnostics / biomarkers:** Missing. Add radiographic osteopoikilosis confirmation, lacrimal drainage evaluation, and differential diagnosis / metastatic-mimic caution.
      - **References:** High-value references are present, but evidence explanations need to state when a citation supports only an adjacent-spectrum inference.
      - **Overall consumption:** The YAML consumed the mechanistic proposal but not the artifact's caution about evidence strength; that is the central review issue.

      ## Suggested remediation

      Revise the entry so that LEMD3/BMP/TGF-beta mechanisms support osteopoikilosis directly, while nasolacrimal stenosis and the combined syndrome are represented as clinical/proposed links. Add diagnostic content and re-scope associated fibroproliferative phenotypes to avoid implying they are established features of the named syndrome.

