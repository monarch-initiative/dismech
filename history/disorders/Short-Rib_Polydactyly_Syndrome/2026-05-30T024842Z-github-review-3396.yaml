      ## Completed curation review

      - Disease: **Short-Rib Polydactyly Syndrome**
      - Entry: `kb/disorders/Short-Rib_Polydactyly_Syndrome.yaml`
      - Selection basis: #9 of 50 least-recently edited Mendelian entries
      - Review decision: **Changes required**
      - Validation stance: assumes schema/term/reference validation passes; this is a biological and clinical-content review.

      ## Findings

      1. **The entry is likely too lumped for the current disease concept.** The YAML has no `has_subtypes:` but lists genes/labels corresponding to SRP type II/Majewski, SRP type III/Verma-Naumoff, and other short-rib thoracic dysplasia genes. NCBI/GTR frames short-rib thoracic dysplasia as a heterogeneous group overlapping Jeune/ATD, SRPS, Mainzer-Saldino, and EVC. The current entry should either explicitly model subtypes or narrow its disease boundary.
      2. **Prenatal/lethal presentation is under-modeled.** The phenotype list captures short ribs, narrow thorax, limb shortening, polydactyly, renal cystic disease, cardiovascular defects, and polyhydramnios. For SRPS, prenatal ultrasound diagnosis, perinatal lethality/respiratory insufficiency, and visceral malformations are central and should be represented.
      3. **Gene coverage is incomplete and needs subtype mapping.** DYNC2H1, NEK1, WDR34, and IFT80 are present, but the broader SRPS/SRTD spectrum includes additional dynein-2 and IFT genes. More importantly, each gene should be tied to the correct subtype/disease term rather than placed in one undifferentiated genetic section.
      4. **Mechanism should distinguish dynein-2/IFT branches.** The YAML has IFT/ciliogenesis defects and Hedgehog disruption. The research artifacts support more atomic dynein-2 retrograde IFT, IFT-A/B transport, ciliary transition-zone/gating, and growth-plate chondrocyte Hedgehog/IHH effects.
      5. **Management is too generic.** `Supportive Care` is insufficient for a lethal/prenatally diagnosed skeletal ciliopathy group. The entry should include prenatal counseling/diagnosis, neonatal respiratory planning, renal/hepatic/cardiac evaluation where applicable, and palliative/perinatal management distinctions.

      ## Research-artifact cross-check

      Checked `research/Short-Rib_Polydactyly_Syndrome-deep-research-falcon.md`, `.citations.md`, `research/Short-Rib_Polydactyly_Syndrome-deep-research-cyberian-codex.md`, and `.citations.md`. The YAML consumes the broad ciliopathy mechanism but under-consumes subtype/gene specificity and prenatal/perinatal clinical context.

      ## Content-completeness summary

      - **Phenotypes:** core skeletal/visceral phenotypes present; prenatal lethality and organ-system specifics need strengthening.
      - **Subtype/lumping:** major gap. Add subtype structure or narrow the entry.
      - **Pathophysiology:** split IFT/dynein/Hedgehog mechanisms by gene/subtype where evidence supports.
      - **Management/diagnosis:** add prenatal diagnosis, counseling, neonatal respiratory/perinatal care, and organ surveillance.
      - **References:** verify subtype PMIDs before adding new evidence.

      ## Suggested remediation

      Define the scope against SRTD/SRPS, add subtype mappings, expand gene-specific mechanisms, and replace generic supportive care with prenatal/perinatal and organ-system management.

