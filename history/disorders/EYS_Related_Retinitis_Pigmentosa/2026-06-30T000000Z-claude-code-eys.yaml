    summary: 'Initial curation of EYS-Related Retinitis Pigmentosa (RP25)'
    details: |
      Initial curation of EYS-related retinitis pigmentosa (MONDO:0011272, RP25)
      per the retinopathy curation initiative (related to issue #4008).

      ## MONDO Term

      - Primary: MONDO:0011272 (retinitis pigmentosa 25)
      - OMIM: 602772
      - Synonyms: RP25, EYS retinitis pigmentosa, retinitis pigmentosa caused by mutation in EYS

      ## Deep Research

      Attempted deep research with claude_code provider; the run failed because
      the agentapi binary was not found in PATH on the local Windows machine.
      Curation was performed using direct knowledge plus primary literature.
      No research/EYS_Related_Retinitis_Pigmentosa-deep-research-claude_code.md
      was generated.

      ## Biology Captured

      - EYS encodes a 3,145–3,165 aa extracellular protein (EGF-like + LamG domains)
        at the RP25 locus on chr6q12; the largest eye-specific gene in the human genome
        (spanning >2 Mb, 43–44 exons)
      - EYS is the human ortholog of Drosophila spacemaker (spam/eyes shut), a
        ciliary spacer essential for open rhabdom photoreceptor architecture
      - EYS localizes to the connecting cilium / periciliary space; loss disrupts
        outer segment structural integrity (ciliopathy mechanism)
      - Three pathophysiology nodes:
        1. EYS Protein Deficiency (trigger; gene: EYS modifier ABSENT)
        2. Ciliary Structural Disruption (conforms_to: ciliopathy_dysfunction#Basal Body and Transition Zone Dysfunction)
        3. Rod Photoreceptor Apoptosis (conforms_to: photoreceptor_degeneration#Rod Photoreceptor Apoptosis)
      - EYS is independently pseudogenized in rodents: no mouse models; zebrafish used

      ## References Used

      - PMID:18976725 (Collin et al. 2008, Am J Hum Genet): EYS gene identification
        (confirmed: abstract fetched and snippets verified)
      - PMID:18836446 (Abd El-Aziz et al. 2008, Nat Genet): EYS co-discovery
        (confirmed: full text fetched and snippets verified)
      - ORPHA:791 (Orphanet Retinitis pigmentosa): phenotype frequencies and gene list
        (confirmed: structured rebuild from Orphadata XML)

      ## Phenotypes Captured (from ORPHA:791)

      - HP:0000662: Nyctalopia (OBLIGATE)
      - HP:0007675: Progressive night blindness (VERY_FREQUENT)
      - HP:0007994: Peripheral visual field loss (VERY_FREQUENT)
      - HP:0007737: Spicular pigmentation of the retina / bone spicule pigmentation (VERY_FREQUENT)
      - HP:0007843: Attenuation of retinal blood vessels (FREQUENT)
      - HP:0000543: Optic disc pallor (FREQUENT)
      - HP:0000512: Abnormal electroretinogram (VERY_FREQUENT)
      - HP:0007787: Posterior subcapsular cataract (FREQUENT)
      - HP:0011505: Cystoid macular edema (FREQUENT)
      - HP:0000529: Progressive visual loss (VERY_FREQUENT)

