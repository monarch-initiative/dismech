      ## Completed curation review

      - Disease: **Activated PI3K-delta syndrome**
      - Entry: `kb/disorders/Activated_PI3K-delta_Syndrome.yaml`
      - Selection basis: #60 of the least-recently edited Mendelian entries
      - Review decision: **Changes required**
      - Validation stance: assumes schema/term/reference validation passes; this is a biological and clinical-content review.

      ## Findings

      1. **Diagnosis is missing despite a strong treatment/phenotype section.** Add immunoglobulin profiles, vaccine responses, lymphocyte subsets/senescent T cells, genetic testing for PIK3CD/PIK3R1, infection/bronchiectasis imaging, and lymphoma/EBV evaluation.
      2. **APDS1 and APDS2 subtype differences should be mapped.** The YAML has APDS1 and APDS2 and PIK3CD/PIK3R1 genetics, but phenotypes and mechanisms are mostly global. APDS2 can include growth/neurodevelopmental features and splice/disruptive PIK3R1 mechanisms; subtype-specific phenotype and treatment response should be checked.
      3. **Treatment coverage should include current standards and evidence strength.** IVIG, sirolimus, leniolisib, and HSCT are present. Leniolisib is now an approved PI3K-delta inhibitor in many jurisdictions; evidence, age indications, and use relative to sirolimus/HSCT should be represented. Antibiotic prophylaxis and vaccination/infection prevention may also be relevant.
      4. **Cancer/lymphoma surveillance should be explicit.** Lymphoma is a phenotype, but management should address EBV/lymphoproliferation and malignancy risk.
      5. **Pathophysiology is good but should connect to clinical endpoints.** PI3K-delta hyperactivation, B-cell maturation defect, T-cell senescence, antiviral control, lymphoproliferation, and airway injury are useful; ensure each is tied to PIK3CD/PIK3R1 evidence.

      ## Research-artifact cross-check

      Matching artifacts: `research/Activated_PI3K-delta_Syndrome-deep-research-asta.md` and `.citations.md`. Asta should be treated as leads; current immunology guidelines and leniolisib evidence should anchor management.

      ## Content-completeness summary

      - **Phenotypes:** good but subtype-specific mapping needed.
      - **Subtype/lumping:** APDS1/APDS2 present; clinical differences need mapping.
      - **Pathophysiology:** strong; connect to diagnosis and treatment.
      - **Management/diagnosis:** diagnosis missing; treatment needs current evidence/status framing.
      - **References:** add current APDS review/guideline references if updating YAML.

