      ## Completed curation review

      - Disease: **Jeune Asphyxiating Thoracic Dystrophy**
      - Entry: `kb/disorders/Jeune_Asphyxiating_Thoracic_Dystrophy.yaml`
      - Selection basis: #6 of 50 least-recently edited Mendelian entries
      - Review decision: **Changes required**
      - Validation stance: this review assumes schema, ontology-term, and reference validation pass; findings below are biological/clinical/content issues.

      ## Findings

      1. **Gene/subtype coverage is incomplete for the Jeune/SRTD spectrum.** The YAML lists DYNC2H1, IFT80, IFT140, and WDR19, with no `has_subtypes:` or scope note. The Falcon artifact and current public summaries describe a broader skeletal ciliopathy spectrum involving dynein-2 and IFT genes, including WDR34, WDR60, DYNC2LI1, IFT74, IFT172, TTC21B/IFT139, IFT43, IFT52, IFT122, and others. If this entry intentionally covers only a subset, the scope needs to be explicit; otherwise clinically important gene-defined branches are missing.

      2. **The mechanism is directionally correct but under-specific.** The YAML has `Intraflagellar Transport Dysfunction`, `Dynein Motor Complex Deficiency`, and `Renal Cystogenesis`. The research artifact supports a more detailed chain: biallelic dynein-2/IFT defects -> abnormal retrograde/anterograde IFT, axoneme extension, transition-zone integrity, IFT-B localization, and Smoothened/Hedgehog/IHH signaling -> impaired growth-plate chondrocyte proliferation/differentiation -> short ribs/narrow thorax and respiratory insufficiency, with gene/allele-specific renal, hepatic, retinal, and airway/motile-cilia involvement. The pathograph should be decomposed around those tissue and pathway nodes.

      3. **Diagnostic and surveillance content is missing despite high clinical actionability.** The YAML has no `diagnosis:` section. Jeune/ATD is often recognized by prenatal ultrasound or neonatal radiographic findings; molecular diagnosis helps distinguish lethal short-rib polydactyly presentations from potentially survivable Jeune/SRTD forms. Survivors need renal, hepatic, ophthalmologic/retinal, and respiratory follow-up. These are central enough to model.

      4. **Management is incomplete for multisystem disease.** The YAML lists respiratory support, thoracic expansion surgery, and renal management. It does not represent hepatic surveillance/management, ophthalmologic surveillance for retinal dystrophy, genetic counseling/prenatal counseling, or airway/mucociliary issues that can appear with some IFT74/IFT-related alleles. Thoracic expansion surgery is included with evidence, but supportive and surveillance care should be more complete.

      5. **Lumping/splitting with short-rib polydactyly syndromes needs curation attention.** The entry is named Jeune asphyxiating thoracic dystrophy but the phenotype and gene list overlap the broader short-rib thoracic dysplasia / short-rib polydactyly spectrum. The curator should decide whether to add subtype mappings or a clear scope note so the entry does not silently mix classic Jeune, SRTD, and lethal SRPS entities.

      ## Research-artifact cross-check

      Checked:
      - `research/Jeune_Asphyxiating_Thoracic_Dystrophy-deep-research-cyberian-codex.md`
      - `research/Jeune_Asphyxiating_Thoracic_Dystrophy-deep-research-cyberian-codex.md.citations.md`
      - `research/Jeune_Asphyxiating_Thoracic_Dystrophy-deep-research-falcon.md`
      - `research/Jeune_Asphyxiating_Thoracic_Dystrophy-deep-research-falcon.md.citations.md`

      The YAML consumes the older DYNC2H1/IFT80/IFT140/WDR19 skeleton but under-consumes the Falcon artifact's 2023-2024 gene/mechanism updates, especially WDR34 variant-specific dynein-2 assembly defects, IFT74 as a tubulin-transporting IFT-B gene with motile-cilia consequences, IFT172/WDR19 prenatal diagnostic series, and GRK2/Smoothened-Hedgehog mechanistic expansion.

      ## Content-completeness checklist

      - **Phenotypes:** Core skeletal, respiratory, renal, hepatic, and retinal phenotypes are present. Add surveillance/diagnostic framing and consider airway/motile-cilia disease where gene-specific evidence supports it.
      - **Subtype / lumping-splitting:** Gaps noted. Clarify classic Jeune versus broader SRTD/SRPS scope; consider gene-defined subtypes or explicit scoping.
      - **Pathophysiology:** Gaps noted. Decompose IFT/dynein-2/transition-zone/Hedgehog/growth-plate mechanisms and distinguish renal/hepatic/retinal/airway branches.
      - **Treatments / management:** Partial. Respiratory and renal care are present; hepatic, ophthalmologic, genetic/prenatal counseling, and gene-specific airway issues are missing.
      - **Genetics:** Incomplete. Current gene list is a subset and needs either expansion or scope justification.
      - **Diagnostics / biomarkers:** Missing. Add prenatal imaging/radiographic diagnosis and molecular testing for dynein-2/IFT genes.
      - **References:** Existing references support classic mechanisms; any newer gene additions should be verified and cached through the repo workflow before YAML changes.
      - **Overall consumption:** Clinically and mechanistically incomplete relative to the available research artifacts.

      ## Suggested remediation

      Add a scope note or subtype structure; expand the gene list where appropriate; add diagnosis/surveillance sections; and refine the pathograph around dynein-2/IFT, transition-zone integrity, Smoothened/Hedgehog signaling, growth-plate chondrocytes, and multisystem ciliary tissue effects.

