      ## Completed curation review

      - Disease: **KRT1 Keratinopathies**
      - Entry: `kb/disorders/KRT1_Keratinopathies.yaml`
      - Selection basis: #14 of 50 least-recently edited Mendelian entries
      - Review decision: **Changes required**
      - Validation stance: assumes schema/term/reference validation passes; this is a biological and clinical-content review.

      ## Findings

      1. **The disease boundary is an umbrella and needs stronger subtype framing.** The YAML has Epidermolytic Ichthyosis, Ichthyosis Hystrix Curth-Macklin, Annular Epidermolytic Ichthyosis, and Epidermolytic PPK subtypes. Because KRT1 disorders overlap with KRT10/KRT2 keratinopathic ichthyoses, the entry should state whether it is KRT1-specific or a broader keratinopathic ichthyosis module.
      2. **Neonatal and barrier-care management is incomplete.** Emollients/keratolytics and systemic retinoids are present, but the clinical management of KRT1/EI includes neonatal blistering/erythroderma care, temperature/fluid balance, infection prevention, pain/wound care, and palmoplantar keratoderma-specific care. These are central enough to model.
      3. **Subtype-specific phenotype mapping needs more precision.** Palmoplantar keratoderma is especially associated with KRT1 compared with KRT10. Annular/cyclic plaques and Curth-Macklin morphology should be tied to their subtype evidence rather than listed generically.
      4. **Pathophysiology should distinguish dominant-negative keratin network collapse from downstream epidermal hyperproliferation/barrier failure.** The YAML has this sequence, but it should connect basal/suprabasal keratinocyte intermediate filament fragility to blistering, compensatory hyperkeratosis, and infection/barrier complications.
      5. **Genetic counseling and diagnosis are missing.** The entry has no diagnosis section and no genetic counseling treatment, despite autosomal dominant inheritance and substantial de novo/familial counseling implications.

      ## Research-artifact cross-check

      Checked `research/KRT1_Keratinopathies-deep-research-falcon.md` and `.citations.md`. The artifact supports the KRT1-dominant keratin-network mechanism and subtype breadth, but the YAML under-consumes clinical management and diagnosis.

      ## Content-completeness summary

      - **Phenotypes:** broad but needs subtype-specific mapping.
      - **Subtype/lumping:** clarify KRT1-specific scope versus keratinopathic ichthyosis umbrella.
      - **Pathophysiology:** adequate directionally; strengthen barrier/infection complication chain.
      - **Treatments/diagnosis:** major gap: neonatal/supportive care, infection prevention, genetic testing/counseling.
      - **References:** verify subtype-specific treatment and phenotype evidence before updates.

      ## Suggested remediation

      Clarify scope, add diagnosis/genetic counseling and neonatal/barrier management, and map phenotype/treatment content to KRT1 subtype distinctions.

