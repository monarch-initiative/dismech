      Completed curation review for `kb/disorders/Opsismodysplasia.yaml`.

      ## Findings

      1. Blocking: the entry still has no `diagnosis` section. The GeneReviews baseline now exists for INPPL1-related opsismodysplasia and should be consumed into a diagnostic block covering the clinical/radiographic pattern, skeletal survey findings, and molecular confirmation of biallelic `INPPL1` variants. This is especially important because the entry already models prevalence, mechanisms, and treatments at high detail, so the missing diagnostic surface is now the main curator-facing gap.

      2. Non-blocking but actionable: treatment modeling should distinguish established supportive management from limited case-report therapy. Bisphosphonate and phosphate/calcitriol entries are evidence-backed, but the entry should also capture surveillance/supportive care from GeneReviews: fracture risk, cervical spine abnormalities, scoliosis, respiratory issues, delayed gross motor skills, bone pain, and renal phosphate wasting monitoring. This could be a separate supportive-care treatment rather than expanding drug entries.

      3. Non-blocking: the research artifact emphasizes phosphoinositide species and the possibility that loss of `PI(3,4)P2`, not only generic PI3K/AKT overactivation, may be central to SHIP2-deficiency phenotypes. The current mechanism is strong, but the pathophysiology text should avoid reducing the model to broad MAPK/PI3K signaling if the intended model is product-loss phosphoinositide signaling.

      4. Non-blocking: variant and heterogeneity context should be tightened in the genetic section. The YAML notes that INPPL1 explains about 60% of clinically diagnosed cases; that should be reconciled with any broad wording implying all opsismodysplasia is molecularly solved by `INPPL1`.

      ## Research Cross-Check

      - Phenotype coverage: largely adequate for the skeletal core, but GeneReviews-supported complications should be checked against the phenotype list and added if missing.
      - Subtype completeness: not applicable; no clear subtype split surfaced.
      - Pathophysiology depth: mostly adequate. SHIP2 loss, chondrocyte differentiation, endochondral ossification, renal phosphate wasting, and cell migration/adhesion are represented.
      - Treatments and clinical trials: drug treatment evidence is present; supportive surveillance/management is under-modeled.
      - Genetics: adequate causal-gene content, but heterogeneity and variant-class framing need a clearer genetic note.
      - Biomarkers/diagnostics: diagnosis section missing.
      - Research consumption: the Falcon deep research and GeneReviews source were consumed substantially, but diagnosis/management remain under-consumed.

      ## Sources Used

      - Local research artifact: `research/Opsismodysplasia-deep-research-falcon.md`
