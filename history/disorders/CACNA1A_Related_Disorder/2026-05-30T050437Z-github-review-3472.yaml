      ## Findings

      1. **GeneReviews exists and should be used.** CACNA1A-related disorders GeneReviews covers EA2, FHM1, SCA6, DEE42 and management. Source: https://www.ncbi.nlm.nih.gov/books/NBK1500/
      2. **Inheritance is missing.** CACNA1A disorders are generally autosomal dominant, with de novo variants common in severe DEE. The entry needs inheritance and recurrence counseling.
      3. **Subtype-specific mechanisms and treatments need stronger mapping.** EA2, FHM1, SCA6, and DEE42 are very different mechanisms/phenotypes: loss-of-function channelopathy, gain-of-function hemiplegic migraine variants, polyglutamine expansion, and severe developmental epileptic encephalopathy. Treatments should map to subtype.
      4. **Diagnosis is missing.** Add molecular testing including repeat expansion for SCA6, neurologic exam, MRI/cerebellar atrophy, EEG for DEE, migraine evaluation, and differential diagnosis with episodic ataxias and ATP1A3 disorders.
      5. **Phenotype list is broad but subtype-unspecified.** Episodic ataxia, progressive ataxia, migraine, seizures, cognitive/behavioral symptoms should be subtype-tagged.

      ## Research-artifact cross-check

      Matching artifacts: CACNA1A Falcon files. The YAML captures the disease spectrum but under-consumes GeneReviews inheritance, diagnosis, and subtype-specific treatment mapping.

      ## Content-completeness summary

      - **Phenotypes:** broad; map to EA2/FHM1/SCA6/DEE42.
      - **Subtype/lumping:** subtype structure present; improve mapping.
      - **Pathophysiology:** strong but subtype-specific evidence needed.
      - **Management/diagnosis:** inheritance and diagnosis missing.

