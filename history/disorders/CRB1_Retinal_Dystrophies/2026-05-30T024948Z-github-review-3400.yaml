      ## Completed curation review

      - Disease: **CRB1 Retinal Dystrophies**
      - Entry: `kb/disorders/CRB1_Retinal_Dystrophies.yaml`
      - Selection basis: #13 of 50 least-recently edited Mendelian entries
      - Review decision: **Changes required**
      - Validation stance: assumes schema/term/reference validation passes; this is a biological and clinical-content review.

      ## Findings

      1. **The entry is an umbrella and should signal that clearly.** `CRB1 Retinal Dystrophies` includes LCA8, RP12, and macular dystrophy. That is a reasonable gene-centered grouping, but subtype-specific onset, severity, and progression need to be modeled rather than collapsed into a single broad retinal dystrophy.
      2. **Diagnosis and surveillance are missing.** The YAML has many phenotypes and pathophysiology but no diagnosis, treatments, or management sections. CRB1 disease curation should include ERG, retinal imaging/OCT, visual acuity/field testing, low-vision care, and genetic testing/counseling where evidence supports them.
      3. **Subtype-specific phenotype mapping needs review.** Night blindness, nystagmus, reduced visual acuity, pigmentary retinopathy, hypermetropia, macular edema, keratoconus, peripheral field constriction, and undetectable ERG should be tied to LCA8/RP12/macular dystrophy when the evidence is subtype-specific.
      4. **Mechanism is good but could use tissue specificity.** Loss of CRB1 at the outer limiting membrane, retinal disorganization, and photoreceptor degeneration are appropriate. The entry should clarify the relevant retinal cell types/structures such as photoreceptors, Muller glia, adherens junctions/outer limiting membrane, and retinal lamination where evidence supports them.
      5. **Do not infer active therapeutic trial coverage without evidence.** If clinical-trial content is later added, it should be specific to CRB1 or clearly described as registry/natural-history work rather than treatment.

      ## Research-artifact cross-check

      Checked `research/CRB1_Retinal_Dystrophies-deep-research-falcon.md` and `.citations.md`. The artifact supports the umbrella subtype structure and CRB1 outer-limiting-membrane mechanism, but the YAML under-consumes diagnostics, surveillance, and low-vision/genetic counseling management.

      ## Content-completeness summary

      - **Phenotypes:** substantial list present; needs subtype-specific mapping.
      - **Subtype/lumping:** subtypes exist but need stronger clinical differentiation.
      - **Pathophysiology:** adequate high-level mechanism; add retinal cell/structure specificity.
      - **Treatments/diagnosis:** major gap: add diagnostic and low-vision/genetic-counseling management.
      - **References:** use verified CRB1/LCA8/RP12 evidence for subtype-specific claims.

      ## Suggested remediation

      Add diagnosis and management sections; map phenotypes to LCA8/RP12/macular-dystrophy subtypes; and refine retinal mechanism cell/structure specificity.

