    summary: 'Initial curation of GUCY2D-Related Retinopathy (GUCY2D-LCA1 + CORD6)'
    details: |
      Initial curation of GUCY2D-related retinopathy per dismech issue #4748.

      ## MONDO Terms Covered

      - Primary: MONDO:0100453 (GUCY2D-related recessive retinopathy / LCA1/EOSRD)
      - Subtype: MONDO:0100441 (GUCY2D-related dominant retinopathy / CORD6/CACD1)
      - Parent spectrum: MONDO:0100454 (GUCY2D retinopathy) — referenced in notes

      ## Biology Captured

      - Recessive LOF: biallelic GUCY2D variants → absent RETGC-1 activity → failed cGMP
        synthesis → CNG channel closure → structure-function dissociation → eventual
        photoreceptor degeneration (conforms_to: photoreceptor_degeneration#Rod
        Photoreceptor Apoptosis)
      - Dominant GOF: monoallelic GUCY2D codon-838 hotspot variants → constitutive RETGC-1
        hyperactivity → excess cGMP / Ca2+ overload → PKG/calpain/ER stress → progressive
        cone-predominant degeneration (captured as "Dominant" subtype)

      ## Key Pathophysiology Nodes

      1. RETGC-1 Deficiency (gene: GUCY2D, modifier: DECREASED; GO:0006182 decreased)
      2. Impaired Phototransduction Recovery (GO:0007602 decreased; downstream → Rod
         Photoreceptor Apoptosis)
      3. Rod Photoreceptor Apoptosis (conforms_to module; GO:0006915 increased)

