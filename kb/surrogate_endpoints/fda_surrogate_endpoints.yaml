  source_row_number: 9
  disease_or_use: Chronic kidney disease
  patient_population: Patients with chronic kidney disease secondary to multiple etiologies
  surrogate_endpoint: Estimated glomerular filtration rate or serum creatinine
  approval_type: TRADITIONAL
  drug_mechanism_of_action: Mechanism agnostic
  endpoint_validation_level: VALIDATED_SURROGATE_ENDPOINT
  clinical_benefit_linkage: KNOWN_TO_PREDICT_CLINICAL_BENEFIT
  clinical_benefit_linkage_basis: FDA table lists this row as traditional approval; under BEST/FDA semantics
    this indicates a surrogate endpoint known to predict clinical benefit in the stated context of use.
  source_url: https://www.fda.gov/drugs/development-resources/table-surrogate-endpoints-were-basis-drug-approval-or-licensure
  source_workbook_url: https://www.fda.gov/media/156533/download?attachment=
  source_workbook_sha256: 532407d1f7f6e7f5e6b24220f1b1ff950ea85c5acc331ca27735c10bdb49076d
  source_content_current_as_of: '2026-04-29'
  retrieved_date: '2026-05-11'
  footnotes:
  - MECHANISM_AGNOSTIC
  context_of_use: 'Disease/use: Chronic kidney disease; population: Patients with chronic kidney disease
    secondary to multiple etiologies; endpoint: Estimated glomerular filtration rate or serum creatinine;
    approval context: traditional; drug mechanism: Mechanism agnostic.'
  clinical_benefit: >-
    Progression of chronic kidney disease to the clinical end point of
    doubling of serum creatinine, GFR <15 ml/min per 1.73 m2, or
    end-stage kidney disease (ESKD).
  evidence:
  - reference: PMID:31292197
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "To assess the use of GFR slope as a surrogate end point for CKD progression, we performed a meta-analysis of 47 RCTs that tested 12 interventions in 60,620 subjects."
    explanation: >-
      NKF-FDA-EMA trial-level meta-analysis (47 RCTs, 60,620 subjects)
      showing treatment effects on GFR slope accurately predict treatment
      effects on the CKD clinical end point (median R2=0.97), supporting
      eGFR/creatinine as a validated surrogate endpoint.
  - reference: PMID:37330614
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Treatment effects on the clinical endpoint were strongly associated with treatment effects on total slope (median coefficient of determination (R2) = 0.97 (95% Bayesian credible interval (BCI) 0.82-1.00)) and moderately associated with those on chronic slope (R2 = 0.55 (95% BCI 0.25-0.77))."
    explanation: >-
      Updated CKD-EPI trial-level meta-analysis (66 studies, 186,312
      participants, Nat Med 2023) confirming GFR total slope as a near-
      perfect trial-level surrogate for kidney failure (R2=0.97), but
      flagging that chronic slope alone is only moderately surrogate
      (R2=0.55) — the choice of slope window matters.
  - reference: PMID:31473020
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "The US Food and Drug Administration (FDA) and European Medicines Agency (EMA) are currently willing to consider a 30% to 40% glomerular filtration rate (GFR) decline as a surrogate end point for kidney failure for clinical trials of kidney disease progression under appropriate conditions."
    explanation: >-
      Joint NKF-FDA-EMA workshop position statement that a confirmed
      30-40% eGFR decline is accepted as a surrogate end point for kidney
      failure under appropriate conditions in CKD clinical trials.
  - reference: PMID:24206459
    supports: PARTIAL
    evidence_source: HUMAN_CLINICAL
    snippet: "Among patients with type 2 diabetes mellitus and stage 4 chronic kidney disease, bardoxolone methyl did not reduce the risk of ESRD or death from cardiovascular causes."
    explanation: >-
      BEACON trial: bardoxolone methyl raised eGFR yet did not reduce ESRD
      and was terminated early for excess cardiovascular events. A
      cautionary surrogate-failure exemplar — the validated eGFR-slope
      surrogacy can be defeated by treatments whose acute eGFR effect is
      driven by off-target mechanisms.
  mapping_status: EXACT_DISMECH_MATCH
  mapped_diseases:
  - Chronic Kidney Disease
  mapped_disease_files:
  - kb/disorders/Chronic_Kidney_Disease.yaml
  mapping_notes: Exact normalized FDA disease/use label match.
