name: Bacterial Protein Synthesis Inhibition Module
description: >-
  A conserved antibacterial drug-mechanism module representing bacterial mRNA
  translation by the 70S ribosome — the second major antibiotic target after the
  cell wall. Multiple antibiotic classes inhibit distinct steps: aminoglycosides
  and tetracyclines act on the 30S subunit (decoding/A-site tRNA), while
  macrolides, lincosamides (clindamycin), chloramphenicol, and oxazolidinones
  (linezolid) act on the 50S subunit (peptidyl transferase centre and polypeptide
  exit tunnel). Most are bacteriostatic (translational arrest), but
  aminoglycosides are bactericidal because they cause misreading and membrane
  damage. A clinically important consequence distinct from killing is suppression
  of toxin and exoprotein synthesis: protein-synthesis inhibitors such as
  clindamycin and linezolid shut off production of secreted toxins even at the
  high bacterial densities where beta-lactams lose efficacy (the inoculum/Eagle
  effect), which is why they are added in toxin-mediated streptococcal and
  staphylococcal disease. This module defines the mechanism-of-action design
  pattern for ribosome-targeting treatments: conforming entries link a treatment
  to the node it inhibits via target_mechanisms.
category: Module
creation_date: "2026-06-20T00:00:00Z"
notes: >-
  This is an antibacterial drug-mechanism module, not a specific disease.
  Disorder entries reference individual nodes via conforms_to (e.g.,
  "bacterial_protein_synthesis_inhibition#Bacterial mRNA Translation by the
  Ribosome"), and their ribosome-targeting treatments point at the inhibited node
  via target_mechanisms. Two key conformance / treatment targets: "Bacterial mRNA
  Translation by the Ribosome" (the shared ribosomal target of tetracyclines,
  macrolides, aminoglycosides, lincosamides, chloramphenicol, oxazolidinones) and
  "Suppression of Toxin and Exoprotein Synthesis" (the adjunctive anti-toxin
  rationale for clindamycin/linezolid in toxin-mediated disease). Nodes are
  druggable steps, not individual drugs.
pathophysiology:
- name: Bacterial mRNA Translation by the Ribosome
  description: >-
    The bacterial 70S ribosome translates mRNA into protein through decoding at
    the 30S subunit and peptide-bond formation at the 50S peptidyl transferase
    centre. This essential process is the second major antibiotic target after
    the cell wall. Drug classes bind distinct sites: aminoglycosides and
    tetracyclines act on the 30S (aminoglycosides cause misreading and are
    bactericidal; tetracyclines block A-site tRNA and are bacteriostatic), while
    macrolides, lincosamides (clindamycin), chloramphenicol, and oxazolidinones
    (linezolid) act on the 50S. Bacterial ribosomes differ enough from the
    eukaryotic 80S ribosome to give these drugs selective toxicity.
  role: therapeutic_vulnerability
  biological_processes:
  - preferred_term: Translation
    term:
      id: GO:0006412
      label: translation
  evidence:
  - reference: PMID:24336183
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      The ribosome is one of the main antibiotic targets in the bacterial cell.
    explanation: >-
      Review establishing the bacterial ribosome as a principal antibiotic
      target, the step this node represents. Evidence source is OTHER as this is
      a review article.
  downstream:
  - target: Suppression of Toxin and Exoprotein Synthesis
    description: >-
      Inhibiting translation also halts synthesis of secreted toxins and
      exoproteins, an effect exploited adjunctively in toxin-mediated disease.
  - target: Ribosomal Target Resistance
    description: >-
      Bacteria protect the ribosomal target from these drugs, escaping
      protein-synthesis inhibition.

- name: Suppression of Toxin and Exoprotein Synthesis
  description: >-
    Because secreted toxins and virulence exoproteins are themselves translated
    products, ribosome-targeting drugs shut off their production independently of
    bacterial killing. Clindamycin and linezolid retain this anti-toxin effect at
    high bacterial densities and in stationary phase, where beta-lactams lose
    efficacy (the inoculum/Eagle effect). This is the mechanistic basis for adding
    a protein-synthesis inhibitor to a beta-lactam in toxin-driven streptococcal
    toxic shock, necrotizing soft-tissue infection, and staphylococcal toxic
    shock — the bactericidal agent clears the organism while the ribosomal agent
    silences toxin output.
  role: therapeutic_vulnerability
  biological_processes:
  - preferred_term: Translation
    term:
      id: GO:0006412
      label: translation
    modifier: DECREASED
  evidence:
  - reference: PMID:17101685
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: >-
      clindamycin has great efficacy against the production of bacterial
      exoproteins
    explanation: >-
      Study of Streptococcus pyogenes exoprotein production confirming that the
      protein-synthesis inhibitor clindamycin suppresses bacterial exoprotein
      (toxin) synthesis. Evidence source is IN_VITRO (bacterial culture/exoprotein
      assay).

- name: Ribosomal Target Resistance
  description: >-
    Bacteria acquire resistance to ribosome-targeting drugs by modifying or
    protecting the target: methylation of 23S rRNA by erm methyltransferases
    confers macrolide-lincosamide-streptogramin B (MLSb) resistance, ribosomal
    protein/rRNA mutations and ribosomal protection proteins block tetracyclines,
    and aminoglycoside-modifying enzymes inactivate aminoglycosides. Efflux pumps
    remove several classes. This node explains why a ribosome-active agent can
    fail against a specific organism and why inducible clindamycin resistance
    must be excluded before relying on clindamycin's anti-toxin effect.
  role: adaptive_escape
  biological_processes:
  - preferred_term: Response to Antibiotic
    term:
      id: GO:0046677
      label: response to antibiotic
  evidence:
  - reference: PMID:24336183
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      the molecular mechanisms of bacterial resistance
    explanation: >-
      The review covers the molecular mechanisms by which bacteria resist
      ribosome-targeting antibiotics (rRNA methylation, target mutation, drug
      modification). Evidence source is OTHER as this is a review article.
