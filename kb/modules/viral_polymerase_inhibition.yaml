name: Viral Polymerase Inhibition Module
description: >-
  The viral genome-replication pathway and the point at which
  polymerase-targeting antivirals interrupt it. Every virus copies its genome
  with a virally encoded polymerase — an RNA-dependent RNA polymerase (RdRp) in
  most RNA viruses, a reverse transcriptase (RT) in retroviruses and
  hepadnaviruses, or a viral DNA polymerase in the large DNA viruses such as
  herpesviruses. This module traces that pathway as a causal cascade:
  replication is initiated when the polymerase engages the genome template;
  the catalytic core then selects and incorporates nucleotides one at a time;
  the nascent strand is elongated processively; and full-length progeny genomes
  are produced for packaging. The conserved catalytic incorporation step is the
  single most exploited antiviral drug target. Two pharmacological strategies act
  on it: nucleos(t)ide analogues — delivered as monophosphate prodrugs and
  activated by host kinases to their triphosphate form — are incorporated in
  place of the natural nucleotide and terminate the chain (immediately, or after
  a few residues for delayed terminators such as remdesivir), arresting
  elongation; non-nucleoside inhibitors bind an adjacent allosteric pocket and
  block catalysis without being incorporated. The net biological effect is
  suppression of genome replication and falling viral load. Because RdRps and
  RTs are error-prone, the same pathway generates the quasispecies from which
  active-site resistance mutations are selected. Exemplar agents: sofosbuvir
  (HCV NS5B), tenofovir/emtricitabine/lamivudine (HIV/HBV RT), remdesivir and
  molnupiravir (SARS-CoV-2 RdRp), aciclovir/ganciclovir/foscarnet (herpesvirus
  DNA polymerase).
category: Module
creation_date: "2026-06-24T00:00:00Z"
notes: >-
  This is an antiviral drug-mechanism module structured as a biological pathway,
  not a specific disease. Its nodes are successive biological steps of viral
  genome replication (initiation -> catalytic nucleotide incorporation ->
  processive elongation -> progeny-genome production), with an adaptive
  resistance branch; the drug classes that act on each step are described in the
  node text rather than modelled as separate nodes. Disorder entries reference
  individual nodes via conforms_to (e.g., "viral_polymerase_inhibition#Nucleotide
  Selection and Catalytic Incorporation at the Polymerase Active Site"), and a
  polymerase-targeting treatment points its target_mechanisms edge at the step it
  inhibits (the catalytic-incorporation node for nucleos(t)ide and non-nucleoside
  inhibitors, the elongation node for the chain-termination effect). Key
  conformance / treatment target: "Nucleotide Selection and Catalytic
  Incorporation at the Polymerase Active Site" — the conserved active site shared
  by RdRp, RT, and viral DNA polymerase. See projects/ANTIVIRAL.md.
pathophysiology:
- name: Viral Genome Replication Initiation by the Polymerase
  description: >-
    Genome replication begins when the viral polymerase and its cofactors engage
    the genome template (and, for the primer-dependent enzymes, a primer) to form
    the replication complex. This is the committed start of the pathway that
    produces progeny genomes, and it is virus-family-specific in detail but
    universal in principle: every virus depends on a dedicated polymerase to copy
    its nucleic acid, which is precisely why that enzyme is such a general
    antiviral target.
  role: trigger
  biological_processes:
  - preferred_term: Viral Genome Replication
    term:
      id: GO:0019079
      label: viral genome replication
  evidence:
  - reference: PMID:33924302
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Viruses adopt different replication strategies, yet all replicate their
      genetic material via a DNA or RNA polymerase
    explanation: >-
      Establishes the universal first step of the pathway — replication of the
      viral genome by a viral DNA or RNA polymerase. Evidence source is OTHER as
      this is a review article.
  - reference: PMID:33924302
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Many direct-acting antiviral nucleoside analogues target the viral
      polymerase responsible for the viral genome replication
    explanation: >-
      Confirms that this genome-replication polymerase is the shared
      direct-acting antiviral drug target. Evidence source is OTHER as this is a
      review article.
  downstream:
  - target: Nucleotide Selection and Catalytic Incorporation at the Polymerase Active Site
    description: >-
      Once the complex is assembled, the polymerase active site selects and
      incorporates nucleotides to copy the template.

- name: Nucleotide Selection and Catalytic Incorporation at the Polymerase Active Site
  description: >-
    At the catalytic core the polymerase selects an incoming nucleoside
    triphosphate complementary to the template and joins it to the growing strand
    through its nucleotidyltransferase activity. This conserved active site is the
    central drug target of the pathway, attacked by two strategies. Nucleos(t)ide
    analogues — administered as monophosphate prodrugs to bypass a rate-limiting
    first phosphorylation and activated by host kinases to the triphosphate form —
    compete with the natural nucleotide and are mistakenly incorporated.
    Non-nucleoside inhibitors instead bind an adjacent allosteric pocket and lock
    the enzyme in a catalytically inactive conformation without being
    incorporated; because that pocket is less conserved and more mutation-tolerant
    than the active site, non-nucleoside agents are more virus-specific and
    lower-barrier than nucleos(t)ide analogues. This is the canonical conformance
    and treatment target of the module.
  role: therapeutic_vulnerability
  biological_processes:
  - preferred_term: Viral Genome Replication
    term:
      id: GO:0019079
      label: viral genome replication
  molecular_functions:
  - preferred_term: Nucleotidyltransferase Activity
    term:
      id: GO:0016779
      label: nucleotidyltransferase activity
  evidence:
  - reference: PMID:33924302
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      nucleoside analogues directly bind to the more conserved active site of
      the viral polymerase after conversion to their triphosphate active form
    explanation: >-
      Pins the nucleos(t)ide-analogue drug action to this catalytic active-site
      step after triphosphate activation. Evidence source is OTHER as this is a
      review article.
  - reference: PMID:33924302
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Unlike non-nucleoside polymerase inhibitors that often bind to allosteric
    explanation: >-
      Supports the second drug strategy acting at this node — non-nucleoside
      inhibitors binding an allosteric site rather than the catalytic centre.
      Evidence source is OTHER as this is a review article.
  - reference: PMID:35792384
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      compounds inhibiting HIV reverse transcriptase (RT), have become the
      cornerstone of HIV treatment
    explanation: >-
      Confirms the catalytic polymerase (here reverse transcriptase) as the
      cornerstone antiviral target. Evidence source is OTHER as this is a review
      article.
  downstream:
  - target: Processive Elongation of the Nascent Genome Strand
    description: >-
      Successful incorporation of a natural nucleotide allows the polymerase to
      translocate and continue copying the template.
  - target: Polymerase Active-Site Resistance Mutation
    description: >-
      Error-prone copying generates variants with active-site substitutions that
      resist nucleotide-analogue incorporation.

- name: Processive Elongation of the Nascent Genome Strand
  description: >-
    After each incorporation the polymerase translocates and processively extends
    the nascent strand until a full-length genome copy is made. This is the step
    that nucleos(t)ide-analogue chain terminators abort: once the analogue has
    been incorporated, the strand cannot be extended further — immediately for
    classic terminators or after a few additional residues for delayed
    terminators such as remdesivir, a feature that also shields the analogue from
    viral proofreading exonucleases. The result is premature termination of
    nascent genome synthesis.
  role: effector
  biological_processes:
  - preferred_term: Viral RNA Genome Replication
    term:
      id: GO:0039694
      label: viral RNA genome replication
  evidence:
  - reference: PMID:33924302
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      The delayed chain termination triggered by Remdesivir forces the premature
      ending of the viral RNA synthesis.
    explanation: >-
      Directly describes arrest of strand elongation by an incorporated
      nucleotide analogue (delayed chain termination). Evidence source is OTHER as
      this is a review article.
  - reference: PMID:35792384
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      nucleoside reverse transcriptase inhibitors (NRTIs), including chain
      terminators, delayed chain terminators
    explanation: >-
      Confirms the HIV NRTI class arrests elongation as immediate and delayed
      chain terminators of reverse transcription. Evidence source is OTHER as this
      is a review article.
  downstream:
  - target: Suppression of Genome Replication and Viral Load
    description: >-
      Completed elongation yields progeny genomes; blocking elongation collapses
      genome output and viral load.

- name: Suppression of Genome Replication and Viral Load
  description: >-
    When the catalytic-incorporation and elongation steps are pharmacologically
    blocked, production of full-length progeny genomes falls, genome replication
    is suppressed, and viral load declines — the therapeutic endpoint of
    polymerase-targeting antivirals (for example, the viral suppression achieved
    by combination antiretroviral therapy). This is the antiviral consequence of
    engaging the upstream drug-target steps.
  role: consequence
  biological_processes:
  - preferred_term: Negative Regulation of Viral Genome Replication
    term:
      id: GO:0045071
      label: negative regulation of viral genome replication
  evidence:
  - reference: PMID:35792384
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      highly active antiretroviral therapy (HAART) has been developed to manage
      and suppress HIV infection
    explanation: >-
      Supports the consequence node — polymerase-targeting (reverse
      transcriptase) therapy suppresses viral infection/replication. Evidence
      source is OTHER as this is a review article.

- name: Polymerase Active-Site Resistance Mutation
  description: >-
    Viral polymerases, especially the RdRps and RTs of RNA viruses and
    retroviruses, are error-prone and lack robust proofreading, so a replicating
    population exists as a quasispecies swarm. Drug pressure at the catalytic step
    selects variants carrying active-site substitutions that impair
    nucleotide-analogue incorporation (e.g. HIV RT M184V, HCV NS5B S282T) or
    allosteric-site changes that escape non-nucleoside inhibitors. This adaptive
    branch off the catalytic node explains why polymerase-targeting monotherapy
    fails against high-mutation-rate viruses, and why durable suppression requires
    combination regimens or single agents with an intrinsically high genetic
    barrier (sofosbuvir, dolutegravir-anchored regimens).
  role: adaptive_escape
  biological_processes:
  - preferred_term: Response to Xenobiotic Stimulus
    term:
      id: GO:0009410
      label: response to xenobiotic stimulus
  evidence:
  - reference: PMID:33924302
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Most RNA viruses possess a high mutation rate that allows them to adapt,
      escape host immune defenses and drug treatments
    explanation: >-
      Establishes the quasispecies/high-mutation-rate basis for selection of
      drug-escape variants at the polymerase. Evidence source is OTHER as this is
      a review article.
  - reference: PMID:35792384
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      focusing on their history, mechanism of action, resistance, and current
      clinical application
    explanation: >-
      The NRTI review treats resistance as a core dimension of polymerase-targeting
      pharmacology, supporting this resistance branch. Evidence source is OTHER as
      this is a review article.
