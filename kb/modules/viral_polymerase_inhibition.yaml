name: Viral Polymerase Inhibition Module
description: >-
  A conserved antiviral drug-mechanism module representing the viral
  nucleic-acid polymerase that genome-replication-targeting antivirals inhibit.
  Across virus families the genome-replication engine — RNA-dependent RNA
  polymerase (RdRp) in RNA viruses, reverse transcriptase (RT) in retroviruses
  and hepadnaviruses, and viral DNA polymerase in herpesviruses — is a
  conserved, essential, and highly druggable enzyme. Two pharmacological
  strategies converge on it: nucleos(t)ide analogues, delivered as monophosphate
  prodrugs and activated to their triphosphate form by host kinases, are
  incorporated by the polymerase into the nascent strand and cause chain
  termination (immediate or delayed), arresting genome synthesis; non-nucleoside
  inhibitors bind allosteric sites and block the enzyme without being
  incorporated. Because the polymerase active site is more conserved than
  allosteric sites, nucleos(t)ide analogues such as sofosbuvir (HCV NS5B),
  tenofovir/emtricitabine (HIV/HBV RT), remdesivir and molnupiravir (SARS-CoV-2
  RdRp), and acyclovir/ganciclovir (herpesvirus DNA pol) span the broadest
  spectrum. This module defines the mechanism-of-action design pattern for
  polymerase-targeting antiviral treatments: conforming viral-disease entries
  link a treatment to the specific node it inhibits via target_mechanisms. It
  also encodes why genome-replication inhibition is failure-prone — error-prone
  viral polymerases generate quasispecies from which target-site resistance
  mutations are selected, which is why combination therapy and high-genetic-
  barrier agents are used.
category: Module
creation_date: "2026-06-24T00:00:00Z"
notes: >-
  This is an antiviral drug-mechanism module, not a specific disease. Disorder
  entries reference individual nodes via conforms_to (e.g.,
  "viral_polymerase_inhibition#Viral Polymerase as the Replication Engine and
  Drug Target"), and their polymerase-targeting treatments point at the
  inhibited node via target_mechanisms (analogous to how cell-wall-active
  antibiotic treatments link to "bacterial_cell_wall_synthesis_inhibition#
  Peptidoglycan Cross-Linking by Penicillin-Binding Proteins"). Key conformance /
  treatment target: "Viral Polymerase as the Replication Engine and Drug Target"
  (the shared RdRp / RT / viral DNA polymerase target of nucleos(t)ide analogues
  and non-nucleoside inhibitors). The module is pathogen-process-centric: nodes
  are druggable steps in genome replication, not individual drugs; a given
  antiviral class maps to the step or site it inhibits. The resistance node
  captures the gating knowledge that distinguishes "an antiviral is used" from
  real drug selection — quasispecies-driven target-site resistance that mandates
  combination therapy and high-barrier agents. See projects/ANTIVIRAL.md.
pathophysiology:
- name: Viral Polymerase as the Replication Engine and Drug Target
  description: >-
    Every virus replicates its genome with a virally encoded polymerase — an
    RNA-dependent RNA polymerase (RdRp) in most RNA viruses, a reverse
    transcriptase (RT) in retroviruses and hepadnaviruses, or a viral DNA
    polymerase in the large DNA viruses such as herpesviruses. This enzyme is
    essential, conserved across members of a family, and absent or divergent
    from host polymerases, making it the single most exploited antiviral drug
    target. Direct-acting nucleos(t)ide analogues, after host-kinase activation
    to their triphosphate form, bind the conserved polymerase active site and
    compete with the natural nucleotide substrate; the conservation of that
    active site is what gives this node its broad, cross-family druggability.
    This is the central, most widely exploited node of the module and the
    canonical conformance / treatment target for polymerase-directed antiviral
    therapy (sofosbuvir at HCV NS5B; tenofovir/emtricitabine/lamivudine at
    HIV/HBV RT; remdesivir/molnupiravir at SARS-CoV-2 RdRp;
    acyclovir/ganciclovir/foscarnet at herpesvirus DNA polymerase).
  role: therapeutic_vulnerability
  biological_processes:
  - preferred_term: Viral Genome Replication
    term:
      id: GO:0019079
      label: viral genome replication
  evidence:
  - reference: PMID:33924302
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Many direct-acting antiviral nucleoside analogues target the viral
      polymerase responsible for the viral genome replication
    explanation: >-
      Review of antiviral nucleoside analogues establishing the viral polymerase
      (the genome-replication enzyme) as the shared direct-acting antiviral drug
      target. Evidence source is OTHER as this is a review article.
  - reference: PMID:33924302
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      nucleoside analogues directly bind to the more conserved active site of
      the viral polymerase after conversion to their triphosphate active form
    explanation: >-
      States that nucleoside analogues (after triphosphate activation) act at the
      conserved polymerase active site, the basis for this node's broad
      cross-family druggability. Evidence source is OTHER as this is a review.
  - reference: PMID:35792384
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      compounds inhibiting HIV reverse transcriptase (RT), have become the
      cornerstone of HIV treatment
    explanation: >-
      Confirms reverse transcriptase — the retroviral form of the viral
      replication polymerase — as the cornerstone antiviral target in HIV.
      Evidence source is OTHER as this is a review article.
  downstream:
  - target: Nucleos(t)ide-Analogue Chain Termination and Replication Arrest
    description: >-
      Incorporation of an activated nucleos(t)ide analogue by the polymerase
      terminates the growing strand and arrests genome synthesis.
  - target: Non-Nucleoside Allosteric Polymerase Inhibition
    description: >-
      Non-nucleoside inhibitors bind an allosteric site on the same polymerase
      and block catalysis without being incorporated.
  - target: Antiviral Polymerase-Target Resistance
    description: >-
      Error-prone replication selects polymerase active-site or allosteric-site
      mutations that escape these inhibitors.

- name: Nucleos(t)ide-Analogue Chain Termination and Replication Arrest
  description: >-
    Nucleos(t)ide analogues are administered as monophosphate prodrugs (to
    bypass a rate-limiting first phosphorylation) and converted by host kinases
    to the triphosphate active form, which the viral polymerase mistakes for a
    natural nucleotide and incorporates into the nascent genome. Incorporation
    blocks further chain elongation — immediately for classic chain terminators
    such as the HIV NRTIs, or after a few additional nucleotides for delayed
    chain terminators such as remdesivir, a feature that also protects the drug
    from viral proofreading exonucleases. The result is premature termination of
    viral nucleic-acid synthesis and arrest of genome replication. This is the
    bactericidal-equivalent effector node: the antiviral consequence of engaging
    the polymerase target.
  role: consequence
  biological_processes:
  - preferred_term: Viral Genome Replication
    term:
      id: GO:0019079
      label: viral genome replication
  evidence:
  - reference: PMID:33924302
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      The delayed chain termination triggered by Remdesivir forces the premature
      ending of the viral RNA synthesis.
    explanation: >-
      Directly states the effector mechanism of this node — incorporation of the
      nucleotide analogue remdesivir causes (delayed) chain termination and
      premature ending of viral RNA synthesis. Evidence source is OTHER as this
      is a review article.
  - reference: PMID:33924302
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      nucleoside monophosphate prodrugs have been developed successfully to
      bypass the first phosphorylation issue and result in improved antiviral
      efficacies
    explanation: >-
      Supports the prodrug-and-host-kinase-activation step of this node (the
      monophosphate-prodrug strategy exemplified by sofosbuvir). Evidence source
      is OTHER as this is a review article.
  - reference: PMID:35792384
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      nucleoside reverse transcriptase inhibitors (NRTIs), including chain
      terminators, delayed chain terminators
    explanation: >-
      Confirms that the HIV NRTI class acts as (immediate and delayed) chain
      terminators of the reverse transcriptase, the same effector mechanism for
      retroviruses. Evidence source is OTHER as this is a review article.

- name: Non-Nucleoside Allosteric Polymerase Inhibition
  description: >-
    A second pharmacological strategy inhibits the same viral polymerase without
    nucleotide mimicry: non-nucleoside inhibitors bind an allosteric pocket
    distinct from the catalytic active site and lock the enzyme in a
    non-productive conformation. Examples include the HIV non-nucleoside reverse
    transcriptase inhibitors (NNRTIs) and HCV non-nucleoside NS5B inhibitors.
    Because allosteric sites are less conserved and more mutation-tolerant than
    the catalytic active site, non-nucleoside inhibitors tend to be more
    virus-specific and lower-barrier-to-resistance than nucleos(t)ide analogues —
    a contrast that itself gates drug choice and combination design.
  role: therapeutic_vulnerability
  biological_processes:
  - preferred_term: Viral Genome Replication
    term:
      id: GO:0019079
      label: viral genome replication
  evidence:
  - reference: PMID:33924302
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      nucleoside analogues directly bind to the more conserved active site of
      the viral polymerase
    explanation: >-
      The same review contrasts non-nucleoside inhibitors (allosteric,
      mutation-tolerant sites) with nucleoside analogues (conserved active site),
      establishing the distinct allosteric-inhibition node. Evidence source is
      OTHER as this is a review article.
  downstream:
  - target: Antiviral Polymerase-Target Resistance
    description: >-
      Allosteric-site mutations readily escape non-nucleoside inhibitors,
      the basis of their lower genetic barrier to resistance.

- name: Antiviral Polymerase-Target Resistance
  description: >-
    Viral polymerases, especially the RdRps and RTs of RNA viruses and
    retroviruses, are error-prone and lack or have limited proofreading, so a
    replicating population exists as a quasispecies swarm. Drug pressure on the
    polymerase selects pre-existing or newly generated variants — active-site
    substitutions that impair nucleotide-analogue incorporation (e.g. HIV RT
    M184V, HCV NS5B S282T) or allosteric-site changes that escape non-nucleoside
    inhibitors. This node explains why polymerase-targeting monotherapy fails
    against high-mutation-rate viruses and why durable suppression requires
    combination regimens (HIV three-drug ART; multi-target HCV DAA combinations)
    or single agents with an intrinsically high genetic barrier (sofosbuvir,
    dolutegravir-anchored regimens). Conforming entries can attach a treatment's
    failure mode or a combination rationale to this node.
  role: adaptive_escape
  biological_processes:
  - preferred_term: Viral Genome Replication
    term:
      id: GO:0019079
      label: viral genome replication
  evidence:
  - reference: PMID:33924302
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Most RNA viruses possess a high mutation rate that allows them to adapt,
      escape host immune defenses and drug treatments
    explanation: >-
      Establishes the quasispecies/high-mutation-rate basis for escape from
      antiviral drug treatment that this resistance node encodes. Evidence source
      is OTHER as this is a review article.
  - reference: PMID:35792384
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      focusing on their history, mechanism of action, resistance, and current
      clinical application
    explanation: >-
      The NRTI review explicitly treats resistance as a core dimension of
      nucleoside reverse transcriptase inhibitor pharmacology, supporting a
      dedicated polymerase-target resistance node. Evidence source is OTHER as
      this is a review article.
