name: Complex IV Assembly Deficiency Module
description: >-
  A conserved mechanism module representing isolated cytochrome c oxidase (COX,
  mitochondrial respiratory chain Complex IV) deficiency. Loss of a structural
  subunit, an assembly/maturation factor, a copper-delivery metallochaperone, or
  a heme A biosynthesis enzyme prevents maturation of a functional COX
  holoenzyme. The resulting block in terminal electron transfer (cytochrome c to
  molecular oxygen) and proton pumping collapses oxidative ATP synthesis, forcing
  anaerobic glycolysis (lactic acidosis) and producing energy failure in
  high-demand tissues (brain, heart, skeletal muscle, liver). The module captures
  the gene-agnostic core shared across the many nuclear and mtDNA causes of
  isolated COX deficiency; conforming disorder entries substitute the specific
  gene, the affected assembly sub-step, and the organ/tissue tropism while
  preserving this causal chain.
category: Module
creation_date: "2026-05-30T00:00:00Z"
notes: >-
  This is a mechanism module, not a specific disease. Disorder entries reference
  individual nodes via conforms_to (e.g.,
  "complex_iv_assembly_deficiency#Impaired Terminal Electron Transfer and ATP
  Synthesis"). The module defines the expected pathophysiology structure;
  conforming nodes should include the corresponding biological processes and
  causal edges, specialized to their genetic and tissue context. Sub-step
  substitutions: copper delivery to the CuA/CuB centers (SCO1, SCO2, COX17,
  COX11, COA6); heme A biosynthesis (COX10 heme O synthase, COX15 heme A
  synthase); COX2 maturation/insertion (COX18); early/general assembly (SURF1,
  COA8, PET100, PET117); structural subunits (MT-CO1, MT-CO2, MT-CO3, NDUFA4).
  Tissue substitutions: brain/Leigh (SURF1), heart (SCO2), liver/endocrine
  (SCO1), skeletal muscle (COA8). MONDO lacks a non-obsolete pan-form Complex IV
  grouping class, so the umbrella disease entry that conforms to this module uses
  MONDO:0033885 (nuclear-type) as the closest available term.
pathophysiology:
- name: Complex IV Biogenesis Failure
  description: >-
    Pathogenic variants in a Complex IV structural subunit, assembly factor,
    copper-delivery metallochaperone, or heme A biosynthesis enzyme prevent
    correct assembly and cofactor insertion, so a mature, catalytically
    competent COX holoenzyme cannot form. More than 30 genes converge on this
    step.
  role: trigger
  biological_processes:
  - preferred_term: mitochondrial respiratory chain complex IV assembly
    term:
      id: GO:0033617
      label: mitochondrial respiratory chain complex IV assembly
    modifier: DECREASED
  - preferred_term: copper ion transport
    term:
      id: GO:0006825
      label: copper ion transport
    modifier: DECREASED
  - preferred_term: heme A biosynthetic process
    term:
      id: GO:0006784
      label: heme A biosynthetic process
    modifier: DECREASED
  evidence:
  - reference: PMID:19682572
    reference_title: "Cytochrome c oxidase deficiency: patients and animal models."
    supports: SUPPORT
    evidence_source: OTHER
    snippet: COX biosynthesis requires numerous assembly factors that do not form part of the final complex but participate in prosthetic group synthesis and metal delivery in addition to membrane insertion and maturation of COX subunits.
    explanation: Describes the assembly-factor-dependent biogenesis step whose failure defines this node.
  - reference: PMID:33171185
    reference_title: "Cytochrome c oxidase deficiency."
    supports: SUPPORT
    evidence_source: OTHER
    snippet: More than 30 genes have been linked to COX deficiency
    explanation: Documents the large number of genes (subunits, assembly factors, cofactor machinery) that converge on this biogenesis-failure step.
  - reference: PMID:36435678
    reference_title: "Mitochondrial copper in human genetic disorders."
    supports: SUPPORT
    evidence_source: OTHER
    snippet: Mutations in copper transporters and chaperones that perturb mitochondrial copper homeostasis result in fatal genetic disorders.
    explanation: Supports the copper-delivery sub-step (SCO1/SCO2 etc.) of Complex IV biogenesis failure.
  downstream:
  - target: Impaired Terminal Electron Transfer and ATP Synthesis
    causal_link_type: DIRECT
    description: >-
      Without a mature holoenzyme, the terminal step of the respiratory chain
      cannot proceed.
- name: Impaired Terminal Electron Transfer and ATP Synthesis
  description: >-
    Loss of functional COX blocks transfer of electrons from reduced cytochrome
    c to molecular oxygen and abolishes the associated proton pumping across the
    inner mitochondrial membrane, collapsing the proton-motive force and
    oxidative ATP synthesis.
  role: central_effector
  biological_processes:
  - preferred_term: mitochondrial electron transport, cytochrome c to oxygen
    term:
      id: GO:0006123
      label: mitochondrial electron transport, cytochrome c to oxygen
    modifier: DECREASED
  - preferred_term: ATP synthesis coupled electron transport
    term:
      id: GO:0042775
      label: mitochondrial ATP synthesis coupled electron transport
    modifier: DECREASED
  - preferred_term: aerobic respiration
    term:
      id: GO:0009060
      label: aerobic respiration
    modifier: DECREASED
  evidence:
  - reference: PMID:10545952
    reference_title: "Fatal infantile cardioencephalomyopathy with COX deficiency and mutations in SCO2, a COX assembly gene."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: Mammalian cytochrome c oxidase (COX) catalyses the transfer of reducing equivalents from cytochrome c to molecular oxygen and pumps protons across the inner mitochondrial membrane.
    explanation: Defines the terminal electron-transfer and proton-pumping function that is lost when COX is deficient.
  downstream:
  - target: Lactic Acidosis and Metabolic Decompensation
    causal_link_type: DIRECT
    description: >-
      Failure of oxidative ATP synthesis forces a shift to anaerobic glycolysis.
  - target: High-Energy Tissue Dysfunction
    causal_link_type: INDIRECT_UNKNOWN_INTERMEDIATES
    description: >-
      The bioenergetic deficit is most damaging in tissues with high oxidative
      demand.
- name: Lactic Acidosis and Metabolic Decompensation
  description: >-
    The shift to anaerobic glycolysis increases pyruvate-to-lactate conversion,
    elevating lactate in blood and cerebrospinal fluid; metabolic stressors can
    precipitate acute decompensation.
  role: consequence
  biological_processes:
  - preferred_term: lactate biosynthetic process
    term:
      id: GO:0019249
      label: lactate biosynthetic process
    modifier: INCREASED
  evidence:
  - reference: PMID:20301352
    reference_title: "Mitochondrial DNA-Associated Leigh Syndrome Spectrum."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: Decompensation (often with elevated lactate levels in blood and/or cerebrospinal fluid) is typically associated with developmental delay and/or regression.
    explanation: Documents lactic acidosis (elevated blood/CSF lactate) during decompensation in the COX-deficient Leigh syndrome spectrum.
- name: High-Energy Tissue Dysfunction
  description: >-
    Energy failure manifests in high-demand tissues, producing the
    organ-specific phenotypes of COX deficiency: encephalopathy/Leigh syndrome
    (brain), cardiomyopathy (heart), myopathy (skeletal muscle), and hepatopathy
    (liver). Conforming disorder entries substitute the dominant tissue and its
    cell types.
  role: consequence
  biological_processes:
  - preferred_term: aerobic respiration
    term:
      id: GO:0009060
      label: aerobic respiration
    modifier: DECREASED
  evidence:
  - reference: PMID:38154062
    reference_title: "Cytochrome c oxidase deficiency detection in human fibroblasts using scanning electrochemical microscopy."
    supports: SUPPORT
    evidence_source: OTHER
    snippet: COX deficiency results in severe muscle weakness, heart, liver, and kidney disorders, as well as brain damage in infants and adolescents
    explanation: Summarizes the multi-organ, high-energy-tissue dysfunction produced by COX deficiency.
  - reference: PMID:33171185
    reference_title: "Cytochrome c oxidase deficiency."
    supports: SUPPORT
    evidence_source: OTHER
    snippet: affect the whole organism or specific tissues
    explanation: Supports the variable, tissue-specific expression of the bioenergetic deficit that conforming entries specialize.
