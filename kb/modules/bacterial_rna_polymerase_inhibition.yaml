name: Bacterial RNA Polymerase Inhibition Module
description: >-
  A conserved antibacterial drug-mechanism module representing bacterial
  DNA-dependent RNA polymerase (RNAP), the enzyme that transcribes mRNA and the
  target of the rifamycin class (rifampicin, rifabutin, rifapentine, rifaximin).
  Rifamycins bind the RNAP beta subunit (encoded by rpoB) in the DNA/RNA channel
  and block extension of nascent RNA beyond a few nucleotides, halting
  transcription. Because the bacterial RNAP sequence diverges from the human
  enzyme, rifamycins are selectively toxic. Rifamycins penetrate cells and
  biofilms well and are a backbone of antimycobacterial therapy and of regimens
  for intracellular and device-associated infection — but because single rpoB
  point mutations confer high-level resistance, they are almost always used in
  combination. This module defines the mechanism-of-action design pattern for
  rifamycin treatments: conforming entries link a treatment to the RNAP target via
  target_mechanisms.
category: Module
creation_date: "2026-06-20T00:00:00Z"
notes: >-
  Antibacterial drug-mechanism module, not a specific disease. Disorder entries
  reference nodes via conforms_to (e.g.,
  "bacterial_rna_polymerase_inhibition#Bacterial RNA Polymerase (Rifamycin
  Target)"), and their rifamycin treatments point at that node via
  target_mechanisms. Key conformance / treatment target: "Bacterial RNA Polymerase
  (Rifamycin Target)". The rpoB-mutation resistance node is the reason rifamycins
  are given in combination — relevant to mycobacterial regimens. Nodes are
  druggable steps, not individual drugs.
pathophysiology:
- name: Bacterial RNA Polymerase (Rifamycin Target)
  description: >-
    Bacterial DNA-dependent RNA polymerase (RNAP) performs the first step of gene
    expression, transcribing DNA into RNA. Rifamycins bind the RpoB (beta) subunit
    within the RNA exit channel and sterically block elongation of the nascent RNA
    chain past 2-3 nucleotides, arresting transcription. The bacterial RNAP
    sequence diverges sufficiently from the human enzyme to make this target
    selective, and rifamycins penetrate host cells and biofilms well, extending
    their utility to mycobacterial, intracellular, and device-associated
    infection.
  role: therapeutic_vulnerability
  biological_processes:
  - preferred_term: DNA-Templated Transcription
    term:
      id: GO:0006351
      label: DNA-templated transcription
  evidence:
  - reference: PMID:32342856
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      The most clinically important and extensively studied class of antibiotics
      known to inhibit bacterial RNAP are the rifamycins.
    explanation: >-
      Review establishing bacterial RNA polymerase as the rifamycin target, the
      step this node represents. Evidence source is OTHER as this is a review.
  - reference: PMID:32342856
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      the sequence divergence between bacterial and human RNAPs makes the
      bacterial RNAP a promising target for antibiotic development.
    explanation: >-
      Supports the selectivity basis (bacterial vs human RNAP divergence) noted in
      this node. Evidence source is OTHER as this is a review article.
  downstream:
  - target: rpoB-Mediated Rifamycin Resistance
    description: >-
      Single rpoB point mutations confer high-level resistance, which is why
      rifamycins are used in combination.

- name: rpoB-Mediated Rifamycin Resistance
  description: >-
    Resistance to rifamycins arises predominantly from point mutations in a short,
    conserved region of the rpoB gene encoding the RNA polymerase beta subunit,
    which reduce drug binding. Because a single chromosomal mutation can confer
    high-level resistance and emerges readily under monotherapy, rifamycins are
    given as part of combination regimens (e.g. with isoniazid/other agents in
    mycobacterial disease, or with a second agent in staphylococcal
    device-associated infection). rpoB mutation is also the molecular basis of the
    GeneXpert rifampicin-resistance diagnostic in tuberculosis.
  role: adaptive_escape
  biological_processes:
  - preferred_term: Response to Antibiotic
    term:
      id: GO:0046677
      label: response to antibiotic
  evidence:
  - reference: PMID:32342856
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      the mechanisms of bacterial resistance against them
    explanation: >-
      The review covers the mechanisms of bacterial resistance to rifamycins
      (rpoB mutation). Evidence source is OTHER as this is a review article.
