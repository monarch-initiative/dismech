  - preferred_term: asymmetric cell division
    term:
      id: GO:0008356
      label: asymmetric cell division
    modifier: DYSREGULATED
  evidence:
  - reference: PMID:15473967
    supports: SUPPORT
    evidence_source: MODEL_ORGANISM
    snippet: >-
      more dramatic defects on mitotic progression, mitotic orientation, and
      mitotic chromosome localization in cortical progenitors were observed in
      Nde1 mutant embryos.
    explanation: >-
      Supports the central progenitor-division defect downstream of NDE1 loss.
  - reference: PMID:24388750
    supports: SUPPORT
    evidence_source: MODEL_ORGANISM
    snippet: >-
      WDR62 knockdown leads to premature differentiation of neural progenitor
      cells (NPCs).
    explanation: >-
      Supports premature progenitor differentiation as a WDR62-related fate
      branch.
  - reference: PMID:25521378
    supports: SUPPORT
    evidence_source: MODEL_ORGANISM
    snippet: >-
      In the developing Drosophila optic lobe, kat80 loss specifically affects
      the asymmetrically dividing neuroblasts, which display supernumerary
      centrosomes and spindle abnormalities during mitosis, leading to cell
      cycle progression delays and reduced cell numbers.
    explanation: >-
      Supports asymmetric progenitor division, centrosome, spindle, and
      cell-cycle defects as the KATNB1/katanin branch.
  - reference: PMID:28380362
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: >-
      Patient-derived organoids are significantly reduced in size, a change
      accompanied by a switch from symmetric to asymmetric cell division of
      ventricular zone radial glia cells (vRGCs).
    explanation: >-
      Human forebrain organoids support a disease-relevant radial-glial
      division-mode defect.
  downstream:
  - target: Progenitor Pool Distortion

- name: Progenitor Pool Distortion
  description: >-
    Abnormal division, fate choice, cell-cycle progression, or apoptosis changes
    the size, position, and composition of the cortical progenitor pool. The
    common state is not always simple depletion: some branches cause premature
    differentiation or cell death, some mislocalize progenitors, and reduced
    apoptosis can produce megalencephaly or excessive/inappropriate cell
    survival.
  role: effector
  cell_types:
