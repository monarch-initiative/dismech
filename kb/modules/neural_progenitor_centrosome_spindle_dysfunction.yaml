    modifier: DYSREGULATED
  - preferred_term: neurogenesis
    term:
      id: GO:0022008
      label: neurogenesis
    modifier: DYSREGULATED
  evidence:
  - reference: PMID:20890278
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      These findings support a proliferative defect in brains of patients with
      WDR62 mutations, potentially affecting the outer SVZ (precursors to upper
      layer cortical neurons)21 as well as defective neuronal migration
    explanation: >-
      Human fetal pathology supports progenitor-pool distortion in WDR62 disease.
  - reference: PMID:28111201
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: >-
      We saw a cell migration defect that was rescued when we corrected the MDS
      causative chromosomal deletion and severe apoptosis of the founder
      neuroepithelial stem cells, accompanied by increased horizontal cell
      divisions.
    explanation: >-
      Human MDS organoids support early neural stem cell apoptosis and altered
      division as a progenitor-pool mechanism.
  - reference: PMID:28132835
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: >-
      The main phenotypic effect was premature differentiation of neural
      progenitors associated with centrosome perturbation, even during early
      stages of infection, leading to progenitor depletion, disruption of the
      VZ, impaired neurogenesis, and cortical thinning.
    explanation: >-
      ZIKV organoid evidence supports the acquired viral cytopathy branch of
      progenitor-pool depletion.
  downstream:
  - target: Abnormal Cortical Neuron Output and Gyration

- name: Programmed Cell Death Imbalance Branch
  description: >-
    Some cortical malformations arise because programmed cell death is
    misregulated rather than because progenitors are simply depleted. CRADD
    loss reduces caspase-2-mediated apoptosis and is associated with
    megalencephaly with thin lissencephaly, whereas viral or mitotic-stress
    branches can increase cell death and reduce the progenitor pool.
