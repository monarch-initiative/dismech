    Viral infection can phenocopy parts of the genetic progenitor
    centrosome-spindle module by targeting proliferating neural progenitors,
    disrupting centrosomes or mitosis, inducing premature differentiation or
    cell death, and reducing cortical output. This branch should be used for
    congenital infection entries such as congenital Zika syndrome, not for
    inherited centrosome disorders.
