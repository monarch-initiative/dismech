pathophysiology:
- name: Centrosome and Mitotic Spindle Perturbation
  description: >-
    Genetic, chromosomal, or viral perturbations disrupt the centrosome,
    centriole, mitotic spindle, or microtubule-severing apparatus used by
    neural progenitors and radial glia. Representative mechanisms include NDE1
    centrosome/spindle defects, LIS1-NDEL1-dynein spindle orientation defects,
    WDR62 spindle-pole localization defects, ASPM spindle microtubule assembly
    defects, and KATNB1/katanin-dependent microtubule remodeling defects.
  role: trigger
