name: Neural Progenitor Centrosome-Spindle Dysfunction Module
description: >-
  Conserved cortical malformation mechanism in which centrosome, centriole,
  mitotic spindle, cell-cycle, or programmed-cell-death defects distort the
  neural progenitor pool during corticogenesis. The shared skeleton is
  progenitor centrosome/spindle or cell-number-control perturbation followed by
  abnormal radial-glial or neural-progenitor division, altered fate choice or
  apoptosis, progenitor-pool distortion, and abnormal cortical neuron output,
  cortical size, or gyration. This module is intended for microcephaly,
  microlissencephaly, simplified gyral pattern, pachygyria/PMG overlap, and
  selected infectious or chromosomal-deletion cortical malformations where
  progenitor biology is central.
category: Module
creation_date: "2026-06-10T04:00:40Z"
notes: >-
  This is a mechanism module, not a broad "microcephaly" or "MCD" disease
  entry. Disorder entries should use conforms_to only when the dominant
  pathograph involves radial-glial or neural-progenitor division, spindle,
  centrosome, cell-cycle, fate, or apoptosis defects. Do not use this as the
  primary skeleton for isolated postmitotic neuronal migration failure,
  apical-neuroependyma integrity failure, pial-basement-membrane overmigration,
  Reelin terminal-translocation defects, interneuron migration/specification
  defects, or PI3K-AKT-mTOR overgrowth unless the conforming entry has an
  explicit progenitor branch. Some genes, especially PAFAH1B1/LIS1, NDE1/NDEL1,
  WDR62, and tubulin/motor genes, can affect both progenitors and migrating
  neurons; use this module for the progenitor branch and the microtubule
  migration module for the postmitotic neuronal migration branch. Programmed
  cell-death mechanisms must preserve directionality: CRADD/TLIS is a reduced
  apoptosis branch with megalencephaly/thin lissencephaly, whereas ZIKV and
  some spindle defects can increase cell death or premature differentiation and
  deplete progenitors.
mechanistic_hypotheses:
- hypothesis_group_id: progenitor_centrosome_spindle_model
  hypothesis_label: Neural Progenitor Centrosome-Spindle Dysfunction Model
  status: CANONICAL
  description: >-
    Centrosome and mitotic spindle proteins coordinate radial-glial and
    neural-progenitor mitosis, cleavage orientation, symmetric versus asymmetric
    division, and cell-cycle progression. Pathogenic variants, chromosomal
    deletions, or viral cytopathy can disrupt this apparatus or the coupled
    programmed-cell-death machinery. The resulting progenitor-pool distortion
    changes neuronal output and cortical architecture, producing small cortex,
    simplified gyration, microlissencephaly, pachygyria, polymicrogyria-like
    malformations, or, for reduced-apoptosis branches, megalencephaly with thin
    lissencephaly.
  evidence:
  - reference: PMID:15473967
    supports: SUPPORT
    evidence_source: MODEL_ORGANISM
    snippet: >-
      The small cerebral cortex seems to reflect both reduced progenitor cell
      division and altered neuronal cell fates.
    explanation: >-
      Nde1 mutant mouse data directly link cortical size to progenitor division
      and fate changes, supporting the module skeleton.
  - reference: PMID:25521378
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Taken together, we provide insight into the mechanisms by which KATNB1
      mutations cause human cerebral cortical malformations, demonstrating its
      fundamental role during brain development.
    explanation: >-
      Mixed human genetics, cell, zebrafish, and fly evidence supports KATNB1
      as a progenitor/spindle mechanism for complex cortical malformations.
discussions:
- discussion_id: gap_progenitor_human_model_translatability
  prompt: >-
    Which progenitor defects detected in mouse or invertebrate models are
    conserved in human radial-glial, outer-radial-glial, and organoid systems,
    and which require human-specific OSVZ or oRG biology?
  kind: KNOWLEDGE_GAP
  status: OPEN
  attaches_to:
  - pathophysiology#Abnormal Progenitor Division and Fate Choice
  - pathophysiology#Progenitor Pool Distortion
  rationale: >-
    The seed review emphasized that organoids and iPSC-derived cortical models
    are especially important for progenitor mechanisms because human OSVZ/oRG
    biology is not fully represented in lissencephalic rodents. For curation,
    mouse or invertebrate spindle evidence should establish conserved proximal
    mechanisms, but human organoids, fetal tissue, or isogenic iPSC systems may
    be needed to decide whether a disease entry has an oRG-specific branch.
  evidence:
  - reference: PMID:28111201
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: >-
      Recent work has uncovered critical cellular and molecular differences
      between cortical development in humans and mice, further underscoring the
      need to develop human model systems.
    explanation: >-
      Directly supports treating human/model mismatch as a knowledge gap for
      progenitor mechanisms.
  - reference: PMID:28111201
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: >-
      Here, we find that cerebral organoids generate oRG-like cells with matching
      properties defined in vivo, including position, morphology, mitotic
      behavior, and molecular identity.
    explanation: >-
      Supports organoids as a relevant non-animal model for oRG-dependent
      progenitor mechanisms.
