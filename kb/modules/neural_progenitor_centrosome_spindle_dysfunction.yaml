      label: mitotic spindle organization
    modifier: DYSREGULATED
  - preferred_term: microtubule cytoskeleton organization
    term:
      id: GO:0000226
      label: microtubule cytoskeleton organization
    modifier: DYSREGULATED
  evidence:
  - reference: PMID:15473967
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: >-
      In vitro analysis demonstrated that Nde1 is essential for centrosome
      duplication and mitotic spindle assembly.
    explanation: >-
      Supports NDE1 as a proximal centrosome and spindle mechanism in cortical
      progenitor development.
  - reference: PMID:24030547
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: >-
      We found that LIS1 is required for the tight control of chromosome
      congression and segregation to dictate kinetochore-microtubule (MT)
      interactions and anaphase progression.
    explanation: >-
      Supports the LIS1/NDEL1/dynein branch as a mitotic spindle and chromosome
      segregation mechanism.
  - reference: PMID:20890278
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      WDR62 is a WD40 repeat-containing protein expressed in neuronal precursors
      as well as in postmitotic neurons in the developing brain and localizes to
      the spindle poles of dividing cells.
    explanation: >-
      Links WDR62 cortical malformation genetics to the progenitor spindle-pole
      apparatus.
  - reference: PMID:25521378
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: >-
      Mitotic spindle formation is defective in patient-derived fibroblasts, a
      consequence of disrupted interactions of mutant KATNB1 with KATNA1, the
      catalytic subunit of Katanin, and other microtubule-associated proteins.
    explanation: >-
      Supports KATNB1 as a proximal microtubule/spindle perturbation mechanism.
  downstream:
  - target: Abnormal Progenitor Division and Fate Choice

- name: Abnormal Progenitor Division and Fate Choice
  description: >-
    Centrosome/spindle perturbation alters radial-glial and neural-progenitor
    mitotic progression, cleavage orientation, symmetric versus asymmetric
    division, and fate specification. Depending on the gene and developmental
    context, this can reduce progenitor self-renewal, cause premature neuronal
    differentiation, or delay/arrest the cell cycle.
  role: central_effector
  cell_types:
