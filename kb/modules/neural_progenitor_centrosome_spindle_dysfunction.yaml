    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Megalencephaly and lissencephaly associated with defective programmed cell
      death from loss of CRADD function in humans implicate reduced apoptosis as
      an important pathophysiological mechanism of cortical malformation.
    explanation: >-
      Supports a reduced-apoptosis branch distinct from progenitor depletion by
      increased apoptosis.
  - reference: PMID:27568284
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: >-
      we show that ZIKV infects both neocortical and spinal NES cells as well as
      their fetal homolog, radial glial cells (RGCs), causing disrupted mitoses,
      supernumerary centrosomes, structural disorganization, and cell death.
    explanation: >-
      Supports the opposite acquired branch where viral mitotic injury increases
      cell death in neural stem/radial-glial cells.
  downstream:
  - target: Progenitor Pool Distortion

- name: Viral Progenitor Cytopathy Branch
