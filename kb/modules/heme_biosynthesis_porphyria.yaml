    term:
      id: GO:0006778
      label: porphyrin-containing compound metabolic process
    modifier: ABNORMAL
  - preferred_term: Heme Biosynthetic Process
    term:
      id: GO:0006783
      label: heme biosynthetic process
    modifier: ABNORMAL
  evidence:
  - reference: DOI:10.1146/annurev-med-042921-123602
    reference_title: Update on the Porphyrias
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      They can be broadly divided into two categories, hepatic and
      erythropoietic porphyrias, depending on the primary site of accumulation
      of heme intermediates.
    explanation: >-
      Supports the shared central lesion — accumulation of heme intermediates —
      with branch specificity by tissue compartment. Evidence source is OTHER
      because this is a review article.
  - reference: DOI:10.1182/hematology.2024000663
    reference_title: "Givosiran: a targeted treatment for acute intermittent porphyria"
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Pathogenic variants in 1 of 4 enzymes of heme synthesis are necessary for
      the development of AHP, and the onset of acute attacks also requires the
      induction of δ-aminolevulinic acid synthase 1 (ALAS1), the first and
      rate-limiting step of heme synthesis in the liver.
    explanation: >-
      Supports the conditional-accumulation mechanism of the acute hepatic arm —
      an inherited enzyme defect plus hepatic ALAS1 induction drives precursor
      overproduction. Evidence source is OTHER because this is a review article.
  downstream:
  - target: Neurovisceral Precursor Neurotoxicity
  - target: Cutaneous Porphyrin Phototoxicity
- name: Neurovisceral Precursor Neurotoxicity
  description: >-
    In the acute hepatic porphyrias, overproduced ALA and PBG are the proximate
    drivers of the acute neurovisceral attack. The accumulated precursors — ALA
    in particular is a recognized pro-oxidant neurotoxin — injure the autonomic,
    peripheral, and central nervous systems, producing the characteristic
    attack of severe abdominal pain, autonomic instability, motor-predominant
    axonal neuropathy, and neuropsychiatric disturbance. Silencing hepatic
    ALAS1 to lower ALA and PBG prevents attacks, establishing precursor burden
    as the causal driver.
  role: effector
  cell_types:
  - preferred_term: Neuron
    term:
      id: CL:0000540
      label: neuron
  biological_processes:
  - preferred_term: Response to Oxidative Stress
    term:
      id: GO:0006979
      label: response to oxidative stress
    modifier: INCREASED
  evidence:
  - reference: DOI:10.1182/hematology.2024000663
    reference_title: "Givosiran: a targeted treatment for acute intermittent porphyria"
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      The acute hepatic porphyrias (AHPs) are a family of rare genetic diseases
      associated with attacks of abdominal pain, vomiting, weakness, neuropathy,
      and other neurovisceral symptoms.
    explanation: >-
      Links the acute hepatic porphyria arm to the neurovisceral attack
      phenotype. Evidence source is OTHER because this is a review article.
  - reference: DOI:10.3390/jcm13226779
    reference_title: German Real-World Experience of Patients with Diverse Features of Acute Intermittent Porphyria Treated with Givosiran
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Givosiran (siRNA) is an emerging AIP therapy capable of silencing
      delta-aminolevulinic acid synthase-1 (ALAS1) and, in turn, reducing the
      accumulation of delta-aminolevulinic acid (ALA) and porphobilinogen
      (PBG) that precede porphyria symptoms.
    explanation: >-
      Supports precursor accumulation as the causal antecedent of neurovisceral
      symptoms — lowering ALA and PBG via ALAS1 silencing prevents them.
- name: Cutaneous Porphyrin Phototoxicity
  description: >-
    In the cutaneous and erythropoietic porphyrias, the accumulating species are
    photoreactive porphyrins (uroporphyrin and coproporphyrin in congenital
    erythropoietic porphyria and porphyria cutanea tarda; protoporphyrin IX in
    erythropoietic protoporphyria and X-linked protoporphyria). On absorbing
    visible light these porphyrins enter an excited state and transfer energy to
    molecular oxygen, generating reactive oxygen species (notably singlet
    oxygen) that damage skin and erythrocytes. The clinical result ranges from
    the acute, non-blistering phototoxic pain of the protoporphyrias to the
    fragile, blistering, scarring bullous photodermatitis of the
    uroporphyrin-accumulating porphyrias.
  role: effector
  cell_types:
  - preferred_term: Keratinocyte
    term:
      id: CL:0000312
      label: keratinocyte
  - preferred_term: Erythrocyte
    term:
      id: CL:0000232
      label: erythrocyte
  biological_processes:
  - preferred_term: Response to Oxidative Stress
    term:
      id: GO:0006979
      label: response to oxidative stress
    modifier: INCREASED
  evidence:
  - reference: DOI:10.3390/ph17010031
    reference_title: "Illuminating Dersimelagon: A Novel Agent in the Treatment of Erythropoietic Protoporphyria and X-Linked Protoporphyria"
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Both of these abnormalities result in the buildup of protoporphyrin IX,
      leading to excruciating light sensitivity and, in a minority of cases,
      potentially fatal liver complications.
    explanation: >-
      Links protoporphyrin IX accumulation to light-triggered phototoxicity in
      the protoporphyria branch. Evidence source is OTHER because this is a
      review article.
  - reference: PMID:30685241
    reference_title: "Congenital erythropoietic porphyria: Recent advances."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      This in turn leads to the accumulation of the non-physiologic and
      photoreactive porphyrinogens, uroporphyrinogen I and coproporphyrinogen
      I, which damage erythrocytes and elicit a phototoxic reaction upon light
      exposure.
    explanation: >-
      Supports the phototoxicity arm — photoreactive porphyrin(ogen)
      accumulation damages erythrocytes and elicits a light-triggered phototoxic
      reaction in the erythropoietic branch.
