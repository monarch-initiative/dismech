name: Heme Biosynthesis and Porphyria Module
description: >-
  A conserved final-common-pathway module for the porphyrias — the inherited
  disorders of heme biosynthesis. Each porphyria results from a partial defect
  (or, for X-linked protoporphyria, a gain of function) at a different one of
  the eight enzymatic steps of the heme biosynthetic pathway (ALAD, HMBS, UROS,
  UROD, CPOX, PPOX, FECH; ALAS2). The enzymatic block impairs pathway flux and
  causes accumulation of the pathway intermediates immediately upstream of the
  lesion — the porphyrin precursors 5-aminolevulinic acid (ALA) and
  porphobilinogen (PBG) and/or the porphyrins (uroporphyrin, coproporphyrin,
  protoporphyrin IX). The porphyrias split into two clinical arms that share
  this accumulation hub but diverge in the identity of the accumulating
  metabolite and its target tissue: (1) the acute hepatic porphyrias (ALAD
  porphyria, acute intermittent porphyria, hereditary coproporphyria, variegate
  porphyria), in which hepatic ALAS1 induction by porphyrogenic triggers
  (drugs, fasting, alcohol, hormonal cycling, infection) drives overproduction
  of the neurotoxic precursors ALA and PBG and precipitates acute neurovisceral
  attacks; and (2) the cutaneous and erythropoietic porphyrias (congenital
  erythropoietic porphyria, porphyria cutanea tarda, hepatoerythropoietic
  porphyria, erythropoietic protoporphyria, X-linked protoporphyria), in which
  photoreactive porphyrins accumulate and, on absorbing visible light, generate
  reactive oxygen species that injure skin and erythrocytes. Conforming
  disorder entries declare conformance via conforms_to on their pathophysiology
  nodes, substituting the disorder-specific deficient enzyme, accumulating
  intermediate, and clinical arm while preserving the conserved
  block -> accumulation -> tissue-toxicity chain.
category: Module
creation_date: "2026-07-02T00:00:00Z"
notes: >-
  This is a mechanism module, not a specific disease. Disorder entries reference
  individual nodes via conforms_to (e.g.,
  "heme_biosynthesis_porphyria#Accumulation of Porphyrin Precursors and
  Porphyrins"). The single best key conformance target is the central
  "Accumulation of Porphyrin Precursors and Porphyrins" node — the one event
  every porphyria shares regardless of arm. Conforming nodes should substitute
  the disorder-specific lesion: the deficient (or, for ALAS2, hyperactive)
  enzyme at the trigger node, the accumulating intermediate at the central node
  (ALA/PBG for the acute hepatic arm; uroporphyrin/coproporphyrin/protoporphyrin
  IX for the cutaneous-erythropoietic arm), and the relevant effector arm
  (neurovisceral vs. cutaneous). An acute-hepatic conformer routes through the
  neurovisceral-neurotoxicity effector; a cutaneous or erythropoietic conformer
  routes through the phototoxicity effector; overlap porphyrias (hereditary
  coproporphyria, variegate porphyria) may route through both. Chemistry
  (ALA, PBG, porphyrins) and the enzyme/gene identities are given in prose;
  modules bind GO and CL terms only and do not use CHEBI or gene bindings.
  Disease-specific chronic sequelae (AIP hepatocellular carcinoma and chronic
  kidney disease, EPP hepatobiliary liver injury, CEP transfusion-dependent
  hemolytic anemia) belong on the individual disorder entries, not this module.
pathophysiology:
- name: Heme Biosynthesis Enzymatic Block
  description: >-
    The conserved initiating lesion is a pathogenic partial deficiency of one of
    the enzymes of the heme biosynthetic pathway (or, in X-linked
    protoporphyria, a gain of function of erythroid ALAS2). The block interrupts
    normal porphyrin metabolism and primes the affected compartment — hepatic or
    erythroid — for accumulation of the intermediates immediately upstream of
    the defective step.
  role: trigger
  cell_types:
  - preferred_term: Hepatocyte
    term:
      id: CL:0000182
      label: hepatocyte
  - preferred_term: Erythroblast
    term:
      id: CL:0000765
      label: erythroblast
  biological_processes:
  - preferred_term: Heme Biosynthetic Process
    term:
      id: GO:0006783
      label: heme biosynthetic process
    modifier: DECREASED
  - preferred_term: Porphyrin-Containing Compound Metabolic Process
    term:
      id: GO:0006778
      label: porphyrin-containing compound metabolic process
    modifier: ABNORMAL
  evidence:
  - reference: DOI:10.1146/annurev-med-042921-123602
    reference_title: Update on the Porphyrias
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      The porphyrias are a group of rare diseases, each resulting from a defect
      in a different enzymatic step of the heme biosynthetic pathway.
    explanation: >-
      Establishes the conserved trigger — a subtype-specific enzymatic defect in
      heme biosynthesis. Evidence source is OTHER because this is a review
      synthesizing the disease class.
  downstream:
  - target: Accumulation of Porphyrin Precursors and Porphyrins
- name: Accumulation of Porphyrin Precursors and Porphyrins
  description: >-
    Behind the enzymatic block, the pathway intermediates immediately upstream
    of the lesion accumulate to pathological concentrations. The identity of the
    accumulating species is subtype-specific — the porphyrin precursors
    5-aminolevulinic acid (ALA) and porphobilinogen (PBG) in the acute hepatic
    porphyrias, and the porphyrins uroporphyrin, coproporphyrin, or
    protoporphyrin IX in the cutaneous and erythropoietic porphyrias — but the
    accumulation of heme intermediates upstream of the block is the shared
    central lesion. In the acute hepatic porphyrias the accumulation is
    conditional: a compensated carrier state is converted to overproduction only
    when hepatic ALAS1, the first and rate-limiting enzyme of the pathway, is
    induced by porphyrogenic triggers (drugs, fasting, alcohol, hormonal
    cycling, or intercurrent illness).
  role: central_effector
  cell_types:
  - preferred_term: Hepatocyte
    term:
      id: CL:0000182
      label: hepatocyte
  - preferred_term: Erythroblast
    term:
      id: CL:0000765
      label: erythroblast
