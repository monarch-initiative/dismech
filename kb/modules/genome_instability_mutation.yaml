name: Genome Instability and Mutation Module
description: >-
  A conserved mechanism module for the enabling characteristic of cancer
  (Hanahan & Weinberg): genome instability and mutation. Genome instability
  is the engine that generates the genetic diversity upon which selection
  acts during tumor evolution, accelerating acquisition of every hallmark
  capability. The conserved causal chain runs from an initiating insult that
  compromises genome integrity - inactivation of a "caretaker"
  genome-maintenance gene (mismatch repair, homologous recombination/BRCA,
  nucleotide-excision repair) and/or oncogene-induced DNA replication stress
  - through failure of DNA-damage surveillance and repair (frequently
  compounded by loss of the p53 and ATM/ATR checkpoint barriers), to an
  elevated mutation rate and chromosomal instability (the mutator
  phenotype). The resulting heritable diversity (point mutations,
  copy-number changes, aneuploidy, structural rearrangements) fuels clonal
  evolution and the stepwise acquisition of hallmark traits. Individual
  disorder entries declare conformance via conforms_to, substituting the
  tumor-type-specific caretaker lesion (e.g., MMR loss/microsatellite
  instability in Lynch syndrome, BRCA1/2 loss in HBOC, oncogene-induced
  replication stress in TP53/ATM-mutant sporadic cancers). The specific
  HRR/BRCA-deficiency therapeutic vulnerability is detailed in
  dna_repair_synthetic_lethality.
category: Module
creation_date: "2026-06-27T00:00:00Z"
notes: >-
  This is a mechanism module, not a specific disease. Disorder entries
  reference individual nodes via conforms_to (e.g.,
  "genome_instability_mutation#Mutator Phenotype and Chromosomal
  Instability"). The module defines the expected pathophysiology structure;
  conforming nodes in disorder files should include the corresponding
  biological processes and causal edges, specialized to their tumor context.
  Key tumor-specific substitutions: Lynch syndrome uses mismatch-repair loss
  producing microsatellite instability and hypermutation; HBOC uses
  BRCA1/2-driven HRR deficiency; many sporadic cancers use oncogene-induced
  replication stress with TP53/ATM loss. The synthetic-lethal therapeutic
  exploitation of HRR deficiency (PARP inhibitors, platinum) is captured in
  dna_repair_synthetic_lethality. Key conformance target:
  "genome_instability_mutation#Mutator Phenotype and Chromosomal
  Instability".
pathophysiology:
- name: Genome-Maintenance Defect or Replication Stress
  description: >-
    Genome integrity is compromised by either inactivation of a caretaker
    genome-maintenance pathway (DNA mismatch repair, homologous-recombination
    repair/BRCA, nucleotide- or base-excision repair) or by
    oncogene-induced DNA replication stress, in which deregulated
    proliferative signaling forces aberrant origin firing and
    replication-fork collapse. Either insult increases the burden of unrepaired DNA
    lesions.
  role: trigger
  biological_processes:
  - preferred_term: DNA Repair
    term:
      id: GO:0006281
      label: DNA repair
    modifier: DECREASED
  - preferred_term: DNA Replication
    term:
      id: GO:0006260
      label: DNA replication
    modifier: ABNORMAL
  evidence:
  - reference: PMID:20177397
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      In hereditary cancers, genomic instability results from mutations in
      DNA repair genes and drives cancer development, as predicted by the
      mutator hypothesis.
    explanation: >-
      Establishes DNA-repair-gene defects as a source of genomic instability
      that drives cancer, the trigger of this module. Evidence source is
      OTHER because this is a review article.
  downstream:
  - target: Failure of DNA Damage Surveillance and Repair

- name: Failure of DNA Damage Surveillance and Repair
  description: >-
    Accumulating DNA lesions are normally detected by the DNA-damage
    response (ATM/ATR-CHK signaling) and either repaired or, if irreparable,
    routed to p53-dependent arrest, senescence, or apoptosis. When repair is
    deficient and/or the checkpoint barrier is itself disabled (TP53, ATM,
    or CDKN2A loss), damaged cells continue to divide and propagate their
    lesions instead of being eliminated.
  role: effector
  biological_processes:
  - preferred_term: DNA Integrity Checkpoint Signaling
    term:
      id: GO:0031570
      label: DNA integrity checkpoint signaling
    modifier: DECREASED
  - preferred_term: DNA Damage Response
    term:
      id: GO:0006974
      label: DNA damage response
    modifier: ABNORMAL
  evidence:
  - reference: PMID:20177397
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      the mutation patterns of the tumour suppressor TP53 (which encodes
      p53), ataxia telangiectasia mutated (ATM) and cyclin-dependent kinase
      inhibitor 2A (CDKN2A; which encodes p16INK4A and p14ARF) support the
      oncogene-induced DNA replication stress model
    explanation: >-
      Links loss of the TP53/ATM/CDKN2A checkpoint barrier to
      oncogene-induced replication stress and genomic instability, the failure
      modeled in this node. Evidence source is OTHER because this is a review
      article.
  downstream:
  - target: Mutator Phenotype and Chromosomal Instability

- name: Mutator Phenotype and Chromosomal Instability
  description: >-
    The combination of defective repair and failed surveillance yields an
    elevated, heritable rate of genomic alteration - the mutator phenotype.
    Depending on the underlying defect this manifests as a hypermutated /
    microsatellite-unstable genome (MMR loss), a
    homologous-recombination-deficiency mutational signature (BRCA loss), or
    chromosomal instability with aneuploidy and structural rearrangements
    (replication stress, checkpoint loss). This is the conserved central node
    that disorder-specific caretaker lesions converge upon.
  role: central_effector
  biological_processes:
  - preferred_term: DNA Repair
    term:
      id: GO:0006281
      label: DNA repair
    modifier: DECREASED
  evidence:
  - reference: PMID:20177397
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Genomic instability is a characteristic of most cancers.
    explanation: >-
      States that genomic instability is a characteristic of most cancers,
      the central effector (mutator phenotype/chromosomal instability)
      modeled here. Evidence source is OTHER because this is a review
      article.
  downstream:
  - target: Accelerated Clonal Evolution

- name: Accelerated Clonal Evolution
  description: >-
    The heritable genetic diversity generated by the mutator phenotype
    provides the substrate for Darwinian selection within the tumor.
    Variant subclones bearing advantageous alterations are selected and
    expand, accelerating the stepwise acquisition of the other hallmark
    capabilities (proliferative signaling, growth-suppressor evasion,
    immortality, invasion) and driving intratumoral heterogeneity, therapy
    resistance, and progression.
  role: consequence
  evidence:
  - reference: PMID:21376230
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Underlying these hallmarks are genome instability, which generates the
      genetic diversity that expedites their acquisition, and inflammation,
      which fosters multiple hallmark functions.
    explanation: >-
      Hanahan & Weinberg define genome instability as the enabling
      characteristic that generates the genetic diversity expediting hallmark
      acquisition, the consequence modeled here. Evidence source is OTHER
      because this is a review article.
