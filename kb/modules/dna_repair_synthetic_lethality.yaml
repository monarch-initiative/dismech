name: DNA Repair Synthetic Lethality Module
description: >-
  A conserved oncology mechanism module for tumors with impaired homologous
  recombination repair (HRR) or FA/BRCA pathway function. HRR-deficient cells
  accumulate replication-associated DNA damage and become selectively vulnerable
  to PARP inhibition and platinum-induced DNA lesions. Therapeutic pressure can
  then select escape states, including POLQ-associated microhomology-mediated
  repair and BRCA reversion events that restore HRR. Individual disorder entries
  declare conformance via conforms_to on their pathophysiology nodes, preserving
  the conserved causal chain while substituting tumor-specific initiating genes,
  biomarker states, therapies, and resistance mechanisms.
category: Module
creation_date: "2026-05-26T21:09:12Z"
notes: >-
  This is a mechanism module, not a specific disease. Disorder entries reference
  individual nodes via conforms_to (for example,
  "dna_repair_synthetic_lethality#PARP and Platinum Synthetic Lethality"). The
  module is intended for BRCA1/2-mutant, PALB2-mutant, HRD-positive, and related
  FA/BRCA-deficient cancers, including ovarian, breast, prostate, pancreatic,
  and selected DNA-repair-deficient tumors. Treatments such as PARP inhibitors
  and platinum chemotherapy should use target_mechanisms to connect to the
  synthetic-lethality node when the disorder entry represents that therapeutic
  vulnerability. Acquired resistance nodes can conform to the POLQ/error-prone
  repair or restored-HRR nodes when supported by tumor-specific evidence.
pathophysiology:
- name: HRR or FA/BRCA Repair Deficiency
  description: >-
    Loss of BRCA1, BRCA2, PALB2, RAD51 paralogs, or other FA/BRCA pathway
    components impairs high-fidelity homologous recombination repair. This
    creates the initiating repair-deficient state that drives genomic
    instability and makes the tumor dependent on backup DNA repair processes.
  role: trigger
  genes:
  - preferred_term: BRCA1
    term:
      id: hgnc:1100
      label: BRCA1
  - preferred_term: BRCA2
    term:
      id: hgnc:1101
      label: BRCA2
  - preferred_term: PALB2
    term:
      id: hgnc:26144
      label: PALB2
  biological_processes:
  - preferred_term: double-strand break repair via homologous recombination
    term:
      id: GO:0000724
      label: double-strand break repair via homologous recombination
    modifier: DECREASED
  - preferred_term: interstrand cross-link repair
    term:
      id: GO:0036297
      label: interstrand cross-link repair
    modifier: DECREASED
  evidence:
  - reference: PMID:27749330
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Poly(ADP-ribose) polymerase (PARP) inhibitors have been developed as an
      anticancer synthetic lethal therapeutic strategy for tumors with impaired
      homologous recombination DNA repair, based on a synthetic lethal effect.
    explanation: >-
      Review evidence establishes impaired homologous recombination DNA repair
      as the repair-deficient state that creates PARP-inhibitor synthetic
      lethality.
  - reference: PMID:31130988
    supports: SUPPORT
    evidence_source: COMPUTATIONAL
    snippet: >-
      The Fanconi anemia (FA) pathway repairs DNA interstrand crosslinks (ICLs),
      and deficiencies in this pathway cause a fraction of breast and ovarian
      cancers as well as FA, a chromosome instability syndrome characterized by
      bone marrow failure and cancer predisposition.
    explanation: >-
      The FA-CHKREC Boolean network paper summarizes the FA/BRCA pathway as an
      interstrand-crosslink repair system whose deficiency contributes to cancer
      and chromosomal instability.
  downstream:
  - target: Replication-Associated DNA Damage Accumulation
    description: >-
      HRR and FA/BRCA pathway loss leaves replication-associated breaks and
      crosslink-derived lesions insufficiently repaired.

- name: Replication-Associated DNA Damage Accumulation
  description: >-
    PARP-dependent single-strand break repair, interstrand-crosslink repair, and
    RAD51-mediated homologous recombination converge at stressed replication
    forks. When HRR or FA/BRCA repair is deficient, single-strand breaks,
    interstrand crosslinks, and stalled forks generate persistent DNA damage and
    replication-fork collapse.
  role: amplifier
  genes:
  - preferred_term: PARP1
    term:
      id: hgnc:270
      label: PARP1
  biological_processes:
  - preferred_term: single strand break repair
    term:
      id: GO:0000012
      label: single strand break repair
    modifier: DYSREGULATED
  - preferred_term: DNA damage response
    term:
      id: GO:0006974
      label: DNA damage response
    modifier: INCREASED
  cellular_components:
  - preferred_term: replication fork
    term:
      id: GO:0005657
      label: replication fork
  evidence:
  - reference: PMID:33475295
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Poly(ADP-ribose) polymerase (PARP) is involved in single-strand DNA break
      base excision repair.
    explanation: >-
      Review evidence supports PARP-dependent single-strand break repair as a
      repair process whose inhibition becomes consequential in HRR-deficient
      cells.
  - reference: PMID:23401855
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: >-
      Consistent with a role in the repair of ICLs by homologous recombination
      (HR), knockdown of MCM8 or MCM9 significantly reduces HR repair
      efficiency.
    explanation: >-
      Cell-based experiments link interstrand-crosslink repair to homologous
      recombination efficiency and RAD51 recruitment at DNA damage sites.
  downstream:
  - target: PARP and Platinum Synthetic Lethality
    description: >-
      The accumulated damage state creates a therapeutic vulnerability to PARP
      inhibition and DNA-damaging platinum agents.

- name: PARP and Platinum Synthetic Lethality
  description: >-
    In HRR-deficient tumor cells, PARP inhibition blocks single-strand break
    repair and can convert unresolved lesions into double-strand breaks that
    cannot be repaired faithfully. Platinum agents add crosslinking lesions that
    similarly stress HRR and FA/BRCA repair. The combined logic is synthetic
    lethality: a tumor-specific repair defect converts otherwise tolerable DNA
    damage into selective tumor-cell death.
  role: therapeutic_vulnerability
  genes:
  - preferred_term: PARP1
    term:
      id: hgnc:270
      label: PARP1
  biological_processes:
  - preferred_term: single strand break repair
    term:
      id: GO:0000012
      label: single strand break repair
    modifier: DECREASED
  - preferred_term: double-strand break repair via homologous recombination
    term:
      id: GO:0000724
      label: double-strand break repair via homologous recombination
    modifier: DECREASED
  evidence:
  - reference: PMID:33475295
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      PARP inhibition causes synthetic lethality in breast cancers associated
      with germline BRCA1 and BRCA2 mutations and is routinely used in clinical
      practice for metastatic breast cancer.
    explanation: >-
      Review evidence directly supports the synthetic-lethal relationship
      between PARP inhibition and BRCA-associated HRR deficiency.
  - reference: DOI:10.1038/s41416-024-02827-z
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      BC resulting from a germline BRCAm (gBRCAm) has distinct clinical
      characteristics along with increased sensitivity to DNA-damaging agents
      such as poly(ADP-ribose) polymerase (PARP) inhibitors and platinum-based
      chemotherapies, and potentially decreased sensitivity to cyclin-dependent
      kinase 4 and 6 (CDK4/6) inhibitors.
    explanation: >-
      Review evidence supports the broader therapeutic-vulnerability pattern:
      germline BRCA-mutated breast cancers show sensitivity to both PARP
      inhibitors and platinum-based chemotherapy.
  downstream:
  - target: Error-Prone End Joining and POLQ-Mediated Repair
    description: >-
      Treatment pressure can select cells that survive by using mutagenic repair
      alternatives or by generating reversion events.
  - target: Restored HRR and Acquired Resistance
    description: >-
      Resistant clones can restore homologous recombination repair and lose the
      synthetic-lethal vulnerability.

- name: Error-Prone End Joining and POLQ-Mediated Repair
  description: >-
    When canonical HRR or FA/BRCA repair is impaired, tumor cells can rely on
    alternative end-joining and microhomology-mediated repair. POLQ-associated
    repair can generate frameshift deletion-mediated reversion events under
    PARP-inhibitor or platinum pressure, creating a route toward acquired
    resistance.
  role: adaptive_escape
  genes:
  - preferred_term: POLQ
    term:
      id: hgnc:9186
      label: POLQ
  biological_processes:
  - preferred_term: alternative end joining
    term:
      id: GO:0006303
      label: double-strand break repair via nonhomologous end joining
    modifier: INCREASED
  evidence:
  - reference: PMID:39577422
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Among reversions mediated by frameshift deletions, 60% are flanked by DNA
      microhomologies, implicating POLQ-mediated repair.
    explanation: >-
      TOPARP-B resistance analysis connects microhomology-flanked reversion
      events to POLQ-mediated repair in metastatic prostate cancer treated with
      PARP inhibition.
  - reference: PMID:31130988
    supports: SUPPORT
    evidence_source: COMPUTATIONAL
    snippet: >-
      Several tumors are deficient in the FA pathway, including high-grade
      ovarian carcinomas, triple negative breast cancers and metastatic prostate
      cancer (Ceccaldi, 2015), which can be compensated by activation of
      alternative DNA repair pathways, such as DNA polymerase -PARP1-mediated
      alternative-end joining (Ceccaldi, 2015).
    explanation: >-
      The FA-CHKREC model paper supports alternative end joining as a backup
      repair route in FA/BRCA-deficient tumor contexts.
  downstream:
  - target: Restored HRR and Acquired Resistance
    description: >-
      Error-prone repair can generate reversion mutations that restore the
      reading frame of HRR genes.

- name: Restored HRR and Acquired Resistance
  description: >-
    Resistant tumor subclones can acquire BRCA1, BRCA2, or PALB2 reversion
    mutations that restore open reading frames or otherwise restore HRR function.
    Once HRR is restored, PARP inhibitor or platinum sensitivity is reduced and
    the original synthetic-lethal relationship is weakened.
  role: consequence
  genes:
  - preferred_term: BRCA1
    term:
      id: hgnc:1100
      label: BRCA1
  - preferred_term: BRCA2
    term:
      id: hgnc:1101
      label: BRCA2
  - preferred_term: PALB2
    term:
      id: hgnc:26144
      label: PALB2
  biological_processes:
  - preferred_term: double-strand break repair via homologous recombination
    term:
      id: GO:0000724
      label: double-strand break repair via homologous recombination
    modifier: INCREASED
  evidence:
  - reference: PMID:36243543
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      No baseline BRCA reversion mutations were observed in 100 BRCA+ patients.
      NGS identified somatic BRCA reversion mutations in 39% (39/100) of
      patients after progression.
    explanation: >-
      TRITON2 post-progression plasma analysis documents acquired BRCA reversion
      mutations after rucaparib treatment.
  - reference: PMID:39577422
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      These data support the need for restored HRR function in PARPi resistance.
    explanation: >-
      TOPARP-B resistance analysis directly supports restored homologous
      recombination repair as a requirement for PARP-inhibitor resistance.
