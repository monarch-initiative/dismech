    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Premature fusion of these bones, termed coronal synostosis, is a common
      human developmental anomaly.
    explanation: >-
      Defines premature bony fusion of the cranial suture as the clinical endpoint
      of the module.
  - reference: PMID:25799059
    supports: SUPPORT
    evidence_source: MODEL_ORGANISM
    snippet: >-
      Twist1(+/-) mice with craniosynostosis show reduced Gli1+ MSCs in sutures,
      suggesting that craniosynostosis may result from diminished suture stem
      cells.
    explanation: >-
      Links the restraint/niche-loss route directly to the craniosynostosis
      endpoint.
