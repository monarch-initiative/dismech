    term:
      id: CL:0000062
      label: osteoblast
  - preferred_term: mesenchymal stem cell
    term:
      id: CL:0000134
      label: mesenchymal stem cell
  locations:
  - preferred_term: coronal suture
    term:
      id: UBERON:0002489
      label: coronal suture
  - preferred_term: cranial suture
    term:
      id: UBERON:0003685
      label: cranial suture
  biological_processes:
  - preferred_term: osteoblast differentiation
    term:
      id: GO:0001649
      label: osteoblast differentiation
    modifier: INCREASED
  evidence:
  - reference: PMID:15030764
    supports: SUPPORT
    evidence_source: MODEL_ORGANISM
    snippet: >-
      Twist-1 or -2 deficiency leads to premature osteoblast differentiation.
    explanation: >-
      Shows that removing TWIST restraint accelerates osteoblast differentiation,
      the convergent effector of premature suture fusion regardless of upstream
      route.
  downstream:
  - target: Premature Cranial Suture Fusion and Craniosynostosis
    description: >-
      Excess osteogenesis in the suture causes premature bony fusion of the
      cranial suture.
    causal_link_type: DIRECT
    hypothesis_groups:
    - suture_osteogenic_imbalance_model

- name: Premature Cranial Suture Fusion and Craniosynostosis
  description: >-
    Excess osteogenic differentiation within a cranial suture causes premature
    bony fusion, distorting cranial vault growth and producing craniosynostosis.
    The specific suture(s) involved and skull-shape deformity are disorder-specific
    (coronal in the FGFR and TWIST1 syndromes; midline metopic/sagittal in the
    SMAD6 route).
