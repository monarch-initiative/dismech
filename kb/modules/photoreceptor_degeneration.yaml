name: Inherited Photoreceptor Degeneration Module
description: >-
  A conserved pathophysiology module representing the final common pathway of
  inherited rod-cone dystrophy / retinitis pigmentosa (HP:0000510,
  MONDO:0019200). Mutations in functionally diverse photoreceptor gene
  classes - phototransduction components (RHO, PDE6, CNG channels), ciliary
  and outer-segment structural proteins (RPGR, peripherin/RDS), RPE visual-cycle
  enzymes (RPE65, ABCA4), and pre-mRNA splicing factors - converge on a shared
  cascade. The primary lesion is expressed in or critically affects rod
  photoreceptors, producing metabolic and oxidative stress with protein
  mislocalization and misfolding, rod photoreceptor apoptosis, and non-cell-
  autonomous secondary cone degeneration with outer retinal thinning. The
  clinical consequence is progressive visual loss that begins as night blindness,
  advances to peripheral (then central) visual field constriction. Conforming
  disorder entries declare conformance via conforms_to on their pathophysiology
  nodes, substituting the disorder-specific mutated gene and primary lesion while
  preserving the conserved rod-first, cone-second causal chain.
category: Module
creation_date: "2026-06-06T00:00:00Z"
notes: >-
  This is a mechanism module, not a specific disease. Disorder entries reference
  individual nodes via conforms_to (e.g.,
  "photoreceptor_degeneration#Rod Photoreceptor Apoptosis"). The module defines
  the expected pathophysiology structure; conforming nodes in disorder files
  should include the corresponding cell types, biological processes, and causal
  edges, specialized to the gene class involved. Key gene-class substitutions
  conforming nodes should make at the trigger node: phototransduction defects
  (e.g., RHO, PDE6B, CNGB1), photoreceptor ciliary/structural defects
  (e.g., RPGR, RP1, peripherin/PRPH2), RPE visual-cycle defects
  (e.g., RPE65, ABCA4), and pre-mRNA splicing-factor defects (e.g., PRPF31).
pathophysiology:
- name: Photoreceptor Gene Defect
  description: >-
    The initiating lesion is a mutation in a gene required for photoreceptor
    function or homeostasis. Across retinitis pigmentosa subtypes the gene
    class varies - phototransduction-cascade components, outer-segment and
    connecting-cilium structural proteins, RPE visual-cycle enzymes, or pre-mRNA
    splicing factors - but the mutation is expressed in or critically impairs
    rod photoreceptors. The defect disrupts phototransduction, outer-segment
    renewal, or retinol metabolism, destabilizing the photoreceptor before
    overt cell death.
  role: trigger
  cell_types:
  - preferred_term: rod photoreceptor cell
    term:
      id: CL:0000604
      label: retinal rod cell
  - preferred_term: photoreceptor cell
    term:
      id: CL:0000210
      label: photoreceptor cell
  biological_processes:
  - preferred_term: Phototransduction
    term:
      id: GO:0007602
      label: phototransduction
    modifier: ABNORMAL
  - preferred_term: Photoreceptor cell maintenance
    term:
      id: GO:0045494
      label: photoreceptor cell maintenance
    modifier: DECREASED
  evidence:
  - reference: PMID:24732759
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Alterations in the activity of the phototransduction cascade, such as
      changes affecting the renewal and shedding of the photoreceptor OSs,
      visual transduction, and/or retinol metabolism have a great impact on the
      health of the retina. Mutations within any of the molecules responsible
      for these visual processes cause several types of retinal and RPE
      degenerative diseases.
    explanation: >-
      Establishes that mutations across diverse photoreceptor gene classes
      (phototransduction, outer-segment renewal, retinol/visual-cycle
      metabolism) are the conserved initiating lesion of inherited retinal
      degeneration. Evidence source is OTHER because this is a review chapter
      synthesizing multiple study types.
  - reference: PMID:35792991
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      The various mechanisms underlying rod degeneration primarily rely on
      genetic mutations, leading to night blindness initially.
    explanation: >-
      Confirms that the rod-expressed genetic mutation is the primary driver of
      the cascade. Evidence source is OTHER because this is a review.
  downstream:
  - target: Photoreceptor Metabolic and Oxidative Stress

- name: Photoreceptor Metabolic and Oxidative Stress
  description: >-
    The gene defect imposes metabolic and oxidative stress on the photoreceptor.
    Disrupted phototransduction and dysregulated cGMP/Ca2+ handling, together
    with retention of un- or mis-folded proteins in the endoplasmic reticulum,
    activate the unfolded protein response. As rods are lost, falling oxygen
    consumption raises outer-retinal oxygen tension, driving superoxide and
    reactive-species production that overwhelms antioxidant defenses. This
    amplification step bridges the primary lesion to photoreceptor cell death.
  role: amplifier
  cell_types:
  - preferred_term: photoreceptor cell
    term:
      id: CL:0000210
      label: photoreceptor cell
  biological_processes:
  - preferred_term: Response to oxidative stress
    term:
      id: GO:0006979
      label: response to oxidative stress
    modifier: INCREASED
  - preferred_term: Protein folding (unfolded protein response)
    term:
      id: GO:0006457
      label: protein folding
    modifier: ABNORMAL
  evidence:
  - reference: PMID:28962928
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      The death of rods reduces oxygen consumption resulting in high tissue
      levels of oxygen in the outer retina. The excess oxygen stimulates
      superoxide radical production by mismatches in the electron transport
      chain in mitochondria and by stimulation of NADPH oxidase activity in
      cytoplasm. The high levels of superoxide radicals overwhelm the
      antioxidant defense system and generate more reactive species including
      peroxynitrite which is extremely damaging and difficult to detoxify.
    explanation: >-
      Directly describes the oxidative-stress amplification mechanism in which
      rod loss raises outer-retinal oxygen and generates damaging reactive
      species that overwhelm antioxidant defenses. Evidence source is OTHER
      because this is a review.
  - reference: PMID:24732759
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Ca2+-induced stress on a cell, such as occurs when the CNG channels remain
      open after light stimulation, can result in protein modifications that can
      lead to the accumulation of un- or misfolded proteins within the ER
    explanation: >-
      Supports the protein-misfolding / unfolded protein response arm of the
      stress amplification step. Evidence source is OTHER because this is a
      review chapter.
  downstream:
  - target: Rod Photoreceptor Apoptosis

- name: Rod Photoreceptor Apoptosis
  description: >-
    Accumulated metabolic and oxidative stress, dysregulated second messengers,
    and unfolded-protein-response signaling converge on programmed death of rod
    photoreceptors. Apoptosis is the central, conserved effector mechanism of
    rod loss across retinitis pigmentosa subtypes, although calpain-mediated and
    other non-apoptotic death pathways can also contribute. Because the disease
    mutation is expressed in rods, this is the primary, cell-autonomous death
    step.
  role: central_effector
  cell_types:
  - preferred_term: rod photoreceptor cell
    term:
      id: CL:0000604
      label: retinal rod cell
  biological_processes:
  - preferred_term: Neuron apoptotic process
    term:
      id: GO:0051402
      label: neuron apoptotic process
    modifier: INCREASED
  - preferred_term: Apoptotic process
    term:
      id: GO:0006915
      label: apoptotic process
    modifier: INCREASED
  evidence:
  - reference: PMID:24732759
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      In RP, the progressive atrophy of the rod photoreceptor cells leads to the
      secondary death of the cones.
    explanation: >-
      Establishes progressive rod photoreceptor death as the primary,
      cell-autonomous lesion that precedes secondary cone loss. Evidence source
      is OTHER because this is a review chapter.
  - reference: PMID:24732759
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      This photoreceptor cell death has been thought to result from a
      caspase-dependent apoptotic mechanism
    explanation: >-
      Supports apoptosis (caspase-dependent) as the conserved effector mechanism
      of photoreceptor death. Evidence source is OTHER because this is a review.
  downstream:
  - target: Secondary Cone Degeneration and Outer Retinal Thinning

- name: Secondary Cone Degeneration and Outer Retinal Thinning
  description: >-
    After rods are largely eliminated, cone photoreceptors degenerate in a
    characteristic non-cell-autonomous pattern even though the disease mutation
    is usually not expressed in cones. Proposed drivers include loss of
    rod-derived trophic support, nutrient and metabolic shortage, oxidative
    damage from the high post-rod-loss oxygen environment, and microglial
    inflammation. Progressive photoreceptor loss thins the outer retina. Cone
    death is the step that converts night blindness into disabling loss of
    daytime and central vision.
  role: effector
  cell_types:
  - preferred_term: cone photoreceptor cell
    term:
      id: CL:0000573
      label: retinal cone cell
  biological_processes:
  - preferred_term: Neuron apoptotic process
    term:
      id: GO:0051402
      label: neuron apoptotic process
    modifier: INCREASED
  - preferred_term: Response to oxidative stress
    term:
      id: GO:0006979
      label: response to oxidative stress
    modifier: INCREASED
  evidence:
  - reference: PMID:28962928
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      After rods die, cone photoreceptors slowly degenerate in a characteristic
      pattern.
    explanation: >-
      Directly states the conserved sequence of secondary cone degeneration
      following rod death. Evidence source is OTHER because this is a review.
  - reference: PMID:27350263
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      In all forms of RP, the genetic mutation is expressed exclusively in rods;
      however, cones die too. The secondary death of cones in RP remains
      somewhat mysterious.
    explanation: >-
      Establishes the non-cell-autonomous nature of cone death - cones lack the
      causal mutation yet still degenerate. Evidence source is OTHER because
      this is a review.
  downstream:
  - target: Progressive Visual Field Loss and Blindness

- name: Progressive Visual Field Loss and Blindness
  description: >-
    The clinical phenotype of retinitis pigmentosa / rod-cone dystrophy. Rod
    loss first produces night blindness (nyctalopia), then constriction of the
    peripheral visual field (tunnel vision), with central vision relatively
    preserved until cone degeneration advances. Eventually central vision is
    lost, progressing toward legal blindness. This is the conserved terminal
    consequence shared across all genetic subtypes.
  role: consequence
  biological_processes:
  - preferred_term: Visual perception
    term:
      id: GO:0007601
      label: visual perception
    modifier: DECREASED
  evidence:
  - reference: PMID:24732759
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Affected individuals often present with night blindness (nyctalopia) and
      constricted visual fields (tunnel vision), but central vision (e.g.
      reading vision, facial recognition) is normal or nearly normal. Eventually
      central vision is lost as the cone cells degenerate.
    explanation: >-
      Directly describes the conserved clinical progression - night blindness,
      then peripheral field constriction, then central vision loss - that
      defines the consequence node. Evidence source is OTHER because this is a
      review chapter.
  - reference: PMID:28962928
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Rod cell death causes night blindness, but visual disability and blindness
      result from cone degeneration
    explanation: >-
      Confirms that night blindness arises from rod loss while disabling
      blindness results from secondary cone degeneration, tying the terminal
      phenotype to the upstream cell-death chain. Evidence source is OTHER
      because this is a review.
