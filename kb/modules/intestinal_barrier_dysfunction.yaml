name: Intestinal Barrier Dysfunction Module
description: >-
  A conserved intestinal pathophysiology module representing convergent
  mechanisms that produce diarrhea through epithelial injury, junctional
  disruption, increased mucosal permeability, impaired absorption, and
  downstream fluid loss. The initiating insult varies across immune-mediated
  enteritides, treatment-related mucositis, dysbiosis-associated inflammation,
  and related disorders, but the downstream sequence repeatedly converges on
  barrier failure and diarrheal output.
category: Module
creation_date: "2026-04-02T00:43:41Z"
updated_date: "2026-04-02T00:43:41Z"
notes: >-
  This is a mechanism module, not a specific disease. Disorder entries can
  reference nodes via conforms_to (e.g.,
  "intestinal_barrier_dysfunction#Tight Junction Disruption and Barrier
  Leak"). The module is intended for reusable diarrheal motifs seen in Crohn
  disease, ulcerative colitis, celiac disease, chemotherapy-associated
  intestinal injury, pouchitis, and related disorders in which epithelial
  injury, barrier leak, or absorptive failure are prominent.
pathophysiology:
- name: Epithelial Stress and Injury
  description: >-
    Immune-mediated, toxic, microbial, or treatment-related insults injure the
    intestinal mucosa and epithelial compartment. Across diseases, this includes
    inflammatory cytokine exposure, direct epithelial toxicity, crypt injury,
    and apoptosis, which destabilize the epithelial surface before overt
    absorptive failure becomes clinically evident.
  role: trigger
  cell_types:
  - preferred_term: intestinal epithelial cell
    term:
      id: CL:0002563
      label: intestinal epithelial cell
  - preferred_term: enterocyte
    term:
      id: CL:0000584
      label: enterocyte
  biological_processes:
  - preferred_term: apoptotic process
    term:
      id: GO:0006915
      label: apoptotic process
    modifier: INCREASED
  evidence:
  - reference: PMID:37018992
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Chemotherapy kills fast-growing cells including gut stem cells. This
      affects all components of the physical and functional intestinal barrier,
      i.e., the mucus layer, epithelium, and immune system.
    explanation: >-
      Review evidence shows that treatment-related intestinal injury begins with
      epithelial and stem-cell damage that perturbs the barrier as a whole,
      illustrating a generic trigger state for this module.
  - reference: PMID:28275682
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Moreover, the underlying mechanisms are discussed, including apoptosis of
      intestinal epithelial cells, biology of intestinal stem cells, alterations
      in the apical junctional complex, transcytotic uptake of gluten peptides,
      and possible implications of a defective epithelial polarity.
    explanation: >-
      Review of celiac disease identifies epithelial apoptosis and
      stem-cell/junctional perturbation as core injury mechanisms that
      generalize beyond celiac disease.
  downstream:
  - target: Tight Junction Disruption and Barrier Leak

- name: Tight Junction Disruption and Barrier Leak
  description: >-
    Injury and inflammatory signaling disrupt the apical junctional complex,
    reduce epithelial resistance, and increase paracellular permeability. Loss
    of sealing junction proteins converts the mucosa into a leak-prone surface
    that permits flux of solutes and luminal contents across the epithelial
    barrier.
  role: amplifier
  cell_types:
  - preferred_term: intestinal epithelial cell
    term:
      id: CL:0002563
      label: intestinal epithelial cell
  biological_processes:
  - preferred_term: bicellular tight junction assembly
    term:
      id: GO:0070830
      label: bicellular tight junction assembly
    modifier: DECREASED
  evidence:
  - reference: PMID:31717494
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: >-
      Transepithelial resistance was found to be decreased only in IECs that had
      been exposed to celiac monocytes.
    explanation: >-
      Human coculture data directly demonstrate reduced epithelial barrier
      resistance under disease-relevant inflammatory conditions.
  - reference: PMID:38132165
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Barrier dysfunction as a result of epithelial tight junction changes plays
      a role in IBS-D as a pathomechanism inducing a leak flux type of diarrhea.
    explanation: >-
      Human biopsy-based data establish a direct link between tight-junction
      perturbation and leak-flux diarrhea.
  downstream:
  - target: Luminal Access and Inflammatory Amplification

- name: Luminal Access and Inflammatory Amplification
  description: >-
    Increased permeability permits microbial products, dietary antigens, toxins,
    and other luminal contents to access the mucosa more readily. This
    amplifies local cytokine responses and sustains the inflammatory state,
    reinforcing epithelial damage and creating a self-perpetuating
    barrier-failure loop.
  role: amplifier
  cell_types:
  - preferred_term: monocyte
    term:
      id: CL:0000576
      label: monocyte
  - preferred_term: intestinal epithelial cell
    term:
      id: CL:0002563
      label: intestinal epithelial cell
  biological_processes:
  - preferred_term: inflammatory response
    term:
      id: GO:0006954
      label: inflammatory response
    modifier: INCREASED
  evidence:
  - reference: PMID:37018992
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      This results in an altered intestinal permeability of toxic compounds
      (e.g., endotoxins) as well as luminal bacterial translocation into the
      mucosa and central circulation.
    explanation: >-
      Supports the transition from barrier leak to mucosal exposure and
      inflammatory amplification.
  - reference: PMID:29737913
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      The pathogenesis of IBD-associated diarrhea is multifactorial and is
      essentially an outcome of mucosal damage caused by persistent inflammation
      resulting in dysregulated intestinal ion transport, impaired epithelial
      barrier function and increased accessibility of the pathogens to the
      intestinal mucosa.
    explanation: >-
      Broad IBD review ties persistent inflammation, barrier impairment, and
      enhanced pathogen access into a single pathogenic loop.
  downstream:
  - target: Absorptive Failure and Transport Dysregulation

- name: Absorptive Failure and Transport Dysregulation
  description: >-
    Villous blunting, epithelial surface loss, and inflammatory reprogramming of
    ion transport reduce effective fluid and electrolyte absorption. In
    parallel, altered transporter activity promotes water retention within the
    intestinal lumen, coupling malabsorptive failure to diarrheal output.
  role: effector
  cell_types:
  - preferred_term: enterocyte
    term:
      id: CL:0000584
      label: enterocyte
  biological_processes:
  - preferred_term: intestinal absorption
    term:
      id: GO:0050892
      label: intestinal absorption
    modifier: DECREASED
  evidence:
  - reference: PMID:28275682
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      In celiac disease (CD) a T-cell-mediated response to gluten is mounted in
      genetically predisposed individuals, resulting in a malabsorptive
      enteropathy histologically highlighted by villous atrophy and crypt
      hyperplasia.
    explanation: >-
      Provides a representative disease context in which epithelial remodeling
      and villous loss drive malabsorptive failure.
  - reference: PMID:29737913
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Altered expression and/or function of epithelial ion transporters and
      channels is the principle cause of electrolyte retention and water
      accumulation in the intestinal lumen leading to diarrhea in IBD.
    explanation: >-
      Directly connects transport dysfunction to luminal fluid accumulation and
      diarrheal physiology.
  downstream:
  - target: Diarrhea

- name: Diarrhea
  description: >-
    The combined effects of barrier leak, inflammatory exudation, and reduced
    absorptive capacity increase stool water content and frequency. The
    phenotype may be watery, inflammatory, or mixed depending on the dominant
    upstream lesion, but the shared convergent outcome is diarrheal fluid loss.
  role: consequence
  evidence:
  - reference: PMID:38132165
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Barrier dysfunction as a result of epithelial tight junction changes plays
      a role in IBS-D as a pathomechanism inducing a leak flux type of diarrhea.
    explanation: >-
      Provides direct human evidence that barrier dysfunction can itself define a
      diarrheal mechanism.
  - reference: PMID:29737913
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Aberrant barrier function further contributes to diarrhea via leak-flux
      mechanism.
    explanation: >-
      Concise review statement linking barrier failure to the downstream
      diarrheal phenotype.
experimental_models:
- name: Primary human small-intestinal monolayer barrier model
  description: >-
    Polarized primary human small-intestinal epithelial monolayers grown on a
    permeable scaffold to study epithelial injury, permeability, and luminal to
    basolateral flux.
  experimental_model_type: PRIMARY_CELL_CULTURE
  namo_type: namo:TwoDCellCulture
  organism:
    preferred_term: human
    term:
      id: NCBITaxon:9606
      label: Homo sapiens
  tissue_term:
    preferred_term: small intestine
    term:
      id: UBERON:0002108
      label: small intestine
  cell_types:
  - preferred_term: intestinal epithelial cell
    term:
      id: CL:0002563
      label: intestinal epithelial cell
  conditions:
  - epithelial injury
  - intestinal barrier dysfunction
  - paracellular permeability
  cell_source: Primary human small-intestinal epithelial cells
  culture_system: Polarized two-dimensional monolayer on a permeable support
  publication: PMID:29094594
  findings:
  - statement: >-
      The model supports direct measurement of epithelial injury and barrier
      leak relevant to diarrhea-associated intestinal barrier dysfunction
    evidence:
    - reference: PMID:29094594
      supports: SUPPORT
      evidence_source: IN_VITRO
      snippet: >-
        We also find that DCF induces intestinal barrier permeability,
        facilitating the translocation of compounds from the luminal to the
        basolateral side of the intestinal epithelium.
      explanation: >-
        Demonstrates direct induction and measurement of barrier permeability in
        a primary human intestinal monolayer.
  evidence:
  - reference: PMID:29094594
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: >-
      The results we outline here establish the utility of this novel platform,
      representative of the human small intestinal epithelium, to understand
      NSAID toxicity, which can be applied to study multiple aspects of gut
      barrier function including defense against infectious pathogens and
      host-microbiota interactions.
    explanation: >-
      Supports reuse of this primary human system for barrier-dysfunction
      questions beyond the initiating insult.
  notes: >-
    Clean fit for barrier-centric modules because it measures epithelial injury
    and permeability directly in primary human intestinal epithelium.
- name: Celiac monocyte-epithelial coculture barrier model
  description: >-
    Human CD14-positive monocytes from patients or controls cocultured with
    intestinal epithelial cells to study cytokine-driven changes in barrier
    resistance and tight-junction composition.
  experimental_model_type: CO_CULTURE
  organism:
    preferred_term: human
    term:
      id: NCBITaxon:9606
      label: Homo sapiens
  cell_types:
  - preferred_term: intestinal epithelial cell
    term:
      id: CL:0002563
      label: intestinal epithelial cell
  - preferred_term: monocyte
    term:
      id: CL:0000576
      label: monocyte
  conditions:
  - intestinal barrier dysfunction
  - cytokine-driven tight-junction alteration
  - immune-epithelial crosstalk
  cell_source: >-
    Human CD14-positive peripheral monocytes cocultured with Caco2BBe
    intestinal epithelial cells
  culture_system: Two-dimensional epithelial-monocyte coculture
  publication: PMID:31717494
  findings:
  - statement: >-
      Disease-associated monocytes can induce barrier resistance loss and
      tight-junction alteration in intestinal epithelial cells
    evidence:
    - reference: PMID:31717494
      supports: SUPPORT
      evidence_source: IN_VITRO
      snippet: >-
        Transepithelial resistance was found to be decreased only in IECs that
        had been exposed to celiac monocytes.
      explanation: Directly shows immune-cell-driven barrier impairment.
  evidence:
  - reference: PMID:31717494
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: >-
      In conclusion, CeD peripheral monocytes reveal an intrinsically elevated
      pro-inflammatory cytokine pattern that is associated with the potential of
      peripheral monocytes to affect barrier function by altering TJ
      composition.
    explanation: >-
      Supports the model as a reusable immune-epithelial platform for
      barrier-dysfunction mechanisms.
  notes: >-
    Useful when the upstream insult is immune-mediated and the mechanistic
    question centers on cytokine-driven junctional remodeling rather than a
    single toxin or pathogen.
