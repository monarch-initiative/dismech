name: FAME Pentanucleotide Repeat RNA Toxicity Module
description: >-
  A conserved mechanism module for familial adult myoclonus epilepsy caused by
  intronic pentanucleotide repeat expansions that contain pathogenic TTTCA
  insertions. Across multiple unrelated host genes, the shared repeat
  architecture is linked to UUUCA repeat RNA toxicity, cerebellocortical
  dysfunction, and cortical hyperexcitability with myoclonus and seizures.
category: Module
creation_date: "2026-04-17T15:32:01Z"
notes: >-
  This is a mechanism module, not a disease entry. Disorder files should refer
  to its nodes via conforms_to using
  "fame_pentanucleotide_repeat_rna_toxicity#<Node Name>". The module is
  intentionally conservative: it treats TTTCA-containing repeat RNA toxicity as
  the shared core mechanism and does not require host-gene loss of function or
  repeat-associated non-AUG translation.
pathophysiology:
- name: Pathogenic TTTCA-Containing Pentanucleotide Repeat Expansion
  description: >-
    Pathogenic FAME alleles are intronic pentanucleotide repeat expansions in
    which elongated TTTTA tracts contain inserted TTTCA segments. TTTTA-only
    expansions are generally regarded as nonpathogenic, whereas the presence of
    TTTCA insertions tracks with disease.
  role: trigger
  evidence:
  - reference: PMID:40200849
    reference_title: "Repeat Expansions with Small TTTCA Insertions in MARCHF6 Cause Familial Myoclonus without Epilepsy."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      FAME is a rare autosomal dominant disorder caused by the same intronic
      TTTTA/TTTCA repeat expansion in seven distinct genes. TTTTA-only
      expansions are benign, whereas those containing TTTCA insertions are
      pathogenic.
    explanation: >-
      Supports the conserved initiating lesion across FAME loci and the
      pathogenic importance of the inserted TTTCA motif rather than TTTTA-only
      expansion.
  downstream:
  - target: UUUCA Repeat RNA Toxicity

- name: UUUCA Repeat RNA Toxicity
  description: >-
    Transcription of the expanded alleles can produce UUUCA repeat-containing
    RNA that accumulates in nuclear foci and is thought to drive RNA-mediated
    toxicity largely independently of the host gene's normal function.
  role: central_effector
  cell_types:
  - preferred_term: neuron
    term:
      id: CL:0000540
      label: neuron
  - preferred_term: Purkinje cell
    term:
      id: CL:0000121
      label: Purkinje cell
  evidence:
  - reference: PMID:36622139
    reference_title: "Insights into familial adult myoclonus epilepsy pathogenesis: How the same repeat expansion in six unrelated genes may lead to cortical excitability."
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Current hypotheses include toxicity of the RNA molecules carrying UUUCA
      repeats, or toxicity of polypeptides encoded by the repeats, a mechanism
      known as repeat-associated non-AUG translation.
    explanation: >-
      Supports repeat RNA accumulation and RNA-mediated toxicity as the leading
      shared mechanism, while noting that alternative downstream toxic species
      remain under investigation.
  - reference: PMID:37994247
    reference_title: "Pentanucleotide Repeat Insertions in RAI1 Cause Benign Adult Familial Myoclonic Epilepsy Type 8."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      CONCLUSIONS: These findings establish a new type of BAFME, BAFME8, in an
      African family and suggest that haploinsufficiency is unlikely to be the
      main pathomechanism of BAFME.
    explanation: >-
      Supports a host-gene-independent mechanism and argues against simple
      haploinsufficiency as the shared explanation for FAME.
  downstream:
  - target: Cerebellocortical Circuit Dysfunction

- name: Cerebellocortical Circuit Dysfunction
  description: >-
    Postmortem, neurophysiological, and imaging studies indicate combined
    dysfunction of the cerebral cortex and cerebellum, especially Purkinje-cell
    and cerebellar network involvement that may amplify the cortical phenotype.
  role: amplifier
  cell_types:
  - preferred_term: neuron
    term:
      id: CL:0000540
      label: neuron
  - preferred_term: Purkinje cell
    term:
      id: CL:0000121
      label: Purkinje cell
  locations:
  - preferred_term: cerebral cortex
    term:
      id: UBERON:0000956
      label: cerebral cortex
  - preferred_term: cerebellum
    term:
      id: UBERON:0002037
      label: cerebellum
  biological_processes:
  - preferred_term: chemical synaptic transmission
    term:
      id: GO:0007268
      label: chemical synaptic transmission
    modifier: DYSREGULATED
  evidence:
  - reference: PMID:36622139
    reference_title: "Insights into familial adult myoclonus epilepsy pathogenesis: How the same repeat expansion in six unrelated genes may lead to cortical excitability."
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Postmortem and electrophysiological studies have pointed to cortical
      hyperexcitability as well as dysfunction and neurodegeneration of both
      the cortex and cerebellum of FAME subjects.
    explanation: >-
      Supports the intermediate circuit-level mechanism involving both cortical
      and cerebellar compartments rather than an isolated cortical lesion.
  - reference: PMID:40747611
    reference_title: "Familial adult myoclonus epilepsy: A comprehensive diagnostic strategy for clinical practice."
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Neuroimaging studies typically show mild cerebellar atrophy or
      nonspecific structural changes on magnetic resonance imaging.
    explanation: >-
      Provides clinically observed imaging support for cerebellar involvement in
      the shared FAME phenotype.
  downstream:
  - target: Cortical Hyperexcitability and Seizure Susceptibility

- name: Cortical Hyperexcitability and Seizure Susceptibility
  description: >-
    The final common network state is cortical hyperexcitability, manifested as
    cortical-origin myoclonus, enlarged long-loop responses, photosensitivity,
    and susceptibility to generalized epileptic seizures.
  role: effector
  cell_types:
  - preferred_term: pyramidal neuron
    term:
      id: CL:0000598
      label: pyramidal neuron
  locations:
  - preferred_term: cerebral cortex
    term:
      id: UBERON:0000956
      label: cerebral cortex
  biological_processes:
  - preferred_term: chemical synaptic transmission
    term:
      id: GO:0007268
      label: chemical synaptic transmission
    modifier: DYSREGULATED
  evidence:
  - reference: PMID:40747611
    reference_title: "Familial adult myoclonus epilepsy: A comprehensive diagnostic strategy for clinical practice."
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Electrophysiological examinations are essential in demonstrating cortical
      hyperexcitability and confirming the cortical origin of myoclonus.
    explanation: >-
      Establishes cortical hyperexcitability as the electrophysiological
      hallmark of the disease mechanism.
