name: Sensorineural Hair Cell Loss Module
description: >-
  A conserved cochlear pathophysiology module representing the final common
  pathway to sensorineural hearing loss (HP:0000407; MONDO:0005365). Diverse
  initiating insults — hereditary defects of hair-cell stereocilia and
  mechanotransduction (e.g., MYO7A, stereociliary actin-core genes), defects of
  cochlear ionic homeostasis and gap-junction potassium recycling (GJB2/connexin
  26), age-related (presbycusis), noise-induced, and ototoxic injury — converge
  on disruption of cochlear ionic homeostasis and oxidative stress, failure of
  hair-cell mechanotransduction, and apoptotic death of the non-regenerating
  mammalian cochlear hair cells. Hair-cell loss removes cochlear amplification
  and is followed by degeneration of spiral ganglion neurons, producing
  progressive, irreversible sensorineural hearing loss. Conforming disorder
  nodes substitute the disorder-specific primary lesion (stereocilia/MET gene
  defect, connexin/potassium-recycling defect, oxidative/metabolic insult, or
  ototoxic exposure) while preserving the conserved downstream chain.
category: Module
creation_date: "2026-06-06T00:00:00Z"
notes: >-
  This is a mechanism module, not a specific disease. Disorder entries reference
  individual nodes via conforms_to (e.g.,
  "sensorineural_hair_cell_loss#Hair Cell Mechanotransduction Failure and
  Death"). Conforming nodes should specialize the trigger to the disorder's
  primary lesion: hereditary nonsyndromic deafness substitutes a specific
  stereocilia/mechanotransduction gene (MYO7A, DIAPH1, etc.) or the GJB2/connexin
  26 potassium-recycling defect; presbycusis and noise-induced loss substitute
  oxidative/metabolic injury; ototoxic loss substitutes the cytotoxic drug
  (cisplatin, aminoglycoside). Cell-type substitutions: cochlear inner hair cell
  (CL:0000589) and cochlear outer hair cell (CL:0000601) where the affected
  hair-cell subtype is known; spiral ganglion / auditory neurons map to neuron
  (CL:0000540).
pathophysiology:
- name: Cochlear Sensory Epithelium Insult
  description: >-
    A primary lesion of the cochlear sensory epithelium initiates the pathway.
    Across disorders this is a hereditary defect of hair-cell stereocilia or the
    mechanotransduction apparatus (e.g., stereociliary F-actin core or
    tip-link/MET-complex genes), a defect of cochlear ionic homeostasis such as
    GJB2/connexin 26 gap-junction loss, or an acquired metabolic, noise, or
    ototoxic insult. The mechanosensitive cochlear hair cell is the vulnerable
    target, and the downstream response converges regardless of the specific
    trigger.
  role: trigger
  cell_types:
  - preferred_term: cochlear hair cell
    term:
      id: CL:0000855
      label: sensory hair cell
  biological_processes:
  - preferred_term: sensory perception of sound
    term:
      id: GO:0007605
      label: sensory perception of sound
    modifier: ABNORMAL
  - preferred_term: detection of mechanical stimulus involved in sensory perception of sound
    term:
      id: GO:0050910
      label: detection of mechanical stimulus involved in sensory perception of sound
    modifier: ABNORMAL
  evidence:
  - reference: PMID:37419105
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Mechanosensitive hair cells in the cochlea are responsible for hearing but
      are vulnerable to damage by genetic mutations and environmental insults.
    explanation: >-
      Establishes the cochlear hair cell as the shared vulnerable target injured
      by both hereditary (genetic) and acquired (environmental) insults, the
      generic trigger state for this module. Evidence source is OTHER because the
      statement summarizes background knowledge in a methods-focused report.
  - reference: PMID:34232383
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Deficiencies and mutations of stereocilia components that disturb this
      "dynamic equilibrium" in stereocilia can induce morphological changes and
      disrupt mechanotransduction causing sensorineural hearing loss
    explanation: >-
      Supports the hereditary-stereocilia branch of the trigger: defects in
      stereocilia components disrupt mechanotransduction and cause sensorineural
      hearing loss. Evidence source is OTHER because this is a review.
  downstream:
  - target: Cochlear Ionic Homeostasis Disruption and Oxidative Stress

- name: Cochlear Ionic Homeostasis Disruption and Oxidative Stress
  description: >-
    The primary insult perturbs the cochlea's tightly regulated ionic
    environment and redox balance. Gap-junction (connexin) defects interrupt the
    potassium recycling pathway that maintains the endocochlear potential, while
    noise, aging, and ototoxic injury drive excess generation of reactive oxygen
    species. Loss of potassium homeostasis and accumulating oxidative stress
    together amplify injury to the sensory hair cells before overt cell death.
  role: amplifier
  biological_processes:
  - preferred_term: potassium ion homeostasis
    term:
      id: GO:0055075
      label: potassium ion homeostasis
    modifier: DYSREGULATED
  - preferred_term: response to oxidative stress
    term:
      id: GO:0006979
      label: response to oxidative stress
    modifier: INCREASED
  evidence:
  - reference: PMID:11810458
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      It is highly probable that mutations of connexin genes that result in human
      nonsyndromic deafness cause dysfunction of cochlear gap junctions and
      thereby interrupt K+ ion recirculation pathways.
    explanation: >-
      Directly links connexin (GJB2) gap-junction defects to disrupted cochlear
      potassium recirculation, the ionic-homeostasis branch of this amplifier.
      Evidence source is OTHER because this is a review.
  - reference: PMID:23422312
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Exposure to noise is known to induce excess generation of reactive oxygen
      species (ROS) in the cochlea
    explanation: >-
      Supports the oxidative-stress branch: noise (and, in this review, aging)
      drives excess ROS generation in the cochlea. Evidence source is OTHER
      because this is a review synthesizing human and animal data.
  downstream:
  - target: Hair Cell Mechanotransduction Failure and Death

- name: Hair Cell Mechanotransduction Failure and Death
  description: >-
    Disrupted ionic homeostasis, oxidative stress, and mitochondrial and DNA
    damage cause hair-cell mechanotransduction to fail and trigger programmed
    cell death of the cochlear hair cells. Because mammalian cochlear hair cells
    do not regenerate, their apoptotic loss is the central, irreversible
    effector step that converts upstream injury into permanent sensory deficit.
  role: central_effector
  cell_types:
  - preferred_term: cochlear hair cell
    term:
      id: CL:0000855
      label: sensory hair cell
  biological_processes:
  - preferred_term: apoptotic process
    term:
      id: GO:0006915
      label: apoptotic process
    modifier: INCREASED
  evidence:
  - reference: PMID:36455457
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      After entering the hair cells, cisplatin causes hair cell death via DNA
      damage, redox system imbalance, and mitochondrial and endoplasmic
      reticulum dysfunction, culminating in programmed cell death including
      apoptosis, necroptosis, autophagic death, pyroptosis, and ferroptosis.
    explanation: >-
      Demonstrates that converging upstream injury (oxidative/redox imbalance,
      mitochondrial and DNA damage) culminates in programmed hair-cell death by
      apoptosis. Evidence source is OTHER because this is a narrative review.
  - reference: PMID:38003734
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Cisplatin causes hair cell death by forming DNA adducts, mitochondrial
      dysfunction, oxidative stress, and inflammation, culminating in programmed
      cell death by apoptosis, necroptosis, pyroptosis, or ferroptosis.
    explanation: >-
      Independent review confirms that oxidative stress and mitochondrial/DNA
      damage drive hair-cell death by apoptosis, the central effector of this
      module. Evidence source is OTHER because this is a narrative review.
  downstream:
  - target: Cochlear Amplification Loss and Spiral Ganglion Neuron Degeneration

- name: Cochlear Amplification Loss and Spiral Ganglion Neuron Degeneration
  description: >-
    Loss of hair cells and reduced endocochlear potential abolish active
    cochlear amplification, while deafferentation and ongoing injury drive
    progressive degeneration and apoptosis of the afferent spiral ganglion
    neurons that form the auditory nerve. This couples sensory-cell loss to
    failure of neural transmission of the auditory signal.
  role: effector
  cell_types:
  - preferred_term: spiral ganglion neuron
    term:
      id: CL:0000540
      label: neuron
  biological_processes:
  - preferred_term: neuron apoptotic process
    term:
      id: GO:0051402
      label: neuron apoptotic process
    modifier: INCREASED
  evidence:
  - reference: PMID:31562289
    supports: SUPPORT
    evidence_source: MODEL_ORGANISM
    snippet: >-
      We conclude that this Gjb2 mutation-induced hearing loss results from 1)
      reduced cochlear amplifier caused by lowered EP
    explanation: >-
      Knock-in mouse data tie a connexin (Gjb2) defect and lowered endocochlear
      potential to reduced cochlear amplification, the amplification-loss
      component of this node. Evidence source is MODEL_ORGANISM (knock-in mouse).
  - reference: PMID:23422312
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      The primary pathology of AHL includes the hair cells, stria vascularis, and
      afferent spiral ganglion neurons as well as the central auditory pathways.
    explanation: >-
      Establishes that afferent spiral ganglion neurons (mapped to neuron) are a
      primary site of degeneration alongside hair-cell loss in sensorineural
      hearing loss. Evidence source is OTHER because this is a review.
  downstream:
  - target: Progressive Sensorineural Hearing Loss

- name: Progressive Sensorineural Hearing Loss
  description: >-
    The combined irreversible loss of cochlear hair cells, cochlear
    amplification, and spiral ganglion neurons produces progressive,
    bilateral sensorineural hearing loss. Because the damaged cochlea does not
    regenerate, the deficit is permanent and current interventions are limited
    to prosthetic devices; this is the defining clinical consequence of the
    module.
  role: consequence
  evidence:
  - reference: PMID:38003734
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Cisplatin-induced ototoxicity manifests as irreversible, bilateral,
      high-frequency sensorineural hearing loss in 40-60% of adults and in up to
      60% of children.
    explanation: >-
      Directly characterizes the consequence as irreversible, bilateral
      sensorineural hearing loss, the named phenotype of this module. Evidence
      source is OTHER because this is a narrative review.
  - reference: PMID:38003734
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Contemporary medical interventions for cisplatin ototoxicity are limited to
      prosthetic devices, such as hearing aids, but these have significant
      limitations because the cochlea remains damaged.
    explanation: >-
      Supports the irreversibility of the consequence: because the cochlea
      remains damaged and does not regenerate, management is limited to
      prosthetics. Evidence source is OTHER because this is a review.
