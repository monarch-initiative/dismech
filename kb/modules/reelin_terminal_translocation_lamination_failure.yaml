    snippet: >-
      Here we show that the neuronal guidance cues ephrin B proteins are
      essential for Reelin signalling during the development of laminated
      structures in the brain.
    explanation: >-
      Supports ephrin-B proteins as Reelin-pathway components affecting
      laminated brain structures.
  - reference: PMID:21460838
    supports: SUPPORT
    evidence_source: MODEL_ORGANISM
    snippet: >-
      Importantly, activation of ephrin Bs can rescue the reeler neuronal
      migration defects in the absence of Reelin protein.
    explanation: >-
      Supports ephrin-B signaling as a functional modifier branch capable of
      rescuing Reelin-loss migration defects in model systems.
