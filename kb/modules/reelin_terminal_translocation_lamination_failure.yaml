    snippet: >-
      Together, our data reveal that CLASP2 is an essential Reelin effector
      orchestrating cytoskeleton dynamics during brain development.
    explanation: >-
      Supports CLASP2 as a cytoskeletal effector downstream of Reelin signaling.
  downstream:
