- name: Terminal Somal Translocation Failure
  description: >-
    Developing cortical neurons fail to complete the glia-independent terminal
    somal translocation step, often retracting or destabilizing leading
    processes after contact with the marginal zone. This failure is the central
    cellular mechanism distinguishing this module from earlier locomotion or
    microtubule-based migration arrest modules.
  role: central_effector
  locations:
  - preferred_term: cerebral cortex marginal layer
    term:
      id: UBERON:0014935
      label: cerebral cortex marginal layer
  cell_types:
  - preferred_term: migrating cerebral cortex neuron
    term:
      id: CL:0010012
      label: cerebral cortex neuron
  biological_processes:
  - preferred_term: neuron migration
    term:
      id: GO:0001764
      label: neuron migration
    modifier: DECREASED
  evidence:
  - reference: PMID:21315259
    supports: SUPPORT
    evidence_source: MODEL_ORGANISM
    snippet: >-
      Dab1, an essential component of the reelin pathway, is required in
      radially migrating neurons for glia-independent somal translocation, but
      not for glia-guided locomotion.
    explanation: >-
      Directly separates Reelin/Dab1 terminal somal translocation from
      glia-guided locomotion.
  - reference: PMID:21315259
    supports: SUPPORT
    evidence_source: MODEL_ORGANISM
    snippet: >-
      Furthermore, cell-autonomous neuronal deficits in somal translocation are
      sufficient to cause severe neocortical lamination defects.
    explanation: >-
      Shows that the translocation defect is sufficient to drive the lamination
      endpoint.
  downstream:
  - target: Cortical Lamination and Gyral Simplification

- name: Cortical Lamination and Gyral Simplification
  description: >-
    Failed terminal translocation and Reelin-pathway signaling produce
    disrupted inside-out lamination, simplified gyral patterning, pachygyria or
    lissencephaly-like cortical malformation depending on disease context and
    severity. Disease entries should instantiate the specific imaging or
    histopathologic endpoint rather than treating this module endpoint as a
    single disease.
  role: consequence
  locations:
  - preferred_term: cerebral cortex
    term:
      id: UBERON:0000956
      label: cerebral cortex
  biological_processes:
  - preferred_term: layer formation in cerebral cortex
