  evidence:
  - reference: PMID:10973257
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      LCH parallels the reeler mouse mutant (Reln(rl)), in which Reln mutations
      cause cerebellar hypoplasia, abnormal cerebral cortical neuronal migration
      and abnormal axonal connectivity.
    explanation: >-
      Links human RELN disease with the reeler mouse phenotype and cerebellar
      hypoplasia/cortical migration abnormalities.
  - reference: PMID:27000652
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      All patients had profound cerebellar hypoplasia on MRI with peculiar
      cerebellar morphology, associated with flattened pons and neocortical
      abnormalities.
    explanation: >-
      Human cohort evidence supports cerebellar and neocortical involvement in
      RELN/VLDLR pathway disorders.
  - reference: PMID:28123028
    supports: SUPPORT
    evidence_source: MODEL_ORGANISM
    snippet: >-
      A new Reln mutant with a truncation of the C-terminal region (CTR) domain
      shows that Reln mutation can cause abnormal phenotypes in the cortex and
