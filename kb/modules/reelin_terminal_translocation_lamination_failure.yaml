    term:
      id: GO:0021987
      label: cerebral cortex development
    modifier: DYSREGULATED
  evidence:
  - reference: PMID:27000652
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Patient 1 had profound motor and intellectual disability with moderate
      lissencephaly suggestive of RELN mutations and was shown to harbor a
      splicing homozygous RELN mutation.
    explanation: >-
      Human RELN-associated disease includes a lissencephaly cortical endpoint.
  - reference: PMID:27000652
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      These patients showed mild simplification or thickening of cortical
      gyration and had VLDLR mutations.
    explanation: >-
      Human VLDLR-associated disease includes simplified or thickened cortical
      gyration, supporting a milder receptor-branch endpoint.

- name: Hippocampal and Cerebellar Organization Defect
  description: >-
    Reelin-pathway disruption affects laminated structures beyond neocortex,
    especially hippocampal formation and cerebellum. Human RELN/VLDLR disease
    and mouse Reln/Vldlr/ApoER2 pathway models show recurring hippocampal and
    cerebellar abnormalities, while RELN receptor-binding hypomorphs can
    uncouple cortical/hippocampal defects from cerebellar hypoplasia.
  role: consequence
