      label: neuron migration
    modifier: DYSREGULATED
  evidence:
  - reference: PMID:21315259
    supports: SUPPORT
    evidence_source: MODEL_ORGANISM
    snippet: >-
      During migration, Dab1 acts in translocating neurons to stabilize their
      leading processes in a Rap1-dependent manner.
    explanation: >-
      Places Dab1 upstream of Rap1-dependent leading-process stabilization in
      translocating cortical neurons.
  - reference: PMID:21315259
    supports: SUPPORT
    evidence_source: MODEL_ORGANISM
    snippet: >-
      Rap1, in turn, controls cadherin function to regulate somal
      translocation.
    explanation: >-
      Links Rap1 to cadherin-dependent control of somal translocation.
  downstream:
  - target: Terminal Somal Translocation Failure

