pathophysiology:
- name: Cajal-Retzius Reelin Ligand Deficiency
  description: >-
    Pathogenic RELN variants reduce or alter the secreted Reelin cue normally
    produced by Cajal-Retzius cells in the developing cortical marginal zone.
    Loss of this ligand deprives postmitotic neurons of the extracellular
    positioning signal required for terminal translocation and inside-out
    lamination.
  role: trigger
  genes:
  - preferred_term: RELN
    term:
      id: hgnc:9957
      label: RELN
  locations:
  - preferred_term: cerebral cortex marginal layer
    term:
      id: UBERON:0014935
      label: cerebral cortex marginal layer
  cell_types:
  - preferred_term: Cajal-Retzius cell
    term:
      id: CL:0000695
      label: Cajal-Retzius cell
  biological_processes:
  - preferred_term: reelin-mediated signaling pathway
    term:
      id: GO:0038026
      label: reelin-mediated signaling pathway
    modifier: DECREASED
  evidence:
  - reference: PMID:10973257
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      An autosomal recessive form of lissencephaly (LCH) associated with severe
      abnormalities of the cerebellum, hippocampus and brainstem maps to
      chromosome 7q22, and is associated with two independent mutations in the
      human gene encoding reelin (RELN).
    explanation: >-
      Human genetics links RELN mutation to the cortical, hippocampal,
      cerebellar, and brainstem malformation pattern represented by this module.
  - reference: PMID:10973257
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      The mutations disrupt splicing of RELN cDNA, resulting in low or
      undetectable amounts of reelin protein.
    explanation: >-
      Supports ligand deficiency as a proximal trigger in human RELN-associated
      lissencephaly with cerebellar hypoplasia.
  downstream:
  - target: VLDLR-ApoER2-DAB1 Signal Transduction Failure

- name: VLDLR-ApoER2-DAB1 Signal Transduction Failure
  description: >-
    Reelin normally binds VLDLR and ApoER2/LRP8 on migrating neurons, causing
    DAB1 activation through Src-family kinase signaling. Pathogenic VLDLR loss,
    RELN receptor-binding defects, or impaired DAB1 pathway propagation reduce
    the signal that couples the extracellular Reelin cue to neuron-intrinsic
    migration and lamination effectors.
  role: central_effector
  genes:
  - preferred_term: RELN
    term:
      id: hgnc:9957
      label: RELN
  - preferred_term: VLDLR
    term:
      id: hgnc:12698
      label: VLDLR
  - preferred_term: LRP8
    term:
      id: hgnc:6700
      label: LRP8
  - preferred_term: DAB1
    term:
      id: hgnc:2661
      label: DAB1
  cell_types:
  - preferred_term: migrating cerebral cortex neuron
    term:
      id: CL:0010012
      label: cerebral cortex neuron
  biological_processes:
  - preferred_term: reelin-mediated signaling pathway
    term:
      id: GO:0038026
      label: reelin-mediated signaling pathway
    modifier: DECREASED
  evidence:
  - reference: PMID:16080122
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      A 199-kb homozygous deletion encompassing the entire very low density
      lipoprotein receptor (VLDLR) gene was present in all affected individuals.
    explanation: >-
      Human VLDLR deletion supports receptor loss as an upstream Reelin-pathway
      lesion.
  - reference: PMID:16080122
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      VLDLR is part of the reelin signaling pathway, which guides neuroblast
      migration in the cerebral cortex and cerebellum.
    explanation: >-
      Links VLDLR to Reelin-guided migration in cortex and cerebellum.
  - reference: PMID:28123028
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: >-
      A RELN-binding assay confirms that CTR truncation significantly decreases
      RELN binding to VLDLR, but not to APOER2.
    explanation: >-
      Supports a receptor-binding-specific hypomorphic branch in which altered
      RELN preferentially disrupts VLDLR interaction.
  downstream:
  - target: Rap1-Cadherin Leading Process Instability
  - target: Ephrin-B and CLASP2 Reelin Effector Branch
  - target: Hippocampal and Cerebellar Organization Defect

- name: Rap1-Cadherin Leading Process Instability
  description: >-
    Impaired DAB1 signaling reduces Rap1-dependent regulation of cadherin
    adhesion, destabilizing the leading processes of translocating cortical
    neurons. This node captures the neuron-intrinsic effector step that links
    the Reelin receptor-adaptor signal to terminal somal translocation.
  role: effector
