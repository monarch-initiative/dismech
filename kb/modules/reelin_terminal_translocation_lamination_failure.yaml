name: Reelin Terminal Translocation and Cortical Lamination Failure Module
description: >-
  A conserved malformation-of-cortical-development mechanism module in which
  loss, hypomorphic receptor binding, or mislocalized expression of Reelin
  signaling perturbs the VLDLR/ApoER2-DAB1 pathway used by postmitotic cortical
  neurons. The shared skeleton is Cajal-Retzius Reelin cue or receptor-adaptor
  failure, impaired Dab1/Rap1/cadherin and cytoskeletal effector signaling,
  defective glia-independent terminal somal translocation, and abnormal
  inside-out cortical lamination with hippocampal and cerebellar organization
  branches. This module is intended for RELN/VLDLR/LRP8/DAB1-centered
  lamination mechanisms and for carefully bounded secondary Reelin
  misexpression branches, not for broad tubulinopathy or generic lissencephaly
  lumping.
category: Module
creation_date: "2026-06-10T00:00:00Z"
notes: >-
  This is a mechanism module, not a disease entry and not a generic
  "lissencephaly" bucket. Disorder entries should conform to this module only
  when the core pathograph is Reelin pathway control of terminal somal
  translocation and cortical lamination. Primary RELN and VLDLR disease entries
  can map to the core ligand/receptor skeleton. Disease-specific entries with
  PI3K-AKT-mTOR activation should use this module only for a secondary
  AKT3-FOXG1-Reelin misexpression branch, and should otherwise conform to an
  overgrowth/mTOR module if that is the dominant skeleton. Do not use this as
  the primary skeleton for microtubule-dependent neuronal migration arrest,
  neural progenitor centrosome-spindle failure, apical neuroependyma integrity
  failure, pial basement-membrane/radial-glial endfoot failure, or
  interneuronopathy.
mechanistic_hypotheses:
- hypothesis_group_id: reelin_terminal_translocation_model
  hypothesis_label: Reelin Terminal Translocation and Lamination Model
  status: CANONICAL
  description: >-
    Reelin secreted by Cajal-Retzius cells in the marginal zone binds VLDLR and
    ApoER2/LRP8 on migrating neurons, activating DAB1 and downstream adhesion
    and cytoskeletal effectors. Failure of this signal impairs
    glia-independent somal translocation and leading-process stabilization, so
    late and early cortical neurons fail to settle in the proper inside-out
    order. The same pathway also organizes hippocampal and cerebellar
    development, explaining the recurring association of cortical lamination
    defects with hippocampal and cerebellar hypoplasia or disorganization.
  evidence:
  - reference: PMID:27445693
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Reelin is a large secreted glycoprotein that is essential for correct
      neuronal positioning during neurodevelopment and is important for
      synaptic plasticity in the mature brain.
    explanation: >-
      Review evidence summarizes Reelin as an essential secreted cue for
      neuronal positioning.
  - reference: PMID:27445693
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      In the brain, many of Reelin's functions are mediated by a molecular
      signaling cascade that involves two lipoprotein receptors, apolipoprotein
      E receptor-2 (Apoer2) and very low density-lipoprotein receptor (Vldlr),
      the neuronal phosphoprotein Disabled-1 (Dab1), and members of the Src
      family of protein tyrosine kinases as crucial elements.
    explanation: >-
      Defines the core receptor-adaptor cascade used as this module's central
      skeleton.
  - reference: PMID:21315259
    supports: SUPPORT
    evidence_source: MODEL_ORGANISM
    snippet: >-
      Thus, we define the cellular mechanism of reelin function during radial
      migration, elucidate the molecular pathway downstream of Dab1 during somal
      translocation, and establish the importance of glia-independent motility
      in neocortical development.
    explanation: >-
      Primary mouse and slice-culture experiments connect Reelin/Dab1 signaling
      to somal translocation and neocortical development.
discussions:
- discussion_id: gap_reelin_human_model_translatability
  prompt: >-
    Which parts of the RELN/VLDLR/LRP8/DAB1 terminal-translocation mechanism
    are adequately captured by mouse reeler and pathway-mutant models, and
    which require human iPSC-derived cortical organoids or organotypic human
    cortical assays to resolve human-specific progenitor, lamination, seizure,
    hippocampal, or cerebellar branches?
  kind: KNOWLEDGE_GAP
  status: OPEN
  attaches_to:
  - pathophysiology#Cajal-Retzius Reelin Ligand Deficiency
  - pathophysiology#VLDLR-ApoER2-DAB1 Signal Transduction Failure
  - pathophysiology#Terminal Somal Translocation Failure
  - pathophysiology#AKT3-FOXG1 Secondary Reelin Misexpression Branch
  rationale: >-
    The seed review treats Reelin as one of the better conserved mouse-human
    MCD mechanisms, but it also emphasizes model-system limitations across
    cortical malformation curation. This should be represented as a
    human/model mismatch knowledge gap: mouse reeler, Vldlr/Apoer2, Dab1,
    ephrin-B, and Clasp2 models can establish the core terminal-translocation
    mechanism, but human iPSC-derived cortical organoids or organotypic
    human-tissue assays may be needed to test outer-radial-glia context,
    human-specific timing, seizure-relevant circuitry, and whether
    AKT3-FOXG1-driven Reelin misexpression follows the same branch.
  evidence:
  - reference: PMID:28951247
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      We finish by describing the advantages of human in vitro cell culture
      models, to examine human-specific cells and transcripts, and further
      mention non-genetic mechanisms leading to cortical malformations.
    explanation: >-
      The seed review explicitly flags human in vitro cell models as important
      for human-specific cells and transcripts in cortical malformation
      mechanisms.
  - reference: PMID:28111201
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      However, the mouse brain is naturally lissencephalic, suggesting that
      certain aspects of cortical development may not be adequately assessed in
      mice.
    explanation: >-
      Supports capturing human/model mismatch rather than assuming mouse
      cortical migration results always transfer to human gyral and lamination
      phenotypes.
  - reference: PMID:28111201
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Recent work has uncovered critical cellular and molecular differences
      between cortical development in humans and mice, further underscoring the
      need to develop human model systems.
    explanation: >-
      Supports human iPSC/organoid follow-up as a way to resolve this
      knowledge gap.
