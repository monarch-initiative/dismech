name: Cardiac Ion-Channel Repolarization and Arrhythmogenesis Module
description: >-
  A conserved cardiac electrophysiology mechanism module for inherited
  arrhythmia syndromes (channelopathies) in structurally normal hearts.
  Pathogenic variants in cardiac ion channels or calcium-handling proteins
  shift the balance of depolarizing and repolarizing currents and disturb
  sarcoplasmic-reticulum calcium handling. This alters cardiomyocyte action
  potential duration (APD) and/or diastolic calcium, generating
  afterdepolarization-driven triggered activity (early afterdepolarizations
  from prolonged APD; delayed afterdepolarizations from calcium leak). Regional
  heterogeneity of repolarization and conduction creates an arrhythmogenic
  substrate that supports reentrant and triggered ventricular tachyarrhythmia
  (torsade de pointes, polymorphic ventricular tachycardia, ventricular
  fibrillation), clinically manifesting as syncope and sudden cardiac death. A
  parallel branch captures the same ion-channel and pacemaker machinery acting
  in the sinoatrial node, where loss of function produces bradyarrhythmia and
  sinus arrest rather than tachyarrhythmia.
category: Module
creation_date: "2026-05-30T00:00:00Z"
notes: >-
  This is a mechanism module, not a specific disease. Disorder entries reference
  individual nodes via conforms_to (for example,
  "cardiac_ion_channel_repolarization#Altered Action Potential and Calcium
  Handling"). The module is intended for inherited cardiac channelopathies and
  calcium-handling arrhythmia syndromes including Long QT syndrome, Short QT
  syndrome, Brugada syndrome, catecholaminergic polymorphic ventricular
  tachycardia (RYR2-CPVT), Timothy syndrome, torsade de pointes / short-coupled
  ventricular fibrillation, and familial sick sinus syndrome. Conforming nodes
  substitute the specific variant gene and current (e.g. KCNQ1/IKs or KCNH2/IKr
  loss of function in LQT1/LQT2, SCN5A late sodium current in LQT3, CACNA1C gain
  of function in Timothy syndrome, RYR2 calcium leak in CPVT, HCN4/SCN5A loss of
  function in sinus node dysfunction) while preserving the shared causal
  architecture. Key conformance target:
  "cardiac_ion_channel_repolarization#Arrhythmogenic Substrate and Triggered
  Activity".
mechanistic_hypotheses:
- hypothesis_group_id: repolarization_reserve_arrhythmia_model
  hypothesis_label: Repolarization-Reserve and Triggered-Activity Arrhythmia Model
  status: CANONICAL
  description: >-
    Loss or gain of repolarizing/depolarizing current, or pathological
    sarcoplasmic-reticulum calcium leak, alters cardiomyocyte action potential
    duration and diastolic calcium. The resulting early or delayed
    afterdepolarizations, amplified by regional dispersion of repolarization,
    produce triggered and reentrant ventricular tachyarrhythmia and sudden
    cardiac death.
  evidence:
  - reference: PMID:28670758
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      The inhomogeneous lengthening of the APD across the ventricular wall
      results in dispersion of APD. This together with the tendency of prolonged
      APD to be associated with oscillations at the plateau level, termed early
      afterdepolarizations (EADs), provides the substrate of ventricular
      tachyarrhythmia associated with LQTS, usually referred to as torsade de
      pointes (TdP) VT.
    explanation: >-
      Review evidence states the canonical APD-dispersion-plus-afterdepolarization
      route to ventricular tachyarrhythmia that this module generalizes across
      channelopathies.
- hypothesis_group_id: sinoatrial_automaticity_failure_model
  hypothesis_label: Sinoatrial Pacemaker Automaticity Failure Model
  status: CANONICAL
  description: >-
    The same ion-channel and pacemaker-current machinery governs sinoatrial node
    automaticity. Loss-of-function variants (for example in HCN4 or SCN5A)
    depress the pacemaker/funny current or sinoatrial conduction, producing
    bradyarrhythmia, sinus arrest, and chronotropic incompetence rather than
    ventricular tachyarrhythmia, with syncope and sudden death from
    hypoperfusion or asystole.
  evidence:
  - reference: PMID:37194974
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      SAN dysfunction (SND) can cause complex cardiac arrhythmias that can
      manifest as severe sinus bradycardia, sinus arrest, chronotropic
      incompetence and increased susceptibility to atrial fibrillation, among
      other cardiac conditions.
    explanation: >-
      Establishes the parallel sinoatrial-automaticity branch in which the same
      ion-channel machinery produces bradyarrhythmia instead of ventricular
      tachyarrhythmia.
discussions:
- discussion_id: gap_repolarization_vs_depolarization_substrate
  prompt: >-
    For phenotypes such as Brugada syndrome, is the arrhythmogenic substrate
    driven primarily by abnormal repolarization (transmural dispersion from
    heterogeneous transient-outward current) or by depolarization/conduction
    slowing in the right ventricular outflow tract, and how do these models
    apply across the channelopathy spectrum?
  kind: KNOWLEDGE_GAP
  status: OPEN
  attaches_to:
  - pathophysiology#Arrhythmogenic Substrate and Triggered Activity
  rationale: >-
    The module compresses several biophysical routes (afterdepolarization-driven
    triggered activity, repolarization dispersion, and depolarization/conduction
    slowing) into a single arrhythmogenic-substrate node. Disorder entries will
    need phenotype-specific evidence to decide which biophysical mechanism
    dominates, since the competing repolarization and depolarization hypotheses
    have different implications for risk stratification and therapy.
pathophysiology:
- name: Cardiac Ion-Channel or Calcium-Handling Variant
  description: >-
    A pathogenic germline variant alters a cardiac ion channel or
    calcium-handling protein, changing the magnitude, kinetics, or gating of a
    depolarizing or repolarizing current, or destabilizing sarcoplasmic-reticulum
    calcium release. Representative genes include the potassium channels KCNQ1
    (IKs) and KCNH2 (IKr), the cardiac sodium channel SCN5A, the L-type calcium
    channel CACNA1C, the ryanodine receptor RYR2, and the pacemaker channel
    HCN4. The variant is the upstream trigger common to inherited arrhythmia
    syndromes in structurally normal hearts.
  role: trigger
  genes:
  - preferred_term: KCNQ1
    term:
      id: hgnc:6294
      label: KCNQ1
  - preferred_term: KCNH2
    term:
      id: hgnc:6251
      label: KCNH2
  - preferred_term: SCN5A
    term:
      id: hgnc:10593
      label: SCN5A
  - preferred_term: CACNA1C
    term:
      id: hgnc:1390
      label: CACNA1C
  - preferred_term: RYR2
    term:
      id: hgnc:10484
      label: RYR2
  - preferred_term: HCN4
    term:
      id: hgnc:16882
      label: HCN4
  cell_types:
  - preferred_term: cardiomyocyte
    term:
      id: CL:0000746
      label: cardiac muscle cell
  molecular_functions:
  - preferred_term: monoatomic ion channel activity
    term:
      id: GO:0005216
      label: monoatomic ion channel activity
    modifier: ABNORMAL
  evidence:
  - reference: PMID:28670758
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Congenital as well as acquired alterations in certain cardiac ion channels
      can affect their currents in such a way as to increase the APD and hence
      the QT interval.
    explanation: >-
      Supports the ion-channel-variant trigger that perturbs cardiac currents and
      action potential duration, generalized here beyond the long QT example.
  - reference: PMID:32115705
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Catecholaminergic polymorphic ventricular tachycardia (CPVT) is a
      stress-induced cardiac channelopathy that has a high mortality in untreated
      patients.
    explanation: >-
      Confirms the channelopathy framing for the calcium-handling arm (RYR2-CPVT)
      of the module, where the variant is in a calcium-release protein rather than
      a surface ion channel.
  downstream:
  - target: Altered Action Potential and Calcium Handling
    description: >-
      The variant shifts net depolarizing/repolarizing current or
      sarcoplasmic-reticulum calcium release, changing action potential duration
      and diastolic calcium in working myocardium.
    hypothesis_groups:
    - repolarization_reserve_arrhythmia_model
  - target: Sinoatrial Node Pacemaker Dysfunction
    description: >-
      The same channel/pacemaker machinery, when loss-of-function, depresses
      sinoatrial automaticity and conduction.
    hypothesis_groups:
    - sinoatrial_automaticity_failure_model

- name: Altered Action Potential and Calcium Handling
  description: >-
    The variant shifts the balance of cardiomyocyte membrane currents and
    calcium handling. Reduced repolarizing potassium current or persistent late
    sodium current prolongs action potential duration (long QT physiology);
    enhanced repolarizing current or reduced inward calcium current shortens it
    (short QT physiology); ryanodine-receptor calcium leak raises diastolic
    cytosolic calcium. Each disturbs the action potential and intracellular
    calcium that couple excitation to contraction.
  role: central_effector
  cell_types:
  - preferred_term: cardiomyocyte
    term:
      id: CL:0000746
      label: cardiac muscle cell
  biological_processes:
  - preferred_term: membrane repolarization during cardiac muscle cell action potential
    term:
      id: GO:0086013
      label: membrane repolarization during cardiac muscle cell action potential
    modifier: DYSREGULATED
  - preferred_term: calcium ion transport
    term:
      id: GO:0006816
      label: calcium ion transport
    modifier: DYSREGULATED
  evidence:
  - reference: PMID:28670758
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      A prolonged QT interval in the surface electrocardiogram is the sine qua
      non of the LQTS and is a surrogate measure of the ventricular action
      potential duration (APD).
    explanation: >-
      Supports altered action potential duration as the central electrophysiologic
      consequence of the channel variant, with the QT interval as its surface
      surrogate.
  - reference: PMID:35222090
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      The most common cellular phenotype in CPVT is higher than normal
      cytoplasmic Ca2+ concentrations during diastole due to Ca2+ leak from the
      SR through mutant RyR2.
    explanation: >-
      Supports the calcium-handling arm: pathological sarcoplasmic-reticulum
      calcium leak elevates diastolic cytosolic calcium.
  downstream:
  - target: Arrhythmogenic Substrate and Triggered Activity
    description: >-
      Prolonged action potential favors early afterdepolarizations; diastolic
      calcium leak drives delayed afterdepolarizations via sodium-calcium
      exchange, both producing triggered beats.
    hypothesis_groups:
    - repolarization_reserve_arrhythmia_model

- name: Arrhythmogenic Substrate and Triggered Activity
  description: >-
    Disturbed repolarization and calcium handling generate afterdepolarizations:
    early afterdepolarizations (EADs) arise from oscillations during prolonged
    plateau, and delayed afterdepolarizations (DADs) arise when
    sodium-calcium-exchanger current responds to diastolic calcium release.
    Regional heterogeneity of action potential duration and conduction produces
    dispersion of repolarization, the tissue-level substrate that allows
    triggered beats to initiate and sustain reentrant ventricular arrhythmia.
  role: amplifier
  cell_types:
  - preferred_term: cardiomyocyte
    term:
      id: CL:0000746
      label: cardiac muscle cell
  biological_processes:
  - preferred_term: cardiac muscle cell action potential
    term:
      id: GO:0086001
      label: cardiac muscle cell action potential
    modifier: ABNORMAL
  - preferred_term: cardiac conduction
    term:
      id: GO:0061337
      label: cardiac conduction
    modifier: DYSREGULATED
  evidence:
  - reference: PMID:35222090
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      The Na+ influx leads to delayed after depolarizations (DADs) which trigger
      arrhythmia when reaching action potential threshold.
    explanation: >-
      Supports delayed-afterdepolarization-driven triggered activity from the
      calcium-leak arm of the substrate node.
  - reference: PMID:28670758
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      The inhomogeneous lengthening of the APD across the ventricular wall
      results in dispersion of APD.
    explanation: >-
      Supports dispersion of repolarization as the tissue-level arrhythmogenic
      substrate from the prolonged-APD arm.
  downstream:
  - target: Ventricular Tachyarrhythmia
    description: >-
      Triggered beats arising on a dispersed-repolarization substrate initiate
      reentrant and polymorphic ventricular tachyarrhythmia.
    hypothesis_groups:
    - repolarization_reserve_arrhythmia_model

- name: Ventricular Tachyarrhythmia
  description: >-
    Triggered activity and reentry on the arrhythmogenic substrate produce
    malignant ventricular tachyarrhythmia: torsade de pointes in long QT
    physiology, polymorphic or bidirectional ventricular tachycardia in
    catecholaminergic calcium-leak disorders, and ventricular fibrillation in
    short QT and Brugada physiology. These rhythms abolish effective cardiac
    output.
  role: effector
  cell_types:
  - preferred_term: cardiomyocyte
    term:
      id: CL:0000746
      label: cardiac muscle cell
  biological_processes:
  - preferred_term: cardiac conduction
    term:
      id: GO:0061337
      label: cardiac conduction
    modifier: ABNORMAL
  evidence:
  - reference: PMID:32115705
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      It is now established that the deadly arrhythmias are caused by unregulated
      'pathological' calcium release from the sarcoplasmic reticulum (SR), the
      major calcium storage organelle in striated muscle.
    explanation: >-
      Supports the link from disordered calcium handling to the lethal
      ventricular arrhythmias of the calcium-handling arm.
  downstream:
  - target: Syncope and Sudden Cardiac Death
    description: >-
      Sustained ventricular tachyarrhythmia compromises cardiac output, causing
      syncope and, if unresolved, sudden cardiac death.
    hypothesis_groups:
    - repolarization_reserve_arrhythmia_model

- name: Sinoatrial Node Pacemaker Dysfunction
  description: >-
    When the variant causes loss of function in pacemaker or conduction currents,
    the sinoatrial node fails to generate or propagate impulses normally.
    Reduced funny current (HCN4) or depressed sodium current (SCN5A) in pacemaker
    and conduction tissue produces sinus bradycardia, sinus pauses/arrest,
    sinoatrial exit block, and chronotropic incompetence — the bradyarrhythmic
    counterpart to the ventricular-tachyarrhythmia branch.
  role: effector
  genes:
  - preferred_term: HCN4
    term:
      id: hgnc:16882
      label: HCN4
  - preferred_term: SCN5A
    term:
      id: hgnc:10593
      label: SCN5A
  cell_types:
  - preferred_term: cardiac pacemaker cell of sinoatrial node
    term:
      id: CL:1000477
      label: cardiac pacemaker cell of sinoatrial node
  biological_processes:
  - preferred_term: cardiac conduction
    term:
      id: GO:0061337
      label: cardiac conduction
    modifier: DECREASED
  evidence:
  - reference: PMID:37194974
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      The sinoatrial node (SAN) is the primary pacemaker of the mammalian heart,
      initiating its electrical activation and ensuring that the heart's
      functional cardiac output meets physiological demand.
    explanation: >-
      Establishes the sinoatrial node as the pacemaker whose ion-channel-driven
      automaticity fails in this branch.
  - reference: PMID:37194974
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      SAN dysfunction (SND) can cause complex cardiac arrhythmias that can
      manifest as severe sinus bradycardia, sinus arrest, chronotropic
      incompetence and increased susceptibility to atrial fibrillation, among
      other cardiac conditions.
    explanation: >-
      Supports the bradyarrhythmic phenotypes (sinus bradycardia, sinus arrest,
      chronotropic incompetence) produced by sinoatrial node dysfunction.
  downstream:
  - target: Syncope and Sudden Cardiac Death
    description: >-
      Severe bradyarrhythmia, sinus pauses, or asystole reduce cerebral
      perfusion, causing syncope and risk of sudden death.
    causal_link_type: INDIRECT_KNOWN_INTERMEDIATES
    intermediate_mechanisms:
    - sinus bradycardia and sinus pauses
    - cerebral hypoperfusion
    hypothesis_groups:
    - sinoatrial_automaticity_failure_model

- name: Syncope and Sudden Cardiac Death
  description: >-
    Loss of effective cardiac output — from ventricular tachyarrhythmia or from
    severe bradyarrhythmia/asystole — causes transient cerebral hypoperfusion
    (syncope) and, when the rhythm does not terminate, sudden cardiac death.
    These are the shared clinical endpoints of the inherited arrhythmia
    syndromes, often the presenting or sentinel event.
  role: outcome
  evidence:
  - reference: PMID:30571592
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Background Short QT syndrome ( SQTS ) is a rare inheritable disease
      associated with sudden cardiac death.
    explanation: >-
      Human clinical evidence tying an inherited channelopathy (short QT syndrome)
      to sudden cardiac death as the module endpoint.
  - reference: PMID:32115705
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Symptoms range from palpitations to cardiac arrest, with mortality rates
      between 30 and 50% in untreated individuals by age 40
    explanation: >-
      Supports the high lethality of the arrhythmia endpoint in the
      calcium-handling arm (CPVT) when untreated.
phenotypes:
- name: Syncope
  description: >-
    Transient loss of consciousness from arrhythmia-induced cerebral
    hypoperfusion; a common sentinel symptom across the inherited arrhythmia
    syndromes covered by this module.
  phenotype_term:
    preferred_term: Syncope
    term:
      id: HP:0001279
      label: Syncope
  evidence:
  - reference: PMID:30571592
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      The clinical presentation of patients with SQTS ranges from asymptomatic,
      palpitations, syncope, dizziness, atrial fibrillation, and SCD.
    explanation: >-
      Human clinical series lists syncope among the presenting symptoms of an
      inherited channelopathy.
- name: Sudden Cardiac Death
  description: >-
    Unexpected death from a ventricular tachyarrhythmia or asystole that does
    not terminate; the shared lethal endpoint of the module and frequently the
    first manifestation of disease.
  phenotype_term:
    preferred_term: Sudden cardiac death
    term:
      id: HP:0001645
      label: Sudden cardiac death
  evidence:
  - reference: PMID:30571592
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      The risk of sudden cardiac death in SQTS families is high.
    explanation: >-
      Human clinical follow-up documents high sudden-cardiac-death risk in an
      inherited channelopathy, supporting it as the module endpoint.
