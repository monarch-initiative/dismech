name: Host-Directed Antiviral Dependency Module
description: >-
  The dependence of viruses on conserved host-cell factors, and the host-directed
  antiviral strategy that exploits it. Viruses are obligate intracellular parasites:
  every step of their life cycle co-opts host receptors, proteases, membranes,
  trafficking machinery, and metabolic pathways (host dependency factors). Because
  these factors are encoded by the comparatively stable host genome rather than the
  fast-mutating viral genome, drugs that target them offer two properties that
  direct-acting antivirals do not — broad-spectrum activity against multiple,
  unrelated viruses that share the same factor, and a higher genetic barrier to
  resistance. This module traces that logic as a causal cascade: a virus first
  depends on host factors to complete its life cycle; specific druggable host
  factors (the SARS-CoV-2 entry receptor ACE2 and the priming serine protease
  TMPRSS2 are the canonical example) are engaged; a host-directed agent blocks the
  host factor; the consequence is broad-spectrum suppression of replication; and an
  escape branch captures the two ways the strategy fails — the virus rewiring to an
  alternative host route (the Omicron shift away from TMPRSS2 toward endosomal,
  cathepsin-dependent entry) and on-target host toxicity, since the target is a host
  protein. Exemplar agents: the TMPRSS2 inhibitors camostat and nafamostat, soluble
  ACE2 receptor decoys, and host metabolic-pathway inhibitors. This is the
  host-side, broad-spectrum complement to the virus-targeted direct-acting modules
  (polymerase, protease, entry/fusion).
category: Module
creation_date: "2026-06-28T00:00:00Z"
notes: >-
  This is an antiviral drug-mechanism module structured as a biological pathway,
  not a specific disease. Its nodes are the steps of the host-dependency logic
  (viral dependence on host factors -> engagement of a specific druggable host
  factor -> host-directed blockade -> broad-spectrum suppression of replication),
  with an escape branch (host-route rewiring / tropism shift and on-target host
  toxicity). The canonical conformance / treatment target is "Host Receptor and
  Protease Engagement" — the specific druggable host factor (e.g., ACE2/TMPRSS2 for
  SARS-CoV-2). A host-directed treatment (camostat/nafamostat against TMPRSS2, a
  soluble-receptor decoy, or a host-metabolic-pathway inhibitor) points its
  target_mechanisms edge at that node. The distinguishing feature from the
  direct-acting antiviral modules is encoded in the blockade and consequence nodes:
  because the target is a conserved host factor, one agent can act across viral
  families and the virus cannot trivially mutate the target — but the escape node
  records that the virus can instead switch to an alternative host factor/route, and
  that host-protein targeting carries intrinsic cytotoxicity risk. See
  projects/ANTIVIRAL.md and projects/RESPIRATORY_INFECTIONS.md.
pathophysiology:
- name: Viral Dependence on Host Dependency Factors
  description: >-
    Viruses are obligate intracellular parasites that cannot replicate
    autonomously: every stage of the life cycle — attachment, entry, genome
    replication, translation, assembly, and egress — co-opts host-cell proteins,
    membranes, and metabolic pathways collectively called host dependency factors.
    Cell entry is the archetype: coronaviruses depend on binding of the viral spike
    glycoprotein to a cellular receptor and on priming of that spike by a host-cell
    protease. This obligate reliance on the host is the premise of the entire
    module — it is what makes a host factor, rather than a viral enzyme, a viable
    antiviral target.
  role: trigger
  biological_processes:
  - preferred_term: viral process
    term:
      id: GO:0016032
      label: viral process
  molecular_functions:
  - preferred_term: host cell surface receptor binding
    term:
      id: GO:0046789
      label: host cell surface receptor binding
  evidence:
  - reference: PMID:32142651
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: >-
      Cell entry of coronaviruses depends on binding of the viral spike (S)
      proteins to cellular receptors and on S protein priming by host cell
      proteases.
    explanation: >-
      Establishes the obligate dependence of viral entry on host-cell factors —
      both a cellular receptor and a host protease — the premise of host-directed
      antiviral targeting. Evidence source is IN_VITRO as this is a cell-culture
      entry study.
  downstream:
  - target: Host Receptor and Protease Engagement
    description: >-
      The general dependence resolves into engagement of specific, identifiable
      host factors that can be named and drugged.

- name: Host Receptor and Protease Engagement
  description: >-
    The general dependence on the host resolves into a small number of specific,
    druggable host factors. The canonical worked example is SARS-CoV-2, which uses
    the host receptor ACE2 for entry and the host serine protease TMPRSS2 to prime
    its spike protein for membrane fusion; a TMPRSS2 inhibitor already approved for
    clinical use blocks entry. This identifiability is what converts the abstract
    "viruses need the host" premise into a concrete drug target, and it is the
    canonical conformance/treatment target of the module: a host-directed agent —
    the TMPRSS2 inhibitors camostat and nafamostat, or a soluble ACE2 receptor decoy
    that competitively sequesters the spike — points at this node. Because the
    engaged factor (ACE2, TMPRSS2, or a shared metabolic enzyme) is host-encoded,
    the same node can be the target of drugs deployed against several different
    viruses.
  role: effector
  biological_processes:
  - preferred_term: virion attachment to host cell
    term:
      id: GO:0019062
      label: virion attachment to host cell
  - preferred_term: symbiont entry into host cell
    term:
      id: GO:0046718
      label: symbiont entry into host cell
  molecular_functions:
  - preferred_term: host cell surface receptor binding
    term:
      id: GO:0046789
      label: host cell surface receptor binding
  - preferred_term: serine-type endopeptidase activity (TMPRSS2 spike priming)
    term:
      id: GO:0004252
      label: serine-type endopeptidase activity
  evidence:
  - reference: PMID:32142651
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: >-
      we demonstrate that SARS-CoV-2 uses the SARS-CoV receptor ACE2 for entry and
      the serine protease TMPRSS2 for S protein priming. A TMPRSS2 inhibitor
      approved for clinical use blocked entry and might constitute a treatment
      option.
    explanation: >-
      Pins the canonical druggable host factors of the module — the ACE2 receptor
      and the TMPRSS2 protease — and shows a host-protease inhibitor blocks entry,
      the host-directed treatment action targeting this node. Evidence source is
      IN_VITRO as this is a cell-culture entry study.
  downstream:
  - target: Host-Directed Antiviral Blockade
    description: >-
      Pharmacologically blocking the engaged host factor interrupts the viral life
      cycle without targeting any viral protein.

- name: Host-Directed Antiviral Blockade
  description: >-
    Blocking a host dependency factor — rather than a viral enzyme — defines the
    host-directed antiviral strategy. Its decisive advantage follows directly from
    the target's biology: because the host factor is encoded by the comparatively
    stable host genome, the virus cannot escape by a simple point mutation in its
    own genome, so host-directed agents impose a higher genetic barrier to
    resistance than direct-acting antivirals. The same property makes a single agent
    potentially active against any virus that depends on that factor. This node is
    the therapeutic-rationale hinge of the module: the conformance/treatment edge
    sits one step upstream at the engaged host factor, but the reason to aim there
    is captured here.
  role: therapeutic_vulnerability
  biological_processes:
  - preferred_term: negative regulation of viral process
    term:
      id: GO:0048525
      label: negative regulation of viral process
  evidence:
  - reference: PMID:34416512
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Targeting the host factors rather than viral enzymes to cease viral
      infection, has emerged as an alternative antiviral strategy. This approach
      offers advantage in terms of increased threshold to viral resistance and can
      provide broad-spectrum antiviral action against different viruses.
    explanation: >-
      States the two defining advantages of host-directed blockade encoded by this
      node — an increased threshold to viral resistance and broad-spectrum activity
      across different viruses. Evidence source is OTHER as this is a review article.
  downstream:
  - target: Broad-Spectrum Suppression of Viral Replication
    description: >-
      Engaging a shared host factor suppresses replication across multiple,
      unrelated viruses.
  - target: Host-Factor Escape, Tropism Shift, and On-Target Toxicity
    description: >-
      The strategy fails when the virus rewires to an alternative host route, or
      when targeting a host protein produces host-cell toxicity.

- name: Broad-Spectrum Suppression of Viral Replication
  description: >-
    The biological output of engaging a conserved host factor is suppression of
    viral replication that, unlike a virus-specific direct-acting antiviral, can
    extend across multiple unrelated viruses sharing that factor — the broad-spectrum
    promise that makes host-directed therapeutics attractive for pandemic
    preparedness, where the next threatening virus is not known in advance. This is
    the consequence node: it sits downstream of host-factor blockade and is the
    population-level antiviral effect a host-directed agent is deployed to achieve.
  role: consequence
  biological_processes:
  - preferred_term: negative regulation of viral genome replication
    term:
      id: GO:0045071
      label: negative regulation of viral genome replication
  evidence:
  - reference: PMID:34416512
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Host-directed antiviral therapeutics might prove to be a rewarding approach in
      controlling the unprecedented spread of viral infection
    explanation: >-
      States the broad-spectrum antiviral consequence of the strategy — host-directed
      therapeutics as an approach to controlling viral spread. Evidence source is
      OTHER as this is a review article.
  downstream: []

- name: Host-Factor Escape, Tropism Shift, and On-Target Toxicity
  description: >-
    Host-directed antivirals are not escape-proof, and they carry a liability that
    direct-acting antivirals do not. First, a virus can evade the strategy not by
    mutating the drug target but by rewiring to an alternative host route: SARS-CoV-2
    Omicron inefficiently uses the surface protease TMPRSS2 and instead relies more
    on the endosomal, cathepsin-dependent entry pathway, shifting its tropism and
    blunting the rationale for a TMPRSS2 inhibitor. Second, because the target is a
    host protein with its own physiological role, host-directed agents risk on-target
    cytotoxicity or disruption of normal cell function — a constraint that must be
    weighed in clinical development. This adaptive/limitation branch off the blockade
    node encodes why a host-directed agent's effect may erode (route switching) and
    why the therapeutic window is intrinsically constrained (host toxicity).
  role: adaptive_escape
  biological_processes:
  - preferred_term: endocytosis involved in viral entry into host cell (alternative TMPRSS2-independent route)
    term:
      id: GO:0075509
      label: endocytosis involved in viral entry into host cell
  - preferred_term: response to xenobiotic stimulus
    term:
      id: GO:0009410
      label: response to xenobiotic stimulus
  evidence:
  - reference: PMID:35104837
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: >-
      the Omicron spike inefficiently uses the cellular protease TMPRSS2, which
      promotes cell entry through plasma membrane fusion, with greater dependency on
      cell entry through the endocytic pathway.
    explanation: >-
      Directly demonstrates host-route escape — Omicron shifts away from the TMPRSS2
      surface-protease route toward endosomal entry, the tropism-shift escape encoded
      by this node. Evidence source is IN_VITRO as this is a cell-culture
      pseudotyped-virus entry study.
  - reference: PMID:34416512
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      the probability of cellular side effects or cytotoxicity on host cell should
      not be ignored at the time of clinical investigations
    explanation: >-
      States the intrinsic on-target liability of host-directed agents — cellular
      side effects or cytotoxicity from targeting a host protein. Evidence source is
      OTHER as this is a review article.
