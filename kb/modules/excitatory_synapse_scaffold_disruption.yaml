name: Excitatory Synapse Scaffold Disruption Module
description: >-
  A conserved neurodevelopmental mechanism module for disorders caused by
  disruption of postsynaptic-density (PSD) scaffold and scaffold-regulatory
  proteins at glutamatergic (excitatory) synapses. Loss of a core PSD organizer
  reduces structural organization of the excitatory postsynaptic compartment,
  perturbs AMPA/NMDA glutamate-receptor localization and trafficking, and impairs
  activity-dependent synaptic plasticity. The shared path is an altered
  excitatory/inhibitory (E/I) balance and aberrant cortical or cortico-striatal
  circuit assembly that manifests as autism spectrum disorder, intellectual
  disability, and/or epilepsy. This module is intended as a narrow first
  prototype for NEUROCIPHER-style circuit pathomechanism modeling (dismech#3549);
  it is scoped to postsynaptic excitatory-scaffold genes such as SHANK3 (PSD
  scaffold) and SYNGAP1 (postsynaptic Ras-GAP that maintains PSD architecture and
  AMPA-receptor trafficking), with DLG4/PSD-95 as a further candidate. It
  intentionally excludes presynaptic active-zone genes, inhibitory-interneuron
  channelopathies (e.g. SCN1A), and neuronal subtype-specification/migration
  disorders, which belong in separate circuit modules.
category: Module
creation_date: "2026-05-30T00:00:00Z"
notes: >-
  This is a mechanism module, not a specific disease. Disorder entries should
  reference individual nodes via conforms_to using
  "excitatory_synapse_scaffold_disruption#<Node Name>". The generic cell type is
  glutamatergic neuron (CL:0000679); conforming entries substitute the
  disease-relevant subtype (e.g. cortical pyramidal neuron, medium spiny neuron).
  Module evidence reuses PMIDs already curated and cached in the conforming
  disorder entries; it is illustrative of the abstracted pattern rather than an
  exhaustive citation set. Circuit-level (anatomical location, synapse type,
  connectivity direction) claims are deliberately kept generic here and flagged
  as a knowledge gap pending schema follow-up.
pathophysiology:
- name: Postsynaptic Scaffold Disruption
  description: >-
    The proximal molecular lesion: loss of function (typically
    haploinsufficiency) of a postsynaptic-density scaffold or scaffold-regulatory
    protein at glutamatergic synapses. These proteins organize the PSD and
    couple membrane glutamate receptors (NMDA, AMPA) to downstream signaling and
    the actin cytoskeleton. Conforming entries substitute the disease gene and
    its specific molecular role (structural scaffold for SHANK3; postsynaptic
    Ras-GAP that maintains PSD organization for SYNGAP1).
  role: trigger
  cell_types:
  - preferred_term: Glutamatergic neuron
    term:
      id: CL:0000679
      label: glutamatergic neuron
  biological_processes:
  - preferred_term: Synapse assembly
    term:
      id: GO:0007416
      label: synapse assembly
  - preferred_term: Glutamate receptor signaling pathway
    term:
      id: GO:0007215
      label: glutamate receptor signaling pathway
  examples:
  - SHANK3
  - SYNGAP1
  - DLG4
  evidence:
  - reference: PMID:22670140
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Almost all of these deletions include the gene SHANK3 which encodes a scaffold protein in the postsynaptic densities of excitatory synapses, connecting membrane-bound receptors to the actin cytoskeleton."
    explanation: Establishes the postsynaptic-scaffold framing for SHANK3, the prototype gene for this module's trigger node.
  - reference: PMID:42161154
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "SYNGAP1-related disorder (SRD) is a monogenic synaptopathy caused"
    explanation: SYNGAP1-related disorder is framed as a monogenic synaptopathy, a second conforming example of postsynaptic-scaffold disruption.
  downstream:
  - target: Excitatory Postsynaptic Structural Deficit
    description: Loss of the PSD organizer degrades excitatory postsynaptic structure and receptor organization.
- name: Excitatory Postsynaptic Structural Deficit
  description: >-
    Disruption of the scaffold reduces structural organization and maturation of
    the excitatory postsynaptic compartment: fewer structurally mature
    glutamatergic synapses, destabilized PSD architecture, and impaired
    localization or trafficking of AMPA/NMDA-type glutamate receptors.
  role: central_effector
  cell_types:
  - preferred_term: Glutamatergic neuron
    term:
      id: CL:0000679
      label: glutamatergic neuron
  biological_processes:
  - preferred_term: Synapse assembly
    term:
      id: GO:0007416
      label: synapse assembly
    modifier: DECREASED
  - preferred_term: Postsynaptic density assembly
    term:
      id: GO:0097107
      label: postsynaptic density assembly
    modifier: DECREASED
  downstream:
  - target: Impaired Synaptic Plasticity and Excitatory-Inhibitory Imbalance
    description: Reduced excitatory synaptic structure lowers excitatory output and disrupts the E/I set point.
- name: Impaired Synaptic Plasticity and Excitatory-Inhibitory Imbalance
  description: >-
    Reduced excitatory glutamatergic transmission and impaired activity-dependent
    plasticity shift the balance between excitation and inhibition. In some
    genotypes the structural deficit selectively reduces excitatory (not
    inhibitory) transmission; in others, dysregulated signaling locks synaptic
    plasticity into an abnormal state. The shared consequence is an altered E/I
    balance at the synaptic level.
  role: central_effector
  cell_types:
  - preferred_term: Glutamatergic neuron
    term:
      id: CL:0000679
      label: glutamatergic neuron
  biological_processes:
  - preferred_term: Synaptic transmission, glutamatergic
    term:
      id: GO:0035249
      label: synaptic transmission, glutamatergic
    modifier: DECREASED
  - preferred_term: Regulation of synaptic plasticity
    term:
      id: GO:0048167
      label: regulation of synaptic plasticity
    modifier: DECREASED
  evidence:
  - reference: PMID:24132240
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: "We show that PMDS neurons have reduced SHANK3 expression and major defects in excitatory, but not inhibitory, synaptic transmission."
    explanation: Human iPSC-derived neurons show selective excitatory (not inhibitory) synaptic deficits, the cellular signature of E/I imbalance in this module.
  downstream:
  - target: Circuit-Level Dysfunction
    description: Synaptic-level E/I imbalance and plasticity deficits propagate to aberrant circuit assembly and dynamics.
- name: Circuit-Level Dysfunction
  description: >-
    Synaptic deficits aggregate into circuit-level pathology: aberrant cortical
    or cortico-striatal circuit assembly, abnormal connectivity and oscillatory
    dynamics, and network-level hyper- or hypo-excitability. The specific circuit
    and anatomical locus are disease-dependent (e.g. cortico-striatal circuits in
    SHANK3 models; cortical circuit consolidation in SYNGAP1).
  role: consequence
  cell_types:
  - preferred_term: Glutamatergic neuron
    term:
      id: CL:0000679
      label: glutamatergic neuron
  biological_processes:
  - preferred_term: Regulation of synaptic plasticity
    term:
      id: GO:0048167
      label: regulation of synaptic plasticity
    modifier: DECREASED
  evidence:
  - reference: PMID:21423165
    supports: SUPPORT
    evidence_source: MODEL_ORGANISM
    snippet: "Cellular, electrophysiological and biochemical analyses uncovered defects at striatal synapses and cortico-striatal circuits in Shank3 mutant mice."
    explanation: Shank3 mutant mice show cortico-striatal circuit defects, illustrating progression from synaptic scaffold loss to circuit-level dysfunction.
  downstream:
  - target: Neurodevelopmental Phenotypic Output
    description: Circuit dysfunction manifests as the neurodevelopmental and neuropsychiatric phenotype.
- name: Neurodevelopmental Phenotypic Output
  description: >-
    The clinical convergence point: excitatory-synapse scaffold disruption
    produces a neurodevelopmental phenotype spanning autism spectrum disorder,
    intellectual disability, developmental delay, and/or epilepsy. The relative
    weighting of features is genotype- and circuit-dependent.
  role: consequence
  cell_types:
  - preferred_term: Glutamatergic neuron
    term:
      id: CL:0000679
      label: glutamatergic neuron
discussions:
- discussion_id: gap_circuit_anatomy_synapse_type
  prompt: >-
    What first-class schema slots are needed to capture circuit-level specificity
    for excitatory-synapse scaffold disorders: anatomical location and projection
    target of the affected circuit, synapse neurotransmitter type, and the
    direction of connectivity perturbation (E to I versus I to E, feedforward
    versus feedback)?
  kind: KNOWLEDGE_GAP
  status: OPEN
  attaches_to:
  - pathophysiology#Impaired Synaptic Plasticity and Excitatory-Inhibitory Imbalance
  - pathophysiology#Circuit-Level Dysfunction
  rationale: >-
    The current dismech pathophysiology node captures cell_types and
    biological_processes but has no first-class slot for anatomical location
    (e.g. cortico-striatal versus hippocampal), synapse neurotransmitter type
    (glutamatergic versus GABAergic), or connectivity direction. Circuit
    pathomechanism modeling for NEUROCIPHER needs these distinctions; until the
    schema provides them, circuit specificity is described only in free-text
    node descriptions. This gap should be filed as a schema follow-up issue
    rather than worked around in YAML.
