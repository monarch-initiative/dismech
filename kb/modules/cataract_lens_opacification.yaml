name: Lens Opacification (Cataract) Module
description: >-
  A conserved lens pathophysiology module representing the final common pathway
  by which heterogeneous insults converge on crystallin aggregation, light
  scattering, and loss of lens transparency. The initiating lesion varies across
  age-related (cumulative oxidation and post-translational modification),
  metabolic (diabetic and galactosemic polyol/osmotic and oxidative stress), and
  congenital/genetic (crystallin and other lens-protein gene defects) cataracts,
  but the downstream sequence repeatedly converges on loss of crystallin
  solubility and chaperone capacity, deposition of high-molecular-weight protein
  aggregates, increased light scatter, and visible lens opacity (Cataract,
  HP:0000518 / MONDO:0005129). Conforming disorder entries declare conformance
  via conforms_to on their pathophysiology nodes, substituting the
  disorder-specific initiating insult (e.g., aldose reductase polyol flux in
  diabetic cataract, a CRYAA/CRYAB/CRYGD variant in congenital cataract,
  cumulative UV and oxidation in age-related cataract) while preserving the
  conserved crystallin-aggregation causal chain.
category: Module
creation_date: "2026-06-06T00:00:00Z"
notes: >-
  This is a mechanism module, not a specific disease. Disorder entries reference
  individual nodes via conforms_to (e.g.,
  "cataract_lens_opacification#Crystallin Aggregation and High-Molecular-Weight
  Complex Deposition"). The module defines the expected pathophysiology
  structure; conforming nodes in disorder files should include the corresponding
  cell types, biological processes, and causal edges, specialized to their
  etiologic context. Key disorder-specific substitutions: diabetic/galactosemic
  cataract substitutes aldose reductase polyol-pathway osmotic and oxidative
  stress at the trigger node; congenital cataract substitutes a specific
  crystallin or membrane-protein gene defect; age-related cataract substitutes
  cumulative oxidation and post-translational modification of long-lived nuclear
  crystallins.
pathophysiology:
- name: Lens Homeostasis Insult
  description: >-
    A primary insult perturbs the protein-rich, organelle-free homeostasis of
    the lens. The insult differs by etiology: oxidative stress (age-related, UV),
    polyol-pathway-driven osmotic and oxidative stress (diabetic and
    galactosemic cataract), or an inherited crystallin/lens-protein gene defect
    (congenital cataract). Across these, lens epithelial and fiber cells lose the
    ability to maintain the low-oxygen, antioxidant-protected microenvironment on
    which crystallin solubility depends.
  role: trigger
  cell_types:
  - preferred_term: lens fiber cell
    term:
      id: CL:0011004
      label: lens fiber cell
  - preferred_term: lens epithelial cell
    term:
      id: CL:0002224
      label: lens epithelial cell
  biological_processes:
  - preferred_term: response to oxidative stress
    term:
      id: GO:0006979
      label: response to oxidative stress
    modifier: INCREASED
  evidence:
  - reference: PMID:35508906
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Exposure to these factors leads to the damage and death of lens
      epithelium, which allows oxygen to penetrate into the lens through the gaps
      in the epithelial layer and cause oxidative damage to crystallins,
      resulting in protein denaturation, aggregation, and formation of
      multilamellar bodies (the main cause of lens opacification).
    explanation: >-
      Review proposes a common cataractogenesis mechanism for diverse
      cataractogenic factors (age, radiation, UV, diabetes), beginning with
      damage to the lens epithelium and loss of protective homeostasis. Evidence
      source is OTHER because this is a review synthesizing multiple study types.
  - reference: PMID:12874437
    supports: SUPPORT
    evidence_source: MODEL_ORGANISM
    snippet: >-
      AR-induced osmotic stress seems to be the cause of diabetic cataract,
      whereas AR-induced oxidative stress is probably the cause of neuronal
      dysfunction.
    explanation: >-
      Transgenic mouse data establish the polyol pathway (aldose reductase,
      AR) as the etiology-specific insult in diabetic cataract, illustrating how
      a metabolic trigger feeds the same downstream lens-opacification chain.
      Evidence source is MODEL_ORGANISM because the conclusion rests on
      transgenic and knockout mouse experiments.
  downstream:
  - target: Loss of Crystallin Solubility and Chaperone Capacity

- name: Loss of Crystallin Solubility and Chaperone Capacity
  description: >-
    The insult drives oxidation, glycation, and other post-translational
    modification of the long-lived crystallins, reducing their conformational
    stability and exhausting the chaperone-like protective activity of
    alpha-crystallin. As native folding is lost and the small heat-shock
    chaperone capacity of alpha-crystallin is overwhelmed, soluble crystallins
    become prone to misfolding and aggregation. This amplification step is shared
    across age-related, metabolic, and genetic cataract.
  role: amplifier
  cell_types:
  - preferred_term: lens fiber cell
    term:
      id: CL:0011004
      label: lens fiber cell
  biological_processes:
  - preferred_term: protein folding
    term:
      id: GO:0006457
      label: protein folding
    modifier: DECREASED
  - preferred_term: response to oxidative stress
    term:
      id: GO:0006979
      label: response to oxidative stress
    modifier: INCREASED
  evidence:
  - reference: PMID:35508906
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      On the other hand, the ability of crystallins to accumulate age-associated
      post-translational modifications, which reduce the resistance of lens
      proteins to oxidative stress, is an important factor contributing to the
      cataract formation.
    explanation: >-
      Review directly links accumulated post-translational modification of
      crystallins and their reduced resistance to oxidative stress to
      cataractogenesis, the core of this amplifier step. Evidence source is
      OTHER because this is a review.
  - reference: PMID:25988654
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      chronic hyperglycemia induces the glycation and phosphorylation of
      crystallins, mainly α-crystallins and thereby alters their properties.
    explanation: >-
      Review establishes that hyperglycemia-driven glycation and
      phosphorylation alter alpha-crystallin properties (including its
      chaperone-like function), supporting loss of crystallin chaperone capacity
      as a conserved amplifier. Evidence source is OTHER because this is a
      review synthesizing multiple study types.
  downstream:
  - target: Crystallin Aggregation and High-Molecular-Weight Complex Deposition

- name: Crystallin Aggregation and High-Molecular-Weight Complex Deposition
  description: >-
    Destabilized, modified crystallins undergo conformational change and
    aggregate into large, insoluble high-molecular-weight protein complexes.
    These aggregates disrupt the short-range-ordered packing of crystallins that
    normally keeps the densely protein-filled lens cytosol transparent. This is
    the central effector step that converts molecular damage into a
    transparency-disrupting supramolecular lesion, conserved across cataract
    etiologies.
  role: central_effector
  cell_types:
  - preferred_term: lens fiber cell
    term:
      id: CL:0011004
      label: lens fiber cell
  biological_processes:
  - preferred_term: protein-containing complex assembly
    term:
      id: GO:0065003
      label: protein-containing complex assembly
    modifier: INCREASED
  - preferred_term: protein homooligomerization
    term:
      id: GO:0051260
      label: protein homooligomerization
    modifier: INCREASED
  evidence:
  - reference: PMID:36617712
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      The oxidative stress is directly involved in modifications of the
      crystallin proteins leading to the formation of high molecular weight
      aggregates and then the subsequent opacification of the lens, known as
      cataracts.
    explanation: >-
      Review directly identifies formation of high-molecular-weight crystallin
      aggregates as the step that leads to lens opacification, the central
      effector of this module. Evidence source is OTHER because this is a review.
  - reference: PMID:21402586
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      the steady accumulation of chromophores and complex, insoluble crystallin
      aggregates in the lens nucleus leads to the formation of a brown nuclear
      cataract.
    explanation: >-
      Review of the ageing lens directly links accumulation of insoluble
      crystallin aggregates to nuclear cataract formation. Evidence source is
      OTHER because this is a review.
  downstream:
  - target: Loss of Lens Refractive Transparency and Light Scattering

- name: Loss of Lens Refractive Transparency and Light Scattering
  description: >-
    Lens transparency depends on short-range-order interactions between densely
    packed crystallins and on refractive-index matching between membranes and
    cytosol. Aggregated high-molecular-weight protein complexes create local
    refractive-index fluctuations large enough to scatter incident light,
    degrading the sharply focused image projected onto the retina. Increased
    light scatter is the optical consequence of the molecular aggregation step.
  role: effector
  cell_types:
  - preferred_term: lens fiber cell
    term:
      id: CL:0011004
      label: lens fiber cell
  evidence:
  - reference: PMID:21402584
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Despite the presence of remarkably high levels of protein, the lens
      cytosol remains transparent as a result of short-range-order interactions
      between the proteins.
    explanation: >-
      Review establishes that lens transparency depends on short-range-order
      interactions between crystallins; disruption of this packing by aggregates
      is the structural basis for increased light scatter. Evidence source is
      OTHER because this is a review.
  - reference: PMID:21402586
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      With ageing, lens proteins undergo non-enzymatic, post-translational
      modification and the accumulation of fluorescent chromophores, increasing
      susceptibility to oxidation and cross-linking and increased light-scatter.
    explanation: >-
      Review directly connects crystallin modification and cross-linking to
      increased light scatter in the lens, the optical effector of this module.
      Evidence source is OTHER because this is a review.
  downstream:
  - target: Cataract

- name: Cataract
  description: >-
    The accumulated light scatter manifests as a visible opacity in the lens
    substance. When the opacity involves the visual axis, it degrades the
    retinal image and produces visual loss. Cataract is the convergent clinical
    consequence of the module, regardless of whether the initiating insult was
    age-related, metabolic, or genetic; it is the most frequent cause of
    reversible blindness worldwide.
  role: consequence
  biological_processes:
  - preferred_term: visual perception
    term:
      id: GO:0007601
      label: visual perception
    modifier: DECREASED
  evidence:
  - reference: PMID:21402586
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Cataract is a visible opacity in the lens substance, which, when located
      on the visual axis, leads to visual loss.
    explanation: >-
      Review provides the defining clinical statement of cataract as a visible
      lens opacity producing visual loss, the consequence node of this module.
      Evidence source is OTHER because this is a review.
  - reference: PMID:36617712
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Some conformational changes and the subsequent aggregation of crystallins
      lead to loss of transparency in the lens and are the beginning of
      cataracts, which is the most frequent cause of reversible blindness in the
      world.
    explanation: >-
      Review ties crystallin aggregation and loss of lens transparency directly
      to cataract as the most frequent cause of reversible blindness, anchoring
      the consequence node to the upstream chain. Evidence source is OTHER
      because this is a review.
