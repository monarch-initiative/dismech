name: Meiotic Prophase Failure Module
description: >-
  A conserved mechanism module for inherited gametogenic failure caused by
  disruption of meiotic prophase I chromosome synapsis and recombination. In
  affected germ cells, programmed meiotic chromosome events fail at homolog
  pairing, synaptonemal complex assembly, homologous-recombination repair of
  DNA double-strand breaks, or pachytene checkpoint resolution. The shared path
  is meiotic arrest with germ-cell apoptosis, producing sex-dimorphic clinical
  outcomes: ovarian follicle depletion and primary ovarian insufficiency in
  46,XX individuals, and spermatogenic arrest with non-obstructive azoospermia
  or Sertoli-cell-only syndrome in 46,XY individuals. This module is intended
  for meiotic genes such as SYCE1, MCM8, MCM9, STAG3, HFM1, MSH4, MSH5, DMC1,
  and SYCP3. It intentionally excludes upstream gonadal organogenesis and
  steroidogenic transcription-factor disorders such as NR5A1, WT1, SOX9, SRY,
  FOXL2, and DHH.
category: Module
creation_date: "2026-05-28T02:00:27Z"
notes: >-
  This is a mechanism module, not a specific disease. Disorder entries should
  reference individual nodes via conforms_to using
  "meiotic_prophase_failure#<Node Name>". The module defines a provisional
  research scaffold for genes that disrupt meiotic prophase after gonadal
  organogenesis has occurred. Somatic DNA-repair and cancer-predisposition
  branches are gene-specific, especially for MCM8 and MCM9, and should not be
  required for every conforming disorder.
pathophysiology:
- name: Meiotic Prophase I Entry and Homolog Pairing
  description: >-
    Germ cells enter the meiotic cell cycle and initiate prophase I chromosome
    pairing. This node captures the shared upstream context for module genes:
    the gonad is present, germ cells enter meiosis, and homologous chromosomes
    must pair before synapsis and recombination can be completed.
  role: trigger
  cell_types:
  - preferred_term: germ cell
    term:
      id: CL:0000586
      label: germ cell
  biological_processes:
  - preferred_term: meiotic cell cycle
    term:
      id: GO:0051321
      label: meiotic cell cycle
  - preferred_term: homologous chromosome pairing at meiosis
    term:
      id: GO:0007129
      label: homologous chromosome pairing at meiosis
  downstream:
  - target: Synaptonemal Complex Assembly
  - target: Homologous Recombination Repair of Meiotic DNA Breaks

- name: Synaptonemal Complex Assembly
  description: >-
    Synaptonemal complex components assemble between paired homologous
    chromosomes during meiotic prophase I. Disruption of central or lateral
    element proteins such as SYCE1 or SYCP3 produces asynapsis or unstable
    synapsis, preventing normal progression through pachytene.
  role: central_effector
  cell_types:
  - preferred_term: germ cell
    term:
      id: CL:0000586
      label: germ cell
  biological_processes:
  - preferred_term: synaptonemal complex assembly
    term:
      id: GO:0007130
      label: synaptonemal complex assembly
    modifier: DECREASED
  examples:
  - SYCE1
  - SYCP3
  - TEX12
  downstream:
  - target: Pachytene Checkpoint Arrest and Germ Cell Apoptosis

- name: Homologous Recombination Repair of Meiotic DNA Breaks
  description: >-
    Programmed and repair-associated DNA breaks in meiotic prophase require
    homologous-recombination machinery to complete chromosome pairing,
    crossover formation, and genome integrity surveillance. Disruption of
    repair factors such as MCM8, MCM9, DMC1, HFM1, MSH4, or MSH5 leaves
    meiotic DNA damage unresolved and blocks normal pachytene progression.
  role: central_effector
  cell_types:
  - preferred_term: germ cell
    term:
      id: CL:0000586
      label: germ cell
  biological_processes:
  - preferred_term: double-strand break repair via homologous recombination
    term:
      id: GO:0000724
      label: double-strand break repair via homologous recombination
    modifier: DECREASED
  - preferred_term: DNA double-strand break processing
    term:
      id: GO:0000729
      label: DNA double-strand break processing
    modifier: DECREASED
  examples:
  - MCM8
  - MCM9
  - DMC1
  - HFM1
  - MSH4
  - MSH5
  downstream:
  - target: Pachytene Checkpoint Arrest and Germ Cell Apoptosis
  - target: Somatic DNA Repair Deficiency and Cancer Predisposition

- name: Pachytene Checkpoint Arrest and Germ Cell Apoptosis
  description: >-
    Failed synapsis or unresolved meiotic recombination activates pachytene
    checkpoint signaling. Instead of completing meiotic prophase and producing
    functional gametes, affected germ cells arrest and are eliminated by
    apoptosis.
  role: consequence
  cell_types:
  - preferred_term: germ cell
    term:
      id: CL:0000586
      label: germ cell
  biological_processes:
  - preferred_term: meiotic recombination checkpoint signaling
    term:
      id: GO:0051598
      label: meiotic recombination checkpoint signaling
    modifier: INCREASED
  - preferred_term: apoptotic process
    term:
      id: GO:0006915
      label: apoptotic process
    modifier: INCREASED
  downstream:
  - target: Ovarian Follicle Depletion and Primary Ovarian Insufficiency
  - target: Spermatogenic Arrest and Non-Obstructive Azoospermia

- name: Ovarian Follicle Depletion and Primary Ovarian Insufficiency
  description: >-
    In 46,XX individuals, loss of oocytes during fetal or early postnatal
    meiotic progression depletes the ovarian follicle pool. The clinical
    manifestation is primary ovarian insufficiency, ovarian dysgenesis, primary
    amenorrhea, or hypergonadotropic hypogonadism depending on ascertainment
    and residual ovarian reserve.
  role: consequence
  cell_types:
  - preferred_term: oocyte
    term:
      id: CL:0000023
      label: oocyte
  biological_processes:
  - preferred_term: female gamete generation
    term:
      id: GO:0007292
      label: female gamete generation
    modifier: DECREASED

- name: Spermatogenic Arrest and Non-Obstructive Azoospermia
  description: >-
    In 46,XY individuals, meiotic prophase failure in spermatocytes produces
    spermatogenic arrest, often observed clinically as non-obstructive
    azoospermia, maturation arrest, or Sertoli-cell-only syndrome after germ
    cell depletion.
  role: consequence
  cell_types:
  - preferred_term: spermatocyte
    term:
      id: CL:0000017
      label: spermatocyte
  biological_processes:
  - preferred_term: male gamete generation
    term:
      id: GO:0048232
      label: male gamete generation
    modifier: DECREASED

- name: Somatic DNA Repair Deficiency and Cancer Predisposition
  description: >-
    A gene-specific branch for module genes that also function in mitotic or
    somatic DNA repair. MCM8 and MCM9 are the main current examples: biallelic
    variants may combine meiotic prophase failure with germ-cell tumors or
    gastrointestinal polyposis and early-onset malignancy. This branch should be
    used only when gene-specific evidence supports a somatic cancer phenotype.
  role: gene_specific_consequence
  biological_processes:
  - preferred_term: double-strand break repair via homologous recombination
    term:
      id: GO:0000724
      label: double-strand break repair via homologous recombination
    modifier: DECREASED
  examples:
  - MCM8
  - MCM9
