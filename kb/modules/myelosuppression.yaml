name: Myelosuppression Module
description: >-
  A conserved treatment-toxicity module representing the final common pathway by
  which cytotoxic insults to the bone marrow produce multilineage cytopenias and
  their clinical sequelae. The initiating insult varies — cytotoxic chemotherapy
  (fluoropyrimidines, platinums, topoisomerase inhibitors, alkylators), ionizing
  radiation, and other antiproliferative exposures — but the downstream sequence
  repeatedly converges on damage to proliferating hematopoietic stem and
  progenitor cells, suppression of marrow output, peripheral neutropenia/anemia/
  thrombocytopenia, and the dose-limiting complications (infection, fatigue,
  bleeding) that follow. This is a "side effect as mechanism" module: it captures
  the conserved adverse-drug-reaction pathophysiology shared across many culprit
  drugs, so individual drug-toxicity entries (e.g. a chemotherapy-induced
  cytopenia entry) can declare conformance rather than re-deriving the chain.
category: Module
creation_date: "2026-06-24T00:00:00Z"
notes: >-
  This is a mechanism module, not a specific disease. Disorder entries reference
  individual nodes via conforms_to (e.g.,
  "myelosuppression#Multilineage Peripheral Cytopenias"). Conforming nodes should
  substitute the disorder-specific cytotoxic driver (the particular antineoplastic
  agent or radiation exposure) and may specialize the cytopenia node to a
  predominant lineage (e.g. irinotecan/neutropenia-predominant, carboplatin/
  thrombocytopenia-predominant) while preserving the conserved
  HSPC-injury → marrow-suppression → cytopenia → complication chain. The key
  conformance / consequence target is
  "myelosuppression#Multilineage Peripheral Cytopenias".
pathophysiology:
- name: Cytotoxic Insult to Proliferating Hematopoietic Progenitors
  description: >-
    The conserved initiating lesion is cytotoxic damage to the rapidly dividing
    hematopoietic stem and progenitor cells (HSPCs) of the bone marrow. Because
    antiproliferative chemotherapy and radiation are not selective for tumor
    cells, the highly proliferative marrow compartment is collaterally injured,
    triggering progenitor apoptosis and cell-cycle arrest regardless of the
    specific agent involved.
  role: trigger
  cell_types:
  - preferred_term: hematopoietic stem cell
    term:
      id: CL:0000037
      label: hematopoietic stem cell
  - preferred_term: hematopoietic progenitor cell
    term:
      id: CL:0008001
      label: hematopoietic precursor cell
  biological_processes:
  - preferred_term: apoptotic process
    term:
      id: GO:0006915
      label: apoptotic process
    modifier: INCREASED
  evidence:
  - reference: PMID:34307165
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Proliferating hematopoietic stem and progenitor cells (HSPCs) in the bone
      marrow are particularly susceptible to chemotherapy-induced damage.
    explanation: >-
      Establishes the conserved initiating lesion of this module — that
      proliferating marrow HSPCs are the cells preferentially injured by
      cytotoxic chemotherapy. Evidence source is OTHER because this is a review
      article.
  - reference: PMID:34307165
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Chemotherapy-induced damage of hematopoietic stem and progenitor cells
      (HPSCs) often results in myelosuppression that adversely affects patient
      health and quality of life
    explanation: >-
      Directly links HSPC damage to myelosuppression as the downstream
      consequence captured by this module. Evidence source is OTHER because this
      is a review article.
  - reference: PMID:31504118
    supports: SUPPORT
    evidence_source: MODEL_ORGANISM
    snippet: >-
      trilaciclib transiently maintains HSPC in G1 arrest and protects them from
      chemotherapy damage, leading to faster hematopoietic recovery and enhanced
      antitumor immunity
    explanation: >-
      Preclinical (animal-model) evidence that holding HSPCs out of cycle
      protects them from chemotherapy, confirming that the proliferative state of
      progenitors is what makes them vulnerable — the mechanistic basis of this
      trigger node.
  downstream:
  - target: Bone Marrow Hematopoietic Suppression
    description: >-
      Progenitor injury and apoptosis reduce the marrow's capacity to sustain
      hematopoiesis.
- name: Bone Marrow Hematopoietic Suppression
  description: >-
    Loss of functional progenitors and acute injury to marrow cellularity and
    the supporting vascular niche suppress hematopoietic output. This is the
    central effector step: the marrow can no longer replace circulating blood
    cells at the normal rate, and the deficit becomes the dose-limiting toxicity
    of the cytotoxic regimen.
  role: central_effector
  cell_types:
  - preferred_term: hematopoietic stem cell
    term:
      id: CL:0000037
      label: hematopoietic stem cell
  biological_processes:
  - preferred_term: hemopoiesis
    term:
      id: GO:0030097
      label: hemopoiesis
    modifier: DECREASED
  evidence:
  - reference: PMID:40057216
    supports: SUPPORT
    evidence_source: MODEL_ORGANISM
    snippet: >-
      The resultant bone marrow suppression is a major dose-limiting side effect.
    explanation: >-
      Identifies marrow suppression as the dose-limiting consequence of
      chemotherapy-induced hematopoietic toxicity, the central effector step of
      this module. Evidence source is MODEL_ORGANISM because the mechanism is
      established in a mouse 5-fluorouracil study.
  - reference: PMID:40057216
    supports: SUPPORT
    evidence_source: MODEL_ORGANISM
    snippet: >-
      A single injection of 5-FU did not alter mouse bone structure but caused
      acute damage to bone marrow cellularity and vasculature.
    explanation: >-
      Shows that a representative cytotoxic agent acutely damages marrow
      cellularity and the vascular niche, the injury that suppresses
      hematopoietic output. Evidence source is MODEL_ORGANISM (mouse model).
  downstream:
  - target: Multilineage Peripheral Cytopenias
    description: >-
      Reduced marrow output lowers the numbers of mature blood cells released to
      the periphery across multiple lineages.
- name: Multilineage Peripheral Cytopenias
  description: >-
    Suppressed marrow output reduces the mature blood cells reaching the
    circulation, producing the multilineage cytopenias that define
    myelosuppression: neutropenia, anemia, and thrombocytopenia (with lymphopenia
    in some regimens). This is the key conformance target of the module;
    conforming disorder nodes may specialize it to the lineage that predominates
    for a given agent.
  role: effector
  cell_types:
  - preferred_term: neutrophil
    term:
      id: CL:0000775
      label: neutrophil
  - preferred_term: erythrocyte
    term:
      id: CL:0000232
      label: erythrocyte
  - preferred_term: platelet
    term:
      id: CL:0000233
      label: platelet
  biological_processes:
  - preferred_term: myeloid cell homeostasis
    term:
      id: GO:0002262
      label: myeloid cell homeostasis
    modifier: DECREASED
  evidence:
  - reference: PMID:34307165
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      one of the most common side effects of chemotherapy is myelosuppression,
      which typically manifests as neutropenia, anemia, thrombocytopenia, and/or
      lymphopenia
    explanation: >-
      Directly enumerates the multilineage cytopenias that constitute this
      effector node. Evidence source is OTHER because this is a review article.
  - reference: PMID:31504118
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Chemotherapy-induced damage of hematopoietic stem and progenitor cells
      (HSPC) causes multi-lineage myelosuppression.
    explanation: >-
      A human clinical trial frames chemotherapy-induced HSPC damage as the cause
      of multilineage myelosuppression, supporting the convergence onto this
      effector node.
  - reference: PMID:38587388
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      anemia (decreased red blood cells) and thrombocytopenia (decreased
      platelets)
    explanation: >-
      Decomposes myelosuppression into peripheral cytopenias mapped to their
      cell lineages (red cells, platelets). Evidence source is OTHER because this
      is a review article.
  downstream:
  - target: Cytopenia-Related Clinical Complications
    description: >-
      Each cytopenia drives its characteristic clinical complication.
- name: Cytopenia-Related Clinical Complications
  description: >-
    The peripheral cytopenias produce the clinical morbidity that makes
    myelosuppression dose-limiting: neutropenia raises infection risk and febrile
    neutropenia, anemia causes fatigue, and thrombocytopenia causes bleeding.
    These complications drive chemotherapy dose delays and reductions, which can
    in turn compromise antitumor efficacy.
  role: consequence
  cell_types:
  - preferred_term: neutrophil
    term:
      id: CL:0000775
      label: neutrophil
  biological_processes:
  - preferred_term: leukocyte mediated immunity
    term:
      id: GO:0002443
      label: leukocyte mediated immunity
    modifier: DECREASED
  evidence:
  - reference: PMID:21095116
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Chemotherapy-induced neutropenia is a major risk factor for
      infection-related morbidity and mortality and also a significant
      dose-limiting toxicity in cancer treatment.
    explanation: >-
      Establishes neutropenia as the driver of infection-related morbidity and as
      the dose-limiting toxicity, the defining consequence of this module.
      Evidence source is OTHER because this is a guideline/expert-consensus
      document.
  - reference: PMID:38587388
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Neutropenia increases infection risk, and anemia frequently results in
      debilitating fatigue.
    explanation: >-
      Maps two of the cytopenias to their characteristic complications
      (infection, fatigue). Evidence source is OTHER because this is a review
      article.
  - reference: PMID:38587388
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      the bleeding risk associated with thrombocytopenia can lead to fear and
      anxiety
    explanation: >-
      Maps thrombocytopenia to its characteristic bleeding complication.
      Evidence source is OTHER because this is a review article.
phenotypes:
- name: Neutropenia
  description: >-
    Reduced circulating neutrophil count, the cytopenia most directly responsible
    for the infection risk that makes myelosuppression dose-limiting.
  phenotype_term:
    preferred_term: Neutropenia
    term:
      id: HP:0001875
      label: Decreased total neutrophil count
  evidence:
  - reference: PMID:34307165
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      one of the most common side effects of chemotherapy is myelosuppression,
      which typically manifests as neutropenia, anemia, thrombocytopenia, and/or
      lymphopenia
    explanation: >-
      Lists neutropenia among the defining manifestations of chemotherapy-induced
      myelosuppression. Evidence source is OTHER because this is a review.
- name: Anemia
  description: >-
    Reduced red blood cell mass producing fatigue, frequently reported by
    patients as the most draining symptom of chemotherapy.
  phenotype_term:
    preferred_term: Anemia
    term:
      id: HP:0001903
      label: Anemia
  evidence:
  - reference: PMID:34307165
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      one of the most common side effects of chemotherapy is myelosuppression,
      which typically manifests as neutropenia, anemia, thrombocytopenia, and/or
      lymphopenia
    explanation: >-
      Lists anemia among the defining manifestations of chemotherapy-induced
      myelosuppression. Evidence source is OTHER because this is a review.
- name: Thrombocytopenia
  description: >-
    Reduced circulating platelet count producing increased bleeding risk.
  phenotype_term:
    preferred_term: Thrombocytopenia
    term:
      id: HP:0001873
      label: Thrombocytopenia
  evidence:
  - reference: PMID:34307165
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      one of the most common side effects of chemotherapy is myelosuppression,
      which typically manifests as neutropenia, anemia, thrombocytopenia, and/or
      lymphopenia
    explanation: >-
      Lists thrombocytopenia among the defining manifestations of
      chemotherapy-induced myelosuppression. Evidence source is OTHER because
      this is a review.
- name: Recurrent infections
  description: >-
    Increased susceptibility to infection downstream of neutropenia, including
    febrile neutropenia, the principal driver of myelosuppression-related
    morbidity and mortality.
  phenotype_term:
    preferred_term: Increased susceptibility to infection
    term:
      id: HP:0002719
      label: Recurrent infections
  evidence:
  - reference: PMID:21095116
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Chemotherapy-induced neutropenia is a major risk factor for
      infection-related morbidity and mortality and also a significant
      dose-limiting toxicity in cancer treatment.
    explanation: >-
      Establishes infection-related morbidity and mortality as the principal
      complication of chemotherapy-induced neutropenia. Evidence source is OTHER
      because this is a guideline document.
