name: Drug-Induced Liver Injury Module
description: >-
  A conserved treatment-toxicity module representing the final common pathway by
  which hepatotoxic drugs injure and kill hepatocytes. The culprit agent and the
  proximal trigger vary — dose-dependent reactive-metabolite formation (the
  acetaminophen/NAPQI archetype), bile salt export pump (BSEP) inhibition and
  cholestatic stress, or idiosyncratic immune-mediated injury — but the downstream
  sequence repeatedly converges on mitochondrial dysfunction and oxidative stress,
  hepatocyte cell death (necrosis and apoptosis), sterile/immune inflammatory
  amplification, and clinically apparent liver injury that can progress to acute
  liver failure. This is a "side effect as mechanism" module: it captures the
  adverse-drug-reaction pathophysiology shared across many hepatotoxic drugs, so a
  drug-toxicity entry can declare conformance rather than re-deriving the chain.
category: Module
creation_date: "2026-06-24T00:00:00Z"
notes: >-
  This is a mechanism module, not a specific disease. Disorder entries reference
  individual nodes via conforms_to (e.g.,
  "drug_induced_liver_injury#Hepatocyte Cell Death"). Conforming nodes should
  substitute the disorder-specific hepatotoxic driver (the particular drug and its
  proximal mechanism — reactive metabolite, BSEP inhibition, or immune-mediated
  idiosyncratic injury) while preserving the conserved
  metabolite/stress → mitochondrial dysfunction → hepatocyte death → inflammation
  → liver injury chain. The key conformance / central-effector target is
  "drug_induced_liver_injury#Hepatocyte Cell Death".
pathophysiology:
- name: Reactive Drug Metabolite Formation and Hepatocellular Stress
  description: >-
    The conserved initiating lesion is hepatic handling of the drug producing a
    proximal toxic stimulus: bioactivation to a reactive metabolite (the
    acetaminophen → NAPQI archetype), inhibition of the bile salt export pump with
    cholestatic accumulation, or covalent/oxidative stress on hepatocyte
    macromolecules. Hepatocytes, the principal site of xenobiotic metabolism, bear
    the brunt of this stress regardless of the specific drug.
  role: trigger
  cell_types:
  - preferred_term: hepatocyte
    term:
      id: CL:0000182
      label: hepatocyte
  biological_processes:
  - preferred_term: xenobiotic metabolic process
    term:
      id: GO:0006805
      label: xenobiotic metabolic process
    modifier: INCREASED
  evidence:
  - reference: PMID:36670547
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      APAP-induced hepatotoxicity (AIH) is mainly caused by the toxic metabolite
      N-acetyl-p-benzoquinone imine (NAPQI)
    explanation: >-
      Establishes reactive-metabolite formation (the archetypal NAPQI mechanism)
      as the proximal trigger of hepatotoxicity captured by this node. Evidence
      source is OTHER because this is a review article.
  - reference: PMID:32511920
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      In vitro assays to assess inhibition of the bile salt export pump (BSEP),
      mitotoxicity, reactive metabolite (RM) formation, and hepatocyte
      cytolethality
    explanation: >-
      Enumerates the conserved proximal DILI mechanisms — BSEP inhibition,
      mitotoxicity, and reactive-metabolite formation — that this insult-agnostic
      trigger node represents. Evidence source is OTHER because this is a review.
  downstream:
  - target: Mitochondrial Dysfunction and Oxidative Stress
    description: >-
      Reactive metabolites and cholestatic stress converge on mitochondrial
      injury and oxidant production.
- name: Mitochondrial Dysfunction and Oxidative Stress
  description: >-
    Reactive metabolites and accumulated bile acids damage mitochondria, the
    organelle most central to hepatocyte bioenergetics, producing oxidative
    stress, impaired ATP synthesis, and mitochondrial permeability transition.
    This is the major amplifying event linking the proximal drug stress to
    hepatocyte death across hepatotoxic agents.
  role: amplifier
  cell_types:
  - preferred_term: hepatocyte
    term:
      id: CL:0000182
      label: hepatocyte
  cellular_components:
  - preferred_term: mitochondrion
    term:
      id: GO:0005739
      label: mitochondrion
  biological_processes:
  - preferred_term: response to oxidative stress
    term:
      id: GO:0006979
      label: response to oxidative stress
    modifier: INCREASED
  evidence:
  - reference: PMID:36670547
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Mitochondrial oxidative stress and dysfunction are the major cellular events
      associated with APAP-induced liver injury.
    explanation: >-
      Identifies mitochondrial oxidative stress and dysfunction as the major
      cellular events driving hepatotoxic injury, the amplifier step of this
      module. Evidence source is OTHER because this is a review article.
  - reference: PMID:34485975
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Hepatocytes are highly metabolic cells which have abundant mitochondria
      suggesting a biologically relevant role for mitochondrial dynamics in
      hepatocyte injury and recovery.
    explanation: >-
      Establishes the central role of mitochondria in hepatocyte injury and
      recovery, supporting mitochondrial dysfunction as a conserved DILI
      mechanism. Evidence source is OTHER because this is a review article.
  downstream:
  - target: Hepatocyte Cell Death
    description: >-
      Mitochondrial failure and oxidative stress precipitate hepatocyte necrosis
      and apoptosis.
- name: Hepatocyte Cell Death
  description: >-
    Mitochondrial failure and oxidative stress precipitate hepatocyte death by
    necrosis and apoptosis. This is the central effector step and the most common
    manifestation of DILI; conforming disorder nodes substitute the
    drug-specific upstream driver but converge here. It is the key conformance
    target of the module.
  role: central_effector
  cell_types:
  - preferred_term: hepatocyte
    term:
      id: CL:0000182
      label: hepatocyte
  biological_processes:
  - preferred_term: cell death
    term:
      id: GO:0008219
      label: cell death
    modifier: INCREASED
  - preferred_term: apoptotic process
    term:
      id: GO:0006915
      label: apoptotic process
    modifier: INCREASED
  evidence:
  - reference: PMID:24099014
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      the most common manifestation is hepatocyte death following drug intake
    explanation: >-
      Directly identifies hepatocyte death as the most common manifestation of
      DILI, the central effector step of this module. Evidence source is OTHER
      because this is a review article.
  - reference: PMID:35024303
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      the critical roles of drug metabolism, mitochondrial dysfunction, necrotic
      cell death, autophagy and the sterile inflammatory response
    explanation: >-
      Names necrotic cell death (alongside mitochondrial dysfunction and
      inflammation) as a critical mechanism of hepatotoxicity, supporting the
      necrosis/apoptosis effector captured here. Evidence source is OTHER because
      this is a review article.
  downstream:
  - target: Sterile and Immune-Mediated Inflammatory Amplification
    description: >-
      Hepatocyte death releases damage-associated signals that recruit and
      activate inflammatory cells.
  - target: Liver Injury and Acute Liver Failure
    description: >-
      Loss of hepatocyte mass produces clinically apparent liver injury.
- name: Sterile and Immune-Mediated Inflammatory Amplification
  description: >-
    Dying hepatocytes release damage-associated molecular patterns that drive a
    sterile inflammatory response; in idiosyncratic DILI, innate and adaptive
    immune activation (death-ligand signaling, HLA-restricted responses) further
    propagates injury. Inflammation amplifies and extends the hepatocellular
    death initiated upstream.
  role: amplifier
  cell_types:
  - preferred_term: hepatocyte
    term:
      id: CL:0000182
      label: hepatocyte
  biological_processes:
  - preferred_term: inflammatory response
    term:
      id: GO:0006954
      label: inflammatory response
    modifier: INCREASED
  evidence:
  - reference: PMID:24099014
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      The fundamental process in DILI is the death of hepatocytes (in some
      circumstances, cholangiocytes or endothelial cells) in the background or
      recruitment of inflammation.
    explanation: >-
      States that hepatocyte death in DILI occurs against a background of, or with
      recruitment of, inflammation — the amplification step of this module.
      Evidence source is OTHER because this is a review article.
  - reference: PMID:24099014
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      how a drug or its metabolites initiate and propagate cell death within the
      liver with the assistance of surrounding immune cells
    explanation: >-
      Frames immune cells as propagators of drug-induced hepatocyte death,
      supporting the inflammatory amplification node. Evidence source is OTHER
      because this is a review article.
  downstream:
  - target: Liver Injury and Acute Liver Failure
    description: >-
      Sustained inflammatory injury extends hepatocyte loss toward clinical liver
      failure.
- name: Liver Injury and Acute Liver Failure
  description: >-
    Accumulated hepatocyte loss and inflammation produce clinically apparent liver
    injury, manifesting as a hepatocellular, cholestatic, or mixed biochemical
    pattern, and in severe cases progressing to acute liver failure — the most
    feared consequence of DILI and a leading cause of drug attrition.
  role: consequence
  cell_types:
  - preferred_term: hepatocyte
    term:
      id: CL:0000182
      label: hepatocyte
  biological_processes:
  - preferred_term: cell death
    term:
      id: GO:0008219
      label: cell death
    modifier: INCREASED
  evidence:
  - reference: PMID:24099014
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      DILI manifests clinically with hepatocellular injury, cholestasis or a
      mixture of both.
    explanation: >-
      Defines the clinical injury patterns (hepatocellular, cholestatic, mixed)
      that constitute the consequence of this module. Evidence source is OTHER
      because this is a review article.
  - reference: PMID:24099014
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Acetaminophen (APAP) alone accounts for the half of the overall cases of
      acute liver failure in USA
    explanation: >-
      Documents progression to acute liver failure (acetaminophen being the
      leading cause in the USA), the severe endpoint of this module. Evidence
      source is OTHER because this is a review article.
  - reference: PMID:32511920
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      drug-induced liver injury (DILI) is a leading cause of preclinical and
      clinical drug terminations
    explanation: >-
      Establishes the clinical and translational significance of DILI as a
      leading cause of drug terminations. Evidence source is OTHER because this is
      a review article.
phenotypes:
- name: Elevated hepatic transaminases
  description: >-
    Biochemical hepatocellular injury pattern (transaminase elevation) reflecting
    hepatocyte death and membrane disruption.
  phenotype_term:
    preferred_term: Elevated hepatic transaminases
    term:
      id: HP:0002910
      label: Elevated circulating hepatic transaminase concentration
  evidence:
  - reference: PMID:24099014
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      DILI manifests clinically with hepatocellular injury, cholestasis or a
      mixture of both.
    explanation: >-
      The hepatocellular injury pattern of DILI corresponds to transaminase
      elevation. Evidence source is OTHER because this is a review article.
- name: Cholestasis
  description: >-
    Cholestatic injury pattern from impaired bile flow, one of the recognized DILI
    biochemical presentations.
  phenotype_term:
    preferred_term: Cholestasis
    term:
      id: HP:0001396
      label: Cholestasis
  evidence:
  - reference: PMID:24099014
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      DILI manifests clinically with hepatocellular injury, cholestasis or a
      mixture of both.
    explanation: >-
      Names cholestasis as one of the defining clinical injury patterns of DILI.
      Evidence source is OTHER because this is a review article.
- name: Acute liver failure
  description: >-
    The severe end of the DILI spectrum, in which massive hepatocyte loss causes
    failure of synthetic and detoxifying liver function.
  phenotype_term:
    preferred_term: Acute liver failure
    term:
      id: HP:0001399
      label: Hepatic failure
  evidence:
  - reference: PMID:24099014
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Acetaminophen (APAP) alone accounts for the half of the overall cases of
      acute liver failure in USA
    explanation: >-
      Documents acute liver failure as the severe consequence of DILI, with
      acetaminophen the leading cause in the USA. Evidence source is OTHER because
      this is a review article.
