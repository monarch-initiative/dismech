name: Viral Oncogenesis Module
description: >-
  A conserved mechanism module for virus-induced cancer (viral carcinogenesis),
  the enabling characteristic shared by the human tumor viruses. Roughly 10-15%
  of human cancers worldwide have a viral etiology. The conserved causal chain
  runs from persistent infection by an oncogenic virus, through deregulated
  expression of viral oncoproteins (frequently accompanied by incidental
  integration of viral DNA into the host genome), to inactivation of the core
  host tumor-suppressor axes (p53 and the RB/p16 cell-cycle brake) and hijacking
  of proliferative/survival signaling, producing genomic instability and
  deregulated proliferation that culminate in malignant transformation years to
  decades after the initial infection. Individual disorder entries declare
  conformance via conforms_to, substituting the virus-specific oncoprotein(s):
  high-risk HPV E6 (p53 degradation) and E7 (RB inactivation); EBV LMP1/EBNA;
  hepatitis B virus HBx; HTLV-1 Tax/HBZ; Merkel cell polyomavirus large T
  antigen (RB); and KSHV/HHV-8 LANA/vCyclin/vFLIP. This module captures the
  DIRECT viral-oncoprotein arm and is deliberately complementary to
  tumor_promoting_inflammation (the chronic-inflammation-to-cancer arm, e.g.
  viral hepatitis) and to the host-genetic hallmark modules
  (evading_growth_suppressors, genome_instability_mutation,
  enabling_replicative_immortality), which many viral cancers ALSO conform to.
category: Module
creation_date: "2026-07-01T00:00:00Z"
notes: >-
  This is a mechanism module, not a specific disease. Disorder entries reference
  individual nodes via conforms_to (e.g., "viral_oncogenesis#Host Tumor
  Suppressor Inactivation and Signaling Hijack"). The module defines the expected
  pathophysiology structure; conforming nodes in disorder files should include
  the corresponding biological processes and causal edges, specialized to their
  virus/tumor context. Key virus-specific substitutions: HPV E6/E7 (p53/RB);
  EBV LMP1/EBNA; HBV HBx; HTLV-1 Tax/HBZ; Merkel cell polyomavirus large T
  antigen; KSHV LANA/vCyclin/vFLIP. The chronic-inflammation route to viral
  cancer (e.g. HBV/HCV-driven hepatocellular carcinoma) is modeled separately in
  tumor_promoting_inflammation, and the adaptive immune-evasion arm in
  immune_checkpoint_blockade. Key conformance target:
  "viral_oncogenesis#Host Tumor Suppressor Inactivation and Signaling Hijack".
pathophysiology:
- name: Persistent Oncogenic Virus Infection
  description: >-
    Long-term persistence of an oncogenic virus establishes a reservoir of
    infected cells and is the necessary first step of viral carcinogenesis. Only
    a minority of persistently infected individuals ever progress to cancer, and
    malignancy typically emerges years to decades after the initial infection.
    Substitutions include high-risk HPV, Epstein-Barr virus, hepatitis B/C virus,
    HTLV-1, Merkel cell polyomavirus, and Kaposi sarcoma-associated herpesvirus.
  role: trigger
  biological_processes:
  - preferred_term: Viral latency and persistence
    term:
      id: GO:0019042
      label: viral latency
    modifier: INCREASED
  evidence:
  - reference: PMID:25340830
    reference_title: "Viral carcinogenesis: factors inducing DNA damage and virus integration."
    supports: SUPPORT
    evidence_source: OTHER
    snippet: "Viruses are the causative agents of 10%-15% of human cancers worldwide."
    explanation: >-
      Establishes viral infection as the etiologic trigger for a substantial
      fraction of human cancers. Evidence source is OTHER because this is a review.
  - reference: PMID:25340830
    reference_title: "Viral carcinogenesis: factors inducing DNA damage and virus integration."
    supports: SUPPORT
    evidence_source: OTHER
    snippet: "Typically, cancer develops years to decades following the initial infection."
    explanation: >-
      Supports the long latency between persistent infection and malignant
      transformation that characterizes viral oncogenesis.
  downstream:
  - target: Viral Oncoprotein Expression and Genome Integration

- name: Viral Oncoprotein Expression and Genome Integration
  description: >-
    Deregulated expression of the virus's oncoproteins is the molecular engine of
    transformation. For several DNA tumor viruses (HPV, HBV, Merkel cell
    polyomavirus) this is frequently accompanied by incidental integration of
    viral DNA into the host genome; integration is not required for viral
    replication but, by targeting fragile sites and disrupting both viral gene
    regulation and host loci, it stabilizes oncoprotein expression, activates
    proto-oncogenes, and seeds genomic instability. Conforming entries substitute
    the virus-specific oncoprotein (e.g., HPV E6/E7 driven by loss of E2
    repression on integration).
  role: central_effector
  biological_processes:
  - preferred_term: Viral genome integration into host DNA
    term:
      id: GO:0044826
      label: viral genome integration into host DNA
    modifier: INCREASED
  evidence:
  - reference: PMID:25340830
    reference_title: "Viral carcinogenesis: factors inducing DNA damage and virus integration."
    supports: SUPPORT
    evidence_source: OTHER
    snippet: "integration of viral DNA into the human genome can also play an important role in promoting tumor development for"
    explanation: >-
      Supports viral genome integration as a contributor to tumor development for
      several oncogenic viruses.
  - reference: PMID:40699151
    reference_title: "Genome integration of human DNA oncoviruses."
    supports: SUPPORT
    evidence_source: OTHER
    snippet: "This process often targets fragile sites in the human genome, causing structural rearrangements that disrupt genes, activate proto-oncogenes, and increase genomic instability, all contributing to tumorigenesis."
    explanation: >-
      Details how incidental oncovirus integration disrupts host genes, activates
      proto-oncogenes, and drives genomic instability.
  downstream:
  - target: Host Tumor Suppressor Inactivation and Signaling Hijack

- name: Host Tumor Suppressor Inactivation and Signaling Hijack
  description: >-
    The conserved central node of the module: virus-encoded oncoproteins
    inactivate the core host tumor-suppressor axes - p53 and the RB/p16-CDK
    cell-cycle brake - and constitutively activate host proliferative and
    survival signaling. The archetype is high-risk HPV, whose E6 drives p53
    degradation and whose E7 inactivates RB to force G1/S transit; EBV LMP1
    mimics constitutive CD40/NF-kB signaling, HBx perturbs p53, HTLV-1 Tax
    activates NF-kB, and Merkel cell polyomavirus large T antigen binds RB. The
    net effect is override of cell-cycle checkpoints and apoptosis in the
    infected cell.
  role: central_effector
  biological_processes:
  - preferred_term: Perturbation of host G1/S cell-cycle checkpoint
    term:
      id: GO:0039645
      label: symbiont-mediated perturbation of host cell cycle G1/S transition checkpoint
    modifier: INCREASED
  - preferred_term: Deregulated cell proliferation
    term:
      id: GO:0008284
      label: positive regulation of cell population proliferation
    modifier: INCREASED
  evidence:
  - reference: PMID:25340830
    reference_title: "Viral carcinogenesis: factors inducing DNA damage and virus integration."
    supports: SUPPORT
    evidence_source: OTHER
    snippet: "the majority of DNA oncogenic viruses encode oncogenes that transform infected cells, frequently by targeting p53 and pRB."
    explanation: >-
      Directly supports the conserved mechanism of viral oncoprotein-mediated
      inactivation of the p53 and RB tumor-suppressor axes.
  - reference: PMID:40216282
    reference_title: "Novel therapeutic strategies for targeting E6 and E7 oncoproteins in cervical cancer."
    supports: SUPPORT
    evidence_source: OTHER
    snippet: "The E6 protein causes degradation of p53 leading to impaired cellular stress response. In contrast, the E7 protein impairs the activity of retinoblastoma protein (pRb) resulting in continuous cell cycle propagation."
    explanation: >-
      Provides the worked HPV archetype (E6-p53, E7-RB) of the conserved
      tumor-suppressor-inactivation node. Evidence source is OTHER because this
      is a review article.
  downstream:
  - target: Genomic Instability and Deregulated Proliferation

- name: Genomic Instability and Deregulated Proliferation
  description: >-
    Loss of p53/RB control, together with virus-induced replication stress and
    integration-associated DNA breakage, produces chromosomal instability and an
    accumulation of mutations and DNA damage in the infected clone. This mutator
    state - often combined with virally driven replicative immortality (e.g. HPV
    E6-induced hTERT/telomerase reactivation) - permits progressive clonal
    evolution toward malignancy.
  role: consequence
  biological_processes:
  - preferred_term: DNA damage and genomic instability
    term:
      id: GO:0006974
      label: DNA damage response
    modifier: INCREASED
  evidence:
  - reference: PMID:25340830
    reference_title: "Viral carcinogenesis: factors inducing DNA damage and virus integration."
    supports: SUPPORT
    evidence_source: OTHER
    snippet: "The most common outcome for virus-induced reprogramming is genomic instability, including accumulation of mutations, aberrations and DNA damage."
    explanation: >-
      Establishes genomic instability as the dominant consequence of viral
      oncogenic reprogramming.
  downstream:
  - target: Malignant Transformation

- name: Malignant Transformation
  description: >-
    Accumulated hits in the virally initiated, genomically unstable clone
    culminate in invasive malignancy. Tumors of infectious origin represent
    roughly 13% of human cancers globally, with HPV, HBV, and EBV accounting for
    the majority. Virus/tumor-type-specific outcomes substituted by conforming
    entries include HPV-driven cervical/anogenital/oropharyngeal carcinoma,
    EBV-driven lymphomas and nasopharyngeal/gastric carcinoma, HBV/HCV-driven
    hepatocellular carcinoma, HTLV-1-driven adult T-cell leukemia/lymphoma,
    Merkel cell polyomavirus-driven Merkel cell carcinoma, and KSHV-driven
    Kaposi sarcoma.
  role: outcome
  cell_types:
  - preferred_term: Transformed (neoplastic) cell
    term:
      id: CL:0001063
      label: neoplastic cell
  evidence:
  - reference: PMID:40699151
    reference_title: "Genome integration of human DNA oncoviruses."
    supports: SUPPORT
    evidence_source: OTHER
    snippet: "Tumors of infectious origin globally represent 13%."
    explanation: >-
      Supports the overall contribution of infectious (largely viral) etiology to
      human cancer, the terminal outcome of this module.
