name: BBSome Trafficking Module
description: >-
  A conserved pathophysiology module representing the molecular machine that the
  "BBSome-opathies" share: assembly and membrane-coupled trafficking of the
  BBSome, an obligate eight-subunit complex that escorts signaling receptors and
  other cargo into and out of the primary cilium. The module is deliberately
  scoped to the BBSome machine itself - its core subunits (BBS1, BBS2, BBS4,
  BBS5, BBS7, TTC8/BBS8, BBS9, BBIP1/BBS18), its chaperonin-like assembly factors
  (MKKS/BBS6, BBS10, BBS12), and its dedicated operators ARL6/BBS3 (the
  membrane-recruiting GTPase) and LZTFL1/BBS17 (a trafficking regulator) - and
  NOT the broader ciliary infrastructure (general IFT-B trains, transition-zone
  and basal-body proteins) that the wider ciliopathy spectrum also uses. Those
  belong to the ciliopathy_dysfunction module. Conforming disorder entries
  (e.g. Bardet-Biedl syndrome, McKusick-Kaufman syndrome, and BBSome-machine
  non-syndromic retinitis pigmentosa) declare conformance on their proximal
  pathophysiology nodes and then attach disorder-specific downstream organ
  branches: a disease differs from its siblings chiefly in WHICH cilia-dependent
  organ branches cross the clinical threshold.
category: Module
creation_date: "2026-06-14T00:00:00Z"
notes: >-
  This is a mechanism module, not a specific disease. Disorder entries reference
  individual nodes via conforms_to (e.g.,
  "bbsome_trafficking#BBSome-Dependent Ciliary Cargo Trafficking Failure").
  Scope discipline: this module covers the BBSome machine plus its dedicated
  operators (ARL6, LZTFL1, and the BBSome-recycling GTPase IFT27). General IFT-B
  particle subunits (IFT74, IFT172), transition-zone proteins (CEP290, MKS1,
  SDCCAG8, NPHP1) and basal-body/other ciliary proteins are shared
  infrastructure and are modeled in the ciliopathy_dysfunction module, even
  though variants in those genes also cause the Bardet-Biedl syndrome phenotype.
  A disease may conform to both modules: its BBSome-core nodes conform here while
  its transition-zone node conforms to ciliopathy_dysfunction.
pathophysiology:
- name: BBSome Subunit Deficiency
  description: >-
    The initiating lesion in this arm is a biallelic loss-of-function variant in
    a core BBSome subunit gene (BBS1, BBS2, BBS4, BBS5, BBS7, TTC8/BBS8, BBS9, or
    BBIP1/BBS18). Because the assembled complex is obligate and highly
    interconnected, loss of any one subunit destabilizes the whole BBSome.
    Conforming entries substitute the disorder-specific subunit gene.
  role: trigger
  cellular_components:
  - preferred_term: BBSome
    term:
      id: GO:0034464
      label: BBSome
  evidence:
  - reference: PMID:22072986
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: >-
      We also show that all BBSome subunits and BBS3 (also known as ARL6) are
      required for BBSome ciliary entry
    explanation: >-
      Establishes that the full set of core subunits is required for BBSome
      ciliary entry, so loss of any subunit gene compromises the complex.
  downstream:
  - target: Defective BBSome Assembly
    description: Loss of an obligate subunit prevents formation of a stable, functional BBSome.
- name: BBS Chaperonin Assembly Defect
  description: >-
    The initiating lesion in this arm is a biallelic variant in one of the
    chaperonin-like BBS genes (MKKS/BBS6, BBS10, BBS12). These three proteins
    form a CCT/TRiC-associated BBS-chaperonin complex required to fold and
    assemble the BBSome from its subunits; their loss prevents the complex from
    being built even when subunit genes are intact. Conforming entries substitute
    the disorder-specific chaperonin gene.
  role: trigger
  evidence:
  - reference: PMID:22500027
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: >-
      Three additional BBS genes (BBS6, BBS10, and BBS12) have homology to type
      II chaperonins and interact with CCT/TRiC proteins and BBS7 to form a
      complex termed the BBS-chaperonin complex. This complex is required for
      BBSome assembly.
    explanation: >-
      Directly identifies the chaperonin-like BBS genes as the BBSome assembly
      machinery, establishing this gene class as a distinct trigger arm.
  - reference: PMID:20080638
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: >-
      Our data demonstrate that BBS6, BBS10, and BBS12 are necessary for BBSome
      assembly, and that impaired BBSome assembly contributes to the etiology of
      BBS phenotypes associated with the loss of function of these three BBS
      genes.
    explanation: >-
      Independently confirms that loss of the chaperonin-like BBS genes impairs
      BBSome assembly and drives BBS phenotypes.
  downstream:
  - target: Defective BBSome Assembly
    description: Without the BBS-chaperonin complex, subunits cannot be folded and assembled into the BBSome.
- name: Defective BBSome Assembly
  description: >-
    Convergence node: loss of an obligate subunit (subunit arm) or of the
    chaperonin assembly machinery (chaperonin arm) prevents formation of a
    stable, functional BBSome. The native complex is highly interconnected and
    obligate, so partial complexes are non-functional.
  cellular_components:
  - preferred_term: BBSome
    term:
      id: GO:0034464
      label: BBSome
  - preferred_term: primary cilium
    term:
      id: GO:0005929
      label: cilium
  evidence:
  - reference: PMID:31303482
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: >-
      We find that BBSome subunits have a very high degree of interconnectivity,
      explaining the obligate nature of the complex.
    explanation: >-
      The native-BBSome structure shows the subunits are highly interconnected
      and the complex is obligate, so loss of subunits or assembly factors yields
      a non-functional BBSome.
  downstream:
  - target: BBSome-Dependent Ciliary Cargo Trafficking Failure
    description: An unassembled or unstable BBSome cannot traffic ciliary cargo.
- name: BBSome Membrane Recruitment and Retrograde IFT Coupling
  description: >-
    Independent trigger arm acting on an intact BBSome. The ARF-like GTPase
    ARL6/BBS3 recruits the autoinhibited BBSome to the ciliary membrane, where
    the regulator LZTFL1/BBS17 tunes its trafficking and the BBSome couples to
    retrograde intraflagellar transport (IFT) trains for ciliary exit of cargo.
    The general IFT-B machinery is shared infrastructure (modeled in
    ciliopathy_dysfunction); here it is the train the BBSome boards. Loss of
    ARL6, LZTFL1, or the BBSome-recycling GTPase IFT27 blocks BBSome-dependent
    cargo movement even when the BBSome is fully assembled.
  role: trigger
  cellular_components:
  - preferred_term: primary cilium
    term:
      id: GO:0005929
      label: cilium
  biological_processes:
  - preferred_term: intraciliary transport
    term:
      id: GO:0042073
      label: intraciliary transport
    modifier: ABNORMAL
  evidence:
  - reference: PMID:31303482
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: >-
      the BBSome exists in an autoinhibited state in solution and must thus
      undergo a conformational change upon recruitment to membranes by the small
      GTPase ARL6/BBS3
    explanation: >-
      Shows ARL6/BBS3 is required to recruit and activate the BBSome at the
      membrane, so ARL6 loss blocks BBSome function downstream of assembly.
  - reference: PMID:33587040
    supports: SUPPORT
    evidence_source: MODEL_ORGANISM
    snippet: >-
      GTP-bound BBS3 binds and recruits BBSomes to the ciliary membrane for
      interacting with PLD, thus making the PLD-laden BBSomes available to load
      onto retrograde IFT trains for ciliary exit.
    explanation: >-
      Demonstrates in vivo that ARL6/BBS3 recruits the BBSome to the membrane and
      couples it to retrograde IFT for ciliary exit of signaling cargo.
  - reference: PMID:22072986
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: >-
      LZTFL1), interacts with a BBS protein complex known as the BBSome and
      regulates ciliary trafficking of this complex
    explanation: >-
      Identifies LZTFL1/BBS17 as a dedicated regulator of BBSome ciliary
      trafficking, placing it in the BBSome-operator arm.
  downstream:
  - target: BBSome-Dependent Ciliary Cargo Trafficking Failure
    description: Defective membrane recruitment and IFT coupling stall BBSome-dependent cargo transport.
- name: BBSome-Dependent Ciliary Cargo Trafficking Failure
  description: >-
    Shared output node and the conformance anchor for the BBSome-opathies.
    Whether the BBSome fails to assemble or fails to be recruited and coupled to
    IFT, the common consequence is loss of BBSome-dependent trafficking of
    signaling receptors (e.g. GPCRs) and other cargo into and out of the ciliary
    compartment. Downstream, the disorder-specific organ branches are determined
    by which cilia-dependent cell types depend most on this cargo flux.
  role: convergent_phenotype
  cellular_components:
  - preferred_term: primary cilium
    term:
      id: GO:0005929
      label: cilium
  biological_processes:
  - preferred_term: protein localization to cilium
    term:
      id: GO:0061512
      label: protein localization to cilium
    modifier: ABNORMAL
  - preferred_term: intraciliary transport
    term:
      id: GO:0042073
      label: intraciliary transport
    modifier: ABNORMAL
  evidence:
  - reference: PMID:36699005
    supports: SUPPORT
    evidence_source: MODEL_ORGANISM
    snippet: >-
      GPCR ciliary localization is disrupted in neurons from mouse models of the
      ciliopathy Bardet-Biedl syndrome, with GPCRs failing to localize to cilia,
      indicating the Bardet-Biedl syndrome proteins are required for trafficking
      of G protein-coupled receptors into neuronal cilia.
    explanation: >-
      Demonstrates that loss of BBS proteins disrupts BBSome-dependent ciliary
      trafficking of signaling receptors, the conserved output of the module.
