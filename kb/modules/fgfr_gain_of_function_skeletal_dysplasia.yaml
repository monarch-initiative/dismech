name: FGFR Gain-of-Function Skeletal Dysplasia Module
description: >-
  A conserved developmental mechanism module for the germline FGFR
  gain-of-function skeletal dysplasias and craniosynostosis syndromes. A
  recurrent activating mutation in a fibroblast growth factor receptor (most
  commonly FGFR3, less often FGFR2 or FGFR1) produces a constitutively active
  or ligand-hypersensitive receptor. The resulting sustained MAPK/ERK and STAT
  signaling acts in two skeletogenic compartments: in growth-plate chondrocytes
  it drives premature exit from proliferation and dysregulated chondrocyte
  differentiation, impairing endochondral ossification and producing
  chondrodysplasia; in cranial suture mesenchyme it accelerates osteoblast
  differentiation and matrix mineralization, producing premature suture fusion
  and craniosynostosis. The physiological CNP-NPR2 pathway antagonizes
  FGFR3-MAPK signaling and provides the therapeutic rationale for CNP-analog
  and FGFR-pathway antagonist therapy.
category: Module
creation_date: "2026-05-30T00:00:00Z"
notes: >-
  This is a mechanism module, not a specific disease. Disorder entries reference
  individual nodes via conforms_to (for example,
  "fgfr_gain_of_function_skeletal_dysplasia#Sustained MAPK/STAT Signaling").
  The module is genotype-driven and intended for the germline FGFR gain-of-function
  spectrum: chondrodysplasias (Achondroplasia, Hypochondroplasia, Thanatophoric
  Dysplasia types 1 and 2, SADDAN) and craniosynostosis syndromes (Muenke,
  Crouzon, Crouzon with acanthosis nigricans, Apert, Pfeiffer, Jackson-Weiss).
  It complements the somatic, cancer-oriented rtk_grb2_signaling_adaptation
  module on the developmental side: both converge on RTK-driven RAS-MAPK output,
  but this module captures germline FGFR alleles acting in chondrocytes and
  cranial sutures rather than acquired RTK lesions in tumors. Conforming
  disorder nodes substitute the specific receptor (FGFR1/2/3), the recurrent
  allele, and the affected skeletogenic compartment (growth plate vs cranial
  suture) while preserving the conserved MAPK/STAT effector axis.
mechanistic_hypotheses:
- hypothesis_group_id: canonical_fgfr_mapk_stat_model
  hypothesis_label: Canonical FGFR Gain-of-Function MAPK/STAT Model
  status: CANONICAL
  description: >-
    An activating germline FGFR mutation produces a constitutively active or
    ligand-hypersensitive receptor that sustains MAPK/ERK and STAT signaling.
    In growth-plate chondrocytes this dysregulates chondrocyte differentiation
    and impairs endochondral ossification; in cranial suture mesenchyme it
    accelerates osteoblast differentiation and causes premature suture fusion.
  evidence:
  - reference: PMID:14871928
    supports: SUPPORT
    evidence_source: MODEL_ORGANISM
    snippet: >-
      These observations suggest a model in which Fgfr3 signaling inhibits bone
      growth by inhibiting chondrocyte differentiation through the MAPK pathway
      and by inhibiting chondrocyte proliferation through Stat1.
    explanation: >-
      Establishes the canonical dual-effector model in which FGFR signaling acts
      through MAPK and STAT1 to control chondrocyte behavior and bone growth.
- hypothesis_group_id: fgfr_activation_mechanism_heterogeneity
  hypothesis_label: FGFR Activation-Mechanism Heterogeneity Model
  status: ALTERNATIVE
  description: >-
    Different FGFR alleles engage the same downstream MAPK/STAT axis but activate
    the receptor by distinct biophysical mechanisms: linker-region substitutions
    (Apert FGFR2 S252W/P253R, Muenke FGFR3 P250R) increase FGF-ligand affinity and
    specificity, whereas transmembrane and extracellular-cysteine substitutions
    (achondroplasia, thanatophoric dysplasia) confer ligand-independent
    constitutive activation. The degree of constitutive activation is proposed to
    scale with phenotypic severity across the FGFR3 dysplasia family.
  evidence:
  - reference: PMID:10696568
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Recent evidence suggests that the phenotypic differences may be due to
      specific alleles with varying degrees of ligand-independent activation,
      allowing the receptor to be constitutively active.
    explanation: >-
      Supports allele-specific, ligand-independent constitutive activation as the
      basis for phenotypic variation across the FGFR3 dysplasia spectrum.
  - reference: PMID:11390973
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: >-
      These structures demonstrate that both mutations introduce additional
      interactions between FGFR2 and FGF2, thereby augmenting FGFR2-FGF2 affinity.
    explanation: >-
      Provides the contrasting ligand-affinity activation mechanism for the
      Apert linker-region FGFR2 alleles, distinct from ligand-independent
      constitutive activation.
discussions:
- discussion_id: gap_fgfr_compartment_branch_dominance
  prompt: >-
    Why do some activating FGFR alleles predominantly cause chondrodysplasia
    (growth-plate phenotype) while homologous alleles in a different receptor
    predominantly cause craniosynostosis (cranial-suture phenotype), and does
    the relative dominance of the MAPK versus STAT branch differ between these
    two skeletogenic compartments?
  kind: KNOWLEDGE_GAP
  status: OPEN
  attaches_to:
  - pathophysiology#Growth-Plate Chondrocyte Dysregulation
  - pathophysiology#Cranial Suture Osteogenic Acceleration
  rationale: >-
    The same FGFR-MAPK/STAT axis produces opposite tissue outcomes (impaired
    endochondral ossification versus accelerated intramembranous ossification).
    Conforming disorder entries will need tissue- and allele-specific evidence to
    determine whether compartment specificity reflects receptor expression,
    ligand availability, or branch-specific signaling thresholds.
pathophysiology:
- name: Constitutive FGFR Activation
  description: >-
    A recurrent activating germline mutation in a fibroblast growth factor
    receptor (FGFR3 most commonly, FGFR2 or FGFR1 less often) produces a
    constitutively active or ligand-hypersensitive receptor. Transmembrane and
    extracellular-cysteine substitutions enable ligand-independent dimerization
    and constitutive kinase activity, whereas Ig-II/III linker substitutions
    increase FGF-ligand affinity and alter specificity.
  role: trigger
  genes:
  - preferred_term: FGFR3
    term:
      id: hgnc:3690
      label: FGFR3
    modifier: INCREASED
  - preferred_term: FGFR2
    term:
      id: hgnc:3689
      label: FGFR2
    modifier: INCREASED
  - preferred_term: FGFR1
    term:
      id: hgnc:3688
      label: FGFR1
    modifier: INCREASED
  molecular_functions:
  - preferred_term: transmembrane receptor protein tyrosine kinase activity
    term:
      id: GO:0004714
      label: transmembrane receptor protein tyrosine kinase activity
    modifier: INCREASED
  biological_processes:
  - preferred_term: fibroblast growth factor receptor signaling pathway
    term:
      id: GO:0008543
      label: fibroblast growth factor receptor signaling pathway
    modifier: INCREASED
  evidence:
  - reference: PMID:8845844
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Two novel missense mutations (Y373C and G370C) were detected in 8/26 and 1/26 TD1 cases
      respectively. Both mutations created cysteine residues in the juxta
      extramembrane domain of the receptor.
    explanation: >-
      Demonstrates the cysteine-creating FGFR3 alleles that enable aberrant
      disulfide-mediated dimerization and ligand-independent constitutive
      activation in thanatophoric dysplasia.
  - reference: PMID:11390973
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: >-
      These structures demonstrate that both mutations introduce additional
      interactions between FGFR2 and FGF2, thereby augmenting FGFR2-FGF2 affinity.
    explanation: >-
      Provides the structural basis for the alternative, ligand-affinity mode of
      FGFR activation seen in the Apert linker-region alleles.
  - reference: PMID:10696568
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Recent evidence suggests that the phenotypic differences may be due to
      specific alleles with varying degrees of ligand-independent activation,
      allowing the receptor to be constitutively active.
    explanation: >-
      Supports the shared theme of activating FGFR alleles conferring constitutive
      receptor activity across the dysplasia family.
  downstream:
  - target: Sustained MAPK/STAT Signaling
    description: >-
      Constitutively active FGFR drives sustained downstream MAPK/ERK and STAT
      signaling.
    causal_link_type: DIRECT
    hypothesis_groups:
    - canonical_fgfr_mapk_stat_model
    - fgfr_activation_mechanism_heterogeneity

- name: Sustained MAPK/STAT Signaling
  description: >-
    Constitutive FGFR activity sustains MAPK/ERK cascade and STAT (notably STAT1)
    signaling in skeletogenic cells. ERK activation is accelerated and can become
    ligand-independent, and STAT signaling is constitutively engaged. This shared
    effector axis couples the activating receptor to compartment-specific
    transcriptional programs in chondrocytes and suture mesenchyme.
  role: central_effector
  biological_processes:
  - preferred_term: MAPK cascade
    term:
      id: GO:0000165
      label: MAPK cascade
    modifier: INCREASED
  - preferred_term: ERK1 and ERK2 cascade
    term:
      id: GO:0070371
      label: ERK1 and ERK2 cascade
    modifier: INCREASED
  - preferred_term: cell surface receptor signaling pathway via STAT
    term:
      id: GO:0097696
      label: cell surface receptor signaling pathway via STAT
    modifier: INCREASED
  evidence:
  - reference: PMID:9582336
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: >-
      Early ERKs activation
      following FGF 9 supplementation was observed in TD chondrocytes (2 min) as
      compared with controls (5 min) but no signal was detected in the absence of
      ligand.
    explanation: >-
      Shows accelerated ERK/MAPK activation in chondrocytes carrying activating
      FGFR3 mutations, supporting sustained MAPK signaling downstream of the
      receptor.
  - reference: PMID:9582336
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: >-
      ligand-independent activation of the STAT signaling pathway
      was demonstrated in cultured TD cells
    explanation: >-
      Directly supports constitutive STAT signaling as part of the conserved
      effector axis downstream of activating FGFR3 mutations.
  - reference: PMID:14751560
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: >-
      Our results indicate that FGFR3 mutations in the prenatal period upregulate FGFR3 and Stat-p21Cip1 expression, thus inducing premature exit of proliferative cells from the cell cycle and their differentiation into prehypertrophic chondrocytes.
    explanation: >-
      Links FGFR3-driven STAT/p21 signaling to premature cell-cycle exit and
      dysregulated chondrocyte differentiation in human fetal growth plate.
  downstream:
  - target: Growth-Plate Chondrocyte Dysregulation
    description: >-
      In growth-plate chondrocytes, sustained MAPK/STAT signaling dysregulates
      proliferation and differentiation.
    causal_link_type: DIRECT
    hypothesis_groups:
    - canonical_fgfr_mapk_stat_model
  - target: Cranial Suture Osteogenic Acceleration
    description: >-
      In cranial suture mesenchyme, sustained MAPK/ERK signaling accelerates
      osteoblast differentiation.
    causal_link_type: DIRECT
    hypothesis_groups:
    - canonical_fgfr_mapk_stat_model

- name: Growth-Plate Chondrocyte Dysregulation
  description: >-
    In the growth plate, sustained FGFR-MAPK/STAT signaling drives premature exit
    of proliferative chondrocytes from the cell cycle and dysregulated
    differentiation. MAPK signaling inhibits hypertrophic differentiation and
    bone growth, while STAT1 suppresses chondrocyte proliferation, together
    distorting the orderly proliferation-to-hypertrophy program of the growth
    plate.
  role: effector
  cell_types:
  - preferred_term: Growth plate chondrocyte
    term:
      id: CL:1000217
      label: growth plate cartilage chondrocyte
  - preferred_term: Prehypertrophic chondrocyte
    term:
      id: CL:0020022
      label: prehypertrophic chondrocyte
  biological_processes:
  - preferred_term: MAPK cascade
    term:
      id: GO:0000165
      label: MAPK cascade
    modifier: INCREASED
  - preferred_term: chondrocyte differentiation
    term:
      id: GO:0002062
      label: chondrocyte differentiation
    modifier: DYSREGULATED
  - preferred_term: cell population proliferation
    term:
      id: GO:0008283
      label: cell population proliferation
    modifier: DECREASED
  evidence:
  - reference: PMID:14871928
    supports: SUPPORT
    evidence_source: MODEL_ORGANISM
    snippet: >-
      These observations indicate that the MAPK pathway inhibits hypertrophic differentiation of chondrocytes and negatively regulates bone growth without inhibiting chondrocyte proliferation.
    explanation: >-
      Establishes that the MAPK branch of FGFR signaling inhibits chondrocyte
      hypertrophic differentiation and negatively regulates bone growth.
  - reference: PMID:14751560
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: >-
      Our results indicate that FGFR3 mutations in the prenatal period upregulate FGFR3 and Stat-p21Cip1 expression, thus inducing premature exit of proliferative cells from the cell cycle and their differentiation into prehypertrophic chondrocytes.
    explanation: >-
      Human fetal growth-plate evidence for premature cell-cycle exit and
      dysregulated chondrocyte differentiation downstream of FGFR3 signaling.
  downstream:
  - target: Impaired Endochondral Ossification and Chondrodysplasia
    description: >-
      Dysregulated chondrocyte proliferation and differentiation impair growth
      plate function and endochondral bone growth.
    causal_link_type: DIRECT
    hypothesis_groups:
    - canonical_fgfr_mapk_stat_model

- name: Cranial Suture Osteogenic Acceleration
  description: >-
    In cranial suture mesenchyme, activated FGFR signaling acting through the
    ERK1/2 cascade accelerates osteoblast differentiation and matrix
    mineralization. Excess osteogenic activity within the suture promotes early
    bony bridging across the suture.
  role: effector
  cell_types:
