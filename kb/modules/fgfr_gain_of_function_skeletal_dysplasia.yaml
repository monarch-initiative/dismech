    term:
      id: CL:0000062
      label: osteoblast
  - preferred_term: mesenchymal stem cell
    term:
      id: CL:0000134
      label: mesenchymal stem cell
  locations:
  - preferred_term: coronal suture
    term:
      id: UBERON:0002489
      label: coronal suture
  - preferred_term: cranial suture
    term:
      id: UBERON:0003685
      label: cranial suture
  biological_processes:
  - preferred_term: osteoblast differentiation
    term:
      id: GO:0001649
      label: osteoblast differentiation
    modifier: INCREASED
  - preferred_term: ERK1 and ERK2 cascade
    term:
      id: GO:0070371
      label: ERK1 and ERK2 cascade
    modifier: INCREASED
  evidence:
  - reference: PMID:19117954
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: >-
      Both WT and MT FGFR2 increased early and late osteoblast gene expression and matrix mineralization.
    explanation: >-
      Supports accelerated osteoblast differentiation and matrix mineralization
      driven by activated FGFR2 in suture-relevant mesenchymal cells.
  - reference: PMID:19117954
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: >-
      Using dominant-negative ERK and PKCalpha vectors, we demonstrated that WT and
      MT FGFR2 promoted osteoblast gene expression through ERK1/2 and PKCalpha
      signaling, respectively.
    explanation: >-
      Directly implicates the ERK1/2 cascade as the route by which activated FGFR2
      drives the osteogenic program in suture mesenchyme.
  downstream:
  - target: Premature Suture Fusion and Craniosynostosis
    description: >-
      Excess osteogenesis in the suture causes premature bony fusion of cranial
      sutures.
    causal_link_type: DIRECT
    hypothesis_groups:
    - canonical_fgfr_mapk_stat_model

- name: Impaired Endochondral Ossification and Chondrodysplasia
  description: >-
    Dysregulated chondrocyte differentiation reduces the height of the
    proliferative and hypertrophic zones and the collagen-X-positive hypertrophic
    cartilage, impairing longitudinal endochondral bone growth. Premature
    synchondrosis closure further restricts skull-base and spine growth. The net
    result is disproportionate short stature and chondrodysplasia with severity
    graded by allele.
  role: consequence
  cell_types:
  - preferred_term: Columnar chondrocyte
    term:
      id: CL:0000744
      label: columnar chondrocyte
  - preferred_term: Hypertrophic chondrocyte
    term:
      id: CL:0000743
      label: hypertrophic chondrocyte
  biological_processes:
  - preferred_term: endochondral ossification
    term:
      id: GO:0001958
      label: endochondral ossification
    modifier: DECREASED
  - preferred_term: growth plate cartilage development
    term:
      id: GO:0003417
      label: growth plate cartilage development
    modifier: DYSREGULATED
  evidence:
  - reference: PMID:14751560
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: >-
      Immunohistochemical analysis of fetal growth plates showed a phenotype-related reduction of the collagen type X-positive hypertrophic zone.
    explanation: >-
      Direct human histological evidence for a reduced hypertrophic zone graded by
      phenotypic severity, the hallmark of impaired endochondral ossification.
  - reference: PMID:18923003
    supports: SUPPORT
    evidence_source: MODEL_ORGANISM
    snippet: >-
      We observed premature synchondrosis closure in the spine and cranial base in human cases of homozygous achondroplasia and thanatophoric dysplasia as well as in mouse models of achondroplasia.
    explanation: >-
      Supports premature synchondrosis closure as a consequence of FGFR3
      activation across human FGFR3 dysplasias and mouse models.

- name: Premature Suture Fusion and Craniosynostosis
  description: >-
    Excess osteogenic differentiation within cranial sutures causes premature
    bony fusion, most characteristically of the coronal suture, distorting
    cranial growth and producing the craniosynostosis phenotypes of the FGFR
    syndromes (Muenke, Crouzon, Apert, Pfeiffer, Jackson-Weiss).
  role: consequence
  cell_types:
  - preferred_term: osteoblast
    term:
      id: CL:0000062
      label: osteoblast
  locations:
  - preferred_term: coronal suture
    term:
      id: UBERON:0002489
      label: coronal suture
  - preferred_term: cranial suture
    term:
      id: UBERON:0003685
      label: cranial suture
  biological_processes:
  - preferred_term: cranial suture morphogenesis
    term:
      id: GO:0060363
      label: cranial suture morphogenesis
    modifier: DYSREGULATED
  - preferred_term: osteoblast differentiation
    term:
      id: GO:0001649
      label: osteoblast differentiation
    modifier: INCREASED
  evidence:
  - reference: PMID:9042914
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Here we present 61 individuals from 20 unrelated families where
      coronal synostosis is due to an amino acid substitution (Pro250Arg)
      that results from a single point mutation in the fibroblast growth
      factor receptor 3 gene on chromosome 4p.
    explanation: >-
      Demonstrates that a recurrent activating FGFR3 allele causes coronal
      craniosynostosis, the prototypical suture-fusion outcome of the module.
  - reference: PMID:7719344
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      We have identified specific missense substitutions involving adjacent amino acids
      (Ser252Trp and Pro253Arg) in the linker between the second and third extracellular
      immunoglobulin (Ig) domains of fibroblast growth factor receptor 2 (FGFR2) in all
      40 unrelated cases of Apert syndrome studied.
    explanation: >-
      Establishes the recurrent activating FGFR2 linker alleles underlying Apert
      syndrome craniosynostosis, the FGFR2 instance of the suture-fusion arm.

- name: CNP-NPR2 Counter-Regulation and FGFR-Pathway Antagonist Therapy
  description: >-
    C-type natriuretic peptide (CNP) signaling through NPR-B (NPR2) physiologically
    antagonizes FGFR3-MAPK activity in growth-plate chondrocytes by inhibiting the
    MAPK pathway downstream of the receptor. This counter-regulatory branch is the
    mechanistic rationale for CNP-analog therapy (vosoritide) and other
    FGFR-pathway antagonists that target the conserved MAPK effector axis to
    restore endochondral bone growth.
  role: therapeutic_vulnerability
  cell_types:
  - preferred_term: Growth plate chondrocyte
    term:
      id: CL:1000217
      label: growth plate cartilage chondrocyte
  biological_processes:
  - preferred_term: receptor guanylyl cyclase signaling pathway
    term:
      id: GO:0007168
      label: receptor guanylyl cyclase signaling pathway
  - preferred_term: MAPK cascade
    term:
      id: GO:0000165
      label: MAPK cascade
    modifier: DECREASED
  evidence:
  - reference: PMID:14702637
    supports: SUPPORT
    evidence_source: MODEL_ORGANISM
    snippet: >-
      CNP prevented the shortening of achondroplastic bones by correcting the decreased extracellular matrix synthesis in the growth plate through inhibition of the MAPK pathway of FGF signaling.
    explanation: >-
      Establishes that CNP antagonizes FGFR3-MAPK signaling in the growth plate,
      the counter-regulatory and therapeutic rationale (vosoritide) for the module.
