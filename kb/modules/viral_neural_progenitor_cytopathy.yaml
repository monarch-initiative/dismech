    snippet: >-
      Our results identify hNPCs as a direct ZIKV target.
    explanation: >-
      Human iPSC-derived cortical neural progenitors are direct ZIKV targets,
      supporting the trigger node.
  - reference: PMID:27038591
    supports: SUPPORT
    evidence_source: COMPUTATIONAL
    snippet: >-
      Here we report that the candidate ZIKV receptor, AXL, is highly enriched
      in radial glia, the neural stem cells of the human fetal cerebral cortex,
      providing a hypothesis for why these cells are particularly vulnerable to
      ZIKV infection, and providing a candidate mechanism for ZIKV-induced
      microcephaly.
    explanation: >-
      Supports radial glia and AXL-enriched fetal cortical cells as a
      susceptibility branch for the ZIKV prototype of this module.
  - reference: PMID:27279226
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: >-
      the virus infects human cortical progenitor cells, leading to an increase
      in cell death.
    explanation: >-
      ZIKV(BR) infection of human cortical progenitors supports the generic
      fetal-brain progenitor infection trigger.
  downstream:
  - target: Antiviral Innate Immune Activation
    description: >-
      Infection exposes viral RNA or replication intermediates that activate
      pattern-recognition and interferon-related pathways in neural progenitor
      systems.
  - target: Viral Mitotic and Centrosome Cytopathy
    description: >-
      Viral infection can directly perturb mitosis, centrosomes, and radial
      glial cell-cycle machinery.
- name: Antiviral Innate Immune Activation
  description: >-
    Viral infection activates innate immune pathways in neural progenitor
    systems. In the ZIKV prototype, cerebral organoid studies support a TLR3-
    linked branch in which antiviral signaling intersects with neurogenesis,
    axon guidance, and apoptosis pathways. This node should be specialized in
    disease entries for the relevant pattern-recognition receptor, interferon
    pathway, viral immune-evasion factor, or host restriction mechanism.
