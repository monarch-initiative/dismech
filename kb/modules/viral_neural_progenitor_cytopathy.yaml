- discussion_id: gap_viral_mcd_human_model_translatability
  prompt: >-
    Which congenital viral cortical-malformation mechanisms are faithfully
    captured by mouse, non-human primate organoid, human organoid, fetal slice,
    and postmortem human tissue systems, and which are model- or strain-specific?
  kind: HUMAN_MODEL_MISMATCH
  status: OPEN
  attaches_to:
  - pathophysiology#Fetal Brain Viral Exposure and Progenitor Infection
  - pathophysiology#Neural Progenitor Apoptosis and Pool Depletion
  - pathophysiology#Impaired Neurogenesis and Congenital Cortical Malformation
  rationale: >-
    The ZIKV evidence base spans hNPC culture, brain organoids, organotypic
    fetal slices, mouse models, and infected human fetal brain, but each system
    captures different aspects of gestational timing, placental crossing,
    immune competence, OSVZ/oRG biology, and strain-specific viral adaptation.
    Conforming disease entries should not treat one model as complete proof of
    the human congenital cortical malformation skeleton.
  evidence:
  - reference: PMID:27279226
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Mouse models often fail to reproduce the severely reduced brain size and
      pathological alterations found in human patients21,22, likely due to
      significant differences in gestation time and brain development between
      the two species.
    explanation: >-
      Directly supports using a human/model-mismatch discussion for congenital
      viral cortical malformation mechanisms.
  - reference: PMID:27279226
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: >-
      Finally, our data using a non-human primate organoids suggested that the
      ZIKVBR might have experienced adaptive changes in human cells.
    explanation: >-
      Supports the concern that viral strain and host-cell context alter
      translatability across primate and human model systems.
pathophysiology:
- name: Fetal Brain Viral Exposure and Progenitor Infection
  description: >-
    A prenatal neurotropic virus crosses maternal-fetal or fetal-brain barriers
    and infects neural stem cells, neural progenitors, radial glia, or related
    fetal neuroepithelial cells. ZIKV data support this node through human
    iPSC-derived neural progenitor infection, human cortical progenitor and
    organoid infection, and fetal tissue/radial-glial susceptibility evidence.
    Virus-specific receptor and placental entry details belong in conforming
    disease entries.
