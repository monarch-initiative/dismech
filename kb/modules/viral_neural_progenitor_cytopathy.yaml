    snippet: >-
      Here we show that cerebral organoids generated from human embryonic stem
      cells mimic the developing fetal brain and develop malformations and
      severely inhibited growth following ZIKV inoculation.
    explanation: >-
      Human cerebral organoids model fetal-brain malformation and growth
