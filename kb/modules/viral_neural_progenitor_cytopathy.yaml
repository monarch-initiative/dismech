    snippet: >-
      ZIKV infection of NES cells and RGCs causes centrosomal depletion and
      mitochondrial sequestration of phospho-TBK1 during mitosis.
    explanation: >-
      Links viral infection to TBK1 relocalization at the interface of innate
      immune signaling and mitotic disruption in human neuroepithelial stem
      cells and radial glia.
