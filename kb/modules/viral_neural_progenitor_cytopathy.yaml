name: Viral Neural Progenitor Cytopathy Module
description: >-
  Conserved non-genetic cortical malformation mechanism in which prenatal
  neurotropic viral infection targets neural stem cells, neural progenitors, or
  radial glia during corticogenesis. The shared skeleton is fetal-brain viral
  exposure and progenitor infection followed by antiviral innate immune
  activation, mitotic or centrosome stress, apoptosis or cytopathy, depletion or
  premature differentiation of the progenitor pool, impaired neurogenesis, and
  congenital cortical malformation. Zika virus is the prototype evidence base,
  but conforming disease entries should substitute the virus-specific receptor,
  immune-evasion, placental, diagnostic, and systemic branches.
category: Module
creation_date: "2026-06-11T20:37:02Z"
notes: >-
  This is a mechanism module, not a broad TORCH, microcephaly, or congenital
  Zika syndrome disease entry. Use conforms_to only when the entry has evidence
  that a prenatal viral infection directly perturbs neural stem/progenitor or
  radial-glial biology. ZIKV-specific features such as AXL candidate entry
  receptor status, NS5/TBK1 immune evasion, calcifications, fetal diagnostic
  findings, ocular/systemic congenital findings, and antiviral response belong
  in the congenital Zika disease entry unless a later curator demonstrates that
  the branch is reusable across multiple congenital viral infections. This
  module intentionally overlaps downstream with
  neural_progenitor_centrosome_spindle_dysfunction for mitotic/centrosome and
  progenitor-pool branches; conforming disease entries can cite both modules
  when the evidence supports both the viral upstream lesion and the conserved
  progenitor-spindle/progenitor-pool skeleton.
mechanistic_hypotheses:
- hypothesis_group_id: viral_progenitor_cytopathy_model
  hypothesis_label: Viral Neural Progenitor Cytopathy Model
  status: CANONICAL
  description: >-
    Prenatal neurotropic virus reaches the developing fetal brain and infects
    neural stem cells, neural progenitors, or radial glia. Infection activates
    antiviral innate immune pathways and can directly disrupt cell-cycle,
    mitotic, centrosome, or phospho-TBK1 localization machinery. The combined
    viral replication, innate immune, and mitotic stress state increases
    apoptosis or premature differentiation, depletes the progenitor pool, and
    impairs neurogenesis, producing cortical thinning, microcephaly, simplified
    gyration, or other congenital cortical malformations.
  evidence:
  - reference: PMID:26952870
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: >-
      Here we show that a strain of the ZIKV, MR766, serially passaged in
      monkey and mosquito cells efficiently infects human neural progenitor
      cells (hNPCs) derived from induced pluripotent stem cells.
    explanation: >-
      Establishes human iPSC-derived neural progenitors as direct viral targets,
      the proximal cellular lesion for this module.
  - reference: PMID:27279226
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: >-
      These results indicate that ZIKV(BR) crosses the placenta and causes
      microcephaly by targeting cortical progenitor cells, inducing cell death
      by apoptosis and autophagy, and impairing neurodevelopment.
    explanation: >-
      Connects fetal viral exposure, cortical progenitor targeting, cell death,
      and impaired neurodevelopment in a single ZIKV(BR) experimental model.
  - reference: PMID:28132835
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: >-
      The main phenotypic effect was premature differentiation of neural
      progenitors associated with centrosome perturbation, even during early
      stages of infection, leading to progenitor depletion, disruption of the
      VZ, impaired neurogenesis, and cortical thinning.
    explanation: >-
      Human iPSC-derived brain organoids support the module skeleton from viral
      infection through centrosome/progenitor perturbation to cortical thinning.
discussions:
- discussion_id: gap_viral_entry_receptor_tropism
  prompt: >-
    Which viral entry receptors or attachment factors determine susceptibility
    of human radial glia, outer radial glia, neural progenitors, endothelium, and
    fetal barrier tissues to congenital viral infection?
  kind: KNOWLEDGE_GAP
  status: OPEN
  attaches_to:
  - pathophysiology#Fetal Brain Viral Exposure and Progenitor Infection
  rationale: >-
    AXL expression highlights a plausible ZIKV susceptibility branch in human
    radial glia and organoids, but AXL is not established here as a required
    generic viral-module feature. Disease entries should decide whether their
    virus uses AXL, another TAM receptor, a distinct attachment factor, or a
    receptor-independent route, and whether receptor expression alone explains
    fetal-brain tropism.
  evidence:
  - reference: PMID:27038591
    supports: SUPPORT
    evidence_source: COMPUTATIONAL
    snippet: >-
      Across cell types, we found that multiple putative flavivirus entry
      receptor genes including AXL and heat shock protein genes, showed a strong
      pattern of enrichment in radial glia cells, astrocytes, endothelial cells,
      and microglia, suggesting that these cell types may be particularly
      vulnerable to ZIKV infection (Figure 1 A-B).
    explanation: >-
      Single-cell expression analysis supports AXL and related entry-factor
      enrichment as a receptor-tropism lead, but it does not by itself prove
      functional requirement for infection in every fetal brain cell type.
  - reference: PMID:27038591
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Finally, other flaviviruses that use similar entry receptors have not been
      strongly associated with fetal brain abnormalities, and future work must
      examine potential changes in recent strains of ZIKV.
    explanation: >-
      The authors explicitly identify receptor use and strain differences as
      unresolved determinants of congenital neurotropism.
