name: Neural Crest Melanocyte Deficiency Module
description: >-
  A conserved developmental module for Waardenburg-spectrum auditory-pigmentary
  disease. Diverse upstream lesions, including PAX3/SOX10/MITF transcriptional
  dysregulation and EDN3/EDNRB endothelin signaling deficiency, converge on
  impaired melanoblast migration, survival, or differentiation. This reduces
  melanocytes in skin, hair, iris, and the cochlear stria vascularis, producing
  pigmentary anomalies and sensorineural hearing impairment. Disorder entries
  reference these nodes via conforms_to and substitute the gene-specific trigger.
category: Module
creation_date: "2026-05-28T00:00:00Z"
notes: >-
  This is a shared mechanism module, not a disease. It captures the
  auditory-pigmentary melanocyte arm of Waardenburg biology only. Enteric
  nervous system aganglionosis is intentionally left to disorder-specific
  pathophysiology or a future enteric neurocristopathy module.
pathophysiology:
- name: Neural Crest Melanocyte Program Disruption
  description: >-
    Upstream developmental regulators or signaling pathways required for
    neural crest-derived melanocyte lineage specification and differentiation
    are disrupted. Examples include PAX3/SOX10 activation of MITF and MITF
    control of melanocyte survival and differentiation.
  role: trigger
  cell_types:
  - preferred_term: migratory neural crest cell
    term:
      id: CL:0000333
      label: migratory neural crest cell
  - preferred_term: melanoblast
    term:
      id: CL:0000541
      label: melanoblast
  biological_processes:
  - preferred_term: melanocyte differentiation
    term:
      id: GO:0030318
      label: melanocyte differentiation
    modifier: DECREASED
  evidence:
  - reference: PMID:10982026
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: >-
      We show that SOX10 is capable of transactivating the MITF promoter 100-fold, and that this transactivation is further stimulated by PAX3.
    explanation: >-
      Demonstrates a conserved PAX3/SOX10/MITF transcriptional hierarchy in
      Waardenburg melanocyte biology.
  - reference: PMID:10938265
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: >-
      MITF controls melanocyte survival and differentiation.
    explanation: >-
      Establishes MITF as the central melanocyte survival/differentiation
      effector downstream of SOX10.
  downstream:
  - target: Melanoblast Migration and Survival Defect
    description: >-
      Disrupted transcriptional or endothelin signaling programs impair
      melanoblast migration, survival, or differentiation.

- name: Melanoblast Migration and Survival Defect
  description: >-
    Melanoblasts fail to migrate to, survive in, or differentiate within
    pigmentary and auditory tissues. The precise initiating defect varies by
    gene: transcriptional program failure for PAX3/SOX10/MITF and terminal
    migration signaling failure for EDN3/EDNRB.
  role: central_effector
  cell_types:
  - preferred_term: melanoblast
    term:
      id: CL:0000541
      label: melanoblast
  - preferred_term: melanocyte
    term:
      id: CL:0000148
      label: melanocyte
  biological_processes:
  - preferred_term: neural crest cell migration
    term:
      id: GO:0001755
      label: neural crest cell migration
    modifier: DECREASED
  - preferred_term: melanocyte differentiation
    term:
      id: GO:0030318
      label: melanocyte differentiation
    modifier: DECREASED
  evidence:
  - reference: PMID:12812796
    supports: SUPPORT
    evidence_source: MODEL_ORGANISM
    snippet: >-
      EDNRB signaling is exclusively required between E10.5 and E12.5 during the migratory phase of melanoblast and enteric neuroblast development.
    explanation: >-
      Shows that endothelin signaling controls migration of melanoblasts, one
      mechanistic route into the shared melanocyte-deficiency module.
  - reference: PMID:38278860
    supports: SUPPORT
    evidence_source: MODEL_ORGANISM
    snippet: >-
      Pax3 is required for the development of neural crest cell-derived cochlear melanocytes
    explanation: >-
      Shows that PAX3 loss reduces development of neural crest-derived cochlear
      melanocytes.
  downstream:
  - target: Stria Vascularis Melanocyte Deficiency
    description: >-
      Reduced melanocytes in the cochlear stria vascularis impair auditory
      function.
  - target: Cutaneous Hair and Iris Melanocyte Deficiency
    description: >-
      Reduced melanocytes in visible pigmentary tissues cause hair, skin, and
      iris findings.

- name: Stria Vascularis Melanocyte Deficiency
  description: >-
    Melanocyte/intermediate-cell deficiency in the cochlear stria vascularis
    disrupts the cellular support needed to generate the endocochlear potential,
    contributing to sensorineural hearing impairment.
  role: effector
  cell_types:
  - preferred_term: melanocyte
    term:
      id: CL:0000148
      label: melanocyte
  locations:
  - preferred_term: stria vascularis
    term:
      id: UBERON:0002282
      label: stria vascularis of cochlear duct
  evidence:
  - reference: PMID:11764294
    supports: SUPPORT
    evidence_source: MODEL_ORGANISM
    snippet: >-
      Intermediate cells play an important role for cochlear function: Na+K+-ATPase and potassium channels of intermediate cells are essential for production of endocochlear potential
    explanation: >-
      Supports the cochlear intermediate-cell/stria vascularis mechanism for
      hearing impairment.
  - reference: PMID:38278860
    supports: SUPPORT
    evidence_source: MODEL_ORGANISM
    snippet: >-
      Cochlear melanocytes are intermediate cells in the stria vascularis that generate endocochlear potentials required for auditory function.
    explanation: >-
      Directly links cochlear melanocytes to endocochlear potential generation.
  downstream:
  - target: Sensorineural Hearing Impairment
    description: >-
      Stria vascularis dysfunction causes sensorineural hearing impairment.

- name: Cutaneous Hair and Iris Melanocyte Deficiency
  description: >-
    Melanocyte deficiency in skin, hair follicles, and iris reduces melanin
    deposition and produces the visible pigmentary features of Waardenburg
    syndrome, including white forelock, hypopigmented patches, and heterochromia
    or iris hypopigmentation.
  role: effector
  cell_types:
  - preferred_term: melanocyte
    term:
      id: CL:0000148
      label: melanocyte
  biological_processes:
  - preferred_term: pigmentation
    term:
      id: GO:0043473
      label: pigmentation
    modifier: DECREASED
  evidence:
  - reference: PMID:8659547
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Waardenburg syndrome type 2 (WS2) is a dominantly inherited disorder characterized by a pigmentation anomaly and hearing impairment due to lack of melanocyte
    explanation: >-
      Human MITF Waardenburg evidence supports melanocyte absence as the common
      cause of pigmentation and hearing findings.
  downstream:
  - target: Pigmentary Abnormalities
    description: >-
      Cutaneous, hair, and iris melanocyte deficiency causes the visible
      pigmentary abnormalities.
