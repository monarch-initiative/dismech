name: Cerebellar Purkinje Cell Degeneration Module
description: >-
  A conserved cerebellar neurodegeneration module representing the final common
  pathway by which functionally diverse insults converge on cerebellar Purkinje
  cell dysfunction, degeneration, and cerebellar ataxia. An initiating genetic
  (e.g., polyglutamine repeat-expansion proteotoxicity, ion-channel or
  calcium-handling defect), metabolic, mitochondrial/DNA-repair, or toxic insult
  stresses cerebellar neurons; this perturbs Purkinje cell intracellular calcium
  homeostasis and proteostasis, activates toxic cascades that drive Purkinje
  neuron apoptosis and loss, abolishes the cerebellar cortical output normally
  conveyed by Purkinje cells to the deep cerebellar nuclei, and produces
  progressive gait, limb, and speech incoordination. The module captures the
  shared core spanning the spinocerebellar ataxias (including polyglutamine
  SCAs), autosomal recessive ataxias, and acquired cerebellar degeneration.
  Individual disorder entries declare conformance via conforms_to on their
  pathophysiology nodes, substituting the disorder-specific molecular lesion
  while preserving the conserved Purkinje-centered causal chain.
category: Module
creation_date: "2026-06-06T00:00:00Z"
notes: >-
  This is a mechanism module, not a specific disease. Disorder entries reference
  individual nodes via conforms_to (e.g.,
  "cerebellar_purkinje_degeneration#Purkinje Neuron Degeneration"). The module
  defines the expected pathophysiology structure; conforming nodes in disorder
  files should include the corresponding cell types, biological processes, and
  causal edges, specialized to their molecular context. Key disorder-specific
  substitutions for the trigger node: polyglutamine-expanded ataxin proteins
  (ATXN1/2/3/7, TBP) in the polyglutamine SCAs; calcium-channel/handling
  proteins (CACNA1A, ITPR1, PRKCG) in calcium-signaling SCAs; mitochondrial or
  DNA-repair proteins (frataxin, aprataxin, senataxin) in autosomal recessive
  ataxias; and antibody/paraneoplastic or toxic insults in acquired cerebellar
  degeneration. The cerebellar Purkinje cell (CL:0000121) is the shared
  vulnerable cell type across all conforming disorders.
pathophysiology:
- name: Cerebellar Neuron Insult
  description: >-
    A genetic, metabolic, mitochondrial/DNA-repair, or toxic insult perturbs
    cerebellar neurons, with the cerebellar Purkinje cell being especially
    vulnerable. The molecular lesion is heterogeneous across disorders
    (repeat-expansion proteotoxicity, ion-channel or calcium-handling defects,
    impaired protein quality control), but the diverse insults converge on a
    shared program of Purkinje cell stress that initiates the degenerative
    cascade.
  role: trigger
  cell_types:
  - preferred_term: cerebellar Purkinje cell
    term:
      id: CL:0000121
      label: Purkinje cell
  biological_processes:
  - preferred_term: cellular response to stress
    term:
      id: GO:0033554
      label: cellular response to stress
    modifier: INCREASED
  evidence:
  - reference: PMID:29421540
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      The genetically heterozygous spinocerebellar ataxias are all characterized
      by cerebellar atrophy and pervasive Purkinje Cell degeneration. Up to date,
      more than 35 functionally diverse spinocerebellar ataxia genes have been
      identified.
    explanation: >-
      Establishes that functionally diverse genetic insults converge on a shared
      outcome of pervasive Purkinje cell degeneration, defining the heterogeneous
      trigger state of this module. Evidence source is OTHER because this is a
      review synthesizing data across many SCA genes.
  - reference: PMID:32765211
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Strikingly, despite vast heterogeneity in the structure and function of
      disease-causing genes across the SCAs and the cellular processes affected,
      the downstream effects have considerable overlap, including alterations in
      cerebellar circuitry.
    explanation: >-
      Supports the convergence of heterogeneous disease-causing insults onto a
      shared downstream cerebellar pathway. Evidence source is OTHER because this
      is a review article.
  downstream:
  - target: Purkinje Cell Calcium and Proteostasis Dysregulation

- name: Purkinje Cell Calcium and Proteostasis Dysregulation
  description: >-
    The initiating insult disrupts intracellular calcium homeostasis and protein
    quality control in cerebellar Purkinje cells. Purkinje cells depend on a
    finely tuned complement of calcium channels, calcium-dependent kinases and
    phosphatases, and calcium-binding proteins; perturbation of this balance
    (and, in proteotoxic disorders, accumulation of aggregation-prone proteins)
    activates toxic cascades that constitute the amplifying step linking the
    primary lesion to overt neurodegeneration.
  role: amplifier
  cell_types:
  - preferred_term: cerebellar Purkinje cell
    term:
      id: CL:0000121
      label: Purkinje cell
  biological_processes:
  - preferred_term: calcium ion homeostasis
    term:
      id: GO:0055074
      label: calcium ion homeostasis
    modifier: DYSREGULATED
  evidence:
  - reference: PMID:31892274
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Emerging research suggests that mutations in SCA genes cause disruptions in
      multiple cellular pathways but the characteristic SCA pathogenesis does not
      begin until calcium signaling pathways are disrupted in cerebellar Purkinje
      cells.
    explanation: >-
      Directly identifies disrupted Purkinje cell calcium signaling as the
      pivotal amplifying step that converts diverse SCA mutations into
      pathogenesis. Evidence source is OTHER because this is a review of animal
      models.
  - reference: PMID:28554312
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      The common function among them is that they are involved in the regulation
      of calcium homeostasis in Purkinje cells and their dysfunction causes
      ataxia in mouse and human.
    explanation: >-
      Confirms that dysregulation of Purkinje cell calcium homeostasis is the
      shared mechanism across calcium-signaling-related SCA genes. Evidence
      source is OTHER because this is a review article.
  downstream:
  - target: Purkinje Neuron Degeneration

- name: Purkinje Neuron Degeneration
  description: >-
    Sustained calcium and proteostatic stress activate toxic intracellular
    cascades that drive Purkinje neuron dysfunction and apoptotic cell death.
    Loss of these neurons, accompanied by cerebellar atrophy and gliosis, is the
    central effector event shared across the spinocerebellar ataxias and other
    cerebellar degenerations, and it precedes degeneration of other cerebellar
    neuronal populations in many SCAs.
  role: central_effector
  cell_types:
  - preferred_term: cerebellar Purkinje cell
    term:
      id: CL:0000121
      label: Purkinje cell
  biological_processes:
  - preferred_term: neuron apoptotic process
    term:
      id: GO:0051402
      label: neuron apoptotic process
    modifier: INCREASED
  evidence:
  - reference: PMID:31892274
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Abnormal Ca2+ levels can activate toxic cascades leading to characteristic
      death of Purkinje cells, cerebellar atrophy, and ataxia that occur in many
      SCAs.
    explanation: >-
      Directly connects calcium dysregulation to toxic-cascade-driven Purkinje
      cell death as the central effector of the module. Evidence source is OTHER
      because this is a review of animal models.
  - reference: PMID:32877710
    supports: SUPPORT
    evidence_source: MODEL_ORGANISM
    snippet: >-
      In addition to the polyglutamine-protein aggregation in Purkinje cells
      caused apoptosis cell-autonomously, a significant body of evidence have
      shown that ERK pathways involves in neuronal apoptosis.
    explanation: >-
      Mouse model of SCA17 shows that proteotoxic Purkinje cell aggregation
      drives apoptotic Purkinje cell death, supporting neuron apoptotic process
      as the degenerative mechanism. Evidence source is MODEL_ORGANISM because
      the data are from transgenic SCA17 mice.
  downstream:
  - target: Loss of Cerebellar Cortical Output

- name: Loss of Cerebellar Cortical Output
  description: >-
    Purkinje cells provide the sole inhibitory output of the cerebellar cortex
    to the deep cerebellar nuclei (DCN). Their dysfunction and degeneration
    remove this inhibitory control, disinhibiting the DCN and corrupting the
    motor-coordination signals relayed to downstream motor areas. This
    disruption of cerebellar circuitry is the effector step that translates
    Purkinje cell loss into a movement-control deficit.
  role: effector
  cell_types:
  - preferred_term: cerebellar Purkinje cell
    term:
      id: CL:0000121
      label: Purkinje cell
  biological_processes:
  - preferred_term: nervous system process
    term:
      id: GO:0050877
      label: nervous system process
    modifier: ABNORMAL
  - preferred_term: cerebellar Purkinje cell layer development
    term:
      id: GO:0021680
      label: cerebellar Purkinje cell layer development
    modifier: ABNORMAL
  evidence:
  - reference: PMID:31892274
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      In the absence of the inhibitory signal emanating from Purkinje cells, DCN
      will become more excitable, thereby affecting the motor areas receiving DCN
      input and resulting in uncoordinated movements.
    explanation: >-
      Directly describes how loss of Purkinje cell inhibitory output disinhibits
      the deep cerebellar nuclei and corrupts the motor output of the cerebellum.
      Evidence source is OTHER because this is a review of animal models.
  - reference: PMID:32765211
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Interestingly, aberrant function and degeneration of Purkinje cells, the
      major output neuronal population present within the cerebellum, precedes
      abnormalities in other neuronal populations within many SCAs, suggesting
      that Purkinje cells have increased vulnerability to cellular perturbations.
    explanation: >-
      Establishes Purkinje cells as the major cerebellar output population whose
      dysfunction drives the circuit-level deficit. Evidence source is OTHER
      because this is a review article.
  downstream:
  - target: Cerebellar Ataxia

- name: Cerebellar Ataxia
  description: >-
    The combined loss of cerebellar Purkinje cells and corruption of cerebellar
    cortical output produce progressive incoordination of gait, limbs, and
    speech, with additional features such as dysarthria and nystagmus. This is
    the convergent clinical consequence of the module and corresponds to
    cerebellar ataxia (HP:0001251 Ataxia; MONDO:0000437 cerebellar ataxia).
  role: consequence
  evidence:
  - reference: PMID:31892274
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Spinocerebellar ataxias (SCAs) constitute a heterogeneous group of more
      than 40 autosomal-dominant genetic and neurodegenerative diseases
      characterized by loss of balance and motor coordination due to dysfunction
      of the cerebellum and its efferent connections.
    explanation: >-
      Directly frames the clinical consequence as loss of balance and motor
      coordination arising from cerebellar dysfunction and disrupted efferent
      output. Evidence source is OTHER because this is a review.
  - reference: PMID:27392710
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Hereditary ataxias make up a remarkably diverse group of neurological
      disorders clinically characterized by gait ataxia, nystagmus, dysarthria,
      trunk and limb ataxia and often atrophy of the cerebellum.
    explanation: >-
      Enumerates the convergent clinical phenotype (gait, trunk, and limb ataxia,
      dysarthria, nystagmus) that defines this consequence node. Evidence source
      is OTHER because this is a review synthesizing data across hereditary
      ataxias.
