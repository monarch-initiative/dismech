name: Conserved Cellular Senescence Module
description: >-
  A conserved pathological module representing cellular senescence (GO:0090398) -
  a stress-induced, essentially permanent cell-cycle arrest - as a shared driver
  of age-related tissue dysfunction across organs. Diverse senescence-inducing
  stresses (replicative/telomeric, oncogenic, genotoxic, oxidative) engage the
  p16INK4a/Rb and p53/p21 tumor-suppressor programs to arrest the cell; arrested
  cells acquire a senescence-associated secretory phenotype (SASP) of
  proinflammatory cytokines, chemokines, and proteases; when immune clearance is
  outpaced, senescent cells accumulate, and their persistent secretome drives
  chronic inflammation, loss of regenerative capacity, and progressive tissue
  dysfunction. This is the conserved core that recurs in osteoarthritis,
  pulmonary and other organ fibrosis, atherosclerosis, and broader aging biology.
  Individual disorder entries declare conformance via conforms_to on their
  pathophysiology nodes, substituting the tissue-specific senescent cell type
  (e.g. chondrocyte in osteoarthritis, fibroblast in pulmonary fibrosis) while
  preserving the conserved arrest -> SASP -> accumulation -> dysfunction chain.
category: Module
creation_date: "2026-06-23T00:00:00Z"
notes: >-
  This is a mechanism module, not a specific disease. Disorder entries reference
  individual nodes via conforms_to (e.g.,
  "cellular_senescence#Senescent Cell Accumulation"). Conforming nodes should
  substitute the organ-specific senescent cell type and retain the conserved
  causal chain. The module is intentionally kept lean: it captures the conserved
  senescence mechanism and its two canonical biomarkers (p16INK4a and
  senescence-associated beta-galactosidase) plus the senolytic drug-target
  pattern, but deliberately does NOT carry disease-specific or
  context-dependent downstream theories (e.g. the age-contextualized,
  surface-counterintuitive relationship between accelerated biological aging and
  early-onset cancer). Such specific, contested, or context-dependent
  associations belong on the relevant disorder or comorbidity/trajectory entry,
  which may conforms_to or reference this module rather than embedding the theory
  here. Worked conformers: Osteoarthritis (senescent chondrocytes; PMID:28436958)
  and pulmonary fibrosis (senescent fibroblasts; PMID:28230051). Senolytic
  drug-target pattern: senescence-active treatments use target_mechanisms to link
  back to the "Senescent Cell Accumulation" node they deplete.
pathophysiology:
- name: Senescence-Inducing Stress
  description: >-
    A diverse set of cellular stresses initiates the senescence program: telomere
    attrition from repeated division (replicative senescence), activated oncogenes
    (oncogene-induced senescence), severe or irreparable DNA damage and chromatin
    disruption (genotoxic stress), oxidative and mitochondrial stress, and
    therapy-induced damage. Regardless of the specific insult, these converge once
    the cell senses a critical level of damage or dysfunction.
  role: trigger
  biological_processes:
  - preferred_term: DNA Damage Response
    term:
      id: GO:0006974
      label: DNA damage response
    modifier: INCREASED
  evidence:
  - reference: PMID:20078217
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      These stresses include telomeric dysfunction (telomere uncapping) resulting
      from repeated cell division (termed replicative senescence), mitochondrial
      deterioration, oxidative stress, severe or irreparable DNA damage and
      chromatin disruption (genotoxic stress), and the expression of certain
      oncogenes (oncogene-induced senescence)
    explanation: >-
      Enumerates the conserved set of senescence-inducing stresses that initiate
      the program. Evidence source is OTHER because this is a review.
  downstream:
  - target: Senescence-Associated Cell Cycle Arrest

- name: Senescence-Associated Cell Cycle Arrest
  description: >-
    Sensing of critical damage engages the major tumor-suppressor pathways -
    p16INK4a/Rb and p53/p21 - to impose an essentially permanent cell-cycle
    arrest. This arrest is the defining feature of senescence and is initially
    protective, preventing propagation of damage and malignant transformation of
    cells at risk. Elevated p16INK4a (CDKN2A) is the canonical molecular marker of
    this state.
  role: central_effector
  biological_processes:
  - preferred_term: Cellular Senescence
    term:
      id: GO:0090398
      label: cellular senescence
    modifier: INCREASED
  - preferred_term: Replicative Senescence
    term:
      id: GO:0090399
      label: replicative senescence
    modifier: INCREASED
  evidence:
  - reference: PMID:20078217
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      the senescence growth arrest has been shown to depend on the activities of
      the major tumor-suppressor pathways controlled by p16INK4a and pRB
      (retinoblastoma protein), as well as by p53
    explanation: >-
      Establishes the p16INK4a/Rb and p53 tumor-suppressor pathways as the
      conserved effectors of the senescence-associated arrest. Evidence source is
      OTHER because this is a review.
  - reference: PMID:28729727
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Cellular senescence, which is a permanent state of cell cycle arrest induced
      by cellular stress, has recently emerged as a fundamental ageing mechanism
      that also contributes to diseases of late life, including cancer,
      atherosclerosis and osteoarthritis.
    explanation: >-
      Defines senescence as a stress-induced permanent arrest and a fundamental
      aging mechanism contributing to multiple age-related diseases, supporting
      the module's conserved-driver framing. Evidence source is OTHER (review).
  downstream:
  - target: Senescence-Associated Secretory Phenotype
  - target: Senescent Cell Accumulation

- name: Senescence-Associated Secretory Phenotype
  description: >-
    Arrested senescent cells acquire a senescence-associated secretory phenotype
    (SASP): secretion of proinflammatory cytokines (e.g. IL-6, IL-8), chemokines,
    growth factors, and matrix-remodeling proteases. The SASP converts senescent
    cells into proinflammatory, tissue-remodeling cells and is the principal
    means by which a non-dividing cell exerts paracrine effects on its
    microenvironment, reinforcing senescence and recruiting immune cells.
  role: amplifier
  cell_types:
  - preferred_term: Senescent Fibroblast
    term:
      id: CL:0000057
      label: fibroblast
  biological_processes:
  - preferred_term: Inflammatory Response
    term:
      id: GO:0006954
      label: inflammatory response
    modifier: INCREASED
  - preferred_term: Cytokine Production
    term:
      id: GO:0001816
      label: cytokine production
    modifier: INCREASED
  - preferred_term: Cytokine-Mediated Signaling
    term:
      id: GO:0019221
      label: cytokine-mediated signaling pathway
    modifier: INCREASED
  evidence:
  - reference: PMID:20078217
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      The most significant of these effects is the acquisition of a
      senescence-associated secretory phenotype (SASP) that turns senescent
      fibroblasts into proinflammatory cells that have the ability to promote
      tumor progression.
    explanation: >-
      Defines the SASP and its conversion of senescent cells into proinflammatory
      cells acting on the microenvironment. Evidence source is OTHER (review).
  downstream:
  - target: Senescent Cell Accumulation
  - target: Tissue Dysfunction and Age-Related Pathology

- name: Senescent Cell Accumulation
  description: >-
    In young tissue, senescence is transient: senescent cells are cleared by the
    immune system and replaced through regeneration. In aged or pathological
    tissue this clearance is outpaced, so senescent cells accumulate. The
    accumulated burden, sustained by the SASP and impaired immune surveillance,
    is the rate-limiting reservoir that selective elimination (senolysis)
    targets.
  role: effector
  biological_processes:
  - preferred_term: Cellular Senescence
    term:
      id: GO:0090398
      label: cellular senescence
    modifier: INCREASED
  evidence:
  - reference: PMID:24954210
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      This sequence of events - senescence, followed by clearance and then
      regeneration - may not be efficiently completed in aged tissues or in
      pathological contexts, thereby resulting in the accumulation of senescent
      cells.
    explanation: >-
      Describes failure of the senescence-clearance-regeneration cycle in aged or
      pathological tissue as the cause of senescent cell accumulation. Evidence
      source is OTHER (review).
  - reference: PMID:20078217
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Senescent cells have been shown to accumulate over the life span of
      rodents, nonhuman primates, and humans
    explanation: >-
      Documents accumulation of senescent cells with age across species. Evidence
      source is OTHER (review).
  downstream:
  - target: Tissue Dysfunction and Age-Related Pathology

- name: Tissue Dysfunction and Age-Related Pathology
  description: >-
    The persistent senescent-cell burden and its chronic inflammatory secretome
    degrade tissue function: chronic sterile inflammation, decline of regenerative
    and stem-cell capacity, and disruption of tissue architecture. This is the
    conserved consequence by which senescence contributes causally to age-related
    diseases; the specific organ pathology (cartilage degradation, lung fibrosis,
    vascular plaque) is supplied by the conforming disorder.
  role: consequence
  evidence:
  - reference: PMID:29477613
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Cellular senescence is a permanent state of cell cycle arrest that promotes
      tissue remodeling during development and after injury, but can also
      contribute to the decline of the regenerative potential and function of
      tissues, to inflammation, and to tumorigenesis in aged organisms.
    explanation: >-
      States the consequence arm of the module: senescence contributes to
      declining tissue regenerative capacity, inflammation, and tumorigenesis in
      aged tissue. Evidence source is OTHER (review).
  - reference: PMID:22048312
    supports: SUPPORT
    evidence_source: MODEL_ORGANISM
    snippet: >-
      These data indicate that cellular senescence is causally implicated in
      generating age-related phenotypes and that removal of senescent cells can
      prevent or delay tissue dysfunction and extend healthspan.
    explanation: >-
      In vivo genetic clearance of p16Ink4a-positive senescent cells in mice
      establishes senescent cell accumulation as a causal driver of age-related
      tissue dysfunction. Evidence source is MODEL_ORGANISM (transgenic mouse).
biochemical:
- name: Elevated p16INK4a (CDKN2A) expression
  presence: INCREASED
  biomarker_term:
    preferred_term: p16INK4a (CDKN2A gene product)
    term:
      id: NCIT:C129948
      label: CDKN2A Gene Product
  notes: >-
    p16INK4a is the canonical molecular marker of the senescence-associated
    arrest. Its tissue abundance tracks senescent-cell burden and, in several
    diseases, disease severity.
  evidence:
  - reference: PMID:28230051
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Here we demonstrate elevated abundance of senescence biomarkers in IPF
      lung, with p16 expression increasing with disease severity.
    explanation: >-
      Human IPF lung tissue shows rising p16 with disease severity, supporting
      p16INK4a as a graded senescence biomarker.
  readouts:
  - target: Senescence-Associated Cell Cycle Arrest
    relationship: READOUT_OF
    direction: POSITIVE
    endpoint_context: PROGNOSTIC
    interpretation: >-
      Elevated p16INK4a reports the senescence-associated arrest and tracks
      senescent-cell burden and, in conforming diseases, severity.
    evidence:
    - reference: PMID:28230051
      supports: SUPPORT
      evidence_source: HUMAN_CLINICAL
      snippet: >-
        Here we demonstrate elevated abundance of senescence biomarkers in IPF
        lung, with p16 expression increasing with disease severity.
      explanation: >-
        Graded increase of p16 with severity supports its use as a prognostic
        readout of the senescence arrest.
- name: Senescence-associated beta-galactosidase activity
  presence: INCREASED
  biomarker_term:
    preferred_term: senescence-associated beta-galactosidase
    term:
      id: NCIT:C107438
      label: Beta-Galactosidase
  notes: >-
    Senescence-associated beta-galactosidase (SA-beta-gal) activity at pH 6 is the
    classic histochemical marker used to identify senescent cells in tissue and in
    culture; it reports the accumulated senescent-cell burden rather than a single
    pathway.
  evidence:
  - reference: PMID:29477613
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      the nonspecificity of current senescence markers and the existence of
      different senescence programs strongly limit these tasks
    explanation: >-
      The Hallmarks of Cellular Senescence review emphasizes that senescence
      markers (including SA-beta-gal) are individually nonspecific, supporting use
      of SA-beta-gal as a supportive rather than definitive readout.
  readouts:
  - target: Senescent Cell Accumulation
    relationship: READOUT_OF
    direction: POSITIVE
    endpoint_context: DIAGNOSTIC
    interpretation: >-
      Increased SA-beta-gal-positive cells report the accumulated senescent-cell
      burden in a tissue, though the marker is not fully specific in isolation.
    evidence:
    - reference: PMID:31675495
      supports: SUPPORT
      evidence_source: OTHER
      snippet: >-
        defining and discussing key cellular and molecular features of
        senescence and offering recommendations on how to use them as biomarkers
      explanation: >-
        The International Cell Senescence Association consensus offers
        recommendations on using key senescence features (such as SA-beta-gal)
        as biomarkers, directly supporting SA-beta-gal as a readout of
        senescent-cell burden.
treatments:
- name: Senolytic Therapy (Dasatinib plus Quercetin)
  description: >-
    Senolytics are drugs that selectively kill senescent cells by disabling their
    pro-survival (anti-apoptotic) networks, thereby depleting the accumulated
    senescent-cell reservoir. The prototypical combination is dasatinib plus
    quercetin (D+Q). Distinct from senomorphics, which instead suppress the SASP
    without killing the cells. Represents the senescence drug-target design
    pattern for conforming disorders.
  therapeutic_modality: SMALL_MOLECULE
  treatment_term:
    preferred_term: Pharmacotherapy
    term:
      id: NCIT:C15986
      label: Pharmacotherapy
    therapeutic_agent:
    - preferred_term: dasatinib
      term:
        id: CHEBI:49375
        label: dasatinib (anhydrous)
    - preferred_term: quercetin
      term:
        id: CHEBI:16243
        label: quercetin
  target_mechanisms:
  - target: Senescent Cell Accumulation
    treatment_effect: INHIBITS
    description: >-
      Senolytics selectively eliminate senescent cells, depleting the accumulated
      burden that sustains the pathogenic SASP and downstream tissue dysfunction.
  evidence:
  - reference: PMID:25754370
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: >-
      Here, we describe the rationale for identification and validation of a new
      class of drugs termed senolytics, which selectively kill senescent cells.
    explanation: >-
      Defines senolytics as agents that selectively kill senescent cells,
      establishing the drug-target rationale. Evidence source is IN_VITRO
      (transcriptomic discovery and cell-based validation).
  - reference: PMID:28436958
    supports: SUPPORT
    evidence_source: MODEL_ORGANISM
    snippet: >-
      We found that SnCs accumulated in the articular cartilage and synovium after
      ACLT, and selective elimination of these cells attenuated the development of
      post-traumatic OA, reduced pain and increased cartilage development.
    explanation: >-
      In a mouse osteoarthritis model, selective elimination of senescent cells
      attenuates disease, validating the senolytic target. Evidence source is
      MODEL_ORGANISM (transgenic and aged mice).
