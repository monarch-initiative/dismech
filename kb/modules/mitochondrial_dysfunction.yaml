name: Mitochondrial Dysfunction Module
description: >-
  A conserved mechanism module for the hallmark of aging (Lopez-Otin et al.)
  termed mitochondrial dysfunction: the age-associated decline of mitochondrial
  quality and bioenergetic capacity and its downstream consequences. Because
  mitochondria convert dietary calories into ATP by oxidative phosphorylation
  while generating reactive oxygen species (ROS) as a by-product, and because
  mitochondrial DNA (mtDNA) is present in many copies and encodes essential
  respiratory-chain subunits, post-mitotic tissues accumulate somatic mtDNA
  mutations and respiratory-chain dysfunction with age. Declining bioenergetics
  and rising oxidative stress are incompletely counteracted because mitophagy
  (autophagic clearance of damaged mitochondria) also wanes, so dysfunctional,
  ROS-producing, pro-inflammatory mitochondria accumulate. Mitochondrial
  dysfunction feeds several other hallmarks - cellular senescence, chronic
  inflammation, and the decline in stem-cell activity - and converges on
  age-related tissue dysfunction. Individual disorder entries declare
  conformance via conforms_to on their pathophysiology nodes, substituting the
  disease-specific lesion (e.g. primary mtDNA/nuclear respiratory-chain defects
  in mitochondrial disease, or secondary mitochondrial injury in
  neurodegeneration and metabolic disease) while preserving the conserved
  damage -> bioenergetic-decline/ROS -> impaired-clearance -> tissue-decline
  chain.
category: Module
creation_date: "2026-07-01T00:00:00Z"
notes: >-
  This is a mechanism module, not a specific disease. Disorder entries
  reference individual nodes via conforms_to (e.g.,
  "mitochondrial_dysfunction#Bioenergetic Decline and Oxidative Stress").
  Conforming nodes in disorder files should include the corresponding
  biological processes and causal edges, specialized to their disease context.
  The module is intentionally kept lean and deliberately does NOT adjudicate the
  contested mitochondrial free-radical theory of aging or embed disease-specific
  mtDNA lesions; such claims belong on the relevant disorder entry. Complements
  cellular_senescence and inflammaging (mitochondrial dysfunction is an upstream
  driver of both) and deregulated_nutrient_sensing (mitophagy is an autophagic
  quality-control arm). Key conformance target:
  "mitochondrial_dysfunction#Bioenergetic Decline and Oxidative Stress".
pathophysiology:
- name: Mitochondrial Damage and mtDNA Mutation
  description: >-
    With age, post-mitotic tissues accumulate somatic mitochondrial DNA (mtDNA)
    mutations and respiratory-chain damage. Because mtDNA encodes essential
    subunits of the oxidative-phosphorylation machinery and exists in many
    copies per cell, this heritable mitochondrial damage is the initiating
    lesion that compromises energy production.
  role: trigger
  biological_processes:
  - preferred_term: Aerobic Respiration
    term:
      id: GO:0009060
      label: aerobic respiration
    modifier: DECREASED
  evidence:
  - reference: PMID:23454757
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Somatic mitochondrial DNA (mtDNA) mutations and respiratory chain
      dysfunction accompany normal aging
    explanation: >-
      Establishes accumulation of somatic mtDNA mutations and respiratory-chain
      dysfunction with normal aging, the initiating lesion of this module.
      Evidence source is OTHER because this is a review.
  - reference: PMID:16285865
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      I propose that the delayed-onset and progressive course of the age-related
      diseases results from the accumulation of somatic mutations in the mtDNAs
      of post-mitotic tissues.
    explanation: >-
      Proposes accumulation of somatic mtDNA mutations in post-mitotic tissues as
      the basis of age-related disease, supporting this trigger node. Evidence
      source is OTHER because this is a review.
  downstream:
  - target: Bioenergetic Decline and Oxidative Stress
- name: Bioenergetic Decline and Oxidative Stress
  description: >-
    Damaged mitochondria produce less ATP by oxidative phosphorylation while
    generating more reactive oxygen species (ROS) as a toxic by-product. This
    fall in mitochondrial quality and activity - correlated with the development
    of a wide range of age-related diseases - is the central effector state that
    disease-specific mitochondrial lesions converge upon.
  role: central_effector
  biological_processes:
  - preferred_term: Oxidative Phosphorylation
    term:
      id: GO:0006119
      label: oxidative phosphorylation
    modifier: DECREASED
  - preferred_term: Reactive Oxygen Species Metabolism
    term:
      id: GO:0072593
      label: reactive oxygen species metabolic process
    modifier: INCREASED
  evidence:
  - reference: PMID:26942670
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      A decline in mitochondrial quality and activity has been associated with
      normal aging and correlated with the development of a wide range of
      age-related diseases.
    explanation: >-
      Establishes the decline in mitochondrial quality/activity as an aging
      correlate and driver of age-related disease, the central effector modeled
      here. Evidence source is OTHER because this is a review.
  - reference: PMID:16285865
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Since the mitochondria use oxidative phosphorylation (OXPHOS) to convert
      dietary calories into usable energy, generating reactive oxygen species
      (ROS) as a toxic by-product
    explanation: >-
      Describes oxidative phosphorylation and ROS generation, the bioenergetic
      and oxidative-stress axes of this node. Evidence source is OTHER because
      this is a review.
  downstream:
  - target: Impaired Mitophagy and Quality Control
  - target: Mitochondrial Contribution to Senescence and Inflammation
- name: Impaired Mitophagy and Quality Control
  description: >-
    Autophagic turnover specific for mitochondria (mitophagy) normally
    eliminates dysfunctional or damaged mitochondria, counteracting
    degeneration and dampening inflammation. When mitophagy and general
    autophagy decline with age, damaged mitochondria are not cleared and
    accumulate, amplifying bioenergetic failure and pro-inflammatory,
    pro-apoptotic signaling.
  role: amplifier
  biological_processes:
  - preferred_term: Mitophagy
    term:
      id: GO:0000422
      label: autophagy of mitochondrion
    modifier: DECREASED
  evidence:
  - reference: PMID:21868666
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Autophagic turnover of cellular constituents, be it general or specific
      for mitochondria (mitophagy), eliminates dysfunctional or damaged
      mitochondria, thus counteracting degeneration, dampening inflammation, and
      preventing unwarranted cell loss.
    explanation: >-
      Establishes mitophagy as the quality-control mechanism whose decline
      permits accumulation of damaged mitochondria, the amplifying step modeled
      here. Evidence source is OTHER because this is a review.
  downstream:
  - target: Age-Related Tissue Dysfunction
- name: Mitochondrial Contribution to Senescence and Inflammation
  description: >-
    Beyond energy failure, dysfunctional mitochondria drive other aging
    hallmarks: they contribute to cellular senescence, chronic inflammation
    (via pro-inflammatory signaling), and the age-dependent decline in
    stem-cell activity. This node is the conserved interface at which
    mitochondrial dysfunction feeds the senescence and inflammaging modules.
  role: amplifier
  biological_processes:
  - preferred_term: Inflammatory Response
    term:
      id: GO:0006954
      label: inflammatory response
    modifier: INCREASED
  evidence:
  - reference: PMID:26942670
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      we discuss how mitochondria contribute to specific aspects of the aging
      process, including cellular senescence, chronic inflammation, and the
      age-dependent decline in stem cell activity
    explanation: >-
      Establishes that mitochondria contribute to senescence, chronic
      inflammation, and stem-cell decline, the cross-hallmark interface modeled
      here. Evidence source is OTHER because this is a review.
  - reference: PMID:21868666
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Moreover, mitochondria have an important role in pro-inflammatory
      signaling.
    explanation: >-
      States the role of mitochondria in pro-inflammatory signaling, linking this
      node to inflammaging. Evidence source is OTHER because this is a review.
  downstream:
  - target: Age-Related Tissue Dysfunction
- name: Age-Related Tissue Dysfunction
  description: >-
    The combination of bioenergetic decline, oxidative stress, insufficient
    mitochondrial clearance, and mitochondria-driven senescence and inflammation
    degrades tissue function. This is the conserved consequence by which
    mitochondrial dysfunction contributes causally to age-related pathology; the
    specific organ or disease phenotype is supplied by the conforming disorder.
  role: consequence
  evidence:
  - reference: PMID:23454757
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      accumulating evidence has suggested a causative link between mitochondrial
      dysfunction and major phenotypes associated with aging
    explanation: >-
      States a causative link between mitochondrial dysfunction and aging
      phenotypes, the consequence arm modeled here. Evidence source is OTHER
      because this is a review.
  - reference: PMID:21868666
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      a combination of mitochondrial dysfunction and insufficient autophagy may
      contribute to multiple aging-associated pathologies
    explanation: >-
      Concludes that mitochondrial dysfunction with insufficient autophagy drives
      multiple aging pathologies, supporting this outcome node. Evidence source
      is OTHER because this is a review.
