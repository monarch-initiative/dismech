name: Bacterial Folate Synthesis Inhibition Module
description: >-
  A conserved antibacterial drug-mechanism module representing the bacterial
  de novo tetrahydrofolate (THF) biosynthesis pathway, which bacteria must build
  themselves because — unlike humans — they cannot take up preformed folate from
  the diet. Two sequential enzymes are antibacterial targets: dihydropteroate
  synthase (DHPS), inhibited by the sulfonamides (sulfamethoxazole, dapsone), and
  dihydrofolate reductase (DHFR), inhibited by trimethoprim. Blocking THF
  synthesis starves the cell of the one-carbon donors needed for nucleotide and
  amino-acid synthesis. Combining a DHPS inhibitor with a DHFR inhibitor
  (co-trimoxazole = trimethoprim-sulfamethoxazole) produces sequential blockade
  with synergistic, bactericidal activity. DHPS is unique to prokaryotes, giving
  selectivity. This module defines the mechanism-of-action design pattern for
  antifolate treatments: conforming entries link a treatment to the DHPS/DHFR
  target via target_mechanisms.
category: Module
creation_date: "2026-06-20T00:00:00Z"
notes: >-
  Antibacterial drug-mechanism module, not a specific disease. Disorder entries
  reference nodes via conforms_to (e.g.,
  "bacterial_folate_synthesis_inhibition#Bacterial Tetrahydrofolate Synthesis
  (Antifolate Target)"), and their sulfonamide/trimethoprim/dapsone treatments
  point at that node via target_mechanisms. Key conformance / treatment target:
  "Bacterial Tetrahydrofolate Synthesis (Antifolate Target)". Dapsone is a DHPS
  inhibitor and conforms here (e.g. leprosy). Nodes are druggable steps, not
  individual drugs.
pathophysiology:
- name: Bacterial Tetrahydrofolate Synthesis (Antifolate Target)
  description: >-
    Bacteria synthesize tetrahydrofolate (THF) de novo because they cannot import
    preformed folate. Two sequential enzymes are drug targets: dihydropteroate
    synthase (DHPS), the target of the sulfonamides (sulfamethoxazole) and the
    sulfone dapsone, and dihydrofolate reductase (DHFR), the target of
    trimethoprim. THF supplies the one-carbon units required for thymidine, purine,
    and methionine synthesis, so blocking the pathway halts nucleic-acid and
    protein synthesis. DHPS is unique to prokaryotes, which gives sulfonamides
    their selectivity; co-trimoxazole combines DHPS and DHFR inhibition for
    synergistic sequential blockade.
  role: therapeutic_vulnerability
  biological_processes:
  - preferred_term: Tetrahydrofolate Biosynthetic Process
    term:
      id: GO:0046654
      label: tetrahydrofolate biosynthetic process
  evidence:
  - reference: PMID:23627736
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      The other two enzyme families are involved in the synthesis of
      tetrahydrofolate (THF), i.e. dihydropteroate synthase (DHPS) and
      dihydrofolate reductase.
    explanation: >-
      Review establishing DHPS and DHFR in tetrahydrofolate synthesis as the
      sulfonamide and trimethoprim targets this node represents. Evidence source
      is OTHER as this is a review article.
  - reference: PMID:27025730
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      An additional anti-folate target is dihyropteroate synthase (DHPS), which
      is unique to prokaryotes as they cannot acquire folate through dietary
      means.
    explanation: >-
      Supports the prokaryote-specific DHPS target and the selectivity basis noted
      in this node. Evidence source is OTHER as this is a review article.
  downstream:
  - target: Antifolate Target Resistance
    description: >-
      Drug-insensitive DHPS/DHFR variants protect the pathway, escaping antifolate
      therapy.

- name: Antifolate Target Resistance
  description: >-
    Resistance to antifolates is mainly due to horizontal acquisition of genes
    encoding drug-insensitive variants of the target enzymes — alternative
    dihydropteroate synthase (sul genes) and dihydrofolate reductase (dfr genes) —
    and to chromosomal target mutations. This is a common cause of co-trimoxazole
    failure and shapes its use in susceptibility-guided therapy.
  role: adaptive_escape
  biological_processes:
  - preferred_term: Response to Antibiotic
    term:
      id: GO:0046677
      label: response to antibiotic
  evidence:
  - reference: PMID:25435309
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      changes in the structure and protection of antibiotic targets and the
      direct modification or inactivation of antibiotics.
    explanation: >-
      General review of resistance mechanisms including target alteration —
      here drug-insensitive DHPS/DHFR variants. Evidence source is OTHER as this
      is a review article.
