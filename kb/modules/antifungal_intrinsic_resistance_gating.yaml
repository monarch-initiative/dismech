name: Antifungal Intrinsic Resistance Gating Module
description: >-
  A conserved antifungal drug-choice-gating module representing the species-level
  intrinsic resistance that excludes whole antifungal classes a priori, before any
  susceptibility testing. Unlike the fungal drug-target modules (ergosterol
  synthesis, ergosterol-membrane binding, glucan-synthase, nucleic-acid
  antimetabolite), the nodes here are not a single druggable enzyme but a gating
  principle: the small antifungal armamentarium is sharply constrained by organism
  identity, because the target a class needs is absent, divergent, or non-viable in
  certain fungi. The paradigm cases are fixed by phylogeny — Aspergillus is
  intrinsically resistant to fluconazole (requiring a mold-active azole such as
  voriconazole or isavuconazole, or amphotericin B); Cryptococcus is intrinsically
  resistant to the echinocandins (the β-1,3-glucan-synthase target is present but
  not a viable drug target); and the Mucorales (mucormycosis) are intrinsically
  resistant to both voriconazole and the echinocandins, leaving amphotericin B or
  isavuconazole. Layered on top of this fixed intrinsic landscape, emerging
  multidrug-resistant species — most notably Candida auris — acquire resistance
  across the azoles, polyenes, and echinocandins simultaneously, further narrowing
  empiric options. This module encodes WHY empiric antifungal selection depends on
  organism identification rather than on "any antifungal," complementing the
  target-based modules that explain how a given drug works once a viable target
  exists.
category: Module
creation_date: "2026-06-24T00:00:00Z"
notes: >-
  This is an antifungal drug-mechanism (species-level gating) module, not a specific
  disease. It is the antifungal analog of the antibacterial
  intracellular_pathogen_persistence module: the nodes are gating principles, not
  enzyme targets. Disorder entries for mycoses reference nodes via conforms_to
  (e.g., "antifungal_intrinsic_resistance_gating#Species-Level Intrinsic Antifungal
  Resistance"), and their treatments may point at the gating node via
  target_mechanisms to record why a whole class is or is not an option. Key
  conformance / gating target: "Species-Level Intrinsic Antifungal Resistance" (the
  Aspergillus/fluconazole, Cryptococcus/echinocandin, Mucorales/voriconazole+
  echinocandin exclusions). A conforming disease typically ALSO conforms to a
  target-based antifungal module (ergosterol synthesis, ergosterol-membrane
  binding, glucan synthase, or nucleic-acid antimetabolite) for the molecular
  mechanism of whatever drug remains viable, with this module explaining which
  classes are excluded a priori by the infecting species. See projects/ANTIFUNGAL.md
  (the antifungal_intrinsic_resistance_gating row of the proposed-module table and
  the "Intrinsic species resistance" axis), where this module is positioned as the
  species-level class-exclusion gate.
pathophysiology:
- name: Species-Level Intrinsic Antifungal Resistance
  description: >-
    The species identity of the infecting fungus excludes whole antifungal classes
    before any susceptibility result, because the molecular target a class requires
    is absent, divergent, or non-viable in that organism. This is the central
    gating principle of the module and its canonical conformance / gating target.
    Three fixed, phylogeny-determined exclusions recur clinically: (1) Aspergillus
    species are intrinsically resistant to fluconazole, so invasive aspergillosis
    requires a mold-active azole (voriconazole, isavuconazole, posaconazole,
    itraconazole) or amphotericin B; (2) Cryptococcus species display negligible
    susceptibility to the echinocandins — the β-1,3-glucan-synthase target exists
    but is not a viable drug target — so cryptococcosis is treated with amphotericin
    B, flucytosine, and fluconazole, never an echinocandin; and (3) the Mucorales
    (agents of mucormycosis) are intrinsically resistant to both voriconazole and
    the echinocandins, leaving amphotericin B (typically lipid formulations) or
    isavuconazole as the only active options. Because these exclusions track
    monophyletic taxonomic groups, members of the same order behave alike, and
    empiric drug choice is therefore gated by organism identification rather than by
    in-vitro testing of the individual isolate.
  role: intrinsic_resistance
  evidence:
  - reference: PMID:33558691
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      the only new class of antifungal drugs developed in decades, the
      echinocandins, displays negligible
      antifungal activity against Cryptococcus spp.
    explanation: >-
      Review of cryptococcal treatment establishing that the echinocandins have
      negligible activity against Cryptococcus spp., the intrinsic resistance that
      excludes this whole class a priori for cryptococcosis. Evidence source is
      OTHER as this is a review article.
  - reference: PMID:38445857
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Several orders (Hypocreales,
      Microascales, and Mucorales) invariably showed resistance.
    explanation: >-
      Kingdom-wide meta-analysis of MIC data against eight antifungals showing that
      the Mucorales (among others) invariably show resistance at the ordinal level,
      supporting species/order-level intrinsic resistance as the gating principle.
      Evidence source is OTHER as this is a meta-analysis review.
  - reference: PMID:31159914
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      echinocandins for in-
      fections with Candida spp. (candidemia response rates: 75.6% for anidulafungin
      vs. 60.2% for fluconazole) and azole antimycotic drugs for infections with
      Aspergillus spp.
    explanation: >-
      Guideline-based invasive fungal infection review showing that first-line drug
      choice is organism-determined (echinocandins for Candida, mold-active azoles
      for Aspergillus), the clinical consequence of species-level gating. Evidence
      source is OTHER as this is a review article.
  downstream:
  - target: Acquired Multidrug Resistance in Emerging Species (Candida auris)
    description: >-
      On top of the fixed intrinsic-resistance landscape, emerging species acquire
      resistance across multiple classes simultaneously, further narrowing the
      already organism-gated options.

- name: Acquired Multidrug Resistance in Emerging Species (Candida auris)
  description: >-
    Beyond the phylogenetically fixed intrinsic exclusions, a second gating layer
    arises from emerging pathogens that acquire resistance across several antifungal
    classes at once. The exemplar is Candida auris, an emerging multidrug-resistant
    species in which acquired resistance to the azoles, echinocandins, and polyenes
    can co-occur, collapsing the available armamentarium and forcing
    susceptibility-guided, often last-line therapy. More broadly, multidrug
    resistance to the azoles, echinocandins, and polyenes is increasingly reported
    across Candida species (notably C. glabrata and now C. auris), driven by overall
    antifungal use, subtherapeutic drug levels, and biofilm sequestration. This node
    captures why species identification must be coupled to surveillance of acquired
    resistance: an organism whose class is nominally available may nonetheless be
    untreatable with it, so empiric choice and stewardship must account for the
    emergence of pan-resistant strains.
  role: adaptive_escape
  biological_processes:
  - preferred_term: Response to Xenobiotic Stimulus
    term:
      id: GO:0009410
      label: response to xenobiotic stimulus
  evidence:
  - reference: PMID:33091071
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      the emerging multidrug-resistant fungal
      pathogen Candida auris is becoming a worldwide public health threat
    explanation: >-
      Review of Candida auris establishing it as an emerging multidrug-resistant
      pathogen of public-health concern, the exemplar of acquired pan-resistance
      that gates antifungal choice. Evidence source is OTHER as this is a review
      article.
  - reference: PMID:28911043
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      increasing reports of multidrug resistance to
      the azoles, echinocandins, and polyenes have occurred in several Candida
      species, most notably Candida glabrata and more recently Candida auris.
    explanation: >-
      Review of multidrug-resistant Candida documenting acquired resistance spanning
      the azoles, echinocandins, and polyenes in several Candida species (C.
      glabrata, C. auris), supporting this acquired-resistance gating node. Evidence
      source is OTHER as this is a review article.
