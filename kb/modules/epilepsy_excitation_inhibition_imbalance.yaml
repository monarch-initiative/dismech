name: Epilepsy Excitation-Inhibition Imbalance Module
description: >-
  A conserved network-hyperexcitability module representing the final common
  pathway of the epilepsies: a primary lesion in ion-channel function, synaptic
  transmission, or inhibitory circuitry shifts the balance of excitation and
  inhibition toward excitation, producing neuronal hyperexcitability and
  hypersynchronous firing that generate recurrent seizures. Genetic
  (channelopathy/synaptopathy), structural, metabolic, and acquired epilepsies
  differ in the upstream lesion but converge on excitation/inhibition (E/I)
  imbalance. Individual disorder entries declare conformance via conforms_to on
  their pathophysiology nodes, substituting the disorder-specific lesion (e.g.,
  SCN1A loss in Dravet syndrome, GABA-receptor variant, mTOR-pathway malformation)
  while preserving the conserved E/I-imbalance-to-seizure chain.
category: Module
creation_date: "2026-06-06T00:00:00Z"
notes: >-
  This is a mechanism module, not a specific disease. Disorder entries reference
  individual nodes via conforms_to (e.g.,
  "epilepsy_excitation_inhibition_imbalance#Neuronal Hyperexcitability and
  Hypersynchrony"). Conforming nodes should substitute the disorder-specific
  driver of E/I imbalance: sodium/potassium/calcium channel variants in genetic
  channelopathies, GABAergic interneuron dysfunction, mTOR-pathway cortical
  malformations, or acquired network reorganization after injury. The E/I-balance
  framework is a useful paradigm but is acknowledged in the literature to be an
  incomplete account of all epilepsy mechanisms.
pathophysiology:
- name: Ion Channel and Synaptic Dysfunction
  description: >-
    The conserved initiating lesion is an abnormality of neuronal ion channels or
    synaptic transmission that alters the intrinsic and synaptic excitability of
    neurons. This encompasses voltage-gated channel variants, neurotransmitter
    receptor defects, and synaptic-protein abnormalities across genetic and
    acquired epilepsies.
  role: trigger
  cell_types:
  - preferred_term: Neuron
    term:
      id: CL:0000540
      label: neuron
  biological_processes:
  - preferred_term: Regulation of Membrane Potential
    term:
      id: GO:0042391
      label: regulation of membrane potential
    modifier: ABNORMAL
  - preferred_term: Chemical Synaptic Transmission
    term:
      id: GO:0007268
      label: chemical synaptic transmission
    modifier: ABNORMAL
  evidence:
  - reference: PMID:30764523
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Mechanisms underlying seizures and epilepsy have traditionally been
      considered to involve abnormalities of ion channels or synaptic function.
    explanation: >-
      Establishes ion-channel and synaptic abnormalities as the conserved
      initiating lesion underlying seizures and epilepsy. Evidence source is OTHER
      because this is a review article.
  downstream:
  - target: Excitation-Inhibition Imbalance
- name: Excitation-Inhibition Imbalance
  description: >-
    Channel and synaptic dysfunction shift the balance between excitatory
    (glutamatergic) and inhibitory (GABAergic) signaling toward net excitation,
    through increased excitation, decreased inhibition, or both. Loss of GABAergic
    inhibitory tone is a recurrent contributor across epilepsy syndromes.
  role: amplifier
  cell_types:
  - preferred_term: GABAergic Neuron
    term:
      id: CL:0000617
      label: GABAergic neuron
  biological_processes:
  - preferred_term: GABA Signaling Pathway
    term:
      id: GO:0007214
      label: gamma-aminobutyric acid signaling pathway
    modifier: DECREASED
  evidence:
  - reference: PMID:30764523
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Those considerations gave rise to the excitation/inhibition (E/I) imbalance
      theory, whereby increased excitation, decreased inhibition, or both favor a
      hyperexcitable state and an increased propensity for seizure generation and
      epileptogenesis.
    explanation: >-
      Directly defines the E/I imbalance paradigm in which increased excitation
      and/or decreased inhibition favor hyperexcitability, the conserved amplifier
      step. Evidence source is OTHER because this is a review article.
  - reference: PMID:33808762
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      In the brain, GABA is a major inhibitory neurotransmitter and plays a
      pivotal role in maintaining E/I balance.
    explanation: >-
      Establishes GABAergic signaling as the principal inhibitory arm whose loss
      contributes to E/I imbalance in epilepsy. Evidence source is OTHER because
      this is a review article.
  downstream:
  - target: Neuronal Hyperexcitability and Hypersynchrony
- name: Neuronal Hyperexcitability and Hypersynchrony
  description: >-
    Net excitatory bias produces a hyperexcitable neuronal state in which
    populations of neurons fire excessively and synchronously. This hypersynchrony
    is the central effector that converts altered excitability into paroxysmal
    network discharges.
  role: central_effector
  biological_processes:
  - preferred_term: Action Potential
    term:
      id: GO:0001508
      label: action potential
    modifier: INCREASED
  evidence:
  - reference: PMID:17618543
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      genes, developmental mechanisms, and neuronal plasticity play major roles in
      creating a state of underlying hyperexcitability.
    explanation: >-
      Describes the convergence of multiple mechanisms on a state of underlying
      hyperexcitability, the central effector of this module. Evidence source is
      OTHER because this is a review article.
  downstream:
  - target: Seizure Generation and Epileptogenesis
- name: Seizure Generation and Epileptogenesis
  description: >-
    Hypersynchronous discharges manifest as seizures. Over time, seizure-related
    and lesion-related processes drive epileptogenesis — network reorganization
    that lowers seizure threshold and renders the brain chronically prone to
    spontaneous seizures.
  role: effector
  evidence:
  - reference: PMID:30764523
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      increased excitation, decreased inhibition, or both favor a hyperexcitable
      state and an increased propensity for seizure generation and epileptogenesis.
    explanation: >-
      Links the hyperexcitable state to seizure generation and epileptogenesis,
      the effector step of this module. Evidence source is OTHER because this is a
      review article.
  downstream:
  - target: Recurrent Unprovoked Seizures
- name: Recurrent Unprovoked Seizures
  description: >-
    The clinical endpoint is the state of recurrent, unprovoked seizures that
    defines epilepsy. Seizures may continue to evolve over the lifespan as the
    underlying network continues to reorganize.
  role: consequence
  evidence:
  - reference: PMID:17618543
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      the state of recurrent unprovoked seizures that defines epilepsy itself.
    explanation: >-
      Directly identifies recurrent unprovoked seizures as the defining clinical
      consequence of this module. Evidence source is OTHER because this is a
      review article.
