name: Activating Invasion and Metastasis Module
description: >-
  A conserved mechanism module for the sixth hallmark of cancer (Hanahan &
  Weinberg): activation of invasion and metastasis, the multistep
  invasion-metastasis cascade that accounts for the great majority of
  cancer deaths. The conserved causal chain runs from activation of an
  epithelial-mesenchymal transition (EMT) program - loss of E-cadherin and
  cell-cell junctions, acquisition of a motile, invasive mesenchymal
  phenotype driven by EMT transcription factors (SNAIL, SLUG, ZEB1/2,
  TWIST) - through local invasion across the basement membrane and stroma
  via matrix-degrading proteases (MMPs), into intravasation, survival in the
  circulation as circulating tumor cells, extravasation at a distant site,
  and finally metastatic colonization, the rate-limiting step in which
  disseminated cells adapt to the foreign microenvironment and resume
  proliferation (often after a period of dormancy). Individual disorder
  entries declare conformance via conforms_to, substituting
  tumor-type-specific drivers and organotropic patterns (e.g., bone-tropic breast
  cancer, liver-tropic colorectal cancer). This module connects to
  tumor_angiogenesis (vasculature provides the route for dissemination) and
  tumor_promoting_inflammation (stromal cells facilitate invasion).
category: Module
creation_date: "2026-06-27T00:00:00Z"
notes: >-
  This is a mechanism module, not a specific disease. Disorder entries
  reference individual nodes via conforms_to (e.g.,
  "invasion_and_metastasis#Local Invasion and Intravasation" or
  "invasion_and_metastasis#Metastatic Colonization"). The module defines the
  expected pathophysiology structure; conforming nodes in disorder files
  should include the corresponding cell types, biological processes, and
  causal edges, specialized to their tumor context. Key tumor-specific
  substitutions: carcinomas use classical E-cadherin-loss EMT; organotropism
  (Paget "seed and soil") substitutes the target organ and its premetastatic
  niche. Key conformance target: "invasion_and_metastasis#Metastatic
  Colonization".
pathophysiology:
- name: Epithelial-Mesenchymal Transition Activation
  description: >-
    Tumor cells reactivate the latent embryonic EMT program. EMT
    transcription factors (SNAIL, SLUG, ZEB1/2, TWIST), induced by TGF-beta,
    Wnt, and signals from the tumor stroma, repress E-cadherin and other
    epithelial genes and induce mesenchymal markers. Cells lose apical-basal
    polarity and cell-cell adhesion and acquire a motile, invasive
    phenotype. EMT is typically partial and reversible
    (epithelial-mesenchymal plasticity), enabling later reversion (MET) at the
    metastatic site.
  role: trigger
  biological_processes:
  - preferred_term: Epithelial to Mesenchymal Transition
    term:
      id: GO:0001837
      label: epithelial to mesenchymal transition
    modifier: INCREASED
  - preferred_term: Negative Regulation of Cell Adhesion
    term:
      id: GO:0007162
      label: negative regulation of cell adhesion
    modifier: INCREASED
  evidence:
  - reference: PMID:28187288
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      the biological programs that underlie the dissemination and metastatic
      outgrowth of cancer cells are beginning to come into view
    explanation: >-
      Frames the cellular programs (including EMT) that drive dissemination
      and metastatic outgrowth, the trigger of this module. Evidence source
      is OTHER because this is a review article.
  downstream:
  - target: Local Invasion and Intravasation

- name: Local Invasion and Intravasation
  description: >-
    Motile tumor cells invade locally, degrading the basement membrane and
    extracellular matrix with matrix metalloproteinases and other proteases
    and migrating through the stroma, often led by invadopodia and aided by
    tumor-associated macrophages and cancer-associated fibroblasts. Invading
    cells reach and penetrate the walls of blood or lymphatic vessels
    (intravasation), entering the circulation.
  role: effector
  biological_processes:
  - preferred_term: Cell Migration
    term:
      id: GO:0016477
      label: cell migration
    modifier: INCREASED
  - preferred_term: Extracellular Matrix Organization
    term:
      id: GO:0030198
      label: extracellular matrix organization
    modifier: INCREASED
  downstream:
  - target: Circulatory Survival and Extravasation

- name: Circulatory Survival and Extravasation
  description: >-
    As circulating tumor cells, disseminating cells must survive loss of
    matrix attachment (resisting anoikis), shear stress, and immune
    surveillance, sometimes shielded by platelet cloaking. Surviving cells
    arrest in the microvasculature of a distant organ and extravasate across
    the endothelium into the parenchyma, a step shaped by organ-specific
    adhesion and chemokine cues.
  role: effector
  biological_processes:
  - preferred_term: Cell Migration
    term:
      id: GO:0016477
      label: cell migration
    modifier: INCREASED
  downstream:
  - target: Metastatic Colonization

- name: Metastatic Colonization
  description: >-
    Extravasated cells must adapt to the foreign microenvironment of the
    distant organ and re-initiate proliferation to form a clinically
    relevant macrometastasis. Most disseminated cells fail this step or enter
    prolonged dormancy; colonization is the rate-limiting and least efficient
    stage of the cascade, often requiring establishment of a supportive
    (pre-metastatic) niche and frequently a reversion toward an epithelial
    state (MET). Successful colonization produces the metastases responsible
    for most cancer mortality.
  role: consequence
  biological_processes:
  - preferred_term: Cell Population Proliferation
    term:
      id: GO:0008283
      label: cell population proliferation
    modifier: INCREASED
  evidence:
  - reference: PMID:28187288
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Metastases account for the great majority of cancer-associated deaths,
      yet this complex process remains the least understood aspect of cancer
      biology.
    explanation: >-
      Establishes metastatic colonization as the clinically decisive
      endpoint of the invasion-metastasis cascade, the consequence modeled
      here. Evidence source is OTHER because this is a review article.
  - reference: PMID:21376230
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      They include sustaining proliferative signaling, evading growth
      suppressors, resisting cell death, enabling replicative immortality,
      inducing angiogenesis, and activating invasion and metastasis.
    explanation: >-
      Hanahan & Weinberg list activating invasion and metastasis as a core
      hallmark capability modeled here. Evidence source is OTHER because this
      is a review article.
