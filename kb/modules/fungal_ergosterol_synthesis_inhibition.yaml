name: Fungal Ergosterol Synthesis Inhibition Module
description: >-
  A conserved antifungal drug-mechanism module representing the fungal ergosterol
  biosynthesis pathway that the most widely used antifungal classes inhibit.
  Ergosterol is the fungal-specific membrane sterol, the functional analogue of
  cholesterol in mammalian cells; it maintains membrane fluidity, integrity, and
  the function of membrane-embedded proteins, and its biosynthesis is the most
  exploited antifungal target because the pathway is essential and fungal-specific.
  Two enzymes in the pathway are druggable: lanosterol 14-alpha-demethylase
  (Cyp51/Erg11), a cytochrome P450 that demethylates lanosterol and is the target
  of the azoles (the triazoles fluconazole, itraconazole, voriconazole,
  posaconazole, and isavuconazole, and the topical imidazoles such as clotrimazole
  and miconazole) — the antifungal workhorse class; and squalene epoxidase (Erg1),
  the target of the allylamines terbinafine and naftifine. Inhibiting either
  enzyme blocks downstream ergosterol synthesis and causes accumulation of
  squalene or toxic methylated sterol intermediates, producing membrane
  dysfunction, growth inhibition, and (for terbinafine) fungicidal cell death.
  This module defines the mechanism-of-action design pattern for
  ergosterol-synthesis-targeting antifungal treatments: conforming fungal-disease
  entries link a treatment to the specific node it inhibits via target_mechanisms.
  It also encodes why azole therapy is failure-prone — point mutations in and
  overexpression of CYP51/ERG11, drug-efflux pumps (CDR/MDR), and the environmental
  Aspergillus TR34/L98H allele select for azole resistance.
category: Module
creation_date: "2026-06-24T00:00:00Z"
notes: >-
  This is an antifungal drug-mechanism module, not a specific disease. Disorder
  entries reference individual nodes via conforms_to (e.g.,
  "fungal_ergosterol_synthesis_inhibition#Ergosterol Biosynthesis - Lanosterol
  14-alpha-Demethylase (CYP51/ERG11) as Azole Target"), and their
  ergosterol-synthesis-targeting treatments point at the inhibited node via
  target_mechanisms (analogous to how cell-wall-active antibiotic treatments link
  to "bacterial_cell_wall_synthesis_inhibition#Peptidoglycan Cross-Linking by
  Penicillin-Binding Proteins"). Key conformance / treatment target: "Ergosterol
  Biosynthesis - Lanosterol 14-alpha-Demethylase (CYP51/ERG11) as Azole Target"
  (the azole target and the highest-coverage node, because azoles are used across
  nearly every mycosis). The module holds two distinct enzyme-target nodes — the
  CYP51 demethylase (azoles) and squalene epoxidase ERG1 (allylamines) — which
  converge on the shared ergosterol-depletion endpoint, parallel to how the
  bacterial folate module holds distinct DHPS and DHFR nodes. The module is
  pathogen-process-centric: nodes are druggable steps in the conserved pathway,
  not individual drugs; a given antifungal class maps to the step it inhibits. The
  resistance node captures the gating knowledge that distinguishes "an azole is
  used" from real drug selection — CYP51/ERG11 target alteration, efflux, and the
  environmentally selected Aspergillus TR34/L98H allele that mandate susceptibility
  testing and agent choice. See projects/ANTIFUNGAL.md for the broader
  drug-fungus strategy and the recommendation to keep the two ergosterol targets
  in one module.
pathophysiology:
- name: Ergosterol Biosynthesis - Lanosterol 14-alpha-Demethylase (CYP51/ERG11) as Azole Target
  description: >-
    Lanosterol 14-alpha-demethylase (Cyp51, encoded by ERG11/CYP51) is a fungal
    cytochrome P450 enzyme that catalyzes a key step in the ergosterol
    biosynthesis pathway, removing the 14-alpha-methyl group from lanosterol en
    route to ergosterol. It is the molecular target of the azole antifungals — the
    systemic triazoles fluconazole, itraconazole, voriconazole, posaconazole, and
    isavuconazole, and the topical imidazoles clotrimazole and miconazole. The
    azole heterocyclic nitrogen coordinates the heme iron in the enzyme's active
    site, blocking demethylase activity; the resulting depletion of ergosterol,
    accumulation of toxic methylated sterol intermediates, and growth inhibition
    are the antifungal effect. Because the enzyme is essential and fungal-specific,
    this is the central, most widely exploited node of the module and the canonical
    conformance / treatment target for azole therapy across mycoses.
  role: therapeutic_vulnerability
  biological_processes:
  - preferred_term: Ergosterol Biosynthetic Process
    term:
      id: GO:0006696
      label: ergosterol biosynthetic process
  evidence:
  - reference: PMID:33374996
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      The fungal cytochrome P450 enzyme sterol 14α-demethylase (SDM) is a key
      enzyme in the ergosterol biosynthesis pathway.
    explanation: >-
      Review establishing sterol 14-alpha-demethylase (Cyp51/Erg11) as a key
      cytochrome P450 enzyme of the ergosterol biosynthesis pathway, the azole
      drug target this node represents. Evidence source is OTHER as this is a
      review article.
  - reference: PMID:33374996
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      The binding of azoles to the active site of SDM results in a depletion of
      ergosterol, the accumulation of toxic intermediates and growth inhibition.
    explanation: >-
      Directly states the mechanism of action of the azoles at this node: binding
      the demethylase active site depletes ergosterol and arrests growth. Evidence
      source is OTHER as this is a review article.
  - reference: PMID:37151610
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      especially lanosterol 14a demethylase (CYP51) inhibition, which is one of
      the main target sites for antifungal activity
    explanation: >-
      Confirms lanosterol 14-alpha-demethylase (CYP51) as a principal antifungal
      target site. Evidence source is OTHER as this is a review article.
  downstream:
  - target: Ergosterol Depletion and Membrane Dysfunction
    description: >-
      Inhibiting the demethylase blocks ergosterol synthesis and accumulates toxic
      methylated sterol intermediates, producing membrane dysfunction and growth
      arrest.
  - target: Azole-Target Resistance
    description: >-
      Drug pressure on CYP51/ERG11 selects target mutations, overexpression, and
      efflux that escape azole inhibition.

- name: Ergosterol Biosynthesis - Squalene Epoxidase (ERG1) as Allylamine Target
  description: >-
    Squalene epoxidase (Erg1) catalyzes the epoxidation of squalene to
    2,3-oxidosqualene, an early and rate-limiting step of the ergosterol
    biosynthesis pathway upstream of lanosterol demethylase. It is the molecular
    target of the allylamine antifungals terbinafine and naftifine, which inhibit
    the enzyme non-competitively. Inhibition produces a dual effect: fungal cells
    accumulate high intracellular concentrations of squalene while becoming
    deficient in ergosterol. The squalene accumulation is believed to interfere
    with fungal membrane function and cell-wall synthesis and is closely associated
    with the fungicidal action of terbinafine, while the ergosterol deficiency
    accounts for growth inhibition. Because fungal squalene epoxidase is inhibited
    at far lower concentrations than the mammalian enzyme, allylamines act
    selectively on fungi. This is the second druggable enzyme node of the module
    and the conformance / treatment target for allylamine therapy.
  role: therapeutic_vulnerability
  biological_processes:
  - preferred_term: Ergosterol Biosynthetic Process
    term:
      id: GO:0006696
      label: ergosterol biosynthetic process
  evidence:
  - reference: PMID:1543672
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: >-
      Terbinafine (Lamisil) has primarily fungicidal action against many fungi as
      a result of its specific mechanism of squalene epoxidase inhibition.
    explanation: >-
      Mechanistic study establishing squalene epoxidase as the specific molecular
      target of the allylamine terbinafine. Evidence source is IN_VITRO as this is
      a biochemical/enzymatic characterization of the inhibition.
  - reference: PMID:1543672
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: >-
      Treated fungi accumulate squalene while becoming deficient in ergosterol, an
      essential component of fungal cell membranes.
    explanation: >-
      Directly states the dual consequence of squalene epoxidase inhibition —
      squalene accumulation and ergosterol deficiency — at this node. Evidence
      source is IN_VITRO as this is a biochemical study of the enzyme inhibition.
  downstream:
  - target: Ergosterol Depletion and Membrane Dysfunction
    description: >-
      Squalene epoxidase inhibition depletes ergosterol and accumulates squalene,
      converging on the shared membrane-dysfunction endpoint of the module.

- name: Ergosterol Depletion and Membrane Dysfunction
  description: >-
    Ergosterol is an essential component of the fungal plasma membrane, maintaining
    its integrity, fluidity, and the function of membrane-embedded proteins.
    Inhibition of either ergosterol-pathway enzyme — the azole-blocked
    14-alpha-demethylase or the allylamine-blocked squalene epoxidase — depletes
    ergosterol and accumulates abnormal sterol precursors (toxic 14-methylated
    sterols downstream of demethylase inhibition, or squalene downstream of
    epoxidase inhibition). The resulting membrane is structurally and functionally
    aberrant: permeability and the activity of membrane enzymes are disrupted,
    fungal growth is inhibited, and in the case of squalene accumulation the effect
    is fungicidal, with membrane damage and cell lysis. This is the shared effector
    node onto which both enzyme-target nodes converge — the antifungal consequence
    of engaging the ergosterol pathway.
  role: consequence
  biological_processes:
  - preferred_term: Ergosterol Biosynthetic Process
    term:
      id: GO:0006696
      label: ergosterol biosynthetic process
  evidence:
  - reference: PMID:1543672
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: >-
      The cidal action is closely associated with the development of high
      intracellular squalene concentrations, which are believed to interfere with
      fungal membrane function
    explanation: >-
      Supports the effector mechanism of this node: depletion of ergosterol with
      accumulation of squalene interferes with fungal membrane function and is
      fungicidal. Evidence source is IN_VITRO as this is a biochemical study.
  - reference: PMID:37151610
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      make damaging cell membranes, fungal growth inhibition, and fungal cell
      lysis.
    explanation: >-
      States the downstream consequences of ergosterol-pathway inhibition —
      membrane damage, growth inhibition, and cell lysis — captured by this node.
      Evidence source is OTHER as this is a review article.

- name: Azole-Target Resistance
  description: >-
    Azole therapy selects for resistance through several routes that map onto the
    demethylase target. Acquired resistance arises from amino-acid substitutions in
    the target enzyme Cyp51/Erg11 that reduce the affinity of azoles for the active
    site, and from overexpression of the target enzyme; in parallel, induction of
    ATP-binding cassette (CDR) and major facilitator superfamily (MDR) efflux pumps
    expels the drug. A distinctive environmentally selected mechanism in Aspergillus
    fumigatus is the TR34/L98H allele — a tandem repeat in the cyp51A promoter
    combined with an L98H coding mutation — driven by agricultural azole-fungicide
    use and conferring cross-resistance to clinical triazoles even in azole-naive
    patients. This node explains why azole monotherapy can fail against a specific
    isolate, why azole susceptibility testing and surveillance matter, and why agent
    choice (e.g. a different triazole or a non-azole class) is mechanism-driven.
  role: adaptive_escape
  biological_processes:
  - preferred_term: Response to Antibiotic
    term:
      id: GO:0046677
      label: response to antibiotic
  evidence:
  - reference: PMID:38878211
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Acquired resistance typically arises from mutations in the target enzyme,
      lanosterol 14-α-demethylase (Cyp51A), reduces the affinity of azole
      antifungal agents for the enzyme, rendering them less effective
    explanation: >-
      Review stating that acquired azole resistance arises from Cyp51A target
      mutations that reduce azole affinity — the principal acquired-resistance
      mechanism this node encodes. Evidence source is OTHER as this is a review.
  - reference: PMID:31542320
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      mechanisms involving the target proteins Cyp51 and ATP-binding cassette
      (ABC) or major facilitator superfamily (MFS) efflux pumps
    explanation: >-
      Confirms the two further resistance routes encoded here — Cyp51 target
      alteration and ABC/MFS drug-efflux pumps. Evidence source is OTHER as this is
      a review article.
  - reference: PMID:36458152
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Usage of azole fungicides on a large scale has been linked to the
      development of resistance among Aspergillus species prevalent in the
      environment.
    explanation: >-
      Supports the environmental driver of Aspergillus azole resistance (the basis
      of the TR34/L98H allele selected by agricultural azole-fungicide use).
      Evidence source is OTHER as this is a review article.
