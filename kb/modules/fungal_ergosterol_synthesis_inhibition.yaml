name: Fungal Ergosterol Synthesis Inhibition Module
description: >-
  The fungal ergosterol biosynthesis pathway and the points at which the most
  widely used antifungal classes interrupt it, structured as a causal enzymatic
  cascade. Ergosterol is the fungal-specific membrane sterol, the functional
  analogue of cholesterol in mammalian cells; it maintains membrane fluidity,
  integrity, and the function of membrane-embedded proteins, and its biosynthesis
  is the most exploited antifungal target because the pathway is essential and
  fungal-specific. This module traces the pathway as successive biological steps:
  squalene is first epoxidised by squalene epoxidase (Erg1) — an early committed
  step and the target of the allylamines terbinafine and naftifine; the pathway
  then proceeds to lanosterol 14-alpha-demethylation by the cytochrome P450
  Cyp51 (Erg11) — the target of the azoles (the triazoles fluconazole,
  itraconazole, voriconazole, posaconazole, and isavuconazole, and the topical
  imidazoles such as clotrimazole and miconazole), the antifungal workhorse class;
  ergosterol is then produced and incorporated into the fungal plasma membrane.
  Blocking either enzyme depletes ergosterol and causes accumulation of squalene
  or toxic methylated sterol intermediates, producing membrane dysfunction, growth
  inhibition, and (for terbinafine) fungicidal cell death — the antifungal
  consequence onto which both enzyme blocks converge. The module also encodes why
  azole therapy is failure-prone — point mutations in and overexpression of
  CYP51/ERG11, drug-efflux pumps (CDR/MDR), and the environmental Aspergillus
  fumigatus TR34/L98H allele select for azole resistance off the demethylase
  target. This module defines the mechanism-of-action design pattern for
  ergosterol-synthesis-targeting antifungal treatments: conforming fungal-disease
  entries link a treatment to the specific enzymatic step it inhibits via
  target_mechanisms.
category: Module
creation_date: "2026-06-24T00:00:00Z"
notes: >-
  This is an antifungal drug-mechanism module structured as a biological pathway,
  not a specific disease. Its nodes are successive biological steps of the fungal
  ergosterol biosynthesis cascade (squalene epoxidation by squalene epoxidase ERG1
  -> lanosterol 14-alpha-demethylation by CYP51/ERG11 -> ergosterol production and
  membrane incorporation -> ergosterol depletion and membrane dysfunction), with
  an adaptive resistance branch; the antifungal drug classes that act on each
  enzymatic step are described in the node text rather than modelled as separate
  nodes. Two enzyme steps are druggable and each carries a distinct molecular
  function: squalene epoxidase ERG1 (the allylamine target, an early committed
  step) and lanosterol 14-alpha-demethylase CYP51/ERG11 (the azole target, the
  downstream step). Disorder entries reference individual nodes via conforms_to
  (e.g., "fungal_ergosterol_synthesis_inhibition#Lanosterol 14-alpha-Demethylation
  by CYP51 (ERG11)"), and their ergosterol-synthesis-targeting treatments point at
  the inhibited node via target_mechanisms (analogous to how cell-wall-active
  antibiotic treatments link to "bacterial_cell_wall_synthesis_inhibition#Peptidoglycan
  Cross-Linking by Penicillin-Binding Proteins"). Key conformance / treatment
  target: "Lanosterol 14-alpha-Demethylation by CYP51 (ERG11)" — the azole target
  and the highest-coverage node, because azoles are used across nearly every
  mycosis. The resistance node captures the gating knowledge that distinguishes
  "an azole is used" from real drug selection — CYP51/ERG11 target alteration,
  efflux, and the environmentally selected Aspergillus TR34/L98H allele that
  mandate susceptibility testing and agent choice. See projects/ANTIFUNGAL.md for
  the broader drug-fungus strategy and the recommendation to keep the two
  ergosterol targets in one module.
pathophysiology:
- name: Squalene Epoxidation by Squalene Epoxidase (ERG1)
  description: >-
    Squalene epoxidase (Erg1) catalyzes the epoxidation of squalene to
    2,3-oxidosqualene, an early and rate-limiting committed step of the ergosterol
    biosynthesis pathway, upstream of lanosterol demethylation. It is the molecular
    target of the allylamine antifungals terbinafine and naftifine, which inhibit
    the enzyme non-competitively. Inhibition produces a dual effect: fungal cells
    accumulate high intracellular concentrations of squalene while becoming
    deficient in ergosterol. The squalene accumulation is believed to interfere
    with fungal membrane function and cell-wall synthesis and is closely associated
    with the fungicidal action of terbinafine, while the ergosterol deficiency
    accounts for growth inhibition. Because fungal squalene epoxidase is inhibited
    at far lower concentrations than the mammalian enzyme — and is not a cytochrome
    P450 — allylamines act selectively on fungi without affecting host cholesterol
    biosynthesis. This is the early druggable enzyme step of the cascade and the
    conformance / treatment target for allylamine therapy.
  role: therapeutic_vulnerability
  biological_processes:
  - preferred_term: Sterol Biosynthetic Process
    term:
      id: GO:0016126
      label: sterol biosynthetic process
  molecular_functions:
  - preferred_term: Squalene Monooxygenase Activity
    term:
      id: GO:0004506
      label: squalene monooxygenase activity
  evidence:
  - reference: PMID:1543672
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: >-
      Terbinafine (Lamisil) has primarily fungicidal action against many fungi as
      a result of its specific mechanism of squalene epoxidase inhibition.
    explanation: >-
      Mechanistic study establishing squalene epoxidase as the specific molecular
      target of the allylamine terbinafine at this early enzymatic step. Evidence
      source is IN_VITRO as this is a biochemical/enzymatic characterization of the
      inhibition.
  - reference: PMID:1543672
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: >-
      Treated fungi accumulate squalene while becoming deficient in ergosterol, an
      essential component of fungal cell membranes.
    explanation: >-
      Directly states the dual consequence of squalene epoxidase inhibition —
      squalene accumulation and ergosterol deficiency — that follows from blocking
      this step. Evidence source is IN_VITRO as this is a biochemical study of the
      enzyme inhibition.
  downstream:
  - target: Lanosterol 14-alpha-Demethylation by CYP51 (ERG11)
    description: >-
      The 2,3-oxidosqualene produced by squalene epoxidation is cyclized to
      lanosterol, which is then demethylated by Cyp51 further down the ergosterol
      pathway.
  - target: Ergosterol Depletion and Membrane Dysfunction
    description: >-
      Inhibiting squalene epoxidase depletes ergosterol and accumulates squalene,
      converging on the shared membrane-dysfunction endpoint of the cascade.

- name: Lanosterol 14-alpha-Demethylation by CYP51 (ERG11)
  description: >-
    Lanosterol 14-alpha-demethylase (Cyp51, encoded by ERG11/CYP51) is a fungal
    cytochrome P450 enzyme that catalyzes a key downstream step in the ergosterol
    biosynthesis pathway, removing the 14-alpha-methyl group from lanosterol en
    route to ergosterol. It is the molecular target of the azole antifungals — the
    systemic triazoles fluconazole, itraconazole, voriconazole, posaconazole, and
    isavuconazole, and the topical imidazoles clotrimazole and miconazole. The
    azole heterocyclic nitrogen coordinates the heme iron in the enzyme's active
    site, blocking demethylase activity; the resulting depletion of ergosterol,
    accumulation of toxic methylated sterol intermediates, and growth inhibition
    are the antifungal effect. Because the enzyme is essential and fungal-specific,
    this is the central, most widely exploited step of the cascade and the
    canonical conformance / treatment target for azole therapy across mycoses.
  role: therapeutic_vulnerability
  biological_processes:
  - preferred_term: Ergosterol Biosynthetic Process
    term:
      id: GO:0006696
      label: ergosterol biosynthetic process
  molecular_functions:
  - preferred_term: Sterol 14-Demethylase Activity
    term:
      id: GO:0008398
      label: sterol 14-demethylase activity
  evidence:
  - reference: PMID:33374996
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      The fungal cytochrome P450 enzyme sterol 14α-demethylase (SDM) is a key
      enzyme in the ergosterol biosynthesis pathway.
    explanation: >-
      Review establishing sterol 14-alpha-demethylase (Cyp51/Erg11) as a key
      cytochrome P450 enzyme of the ergosterol biosynthesis pathway, the azole
      drug target this node represents. Evidence source is OTHER as this is a
      review article.
  - reference: PMID:33374996
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      The binding of azoles to the active site of SDM results in a depletion of
      ergosterol, the accumulation of toxic intermediates and growth inhibition.
    explanation: >-
      Directly states the mechanism of action of the azoles at this node: binding
      the demethylase active site depletes ergosterol and arrests growth. Evidence
      source is OTHER as this is a review article.
  - reference: PMID:37151610
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      especially lanosterol 14a demethylase (CYP51) inhibition, which is one of
      the main target sites for antifungal activity
    explanation: >-
      Confirms lanosterol 14-alpha-demethylase (CYP51) as a principal antifungal
      target site. Evidence source is OTHER as this is a review article.
  downstream:
  - target: Ergosterol Production and Membrane Incorporation
    description: >-
      Successful demethylation allows the pathway to proceed to ergosterol, which
      is built into the fungal plasma membrane.
  - target: Ergosterol Depletion and Membrane Dysfunction
    description: >-
      Inhibiting the demethylase blocks ergosterol synthesis and accumulates toxic
      methylated sterol intermediates, producing membrane dysfunction and growth
      arrest.
  - target: Azole-Target Resistance
    description: >-
      Drug pressure on CYP51/ERG11 selects target mutations, overexpression, and
      efflux that escape azole inhibition.

- name: Ergosterol Production and Membrane Incorporation
  description: >-
    Completion of the demethylase step and the remaining downstream reactions
    yields ergosterol, the fungal-specific end-product sterol of the pathway, which
    is incorporated into the fungal plasma membrane. There it maintains membrane
    fluidity, integrity, and the proper function of membrane-embedded proteins —
    the same homeostatic role cholesterol plays in mammalian membranes. This is the
    normal biological output of the ergosterol cascade and the membrane state that
    enzyme-targeting antifungals are designed to prevent.
  role: effector
  biological_processes:
  - preferred_term: Ergosterol Metabolic Process
    term:
      id: GO:0008204
      label: ergosterol metabolic process
  evidence:
  - reference: PMID:37151610
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      it functions to maintain the
      integrity and function of cell membranes in Candida
    explanation: >-
      Supports the biological output of this node — ergosterol produced by the
      pathway maintains the integrity and function of the fungal cell membrane.
      Evidence source is OTHER as this is a review article.
  - reference: PMID:1543672
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: >-
      ergosterol, an essential
      component of fungal cell membranes.
    explanation: >-
      Confirms ergosterol as an essential component of the fungal membrane, the
      product incorporated at this node. Evidence source is IN_VITRO as this is a
      biochemical study.

- name: Ergosterol Depletion and Membrane Dysfunction
  description: >-
    When either ergosterol-pathway enzyme is pharmacologically blocked — the
    azole-blocked 14-alpha-demethylase or the allylamine-blocked squalene
    epoxidase — ergosterol is depleted and abnormal sterol precursors accumulate
    (toxic 14-methylated sterols downstream of demethylase inhibition, or squalene
    downstream of epoxidase inhibition). The resulting membrane is structurally and
    functionally aberrant: permeability and the activity of membrane enzymes are
    disrupted, fungal growth is inhibited, and in the case of squalene accumulation
    the effect is fungicidal, with membrane damage and cell lysis. This is the
    shared antifungal consequence onto which both enzyme-target steps converge —
    the negative-regulation endpoint of engaging the ergosterol pathway.
  role: consequence
  biological_processes:
  - preferred_term: Negative Regulation of Steroid Biosynthetic Process
    term:
      id: GO:0010894
      label: negative regulation of steroid biosynthetic process
  evidence:
  - reference: PMID:1543672
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: >-
      The cidal action is closely associated with the development of high
      intracellular squalene concentrations, which are believed to interfere with
      fungal membrane function
    explanation: >-
      Supports the effector mechanism of this node: depletion of ergosterol with
      accumulation of squalene interferes with fungal membrane function and is
      fungicidal. Evidence source is IN_VITRO as this is a biochemical study.
  - reference: PMID:37151610
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      make damaging cell membranes, fungal growth inhibition, and fungal cell
      lysis.
    explanation: >-
      States the downstream consequences of ergosterol-pathway inhibition —
      membrane damage, growth inhibition, and cell lysis — captured by this node.
      Evidence source is OTHER as this is a review article.

- name: Azole-Target Resistance
  description: >-
    Azole therapy selects for resistance through several routes that map onto the
    demethylase target. Acquired resistance arises from amino-acid substitutions in
    the target enzyme Cyp51/Erg11 that reduce the affinity of azoles for the active
    site, and from overexpression of the target enzyme; in parallel, induction of
    ATP-binding cassette (CDR) and major facilitator superfamily (MDR) efflux pumps
    expels the drug. A distinctive environmentally selected mechanism in Aspergillus
    fumigatus is the TR34/L98H allele — a tandem repeat in the cyp51A promoter
    combined with an L98H coding mutation — driven by agricultural azole-fungicide
    use and conferring cross-resistance to clinical triazoles even in azole-naive
    patients. This adaptive branch off the demethylase target explains why azole
    monotherapy can fail against a specific isolate, why azole susceptibility
    testing and surveillance matter, and why agent choice (e.g. a different triazole
    or a non-azole class) is mechanism-driven.
  role: adaptive_escape
  biological_processes:
  - preferred_term: Response to Xenobiotic Stimulus
    term:
      id: GO:0009410
      label: response to xenobiotic stimulus
  evidence:
  - reference: PMID:38878211
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Acquired resistance typically arises from mutations in the target enzyme,
      lanosterol 14-α-demethylase (Cyp51A), reduces the affinity of azole
      antifungal agents for the enzyme, rendering them less effective
    explanation: >-
      Review stating that acquired azole resistance arises from Cyp51A target
      mutations that reduce azole affinity — the principal acquired-resistance
      mechanism this node encodes. Evidence source is OTHER as this is a review.
  - reference: PMID:31542320
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      mechanisms involving the target proteins Cyp51 and ATP-binding cassette
      (ABC) or major facilitator superfamily (MFS) efflux pumps
    explanation: >-
      Confirms the two further resistance routes encoded here — Cyp51 target
      alteration and ABC/MFS drug-efflux pumps. Evidence source is OTHER as this is
      a review article.
  - reference: PMID:36458152
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Usage of azole fungicides on a large scale has been linked to the
      development of resistance among Aspergillus species prevalent in the
      environment.
    explanation: >-
      Supports the environmental driver of Aspergillus azole resistance (the basis
      of the TR34/L98H allele selected by agricultural azole-fungicide use).
      Evidence source is OTHER as this is a review article.
