name: PI3K-AKT-mTOR Cortical Overgrowth Module
description: >-
  A conserved cortical-overgrowth module representing the shared pathomechanism
  of malformations of cortical development (MCDs) driven by constitutive
  activation of the phosphatidylinositol 3-kinase (PI3K)-AKT-mTOR growth pathway.
  Gain-of-function variants in PIK3CA, PIK3R2, AKT3, MTOR, or CCND2 - frequently
  arising as post-zygotic somatic (mosaic) events restricted to the developing
  brain - hyperactivate PI3K-AKT-mTOR signaling in neural progenitors. The
  resulting progenitor hyperproliferation and cell-cycle dysregulation drive
  cortical overgrowth (megalencephaly, hemimegalencephaly) together with impaired
  neuronal migration and dyslamination (polymicrogyria, focal cortical dysplasia),
  producing an epileptogenic cortical substrate and intractable seizures. The same
  pathway branch recurs across several disease entities and somatic-mosaic lesion
  types (hemimegalencephaly, focal cortical dysplasia type II, the megalencephaly-
  capillary malformation [MCAP] and megalencephaly-polymicrogyria-polydactyly-
  hydrocephalus [MPPH] spectrum, and the PIK3CA-related overgrowth spectrum such
  as CLOVES), so it is modeled as a module rather than a single disease entry.
  Conforming disorder nodes substitute the disorder-specific activating lesion
  (e.g., somatic PIK3CA in hemimegalencephaly/CLOVES, germline or postzygotic
  PIK3R2/AKT3 in the MCAP/MPPH spectrum, somatic MTOR in focal cortical dysplasia
  type II, CCND2 stabilization in MPPH) while preserving the conserved
  hyperactivation-to-overgrowth-to-epilepsy skeleton.
category: Module
creation_date: "2026-06-10T00:00:00Z"
notes: >-
  This is a mechanism module, not a specific disease. Disorder entries reference
  individual nodes via conforms_to (e.g.,
  "pi3k_akt_mtor_cortical_overgrowth#PI3K-AKT-mTOR Pathway Hyperactivation in
  Neural Progenitors"). Conforming nodes should substitute the disorder-specific
  activating lesion: somatic mosaic PIK3CA (hemimegalencephaly, CLOVES/PROS),
  germline or postzygotic PIK3R2 or AKT3 (MCAP/MPPH megalencephaly spectrum),
  brain somatic MTOR (focal cortical dysplasia type II), or CCND2 stabilization
  (MPPH). Existing dismech entries CLOVES_Syndrome.yaml and
  Tuberous_Sclerosis_Complex.yaml model upstream/parallel arms of this pathway and
  could add conforms_to references to the "PI3K-AKT-mTOR Pathway Hyperactivation in
  Neural Progenitors" node; TSC reaches the same mTORC1 hyperactivation node
  through TSC1/TSC2 loss rather than a PI3K-activating variant.
  A non-cell-autonomous AKT3-FOXG1-Reelin branch (restricted AKT3-mutant
  progenitors misexpressing Reelin and misrouting neighboring wild-type neurons;
  Romero et al. 2018 review sections 2.2.1.8/2.2.8) is a candidate additional node
  shared with the Reelin lamination module (epic #4098), but is deferred here
  pending verification of its primary sources and is intentionally not asserted
  without quotable primary-paper evidence.
pathophysiology:
- name: PI3K-AKT-mTOR Pathway Hyperactivation in Neural Progenitors
  description: >-
    The conserved initiating lesion is constitutive activation of the
    PI3K-AKT-mTOR growth-signaling cascade in neural progenitor cells. Activating
    variants in three core components of the PI3K-AKT pathway - PIK3CA (p110-alpha
    catalytic subunit), PIK3R2 (p85-beta regulatory subunit), and AKT3 - or in the
    downstream kinase MTOR drive ligand-independent signaling. These variants are
    frequently post-zygotic somatic (mosaic) events confined to the developing
    brain, producing mosaic hyperactivation in a clone of progenitors and their
    progeny.
  role: trigger
  genes:
  - preferred_term: PIK3CA
    term:
      id: hgnc:8975
      label: PIK3CA
  - preferred_term: PIK3R2
    term:
      id: hgnc:8980
      label: PIK3R2
  - preferred_term: AKT3
    term:
      id: hgnc:393
      label: AKT3
  - preferred_term: MTOR
    term:
      id: hgnc:3942
      label: MTOR
  cell_types:
  - preferred_term: radial glial cell
    term:
      id: CL:0000681
      label: radial glial cell
  molecular_functions:
  - preferred_term: phosphatidylinositol 3-kinase activity
    term:
      id: GO:0046934
      label: 1-phosphatidylinositol-4,5-bisphosphate 3-kinase activity
  biological_processes:
  - preferred_term: PI3K-AKT Signal Transduction
    term:
      id: GO:0043491
      label: phosphatidylinositol 3-kinase/protein kinase B signal transduction
    modifier: INCREASED
  - preferred_term: TOR Signaling
    term:
      id: GO:0031929
      label: TOR signaling
    modifier: INCREASED
  evidence:
  - reference: PMID:22729223
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Exome sequencing and mass spectrometry analysis in paired brain-blood
      samples from individuals with HME (n = 20 cases) identified de novo somatic
      mutations in 30% of affected individuals in the PIK3CA, AKT3 and MTOR genes.
    explanation: >-
      Demonstrates that brain-restricted somatic mutations in PIK3CA, AKT3, and
      MTOR are recurrent drivers of a cortical overgrowth malformation
      (hemimegalencephaly), establishing PI3K-AKT-mTOR as the conserved
      initiating lesion of this module.
  - reference: PMID:22729223
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Thus HME is probably a genetically mosaic disease caused by gain of
      function in phosphatidylinositol 3-kinase (PI3K)-AKT3-mTOR signaling.
    explanation: >-
      States the gain-of-function, mosaic nature of PI3K-AKT3-mTOR activation as
      the cause of the malformation, the defining feature of the trigger node.
  - reference: PMID:22729224
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      We identified de novo germline or postzygotic mutations in three core
      components of the phosphatidylinositol 3-kinase (PI3K)-AKT pathway.
    explanation: >-
      Independently identifies AKT3, PIK3R2, and PIK3CA variants in the
      megalencephaly (MCAP/MPPH) spectrum, confirming the same pathway branch
      drives a related overgrowth phenotype and supporting the lumping rationale
      for this module.
  - reference: PMID:22658544
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      We identified mutations in PIK3CA in all six individuals, and mutant allele
      frequencies ranged from 3% to 30% in affected tissue from multiple
      embryonic lineages.
    explanation: >-
      The PIK3CA-related overgrowth spectrum (CLOVES) shares the somatic-mosaic
      PIK3CA-activation lesion modeled here, illustrating the variable mosaic
      allele fractions characteristic of this trigger.
  downstream:
  - target: Progenitor Hyperproliferation and Cell-Cycle Dysregulation
    description: >-
      Constitutive PI3K-AKT-mTOR signaling drives excess progenitor proliferation
      and delayed cell-cycle exit.
- name: Progenitor Hyperproliferation and Cell-Cycle Dysregulation
  description: >-
    Hyperactive PI3K-AKT-mTOR signaling increases biosynthesis, cell growth, and
    proliferation of neural progenitors while dysregulating cell-cycle control.
    Stabilization of cyclin D2 (CCND2) - normally targeted for proteasomal
    degradation downstream of GSK-3-beta, which is inhibited by AKT - links the
    pathway to G1/S cell-cycle progression and expands the progenitor pool,
    increasing the neuronal output that is subsequently malpositioned.
  role: amplifier
  genes:
  - preferred_term: CCND2
    term:
      id: hgnc:1583
      label: CCND2
  cell_types:
  - preferred_term: radial glial cell
    term:
      id: CL:0000681
      label: radial glial cell
  biological_processes:
  - preferred_term: Neural Progenitor Proliferation
    term:
      id: GO:0008283
      label: cell population proliferation
    modifier: INCREASED
  evidence:
  - reference: PMID:24705253
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: >-
      Mutant CCND2 was resistant to proteasomal degradation in vitro compared to
      wild-type CCND2.
    explanation: >-
      Shows the molecular basis by which CCND2 variants stabilize cyclin D2 and
      dysregulate the cell cycle, the proliferative amplifier engaged downstream
      of PI3K-AKT in this module.
  - reference: PMID:22500628
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      We show that AKT3 is the most abundant AKT paralog in the brain during
      neurogenesis and that phosphorylated AKT is abundant in cortical progenitor
      cells.
    explanation: >-
      Establishes that the pathway is active in cortical progenitors during
      neurogenesis, the cell population whose proliferation is amplified by
      activating AKT3 variants.
  downstream:
  - target: Cortical Overgrowth
    description: >-
      Expansion of the progenitor pool and increased cell growth enlarge cortical
      tissue volume.
  - target: Impaired Neuronal Migration and Cortical Lamination
    description: >-
      Excess and abnormally specified neurons fail to migrate and laminate
      normally, producing dyslamination.
- name: Cortical Overgrowth
  description: >-
    Progenitor hyperproliferation and increased cell growth enlarge the cortex,
    producing megalencephaly when diffuse and hemimegalencephaly when the
    activating mosaic clone is confined to one hemisphere. The degree and
    distribution of overgrowth track the timing and spatial extent of the
    somatic-mosaic activating event.
  role: effector
  cell_types:
  - preferred_term: pyramidal neuron
    term:
      id: CL:0000598
      label: pyramidal neuron
  biological_processes:
  - preferred_term: Cerebral Cortex Development
    term:
      id: GO:0021987
      label: cerebral cortex development
    modifier: ABNORMAL
  evidence:
  - reference: PMID:22729224
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Megalencephaly-capillary malformation (MCAP) and
      megalencephaly-polymicrogyria-polydactyly-hydrocephalus (MPPH) syndromes are
      sporadic overgrowth disorders associated with markedly enlarged brain size
      and other recognizable features.
    explanation: >-
      Characterizes the megalencephaly (enlarged brain) overgrowth phenotype
      produced by PI3K-AKT pathway activation in the MCAP/MPPH spectrum.
  - reference: PMID:22500628
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Hemimegalencephaly (HMG) is a developmental brain disorder characterized by
      an enlarged, malformed cerebral hemisphere, typically causing epilepsy that
      requires surgical resection.
    explanation: >-
      Defines the hemimegalencephaly overgrowth phenotype - the lateralized form
      of cortical overgrowth produced when the activating mosaic clone is confined
      to one hemisphere - and links it to the epileptogenic outcome of this module.
  downstream:
  - target: Epileptogenic Cortical Dysplasia and Seizures
    description: >-
      Overgrown, abnormally organized cortex forms an epileptogenic substrate.
- name: Impaired Neuronal Migration and Cortical Lamination
  description: >-
    Beyond overgrowth, PI3K-AKT-mTOR hyperactivation perturbs radial neuronal
    migration and inside-out cortical lamination, yielding dyslamination and a
    polymicrogyria-like or focal cortical dysplasia cortical architecture. The
    migration defect is mechanistically separable from the proliferative
    overgrowth and contributes the malformed (as opposed to merely enlarged)
    component of the phenotype.
  role: effector
  cell_types:
  - preferred_term: migrating cortical neuron
    term:
      id: CL:0000540
      label: neuron
  biological_processes:
  - preferred_term: Neuronal Migration
    term:
      id: GO:0001764
      label: neuron migration
    modifier: ABNORMAL
  evidence:
  - reference: PMID:25799227
    supports: SUPPORT
    evidence_source: MODEL_ORGANISM
    snippet: >-
      Focal cortical expression of mutant MTOR by in utero electroporation in mice
      was sufficient to disrupt neuronal migration and cause spontaneous seizures
      and cytomegalic neurons.
    explanation: >-
      Demonstrates causally, in a mouse model, that focal mTOR hyperactivation
      disrupts neuronal migration (and produces seizures and cytomegalic neurons),
      directly supporting the migration/lamination-failure step. Classified
      MODEL_ORGANISM as the migration phenotype is shown by in utero
      electroporation in mice.
  - reference: PMID:25799227
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Focal cortical dysplasia type II (FCDII) is a sporadic developmental
      malformation of the cerebral cortex characterized by dysmorphic neurons,
      dyslamination and medically refractory epilepsy.
    explanation: >-
      Establishes dyslamination and dysmorphic neurons as the human-disease
      correlate of the migration/lamination failure modeled in this node.
  downstream:
  - target: Epileptogenic Cortical Dysplasia and Seizures
    description: >-
      Dyslaminated, dysmorphic-neuron-containing cortex is intrinsically
      epileptogenic.
- name: Epileptogenic Cortical Dysplasia and Seizures
  conforms_to: "epilepsy_excitation_inhibition_imbalance#Excitation-Inhibition Imbalance"
  description: >-
    The overgrown, dyslaminated cortex containing cytomegalic dysmorphic neurons
    (and, in focal cortical dysplasia type II, balloon cells) forms an
    epileptogenic substrate that generates medically refractory seizures.
    Persistent mTOR hyperactivation in these abnormal neurons shifts the cortical
    network toward excitation, and the seizures are frequently intractable to
    antiseizure medication but responsive to mTOR inhibition, identifying the
    pathway as a treatment target. This terminal step conforms to the conserved
    epilepsy excitation-inhibition imbalance module, with the mTOR-pathway
    cortical malformation as the disorder-specific driver of the imbalance.
  role: outcome
  cell_types:
  - preferred_term: dysmorphic cytomegalic neuron
    term:
      id: CL:0000540
      label: neuron
  biological_processes:
  - preferred_term: TOR Signaling
    term:
      id: GO:0031929
      label: TOR signaling
    modifier: INCREASED
  evidence:
  - reference: PMID:25799227
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      This study provides, to our knowledge, the first evidence that brain
      somatic activating mutations in MTOR cause FCD and identifies mTOR as a
      treatment target for intractable epilepsy in FCD.
    explanation: >-
      Links brain somatic mTOR activation to focal cortical dysplasia with
      intractable epilepsy and names mTOR as the actionable treatment target,
      supporting the epileptogenic outcome and its therapeutic vulnerability.
  - reference: PMID:25799227
    supports: SUPPORT
    evidence_source: MODEL_ORGANISM
    snippet: >-
      Inhibition of mTOR with rapamycin suppressed cytomegalic neurons and
      epileptic seizures.
    explanation: >-
      Shows in the mouse model that mTOR inhibition reverses both the cellular
      abnormality and the seizures, confirming mTOR hyperactivation as the
      proximate driver of the epileptogenic phenotype. Classified MODEL_ORGANISM
      because the rescue is demonstrated in mice.
