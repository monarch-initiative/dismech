name: Gout Urate Crystal Inflammation Module
description: >-
  A conserved pathophysiology module representing the monosodium urate (MSU)
  crystal arthropathy pathway that produces gout. Sustained hyperuricaemia,
  arising from urate overproduction or, more commonly, renal and intestinal
  urate underexcretion mediated by urate transporters (URAT1, ABCG2), raises
  serum urate above its solubility limit. Supersaturation drives MSU crystal
  nucleation and deposition in joints and periarticular tissues; deposited
  crystals are phagocytosed by resident macrophages and engage the
  caspase-1-activating NLRP3 inflammasome, releasing bioactive interleukin-1
  beta. IL-1 beta then drives acute neutrophil-rich inflammation, and recurrent
  crystal-driven flares progress to chronic tophaceous arthritis with erosive
  joint damage. Conforming disorder nodes substitute disorder-specific drivers
  of hyperuricaemia (enzymatic overproduction such as HPRT deficiency, or
  transporter-mediated underexcretion) while preserving the conserved
  crystal-deposition, inflammasome, and neutrophilic-inflammation chain.
category: Module
creation_date: "2026-06-06T00:00:00Z"
notes: >-
  This is a mechanism module, not a specific disease. Disorder entries reference
  individual nodes via conforms_to (e.g.,
  "gout_urate_crystal_inflammation#NLRP3 Inflammasome Activation"). The module
  defines the expected pathophysiology structure; conforming nodes in disorder
  files should include the corresponding cell types, biological processes, and
  causal edges, specialized to their disease context. Key disease-specific
  substitutions: primary gout uses transporter-mediated urate underexcretion
  (URAT1/ABCG2); enzymatic overproduction syndromes (e.g., HPRT1 deficiency /
  Lesch-Nyhan, PRPP synthetase superactivity) substitute the overproduction
  driver at the trigger node. Urate chemistry is described in prose only;
  modules bind GO and CL terms only and do not use chemical (CHEBI) term
  bindings.
pathophysiology:
- name: Hyperuricaemia
  description: >-
    Serum urate rises above its physiological solubility limit owing to urate
    overproduction (increased purine turnover and xanthine oxidoreductase
    activity) and/or underexcretion. Renal and intestinal urate handling by
    membrane transporters is the dominant determinant: reduced secretion or
    increased reabsorption via URAT1, ABCG2, GLUT9, and related carriers
    elevates the urate pool. Sustained hyperuricaemia is the necessary upstream
    state for monosodium urate crystal formation.
  role: trigger
  biological_processes:
  - preferred_term: Urate Metabolic Process
    term:
      id: GO:0046415
      label: urate metabolic process
    modifier: DYSREGULATED
  - preferred_term: Purine Nucleotide Catabolic Process
    term:
      id: GO:0006195
      label: purine nucleotide catabolic process
    modifier: INCREASED
  evidence:
  - reference: PMID:36483739
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Hyperuricemia is the result of increased production and/or underexcretion
      of uric acid.
    explanation: >-
      Establishes the two converging upstream mechanisms of hyperuricaemia
      (overproduction and underexcretion) that define this trigger node.
      Evidence source is OTHER because this is a systematic review synthesizing
      multiple study types.
  - reference: PMID:36483739
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Dysregulation of xanthine oxidoreductase (XOD), the enzyme that catalyzes
      uric acid biosynthesis primarily in the liver, and urate transporters
      that reabsorb urate in the renal proximal tubules (URAT1, GLUT9, OAT4 and
      OAT10) and secrete urate (ABCG2, OAT1, OAT3, NPT1, and NPT4) in the renal
      tubules and intestine, is a major cause of hyperuricemia, along with
      variations in the genes encoding these proteins.
    explanation: >-
      Directly identifies dysregulated urate biosynthesis (XOD) and transporter
      handling (URAT1, ABCG2) in kidney and gut as the major cause of
      hyperuricaemia, supporting the overproduction/underexcretion model and the
      named transporters in the trigger description.
  downstream:
  - target: MSU Crystal Deposition

- name: MSU Crystal Deposition
  description: >-
    Once serum urate exceeds its saturation point, monosodium urate
    supersaturates and nucleates into needle-shaped MSU crystals that deposit in
    and around joints and periarticular tissues. Crystal deposition is the
    pivotal step that converts the metabolic state of hyperuricaemia into a
    tissue lesion capable of provoking inflammation, and accumulated deposits
    seed both acute flares and chronic tophi.
  role: amplifier
  evidence:
  - reference: PMID:31558729
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Gout is a chronic disease caused by monosodium urate (MSU) crystal
      deposition.
    explanation: >-
      Establishes MSU crystal deposition as the defining lesion of gout, the
      step that links hyperuricaemia to downstream inflammation. Evidence source
      is OTHER because this is an authoritative review (Nature Reviews Disease
      Primers).
  - reference: PMID:31558729
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Elevated serum urate level (hyperuricaemia) is the major risk factor for
      MSU crystal deposition and development of gout.
    explanation: >-
      Directly connects the upstream hyperuricaemia trigger to MSU crystal
      deposition, supporting the causal edge into this node. Evidence source is
      OTHER because this is a review.
  downstream:
  - target: NLRP3 Inflammasome Activation

- name: NLRP3 Inflammasome Activation
  description: >-
    Deposited MSU crystals are phagocytosed by resident and recruited
    macrophages and act as a danger signal that engages the
    caspase-1-activating NLRP3 inflammasome. Inflammasome assembly activates
    caspase-1, which cleaves pro-IL-1 beta into bioactive IL-1 beta (and
    IL-18). This is the central effector step that transduces an inert crystal
    deposit into a potent pro-inflammatory cytokine signal, and is conserved
    across disorders producing MSU crystals.
  role: central_effector
  cell_types:
  - preferred_term: Macrophage
    term:
      id: CL:0000235
      label: macrophage
  biological_processes:
  - preferred_term: Interleukin-1 Beta Production
    term:
      id: GO:0032611
      label: interleukin-1 beta production
    modifier: INCREASED
  evidence:
  - reference: PMID:16407889
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: >-
      Here we show that MSU and CPPD engage the caspase-1-activating NALP3 (also
      called cryopyrin) inflammasome, resulting in the production of active
      interleukin (IL)-1beta and IL-18. Macrophages from mice deficient in
      various components of the inflammasome such as caspase-1, ASC and NALP3
      are defective in crystal-induced IL-1beta activation.
    explanation: >-
      Landmark mechanistic study (Martinon et al.) demonstrating that MSU
      crystals engage the caspase-1-activating NLRP3/NALP3 inflammasome in
      macrophages to produce active IL-1 beta, directly supporting the central
      effector step. Evidence source is IN_VITRO because the causal genetic
      dissection used cultured macrophages.
  - reference: PMID:36745138
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Macrophage phagocytosis of UA activate NLRP3, lead to cytokines release,
      and ultimately, lead to chemoattract neutrophils and lymphocytes to the
      gout flare joint spot.
    explanation: >-
      Review synthesis confirming that macrophage phagocytosis of urate
      activates NLRP3 and drives cytokine release that recruits neutrophils,
      linking this node to downstream neutrophilic inflammation. Evidence source
      is OTHER because this is a review.
  downstream:
  - target: IL-1-Driven Neutrophilic Inflammation

- name: IL-1-Driven Neutrophilic Inflammation
  description: >-
    Bioactive IL-1 beta released after inflammasome activation acts on IL-1
    receptors on endothelial and resident cells to drive an acute inflammatory
    response, with massive recruitment and activation of neutrophils into the
    affected joint. Neutrophil influx and the resulting cytokine and chemokine
    amplification produce the intense pain, swelling, and erythema of the acute
    gout flare. IL-1 receptor signalling is required for the crystal-induced
    neutrophilic response.
  role: effector
  cell_types:
  - preferred_term: Neutrophil
    term:
      id: CL:0000775
      label: neutrophil
  biological_processes:
  - preferred_term: Inflammatory Response
    term:
      id: GO:0006954
      label: inflammatory response
    modifier: INCREASED
  - preferred_term: Neutrophil Chemotaxis
    term:
      id: GO:0030593
      label: neutrophil chemotaxis
    modifier: INCREASED
  evidence:
  - reference: PMID:16407889
    supports: SUPPORT
    evidence_source: MODEL_ORGANISM
    snippet: >-
      Moreover, an impaired neutrophil influx is found in an in vivo model of
      crystal-induced peritonitis in inflammasome-deficient mice or mice
      deficient in the IL-1beta receptor (IL-1R).
    explanation: >-
      Demonstrates in vivo that crystal-induced neutrophil influx depends on
      inflammasome and IL-1 receptor signalling, supporting IL-1 beta as the
      driver of acute neutrophilic inflammation. Evidence source is
      MODEL_ORGANISM because the in vivo data are from mouse peritonitis models.
  - reference: PMID:36745138
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Macrophage phagocytosis of UA activate NLRP3, lead to cytokines release,
      and ultimately, lead to chemoattract neutrophils and lymphocytes to the
      gout flare joint spot.
    explanation: >-
      Review evidence that the inflammasome-driven cytokine release
      chemoattracts neutrophils to the gout flare joint, supporting the
      neutrophil chemotaxis and inflammatory response processes at this node.
      Evidence source is OTHER because this is a review.
  downstream:
  - target: Recurrent and Chronic Tophaceous Gout

- name: Recurrent and Chronic Tophaceous Gout
  description: >-
    Repeated crystal-driven inflammatory flares present as acute, self-limiting
    monoarthritis. With persistent crystal deposition and unresolved
    hyperuricaemia, disease progresses to chronic inflammation, formation of
    tophi (organized aggregates of MSU crystals surrounded by inflammatory
    cells), and erosive damage to cartilage and bone with long-term functional
    impairment. This is the clinical phenotype of gout, the consequence of the
    conserved crystal-inflammation chain.
  role: consequence
  evidence:
  - reference: PMID:31558729
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Gout typically presents as an acute, self-limiting inflammatory
      monoarthritis that affects the joints of the lower limb.
    explanation: >-
      Describes the acute, self-limiting monoarthritis that is the clinical
      presentation of the recurrent gout flare, the consequence of this module.
      Evidence source is OTHER because this is a review.
  - reference: PMID:22231231
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      The clinical course of gout is initially characterized by acute
      self-limited joint inflammation, but long-standing disease is often
      associated with chronic inflammation followed by the development of
      erosive joint damage, which can result in long-term functional impairment.
    explanation: >-
      Establishes the progression from acute flares to chronic inflammation and
      erosive joint damage with functional impairment, the chronic tophaceous
      consequence of the module. Evidence source is OTHER because this is a
      review synthesizing cellular and imaging studies.
