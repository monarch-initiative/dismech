name: Inflammaging Module
description: >-
  A conserved mechanism module for the intertwined hallmarks of aging
  (Lopez-Otin et al.) termed altered intercellular communication and chronic
  inflammation - together the phenomenon of "inflammaging": the chronic,
  low-grade, sterile systemic inflammation that develops with age in the absence
  of overt infection. Multiple age-associated stimuli converge to sustain it -
  the senescence-associated secretory phenotype (SASP), damage-associated
  molecular patterns from dysfunctional mitochondria, NLRP3 inflammasome
  activation, increased gut permeability and microbiota shifts, central obesity,
  immune dysregulation, and chronic infections. The resulting persistent
  cytokine milieu, propagated systemically through altered intercellular
  communication, is a highly significant risk factor for morbidity and mortality
  because most age-related diseases share an inflammatory pathogenesis.
  Individual disorder entries declare conformance via conforms_to on their
  pathophysiology nodes, substituting the disease-specific inflammatory driver
  and target tissue while preserving the conserved stimulus -> chronic-sterile-
  inflammation -> systemic-propagation -> age-related-morbidity chain.
category: Module
creation_date: "2026-07-01T00:00:00Z"
notes: >-
  This is a mechanism module, not a specific disease. Disorder entries
  reference individual nodes via conforms_to (e.g.,
  "inflammaging#Chronic Low-Grade Sterile Inflammation"). Conforming nodes in
  disorder files should include the corresponding biological processes and
  causal edges, specialized to their disease context. The module captures the
  conserved inflammaging chain and its role as a shared risk substrate for
  age-related disease; it deliberately does NOT re-derive the SASP (see
  cellular_senescence) or adjudicate which upstream source dominates in a given
  disease. It is the systemic-inflammation convergence point downstream of
  cellular_senescence and mitochondrial_dysfunction. Key conformance target:
  "inflammaging#Chronic Low-Grade Sterile Inflammation".
pathophysiology:
- name: Age-Associated Inflammatory Stimuli
  description: >-
    A diverse set of age-accumulating stimuli feed sterile inflammation:
    senescent-cell SASP, damage-associated molecular patterns from
    dysfunctional mitochondria, NLRP3 inflammasome activation, increased gut
    permeability and microbiota changes, central obesity, immune-cell
    dysregulation, and chronic infections. Regardless of the dominant source,
    these converge to drive a persistent inflammatory response.
  role: trigger
  biological_processes:
  - preferred_term: Inflammatory Response
    term:
      id: GO:0006954
      label: inflammatory response
    modifier: INCREASED
  evidence:
  - reference: PMID:30065258
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Potential mechanisms of inflammageing include genetic susceptibility,
      central obesity, increased gut permeability, changes to microbiota
      composition, cellular senescence, NLRP3 inflammasome activation, oxidative
      stress caused by dysfunctional mitochondria, immune cell dysregulation, and
      chronic infections.
    explanation: >-
      Enumerates the conserved set of age-associated stimuli that drive
      inflammaging, the trigger modeled here. Evidence source is OTHER because
      this is a review.
  downstream:
  - target: Chronic Low-Grade Sterile Inflammation
- name: Chronic Low-Grade Sterile Inflammation
  description: >-
    The persistent stimuli establish a chronic, low-grade, sterile inflammatory
    state - elevated circulating inflammatory mediators without overt infection.
    This is the defining central effector of inflammaging and the conserved node
    that disease-specific inflammatory drivers converge upon.
  role: central_effector
  biological_processes:
  - preferred_term: Inflammatory Response
    term:
      id: GO:0006954
      label: inflammatory response
    modifier: INCREASED
  - preferred_term: Cytokine Production
    term:
      id: GO:0001816
      label: cytokine production
    modifier: INCREASED
  evidence:
  - reference: PMID:24833586
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Human aging is characterized by a chronic, low-grade inflammation, and
      this phenomenon has been termed as "inflammaging."
    explanation: >-
      Defines inflammaging as the chronic low-grade inflammation of human aging,
      the central effector modeled here. Evidence source is OTHER because this is
      a review.
  - reference: PMID:30065258
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Most older individuals develop inflammageing, a condition characterized by
      elevated levels of blood inflammatory markers that carries high
      susceptibility to chronic morbidity, disability, frailty, and premature
      death.
    explanation: >-
      Characterizes inflammaging by elevated blood inflammatory markers and its
      link to morbidity, supporting this node. Evidence source is OTHER because
      this is a review.
  downstream:
  - target: Systemic Propagation via Altered Intercellular Communication
- name: Systemic Propagation via Altered Intercellular Communication
  description: >-
    The inflammatory state is propagated beyond its cells of origin through
    altered intercellular communication - circulating cytokines, chemokines, and
    other mediators acting at a distance. This systemic cytokine signaling is the
    amplifying step that converts local inflammatory sources into a body-wide
    aging phenotype, and is itself one of the enumerated hallmarks of aging.
  role: amplifier
  biological_processes:
  - preferred_term: Cytokine-Mediated Signaling
    term:
      id: GO:0019221
      label: cytokine-mediated signaling pathway
    modifier: INCREASED
  evidence:
  - reference: PMID:36599349
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      We propose the following twelve hallmarks of aging: genomic instability,
      telomere attrition, epigenetic alterations, loss of proteostasis, disabled
      macroautophagy, deregulated nutrient-sensing, mitochondrial dysfunction,
      cellular senescence, stem cell exhaustion, altered intercellular
      communication, chronic inflammation, and dysbiosis.
    explanation: >-
      Enumerates altered intercellular communication and chronic inflammation as
      hallmarks of aging, framing this systemic-propagation node. Evidence source
      is OTHER because this is a review.
  downstream:
  - target: Age-Related Morbidity and Mortality
- name: Age-Related Morbidity and Mortality
  description: >-
    Sustained systemic inflammation is a shared pathogenic substrate for the
    major age-related diseases - cardiovascular disease, chronic kidney disease,
    diabetes, cancer, dementia, sarcopenia, and frailty - and a significant risk
    factor for morbidity and mortality in older people. This is the conserved
    consequence of inflammaging; the specific disease phenotype is supplied by
    the conforming disorder.
  role: consequence
  evidence:
  - reference: PMID:24833586
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Inflammaging is a highly significant risk factor for both morbidity and
      mortality in the elderly people, as most if not all age-related diseases
      share an inflammatory pathogenesis.
    explanation: >-
      States that inflammaging is a major morbidity/mortality risk factor and
      that age-related diseases share inflammatory pathogenesis, the consequence
      modeled here. Evidence source is OTHER because this is a review.
  - reference: PMID:30065258
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Inflammageing is a risk factor for cardiovascular diseases (CVDs), and
      clinical trials suggest that this association is causal.
    explanation: >-
      Provides evidence that inflammaging is a causal risk factor for
      cardiovascular disease, supporting this outcome node. Evidence source is
      OTHER because this is a review.
