name: Parkinsonism Dopaminergic Degeneration Module
description: >-
  A conserved final-common-pathway module for parkinsonism (HP:0001300) — the
  movement-disorder phenotype (bradykinesia with rigidity and/or rest tremor)
  shared by Parkinson disease and a wide range of secondary, toxic, and genetic
  parkinsonian syndromes. Diverse upstream insults — genetic (SNCA, LRRK2, PRKN,
  PINK1) and environmental/toxic (MPTP, rotenone, paraquat, manganese) — converge
  on substantia nigra dopaminergic neurons, where mitochondrial complex I
  inhibition and oxidative stress, often with alpha-synuclein aggregation, drive
  nigrostriatal dopaminergic neurodegeneration. The resulting striatal dopamine
  deficiency unbalances the basal ganglia motor circuit and produces parkinsonism.
  This module is the dopaminergic-degeneration analogue of the disease-like-phenotype
  final-common-pathway modules: individual disorder entries declare conformance via
  conforms_to on their pathophysiology nodes, substituting the disorder-specific
  upstream lesion (alpha-synuclein in PD, complex I inhibition by MPTP/rotenone,
  manganese deposition, LRRK2/GBA variants) while preserving the conserved
  nigrostriatal-to-parkinsonism chain.
category: Module
creation_date: "2026-06-11T12:00:00Z"
notes: >-
  This is a mechanism module, not a specific disease. Disorder entries reference
  individual nodes via conforms_to (e.g.,
  "parkinsonism_dopaminergic_degeneration#Nigrostriatal Dopaminergic
  Neurodegeneration", the key conformance target). It models the dopaminergic
  final common pathway of parkinsonism (HP:0001300) and is intended for Parkinson
  disease and the secondary/genetic parkinsonisms — drug- and toxin-induced
  parkinsonism (MPTP, manganese/manganism), and monogenic forms. The environmental
  neurotoxicants (rotenone, paraquat, MPTP, manganese) plug into the Mitochondrial
  Complex I Inhibition and Oxidative Stress node. Two intentional caveats: (1)
  alpha-synuclein/Lewy pathology is characteristic of Parkinson disease and the
  synucleinopathies but is not universal — MPTP and rotenone act primarily through
  complex I inhibition, so conforming nodes may omit the alpha-synuclein arm; (2)
  manganism is a partial exception in which the predominant lesion is in the globus
  pallidus rather than the nigrostriatal dopaminergic system, and it characteristically
  responds poorly to levodopa, yet it still converges on basal-ganglia motor-circuit
  dysfunction. This module is distinct from tauopathy-predominant atypical
  parkinsonism (e.g., progressive supranuclear palsy) and from the TDP-43
  proteinopathy module.
pathophysiology:
- name: Dopaminergic Neuronal Vulnerability and Toxic Insult
  description: >-
    The shared initiating event is injury to the dopaminergic neurons of the
    substantia nigra pars compacta by converging genetic and environmental
    insults. Epidemiological and toxicological data implicate occupational and
    environmental neurotoxicants — the herbicide paraquat, the pesticide rotenone,
    the meperidine contaminant MPTP, and manganese — alongside monogenic causes,
    all targeting the same selectively vulnerable nigral dopaminergic population.
  role: trigger
  cell_types:
  - preferred_term: Dopaminergic neuron
    term:
      id: CL:0000700
      label: dopaminergic neuron
  locations:
  - preferred_term: substantia nigra
    term:
      id: UBERON:0002038
      label: substantia nigra
  biological_processes:
  - preferred_term: response to oxidative stress
    term:
      id: GO:0006979
      label: response to oxidative stress
    modifier: INCREASED
  evidence:
  - reference: PMID:30474499
    reference_title: "Paraquat exposure and Parkinson's disease: A systematic review and meta-analysis."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      meta-analysis showed an association between PD and paraquat exposure (odds
      ratio = 1.64 (95% CI: 1.27-2.13
    explanation: >-
      Meta-analysis quantifies the environmental-toxicant contribution to the
      module: paraquat exposure is significantly associated with Parkinson
      disease, supporting toxic insult to dopaminergic neurons as a conserved
      trigger.
  - reference: PMID:37834407
    reference_title: "Consequences of Disturbing Manganese Homeostasis."
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Mn accumulation and neurodegenerative diseases such as manganism,
      Alzheimer's disease, Parkinson's disease, Huntington's disease
    explanation: >-
      Establishes manganese as an environmental metal whose accumulation is
      linked to parkinsonian (manganism) and other neurodegenerative disease,
      supporting metal exposure as a toxic trigger feeding this pathway.
  downstream:
  - target: Mitochondrial Complex I Inhibition and Oxidative Stress
    description: >-
      Toxic and genetic insults converge on mitochondrial complex I inhibition
      and oxidative stress in dopaminergic neurons.

- name: Mitochondrial Complex I Inhibition and Oxidative Stress
  description: >-
    The convergent biochemical lesion is impairment of mitochondrial electron
    transport chain complex I with consequent oxidative stress. Environmental
    parkinsonian toxins act here directly — MPTP (via MPP+), rotenone, and
    paraquat inhibit or poison complex I — while monogenic PD genes (PINK1, PRKN,
    DJ-1) compromise mitochondrial quality control. The energy deficit and
    reactive oxygen species generation render the highly metabolically demanding
    nigral dopaminergic neurons selectively vulnerable. This node is where the
    environmental exposome plugs into the module.
  role: amplifier
  cell_types:
  - preferred_term: Dopaminergic neuron
    term:
      id: CL:0000700
      label: dopaminergic neuron
  biological_processes:
  - preferred_term: mitochondrion organization
    term:
      id: GO:0007005
      label: mitochondrion organization
    modifier: DYSREGULATED
  - preferred_term: response to oxidative stress
    term:
      id: GO:0006979
      label: response to oxidative stress
    modifier: INCREASED
  evidence:
  - reference: PMID:36593435
    reference_title: "Rotenone-Induced Model of Parkinson's Disease: Beyond Mitochondrial Complex I Inhibition."
    supports: SUPPORT
    evidence_source: MODEL_ORGANISM
    snippet: >-
      rotenone, the classical inhibitor of mitochondrial complex I. Rotenone
      triggers the progressive death of dopaminergic neurons and α-synuclein
      inclusions formation in rats
    explanation: >-
      The rotenone model directly demonstrates that environmental complex I
      inhibition is sufficient to produce progressive dopaminergic neuron death
      and alpha-synuclein inclusions, anchoring the toxin-to-mitochondria edge.
  - reference: PMID:38245249
    reference_title: "The pathogenesis of Parkinson's disease."
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      abnormal mitochondrial, lysosomal, and endosomal function can be identified
      in both monogenic and sporadic Parkinson's disease
    explanation: >-
      Confirms mitochondrial dysfunction as a shared cellular feature across both
      monogenic and sporadic disease, supporting it as the convergent node where
      genetic and environmental causes meet.
  - reference: PMID:27911343
    reference_title: "PINK1, Parkin, and Mitochondrial Quality Control: What can we Learn about Parkinson's Disease Pathobiology?"
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      mitochondrial dysfunction has been hypothesized to play a central role in
      the pathobiology of this devastating neurodegenerative disease.
    explanation: >-
      Supports the central, long-standing role of mitochondrial dysfunction in
      parkinsonian neurodegeneration.
  downstream:
  - target: Alpha-Synuclein Aggregation and Lewy Pathology
    description: >-
      Oxidative and bioenergetic stress promotes alpha-synuclein misfolding and
      aggregation in the synucleinopathy forms.
  - target: Nigrostriatal Dopaminergic Neurodegeneration
    description: >-
      Complex I inhibition and oxidative stress directly drive death of
      vulnerable nigral dopaminergic neurons.

- name: Alpha-Synuclein Aggregation and Lewy Pathology
  description: >-
    In Parkinson disease and the synucleinopathy forms of parkinsonism, misfolded
    alpha-synuclein accumulates into Lewy bodies and Lewy neurites that spread in
    a prion-like manner and amplify dopaminergic injury. This proteostatic arm is
    characteristic of Parkinson disease but is not universal across all
    parkinsonisms — toxin models such as MPTP can produce nigral degeneration with
    variable alpha-synuclein pathology — so conforming nodes may include or omit it.
  role: central_effector
  cell_types:
  - preferred_term: Dopaminergic neuron
    term:
      id: CL:0000700
      label: dopaminergic neuron
  biological_processes:
  - preferred_term: inclusion body assembly
    term:
      id: GO:0070841
      label: inclusion body assembly
    modifier: INCREASED
  evidence:
  - reference: PMID:38245249
    reference_title: "The pathogenesis of Parkinson's disease."
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Parkinson's disease is a progressive neurodegenerative condition associated
      with the deposition of aggregated α-synuclein.
    explanation: >-
      Establishes aggregated alpha-synuclein deposition as a defining feature of
      Parkinson disease pathogenesis, the prototype of this node.
  - reference: PMID:28332488
    reference_title: "Parkinson disease."
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Neuronal loss in the substantia nigra, which causes striatal dopamine
      deficiency, and intracellular inclusions containing aggregates of
      α-synuclein are the neuropathological hallmarks of Parkinson disease.
    explanation: >-
      Identifies alpha-synuclein inclusions alongside nigral neuronal loss as the
      paired neuropathological hallmarks, linking the proteostatic arm to
      dopaminergic neurodegeneration.
  downstream:
  - target: Nigrostriatal Dopaminergic Neurodegeneration
    description: >-
      Alpha-synuclein aggregation amplifies degeneration of nigral dopaminergic
      neurons.

- name: Nigrostriatal Dopaminergic Neurodegeneration
  description: >-
    The convergent effector lesion is progressive degeneration of the substantia
    nigra pars compacta dopaminergic neurons and their nigrostriatal projection.
    This is the key conformance target of the module: motor parkinsonism emerges
    once nigral dopaminergic loss removes nigrostriatal dopamine input below a
    compensable threshold. Conforming disorders substitute their specific upstream
    driver while sharing this nigrostriatal degeneration.
  role: effector
  cell_types:
  - preferred_term: Dopaminergic neuron
    term:
      id: CL:0000700
      label: dopaminergic neuron
  locations:
  - preferred_term: substantia nigra
    term:
      id: UBERON:0002038
      label: substantia nigra
  biological_processes:
  - preferred_term: dopamine biosynthetic process
    term:
      id: GO:0042416
      label: dopamine biosynthetic process
    modifier: DECREASED
  evidence:
  - reference: PMID:37048085
    reference_title: "Microglia Mediated Neuroinflammation in Parkinson's Disease."
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      dopaminergic neuronal loss in substantia nigra pars compacta of the brain
      and aggregation of intracellular protein α-synuclein are the pathological
      characterizations.
    explanation: >-
      Confirms dopaminergic neuronal loss in the substantia nigra pars compacta
      as the core pathological lesion of parkinsonian neurodegeneration.
  - reference: PMID:28332488
    reference_title: "Parkinson disease."
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Neuronal loss in the substantia nigra, which causes striatal dopamine
      deficiency, and intracellular inclusions containing aggregates of
      α-synuclein are the neuropathological hallmarks of Parkinson disease.
    explanation: >-
      States that substantia nigra neuronal loss causes striatal dopamine
      deficiency, supporting the edge from nigral degeneration to the downstream
      striatal/circuit node.
  downstream:
  - target: Striatal Dopamine Deficiency and Basal Ganglia Circuit Dysfunction
    description: >-
      Loss of the nigrostriatal projection depletes striatal dopamine and
      unbalances the basal ganglia motor circuit.

- name: Striatal Dopamine Deficiency and Basal Ganglia Circuit Dysfunction
  description: >-
    Loss of nigrostriatal dopaminergic terminals depletes dopamine in the
    striatum, the principal input nucleus of the basal ganglia. Reduced striatal
    dopamine shifts the basal ganglia-thalamocortical motor circuit toward
    excessive inhibitory output (hyperactive indirect pathway, hypoactive direct
    pathway), producing the cardinal features of parkinsonism (HP:0001300) —
    bradykinesia, rigidity, and rest tremor. In the dopaminergic parkinsonisms
    this circuit deficit is levodopa-responsive; manganism is a partial exception
    with predominantly pallidal pathology and poor levodopa response.
  role: effector
  cell_types:
  - preferred_term: Striatal medium spiny neuron
    term:
      id: CL:1001474
      label: medium spiny neuron
  locations:
  - preferred_term: striatum
    term:
      id: UBERON:0002435
      label: striatum
  - preferred_term: basal ganglia
    term:
      id: UBERON:0002420
      label: basal ganglion
  biological_processes:
  - preferred_term: dopamine secretion
    term:
      id: GO:0014046
      label: dopamine secretion
    modifier: DECREASED
  - preferred_term: dopaminergic synaptic transmission
    term:
      id: GO:0001963
      label: synaptic transmission, dopaminergic
    modifier: DECREASED
  evidence:
  - reference: PMID:28332488
    reference_title: "Parkinson disease."
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Neuronal loss in the substantia nigra, which causes striatal dopamine
      deficiency, and intracellular inclusions containing aggregates of
      α-synuclein are the neuropathological hallmarks of Parkinson disease.
    explanation: >-
      Identifies striatal dopamine deficiency as a defining neuropathological
      hallmark, the proximate biochemical deficit of this node.
  - reference: PMID:18781672
    reference_title: "Functional organization of the basal ganglia: therapeutic implications for Parkinson's disease."
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Dopaminergic depletion in Parkinson's disease disrupts the corticostriatal
      balance leading to increased activity the indirect circuit and reduced
      activity in the direct circuit.
    explanation: >-
      Describes how striatal dopamine loss unbalances the direct and indirect
      basal ganglia pathways, the circuit basis of parkinsonian motor signs.
  - reference: PMID:19127584
    reference_title: "The basal ganglia in Parkinson's disease: current concepts and unexplained observations."
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      In the parkinsonian state, dopamine depletion shifts the BG toward
      inhibiting cortically generated movements by increasing the gain in the
      globus pallidus pars externa-subthalamic nucleus-globus pallidus pars
      interna network
    explanation: >-
      Mechanistically links dopamine depletion to excessive basal ganglia
      inhibitory output that suppresses movement, supporting parkinsonism as the
      circuit-level endpoint of the module.
