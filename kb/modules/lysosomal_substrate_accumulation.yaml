name: Lysosomal Substrate Accumulation Module
description: >-
  A conserved pathological module representing the shared core of the lysosomal
  storage diseases (LSDs): an inherited deficiency of a specific lysosomal
  hydrolase (or of a non-enzymatic protein/transporter essential for normal
  lysosomal function) blocks catabolism of a macromolecular substrate, which
  then accumulates undegraded within the lysosome. Progressive intralysosomal
  storage distends the organelle and impairs lysosome function, triggering a
  secondary cascade of autophagic-flux block, disturbed signalling, mitochondrial
  and calcium dysregulation. The affected cell type — often only a subset of
  cells determined by where the substrate is normally turned over — undergoes
  storage-cell transformation, cytotoxicity, and (in the CNS) neuroinflammation
  and neurodegeneration, producing progressive multi-organ disease. This
  conserved core is shared across sphingolipidoses, mucopolysaccharidoses,
  glycoproteinoses, glycogenoses (Pompe), and free-substrate transport defects.
  Individual disorder entries declare conformance via conforms_to on their
  pathophysiology nodes, substituting the disorder-specific deficient enzyme,
  stored substrate, and storage cell type while preserving the conserved
  deficiency -> accumulation -> lysosomal dysfunction -> cytotoxicity ->
  multisystem disease chain.
category: Module
creation_date: "2026-05-30T00:00:00Z"
notes: >-
  This is a mechanism module, not a specific disease. Disorder entries reference
  individual nodes via conforms_to (e.g., "lysosomal_substrate_accumulation#
  Lysosomal Substrate Accumulation"). The module defines the expected
  pathophysiology structure; conforming nodes in disorder files should substitute
  the disorder-specific deficient gene/enzyme and stored substrate while
  preserving the conserved cascade. Key disorder-specific substitutions:
  Gaucher uses glucocerebrosidase (GBA1) deficiency and glucocerebroside storage
  in macrophage-derived Gaucher cells (CL:0000235); Tay-Sachs/Sandhoff use
  hexosaminidase deficiency and GM2 ganglioside storage in neurons (CL:0000540);
  Fabry uses alpha-galactosidase A deficiency and Gb3 storage in endothelium,
  podocytes, and cardiomyocytes; the mucopolysaccharidoses use specific
  glycosaminoglycan-degrading enzyme deficiencies and GAG storage; Pompe uses
  acid alpha-glucosidase deficiency and lysosomal glycogen storage in myofibers.
  Evidence here is drawn from cross-LSD reviews documenting the conserved
  cascade rather than any single disease; evidence_source is OTHER because these
  are reviews synthesizing data across multiple study types. The key conformance
  target is the central effector node "Lysosomal Substrate Accumulation".
pathophysiology:
- name: Lysosomal Hydrolase or Cofactor Deficiency
  description: >-
    A monogenic loss-of-function defect reduces the activity of a specific acid
    hydrolase that degrades a macromolecular substrate within the lysosome, or
    of a non-enzymatic protein (activator, membrane transporter, or trafficking
    factor) required for normal lysosomal catabolism. The identity of the
    deficient enzyme/protein varies by disorder, but the consequence — loss of
    the catabolic step for a particular substrate — is the conserved trigger of
    the module.
  role: trigger
  biological_processes:
  - preferred_term: macromolecule catabolic process
    term:
      id: GO:0009057
      label: macromolecule catabolic process
    modifier: DECREASED
  evidence:
  - reference: PMID:36285443
    supports: SUPPORT
    evidence_source: OTHER
    snippet: "They are caused by a deficiency in specific lysosomal hydrolases involved in cellular catabolism, or non-enzymatic proteins essential for normal lysosomal functions."
    explanation: >-
      Establishes the conserved trigger of the module: deficiency of a specific
      lysosomal hydrolase or of a non-enzymatic protein required for lysosomal
      function. Evidence source is OTHER because this is a review synthesizing
      data across many lysosomal storage diseases.
  downstream:
  - target: Lysosomal Substrate Accumulation
    description: >-
      Loss of the catabolic step leaves the substrate undegraded, so it
      accumulates within the lysosome.

- name: Lysosomal Substrate Accumulation
  description: >-
    The substrate that can no longer be degraded accumulates undegraded within
    the lysosomal lumen. Storage is frequently restricted to the cell types in
    which that substrate is normally turned over in greatest quantity (e.g.,
    macrophages for glucocerebroside, neurons for gangliosides), which patterns
    the organ-specific clinical picture. This intralysosomal accumulation is the
    central, defining effector event of every lysosomal storage disease and the
    key conformance target for disorder entries.
  role: central_effector
  evidence:
  - reference: PMID:36285443
    supports: SUPPORT
    evidence_source: OTHER
    snippet: "Lysosomal storage diseases (LSDs) comprise a group of inherited monogenic disorders characterized by lysosomal dysfunctions due to undegraded substrate accumulation."
    explanation: >-
      Defines undegraded substrate accumulation as the characterizing event of
      the lysosomal storage diseases, the central effector of this module.
      Evidence source is OTHER because this is a cross-LSD review.
  - reference: PMID:30651381
    supports: SUPPORT
    evidence_source: OTHER
    snippet: "Lysosomal storage diseases (LSDs) are characterized by disturbances in this network and by intralysosomal accumulation of substrates, often only in certain cell types."
    explanation: >-
      Confirms intralysosomal substrate accumulation as the defining feature and
      documents the conserved cell-type restriction of storage, which underlies
      the organ-specific substitutions made by conforming disorder nodes.
      Evidence source is OTHER because this is a review.
  downstream:
  - target: Autophagic-Lysosomal Dysfunction and Secondary Cascade
    description: >-
      Progressive storage distends the lysosome and impairs its function,
      initiating a secondary cellular cascade.

- name: Autophagic-Lysosomal Dysfunction and Secondary Cascade
  description: >-
    Progressive lysosomal storage impairs core lysosome functions, blocking
    autophagic flux and disturbing membrane repair, exocytosis, lipid
    homeostasis, and signalling. Substrate accumulation is only the first event
    of a cascade that includes accumulation of secondary metabolites and
    impairment of cellular trafficking, cell signalling, mitochondrial function,
    and calcium homeostasis. This amplifying step converts a single catabolic
    block into broad cellular dysfunction.
  role: amplifier
  biological_processes:
  - preferred_term: autophagy
    term:
      id: GO:0006914
      label: autophagy
    modifier: DYSREGULATED
  - preferred_term: lysosome organization
    term:
      id: GO:0007040
      label: lysosome organization
    modifier: DYSREGULATED
  evidence:
  - reference: PMID:36285443
    supports: SUPPORT
    evidence_source: OTHER
    snippet: "A substantial number of studies on the pathogenesis of LSDs has highlighted how the accumulation of lysosomal substrates is only the first event of a cascade of processes including the accumulation of secondary metabolites and the impairment of cellular trafficking, cell signalling, autophagic flux, mitochondria functionality and calcium homeostasis, that significantly contribute to the onset and progression of these diseases."
    explanation: >-
      Documents the conserved secondary cascade (impaired autophagic flux,
      trafficking, signalling, mitochondrial and calcium homeostasis) that
      amplifies primary substrate storage into broad cellular dysfunction.
      Evidence source is OTHER because this is a cross-LSD review.
  - reference: PMID:30651381
    supports: SUPPORT
    evidence_source: OTHER
    snippet: "This Review aims to discuss how lysosomal storage affects functions linked to lysosomes, such as membrane repair, autophagy, exocytosis, lipid homeostasis, signalling cascades and cell viability."
    explanation: >-
      Enumerates the lysosome-linked functions (autophagy, membrane repair,
      exocytosis, lipid homeostasis, signalling, cell viability) disrupted by
      storage, supporting this amplifier node. Evidence source is OTHER because
      this is a review.
  downstream:
  - target: Storage-Cell Cytotoxicity and Neuroinflammation
    description: >-
      Sustained lysosomal and autophagic dysfunction drives storage-cell
      transformation, cytotoxicity, and, in the CNS, neuroinflammation.

- name: Storage-Cell Cytotoxicity and Neuroinflammation
  description: >-
    The affected cell becomes an engorged storage cell whose impaired autophagy
    and lysosomal dysfunction compromise viability, driving apoptotic death. In
    the central nervous system, impaired neuronal autophagy initiates neuronal
    damage and activates microglia and astrocytes, producing a
    neuroinflammatory response that amplifies neurodegeneration. The specific
    storage cell varies by disorder (lipid-laden macrophage, ganglioside-laden
    neuron, GAG-laden mesenchymal and neural cells), but the progression from
    storage to cytotoxicity and inflammation is conserved.
  role: effector
  cell_types:
  - preferred_term: macrophage
    term:
      id: CL:0000235
      label: macrophage
  - preferred_term: neuron
    term:
      id: CL:0000540
      label: neuron
  biological_processes:
  - preferred_term: apoptotic process
    term:
      id: GO:0006915
      label: apoptotic process
    modifier: INCREASED
  - preferred_term: inflammatory response
    term:
      id: GO:0006954
      label: inflammatory response
    modifier: INCREASED
  evidence:
  - reference: PMID:30451936
    supports: SUPPORT
    evidence_source: OTHER
    snippet: "The pathophysiological mechanism of these diseases has been investigated, indicating impaired autophagy in neuronal damage initiation, association of activated microglia and astrocytes with the neuroinflammatory processes, and involvement of tauopathy."
    explanation: >-
      Establishes the conserved neuronopathic effector mechanism: impaired
      autophagy initiating neuronal damage and microglial/astrocyte activation
      driving neuroinflammation. Evidence source is OTHER because this is a
      review of the mucopolysaccharidoses synthesizing multiple study types.
  - reference: PMID:30651381
    supports: PARTIAL
    evidence_source: OTHER
    snippet: "This Review aims to discuss how lysosomal storage affects functions linked to lysosomes, such as membrane repair, autophagy, exocytosis, lipid homeostasis, signalling cascades and cell viability."
    explanation: >-
      Supports the link from lysosomal storage to compromised cell viability;
      partial because the quote names cell viability as an affected function
      without detailing the apoptotic and neuroinflammatory effectors.
  downstream:
  - target: Progressive Multisystem and Neurodegenerative Disease
    description: >-
      Accumulated cytotoxicity across affected cell types produces progressive
      organ and nervous-system disease.

- name: Progressive Multisystem and Neurodegenerative Disease
  description: >-
    The lack of degradation and lysosomal storage perturbs cellular homeostasis
    and, in turn, damages multiple organ systems. The specific clinical pattern
    (hepatosplenomegaly, skeletal dysplasia, cardiomyopathy, renal disease,
    psychomotor regression) depends on which cell types store substrate, but the
    final common outcome of progressive, multisystem, often neurodegenerative
    disease is conserved across the lysosomal storage diseases.
  role: consequence
  evidence:
  - reference: PMID:36285443
    supports: SUPPORT
    evidence_source: OTHER
    snippet: "In LSDs, the lack of degradation of the accumulated substrate and its lysosomal storage impairs lysosome functions resulting in the perturbation of cellular homeostasis and, in turn, the damage of multiple organ systems."
    explanation: >-
      Directly states the conserved terminal consequence: impaired lysosome
      function from storage perturbs cellular homeostasis and damages multiple
      organ systems. Evidence source is OTHER because this is a cross-LSD review.
