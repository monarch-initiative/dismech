name: Drug-Induced Nephrotoxicity Module
description: >-
  A conserved treatment-toxicity module representing the final common pathway by
  which nephrotoxic drugs injure the renal tubule and cause acute kidney injury.
  The culprit agent varies — cisplatin and other platinums, aminoglycosides,
  vancomycin, tenofovir, amphotericin B, iodinated contrast, NSAIDs — but because
  the kidney concentrates, transports, and excretes these compounds, the
  downstream sequence repeatedly converges on proximal tubular drug accumulation,
  oxidative and mitochondrial stress, tubular epithelial cell death (apoptosis and
  acute tubular necrosis), tubulointerstitial inflammation, and a fall in
  glomerular filtration rate. This is a "side effect as mechanism" module: it
  captures the adverse-drug-reaction pathophysiology shared across nephrotoxic
  drugs, so a drug-toxicity entry can declare conformance rather than re-deriving
  the chain. It models the dose-dependent acute-tubular-injury arm; crystal/cast
  obstruction and immune-mediated interstitial nephritis are distinct arms noted
  in the literature but not the focus here.
category: Module
creation_date: "2026-06-24T00:00:00Z"
notes: >-
  This is a mechanism module, not a specific disease. Disorder entries reference
  individual nodes via conforms_to (e.g.,
  "drug_induced_nephrotoxicity#Proximal Tubular Epithelial Cell Death").
  Conforming nodes should substitute the drug-specific uptake/transport route
  (e.g. OCT2/cisplatin, megalin-endocytosis/aminoglycosides) while preserving the
  conserved uptake → oxidative/mitochondrial stress → tubular cell death →
  inflammation → AKI chain. The key conformance / central-effector target is
  "drug_induced_nephrotoxicity#Proximal Tubular Epithelial Cell Death".
pathophysiology:
- name: Nephrotoxic Drug Exposure and Tubular Uptake
  description: >-
    The conserved initiating lesion is renal handling of the drug: the proximal
    tubule is exposed to filtered and secreted compounds and takes them up via
    apical endocytosis or basolateral organic anion/cation transporters, leading
    to intracellular accumulation. This renal handling, combined with the drug's
    inherent toxicity, concentrates the insult in tubular epithelial cells.
  role: trigger
  cell_types:
  - preferred_term: proximal tubule epithelial cell
    term:
      id: CL:0002306
      label: epithelial cell of proximal tubule
  biological_processes:
  - preferred_term: xenobiotic transport
    term:
      id: GO:0042908
      label: xenobiotic transport
    modifier: INCREASED
  evidence:
  - reference: PMID:34204029
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      The (mainly proximal) tubules are exposed via apical contact with the
      compounds secreted into the tubular lumen, their uptake by the tubular
      epithelial cells
    explanation: >-
      Establishes proximal tubular exposure and uptake of drugs as the initiating
      step of nephrotoxicity captured by this trigger node. Evidence source is
      OTHER because this is a review article.
  - reference: PMID:31483318
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Transport of tenofovir and cisplatin by organic anion and cation
      transporters in the basolateral surface of the proximal tubule,
      respectively, are associated with intracellular drug accumulation and
      injury.
    explanation: >-
      Gives the transporter-mediated mechanism by which nephrotoxins accumulate
      in proximal tubular cells, the insult-agnostic substitution point of this
      node. Evidence source is OTHER because this is a review article.
  downstream:
  - target: Tubular Oxidative Stress and Mitochondrial Injury
    description: >-
      Accumulated drug provokes oxidative and mitochondrial stress in tubular
      cells.
- name: Tubular Oxidative Stress and Mitochondrial Injury
  description: >-
    Intracellular drug accumulation generates reactive oxygen species and damages
    mitochondria in the metabolically active proximal tubule, the major amplifying
    event linking drug uptake to tubular cell death.
  role: amplifier
  cell_types:
  - preferred_term: proximal tubule epithelial cell
    term:
      id: CL:0002306
      label: epithelial cell of proximal tubule
  cellular_components:
  - preferred_term: mitochondrion
    term:
      id: GO:0005739
      label: mitochondrion
  biological_processes:
  - preferred_term: response to oxidative stress
    term:
      id: GO:0006979
      label: response to oxidative stress
    modifier: INCREASED
  evidence:
  - reference: PMID:33750909
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      The pathophysiology of cisplatin-induced AKI involves proximal tubular
      injury, apoptosis, oxidative stress, inflammation, and vascular injury in
      the kidneys.
    explanation: >-
      Lists oxidative stress among the core pathophysiologic mechanisms of
      nephrotoxic tubular injury, the amplifier step of this module. Evidence
      source is OTHER because this is a review article.
  - reference: PMID:31226747
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Pathways involved in AKI include apoptosis, necrosis, inflammation, and
      increased oxidative stress
    explanation: >-
      Independently identifies increased oxidative stress as a pathway in
      nephrotoxic AKI. Evidence source is OTHER because this is a review article.
  downstream:
  - target: Proximal Tubular Epithelial Cell Death
    description: >-
      Oxidative and mitochondrial injury precipitate tubular epithelial cell
      death.
- name: Proximal Tubular Epithelial Cell Death
  description: >-
    Oxidative and mitochondrial injury precipitate proximal tubular epithelial
    cell death by apoptosis and acute tubular necrosis (ATN). This is the central
    effector lesion and the key conformance target; conforming disorder nodes
    substitute the drug-specific upstream driver but converge here.
  role: central_effector
  cell_types:
  - preferred_term: proximal tubule epithelial cell
    term:
      id: CL:0002306
      label: epithelial cell of proximal tubule
  biological_processes:
  - preferred_term: cell death
    term:
      id: GO:0008219
      label: cell death
    modifier: INCREASED
  - preferred_term: apoptotic process
    term:
      id: GO:0006915
      label: apoptotic process
    modifier: INCREASED
  evidence:
  - reference: PMID:34204029
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      drug-induced nephrotoxicity develops according to one of the three
      mechanisms: (1) proximal tubular injury and acute tubular necrosis (ATN) (a
      dose-dependent mechanism)
    explanation: >-
      Names proximal tubular injury and acute tubular necrosis as the principal
      dose-dependent mechanism of drug nephrotoxicity, the effector captured here.
      Evidence source is OTHER because this is a review article.
  - reference: PMID:31226747
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Pathways involved in AKI include apoptosis, necrosis, inflammation, and
      increased oxidative stress
    explanation: >-
      Identifies apoptosis and necrosis as the cell-death pathways of nephrotoxic
      AKI. Evidence source is OTHER because this is a review article.
  downstream:
  - target: Tubulointerstitial Inflammation
    description: >-
      Dying tubular cells release signals that recruit inflammatory cells.
  - target: Acute Kidney Injury
    description: >-
      Loss of functional tubular epithelium reduces kidney function.
- name: Tubulointerstitial Inflammation
  description: >-
    Tubular cell death releases damage-associated signals that drive
    tubulointerstitial inflammation, which amplifies and extends the tubular
    injury.
  role: amplifier
  cell_types:
  - preferred_term: proximal tubule epithelial cell
    term:
      id: CL:0002306
      label: epithelial cell of proximal tubule
  biological_processes:
  - preferred_term: inflammatory response
    term:
      id: GO:0006954
      label: inflammatory response
    modifier: INCREASED
  evidence:
  - reference: PMID:33750909
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      The pathophysiology of cisplatin-induced AKI involves proximal tubular
      injury, apoptosis, oxidative stress, inflammation, and vascular injury in
      the kidneys.
    explanation: >-
      Lists inflammation among the core mechanisms amplifying nephrotoxic tubular
      injury. Evidence source is OTHER because this is a review article.
  downstream:
  - target: Acute Kidney Injury
    description: >-
      Sustained inflammatory injury extends nephron loss toward clinical AKI.
- name: Acute Kidney Injury
  description: >-
    Accumulated tubular cell loss and inflammation reduce the glomerular
    filtration rate, producing acute kidney injury — the defining clinical
    consequence and frequently a dose-limiting toxicity that necessitates dose
    reduction or drug withdrawal.
  role: consequence
  cell_types:
  - preferred_term: proximal tubule epithelial cell
    term:
      id: CL:0002306
      label: epithelial cell of proximal tubule
  biological_processes:
  - preferred_term: renal system process
    term:
      id: GO:0003014
      label: renal system process
    modifier: DECREASED
  evidence:
  - reference: PMID:34204029
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Acute kidney injury (AKI), formerly known as acute renal failure, is
      described as a rapid decrease in the glomerular filtration rate
    explanation: >-
      Defines acute kidney injury as a rapid fall in glomerular filtration rate,
      the consequence endpoint of this module. Evidence source is OTHER because
      this is a review article.
  - reference: PMID:31483318
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Drug-related acute tubular/tubulointerstitial injury is the most common
      cause of AKI associated with these agents.
    explanation: >-
      Establishes drug-related tubular injury as the most common cause of
      medication-associated AKI, the consequence of this module. Evidence source
      is OTHER because this is a review article.
phenotypes:
- name: Acute kidney injury
  description: >-
    Rapid decline in kidney function (falling GFR) from nephrotoxic tubular
    injury, the defining clinical manifestation.
  phenotype_term:
    preferred_term: Acute kidney injury
    term:
      id: HP:0001919
      label: Acute kidney injury
  evidence:
  - reference: PMID:33750909
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      20%-35% of patients develop acute kidney injury (AKI) after cisplatin
      administration.
    explanation: >-
      Documents acute kidney injury as the frequent clinical outcome of a
      representative nephrotoxic drug. Evidence source is OTHER because this is a
      review article.
- name: Elevated serum creatinine
  description: >-
    Rising serum creatinine, the standard biochemical marker of the GFR decline
    that defines acute kidney injury.
  phenotype_term:
    preferred_term: Elevated serum creatinine
    term:
      id: HP:0003259
      label: Elevated circulating creatinine concentration
  evidence:
  - reference: PMID:34204029
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      an absolute increase in serum creatinine level by 0.3 mg/dL or a relative
      increase of 50% over 48 h
    explanation: >-
      The diagnostic definition of AKI is anchored on rising serum creatinine,
      supporting it as a phenotype of this module. Evidence source is OTHER
      because this is a review article.
