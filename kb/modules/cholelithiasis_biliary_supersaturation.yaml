name: Cholelithiasis Biliary Supersaturation Module
description: >-
  A conserved module representing the final common pathway of cholesterol
  gallstone formation, the dominant form of cholelithiasis. Hepatic
  hypersecretion of cholesterol relative to bile salts and phospholipids
  produces gallbladder bile that is supersaturated with cholesterol. Within
  this metastable bile, pronucleating mucin and gallbladder factors accelerate
  the precipitation of solid cholesterol monohydrate crystals, while gallbladder
  hypomotility and bile stasis provide the residence time needed for crystals to
  be retained, aggregate, and grow into macroscopic gallstones. The resulting
  stones cause biliary colic, cystic-duct or biliary obstruction, and
  cholecystitis. Diverse predisposing factors (ABCG5/G8 and ABCB4 lithogenic
  variants, obesity, insulin resistance, female sex, rapid weight loss)
  converge on this supersaturation-nucleation-stasis triad. Conforming disorder
  entries substitute disorder-specific lithogenic drivers while preserving the
  conserved causal chain.
category: Module
creation_date: "2026-06-06T00:00:00Z"
notes: >-
  This is a mechanism module, not a specific disease. Disorder entries reference
  individual nodes via conforms_to (e.g.,
  "cholelithiasis_biliary_supersaturation#Gallbladder Hypomotility and Bile
  Stasis"). The module defines the conserved cholesterol-gallstone pathway;
  conforming nodes should include the corresponding cell types, biological
  processes, and causal edges. Disorder-specific substitutions: monogenic
  defects substitute the affected hepatic transporter (ABCG5/G8 cholesterol
  hypersecretion, ABCB4 phospholipid deficiency) at the supersaturation node;
  metabolic disorders (obesity, type 2 diabetes, hypertriglyceridemia) emphasize
  insulin-resistance-driven hypersecretion and CCK-1R-related gallbladder
  hypomotility.
pathophysiology:
- name: Biliary Cholesterol Supersaturation
  description: >-
    Hepatic hypersecretion of cholesterol, in excess of the bile salts and
    phospholipids needed to keep it solubilized in mixed micelles and vesicles,
    yields gallbladder bile that is supersaturated with cholesterol. This
    metastable, cholesterol-rich physical-chemical state of bile is the
    initiating lesion of cholesterol gallstone disease and is driven by
    lithogenic transporter variants (ABCG5/G8, ABCB4) and metabolic factors such
    as insulin resistance.
  role: trigger
  cell_types:
  - preferred_term: hepatocyte
    term:
      id: CL:0000182
      label: hepatocyte
  biological_processes:
  - preferred_term: cholesterol homeostasis
    term:
      id: GO:0042632
      label: cholesterol homeostasis
    modifier: DYSREGULATED
  - preferred_term: bile acid metabolic process
    term:
      id: GO:0008206
      label: bile acid metabolic process
    modifier: DYSREGULATED
  evidence:
  - reference: PMID:29283909
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Major pathogenetic factors for cholesterol gallstones include a genetic
      background, hepatic hypersecretion of cholesterol, and supersaturated bile
      which give life to precipitating cholesterol crystals that accumulate and
      grow in a sluggish gallbladder.
    explanation: >-
      Review evidence identifies hepatic cholesterol hypersecretion and
      supersaturated bile as the initiating pathogenetic factors of cholesterol
      gallstone disease. Evidence source is OTHER because this is a review
      synthesizing human and animal-model data.
  - reference: PMID:36602656
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      A reduction or deficiency of biliary phospholipids results in a distinctly
      abnormal metastable physical-chemical state of bile predisposing to
      supersaturation with cholesterol.
    explanation: >-
      Establishes that loss of the phospholipid component of bile (as in ABCB4
      deficiency) drives the metastable, cholesterol-supersaturated state.
      Evidence source is OTHER because this is a review of clinical, animal, and
      in vitro studies.
  downstream:
  - target: Pronucleating Cholesterol Crystal Nucleation

- name: Pronucleating Cholesterol Crystal Nucleation
  description: >-
    Within supersaturated bile, accelerated nucleation drives the phase
    transition from soluble cholesterol in vesicles and micelles to solid
    cholesterol monohydrate crystals. Pronucleating factors secreted into the
    gallbladder lumen, chiefly gallbladder mucin glycoprotein, bind biliary
    lipids and shorten the cholesterol crystal appearance time, tipping the
    metastable bile toward crystal precipitation.
  role: amplifier
  evidence:
  - reference: PMID:10092316
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: >-
      Mucin has a central role in the pathogenesis of cholesterol gallstones, in
      part because of its ability to bind biliary lipids and accelerate
      cholesterol crystal appearance time.
    explanation: >-
      Demonstrates that gallbladder mucin acts as a pronucleating agent,
      binding biliary lipids and accelerating cholesterol crystal nucleation in
      model bile. Evidence source is IN_VITRO because the pronucleating activity
      was measured with a recombinant mucin polypeptide in cholesterol crystal
      appearance assays.
  - reference: PMID:18992590
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Cholesterol crystal formation requires the presence of one or more of the
      following: (a) cholesterol supersaturation, (b) accelerated nucleation, or
      (c) gallbladder hypomotility/bile stasis.
    explanation: >-
      Review establishes accelerated nucleation as one of the three conserved
      requirements for cholesterol crystal formation. Evidence source is OTHER
      because this is a review synthesizing the lithogenesis literature.
  downstream:
  - target: Gallbladder Hypomotility and Bile Stasis

- name: Gallbladder Hypomotility and Bile Stasis
  description: >-
    Impaired gallbladder smooth muscle contraction with incomplete postprandial
    emptying and enlarged residual volumes produces bile stasis. The prolonged
    gallbladder residence time allows cholesterol crystals to be retained,
    aggregate, and grow rather than being expelled. Gallbladder hypomotility
    frequently antedates stone formation and is linked to cholesterol-laden
    smooth muscle, lipotoxicity, and impaired CCK-1 receptor signaling.
  role: central_effector
  cell_types:
  - preferred_term: gallbladder smooth muscle cell
    term:
      id: CL:0000192
      label: smooth muscle cell
  biological_processes:
  - preferred_term: smooth muscle contraction
    term:
      id: GO:0006939
      label: smooth muscle contraction
    modifier: DECREASED
  evidence:
  - reference: PMID:29283909
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      About one-third of cholesterol gallstone patients display enlarged fasting
      and postprandial residual gallbladder volumes with delayed emptying
    explanation: >-
      Documents impaired gallbladder emptying with increased residual volumes in
      cholesterol gallstone patients, the clinical signature of gallbladder
      hypomotility and bile stasis. Evidence source is OTHER because this is a
      review summarizing multiple clinical studies.
  - reference: PMID:29283909
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Dysfunctional gallbladder motility provides sufficient time for cholesterol
      nucleation and gallstone growth
    explanation: >-
      Directly links gallbladder dysmotility and bile stasis to the residence
      time required for crystal nucleation and stone growth. Evidence source is
      OTHER because this is a review.
  downstream:
  - target: Gallstone Aggregation and Growth

- name: Gallstone Aggregation and Growth
  description: >-
    Retained cholesterol monohydrate crystals aggregate and, embedded in a mucin
    gel matrix in the stagnant gallbladder, grow and coalesce into macroscopic
    cholesterol gallstones. Continued supersaturation and stasis sustain crystal
    growth, converting microscopic crystals into clinically relevant calculi.
  role: effector
  biological_processes:
  - preferred_term: cholesterol transport
    term:
      id: GO:0030301
      label: cholesterol transport
    modifier: DYSREGULATED
  evidence:
  - reference: PMID:36602656
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Changes in biliary phospholipid concentrations influence cholesterol
      crystallization by yielding both liquid crystalline and "anhydrous"
      crystalline metastable intermediates, evolving into classical
      parallelogram-shaped cholesterol monohydrate crystals in supersaturated
      bile.
    explanation: >-
      Describes the progression of crystallization through metastable
      intermediates to mature cholesterol monohydrate crystals, the building
      blocks of cholesterol gallstones. Evidence source is OTHER because this is
      a review of clinical, animal, and in vitro studies.
  - reference: PMID:29283909
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      supersaturated bile which give life to precipitating cholesterol crystals
      that accumulate and grow in a sluggish gallbladder.
    explanation: >-
      States that precipitated cholesterol crystals accumulate and grow in the
      hypomotile gallbladder, the step that produces macroscopic stones.
      Evidence source is OTHER because this is a review.
  downstream:
  - target: Cholelithiasis

- name: Cholelithiasis
  description: >-
    Macroscopic gallstones in the gallbladder constitute cholelithiasis. When
    stones become impacted in the gallbladder neck or cystic duct they cause
    biliary colic and mechanical obstruction, which raises intraluminal pressure
    and precipitates acute cholecystitis; migration into the biliary tree can
    cause obstructive complications. This is the clinical phenotype that the
    conserved supersaturation-nucleation-stasis pathway produces.
  role: consequence
  evidence:
  - reference: PMID:39541246
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      In acute calculous cholecystitis, gallstones are the cause of obstruction
      and are often impacted in the gallbladder neck or cystic duct, leading to
      gallbladder inflammation.
    explanation: >-
      Establishes that gallstones cause mechanical obstruction at the
      gallbladder neck or cystic duct and resulting cholecystitis, the defining
      clinical consequence of cholelithiasis. Evidence source is OTHER because
      this is a review of clinical imaging and pathology.
  - reference: PMID:39541246
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      In acute cholecystitis, increased dilatation and high intraluminal
      pressures lead to gallbladder inflammation and may progress to gangrenous
      changes, focal wall necrosis, and subsequent perforation.
    explanation: >-
      Describes how obstruction-driven intraluminal pressure produces
      gallbladder inflammation and its complications, the downstream morbidity
      of cholelithiasis. Evidence source is OTHER because this is a review.
