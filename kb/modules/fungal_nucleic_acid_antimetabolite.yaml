name: Fungal Nucleic-Acid Antimetabolite Module
description: >-
  The flucytosine (5-fluorocytosine, 5-FC) prodrug-activation pathway and the
  point at which this pyrimidine antimetabolite poisons fungal nucleic-acid
  metabolism. 5-FC has no intrinsic antifungal activity; it must be activated
  inside the fungus by a defined biochemical cascade, which this module traces as
  a causal sequence. First the drug is imported across the fungal membrane by the
  cytosine (purine-cytosine) permease Fcy2. Inside the cell, fungal cytosine
  deaminase Fcy1 deaminates 5-FC to 5-fluorouracil (5-FU) — the committed
  activation step and the structural basis of selectivity, because mammalian
  cells lack cytosine deaminase and therefore never activate the prodrug.
  Activated 5-FU is then anabolised, via the uracil phosphoribosyltransferase
  Fur1 and downstream kinases, to the fluorinated nucleotides 5-fluorouridine
  triphosphate (5-FUTP) and 5-fluorodeoxyuridine monophosphate (5-FdUMP). These
  effector nucleotides converge on two targets: 5-FUTP mis-incorporates into
  fungal RNA in place of uridylate, corrupting transcripts and inhibiting protein
  synthesis, while 5-FdUMP inhibits thymidylate synthase and blocks DNA synthesis.
  Because every step of this chain can be broken by a single loss-of-function
  mutation (FCY2 permease, FCY1 deaminase, or FUR1 phosphoribosyltransferase),
  monotherapy rapidly selects resistance, which is why flucytosine is given in
  combination — classically with amphotericin B for cryptococcal meningitis. The
  drug class acting on this pathway is the pyrimidine antimetabolite antifungals
  (flucytosine). This module defines the mechanism-of-action design pattern for
  flucytosine treatments: conforming fungal-disease entries link a treatment to
  the specific node it inhibits via target_mechanisms.
category: Module
creation_date: "2026-06-24T00:00:00Z"
notes: >-
  This is an antifungal drug-mechanism module structured as a biological pathway,
  not a specific disease. Its nodes are the successive biochemical steps of
  flucytosine activation and antimetabolite action (permease uptake -> cytosine
  deaminase activation to 5-FU -> anabolism to fluorinated nucleotides ->
  disruption of RNA and DNA synthesis), with an adaptive-resistance branch; the
  pyrimidine-antimetabolite drug class (flucytosine) that acts on the pathway is
  described in the node text rather than modelled as a separate node. Disorder
  entries reference individual nodes via conforms_to (e.g.,
  "fungal_nucleic_acid_antimetabolite#Deamination to 5-Fluorouracil by Fungal
  Cytosine Deaminase"), and their flucytosine treatments point at the inhibited
  node via target_mechanisms (analogous to how cell-wall-active antibiotic
  treatments link to "bacterial_cell_wall_synthesis_inhibition#Peptidoglycan
  Cross-Linking by Penicillin-Binding Proteins"). Key conformance / treatment
  target: "Deamination to 5-Fluorouracil by Fungal Cytosine Deaminase" — the
  fungal-specific prodrug-activation step that gives selective toxicity, since
  mammalian cells lack cytosine deaminase. The resistance node captures the gating
  knowledge that distinguishes "flucytosine is used" from durable activity — rapid
  monotherapy resistance via FCY1/FCY2/FUR1 mutations that mandates combination
  therapy (classically with amphotericin B for cryptococcal meningitis). See
  projects/ANTIFUNGAL.md for the broader antifungal drug-fungus strategy.
pathophysiology:
- name: Flucytosine Uptake by Fungal Cytosine Permease
  description: >-
    The antimetabolite cascade begins when flucytosine (5-fluorocytosine, 5-FC), a
    synthetic cytosine analogue with no intrinsic antifungal capacity, is imported
    across the fungal plasma membrane by the cytosine (purine-cytosine) permease
    Fcy2. This permease-mediated entry is the committed first step of the pathway:
    the drug cannot be activated unless it first enters the fungal cell, which is
    why loss of the permease is one of the routes to acquired resistance. The drug
    class acting on this pathway is the pyrimidine antimetabolite antifungal
    flucytosine.
  role: trigger
  biological_processes:
  - preferred_term: Cytosine Transport (Fcy2 Permease Import of 5-FC)
    term:
      id: GO:0015856
      label: cytosine transport
  evidence:
  - reference: PMID:32178468
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      5-FC is taken up by cytosine permease into the fungal cell
    explanation: >-
      Antifungal-drugs review stating that 5-FC enters the fungal cell via the
      cytosine permease, the membrane-import step that opens the activation
      cascade. Evidence source is OTHER as this is a review article.
  - reference: PMID:10933638
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      It has no intrinsic antifungal capacity, but after it has been taken up by
      susceptible fungal cells
    explanation: >-
      Flucytosine pharmacology review confirming that 5-FC has no intrinsic
      activity and must first be taken up by fungal cells, establishing this uptake
      step as the trigger of the pathway. Evidence source is OTHER as this is a
      review article.
  downstream:
  - target: Deamination to 5-Fluorouracil by Fungal Cytosine Deaminase
    description: >-
      Once inside the fungal cell, imported 5-FC is deaminated by fungal cytosine
      deaminase to the active antimetabolite 5-fluorouracil.

- name: Deamination to 5-Fluorouracil by Fungal Cytosine Deaminase
  description: >-
    Inside the fungal cell, cytosine deaminase (Fcy1) deaminates 5-FC to
    5-fluorouracil (5-FU), the committed activation step that turns an inert
    prodrug into an active antimetabolite. This step is the structural basis of
    flucytosine's selective toxicity: mammalian cells lack cytosine deaminase and
    therefore never carry out this conversion, so the fungal-specific deaminase is
    both the molecular drug target and the source of the therapeutic index. This is
    the canonical conformance / treatment target of the module — a conforming
    fungal-disease entry's flucytosine treatment links here via target_mechanisms.
    Because activation depends entirely on this enzyme, loss of the deaminase is
    also a principal route of acquired resistance.
  role: therapeutic_vulnerability
  biological_processes:
  - preferred_term: Pyrimidine Nucleobase Catabolic Process (Deamination of 5-FC to 5-FU)
    term:
      id: GO:0006208
      label: pyrimidine nucleobase catabolic process
  molecular_functions:
  - preferred_term: Cytosine Deaminase Activity (Fungal Fcy1)
    term:
      id: GO:0004131
      label: cytosine deaminase activity
  evidence:
  - reference: PMID:32178468
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      deaminated to 5-fluorouracil (Figure 2C) by cytosine deaminase
    explanation: >-
      Antifungal-drugs review naming the fungal cytosine deaminase as the enzyme
      that converts 5-FC to 5-fluorouracil, the activation reaction that defines
      this target node. Evidence source is OTHER as this is a review article.
  - reference: PMID:10933638
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      It has no intrinsic antifungal capacity, but after it has been taken up by
      susceptible fungal cells, it is converted into 5-fluorouracil (5-FU)
    explanation: >-
      Flucytosine pharmacology review establishing that 5-FC is inactive until
      converted to 5-fluorouracil inside fungal cells, the fungal-specific
      prodrug-activation step that gives selective toxicity. Evidence source is
      OTHER as this is a review article.
  downstream:
  - target: Conversion to Fluorinated Nucleotides (5-FUTP and 5-FdUMP)
    description: >-
      Activated 5-fluorouracil is anabolised to the fluorinated nucleotides 5-FUTP
      and 5-FdUMP that mediate the antimetabolite effect.
  - target: Flucytosine Monotherapy Resistance
    description: >-
      Loss-of-function mutation of the deaminase (or the upstream permease)
      abolishes activation, the principal route of acquired flucytosine resistance.

- name: Conversion to Fluorinated Nucleotides (5-FUTP and 5-FdUMP)
  description: >-
    Activated 5-fluorouracil is channelled into the fungal nucleotide pool by
    uracil phosphoribosyltransferase (Fur1) and downstream kinases, generating two
    fluorinated nucleotide effectors. One arm produces 5-fluorouridine triphosphate
    (5-FUTP), the ribonucleotide that will be mis-incorporated into RNA. The other
    arm produces 5-fluorodeoxyuridine monophosphate (5-FdUMP), the deoxynucleotide
    that will inhibit thymidylate synthase. This anabolic step converts the
    activated antimetabolite into the actual nucleotide poisons; because the
    phosphoribosyltransferase (FUR1) is required here, its loss is a further route
    to resistance.
  role: effector
  biological_processes:
  - preferred_term: Pyrimidine Nucleobase Metabolic Process (5-FU Anabolism to 5-FUTP and 5-FdUMP)
    term:
      id: GO:0006206
      label: pyrimidine nucleobase metabolic process
  evidence:
  - reference: PMID:32178468
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      5-Fluorouracil is subsequently converted into 5-fluorouridine triphosphate.
    explanation: >-
      Antifungal-drugs review describing the anabolism of activated 5-fluorouracil
      to the fluorinated nucleotide 5-fluorouridine triphosphate, the effector-
      nucleotide-generating step of this node. Evidence source is OTHER as this is
      a review article.
  downstream:
  - target: Disruption of Fungal RNA and DNA Synthesis
    description: >-
      The fluorinated nucleotides 5-FUTP and 5-FdUMP poison fungal RNA-directed
      protein synthesis and DNA synthesis.

- name: Disruption of Fungal RNA and DNA Synthesis
  description: >-
    The two fluorinated nucleotide effectors converge to poison fungal
    nucleic-acid metabolism. 5-Fluorouridine triphosphate (5-FUTP) — unlike normal
    uridylate — is incorporated into fungal RNA in place of uracil, corrupting the
    transcript and inhibiting protein synthesis. In parallel, 5-fluorodeoxyuridine
    monophosphate (5-FdUMP) inhibits thymidylate synthase, the enzyme that supplies
    thymidine for DNA biosynthesis, thereby blocking DNA synthesis. This dual
    antimetabolite effect on both RNA and DNA is the antifungal consequence of
    engaging the upstream activation and anabolism steps — the fungistatic/
    fungicidal endpoint of the module.
  role: consequence
  biological_processes:
  - preferred_term: RNA Metabolic Process (5-FUTP Mis-incorporation into Fungal RNA)
    term:
      id: GO:0016070
      label: RNA metabolic process
  - preferred_term: DNA Biosynthetic Process (Thymidylate Synthase Inhibition by 5-FdUMP)
    term:
      id: GO:0071897
      label: DNA biosynthetic process
  evidence:
  - reference: PMID:10933638
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      it is converted into 5-fluorouracil (5-FU), which is
      further converted to metabolites that inhibit fungal RNA and DNA synthesis
    explanation: >-
      Flucytosine review directly stating that 5-FU metabolites inhibit fungal RNA
      and DNA synthesis, the dual effector consequence of this node. Evidence
      source is OTHER as this is a review article.
  - reference: PMID:32178468
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Unlike uridylic acid, this compound is incorporated into fungal ribonucleic
      acid (RNA), resulting in inhibition of protein synthesis
    explanation: >-
      Antifungal-drugs review describing the RNA arm — 5-FUTP mis-incorporation
      into fungal RNA inhibiting protein synthesis — supporting the RNA-disruption
      component of this node. Evidence source is OTHER as this is a review article.
  - reference: PMID:32178468
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      This compound inhibits the primary source of thymidine in DNA biosynthesis,
      thymidylate synthetase
    explanation: >-
      The same review describes the DNA arm — 5-FdUMP inhibition of thymidylate
      synthase blocking DNA biosynthesis — supporting the DNA-disruption component
      of this node. Evidence source is OTHER as this is a review article.

- name: Flucytosine Monotherapy Resistance
  description: >-
    Flucytosine is notorious for the rapid emergence of resistance when used alone,
    because the entire antimetabolite cascade depends on an intact activation and
    incorporation pathway that a single mutation can disable. Clinically relevant
    resistance arises through loss-of-function alterations in FCY2 (the cytosine
    permease that imports the drug), FCY1 (the cytosine deaminase that converts 5-FC
    to 5-FU), or FUR1 (uracil phosphoribosyltransferase, required to channel 5-FU
    into the nucleotide pool). Any of these breaks the chain between drug entry and
    nucleic-acid poisoning, so monotherapy selects resistant subpopulations quickly.
    This node encodes the gating knowledge that distinguishes "flucytosine is used"
    from durable efficacy and is the mechanistic reason flucytosine is given in
    combination — classically with amphotericin B for severe systemic mycoses such
    as cryptococcal meningitis. Conforming entries can attach a flucytosine
    combination rationale to this node.
  role: adaptive_escape
  biological_processes:
  - preferred_term: Response to Xenobiotic Stimulus (FCY2/FCY1/FUR1 Loss-of-Function Resistance)
    term:
      id: GO:0009410
      label: response to xenobiotic stimulus
  evidence:
  - reference: PMID:10933638
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Monotherapy with 5-FC is limited because of the frequent development of
      resistance. In combination with amphotericin B, 5-FC can be used to treat
      severe systemic mycoses, such as cryptococcosis
    explanation: >-
      Flucytosine review stating that monotherapy is limited by frequent resistance
      and that combination with amphotericin B is used for severe mycoses including
      cryptococcosis, the gating rationale of this node. Evidence source is OTHER as
      this is a review article.
  - reference: PMID:32178468
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Primary and secondary resistance in clinically relevant Candida spp. have
      emerged as a consequence of alterations in the FCY2, FCY1, and FUR1 genes
      responsible for 5-FC uptake and its conversion
    explanation: >-
      Antifungal-drugs review naming the FCY2/FCY1/FUR1 loss-of-function alterations
      that confer flucytosine resistance by breaking the uptake/conversion pathway,
      the molecular content of this resistance node. Evidence source is OTHER as
      this is a review article.
  - reference: PMID:12654658
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: >-
      flucytosine resistance was due to a defect in the purine-cytosine permease
    explanation: >-
      Study of Candida lusitaniae clinical isolates demonstrating that flucytosine
      resistance was caused by a defect in the purine-cytosine permease (the FCY2
      uptake step), an experimental confirmation of the permease-loss resistance
      route. Evidence source is IN_VITRO as this is a cell-based/biochemical study
      of fungal isolates.
