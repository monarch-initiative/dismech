name: Fungal Nucleic-Acid Antimetabolite Module
description: >-
  A conserved antifungal drug-mechanism module representing the fungal-specific
  prodrug-activation step that the pyrimidine antimetabolite flucytosine
  (5-fluorocytosine, 5-FC) exploits. 5-FC has no intrinsic antifungal activity:
  it is taken up by the fungal cytosine permease (Fcy2) and deaminated by fungal
  cytosine deaminase (Fcy1) to 5-fluorouracil (5-FU). 5-FU is then processed by
  two downstream routes — conversion to 5-fluorouridine triphosphate (5-FUTP),
  which is incorporated into fungal RNA and disrupts protein synthesis, and
  conversion to 5-fluorodeoxyuridine monophosphate (5-FdUMP), which inhibits
  thymidylate synthase and blocks DNA synthesis. Selectivity rests on a
  metabolic difference: mammalian cells lack cytosine deaminase and therefore
  do not activate the prodrug, so the fungal-specific deamination step is both
  the drug target and the basis of the therapeutic index. Because resistance
  arises rapidly under monotherapy through loss-of-function mutations in the
  FCY1 deaminase, FCY2 permease, or FUR1 uracil phosphoribosyltransferase that
  break the activation/incorporation pathway, flucytosine is used in
  combination — classically with amphotericin B for cryptococcal meningitis.
  This module defines the mechanism-of-action design pattern for flucytosine
  treatments: conforming fungal-disease entries link a treatment to the specific
  node it inhibits via target_mechanisms.
category: Module
creation_date: "2026-06-24T00:00:00Z"
notes: >-
  This is an antifungal drug-mechanism module, not a specific disease. Disorder
  entries reference individual nodes via conforms_to (e.g.,
  "fungal_nucleic_acid_antimetabolite#Flucytosine Uptake and Conversion to
  5-Fluorouracil by Fungal Cytosine Deaminase"), and their flucytosine
  treatments point at the inhibited node via target_mechanisms (analogous to how
  cell-wall-active antibiotic treatments link to
  "bacterial_cell_wall_synthesis_inhibition#Peptidoglycan Cross-Linking by
  Penicillin-Binding Proteins"). Key conformance / treatment target:
  "Flucytosine Uptake and Conversion to 5-Fluorouracil by Fungal Cytosine
  Deaminase" (the fungal-specific prodrug-activation step that gives selective
  toxicity, since mammalian cells lack cytosine deaminase). The module is
  pathogen-process-centric: nodes are druggable/escape steps in the antimetabolite
  pathway, not individual drugs. The resistance node captures the gating
  knowledge that distinguishes "flucytosine is used" from durable activity —
  rapid monotherapy resistance via FCY1/FCY2/FUR1 mutations that mandates
  combination therapy (classically with amphotericin B for cryptococcal
  meningitis). See projects/ANTIFUNGAL.md for the broader antifungal drug-fungus
  strategy.
pathophysiology:
- name: Flucytosine Uptake and Conversion to 5-Fluorouracil by Fungal Cytosine Deaminase
  description: >-
    Flucytosine (5-fluorocytosine, 5-FC) is a synthetic cytosine analogue with no
    intrinsic antifungal capacity. It becomes active only after a fungal-specific
    activation sequence: the drug is taken up across the fungal membrane by the
    cytosine (purine-cytosine) permease and then deaminated by fungal cytosine
    deaminase to 5-fluorouracil (5-FU). Mammalian cells lack cytosine deaminase
    and therefore do not perform this conversion, so the deamination step is the
    structural basis of flucytosine's selective toxicity and the most exploited
    node of the module. This is the canonical conformance / treatment target for
    flucytosine-directed antifungal therapy: a conforming fungal-disease entry's
    flucytosine treatment links here via target_mechanisms. Loss of either the
    permease or the deaminase abolishes activation, which is why this same step
    is also the principal site of acquired resistance.
  role: therapeutic_vulnerability
  biological_processes:
  - preferred_term: Cytosine Catabolic Process (Cytosine Deaminase Conversion of 5-FC)
    term:
      id: GO:0006209
      label: cytosine catabolic process
  evidence:
  - reference: PMID:10933638
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      It has no intrinsic antifungal capacity, but after it has been taken up by
      susceptible fungal cells, it is converted into 5-fluorouracil (5-FU)
    explanation: >-
      Review of flucytosine pharmacology establishing that 5-FC is inactive until
      taken up by fungal cells and converted to 5-fluorouracil, the
      fungal-specific prodrug-activation step that defines this node. Evidence
      source is OTHER as this is a review article.
  - reference: PMID:32178468
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      5-FC is taken up by cytosine permease into the fungal cell and deaminated
      to 5-fluorouracil
    explanation: >-
      Antifungal-drugs review stating the two-step activation — uptake by cytosine
      permease and deamination by cytosine deaminase to 5-fluorouracil — that is
      the molecular content of this target node. Evidence source is OTHER as this
      is a review article.
  downstream:
  - target: Disruption of Fungal RNA and DNA Synthesis
    description: >-
      5-Fluorouracil generated by activation is processed to 5-FUTP and 5-FdUMP,
      which disrupt fungal RNA-directed protein synthesis and DNA synthesis.
  - target: Flucytosine Monotherapy Resistance
    description: >-
      Loss-of-function mutations in the permease or deaminase abolish this
      activation step, the principal route of acquired flucytosine resistance.

- name: Disruption of Fungal RNA and DNA Synthesis
  description: >-
    Once flucytosine has been activated to 5-fluorouracil inside the fungal cell,
    two effector routes converge to poison nucleic-acid metabolism. 5-FU is
    converted to 5-fluorouridine triphosphate (5-FUTP), which — unlike normal
    uridylic acid — is incorporated into fungal RNA in place of uracil, corrupting
    the transcript and inhibiting protein synthesis. In parallel, 5-FU is
    metabolized to 5-fluorodeoxyuridine monophosphate (5-FdUMP), which inhibits
    thymidylate synthase, the enzyme that supplies thymidine for DNA biosynthesis,
    thereby blocking DNA synthesis. This dual antimetabolite effect on both RNA
    and DNA is the antifungal consequence of engaging the activation target above —
    the fungistatic/fungicidal effector node of the module.
  role: consequence
  biological_processes:
  - preferred_term: RNA Metabolic Process (5-FUTP Incorporation into Fungal RNA)
    term:
      id: GO:0016070
      label: RNA metabolic process
  - preferred_term: DNA Biosynthetic Process (Thymidylate Synthase Inhibition by 5-FdUMP)
    term:
      id: GO:0071897
      label: DNA biosynthetic process
  evidence:
  - reference: PMID:10933638
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      it is converted into 5-fluorouracil (5-FU), which is further converted to
      metabolites that inhibit fungal RNA and DNA synthesis
    explanation: >-
      Flucytosine review directly stating that 5-FU is converted to metabolites
      that inhibit fungal RNA and DNA synthesis, the dual effector mechanism of
      this node. Evidence source is OTHER as this is a review article.
  - reference: PMID:32178468
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      5-Fluorouracil is subsequently converted into 5-fluorouridine triphosphate.
      Unlike uridylic acid, this compound is incorporated into fungal ribonucleic
      acid (RNA), resulting in inhibition of protein synthesis
    explanation: >-
      Antifungal-drugs review describing the RNA arm — 5-FUTP incorporation into
      fungal RNA inhibiting protein synthesis — supporting the RNA-disruption
      component of this node. Evidence source is OTHER as this is a review article.
  - reference: PMID:32178468
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      This compound inhibits the primary source of thymidine in DNA biosynthesis,
      thymidylate synthetase
    explanation: >-
      The same review describes the DNA arm — 5-FdUMP inhibition of thymidylate
      synthase blocking DNA biosynthesis — supporting the DNA-disruption component
      of this node. Evidence source is OTHER as this is a review article.

- name: Flucytosine Monotherapy Resistance
  description: >-
    Flucytosine is notorious for the rapid emergence of resistance when used
    alone, because the entire mechanism depends on an intact activation and
    incorporation pathway that a single mutation can disable. Clinically relevant
    resistance arises through loss-of-function alterations in FCY2 (the cytosine
    permease that imports the drug), FCY1 (the cytosine deaminase that converts
    5-FC to 5-FU), or FUR1 (uracil phosphoribosyltransferase, required to channel
    5-FU into the nucleotide pool). Any of these breaks the chain between drug
    entry and nucleic-acid poisoning, so monotherapy selects resistant subpopulations
    quickly. This node encodes the gating knowledge that distinguishes "flucytosine
    is used" from durable efficacy and is the mechanistic reason flucytosine is
    given in combination — classically with amphotericin B for severe systemic
    mycoses such as cryptococcal meningitis. Conforming entries can attach a
    flucytosine combination rationale to this node.
  role: adaptive_escape
  biological_processes:
  - preferred_term: Cytosine Catabolic Process (Loss of FCY1 Deaminase Activation)
    term:
      id: GO:0006209
      label: cytosine catabolic process
  evidence:
  - reference: PMID:10933638
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Monotherapy with 5-FC is limited because of the frequent development of
      resistance. In combination with amphotericin B, 5-FC can be used to treat
      severe systemic mycoses, such as cryptococcosis
    explanation: >-
      Flucytosine review stating that monotherapy is limited by frequent
      resistance and that combination with amphotericin B is used for severe
      mycoses including cryptococcosis, the gating rationale of this node.
      Evidence source is OTHER as this is a review article.
  - reference: PMID:32178468
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Primary and secondary resistance in clinically relevant Candida spp. have
      emerged as a consequence of alterations in the FCY2, FCY1, and FUR1 genes
      responsible for 5-FC uptake and its conversion
    explanation: >-
      Antifungal-drugs review naming the FCY2/FCY1/FUR1 loss-of-function
      alterations that confer flucytosine resistance by breaking the
      uptake/conversion pathway, the molecular content of this resistance node.
      Evidence source is OTHER as this is a review article.
  - reference: PMID:12654658
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: >-
      flucytosine resistance was due to a defect in the purine-cytosine permease
    explanation: >-
      Study of Candida lusitaniae clinical isolates demonstrating that flucytosine
      resistance was caused by a defect in the purine-cytosine permease (the FCY2
      uptake step), an experimental confirmation of the permease-loss resistance
      route. Evidence source is IN_VITRO as this is a cell-based/biochemical study
      of fungal isolates.
