name: Hepatic Steatosis and Lipotoxicity Module
description: >-
  A conserved hepatic pathophysiology module representing the final common
  pathway by which excess intrahepatocellular lipid drives progressive liver
  injury. When hepatocyte free fatty acid delivery and de novo lipogenesis
  exceed the capacity for fatty acid oxidation and very-low-density lipoprotein
  export, triglyceride and toxic non-triglyceride lipid species accumulate.
  These lipotoxic metabolites provoke endoplasmic reticulum stress,
  mitochondrial dysfunction, and oxidative stress, leading to hepatocyte injury
  and death with Kupffer-cell and macrophage-driven inflammation
  (steatohepatitis), hepatic stellate cell activation, and progressive fibrosis
  that can culminate in cirrhosis. The initiating context varies across
  metabolic-dysfunction-associated steatotic liver disease (MASLD/NAFLD),
  alcohol-associated steatohepatitis, and genetic forms (e.g., PNPLA3 and
  TM6SF2 variants), but the downstream lipid-overload-to-lipotoxicity chain is
  conserved. Conforming disorder nodes substitute the disorder-specific
  initiating insult while preserving the hepatocyte, Kupffer-cell, and hepatic
  stellate cell axis.
category: Module
creation_date: "2026-06-06T00:00:00Z"
notes: >-
  This is a mechanism module, not a specific disease. Disorder entries reference
  individual nodes via conforms_to (e.g.,
  "hepatic_steatosis_lipotoxicity#Lipotoxic Stress and Organelle Dysfunction").
  The fibrosis arm of this module connects conceptually to the
  fibrotic_response module: a conforming hepatic disorder node may declare
  conformance both to this module's "Hepatic Stellate Cell Activation and
  Fibrosis" node and to "fibrotic_response#Mesenchymal Cell Activation". Key
  organ-specific cell types are fixed (liver): hepatocyte (CL:0000182), Kupffer
  cell/macrophage (CL:0000091/CL:0000235), and hepatic stellate cell
  (CL:0000632). Conforming disorder nodes substitute the disorder-specific
  initiating insult (overnutrition/insulin resistance in MASLD, ethanol
  metabolism in alcohol-associated disease, PNPLA3/TM6SF2 retention defects in
  genetic forms) while preserving the conserved chain.
pathophysiology:
- name: Hepatocyte Lipid Overload
  description: >-
    Hepatocyte intracellular lipid accumulates when the inflow of free fatty
    acids (from adipose lipolysis and dietary fat) plus de novo lipogenesis
    exceeds the capacity for fatty acid oxidation and very-low-density
    lipoprotein export. The resulting triglyceride accumulation in lipid
    droplets defines steatosis. This initiating imbalance is shared across
    metabolic, alcoholic, and genetic forms of steatotic liver disease.
  role: trigger
  cell_types:
  - preferred_term: hepatocyte
    term:
      id: CL:0000182
      label: hepatocyte
  biological_processes:
  - preferred_term: triglyceride biosynthetic process
    term:
      id: GO:0019432
      label: triglyceride biosynthetic process
    modifier: INCREASED
  - preferred_term: lipid storage
    term:
      id: GO:0019915
      label: lipid storage
    modifier: INCREASED
  evidence:
  - reference: PMID:24265237
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Most commonly, it occurs when there is an imbalance between the delivery
      or synthesis of fatty acids in the liver and their disposal through
      oxidative pathways or secretion into the blood as a component of
      triacylglycerols in very low density lipoprotein.
    explanation: >-
      Defines hepatic steatosis as the imbalance between fatty acid
      delivery/synthesis and disposal, establishing the lipid-overload trigger
      state. Evidence source is OTHER because this is a comprehensive
      physiology review.
  - reference: PMID:28585211
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      NAFLD is characterized by excess accumulation of triglyceride in the
      hepatocyte due to both increased inflow of free fatty acids and de novo
      hepatic lipogenesis.
    explanation: >-
      Directly attributes hepatocyte triglyceride accumulation to increased
      free fatty acid inflow and de novo lipogenesis. Evidence source is OTHER
      because this is a review synthesizing human and model organism data.
  downstream:
  - target: Lipotoxic Stress and Organelle Dysfunction

- name: Lipotoxic Stress and Organelle Dysfunction
  description: >-
    Beyond inert triglyceride storage, the accumulation of toxic
    non-triglyceride lipid species (e.g., diacylglycerols, ceramides, free
    fatty acid metabolites) drives lipotoxicity. These metabolites induce
    endoplasmic reticulum stress, mitochondrial dysfunction, and accumulation
    of reactive oxygen species, sensitizing the hepatocyte to injury. This is
    the amplification step that converts simple steatosis toward steatohepatitis.
  role: amplifier
  cell_types:
  - preferred_term: hepatocyte
    term:
      id: CL:0000182
      label: hepatocyte
  biological_processes:
  - preferred_term: response to endoplasmic reticulum stress
    term:
      id: GO:0034976
      label: response to endoplasmic reticulum stress
    modifier: INCREASED
  - preferred_term: response to oxidative stress
    term:
      id: GO:0006979
      label: response to oxidative stress
    modifier: INCREASED
  evidence:
  - reference: PMID:20425484
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Emerging data now point to nontriglyceride lipotoxicity and complex
      mechanisms of hepatocyte injury and apoptosis as the major contributors
      to the disease phenotype currently recognized as NASH.
    explanation: >-
      Establishes non-triglyceride lipotoxic metabolites, rather than
      triglyceride storage itself, as the major driver of hepatocyte injury.
      Evidence source is OTHER because this is a mechanistic review.
  - reference: PMID:22122481
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Secondly, when adaptive mechanisms for stress tolerance are overwhelmed,
      lipotoxicity and chronic inflammation trigger major hepatic damages,
      mainly via oxidative and inflammatory stress, lipid peroxidation and cell
      death.
    explanation: >-
      Links lipotoxicity to oxidative stress and downstream hepatic damage when
      adaptive responses are overwhelmed. Evidence source is OTHER because this
      is a review synthesizing OMICS and mechanistic data.
  downstream:
  - target: Hepatocyte Injury and Inflammatory Activation

- name: Hepatocyte Injury and Inflammatory Activation
  description: >-
    Lipotoxic hepatocytes undergo apoptosis and other forms of regulated cell
    death, releasing damage signals that activate Kupffer cells and recruited
    macrophages. The resulting inflammatory response, with inflammasome
    activation and pro-inflammatory cytokine release, defines the transition
    from bland steatosis to steatohepatitis and is the central effector step of
    progressive liver injury.
  role: central_effector
  cell_types:
  - preferred_term: hepatocyte
    term:
      id: CL:0000182
      label: hepatocyte
  - preferred_term: Kupffer cell
    term:
      id: CL:0000091
      label: Kupffer cell
  - preferred_term: macrophage
    term:
      id: CL:0000235
      label: macrophage
  biological_processes:
  - preferred_term: apoptotic process
    term:
      id: GO:0006915
      label: apoptotic process
    modifier: INCREASED
  - preferred_term: inflammatory response
    term:
      id: GO:0006954
      label: inflammatory response
    modifier: INCREASED
  evidence:
  - reference: PMID:33208891
    supports: SUPPORT
    evidence_source: MODEL_ORGANISM
    snippet: >-
      Hepatocyte cell death and liver inflammation have been well recognized as
      central characteristics of nonalcoholic steatohepatitis (NASH), however,
      the underlying molecular basis remains elusive.
    explanation: >-
      Establishes hepatocyte cell death and liver inflammation as the central
      characteristics of steatohepatitis. The study uses high-fat-diet mouse
      models with Kupffer-cell and macrophage experiments, so evidence source
      is MODEL_ORGANISM.
  - reference: PMID:28585211
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Furthermore, hepatocyte lipoapoptosis is a critical feature of NASH.
    explanation: >-
      Identifies hepatocyte lipoapoptosis as a critical feature of
      steatohepatitis, supporting hepatocyte death as a central effector.
      Evidence source is OTHER because this is a review.
  downstream:
  - target: Hepatic Stellate Cell Activation and Fibrosis

- name: Hepatic Stellate Cell Activation and Fibrosis
  description: >-
    Sustained hepatocyte injury and macrophage-driven inflammation activate
    hepatic stellate cells, which transdifferentiate into myofibroblast-like
    cells that deposit excessive extracellular matrix. This is the fibrotic
    effector arm of steatotic liver disease and connects conceptually to the
    conserved fibrotic_response module, with hepatic stellate cells serving as
    the organ-specific mesenchymal precursor.
  role: effector
  cell_types:
  - preferred_term: hepatic stellate cell
    term:
      id: CL:0000632
      label: hepatic stellate cell
  - preferred_term: myofibroblast
    term:
      id: CL:0000186
      label: myofibroblast cell
  biological_processes:
  - preferred_term: extracellular matrix organization
    term:
      id: GO:0030198
      label: extracellular matrix organization
    modifier: INCREASED
  evidence:
  - reference: PMID:33989548
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Here we provide an in-depth discussion of the underlying pathogenetic
      mechanisms that lead to progressive liver injury, including the metabolic
      origins of NAFLD, the effect of NAFLD on hepatic glucose and lipid
      metabolism, bile acid toxicity, macrophage dysfunction, and hepatic
      stellate cell activation, and consider the role of genetic, epigenetic,
      and environmental factors that promote fibrosis progression and risk of
      hepatocellular carcinoma in NASH.
    explanation: >-
      Landmark review identifying hepatic stellate cell activation, alongside
      macrophage dysfunction, as a pathogenetic mechanism driving fibrosis
      progression in NASH. Evidence source is OTHER because this is a review
      synthesizing multiple study types.
  downstream:
  - target: Hepatic Steatosis Progressing to Steatohepatitis and Fibrosis

- name: Hepatic Steatosis Progressing to Steatohepatitis and Fibrosis
  description: >-
    The convergent outcome is the hepatic steatosis phenotype (fatty liver
    disease) and its progression: bland steatosis can advance to
    steatohepatitis, fibrosis, cirrhosis, and hepatocellular carcinoma. This
    final node represents the disease-like phenotype of hepatic steatosis and
    its progressive sequelae shared across metabolic, alcoholic, and genetic
    forms of steatotic liver disease.
  role: consequence
  cell_types:
  - preferred_term: hepatocyte
    term:
      id: CL:0000182
      label: hepatocyte
  evidence:
  - reference: PMID:33989548
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Its more advanced subtype, nonalcoholic steatohepatitis (NASH), connotes
      progressive liver injury that can lead to cirrhosis and hepatocellular
      carcinoma.
    explanation: >-
      Directly states that the advanced steatohepatitis subtype produces
      progressive liver injury culminating in cirrhosis and hepatocellular
      carcinoma, the defining consequence of this module. Evidence source is
      OTHER because this is a review.
  - reference: PMID:22122481
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      As a consequence, all these processes concur to favor steatohepatitis,
      fibrosis and cancer.
    explanation: >-
      Summarizes that the lipid-overload and lipotoxicity processes together
      converge on steatohepatitis, fibrosis, and cancer. Evidence source is
      OTHER because this is a review.
