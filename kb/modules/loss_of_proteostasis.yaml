name: Loss of Proteostasis Module
description: >-
  A conserved mechanism module for the hallmark of aging (Lopez-Otin et al.)
  termed loss of proteostasis: the age-associated decline of the protein
  homeostasis (proteostasis) network and the resulting accumulation of
  misfolded and aggregated proteins. In healthy cells a complex proteostasis
  network - molecular chaperones, the ubiquitin-proteasome system, and
  autophagy, with their regulators - coordinates protein synthesis, folding,
  conformational maintenance, and degradation. Chronic external and endogenous
  stresses erode this network's capacity during aging; as folding and clearance
  fail, non-native proteins misfold and aggregate. The aggregates (often
  beta-sheet-rich amyloid) accumulate, disproportionately burdening postmitotic
  cells such as neurons, driving proteotoxic dysfunction and the
  age-associated proteinopathies. This is the conserved core shared by the major
  neurodegenerative diseases. Individual disorder entries declare conformance
  via conforms_to on their pathophysiology nodes, substituting the
  disease-specific aggregating protein (e.g. amyloid-beta and tau in Alzheimer
  disease, alpha-synuclein in Parkinson disease, polyglutamine huntingtin in
  Huntington disease, TDP-43/SOD1 in ALS) while preserving the conserved
  network-decline -> misfolding -> aggregation -> proteotoxicity chain.
category: Module
creation_date: "2026-07-01T00:00:00Z"
notes: >-
  This is a mechanism module, not a specific disease. Disorder entries
  reference individual nodes via conforms_to (e.g.,
  "loss_of_proteostasis#Misfolded-Protein Aggregation"). Conforming nodes in
  disorder files should include the corresponding biological processes and
  causal edges, specialized to their disease context, substituting the
  disease-specific aggregating protein and vulnerable cell type. The module is
  intentionally kept lean: it captures the conserved proteostasis-network
  decline and its convergence on protein aggregation and proteotoxicity, but
  deliberately does NOT embed disease-specific aggregate species, seeding/prion
  spread models, or contested cell-non-autonomous theories, which belong on the
  relevant disorder entry. Complements deregulated_nutrient_sensing (mTORC1
  suppression of autophagy is one contributor to failing clearance) and
  cellular_senescence. Key conformance target:
  "loss_of_proteostasis#Misfolded-Protein Aggregation".
pathophysiology:
- name: Proteostasis Network Decline
  description: >-
    The proteostasis network - molecular chaperones, the ubiquitin-proteasome
    system, and the autophagy-lysosome pathway, together with their regulators -
    normally maintains proteome integrity by coordinating folding,
    conformational maintenance, and degradation. Chronic external and endogenous
    stresses that accumulate during aging erode the capacity of this network,
    the initiating lesion of the hallmark.
  role: trigger
  biological_processes:
  - preferred_term: Protein Folding
    term:
      id: GO:0006457
      label: protein folding
    modifier: DECREASED
  - preferred_term: Proteasome-Mediated Ubiquitin-Dependent Protein Catabolism
    term:
      id: GO:0043161
      label: proteasome-mediated ubiquitin-dependent protein catabolic process
    modifier: DECREASED
  - preferred_term: Macroautophagy
    term:
      id: GO:0016236
      label: macroautophagy
    modifier: DECREASED
  evidence:
  - reference: PMID:30733602
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      In healthy cells, a complex proteostasis network, comprising molecular
      chaperones and proteolytic machineries and their regulators, operates to
      ensure the maintenance of proteostasis.
    explanation: >-
      Defines the proteostasis network of chaperones and proteolytic machineries
      whose decline is the trigger modeled here. Evidence source is OTHER because
      this is a review.
  - reference: PMID:30733602
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      These stresses lead to the decline of proteostasis network capacity and
      proteome integrity.
    explanation: >-
      States that accumulated stresses decline proteostasis network capacity, the
      initiating lesion of this module. Evidence source is OTHER because this is
      a review.
  downstream:
  - target: Loss of Proteostasis
- name: Loss of Proteostasis
  description: >-
    As the network's folding and clearance capacity falls below demand,
    protein homeostasis is lost: the cell can no longer keep its proteome
    correctly folded and turned over. This age-associated collapse of
    proteostatic control is the central effector state and is a common feature
    of aging and age-related disease across tissues.
  role: central_effector
  biological_processes:
  - preferred_term: Protein Folding
    term:
      id: GO:0006457
      label: protein folding
    modifier: DECREASED
  evidence:
  - reference: PMID:25784053
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Loss of protein homeostasis (proteostasis) is a common feature of aging
      and disease that is characterized by the appearance of nonnative protein
      aggregates in various tissues.
    explanation: >-
      Establishes loss of proteostasis as a common feature of aging characterized
      by aggregate appearance, the central effector modeled here. Evidence source
      is OTHER because this is a review.
  - reference: PMID:29127110
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      It is now clear that the capacity of cells to maintain proteostasis
      undergoes a decline during aging, rendering the organism susceptible to
      these pathologies.
    explanation: >-
      States that proteostatic capacity declines during aging and predisposes to
      disease, supporting this node. Evidence source is OTHER because this is a
      review.
  downstream:
  - target: Misfolded-Protein Aggregation
- name: Misfolded-Protein Aggregation
  description: >-
    With folding and degradation failing, non-native proteins misfold and
    self-associate into aggregates - frequently beta-sheet-rich amyloid fibrils
    and inclusion bodies. This is the conserved central node that
    disease-specific aggregating proteins (amyloid-beta, tau, alpha-synuclein,
    polyglutamine huntingtin, TDP-43) converge upon; conforming disorder nodes
    substitute their particular aggregate species.
  role: effector
  evidence:
  - reference: PMID:25784053
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Protein aggregation is routinely suppressed by the proteostasis network
      (PN), a collection of macromolecular machines that operate in diverse ways
      to maintain proteome integrity across subcellular compartments and between
      tissues to ensure a healthy life span.
    explanation: >-
      Establishes that the proteostasis network normally suppresses aggregation,
      so its decline permits the aggregation modeled here. Evidence source is
      OTHER because this is a review.
  - reference: PMID:15272267
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      The aggregates usually consist of fibers containing misfolded protein with
      a beta-sheet conformation, termed amyloid.
    explanation: >-
      Describes the beta-sheet amyloid character of the misfolded-protein
      aggregates modeled in this node. Evidence source is OTHER because this is a
      review.
  downstream:
  - target: Proteotoxic Cell Dysfunction and Neurodegeneration
- name: Proteotoxic Cell Dysfunction and Neurodegeneration
  description: >-
    Accumulating misfolded and aggregated proteins are proteotoxic, especially
    to long-lived postmitotic cells such as neurons that cannot dilute the
    burden by division. The resulting cellular dysfunction and death underlies
    the age-associated proteinopathies, most prominently the neurodegenerative
    diseases. The specific clinical phenotype is supplied by the conforming
    disorder.
  role: consequence
  cell_types:
  - preferred_term: Neuron
    term:
      id: CL:0000540
      label: neuron
  evidence:
  - reference: PMID:30733602
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      The resulting accumulation of misfolded and aggregated proteins affects,
      in particular, postmitotic cell types such as neurons
    explanation: >-
      States that aggregated proteins disproportionately affect postmitotic
      neurons, the vulnerable cell type in this consequence node. Evidence source
      is OTHER because this is a review.
  - reference: PMID:15272267
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Neurodegenerative diseases such as Alzheimer's disease (AD), Parkinson's
      disease (PD), Huntington's disease (HD), amyotrophic lateral sclerosis
      (ALS) and prion diseases are increasingly being realized to have common
      cellular and molecular mechanisms including protein aggregation and
      inclusion body formation.
    explanation: >-
      Establishes that the major neurodegenerative diseases share protein
      aggregation as a common mechanism, the conserved consequence this module
      captures. Evidence source is OTHER because this is a review.
