name: Resisting Cell Death Module
description: >-
  A conserved mechanism module for the third hallmark of cancer (Hanahan &
  Weinberg): resistance to programmed cell death. Apoptosis is a natural
  barrier to cancer that is engaged by the physiologic stresses of
  tumorigenesis, including oncogene-driven hyperproliferation and DNA
  damage. The mitochondrial (intrinsic) apoptotic program is governed by the
  BCL-2 family, in which pro-apoptotic effectors (BAX, BAK) and BH3-only
  sensitizers (BIM, BID, PUMA, NOXA, BAD) are opposed by pro-survival
  guardians (BCL-2, BCL-XL, MCL-1). The conserved causal chain runs from an
  apoptosis-evasion lesion (overexpression of pro-survival BCL-2 proteins,
  loss of pro-apoptotic effectors or of the p53-PUMA/NOXA axis) through a
  shifted BCL-2-family rheostat that blocks mitochondrial outer-membrane
  permeabilization and cytochrome c release, to impaired apoptotic execution
  and the survival of cells that should have died. Individual disorder
  entries declare conformance via conforms_to, substituting the
  tumor-type-specific apoptosis-evasion lesion (e.g., t(14;18) BCL2
  overexpression in follicular lymphoma, MCL1 amplification, TP53 loss). The
  shifted rheostat is also the rationale for BH3-mimetic therapy (e.g.,
  venetoclax), which can be captured with target_mechanisms on conforming
  treatments.
category: Module
creation_date: "2026-06-27T00:00:00Z"
notes: >-
  This is a mechanism module, not a specific disease. Disorder entries
  reference individual nodes via conforms_to (e.g.,
  "resisting_cell_death#BCL-2 Family Rheostat Shift Toward Survival"). The
  module defines the expected pathophysiology structure; conforming nodes in
  disorder files should include the corresponding biological processes and
  causal edges, specialized to their tumor context. Key tumor-specific
  substitutions: follicular lymphoma uses t(14;18)-driven BCL2
  overexpression; CLL/AML use BCL-2 or MCL-1 dependence (BH3-mimetic
  targets); many cancers evade apoptosis through TP53 loss disabling the
  PUMA/NOXA arm. Key conformance / treatment target:
  "resisting_cell_death#BCL-2 Family Rheostat Shift Toward Survival".
pathophysiology:
- name: Apoptosis-Evasion Lesion
  description: >-
    A lesion that biases the cell against apoptosis. Routes include
    overexpression of pro-survival BCL-2 family members (BCL-2, BCL-XL,
    MCL-1) via translocation or amplification, loss-of-function of the
    pro-apoptotic effectors BAX/BAK, silencing of BH3-only sensitizers, or
    loss of upstream p53 that transactivates PUMA and NOXA. Each lesion
    raises the apoptotic threshold so that pro-death signals from
    oncogenic stress fail to trigger cell death.
  role: trigger
  biological_processes:
  - preferred_term: Negative Regulation of Apoptotic Process
    term:
      id: GO:0043066
      label: negative regulation of apoptotic process
    modifier: INCREASED
  evidence:
  - reference: PMID:18097445
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      BCL-2 family proteins, which have either pro- or anti-apoptotic
      activities, have been studied intensively for the past decade owing to
      their importance in the regulation of apoptosis, tumorigenesis and
      cellular responses to anti-cancer therapy.
    explanation: >-
      Establishes the BCL-2 family as the regulatory hub of apoptosis whose
      dysregulation drives tumorigenesis, supporting the apoptosis-evasion
      lesion as the trigger of this module. Evidence source is OTHER because
      this is a review article.
  downstream:
  - target: BCL-2 Family Rheostat Shift Toward Survival

- name: BCL-2 Family Rheostat Shift Toward Survival
  description: >-
    The balance of the BCL-2 family is shifted so that pro-survival members
    sequester pro-apoptotic effectors and BH3-only proteins, preventing
    BAX/BAK oligomerization in the mitochondrial outer membrane. With
    mitochondrial outer-membrane permeabilization blocked, cytochrome c is
    not released and the apoptosome cannot form. This shifted rheostat is
    the conserved central node and the molecular target of BH3-mimetic
    drugs.
  role: central_effector
  biological_processes:
  - preferred_term: Intrinsic Apoptotic Signaling Pathway
    term:
      id: GO:0097193
      label: intrinsic apoptotic signaling pathway
    modifier: DECREASED
  - preferred_term: Release of Cytochrome c from Mitochondria
    term:
      id: GO:0001836
      label: release of cytochrome c from mitochondria
    modifier: DECREASED
  evidence:
  - reference: PMID:18097445
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      They control the point of no return for clonogenic cell survival and
      thereby affect tumorigenesis
    explanation: >-
      Describes BCL-2 family control over the commitment point for cell
      survival, the conserved central effector of apoptosis evasion modeled
      here. Evidence source is OTHER because this is a review article.
  downstream:
  - target: Impaired Apoptotic Execution and Cell Survival

- name: Impaired Apoptotic Execution and Cell Survival
  description: >-
    With the intrinsic pathway blocked upstream, effector caspase activation
    fails and apoptotic execution is impaired. Cells carrying oncogenic and
    genotoxic stress that should have been culled instead survive and
    persist, providing a substrate for further malignant evolution and
    contributing to resistance to chemotherapy and radiotherapy, which act
    in part by triggering apoptosis.
  role: consequence
  biological_processes:
  - preferred_term: Apoptotic Process
    term:
      id: GO:0006915
      label: apoptotic process
    modifier: DECREASED
  evidence:
  - reference: PMID:21376230
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      They include sustaining proliferative signaling, evading growth
      suppressors, resisting cell death, enabling replicative immortality,
      inducing angiogenesis, and activating invasion and metastasis.
    explanation: >-
      Hanahan & Weinberg list resisting cell death as a core hallmark
      capability, the consequence modeled here. Evidence source is OTHER
      because this is a review article.
