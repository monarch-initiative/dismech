name: Epithelial Barrier Dysfunction Module
description: >-
  A conserved cross-tissue pathophysiology module for the "epithelial barrier
  hypothesis" of allergic / type 2 inflammatory disease. Epithelial barriers of
  the skin, airway, gut, and esophagus share critical functions (a physical
  junctional barrier plus innate immune defense), and in allergic patients —
  regardless of tissue location — barrier homeostasis is skewed toward loss of
  terminal differentiation, reduced junctional integrity, and impaired innate
  defense. The conserved sequence is: an epithelial barrier insult or intrinsic
  junctional/differentiation defect disrupts the barrier; increased
  transepithelial allergen and microbial penetration activates innate immunity
  and antigen-presenting cells; a type 2 (TH2) milieu drives IgE class switch
  and allergic sensitization; and allergic disease is initiated at the affected
  barrier and, beyond it, along the atopic march (atopic dermatitis, food
  allergy, asthma, allergic rhinitis). Conforming disorder nodes substitute the
  tissue-specific epithelium and lesion (e.g., filaggrin/keratinocyte in atopic
  dermatitis; bronchial epithelium and tight-junction loss in asthma; squamous
  esophageal epithelium in eosinophilic esophagitis). This is the cross-tissue
  counterpart of the gut-specific `intestinal_barrier_dysfunction` module. Key
  conformance target: `epithelial_barrier_dysfunction#Increased Transepithelial
  Allergen Penetration and Innate Immune Activation`.
category: Module
creation_date: "2026-06-30T00:00:00Z"

pathophysiology:
- name: Epithelial Barrier Insult and Junctional Disruption
  description: >-
    External insults (allergen-associated proteases, irritants, pollutants,
    microbes, mechanical injury) and/or intrinsic defects in barrier components
    (tight-junction proteins, antiproteases, structural proteins such as
    filaggrin in the skin) disrupt tight and adherens junctions across barrier
    epithelia. This is the initiating state shared by skin, airway, gut, and
    esophageal allergic disease.
  role: trigger
  cell_types:
  - preferred_term: epithelial cell
    term:
      id: CL:0000066
      label: epithelial cell
  - preferred_term: keratinocyte
    term:
      id: CL:0000312
      label: keratinocyte
  - preferred_term: bronchial epithelial cell
    term:
      id: CL:0002328
      label: bronchial epithelial cell
  biological_processes:
  - preferred_term: tight junction organization
    term:
      id: GO:0120193
      label: tight junction organization
    modifier: DECREASED
  - preferred_term: establishment of skin barrier
    term:
      id: GO:0061436
      label: establishment of skin barrier
    modifier: DECREASED
  downstream:
  - target: Loss of Terminal Differentiation and Reduced Junctional Integrity
  evidence:
  - reference: PMID:28583447
    reference_title: "Etiology of epithelial barrier dysfunction in patients with type 2 inflammatory diseases."
    supports: SUPPORT
    evidence_source: OTHER
    snippet: "Barrier loss can result from defects in several essential components, including tight junction proteins, protective antiproteases, structural elements such as filaggrin in the skin"
    explanation: >-
      Cross-tissue review enumerates the shared barrier components whose defect
      or disruption initiates barrier loss across allergic diseases.
  - reference: PMID:28583447
    reference_title: "Etiology of epithelial barrier dysfunction in patients with type 2 inflammatory diseases."
    supports: SUPPORT
    evidence_source: OTHER
    snippet: "Allergens can contain proteases and have been shown to disrupt epithelial tight junctions"
    explanation: >-
      Identifies allergen-associated protease activity as a generic external
      insult that disrupts epithelial tight junctions.

- name: Loss of Terminal Differentiation and Reduced Junctional Integrity
  description: >-
    Across allergic disease, irrespective of the affected organ, the epithelial
    barrier is skewed toward loss of terminal differentiation, reduced
    junctional integrity, and impaired innate defense. This dysregulated state
    appears to pre-date atopy, marking it as a predisposing host trait rather
    than only a downstream consequence of inflammation.
  role: amplifier
  cell_types:
  - preferred_term: epithelial cell
    term:
      id: CL:0000066
      label: epithelial cell
  biological_processes:
  - preferred_term: epithelial cell differentiation
    term:
      id: GO:0030855
      label: epithelial cell differentiation
    modifier: DECREASED
  - preferred_term: innate immune response
    term:
      id: GO:0045087
      label: innate immune response
    modifier: DECREASED
  downstream:
  - target: Increased Transepithelial Allergen Penetration and Innate Immune Activation
  evidence:
  - reference: PMID:28583447
    reference_title: "Etiology of epithelial barrier dysfunction in patients with type 2 inflammatory diseases."
    supports: SUPPORT
    evidence_source: OTHER
    snippet: "in patients with allergic disease, regardless of tissue location, the \nhomeostatic balance of the epithelial barrier is skewed toward loss of \ndifferentiation, reduced junctional integrity, and impaired innate defense."
    explanation: >-
      States the conserved, tissue-independent barrier-dysfunction phenotype
      that this module abstracts.
  - reference: PMID:28583447
    reference_title: "Etiology of epithelial barrier dysfunction in patients with type 2 inflammatory diseases."
    supports: SUPPORT
    evidence_source: OTHER
    snippet: "Importantly, epithelial dysfunction characterized by these traits appears to \npre-date atopy and development of allergic disease."
    explanation: >-
      Supports barrier dysfunction as a predisposing trait preceding atopy.
  - reference: PMID:28583446
    reference_title: "Phenotypic and genetic aspects of epithelial barrier function in asthmatic patients."
    supports: SUPPORT
    evidence_source: OTHER
    snippet: "In asthmatic patients abnormalities in many aspects of epithelial \nbarrier function have been identified."
    explanation: >-
      Confirms the airway arm of the conserved barrier defect (asthmatic
      bronchial epithelium), substituting for the generic epithelium.

- name: Increased Transepithelial Allergen Penetration and Innate Immune Activation
  description: >-
    With the barrier predisposed to disruption, allergens and microbes gain
    paracellular access across the epithelium to the underlying lamina propria,
    where pattern-recognition-receptor signaling and epithelial alarmins drive
    innate immune activation and antigen-presenting-cell stimulation. This is
    the central convergence point and the canonical conformance target.
  role: central_effector
  cell_types:
  - preferred_term: epithelial cell
    term:
      id: CL:0000066
      label: epithelial cell
  - preferred_term: dendritic cell
    term:
      id: CL:0000451
      label: dendritic cell
  biological_processes:
  - preferred_term: innate immune response
    term:
      id: GO:0045087
      label: innate immune response
    modifier: INCREASED
  downstream:
  - target: Type 2 Sensitization and IgE Class Switch
  evidence:
  - reference: PMID:28583445
    reference_title: "Novel concepts of prevention and treatment of atopic dermatitis through barrier and immune manipulations with implications for the atopic march."
    supports: SUPPORT
    evidence_source: OTHER
    snippet: "Antigen penetration through a \ncompromised barrier likely leads to increased innate immune responses, \nantigen-presenting cell stimulation, and priming of overt cutaneous disease."
    explanation: >-
      Describes antigen penetration through the disrupted barrier driving innate
      immune and antigen-presenting-cell activation.
  - reference: PMID:28583447
    reference_title: "Etiology of epithelial barrier dysfunction in patients with type 2 inflammatory diseases."
    supports: SUPPORT
    evidence_source: OTHER
    snippet: "microorganisms and antigens can gain access between epithelial cells through the basement membrane to the underlying lamina propria and connective tissue. Penetration of microbes triggers strong innate immune responses by PRR on epithelial cells and immune cells"
    explanation: >-
      Mechanistic statement that barrier predisposition permits transepithelial
      antigen/microbe access and PRR-driven innate immune activation.

- name: Type 2 Sensitization and IgE Class Switch
  description: >-
    The innate-activated, TH2-promoting microenvironment drives T-cell/B-cell
    interactions in regional lymph nodes that lead to excessive IgE class
    switch, establishing allergen-specific sensitization characteristic of the
    allergic diathesis.
  role: effector
  cell_types:
  - preferred_term: T-helper 2 cell
    term:
      id: CL:0000546
      label: T-helper 2 cell
  - preferred_term: B cell
    term:
      id: CL:0000236
      label: B cell
  biological_processes:
  - preferred_term: type 2 immune response
    term:
      id: GO:0042092
      label: type 2 immune response
    modifier: INCREASED
  - preferred_term: immunoglobulin production
    term:
      id: GO:0002377
      label: immunoglobulin production
    modifier: INCREASED
  downstream:
  - target: Allergic Disease Initiation and the Atopic March
  evidence:
  - reference: PMID:28583445
    reference_title: "Novel concepts of prevention and treatment of atopic dermatitis through barrier and immune manipulations with implications for the atopic march."
    supports: SUPPORT
    evidence_source: OTHER
    snippet: "In \na TH2-promoting environment, T-cell/B-cell interactions occurring in regional \nlymph nodes lead to excessive IgE switch."
    explanation: >-
      Describes the TH2-driven T/B-cell interaction producing excessive IgE
      class switch downstream of barrier-enabled sensitization.
  - reference: PMID:28583447
    reference_title: "Etiology of epithelial barrier dysfunction in patients with type 2 inflammatory diseases."
    supports: SUPPORT
    evidence_source: OTHER
    snippet: "Subsequent sensitization and activation of adaptive immune responses can result, including type 2 immune responses of relevance to the allergic diathesis."
    explanation: >-
      Connects barrier-enabled antigen access to adaptive type 2 sensitization.

- name: Allergic Disease Initiation and the Atopic March
  description: >-
    Barrier-initiated sensitization manifests as allergic disease at the
    affected barrier (e.g., atopic dermatitis in skin, asthma in airway,
    eosinophilic esophagitis in esophagus) and can spread systemically to
    initiate the atopic march — the sequential development of food allergy,
    asthma, and allergic rhinitis. Because the barrier defect is upstream,
    barrier-supplementing interventions (e.g., emollients) are proposed primary
    prevention.
  role: outcome
  biological_processes:
  - preferred_term: type 2 immune response
    term:
      id: GO:0042092
      label: type 2 immune response
    modifier: INCREASED
  evidence:
  - reference: PMID:28583445
    reference_title: "Novel concepts of prevention and treatment of atopic dermatitis through barrier and immune manipulations with implications for the atopic march."
    supports: SUPPORT
    evidence_source: OTHER
    snippet: "spreads beyond the skin to initiate the atopic march, \nwhich includes food allergy, asthma, and allergic rhinitis"
    explanation: >-
      Defines the atopic-march outcome: barrier-initiated allergic disease
      progressing across organs (food allergy, asthma, allergic rhinitis).
  - reference: PMID:28583445
    reference_title: "Novel concepts of prevention and treatment of atopic dermatitis through barrier and immune manipulations with implications for the atopic march."
    supports: SUPPORT
    evidence_source: OTHER
    snippet: "Possible primary \ninterventions to prevent AD are focusing on improving skin barrier integrity, \nincluding supplementing barrier function with moisturizers."
    explanation: >-
      Supports barrier-supplementation (emollients) as upstream primary
      prevention, consistent with the barrier-first causal direction.

mechanistic_hypotheses:
- hypothesis_group_id: epithelial_barrier_hypothesis
  hypothesis_label: Epithelial barrier hypothesis of allergic disease
  status: CANONICAL
  description: >-
    Allergic/type 2 inflammatory diseases share an upstream epithelial barrier
    defect that, by permitting transepithelial allergen and microbial
    penetration, initiates type 2 sensitization and allergic disease across
    tissues. The defect appears to pre-date atopy, implying barrier protection
    as a prevention target.
  evidence:
  - reference: PMID:28583447
    reference_title: "Etiology of epithelial barrier dysfunction in patients with type 2 inflammatory diseases."
    supports: SUPPORT
    evidence_source: OTHER
    snippet: "Importantly, epithelial dysfunction characterized by these traits appears to \npre-date atopy and development of allergic disease."
    explanation: >-
      Central claim of the epithelial barrier hypothesis: barrier dysfunction
      precedes and predisposes to allergic disease.
