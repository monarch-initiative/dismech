  evidence:
  - reference: PMID:19439424
    supports: SUPPORT
    evidence_source: MODEL_ORGANISM
    snippet: >-
      Arx(-/y);Dlx5/6(CIG) (male) mice exhibit a variety of seizure types
      beginning in early-life, including seizures that behaviourally and
      electroencephalographically resembles infantile spasms, and show evolution
      through development.
    explanation: >-
      Conditional deletion from ganglionic eminence-derived neurons including
      cortical interneurons connects the interneuron branch to early-life
      developmental epilepsy.
  - reference: PMID:19439424
    supports: SUPPORT
    evidence_source: MODEL_ORGANISM
    snippet: >-
      Furthermore, we show that perturbation of interneuron subpopulations is an
      important mechanism underling the pathogenesis of developmental epilepsy
      in both hemizygous males and carrier females.
    explanation: >-
      Explicitly identifies interneuron subpopulation perturbation as a
      mechanism of developmental epilepsy in the targeted Arx model.
  - reference: PMID:15921244
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Male patients with X-linked lissencephaly with abnormal genitalia show
      intractable seizures, especially clonic convulsions or myoclonus from the
      first day of life, but neither infantile spasms nor hypsarrhythmia on
      electroencephalograms so far.
    explanation: >-
      Review-level human synthesis ties the XLAG interneuronopathy prototype to
      severe neonatal epileptogenicity.
discussions:
- discussion_id: gap_interneuronopathy_lumping_boundaries
  prompt: >-
    Which cortical malformation disease entries should conform to this module,
    and which should instead keep interneuron observations as secondary or
    disease-specific branches?
  kind: KNOWLEDGE_GAP
  status: OPEN
  attaches_to:
  - pathophysiology#Tangential Migration Failure from Ganglionic Eminences
  - pathophysiology#Cortical GABAergic Interneuron Deficit or Mislocalization
  rationale: >-
    ARX/XLAG is a strong prototype because human tissue can be nearly devoid of
    cortical interneurons and mouse models directly perturb interneuron
    migration. LIS1, DCX, and tubulin-related cortical malformations can show
    tangential-migration or interneuron-distribution abnormalities, but those
    branches may be milder, secondary to radial migration defects, or gene
    specific. Curators should decide conformance from a coherent shared
    mechanism skeleton rather than ontology identity or syndrome naming.
  evidence:
  - reference: PMID:20461390
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      In the present report, we investigated potential anomalies of this
      migration mode in three agyric/pachygyric syndromes due to defects in the
      LIS1, DCX and ARX genes.
    explanation: >-
      Human postmortem comparison supports candidate reuse beyond ARX, but it
      also requires gene-by-gene mechanistic interpretation.
  - reference: PMID:20461390
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      These data argue for different mechanisms of telencephalic tangential
      migration impairment in these three agyric/pachygyric syndromes.
    explanation: >-
      The same paper warns against over-lumping LIS1, DCX, and ARX under a
      single undifferentiated disease entity.
- discussion_id: gap_arx_variant_to_interneuron_branch
  prompt: >-
    Which ARX variant classes produce the severe malformation/interneuronopathy
    branch, and which produce developmental epilepsy or intellectual disability
    through a different or partial ARX mechanism?
  kind: KNOWLEDGE_GAP
  status: OPEN
  attaches_to:
  - pathophysiology#Subpallial Interneuron Lineage Program Disruption
  - pathophysiology#Excitation-Inhibition Imbalance and Developmental Epilepsy
  rationale: >-
    The module captures the reusable interneuron skeleton, but ARX disease
    entries should branch by variant class, residual protein function, nuclear
    localization, transcriptional repression, and developmental patterning
    effects. A single ARX disease entry can conform to this module while still
    representing subtype-specific routes for severe XLAG, infantile spasms,
    Proud syndrome, or non-malformation neurodevelopmental presentations.
  evidence:
  - reference: PMID:14722918
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Together, the group of phenotypes associated with ARX mutations
      demonstrates remarkable pleiotropy, but also comprises a nearly continuous
      series of developmental disorders that begins with hydranencephaly,
      lissencephaly, and agenesis of the corpus callosum, and ends with a series
      of overlapping syndromes with apparently normal brain structure.
    explanation: >-
      Demonstrates why ARX subtype branches are needed inside disease entries
      rather than treating every ARX phenotype as the same disease mechanism.
  - reference: PMID:20148114
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: >-
      We show that the most likely, common pathogenic mechanism of the missense
      mutations in NLS regions of the ARX homeodomain is inadequate accumulation
      and distribution of the ARX transcription factor within the nucleus due to
      sequestration of ARX with IPO13.
    explanation: >-
      Shows a variant-specific ARX molecular branch that may modify or precede
      the interneuron-lineage module in disease entries.
  - reference: PMID:26306640
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: >-
      We conclude that even low levels of N-terminally truncated ARX is
      sufficient to improve the patient's phenotype compared with the severe
      phenotype of XLAG that includes malformations of the brain and genitalia
      normally seen in complete loss-of-function mutations in ARX.
    explanation: >-
      Supports residual ARX protein dosage as a knowledge gap for mapping
      variant class onto severe malformation versus epilepsy-predominant
      branches.
- discussion_id: gap_interneuron_migration_human_model_translatability
  prompt: >-
    Which parts of ARX/interneuronopathy biology are faithfully captured by
    mouse ganglionic eminence models, and which require human iPSC-derived
    ventral forebrain, dorsal cortical, organoid, assembloid, fetal-tissue, or
    spatial single-cell systems?
  kind: HUMAN_MODEL_MISMATCH
  status: OPEN
  attaches_to:
  - pathophysiology#Interneuron Progenitor Specification and Differentiation Failure
  - pathophysiology#Tangential Migration Failure from Ganglionic Eminences
  - pathophysiology#Cortical GABAergic Interneuron Deficit or Mislocalization
  rationale: >-
    The seed review explicitly calls out human in vitro cell-culture models for
    human-specific cells and transcripts in cortical malformations. For this
    module, mouse Arx models establish conserved ganglionic-eminence and
    interneuron migration biology, while human tissue is scarce and often
    end-stage. Human iPSC-derived ventral forebrain organoids, cortical
    organoids, fused assembloids, and fetal-tissue benchmarks are needed to
    decide how ARX variant class, human interneuron subtype timing, and
    dorsal-ventral migration routes translate into disease entries.
  evidence:
  - reference: PMID:28951247
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      We finish by describing the advantages of human in vitro cell culture
      models, to examine human-specific cells and transcripts, and further
      mention non-genetic mechanisms leading to cortical malformations.
    explanation: >-
      The seed review supports capturing new approach methods and iPSC systems
      as a curation-relevant knowledge gap for cortical malformation mechanisms.
  - reference: PMID:28111201
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      However, the mouse brain is naturally lissencephalic, suggesting that
      certain aspects of cortical development may not be adequately assessed in
      mice.
    explanation: >-
      Supports the general human/model mismatch category for mechanisms inferred
      from mouse cortical-development models.
  - reference: PMID:28111201
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: >-
      To bridge the gap between mouse models and human disease, patient-derived
      induced pluripotent stem cells (iPSCs) (Takahashi et al., 2007; Yu et al.,
      2007; Park et al., 2008) represent a promising approach to study disease
      pathogenesis in a relevant genetic and cellular context.
    explanation: >-
      Provides direct support for human iPSC systems as new approach methods to
      resolve translatability gaps in lissencephaly and related cortical
      malformations.
  proposed_experiments:
  - experiment_id: exp_arx_interneuron_assembloid_variant_panel
    name: Isogenic ARX ventral-dorsal forebrain assembloid migration panel
    description: >-
      Generate patient-derived and engineered isogenic human iPSC lines carrying
      representative ARX loss-of-function, homeodomain/NLS missense, early
      truncating/reinitiation, and polyalanine-expansion variants. Differentiate
      matched ventral forebrain organoids and dorsal cortical organoids, fuse
      them into forebrain assembloids, and compare interneuron specification,
      subtype identity, tangential migration into cortical tissue, cortical
      interneuron integration, and network excitability against mouse Arx model
      expectations and available human fetal/postmortem benchmarks.
    experiment_type:
      preferred_term: isogenic forebrain assembloid interneuron migration experiment
    model_systems:
    - name: Human iPSC-derived ventral-dorsal forebrain assembloid
      description: >-
        Fused human ventral forebrain and dorsal cortical organoid system that
        models ganglionic eminence-like interneuron generation and tangential
        migration into cortical tissue.
