name: Conserved Fibrotic Response Module
description: >-
  A conserved pathological module representing the dysregulation of normal
  wound healing (GO:0042060) that underlies organ fibrosis across tissues.
  Tissue injury triggers inflammation and resident mesenchymal cell activation,
  leading to myofibroblast transdifferentiation, excessive extracellular matrix
  deposition, and progressive architectural distortion with organ dysfunction.
  This module captures the shared core of fibrotic disease across liver, lung,
  heart, kidney, skin, and other organs. Individual disorder entries declare
  conformance via conforms_to on their pathophysiology nodes, substituting
  organ-specific cell types and anatomical locations while preserving the
  conserved causal chain and signaling axes.
category: Module
creation_date: "2026-03-18T00:00:00Z"
updated_date: "2026-03-18T00:00:00Z"
notes: >-
  This is a mechanism module, not a specific disease. Disorder entries reference
  individual nodes via conforms_to (e.g., "fibrotic_response#Mesenchymal Cell
  Activation"). The module defines the expected pathophysiology structure;
  conforming nodes in disorder files should include the corresponding cell types,
  biological processes, and causal edges, specialized to their organ context.
  Key organ-specific substitutions: liver uses hepatic stellate cells
  (CL:0000632), lung uses pulmonary fibroblasts, heart uses cardiac fibroblasts,
  kidney uses mesangial cells (CL:0000650) or pericytes.
pathophysiology:
- name: Tissue Injury
  description: >-
    Chronic or repeated injury to organ-specific parenchymal cells initiates
    the fibrotic cascade. The nature of injury varies by organ (viral hepatitis
    in liver, inhaled particles in lung, ischemia in heart, immune complex
    deposition in kidney) but the downstream response converges on a common
    inflammatory and reparative program.
  role: trigger
  biological_processes:
  - preferred_term: Wound Healing
    term:
      id: GO:0042060
      label: wound healing
    modifier: DYSREGULATED
  evidence:
  - reference: PMID:23255577
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Fibrosis is a pathological scarring process that leads to destruction of
      organ architecture and impairment of organ function. Chronic loss of organ
      function in most organs, including bone marrow, heart, intestine, kidney,
      liver, lung, and skin, is associated with fibrosis, contributing to an
      estimated one third of natural deaths worldwide.
    explanation: >-
      Establishes that fibrosis is a conserved response to chronic tissue injury
      across all major organs. Evidence source is OTHER because this is a review
      synthesizing data from multiple study types.
  downstream:
  - target: Inflammatory Recruitment and Amplification

- name: Inflammatory Recruitment and Amplification
  description: >-
    Damage-associated molecular patterns (DAMPs) from injured parenchymal cells
    recruit and activate macrophages, which produce pro-fibrotic cytokines
    including TGF-beta, PDGF, and IL-13. This inflammatory phase bridges
    tissue injury to mesenchymal cell activation and is a key amplification
    step in the fibrotic cascade.
  role: amplifier
  cell_types:
  - preferred_term: Macrophage
    term:
      id: CL:0000235
      label: macrophage
  biological_processes:
  - preferred_term: Inflammatory Response
    term:
      id: GO:0006954
      label: inflammatory response
    modifier: INCREASED
  - preferred_term: Leukocyte Migration
    term:
      id: GO:0050900
      label: leukocyte migration
    modifier: INCREASED
  evidence:
  - reference: PMID:21727191
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Platelet aggregation and subsequent degranulation in turn promotes blood
      vessel dilation and increased permeability, allowing efficient recruitment
      of inflammatory cells (e.g., neutrophils, macrophages, lymphocytes, and
      eosinophils) to the site of injury. Neutrophils are the most abundant
      inflammatory cell at the earliest stages of wound healing, but are quickly
      replaced by macrophages after neutrophil degranulation. During this initial
      leukocyte migration phase, activated macrophages and neutrophils debride
      the wound and eliminate any invading organisms. They also produce a variety
      of cytokines and chemokines that amplify the inflammatory response and
      trigger fibroblast proliferation and recruitment.
    explanation: >-
      Directly describes macrophage recruitment and cytokine/chemokine
      amplification as the inflammatory phase that bridges tissue injury to
      fibroblast activation. Evidence source is OTHER because this is a review
      synthesizing human clinical and model organism data.
  downstream:
  - target: Mesenchymal Cell Activation

- name: Mesenchymal Cell Activation
  description: >-
    Resident mesenchymal cells (fibroblasts, hepatic stellate cells, pericytes,
    or mesangial cells depending on organ) are activated by TGF-beta and other
    pro-fibrotic signals to transdifferentiate into alpha-SMA-positive
    myofibroblasts. This is the central effector step of fibrosis, conserved
    across all organs. The specific precursor cell type varies by tissue but the
    TGF-beta/Smad signaling axis driving activation is shared.
  role: central_effector
  cell_types:
  - preferred_term: Fibroblast
    term:
      id: CL:0000057
      label: fibroblast
  - preferred_term: Myofibroblast
    term:
      id: CL:0000186
      label: myofibroblast cell
  biological_processes:
  - preferred_term: TGF-beta Receptor Signaling
    term:
      id: GO:0007179
      label: transforming growth factor beta receptor signaling pathway
    modifier: INCREASED
  evidence:
  - reference: PMID:32673537
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Cardiac fibrosis is mediated by the activation of resident cardiac
      fibroblasts, which differentiate into myofibroblasts in response to
      injury or stress. Although myofibroblast formation is a physiological
      response to acute injury, such as myocardial infarction, myofibroblast
      persistence, as occurs in heart failure, contributes to maladaptive
      remodeling and progressive functional decline.
    explanation: >-
      Demonstrates the conserved fibroblast-to-myofibroblast transition
      as the central effector mechanism, with the distinction between
      physiological (acute) and pathological (persistent) activation.
      Evidence source is OTHER because this is a review article.
  - reference: PMID:33774068
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      One central pathway in remodelling processes involves transforming growth
      factor (TGF)-β induced fibroblast activation and myofibroblast
      differentiation that increases ECM production.
    explanation: >-
      Confirms TGF-beta-induced fibroblast activation and myofibroblast
      differentiation as the central conserved pathway in tissue remodeling
      and fibrosis. Evidence source is OTHER because this is a review article.
  downstream:
  - target: Excessive ECM Deposition

- name: Excessive ECM Deposition
  description: >-
    Activated myofibroblasts produce excessive collagen (types I and III) and
    other extracellular matrix proteins while also secreting tissue inhibitors
    of metalloproteinases (TIMPs) that block matrix degradation. The imbalance
    between ECM production and degradation leads to progressive matrix
    accumulation. This process is conserved across organs though the specific
    collagen subtypes and matrix composition may vary.
  role: effector
  cell_types:
  - preferred_term: Myofibroblast
    term:
      id: CL:0000186
      label: myofibroblast cell
  biological_processes:
  - preferred_term: ECM Organization
    term:
      id: GO:0030198
      label: extracellular matrix organization
    modifier: INCREASED
  - preferred_term: Collagen Biosynthesis
    term:
      id: GO:0032964
      label: collagen biosynthetic process
    modifier: INCREASED
  - preferred_term: Collagen Fibril Organization
    term:
      id: GO:0030199
      label: collagen fibril organization
    modifier: INCREASED
  evidence:
  - reference: PMID:33774068
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Abnormal deposition of extracellular matrix (ECM) proteins is a key
      factor in the development of tissue remodelling that results in symptoms
      and impaired lung function in these diseases.
    explanation: >-
      Establishes abnormal ECM deposition as the key factor in fibrotic
      tissue remodeling. Evidence source is OTHER because this is a review
      article synthesizing data across multiple pulmonary diseases.
  - reference: PMID:21727191
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Once fibroblasts become activated, they transform into α-smooth muscle
      actin–expressing myofibroblasts that secrete ECM components.
    explanation: >-
      Directly describes activated myofibroblasts as the source of ECM
      production in fibrosis. Evidence source is OTHER because this is a
      review synthesizing human and model organism data.
  downstream:
  - target: Architectural Distortion and Organ Dysfunction

- name: Architectural Distortion and Organ Dysfunction
  description: >-
    Progressive matrix accumulation distorts normal tissue architecture, leading
    to organ-specific structural changes: nodular regeneration and portal
    hypertension in liver, honeycombing in lung, interstitial expansion and
    stiffening in heart, glomerulosclerosis in kidney. The end result is
    irreversible loss of organ function. While the specific architectural
    consequences are organ-dependent, the underlying process of progressive
    structural distortion from excessive matrix is conserved.
  role: consequence
  evidence:
  - reference: PMID:23255577
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Fibrosis is a pathological scarring process that leads to destruction of
      organ architecture and impairment of organ function.
    explanation: >-
      Directly states that fibrosis leads to destruction of organ architecture
      and impairment of function, the defining consequence of the fibrotic
      response module. Evidence source is OTHER because this is a review.
  - reference: PMID:21727191
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Fibrosis develops when the wound is severe, the tissue-damaging irritant
      persists, or when the repair process becomes dysregulated.
    explanation: >-
      Establishes that architectural distortion and organ dysfunction result
      from persistent or dysregulated wound repair rather than the normal
      healing process.
