name: Telomere Attrition Module
description: >-
  A conserved mechanism module for the hallmark of aging (Lopez-Otin et al.)
  termed telomere attrition: the progressive shortening of the protective
  telomere end-complexes of chromosomes with successive cell divisions and age.
  Because conventional DNA polymerases cannot fully replicate chromosome ends,
  telomeres shorten with each division unless maintained by telomerase; in most
  somatic tissues telomerase is limiting, so telomeres erode over the lifespan.
  Critically short or uncapped telomeres can no longer fulfil their protective
  function and are sensed as DNA double-strand breaks, triggering a persistent
  DNA-damage response that drives replicative senescence and blocks further
  division. The resulting failure to replenish tissues underlies telomere
  syndromes and contributes to age-related disease and mortality. Individual
  disorder entries declare conformance via conforms_to on their pathophysiology
  nodes, substituting the disease-specific lesion (e.g. telomerase-complex or
  shelterin mutations in the short-telomere/telomere-syndrome disorders) while
  preserving the conserved attrition -> DNA-damage/senescence -> tissue-failure
  chain.
category: Module
creation_date: "2026-07-01T00:00:00Z"
notes: >-
  This is a mechanism module, not a specific disease. Disorder entries
  reference individual nodes via conforms_to (e.g.,
  "telomere_attrition#Telomere-Initiated DNA Damage and Replicative
  Senescence"). Conforming nodes in disorder files should include the
  corresponding biological processes and causal edges, specialized to their
  disease context. This module is the aging-facing complement of the
  cancer-facing enabling_replicative_immortality module: this one models
  telomere ATTRITION driving senescence in normal/aging cells, whereas
  enabling_replicative_immortality models telomere-maintenance REACTIVATION that
  lets tumor cells escape that barrier. It also feeds cellular_senescence
  (telomere attrition is one of the senescence-inducing stresses). Key
  conformance target:
  "telomere_attrition#Telomere-Initiated DNA Damage and Replicative Senescence".
pathophysiology:
- name: Progressive Telomere Attrition
  description: >-
    Because conventional DNA replication cannot fully copy the ends of linear
    chromosomes (the end-replication problem) and somatic telomerase is
    limiting, telomeres lose repeat sequence with each cell division and shorten
    progressively with age. This cumulative loss of telomeric DNA is the
    initiating lesion of the hallmark; age-related and premature-aging syndromes
    are characterized by short telomeres.
  role: trigger
  biological_processes:
  - preferred_term: Telomere Maintenance
    term:
      id: GO:0000723
      label: telomere maintenance
    modifier: DECREASED
  evidence:
  - reference: PMID:2342578
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: >-
      It has been proposed that the finite doubling capacity of normal mammalian
      cells is due to a loss of telomeric DNA and eventual deletion of essential
      sequences.
    explanation: >-
      Establishes progressive loss of telomeric DNA with division as the basis of
      the finite replicative capacity of cells, the initiating attrition modeled
      here. Evidence source is IN_VITRO (human fibroblast study).
  - reference: PMID:16136653
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Age-related diseases and premature ageing syndromes are characterized by
      short telomeres, which can compromise cell viability, whereas tumour cells
      can prevent telomere loss by aberrantly upregulating telomerase.
    explanation: >-
      States that age-related and premature-aging syndromes are characterized by
      short telomeres, supporting telomere attrition as the aging lesion (and
      contrasting the cancer telomerase-reactivation arm). Evidence source is
      OTHER because this is a review.
  downstream:
  - target: Telomere-Initiated DNA Damage and Replicative Senescence
- name: Telomere-Initiated DNA Damage and Replicative Senescence
  description: >-
    When telomeres become critically short or uncapped they can no longer
    protect chromosome ends, which are then sensed as DNA double-strand breaks.
    The resulting persistent DNA-damage-response signaling enforces replicative
    senescence - an essentially permanent proliferative arrest. This is the
    conserved central effector that disease-specific telomere lesions converge
    upon, and the point at which telomere attrition feeds the cellular
    senescence module.
  role: central_effector
  biological_processes:
  - preferred_term: DNA Damage Response
    term:
      id: GO:0006974
      label: DNA damage response
    modifier: INCREASED
  - preferred_term: Replicative Senescence
    term:
      id: GO:0090399
      label: replicative senescence
    modifier: INCREASED
  evidence:
  - reference: PMID:14608368
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: >-
      This exhaustion of proliferative potential, called senescence, can be
      triggered when telomeres--the ends of linear chromosomes-cannot fulfil
      their normal protective functions.
    explanation: >-
      Establishes that loss of telomere protective function triggers replicative
      senescence, the central effector modeled here. Evidence source is IN_VITRO
      (human fibroblast senescence study).
  - reference: PMID:14608368
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: >-
      Here we show that senescent human fibroblasts display molecular markers
      characteristic of cells bearing DNA double-strand breaks.
    explanation: >-
      Shows that telomere-initiated senescent cells carry DNA double-strand-break
      damage markers, supporting the DNA-damage-response arm of this node.
      Evidence source is IN_VITRO (human fibroblast study).
  downstream:
  - target: Tissue Replenishment Failure and Age-Related Disease
- name: Tissue Replenishment Failure and Age-Related Disease
  description: >-
    Telomere attrition, by blocking cell division and imposing senescence,
    interferes with the replenishment of proliferative tissues. The resulting
    regenerative failure contributes causally to telomere syndromes and to
    broader age-related disease and mortality; the specific organ phenotype is
    supplied by the conforming disorder.
  role: consequence
  evidence:
  - reference: PMID:26785477
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Telomere attrition can lead to potentially maladaptive cellular changes,
      block cell division, and interfere with tissue replenishment.
    explanation: >-
      States that telomere attrition blocks cell division and impairs tissue
      replenishment, the consequence modeled here. Evidence source is OTHER
      because this is a review.
