name: Disabled Macroautophagy Module
description: >-
  A conserved mechanism module for the hallmark of aging (Lopez-Otin et al.,
  2023) termed disabled macroautophagy: the age-associated decline of the
  macroautophagy machinery and the loss of its cytoplasmic quality-control
  function. Macroautophagy is the lysosomal degradation pathway - mediated by
  the evolutionarily conserved autophagy-related (ATG) genes - that sequesters
  and recycles dysfunctional organelles, aggregated proteins, and intracellular
  microbes, playing a fundamental role in cellular, tissue, and organismal
  homeostasis. Autophagic potential falls in normal and pathological aging; when
  ATG-mediated capture and lysosomal clearance fail, damaged cytoplasmic
  constituents accumulate, contributing to neurodegenerative, inflammatory, and
  other age-related disease. Because autophagy induction (by dietary restriction
  or nutrient-signaling inactivation) counteracts age-associated damage,
  restoring autophagic competence is a target for healthy-aging intervention.
  Individual disorder entries declare conformance via conforms_to on their
  pathophysiology nodes, substituting the disease-specific autophagy lesion
  (e.g. an ATG-pathway or autophagy-adaptor mutation, or secondary autophagy
  suppression) while preserving the conserved machinery-decline -> failed-
  clearance -> accumulated-damage chain.
category: Module
creation_date: "2026-07-01T00:00:00Z"
notes: >-
  This is a mechanism module, not a specific disease. Disorder entries
  reference individual nodes via conforms_to (e.g.,
  "disabled_macroautophagy#Failure of Cytoplasmic Quality Control"). This module
  treats macroautophagy COMPETENCE (the ATG machinery) as the hallmark itself,
  distinct from - but complementary to - the specific autophagy-related arms
  modeled elsewhere: deregulated_nutrient_sensing models mTORC1-driven autophagy
  SUPPRESSION as one downstream node, loss_of_proteostasis models autophagy as
  one aggregate-clearance route, and mitochondrial_dysfunction models mitophagy.
  Keep this module focused on the general macroautophagy pathway; route
  organelle- or substrate-specific claims to those modules. Key conformance
  target: "disabled_macroautophagy#Failure of Cytoplasmic Quality Control".
pathophysiology:
- name: Autophagy Machinery Decline
  description: >-
    The macroautophagy pathway - autophagosome formation and lysosomal fusion,
    mediated by the conserved autophagy-related (ATG) genes - declines in
    capacity during normal and pathological aging. This reduced autophagic
    potential is the initiating lesion of the hallmark.
  role: trigger
  biological_processes:
  - preferred_term: Macroautophagy
    term:
      id: GO:0016236
      label: macroautophagy
    modifier: DECREASED
  - preferred_term: Autophagosome Assembly
    term:
      id: GO:0000045
      label: autophagosome assembly
    modifier: DECREASED
  evidence:
  - reference: PMID:30633901
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      The lysosomal degradation pathway of autophagy plays a fundamental role in
      cellular, tissue, and organismal homeostasis and is mediated by
      evolutionarily conserved autophagy-related (ATG) genes.
    explanation: >-
      Defines the ATG-mediated macroautophagy pathway whose age-associated
      decline is the trigger modeled here. Evidence source is OTHER because this
      is a review.
  - reference: PMID:21884931
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      normal and pathological aging are often associated with a reduced
      autophagic potential
    explanation: >-
      Documents reduced autophagic potential in normal and pathological aging,
      the initiating decline of this module. Evidence source is OTHER because
      this is a review.
  downstream:
  - target: Failure of Cytoplasmic Quality Control
- name: Failure of Cytoplasmic Quality Control
  description: >-
    Autophagy selectively targets dysfunctional organelles, intracellular
    microbes, and pathogenic proteins for recycling, counteracting the
    age-associated accumulation of damaged organelles and proteins. When
    macroautophagy is disabled, this cytoplasmic quality-control and
    recycling function is lost - the central effector state that
    disease-specific autophagy lesions converge upon.
  role: central_effector
  biological_processes:
  - preferred_term: Autophagy
    term:
      id: GO:0006914
      label: autophagy
    modifier: DECREASED
  evidence:
  - reference: PMID:30633901
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Autophagy selectively targets dysfunctional organelles, intracellular
      microbes, and pathogenic proteins, and deficiencies in these processes may
      lead to disease.
    explanation: >-
      Establishes autophagy's selective quality-control function and that its
      deficiency causes disease, the central effector modeled here. Evidence
      source is OTHER because this is a review.
  - reference: PMID:25654554
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Both starvation and the genetic inactivation of nutrient signaling
      converge on the induction of autophagy, a cytoplasmic recycling process
      that counteracts the age-associated accumulation of damaged organelles and
      proteins as it improves the metabolic fitness of cells.
    explanation: >-
      Establishes autophagy as the cytoplasmic recycling process that clears
      age-associated damage; its failure is the loss modeled here. Evidence
      source is OTHER because this is a review.
  downstream:
  - target: Accumulated Cellular Damage and Age-Related Disease
- name: Accumulated Cellular Damage and Age-Related Disease
  description: >-
    With cytoplasmic quality control disabled, damaged organelles and pathogenic
    proteins accumulate, producing degenerative changes and predisposing to
    age-related disease, especially neurodegenerative and inflammatory
    disorders. This is the conserved consequence of disabled macroautophagy; the
    specific clinical phenotype is supplied by the conforming disorder.
  role: consequence
  evidence:
  - reference: PMID:30633901
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Definitive etiological links exist between mutations in genes that control
      autophagy and human disease, especially neurodegenerative, inflammatory
      disorders and cancer.
    explanation: >-
      Establishes etiological links between autophagy-gene defects and
      age-related disease, the consequence modeled here. Evidence source is OTHER
      because this is a review.
  - reference: PMID:21884931
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Genetic inhibition of autophagy induces degenerative changes in mammalian
      tissues that resemble those associated with aging
    explanation: >-
      Shows that inhibiting autophagy produces aging-like degenerative tissue
      changes, supporting this outcome node. Evidence source is OTHER because
      this is a review.
