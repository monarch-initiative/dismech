  evidence:
  - reference: PMID:21163446
    reference_title: "Huntington's disease: from molecular pathogenesis to clinical treatment."
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      These disorders all share features including: delayed onset; selective
      neuronal vulnerability, despite widespread expression of disease-related
      proteins during the whole lifetime; abnormal protein processing and
      aggregation; and cellular toxic effects involving both cell autonomous and
      cell-cell interaction mechanisms.
    explanation: >-
      Directly supports selective neuronal vulnerability despite widespread
      protein expression as the shared end-stage feature of polyQ
      neurodegeneration.
  - reference: PMID:28821675
    reference_title: "Synergistic Toxicity of Polyglutamine-Expanded TATA-Binding Protein in Glia and Neuronal Cells: Therapeutic Implications for Spinocerebellar Ataxia 17."
    supports: SUPPORT
    evidence_source: MODEL_ORGANISM
    snippet: >-
      Spinocerebellar ataxia 17 (SCA17) is caused by polyglutamine (polyQ)
      repeat expansion in the TATA-binding protein (TBP) and is among a family
      of neurodegenerative diseases in which polyQ expansion leads to
      preferential neuronal loss in the brain.
    explanation: >-
      SCA17 knock-in mouse work frames preferential (selective) neuronal loss as
      the shared outcome of polyQ expansion across this disease family,
      generalizing the effector node beyond Huntington disease.
