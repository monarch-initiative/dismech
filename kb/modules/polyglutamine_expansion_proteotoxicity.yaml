name: Polyglutamine Expansion Proteotoxicity Module
description: >-
  A conserved neurodegeneration mechanism module for the autosomal dominant
  polyglutamine (polyQ) diseases caused by translated CAG trinucleotide repeat
  expansions. Across unrelated host genes, an elongated polyQ tract confers a
  dominant toxic gain of function on the disease protein: the mutant protein
  misfolds and aggregates (often forming neuronal intranuclear inclusions),
  sequesters transcriptional co-activators and disrupts gene expression,
  overwhelms ubiquitin-proteasome and autophagy clearance, and impairs
  mitochondrial bioenergetics. These convergent insults produce region-specific
  selective neuronal dysfunction and loss despite the disease protein being
  expressed widely. Individual disorder entries declare conformance via
  conforms_to on their pathophysiology nodes, substituting the gene-specific
  initiating protein, the vulnerable neuronal population, and the affected brain
  region while preserving the shared causal chain.
category: Module
creation_date: "2026-05-30T12:00:00Z"
notes: >-
  This is a mechanism module, not a specific disease. Disorder entries reference
  individual nodes via conforms_to (for example,
  "polyglutamine_expansion_proteotoxicity#Misfolded Polyglutamine Protein
  Aggregation"). The module is intended for the translated/coding CAG-polyQ
  diseases — Huntington disease (HTT), dentatorubral-pallidoluysian atrophy
  (ATN1), spinocerebellar ataxia type 17 (TBP), and Machado-Joseph disease /
  SCA3 (ATXN3) — and is readily extensible to the other classical polyQ
  disorders (SCA1, SCA2, SCA6, SCA7, SBMA). It is intentionally distinct from
  the fame_pentanucleotide_repeat_rna_toxicity module: that module models
  untranslated intronic pentanucleotide repeats acting through repeat RNA
  toxicity, whereas this module models protein-level proteotoxicity from a
  translated polyQ tract. Friedreich ataxia (intronic GAA expansion causing
  frataxin loss of function) is explicitly out of scope because it is not a
  toxic-gain-of-function polyQ disease. The precise toxic species (soluble
  mutant conformers versus mature aggregates) remains debated and is captured at
  the aggregation node.
pathophysiology:
- name: Translated CAG / Polyglutamine Repeat Expansion
  description: >-
    The shared initiating lesion is an expanded CAG trinucleotide repeat within
    the coding region of the disease gene, which is translated into an
    abnormally long polyglutamine tract in the respective disease protein.
    Repeat length correlates with severity and inversely with age at onset, and
    the expansion confers a dominant toxic gain of function rather than simple
    loss of the host protein.
  role: trigger
  genes:
  - preferred_term: HTT
    term:
      id: hgnc:4851
      label: HTT
  - preferred_term: ATN1
    term:
      id: hgnc:3033
      label: ATN1
  - preferred_term: TBP
    term:
      id: hgnc:11588
      label: TBP
  - preferred_term: ATXN3
    term:
      id: hgnc:7106
      label: ATXN3
  evidence:
  - reference: PMID:27188817
    reference_title: "Huntington disease."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      In mutation carriers, huntingtin is produced with abnormally long
      polyglutamine sequences that confer toxic gains of function and predispose
      the protein to fragmentation, resulting in neuronal dysfunction and death.
    explanation: >-
      The Huntington disease Primer establishes the conserved initiating logic:
      a translated CAG expansion yields an elongated polyglutamine tract that
      confers a toxic gain of function on the disease protein.
  - reference: PMID:17786457
    reference_title: "CAG repeat disorder models and human neuropathology: similarities and differences."
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      They include at least nine disorders, including Huntington's disease (HD),
      dentatorubral pallidoluysian atrophy (DRPLA), spinal and bulbar muscular
      atrophy (SBMA), and the spinocerebellar ataxias SCA1, SCA2, SCA3 (also
      known as Machado-Joseph disease), SCA6, SCA7, and SCA17.
    explanation: >-
      Confirms that this conserved mechanism spans the nine classical CAG-polyQ
      disorders, including the module's flagship diseases (HD, DRPLA, SCA17, and
      SCA3/Machado-Joseph disease).
  - reference: PMID:31669734
    reference_title: "Pathogenesis of SCA3 and implications for other polyglutamine diseases."
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      The underlying disease mechanism in the polyQ diseases is thought
      principally to reflect dominant toxic properties of the disease proteins
      which, when harboring a polyQ expansion, differentially interact with
      protein partners and are prone to aggregate.
    explanation: >-
      Supports the dominant toxic-gain-of-function model and the propensity of
      polyQ-expanded proteins to aggregate as the shared mechanistic core.
  downstream:
  - target: Misfolded Polyglutamine Protein Aggregation
    description: >-
      The elongated polyQ tract destabilizes the disease protein and drives
      misfolding and aggregation.

- name: Misfolded Polyglutamine Protein Aggregation
  description: >-
    The expanded polyglutamine tract destabilizes the native fold of the disease
    protein, promoting a beta-sheet-rich misfolded conformation that
    self-associates into oligomers and amyloid-like aggregates. Across polyQ
    diseases this is accompanied by characteristic neuronal intranuclear
    inclusions and cytoplasmic deposits. Whether the principal toxic species is
    a soluble mutant conformer or a mature aggregate remains debated, and visible
    inclusions may represent a late stage of a longer toxic cascade.
  role: central_effector
  cell_types:
  - preferred_term: neuron
    term:
      id: CL:0000540
      label: neuron
  cellular_components:
  - preferred_term: neuronal intranuclear inclusion
    term:
      id: GO:0016234
      label: inclusion body
  biological_processes:
  - preferred_term: amyloid fibril formation
    term:
      id: GO:1990000
      label: amyloid fibril formation
    modifier: INCREASED
  - preferred_term: protein folding
    term:
      id: GO:0006457
      label: protein folding
    modifier: DYSREGULATED
  evidence:
  - reference: PMID:15272267
    reference_title: "Protein aggregation and neurodegenerative disease."
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      The aggregates usually consist of fibers containing misfolded protein with
      a beta-sheet conformation, termed amyloid.
    explanation: >-
      Establishes the shared structural basis of polyQ aggregation: misfolded
      protein adopting beta-sheet amyloid conformation.
  - reference: PMID:17786457
    reference_title: "CAG repeat disorder models and human neuropathology: similarities and differences."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      human brains affected by CAG repeat diseases share several
      polyglutamine-related changes in their neuronal nuclei and cytoplasm
      including the formation of intranuclear inclusions.
    explanation: >-
      Human neuropathology confirms neuronal intranuclear inclusions as a
      conserved feature shared across CAG-polyQ diseases.
  - reference: PMID:18637947
    reference_title: "Huntington's disease: revisiting the aggregation hypothesis in polyglutamine neurodegenerative diseases."
    supports: PARTIAL
    evidence_source: OTHER
    snippet: >-
      Recent data suggest that the toxic species of protein in these diseases
      may be soluble mutant conformers, and that the protein context of expanded
      polyglutamine is critical to understanding disease specificity.
    explanation: >-
      Partially qualifies the node: misfolding of the polyQ protein is central,
      but the toxic species may be soluble conformers rather than mature
      aggregates, and host-protein context shapes disease specificity.
  downstream:
  - target: Transcriptional Dysregulation
    description: >-
      Nuclear accumulation of misfolded polyQ protein sequesters transcriptional
      co-activators and disrupts gene expression.
  - target: Proteostasis Network Overload
    description: >-
      Misfolded and aggregated polyQ protein burdens the ubiquitin-proteasome
      and autophagy clearance systems.
  - target: Mitochondrial and Bioenergetic Dysfunction
    description: >-
      Mutant polyQ protein impairs mitochondrial function and energy metabolism.

- name: Transcriptional Dysregulation
  description: >-
    Nuclear polyQ-expanded protein directly binds and sequesters transcriptional
    co-activators — notably CREB-binding protein (CBP) and other
    acetyltransferases — reducing histone/protein acetylation and broadly
    altering transcription of neuronal survival and homeostasis genes. For some
    disease proteins (e.g., atrophin-1 in DRPLA and TBP in SCA17) the host
    protein is itself a transcriptional regulator, so the polyQ expansion
    corrupts a normal transcriptional function.
  role: amplifier
  cell_types:
  - preferred_term: neuron
    term:
      id: CL:0000540
      label: neuron
  biological_processes:
  - preferred_term: regulation of transcription by RNA polymerase II
    term:
      id: GO:0006357
      label: regulation of transcription by RNA polymerase II
    modifier: DYSREGULATED
  - preferred_term: protein acetylation
    term:
      id: GO:0006473
      label: protein acetylation
    modifier: DECREASED
  evidence:
  - reference: PMID:11607033
    reference_title: "Histone deacetylase inhibitors arrest polyglutamine-dependent neurodegeneration in Drosophila."
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: >-
      the polyglutamine-containing domain of Htt, Htt exon 1 protein (Httex1p),
      directly binds the acetyltransferase domains of two distinct proteins:
      CREB-binding protein (CBP) and p300/CBP-associated factor (P/CAF).
    explanation: >-
      Cell-free and cell-based assays show the polyQ domain physically engages
      and inhibits CBP-class acetyltransferases, the molecular basis of polyQ
      transcriptional co-activator sequestration.
  - reference: PMID:11607033
    reference_title: "Histone deacetylase inhibitors arrest polyglutamine-dependent neurodegeneration in Drosophila."
    supports: SUPPORT
    evidence_source: MODEL_ORGANISM
    snippet: >-
      In vivo, HDAC inhibitors arrest ongoing progressive neuronal degeneration
      induced by polyglutamine repeat expansion, and they reduce lethality in
      two Drosophila models of polyglutamine disease.
    explanation: >-
      Drosophila polyQ models show that pharmacologically restoring histone
      acetylation balance rescues neurodegeneration, causally linking
      transcriptional/acetylation dysregulation to the disease phenotype.
  - reference: PMID:15964198
    reference_title: "Transcriptional repression and cell death induced by nuclear aggregates of non-polyglutamine protein."
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: >-
      The nuclear deposition of polyQ proteins correlates with rearrangements of
      nuclear matrix, transcriptional dysregulation, and cell death.
    explanation: >-
      Links nuclear deposition of polyQ proteins to transcriptional
      dysregulation and downstream cell death.
  downstream:
  - target: Selective Neuronal Dysfunction and Loss
    description: >-
      Loss of co-activator function and aberrant gene expression compromise
      neuronal survival programs.

- name: Proteostasis Network Overload
  description: >-
    Misfolded and aggregated polyQ protein engages, and ultimately overwhelms,
    the cellular protein-quality-control machinery — molecular chaperones, the
    ubiquitin-proteasome system, and macroautophagy. Several polyQ proteins
    (e.g., the deubiquitinase ataxin-3) normally participate in this machinery,
    so the expansion both burdens and corrupts clearance pathways, leading to
    accumulation of misfolded substrates and progressive neuronal compromise.
  role: amplifier
  cell_types:
  - preferred_term: neuron
    term:
      id: CL:0000540
      label: neuron
  biological_processes:
  - preferred_term: proteasome-mediated ubiquitin-dependent protein catabolic process
    term:
      id: GO:0043161
      label: proteasome-mediated ubiquitin-dependent protein catabolic process
    modifier: DECREASED
  - preferred_term: autophagy
    term:
      id: GO:0006914
      label: autophagy
    modifier: DYSREGULATED
  evidence:
  - reference: PMID:26123252
    reference_title: "Toward therapeutic targets for SCA3: Insight into the role of Machado-Joseph disease protein ataxin-3 in misfolded proteins clearance."
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      accumulating reports have demonstrated the functions of ataxin-3 protein
      in the chaperone system, ubiquitin-proteasome system, and
      aggregation-autophagy, all of which suggest a role of ataxin-3 in the
      clearance of misfolded proteins.
    explanation: >-
      In SCA3 the disease protein ataxin-3 is itself a proteostasis factor;
      polyQ expansion disrupts chaperone, proteasome, and autophagy-mediated
      clearance of misfolded proteins.
  - reference: PMID:30021169
    reference_title: "Dual Function of USP14 Deubiquitinase in Cellular Proteasomal Activity and Autophagic Flux."
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: >-
      the same conditions increased the formation of inclusion bodies from
      nonproteasomal substrates such as huntingtin with long polyglutamine
      repeats.
    explanation: >-
      Demonstrates that polyQ-expanded huntingtin depends on autophagic rather
      than proteasomal clearance, so perturbing the proteostasis balance
      increases polyQ inclusion-body formation.
  downstream:
  - target: Selective Neuronal Dysfunction and Loss
    description: >-
      Failure to clear misfolded polyQ protein accelerates accumulation and
      neuronal toxicity.

- name: Mitochondrial and Bioenergetic Dysfunction
  description: >-
    Mutant polyQ proteins impair mitochondrial dynamics, oxidative
    phosphorylation, and calcium handling, producing an early bioenergetic
    deficit and increased oxidative stress. Because neurons are highly
    energy-dependent, this bioenergetic failure is implicated as an early
    contributor to the selective regional neurodegeneration of polyQ disease.
  role: amplifier
  cell_types:
  - preferred_term: neuron
    term:
      id: CL:0000540
      label: neuron
  biological_processes:
  - preferred_term: ATP metabolic process
    term:
      id: GO:0046034
      label: ATP metabolic process
    modifier: DECREASED
  - preferred_term: response to oxidative stress
    term:
      id: GO:0006979
      label: response to oxidative stress
    modifier: INCREASED
  evidence:
  - reference: PMID:37269968
    reference_title: "Mitochondrial dysfunction and oxidative stress in Alzheimer's disease, and Parkinson's disease, Huntington's disease and Amyotrophic Lateral Sclerosis -An updated review."
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Research has identified mitochondrial failure as an early pathogenic
      mechanism contributing to HD's selective neurodegeneration.
    explanation: >-
      Supports mitochondrial/bioenergetic failure as an early contributor to the
      selective neurodegeneration seen in Huntington disease, the prototype
      polyQ disorder.
  downstream:
  - target: Selective Neuronal Dysfunction and Loss
    description: >-
      Bioenergetic failure and oxidative stress lower the threshold for neuronal
      dysfunction and death.

- name: Selective Neuronal Dysfunction and Loss
  description: >-
    The convergent effects of transcriptional dysregulation, proteostasis
    overload, and bioenergetic failure produce the defining feature of polyQ
    disease: region-specific, selective neuronal dysfunction and loss despite
    near-ubiquitous expression of the disease protein. Each disorder targets a
    characteristic neuronal population and brain region — striatal medium spiny
    neurons in Huntington disease, cerebellar and brainstem circuits in SCA3 and
    SCA17, and pallidal/dentate systems in DRPLA — yielding the corresponding
    motor, cognitive, and psychiatric phenotypes.
  role: effector
  cell_types:
  - preferred_term: neuron
    term:
