    modifier: DYSREGULATED
  evidence:
  - reference: PMID:21768377
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Mutations in the GPR56 gene cause a malformed cerebral cortex in both
      humans and mice that resembles cobblestone lissencephaly, which is
      characterized by overmigration of neurons beyond the pial basement
      membrane.
    explanation: >-
      Directly states the overmigration phenotype and links it to the
      GPR56-associated cortical malformation.
  - reference: PMID:20929962
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      The foetal case, which was terminated at 35 weeks of gestation in view of
      suspicion of Walker Warburg syndrome, showed a cobblestone-like
      lissencephaly with a succession of normal, polymicrogyric and
      'cobblestone-like' cortex with ectopic neuronal overmigration, agenesis of
      the cerebellar vermis and hypoplastic cerebellar hemispheres with
      additional neuronal overmigration in the pons and the cerebellar cortex.
    explanation: >-
      Human fetopathology supports ectopic neuronal overmigration and the
      overlap between polymicrogyric and cobblestone-like cortex.
  downstream:
  - target: Cobblestone-Like Cortical Malformation and PMG Overlap

- name: Cobblestone-Like Cortical Malformation and PMG Overlap
  description: >-
    The downstream tissue pattern is cobblestone-like malformation with possible
    overlap with bilateral frontoparietal polymicrogyria, white matter changes,
    cerebellar dysplasia, and other cortical organization abnormalities. The
    endpoint should be curated in disease entries according to their specific
    phenotype, but the shared module endpoint is pial-boundary overmigration.
  role: consequence
  locations:
  - preferred_term: cerebral cortex
    term:
      id: UBERON:0000956
      label: cerebral cortex
  evidence:
  - reference: PMID:20929962
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Taken as a whole, these observations collectively demonstrate that GPR56
      bilateral bifrontoparietal polymicrogyria combines all the features of a
      cobblestone-like lissencephaly and also suggest that GRP56-related defects
      produce a phenotypic continuum ranging from bilateral bifrontoparietal
      polymicrogyria to cobblestone-like lissencephaly.
    explanation: >-
      Supports the modeled clinical overlap between GPR56-related BFPP and the
      cobblestone-like malformation spectrum. The source uses the historical
      GPR56 name.
  - reference: PMID:28258187
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Homozygous or compound heterozygous mutations in COL3A1 are associated
      with cobblestone-like malformation in all three families reported to date.
    explanation: >-
      Extends the endpoint to the COL3A1 ligand side of the same GPR56-COL3A1
      pial-boundary axis.
  - reference: PMID:28258187
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      The presence of cobblestone-like malformation in patients with bi-allelic
      COL3A1 mutations emphasises the critical role of the type III
      collagen-GPR56 axis and the pial membrane in the regulation of brain
      development and cortical lamination.
    explanation: >-
      Ties the human endpoint back to the type III collagen-GPR56/pial membrane
      mechanism represented by this module.
