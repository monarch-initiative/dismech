pathophysiology:
- name: Alpha-Dystroglycan Glycosylation and ECM Ligand Binding Failure
  description: >-
    Pathogenic variants in DAG1 or in dystroglycan O-mannosylation pathway genes
    reduce functional alpha-dystroglycan glycosylation and impair binding to
    extracellular matrix ligands such as laminin. Representative upstream genes
    include POMT1, POMT2, POMGNT1, FKTN, FKRP, LARGE1, CRPPA (the current symbol
    for ISPD), POMK, B4GAT1, and B3GALNT2.
