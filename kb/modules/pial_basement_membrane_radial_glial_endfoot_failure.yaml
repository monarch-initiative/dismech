  - preferred_term: protein O-linked glycosylation via mannose
    term:
      id: GO:0035269
      label: protein O-linked glycosylation via mannose
    modifier: DECREASED
  - preferred_term: extracellular matrix organization
    term:
      id: GO:0030198
      label: extracellular matrix organization
    modifier: DYSREGULATED
  evidence:
  - reference: PMID:12140558
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Here we show, in both MEB and FCMD patients, that alpha-dystroglycan is
      expressed at the muscle membrane, but similar hypoglycosylation in the
      diseases directly abolishes binding activity of dystroglycan for the
      ligands laminin, neurexin and agrin.
    explanation: >-
      Human disease tissue evidence supports alpha-dystroglycan
      hypoglycosylation as a biochemical lesion that abolishes ECM-ligand
      binding.
  - reference: PMID:12369018
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Immunohistochemical analysis of muscle from patients with POMT1 mutations
      corroborated the O-mannosylation defect, as judged by the absence of
      glycosylation of alpha-dystroglycan.
    explanation: >-
      Links a dystroglycan O-mannosylation gene to loss of
      alpha-dystroglycan glycosylation in a human Walker-Warburg syndrome
      context.
  downstream:
  - target: Pial Basement Membrane Assembly Failure

- name: GPR56-COL3A1 Pial ECM Signaling Failure
  description: >-
    Pathogenic ADGRG1/GPR56 or COL3A1 variants impair a pial ECM receptor-ligand
    axis required for regional cortical development, pial basement membrane
    integrity, and inhibition of inappropriate neuronal migration beyond the
    pial surface.
