- name: Pial Basement Membrane Breach
  description: >-
    Failure of basement membrane assembly or GPR56-COL3A1 signaling produces
    discontinuities and breaches in the pial basal lamina/glia limitans. This is
    the central boundary defect that permits downstream overmigration.
  role: central_effector
  locations:
  - preferred_term: pia mater
    term:
      id: UBERON:0002361
      label: pia mater
  - preferred_term: cerebral cortex marginal layer
    term:
      id: UBERON:0014935
      label: cerebral cortex marginal layer
  biological_processes:
  - preferred_term: basement membrane organization
    term:
      id: GO:0071711
      label: basement membrane organization
    modifier: DYSREGULATED
  evidence:
  - reference: PMID:12140559
    supports: SUPPORT
    evidence_source: MODEL_ORGANISM
    snippet: >-
      Dystroglycan-null brain loses its high-affinity binding to the
      extracellular matrix protein laminin, and shows discontinuities in the
      pial surface basal lamina (glia limitans) that probably underlie the
      neuronal migration errors.
    explanation: >-
      Directly links dystroglycan loss to pial basal lamina discontinuities and
      downstream neuronal positioning errors.
  - reference: PMID:18509043
    supports: SUPPORT
    evidence_source: MODEL_ORGANISM
    snippet: >-
      By detailed time course analysis, we reveal that the leading causal events
      are likely the breaches in the pial BM.
    explanation: >-
      Places pial basement membrane breach early in the causal order.
  downstream:
  - target: Radial-Glial Basal Endfoot Detachment
  - target: Cajal-Retzius Cell Mislocalization

