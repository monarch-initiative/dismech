  - preferred_term: collagen fibril organization
    term:
      id: GO:0030199
      label: collagen fibril organization
    modifier: DYSREGULATED
  evidence:
  - reference: PMID:21768377
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: >-
      Here we identify collagen, type III, alpha-1 (gene symbol Col3a1) as the
      ligand of GPR56 through an in vitro biotinylation/proteomics approach.
    explanation: >-
      Identifies collagen III/COL3A1 as the ligand for GPR56, grounding this
      receptor-ligand branch.
  - reference: PMID:21768377
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: >-
      Functional studies suggest that the interaction of collagen III with its
      receptor GPR56 inhibits neural migration in vitro.
    explanation: >-
      Supports the functional interpretation that the GPR56-COL3A1 interaction
      constrains migration at the pial boundary.
  - reference: PMID:28258187
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Type III procollagen, the chains of which are encoded by COL3A1, is the
      ligand of the G protein-coupled receptor 56 (GPR56), also known as
      adhesion G protein-coupled receptor G1.
    explanation: >-
      Human-genetics paper independently anchors COL3A1 as the GPR56 ligand in
      the clinical malformation context.
  downstream:
