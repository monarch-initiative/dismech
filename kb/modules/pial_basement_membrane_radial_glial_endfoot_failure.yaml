name: Pial Basement Membrane and Radial-Glial Endfoot Failure Module
description: >-
  A conserved malformation-of-cortical-development mechanism module in which
  defects in pial extracellular matrix anchoring, alpha-dystroglycan
  glycosylation and ligand binding, or GPR56-COL3A1 signaling destabilize the
  pial basement membrane and the basal endfeet of radial glial cells. The
  resulting pial boundary breach mispositions Cajal-Retzius cells and permits
  neurons or glial cells to overmigrate past the cortical surface, producing
  cobblestone-like cortical malformation and overlapping polymicrogyria-like
  phenotypes. This module captures a boundary-failure skeleton distinct from
  intrinsic neuronal migration arrest.
category: Module
creation_date: "2026-06-10T00:00:00Z"
notes: >-
  This is a mechanism module, not a specific disease entry. Disorder entries
  reference individual nodes via conforms_to (for example,
  "pial_basement_membrane_radial_glial_endfoot_failure#Pial Basement Membrane
  Breach"). Use this module for cobblestone-like or bilateral frontoparietal
  polymicrogyria mechanisms when the shared pathograph is pial basement
  membrane/radial-glial basal endfoot failure followed by neuronal overmigration.
  Do not use it for primary microtubule-dependent neuronal migration arrest,
  apical neuroependyma/periventricular heterotopia, Reelin terminal
  translocation defects, or broad PI3K-AKT-mTOR cortical overgrowth unless a
  disease-specific branch independently shows this pial-boundary skeleton.
mechanistic_hypotheses:
- hypothesis_group_id: pial_boundary_overmigration_model
  hypothesis_label: Pial Boundary-Failure Overmigration Model
  status: CANONICAL
  description: >-
    Pathogenic disruption of the pial ECM interface, especially through
    alpha-dystroglycan O-mannosylation or GPR56-COL3A1 signaling, weakens
    basement membrane integrity and radial-glial basal endfoot anchoring. The
    causal readout is not primarily slow or failed neuronal locomotion; it is
    loss of the cortical pial boundary that allows overmigration and ectopic
    extracortical/cobblestone-like tissue.
  evidence:
  - reference: PMID:18509043
    supports: SUPPORT
    evidence_source: MODEL_ORGANISM
    snippet: >-
      There are four crucial events in the development of cobblestone cortex,
      namely defective pial basement membrane (BM), abnormal anchorage of radial
      glial endfeet, mislocalized Cajal-Retzius cells, and neuronal
      overmigration.
    explanation: >-
      Defines the pial-boundary skeleton used by this module: basement membrane
      defect, radial-glial endfoot anchoring failure, Cajal-Retzius
      mislocalization, and overmigration.
  - reference: PMID:21768377
    supports: SUPPORT
    evidence_source: MODEL_ORGANISM
    snippet: >-
      Further studies demonstrated that Col3a1 null mutant mice exhibit
      overmigration of neurons beyond the pial basement membrane and a
      cobblestone-like cortical malformation similar to the phenotype seen in
      Gpr56 null mutant mice.
    explanation: >-
      Shows that loss of the GPR56 ligand COL3A1 produces the same
      pial-boundary overmigration phenotype as Gpr56 loss.
discussions:
- discussion_id: gap_pial_boundary_human_model_translatability
  prompt: >-
    Which aspects of pial basement membrane and radial-glial basal endfoot
    failure in mouse or other models faithfully map to human cobblestone-like
    cortical malformations, PMG overlap, epilepsy risk, and regional gyral
    patterning?
  kind: KNOWLEDGE_GAP
  status: OPEN
  attaches_to:
  - pathophysiology#Pial Basement Membrane Breach
  - pathophysiology#Radial-Glial Basal Endfoot Detachment
  - pathophysiology#Neuronal Overmigration Across the Pial Boundary
  rationale: >-
    The review and primary papers support a coherent boundary-failure mechanism,
    but several translatability gaps remain: FKRP mouse knock-in versus
    knock-down severity differs from patients, human GPR56 regulation is shaped
    by gyrencephalic/regional enhancers, PMG mechanisms remain incompletely
    resolved, and seizures are common in human MCDs while often absent from
    animal models. This is a human/model mismatch knowledge gap rather than a
    generic missing-mechanism gap.
  evidence:
  - reference: PMID:19155270
    supports: SUPPORT
    evidence_source: MODEL_ORGANISM
    snippet: >-
      Homozygous Fkrp(Tyr307Asn) mice showed no discernible phenotype up to 6
      months of age, contrary to the severe clinical course observed in patients
      with the same mutation.
    explanation: >-
      Shows a concrete human/model mismatch for a dystroglycanopathy gene in
      this module's pial-boundary pathway.
  - reference: PMID:24531968
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      GPR56 splice forms are highly variable between mice and humans, and the
      regulatory element of gyrencephalic mammals directs restricted lateral
      cortical expression.
    explanation: >-
      Supports the concern that species- and region-specific GPR56 regulation
      can affect how well mouse models capture the human cortical patterning
      branch.
  - reference: PMID:23995685
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: >-
      Since disorders affecting human brain development have often proved
      difficult to recapitulate in animal models, we tested whether organoids
      could be used to model neurodevelopmental disorders.
    explanation: >-
      Provides precedent for using human organoids as a new approach when animal
      models incompletely recapitulate human brain-development disorders.
  - reference: PMID:28111201
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: >-
      Recent work has uncovered critical cellular and molecular differences
      between cortical development in humans and mice, further underscoring the
      need to develop human model systems.
    explanation: >-
      Provides the new approach-method, iPSC, and organoid rationale for
      explicitly representing this as a human/model translatability gap.
