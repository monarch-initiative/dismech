- name: Neuronal Overmigration Across the Pial Boundary
  description: >-
    With the pial boundary breached and radial-glial endfeet detached, neurons
    can migrate beyond the cortical surface rather than stopping within the
    cortical plate/marginal zone. This overmigration is the key mechanistic
    output that distinguishes this module from intrinsic neuronal migration
    arrest modules.
  role: effector
