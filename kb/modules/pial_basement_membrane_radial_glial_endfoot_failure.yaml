      defined laminin/collagen III-rich pial ECM interface or meningeal-like
      compartment, then measure basement membrane continuity, radial-glial basal
      endfoot anchoring, Cajal-Retzius positioning, neuronal overmigration,
      regional cortical patterning, and network excitability.
