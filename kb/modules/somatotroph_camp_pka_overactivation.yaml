name: Somatotroph cAMP/PKA Overactivation Module
description: >-
  A conserved pituitary tumor mechanism module in which genetically distinct
  upstream alterations converge on increased cAMP availability and cAMP/PKA
  signaling in somatotroph-lineage cells. AIP loss, GPR101 dosage gain, and
  GNAS activating mutations enter the module through different molecular entry
  points but share the downstream pattern of increased cAMP/PKA signaling,
  growth hormone secretion, and somatotroph proliferation.
category: Module
creation_date: "2026-06-03T00:00:00Z"
notes: >-
  This module captures the shared downstream cAMP/PKA segment for somatotroph
  pituitary adenoma mechanisms. Disorder entries should keep the gene-specific
  upstream lesion explicit, then declare conformance on the convergent cAMP/PKA
  nodes. AIP reaches the module through reduced inhibitory/catabolic restraint;
  GPR101 reaches it primarily through GPCR dosage gain; GNAS reaches it through
  constitutive Gs-alpha activity. Reported GPR101 point variants should conform
  to this module only when their causal status is supported in the disorder
  entry.
pathophysiology:
- name: Increased somatotroph cAMP availability
  description: >-
    Somatotroph-lineage cells have increased intracellular cAMP availability
    because cAMP synthesis is increased, inhibitory restraint is reduced, cAMP
    degradation is reduced, or a combination of these mechanisms applies.
  role: convergence_point
  cell_types:
  - preferred_term: somatotroph
    term:
      id: CL:0002312
      label: somatotroph
  biological_processes:
  - preferred_term: cAMP biosynthetic process
    modifier: INCREASED
    term:
      id: GO:0006171
      label: cAMP biosynthetic process
  - preferred_term: cAMP catabolic process
    modifier: DECREASED
    term:
      id: GO:0006198
      label: cAMP catabolic process
  evidence:
  - reference: PMID:2124121
    reference_title: "GTPase-inhibiting mutations activate the alpha-chain of Gs in human tumours."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      A subset of human growth hormone (GH)-secreting pituitary tumours,
      characterized by elevated GH secretion, cyclic AMP levels, and adenylyl
      cyclase activity, carries mutations in the gene that encodes the
      alpha-chain of Gs.
    explanation: >-
      This establishes elevated cAMP and adenylyl cyclase activity as a
      recurrent biochemical state in GH-secreting pituitary tumors with GNAS
      activation.
  - reference: PMID:25470569
    reference_title: "Gigantism and acromegaly due to Xq26 microduplications and GPR101 mutation."
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: >-
      Moreover, we showed that GPR101 can strongly activate the cAMP pathway,
      for which the mitogenic effects in pituitary somatotropes are well
      established.
    explanation: >-
      This supports cAMP activation as the shared downstream state for
      GPR101-driven somatotroph disease, especially when GPR101 dosage is
      increased in X-linked acrogigantism.
  downstream:
  - target: Increased cAMP/PKA signaling in somatotrophs
    description: >-
      Increased cAMP availability activates the cAMP/PKA signaling cassette in
      somatotroph-lineage cells.
    causal_link_type: DIRECT

- name: Increased cAMP/PKA signaling in somatotrophs
  description: >-
    Elevated cAMP activates protein kinase A and downstream transcriptional
    effectors in somatotroph-lineage cells, creating a shared proliferative and
    secretory signaling state across multiple genetic etiologies.
  role: central_effector
  cell_types:
  - preferred_term: somatotroph
    term:
      id: CL:0002312
      label: somatotroph
  biological_processes:
  - preferred_term: cAMP-mediated signaling
    modifier: INCREASED
    term:
      id: GO:0141156
      label: cAMP/PKA signal transduction
  evidence:
  - reference: PMID:25470569
    reference_title: "Gigantism and acromegaly due to Xq26 microduplications and GPR101 mutation."
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: >-
      As in the construct containing the nonmutant receptor, the two mutant
      constructs resulted in increased cAMP signaling in GH3 cells in an in
      vitro reporter assay, both at baseline and in the presence of 10 μM
      forskolin, a direct stimulator of adenylyl cyclase (Fig. 4F).
    explanation: >-
      This experimentally connects GPR101 activation to increased cAMP
      signaling in pituitary GH3 cells.
  - reference: PMID:2124121
    reference_title: "GTPase-inhibiting mutations activate the alpha-chain of Gs in human tumours."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      By substitution of a single amino acid (Arg-201 or Gln-227), these
      mutations inhibit the intrinsic GTPase activity of alpha s, thus
      stabilizing the protein in its active conformation.
    explanation: >-
      This supports constitutive Gs-alpha activation as a route into sustained
      cAMP/PKA signaling in GH-secreting pituitary tumors.
  downstream:
  - target: Increased growth hormone secretion
    description: >-
      cAMP/PKA signaling increases the secretory drive of somatotroph-lineage
      pituitary tumor cells.
    causal_link_type: DIRECT
  - target: Somatotroph proliferation and adenoma growth
    description: >-
      cAMP/PKA signaling contributes to proliferation of somatotroph-lineage
      cells and growth of GH-secreting pituitary adenomas.
    causal_link_type: DIRECT

- name: Increased growth hormone secretion
  description: >-
    Somatotroph-lineage cells release excess growth hormone downstream of
    cAMP/PKA overactivation, producing biochemical growth hormone excess and
    the clinical gigantism/acromegaly spectrum.
  role: consequence
  cell_types:
  - preferred_term: somatotroph
    term:
      id: CL:0002312
      label: somatotroph
  biological_processes:
  - preferred_term: growth hormone secretion
    modifier: INCREASED
    term:
      id: GO:0030252
      label: growth hormone secretion
  evidence:
  - reference: PMID:25470569
    reference_title: "Gigantism and acromegaly due to Xq26 microduplications and GPR101 mutation."
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: >-
      When the mutation was transfected into rat GH3 cells, it led to increased
      release of growth hormone and proliferation of growth hormone-producing
      cells.
    explanation: >-
      This directly supports increased GH secretion as a downstream effect of
      GPR101 activation in a pituitary cell model.
  - reference: PMID:2124121
    reference_title: "GTPase-inhibiting mutations activate the alpha-chain of Gs in human tumours."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      A subset of human growth hormone (GH)-secreting pituitary tumours,
      characterized by elevated GH secretion, cyclic AMP levels, and adenylyl
      cyclase activity, carries mutations in the gene that encodes the
      alpha-chain of Gs.
    explanation: >-
      This links elevated GH secretion with cAMP pathway activation in human
      pituitary tumors.

- name: Somatotroph proliferation and adenoma growth
  description: >-
    cAMP-responsive somatotroph-lineage cells expand, producing pituitary
    hyperplasia or GH-secreting adenoma growth depending on the initiating
    genetic context and timing.
  role: consequence
  cell_types:
  - preferred_term: somatotroph
    term:
      id: CL:0002312
      label: somatotroph
  biological_processes:
  - preferred_term: somatotroph proliferation
    modifier: INCREASED
    term:
      id: GO:0008283
      label: cell population proliferation
  evidence:
  - reference: PMID:25470569
    reference_title: "Gigantism and acromegaly due to Xq26 microduplications and GPR101 mutation."
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: >-
      When the mutation was transfected into rat GH3 cells, it led to increased
      release of growth hormone and proliferation of growth hormone-producing
      cells.
    explanation: >-
      This directly supports somatotroph-lineage proliferation downstream of
      GPR101 activation.
  - reference: PMID:2124121
    reference_title: "GTPase-inhibiting mutations activate the alpha-chain of Gs in human tumours."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      The discovery of mutant alpha s proteins in human tumours suggests that
      the alpha s gene can be converted into an oncogene, called gsp, in cells
      that proliferate in response to cyclic AMP.
    explanation: >-
      This supports cAMP-responsive proliferation as the tumorigenic context for
      activating GNAS mutations in pituitary tumors.
