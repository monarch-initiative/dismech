name: Drug Hypersensitivity (Severe Cutaneous Adverse Reaction) Module
description: >-
  A conserved treatment-toxicity module representing the T-cell-mediated immune
  pathway by which culprit drugs trigger severe cutaneous adverse reactions
  (SCARs), with Stevens-Johnson syndrome / toxic epidermal necrolysis (SJS/TEN) as
  the prototype. Unlike the cytotoxic (myelosuppression), metabolic (DILI), and
  transport-mediated (nephrotoxicity) toxicity modules, the insult here is
  immunological: a drug or its metabolite is presented in an HLA-restricted manner
  to drug-specific T cells, which expand and kill keratinocytes via cytotoxic
  mediators (granulysin, FasL, perforin/granzyme), producing epidermal necrolysis
  and detachment. The culprit drug varies (allopurinol, aromatic antiepileptics,
  sulfonamides, abacavir, NSAIDs) and HLA risk alleles gate susceptibility, but
  the downstream cascade converges. This is a "side effect as mechanism" module:
  a drug-toxicity entry can declare conformance rather than re-deriving the chain.
  Related SCAR presentations (DRESS, AGEP) share the T-cell-mediated logic but are
  not the evidence focus here.
category: Module
creation_date: "2026-06-24T00:00:00Z"
notes: >-
  This is a mechanism module, not a specific disease. Disorder entries reference
  individual nodes via conforms_to (e.g.,
  "drug_hypersensitivity_scar#Cytotoxic Mediator Release and Keratinocyte Death").
  Conforming nodes should substitute the drug-specific culprit and its HLA risk
  allele (e.g. HLA-B*58:01/allopurinol, HLA-B*15:02/carbamazepine,
  HLA-B*57:01/abacavir) while preserving the conserved
  HLA-restricted presentation → cytotoxic T-cell activation → keratinocyte death →
  epidermal necrolysis → mucocutaneous failure chain. The key conformance /
  central-effector target is
  "drug_hypersensitivity_scar#Cytotoxic Mediator Release and Keratinocyte Death".
pathophysiology:
- name: HLA-Restricted Drug Presentation to Drug-Specific T Cells
  description: >-
    The conserved initiating lesion is immunological recognition of the drug: the
    drug or its metabolite is presented in an HLA class I-restricted manner to
    drug-specific T cells (via hapten, p-i, or altered-peptide mechanisms). Risk
    arises from the combination of drug structure/metabolism, HLA alleles, and the
    T-cell receptor repertoire — a type IV (delayed) hypersensitivity reaction.
  role: trigger
  cell_types:
  - preferred_term: CD8-positive cytotoxic T cell
    term:
      id: CL:0000625
      label: CD8-positive, alpha-beta T cell
  - preferred_term: keratinocyte
    term:
      id: CL:0000312
      label: keratinocyte
  biological_processes:
  - preferred_term: antigen processing and presentation
    term:
      id: GO:0019882
      label: antigen processing and presentation
    modifier: INCREASED
  evidence:
  - reference: PMID:28133001
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      acute TEN is considered a T-cell mediated, type IV hypersensitivity
      disorder. It mostly results from a cumulative effect of risks from the drug
      structure, drug metabolism, HLA alleles and T cell clonotypes.
    explanation: >-
      Frames SCAR as a type IV hypersensitivity driven by the combination of drug
      structure/metabolism, HLA alleles, and T-cell clonotypes — the
      insult-agnostic trigger of this module. Evidence source is OTHER because
      this is a review article.
  - reference: PMID:35437717
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      immune synapse composed of cytotoxic T cells with drug-specific human
      leukocyte antigen (HLA) class I restriction and T cell receptors (TCR)
      repertoire is the key pathogenic for SJS/TEN
    explanation: >-
      Identifies the HLA class I-restricted, drug-specific cytotoxic T-cell immune
      synapse as the key pathogenic event, matching this trigger node. Evidence
      source is OTHER because this is a review article.
  downstream:
  - target: Drug-Specific Cytotoxic T-Cell and NK-Cell Activation
    description: >-
      HLA-restricted presentation activates and expands drug-specific cytotoxic
      lymphocytes.
- name: Drug-Specific Cytotoxic T-Cell and NK-Cell Activation
  description: >-
    Drug-specific CD8 T cells and natural killer cells are activated and expand,
    becoming the effector population that targets keratinocytes — the amplifying
    step linking antigen recognition to tissue injury.
  role: amplifier
  cell_types:
  - preferred_term: CD8-positive cytotoxic T cell
    term:
      id: CL:0000625
      label: CD8-positive, alpha-beta T cell
  - preferred_term: natural killer cell
    term:
      id: CL:0000623
      label: natural killer cell
  biological_processes:
  - preferred_term: T cell activation
    term:
      id: GO:0042110
      label: T cell activation
    modifier: INCREASED
  evidence:
  - reference: PMID:33341195
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Drug-specific CD8 T-cells and natural killer cells are thought to be the
      major inducers of keratinocyte apoptosis via release of soluble cytotoxic
      mediators, including Fas ligand, perforin/granzyme, tumor necrosis factor,
      and granulysin.
    explanation: >-
      Identifies drug-specific CD8 T cells and NK cells as the effector population
      that drives keratinocyte death, the amplifier captured here. Evidence source
      is OTHER because this is a review article.
  downstream:
  - target: Cytotoxic Mediator Release and Keratinocyte Death
    description: >-
      Activated cytotoxic lymphocytes release mediators that kill keratinocytes.
- name: Cytotoxic Mediator Release and Keratinocyte Death
  description: >-
    Activated cytotoxic lymphocytes release soluble mediators — granulysin, Fas
    ligand, perforin/granzyme — that drive keratinocyte apoptosis and necroptosis.
    This is the central effector lesion and the key conformance target; conforming
    disorder nodes substitute the drug-specific culprit but converge here.
  role: central_effector
  cell_types:
  - preferred_term: keratinocyte
    term:
      id: CL:0000312
      label: keratinocyte
  biological_processes:
  - preferred_term: T cell mediated cytotoxicity
    term:
      id: GO:0001913
      label: T cell mediated cytotoxicity
    modifier: INCREASED
  - preferred_term: apoptotic process
    term:
      id: GO:0006915
      label: apoptotic process
    modifier: INCREASED
  evidence:
  - reference: PMID:25355273
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      With regard to keratinocyte death, several cell death mediators, such as
      FasL, granulysin and annexin A1, have been proposed as playing a role in
      SJS/TEN pathogenesis.
    explanation: >-
      Names the cytotoxic mediators (FasL, granulysin) that effect keratinocyte
      death, the central lesion of this module. Evidence source is OTHER because
      this is a review article.
  - reference: PMID:35437717
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Various cytotoxic proteins and cytokines such as soluble granulysin,
      perforin, granzyme B, interleukin-15, Fas ligand
    explanation: >-
      Enumerates the cytotoxic mediators released during SCAR that kill
      keratinocytes. Evidence source is OTHER because this is a review article.
  - reference: PMID:28133001
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Apoptosis or necroptosis causes keratinocytes to lose their shape and
      adhesion, and necrosis predominates within a few days.
    explanation: >-
      Specifies apoptosis and necroptosis as the keratinocyte death modalities,
      matching the effector node. Evidence source is OTHER because this is a
      review article.
  downstream:
  - target: Epidermal Necrolysis and Detachment
    description: >-
      Confluent keratinocyte death produces full-thickness epidermal necrosis.
- name: Epidermal Necrolysis and Detachment
  description: >-
    Confluent keratinocyte death produces full-thickness epidermal necrosis that
    separates the epidermis from the dermis, the histopathologic hallmark of
    SJS/TEN that manifests as widespread skin and mucosal detachment.
  role: effector
  cell_types:
  - preferred_term: keratinocyte
    term:
      id: CL:0000312
      label: keratinocyte
  biological_processes:
  - preferred_term: cell death
    term:
      id: GO:0008219
      label: cell death
    modifier: INCREASED
  evidence:
  - reference: PMID:28133001
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Total epidermal necrosis separates the epidermis from the dermis.
    explanation: >-
      Describes full-thickness epidermal necrosis with dermo-epidermal separation,
      the effector lesion of this module. Evidence source is OTHER because this is
      a review article.
  - reference: PMID:35437717
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      severe mucocutaneous bullous disorders characterized by widespread skin and
      mucosal necrosis and detachment, which are most commonly triggered by
      medications
    explanation: >-
      Characterizes SJS/TEN as drug-triggered mucocutaneous necrosis and
      detachment, the clinical expression of this node. Evidence source is OTHER
      because this is a review article.
  downstream:
  - target: Mucocutaneous Failure and Systemic Complications
    description: >-
      Loss of the epidermal barrier produces life-threatening systemic
      consequences.
- name: Mucocutaneous Failure and Systemic Complications
  description: >-
    Extensive epidermal and mucosal detachment causes failure of the skin barrier,
    with fluid loss, infection risk, and multi-organ involvement, producing the
    high mortality of SJS/TEN — the defining consequence of the module.
  role: consequence
  cell_types:
  - preferred_term: keratinocyte
    term:
      id: CL:0000312
      label: keratinocyte
  biological_processes:
  - preferred_term: cell death
    term:
      id: GO:0008219
      label: cell death
    modifier: INCREASED
  evidence:
  - reference: PMID:33341195
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      immunologically mediated cutaneous adverse reaction characterized by mucous
      membrane and epidermal detachment, with a mortality ranging from 15% to 25%
    explanation: >-
      Documents the mucocutaneous detachment and high mortality that define the
      consequence of this module. Evidence source is OTHER because this is a
      review article.
  - reference: PMID:25355273
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      life-threatening cutaneous adverse drug reactions that induce widespread
      epidermal necrosis
    explanation: >-
      Frames SJS/TEN as life-threatening drug reactions producing widespread
      epidermal necrosis. Evidence source is OTHER because this is a review
      article.
