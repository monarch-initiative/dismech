name: Tumor-Promoting Inflammation Module
description: >-
  A conserved mechanism module for the enabling characteristic of cancer
  (Hanahan & Weinberg): tumor-promoting inflammation. Chronic inflammation
  fosters multiple hallmark capabilities by supplying the tumor
  microenvironment with bioactive molecules. The conserved causal chain runs
  from an inflammatory stimulus (chronic infection, autoimmune or
  irritant-driven chronic inflammation, obesity-associated inflammation, or
  inflammation elicited by the incipient neoplasm itself) through
  recruitment and activation of innate and adaptive immune cells -
  tumor-associated macrophages, neutrophils, mast cells, and lymphocytes -
  that establish a pro-tumorigenic inflammatory microenvironment.
  These cells secrete growth factors, pro-angiogenic factors (VEGF),
  matrix-remodeling proteases (MMPs), reactive oxygen species that are
  themselves mutagenic, and cytokines (TNF, IL-6) that activate
  pro-survival/proliferative NF-kB and STAT3 signaling in tumor cells. The
  net effect is promotion of proliferation, survival, angiogenesis,
  invasion, and further genomic instability. Individual disorder entries
  declare conformance via conforms_to, substituting the tumor-type-specific
  inflammatory driver (e.g., Helicobacter pylori gastritis preceding gastric
  cancer, inflammatory bowel disease preceding colitis-associated colorectal
  cancer, viral hepatitis preceding hepatocellular carcinoma). This module
  complements immune_checkpoint_blockade, which models the adaptive
  immune-evasion arm.
category: Module
creation_date: "2026-06-27T00:00:00Z"
notes: >-
  This is a mechanism module, not a specific disease. Disorder entries
  reference individual nodes via conforms_to (e.g.,
  "tumor_promoting_inflammation#Pro-Tumorigenic Inflammatory
  Microenvironment"). The module defines the expected pathophysiology
  structure; conforming nodes in disorder files should include the
  corresponding cell types, biological processes, and causal edges,
  specialized to their tumor context. Key tumor-specific substitutions:
  Helicobacter pylori gastritis -> gastric cancer; inflammatory bowel
  disease -> colitis-associated colorectal cancer; chronic viral hepatitis
  -> hepatocellular carcinoma. The distinct adaptive immune-evasion /
  checkpoint axis is modeled in immune_checkpoint_blockade. Key conformance
  target: "tumor_promoting_inflammation#Pro-Tumorigenic Inflammatory
  Microenvironment".
pathophysiology:
- name: Chronic Inflammatory Stimulus
  description: >-
    A persistent inflammatory stimulus initiates the cascade. Sources
    include chronic infection (e.g., Helicobacter pylori, hepatitis B/C
    virus, schistosomiasis), chronic non-infectious inflammation
    (inflammatory bowel disease, chronic pancreatitis, reflux esophagitis),
    inhaled irritants (tobacco smoke, asbestos), obesity-associated
    metabolic inflammation, and inflammation triggered by the developing
    neoplasm itself. Each sustains an inflammatory response at the future
    tumor site.
  role: trigger
  biological_processes:
  - preferred_term: Inflammatory Response
    term:
      id: GO:0006954
      label: inflammatory response
    modifier: INCREASED
  evidence:
  - reference: PMID:20303878
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      it has become evident that an inflammatory microenvironment is an
      essential component of all tumors
    explanation: >-
      Establishes the inflammatory microenvironment as an essential
      component of tumors, the basis for the inflammatory stimulus trigger of
      this module. Evidence source is OTHER because this is a review article.
  downstream:
  - target: Pro-Tumorigenic Inflammatory Microenvironment

- name: Pro-Tumorigenic Inflammatory Microenvironment
  description: >-
    The inflammatory stimulus recruits and activates innate and adaptive
    immune cells - tumor-associated macrophages (often M2-polarized),
    neutrophils, mast cells, and lymphocytes - that infiltrate the tissue
    and establish a pro-tumorigenic inflammatory microenvironment. These
    cells secrete growth and survival factors, pro-angiogenic factors,
    matrix-remodeling proteases, and cytokines, and engage in dynamic
    crosstalk with (pre)neoplastic cells. This is the conserved central node
    of the module.
  role: central_effector
  cell_types:
  - preferred_term: Tumor-Associated Macrophage
    term:
      id: CL:0000235
      label: macrophage
  - preferred_term: Neutrophil
    term:
      id: CL:0000775
      label: neutrophil
  biological_processes:
  - preferred_term: Positive Regulation of Cytokine Production
    term:
      id: GO:0001819
      label: positive regulation of cytokine production
    modifier: INCREASED
  evidence:
  - reference: PMID:20303878
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Immune cells that infiltrate tumors engage in an extensive and dynamic
      crosstalk with cancer cells, and some of the molecular events that
      mediate this dialog have been revealed.
    explanation: >-
      Describes the infiltrating-immune-cell / cancer-cell crosstalk that
      defines the pro-tumorigenic inflammatory microenvironment, the central
      effector of this module. Evidence source is OTHER because this is a
      review article.
  downstream:
  - target: Hallmark-Promoting Inflammatory Output

- name: Hallmark-Promoting Inflammatory Output
  description: >-
    The inflammatory microenvironment supplies the tumor with bioactive
    molecules that promote multiple hallmark capabilities: growth factors
    (proliferation), survival factors and NF-kB/STAT3-activating cytokines
    such as TNF and IL-6 (resisting cell death), VEGF (angiogenesis), and
    matrix-degrading proteases (invasion and metastasis). Reactive oxygen
    and nitrogen species released by inflammatory cells are mutagenic,
    feeding back to increase genomic instability. The net output is
    acceleration of tumor initiation, promotion, and progression.
  role: consequence
  biological_processes:
  - preferred_term: Cytokine-Mediated Signaling Pathway
    term:
      id: GO:0019221
      label: cytokine-mediated signaling pathway
    modifier: INCREASED
  evidence:
  - reference: PMID:20303878
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Inflammatory responses play decisive roles at different stages of
      tumor development, including initiation, promotion, malignant
      conversion, invasion, and metastasis.
    explanation: >-
      Directly states that inflammation drives multiple stages of tumor
      development, the hallmark-promoting output modeled in this node.
      Evidence source is OTHER because this is a review article.
  - reference: PMID:21376230
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Underlying these hallmarks are genome instability, which generates the
      genetic diversity that expedites their acquisition, and inflammation,
      which fosters multiple hallmark functions.
    explanation: >-
      Hanahan & Weinberg define inflammation as an enabling characteristic
      that fosters multiple hallmark functions, modeled in this output node.
      Evidence source is OTHER because this is a review article.
