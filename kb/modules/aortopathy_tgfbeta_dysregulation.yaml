name: Aortopathy TGF-beta Dysregulation Module
description: >-
  A conserved pathological module representing the shared core of the heritable
  thoracic aortic aneurysm and dissection (TAAD) syndromes. A primary genetic
  defect in an aortic wall component — extracellular matrix microfibrils/elastic
  fibers (FBN1, COL3A1, and other matrix genes), the vascular smooth muscle cell
  contractile apparatus (ACTA2, MYH11, MYLK, PRKG1), or the TGF-beta signaling
  pathway itself (TGFBR1/2, SMAD3, TGFB2/3, SKI) — converges on dysregulated,
  paradoxically increased TGF-beta signaling in the aortic media. Excess
  TGF-beta signaling together with the underlying structural defect drives
  medial degeneration (smooth muscle cell depletion and elastic fiber
  fragmentation with disordered matrix), progressively weakening the aortic wall
  so that it dilates and ultimately dissects or ruptures. This conserved core is
  shared across the syndromic aortopathies (Marfan, Loeys-Dietz, vascular
  Ehlers-Danlos, Shprintzen-Goldberg, arterial tortuosity) and nonsyndromic
  familial TAAD. Individual disorder entries declare conformance via conforms_to
  on their pathophysiology nodes, substituting the disorder-specific causal
  gene/lesion while preserving the conserved defect -> TGF-beta dysregulation ->
  medial degeneration -> dilation -> dissection chain.
category: Module
creation_date: "2026-05-30T00:00:00Z"
notes: >-
  This is a mechanism module, not a specific disease. Disorder entries reference
  individual nodes via conforms_to (e.g.,
  "aortopathy_tgfbeta_dysregulation#TGF-beta Signaling Dysregulation"). The
  module defines the expected pathophysiology structure; conforming nodes in
  disorder files should substitute the disorder-specific primary lesion while
  preserving the conserved cascade. Key disorder-specific substitutions: Marfan
  and Shprintzen-Goldberg use FBN1 microfibril deficiency (with SKI in
  Shprintzen-Goldberg); Loeys-Dietz uses TGF-beta pathway gene mutations
  (TGFBR1/2, SMAD3, TGFB2/3); vascular Ehlers-Danlos uses COL3A1; arterial
  tortuosity syndrome uses SLC2A10 (GLUT10); and nonsyndromic familial TAAD uses
  smooth muscle contractile-apparatus genes (ACTA2, MYH11, MYLK, PRKG1). The
  shared hub and key conformance target is "TGF-beta Signaling Dysregulation".
  Evidence here is drawn from cross-TAAD reviews documenting the conserved
  cascade rather than any single disease; evidence_source is OTHER because these
  are reviews synthesizing multiple study types.
pathophysiology:
- name: Aortic Wall ECM or Contractile Apparatus Defect
  description: >-
    A monogenic loss-of-function or dominant-negative defect compromises a
    structural or regulatory component of the aortic wall: the fibrillin-1
    microfibrils and elastic fibers of the extracellular matrix (FBN1, COL3A1,
    and other matrix genes), or the contractile apparatus of vascular smooth
    muscle cells (ACTA2, MYH11, MYLK, PRKG1). The identity of the affected gene
    varies by disorder, but loss of normal aortic wall architecture is the
    conserved trigger.
  role: trigger
  cell_types:
  - preferred_term: vascular associated smooth muscle cell
    term:
      id: CL:0000359
      label: vascular associated smooth muscle cell
  biological_processes:
  - preferred_term: elastic fiber assembly
    term:
      id: GO:0048251
      label: elastic fiber assembly
    modifier: DECREASED
  evidence:
  - reference: PMID:24925629
    supports: SUPPORT
    evidence_source: OTHER
    snippet: "Marfan syndrome (MFS) is an inherited autosomal dominant multisystem disease caused by mutations in the FBN1 gene encoding fibrillin-1, an extracellular matrix glycoprotein widely distributed in mesenchymal-derived tissues that provide a scaffold for elastin deposition."
    explanation: >-
      Documents the prototypical structural trigger (FBN1 microfibril/elastin
      deficiency) of the heritable aortopathies. Evidence source is OTHER
      because this is a review of Marfan aortopathy.
  - reference: PMID:24016541
    supports: SUPPORT
    evidence_source: OTHER
    snippet: "Mutations in multiple genes affecting proteins in the extracellular matrix, microfibrillar structure, the endothelium and cell signalling pathways have been associated with thoracic aortic disease."
    explanation: >-
      Confirms that the conserved trigger spans multiple gene classes affecting
      extracellular matrix and microfibrillar structure. Evidence source is
      OTHER because this is a review of heritable aortopathies.
  - reference: PMID:27375798
    supports: SUPPORT
    evidence_source: OTHER
    snippet: "genetic mutation could be identified in some proteins such as smooth muscle cell α-actin (ACTA2), myosin heavy chain 11 (MYH11) or SMAD3"
    explanation: >-
      Documents the smooth muscle contractile-apparatus arm of the trigger
      (ACTA2, MYH11), complementing the ECM arm. Evidence source is OTHER
      because this is a review of aortic aneurysm etiopathogenesis.
  downstream:
  - target: TGF-beta Signaling Dysregulation
    description: >-
      Loss of microfibrils liberates sequestered TGF-beta and pathway-gene
      mutations perturb signaling directly, converging on dysregulated TGF-beta
      activity.

- name: TGF-beta Signaling Dysregulation
  description: >-
    The diverse primary lesions converge on dysregulated, paradoxically
    increased TGF-beta signaling in the aortic wall. TGF-beta signaling is
    central to vascular smooth muscle cell differentiation, matrix production,
    and vascular homeostasis, so its dysregulation is the shared hub event of
    the heritable aortopathies and the key conformance target for disorder
    entries. Notably, even loss-of-function mutations in TGF-beta receptors
    produce increased aortic TGF-beta activity (the "TGF-beta paradox").
  role: central_effector
  cell_types:
  - preferred_term: vascular associated smooth muscle cell
    term:
      id: CL:0000359
      label: vascular associated smooth muscle cell
  biological_processes:
  - preferred_term: transforming growth factor beta receptor signaling pathway
    term:
      id: GO:0007179
      label: transforming growth factor beta receptor signaling pathway
    modifier: INCREASED
  evidence:
  - reference: PMID:24016541
    supports: SUPPORT
    evidence_source: OTHER
    snippet: "The TGFß signalling pathway appears to play a key role in mediating abnormal aortic growth and aneurysm formation."
    explanation: >-
      Establishes the TGF-beta pathway as the key mediator of abnormal aortic
      growth and aneurysm formation, the central hub of this module. Evidence
      source is OTHER because this is a review.
  - reference: PMID:30037098
    supports: SUPPORT
    evidence_source: OTHER
    snippet: "not only structural weakness of connective tissue but also increased TGF-β signaling contributes to the complicated pathogenesis of aortic aneurysm formation"
    explanation: >-
      Confirms increased TGF-beta signaling (beyond structural weakness) as a
      driver of aortic aneurysm pathogenesis. Evidence source is OTHER because
      this is a review.
  - reference: PMID:30037098
    supports: SUPPORT
    evidence_source: OTHER
    snippet: "Heterozygous loss-of-function mutations in TGF-β receptors 1 and 2 (TGFBR1 and TGFBR2) cause LDS, but TGF-β signaling is activated in the aorta (referred to as the TGF-β paradox) by mechanisms yet to be elucidated."
    explanation: >-
      Documents the conserved convergence on increased aortic TGF-beta activity
      even with loss-of-function receptor mutations (the TGF-beta paradox).
      Evidence source is OTHER because this is a review.
  downstream:
  - target: Aortic Medial Degeneration and Wall Weakening
    description: >-
      Sustained TGF-beta dysregulation and the structural defect drive the
      degenerative breakdown of the aortic media.

- name: Aortic Medial Degeneration and Wall Weakening
  description: >-
    The structural defect and dysregulated TGF-beta signaling drive the
    histologic hallmark of the aortopathies, medial degeneration: disarray and
    fragmentation of elastic fibers, depletion of smooth muscle cells, and
    accumulation of disordered ground-substance matrix. Aberrant TGF-beta
    signaling, as a consequence of the altered matrix, activates Smad-dependent
    profibrotic signaling and increased matrix metalloproteinase synthesis,
    degrading the layered architecture of the media and weakening the wall. This
    process is conserved across the heritable aortopathies regardless of the
    initiating gene.
  role: effector
  cell_types:
  - preferred_term: vascular associated smooth muscle cell
    term:
      id: CL:0000359
      label: vascular associated smooth muscle cell
  biological_processes:
  - preferred_term: extracellular matrix organization
    term:
      id: GO:0030198
      label: extracellular matrix organization
    modifier: DYSREGULATED
  evidence:
  - reference: PMID:24925629
    supports: SUPPORT
    evidence_source: OTHER
    snippet: "Histological aspects of MFS aortopathy include a medial degeneration from disarray and fragmentation of elastic fibers and accumulation of basophilic ground substance areas depleted of smooth muscle cells (SMCs)."
    explanation: >-
      Directly defines the conserved medial-degeneration effector — elastic
      fiber fragmentation and smooth muscle cell depletion — as the histologic
      hallmark of the aortopathy. Evidence source is OTHER because this is a
      review.
  - reference: PMID:24925629
    supports: SUPPORT
    evidence_source: OTHER
    snippet: "The aberrant signaling of transforming growth factor-β (TGF-β) as the consequence of the altered structure of fibrillin-1 induces activation and the overexpression of Smad-dependent profibrotic signaling pathway and ERK1/2-mediated increased synthesis of matrix metalloproteinases."
    explanation: >-
      Documents the conserved molecular link from altered matrix to TGF-beta
      driven profibrotic signaling and matrix metalloproteinase synthesis that
      degrades the media. Evidence source is OTHER because this is a review.
  downstream:
  - target: Progressive Aortic Dilation and Aneurysm
    description: >-
      The weakened media cannot withstand hemodynamic stress, so the aorta
      progressively dilates and forms an aneurysm.

- name: Progressive Aortic Dilation and Aneurysm
  description: >-
    The structurally weakened aortic wall cannot withstand pulsatile
    hemodynamic stress and progressively dilates, characteristically at the
    aortic root and ascending aorta, forming an aneurysm. The natural history of
    this dilation is progressive expansion, and aortic root aneurysms are the
    common problem across the syndromic aortopathies.
  role: effector
  evidence:
  - reference: PMID:30037098
    supports: SUPPORT
    evidence_source: OTHER
    snippet: "Aortic root aneurysms are common problems that can result in aortic dissection or rupture, which is the leading cause of sudden death in the natural history of"
    explanation: >-
      Establishes aortic root aneurysm as the common, conserved manifestation
      that progresses toward dissection or rupture. Evidence source is OTHER
      because this is a review.
  - reference: PMID:28607545
    supports: SUPPORT
    evidence_source: OTHER
    snippet: "the natural history of aneurysmal dilation is progressive expansion, occasionally culminating in catastrophic consequences such as dissection or rupture"
    explanation: >-
      Documents the conserved progressive-dilation natural history that defines
      this effector node. Evidence source is OTHER because this is a review.
  downstream:
  - target: Aortic Dissection and Rupture
    description: >-
      Continued wall weakening and dilation culminate in dissection or rupture.

- name: Aortic Dissection and Rupture
  description: >-
    The conserved terminal consequence of the heritable aortopathies. The
    degenerated, dilated aortic wall is prone to dissection and rupture, the
    main life-threatening manifestation and leading cause of premature death.
    These complications give the aortopathies their clinical urgency and
    motivate surveillance and prophylactic repair across all conforming
    disorders.
  role: consequence
  evidence:
  - reference: PMID:24925629
    supports: SUPPORT
    evidence_source: OTHER
    snippet: "ascending aortic aneurysm with ensuing dissection and rupture is the main life-threatening cardiovascular manifestation of MFS."
    explanation: >-
      Establishes dissection and rupture as the conserved, life-threatening
      terminal consequence of the aortopathy. Evidence source is OTHER because
      this is a review.
  - reference: PMID:28607545
    supports: SUPPORT
    evidence_source: OTHER
    snippet: "thoracic aortic aneurysm dissection (TAAD) is an important cause of premature death in young adults"
    explanation: >-
      Confirms aortic dissection as an important cause of premature death,
      the high-mortality endpoint shared across the heritable aortopathies.
      Evidence source is OTHER because this is a review.
