name: Hypothyroidism Thyroid Hormone Deficiency Module
description: >-
  A conserved endocrine module representing the final common pathway of
  hypothyroidism: a primary lesion in thyroid hormone production reduces
  circulating thyroid hormone, lifts the negative feedback restraint on TSH,
  diminishes thyroid hormone action at peripheral target tissues, and lowers
  basal metabolic rate, producing a generalized hypometabolic state. Autoimmune
  (Hashimoto), iodine-deficiency, dyshormonogenetic/genetic, iatrogenic, and
  drug-induced hypothyroidism differ in the upstream cause but converge on
  thyroid hormone deficiency. Individual disorder entries declare conformance via
  conforms_to on their pathophysiology nodes, substituting the disorder-specific
  lesion (autoimmune follicular destruction, iodine deficiency, TPO/TG/NIS
  dyshormonogenesis, or central TSH/TRH deficiency) while preserving the conserved
  hormone-deficiency-to-hypometabolism chain.
category: Module
creation_date: "2026-06-06T00:00:00Z"
notes: >-
  This is a mechanism module, not a specific disease. Disorder entries reference
  individual nodes via conforms_to (e.g.,
  "hypothyroidism_thyroid_hormone_deficiency#Thyroid Hormone Insufficiency").
  Conforming nodes should substitute the disorder-specific cause of reduced
  hormone synthesis: autoimmune thyroiditis, iodine deficiency, dyshormonogenesis
  (TPO/TG/NIS/DUOX2 defects), or central hypothyroidism (in which low TSH rather
  than the compensatory rise distinguishes the feedback arm).
pathophysiology:
- name: Impaired Thyroid Hormone Synthesis
  description: >-
    The conserved initiating lesion is impaired synthesis of thyroid hormone by
    thyroid follicular cells, whether from autoimmune destruction of the gland,
    inadequate iodine substrate, or genetic defects in the hormone biosynthetic
    machinery. Iatrogenic causes (thyroidectomy, radioiodine, antithyroid drugs)
    act at the same point.
  role: trigger
  cell_types:
  - preferred_term: Thyroid Follicular Cell
    term:
      id: CL:0002258
      label: thyroid follicular cell
  biological_processes:
  - preferred_term: Thyroid Hormone Generation
    term:
      id: GO:0006590
      label: thyroid hormone generation
    modifier: DECREASED
  evidence:
  - reference: PMID:27936530
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Primary hypothyroidism typically is a result of autoimmune thyroiditis or
      iodine deficiency and is assessed by measurement of the thyroid-stimulating
      hormone (TSH) level.
    explanation: >-
      Identifies autoimmune thyroiditis and iodine deficiency as the principal
      causes of impaired hormone synthesis, the conserved initiating lesion.
      Evidence source is OTHER because this is a review article.
  - reference: PMID:37641994
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      The leading causes of hypothyroidism in older adults are iatrogenic,
      Hashimoto's thyroiditis, and medications.
    explanation: >-
      Confirms the spectrum of upstream causes (iatrogenic, autoimmune,
      drug-induced) that converge on reduced hormone synthesis. Evidence source is
      OTHER because this is a narrative review.
  downstream:
  - target: Thyroid Hormone Insufficiency
- name: Thyroid Hormone Insufficiency
  description: >-
    Reduced synthesis lowers circulating T4 and T3. In primary hypothyroidism the
    loss of negative feedback drives a compensatory rise in pituitary
    thyroid-stimulating hormone (TSH), the biochemical hallmark used in diagnosis.
  role: amplifier
  biological_processes:
  - preferred_term: Thyroid Hormone Metabolic Process
    term:
      id: GO:0042403
      label: thyroid hormone metabolic process
    modifier: DECREASED
  evidence:
  - reference: PMID:27936530
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      This level usually is elevated in patients with hypothyroidism and low in
      patients with hyperthyroidism.
    explanation: >-
      Describes the compensatory TSH elevation that signals thyroid hormone
      insufficiency in primary hypothyroidism. Evidence source is OTHER because
      this is a review article.
  downstream:
  - target: Reduced Thyroid Hormone Action at Peripheral Sites
- name: Reduced Thyroid Hormone Action at Peripheral Sites
  description: >-
    Insufficient circulating hormone reduces thyroid hormone signaling and action
    in peripheral target tissues. Because thyroid hormone metabolism and activity
    decline together, target tissues throughout the body receive diminished
    thyroid hormone stimulus.
  role: central_effector
  biological_processes:
  - preferred_term: Response to Thyroid Hormone
    term:
      id: GO:0097066
      label: response to thyroid hormone
    modifier: DECREASED
  evidence:
  - reference: PMID:37641994
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Thyroid function declines over time due to physiological changes in the
      thyroid stimulating hormone signaling, iodine absorption and metabolism,
      thyroid hormone metabolism, and activity at peripheral sites.
    explanation: >-
      Identifies thyroid hormone activity at peripheral sites as a component of
      thyroid function whose decline mediates the systemic effects of hormone
      deficiency. Evidence source is OTHER because this is a narrative review.
  downstream:
  - target: Decreased Metabolic Rate
- name: Decreased Metabolic Rate
  description: >-
    Thyroid hormone is a principal regulator of basal metabolic rate. Reduced
    peripheral hormone action lowers cellular and whole-body metabolism, the core
    physiological deficit of hypothyroidism.
  role: effector
  biological_processes:
  - preferred_term: Regulation of Metabolic Process
    term:
      id: GO:0019222
      label: regulation of metabolic process
    modifier: DECREASED
  evidence:
  - reference: PMID:27936530
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Hypothyroidism is a state of thyroid hormone insufficiency that results in
      decreased metabolism and secondary effects including fatigue and weight
      gain.
    explanation: >-
      Directly states that thyroid hormone insufficiency results in decreased
      metabolism, the effector step linking hormone deficiency to hypometabolism.
      Evidence source is OTHER because this is a review article.
  downstream:
  - target: Systemic Hypometabolic State
- name: Systemic Hypometabolic State
  description: >-
    The clinical endpoint is a generalized hypometabolic state affecting nearly
    every organ system — manifesting as fatigue, cold intolerance, weight gain,
    bradycardia, and, when severe, myxedema. This multisystem hypofunction defines
    clinical hypothyroidism.
  role: consequence
  evidence:
  - reference: PMID:27936530
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Thyroid disease affects nearly every organ system in the body.
    explanation: >-
      Establishes the multisystem reach of thyroid dysfunction, consistent with
      the generalized hypometabolic consequence of hypothyroidism. Evidence source
      is OTHER because this is a review article.
