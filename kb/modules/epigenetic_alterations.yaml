name: Epigenetic Alterations Module
description: >-
  A conserved mechanism module for the hallmark of aging (Lopez-Otin et al.)
  termed epigenetic alterations: the progressive, partly stochastic remodeling
  of the epigenome with age. Aging is accompanied by drift in DNA-methylation
  patterns, chromatin reorganization, and altered histone modifications, which
  together perturb the epigenetic regulation of gene expression. The
  DNA-methylation changes are regular enough to build accurate multi-tissue
  "epigenetic clocks" that estimate biological age and reveal age acceleration
  in disease and cancer. Because these marks are, in principle, reversible, the
  epigenetic hallmark is a distinctive source of "druggable" targets against
  age-related decline - the basis of epigenetic-clock biomarkers and emerging
  epigenetic-reprogramming interventions. Individual disorder entries declare
  conformance via conforms_to on their pathophysiology nodes, substituting the
  disease-specific epigenetic lesion (e.g. a chromatin-modifier mutation, a
  methylation-clock acceleration, or an aging-associated transcriptional shift)
  while preserving the conserved drift -> altered-expression -> cellular-decline
  chain.
category: Module
creation_date: "2026-07-01T00:00:00Z"
notes: >-
  This is a mechanism module, not a specific disease. Disorder entries
  reference individual nodes via conforms_to (e.g.,
  "epigenetic_alterations#Altered Epigenetic Regulation of Gene Expression").
  Conforming nodes in disorder files should include the corresponding
  biological processes and causal edges, specialized to their disease context.
  The module captures the conserved epigenetic-drift chain and its biomarker
  (epigenetic-clock) and reversibility angles, but deliberately does NOT embed
  specific clock coefficients or contested reprogramming-rejuvenation claims;
  those belong on the relevant disorder or method entry. Note the GO "DNA
  methylation" term is obsolete, so methylation drift is bound via
  "epigenetic regulation of gene expression" and "chromatin organization" and
  described in prose. Key conformance target:
  "epigenetic_alterations#Altered Epigenetic Regulation of Gene Expression".
pathophysiology:
- name: Age-Associated Epigenetic Drift
  description: >-
    With age the epigenome drifts: DNA-methylation patterns change (global
    hypomethylation with focal hypermethylation), chromatin is reorganized, and
    histone modifications shift. This progressive, partly stochastic remodeling
    of chromatin is the initiating alteration of the hallmark and is a
    consistent correlate of aging across species and tissues.
  role: trigger
  biological_processes:
  - preferred_term: Chromatin Organization
    term:
      id: GO:0006325
      label: chromatin organization
    modifier: ABNORMAL
  evidence:
  - reference: PMID:27518561
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Accumulating evidence links aging to genetic and epigenetic alterations.
    explanation: >-
      Establishes the link between aging and epigenetic alterations, the
      initiating drift modeled here. Evidence source is OTHER because this is a
      review.
  - reference: PMID:36599349
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      We propose the following twelve hallmarks of aging: genomic instability,
      telomere attrition, epigenetic alterations, loss of proteostasis, disabled
      macroautophagy, deregulated nutrient-sensing, mitochondrial dysfunction,
      cellular senescence, stem cell exhaustion, altered intercellular
      communication, chronic inflammation, and dysbiosis.
    explanation: >-
      Enumerates epigenetic alterations as a hallmark of aging, framing this
      module. Evidence source is OTHER because this is a review.
  downstream:
  - target: Altered Epigenetic Regulation of Gene Expression
- name: Altered Epigenetic Regulation of Gene Expression
  description: >-
    Epigenetic drift perturbs the epigenetic control of transcription: genes are
    aberrantly silenced or de-repressed and cell-identity programs erode. The
    regularity of the underlying DNA-methylation changes is sufficient to build
    accurate multi-tissue epigenetic clocks that estimate biological age, and
    disease and cancer tissues show measurable epigenetic age acceleration. This
    is the conserved central node that disease-specific epigenetic lesions
    converge upon.
  role: central_effector
  biological_processes:
  - preferred_term: Epigenetic Regulation of Gene Expression
    term:
      id: GO:0040029
      label: epigenetic regulation of gene expression
    modifier: ABNORMAL
  evidence:
  - reference: PMID:24138928
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      I developed a multi-tissue predictor of age that allows one to estimate
      the DNA methylation age of most tissues and cell types.
    explanation: >-
      Establishes the multi-tissue DNA-methylation epigenetic clock that
      quantifies the altered methylation landscape modeled here. Evidence source
      is OTHER because this is a methodological/analytical study of methylation
      arrays rather than a disease cohort.
  - reference: PMID:24138928
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Analysis of 6,000 cancer samples from 32 datasets showed that all of the
      considered 20 cancer types exhibit significant age acceleration, with an
      average of 36 years.
    explanation: >-
      Documents epigenetic age acceleration across cancer types, evidence that
      the altered methylation landscape tracks pathological states. Evidence
      source is OTHER because this is an array-based analytical study.
  downstream:
  - target: Epigenetically Driven Cellular Decline
- name: Epigenetically Driven Cellular Decline
  description: >-
    Aberrant epigenetic gene regulation degrades cellular function - loss of
    cell-identity fidelity, transcriptional dysregulation, and reduced
    resilience - contributing to age-related tissue decline and disease. Because
    epigenetic marks are reversible, this node is also the conserved entry point
    for epigenetic-clock biomarkers and reprogramming-based interventions aimed
    at countering age-related decline.
  role: consequence
  evidence:
  - reference: PMID:27518561
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Given the reversible nature of epigenetic mechanisms, these pathways
      provide promising avenues for therapeutics against age-related decline and
      disease.
    explanation: >-
      States that the reversibility of epigenetic mechanisms makes them
      therapeutic avenues against age-related decline, the consequence and
      intervention angle modeled here. Evidence source is OTHER because this is a
      review.
  - reference: PMID:27518561
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      We establish links between common operative aging pathways and hallmark
      chromatin signatures that can be used to identify "druggable" targets to
      counter human aging and age-related disease.
    explanation: >-
      Links aging pathways to chromatin signatures as druggable targets,
      supporting the reversibility/intervention framing of this outcome node.
      Evidence source is OTHER because this is a review.
