name: Microtubule-Dependent Neuronal Migration Failure Module
description: >-
  Conserved cortical malformation mechanism in which pathogenic variants in
  microtubule-associated proteins, tubulin subunits, gamma-tubulin nucleation
  machinery, dynein, or kinesin motors perturb microtubule dynamics and
  microtubule-based movement in developing neurons. The shared skeleton is
  microtubule apparatus perturbation followed by defective neuronal
  nucleokinesis/radial migration and cortical dyslamination or neuronal ectopia.
  This module is intended for lissencephaly, subcortical band heterotopia, and
  selected polymicrogyria-like malformations where microtubule-dependent
  neuronal migration is central.
category: Module
creation_date: "2026-06-10T03:26:29Z"
notes: >-
  This is a mechanism module, not a disease or a broad "tubulinopathy" lump.
  Disorder entries should use conforms_to only when the core pathograph is
  microtubule-dependent neuronal motility or migration failure. Conforming
  disease entries may substitute the specific gene and mechanism, such as
  PAFAH1B1/LIS1 dosage-sensitive dynein regulation, DCX microtubule
  stabilization, TUBA1A or TUBB2B heterodimer/MAP-binding disruption, TUBG1
  nucleation defects, or DYNC1H1/KIF motor dysfunction. Do not use this module
  as the primary skeleton when the dominant mechanism is neural progenitor
  depletion/spindle failure, apical neuroependyma integrity failure, pial
  basement-membrane/radial-glial endfoot failure, Reelin terminal-translocation
  signaling, ARX interneuronopathy, or PI3K-AKT-mTOR overgrowth; those should
  use separate modules or subtype branches. TUBB3-related disease may conform
  only for its microtubule/axon-guidance branch if cortical migration is not the
  primary demonstrated defect.
mechanistic_hypotheses:
- hypothesis_group_id: microtubule_migration_model
  hypothesis_label: Microtubule-Dependent Neuronal Migration Model
  status: CANONICAL
  description: >-
    Microtubule-associated proteins, tubulin subunits, dynein, and kinesin motors
    form a coupled apparatus for neuronal polarization, nucleokinesis, migration,
    and projection outgrowth. Pathogenic variants disrupt this apparatus through
    altered microtubule polymerization, heterodimer formation, MAP binding, motor
    ATPase activity, microtubule binding, or cargo/centrosome-nucleus coupling.
    Developing neurons then fail to migrate to appropriate cortical positions,
    producing dyslamination, lissencephaly/subcortical-band-heterotopia patterns,
    and selected polymicrogyria-like cortical malformations.
  evidence:
  - reference: PMID:23603762
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Our data reinforce the importance of centrosomal and microtubule-related
      proteins in cortical development and strongly suggest that
      microtubule-dependent mitotic and postmitotic processes are major
      contributors to the pathogenesis of MCD.
    explanation: >-
      Broad synthesis from human genetics, biochemical assays, yeast assays, and
      mouse in utero experiments supporting the module-level mechanism.
discussions:
- discussion_id: gap_microtubule_human_model_translatability
  prompt: >-
    Which microtubule-dependent migration defects are conserved across mouse
    in utero perturbation/knockout models, biochemical or cultured-cell assays,
    and human iPSC-derived cortical organoids, and which require human-specific
    progenitors such as outer radial glia?
  kind: HUMAN_MODEL_MISMATCH
  status: OPEN
  attaches_to:
  - pathophysiology#Microtubule Apparatus Perturbation
  - pathophysiology#Microtubule-Based Neuronal Motility Failure
  rationale: >-
    The seed review emphasized rodent-versus-human cortical-development
    differences and the value of iPSC/organoid systems. For curation this should
    be treated as a human/model mismatch knowledge-gap category: mouse migration
    evidence can establish conserved mechanisms, but organoids or fetal-human
    data may be needed to decide whether outer-radial-glia timing, cleavage
    orientation, or human-specific transcript usage changes the pathograph for a
    specific disorder.
  evidence:
  - reference: PMID:28111201
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      However, the mouse brain is naturally lissencephalic, suggesting that
      certain aspects of cortical development may not be adequately assessed in
      mice.
    explanation: >-
      Directly states the model-system limitation motivating this knowledge gap.
  - reference: PMID:28111201
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Recent work has uncovered critical cellular and molecular differences
      between cortical development in humans and mice, further underscoring the
      need to develop human model systems.
    explanation: >-
      Supports explicit capture of human/model translatability as a gap when
      curating mouse-supported cortical malformation mechanisms.
