- name: Human iPSC-derived cerebral organoid migration model
  description: >-
    Human pluripotent-stem-cell-derived three-dimensional cerebral or cortical
    organoids used to model lissencephaly and microcephaly mechanisms, including
    live assays of neuronal migration, neuroepithelial apoptosis, cleavage
    orientation, and outer-radial-glial mitotic behavior.
  experimental_model_type: ORGANOID
  namo_type: namo:Organoid
  organism:
    preferred_term: human
    term:
      id: NCBITaxon:9606
      label: Homo sapiens
  tissue_term:
    preferred_term: cerebral cortex
    term:
      id: UBERON:0000956
      label: cerebral cortex
  cell_types:
  - preferred_term: radial glial cell
    term:
      id: CL:0000681
      label: radial glial cell
  - preferred_term: migrating cortical neuron
    term:
      id: CL:0000540
      label: neuron
  conditions:
  - lissencephaly
  - microcephaly
  - cortical neuronal migration defect
  cell_source: Human embryonic stem cells, patient-derived iPSCs, or isogenic engineered iPSCs
  culture_system: Three-dimensional cerebral/cortical organoid culture with live imaging and single-cell profiling
  publication: PMID:28111201
  modeled_mechanisms:
  - target: Microtubule Apparatus Perturbation
    description: >-
      Assays whether variant effects on microtubule-linked mitotic behavior,
      radial-glial organization, or organoid growth are conserved in a human
      cortical model.
    evidence:
    - reference: PMID:28111201
      supports: SUPPORT
      evidence_source: IN_VITRO
      snippet: >-
        We also identified a mitotic defect in outer radial glia
      explanation: >-
        Shows that human organoids can reveal a radial-glial mitotic branch that
        is difficult to model in lissencephalic rodents.
  - target: Microtubule-Based Neuronal Motility Failure
    description: >-
      Supports live or endpoint assays of cortical neuron migration from
      organoids and rescue by isogenic correction.
    evidence:
    - reference: PMID:28111201
      supports: SUPPORT
      evidence_source: IN_VITRO
      snippet: >-
        Defective radial migration of cortical neurons is a well-established
        developmental phenotype in lissencephaly
      explanation: >-
        Supports the organoid migration assay as directly relevant to the module
        central effector.
  findings:
  - statement: >-
      Patient-derived MDS cerebral organoids show a migration defect that can be
      rescued by correction of the causal chromosomal deletion.
    evidence:
    - reference: PMID:28111201
      supports: SUPPORT
      evidence_source: IN_VITRO
      snippet: >-
        We saw a cell migration defect that was rescued when we corrected the
        MDS causative chromosomal deletion
      explanation: >-
        Supports organoid-based perturbation and rescue as a useful human
        non-animal model for lissencephaly migration mechanisms.
  - statement: >-
      Human cerebral organoid cortical cells can recapitulate fetal-neocortex
      gene-expression programs relevant to cortical development.
    evidence:
    - reference: PMID:26644564
      supports: SUPPORT
      evidence_source: IN_VITRO
      snippet: >-
        these organoid cortical cells use gene expression programs remarkably
        similar to those of the fetal tissue to organize into cerebral
        cortex-like regions.
      explanation: >-
        Supports the human cortical organoid model as a non-animal model for
        developmental cortical mechanisms.
