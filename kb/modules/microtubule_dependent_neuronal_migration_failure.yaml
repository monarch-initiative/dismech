    modifier: DYSREGULATED
  - preferred_term: neuron projection guidance
    term:
      id: GO:0097485
      label: neuron projection guidance
    modifier: DYSREGULATED
  evidence:
  - reference: PMID:20074521
    supports: SUPPORT
    evidence_source: MODEL_ORGANISM
    snippet: >-
      A knock-in disease mouse model reveals axon guidance defects without
      evidence of cortical cell migration abnormalities.
    explanation: >-
      Supports axon guidance as a distinct TUBB3-related branch and explains why
      TUBB3 should not be lumped uncritically with core cortical migration
      failure.
  - reference: PMID:20074521
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      These findings demonstrate that normal TUBB3 is required for axon guidance
      and maintenance in mammals.
    explanation: >-
      Supports the optional projection-wiring branch of the microtubule module.
