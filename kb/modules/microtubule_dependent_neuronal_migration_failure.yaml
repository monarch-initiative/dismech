    - name: Non-disease donor organoids
      description: Unedited control organoids differentiated and imaged in parallel.
    decision_criterion: >-
      A conserved microtubule-migration mechanism is supported if variant
      organoids show reduced migration speed/displacement or abnormal
      radial-glial motility that is rescued by isogenic correction and
      reproduced by knock-in. A human-specific branch is supported if mouse
      models lack the relevant phenotype but organoids show reproducible outer
      radial-glial or human transcript/cell-state defects.
    would_support:
    - pathophysiology#Microtubule Apparatus Perturbation
    - pathophysiology#Microtubule-Based Neuronal Motility Failure
    evidence:
    - reference: PMID:28111201
      supports: SUPPORT
      evidence_source: IN_VITRO
      snippet: >-
        We saw a cell migration defect that was rescued when we corrected the
        MDS causative chromosomal deletion
      explanation: >-
        Provides precedent that a human iPSC cerebral organoid assay can detect
        and rescue a lissencephaly-relevant migration defect.
    - reference: PMID:23995685
      supports: SUPPORT
