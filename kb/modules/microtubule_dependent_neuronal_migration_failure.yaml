        disease-model platform.
pathophysiology:
- name: Microtubule Apparatus Perturbation
  description: >-
    Pathogenic variation perturbs the microtubule apparatus used by developing
    neurons and neural progenitors. Representative mechanisms include defective
    DCX-mediated microtubule stabilization, impaired alpha/beta-tubulin
    heterodimer formation or MAP binding, gamma-tubulin nucleation defects,
    altered dynein microtubule binding, and kinesin ATPase/folding defects.
  role: trigger
  genes:
  - preferred_term: PAFAH1B1
    term:
      id: hgnc:8574
      label: PAFAH1B1
  - preferred_term: DCX
    term:
      id: hgnc:2714
      label: DCX
  - preferred_term: TUBA1A
    term:
      id: hgnc:20766
      label: TUBA1A
  - preferred_term: TUBB2B
    term:
      id: hgnc:30829
      label: TUBB2B
  - preferred_term: TUBB3
    term:
      id: hgnc:20772
      label: TUBB3
  - preferred_term: TUBG1
    term:
      id: hgnc:12417
      label: TUBG1
  - preferred_term: DYNC1H1
    term:
      id: hgnc:2961
      label: DYNC1H1
  - preferred_term: KIF2A
    term:
      id: hgnc:6318
      label: KIF2A
  - preferred_term: KIF5C
    term:
      id: hgnc:6325
      label: KIF5C
  cell_types:
  - preferred_term: migrating cortical neuron
    term:
      id: CL:0000540
      label: neuron
  - preferred_term: radial glial cell
    term:
      id: CL:0000681
      label: radial glial cell
  locations:
  - preferred_term: cerebral cortex
    term:
      id: UBERON:0000956
      label: cerebral cortex
  biological_processes:
  - preferred_term: microtubule cytoskeleton organization
    term:
      id: GO:0000226
      label: microtubule cytoskeleton organization
    modifier: DYSREGULATED
  - preferred_term: microtubule-based process
    term:
      id: GO:0007017
      label: microtubule-based process
    modifier: DYSREGULATED
  evidence:
  - reference: PMID:10399933
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: >-
      DCX coassembles with brain microtubules, and recombinant DCX stimulates
      the polymerization of purified tubulin.
    explanation: >-
      Demonstrates that a classical neuronal-migration protein directly
      regulates microtubules.
  - reference: PMID:19465910
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: >-
      We also show that two disease-associated mutations lead to impaired
      formation of tubulin heterodimers.
    explanation: >-
      Supports a beta-tubulin mechanism in which disease variants perturb
      tubulin heterodimer formation.
  - reference: PMID:20466733
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      We also provide cellular and structural data suggesting that LIS-associated
      mutations of TUBA1A operate via diverse mechanisms that include disruption
      of binding sites for microtubule-associated proteins (MAPs).
    explanation: >-
      Supports alpha-tubulin disease variants acting through multiple
      microtubule-associated mechanisms.
  - reference: PMID:23603762
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: >-
      mutations in KIF5C, KIF2A and DYNC1H1 affect ATP hydrolysis, productive
      protein folding and microtubule binding, respectively.
    explanation: >-
      Supports microtubule motor dysfunction as a variant-specific upstream
      apparatus defect.
  downstream:
  - target: Microtubule-Based Neuronal Motility Failure
    description: >-
      Defective microtubule dynamics, MAP binding, and motor function impair the
      centrosome-nucleus coupling and cytoskeletal remodeling required for
      radial neuronal migration.
    hypothesis_groups:
    - microtubule_migration_model
  - target: Axon Guidance and Projection Wiring Defects
    description: >-
      Some tubulin variants, especially TUBB3 variants, primarily alter axon
      guidance or projection maintenance rather than cortical cell migration.
      This is an optional branch for conforming entries, not the core skeleton.
    hypothesis_groups:
    - microtubule_migration_model

- name: Microtubule-Based Neuronal Motility Failure
  description: >-
    Migrating neurons fail to execute normal microtubule-dependent movement,
    including leading-process stabilization, nucleokinesis, centrosome-nucleus
    coupling, and radial migration along radial-glial scaffolds. Depending on
    the gene and developmental window, the defect can appear as delayed
    migration, arrested cells in intermediate/subventricular regions, or
    abnormal neuronal positioning.
  role: central_effector
  cell_types:
  - preferred_term: migrating cortical neuron
    term:
      id: CL:0000540
      label: neuron
  - preferred_term: pyramidal neuron
    term:
      id: CL:0000598
      label: pyramidal neuron
  locations:
  - preferred_term: cerebral cortex
    term:
      id: UBERON:0000956
      label: cerebral cortex
  biological_processes:
  - preferred_term: neuron migration
    term:
      id: GO:0001764
      label: neuron migration
    modifier: DECREASED
  - preferred_term: microtubule-based movement
    term:
      id: GO:0007018
      label: microtubule-based movement
    modifier: DYSREGULATED
  evidence:
  - reference: PMID:9697693
    supports: SUPPORT
    evidence_source: MODEL_ORGANISM
    snippet: >-
      Mice with one inactive allele display cortical, hippocampal and olfactory
      bulb disorganization resulting from delayed neuronal migration by a
      cell-autonomous neuronal pathway.
    explanation: >-
      Supports dosage-sensitive PAFAH1B1/Lis1 migration failure in a mouse
      model.
  - reference: PMID:10399933
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Doublecortin (DCX) is required for normal migration of neurons into the
      cerebral cortex, since mutations in the human gene cause a disruption of
      cortical neuronal migration.
    explanation: >-
      Connects human DCX mutations to disrupted cortical neuronal migration.
  - reference: PMID:19465910
    supports: SUPPORT
    evidence_source: MODEL_ORGANISM
    snippet: >-
      In utero RNAi-based inactivation demonstrates that TUBB2B is required for
      neuronal migration.
    explanation: >-
      Supports a beta-tubulin requirement for neuronal migration in an in vivo
      perturbation model.
  - reference: PMID:23603762
    supports: SUPPORT
    evidence_source: MODEL_ORGANISM
    snippet: >-
      suppression of mouse Tubg1 expression in vivo interferes with proper
      neuronal migration
    explanation: >-
      Supports gamma-tubulin involvement in cortical neuronal migration in vivo.
  downstream:
  - target: Cortical Dyslamination and Neuronal Ectopia
    description: >-
      Failed or delayed neuronal migration prevents appropriate placement of
      cortical neurons, producing abnormal lamination, heterotopia, or
      lissencephaly/pachygyria-like cortical organization.
    hypothesis_groups:
    - microtubule_migration_model

- name: Cortical Dyslamination and Neuronal Ectopia
  description: >-
    The tissue-level effect is abnormal cortical architecture: neurons remain
    ectopic, the cortical plate is thickened or poorly laminated, and gyral
    patterning may show lissencephaly, pachygyria, subcortical band heterotopia,
    or selected polymicrogyria-like malformations. Disorder-specific entries
    should state the relevant anatomic gradient and whether pial basement
    membrane failure, progenitor depletion, or another module is also needed.
  role: effector
  cell_types:
  - preferred_term: cortical neuron
    term:
      id: CL:0000540
      label: neuron
  locations:
  - preferred_term: cerebral cortex
    term:
      id: UBERON:0000956
      label: cerebral cortex
  biological_processes:
  - preferred_term: cerebral cortex development
    term:
      id: GO:0021987
      label: cerebral cortex development
    modifier: DYSREGULATED
  - preferred_term: neuron migration
    term:
      id: GO:0001764
      label: neuron migration
    modifier: DECREASED
  evidence:
  - reference: PMID:19465910
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Polymicrogyria is a relatively common but poorly understood defect of
      cortical development characterized by numerous small gyri and a thick
      disorganized cortical plate lacking normal lamination.
    explanation: >-
      Establishes dyslaminated cortical architecture as a human cortical
      malformation endpoint in a TUBB2B-associated study.
  - reference: PMID:20466733
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      We identified novel and recurrent TUBA1A mutations in approximately 1% of
      children with classic LIS and in approximately 30% of children with LCH
    explanation: >-
      Supports TUBA1A-associated lissencephaly/cerebellar-hypoplasia phenotypes
      as human endpoints of tubulin-related microtubule dysfunction.
  - reference: PMID:23603762
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Here we report the discovery of multiple pathogenic missense mutations in
      TUBG1, DYNC1H1 and KIF2A, as well as a single germline mosaic mutation in
      KIF5C, in subjects with MCD.
    explanation: >-
      Supports human cortical malformation association for gamma-tubulin and
      microtubule motor genes in the module scope.

- name: Axon Guidance and Projection Wiring Defects
  description: >-
    Optional side branch in which the same microtubule/tubulin apparatus disrupts
    axon guidance, commissural tract development, or long-range projection
    maintenance. This branch is important for TUBB3-related phenotypes and some
    broader tubulin/motor disorders, but its presence should not be assumed for
    all conforming microtubule-migration entries.
  role: amplifier
  cell_types:
