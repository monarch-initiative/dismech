      KIF5C variants, correct or knock in each variant isogenically, and compare
      live neuronal migration, radial-glial scaffold integrity, and outer
      radial-glial mitotic timing against mouse/IUE expectations.
    experiment_type:
      preferred_term: patient-derived cortical organoid perturbation experiment
    model_systems:
