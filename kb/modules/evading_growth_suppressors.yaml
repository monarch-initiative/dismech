name: Evading Growth Suppressors Module
description: >-
  A conserved mechanism module for the second hallmark of cancer (Hanahan &
  Weinberg): the evasion of antiproliferative programs governed by tumor
  suppressors. Two master tumor-suppressor circuits enforce these programs:
  the retinoblastoma protein (RB) pathway, which integrates extracellular
  antigrowth signals to gate the G1/S transition, and the TP53 (p53)
  pathway, which senses intracellular stress (DNA damage, oncogene-induced
  hyperproliferation, hypoxia) and triggers cell-cycle arrest, senescence,
  or apoptosis. The conserved causal chain runs from inactivation of an RB-
  or p53-axis tumor suppressor (RB1/CDKN2A loss, cyclin D/CDK4-6
  amplification, TP53 mutation, MDM2 amplification) through loss of
  cell-cycle-checkpoint and antiproliferative control, and additionally
  through loss of contact inhibition, to unrestrained proliferation. This is
  the antiproliferative-brake counterpart to
  sustaining_proliferative_signaling: that module models acquisition of
  growth-promoting drive, this one models loss of growth-restraining
  control. Individual disorder entries declare conformance via conforms_to,
  substituting the tumor-type-specific tumor-suppressor lesion (e.g.,
  biallelic RB1 in retinoblastoma, germline TP53 in Li-Fraumeni, APC/Wnt in
  familial adenomatous polyposis, NF1 in neurofibromatosis).
category: Module
creation_date: "2026-06-27T00:00:00Z"
notes: >-
  This is a mechanism module, not a specific disease. Disorder entries
  reference individual nodes via conforms_to (e.g.,
  "evading_growth_suppressors#Loss of Cell-Cycle Checkpoint Control"). The
  module defines the expected pathophysiology structure; conforming nodes in
  disorder files should include the corresponding biological processes and
  causal edges, specialized to their tumor context. Key tumor-specific
  substitutions: retinoblastoma uses biallelic RB1 inactivation (the two-hit
  paradigm); Li-Fraumeni uses germline TP53 loss; many sporadic cancers use
  CDKN2A (p16INK4A) deletion or MDM2 amplification. The senescence arm of
  tumor suppression is elaborated in senescence_tumor_suppression. Key
  conformance target: "evading_growth_suppressors#Loss of Cell-Cycle
  Checkpoint Control".
pathophysiology:
- name: Tumor Suppressor Inactivation
  description: >-
    A genetic or epigenetic lesion inactivates an RB- or p53-axis tumor
    suppressor. Routes include biallelic loss of RB1, deletion or silencing
    of CDKN2A (encoding p16INK4A and p14ARF), amplification of cyclin
    D/CDK4-6 that hyperphosphorylates RB, loss-of-function mutation of TP53
    (the most frequently mutated gene in human cancer), or amplification of
    the p53 antagonists MDM2/MDM4. Each route disables a node that normally
    enforces antiproliferative control.
  role: trigger
  biological_processes:
  - preferred_term: Signal Transduction by p53 Class Mediator
    term:
      id: GO:0072331
      label: signal transduction by p53 class mediator
    modifier: DECREASED
  evidence:
  - reference: PMID:24739573
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      The importance of p53 in tumour suppression is unequivocal, as shown
      by its inactivation in more than half of all sporadic human cancers
    explanation: >-
      Review establishing that p53 tumor-suppressor inactivation is a
      near-universal event in human cancer, supporting tumor-suppressor
      inactivation as the trigger of this module. Evidence source is OTHER
      because this is a review article.
  downstream:
  - target: Loss of Cell-Cycle Checkpoint Control
    description: >-
      Inactivation of the RB or p53 axis removes the brakes that gate
      cell-cycle progression and stress responses.

- name: Loss of Cell-Cycle Checkpoint Control
  description: >-
    With the RB and/or p53 circuits disabled, the cell loses the
    antiproliferative checkpoints that normally halt division. RB-pathway
    loss permits unrestrained G1/S transit regardless of antigrowth signals;
    p53-pathway loss abolishes the stress-induced cell-cycle arrest,
    senescence, and apoptosis that would otherwise eliminate incipient tumor
    cells. This is the conserved central node disorder-specific lesions
    converge upon.
  role: central_effector
  biological_processes:
  - preferred_term: Negative Regulation of Cell Cycle
    term:
      id: GO:0045786
      label: negative regulation of cell cycle
    modifier: DECREASED
  - preferred_term: Negative Regulation of Cyclin-Dependent Protein Kinase Activity
    term:
      id: GO:1904030
      label: negative regulation of cyclin-dependent protein kinase activity
    modifier: DECREASED
  evidence:
  - reference: PMID:24739573
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      p53 is a crucial tumour suppressor that responds to diverse stress
      signals by orchestrating specific cellular responses, including
      transient cell cycle arrest, cellular senescence and apoptosis, which
      are all processes associated with tumour suppression.
    explanation: >-
      Defines the antiproliferative checkpoint responses (arrest,
      senescence, apoptosis) whose loss is the central effector of this
      module. Evidence source is OTHER because this is a review article.
  - reference: PMID:21376230
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      They include sustaining proliferative signaling, evading growth
      suppressors, resisting cell death, enabling replicative immortality,
      inducing angiogenesis, and activating invasion and metastasis.
    explanation: >-
      Hanahan & Weinberg list evading growth suppressors as a core hallmark
      capability modeled here. Evidence source is OTHER because this is a
      review article.
  downstream:
  - target: Loss of Contact Inhibition
    description: >-
      Disabled tumor-suppressor circuits also relax density-dependent
      restraints on proliferation.
  - target: Unrestrained Proliferation
    description: >-
      Removal of antiproliferative checkpoints permits continued division of
      cells that should have arrested or died.

- name: Loss of Contact Inhibition
  description: >-
    Normal epithelial and mesenchymal cells cease proliferating when they
    reach high density (contact inhibition), a tumor-suppressive restraint
    mediated in part by the Hippo-YAP/TAZ pathway, NF2/Merlin, and
    LKB1-AMPK. Cancer cells lose contact inhibition, continuing to divide
    and pile up beyond a confluent monolayer.
  role: effector
  biological_processes:
  - preferred_term: Contact Inhibition
    term:
      id: GO:0060242
      label: contact inhibition
    modifier: DECREASED
  downstream:
  - target: Unrestrained Proliferation

- name: Unrestrained Proliferation
  description: >-
    The combined loss of cell-cycle-checkpoint control and contact
    inhibition yields unrestrained proliferation: cells divide despite
    antigrowth signals, high density, and intracellular stress that would
    normally trigger arrest or death. This is the defining phenotype of the
    evading-growth-suppressors hallmark.
  role: consequence
  biological_processes:
  - preferred_term: Cell Population Proliferation
    term:
      id: GO:0008283
      label: cell population proliferation
    modifier: INCREASED
