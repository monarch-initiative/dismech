name: Conserved Senescence-Mediated Tumor Suppression Module
description: >-
  A conserved tumor-suppressive module representing the original, protective arm
  of cellular senescence (GO:0090398): in cells at risk of malignant
  transformation, oncogenic, replicative, and genotoxic stress engages the
  p16INK4a/Rb and p53/p21 programs to impose a permanent senescence-associated
  arrest that halts proliferation of premalignant cells and acts as a barrier to
  malignant transformation. A convergent, later-life thread is the
  aging-associated decline of stem-cell fitness (loss of stemness), which further
  limits the tumor-initiating capacity of aged tissue. This module is the
  deliberate complement of `cellular_senescence`, which models the DELETERIOUS
  arm (SASP-driven accumulation and tissue dysfunction); together they capture
  the antagonistic pleiotropy of senescence without requiring a single
  effect-reversing edge. Cancer entries may reference this module as the
  intrinsic barrier that oncogenic transformation must evade (e.g.
  oncogene-induced senescence in benign nevi).
category: Module
creation_date: "2026-06-23T00:00:00Z"
notes: >-
  This is a mechanism module, not a specific disease. It models the
  tumor-SUPPRESSIVE mechanism of senescence/aging and is the complement of the
  deleterious `cellular_senescence` module; the two share the senescence-arrest
  concept but diverge downstream (barrier to transformation here vs.
  SASP/accumulation/dysfunction there). IMPORTANT framing: this module does NOT
  assert that aging is net-protective against cancer - older people have higher
  overall cancer incidence. It captures specific, conserved tumor-suppressive
  mechanisms (oncogene-induced/replicative senescence arrest; aging-associated
  loss of stemness) that operate as barriers, strongest cell-intrinsically.
  Disease-specific or population-level epidemiologic claims (e.g. the
  age-contextualized accelerated-aging/early-onset-cancer association) belong on
  the relevant disorder or comorbidity/trajectory entry, not here. The
  age/stemness arm is anchored on PMID:39633048 (Zhuang et al., Nature 2025);
  the senescence-barrier arm on the classic tumor-suppressive senescence
  literature.
pathophysiology:
- name: Oncogenic and Replicative Stress in Cells at Risk
  description: >-
    Cells at risk of malignant transformation sustain pro-senescent stresses:
    activated oncogenes (oncogene-induced senescence), telomere attrition from
    repeated division (replicative senescence), and severe or irreparable DNA
    damage (genotoxic stress). Rather than tolerating these lesions, cells
    capable of division can route them into the senescence program.
  role: trigger
  biological_processes:
  - preferred_term: DNA Damage Response
    term:
      id: GO:0006974
      label: DNA damage response
    modifier: INCREASED
  evidence:
  - reference: PMID:20078217
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      These stresses include telomeric dysfunction (telomere uncapping) resulting
      from repeated cell division (termed replicative senescence), mitochondrial
      deterioration, oxidative stress, severe or irreparable DNA damage and
      chromatin disruption (genotoxic stress), and the expression of certain
      oncogenes (oncogene-induced senescence)
    explanation: >-
      Enumerates the oncogenic, replicative, and genotoxic stresses that route
      at-risk cells into senescence. Evidence source is OTHER (review).
  downstream:
  - target: Senescence-Associated Tumor-Suppressive Arrest

- name: Senescence-Associated Tumor-Suppressive Arrest
  description: >-
    The p16INK4a/Rb and p53/p21 tumor-suppressor pathways impose an essentially
    permanent cell-cycle arrest. By halting the proliferation of damaged or
    oncogene-expressing cells, this arrest is the cell-intrinsic core of
    senescence's tumor-suppressive function - the same arrest that, in a
    different (chronic, SASP-driven) context, becomes deleterious in the
    `cellular_senescence` module.
  role: central_effector
  biological_processes:
  - preferred_term: Cellular Senescence
    term:
      id: GO:0090398
      label: cellular senescence
    modifier: INCREASED
  - preferred_term: Negative Regulation of Cell Proliferation
    term:
      id: GO:0008285
      label: negative regulation of cell population proliferation
    modifier: INCREASED
  evidence:
  - reference: PMID:20078217
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Cellular senescence is a tumor-suppressive mechanism that permanently
      arrests cells at risk for malignant transformation.
    explanation: >-
      States the defining tumor-suppressive role of the senescence arrest.
      Evidence source is OTHER (review).
  - reference: PMID:20078217
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      the senescence growth arrest has been shown to depend on the activities of
      the major tumor-suppressor pathways controlled by p16INK4a and pRB
      (retinoblastoma protein), as well as by p53
    explanation: >-
      Identifies the p16INK4a/Rb and p53 pathways as the effectors of the
      tumor-suppressive arrest. Evidence source is OTHER (review).
  downstream:
  - target: Barrier to Malignant Transformation

- name: Aging-Associated Loss of Stemness
  description: >-
    A convergent, later-life thread: aging degrades the fitness and stemness of
    the stem/progenitor cells of origin, reducing their capacity to initiate
    tumors. This is mechanistically distinct from the senescence arrest (it
    reflects stem-cell decline rather than p16/p53 arrest) but converges on the
    same tumor-suppressive outcome and supplies the age-context for this module.
  role: modifier
  biological_processes:
  - preferred_term: Stem Cell Population Maintenance
    term:
      id: GO:0019827
      label: stem cell population maintenance
    modifier: DECREASED
  evidence:
  - reference: PMID:39633048
    supports: SUPPORT
    evidence_source: MODEL_ORGANISM
    snippet: >-
      ageing suppresses lung cancer initiation and progression by degrading the
      stemness of the alveolar cell of origin
    explanation: >-
      Physiologically aged mouse models demonstrate that aging-driven loss of
      stemness in the cell of origin suppresses tumor initiation and
      progression. Evidence source is MODEL_ORGANISM (aged autochthonous mouse
      models; corroborated in human cells).
  downstream:
  - target: Barrier to Malignant Transformation

- name: Barrier to Malignant Transformation
  description: >-
    The convergent consequence: the senescence arrest and aging-associated loss
    of stemness together preclude clonal expansion of damaged or premalignant
    cells, suppressing tumor initiation. This barrier is exploited therapeutically
    by pro-senescent (senescence-inducing) therapies in cancer, the conceptual
    inverse of the senolytic strategy used against the deleterious senescence arm.
  role: consequence
  evidence:
  - reference: PMID:20078217
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      The senescence program locks the cells into a cell-cycle arrest that
      prevents the spread of damage to the next cell generation and precludes
      potential malignant transformation
    explanation: >-
      Directly states that the senescence arrest precludes malignant
      transformation - the defining barrier of this module. Evidence source is
      OTHER (review).
treatments:
- name: Pro-senescent (Senescence-Inducing) Therapy
  description: >-
    Pro-senescent therapy deliberately drives premalignant or tumor cells into
    senescence to halt their proliferation, exploiting senescence's
    tumor-suppressive barrier. Exemplified by CDK4/6 inhibitors. This is the
    conceptual inverse of senolytic therapy (which removes accumulated senescent
    cells in the deleterious `cellular_senescence` module).
  therapeutic_modality: SMALL_MOLECULE
  treatment_term:
    preferred_term: Pharmacotherapy
    term:
      id: NCIT:C15986
      label: Pharmacotherapy
  target_mechanisms:
  - target: Senescence-Associated Tumor-Suppressive Arrest
    treatment_effect: ACTIVATES
    description: >-
      Pro-senescent agents induce the senescence-associated arrest in
      premalignant/tumor cells, reinforcing the barrier to malignant
      transformation by limiting proliferation.
  evidence:
  - reference: PMID:24954210
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      In cancer and during active tissue repair, pro-senescent therapies
      contribute to minimize the damage by limiting proliferation and fibrosis,
      respectively.
    explanation: >-
      Supports pro-senescent therapy as a beneficial, proliferation-limiting
      strategy in cancer, exploiting the tumor-suppressive senescence barrier.
      Evidence source is OTHER (review).
