name: Innate Antiviral Interferon Response Module
description: >-
  The host innate antiviral pathway — from sensing of viral molecular patterns to
  the interferon-induced antiviral state — and the innate-immunity-modulator drug
  strategy that boosts it. Infected cells detect viral pathogen-associated molecular
  patterns (PAMPs), chiefly viral nucleic acid, through germline-encoded
  pattern-recognition receptors: the cytosolic RIG-I-like receptors (RIG-I, MDA5)
  for RNA, the cGAS-STING axis for DNA, and endosomal Toll-like receptors. Sensing
  drives induction of type I and type III interferons, which act in autocrine and
  paracrine fashion through the JAK-STAT pathway to transcribe hundreds of
  interferon-stimulated genes (ISGs); the ISG products establish an antiviral state
  that directly restricts viral replication. This module traces that cascade as
  causal steps — PAMP sensing -> interferon induction and JAK-STAT signaling ->
  ISG-mediated antiviral state -> restriction of viral replication — and adds the
  evasion branch every successful virus carries: dedicated viral antagonists
  (influenza NS1 is the prototype) that suppress interferon induction or signaling.
  Because the antiviral state is broad-spectrum and host-encoded, it is a drug
  target in its own right: innate-immunity modulators — recombinant or pegylated
  interferons (peginterferon lambda for COVID-19) and RIG-I/STING agonists — pharma-
  cologically reinforce this pathway, the conceptual mirror of the viral-antagonism
  branch. Complements the host-dependency and direct-acting antiviral modules as the
  immune arm of broad-spectrum antiviral defense.
category: Module
creation_date: "2026-06-28T00:00:00Z"
notes: >-
  This is an antiviral immune-mechanism / drug-mechanism module structured as a
  biological pathway, not a specific disease. Its nodes are the steps of the innate
  interferon response (viral PAMP sensing by pattern-recognition receptors -> type
  I/III interferon induction and JAK-STAT signaling -> interferon-stimulated-gene
  antiviral state -> restriction of viral replication), with a viral-evasion branch
  (dedicated interferon antagonists). The canonical conformance / treatment target is
  "Interferon-Stimulated Gene Antiviral State" — the broad-spectrum, host-encoded
  effector state. An innate-immunity-modulator treatment (recombinant/pegylated
  interferon such as peginterferon lambda, or a RIG-I/STING agonist) points its
  target_mechanisms edge at that node to pharmacologically reinforce it; this is the
  conceptual inverse of the viral-antagonism (adaptive_escape) node, which records how
  viruses suppress the same pathway. The drug classes are described in the node text
  rather than modelled as separate nodes, mirroring the other antiviral modules. See
  projects/ANTIVIRAL.md and projects/RESPIRATORY_INFECTIONS.md.
pathophysiology:
- name: Viral PAMP Sensing by Pattern-Recognition Receptors
  description: >-
    The innate antiviral response begins when an infected cell detects viral
    pathogen-associated molecular patterns — principally viral nucleic acid —
    through germline-encoded pattern-recognition receptors (PRRs). The cytosolic
    RIG-I-like receptors RIG-I and MDA5 sense viral RNA, the cGAS-STING axis senses
    cytosolic DNA, and endosomal Toll-like receptors sense nucleic-acid ligands.
    This sensing step is the committed trigger of the entire pathway: it converts the
    physical presence of a virus into a signal-transduction event that initiates the
    antiviral program.
  role: trigger
  biological_processes:
  - preferred_term: detection of virus
    term:
      id: GO:0009597
      label: detection of virus
  - preferred_term: cytoplasmic pattern recognition receptor signaling pathway
    term:
      id: GO:0002753
      label: cytoplasmic pattern recognition receptor signaling pathway
  molecular_functions:
  - preferred_term: pattern recognition receptor activity
    term:
      id: GO:0038187
      label: pattern recognition receptor activity
  - preferred_term: double-stranded RNA binding (RIG-I/MDA5 ligand recognition)
    term:
      id: GO:0003725
      label: double-stranded RNA binding
  evidence:
  - reference: PMID:21616434
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      such as C-type lectin receptors, NOD-like receptors, and RIG-I-like receptors
    explanation: >-
      Identifies the non-TLR pattern-recognition receptor families, including the
      RIG-I-like receptors that sense viral RNA, that initiate the innate response
      modelled by this node. Evidence source is OTHER as this is a review article.
  downstream:
  - target: Type I and III Interferon Induction and JAK-STAT Signaling
    description: >-
      PAMP sensing activates transcription factors that induce interferons, which
      then signal through the JAK-STAT pathway.

- name: Type I and III Interferon Induction and JAK-STAT Signaling
  description: >-
    PAMP sensing activates transcription factors (IRF3/IRF7 and NF-kB) that induce
    type I (IFN-alpha/beta) and type III (IFN-lambda) interferons. Secreted
    interferons act back on the producing cell and on neighbouring cells through
    their receptors, triggering canonical JAK-STAT signaling: receptor-associated
    Janus kinases phosphorylate STAT transcription factors, which drive transcription
    of interferon-stimulated genes. This induction-and-signaling step is the
    amplifier of the pathway — it converts a localized sensing event into a tissue-
    wide antiviral transcriptional program, and it is the level at which recombinant
    or pegylated interferons act when given therapeutically.
  role: effector
  biological_processes:
  - preferred_term: type I interferon production
    term:
      id: GO:0032606
      label: type I interferon production
  - preferred_term: type I interferon-mediated signaling pathway
    term:
      id: GO:0060337
      label: type I interferon-mediated signaling pathway
  - preferred_term: cell surface receptor signaling pathway via JAK-STAT
    term:
      id: GO:0007259
      label: cell surface receptor signaling pathway via JAK-STAT
  evidence:
  - reference: PMID:24362405
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Canonical type I IFN signalling activates the Janus kinase (JAK)-signal
      transducer and activator of transcription (STAT) pathway, leading to
      transcription of IFN-stimulated genes (ISGs).
    explanation: >-
      Pins the signaling step of this node — type I interferon activating the
      JAK-STAT pathway to transcribe ISGs. Evidence source is OTHER as this is a
      review article.
  - reference: PMID:24362405
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Type I interferons (IFNs) activate intracellular antimicrobial programmes and
      influence the development of innate and adaptive immune responses.
    explanation: >-
      Establishes that interferon induction activates intracellular antimicrobial
      programmes, the amplifying function of this node. Evidence source is OTHER as
      this is a review article.
  downstream:
  - target: Interferon-Stimulated Gene Antiviral State
    description: >-
      JAK-STAT signaling transcribes interferon-stimulated genes whose products
      establish the antiviral state.

- name: Interferon-Stimulated Gene Antiviral State
  description: >-
    The products of interferon-stimulated genes (ISGs) collectively establish a
    cell-intrinsic antiviral state that is highly effective at resisting and
    controlling pathogens. Individual ISGs directly inhibit viral infection at early
    and late stages of the life cycle — blocking entry, degrading viral RNA,
    restricting translation, and impeding assembly and egress. Because this effector
    state is broad-spectrum (active against many unrelated viruses) and host-encoded,
    it is the canonical conformance/treatment target of the module: innate-immunity
    modulators reinforce it pharmacologically — recombinant or pegylated interferons
    (peginterferon lambda) supply the upstream cytokine, and RIG-I/STING agonists
    drive the sensing-to-interferon axis that feeds it. A treatment of that class
    points its target_mechanisms edge at this node.
  role: therapeutic_vulnerability
  biological_processes:
  - preferred_term: antiviral innate immune response
    term:
      id: GO:0140374
      label: antiviral innate immune response
  - preferred_term: defense response to virus
    term:
      id: GO:0051607
      label: defense response to virus
  evidence:
  - reference: PMID:24555472
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Interferon-stimulated gene (ISG) products take on a number of diverse roles.
      Collectively, they are highly effective at resisting and controlling pathogens.
    explanation: >-
      Establishes the ISG-mediated antiviral state of this node — ISG products are
      collectively highly effective at resisting and controlling pathogens. Evidence
      source is OTHER as this is a review article.
  - reference: PMID:24555472
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Several ISGs that directly inhibit virus infection are described with an
      emphasis on those that impact early and late stages of the virus life cycle.
    explanation: >-
      Confirms that individual ISGs directly inhibit viral infection across the virus
      life cycle, the effector mechanism of the antiviral state. Evidence source is
      OTHER as this is a review article.
  downstream:
  - target: Restriction of Viral Replication
    description: >-
      The antiviral state directly restricts viral replication, the protective
      output of the pathway.
  - target: Viral Interferon Antagonism and Innate Immune Evasion
    description: >-
      Successful viruses encode dedicated antagonists that suppress this interferon
      pathway to escape restriction.

- name: Restriction of Viral Replication
  description: >-
    The protective output of the pathway is restriction of viral replication and a
    measurable clinical benefit when the response is intact or therapeutically
    augmented. Clinically, supplying the pathway's upstream cytokine reproduces this
    output: in a randomized trial a single dose of pegylated interferon lambda
    significantly reduced COVID-19 hospitalization/emergency events, lowered viral
    load, and — reflecting the broad-spectrum, host-directed nature of the
    interferon response — worked consistently across dominant SARS-CoV-2 variants.
    This consequence node is the antiviral effect the innate interferon response is
    deployed (or pharmacologically reinforced) to achieve.
  role: consequence
  biological_processes:
  - preferred_term: negative regulation of viral genome replication
    term:
      id: GO:0045071
      label: negative regulation of viral genome replication
  evidence:
  - reference: PMID:36780676
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Among predominantly vaccinated outpatients with Covid-19, the incidence of
      hospitalization or an emergency department visit (observation for >6 hours) was
      significantly lower among those who received a single dose of pegylated
      interferon lambda than among those who received placebo.
    explanation: >-
      Randomized-trial evidence that augmenting the interferon response (pegylated
      interferon lambda) restricts disease, the clinical output of this consequence
      node. Evidence source is HUMAN_CLINICAL as this is a randomized controlled
      trial.
  - reference: PMID:36780676
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      The effects were consistent across dominant variants and independent of
      vaccination status.
    explanation: >-
      Supports the broad-spectrum, variant-independent nature of the interferon-based
      antiviral effect. Evidence source is HUMAN_CLINICAL as this is a randomized
      controlled trial.
  downstream: []

- name: Viral Interferon Antagonism and Innate Immune Evasion
  description: >-
    Every virus that succeeds in a host must blunt the interferon response, so
    dedicated viral antagonists that suppress interferon induction or signaling are
    near-universal. The prototype is the influenza A virus NS1 protein, a
    multifunctional immune modulator whose functions include inhibition of the type I
    interferon system in infected cells and sequestration of double-stranded RNA so
    it escapes sensing; together these let the virus evade immune surveillance and
    establish infection. This evasion branch off the antiviral-state node is the
    conceptual mirror of therapeutic interferon augmentation — where a drug reinforces
    the pathway, the virus tears it down — and explains why an otherwise competent
    innate response can still fail to contain a well-adapted virus. Conforming entries
    can attach a virus-specific interferon antagonist (NS1, and the SARS-CoV-2 ORF and
    nsp antagonists) to this node.
  role: adaptive_escape
  biological_processes:
  - preferred_term: symbiont-mediated suppression of host type I interferon-mediated signaling pathway
    term:
      id: GO:0039502
      label: symbiont-mediated suppression of host type I interferon-mediated signaling pathway
  evidence:
  - reference: PMID:18220965
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Among its multiple functions are the inhibition of the type I interferon (IFN)
      system in infected cells, the binding and sequestration of dsRNA
    explanation: >-
      Pins the viral interferon-antagonism mechanism of this node — influenza NS1
      inhibits the type I interferon system and sequesters dsRNA to evade sensing.
      Evidence source is OTHER as this is a review article.
  - reference: PMID:18220965
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      allows influenza virus to efficiently escape the immune surveillance and to
      establish infection in the host.
    explanation: >-
      States the consequence of viral interferon antagonism — escape from immune
      surveillance and establishment of infection. Evidence source is OTHER as this
      is a review article.
