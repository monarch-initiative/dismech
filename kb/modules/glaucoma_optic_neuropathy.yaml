name: Glaucomatous Optic Neuropathy Module
description: >-
  A conserved neurodegenerative module representing the final common pathway of
  glaucoma: impaired aqueous humor outflow raises intraocular pressure, which
  imposes mechanical and oxidative stress on the optic nerve head and drives
  progressive retinal ganglion cell apoptosis and optic nerve degeneration.
  Primary open-angle, angle-closure, exfoliation, and secondary glaucomas differ
  in the upstream cause of outflow obstruction but converge on this
  pressure-related retinal ganglion cell loss. Individual disorder entries declare
  conformance via conforms_to on their pathophysiology nodes, substituting the
  disorder-specific outflow lesion (trabecular ECM accumulation, exfoliation
  material deposition, angle closure, neovascular membrane) while preserving the
  conserved IOP-to-neurodegeneration chain.
category: Module
creation_date: "2026-06-06T00:00:00Z"
notes: >-
  This is a mechanism module, not a specific disease. Disorder entries reference
  individual nodes via conforms_to (e.g.,
  "glaucoma_optic_neuropathy#Retinal Ganglion Cell Apoptosis"). Conforming nodes
  should substitute the disorder-specific cause of raised outflow resistance
  (juxtacanalicular ECM accumulation in POAG, pupillary block/angle closure in
  angle-closure glaucoma, fibrillar exfoliation material in exfoliation glaucoma,
  MYOC/trabecular gene defects in juvenile glaucoma). Normal-tension glaucoma is a
  partial exception in which RGC loss occurs at statistically normal IOP.
pathophysiology:
- name: Trabecular Meshwork Outflow Dysfunction
  description: >-
    The trabecular meshwork in the iridocorneal angle is the principal drainage
    pathway for aqueous humor. Accumulation and reorganization of extracellular
    matrix in the juxtacanalicular tissue, loss of trabecular cellularity, and
    cytoskeletal stiffening increase resistance to aqueous outflow. This outflow
    dysfunction is the conserved initiating lesion across most glaucomas.
  role: trigger
  biological_processes:
  - preferred_term: Trabecular ECM Organization
    term:
      id: GO:0030198
      label: extracellular matrix organization
    modifier: DYSREGULATED
  evidence:
  - reference: PMID:32561029
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      The trabecular meshwork, located within the iridocorneal angle, is the main
      pathway for drainage of aqueous humor (AH) out of the eye, and its
      dysfunction is responsible for the IOP elevation.
    explanation: >-
      Directly establishes trabecular meshwork dysfunction as the cause of
      impaired aqueous outflow and IOP elevation, the conserved initiating lesion.
      Evidence source is OTHER because this is a literature review.
  downstream:
  - target: Elevated Intraocular Pressure
- name: Elevated Intraocular Pressure
  description: >-
    Increased resistance to aqueous humor drainage raises intraocular pressure.
    Elevated IOP is the principal modifiable risk factor for glaucoma and the
    proximate mechanical stressor transmitted to the optic nerve head and lamina
    cribrosa, where the retinal ganglion cell axons exit the eye.
  role: amplifier
  evidence:
  - reference: PMID:32561029
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Glaucoma is a blinding optic neuropathy, the main risk factor for which is
      increased intraocular pressure (IOP).
    explanation: >-
      Identifies elevated IOP as the principal risk factor linking outflow
      dysfunction to glaucomatous optic neuropathy. Evidence source is OTHER
      because this is a literature review.
  - reference: PMID:33670885
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      The resistance of AH drainage through this pathway results in IOP increase
      and TM degeneration
    explanation: >-
      Confirms that aqueous outflow resistance directly produces the IOP increase
      this node represents. Evidence source is OTHER because this is a review
      article.
  downstream:
  - target: Retinal Ganglion Cell Apoptosis
- name: Retinal Ganglion Cell Apoptosis
  description: >-
    Pressure-related mechanical stress at the optic nerve head, combined with
    oxidative stress, impaired axonal transport, and neurotrophin deprivation,
    triggers apoptosis of retinal ganglion cells. This is the central effector
    step of glaucomatous neurodegeneration and is shared across glaucoma subtypes.
  role: central_effector
  cell_types:
  - preferred_term: Retinal Ganglion Cell
    term:
      id: CL:0000740
      label: retinal ganglion cell
  biological_processes:
  - preferred_term: Neuron Apoptotic Process
    term:
      id: GO:0051402
      label: neuron apoptotic process
    modifier: INCREASED
  evidence:
  - reference: PMID:25914734
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      This disease is a neurodegenerative disorder characterized by high
      intraocular pressure, loss of retinal ganglion cells (apoptosis).
    explanation: >-
      Directly characterizes glaucoma as a neurodegenerative disorder defined by
      apoptotic loss of retinal ganglion cells, the central effector of this
      module. Evidence source is OTHER because this is a review article.
  - reference: PMID:25914734
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      they produce apoptosis of the neurons in the optic nerve head, degradation
      of the trabecular meshwork cells.
    explanation: >-
      Links oxidative free-radical injury to apoptosis of optic-nerve-head neurons
      and trabecular degeneration, supporting the apoptotic mechanism. Evidence
      source is OTHER because this is a review article.
  downstream:
  - target: Optic Nerve Degeneration and Neuroinflammation
- name: Optic Nerve Degeneration and Neuroinflammation
  description: >-
    Progressive retinal ganglion cell loss is accompanied by optic nerve axon
    degeneration and a glial neuroinflammatory response that further accelerates
    neurodegeneration. Oxidative DNA damage accumulating in the degenerating
    tissue amplifies this neuroinflammatory drive.
  role: effector
  biological_processes:
  - preferred_term: Neuroinflammatory Response
    term:
      id: GO:0150076
      label: neuroinflammatory response
    modifier: INCREASED
  evidence:
  - reference: PMID:33670885
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      oxidative DNA damage accumulates in this degenerating TM, accelerating a
      neuroinflammation process which drives the neurodegeneration in POAG
      pathology
    explanation: >-
      Describes a neuroinflammatory process accelerating the neurodegeneration
      that characterizes this effector step. Evidence source is OTHER because this
      is a review article.
  downstream:
  - target: Progressive Glaucomatous Optic Neuropathy
- name: Progressive Glaucomatous Optic Neuropathy
  description: >-
    Cumulative retinal ganglion cell and axon loss produces the characteristic
    optic disc cupping, retinal nerve fiber layer thinning, and progressive,
    irreversible visual field loss that define glaucoma as a clinical entity.
  role: consequence
  cell_types:
  - preferred_term: Retinal Ganglion Cell
    term:
      id: CL:0000740
      label: retinal ganglion cell
  biological_processes:
  - preferred_term: Neuron Apoptotic Process
    term:
      id: GO:0051402
      label: neuron apoptotic process
    modifier: INCREASED
  evidence:
  - reference: PMID:33670885
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      progressive degeneration of retinal ganglion cells (RGC) with a specific
      pattern of changes in the optic nerve head and retinal nerve fiber layer
    explanation: >-
      Describes the progressive RGC degeneration with optic nerve head and nerve
      fiber layer changes that define glaucomatous optic neuropathy, the endpoint
      of this module. Evidence source is OTHER because this is a review article.
  - reference: PMID:32561029
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Glaucoma is a blinding optic neuropathy
    explanation: >-
      Confirms that the clinical consequence of this pathway is a blinding optic
      neuropathy. Evidence source is OTHER because this is a literature review.
