name: ER Protein Storage Disease Module
description: >-
  A conserved pathological module representing hepatocellular endoplasmic
  reticulum (ER) storage disease: a mutant secretory protein misfolds during
  biogenesis, is retained and polymerized within the hepatocyte ER instead of
  being secreted, and imposes proteotoxic gain-of-function stress on the cell.
  Saturation of ER-associated degradation and autophagy drives chronic
  hepatocyte injury, and the resulting cycle of death and regeneration
  activates hepatic stellate cells, producing progressive fibrosis and
  cirrhosis. The conserved core is shared across ER storage hepatopathies,
  the prototype being Z alpha-1 antitrypsin (Z-AAT) polymer retention; mutant
  fibrinogen retention in hepatic fibrinogen storage disease (HFSD) follows
  the same cascade with a different stored protein. The terminal fibrotic step
  conforms to the conserved fibrotic response module.
category: Module
creation_date: "2026-05-16T00:00:00Z"
updated_date: "2026-05-16T00:00:00Z"
notes: >-
  This is a mechanism module, not a specific disease. Disorder entries
  reference individual nodes via conforms_to (e.g.,
  "er_protein_storage_disease#Hepatic Protein Aggregation"). The module
  defines the expected pathophysiology structure; conforming nodes in
  disorder files should substitute the disorder-specific stored protein and
  gene (SERPINA1/Z-AAT for alpha-1 antitrypsin deficiency, FGG for hepatic
  fibrinogen storage disease) while preserving the conserved ER-retention →
  ER stress → hepatocyte injury → stellate-cell-mediated fibrosis chain.
  Reduced circulating levels of the affected secretory protein (e.g.,
  hypofibrinogenemia, low serum AAT) are a secondary loss-of-secretion
  consequence handled in the disorder entries, not in this hepatocyte-toxicity
  module. Evidence here is drawn from the prototypical Z-AAT exemplar; it
  documents the conserved cascade rather than any single disease.
pathophysiology:
- name: Hepatic Protein Aggregation
  description: >-
    A mutant secretory protein misfolds during biogenesis in the hepatocyte
    and a large fraction (e.g., ~85% of Z-AAT in the PiZZ genotype) is retained
    within the endoplasmic reticulum rather than being secreted. The retained
    protein adopts ordered polymerized or aggregated conformations forming
    intracellular inclusions, leaving the circulating protein deficient while
    imposing a proteotoxic burden on the hepatocyte.
  role: trigger
  cell_types:
  - preferred_term: hepatocyte
    term:
      id: CL:0000182
      label: hepatocyte
  evidence:
  - reference: PMID:28752441
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "These homozygous individuals synthesize large quantities of a1AT mutant Z protein in the liver, but the mutant protein folds improperly during biogenesis and approximately 85% of the molecules are retained within the hepatocytes rather than appropriately secreted."
    explanation: >-
      Documents the prototypical ER-storage step (Z-AAT): biogenesis
      misfolding and ~85% hepatocyte ER retention of a mutant secretory
      protein, the conserved trigger of this module.
  - reference: PMID:39440224
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Alpha-1 antitrypsin deficiency (AATD) is a genetic disorder characterized by the misfolding and accumulation of the mutant variant of alpha-1 antitrypsin (AAT) within hepatocytes, which limits its access to the circulation and exposes the lungs to protease-mediated tissue damage."
    explanation: >-
      Confirms the conserved misfolding-and-intrahepatocyte-accumulation
      model, with reduced circulating protein as a secondary
      loss-of-secretion consequence.
  downstream:
  - target: ER Stress and Unfolded Protein Response
    description: >-
      Intracellular accumulation of misfolded/polymerized protein imposes
      proteotoxic stress on the ER, activating ER stress responses.

- name: ER Stress and Unfolded Protein Response
  description: >-
    Accumulation of misfolded and polymerized protein in the ER lumen imposes
    sustained proteotoxic stress, activating the unfolded protein response and
    ER-overload signaling. ER-associated degradation and autophagic clearance
    are progressively saturated, sustaining and amplifying the cellular stress
    state.
  role: amplifier
  cell_types:
  - preferred_term: hepatocyte
    term:
      id: CL:0000182
      label: hepatocyte
  biological_processes:
  - preferred_term: response to endoplasmic reticulum stress
    term:
      id: GO:0034976
      label: response to endoplasmic reticulum stress
    modifier: INCREASED
  - preferred_term: endoplasmic reticulum unfolded protein response
    term:
      id: GO:0030968
      label: endoplasmic reticulum unfolded protein response
    modifier: INCREASED
  evidence:
  - reference: PMID:28752441
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "This intracellular death cascade appears to involve ER stress, mitochondrial depolarization, and caspase cleavage, and is possibly linked to autophagy and redox injury."
    explanation: >-
      Identifies ER stress as the proximal amplifying signal that couples
      retained-protein burden to the hepatocyte death cascade.
  downstream:
  - target: Hepatocyte Injury
    description: >-
      Sustained ER stress and saturation of degradative clearance drive
      hepatocyte death.

- name: Hepatocyte Injury
  description: >-
    Sustained ER stress and the intracellular polymer burden trigger
    mitochondrial depolarization and caspase-mediated apoptosis, with
    saturation of autophagic clearance and redox injury, producing chronic
    hepatocyte death and compensatory regeneration.
  role: effector
  cell_types:
  - preferred_term: hepatocyte
    term:
      id: CL:0000182
      label: hepatocyte
  biological_processes:
  - preferred_term: apoptotic process
    term:
      id: GO:0006915
      label: apoptotic process
    modifier: INCREASED
  - preferred_term: autophagy
    term:
      id: GO:0006914
      label: autophagy
  evidence:
  - reference: PMID:28752441
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "This intracellular death cascade appears to involve ER stress, mitochondrial depolarization, and caspase cleavage, and is possibly linked to autophagy and redox injury."
    explanation: >-
      Defines the hepatocyte death cascade (mitochondrial depolarization,
      caspase cleavage, autophagy, redox injury) driven by the retained
      protein, the conserved injury effector of this module.
  downstream:
  - target: Stellate Cell Activation and Fibrosis
    description: >-
      The chronic cycle of hepatocyte death and regeneration activates
      hepatic stellate cells and initiates fibrosis.

- name: Stellate Cell Activation and Fibrosis
  conforms_to: "fibrotic_response#Mesenchymal Cell Activation"
  description: >-
    The chronic cycle of hepatocyte death and compensatory regeneration
    activates quiescent hepatic stellate cells, which transdifferentiate into
    collagen-producing myofibroblasts under TGF-beta signaling. Progressive
    collagen deposition drives bridging fibrosis and cirrhosis. This terminal
    step conforms to the conserved fibrotic response: the hepatic stellate
    cell is the organ-specific substitution for the generic activated
    mesenchymal cell.
  role: central_effector
  cell_types:
  - preferred_term: hepatocyte
    term:
      id: CL:0000182
      label: hepatocyte
  - preferred_term: hepatic stellate cell
    term:
      id: CL:0000632
      label: hepatic stellate cell
  - preferred_term: Myofibroblast
    term:
      id: CL:0000186
      label: myofibroblast cell
  biological_processes:
  - preferred_term: TGF-beta Receptor Signaling
    term:
      id: GO:0007179
      label: transforming growth factor beta receptor signaling pathway
    modifier: INCREASED
  - preferred_term: collagen fibril organization
    term:
      id: GO:0030199
      label: collagen fibril organization
    modifier: INCREASED
  evidence:
  - reference: PMID:28752441
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "This chronic cycle of cell death and regeneration activates hepatic stellate cells and initiates the process of hepatic fibrosis."
    explanation: >-
      Establishes hepatic stellate cell activation as the link between
      chronic hepatocyte injury and progressive fibrosis, the conserved
      terminal effector that conforms to fibrotic_response#Mesenchymal Cell
      Activation.
  - reference: PMID:22500781
    supports: PARTIAL
    evidence_source: HUMAN_CLINICAL
    snippet: "Alpha-1 antitrypsin deficiency (AATD) is a relatively common, but under-recognized condition which manifests commonly with liver cirrhosis and emphysema."
    explanation: >-
      Confirms cirrhosis as the clinical endpoint of the ER-storage
      hepatopathy in the prototypical exemplar; partial because the quote
      establishes the cirrhotic outcome without detailing the stellate-cell
      mechanism.
