name: Nephrotic Podocyte Injury Module
description: >-
  A conserved podocytopathy module representing the convergent glomerular
  filtration barrier failure that underlies nephrotic syndrome across primary
  and secondary causes. A podocyte insult — a circulating permeability factor,
  an immune or toxic mechanism, or an inherited slit-diaphragm/cytoskeleton gene
  defect (e.g., nephrin, podocin, actin-regulating proteins) — destabilizes the
  podocyte actin cytoskeleton, triggering foot process effacement and slit
  diaphragm disruption. Loss of this junctional architecture breaks the
  size- and charge-selective glomerular filtration barrier, producing massive
  proteinuria with progressive podocyte detachment, loss, and glomerulosclerosis.
  The convergent clinical consequence is nephrotic syndrome (nephrotic-range
  proteinuria, hypoalbuminemia, edema, and hyperlipidemia). Minimal change
  disease, focal segmental glomerulosclerosis, genetic NPHS1/NPHS2 podocyte-gene
  disorders, and secondary nephrotic syndromes all converge on this chain;
  conforming disorder nodes substitute the disorder-specific initiating lesion
  while preserving the conserved causal sequence.
category: Module
creation_date: "2026-06-06T00:00:00Z"
notes: >-
  This is a mechanism module, not a specific disease. Disorder entries reference
  individual nodes via conforms_to (e.g.,
  "nephrotic_podocyte_injury#Glomerular Filtration Barrier Breakdown"). The
  module defines the expected pathophysiology structure; conforming nodes in
  disorder files should include the corresponding podocyte cell type, biological
  processes, and causal edges, specialized to their etiologic context. Key
  disorder-specific substitutions: genetic forms substitute the mutated
  slit-diaphragm/cytoskeleton gene product (nephrin in NPHS1, podocin in NPHS2);
  minimal change disease and primary FSGS substitute a circulating permeability
  factor or immune mechanism as the trigger; secondary forms (diabetic
  nephropathy, lupus, membranous) substitute their specific glomerular insult
  while preserving podocyte injury as the central lesion.
pathophysiology:
- name: Podocyte Injury
  description: >-
    A circulating permeability factor, immune or toxic mechanism, or an
    inherited mutation in a slit-diaphragm or cytoskeletal protein (nephrin,
    podocin, or actin-regulating proteins) injures the glomerular podocyte.
    Across primary, genetic, and secondary nephrotic syndromes the initiating
    lesion converges on the podocyte and its actin cytoskeleton, the central
    target whose perturbation begins the pathway to filtration barrier failure.
  role: trigger
  cell_types:
  - preferred_term: podocyte
    term:
      id: CL:0000653
      label: podocyte
  biological_processes:
  - preferred_term: actin cytoskeleton organization
    term:
      id: GO:0030036
      label: actin cytoskeleton organization
    modifier: ABNORMAL
  evidence:
  - reference: PMID:27744657
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Primary or idiopathic FSGS is considered to be related to podocyte
      injury, and the pathogenesis of podocyte injury has been actively
      investigated. Several circulating factors affecting podocyte permeability
      barrier have been proposed, but not proven to cause FSGS. FSGS may also be
      caused by genetic alterations. These genes are mainly those regulating
      slit diaphragm structure, actin cytoskeleton of podocytes, and foot
      process structure.
    explanation: >-
      Review evidence establishes podocyte injury as the central lesion and
      lists the converging triggers — circulating permeability factors and
      genetic defects in slit diaphragm, actin cytoskeleton, and foot process
      structure. Evidence source is OTHER because this is a pathogenesis review.
  - reference: PMID:16082994
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      it has become obvious that the podocyte is crucial in the pathogenesis of
      not only genetic but also of many acquired glomerulopathies such as focal
      segmental glomerulosclerosis, membranous glomerulopathy and diabetic
      nephropathy.
    explanation: >-
      Establishes that the podocyte is the conserved central target across
      genetic and acquired glomerulopathies, supporting podocyte injury as the
      shared trigger node. Evidence source is OTHER because this is a review.
  downstream:
  - target: Foot Process Effacement and Slit Diaphragm Disruption

- name: Foot Process Effacement and Slit Diaphragm Disruption
  description: >-
    Injured podocytes reorganize their actin cytoskeleton, leading to foot
    process effacement and disruption of the slit diaphragm — the specialized
    cell-cell junction between adjacent podocyte foot processes. The slit
    diaphragm backbone protein nephrin and the adaptor podocin normally link the
    junction to the foot process actin bundles; loss of this junctional adhesion
    is a stereotyped change seen across all forms of nephrotic syndrome.
  role: amplifier
  cell_types:
  - preferred_term: podocyte
    term:
      id: CL:0000653
      label: podocyte
  biological_processes:
  - preferred_term: cell-cell junction organization
    term:
      id: GO:0045216
      label: cell-cell junction organization
    modifier: DECREASED
  - preferred_term: cell adhesion
    term:
      id: GO:0007155
      label: cell adhesion
    modifier: DECREASED
  evidence:
  - reference: PMID:16082994
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Injury to the podocyte often leads to a reorganisation of the slit
      diaphragm and to foot process effacement, which can be noted in all forms
      of the nephrotic syndrome.
    explanation: >-
      Directly links podocyte injury to slit diaphragm reorganization and foot
      process effacement as a stereotyped change common to all forms of
      nephrotic syndrome. Evidence source is OTHER because this is a review.
  - reference: PMID:33970139
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Podocyte foot processes contain actin bundles that bind to cytoskeletal
      adaptor proteins such as podocin. Those adaptor proteins, such as podocin,
      link the backbone of the glomerular slit diaphragm, such as nephrin, to
      the actin cytoskeleton.
    explanation: >-
      Describes the molecular architecture coupling the slit diaphragm (nephrin)
      via podocin to foot process actin, the junctional and cytoskeletal system
      disrupted at this step. Evidence source is OTHER because this is a methods
      paper reviewing podocyte protein organization.
  downstream:
  - target: Glomerular Filtration Barrier Breakdown

- name: Glomerular Filtration Barrier Breakdown
  description: >-
    Loss of foot process and slit diaphragm integrity, together with podocyte,
    glomerular basement membrane, and endothelial dysfunction, breaks down the
    size- and charge-selective glomerular filtration barrier. The barrier can no
    longer restrain plasma proteins, so albumin and larger proteins pass into the
    urinary space. This is the central effector step that converts a podocyte
    structural lesion into pathological filtration.
  role: central_effector
  cell_types:
  - preferred_term: podocyte
    term:
      id: CL:0000653
      label: podocyte
  biological_processes:
  - preferred_term: glomerular filtration
    term:
      id: GO:0003094
      label: glomerular filtration
    modifier: ABNORMAL
  - preferred_term: renal filtration
    term:
      id: GO:0097205
      label: renal filtration
    modifier: ABNORMAL
  evidence:
  - reference: PMID:33490112
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      any glomerular insult may alter the glomerular filtration barrier, which
      in turn is composed by the podocyte, the glomerular basement membrane, and
      the capillary endothelial cell.
    explanation: >-
      States that glomerular insults alter the filtration barrier and defines
      its podocyte/GBM/endothelial composition, supporting barrier breakdown as
      the central effector. Evidence source is OTHER because this is a review.
  - reference: PMID:33970139
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Disruption of the glomerular filter composed of the glomerular
      endothelium, glomerular basement membrane and podocytes, results in
      albuminuria.
    explanation: >-
      Directly connects disruption of the glomerular filter to albuminuria,
      i.e., failure of the filtration barrier producing protein loss. Evidence
      source is OTHER because this is a methods paper reviewing the glomerular
      filter.
  downstream:
  - target: Massive Proteinuria with Podocyte Loss

- name: Massive Proteinuria with Podocyte Loss
  description: >-
    Sustained barrier failure produces massive proteinuria. Because podocytes
    are terminally differentiated and do not normally divide, ongoing injury
    leads to their detachment from the glomerular basement membrane and
    progressive podocyte loss. Once podocyte loss exceeds a critical threshold in
    a glomerulus, glomerulosclerosis develops and the glomerulus is progressively
    obliterated, establishing chronic, often progressive disease.
  role: effector
  cell_types:
  - preferred_term: podocyte
    term:
      id: CL:0000653
      label: podocyte
  biological_processes:
  - preferred_term: glomerular filtration
    term:
      id: GO:0003094
      label: glomerular filtration
    modifier: ABNORMAL
  evidence:
  - reference: PMID:33490112
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      As the insult progresses, podocytes start to detach from the glomerular
      basement membrane. When the podocyte loss is over 40% in a glomerulus,
      glomerulosclerosis develops, and obliteration of the glomerulus is the
      rule. In clinical grounds, this phenomenon is diagnosed mainly by
      proteinuria and a decline in glomerular filtration rate.
    explanation: >-
      Directly links progressive podocyte detachment and loss to
      glomerulosclerosis and proteinuria, the effector step of the module.
      Evidence source is OTHER because this is a review.
  - reference: PMID:31126248
    supports: SUPPORT
    evidence_source: MODEL_ORGANISM
    snippet: >-
      Angptl3 knockout effectively delayed glomerulosclerosis formation by
      attenuating podocyte loss through rescuing podocytes from detachment and
      apoptosis.
    explanation: >-
      Murine adriamycin nephropathy data show that reducing podocyte detachment
      and loss delays glomerulosclerosis, confirming the causal podocyte-loss to
      glomerulosclerosis link. Evidence source is MODEL_ORGANISM (mouse model).
  downstream:
  - target: Nephrotic Syndrome

- name: Nephrotic Syndrome
  description: >-
    The convergent clinical consequence of glomerular filtration barrier failure
    is nephrotic syndrome: nephrotic-range proteinuria with hypoalbuminemia,
    peripheral edema, and hyperlipidemia. Whatever the initiating podocyte
    insult — minimal change disease, focal segmental glomerulosclerosis, genetic
    podocyte-gene disorders, or secondary causes — the disease-defining
    phenotype is shared, with complications including thrombosis and infection.
  role: consequence
  evidence:
  - reference: PMID:30454752
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Nephrotic syndrome is characterized by edema, proteinuria,
      hypoalbuminemia, and hyperlipidemia.
    explanation: >-
      Defines the convergent clinical phenotype of nephrotic syndrome, the
      consequence node of the module. Evidence source is OTHER because this is a
      review.
  - reference: PMID:26977832
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Most cases of NS are considered idiopathic or primary; membranous
      nephropathy and focal segmental glomerulosclerosis are the most common
      histologic subtypes of primary NS in adults.
    explanation: >-
      Confirms that distinct primary glomerulopathies converge on the shared
      nephrotic syndrome phenotype, supporting it as the conserved consequence.
      Evidence source is OTHER because this is a review.
