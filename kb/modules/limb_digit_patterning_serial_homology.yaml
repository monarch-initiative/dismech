name: Limb and Digit Patterning Serial Homology Module
description: >-
  A conserved developmental-patterning module that explains why a single
  patterning lesion produces a phenotype "bundle" repeated across serially
  homologous skeletal elements — most strikingly the autopod, where fingers and
  toes are patterned by the same molecular machinery and therefore tend to be
  malformed together. The anteroposterior axis of the limb is set by a gradient
  of GLI3 transcriptional repressor, generated by PKA-dependent processing of
  GLI3 and antagonized by long-range Sonic hedgehog (SHH) signaling from the
  posterior zone of polarizing activity; Indian hedgehog (IHH), the HOXD gene
  cluster, FGF8 from the apical ectodermal ridge, and WNT signaling provide the
  other patterning inputs that specify digit number, identity, and segment
  length. A dosage or activity change in any of these conserved signals perturbs
  digit-number and digit-identity specification, and because the homologous
  program operates in fore- and hindlimb autopods, the resulting malformation —
  polydactyly, syndactyly, brachydactyly, ectrodactyly, or triphalangism —
  characteristically appears in both hands and feet. Greig cephalopolysyndactyly
  and Pallister-Hall syndrome (GLI3 dosage), brachydactyly type A1 (IHH), and
  split-hand/foot malformation (HOXD/AER) differ in the upstream signal but
  converge on this serially homologous autopod phenotype. Conforming disorder
  entries declare conformance via conforms_to, substituting the disorder-specific
  patterning gene (GLI3, IHH, SHH/ZRS, HOXD13, TP63, WNT10B) while preserving the
  perturbed-patterning-to-serially-homologous-malformation chain.
category: Module
creation_date: "2026-06-28T00:00:00Z"
notes: >-
  This is a mechanism module, not a specific disease. Disorder entries reference
  individual nodes via conforms_to (e.g.,
  "limb_digit_patterning_serial_homology#Serially Homologous Autopod
  Malformation"). The biological motivation is serial homology: the autopod
  patterning program is reused across fore- and hindlimb, so a single lesion
  yields a recurrent multi-element phenotype bundle (hand + foot digit anomalies)
  rather than an isolated defect. Conforming nodes should substitute the
  disorder-specific patterning input at the trigger node (GLI3 repressor dosage in
  the Greig/Pallister-Hall spectrum, IHH in brachydactyly A1, SHH/ZRS in preaxial
  polydactyly, HOXD13 in synpolydactyly, TP63/WNT10B in split-hand/foot
  malformation) and specialize the autopod phenotype (preaxial vs. postaxial
  polydactyly, syndactyly, brachydactyly, ectrodactyly) at the consequence node.
  Modules bind GO and CL terms only.
pathophysiology:
- name: Limb Patterning Signal Perturbation
  description: >-
    The conserved initiating lesion is a dosage or activity change in a core
    limb-patterning signal. The anteroposterior axis is governed by a GLI3
    repressor gradient that is generated by PKA-dependent GLI3 processing and
    antagonized by posterior SHH; loss of GLI3 dosage, deregulated production of
    truncated GLI3, or altered Hedgehog ligand (SHH, IHH) signaling perturbs this
    gradient. HOXD-cluster, FGF8/apical-ectodermal-ridge, and WNT inputs provide
    the additional patterning information that the lesion disrupts.
  role: trigger
  biological_processes:
  - preferred_term: Smoothened Signaling Pathway
    term:
      id: GO:0007224
      label: smoothened signaling pathway
    modifier: ABNORMAL
  evidence:
  - reference: PMID:10693759
    supports: SUPPORT
    evidence_source: MODEL_ORGANISM
    snippet: PKA-dependent processing of vertebrate Gli3 in developing limb similarly generates a potent repressor in a manner antagonized by apparent long-range signaling from posteriorly localized Sonic hedgehog protein
    explanation: >-
      Establishes the conserved SHH-antagonized GLI3-repressor gradient as the
      anteroposterior limb-patterning mechanism whose perturbation triggers this
      module. Evidence source is MODEL_ORGANISM because this is a developmental
      study in vertebrate (chick/mouse) limb.
  - reference: PMID:10693759
    supports: SUPPORT
    evidence_source: MODEL_ORGANISM
    snippet: The resulting anterior/posterior Gli3 repressor gradient can be perturbed by mutations of Gli3 in human genetic syndromes
    explanation: >-
      Directly links perturbation of the GLI3 repressor gradient to human limb
      malformation syndromes. Evidence source is MODEL_ORGANISM because the
      gradient mechanism is established in developmental model systems.
  downstream:
  - target: Disrupted Digit Number and Identity Specification
- name: Disrupted Digit Number and Identity Specification
  description: >-
    Perturbation of the patterning gradients changes how digit number, digit
    identity, and phalangeal segment length are specified in the autopod.
    Increased Hedgehog activity (or loss of GLI3 repressor) tends to add digits
    (polydactyly), whereas reduced Hedgehog/IHH signaling shortens or deletes
    skeletal segments (brachydactyly); the same deregulated patterning output
    underlies the polydactyly and Pallister-Hall phenotypes from truncated GLI3.
  role: central_effector
  cell_types:
  - preferred_term: Chondrocyte
    term:
      id: CL:0000138
      label: chondrocyte
  biological_processes:
  - preferred_term: Anterior/Posterior Pattern Specification
    term:
      id: GO:0009952
      label: anterior/posterior pattern specification
    modifier: ABNORMAL
  - preferred_term: Embryonic Limb Morphogenesis
    term:
      id: GO:0030326
      label: embryonic limb morphogenesis
    modifier: ABNORMAL
  evidence:
  - reference: PMID:10375510
    supports: SUPPORT
    evidence_source: MODEL_ORGANISM
    snippet: provide a molecular basis for the human Polydactyly type A and Pallister-Hall Syndrome phenotypes, derived from the deregulated production of C-terminally truncated GLI3 proteins
    explanation: >-
      Links deregulated GLI3 patterning output to the polydactyly and
      Pallister-Hall digit phenotypes. Evidence source is MODEL_ORGANISM because
      this is an experimental developmental study.
  - reference: PMID:21537345
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: these IHH mutations affect Hh signaling at multiple levels, causing abnormal bone development and abnormal digit formation
    explanation: >-
      Shows that altered Hedgehog (IHH) signaling disrupts digit formation, the
      central effector of this module. Evidence source is IN_VITRO because the
      mutations were characterized in cellular signaling assays.
  downstream:
  - target: Serially Homologous Autopod Malformation
- name: Serially Homologous Autopod Malformation
  description: >-
    Because the autopod patterning program is serially reused in fore- and
    hindlimb, the disrupted specification produces a recurrent phenotype bundle
    across homologous elements: digit anomalies — polydactyly, syndactyly,
    brachydactyly, ectrodactyly, or triphalangism — characteristically affecting
    both hands and feet. This serial homology is why a single patterning lesion
    yields a multi-element malformation bundle rather than an isolated defect.
  role: consequence
  cell_types:
  - preferred_term: Chondrocyte
    term:
      id: CL:0000138
      label: chondrocyte
  biological_processes:
  - preferred_term: Limb Morphogenesis
    term:
      id: GO:0035108
      label: limb morphogenesis
    modifier: ABNORMAL
  evidence:
  - reference: PMID:24736735
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: Typical GCPS combines polysyndactyly of hands and feet and craniofacial features
    explanation: >-
      Documents the serially homologous autopod bundle — polysyndactyly of both
      hands and feet — in a human GLI3-disorder cohort. Evidence source is
      HUMAN_CLINICAL.
  - reference: PMID:22140379
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: Seven subjects with deletions encompassing the HOXD cluster had hand/foot anomalies of varying severity, including syndactyly, brachydactyly, and ectrodactyly.
    explanation: >-
      Shows a single HOXD-cluster patterning lesion producing combined hand and
      foot digit anomalies (syndactyly, brachydactyly, ectrodactyly), the
      serially homologous bundle. Evidence source is HUMAN_CLINICAL.
  - reference: PMID:18629882
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: Brachydactyly type A1 is a limb malformation characterized by a uniform shortening of the middle phalanges in all digits.
    explanation: >-
      Illustrates the serially homologous output of an IHH patterning lesion —
      uniform middle-phalanx shortening across all digits (fingers and toes).
      Evidence source is HUMAN_CLINICAL.
