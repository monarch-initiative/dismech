    modifier: INCREASED
  evidence:
  - reference: PMID:26725515
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: >-
      This activates the kinases, which then bind adaptor proteins and
      phosphorylate cytoplasmic substrates, triggering downstream signalling
      cascades that control cell growth and differentiation202122.
    explanation: >-
      Supports the receptor activation and adaptor-docking trigger that starts
      the GRB2 signaling cascade.
  downstream:
  - target: GRB2 Adaptor Hub
    description: >-
      Activated RTKs recruit GRB2-containing adaptor complexes at
      phosphotyrosine docking sites.
    hypothesis_groups:
    - canonical_rtk_grb2_effector_model

- name: GRB2 Adaptor Hub
  description: >-
    GRB2 is the adaptor control point that links phosphorylated receptors and
    scaffold proteins to downstream signaling complexes. In cytoplasmic RTK
    signaling it recruits effector complexes that activate RAS-MAPK and
    PI3K-AKT pathways; in stressed tumor cells, GRB2 can also participate in
    nuclear DNA repair and replication-fork protection.
  role: central_effector
  genes:
  - preferred_term: GRB2
    term:
      id: hgnc:4566
      label: GRB2
  molecular_functions:
  - preferred_term: growth factor receptor binding
    term:
      id: GO:0070851
      label: growth factor receptor binding
  evidence:
  - reference: PMID:28058850
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Signaling by FGFR4 and other fibroblast growth factor receptors involves
      tyrosine phosphorylation of the receptor carboxyl terminus along with
      other substrates, such as FRS2, recruitment of the GRB2 adaptor, and
      activation of the downstream RAS and phosphoinositide 3-kinase pathways.
    explanation: >-
      Directly supports GRB2 recruitment as the adaptor step between RTKs and
      RAS/PI3K effector signaling.
  - reference: PMID:38459011
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: >-
      Growth factor receptor-bound protein 2 (GRB2) is a cytoplasmic adapter
      for tyrosine kinase signaling and a nuclear adapter for
      homology-directed-DNA repair.
    explanation: >-
      Supports GRB2 as a dual-function hub spanning cytoplasmic RTK signaling
      and nuclear DNA repair.
  downstream:
  - target: RAS-MAPK and PI3K-AKT Proliferation Output
    description: >-
      Cytoplasmic GRB2 adaptor complexes activate canonical RAS-MAPK and PI3K-AKT
      proliferative and survival signaling.
    hypothesis_groups:
    - canonical_rtk_grb2_effector_model
  - target: GRB2-Mediated Replication Fork Protection
    description: >-
      Nuclear GRB2 stabilizes RAD51 at stalled replication forks under
      replication stress.
    hypothesis_groups:
    - grb2_replication_fork_protection_model

