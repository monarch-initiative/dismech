      id: GO:0006260
      label: DNA replication
    modifier: DYSREGULATED
  - preferred_term: DNA damage response
    term:
      id: GO:0006974
      label: DNA damage response
    modifier: DYSREGULATED
  - preferred_term: positive regulation of DNA repair
    term:
      id: GO:0045739
      label: positive regulation of DNA repair
    modifier: INCREASED
  evidence:
  - reference: PMID:38459011
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: >-
      Mechanistically, GRB2 binds and inhibits RAD51 ATPase activity to
      stabilize RAD51 on stalled replication forks.
    explanation: >-
      Directly supports the molecular GRB2-RAD51 fork-protection mechanism.
  - reference: PMID:38459011
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: >-
      Collective findings unveil GRB2 function and mechanism for fork protection
      in the BRCA2-RAD51-MRE11 axis and suggest GRB2 as a potential therapeutic
      target and an enabling predictive biomarker for patient selection for
      PARPi and immunotherapy combination.
    explanation: >-
      Places GRB2 fork protection in the BRCA2-RAD51-MRE11 axis and connects it
      to PARP-inhibitor and immunotherapy response hypotheses.
  downstream:
  - target: GRB2 Loss PARPi-STING Vulnerability
    description: >-
      When GRB2-dependent fork protection is lost, PARP inhibition can release
      cytosolic DNA fragments and activate innate immune signaling.
    hypothesis_groups:
    - grb2_replication_fork_protection_model

