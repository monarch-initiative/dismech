- name: GRB2-Mediated Replication Fork Protection
  description: >-
    In the nucleus, GRB2 binds RAD51 and stabilizes RAD51 at stalled replication
    forks, protecting reversed forks from MRE11-mediated degradation in the
    BRCA2-RAD51 axis. This preserves genome integrity and suppresses release of
    fork-derived DNA fragments into the cytoplasm.
  role: adaptive_escape
  genes:
  - preferred_term: GRB2
    term:
      id: hgnc:4566
      label: GRB2
  - preferred_term: RAD51
    term:
      id: hgnc:9817
      label: RAD51
  - preferred_term: BRCA2
    term:
      id: hgnc:1101
      label: BRCA2
  biological_processes:
  - preferred_term: DNA replication
