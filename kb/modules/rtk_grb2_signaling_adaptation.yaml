name: RTK GRB2 Signaling Adaptation Module
description: >-
  A conserved oncology mechanism module for growth-factor and receptor tyrosine
  kinase (RTK) programs that signal through the GRB2 adaptor hub. Activated
  receptors create phosphotyrosine docking sites that recruit GRB2-containing
  complexes, coupling upstream RTK activity to RAS-MAPK and PI3K-AKT outputs
  that support proliferation, survival, and drug-adaptive fitness. The module
  also captures the emerging nuclear GRB2 function in RAD51-dependent
  replication-fork protection, linking the same adaptor control point to DNA
  damage response, PARP-inhibitor vulnerability, and innate immune activation
  when fork protection is lost.
category: Module
creation_date: "2026-05-26T21:37:17Z"
notes: >-
  This is a mechanism module, not a specific disease. Disorder entries reference
  individual nodes via conforms_to (for example,
  "rtk_grb2_signaling_adaptation#GRB2 Adaptor Hub"). The module is intended for
  RTK-driven cancers and signaling disorders where EGFR, ERBB2/HER2, FGFR,
  MET, KIT, ROS1, or related receptors converge on GRB2-mediated effector
  signaling. It also provides a bridge to DNA-damage and immunotherapy
  hypotheses when tumor-specific evidence supports GRB2-dependent replication
  fork protection or PARP-inhibitor/STING coupling.
mechanistic_hypotheses:
- hypothesis_group_id: canonical_rtk_grb2_effector_model
  hypothesis_label: Canonical RTK-GRB2 Effector Signaling Model
  status: CANONICAL
  description: >-
    Activated receptor tyrosine kinases recruit GRB2-containing adaptor
    complexes that connect receptor phosphorylation to RAS-MAPK and PI3K-AKT
    signaling outputs.
  evidence:
  - reference: PMID:28058850
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Signaling by FGFR4 and other fibroblast growth factor receptors involves
      tyrosine phosphorylation of the receptor carboxyl terminus along with
      other substrates, such as FRS2, recruitment of the GRB2 adaptor, and
      activation of the downstream RAS and phosphoinositide 3-kinase pathways.
    explanation: >-
      Review evidence states the canonical RTK-to-GRB2-to-RAS/PI3K pathway
      architecture that this module generalizes.
- hypothesis_group_id: grb2_replication_fork_protection_model
  hypothesis_label: GRB2 Replication-Fork Protection Model
  status: EMERGING
  description: >-
    GRB2 also functions in the nucleus to stabilize RAD51 at stalled replication
    forks, suppressing fork degradation, cytosolic DNA release, and innate
    immune activation under replication stress or PARP inhibition.
  evidence:
  - reference: PMID:38459011
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: >-
      Growth factor receptor-bound protein 2 (GRB2) is a cytoplasmic adapter
      for tyrosine kinase signaling and a nuclear adapter for
      homology-directed-DNA repair.
    explanation: >-
      Establishes the dual cytoplasmic and nuclear framing for GRB2, motivating
      a second hypothesis group beyond the canonical RTK effector model.
discussions:
- discussion_id: gap_grb2_cytoplasmic_nuclear_switch
  prompt: >-
    Which tumor states switch GRB2 from a cytoplasmic RTK adaptor role into a
    nuclear RAD51 replication-fork protection role, and does that switch predict
    combined PARP-inhibitor and immunotherapy response?
  kind: KNOWLEDGE_GAP
  status: OPEN
  attaches_to:
  - pathophysiology#GRB2 Adaptor Hub
  - pathophysiology#GRB2-Mediated Replication Fork Protection
  rationale: >-
    The module now captures both GRB2 signaling and DNA-repair functions, but
    disease entries will need tumor-specific evidence to decide whether these
    are parallel functions, sequential stress states, or distinct patient
    subtypes.
  proposed_experiments:
  - experiment_id: exp_grb2_rtk_ddr_state_switch
    name: Isogenic GRB2 RTK-DDR state-switch perturbation assay
    description: >-
      In RTK-driven cancer organoids or cell systems, perturb GRB2 abundance and
      RTK activity under replication stress and PARP inhibition; measure
      cytoplasmic GRB2 signaling output, nuclear RAD51 fork protection, cytosolic
      DNA, cGAS-STING activation, and immune-cell killing in co-culture.
    experiment_type:
      preferred_term: controlled perturbation experiment
    model_systems:
    - name: RTK-driven human cancer organoid or cell-line panel
      description: >-
        Matched RTK-activated cancer models with isogenic GRB2 perturbation and
        receptor inhibition or stimulation arms.
      experimental_model_type: CELL_LINE
      organism:
        preferred_term: human
        term:
          id: NCBITaxon:9606
          label: Homo sapiens
    perturbations:
    - name: GRB2 depletion or degradation
      target: pathophysiology#GRB2 Adaptor Hub
      genes:
      - preferred_term: GRB2
        term:
          id: hgnc:4566
          label: GRB2
      effect: DECREASED
    - name: PARP inhibitor replication-stress challenge
      target: pathophysiology#GRB2 Loss PARPi-STING Vulnerability
      description: >-
        Expose matched GRB2-intact and GRB2-depleted systems to PARP inhibition
        to test whether fork protection loss produces cytosolic DNA and innate
        immune activation.
    readouts:
    - name: GRB2-dependent RAS-MAPK and PI3K-AKT signaling
      target: pathophysiology#RAS-MAPK and PI3K-AKT Proliferation Output
      biological_processes:
      - preferred_term: MAPK cascade
        term:
          id: GO:0000165
          label: MAPK cascade
      - preferred_term: PI3K/AKT signal transduction
        term:
          id: GO:0043491
          label: phosphatidylinositol 3-kinase/protein kinase B signal transduction
      direction: POSITIVE
    - name: RAD51 fork protection and cGAS-STING activation
      target: pathophysiology#GRB2-Mediated Replication Fork Protection
      biological_processes:
      - preferred_term: DNA damage response
        term:
          id: GO:0006974
          label: DNA damage response
      - preferred_term: innate immune response
        term:
          id: GO:0045087
          label: innate immune response
      direction: NEGATIVE
      interpretation: >-
        Loss of RAD51 fork protection together with increased innate immune
        activation after GRB2 depletion would support a state switch from
        signaling adaptor to DDR vulnerability.
    controls:
    - name: Isogenic GRB2-intact control
      description: Matched model with endogenous GRB2 retained.
    - name: Receptor-inhibited control
      description: >-
        RTK inhibitor arm to separate cytoplasmic RTK signaling from nuclear
        fork protection.
    decision_criterion: >-
      The switch model is supported if GRB2 perturbation reduces RTK effector
      signaling and independently sensitizes replication-stressed cells to
      PARP-inhibitor-induced cytosolic DNA and innate immune activation.
    would_support:
    - pathophysiology#GRB2 Adaptor Hub
    - pathophysiology#GRB2-Mediated Replication Fork Protection
    - pathophysiology#GRB2 Loss PARPi-STING Vulnerability
    would_refute:
    - pathophysiology#GRB2-Mediated Replication Fork Protection
    evidence:
    - reference: PMID:38459011
      supports: SUPPORT
      evidence_source: IN_VITRO
      snippet: >-
        In GRB2-depleted cells, PARP inhibitor (PARPi) treatment releases DNA
        fragments from stalled forks into the cytoplasm that activate the
        cGAS-STING pathway to trigger pro-inflammatory cytokine production.
      explanation: >-
        Provides the experimental precedent for testing GRB2 depletion, PARP
        inhibition, fork-derived cytosolic DNA, and innate immune activation in
        disease-specific models.
pathophysiology:
- name: Activated RTK Phosphotyrosine Docking
  description: >-
    Ligand binding, mutation, amplification, fusion, or autocrine stimulation
    activates an RTK, promoting receptor dimerization and tyrosine
    phosphorylation. The phosphorylated receptor tail creates docking sites for
    adaptor proteins and cytoplasmic substrates.
  role: trigger
  molecular_functions:
  - preferred_term: transmembrane receptor protein tyrosine kinase activity
    term:
      id: GO:0004714
      label: transmembrane receptor protein tyrosine kinase activity
    modifier: INCREASED
  biological_processes:
