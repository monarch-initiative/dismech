name: Molecular Mimicry Autoimmunity Module
description: >-
  A conserved pathophysiology module representing post-infectious (and, more
  broadly, antigen-triggered) autoimmunity initiated by molecular mimicry.
  Across many disorders, an infectious or environmental antigen shares sequence
  or structural similarity with a host self-antigen; in a genetically
  susceptible individual (often HLA-restricted), this cross-reactive antigen
  activates autoreactive T and/or B lymphocytes that were not deleted by
  central tolerance. The resulting cross-reactive antibodies and effector T
  cells attack the mimicked self-tissue, and tissue damage releases additional
  self-antigens that prime further self-reactive clones (epitope spreading),
  converting a self-limited cross-reactive response into a self-sustaining,
  tissue-specific autoimmune disease. Conforming disorder nodes substitute the
  disorder-specific mimic pair (the pathogen/environmental epitope and the
  cross-reactive self-antigen) and the targeted tissue while preserving the
  conserved trigger -> cross-reactive lymphocyte activation -> effector tissue
  injury -> epitope spreading -> autoimmune disease chain.
category: Module
creation_date: "2026-06-28T00:00:00Z"
notes: >-
  This is a mechanism module, not a specific disease. Disorder entries reference
  individual nodes via conforms_to (e.g.,
  "molecular_mimicry_autoimmunity#Cross-Reactive Autoreactive Lymphocyte
  Activation"). The module defines the expected pathophysiology structure;
  conforming nodes in disorder files should include the corresponding cell
  types, biological processes, and causal edges, specialized to their disease
  context. Key disorder-specific substitutions of the mimic pair: Guillain-Barre
  syndrome uses Campylobacter jejuni sialylated lipo-oligosaccharide mimicking
  peripheral-nerve gangliosides (anti-GM1/GD1a/GQ1b); MIS-C uses a SARS-CoV-2
  nucleocapsid epitope mimicking the host antiviral-signalling protein SNX8;
  acute rheumatic fever (not yet a worked conformer) uses streptococcal M
  protein mimicking cardiac myosin. Susceptibility is frequently gated by HLA
  alleles that provide the restricting element for presentation of the
  cross-reactive epitope. Mimic chemistry and specific autoantigens are
  described in prose only; modules bind GO and CL terms only and do not use
  gene (HGNC) or chemical (CHEBI) term bindings.
pathophysiology:
- name: Infection-Associated Cross-Reactive Antigen Exposure
  description: >-
    An infectious agent (or, less commonly, a chemical/environmental antigen)
    presents an epitope that shares sequence or structural similarity with a
    host self-antigen. Antigen processing and presentation of this foreign
    epitope in a susceptible host is the initiating event: because the foreign
    and self peptides are similar, the immune response mounted against the
    pathogen is positioned to cross-react with self. The specific mimic pair is
    disorder-specific (e.g., Campylobacter lipo-oligosaccharide vs nerve
    gangliosides; SARS-CoV-2 nucleocapsid vs SNX8).
  role: trigger
  biological_processes:
  - preferred_term: Antigen Processing and Presentation
    term:
      id: GO:0019882
      label: antigen processing and presentation
  evidence:
  - reference: PMID:30509385
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Molecular mimicry is one of the leading mechanisms by which infectious or
      chemical agents may induce autoimmunity. It occurs when similarities
      between foreign and self-peptides favor an activation of autoreactive T or
      B cells by a foreign-derived antigen in a susceptible individual.
    explanation: >-
      Defines molecular mimicry as an infection/chemical-triggered initiator of
      autoimmunity arising from foreign/self-peptide similarity in a susceptible
      host, establishing this trigger node. Evidence source is OTHER because this
      is a review.
  - reference: PMID:22095454
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      One mechanism is molecular mimicry, where a foreign antigen shares
      sequence or structural similarities with self-antigens.
    explanation: >-
      Directly states that the foreign antigen shares sequence or structural
      similarity with self-antigens, the defining feature of the cross-reactive
      antigen at this node. Evidence source is OTHER because this is a review.
  - reference: DOI:10.1038/s41586-024-07722-4
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      The immunogenic regions of the viral nucleocapsid and host SNX8 proteins
      bear remarkable sequence similarity.
    explanation: >-
      Worked example of the cross-reactive mimic pair in MIS-C: the SARS-CoV-2
      nucleocapsid and the host SNX8 protein share immunogenic sequence
      similarity. Evidence source is HUMAN_CLINICAL because this is a patient
      autoantibody/T-cell study.
  downstream:
  - target: Cross-Reactive Autoreactive Lymphocyte Activation

- name: Cross-Reactive Autoreactive Lymphocyte Activation
  description: >-
    The anti-pathogen response activates autoreactive T and/or B lymphocytes
    whose receptors recognize both the foreign epitope and the mimicked
    self-antigen. These cross-reactive clones escaped central tolerance and are
    expanded by the foreign-derived antigen; cross-reactive B cells secrete
    autoantibodies and cross-reactive T cells acquire effector function. This is
    the pivotal, conserved step that converts a normal antimicrobial response
    into autoreactivity, and is the canonical conformance target for disorders
    driven by molecular mimicry.
  role: central_effector
  cell_types:
  - preferred_term: T cell
    term:
      id: CL:0000084
      label: T cell
  - preferred_term: B cell
    term:
      id: CL:0000236
      label: B cell
  biological_processes:
  - preferred_term: T Cell Activation
    term:
      id: GO:0042110
      label: T cell activation
    modifier: INCREASED
  - preferred_term: Immunoglobulin Production
    term:
      id: GO:0002377
      label: immunoglobulin production
    modifier: INCREASED
  evidence:
  - reference: PMID:30509385
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      It occurs when similarities between foreign and self-peptides favor an
      activation of autoreactive T or B cells by a foreign-derived antigen in a
      susceptible individual.
    explanation: >-
      States that the cross-reactive foreign antigen activates autoreactive T or
      B cells, the central effector event of this node. Evidence source is OTHER
      because this is a review.
  - reference: DOI:10.1038/s41586-024-07722-4
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Consequently, we found that many children with anti-SNX8 autoantibodies
      also have cross-reactive T cells engaging both the SNX8 and the SARS-CoV-2
      nucleocapsid protein epitopes.
    explanation: >-
      Worked example showing cross-reactive lymphocytes in MIS-C: anti-SNX8
      autoantibodies (B-cell output) plus T cells recognizing both the self
      (SNX8) and foreign (nucleocapsid) epitopes. Evidence source is
      HUMAN_CLINICAL because this is a patient study.
  - reference: PMID:22095454
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      These T cells have dual reactivity to both foreign and self-antigens
      leaving the host vulnerable to foreign insults capable of triggering an
      autoimmune response.
    explanation: >-
      Describes lymphocytes with dual reactivity to foreign and self-antigens
      that are triggered into an autoimmune response, supporting cross-reactive
      autoreactive activation. Evidence source is OTHER because this is a review.
  downstream:
  - target: Autoreactive Effector-Mediated Tissue Injury

- name: Autoreactive Effector-Mediated Tissue Injury
  description: >-
    Cross-reactive autoantibodies bind the mimicked self-antigen on host tissue
    and recruit complement and Fc-receptor-bearing effector cells, while
    cross-reactive effector T cells mediate direct cytotoxicity. The result is
    immune-mediated damage to the specific tissue that expresses the mimicked
    self-antigen (e.g., peripheral nerve, myocardium, joint synovium). The
    targeted tissue is disorder-specific, but the antibody/complement and
    T-cell effector mechanisms are conserved.
  role: effector
  biological_processes:
  - preferred_term: Complement Activation
    term:
      id: GO:0006956
      label: complement activation
    modifier: INCREASED
  - preferred_term: T Cell Mediated Cytotoxicity
    term:
      id: GO:0001913
      label: T cell mediated cytotoxicity
    modifier: INCREASED
  evidence:
  - reference: PMID:24000328
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Molecular mimicry between sialylated lipooligosaccharide structures on the cell
      envelope of these bacteria and ganglioside epitopes on the human nerves that
      generates cross-reactive immune response results in autoimmune-driven nerve
      damage.
    explanation: >-
      Worked example of effector tissue injury: the C. jejuni / nerve-ganglioside
      cross-reactive response produces autoimmune-driven peripheral nerve damage,
      the tissue-injury step of this node. Evidence source is OTHER because this
      is a review.
  downstream:
  - target: Epitope Spreading and Autoimmune Amplification

- name: Epitope Spreading and Autoimmune Amplification
  description: >-
    Effector-mediated tissue damage releases previously sequestered self-antigens
    that are taken up and presented, priming additional self-reactive T and B
    clones directed at epitopes distinct from the original mimic (epitope
    spreading). Together with breach of central tolerance, bystander activation,
    and persistent antigenic stimulation, this broadens and perpetuates the
    autoimmune response independent of ongoing infection, converting an
    initially antigen-restricted reaction into a self-sustaining one.
  role: amplifier
  biological_processes:
  - preferred_term: Adaptive Immune Response
    term:
      id: GO:0002250
      label: adaptive immune response
    modifier: INCREASED
  evidence:
  - reference: PMID:11910899
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Evidence continues to accumulate supporting the hypothesis that tissue
      damage during an immune response can lead to the priming of self-reactive
      T and/or B lymphocytes, regardless of the specificity of the initial
      insult.
    explanation: >-
      Establishes epitope spreading: tissue damage primes new self-reactive T/B
      lymphocytes regardless of the initial trigger, amplifying autoimmunity
      beyond the original mimic. Evidence source is OTHER because this is a
      review.
  - reference: PMID:30509385
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      other factors such as breach in central tolerance, non-specific bystander
      activation, or persistent antigenic stimuli (amongst others) may also
      contribute to the development of autoimmune diseases.
    explanation: >-
      Lists complementary amplifying mechanisms (tolerance breach, bystander
      activation, persistent antigen) that, with epitope spreading, sustain the
      autoimmune response. Evidence source is OTHER because this is a review.
  downstream:
  - target: Tissue-Specific Autoimmune Disease

- name: Tissue-Specific Autoimmune Disease
  description: >-
    The cumulative cross-reactive and spread autoimmune attack produces clinical
    disease localized to the tissue expressing the mimicked self-antigen, with
    the syndrome defined by which tissue is targeted (e.g., acute
    polyradiculoneuropathy in Guillain-Barre syndrome, multisystem
    hyperinflammation in MIS-C, carditis in rheumatic fever). This is the
    clinical consequence of the conserved molecular-mimicry chain and the level
    at which conforming disorder entries are defined.
  role: consequence
  biological_processes:
  - preferred_term: Inflammatory Response
    term:
      id: GO:0006954
      label: inflammatory response
    modifier: INCREASED
  evidence:
  - reference: DOI:10.1038/s41586-024-07722-4
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      demonstrating a mechanistic link between the infection and the
      inflammatory syndrome, with implications for better understanding a range
      of post-infectious autoinflammatory diseases.
    explanation: >-
      Frames the cross-reactive mimicry response as the mechanistic link from
      infection to a clinical inflammatory syndrome, and generalizes it to a
      range of post-infectious autoimmune/autoinflammatory diseases, supporting
      this consequence node. Evidence source is HUMAN_CLINICAL because this is a
      patient study.
  - reference: PMID:30509385
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      may also contribute to the development of autoimmune diseases.
    explanation: >-
      Connects the upstream mimicry/tolerance mechanisms to the development of
      autoimmune disease, the clinical consequence of this module. Evidence
      source is OTHER because this is a review.
