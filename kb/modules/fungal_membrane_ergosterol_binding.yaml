name: Fungal Membrane Ergosterol Binding Module
description: >-
  A conserved antifungal drug-mechanism module structured as a stepwise physical
  cascade: the polyene antifungals (amphotericin B, nystatin) act not on an enzyme
  but on the finished sterol of the fungal plasma membrane itself. The pathway
  begins with the ergosterol-enriched fungal plasma membrane, the eukaryotic
  counterpart of mammalian cholesterol that gives polyenes their selective target;
  amphiphilic polyene macrolactones then bind ergosterol with high affinity and
  extract it from the bilayer into large extramembranous "sterol sponge"
  aggregates while a minor membrane-inserted fraction forms ion-conducting pores;
  the resulting loss of membrane integrity drives potassium/ion efflux and
  oxidative injury; and the combined sterol depletion and permeabilization are
  fungicidal rather than merely fungistatic, precipitating cell lysis. Selectivity
  rests on a single fungal-specific feature — polyenes bind fungal ergosterol more
  avidly than mammalian cholesterol — but the discrimination is imperfect, which is
  why amphotericin B also extracts host cholesterol and causes dose-limiting
  nephrotoxicity, mitigated but not abolished by lipid (liposomal) formulations.
  Because the target is the membrane sterol rather than a mutable enzyme,
  clinically significant polyene resistance is rare; when it arises it is through
  reduced membrane ergosterol content (loss-of-function changes in the ERG
  ergosterol-biosynthesis pathway that substitute precursor sterols the drug binds
  poorly), which lowers the amount of drug-bindable target. This module defines the
  mechanism-of-action design pattern for polyene treatments: conforming
  fungal-disease entries link a treatment to the specific node it inhibits via
  target_mechanisms, the key conformance / treatment target being "Polyene Binding
  and Ergosterol Extraction / Pore Formation".
category: Module
creation_date: "2026-06-24T00:00:00Z"
notes: >-
  This is an antifungal drug-mechanism module structured as a biological cascade,
  not a specific disease. Its nodes are successive steps of the polyene mechanism
  on the ergosterol membrane (ergosterol-enriched membrane -> polyene binding and
  ergosterol extraction / pore formation -> membrane permeabilization, ion leakage
  and oxidative damage -> fungicidal cell death), with an adaptive-escape
  resistance branch; the polyene drug class (amphotericin B, nystatin) is described
  in the node text rather than modelled as a separate node. Disorder entries
  reference individual nodes via conforms_to (e.g.,
  "fungal_membrane_ergosterol_binding#Polyene Binding and Ergosterol Extraction /
  Pore Formation"), and their polyene treatments point at the inhibited node via
  target_mechanisms (analogous to how cell-wall-active antibiotic treatments link
  to "bacterial_cell_wall_synthesis_inhibition#Peptidoglycan Cross-Linking by
  Penicillin-Binding Proteins"). Key conformance / treatment target: "Polyene
  Binding and Ergosterol Extraction / Pore Formation" — the sterol-sponge /
  pore-forming step at which amphotericin B and nystatin engage membrane
  ergosterol. This module is complementary to the proposed
  fungal_ergosterol_synthesis_inhibition module — azoles/allylamines block
  ergosterol synthesis while polyenes bind the finished sterol — so a single fungal
  disease may conform to both. The resistance node captures the gating knowledge
  that distinguishes "a polyene is used" from durable activity: rare
  ergosterol-depletion resistance, plus the imperfect ergosterol-vs-cholesterol
  selectivity that drives amphotericin B host toxicity. See projects/ANTIFUNGAL.md.
pathophysiology:
- name: Ergosterol-Enriched Fungal Plasma Membrane
  description: >-
    Ergosterol is the principal sterol of the fungal plasma membrane and the
    eukaryotic counterpart of mammalian cholesterol, regulating membrane fluidity,
    microdomain organization, endocytosis, and the function of many membrane
    proteins. The synthesis and enrichment of ergosterol in the bilayer creates the
    fungal-specific physical target that polyene antifungals recognize: polyenes
    bind ergosterol far more avidly than they bind the cholesterol of mammalian
    membranes, and the conservation of ergosterol as the dominant fungal sterol is
    what makes the polyene class broad-spectrum across yeasts and molds. This is the
    upstream trigger of the cascade — the drug-bindable membrane sterol whose
    presence licenses the entire polyene mechanism.
  role: trigger
  biological_processes:
  - preferred_term: Ergosterol Biosynthetic Process
    term:
      id: GO:0006696
      label: ergosterol biosynthetic process
    modifier: INCREASED
  evidence:
  - reference: PMID:31643715
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Polyene antifungals have an amphiphilic structure which binds to
      ergosterol
    explanation: >-
      LiverTox review establishing that polyene antifungals act by binding the
      fungal membrane sterol ergosterol — the membrane sterol this trigger node
      represents. Evidence source is OTHER as this is a review article.
  downstream:
  - target: Polyene Binding and Ergosterol Extraction / Pore Formation
    description: >-
      The membrane ergosterol is the substrate that polyene macrolactones bind and
      extract, initiating the killing mechanism.

- name: Polyene Binding and Ergosterol Extraction / Pore Formation
  description: >-
    Polyene antifungals — amphotericin B and nystatin — are amphiphilic
    macrolactones that engage membrane ergosterol directly rather than inhibiting an
    enzyme. In the dominant "sterol sponge" mechanism, large extramembranous
    amphotericin B aggregates physically extract ergosterol out of the lipid
    bilayer; a minor membrane-inserted fraction additionally assembles
    ion-conducting pores. Ergosterol binding (not the channel-forming capacity) is
    the event essential for fungicidal action, so this binding-and-extraction step
    is the committed mechanistic core of the cascade and the canonical conformance /
    treatment target of the module. Conforming polyene treatments point their
    target_mechanisms edge at this node.
  role: therapeutic_vulnerability
  notes: >-
    No biological_processes or molecular_functions term is assigned to this node
    intentionally. Unlike the enzyme-target therapeutic_vulnerability nodes in the
    other drug-mechanism modules, the polyene mechanism is a direct physicochemical
    drug–lipid interaction (amphotericin B/nystatin aggregates binding and extracting
    membrane ergosterol in the "sterol sponge" model, with secondary pore formation),
    not an activity of a fungal gene product. GO biological_process and molecular_function
    classes describe gene-product activities, so no GO term faithfully captures this
    physical sterol-extraction event; a forced term (e.g. a transporter-implying
    "lipid transport" or the cellular-component "plasma membrane") would misrepresent
    the mechanism. The ergosterol substrate itself is annotated on the upstream trigger node.
  evidence:
  - reference: PMID:24681535
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: >-
      binding ergosterol (Erg) (Fig. 1a) is essential
    explanation: >-
      Solid-state NMR / cell-based study showing that ergosterol binding (rather
      than channel formation) is essential for amphotericin B's fungicidal action,
      defining this binding step as the drug-target core. Evidence source is
      IN_VITRO as this is a biophysical and cell-based mechanistic study.
  - reference: PMID:24681535
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: >-
      amphotericin exists primarily in the form of large, extramembranous
      aggregates that kill yeast by extracting ergosterol from lipid bilayers
    explanation: >-
      Demonstrates the sterol-sponge mechanism — extraction of ergosterol from the
      membrane into extramembranous aggregates is the molecular action of this node.
      Evidence source is IN_VITRO as this is a biophysical and cell-based study.
  downstream:
  - target: Membrane Permeabilization, Ion Leakage and Oxidative Damage
    description: >-
      Sterol extraction and pore formation strip the bilayer of a sterol required by
      many membrane processes and breach membrane integrity, causing ion leakage and
      oxidative injury.
  - target: Polyene Resistance via Reduced Membrane Ergosterol
    description: >-
      ERG-pathway changes that lower drug-bindable membrane ergosterol reduce the
      target available for polyene binding and extraction.

- name: Membrane Permeabilization, Ion Leakage and Oxidative Damage
  description: >-
    Extraction of ergosterol and the minor pore-forming fraction together breach the
    integrity of the fungal plasma membrane. Depletion of the sterol disables the
    many membrane proteins and cellular processes that depend on ergosterol, while
    the loss of membrane integrity allows leakage of potassium and other ions and is
    accompanied by oxidative injury. This is the effector step that converts the
    upstream physical binding event into lethal cellular damage; the same
    sterol-extracting activity acting on host-cell cholesterol underlies amphotericin
    B's dose-limiting toxicity.
  role: effector
  biological_processes:
  - preferred_term: Response to Oxidative Stress
    term:
      id: GO:0006979
      label: response to oxidative stress
    modifier: INCREASED
  evidence:
  - reference: PMID:24681535
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: >-
      parallel potassium efflux experiments revealed readily observable membrane
      permeabilization
    explanation: >-
      Confirms the membrane-permeabilizing / ion-leakage component (potassium efflux)
      that accompanies sterol extraction at this effector step. Evidence source is
      IN_VITRO as this is a liposome-based biophysical assay.
  downstream:
  - target: Fungicidal Cell Death
    description: >-
      Loss of membrane integrity, ion leakage, and oxidative damage culminate in
      osmotic collapse and lysis of the fungal cell.

- name: Fungicidal Cell Death
  description: >-
    The combined sterol depletion and membrane permeabilization are fungicidal
    rather than merely fungistatic: the fungal plasma membrane is converted to a more
    crystalline, leaky state and the cell undergoes osmotic collapse and lysis. This
    fungicidal endpoint — cell killing rather than growth arrest — is the therapeutic
    consequence of engaging the ergosterol target and is the basis for amphotericin
    B's role in severe, disseminated, and life-threatening mycoses (with nystatin
    used topically).
  role: consequence
  biological_processes:
  - preferred_term: Cytolysis
    term:
      id: GO:0019835
      label: cytolysis
    modifier: INCREASED
  evidence:
  - reference: PMID:31643715
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      converting the fluid cell membrane of the fungal cell into a more
      crystalline state increasing permeability and precipitating cell lysis
    explanation: >-
      LiverTox review directly states the fungicidal consequence of polyene
      ergosterol binding — increased membrane permeability and precipitation of
      fungal cell lysis. Evidence source is OTHER as this is a review article.

- name: Polyene Resistance via Reduced Membrane Ergosterol
  description: >-
    Because polyenes recognize the membrane sterol rather than a mutable enzyme
    active site, clinically significant resistance is uncommon — the drug would have
    to select against the cell's entire ergosterol-dependent membrane biology, a high
    genetic barrier. When polyene resistance does arise, it is typically through
    reduced membrane ergosterol content: loss-of-function changes in the ERG
    ergosterol-biosynthesis pathway (e.g. ERG2, ERG3, ERG6, ERG11) cause the fungus
    to accumulate alternative sterols/precursors that polyenes bind poorly, so there
    is less drug-bindable target in the membrane. This trade-off usually impairs
    membrane fitness and virulence, which is part of why such resistance is rare in
    the clinic. This adaptive-escape branch off the binding/extraction node documents
    the gating knowledge that distinguishes "a polyene is being used" from durable
    activity and explains why polyene resistance, when present, often co-occurs with
    susceptibility shifts at the ergosterol-synthesis (azole) target.
  role: adaptive_escape
  biological_processes:
  - preferred_term: Ergosterol Biosynthetic Process
    term:
      id: GO:0006696
      label: ergosterol biosynthetic process
    modifier: DECREASED
  evidence:
  - reference: PMID:37998390
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      ergosterol biosynthesis pathway mutations (ERG11 and UPC2)
    explanation: >-
      Review of Candida antifungal resistance documenting that mutations in the
      ergosterol-biosynthesis pathway alter membrane sterol content, the basis of
      polyene resistance via reduced drug-bindable ergosterol. Evidence source is
      OTHER as this is a literature review.
  - reference: PMID:37998390
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      polyenes (amphotericin B and nystatin)
    explanation: >-
      Confirms the review covers resistance mechanisms for the polyene class
      (amphotericin B, nystatin) addressed by this node. Evidence source is OTHER as
      this is a literature review.
