name: Fungal Membrane Ergosterol Binding Module
description: >-
  A conserved antifungal drug-mechanism module representing the fungal
  plasma-membrane ergosterol that polyene antifungals bind directly. Unlike the
  azoles and allylamines, which inhibit the enzymes that synthesize ergosterol,
  the polyenes (amphotericin B, nystatin) target the finished sterol itself.
  Their amphiphilic macrolactone ring binds ergosterol with high affinity and
  extracts it from the bilayer into large extramembranous "sterol sponge"
  aggregates, while a minor membrane-inserted fraction forms ion-conducting
  pores; the combined sterol depletion, ion leakage, membrane permeabilization,
  and accompanying oxidative damage are fungicidal rather than merely
  fungistatic. Selectivity rests on a single fungal-specific feature — polyenes
  bind fungal ergosterol more avidly than the cholesterol of mammalian membranes
  — but the discrimination is imperfect, which is why amphotericin B also
  extracts host cholesterol and causes dose-limiting nephrotoxicity, mitigated
  but not abolished by lipid (liposomal) formulations. Because the target is the
  membrane sterol rather than an enzyme, clinically significant polyene
  resistance is rare; when it arises it is through reduced membrane ergosterol
  content (loss-of-function mutations in the ERG ergosterol-biosynthesis pathway
  that substitute ergosterol precursors the drug binds poorly), which lowers the
  amount of drug-bindable target. This module defines the mechanism-of-action
  design pattern for polyene treatments: conforming fungal-disease entries link a
  treatment to the specific node it inhibits via target_mechanisms.
category: Module
creation_date: "2026-06-24T00:00:00Z"
notes: >-
  This is an antifungal drug-mechanism module, not a specific disease. Disorder
  entries reference individual nodes via conforms_to (e.g.,
  "fungal_membrane_ergosterol_binding#Membrane Ergosterol as the Polyene Binding
  Target"), and their polyene treatments (amphotericin B, nystatin) point at the
  inhibited node via target_mechanisms (analogous to how cell-wall-active
  antibiotic treatments link to "bacterial_cell_wall_synthesis_inhibition#
  Peptidoglycan Cross-Linking by Penicillin-Binding Proteins"). Key conformance /
  treatment target: "Membrane Ergosterol as the Polyene Binding Target" (the
  fungal plasma-membrane ergosterol bound and extracted by polyenes). The module
  is pathogen-process-centric: nodes are druggable steps in the polyene mechanism,
  not individual drugs. This module is complementary to the proposed
  fungal_ergosterol_synthesis_inhibition module — azoles/allylamines block
  ergosterol synthesis while polyenes bind the finished sterol — so a single
  fungal disease may conform to both. The resistance node captures the gating
  knowledge that distinguishes "a polyene is used" from durable activity: rare
  ergosterol-depletion resistance, plus the imperfect ergosterol-vs-cholesterol
  selectivity that drives amphotericin B host toxicity. See projects/ANTIFUNGAL.md.
pathophysiology:
- name: Membrane Ergosterol as the Polyene Binding Target
  description: >-
    Ergosterol is the principal sterol of the fungal plasma membrane and the
    eukaryotic counterpart of mammalian cholesterol, regulating membrane
    fluidity, microdomain organization, and the function of many membrane
    proteins. Polyene antifungals — amphotericin B and nystatin — are amphiphilic
    macrolactones that bind ergosterol directly rather than inhibiting an enzyme.
    The drug's high affinity for ergosterol over cholesterol is the entire basis
    of its selective toxicity, and the conservation of ergosterol as the dominant
    fungal sterol is what makes this the broad-spectrum, resistance-refractory
    drug target shared across yeasts and molds. This is the central node of the
    module and the canonical conformance / treatment target for polyene therapy
    (amphotericin B for severe/disseminated mycoses; nystatin topically).
  role: therapeutic_vulnerability
  biological_processes:
  - preferred_term: Ergosterol Biosynthetic Process
    term:
      id: GO:0006696
      label: ergosterol biosynthetic process
  evidence:
  - reference: PMID:31643715
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Polyene antifungals have an amphiphilic structure which binds to
      ergosterol
    explanation: >-
      LiverTox review establishing that polyene antifungals act by binding the
      fungal membrane sterol ergosterol, the drug target this node represents.
      Evidence source is OTHER as this is a review article.
  - reference: PMID:24681535
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: >-
      binding ergosterol (Erg) (Fig. 1a) is essential
    explanation: >-
      Solid-state NMR / cell-based study showing that ergosterol binding is
      essential for amphotericin B's fungicidal action, confirming membrane
      ergosterol as the polyene target. Evidence source is IN_VITRO as this is a
      biophysical and cell-based mechanistic study.
  downstream:
  - target: Membrane Permeabilization and Fungicidal Killing
    description: >-
      Bound ergosterol is extracted from the bilayer into extramembranous
      sterol-sponge aggregates and a minor pore-forming fraction permeabilizes
      the membrane, leading to ion leakage and fungal cell death.
  - target: Polyene Resistance via Reduced Membrane Ergosterol
    description: >-
      Loss of membrane ergosterol through ERG-pathway mutation lowers the amount
      of drug-bindable sterol, reducing polyene activity.

- name: Membrane Permeabilization and Fungicidal Killing
  description: >-
    Once polyene macrolactones engage ergosterol, two coupled events kill the
    fungus. In the dominant "sterol sponge" mechanism, large extramembranous
    amphotericin B aggregates physically extract ergosterol out of the lipid
    bilayer, depleting the membrane of a sterol required for the function of
    numerous membrane proteins and cellular processes. A minor membrane-inserted
    fraction forms ion-conducting channels that, together with the loss of
    membrane integrity, cause leakage of potassium and other ions, osmotic
    collapse, and accompanying oxidative damage. The combined membrane
    permeabilization and sterol depletion are fungicidal — precipitating cell
    lysis rather than merely arresting growth — which is the effector consequence
    of engaging the ergosterol target. The same sterol-extracting activity acting
    on host-cell cholesterol underlies amphotericin B's dose-limiting toxicity.
  role: consequence
  evidence:
  - reference: PMID:31643715
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      converting the fluid cell membrane of the fungal cell into a more
      crystalline state increasing permeability and precipitating cell lysis
    explanation: >-
      LiverTox review directly states the effector consequence of polyene
      ergosterol binding — increased membrane permeability and fungicidal cell
      lysis. Evidence source is OTHER as this is a review article.
  - reference: PMID:24681535
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: >-
      amphotericin exists primarily in the form of large, extramembranous
      aggregates that kill yeast by extracting ergosterol from lipid bilayers
    explanation: >-
      Demonstrates the sterol-sponge mechanism — extraction of ergosterol from
      the membrane into extramembranous aggregates is what kills the fungal cell.
      Evidence source is IN_VITRO as this is a biophysical and cell-based study.
  - reference: PMID:24681535
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: >-
      parallel potassium efflux experiments revealed readily observable membrane
      permeabilization
    explanation: >-
      Confirms the membrane-permeabilizing / ion-leakage component of polyene
      killing (potassium efflux) that accompanies sterol extraction. Evidence
      source is IN_VITRO as this is a liposome-based biophysical assay.

- name: Polyene Resistance via Reduced Membrane Ergosterol
  description: >-
    Because polyenes recognize the membrane sterol rather than an enzyme active
    site, clinically significant resistance is uncommon — the drug would have to
    select against the cell's entire ergosterol-dependent membrane biology, a
    high genetic barrier. When polyene resistance does arise, it is typically
    through reduced membrane ergosterol content: loss-of-function mutations in the
    ERG ergosterol-biosynthesis pathway (e.g. ERG2, ERG3, ERG6, ERG11) cause the
    fungus to accumulate alternative sterols/precursors that polyenes bind poorly,
    so there is less drug-bindable target in the membrane. This trade-off usually
    impairs membrane fitness and virulence, which is part of why such resistance
    is rare in the clinic. This node documents the gating knowledge that
    distinguishes "a polyene is being used" from durable activity and explains
    why polyene resistance, when present, often co-occurs with cross-resistance or
    susceptibility shifts at the ergosterol-synthesis (azole) target.
  role: adaptive_escape
  biological_processes:
  - preferred_term: Ergosterol Biosynthetic Process
    term:
      id: GO:0006696
      label: ergosterol biosynthetic process
  evidence:
  - reference: PMID:37998390
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      ergosterol biosynthesis pathway mutations (ERG11 and UPC2)
    explanation: >-
      Review of Candida antifungal resistance documenting that mutations in the
      ergosterol-biosynthesis pathway alter membrane sterol content, the basis of
      polyene resistance via reduced drug-bindable ergosterol. Evidence source is
      OTHER as this is a literature review.
  - reference: PMID:37998390
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      polyenes (amphotericin B and nystatin)
    explanation: >-
      Confirms the review covers resistance mechanisms for the polyene class
      (amphotericin B, nystatin) addressed by this node. Evidence source is OTHER
      as this is a literature review.
