name: Corticotroph EGFR/POMC/ACTH Activation Module
description: >-
  A corticotroph pituitary adenoma mechanism module in which activating USP8
  alterations increase USP8 deubiquitinase activity, sustain EGFR signaling,
  increase POMC promoter activity, and drive corticotropin secretion. This
  module is intentionally separate from the somatotroph cAMP/PKA module because
  it explains corticotroph endocrine autonomy rather than GH-secreting
  somatotroph tumorigenesis.
category: Module
creation_date: "2026-06-03T00:00:00Z"
notes: >-
  This module is currently anchored by USP8-mutant Cushing disease. Other
  corticotroph adenoma mechanisms should conform to downstream nodes only when
  the EGFR/POMC/ACTH biology is actually supported.
pathophysiology:
- name: Increased USP8 deubiquitinase activity
  description: >-
    Activating USP8 mutations disrupt normal 14-3-3-dependent control and
    increase USP8 proteolytic cleavage and catalytic deubiquitinase activity.
  role: trigger
  cell_types:
  - preferred_term: corticotroph
    term:
      id: CL:0002309
      label: corticotroph
  gene:
    preferred_term: USP8
    term:
      id: hgnc:12631
      label: USP8
  molecular_functions:
  - preferred_term: USP8 cysteine-type deubiquitinase activity
    modifier: INCREASED
    term:
      id: GO:0004843
      label: cysteine-type deubiquitinase activity
  biological_processes:
  - preferred_term: protein deubiquitination
    modifier: INCREASED
    term:
      id: GO:0016579
      label: protein deubiquitination
  evidence:
  - reference: PMID:25485838
    reference_title: "Mutations in the deubiquitinase gene USP8 cause Cushing's disease."
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: >-
      The mutations clustered in the 14-3-3 protein binding motif and enhanced
      the proteolytic cleavage and catalytic activity of USP8.
    explanation: >-
      This directly supports increased USP8 catalytic activity as the proximal
      molecular effect of the hotspot mutations.
  downstream:
  - target: Sustained EGFR signaling in corticotrophs
    description: >-
      Increased USP8 activity deubiquitinates EGFR, impairing receptor
      downregulation.
    causal_link_type: DIRECT

- name: Sustained EGFR signaling in corticotrophs
  description: >-
    Increased USP8-dependent EGFR deubiquitination impairs EGFR downregulation,
    sustaining EGFR signaling in corticotroph pituitary adenoma cells.
  role: central_effector
  cell_types:
  - preferred_term: corticotroph
    term:
      id: CL:0002309
      label: corticotroph
  genes:
  - preferred_term: USP8
    term:
      id: hgnc:12631
      label: USP8
  - preferred_term: EGFR
    term:
      id: hgnc:3236
      label: EGFR
  biological_processes:
  - preferred_term: EGFR signaling
    modifier: INCREASED
    term:
      id: GO:0007173
      label: epidermal growth factor receptor signaling pathway
  evidence:
  - reference: PMID:25485838
    reference_title: "Mutations in the deubiquitinase gene USP8 cause Cushing's disease."
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: >-
      Cleavage of USP8 led to increased deubiqutination of the EGF receptor,
      impairing its downregulation and sustaining EGF signaling.
    explanation: >-
      This directly supports sustained EGFR signaling downstream of USP8
      activation.
  downstream:
  - target: Increased POMC transcriptional activation
    description: >-
      Sustained EGFR signaling increases transcriptional activation of POMC.
    causal_link_type: DIRECT

- name: Increased POMC transcriptional activation
  description: >-
    USP8-mutant corticotroph adenoma cells show increased promoter activity of
    POMC, the precursor gene for ACTH.
  role: effector
  cell_types:
  - preferred_term: corticotroph
    term:
      id: CL:0002309
      label: corticotroph
  gene:
    preferred_term: POMC
    term:
      id: hgnc:9201
      label: POMC
  biological_processes:
  - preferred_term: POMC transcriptional activation
    modifier: INCREASED
    term:
      id: GO:0045944
      label: positive regulation of transcription by RNA polymerase II
  evidence:
  - reference: PMID:25485838
    reference_title: "Mutations in the deubiquitinase gene USP8 cause Cushing's disease."
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: >-
      USP8 mutants enhanced promoter activity of the gene encoding
      proopiomelanocortin.
    explanation: >-
      This directly links USP8 mutations to increased POMC promoter activity.
  downstream:
  - target: Increased corticotropin secretion
    description: >-
      Increased POMC transcriptional activation supports excess ACTH production
      and secretion.
    causal_link_type: DIRECT

- name: Increased corticotropin secretion
  description: >-
    Corticotroph tumor cells secrete excess ACTH downstream of the
    USP8-EGFR-POMC axis, producing pituitary ACTH hypersecretion and Cushing
    disease physiology.
  role: consequence
  cell_types:
  - preferred_term: corticotroph
    term:
      id: CL:0002309
      label: corticotroph
  gene:
    preferred_term: POMC
    term:
      id: hgnc:9201
      label: POMC
  biological_processes:
  - preferred_term: corticotropin secretion
    modifier: INCREASED
    term:
      id: GO:0051458
      label: corticotropin secretion
  evidence:
  - reference: PMID:25485838
    reference_title: "Mutations in the deubiquitinase gene USP8 cause Cushing's disease."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Cushing's disease is caused by corticotroph adenomas of the pituitary.
    explanation: >-
      This anchors the module outcome to corticotroph adenomas that cause
      Cushing disease.
