      label: ectodermal placode formation
    modifier: DECREASED
  evidence:
  - reference: PMID:24508088
    reference_title: "Ectodysplasin/NF-kappaB signaling in development and disease."
    supports: SUPPORT
    evidence_source: MODEL_ORGANISM
    snippet: >-
      The TNF family ligand ectodysplasin A (EDA) regulates the induction,
      morphogenesis and/or maintenance of skin-derived structures such as teeth,
      hair, sweat glands
    explanation: >-
      Establishes that EDA signaling regulates the induction (placode) and
      morphogenesis of ectodermal appendages, the developmental step lost when
      the pathway fails. Evidence source is MODEL_ORGANISM because the
      mechanistic developmental role is defined largely in mouse.
  downstream:
  - target: Ectodermal Appendage Morphogenesis Failure
- name: Ectodermal Appendage Morphogenesis Failure
  description: >-
    Failure of placode-dependent appendage morphogenesis produces the
    characteristic HED triad: aplasia or hypoplasia of eccrine sweat glands
    (hypohidrosis, with attendant risk of hyperthermia), defective hair follicle
    development (hypotrichosis), and defective tooth development
    (hypodontia/anodontia with conical teeth). The organ-specific defects are
    serially reused outputs of the same upstream signaling failure.
  role: consequence
