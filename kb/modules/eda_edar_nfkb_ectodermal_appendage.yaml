name: EDA-EDAR-NF-kappaB Ectodermal Appendage Module
description: >-
  A conserved developmental-signaling module for hypohidrotic ectodermal
  dysplasia (HED) and the related EDA-pathway ectodermal dysplasias. Ectodermal
  appendages — sweat glands, hair follicles, and teeth — are induced from the
  surface ectoderm by a single linear signaling cascade: the TNF-family ligand
  ectodysplasin A (EDA) binds its TNF-receptor-family receptor EDAR, which
  recruits the intracellular adaptor EDARADD, activating the canonical NF-kappaB
  pathway (through the IKK complex, whose regulatory subunit is NEMO/IKBKG) to
  drive the transcriptional program of ectodermal placode formation and
  appendage morphogenesis. Because the pathway is a linear cascade, a
  loss-of-function lesion at any tier — the EDA ligand (X-linked HED), the EDAR
  receptor, the EDARADD adaptor, or the NEMO/IKBKG IKK subunit (ectodermal
  dysplasia with immunodeficiency) — converges on the same failure of canonical
  NF-kappaB activation and produces the same triad of hypohidrosis
  (sweat-gland aplasia), hypotrichosis (hair defects), and hypodontia/anodontia
  (tooth defects). Conforming disorder entries declare conformance via
  conforms_to on their pathophysiology nodes, substituting the disorder-specific
  pathway component while preserving the conserved signaling-failure ->
  placode-failure -> appendage-failure chain.
category: Module
creation_date: "2026-07-02T00:00:00Z"
notes: >-
  This is a mechanism module, not a specific disease. Disorder entries reference
  individual nodes via conforms_to (e.g.,
  "eda_edar_nfkb_ectodermal_appendage#EDA-EDAR-EDARADD Canonical NF-kappaB
  Signaling Failure"). The single best key conformance target is the
  "EDA-EDAR-EDARADD Canonical NF-kappaB Signaling Failure" node — the tier where
  EDA, EDAR, EDARADD, and NEMO/IKBKG all converge, matching the GO:0007249
  necessary criterion of the Hypohidrotic_Ectodermal_Dysplasias grouping.
  Conforming nodes substitute the disorder-specific lesion at the ligand
  (EDA/X-linked HED), receptor (EDAR), adaptor (EDARADD), or IKK-subunit
  (NEMO/IKBKG) tier. Scope discipline: the deeply pleiotropic NEMO/IKBKG
  disorder should conform ONLY through its ectodermal-appendage branch node, not
  as a whole — its innate/adaptive immunodeficiency, incontinentia pigmenti, and
  osteopetrosis arise from NF-kappaB signaling in other contexts and are out of
  scope. The transcription-factor ectodermal dysplasias (e.g. TP63) are a
  mechanistically distinct arm (no EDA ligand, receptor cascade, or NF-kappaB
  step) and are deliberately NOT conformers of this module despite sharing the
  clinical class. WNT10A-related HED signals largely upstream through Wnt rather
  than directly through EDAR-NF-kappaB and is at best a partial/upstream
  conformer. Modules bind GO and CL terms only and do not use gene bindings; the
  substituted gene identity is carried on the conforming disorder node.
pathophysiology:
- name: EDA-EDAR-EDARADD Canonical NF-kappaB Signaling Failure
  description: >-
    The conserved lesion is loss of signaling through the EDA-EDAR-EDARADD
    receptor complex. EDA, a tumor-necrosis-factor-family ligand, binds the
    TNF-receptor-family receptor EDAR; ligand binding recruits the EDARADD death-
    domain adaptor, which links the receptor to the canonical NF-kappaB pathway
    via the IKK complex (regulatory subunit NEMO/IKBKG). A loss-of-function
    variant at any tier of this linear cascade — ligand, receptor, adaptor, or
    IKK subunit — reduces canonical NF-kappaB signal transduction in the
    developing ectoderm. This is the point at which all EDA-pathway ectodermal
    dysplasias converge.
  role: trigger
  cell_types:
  - preferred_term: Surface Ectodermal Cell
    term:
      id: CL:0000114
      label: surface ectodermal cell
  - preferred_term: Keratinocyte
    term:
      id: CL:0000312
      label: keratinocyte
  biological_processes:
  - preferred_term: Canonical NF-kappaB Signal Transduction
    term:
      id: GO:0007249
      label: canonical NF-kappaB signal transduction
    modifier: DECREASED
  evidence:
  - reference: PMID:24070496
    reference_title: "Ectodysplasin A (EDA) - EDA receptor signalling and its pharmacological modulation."
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      It comprises three main gene products: EDA, a ligand that belongs to the
      tumor necrosis factor (TNF)-α family, EDAR, a receptor related to the TNFα
      receptors, and EDARADD
    explanation: >-
      Establishes the three-component EDA-EDAR-EDARADD signaling complex whose
      disruption is the conserved trigger.
  - reference: PMID:11570810
    reference_title: "Mutations in the human homologue of mouse dl cause autosomal recessive and dominant hypohidrotic ectodermal dysplasia."
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: >-
      We have analyzed the response of Edar signaling in transfected cells and
      show that it activates nuclear factor-kappaB (NF-kappaB) in a
      dose-dependent manner.
    explanation: >-
      Demonstrates that EDAR signaling activates canonical NF-kappaB, the shared
      downstream readout of the complex. Evidence source is IN_VITRO because
      this is a transfected-cell signaling assay.
  - reference: PMID:11242109
    reference_title: "X-linked anhidrotic ectodermal dysplasia with immunodeficiency is caused by impaired NF-kappaB signaling."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      the ectodysplasin receptor, DL, triggers NF-kappaB through the NEMO
      protein, indicating that EDA results from impaired NF-kappaB signaling
    explanation: >-
      Shows that the NEMO/IKBKG IKK subunit is the convergence point of EDAR
      signaling on NF-kappaB — the ectodermal-dysplasia phenotype of NEMO
      deficiency results from the same impaired NF-kappaB signaling.
  downstream:
  - target: Failed Ectodermal Placode Formation
- name: Failed Ectodermal Placode Formation
  description: >-
    Canonical NF-kappaB activation downstream of EDA-EDAR is required to induce
    the ectodermal placodes — the focal epithelial thickenings from which sweat
    glands, hair follicles, and teeth develop. When EDA-EDAR-NF-kappaB signaling
    fails, placode induction and the subsequent epithelial-mesenchymal
    morphogenetic program are impaired, so the appendage primordia are not
    properly specified.
  role: central_effector
  cell_types:
  - preferred_term: Surface Ectodermal Cell
    term:
      id: CL:0000114
      label: surface ectodermal cell
