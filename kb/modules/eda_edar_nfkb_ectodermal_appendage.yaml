    reference_title: "A novel EDA mutation in a Chinese family with X-linked hypohidrotic ectodermal dysplasia."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Hypohidrotic ectodermal dysplasia (HED) is a type of genodermatosis
      characterized by the abnormal development of sweat glands, teeth, and
      hair.
    explanation: >-
      Establishes the conserved appendage triad — abnormal development of sweat
      glands, teeth, and hair — as the shared consequence.
  - reference: PMID:11047757
    reference_title: "Anhidrotic ectodermal dysplasia with immunodeficiency caused by impaired NF-kappaB signaling."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      The data provide further evidence that the development of ectodermal
      appendages is mediated through a tumor necrosis factor/tumor necrosis
      factor receptor-like signaling pathway
    explanation: >-
      Confirms that ectodermal-appendage development is mediated by the EDA
      (TNF/TNF-receptor-like) signaling pathway, tying the appendage failure to
      the upstream signaling lesion.
