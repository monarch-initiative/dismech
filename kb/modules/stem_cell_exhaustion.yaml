name: Stem Cell Exhaustion Module
description: >-
  A conserved mechanism module for the hallmark of aging (Lopez-Otin et al.)
  termed stem cell exhaustion: the age-associated decline in the number and
  function of tissue-specific stem cells, which erodes the regenerative capacity
  needed to maintain tissue homeostasis. Adult stem cells sustain tissue health
  by self-renewal and differentiation; with age, accumulated genetic mutations,
  epigenetic changes, and an altered extrinsic (niche/systemic) environment
  progressively impair stem-cell functionality. The resulting decline in
  self-renewal and regenerative output leaves tissues unable to replace lost or
  damaged cells, contributing to the functional decline of blood, muscle, brain,
  and other regenerative tissues. Stem cell exhaustion is an integrative
  hallmark - a downstream convergence of the primary damage hallmarks (genomic
  instability, telomere attrition, epigenetic alterations) acting on the stem
  compartment. Individual disorder entries declare conformance via conforms_to
  on their pathophysiology nodes, substituting the tissue-specific stem
  population and driver (e.g. hematopoietic stem cell aging, satellite-cell
  decline, accelerated stem-cell aging in progeroid syndromes) while preserving
  the conserved damage -> functional-decline -> regenerative-failure chain.
category: Module
creation_date: "2026-07-01T00:00:00Z"
notes: >-
  This is a mechanism module, not a specific disease. Disorder entries
  reference individual nodes via conforms_to (e.g.,
  "stem_cell_exhaustion#Decline in Stem Cell Self-Renewal and Function").
  Conforming nodes in disorder files should include the corresponding biological
  processes and causal edges, specialized to their disease context, substituting
  the tissue-specific stem-cell population. Stem cell exhaustion is an
  integrative hallmark: it sits downstream of the primary-damage modules
  (telomere_attrition, epigenetic_alterations, genome_instability_mutation) and
  overlaps cellular_senescence when stem cells senesce. Key conformance target:
  "stem_cell_exhaustion#Decline in Stem Cell Self-Renewal and Function".
pathophysiology:
- name: Stem Cell Genetic, Epigenetic, and Niche Damage
  description: >-
    Over the lifespan, tissue-specific stem cells accumulate genetic mutations
    and epigenetic changes and are exposed to a progressively altered extrinsic
    environment (niche and systemic milieu). These intrinsic and extrinsic
    insults interact to compromise stem-cell functionality, the initiating layer
    of the hallmark.
  role: trigger
  cell_types:
  - preferred_term: Stem Cell
    term:
      id: CL:0000034
      label: stem cell
  evidence:
  - reference: PMID:26785478
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Recent research has focused on the ways that genetic mutations, epigenetic
      changes, and the extrinsic environmental milieu influence stem cell
      functionality over time.
    explanation: >-
      Identifies genetic mutations, epigenetic changes, and the extrinsic milieu
      as the intrinsic and extrinsic drivers of declining stem-cell function, the
      trigger modeled here. Evidence source is OTHER because this is a review.
  downstream:
  - target: Decline in Stem Cell Self-Renewal and Function
- name: Decline in Stem Cell Self-Renewal and Function
  description: >-
    The accumulated damage leads to an age-associated decline in stem-cell
    function - reduced self-renewal capacity and impaired maintenance of the
    stem-cell pool. This is the conserved central effector that tissue-specific
    stem-cell aging (e.g. hematopoietic stem cells) converges upon; conforming
    disorder nodes substitute their particular stem population.
  role: central_effector
  cell_types:
  - preferred_term: Hematopoietic Stem Cell
    term:
      id: CL:0000037
      label: hematopoietic stem cell
  biological_processes:
  - preferred_term: Stem Cell Population Maintenance
    term:
      id: GO:0019827
      label: stem cell population maintenance
    modifier: DECREASED
  evidence:
  - reference: PMID:26785478
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Research into stem cells and aging aims to understand how stem cells
      maintain tissue health, what mechanisms ultimately lead to decline in stem
      cell function with age, and how the regenerative capacity of somatic stem
      cells can be enhanced to promote healthy aging.
    explanation: >-
      Establishes the age-associated decline in stem-cell function as the central
      question and effector of stem-cell aging, the node modeled here. Evidence
      source is OTHER because this is a review.
  - reference: PMID:23746838
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      These hallmarks are: genomic instability, telomere attrition, epigenetic
      alterations, loss of proteostasis, deregulated nutrient sensing,
      mitochondrial dysfunction, cellular senescence, stem cell exhaustion, and
      altered intercellular communication.
    explanation: >-
      Enumerates stem cell exhaustion as one of the conserved hallmarks of aging,
      framing this module. Evidence source is OTHER because this is a review.
  downstream:
  - target: Regenerative Failure and Tissue Homeostasis Decline
- name: Regenerative Failure and Tissue Homeostasis Decline
  description: >-
    Diminished stem-cell self-renewal and function reduce the regenerative
    capacity of somatic tissues, so lost or damaged cells are no longer
    adequately replaced and tissue homeostasis declines with age. This is the
    conserved consequence of stem cell exhaustion; the specific organ phenotype
    is supplied by the conforming disorder, and enhancing regenerative capacity
    is the corresponding healthy-aging intervention target.
  role: consequence
  biological_processes:
  - preferred_term: Tissue Regeneration
    term:
      id: GO:0042246
      label: tissue regeneration
    modifier: DECREASED
  evidence:
  - reference: PMID:26785478
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      how the regenerative capacity of somatic stem cells can be enhanced to
      promote healthy aging
    explanation: >-
      Frames declining regenerative capacity of somatic stem cells - and its
      enhancement - as the outcome and intervention target modeled here. Evidence
      source is OTHER because this is a review.
