name: Cardiomyopathy Maladaptive Remodeling Module
description: >-
  A conserved cardiac pathophysiology module representing the maladaptive
  remodeling pathway that underlies structural and contractile cardiomyopathy
  (HP:0001638, MONDO:0004994) across dilated, hypertrophic, and secondary
  forms. A primary cardiomyocyte insult — an inherited sarcomere or
  cytoskeletal protein defect, or an acquired hemodynamic, metabolic, toxic,
  or inflammatory stress — impairs contractile performance. The failing
  myocardium activates neurohormonal axes (renin-angiotensin-aldosterone and
  sympathetic) that initially compensate but chronically drive myocyte
  hypertrophy, cardiomyocyte loss, cardiac fibroblast activation, interstitial
  fibrosis, and chamber dilation or wall thickening. This adverse ventricular
  remodeling produces progressive systolic and/or diastolic contractile
  dysfunction, culminating in structural cardiac impairment and heart failure.
  This module is distinct from electrical/channelopathy disease (covered by
  cardiac_ion_channel_repolarization); it captures the structural/contractile
  final common pathway. Individual disorder entries declare conformance via
  conforms_to, substituting disorder-specific primary lesions (e.g., MYH7/MYBPC3
  sarcomere variants in hypertrophic cardiomyopathy, TTN truncations or
  LMNA/desmosomal defects in dilated cardiomyopathy, infiltrative or toxic
  injury in secondary cardiomyopathy) while preserving the conserved chain.
category: Module
creation_date: "2026-06-06T00:00:00Z"
notes: >-
  This is a mechanism module, not a specific disease. Disorder entries reference
  individual nodes via conforms_to (e.g.,
  "cardiomyopathy_maladaptive_remodeling#Ventricular Remodeling"). The module
  defines the expected pathophysiology structure; conforming nodes in disorder
  files should include the corresponding cell types, biological processes, and
  causal edges, specialized to their etiologic context. Key disorder-specific
  substitutions: the trigger node substitutes the disorder's primary lesion
  (e.g., MYH7/MYBPC3/TNNT2 sarcomere variants in HCM, TTN/LMNA/desmosomal
  variants in DCM, amyloid infiltration in cardiac amyloidosis, anthracycline
  or alcohol toxicity in secondary cardiomyopathy). This module covers the
  structural/contractile remodeling pathway and is deliberately kept distinct
  from the electrical/arrhythmia mechanism captured by the
  cardiac_ion_channel_repolarization module.
pathophysiology:
- name: Primary Cardiomyocyte Insult
  description: >-
    The cascade is initiated by an insult to cardiomyocyte contractile function.
    In inherited cardiomyopathies this is a variant in a sarcomeric or
    cytoskeletal protein gene that perturbs sarcomere assembly and force
    generation; in acquired and secondary cardiomyopathies it is a hemodynamic
    (pressure or volume overload), metabolic, toxic, or inflammatory stress that
    impairs myocyte contraction. The specific lesion varies, but the downstream
    response converges on impaired contractile performance that the myocardium
    must compensate for.
  role: trigger
  cell_types:
  - preferred_term: Cardiomyocyte
    term:
      id: CL:0000746
      label: cardiac muscle cell
  biological_processes:
  - preferred_term: Sarcomere Organization
    term:
      id: GO:0045214
      label: sarcomere organization
    modifier: ABNORMAL
  - preferred_term: Muscle Contraction
    term:
      id: GO:0006936
      label: muscle contraction
    modifier: ABNORMAL
  evidence:
  - reference: PMID:37060436
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      The genomics era has identified and validated many genetic causes of
      hypertrophic and dilated cardiomyopathies.
    explanation: >-
      Establishes that genetic defects in sarcomere proteins are validated
      primary causes of the two major cardiomyopathy phenotypes, supporting the
      sarcomere/contractile lesion as the initiating insult. Evidence source is
      OTHER because this is a review synthesizing genomic and mechanistic data.
  - reference: PMID:31073128
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Mutations in several genes can cause DCM, including genes encoding
      structural components of the sarcomere and desmosome. Nongenetic forms of
      DCM can result from different aetiologies, including inflammation of the
      myocardium due to an infection (mostly viral); exposure to drugs, toxins
      or allergens; and systemic endocrine or autoimmune diseases.
    explanation: >-
      Documents the diversity of primary insults — genetic sarcomere/desmosome
      defects and acquired inflammatory, toxic, endocrine, and autoimmune
      injuries — that converge on the same cardiomyopathy phenotype. Evidence
      source is OTHER because this is a Nature Reviews Disease Primers review.
  downstream:
  - target: Neurohormonal Activation

- name: Neurohormonal Activation
  description: >-
    Impaired contractile performance and the resulting fall in cardiac output
    trigger compensatory activation of the renin-angiotensin-aldosterone system
    and the sympathetic nervous system. While initially adaptive, chronic
    neurohormonal activation becomes maladaptive, directly stimulating
    cardiomyocyte hypertrophy and promoting fibrosis and apoptosis. This axis is
    the principal amplifier that converts an initial contractile deficit into
    progressive structural remodeling, and it is the target of the foundational
    heart-failure pharmacotherapies (ACE inhibitors, angiotensin receptor
    blockers, beta-blockers, mineralocorticoid receptor antagonists).
  role: amplifier
  biological_processes:
  - preferred_term: Response to Angiotensin
    term:
      id: GO:1990776
      label: response to angiotensin
    modifier: INCREASED
  - preferred_term: Cardiac Muscle Hypertrophy
    term:
      id: GO:0003300
      label: cardiac muscle hypertrophy
    modifier: INCREASED
  evidence:
  - reference: PMID:25445411
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      The systemic as well as the tissue RAAS are also dedicated to promote
      tissue remodeling, particularly relevant after damage, when chronic
      activation may configure as a maladaptive response, leading to fibrosis,
      hypertrophy and apoptosis, and organ dysfunction.
    explanation: >-
      Directly states that chronic renin-angiotensin-aldosterone system
      activation is a maladaptive response driving cardiac fibrosis,
      hypertrophy, apoptosis, and organ dysfunction, defining the amplifier
      role of neurohormonal activation. Evidence source is OTHER because this is
      a review synthesizing clinical and mechanistic data.
  downstream:
  - target: Ventricular Remodeling

- name: Ventricular Remodeling
  description: >-
    Sustained insult and neurohormonal drive produce adverse structural
    remodeling of the ventricle. This central effector step combines
    cardiomyocyte hypertrophy and progressive cardiomyocyte loss (necrosis and
    apoptosis) with activation of resident cardiac fibroblasts into
    myofibroblasts that deposit excess collagen, producing interstitial
    fibrosis. The net geometric result is chamber dilation with wall thinning
    (dilated pattern) or wall thickening with reduced cavity size (hypertrophic
    pattern). Although the dominant geometry differs across disorders, expansion
    of the cardiac fibroblast population and interstitial matrix deposition are
    conserved features of the remodeling myocardium.
  role: central_effector
  cell_types:
  - preferred_term: Cardiac Fibroblast
    term:
      id: CL:0002548
      label: fibroblast of cardiac tissue
  biological_processes:
  - preferred_term: Cardiac Muscle Tissue Development
    term:
      id: GO:0048738
      label: cardiac muscle tissue development
    modifier: ABNORMAL
  - preferred_term: Extracellular Matrix Organization
    term:
      id: GO:0030198
      label: extracellular matrix organization
    modifier: INCREASED
  - preferred_term: Cardiomyocyte Apoptosis
    term:
      id: GO:0010659
      label: cardiac muscle cell apoptotic process
    modifier: INCREASED
  evidence:
  - reference: PMID:22752727
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      The pathophysiological basis of heart failure is cardiac remodeling, a
      process that comprises structural and functional changes including
      cardiomyocyte proliferation, hypertrophy, necrosis, apoptosis, autophagy,
      interstitial fibrosis, contractile dysfunction and ventricular dilatation.
    explanation: >-
      Defines cardiac remodeling as the pathophysiological basis of heart
      failure and enumerates its conserved components — hypertrophy,
      cardiomyocyte loss, interstitial fibrosis, contractile dysfunction, and
      ventricular dilatation — which are the substance of this node. Evidence
      source is OTHER because this is a mechanistic review.
  - reference: PMID:28957531
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Right ventricular pressure overload in PH is associated with the
      expansion of the fibroblast population, myofibroblast activation, and
      secretion of extracellular matrix proteins.
    explanation: >-
      Establishes cardiac fibroblast expansion, myofibroblast activation, and
      extracellular matrix secretion as the cellular machinery of interstitial
      remodeling in the stressed ventricle, supporting the cardiac fibroblast
      and ECM organization assignments. Evidence source is OTHER because this is
      a review synthesizing multiple study types.
  downstream:
  - target: Progressive Contractile Dysfunction

- name: Progressive Contractile Dysfunction
  description: >-
    Adverse remodeling degrades pump function. Myocyte loss, fibrosis, and
    altered chamber geometry impair systolic shortening (reduced ejection
    fraction in dilated and end-stage disease) and/or diastolic relaxation and
    filling (stiffened, hypertrophied, or infiltrated myocardium). Increased
    wall stress further depresses contractile properties of surviving
    myocardium, creating a self-reinforcing cycle of declining performance that
    underlies the clinical progression of cardiomyopathy.
  role: effector
  cell_types:
  - preferred_term: Cardiomyocyte
    term:
      id: CL:0000746
      label: cardiac muscle cell
  biological_processes:
  - preferred_term: Heart Contraction
    term:
      id: GO:0060047
      label: heart contraction
    modifier: DECREASED
  evidence:
  - reference: PMID:8829958
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Left ventricular remodelling after acute myocardial infarction, through
      long-term left ventricular chamber dilatation and increased wall stress
      can result in alteration of the contractile properties of the non-infarct
      zone, impairment of the systolic and diastolic performances of the left
      ventricle, and eventually congestive heart failure.
    explanation: >-
      Directly links ventricular remodeling and increased wall stress to
      impairment of both systolic and diastolic performance progressing to
      heart failure, supporting the progressive contractile dysfunction step.
      Evidence source is OTHER because this is a review.
  - reference: PMID:31073128
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      As DCM eventually leads to impaired contractility, standard approaches to
      prevent or treat heart failure are the first-line treatment for patients
      with DCM.
    explanation: >-
      Confirms that the cardiomyopathy process culminates in impaired
      contractility for which heart-failure management is the standard
      treatment. Evidence source is OTHER because this is a review.
  downstream:
  - target: Structural Cardiac Impairment and Heart Failure

- name: Structural Cardiac Impairment and Heart Failure
  description: >-
    The end state is cardiomyopathy: a structurally and functionally abnormal
    myocardium that can no longer meet circulatory demand, manifesting as heart
    failure with its attendant morbidity and mortality and risk of progression
    to end-stage disease requiring mechanical support or transplantation. While
    the dominant geometry (dilated, hypertrophic, restrictive) and the
    triggering lesion differ across disorders, the convergence on maladaptive
    structural remodeling and impaired pump function defines the shared
    cardiomyopathy phenotype.
  role: consequence
  biological_processes:
  - preferred_term: Heart Contraction
    term:
      id: GO:0060047
      label: heart contraction
    modifier: ABNORMAL
  evidence:
  - reference: PMID:22752727
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      The pathophysiological basis of heart failure is cardiac remodeling, a
      process that comprises structural and functional changes including
      cardiomyocyte proliferation, hypertrophy, necrosis, apoptosis, autophagy,
      interstitial fibrosis, contractile dysfunction and ventricular dilatation.
    explanation: >-
      Anchors the consequence node by identifying cardiac remodeling as the
      pathophysiological basis of heart failure, the clinical endpoint of the
      module. Evidence source is OTHER because this is a mechanistic review.
  - reference: PMID:8829958
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Recent observations of changes in left ventricular chamber dilatation and
      left ventricular wall hypertrophy occurring over the course of time after
      acute myocardial infarction allow better definition of the subset of
      patients who are at risk of progressive left ventricular dysfunction and
      congestive heart failure.
    explanation: >-
      Describes chamber dilatation and wall hypertrophy as the structural
      changes underlying progressive ventricular dysfunction and congestive
      heart failure, the defining structural-functional impairment of this
      consequence node. Evidence source is OTHER because this is a review.
