name: PARP PARG Macrodomain Viral Evasion Module
description: >-
  A conserved RNA-virus host-response module centered on NAD-dependent
  ADP-ribosylation. Viral infection and interferon signaling induce
  noncanonical PARPs that MARylate or PARylate host and viral proteins,
  restricting viral replication, shaping stress granules, and promoting innate
  cytokine responses. PARG and host macrodomains reset ADP-ribose marks, while
  viral macrodomains encoded by coronaviruses, alphaviruses, hepeviruses, and
  related RNA viruses erase ADP-ribose modifications to counter host antiviral
  defenses and support replication or pathogenesis.
category: Module
creation_date: "2026-05-26T21:37:17Z"
notes: >-
  This is a mechanism module, not a specific disease. Disorder entries reference
  individual nodes via conforms_to (for example,
  "parp_parg_macrodomain_viral_evasion#Viral Macrodomain De-ADP-Ribosylation
  Countermeasure"). The module is intended for RNA virus infections where
  PARP-dependent antiviral ADP-ribosylation, host NAD metabolism, PARG/PAR
  turnover, or viral macrodomain activity is a disease or therapeutic control
  point. SARS-CoV-2 Mac1, alphavirus nsP3 macrodomains, and HEV ORF1
  macrodomains are exemplars rather than required disease-specific details.
mechanistic_hypotheses:
- hypothesis_group_id: canonical_parp_antiviral_adp_ribosylation_model
  hypothesis_label: Canonical PARP Antiviral ADP-Ribosylation Model
  status: CANONICAL
  description: >-
    Interferon and viral infection induce noncanonical PARPs whose
    NAD-dependent ADP-ribosylation activity participates in host antiviral
    defense and limits viral replication.
  evidence:
  - reference: PMID:32244383
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Several PARPs are induced by interferon (IFN) and are known to have
      antiviral properties, implicating ADP-ribosylation in the host defense
      response and suggesting that viral macrodomains may counter this response.
    explanation: >-
      Review evidence supports IFN-induced antiviral PARPs and ADP-ribosylation
      as the host-defense arm of the module.
- hypothesis_group_id: viral_macrodomain_countermeasure_model
  hypothesis_label: Viral Macrodomain Countermeasure Model
  status: CANONICAL
  description: >-
    Viral macrodomains erase mono- or poly-ADP-ribose from proteins, opposing
    PARP-mediated antiviral defenses, stress-granule restriction, and cytokine
    responses.
  evidence:
  - reference: PMID:32244383
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Recent studies have demonstrated that viral macrodomains do counter the
      innate immune response by interfering with PARP-mediated antiviral
      defenses, stress granule formation, and pro-inflammatory cytokine
      production.
    explanation: >-
      Review evidence directly states the viral macrodomain countermeasure
      model.
- hypothesis_group_id: par_pool_balance_model
  hypothesis_label: PAR/PARG Turnover Balance Model
  status: EMERGING
  description: >-
    The balance between PARP-written ADP-ribose marks and PARG or macrodomain
    erasure determines which antiviral, stress-granule, replication, or
    inflammatory outputs dominate in a given virus-cell context.
  evidence:
  - reference: PMID:32244383
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      ADP-ribosylation is a reversible modification via several enzymes that
      belong either to the ADP-ribosylglycohydrolase (DraG-like) family or to
      the macrodomain family [19].
    explanation: >-
      Establishes reversibility through host glycohydrolase and macrodomain
      enzyme families, motivating the turnover-balance hypothesis.
discussions:
- discussion_id: gap_adp_ribosylome_targets_in_viral_evasion
  prompt: >-
    Which ADP-ribosylated host or viral target proteins determine whether the
    PARP/PARG/macrodomain axis primarily controls viral RNA synthesis,
    stress-granule persistence, interferon output, or inflammatory pathology?
  kind: KNOWLEDGE_GAP
  status: OPEN
  attaches_to:
  - pathophysiology#NAD-Dependent Antiviral ADP-Ribosylation
  - pathophysiology#PARG and Host De-ADP-Ribosylation Reset
  - pathophysiology#Viral Macrodomain De-ADP-Ribosylation Countermeasure
  rationale: >-
    The module captures the conserved causal pattern, but disease-specific
    entries will need target-level evidence to decide which ADP-ribosylated
    proteins are the actionable pivot points for a given virus and tissue.
  proposed_experiments:
  - experiment_id: exp_viral_adp_ribosylome_macrodomain_parg_map
    name: Viral ADP-ribosylome macrodomain and PARG perturbation map
    description: >-
      Compare wild-type virus, catalytically impaired viral macrodomain mutants,
      host PARP perturbations, and PARG inhibition or depletion in matched human
      epithelial and myeloid models; quantify the ADP-ribosylome, NAD pools,
      viral RNA synthesis, stress-granule persistence, and interferon/cytokine
      output.
    experiment_type:
      preferred_term: controlled perturbation experiment
    model_systems:
    - name: Human epithelial and macrophage infection model panel
      description: >-
        Matched human infection models that can resolve epithelial replication
        effects and myeloid innate immune output under the same viral
        macrodomain/PARP/PARG perturbation design.
      experimental_model_type: CO_CULTURE
      organism:
        preferred_term: human
        term:
          id: NCBITaxon:9606
          label: Homo sapiens
    perturbations:
    - name: Viral macrodomain catalytic impairment
      target: pathophysiology#Viral Macrodomain De-ADP-Ribosylation Countermeasure
      description: >-
        Introduce catalytic-site macrodomain mutations that reduce ADP-ribose
        binding or hydrolase activity.
      effect: DECREASED
    - name: Host PARG depletion or inhibition
      target: pathophysiology#PARG and Host De-ADP-Ribosylation Reset
      genes:
      - preferred_term: PARG
        term:
          id: hgnc:8605
          label: PARG
      effect: DECREASED
    - name: PARP12 and PARP14 perturbation
      target: pathophysiology#NAD-Dependent Antiviral ADP-Ribosylation
      genes:
      - preferred_term: PARP12
        term:
          id: hgnc:21919
          label: PARP12
      - preferred_term: PARP14
        term:
          id: hgnc:29232
          label: PARP14
    readouts:
    - name: Viral RNA synthesis and replication
      target: pathophysiology#Enhanced Viral Replication and Pathogenesis
      biological_processes:
      - preferred_term: viral genome replication
        term:
          id: GO:0019079
          label: viral genome replication
      direction: POSITIVE
    - name: ADP-ribosylome and NAD pool state
      target: pathophysiology#NAD-Dependent Antiviral ADP-Ribosylation
      description: >-
        Mass-spectrometry and metabolomics readout of ADP-ribosylated proteins
        and cellular NAD availability.
      biological_processes:
      - preferred_term: protein poly-ADP-ribosylation
        term:
          id: GO:0070212
          label: protein poly-ADP-ribosylation
      direction: POSITIVE
    - name: Interferon and inflammatory cytokine output
      target: pathophysiology#Viral Macrodomain De-ADP-Ribosylation Countermeasure
      biological_processes:
      - preferred_term: innate immune response
        term:
          id: GO:0045087
          label: innate immune response
      - preferred_term: defense response to virus
        term:
          id: GO:0051607
          label: defense response to virus
      direction: NEGATIVE
      interpretation: >-
        Increased interferon or cytokine output after viral macrodomain
        impairment would support the macrodomain countermeasure model.
    controls:
    - name: Wild-type virus control
      description: Matched infection with catalytically intact viral macrodomain.
    - name: Mock infection control
      description: Host-cell baseline for NAD and ADP-ribosylome measurements.
    decision_criterion: >-
      A target is prioritized as a pivot point if its ADP-ribosylation changes
      consistently track with viral RNA, stress-granule, and cytokine outputs
      across macrodomain, PARP, and PARG perturbations.
    would_support:
    - pathophysiology#NAD-Dependent Antiviral ADP-Ribosylation
    - pathophysiology#PARG and Host De-ADP-Ribosylation Reset
    - pathophysiology#Viral Macrodomain De-ADP-Ribosylation Countermeasure
    would_refute:
    - pathophysiology#Viral Macrodomain De-ADP-Ribosylation Countermeasure
    evidence:
    - reference: PMID:32244383
      supports: SUPPORT
      evidence_source: OTHER
      snippet: >-
        Macrodomains surely target multiple proteins due to the number of
        different phenotypes associated with mutant viruses, so it will be of
        great interest to identify these proteins, to determine what cellular
        processes are affected by ADP-ribosylation, and to ultimately determine
        how ADP-ribosylation leads to inhibition of virus replication.
      explanation: >-
        This review explicitly identifies target discovery as the unresolved
        gap that the proposed perturbation map would address.
pathophysiology:
- name: RNA Virus-Induced Interferon and PARP Activation
  description: >-
    RNA virus infection and interferon signaling induce noncanonical PARP
    enzymes, including PARP7/TIPARP, PARP10, PARP12, and PARP14 in coronavirus
    contexts. This creates an NAD-consuming antiviral enzyme state upstream of
    ADP-ribosylation-dependent host restriction.
  role: trigger
  genes:
  - preferred_term: PARP10
    term:
      id: hgnc:25895
      label: PARP10
  - preferred_term: PARP12
    term:
      id: hgnc:21919
      label: PARP12
  - preferred_term: PARP14
    term:
      id: hgnc:29232
      label: PARP14
  - preferred_term: PARP7/TIPARP
    term:
      id: hgnc:23696
      label: TIPARP
  biological_processes:
  - preferred_term: defense response to virus
    term:
      id: GO:0051607
      label: defense response to virus
    modifier: INCREASED
  - preferred_term: innate immune response
    term:
      id: GO:0045087
      label: innate immune response
    modifier: INCREASED
  evidence:
  - reference: PMID:33051211
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: >-
      Our data indicate that (i) CoV infection initiates the expression of
      multiple noncanonical PARP isozymes and dysregulates other genes involved
      in NAD metabolism, (ii) CoV infection and PARP10 expression can
      dramatically decrease NAD+ accumulation, and (iii) NAD+ boosting agents
      can improve PARP isozyme function and decrease the replication of a CoV
      that is sensitive to MARylating activities.
    explanation: >-
      SARS-CoV-2 infection data support virus-induced PARP and NAD-metabolism
      remodeling as the upstream state.
  - reference: PMID:32244383
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Several PARPs are induced by interferon (IFN) and are known to have
      antiviral properties, implicating ADP-ribosylation in the host defense
      response and suggesting that viral macrodomains may counter this response.
    explanation: >-
      Review evidence links interferon-induced PARPs to antiviral host defense.
  downstream:
  - target: NAD-Dependent Antiviral ADP-Ribosylation
    description: >-
      Induced PARP enzymes use NAD to write ADP-ribose marks on target proteins.
    hypothesis_groups:
    - canonical_parp_antiviral_adp_ribosylation_model

- name: NAD-Dependent Antiviral ADP-Ribosylation
  description: >-
    PARP enzymes transfer ADP-ribose from NAD onto target proteins as mono- or
    poly-ADP-ribose marks. In infected cells, noncanonical PARP activity can
    restrict viral replication, promote interferon output, and alter stress
    granule biology.
  role: central_effector
  genes:
  - preferred_term: PARP12
    term:
      id: hgnc:21919
      label: PARP12
  - preferred_term: PARP14
    term:
      id: hgnc:29232
      label: PARP14
  chemical_entities:
  - preferred_term: NAD(+)
    term:
      id: CHEBI:15846
      label: NAD(+)
  biological_processes:
  - preferred_term: protein poly-ADP-ribosylation
    term:
      id: GO:0070212
      label: protein poly-ADP-ribosylation
    modifier: INCREASED
  - preferred_term: negative regulation of viral genome replication
    term:
      id: GO:0045071
      label: negative regulation of viral genome replication
    modifier: INCREASED
  evidence:
  - reference: PMID:32244383
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      ADP-ribose is covalently attached to target proteins by poly-ADP-ribose
      polymerases (PARPs), using nicotinamide adenine dinucleotide (NAD+) as a
      substrate.
    explanation: >-
      Defines the NAD-dependent PARP writing reaction that creates the antiviral
      ADP-ribosylation state.
  - reference: PMID:33051211
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: >-
      These data suggest that the antiviral activities of noncanonical PARP
      isozyme activities are limited by the availability of NAD and that
      nutritional and pharmacological interventions to enhance NAD levels may
      boost innate immunity to coronaviruses.
    explanation: >-
      Supports the dependence of antiviral PARP activity on NAD availability.
  downstream:
  - target: PARG and Host De-ADP-Ribosylation Reset
    description: >-
      Host hydrolases can reverse ADP-ribose marks and reset the PAR/MAR state.
    hypothesis_groups:
    - par_pool_balance_model
  - target: Viral Macrodomain De-ADP-Ribosylation Countermeasure
    description: >-
      Viral macrodomains oppose the same PARP-written antiviral marks.
    hypothesis_groups:
    - viral_macrodomain_countermeasure_model

- name: PARG and Host De-ADP-Ribosylation Reset
  description: >-
    PARG removes poly-ADP-ribose polymers, while host macrodomains remove
    selected mono-ADP-ribose marks. This host erasure layer controls the
    duration and amplitude of ADP-ribosylation signals and is a natural
    comparison point for viral macrodomain activity.
  role: amplifier
  genes:
  - preferred_term: PARG
    term:
      id: hgnc:8605
      label: PARG
  biological_processes:
  - preferred_term: protein poly-ADP-ribosylation
    term:
      id: GO:0070212
      label: protein poly-ADP-ribosylation
    modifier: DECREASED
  evidence:
  - reference: PMID:32244383
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      ADP-ribosylation is a reversible modification via several enzymes that
      belong either to the ADP-ribosylglycohydrolase (DraG-like) family or to
      the macrodomain family [19].
    explanation: >-
      Supports ADP-ribosylation reversibility through host enzyme families.
  - reference: PMID:32244383
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Some of these enzymes hydrolyze a single unit of MAR, whereas the
      poly-ADP-ribose glycohydrolases (PARGs) can remove polymers of ADP-ribose
      molecules at O-glycosidic bonds [20,21,22,23].
    explanation: >-
      Directly supports PARG as the host enzyme class that removes poly-ADP-ribose
      polymers.
  downstream:
  - target: Viral Macrodomain De-ADP-Ribosylation Countermeasure
    description: >-
      Viral macrodomains mimic or compete with host erasure logic to oppose
      antiviral PARP-written marks.
    hypothesis_groups:
    - par_pool_balance_model
    - viral_macrodomain_countermeasure_model

- name: Viral Macrodomain De-ADP-Ribosylation Countermeasure
  description: >-
    Viral macrodomains bind and hydrolyze ADP-ribose modifications on host or
    viral proteins. By erasing PARP-written marks, they can blunt interferon
    production, disrupt antiviral stress granules, and remove restrictions on
    viral RNA synthesis or pathogenesis.
  role: adaptive_escape
  biological_processes:
  - preferred_term: protein poly-ADP-ribosylation
    term:
      id: GO:0070212
      label: protein poly-ADP-ribosylation
    modifier: DECREASED
  - preferred_term: negative regulation of viral genome replication
    term:
      id: GO:0045071
      label: negative regulation of viral genome replication
    modifier: DECREASED
  evidence:
  - reference: PMID:33158944
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: >-
      Mac1 likely counters host-mediated antiviral ADP-ribosylation, a
      posttranslational modification that is part of the host response to viral
      infections.
    explanation: >-
      SARS-CoV-2 Mac1 biochemical evidence supports viral macrodomain
      counteraction of host antiviral ADP-ribosylation.
  - reference: PMID:27440879
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: >-
      Here, we show that viral macro domains reverse cellular ADP-ribosylation,
      potentially cutting the signal of a viral infection in the cell.
    explanation: >-
      Establishes viral macrodomains as ADP-ribosylation erasers that can blunt
      infection-associated signals.
  - reference: PMID:32244383
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Studies from the past 15 years have clearly shown that viral macrodomains
      bind MAR- and PARylated proteins and enzymatically hydrolyze ADP-ribose
      from proteins.
    explanation: >-
      Review evidence supports both MAR/PAR binding and enzymatic erasure by
      viral macrodomains.
  downstream:
  - target: Enhanced Viral Replication and Pathogenesis
    description: >-
      Viral de-ADP-ribosylation removes antiviral restrictions and can restore
      replication fitness or in vivo virulence.
    hypothesis_groups:
    - viral_macrodomain_countermeasure_model

- name: Enhanced Viral Replication and Pathogenesis
  description: >-
    When viral macrodomains successfully counter antiviral ADP-ribosylation,
    viruses can improve RNA synthesis, productive infection, tissue replication,
    or pathogenesis. Conversely, catalytic macrodomain defects attenuate
    replication or virulence and nominate macrodomains as antiviral targets.
  role: consequence
  biological_processes:
  - preferred_term: viral genome replication
    term:
      id: GO:0019079
      label: viral genome replication
    modifier: INCREASED
  - preferred_term: viral process
    term:
      id: GO:0016032
      label: viral process
    modifier: INCREASED
  evidence:
  - reference: PMID:35297669
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: >-
      Our findings indicate that viral poly-ARH activity is uniquely required
      for high titer replication in mammalian systems.
    explanation: >-
      Sindbis virus evidence directly links macrodomain poly-ADP-ribose
      hydrolase activity to high-titer replication.
  - reference: PMID:35297669
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: >-
      These domains erase mono- or poly-ADP-ribose, posttranslational
      modifications written by host poly-ADP-ribose polymerase (PARP) proteins,
      from undetermined host or viral proteins to enhance replication.
    explanation: >-
      Supports the final causal edge from viral ADP-ribose erasure to enhanced
      replication.
  - reference: PMID:33158944
    supports: SUPPORT
    evidence_source: MODEL_ORGANISM
    snippet: >-
      Mac1 is essential for pathogenesis in multiple animal models of CoV
      infection, implicating it as a virulence factor and potential therapeutic
      target.
    explanation: >-
      Connects coronavirus macrodomain activity to pathogenesis and therapeutic
      targetability.
