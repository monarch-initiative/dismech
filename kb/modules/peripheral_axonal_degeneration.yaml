name: Peripheral Axonal Degeneration Module
description: >-
  A conserved peripheral nerve degeneration module representing the final common
  pathway of peripheral neuropathy (HP:0009830 / MONDO:0005244). Metabolic,
  genetic, toxic/chemotherapeutic, and inflammatory insults to peripheral neurons
  and Schwann cells converge on impaired axonal transport, mitochondrial
  dysfunction, and oxidative stress in long axons, producing distal axonal
  degeneration and/or demyelination, length-dependent loss of sensory and motor
  nerve-fiber function, and ultimately the clinical phenotype of distal sensory
  loss, neuropathic pain, and weakness. Because long peripheral axons are most
  vulnerable to bioenergetic failure, the degeneration is characteristically
  length-dependent, producing a distal-to-proximal "glove and stocking"
  distribution that recurs across diabetic/metabolic neuropathy, inherited
  Charcot-Marie-Tooth disease, chemotherapy-induced peripheral neuropathy, and
  inflammatory/autoimmune neuropathy. Individual disorder entries declare
  conformance via conforms_to on their pathophysiology nodes, substituting the
  disorder-specific initiating lesion (e.g., hyperglycemia/dyslipidemia in
  diabetic neuropathy; myelin/gap-junction gene mutations in CMT; microtubule- or
  mitochondria-targeting agents in chemotherapy-induced neuropathy;
  autoantibody/cell-mediated attack in inflammatory neuropathy) while preserving
  the conserved causal chain.
category: Module
creation_date: "2026-06-06T00:00:00Z"
notes: >-
  This is a mechanism module, not a specific disease. Disorder entries reference
  individual nodes via conforms_to (e.g.,
  "peripheral_axonal_degeneration#Distal Axonal Degeneration and Demyelination").
  The module defines the expected pathophysiology structure; conforming nodes in
  disorder files should include the corresponding cell types, biological
  processes, and causal edges, specialized to their context. Key disorder-specific
  substitutions: diabetic/metabolic neuropathy substitutes hyperglycemia and
  dyslipidemia at the trigger node; Charcot-Marie-Tooth substitutes myelin or
  gap-junction gene mutations and emphasizes the Schwann cell (CL:0002573)
  demyelinating arm; chemotherapy-induced neuropathy substitutes microtubule- or
  mitochondria-targeting antineoplastic agents and emphasizes the axonal-transport
  and mitochondrial-dysfunction amplifier; inflammatory/autoimmune neuropathy
  substitutes humoral or cell-mediated attack on axons and myelin. Predominantly
  axonal disorders may omit the Schwann cell demyelination component, and
  predominantly demyelinating disorders emphasize it; both converge on the
  length-dependent nerve-fiber dysfunction node.
pathophysiology:
- name: Insult to Peripheral Neurons and Schwann Cells
  description: >-
    Metabolic, genetic, toxic, or inflammatory insults injure peripheral sensory
    and motor neurons and the Schwann cells that ensheath their axons. The
    initiating lesion varies by disorder (hyperglycemia and dyslipidemia in
    diabetic neuropathy, myelin or gap-junction gene mutations in inherited
    neuropathy, microtubule- or mitochondria-targeting drugs in
    chemotherapy-induced neuropathy, autoantibody or cell-mediated attack in
    inflammatory neuropathy), but the downstream response converges on a shared
    program of cellular stress in peripheral neurons and glia.
  role: trigger
  cell_types:
  - preferred_term: peripheral sensory neuron
    term:
      id: CL:0000540
      label: neuron
  - preferred_term: Schwann cell
    term:
      id: CL:0002573
      label: Schwann cell
  biological_processes:
  - preferred_term: response to oxidative stress
    term:
      id: GO:0006979
      label: response to oxidative stress
    modifier: DYSREGULATED
  evidence:
  - reference: PMID:37263266
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Diabetic peripheral neuropathy (DPN), the most common microvascular
      complication, is length-dependent damage to peripheral nerves.
    explanation: >-
      Establishes the prototypical metabolic insult (diabetes) as length-dependent
      damage to peripheral nerves, the generic trigger state for this module.
      Evidence source is OTHER because this is a review synthesizing multiple
      study types.
  - reference: PMID:25748038
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Despite the existence of a blood-nerve barrier, both humoral and cellular
      immunity can be directed against peripheral axons and myelin.
    explanation: >-
      Demonstrates an alternative initiating lesion, immune-mediated attack on
      peripheral axons and myelin, that converges on the same peripheral
      neuron/Schwann cell injury. Evidence source is OTHER because this is a
      review of autoimmune peripheral neuropathies.
  downstream:
  - target: Axonal Transport Impairment and Mitochondrial Dysfunction

- name: Axonal Transport Impairment and Mitochondrial Dysfunction
  description: >-
    Injured peripheral neurons exhibit disrupted axonal transport, mitochondrial
    structural and bioenergetic dysfunction, and increased oxidative stress.
    Because long peripheral axons depend on efficient transport of mitochondria
    and other cargo over great distances, this bioenergetic failure preferentially
    compromises the distal ends of the longest fibers and amplifies the initial
    insult toward overt degeneration.
  role: amplifier
  cell_types:
  - preferred_term: peripheral sensory neuron
    term:
      id: CL:0000540
      label: neuron
  biological_processes:
  - preferred_term: axonal transport
    term:
      id: GO:0098930
      label: axonal transport
    modifier: DECREASED
  - preferred_term: mitochondrion organization
    term:
      id: GO:0007005
      label: mitochondrion organization
    modifier: ABNORMAL
  - preferred_term: response to oxidative stress
    term:
      id: GO:0006979
      label: response to oxidative stress
    modifier: INCREASED
  evidence:
  - reference: PMID:34182057
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      many chemotherapeutic agents cause mitochondrial injury in the peripheral
      sensory nerves by disrupting mitochondrial structure and bioenergetics,
      increasing nitro-oxidative stress and altering mitochondrial transport,
      fission, fusion and mitophagy.
    explanation: >-
      Directly links mitochondrial structural/bioenergetic injury, oxidative
      stress, and disrupted mitochondrial transport in peripheral sensory nerves.
      Evidence source is OTHER because this is a mini-review synthesizing
      preclinical and clinical data.
  - reference: PMID:38660386
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      One prominent change induced by chemotherapeutic agents involves the
      disruption of neuronal cytoskeletal architecture and axonal transport
      dynamics largely influenced by the interference of microtubule stability
      in peripheral neurons.
    explanation: >-
      Confirms impaired axonal transport via cytoskeletal/microtubule disruption
      as a conserved amplifying mechanism in peripheral neurons. Evidence source
      is OTHER because this is a review.
  downstream:
  - target: Distal Axonal Degeneration and Demyelination

- name: Distal Axonal Degeneration and Demyelination
  description: >-
    Sustained transport failure, mitochondrial dysfunction, and oxidative stress
    drive degeneration of the distal axon, frequently accompanied by Schwann cell
    demyelination. In predominantly axonal neuropathies the axon degenerates
    directly; in predominantly demyelinating neuropathies (e.g., demyelinating
    Charcot-Marie-Tooth disease) impaired Schwann cell-axon interactions and loss
    of myelin precede secondary axonal loss, but axonal degeneration is ultimately
    required for clinical symptoms. This is the central effector step converging
    across disorders.
  role: central_effector
  cell_types:
  - preferred_term: Schwann cell
    term:
      id: CL:0002573
      label: Schwann cell
  biological_processes:
  - preferred_term: myelination
    term:
      id: GO:0042552
      label: myelination
    modifier: DECREASED
  - preferred_term: axon ensheathment
    term:
      id: GO:0008366
      label: axon ensheathment
    modifier: DECREASED
  - preferred_term: neuron apoptotic process
    term:
      id: GO:0051402
      label: neuron apoptotic process
    modifier: INCREASED
  evidence:
  - reference: PMID:31760652
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      CMT1, CMT4, and CMTX1 are primarily demyelinating neuropathies, axonal
      degeneration is necessary for symptoms to develop. Schwann cell-axon
      interactions are impaired in the pathogenesis of demyelinating CMT.
    explanation: >-
      Establishes the demyelination arm (impaired Schwann cell-axon interactions
      and myelin loss) and that axonal degeneration is ultimately required for
      symptoms, the central effector convergence. Evidence source is OTHER
      because this is a review.
  - reference: PMID:28620280
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      The pathophysiological processes are multi-factorial and involve oxidative
      stress, apoptotic mechanisms, altered calcium homeostasis, axon degeneration
      and membrane remodeling as well as immune processes and neuroinflammation.
    explanation: >-
      Confirms axon degeneration alongside apoptotic mechanisms and oxidative
      stress as core processes in a toxic (chemotherapy-induced) neuropathy.
      Evidence source is OTHER because this is a review.
  downstream:
  - target: Length-Dependent Nerve Fiber Dysfunction

- name: Length-Dependent Nerve Fiber Dysfunction
  description: >-
    Degeneration and demyelination of the longest axons cause loss of conduction
    in sensory and motor nerve fibers in a length-dependent distribution, so that
    the distal extremities (feet before hands) are affected first. The result is
    failed transmission of sensory, motor, and autonomic signals along the most
    vulnerable peripheral fibers.
  role: effector
  cell_types:
  - preferred_term: peripheral sensory neuron
    term:
      id: CL:0000540
      label: neuron
  biological_processes:
  - preferred_term: transmission of nerve impulse
    term:
      id: GO:0019226
      label: transmission of nerve impulse
    modifier: DECREASED
  - preferred_term: neuromuscular process
    term:
      id: GO:0050905
      label: neuromuscular process
    modifier: DECREASED
  evidence:
  - reference: PMID:38660386
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      CIPN is characterized by a substantial loss of primary afferent sensory
      axonal fibers leading to sensory disturbances in patients.
    explanation: >-
      Demonstrates loss of sensory nerve-fiber function as the consequence of
      axonal degeneration. Evidence source is OTHER because this is a review.
  - reference: PMID:37263266
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      it can be viewed as a state of impaired metabolism and bioenergetics
      failure operating against the backdrop of long peripheral nerve axons
      supported by glia. This unique peripheral nerve anatomy and the injury
      consequent to T2D underpins the distal-to-proximal symptomatology of DPN.
    explanation: >-
      Directly ties the vulnerability of long peripheral axons to the
      distal-to-proximal, length-dependent pattern of nerve-fiber dysfunction.
      Evidence source is OTHER because this is a review.
  downstream:
  - target: Peripheral Neuropathy

- name: Peripheral Neuropathy
  description: >-
    The convergent outcome is the clinical phenotype of peripheral neuropathy:
    distal sensory loss and numbness, neuropathic pain, and motor weakness,
    typically in a symmetric glove-and-stocking distribution reflecting the
    length-dependent degeneration of the longest peripheral nerve fibers. The
    relative contribution of sensory, motor, and autonomic deficits varies by
    underlying disorder, but the convergent phenotype is length-dependent
    peripheral nerve dysfunction.
  role: consequence
  biological_processes:
  - preferred_term: sensory perception of pain
    term:
      id: GO:0019233
      label: sensory perception of pain
    modifier: ABNORMAL
  - preferred_term: sensory perception of touch
    term:
      id: GO:0050975
      label: sensory perception of touch
    modifier: DECREASED
  evidence:
  - reference: PMID:28620280
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      chemotherapy-induced peripheral neuropathy presents as deficits in sensory,
      motor, and autonomic function which develop in a glove and stocking
      distribution due to preferential effects on longer axons.
    explanation: >-
      Directly describes the clinical phenotype: sensory, motor, and autonomic
      deficits in a length-dependent glove-and-stocking distribution, the defining
      consequence of this module. Evidence source is OTHER because this is a
      review.
  - reference: PMID:34182057
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      The accumulation of abnormal and dysfunctional mitochondria in sensory
      neurons are linked to axonal growth defects resulting in the loss of
      intraepidermal nerve fibers in the hands and feet
    explanation: >-
      Connects the upstream mitochondrial/axonal mechanism to distal sensory
      nerve-fiber loss in the hands and feet, the clinical hallmark of peripheral
      neuropathy. Evidence source is OTHER because this is a mini-review.
