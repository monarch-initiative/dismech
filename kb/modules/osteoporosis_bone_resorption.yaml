name: Osteoporosis Bone Resorption Module
description: >-
  A conserved metabolic bone-disease module representing the imbalance between
  osteoclastic bone resorption and osteoblastic bone formation that produces low
  bone mass and skeletal fragility. Across postmenopausal (estrogen-deficient),
  senile, glucocorticoid-induced, and genetic/secondary osteoporoses, the
  initiating lesion converges on the basic multicellular unit: tightly coupled
  remodeling becomes uncoupled, RANKL-driven osteoclastogenesis is enhanced
  relative to Wnt-driven osteoblast formation, and net negative bone balance with
  microarchitectural deterioration follows. Individual disorder entries declare
  conformance via conforms_to on their pathophysiology nodes, substituting the
  disorder-specific upstream driver (estrogen withdrawal, glucocorticoid excess,
  Wnt-pathway or collagen gene defect) while preserving the conserved
  resorption/formation-imbalance chain.
category: Module
creation_date: "2026-06-06T00:00:00Z"
notes: >-
  This is a mechanism module, not a specific disease. Disorder entries reference
  individual nodes via conforms_to (e.g.,
  "osteoporosis_bone_resorption#Increased Osteoclastic Bone Resorption").
  Conforming nodes should substitute the disorder-specific driver of the
  remodeling imbalance: estrogen deficiency in postmenopausal osteoporosis,
  Wnt/Dkk1 suppression in glucocorticoid-induced osteoporosis, and LRP5/WNT1 or
  COL1A1/COL1A2 variants in monogenic low-bone-mass disorders.
pathophysiology:
- name: Bone Remodeling Imbalance
  description: >-
    The bone remodeling cycle normally tightly couples osteoclastic resorption to
    osteoblastic formation within the basic multicellular unit, governed by the
    RANK/RANKL/osteoprotegerin and canonical Wnt signaling axes. The initiating
    lesion of osteoporosis is disruption of this coupling so that the resorption
    and formation arms are no longer balanced, regardless of whether the upstream
    driver is hormonal, pharmacological, or genetic.
  role: trigger
  cell_types:
  - preferred_term: Osteoblast
    term:
      id: CL:0000062
      label: osteoblast
  - preferred_term: Osteocyte
    term:
      id: CL:0000137
      label: osteocyte
  biological_processes:
  - preferred_term: Bone Remodeling
    term:
      id: GO:0046849
      label: bone remodeling
    modifier: DYSREGULATED
  evidence:
  - reference: PMID:29368538
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      During the bone remodelling cycle, osteoclastic resorption is tightly
      coupled to osteoblastic bone formation.
    explanation: >-
      Establishes the normal tight coupling of resorption to formation whose
      disruption is the conserved initiating lesion of this module. Evidence
      source is OTHER because this is a review article.
  - reference: PMID:29368538
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      The key signalling pathways controlling osteoclastic bone resorption and
      osteoblastic bone formation are receptor activator of nuclear factor-κB
      (RANK)/RANK ligand/osteoprotegerin and canonical Wnt signalling.
    explanation: >-
      Identifies the conserved RANK/RANKL/OPG and Wnt signaling axes that govern
      the remodeling balance perturbed across osteoporoses. Evidence source is
      OTHER because this is a review article.
  downstream:
  - target: RANKL-Driven Osteoclastogenesis
- name: RANKL-Driven Osteoclastogenesis
  description: >-
    Loss of remodeling coupling shifts the RANKL/OPG ratio toward RANKL, the
    critical uncoupling factor that drives differentiation and survival of
    osteoclasts from myeloid precursors. Estrogen deficiency raises RANKL and
    lowers OPG; glucocorticoid excess likewise enhances RANKL and suppresses OPG,
    converging on enhanced osteoclastogenesis.
  role: amplifier
  cell_types:
  - preferred_term: Osteoclast
    term:
      id: CL:0000092
      label: osteoclast
  biological_processes:
  - preferred_term: Osteoclast Differentiation
    term:
      id: GO:0030316
      label: osteoclast differentiation
    modifier: INCREASED
  evidence:
  - reference: PMID:36982891
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Nuclear factor-κβ ligand (RANKL) appears to be the critical uncoupling
      factor that enhances osteoclastogenesis. In contrast, osteoprotegerin (OPG)
      is a RANKL antagonist secreted by osteoblast lineage cells.
    explanation: >-
      Directly names RANKL as the critical uncoupling factor enhancing
      osteoclastogenesis and OPG as its antagonist, the conserved amplifier step.
      Evidence source is OTHER because this is a review article.
  - reference: PMID:36982891
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Estrogen deficiency leads to the uncoupling of bone resorption and
      formation; therefore, resulting in greater bone loss.
    explanation: >-
      Shows that a major upstream driver (estrogen deficiency) acts through
      uncoupling resorption from formation, the mechanism this node captures.
      Evidence source is OTHER because this is a review article.
  downstream:
  - target: Increased Osteoclastic Bone Resorption
- name: Increased Osteoclastic Bone Resorption
  description: >-
    Expanded and activated osteoclasts digest mineralized bone matrix at a rate
    that exceeds osteoblastic replacement. This is the central effector step of
    the module: resorption that is normally balanced by an equal wave of
    formation now outpaces it, eroding trabecular and cortical bone.
  role: central_effector
  cell_types:
  - preferred_term: Osteoclast
    term:
      id: CL:0000092
      label: osteoclast
  biological_processes:
  - preferred_term: Bone Resorption
    term:
      id: GO:0045453
      label: bone resorption
    modifier: INCREASED
  evidence:
  - reference: PMID:17308163
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Bone remodeling involves the removal of mineralized bone by osteoclasts
      followed by the formation of bone matrix through the osteoblasts that
      subsequently become mineralized.
    explanation: >-
      Establishes osteoclast-mediated removal of mineralized bone as the
      resorptive arm of remodeling whose excess defines this central effector
      step. Evidence source is OTHER because this is a review article.
  - reference: PMID:17308163
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      the processes of bone resorption and formation are tightly coupled allowing
      a wave of bone formation to follow each cycle of bone resorption, thus
      maintaining skeletal integrity.
    explanation: >-
      Describes how resorption is normally coupled to a following wave of
      formation; loss of this coupling yields the net resorption this node
      represents. Evidence source is OTHER because this is a review.
  downstream:
  - target: Impaired Osteoblastic Bone Formation
- name: Impaired Osteoblastic Bone Formation
  description: >-
    In parallel with excess resorption, osteoblastic bone formation and
    mineralization are inadequate to refill resorption cavities. Glucocorticoid
    excess upregulates Dickkopf-1 and inhibits Wnt signaling to reduce osteoblast
    differentiation, while estrogen deficiency removes a pro-osteogenic Wnt/BMP
    stimulus. The result is reduced ossification relative to the resorptive load.
  role: effector
  cell_types:
  - preferred_term: Osteoblast
    term:
      id: CL:0000062
      label: osteoblast
  biological_processes:
  - preferred_term: Ossification
    term:
      id: GO:0001503
      label: ossification
    modifier: DECREASED
  - preferred_term: Bone Mineralization
    term:
      id: GO:0030282
      label: bone mineralization
    modifier: DECREASED
  evidence:
  - reference: PMID:36982891
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Excessive glucocorticoids increase PPAR-2 production, upregulate the
      expression of Dickkopf-1 (DKK1) in osteoblasts, and inhibit the Wnt
      signaling pathway, thus decreasing osteoblast differentiation.
    explanation: >-
      Demonstrates suppression of Wnt-driven osteoblast differentiation as a
      conserved mechanism reducing the formation arm of remodeling. Evidence
      source is OTHER because this is a review article.
  downstream:
  - target: Net Bone Loss and Skeletal Fragility
- name: Net Bone Loss and Skeletal Fragility
  description: >-
    Sustained imbalance between excess resorption and deficient formation produces
    net negative bone balance, loss of bone mineral density, and deterioration of
    trabecular and cortical microarchitecture. The accumulated structural deficit
    reduces bone strength and predisposes to low-trauma fractures, the defining
    clinical consequence of osteoporosis.
  role: consequence
  biological_processes:
  - preferred_term: Bone Remodeling
    term:
      id: GO:0046849
      label: bone remodeling
    modifier: DYSREGULATED
  evidence:
  - reference: PMID:29368538
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Disruption of the bone remodelling cycle and any resulting imbalance
      between bone resorption and formation leads to metabolic bone disease, most
      commonly osteoporosis.
    explanation: >-
      Directly states that imbalance between resorption and formation leads to
      osteoporosis, the defining consequence of this module. Evidence source is
      OTHER because this is a review article.
  - reference: PMID:36982891
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Osteoporosis resulting from an imbalance of bone turnover between
      resorption and formation is a critical health issue worldwide.
    explanation: >-
      Confirms that osteoporosis is the clinical outcome of imbalanced bone
      turnover, the endpoint of this module's causal chain. Evidence source is
      OTHER because this is a review article.
