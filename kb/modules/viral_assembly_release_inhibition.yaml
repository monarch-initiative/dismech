name: Viral Assembly and Release Inhibition Module
description: >-
  The late-stage virion-morphogenesis and egress pathway and the points at which
  assembly- and release-targeting antivirals interrupt it. Once a virus has
  replicated its genome and expressed its structural proteins, the infectious
  cycle is completed by a defined cascade: progeny virion components are
  assembled at a membrane assembly site; nascent particles bud out from the host
  plasma membrane; and, for influenza, the surface sialidase neuraminidase frees
  budded virions from cell-surface and viral sialic acid so they can disperse and
  spread. This module traces that cascade as a causal chain — assembly -> budding
  -> neuraminidase-mediated release -> suppression of spread — with an adaptive
  resistance branch. Two well-established antiviral drug classes act on it. In
  hepatitis C virus, the nonstructural phosphoprotein NS5A organises the
  membranous replication/assembly complex, and the NS5A inhibitors (the "-asvir"
  class — ledipasvir, velpatasvir, daclatasvir) disrupt replication-complex
  formation and virion assembly, acting at the earliest, assembly-organising step;
  they are essential components of curative direct-acting antiviral (DAA)
  combinations. In influenza, neuraminidase is a surface sialidase that cleaves
  terminal sialic acid residues to release budding progeny virions, and the
  neuraminidase inhibitors (oseltamivir, zanamivir, peramivir) are
  transition-state analogues that block this cleavage, trapping virions at the
  cell surface and arresting cell-to-cell spread — the canonical conformance and
  treatment target of the module. The net biological effect is suppression of
  progeny virion release and spread. Because the inhibitors act on defined target
  sites, target-site substitutions (influenza NA H275Y/R294K/I223R; HCV NS5A
  resistance-associated substitutions) escape them and gate drug choice. NOTE:
  influenza baloxavir is NOT an assembly/release inhibitor — it targets the PA
  cap-dependent endonuclease of the polymerase complex and belongs with the
  polymerase-complex mechanism, not here. See projects/ANTIVIRAL.md.
category: Module
creation_date: "2026-06-24T00:00:00Z"
notes: >-
  This is an antiviral drug-mechanism module structured as a biological pathway,
  not a specific disease. Its nodes are successive biological steps of late virion
  morphogenesis and egress (progeny-virion assembly -> budding at the host
  membrane -> neuraminidase-mediated release -> suppression of release/spread),
  with an adaptive resistance branch; the drug classes that act on each step are
  described in the node text rather than modelled as separate nodes. Disorder
  entries reference individual nodes via conforms_to (e.g.,
  "viral_assembly_release_inhibition#Neuraminidase-Mediated Release of Progeny
  Virions"), and their assembly/release-targeting treatments point at the
  inhibited node via target_mechanisms (the neuraminidase-release node for the
  neuraminidase inhibitors; the assembly node for the HCV NS5A inhibitors),
  analogous to how polymerase-targeting treatments link to
  "viral_polymerase_inhibition#Nucleotide Selection and Catalytic Incorporation at
  the Polymerase Active Site" and cell-wall-active antibiotic treatments link to
  "bacterial_cell_wall_synthesis_inhibition#Peptidoglycan Cross-Linking by
  Penicillin-Binding Proteins". Key conformance / treatment target:
  "Neuraminidase-Mediated Release of Progeny Virions" — the influenza-neuraminidase
  sialidase step that frees budded virions and is the target of the neuraminidase
  inhibitors. The resistance node captures the gating knowledge that distinguishes
  "an assembly/release inhibitor is used" from real drug selection — target-site
  substitutions (NA H275Y, NS5A RASs) that escape these agents. See
  projects/ANTIVIRAL.md.
pathophysiology:
- name: Assembly of Progeny Virions
  description: >-
    The infectious cycle is completed only when newly synthesised viral
    components are collected and assembled into progeny particles at a dedicated
    membrane assembly site. Because complete virions are not found pre-formed
    inside the cell, this assembly step is obligatory for producing infectious
    particles and is the committed start of the egress cascade. In hepatitis C
    virus the nonstructural phosphoprotein NS5A organises the membranous
    replication/assembly complex ("replication factory") and is essential for
    virion assembly; the NS5A inhibitors (the "-asvir" class — ledipasvir,
    velpatasvir, daclatasvir) act at exactly this assembly-organising step,
    disrupting replication-complex formation, and are essential components of
    curative DAA combinations.
  role: trigger
  biological_processes:
  - preferred_term: Virion Assembly
    term:
      id: GO:0019068
      label: virion assembly
  evidence:
  - reference: PMID:19481124
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      the processes of assembly, morphogenesis, budding and release of progeny
      virus particles at the plasma membrane of the infected cells are critically
      important for the production of infectious virions
    explanation: >-
      Establishes assembly as the committed, obligatory first step of the
      egress cascade that yields infectious progeny virions. Evidence source is
      OTHER as this is a review article.
  - reference: PMID:31644192
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      The NS5A region encodes a polypeptide that is essential for production and
      maintenance of the replicative complex.
    explanation: >-
      Confirms HCV NS5A as essential for the replication/assembly complex — the
      assembly-organising step disrupted by NS5A inhibitors. Evidence source is
      OTHER as this is a reference-database review (LiverTox).
  - reference: PMID:27643675
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      2nd generation NS5A inhibitors have
      become essential components of HCV combination therapies.
    explanation: >-
      Establishes the NS5A replication-complex/assembly inhibitors as an essential
      DAA class acting at this assembly-organising step. Evidence source is OTHER
      as this is a review article.
  downstream:
  - target: Budding of Virions at the Host Membrane
    description: >-
      Once components are assembled at the membrane assembly site, nascent
      particles bud outward from the host plasma membrane.

- name: Budding of Virions at the Host Membrane
  description: >-
    After assembly, nascent virions form and bud outward from the host plasma
    membrane. For enveloped viruses such as influenza this proceeds through bud
    initiation, bud growth, and bud scission/release, with all virion components
    brought to the apical membrane budding site and matrix and envelope proteins
    (M1, M2, and neuraminidase) driving bud release. Budding produces particles
    that are still tethered to the cell surface and to each other, setting up the
    requirement for the neuraminidase-mediated detachment step that follows.
  role: effector
  biological_processes:
  - preferred_term: Viral Budding
    term:
      id: GO:0046755
      label: viral budding
  evidence:
  - reference: PMID:19481124
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Budding processes involve bud initiation, bud growth and bud release.
    explanation: >-
      Defines the budding step as a distinct, ordered sub-process (initiation,
      growth, release) downstream of assembly. Evidence source is OTHER as this is
      a review article.
  - reference: PMID:19481124
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Among
      the viral components, M1, M2 and NA play important roles in bud release
    explanation: >-
      Confirms neuraminidase (NA) among the viral components driving bud release,
      linking budding to the neuraminidase detachment step that follows. Evidence
      source is OTHER as this is a review article.
  downstream:
  - target: Neuraminidase-Mediated Release of Progeny Virions
    description: >-
      Budded influenza virions remain tethered by sialic acid and require
      neuraminidase to cleave it and free them for spread.

- name: Neuraminidase-Mediated Release of Progeny Virions
  description: >-
    Newly budded influenza virions remain bound to terminal sialic acid residues
    on host-cell and viral glycans — the same residues that the haemagglutinin
    binds. The surface glycoprotein neuraminidase (NA) is a sialidase that cleaves
    these residues, freeing budded progeny virions from the infected cell and from
    each other so they can disperse and spread cell-to-cell. This sialidase step
    is the target of the neuraminidase inhibitors (oseltamivir, zanamivir,
    peramivir), which are sialic-acid transition-state analogues that block the
    cleavage. This is the canonical conformance and treatment target of the
    module.
  role: therapeutic_vulnerability
  biological_processes:
  - preferred_term: Viral Release from Host Cell
    term:
      id: GO:0019076
      label: viral release from host cell
  molecular_functions:
  - preferred_term: Sialidase (Neuraminidase) Activity
    term:
      id: GO:0004308
      label: exo-alpha-sialidase activity
  evidence:
  - reference: PMID:23028967
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: >-
      Influenza virus neuraminidase (NA) cleaves terminal sialic acid residues
      on oligosaccharide chains that are receptors for virus binding, thus
      playing an important role in the release of virions from infected cells to
      promote the spread of cell-to-cell infection.
    explanation: >-
      Establishes the influenza neuraminidase sialidase release step — cleaving
      sialic acid to free progeny virions and promote spread — as the drug target
      of the neuraminidase inhibitors. Evidence source is IN_VITRO as this is a
      cell-based infection study.
  downstream:
  - target: Suppression of Progeny Virion Release and Spread
    description: >-
      Blocking neuraminidase-mediated release (or NS5A-organised assembly)
      collapses the yield of released infectious progeny and arrests spread.
  - target: Assembly/Release-Inhibitor Resistance
    description: >-
      Target-site substitutions in neuraminidase (or in NS5A at the upstream
      assembly step) escape these inhibitors and gate drug choice.

- name: Suppression of Progeny Virion Release and Spread
  description: >-
    When the assembly/release cascade is pharmacologically engaged, mature
    progeny virions can no longer be liberated and disseminated. For influenza,
    neuraminidase inhibitors leave newly budded virions aggregated and tethered to
    sialic acid on the host-cell surface and on each other, so the yield of
    released infectious progeny collapses and cell-to-cell spread is arrested; for
    HCV, NS5A inhibitors block replication-complex formation and virion assembly so
    that infectious particle production fails. This is the antiviral consequence of
    engaging the upstream release/assembly target — analogous to chain termination
    for polymerase inhibitors. Because it acts at the spread step rather than at
    initial entry, the clinical benefit of neuraminidase inhibitors is greatest
    when treatment begins early, before peak viral replication.
  role: consequence
  biological_processes:
  - preferred_term: Negative Regulation of Viral Process
    term:
      id: GO:0048525
      label: negative regulation of viral process
  evidence:
  - reference: PMID:23028967
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: >-
      cell-to-cell infection was severely inhibited by
      zanamivir
    explanation: >-
      Directly demonstrates the antiviral consequence of this node — the
      neuraminidase inhibitor zanamivir blocks release of progeny virus and
      severely inhibits cell-to-cell spread. Evidence source is IN_VITRO as this
      is a cell-based infection study.
  - reference: PMID:27643675
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      2nd generation NS5A inhibitors have
      become essential components of HCV combination therapies.
    explanation: >-
      Supports the antiviral endpoint for the HCV arm — NS5A
      assembly/replication-complex inhibitors are essential components of curative
      combinations that suppress infectious particle production. Evidence source is
      OTHER as this is a review article.

- name: Assembly/Release-Inhibitor Resistance
  description: >-
    Target-site substitutions in the assembly/release machinery escape these
    inhibitors. In influenza A(H1N1), the neuraminidase H275Y substitution confers
    high-level oseltamivir resistance and can spread in circulating viruses, while
    additional NA changes (e.g. R294K, the I223R/H275Y double mutant) reduce
    inhibition across the neuraminidase-inhibitor class. In hepatitis C, NS5A
    resistance-associated substitutions (RASs) pre-exist in the quasispecies and
    reduce the potency of NS5A inhibitors at the upstream assembly step, which is
    why NS5A agents are used within multi-target DAA combinations rather than as
    monotherapy. This adaptive branch explains why an assembly/release inhibitor
    can fail against a specific variant and why surveillance, susceptibility
    testing, and combination regimens gate the real use of these agents.
    Conforming entries can attach a treatment's failure mode or a combination
    rationale to this node.
  role: adaptive_escape
  biological_processes:
  - preferred_term: Response to Xenobiotic Stimulus
    term:
      id: GO:0009410
      label: response to xenobiotic stimulus
  evidence:
  - reference: PMID:30299356
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      H275Y
      A(H1N1) variant, showing high-level oseltamivir resistance, is capable of
      causing outbreaks.
    explanation: >-
      Clinical review documenting the neuraminidase H275Y substitution as a
      high-level oseltamivir-resistance mechanism that escapes the
      assembly/release inhibitor. Evidence source is HUMAN_CLINICAL as this is a
      clinical/surveillance perspective on circulating human influenza.
  - reference: PMID:24056678
    supports: SUPPORT
    evidence_source: COMPUTATIONAL
    snippet: >-
      I223R/H275Y double mutant of neuraminidase (NA)
      creates a multidrug-resistant form of the pandemic influenza A (H1N1) virus
    explanation: >-
      Documents an I223R/H275Y neuraminidase double mutant conferring
      multidrug resistance across neuraminidase inhibitors, supporting the
      target-site-escape basis of this node. Evidence source is COMPUTATIONAL as
      this is an in silico molecular docking / molecular dynamics study.
