name: Viral Assembly and Release Inhibition Module
description: >-
  A conserved antiviral drug-mechanism module representing the late-stage steps
  of the viral life cycle — virion morphogenesis (assembly of progeny particles)
  and egress (release of mature virions from the infected cell) — that
  assembly- and release-targeting antivirals inhibit. Unlike the genome-
  replication enzymes captured by the polymerase and protease modules, these are
  the terminal, particle-forming steps, and two well-established drug classes
  exploit them. Influenza neuraminidase (NA) is a surface sialidase that cleaves
  terminal sialic acid residues so that budding progeny virions can detach from
  the host cell and from each other and spread; the neuraminidase inhibitors
  (oseltamivir, zanamivir, peramivir) are transition-state analogues that block
  this cleavage, trapping virions at the cell surface and arresting cell-to-cell
  spread. Hepatitis C virus NS5A is a phosphoprotein essential for organizing the
  membranous replication complex ("replication factory") and for virion assembly;
  the NS5A inhibitors (the "-asvir" class — ledipasvir, velpatasvir, daclatasvir)
  disrupt replication-complex formation and assembly and have become essential
  components of curative direct-acting antiviral (DAA) combinations. This module
  defines the mechanism-of-action design pattern for assembly/release-targeting
  antiviral treatments: conforming viral-disease entries link a treatment to the
  specific node it inhibits via target_mechanisms. It also encodes why these
  agents are failure-prone — target-site substitutions (influenza NA H275Y;
  HCV NS5A resistance-associated substitutions) escape the inhibitors and gate
  drug choice.
category: Module
creation_date: "2026-06-24T00:00:00Z"
notes: >-
  This is an antiviral drug-mechanism module, not a specific disease. Disorder
  entries reference individual nodes via conforms_to (e.g.,
  "viral_assembly_release_inhibition#Virion Assembly and Release as Drug
  Targets"), and their assembly/release-targeting treatments point at the
  inhibited node via target_mechanisms (analogous to how polymerase-targeting
  treatments link to "viral_polymerase_inhibition#Viral Polymerase as the
  Replication Engine and Drug Target" and cell-wall-active antibiotic treatments
  link to "bacterial_cell_wall_synthesis_inhibition#Peptidoglycan Cross-Linking
  by Penicillin-Binding Proteins"). Key conformance / treatment target: "Virion
  Assembly and Release as Drug Targets" (the shared influenza-neuraminidase
  release step and HCV-NS5A assembly/replication-complex step of the
  neuraminidase inhibitors and NS5A inhibitors). The module is
  pathogen-process-centric: nodes are druggable steps in late virion
  morphogenesis and egress, not individual drugs; a given antiviral class maps to
  the step it inhibits. The resistance node captures the gating knowledge that
  distinguishes "an assembly/release inhibitor is used" from real drug selection —
  target-site substitutions (NA H275Y, NS5A RASs) that escape these agents. NOTE:
  influenza baloxavir is NOT an assembly/release inhibitor — it targets the PA
  cap-dependent endonuclease of the polymerase complex and belongs with the
  polymerase-complex mechanism, not here. See projects/ANTIVIRAL.md.
pathophysiology:
- name: Virion Assembly and Release as Drug Targets
  description: >-
    The terminal phase of the viral life cycle — collecting the components of a
    progeny particle at an assembly site and releasing mature virions from the
    infected cell — is essential and druggable. Two well-established, mechanistically
    distinct examples anchor this node. In influenza, the surface glycoprotein
    neuraminidase (NA) is a sialidase that removes terminal sialic acid residues
    from cell-surface and viral glycans, the same residues that the
    haemagglutinin binds; this cleavage frees budding progeny virions from the
    host cell so they can disperse and spread cell-to-cell, and it is blocked by
    the neuraminidase inhibitors (oseltamivir, zanamivir, peramivir), which are
    sialic-acid transition-state analogues. In hepatitis C virus, the
    nonstructural phosphoprotein NS5A organizes the membranous replication
    complex and is essential for virion assembly; the NS5A inhibitors (the
    "-asvir" class) disrupt replication-complex formation and assembly and are
    essential components of curative DAA regimens. This is the central, most
    widely exploited node of the module and the canonical conformance / treatment
    target for assembly/release-directed antiviral therapy.
  role: therapeutic_vulnerability
  biological_processes:
  - preferred_term: Virion Assembly
    term:
      id: GO:0019068
      label: virion assembly
  evidence:
  - reference: PMID:23028967
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: >-
      Influenza virus neuraminidase (NA) cleaves terminal sialic acid residues
      on oligosaccharide chains that are receptors for virus binding, thus
      playing an important role in the release of virions from infected cells to
      promote the spread of cell-to-cell infection.
    explanation: >-
      Establishes the influenza neuraminidase release step — cleaving sialic acid
      to free progeny virions and promote spread — as the drug target of the
      neuraminidase inhibitors. Evidence source is IN_VITRO as this is a
      cell-based infection study.
  - reference: PMID:31644192
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      The NS5A region encodes a polypeptide that is essential for production and
      maintenance of the replicative complex.
    explanation: >-
      Confirms HCV NS5A as essential for the replication complex / replication
      factory, the step organized for assembly that NS5A inhibitors disrupt.
      Evidence source is OTHER as this is a reference-database review (LiverTox).
  - reference: PMID:27643675
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      2nd generation NS5A inhibitors have
      become essential components of HCV combination therapies.
    explanation: >-
      Establishes the NS5A replication-complex inhibitors as an essential DAA
      class targeting the assembly/replication-complex step. Evidence source is
      OTHER as this is a review article.
  downstream:
  - target: Block of Progeny Virion Release and Spread
    description: >-
      Inhibiting neuraminidase-mediated release (or NS5A-organized assembly)
      traps virions and arrests dissemination of progeny particles.
  - target: Assembly/Release-Inhibitor Resistance
    description: >-
      Target-site substitutions in neuraminidase or NS5A escape these inhibitors
      and gate drug choice.

- name: Block of Progeny Virion Release and Spread
  description: >-
    When the assembly/release step is pharmacologically engaged, mature progeny
    virions can no longer be liberated and disseminated. For influenza,
    neuraminidase inhibitors leave newly budded virions aggregated and tethered
    to sialic acid on the host-cell surface and on each other, so that the yield
    of released infectious progeny collapses and cell-to-cell spread is arrested;
    for HCV, NS5A inhibitors block replication-complex formation and virion
    assembly so that infectious particle production fails. This is the antiviral
    effector node — the consequence of engaging the assembly/release target —
    analogous to chain termination for polymerase inhibitors. Because it acts at
    the spread step rather than at initial entry, its clinical benefit is
    greatest when treatment begins early, before peak viral replication.
  role: consequence
  biological_processes:
  - preferred_term: Viral Release from Host Cell
    term:
      id: GO:0019076
      label: viral release from host cell
  evidence:
  - reference: PMID:23028967
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: >-
      cell-to-cell infection was severely inhibited by
      zanamivir
    explanation: >-
      Directly demonstrates the effector consequence of this node — the
      neuraminidase inhibitor zanamivir blocks release of progeny virus and
      severely inhibits cell-to-cell spread. Evidence source is IN_VITRO as this
      is a cell-based infection study.

- name: Assembly/Release-Inhibitor Resistance
  description: >-
    Target-site substitutions in the assembly/release machinery escape these
    inhibitors. In influenza A(H1N1), the neuraminidase H275Y substitution
    confers high-level oseltamivir resistance and can spread in circulating
    viruses, while additional NA changes (e.g. R294K, the I223R/H275Y double
    mutant) reduce inhibition across the neuraminidase-inhibitor class. In
    hepatitis C, NS5A resistance-associated substitutions (RASs) pre-exist in the
    quasispecies and reduce the potency of NS5A inhibitors, which is why NS5A
    agents are used within multi-target DAA combinations rather than as
    monotherapy. This node explains why an assembly/release inhibitor can fail
    against a specific variant and why surveillance, susceptibility testing, and
    combination regimens gate the real use of these agents. Conforming entries can
    attach a treatment's failure mode or a combination rationale to this node.
  role: adaptive_escape
  biological_processes:
  - preferred_term: Viral Life Cycle
    term:
      id: GO:0019058
      label: viral life cycle
  evidence:
  - reference: PMID:30299356
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      H275Y
      A(H1N1) variant, showing high-level oseltamivir resistance, is capable of
      causing outbreaks.
    explanation: >-
      Clinical review documenting the neuraminidase H275Y substitution as a
      high-level oseltamivir-resistance mechanism that escapes the
      assembly/release inhibitor. Evidence source is HUMAN_CLINICAL as this is a
      clinical/surveillance perspective on circulating human influenza.
  - reference: PMID:24056678
    supports: SUPPORT
    evidence_source: COMPUTATIONAL
    snippet: >-
      I223R/H275Y double mutant of neuraminidase (NA)
      creates a multidrug-resistant form of the pandemic influenza A (H1N1) virus
    explanation: >-
      Documents an I223R/H275Y neuraminidase double mutant conferring
      multidrug resistance across neuraminidase inhibitors, supporting the
      target-site-escape basis of this node. Evidence source is COMPUTATIONAL as
      this is an in silico molecular docking / molecular dynamics study.
