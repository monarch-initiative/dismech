name: Viral Protease Inhibition Module
description: >-
  The viral polyprotein-maturation pathway and the point at which
  protease-targeting antivirals interrupt it. Many clinically important viruses
  translate their genome as one or more large polyprotein precursors that are
  themselves non-functional: their constituent structural proteins and
  replicative enzymes only become active after a virally encoded protease cleaves
  the precursor at defined junctions. This module traces that pathway as a causal
  cascade — the polyprotein precursor is first synthesized from the viral genome;
  the viral maturation protease then cleaves it into functional subunits; that
  cleavage drives the structural rearrangement of a nascent particle into a
  mature, infectious virion; and the antiviral endpoint, when the protease is
  blocked, is the release of immature, non-infectious particles. The conserved
  maturation protease is the single most exploited antiviral drug target after the
  polymerase, and the same druggable architecture recurs across unrelated
  families with different catalytic chemistries: the HIV-1 aspartyl protease (PR)
  cleaving the Gag and Gag-Pol polyproteins, the HCV NS3/4A serine protease
  processing the nonstructural polyprotein, and the SARS-CoV-2 main protease
  (Mpro / 3CLpro), a cysteine protease that liberates the replicase nonstructural
  proteins. Protease inhibitors — HIV PIs (atazanavir, darunavir, lopinavir),
  HCV NS3/4A "-previr" inhibitors (glecaprevir, grazoprevir), and SARS-CoV-2
  nirmatrelvir — are substrate-mimetic or active-site-directed small molecules
  that occupy the protease cleft at the maturation-cleavage step, so virions are
  released immature and non-infectious. The key conformance / treatment target of
  this module is the proteolytic-maturation-cleavage node, "Proteolytic Maturation
  Cleavage by the Viral Protease". Because the protease active site tolerates
  resistance substitutions, and because several HIV and SARS-CoV-2 protease
  inhibitors are themselves cleared rapidly by host CYP3A, this drug class is
  characteristically boosted (ritonavir or cobicistat) and used in combination
  regimens — captured by the adaptive-escape branch off the cleavage node.
category: Module
creation_date: "2026-06-24T00:00:00Z"
notes: >-
  This is an antiviral drug-mechanism module structured as a biological pathway,
  not a specific disease. Its nodes are successive biological steps of viral
  polyprotein maturation (synthesis of the polyprotein precursor -> proteolytic
  maturation cleavage by the viral protease -> virion maturation into infectious
  particles), with the antiviral consequence (production of immature,
  non-infectious virions) and an adaptive resistance branch; the drug classes
  that act at each step are described in the node text rather than modelled as
  separate nodes. Disorder entries reference individual nodes via conforms_to
  (e.g., "viral_protease_inhibition#Proteolytic Maturation Cleavage by the Viral
  Protease"), and their protease-targeting treatments point at the inhibited node
  via target_mechanisms (analogous to how polymerase-targeting treatments link to
  "viral_polymerase_inhibition#Nucleotide Selection and Catalytic Incorporation at
  the Polymerase Active Site", and how cell-wall-active antibiotic treatments link
  to "bacterial_cell_wall_synthesis_inhibition#Peptidoglycan Cross-Linking by
  Penicillin-Binding Proteins"). Key conformance / treatment target: "Proteolytic
  Maturation Cleavage by the Viral Protease" — the shared HIV PR / HCV NS3/4A /
  SARS-CoV-2 Mpro target of protease inhibitors. The module is
  pathogen-process-centric: nodes are biological steps in polyprotein maturation,
  not individual drugs; a given protease-inhibitor class maps to the cleavage step
  it inhibits. The resistance node captures the gating knowledge that distinguishes
  "a protease inhibitor is used" from real drug selection — substrate-cleft
  resistance mutations and rapid host metabolism that together mandate
  ritonavir/cobicistat boosting and combination therapy. Worked conformers
  (proposed in projects/ANTIVIRAL.md): Acquired_Immunodeficiency_Syndrome
  (atazanavir/darunavir/lopinavir, ritonavir-boosted), Hepatitis_C
  (glecaprevir/grazoprevir NS3/4A "-previr" class), and COVID-19
  (ritonavir-boosted nirmatrelvir). See projects/ANTIVIRAL.md.
pathophysiology:
- name: Synthesis of the Viral Polyprotein Precursor
  description: >-
    Maturation begins with the synthesis of a large polyprotein precursor:
    after the viral genome is transcribed and translated, the structural proteins
    and replicative enzymes are produced as a single non-functional precursor
    that must later be cleaved into its functional subunits. For HIV-1, the Gag
    and Gag-Pol polyproteins are translated from the integrated provirus and
    trafficked to the plasma membrane, where they assemble into the immature
    particle; the HCV nonstructural polyprotein and the SARS-CoV-2 replicase
    polyproteins (pp1a/pp1ab) follow the same logic. This is the committed,
    upstream step of the pathway — the precursor it produces is the substrate on
    which the viral maturation protease, and therefore protease-inhibitor therapy,
    acts.
  role: trigger
  biological_processes:
  - preferred_term: Viral Gene Expression
    term:
      id: GO:0019080
      label: viral gene expression
  evidence:
  - reference: PMID:32858867
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      the Gag and GagPol polyproteins are translated
    explanation: >-
      HIV-1 maturation review establishing the upstream step of the pathway — the
      structural/enzymatic precursor is synthesized as the Gag and Gag-Pol
      polyproteins, which are the substrate that the viral protease later cleaves.
      Evidence source is OTHER as this is a review article.
  downstream:
  - target: Proteolytic Maturation Cleavage by the Viral Protease
    description: >-
      The synthesized polyprotein precursor is then cleaved at its defined
      junctions by the virally encoded maturation protease.

- name: Proteolytic Maturation Cleavage by the Viral Protease
  description: >-
    At the central step of the pathway the virally encoded maturation protease
    cleaves the polyprotein precursor at defined scissile junctions through its
    peptidase activity, liberating the mature structural proteins and replicative
    enzymes. This processing protease is essential for the production of
    infectious progeny, is conserved within a virus family, and differs in
    structure and specificity from host proteases, making it the second most
    exploited antiviral drug target after the polymerase. The same druggable
    cleavage step recurs with different catalytic classes: the HIV-1 aspartyl
    protease (PR) cleaves the Gag and Gag-Pol polyproteins during virion
    maturation, the HCV NS3/4A serine protease processes the nonstructural
    polyprotein, and the SARS-CoV-2 main protease (Mpro / 3CLpro), a cysteine
    protease, releases the replicase nonstructural proteins. Protease inhibitors —
    HIV PIs (atazanavir, darunavir, lopinavir, typically ritonavir-boosted), HCV
    NS3/4A "-previr" inhibitors (glecaprevir, grazoprevir), and SARS-CoV-2
    nirmatrelvir — are substrate-mimetic or active-site-directed molecules that
    occupy the protease substrate cleft and prevent this cleavage. This is the
    central node of the module and the canonical conformance / treatment target
    for protease-directed antiviral therapy.
  role: therapeutic_vulnerability
  biological_processes:
  - preferred_term: Viral Protein Processing
    term:
      id: GO:0019082
      label: viral protein processing
  molecular_functions:
  - preferred_term: Peptidase Activity
    term:
      id: GO:0008233
      label: peptidase activity
  evidence:
  - reference: PMID:32858867
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      proteolytic processing of the Gag polyprotein by the viral protease
    explanation: >-
      HIV-1 maturation review establishing that the viral protease cleaves the Gag
      polyprotein — the conserved polyprotein-processing step that protease
      inhibitors target. Evidence source is OTHER as this is a review article.
  - reference: PMID:37407698
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: >-
      ensitrelvir targets the substrate-binding pocket of Mpro
    explanation: >-
      Crystallographic study confirming that Mpro-directed inhibitors occupy the
      protease substrate-binding cleft at the cleavage step, supporting the
      SARS-CoV-2 main protease as a substrate-cleft drug target. Evidence source
      is IN_VITRO as this is a structural/biochemical study.
  - reference: PMID:37407698
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: >-
      suggesting Mpro is a bona fide broad-spectrum target
    explanation: >-
      States explicitly that the SARS-CoV-2 main protease is a validated antiviral
      drug target, supporting this node as the canonical protease-inhibitor target.
      Evidence source is IN_VITRO as this is a structural/biochemical study.
  downstream:
  - target: Virion Maturation into Infectious Particles
    description: >-
      Successful cleavage of the polyprotein liberates the mature proteins that
      drive the structural rearrangement of the particle into an infectious
      virion.
  - target: Protease-Inhibitor Resistance
    description: >-
      Substrate-cleft mutations in the protease reduce inhibitor binding and let
      maturation cleavage resume, escaping the drug.

- name: Virion Maturation into Infectious Particles
  description: >-
    In the natural cycle, proteolytic cleavage of the polyprotein liberates the
    mature structural proteins, and this cleavage triggers the structural
    rearrangement that converts an immature, nascent particle into a mature,
    infectious virion. For HIV-1, protease-mediated Gag cleavage drives
    disassembly of the immature Gag lattice and assembly of the mature conical
    capsid from fully processed capsid protein; the analogous maturation event in
    HCV and SARS-CoV-2 yields the functional replicase and infectious progeny.
    This effector node is the productive output of the upstream cleavage step —
    the biological state that protease-inhibitor therapy is designed to prevent.
  role: effector
  biological_processes:
  - preferred_term: Virion Assembly
    term:
      id: GO:0019068
      label: virion assembly
  evidence:
  - reference: PMID:32858867
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      the conversion of an immature, noninfectious particle to a mature infectious
      virion
    explanation: >-
      Supports the immature-to-mature transition that protease-mediated polyprotein
      cleavage drives — the maturation step whose interruption produces the
      antiviral effect. Evidence source is OTHER as this is a review article.
  - reference: PMID:32858867
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      the assembly of the mature conical capsid from fully processed capsid
      protein
    explanation: >-
      Directly describes the structural maturation output that follows complete
      protease cleavage — assembly of the mature capsid from fully processed CA.
      Evidence source is OTHER as this is a review article.
  downstream:
  - target: Production of Immature, Non-Infectious Virions
    description: >-
      When the upstream protease cleavage is pharmacologically blocked, this
      maturation step cannot occur and particles are released immature and
      non-infectious.

- name: Production of Immature, Non-Infectious Virions
  description: >-
    When a protease inhibitor occupies the active-site cleft, the maturation
    protease can no longer cleave the polyprotein precursor at its scissile
    junctions. The constituent structural proteins and enzymes are therefore
    never liberated from the precursor, the maturation rearrangement cannot occur,
    and particles are released in an immature, non-infectious state. For HIV-1,
    blocking proteolytic cleavage of the Gag and Gag-Pol polyproteins yields
    particles that are released but remain immature and non-infectious; the
    analogous defect underlies HCV NS3/4A and SARS-CoV-2 Mpro inhibition, where
    failure to process the nonstructural/replicase polyprotein aborts the
    productive replication cycle. This is the antiviral consequence of engaging
    the protease target and, because it acts at a late maturation step rather than
    blocking initial infection, it suppresses the spread of infectious progeny
    rather than sterilizing an already-infected cell.
  role: consequence
  biological_processes:
  - preferred_term: Negative Regulation of Viral Process
    term:
      id: GO:0048525
      label: negative regulation of viral process
  evidence:
  - reference: PMID:32858867
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      blocking the proteolytic cleavage of the Gag and GagPol polyprotein
      precursors, resulting in a defect in virus particle maturation
    explanation: >-
      Directly states the consequence of this node — protease inhibitors block
      cleavage of the Gag/Gag-Pol polyproteins, producing a defect in virion
      maturation (immature, non-infectious particles). Evidence source is OTHER as
      this is a review article.

- name: Protease-Inhibitor Resistance
  description: >-
    Viral proteases evolve under drug pressure, and the protease active-site /
    substrate cleft tolerates amino-acid substitutions that reduce inhibitor
    affinity while preserving enough catalytic activity to process the polyprotein.
    In HCV, error-prone replication generates a quasispecies from which NS3/4A
    resistance-associated substitutions at signature positions (R155, A156, D168)
    are rapidly selected against "-previr" inhibitors; HIV PR and SARS-CoV-2 Mpro
    accumulate analogous active-site and accessory mutations. A second,
    pharmacological dimension compounds escape: several HIV and SARS-CoV-2 protease
    inhibitors are rapidly metabolized by host CYP3A, so they are co-administered
    with a CYP3A-inhibitor pharmacoenhancer (ritonavir or cobicistat) to maintain
    inhibitory drug levels — the booster has no intrinsic antiviral activity and so
    does not itself add resistance pressure. This adaptive branch off the cleavage
    node explains why protease-inhibitor monotherapy fails against
    high-mutation-rate viruses and why durable benefit requires boosting plus
    combination regimens (HIV three-drug ART, multi-DAA HCV cure). Conforming
    entries can attach a treatment's failure mode or its boosting/combination
    rationale to this node.
  role: adaptive_escape
  biological_processes:
  - preferred_term: Response to Xenobiotic Stimulus
    term:
      id: GO:0009410
      label: response to xenobiotic stimulus
  evidence:
  - reference: PMID:35993498
    supports: SUPPORT
    evidence_source: COMPUTATIONAL
    snippet: >-
      three single amino acid residues (R155, A156 and D168) are notable for their
      presence in clinical isolates
    explanation: >-
      In silico study identifying the signature HCV NS3/4A substrate-cleft
      resistance substitutions (R155, A156, D168) that escape "-previr" protease
      inhibitors, supporting the active-site resistance mechanism of this node.
      Evidence source is COMPUTATIONAL as this is an in silico modeling study.
  - reference: PMID:35993498
    supports: SUPPORT
    evidence_source: COMPUTATIONAL
    snippet: >-
      the error-prone viral RNA polymerase causes the emergence of resistance
    explanation: >-
      Establishes the quasispecies/high-mutation-rate basis for selection of
      protease-inhibitor resistance variants. Evidence source is COMPUTATIONAL as
      this is an in silico modeling study.
  - reference: PMID:26566368
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      an alternative to ritonavir (RTV) as a protease inhibitor pharmacoenhancer
    explanation: >-
      Supports the pharmacokinetic-boosting rationale of this node — protease
      inhibitors are co-administered with a CYP3A pharmacoenhancer (ritonavir or
      cobicistat) to maintain drug levels. Evidence source is OTHER as this is a
      review article.
