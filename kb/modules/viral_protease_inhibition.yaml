name: Viral Protease Inhibition Module
description: >-
  A conserved antiviral drug-mechanism module representing the viral maturation
  protease that polyprotein-processing-targeting antivirals inhibit. Many viruses
  translate their genome as one or more large polyproteins that must be cleaved
  into functional structural proteins and enzymes by a virally encoded protease;
  this maturation protease is essential, conserved within a family, and distinct
  enough from host proteases to be selectively druggable. The architecture recurs
  across unrelated families with different catalytic chemistries: the HIV-1
  aspartyl protease (PR) that cleaves the Gag and Gag-Pol polyproteins, the HCV
  NS3/4A serine protease that processes the nonstructural polyprotein, and the
  SARS-CoV-2 main protease (Mpro / 3CLpro), a cysteine protease that liberates the
  replicase nonstructural proteins. Protease inhibitors are substrate-mimetic or
  active-site-directed small molecules that occupy the protease cleft and prevent
  polyprotein processing, so virions are released immature and non-infectious.
  Because the protease active site tolerates resistance substitutions and because
  several HIV and SARS-CoV-2 protease inhibitors are themselves cleared rapidly by
  host CYP3A, this drug class is characteristically used with a pharmacokinetic
  booster (ritonavir or cobicistat) and in combination regimens. This module
  defines the mechanism-of-action design pattern for protease-targeting antiviral
  treatments: conforming viral-disease entries link a treatment to the specific
  node it inhibits via target_mechanisms. It also encodes why protease-targeting
  therapy is failure-prone — substrate-cleft mutations escape the inhibitor, which
  is why boosting and combination therapy are standard.
category: Module
creation_date: "2026-06-24T00:00:00Z"
notes: >-
  This is an antiviral drug-mechanism module, not a specific disease. Disorder
  entries reference individual nodes via conforms_to (e.g.,
  "viral_protease_inhibition#Viral Polyprotein Maturation Protease as Drug
  Target"), and their protease-targeting treatments point at the inhibited node
  via target_mechanisms (analogous to how polymerase-targeting treatments link to
  "viral_polymerase_inhibition#Viral Polymerase as the Replication Engine and Drug
  Target", and how cell-wall-active antibiotic treatments link to
  "bacterial_cell_wall_synthesis_inhibition#Peptidoglycan Cross-Linking by
  Penicillin-Binding Proteins"). Key conformance / treatment target: "Viral
  Polyprotein Maturation Protease as Drug Target" (the shared HIV PR / HCV NS3/4A /
  SARS-CoV-2 Mpro target of protease inhibitors). The module is
  pathogen-process-centric: nodes are druggable steps in polyprotein maturation,
  not individual drugs; a given protease-inhibitor class maps to the protease it
  inhibits. The resistance node captures the gating knowledge that distinguishes
  "a protease inhibitor is used" from real drug selection — substrate-cleft
  resistance mutations and rapid host metabolism that together mandate
  ritonavir/cobicistat boosting and combination therapy. Worked conformers
  (proposed in projects/ANTIVIRAL.md): Acquired_Immunodeficiency_Syndrome
  (atazanavir/darunavir/lopinavir, ritonavir-boosted), Hepatitis_C
  (glecaprevir/grazoprevir NS3/4A "-previr" class), and COVID-19
  (ritonavir-boosted nirmatrelvir). See projects/ANTIVIRAL.md.
pathophysiology:
- name: Viral Polyprotein Maturation Protease as Drug Target
  description: >-
    Many clinically important viruses translate their genome as a polyprotein
    precursor that is non-functional until a virally encoded protease cleaves it
    at defined junctions into the mature structural proteins and replicative
    enzymes. This processing protease is essential for the production of
    infectious progeny, is conserved within a virus family, and differs in
    structure and specificity from host proteases, making it the second most
    exploited antiviral drug target after the polymerase. The same druggable
    architecture recurs with different catalytic classes: the HIV-1 aspartyl
    protease (PR) cleaves the Gag and Gag-Pol polyproteins during virion
    maturation, the HCV NS3/4A serine protease processes the nonstructural
    polyprotein, and the SARS-CoV-2 main protease (Mpro / 3CLpro), a cysteine
    protease, releases the replicase nonstructural proteins. Protease inhibitors —
    HIV PIs (atazanavir, darunavir, lopinavir), HCV NS3/4A "-previr" inhibitors
    (glecaprevir, grazoprevir), and SARS-CoV-2 nirmatrelvir — are substrate-mimetic
    or active-site-directed molecules that occupy the protease cleft. This is the
    central, most widely exploited node of the module and the canonical
    conformance / treatment target for protease-directed antiviral therapy.
  role: therapeutic_vulnerability
  biological_processes:
  - preferred_term: Viral Protein Processing
    term:
      id: GO:0019082
      label: viral protein processing
  evidence:
  - reference: PMID:32858867
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      proteolytic processing of the Gag polyprotein by the viral protease
    explanation: >-
      HIV-1 maturation review establishing that the viral protease cleaves the Gag
      polyprotein — the conserved polyprotein-processing step that protease
      inhibitors target. Evidence source is OTHER as this is a review article.
  - reference: PMID:37407698
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: >-
      ensitrelvir targets the substrate-binding pocket of Mpro
    explanation: >-
      Crystallographic study confirming that Mpro-directed inhibitors occupy the
      protease substrate-binding pocket, supporting the SARS-CoV-2 main protease as
      a substrate-cleft drug target. Evidence source is IN_VITRO as this is a
      structural/biochemical study.
  - reference: PMID:37407698
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: >-
      suggesting Mpro is a bona fide broad-spectrum target
    explanation: >-
      States explicitly that the SARS-CoV-2 main protease is a validated antiviral
      drug target, supporting this node as the canonical protease-inhibitor target.
      Evidence source is IN_VITRO as this is a structural/biochemical study.
  downstream:
  - target: Block of Polyprotein Processing and Production of Immature Non-Infectious Virions
    description: >-
      Occupancy of the protease cleft prevents cleavage of the polyprotein, so
      virions are assembled and released in an immature, non-infectious state.
  - target: Protease-Inhibitor Resistance
    description: >-
      Substrate-cleft mutations in the protease reduce inhibitor binding and let
      polyprotein processing resume, escaping the drug.

- name: Block of Polyprotein Processing and Production of Immature Non-Infectious Virions
  description: >-
    When a protease inhibitor occupies the active-site cleft, the protease can no
    longer cleave the polyprotein precursor at its scissile junctions. The
    constituent structural proteins and enzymes are therefore never liberated from
    the precursor, so the structural rearrangements that convert a nascent particle
    into an infectious virion cannot occur. For HIV-1, blocking proteolytic
    cleavage of the Gag and Gag-Pol polyproteins yields particles that are released
    but remain immature and non-infectious; the analogous defect underlies HCV
    NS3/4A and SARS-CoV-2 Mpro inhibition, where failure to process the
    nonstructural/replicase polyprotein aborts the productive replication cycle.
    This is the effector node — the antiviral consequence of engaging the protease
    target — and, because it acts at a late maturation step rather than blocking
    initial infection, it suppresses the spread of infectious progeny rather than
    sterilizing an already-infected cell.
  role: consequence
  biological_processes:
  - preferred_term: Viral Protein Processing
    term:
      id: GO:0019082
      label: viral protein processing
  evidence:
  - reference: PMID:32858867
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      blocking the proteolytic cleavage of the Gag and GagPol polyprotein
      precursors, resulting in a defect in virus particle maturation
    explanation: >-
      Directly states the effector mechanism of this node — protease inhibitors
      block cleavage of the Gag/Gag-Pol polyproteins, producing a defect in virion
      maturation (immature, non-infectious particles). Evidence source is OTHER as
      this is a review article.
  - reference: PMID:32858867
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      the conversion of an immature, noninfectious particle to a mature infectious
      virion
    explanation: >-
      Supports the immature-to-mature transition that protease-mediated polyprotein
      cleavage drives and that protease inhibition blocks, leaving virions immature
      and non-infectious. Evidence source is OTHER as this is a review article.

- name: Protease-Inhibitor Resistance
  description: >-
    Viral proteases evolve under drug pressure, and the protease active-site /
    substrate cleft tolerates amino-acid substitutions that reduce inhibitor
    affinity while preserving enough catalytic activity to process the polyprotein.
    In HCV, error-prone replication generates a quasispecies from which NS3/4A
    resistance-associated substitutions at signature positions (R155, A156, D168)
    are rapidly selected against "-previr" inhibitors; HIV PR and SARS-CoV-2 Mpro
    accumulate analogous active-site and accessory mutations. A second,
    pharmacological dimension compounds escape: several HIV and SARS-CoV-2 protease
    inhibitors are rapidly metabolized by host CYP3A, so they are co-administered
    with a CYP3A-inhibitor pharmacoenhancer (ritonavir or cobicistat) to maintain
    inhibitory drug levels — the booster has no intrinsic antiviral activity and so
    does not itself add resistance pressure. This node explains why
    protease-inhibitor monotherapy fails against high-mutation-rate viruses and why
    durable benefit requires boosting plus combination regimens (HIV three-drug
    ART, multi-DAA HCV cure). Conforming entries can attach a treatment's failure
    mode or its boosting/combination rationale to this node.
  role: adaptive_escape
  biological_processes:
  - preferred_term: Viral Protein Processing
    term:
      id: GO:0019082
      label: viral protein processing
  evidence:
  - reference: PMID:35993498
    supports: SUPPORT
    evidence_source: COMPUTATIONAL
    snippet: >-
      three single amino acid residues (R155, A156 and D168) are notable for their
      presence in clinical isolates
    explanation: >-
      In silico study identifying the signature HCV NS3/4A substrate-cleft
      resistance substitutions (R155, A156, D168) that escape "-previr" protease
      inhibitors, supporting the active-site resistance mechanism of this node.
      Evidence source is COMPUTATIONAL as this is an in silico modeling study.
  - reference: PMID:35993498
    supports: SUPPORT
    evidence_source: COMPUTATIONAL
    snippet: >-
      the error-prone viral RNA polymerase causes the emergence of resistance
    explanation: >-
      Establishes the quasispecies/high-mutation-rate basis for selection of
      protease-inhibitor resistance variants. Evidence source is COMPUTATIONAL as
      this is an in silico modeling study.
  - reference: PMID:26566368
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      an alternative to ritonavir (RTV) as a protease inhibitor pharmacoenhancer
    explanation: >-
      Supports the pharmacokinetic-boosting rationale of this node — protease
      inhibitors are co-administered with a CYP3A pharmacoenhancer (ritonavir or
      cobicistat) to maintain drug levels. Evidence source is OTHER as this is a
      review article.
