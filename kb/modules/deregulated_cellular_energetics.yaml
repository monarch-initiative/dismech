name: Deregulating Cellular Energetics Module
description: >-
  A conserved mechanism module for the emerging hallmark of cancer (Hanahan
  & Weinberg): the reprogramming of energy metabolism. Proliferating cancer
  cells reprogram their metabolism to support biosynthesis rather than
  maximally efficient ATP production. The conserved causal chain runs from
  oncogenic signaling (and loss of tumor suppressors such as p53) that
  drives constitutive nutrient uptake, through a shift toward aerobic
  glycolysis - the Warburg effect, in which cells ferment glucose to lactate
  even when oxygen is plentiful - to the diversion of glycolytic and TCA-cycle
  intermediates into biosynthetic pathways (nucleotides, amino acids,
  lipids, NADPH), producing the biomass needed for cell division. The
  reprogrammed metabolism also acidifies the microenvironment (lactate
  export) and alters metabolite-driven gene regulation. Individual disorder
  entries declare conformance via conforms_to, substituting
  tumor-type-specific drivers (e.g., MYC- and PI3K-AKT-driven glucose addiction; IDH1/2
  mutations producing the oncometabolite 2-hydroxyglutarate; VHL/HIF-driven
  glycolysis). This module is metabolically downstream of
  sustaining_proliferative_signaling.
category: Module
creation_date: "2026-06-27T00:00:00Z"
notes: >-
  This is a mechanism module, not a specific disease. Disorder entries
  reference individual nodes via conforms_to (e.g.,
  "deregulated_cellular_energetics#Aerobic Glycolysis (Warburg Effect)").
  The module defines the expected pathophysiology structure; conforming
  nodes in disorder files should include the corresponding biological
  processes and causal edges, specialized to their tumor context. Key
  tumor-specific substitutions: MYC/PI3K-AKT-driven tumors show glucose and
  glutamine addiction; IDH-mutant gliomas/AML produce the oncometabolite
  2-hydroxyglutarate that reprograms the epigenome; VHL-deficient renal cell
  carcinoma uses HIF-driven glycolysis. Key conformance target:
  "deregulated_cellular_energetics#Aerobic Glycolysis (Warburg Effect)".
pathophysiology:
- name: Oncogene-Driven Nutrient Uptake
  description: >-
    Normal cells take up nutrients only when stimulated by growth factors;
    cancer cells acquire mutations that constitutively activate
    nutrient-uptake and metabolic signaling (PI3K-AKT-mTOR, MYC, RAS),
    upregulating glucose transporters (GLUT1) and amino-acid transporters.
    This cell-autonomous, growth-factor-independent nutrient acquisition is
    the metabolic entry point of the hallmark.
  role: trigger
  biological_processes:
  - preferred_term: D-Glucose Transmembrane Transport
    term:
      id: GO:1904659
      label: D-glucose transmembrane transport
    modifier: INCREASED
  evidence:
  - reference: PMID:26771115
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      A common feature of cancer cell metabolism is the ability to acquire
      necessary nutrients from a frequently nutrient-poor environment and
      utilize these nutrients to both maintain viability and build new
      biomass.
    explanation: >-
      Establishes deregulated nutrient acquisition as a common feature of
      cancer metabolism, the trigger of this module. Evidence source is OTHER
      because this is a review article.
  downstream:
  - target: Aerobic Glycolysis (Warburg Effect)

- name: Aerobic Glycolysis (Warburg Effect)
  description: >-
    Cancer cells preferentially metabolize glucose to lactate even in the
    presence of oxygen sufficient for oxidative phosphorylation - the Warburg
    effect. Though inefficient in ATP yield per glucose, high glycolytic flux
    rapidly regenerates ATP and, critically, supplies carbon intermediates
    for biosynthesis. This is the conserved central node of the metabolic
    hallmark; it does not require defective mitochondria.
  role: central_effector
  biological_processes:
  - preferred_term: Glycolytic Process
    term:
      id: GO:0006096
      label: glycolytic process
    modifier: INCREASED
  evidence:
  - reference: PMID:19460998
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      most cancer cells produce large amounts of lactate regardless of the
      availability of oxygen
    explanation: >-
      Directly describes aerobic glycolysis (lactate production despite
      adequate oxygen), the central effector of this module. Evidence source
      is OTHER because this is a review article.
  - reference: PMID:21376230
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      reprogramming of energy metabolism and evading immune destruction
    explanation: >-
      Hanahan & Weinberg name reprogramming of energy metabolism as an
      emerging hallmark, the capability modeled here. Evidence source is
      OTHER because this is a review article.
  downstream:
  - target: Biosynthetic Diversion for Biomass Production

- name: Biosynthetic Diversion for Biomass Production
  description: >-
    Glycolytic and TCA-cycle intermediates are diverted into anabolic
    pathways: glucose-6-phosphate into the pentose phosphate pathway for
    ribose and NADPH, 3-phosphoglycerate into serine/glycine and
    one-carbon metabolism, citrate into fatty-acid synthesis, and glutamine
    into anaplerosis and nitrogen for nucleotide/amino-acid synthesis. This
    diversion converts nutrients into the macromolecular building blocks
    (nucleotides, amino acids, lipids) required to produce a new cell, the
    biosynthetic purpose of the Warburg phenotype.
  role: consequence
  biological_processes:
  - preferred_term: Glucose Metabolic Process
    term:
      id: GO:0006006
      label: glucose metabolic process
    modifier: INCREASED
  evidence:
  - reference: PMID:19460998
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      most cancer cells instead rely on aerobic glycolysis
    explanation: >-
      Supports the reliance on aerobic glycolysis whose biosynthetic role
      (channeling nutrients into biomass) is modeled in this consequence
      node. Evidence source is OTHER because this is a review article.
