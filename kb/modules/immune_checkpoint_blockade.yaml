name: Immune Checkpoint Blockade Module
description: >-
  A conserved mechanism module representing the tumor-immune cycle that
  checkpoint inhibitors target. Across many cancer types, tumor cells
  generate neoantigens that provoke anti-tumor T cell responses, but
  adaptively upregulate immune checkpoint ligands (PD-L1, PD-L2) and
  recruit immunosuppressive cells to evade destruction. Immune checkpoint
  blockade (anti-PD-1, anti-PD-L1, anti-CTLA-4) reverses this evasion by
  restoring effector T cell function. This module captures the shared
  causal chain from neoantigen presentation through adaptive immune
  resistance to T cell exhaustion, and defines the mechanism-of-action
  pattern for checkpoint inhibitor treatments. Individual disorder entries
  declare conformance via conforms_to on their pathophysiology nodes,
  substituting tumor-type-specific details (driver mutations, neoantigen
  sources, tissue-specific immune microenvironment) while preserving the
  conserved immune evasion and checkpoint blockade response pattern.
category: Module
creation_date: "2026-03-21T00:00:00Z"
updated_date: "2026-03-21T00:00:00Z"
notes: >-
  This is a mechanism module, not a specific disease. Disorder entries
  reference individual nodes via conforms_to (e.g.,
  "immune_checkpoint_blockade#Adaptive Immune Resistance"). The module
  defines the expected pathophysiology structure; conforming nodes in
  disorder files should include the corresponding cell types, biological
  processes, and causal edges, specialized to their tumor context.
  Key tumor-specific substitutions: MSI-H CRC uses dMMR-driven
  hypermutation as the neoantigen source; melanoma uses UV-induced
  mutation burden; virus-associated cancers (NPC, EBV gastric) use
  viral antigen presentation alongside somatic neoantigens.
pathophysiology:
- name: Neoantigen Generation
  description: >-
    Tumor cells accumulate somatic mutations, some of which produce
    novel peptides (neoantigens) presented on MHC class I molecules.
    The neoantigen source varies by tumor type: mismatch repair
    deficiency in MSI-H cancers, UV-induced mutations in melanoma,
    viral antigens in virus-associated cancers, or high tumor
    mutational burden from other causes. Higher neoantigen load
    generally correlates with greater immunogenicity and checkpoint
    inhibitor responsiveness.
  role: trigger
  biological_processes:
  - preferred_term: Antigen Processing and Presentation
    term:
      id: GO:0019882
      label: antigen processing and presentation
  evidence:
  - reference: PMID:28878676
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      The survival of tumors in several cases is assisted by checkpoint
      immunomodulation to maintain the imbalance between immune surveillance
      and cancer cell proliferation.
    explanation: >-
      Review establishing that tumor-immune interactions begin with
      antigen presentation and immune surveillance, which tumors then
      subvert via checkpoint pathways.
  downstream:
  - target: Anti-Tumor T Cell Response

- name: Anti-Tumor T Cell Response
  description: >-
    Dendritic cells present tumor neoantigens to naive T cells, priming
    CD8+ cytotoxic T lymphocytes that infiltrate the tumor and recognize
    tumor cells via MHC-I/neoantigen complexes. CTLA-4 acts as a brake
    at this priming stage in lymph nodes, competing with CD28 for B7
    ligand binding. The magnitude of the T cell response depends on
    neoantigen immunogenicity, dendritic cell function, and the balance
    of co-stimulatory versus co-inhibitory signals during priming.
  role: effector
  cell_types:
  - preferred_term: CD8-positive, alpha-beta T cell
    term:
      id: CL:0000625
      label: CD8-positive, alpha-beta T cell
  biological_processes:
  - preferred_term: T Cell Activation
    term:
      id: GO:0042110
      label: T cell activation
    modifier: INCREASED
  - preferred_term: T Cell Mediated Cytotoxicity
    term:
      id: GO:0001913
      label: T cell mediated cytotoxicity
    modifier: INCREASED
  evidence:
  - reference: PMID:38762484
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Blockade of PD-1/PD-L1 by neutralizing antibodies restores T cells
      activity and enhances anti-tumor immunity, achieving remarkable success
      in cancer therapy.
    explanation: >-
      Review confirming that anti-tumor T cell responses exist but are
      suppressed by PD-1/PD-L1 signaling, and can be restored by checkpoint
      blockade. Evidence source is OTHER because this is a review article.
  downstream:
  - target: Adaptive Immune Resistance
    description: >-
      The anti-tumor immune response itself triggers adaptive upregulation
      of checkpoint ligands by tumor cells, creating a negative feedback loop.

- name: Adaptive Immune Resistance
  description: >-
    Tumor cells upregulate PD-L1 (and PD-L2) expression in response to
    interferon-gamma secreted by infiltrating T cells. This adaptive
    mechanism represents a co-opted physiological immune homeostasis
    pathway: PD-L1 engagement of PD-1 on effector T cells delivers
    inhibitory signals that suppress cytotoxicity, cytokine production,
    and proliferation. Tumors with active adaptive immune resistance
    are termed "immune-adapted" and are the best candidates for
    PD-1/PD-L1 blockade therapy, as the underlying anti-tumor immunity
    exists but is being actively suppressed.
  role: central_effector
  biological_processes:
  - preferred_term: Negative Regulation of T Cell Mediated Immunity
    term:
      id: GO:0002710
      label: negative regulation of T cell mediated immunity
    modifier: INCREASED
  evidence:
  - reference: PMID:38762484
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      The interaction of PD-1 and PD-L1 negatively regulates adaptive
      immune response mainly by inhibiting the activity of effector T cells
      while enhancing the function of immunosuppressive regulatory T cells
      (Tregs), largely contributing to the maintenance of immune homeostasis
      that prevents dysregulated immunity and harmful immune responses.
      However, cancer cells exploit the PD-1/PD-L1 axis to cause immune
      escape in cancer development and progression.
    explanation: >-
      Directly describes the adaptive immune resistance mechanism: tumors
      co-opt the PD-1/PD-L1 homeostatic pathway to suppress anti-tumor
      T cell activity. Evidence source is OTHER as this is a review.
  downstream:
  - target: T Cell Exhaustion and Immune Escape
    description: >-
      Chronic checkpoint engagement drives T cells toward an exhausted
      phenotype with progressive loss of effector function.

- name: T Cell Exhaustion and Immune Escape
  description: >-
    Persistent antigen exposure combined with chronic PD-1 signaling
    drives tumor-infiltrating T cells toward an exhausted phenotype
    characterized by progressive loss of cytokine production,
    cytotoxicity, and proliferative capacity, with upregulation of
    multiple inhibitory receptors (PD-1, LAG-3, TIM-3, TIGIT). The
    immunosuppressive tumor microenvironment is further reinforced by
    recruitment of regulatory T cells, myeloid-derived suppressor cells,
    and tumor-associated macrophages. This results in functional immune
    escape despite physical T cell presence in the tumor.
  role: consequence
  cell_types:
  - preferred_term: Exhausted T cell
    term:
      id: CL:0011025
      label: exhausted T cell
  biological_processes:
  - preferred_term: Exhausted T Cell Differentiation
    term:
      id: GO:0160083
      label: exhausted T cell differentiation
    modifier: INCREASED
  evidence:
  - reference: PMID:33256089
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      In this review, we focus on the molecular mechanisms that mediate
      melanoma development and progression, with a special focus on the
      immune evasion strategies utilized by melanomas, to evade host
      immune surveillances.
    explanation: >-
      Review establishing that tumors use immune evasion strategies
      including T cell exhaustion and checkpoint-mediated suppression
      to escape immune surveillance. Evidence source is OTHER as this
      is a review article.
  - reference: PMID:28878676
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Despite the huge success and efficacy of the anti-PD therapy response,
      it is limited to specific types of cancers, which attributes to the
      insufficient and heterogeneous expression of PD-1 in the tumor
      microenvironment.
    explanation: >-
      Establishes that immune escape via checkpoint pathways varies across
      cancers, with PD-1 expression heterogeneity explaining differential
      responses to checkpoint blockade.
