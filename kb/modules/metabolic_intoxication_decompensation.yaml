name: Metabolic Intoxication and Acute Decompensation Module
description: >-
  A conserved final-common-pathway module for the "intoxication-type" inborn
  errors of intermediary metabolism: a deficient enzyme (or transporter) in
  amino-acid, organic-acid, fatty-acid, or urea-cycle metabolism causes
  accumulation of upstream toxic metabolites and/or a deficit in energy
  production. A catabolic stress (intercurrent illness, fasting, surgery,
  childbirth, or a protein load) unmasks the block and precipitates acute
  metabolic decompensation — the biochemical crisis of metabolic acidosis,
  hyperammonemia, and/or hypoglycemia. Toxic metabolites and bioenergetic
  failure then injure the brain, producing acute metabolic encephalopathy that
  can progress to irreversible neurological injury, multiorgan crisis, coma, or
  death. The urea-cycle disorders, classic organic acidemias (methylmalonic,
  propionic, isovaleric), maple syrup urine disease, and fatty-acid oxidation
  defects differ in the upstream enzymatic lesion and the identity of the
  accumulating metabolite but converge on this decompensation-to-encephalopathy
  chain. Conforming disorder entries declare conformance via conforms_to on
  their pathophysiology nodes, substituting the disorder-specific deficient
  enzyme and toxic metabolite (e.g., OTC/ammonia in urea-cycle disorders,
  propionyl-CoA/methylmalonyl-CoA in organic acidemias, leucine/ketoacids in
  MSUD) while preserving the conserved chain.
category: Module
creation_date: "2026-06-28T00:00:00Z"
notes: >-
  This is a mechanism module, not a specific disease. Disorder entries reference
  individual nodes via conforms_to (e.g.,
  "metabolic_intoxication_decompensation#Acute Metabolic Decompensation").
  Conforming nodes should substitute the disorder-specific lesion: the deficient
  enzyme/transporter at the trigger node, the accumulating toxic metabolite at
  the amplifier node, and the predominant biochemical derangement
  (hyperammonemia vs. high-anion-gap metabolic acidosis vs. hypoglycemia) at the
  decompensation node. This module captures the acute intoxication/energy-crisis
  phenotype shared across urea-cycle disorders, organic acidemias, MSUD, and
  fatty-acid oxidation defects; it does NOT model the chronic disease-specific
  sequelae (basal-ganglia injury, cardiomyopathy, optic atrophy), which belong on
  the individual disorder entries. Chemistry (ammonia, organic acids) is given in
  prose; modules bind GO and CL terms only and do not use CHEBI bindings.
pathophysiology:
- name: Enzymatic Block in Intermediary Metabolism
  description: >-
    The conserved initiating lesion is a loss-of-function deficiency of an enzyme
    (or cofactor/transporter) in a core intermediary-metabolism pathway —
    amino-acid catabolism, organic-acid metabolism, mitochondrial fatty-acid
    beta-oxidation, or the urea cycle. The block interrupts normal substrate flux
    and primes the cell for accumulation of upstream intermediates whenever
    metabolic demand rises.
  role: trigger
  cell_types:
  - preferred_term: Hepatocyte
    term:
      id: CL:0000182
      label: hepatocyte
  biological_processes:
  - preferred_term: Cellular Amino Acid Catabolic Process
    term:
      id: GO:0009063
      label: amino acid catabolic process
    modifier: DECREASED
  evidence:
  - reference: PMID:25205257
    supports: SUPPORT
    evidence_source: OTHER
    snippet: Methylmalonic and propionic acidemia (MMA/PA) are inborn errors of metabolism characterized by accumulation of propionic acid and/or methylmalonic acid due to deficiency of methylmalonyl-CoA mutase (MUT) or propionyl-CoA carboxylase (PCC).
    explanation: >-
      Establishes the conserved trigger — deficiency of an intermediary-metabolism
      enzyme producing accumulation of upstream metabolites. Evidence source is
      OTHER because this is a review synthesizing the disease class.
  downstream:
  - target: Toxic Metabolite Accumulation and Energy Deficit
- name: Toxic Metabolite Accumulation and Energy Deficit
  description: >-
    Behind the block, upstream substrates and their derivatives accumulate to
    toxic concentrations while downstream energy substrates fall. A catabolic
    stress — intercurrent infection, fasting, surgery, childbirth, or an
    increased protein load — sharply increases the metabolic flux into the
    blocked pathway, overwhelming residual enzyme capacity and converting a
    compensated state into an acute crisis.
  role: amplifier
  cell_types:
  - preferred_term: Hepatocyte
    term:
      id: CL:0000182
      label: hepatocyte
  biological_processes:
  - preferred_term: Generation of Precursor Metabolites and Energy
    term:
      id: GO:0006091
      label: generation of precursor metabolites and energy
    modifier: DECREASED
  evidence:
  - reference: PMID:33409766
    supports: SUPPORT
    evidence_source: OTHER
    snippet: During metabolic stress induced by infection, childbirth or surgery, a catabolic phase leads to the metabolism of a large amount of proteins. This excess intake will exceed the capacity of the urea cycle, especially if it has an enzymatic deficit. A significant production of ammonia then follows.
    explanation: >-
      Defines the catabolic-stress amplifier step in which increased substrate
      flux exceeds residual enzyme capacity and drives toxic-metabolite
      accumulation. Evidence source is OTHER because this is a review article.
  downstream:
  - target: Acute Metabolic Decompensation
- name: Acute Metabolic Decompensation
  description: >-
    The crisis manifests biochemically as some combination of high-anion-gap
    metabolic acidosis (often with lactic acidosis and ketosis), hyperammonemia,
    and hypoglycemia. The precise pattern depends on the underlying defect —
    hyperammonemia predominates in urea-cycle disorders, metabolic acidosis and
    ketosis in organic acidemias, hypoglycemia in fatty-acid oxidation defects —
    but the decompensated state is the shared central effector that converts the
    metabolic block into systemic toxicity.
  role: central_effector
  cell_types:
  - preferred_term: Hepatocyte
    term:
      id: CL:0000182
      label: hepatocyte
  biological_processes:
  - preferred_term: Urea Cycle
    term:
      id: GO:0000050
      label: urea cycle
    modifier: DECREASED
  - preferred_term: Glucose Homeostasis
    term:
      id: GO:0042593
      label: glucose homeostasis
    modifier: ABNORMAL
  evidence:
  - reference: PMID:22593918
    supports: SUPPORT
    evidence_source: OTHER
    snippet: It is frequently accompanied by metabolic acidosis with anion gap, lactic acidosis, ketonuria, hypoglycemia, hyperammonemia, and cytopenias.
    explanation: >-
      Enumerates the conserved biochemical hallmarks of acute decompensation
      (anion-gap metabolic acidosis, hyperammonemia, hypoglycemia). Evidence
      source is OTHER because this is a GeneReviews-type review.
  - reference: PMID:27653704
    supports: SUPPORT
    evidence_source: OTHER
    snippet: During decompensation, acidosis in these patients occurs due to accumulation of organic acids and ketoacids, while lactic acidosis also occurs, particularly in severe decompensation or with severe secondary mitochondrial dysfunction
    explanation: >-
      Links toxic-metabolite accumulation and secondary mitochondrial dysfunction
      to the acidosis of decompensation. Evidence source is OTHER because this is
      a review article.
  downstream:
  - target: Acute Metabolic Encephalopathy
- name: Acute Metabolic Encephalopathy
  description: >-
    Circulating toxic metabolites — ammonia in particular — cross the
    blood-brain barrier and exert direct neurotoxicity. Ammonia is detoxified in
    astrocytes via glutamine synthesis; glutamine is the brain's main
    intracellular osmole, so its accumulation drives astrocyte swelling and
    cytotoxic cerebral edema. The result is acute encephalopathy presenting as
    lethargy, feeding refusal, hypotonia, seizures, and progressive depression of
    consciousness.
  role: effector
  cell_types:
  - preferred_term: Astrocyte
    term:
      id: CL:0000127
      label: astrocyte
  - preferred_term: Neuron
    term:
      id: CL:0000540
      label: neuron
  biological_processes:
  - preferred_term: Glutamine Metabolic Process
    term:
      id: GO:0006541
      label: L-glutamine metabolic process
    modifier: INCREASED
  evidence:
  - reference: PMID:33409766
    supports: SUPPORT
    evidence_source: OTHER
    snippet: Ammonia passes into the circulation and crosses the blood–brain barrier. The ammonia will exert a direct toxic effect on the neurotransmission responsible for part of the neurological symptomatology.
    explanation: >-
      Establishes ammonia crossing the blood-brain barrier as the proximate
      cause of metabolic encephalopathy. Evidence source is OTHER because this is
      a review article.
  - reference: PMID:33409766
    supports: SUPPORT
    evidence_source: OTHER
    snippet: Glutamine is the main intracellular osmole of the brain. Its accumulation causes the swelling of astrocytes during hyperammonemia
    explanation: >-
      Describes the astrocyte glutamine-osmole mechanism of cytotoxic cerebral
      edema in hyperammonemic encephalopathy. Evidence source is OTHER because
      this is a review article.
  downstream:
  - target: Neurological Injury and Multiorgan Crisis
- name: Neurological Injury and Multiorgan Crisis
  description: >-
    If decompensation is not rapidly reversed, the combination of metabolite
    toxicity and bioenergetic failure produces irreversible neurological injury
    and multiorgan compromise. Acutely this is intracranial hypertension, coma,
    and death; survivors may carry chronic sequelae. End-organ injury reflects
    both the direct toxicity of accumulating metabolites and the secondary
    failure of the Krebs cycle and oxidative phosphorylation.
  role: consequence
  cell_types:
  - preferred_term: Neuron
    term:
      id: CL:0000540
      label: neuron
  biological_processes:
  - preferred_term: Neuronal Death
    term:
      id: GO:0051402
      label: neuron apoptotic process
    modifier: INCREASED
  evidence:
  - reference: PMID:37938118
    supports: SUPPORT
    evidence_source: OTHER
    snippet: Urea cycle disorders (UCDs) cause elevations in ammonia which, when severe, cause irreversible neurologic injury.
    explanation: >-
      Links severe decompensation to irreversible neurological injury, the
      consequence step of this module. Evidence source is OTHER because this is a
      review-style statement of the disease class.
  - reference: PMID:27653704
    supports: SUPPORT
    evidence_source: OTHER
    snippet: End-organ injury occurs due to both primary toxicity of both the accumulating primary and secondary metabolites and deficiency of succinyl-CoA resulting in Kreb cycle and oxidative phosphorylation dysfunction.
    explanation: >-
      Defines the dual mechanism of end-organ injury — metabolite toxicity plus
      bioenergetic (Krebs/OXPHOS) failure. Evidence source is OTHER because this
      is a review article.
