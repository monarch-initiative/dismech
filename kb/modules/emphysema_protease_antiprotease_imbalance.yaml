name: Emphysema Protease-Antiprotease Imbalance Module
description: >-
  A conserved alveolar-destruction module representing the protease-antiprotease
  and oxidant-antioxidant imbalance paradigm that underlies pulmonary emphysema.
  Inhaled oxidants and particulates (chiefly cigarette smoke) or a genetic
  deficiency of alpha-1 antitrypsin trigger chronic lower-airway inflammation
  with recruitment of macrophages and neutrophils. The activated phagocytes
  release excess serine proteases (neutrophil elastase) and matrix
  metalloproteinases that overwhelm endogenous antiprotease defenses, producing
  proteolytic destruction of the alveolar-wall extracellular matrix, especially
  the elastic fiber network. Loss of elastin and collagen distends and ruptures
  alveolar walls, reducing elastic recoil and gas-exchange surface area. The
  acquired (smoking-related COPD) and inherited (alpha-1 antitrypsin deficiency)
  routes converge on this final common pathway, the permanent enlargement of
  distal airspaces with alveolar destruction that defines emphysema. Conforming
  disorder entries substitute the disorder-specific initiating insult (oxidant
  load versus antiprotease deficiency) while preserving the conserved causal
  chain.
category: Module
creation_date: "2026-06-06T00:00:00Z"
notes: >-
  This is a mechanism module, not a specific disease. Disorder entries reference
  individual nodes via conforms_to
  (e.g., "emphysema_protease_antiprotease_imbalance#Protease-Antiprotease
  Imbalance"). Key disorder-specific substitutions conforming nodes should make:
  cigarette-smoke COPD-emphysema enters through oxidant/particulate-driven
  inflammation with relatively normal alpha-1 antitrypsin levels, whereas
  alpha-1 antitrypsin deficiency (PiZZ/PiSZ) enters through a primary
  antiprotease deficit; both converge on unopposed proteolysis of the alveolar
  wall. Conforming nodes may substitute alveolar macrophage (CL:0000583) for the
  generic macrophage where the alveolar compartment is emphasized.
pathophysiology:
- name: Oxidant and Inflammatory Trigger
  description: >-
    Inhaled oxidants and particulates (predominantly cigarette smoke), or in the
    inherited route a genetic deficiency of alpha-1 antitrypsin, initiate and
    sustain chronic inflammation of the lower airways and alveoli. This
    inflammatory program recruits and activates alveolar macrophages and
    neutrophils, accompanied by a high level of oxidative stress that amplifies
    the response. This is the conserved upstream trigger from which both the
    acquired smoking-related and inherited deficiency routes proceed.
  role: trigger
  cell_types:
  - preferred_term: Alveolar macrophage
    term:
      id: CL:0000583
      label: alveolar macrophage
  - preferred_term: Neutrophil
    term:
      id: CL:0000775
      label: neutrophil
  biological_processes:
  - preferred_term: Inflammatory Response
    term:
      id: GO:0006954
      label: inflammatory response
    modifier: INCREASED
  - preferred_term: Response to Oxidative Stress
    term:
      id: GO:0006979
      label: response to oxidative stress
    modifier: INCREASED
  - preferred_term: Leukocyte Migration
    term:
      id: GO:0050900
      label: leukocyte migration
    modifier: INCREASED
  evidence:
  - reference: PMID:12359824
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      In COPD, chronic inflammation leads to fixed narrowing of small airways and
      alveolar wall destruction (emphysema). This is characterized by increased
      numbers of alveolar macrophages, neutrophils, and cytotoxic T lymphocytes,
      and the release of multiple inflammatory mediators (lipids, chemokines,
      cytokines, growth factors). There is also a high level of oxidative stress,
      which may amplify this inflammation.
    explanation: >-
      Establishes chronic inflammation with recruitment of alveolar macrophages
      and neutrophils, amplified by oxidative stress, as the trigger leading to
      alveolar wall destruction. Evidence source is OTHER because this is a
      review synthesizing cellular and molecular data.
  - reference: PMID:18256171
    supports: SUPPORT
    evidence_source: MODEL_ORGANISM
    snippet: >-
      In the lungs of CS-exposed mice, bronchial epithelial injury and
      bronchoalveolar lavage neutrophilia were observed. Oxidative stress and
      apoptosis were enhanced
    explanation: >-
      Mouse cigarette-smoke exposure recapitulates the oxidant-driven
      neutrophilic inflammation that initiates the emphysema cascade. Evidence
      source is MODEL_ORGANISM because the data derive from a murine model.
  downstream:
  - target: Protease-Antiprotease Imbalance

- name: Protease-Antiprotease Imbalance
  description: >-
    Activated neutrophils and macrophages release excess serine proteases,
    chiefly neutrophil elastase, and matrix metalloproteinases. In the acquired
    route, oxidant inactivation of alpha-1 antitrypsin plus an increased protease
    burden tips the balance; in the inherited route, severe alpha-1 antitrypsin
    deficiency leaves elastase unopposed. Across both, the net result is excess
    unopposed protease activity relative to endogenous antiprotease defenses.
    This is the central amplifying lesion of the module.
  role: amplifier
  cell_types:
  - preferred_term: Neutrophil
    term:
      id: CL:0000775
      label: neutrophil
  - preferred_term: Alveolar macrophage
    term:
      id: CL:0000583
      label: alveolar macrophage
  biological_processes:
  - preferred_term: Proteolysis
    term:
      id: GO:0006508
      label: proteolysis
    modifier: INCREASED
  evidence:
  - reference: PMID:27564665
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      From the discovery that alpha-1 antitrypsin (AAT) was an effective
      inhibitor of neutrophil elastase originated the classic paradigm of
      protease/antiprotease imbalance, linking lung destruction to the unopposed
      effect of proteases in patients with the deficiency.
    explanation: >-
      States the classic protease/antiprotease imbalance paradigm linking
      unopposed protease activity from alpha-1 antitrypsin deficiency to lung
      destruction. Evidence source is OTHER because this is a review article.
  - reference: PMID:11723826
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      In certain pathological circumstances, an imbalance between NE and its
      major plasmatic inhibitor alpha 1-PI (formerly, alpha 1-antitrypsin) leads
      to abnormal tissue destruction and disease development. Genetic or acquired
      alpha 1-PI deficiency is thought to be involved in the pathogenesis of
      pulmonary emphysema.
    explanation: >-
      Directly describes the imbalance between neutrophil elastase and alpha-1
      antitrypsin, from genetic or acquired deficiency, as the driver of tissue
      destruction in emphysema. Evidence source is OTHER because this is a
      review article.
  - reference: PMID:16324149
    supports: SUPPORT
    evidence_source: MODEL_ORGANISM
    snippet: >-
      Inflammation, protease/anti-protease imbalance and oxidative stress play
      important roles in the pathogenesis of emphysema.
    explanation: >-
      Confirms in a knockout-mouse study that protease/antiprotease imbalance,
      together with inflammation and oxidative stress, drives emphysema. Evidence
      source is MODEL_ORGANISM because the supporting data derive from
      Nrf2-knockout mice.
  downstream:
  - target: Alveolar ECM and Elastin Destruction

- name: Alveolar ECM and Elastin Destruction
  description: >-
    Unopposed proteolysis degrades the extracellular matrix of the alveolar
    wall, with the elastic fiber network surrounding the airspaces being the
    critical target. Elastolysis and breakdown of collagen disrupt the
    load-bearing matrix that stores the energy needed for normal expiration.
    This is the central effector step that translates the biochemical imbalance
    into structural matrix loss.
  role: central_effector
  biological_processes:
  - preferred_term: Extracellular Matrix Disassembly
    term:
      id: GO:0022617
      label: extracellular matrix disassembly
    modifier: INCREASED
  evidence:
  - reference: PMID:39408941
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      An essential feature of pulmonary emphysema is damage to the elastic fiber
      network surrounding the airspaces, which stores the energy needed to expel
      air from the lungs. The degradation of these fibers disrupts the mechanical
      forces involved in respiration, resulting in distension and rupture of
      alveolar walls.
    explanation: >-
      Identifies degradation of the alveolar elastic fiber/extracellular matrix
      network as the essential feature mediating emphysematous alveolar damage.
      Evidence source is OTHER because this is a review article.
  - reference: PMID:12359824
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      There is increased elastolysis and probable involvement of matrix
      metalloproteinases.
    explanation: >-
      Confirms increased elastolysis and matrix metalloproteinase involvement as
      the proteolytic destruction of alveolar matrix. Evidence source is OTHER
      because this is a review article.
  downstream:
  - target: Alveolar Wall Destruction and Airspace Enlargement

- name: Alveolar Wall Destruction and Airspace Enlargement
  description: >-
    Progressive loss of the elastic and collagenous matrix leads to distension
    and rupture of alveolar walls, with loss of elastic recoil and a reduction in
    the gas-exchange surface area. Alveolar wall cells are lost through injury
    and apoptosis, and adjacent airspaces coalesce. The result is the structural
    hallmark of emphysema preceding the named clinical phenotype.
  role: effector
  biological_processes:
  - preferred_term: Apoptotic Process
    term:
      id: GO:0006915
      label: apoptotic process
    modifier: INCREASED
  evidence:
  - reference: PMID:39408941
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Pulmonary emphysema involves progressive destruction of alveolar walls,
      leading to enlarged air spaces and impaired gas exchange.
    explanation: >-
      Directly describes alveolar wall destruction producing enlarged airspaces
      and impaired gas exchange, the effector structural change of the module.
      Evidence source is OTHER because this is a review article.
  - reference: PMID:18256171
    supports: SUPPORT
    evidence_source: MODEL_ORGANISM
    snippet: >-
      This chronic exposure caused pulmonary emphysema in C57BL6/J mice
      accompanying prominent infiltration of macrophages and neutrophils to lung.
    explanation: >-
      Demonstrates in a chronic cigarette-smoke mouse model that the
      inflammatory-proteolytic cascade culminates in pulmonary emphysema.
      Evidence source is MODEL_ORGANISM because the data derive from mice.
  downstream:
  - target: Emphysema

- name: Emphysema
  description: >-
    The permanent enlargement of the distal airspaces (distal to the terminal
    bronchioles) accompanied by destruction of their walls, without obvious
    fibrosis. This is the named disease-like phenotype that the protease-
    antiprotease and oxidant-antioxidant imbalance cascade converges upon,
    shared by cigarette-smoke COPD-emphysema and genetic alpha-1 antitrypsin
    deficiency. The clinical consequence is airflow limitation with reduced
    elastic recoil and impaired gas exchange.
  role: consequence
  evidence:
  - reference: PMID:39408941
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Pulmonary emphysema involves progressive destruction of alveolar walls,
      leading to enlarged air spaces and impaired gas exchange.
    explanation: >-
      Defines emphysema as progressive alveolar wall destruction with enlarged
      airspaces and impaired gas exchange, the consequence node of the module.
      Evidence source is OTHER because this is a review article.
  - reference: PMID:27564665
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      it is likely time to move on from the original protease/antiprotease
      hypothesis for the production of emphysema toward a more complex paradigm
    explanation: >-
      Frames emphysema as the disease produced by the protease/antiprotease
      paradigm (while noting additional immune mechanisms), supporting it as the
      terminal phenotype of this module. Evidence source is OTHER because this is
      a review article.
