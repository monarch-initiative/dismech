name: Gut Dysbiosis Module
description: >-
  A conserved mechanism module for the hallmark of aging (Lopez-Otin et al.,
  2023) termed dysbiosis: the age-associated alteration of the gut microbiome
  and its downstream contribution to systemic aging. With age the composition of
  the intestinal microbiota drifts - older people show greater inter-individual
  variation and increasingly individual-unique communities - and this is coupled
  to increased intestinal permeability. Loss of barrier integrity permits
  microbial products to translocate, driving age-associated systemic
  inflammation and macrophage dysfunction; germ-free and cohort studies indicate
  the microbiota is causally involved in the age-related rise in circulating
  inflammatory mediators. Gut-microbiome patterns track healthy aging and even
  predict survival. Dysbiosis is thus an integrative hallmark feeding
  inflammaging and broader age-related morbidity. Individual disorder entries
  declare conformance via conforms_to on their pathophysiology nodes,
  substituting the disease-specific microbiome or barrier context while
  preserving the conserved microbiota-shift -> barrier-failure -> systemic-
  inflammation -> age-related-decline chain.
category: Module
creation_date: "2026-07-01T00:00:00Z"
notes: >-
  This is a mechanism module, not a specific disease. Disorder entries
  reference individual nodes via conforms_to (e.g.,
  "gut_dysbiosis#Intestinal Barrier Dysfunction and Microbial Translocation").
  Conforming nodes in disorder files should include the corresponding biological
  processes and causal edges, specialized to their disease context. Dysbiosis is
  an integrative hallmark that feeds the inflammaging module (systemic
  inflammation is the shared interface); route the systemic-inflammation
  consequences there rather than re-deriving them. Key conformance target:
  "gut_dysbiosis#Intestinal Barrier Dysfunction and Microbial Translocation".
pathophysiology:
- name: Age-Associated Gut Microbiota Alteration
  description: >-
    With age the composition of the gut microbiota shifts: older individuals
    display greater inter-individual variation than younger adults and, from
    mid-to-late adulthood, increasingly unique individual microbiome
    compositions. This age-associated compositional drift is the initiating
    alteration of the hallmark.
  role: trigger
  evidence:
  - reference: PMID:22797518
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      The microbiota of older people displays greater inter-individual variation
      than that of younger adults.
    explanation: >-
      Documents the greater compositional variation of the elderly gut
      microbiota, the age-associated drift modeled here. Evidence source is
      HUMAN_CLINICAL (elderly cohort study).
  - reference: PMID:33619379
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      starting in mid-to-late adulthood, gut microbiomes become increasingly
      unique to individuals with age
    explanation: >-
      Shows progressive individualization of the gut microbiome with age across
      large cohorts, supporting the microbiota-drift trigger. Evidence source is
      HUMAN_CLINICAL (multi-cohort human study).
  downstream:
  - target: Intestinal Barrier Dysfunction and Microbial Translocation
- name: Intestinal Barrier Dysfunction and Microbial Translocation
  description: >-
    Age-associated dysbiosis is coupled to loss of intestinal barrier integrity
    (increased permeability), allowing microbial products to translocate across
    the gut wall. This barrier failure is the conserved central effector that
    links a shifted microbiota to systemic consequences.
  role: central_effector
  evidence:
  - reference: PMID:28407483
    supports: SUPPORT
    evidence_source: MODEL_ORGANISM
    snippet: >-
      Age-Associated Microbial Dysbiosis Promotes Intestinal Permeability,
      Systemic Inflammation, and Macrophage Dysfunction.
    explanation: >-
      States that age-associated dysbiosis promotes intestinal permeability
      (and downstream systemic inflammation), the barrier-failure effector
      modeled here. Evidence source is MODEL_ORGANISM (germ-free and aged mouse
      experiments).
  downstream:
  - target: Dysbiosis-Driven Systemic Inflammation
- name: Dysbiosis-Driven Systemic Inflammation
  description: >-
    Translocating microbial products drive the age-associated increase in
    circulating inflammatory mediators and macrophage dysfunction. Germ-free
    studies indicate this age-related inflammation is causally dependent on the
    microbiota. This node is the amplifying interface at which gut dysbiosis
    feeds inflammaging.
  role: amplifier
  biological_processes:
  - preferred_term: Inflammatory Response
    term:
      id: GO:0006954
      label: inflammatory response
    modifier: INCREASED
  evidence:
  - reference: PMID:28407483
    supports: SUPPORT
    evidence_source: MODEL_ORGANISM
    snippet: >-
      when maintained under germ-free conditions, mice do not display an
      age-related increase in circulating pro-inflammatory cytokine levels
    explanation: >-
      Germ-free mice lack the age-related rise in circulating pro-inflammatory
      cytokines, showing the microbiota is causally required for
      dysbiosis-driven systemic inflammation. Evidence source is MODEL_ORGANISM
      (germ-free mouse study).
  - reference: PMID:22797518
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Alterations in intestinal microbiota composition are associated with
      several chronic conditions, including obesity and inflammatory diseases.
    explanation: >-
      Links altered microbiota composition to inflammatory and metabolic disease,
      supporting the inflammation-driving role of dysbiosis. Evidence source is
      HUMAN_CLINICAL (human cohort study).
  downstream:
  - target: Age-Related Health Decline and Reduced Survival
- name: Age-Related Health Decline and Reduced Survival
  description: >-
    Through systemic inflammation and impaired barrier and immune function,
    dysbiosis contributes to age-related health decline; conversely,
    gut-microbiome patterns that reflect healthy aging are associated with
    survival. This is the conserved consequence of dysbiosis; specific
    disease phenotypes are supplied by the conforming disorder, and
    microbiome-directed strategies are the corresponding intervention target.
  role: consequence
  evidence:
  - reference: PMID:33619379
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Gut microbiome pattern reflects healthy ageing and predicts survival in
      humans.
    explanation: >-
      Establishes that gut-microbiome patterns track healthy aging and predict
      survival, the outcome modeled here. Evidence source is HUMAN_CLINICAL
      (multi-cohort human study).
