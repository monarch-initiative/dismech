name: Deregulated Nutrient Sensing Module
description: >-
  A conserved mechanism module for the hallmark of aging (Lopez-Otin et al.)
  termed deregulated nutrient sensing: the age-associated shift of the
  nutrient- and growth-sensing network toward persistent anabolic signaling.
  In a state of nutrient/growth-factor surplus, the anabolic sensors - the
  somatotroph GH/IGF-1 axis and the mechanistic target of rapamycin complex 1
  (mTORC1), which senses amino-acid and nutrient abundance - are chronically
  engaged, while the catabolic, low-energy sensors (AMP-activated protein
  kinase, AMPK, and the NAD+-dependent sirtuins) are relatively attenuated.
  mTORC1 hyperactivation biases the cell toward growth and biosynthesis and
  suppresses macroautophagy, so the age-associated accumulation of damaged
  proteins and organelles is no longer efficiently cleared; the net result is
  accelerated cellular aging and age-related tissue decline. This is the
  conserved node that dietary restriction and the geroprotector drugs
  (rapamycin, metformin) act upon: down-shifting anabolic nutrient signaling
  extends lifespan and healthspan across model organisms. Individual disorder
  entries declare conformance via conforms_to on their pathophysiology nodes,
  substituting the tissue- or disease-specific driver (e.g. constitutive
  mTORC1 activation from PI3K-AKT-TSC pathway lesions, or an accelerated-aging
  progeroid context) while preserving the conserved anabolic-signaling ->
  autophagy-suppression -> tissue-decline chain.
category: Module
creation_date: "2026-07-01T00:00:00Z"
notes: >-
  This is a mechanism module, not a specific disease. Disorder entries
  reference individual nodes via conforms_to (e.g.,
  "deregulated_nutrient_sensing#mTORC1 Hyperactivation"). Conforming nodes in
  disorder files should include the corresponding biological processes and
  causal edges, specialized to their disease context. The module is
  intentionally kept lean: it captures the conserved anabolic-vs-catabolic
  nutrient-sensing imbalance, its convergence on autophagy suppression, and
  the geroprotector drug-target pattern (rapamycin and metformin both restrain
  the anabolic mTORC1 node via target_mechanisms), but deliberately does NOT
  embed disease-specific or contested downstream theories (e.g. tissue-specific
  mTOR-driven pathologies, or the antagonistic-pleiotropy debate on whether
  mTOR inhibition trades growth for longevity). Such specific or
  context-dependent claims belong on the relevant disorder or
  comorbidity/trajectory entry, which may conforms_to or reference this module.
  Complements the cellular_senescence module (another antagonistic hallmark of
  aging): deregulated nutrient sensing is one of several senescence-inducing
  stresses, and both converge on age-related tissue dysfunction. Key
  conformance target: "deregulated_nutrient_sensing#mTORC1 Hyperactivation".
pathophysiology:
- name: Nutrient Surplus and Anabolic Signaling
  description: >-
    A sustained state of nutrient and growth-factor abundance keeps the
    anabolic arm of the nutrient-sensing network engaged: the somatotroph
    GH/IGF-1 axis and amino-acid/nutrient sensing upstream of mTORC1. Because
    reducing the activity of these nutrient-sensing pathways (by dietary
    restriction, mutation, or chemical inhibitors) extends lifespan and lowers
    age-related disease, their chronic engagement is the initiating driver of
    the deregulated-nutrient-sensing hallmark.
  role: trigger
  biological_processes:
  - preferred_term: Cellular Response to Nutrient Levels
    term:
      id: GO:0031669
      label: cellular response to nutrient levels
    modifier: INCREASED
  - preferred_term: Insulin-Like Growth Factor Receptor Signaling
    term:
      id: GO:0048009
      label: insulin-like growth factor receptor signaling pathway
    modifier: INCREASED
  evidence:
  - reference: PMID:20395504
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      When the food intake of organisms such as yeast and rodents is reduced
      (dietary restriction), they live longer than organisms fed a normal diet.
      A similar effect is seen when the activity of nutrient-sensing pathways is
      reduced by mutations or chemical inhibitors.
    explanation: >-
      Establishes that the activity of nutrient-sensing pathways is the lever on
      lifespan - reducing it extends life - so their chronic engagement in
      nutrient surplus is the initiating driver modeled here. Evidence source is
      OTHER because this is a review.
  - reference: PMID:23746838
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      These hallmarks are: genomic instability, telomere attrition, epigenetic
      alterations, loss of proteostasis, deregulated nutrient sensing,
      mitochondrial dysfunction, cellular senescence, stem cell exhaustion, and
      altered intercellular communication.
    explanation: >-
      Enumerates deregulated nutrient sensing as one of the conserved hallmarks
      of aging, framing this module. Evidence source is OTHER because this is a
      review.
  downstream:
  - target: mTORC1 Hyperactivation
  - target: AMPK and Sirtuin Catabolic-Sensing Attenuation

- name: mTORC1 Hyperactivation
  description: >-
    Persistent nutrient and growth-factor input drives chronic activation of
    mTOR complex 1 (mTORC1), the master anabolic sensor that couples nutrient
    availability to cell growth, protein translation, and biosynthesis. Because
    inhibition of the mTOR pathway extends lifespan across model organisms and
    protects against a growing list of age-related pathologies, its
    age-associated hyperactivation is the central effector of this hallmark and
    the node targeted by rapamycin and (indirectly, via AMPK) metformin. This is
    the conserved central node that disease-specific mTOR-activating lesions
    converge upon.
  role: central_effector
  biological_processes:
  - preferred_term: TORC1 Signaling
    term:
      id: GO:0038202
      label: TORC1 signaling
    modifier: INCREASED
  evidence:
  - reference: PMID:23325216
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      A leading target for such interventions is the nutrient response pathway
      defined by the mechanistic target of rapamycin (mTOR). Inhibition of this
      pathway extends lifespan in model organisms and confers protection against
      a growing list of age-related pathologies.
    explanation: >-
      Establishes the mTOR nutrient-response pathway as the leading modifiable
      aging target and its inhibition as protective, supporting mTORC1
      hyperactivation as the central effector node. Evidence source is OTHER
      because this is a review.
  - reference: PMID:27304501
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      it is now clear that mTOR functions as a central coordinator of organismal
      metabolism in response to both environmental and hormonal signals
    explanation: >-
      Characterizes mTOR as the central coordinator of metabolism in response to
      nutrient and hormonal cues, supporting its role as the hub of the
      nutrient-sensing hallmark. Evidence source is OTHER because this is a
      review.
  downstream:
  - target: Autophagy Suppression and Anabolic Bias
  - target: Accelerated Cellular Aging and Age-Related Tissue Decline

- name: AMPK and Sirtuin Catabolic-Sensing Attenuation
  description: >-
    In parallel with anabolic hyperactivation, the catabolic low-energy sensors
    that oppose mTORC1 - AMP-activated protein kinase (AMPK, which senses a low
    energy/high-AMP state) and the NAD+-dependent sirtuins - are relatively
    attenuated in the nutrient-replete aging state. These sensors normally drive
    the protective, pro-longevity response to nutrient scarcity (the mechanism
    engaged by dietary restriction, Sirtuin 1 activation, and metformin), so
    their reduced activity reinforces the anabolic bias and its downstream
    consequences.
  role: effector
  biological_processes:
  - preferred_term: Cellular Response to Starvation
    term:
      id: GO:0009267
      label: cellular response to starvation
    modifier: DECREASED
  - preferred_term: Energy Homeostasis
    term:
      id: GO:0097009
      label: energy homeostasis
    modifier: ABNORMAL
  evidence:
  - reference: PMID:21884931
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      its inhibition compromises the longevity-promoting effects of caloric
      restriction, Sirtuin 1 activation, inhibition of insulin/insulin growth
      factor signaling, or the administration of rapamycin, resveratrol, or
      spermidine
    explanation: >-
      Groups caloric restriction, Sirtuin 1 activation, and reduced
      insulin/IGF signaling as the conserved longevity-promoting arm opposed to
      anabolic nutrient signaling, supporting the catabolic-sensing node whose
      attenuation is modeled here. Evidence source is OTHER because this is a
      review.
  - reference: PMID:20395504
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      In rodents, both dietary restriction and decreased nutrient-sensing
      pathway activity can lower the incidence of age-related loss of function
      and disease, including tumors and neurodegeneration.
    explanation: >-
      Shows that engaging the catabolic/low-nutrient response (dietary
      restriction) lowers age-related disease, so its attenuation in the
      nutrient-replete state is pathogenic. Evidence source is OTHER because
      this is a review.
  downstream:
  - target: Autophagy Suppression and Anabolic Bias
  - target: Accelerated Cellular Aging and Age-Related Tissue Decline

- name: Autophagy Suppression and Anabolic Bias
  description: >-
    Active mTORC1 suppresses macroautophagy, while attenuated AMPK/sirtuin
    signaling fails to induce it. Autophagy is the cytoplasmic recycling process
    that clears damaged organelles and proteins; its induction by starvation or
    genetic inactivation of nutrient signaling counteracts the age-associated
    accumulation of cellular damage. When nutrient signaling holds autophagy
    suppressed, this quality-control capacity is lost and damaged components
    accumulate - the amplifying step that links deregulated nutrient sensing to
    tissue decline.
  role: amplifier
  biological_processes:
  - preferred_term: Negative Regulation of Macroautophagy
    term:
      id: GO:0016242
      label: negative regulation of macroautophagy
    modifier: INCREASED
  - preferred_term: Autophagy
    term:
      id: GO:0006914
      label: autophagy
    modifier: DECREASED
  evidence:
  - reference: PMID:25654554
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Both starvation and the genetic inactivation of nutrient signaling
      converge on the induction of autophagy, a cytoplasmic recycling process
      that counteracts the age-associated accumulation of damaged organelles and
      proteins as it improves the metabolic fitness of cells.
    explanation: >-
      Establishes that inactivating nutrient signaling induces autophagy, which
      clears age-associated damage; conversely, active nutrient signaling
      suppresses autophagy, the mechanism modeled in this node. Evidence source
      is OTHER because this is a review.
  - reference: PMID:21884931
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      normal and pathological aging are often associated with a reduced
      autophagic potential
    explanation: >-
      Documents reduced autophagic potential as a feature of aging, supporting
      autophagy suppression as an amplifying step. Evidence source is OTHER
      because this is a review.
  downstream:
  - target: Accelerated Cellular Aging and Age-Related Tissue Decline

- name: Accelerated Cellular Aging and Age-Related Tissue Decline
  description: >-
    The sustained anabolic bias, attenuated stress-responsive catabolic
    signaling, and suppressed autophagy converge on accelerated cellular aging:
    accumulation of damaged macromolecules and organelles, loss of proteostatic
    and metabolic fitness, and declining tissue function. This is the conserved
    consequence by which deregulated nutrient sensing contributes causally to
    age-related pathology; the specific organ or disease phenotype is supplied
    by the conforming disorder. It is the outcome that geroprotector
    interventions (dietary restriction, rapamycin, metformin) are intended to
    delay.
  role: consequence
  evidence:
  - reference: PMID:23746838
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      This deterioration is the primary risk factor for major human pathologies,
      including cancer, diabetes, cardiovascular disorders, and neurodegenerative
      diseases.
    explanation: >-
      States that age-associated deterioration is the primary risk factor for
      the major age-related diseases, the consequence arm modeled here. Evidence
      source is OTHER because this is a review.
  - reference: PMID:20395504
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      In rodents, both dietary restriction and decreased nutrient-sensing
      pathway activity can lower the incidence of age-related loss of function
      and disease, including tumors and neurodegeneration.
    explanation: >-
      Demonstrates that down-shifting nutrient signaling reduces age-related loss
      of function and disease, establishing the causal link from the pathway to
      this outcome node. Evidence source is OTHER because this is a review.
treatments:
- name: Rapamycin (mTOR Inhibition)
  description: >-
    Rapamycin (sirolimus) is a small-molecule inhibitor of mTORC1 that, by
    binding FKBP12, decreases mTOR complex 1 activity. It is the prototypical
    geroprotector: pharmacologic inhibition of the anabolic nutrient-sensing hub
    extends lifespan in model organisms including mice, even when started late in
    life. Represents the anabolic-node inhibition drug-target design pattern for
    conforming disorders.
  therapeutic_modality: SMALL_MOLECULE
  treatment_term:
    preferred_term: Pharmacotherapy
    term:
      id: NCIT:C15986
      label: Pharmacotherapy
    therapeutic_agent:
    - preferred_term: sirolimus
      term:
        id: CHEBI:9168
        label: sirolimus
  target_mechanisms:
  - target: mTORC1 Hyperactivation
    treatment_effect: INHIBITS
    description: >-
      Rapamycin directly inhibits mTORC1, down-shifting the anabolic
      nutrient-sensing hub and relieving its suppression of autophagy.
  evidence:
  - reference: PMID:19587680
    supports: SUPPORT
    evidence_source: MODEL_ORGANISM
    snippet: >-
      Here we report that rapamycin, an inhibitor of the mTOR pathway, extends
      median and maximal lifespan of both male and female mice when fed
      beginning at 600 days of age.
    explanation: >-
      Genetically heterogeneous mice fed rapamycin late in life show extended
      lifespan, validating pharmacologic mTORC1 inhibition as a geroprotector.
      Evidence source is MODEL_ORGANISM (mouse lifespan study).
  - reference: PMID:23325216
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Inhibition of this pathway extends lifespan in model organisms and confers
      protection against a growing list of age-related pathologies.
    explanation: >-
      Establishes mTOR-pathway inhibition as lifespan-extending and protective
      against age-related disease, the rationale for the rapamycin target.
      Evidence source is OTHER because this is a review.
- name: Metformin (AMPK-Mediated Nutrient-Signaling Restraint)
  description: >-
    Metformin is a biguanide that activates AMPK and acts as a
    caloric-restriction mimetic, indirectly restraining anabolic mTORC1
    signaling and re-engaging the catabolic, autophagy-permissive state. It has
    demonstrated protective effects against several age-related diseases in
    humans and is the agent of the TAME (Targeting Aging with Metformin) trial,
    the flagship test of a geroprotector for healthy aging.
  therapeutic_modality: SMALL_MOLECULE
  treatment_term:
    preferred_term: Pharmacotherapy
    term:
      id: NCIT:C15986
      label: Pharmacotherapy
    therapeutic_agent:
    - preferred_term: metformin
      term:
        id: CHEBI:6801
        label: metformin
  target_mechanisms:
  - target: mTORC1 Hyperactivation
    treatment_effect: INHIBITS
    description: >-
      Metformin activates AMPK, which indirectly restrains mTORC1 and re-engages
      the catabolic, autophagy-permissive low-energy response, opposing the
      anabolic bias of the deregulated nutrient-sensing state.
  evidence:
  - reference: PMID:27304507
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Metformin, which has demonstrated protective effects against several
      age-related diseases in humans, will be tested in the TAME (Targeting Aging
      with Metformin) trial, as the initial step in the development of
      increasingly effective next-generation drugs.
    explanation: >-
      Documents metformin's protective effects against age-related disease and
      its role as the flagship geroprotector in the TAME trial, supporting it as
      a nutrient-sensing-directed intervention. Evidence source is OTHER because
      this is a review.
