name: Antisense Oligonucleotide Therapy Module
description: >-
  A conserved mechanism module representing the three principal RNA-targeting
  paradigms by which antisense oligonucleotides (ASOs) — single-stranded
  nucleic acids that target RNA — produce therapeutic effects. The first
  paradigm is RNase H-mediated mRNA degradation, used when the therapeutic
  goal is to reduce a pathogenic or overexpressed protein (dominant
  gain-of-function diseases and dyslipidemias). The second paradigm is
  splice-site occlusion, in which the ASO sterically blocks a splice regulatory
  element to redirect spliceosome activity — either forcing exon skipping to
  restore a disrupted reading frame (e.g., DMD exon-skipping ASOs), or
  unblocking exon inclusion to restore functional protein (e.g., nusinersen
  in SMA). The third paradigm is steric translation blockade, in which the
  ASO physically impedes ribosomal access without recruiting RNase H (used
  in fomivirsen, the first FDA-approved ASO). Each paradigm operates on a
  distinct pre-RNA or mRNA target and leaves a distinct molecular footprint.
  Individual disorder entries declare conformance via conforms_to on their
  pathophysiology nodes, substituting the disorder-specific gene, transcript,
  protein, and variant while preserving the shared RNA-level causal chain.
category: Module
creation_date: "2026-06-12T00:00:00Z"
notes: >-
  This is a mechanism module, not a specific disease. Disorder entries reference
  the relevant paradigm node via conforms_to. Use
  "antisense_oligonucleotide_therapy#Pathogenic mRNA Accumulation" for RNase
  H-knockdown targets (SOD1-ALS/tofersen, ATTR amyloidosis/inotersen or
  eplontersen, familial hypercholesterolemia/mipomersen, familial
  chylomicronemia syndrome/volanesorsen or olezarsen, hereditary
  angioedema/donidalorsen, FUS-ALS/jacifusen). Use
  "antisense_oligonucleotide_therapy#Aberrant Pre-mRNA Splicing" for
  splice-site occlusion targets (SMA/nusinersen, DMD exon-skipping/eteplirsen,
  golodirsen, viltolarsen, casimersen). Use
  "antisense_oligonucleotide_therapy#Pathogenic Viral mRNA Translation" for
  steric blockade targets (CMV retinitis/fomivirsen). The conforming
  pathophysiology node in a disorder file should describe the disease-specific
  RNA defect, referencing the causal gene and transcript. Since ASO design
  relies principally on knowledge of mRNA sequence, this module also captures
  the expedient bench-to-bedside pipeline enabled by RNA targeting — the same
  sequence logic that makes individualized ASOs (e.g., milasen for a single
  CLN7 patient) feasible within months.
pathophysiology:
- name: Pathogenic mRNA Accumulation
  description: >-
    In dominant gain-of-function or toxic protein overexpression diseases, the
    causal mRNA is transcribed and translated at a level that produces harmful
    amounts of the encoded protein. The transcript itself is structurally normal
    but its abundance or the toxicity of its protein product is the pathogenic
    driver — making mRNA level reduction, rather than protein inhibition, the
    upstream therapeutic target. Examples include SOD1 mRNA in SOD1-ALS, TTR
    mRNA in hereditary transthyretin amyloidosis, APOB mRNA in homozygous
    familial hypercholesterolemia, APOC3 mRNA in familial chylomicronemia
    syndrome, KLKB1 (prekallikrein) mRNA in hereditary angioedema, and FUS
    mRNA in FUS-ALS. RNase H-dependent ASOs bind the target mRNA and recruit
    endogenous RNase H1 to cleave the heteroduplex, degrading the message and
    reducing the pathogenic protein.
  role: trigger
  biological_processes:
  - preferred_term: mRNA metabolic process
    term:
      id: GO:0016071
      label: mRNA metabolic process
    modifier: INCREASED
  evidence:
  - reference: PMID:38914784
    reference_title: >-
      Mechanisms of Action of the US Food and Drug Administration-Approved
      Antisense Oligonucleotide Drugs.
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      The first MOA is initiated by base-pairing between the ASO and its
      target mRNA, followed by RNase H-dependent mRNA degradation.
    explanation: >-
      Sang et al. 2024 identifies RNase H-dependent mRNA degradation as the
      first principal mechanism of FDA-approved ASOs, directly supporting the
      pathogenic mRNA accumulation node as the upstream therapeutic target for
      this paradigm.
  downstream:
  - target: RNase H-Mediated Transcript Degradation
    description: >-
      The ASO base-pairs with the target mRNA, forming a DNA:RNA heteroduplex
      that recruits endogenous RNase H1 to cleave the RNA strand.
    causal_link_type: DIRECT

- name: RNase H-Mediated Transcript Degradation
  description: >-
    The ASO:mRNA heteroduplex recruits endogenous RNase H1, which cleaves the
    RNA strand of the duplex. This catalytic cleavage degrades the target
    mRNA, freeing the ASO to engage additional mRNA molecules. The result is
    a sustained, dose-dependent reduction in steady-state mRNA and protein
    levels. The ASO backbone chemistry — typically 2'-O-methoxyethyl (2'-MOE)
    modifications with a central phosphorothioate gap region (gapmer design)
    — is optimized to support RNase H recruitment while resisting nuclease
    degradation. GalNAc conjugation (as in eplontersen and olezarsen) enables
    hepatocyte-targeted delivery for liver-expressed transcripts.
  role: effector
  biological_processes:
  - preferred_term: RNA catabolic process
    term:
      id: GO:0006401
      label: RNA catabolic process
    modifier: INCREASED
  evidence:
  - reference: PMID:38914784
    reference_title: >-
      Mechanisms of Action of the US Food and Drug Administration-Approved
      Antisense Oligonucleotide Drugs.
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      RNase H-dependent ASOs include inotersen and eplontersen (for
      hereditary transthyretin amyloidosis), fomiversen (for opportunistic
      cytomegalovirus infection), mipomersen (for familial
      hypercholesterolemia), and tofersen [for amyotrophic lateral sclerosis
      (ALS)].
    explanation: >-
      Sang et al. 2024 lists the FDA-approved RNase H-dependent ASO drugs,
      directly supporting this node as the RNase H cleavage effector step of
      the knockdown paradigm.
  downstream:
  - target: Reduction of Pathogenic Protein
    description: >-
      Degradation of the target mRNA reduces ribosomal translation and lowers
      steady-state levels of the pathogenic or overexpressed protein.
    causal_link_type: DIRECT

- name: Reduction of Pathogenic Protein
  description: >-
    RNase H-mediated mRNA cleavage reduces ribosomal substrate availability,
    producing a sustained, dose-dependent reduction in the pathogenic protein.
    The magnitude of protein reduction is the primary pharmacodynamic
    readout: tofersen reduces CSF SOD1; inotersen and eplontersen reduce
    serum TTR; mipomersen reduces LDL-C via APOB reduction; volanesorsen and
    olezarsen reduce APOC3 and serum triglycerides; donidalorsen reduces
    prekallikrein. Protein reduction translates to disease modification when
    the targeted protein is the proximate pathogenic driver.
  role: consequence
  biological_processes:
  - preferred_term: negative regulation of translation
    term:
      id: GO:0017148
      label: negative regulation of translation
    modifier: INCREASED

- name: Aberrant Pre-mRNA Splicing
  description: >-
    In diseases caused by splice-disrupting mutations or regulatory splicing
    defects, the pre-mRNA is transcribed but incorrectly processed. Two
    distinct defect types drive the two splice-modulating ASO strategies:
    (1) mutation-bearing exons disrupt the reading frame — most prominently
    in Duchenne muscular dystrophy, where out-of-frame deletion of one or
    more exons prevents dystrophin production; exon-skipping ASOs restore
    the reading frame by forcing the spliceosome to bypass the mutant exon,
    producing a truncated but partially functional protein. (2) Intronic
    silencer elements suppress exon inclusion — in spinal muscular atrophy,
    ISS-N1 in SMN2 intron 7 causes exon 7 skipping and loss of full-length
    SMN protein; nusinersen blocks ISS-N1 to restore exon 7 inclusion. Both
    strategies employ sterically-acting ASOs (no RNase H recruitment) with
    uniformly-modified backbones (2'-MOE or PMO chemistry).
  role: trigger
  biological_processes:
  - preferred_term: RNA splicing
    term:
      id: GO:0008380
      label: RNA splicing
    modifier: DECREASED
  evidence:
  - reference: PMID:38914784
    reference_title: >-
      Mechanisms of Action of the US Food and Drug Administration-Approved
      Antisense Oligonucleotide Drugs.
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      The second MOA is triggered by ASOs that occlude splice acceptor sites
      in pre-mRNAs leading to skipping of a mutation-bearing exon.
    explanation: >-
      Sang et al. 2024 identifies splice-site occlusion as the second FDA-
      approved ASO mechanism, directly describing the aberrant splicing
      context targeted by this paradigm.
  downstream:
  - target: ASO-Directed Splice Redirection
    description: >-
      The ASO occupies a splice regulatory element on the pre-mRNA, physically
      blocking spliceosome access and redirecting exon choice.
    causal_link_type: DIRECT

- name: ASO-Directed Splice Redirection
  description: >-
    A steric-blocking ASO (uniformly modified; no RNase H recruitment) binds
    a splice regulatory element on the pre-mRNA — a splice acceptor, splice
    donor, exonic splicing silencer, or intronic silencing sequence — and
    physically prevents spliceosome recognition. The spliceosome bypasses the
    blocked element, either skipping a mutation-bearing exon (exon-skipping
    paradigm) or including a normally silenced exon (exon-inclusion paradigm).
    Phosphorodiamidate morpholino oligomer (PMO) chemistry, used in the DMD
    exon-skipping ASOs, is uncharged and cell-penetrant without lipid
    formulation, while 2'-MOE chemistry (used in nusinersen) supports
    intrathecal delivery to motor neurons.
  role: effector
  biological_processes:
  - preferred_term: RNA splicing
    term:
      id: GO:0008380
      label: RNA splicing
    modifier: INCREASED
  evidence:
  - reference: PMID:38914784
    reference_title: >-
      Mechanisms of Action of the US Food and Drug Administration-Approved
      Antisense Oligonucleotide Drugs.
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Splice modulating ASOs include nursinersen (for spinal muscular
      atrophy) and eteplirsen, golodirsen, viltolarsen, and casimersen (all
      for the treatment of Duchenne muscular dystrophy).
    explanation: >-
      Sang et al. 2024 lists the FDA-approved splice-modulating ASO drugs,
      directly supporting this node as the splice-redirection effector step
      (the abstract misspells nusinersen as "nursinersen").
  downstream:
  - target: Restored Protein Reading Frame
    description: >-
      Successful splice redirection yields an in-frame mRNA that can be
      translated into a truncated but partially functional protein, or
      restores full-length protein when an inclusion event is achieved.
    causal_link_type: DIRECT

- name: Restored Protein Reading Frame
  description: >-
    Splice redirection produces an mRNA with a corrected reading frame that is
    translated into a truncated but partially functional protein, or in
    inclusion paradigms, into full-length protein. In DMD exon-skipping, the
    resulting Becker-like dystrophin — shorter than wild-type but in-frame —
    partially compensates for the absent full-length protein. In SMA,
    nusinersen-driven SMN2 exon 7 inclusion produces full-length SMN protein
    that rescues motor neuron survival. The degree of clinical benefit scales
    with the amount of functional protein restored and the residual burden of
    out-of-frame or truncated product.
  role: consequence
  biological_processes:
  - preferred_term: translation
    term:
      id: GO:0006412
      label: translation
    modifier: INCREASED

- name: Pathogenic Viral mRNA Translation
  description: >-
    In viral infections where the pathogenic protein is virus-encoded rather
    than host-encoded, an ASO can sterically block translation of the viral
    mRNA without recruiting RNase H. Fomivirsen (Vitravene, FDA-approved 1998,
    withdrawn 2006 due to market factors), the first FDA-approved ASO,
    targeted CMV UL123/IE2 mRNA by steric translation blockade, reducing viral
    immediate-early protein production and halting viral replication in CMV
    retinitis. This paradigm differs from host-gene RNase H knockdown: the
    target is an exogenous transcript whose elimination does not require
    endogenous RNase H, and the therapeutic window relies on viral-sequence
    specificity rather than gene-expression selectivity.
  role: trigger
  biological_processes:
  - preferred_term: viral gene expression
    term:
      id: GO:0019080
      label: viral gene expression
    modifier: INCREASED
  evidence:
  - reference: PMID:38914784
    reference_title: >-
      Mechanisms of Action of the US Food and Drug Administration-Approved
      Antisense Oligonucleotide Drugs.
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      The third MOA involves ASOs that sterically hinder mRNA function,
      often inhibiting translation.
    explanation: >-
      Sang et al. 2024 identifies steric translation blockade as the third
      FDA-approved ASO mechanism, which is the operative paradigm for
      fomivirsen in CMV retinitis. Note: the abstract's RNase H-dependent ASO
      list erroneously includes "fomiversen" (a misspelling of fomivirsen)
      under that paradigm; fomivirsen is a uniformly phosphorothioate
      oligonucleotide without a gapmer deoxy region and cannot recruit RNase
      H, so its steric-blockade classification here is correct despite the
      source paper's inconsistency.
  downstream:
  - target: Steric Viral mRNA Translation Blockade
    description: >-
      The ASO base-pairs with the viral mRNA target site, physically impeding
      ribosome scanning or 48S complex assembly without cleaving the transcript.
    causal_link_type: DIRECT

- name: Steric Viral mRNA Translation Blockade
  description: >-
    The ASO:viral mRNA duplex physically impedes ribosomal access to the
    translation initiation region or coding sequence without recruiting RNase H.
    Because the RNA strand is not cleaved, this mechanism requires sustained
    ASO occupancy at the target site. The steric blockade reduces viral
    immediate-early gene product levels, disrupting the transcriptional
    amplification cascade essential for productive viral replication. This
    paradigm is now largely superseded by RNase H knockdown and small-molecule
    antivirals for most viral targets, but established the proof of concept
    for ASO therapeutics.
  role: effector
  biological_processes:
  - preferred_term: negative regulation of translation
    term:
      id: GO:0017148
      label: negative regulation of translation
    modifier: INCREASED
