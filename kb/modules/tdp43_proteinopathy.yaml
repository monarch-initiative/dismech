name: TDP-43 Proteinopathy Module
description: >-
  A conserved neurodegeneration mechanism module for the TDP-43 proteinopathies —
  the large family of disorders unified by pathological redistribution of the
  nuclear RNA-binding protein TDP-43 (encoded by TARDBP) into cytoplasmic,
  hyper-phosphorylated, ubiquitinated inclusions. Across unrelated primary
  etiologies, TDP-43 is depleted from the nucleus and aggregates in the cytoplasm,
  producing a coupled lesion: a nuclear loss-of-function arm that derepresses
  cryptic exons and corrupts RNA processing of disease-relevant transcripts
  (e.g., STMN2, UNC13A), and a cytoplasmic gain-of-function arm in which
  phosphorylated, ubiquitinated aggregates disturb proteostasis. These convergent
  insults produce region- and cell-type-specific selective neuronal dysfunction
  and loss despite TDP-43 being expressed ubiquitously. Individual disorder
  entries declare conformance via conforms_to on their pathophysiology nodes,
  substituting the disorder-specific upstream trigger (C9orf72 expansion,
  TARDBP/GRN mutation, repetitive head trauma, ageing) and the vulnerable neuronal
  population and brain region while preserving the shared TDP-43 causal chain.
category: Module
creation_date: "2026-06-11T12:00:00Z"
notes: >-
  This is a mechanism module, not a specific disease. Disorder entries reference
  individual nodes via conforms_to (for example,
  "tdp43_proteinopathy#Cytoplasmic TDP-43 Aggregation"). The module is intended
  for the disorders unified by TDP-43 pathology: amyotrophic lateral sclerosis
  (TDP-43 positive in ~97% of cases), frontotemporal lobar degeneration with
  TDP-43 inclusions (FTLD-TDP, including GRN- and C9orf72-associated forms),
  semantic dementia, inclusion body myopathy with Paget disease and
  frontotemporal dementia (IBMPFD), chronic traumatic encephalopathy (where a
  TDP-43 proteinopathy occurs in a subset of cases), and limbic-predominant
  age-related TDP-43 encephalopathy (LATE) / TDP-43 co-pathology in Alzheimer
  disease. It is intentionally distinct from the
  polyglutamine_expansion_proteotoxicity module (translated polyQ tracts) and
  from tauopathy or alpha-synucleinopathy mechanisms: the unifying lesion here is
  the nuclear-to-cytoplasmic redistribution and aggregation of TDP-43 itself.
  SOD1- and FUS-associated ALS are explicit exceptions — they are TDP-43-negative
  and are out of scope for conformance to this module. Whether the principal toxic
  driver is nuclear loss of TDP-43 RNA-processing function or cytoplasmic
  gain-of-function aggregation remains debated and is captured across the
  aggregation and RNA-processing nodes.
pathophysiology:
- name: TDP-43 Nuclear Clearance and Cytoplasmic Mislocalization
  description: >-
    The shared initiating lesion is the redistribution of TDP-43 out of the
    neuronal nucleus, where it normally performs RNA-binding and splicing
    functions, into the cytoplasm. Diverse upstream triggers — TARDBP, GRN, or
    C9orf72 mutations, nuclear-pore-complex dysfunction, ageing, and repetitive
    head trauma — converge on this nuclear depletion and cytoplasmic
    accumulation, which is recoverable specifically from affected CNS regions and
    bridges sporadic and familial disease.
  role: trigger
  genes:
  - preferred_term: TARDBP
    term:
      id: hgnc:11571
      label: TARDBP
  biological_processes:
  - preferred_term: nucleocytoplasmic transport
    term:
      id: GO:0006913
      label: nucleocytoplasmic transport
    modifier: DECREASED
  evidence:
  - reference: PMID:17023659
    reference_title: "Ubiquitinated TDP-43 in frontotemporal lobar degeneration and amyotrophic lateral sclerosis."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      we showed that TDP-43 is the major disease protein in both disorders.
      Pathologic TDP-43 was hyper-phosphorylated, ubiquitinated, and cleaved to
      generate C-terminal fragments and was recovered only from affected central
      nervous system regions, including hippocampus, neocortex, and spinal cord.
    explanation: >-
      The seminal Neumann et al. study establishes the conserved core of the
      module: pathological TDP-43 is the common disease protein across both
      frontotemporal lobar degeneration and ALS, present as hyper-phosphorylated,
      ubiquitinated cytoplasmic species in affected CNS regions.
  - reference: PMID:17023659
    reference_title: "Ubiquitinated TDP-43 in frontotemporal lobar degeneration and amyotrophic lateral sclerosis."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      TDP-43 represents the common pathologic substrate linking these
      neurodegenerative disorders.
    explanation: >-
      Directly supports treating TDP-43 redistribution as a conserved
      cross-disease mechanism rather than an ALS-specific finding.
  - reference: PMID:32799899
    reference_title: "The role of TDP-43 mislocalization in amyotrophic lateral sclerosis."
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      TDP-43 bridges the divide between sporadic and familial ALS and remains a
      dominant protein of interest to understand disease pathogenesis.
    explanation: >-
      Confirms that TDP-43 pathology unifies sporadic and familial disease,
      consistent with a convergent mechanism module driven by multiple upstream
      triggers.
  downstream:
  - target: Cytoplasmic TDP-43 Aggregation
    description: >-
      Cytoplasmic TDP-43 self-associates into phosphorylated, ubiquitinated
      inclusions.
  - target: Nuclear Loss of TDP-43 RNA-Processing Function
    description: >-
      Depletion of nuclear TDP-43 removes repression of cryptic exons and
      corrupts splicing of disease-relevant transcripts.

- name: Cytoplasmic TDP-43 Aggregation
  description: >-
    Mislocalized cytoplasmic TDP-43 is post-translationally modified
    (hyper-phosphorylated, ubiquitinated, C-terminally cleaved) and
    self-associates into insoluble inclusions, the defining histopathological
    hallmark of the TDP-43 proteinopathies. These aggregates burden proteostasis
    and represent the cytoplasmic gain-of-function arm of the coupled lesion.
    Whether the principal toxic species is a soluble mislocalized conformer or a
    mature inclusion remains debated, and visible inclusions may mark a late
    stage of a longer toxic cascade.
  role: central_effector
  cell_types:
  - preferred_term: neuron
    term:
      id: CL:0000540
      label: neuron
  cellular_components:
  - preferred_term: cytoplasmic TDP-43 inclusion
    term:
      id: GO:0016234
      label: inclusion body
  biological_processes:
  - preferred_term: protein folding
    term:
      id: GO:0006457
      label: protein folding
    modifier: DYSREGULATED
  evidence:
  - reference: PMID:32799899
    reference_title: "The role of TDP-43 mislocalization in amyotrophic lateral sclerosis."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      TDP-43 was identified as a primary component of ubiquitinated and
      hyper-phosphorylated cytosolic aggregates observed from post-mortem tissue
      of patients with ALS
    explanation: >-
      Human postmortem evidence identifies cytoplasmic ubiquitinated,
      hyper-phosphorylated TDP-43 aggregates as the central effector lesion.
  - reference: PMID:21074091
    reference_title: "Chronic traumatic encephalopathy: a potential late effect of sport-related concussive and subconcussive head trauma."
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      These changes often include cerebral atrophy, cavum septi pellucidi with
      fenestrations, shrinkage of the mammillary bodies, dense tau immunoreactive
      inclusions (neurofibrillary tangles, glial tangles, and neuropil neurites),
      and, in some cases, a TDP-43 proteinopathy.
    explanation: >-
      Extends the aggregation lesion beyond ALS/FTLD to chronic traumatic
      encephalopathy, where a TDP-43 proteinopathy occurs in a subset of cases —
      supporting the module's conservation across an environmentally triggered
      (repetitive head trauma) disorder.
  downstream:
  - target: Selective Neuronal Dysfunction and Loss
    description: >-
      Cytoplasmic aggregation and proteostatic burden contribute to degeneration
      of vulnerable neuronal populations.

- name: Nuclear Loss of TDP-43 RNA-Processing Function
  description: >-
    Depletion of nuclear TDP-43 removes its repression of nonconserved cryptic
    exons and corrupts splicing and polyadenylation of disease-relevant
    transcripts. Cryptic-exon inclusion in STMN2 lowers stathmin-2 (impairing
    axonal outgrowth and regeneration), and a cryptic exon in UNC13A — linked to
    common ALS/FTD risk variants — reduces UNC13A protein. This nuclear
    loss-of-function arm is the most concrete RNA-processing defect modeled as a
    causal bridge from TDP-43 redistribution toward neuronal death.
  role: amplifier
  cell_types:
  - preferred_term: motor neuron
    term:
      id: CL:0000100
      label: motor neuron
  genes:
  - preferred_term: STMN2
    term:
      id: hgnc:10577
      label: STMN2
  - preferred_term: UNC13A
    term:
      id: hgnc:23150
      label: UNC13A
  biological_processes:
  - preferred_term: RNA splicing
    term:
      id: GO:0008380
      label: RNA splicing
    modifier: ABNORMAL
  - preferred_term: nuclear-transcribed mRNA catabolic process, nonsense-mediated decay
    term:
      id: GO:0000184
      label: nuclear-transcribed mRNA catabolic process, nonsense-mediated decay
    modifier: INCREASED
  evidence:
  - reference: PMID:26250685
    reference_title: "TDP-43 repression of nonconserved cryptic exons is compromised in ALS-FTD."
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: >-
      When TDP-43 was depleted from mouse embryonic stem cells, these cryptic
      exons were spliced into messenger RNAs, often disrupting their translation
      and promoting nonsense-mediated decay.
    explanation: >-
      Establishes the basic cryptic-exon and nonsense-mediated-decay mechanism
      that follows loss of nuclear TDP-43.
  - reference: PMID:26250685
    reference_title: "TDP-43 repression of nonconserved cryptic exons is compromised in ALS-FTD."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      repression of cryptic exons was impaired in ALS-FTD cases, suggesting that
      this splicing defect could potentially underlie TDP-43 proteinopathy.
    explanation: >-
      Human ALS-FTD tissue places impaired cryptic-exon repression within the
      TDP-43 proteinopathy mechanism, generalizing the node across the ALS-FTD
      spectrum.
  - reference: PMID:35197626
    reference_title: "TDP-43 represses cryptic exon inclusion in the FTD-ALS gene UNC13A."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Loss of TDP-43 from the nucleus in human brain, neuronal cell lines and
      motor neurons derived from induced pluripotent stem cells resulted in the
      inclusion of a cryptic exon in UNC13A mRNA and reduced UNC13A protein
      expression.
    explanation: >-
      Connects nuclear TDP-43 loss to a specific disease-relevant RNA target
      (UNC13A) implicated by common ALS/FTD risk variants.
  - reference: PMID:36927019
    reference_title: "Mechanism of STMN2 cryptic splice-polyadenylation and its correction for TDP-43 proteinopathies."
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: >-
      TDP-43 mislocalization results in cryptic splicing and polyadenylation of
      pre-messenger RNAs (pre-mRNAs) encoding stathmin-2 (also known as SCG10), a
      protein that is required for axonal regeneration.
    explanation: >-
      Identifies STMN2 cryptic splice-polyadenylation as a direct consequence of
      TDP-43 mislocalization, linking the loss-of-function arm to axonal repair.
  downstream:
  - target: Selective Neuronal Dysfunction and Loss
    description: >-
      Transcript-specific RNA-processing failures (STMN2, UNC13A, and others)
      compromise axonal maintenance and synaptic function in vulnerable neurons.

- name: Selective Neuronal Dysfunction and Loss
  description: >-
    The convergent effects of cytoplasmic aggregation (proteostatic
    gain-of-function) and nuclear RNA-processing failure (loss-of-function)
    produce the defining outcome of the TDP-43 proteinopathies: region- and
    cell-type-specific neuronal dysfunction and death despite ubiquitous TDP-43
    expression. Each disorder targets a characteristic population — spinal and
    cortical motor neurons in ALS, frontotemporal cortical neurons in FTLD-TDP and
    semantic dementia, and limbic/cortical neurons in CTE and LATE — yielding the
    corresponding motor, behavioral, and cognitive phenotypes.
  role: effector
  cell_types:
  - preferred_term: motor neuron
    term:
      id: CL:0000100
      label: motor neuron
  - preferred_term: neuron
    term:
      id: CL:0000540
      label: neuron
  locations:
  - preferred_term: spinal cord
    term:
      id: UBERON:0002240
      label: spinal cord
  - preferred_term: cerebral cortex
    term:
      id: UBERON:0000956
      label: cerebral cortex
  biological_processes:
  - preferred_term: neuron apoptotic process
    term:
      id: GO:0051402
      label: neuron apoptotic process
    modifier: INCREASED
  evidence:
  - reference: PMID:30643292
    reference_title: "Therapeutic genome editing in a benchmark mouse model of ALS / TDP-43 controls STMN2."
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: >-
      STMN2 loss upon reduced TDP-43 function was due to altered splicing, which
      is functionally important, as we show STMN2 is necessary for normal axonal
      outgrowth and regeneration.
    explanation: >-
      Provides a functional motor-neuron consequence of the TDP-43 loss-of-function
      arm, linking RNA-processing failure to impaired axonal maintenance in the
      vulnerable cell type.
  - reference: PMID:21074091
    reference_title: "Chronic traumatic encephalopathy: a potential late effect of sport-related concussive and subconcussive head trauma."
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      parkinsonism, and, occasionally, motor neuron disease are seen in affected
      individuals.
    explanation: >-
      Documents that TDP-43-associated CTE can present with motor neuron disease
      and parkinsonism, illustrating the cross-disorder phenotypic selectivity
      that this effector node represents.
