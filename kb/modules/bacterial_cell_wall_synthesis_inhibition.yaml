name: Bacterial Cell-Wall Synthesis Inhibition Module
description: >-
  A conserved antibacterial drug-mechanism module representing the bacterial
  peptidoglycan cell-wall biosynthesis pathway that cell-wall-active antibiotics
  target. Across most clinically important bacteria, cytoplasmic and
  membrane-associated enzymes build peptidoglycan precursors and the lipid II
  carrier, glycosyltransferases polymerize the glycan strands, and
  penicillin-binding protein (PBP) transpeptidases cross-link the peptide stems
  into the load-bearing sacculus. Cell-wall-active drugs interrupt distinct steps
  of this conserved pathway: beta-lactams (penicillins, cephalosporins,
  carbapenems, monobactams) acylate the PBP transpeptidase active site;
  glycopeptides (vancomycin, teicoplanin) sequester the D-Ala-D-Ala terminus of
  lipid II; fosfomycin, cycloserine, and bacitracin block precursor and carrier
  steps. Because peptidoglycan is essential and unique to bacteria, its
  inhibition triggers autolysin-mediated lysis and is selectively bactericidal.
  This module defines the mechanism-of-action design pattern for cell-wall-active
  antibiotic treatments: conforming bacterial-disease entries link a treatment to
  the specific node it inhibits via target_mechanisms. It also encodes why drug
  choice is mechanism-dependent — organisms that lack peptidoglycan (e.g.
  Mycoplasma) have no target and are intrinsically resistant, and acquired
  resistance (beta-lactamase, altered PBPs such as PBP2a, D-Ala-D-Lac remodeling)
  protects the pathway from specific agents.
category: Module
creation_date: "2026-06-20T00:00:00Z"
notes: >-
  This is an antibacterial drug-mechanism module, not a specific disease.
  Disorder entries reference individual nodes via conforms_to (e.g.,
  "bacterial_cell_wall_synthesis_inhibition#Peptidoglycan Cross-Linking by
  Penicillin-Binding Proteins"), and their cell-wall-active treatments point at
  the inhibited node via target_mechanisms (analogous to how checkpoint inhibitor
  treatments link to "immune_checkpoint_blockade#Adaptive Immune Resistance").
  Key conformance / treatment target: "Peptidoglycan Cross-Linking by
  Penicillin-Binding Proteins" (the beta-lactam target). The module is
  pathogen-process-centric: nodes are druggable steps in the conserved pathway,
  not individual drugs; a given antibiotic class maps to the step it inhibits.
  The two resistance nodes capture the gating knowledge that distinguishes
  "any cell-wall agent works" from real drug selection — intrinsic target absence
  in cell-wall-deficient organisms, and acquired protection of the pathway.
pathophysiology:
- name: Peptidoglycan Precursor and Lipid II Synthesis
  description: >-
    Cytoplasmic enzymes (MurA-MurF, Alr/Ddl) assemble the UDP-MurNAc-pentapeptide
    precursor terminating in a D-Ala-D-Ala dipeptide, which is transferred to the
    membrane lipid carrier to form lipid I and then lipid II — the universal
    substrate exported across the membrane for polymerization. Several antibiotic
    classes act here rather than at the final cross-linking step: fosfomycin
    inhibits the first committed enzyme MurA, D-cycloserine blocks D-Ala racemase
    and ligase, bacitracin blocks recycling of the lipid carrier, and
    glycopeptides (vancomycin, teicoplanin) bind and sequester the exposed
    D-Ala-D-Ala terminus of lipid II. Because glycopeptides recognize the
    substrate rather than an enzyme, their target can be remodeled to D-Ala-D-Lac
    in resistant enterococci and staphylococci.
  role: trigger
  biological_processes:
  - preferred_term: Peptidoglycan Biosynthetic Process
    term:
      id: GO:0009252
      label: peptidoglycan biosynthetic process
  evidence:
  - reference: PMID:18302341
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: >-
      the antimicrobial activity of other vancosamine-modified glycopeptides
      depends upon both d-Ala-d-Ala stem-terminus recognition (primary binding
      site) and stem-bridge recognition (secondary binding site).
    explanation: >-
      Solid-state NMR study confirming that glycopeptide antibiotics act by
      recognizing the D-Ala-D-Ala stem terminus of the peptidoglycan precursor,
      supporting this lipid II / precursor step as the glycopeptide drug target.
      Evidence source is IN_VITRO as this is a biochemical study of isolated
      cell walls.
  downstream:
  - target: Peptidoglycan Cross-Linking by Penicillin-Binding Proteins
    description: >-
      Polymerized glycan strands assembled from lipid II are cross-linked by
      PBP transpeptidases to form the mature sacculus.

- name: Peptidoglycan Cross-Linking by Penicillin-Binding Proteins
  description: >-
    Glycosyltransferases polymerize the glycan backbone while DD-transpeptidases,
    also called penicillin-binding proteins (PBPs), cross-link the peptide stems
    to give peptidoglycan its load-bearing, mesh-like strength. This
    transpeptidation reaction is the target of beta-lactam antibiotics
    (penicillins, cephalosporins, carbapenems, monobactams), which are
    structural analogues of the D-Ala-D-Ala terminus and covalently acylate the
    PBP transpeptidase active-site serine, irreversibly inactivating it. This is
    the central, most widely exploited node of the module and the canonical
    conformance / treatment target for cell-wall-active therapy. Loss of
    cross-linking weakens the wall during active growth, which is why
    beta-lactams are most effective against dividing bacteria.
  role: therapeutic_vulnerability
  biological_processes:
  - preferred_term: Peptidoglycan-Based Cell Wall Biogenesis
    term:
      id: GO:0009273
      label: peptidoglycan-based cell wall biogenesis
  evidence:
  - reference: PMID:22203377
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Peptidoglycan synthesis requires glycosyltransferases (GTases) to
      polymerize the glycan chains and DD-transpeptidases (DD-TPases) to
      crosslink the peptides
    explanation: >-
      Review establishing that cross-linking of peptide stems by
      DD-transpeptidases (PBPs) is a required step of peptidoglycan synthesis.
      Evidence source is OTHER as this is a review article.
  - reference: PMID:22203377
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      although glycan chain polymerization occurs in the absence of
      transpeptidation (for example, in the presence of penicillin), efficient
      transpeptidation requires ongoing GTase reactions
    explanation: >-
      Directly states that penicillin abolishes transpeptidation (the PBP
      cross-linking reaction), confirming this node as the beta-lactam target.
      Evidence source is OTHER as this is a review article.
  - reference: PMID:18266856
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      This review focuses on the detailed structure of PBPs and their
      implication in peptidoglycan synthesis, maturation and recycling.
    explanation: >-
      Dedicated review of penicillin-binding proteins and their role in
      peptidoglycan biosynthesis, the enzymatic step inhibited by beta-lactams.
      Evidence source is OTHER as this is a review article.
  downstream:
  - target: Cell Envelope Integrity Failure and Bactericidal Autolysis
    description: >-
      When cross-linking is pharmacologically inhibited, the unbalanced action of
      peptidoglycan hydrolases ruptures the sacculus.
  - target: Acquired Resistance and Drug Inactivation
    description: >-
      Bacteria can protect this step from inhibition by destroying the drug or
      altering the target enzyme, escaping cell-wall-active therapy.

- name: Cell Envelope Integrity Failure and Bactericidal Autolysis
  description: >-
    Peptidoglycan is the load-bearing layer that resists internal turgor
    pressure. When its synthesis is inhibited, the bacterium's own peptidoglycan
    hydrolases (autolysins) continue to cleave bonds in the sacculus without
    balanced resynthesis, leading to uncontrolled hydrolysis, rupture of the cell
    envelope, and lysis. Because this depends on active wall turnover, cell-wall
    inhibitors are bactericidal against growing cells and relatively inactive
    against dormant/stationary-phase organisms. The selectivity of this outcome —
    bacteria have peptidoglycan and human cells do not — underlies the high
    therapeutic index of beta-lactams and glycopeptides.
  role: consequence
  biological_processes:
  - preferred_term: Cytolysis
    term:
      id: GO:0019835
      label: cytolysis
  evidence:
  - reference: PMID:22203377
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      On inhibition of peptidoglycan synthesis, uncontrolled hydrolase activity
      results in rupture of the sacculus and cell lysis
    explanation: >-
      Directly states the bactericidal mechanism of cell-wall-active drugs:
      inhibiting peptidoglycan synthesis lets autolysins rupture the sacculus,
      causing lysis. Evidence source is OTHER as this is a review article.

- name: Acquired Resistance and Drug Inactivation
  description: >-
    Bacteria acquire resistance to cell-wall-active agents by three principal
    routes that map onto the steps above: enzymatic inactivation of the drug
    (beta-lactamases hydrolyze the beta-lactam ring before it reaches the PBP),
    modification or protection of the target enzyme (acquisition of a
    low-affinity PBP such as staphylococcal PBP2a, conferring methicillin
    resistance), and remodeling of the drug-binding substrate (replacement of the
    lipid II D-Ala-D-Ala terminus with D-Ala-D-Lac in vancomycin-resistant
    enterococci, abolishing glycopeptide binding). This node explains why a
    nominally "cell-wall-active" antibiotic can fail against a specific organism
    and why agent selection — narrow-spectrum penicillin vs beta-lactamase-stable
    cephalosporin/carbapenem vs anti-MRSA agent — is mechanism-driven.
  role: adaptive_escape
  biological_processes:
  - preferred_term: Response to Antibiotic
    term:
      id: GO:0046677
      label: response to antibiotic
  evidence:
  - reference: PMID:25435309
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      the mechanisms by which bacteria are either intrinsically resistant or
      acquire resistance to antibiotics, including the prevention of access to
      drug targets, changes in the structure and protection of antibiotic targets
      and the direct modification or inactivation of antibiotics.
    explanation: >-
      Review enumerating the resistance mechanisms encoded here — target
      protection/alteration (e.g. PBP2a) and direct drug inactivation (e.g.
      beta-lactamase). Evidence source is OTHER as this is a review article.

- name: Intrinsic Resistance in Cell-Wall-Deficient Organisms
  description: >-
    This module's entire mechanism presupposes a peptidoglycan target. Organisms
    of the class Mollicutes (Mycoplasma, Ureaplasma) lack a cell wall entirely,
    so beta-lactams, glycopeptides, and fosfomycin have no target and are
    intrinsically inactive regardless of dose. This is the clearest example of
    mechanism gating drug choice: such infections must be treated with agents
    acting on other targets (macrolides, tetracyclines, fluoroquinolones).
    Disorder entries for cell-wall-deficient pathogens should NOT declare
    conforms_to against the cross-linking node; this node documents the negative
    case and the reason cell-wall-active therapy is excluded.
  role: intrinsic_resistance
  biological_processes:
  - preferred_term: Response to Antibiotic
    term:
      id: GO:0046677
      label: response to antibiotic
  evidence:
  - reference: PMID:34680797
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      antimicrobial treatment options are limited, partly due to the lack of a
      cell wall in these peculiar bacteria.
    explanation: >-
      Review of mycoplasma antimicrobial resistance stating that the absence of a
      cell wall limits treatment options — i.e. removes the target of
      cell-wall-active antibiotics. Evidence source is OTHER as this is a review
      article.
