name: Osteoarthritis Cartilage Degradation Module
description: >-
  A conserved articular pathophysiology module representing the final common
  pathway of cartilage breakdown in osteoarthritis (HP:0002758, MONDO:0005178).
  Diverse initiating insults — abnormal mechanical overload or acute joint injury
  in primary/idiopathic and post-traumatic OA, and ECM or signaling variants in
  genetic OA — converge on chondrocyte stress, a catabolic/hypertrophic
  chondrocyte phenotype driven by proinflammatory cytokine signaling (IL-1beta,
  TNF), and upregulation of matrix-degrading enzymes (MMP-13, ADAMTS-5) that
  cleave type II collagen and aggrecan. Progressive matrix loss couples to
  subchondral bone remodeling, sclerosis, and osteophyte formation, producing
  joint cartilage degradation with pain and functional impairment. Individual
  disorder entries declare conformance via conforms_to on their pathophysiology
  nodes, substituting joint-specific or disorder-specific upstream lesions while
  preserving the conserved chondrocyte-to-matrix-degradation causal chain.
category: Module
creation_date: "2026-06-06T00:00:00Z"
notes: >-
  This is a mechanism module, not a specific disease. Disorder entries reference
  individual nodes via conforms_to (e.g.,
  "osteoarthritis_cartilage_degradation#Matrix-Degrading Enzyme Upregulation").
  The module defines the expected pathophysiology structure; conforming nodes in
  disorder files should include the corresponding chondrocyte cell type,
  biological processes, and causal edges, specialized to their context. Key
  substitutions: post-traumatic OA substitutes a discrete joint-injury trigger
  (ligament/meniscal injury) for the chronic-overload trigger; genetic OA
  (e.g., type II collagenopathies, ACAN/aggrecan defects) substitutes the
  primary ECM/structural lesion upstream of chondrocyte stress while preserving
  the downstream matrix-degradation chain.
pathophysiology:
- name: Mechanical Overload and Chondrocyte Stress
  description: >-
    Abnormal mechanical loading or acute joint injury imposes excessive stress
    on articular chondrocytes, the sole resident cell of cartilage. Across
    primary/idiopathic, post-traumatic, and genetic OA the initiating insult
    varies (chronic malalignment or obesity-related overload, discrete
    ligament/meniscal trauma, or an intrinsic ECM/structural weakness), but the
    response converges on a chondrocyte stress program that initiates the
    catabolic cascade and primes the cell for apoptosis and matrix degradation.
  role: trigger
  cell_types:
  - preferred_term: articular chondrocyte
    term:
      id: CL:0000138
      label: chondrocyte
  biological_processes:
  - preferred_term: response to mechanical stimulus
    term:
      id: GO:0009612
      label: response to mechanical stimulus
    modifier: INCREASED
  - preferred_term: cellular response to stress
    term:
      id: GO:0033554
      label: cellular response to stress
    modifier: INCREASED
  evidence:
  - reference: PMID:33459826
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      This review highlights the molecular mechanisms of mechanical loading in
      inducing chondrocyte apoptosis and extracellular matrix degradation.
    explanation: >-
      Establishes mechanical loading as the initiating insult that drives
      chondrocyte stress/apoptosis and downstream matrix degradation. Evidence
      source is OTHER because this is a review synthesizing multiple study types.
  - reference: PMID:33459826
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Abnormal mechanical loading activates the interleukin-1β, tumour necrosis
      factor-α, nuclear factor kappa-B, Wnt, transforming growth factor-β,
      microRNAs pathways, and the oxidative stress pathway.
    explanation: >-
      Links the mechanical trigger to the proinflammatory cytokine signaling
      (IL-1beta, TNF-alpha, NF-kB) that defines the downstream amplifier node.
      Evidence source is OTHER because this is a review.
  downstream:
  - target: Catabolic Chondrocyte Phenotype and Cytokine Signaling

- name: Catabolic Chondrocyte Phenotype and Cytokine Signaling
  description: >-
    Stressed chondrocytes shift from a quiescent matrix-maintaining phenotype to
    a catabolic, hypertrophic-like state. Proinflammatory cytokines, principally
    IL-1beta and TNF, are produced within the joint (by chondrocytes and by
    synovial macrophages) and act in autocrine and paracrine loops to sustain a
    low-grade inflammatory environment. This cytokine signaling reprograms
    chondrocyte gene expression toward catabolism, suppressing anabolic matrix
    synthesis and inducing the matrix-degrading enzymes that execute cartilage
    breakdown.
  role: amplifier
  cell_types:
  - preferred_term: articular chondrocyte
    term:
      id: CL:0000138
      label: chondrocyte
  biological_processes:
  - preferred_term: inflammatory response
    term:
      id: GO:0006954
      label: inflammatory response
    modifier: INCREASED
  - preferred_term: chondrocyte differentiation (hypertrophic shift)
    term:
      id: GO:0002062
      label: chondrocyte differentiation
    modifier: DYSREGULATED
  evidence:
  - reference: PMID:31982565
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      OA is now well accepted as a low-grade inflammatory disease affecting the
      whole joint.
    explanation: >-
      Establishes the low-grade inflammatory state of the joint as a core
      feature of OA. Evidence source is OTHER because this is a review article.
  - reference: PMID:31982565
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      paracrine interactions between macrophages and chondrocytes play a vital
      role in the initiation and development of OA by secreting inflammatory
      cytokines, growth factors, matrix metalloproteinases (MMPs) and tissue
      inhibitor of metalloproteinases (TIMPs), which lead to subsequent
      cartilage degradation and destruction.
    explanation: >-
      Directly links cytokine and MMP secretion in the joint to subsequent
      cartilage degradation, bridging the inflammatory amplifier to the
      enzyme-upregulation effector. Evidence source is OTHER (review).
  - reference: PMID:36721094
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: >-
      IPA significantly inhibited the IL-1β-induced expression of inflammatory
      factors (Nitric oxide, PGE2, TNF-α, IL-6, iNOS and COX-2) and
      matrix-degrading enzymes (MMP-3, MMP-13 and ADAMTS-5)
    explanation: >-
      Cell-based data show that IL-1beta induces both inflammatory mediators and
      the matrix-degrading enzymes MMP-13 and ADAMTS-5 in chondrocytes,
      demonstrating the cytokine-to-catabolism link of this node.
  downstream:
  - target: Matrix-Degrading Enzyme Upregulation

- name: Matrix-Degrading Enzyme Upregulation
  description: >-
    Catabolic chondrocyte signaling upregulates the key matrix-degrading
    enzymes of OA: the collagenase MMP-13, which cleaves the type II collagen
    fibrillar network, and the aggrecanase ADAMTS-5, which cleaves aggrecan.
    Aggrecan loss is an early event that exposes the collagen network to
    enzymatic and mechanical attack; collagen degradation that follows is
    essentially irreversible. This proteolytic step is the central effector that
    converts chondrocyte catabolism into structural matrix destruction.
  role: central_effector
  cell_types:
  - preferred_term: articular chondrocyte
    term:
      id: CL:0000138
      label: chondrocyte
  biological_processes:
  - preferred_term: collagen catabolic process
    term:
      id: GO:0030574
      label: collagen catabolic process
    modifier: INCREASED
  - preferred_term: extracellular matrix disassembly
    term:
      id: GO:0022617
      label: extracellular matrix disassembly
    modifier: INCREASED
  - preferred_term: proteoglycan (aggrecan) catabolic process
    term:
      id: GO:0030167
      label: proteoglycan catabolic process
    modifier: INCREASED
  evidence:
  - reference: PMID:21777704
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Studies on transgenic mice have confirmed the central role of Adamalysin
      with Thrombospondin Motifs 5 (ADAMTS-5) in aggrecan degradation, and the
      collagenolytic matrix metalloproteinase MMP-13 in collagen degradation.
    explanation: >-
      Identifies ADAMTS-5 and MMP-13 as the central enzymes degrading aggrecan
      and type II collagen, the defining effectors of this node. Evidence source
      is OTHER because this is a review article.
  - reference: PMID:31372032
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      An important manifestation of OA is the enhanced production of
      matrix-degrading enzymes matrix metalloproteinase-13 (MMP-13)
    explanation: >-
      States that enhanced production of MMP-13 is a key manifestation of OA,
      supporting the enzyme-upregulation effector. Evidence source is OTHER
      because this is the introductory review portion of the article.
  downstream:
  - target: Cartilage Matrix Loss and Subchondral Bone Remodeling

- name: Cartilage Matrix Loss and Subchondral Bone Remodeling
  description: >-
    Sustained proteolysis produces progressive loss of the cartilage matrix as
    aggrecan and collagen are depleted faster than they can be replaced. Loss of
    the load-bearing matrix alters joint mechanics and couples to the
    subchondral bone, which undergoes increased turnover, plate sclerosis, and
    osteophyte (new bone and cartilage) formation at the joint margins. These
    cartilage and bone changes are mechanically and biochemically coupled and
    together remodel the whole-joint architecture.
  role: effector
  biological_processes:
  - preferred_term: extracellular matrix disassembly
    term:
      id: GO:0022617
      label: extracellular matrix disassembly
    modifier: INCREASED
  - preferred_term: bone remodeling
    term:
      id: GO:0046849
      label: bone remodeling
    modifier: INCREASED
  - preferred_term: ossification (osteophyte formation)
    term:
      id: GO:0001503
      label: ossification
    modifier: INCREASED
  evidence:
  - reference: PMID:31372032
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      OA is the outcome of the progressive loss of aggrecan from cartilage,
      which results in both exposure of the collagen matrix and its
      disintegration by metalloproteases.
    explanation: >-
      Describes progressive aggrecan loss and consequent collagen matrix
      disintegration as the structural outcome of the proteolytic effector.
      Evidence source is OTHER (introductory review portion of the article).
  - reference: PMID:24285494
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Ample evidence has been found for bone changes during progression of OA
      including, but not limited to, increased turnover in the subchondral
      bone, undermineralisation of the trabecular structure, osteophyte
      formation, bone marrow lesions and sclerosis of the subchondral plate.
    explanation: >-
      Directly documents subchondral bone remodeling, osteophyte formation, and
      sclerosis as coupled bone changes during OA progression. Evidence source
      is OTHER because this is a review article.
  - reference: PMID:21777704
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      OA is characterised by changes in the anatomy of load-bearing joints that
      lead to degradation of articular cartilage, inflammation of the synovium
      (synovitis), changes to subchondral bone and growth of new bone and
      cartilage (osteophytes) at the joint edge
    explanation: >-
      Lists cartilage degradation, subchondral bone changes, and osteophyte
      growth as the conserved structural hallmarks of OA. Evidence source is
      OTHER (review).
  downstream:
  - target: Joint Cartilage Degradation with Pain and Functional Impairment

- name: Joint Cartilage Degradation with Pain and Functional Impairment
  description: >-
    The convergent endpoint is osteoarthritis itself: degradation of articular
    cartilage with whole-joint structural change producing chronic joint pain,
    stiffness, and progressive functional impairment and disability. OA pain is
    nociceptive but increasingly recognized as a complex condition involving
    local inflammation across joint structures and peripheral/central
    sensitization, and it is the dominant cause of the disability and
    socioeconomic burden of the disease.
  role: consequence
  evidence:
  - reference: PMID:28889010
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Pain is an ubiquitous symptom in osteoarticular diseases, occurring much
      more commonly than stiffness or disability.
    explanation: >-
      Establishes pain as the defining clinical symptom of the OA endpoint.
      Evidence source is OTHER because this is a review article.
  - reference: PMID:28889010
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      creating a huge burden related to disability and health care costs
    explanation: >-
      Documents the disability and healthcare burden that defines the functional
      impairment of the OA consequence node. Evidence source is OTHER (review).
  - reference: PMID:24285494
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Osteoarthritis (OA) is the most common form of arthritic disease, and a
      major cause of disability and impaired quality of life in the elderly.
    explanation: >-
      Frames OA as a leading cause of disability and impaired quality of life,
      the clinical consequence of the cartilage-degradation cascade. Evidence
      source is OTHER (review).
