name: MPS Glycosaminoglycan Storage Module
description: >-
  A conserved mechanism module for the mucopolysaccharidoses (MPS) that refines
  the generic lysosomal_substrate_accumulation trunk for the specific case of
  glycosaminoglycan (GAG) storage. A deficient GAG-degrading hydrolase or
  sulfatase leaves a specific GAG undegraded, and the chemical identity of that
  stored GAG — not the gene and not the clinical eponym — determines which
  tissues are affected and therefore which downstream pathological arm is
  engaged. The module is organized as a single GAG-accumulation hub that branches
  into three mechanistically distinct, independently reusable arms:

  (1) a HEPARAN SULFATE-driven NEURONOPATHIC arm (undegraded heparan sulfate is a
  Toll-like-receptor-4 agonist that drives microglial neuroinflammation, secondary
  ganglioside accumulation and synaptic loss, and progressive central
  neurodegeneration);

  (2) a DERMATAN SULFATE-driven SOMATIC / CONNECTIVE-TISSUE arm (storage in
  fibroblasts and extracellular matrix of bone, heart valve, cornea and viscera
  producing dysostosis multiplex, valvular disease, corneal clouding,
  organomegaly and airway infiltration); and

  (3) a KERATAN SULFATE-driven SKELETAL-DYSPLASIA arm (storage in chondrocytes
  impairing endochondral ossification, producing skeletal dysplasia and
  mechanical craniovertebral instability WITHOUT primary neurodegeneration).

  Each MPS biochemical type is generated by choosing the subset of arms that its
  stored-GAG profile switches on: MPS III (heparan sulfate only) engages the
  neuronopathic arm; MPS IV (keratan sulfate) engages the skeletal arm; MPS VI
  (dermatan sulfate only) engages the somatic arm; and MPS I, II and VII
  (dermatan + heparan sulfate) engage both the neuronopathic and somatic arms.
  Conforming disorder nodes substitute the disorder-specific deficient enzyme and
  stored GAG while preserving the arm structure.
category: Module
creation_date: "2026-06-12T00:00:00Z"
notes: >-
  This is a mechanism module, not a specific disease. It sits downstream of, and
  specializes, the lysosomal_substrate_accumulation module: the hub node
  "Lysosomal GAG Accumulation" is the GAG-specific instance of
  "lysosomal_substrate_accumulation#Lysosomal Substrate Accumulation". Disorder
  entries reference individual nodes via conforms_to (e.g.,
  "mps_gag_storage#Heparan Sulfate-Driven Neuroinflammation" for a neuronopathic
  type, or "mps_gag_storage#Chondrocyte Keratan Sulfate Storage and Impaired
  Endochondral Ossification" for Morquio). The coherence rule the module encodes
  is that an MPS type switches whole arms ON or OFF according to its stored-GAG
  profile but never assigns contradictory modifiers within an arm; this is why
  lumping all MPS into one graph is incoherent (the central-neurodegeneration
  node would have to be both present and absent) and why splitting per gene is
  redundant (MPS IIIA-D, or IVA-B, share an identical arm set). Evidence is drawn
  from MPS reviews and primary studies documenting the GAG-specific arms;
  evidence_source is OTHER for cross-MPS reviews, MODEL_ORGANISM for the MPS III
  mouse-model studies, and IN_VITRO for the cultured neuron synaptic study. Key
  conformance targets: the hub "Lysosomal GAG Accumulation" and the three
  arm-entry nodes named above.
pathophysiology:

# ---------------------------------------------------------------------------
# HUB
# ---------------------------------------------------------------------------
- name: Lysosomal GAG Accumulation
  description: >-
    Deficiency of a specific GAG-degrading lysosomal enzyme leaves a partially
    degraded glycosaminoglycan undegraded, so it accumulates within the lysosome.
    This is the GAG-specific instance of the central lysosomal-storage effector,
    and it is the branch point of the module: the chemical identity of the stored
    GAG (heparan sulfate, dermatan sulfate, or keratan sulfate) determines which
    cell types store substrate and therefore which downstream arm is engaged.
    Undegraded GAG is not inert — it acts as a danger signal that engages the
    Toll-like receptor 4 innate-immune pathway, providing the molecular link from
    storage to the inflammatory and neuroinflammatory effectors of the arms below.
  role: central_effector
  evidence:
  - reference: PMID:35216110
    supports: SUPPORT
    evidence_source: OTHER
    snippet: "Mucopolysaccharidoses are rare paediatric lysosomal storage disorders, characterised by accumulation of glycosaminoglycans within lysosomes"
    explanation: >-
      Defines intralysosomal GAG accumulation as the characterizing event of the
      mucopolysaccharidoses, the central effector and branch hub of this module.
      Evidence source is OTHER because this is a cross-MPS review.
  - reference: PMID:35216110
    supports: SUPPORT
    evidence_source: OTHER
    snippet: "We propose a model whereby progressive accumulation of glycosaminoglycans elicits an innate immune response, initiated by the Toll-like receptor 4 pathway"
    explanation: >-
      Provides the molecular mechanism linking GAG storage to the downstream
      inflammatory and neuroinflammatory arms: undegraded GAG engages the
      Toll-like receptor 4 innate-immune pathway. Evidence source is OTHER
      because this is a review proposing a cross-MPS model.
  downstream:
  - target: Heparan Sulfate-Driven Neuroinflammation
    description: >-
      When heparan sulfate is the stored GAG (MPS I, II, III, VII), it
      accumulates in neurons and microglia and engages the neuronopathic arm.
  - target: Dermatan Sulfate-Driven Connective-Tissue and ECM Storage
    description: >-
      When dermatan sulfate is the stored GAG (MPS I, II, VI, VII), it
      accumulates in connective-tissue fibroblasts and ECM and engages the
      somatic arm.
  - target: Chondrocyte Keratan Sulfate Storage and Impaired Endochondral Ossification
    description: >-
      When keratan sulfate is the stored GAG (MPS IV), it accumulates in
      chondrocytes and engages the skeletal-dysplasia arm.

# ---------------------------------------------------------------------------
# ARM N — HEPARAN SULFATE / NEURONOPATHIC
# ---------------------------------------------------------------------------
- name: Heparan Sulfate-Driven Neuroinflammation
  description: >-
    Undegraded heparan sulfate accumulates in neurons and microglia and triggers
    a neuroinflammatory cascade. This arm is engaged only by heparan
    sulfate-storing types; it is the entry node of the neuronopathic arm and the
    mechanistic reason heparan sulfate accumulation, uniquely among the GAGs,
    produces central nervous system disease.
  role: effector
  cell_types:
  - preferred_term: neuron
    term:
      id: CL:0000540
      label: neuron
  - preferred_term: microglial cell
    term:
      id: CL:0000129
      label: microglial cell
  biological_processes:
  - preferred_term: neuroinflammatory response
    term:
      id: GO:0150076
      label: neuroinflammatory response
    modifier: INCREASED
  evidence:
  - reference: PMID:36306823
    supports: SUPPORT
    evidence_source: MODEL_ORGANISM
    snippet: "Enzyme deficiency results in accumulation of partially degraded HS within lysosomes throughout the body, leading to a progressive severe neurological disease."
    explanation: >-
      Establishes that heparan sulfate (HS) accumulation specifically produces
      progressive neurological disease, defining the neuronopathic arm. Evidence
      source is MODEL_ORGANISM because this paper reports an MPS IIIA mouse model
      study.
  - reference: PMID:37794029
    supports: SUPPORT
    evidence_source: MODEL_ORGANISM
    snippet: "The lack of functional enzyme in MPS IIIB patients leads to the progressive accumulation of heparan sulfate throughout the body and triggers a cascade of neuroinflammatory and other biochemical processes ultimately resulting in severe mental impairment and early death in adolescence or young adulthood."
    explanation: >-
      Documents the conserved heparan-sulfate -> neuroinflammatory cascade ->
      mental impairment progression of the neuronopathic arm. Evidence source is
      MODEL_ORGANISM because this paper reports an MPS IIIB mouse model study.
  - reference: PMID:35216110
    supports: SUPPORT
    evidence_source: OTHER
    snippet: "We propose a model whereby progressive accumulation of glycosaminoglycans elicits an innate immune response, initiated by the Toll-like receptor 4 pathway"
    explanation: >-
      Cross-MPS human review providing non-model-organism support for the
      heparan-sulfate -> innate-immune/neuroinflammation link, so the
      neuroinflammation node is not supported by animal-model evidence alone.
      Evidence source is OTHER because this is a review synthesizing data across
      the mucopolysaccharidoses.
  downstream:
  - target: Synaptic Dysfunction and Secondary Storage
    description: >-
      Neuroinflammation and accumulating heparan-sulfate oligosaccharides disrupt
      synaptic components and drive secondary metabolite storage.

- name: Synaptic Dysfunction and Secondary Storage
  description: >-
    Heparan-sulfate oligosaccharides and the neuroinflammatory milieu disrupt
    synaptic vesicle proteins and synaptic signalling, and drive secondary
    accumulation of gangliosides (GM2/GM3) in neurons. This amplifies primary
    storage into functional neuronal failure.
  role: amplifier
  biological_processes:
  - preferred_term: synaptic signaling
    term:
      id: GO:0099536
      label: synaptic signaling
    modifier: DECREASED
  evidence:
  - reference: PMID:19386237
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: "Clearance of heparan sulfate oligosaccharides in cultured embryonic MPSIIIB cortical neurons or treatment with proteasome inhibitors restored normal synaptophysin levels indicating that heparan sulfate oligosaccharides activate the degradation of synaptophysin by the proteasome with consequences on synaptic vesicle components that are relevant to clinical manifestations."
    explanation: >-
      Shows mechanistically that heparan sulfate oligosaccharides drive
      degradation of the synaptic vesicle protein synaptophysin, linking storage
      to synaptic dysfunction. Evidence source is IN_VITRO because this is a
      cultured cortical neuron study.
  downstream:
  - target: Progressive Central Neurodegeneration
    description: >-
      Sustained neuroinflammation and synaptic failure culminate in progressive
      neuronal loss.

- name: Progressive Central Neurodegeneration
  description: >-
    Sustained heparan-sulfate storage, neuroinflammation and synaptic failure
    produce progressive neuronal loss, presenting clinically as developmental
    regression, intellectual disability and dementia. This is the terminal node
    of the neuronopathic arm and is absent in types that do not store heparan
    sulfate (MPS IV, VI, IX).
  role: consequence
  evidence:
  - reference: PMID:22008915
    supports: SUPPORT
    evidence_source: MODEL_ORGANISM
    snippet: "Mucopolysaccharidosis type IIIA (MPSIIIA) is an inherited lysosomal storage disease caused by deficiency of sulfamidase, resulting in accumulation of the glycosaminoglycan (GAG) heparan sulfate. It is characterized by severe progressive neurodegeneration, together with somatic alterations, which lead to death during adolescence."
    explanation: >-
      Confirms that heparan sulfate accumulation produces severe progressive
      neurodegeneration (with only minor somatic involvement), the terminal node
      of the neuronopathic arm and the neuronopathic pole of the MPS spectrum.
      Evidence source is MODEL_ORGANISM because this paper reports an MPS IIIA
      mouse model study.
  - reference: PMID:35216110
    supports: SUPPORT
    evidence_source: OTHER
    snippet: "progressive build-up of sugars may lead to musculoskeletal abnormalities and multi-organ failure, and in others, to cognitive decline"
    explanation: >-
      Cross-MPS human review providing non-model-organism support for
      progressive cognitive decline, so the neurodegeneration node is not
      supported by animal-model evidence alone. Evidence source is OTHER because
      this is a review synthesizing data across the mucopolysaccharidoses.

# ---------------------------------------------------------------------------
# ARM S — DERMATAN SULFATE / SOMATIC, CONNECTIVE-TISSUE
# ---------------------------------------------------------------------------
- name: Dermatan Sulfate-Driven Connective-Tissue and ECM Storage
  description: >-
    Undegraded dermatan sulfate accumulates in connective-tissue fibroblasts and
    the extracellular matrix of bone, heart valve, cornea and viscera. This is
    the entry node of the somatic arm and produces the connective-tissue
    phenotype shared by the somatic MPS types: dysostosis multiplex, valvular
    thickening, corneal clouding and hepatosplenomegaly. It is engaged by
    dermatan sulfate-storing types and does not by itself produce central
    neurodegeneration.
  role: effector
  cell_types:
  - preferred_term: fibroblast
    term:
      id: CL:0000057
      label: fibroblast
  biological_processes:
  - preferred_term: extracellular matrix organization
    term:
      id: GO:0030198
      label: extracellular matrix organization
    modifier: DYSREGULATED
  evidence:
  - reference: PMID:32780955
    supports: SUPPORT
    evidence_source: OTHER
    snippet: "A prominent clinical manifestation of MPS-IH is dysostosis multiplex, a constellation of skeletal abnormalities."
    explanation: >-
      Documents dysostosis multiplex, the hallmark connective-tissue/skeletal
      output of dermatan-sulfate storage, defining the somatic arm. Evidence
      source is OTHER because this is an MPS I review.
  - reference: PMID:25346323
    supports: SUPPORT
    evidence_source: OTHER
    snippet: "due to the accumulation of storage material in tissues and organs, leading to cellular dysfunction, they progressively develop profound skeletal and joint abnormalities"
    explanation: >-
      Links tissue/organ storage to progressive skeletal and joint disease, the
      conserved somatic-arm progression. Evidence source is OTHER because this is
      a review.
  downstream:
  - target: Multisystem Somatic Disease
    description: >-
      Progressive connective-tissue and ECM storage culminates in multi-organ
      and airway disease.

- name: Multisystem Somatic Disease
  description: >-
    Accumulated connective-tissue and ECM storage produces progressive
    multisystem somatic disease: musculoskeletal abnormalities, cardiac valve and
    respiratory/airway disease, and organomegaly. This is the terminal node of
    the somatic arm.
  role: consequence
  evidence:
  - reference: PMID:35216110
    supports: SUPPORT
    evidence_source: OTHER
    snippet: "progressive build-up of sugars may lead to musculoskeletal abnormalities and multi-organ failure, and in others, to cognitive decline"
    explanation: >-
      Documents progression of GAG storage to musculoskeletal and multi-organ
      disease, the terminal node of the somatic arm. Evidence source is OTHER
      because this is a cross-MPS review.

# ---------------------------------------------------------------------------
# ARM K — KERATAN SULFATE / SKELETAL DYSPLASIA
# ---------------------------------------------------------------------------
- name: Chondrocyte Keratan Sulfate Storage and Impaired Endochondral Ossification
  description: >-
    Undegraded keratan sulfate (with chondroitin-6-sulfate) accumulates
    preferentially in chondrocytes and cartilage extracellular matrix, impairing
    endochondral ossification and chondrogenesis. This is the entry node of the
    skeletal-dysplasia arm, engaged specifically by keratan sulfate-storing types
    (MPS IV / Morquio). Critically, this arm produces a different storage cell and
    a different outlet from the somatic arm and carries no primary
    neurodegeneration.
  role: effector
  cell_types:
  - preferred_term: chondrocyte
    term:
      id: CL:0000138
      label: chondrocyte
  biological_processes:
  - preferred_term: endochondral ossification
    term:
      id: GO:0001958
      label: endochondral ossification
    modifier: DECREASED
  evidence:
  - reference: PMID:32905071
    supports: SUPPORT
    evidence_source: OTHER
    snippet: "Consequently, partially degraded GAG, chondroitin 6-sulfate (CS) and keratan sulfate (KS), accumulate in the lysosomes of affected cells, primarily in cartilage resulting in skeletal disease."
    explanation: >-
      Establishes that keratan sulfate storage is restricted primarily to
      cartilage and produces skeletal rather than neuronopathic disease, defining
      the skeletal-dysplasia arm. Evidence source is OTHER because this is an
      MPS IVA review.
  - reference: PMID:29326877
    supports: SUPPORT
    evidence_source: OTHER
    snippet: "As a result, partially degraded GAGs accumulate in bone, ligaments, and cartilage, as well as the extracellular matrix (ECM) of these tissues, impeding endochondral ossification and chondrogenesis"
    explanation: >-
      Documents the specific mechanism of the skeletal arm: cartilage/ECM GAG
      storage impeding endochondral ossification and chondrogenesis. Evidence
      source is OTHER because this is an MPS IVA review.
  downstream:
  - target: Skeletal Dysplasia and Craniovertebral Instability
    description: >-
      Impaired endochondral ossification produces a generalized skeletal
      dysplasia with mechanical craniovertebral instability.

- name: Skeletal Dysplasia and Craniovertebral Instability
  description: >-
    Impaired endochondral ossification produces a generalized skeletal dysplasia
    (disproportionate short stature, kyphoscoliosis, pectus carinatum, genu
    valgum, joint laxity) and odontoid hypoplasia with C1-C2 craniovertebral
    instability. Resulting cervical cord compression is mechanical and secondary,
    not a primary storage neurodegeneration — distinguishing this arm's
    neurological signs from the neuronopathic arm. This is the terminal node of
    the skeletal-dysplasia arm.
  role: consequence
  evidence:
  - reference: PMID:29326877
    supports: SUPPORT
    evidence_source: OTHER
    snippet: "The accumulation of these GAGs leads to distinguishing features as skeletal dysplasia with disproportionate dwarfism, short neck, kyphoscoliosis, pectus carinatum, tracheal obstruction, coxa valga, genu valgum, and joint laxity."
    explanation: >-
      Documents the skeletal-dysplasia phenotype that is the terminal output of
      the keratan-sulfate arm. Evidence source is OTHER because this is an MPS IVA
      review.
  - reference: PMID:29326877
    supports: SUPPORT
    evidence_source: OTHER
    snippet: "Examination of the tissues demonstrated systemic storage materials in multiple tissues, as well as severely ballooned and vacuolated chondrocytes in the trachea, humerus, knee cartilage, and lung bronchus."
    explanation: >-
      Confirms that the storage cell of this arm is the chondrocyte (ballooned
      and vacuolated), grounding the cell-type substitution. Evidence source is
      OTHER because this is an MPS IVA review.
