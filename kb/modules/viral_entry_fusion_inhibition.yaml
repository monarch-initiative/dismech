    explanation: >-
      Confirms that approved entry inhibitors act at distinct steps of this node
      — maraviroc at the CCR5 co-receptor and enfuvirtide at gp41-mediated
      fusion. Evidence source is OTHER as this is a review article.
  - reference: PMID:38734383
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Bulevirtide (BLV), a first-in-class entry inhibitor, is
    explanation: >-
      Phase III clinical trial identifying bulevirtide as a first-in-class entry
      inhibitor (it blocks HBV/HDV docking at the NTCP receptor), establishing
      the receptor-blocking arm of this node. Evidence source is HUMAN_CLINICAL
