  downstream:
  - target: Block of Viral Entry into Host Cells
    description: >-
      Pharmacological inhibition of attachment, co-receptor engagement, or
      fusion prevents the virus from reaching the host-cell cytoplasm.
  - target: Tropism and Entry-Inhibitor Resistance Gating
    description: >-
      Viral tropism and receptor usage determine whether the targeted entry step
      exists; a tropism switch or envelope mutation escapes the inhibitor.

- name: Block of Viral Entry into Host Cells
  description: >-
    When an entry inhibitor engages its step of the entry program, the virus is
    prevented from completing fusion and delivering its genome into the
    cytoplasm, so productive infection of the target cell is aborted before any
    intracellular replication step. A co-receptor antagonist that occupies CCR5
    prevents the gp120-co-receptor interaction; a fusion inhibitor that binds
    gp41 prevents the six-helix-bundle conformational change required for
    membrane merger; an NTCP-blocking peptide prevents hepatocyte docking. This
    is the effector node of the module — the antiviral consequence of engaging
    an entry target — and it sits upstream of, and independent from, every
    cytoplasmic drug target (polymerase, protease, integrase), which is why entry
    inhibitors combine with replication inhibitors without overlapping targets.
  role: consequence
  biological_processes:
  - preferred_term: symbiont entry into host cell
    term:
      id: GO:0046718
      label: symbiont entry into host cell
  evidence:
  - reference: PMID:21595497
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      antagonists that prevent the entry of human immunodeficiency virus (HIV)
      into host CD4+ T cells by blocking the CCR5 co-receptor
    explanation: >-
      States the effector outcome of this node for a co-receptor antagonist —
      blocking CCR5 prevents HIV entry into host CD4+ T cells. Evidence source is
      OTHER as this is a review article.
  - reference: PMID:23541872
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      disrupts conformational changes in gp41 that drive membrane fusion
    explanation: >-
      Confirms that the fusion inhibitor enfuvirtide blocks the gp41
      conformational change driving membrane fusion, the step whose inhibition
      aborts entry. Evidence source is OTHER as this is a review article.

- name: Tropism and Entry-Inhibitor Resistance Gating
  description: >-
    Entry inhibition is the most narrowly gated antiviral strategy because the
    target is defined by viral tropism and receptor usage rather than a conserved
    enzyme. The clearest example is the HIV co-receptor antagonist maraviroc: it
    is active only against CCR5-tropic (R5) virus, so a viral population that
    uses or switches to the CXCR4 co-receptor (X4 tropism) is intrinsically
    unaffected, and a pre-treatment tropism assay is mandatory because a large
    fraction of treatment-experienced patients harbor CXCR4-using virus. Beyond
    tropism, resistance can arise from mutations in the V3 loop of the gp120
    envelope that allow the virus to use the drug-bound co-receptor or shift
    co-receptor preference. This node encodes the gating knowledge that
    distinguishes "an entry inhibitor exists" from real drug selection: tropism
    determines whether the drug has any target at all, and escape can occur
    without any change in the cytoplasmic replication machinery. Conforming
    entries can attach a treatment's tropism-restriction or failure mode to this
    node.
  role: adaptive_escape
  biological_processes:
  - preferred_term: symbiont entry into host cell
    term:
      id: GO:0046718
      label: symbiont entry into host cell
  evidence:
  - reference: PMID:21595497
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Resistance to maraviroc is low and mainly related to the presence of
      chemokine (C-X-C motif) receptor 4 (CXCR4) tropism HIV-1-infections or to
      mutations in the V3 region of glycoprotein (gp) 120
    explanation: >-
      Directly states the tropism- and envelope-mutation-based escape encoded by
      this node — maraviroc resistance is driven by CXCR4-tropic virus and gp120
      V3 mutations. Evidence source is OTHER as this is a review article.
  - reference: PMID:19336831
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      As 50% or more of treatment-experienced patients may be infected with
      CXCR4-tropic virus, a tropism assay should be performed before initiating
      maraviroc therapy.
    explanation: >-
      Confirms the tropism-gating principle: maraviroc is restricted to
      CCR5-tropic HIV, so a tropism assay is required because many patients carry
      CXCR4-tropic virus that the drug cannot reach. Evidence source is OTHER as
      this is a review article.
