name: Viral Entry and Fusion Inhibition Module
description: >-
  A conserved antiviral drug-mechanism module representing the multi-step viral
  cell-entry program — receptor attachment, co-receptor engagement, and
  membrane fusion — that entry inhibitors block. Unlike the conserved,
  cross-family genome-replication enzymes targeted by polymerase inhibitors,
  viral entry is built from virus- and tropism-specific surface glycoproteins
  and the host receptor/co-receptor/uptake factors they hijack, so entry
  inhibitors are exquisitely specific to a single virus or even a single
  tropism. Several pharmacological strategies converge on distinct steps of this
  program: HIV attachment inhibitors such as fostemsavir bind the gp120
  envelope and prevent CD4 engagement; the CCR5 co-receptor antagonist maraviroc
  blocks the gp120-CCR5 interaction and works only against CCR5-tropic HIV; the
  gp41 fusion inhibitor enfuvirtide disrupts the conformational change that
  drives membrane fusion; and the HBV/HDV entry inhibitor bulevirtide blocks
  viral docking at the NTCP bile-acid receptor on hepatocytes. This module
  defines the mechanism-of-action design pattern for entry-targeting antiviral
  treatments: conforming viral-disease entries link a treatment to the specific
  node it inhibits via target_mechanisms. It also encodes why entry inhibition
  is the most narrowly gated of the antiviral strategies — a drug aimed at one
  receptor, co-receptor, or fusion glycoprotein has no target in a virus that
  uses a different entry route, and a tropism switch (CCR5-tropic to
  CXCR4-tropic HIV) abolishes co-receptor-antagonist activity outright.
category: Module
creation_date: "2026-06-24T00:00:00Z"
notes: >-
  This is an antiviral drug-mechanism module, not a specific disease. Disorder
  entries reference individual nodes via conforms_to (e.g.,
  "viral_entry_fusion_inhibition#Viral Attachment, Receptor/Co-receptor
  Engagement and Membrane Fusion as Drug Targets"), and their entry-targeting
  treatments point at the inhibited node via target_mechanisms (analogous to how
  polymerase-targeting treatments link to "viral_polymerase_inhibition#Viral
  Polymerase as the Replication Engine and Drug Target", and how cell-wall-active
  antibiotic treatments link to "bacterial_cell_wall_synthesis_inhibition#
  Peptidoglycan Cross-Linking by Penicillin-Binding Proteins"). Key conformance /
  treatment target: "Viral Attachment, Receptor/Co-receptor Engagement and
  Membrane Fusion as Drug Targets" (the shared attachment / co-receptor / fusion
  / host-uptake target of attachment inhibitors, co-receptor antagonists, fusion
  inhibitors, and NTCP-blocking entry inhibitors). The module is
  pathogen-process-centric: nodes are druggable steps in the entry program, not
  individual drugs; a given entry-inhibitor class maps to the step it blocks. The
  resistance node captures the gating knowledge that distinguishes "an entry
  inhibitor is used" from real drug selection — viral tropism and receptor usage
  determine whether the target exists at all, and a tropism switch or
  envelope-glycoprotein mutation escapes the inhibitor. See projects/ANTIVIRAL.md.
pathophysiology:
- name: Viral Attachment, Receptor/Co-receptor Engagement and Membrane Fusion as Drug Targets
  description: >-
    Every enveloped virus must enter a host cell through a multi-step,
    virus-specific program: surface glycoproteins attach to a primary receptor,
    engage any required co-receptor, and drive fusion of the viral envelope with
    a host membrane to deliver the genome into the cytoplasm. For HIV this is the
    sequential CD4 attachment, CCR5/CXCR4 co-receptor binding, and gp41-mediated
    membrane fusion cascade; for HBV/HDV it is docking of the large surface
    protein at the NTCP bile-acid transporter on hepatocytes. Each of these
    steps is a distinct, druggable target: attachment inhibitors (fostemsavir at
    gp120), co-receptor antagonists (maraviroc at CCR5), fusion inhibitors
    (enfuvirtide at gp41), and receptor-blocking entry inhibitors (bulevirtide at
    NTCP) each interrupt one step. This is the central node of the module and the
    canonical conformance / treatment target for entry-directed antiviral
    therapy. Because these targets are virus- and tropism-specific rather than
    conserved enzymes, entry inhibitors are the most narrowly applicable of the
    antiviral classes.
  role: therapeutic_vulnerability
  biological_processes:
  - preferred_term: symbiont entry into host cell
    term:
      id: GO:0046718
      label: symbiont entry into host cell
  - preferred_term: fusion of virus membrane with host plasma membrane
    term:
      id: GO:0019064
      label: fusion of virus membrane with host plasma membrane
