name: Fungal Cell-Wall beta-1,3-Glucan Synthesis Inhibition Module
description: >-
  The fungal cell-wall beta-1,3-glucan biosynthetic pathway and the point at
  which echinocandins interrupt it, structured as a causal cascade. The fungal
  cell wall is built largely of beta-1,3-glucan, a load-bearing polymer
  polymerized at the plasma membrane by the beta-1,3-glucan synthase complex
  whose catalytic subunit is encoded by FKS1 (and the paralog FKS2): the enzyme
  transfers glucose from UDP-glucose into a growing beta-1,3-glucan chain. The
  nascent glucan is then assembled into the wall, where it cross-links chitin and
  mannoproteins to form the intact, load-bearing fungal cell wall that resists
  internal turgor. This module traces that pathway as successive biological
  steps: beta-1,3-glucan synthesis at the membrane -> cell-wall assembly and
  integrity -> (when synthesis is blocked) cell-wall integrity failure and
  osmotic lysis. Echinocandins (caspofungin, micafungin, anidulafungin, and the
  long-acting rezafungin) are cyclic lipopeptides that act as non-competitive
  inhibitors of the glucan synthase catalytic subunit; depleting beta-1,3-glucan
  collapses wall integrity so that unopposed turgor drives osmotic lysis. Because
  mammalian cells have no cell wall and no homologous synthase, this is a
  fungal-specific, selectively toxic target that gives the echinocandin class the
  cleanest selectivity of any antifungal class. The pathway also generates the
  failure modes: acquired FKS1/FKS2 hotspot mutations reduce enzyme drug
  sensitivity (the cause of clinical breakthrough, especially in Candida
  glabrata), and whole pathogen lineages lie outside the class's reach —
  Cryptococcus species show negligible echinocandin activity and the Mucorales
  are intrinsically resistant — so organism identity alone can exclude the class
  before any susceptibility testing. This module defines the mechanism-of-action
  design pattern for echinocandin treatments: conforming fungal-disease entries
  link an echinocandin treatment to the specific node it inhibits via
  target_mechanisms.
category: Module
creation_date: "2026-06-24T00:00:00Z"
notes: >-
  This is an antifungal drug-mechanism module structured as a biological pathway,
  not a specific disease. Its nodes are successive biological steps of fungal
  cell-wall beta-1,3-glucan biosynthesis (membrane glucan synthesis -> cell-wall
  assembly and integrity -> cell-wall integrity failure and osmotic lysis), with
  an acquired-resistance branch and an intrinsic-resistance gating branch; the
  echinocandin drug class that acts on the synthase step is described in the node
  text rather than modelled as a separate node. Disorder entries reference
  individual nodes via conforms_to (e.g.,
  "fungal_cell_wall_glucan_synthesis_inhibition#beta-1,3-Glucan Synthesis at the
  Plasma Membrane by Glucan Synthase (FKS1)"), and their echinocandin treatments
  point at the inhibited node via target_mechanisms (analogous to how
  cell-wall-active antibiotic treatments link to
  "bacterial_cell_wall_synthesis_inhibition#Peptidoglycan Cross-Linking by
  Penicillin-Binding Proteins"). Key conformance / treatment target:
  "beta-1,3-Glucan Synthesis at the Plasma Membrane by Glucan Synthase (FKS1)"
  (the fungal-specific beta-1,3-glucan synthase that every echinocandin
  inhibits). The two resistance nodes capture the gating knowledge that
  distinguishes "an echinocandin is used" from real drug selection — acquired FKS
  hotspot resistance, and intrinsic resistance in organisms (Cryptococcus,
  Mucorales) for which the glucan-synthase target is not a viable drug target.
  Conforming entries for those organisms should NOT declare conforms_to against
  the target node; the intrinsic-resistance node documents the negative/gating
  case. See projects/ANTIFUNGAL.md for the broader drug-fungus strategy and the
  complementary ergosterol-synthesis, ergosterol-membrane, and antimetabolite
  antifungal modules.
pathophysiology:
- name: beta-1,3-Glucan Synthesis at the Plasma Membrane by Glucan Synthase (FKS1)
  description: >-
    The committed biosynthetic step of the fungal cell wall: at the plasma
    membrane the beta-1,3-glucan synthase complex polymerizes UDP-glucose into
    beta-1,3-glucan, the essential load-bearing polymer of the wall. The catalytic
    subunit is encoded by FKS1 (and the paralog FKS2), and its 1,3-beta-D-glucan
    synthase activity transfers glucose into the growing glucan chain.
    Echinocandins (caspofungin, micafungin, anidulafungin, rezafungin) are cyclic
    lipopeptides that act as non-competitive inhibitors of this fungal-specific
    enzyme, blocking incorporation of glucose into beta-1,3-glucan and starving
    the wall of its principal structural polymer. Because mammalian cells lack a
    cell wall and a homologous synthase, the enzyme is absent from the host,
    making it the most cleanly selective antifungal drug target. This is the
    central, most widely exploited node of the module and the canonical
    conformance / treatment target for echinocandin therapy (caspofungin,
    micafungin, anidulafungin, and rezafungin in invasive candidiasis/candidemia,
    and as an alternative in invasive aspergillosis).
  role: therapeutic_vulnerability
  biological_processes:
  - preferred_term: beta-1,3-Glucan Biosynthesis
    term:
      id: GO:0006075
      label: (1->3)-beta-D-glucan biosynthetic process
  molecular_functions:
  - preferred_term: 1,3-beta-D-Glucan Synthase Activity
    term:
      id: GO:0003843
      label: 1,3-beta-D-glucan synthase activity
  evidence:
  - reference: PMID:26190298
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      They are the first cell wall-active
      agents and target the fungal-specific enzyme glucan synthase, which
      catalyzes
      the biosynthesis of β-1,3-glucan, a key cell wall polymer.
    explanation: >-
      Review establishing echinocandins as cell-wall-active agents that target
      the fungal-specific enzyme glucan synthase, which catalyzes beta-1,3-glucan
      biosynthesis — the target this node defines. Evidence source is OTHER as
      this is a review article.
  - reference: PMID:23463246
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      as non-competitive inhibitors of β-1,3-glucan synthase complex they
      target the fungal cell wall.
    explanation: >-
      States the molecular mechanism of action — echinocandins are
      non-competitive inhibitors of the beta-1,3-glucan synthase complex acting
      on the fungal cell wall. Evidence source is OTHER as this is a review.
  - reference: PMID:31138565
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Echinocandins (caspofungin, micafungin, anidulafungin), targeting β-1,3-glucan
      synthesis of the cell wall
    explanation: >-
      Confirms the named echinocandin agents and identifies beta-1,3-glucan
      synthesis of the cell wall as their shared target. Evidence source is OTHER
      as this is a review article.
  downstream:
  - target: Cell-Wall Assembly and Integrity
    description: >-
      The beta-1,3-glucan polymerized at the membrane is assembled into the wall,
      where it cross-links chitin and mannoproteins to build the intact,
      load-bearing fungal cell wall.
  - target: FKS-Mediated Echinocandin Resistance
    description: >-
      Hotspot amino-acid substitutions in the FKS-encoded glucan-synthase
      subunits lower the enzyme's drug sensitivity, the basis of acquired
      resistance at this catalytic step.
  - target: Intrinsic Resistance in Organisms Lacking an Echinocandin-Susceptible Wall
    description: >-
      In Cryptococcus and the Mucorales the glucan-synthase target is not a
      viable drug target, so inhibition at this step has no useful effect
      regardless of dose.

- name: Cell-Wall Assembly and Integrity
  description: >-
    Beta-1,3-glucan synthesized at the membrane is the principal load-bearing
    polymer of the fungal cell wall: it forms the structural scaffold into which
    chitin and mannoproteins are cross-linked to build the intact, rigid wall
    that contains the high internal osmotic (turgor) pressure of the cell. This
    node represents the normal biological consequence of the upstream synthesis
    step — an assembled, mechanically competent wall — and is the structure that
    echinocandin inhibition of glucan synthase undermines. A wall in which
    beta-1,3-glucan is abundant is intact and osmotically stable; depletion of the
    polymer removes the scaffold on which assembly depends.
  role: effector
  biological_processes:
  - preferred_term: Fungal-Type Cell Wall Biogenesis
    term:
      id: GO:0009272
      label: fungal-type cell wall biogenesis
  evidence:
  - reference: PMID:21694887
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      inhibiting the formation of 1,3-β-D-glucan which is an essential
      component of the fungal cell wall.
    explanation: >-
      Establishes that 1,3-beta-D-glucan formed by glucan synthase is an
      essential structural component of the assembled fungal cell wall — the
      load-bearing scaffold this node represents. Evidence source is OTHER as this
      is a review article.
  downstream:
  - target: Cell-Wall Integrity Failure and Osmotic Lysis
    description: >-
      When beta-1,3-glucan is depleted, the wall loses the scaffold that
      maintains its mechanical integrity, so unopposed internal turgor ruptures
      the cell.

- name: Cell-Wall Integrity Failure and Osmotic Lysis
  description: >-
    When echinocandins inhibit beta-1,3-glucan synthase, the wall is depleted of
    its load-bearing polymer and its mechanical integrity fails; the high internal
    osmotic (turgor) pressure is no longer contained and ruptures the cell,
    producing osmotic lysis and cell death. Because the lethal outcome depends on
    a wall that the host does not possess, this lytic effect is selectively toxic
    to the fungus — the basis of the class's favorable therapeutic index. This is
    the terminal consequence of engaging the glucan-synthase target. Activity is
    fungicidal against Candida and fungistatic (growth-inhibitory at hyphal tips)
    against Aspergillus.
  role: consequence
  biological_processes:
  - preferred_term: Cell Death
    term:
      id: GO:0008219
      label: cell death
  evidence:
  - reference: PMID:21694887
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      The decrease in 1,3-β-D-glucan results in the
      osmotic lysis of the cell, resulting in fungicidal activity against candida.
    explanation: >-
      Directly states the terminal mechanism of this node — echinocandin-driven
      loss of 1,3-beta-D-glucan causes osmotic lysis and fungicidal activity
      against Candida. Evidence source is OTHER as this is a review article.
  - reference: PMID:23463246
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      they show good fungicidal (Candida
      spp.) or fungistatic (Aspergillus spp.) activity against the most important
      human pathogenic fungi
    explanation: >-
      Supports the consequence node's contrast between fungicidal activity
      against Candida and fungistatic activity against Aspergillus that follows
      from cell-wall disruption. Evidence source is OTHER as this is a review.

- name: FKS-Mediated Echinocandin Resistance
  description: >-
    Acquired echinocandin resistance in otherwise susceptible species arises
    during therapy through amino-acid changes in conserved hotspot regions of the
    FKS-encoded catalytic subunits (FKS1, and FKS2 in Candida glabrata) of
    beta-1,3-glucan synthase. These substitutions reduce the sensitivity of the
    enzyme to drug, raising minimum inhibitory concentrations and driving clinical
    breakthrough. Cellular stress-response pathways promote drug adaptation and
    the emergence of resistant fks strains. Resistance is rare among common
    Candida species but is disproportionately seen in Candida glabrata, which is
    frequently also azole-resistant, yielding difficult-to-treat multidrug-resistant
    strains. This adaptive branch off the catalytic-synthesis node explains why
    echinocandin monotherapy can fail despite an intact pathway and why
    susceptibility testing and agent selection matter; conforming entries can
    attach a treatment failure mode to it.
  role: adaptive_escape
  biological_processes:
  - preferred_term: Response to Xenobiotic Stimulus
    term:
      id: GO:0009410
      label: response to xenobiotic stimulus
  evidence:
  - reference: PMID:26190298
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      The mechanism of
      resistance involves amino acid changes in hot-spot regions of Fks subunits of
      glucan synthase, which decrease the sensitivity of the enzyme to drug.
    explanation: >-
      Directly states the molecular basis of acquired echinocandin resistance —
      hotspot amino-acid changes in the Fks subunits of glucan synthase that
      decrease enzyme drug sensitivity. Evidence source is OTHER as this is a
      review article.
  - reference: PMID:26567278
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      higher-level resistance has been reported
      among Candida glabrata, which is also frequently resistant to azole drugs,
      resulting in difficult-to-treat multidrug-resistant strains.
    explanation: >-
      Supports the node's emphasis that FKS-mediated echinocandin resistance is
      disproportionately seen in Candida glabrata, often compounding azole
      resistance. Evidence source is OTHER as this is a review article.

- name: Intrinsic Resistance in Organisms Lacking an Echinocandin-Susceptible Wall
  description: >-
    The module's mechanism presupposes a beta-1,3-glucan wall in which the
    glucan-synthase target is essential and accessible. Some clinically important
    fungi fall outside that scope: Cryptococcus species display negligible
    echinocandin activity (the wall's reliance on the target and the drug-target
    interaction differ such that inhibition does not translate into killing), and
    the Mucorales are intrinsically resistant to echinocandins. For these
    organisms, organism identity alone excludes the echinocandin class a priori,
    regardless of dose or in vitro testing — the clearest example of mechanism
    gating drug choice on the antifungal side. Disorder entries for
    Cryptococcus- or Mucorales-caused disease should NOT declare conforms_to
    against the glucan-synthase target node; this node documents the negative
    case and the reason echinocandin therapy is excluded (cryptococcal disease is
    treated with amphotericin B, flucytosine, and azoles; mucormycosis with
    amphotericin B or isavuconazole).
  role: intrinsic_resistance
  biological_processes:
  - preferred_term: Response to Xenobiotic Stimulus
    term:
      id: GO:0009410
      label: response to xenobiotic stimulus
  evidence:
  - reference: PMID:33558691
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      the only new class of
      antifungal drugs developed in decades, the echinocandins, displays negligible
      antifungal activity against Cryptococcus spp.
    explanation: >-
      Directly supports the gating claim that echinocandins have negligible
      activity against Cryptococcus, so the class is intrinsically excluded for
      cryptococcal disease. Evidence source is OTHER as this is a review article.
