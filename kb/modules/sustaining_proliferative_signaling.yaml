name: Sustaining Proliferative Signaling Module
description: >-
  A conserved mechanism module for the first hallmark of cancer (Hanahan &
  Weinberg): the acquisition of growth-signal autonomy. Normal tissues
  tightly control the production and release of growth-promoting signals;
  cancer cells subvert this control to sustain chronic proliferation. The
  conserved causal chain runs from an oncogenic lesion that constitutively
  engages mitogenic signaling (activating receptor tyrosine kinase
  mutation/amplification, autocrine growth-factor loops, activating
  mutations in RAS/BRAF/PI3K, or loss of negative-feedback brakes such as
  PTEN/NF1) through constitutive RAS-MAPK and PI3K-AKT-mTOR signal output
  to growth-factor-independent cell-cycle entry and uncontrolled
  proliferation. Individual disorder entries declare conformance via
  conforms_to on their pathophysiology nodes, substituting the
  tumor-type-specific driver (e.g., EGFR or ALK in NSCLC, BCR-ABL1 in CML,
  KIT/PDGFRA in GIST, activating BRAF V600E in melanoma) while preserving
  the conserved proliferative-signaling pattern. This is the proliferative
  counterpart to evading_growth_suppressors; together they capture the
  acquisition of autonomous proliferation plus loss of the antiproliferative
  brakes.
category: Module
creation_date: "2026-06-27T00:00:00Z"
notes: >-
  This is a mechanism module, not a specific disease. Disorder entries
  reference individual nodes via conforms_to (e.g.,
  "sustaining_proliferative_signaling#Constitutive Mitogenic Pathway
  Activation"). The module defines the expected pathophysiology structure;
  conforming nodes in disorder files should include the corresponding cell
  types, biological processes, gene products, and causal edges, specialized
  to their tumor context. Key tumor-specific substitutions: NSCLC uses
  activating EGFR mutations or EML4-ALK fusion as the oncogenic driver; CML
  uses the BCR-ABL1 fusion kinase; GIST uses activating KIT/PDGFRA
  mutations; melanoma uses BRAF V600E. The complementary drug-mechanism
  view of RTK-proximal adaptor signaling is captured in
  rtk_grb2_signaling_adaptation. Key conformance target:
  "sustaining_proliferative_signaling#Constitutive Mitogenic Pathway
  Activation".
pathophysiology:
- name: Oncogenic Growth-Signal Lesion
  description: >-
    A genetic or epigenetic lesion confers growth-signal autonomy. Common
    routes include activating mutation or amplification of a receptor
    tyrosine kinase (EGFR, ERBB2/HER2, KIT, PDGFRA, MET, ALK, RET),
    establishment of autocrine growth-factor loops in which tumor cells
    produce ligands for their own receptors, constitutively activating
    mutations in downstream transducers (KRAS/NRAS/HRAS, BRAF, PIK3CA), or
    inactivation of negative-feedback regulators (PTEN, NF1, the SPRY/DUSP
    feedback machinery). Each route uncouples mitogenic signaling from the
    normal requirement for extrinsic growth-factor stimulation.
  role: trigger
  biological_processes:
  - preferred_term: Cell Surface Receptor Tyrosine Kinase Signaling
    term:
      id: GO:0007169
      label: cell surface receptor protein tyrosine kinase signaling pathway
    modifier: INCREASED
  evidence:
  - reference: PMID:20602996
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      As our understanding of these details becomes increasingly
      sophisticated, it provides an important context for therapeutically
      countering the effects of pathogenic RTK mutations in cancer and other
      diseases.
    explanation: >-
      Review establishing that pathogenic receptor tyrosine kinase mutations
      drive cancer and are a therapeutic target, supporting the oncogenic
      growth-signal lesion as the trigger of this module. Evidence source is
      OTHER because this is a review article.
  downstream:
  - target: Constitutive Mitogenic Pathway Activation
    description: >-
      The oncogenic lesion drives ligand-independent, constitutive
      activation of downstream proliferative signaling cascades.

- name: Constitutive Mitogenic Pathway Activation
  description: >-
    The oncogenic lesion produces chronic, ligand-independent flux through
    the core mitogenic cascades: the RAS-RAF-MEK-ERK (MAPK) pathway driving
    proliferative gene expression, and the PI3K-AKT-mTOR pathway driving
    growth, metabolism, and survival. This sustained signal output replaces
    the transient, tightly regulated pulses of signaling seen in normal
    growth-factor responses, and is the conserved central node that
    disorder-specific drivers converge upon.
  role: central_effector
  biological_processes:
  - preferred_term: RAS Protein Signal Transduction
    term:
      id: GO:0007265
      label: Ras protein signal transduction
    modifier: INCREASED
  - preferred_term: ERK1 and ERK2 Cascade
    term:
      id: GO:0070371
      label: ERK1 and ERK2 cascade
    modifier: INCREASED
  - preferred_term: PI3K-AKT Signal Transduction
    term:
      id: GO:0043491
      label: phosphatidylinositol 3-kinase/protein kinase B signal transduction
    modifier: INCREASED
  evidence:
  - reference: PMID:21376230
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      They include sustaining proliferative signaling, evading growth
      suppressors, resisting cell death, enabling replicative immortality,
      inducing angiogenesis, and activating invasion and metastasis.
    explanation: >-
      Hanahan & Weinberg define sustaining proliferative signaling as the
      first hallmark capability, the conserved central effector this module
      models. Evidence source is OTHER because this is a review article.
  downstream:
  - target: Growth-Factor-Independent Proliferation
    description: >-
      Constitutive mitogenic signaling drives cell-cycle entry independent
      of external growth-factor cues.

- name: Growth-Factor-Independent Proliferation
  description: >-
    Sustained mitogenic signaling drives the cell through the G1 restriction
    point and into repeated rounds of division without the normal
    requirement for extrinsic growth factors. The result is autonomous,
    chronic proliferation, the defining phenotype of this hallmark and a
    foundation for tumor growth.
  role: consequence
  biological_processes:
  - preferred_term: Cell Population Proliferation
    term:
      id: GO:0008283
      label: cell population proliferation
    modifier: INCREASED
  evidence:
  - reference: PMID:20602996
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Recent structural studies of receptor tyrosine kinases (RTKs) have
      revealed unexpected diversity in the mechanisms of their activation by
      growth factor ligands.
    explanation: >-
      Review of RTK activation by growth-factor ligands; oncogenic
      subversion of these activation mechanisms underlies
      growth-factor-independent proliferation. Evidence source is OTHER
      because this is a review article.
