name: Glutamate Excitotoxicity Module
description: >-
  A conserved neurodegeneration mechanism module representing excitotoxicity — the
  final common pathway in which excessive activation of glutamate receptors kills
  neurons. Diverse insults raise synaptic glutamate or mimic its action: impaired
  astrocytic glutamate clearance (e.g., EAAT2/GLT-1 loss in ALS), increased
  glutamatergic drive, or exogenous excitotoxins such as the cyanobacterial amino
  acid BMAA and methylmercury. Sustained overactivation of NMDA, AMPA, and kainate
  receptors causes pathological calcium influx and overload, which drives
  mitochondrial dysfunction and reactive-oxygen-species generation and ultimately
  excitotoxic neuronal death. Individual disorder entries declare conformance via
  conforms_to on their pathophysiology nodes, substituting the disorder-specific
  source of glutamatergic overactivation and the selectively vulnerable neuronal
  population while preserving the conserved receptor-to-calcium-to-death chain.
category: Module
creation_date: "2026-06-11T12:00:00Z"
notes: >-
  This is a mechanism module, not a specific disease. Disorder entries reference
  individual nodes via conforms_to (e.g.,
  "glutamate_excitotoxicity#Excitotoxic Neuronal Death", the key conformance
  target). It models the conserved excitotoxic cascade shared across amyotrophic
  lateral sclerosis (impaired astrocytic glutamate clearance; the antiglutamate
  drug riluzole is a partial validation), the cyanobacterial-toxin disorders
  (BMAA acting at AMPA/kainate and NMDA/mGluR5 receptors in Guam ALS-PDC),
  methylmercury poisoning (NMDA-receptor-mediated injury), Huntington disease, and
  epilepsy-associated neuronal injury. It is intentionally distinct from the
  epilepsy_excitation_inhibition_imbalance module, which models hyper-synchronous
  network firing producing seizures rather than the receptor-overactivation
  calcium-overload cell-death cascade modeled here. Conforming nodes may be partial
  where excitotoxicity is one of several parallel injury mechanisms (e.g., the
  oxidative-stress-dominant methylmercury and BMAA mechanisms).
pathophysiology:
- name: Excessive Glutamatergic Stimulation and Impaired Glutamate Clearance
  description: >-
    The shared initiating condition is a pathological rise in glutamatergic
    receptor stimulation. This arises from impaired astrocytic glutamate clearance
    (loss of the EAAT2/GLT-1 transporter), increased presynaptic glutamate
    release, or exogenous excitotoxins — including BMAA, which additionally
    inhibits the cystine/glutamate antiporter (system xc-) to raise extracellular
    glutamate and deplete glutathione.
  role: trigger
  cell_types:
  - preferred_term: astrocyte
    term:
      id: CL:0000127
      label: astrocyte
  biological_processes:
  - preferred_term: neurotransmitter transport
    term:
      id: GO:0006836
      label: neurotransmitter transport
    modifier: DECREASED
  evidence:
  - reference: PMID:40508048
    reference_title: "Amyotrophic Lateral Sclerosis: Pathophysiological Mechanisms and Treatment Strategies (Part 2)."
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      understanding of the key pathogenetic links of ALS, including
      glutamate-mediated excitotoxicity and oxidative stress, has significantly
      advanced.
    explanation: >-
      Identifies glutamate-mediated excitotoxicity as a key conserved pathogenic
      process, the basis of this module.
  - reference: PMID:19374900
    reference_title: "Beta-N-methylamino-l-alanine induces oxidative stress and glutamate release through action on system Xc(-)."
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: >-
      BMAA inhibits the cystine/glutamate antiporter
    explanation: >-
      Shows that the excitotoxin BMAA raises extracellular glutamate by
      inhibiting the system xc- cystine/glutamate antiporter, an exogenous route
      to the conserved trigger.
  downstream:
  - target: Glutamate Receptor Overactivation and Calcium Overload
    description: >-
      Elevated glutamatergic stimulation overactivates ionotropic glutamate
      receptors and drives pathological calcium entry.
- name: Glutamate Receptor Overactivation and Calcium Overload
  description: >-
    Sustained overactivation of NMDA, AMPA, and kainate glutamate receptors opens
    cation channels and produces pathological intracellular calcium influx and
    overload. The calcium overload is the proximate injurious signal that couples
    excessive receptor activation to downstream organelle dysfunction and death.
    Motor neurons are selectively vulnerable owing to their calcium-permeable
    AMPA-receptor complement.
  role: central_effector
  cell_types:
  - preferred_term: neuron
    term:
      id: CL:0000540
      label: neuron
  biological_processes:
  - preferred_term: calcium ion transmembrane transport
    term:
      id: GO:0070588
      label: calcium ion transmembrane transport
    modifier: INCREASED
  evidence:
  - reference: PMID:16764863
    reference_title: "BMAA selectively injures motor neurons via AMPA/kainate receptor activation."
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: >-
      The glutamate receptor antagonist NBQX prevented BMAA-induced death,
      implicating excitotoxic activation of AMPA/kainate receptors
    explanation: >-
      Receptor-antagonist rescue directly demonstrates that AMPA/kainate receptor
      overactivation mediates excitotoxic injury, the central effector of this
      module.
  - reference: PMID:27538940
    reference_title: "Memantine, a Low-Affinity NMDA Receptor Antagonist, Protects against Methylmercury-Induced Cytotoxicity of Rat Primary Cultured Cortical Neurons."
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: >-
      NMDARs expression alteration were observed
    explanation: >-
      Methylmercury injury involves NMDA-receptor alteration and calcium
      dyshomeostasis, and is mitigated by the NMDA antagonist memantine,
      generalizing receptor-overactivation/calcium overload beyond ALS.
  downstream:
  - target: Mitochondrial Dysfunction and Oxidative Stress
    description: >-
      Calcium overload disrupts mitochondrial function and generates reactive
      oxygen species.
  - target: Excitotoxic Neuronal Death
    description: >-
      Calcium overload activates calcium-dependent death effectors.
- name: Mitochondrial Dysfunction and Oxidative Stress
  description: >-
    Calcium overload is taken up by mitochondria, impairing oxidative
    phosphorylation, collapsing membrane potential, and generating reactive oxygen
    species. Excitotoxins compound this directly: BMAA and methylmercury both
    induce neuronal oxidative stress. The resulting bioenergetic failure and ROS
    burden amplify the injury and lower the threshold for neuronal death.
  role: amplifier
  cell_types:
  - preferred_term: neuron
    term:
      id: CL:0000540
      label: neuron
  biological_processes:
