    term:
      id: GO:0051402
      label: neuron apoptotic process
    modifier: INCREASED
  evidence:
  - reference: PMID:16764863
    reference_title: "BMAA selectively injures motor neurons via AMPA/kainate receptor activation."
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: >-
      BMAA was found to induce selective motor neuron (MN) loss in dissociated
      mixed spinal cord cultures
    explanation: >-
      Demonstrates selective excitotoxic motor neuron death — the vulnerable-cell
      death endpoint of the module — driven by the BMAA excitotoxin.
  - reference: PMID:8302340
    reference_title: "A controlled trial of riluzole in amyotrophic lateral sclerosis. ALS/Riluzole Study Group."
    supports: PARTIAL
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Some research suggests that the excitatory amino acid neurotransmitter
      glutamate may be involved in the pathogenesis.
    explanation: >-
      The clinical benefit of the antiglutamate drug riluzole in ALS provides
      partial human validation that glutamatergic excitotoxicity contributes to
      motor neuron death.
