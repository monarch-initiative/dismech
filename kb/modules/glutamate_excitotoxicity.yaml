      label: response to oxidative stress
    modifier: INCREASED
  - preferred_term: mitochondrion organization
    term:
      id: GO:0007005
      label: mitochondrion organization
    modifier: DYSREGULATED
  evidence:
  - reference: PMID:16764863
    reference_title: "BMAA selectively injures motor neurons via AMPA/kainate receptor activation."
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: >-
      selective reactive oxygen species (ROS) generation in MNs with minimal
      effect on other spinal neurons
    explanation: >-
      Demonstrates that excitotoxic stimulation generates reactive oxygen species
      selectively in vulnerable motor neurons.
  - reference: PMID:19374900
    reference_title: "Beta-N-methylamino-l-alanine induces oxidative stress and glutamate release through action on system Xc(-)."
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: >-
      activation of metabotropic glutamate receptor 5 (mGluR5) and induction of
      oxidative stress
    explanation: >-
      Links glutamatergic (mGluR5) signaling to induction of oxidative stress in
      the excitotoxic cascade.
  downstream:
  - target: Excitotoxic Neuronal Death
    description: >-
      Bioenergetic failure and oxidative damage drive neuronal death.
- name: Excitotoxic Neuronal Death
  description: >-
    The convergent endpoint is death of the selectively vulnerable neuronal
    population through calcium- and ROS-dependent effectors (calpains, nitric
    oxide synthase, mitochondrial permeability transition) producing apoptotic and
    necrotic neuronal loss. This is the key conformance target: disorders
    substitute their specific glutamatergic insult and vulnerable neurons while
    sharing this excitotoxic death.
  role: effector
  cell_types:
  - preferred_term: motor neuron
    term:
      id: CL:0000100
      label: motor neuron
  - preferred_term: neuron
    term:
      id: CL:0000540
      label: neuron
