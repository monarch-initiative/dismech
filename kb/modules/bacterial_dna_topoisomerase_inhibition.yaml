name: Bacterial DNA Topoisomerase Inhibition Module
description: >-
  A conserved antibacterial drug-mechanism module representing the bacterial type
  II topoisomerases — DNA gyrase (GyrA/GyrB) and topoisomerase IV (ParC/ParE) —
  that manage chromosomal supercoiling and decatenation during replication.
  Fluoroquinolones (ciprofloxacin, levofloxacin, moxifloxacin) are the major drug
  class acting here: they trap the enzyme-DNA cleavage complex, converting the
  topoisomerase into a DNA-damaging agent that generates double-strand breaks and
  is bactericidal. Because gyrase and topoisomerase IV are bacterial enzymes
  distinct from human topoisomerases, fluoroquinolones are selectively toxic.
  This module defines the mechanism-of-action design pattern for
  fluoroquinolone treatments: conforming entries link a treatment to the gyrase/
  topoisomerase target via target_mechanisms. It also encodes the
  quinolone-resistance-determining-region (QRDR) mutation and efflux resistance
  that gate fluoroquinolone use.
category: Module
creation_date: "2026-06-20T00:00:00Z"
notes: >-
  Antibacterial drug-mechanism module, not a specific disease. Disorder entries
  reference nodes via conforms_to (e.g.,
  "bacterial_dna_topoisomerase_inhibition#DNA Gyrase and Topoisomerase IV
  (Fluoroquinolone Target)"), and their fluoroquinolone treatments point at that
  node via target_mechanisms. Key conformance / treatment target: "DNA Gyrase and
  Topoisomerase IV (Fluoroquinolone Target)". Nodes are druggable steps, not
  individual drugs.
pathophysiology:
- name: DNA Gyrase and Topoisomerase IV (Fluoroquinolone Target)
  description: >-
    Bacterial DNA gyrase and topoisomerase IV break, pass, and reseal duplex DNA
    to manage supercoiling and decatenate replicated chromosomes. Fluoroquinolones
    bind the enzyme-DNA complex via a water-metal-ion bridge, block strand-passage
    catalysis, and stabilize the cleavage complex; release of the broken DNA
    underlies their bactericidal activity. Quinolones are the only current class
    that directly inhibits bacterial DNA synthesis, and their bacterial type II
    topoisomerase targets are distinct from human topoisomerases, giving
    selectivity.
  role: therapeutic_vulnerability
  biological_processes:
  - preferred_term: DNA Topological Change
    term:
      id: GO:0006265
      label: DNA topological change
  evidence:
  - reference: PMID:27449972
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Quinolones dually target DNA gyrase and topoisomerase IV binding to
      specific domains and conformations so as to block DNA strand passage
      catalysis and stabilize DNA-enzyme complexes that block the DNA replication
      apparatus and generate double breaks in DNA that underlie their bactericidal
      activity.
    explanation: >-
      Review establishing DNA gyrase and topoisomerase IV as the dual
      fluoroquinolone target and the cleavage-complex mechanism this node
      represents. Evidence source is OTHER as this is a review article.
  - reference: PMID:27449972
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Quinolone antimicrobials are widely used in clinical medicine and are the
      only current class of agents that directly inhibit bacterial DNA synthesis.
    explanation: >-
      Establishes fluoroquinolones as the agents that directly inhibit bacterial
      DNA synthesis at this target. Evidence source is OTHER as this is a review.
  downstream:
  - target: Fluoroquinolone Target Resistance
    description: >-
      QRDR mutations and efflux protect the topoisomerase target, escaping
      fluoroquinolone action.

- name: Fluoroquinolone Target Resistance
  description: >-
    Resistance to fluoroquinolones arises predominantly from mutations in the
    quinolone-resistance-determining region (QRDR) of the GyrA and ParC subunits
    that lower drug-target affinity, from increased efflux-pump expression, and
    from acquired plasmid-mediated quinolone-resistance genes. High-level
    resistance is common in some pathogens (e.g. typhoidal Salmonella), which is
    why fluoroquinolones must be susceptibility-guided rather than assumed
    effective.
  role: adaptive_escape
  biological_processes:
  - preferred_term: Response to Antibiotic
    term:
      id: GO:0046677
      label: response to antibiotic
  evidence:
  - reference: PMID:27449972
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Mechanisms of resistance include mutational alterations in drug target
      affinity and efflux pump expression and acquisition of resistance-conferring
      genes.
    explanation: >-
      Enumerates the fluoroquinolone resistance mechanisms encoded here (target
      mutation, efflux, acquired genes). Evidence source is OTHER as this is a
      review article.
