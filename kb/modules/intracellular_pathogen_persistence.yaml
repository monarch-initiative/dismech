name: Intracellular Pathogen Persistence Module
description: >-
  A conserved antibacterial lifestyle-gating module representing the intracellular
  niche occupied by obligate and facultative intracellular bacteria (e.g.
  Rickettsia, Bartonella, Brucella, Coxiella, Legionella, Chlamydia,
  Mycobacterium, intracellular phases of others). Unlike the cell-wall and
  protein-synthesis modules, the nodes here are not a single drug target but a
  pharmacokinetic gating principle: the pathogen resides inside host cells where
  hydrophilic, poorly cell-penetrant antibiotics — chiefly the beta-lactams —
  cannot accumulate, so they fail regardless of intrinsic susceptibility.
  Effective therapy requires agents that concentrate intracellularly: tetracyclines
  (doxycycline), macrolides, fluoroquinolones, and rifamycins. This module
  encodes WHY drug choice for intracellular infections departs from "any
  bactericidal antibiotic" and complements the target-based modules: a conforming
  disease may inhibit a ribosomal or cell-wall target, but only with a drug that
  first reaches the intracellular compartment.
category: Module
creation_date: "2026-06-20T00:00:00Z"
notes: >-
  This is an antibacterial drug-mechanism (lifestyle-gating) module, not a
  specific disease. Disorder entries for intracellular bacterial infections
  reference nodes via conforms_to (e.g.,
  "intracellular_pathogen_persistence#Intracellular Niche and Beta-Lactam
  Exclusion"), and their treatments point at the cell-penetrant requirement node
  via target_mechanisms. Key conformance / treatment target: "Requirement for
  Cell-Penetrant Antimicrobials" (the doxycycline/macrolide/fluoroquinolone/
  rifamycin rationale). The nodes are gating principles, not enzyme targets; a
  conforming disease typically ALSO conforms to a target-based module
  (ribosome/cell wall) for the drug's molecular mechanism, with this module
  explaining the penetration constraint on which agents qualify.
pathophysiology:
- name: Intracellular Niche and Beta-Lactam Exclusion
  description: >-
    Obligate and facultative intracellular bacteria invade and persist within
    host cells (phagocytes, endothelium, epithelium), where they are shielded
    from antibodies, complement, and — critically for therapy — from antibiotics
    that cannot cross or accumulate within the eukaryotic cell membrane. The
    beta-lactams are the paradigm case: they diffuse poorly into and do not
    concentrate within host cells, so they are ineffective against intracellular
    pathogens even when the organism is susceptible in vitro. This is the gating
    principle that excludes cell-wall-active therapy for this class of infection.
  role: intrinsic_resistance
  biological_processes:
  - preferred_term: Biological Process Involved in Interaction with Host
    term:
      id: GO:0051701
      label: biological process involved in interaction with host
  evidence:
  - reference: PMID:18611821
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      The intracellular location of some microorganisms allow them to resist
      antibiotics with poor ability to penetrate eukaryotic cell membranes, such
      as the beta-lactam compounds.
    explanation: >-
      Review of intracellular organisms stating that the intracellular niche
      confers resistance to poorly cell-penetrant antibiotics such as
      beta-lactams. Evidence source is OTHER as this is a review article.
  downstream:
  - target: Requirement for Cell-Penetrant Antimicrobials
    description: >-
      Because the niche excludes poorly penetrant drugs, effective therapy is
      restricted to agents that accumulate intracellularly.

- name: Requirement for Cell-Penetrant Antimicrobials
  description: >-
    Therapeutic efficacy against intracellular bacteria tracks the intracellular
    concentration the drug achieves, not just its in vitro MIC. Tetracyclines
    (doxycycline), macrolides, fluoroquinolones, and rifamycins accumulate within
    host cells and are therefore the mainstays for rickettsioses, bartonelloses,
    brucellosis, Q fever, Legionella and Mycoplasma pneumonia, and chlamydial
    infection. This node is the cell-penetrant-drug requirement that conforming
    intracellular-infection treatments target; the drug's molecular target
    (usually the ribosome) is captured by the relevant target-based module.
  role: therapeutic_vulnerability
  biological_processes:
  - preferred_term: Response to Antibiotic
    term:
      id: GO:0046677
      label: response to antibiotic
  evidence:
  - reference: PMID:28639230
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Therapeutic efficacy against intracellular pathogens has been correlated
      mainly with the intracellular concentrations achieved by the different
      antimicrobial agents.
    explanation: >-
      Review of intracellular antibacterial pharmacokinetics establishing that
      efficacy against intracellular pathogens depends on the intracellular
      concentration achieved — the cell-penetrant requirement this node
      represents. Evidence source is OTHER as this is a review article.
