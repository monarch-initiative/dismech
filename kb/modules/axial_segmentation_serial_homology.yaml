name: Axial Skeleton Segmentation Serial Homology Module
description: >-
  A conserved developmental-patterning module, the axial counterpart of the
  limb/digit and pharyngeal-arch serial-homology modules. The vertebrae and ribs
  are serially repeated (metameric) elements derived from somites, which bud off
  the presomitic mesoderm one pair at a time under the control of the
  segmentation clock — an oscillator built from coupled Notch, Wnt, and FGF
  signaling — interacting with a posterior-to-anterior FGF/Wnt determination
  wavefront. Because the same periodic mechanism builds every segment, a single
  lesion in the clock or its Notch components (DLL3, MESP2, LFNG, HES7, TBX6)
  perturbs many segments at once and produces a coordinated multi-segment
  malformation bundle — multiple hemivertebrae, fused/block vertebrae, and rib
  fusions or malalignment across the axial skeleton — rather than an isolated
  single-segment defect. The spondylocostal/spondylothoracic dysostoses and
  related congenital vertebral malsegmentation disorders differ in the specific
  Notch-pathway gene but converge on this clock-to-malsegmentation chain.
  Conforming disorder entries declare conformance via conforms_to, substituting
  the disorder-specific segmentation-clock gene while preserving the
  perturbed-segmentation-to-serially-homologous-malsegmentation chain.
category: Module
creation_date: "2026-06-28T00:00:00Z"
notes: >-
  This is a mechanism module, not a specific disease. Disorder entries reference
  individual nodes via conforms_to (e.g.,
  "axial_segmentation_serial_homology#Vertebral and Costal Malsegmentation").
  The biological motivation is serial homology: vertebrae and ribs are serially
  repeated somite derivatives built by one periodic segmentation mechanism, so a
  single clock/Notch lesion yields a multi-segment axial malformation bundle
  rather than an isolated defect. Conforming nodes should substitute the
  disorder-specific lesion at the trigger node (DLL3/SCDO1, MESP2/SCDO2,
  LFNG/SCDO3, HES7/SCDO4, TBX6) and specialize the affected vertebral/costal
  elements at the consequence node. Modules bind GO and CL terms only.
pathophysiology:
- name: Segmentation Clock and Wavefront Dysfunction
  description: >-
    The conserved initiating lesion disrupts the segmentation clock — the
    oscillatory network of coupled Notch, Wnt, and FGF signaling in the
    presomitic mesoderm — or the FGF/Wnt determination wavefront that converts
    the clock's temporal periodicity into spatial segment boundaries. In humans,
    the recurrent lesions are in Notch-pathway components (DLL3, MESP2, LFNG,
    HES7) and the mesoderm regulator TBX6; proper regulation of Notch signaling
    is an absolute requirement for correct patterning of the axial skeleton.
  role: trigger
  cell_types:
  - preferred_term: Presomitic (Paraxial) Mesoderm Cell
    term:
      id: CL:0011007
      label: paraxial cell
  biological_processes:
  - preferred_term: Somitogenesis
    term:
      id: GO:0001756
      label: somitogenesis
    modifier: ABNORMAL
  - preferred_term: Notch Signaling Pathway
    term:
      id: GO:0007219
      label: Notch signaling pathway
    modifier: ABNORMAL
  evidence:
  - reference: PMID:16385447
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: These genes are important components of the Notch signaling pathway, which has multiple roles in development and disease.
    explanation: >-
      Identifies the human spondylocostal dysostosis genes (DLL3, MESP2, LFNG)
      as Notch-pathway components, the conserved trigger of this module.
      Evidence source is HUMAN_CLINICAL because the genes were identified in
      affected families.
  - reference: PMID:16385447
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: proper regulation of the Notch signaling pathway is an absolute requirement for the correct patterning of the axial skeleton.
    explanation: >-
      States that intact Notch signaling is required for axial-skeleton
      patterning, linking the trigger lesion to the module's downstream outcome.
      Evidence source is HUMAN_CLINICAL because it is drawn from human
      mutation-phenotype analysis.
  - reference: PMID:17965051
    supports: SUPPORT
    evidence_source: MODEL_ORGANISM
    snippet: conditional deletion of the FGF receptor gene Fgfr1 abolishes FGF signaling in the mouse PSM, resulting in an arrest of the dynamic cyclic gene expression and ultimately leading to an arrest of segmentation.
    explanation: >-
      Shows that disrupting FGF signaling halts the cyclic segmentation-clock
      gene expression and arrests segmentation. Evidence source is
      MODEL_ORGANISM because this is a mouse conditional-knockout study.
  downstream:
  - target: Disrupted Somite Boundary Formation
- name: Disrupted Somite Boundary Formation
  description: >-
    Loss of clock oscillation or wavefront positioning corrupts the periodic
    formation of somite boundaries in the presomitic mesoderm. Somites are
    formed at the wrong time, place, or with the wrong rostrocaudal polarity, so
    the metameric template from which the vertebrae and ribs derive is
    mis-specified.
  role: central_effector
  cell_types:
  - preferred_term: Presomitic (Paraxial) Mesoderm Cell
    term:
      id: CL:0011007
      label: paraxial cell
  biological_processes:
  - preferred_term: Segmentation
    term:
      id: GO:0035282
      label: segmentation
    modifier: ABNORMAL
  - preferred_term: Anterior/Posterior Pattern Specification
    term:
      id: GO:0009952
      label: anterior/posterior pattern specification
    modifier: ABNORMAL
  evidence:
  - reference: PMID:17965051
    supports: SUPPORT
    evidence_source: MODEL_ORGANISM
    snippet: The FGF pathway establishes a posterior-to-anterior signaling gradient in the presomitic mesoderm (PSM), which controls cell maturation and is involved in the positioning of segmental boundaries.
    explanation: >-
      Defines the PSM determination wavefront that positions segmental
      boundaries, the central effector this module disrupts. Evidence source is
      MODEL_ORGANISM because the gradient was characterized in mouse.
  downstream:
  - target: Vertebral and Costal Malsegmentation
- name: Vertebral and Costal Malsegmentation
  description: >-
    Because the vertebrae and ribs are serially homologous somite derivatives
    built by one periodic mechanism, mis-segmentation produces a coordinated
    multi-segment malformation bundle rather than an isolated defect: multiple
    hemivertebrae, fused/block vertebrae, and rib fusions or malalignment along
    the axial skeleton, frequently causing congenital scoliosis and thoracic
    insufficiency.
  role: consequence
  cell_types:
  - preferred_term: Chondrocyte
    term:
      id: CL:0000138
      label: chondrocyte
  - preferred_term: Osteoblast
    term:
      id: CL:0000062
      label: osteoblast
  biological_processes:
  - preferred_term: Embryonic Skeletal System Morphogenesis
    term:
      id: GO:0048704
      label: embryonic skeletal system morphogenesis
    modifier: ABNORMAL
  evidence:
  - reference: PMID:16385447
    supports: SUPPORT
    evidence_source: OTHER
    snippet: The spondylocostal dysostoses (SCDs) are a heterogeneous group of vertebral malsegmentation disorders that arise during embryonic development by a disruption of somitogenesis.
    explanation: >-
      Defines the consequence — vertebral malsegmentation arising from disrupted
      somitogenesis. Evidence source is OTHER because this is a definitional
      review statement of the disease class.
  - reference: PMID:29765785
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: Patients with spondylocostal dysostosis (SCD) have congenital spine and rib deformities associated with frequently severe thoracic insufficiency and respiratory compromise.
    explanation: >-
      Documents the serially homologous axial bundle — combined congenital spine
      and rib deformities with thoracic insufficiency — in human patients.
      Evidence source is HUMAN_CLINICAL.
