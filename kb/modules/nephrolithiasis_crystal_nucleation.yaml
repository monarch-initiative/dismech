name: Nephrolithiasis Crystal Nucleation and Retention Module
description: >-
  A conserved pathophysiology module representing the urinary stone-formation
  pathway that produces nephrolithiasis. An abnormal combination of metabolic
  derangements raises urinary supersaturation with respect to a lithogenic
  mineral: increased excretion of calcium (hypercalciuria), oxalate
  (hyperoxaluria), urate (hyperuricosuria) or cystine, low urine volume, or a
  pH derangement (alkaline urine for calcium phosphate, acidic urine for uric
  acid). Supersaturation thermodynamically drives crystal nucleation, growth
  and aggregation in the tubular lumen or on Randall's plaque. Crystals are
  retained by adhering to the apical surface of renal tubular epithelium rather
  than being harmlessly flushed out; retained crystal masses provoke epithelial
  injury and an NLRP3-inflammasome-driven inflammatory response that further
  promotes crystal attachment, and the stone enlarges into a symptomatic
  calculus causing obstruction, renal colic and recurrence. The module captures
  the shared core across idiopathic calcium oxalate, hypercalciuric,
  hyperoxaluric, cystinuric and uric acid stone disease. Conforming disorder
  nodes substitute the disorder-specific lithogenic solute and its handling
  defect (e.g., cystine transporter loss in cystinuria, AGT deficiency in
  primary hyperoxaluria, low urine pH in uric acid stones) while preserving the
  supersaturation -> nucleation -> retention -> injury -> stone causal chain.
category: Module
creation_date: "2026-06-06T00:00:00Z"
notes: >-
  This is a mechanism module, not a specific disease. Disorder entries reference
  individual nodes via conforms_to (e.g.,
  "nephrolithiasis_crystal_nucleation#Crystal Retention and Epithelial
  Adhesion"). The module defines the expected pathophysiology structure;
  conforming nodes in disorder files should include the corresponding cell
  types, biological processes, and causal edges, specialized to their disease
  context. Key disease-specific substitutions: cystinuria substitutes defective
  cystine reabsorption (SLC3A1/SLC7A9) at the supersaturation trigger; primary
  hyperoxaluria substitutes hepatic glyoxylate-metabolism enzyme deficiency
  driving hyperoxaluria; uric acid stone disease substitutes persistently
  acidic urine as the dominant abnormality. Mineral and solute chemistry is
  described in prose only; modules bind GO and CL terms only and do not use
  chemical (CHEBI) or disease (MONDO) term bindings.
pathophysiology:
- name: Urinary Supersaturation
  description: >-
    An abnormal combination of metabolic factors raises the relative
    supersaturation of urine with respect to a stone-forming mineral above its
    formation product. The dominant drivers are increased renal excretion of
    lithogenic solutes (calcium, oxalate, urate, cystine), low urine volume,
    and pH derangements (alkaline urine favouring calcium phosphate, acidic
    urine favouring uric acid). Supersaturation is the thermodynamic driving
    force for crystallization and is the necessary upstream state for stone
    formation; the specific solute and handling defect differ by disorder but
    the supersaturated state is shared.
  role: trigger
  biological_processes:
  - preferred_term: Renal Excretion of Lithogenic Solutes
    term:
      id: GO:0007588
      label: excretion
    modifier: DYSREGULATED
  - preferred_term: Calcium Ion Transport
    term:
      id: GO:0006816
      label: calcium ion transport
    modifier: DYSREGULATED
  evidence:
  - reference: PMID:27188687
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Kidney stones are mineral deposits in the renal calyces and pelvis that
      are found free or attached to the renal papillae. They contain
      crystalline and organic components and are formed when the urine becomes
      supersaturated with respect to a mineral.
    explanation: >-
      Establishes urinary supersaturation with respect to a mineral as the
      defining upstream condition for kidney stone formation, the trigger of
      this module. Evidence source is OTHER because this is an authoritative
      review (Nature Reviews Disease Primers).
  - reference: PMID:31882798
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Oxalic acid, which is not significantly metabolized by mammals1,2, is
      mainly excreted by the kidney1–3. Oxalate, its ionized form, can form
      highly insoluble complexes with calcium2. When oxalate homeostasis is
      disturbed, either by endogenous over-production (primary hyperoxaluria)1,4,
      excessive exogenous provision (secondary hyperoxaluria)1,2,4, or renal
      dysfunction, oxalate accumulates in the body, may harm the kidneys and
      lead to end-stage renal disease4.
    explanation: >-
      Documents that lithogenic solute (oxalate) is handled by renal excretion
      and that disturbed solute homeostasis raises the renal solute load,
      supporting increased excretion of a lithogenic solute as a driver of the
      supersaturated state. Evidence source is OTHER because the introduction
      synthesizes prior literature.
  downstream:
  - target: Crystal Nucleation and Growth
- name: Crystal Nucleation and Growth
  description: >-
    Once supersaturation exceeds the formation product, solute molecules
    cluster and nucleate into crystals, predominantly by heterogeneous
    nucleation on pre-existing particulates, organic matrix or another mineral.
    Nucleation is followed by crystal growth and aggregation within the tubular
    lumen (free-particle mechanism) or on the calcium phosphate Randall's
    plaque exposed at the papillary surface (fixed-particle mechanism). This is
    the amplifying step that converts a metabolic supersaturated state into a
    solid crystalline mass capable of being retained. No well-defined GO
    biomineralization term currently exists, so this node relies on evidence
    rather than a biological-process binding.
  role: amplifier
  evidence:
  - reference: PMID:27188687
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Nucleation (in which solute molecules dispersed in a solvent begin to
      cluster) is the first stage in crystallization and can occur homogeneously
      or heterogeneously.
    explanation: >-
      Defines nucleation as the first stage of crystallization, the amplifying
      step of this module that follows supersaturation. Evidence source is OTHER
      because this is an authoritative review.
  - reference: PMID:36257382
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      the complex multistep formation process of the kidney stones includes
      supersaturation, nucleation, growth and aggregation of a crystal, and
      crystal retention in cells after adhesion.
    explanation: >-
      Lays out the conserved multistep sequence (supersaturation, nucleation,
      growth, aggregation, retention after adhesion) that this module
      reproduces, supporting nucleation and growth as the step bridging
      supersaturation to crystal retention. Evidence source is OTHER because
      this is a review.
  downstream:
  - target: Crystal Retention and Epithelial Adhesion
- name: Crystal Retention and Epithelial Adhesion
  description: >-
    For a stone to form, crystals must be retained in the kidney rather than
    flushed out in the urine, which is the rate-limiting and pivotal step
    distinguishing common harmless crystalluria from rare stone disease.
    Retention is achieved when aggregated crystals become too large to pass the
    tubular lumen or, critically, adhere to the apical surface of renal tubular
    epithelial cells via crystal-binding membrane proteins. Crystal-epithelial
    adhesion anchors the crystal nidus and seeds further growth into a stone.
  role: central_effector
  cell_types:
  - preferred_term: Renal tubular epithelial cell
    term:
      id: CL:0002306
      label: epithelial cell of proximal tubule
  biological_processes:
  - preferred_term: Crystal-Epithelial Cell Adhesion
    term:
      id: GO:0007155
      label: cell adhesion
    modifier: INCREASED
  evidence:
  - reference: PMID:21859077
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: >-
      Adhesion of calcium oxalate monohydrate (COM) crystals onto apical surface
      of renal tubular epithelial cells is a crucial mechanism for crystal
      retention, leading to kidney stone formation.
    explanation: >-
      Directly identifies crystal adhesion to the apical surface of renal
      tubular epithelial cells as the crucial mechanism of crystal retention
      that leads to stone formation, the central effector step of this module.
      Evidence source is IN_VITRO because the crystal-binding proteins were
      identified in cultured polarized MDCK epithelial cells.
  - reference: PMID:16404622
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      For stone formation, crystals must form in the kidneys and be retained
      there, which is indeed a rare occurrence. Crystalluria is common while
      stone formation is not.
    explanation: >-
      Establishes crystal retention as the rare, decisive step that
      distinguishes stone formation from common harmless crystalluria,
      supporting retention as the central effector. Evidence source is OTHER
      because this is a review synthesizing human and animal-model data.
  downstream:
  - target: Crystal-Induced Tubular Injury and Inflammation
- name: Crystal-Induced Tubular Injury and Inflammation
  description: >-
    Retained and growing crystals injure the renal tubular epithelium and are
    sensed as danger signals (DAMPs) that activate the NLRP3/caspase-1
    inflammasome in resident and recruited mononuclear phagocytes, driving
    release of interleukin-1 beta and an interstitial inflammatory response.
    Epithelial injury exposes basement membrane and produces dysfunctional
    crystallization modulators, which in turn promote further crystal nucleation
    and adhesion, establishing a feed-forward loop that enlarges the stone and
    can progress to chronic kidney injury.
  role: effector
  cell_types:
  - preferred_term: Macrophage
    term:
      id: CL:0000235
      label: macrophage
  biological_processes:
  - preferred_term: Crystal-Induced Inflammatory Response
    term:
      id: GO:0006954
      label: inflammatory response
    modifier: INCREASED
  evidence:
  - reference: PMID:31882798
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Oxalate crystal-induced renal inflammation is associated with progressive
      kidney failure due to activation of the NLRP3/CASP-1 inflammasome.
    explanation: >-
      Establishes that retained crystals provoke renal inflammation through
      NLRP3/caspase-1 inflammasome activation, supporting the crystal-induced
      tubular inflammation step. Evidence source is OTHER because this opening
      statement synthesizes prior in vitro and in vivo findings.
  - reference: PMID:16404622
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Only pathological changes in the kidneys including renal injury and
      dysfunction can accomplish crystal retention. Lethal epithelial cellular
      injury promotes crystal nucleation, aggregation and retention.
    explanation: >-
      Documents that epithelial injury and dysfunction both result from and
      reinforce crystal retention, supporting the feed-forward injury loop at
      this effector node. Evidence source is OTHER because this is a review
      synthesizing human and animal-model data.
  downstream:
  - target: Symptomatic Kidney Stones
- name: Symptomatic Kidney Stones
  description: >-
    Continued growth and aggregation of retained, matrix-coated crystals on
    plugs or plaques produces a clinically significant calculus. The stone can
    obstruct the urinary tract and classically presents with reno-ureteral
    (renal) colic, often with haematuria, and has a high recurrence rate. This
    is the clinical phenotype of nephrolithiasis, the consequence of the
    conserved supersaturation-nucleation-retention-injury chain.
  role: consequence
  evidence:
  - reference: PMID:27188687
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Patients with urinary stones generally present with the typical
      reno-ureteral colic and less frequently with loin pain; associated
      manifestations could be gross haematuria, vomiting and sometimes fever.
    explanation: >-
      Describes the symptomatic clinical presentation of kidney stones
      (reno-ureteral colic, haematuria) that is the consequence of this module.
      Evidence source is OTHER because this is an authoritative review.
  - reference: PMID:27188687
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Stone formation is highly prevalent, with rates of up to 14.8% and
      increasing, and a recurrence rate of up to 50% within the first 5 years of
      the initial stone episode.
    explanation: >-
      Establishes the high recurrence rate of kidney stones, a defining feature
      of the symptomatic-stone consequence node. Evidence source is OTHER
      because this is a review.
