name: Hemolytic Anemia Erythrocyte Destruction Module
description: >-
  A conserved pathophysiology module representing the premature destruction of
  circulating red blood cells that produces hemolytic anemia (HP:0001878,
  MONDO:0002280) across mechanistically diverse disorders. The initiating lesion
  varies: intrinsic membrane and cytoskeletal defects (e.g., hereditary
  spherocytosis), enzymopathies (e.g., glucose-6-phosphate dehydrogenase or
  pyruvate kinase deficiency), hemoglobinopathies (e.g., sickle cell disease,
  beta-thalassemia), and extrinsic antibody-mediated, complement-mediated, or
  mechanical (microangiopathic) insults. Despite this diversity, the downstream
  sequence repeatedly converges on reduced erythrocyte integrity, oxidative and
  membrane injury that marks cells for removal, accelerated extravascular splenic
  macrophage erythrophagocytosis and/or intravascular hemolysis, a shortened
  erythrocyte lifespan that outstrips compensatory erythropoiesis, and the
  resulting anemia with jaundice and splenomegaly. Individual disorder entries
  declare conformance via conforms_to on their pathophysiology nodes,
  substituting disorder-specific cell types and primary lesions (defective
  membrane protein, deficient enzyme, abnormal hemoglobin, or autoantibody) while
  preserving the conserved causal chain.
category: Module
creation_date: "2026-06-06T00:00:00Z"
notes: >-
  This is a mechanism module, not a specific disease. Disorder entries reference
  individual nodes via conforms_to (e.g.,
  "hemolytic_anemia_erythrocyte_destruction#Premature Erythrocyte Destruction").
  The module defines the expected pathophysiology structure; conforming nodes in
  disorder files should include the corresponding cell types, biological
  processes, and causal edges, specialized to their primary lesion. Key
  disorder-specific substitutions: hereditary spherocytosis substitutes a defective
  membrane/cytoskeletal protein (ankyrin-1, band 3, spectrin) at the trigger node;
  G6PD and pyruvate kinase deficiency substitute the deficient enzyme; sickle cell
  disease and thalassemia substitute the abnormal hemoglobin and add ineffective
  erythropoiesis; autoimmune hemolytic anemia substitutes anti-erythrocyte
  autoantibody and complement at the trigger and central-effector nodes. The
  generic effector cell at the destruction node is the macrophage (CL:0000235),
  representing the splenic red-pulp macrophage that performs erythrophagocytosis.
pathophysiology:
- name: Reduced Erythrocyte Integrity
  description: >-
    The cascade is initiated by an intrinsic red blood cell defect (membrane or
    cytoskeletal protein abnormality, enzyme deficiency, or abnormal hemoglobin)
    or by an extrinsic antibody-mediated, complement-mediated, or mechanical
    insult. The nature of the lesion varies by disorder, but each compromises
    erythrocyte integrity and deformability and renders the cell vulnerable to
    premature removal from the circulation.
  role: trigger
  cell_types:
  - preferred_term: erythrocyte
    term:
      id: CL:0000232
      label: erythrocyte
  biological_processes:
  - preferred_term: response to oxidative stress
    term:
      id: GO:0006979
      label: response to oxidative stress
    modifier: DYSREGULATED
  evidence:
  - reference: PMID:15202694
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Disorders of red blood cell enzymes, membranes, and hemoglobin cause
      hereditary hemolytic anemias. Glucose-6-phosphate dehydrogenase deficiency
      leads to hemolysis in the presence of oxidative stress.
    explanation: >-
      Review establishes that intrinsic defects of red cell enzymes, membranes,
      and hemoglobin are the conserved initiating lesions of hereditary hemolytic
      anemia, with G6PD deficiency exemplifying the oxidative-stress trigger.
      Evidence source is OTHER because this is a review synthesizing multiple
      study types.
  - reference: PMID:40008208
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      The causes of hereditary spherocytosis are mutations in genes that encode
      red blood cell (RBC) membrane and cytoskeletal proteins, including
      ankyrin-1, Band 3 (or AE1), α spectrin, β spectrin, and protein 4.2.
      Molecular defects in these proteins decrease membrane integrity, leading to
      vesiculation, decreased membrane surface area, and reduced deformability of
      the cells.
    explanation: >-
      Provides a representative intrinsic-lesion example: membrane/cytoskeletal
      protein defects reduce membrane integrity and deformability, the generic
      trigger state of this module. Evidence source is OTHER because this is a
      review article.
  downstream:
  - target: Oxidative and Membrane Injury

- name: Oxidative and Membrane Injury
  description: >-
    The primary lesion is amplified by oxidative damage and progressive injury to
    the erythrocyte membrane and cytoskeleton. Reactive oxygen species, impaired
    antioxidant defenses, hemoglobin denaturation (Heinz bodies), and loss of
    membrane surface area reduce deformability and expose removal signals such as
    phosphatidylserine, marking the cell for clearance.
  role: amplifier
  cell_types:
  - preferred_term: erythrocyte
    term:
      id: CL:0000232
      label: erythrocyte
  biological_processes:
  - preferred_term: response to oxidative stress
    term:
      id: GO:0006979
      label: response to oxidative stress
    modifier: INCREASED
  evidence:
  - reference: PMID:11985579
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: >-
      The increased susceptibility of G6PD-deficient erythrocytes to membrane
      protein aspartate damage in response to oxidative stress suggests the
      involvement of protein deamidation/isomerization in the mechanisms of cell
      injury and haemolysis.
    explanation: >-
      Direct experimental evidence that oxidative stress amplifies membrane
      protein damage in vulnerable erythrocytes, linking oxidative injury to the
      mechanism of hemolysis.
  - reference: PMID:40008208
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Molecular defects in these proteins decrease membrane integrity, leading to
      vesiculation, decreased membrane surface area, and reduced deformability of
      the cells.
    explanation: >-
      Establishes that membrane injury and loss of surface area reduce
      deformability, the conserved amplification step that primes cells for
      removal. Evidence source is OTHER because this is a review article.
  downstream:
  - target: Premature Erythrocyte Destruction

- name: Premature Erythrocyte Destruction
  description: >-
    Damaged, poorly deformable, or antibody/complement-opsonized erythrocytes are
    destroyed prematurely. Extravascularly, splenic red-pulp macrophages
    recognize removal signals (phosphatidylserine exposure, bound immunoglobulin,
    or complement opsonins) and perform erythrophagocytosis; intravascularly,
    complement-mediated lysis or mechanical fragmentation destroys cells within
    the circulation. This is the central effector step shared across hereditary
    and acquired hemolytic anemias.
  role: central_effector
  cell_types:
  - preferred_term: splenic red-pulp macrophage
    term:
      id: CL:0000235
      label: macrophage
  biological_processes:
  - preferred_term: erythrocyte clearance
    term:
      id: GO:0034102
      label: erythrocyte clearance
    modifier: INCREASED
  - preferred_term: phagocytosis
    term:
      id: GO:0006909
      label: phagocytosis
    modifier: INCREASED
  evidence:
  - reference: PMID:41137641
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: >-
      PROS1 enhances the phagocytosis of ionomycin-treated PtdSer-positive
      erythrocytes and of eryghosts generated in vitro.
    explanation: >-
      Demonstrates that phosphatidylserine-exposing altered erythrocytes are
      cleared by macrophage phagocytosis, the extravascular destruction mechanism
      central to this module.
  - reference: PMID:39487134
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      In wAIHA, IgG autoantibody reacts with autologous RBCs at 37 °C, leading to
      antibody-dependent cell-mediated cytotoxicity and increased phagocytosis of
      RBCs in the spleen.
    explanation: >-
      Establishes that, in the acquired antibody-mediated arm, opsonized
      erythrocytes converge on the same splenic phagocytic destruction pathway.
      Evidence source is OTHER because this is a review (Nature Reviews Disease
      Primers) synthesizing multiple study types.
  downstream:
  - target: Shortened Erythrocyte Lifespan and Erythropoietic Strain

- name: Shortened Erythrocyte Lifespan and Erythropoietic Strain
  description: >-
    Accelerated destruction shortens the erythrocyte lifespan and releases
    hemoglobin and its breakdown products (unconjugated bilirubin). The bone
    marrow responds with compensatory erythropoiesis and reticulocytosis, but in
    severe disease, or where erythropoiesis is itself ineffective (as in
    thalassemia), production cannot keep pace with loss, so red cell mass falls.
  role: effector
  cell_types:
  - preferred_term: erythrocyte
    term:
      id: CL:0000232
      label: erythrocyte
  biological_processes:
  - preferred_term: erythrocyte homeostasis
    term:
      id: GO:0034101
      label: erythrocyte homeostasis
    modifier: ABNORMAL
  - preferred_term: erythropoiesis
    term:
      id: GO:0030218
      label: erythrocyte differentiation
    modifier: INCREASED
  evidence:
  - reference: PMID:21705976
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      In beta thalassemia, unbalanced alpha globin chain synthesis results in
      severely rheologically compromised erythrocytes with premature destruction
      in the peripheral circulation and ineffective erythropoiesis within the
      bone marrow and in extramedullary sites.
    explanation: >-
      Directly couples premature peripheral destruction with the erythropoietic
      response, illustrating that compensatory (and in thalassemia ineffective)
      erythropoiesis fails to maintain red cell mass. Evidence source is OTHER
      because this is a review article.
  - reference: PMID:40008208
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Nevertheless, splenectomy increases the lifespan of red cells,
      significantly reducing the severity of anemia and improving many
      physiological signs of HS.
    explanation: >-
      Shows that erythrocyte lifespan is the proximate determinant of anemia
      severity: lengthening lifespan (by removing the destruction site) reduces
      anemia. Evidence source is OTHER because this is a review article.
  downstream:
  - target: Hemolytic Anemia

- name: Hemolytic Anemia
  description: >-
    When the rate of erythrocyte destruction exceeds the rate of compensatory
    production, red cell mass and hemoglobin fall, producing anemia. The
    hemolytic state is clinically recognized by anemia together with
    reticulocytosis, jaundice from increased unconjugated bilirubin, and often
    splenomegaly. This is the convergent disease-like phenotype (HP:0001878,
    MONDO:0002280) shared across all conforming disorders.
  role: consequence
  biological_processes:
  - preferred_term: erythrocyte homeostasis
    term:
      id: GO:0034101
      label: erythrocyte homeostasis
    modifier: ABNORMAL
  evidence:
  - reference: PMID:15202694
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Hemolysis presents as acute or chronic anemia, reticulocytosis, or
      jaundice. The diagnosis is established by reticulocytosis, increased
      unconjugated bilirubin and lactate dehydrogenase, decreased haptoglobin,
      and peripheral blood smear findings. Premature destruction of erythrocytes
      occurs intravascularly or extravascularly.
    explanation: >-
      Defines the consequence node: premature erythrocyte destruction produces
      anemia with reticulocytosis and jaundice, the convergent hemolytic anemia
      phenotype. Evidence source is OTHER because this is a review.
