name: Enabling Replicative Immortality Module
description: >-
  A conserved mechanism module for the fourth hallmark of cancer (Hanahan &
  Weinberg): the acquisition of unlimited replicative potential. Normal
  somatic cells can complete only a finite number of divisions because
  telomeres - the protective repeat caps on chromosome ends - shorten with
  each round of DNA replication, eventually triggering replicative
  senescence or crisis. This telomere clock is a powerful tumor-suppressive
  barrier. The conserved causal chain runs from progressive telomere
  attrition during clonal expansion through a proliferative crisis, to
  reactivation of a telomere-maintenance mechanism - in the great majority
  of cancers, transcriptional reactivation of the telomerase reverse
  transcriptase (TERT; via TERT promoter mutation, amplification, or
  rearrangement), and in a minority the recombination-based alternative
  lengthening of telomeres (ALT) - which stabilizes telomere length and
  confers unlimited proliferative capacity (replicative immortality).
  Individual disorder entries declare conformance via conforms_to,
  substituting the tumor-type-specific telomere-maintenance route (e.g.,
  TERT promoter mutations in melanoma and glioblastoma, ALT in
  ATRX/DAXX-mutant tumors). This module is the immortality-enabling counterpart of the
  tumor-suppressive senescence captured in cellular_senescence and
  senescence_tumor_suppression.
category: Module
creation_date: "2026-06-27T00:00:00Z"
notes: >-
  This is a mechanism module, not a specific disease. Disorder entries
  reference individual nodes via conforms_to (e.g.,
  "enabling_replicative_immortality#Telomere Maintenance Reactivation"). The
  module defines the expected pathophysiology structure; conforming nodes in
  disorder files should include the corresponding biological processes and
  causal edges, specialized to their tumor context. Key tumor-specific
  substitutions: melanoma and glioblastoma use TERT promoter mutations;
  pediatric/ATRX-DAXX-mutant tumors use ALT. The opposing tumor-suppressive
  reading of telomere attrition / senescence as a barrier is captured in
  cellular_senescence and senescence_tumor_suppression. Key conformance
  target: "enabling_replicative_immortality#Telomere Maintenance
  Reactivation".
pathophysiology:
- name: Progressive Telomere Attrition
  description: >-
    Because conventional DNA polymerases cannot fully replicate chromosome
    ends (the end-replication problem), telomeres shorten with each cell
    division in cells lacking active telomerase. As a premalignant clone
    expands, telomeres erode toward a critically short length, which
    normally signals a DNA-damage response and engages the
    replicative-senescence or crisis barrier.
  role: trigger
  biological_processes:
  - preferred_term: Telomere Maintenance via Telomere Lengthening
    term:
      id: GO:0010833
      label: telomere maintenance via telomere lengthening
    modifier: DECREASED
  evidence:
  - reference: PMID:27029895
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      The repression of telomerase and shorter telomeres in humans may have
      evolved, in part, as an anticancer protection mechanism.
    explanation: >-
      Establishes telomere shortening and telomerase repression as a
      tumor-suppressive barrier, the trigger condition this module
      addresses. Evidence source is OTHER because this is a review article.
  downstream:
  - target: Replicative Senescence and Crisis Barrier
    description: >-
      Critically short telomeres engage the senescence/crisis barrier that
      limits replicative potential.

- name: Replicative Senescence and Crisis Barrier
  description: >-
    Critically short, uncapped telomeres are recognized as DNA double-strand
    breaks, activating p53/RB-dependent replicative senescence (the Hayflick
    limit) or, if those checkpoints are bypassed, a crisis state marked by
    chromosome end-to-end fusions and massive cell death. This barrier
    limits the number of divisions a lineage can complete and must be
    overcome for a clone to become immortal.
  role: effector
  biological_processes:
  - preferred_term: Replicative Senescence
    term:
      id: GO:0090399
      label: replicative senescence
    modifier: INCREASED
  downstream:
  - target: Telomere Maintenance Reactivation
    description: >-
      Rare clones that reactivate a telomere-maintenance mechanism escape
      the senescence/crisis barrier.

- name: Telomere Maintenance Reactivation
  description: >-
    A rare clone reactivates a telomere-maintenance mechanism, stabilizing
    telomere length and escaping the senescence/crisis barrier. In the great
    majority of human cancers this occurs through reactivation of telomerase
    (TERT) - via TERT promoter mutations, amplification, or rearrangement -
    while a minority use the recombination-based alternative lengthening of
    telomeres (ALT) pathway, frequently associated with ATRX/DAXX loss. This
    is the conserved central node disorder-specific lesions converge upon.
  role: central_effector
  biological_processes:
  - preferred_term: Telomere Maintenance via Telomerase
    term:
      id: GO:0007004
      label: telomere maintenance via telomerase
    modifier: INCREASED
  evidence:
  - reference: PMID:27029895
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      A hallmark of advanced malignancies is the ability for continuous cell
      divisions that almost universally correlates with the stabilization of
      telomere length by the reactivation of telomerase.
    explanation: >-
      Directly states that telomerase reactivation stabilizing telomere
      length underlies the continuous cell division of advanced
      malignancies, the central effector of this module. Evidence source is
      OTHER because this is a review article.
  downstream:
  - target: Replicative Immortality

- name: Replicative Immortality
  description: >-
    With telomeres stabilized, the cancer cell lineage acquires unlimited
    proliferative capacity - replicative immortality - decoupling division
    number from the telomere clock. This sustains the extensive clonal
    expansion required for macroscopic tumor growth and progression.
  role: consequence
  biological_processes:
  - preferred_term: Cell Population Proliferation
    term:
      id: GO:0008283
      label: cell population proliferation
    modifier: INCREASED
  evidence:
  - reference: PMID:21376230
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      They include sustaining proliferative signaling, evading growth
      suppressors, resisting cell death, enabling replicative immortality,
      inducing angiogenesis, and activating invasion and metastasis.
    explanation: >-
      Hanahan & Weinberg list enabling replicative immortality as a core
      hallmark capability, the consequence modeled here. Evidence source is
      OTHER because this is a review article.
