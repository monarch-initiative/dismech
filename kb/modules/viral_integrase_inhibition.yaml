  downstream:
  - target: Block of Proviral Integration into the Host Genome
    description: >-
      INSTI engagement of the intasome active site prevents strand transfer, so
      the reverse-transcribed viral cDNA is never covalently inserted as a
      provirus and productive infection is aborted.
  - target: Integrase Strand-Transfer Inhibitor Resistance
    description: >-
      Drug pressure on the integrase active site selects strand-transfer
      inhibitor resistance mutations that reduce INSTI binding.

- name: Block of Proviral Integration into the Host Genome
  description: >-
    Engagement of the intasome by an INSTI prevents the strand-transfer reaction,
    so the reverse-transcribed viral cDNA fails to integrate into host chromatin.
    Because integration is the committed step that converts a transient infection
    into a stable provirus, blocking it aborts the establishment of permanent
    infection in the target cell: the unintegrated viral DNA cannot serve as a
    durable transcriptional template and is degraded or persists only as
    short-lived episomal forms. This is the antiviral effector node — the
    consequence of engaging the integrase target — analogous to chain termination
    in the polymerase module or autolysis in the cell-wall module. The
    long-lived stability of the intasome/pre-integration complex, combined with
    the slow dissociation of bound INSTIs, makes this block durable in infected
    cells.
  role: consequence
