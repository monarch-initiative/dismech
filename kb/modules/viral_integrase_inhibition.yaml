name: Viral Integrase Inhibition Module
description: >-
  A conserved antiviral drug-mechanism module representing retroviral integrase,
  the enzyme that integrase strand-transfer inhibitors (INSTIs) target. Unlike
  the polymerase or protease, integration into the host genome is a step unique
  to the retroviruses: after reverse transcription, the virally encoded integrase
  catalyzes 3'-processing of the viral cDNA ends and then the strand-transfer
  reaction that covalently inserts the viral DNA into host chromatin to form the
  provirus, an essential and obligate step of the retroviral lifecycle.
  Integrase strand-transfer inhibitors (raltegravir, elvitegravir, dolutegravir,
  bictegravir, cabotegravir) chelate the catalytic Mg2+ ions in the integrase
  active site of the intasome and block the strand-transfer reaction, preventing
  proviral formation and aborting productive infection. Because integration is
  retrovirus-specific, these drugs are meaningless outside the retroviruses — an
  important gating point that distinguishes them from broadly applicable
  polymerase-targeting agents. This module defines the mechanism-of-action design
  pattern for integrase-targeting antiretroviral treatments: conforming
  viral-disease entries link a treatment to the specific node it inhibits via
  target_mechanisms. It also encodes why integrase-targeting therapy can fail —
  drug pressure selects integrase active-site mutations (notably the Y143, Q148,
  and N155 pathways) — and why the second-generation INSTIs dolutegravir and
  bictegravir, with their longer dissociative half-life and high genetic barrier
  to resistance, anchor modern regimens.
category: Module
creation_date: "2026-06-24T00:00:00Z"
notes: >-
  This is an antiviral drug-mechanism module, not a specific disease. Disorder
  entries reference individual nodes via conforms_to (e.g.,
  "viral_integrase_inhibition#Retroviral Integrase Strand Transfer as Drug
  Target"), and their integrase-targeting treatments point at the inhibited node
  via target_mechanisms (analogous to how polymerase-targeting treatments link to
  "viral_polymerase_inhibition#Viral Polymerase as the Replication Engine and
  Drug Target", and how cell-wall-active antibiotic treatments link to
  "bacterial_cell_wall_synthesis_inhibition#Peptidoglycan Cross-Linking by
  Penicillin-Binding Proteins"). Key conformance / treatment target: "Retroviral
  Integrase Strand Transfer as Drug Target" (the shared integrase target of all
  INSTIs). The module is pathogen-process-centric: nodes are druggable steps in
  proviral integration, not individual drugs; a given INSTI maps to the
  strand-transfer step it inhibits. This module is retrovirus-specific and
  typically applies alongside viral_polymerase_inhibition (reverse transcriptase)
  and viral_protease_inhibition for a disease such as
  Acquired_Immunodeficiency_Syndrome, mirroring the multi-module antibacterial
  examples. The resistance node captures the gating knowledge that distinguishes
  "an INSTI is used" from durable suppression — integrase active-site mutations
  that mandate combination therapy and the use of high-barrier second-generation
  agents. See projects/ANTIVIRAL.md.
pathophysiology:
- name: Retroviral Integrase Strand Transfer as Drug Target
  description: >-
    Retroviruses replicate through an obligate genome-integration step that has
    no counterpart in non-retroviral antiviral targets. Following reverse
    transcription, the virally encoded integrase assembles with the viral cDNA
    ends into a nucleoprotein complex called the intasome and catalyzes two
    reactions: 3'-processing, which trims the viral DNA termini, and strand
    transfer, which covalently inserts the processed ends into host chromosomal
    DNA to establish the provirus. This integrase is essential, conserved across
    the retroviruses, and absent from the host, making it a selectively
    exploitable drug target. Integrase strand-transfer inhibitors (INSTIs) —
    raltegravir, elvitegravir, dolutegravir, bictegravir, and cabotegravir — bind
    the intasome active site, chelate the two catalytic Mg2+ ions through an
    electronegative pharmacophore, displace the reactive 3' viral DNA end, and
    block the strand-transfer reaction. This is the central, most widely exploited
    node of the module and the canonical conformance / treatment target for
    integrase-directed antiretroviral therapy.
  role: therapeutic_vulnerability
  biological_processes:
  - preferred_term: Viral Genome Integration into Host DNA
    term:
      id: GO:0044826
      label: viral genome integration into host DNA
