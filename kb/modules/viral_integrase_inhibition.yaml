name: Viral Integrase Inhibition Module
description: >-
  The retroviral provirus-establishment pathway and the point at which integrase
  strand-transfer inhibitors (INSTIs) interrupt it, structured as a sequential
  biological cascade. Integration into the host genome is a step unique to the
  retroviruses, with no counterpart in non-retroviral antiviral targets. The
  pathway proceeds in obligate order: the virally encoded reverse transcriptase
  first copies the single-stranded viral RNA genome into a double-stranded linear
  cDNA; the virally encoded integrase then assembles with the cDNA ends into a
  nucleoprotein complex called the intasome and catalyzes 3'-processing followed
  by strand transfer, covalently inserting the viral cDNA into host chromatin;
  this establishes the stable integrated provirus that serves as the durable
  transcriptional template for progeny virus. The integrase strand-transfer
  reaction is the conserved, host-absent, retrovirus-specific catalytic step that
  the INSTI class exploits: raltegravir, elvitegravir, dolutegravir, bictegravir,
  and cabotegravir bind the intasome active site, chelate the two catalytic Mg2+
  ions through an electronegative pharmacophore, displace the reactive 3' viral
  DNA end, and block strand transfer. The net biological effect is suppression of
  proviral integration — the reverse-transcribed cDNA is never inserted and
  persists only as short-lived unintegrated episomal forms, aborting establishment
  of permanent infection. Because integrase, like other antiretroviral targets, is
  subject to drug-pressure selection, the same step generates active-site
  resistance mutations (the Y143, Q148, and N155 pathways); the second-generation
  INSTIs dolutegravir and bictegravir, with a longer dissociative half-life and a
  high genetic barrier, retain potency against most single-mutant variants and
  anchor modern regimens.
category: Module
creation_date: "2026-06-24T00:00:00Z"
notes: >-
  This is an antiviral drug-mechanism module structured as a biological pathway,
  not a specific disease. Its nodes are successive biological steps of retroviral
  provirus establishment (reverse transcription of the viral RNA genome into cDNA
  -> integrase strand transfer into host chromatin -> establishment of the
  integrated provirus), with an antiviral consequence node (suppression of
  proviral integration) and an adaptive resistance branch; the INSTI drug class
  that acts on the strand-transfer step is described in the node text rather than
  modelled as a separate node. Disorder entries reference individual nodes via
  conforms_to (e.g., "viral_integrase_inhibition#Integrase Strand Transfer into
  Host Chromatin"), and their integrase-targeting treatments point at the
  inhibited node via target_mechanisms (analogous to how polymerase-targeting
  treatments link to a node in viral_polymerase_inhibition, and how cell-wall-active
  antibiotic treatments link to a node in
  bacterial_cell_wall_synthesis_inhibition). Key conformance / treatment target:
  "Integrase Strand Transfer into Host Chromatin" (the shared integrase target of
  all INSTIs). This module is retrovirus-specific: integration has no counterpart
  in non-retroviral antiviral targets, so the module is meaningless outside the
  retroviruses. It typically applies alongside viral_polymerase_inhibition (the
  reverse-transcriptase step is the trigger of this very cascade) and
  viral_protease_inhibition for a disease such as Acquired_Immunodeficiency_Syndrome,
  mirroring the multi-module antibacterial examples. The resistance node captures
  the gating knowledge that distinguishes "an INSTI is used" from durable
  suppression — integrase active-site mutations that mandate combination therapy
  and the use of high-barrier second-generation agents. See projects/ANTIVIRAL.md.
pathophysiology:
- name: Reverse Transcription of the Viral RNA Genome into cDNA
  description: >-
    Retroviral provirus establishment begins when the virally encoded reverse
    transcriptase copies the single-stranded viral RNA genome into a
    double-stranded linear DNA (cDNA). This reverse-transcribed cDNA is the
    obligate precursor of the integrated provirus: until it exists, there is
    nothing for integrase to insert. Reverse transcription therefore both precedes
    and licenses the integration step that this module targets, and is itself the
    target of the separate viral_polymerase_inhibition module (the nucleos(t)ide
    and non-nucleoside reverse-transcriptase inhibitors). This node is the trigger
    of the integration cascade rather than the INSTI drug target.
  role: trigger
  biological_processes:
  - preferred_term: RNA-Templated DNA Biosynthetic Process
    term:
      id: GO:0006278
      label: RNA-templated DNA biosynthetic process
  evidence:
  - reference: PMID:29378611
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Reverse transcription of HIV-1 results in the generation of a linear cDNA
      that serves as the precursor to the integrated provirus.
    explanation: >-
      Establishes the trigger step of the cascade — reverse transcription
      generates the linear viral cDNA that is the obligate precursor of the
      integrated provirus, the substrate that integrase subsequently inserts.
      Evidence source is OTHER as this is a review article.
  downstream:
  - target: Integrase Strand Transfer into Host Chromatin
    description: >-
      The double-stranded viral cDNA produced by reverse transcription is the
      substrate that integrase assembles with and inserts into the host genome.

- name: Integrase Strand Transfer into Host Chromatin
  description: >-
    Once reverse transcription has produced the viral cDNA, the virally encoded
    integrase assembles with the cDNA ends into a nucleoprotein complex called the
    intasome and catalyzes two sequential reactions: 3'-processing, which trims the
    viral DNA termini, and strand transfer, which covalently inserts the processed
    3' ends into host chromosomal DNA. This integrase is essential, conserved
    across the retroviruses, and absent from the host, making it a selectively
    exploitable drug target with no counterpart in non-retroviral antivirals. This
    is the central, most widely exploited node of the module and the canonical
    conformance / treatment target. The integrase strand-transfer inhibitors
    (INSTIs) — raltegravir, elvitegravir, dolutegravir, bictegravir, and
    cabotegravir — bind the intasome active site, chelate the two catalytic Mg2+
    ions through an electronegative pharmacophore, displace the reactive 3' viral
    DNA end, and block the strand-transfer reaction. Because INSTIs engage the
    end of the viral DNA within the intasome, they inhibit the assembled complex
    but not free integrase.
  role: therapeutic_vulnerability
  biological_processes:
  - preferred_term: Viral Genome Integration into Host DNA
    term:
      id: GO:0044826
      label: viral genome integration into host DNA
  molecular_functions:
  - preferred_term: Catalytic Activity, Acting on DNA
    term:
      id: GO:0140097
      label: catalytic activity, acting on DNA
  evidence:
  - reference: PMID:32624197
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      INSTIs work by blocking retroviral integration; an essential step in the
      viral lifecycle that is catalyzed by the virally encoded IN protein within
      a nucleoprotein assembly called an intasome.
    explanation: >-
      Structural-biology review establishing that integrase strand-transfer
      inhibitors act on the essential, retrovirus-specific integration step
      catalyzed by integrase within the intasome — the catalytic drug target this
      node defines. Evidence source is OTHER as this is a review article.
  - reference: PMID:36558984
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      integrase strand transfer inhibitors (INSTIs)
    explanation: >-
      A second INSTI review names the integrase strand-transfer inhibitor class,
      corroborating integrase strand transfer as the antiretroviral drug target of
      this node. Evidence source is OTHER as this is a review article.
  downstream:
  - target: Establishment of the Integrated Provirus
    description: >-
      Successful strand transfer covalently inserts the viral cDNA into host
      chromatin, establishing the stable integrated provirus.
  - target: Integrase Strand-Transfer Inhibitor Resistance
    description: >-
      Drug pressure on the integrase active site selects strand-transfer
      inhibitor resistance mutations that reduce INSTI binding.
  - target: Suppression of Proviral Integration
    description: >-
      When strand transfer is pharmacologically blocked by an integrase
      strand-transfer inhibitor, no provirus is formed — the antiviral
      consequence of inhibiting this step.

- name: Establishment of the Integrated Provirus
  description: >-
    Completion of strand transfer covalently inserts the reverse-transcribed viral
    cDNA into host chromosomal DNA, establishing the integrated provirus. The
    provirus is the committed, durable end-state of the cascade: it persists as a
    stable transcriptional template within the host genome and supports production
    of progeny virus, converting a transient infection into a permanent one. This
    is the effector node of the integration pathway — the biological outcome that
    INSTIs are deployed to prevent.
  role: effector
  biological_processes:
  - preferred_term: Establishment of Integrated Proviral Latency
    term:
      id: GO:0075713
      label: establishment of integrated proviral latency
  evidence:
  - reference: PMID:32624197
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      the PIC is a stable entity in cells that can persist for days, and INSTI
      binding accordingly stabilizes the molecules in the IN active site for
      prolonged periods of time
    explanation: >-
      Supports the stability of the integration machinery that establishes the
      durable provirus — the pre-integration complex is long-lived, and the same
      durability that makes the provirus a stable end-state also sustains INSTI
      inhibition at the active site. Evidence source is OTHER as this is a review
      article.
  - reference: PMID:29378611
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Reverse transcription of HIV-1 results in the generation of a linear cDNA
      that serves as the precursor to the integrated provirus.
    explanation: >-
      Names the integrated provirus as the established end-product of the cascade,
      for which the reverse-transcribed cDNA is the precursor. Evidence source is
      OTHER as this is a review article.

- name: Suppression of Proviral Integration
  description: >-
    When an INSTI engages the intasome and blocks strand transfer, the
    reverse-transcribed viral cDNA fails to integrate into host chromatin, so no
    provirus is established. The unintegrated viral DNA cannot serve as a durable
    transcriptional template and persists only as short-lived episomal forms (1-LTR
    and 2-LTR circles) before being degraded; clinically, adding an integrase
    inhibitor produces a measurable rise in these unintegrated 2-LTR circles,
    a direct readout that integration has been suppressed. This is the antiviral
    consequence of engaging the integrase target — analogous to chain termination
    in the polymerase module or autolysis in the cell-wall module — and aborts
    establishment of permanent infection in the target cell.
  role: consequence
  biological_processes:
  - preferred_term: Negative Regulation of Viral Process
    term:
      id: GO:0048525
      label: negative regulation of viral process
  evidence:
  - reference: PMID:32624197
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      thereby preventing the virus from establishing a permanent infection in the
      target cell.
    explanation: >-
      Directly states the antiviral consequence of suppressing integration —
      blocking strand transfer prevents the virus from establishing a permanent
      (proviral) infection in the target cell. Evidence source is OTHER as this is
      a review article.
  - reference: PMID:29378611
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      the addition of an integrase inhibitor (raltegravir) to stable regimens
      resulted
    explanation: >-
      Clinical evidence that integrase inhibition acts at this step — adding the
      integrase inhibitor raltegravir shifts viral DNA toward unintegrated 2-LTR
      circles, the direct signature of suppressed proviral integration. Evidence
      source is OTHER as this is a review article.

- name: Integrase Strand-Transfer Inhibitor Resistance
  description: >-
    Like other antiretroviral targets, integrase is subject to drug-resistance
    selection. Replication under INSTI pressure selects integrase active-site
    substitutions that reduce inhibitor binding — most commonly the Y143, Q148
    (often with the compensatory G140S/A), and N155 pathways for the
    first-generation agents raltegravir and elvitegravir. These mutations
    typically destabilize Mg2+ coordination or sterically perturb the active site.
    The second-generation INSTIs dolutegravir and bictegravir, with an expanded
    tricyclic scaffold, additional active-site contacts, and a much longer
    dissociative half-life, retain potency against most single-mutant variants and
    carry a high genetic barrier to resistance; in dolutegravir-based combination
    therapy, treatment-emergent integrase resistance is rare. This branch off the
    strand-transfer node explains why integrase-targeting monotherapy fails, why
    durable suppression relies on combination regimens and high-barrier
    second-generation agents, and why prior NRTI resistance and INSTI monotherapy
    raise the risk of dolutegravir failure. Conforming entries can attach a
    treatment's failure mode or combination rationale to this node.
  role: adaptive_escape
  biological_processes:
  - preferred_term: Response to Xenobiotic Stimulus
    term:
      id: GO:0009410
      label: response to xenobiotic stimulus
  evidence:
  - reference: PMID:32624197
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Some of the most common resistance pathways involved HIV IN residues Y143,
      Q148, and N155
    explanation: >-
      Identifies the principal integrase active-site resistance pathways (Y143,
      Q148, N155) selected under INSTI pressure, the molecular basis of this
      resistance branch. Evidence source is OTHER as this is a review article.
  - reference: PMID:32624197
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Second-generation INSTIs inhibit broad panels of VRVs
    explanation: >-
      Supports the high genetic barrier of second-generation INSTIs (dolutegravir,
      bictegravir), which retain potency against many resistant variants — the
      rationale for their use over first-generation agents. Evidence source is
      OTHER as this is a review article.
  - reference: PMID:37832567
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Among people with viraemia on dolutegravir-based ART, INSTI DRMs and
      dolutegravir resistance were rare. NRTI resistance substantially increased
      the risk of dolutegravir resistance
    explanation: >-
      Large collaborative cohort analysis confirming that dolutegravir resistance
      is rare on combination therapy but that NRTI resistance raises its risk,
      supporting the high-barrier / combination-dependent gating this node
      encodes. Evidence source is HUMAN_CLINICAL as this is a multi-cohort
      clinical study.
