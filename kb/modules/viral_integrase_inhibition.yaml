- name: Integrase Strand-Transfer Inhibitor Resistance
  description: >-
    Like other antiretroviral targets, integrase is subject to drug-resistance
    selection. Replication under INSTI pressure selects integrase active-site
    substitutions that reduce inhibitor binding — most commonly the Y143, Q148
    (often with the compensatory G140S/A), and N155 pathways for the
    first-generation agents raltegravir and elvitegravir. These mutations
    typically destabilize Mg2+ coordination or sterically perturb the active
    site. The second-generation INSTIs dolutegravir and bictegravir, with an
    expanded tricyclic scaffold, additional active-site contacts, and a much
    longer dissociative half-life, retain potency against most single-mutant
    variants and carry a high genetic barrier to resistance; in dolutegravir-based
    combination therapy, treatment-emergent integrase resistance is rare. This
    node explains why integrase-targeting monotherapy fails, why durable
    suppression relies on combination regimens and high-barrier second-generation
    agents, and why prior NRTI resistance and INSTI monotherapy raise the risk of
    dolutegravir failure. Conforming entries can attach a treatment's failure mode
    or combination rationale to this node.
  role: adaptive_escape
  biological_processes:
  - preferred_term: Viral Genome Integration into Host DNA
    term:
      id: GO:0044826
      label: viral genome integration into host DNA
  evidence:
  - reference: PMID:32624197
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Some of the most common resistance pathways involved HIV IN residues Y143,
      Q148, and N155
    explanation: >-
      Identifies the principal integrase active-site resistance pathways (Y143,
      Q148, N155) selected under INSTI pressure, the molecular basis of this
      resistance node. Evidence source is OTHER as this is a review article.
  - reference: PMID:32624197
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Second-generation INSTIs inhibit broad panels of VRVs
    explanation: >-
      Supports the high genetic barrier of second-generation INSTIs (dolutegravir,
      bictegravir), which retain potency against many resistant variants — the
      rationale for their use over first-generation agents. Evidence source is
      OTHER as this is a review article.
  - reference: PMID:37832567
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Among people with viraemia on dolutegravir-based ART, INSTI DRMs and
      dolutegravir resistance were rare. NRTI resistance substantially increased
      the risk of dolutegravir resistance
    explanation: >-
      Large collaborative cohort analysis confirming that dolutegravir resistance
      is rare on combination therapy but that NRTI resistance raises its risk,
      supporting the high-barrier / combination-dependent gating this node
      encodes. Evidence source is HUMAN_CLINICAL as this is a multi-cohort
      clinical study.
