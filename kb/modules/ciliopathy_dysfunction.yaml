name: Ciliopathy Cilium Dysfunction Module
description: >-
  A conserved developmental and degenerative module for the ciliopathies. Diverse
  upstream lesions in genes encoding basal body, transition zone, and
  intraflagellar transport (IFT) components disrupt the assembly, gating, and
  cargo trafficking of the primary cilium. Because the cilium is the cell's
  signaling antenna, these defects converge on impaired cilium-dependent signal
  transduction, principally Hedgehog (smoothened) signaling and non-canonical
  Wnt / planar cell polarity (PCP) signaling. The shared signaling failure is
  read out differently in each ciliated tissue, producing the pleiotropic,
  multisystem phenotype that unites Bardet-Biedl, Joubert, nephronophthisis,
  Jeune, Alstrom, Meckel, orofaciodigital, and short-rib polydactyly syndromes:
  retinal degeneration, cystic-fibrotic kidney disease, skeletal dysplasia with
  polydactyly, cerebellar/CNS malformation, and metabolic dysfunction. A
  parallel motile-cilia arm captures the distinct mechanism of primary ciliary
  dyskinesia, in which axonemal motility defects impair mucociliary clearance and
  left-right body patterning. Disorder entries reference these nodes via
  conforms_to and substitute gene- and organ-specific cell types and lesions.
category: Module
creation_date: "2026-05-30T00:00:00Z"
notes: >-
  This is a shared mechanism module, not a specific disease. Disorder entries
  reference individual nodes via conforms_to (for example,
  "ciliopathy_dysfunction#Impaired Hedgehog Signal Transduction"). The module
  distinguishes two mechanistic arms that emanate from a shared basal body /
  transition zone trigger: (1) a primary (non-motile) cilium signaling arm that
  dominates the classic syndromic ciliopathies (BBS, Joubert, nephronophthisis,
  Meckel, Jeune, short-rib polydactyly, orofaciodigital, Alstrom), and (2) a
  motile cilium arm that underlies primary ciliary dyskinesia. The same gene can
  produce widely divergent organ involvement, so conforming disorder nodes should
  substitute the organ-specific cell type and lesion while preserving the
  conserved causal chain. Organ-specific reads of the shared signaling defect:
  photoreceptor connecting cilium (retina), tubular epithelium (kidney),
  growth-plate chondrocytes (skeleton), cerebellar vermis (CNS), and hypothalamic
  neurons (energy balance).
mechanistic_hypotheses:
- hypothesis_group_id: primary_cilium_signaling_model
  hypothesis_label: Primary Cilium Signaling Defect Model
  status: CANONICAL
  description: >-
    Basal body, transition zone, and IFT defects impair assembly and gating of
    the non-motile primary cilium, disrupting cilium-dependent Hedgehog and
    non-canonical Wnt/PCP signal transduction. The resulting developmental and
    homeostatic signaling failure produces the pleiotropic retinal, renal,
    skeletal, CNS, and metabolic phenotypes of the syndromic ciliopathies.
  evidence:
  - reference: PMID:28698599
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      investigating ciliopathies has helped us to understand the molecular
      mechanisms by which the cilium-associated basal body functions in early
      ciliogenesis, as well as how the transition zone functions in ciliary
      gating, and how intraflagellar transport enables cargo trafficking and
      signalling.
    explanation: >-
      Establishes the canonical framework that ciliopathy genes act through the
      basal body, transition zone, and IFT to control ciliogenesis, gating, and
      cilium-based signaling. Evidence source is OTHER because this is a review.
- hypothesis_group_id: motile_cilia_dysfunction_model
  hypothesis_label: Motile Cilia Dysfunction Model
  status: ALTERNATIVE
  description: >-
    A distinct arm in which the same basal body / axonemal program supports
    motile cilia. Axonemal dynein and docking-complex defects impair ciliary
    beating, producing reduced mucociliary clearance and randomized left-right
    body asymmetry. This arm underlies primary ciliary dyskinesia and is largely
    independent of the Hedgehog/PCP signaling read-out of the primary-cilium arm.
  evidence:
  - reference: PMID:27859258
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Ciliopathies are inherited human disorders caused by both motile and
      non-motile cilia dysfunction that form an important and rapidly expanding
      disease category.
    explanation: >-
      Distinguishes the motile and non-motile cilia disease arms that this module
      separates into two hypothesis groups. Evidence source is OTHER (review).
discussions:
- discussion_id: gap_ciliopathy_genotype_phenotype_pleiotropy
  prompt: >-
    Why do mutations in the same ciliary gene produce such divergent organ
    involvement across ciliopathy patients, and what determines which tissues
    (retina, kidney, skeleton, brain) decompensate first?
  kind: KNOWLEDGE_GAP
  status: OPEN
  attaches_to:
  - pathophysiology#Basal Body and Transition Zone Dysfunction
  - pathophysiology#Multisystem Pleiotropic Ciliopathy Phenotype
  rationale: >-
    Ciliopathies show extensive phenotypic overlap and variability, with the same
    gene giving rise to different syndromes and broad inter-individual variation.
    A predictive map from specific ciliary subcompartment lesion to tissue-level
    decompensation is still lacking, limiting prognostication and trial design.
pathophysiology:
- name: Basal Body and Transition Zone Dysfunction
  description: >-
    The shared upstream lesion of the ciliopathies. Mutations in genes encoding
    basal body, transition zone, BBSome, or intraflagellar transport (IFT)
    components impair docking of the basal body, ciliary membrane gating at the
    transition zone, and bidirectional cargo transport along the axoneme. The
    result is defective ciliogenesis or a structurally present but functionally
    incompetent cilium that cannot correctly compartmentalize signaling
    machinery. The specific module affected (basal body, transition zone, IFT,
    or axonemal motility) varies by gene and biases the downstream phenotype.
  role: trigger
  cell_types:
  - preferred_term: ciliated cell
    term:
      id: CL:0000064
      label: ciliated cell
  biological_processes:
  - preferred_term: cilium assembly
    term:
      id: GO:0060271
      label: cilium assembly
    modifier: DECREASED
  - preferred_term: protein localization to cilium
    term:
      id: GO:0061512
      label: protein localization to cilium
    modifier: ABNORMAL
  - preferred_term: intraflagellar transport
    term:
      id: GO:0042073
      label: intraciliary transport
    modifier: ABNORMAL
  evidence:
  - reference: PMID:28698599
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      investigating ciliopathies has helped us to understand the molecular
      mechanisms by which the cilium-associated basal body functions in early
      ciliogenesis, as well as how the transition zone functions in ciliary
      gating, and how intraflagellar transport enables cargo trafficking and
      signalling.
    explanation: >-
      Directly identifies the basal body, transition zone, and IFT as the
      conserved ciliary subcompartments whose dysfunction underlies ciliopathies.
      Evidence source is OTHER because this is a review.
  - reference: PMID:27859258
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Mutations affecting these distinct ciliary protein modules can confer
      different genetic diseases and new clinical classifications are possible to
      define, according to the nature and extent of organ involvement.
    explanation: >-
      Supports the idea that lesions in distinct ciliary subcompartments (basal
      body, transition zone, IFT, motility) define different ciliopathy
      phenotypes. Evidence source is OTHER (review).
  - reference: PMID:21071598
    supports: SUPPORT
    evidence_source: MODEL_ORGANISM
    snippet: >-
      ALMS1 was localized to the basal bodies of hair cells and supporting cells.
    explanation: >-
      Shows that a ciliopathy protein (Alstrom syndrome ALMS1) localizes to the
      basal body, anchoring this gene-specific lesion to the shared trigger node.
      Evidence source is MODEL_ORGANISM (rat/mouse cochlea).
  downstream:
  - target: Impaired Hedgehog Signal Transduction
    description: >-
      Loss of the gated, signaling-competent primary cilium disrupts
      cilium-dependent Hedgehog signal transduction.
    hypothesis_groups:
    - primary_cilium_signaling_model
  - target: Planar Cell Polarity and Non-Canonical Wnt Disruption
    description: >-
      Defective ciliary function disrupts non-canonical Wnt / planar cell
      polarity signaling during tissue morphogenesis.
    hypothesis_groups:
    - primary_cilium_signaling_model
  - target: Motile Cilia Beat Dysfunction
    description: >-
      When the affected genes serve the motile cilium axoneme, the same basal
      body program yields beating-incompetent cilia rather than a signaling
      defect.
    hypothesis_groups:
    - motile_cilia_dysfunction_model

- name: Impaired Hedgehog Signal Transduction
  description: >-
    The primary cilium is the obligate organelle for vertebrate Hedgehog signal
    transduction: pathway components including SMO and GLI transcription factors
    traffic through the ciliary compartment to convert Hedgehog ligand into a
    transcriptional response. Ciliary assembly or trafficking defects derange
    this process, perturbing GLI activator/repressor balance. Because Hedgehog
    signaling patterns the limb, neural tube, and skeleton, its disruption
    produces polydactyly, neural tube and cerebellar defects, and skeletal
    dysplasia.
  role: central_effector
  biological_processes:
  - preferred_term: Hedgehog (smoothened) signaling pathway
    term:
      id: GO:0007224
      label: smoothened signaling pathway
    modifier: DYSREGULATED
  evidence:
  - reference: PMID:27881449
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      It has been a decade since it was discovered that primary cilia have an
      essential role in Hedgehog (Hh) signaling in mammals.
    explanation: >-
      Establishes the obligate role of the primary cilium in mammalian Hedgehog
      signal transduction, the central effector defect of the syndromic
      ciliopathies. Evidence source is OTHER (review).
  - reference: PMID:27666822
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: >-
      mutant cells produced elongated cilia, had altered hedgehog signaling, had
      increased post-translation modification of tubulin, and showed evidence of
      destabilization of additional anterograde transport complex components.
    explanation: >-
      Demonstrates in IFT81-mutant chondrocytes that disrupted ciliary transport
      directly produces abnormal cilia and altered Hedgehog signaling, linking
      the ciliary lesion to the Hedgehog effector defect. Evidence source is
      IN_VITRO (patient-mutation chondrocyte study).
  downstream:
  - target: Skeletal Dysplasia with Polydactyly and Thoracic Constriction
    description: >-
      Disrupted Hedgehog signaling in the developing limb and growth plate causes
      polydactyly and chondrodysplasia.
  - target: Cerebellar and CNS Malformation
    description: >-
      Aberrant Hedgehog (and related) signaling perturbs midbrain-hindbrain and
      neural tube patterning.

- name: Planar Cell Polarity and Non-Canonical Wnt Disruption
  description: >-
    Beyond Hedgehog, the primary cilium and its basal body coordinate
    non-canonical Wnt / planar cell polarity (PCP) signaling, which orients cells
    within the plane of a tissue and drives convergent-extension morphogenesis.
    Ciliary dysfunction disturbs PCP, contributing to defects in tube elongation
    and diameter control (kidney tubules), cochlear and stereociliary bundle
    orientation, and neural tube closure.
  role: central_effector
  biological_processes:
  - preferred_term: non-canonical Wnt signaling pathway
    term:
      id: GO:0035567
      label: non-canonical Wnt signaling pathway
    modifier: DYSREGULATED
  - preferred_term: establishment of planar polarity
    term:
      id: GO:0001736
      label: establishment of planar polarity
    modifier: ABNORMAL
  evidence:
  - reference: PMID:26966880
    supports: SUPPORT
    evidence_source: MODEL_ORGANISM
    snippet: >-
      PCP signaling disruption in the mouse cochlea disrupts cochlear outgrowth,
      cellular patterning and hair cell orientation, all of which are affected by
      cilia dysfunction.
    explanation: >-
      Shows in the mouse cochlea that cilia dysfunction and PCP signaling
      disruption produce overlapping morphogenetic defects, supporting the
      cilium-PCP link. Evidence source is MODEL_ORGANISM.
  - reference: PMID:21071598
    supports: SUPPORT
    evidence_source: MODEL_ORGANISM
    snippet: >-
      previously unrecognized cochlear histopathologies associated with this
      ciliopathy that (i) implicate ALMS1 in planar cell polarity signaling
    explanation: >-
      Directly implicates a ciliopathy gene (ALMS1) in planar cell polarity
      signaling, supporting PCP disruption as a conserved ciliopathy mechanism.
      Evidence source is MODEL_ORGANISM (mouse).
  downstream:
  - target: Renal Tubular Cystic and Fibrotic Disease
    description: >-
      Loss of PCP-controlled oriented cell division and tubule morphogenesis
      contributes to tubular dilatation and cyst formation in the kidney.

- name: Photoreceptor Connecting Cilium Degeneration
  description: >-
    Photoreceptor outer segments are highly specialized non-motile sensory cilia
    connected to the cell body by a connecting cilium through which all
    phototransduction cargo is trafficked. Ciliary assembly or transport defects
    impair outer segment morphogenesis and maintenance, causing progressive
    photoreceptor death and a retinitis pigmentosa-like retinal degeneration that
    is one of the most penetrant features of syndromic ciliopathies.
  role: consequence
  cell_types:
  - preferred_term: photoreceptor cell
    term:
      id: CL:0000210
      label: photoreceptor cell
  - preferred_term: retinal rod cell
    term:
      id: CL:0000604
      label: retinal rod cell
  locations:
  - preferred_term: retina
    term:
      id: UBERON:0000966
      label: retina
  biological_processes:
  - preferred_term: visual perception
    term:
      id: GO:0007601
      label: visual perception
    modifier: DECREASED
  evidence:
  - reference: PMID:28289063
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      OS are specialized sensory cilia, with analogous structures to those
      present in other nonmotile cilia. Deficient morphogenesis and/or
      dysfunction of photoreceptor sensory cilia (PSC) caused by mutations in a
      variety of photoreceptor-specific and common cilia genes can lead to
      inherited retinal degenerations (IRDs).
    explanation: >-
      Establishes the photoreceptor outer segment as a sensory cilium whose
      ciliary-gene-driven dysfunction causes inherited retinal degeneration, the
      retinal arm of the ciliopathy phenotype. Evidence source is OTHER (review).
  - reference: PMID:21506742
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Diverse developmental and degenerative single-gene disorders such as
      polycystic kidney disease, nephronophthisis, retinitis pigmentosa, the
      Bardet–Biedl syndrome, the Joubert syndrome, and the Meckel syndrome may be
      categorized as ciliopathies
    explanation: >-
      Lists retinitis pigmentosa among the canonical ciliopathies, supporting
      retinal degeneration as a shared ciliopathy outcome. Evidence source is
      OTHER (review).
  downstream:
  - target: Multisystem Pleiotropic Ciliopathy Phenotype
    description: >-
      Retinal degeneration is one organ-specific component of the converged
      pleiotropic ciliopathy phenotype.

- name: Renal Tubular Cystic and Fibrotic Disease
  description: >-
    Renal tubular epithelial cells use the primary cilium as a flow and signaling
    sensor that maintains tubular architecture. Ciliary dysfunction, compounded by
    disrupted PCP-dependent oriented cell division, leads to tubular dilatation,
    cyst formation, interstitial fibrosis, and progressive loss of renal function
    (the nephronophthisis / cystic kidney arm of the ciliopathies).
  role: consequence
  cell_types:
  - preferred_term: kidney tubule epithelial cell
    term:
      id: CL:0002518
      label: kidney epithelial cell
  locations:
  - preferred_term: kidney
    term:
      id: UBERON:0002113
      label: kidney
  evidence:
  - reference: PMID:27793968
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      The phenotypes of NPHP-RC are very diverse, and include cystic-fibrotic
      kidney disease, brain developmental defects, retinal degeneration, skeletal
      deformities, facial dimorphism, and, in some cases, laterality defects, and
      congenital heart disease.
    explanation: >-
      Establishes cystic-fibrotic kidney disease as a core feature of
      nephronophthisis-related ciliopathies, alongside the other organ
      manifestations of this module. Evidence source is OTHER (review).
  downstream:
  - target: Multisystem Pleiotropic Ciliopathy Phenotype
    description: >-
      Cystic-fibrotic kidney disease is one organ-specific component of the
      converged pleiotropic ciliopathy phenotype.

- name: Skeletal Dysplasia with Polydactyly and Thoracic Constriction
  description: >-
    In the developing skeleton, primary cilia on growth-plate chondrocytes
    transduce Hedgehog signals that regulate chondrocyte proliferation and
    endochondral ossification. IFT and ciliary defects derange this program,
    producing the skeletal ciliopathies: short ribs with a narrow, constricted
    thorax, short limbs, and pre/post-axial polydactyly seen in Jeune
    asphyxiating thoracic dystrophy, short-rib polydactyly syndromes, and
    orofaciodigital syndrome.
  role: consequence
  cell_types:
  - preferred_term: growth plate chondrocyte
    term:
      id: CL:0000138
      label: chondrocyte
  locations:
  - preferred_term: thoracic rib cage
    term:
      id: UBERON:0003252
      label: thoracic rib cage
  biological_processes:
  - preferred_term: Hedgehog (smoothened) signaling pathway
    term:
      id: GO:0007224
      label: smoothened signaling pathway
    modifier: DYSREGULATED
  evidence:
  - reference: PMID:27666822
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Short-rib polydactyly syndromes (SRPS) and Asphyxiating thoracic dystrophy
      (ATD) or Jeune Syndrome are recessively inherited skeletal ciliopathies
      characterized by profound skeletal abnormalities and are frequently
      associated with polydactyly and multiorgan system involvement.
    explanation: >-
      Defines the skeletal ciliopathies (SRPS, Jeune) as recessive ciliary
      disorders with skeletal abnormalities, polydactyly, and multiorgan
      involvement, supporting this consequence node. Evidence source is OTHER
      because the snippet is a definitional statement.
  downstream:
  - target: Multisystem Pleiotropic Ciliopathy Phenotype
    description: >-
      Skeletal dysplasia with polydactyly is one organ-specific component of the
      converged pleiotropic ciliopathy phenotype.

- name: Cerebellar and CNS Malformation
  description: >-
    Ciliary signaling, particularly cilium-dependent Hedgehog signaling, patterns
    the midbrain-hindbrain boundary and cerebellum and contributes to neural tube
    closure. Ciliopathy lesions cause cerebellar vermis hypoplasia/dysgenesis
    (producing the radiological molar tooth sign of Joubert syndrome) and, in
    severe cases such as Meckel syndrome, occipital encephalocele and other
    neural tube defects, with associated developmental disability and abnormal
    eye movements.
  role: consequence
  locations:
  - preferred_term: cerebellar vermis
    term:
      id: UBERON:0004720
      label: cerebellar vermis
  evidence:
  - reference: PMID:27081510
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Joubert syndrome (JS) is a rare autosomal recessive (AR), neurological
      condition characterized by dysgenesis of the cerebellar vermis with the
      radiological hallmark of molar tooth sign
    explanation: >-
      Establishes cerebellar vermis dysgenesis (molar tooth sign) as the defining
      CNS malformation of Joubert syndrome, the CNS arm of the ciliopathies.
      Evidence source is OTHER (review).
  - reference: PMID:27793968
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      The phenotypes of NPHP-RC are very diverse, and include cystic-fibrotic
      kidney disease, brain developmental defects, retinal degeneration, skeletal
      deformities, facial dimorphism, and, in some cases, laterality defects, and
      congenital heart disease.
    explanation: >-
      Lists brain developmental defects among the core ciliopathy phenotypes,
      supporting CNS malformation as part of the converged phenotype. Evidence
      source is OTHER (review).
  downstream:
  - target: Multisystem Pleiotropic Ciliopathy Phenotype
    description: >-
      Cerebellar/CNS malformation is one organ-specific component of the
      converged pleiotropic ciliopathy phenotype.

- name: Hypothalamic Ciliary Signaling and Metabolic Dysfunction
  description: >-
    Primary cilia on hypothalamic neurons participate in the central control of
    energy balance, in part by mediating leptin receptor trafficking and
    signaling in leptin-responsive neurons. BBSome and related ciliary defects
    impair this signaling, producing leptin resistance and early-onset obesity, a
    cardinal feature of Bardet-Biedl and Alstrom syndromes that distinguishes them
    from non-metabolic ciliopathies.
  role: consequence
  evidence:
  - reference: PMID:21514177
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      BBS proteins have emerged as important mediators of leptin receptor
      trafficking, and loss of BBS genes results in leptin resistance that could
      be due to abnormal leptin receptor handling in a subset of leptin-responsive
      neurons.
    explanation: >-
      Links ciliary BBS proteins to leptin receptor trafficking and leptin
      resistance, the mechanistic basis of the metabolic/obesity arm of the
      ciliopathies. Evidence source is OTHER (review).
  - reference: PMID:19019343
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      This disorder is defined by a combination of clinical signs: obesity,
      pigmentary retinopathy, post-axial polydactyly, polycystic kidneys,
      hypogenitalism, and learning disabilities
    explanation: >-
      Establishes obesity as a defining clinical sign of Bardet-Biedl syndrome
      alongside the other ciliopathy features, supporting the metabolic node.
      Evidence source is OTHER (review).
  downstream:
  - target: Multisystem Pleiotropic Ciliopathy Phenotype
    description: >-
      Metabolic dysfunction (obesity) is one organ-specific component of the
      converged pleiotropic ciliopathy phenotype.

- name: Motile Cilia Beat Dysfunction
  description: >-
    The motile-cilia arm of the ciliopathy spectrum. When the affected genes
    encode axonemal dynein arms, the central apparatus, or docking complexes, the
    cilium is assembled but cannot beat normally. In the airway this impairs
    mucociliary clearance, causing chronic rhinosinusitis, recurrent respiratory
    infection, and bronchiectasis; at the embryonic node, loss of motile-monocilia
    flow randomizes left-right body asymmetry, causing situs inversus/laterality
    defects. This is the mechanism of primary ciliary dyskinesia, mechanistically
    distinct from the Hedgehog/PCP signaling arm.
  role: effector
  cell_types:
  - preferred_term: multiciliated airway epithelial cell
    term:
      id: CL:0002145
      label: multiciliated columnar cell of tracheobronchial tree
  - preferred_term: multiciliated epithelial cell
    term:
      id: CL:0005012
      label: multiciliated epithelial cell
  locations:
  - preferred_term: lung
    term:
      id: UBERON:0002048
      label: lung
  biological_processes:
  - preferred_term: cilium movement
    term:
      id: GO:0003341
      label: cilium movement
    modifier: ABNORMAL
  - preferred_term: determination of left/right symmetry
    term:
      id: GO:0007368
      label: determination of left/right symmetry
    modifier: ABNORMAL
  evidence:
  - reference: PMID:30471718
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Dysfunction of motile monocilia, altering the leftward flow at the
      embryonic node essential for determination of left-right body asymmetry, is
      a major cause of laterality defects. Laterality defects are also often
      associated with reduced mucociliary clearance caused by defective multiple
      motile cilia of the airway and are responsible for destructive airway
      disease.
    explanation: >-
      Directly couples motile cilia dysfunction to both laterality defects
      (nodal flow) and reduced mucociliary clearance (airway), the two hallmarks
      of the motile-cilia arm. Evidence source is OTHER because the snippet is a
      background mechanistic statement.
  - reference: PMID:27859258
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Ciliopathies are inherited human disorders caused by both motile and
      non-motile cilia dysfunction that form an important and rapidly expanding
      disease category.
    explanation: >-
      Confirms that motile-cilia dysfunction constitutes a recognized arm of the
      ciliopathy disease category. Evidence source is OTHER (review).
  downstream:
  - target: Multisystem Pleiotropic Ciliopathy Phenotype
    description: >-
      Impaired mucociliary clearance and laterality defects are the
      motile-cilia-specific components of the broader ciliopathy phenotype.

- name: Multisystem Pleiotropic Ciliopathy Phenotype
  description: >-
    The convergent clinical end state of the module. Because cilia are nearly
    ubiquitous and serve both sensory-signaling and motility functions, ciliary
    dysfunction produces a multisystem disorder. The particular combination and
    severity of retinal, renal, skeletal, CNS, metabolic, and respiratory/
    laterality features defines the individual ciliopathy syndrome, with extensive
    overlap and variability among them.
  role: consequence
  evidence:
  - reference: PMID:21506742
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      The important role that the cilium–centrosome complex plays in the normal
      function of most tissues appears to account for the involvement of multiple
      organ systems in ciliopathies.
    explanation: >-
      Directly attributes the multi-organ involvement of ciliopathies to the
      broad role of the cilium-centrosome complex, the defining feature of this
      capstone node. Evidence source is OTHER (review).
  - reference: PMID:19019343
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Bardet-Biedl syndrome (BBS) is a ciliopathy causing multivisceral
      abnormalities.
    explanation: >-
      Frames a prototypical ciliopathy (BBS) as a multivisceral disorder,
      supporting the convergent multisystem phenotype. Evidence source is OTHER
      (review).
  - reference: PMID:27859258
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Ciliopathies are complex conditions to diagnose, being multisystem
      disorders characterized by extensive genetic heterogeneity and clinical
      variability with high levels of lethality.
    explanation: >-
      Establishes ciliopathies as multisystem disorders with marked genetic
      heterogeneity and clinical variability, the hallmark of the converged
      phenotype. Evidence source is OTHER (review).
