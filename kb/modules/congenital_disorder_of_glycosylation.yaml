name: Congenital Disorders of Glycosylation Module
description: >-
  A conserved final-common-pathway module for the congenital disorders of
  glycosylation (CDG) — the large, genetically heterogeneous family of inborn
  errors of protein glycosylation. Individual CDG arise from defects at
  mechanistically distinct points of the N-glycosylation machinery, but converge
  on a single shared lesion: hypoglycosylation of many client glycoproteins,
  which then produces a recurrent multisystem (neurologic, hepatic,
  coagulation, immune, dysmorphic, skeletal) disease. The family splits into two
  arms that share the hypoglycosylation hub but differ in where the machinery
  fails: (1) the type I disorders, in which assembly of the dolichol-linked
  (lipid-linked) oligosaccharide precursor in the endoplasmic reticulum is
  impaired (e.g. ALG9, ALG12, MPDU1, DOLK/DK1), so that truncated precursors are
  transferred to protein; and (2) the type II disorders, in which the
  glycan is assembled but its Golgi processing or the trafficking of the Golgi
  glycosylation machinery is defective (e.g. MGAT2 branching-enzyme deficiency,
  COG-complex disorders COG1/COG7), impairing maturation of complex N-glycans
  and, for the COG disorders, combined N- and O-glycosylation. Conforming
  disorder entries declare conformance via conforms_to on their pathophysiology
  nodes, substituting the disorder-specific enzyme/complex lesion and arm while
  preserving the conserved defect -> hypoglycosylation -> multisystem chain.
category: Module
creation_date: "2026-07-02T00:00:00Z"
notes: >-
  This is a mechanism module, not a specific disease. Disorder entries reference
  individual nodes via conforms_to (e.g.,
  "congenital_disorder_of_glycosylation#Protein Hypoglycosylation"). The single
  best key conformance target is the central "Protein Hypoglycosylation" node —
  the one event every CDG shares regardless of arm, matching the
  machine-checkable GO:0006487 / GO:0006491 criterion already used by the
  Congenital_Disorders_of_Glycosylation grouping. A type I conformer routes
  through the "ER Lipid-Linked Oligosaccharide Assembly Defect" trigger; a type
  II conformer routes through the "Golgi N-Glycan Processing and Trafficking
  Defect" trigger; both then conform to the shared "Protein Hypoglycosylation"
  hub. Conforming nodes should substitute the disorder-specific lesion (the
  deficient ER glycosyltransferase or dolichol-donor-utilization factor for type
  I; the deficient Golgi processing enzyme or COG-trafficking subunit for type
  II). The specificity is carried by the mechanism (hypoglycosylation), not by
  the diffuse terminal phenotype; disorder-private downstream biology
  (alpha-dystroglycan O-mannosylation in MPDU1, hyposialylation in the COG
  disorders) belongs on the individual disorder entries. Modules bind GO and CL
  terms only and do not use CHEBI or gene bindings.
pathophysiology:
- name: ER Lipid-Linked Oligosaccharide Assembly Defect
  description: >-
    In the type I CDG, one of the enzymes (or dolichol-donor-utilization
    factors) that build the lipid-linked oligosaccharide precursor on the
    cytosolic and luminal faces of the endoplasmic reticulum is deficient. The
    dolichol-linked oligosaccharide is assembled incompletely, so a truncated
    precursor accumulates and truncated/incomplete oligosaccharides are
    transferred to nascent protein instead of the full mature glycan.
  role: trigger
  cell_types:
  - preferred_term: Hepatocyte
    term:
      id: CL:0000182
      label: hepatocyte
  - preferred_term: Fibroblast
    term:
      id: CL:0000057
      label: fibroblast
  biological_processes:
  - preferred_term: Dolichol-Linked Oligosaccharide Biosynthetic Process
    term:
      id: GO:0006488
      label: dolichol-linked oligosaccharide biosynthetic process
    modifier: DECREASED
  evidence:
  - reference: PMID:15148656
    reference_title: "Identification and functional analysis of a defect in the human ALG9 gene: definition of congenital disorder of glycosylation type IL."
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: >-
      Using this approach, we have found, in a patient with CDG, a deficiency of
      the ALG9 alpha 1,2 mannosyltransferase enzyme, which causes an
      accumulation of lipid-linked-GlcNAc(2)Man(6) and -GlcNAc(2)Man(8)
      structures, which was paralleled by the transfer of incomplete
      oligosaccharides precursors to protein.
    explanation: >-
      Worked type I example establishing the conserved ER trigger — an LLO
      assembly enzyme deficiency causes truncated-precursor accumulation and
      transfer of incomplete oligosaccharides to protein. Evidence source is
      IN_VITRO because this is a cultured-fibroblast biochemical study.
  downstream:
  - target: Protein Hypoglycosylation
- name: Golgi N-Glycan Processing and Trafficking Defect
  description: >-
    In the type II CDG, the oligosaccharide precursor is transferred to protein
    normally, but its subsequent maturation in the Golgi is defective — either
    because a Golgi processing enzyme is deficient (e.g. MGAT2, which encodes
    N-acetylglucosaminyltransferase II, the branching enzyme that converts
    oligomannose to complex N-glycans) or because trafficking of the Golgi
    glycosylation machinery is disrupted (e.g. the conserved oligomeric Golgi
    (COG) complex disorders, which mislocalize Golgi glycosyltransferases and
    disrupt multiple glycosylation pathways).
  role: trigger
  cell_types:
  - preferred_term: Hepatocyte
    term:
      id: CL:0000182
      label: hepatocyte
  - preferred_term: Fibroblast
    term:
      id: CL:0000057
      label: fibroblast
  biological_processes:
  - preferred_term: N-Glycan Processing
    term:
      id: GO:0006491
      label: N-glycan processing
    modifier: DECREASED
  - preferred_term: Golgi Vesicle Transport
    term:
      id: GO:0048193
      label: Golgi vesicle transport
    modifier: ABNORMAL
  evidence:
  - reference: PMID:33044030
    reference_title: "Immune dysfunction in MGAT2-CDG: A clinical report and review of the literature."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Human MGAT2 encodes N-acetylglucosaminyltransferase II, which is a
      critical enzyme in the processing of oligomannose to complex N-glycans.
    explanation: >-
      Establishes the Golgi-processing sub-arm of the type II trigger — MGAT2 is
      the branching enzyme that matures oligomannose to complex N-glycans.
  - reference: PMID:15107842
    reference_title: "Mutation of the COG complex subunit gene COG7 causes a lethal congenital disorder."
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: >-
      The mutation impairs integrity of the COG complex and alters Golgi
      trafficking, resulting in disruption of multiple glycosylation pathways.
    explanation: >-
      Establishes the Golgi-trafficking sub-arm of the type II trigger — COG
      complex disruption alters Golgi trafficking and disrupts multiple
      glycosylation pathways. Evidence source is IN_VITRO because this is a
      cell-based study.
  downstream:
  - target: Protein Hypoglycosylation
- name: Protein Hypoglycosylation
  description: >-
    Both arms converge here: many secreted and membrane client glycoproteins
    carry absent, truncated, or otherwise abnormal glycans. In the type I
    disorders this is detected as the classic cathodal shift of serum
    transferrin (CDG type 1 isoelectric-focusing pattern); in the COG and other
    type II disorders it manifests as combined deficient N- and O-glycosylation.
    Because glycosylation modifies a very large fraction of the proteome,
    hypoglycosylation degrades the folding, stability, trafficking, and function
    of many unrelated proteins simultaneously — the shared central lesion of the
    disease family.
  role: central_effector
  cell_types:
  - preferred_term: Hepatocyte
    term:
      id: CL:0000182
      label: hepatocyte
  - preferred_term: Neuron
    term:
      id: CL:0000540
      label: neuron
  biological_processes:
  - preferred_term: Protein N-Linked Glycosylation
    term:
      id: GO:0006487
      label: protein N-linked glycosylation
    modifier: DECREASED
  - preferred_term: Protein O-Linked Glycosylation
    term:
      id: GO:0006493
      label: protein O-linked glycosylation
    modifier: DECREASED
  evidence:
  - reference: PMID:15945070
    reference_title: "CDG-IL: an infant with a novel mutation in the ALG9 gene and additional phenotypic features."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Hypoglycosylation was confirmed by the typical CDG type 1 pattern of serum
      transferrin analyzed by isoelectric focusing.
    explanation: >-
      Establishes the shared central lesion for the type I arm — protein
      hypoglycosylation demonstrated by the classic CDG type 1 transferrin
      pattern.
  - reference: PMID:17904886
    reference_title: "Deficiencies in subunits of the Conserved Oligomeric Golgi (COG) complex define a novel group of Congenital Disorders of Glycosylation."
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      COG defects are a novel group of CDG-II with deficient N- as well as
      O-glycosylation.
    explanation: >-
      Establishes the shared central lesion for the type II/COG arm — combined
      deficient N- and O-glycosylation. Evidence source is OTHER because this is
      a review synthesizing the COG-CDG group.
  downstream:
  - target: Multisystem Glycoprotein Dysfunction
- name: Multisystem Glycoprotein Dysfunction
  description: >-
    Because so many glycoproteins are simultaneously affected, the downstream
    disease is characteristically multisystem: developmental delay/intellectual
    disability, hypotonia, and other neurologic features; hepatic dysfunction;
    coagulation abnormalities; immune dysfunction; dysmorphism; and, in some
    subtypes, skeletal or renal involvement. The precise organ pattern varies by
    subtype and by which client glycoproteins are most rate-limiting, but the
    multisystem outflow is the shared consequence of proteome-wide
    hypoglycosylation.
  role: consequence
  cell_types:
  - preferred_term: Neuron
    term:
      id: CL:0000540
      label: neuron
  - preferred_term: Hepatocyte
    term:
      id: CL:0000182
      label: hepatocyte
  biological_processes:
  - preferred_term: Protein N-Linked Glycosylation
    term:
      id: GO:0006487
      label: protein N-linked glycosylation
    modifier: ABNORMAL
  evidence:
  - reference: PMID:25966638
    reference_title: "A novel phenotype in N-glycosylation disorders: Gillessen-Kaesbach-Nishimura skeletal dysplasia due to pathogenic variants in ALG9."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      All three suffered from intellectual disability, muscular hypotonia,
      microcephaly and renal cysts, but none had skeletal dysplasia.
    explanation: >-
      Illustrates the conserved multisystem outflow (neurologic, muscular,
      growth, renal) of a worked CDG conformer downstream of hypoglycosylation.
