name: Pancreatic Acinar Autodigestion Module
description: >-
  A conserved pancreatic pathophysiology module representing the final common
  pathway of pancreatitis, in which an acinar-cell insult triggers premature
  intracellular activation of trypsinogen to trypsin and a cascade of digestive
  proenzymes. Sustained pathological calcium signaling and defective autophagy
  amplify the injury, leading to acinar-cell autodigestion and necrosis with
  release of damage-associated molecular patterns (DAMPs), a local and systemic
  inflammatory response, and ultimately the clinical syndrome of pancreatitis
  with acute episodes and, on recurrence, chronic fibrosis and exocrine/endocrine
  insufficiency. Diverse etiologies (biliary obstruction, alcohol and its
  metabolites, hypertriglyceridemia, and hereditary PRSS1/SPINK1/CFTR variants)
  converge on this chain. Conforming disorder entries declare conformance via
  conforms_to on their pathophysiology nodes, substituting the disorder-specific
  initiating insult (e.g., gallstone duct obstruction, alcohol metabolites, or a
  PRSS1 gain-of-function / SPINK1 inhibitor-loss variant) while preserving the
  conserved acinar autodigestion and inflammatory cascade.
category: Module
creation_date: "2026-06-06T00:00:00Z"
notes: >-
  This is a mechanism module, not a specific disease. Disorder entries reference
  individual nodes via conforms_to (e.g.,
  "pancreatitis_acinar_autodigestion#Premature Intra-Acinar Trypsinogen
  Activation"). The module defines the expected pathophysiology structure;
  conforming nodes in disorder files should include the corresponding cell types,
  biological processes, and causal edges, specialized to their etiology. Key
  etiology-specific substitutions for the trigger node: biliary pancreatitis
  uses gallstone-mediated duct obstruction and bile reflux; alcoholic
  pancreatitis uses alcohol and its metabolites; hereditary pancreatitis
  substitutes a PRSS1 trypsinogen gain-of-function variant or a SPINK1
  (trypsin-inhibitor) / CFTR loss-of-function variant. The pancreatic acinar
  cell (CL:0002064) is the conserved cell type across the upstream nodes.
pathophysiology:
- name: Premature Intra-Acinar Trypsinogen Activation
  description: >-
    The initiating lesion of pancreatitis is the premature, inappropriate
    conversion of trypsinogen to active trypsin within the pancreatic acinar
    cell, rather than in the intestinal lumen where activation normally occurs.
    Across etiologies this reflects an imbalance between trypsinogen activation
    and the protective trypsin-inhibitor and degradation systems: gain of trypsin
    activity (PRSS1 hereditary mutations) or loss of inhibition (SPINK1
    deficiency), or hyperstimulation and duct obstruction in biliary and
    alcoholic disease. The active trypsin then activates the broader cascade of
    digestive proenzymes.
  role: trigger
  cell_types:
  - preferred_term: pancreatic acinar cell
    term:
      id: CL:0002064
      label: pancreatic acinar cell
  biological_processes:
  - preferred_term: zymogen activation
    term:
      id: GO:0031638
      label: zymogen activation
    modifier: INCREASED
  - preferred_term: proteolysis
    term:
      id: GO:0006508
      label: proteolysis
    modifier: INCREASED
  evidence:
  - reference: PMID:39534420
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      It was proposed that pancreatitis results from proteolytic autodigestion of
      the gland, mediated by premature/inappropriate trypsinogen activation
      within acinar cells. The intra-acinar trypsinogen activation is observed in
      experimental models of acute and chronic pancreatitis, and in human disease.
    explanation: >-
      This authoritative review establishes premature intra-acinar trypsinogen
      activation as the proposed initiating lesion of pancreatitis, observed
      across experimental models and human disease. Evidence source is OTHER
      because the paper is a review synthesizing genetic, model-organism, and
      human data.
  - reference: PMID:26228362
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Early intracellular premature trypsinogen activation was interpreted as the
      key initiator of pancreatitis. When the balance in the homeostasis of
      trypsin and antitrypsin system is disequilibrated, elevated aggressive
      enzymes directly attack the pancreatic tissue, which leads to pancreatic
      destruction and inflammation.
    explanation: >-
      Frames trypsin-antitrypsin imbalance (e.g., PRSS1 gain or SPINK1
      inhibitor loss) as the convergent first step, supporting the
      etiology-generic trigger. Evidence source is OTHER because this is a review.
  downstream:
  - target: Calcium Overload and Impaired Autophagy

- name: Calcium Overload and Impaired Autophagy
  description: >-
    Sustained, pathological cytosolic calcium elevation and defective autophagy
    amplify the initial acinar insult. Prolonged global Ca2+ overload (driven by
    bile, alcohol metabolites, and other causes) promotes trypsin activation,
    vacuolization, and mitochondrial dysfunction, while autophagic flux is
    impaired because autophagosome-lysosome fusion fails, leading to accumulation
    of dysfunctional organelles. Together these processes drive the cell toward
    death and amplify the proenzyme cascade.
  role: amplifier
  cell_types:
  - preferred_term: pancreatic acinar cell
    term:
      id: CL:0002064
      label: pancreatic acinar cell
  biological_processes:
  - preferred_term: calcium ion homeostasis
    term:
      id: GO:0055074
      label: calcium ion homeostasis
    modifier: DYSREGULATED
  - preferred_term: autophagy
    term:
      id: GO:0006914
      label: autophagy
    modifier: DYSREGULATED
  evidence:
  - reference: PMID:25473167
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      In pancreatic acinar cells, pathological Ca(2+) signaling (stimulated by
      bile, alcohol metabolites and other causes) is a key contributor to the
      initiation of cell injury due to prolonged and global Ca(2+) elevation that
      results in trypsin activation, vacuolization and necrosis, all of which are
      crucial in the development of pancreatitis.
    explanation: >-
      Directly establishes pathological acinar calcium overload as a key early
      amplifier that drives trypsin activation, vacuolization, and necrosis.
      Evidence source is OTHER because this is a mechanistic review.
  - reference: PMID:31398467
    supports: SUPPORT
    evidence_source: MODEL_ORGANISM
    snippet: >-
      During pancreatitis, autophagy is activated, but lysosomal degradation of
      dysfunctional organelles including mitochondria is impaired, resulting in
      acinar cell death.
    explanation: >-
      Mouse cerulein-pancreatitis study demonstrating impaired autophagic
      lysosomal degradation as an amplifying mechanism that drives acinar cell
      death. Evidence source is MODEL_ORGANISM because the data are from a mouse
      model.
  downstream:
  - target: Acinar Cell Autodigestion and Necrosis

- name: Acinar Cell Autodigestion and Necrosis
  description: >-
    Unregulated intracellular activation of trypsin and the wider proenzyme
    cascade, together with calcium overload and failed autophagy, leads to
    proteolytic autodigestion of the acinar cell and the gland. Acinar cells
    undergo necrosis and stress-driven death, releasing damage-associated
    molecular patterns (DAMPs) and active enzymes into the parenchyma. This is
    the central effector step that converts intracellular enzyme activation into
    tissue destruction.
  role: central_effector
  cell_types:
  - preferred_term: pancreatic acinar cell
    term:
      id: CL:0002064
      label: pancreatic acinar cell
  biological_processes:
  - preferred_term: proteolysis
    term:
      id: GO:0006508
      label: proteolysis
    modifier: INCREASED
  - preferred_term: cell death
    term:
      id: GO:0008219
      label: cell death
    modifier: INCREASED
  - preferred_term: cellular response to stress
    term:
      id: GO:0033554
      label: cellular response to stress
    modifier: INCREASED
  evidence:
  - reference: PMID:19322914
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Enzyme activation within the pancreas leads to auto-digestion of the gland
      and local inflammation.
    explanation: >-
      Directly states that intrapancreatic enzyme activation produces
      autodigestion of the gland, the central effector step of this module.
      Evidence source is OTHER because this is a review article.
  - reference: PMID:39534420
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Pancreatitis is believed to be initiated by injured acinar cells (the main
      exocrine pancreas cell type), leading to parenchymal necrosis and local and
      systemic inflammation.
    explanation: >-
      Establishes that injured acinar cells progress to parenchymal necrosis,
      linking autodigestion to necrotic cell death. Evidence source is OTHER
      because the paper is a review.
  downstream:
  - target: Local and Systemic Inflammatory Response

- name: Local and Systemic Inflammatory Response
  description: >-
    DAMPs and reactive oxygen species released by dying acinar cells activate the
    innate immune system through pattern-recognition receptors, recruiting
    neutrophils, macrophages, and other immune cells that release cytokines and
    chemokines. This drives local pancreatic inflammation and, when amplified,
    a systemic inflammatory response that determines disease severity.
  role: effector
  cell_types:
  - preferred_term: neutrophil
    term:
      id: CL:0000775
      label: neutrophil
  - preferred_term: macrophage
    term:
      id: CL:0000235
      label: macrophage
  biological_processes:
  - preferred_term: inflammatory response
    term:
      id: GO:0006954
      label: inflammatory response
    modifier: INCREASED
  - preferred_term: leukocyte migration
    term:
      id: GO:0050900
      label: leukocyte migration
    modifier: INCREASED
  evidence:
  - reference: PMID:40909291
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      DAMPs released from damaged cells activate the innate immune response by
      interacting with pattern recognition receptors (PRRs), leading to the
      recruitment of immune cells such as neutrophils, macrophages and dendritic
      cells. These immune cells further amplify the inflammatory response by
      releasing cytokines and chemokines.
    explanation: >-
      Directly describes DAMP-driven recruitment of neutrophils and macrophages
      and cytokine/chemokine amplification of the inflammatory response. Evidence
      source is OTHER because this is a review synthesizing multiple study types.
  - reference: PMID:39534420
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Pancreatitis is believed to be initiated by injured acinar cells (the main
      exocrine pancreas cell type), leading to parenchymal necrosis and local and
      systemic inflammation.
    explanation: >-
      Confirms that acinar necrosis produces both local and systemic
      inflammation. Evidence source is OTHER because the paper is a review.
  downstream:
  - target: Pancreatitis

- name: Pancreatitis
  description: >-
    The convergent clinical syndrome of pancreatitis: acute inflammatory episodes
    of the exocrine pancreas that, on recurrence or persistence, progress to
    chronic fibro-inflammatory disease with progressive loss of the exocrine and
    endocrine compartments through atrophy and fibrotic replacement. Functional
    consequences include recurrent abdominal pain, maldigestion (exocrine
    insufficiency), and diabetes mellitus (endocrine insufficiency).
  role: consequence
  evidence:
  - reference: PMID:28880010
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Chronic pancreatitis is characterized by ongoing inflammation of the
      pancreas that results in progressive loss of the endocrine and exocrine
      compartment owing to atrophy and/or replacement with fibrotic tissue.
      Functional consequences include recurrent or constant abdominal pain,
      diabetes mellitus (endocrine insufficiency) and maldigestion (exocrine
      insufficiency).
    explanation: >-
      Defines the chronic pancreatitis end state with fibrotic replacement and
      exocrine/endocrine insufficiency, the consequence node of this module.
      Evidence source is OTHER because this is a Nature Reviews Disease Primers
      review.
  - reference: PMID:39534420
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Pancreatitis is a common, life-threatening inflammatory disease of the
      exocrine pancreas.
    explanation: >-
      Concise statement of the named phenotype as an inflammatory disease of the
      exocrine pancreas. Evidence source is OTHER because the paper is a review.
