name: Tumor Angiogenesis Module
description: >-
  A conserved mechanism module for the fifth hallmark of cancer (Hanahan &
  Weinberg): the induction of angiogenesis. Tumors larger than ~1-2 mm
  outgrow the diffusion limit for oxygen and nutrients and must recruit new
  blood vessels to survive and grow. The conserved causal chain runs from
  intratumoral hypoxia and oncogenic signaling that stabilize
  hypoxia-inducible factor (HIF), through an "angiogenic switch" in which the balance
  of pro- and anti-angiogenic factors tips toward pro-angiogenic signals -
  chiefly VEGF-A acting on endothelial VEGFR2, with contributions from FGF,
  PDGF, and angiopoietins - to endothelial proliferation and sprouting that
  produce a structurally abnormal, leaky, tortuous tumor vasculature. This
  neovasculature sustains tumor growth and provides a route for metastatic
  dissemination, and is the target of anti-angiogenic therapy (anti-VEGF
  antibodies, VEGFR tyrosine kinase inhibitors). Individual disorder entries
  declare conformance via conforms_to, substituting tumor-type-specific
  drivers (e.g., VHL loss constitutively stabilizing HIF in clear cell renal
  cell carcinoma; VEGF-driven angiogenesis in glioblastoma). The
  anti-angiogenic drug-mechanism view can be captured with target_mechanisms
  on conforming treatments.
category: Module
creation_date: "2026-06-27T00:00:00Z"
notes: >-
  This is a mechanism module, not a specific disease. Disorder entries
  reference individual nodes via conforms_to (e.g.,
  "tumor_angiogenesis#Angiogenic Switch and VEGF-Driven Neovascularization").
  The module defines the expected pathophysiology structure; conforming nodes
  in disorder files should include the corresponding cell types, biological
  processes, and causal edges, specialized to their tumor context. Key
  tumor-specific substitutions: clear cell renal cell carcinoma uses VHL loss
  that constitutively stabilizes HIF-2alpha and drives VEGF independent of
  hypoxia; glioblastoma and colorectal cancer use VEGF-A-driven angiogenesis
  treated with bevacizumab/VEGFR TKIs. Key conformance / treatment target:
  "tumor_angiogenesis#Angiogenic Switch and VEGF-Driven Neovascularization".
pathophysiology:
- name: Intratumoral Hypoxia and HIF Stabilization
  description: >-
    As a tumor expands beyond the oxygen diffusion limit, regions become
    hypoxic. Hypoxia (and, in some tumors, oncogenic signaling or loss of
    the VHL E3 ubiquitin ligase) stabilizes hypoxia-inducible factor (HIF-1
    and HIF-2), a transcription factor that activates a pro-angiogenic gene
    program including VEGFA. This establishes the demand signal for new
    vasculature.
  role: trigger
  biological_processes:
  - preferred_term: Response to Hypoxia
    term:
      id: GO:0001666
      label: response to hypoxia
    modifier: INCREASED
  downstream:
  - target: Angiogenic Switch and VEGF-Driven Neovascularization
    description: >-
      HIF-driven VEGF expression tips the angiogenic balance toward new
      vessel formation.

- name: Angiogenic Switch and VEGF-Driven Neovascularization
  description: >-
    The angiogenic switch is thrown when pro-angiogenic factors (VEGF-A,
    FGF2, PDGF, angiopoietin-2) outweigh endogenous inhibitors
    (thrombospondin-1, angiostatin). Secreted VEGF-A binds VEGFR2 on
    quiescent endothelial cells, triggering their proliferation, migration,
    and sprouting from existing vessels (and recruitment of endothelial
    progenitors). This is the conserved central node and the target of
    anti-angiogenic therapy.
  role: central_effector
  cell_types:
  - preferred_term: Endothelial Cell
    term:
      id: CL:0000115
      label: endothelial cell
  biological_processes:
  - preferred_term: Positive Regulation of Angiogenesis
    term:
      id: GO:0045766
      label: positive regulation of angiogenesis
    modifier: INCREASED
  - preferred_term: VEGF Receptor Signaling Pathway
    term:
      id: GO:0048010
      label: vascular endothelial growth factor receptor signaling pathway
    modifier: INCREASED
  evidence:
  - reference: PMID:16355214
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Inhibiting angiogenesis is a promising strategy for treatment of
      cancer and several other disorders, including age-related macular
      degeneration.
    explanation: >-
      Establishes tumor angiogenesis as a validated therapeutic target,
      supporting the VEGF-driven angiogenic switch as the central effector
      of this module. Evidence source is OTHER because this is a review
      article.
  - reference: PMID:21376230
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      They include sustaining proliferative signaling, evading growth
      suppressors, resisting cell death, enabling replicative immortality,
      inducing angiogenesis, and activating invasion and metastasis.
    explanation: >-
      Hanahan & Weinberg list inducing angiogenesis as a core hallmark
      capability modeled here. Evidence source is OTHER because this is a
      review article.
  downstream:
  - target: Abnormal Tumor Vasculature Sustaining Growth

- name: Abnormal Tumor Vasculature Sustaining Growth
  description: >-
    Sustained, unbalanced pro-angiogenic signaling produces a chaotic,
    structurally abnormal vasculature: vessels are tortuous, dilated, leaky,
    and irregularly perfused, with an incomplete pericyte coat and basement
    membrane. This neovasculature supplies oxygen and nutrients that sustain
    tumor growth, yet its abnormal architecture creates regions of persistent
    hypoxia and elevated interstitial pressure, and the leaky walls provide
    a portal for tumor-cell intravasation and metastatic spread.
  role: consequence
  biological_processes:
  - preferred_term: Angiogenesis
    term:
      id: GO:0001525
      label: angiogenesis
    modifier: INCREASED
