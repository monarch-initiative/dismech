  evidence:
  - reference: PMID:14647276
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      ARFGEF2 encodes the large (>200 kDa) brefeldin A (BFA)-inhibited GEF2
      protein (BIG2), which is required for vesicle and membrane trafficking
      from the trans-Golgi network (TGN).
    explanation: >-
      Establishes ARFGEF2/BIG2 as a vesicle-trafficking mechanism for
      recessive PVH with microcephaly.
  - reference: PMID:14647276
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: >-
      Inhibition of BIG2 also disturbed the intracellular localization of such
      molecules as E-cadherin and beta-catenin by preventing their transport
      from the Golgi apparatus to the cell surface.
    explanation: >-
      Links BIG2 vesicle trafficking to cadherin/catenin cell-surface delivery,
      directly supporting the apical-junction branch.
  - reference: PMID:24056717
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Here we show that mutations in genes encoding the receptor-ligand cadherin
      pair DCHS1 and FAT4 lead to a recessive syndrome in humans that includes
      periventricular neuronal heterotopia.
    explanation: >-
      Supports FAT4/DCHS1 cadherin-pair disruption as a human PVH branch.
  downstream:
  - target: Ventricular Lining Breaks and Apical Detachment

- name: Ventricular Lining Breaks and Apical Detachment
  description: >-
    The apical ventricular interface loses epithelial continuity, radial-glial
    endfoot organization, or apical-abscission control. This can denude or break
    the ventricular lining, weaken radial-glial scaffold continuity, and allow
    progenitors or newborn neurons to remain near the lateral ventricles.
  role: central_effector
  cell_types:
  - preferred_term: radial glial cell
    term:
      id: CL:0000681
      label: radial glial cell
  - preferred_term: neural stem cell
    term:
      id: CL:0000047
      label: neural stem cell
  locations:
  - preferred_term: telencephalic ventricle
    term:
      id: UBERON:0002285
      label: telencephalic ventricle
  - preferred_term: ventricular zone
    term:
      id: UBERON:0003053
      label: ventricular zone
  biological_processes:
  - preferred_term: cell-cell adhesion
    term:
      id: GO:0098609
      label: cell-cell adhesion
    modifier: DECREASED
  - preferred_term: regulation of actin cytoskeleton organization
    term:
      id: GO:0032956
      label: regulation of actin cytoskeleton organization
    modifier: DYSREGULATED
  evidence:
  - reference: PMID:25097827
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      apical abscission regulates neuronal progenitor exit and migration from
      the ventricular zone by detachment from the neuroependyma, relies on
      adhesion molecules that maintain the integrity of the neuroepithelial
      lining, and directs neural proliferation.
    explanation: >-
      Directly supports the apical-abscission and adhesion mechanism that links
      ventricular-lining integrity to progenitor exit and migration.
  - reference: PMID:18996916
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Here we show that neurons in post-mortem human PH brains migrated
      appropriately into the cortex, that periventricular nodules were primarily
      composed of later-born neurons, and that the neuroependyma was disrupted
      in all PH cases.
    explanation: >-
      Human pathology supports neuroependymal disruption as a central PVH
      feature rather than only a cell-autonomous neuronal locomotion defect.
  downstream:
  - target: Mislocalized Progenitors and Ectopic Periventricular Neurogenesis
  - target: Secondary Neuronal Positioning and Migration Defects

- name: Mislocalized Progenitors and Ectopic Periventricular Neurogenesis
  description: >-
    Apical scaffold failure changes progenitor position, progenitor pool size,
    and local neurogenic output near the ventricle. Depending on the branch,
    intermediate progenitors can be mislocalized in the periventricular space,
    Pax6-positive progenitors can accumulate near ventricles, or local
    neurovascular signaling can increase ectopic neuron production without
    necessarily blocking normal neocortical neuron production.
  role: effector
  cell_types:
  - preferred_term: radial glial cell
    term:
      id: CL:0000681
      label: radial glial cell
  - preferred_term: neural progenitor cell
    term:
      id: CL:0011020
