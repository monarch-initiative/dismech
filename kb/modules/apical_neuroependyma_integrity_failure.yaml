name: Apical Neuroependyma Integrity Failure Module
description: >-
  Conserved cortical malformation mechanism in which disruption of radial-glial
  apical attachment, ventricular-lining integrity, cadherin/catenin trafficking,
  ciliogenesis, actin scaffolding, or apical progenitor signaling produces
  periventricular nodules or related heterotopia. The shared skeleton is
  apical-neuroependyma perturbation followed by ventricular lining breaks or
  apical detachment, mislocalized progenitors or ectopic periventricular
  neurogenesis, and secondary neuronal positioning or migration abnormalities.
  This module is intended for FLNA-related PVH, ARFGEF2-related PVH with
  microcephaly, FAT4/DCHS1-related Van Maldergem/PVH mechanisms, and selected
  rare PVH branches where apical radial-glial or neuroependymal failure is
  central.
category: Module
creation_date: "2026-06-10T04:21:50Z"
notes: >-
  This is a mechanism module, not a broad "periventricular heterotopia" disease
  entry. Disorder entries should use conforms_to only when the core pathograph
  involves apical radial-glial, ventricular-lining, adherens-junction, ciliary,
  vesicle-trafficking, or apical progenitor-polarity failure. Do not use this as
  the primary skeleton for isolated postmitotic microtubule-dependent neuronal
  migration defects, pial basement-membrane/radial-glial endfoot failure,
  Reelin terminal-translocation signaling defects, interneuron migration
  defects, or generic heterotopia without a defended apical-neuroependyma
  mechanism. NEDD4L-related PVH should conform here only for the PVH/apical
  positioning branch; broader PI3K-AKT-mTOR cortical overgrowth belongs in a
  separate mTOR-overgrowth module.
mechanistic_hypotheses:
- hypothesis_group_id: apical_neuroependyma_integrity_model
  hypothesis_label: Apical Neuroependyma Integrity Failure Model
  status: CANONICAL
  description: >-
    Radial glia and neural progenitors maintain an apical ventricular interface
    through actin scaffolding, cadherin/catenin adhesion, vesicle trafficking,
    ciliary/basal-body positioning, and regulated progenitor signaling.
    Pathogenic variants or perturbations in FLNA, ARFGEF2, FAT4, DCHS1,
    NEDD4L, ERMARD/C6orf70, GNAI2, TMEM67-associated complexes, or interacting
    pathways can weaken this apical scaffold. The resulting ventricular-lining
    disruption mispositions progenitors or neurons near the lateral ventricles,
    alters local progenitor output, and can produce periventricular heterotopic
    nodules with secondary neuronal migration or terminal-translocation defects.
  evidence:
  - reference: PMID:25097827
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      PH results in a disruption of the neuroependyma, inhibition of neural
      proliferation and differentiation, and altered neuronal migration.
    explanation: >-
      Review-level synthesis of FLNA/BIG2/apical-abscission biology supporting
      the module skeleton as neuroependyma disruption with progenitor and
      migration consequences.
  - reference: PMID:18996916
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Here we show that neurons in post-mortem human PH brains migrated
      appropriately into the cortex, that periventricular nodules were primarily
      composed of later-born neurons, and that the neuroependyma was disrupted
      in all PH cases.
    explanation: >-
      Human postmortem PH evidence supports loss of neuroependymal integrity as
      a common endpoint in periventricular heterotopia.
  - reference: PMID:18996916
    supports: SUPPORT
    evidence_source: MODEL_ORGANISM
    snippet: >-
      As studied in the mouse, loss of FlnA or Big2 function in neural precursors
      impaired neuronal migration from the germinal zone, disrupted cell adhesion
      and compromised neuroepithelial integrity.
    explanation: >-
      Mouse FlnA/Big2 perturbation evidence links vesicle-trafficking and
      cytoskeletal defects to neuroepithelial integrity failure.
discussions:
- discussion_id: gap_apical_neuroependyma_human_model_translatability
  prompt: >-
    Which apical-neuroependyma defects are conserved in rodent knockdown or
    knockout models, and which require human iPSC-derived neuroepithelial
    rosettes, cortical organoids, fetal tissue, or gyrencephalic models to
    capture human ventricular-zone and OSVZ biology?
  kind: HUMAN_MODEL_MISMATCH
  status: OPEN
  attaches_to:
  - pathophysiology#Apical Junction, Ciliary, and Vesicle-Trafficking Perturbation
  - pathophysiology#Ventricular Lining Breaks and Apical Detachment
  rationale: >-
    The seed review repeatedly treats rodent/human mismatch as a knowledge gap
    for malformations of cortical development. For this module, the key risk is
    that acute in utero knockdown, mouse knockout, and non-neural cell systems
    may identify proximal adhesion, trafficking, ciliary, or migration defects
    but may not fully recapitulate human radial-glial apical organization,
    oRG/OSVZ context, nodular heterotopia formation, seizure propensity, or
    developmental compensation. Curation should represent this as a
    human/model-mismatch knowledge gap until a controlled gap subtype exists.
  evidence:
  - reference: PMID:28111201
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: >-
      Recent work has uncovered critical cellular and molecular differences
      between cortical development in humans and mice, further underscoring the
      need to develop human model systems.
    explanation: >-
      Supports treating human/model translatability as an explicit knowledge
      gap for cortical malformation modules.
  - reference: PMID:23995685
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: >-
      Since disorders affecting human brain development have often proved
      difficult to recapitulate in animal models, we tested whether organoids
      could be used to model neurodevelopmental disorders.
    explanation: >-
      Supports the proposed use of human organoids when animal models do not
      recapitulate human cortical-development phenotypes.
  proposed_experiments:
  - experiment_id: exp_apical_neuroependyma_isogenic_organoid_rosette_panel
    name: Isogenic apical-neuroependyma organoid and rosette rescue panel
    description: >-
      Generate patient-derived or engineered human iPSC cortical organoids and
      neuroepithelial rosette cultures for representative FLNA, ARFGEF2, FAT4,
      DCHS1, NEDD4L, ERMARD/C6orf70, GNAI2, and TMEM67/FLNA-interaction
      variants. Compare mutant, isogenic corrected, and knock-in lines for
      ventricular-surface continuity, adherens-junction localization,
      cadherin/catenin trafficking, basal-body/cilium positioning, progenitor
      position, ectopic IP/neuron production, and rescue by pathway-appropriate
      interventions.
    experiment_type:
      preferred_term: isogenic cortical organoid apical-neuroependyma perturbation experiment
    model_systems:
