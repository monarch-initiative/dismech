  evidence:
  - reference: PMID:27694961
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Here we show that missense mutations in NEDD4L mapping to the HECT domain
      of the encoded E3 ubiquitin ligase lead to PNH associated with toe
      syndactyly, cleft palate and neurodevelopmental delay.
    explanation: >-
      Establishes NEDD4L HECT-domain variants as a human PVH branch.
  - reference: PMID:27694961
    supports: SUPPORT
    evidence_source: MODEL_ORGANISM
    snippet: >-
      Moreover, an in utero electroporation approach showed that PNH-related
      mutants and excess wild-type NEDD4L affect neurogenesis, neuronal
      positioning and terminal translocation.
    explanation: >-
      Supports the neuronal positioning and terminal-translocation branch of
      NEDD4L-related PVH.
  - reference: PMID:27694961
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: >-
      PNH-related mutations are associated with deregulation of mTORC1 and AKT
      activities.
    explanation: >-
      Supports AKT-mTOR pathway deregulation as the signaling mechanism for this
      branch.
  downstream:
  - target: Secondary Neuronal Positioning and Migration Defects
  - target: Periventricular Heterotopic Nodules

- name: Secondary Neuronal Positioning and Migration Defects
  description: >-
    Some conforming disorders show delayed radial migration, abnormal terminal
    translocation, impaired neuronal morphology, or failure of newborn neurons
    to leave the ventricular region. In this module those defects are modeled as
    downstream or branch-specific consequences unless evidence shows a primary
    cell-autonomous neuronal locomotion mechanism.
