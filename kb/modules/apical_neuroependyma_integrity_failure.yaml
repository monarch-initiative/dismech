    term:
      id: GO:0022008
      label: neurogenesis
    modifier: DYSREGULATED
  - preferred_term: cell population proliferation
    term:
      id: GO:0008283
      label: cell population proliferation
    modifier: DYSREGULATED
  evidence:
  - reference: PMID:27664421
    supports: SUPPORT
    evidence_source: MODEL_ORGANISM
    snippet: >-
      Loss of Flna in neural progenitor cells (NPCs) led RGs to undergo changes
      resembling epithelial-mesenchymal transition (EMT) along with exuberant
      angiogenesis that together changed the microenvironment and increased
      neurogenesis of IPs.
    explanation: >-
      Supports ectopic periventricular neurogenesis through altered
      radial-glial state and local neurovascular signaling after Flna loss.
  - reference: PMID:24056717
    supports: SUPPORT
    evidence_source: MODEL_ORGANISM
    snippet: >-
      Reducing the expression of Dchs1 or Fat4 within mouse embryonic
      neuroepithelium increased progenitor cell numbers and reduced their
      differentiation into neurons, resulting in the heterotopic accumulation of
      cells below the neuronal layers in the neocortex, reminiscent of the human
      phenotype.
    explanation: >-
      Supports a cadherin-pair branch in which altered progenitor number and
      differentiation precede heterotopic accumulation.
  downstream:
  - target: Periventricular Heterotopic Nodules

- name: Ciliogenesis and Basal Body Positioning Branch
  description: >-
    In some FLNA-associated or ciliopathy-overlap cases, the apical module may
    operate through a FLNA-TMEM67/meckelin complex required for cilium assembly,
    basal-body positioning, Wnt signaling, and apical ventricular organization.
    This branch should be used only when the disorder entry has evidence that
    ciliary/basal-body disruption is part of the pathograph.
  role: amplifier
