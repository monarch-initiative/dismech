    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      In the X-linked dominant human disorder periventricular heterotopia (PH),
      many neurons fail to migrate and persist as nodules lining the ventricular
      surface.
    explanation: >-
      Provides the classical human FLNA/PH framing of failed neuronal migration
      to the cortex.
  - reference: PMID:24056535
    supports: SUPPORT
    evidence_source: MODEL_ORGANISM
    snippet: >-
      Silencing of C6orf70 in the developing rat neocortex produced
      periventricular nodular heterotopia that was rescued by concomitant
      expression of wild-type human C6orf70 protein.
    explanation: >-
      Supports ERMARD/C6orf70 as a rare PVH branch with a rescueable
