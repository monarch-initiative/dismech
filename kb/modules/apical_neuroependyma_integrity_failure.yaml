      label: signal transduction
    modifier: DYSREGULATED
  evidence:
  - reference: PMID:22121117
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: >-
      Here, we found that the cytoplasmic domain of meckelin directly interacts
      with the actin-binding protein filamin A, potentially at the apical cell
      surface associated with the basal body.
    explanation: >-
      Cell/biochemical evidence supports a FLNA-meckelin/TMEM67 ciliary branch
      at the apical/basal-body interface.
  - reference: PMID:22121117
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      We identified a single consanguineous patient with an MKS-like ciliopathy
      that presented with both MKS and cerebellar heterotopia, caused by an
      unusual in-frame deletion mutation in the meckelin C-terminus at the region
      of interaction with filamin A.
    explanation: >-
      Human genetic evidence links the meckelin-FLNA interaction region to a
      ciliopathy with heterotopia.
  - reference: PMID:22121117
    supports: SUPPORT
    evidence_source: MODEL_ORGANISM
    snippet: >-
      morpholino knockdown of flna in zebrafish embryos significantly increases
      the frequency of dysmorphology and severity of ciliopathy developmental
      defects caused by mks3 knockdown.
    explanation: >-
      In vivo zebrafish evidence supports interaction between flna and mks3
      perturbation in ciliopathy developmental phenotypes.
  downstream:
  - target: Ventricular Lining Breaks and Apical Detachment
  - target: Mislocalized Progenitors and Ectopic Periventricular Neurogenesis

- name: NEDD4L AKT-mTOR Signaling Branch
  description: >-
    NEDD4L HECT-domain variants define a PVH branch where an E3 ubiquitin ligase
    perturbation affects neurogenesis, neuronal positioning, terminal
    translocation, and PI3K-AKT-mTOR pathway activity. This branch can overlap
    the broader mTOR cortical-overgrowth module, but in this module it is used
    only when the pathograph is anchored by PVH/apical positioning rather than
    generalized cortical overgrowth.
