pathophysiology:
- name: Apical Junction, Ciliary, and Vesicle-Trafficking Perturbation
  description: >-
    Disease genes and interacting proteins perturb the radial-glial apical
    apparatus through actin scaffolding, cadherin/catenin adhesion, vesicle
    trafficking from Golgi or endosomal compartments, cilium/basal-body
    positioning, or apical signaling. Representative branches include
    FLNA-dependent actin and receptor scaffolding, ARFGEF2/BIG2-dependent
    vesicle trafficking, FAT4/DCHS1 cadherin signaling, FLNA-TMEM67/meckelin
    ciliogenesis, and NEDD4L pathway regulation.
