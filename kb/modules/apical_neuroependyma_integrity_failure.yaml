    decision_criterion: >-
      The module is supported if mutant organoids or rosettes show reproducible
      apical-surface discontinuity, cadherin/catenin mislocalization,
      basal-body/cilium defects, or ectopic progenitor/neuron positioning that
      is rescued by isogenic correction and reproduced by knock-in. A
