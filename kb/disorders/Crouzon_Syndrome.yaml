name: Crouzon Syndrome
creation_date: '2026-02-06T03:25:37Z'
updated_date: '2026-03-27T16:32:18Z'
category: Mendelian
description: >
  Crouzon syndrome is a craniosynostosis syndrome caused by heterozygous mutations in
  FGFR2, characterized by premature fusion of multiple cranial sutures, midface hypoplasia,
  proptosis, and hypertelorism. Unlike Apert syndrome, Crouzon syndrome does not involve
  limb abnormalities. It is the most common FGFR2-related craniosynostosis syndrome and
  shows significant phenotypic variability, even within families with the same mutation.
disease_term:
  preferred_term: Crouzon syndrome
  term:
    id: MONDO:0007405
    label: Crouzon syndrome
parents:
- FGFR2-related craniosynostosis
prevalence:
- population: Birth prevalence
  percentage: 16.5 per 1,000,000
  notes: >-
    Published epidemiological work estimated the birth prevalence of Crouzon
    syndrome at 16.5 per 1,000,000, equivalent to about 1 in 60,600 births.
    Review literature also notes that Crouzon syndrome accounts for about 4.8%
    of all craniosynostosis cases.
  evidence:
  - reference: PMID:1633640
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Crouzon syndrome makes up approximately 4.8% of all cases of craniosynostosis. Using a weighted average estimate, birth prevalence was calculated to be 16.5/1,000,000."
    explanation: This epidemiological study directly reports the estimated birth prevalence of Crouzon syndrome.
  - reference: PMID:29085273
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Crouzon syndrome accounts for about 4.8% of all of them."
    explanation: This later clinical report reproduces the standard estimate that Crouzon syndrome comprises about 4.8% of craniosynostosis cases.
inheritance:
- name: Autosomal Dominant
  description: >
    Autosomal dominant inheritance with high penetrance but variable expressivity.
    Approximately 50-60% of cases are inherited; the remainder arise de novo.
  evidence:
  - reference: PMID:8528214
    reference_title: "Novel FGFR2 mutations in Crouzon and Jackson-Weiss syndromes show allelic heterogeneity and phenotypic variability."
    supports: PARTIAL
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      These results underscore the allelic heterogeneity of these conditions
      and the complexity of the phenotypic consequences of FGFR2 mutations
    explanation: >-
      Demonstrates that FGFR2 mutations in Crouzon syndrome lead to complex
      phenotypic variability, supporting the concept of variable expressivity.
pathophysiology:
- name: FGFR2 Gain-of-Function Signaling
  conforms_to: "fgfr_gain_of_function_skeletal_dysplasia#Constitutive FGFR Activation"
  description: >
    Mutations in FGFR2, predominantly in the third immunoglobulin-like domain
    (Ig-III) and linker regions, cause constitutive receptor activation or
    altered ligand binding. This leads to premature osteogenic differentiation
    in cranial suture mesenchyme and suture fusion.
