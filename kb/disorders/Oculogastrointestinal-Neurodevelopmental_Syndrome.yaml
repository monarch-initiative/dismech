      variants in the CAPN15 gene.
    explanation: >-
      This supports biallelic CAPN15 variation as the primary disease mechanism.
  downstream:
  - target: Abnormal ocular and neurodevelopmental phenotype
    description: >-
      CAPN15 variant effects manifest as eye abnormalities and developmental
      delay.
- name: Abnormal ocular and neurodevelopmental phenotype
  description: >-
    Reported biallelic missense variants are associated with ocular
    abnormalities and developmental delay.
  biological_processes:
  - preferred_term: eye development
    modifier: ABNORMAL
    term:
      id: GO:0001654
      label: eye development
  - preferred_term: nervous system development
    modifier: ABNORMAL
