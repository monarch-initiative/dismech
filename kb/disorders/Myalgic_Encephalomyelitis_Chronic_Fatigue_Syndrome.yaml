name: Myalgic Encephalomyelitis/Chronic Fatigue Syndrome
creation_date: '2025-12-06T01:38:31Z'
updated_date: '2026-03-12T22:00:00Z'
category: Complex
parents:
- Neurological Disorder
- Immune Disorder
disease_term:
  preferred_term: myalgic encephalomyelitis
  term:
    id: MONDO:0005404
    label: myalgic encephalomeyelitis/chronic fatigue syndrome
synonyms:
- ME/CFS
- Chronic Fatigue Syndrome
- Systemic Exertion Intolerance Disease
prevalence:
- population: United States
  percentage: 1.3% of adults (2021-2022 NHIS)
  evidence:
  - reference: PMID:38085820
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: Myalgic encephalomyelitis/chronic fatigue syndrome (ME/CFS) is a complex, multisystem illness characterized by activity-limiting fatigue, worsening of symptoms after activity, and other symptoms
    explanation: NCHS Data Brief from 2021-2022 National Health Interview Survey reports 1.3% prevalence of ME/CFS among US adults, with women (1.7%) more affected than men (0.9%).
  notes: Women (1.7%) more affected than men (0.9%); prevalence increases with age up to 60-69 years
- population: Global
  percentage: 0.89% (CDC-1994 criteria)
  evidence:
  - reference: PMID:32093722
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Total 1085,976 participants were enrolled from community-based survey (540,901) and primary care sites (545,075). The total average prevalence was 1.40 ± 1.57%, pooled prevalence 0.39%, and meta-analysis 0.68% [95% CI 0.48-0.97]"
    explanation: Systematic review and meta-analysis of 45 studies finds prevalence of 0.89% using CDC-1994 criteria, with women approximately 1.5-2 fold higher than men.
  notes: Prevalence varies widely by case definition and diagnostic method
diagnosis:
- name: IOM 2015 Diagnostic Criteria
  description: Clinical diagnosis based on three required symptoms (fatigue with substantial reduction in activity, post-exertional malaise, unrefreshing sleep) plus at least one of cognitive impairment or orthostatic intolerance.
  notes: No validated biomarker or diagnostic test currently exists
  evidence:
  - reference: PMID:31330791
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "ME/CFS research and patient treatment have been challenged by the lack of diagnostic biomarkers and finding these is a prominent direction of current work"
    explanation: Review confirms ME/CFS remains a clinical diagnosis without validated biomarkers.
- name: NIH Deep Phenotyping
  description: Comprehensive clinical and biological phenotyping reveals altered effort preference rather than simple fatigue, with dysfunction of integrative brain regions and central catechol pathway dysregulation.
  evidence:
  - reference: PMID:38383456
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "one defining feature of PI-ME/CFS was an alteration of effort preference, rather than physical or central fatigue, due to dysfunction of integrative brain regions potentially associated with central catechol pathway dysregulation, with consequences on autonomic functioning and physical conditioning"
    explanation: Landmark NIH intramural study using deep phenotyping identifies effort preference alteration as a defining feature, with immune profiling showing chronic antigenic stimulation.
pathophysiology:
- name: Innate Immune Hyperreactivity
  description: Exaggerated innate immune responses to microbial ligands, with exercise-triggered increases in proinflammatory signals, complement activation, and oxidative stress that contribute to post-exertional malaise.
  cell_types:
  - preferred_term: Natural Killer Cell
    term:
      id: CL:0000623
      label: natural killer cell
  - preferred_term: Monocyte
    term:
      id: CL:0000576
      label: monocyte
  biological_processes:
  - preferred_term: Innate Immune Response
    term:
      id: GO:0045087
      label: innate immune response
  - preferred_term: Complement Activation
    term:
      id: GO:0006956
      label: complement activation
  evidence:
  - reference: PMID:37226227
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: several studies validated the involvement of immune dysfunction in the pathology of ME/CFS and the use of lymphocytes as a model to investigate the pathomechanism of illness
    explanation: The BMC Medicine systematic review identifies immune dysfunction as the most reproducible finding in ME/CFS.
- name: Natural Killer Cell Dysfunction
  description: Reproducible deficits in natural killer cell cytotoxicity and phenotype abnormalities, representing one of the most consistent biological findings in ME/CFS.
  cell_types:
  - preferred_term: Natural Killer Cell
    term:
      id: CL:0000623
      label: natural killer cell
  evidence:
  - reference: PMID:31727160
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: Impaired NK cell cytotoxicity remained the most consistent immunological report across all publications
    explanation: Systematic review of 17 studies confirms NK cell dysfunction as the most reproducible immunological finding in ME/CFS.
  - reference: PMID:27245705
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: There was a significant reduction of TRPM3 surface expression on CD19(+) B cells (1.56 ± 0.191) and CD56(bright) NK cells (17.37 % ± 5.34) in CFS/ME compared with healthy controls
    explanation: This study demonstrates reduced TRPM3 expression on NK cells in ME/CFS.
- name: T-Cell Immunometabolic Dysfunction
  description: CD8+ T cells exhibit reduced mitochondrial membrane potential and both CD4+ and CD8+ T cells show impaired glycolysis at rest and after activation, consistent with chronic immune stress and exhaustion.
  cell_types:
  - preferred_term: CD8+ T Cell
    term:
      id: CL:0000625
      label: CD8-positive, alpha-beta T cell
  - preferred_term: CD4+ T Cell
    term:
      id: CL:0000624
      label: CD4-positive, alpha-beta T cell
  biological_processes:
  - preferred_term: T Cell Activation
    term:
      id: GO:0042110
      label: T cell activation
  - preferred_term: Glycolysis
    term:
      id: GO:0006096
      label: glycolytic process
  evidence:
  - reference: PMID:37226227
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: Potential biomarkers ranged from genetic/epigenetic (19.8%), immunological (29.7%), metabolomics/mitochondrial/microbiome (14.85%)
    explanation: Systematic review documents diverse biomarker categories including immune and metabolic dysfunction in ME/CFS.
  - reference: PMID:38383456
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Immune profiling suggested chronic antigenic stimulation with increase in naïve and decrease in switched memory B-cells"
    explanation: NIH deep phenotyping study demonstrates immune cell alterations consistent with chronic antigenic stimulation.
- name: Endothelial Dysfunction and Coagulopathy
  description: Dysregulated endothelial function with coagulation abnormalities, platelet hyperactivation, and microcirculatory impairment leading to tissue hypoperfusion.
  cell_types:
  - preferred_term: Endothelial Cell
    term:
      id: CL:0000115
      label: endothelial cell
  - preferred_term: Platelet
    term:
      id: CL:0000233
      label: platelet
  biological_processes:
  - preferred_term: Blood Coagulation
    term:
      id: GO:0007596
      label: blood coagulation
  - preferred_term: Platelet Activation
    term:
      id: GO:0030168
      label: platelet activation
  evidence:
  - reference: PMID:36730360
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: ME/CFS patients had markedly reduced FMD compared to healthy controls at baseline (5.1% vs. 8.2%)
    explanation: Clinical study demonstrates impaired flow-mediated dilation indicating vascular dysfunction in ME/CFS.
- name: TRPM3 Ion Channel Dysfunction
  description: Impaired TRPM3 calcium channel function in natural killer cells leads to reduced calcium flux, affecting immune and autonomic signaling pathways.
  cell_types:
  - preferred_term: Natural Killer Cell
    term:
      id: CL:0000623
      label: natural killer cell
  biological_processes:
  - preferred_term: Calcium Ion Transmembrane Transport
    term:
      id: GO:0070588
      label: calcium ion transmembrane transport
  evidence:
  - reference: PMID:31736966
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: TRPM3 channel activity was restored in IL-2 stimulated NK cells isolated from ME/CFS patients after incubation for 24 h with NTX
    explanation: Research demonstrates impaired TRPM3 function in ME/CFS NK cells and potential for pharmacological restoration.
- name: Neuroinflammation and Cerebral Hypoperfusion
  description: Chronic microglial activation, blood-brain barrier disruption, and reduced cerebral blood flow contribute to cognitive dysfunction and dysautonomia. Systemic immune activation propagates to the CNS via neurovascular pathways, establishing a self-sustaining neuroinflammatory cycle.
  cell_types:
  - preferred_term: Microglial Cell
    term:
      id: CL:0000129
      label: microglial cell
  locations:
  - preferred_term: Brain
    term:
      id: UBERON:0000955
      label: brain
  - preferred_term: Brainstem
    term:
      id: UBERON:0002298
      label: brainstem
  biological_processes:
  - preferred_term: Neuroinflammatory Response
    term:
      id: GO:0150076
      label: neuroinflammatory response
  evidence:
  - reference: PMID:32873297
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: Additional brain area recruitment for cognitive tasks and abnormalities in the brain stem are frequent observations
    explanation: Systematic review of 63 neuroimaging studies supports CNS involvement in ME/CFS.
  - reference: DOI:10.3389/fneur.2022.877772
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "following the initial stressor event, the subsequent systemic pathology moves to the brain via neurovascular pathways or through a dysfunctional blood-brain barrier (BBB), resulting in chronic neuroinflammation and leading to a sustained illness with chronic relapse recovery cycles"
    explanation: Mechanistic review proposes that systemic immune activation reaches the CNS through BBB disruption, establishing chronic neuroinflammation that sustains illness.
- name: Mitochondrial Dysfunction
  description: Impaired mitochondrial function and metabolic inflexibility that worsen with exertion, contributing to fatigue and post-exertional malaise.
  cellular_components:
  - preferred_term: Mitochondrion
    term:
      id: GO:0005739
      label: mitochondrion
  biological_processes:
  - preferred_term: Fatty Acid Beta-Oxidation
    term:
      id: GO:0006635
      label: fatty acid beta-oxidation
  - preferred_term: Response to Oxidative Stress
    term:
      id: GO:0006979
      label: response to oxidative stress
  evidence:
  - reference: PMID:22837795
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: all patients tested have measureable mitochondrial dysfunction which correlates with the severity of the illness
    explanation: ATP Profile testing demonstrates mitochondrial dysfunction in ME/CFS patients correlating with disease severity.
  - reference: PMID:31330791
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "modern research demonstrates a tangible biomedical basis for the disorder across many body systems. This evidence is mostly comprised of disturbances to immunological and inflammatory pathways, autonomic and neurological dysfunction, abnormalities in muscle and mitochondrial function, shifts in metabolism, and gut physiology or gut microbiota disturbances"
    explanation: Comprehensive review confirms mitochondrial dysfunction as one of several consistent biological abnormalities in ME/CFS.
- name: Central Catechol Pathway Dysregulation
  description: Dysfunction of integrative brain regions associated with altered catecholamine signaling leads to impaired effort preference rather than simple fatigue, with downstream effects on autonomic function and physical conditioning.
  locations:
  - preferred_term: Brain
    term:
      id: UBERON:0000955
      label: brain
  evidence:
  - reference: PMID:38383456
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "one defining feature of PI-ME/CFS was an alteration of effort preference, rather than physical or central fatigue, due to dysfunction of integrative brain regions potentially associated with central catechol pathway dysregulation, with consequences on autonomic functioning and physical conditioning"
    explanation: NIH deep phenotyping study identifies catechol pathway dysregulation as a mechanistic basis for the characteristic effort intolerance in ME/CFS.
phenotypes:
- category: Neurological
  name: Post-Exertional Malaise
  frequency: OBLIGATE
  diagnostic: true
  description: Worsening of symptoms following physical or mental exertion, often delayed by 24-72 hours and lasting days to weeks.
  notes: Cardinal feature required for diagnosis
  phenotype_term:
    preferred_term: Post-Exertional Malaise
    term:
      id: HP:0030973
      label: Postexertional symptom exacerbation
  evidence:
  - reference: PMID:25584525
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: Post-exertional malaise (PEM) is a cardinal symptom of the illnesses referred to as Myalgic Encephalomyelitis (ME), Myalgic Encephalomyelitis/chronic fatigue syndrome (ME/CFS), and chronic fatigue syndrome (CFS)
    explanation: PEM is universally recognized as the cardinal feature of ME/CFS.
- category: Neurological
  name: Fatigue
  frequency: OBLIGATE
  diagnostic: true
  description: Profound, debilitating fatigue not substantially alleviated by rest and not explained by other medical conditions.
  phenotype_term:
    preferred_term: Fatigue
    term:
      id: HP:0012378
      label: Fatigue
  evidence:
  - reference: PMID:38383456
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "one defining feature of PI-ME/CFS was an alteration of effort preference, rather than physical or central fatigue, due to dysfunction of integrative brain regions potentially associated with central catechol pathway dysregulation"
    explanation: The NIH deep phenotyping study reframes fatigue in ME/CFS as altered effort preference linked to integrative brain dysfunction.
- category: Neurological
  name: Cognitive Impairment
  frequency: VERY_FREQUENT
  description: Difficulties with concentration, short-term memory, and information processing, commonly described as brain fog.
  phenotype_term:
    preferred_term: Cognitive Impairment
    term:
      id: HP:0100543
      label: Cognitive impairment
  evidence:
  - reference: PMID:35140252
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: The clinical picture typically affects visuo-spatial immediate memory (g = - 0.55, p = 0.007), reading speed (g = - 0.82, p = 0.0001) and graphics gesture (g = - 0.59, p = 0.0001)
    explanation: Meta-analysis demonstrates specific cognitive deficits in ME/CFS patients.
- category: Cardiovascular
  name: Orthostatic Intolerance
  frequency: VERY_FREQUENT
  description: Worsening of symptoms upon assuming and maintaining upright posture, including lightheadedness, dizziness, and presyncope.
  phenotype_term:
    preferred_term: Orthostatic Intolerance
    term:
      id: HP:0001278
      label: Orthostatic hypotension
  evidence:
  - reference: PMID:31159884
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: Dizziness and lightheadedness were found in 41% of recumbent CFS subjects and in 72% of standing CFS subjects
    explanation: Orthostatic symptoms are highly prevalent in ME/CFS patients.
- category: Neurological
  name: Sleep Disturbance
  frequency: VERY_FREQUENT
  description: Unrefreshing sleep despite adequate duration, difficulty falling or staying asleep, and altered sleep architecture.
  phenotype_term:
    preferred_term: Sleep Disturbance
    term:
      id: HP:0002360
      label: Sleep disturbance
  evidence:
  - reference: PMID:36948138
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: Adult ME/CFS patients spend longer time in bed, longer sleep onset latency, longer awake time after sleep onset, reduced sleep efficiency
    explanation: Meta-analysis of objective sleep measures demonstrates sleep architecture abnormalities in ME/CFS.
- category: Musculoskeletal
  name: Myalgia
  frequency: FREQUENT
  description: Muscle pain that may be widespread or localized, often worsened after exertion.
  phenotype_term:
    preferred_term: Myalgia
    term:
      id: HP:0003326
