    snippet: Post-exertional malaise (PEM) is a cardinal symptom of the illnesses referred to as Myalgic Encephalomyelitis (ME), Myalgic Encephalomyelitis/chronic fatigue syndrome (ME/CFS), and chronic fatigue syndrome (CFS)
    explanation: Headaches are part of the symptom complex that worsens with post-exertional malaise.
- category: Musculoskeletal
  name: Exercise Intolerance
  frequency: VERY_FREQUENT
  description: Inability to sustain physical activity at expected levels, with physiological deconditioning and impaired energy metabolism.
