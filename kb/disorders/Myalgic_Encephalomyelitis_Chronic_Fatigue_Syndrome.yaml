  evidence:
  - reference: PMID:31330791
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "modern research demonstrates a tangible biomedical basis for the disorder across many body systems. This evidence is mostly comprised of disturbances to immunological and inflammatory pathways, autonomic and neurological dysfunction, abnormalities in muscle and mitochondrial function, shifts in metabolism, and gut physiology or gut microbiota disturbances"
    explanation: Review documents muscle function abnormalities as part of the multi-system pathology of ME/CFS.
- category: Neurological
  name: Headache
  frequency: FREQUENT
