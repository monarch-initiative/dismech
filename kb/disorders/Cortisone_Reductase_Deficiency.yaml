      supports: SUPPORT
      evidence_source: OTHER
      snippet: "Premature adrenarche is typical with precocious pseudopuberty"
      explanation: Orphanet directly links the CRD hyperandrogenic state to precocious pseudopuberty.
  - target: Hirsutism
