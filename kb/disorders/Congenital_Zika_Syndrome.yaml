treatments:
- name: Supportive Care
  description: >-
    There is no specific antiviral therapy for congenital Zika syndrome.
    Management is supportive and multidisciplinary, addressing feeding
    difficulties, seizures, spasticity, and developmental needs.
  treatment_term:
    preferred_term: supportive care
    term:
      id: MAXO:0000950
      label: supportive care
- name: Physical and Developmental Therapy
  description: >-
    Early rehabilitative and developmental therapy to support motor function
    and mitigate the consequences of arthrogryposis and spasticity.
  treatment_term:
    preferred_term: physical therapy
    term:
      id: MAXO:0000011
      label: physical therapy
discussions:
- discussion_id: gap_czs_module_conformance
  prompt: >-
    Congenital Zika syndrome is the exemplar non-genetic (infectious) cortical
    malformation in the Romero et al. 2018 review and should conform to a
    reusable "viral neural progenitor cytopathy" mechanism module once that
    module exists. How should the CZS pathophysiology nodes (neurotropic entry,
    progenitor infection/cell-cycle disruption, apoptosis/innate immune
    activation, progenitor depletion, cortical malformation) be aligned with the
    generic module skeleton?
  kind: KNOWLEDGE_GAP
  status: OPEN
  attaches_to:
  - pathophysiology#Neural Progenitor Infection and Cell-Cycle Disruption
  - pathophysiology#Progenitor Apoptosis and Innate Immune Activation
  - pathophysiology#Progenitor Depletion and Impaired Neurogenesis
  rationale: >-
    Issue #4088 (and the parent epic #4098) calls for CZS to conform to the
    viral neural progenitor cytopathy module tracked in #4079, which is not yet
    present in kb/modules/. Rather than reference a non-existent module via
    conforms_to (which would not validate), this entry captures the intended
    conformance as an open knowledge gap. Once the module lands, add
    conforms_to references on the matching nodes and substitute the disorder-
    specific exposure (ZIKV) and target cell (radial glia / neural progenitor)
    into the generic module skeleton.
- discussion_id: gap_czs_specific_therapy
  prompt: >-
    No approved antiviral or disease-modifying therapy exists for congenital
    Zika syndrome; candidate small molecules (e.g., nucleoside analogues) and
    TLR3-pathway modulation have shown effects only in experimental models.
    Which interventions, if any, can interrupt the progenitor-cytopathy cascade
    within the narrow prenatal therapeutic window?
  kind: KNOWLEDGE_GAP
  status: OPEN
  attaches_to:
  - pathophysiology#Progenitor Apoptosis and Innate Immune Activation
  rationale: >-
    Experimental evidence (e.g., TLR3 inhibition reducing ZIKV phenotypes in
    organoids) suggests mechanistically rational intervention points, but no
    therapy has translated to human prenatal use, and the destructive,
    early-onset nature of the progenitor cytopathy makes the therapeutic window
    extremely narrow. This gap motivates prevention (vector control, avoidance
    of exposure in pregnancy) as the current mainstay.
