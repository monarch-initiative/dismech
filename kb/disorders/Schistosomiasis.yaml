name: Schistosomiasis
creation_date: '2026-01-26T03:01:01Z'
updated_date: '2026-04-04T23:35:05Z'
category: Infectious Disease
description: >-
  Schistosomiasis is a helminth infection caused by blood flukes of the genus
  Schistosoma, with disease driven by egg deposition that triggers granulomatous
  inflammation in intestinal, hepatosplenic, and urogenital tissues.
disease_term:
  term:
    id: MONDO:0015254
    label: schistosomiasis
  preferred_term: Schistosomiasis
parents:
- Helminth infection
- Neglected tropical disease
infectious_agent:
- name: Schistosoma spp.
  infectious_agent_term:
    preferred_term: Schistosoma
    term:
      id: NCBITaxon:6181
      label: Schistosoma
  description: Blood flukes responsible for human schistosomiasis.
  evidence:
  - reference: PMID:30093684
    reference_title: "Schistosomiasis."
    supports: SUPPORT
    snippet: "caused by parasitic flatworms (blood flukes) of the genus Schistosoma"
    explanation: The review identifies Schistosoma blood flukes as the causative
      agents.
agent_life_cycle:
  description: Schistosome life cycle stages spanning freshwater snails and
    human blood vessels.
  hosts:
  - preferred_term: fresh-water snails
    term:
      id: NCBITaxon:6448
      label: Gastropoda
    role: intermediate host
  - preferred_term: humans
    term:
      id: NCBITaxon:9606
      label: Homo sapiens
    role: definitive host
  life_cycle_stages:
  - name: Snail intermediate host development and skin penetration
    life_cycle_stage_term:
      preferred_term: cercaria stage
      term:
        id: OPL:0000070
        label: cercaria stage
    description: Infective larvae develop in freshwater snails and then
      penetrate human skin.
    evidence:
    - reference: PMID:30093684
      reference_title: "Schistosomiasis."
      supports: SUPPORT
      snippet: "Infective larvae grow in an intermediate host (fresh-water snails)
        before penetrating the skin of the definitive human host."
      explanation: The abstract describes development in snails followed by
        human skin penetration.
  - name: Adult worms in mesenteric or pelvic veins with egg excretion
    life_cycle_stage_term:
      preferred_term: adult parasitic worm stage
      term:
        id: OPL:0000237
        label: adult parasitic worm stage
    description: Adult worms reside in mesenteric or pelvic veins and lay eggs
      that are excreted in stool or urine.
    evidence:
    - reference: PMID:30093684
      reference_title: "Schistosomiasis."
      supports: SUPPORT
      snippet: "Mature adult worms reside in the mesenteric (Schistosoma mansoni and
        Schistosoma japonicum) or pelvic (Schistosoma haematobium) veins, where female
        worms lay eggs, which are secreted in stool or urine."
      explanation: The abstract specifies adult worm location and egg excretion
        routes.
  - name: Egg trapping in tissues drives granulomatous inflammation
    life_cycle_stage_term:
      preferred_term: egg stage
      term:
        id: OPL:0000180
        label: egg stage
    description: Eggs lodged in tissues such as the liver or bladder induce
      granulomatous inflammation.
    evidence:
    - reference: PMID:30093684
      reference_title: "Schistosomiasis."
      supports: SUPPORT
      snippet: "Eggs trapped in the surrounding tissues and organs, such as the liver
        and bladder, cause inflammatory immune responses (including granulomas)"
      explanation: The abstract links trapped eggs to granulomatous
        inflammation.
transmission:
- name: Freshwater cercarial skin penetration
  description: Infective larvae released from freshwater snails penetrate human
    skin.
  evidence:
  - reference: PMID:30093684
    reference_title: "Schistosomiasis."
    supports: SUPPORT
    snippet: "Infective larvae grow in an intermediate host (fresh-water snails) before
      penetrating the skin of the definitive human host."
    explanation: The abstract specifies snail intermediate hosts and skin
      penetration.
pathophysiology:
- name: Adult worm residence in mesenteric or pelvic veins
  description: Adult schistosomes inhabit mesenteric or pelvic veins, enabling
    egg deposition into stool or urine.
  evidence:
  - reference: PMID:30093684
    reference_title: "Schistosomiasis."
    supports: SUPPORT
    snippet: "Mature adult worms reside in the mesenteric (Schistosoma mansoni and
      Schistosoma japonicum) or pelvic (Schistosoma haematobium) veins"
    explanation: The abstract localizes adult worms to mesenteric or pelvic
      venous beds.
- name: Egg trapping triggers granulomatous inflammation
  description: Eggs lodged in tissues such as the liver or bladder provoke
    granulomatous inflammatory responses.
  locations:
  - preferred_term: liver
    term:
      id: UBERON:0002107
      label: liver
  - preferred_term: urinary bladder
    term:
      id: UBERON:0001255
      label: urinary bladder
  evidence:
  - reference: PMID:30093684
    reference_title: "Schistosomiasis."
    supports: SUPPORT
    snippet: "Eggs trapped in the surrounding tissues and organs, such as the liver
