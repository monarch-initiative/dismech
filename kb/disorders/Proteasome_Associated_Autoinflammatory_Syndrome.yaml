treatments:
- name: Baricitinib therapy
  description: >
    JAK1/2 inhibition with baricitinib can suppress interferon-driven disease
    activity in PRAAS, but dose reductions may precipitate rebound flares.
  treatment_term:
    preferred_term: targeted therapy
    term:
      id: NCIT:C93352
      label: Targeted Therapy
    therapeutic_agent:
    - preferred_term: baricitinib
      term:
        id: CHEBI:95341
        label: baricitinib
  evidence:
  - reference: PMID:38653530
    reference_title: "Disease flares with baricitinib dose reductions and development of flare criteria in patients with CANDLE/PRAAS."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Patients with chronic atypical neutrophilic dermatosis with lipodystrophy and elevated temperature/proteasome-associated autoinflammatory syndrome (CANDLE/PRAAS) respond to the janus kinase inhibitor 1/2 inhibition with baricitinib at exposures higher than in rheumatoid arthritis."
    explanation: PRAAS-specific cohort data support baricitinib as an effective mechanism-based therapy and show its exposure-response dependence.
  - reference: PMID:31046790
    reference_title: "Disease course and treatment effects of a JAK inhibitor in a patient with CANDLE syndrome."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "We have treated the patient with the JAK inhibitor baricitinib for the past year and we observed a significant amelioration of his inflammatory episodes, skin and joint manifestations, and improvements in physical activities and growth."
    explanation: Independent case evidence supports clinically meaningful baricitinib benefit in CANDLE/PRAAS.
- name: Anifrolumab therapy
  description: >
    IFNAR1 blockade with anifrolumab is an emerging treatment option for type I
    interferonopathies and has early supportive evidence in CANDLE/PRAAS.
  treatment_term:
    preferred_term: pharmacotherapy
    term:
      id: MAXO:0000058
      label: pharmacotherapy
    therapeutic_agent:
    - preferred_term: anifrolumab
      term:
        id: NCIT:C166658
        label: Anifrolumab
  evidence:
  - reference: PMID:39441221
    reference_title: "Normalized Interferon Signatures and Clinical Improvements by IFNAR1 Blocking Antibody (Anifrolumab) in Patients with Type I Interferonopathies."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Here we show in four patients with SAVI and one patient with CANDLE syndrome that blockade of the IFNAR1 receptor (Anifrolumab) exerts an additive effect over JAK-inhibitor alone."
    explanation: The case-series abstract directly includes one CANDLE patient and supports IFNAR1 blockade as a rational add-on strategy.
  - reference: PMID:39441221
    reference_title: "Normalized Interferon Signatures and Clinical Improvements by IFNAR1 Blocking Antibody (Anifrolumab) in Patients with Type I Interferonopathies."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Anifrolumab normalizes IFN-I signature genes and relieves symptoms beyond what is typically achieved by a JAK-inhibitor (Baricitinib) alone in patients with type-I interferonopathies."
    explanation: Supports the specific therapeutic rationale of directly suppressing IFN-I signaling in interferonopathy-spectrum disease.
