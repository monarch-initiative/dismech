name: Atelosteogenesis Type II
creation_date: '2026-03-04T07:56:34Z'
updated_date: '2026-03-04T07:56:34Z'
category: Mendelian
description: >
  Atelosteogenesis Type II is a skeletal dysplasia associated with pathogenic variation in
  SLC26A2, causing abnormal cartilage and growth plate biology with disturbed
  endochondral ossification and disproportionate skeletal growth.
disease_term:
  preferred_term: atelosteogenesis type II
