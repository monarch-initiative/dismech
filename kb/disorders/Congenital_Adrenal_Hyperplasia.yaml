  evidence:
  - reference: PMID:37176569
    reference_title: "Clinical Update on Congenital Adrenal Hyperplasia: Recommendations from a Multidisciplinary Adrenal Program."
    supports: PARTIAL
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      The main goals of CAH treatment are hormone supplementation for severe
      cases, controlling adrenal androgen overproduction to minimize long-term
      side effects, managing fertility and genetic counseling, and optimizing
      patients' quality of life.
    explanation: >-
      This clinical update supports fertility management as a CAH care goal;
      the more specific TART phenotype was surfaced by Falcon, but the local HPO
      term suggested by review was incorrect, so the closest verified HPO
      binding is used.
