    reference_title: "Long-term cardiometabolic morbidity in young adults with classic 21-hydroxylase deficiency congenital adrenal hyperplasia."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Of these, 126 (52%) were females and 174 (71%) received fludrocortisone in
      addition to glucocorticoids. Of the 244 adults, 73 (30%) were treated for
      at least one comorbidity and 15 (21%) for more than 2 co-morbidities.
    explanation: >-
      Supports clinically treated long-term comorbidity in adults with classic
      CAH; the same abstract specifies osteoporosis/osteopaenia among the
      surveyed comorbidity domains.
