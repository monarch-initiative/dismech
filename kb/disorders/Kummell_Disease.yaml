name: Kummell Disease
category: Complex
parents:
- Musculoskeletal Disease
- Bone Disease
disease_term:
  preferred_term: Kummell disease
  term:
    id: MONDO:0003940
    label: Kummell disease
pathophysiology:
- name: Vertebral Avascular Necrosis
  description: >
    Disruption of blood supply to the vertebral body following minor trauma leads
    to ischemic osteonecrosis. Hematopoietic cells become necrotic within 12 hours
    of ischemia onset, and without reperfusion the vertebral body undergoes
    progressive avascular necrosis with failure of fracture healing. The avascular
    necrosis results in structural collapse of the vertebral body.
  cell_types:
  - preferred_term: osteocyte
    term:
      id: CL:0000137
      label: osteocyte
  - preferred_term: osteoclast
    term:
      id: CL:0000092
      label: osteoclast
  biological_processes:
  - preferred_term: bone remodeling
    term:
      id: GO:0046849
      label: bone remodeling
  locations:
  - preferred_term: bony vertebral centrum
    term:
      id: UBERON:0001075
      label: bony vertebral centrum
  evidence:
  - reference: PMID:23814399
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >
      Kummell disease is avascular necrosis of a vertebral body following
      trauma, described by Hermann Kummell in 1895.
    explanation: >
      Establishes the core pathophysiology of Kummell disease as avascular
      necrosis of the vertebral body following traumatic insult.
  - reference: PMID:27446290
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >
      the ischemic mechanism of the formation of IVC in the injured vertebral
      body
    explanation: >
      Supports the ischemic/avascular mechanism underlying vertebral body
      necrosis in Kummell disease.
- name: Intravertebral Vacuum Cleft Formation
  description: >
    Progressive osteonecrosis creates a gas-filled cavity (vacuum cleft) within
    the vertebral body, representing nonunion at the fracture site. This vacuum
    phenomenon is considered pathognomonic for Kummell disease and indicates
    ongoing instability. The intravertebral vacuum cleft (IVC) is best
    visualized on CT or MRI and serves as a key diagnostic feature.
  biological_processes:
  - preferred_term: bone resorption
    term:
      id: GO:0045453
      label: bone resorption
  locations:
  - preferred_term: bony vertebral centrum
    term:
      id: UBERON:0001075
      label: bony vertebral centrum
  evidence:
  - reference: PMID:27446290
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >
      The formation of IVC, the pathognomonic sign of Kummell's disease, has
      not been fully explained.
    explanation: >
      Confirms that the intravertebral vacuum cleft is the pathognomonic
      radiological sign of Kummell disease.
  - reference: PMID:34208124
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >
      Kummell's disease is a clinical syndrome following spinal trauma in which
      an initial, seemingly minor compression fracture is followed by a period
      of relatively few or no symptoms
    explanation: >
      Describes the characteristic delayed presentation pattern where initial
      fracture progresses to vacuum cleft formation and vertebral collapse.
- name: Osteoporosis-Mediated Vascular Compromise
  description: >
    Osteoporosis causes microfractures that damage small blood-supplying arteries
    within the vertebral body. The impaired vascular supply prevents normal fracture
    healing and predisposes to avascular necrosis, making osteoporosis a key
    pathogenic factor. This explains the predominance of Kummell disease in
    elderly osteoporotic patients.
  cell_types:
  - preferred_term: osteoblast
    term:
      id: CL:0000062
      label: osteoblast
  - preferred_term: osteoclast
    term:
      id: CL:0000092
      label: osteoclast
  biological_processes:
  - preferred_term: bone remodeling
    term:
      id: GO:0046849
      label: bone remodeling
  - preferred_term: angiogenesis
    term:
      id: GO:0001525
      label: angiogenesis
  locations:
  - preferred_term: bony vertebral centrum
    term:
      id: UBERON:0001075
      label: bony vertebral centrum
  evidence:
  - reference: PMID:37051029
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >
      Kummell's disease is becoming increasingly important in an aging society
    explanation: >
      Highlights the strong association between aging, osteoporosis, and
      Kummell disease, supporting osteoporosis as a key predisposing factor.
  - reference: PMID:27446290
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >
      the ischemic mechanism of the formation of IVC in the injured vertebral
      body
    explanation: >
      Supports the vascular compromise mechanism whereby osteoporotic bone
      is susceptible to ischemic injury following minor trauma.
phenotypes:
- name: Back Pain
  category: Musculoskeletal
  frequency: VERY_FREQUENT
  description: >
    Progressive back pain at the level of the affected vertebra, often with
    a characteristic pain-free interval after initial trauma followed by
    delayed onset of worsening pain.
  phenotype_term:
    preferred_term: Back pain
    term:
      id: HP:0003418
      label: Back pain
  evidence:
  - reference: PMID:23814399
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >
      Kummell disease is avascular necrosis of a vertebral body following
      trauma, described by Hermann Kummell in 1895.
    explanation: >
      Back pain is the primary clinical presentation of Kummell disease,
      as described in this clinical overview.
- name: Thoracic Kyphosis
  category: Musculoskeletal
  frequency: FREQUENT
  description: >
    Progressive kyphotic deformity resulting from anterior vertebral body
    collapse, predominantly affecting the thoracolumbar junction.
  phenotype_term:
    preferred_term: Thoracic kyphosis
    term:
      id: HP:0002942
      label: Thoracic kyphosis
  evidence:
  - reference: PMID:36874888
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >
      Strategies in the Management of Osteoporotic Kummell's Disease
    explanation: >
      Kyphotic deformity is a well-recognized consequence of vertebral
      collapse in Kummell disease requiring management.
- name: Vertebral Compression Fracture
  category: Musculoskeletal
  frequency: VERY_FREQUENT
  diagnostic: true
  description: >
    Progressive vertebral body collapse with loss of vertebral height,
    often with pathognomonic intravertebral vacuum cleft sign on imaging.
  phenotype_term:
    preferred_term: Vertebral compression fracture
    term:
      id: HP:0002953
      label: Vertebral compression fracture
  evidence:
  - reference: PMID:34208124
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >
      Kummell's disease is a clinical syndrome following spinal trauma in which
      an initial, seemingly minor compression fracture is followed by a period
      of relatively few or no symptoms
    explanation: >
      Vertebral compression fracture is the defining radiological finding,
      with characteristic delayed progressive collapse.
- name: Avascular Necrosis
  category: Musculoskeletal
  frequency: OBLIGATE
  diagnostic: true
  description: >
    Avascular necrosis of the vertebral body is the hallmark pathological
    finding that defines Kummell disease.
  phenotype_term:
    preferred_term: Avascular necrosis
    term:
      id: HP:0010885
      label: Avascular necrosis
  evidence:
  - reference: PMID:23814399
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >
      Kummell disease is avascular necrosis of a vertebral body following
      trauma, described by Hermann Kummell in 1895.
    explanation: >
      Avascular necrosis of the vertebral body is the defining pathological
      process of Kummell disease.
- name: Myelopathy
  category: Neurological
  frequency: OCCASIONAL
  description: >
    Spinal cord compression can occur due to retropulsion of bone fragments
    or severe kyphotic deformity, leading to neurological deficits.
  phenotype_term:
    preferred_term: Myelopathy
    term:
      id: HP:0002196
      label: Myelopathy
  evidence:
  - reference: PMID:36874888
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >
      Strategies in the Management of Osteoporotic Kummell's Disease
    explanation: >
      Neurological compromise including myelopathy is a recognized
      complication requiring surgical intervention.
environmental:
- name: Osteoporosis
  description: >
    Osteoporosis is the primary predisposing factor, weakening vertebral
    bone and impairing vascular supply needed for fracture healing.
  evidence:
  - reference: PMID:37051029
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >
      Kummell's disease is becoming increasingly important in an aging society
    explanation: >
      The increasing prevalence of Kummell disease correlates with aging
      populations and higher rates of osteoporosis.
- name: Minor Spinal Trauma
  description: >
    A history of minor spinal trauma or compression injury precedes
    the development of Kummell disease, initiating the ischemic cascade.
  evidence:
  - reference: PMID:23814399
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >
      Kummell disease is avascular necrosis of a vertebral body following
      trauma, described by Hermann Kummell in 1895.
    explanation: >
      Trauma is the inciting event that triggers vertebral avascular necrosis.
- name: Advanced Age
  description: >
    Kummell disease predominantly affects elderly patients, reflecting
    age-related bone loss and impaired healing capacity.
  evidence:
  - reference: PMID:37051029
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >
      Kummell's disease is becoming increasingly important in an aging society
    explanation: >
      Aging is a major risk factor as it correlates with osteoporosis
      and reduced bone healing capacity.
- name: Corticosteroid Use
  description: >
    Long-term corticosteroid use contributes to secondary osteoporosis
    and impaired bone vascularity, increasing risk of vertebral avascular necrosis.
  evidence:
  - reference: PMID:36874888
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >
      Strategies in the Management of Osteoporotic Kummell's Disease
    explanation: >
      Corticosteroid-induced osteoporosis is a recognized risk factor
      for Kummell disease.
- name: Alcohol Use
  description: >
    Chronic alcohol use is associated with avascular necrosis at multiple
    skeletal sites and may predispose to vertebral avascular necrosis.
  evidence:
  - reference: PMID:36874888
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >
      Strategies in the Management of Osteoporotic Kummell's Disease
    explanation: >
      Alcohol use is identified as a risk factor for avascular necrosis
      and osteoporosis contributing to Kummell disease.
treatments:
- name: Vertebroplasty
  description: >
    Percutaneous injection of bone cement (polymethylmethacrylate) into
    the collapsed vertebral body to stabilize the fracture and relieve pain.
    Effective for pain relief but does not restore vertebral height.
  treatment_term:
    preferred_term: surgical procedure
    term:
      id: MAXO:0000004
      label: surgical procedure
  evidence:
  - reference: PMID:36874888
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >
      Strategies in the Management of Osteoporotic Kummell's Disease
    explanation: >
      Vertebroplasty is one of the primary management strategies for
      Kummell disease.
- name: Kyphoplasty
  description: >
    Balloon-assisted vertebral augmentation to restore vertebral height
    and correct kyphotic deformity before cement injection. Preferred over
    vertebroplasty when height restoration is desired.
  treatment_term:
    preferred_term: surgical procedure
    term:
      id: MAXO:0000004
      label: surgical procedure
  evidence:
  - reference: PMID:36874888
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >
      Strategies in the Management of Osteoporotic Kummell's Disease
    explanation: >
      Kyphoplasty is a key management strategy for restoring vertebral
      height in Kummell disease.
- name: Surgical Decompression and Fusion
  description: >
    Posterior or anterior surgical approach for decompression and stabilization
    in cases with neurological compromise or severe kyphotic deformity.
    Reserved for advanced cases not amenable to percutaneous approaches.
  treatment_term:
    preferred_term: surgical procedure
    term:
      id: MAXO:0000004
      label: surgical procedure
  evidence:
  - reference: PMID:36874888
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >
      Strategies in the Management of Osteoporotic Kummell's Disease
    explanation: >
      Surgical intervention is indicated for severe cases with neurological
      deficit or significant deformity.
- name: Anti-Osteoporosis Pharmacotherapy
  description: >
    Bisphosphonates, denosumab, or teriparatide to treat underlying
    osteoporosis and reduce risk of further vertebral fractures.
  treatment_term:
    preferred_term: pharmacotherapy
    term:
      id: MAXO:0000058
      label: pharmacotherapy
  evidence:
  - reference: PMID:37051029
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >
      Kummell's disease is becoming increasingly important in an aging society
    explanation: >
      Addressing underlying osteoporosis is essential for comprehensive
      management of Kummell disease.
datasets:
notes: >
    Kummell disease (Kümmell disease) was first described by Hermann Kümmell
    in 1895. It represents a delayed post-traumatic vertebral collapse
    characterized by avascular necrosis with intravertebral vacuum cleft
    formation. The condition is increasingly recognized with aging populations
    and improved imaging. The thoracolumbar junction (T11-L2) is most commonly
    affected. Diagnosis relies on the presence of an intravertebral vacuum
    cleft on CT or MRI, which is pathognomonic. Treatment ranges from
    conservative management to percutaneous cement augmentation (vertebroplasty
    or kyphoplasty) and surgical stabilization for severe cases.
