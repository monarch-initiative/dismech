category: Mendelian
parents:
- hereditary disease
- primary immunodeficiency
synonyms:
- VODI
- VODI syndrome
- hepatic veno-occlusive disease with immunodeficiency
description: >-
  Hepatic veno-occlusive disease-immunodeficiency syndrome is a rare autosomal
  recessive SP110-related primary immunodeficiency characterized by severe
  hypogammaglobulinemia, combined immunodeficiency, absent germinal centers and
  plasma cells, and early-onset hepatic sinusoidal/terminal venular occlusion
  with progressive hepatic fibrosis. Available evidence supports a causal chain
  from SP110 deficiency to defective adaptive immune maturation with
  opportunistic infection susceptibility and a parallel hepatic vascular-fibrotic
  injury program.
