    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      In the past the prognosis for affected individuals was poor, with 100%
      mortality in the first year of life if unrecognized and untreated with
      intravenous or subcutaneous immunoglobulin (IVIG/SCIG)
    explanation: >-
      This directly supports immunoglobulin replacement as a core life-saving
      therapy in VODI.
