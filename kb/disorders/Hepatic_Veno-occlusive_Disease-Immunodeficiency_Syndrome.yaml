differential_diagnoses:
- name: Severe combined immunodeficiency
  description: >-
    VODI can initially resemble severe combined immunodeficiency because of
    early opportunistic infections and profound immune dysfunction.
  distinguishing_features:
  - Hepatic veno-occlusive disease and hepatic fibrosis favor VODI.
  - Biallelic SP110 variants support VODI, and TREC-based newborn SCID screening may miss it.
  disease_term:
    preferred_term: severe combined immunodeficiency
    term:
      id: MONDO:0015974
      label: severe combined immunodeficiency
  evidence:
  - reference: PMID:22982295
    reference_title: "Hepatic veno-occlusive disease with immunodeficiency (VODI): first reported case in the U.S. and identification of a unique mutation in Sp110."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Familial hepatic veno-occlusive disease with immunodeficiency (VODI,
      OMIM: 235550), a rare form of severe combined immune deficiency
    explanation: >-
      This directly supports severe combined immunodeficiency as an important
      overlapping diagnosis that VODI may mimic.
- name: Hepatic veno-occlusive disease
  description: >-
    Isolated hepatic veno-occlusive disease or sinusoidal obstruction syndrome
    overlaps with the liver phenotype of VODI but lacks the syndromic immune
    defect.
  distinguishing_features:
  - Severe hypogammaglobulinemia and combined immunodeficiency favor VODI.
  - Identification of biallelic SP110 variants distinguishes the inherited syndromic form.
  disease_term:
    preferred_term: hepatic veno-occlusive disease
    term:
      id: MONDO:0019514
      label: hepatic veno-occlusive disease
  evidence:
  - reference: PMID:16648851
    reference_title: Mutations in the gene encoding the PML nuclear body protein Sp110 are associated with immunodeficiency and hepatic veno-occlusive disease.
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      severe hypogammaglobulinemia, combined T and B cell immunodeficiency,
      absent lymph node germinal centers, absent tissue plasma cells and
      hepatic veno-occlusive disease
    explanation: >-
      This supports distinguishing the inherited immunodeficiency syndrome from
      isolated hepatic veno-occlusive disease.
