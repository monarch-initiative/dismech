name: Congenital Insensitivity to Pain
creation_date: "2026-04-16T19:22:23Z"
updated_date: "2026-04-16T19:22:23Z"
category: Mendelian
synonyms:
- CIP
- congenital analgesia
- congenital painlessness
description: >-
  Congenital insensitivity to pain (CIP) is a phenotype-defined umbrella for
  rare monogenic disorders with lifelong absence of nociception from birth.
  The umbrella spans two major mechanism classes: developmental nociceptor
  disorders driven by impaired nerve development, trophic signaling, or
  survival, classically involving NTRK1/NGF and also PRDM12; and nociceptor
  channelopathies in anatomically present neurons, represented by SCN9A and
  SCN11A. The major subtype branches curated here are NTRK1-related HSAN IV /
  CIPA, NGF-related HSAN V, SCN9A-related channelopathy-associated CIP,
  SCN11A-related HSAN VII, and PRDM12-related HSAN VIII.
disease_term:
  preferred_term: congenital insensitivity to pain
  term:
    id: MONDO:0015364
    label: hereditary sensory and autonomic neuropathy
notes: >-
  This is curated as a phenotype-defined umbrella rather than a single-gene
  disease. The exact MONDO term "congenital insensitivity to pain" is requested
  in MONDO NTR #10031; until that term exists in MONDO, this entry anchors to
  the broader hereditary sensory and autonomic neuropathy parent and models the
  established child diseases as subtype branches.
review_notes: >-
  The subtype set follows the requested umbrella scope centered on NTRK1
  (HSAN IV / CIPA), NGF (HSAN V), SCN9A channelopathy-associated CIP, SCN11A
  (HSAN VII), and PRDM12. Current literature and resources use mixed numbering
  for the PRDM12 branch; this entry follows current MONDO labeling for the
  child term while noting the older review nomenclature in the evidence.
has_subtypes:
- name: HSAN IV
  display_name: NTRK1-related HSAN IV / congenital insensitivity to pain with anhidrosis
  subtype_term:
    preferred_term: hereditary sensory and autonomic neuropathy type 4
    term:
      id: MONDO:0009746
      label: hereditary sensory and autonomic neuropathy type 4
  description: >-
    Classic congenital insensitivity to pain with anhidrosis branch caused by
    failure of NGF-TRKA-dependent nociceptor and sympathetic development,
    typically with anhidrosis, recurrent fever, and frequent self-injury.
  evidence:
  - reference: PMID:16138253
    reference_title: "Congenital insensitivity to pain with Anhidrosis (NTRK1 mutation) and early onset renal disease: clinical report on three sibs with a 25-year follow-up in one of them."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Congenital insensitivity to pain with anhidrosis (CIPA) is an autosomal
      recessive disorder caused by mutations in the neurotrophic tyrosine
      receptor kinase 1 (NTRK1) gene which encodes the receptor for nerve
      growth factor (NGF).
    explanation: Supports NTRK1 as the canonical HSAN IV / CIPA branch of the CIP umbrella.
- name: HSAN V
  display_name: NGF-related HSAN V
  subtype_term:
    preferred_term: hereditary sensory and autonomic neuropathy type 5
    term:
      id: MONDO:0012092
      label: hereditary sensory and autonomic neuropathy type 5
  description: >-
    Developmental CIP branch caused by ligand-side disruption of NGF signaling,
    typically with deep-pain and temperature loss, small-fiber neuropathy, and
    relatively preserved cognition compared with CIPA.
  evidence:
  - reference: PMID:14976160
    reference_title: "A mutation in the nerve growth factor beta gene (NGFB) causes loss of pain perception."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Clinically they best fit into HSAN V. Using a model of recessive
      inheritance we identified an 8.3 Mb region on chromosome 1p11.2-p13.2
      shared by the affected individuals in the family. Analysis of functional
      candidate genes in the disease critical region revealed a mutation in the
      coding region of the nerve growth-factor beta (NGFB) gene specific for
      the disease haplotype.
    explanation: Establishes NGF / NGFB mutation as the cause of the HSAN V branch.
- name: SCN9A AR-CIP
  display_name: SCN9A-related channelopathy-associated congenital insensitivity to pain
  subtype_term:
    preferred_term: channelopathy-associated congenital insensitivity to pain, autosomal recessive
    term:
      id: MONDO:0009459
      label: channelopathy-associated congenital insensitivity to pain, autosomal recessive
  description: >-
    Nondevelopmental channelopathy branch in which nociceptors are present but
    Nav1.7 loss of function prevents effective nociceptive signaling; congenital
    anosmia is a characteristic clue.
  evidence:
  - reference: PMID:32219415
    reference_title: "Understanding the genetic basis of congenital insensitivity to pain."
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      The commonest condition within this group is CIP-SCN9A (also called
      channelopathy associated with CIP). In CIP-SCN9A the only additional
      feature is congenital anosmia (absence of the sense of smell), and many
      adults have gone undiagnosed, and/or unbelieved when they explain that
      they don’t feel pain.
    explanation: Review evidence supports SCN9A-associated CIP as the major channelopathy subtype and highlights anosmia as its key associated feature.
- name: HSAN VII
  display_name: SCN11A-related HSAN VII / congenital inability to experience pain
  subtype_term:
    preferred_term: hereditary sensory and autonomic neuropathy type 7
    term:
      id: MONDO:0014244
      label: hereditary sensory and autonomic neuropathy type 7
  description: >-
    Dominant Nav1.9 channelopathy branch with paradoxical painlessness,
    gastrointestinal hypomotility, pruritus, mild weakness, and tissue damage
    caused by gain-of-function depolarization block.
  evidence:
  - reference: PMID:24036948
    reference_title: "A de novo gain-of-function mutation in SCN11A causes loss of pain perception."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Using exome sequencing, we identified a specific de novo missense
      mutation in SCN11A in individuals with the congenital inability to
      experience pain who suffer from recurrent tissue damage and severe
      mutilations.
    explanation: Establishes SCN11A as the cause of the HSAN VII / congenital inability to experience pain branch.
- name: HSAN VIII
  display_name: PRDM12-related HSAN VIII / congenital insensitivity to pain-hypohidrosis syndrome
  subtype_term:
    preferred_term: congenital insensitivity to pain-hypohidrosis syndrome
    term:
      id: MONDO:0014662
      label: congenital insensitivity to pain-hypohidrosis syndrome
  description: >-
    Developmental PRDM12 branch with congenital painlessness from defective
    nociceptor specification, often with relatively preserved cognition and
    olfaction compared with classic CIPA.
  evidence:
  - reference: PMID:32219415
    reference_title: "Understanding the genetic basis of congenital insensitivity to pain."
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      In 2015 a new HSAN4-like phenotype was reported caused by bi-allelic
      mutations in PRDM12 (clinically known as HSAN6).
    explanation: Review evidence establishes PRDM12 as a distinct developmental CIP branch; current MONDO terminology maps this branch to congenital insensitivity to pain-hypohidrosis syndrome / HSAN VIII.
genetic:
- name: NTRK1
  gene_term:
    preferred_term: NTRK1
    term:
      id: hgnc:8031
      label: NTRK1
  association: Causative
  features: >-
    Biallelic NTRK1 variants cause HSAN IV / CIPA and define the classic
    NGF-TRKA developmental/survival branch of the umbrella.
  evidence:
  - reference: PMID:16138253
    reference_title: "Congenital insensitivity to pain with Anhidrosis (NTRK1 mutation) and early onset renal disease: clinical report on three sibs with a 25-year follow-up in one of them."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Congenital insensitivity to pain with anhidrosis (CIPA) is an autosomal
      recessive disorder caused by mutations in the neurotrophic tyrosine
      receptor kinase 1 (NTRK1) gene which encodes the receptor for nerve
      growth factor (NGF).
    explanation: Direct human evidence that NTRK1 mutations cause the HSAN IV / CIPA branch.
- name: NGF
  gene_term:
    preferred_term: NGF
    term:
      id: hgnc:7808
      label: NGF
  association: Causative
  features: >-
    Homozygous NGF variants cause HSAN V and show that ligand-side disruption
    of the same trophic signaling axis can produce congenital painlessness.
  evidence:
  - reference: PMID:14976160
    reference_title: "A mutation in the nerve growth factor beta gene (NGFB) causes loss of pain perception."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Clinically they best fit into HSAN V. Using a model of recessive
      inheritance we identified an 8.3 Mb region on chromosome 1p11.2-p13.2
      shared by the affected individuals in the family. Analysis of functional
      candidate genes in the disease critical region revealed a mutation in the
      coding region of the nerve growth-factor beta (NGFB) gene specific for
      the disease haplotype.
    explanation: Direct evidence that NGF mutation causes the HSAN V form of CIP.
- name: SCN9A
  gene_term:
    preferred_term: SCN9A
    term:
      id: hgnc:10597
      label: SCN9A
  association: Causative
  features: >-
    Biallelic SCN9A loss-of-function variants cause channelopathy-associated
    CIP with anosmia and anatomically present but electrically silent
    nociceptors.
  evidence:
  - reference: PMID:32219415
    reference_title: "Understanding the genetic basis of congenital insensitivity to pain."
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      So, activating mutations in SCN9A produce paroxysmal neuropathic pain,
      with no other obvious clinical features. And bi-allelic non-functional
      mutations cause congenital painlessness, with the only other consequence
      being anosmia.
    explanation: Review evidence distinguishes the painless SCN9A loss-of-function phenotype from the painful SCN9A gain-of-function disorders.
- name: SCN11A
  gene_term:
    preferred_term: SCN11A
    term:
      id: hgnc:10583
      label: SCN11A
  association: Causative
  features: >-
    Dominant SCN11A gain-of-function variants cause a paradoxical painless
    channelopathy by sustaining depolarization and blocking nociceptor firing,
    often with gastrointestinal dysfunction and pruritus.
  evidence:
  - reference: PMID:24036948
    reference_title: "A de novo gain-of-function mutation in SCN11A causes loss of pain perception."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Using exome sequencing, we identified a specific de novo missense
      mutation in SCN11A in individuals with the congenital inability to
      experience pain who suffer from recurrent tissue damage and severe
      mutilations.
    explanation: Human genetic evidence establishing SCN11A as a cause of congenital painlessness.
  - reference: PMID:24036948
    reference_title: "A de novo gain-of-function mutation in SCN11A causes loss of pain perception."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Mutant Nav1.9 channels displayed excessive activity at resting voltages,
      causing sustained depolarization of nociceptors, impaired generation of
      action potentials and aberrant synaptic transmission.
    explanation: Functional evidence shows why SCN11A gain of function produces painlessness rather than pain.
- name: PRDM12
  gene_term:
    preferred_term: PRDM12
    term:
      id: hgnc:13997
      label: PRDM12
  association: Causative
  features: >-
    Biallelic PRDM12 variants cause a developmental CIP branch by disrupting
    nociceptor specification upstream of TrkA signaling rather than by primary
    sodium-channel dysfunction.
  evidence:
  - reference: PMID:32219415
    reference_title: "Understanding the genetic basis of congenital insensitivity to pain."
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      In 2015 a new HSAN4-like phenotype was reported caused by bi-allelic
      mutations in PRDM12 (clinically known as HSAN6).
    explanation: Review evidence establishes PRDM12 as a distinct developmental CIP gene.
  - reference: PMID:32219415
    reference_title: "Understanding the genetic basis of congenital insensitivity to pain."
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      The recent finding that PRDM12 activated NTRK1 expression in nociceptor
      precursors further cemented the absolute importance of NGF-TRKA
      signalling for nociceptor genesis.15,16
    explanation: Supports PRDM12 as an upstream nociceptor-specification regulator linked mechanistically to the NGF-TRKA developmental program.
pathophysiology:
- name: Developmental nociceptor failure
  description: >-
    One major CIP mechanism class is failure of nociceptor specification,
    trophic signaling, or survival during development. This class is centered
    on the NGF-TRKA axis, represented by NTRK1 and NGF, and extends to PRDM12
    because PRDM12 helps establish nociceptors and TrkA expression upstream of
    the same developmental program.
  genes:
  - preferred_term: NTRK1
    term:
      id: hgnc:8031
      label: NTRK1
  - preferred_term: NGF
    term:
      id: hgnc:7808
      label: NGF
  - preferred_term: PRDM12
    term:
      id: hgnc:13997
      label: PRDM12
  evidence:
  - reference: PMID:32219415
    reference_title: "Understanding the genetic basis of congenital insensitivity to pain."
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      CIP can be clinically divided into two groups: developmental disorders
      where nociceptors fail to develop or undergo early apoptosis through lack
      of trophic signals; and secondly, where nociceptors have developed and
      are in their correct anatomical position but are unable to respond to
      tissue-damage signals, see Table 1.
    explanation: Defines developmental nociceptor failure as one of the two major mechanistic classes in CIP.
  - reference: PMID:32219415
    reference_title: "Understanding the genetic basis of congenital insensitivity to pain."
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      The recent finding that PRDM12 activated NTRK1 expression in nociceptor
      precursors further cemented the absolute importance of NGF-TRKA
      signalling for nociceptor genesis.15,16
    explanation: Connects PRDM12 mechanistically to the same developmental program as NTRK1 and NGF.
- name: Reduced nociceptor and small-fiber innervation
  description: >-
    The developmental CIP class leads downstream to loss or marked reduction of
    small sensory fibers, explaining why HSAN IV, HSAN V, and PRDM12-related
    forms behave as neuropathic developmental disorders rather than isolated
    pain-threshold abnormalities.
  genes:
  - preferred_term: NGF
    term:
      id: hgnc:7808
      label: NGF
  evidence:
  - reference: PMID:14976160
    reference_title: "A mutation in the nerve growth factor beta gene (NGFB) causes loss of pain perception."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      A severe reduction of unmyelinated nerve fibers and a moderate loss of
      thin myelinated nerve fibers are observed in the patients.
    explanation: Direct pathology evidence that developmental CIP can manifest as marked loss of small pain fibers.
- name: Nav1.7 loss-of-function channelopathy
  description: >-
    A second major CIP mechanism class is channelopathy in nociceptors that are
    anatomically present. In SCN9A-associated CIP, Nav1.7 loss of function
    prevents nociceptors from responding normally to tissue-damage signals.
  genes:
  - preferred_term: SCN9A
    term:
      id: hgnc:10597
      label: SCN9A
  evidence:
  - reference: PMID:32219415
    reference_title: "Understanding the genetic basis of congenital insensitivity to pain."
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Individuals with second type of CIP are born with nociceptors that are
      unable to be activated by tissue-damage signals, see Tables 1 and 2.
      These phenotypes were originally contentious, as peripheral nerve biopsy
      showed all expected nerve fibre types present. It was not until 2006 with
      the discovery of the causative gene, SCN9A, that a clinical diagnosis of
      this type of CIP could be proven.
    explanation: Review evidence frames SCN9A-associated CIP as the canonical nondevelopmental nociceptor channelopathy.
- name: Nav1.9 depolarization-block channelopathy
  description: >-
    SCN11A-associated CIP is also a channelopathy, but it is mechanistically
    distinct from SCN9A. Gain-of-function Nav1.9 mutations produce sustained
    depolarization at resting voltages, paradoxically blocking action potential
    generation and thereby abolishing protective pain signaling.
  genes:
  - preferred_term: SCN11A
    term:
      id: hgnc:10583
      label: SCN11A
  evidence:
  - reference: PMID:24036948
    reference_title: "A de novo gain-of-function mutation in SCN11A causes loss of pain perception."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Mutant Nav1.9 channels displayed excessive activity at resting voltages,
      causing sustained depolarization of nociceptors, impaired generation of
      action potentials and aberrant synaptic transmission.
    explanation: Directly supports the paradoxical gain-of-function depolarization-block mechanism for SCN11A-associated CIP.
