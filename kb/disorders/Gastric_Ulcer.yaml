name: Gastric Ulcer
creation_date: '2026-02-02T00:16:36Z'
updated_date: '2026-02-17T21:53:14Z'
description: >-
  Gastric ulcer is a localized defect in the stomach lining that extends through the
  muscularis mucosae, arising when aggressive luminal factors overwhelm mucosal
  defense. The two dominant causes are Helicobacter pylori infection and the use of
  nonsteroidal anti-inflammatory drugs, both of which disrupt the protective
  mucus-bicarbonate barrier and prostaglandin-mediated cytoprotection. Patients
  typically present with epigastric pain, and serious complications include
  upper gastrointestinal bleeding and perforation.
