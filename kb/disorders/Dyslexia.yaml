name: Dyslexia
creation_date: "2026-04-27T20:50:00Z"
updated_date: "2026-04-27T20:50:00Z"
category: Neurodevelopmental
description: >-
  Dyslexia is a specific learning disability characterised by difficulties with
  accurate and/or fluent word recognition and by poor spelling and decoding
  abilities, occurring despite normal intelligence and adequate educational
  opportunity. It is a heritable, polygenic neurodevelopmental disorder with
  prevalence estimates around 7% of the general population. Pathophysiology is
  multifactorial, with leading mechanistic accounts implicating phonological
  processing deficits, hypoactivation of the left occipito-temporal "visual
  word form" cortex, magnocellular/dorsal-stream dysfunction, cerebellar
  automaticity deficits, and genetically driven abnormalities of cortical
  neuronal migration.
