genetic:
- name: BRAF
  notes: >-
    BRAF p.V600E is the single most common somatic alteration in mixed
    neuronal-glial tumors, found in roughly 36.9% of gangliogliomas in a systematic
    review of 1360 cases. The substitution causes constitutive activation of the
    BRAF serine/threonine kinase and the downstream MAPK/ERK pathway. BRAF V600E is
    also the most actionable therapeutic target in this tumor group.
  gene_term:
    preferred_term: BRAF
    term:
      id: hgnc:1097
      label: BRAF
  association: Most common somatic driver mutation (p.V600E)
  relationship_type: SOMATIC_DRIVER
  variant_origin: SOMATIC
  evidence:
  - reference: PMID:41721014
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "The most common mutation was BRAFV600E present in 36.94%, followed by the mutation in FGFR1, reported in 1.18% of cases."
    explanation: Quantifies BRAF V600E as the most frequent somatic alteration in gangliogliomas.
- name: FGFR1
  notes: >-
    FGFR1 hotspot alterations (N546K, K656E) are the dominant driver in DNET (>75%)
    and recur in rosette-forming glioneuronal tumor and other entities, while being
    rare in ganglioglioma. FGFR1 is the fifth most prevalent alteration across
    low-grade glioma / mixed neuronal-glial tumors, and FGFR1 sequencing of
    driver-unknown low-grade brain tumors can yield up to 12% N546/K656 mutant cases.
  gene_term:
    preferred_term: FGFR1
    term:
      id: hgnc:3688
      label: FGFR1
  association: Dominant somatic driver in DNET and RGNT; rare in ganglioglioma
  relationship_type: SOMATIC_DRIVER
  variant_origin: SOMATIC
  evidence:
  - reference: PMID:35018490
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "FGFR1 hotspot mutations are the fifth most prevailing alteration in LGG/MNGT. Performing FGFR1 sequencing analysis in driver-unknown low-grade brain tumors could yield up to 12% FGFR1 N546/K656 mutant cases."
    explanation: Establishes FGFR1 hotspot mutations as a recurrent driver of mixed neuronal-glial tumors.
treatments:
- name: Surgical Resection
  description: >-
    Gross total surgical resection is the cornerstone of treatment and is considered
    curative for most CNS WHO grade 1 glioneuronal tumors. For epilepsy-associated
    tumors, extended resection that includes the epileptogenic zone improves
    seizure-free outcomes.
  treatment_term:
    preferred_term: surgical procedure
    term:
      id: MAXO:0000004
      label: surgical procedure
  target_mechanisms:
  - target: Cortical Low-Grade Neoplasm
    treatment_effect: BYPASSES
    description: >-
      Resection physically removes the cortical tumor and epileptogenic substrate,
      addressing both the neoplasm and the seizures.
- name: BRAF/MEK Inhibitor Targeted Therapy
  description: >-
    For BRAF p.V600E-mutant tumors that are progressive, recurrent, or unresectable,
    combined BRAF and MEK inhibition (e.g., dabrafenib plus trametinib) is the
    preferred targeted approach; BRAF V600E is the only molecular target of proven
    clinical benefit in adult gliomas/glioneuronal tumors per EANO. In a
    multi-institutional series of BRAF-mutant pediatric high-grade gliomas
    (including anaplastic gangliogliomas) treated upfront, 3-year progression-free
    and overall survival were 65% and 82%.
  treatment_term:
    preferred_term: Pharmacotherapy
    term:
      id: NCIT:C15986
      label: Pharmacotherapy
  therapeutic_modality: SMALL_MOLECULE
  target_mechanisms:
  - target: MAPK Pathway Activation
    treatment_effect: INHIBITS
    description: >-
      BRAF and MEK inhibitors block constitutive RAS-RAF-MEK-ERK signaling driven
      by the BRAF V600E mutation.
  evidence:
  - reference: PMID:39387386
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "From all targets reviewed, only testing for BRAF V600E mutations was of proven clinical benefit"
    explanation: EANO guideline update establishes BRAF V600E as the only target of proven clinical benefit, justifying BRAF-directed therapy.
  - reference: PMID:35397478
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "three-year progression-free and overall survival for the cohort were 65% and 82%, respectively, and superior to a historical control cohort of BRAF-mutant pHGG patients treated with conventional therapies."
    explanation: Demonstrates efficacy of upfront BRAF/MEK targeted therapy in BRAF-mutant tumors including anaplastic ganglioglioma.
- name: Radiation Therapy
  description: >-
    Radiotherapy is reserved for subtotally resected aggressive tumors, tumors in
    eloquent areas, or recurrent disease, and is used cautiously in young children
    because of long-term cognitive sequelae.
  treatment_term:
    preferred_term: radiation therapy
    term:
      id: MAXO:0000014
      label: radiation therapy
diagnosis:
- name: MRI with Genotype Correlation
  description: >-
    MRI is the cornerstone of diagnosis. Genotype-relevant imaging patterns have
    been described: BRAF V600E tumors show indistinct borders with iso-T1 and high
    T2 signal without diffuse mass effect (93.8% sensitivity, 100% specificity),
    whereas FGFR1-mutant tumors show sharp borders and very high T2 signal with a
    diffuse mass effect (100% sensitivity and specificity).
  evidence:
  - reference: PMID:39081340
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Group 1 had indistinct borders and iso T1-weighted and slightly high or high T2-weighted signal intensities without a diffuse mass effect, associated with 93.8% sensitivity and 100% specificity to BRAF V600E mutations; Group 2 exhibited sharp borders and very or slightly low T1-weighted and very high T2-weighted signal intensities with a diffuse mass effect and 100% sensitivity and specificity for FGFR1 mutations"
    explanation: Documents genotype-relevant neuroimaging features distinguishing BRAF V600E from FGFR1-mutant low-grade epilepsy-associated tumors.
