name: Mixed Neuronal-Glial Tumor
creation_date: "2026-06-30T00:00:00Z"
category: Complex
description: >-
  Mixed neuronal-glial tumors (glioneuronal tumors) are a heterogeneous family of
  rare, predominantly low-grade (CNS WHO grade 1) primary central nervous system
  neoplasms composed of both neuronal and glial cell populations. They represent
  less than 2% of all primary CNS tumors, predominantly affect children and young
  adults, show a strong predilection for the temporal and frontal cortex, and are
  characterized by a frequent, often drug-resistant, focal epilepsy. Their shared
  pathogenic theme is somatic activation of the RAS-RAF-MEK-ERK (MAPK) signaling
  pathway, most commonly BRAF p.V600E in ganglioglioma and FGFR1 hotspot
  alterations in dysembryoplastic neuroepithelial tumor (DNET). The 2021 WHO CNS5
  classification reorganized these entities into the "glioneuronal and neuronal
  tumors" family using integrated histological, immunohistochemical, and molecular
  (including DNA methylation) criteria.
disease_term:
  preferred_term: mixed neuronal-glial tumor
  term:
    id: MONDO:0016729
    label: mixed neuronal-glial tumor
parents:
- neuroepithelial neoplasm
references:
- reference: PMID:36831464
  title: "Rare Neuronal, Glial and Glioneuronal Tumours in Adults."
- reference: PMID:35218102
  title: "The 2021 WHO Classification of Tumors of the Central Nervous System: An update on pediatric low-grade gliomas and glioneuronal tumors."
has_subtypes:
- name: Ganglioglioma
  description: >-
    Most common mixed neuronal-glial tumor; CNS WHO grade 1. Composed of dysmorphic
    neoplastic neuronal (ganglion) cells admixed with a neoplastic glial component.
    Driven most often by BRAF p.V600E, with less frequent FGFR1, KRAS, NF1, H3-3A,
    or RAF1 alterations. Typically presents with long-standing focal epilepsy,
    often temporal lobe.
  subtype_term:
    preferred_term: ganglioglioma
    term:
      id: MONDO:0016733
      label: ganglioglioma
  evidence:
  - reference: PMID:35512827
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "While ganglioglioma, dysembryoplastic neuroepithelial tumor, and desmoplastic infantile tumor are common glioneuronal tumors, anaplastic ganglioglioma, papillary glioneuronal tumor, rosette-forming glioneuronal tumor, gangliocytoma, and central neurocytoma are less frequent."
    explanation: Establishes ganglioglioma as one of the common glioneuronal tumor subtypes.
- name: Gangliocytoma
  description: >-
    CNS WHO grade 1 neuronal tumor composed of dysplastic mature ganglion cells
    without a neoplastic glial component, on the same biological spectrum as
    ganglioglioma. Less frequent than ganglioglioma; associated with epilepsy.
  subtype_term:
    preferred_term: gangliocytoma
    term:
      id: MONDO:0016730
      label: gangliocytoma
  evidence:
  - reference: PMID:35512827
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "anaplastic ganglioglioma, papillary glioneuronal tumor, rosette-forming glioneuronal tumor, gangliocytoma, and central neurocytoma are less frequent."
    explanation: Lists gangliocytoma among the less-frequent glioneuronal/neuronal tumor subtypes.
- name: DNET
  display_name: Dysembryoplastic Neuroepithelial Tumor (DNET)
  description: >-
    CNS WHO grade 1 glioneuronal tumor defined by the "specific glioneuronal
    element" with columns of oligodendrocyte-like cells in a myxoid matrix and
    "floating neurons". FGFR1 alterations are present in the majority (>75%) of
    cases. Presents with drug-resistant epilepsy from cortical, often temporal,
    lesions.
  subtype_term:
    preferred_term: dysembryoplastic neuroepithelial tumor
    term:
      id: MONDO:0005505
      label: dysembryoplastic neuroepithelial tumor
  evidence:
  - reference: PMID:35018490
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Five tumors were classified as dysembryoplastic neuroepithelial tumor (DNT), 4 as pilocytic astrocytoma (PA) and 3 as rosette-forming glioneuronal tumor (RGNT). FGFR1 mutations were associated with oligodendroglia-like cells"
    explanation: Documents FGFR1 hotspot mutations in DNET and their association with the oligodendrocyte-like cells characteristic of DNET.
- name: Papillary Glioneuronal Tumor
  description: >-
    CNS WHO grade 1 glioneuronal tumor with a pseudopapillary architecture lined by
    GFAP-positive glial cells and interpapillary synaptophysin-positive neuronal
    cells. Characterized molecularly by the SLC44A1::PRKCA fusion. Usually presents
    in young adults with seizures and/or headaches from a circumscribed
    supratentorial mass.
  subtype_term:
    preferred_term: papillary glioneuronal tumor
    term:
      id: MONDO:0016735
      label: papillary glioneuronal tumor
  evidence:
  - reference: PMID:35512827
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "anaplastic ganglioglioma, papillary glioneuronal tumor, rosette-forming glioneuronal tumor, gangliocytoma, and central neurocytoma are less frequent."
    explanation: Identifies papillary glioneuronal tumor as one of the less-frequent glioneuronal tumor subtypes.
- name: Rosette-forming Glioneuronal Tumor
  display_name: Rosette-Forming Glioneuronal Tumor (RGNT)
  description: >-
    CNS WHO grade 1 glioneuronal tumor with neurocytic rosettes and perivascular
    pseudorosettes alongside an astrocytic component, typically arising in the
    posterior fossa / fourth-ventricle region. Driven by FGFR1 hotspot mutations,
    often with PIK3CA, PIK3R1, or NF1 co-alterations. Presents more often with
    headache, ataxia, and hydrocephalus than with epilepsy.
  subtype_term:
    preferred_term: rosette-forming glioneuronal tumor
    term:
      id: MONDO:0016736
      label: rosette-forming glioneuronal tumor of fourth ventricule
  evidence:
  - reference: PMID:35018490
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Five tumors were classified as dysembryoplastic neuroepithelial tumor (DNT), 4 as pilocytic astrocytoma (PA) and 3 as rosette-forming glioneuronal tumor (RGNT)."
    explanation: Documents FGFR1 hotspot mutations identified in rosette-forming glioneuronal tumor cases.
- name: Desmoplastic Infantile Ganglioglioma
  display_name: Desmoplastic Infantile Ganglioglioma (DIG)
  description: >-
    CNS WHO grade 1 infantile glioneuronal tumor with a prominent desmoplastic
    stroma containing astroglial and neuronal/ganglion cell elements. Presents in
    infancy (usually within the first 2 years of life), typically as a large
    superficial cystic/solid mass causing macrocephaly, an enlarging head
    circumference, and signs of raised intracranial pressure.
  subtype_term:
    preferred_term: desmoplastic infantile ganglioglioma
    term:
      id: MONDO:0022965
      label: desmoplastic infantile ganglioglioma
  evidence:
  - reference: PMID:35512827
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "While ganglioglioma, dysembryoplastic neuroepithelial tumor, and desmoplastic infantile tumor are common glioneuronal tumors"
    explanation: Identifies desmoplastic infantile tumor (desmoplastic infantile ganglioglioma) among the glioneuronal tumors.
pathophysiology:
- name: MAPK Pathway Activation
  description: >-
    The initiating and central pathogenic event is a somatic genetic alteration that
    constitutively activates the RAS-RAF-MEK-ERK (MAPK) signaling cascade. In
    ganglioglioma the dominant driver is the BRAF p.V600E missense mutation
    (glutamic acid-to-valine substitution in the kinase domain), while in DNET and
    other entities FGFR1 hotspot mutations (N546K, K656E) predominate; FGFR1
    activation simultaneously stimulates the RAS/RAF/MEK and PI3K-AKT cascades.
    These low-grade glioneuronal tumors are considered developmental neoplasms
    arising from MAPK-activated neural progenitors rather than from environmental
    exposures.
  gene:
    preferred_term: BRAF
    term:
      id: hgnc:1097
      label: BRAF
  biological_processes:
  - preferred_term: MAPK cascade
    term:
      id: GO:0000165
      label: MAPK cascade
    modifier: INCREASED
  - preferred_term: positive regulation of cell proliferation
    term:
      id: GO:0008284
      label: positive regulation of cell population proliferation
    modifier: INCREASED
  - preferred_term: negative regulation of apoptosis
    term:
      id: GO:0043066
      label: negative regulation of apoptotic process
    modifier: INCREASED
  cell_types:
  - preferred_term: neural progenitor cell
    term:
      id: CL:0011020
      label: neural progenitor cell
  evidence:
  - reference: PMID:35018490
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Low-grade gliomas (LGG) and mixed neuronal-glial tumors (MNGT) show frequent MAPK pathway alterations."
    explanation: Establishes that MAPK pathway alterations are the frequent, shared molecular driver of mixed neuronal-glial tumors.
  - reference: PMID:41721014
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "The most common mutation was BRAFV600E present in 36.94%, followed by the mutation in FGFR1, reported in 1.18% of cases."
    explanation: Systematic review of 1360 gangliogliomas establishes BRAF V600E as the most common MAPK-activating driver, with FGFR1 next.
  downstream:
  - target: Dual Neuronal-Glial Differentiation
    description: >-
      Constitutive MAPK activation in neural progenitors during development drives
      aberrant proliferation and dual differentiation toward both neuronal and glial
      lineages, producing the characteristic mixed cellular composition.
    causal_link_type: INDIRECT_KNOWN_INTERMEDIATES
- name: Dual Neuronal-Glial Differentiation
  description: >-
    Aberrant differentiation of MAPK-activated neural progenitors yields a neoplasm
    containing both a neoplastic neuronal component (dysmorphic ganglion cells,
    floating neurons, or neurocytic rosettes depending on subtype) and a neoplastic
    glial component (astrocytic GFAP-positive and/or oligodendrocyte-like
    OLIG2-positive cells). This dual lineage is the defining histological feature
    of glioneuronal tumors and distinguishes them from pure gliomas.
  biological_processes:
  - preferred_term: neuron differentiation
    term:
      id: GO:0030182
      label: neuron differentiation
    modifier: ABNORMAL
  - preferred_term: cell fate determination
    term:
      id: GO:0001709
      label: cell fate determination
    modifier: ABNORMAL
  cell_types:
  - preferred_term: neoplastic neuron
    term:
      id: CL:0000540
      label: neuron
  - preferred_term: neoplastic astrocyte
    term:
      id: CL:0000127
      label: astrocyte
  - preferred_term: neoplastic oligodendrocyte-like cell
    term:
      id: CL:0000128
      label: oligodendrocyte
  evidence:
  - reference: PMID:35512827
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Glioneuronal tumors are characterized exclusively by neurocytic elements (neuronal tumors) or a combination of neuronal and glial features (mixed neuronal-glial tumors)."
    explanation: Defines the dual neuronal and glial composition that characterizes mixed neuronal-glial tumors.
  downstream:
  - target: Cortical Low-Grade Neoplasm
    description: >-
      The mixed neuronal-glial proliferation forms a circumscribed, slow-growing
      (CNS WHO grade 1) tumor, typically in the cerebral cortex with a predilection
      for the temporal and frontal lobes.
    causal_link_type: DIRECT
- name: Cortical Low-Grade Neoplasm
  description: >-
    A circumscribed, indolent (most commonly CNS WHO grade 1) neoplasm situated in
    the cerebral cortex, most often the temporal lobe. The cortical/subcortical
    location and intimate relationship with surrounding cortex underlie both the
    typical seizure presentation and the favorable outcome after gross total
    resection.
  locations:
  - preferred_term: cerebral cortex
    term:
      id: UBERON:0000956
      label: cerebral cortex
  - preferred_term: temporal lobe
    term:
      id: UBERON:0001871
      label: temporal lobe
  evidence:
  - reference: PMID:36831464
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Rare glial, neuronal and glioneuronal tumours in adults form a heterogeneous group of rare, primary central nervous system tumours."
    explanation: Establishes glioneuronal tumors as a group of primary CNS (brain) neoplasms.
  downstream:
  - target: Epileptogenic Cortical Disruption
    description: >-
      The cortical tumor, frequently associated with adjacent focal cortical
      dysplasia, disrupts local cortical circuitry and creates an epileptogenic
      zone with high intrinsic epileptogenic potential.
    causal_link_type: INDIRECT_KNOWN_INTERMEDIATES
- name: Epileptogenic Cortical Disruption
  description: >-
    Glioneuronal tumors, particularly ganglioglioma and DNET, are among the most
    common causes of drug-resistant focal epilepsy. The intimate cortical location,
    abnormal neuronal differentiation, and frequent association with focal cortical
    dysplasia generate a highly epileptogenic substrate, such that these tumors have
    been informally termed "epileptomas".
  locations:
  - preferred_term: cerebral cortex
    term:
      id: UBERON:0000956
      label: cerebral cortex
  evidence:
  - reference: PMID:34196984
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Structural brain lesions, including the broad range of malformations of cortical development (MCD) and glioneuronal tumors, are among the most common causes of drug-resistant focal epilepsy."
    explanation: Establishes glioneuronal tumors as a leading structural cause of drug-resistant focal epilepsy via cortical disruption.
  downstream:
  - target: Drug-Resistant Focal Epilepsy
    description: >-
      The epileptogenic cortical substrate manifests clinically as chronic,
      frequently drug-resistant focal seizures, the dominant presenting phenotype
      of these tumors.
    causal_link_type: DIRECT
phenotypes:
