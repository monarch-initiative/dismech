    snippet: "Structural brain lesions, including the broad range of malformations of cortical development (MCD) and glioneuronal tumors, are among the most common causes of drug-resistant focal epilepsy."
    explanation: Documents drug-resistant focal epilepsy as a hallmark phenotype caused by glioneuronal tumors.
  - reference: PMID:35512827
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Most of these tumors occur in young patients and are related to epilepsy."
    explanation: Supports the strong association of glioneuronal tumors with epilepsy and young age of onset.
