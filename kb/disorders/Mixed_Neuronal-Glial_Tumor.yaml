  name: Drug-Resistant Focal Epilepsy
  description: >-
    Chronic focal-onset seizures, frequently medically refractory, are the dominant
    clinical presentation of mixed neuronal-glial tumors, especially ganglioglioma
    and DNET. Onset is typically in childhood to young adulthood with a long
    pre-diagnosis history.
  phenotype_term:
    preferred_term: Drug-resistant focal-onset seizure
    term:
      id: HP:0007359
      label: Focal-onset seizure
    temporality: CHRONIC
  evidence:
