epidemiology:
- name: Incidence and Demographics
  description: >-
    Mixed neuronal-glial tumors are rare, representing less than 2% of all primary
    CNS tumors, and predominantly affect children, adolescents, and young adults.
    Most arise from somatic, non-hereditary alterations with no Mendelian
    inheritance pattern.
