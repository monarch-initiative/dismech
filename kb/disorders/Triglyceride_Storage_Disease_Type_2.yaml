biochemical:
- name: Jordan's anomaly (leukocyte lipid accumulation)
  presence: INCREASED
  context: >-
    Jordan's anomaly - lipid-laden cytoplasmic vacuoles in polymorphonuclear leukocytes on a
    peripheral blood smear - is the most consistent and pathognomonic finding.
  evidence:
  - reference: PMID:32564019
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Jordan's\nanomaly, polymorphonuclear leukocytes with lipid accumulation, was the most\nconsistent"
    explanation: Jordan's anomaly (leukocyte lipid accumulation) is the most consistent diagnostic finding in PNPLA2-related NLSDM.
- name: HyperCKemia
  presence: INCREASED
  context: Elevated serum creatine kinase is common, sometimes as asymptomatic hyperCKemia.
  evidence:
  - reference: PMID:31655616
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "asymptomatic hyperCKemia (2/45)"
    explanation: HyperCKemia, sometimes asymptomatic, is a common biochemical finding in NLSDM.
