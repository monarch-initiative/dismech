name: Triglyceride Storage Disease Type 2
creation_date: "2026-06-13T00:00:00Z"
description: >-
  Triglyceride storage disease type 2 corresponds to neutral lipid storage disease with
  myopathy (NLSD type M), an autosomal recessive disorder caused by biallelic PNPLA2 variants
  encoding adipose triglyceride lipase (ATGL). ATGL deficiency impairs intracellular
  triacylglycerol hydrolysis, causing cytoplasmic triacylglycerol droplet accumulation in
  skeletal and cardiac muscle, producing a progressive lipid-storage myopathy with frequent
  cardiomyopathy/arrhythmia, but without the ichthyosis of NLSD type I. It overlaps the
  neutral lipid storage myopathy entry.
synonyms:
- neutral lipid storage disease with myopathy
- NLSD type M
- NLSD-M
- ATGL deficiency
