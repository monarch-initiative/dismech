- name: ROS1 Inhibitor Resistance
  description: >-
    Resistance to ROS1 inhibitors develops through ROS1-dependent mechanisms
    (secondary mutations like G2032R, D2033N, L2026M, and L2086F) or
    ROS1-independent bypass pathways (MET amplification, HGF-MET signaling, KRAS
    mutations, EGFR activation). The G2032R solvent front mutation is common,
    while L2086F can require type-switching approaches; serial profiling helps
    distinguish on-target from bypass resistance.
  evidence:
  - reference: PMID:33685866
    reference_title: "Spectrum of Mechanisms of Resistance to Crizotinib and Lorlatinib in ROS1 Fusion-Positive Lung Cancer."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "ROS1 mutations were identified in 38% and 46%,"
    explanation: Large multi-institutional study characterizing the spectrum of resistance mutations to crizotinib and lorlatinib in ROS1-positive NSCLC.
  - reference: PMID:33685866
    reference_title: "Spectrum of Mechanisms of Resistance to Crizotinib and Lorlatinib in ROS1 Fusion-Positive Lung Cancer."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "ROS1 mutations mediate resistance to crizotinib and lorlatinib in"
    explanation: Summarizes resistance landscape and need for next-generation inhibitors.
  - reference: PMID:38293020
    reference_title: TKI Type Switching Overcomes ROS1 L2086F in ROS1 Fusion-Positive Cancers.
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: ROS1 L2086F mutant kinase is resistant to type I TKI
    explanation: Supports L2086F as an on-target resistance mutation that can alter inhibitor class sensitivity.
  - reference: PMID:37923925
    reference_title: "Lorlatinib and capmatinib in a ROS1-rearranged NSCLC with MET-driven resistance: tumor response and evolution."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: acquired MET amplification as a resistance
    explanation: Case report supports acquired MET amplification as a bypass driver after sequential ROS1 inhibitors.
  - reference: PMID:36416133
    reference_title: MET kinase inhibitor reverses resistance to entrectinib induced by hepatocyte growth factor in tumors with NTRK1 or ROS1 rearrangements.
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: HGF most potently induced
    explanation: Supports paracrine HGF-MET signaling as a bypass resistance mechanism to entrectinib in ROS1-rearranged cells.
