- name: ROS1 Inhibitor Resistance
  description: >-
    Resistance to ROS1 inhibitors develops through ROS1-dependent mechanisms
    (secondary mutations like G2032R, D2033N, L2026M) or ROS1-independent bypass
    pathways (MET amplification, KRAS mutations, EGFR activation). The G2032R
    solvent front mutation is the most common and confers resistance to crizotinib.
  evidence:
  - reference: PMID:33685866
    reference_title: "Spectrum of Mechanisms of Resistance to Crizotinib and Lorlatinib in ROS1 Fusion-Positive Lung Cancer."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "ROS1 mutations were identified in 38% and 46%,"
    explanation: Large multi-institutional study characterizing the spectrum of resistance mutations to crizotinib and lorlatinib in ROS1-positive NSCLC.
  - reference: PMID:33685866
