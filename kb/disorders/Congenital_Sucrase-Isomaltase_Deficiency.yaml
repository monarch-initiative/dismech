  inheritance_term:
    preferred_term: autosomal recessive inheritance
    term:
      id: HP:0000007
      label: Autosomal recessive inheritance
  description: >-
    CSID is classically inherited as an autosomal recessive disorder caused by
    SI variants.
  evidence:
