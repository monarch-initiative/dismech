  - reference: PMID:33053334
    reference_title: "Interaction between KDELR2 and HSP47 as a Key Determinant in Osteogenesis Imperfecta Caused by Bi-allelic Variants in KDELR2."
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: >-
      in KDELR2-deficient individuals, OI most likely occurs because of the
      inability of HSP47 to bind KDELR2 and dissociate from collagen type I.
    explanation: >-
      Establishes the core mechanism: loss of KDELR2 prevents HSP47 release from
      collagen type I, the defining pathophysiology of OI type XXI.
  downstream:
  - target: Defective Bone Collagen Matrix and Skeletal Fragility
    description: >-
      Persistent HSP47 bound to secreted collagen disrupts fibril formation,
      yielding a defective bone matrix that fails to mineralize normally.
- name: Defective Bone Collagen Matrix and Skeletal Fragility
  description: >-
    Because HSP47 remains bound to collagen molecules extracellularly, normal
    fiber formation is disrupted and the secreted collagen is of abnormal
    quality. The resulting defective bone extracellular matrix fails to assemble
    and mineralize normally, producing low bone mineral density and severe bone
    fragility that manifests clinically as recurrent fractures, bone deformity,
    and growth deficiency. Cellular OI models confirm abnormal pro-alpha1(I)
    handling on KDELR2 loss, with intracellular pro-alpha1(I) aggregation.
  cell_types:
