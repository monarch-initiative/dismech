      disrupting fiber formation.
    explanation: >-
      Documents that retained HSP47 on secreted collagen disrupts fibril
      formation, the matrix defect underlying OI type XXI bone fragility.
  - reference: PMID:38014644
    reference_title: "Assessing type I collagen expression and quality in cellular models of osteogenesis imperfecta."
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: >-
      Cell phenotypic assays of pro-α1(I) in OI-related gene knocked down
      fibroblasts revealed aggregates of pro-α1(I) in conditions with knockdown
      of SERPINF1, CRTAP, P3H1, PPIB, SERPINH1, FKBP10, TMEM38B, MESD, and
      KDELR2
    explanation: >-
      Cellular OI model shows abnormal pro-alpha1(I) aggregation upon KDELR2
      knockdown, supporting the defective collagen handling of OI type XXI.
genetic:
- name: KDELR2 Loss-of-Function Mutations
  association: Causative
  gene_term:
    preferred_term: KDELR2 (KDEL endoplasmic reticulum protein retention receptor 2)
    term:
      id: hgnc:6305
      label: KDELR2
  notes: >-
    OI type XXI is caused by biallelic (homozygous or compound heterozygous)
    loss-of-function variants in KDELR2. The defining report identified
    bi-allelic pathogenic KDELR2 variants in four families; the variants map onto
    the KDELR2 structure as inactivating, abolishing receptor-mediated Golgi-to-ER
    retrograde transport. A second group reported additional biallelic KDELR2
    missense variants associated with neurodevelopmental features.
  evidence:
  - reference: PMID:33053334
    reference_title: "Interaction between KDELR2 and HSP47 as a Key Determinant in Osteogenesis Imperfecta Caused by Bi-allelic Variants in KDELR2."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      We identified bi-allelic pathogenic KDELR2 variants as a cause of OI in
      four families.
    explanation: >-
      Identifies biallelic KDELR2 variants as the cause of OI type XXI in the
      defining cohort of four families.
  - reference: PMID:39127989
    reference_title: "Update on the Genetics of Osteogenesis Imperfecta."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      There is a special emphasis on discoveries of recessive mutations in
      TENT5A, MESD, KDELR2 and CCDC134 whose causality of OI types XIX, XX, XXI
      and XXI, respectively, is now established
    explanation: >-
      A 2024 genetics review confirms recessive KDELR2 mutations as the
      established cause of OI type XXI (the CCDC134/type XXII numbering in the
      source list is a typographical error for type XXII).
