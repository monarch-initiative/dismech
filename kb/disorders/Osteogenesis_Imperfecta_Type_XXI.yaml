pathophysiology:
- name: KDELR2 Loss Disables Retrograde Recycling of ER-Resident Chaperones
  description: >-
    KDELR2 encodes KDEL endoplasmic reticulum protein retention receptor 2, a
    cis-Golgi/ERGIC receptor that binds ER-resident proteins carrying a
    KDEL-like C-terminal retrieval signal and recycles them back to the
    endoplasmic reticulum through COPI-mediated retrograde (Golgi-to-ER)
    transport. Biallelic loss-of-function KDELR2 variants map onto the receptor
    structure as inactivating, abolishing KDELR2-mediated Golgi-to-ER transport
    and the retrieval of ER-resident cargoes including the collagen-specific
    chaperone HSP47 (SERPINH1) and FKBP65.
