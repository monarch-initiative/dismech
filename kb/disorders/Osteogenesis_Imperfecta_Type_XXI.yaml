    reference_title: "Interaction between KDELR2 and HSP47 as a Key Determinant in Osteogenesis Imperfecta Caused by Bi-allelic Variants in KDELR2."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      KDELR2 encodes KDEL endoplasmic reticulum protein retention receptor 2,
      which recycles ER-resident proteins with a KDEL-like peptide from the
      cis-Golgi to the ER through COPI retrograde transport.
    explanation: >-
      Defines the normal KDELR2 function (COPI retrograde recycling of
      ER-resident proteins from cis-Golgi to ER) that is lost in OI type XXI.
  - reference: PMID:33053334
    reference_title: "Interaction between KDELR2 and HSP47 as a Key Determinant in Osteogenesis Imperfecta Caused by Bi-allelic Variants in KDELR2."
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: >-
      Mapping the identified KDELR2 variants onto the crystal structure of G.
      gallus KDELR2 indicated that these lead to an inactive receptor resulting
      in impaired KDELR2-mediated Golgi-ER transport.
    explanation: >-
      Documents that the OI type XXI KDELR2 variants inactivate the receptor and
      abolish Golgi-to-ER retrograde transport, the proximal lesion.
  downstream:
  - target: Failure to Release and Recycle HSP47 from Procollagen
    description: >-
      Without functional KDELR2-mediated retrieval, HSP47 is not released from
      collagen type I and is not recycled to the ER, depleting intracellular
      HSP47.
- name: Failure to Release and Recycle HSP47 from Procollagen
  description: >-
    Normally HSP47 binds the type I procollagen triple helix in the ER and is
    released from procollagen in the lower-pH cis-Golgi/ERGIC, then retrieved to
    the ER by KDELR2 for reuse. When KDELR2 is inactive, HSP47 cannot bind KDELR2
    and therefore cannot dissociate from collagen type I; it remains bound to
    monomeric and multimeric collagen molecules. Patient fibroblasts show an
    intracellular decrease of HSP47 (and FKBP65) with reduced procollagen type I
    in culture media, and electron microscopy shows abnormal secreted collagen
    fibrils with increased HSP47 bound to collagen. This is the mechanistic
    mirror of OI type X, in which HSP47 (SERPINH1) is itself lost.
