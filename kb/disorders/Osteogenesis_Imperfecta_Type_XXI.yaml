name: Osteogenesis Imperfecta Type XXI
creation_date: "2026-06-30T00:00:00Z"
category: Mendelian
disease_term:
  preferred_term: Osteogenesis imperfecta type 21
  term:
    id: MONDO:0030861
    label: osteogenesis imperfecta, type 21
description: >-
  Osteogenesis imperfecta type XXI (OI type XXI) is a severe autosomal recessive
  brittle bone disease caused by biallelic loss-of-function variants in KDELR2,
  the gene encoding KDEL endoplasmic reticulum protein retention receptor 2.
  KDELR2 is a cis-Golgi/ERGIC transmembrane receptor that captures soluble
  ER-resident proteins bearing a C-terminal KDEL-like retrieval signal and
  returns them to the endoplasmic reticulum via COPI-coated retrograde
  transport. A key cargo is HSP47 (SERPINH1), the collagen-specific molecular
  chaperone whose own loss causes the mechanistically linked OI type X. HSP47
  binds the type I procollagen triple helix in the ER and must dissociate from
  procollagen as the cargo reaches the lower-pH cis-Golgi/ERGIC; KDELR2-mediated
  retrieval is required to release HSP47 from procollagen and recycle it to the
  ER. When KDELR2 is inactive, HSP47 cannot be released and instead remains bound
  to collagen type I molecules, is depleted intracellularly, and is carried out
  with the secreted collagen, where persistent HSP47 binding disrupts normal
  collagen fibril formation. Patient fibroblasts show intracellular decrease of
  HSP47 and FKBP65 with reduced procollagen type I in the culture media and
  abnormal secreted collagen fibrils. The resulting defective bone collagen
  matrix fails to mineralize and assemble normally, producing severe skeletal
  fragility with recurrent fractures, reduced bone mineral density, growth
  deficiency, and bone deformity. OI type XXI was defined in 2020 (van Dijk
  et al.) in four families with biallelic KDELR2 variants; a second group
  reported additional biallelic KDELR2 missense variants with associated
  neurodevelopmental features.
