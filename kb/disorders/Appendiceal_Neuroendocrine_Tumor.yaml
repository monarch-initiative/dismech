- name: Acute Appendicitis Presentation
  category: Clinical
  description: >-
    Most appendiceal NETs are clinically silent and are found incidentally in
    appendectomy specimens removed for symptoms of acute appendicitis, sometimes
    because a tumor at the appendiceal base obstructs the lumen.
  phenotype_term:
    preferred_term: Appendicitis
    term:
      id: HP:6000143
      label: Appendicitis
  evidence:
  - reference: PMID:33754384
    reference_title: "Risk factors for progression of appendiceal neuroendocrine tumours: low-stage tumours <5 mm appear to be overwhelmingly indolent and may merit a separate designation."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Appendiceal well-differentiated neuroendocrine tumours (NETs) are usually
      incidental and clinically benign.
    explanation: >-
      Most appendiceal NETs are incidental findings, typically in appendectomy
      specimens removed for presumed appendicitis.
- name: Flushing
  category: Clinical
  description: >-
    Episodic cutaneous flushing is a cardinal feature of the carcinoid syndrome,
    occurring in appendiceal NET essentially only in the setting of hepatic
    metastases.
  phenotype_term:
    preferred_term: Flushing
    term:
      id: HP:0031284
      label: Flushing
    temporality: RECURRENT
  evidence:
  - reference: PMID:28904734
    reference_title: "A 17-year-old male with a Small Bowel Neuroendocrine Tumor: flushing differential diagnosis."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Small bowel NETs (SB-NETs) are related to serotonin hypersecretion which
      causes: flushing, diarrhea, abdominal pain, bronchoconstriction and heart
      involvement, also known as carcinoid syndrome (CS).
    explanation: >-
      Flushing is a cardinal feature of the serotonin-driven carcinoid syndrome
      seen with metastatic midgut/appendiceal NETs.
- name: Secretory Diarrhea
  category: Clinical
  description: >-
    Chronic secretory diarrhea is a major component of the carcinoid syndrome driven
    by serotonin and other secretagogues released by metastatic tumor.
  phenotype_term:
    preferred_term: Diarrhea
    term:
      id: HP:0002014
      label: Diarrhea
    temporality: CHRONIC
  evidence:
  - reference: PMID:28904734
    reference_title: "A 17-year-old male with a Small Bowel Neuroendocrine Tumor: flushing differential diagnosis."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Small bowel NETs (SB-NETs) are related to serotonin hypersecretion which
      causes: flushing, diarrhea, abdominal pain, bronchoconstriction and heart
      involvement, also known as carcinoid syndrome (CS).
    explanation: >-
      Diarrhea is a defining feature of serotonin-mediated carcinoid syndrome in
      midgut/appendiceal NETs.
- name: Elevated Urinary 5-HIAA
  category: Laboratory
  description: >-
    24-hour urinary 5-hydroxyindoleacetic acid (5-HIAA), the principal serotonin
    metabolite, is elevated in serotonin-secreting NETs with carcinoid syndrome and
    serves as the main biochemical marker.
  phenotype_term:
    preferred_term: Elevated urinary 5-hydroxyindoleacetic acid level
    term:
      id: HP:6000756
      label: Elevated urinary 5-hydroxyindoleacetic acid level
  evidence:
  - reference: PMID:28904734
    reference_title: "A 17-year-old male with a Small Bowel Neuroendocrine Tumor: flushing differential diagnosis."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      The 24-h urinary 5-hydroxyindoleacetic acid (5-HIAA) excretion was elevated.
    explanation: >-
      Elevated 24-hour urinary 5-HIAA is the principal biochemical marker of
      serotonin-secreting NETs with carcinoid syndrome.
- name: Carcinoid Heart Disease (Tricuspid Regurgitation)
  category: Clinical
  description: >-
    Chronic serotonin exposure causes plaque-like fibrous thickening of right-sided
    endocardium and valves, producing tricuspid regurgitation and pulmonary valve
    disease in long-standing metastatic carcinoid syndrome.
  phenotype_term:
    preferred_term: Tricuspid regurgitation
    term:
      id: HP:0005180
      label: Tricuspid regurgitation
- name: Weight Loss
  category: Clinical
  description: >-
    Weight loss may accompany advanced or metastatic disease and chronic carcinoid
    syndrome.
  phenotype_term:
    preferred_term: Weight loss
    term:
      id: HP:0001824
      label: Weight loss
treatments:
- name: Appendectomy
  description: >-
    Simple appendectomy is curative for the majority of appendiceal NETs, which are
    small (<1 cm), low-grade, and confined to the appendix.
  treatment_term:
    preferred_term: appendectomy
    term:
      id: MAXO:0001032
      label: appendectomy
  therapeutic_modality: SURGERY
  evidence:
  - reference: PMID:42057320
    reference_title: "De-Escalating Surgery for 1-2 cm Appendiceal Neuroendocrine Tumors: A North American Multi-Center Analysis."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      NCCN guidelines recommend right hemicolectomy (RHC) for appendiceal
      neuroendocrine tumors (aNETs) > 2 cm and observation for < 1 cm.
    explanation: >-
      NCCN guidance reserves more extensive surgery for larger tumors; small aNETs
      are managed with appendectomy/observation.
  - reference: PMID:42057320
    reference_title: "De-Escalating Surgery for 1-2 cm Appendiceal Neuroendocrine Tumors: A North American Multi-Center Analysis."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Among patients with 1-2 cm aNETs, RHC conferred no survival benefit over APY.
    explanation: >-
      Appendectomy alone (APY) conferred outcomes equivalent to right hemicolectomy
      for 1-2 cm appendiceal NETs, supporting appendectomy as adequate treatment in
      many cases.
- name: Right Hemicolectomy
  description: >-
    Completion right hemicolectomy with mesenteric lymphadenectomy is considered for
    appendiceal NETs with higher-risk features such as size >2 cm, deep
    mesoappendiceal invasion, higher grade, or positive/uncertain margins.
  treatment_term:
    preferred_term: right colectomy
    term:
      id: NCIT:C51623
      label: Right Colectomy
  therapeutic_modality: SURGERY
  evidence:
  - reference: PMID:42057320
    reference_title: "De-Escalating Surgery for 1-2 cm Appendiceal Neuroendocrine Tumors: A North American Multi-Center Analysis."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      NCCN guidelines recommend right hemicolectomy (RHC) for appendiceal
      neuroendocrine tumors (aNETs) > 2 cm and observation for < 1 cm.
    explanation: >-
      Completion right hemicolectomy is the guideline-recommended option for larger
      (>2 cm) appendiceal NETs.
- name: Somatostatin Analogue Therapy
  description: >-
    Long-acting somatostatin analogues (e.g., octreotide, lanreotide) control
    carcinoid-syndrome symptoms (flushing, diarrhea) and provide antiproliferative
    benefit in advanced, somatostatin-receptor-positive well-differentiated NETs.
  treatment_term:
    preferred_term: Pharmacotherapy
    term:
      id: NCIT:C15986
      label: Pharmacotherapy
    therapeutic_agent:
    - preferred_term: octreotide
      term:
        id: CHEBI:7726
        label: octreotide
  therapeutic_modality: PEPTIDE
  evidence:
  - reference: PMID:28286921
    reference_title: "Treatment Strategies for Metastatic Neuroendocrine Tumors of the Gastrointestinal Tract."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Current and emerging treatment options include somatostatin analogs,
      radiolabeled somatostatin analogs, the mTOR inhibitor everolimus, and the
      tyrosine kinase inhibitor sunitinib.
    explanation: >-
      Somatostatin analogues are a standard treatment option for metastatic
      gastrointestinal NETs, including for symptom control and antiproliferative
      effect.
  - reference: PMID:37682701
    reference_title: "European Neuroendocrine Tumor Society (ENETS) 2023 guidance paper for appendiceal neuroendocrine tumours (aNET)."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      practical guidance for the diagnosis and management of appendiceal NET (aNET)
    explanation: >-
      The ENETS 2023 guidance paper provides evidence-based recommendations for the
      diagnosis and management of appendiceal NET, including the role of somatostatin
      analogues in advanced disease.
