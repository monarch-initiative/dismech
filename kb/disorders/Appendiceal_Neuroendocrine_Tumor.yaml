name: Appendiceal Neuroendocrine Tumor
creation_date: "2026-06-08T00:00:00Z"
description: >-
  Appendiceal neuroendocrine tumors (appendiceal NETs, historically "appendiceal
  carcinoids") are well-differentiated neoplasms arising from the diffuse
  neuroendocrine cells of the appendix, predominantly serotonin-producing
  enterochromaffin (EC) cells. They are the most common neoplasm of the appendix
  and are usually discovered incidentally in appendectomy specimens removed for
  presumed acute appendicitis. Most are small (<1 cm), low-grade (G1), and behave
  indolently with excellent prognosis after simple appendectomy. Tumor size,
  histologic grade (Ki-67 proliferation index and mitotic count), and depth of
  mesoappendiceal invasion are the principal determinants of metastatic risk and
  guide the decision between appendectomy alone and completion right hemicolectomy.
  Functional carcinoid syndrome (flushing, secretory diarrhea, bronchospasm,
  carcinoid heart disease) is rare and essentially confined to the minority of
  patients with hepatic metastases, because serotonin and other vasoactive amines
  secreted into the portal circulation are normally inactivated by the liver.
  Appendiceal NETs are overwhelmingly sporadic. They must be distinguished from
  goblet cell adenocarcinoma (formerly "goblet cell carcinoid"), an amphicrine
  epithelial neoplasm with mixed neuroendocrine and mucinous/glandular
  differentiation that is biologically more aggressive and is staged and treated as
  an adenocarcinoma rather than as a neuroendocrine tumor.
categories:
- Solid Tumor
- Gastrointestinal Cancer
- Neuroendocrine Neoplasm
parents:
- neuroendocrine tumor
- appendix cancer
disease_term:
  preferred_term: appendiceal neuroendocrine tumor
  term:
    id: MONDO:0015066
    label: neuroendocrine tumor of the appendix, well differentiated, low or intermediate grade
has_subtypes:
- name: G1 NET
  display_name: Grade 1 (G1) well-differentiated NET
  description: >-
    Well-differentiated appendiceal neuroendocrine tumor with low proliferative
    activity (Ki-67 <3% and mitotic count <2 per 2 mm^2). The most common grade;
    typically small, incidentally discovered, and cured by appendectomy alone.
- name: G2 NET
  display_name: Grade 2 (G2) well-differentiated NET
  description: >-
    Well-differentiated appendiceal neuroendocrine tumor with intermediate
    proliferative activity (Ki-67 3-20% or mitotic count 2-20 per 2 mm^2). Higher
    grade and larger size correlate with increased risk of nodal and distant spread.
- name: Goblet Cell Adenocarcinoma
  display_name: Goblet cell adenocarcinoma (distinct entity)
  description: >-
    Amphicrine appendiceal neoplasm composed of goblet-like mucinous cells with
    variable neuroendocrine differentiation, formerly termed "goblet cell carcinoid."
    The 2019 WHO classification reclassified it as an adenocarcinoma; it behaves more
    aggressively than conventional appendiceal NET and is staged and managed as an
    adenocarcinoma. Included here to document its distinction from true appendiceal
    neuroendocrine tumors, not as a neuroendocrine subtype.
pathophysiology:
- name: Neoplastic Proliferation of Appendiceal Enterochromaffin Cells
  description: >-
    Appendiceal NETs arise from the diffuse neuroendocrine cell compartment of the
    appendiceal mucosa, predominantly serotonin-producing enterochromaffin (EC)
    cells. Clonal neoplastic proliferation of these cells produces a
    well-differentiated tumor expressing neuroendocrine markers (chromogranin A,
    synaptophysin) and frequently arises in a subepithelial/submucosal location.
  cell_types:
  - preferred_term: enterochromaffin cell
    term:
      id: CL:0000577
      label: type EC enteroendocrine cell
  - preferred_term: serotonin secreting cell
    term:
      id: CL:0000458
      label: serotonin secreting cell
  locations:
  - preferred_term: vermiform appendix
    term:
      id: UBERON:0001154
      label: vermiform appendix
  biological_processes:
  - preferred_term: cell population proliferation
    modifier: INCREASED
    term:
      id: GO:0008283
      label: cell population proliferation
  evidence:
  - reference: PMID:33754384
    reference_title: "Risk factors for progression of appendiceal neuroendocrine tumours: low-stage tumours <5 mm appear to be overwhelmingly indolent and may merit a separate designation."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Appendiceal well-differentiated neuroendocrine tumours (NETs) are usually
      incidental and clinically benign.
    explanation: >-
      Establishes appendiceal NET as a well-differentiated neuroendocrine neoplasm
      that is usually incidental and clinically benign.
  downstream:
  - target: Serotonin Secretion and Storage in Neurosecretory Granules
    description: >-
      Neoplastic EC cells retain serotonin biosynthetic machinery and secretory
      granules.
  - target: Size-, Grade-, and Invasion-Dependent Metastatic Progression
    description: >-
      Tumor growth and acquisition of invasive potential drive metastatic risk.
- name: Serotonin Secretion and Storage in Neurosecretory Granules
  description: >-
    Tumor EC cells synthesize serotonin from L-tryptophan and store it, along with
    other bioactive amines and peptides, in dense-core secretory (neurosecretory)
    granules. Serotonin and its metabolites underlie the biochemical hallmarks of
    serotonin-producing NETs; urinary 5-hydroxyindoleacetic acid (5-HIAA), the major
    serotonin metabolite, is the principal biochemical marker.
  cell_types:
  - preferred_term: enterochromaffin cell
    term:
      id: CL:0000577
      label: type EC enteroendocrine cell
  biological_processes:
  - preferred_term: serotonin biosynthetic process
    modifier: INCREASED
    term:
      id: GO:0042427
      label: serotonin biosynthetic process
  - preferred_term: serotonin secretion
    modifier: INCREASED
    term:
      id: GO:0001820
      label: serotonin secretion
  cellular_components:
  - preferred_term: secretory granule
    term:
      id: GO:0030141
      label: secretory granule
  evidence:
  - reference: PMID:28904734
    reference_title: "A 17-year-old male with a Small Bowel Neuroendocrine Tumor: flushing differential diagnosis."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Small bowel NETs (SB-NETs) are related to serotonin hypersecretion which
      causes: flushing, diarrhea, abdominal pain, bronchoconstriction and heart
      involvement, also known as carcinoid syndrome (CS).
    explanation: >-
      Documents that serotonin hypersecretion by midgut/small-bowel NETs (the same
      EC-cell biology as appendiceal NET) drives the carcinoid syndrome.
  downstream:
  - target: Hepatic Metastasis and Carcinoid Syndrome
    description: >-
      Systemic serotonin escape from first-pass hepatic clearance produces the
      carcinoid syndrome only once liver metastases are present.
- name: Size-, Grade-, and Invasion-Dependent Metastatic Progression
  description: >-
    The metastatic risk of an appendiceal NET is governed chiefly by tumor size,
    histologic grade (Ki-67 index and mitotic count), and depth of mesoappendiceal
    invasion. Small (<1 cm) low-grade tumors confined to the appendix rarely
    metastasize and are cured by appendectomy, whereas larger tumors, higher grade,
    and deep mesoappendiceal invasion increase the likelihood of lymph node and
    distant spread and prompt consideration of right hemicolectomy.
  cell_types:
  - preferred_term: enterochromaffin cell
    term:
      id: CL:0000577
      label: type EC enteroendocrine cell
  biological_processes:
  - preferred_term: negative regulation of apoptotic process
    modifier: INCREASED
    term:
      id: GO:0043066
      label: negative regulation of apoptotic process
  evidence:
  - reference: PMID:33754384
    reference_title: "Risk factors for progression of appendiceal neuroendocrine tumours: low-stage tumours <5 mm appear to be overwhelmingly indolent and may merit a separate designation."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Increasing tumour size was associated with an increased risk of nodal disease
    explanation: >-
      Demonstrates that larger tumor size predicts nodal metastasis, supporting
      size as a key determinant of metastatic risk.
  - reference: PMID:33754384
    reference_title: "Risk factors for progression of appendiceal neuroendocrine tumours: low-stage tumours <5 mm appear to be overwhelmingly indolent and may merit a separate designation."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Small (<5 mm) App-NETs that do not invade the serosa or mesoappendix appear
      to be overwhelmingly benign and low-grade
    explanation: >-
      Confirms that small tumors without mesoappendiceal/serosal invasion are
      overwhelmingly indolent, supporting size and invasion depth as risk factors.
  downstream:
  - target: Hepatic Metastasis and Carcinoid Syndrome
    description: >-
      Distant spread to the liver is the prerequisite for systemic serotonin effects.
- name: Hepatic Metastasis and Carcinoid Syndrome
  description: >-
    Under normal portal anatomy, serotonin and other vasoactive amines secreted by
    a primary gut NET are cleared during first-pass hepatic metabolism, so systemic
    symptoms do not occur. Once liver metastases secrete vasoactive products directly
    into the systemic (hepatic venous) circulation, patients develop the carcinoid
    syndrome: episodic flushing, secretory diarrhea, bronchospasm, and, over time,
    fibrotic right-sided (tricuspid/pulmonary) carcinoid heart disease. Carcinoid
    syndrome is rare in appendiceal NET because most tumors are small and never
    metastasize.
  locations:
  - preferred_term: vermiform appendix
    term:
      id: UBERON:0001154
      label: vermiform appendix
  biological_processes:
  - preferred_term: serotonin secretion
    modifier: INCREASED
    term:
      id: GO:0001820
      label: serotonin secretion
  evidence:
  - reference: PMID:28904734
    reference_title: "A 17-year-old male with a Small Bowel Neuroendocrine Tumor: flushing differential diagnosis."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Hepatic and intestinal biopsies reported a well-differentiated NET of the
      ileocecal valve with hepatic metastasis. He was started on octreotide
    explanation: >-
      Illustrates that carcinoid syndrome from a midgut serotonin-secreting NET
      accompanies hepatic metastasis (with elevated urinary 5-HIAA), the same
      mechanism by which appendiceal NET produces carcinoid syndrome only when
      liver metastases are present.
phenotypes:
- name: Carcinoid Tumor
  category: Neoplasm
  description: >-
    Appendiceal NET is a well-differentiated carcinoid (neuroendocrine) tumor of the
