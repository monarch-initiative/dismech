pathophysiology:
- name: KEOPS and t6A Biogenesis Deficiency
  description: >-
    A major fraction of known GAMOS subtypes are caused by defects in KEOPS
    complex components or the upstream YRDC enzyme. These lesions reduce t6A
    tRNA modification, impair protein synthesis and cell survival, and converge
    on early podocyte injury and impaired brain growth.
