discussions:
- discussion_id: gap_tubb_tubb5_human_organoid_translatability
  prompt: >-
    Are the progenitor cell-cycle, spindle-orientation, apoptosis, and migration
    defects observed in mouse Tubb5 models conserved in human radial glia,
    outer-radial-glia-like cells, and cortical organoids carrying pathogenic
    TUBB/TUBB5 variants?
  kind: HUMAN_MODEL_MISMATCH
  status: OPEN
  attaches_to:
  - pathophysiology#Progenitor Cell-Cycle and Spindle Dysfunction
  - pathophysiology#p53-Associated Apoptosis and Progenitor Pool Distortion
  - pathophysiology#Impaired Neurogenic Division and Migration
  rationale: >-
    The strongest mechanistic evidence is mouse based, while the Falcon report
    did not identify a direct TUBB/TUBB5 human iPSC or organoid disease model.
    Human cortical expansion depends on outer radial glia and OSVZ biology, so
    a human organoid/iPSC test is needed before assuming the mouse progenitor
    apoptosis branch fully explains the human microcephaly phenotype.
  evidence:
  - reference: PMID:26903504
    reference_title: Mutations in the murine homologue of TUBB5 cause microcephaly by perturbing cell cycle progression and inducing p53-associated apoptosis.
    supports: SUPPORT
    evidence_source: MODEL_ORGANISM
    snippet: >-
      cause TUBB5-associated microcephaly by exploiting two new mouse models
    explanation: >-
      Identifies the main mechanistic evidence source as mouse models, which
      motivates a human/model translatability gap.
  - reference: PMID:28111201
    reference_title: Human iPSC-Derived Cerebral Organoids Model Cellular Features of Lissencephaly and Reveal Prolonged Mitosis of Outer Radial Glia.
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: >-
      Recent work has uncovered critical cellular and molecular differences
      between cortical development in humans and mice, further underscoring the
      need to develop human model systems.
    explanation: >-
      Supports organoid/iPSC testing when mouse cortical-development mechanisms
      are being translated to human disease.
