name: TUBB/TUBB5-related Microcephaly
creation_date: "2026-06-12T03:31:46Z"
category: Mendelian
description: >-
  TUBB/TUBB5-related microcephaly is a beta-tubulin neurodevelopmental disorder
  caused by heterozygous de novo missense variants in the gene historically
  reported as TUBB5 and currently represented by HGNC as TUBB. It is modeled as a
  distinct disease entry because its skeleton is centered on embryonic
  neurogenesis and cortical size: altered beta-tubulin folding, heterodimer
  assembly, and microtubule function perturb neural progenitor cell-cycle
  progression, spindle orientation, neurogenic division, and neuronal migration;
  in mouse models, the microcephaly mechanism includes p53-associated apoptosis
  and loss of upper-layer neurons. The human phenotype combines congenital or
  early microcephaly with structural brain abnormalities such as dysmorphic
  basal ganglia, corpus callosum abnormality, simplified or polymicrogyria-like
  cortical malformation, and variable brainstem/cerebellar involvement, together
  with developmental delay, intellectual disability, motor and speech delay, and
  occasional seizures. This is therefore split from TUBB2A/TUBB2B cortical
  malformation and TUBB3 disease, while sharing module-level microtubule
  apparatus biology with the broader tubulinopathy family.
parents:
- congenital nervous system disorder
- disorder of development or morphogenesis
- hereditary neurological disease
- primary microcephaly
