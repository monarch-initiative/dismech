- name: Progenitor Cell-Cycle and Spindle Dysfunction
  conforms_to: neural_progenitor_centrosome_spindle_dysfunction#Abnormal Progenitor Division and Fate Choice
  description: >-
    Tubb/TUBB5 dysfunction affects neurogenic progenitors during corticogenesis.
    In the founding study, Tubb5 depletion perturbed progenitor cell-cycle
    progression and altered neuron position; in the knock-in mouse model, the
    E401K allele produced delayed cell-cycle progression, ectopic progenitor
    markers, and spindle-orientation defects. This progenitor branch is the main
    reason to model TUBB/TUBB5-related microcephaly separately from beta-tubulin
    disorders whose central skeleton is postmitotic neuronal migration.
