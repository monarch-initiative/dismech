      description: Patient-derived variant organoids corrected to the reference sequence.
    - name: Isogenic knock-in organoids
      description: Control-background organoids carrying the introduced pathogenic variant.
    decision_criterion: >-
      The mouse-derived mechanism is supported if human variant organoids show
      delayed progenitor cell cycle, spindle orientation defects, p53 activation,
      increased apoptosis, reduced upper-layer neuron output, and/or migration
      defects that are rescued by correction and reproduced by knock-in.
    would_support:
    - pathophysiology#Progenitor Cell-Cycle and Spindle Dysfunction
    - pathophysiology#p53-Associated Apoptosis and Progenitor Pool Distortion
    - pathophysiology#Impaired Neurogenic Division and Migration
- discussion_id: gap_tubb_tubb5_natural_history_and_phenotype_breadth
  prompt: >-
    What is the full natural-history and phenotype range for TUBB/TUBB5-related
    microcephaly beyond the three original cases and small tubulinopathy cohort
    counts?
  kind: KNOWLEDGE_GAP
  status: OPEN
  attaches_to:
  - phenotypes#Global Developmental Delay / Intellectual Disability
  - phenotypes#Polymicrogyria-like Cortical Dysplasia / Simplified Gyral Pattern
  rationale: >-
    The entry is supported by a strong founding case series and model mechanism,
    but TUBB/TUBB5-specific longitudinal outcomes, seizure frequency, genotype-
    phenotype correlations, and variant-class effects remain much thinner than
    for TUBA1A or TUBB2B.
notes: >-
  Entry created from cortical-malformation epic 4098 (issue 4086), seeded from
  Romero, Bahi-Buisson & Francis 2018 and refined with Falcon deep research.
  The primary literature uses TUBB5; HGNC now resolves TUBB5 to current symbol
  TUBB (HGNC:20778), so this entry preserves both names in the title while using
  TUBB as the gene term. The disease is not lumped with generic primary
  microcephaly or generic tubulinopathy because its coherent skeleton combines
  beta-tubulin heterodimer/microtubule dysfunction with a progenitor cell-cycle,
  spindle, p53-apoptosis, and upper-layer neuron-output branch. It conforms
  mainly to the neural progenitor centrosome-spindle dysfunction module, with a
  secondary conformance to the microtubule-dependent neuronal migration module
  for the migration/cortical dysgyria branch. The Falcon report found no direct
  TUBB/TUBB5 organoid or iPSC disease model; the organoid experiment is included
  as a human/model mismatch knowledge gap, not as existing disease evidence.
