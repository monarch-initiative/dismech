pathophysiology:
- name: Altered TUBB/TUBB5 Beta-Tubulin Function
  conforms_to: microtubule_dependent_neuronal_migration_failure#Microtubule Apparatus Perturbation
  description: >-
    Pathogenic variants in the beta-tubulin isotype historically named TUBB5
    alter chaperone-dependent tubulin heterodimer assembly and microtubule
    function. The upstream lesion is not simply a generic microcephaly label:
    different missense variants perturb the beta-tubulin folding/assembly
    machinery in different ways and feed both progenitor cell-cycle and neuronal
    migration branches.
