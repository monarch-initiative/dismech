  conforms_to: neural_progenitor_centrosome_spindle_dysfunction#Progenitor Pool Distortion
  description: >-
    Tubb5 mouse models show that the microcephaly branch is driven by abnormal
    cell survival and progenitor-output effects, not only by altered neuronal
    migration. The E401K knock-in and loss-of-function models produce profound
    microcephaly with loss of upper-layer neurons, massive apoptosis, and p53
    upregulation, making p53-associated cell death a central mechanistic branch.
