name: Bosch-Boonstra-Schaaf Optic Atrophy Syndrome
creation_date: "2026-06-04T00:00:00Z"
synonyms:
- BBSOAS
- Optic atrophy-intellectual disability syndrome
- NR2F1-related neurodevelopmental disorder
description: >-
  Bosch-Boonstra-Schaaf optic atrophy syndrome (BBSOAS) is a rare autosomal
  dominant neurodevelopmental disorder caused by haploinsufficiency of NR2F1
  (also known as COUP-TFI), a nuclear receptor transcription factor essential
  for neural and ocular development. It is characterized by optic atrophy
  and/or cerebral (cortical) visual impairment, developmental delay,
  intellectual disability, autism spectrum disorder, hypotonia, seizures, and
  oromotor dysfunction. Missense variants in the DNA-binding domain tend to
  produce the most severe phenotypes.
category: Mendelian
parents:
- hereditary disease
- autosomal dominant syndromic intellectual disability
