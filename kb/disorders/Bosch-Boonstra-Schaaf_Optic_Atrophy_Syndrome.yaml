    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      There is no cure for NR2F1-NDD. Supportive treatment typically relies on
      multidisciplinary specialists in the fields of neurology, speech-language
      pathology, ophthalmology (including low-vision services), gastroenterology,
