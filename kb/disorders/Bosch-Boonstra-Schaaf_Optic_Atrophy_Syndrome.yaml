inheritance:
- name: Autosomal dominant inheritance
  description: >-
    BBSOAS is an autosomal dominant disorder. Most probands have a de novo
    pathogenic NR2F1 variant or deletion; some intrafamilial recurrences and a
    low (~1%) recurrence risk to sibs from theoretical parental germline
    mosaicism have been reported.
  inheritance_term:
    preferred_term: autosomal dominant inheritance
    term:
      id: HP:0000006
      label: Autosomal dominant inheritance
  evidence:
  - reference: PMID:36508512
    reference_title: "NR2F1-Related Neurodevelopmental Disorder."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      NR2F1-NDD is an autosomal dominant disorder. Most probands reported to
      date with an intragenic NR2F1 pathogenic variant whose parents have
      undergone molecular genetic testing have the disorder as the result of a
      de novo pathogenic variant.
    explanation: >-
      GeneReviews establishes autosomal dominant inheritance with predominantly
      de novo occurrence.
pathophysiology:
- name: NR2F1 haploinsufficiency
  description: >-
    Heterozygous loss-of-function variants (missense, nonsense, frameshift,
    translation-initiation) and whole-gene deletions of NR2F1 reduce dosage of
    the COUP-TFI nuclear receptor transcription factor. Missense variants in
    the zinc-finger DNA-binding domain and the putative ligand-binding domain
    reduce NR2F1 transcriptional activity, and DNA-binding domain variants are
    associated with the most severe clinical phenotypes.
  genes:
  - preferred_term: NR2F1
    term:
      id: hgnc:7975
      label: NR2F1
  biological_processes:
  - preferred_term: NR2F1 nuclear receptor transcriptional regulation
    term:
      id: GO:0006357
      label: regulation of transcription by RNA polymerase II
    modifier: DECREASED
  evidence:
  - reference: PMID:24462372
    reference_title: "NR2F1 mutations cause optic atrophy with intellectual disability."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      NR2F1 encodes a nuclear receptor protein that regulates transcription. A
      reporter assay showed that missense mutations in the zinc-finger
      DNA-binding domain and the putative ligand-binding domain decrease NR2F1
      transcriptional activity.
    explanation: >-
      Functional reporter assays demonstrate that pathogenic NR2F1 missense
      variants reduce its transcriptional activity, establishing
      haploinsufficiency as the disease mechanism.
  - reference: PMID:26986877
    reference_title: "The expanding clinical phenotype of Bosch-Boonstra-Schaaf optic atrophy syndrome: 20 new cases and possible genotype-phenotype correlations."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Bosch-Boonstra-Schaaf optic atrophy syndrome (BBSOAS) is an
      autosomal-dominant disorder characterized by optic atrophy and
      intellectual disability caused by loss-of-function mutations in NR2F1.
    explanation: >-
      Confirms BBSOAS results from loss-of-function NR2F1 variants consistent
      with haploinsufficiency.
  - reference: PMID:35455940
    reference_title: "Pathophysiological Heterogeneity of the BBSOA Neurodevelopmental Syndrome."
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      the Bosch-Boonstra-Schaaf Optic Atrophy Syndrome (BBSOAS; OMIM 615722;
      ORPHA 401777), a recently described monogenic neurodevelopmental syndrome
      caused by the haploinsufficiency of NR2F1 gene, a key transcriptional
      regulator of brain development.
    explanation: >-
      Review explicitly characterizes BBSOAS as caused by NR2F1
      haploinsufficiency affecting a key transcriptional regulator of brain
      development.
  downstream:
  - target: Disrupted neural and visual-system development
    description: >-
      Reduced COUP-TFI dosage perturbs its transcriptional control of cortical
      arealization, neuronal differentiation, and visual-pathway development.
    evidence:
    - reference: PMID:34466801
      reference_title: "Pathogenic NR2F1 variants cause a developmental ocular phenotype recapitulated in a mutant mouse model."
      supports: SUPPORT
      evidence_source: MODEL_ORGANISM
      snippet: >-
        We propose NR2F1 as a major gene that orchestrates early retinal and
        optic nerve head development, playing a key role in the maturation of the
        visual system.
      explanation: >-
        Supports the causal link from reduced NR2F1 dosage to disrupted
        visual-system development.
- name: Disrupted neural and visual-system development
  description: >-
    COUP-TFI is a major transcriptional regulator orchestrating cortical
    arealization, cell-type specification, and maturation across forebrain
    structures, and contributes to development of the retina and optic nerve.
    Its haploinsufficiency disrupts these developmental programs, producing the
    combined neurodevelopmental and visual phenotype.
