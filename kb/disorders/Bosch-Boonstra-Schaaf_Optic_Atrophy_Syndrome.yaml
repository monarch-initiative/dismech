prevalence:
- population: Global
  notes: >-
    BBSOAS is an ultra-rare disorder. Its precise prevalence has not been
    epidemiologically established; ~100 individuals had been reported in the
    literature as of the GeneReviews summary, and the condition is catalogued in
    Orphanet (ORPHA:401777) without a formal prevalence estimate.
progression:
- phase: Visual impairment course
  notes: >-
    The visual impairment in BBSOAS is congenital/early-onset and generally
    non-progressive: in individuals with longitudinal ophthalmological
    follow-up, no significant deterioration in visual function was observed.
  evidence:
  - reference: PMID:34466801
    reference_title: "Pathogenic NR2F1 variants cause a developmental ocular phenotype recapitulated in a mutant mouse model."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      for those individuals with available longitudinal ophthalmological data,
      there was no significant deterioration in visual function during the period
      of follow-up.
    explanation: >-
      Longitudinal deep-phenotyping data indicate the visual impairment in
      BBSOAS is non-progressive, which is relevant for prognostic counseling.
treatments:
- name: Multidisciplinary supportive care
  description: >-
    There is no cure for BBSOAS. Supportive management relies on
    multidisciplinary specialists including neurology, speech-language
    pathology, ophthalmology with low-vision services, gastroenterology,
    nutrition, occupational therapy, physical therapy, audiology, clinical
    genetics, and genetic counseling, with regular surveillance for existing
    and emerging manifestations.
  treatment_term:
    preferred_term: supportive care
    term:
      id: MAXO:0000950
      label: supportive care
  evidence:
