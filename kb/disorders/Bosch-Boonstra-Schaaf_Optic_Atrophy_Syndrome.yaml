  evidence:
  - reference: PMID:29709504
    reference_title: "The pleiotropic transcriptional regulator COUP-TFI plays multiple roles in neural development and disease."
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      COUP-TFI (or NR2F1), a nuclear receptor belonging to the superfamily of
      the steroid/thyroid hormone receptors, and considered to be one of the
      major transcriptional regulators orchestrating cortical arealization,
      cell-type specification and maturation.
    explanation: >-
      Establishes COUP-TFI/NR2F1 as a master transcriptional regulator of
      cortical patterning and cell-type specification, the developmental
      programs disrupted in BBSOAS.
  - reference: PMID:24462372
    reference_title: "NR2F1 mutations cause optic atrophy with intellectual disability."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      These findings indicate that NR2F1 plays an important role in the
      neurodevelopment of the visual system and that its disruption can lead to
      optic atrophy with intellectual disability.
    explanation: >-
      Directly links NR2F1 disruption to abnormal visual-system
      neurodevelopment producing optic atrophy.
  - reference: PMID:34466801
    reference_title: "Pathogenic NR2F1 variants cause a developmental ocular phenotype recapitulated in a mutant mouse model."
    supports: SUPPORT
    evidence_source: MODEL_ORGANISM
    snippet: >-
      Abnormal retinogenesis in early stages of development was observed in
      Nr2f1 mutant mice with decreased retinal ganglion cell density and
      disruption of retinal ganglion cell axonal guidance from the neural retina
      into the optic stalk, accounting for the development of optic nerve
      hypoplasia.
    explanation: >-
      Nr2f1 mutant mice recapitulate the ocular phenotype, showing decreased
      retinal ganglion cell density and disrupted axonal guidance that explains
      optic nerve hypoplasia, supporting a developmental origin of the visual
      defect.
    images:
    - Bosch-Boonstra-Schaaf_Optic_Atrophy_Syndrome-deep-research-falcon_artifacts/image-1.png
  - reference: PMID:31600777
    reference_title: "Nr2f1 heterozygous knockout mice recapitulate neurological phenotypes of Bosch-Boonstra-Schaaf optic atrophy syndrome and show impaired hippocampal synaptic plasticity."
    supports: SUPPORT
    evidence_source: MODEL_ORGANISM
    snippet: >-
      we investigated a heterozygous knockout mouse model and found that this
      model recapitulates some of the neurological phenotypes of BBSOAS,
      including altered learning/memory, hearing defects, neonatal hypotonia and
      decreased hippocampal volume.
    explanation: >-
      A heterozygous Nr2f1 knockout mouse recapitulates core BBSOAS neurological
      phenotypes, supporting NR2F1 haploinsufficiency as the mechanism driving
      the neurodevelopmental features.
