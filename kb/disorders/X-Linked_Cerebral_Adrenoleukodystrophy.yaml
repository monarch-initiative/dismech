name: X-linked cerebral adrenoleukodystrophy
creation_date: "2026-04-15T00:00:00Z"
category: Mendelian
description: >-
  X-linked cerebral adrenoleukodystrophy is a peroxisomal disorder caused by
  ABCD1 variants, leading to accumulation of very long-chain fatty acids and
  progressive inflammatory demyelination with adrenal insufficiency.
