name: Temporal Lobe Epilepsy
creation_date: '2026-04-05T18:58:47Z'
updated_date: '2026-04-06T02:36:03Z'
description: >-
  Temporal lobe epilepsy is a focal epilepsy in which seizures arise from
  temporal lobe networks, often involving mesial temporal structures and
  commonly associated with memory and other cognitive deficits.
category: Complex
parents:
- Epilepsy
disease_term:
  preferred_term: temporal lobe epilepsy
  term:
    id: MONDO:0005115
    label: temporal lobe epilepsy
has_subtypes:
- name: Mesial Temporal Lobe Epilepsy with Hippocampal Sclerosis
  description: >-
    Mesial temporal lobe epilepsy subtype defined by hippocampal sclerosis,
    memory impairment, and frequent drug resistance.
pathophysiology:
- name: Excitation-Inhibition Imbalance
  description: >-
    Temporal lobe epilepsy is associated with altered excitation/inhibition
    balance across temporal and connected cortical regions, with molecular
    correlates implicating both GABAergic and glutamatergic signaling.
  cell_types:
  - preferred_term: pyramidal neuron
    term:
      id: CL:0000598
      label: pyramidal neuron
  - preferred_term: GABAergic interneuron
    term:
      id: CL:0000617
      label: GABAergic neuron
  biological_processes:
  - preferred_term: chemical synaptic transmission
    term:
      id: GO:0007268
      label: chemical synaptic transmission
  locations:
  - preferred_term: temporal lobe
    term:
      id: UBERON:0001871
      label: temporal lobe
  - preferred_term: entorhinal cortex
    term:
      id: UBERON:0002728
      label: entorhinal cortex
  evidence:
  - reference: PMID:39056027
    reference_title: "Excitation/Inhibition balance relates to cognitive function and gene expression in temporal lobe epilepsy: a high density EEG assessment with aperiodic exponent."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Patients with temporal lobe epilepsy showed a significantly larger
      exponent, corresponding to inhibition-directed E/I balance, in bilateral
      frontal and temporal regions.
    explanation: >-
      Directly supports altered excitation/inhibition balance in temporal lobe
      epilepsy at the network level.
  - reference: PMID:39056027
    reference_title: "Excitation/Inhibition balance relates to cognitive function and gene expression in temporal lobe epilepsy: a high density EEG assessment with aperiodic exponent."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Limited to patients with temporal lobe epilepsy, we detected a
      significant correlation between the exponent and the cortical expression
      of GABRA1, GRIN2A, GABRD, GABRG2, KCNA2 and PDYN genes.
    explanation: >-
      Supports molecular correlates of altered excitation/inhibition balance in
      temporal lobe epilepsy.
- name: Thalamocortical Network Dysfunction
  description: >-
    Vulnerable thalamocortical pathways can contribute to cognitive dysfunction
    in temporal lobe epilepsy, indicating that the disorder affects distributed
    neural circuits beyond the temporal focus itself.
  biological_processes:
  - preferred_term: transmission of nerve impulse
    term:
      id: GO:0019226
      label: transmission of nerve impulse
  locations:
  - preferred_term: temporal lobe
    term:
      id: UBERON:0001871
      label: temporal lobe
  - preferred_term: dorsal plus ventral thalamus
    term:
      id: UBERON:0001897
      label: dorsal plus ventral thalamus
  evidence:
  - reference: PMID:29880477
    reference_title: "Thalamocortical Connections and Executive Function in Pediatric Temporal and Frontal Lobe Epilepsy."
    supports: PARTIAL
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Our results give insight into vulnerable neural networks in pediatric
      focal epilepsy and suggest thalamocortical pathway damage as a potential
      mechanism of executive function impairment in temporal lobe epilepsy but
      not frontal lobe epilepsy.
    explanation: >-
      Supports a distributed thalamocortical circuit mechanism for cognitive
      dysfunction in temporal lobe epilepsy, though this evidence is specific
      to a pediatric cohort.
phenotypes:
- name: Seizures
  category: Neurological
  frequency: VERY_FREQUENT
  diagnostic: true
  description: >-
    Recurrent focal seizures originating from temporal lobe networks, often
    with impaired awareness and temporal-lobe semiology.
  phenotype_term:
    preferred_term: Focal-onset seizure
    term:
      id: HP:0007359
      label: Focal-onset seizure
- name: Memory Impairment
  category: Cognitive
  frequency: FREQUENT
  description: >-
    Verbal short-term memory can be impaired and correlates with altered
    excitation/inhibition balance in entorhinal and frontal cortical regions.
  phenotype_term:
    preferred_term: Memory impairment
    term:
      id: HP:0002354
      label: Memory impairment
  evidence:
  - reference: PMID:39056027
    reference_title: "Excitation/Inhibition balance relates to cognitive function and gene expression in temporal lobe epilepsy: a high density EEG assessment with aperiodic exponent."
    supports: PARTIAL
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Lower E/I in the left entorhinal and bilateral dorsolateral prefrontal
      cortices corresponded to a lower performance of short-term verbal memory.
    explanation: >-
      Supports memory impairment in temporal lobe epilepsy, but the cited study
      specifically addresses short-term verbal memory performance.
treatments:
- name: Antiseizure Medication Therapy
  description: >-
    Initial management of temporal lobe epilepsy is pharmacotherapy using
    antiseizure medications used across focal epilepsies, although many
    patients do not achieve durable seizure freedom and later meet criteria for
    drug-resistant disease.
  treatment_term:
    preferred_term: pharmacotherapy
    term:
      id: MAXO:0000058
      label: pharmacotherapy
  evidence:
  - reference: PMID:9046965
    reference_title: "Treatment of temporal lobe epilepsy."
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Initial management of patients with temporal lobe epilepsy is with
      antiepileptic drugs, but these control seizures in only half the
      patients.
    explanation: >-
      Supports antiseizure medication therapy as first-line management in TLE,
      while also showing that medication failure is common.
  - reference: PMID:38888005
    reference_title: "Efficacy and safety of add-on antiseizure medications for focal epilepsy: A network meta-analysis."
    supports: PARTIAL
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      All approved ASMs were effective as add-on treatment for focal epilepsy.
    explanation: >-
      Supports ongoing pharmacotherapy in TLE because TLE is a focal epilepsy
      syndrome, although the evidence is not specific to TLE alone.
- name: Epilepsy Surgery for Drug-Resistant Disease
  description: >-
    In carefully selected patients with drug-resistant temporal lobe epilepsy,
    surgical treatment offers substantially higher rates of seizure freedom
    than continued medical therapy and remains a key escalation path once
    pharmacoresistance is established.
  treatment_term:
    preferred_term: surgical procedure
    term:
      id: MAXO:0000004
      label: surgical procedure
  evidence:
  - reference: PMID:11484687
    reference_title: "A randomized, controlled trial of surgery for temporal-lobe epilepsy."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      At one year, the cumulative proportion of patients who were free of
      seizures impairing awareness was 58 percent in the surgical group and 8
      percent in the medical group (P<0.001).
    explanation: >-
      Supports surgical treatment as an effective option for carefully selected
      patients with drug-resistant temporal lobe epilepsy.
