- reference: DOI:10.1098/rstb.2022.0277
  title: Can mass drug administration of moxidectin accelerate onchocerciasis
    elimination in Africa?
  found_in:
  - Onchocerciasis-deep-research-falcon.md
  findings:
  - statement: Can mass drug administration of moxidectin accelerate
      onchocerciasis elimination in Africa?
    supporting_text: Abstract Epidemiological and modelling studies suggest that
      elimination of Onchocerca volvulus transmission (EoT) throughout Africa
      may not be achievable with annual mass drug administration (MDA) of
      ivermectin alone, particularly in areas of high endemicity and vector
      density.
