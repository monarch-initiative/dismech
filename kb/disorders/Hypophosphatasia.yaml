  - target: Pain
    description: Arthropathy and adult musculoskeletal disease contribute to generalized pain.
    causal_link_type: INDIRECT_KNOWN_INTERMEDIATES
    intermediate_mechanisms:
    - chondrocalcinosis and arthropathy
