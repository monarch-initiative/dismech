name: Campomelic Dysplasia
creation_date: '2026-03-04T07:35:50Z'
updated_date: '2026-03-04T07:35:50Z'
category: Mendelian
description: >
  Campomelic dysplasia is a severe SOX9-related skeletal dysplasia with abnormal
  chondrogenesis, bowed long bones, axial skeletal dysplasia, and frequent
  respiratory compromise in early life.
disease_term:
  preferred_term: campomelic dysplasia
  term:
    id: MONDO:0007251
    label: campomelic dysplasia
parents:
- Skeletal Dysplasia
inheritance:
- name: Autosomal Dominant
  description: >
    Campomelic dysplasia is most often associated with heterozygous pathogenic
    variation in SOX9 and follows an autosomal dominant pattern, frequently de novo.
  evidence:
  - reference: PMID:24800790
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Campomelic dysplasia.
    explanation: >-
      This clinical report characterizes campomelic dysplasia as a hereditary
      congenital osteochondral dysplasia.
pathophysiology:
- name: SOX9-Mediated Chondrogenesis Disruption
  description: >
    Pathogenic SOX9 variation impairs transcriptional programs required for
    cartilage differentiation and skeletal patterning, resulting in dysplastic
    axial and appendicular skeletal development.
  cell_types:
  - preferred_term: Chondrocyte
    term:
      id: CL:0000138
      label: chondrocyte
  biological_processes:
  - preferred_term: Cartilage Development
    term:
      id: GO:0051216
      label: cartilage development
  - preferred_term: Endochondral Ossification
    term:
      id: GO:0001958
      label: endochondral ossification
  evidence:
  - reference: PMID:39854231
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Variants in the SOX9 transactivation middle domain induce axial skeleton dysplasia and scoliosis.
    explanation: >-
      This study links SOX9 variants with axial skeletal dysplasia and scoliosis,
      supporting SOX9-centered skeletal developmental mechanisms.
- name: Extracellular Matrix and Skeletal Architecture Abnormality
  description: >
    Defective growth-plate and cartilage biology drives long-bone bowing and
    generalized skeletal malformation.
  biological_processes:
  - preferred_term: Extracellular Matrix Organization
    term:
      id: GO:0030198
      label: extracellular matrix organization
  evidence:
  - reference: PMID:24800790
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Campomelic dysplasia.
    explanation: >-
      The clinical description documents bowed lower limbs and multisystem
      skeletal abnormalities consistent with matrix and growth-plate dysfunction.
genetic:
- name: SOX9 Pathogenic Variants
  association: Causative
  notes: >
    Pathogenic variants in SOX9 are causative for campomelic dysplasia.
  evidence:
  - reference: PMID:39854231
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Variants in the SOX9 transactivation middle domain induce axial skeleton dysplasia and scoliosis.
    explanation: >-
      This publication directly associates SOX9 variants with axial skeletal
      dysplasia phenotypes.
phenotypes:
- name: Short Stature
  description: >
    Severe skeletal dysplasia typically causes disproportionate short stature.
  phenotype_term:
    preferred_term: Short stature
    term:
      id: HP:0004322
      label: Short stature
  evidence:
  - reference: PMID:24800790
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Campomelic dysplasia.
    explanation: >-
      This report describes severe osteochondral dysplasia with major growth
      disturbance compatible with short stature.
- name: Platyspondyly
  description: >
    Axial skeletal involvement can include vertebral dysplasia and vertebral
    body flattening.
  phenotype_term:
    preferred_term: Platyspondyly
    term:
      id: HP:0000926
      label: Platyspondyly
  evidence:
  - reference: PMID:39854231
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Variants in the SOX9 transactivation middle domain induce axial skeleton dysplasia and scoliosis.
    explanation: >-
      This study supports axial vertebral involvement in SOX9-related campomelic
      dysplasia biology.
