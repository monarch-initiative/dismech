name: Squamous Cell Carcinoma of Penis
creation_date: "2026-05-10T18:39:20Z"
updated_date: "2026-05-10T18:39:20Z"
synonyms:
- Penile squamous cell carcinoma
- Squamous cell carcinoma of the penis
- Penile squamous cell cancer
- PSCC
description: >-
  Squamous cell carcinoma of penis is a penile epithelial malignancy arising
  chiefly from squamous epithelium of the glans, coronal sulcus, or foreskin.
  It is the dominant histologic form of penile cancer and has HPV-associated
  and HPV-independent etiologic pathways. Chronic genital inflammation,
  phimosis-related hygiene barriers, tobacco exposure, HPV infection, and
  somatic alterations affecting TP53, CDKN2A, PIK3CA, and immune-checkpoint
  biomarkers contribute to malignant transformation, local invasion, and
  inguinal nodal spread.
categories:
- Urogenital Cancer
- Solid Tumor
- Squamous Cell Carcinoma
- HPV-Related Cancer
