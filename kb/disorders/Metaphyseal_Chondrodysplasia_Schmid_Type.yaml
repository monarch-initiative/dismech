name: Metaphyseal Chondrodysplasia, Schmid Type
creation_date: '2026-03-04T18:10:30Z'
updated_date: '2026-03-04T18:15:09Z'
category: Mendelian
description: >
  Metaphyseal Chondrodysplasia, Schmid Type (MCDS) is an autosomal dominant skeletal
  dysplasia caused by COL10A1 variants, with growth plate dysfunction leading to
  metaphyseal abnormalities, bowing of long bones, and short stature.
disease_term:
  preferred_term: metaphyseal chondrodysplasia, Schmid type
  term:
    id: MONDO:0007983
    label: Schmid metaphyseal chondrodysplasia
parents:
- Skeletal Dysplasia
inheritance:
- name: Autosomal Dominant
  inheritance_term:
    preferred_term: Autosomal dominant inheritance
    term:
      id: HP:0000006
      label: Autosomal dominant inheritance
  description: >
    MCDS is inherited in an autosomal dominant pattern and segregates with
    heterozygous pathogenic variation in COL10A1.
  evidence:
  - reference: PMID:8220429
    reference_title: "A type X collagen mutation causes Schmid metaphyseal chondrodysplasia."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      We have identified a 13 base pair deletion in one type X collagen allele segregating with autosomal dominant Schmid metaphyseal chondrodysplasia in a large Mormon kindred (lod score = 18.2 at theta = 0).
    explanation: >-
      This directly supports autosomal dominant segregation in affected families.
  - reference: PMID:16088909
    reference_title: "Schmid type of metaphyseal chondrodysplasia and COL10A1 mutations--findings in 10 patients."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      It results from autosomal dominant mutations of COL10A1, the gene which encodes alpha1(X) chains of type X collagen.
    explanation: >-
      This confirms autosomal dominant inheritance in the modern clinical cohort.
pathophysiology:
- name: COL10A1-Associated Growth Plate Matrix Dysfunction
  description: >
    COL10A1 dysfunction in hypertrophic chondrocytes perturbs growth plate matrix
    biology and endochondral ossification, causing the core metaphyseal skeletal
    phenotype.
  cell_types:
  - preferred_term: Chondrocyte
    term:
      id: CL:0000138
      label: chondrocyte
  biological_processes:
  - preferred_term: Cartilage Development
    term:
      id: GO:0051216
      label: cartilage development
  - preferred_term: Endochondral Ossification
    term:
      id: GO:0001958
      label: endochondral ossification
  - preferred_term: Extracellular Matrix Organization
    term:
      id: GO:0030198
      label: extracellular matrix organization
  evidence:
  - reference: PMID:8220429
    reference_title: "A type X collagen mutation causes Schmid metaphyseal chondrodysplasia."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      The expression of type X collagen is restricted to hypertrophic chondrocytes in regions undergoing endochondral ossification, such as growth plates.
    explanation: >-
      This ties COL10A1 biology to hypertrophic chondrocytes and growth plate ossification.
  - reference: PMID:16088909
    reference_title: "Schmid type of metaphyseal chondrodysplasia and COL10A1 mutations--findings in 10 patients."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Our findings suggest that COL10A1 mutations result in a uniform pattern of growth plate abnormalities.
    explanation: >-
      This supports growth plate dysfunction as a central pathogenic event in MCDS.
- name: Collagen X Misfolding and Unfolded Protein Response
  description: >
    A subset of COL10A1 mutations drive collagen X misfolding, intracellular
    retention, and unfolded protein response activation in cell models.
  cell_types:
  - preferred_term: Chondrocyte
    term:
      id: CL:0000138
      label: chondrocyte
  biological_processes:
  - preferred_term: protein folding
    term:
      id: GO:0006457
      label: protein folding
  - preferred_term: response to unfolded protein
    term:
      id: GO:0006986
      label: response to unfolded protein
  evidence:
  - reference: PMID:15695517
    reference_title: "Misfolding of collagen X chains harboring Schmid metaphyseal chondrodysplasia mutations results in aberrant disulfide bond formation, intracellular retention, and activation of the unfolded protein response."
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: >-
      Our data provide the first clear evidence for misfolding of SMCD collagen X mutants, and we propose that solvent exposure of the NC1 thiol may trigger the recognition and degradation of mutant collagen X chains.
    explanation: >-
      This provides direct mechanistic evidence for mutant collagen X misfolding in SMCD.
  - reference: PMID:15695517
    reference_title: "Misfolding of collagen X chains harboring Schmid metaphyseal chondrodysplasia mutations results in aberrant disulfide bond formation, intracellular retention, and activation of the unfolded protein response."
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: >-
      In cells expressing mutant collagen X, we detected significantly increased amounts of the spliced form of X-box DNA-binding protein mRNA and up-regulation of BiP, two key markers for the unfolded protein response.
    explanation: >-
      This supports unfolded protein response activation downstream of mutant collagen X expression.
genetic:
- name: COL10A1 Pathogenic Variants
  association: Causative
  gene_term:
    preferred_term: COL10A1
    term:
      id: hgnc:2185
      label: COL10A1
  notes: >
    Pathogenic heterozygous COL10A1 variants, frequently affecting the NC1 domain,
    are causative for MCDS.
  evidence:
  - reference: PMID:8220429
    reference_title: "A type X collagen mutation causes Schmid metaphyseal chondrodysplasia."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      We have identified a 13 base pair deletion in one type X collagen allele segregating with autosomal dominant Schmid metaphyseal chondrodysplasia in a large Mormon kindred (lod score = 18.2 at theta = 0).
    explanation: >-
      This establishes COL10A1 mutation segregation with disease.
  - reference: PMID:15880705
    reference_title: "Mutations of COL10A1 in Schmid metaphyseal chondrodysplasia."
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Schmid metaphyseal chondrodysplasia (SMCD) is a dominantly inherited cartilage disorder caused by mutations in the gene for the hypertrophic cartilage extracellular matrix structural protein, collagen X (COL10A1).
    explanation: >-
      This consolidates the causal gene-disease relationship.
  - reference: PMID:15880705
    reference_title: "Mutations of COL10A1 in Schmid metaphyseal chondrodysplasia."
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: >-
      Thus for both classes of mutations, functional haploinsufficiency is the most probable cause of the clinical phenotype in SMCD.
    explanation: >-
      This supports haploinsufficiency as a core proximate genetic mechanism.
phenotypes:
- name: Short Stature
  description: >
    Short stature is a common and often severe growth phenotype in MCDS.
  phenotype_term:
    preferred_term: Short stature
    term:
