biochemical: []
genetic:
- name: Maternal 15q11-q13 duplication
  association: Causal chromosomal duplication
  notes: >-
    Dup15q syndrome is typically caused by a maternally derived duplication or
    idic(15) involving 15q11-q13. Recurrent breakpoints in the low-copy-repeat
    rich 15q11.2-q13 region generate variable duplication sizes, and parental
    origin influences penetrance and severity.
  evidence:
  - reference: PMID:41751547
    reference_title: >-
      Genomics of Complex Neurodevelopmental Disorders with Variable Epilepsy
      Phenotypes: A Clinical Review of Dup15q Syndrome.
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      We synthesized current literature on genomic mechanisms underlying
      complex neurodevelopmental disorders focusing on Dup15q syndrome and its
      subtypes-int15, idic15, and mosaic idic15.
    explanation: >-
      This directly supports the chromosomal duplication basis of the disorder.
  - reference: PMID:39457428
    reference_title: >-
      Chromosome 15q11-q13 Duplication Syndrome: A Review of the Literature and
      14 New Cases.
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "The 15q11.2q13 chromosomal region is particularly susceptible to chromosomal rearrangements due to low-copy repeats (LCRs) located inside this area."
    explanation: >-
      This supports a recurrent genomic rearrangement mechanism in the
      15q11.2-q13 region.
  - reference: PMID:39457428
    reference_title: >-
      Chromosome 15q11-q13 Duplication Syndrome: A Review of the Literature and
      14 New Cases.
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Specific breakpoints (BP1-BP5) that lead to deletions and duplications of variable size have been identified."
    explanation: >-
      This supports breakpoint-mediated variability in 15q11-q13 duplication
      size and subtype.
