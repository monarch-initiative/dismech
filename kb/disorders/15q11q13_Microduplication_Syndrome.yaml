- name: Sleep disturbance
  description: >-
    Sleep disruption is a recognized comorbidity in Dup15q syndrome, with
    clinical EEG studies showing elevated beta power, reduced spindle density,
    and reduced or absent slow-wave sleep.
  phenotype_term:
