  evidence:
  - reference: PMID:36898382
    reference_title: >-
      The role of UBE3A in the autism and epilepsy-related Dup15q syndrome using
      patient-derived, CRISPR-corrected neurons.
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: "Dup15q neurons exhibited hyperexcitability compared with control neurons, and this phenotype was generally prevented by normalizing UBE3A levels using antisense oligonucleotides."
    explanation: >-
      This directly supports UBE3A dosage-dependent neuronal hyperexcitability
      in patient-derived Dup15q neurons.
  downstream:
  - target: Epileptogenic network dysfunction
    description: >-
      Neuronal hyperexcitability is a cellular substrate for network-level
      seizure susceptibility.
  - target: Autistic behavior
    description: >-
      UBE3A dosage-dependent neuronal dysfunction contributes to autism-related
      neurodevelopmental phenotypes.
- name: GABAergic signaling disruption
  description: >-
    Dup15q disrupts GABAergic signaling in cortical networks, with the duplicated
    15q11.2-q13.1 interval including a GABAA receptor gene cluster that may
    contribute to beta-band EEG abnormalities and refractory epilepsy.
