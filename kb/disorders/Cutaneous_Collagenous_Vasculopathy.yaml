  diagnostic: true
  description: >-
    Superficial dermal capillaries have walls thickened by hyaline material that
    contains collagen IV on immunohistochemistry.
  finding_term:
    preferred_term: Type IV collagen-positive hyaline vessel-wall thickening
  evidence:
