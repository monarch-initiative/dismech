- name: Pulmonary Metastasis
  description: >-
    The lungs are the most common site of metastatic GTN, particularly in
    choriocarcinoma and metastatic invasive mole; pulmonary involvement
    contributes to FIGO/WHO risk staging.
  phenotype_term:
