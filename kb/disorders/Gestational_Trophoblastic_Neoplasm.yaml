- name: Elevated hCG
  description: >-
    Markedly elevated serum beta-human chorionic gonadotropin, often
    plateauing or rising after molar evacuation, is the biochemical
    hallmark of GTN and the basis of its diagnosis and monitoring.
  phenotype_term:
