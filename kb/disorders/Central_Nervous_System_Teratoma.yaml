    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      All patients underwent surgical resection, leading to gross total resection
      in 79%.
    explanation: >-
      This supports resection as the central management approach for iGTS.
  - reference: PMID:32297094
