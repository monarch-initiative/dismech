    modifier: INCREASED
  - preferred_term: cytokine production
    term:
      id: GO:0001816
      label: cytokine production
    modifier: INCREASED
  evidence:
  - reference: PMID:17577053
    supports: SUPPORT
    evidence_source: IN_VITRO
