pathophysiology:
- name: Loss of SHIP2 phosphoinositide phosphatase activity
  description: >
    INPPL1 encodes SHIP2, a phosphoinositide 5-phosphatase that dephosphorylates
    PI(3,4,5)P3 to generate PI(3,4)P2. Loss-of-function mutations in INPPL1
    abolish this catalytic activity, disrupting phosphoinositide-mediated signaling
    in chondrocytes. Most pathogenic variants are premature stop codons or missense
    mutations affecting the catalytic domain, while some destabilize the protein
    through structural disruption of the SH2 domain.
  gene:
    preferred_term: INPPL1
    description: >
      Inositol polyphosphate phosphatase-like 1, encoding the lipid phosphatase
      SHIP2 that regulates phosphoinositide signaling by dephosphorylating
      PI(3,4,5)P3.
    modifier: DECREASED
    term:
      id: hgnc:6080
      label: INPPL1
  cell_types:
