    explanation: First report of bisphosphonate use in opsismodysplasia.
  - reference: PMID:26157786
    reference_title: "Opsismodysplasia: Phosphate Wasting Osteodystrophy Responds to Bisphosphonate Therapy."
    supports: SUPPORT
