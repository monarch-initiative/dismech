name: Opsismodysplasia
creation_date: "2026-04-02T00:00:00Z"
category: Mendelian
description: >
  Opsismodysplasia is a rare autosomal recessive skeletal chondrodysplasia caused by
  biallelic loss-of-function mutations in INPPL1, which encodes the phosphoinositide
  5-phosphatase SHIP2. The disease is characterized by prenatal-onset short stature,
  micromelia with extremely short hands and feet, platyspondyly, delayed skeletal
  maturation, and distinctive craniofacial features including relative macrocephaly,
  frontal bossing, midface retrusion, and anteverted nares. Growth plate histology
  shows a widened hypertrophic zone with irregular provisional calcification. Loss of
  SHIP2 catalytic activity disrupts phosphoinositide signaling, leading to elevated
  MEK-Erk1/2 activity in chondrocytes, impaired chondrocyte differentiation, and
  defective endochondral ossification. Some patients develop renal phosphate wasting
  with hypophosphatemic rickets, which is associated with a more severe phenotype.
  Prognosis is variable, with perinatal demise in some infants and survival into
  childhood and beyond in others. Bisphosphonate therapy has shown benefit for bone
  mineral density and motor function.
