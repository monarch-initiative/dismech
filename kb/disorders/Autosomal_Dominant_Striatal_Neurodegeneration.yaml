name: Autosomal dominant striatal neurodegeneration
creation_date: "2026-05-11T21:02:17Z"
updated_date: "2026-05-11T21:44:11Z"
description: >-
  Autosomal dominant striatal neurodegeneration is an ultra-rare adult-onset
  movement disorder caused by heterozygous PDE8B pathogenic variants. Reported
  families show slowly progressive parkinsonism with bradykinesia, rigidity,
  dysarthria, gait disturbance, dysphagia, dysdiadochokinesis, and characteristic
  striatal MRI abnormalities involving the putamen, caudate nucleus, or striatum.
category: Mendelian
disease_term:
  preferred_term: striatal degeneration, autosomal dominant
  term:
    id: MONDO:0000211
    label: striatal degeneration, autosomal dominant
parents:
- Neurodegenerative Disease
- Movement Disorder
synonyms:
- ADSD
references:
- reference: ORPHA:228169
  title: Autosomal dominant striatal neurodegeneration
  findings:
  - statement: >-
      Orphanet defines autosomal dominant striatal neurodegeneration as an
      adult-onset movement disorder with bradykinesia, dysarthria, and rigidity.
    supporting_text: >-
      An adult-onset movement disorder characterized by bradykinesia, dysarthria
      and muscle rigidity.
- reference: PMID:15210883
  title: "Autosomal dominant striatal degeneration (ADSD): clinical description and mapping to 5q13-5q14."
  findings:
  - statement: >-
      The original ADSD family had dysarthria and gait disturbance with MRI
      lesions mainly in putamen and caudate nucleus.
    supporting_text: >-
      RESULTS: The main clinical features of the disease are dysarthria and
      gait disturbance without any apparent reduction in life expectancy. MRI
      demonstrated a distinctive lesion pattern restricted mainly to the putamen
      and caudate nucleus.
- reference: PMID:20085714
  title: Autosomal-dominant striatal degeneration is caused by a mutation in the phosphodiesterase 8B gene.
  findings:
  - statement: >-
      The original mapped ADSD kindred carried a PDE8B frameshift mutation that
      caused loss of enzymatic phosphodiesterase activity.
    supporting_text: >-
      Here we show that ADSD is caused by a complex frameshift mutation
      (c.94G>C+c.95delT) in the phosphodiesterase 8B (PDE8B) gene, which
      results in a loss of enzymatic phosphodiesterase activity.
- reference: PMID:26769607
  title: A novel mutation of PDE8B Gene in a Japanese family with autosomal-dominant striatal degeneration.
  findings:
  - statement: >-
      A second ADSN family carried a heterozygous PDE8B nonsense variant and
      showed slowly progressive parkinsonism with striatal T2 MRI signal.
    supporting_text: >-
      RESULTS: Clinical features of the patients are slowly progressive
      parkinsonism and brain MRI showing high signal intensity in T2-weighted
      images in the striatum.
- reference: PMID:31726290
  title: Clinical findings of autosomal-dominant striatal degeneration and PDE8B mutation screening in parkinsonism and related disorders.
  findings:
  - statement: >-
      A Chinese ADSD family had a PDE8B nonsense mutation with progressive
      parkinsonism, ataxia, and striatal neuroimaging abnormalities.
    supporting_text: >-
      An ADSD diagnosis was confirmed by a nonsense mutation in PDE8B (p.E102X)
      in a patient and a presymptomatic carrier. Clinically, the patient
      exhibited progressive parkinsonism without tremor and ataxia phenotype.
