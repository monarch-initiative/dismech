pathophysiology:
- name: PDE8B Cyclic Nucleotide Phosphodiesterase Loss
  description: >-
    ADSN-associated heterozygous PDE8B frameshift or nonsense variants disrupt
    cyclic nucleotide phosphodiesterase function. PDE8B normally degrades cyclic
    AMP, a second messenger involved in dopamine signaling and movement control.
  genes:
  - preferred_term: PDE8B
    term:
      id: hgnc:8794
      label: PDE8B
  molecular_functions:
  - preferred_term: 3',5'-cyclic-nucleotide phosphodiesterase activity
    term:
      id: GO:0004114
      label: 3',5'-cyclic-nucleotide phosphodiesterase activity
    modifier: DECREASED
  biological_processes:
  - preferred_term: cAMP catabolic process
    term:
      id: GO:0006198
      label: cAMP catabolic process
    modifier: DECREASED
  evidence:
  - reference: PMID:20085714
    reference_title: "Autosomal-dominant striatal degeneration is caused by a mutation in the phosphodiesterase 8B gene."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Here we show that ADSD is caused by a complex frameshift mutation (c.94G>C+c.95delT) in the phosphodiesterase 8B (PDE8B) gene, which results in a loss of enzymatic phosphodiesterase activity."
    explanation: The molecular study provides direct human genetic and functional support for loss of PDE8B phosphodiesterase activity.
  - reference: PMID:20085714
    reference_title: "Autosomal-dominant striatal degeneration is caused by a mutation in the phosphodiesterase 8B gene."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "PDE8B degrades cyclic AMP, a second messenger implied in dopamine signaling."
    explanation: This supports cAMP degradation as the relevant PDE8B-linked signaling process.
  - reference: PMID:26769607
    reference_title: "A novel mutation of PDE8B Gene in a Japanese family with autosomal-dominant striatal degeneration."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "We found a heterozygous nonsense mutation in the first exon of cyclic nucleotide phosphodiesterase 8B gene, which is predicted to disrupt all important functional domains of the cyclic nucleotide phosphodiesterase 8B protein."
    explanation: The reported nonsense variant is predicted to disrupt PDE8B functional domains, supporting reduced phosphodiesterase function.
