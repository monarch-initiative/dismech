treatments:
- name: Mass drug administration with albendazole plus ivermectin or DEC
  description: WHO-recommended antifilarial drug combinations used to interrupt
    transmission.
  treatment_term:
    preferred_term: pharmacotherapy
    term:
      id: MAXO:0000058
      label: pharmacotherapy
    therapeutic_agent:
    - preferred_term: albendazole
      term:
        id: CHEBI:16664
        label: albendazole
    - preferred_term: ivermectin
      term:
        id: CHEBI:6078
        label: ivermectin
  evidence:
  - reference: PMID:38933431
    reference_title: "A review of epidemiology of lymphatic filariasis in Nigeria."
    supports: SUPPORT
    snippet: the World Health Organization recommended treatments for lymphatic
      filariasis include the use of Albendazole (400mg) twice per year in
      co-endemic areas with loa loa, Ivermectin (200mcg/kg) in combination with
      Albendazole (400mg) in areas that are co-endemic with onchocerciasis,
      ivermectin (200mcg/kg) with diethylcarbamazine citrate (DEC) (6mg/kg) and
      albendazole (400mg) in areas without onchocerciasis.
    explanation: The abstract summarizes WHO-recommended antifilarial
      combinations for MDA.
