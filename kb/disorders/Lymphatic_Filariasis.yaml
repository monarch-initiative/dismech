      label: Homo sapiens
    role: definitive host
  - preferred_term: mosquito
    term:
      id: NCBITaxon:7157
      label: Culicidae
    role: intermediate host
  vectors:
  - mosquitoes (Culicidae)
  life_cycle_stages:
  - name: Adult worms in human tissues produce microfilariae
    life_cycle_stage_term:
      preferred_term: adult parasitic worm stage
      term:
        id: OPL:0000237
        label: adult parasitic worm stage
    description: Adult worms mate in human tissues and release microfilariae
      into the bloodstream.
    evidence:
    - reference: PMID:21413271
      reference_title: "Filarial Nematodes."
      supports: SUPPORT
      snippet: The adult worms inhabit specific tissues where they mate and
        produce microfilariae, the characteristic tiny, thread-like larvae.
      explanation: Adult filariae produce microfilariae in the human host.
  - name: Microfilariae infect mosquito vectors and mature to infective larvae
    description: Microfilariae are taken up by arthropod vectors and develop
      into infective larvae.
    evidence:
    - reference: PMID:21413271
      reference_title: "Filarial Nematodes."
      supports: SUPPORT
      snippet: The microfilariae infect vector arthropods, in which they mature
        to infective larvae.
      explanation: The abstract describes microfilariae maturing in vectors to
        infective larvae.
transmission:
- name: Mosquito-borne transmission
  description: Mosquito vectors transmit infective larvae to human definitive
    hosts.
  evidence:
  - reference: PMID:38933431
    reference_title: "A review of epidemiology of lymphatic filariasis in Nigeria."
    supports: SUPPORT
    snippet: Mosquitoes are the vectors while humans the definitive hosts
      respectively.
    explanation: The review identifies mosquito vectors and human definitive
      hosts.
pathophysiology:
- name: Lymphatic vessel blockage and dysfunction
  description: Adult lymphatic filariae in lymph vessels provoke blockage and
    host responses that impair lymphatic function and drive fibrosis.
  locations:
  - preferred_term: lymphatic vessel
    term:
      id: UBERON:0001473
      label: lymphatic vessel
  evidence:
  - reference: PMID:21413271
    reference_title: "Filarial Nematodes."
    supports: SUPPORT
    snippet: The adults of the lymphatic filariae inhabit lymph vessels, where
      blockage and host reaction can result in lymphatic inflammation and
      dysfunction, and eventually in lymphedema and fibrosis.
    explanation: Adult worms in lymphatic vessels cause blockage, inflammation,
      dysfunction, and fibrosis.
- name: Lymphatic vessel remodeling and dilation
  description: Adult parasites damage lymphatic valves and remodel lymphatic
    vessels, causing lymphatic dilation.
  locations:
  - preferred_term: lymphatic vessel
    term:
      id: UBERON:0001473
      label: lymphatic vessel
  evidence:
  - reference: PMID:39739969
    reference_title: "MicroRNAs secreted by the parasitic nematode Brugia malayi disrupt
      lymphatic endothelial cell integrity."
    supports: SUPPORT
    snippet: The adult parasites impact the integrity of lymphatic vessels and
      damage valves, leading to a remodeling of the lymphatic system and
      lymphatic dilation.
    explanation: The abstract describes parasite-driven valve damage and
      lymphatic remodeling.
