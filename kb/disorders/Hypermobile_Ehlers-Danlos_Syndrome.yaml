name: Hypermobile Ehlers-Danlos Syndrome
category: Genetic
creation_date: "2026-06-13T00:00:00Z"
description: >
  Hypermobile Ehlers-Danlos syndrome is a clinically defined Ehlers-Danlos
  subtype characterized by generalized joint hypermobility, joint instability,
  recurrent subluxations or dislocations, chronic pain, soft or
  hyperextensible skin, easy bruising, fatigue, autonomic and gastrointestinal
  symptoms, and other multisystem features. Unlike the monogenic EDS subtypes,
  no validated causal gene or biomarker has been identified, so diagnosis is
  made clinically using the 2017 international criteria.
disease_term:
  preferred_term: Ehlers-Danlos syndrome, hypermobility type
  term:
    id: MONDO:0007523
    label: Ehlers-Danlos syndrome, hypermobility type
synonyms:
- hEDS
- hypermobile EDS
- Ehlers-Danlos syndrome hypermobility type
- Ehlers-Danlos syndrome type III
- EDS type III
parents:
- Ehlers-Danlos Syndrome
- Connective Tissue Disorder
references:
- reference: PMID:20301456
  title: "Hypermobile Ehlers-Danlos Syndrome."
  tags:
  - GeneReviews
  findings:
  - statement: hEDS is diagnosed clinically because no causal etiology has been identified.
  - statement: hEDS management includes exercise, physical therapy, bracing, and symptom-directed care.
- reference: PMID:31409039
  title: "Cellular and Molecular Mechanisms in the Pathogenesis of Classical, Vascular, and Hypermobile Ehlers-Danlos Syndromes."
  findings:
  - statement: hEDS/HSD fibroblasts show ECM disorganization and pro-inflammatory myofibroblast-like changes in model studies.
- reference: PMID:29587413
  title: "Multifaced Roles of the αvβ3 Integrin in Ehlers-Danlos and Arterial Tortuosity Syndromes' Dermal Fibroblasts."
  findings:
  - statement: hEDS is characterized by generalized joint hypermobility, joint instability complications, minor skin changes, and an unknown molecular basis.
inheritance:
- name: Autosomal dominant inheritance pattern
  description: >
    Familial hEDS often appears autosomal dominant, but no validated causal gene
    or variant class is available for diagnostic testing.
  inheritance_term:
    preferred_term: Autosomal dominant inheritance
    term:
      id: HP:0000006
      label: Autosomal dominant inheritance
  evidence:
  - reference: PMID:20301456
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Hypermobile EDS is inherited in an autosomal dominant manner with variable expression of signs and variable severity of symptoms among affected family members."
    explanation: GeneReviews describes the observed familial inheritance pattern while separately noting that no causal etiology is known.
progression:
- phase: Lifelong variable multisystem disorder
  age_range: Childhood through adulthood
  notes: >
    hEDS is not modeled as a single fatal degenerative sequence; instead,
    affected individuals have variable lifelong joint instability, pain,
    fatigue, soft-tissue injury, and multisystem manifestations.
  evidence:
  - reference: PMID:20301456
    reference_title: "Hypermobile Ehlers-Danlos Syndrome."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "variable expression of signs and variable severity of symptoms among affected family members."
    explanation: >
      GeneReviews supports variable expression and severity rather than a
      fixed monogenic progression sequence.
- phase: Recurrent instability and chronic symptom burden
  age_range: Any age after onset
  notes: >
    Recurrent subluxations or dislocations and soft-tissue injuries can lead to
    chronic pain, fatigue, functional impairment, and repeated supportive care
    needs.
  evidence:
  - reference: PMID:20301456
    reference_title: "Hypermobile Ehlers-Danlos Syndrome."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Subluxations, dislocations, and soft tissue injury are common; they may occur spontaneously or with minimal trauma and can be acutely painful."
    explanation: >
      This supports recurrent injury/instability as a recurring clinical course
      feature in hEDS.
pathophysiology:
- name: Unresolved ECM remodeling and joint-stability failure
  description: >
    hEDS lacks a validated monogenic cause. Current model evidence points to
    abnormal collagen/fibronectin extracellular-matrix organization,
    excessive matrix remodeling, and pro-inflammatory myofibroblast-like
    fibroblast changes as candidate mechanisms that may contribute to joint
    instability, chronic pain, fatigue, and multisystem symptoms.
  cell_types:
  - preferred_term: fibroblast
    term:
      id: CL:0000057
      label: fibroblast
  biological_processes:
  - preferred_term: extracellular matrix organization
    modifier: ABNORMAL
    term:
      id: GO:0030198
      label: extracellular matrix organization
  evidence:
  - reference: PMID:20301456
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Currently, no underlying genetic, epigenetic, or metabolomic etiology has been identified for hEDS."
    explanation: GeneReviews supports keeping the primary etiology unresolved.
  - reference: PMID:31409039
    supports: PARTIAL
    evidence_source: OTHER
    snippet: "skin fibroblasts show a disorganization of the ECM like that observed in cells derived from the other EDS types."
    explanation: This model-based review supports ECM disorganization as a candidate mechanism while not establishing a causal gene.
  downstream:
  - target: Joint instability and chronic pain
    description: >
      Weak or dysregulated connective-tissue support permits recurrent
      subluxations, dislocations, soft-tissue injury, and chronic pain.
    causal_link_type: INDIRECT_UNKNOWN_INTERMEDIATES
    evidence:
    - reference: PMID:20301456
      supports: SUPPORT
      evidence_source: HUMAN_CLINICAL
      snippet: "Subluxations, dislocations, and soft tissue injury are common; they may occur spontaneously or with minimal trauma and can be acutely painful."
      explanation: GeneReviews describes the downstream joint-instability phenotype.
  - target: Myofibroblast-like fibroblast transition
    description: >
      In vitro hEDS/HSD fibroblasts show a candidate pro-inflammatory
      myofibroblast-like phenotype mediated through alpha-v-beta-3
      integrin/ILK/Snail1 signaling.
    causal_link_type: INDIRECT_UNKNOWN_INTERMEDIATES
    evidence:
    - reference: PMID:29587413
      supports: SUPPORT
      evidence_source: IN_VITRO
      snippet: "In hEDS and HSD cells, the αvβ3 integrin was shown to be involved in the fibroblast-to-myofibroblast transition by a transduction pathway involving ILK that signals to the transcription factor Snail1"
      explanation: >
        Patient-cell data support a distinct candidate fibroblast signaling
        branch while hEDS etiology remains unresolved.
- name: Joint instability and chronic pain
  description: >
    Dysregulated connective-tissue support and recurrent soft-tissue injury
    manifest clinically as subluxations, dislocations, acute injury pain, and
    chronic pain.
  cell_types:
  - preferred_term: fibroblast
    term:
      id: CL:0000057
      label: fibroblast
  biological_processes:
  - preferred_term: extracellular matrix organization
    modifier: ABNORMAL
    term:
      id: GO:0030198
      label: extracellular matrix organization
  evidence:
  - reference: PMID:20301456
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Subluxations, dislocations, and soft tissue injury are common; they may occur spontaneously or with minimal trauma and can be acutely painful."
    explanation: >
      GeneReviews supports recurrent instability and soft-tissue injury as the
      clinical downstream consequence.
  - reference: PMID:20301456
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Chronic pain, distinct from that associated with acute injury, is common and often neuropathic in nature."
    explanation: >
      GeneReviews supports chronic pain as part of this downstream clinical
      branch.
- name: Myofibroblast-like fibroblast transition
  description: >
    hEDS/HSD patient fibroblasts can acquire a migrating myofibroblast-like
    phenotype with alpha-smooth muscle actin stress fibers, cadherin-11, MMP9,
    and inflammatory mediator changes through alpha-v-beta-3
    integrin/ILK/Snail1 signaling. This remains model evidence rather than a
    validated diagnostic biomarker.
  cell_types:
  - preferred_term: fibroblast
    term:
      id: CL:0000057
      label: fibroblast
  biological_processes:
  - preferred_term: extracellular matrix organization
    modifier: ABNORMAL
    term:
      id: GO:0030198
      label: extracellular matrix organization
  evidence:
  - reference: PMID:31409039
    supports: SUPPORT
    evidence_source: OTHER
    snippet: "Our in vitro studies confirmed the phenotypic conversion of hEDS/HSD fibroblasts into migrating myofibroblast-like cells"
    explanation: >
      This review summarizes patient-cell evidence for a candidate
      myofibroblast-like transition in hEDS/HSD.
  - reference: PMID:29587413
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: "In hEDS and HSD cells, the αvβ3 integrin was shown to be involved in the fibroblast-to-myofibroblast transition by a transduction pathway involving ILK that signals to the transcription factor Snail1"
    explanation: >
      The primary cell-model paper supports the integrin/ILK/Snail1 branch.
