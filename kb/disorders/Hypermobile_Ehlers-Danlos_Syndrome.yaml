treatments:
- name: Exercise-based physical therapy and joint stabilization
  description: >
    hEDS care is symptom-directed and includes progressive strengthening,
    proprioceptive exercise, braces or splints, assistive devices, and avoidance
    of activities that provoke subluxation or pain.
  treatment_term:
    preferred_term: physical therapy
    term:
      id: MAXO:0000011
      label: physical therapy
  evidence:
  - reference: PMID:20301456
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Tailored treatment with exercise to increase core and extremity muscle strength and tone, proprioception, and joint stability"
    explanation: GeneReviews supports exercise-based treatment aimed at strength, proprioception, and stability.
- name: Multisystem symptom management
  description: >
    Pain, autonomic, gastrointestinal, oral, neurologic, sleep, psychiatric, and
    urogynecologic manifestations are managed with individualized supportive
    care and surveillance.
  treatment_term:
    preferred_term: supportive care
    term:
      id: MAXO:0000950
      label: supportive care
  evidence:
  - reference: PMID:20301456
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Surveillance: Assess for joint manifestations, pain, disability, bleeding issues, functional bowel disorders, autonomic dysfunction"
    explanation: GeneReviews supports periodic multisystem assessment and symptom-directed care.
