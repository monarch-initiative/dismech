name: Primary Triglyceride Deposit Cardiomyovasculopathy
creation_date: "2026-06-13T00:00:00Z"
description: >-
  Primary triglyceride deposit cardiomyovasculopathy (P-TGCV) is a neutral lipid storage
  disorder caused by biallelic PNPLA2 variants encoding adipose triglyceride lipase (ATGL).
  ATGL performs the rate-limiting intracellular hydrolysis of triglyceride to release long-chain
  fatty acids for energy; its deficiency causes triglyceride accumulation in cardiomyocytes and
  coronary vascular cells, producing severe heart failure and coronary artery disease, often
  requiring cardiac transplantation. Idiopathic TGCV (without PNPLA2 mutations) is a distinct
  entity with the same phenotype.
synonyms:
- P-TGCV
- PNPLA2-related triglyceride deposit cardiomyovasculopathy
- neutral lipid storage disease with cardiomyopathy
category: Mendelian
