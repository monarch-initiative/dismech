- name: Progressive neurodegeneration
  description: >-
    Sanfilippo syndrome type A causes early and progressive central nervous
    system decline with worsening cognition, language, adaptive behavior, and
    later motor skills.
  cell_types:
  - preferred_term: neuron
    term:
      id: CL:0000540
      label: neuron
  locations:
  - preferred_term: brain
    term:
      id: UBERON:0000955
      label: brain
  evidence:
  - reference: PMID:34991944
    reference_title: >-
      An observational, prospective, multicenter, natural history study of
      patients with mucopolysaccharidosis type IIIA.
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Mucopolysaccharidosis type IIIA (MPS IIIA, also known as Sanfilippo
      syndrome) is a rare genetic lysosomal storage disease characterized by
      early and progressive neurodegeneration resulting in a rapid decline in
      cognitive function affecting speech and language, adaptive behavior, and
      motor skills.
    explanation: >-
      This prospective human natural-history study directly defines the dominant
      progressive neurodegenerative course of MPS IIIA.
  - reference: PMID:9285796
    reference_title: >-
      Novel mutations in Sanfilippo A syndrome: implications for enzyme
      function.
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      The resulting lysosomal storage of heparan sulfate may lead to severe
      neurodegeneration preceded by progressive dementia, often combined with
      aggressive and hyperactive behaviour.
    explanation: >-
      This multicenter patient mutation study supports progressive dementia and
      severe neurodegeneration as defining clinical consequences of heparan
      sulfate storage.
phenotypes:
- name: Global developmental delay
  category: Neurologic
  description: >-
    Early developmental performance is already abnormal in severe MPS IIIA
    before overt regression dominates the course.
  phenotype_term:
    preferred_term: Global developmental delay
    term:
      id: HP:0001263
      label: Global developmental delay
  evidence:
  - reference: PMID:34991944
    reference_title: >-
      An observational, prospective, multicenter, natural history study of
      patients with mucopolysaccharidosis type IIIA.
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      All patients had early onset severe MPS IIIA, were diagnosed before 74
      months of age, and had cognitive scores below normal developmental levels
      at baseline.
    explanation: >-
      This prospective cohort documents abnormal developmental performance early
      in the disease course, supporting global developmental delay.
- name: Developmental regression
  category: Neurologic
  description: >-
    Loss of acquired neurodevelopmental abilities is central to the natural
    history of severe MPS IIIA.
  phenotype_term:
    preferred_term: Developmental regression
    term:
      id: HP:0002376
      label: Developmental regression
  evidence:
  - reference: PMID:34991944
    reference_title: >-
      An observational, prospective, multicenter, natural history study of
      patients with mucopolysaccharidosis type IIIA.
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Mucopolysaccharidosis type IIIA (MPS IIIA, also known as Sanfilippo
      syndrome) is a rare genetic lysosomal storage disease characterized by
      early and progressive neurodegeneration resulting in a rapid decline in
      cognitive function affecting speech and language, adaptive behavior, and
      motor skills.
    explanation: >-
      Rapid decline across multiple developmental domains supports progressive
      developmental regression as a hallmark phenotype.
