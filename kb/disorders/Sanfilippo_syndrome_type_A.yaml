genetic:
- name: SGSH pathogenic variants
  association: Causal
  notes: >-
    Pathogenic SGSH alleles are heterogeneous but show population structure.
    Spanish patients were enriched for 1091delC, while R245H is frequent in
    Australasia and the Netherlands; some missense alleles retain low residual
    sulfamidase activity and may modify severity.
  inheritance:
  - name: Autosomal recessive
  evidence:
  - reference: PMID:11343308
    reference_title: >-
      Mutation and haplotype analyses in 26 Spanish Sanfilippo syndrome type A
      patients: possible single origin for 1091delC mutation.
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      This allowed the identification of 14 different mutations, corresponding
      to 90% of the mutant alleles.
    explanation: >-
      This patient cohort establishes a diverse but causal SGSH mutation
      spectrum in Sanfilippo syndrome type A.
  - reference: PMID:9285796
    reference_title: >-
      Novel mutations in Sanfilippo A syndrome: implications for enzyme
      function.
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      R245H accounts for 31% of the Sanfilippo A alleles in Australasia, for
      19.2% of the alleles in patients from the UK and has a high frequency of
      57.8% in patients from The Netherlands.
    explanation: >-
      This supports geographically skewed recurrent SGSH alleles as an important
      modifier of variant distribution across patient populations.
  - reference: PMID:15542396
    reference_title: >-
      Expression and functional characterization of human mutant sulfamidase in
      insect cells.
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: >-
      Only mutations p.S66W and p.R206P retained low levels of residual
      activity.
    explanation: >-
      This in vitro functional study supports residual-enzyme-activity
      variation as a plausible modifier of phenotypic severity.
treatments:
- name: Investigational intracerebroventricular recombinant sulfamidase
  description: >-
    Recombinant human SGSH (rhSGSH) delivered into the cerebrospinal fluid has
    shown strong preclinical effects on substrate reduction, lysosomal
    dysfunction markers, and neuroimmune response in MPS IIIA mouse models.
  treatment_term:
    preferred_term: pharmacotherapy
    term:
      id: MAXO:0000058
      label: pharmacotherapy
  target_mechanisms:
  - target: Lysosomal heparan sulfate accumulation
    treatment_effect: INHIBITS
    description: >-
      Central rhSGSH lowers total heparan sulfate and the MPS IIIA-specific
      HS-NRE biomarker in brain.
    evidence:
    - reference: PMID:36306823
      reference_title: >-
        Intracerebroventricular dosing of N-sulfoglucosamine sulfohydrolase in
        mucopolysaccharidosis IIIA mice reduces markers of brain lysosomal
        dysfunction.
      supports: SUPPORT
      evidence_source: MODEL_ORGANISM
      snippet: >-
        Following a single ICV dose, both total HS and the MPS IIIA
        disease-specific HS-NRE were dramatically reduced, reaching a nadir 2
        weeks post dose.
      explanation: >-
        This mouse study supports direct inhibition of the core storage lesion by
        intracerebroventricular rhSGSH.
  - target: Neuroimmune response
    treatment_effect: INHIBITS
    description: >-
      Central rhSGSH lowers brain markers of a neuroimmune response in the mouse
      model.
    evidence:
    - reference: PMID:36306823
      reference_title: >-
        Intracerebroventricular dosing of N-sulfoglucosamine sulfohydrolase in
        mucopolysaccharidosis IIIA mice reduces markers of brain lysosomal
        dysfunction.
      supports: SUPPORT
      evidence_source: MODEL_ORGANISM
      snippet: >-
        Our findings show that rhSGSH can normalize lysosomal HS storage and
        markers of a neuroimmune response when delivered ICV.
      explanation: >-
        This supports neuroimmune-response reduction as a mechanistic effect of
        experimental rhSGSH therapy.
  evidence:
  - reference: PMID:36306823
    reference_title: >-
      Intracerebroventricular dosing of N-sulfoglucosamine sulfohydrolase in
      mucopolysaccharidosis IIIA mice reduces markers of brain lysosomal
      dysfunction.
    supports: SUPPORT
    evidence_source: MODEL_ORGANISM
    snippet: >-
      Our findings show that rhSGSH can normalize lysosomal HS storage and
      markers of a neuroimmune response when delivered ICV.
    explanation: >-
      This provides preclinical support for investigational central enzyme
      replacement in MPS IIIA.
notes: >-
  This entry models the SGSH-defined disease entity rather than the broader
  Sanfilippo/MPS III spectrum because the causal gene, blocked catabolic step,
  and natural-history data are subtype-specific. Rare attenuated adult
  presentations have been reported in the literature, but the current entry is
  centered on the classic early severe phenotype that dominates available
  natural-history cohorts.
