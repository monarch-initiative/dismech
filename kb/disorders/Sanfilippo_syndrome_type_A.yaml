    snippet: >-
      Mucopolysaccharidosis IIIA, also known as Sanfilippo syndrome type A, is
      an autosomal recessive storage disorder caused by deficiency of
      sulfamidase.
    explanation: >-
      This patient cohort directly supports autosomal recessive inheritance for
      Sanfilippo syndrome type A.
progression:
- phase: Early severe neurodevelopmental course
  age_range: infancy through mid-childhood
  notes: >-
    Disease progression is dominated by early cognitive decline with later motor
    deterioration. Children younger than about 40 months may continue to acquire
    some skills briefly, but many patients aged 40-70 months already have
    profound cognitive impairment; language decline precedes gross motor decline,
    and night waking is common in younger patients.
  evidence:
  - reference: PMID:34991944
    reference_title: >-
      An observational, prospective, multicenter, natural history study of
      patients with mucopolysaccharidosis type IIIA.
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Patients less than 40 months of age at baseline were more likely to
      continue developing new skills over the first 6-12 months of follow-up.
    explanation: >-
      This prospective cohort shows a brief early window of continued skill
      acquisition before decline becomes dominant.
  - reference: PMID:34991944
    reference_title: >-
      An observational, prospective, multicenter, natural history study of
      patients with mucopolysaccharidosis type IIIA.
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      There was a high variability in cognitive developmental age (DA) in
      patients between 40 and 70 months of age; two-thirds of these patients
      already had profound cognitive decline, with a DA ≤10 months.
    explanation: >-
      This defines the mid-childhood transition to profound neurocognitive
      impairment in severe MPS IIIA.
pathophysiology:
- name: SGSH (sulfamidase) deficiency
  description: >-
    Biallelic SGSH pathogenic variants markedly reduce sulfamidase activity,
    blocking the lysosomal step that removes the terminal sulfate from heparan
    sulfate.
  genes:
  - preferred_term: SGSH
    term:
      id: hgnc:10818
      label: SGSH
  molecular_functions:
  - preferred_term: N-sulfoglucosamine sulfohydrolase activity
    term:
      id: GO:0016250
      label: N-sulfoglucosamine sulfohydrolase activity
  biological_processes:
  - preferred_term: glycosaminoglycan catabolic process
    modifier: DECREASED
    term:
      id: GO:0006027
      label: glycosaminoglycan catabolic process
  cellular_components:
  - preferred_term: lysosome
    term:
      id: GO:0005764
      label: lysosome
  evidence:
  - reference: PMID:15542396
    reference_title: >-
      Expression and functional characterization of human mutant sulfamidase in
      insect cells.
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: >-
      Mucopolysaccharidosis IIIA (MPS IIIA; Sanfilippo syndrome) is an autosomal
      recessive lysosomal disorder caused by the deficiency of sulfamidase (EC
      3.10.1.1), required for the degradation of the mucopolysaccharide heparan
      sulfate.
    explanation: >-
      Functional characterization of mutant sulfamidase supports SGSH deficiency
      as the primary molecular defect and links it directly to failed heparan
      sulfate degradation.
  downstream:
  - target: Lysosomal heparan sulfate accumulation
    description: >-
      Loss of sulfamidase blocks terminal heparan sulfate catabolism and causes
      storage of partially degraded heparan sulfate.
    causal_link_type: DIRECT
    evidence:
    - reference: PMID:22008915
      reference_title: >-
        Liver production of sulfamidase reverses peripheral and ameliorates CNS
        pathology in mucopolysaccharidosis IIIA mice.
      supports: SUPPORT
      evidence_source: MODEL_ORGANISM
      snippet: >-
        Mucopolysaccharidosis type IIIA (MPSIIIA) is an inherited lysosomal
        storage disease caused by deficiency of sulfamidase, resulting in
        accumulation of the glycosaminoglycan (GAG) heparan sulfate.
      explanation: >-
        This mouse study directly states the biochemical consequence of
        sulfamidase deficiency: heparan sulfate accumulation.
- name: Lysosomal heparan sulfate accumulation
  description: >-
    Partially degraded heparan sulfate accumulates within lysosomes throughout
    the body, with the most clinically important burden in the brain.
  cellular_components:
  - preferred_term: lysosome
    term:
      id: GO:0005764
      label: lysosome
  locations:
  - preferred_term: brain
    term:
      id: UBERON:0000955
      label: brain
  evidence:
  - reference: PMID:36306823
    reference_title: >-
      Intracerebroventricular dosing of N-sulfoglucosamine sulfohydrolase in
      mucopolysaccharidosis IIIA mice reduces markers of brain lysosomal
      dysfunction.
    supports: SUPPORT
    evidence_source: MODEL_ORGANISM
    snippet: >-
      Enzyme deficiency results in accumulation of partially degraded HS within
      lysosomes throughout the body, leading to a progressive severe
      neurological disease.
    explanation: >-
      This preclinical study directly supports lysosomal heparan sulfate storage
      as the proximal biochemical lesion in MPS IIIA.
  downstream:
  - target: Brain lysosomal dysfunction
    description: >-
      Heparan sulfate storage is associated with persistent brain markers of
      lysosomal dysfunction.
    causal_link_type: DIRECT
    evidence:
    - reference: PMID:36306823
      reference_title: >-
        Intracerebroventricular dosing of N-sulfoglucosamine sulfohydrolase in
        mucopolysaccharidosis IIIA mice reduces markers of brain lysosomal
        dysfunction.
      supports: SUPPORT
      evidence_source: MODEL_ORGANISM
      snippet: >-
        The durability of effect for reduction of both substrate and protein
        markers of lysosomal dysfunction and a neuroimmune response lasted
        through the 56 days tested.
      explanation: >-
        Lowering stored heparan sulfate also lowers lysosomal dysfunction
        markers, supporting a direct mechanistic link from storage to lysosomal
        pathology.
  - target: Neuroimmune response
    description: >-
      Heparan sulfate storage is coupled to inflammatory brain responses.
    causal_link_type: DIRECT
    evidence:
    - reference: PMID:31528541
      reference_title: >-
        Intravenous delivery of a chemically modified sulfamidase efficiently
        reduces heparan sulfate storage and brain pathology in
        mucopolysaccharidosis IIIA mice.
      supports: SUPPORT
      evidence_source: MODEL_ORGANISM
      snippet: >-
        Sulfamidase deficiency leads to accumulation of heparan sulfate (HS),
        which triggers aberrant cellular function, inflammation and eventually
        cell death.
      explanation: >-
        This model-organism study directly links heparan sulfate storage to
        inflammatory pathology.
  - target: Progressive neurodegeneration
    description: >-
      Heparan sulfate storage drives the severe neurological course that defines
      Sanfilippo syndrome type A.
    causal_link_type: DIRECT
    evidence:
    - reference: PMID:22008915
      reference_title: >-
        Liver production of sulfamidase reverses peripheral and ameliorates CNS
        pathology in mucopolysaccharidosis IIIA mice.
      supports: SUPPORT
      evidence_source: MODEL_ORGANISM
      snippet: >-
        It is characterized by severe progressive neurodegeneration, together
        with somatic alterations, which lead to death during adolescence.
      explanation: >-
        This model paper supports progressive neurodegeneration as a core
        downstream consequence of heparan sulfate storage in MPS IIIA.
