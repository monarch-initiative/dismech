name: Sanfilippo syndrome type A
creation_date: '2026-04-13T01:14:50Z'
updated_date: '2026-04-13T01:14:50Z'
category: Mendelian
description: >-
  Sanfilippo syndrome type A, also called mucopolysaccharidosis type IIIA (MPS
  IIIA), is an autosomal recessive lysosomal storage disorder caused by biallelic
  SGSH loss with sulfamidase deficiency. Failure to remove the terminal sulfate
  from heparan sulfate causes lysosomal accumulation of partially degraded heparan
  sulfate with a predominantly central nervous system phenotype marked by early
  developmental slowing, hyperactivity, sleep disturbance, developmental
  regression, and progressive neurodegeneration. Somatic manifestations are
  usually milder than in other mucopolysaccharidoses.
