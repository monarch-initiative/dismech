name: Osteogenesis Imperfecta Type IV
creation_date: '2026-02-06T03:25:37Z'
updated_date: '2026-04-04T00:00:00Z'
category: Mendelian
description: >
  Osteogenesis imperfecta type IV represents moderate severity OI, intermediate
  between the mild type I and severe type III. Caused by dominant-negative
  mutations in COL1A1 or COL1A2, affected individuals have moderate bone fragility,
  variable short stature, normal or near-normal scleral hue (distinguishing it
  from type I), and may have dentinogenesis imperfecta. Phenotypic severity is
  highly variable, overlapping with both milder and more severe forms.
disease_term:
  preferred_term: Osteogenesis imperfecta type IV
  term:
    id: MONDO:0008148
    label: osteogenesis imperfecta type 4
parents:
- Osteogenesis imperfecta
inheritance:
- name: Autosomal Dominant
  description: >
    Autosomal dominant inheritance. Both inherited and de novo mutations occur.
    Variable expressivity is common even within families.
  evidence:
  - reference: PMID:7643358
    reference_title: "Perinatal lethal osteogenesis imperfecta."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Perinatal lethal osteogenesis imperfecta is the result of heterozygous
      mutations of the COL1A1 and COL1A2 genes that encode the alpha 1(I) and
      alpha 2(I) chains of type I collagen, respectively.
    explanation: >-
      Confirms that OI results from heterozygous (i.e. dominant) mutations in
      COL1A1 and COL1A2, consistent with autosomal dominant inheritance in type IV.
prevalence:
- population: Swedish pediatric osteogenesis imperfecta population
  percentage: 1.35 per 100,000
  notes: >-
    In a near-complete Swedish pediatric ascertainment study, type IV was the
    most prevalent non-type-I classical subtype.
  evidence:
  - reference: PMID:25944380
    reference_title: "Genetic epidemiology, prevalence, and genotype-phenotype correlations in the Swedish population with osteogenesis imperfecta."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "The prevalence of OI types I, III, and IV was 5.16, 0.89, and 1.35/100 000, respectively (7.40/100 000 overall), corresponding to what has been estimated but not unequivocally proven in any population."
    explanation: This population-based Swedish study directly estimates pediatric prevalence of OI type IV at 1.35 per 100,000.
pathophysiology:
- name: Moderate Collagen Structural Defect
  description: >
    Structural mutations in COL1A1 or COL1A2 that produce collagen with
    intermediate levels of dysfunction. The mutations allow more normal
    fibril formation than in types II/III but still compromise bone
    matrix integrity.
  cell_types:
  - preferred_term: Osteoblast
    term:
      id: CL:0000062
      label: osteoblast
  biological_processes:
  - preferred_term: Collagen Fibril Organization
    term:
      id: GO:0030199
      label: collagen fibril organization
  - preferred_term: Bone Development
    term:
      id: GO:0060348
      label: bone development
  evidence:
  - reference: PMID:7643358
    reference_title: "Perinatal lethal osteogenesis imperfecta."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      The abnormal molecules are poorly secreted, more susceptible to degradation,
      and impair the formation of the extracellular matrix. The collagen fibres
      are abnormally organised and mineralisation is impaired.
    explanation: >-
      Describes the molecular consequences of collagen structural mutations that
      affect bone matrix formation, applicable across the OI severity spectrum.
genetic:
- name: COL1A1/COL1A2 Mutations
  association: Causative
  notes: >
    Structural mutations including glycine substitutions and splice site
    mutations. Mutations in COL1A2 are more common in type IV than in
    type III, possibly explaining the milder phenotype given the
    2:1 ratio of alpha1 to alpha2 chains in type I collagen.
  evidence:
  - reference: PMID:7643358
    reference_title: "Perinatal lethal osteogenesis imperfecta."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      The severity of the clinical phenotype appears to be related to the type of
      mutation, its location in the alpha chain, the surrounding amino acid
      sequences, and the level of expression of the mutant allele.
    explanation: >-
      Establishes that mutation type and location determine phenotypic severity,
      explaining the variable expressivity in moderate OI type IV.
phenotypes:
- name: Moderate Short Stature
  description: >
    Variable short stature, typically mild to moderate. Some individuals
    achieve near-normal height.
  phenotype_term:
    preferred_term: Short stature
    term:
      id: HP:0004322
      label: Short stature
  evidence:
  - reference: PMID:25944380
    reference_title: "Genetic epidemiology, prevalence, and genotype-phenotype correlations in the Swedish population with osteogenesis imperfecta."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Individuals with type I OI caused by qualitative vs quantitative mutations
      were shorter (P<0.0001), but did not differ considering fractures or BMD.
    explanation: >-
      While this specific comparison is for type I, it demonstrates that qualitative
      collagen mutations (which predominate in type IV) are associated with reduced
      stature in OI patients.
- name: Recurrent Fractures
  description: >
    Increased fracture frequency, though typically less than type III.
    Fractures decrease after puberty.
  phenotype_term:
    preferred_term: Recurrent fractures
    term:
      id: HP:0002757
      label: Recurrent fractures
  evidence:
  - reference: DOI:10.1515/jpem-2024-0512
    reference_title: "Osteogenesis imperfecta: shifting paradigms in pathophysiology and care in children"
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      This rare genetic disorder is characterized by frequent fractures as well
      as extraskeletal manifestations.
    explanation: >-
      Confirms that frequent fractures are a defining feature of OI, applicable
      to OI type IV which is characterized by moderate bone fragility.
- name: Normal Scleral Hue
  description: >
    Sclerae are typically white or light gray in adults, distinguishing
    type IV from type I (which has persistently blue sclerae).
  phenotype_term:
    preferred_term: Blue sclerae
    term:
      id: HP:0000592
      label: Blue sclerae
  frequency: EXCLUDED
  evidence:
  - reference: PMID:25944380
    reference_title: "Genetic epidemiology, prevalence, and genotype-phenotype correlations in the Swedish population with osteogenesis imperfecta."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      only those in the α1-chain were associated with blue sclera (P=0.0110).
    explanation: >-
      Demonstrates that blue sclerae in OI are specifically associated with
      alpha-1 chain mutations, supporting the observation that many OI type IV
      patients (who frequently have alpha-2 chain mutations) lack blue sclerae.
- name: Dentinogenesis Imperfecta
  description: >
    Variable presence of dentinogenesis imperfecta with opalescent teeth.
  phenotype_term:
    preferred_term: Dentinogenesis imperfecta
    term:
      id: HP:0000703
      label: Dentinogenesis imperfecta
  evidence:
  - reference: DOI:10.1007/s00223-024-01293-2
    reference_title: "Dental Abnormalities in Osteogenesis Imperfecta: A Systematic Review"
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      dental abnormalities are prevalent in OI, with DI prevalence ranging from
      approximately 20 to 48%. Those with a more severe skeletal phenotype (OI
      type III/IV) exhibited more dental abnormalities than those with a milder
      skeletal phenotype (OI type I).
    explanation: >-
      Systematic review confirming that dentinogenesis imperfecta is prevalent
      in OI, with higher rates in OI types III and IV compared to type I.
- name: Skeletal Deformity
  description: >
    Mild to moderate bowing of long bones. Less progressive than type III.
  phenotype_term:
    preferred_term: Bowing of the long bones
    term:
      id: HP:0006487
      label: Bowing of the long bones
  evidence:
  - reference: DOI:10.1007/s00223-024-01293-2
    reference_title: "Dental Abnormalities in Osteogenesis Imperfecta: A Systematic Review"
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Osteogenesis imperfecta (OI) is a rare genetic disorder characterized by
      fragile bones and skeletal deformities.
    explanation: >-
      Confirms that skeletal deformities are a characteristic feature of OI,
      including the bowing of long bones seen in OI type IV.
- name: Hearing Impairment
  description: >
    Progressive hearing loss may develop, typically in adulthood.
  phenotype_term:
    preferred_term: Hearing impairment
    term:
      id: HP:0000365
      label: Hearing impairment
  evidence:
  - reference: DOI:10.1515/jpem-2024-0512
    reference_title: "Osteogenesis imperfecta: shifting paradigms in pathophysiology and care in children"
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      This rare genetic disorder is characterized by frequent fractures as well
      as extraskeletal manifestations.
    explanation: >-
      Hearing impairment is a well-recognized extraskeletal manifestation of OI.
      This review confirms that OI involves extraskeletal features beyond bone
      fragility.
treatments:
- name: Bisphosphonate Therapy
  description: >
    Bisphosphonates to increase bone density and reduce fractures,
    particularly beneficial in childhood.
  treatment_term:
    preferred_term: Bisphosphonate therapy
    term:
      id: MAXO:0000954
      label: bisphosphonate agent therapy
  evidence:
  - reference: DOI:10.1515/jpem-2024-0512
    reference_title: "Osteogenesis imperfecta: shifting paradigms in pathophysiology and care in children"
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      While bisphosphonates are still the standard of care, novel therapeutic
      approaches are emerging.
    explanation: >-
      Confirms bisphosphonates as the current standard of care for children with
      OI, including type IV.
  - reference: DOI:10.1007/s00223-024-01202-7
    reference_title: "Medical Management for Fracture Prevention in Children with Osteogenesis Imperfecta"
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Children currently receive off-label treatment with bisphosphonates,
      without any consistent approach to dose, drug or route of administration.
    explanation: >-
      Confirms that bisphosphonates are the primary medical treatment for fracture
      prevention in children with OI, though used off-label.
- name: Orthopedic Management
  description: >
    Fracture treatment and corrective surgery for deformities as needed.
    Intramedullary rodding for severe cases.
  treatment_term:
    preferred_term: Orthopedic surgery
    term:
      id: MAXO:0000004
      label: surgical procedure
  evidence:
  - reference: DOI:10.3390/jcm13041065
    reference_title: "New Perspectives of Therapies in Osteogenesis Imperfecta - A Literature Review"
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      The current treatment options, medical and orthopedic, are limited and not
      efficient enough to improve the low bone density, bone fragility, growth,
      and mobility of the affected individuals, creating the need for alternative
      therapeutic agents.
    explanation: >-
      Acknowledges orthopedic treatment as a current standard management approach
      for OI alongside medical treatment, supporting the role of surgical
      intervention.
- name: Physical Therapy
  description: >
    Exercise programs to strengthen muscles and maintain bone health.
  treatment_term:
    preferred_term: Physical therapy
    term:
      id: MAXO:0000011
      label: physical therapy
  evidence:
  - reference: DOI:10.3390/jcm13041065
    reference_title: "New Perspectives of Therapies in Osteogenesis Imperfecta - A Literature Review"
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      The current treatment options, medical and orthopedic, are limited and not
      efficient enough to improve the low bone density, bone fragility, growth,
      and mobility of the affected individuals, creating the need for alternative
      therapeutic agents.
    explanation: >-
      Physical therapy is part of the standard orthopedic management approach for
      OI patients to improve mobility and functional outcomes.
