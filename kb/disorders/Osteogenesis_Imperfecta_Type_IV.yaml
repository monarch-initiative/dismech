treatments:
- name: Bisphosphonate Therapy
  description: >
    Bisphosphonates can improve vertebral density and vertebral shape in
    childhood, but short-term functional benefit and long-bone fracture
    reduction are inconsistent.
  treatment_term:
    preferred_term: Bisphosphonate therapy
    term:
      id: MAXO:0000954
      label: bisphosphonate agent therapy
  evidence:
  - reference: PMID:15883638
    reference_title: "Controlled trial of pamidronate in children with types III and IV osteogenesis imperfecta confirms vertebral gains but not short-term functional improvement."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Bisphosphonates have been widely administered to children with OI based
      on observational trials. A randomized controlled trial of q3m
      intravenous pamidronate in children with types III and IV OI yielded
      positive vertebral changes in DXA and geometry after 1 year of
      treatment, but no further significant improvement during extended
      treatment. The treated group did not experience significantly decreased
      pain or long bone fractures or have increased motor function or muscle
      strength.
    explanation: >-
      This randomized trial supports vertebral benefit from pamidronate in
      type III/IV OI but not consistent short-term functional or long-bone
      fracture improvement.
  - reference: DOI:10.1007/s00223-024-01202-7
    reference_title: "Medical Management for Fracture Prevention in Children with Osteogenesis Imperfecta"
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Children currently receive off-label treatment with bisphosphonates,
      without any consistent approach to dose, drug or route of administration.
    explanation: >-
      Confirms that bisphosphonates remain widely used off-label in pediatric
      OI, despite nonstandardized drug, dose, and route choices.
- name: Orthopedic Management
  description: >
    Fracture treatment and corrective surgery for deformities as needed.
    Intramedullary rodding for severe cases.
  treatment_term:
    preferred_term: Orthopedic surgery
    term:
      id: MAXO:0000004
      label: surgical procedure
  evidence:
  - reference: PMID:11127846
    reference_title: "Osteogenesis imperfecta: practical treatment guidelines."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      An aggressive rehabilitative approach is indicated to optimise functional
      ability and walking capacity; appropriately timed surgery to insert
      intramedullary rods provides improved function of extremities.
    explanation: >-
      Practical treatment guidelines explicitly support intramedullary rodding
      and related orthopedic surgery to improve function in OI.
- name: Physical Therapy
  description: >
    Physical therapy and rehabilitation to optimize mobility, walking capacity,
    and overall function.
  treatment_term:
    preferred_term: Physical therapy
    term:
      id: MAXO:0000011
      label: physical therapy
  evidence:
  - reference: PMID:11127846
    reference_title: "Osteogenesis imperfecta: practical treatment guidelines."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Three types of treatment are available: nonsurgical management (physical
      therapy, rehabilitation, bracing and splinting), surgery
      (intramedullary rod positioning, spinal and basilar impression surgery),
      and drugs to increase the strength of bone and decrease the number of
      fractures.
    explanation: >-
      Practical treatment guidelines explicitly include physical therapy and
      rehabilitation as standard nonsurgical management in OI.
- name: Dental Management
  description: >-
    Dental care to maintain dentition, occlusion, gingival health, and overall
    appearance. More frequent dental monitoring is indicated in those with or at
    risk for dentinogenesis imperfecta. Dental treatment may include restorations,
    crowns, and management of malocclusion.
  treatment_term:
    preferred_term: dental procedure
    term:
      id: NCIT:C38052
      label: Dental Procedure
  evidence:
  - reference: PMID:20301472
    reference_title: "COL1A1- and COL1A2-Related Osteogenesis Imperfecta."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Dental care to maintain both primary and permanent dentition, a functional
      bite or occlusion, optimal gingival health, and overall appearance.
    explanation: >-
      GeneReviews explicitly lists dental care as a treatment-of-manifestations
      recommendation for COL1A1/COL1A2-OI, relevant to the dentinogenesis imperfecta
      phenotype seen in type IV.
- name: Pain Management
  description: >-
    Pain management using pharmacologic and non-pharmacologic strategies is
    recommended for OI patients across all severity types. Bone pain is a
    significant quality-of-life burden in adults with OI type IV.
  treatment_term:
    preferred_term: supportive care
    term:
      id: MAXO:0000950
      label: supportive care
  evidence:
  - reference: PMID:20301472
    reference_title: "COL1A1- and COL1A2-Related Osteogenesis Imperfecta."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Pain management combines pharmacologic and non-pharmacologic strategies.
    explanation: >-
      GeneReviews recommends combining pharmacologic and non-pharmacologic pain
      management for COL1A1/COL1A2-OI, addressing the significant bone pain
      burden documented in type IV patients.
- name: Genetic Counseling
  description: >-
    Genetic counseling for COL1A1/COL1A2-related OI addresses autosomal dominant
    inheritance, recurrence risk (including parental gonadal mosaicism in up to 16%
    of de novo cases), and options for prenatal and preimplantation genetic testing.
    Approximately 60% of mild OI probands represent simplex cases with a de novo
    variant; recurrence counseling should account for possible parental mosaicism.
  treatment_term:
    preferred_term: genetic counseling
    term:
      id: MAXO:0000079
      label: genetic counseling
  evidence:
  - reference: PMID:20301472
    reference_title: "COL1A1- and COL1A2-Related Osteogenesis Imperfecta."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      GENETIC COUNSELING: COL1A1-OI and COL1A2-OI are inherited in an autosomal
      dominant manner. Many individuals diagnosed with the milder forms of
      COL1A1/COL1A2-OI have the disorder as the result of a pathogenic variant
      inherited from an affected parent.
    explanation: >-
      GeneReviews provides genetic counseling guidance for COL1A1/COL1A2-OI including
      inheritance pattern, recurrence risk, and reproductive options.
  - reference: PMID:20301472
    reference_title: "COL1A1- and COL1A2-Related Osteogenesis Imperfecta."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      The overall rate of mosaicism is up to 16% in the parents of children
      with COL1A1/COL1A2-OI. Each child of an individual with COL1A1/COL1A2-OI has a
      50% chance of inheriting the causative variant. Once the OI-causing variant has
      been identified in an affected family member, prenatal and preimplantation
      genetic testing are possible.
    explanation: >-
      GeneReviews quantifies parental mosaicism risk (up to 16%) and specifies
      50% recurrence risk per offspring, supporting the recurrence counseling content
      in the description.
