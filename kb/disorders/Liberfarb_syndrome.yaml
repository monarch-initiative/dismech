  - reference: DOI:10.1111/cge.14549
    reference_title: "Novel biallelic PISD missense variants cause spondyloepimetaphyseal dysplasia with disproportionate short stature and fragmented mitochondrial morphology"
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Biallelic variants in PISD cause a phenotypic spectrum ranging from short stature with spondyloepimetaphyseal dysplasia (SEMD) to a multisystem disorder affecting eyes, ears, bones, and brain."
    explanation: This supports recessive disease caused by biallelic PISD variants.
pathophysiology:
- name: PISD deficiency
  description: >-
    Liberfarb syndrome is caused by pathogenic biallelic PISD variants that
    impair phosphatidylserine decarboxylase function in mitochondria.
  gene:
