    reference_title: "The Liberfarb syndrome, a multisystem disorder affecting eye, ear, bone, and brain development, is caused by a founder pathogenic variant in thePISD gene."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "We observed four individuals in two unrelated but consanguineous families from Portugal and Brazil affected by early-onset retinal degeneration, sensorineural hearing loss, microcephaly, intellectual disability, and skeletal dysplasia with scoliosis and short stature."
