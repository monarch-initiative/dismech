    reference_title: "Novel biallelic PISD missense variants cause spondyloepimetaphyseal dysplasia with disproportionate short stature and fragmented mitochondrial morphology"
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "PISD encodes the mitochondrial-localized enzyme phosphatidylserine decarboxylase."
    explanation: This directly supports PISD as the primary disease gene and enzyme defect.
  downstream:
  - target: Impaired mitochondrial phospholipid metabolism
    description: Impaired PISD function disrupts phosphatidylethanolamine biosynthesis within mitochondria.
  - target: Fragmented mitochondrial morphology
    description: Mitochondrial structural integrity is compromised downstream of PISD dysfunction.
- name: Impaired mitochondrial phospholipid metabolism
  description: >-
    Defective PISD activity impairs conversion of phosphatidylserine to
    phosphatidylethanolamine, disrupting mitochondrial membrane homeostasis.
  evidence:
  - reference: DOI:10.1111/cge.14549
    reference_title: "Novel biallelic PISD missense variants cause spondyloepimetaphyseal dysplasia with disproportionate short stature and fragmented mitochondrial morphology"
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "The PISD precursor is self-cleaved to generate a heteromeric mature enzyme that converts phosphatidylserine to the phospholipid phosphatidylethanolamine."
    explanation: This directly supports the relevant phospholipid metabolic function disrupted in disease.
- name: Fragmented mitochondrial morphology
  description: >-
    Patient-derived cells show abnormal mitochondrial fragmentation, supporting
    a mitochondrial structural defect downstream of PISD dysfunction.
  biological_processes:
  - preferred_term: mitochondrion organization
    modifier: ABNORMAL
    term:
      id: GO:0007005
      label: mitochondrion organization
