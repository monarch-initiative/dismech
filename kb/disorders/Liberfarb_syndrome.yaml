name: Liberfarb syndrome
creation_date: "2026-04-13T22:47:36Z"
updated_date: "2026-05-20T00:09:53Z"
description: >-
  Liberfarb syndrome is a rare PISD-related multisystem developmental disorder
  affecting the eye, ear, bone, and brain. Reported manifestations include
  early-onset retinal degeneration, hearing loss, microcephaly, intellectual
  disability, skeletal dysplasia, and short stature, with cellular evidence of
  mitochondrial fragmentation and impaired phospholipid metabolism.
category: Mendelian
