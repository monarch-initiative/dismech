inheritance:
- name: Autosomal recessive
  inheritance_term:
    preferred_term: Autosomal recessive inheritance
    term:
      id: HP:0000007
      label: Autosomal recessive inheritance
  description: >
    The severe infantile form (ARO) follows autosomal recessive inheritance. Mutations
    in TCIRG1 account for approximately 50% of ARO cases, followed by CLCN7 and OSTM1.
    Biallelic loss-of-function mutations in TNFSF11 (RANKL) cause osteoclast-poor ARO
    that does not respond to hematopoietic stem cell transplantation.
  evidence:
  - reference: PMID:23877423
    reference_title: "Osteopetrosis: genetics, treatment and new insights into osteoclast function."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "mutations in TCIRG1, CLCN7, OSTM1, SNX10 and PLEKHM1 lead to osteoclast-rich ARO"
    explanation: Identifies the major genes causing autosomal recessive osteoclast-rich ARO.
  - reference: PMID:10888887
    reference_title: "Defects in TCIRG1 subunit of the vacuolar proton pump are responsible for a subset of human autosomal recessive osteopetrosis."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "we show that TCIRG1, encoding the osteoclast-specific 116-kD subunit of the vacuolar proton pump, is mutated in five of nine patients with a diagnosis of infantile malignant osteopetrosis"
    explanation: Demonstrates that TCIRG1 mutations are a frequent cause of autosomal recessive osteopetrosis.
- name: Autosomal dominant
  inheritance_term:
    preferred_term: Autosomal dominant inheritance
    term:
      id: HP:0000006
      label: Autosomal dominant inheritance
  description: >
    Autosomal dominant osteopetrosis type 2 (ADO2, Albers-Schonberg disease) is the
    most common form, caused by heterozygous mutations in CLCN7. Penetrance is
    incomplete, with variable expressivity even within families.
  evidence:
  - reference: PMID:19953639
    reference_title: "Molecular and clinical heterogeneity in CLCN7-dependent osteopetrosis: report of 20 novel mutations."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "the CLCN7 gene has drawn the attention of many researchers, as mutations within this gene are associated with very different phenotypes"
    explanation: Demonstrates the role of CLCN7 in both autosomal recessive and autosomal dominant forms.
has_subtypes:
- name: ARO
  display_name: Autosomal Recessive Osteopetrosis (Infantile/Malignant)
  description: >
    Severe infantile form presenting in the first months of life with bone marrow failure,
    hepatosplenomegaly from extramedullary hematopoiesis, cranial nerve compression
    (optic atrophy, deafness), and failure to thrive. Without hematopoietic stem cell
    transplantation, most patients die in early childhood.
- name: ADO2
  display_name: Autosomal Dominant Osteopetrosis Type 2 (Albers-Schonberg Disease)
  description: >
    The most common form of osteopetrosis, often diagnosed incidentally. Characterized
    by generalized osteosclerosis, pathologic fractures, and cranial nerve palsies.
    Many patients are asymptomatic; others develop recurrent fractures, osteomyelitis,
    or bone pain.
- name: IRO
  display_name: Intermediate Autosomal Recessive Osteopetrosis
  description: >
    An intermediate form with childhood onset, characterized by increased bone density,
    fractures, and mild anemia, but without the severe bone marrow failure seen in
    infantile ARO. Often caused by biallelic CLCN7 mutations.
pathophysiology:
- name: Defective osteoclast acidification
  description: >
    The majority of osteopetrosis cases result from mutations in genes required for
    acidification of the osteoclast resorption lacuna. TCIRG1 encodes the a3 subunit
    of the vacuolar proton pump (V-ATPase), and its loss prevents acid secretion into
    the resorption lacuna. CLCN7 encodes a chloride-proton antiporter that provides
    the chloride conductance needed to maintain electroneutrality during proton pumping.
    OSTM1 stabilizes CLCN7. Without adequate acidification, hydroxyapatite dissolution
    fails and bone matrix cannot be degraded, leading to progressive accumulation of
    unresorbed primary spongiosa.
  cell_types:
  - preferred_term: osteoclast
    term:
      id: CL:0000092
      label: osteoclast
  biological_processes:
  - preferred_term: Bone resorption
    term:
      id: GO:0045453
