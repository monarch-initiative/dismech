    reference_title: "Osteoclast-poor human osteopetrosis due to mutations in the gene encoding RANKL."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "we report mutations in the gene encoding RANKL (receptor activator of nuclear factor-KB ligand) in six individuals with autosomal recessive osteopetrosis whose bone biopsy specimens lacked osteoclasts"
    explanation: First identification of RANKL mutations as a cause of osteoclast-poor osteopetrosis in humans.
  - reference: PMID:17632511
    reference_title: "Osteoclast-poor human osteopetrosis due to mutations in the gene encoding RANKL."
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: "exogenous RANKL induced formation of functional osteoclasts from their monocytes, suggesting that they could, theoretically, benefit from exogenous RANKL administration"
    explanation: Demonstrates that the differentiation defect is rescuable by providing exogenous RANKL, confirming the microenvironment-based mechanism.
- name: Bone marrow failure due to marrow space obliteration
  description: >
    Progressive accumulation of unresorbed bone encroaches on the marrow cavity,
    displacing hematopoietic tissue. This leads to pancytopenia and compensatory
    extramedullary hematopoiesis in the liver and spleen. The hematologic
    complications are the primary cause of mortality in infantile ARO.
  cell_types:
