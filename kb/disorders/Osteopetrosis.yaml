    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "hepatosplenomegaly and failure to thrive"
    explanation: Clinical series lists hepatosplenomegaly as a presenting feature of infantile osteopetrosis.
- category: Hematologic
  name: Extramedullary hematopoiesis
  frequency: FREQUENT
  subtype: ARO
  description: >
    Compensatory blood cell production in the liver and spleen in response to
    bone marrow failure. This is a hallmark of the infantile form.
  phenotype_term:
    preferred_term: Extramedullary hematopoiesis
    term:
      id: HP:0001978
      label: Extramedullary hematopoiesis
- category: Craniofacial
  name: Macrocephaly
  frequency: FREQUENT
  subtype: ARO
  description: >
    Progressive macrocephaly results from calvarial thickening and may be
    associated with hydrocephalus due to narrowing of the posterior fossa.
  phenotype_term:
    preferred_term: Macrocephaly
    term:
      id: HP:0000256
      label: Macrocephaly
- category: Dental
  name: Dental abnormalities
  frequency: FREQUENT
  description: >
    Delayed tooth eruption, dental caries, and osteomyelitis of the mandible
    are common. The dense bone impairs normal tooth eruption and increases
    susceptibility to jaw infections after dental procedures.
  phenotype_term:
    preferred_term: Abnormality of dental eruption
    term:
      id: HP:0006292
      label: Abnormality of dental eruption
  evidence:
  - reference: PMID:28655174
    reference_title: "Diagnosis and Management of Osteopetrosis: Consensus Guidelines From the Osteopetrosis Working Group."
    supports: SUPPORT
    evidence_source: OTHER
    snippet: "ongoing monitoring for changes in mineral metabolism and other complications, including cranial nerve impingement, anemia, leukopenia, and dental disease"
    explanation: Consensus guidelines identify dental disease as a complication requiring monitoring.
- category: Metabolic
  name: Hypocalcemia
  frequency: FREQUENT
  subtype: ARO
  description: >
    Failure of bone resorption reduces calcium mobilization from the skeleton.
    In TCIRG1-related ARO, impaired gastric acid secretion further reduces
    dietary calcium absorption. Hypocalcemia may present with neonatal tetany
    or seizures.
  phenotype_term:
    preferred_term: Hypocalcemia
    term:
      id: HP:0002901
      label: Hypocalcemia
  evidence:
  - reference: PMID:19802031
    reference_title: "Characterization and management of hypercalcemia following transplantation for osteopetrosis."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "hypocalcemic seizures"
    explanation: Clinical series identifies hypocalcemic seizures as a presenting feature of infantile osteopetrosis.
- category: Growth
  name: Short stature
  frequency: FREQUENT
  subtype: ARO
  description: >
    Growth failure in ARO results from chronic illness, impaired endochondral
    ossification due to persistence of unresorbed cartilage in the growth plate,
    and metabolic derangements including hypocalcemia.
  phenotype_term:
    preferred_term: Short stature
    term:
      id: HP:0004322
      label: Short stature
