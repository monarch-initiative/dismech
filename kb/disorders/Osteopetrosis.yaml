treatments:
- name: Hematopoietic stem cell transplantation
  description: >
    HSCT is the only curative treatment for osteoclast-rich forms of ARO. Donor-derived
    monocyte-macrophage precursors differentiate into functional osteoclasts that restore
    bone resorption. Best outcomes are achieved with early transplantation before
    irreversible complications develop. HSCT is not effective for osteoclast-poor
    forms (TNFSF11 mutations) or for ADO2.
  treatment_term:
    preferred_term: hematopoietic stem cell transplantation
    term:
      id: MAXO:0000747
      label: hematopoietic stem cell transplantation
  evidence:
  - reference: PMID:9849690
    reference_title: "Hematopoietic stem cell transplantation for infantile osteopetrosis."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "The only therapy shown to be capable of providing lasting benefit is allogeneic hematopoietic stem cell transplantation (HCT). We report the outcome of 10 patients with infantile malignant osteopetrosis treated with HCT"
    explanation: Reports outcomes of HSCT for infantile osteopetrosis, with 5 of 10 patients surviving.
  - reference: PMID:9849690
    reference_title: "Hematopoietic stem cell transplantation for infantile osteopetrosis."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "We recommend early referral for consideration of HCT with a related or unrelated donor as neurosensory manifestations of osteopetrosis are generally not reversible"
    explanation: Emphasizes the importance of early transplantation before irreversible neurological damage occurs.
  - reference: PMID:23877423
    reference_title: "Osteopetrosis: genetics, treatment and new insights into osteoclast function."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "guidelines for the indication of haematopoietic stem cell transplantation (which can provide a cure for many types of ARO), are outlined"
    explanation: Review confirms HSCT as a curative treatment for many types of ARO.
  - reference: PMID:17632511
    reference_title: "Osteoclast-poor human osteopetrosis due to mutations in the gene encoding RANKL."
    supports: PARTIAL
    evidence_source: HUMAN_CLINICAL
    snippet: "These individuals did not show any obvious defects in immunological parameters and could not be cured by hematopoietic stem cell transplantation"
    explanation: Confirms that RANKL-deficient osteoclast-poor osteopetrosis does not respond to HSCT because the defect is in the microenvironment.
- name: Supportive care and monitoring
  description: >
    For non-infantile forms where HSCT is not indicated, management is supportive.
    Includes monitoring for cranial nerve impingement, anemia, dental disease,
    and mineral metabolism abnormalities. Calcium and vitamin D supplementation
    may be needed for hypocalcemia.
  treatment_term:
    preferred_term: supportive care
    term:
      id: MAXO:0000950
      label: supportive care
  evidence:
  - reference: PMID:28655174
    reference_title: "Diagnosis and Management of Osteopetrosis: Consensus Guidelines From the Osteopetrosis Working Group."
    supports: SUPPORT
    evidence_source: OTHER
    snippet: "We suggest that calcitriol should not be used in high doses and instead recommend symptom-based supportive therapy for disease complications because noninfantile osteopetrosis has no effective treatment"
    explanation: Consensus guidelines recommend supportive therapy for non-infantile osteopetrosis.
  - reference: PMID:28655174
    reference_title: "Diagnosis and Management of Osteopetrosis: Consensus Guidelines From the Osteopetrosis Working Group."
    supports: SUPPORT
    evidence_source: OTHER
    snippet: "We recommend ongoing monitoring for changes in mineral metabolism and other complications, including cranial nerve impingement, anemia, leukopenia, and dental disease"
    explanation: Guidelines outline specific complications requiring ongoing monitoring.
animal_models:
- species: Mus musculus
  genotype: Tcirg1 oc/oc (osteosclerotic)
  description: >
    The oc/oc mouse carries a spontaneous loss-of-function mutation in Tcirg1 and
    recapitulates severe ARO with failure of tooth eruption, bone marrow failure,
    and early lethality. This model has been instrumental in demonstrating that
    HSCT can correct the osteoclast defect and in preclinical evaluation of gene
    therapy approaches.
  evidence:
  - reference: PMID:10888887
    reference_title: "Defects in TCIRG1 subunit of the vacuolar proton pump are responsible for a subset of human autosomal recessive osteopetrosis."
    supports: SUPPORT
    evidence_source: MODEL_ORGANISM
    snippet: "In other mutants, it is the function of the osteoclast that seems to be affected, as they show normal or elevated numbers of non-functioning osteoclasts"
    explanation: Describes mouse osteopetrosis mutants with normal osteoclast numbers but defective function, the category to which the oc/oc (Tcirg1) mouse belongs. The oc/oc model is not named in the abstract but is the canonical Tcirg1 loss-of-function mouse.
- species: Mus musculus
  genotype: Clcn7 -/- (knockout)
  description: >
    Clcn7-deficient mice develop severe osteopetrosis with retinal degeneration
    and neurodegeneration, recapitulating the phenotype of human patients with
    OSTM1 or CLCN7 mutations who develop CNS involvement. The model established
    the dual role of CLCN7 in osteoclast function and lysosomal biology.
  evidence:
  - reference: PMID:11207362
    reference_title: "Loss of the ClC-7 chloride channel leads to osteopetrosis in mice and man."
    supports: SUPPORT
    evidence_source: MODEL_ORGANISM
    snippet: "Mice deficient for the ubiquitously expressed ClC-7 Cl(-) channel show severe osteopetrosis and retinal degeneration. Although osteoclasts are present in normal numbers, they fail to resorb bone because they cannot acidify the extracellular resorption lacuna."
    explanation: Demonstrates the Clcn7 knockout mouse phenotype of osteopetrosis with retinal degeneration and the mechanism of failed lacunar acidification.
  - reference: PMID:11207362
    reference_title: "Loss of the ClC-7 chloride channel leads to osteopetrosis in mice and man."
    supports: SUPPORT
    evidence_source: MODEL_ORGANISM
    snippet: "ClC-7 resides in late endosomal and lysosomal compartments. In osteoclasts, it is highly expressed in the ruffled membrane"
    explanation: Establishes the subcellular localization of ClC-7 in the ruffled membrane, explaining its role in osteoclast acidification.
