    reference_title: "Defects in TCIRG1 subunit of the vacuolar proton pump are responsible for a subset of human autosomal recessive osteopetrosis."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "we show that TCIRG1, encoding the osteoclast-specific 116-kD subunit of the vacuolar proton pump, is mutated in five of nine patients with a diagnosis of infantile malignant osteopetrosis"
    explanation: Identifies TCIRG1 as the proton pump subunit whose loss causes defective osteoclast acidification in human ARO.
  - reference: PMID:11207362
    reference_title: "Loss of the ClC-7 chloride channel leads to osteopetrosis in mice and man."
    supports: SUPPORT
    evidence_source: MODEL_ORGANISM
    snippet: "they fail to resorb bone because they cannot acidify the extracellular resorption lacuna"
    explanation: ClC-7-deficient mice have osteoclasts present in normal numbers but unable to acidify the resorption lacuna, directly demonstrating the acidification defect.
  - reference: PMID:23877423
    reference_title: "Osteopetrosis: genetics, treatment and new insights into osteoclast function."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "mutations in TCIRG1, CLCN7, OSTM1, SNX10 and PLEKHM1 lead to osteoclast-rich ARO (in which osteoclasts are abundant but have severely impaired resorptive function)"
    explanation: Comprehensive review confirming that osteoclast-rich ARO results from impaired osteoclast function rather than impaired differentiation.
- name: Defective osteoclast differentiation (osteoclast-poor forms)
  description: >
    A subset of ARO cases result from mutations in TNFSF11 (encoding RANKL) or
    TNFRSF11A (encoding RANK), which are essential for osteoclast differentiation
    from monocyte-macrophage precursors. These osteoclast-poor forms lack mature
    osteoclasts entirely. In TNFSF11 (RANKL) deficiency, the defect lies in the
    bone microenvironment (osteoblasts fail to produce RANKL), so HSCT does not
    correct the phenotype. In contrast, TNFRSF11A (RANK) mutations affect the
    hematopoietic osteoclast precursors themselves, so HSCT can theoretically
    provide functional RANK-expressing donor monocytes.
  cell_types:
  - preferred_term: osteoclast
