    explanation: Confirms the lethal nature of infantile osteopetrosis from osteoclast resorption failure.
phenotypes:
- category: Skeletal
  name: Increased bone density
  frequency: OBLIGATE
  description: >
    Generalized osteosclerosis is the hallmark radiographic finding in all forms
    of osteopetrosis. Dense, sclerotic bone is visible throughout the skeleton,
    often with loss of corticomedullary differentiation. In ADO2, characteristic
    endbone (sandwich vertebra) and bone-within-bone patterns are seen.
  phenotype_term:
    preferred_term: Increased bone mineral density
    term:
      id: HP:0011001
      label: Increased bone mineral density
  evidence:
  - reference: PMID:37465191
    reference_title: "Clinical, genetic aspects and molecular pathogenesis of osteopetrosis."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "increased bone density caused by imbalances in bone formation and remodeling, leading to structural changes in bone tissue"
    explanation: Describes increased bone density as the main feature resulting from imbalanced remodeling.
  - reference: PMID:28655174
    reference_title: "Diagnosis and Management of Osteopetrosis: Consensus Guidelines From the Osteopetrosis Working Group."
    supports: SUPPORT
    evidence_source: OTHER
    snippet: "Osteopetrosis encompasses a group of rare metabolic bone diseases characterized by impaired osteoclast activity or development, resulting in high bone mineral density"
    explanation: Consensus guidelines confirm high bone mineral density as the defining feature of all osteopetrosis forms.
- category: Skeletal
  name: Pathologic fractures
  frequency: FREQUENT
  description: >
    Despite increased density, osteopetrotic bone is brittle due to disorganized
    microarchitecture and failure of normal remodeling. Pathologic fractures are
    common in both ARO and ADO2, particularly affecting the femur.
  phenotype_term:
    preferred_term: Pathologic fracture
    term:
      id: HP:0002756
      label: Pathologic fracture
  evidence:
  - reference: PMID:37465191
    reference_title: "Clinical, genetic aspects and molecular pathogenesis of osteopetrosis."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "predisposition to fractures, skeletal deformities"
    explanation: Review identifies fracture predisposition as a key clinical feature.
- category: Neurological
  name: Optic nerve compression
  frequency: FREQUENT
  subtype: ARO
  description: >
    Narrowing of the optic canals by unresorbed bone compresses the optic nerves,
    leading to progressive visual loss and optic atrophy. This is one of the
    earliest and most devastating complications in infantile ARO.
  phenotype_term:
    preferred_term: Optic atrophy from cranial nerve compression
    term:
      id: HP:0007958
      label: Optic atrophy from cranial nerve compression
  evidence:
  - reference: PMID:28655174
    reference_title: "Diagnosis and Management of Osteopetrosis: Consensus Guidelines From the Osteopetrosis Working Group."
    supports: SUPPORT
    evidence_source: OTHER
    snippet: "ongoing monitoring for changes in mineral metabolism and other complications, including cranial nerve impingement"
    explanation: Consensus guidelines recommend monitoring for cranial nerve impingement, confirming optic nerve compression as a recognized complication.
- category: Neurological
  name: Hearing loss
  frequency: FREQUENT
  description: >
    Conductive and sensorineural hearing loss result from bony overgrowth in
    the temporal bone, affecting both the ossicles and the cochlear nerve.
    Hearing impairment occurs in both ARO and ADO2.
  phenotype_term:
    preferred_term: Hearing impairment
    term:
      id: HP:0000365
      label: Hearing impairment
  evidence:
  - reference: PMID:19802031
    reference_title: "Characterization and management of hypercalcemia following transplantation for osteopetrosis."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "cranial nerve deficits leading to blindness or deafness"
    explanation: Clinical series confirms cranial nerve deficits including deafness as a presenting feature in osteopetrosis.
- category: Hematologic
  name: Pancytopenia
  frequency: FREQUENT
  subtype: ARO
  description: >
    Obliteration of the marrow cavity by dense bone leads to progressive bone
    marrow failure with anemia, thrombocytopenia, and leukopenia. This is the
    principal life-threatening complication in infantile ARO.
  phenotype_term:
    preferred_term: Pancytopenia
    term:
      id: HP:0001876
      label: Pancytopenia
  evidence:
  - reference: PMID:28655174
    reference_title: "Diagnosis and Management of Osteopetrosis: Consensus Guidelines From the Osteopetrosis Working Group."
    supports: SUPPORT
    evidence_source: OTHER
    snippet: "ongoing monitoring for changes in mineral metabolism and other complications, including cranial nerve impingement, anemia, leukopenia, and dental disease"
    explanation: Consensus guidelines recommend monitoring for anemia and leukopenia, key components of pancytopenia.
  - reference: PMID:9849690
    reference_title: "Hematopoietic stem cell transplantation for infantile osteopetrosis."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Infantile osteopetrosis is a lethal disorder resulting from a severe defect in the ability of osteoclasts to resorb bone"
    explanation: Confirms that the lethal nature of infantile ARO stems from osteoclast failure, with bone marrow failure as the primary mechanism of mortality.
- category: Hematologic
  name: Hepatosplenomegaly
  frequency: FREQUENT
  subtype: ARO
  description: >
    Compensatory extramedullary hematopoiesis in the liver and spleen causes
    hepatosplenomegaly. This is a hallmark of the infantile form and reflects
    the displacement of hematopoietic tissue from obliterated marrow cavities.
  phenotype_term:
    preferred_term: Hepatosplenomegaly
    term:
