name: Osteopetrosis
creation_date: "2026-04-02T00:00:00Z"
updated_date: "2026-04-03T12:00:00Z"
category: Mendelian
description: >
  Osteopetrosis (marble bone disease) is a group of heritable skeletal disorders
  characterized by increased bone density resulting from defective osteoclast-mediated
  bone resorption. The clinical spectrum ranges from the severe autosomal recessive
  infantile form (ARO), which is life-threatening in infancy due to bone marrow failure,
  to the milder autosomal dominant adult form (ADO2), which may be incidentally discovered
  on radiographs. Mutations in genes essential for osteoclast differentiation or
  acidification of the resorption lacuna (TCIRG1, CLCN7, OSTM1, SNX10, TNFSF11, TNFRSF11A)
  underlie most cases. Hematopoietic stem cell transplantation is curative for
  osteoclast-rich ARO forms, whereas osteoclast-poor forms caused by defective RANKL
  signaling do not respond to transplantation.
