- name: SCN9A
  gene_term:
    preferred_term: SCN9A
    term:
      id: hgnc:10597
      label: SCN9A
  association: Gain-of-function causal variant in a minority of primary cases
  evidence:
  - reference: PMID:39850993
    reference_title: Genetic Variants in the SCN9A Gene are Detected in a Minority of Erythromelalgia Patients.
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Overall, in this cohort only 4/34 (11.7%) of unrelated patients had erythromelalgia likely caused by gain-of-function variants in SCN9A.
    explanation: This supports SCN9A as an established but minority cause of primary erythromelalgia.
