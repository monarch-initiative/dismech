- name: Multimodal pain management
  treatment_term:
    preferred_term: pain management
    term:
      id: MAXO:0000457
      label: pain management
  description: >-
    Management is individualized and focuses on pain reduction, flare
    prevention, and avoidance of unsafe cooling behaviors.
