name: erythromelalgia
creation_date: '2026-04-13T04:00:00Z'
updated_date: '2026-04-13T23:10:00Z'
description: >-
  Erythromelalgia is a rare painful neurovascular syndrome characterized by
  episodic burning pain, erythema, and warmth of the distal extremities that is
  precipitated by heat and relieved by cooling. The condition is mechanistically
  heterogeneous and may be primary, secondary to systemic disease such as
  myeloproliferative neoplasms, or associated with sodium-channel
  gain-of-function in a subset of genetically defined cases.
category: Complex
parents:
- disease
disease_term:
  preferred_term: erythromelalgia
  term:
    id: MONDO:0016028
    label: erythromelalgia
has_subtypes:
- name: Primary erythromelalgia
  description: Genetically defined or familial erythromelalgia, often involving neuronal sodium-channel dysfunction.
- name: Secondary erythromelalgia
  description: Erythromelalgia occurring secondary to another disorder such as a myeloproliferative neoplasm.
pathophysiology:
- name: Neurovascular dysregulation
  description: >-
    Erythromelalgia is best understood as a heterogeneous neurovascular pain
    syndrome rather than a single-gene disorder, with altered sensory signaling
    and vascular regulation contributing to flares.
  evidence:
  - reference: PMID:37364617
    reference_title: "Erythromelalgia. Part I: Pathogenesis, clinical features, evaluation, and complications."
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Erythromelalgia is a rare pain disorder that is underrecognized and difficult-to-treat.
    explanation: This supports the syndrome-level framing as a rare neurovascular pain disorder.
  downstream:
  - target: Microvascular arteriovenous shunting
    description: A neurovascular flare state can produce abnormal distal perfusion patterns.
  - target: Distal extremity pain flares
    description: Neurovascular dysfunction drives recurrent painful attacks in distal extremities.
- name: Microvascular arteriovenous shunting
  description: >-
    One long-standing pathogenic model proposes that abnormal microvascular
    arteriovenous shunting contributes to the hot, erythematous, painful flare
    phenotype.
  evidence:
  - reference: PMID:15075045
    reference_title: Erythromelalgia.
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      A wide variety of etiological conditions can cause erythromelalgia, all having a single common pathogenetic mechanism - microvascular arteriovenous shunting.
    explanation: This review directly states the classic microvascular shunting hypothesis.
  downstream:
  - target: Distal extremity pain flares
    description: Abnormal shunting contributes to red, hot, painful distal attacks.
- name: Distal extremity pain flares
  description: >-
    The final common clinical expression is recurrent burning pain with
    erythema in the distal extremities, exacerbated by heat and alleviated by
    cooling.
  evidence:
  - reference: PMID:37364617
    reference_title: "Erythromelalgia. Part I: Pathogenesis, clinical features, evaluation, and complications."
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      It is characterized by episodes of extremity erythema and pain that can be disabling
    explanation: This directly supports the final symptomatic flare phenotype.
- name: SCN9A-mediated Nav1.7 hyperexcitability subset
  description: >-
    A subset of primary erythromelalgia cases is caused or modified by
    gain-of-function SCN9A variants that increase Nav1.7-dependent nociceptor
    excitability.
  genes:
  - preferred_term: SCN9A
    term:
      id: hgnc:10597
      label: SCN9A
  biological_processes:
  - preferred_term: membrane depolarization
    modifier: ABNORMAL
    term:
      id: GO:0051899
      label: membrane depolarization
  evidence:
  - reference: PMID:39850993
    reference_title: Genetic Variants in the SCN9A Gene are Detected in a Minority of Erythromelalgia Patients.
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Gain-of-function variants in the voltage-gated sodium channel Nav1.7, encoded by the SCN9A gene, have previously been identified in patients with erythromelalgia
    explanation: This directly supports SCN9A-mediated primary erythromelalgia as a mechanistic subset.
  - reference: PMID:29299961
    reference_title: Erythromelalgia.
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Primary erythromelalgia is nowadays considered to be a genetically determined neuropathic disorder affecting SCN9A, SCN10A, and SCN11A coding for NaV1.7, NaV1.8, and NaV1.9 neuronal sodium channels.
    explanation: This supports neuronal sodium-channel dysfunction as a primary-disease subset mechanism.
  downstream:
  - target: Distal extremity pain flares
    description: Sensory neuron hyperexcitability feeds into the final painful flare phenotype.
