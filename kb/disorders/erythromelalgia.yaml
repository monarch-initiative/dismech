diagnosis:
- name: Clinical diagnosis based on characteristic flares
  description: >-
    Diagnosis is primarily clinical and rests on episodic distal extremity pain,
    erythema, heat sensitivity, and cooling relief.
  results: Characteristic recurrent hot, red, painful extremity episodes support the diagnosis.
  evidence:
  - reference: PMID:29299961
    reference_title: Erythromelalgia.
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Diagnosis is made by ascertaining the typical clinical features.
    explanation: This directly supports clinical diagnosis.
- name: Genetic testing for primary cases
  diagnosis_term:
    preferred_term: genetic testing
    term:
      id: MAXO:0000127
      label: genetic testing
  description: >-
    Genetic evaluation is recommended in early-onset or familial cases to
    identify primary sodium-channel-related disease.
  results: Pathogenic variant in SCN9A or related sodium-channel genes supports primary erythromelalgia.
  evidence:
  - reference: PMID:29299961
    reference_title: Erythromelalgia.
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Genetic testing is recommended, especially in premature cases and in cases of family clustering
    explanation: This directly supports genetic testing in suspected primary disease.
differential_diagnoses:
- name: Complex regional pain syndrome
  disease_term:
    preferred_term: complex regional pain syndrome
    term:
      id: MONDO:0019369
      label: complex regional pain syndrome
  description: >-
    CRPS overlaps through painful red extremities but usually has a different
    precipitating context and autonomic pattern.
  evidence:
  - reference: PMID:37364616
    reference_title: "Erythromelalgia. Part II: Differential diagnoses and management."
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      This text is focused on the management of erythromelalgia and several other incompletely understood and under-recognized neurovascular disorders such as red scrotum syndrome, red ear syndrome, facial flushing, and complex regional pain syndrome.
    explanation: This directly identifies CRPS as a clinically relevant differential.
- name: Fabry disease
  disease_term:
    preferred_term: Fabry disease
    term:
      id: MONDO:0010526
      label: Fabry disease
  description: >-
    Fabry disease can mimic painful acral burning and should be considered in
    patients with neuropathic pain plus systemic lysosomal features.
