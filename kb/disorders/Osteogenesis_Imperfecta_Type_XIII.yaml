- name: Umbilical Hernia
  description: >-
    A large umbilical hernia with abdominal contents is a recurrent and
    distinctive extraskeletal feature of BMP1-related OI, present in both
    affected siblings of the founding kindred and mirrored by the consistent
    gut herniation reported in Bmp1-null mice. It is attributed to reduced
    tensile strength of the ventral body wall secondary to defective collagen
    fibril formation (and possibly impaired BMP1 processing of dorsoventral
    patterning factors such as chordin), and is among the features that help
    distinguish BMP1-OI from most other OI types.
  phenotype_term:
    preferred_term: Umbilical hernia
    term:
