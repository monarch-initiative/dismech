name: Osteogenesis Imperfecta Type XIII
creation_date: "2026-06-30T00:00:00Z"
category: Mendelian
disease_term:
  preferred_term: Osteogenesis imperfecta type 13
  term:
    id: MONDO:0013924
    label: osteogenesis imperfecta type 13
description: >-
  Osteogenesis imperfecta type XIII (OI type XIII) is a rare autosomal recessive
  brittle-bone disease caused by biallelic loss-of-function variants in BMP1, the
  gene encoding bone morphogenetic protein 1 and its longer alternatively spliced
  isoform mammalian Tolloid (mTLD). BMP1/mTLD is the procollagen C-proteinase: an
  astacin-family secreted metalloprotease that cleaves the C-terminal propeptide
  (PICP) from types I-III procollagen and also participates in processing of other
  extracellular-matrix substrates including the small leucine-rich proteoglycan
  decorin and activation of lysyl oxidase. Defective BMP1/mTLD proteolytic activity
  leads to delayed/abnormal cleavage of the type I procollagen C-propeptide and
  impaired assembly of mature heterotypic collagen fibrils, producing a defective
  bone collagen matrix with severe skeletal fragility, recurrent fractures from
  early childhood, short stature with limb deformity, and a characteristic and
  unusual feature among OI types: bone fragility paradoxically associated with
  INCREASED (high) bone mineral density and hypermineralization of the bone matrix,
  distinguishing it mechanistically from the chaperone (SERPINH1, FKBP10) and
  3-hydroxylation-complex (CRTAP, P3H1/LEPRE1, PPIB) recessive OI types. The
  disorder was first defined in a consanguineous human kindred and its osteogenic
  role confirmed in a zebrafish bmp1a mutant.
parents:
- Osteogenesis imperfecta
inheritance:
- name: Autosomal Recessive
  description: >-
    Autosomal recessive inheritance from biallelic (homozygous or compound
    heterozygous) loss-of-function BMP1 variants; heterozygous carriers are
    clinically unaffected.
  inheritance_term:
    preferred_term: Autosomal recessive inheritance
    term:
      id: HP:0000007
      label: Autosomal recessive inheritance
  evidence:
  - reference: PMID:22052668
    reference_title: "Identification of a mutation causing deficient BMP1/mTLD proteolytic activity in autosomal recessive osteogenesis imperfecta."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Herein, we have studied a consanguineous Egyptian family with two children
      diagnosed with severe autosomal recessive osteogenesis imperfecta (AR-OI)
    explanation: >-
      Establishes the autosomal recessive inheritance of BMP1-related OI in a
      consanguineous kindred.
pathophysiology:
- name: BMP1/mTLD Loss Abolishes Procollagen C-Proteinase Activity
  description: >-
    BMP1 encodes the secreted astacin metalloprotease bone morphogenetic protein 1
    and its longer isoform mammalian Tolloid (mTLD), which together constitute the
    principal procollagen C-terminal-propeptide (PICP) endopeptidase for type I
    procollagen. Biallelic loss-of-function BMP1 variants (e.g., the protease-domain
    p.Phe249Leu missense and signal-peptide variants) destroy or attenuate this
    proteolytic activity, so excess mutant BMP1/mTLD fails to enhance cleavage of
    the C-terminal propeptide of proalpha1(I). This is a proteolytic (enzymatic)
    lesion, mechanistically distinct from the chaperone and prolyl-3-hydroxylation
    defects of other recessive OI types.
  cell_types:
  - preferred_term: osteoblast
    term:
      id: CL:0000062
      label: osteoblast
  - preferred_term: fibroblast
    term:
      id: CL:0000057
      label: fibroblast
  biological_processes:
  - preferred_term: collagen biosynthetic process (procollagen C-propeptide proteolysis)
    term:
      id: GO:0032964
      label: collagen biosynthetic process
    modifier: DECREASED
  evidence:
  - reference: PMID:22052668
    reference_title: "Identification of a mutation causing deficient BMP1/mTLD proteolytic activity in autosomal recessive osteogenesis imperfecta."
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: >-
      proalpha1(I) cleavage was not enhanced by an excess of the mutant protein,
      proving that the Phe249Leu mutation leads to a BMP1/mTLD protein with
      deficient PICP proteolytic activity.
    explanation: >-
      Demonstrates that the causative BMP1 variant abolishes the procollagen
      C-proteinase (PICP) activity of BMP1/mTLD, the proximal lesion of OI type XIII.
  - reference: PMID:22482805
    reference_title: "Attenuated BMP1 function compromises osteogenesis, leading to bone fragility in humans and zebrafish."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      we found a homozygous causative BMP1 mutation, c.34G>C, in a consanguineous
      family affected by increased bone mineral density and multiple recurrent
      fractures.
    explanation: >-
      Identifies a homozygous BMP1 mutation underlying bone fragility with increased
      bone mineral density, defining the disorder.
  downstream:
  - target: Defective Procollagen Processing and Abnormal Collagen Fibril Assembly
    description: >-
      Without BMP1/mTLD C-proteinase activity, the type I procollagen C-propeptide
      is not cleaved normally, impairing maturation and assembly of collagen fibrils.
- name: Defective Procollagen Processing and Abnormal Collagen Fibril Assembly
  description: >-
    Deficient BMP1/mTLD activity causes delayed cleavage of the type I procollagen
    C-propeptide and also hampers processing of prodecorin, a small leucine-rich
    proteoglycan that regulates collagen fibrillogenesis. The combined defect
    impairs assembly of mature heterotypic type I/V collagen fibrils in the
    extracellular matrix, yielding a structurally abnormal bone collagen scaffold.
  cell_types:
  - preferred_term: fibroblast
    term:
      id: CL:0000057
      label: fibroblast
  - preferred_term: osteoblast
    term:
      id: CL:0000062
      label: osteoblast
  biological_processes:
  - preferred_term: collagen fibril organization
    term:
      id: GO:0030199
      label: collagen fibril organization
    modifier: ABNORMAL
  evidence:
  - reference: PMID:25656619
    reference_title: "Defective Proteolytic Processing of Fibrillar Procollagens and Prodecorin Due to Biallelic BMP1 Mutations Results in a Severe, Progressive Form of Osteogenesis Imperfecta."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      BMP1/mTLD-deficiency in humans not only results in delayed cleavage of the
      type I procollagen C-propeptide but also hampers the processing of the small
      leucine-rich proteoglycan prodecorin, a regulator of collagen fibrillogenesis.
    explanation: >-
      Documents the dual procollagen C-propeptide and prodecorin processing defect
      that disrupts collagen fibrillogenesis in BMP1-related OI.
  - reference: PMID:25656619
    reference_title: "Defective Proteolytic Processing of Fibrillar Procollagens and Prodecorin Due to Biallelic BMP1 Mutations Results in a Severe, Progressive Form of Osteogenesis Imperfecta."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      transmission electron microscopy of the dermis show impaired assembly of
      heterotypic type I/V collagen fibrils in the ECM.
    explanation: >-
      Demonstrates impaired heterotypic collagen fibril assembly resulting from
      BMP1/mTLD deficiency.
  downstream:
  - target: Abnormally Mineralized Bone Matrix and Skeletal Fragility
    description: >-
      The defective collagen scaffold yields an abnormally mineralized bone matrix
      that, despite high mineral content, is mechanically weak and fracture-prone.
- name: Abnormally Mineralized Bone Matrix and Skeletal Fragility
  description: >-
    The abnormal collagen matrix in BMP1/mTLD deficiency mineralizes aberrantly:
    histomorphometry shows hyperosteoidosis with delayed onset of mineralization,
    yet the mineralized matrix becomes hypermineralized (high calcium content). The
    net result is bone that is paradoxically dense (high areal bone mineral density)
    but mechanically brittle, producing recurrent fractures, deformity, and short
    stature. This high-bone-mass fragility distinguishes OI type XIII from the
    typically low-density recessive OI types.
  cell_types:
  - preferred_term: osteoblast
    term:
      id: CL:0000062
      label: osteoblast
  biological_processes:
  - preferred_term: bone mineralization
    term:
      id: GO:0030282
      label: bone mineralization
    modifier: ABNORMAL
  - preferred_term: ossification
    term:
      id: GO:0001503
      label: ossification
    modifier: ABNORMAL
  evidence:
  - reference: PMID:24091809
    reference_title: "Hyperosteoidosis and hypermineralization in the same bone: bone tissue analyses in a boy with a homozygous BMP1 mutation."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      It thus appears that disturbed C-propeptide cleavage impairs mineralization
      in two ways: first, the onset of mineralization is delayed, leading to an
      increased amount of unmineralized osteoid, and second, once mineralization
      starts, too much mineral is incorporated into the bone matrix, resulting in
      hypermineralization.
    explanation: >-
      Documents the dual mineralization defect (hyperosteoidosis plus
      hypermineralization) of the bone matrix in BMP1-related OI.
  - reference: PMID:22482805
    reference_title: "Attenuated BMP1 function compromises osteogenesis, leading to bone fragility in humans and zebrafish."
    supports: SUPPORT
    evidence_source: MODEL_ORGANISM
    snippet: >-
      Bmp1a is critically required for mature-collagen generation, downstream of
      osteoblast maturation, in bone.
    explanation: >-
      Zebrafish bmp1a data establish that BMP1 is required downstream of osteoblast
      maturation for mature collagen generation in bone, underlying the matrix
      fragility.
genetic:
- name: BMP1 Loss-of-Function Mutation
  association: Causative
  gene_term:
    preferred_term: BMP1 (procollagen C-proteinase / mammalian Tolloid)
    term:
      id: hgnc:1067
      label: BMP1
  notes: >-
    OI type XIII is caused by biallelic (homozygous or compound heterozygous)
    loss-of-function variants in BMP1, encoding the procollagen C-proteinase BMP1
    and its longer isoform mTLD. Reported alleles include the protease-domain
    p.Phe249Leu missense, signal-peptide variants (e.g., c.34G>C, p.Gly12Arg), and
    nonsense/frameshift variants. Fewer than 20 affected individuals have been
    reported, with a phenotype ranging from mild to severe/progressively deforming.
  evidence:
  - reference: PMID:22052668
    reference_title: "Identification of a mutation causing deficient BMP1/mTLD proteolytic activity in autosomal recessive osteogenesis imperfecta."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      We conclude that BMP1 is an additional gene mutated in AR-OI.
    explanation: >-
      Establishes BMP1 as the causative gene for this autosomal recessive form of OI.
  - reference: PMID:27576954
    reference_title: "Phenotypic variability in patients with osteogenesis imperfecta caused by BMP1 mutations."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      To date, less than 20 individuals with OI have been identified with BMP1
      mutations, with skeletal phenotypes ranging from mild to severe and
      progressively deforming.
    explanation: >-
      Documents the rarity and phenotypic range of BMP1-related OI.
