diagnosis:
- name: Molecular Genetic Diagnosis
  description: >-
    OI type XIII is suspected in a child with severe recessive OI (recurrent
    fractures, deformity) particularly when bone fragility is accompanied by high
    rather than low bone mineral density and COL1A1/COL1A2 testing is negative.
    Diagnosis is confirmed by identifying biallelic BMP1 loss-of-function variants
    by gene-panel or exome sequencing; supportive findings include deficient
    procollagen C-propeptide processing in cultured fibroblasts. Reported patients
    characteristically have no dentinogenesis imperfecta, and extraskeletal
    connective-tissue features (umbilical hernia, joint hyperextensibility,
    variable blue sclerae) can further support the diagnosis.
  diagnosis_term:
    preferred_term: molecular genetic testing
    term:
      id: MAXO:0000533
      label: molecular genetic testing
  evidence:
  - reference: PMID:22052668
    reference_title: "Identification of a mutation causing deficient BMP1/mTLD proteolytic activity in autosomal recessive osteogenesis imperfecta."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Mutation analysis identified both patients with a Phe249Leu homozygous
      missense change within the BMP1 protease domain
    explanation: >-
      Molecular identification of biallelic BMP1 variants establishes the diagnosis
      of OI type XIII.
treatments:
- name: Bisphosphonate Therapy
  description: >-
    Intravenous bisphosphonates are widely used in severe OI to reduce fracture
    frequency. In BMP1-related OI, however, they must be used with caution because
    the bone material density is already very high; antiresorptive therapy has been
    reduced or discontinued in some patients over concerns about increasing bone
    stiffness and chalk-stick fractures.
  treatment_term:
    preferred_term: Bisphosphonate Therapy
    term:
      id: NCIT:C198585
      label: Bisphosphonate Therapy
  evidence:
  - reference: PMID:27576954
    reference_title: "Phenotypic variability in patients with osteogenesis imperfecta caused by BMP1 mutations."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Intravenous bisphosphonate therapy was started in all patients, but
      discontinued in two patients and reduced in another due to concerns about
      increasing bone stiffness leading to chalk-stick fractures.
    explanation: >-
      Documents the use and the BMP1-specific caution around bisphosphonate therapy
      in this high-bone-density form of OI.
- name: Orthopedic Surgery
  description: >-
    Intramedullary (telescoping) rod fixation and corrective osteotomy stabilize
    fracture-prone, deformed long bones; spinal surgery addresses progressive
    kyphoscoliosis.
  treatment_term:
    preferred_term: surgical procedure
    term:
      id: MAXO:0000004
      label: surgical procedure
  evidence:
  - reference: PMID:20301472
    reference_title: "COL1A1- and COL1A2-Related Osteogenesis Imperfecta."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      intramedullary rodding when
      indicated to provide anatomic positioning of limbs
    explanation: >-
      GeneReviews documents intramedullary rodding as standard orthopedic
      management for OI long-bone fractures and deformity, applicable to OI type XIII.
- name: Physical Therapy and Rehabilitation
  description: >-
    Physical and occupational therapy improve mobility and muscle strength and
    prevent contractures; early physical therapy follows brief post-fracture
    immobilization.
  treatment_term:
    preferred_term: physical therapy
    term:
      id: MAXO:0000011
      label: physical therapy
  evidence:
  - reference: PMID:20301472
    reference_title: "COL1A1- and COL1A2-Related Osteogenesis Imperfecta."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Fractures are treated with as
      short a period of immobility as is practical, small and lightweight casts, and
      physical therapy as soon as casts are removed
    explanation: >-
      GeneReviews documents early physical therapy and brief immobilization as part
      of standard OI fracture rehabilitation, applicable to OI type XIII.
