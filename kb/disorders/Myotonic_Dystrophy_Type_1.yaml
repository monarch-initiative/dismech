name: Myotonic Dystrophy Type 1
creation_date: "2026-03-06T00:00:00Z"
updated_date: "2026-03-06T00:00:00Z"
description: >
  Myotonic dystrophy type 1 (DM1), also known as Steinert disease, is an autosomal
  dominant multisystem disorder caused by expansion of a CTG trinucleotide repeat
  in the 3'-untranslated region of the DMPK gene. It is the most common form of
  adult-onset muscular dystrophy. The expanded CUG repeat RNA is retained in nuclear
  foci where it sequesters MBNL1 splicing regulators, causing widespread
  mis-splicing of downstream target genes. Clinical features include myotonia,
  progressive muscle weakness and wasting, cardiac conduction defects, cataracts,
  endocrine abnormalities, and cognitive impairment. Disease severity generally
  correlates with repeat expansion size.
category: Mendelian
disease_term:
  preferred_term: Myotonic Dystrophy Type 1
  term:
    id: MONDO:0008056
    label: myotonic dystrophy type 1
parents:
- Muscular Dystrophy
- Trinucleotide Repeat Disorder
prevalence:
- population: Global
  percentage: "0.005"
  notes: Estimated prevalence of approximately 1 in 8,000-20,000 individuals.
progression:
- phase: Onset
  age_range: Adolescence to adulthood
  notes: Classic adult-onset form typically presents in second to fourth decade.
    Congenital form (CDM1) presents at birth with severe manifestations.
pathophysiology:
- name: Toxic RNA Gain-of-Function
  description: >
    The expanded CTG repeat in DMPK is transcribed into CUG repeat-containing RNA
    that forms hairpin structures and is retained in nuclear foci. This mutant RNA
    sequesters MBNL1, a key splice regulator protein, depleting it from the
    nucleoplasm and causing mis-splicing of numerous downstream genes in muscle
    and other tissues.
  cell_types:
  - preferred_term: skeletal muscle cell
    term:
      id: CL:0000187
      label: muscle cell
  biological_processes:
  - preferred_term: RNA splicing
    term:
      id: GO:0008380
      label: RNA splicing
  locations:
  - preferred_term: skeletal muscle tissue
    term:
      id: UBERON:0001134
      label: skeletal muscle tissue
  evidence:
  - reference: PMID:12351998
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "In both types of myotonic dystrophy the expanded repeat is transcribed
      and the RNA produced from the mutant allele is retained in nuclear inclusions.
      Recent studies suggest that the mutant RNA has a toxic effect on muscle fibers
      by interfering with the essential functions of the myonucleus, such as RNA
      processing."
    explanation: Confirms the toxic RNA gain-of-function mechanism in myotonic dystrophy.
  - reference: PMID:18974556
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Mutant RNA sequesters MBNL1, a splice regulator protein and depletes
      MBNL1 from the nucleoplasm. Loss of MBNL1 results in altered splicing of
      ClC-1 mRNA."
    explanation: Describes MBNL1 sequestration leading to chloride channel mis-splicing
      and myotonia.
- name: Chloride Channel Mis-splicing and Myotonia
  description: >
    MBNL1 sequestration causes mis-splicing of the chloride channel gene CLCN1,
    leading to loss of functional chloride channels in skeletal muscle membranes.
    Reduced chloride conductance causes membrane hyperexcitability and myotonia.
  cell_types:
  - preferred_term: skeletal muscle cell
    term:
      id: CL:0000187
      label: muscle cell
  biological_processes:
  - preferred_term: RNA splicing
    term:
      id: GO:0008380
      label: RNA splicing
  locations:
  - preferred_term: skeletal muscle tissue
    term:
      id: UBERON:0001134
      label: skeletal muscle tissue
  evidence:
  - reference: PMID:18974556
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Altered splice products do not encode functional ClC-1 protein.
      Subsequent loss of chloride conductance in muscle membrane causes myotonia
      in the myotonic dystrophies."
    explanation: Explains the molecular mechanism linking MBNL1 depletion to chloride
      channel dysfunction and myotonia.
phenotypes:
- category: Musculoskeletal
  name: Myotonia
  frequency: VERY_FREQUENT
  diagnostic: true
  description: >
    Myotonia, the hallmark symptom, is characterized by delayed relaxation of
    skeletal muscle after contraction. Patients describe stiffness that improves
    with repeated muscle contractions (warm-up phenomenon).
  phenotype_term:
    preferred_term: Myotonia
    term:
      id: HP:0002486
      label: Myotonia
  evidence:
  - reference: PMID:18974556
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Myotonia reflects a state of muscle fiber hyperexcitability. Impaired
      transmembrane conductance of either chloride or sodium ions results in
      myotonia."
    explanation: Confirms myotonia as the defining feature resulting from ion channel
      dysfunction.
- category: Musculoskeletal
  name: Progressive Muscle Weakness
  frequency: VERY_FREQUENT
  description: >
    Progressive skeletal muscle weakness and wasting, particularly affecting
    distal muscles initially (grip, ankle dorsiflexors), with later involvement
    of proximal muscles and facial muscles.
  phenotype_term:
    preferred_term: Muscle weakness
    term:
      id: HP:0001324
      label: Muscle weakness
  evidence:
  - reference: PMID:28780071
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Myotonic dystrophy type 1 (DM1) is a rare multisystemic neuromuscular
      disorder caused by expansion of CTG trinucleotide repeats in the noncoding
      region of the DMPK gene."
    explanation: DM1 is a neuromuscular disorder with progressive weakness as a core
      feature.
- category: Ophthalmologic
  name: Cataracts
  frequency: VERY_FREQUENT
  description: >
    Posterior subcapsular cataracts are a characteristic finding, often present
    before age 50. Iridescent multicolored opacities (Christmas tree cataracts)
    are pathognomonic for DM1.
  phenotype_term:
    preferred_term: Cataract
    term:
      id: HP:0000518
      label: Cataract
- category: Cardiac
  name: Cardiac Conduction Defects
  frequency: FREQUENT
  description: >
    Cardiac involvement includes conduction abnormalities (first-degree AV block,
    bundle branch block), arrhythmias, and cardiomyopathy. Cardiac complications
    are a leading cause of death in DM1.
  phenotype_term:
    preferred_term: Cardiomyopathy
    term:
      id: HP:0001638
      label: Cardiomyopathy
- category: Endocrine
  name: Insulin Resistance and Diabetes
  frequency: FREQUENT
  description: >
    Endocrine manifestations include insulin resistance, diabetes mellitus,
    hypogonadism in males, and thyroid dysfunction.
  phenotype_term:
    preferred_term: Diabetes mellitus
    term:
      id: HP:0000819
      label: Diabetes mellitus
- category: Neurologic
  name: Cognitive Impairment
  frequency: FREQUENT
  description: >
    Central nervous system involvement includes cognitive impairment, excessive
    daytime somnolence, and apathy. Congenital DM1 is associated with severe
    intellectual disability.
  phenotype_term:
    preferred_term: Intellectual disability
    term:
      id: HP:0001249
      label: Intellectual disability
- category: Respiratory
  name: Respiratory Insufficiency
  frequency: FREQUENT
  description: >
    Respiratory failure from weakness of the diaphragm and intercostal muscles
    is a major cause of morbidity and mortality.
  phenotype_term:
    preferred_term: Respiratory insufficiency
    term:
      id: HP:0002093
      label: Respiratory insufficiency
genetic:
- name: DMPK
  association: CTG Trinucleotide Repeat Expansion
  presence: Positive
  notes: >
    Expansion of CTG repeats in the 3'-UTR of DMPK on chromosome 19q13.3.
    Normal alleles have 5-34 repeats; affected individuals have 50 to >1000 repeats.
    Congenital DM1 is associated with very large expansions (>1000 repeats).
    Genetic anticipation occurs, with repeat length increasing across generations.
  evidence:
  - reference: PMID:31326502
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Myotonic Dystrophy type 1 (DM1) is a neuromuscular disease showing
      strong genetic anticipation, and is caused by the expansion of a CTG repeat
      tract in the 3'-UTR of the DMPK gene."
    explanation: Confirms the CTG expansion in DMPK as the causative mutation with
      genetic anticipation.
treatments:
- name: Pharmacotherapy for Myotonia
  description: >
    Mexiletine is the most commonly used antimyotonia agent. Other options include
    phenytoin and carbamazepine for symptomatic relief of myotonia.
  treatment_term:
    preferred_term: pharmacotherapy
    term:
      id: MAXO:0000058
      label: pharmacotherapy
- name: Cardiac Monitoring and Pacemaker
  description: >
    Regular cardiac monitoring with ECG and Holter is essential. Pacemaker or
    implantable cardioverter-defibrillator may be required for conduction defects
    or arrhythmias.
  treatment_term:
    preferred_term: surgical procedure
    term:
      id: MAXO:0000004
      label: surgical procedure
- name: Supportive Care
  description: >
    Multidisciplinary care including physical therapy, speech therapy, respiratory
    support (non-invasive ventilation), and ophthalmologic surveillance.
  treatment_term:
    preferred_term: supportive care
    term:
      id: MAXO:0000950
      label: supportive care
- name: Genetic Counseling
  description: >
    Genetic counseling is essential given autosomal dominant inheritance with
    anticipation. Congenital DM1 is almost exclusively maternally transmitted.
  treatment_term:
    preferred_term: genetic counseling
    term:
      id: MAXO:0000079
      label: genetic counseling
