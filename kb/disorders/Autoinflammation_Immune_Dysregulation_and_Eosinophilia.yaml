  - reference: PMID:32750333
    reference_title: "Complex Autoinflammatory Syndrome Unveils Fundamental Principles of JAK1 Kinase Transcriptional and Biochemical Function."
    supports: SUPPORT
    evidence_source: IN_VITRO
