notes: 'Key PMIDs for this entry: 25205257 (MMA/PA guidelines), 35348993 (neuropsych review), 37078237 (pathophysiology/methylmalonylation), 37243446 (biomarkers), 38760822 (lysosomal-autophagy), 38030482 (MMA in aging/disease), 37169781 (renal mitochondrial), 38271099 (lipodystrophy/FGF21), 39075538 (NBS China outcomes), 38132258 (cardiac OA cohort), 33422927 (transplant meta-analysis). The 2023-2024 literature supports a multi-hit pathophysiology model integrating metabolite accumulation, mitochondrial energy metabolism dysfunction, protein hyperacylation/methylmalonylation with impaired sirtuin deacylation, and organelle quality-control failure (mitophagy plus lysosome/autophagy dysfunction). Emerging therapies include mRNA replacement (mRNA-3705) and gene therapy approaches, with FGF21/GDF15/LCN2 as biomarkers for clinical trial endpoints.

  '
