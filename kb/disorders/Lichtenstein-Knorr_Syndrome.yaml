      explanation: States autosomal recessive inheritance.
  variants:
  - name: p.Gly305Arg (c.913G>A)
    description: >
      Homozygous missense variant in the founding consanguineous family,
      affecting a highly conserved residue in the eighth transmembrane segment of
      NHE1; causes near-complete de-glycosylation, mistargeting, and loss of
      proton-pumping activity.
    evidence:
    - reference: PMID:25205112
      reference_title: "Mutation of SLC9A1, encoding the major Na⁺/H⁺ exchanger, causes ataxia-deafness Lichtenstein-Knorr syndrome."
      supports: SUPPORT
      evidence_source: HUMAN_CLINICAL
      snippet: "Mutant glycine 305 is a highly conserved amino acid present in the eighth transmembrane segment of all metazoan orthologues of NHE1, the Na(+)/H(+) exchanger 1, encoded by SLC9A1."
      explanation: Documents the p.Gly305Arg variant and the conserved transmembrane residue it affects.
  - name: p.Ile288Serfs*9 (c.862del)
    description: >
      Homozygous truncating frameshift variant identified in two affected
      siblings with cerebellar ataxia without hearing loss, expanding the SLC9A1
      mutational and phenotypic spectrum.
    evidence:
    - reference: PMID:30018422
      reference_title: "A novel SLC9A1 mutation causes cerebellar ataxia."
      supports: SUPPORT
      evidence_source: HUMAN_CLINICAL
      snippet: "we identified a novel homozygous SLC9A1 truncating mutation, c.862del (p.Ile288Serfs*9), in two affected siblings"
      explanation: Documents a biallelic truncating variant supporting loss of function.
  features: >
    SLC9A1 encodes NHE1, the major plasma-membrane Na+/H+ exchanger. Biallelic
    loss-of-function variants (missense abolishing transport, or truncating
    frameshift) cause Lichtenstein-Knorr syndrome / SCAR19.
  evidence:
  - reference: PMID:30018422
    reference_title: "A novel SLC9A1 mutation causes cerebellar ataxia."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "c.913G>A (p.Gly305Arg), which caused Lichtenstein-Knorr syndrome characterized by cerebellar ataxia and sensorineural hearing loss"
    explanation: Confirms the SLC9A1 p.Gly305Arg genotype-phenotype relationship for Lichtenstein-Knorr syndrome.
