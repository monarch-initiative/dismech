name: Lichtenstein-Knorr Syndrome
creation_date: "2026-06-04T12:00:00Z"
category: Mendelian
synonyms:
- LIKNS
- SCAR19
- Spinocerebellar ataxia, autosomal recessive 19
- SLC9A1-related spinocerebellar ataxia syndrome
- Ataxia-deafness Lichtenstein-Knorr syndrome
- Progressive autosomal recessive ataxia-sensorineural hearing loss syndrome
description: >
  Lichtenstein-Knorr syndrome (LIKNS; SCAR19) is a very rare autosomal recessive
  neurodegenerative disorder that associates progressive cerebellar ataxia with
  severe progressive sensorineural hearing loss. It is caused by biallelic
  loss-of-function variants in SLC9A1, which encodes NHE1 (sodium/hydrogen
  exchanger isoform 1), the major plasma-membrane Na+/H+ exchanger. NHE1
  maintains intracellular pH homeostasis by exchanging one intracellular proton
  for one extracellular sodium ion. The founding family carried a homozygous
  p.Gly305Arg missense mutation that causes near-complete de-glycosylation,
  mistargeting, and loss of proton-pumping activity of NHE1; subsequent families
  carry truncating variants. Loss of NHE1 function dysregulates intracellular pH
  in the central nervous system, producing selective neuronal vulnerability
  (cerebellar/Purkinje neurons and cochlear hair cells), recapitulated by the
  spontaneous and knockout Slc9a1 ("swe", slow-wave epilepsy) mouse models that
  show ataxia, seizures, and selective neuronal cell death. Deafness is variable
  and may be absent in some SLC9A1-mutated patients, so it may not be an
  essential phenotypic feature. Management is supportive (hearing aids or
  cochlear implantation, rehabilitation, and seizure control).
