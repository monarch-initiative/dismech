    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Lichtenstein-Knorr syndrome is an autosomal recessive condition that associates sensorineural hearing loss and cerebellar ataxia."
    explanation: Defines cerebellar ataxia as a core feature of the syndrome.
  - reference: PMID:30018422
    reference_title: "A novel SLC9A1 mutation causes cerebellar ataxia."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "The patients showed cerebellar ataxia but neither of them showed sensorineural hearing loss nor a neuromuscular phenotype."
    explanation: A second family confirms cerebellar ataxia as a consistent feature of SLC9A1-related disease.
