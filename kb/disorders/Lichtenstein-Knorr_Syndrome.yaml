pathophysiology:
- name: SLC9A1 (NHE1) loss of function
  description: >
    Biallelic SLC9A1 variants cause loss of function of NHE1, the major
    plasma-membrane sodium/hydrogen exchanger. In the founding consanguineous
    family the homozygous p.Gly305Arg (c.913G>A) missense variant, affecting a
    highly conserved residue in the eighth transmembrane segment, causes
    near-complete de-glycosylation, mistargeting, and loss of proton-pumping
    activity of NHE1; truncating variants such as p.Ile288Serfs*9 also cause
    disease.
  genes:
  - preferred_term: SLC9A1
    term:
      id: hgnc:11071
      label: SLC9A1
  molecular_functions:
  - preferred_term: sodium:proton antiporter activity
    term:
      id: GO:0015385
      label: sodium:proton antiporter activity
    modifier: DECREASED
  evidence:
  - reference: PMID:25205112
    reference_title: "Mutation of SLC9A1, encoding the major Na⁺/H⁺ exchanger, causes ataxia-deafness Lichtenstein-Knorr syndrome."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "we identified the homozygous p.Gly305Arg missense mutation in SLC9A1 that segregates with the disease in a large consanguineous family"
    explanation: Identifies SLC9A1 as the disease gene with a homozygous missense mutation segregating in the affected family.
  - reference: PMID:25205112
    reference_title: "Mutation of SLC9A1, encoding the major Na⁺/H⁺ exchanger, causes ataxia-deafness Lichtenstein-Knorr syndrome."
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: "We demonstrate that the p.Gly305Arg mutation causes the near complete de-glycosylation, mis-targeting and loss of proton pumping activity of NHE1."
    explanation: Functional assays demonstrate the variant abolishes NHE1 proton-pumping activity, establishing loss of function.
  - reference: PMID:30018422
    reference_title: "A novel SLC9A1 mutation causes cerebellar ataxia."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "we identified a novel homozygous SLC9A1 truncating mutation, c.862del (p.Ile288Serfs*9), in two affected siblings"
    explanation: Documents an additional biallelic truncating SLC9A1 variant causing the disorder, supporting a loss-of-function mechanism.
  downstream:
  - target: Impaired intracellular pH homeostasis
    causal_link_type: DIRECT
    description: Loss of NHE1 proton extrusion directly impairs regulation of intracellular pH.
- name: Impaired intracellular pH homeostasis
  description: >
    NHE1 maintains intracellular pH by exchanging one intracellular proton for
    one extracellular sodium ion. Loss of NHE1 function leads to dysregulated
    intracellular pH, which is especially deleterious in the central nervous
    system.
  biological_processes:
  - preferred_term: regulation of intracellular pH
    term:
      id: GO:0051453
      label: regulation of intracellular pH
    modifier: ABNORMAL
  cell_types:
  - preferred_term: neuron
    term:
      id: CL:0000540
      label: neuron
  evidence:
  - reference: PMID:30018422
    reference_title: "A novel SLC9A1 mutation causes cerebellar ataxia."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "NHE1 plays an important role in maintaining intracellular pH homeostasis by exchanging one intracellular proton for one extracellular sodium ion."
    explanation: Establishes the molecular role of NHE1 in intracellular pH homeostasis that is lost in this disease.
  - reference: PMID:25205112
    reference_title: "Mutation of SLC9A1, encoding the major Na⁺/H⁺ exchanger, causes ataxia-deafness Lichtenstein-Knorr syndrome."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "the association between ataxia and hearing loss is caused by complete or near complete loss of function of NHE1 and altered regulation of pHi in the central nervous system"
    explanation: Links loss of NHE1 function and altered intracellular pH regulation in the CNS to the ataxia-deafness phenotype.
  downstream:
  - target: Selective neuronal vulnerability and neurodegeneration
    causal_link_type: DIRECT
    description: Dysregulated intracellular pH produces selective vulnerability and death of cerebellar neurons and cochlear hair cells.
- name: Selective neuronal vulnerability and neurodegeneration
  description: >
    Loss of NHE1-dependent pH regulation produces selective neuronal cell death.
    The cerebellum (including Purkinje cells) and the cochlea (sensory hair
    cells) are particularly vulnerable, producing progressive cerebellar ataxia
    and sensorineural hearing loss. The spontaneous and knockout Slc9a1 (Nhe1)
    mouse models recapitulate ataxia, recurrent seizures, and selective neuronal
    cell death.
  cell_types:
  - preferred_term: cerebellar Purkinje cell
    term:
      id: CL:0000121
      label: Purkinje cell
  - preferred_term: cochlear hair cell
    term:
      id: CL:4023120
      label: cochlea auditory hair cell
  evidence:
  - reference: PMID:30018422
    reference_title: "A novel SLC9A1 mutation causes cerebellar ataxia."
    supports: SUPPORT
    evidence_source: MODEL_ORGANISM
    snippet: "Mice with a homozygous null mutation in Slc9a1 (Nhe1) exhibited ataxia, recurrent seizures, and selective neuronal cell death."
    explanation: The Slc9a1-null mouse model demonstrates that NHE1 loss causes ataxia, seizures, and selective neuronal degeneration.
  - reference: PMID:25205112
    reference_title: "Mutation of SLC9A1, encoding the major Na⁺/H⁺ exchanger, causes ataxia-deafness Lichtenstein-Knorr syndrome."
    supports: SUPPORT
    evidence_source: MODEL_ORGANISM
    snippet: "The comparison of our family with the phenotypes of spontaneous and knockout Slc9a1 murine models"
    explanation: Phenotypic comparison with spontaneous and knockout Slc9a1 mouse models supports neurodegeneration as the mechanism linking the human phenotype to NHE1 loss.
  downstream:
  - target: Cerebellar ataxia
    causal_link_type: DIRECT
    description: Cerebellar neurodegeneration produces progressive cerebellar ataxia.
  - target: Sensorineural hearing impairment
    causal_link_type: DIRECT
    description: Cochlear hair cell vulnerability produces progressive sensorineural hearing loss.
  - target: Cerebellar atrophy
    causal_link_type: DIRECT
    description: Progressive cerebellar neuronal loss produces cerebellar atrophy on neuroimaging.
phenotypes:
- name: Cerebellar ataxia
  category: Neurologic
  description: >
    Progressive cerebellar ataxia is a defining feature, presenting in childhood
    or young adulthood with gait ataxia, action tremor, dysmetria, and
    dysdiadochokinesis.
  phenotype_term:
    preferred_term: Ataxia
    term:
      id: HP:0001251
      label: Ataxia
    clinical_course: PROGRESSIVE
  evidence:
