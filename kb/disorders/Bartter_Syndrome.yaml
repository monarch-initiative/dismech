treatments:
- name: Potassium Supplementation
  description: >-
    Oral potassium chloride replacement is the cornerstone of management,
    often requiring high doses to maintain serum potassium above 3.0 mEq/L.
  treatment_term:
    preferred_term: potassium supplementation
    term:
      id: NCIT:C15986
      label: Pharmacotherapy
    therapeutic_agent:
    - preferred_term: potassium chloride
      term:
        id: CHEBI:32588
        label: potassium chloride
  evidence:
  - reference: PMID:36993809
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Potassium chloride supplements and potassium-sparing diuretics were
      administered in 94% and 68% of patients, respectively. The mean dosage
      of potassium chloride supplements was 5.0 and 2.1 mEq/day/kg for
      patients younger and older than 18 years, respectively.
    explanation: >-
      Korean multicenter study quantifies potassium supplementation dosing
      in 54 Bartter patients.
- name: Indomethacin
  description: >-
    Prostaglandin synthesis inhibitor (NSAID) that reduces urinary
    prostaglandin E2, improves electrolyte balance, and promotes growth
    in children with Bartter syndrome.
  treatment_term:
    preferred_term: Pharmacotherapy
    term:
      id: NCIT:C15986
      label: Pharmacotherapy
    therapeutic_agent:
    - preferred_term: indomethacin
      term:
        id: CHEBI:49662
        label: indometacin
  evidence:
  - reference: PMID:19096086
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      In most cases, water/electrolyte supplementation + indomethacin led to
      catch-up growth.
    explanation: >-
      French cohort demonstrates indomethacin plus electrolyte
      supplementation leads to catch-up growth.
- name: Potassium-Sparing Diuretics
  description: >-
    Aldosterone antagonists (spironolactone, eplerenone) and direct ENaC
    inhibitors (amiloride) used to counteract potassium-wasting effects of
    secondary hyperaldosteronism. In the Korean multicenter study, 68% of
    patients received potassium-sparing diuretics.
  treatment_term:
    preferred_term: Pharmacotherapy
    term:
      id: NCIT:C15986
      label: Pharmacotherapy
    therapeutic_agent:
    - preferred_term: spironolactone
      term:
        id: CHEBI:9241
        label: spironolactone
    - preferred_term: amiloride
      term:
        id: CHEBI:2639
        label: amiloride
    - preferred_term: eplerenone
      term:
        id: CHEBI:31547
        label: eplerenone
  evidence:
  - reference: PMID:30519073
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      The classical pharmacological therapy includes potassium chloride
      supplementation, prostaglandin inhibitor (indomethacin), and
      aldosterone antagonist (spironolactone).
    explanation: >-
      Review confirms spironolactone as part of the classical pharmacological
      treatment triad for Bartter syndrome.
  - reference: PMID:36993809
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Potassium chloride supplements and potassium-sparing diuretics were
      administered in 94% and 68% of patients, respectively.
    explanation: >-
      Korean cohort confirms 68% of patients received potassium-sparing
      diuretics.
- name: Magnesium Supplementation
  description: >-
    Oral magnesium replacement for patients with hypomagnesemia, particularly
    those with Types 1 and 2.
  treatment_term:
    preferred_term: magnesium supplementation
    term:
      id: NCIT:C15986
      label: Pharmacotherapy
- name: Renal Transplantation
  description: >-
    Considered for patients who progress to end-stage renal disease, which
    can occur in Type 4. Transplantation corrects the electrolyte
    abnormalities since the defect is intrinsic to the native kidney.
  treatment_term:
    preferred_term: organ transplantation
    term:
      id: MAXO:0010039
      label: organ transplantation
  evidence:
  - reference: PMID:36993809
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      impaired kidney function was observed in six patients [chronic kidney
      disease (CKD) G3, n = 4; CKD G5, n = 2]
    explanation: >-
      Korean study shows some patients progress to advanced CKD, supporting
      the need for renal transplantation in severe cases.
- name: Genetic Counseling
  description: >-
    Family counseling regarding autosomal recessive or X-linked recessive
    inheritance patterns, carrier testing, and prenatal diagnosis options.
  treatment_term:
    preferred_term: genetic counseling
    term:
      id: MAXO:0000079
      label: genetic counseling
