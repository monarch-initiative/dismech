    reference_title: "Cardiovascular and arrhythmic manifestations of Bartter's and Gitelman's syndromes: do not forget the heart. A narrative literature review."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Although considered benign entities, major adverse cardiovascular events
      may complicate both syndromes, in form of ventricular arrhythmias leading
      to palpitations, syncope or sudden cardiac death, microvascular cardiac
      dysfunction and exercise-induced myocardial contractile deficit.
    explanation: >-
      Narrative review highlights arrhythmic and cardiovascular complications
      of Bartter and Gitelman syndromes despite their usual normotensive
      phenotype.
