name: Bartter syndrome
creation_date: "2026-04-22T00:00:00Z"
updated_date: "2026-05-09T04:45:11Z"
category: Mendelian
synonyms:
- Bartter syndrome
- salt-wasting tubulopathy
- hyperprostaglandin E syndrome
description: >-
  Bartter syndrome is a group of autosomal recessive (and one X-linked) renal
  tubular salt-wasting disorders characterized by impaired sodium chloride
  reabsorption in the thick ascending limb of the loop of Henle. The hallmark
  biochemical triad is hypokalemic hypochloremic metabolic alkalosis,
  hyperreninemia with secondary hyperaldosteronism, and normal to low blood
  pressure. Five genetic types are recognized: Type 1 (SLC12A1/NKCC2), Type 2
  (KCNJ1/ROMK), Type 3 (CLCNKB/ClC-Kb), Type 4A (BSND/Barttin), Type 4B
  (digenic CLCNKA+CLCNKB), and Type 5 (MAGED2, X-linked transient). Types 1,
  2, 4, and 5 typically present antenatally with polyhydramnios and premature
  birth, while Type 3 (classic Bartter) presents in childhood with failure to
  thrive, polyuria, polydipsia, and growth retardation. Type 4 is distinguished
  by concurrent sensorineural hearing loss due to barttin co-expression in the
  inner ear. Long-term complications include chronic kidney disease (11% in
  one cohort) and growth impairment despite treatment.
