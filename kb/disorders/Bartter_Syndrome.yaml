    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Mutations in the MAGED2 gene can cause X-linked acute early-onset
      polyhydramnios with a severe but transient form of antenatal Bartter's
      syndrome.
    explanation: >-
      Case report confirms X-linked inheritance and transient nature of
      MAGED2-associated Bartter syndrome.
has_subtypes:
- name: Type 1
  display_name: Type 1 (Antenatal, NKCC2)
  description: >-
    Caused by loss-of-function mutations in SLC12A1, encoding the
    sodium-potassium-chloride cotransporter NKCC2 in the thick ascending limb.
    Presents antenatally with polyhydramnios, premature birth, and severe
    salt wasting. Nephrocalcinosis is common.
  evidence:
  - reference: PMID:30519073
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      In type I BS, symptoms are usually present at birth with severe salt
      wasting, hyposthenuria, increased production of PGE2, and failure to
      thrive. Some of these symptoms already occur in utero and can cause
      polyhydramnios and premature delivery. A common feature is marked
      hypercalciuria, which may lead to nephrocalcinosis and/or osteopenia.
    explanation: >-
      Review describes the clinical features of Type 1 Bartter syndrome
      including antenatal presentation and nephrocalcinosis.
- name: Type 2
  display_name: Type 2 (Antenatal, ROMK)
  description: >-
    Caused by loss-of-function mutations in KCNJ1, encoding the renal outer
    medullary potassium channel (ROMK). Presents antenatally similar to Type 1
    with polyhydramnios and prematurity. Transient hyperkalemia in the
    neonatal period is characteristic.
  evidence:
  - reference: PMID:19096086
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      transient neonatal hyperkalaemia was present in two-thirds of the
      children with KCNJ1 mutations
    explanation: >-
      French cohort study confirms transient hyperkalemia as a distinguishing
      feature of KCNJ1/Type 2 Bartter syndrome.
- name: Type 3
  display_name: Type 3 (Classic, ClC-Kb)
  description: >-
    Caused by loss-of-function mutations in CLCNKB, encoding the chloride
    channel ClC-Kb. Presents in infancy or childhood with hypokalemic
    alkalosis, failure to thrive, polyuria, polydipsia, and growth
    retardation. Generally milder than antenatal forms; nephrocalcinosis is
    less common.
  evidence:
  - reference: PMID:19096086
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      three patients had no history of polyhydramnios or premature birth and
      had CLCNKB mutations according to a less severe renal sodium wasting
    explanation: >-
      Confirms that CLCNKB patients can present without antenatal features,
      consistent with classic (less severe) phenotype.
- name: Type 4A
  display_name: Type 4A (With sensorineural deafness, Barttin)
  description: >-
    Caused by loss-of-function mutations in BSND, encoding barttin, the
    essential beta-subunit of ClC-Ka and ClC-Kb chloride channels. Presents
    antenatally with polyhydramnios, severe salt wasting, and sensorineural
    hearing loss due to barttin expression in the stria vascularis of the
    inner ear.
  evidence:
  - reference: PMID:19096086
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Deafness at diagnosis was constant in patients with BSND mutations
    explanation: >-
      Cohort study confirms universal sensorineural deafness in BSND/Type 4A
      patients.
- name: Type 4B
  display_name: Type 4B (Digenic, ClC-Ka + ClC-Kb)
  description: >-
    Caused by simultaneous loss-of-function mutations in both CLCNKA and
    CLCNKB. Phenotypically similar to Type 4A with antenatal presentation
    and sensorineural deafness.
  evidence:
  - reference: PMID:30519073
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      type IVb is a digenic disorder with mutations in both CLCNKA and
      CLCNKB genes, which can lead to impairment in the functioning of two
      chloride channels and as a result, severe salt wasting and deafness.
    explanation: >-
      Review confirms digenic nature and deafness phenotype of Type 4B.
- name: Type 5
  display_name: Type 5 (Transient antenatal, MAGED2)
  description: >-
    Caused by loss-of-function mutations in MAGED2 on the X chromosome.
    Presents with severe antenatal polyhydramnios and salt wasting that
    typically resolves spontaneously in the first months of life.
  evidence:
  - reference: PMID:30519073
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      This phenotype is characterized by the spontaneous resolution of
      polyuria, a decrease in the concentrations of renin and aldosterone, as
      well as a decrease in urinary PGE2 levels.
    explanation: >-
      Review describes the transient and self-resolving nature of
      MAGED2-associated Bartter syndrome.
genetic:
- name: SLC12A1
  gene_term:
    preferred_term: SLC12A1
    term:
      id: hgnc:10910
      label: SLC12A1
  association: Loss-of-function
  presence: Positive
  features: >-
    Encodes NKCC2, the apical sodium-potassium-2-chloride cotransporter
    in the thick ascending limb. Loss-of-function abolishes electroneutral
    NaCl reabsorption. More than 63 mutations reported including missense,
    nonsense, splicing, and small insertions/deletions.
  subtype: Type 1
  evidence:
  - reference: PMID:30519073
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Type I BS is genetically heterogeneous and >63 mutations have been
      reported, including missense/nonsense mutations, splicing mutations,
      small insertions, and small deletions.
    explanation: >-
      Review describes the genetic heterogeneity of SLC12A1 mutations in
      Type 1 Bartter syndrome.
- name: KCNJ1
  gene_term:
    preferred_term: KCNJ1
    term:
      id: hgnc:6255
      label: KCNJ1
  association: Loss-of-function
  presence: Positive
  features: >-
    Encodes ROMK, the apical potassium recycling channel in the thick
    ascending limb. Loss-of-function impairs potassium recycling needed for
    NKCC2 activity. More than 40 mutations described.
  subtype: Type 2
  evidence:
  - reference: PMID:30519073
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      More than 40 KCNJ1 mutations, causing loss of function of ROMK
      channel, have been described and most of these are missense/nonsense
      mutations in the exon 2, which encode an important domain of ROMK.
    explanation: >-
      Review confirms the diversity of KCNJ1 loss-of-function mutations.
- name: CLCNKB
  gene_term:
    preferred_term: CLCNKB
    term:
      id: hgnc:2027
      label: CLCNKB
  association: Loss-of-function
  presence: Positive
  features: >-
    Encodes ClC-Kb, the basolateral chloride channel in the thick ascending
    limb and distal nephron. Loss-of-function impairs chloride exit from
    tubular epithelial cells. Considerable phenotypic variability with
    antenatal, classic, and Gitelman-like presentations. Also involved in
    digenic Type 4B (combined CLCNKA+CLCNKB loss-of-function).
  subtype: Type 3
  evidence:
  - reference: PMID:30519073
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      More than 75 mutations in the CLCNKB gene have been described, and the
      effect of the kind of mutation in the phenotype is not clearly related.
    explanation: >-
      Review describes the extensive mutational spectrum and phenotypic
      variability of CLCNKB mutations.
- name: BSND
  gene_term:
    preferred_term: BSND
    term:
      id: hgnc:16512
      label: BSND
  association: Loss-of-function
  presence: Positive
  features: >-
    Encodes barttin, the beta-subunit required for trafficking and function of
    both ClC-Ka and ClC-Kb chloride channels. Loss-of-function affects kidney
    and inner ear.
  subtype: Type 4A
  evidence:
  - reference: PMID:21158220
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Bartter syndrome type IV, also known as Bartter syndrome with
      sensorineural deafness (BSND), is caused by loss-of-function mutations
      in the BSND gene, which encodes barttin, an accessory subunit of
      chloride channels located in the kidney and inner ear.
    explanation: >-
      Case report confirms BSND encodes barttin, required for chloride
      channels in kidney and inner ear.
- name: CLCNKA
  gene_term:
    preferred_term: CLCNKA
    term:
      id: hgnc:2026
      label: CLCNKA
  association: Loss-of-function
  presence: Positive
  features: >-
    Encodes ClC-Ka, a basolateral chloride channel predominantly expressed in
    the thin ascending limb. Digenic loss-of-function mutations in both CLCNKA
    and CLCNKB cause Type 4B Bartter syndrome with sensorineural deafness.
  subtype: Type 4B
  evidence:
  - reference: PMID:30519073
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      type IVb is a digenic disorder with mutations in both CLCNKA and
      CLCNKB genes, which can lead to impairment in the functioning of two
      chloride channels and as a result, severe salt wasting and deafness.
    explanation: >-
      Review confirms digenic CLCNKA+CLCNKB mutations cause Type 4B.
- name: MAGED2
  gene_term:
    preferred_term: MAGED2
    term:
      id: hgnc:16353
      label: MAGED2
  association: Loss-of-function
  presence: Positive
  features: >-
    Encodes melanoma-associated antigen D2, which is required for proper
    trafficking of NKCC2 and NCC to the apical membrane. Loss-of-function
    causes transient antenatal Bartter syndrome on the X chromosome.
  subtype: Type 5
  evidence:
  - reference: PMID:30519073
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      MAGE-D2 encodes melanoma-associated antigen D2, which interacts with
      NKCC2 and increases their cell-surface expression and activity.
      Mutations in MAGE-D2 reduce this expression of NKCC2 in the TAL and in
      the NCCT (thiazide-sensitive sodium chloride cotransporter), which is
      expressed in the DCT.
    explanation: >-
      Review describes the molecular function of MAGED2 in cotransporter
      trafficking and consequence of loss-of-function.
pathophysiology:
- name: ClC-K/Barttin Chloride Channel Dysfunction (Type 4)
  description: >-
    In type 4 Bartter syndrome, BSND loss-of-function or digenic
    CLCNKA/CLCNKB disruption impairs the ClC-K/barttin chloride-channel system
    shared by renal epithelia and the inner ear. This links the renal
    salt-wasting branch to the sensorineural-hearing branch without implying
    that all Bartter subtypes cause deafness.
  biological_processes:
  - preferred_term: Chloride transmembrane transport
    term:
      id: GO:1902476
      label: chloride transmembrane transport
    modifier: DECREASED
  evidence:
  - reference: PMID:30519073
    reference_title: "Bartter syndrome: causes, diagnosis, and treatment."
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Mutations in the BSND gene cause type IVa BS and result in impairment
      of barttin insertion in the plasma membrane of CLC-Kb and CLC-Ka
      channels in the Henle’s loop as well as in the inner ear, which
      interfere with epithelial salt transport.
    explanation: >-
      Review links BSND-associated type 4A Bartter syndrome to defective
      ClC-K/barttin channel handling in both renal epithelia and inner ear.
  - reference: PMID:30519073
    reference_title: "Bartter syndrome: causes, diagnosis, and treatment."
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      type IVb is a digenic disorder with mutations in both CLCNKA and
      CLCNKB genes, which can lead to impairment in the functioning of two
      chloride channels and as a result, severe salt wasting and deafness.
    explanation: >-
      Review supports the analogous type 4B mechanism in which dual ClC-K
      channel disruption produces both renal salt wasting and deafness.
  downstream:
  - target: Impaired NaCl Reabsorption in Thick Ascending Limb
    description: >-
      Defective ClC-K/barttin channel function in Henle-loop epithelia impairs
      epithelial salt transport, feeding into the renal NaCl reabsorption
      defect.
    causal_link_type: DIRECT
    evidence:
    - reference: PMID:30519073
      reference_title: "Bartter syndrome: causes, diagnosis, and treatment."
      supports: SUPPORT
      evidence_source: OTHER
      snippet: >-
        Mutations in the BSND gene cause type IVa BS and result in impairment
        of barttin insertion in the plasma membrane of CLC-Kb and CLC-Ka
        channels in the Henle’s loop as well as in the inner ear, which
        interfere with epithelial salt transport.
      explanation: >-
        The review explicitly places the ClC-K/barttin defect in Henle-loop
        epithelial salt transport, supporting the renal downstream edge.
  - target: Inner Ear Chloride Transport Defect (Type 4)
    description: >-
      The same type 4 ClC-K/barttin channel system is required in the inner
      ear; barttin mutations impair potassium secretion in the stria vascularis
      and vestibular labyrinth, while dual ClC-K channel mutations impair
      inner-ear channel function.
    causal_link_type: DIRECT
    evidence:
    - reference: PMID:30519073
      reference_title: "Bartter syndrome: causes, diagnosis, and treatment."
      supports: SUPPORT
      evidence_source: OTHER
      snippet: >-
        The sensory function of the inner ear becomes impaired in type IVa and
        IVb BS. In type IVa, barttin mutations impair potassium secretion in
        the stria vascularis and the vestibular labyrinth, whereas in type IVb
        mutations they occur in both chloride channels impairing their normal
        function in the inner ear.
      explanation: >-
        The review directly links type 4A and 4B chloride-channel defects to
        impaired inner-ear sensory function.
- name: Impaired NaCl Reabsorption in Thick Ascending Limb
  description: >-
    The primary defect in Bartter syndrome is impaired sodium chloride
    reabsorption in the thick ascending limb (TAL) of the loop of Henle.
    NKCC2 (apical) mediates electroneutral entry of Na+, K+, and 2Cl-;
    ROMK recycles K+ back to the lumen to sustain NKCC2 activity; and
    ClC-Kb (with barttin) provides basolateral Cl- exit. Loss of any
    component disrupts the entire transcellular NaCl transport pathway.
  cell_types:
  - preferred_term: Thick ascending limb epithelial cell
    term:
      id: CL:1001106
      label: kidney loop of Henle thick ascending limb epithelial cell
  biological_processes:
  - preferred_term: Sodium ion transport
    term:
      id: GO:0006814
      label: sodium ion transport
    modifier: DECREASED
  - preferred_term: Renal sodium ion transport
    term:
      id: GO:0003096
      label: renal sodium ion transport
    modifier: DECREASED
  - preferred_term: Chloride transmembrane transport
    term:
      id: GO:1902476
      label: chloride transmembrane transport
    modifier: DECREASED
  evidence:
  - reference: PMID:30519073
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      The main ion channel at the luminal membrane is NKCC2
      (furosemide-sensitive sodium–potassium–chloride cotransporter), which
      belongs to a family of sodium-coupled electrolyte transporters, encoded
      by the solute carrier family of SLC12A genes. NKCC2 is responsible for
      carrying sodium from the tubular lumen into the cell coupled with
      potassium and chloride.
    explanation: >-
      Review describes the molecular physiology of NKCC2-mediated NaCl
      transport in the TAL that is disrupted in Bartter syndrome.
  downstream:
  - target: Compensatory Distal Sodium Reabsorption and Potassium Wasting
    causal_link_type: DIRECT
  - target: Loss of Medullary Concentration Gradient
    causal_link_type: DIRECT
  - target: Impaired Paracellular Cation Reabsorption
    causal_link_type: DIRECT
- name: Compensatory Distal Sodium Reabsorption and Potassium Wasting
  description: >-
    Reduced NaCl reabsorption in the TAL increases sodium delivery to the
    distal convoluted tubule and collecting duct. Enhanced sodium reabsorption
    through ENaC in principal cells, driven by secondary hyperaldosteronism,
    creates a lumen-negative potential that drives potassium and hydrogen ion
    secretion, producing hypokalemia and metabolic alkalosis.
  cell_types:
  - preferred_term: Kidney collecting duct principal cell
    term:
      id: CL:1001431
      label: kidney collecting duct principal cell
  biological_processes:
  - preferred_term: Potassium ion homeostasis
    term:
      id: GO:0055075
      label: potassium ion homeostasis
    modifier: DECREASED
  - preferred_term: Potassium ion transmembrane transport
    term:
      id: GO:0071805
      label: potassium ion transmembrane transport
    modifier: INCREASED
  evidence:
  - reference: PMID:30519073
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      patients with BS present hyperreninemic hyperaldosteronism with
      normal/low blood pressure, reduced peripheral resistance, and
      hyporesponsiveness to antihypertensives.
    explanation: >-
      Review describes the hyperaldosteronism with paradoxically normal/low
      blood pressure due to the tubular defect.
  downstream:
  - target: Renin-Angiotensin-Aldosterone System Activation
    causal_link_type: DIRECT
- name: Renin-Angiotensin-Aldosterone System Activation
  description: >-
    Chronic volume depletion from renal salt wasting stimulates the
    juxtaglomerular apparatus to increase renin secretion, resulting in
    hyperreninemia and secondary hyperaldosteronism. Despite elevated
    aldosterone, blood pressure remains normal or low because the primary
    renal tubular defect prevents effective sodium retention.
  cell_types:
  - preferred_term: Juxtaglomerular complex cell
    term:
      id: CL:1000618
      label: juxtaglomerular complex cell
  - preferred_term: Macula densa epithelial cell
    term:
      id: CL:1000850
      label: macula densa epithelial cell
  biological_processes:
  - preferred_term: Renin secretion into blood stream
    term:
      id: GO:0002001
      label: renin secretion into blood stream
    modifier: INCREASED
  evidence:
  - reference: PMID:30519073
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      In patients with BS, reduced reabsorption of chloride occurs due to the
      genetic defects, and an increase in chloride delivery to the macula
      densa with an abnormal volume sensing ensues. Therefore, the control of
      filtration becomes uncoupled from volume status.
    explanation: >-
      Review explains the macula densa-mediated RAAS activation mechanism
      in Bartter syndrome.
  downstream:
  - target: Prostaglandin E2 Overproduction
    causal_link_type: INDIRECT_UNKNOWN_INTERMEDIATES
- name: Loss of Medullary Concentration Gradient
  description: >-
    NaCl reabsorption in the TAL is essential for generating the
    corticomedullary osmotic gradient required for urinary concentration.
    Impaired TAL transport reduces medullary tonicity, causing nephrogenic
    diabetes insipidus-like polyuria, polydipsia, and isosthenuria.
  biological_processes:
  - preferred_term: Water transport
    term:
      id: GO:0006833
      label: water transport
    modifier: DECREASED
  evidence:
  - reference: PMID:30519073
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Transepithelial salt movement into the medullary inter-stitium,
      together with the low permeability of the luminal membrane of the TAL
      to water, is important to allow the kidneys to develop interstitial
      hypertonicity and support the urinary concentrating ability.
    explanation: >-
      Review explains the role of TAL NaCl reabsorption in maintaining
      the medullary osmotic gradient required for urinary concentration.
- name: Prostaglandin E2 Overproduction
  description: >-
    Hypokalemia and volume depletion stimulate renal prostaglandin E2
    synthesis, which further inhibits NaCl reabsorption in the TAL and
    stimulates renin release, creating a positive feedback loop that
    amplifies salt wasting and electrolyte disturbances.
  biological_processes:
  - preferred_term: Prostaglandin biosynthetic process
    term:
      id: GO:0001516
      label: prostaglandin biosynthetic process
    modifier: INCREASED
  evidence:
  - reference: PMID:30519073
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      This impaired entry of sodium and chloride into the macula densa
      increases the expression of cyclooxygenase-2 (COX2) stimulating the
      renal production of prostaglandin E2 (PGE2), also resulting in afferent
      arteriolar dilatation and activation of renin release by JGA.
    explanation: >-
      Review describes the COX2/PGE2 pathway activation in Bartter syndrome
      and its role in amplifying RAAS activation.
- name: Impaired Paracellular Cation Reabsorption
  description: >-
    NKCC2-mediated K+ recycling through ROMK generates a lumen-positive
    transepithelial voltage in the TAL that drives paracellular reabsorption
    of Ca2+ and Mg2+. Loss of this voltage in Types 1 and 2 causes
    hypercalciuria (leading to nephrocalcinosis) and hypomagnesemia.
  cell_types:
  - preferred_term: Thick ascending limb epithelial cell
    term:
      id: CL:1001106
      label: kidney loop of Henle thick ascending limb epithelial cell
  biological_processes:
  - preferred_term: Magnesium ion homeostasis
    term:
      id: GO:0010960
      label: magnesium ion homeostasis
    modifier: DECREASED
  evidence:
  - reference: PMID:30519073
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Henle’s loop has another important role in the reabsorption of divalent
      cations such as calcium (Ca2+) and magnesium (Mg2+), which are
      reabsorbed by a passive paracellular mechanism secondary to the driving
      force produced by active salt reabsorption.
    explanation: >-
      Review explains the paracellular divalent cation reabsorption mechanism
      that is disrupted when TAL NaCl transport fails.
  downstream:
  - target: Nephrocalcinosis
    causal_link_type: DIRECT
- name: Nephrocalcinosis
  description: >-
    Hypercalciuria from impaired paracellular calcium reabsorption in the TAL
    leads to medullary calcium deposition. Nephrocalcinosis is most prominent
    in Types 1 and 2 and is less common in Type 3.
  evidence:
  - reference: PMID:19096086
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Nephrocalcinosis was constant in KCNJ1 and SLC12A1 but not in BSND and
      CLCNKB patients.
    explanation: >-
      Cohort study confirms nephrocalcinosis is universal in Types 1 and 2
      but absent in Types 3 and 4.
- name: Inner Ear Chloride Transport Defect (Type 4)
  description: >-
    Barttin is co-expressed with ClC-Ka and ClC-Kb in the stria vascularis
    of the inner ear, where chloride channels are essential for endolymph
    potassium secretion. Loss of barttin (Type 4A) or both ClC-K channels
    (Type 4B) disrupts the endocochlear potential, causing sensorineural
    hearing loss.
  biological_processes:
  - preferred_term: Chloride ion homeostasis
    term:
      id: GO:0055064
      label: chloride ion homeostasis
    modifier: DECREASED
  evidence:
  - reference: PMID:30519073
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      In type IVa, barttin mutations impair potassium secretion in the stria
      vascularis and the vestibular labyrinth, whereas in type IVb mutations
      they occur in both chloride channels impairing their normal function in
      the inner ear.
    explanation: >-
      Review describes the inner ear pathophysiology in both Type 4A and 4B
      Bartter syndrome.
phenotypes:
- name: Hypokalemic Hypochloremic Metabolic Alkalosis
  category: Laboratory
  description: >-
    The biochemical hallmark of Bartter syndrome: persistent hypokalemia
    with hypochloremia and metabolic alkalosis resulting from renal
    potassium and chloride wasting.
  frequency: VERY_FREQUENT
  phenotype_term:
    preferred_term: Hypokalemic hypochloremic metabolic alkalosis
    term:
      id: HP:0004909
      label: Hypokalemic hypochloremic metabolic alkalosis
  evidence:
  - reference: PMID:30519073
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Bartter syndrome (BS) is currently recognized as a rare inherited renal
      tubular disorder that affects around 1 in 1,000,000 of the population,
      caused by a defective salt reabsorption in the thick ascending limb
      (TAL) of loop of Henle, resulting in salt wasting, hypokalemia, and
      metabolic alkalosis with relatively low levels of serum chloride.
    explanation: >-
      Review defines the hallmark biochemical triad of Bartter syndrome.
- name: Hypokalemia
  category: Laboratory
  description: >-
    Renal potassium wasting due to enhanced distal K+ secretion driven by
    increased sodium delivery and hyperaldosteronism.
  frequency: VERY_FREQUENT
  phenotype_term:
    preferred_term: Hypokalemia
    term:
      id: HP:0002900
