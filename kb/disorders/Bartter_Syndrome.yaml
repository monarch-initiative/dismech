- name: Ventricular Arrhythmia
  category: Cardiovascular
  description: >-
    Chronic hypokalemia, hypomagnesemia, and neurohormonal abnormalities can
    produce clinically important cardiac arrhythmias in Bartter syndrome despite
    the usual absence of hypertension. Severe events may include syncope or
    sudden cardiac death.
  frequency: OCCASIONAL
