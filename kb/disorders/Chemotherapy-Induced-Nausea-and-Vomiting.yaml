name: Chemotherapy-Induced Nausea and Vomiting
creation_date: '2026-03-03T22:56:00Z'
updated_date: '2026-03-03T22:56:00Z'
category: Complex
parents:
- Gastrointestinal Disease
- Drug-Induced Adverse Events

pathophysiology:
- name: 5-HT3 Receptor Pathway Activation
  description: Chemotherapy drugs generate free radicals that stimulate enterochromaffin cells in the gastrointestinal tract, causing serotonin release. Serotonin binds to 5-HT3 receptors on intestinal vagal afferent nerves, triggering the vomiting reflex via the nucleus of the solitary tract (NTS) and chemoreceptor trigger zone (CTZ) in the CNS. This pathway is primarily responsible for acute nausea and vomiting occurring within 24 hours of chemotherapy administration.
  biological_processes:
  - preferred_term: serotonin secretion
    term:
      id: GO:0001820
      label: serotonin secretion
  - preferred_term: positive regulation of feeding behavior
    term:
      id: GO:2000253
      label: positive regulation of feeding behavior
  cell_types:
  - preferred_term: enteroendocrine cell
    term:
      id: CL:0000164
      label: enteroendocrine cell
  - preferred_term: vagal neural crest cell
    term:
      id: CL:0000333
      label: vagal neural crest cell
  evidence:
  - reference: PMID:25838122
    supports: SUPPORT
    snippet: "5-HT3 receptors are highly expressed in both central and peripheral sites involved in the emetic reflex pathway, including the area postrema (AP), the nucleus tractus solitarius (NTS), the dorsal motor nucleus of the vagus (DMX), nodose ganglion, and enteric nervous system."
    explanation: This reference describes the distribution and role of 5-HT3 receptors in the emetic reflex pathway triggered by chemotherapy.

- name: NK1 Receptor Pathway Activation  
  description: Chemotherapy triggers the release of substance P from neurons in the central and peripheral nervous systems. Substance P binds to neurokinin-1 (NK1) receptors primarily in the nucleus of the solitary tract to induce delayed nausea and vomiting. This pathway is particularly important for delayed symptoms occurring 24-120 hours after chemotherapy administration.
  biological_processes:
  - preferred_term: neuropeptide signaling pathway
    term:
      id: GO:0007218
      label: neuropeptide signaling pathway
  - preferred_term: regulation of appetite
    term:
      id: GO:0032098
      label: regulation of appetite
  cell_types:
  - preferred_term: neuron
    term:
      id: CL:0000540
      label: neuron
  evidence:
  - reference: PMID:25838122
    supports: SUPPORT
    snippet: "The substance P/NK-1 receptor pathway plays a key role in delayed CINV and is the target for NK-1 receptor antagonists such as aprepitant."
    explanation: This reference establishes the role of the substance P/NK-1 receptor pathway in delayed chemotherapy-induced nausea and vomiting.

phenotypes:
- category: Gastrointestinal
  name: Nausea and Vomiting
  frequency: VERY_FREQUENT
  diagnostic: true
  notes: Primary manifestation occurring in acute (0-24h) and delayed (24-120h) phases
  evidence:
  - reference: PMID:39151115
    supports: SUPPORT
    snippet: "Chemotherapy-induced nausea and vomiting (CINV) remains a significant concern for patients receiving moderately or highly emetogenic chemotherapy."
    explanation: This recent clinical trial confirms that CINV is a primary concern for patients receiving chemotherapy.
