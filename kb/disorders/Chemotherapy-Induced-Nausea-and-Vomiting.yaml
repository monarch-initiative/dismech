treatments:
- name: 5-HT3 Receptor Antagonists
  description: First-line antiemetic therapy including ondansetron, granisetron, and palonosetron. Block serotonin binding to 5-HT3 receptors in the gastrointestinal tract and chemoreceptor trigger zone, primarily preventing acute nausea and vomiting.
  evidence:
  - reference: PMID:25838122
    supports: SUPPORT
    snippet: "5-HT3 receptor antagonists are the cornerstone of antiemetic therapy for chemotherapy-induced nausea and vomiting, particularly for acute symptoms."
    explanation: This reference confirms the primary role of 5-HT3 antagonists in CINV management.
  treatment_term:
    preferred_term: antiemetic therapy
    term:
      id: MAXO:0000058
      label: pharmacotherapy

- name: NK1 Receptor Antagonists
  description: Include aprepitant, fosaprepitant, and netupitant. Block substance P binding to NK1 receptors, particularly effective for preventing delayed nausea and vomiting. Often used in combination with 5-HT3 antagonists and corticosteroids.
  evidence:
  - reference: PMID:25838122
    supports: SUPPORT
    snippet: "NK-1 receptor antagonists such as aprepitant have revolutionized the management of delayed CINV by targeting the substance P pathway."
    explanation: This reference describes the significant impact of NK1 antagonists on delayed CINV management.
  treatment_term:
    preferred_term: antiemetic therapy
    term:
      id: MAXO:0000058
      label: pharmacotherapy

- name: Corticosteroids
  description: Dexamethasone is the most commonly used corticosteroid for CINV prevention. Enhances the efficacy of other antiemetics through multiple mechanisms including anti-inflammatory effects and modulation of neurotransmitter pathways.
  evidence:
  - reference: PMID:39151115
    supports: SUPPORT
    snippet: "Background antiemetic prophylaxis included a corticosteroid and 5-hydroxytryptamine antagonist in 97% of patients."
    explanation: This recent clinical trial demonstrates the standard use of corticosteroids in CINV prevention protocols.
  treatment_term:
    preferred_term: corticosteroid therapy
    term:
      id: MAXO:0000058
      label: pharmacotherapy

- name: Cannabis-Based Therapy
  description: THC:CBD combinations (typically 2.5mg each, three times daily) for patients with refractory nausea and vomiting despite standard antiemetic prophylaxis. Particularly effective for patients who have failed conventional 5-HT3 antagonists, NK1 antagonists, and corticosteroids. FDA-approved synthetic cannabinoids include dronabinol and nabilone.
  evidence:
  - reference: PMID:39151115
    supports: SUPPORT
    snippet: "THC:CBD compared with placebo improved the complete response rate from 8% to 24% (absolute difference 16%, 95% CI, 4 to 28, P = .01)."
    explanation: This phase II/III randomized controlled trial demonstrates significant efficacy of THC:CBD therapy for refractory CINV with a clinically meaningful improvement in complete response rates.
  - reference: PMID:32801017
    supports: SUPPORT
    snippet: "Complete response was improved with THC:CBD from 14% to 25% (relative risk 1.77, 90% confidence interval 1.12–2.79, P = 0.041)."
    explanation: This earlier crossover trial provides additional evidence for THC:CBD efficacy in refractory CINV.
  treatment_term:
    preferred_term: medical cannabis therapy
    term:
      id: MAXO:0000058
      label: pharmacotherapy

environmental:
- name: Chemotherapy Drug Exposure
  notes: Highly emetogenic agents (cisplatin, cyclophosphamide) carry >90% risk while moderately emetogenic agents carry 30-90% risk of CINV
  evidence:
  - reference: PMID:39151115
    supports: SUPPORT
    snippet: "Adults receiving their first cycle of moderately or highly emetogenic, intravenous chemotherapy were eligible for enrollment."
    explanation: This trial specifically targeted patients receiving moderate to highly emetogenic chemotherapy regimens.
  exposure_term:
    preferred_term: chemotherapy drug exposure
    term:
      id: ECTO:0000090
      label: exposure to drug

