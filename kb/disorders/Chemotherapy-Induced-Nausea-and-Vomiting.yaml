notes: |
  Cannabis therapy represents a significant advancement for patients with refractory CINV. The 2024 phase II/III trial demonstrated that THC:CBD combinations provide clinically meaningful benefits for patients who fail standard antiemetic regimens. Key patient characteristics for cannabis consideration include:
  
  - Failed response to combination therapy with 5-HT3 antagonists, NK1 antagonists, and corticosteroids
  - Receiving moderately or highly emetogenic chemotherapy regimens  
  - Ability to tolerate cannabinoid side effects (sedation, dizziness, anxiety)
  - Legal access to medical cannabis in their jurisdiction
  
  The endocannabinoid system provides a distinct therapeutic target from conventional antiemetics, offering hope for patients with otherwise refractory symptoms. Younger patients and those with prior cannabis experience may have better response rates, though more research is needed to identify specific predictors of response.