    reference_title: "Deficiency for the ER-stress transducer OASIS causes severe recessive osteogenesis imperfecta in humans."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      CREB3L1 encodes OASIS, an endoplasmic reticulum-stress transducer that
      regulates type I procollagen expression during murine bone formation.
    explanation: >-
      Defines OASIS as the ER-stress transducer encoded by CREB3L1 whose loss
      causes OI type XVI.
  - reference: PMID:19767743
    reference_title: "Signalling mediated by the endoplasmic reticulum stress transducer OASIS is involved in bone formation."
    supports: SUPPORT
    evidence_source: MODEL_ORGANISM
    snippet: >-
      OASIS is processed by regulated intramembrane proteolysis (RIP) in
      response to ER stress, and is highly expressed in osteoblasts.
    explanation: >-
      Documents that OASIS is an osteoblast-enriched ER-stress transducer
      activated by regulated intramembrane proteolysis, the function lost in OI
      type XVI.
  - reference: PMID:30657919
    reference_title: "A homozygous pathogenic missense variant broadens the phenotypic and mutational spectrum of CREB3L1-related osteogenesis imperfecta."
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: >-
      the endoplasmic reticulum stress transducer old astrocyte specifically
      induced substance (OASIS), which has an important role in osteoblast
      differentiation during bone development.
    explanation: >-
      Establishes the role of OASIS in osteoblast differentiation during bone
      development, disrupted by CREB3L1 loss-of-function.
  downstream:
  - target: Reduced Transcriptional Activation of COL1A1 and Type I Collagen Synthesis
    description: >-
      Loss of OASIS removes the transcriptional activator that drives
      osteoblast-specific COL1A1 expression, reducing type I collagen synthesis
      and bone-matrix protein secretion.
- name: Reduced Transcriptional Activation of COL1A1 and Type I Collagen Synthesis
  description: >-
    OASIS directly activates transcription of the type I collagen gene COL1A1
    through an unfolded protein response element (UPRE)-like sequence in the
    osteoblast-specific Col1a1 promoter and contributes to the secretion of bone
    matrix proteins. When OASIS is lost or its DNA-binding/bZIP activity is
    impaired, COL1A1 transcriptional activation falls and osteoblasts synthesize
    markedly less type I collagen. In OASIS-deficient human osteoblasts, CREB3L1
    mRNA and collagen I are reduced and the rough ER is ultrastructurally
    abnormal; in mice, OASIS-/- osteoblasts show decreased type I collagen in the
    bone matrix and an abnormally expanded rough ER engorged with bone matrix
    proteins, reflecting impaired collagen production and secretion.
