  - reference: PMID:24079343
    reference_title: "Deficiency for the ER-stress transducer OASIS causes severe recessive osteogenesis imperfecta in humans."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Osteogenesis imperfecta (OI) is a clinically and genetically heterogeneous
