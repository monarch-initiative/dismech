    evidence_source: MODEL_ORGANISM
    snippet: >-
      OASIS-/- mice exhibit severe osteopenia involving a decrease in type I
      collagen in the bone matrix and a dysfunction of osteoblasts, which show
      abnormal expansion of the rough ER. These phenotypic features of
      osteopenia are similar to those observed in OI type I.
    explanation: >-
      Establishes the fragile, deformity-prone bone of the OASIS-deficient model
      that parallels human OI; long-bone deformity reflects this weak matrix.
diagnosis:
- name: Molecular Genetic Diagnosis
  description: >-
    OI type XVI is suspected in an infant or fetus with severe recessive OI
    (recurrent prenatal/postnatal fractures, low bone mineral density, deformity)
    when COL1A1/COL1A2 and other recessive OI genes are negative. Diagnosis is
    confirmed by identifying a biallelic CREB3L1 (OASIS) loss-of-function lesion —
    the 11p11.2 contiguous deletion, a premature stop codon, or a bZIP-domain
    missense variant — by deletion analysis and gene-panel or exome sequencing.
    Supportive cellular findings include markedly reduced CREB3L1 mRNA and type I
    collagen in cultured osteoblasts with abnormal rough-ER ultrastructure.
  diagnosis_term:
    preferred_term: molecular genetic testing
    term:
      id: MAXO:0000533
      label: molecular genetic testing
  evidence:
  - reference: PMID:29936144
    reference_title: "Homozygosity for CREB3L1 premature stop codon in first case of recessive osteogenesis imperfecta associated with OASIS-deficiency to survive infancy."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      A homozygous CREB3L1 stop codon mutation was detected by sequencing, while
      several family members were heterozygotes.
    explanation: >-
      Molecular sequencing identification of a biallelic CREB3L1 variant
      establishes the diagnosis of OI type XVI.
treatments:
- name: Bisphosphonate Therapy
  description: >-
    Intravenous bisphosphonates (e.g., pamidronate, zoledronic acid) are the
    pharmacological mainstay of severe OI, increasing bone mineral density and
    reducing fracture frequency; in OI type XVI, life-long bisphosphonate
    treatment steadily increased bone mineral density although fractures
    persisted. They are antiresorptive and do not correct the underlying
    transcriptional collagen defect. The OASIS-deficient mouse responds to
    risedronate with increased trabecular bone, supporting bisphosphonate
    efficacy in this disorder.
  treatment_term:
    preferred_term: Bisphosphonate Therapy
    term:
      id: NCIT:C198585
      label: Bisphosphonate Therapy
  evidence:
  - reference: PMID:29936144
    reference_title: "Homozygosity for CREB3L1 premature stop codon in first case of recessive osteogenesis imperfecta associated with OASIS-deficiency to survive infancy."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Clinical response to life-long bisphosphonate treatment was as expected in
      severe OI with steadily increasing bone mineral density, but despite this
      the boy suffered repeated childhood fractures.
    explanation: >-
      Documents the clinical use and partial response of bisphosphonate therapy
      in a molecularly confirmed OI type XVI patient.
  - reference: PMID:20024590
    reference_title: "Effects of the bisphosphonate risedronate on osteopenia in OASIS-deficient mice."
    supports: SUPPORT
    evidence_source: MODEL_ORGANISM
    snippet: >-
      Histological and histomorphometric analyses revealed that the trabecular
      bones increased dramatically in OASIS-/- mice treated with RIS, owing to
      the inhibition of bone resorption.
    explanation: >-
      Model-organism evidence that bisphosphonate (risedronate) treatment
      improves bone mass in the OASIS-deficient model of OI type XVI.
- name: Orthopedic Surgery and Intramedullary Rodding
  description: >-
    Intramedullary (telescoping) rod fixation and corrective osteotomy stabilize
    fracture-prone, deformed long bones; spinal surgery addresses progressive
    scoliosis. Surgical management is standard in severe OI such as OI type XVI.
  treatment_term:
    preferred_term: surgical procedure
    term:
      id: MAXO:0000004
      label: surgical procedure
  evidence:
  - reference: PMID:20301472
    reference_title: "COL1A1- and COL1A2-Related Osteogenesis Imperfecta."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      intramedullary rodding when
      indicated to provide anatomic positioning of limbs
    explanation: >-
      GeneReviews documents intramedullary rodding as standard orthopedic
      management for OI long-bone fractures and deformity, applicable to OI type
      XVI.
- name: Physical Therapy and Rehabilitation
  description: >-
    Physical and occupational therapy increase bone stability, improve mobility
    and muscle strength, and prevent contractures and deformity; early physical
    therapy follows brief post-fracture immobilization.
  treatment_term:
    preferred_term: physical therapy
    term:
      id: MAXO:0000011
      label: physical therapy
  evidence:
  - reference: PMID:20301472
    reference_title: "COL1A1- and COL1A2-Related Osteogenesis Imperfecta."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Fractures are treated with as
      short a period of immobility as is practical, small and lightweight casts, and
      physical therapy as soon as casts are removed
    explanation: >-
      GeneReviews documents early physical therapy and brief immobilization as
      part of standard OI fracture rehabilitation.
