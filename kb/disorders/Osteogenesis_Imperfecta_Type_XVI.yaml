name: Osteogenesis Imperfecta Type XVI
creation_date: "2026-06-30T00:00:00Z"
category: Mendelian
disease_term:
  preferred_term: Osteogenesis imperfecta type 16
  term:
    id: MONDO:0014544
    label: osteogenesis imperfecta type 16
description: >-
  Osteogenesis imperfecta type XVI (OI type XVI) is a severe autosomal recessive
  brittle bone disease caused by biallelic loss-of-function variants in CREB3L1,
  the gene encoding OASIS (old astrocyte specifically induced substance). OASIS
  is an endoplasmic-reticulum-stress-induced bZIP (basic leucine zipper)
  transcription factor of the CREB/ATF family that carries a transmembrane domain
  and is activated by regulated intramembrane proteolysis (RIP) in response to ER
  stress, releasing a cytosolic/nuclear transcriptional fragment. OASIS is highly
  expressed in osteoblasts, where it directly activates transcription of the type
  I collagen gene COL1A1 through an unfolded protein response element (UPRE)-like
  sequence in the osteoblast-specific Col1a1 promoter, and contributes to
  secretion of bone matrix proteins; its expression and proteolytic processing
  are induced by BMP2 signaling required for bone formation. Biallelic
  loss-of-function of CREB3L1 — first described as a homozygous 11p11.2 contiguous
  genomic deletion, and subsequently as nonsense (premature stop) and missense
  point variants — reduces COL1A1 transcriptional activation and type I collagen
  synthesis by osteoblasts, yielding a defective, collagen-poor bone matrix with
  low bone mass and extreme skeletal fragility. The phenotype spans perinatally
  lethal disease to severe OI surviving infancy, with recurrent prenatal and
  postnatal fractures, reduced bone mineral density, growth deficiency, and bone
  deformity; heterozygous carriers are mildly or unaffected. The disorder is
  recapitulated by the OASIS-deficient (Creb3l1/OASIS-/-) mouse, which exhibits
  severe osteopenia, decreased bone-matrix type I collagen, and spontaneous
  fractures.
