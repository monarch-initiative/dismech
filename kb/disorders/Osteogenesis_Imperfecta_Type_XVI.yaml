    snippet: >-
      Clinical response to life-long bisphosphonate treatment was as expected in
      severe OI with steadily increasing bone mineral density, but despite this
      the boy suffered repeated childhood fractures.
    explanation: >-
      Documents repeated (recurrent) fractures as a cardinal feature of OI type
      XVI in a molecularly confirmed patient.
- name: Reduced Bone Mineral Density
  description: >-
    Low bone mass with reduced bone mineral density and severe osteopenia
