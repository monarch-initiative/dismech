  description: >-
    Severe bone fragility with recurrent prenatal and postnatal fractures, the
    cardinal feature of OI type XVI; fractures recur even during bisphosphonate
    treatment.
  phenotype_term:
    preferred_term: Recurrent fractures
    term:
