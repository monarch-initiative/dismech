    snippet: >-
      OASIS(-/-) mice exhibited severe osteopenia, involving a decrease in type
      I collagen in the bone matrix and a decline in the activity of
      osteoblasts, which showed abnormally expanded rough ER, containing of a
      large amount of bone matrix proteins.
    explanation: >-
      Demonstrates that OASIS loss produces a collagen-poor bone matrix and
      severe osteopenia, the matrix defect underlying OI type XVI fragility.
  - reference: PMID:29936144
    reference_title: "Homozygosity for CREB3L1 premature stop codon in first case of recessive osteogenesis imperfecta associated with OASIS-deficiency to survive infancy."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Bone histomorphometry and qBEI were similar to collagen I OI, with low
      trabecular thickness and mineral apposition rate, and increased bone
      matrix mineralization.
    explanation: >-
      Documents the abnormal human bone matrix (low trabecular thickness and
      mineral apposition) underlying the skeletal fragility of OI type XVI.
genetic:
- name: CREB3L1 (OASIS) Loss-of-Function Mutations
  association: Causative
  gene_term:
    preferred_term: CREB3L1 (OASIS, ER-stress bZIP transcription factor)
    term:
      id: hgnc:18856
      label: CREB3L1
  notes: >-
    OI type XVI is caused by biallelic loss-of-function variants in CREB3L1,
    encoding the ER-stress transducer OASIS. The disorder was first defined by a
    homozygous 11p11.2 contiguous genomic deletion encompassing CREB3L1 in a
    family with severe OI. Subsequent reports established point-variant alleles,
    including a homozygous premature stop (nonsense) codon in the first patient
    to survive infancy and a homozygous pathogenic missense variant
    [p.(Ala304Val)] in the highly conserved basic leucine zipper domain, four
    amino acids upstream of the DNA-binding domain, in a patient with lethal OI.
    Heterozygous carriers show a mild or no phenotype.
  evidence:
  - reference: PMID:24079343
    reference_title: "Deficiency for the ER-stress transducer OASIS causes severe recessive osteogenesis imperfecta in humans."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      We detected a homozygous genomic deletion of CREB3L1 in a family with
      severe OI.
    explanation: >-
      Identifies the founding causative lesion of OI type XVI, a homozygous
      11p11.2 CREB3L1 deletion.
  - reference: PMID:29936144
    reference_title: "Homozygosity for CREB3L1 premature stop codon in first case of recessive osteogenesis imperfecta associated with OASIS-deficiency to survive infancy."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      A homozygous CREB3L1 stop codon mutation was detected by sequencing, while
      several family members were heterozygotes.
    explanation: >-
      Documents a homozygous CREB3L1 premature stop codon (point variant) as a
      cause of OI type XVI, expanding the allelic spectrum beyond the deletion.
  - reference: PMID:30657919
    reference_title: "A homozygous pathogenic missense variant broadens the phenotypic and mutational spectrum of CREB3L1-related osteogenesis imperfecta."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      a patient with lethal OI, which is located within the highly conserved
      basic leucine zipper domain, four amino acids upstream of the DNA binding
      domain.
    explanation: >-
      Documents a homozygous CREB3L1 bZIP-domain missense allele causing lethal
      OI type XVI, broadening the mutational spectrum.
phenotypes:
