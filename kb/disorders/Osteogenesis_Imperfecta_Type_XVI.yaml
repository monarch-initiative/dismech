pathophysiology:
- name: CREB3L1 Loss Eliminates the ER-Stress Transducer OASIS in Osteoblasts
  description: >-
    CREB3L1 encodes OASIS, a bZIP transcription factor of the CREB/ATF family
    that has a transmembrane domain and is processed by regulated intramembrane
    proteolysis (RIP) in response to ER stress; it is highly expressed in
    osteoblasts. Biallelic loss-of-function CREB3L1 variants (the original
    11p11.2 contiguous deletion, premature stop codons, or missense variants in
    the bZIP domain) eliminate or inactivate OASIS. OASIS expression and its RIP
    processing are induced by BMP2 signaling, which is required for bone
    formation, linking ER-stress-induced OASIS signaling to osteoblast function.
  cell_types:
  - preferred_term: osteoblast
