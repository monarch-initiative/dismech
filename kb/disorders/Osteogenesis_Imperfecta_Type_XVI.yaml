- name: Bone Deformity
  description: >-
    Bone deformity, including bowing of the long bones, accompanies the
    fragility and recurrent fractures of OI type XVI, reflecting the
    mechanically weak, collagen-poor bone.
  phenotype_term:
    preferred_term: Bone deformity (bowing of the long bones)
    term:
      id: HP:0006487
      label: Bowing of the long bones
