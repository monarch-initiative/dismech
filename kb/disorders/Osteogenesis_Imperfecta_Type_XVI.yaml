    evidence_source: IN_VITRO
    snippet: >-
      Markedly low levels of CREB3L1 mRNA were confirmed by qPCR in hOBs (16%)
      and FB (21%); however, collagen I levels were only reduced in hOBs (5-10%).
    explanation: >-
      Documents markedly reduced CREB3L1 expression and an osteoblast-specific
      reduction of type I collagen in OASIS-deficient human cells.
  downstream:
  - target: Collagen-Poor Bone Matrix, Low Bone Mass, and Skeletal Fragility
    description: >-
      Deficient osteoblast type I collagen synthesis produces a collagen-poor,
      defective bone extracellular matrix with low bone mass and reduced
      mechanical strength.
- name: Collagen-Poor Bone Matrix, Low Bone Mass, and Skeletal Fragility
  description: >-
    Reduced osteoblast type I collagen production yields a defective,
    collagen-deficient bone extracellular matrix with low trabecular thickness,
    reduced mineral apposition, and impaired mechanical strength, producing very
    low bone mass and severe skeletal fragility. Clinically this manifests as
    recurrent prenatal and postnatal fractures, reduced bone mineral density,
    growth deficiency, and bone deformity. The OASIS-deficient (OASIS-/-) mouse
    recapitulates the disorder with severe osteopenia, decreased bone-matrix type
    I collagen, dysfunctional osteoblasts, and spontaneous fractures.
  cell_types:
  - preferred_term: osteoblast
    term:
      id: CL:0000062
      label: osteoblast
