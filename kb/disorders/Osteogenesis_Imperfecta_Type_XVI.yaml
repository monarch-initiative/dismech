      Here we identify the gene for type 1 collagen, Col1a1, as a target of
      OASIS, and demonstrate that OASIS activates the transcription of Col1a1
      through an unfolded protein response element (UPRE)-like sequence in the
      osteoblast-specific Col1a1 promoter region.
    explanation: >-
      Establishes that OASIS transcriptionally activates COL1A1, the function
      whose loss reduces type I collagen synthesis in OI type XVI.
  - reference: PMID:30657919
    reference_title: "A homozygous pathogenic missense variant broadens the phenotypic and mutational spectrum of CREB3L1-related osteogenesis imperfecta."
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: >-
      In vitro structural modeling and luciferase assays demonstrate that this
      missense variant affects a critical residue in this functional domain,
      thereby decreasing the type I collagen transcriptional binding ability.
    explanation: >-
      Demonstrates that a pathogenic CREB3L1 bZIP-domain missense variant
      decreases OASIS-mediated type I collagen transcriptional activation.
  - reference: PMID:29936144
    reference_title: "Homozygosity for CREB3L1 premature stop codon in first case of recessive osteogenesis imperfecta associated with OASIS-deficiency to survive infancy."
