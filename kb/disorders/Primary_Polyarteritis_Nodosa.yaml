name: Primary Polyarteritis Nodosa
creation_date: "2026-05-05T11:41:54Z"
updated_date: "2026-05-05T11:41:54Z"
description: >-
  Primary polyarteritis nodosa is idiopathic, non-hepatitis B-related systemic
  polyarteritis nodosa, a rare necrotizing vasculitis that predominantly
  targets medium-sized arteries. Vessel-wall inflammation can cause
  angiographic or biopsy-confirmed arterial injury, downstream ischemia, and
  heterogeneous organ involvement ranging from limited disease to polyvisceral
  failure.
category: Complex
disease_term:
  preferred_term: primary polyarteritis nodosa
  term:
    id: MONDO:0018593
    label: primary polyarteritis nodosa
parents:
- Vascular disorder
synonyms:
- Primary PAN
- Primary periarteritis nodosa
pathophysiology:
- name: Necrotizing medium-artery inflammation
  description: >-
    Transmural inflammatory injury affects medium-sized muscular arteries,
    damaging the vessel wall and promoting fibrinoid necrosis, aneurysm,
    stenosis, thrombosis, or other ischemia-producing vascular lesions.
  cell_types:
  - preferred_term: endothelial cell
    term:
      id: CL:0000115
      label: endothelial cell
  - preferred_term: macrophage
    term:
      id: CL:0000235
      label: macrophage
  biological_processes:
  - preferred_term: inflammatory response
    modifier: INCREASED
    term:
      id: GO:0006954
      label: inflammatory response
  downstream:
  - target: Arterial ischemic organ injury
    description: Medium-artery inflammation can narrow, thrombose, or weaken vessels, leading to tissue ischemia and organ-specific PAN manifestations.
  evidence:
  - reference: PMID:33569653
    reference_title: Clinical Approach to Diagnosis and Therapy of Polyarteritis Nodosa.
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Polyarteritis nodosa is a rare disease characterized by the necrotizing inflammation of medium-sized arteries.
    explanation: This directly defines PAN as necrotizing inflammation of medium-sized arteries.
  - reference: PMID:26884100
    reference_title: "Polyarteritis nodosa: A contemporary overview."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Polyarteritis nodosa (PAN) is a systemic necrotizing vasculitis predominantly targeting medium-sized arteries.
    explanation: This independently supports the core medium-artery necrotizing vasculitis mechanism.
- name: Idiopathic immune-mediated vascular injury
  description: >-
    In primary or idiopathic PAN, the specific initiating mechanism remains
    uncertain, but clinical response to immunosuppression supports an immune
    contribution to vessel-wall inflammation.
  biological_processes:
  - preferred_term: immune response
    modifier: ABNORMAL
    term:
      id: GO:0006955
      label: immune response
  downstream:
  - target: Necrotizing medium-artery inflammation
    description: Immune-mediated inflammatory pathways sustain necrotizing medium-artery injury in idiopathic PAN.
  evidence:
  - reference: PMID:26884100
    reference_title: "Polyarteritis nodosa: A contemporary overview."
    supports: PARTIAL
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      The pathogenesis of "idiopathic PAN" remains enigmatic, although the clinical responses to immunosuppressive therapy support the concept that immunological mechanisms play an active pathogenic role.
    explanation: This supports an immune-mediated contribution while preserving the source's stated uncertainty.
- name: Arterial ischemic organ injury
  description: >-
    Vascular lesions in medium arteries can produce single-organ disease,
    cutaneous PAN, or severe systemic disease with polyvisceral failure.
  evidence:
  - reference: PMID:26884100
    reference_title: "Polyarteritis nodosa: A contemporary overview."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      The spectrum of disease ranges from involving a single organ to polyvisceral failure.
    explanation: This links PAN vascular injury to organ involvement severity.
