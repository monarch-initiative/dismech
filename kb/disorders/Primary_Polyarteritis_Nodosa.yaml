diagnosis:
- name: Clinical, angiographic, and biopsy integration
  diagnosis_term:
    preferred_term: diagnostic imaging
  description: >-
    Primary PAN diagnosis integrates compatible clinical features with
    angiographic vascular findings and tissue biopsy when available, while
    distinguishing idiopathic disease from hepatitis B-associated PAN.
  results: >-
    Angiographic and biopsy findings supporting systemic non-HBV PAN establish
    the vascular diagnosis in the appropriate clinical context.
  evidence:
  - reference: PMID:26884100
    reference_title: "Polyarteritis nodosa: A contemporary overview."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Diagnosis requires the integration of clinical, angiographic, and biopsy findings.
    explanation: This review states the diagnostic integration approach.
  - reference: PMID:34235889
    reference_title: 2021 American College of Rheumatology/Vasculitis Foundation Guideline for the Management of Polyarteritis Nodosa.
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      These recommendations support early treatment of severe PAN with cyclophosphamide and glucocorticoids, limiting toxicity through minimizing long-term exposure to both treatments, and the use of imaging and tissue biopsy for disease diagnosis.
    explanation: This guideline supports imaging and tissue biopsy for PAN diagnosis.
treatments:
- name: Glucocorticoids and cyclophosphamide for severe primary PAN
  description: >-
    Severe idiopathic or non-HBV-related PAN is treated early with
    glucocorticoids plus cyclophosphamide, with efforts to limit long-term
    toxicity.
  treatment_term:
    preferred_term: pharmacotherapy
    term:
      id: MAXO:0000058
      label: pharmacotherapy
  evidence:
  - reference: PMID:34235889
    reference_title: 2021 American College of Rheumatology/Vasculitis Foundation Guideline for the Management of Polyarteritis Nodosa.
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      These recommendations support early treatment of severe PAN with cyclophosphamide and glucocorticoids, limiting toxicity through minimizing long-term exposure to both treatments, and the use of imaging and tissue biopsy for disease diagnosis.
    explanation: This guideline supports early cyclophosphamide and glucocorticoid treatment for severe systemic non-HBV PAN.
  - reference: PMID:26884100
    reference_title: "Polyarteritis nodosa: A contemporary overview."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Idiopathic generalized PAN should be treated with a combination of glucocorticoids and cyclophosphamide.
    explanation: This review specifically supports glucocorticoid plus cyclophosphamide therapy for idiopathic generalized PAN.
- name: Subtype- and severity-guided immunomodulatory therapy
  description: >-
    Primary PAN therapy is individualized by subtype and severity, using
    glucocorticoids, conventional immunomodulatory agents, and selected biologic
    therapies when appropriate.
  treatment_term:
    preferred_term: pharmacotherapy
    term:
      id: MAXO:0000058
      label: pharmacotherapy
  evidence:
  - reference: PMID:33569653
    reference_title: Clinical Approach to Diagnosis and Therapy of Polyarteritis Nodosa.
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Idiopathic and hereditary variants of polyarteritis nodosa are treated with immunomodulatory medications such as glucocorticoids, conventional immunomodulatory drugs (e.g., cyclophosphamide) and biologic agents (e.g., tumor necrosis factor inhibitors, interleukin 6 inhibitor), while hepatitis B virus-associated polyarteritis nodosa primarily requires antiviral therapy combined with plasma exchange.
    explanation: This supports immunomodulatory therapy for idiopathic PAN and distinguishes it from HBV-associated PAN.
