    reference_title: "PTEN Hamartoma tumor syndrome in childhood: A review of the clinical literature."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      PTEN hamartoma tumor syndrome (PHTS) is a highly variable autosomal
