      id: GO:0022008
      label: neurogenesis
    modifier: ABNORMAL
  downstream:
  - target: Macrocephaly
    causal_link_type: DIRECT
  - target: Autism
    causal_link_type: INDIRECT_KNOWN_INTERMEDIATES
  - target: Global developmental delay
    causal_link_type: INDIRECT_KNOWN_INTERMEDIATES
  evidence:
