name: Long QT Syndrome
creation_date: '2026-04-14T05:37:14Z'
updated_date: '2026-04-14T05:37:14Z'
description: >-
  Long QT syndrome (LQTS) is a heritable cardiac channelopathy of ventricular
  repolarization characterized by QT prolongation, torsades de pointes,
  syncope, cardiac arrest, and sudden cardiac death. This entry serves as the
  disease-level inherited/familial LQTS root for the classical subtype series
  and related non-syndromic multigene forms. It intentionally excludes acquired
  long QT syndrome, Jervell and Lange-Nielsen syndrome, and ANK2 ankyrin-B
  syndrome (historical LQT4), which are clinically or mechanistically distinct.
category: Genetic
disease_term:
  preferred_term: long QT syndrome
  term:
    id: MONDO:0002442
    label: long QT syndrome
synonyms:
- LQTS
- familial long QT syndrome
- inherited long QT syndrome
- congenital long QT syndrome
- Romano-Ward syndrome
parents:
- Cardiac Arrhythmia
- Channelopathy
notes: >-
  Curated as the disease-level inherited long-QT root so that canonical
  LQT1-LQT3 and related rare-gene familial forms can be lumped under one
  mechanistic entry without duplicating already distinct syndromic or
  gene-specific entries.
