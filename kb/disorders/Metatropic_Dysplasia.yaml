    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      In addition to the airway difficulties, spinal canal narrowing or stenosis was widely prevalent, and no neuraxial anesthetic was performed in any of our patients.
    explanation: >-
