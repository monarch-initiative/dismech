name: Sitosterolemia
category: Mendelian
creation_date: '2026-05-11T00:00:00Z'
updated_date: '2026-05-11T00:00:00Z'
synonyms:
- Phytosterolemia
- Beta-sitosterolemia
description: >-
  Sitosterolemia is an autosomal recessive lipid transport disorder caused by
  biallelic loss-of-function variants in ABCG5 or ABCG8. These genes encode the
  G5G8 sterol transporter in hepatocytes and enterocytes. Loss of transporter
  function impairs secretion of dietary xenosterols into bile and the intestinal
  lumen, producing markedly elevated plasma and tissue plant sterols, especially
  sitosterol and campesterol, with xanthomas, arthritis or arthralgia,
  premature atherosclerosis, and variable hematologic manifestations.
