biochemical:
- name: Plasma sitosterol and campesterol
  presence: Elevated
  context: >-
    Core biochemical marker and pharmacodynamic readout for plant sterol burden
    in sitosterolemia.
  readouts:
  - target: Plant sterol accumulation
    relationship: PHARMACODYNAMIC_MARKER_OF
    direction: POSITIVE
    endpoint_context: PHARMACODYNAMIC
    regulatory_endpoint_refs:
    - FDA-SE-adult-noncancer-037
    - FDA-SE-pediatric-noncancer-026
    interpretation: >-
      Higher plasma sitosterol and campesterol indicate greater plant sterol
      accumulation, while decreases after cholesterol-absorption inhibition
      indicate reduced plant sterol burden.
    evidence:
    - reference: PMID:14769702
      reference_title: "Ezetimibe effectively reduces plasma plant sterols in patients with sitosterolemia."
      supports: SUPPORT
      evidence_source: HUMAN_CLINICAL
      snippet: Ezetimibe produced significant and progressive reductions in plasma plant sterol concentrations in patients with sitosterolemia.
      explanation: The randomized trial supports plasma plant sterols as a pharmacodynamic treatment-response readout.
  evidence:
  - reference: PMID:14769702
    reference_title: "Ezetimibe effectively reduces plasma plant sterols in patients with sitosterolemia."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: Sitosterol concentrations decreased by 21% (P<0.001) in patients treated with ezetimibe.
    explanation: The trial measures plasma sitosterol and campesterol as treatment-responsive markers.
