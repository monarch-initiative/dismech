- name: ABCG5/ABCG8 sterol efflux deficiency
  description: >-
    Loss of ABCG5 or ABCG8 disrupts the G5G8 half-transporter heterodimer that
    normally secretes cholesterol and dietary plant sterols from hepatocytes into
    bile and from enterocytes back into the intestinal lumen.
