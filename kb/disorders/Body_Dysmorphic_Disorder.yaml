  - reference: PMID:29701157
    reference_title: Pharmacological Treatment of Body Dysmorphic Disorder.
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Treatment of body dysmorphic disorder typically consists of a combination
