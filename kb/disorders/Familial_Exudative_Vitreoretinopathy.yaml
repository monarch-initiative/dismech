  evidence:
  - reference: PMID:20340138
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "mutations in the gene encoding NDP, a ligand \nfor these Wnt receptors, cause Norrie disease and FEVR"
