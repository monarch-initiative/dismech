    term:
      id: HP:0000006
      label: Autosomal dominant inheritance
  description: >-
    The most common mode of inheritance for FEVR, seen with FZD4, LRP5, TSPAN12,
    and KIF11 variants. Penetrance is reduced and expressivity is highly variable.
  evidence:
