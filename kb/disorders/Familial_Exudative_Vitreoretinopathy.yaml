genetic:
- name: FZD4 frizzled-4 receptor defect
  gene_term:
    preferred_term: FZD4
    modifier: DECREASED
    term:
      id: hgnc:4042
      label: FZD4
  relationship_type: CAUSATIVE
  notes: >-
    FZD4 encodes frizzled-4, the obligate Norrin receptor. Loss-of-function
