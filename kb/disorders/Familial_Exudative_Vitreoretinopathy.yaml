  - reference: PMID:25124931
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "The KIF11 gene \nlikely plays a role in retinal vascular development and mutations in this gene \ncan lead to clinical overlap with FEVR."
