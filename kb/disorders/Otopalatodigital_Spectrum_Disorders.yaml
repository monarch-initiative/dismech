name: Otopalatodigital Spectrum Disorders
creation_date: "2026-04-04T00:00:00Z"
updated_date: "2026-04-04T00:00:00Z"
description: >-
  The FLNA-related otopalatodigital (OPD) spectrum disorders are a group of
  X-linked skeletal dysplasias caused by gain-of-function missense mutations
  in FLNA (filamin A). The spectrum includes otopalatodigital syndrome type 1
  (OPD1), otopalatodigital syndrome type 2 (OPD2), frontometaphyseal dysplasia
  (FMD), and Melnick-Needles syndrome (MNS). These disorders share overlapping
  craniofacial, skeletal, and digital anomalies but differ in severity.
  Mutations are clustered in four regions of FLNA: the actin-binding domain
  and rod domain repeats 3, 10, and 14/15. Males are typically more severely
  affected than females; OPD2 and MNS are usually lethal in hemizygous males.
  The gain-of-function mechanism is distinct from the loss-of-function mutations
  causing periventricular nodular heterotopia.
category: Genetic
parents:
  - Skeletal Dysplasia
  - Craniofacial Disorder
disease_term:
  preferred_term: otopalatodigital syndrome spectrum disorder
  term:
    id: MONDO:0018233
    label: otopalatodigital syndrome spectrum disorder
has_subtypes:
  - name: OPD1
    display_name: Otopalatodigital Syndrome Type 1
    description: >-
      Mildest form. Most manifestations present at birth. Conductive hearing
      loss, cleft palate, characteristic facial features, and digital anomalies.
      Females can present with severity similar to males, although some have
      mild manifestations.
    subtype_term:
      preferred_term: otopalatodigital syndrome type 1
      term:
        id: MONDO:0010704
        label: otopalatodigital syndrome type 1
  - name: OPD2
    display_name: Otopalatodigital Syndrome Type 2
    description: >-
      More severe than OPD1. Males typically die during the first year of life
      from thoracic hypoplasia and pulmonary insufficiency. Survivors are
      developmentally delayed and require respiratory support. Females are
      less severely affected.
    subtype_term:
      preferred_term: otopalatodigital syndrome type 2
      term:
        id: MONDO:0010571
        label: otopalatodigital syndrome type 2
  - name: FMD
    display_name: Frontometaphyseal Dysplasia
    description: >-
      Males demonstrate skeletal dysplasia with hearing loss and variable
      joint contractures, hand and foot malformations. Progressive scoliosis
      in both sexes. Females less severely affected.
    subtype_term:
      preferred_term: frontometaphyseal dysplasia 1
      term:
        id: MONDO:0024550
        label: frontometaphyseal dysplasia 1
  - name: MNS
    display_name: Melnick-Needles Syndrome
    description: >-
      Wide phenotypic variability in females; some diagnosed in adulthood,
      others require respiratory support. Male hemizygotes have perinatal
      lethality in all known cases. Characterized by flared metaphyses,
      s-curved long bones, and ribbon-like ribs.
    subtype_term:
      preferred_term: Melnick-Needles syndrome
      term:
        id: MONDO:0010650
        label: Melnick-Needles syndrome
