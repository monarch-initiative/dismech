pathophysiology:
  - name: FLNA Gain-of-Function and Cytoskeletal Signaling Dysregulation
    description: >-
      Gain-of-function missense mutations in FLNA cause the OPD spectrum
      disorders. These mutations are localized, conserve the reading frame,
      and cluster in four regions: the actin-binding domain and rod domain
      repeats 3, 10, and 14/15. The mutant filamin A protein shows increased
      F-actin binding affinity, consistent with a gain-of-function mechanism.
      This is mechanistically distinct from the loss-of-function mutations
      causing periventricular nodular heterotopia. The gain-of-function
      mutations implicate filamin A in signaling pathways that mediate
      organogenesis in multiple organ systems during embryonic development.
    cell_types:
      - preferred_term: Osteoblast
        term:
          id: CL:0000062
          label: osteoblast
      - preferred_term: Chondrocyte
        term:
          id: CL:0000138
          label: chondrocyte
    biological_processes:
      - preferred_term: Actin cytoskeleton organization
        term:
          id: GO:0030036
          label: actin cytoskeleton organization
      - preferred_term: Skeletal system development
        term:
          id: GO:0001501
          label: skeletal system development
      - preferred_term: Intracellular signal transduction
        term:
          id: GO:0035556
          label: intracellular signal transduction
    locations:
      - preferred_term: Bone
        term:
          id: UBERON:0002481
          label: bone tissue
      - preferred_term: Skull
        term:
          id: UBERON:0003129
          label: skull
    evidence:
      - reference: PMID:12612583
        supports: SUPPORT
        evidence_source: HUMAN_CLINICAL
        snippet: >-
          We identified localized mutations in FLNA that conserve the reading
          frame and lead to a broad range of congenital malformations,
          affecting craniofacial structures, skeleton, brain, viscera and
          urogenital tract, in four X-linked human disorders
        explanation: >-
          Landmark paper identifying gain-of-function FLNA mutations as
          causative for the OPD spectrum.
      - reference: PMID:12612583
        supports: SUPPORT
        evidence_source: HUMAN_CLINICAL
        snippet: >-
          all are clustered into four regions of the gene: the actin-binding
          domain and rod domain repeats 3, 10 and 14/15
        explanation: >-
          Defines the mutational clustering pattern characteristic of OPD
          spectrum disorders.
      - reference: PMID:19773341
        supports: SUPPORT
        evidence_source: IN_VITRO
        snippet: >-
          recombinant FLNA E254K ABD has increased in vitro F-actin binding
          (K(d) 13 microm) compared with wild type (WT; K(d) 48 microm).
          These observations are consistent with a gain-of-function mechanism
          for OPD.
        explanation: >-
          Provides biochemical evidence that OPD mutations increase actin
          binding, confirming gain-of-function mechanism.
    downstream:
      - target: Craniofacial and Skeletal Malformations
  - name: Craniofacial and Skeletal Malformations
    description: >-
      The gain-of-function FLNA mutations disrupt skeletal development,
      leading to craniofacial dysmorphism, metaphyseal flaring, abnormal
      ossification, and digital malformations. The severity and pattern of
      skeletal involvement varies across the OPD spectrum subtypes.
    biological_processes:
      - preferred_term: Bone development
        term:
          id: GO:0060348
          label: bone development
      - preferred_term: Cranial suture morphogenesis
        term:
          id: GO:0060363
          label: cranial suture morphogenesis
    locations:
      - preferred_term: Skeleton
        term:
          id: UBERON:0004288
          label: skeleton
    evidence:
      - reference: PMID:12612583
        supports: SUPPORT
        evidence_source: HUMAN_CLINICAL
        snippet: >-
          The patterns of mutation, X-chromosome inactivation and phenotypic
          manifestations in the newly described mutations indicate that they
          have gain-of-function effects, implicating filamin A in signaling
          pathways that mediate organogenesis in multiple systems during
          embryonic development.
        explanation: >-
          Establishes that the skeletal malformations result from
          gain-of-function effects on developmental signaling.
phenotypes:
  - category: Musculoskeletal
    name: Skeletal Dysplasia
    frequency: Very frequent
    description: >-
      Variable skeletal abnormalities across all subtypes, including
      metaphyseal flaring, bowed long bones, and abnormal ossification.
    phenotype_term:
      preferred_term: Skeletal dysplasia
      term:
        id: HP:0002652
        label: Skeletal dysplasia
    evidence:
      - reference: PMID:20301567
        supports: SUPPORT
        evidence_source: HUMAN_CLINICAL
        snippet: >-
          The FLNA-related otopalatodigital (FLNA-OPD) spectrum disorders,
          characterized primarily by skeletal dysplasia
        explanation: >-
          GeneReviews defines skeletal dysplasia as the primary feature
          of the OPD spectrum.
  - category: Craniofacial
    name: Craniofacial Dysmorphism
    frequency: Very frequent
    description: >-
      Characteristic facial features vary by subtype but commonly include
      frontal bossing, supraorbital hyperostosis, and midface hypoplasia.
    phenotype_term:
      preferred_term: Craniofacial dysmorphism
      term:
        id: HP:0001999
        label: Abnormal facial shape
    evidence:
      - reference: PMID:20301567
        supports: SUPPORT
        evidence_source: HUMAN_CLINICAL
        snippet: >-
          cosmetic surgery may correct the fronto-orbital deformity
        explanation: >-
          GeneReviews documents fronto-orbital deformity as a management
          target, confirming craniofacial dysmorphism as a key feature.
  - category: Hearing
    name: Conductive Hearing Loss
    frequency: Frequent
    description: >-
      Conductive hearing impairment is common, particularly in OPD1 and FMD,
      resulting from ossicular chain anomalies.
    phenotype_term:
      preferred_term: Conductive hearing loss
      term:
        id: HP:0000405
        label: Conductive hearing impairment
    evidence:
      - reference: PMID:20301567
        supports: SUPPORT
        evidence_source: HUMAN_CLINICAL
        snippet: >-
          Males usually, but not always, demonstrate a skeletal dysplasia
          in association with hearing loss
        explanation: >-
          GeneReviews confirms hearing loss as a key feature of FLNA-FMD.
  - category: Musculoskeletal
    name: Cleft Palate
    frequency: Frequent
    description: >-
      Cleft palate is a frequent finding, particularly in OPD1 and OPD2.
    phenotype_term:
      preferred_term: Cleft palate
      term:
        id: HP:0000175
        label: Cleft palate
    evidence:
      - reference: PMID:20301567
        supports: SUPPORT
        evidence_source: HUMAN_CLINICAL
        snippet: >-
          surgical correction for orthognathic deformities as needed
        explanation: >-
          GeneReviews lists orthognathic surgical correction as a management
          recommendation, consistent with cleft palate as a feature of OPD.
  - category: Musculoskeletal
    name: Scoliosis
    frequency: Frequent
    description: >-
      Progressive scoliosis is observed in both affected males and females,
      particularly in FMD.
    phenotype_term:
      preferred_term: Scoliosis
      term:
        id: HP:0002650
        label: Scoliosis
    evidence:
      - reference: PMID:20301567
        supports: SUPPORT
        evidence_source: HUMAN_CLINICAL
        snippet: >-
          Progressive scoliosis is observed in both affected males and females.
        explanation: >-
          GeneReviews documents progressive scoliosis as a common feature.
  - category: Respiratory
    name: Thoracic Hypoplasia
    frequency: Occasional
    subtype: OPD2
    description: >-
      Thoracic hypoplasia resulting in pulmonary insufficiency is a major
      cause of death in OPD2 males during the first year of life.
    phenotype_term:
      preferred_term: Thoracic hypoplasia
      term:
        id: HP:0005257
        label: Thoracic hypoplasia
    evidence:
      - reference: PMID:20301567
        supports: SUPPORT
        evidence_source: HUMAN_CLINICAL
        snippet: >-
          Most males with FLNA-OPD2 die during the first year of life,
          usually from thoracic hypoplasia resulting in pulmonary
          insufficiency.
        explanation: >-
          GeneReviews identifies thoracic hypoplasia as the primary cause
          of OPD2 male lethality.
  - category: Musculoskeletal
    name: Joint Contractures
    frequency: Occasional
    description: >-
      Variable joint contractures, particularly in FMD.
    phenotype_term:
      preferred_term: Joint contractures
      term:
        id: HP:0001371
        label: Flexion contracture
    evidence:
      - reference: PMID:20301567
        supports: SUPPORT
        evidence_source: HUMAN_CLINICAL
        snippet: >-
          variably, joint contractures and hand and foot malformations
        explanation: >-
          GeneReviews confirms variable joint contractures as a feature of
          FLNA-FMD within the OPD spectrum.
  - category: Craniofacial
    name: Micrognathia
    frequency: Occasional
    description: >-
      Small jaw that may contribute to airway complications.
    phenotype_term:
      preferred_term: Micrognathia
      term:
        id: HP:0000347
        label: Micrognathia
    evidence:
      - reference: PMID:20301567
        supports: SUPPORT
        evidence_source: HUMAN_CLINICAL
        snippet: >-
          mandibular distraction can improve airway complications related to
          micrognathia
        explanation: >-
          GeneReviews management guidance mentions micrognathia as a cause of
          airway complications requiring mandibular distraction.
genetic:
  - name: FLNA Gain-of-Function Missense Variants
    association: Pathogenic Variants
    gene_term:
      preferred_term: FLNA
      term:
        id: hgnc:3754
        label: FLNA
    inheritance:
      - name: X-linked Dominant
        inheritance_term:
          preferred_term: X-linked dominant inheritance
          term:
            id: HP:0001423
            label: X-linked dominant inheritance
    features: >-
      Gain-of-function missense mutations clustered in the actin-binding
      domain and rod domain repeats 3, 10, and 14/15. Several mutations are
      recurrent. Males with OPD2 and MNS mutations typically have perinatal
      lethality. Penetrance in males is complete.
    evidence:
      - reference: PMID:12612583
        supports: SUPPORT
        evidence_source: HUMAN_CLINICAL
        snippet: >-
          We identified localized mutations in FLNA that conserve the reading
          frame and lead to a broad range of congenital malformations
        explanation: >-
          Defines the gain-of-function mutation spectrum for OPD spectrum.
      - reference: PMID:19773341
        supports: SUPPORT
        evidence_source: IN_VITRO
        snippet: >-
          These data provide the first biochemical evidence for a
          gain-of-function mechanism for the OPD disorders, and
          mechanistically distinguishes them from the loss-of-function
          phenotypes that manifest as disorders of neuronal migration.
        explanation: >-
          Biochemical confirmation of gain-of-function mechanism,
          distinguishing from PVNH loss-of-function.
      - reference: PMID:20301567
        supports: SUPPORT
        evidence_source: HUMAN_CLINICAL
        snippet: >-
          Penetrance in males with an FLNA pathogenic variant leading to an
          FLNA-OPD spectrum disorder is complete
        explanation: >-
          GeneReviews confirms complete penetrance in males.
treatments:
  - name: Orthopedic Surgery
    description: >-
      Surgical treatment for hand and foot malformations, scoliosis bracing
      and surgical intervention, and correction of orthognathic deformities.
    treatment_term:
      preferred_term: Orthopedic surgery
      term:
        id: MAXO:0000004
        label: surgical procedure
    evidence:
      - reference: PMID:20301567
        supports: SUPPORT
        evidence_source: HUMAN_CLINICAL
        snippet: >-
          Surgical treatment may be required for hand and foot malformations.
        explanation: >-
          GeneReviews management guidance for skeletal anomalies.
  - name: Hearing Aids
    description: >-
      Hearing aids for conductive hearing loss, with annual audiology
      evaluation recommended.
    treatment_term:
      preferred_term: Hearing aids
      term:
        id: MAXO:0000950
        label: supportive care
    evidence:
      - reference: PMID:20301567
        supports: SUPPORT
        evidence_source: HUMAN_CLINICAL
        snippet: >-
          hearing aids for deafness
        explanation: >-
          GeneReviews management recommendation for hearing impairment.
  - name: Respiratory Support
    description: >-
      Continuous positive airway pressure and mandibular distraction for
      airway complications. Chest expansion surgery for thoracic hypoplasia.
    treatment_term:
      preferred_term: Respiratory support
      term:
        id: MAXO:0000950
        label: supportive care
    evidence:
      - reference: PMID:20301567
        supports: SUPPORT
        evidence_source: HUMAN_CLINICAL
        snippet: >-
          continuous positive airway pressure and mandibular distraction can
          improve airway complications related to micrognathia
        explanation: >-
          GeneReviews details respiratory management strategies.
  - name: Genetic Counseling
    description: >-
      Genetic counseling regarding X-linked inheritance, male lethality
      in severe subtypes, and prenatal testing options.
    treatment_term:
      preferred_term: Genetic counseling
      term:
        id: MAXO:0000079
        label: genetic counseling
    evidence:
      - reference: PMID:20301567
        supports: SUPPORT
        evidence_source: HUMAN_CLINICAL
        snippet: >-
          Once the FLNA pathogenic variant has been identified in an
          affected family member, prenatal and preimplantation genetic
          testing for FLNA-OPD spectrum disorders are possible.
        explanation: >-
          GeneReviews genetic counseling guidance.
