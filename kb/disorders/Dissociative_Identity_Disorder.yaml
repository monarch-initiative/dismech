  - reference: DOI:10.1017/S0033291721002154
    reference_title: "A neurostructural biomarker of dissociative amnesia: a hippocampal study in dissociative identity disorder"
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
