    term:
      id: CL:0000740
      label: retinal ganglion cell
  locations:
  - preferred_term: optic nerve
    term:
      id: UBERON:0000941
      label: cranial nerve II
  biological_processes:
  - preferred_term: response to endoplasmic reticulum stress
    term:
      id: GO:0034976
      label: response to endoplasmic reticulum stress
    modifier: INCREASED
  evidence:
  - reference: PMID:24823368
    supports: SUPPORT
    evidence_source: MODEL_ORGANISM
    snippet: >-
      Analysis of unfolded protein response signaling revealed an activation
      of endoplasmic reticulum stress in Wfs1-/- mutant mouse retinas.
      Altogether, progressive VEPs alterations with minimal neuronal cell
      loss suggest functional alteration of the action potential in the
      Wfs1-/- optic pathways.
    explanation: >-
      The Wfs1 knockout mouse links retinal ER stress to progressive optic
      pathway dysfunction.

- name: Early white matter hypomyelination
  description: >-
    Wolfram syndrome shows early white-matter abnormalities consistent with
    impaired myelination, implicating oligodendrocyte and myelin biology in
    early CNS disease.
  subtypes:
  - Type 1
  cell_types:
  - preferred_term: oligodendrocyte
    term:
      id: CL:0000128
      label: oligodendrocyte
  locations:
