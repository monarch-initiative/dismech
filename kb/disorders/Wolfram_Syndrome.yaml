    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      This pattern of findings suggests that reduction in myelin is a
      primary neuropathological feature of Wolfram syndrome.
    explanation: >-
      Human MRI data support hypomyelination as an early central nervous
      system abnormality in Wolfram syndrome.
  - reference: PMID:31796109
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Therefore, we propose that Wolfram syndrome could belong to a
      category of neurodevelopmental disorders characterized by ER
      stress-mediated myelination impairment.
    explanation: >-
      This review integrates imaging and gene-expression data into a
      mechanistic myelination hypothesis.

- name: Progressive brainstem and cerebellar neurodegeneration
  description: >-
    Structural brain abnormalities in Wolfram syndrome include progressive
    loss of brainstem and cerebellar tissue, consistent with clinically
    significant neurodegeneration that eventually drives morbidity and
    mortality.
