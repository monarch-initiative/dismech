    term:
      id: GO:0030073
      label: insulin secretion
    modifier: DECREASED
  - preferred_term: apoptotic process
    term:
      id: GO:0006915
      label: apoptotic process
    modifier: INCREASED
  evidence:
  - reference: PMID:29931562
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Diabetes in WFS patients is a nonautoimmune type of diabetes yet is
      associated with insulin deficiency due to selective loss of pancreatic
      beta cells and impaired insulin secretion [103].
    explanation: >-
      This review provides a concise disease-level statement connecting
      selective beta-cell loss to insulin-deficient diabetes.
  - reference: PMID:35399956
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: >-
      Loss of function of WFS1 leads to dysregulation of insulin production
      and secretion, ER calcium depletion, and cytosolic calpains
      activation, resulting in activation of apoptotic cascades.
    explanation: >-
      This supports decreased insulin secretion and apoptosis as immediate
      pathogenic consequences of WFS1 deficiency.

- name: Optic pathway dysfunction and retinal ER stress
  description: >-
    WFS1 deficiency causes retinal ER stress and progressive optic pathway
    dysfunction, supporting optic nerve degeneration as a direct consequence
    of organelle stress in visual neurons.
  subtypes:
  - Type 1
  cell_types:
