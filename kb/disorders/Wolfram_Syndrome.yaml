name: Wolfram syndrome
creation_date: "2026-04-13T01:07:25Z"
updated_date: "2026-04-13T01:52:00Z"
category: Mendelian
description: >-
  Wolfram syndrome is a rare autosomal recessive syndromic monogenic diabetes
  and neurodegenerative disorder defined clinically by juvenile-onset
  insulin-deficient diabetes mellitus, optic atrophy, and progressive
  neurological involvement with frequent sensorineural hearing impairment.
  Classic type 1 disease is caused by biallelic WFS1 variants, whereas type 2
  disease is caused by biallelic CISD2 variants. Across the syndrome, the main
  mechanistic theme is failure of endoplasmic-reticulum and mitochondria-
  associated membrane homeostasis, especially calcium handling, with downstream
  ER stress, mitochondrial dysfunction, selective pancreatic beta-cell
  vulnerability, optic pathway degeneration, and progressive brain involvement.
disease_term:
  preferred_term: Wolfram syndrome
  term:
    id: MONDO:0018105
    label: Wolfram syndrome
synonyms:
- DIDMOAD
- DIDMOAD syndrome
parents:
- Monogenic Diabetes
- Neurodegenerative Disease
notes: >-
  This entry is intentionally curated at the MONDO Wolfram syndrome umbrella
  level (MONDO:0018105) and includes recessive WFS1-related type 1 disease and
  recessive CISD2-related type 2 disease. Monoallelic WFS1-related Wolfram-like
  syndrome is a distinct disease concept and is excluded from this curation.
has_subtypes:
- name: Type 1
  display_name: Wolfram syndrome type 1
  description: >-
    Classic Wolfram syndrome caused by biallelic pathogenic variants in WFS1.
    The core phenotype includes juvenile-onset diabetes mellitus and optic
    atrophy, with frequent sensorineural hearing impairment, diabetes
    insipidus, and progressive neurological disease.
  subtype_term:
    preferred_term: Wolfram syndrome type 1
    term:
      id: MONDO:0009101
      label: Wolfram syndrome 1
  evidence:
  - reference: PMID:28432734
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      The presence of biallelic loss-of-function variants predicted Wolfram
      syndrome defined by insulin-dependent diabetes and optic atrophy, with
      a sensitivity of 79% (95% CI 75%-83%) and specificity of 92% (83%-97%).
    explanation: >-
      The WFS1 genotype-phenotype analysis supports the classic recessive
      WS1 subtype as the main full-syndrome presentation.
  - reference: PMID:35328914
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Wolfram syndrome 1 (WS1) is a rare neurodegenerative disease
      transmitted in an autosomal recessive mode. It is characterized by
      diabetes insipidus (DI), diabetes mellitus (DM), optic atrophy (OA),
      and sensorineural hearing loss (D) (DIDMOAD).
    explanation: >-
      This review abstract captures the core diagnostic and subtype-defining
      features of recessive WFS1-related disease.
- name: Type 2
  display_name: Wolfram syndrome type 2
  description: >-
    CISD2-related Wolfram syndrome with overlapping diabetes, optic atrophy,
    and hearing impairment, but typically without diabetes insipidus and with
    greater bleeding tendency and peptic ulcer disease.
  subtype_term:
    preferred_term: Wolfram syndrome type 2
    term:
      id: MONDO:0011502
      label: Wolfram syndrome 2
  evidence:
  - reference: PMID:35055657
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      WS2 is the rarest and most recently identified subtype of WS; its
      clinical picture is partially overlapping with that of WS1, from which
      it traditionally differs by the absence of diabetes insipidus and the
      presence of greater bleeding tendency and peptic ulcers.
    explanation: >-
      This systematic review abstract cleanly distinguishes the WS2 subtype
      from classic WS1.
  - reference: PMID:29774890
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Mutations of CISD2 gene cause autosomal recessive Wolfram syndrome 2
      (WS2) characterized by the absence of diabetes insipidus and
      psychiatric disorders, and by bleeding upper intestinal ulcer and
      defective platelet aggregation.
    explanation: >-
      This review provides a concise genetic and phenotypic definition of
      CISD2-related type 2 disease.
prevalence:
- population: Global
  percentage: 1 in 770,000
  notes: >-
    Frequently cited prevalence estimate for Wolfram syndrome in pediatric
    monogenic diabetes literature; the true prevalence is likely sensitive to
    ascertainment and founder effects, and WS2 is much rarer than WS1.
  evidence:
  - reference: PMID:29931562
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      The most frequent syndromic form of monogenic diabetes in children and
      adolescents is Wolfram syndrome (WFS). Wolfram syndrome, also known as
      DIDMOAD (diabetes insipidus, diabetes mellitus, optic atrophy, and
      deafness), is a rare autosomal recessive disorder with an estimated
      prevalence of 1 in 770,000 [102].
    explanation: >-
      This review provides a directly quoted prevalence estimate and frames
      Wolfram syndrome as a syndromic monogenic diabetes.
progression:
- notes: >-
    Wolfram syndrome typically begins in childhood with diabetes mellitus and
    evolves into progressive multisystem neurodegeneration. Brain imaging
    studies support both early neurodevelopmental abnormalities and later
    degenerative change, and mortality is often driven by brainstem disease
    with respiratory failure.
  evidence:
  - reference: PMID:31337416
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Prognosis is poor, death occurs at the median age of 39 years with a
      major cause represented by respiratory failure as a consequence of
      brain stem atrophy and neurodegeneration.
    explanation: >-
      This review abstract gives a clear disease-level prognosis statement
      and links mortality to brainstem degeneration.
  - reference: PMID:30979932
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      These patterns suggest that there may be early, stalled white matter
      development in Wolfram syndrome, with additional degenerative
      processes in both white and gray matter.
    explanation: >-
      Longitudinal MRI data support a combined neurodevelopmental and
      neurodegenerative disease course.
inheritance:
- name: Autosomal recessive
  description: >-
    Classic Wolfram syndrome type 1 and type 2 are autosomal recessive
    disorders. Dominant WFS1-related Wolfram-like and isolated phenotypes are
    outside the scope of this disease root.
  inheritance_term:
    preferred_term: Autosomal recessive inheritance
    term:
      id: HP:0000007
      label: Autosomal recessive inheritance
  evidence:
  - reference: PMID:31337416
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      The transmission of the disease takes place in an autosomal recessive
      mode but autosomal dominant mutations responsible for WS-related
      disorders have been described.
    explanation: >-
      This supports recessive inheritance for the classic syndrome while
      also clarifying why dominant WFS1-related disorders should be split.
pathophysiology:
- name: WFS1 loss and ER calcium homeostasis dysregulation
  description: >-
    In WS1, loss of wolframin perturbs endoplasmic reticulum calcium
    homeostasis and adaptive ER stress signaling in selectively vulnerable
    endocrine and neuronal cells.
  subtypes:
  - Type 1
  genes:
  - preferred_term: WFS1
    term:
      id: hgnc:12762
      label: WFS1
  cell_types:
  - preferred_term: pancreatic beta cell
    term:
      id: CL:0000169
      label: type B pancreatic cell
  biological_processes:
  - preferred_term: endoplasmic reticulum calcium ion homeostasis
    term:
      id: GO:0032469
      label: endoplasmic reticulum calcium ion homeostasis
    modifier: DYSREGULATED
  evidence:
  - reference: PMID:11181571
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: >-
      ER localization of WFS1 suggests that this protein plays an as yet
      undefined role in membrane trafficking, protein processing and/or
      regulation of ER calcium homeostasis.
    explanation: >-
      Cell-localization studies directly support wolframin as an ER protein
      involved in ER calcium homeostasis.
  - reference: PMID:35399956
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: >-
      Loss of function of WFS1 leads to dysregulation of insulin production
      and secretion, ER calcium depletion, and cytosolic calpains
      activation, resulting in activation of apoptotic cascades.
    explanation: >-
      This beta-cell study ties WFS1 loss directly to ER calcium depletion
      and downstream cell-death signaling.
  downstream:
  - target: ER stress activation
  - target: Impaired ER-mitochondria calcium signaling

- name: CISD2 loss and ER-mitochondrial calcium transfer impairment
  description: >-
    In WS2, CISD2 loss reduces ER-mitochondrial contact-dependent calcium
    transfer and increases autophagic flux, particularly compromising neuronal
    stress resilience.
  subtypes:
  - Type 2
  genes:
  - preferred_term: CISD2
    term:
      id: hgnc:24212
      label: CISD2
  cell_types:
  - preferred_term: neuron
    term:
      id: CL:0000540
      label: neuron
  biological_processes:
  - preferred_term: autophagy
    term:
      id: GO:0006914
      label: autophagy
    modifier: INCREASED
  - preferred_term: mitochondrion organization
    term:
      id: GO:0007005
      label: mitochondrion organization
    modifier: DYSREGULATED
  evidence:
  - reference: PMID:41299767
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: >-
      As such, loss of Cisd2 in HeLa cells results in reduced
      ER-mitochondrial Ca2+ transfer while only modestly impacting cytosolic
      Ca2+ signaling.
    explanation: >-
      This disease-relevant cell study supports CISD2 as a determinant of
      ER-mitochondrial calcium transfer in WS2.
  - reference: PMID:41299767
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: >-
      Correlating with the profound changes in cellular Ca2+ handling,
      mitochondrial function (oxygen consumption rate, ATP production,
      mitochondrial potential maintenance) declined severely, while
      autophagic flux was increased.
    explanation: >-
      The same study links the calcium-transfer defect to mitochondrial
      dysfunction and increased autophagy in CISD2-deficient neurons.
  downstream:
  - target: Impaired ER-mitochondria calcium signaling

- name: ER stress activation
  description: >-
    WFS1-deficient cells mount a sustained ER stress response, linking the
    upstream organelle defect to maladaptive signaling in pancreatic islets and
    other vulnerable tissues.
  subtypes:
  - Type 1
  cell_types:
  - preferred_term: pancreatic beta cell
    term:
      id: CL:0000169
      label: type B pancreatic cell
  locations:
  - preferred_term: islet of Langerhans
    term:
      id: UBERON:0000006
      label: islet of Langerhans
  biological_processes:
  - preferred_term: response to endoplasmic reticulum stress
    term:
      id: GO:0034976
      label: response to endoplasmic reticulum stress
    modifier: INCREASED
  evidence:
  - reference: PMID:15994758
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: >-
      Wfs1 expression, which is localized to beta- and delta-cells in
      pancreatic islets, increases in response to ER stress, suggesting a
      functional link between Wfs1 and ER stress.
    explanation: >-
      This pancreatic islet study directly connects WFS1 biology to ER
      stress responses.
  downstream:
  - target: Sterile beta-cell inflammation

- name: Impaired ER-mitochondria calcium signaling
  description: >-
    WFS1- and CISD2-related disease both converge on abnormal calcium exchange
    across mitochondria-associated ER membranes, reducing organelle crosstalk
    needed for cellular bioenergetics and survival.
  subtypes:
  - Type 1
  - Type 2
  biological_processes:
  - preferred_term: endoplasmic reticulum calcium ion homeostasis
    term:
      id: GO:0032469
      label: endoplasmic reticulum calcium ion homeostasis
    modifier: DYSREGULATED
  - preferred_term: mitochondrion organization
    term:
      id: GO:0007005
      label: mitochondrion organization
    modifier: DYSREGULATED
  evidence:
  - reference: PMID:30352948
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: >-
      Here, we showed that WFS1 formed a complex with neuronal calcium
      sensor 1 (NCS1) and inositol 1,4,5-trisphosphate receptor (IP3R) to
      promote Ca2+ transfer between the ER and mitochondria.
    explanation: >-
      This provides direct mechanistic evidence that WFS1 supports ER to
      mitochondria calcium transfer.
  - reference: PMID:41299767
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: >-
      Overall, this work is one of the first to decipher the impact of
      Cisd2 on ER-mitochondria Ca2+ handling in a WS2 disease-relevant cell
      models, thereby revealing a unique dependence of neurons on Cisd2 for
      their mitochondrial health and cell stress resilience.
    explanation: >-
      This extends the calcium-handling mechanism to CISD2-related WS2 in
      disease-relevant neuronal models.
  downstream:
  - target: Mitochondrial dysfunction and stress vulnerability

- name: Mitochondrial dysfunction and stress vulnerability
  description: >-
    Disrupted ER-mitochondria signaling compromises mitochondrial
    bioenergetics, lowers ATP production, and increases susceptibility to
    stress-induced cell death in Wolfram syndrome neurons.
  subtypes:
  - Type 1
  - Type 2
  cell_types:
  - preferred_term: neuron
    term:
      id: CL:0000540
      label: neuron
  biological_processes:
  - preferred_term: mitochondrion organization
    term:
      id: GO:0007005
      label: mitochondrion organization
    modifier: DYSREGULATED
  - preferred_term: apoptotic process
    term:
      id: GO:0006915
      label: apoptotic process
    modifier: INCREASED
  evidence:
  - reference: PMID:37163979
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: >-
      Here we demonstrate mitochondrial dysfunction in human induced
      pluripotent stem cell-derived neuronal cells of WS patients.
    explanation: >-
      Patient-derived neuronal models directly demonstrate mitochondrial
      dysfunction in WFS1-related Wolfram syndrome.
  - reference: PMID:41299767
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: >-
      Overall, these deficiencies further impact the resilience of
      Cisd2-deficient cortical neurons to cell stress as Cisd2-KO neurons
      were highly sensitive to staurosporine, an inducer of apoptosis.
    explanation: >-
      CISD2-deficient neurons show reduced stress resilience and increased
      apoptosis susceptibility downstream of mitochondrial dysfunction.
  downstream:
  - target: Early white matter hypomyelination
  - target: Progressive brainstem and cerebellar neurodegeneration
  - target: Optic pathway dysfunction and retinal ER stress

- name: Sterile beta-cell inflammation
  description: >-
    WFS1-deficient beta cells upregulate cytokines and chemokines, and
    inflammatory-cell infiltration develops within pancreatic islets, creating
    a feed-forward cycle between ER stress and islet inflammation.
  subtypes:
  - Type 1
  cell_types:
  - preferred_term: pancreatic beta cell
    term:
      id: CL:0000169
      label: type B pancreatic cell
  locations:
  - preferred_term: islet of Langerhans
    term:
      id: UBERON:0000006
      label: islet of Langerhans
  biological_processes:
  - preferred_term: inflammatory response
    term:
      id: GO:0006954
      label: inflammatory response
    modifier: INCREASED
  evidence:
  - reference: PMID:35399956
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: >-
      Here we show that WFS1-deficiency enhances the gene expression of
      pro-inflammatory cytokines and chemokines, leading to cytokine-induced
      ER-stress and cell death in pancreatic β-cells.
    explanation: >-
      This directly supports a sterile inflammatory mechanism in
      WFS1-deficient beta cells.
  - reference: PMID:35399956
    supports: SUPPORT
    evidence_source: MODEL_ORGANISM
    snippet: >-
      M1-macrophage infiltration and hypervascularization are seen in the
      pancreatic islets of Wfs1 whole-body knockout mice, demonstrating that
      WFS1 regulates anti-inflammatory responses in pancreatic β-cells.
    explanation: >-
      The knockout mouse data support inflammatory remodeling in pancreatic
      islets downstream of WFS1 loss.
  downstream:
  - target: Pancreatic beta-cell dysfunction and loss

- name: Pancreatic beta-cell dysfunction and loss
  description: >-
    Selective pancreatic beta-cell dysfunction, impaired insulin secretion,
    and beta-cell loss produce the characteristic insulin-deficient but
    nonautoimmune diabetes of Wolfram syndrome.
  subtypes:
  - Type 1
  cell_types:
  - preferred_term: pancreatic beta cell
