    explanation: The title supports a familial syndrome but not a resolved molecular cause.
diagnosis:
- name: Syndromic recognition and vascular imaging
  description: >-
    Diagnosis is based on recognizing early or recurrent arterial dissection
    together with multiple lentigines and excluding better-defined heritable
    arteriopathies. Vascular imaging should be guided by symptoms and arterial
    territories at risk.
  diagnosis_term:
    preferred_term: diagnostic imaging
  results: Imaging may show arterial dissection in cervicocephalic, renal, aortic, or other vascular beds.
review_notes: >-
  Evidence for this page is necessarily sparse because the primary PubMed cache
  for PMID:7838191 contains no abstract beyond the title. Detailed claims about
  cystic medial necrosis, the neural-crest hypothesis, and negative COL3A1/type
  III procollagen testing were retained as conservative notes from the Falcon
  report rather than over-quoted as PubMed evidence.
