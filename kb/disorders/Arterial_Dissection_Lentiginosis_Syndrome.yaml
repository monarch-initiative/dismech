histopathology:
- name: Cystic medial degeneration or necrosis
  description: >-
    Falcon literature review of the primary report describes cystic medial
    degeneration or necrosis in affected arterial tissue, consistent with
    medial structural fragility.
  evidence:
  - reference: PMID:7838191
    reference_title: "Brief report: a familial syndrome of arterial dissections with lentiginosis."
    supports: PARTIAL
    evidence_source: HUMAN_CLINICAL
