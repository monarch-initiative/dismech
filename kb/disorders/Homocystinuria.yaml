    explanation: Demonstrates ER stress and proteotoxic stress in cells expressing pathogenic CBS variants.
  downstream:
  - target: Disrupted transsulfuration and methionine metabolism
- name: Endothelial dysfunction, thrombosis, and vascular injury
  description: 'Homocysteine-driven oxidative stress and protein modifications cause endothelial cell dysfunction and platelet
    activation, promoting thrombus formation and vascular occlusion. Modification of fibrinogen by homocysteine thiolactone
    increases resistance to fibrinolysis, providing a direct mechanistic link to the high thromboembolism risk in HCU.

    '
