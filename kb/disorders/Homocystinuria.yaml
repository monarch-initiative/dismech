    term:
      id: CL:0000182
      label: hepatocyte
  evidence:
  - reference: PMID:39567721
    reference_title: "Oxidative damage and mitochondrial dysfunction in cystathionine beta-synthase deficiency."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: The alterations in NAD+, FGF-21, GDF-15 levels, and NAD+/NADH ratio in patients suggest that oxidative damage
      coexists with mitochondrial dysfunction in CBSD.
    explanation: Directly supports the coupled oxidative stress and mitochondrial dysfunction mechanism in CBS deficiency.
  downstream:
  - target: Endothelial dysfunction, thrombosis, and vascular injury
- name: CBS protein misfolding and proteostasis disruption
  description: 'Many CBS pathogenic variants cause protein misfolding and instability rather than active-site disruption.
    Misfolded CBS is cleared primarily by proteasomal degradation with contributions from ERAD and lysosomal-autophagic pathways.
    This conformational disease mechanism suggests proteostasis modulation as a potential therapeutic strategy.

    '
  biological_processes:
