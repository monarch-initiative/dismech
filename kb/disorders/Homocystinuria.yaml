      label: homocysteine metabolic process
  evidence:
  - reference: PMID:36417581
    reference_title: "Recent therapeutic approaches to cystathionine beta-synthase-deficient homocystinuria."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: The pyridoxine non-responsive form of the disease manifests itself by massively increasing plasma and tissue
      concentrations of homocysteine, a toxic intermediate of methionine metabolism that is thought to be the major cause
      of clinical complications
    explanation: Confirms massive homocysteine elevation as the central biochemical defect driving clinical complications.
  downstream:
  - target: Oxidative stress and mitochondrial dysfunction
- name: Oxidative stress and mitochondrial dysfunction
  description: 'Elevated homocysteine is a reactive thiol that generates reactive oxygen species, while cysteine depletion
    impairs glutathione-dependent antioxidant defenses. CBS-deficient patients show altered NAD redox metrics, elevated mitokines
    (FGF-21, GDF-15), and increased mitochondrial DAMPs, indicating coupled oxidative damage and mitochondrial dysfunction.

    '
  biological_processes:
  - preferred_term: cellular response to oxidative stress
    term:
      id: GO:0034599
      label: cellular response to oxidative stress
  - preferred_term: mitochondrion organization
    term:
      id: GO:0007005
      label: mitochondrion organization
