    reference_title: "Mechanism of action and impact of thiol homeostasis on efficacy of an enzyme replacement therapy for classical homocystinuria."
    supports: SUPPORT
    evidence_source: MODEL_ORGANISM
    snippet: Homocystinuria (HCU) due to cystathionine beta-synthase (CBS) deficiency is characterized by elevated plasma and tissue homocysteine levels.
    explanation: Supports CBS molecular deficiency as the initiating defect.
  downstream:
  - target: CBS molecular function deficiency
    description: Reduced CBS activity blocks homocysteine-to-cystathionine flux.
- name: Disrupted transsulfuration and methionine metabolism
  description: 'Loss of CBS function causes upstream accumulation of homocysteine,
    methionine, SAM, and SAH with downstream depletion of cystathionine and cysteine,
    disrupting sulfur amino acid homeostasis and one-carbon metabolism.

    '
  biological_processes:
