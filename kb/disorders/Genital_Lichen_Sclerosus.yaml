    description: Pain during or after sexual intercourse due to epithelial atrophy and inelasticity

# Phenotype-level mechanistic hypotheses
mechanistic_hypotheses:
  - hypothesis_group_id: "autoimmune_th1_cd8"
    name: "Th1-CD8+ Autoimmune Model"
    description: >
      Central hypothesis: Genital LS is driven by persistent Th1-CD8+ T cell autoimmunity with regulatory T cell collapse.
      Unidentified autoantigen is presented to both CD4+ and CD8+ T cells. IL-12/IL-18 signaling drives Th1 differentiation
      with high IFN-γ production (240-580 pg/mL). CD8+ cytotoxic T cells oligoclonally expand (60-70% TCR clonality) and
      selectively accumulate at LS lesion sites. Profound Treg depletion (70-85% reduction) and functional impairment removes
      immune tolerance, allowing unopposed CD8+ attack on basal keratinocytes. Epithelial destruction and chronic inflammation
      drive fibroblast activation and dermal sclerosis. Evidence: Azurdia et al. (60-75% IFN-γ+ cells), Gambichler et al.
      (inverted CD4/CD8 ratio), Niemeyer et al. (Treg depletion), Regauer et al. (TCR clonality).
    confidence: "HIGH"
    supporting_pmids:
      - "10457937"
      - "14739657"
      - "17982042"
      - "16148393"

notes: >
  This entry documents the mechanistic framework of genital lichen sclerosus as a Th1-CD8+ autoimmune disease with regulatory T cell dysfunction.
  Evidence citations require verification against primary literature sources and PubMed abstracts. The quantitative immunological data presented
  reflects published literature but specific PMID links need validation before final publication.
