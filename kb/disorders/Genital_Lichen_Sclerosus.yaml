    description: White, papular or plaque-like skin lesions on vulva or glans penis

  - name: Vulvar atrophy and loss of architecture
    frequency: FREQUENT
    phenotype_term:
      preferred_term: Vulval atrophy
      term:
        id: HP:0032219
        label: vulval atrophy
    description: Progressive loss of labia minora, flattening of normal vulvar contours, narrowing of introitus

  - name: Pruritus or dysuria
    frequency: OCCASIONAL
    phenotype_term:
