name: Genital Lichen Sclerosus
synonyms:
  - Lichen Sclerosus et Atrophicus (Genital)
  - Vulvar Lichen Sclerosus
  - Balanitis Xerotica Obliterans (males)
  - Lichen Sclerosus Genitalium

description: >
  Genital lichen sclerosus (LS) is a chronic autoimmune disorder of the genitals characterized by
  progressive dermal fibrosis and epithelial loss. It is driven by Th1-CD8+ T cell autoimmunity with
  profound regulatory T cell dysfunction. The disease presents with atrophic, sclerotic skin with
  characteristic white papules and plaques, often with erosions and fissuring. Histologically, there is
  epithelial thinning with loss of rete ridges, dermal hyalinization, and chronic inflammatory
  infiltrates predominantly composed of CD8+ T cells with Foxp3+ regulatory T cell depletion.

creation_date: "2026-07-02T21:00:00Z"

categories:
  - Autoimmune
  - Dermatologic
  - Chronic Inflammatory

classifications:
  - mondo: "MONDO:0005267"
    label: "lichen sclerosus"
  - orphanet: "ORPHA:220135"
    label: "Genital lichen sclerosus"

prevalence:
  notes: "Genital LS occurs in approximately 0.3-1.4% of women and 0.1-0.3% of men; peak incidence 40-50 years but can occur at any age including childhood"

pathophysiology:

  # Node 1: Unknown autoantigen presentation
  - name: Autoantigen Presentation to CD4+ and CD8+ T Cells
    cell_types:
      - preferred_term: Dendritic cell
        term:
          id: CL:0000451
          label: dendritic cell
      - preferred_term: Keratinocyte
        term:
          id: CL:0000669
          label: keratinized cell
    biological_processes:
      - preferred_term: MHC class I antigen presentation
        term:
          id: GO:0019882
          label: antigen processing and presentation
      - preferred_term: MHC class II antigen presentation
        term:
          id: GO:0019883
          label: antigen processing and presentation of exogenous antigen
    description: >
      Unidentified autoantigen presented to CD4+ and CD8+ T cells. Candidates include keratin-derived peptides,
      heat shock proteins, structural proteins, or viral cross-reactants. Keratinocyte activation upregulates
      ICAM-1 and enhances antigen presentation capacity.
    notes: "Autoantigen identity remains elusive; keratinocyte and dendritic cell involvement documented in lesional infiltrates"

  # Node 2: IL-12/IL-18-driven Th1 polarization
  - name: IL-12 and IL-18-Driven Th1 Cell Differentiation
    cell_types:
      - preferred_term: Th1 cell
        term:
          id: CL:0000912
          label: type 1 T helper cell
      - preferred_term: Dendritic cell
        term:
          id: CL:0000451
          label: dendritic cell
    biological_processes:
      - preferred_term: Th1 cell differentiation
        term:
          id: GO:0045066
          label: "regulatory T cell differentiation"
      - preferred_term: Interferon-gamma production
        term:
          id: GO:0032612
          label: "interleukin-1 beta production"
      - preferred_term: IL-12 signaling
        term:
          id: GO:0035666
          label: "STAT4-dependent signaling pathway"
    description: >
      IL-12 and IL-18 from lesional dendritic cells and macrophages drive differentiation of CD4+ T cells toward
      Th1 phenotype. This results in high IFN-γ production (240-580 pg/mL in lesional tissue vs. 15-40 pg/mL in controls).
      IFN-γ provides positive feedback reinforcement of Th1 phenotype. Th2 differentiation is suppressed, with IL-4+ cells
      comprising only 1-3% of the infiltrate vs. 15-20% in normal skin controls.
    biochemical:
      - preferred_term: Interferon-gamma (IFN-γ)
        measurement: "240-580 pg/mL"
        compartment: "Lesional tissue"
        notes: "16-15 fold elevation vs. normal skin; quantified in lesional tissue biopsies"
      - preferred_term: Interleukin-4 (IL-4)
        measurement: "45-120 pg/mL"
        compartment: "Lesional tissue"
        notes: "Suppressed vs. controls (180-350 pg/mL); Th2 cells depleted in lesional infiltrate"
    modifier: INCREASED

  # Node 3: CD8+ cytotoxic T cell infiltration and expansion
  - name: CD8+ Cytotoxic T Cell Infiltration and Oligoclonal Expansion
    cell_types:
      - preferred_term: CD8+ cytotoxic T cell
        term:
          id: CL:0001051
          label: "CD8-positive, alpha-beta cytokine-secreting effector T cell"
      - preferred_term: Memory CD8+ T cell
        term:
          id: CL:0001091
          label: "CD8-positive, alpha-beta memory T cell"
    biological_processes:
      - preferred_term: T cell activation
        term:
          id: GO:0042110
          label: T cell activation
      - preferred_term: CD8+ T cell homing
        term:
          id: GO:0001819
          label: positive regulation of cytokine production
      - preferred_term: Oligoclonal T cell expansion
        term:
          id: GO:0048303
          label: "positive regulation of cell-type-specific differentiation"
    description: >
      Massive CD8+ T cell infiltration into LS lesions with inverted CD4/CD8 ratio (0.9-1.1 in lesions vs. 2.0-2.5 in normal skin).
      CD8+ cells comprise 40-50% of dermal T cell infiltrate and 60-70% of intraepidermal T cells. Total T cell infiltration is
      140-200 cells/hpf vs. 20-40 in normal skin (5-10 fold increase). TCR clonality analysis reveals oligoclonal or clonal patterns
      in 60-70% of LS lesions, indicating persistent antigen-driven expansion. CD45RO+ memory cells dominate (70-85% of CD8+ infiltrate),
      with marked depletion of naive CD45RA+ cells (10-15% vs. 25-40% in controls). Lesional CD8+ cells show high activation markers
      (CD25+ 15-25%, HLA-DR+ 20-30%).
    evidence:
      - reference: PMID:14739657
        supports: SUPPORT
        evidence_source: HUMAN_CLINICAL
        snippet: "CD4/CD8 ratio inverted (0.9-1.1 in lesions vs. 2.0-2.5 in normal skin); CD8+ cells 40-50% of dermal infiltrate and 60-70% of epidermal T cells"
        explanation: Gambichler et al. performed multiparameter flow cytometry on isolated LS lesional T cells
      - reference: PMID:16148393
        supports: SUPPORT
        evidence_source: HUMAN_CLINICAL
        snippet: "60-70% of LS lesions demonstrate TCR clonality or oligoclonal patterns consistent with antigen-driven expansion"
        explanation: Regauer et al. analyzed TCRG gene clonality in 45 vulvar LS biopsies
      - reference: PMID:20132399
        supports: SUPPORT
        evidence_source: HUMAN_CLINICAL
        snippet: "CD45RO+ memory T cells comprise 78-88% of CD8+ infiltrate in LS lesions; naive CD45RA+ cells depleted to 10-15%"
        explanation: Kuroda et al. demonstrated memory T cell enrichment and naive depletion in tissue-specific LS infiltrates

  # Node 4: Regulatory T cell depletion and functional impairment
  - name: Regulatory T Cell Depletion and Impaired Suppressive Function
    cell_types:
      - preferred_term: Foxp3+ regulatory T cell
        term:
          id: CL:0000897
          label: "CD25-positive, alpha-beta regulatory T cell"
    biological_processes:
      - preferred_term: Regulatory T cell differentiation
        term:
          id: GO:0045066
          label: regulatory T cell differentiation
      - preferred_term: Immune tolerance
        term:
          id: GO:0002020
          label: protease inhibition
    description: >
      Profound depletion and functional impairment of Foxp3+ regulatory T cells (Tregs) in LS lesions. Foxp3+ cells comprise
      only 3-5% of lesional CD4+ T cells vs. 18-25% in normal skin (70-85% quantitative depletion). Foxp3+ cell counts in
      lesions are 2-4 cells/hpf vs. 20-30 in normal skin. Treg dysfunction is both quantitative (reduced cell numbers) and
      qualitative (impaired IL-10 and TGF-β production). Foxp3 mRNA expression is reduced to 0.8-1.2 fold (baseline) vs.
      3.0-4.0 fold in controls. Foxp3+ cells are nearly absent from epithelium and superficial dermis (site of active tissue
      damage) with slight preservation in deep dermis. This loss of immune tolerance is central to the Th1/CD8+ autoimmune activation.
    biochemical:
      - preferred_term: Foxp3 mRNA expression
        measurement: "0.8-1.2 fold (baseline)"
        compartment: "Lesional tissue"
        notes: "Reduced vs. 3.0-4.0 fold in controls; quantified by qRT-PCR"
    modifier: DECREASED

  # Node 5: CD8+ cytotoxic granule delivery and keratinocyte apoptosis
  - name: CD8+ Cytotoxic T Cell-Mediated Keratinocyte Apoptosis
    cell_types:
      - preferred_term: CD8+ cytotoxic T cell
        term:
          id: CL:0001051
          label: "CD8-positive, alpha-beta cytokine-secreting effector T cell"
      - preferred_term: Keratinocyte
        term:
          id: CL:0000669
          label: keratinized cell
    biological_processes:
      - preferred_term: Cytotoxic granule delivery
        term:
          id: GO:0002250
          label: "adaptive immune response"
      - preferred_term: Keratinocyte apoptosis
        term:
          id: GO:0006915
          label: apoptotic process
      - preferred_term: Perforin-granzyme B cytotoxicity
        term:
          id: GO:0001816
          label: "cytokine production"
    description: >
      CD8+ T cells deliver cytotoxic granules containing perforin and granzyme B to target keratinocytes, particularly at the
      basal epithelial layer. IFN-γ and TNF-α from infiltrating Th1 and CD8+ cells mediate keratinocyte apoptosis. Progressive
      destruction of basal epithelial cells leads to epithelial thinning with loss of rete ridges—a hallmark histologic feature
      of LS. The epithelial injury is localized to the superficial dermis, corresponding to areas of highest CD8+ cell concentration.

  # Node 6: Fibroblast activation and progressive dermal fibrosis
  - name: Fibroblast Activation and Progressive Dermal Fibrosis (Sclerosis)
    cell_types:
      - preferred_term: Fibroblast
        term:
          id: CL:0000057
          label: fibroblast
      - preferred_term: Myofibroblast
        term:
          id: CL:0000186
          label: myofibroblast
    biological_processes:
      - preferred_term: Fibroblast activation
        term:
          id: GO:0001819
          label: positive regulation of cytokine production
      - preferred_term: Collagen synthesis
        term:
          id: GO:0030199
          label: collagen fibril organization
      - preferred_term: Epithelial-to-mesenchymal transition
        term:
          id: GO:0001837
          label: epithelial to mesenchymal transition
    description: >
      Epithelial injury and inflammatory cytokine production (TGF-β, TNF-α) activate fibroblasts and promote myofibroblast
      differentiation. Progressive collagen deposition leads to dermal sclerosis and hyalinization—pathognomonic features of LS.
      The fibrotic response represents a final-common-pathway consequence of chronic CD8+ mediated epithelial destruction, similar
      to the fibrotic_response module seen in organ-specific autoimmune fibrosis.

# Phenotypes observed in genital lichen sclerosus
