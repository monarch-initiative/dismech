- name: Combined Multi-Sphingolipid Lysosomal Accumulation
  conforms_to: "lysosomal_substrate_accumulation#Lysosomal Substrate Accumulation"
  description: >-
    Without any saposin cofactors, multiple sphingolipids accumulate simultaneously in
    lysosomes across the nervous system and viscera, and loss of intact prosaposin (which is
    itself essential for neuronal survival) compounds the neurodegeneration.
