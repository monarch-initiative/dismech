differential_diagnoses:
- name: Gaucher disease due to saposin C deficiency
  description: >-
    Isolated saposin C deficiency produces a Gaucher-like phenotype, versus the combined
    multi-sphingolipid disease of total prosaposin loss.
  disease_term:
    preferred_term: Gaucher disease due to saposin C deficiency
    term:
      id: MONDO:0012517
      label: Gaucher disease due to saposin C deficiency
  distinguishing_features:
  - Loss of a single saposin (C) versus loss of all four saposins in combined deficiency.
  evidence:
  - reference: PMID:36969110
    reference_title: "Combined saposin deficiency: A rare occurrence."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "each of which has a role as a cofactor for the enzymes whose deficiency results in Krabbe disease, metachromatic leukodystrophy, Gaucher disease, and Farber disease"
    explanation: "Individual saposins underlie distinct single-deficiency diseases; combined deficiency loses all of them."
- name: Metachromatic leukodystrophy
  description: >-
    Saposin B is a cofactor for arylsulfatase A; isolated saposin B deficiency causes an
    MLD-like phenotype, one component of combined deficiency.
  disease_term:
    preferred_term: metachromatic leukodystrophy
    term:
      id: MONDO:0018868
      label: metachromatic leukodystrophy
  distinguishing_features:
  - A single-pathway sulfatide storage disorder, versus combined multi-sphingolipid storage in prosaposin deficiency.
