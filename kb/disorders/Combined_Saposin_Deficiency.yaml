  description: >-
    Biallelic null PSAP variants abolish the prosaposin precursor, eliminating all four
    saposins (A-D). Each saposin is an essential cofactor for a distinct lysosomal sphingolipid
    hydrolase, so their combined loss simultaneously impairs multiple degradation pathways.
