    snippet: "This gene encodes a protein, prosaposin, that cleaves into four constituent proteins, each of which has a role as a cofactor for the enzymes whose deficiency results in Krabbe disease, metachromatic leukodystrophy, Gaucher disease, and Farber disease, respectively."
    explanation: "PSAP-encoded prosaposin yields four saposins, each a cofactor for a distinct sphingolipid hydrolase; all are lost together."
  downstream:
  - target: Combined Multi-Sphingolipid Lysosomal Accumulation
