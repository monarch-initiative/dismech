biochemical:
- name: Combined saposin A/B/C/D deficiency
  presence: DECREASED
  context: >-
    Total prosaposin deficiency abolishes all four saposin cofactors (A, B, C, D)
    simultaneously, producing combined sphingolipid storage (notably lactosylceramide).
  evidence:
  - reference: PMID:11309366
    reference_title: "A novel mutation in the coding region of the prosaposin gene leads to a complete deficiency of prosaposin and saposins, and is associated with a complex sphingolipidosis dominated by lactosylceramide accumulation."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Immunohistochemical investigations indicated that saposins A, B, C and D were\nall deficient"
    explanation: Combined deficiency of all four saposins is the defining biochemical lesion.
