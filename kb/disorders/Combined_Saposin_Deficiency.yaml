name: Combined Saposin Deficiency
creation_date: "2026-06-13T00:00:00Z"
description: >-
  Combined saposin deficiency (combined prosaposin/PSAP deficiency) is an exceedingly rare,
  fatal neonatal-onset lysosomal storage disorder caused by biallelic loss-of-function
  variants in PSAP that abolish the prosaposin precursor and therefore all four sphingolipid
  activator proteins (saposins A-D). Because each saposin is a cofactor for a distinct
  lysosomal hydrolase (those deficient in Krabbe disease, metachromatic leukodystrophy,
  Gaucher disease, and Farber disease), their simultaneous loss impairs degradation of
  multiple sphingolipids, producing combined storage disease with severe neonatal
  neurodegeneration, hepatosplenomegaly, thrombocytopenia, and early death.
