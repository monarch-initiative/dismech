- name: Echinococcus granulosus
  infectious_agent_term:
    preferred_term: Echinococcus granulosus
    term:
      id: NCBITaxon:6210
      label: Echinococcus granulosus
  description: Tapeworm whose larval stage causes cystic echinococcosis.
  evidence:
  - reference: PMID:27047771
    reference_title: "Hepatic Echinococcal Cysts: A Review."
    supports: SUPPORT
    snippet: "Cystic echinococcosis (CE) is a widely endemic helminthic disease caused
      by infection with metacestodes (larval stage) of the Echinococcus granulosus
      tapeworm."
    explanation: The abstract identifies E. granulosus metacestodes as the cause
      of CE.
transmission:
- name: Dog-associated egg transmission
  description: Tapeworm eggs from dogs and other canids can infect humans.
  evidence:
  - reference: PMID:40944955
    reference_title: "Hydatid Disease."
    supports: SUPPORT
    snippet: "Dogs and other canids harboring gut-resident tapeworms readily transmit
      the tapeworm eggs (and subsequent formation of larval cysts) to humans in close
      contact with them."
    explanation: The abstract describes transmission of eggs from dogs and other
      canids to humans.
pathophysiology:
- name: Hepatic cyst formation
  description: Larval cysts commonly develop in the liver.
  evidence:
  - reference: PMID:27047771
    reference_title: "Hepatic Echinococcal Cysts: A Review."
    supports: SUPPORT
    snippet: "Upon infection with CE, cyst formation mainly occurs in the liver (70%)."
    explanation: The abstract reports predominant liver cyst formation.
