name: Aland Islands Eye Disease
creation_date: "2026-05-10T00:00:00Z"
description: >-
  Aland Islands eye disease is a rare X-linked recessive CACNA1F-related
  retinal channelopathy. Pathogenic CACNA1F variants disrupt Cav1.4
  voltage-gated calcium-channel function at rod and cone photoreceptor
  synapses, impairing neurotransmission to bipolar cells and producing
  abnormal electroretinograms, fundus hypopigmentation, reduced visual acuity,
  nystagmus, astigmatism, progressive axial myopia, impaired dark adaptation,
  and protan color-vision defects.
category: Mendelian
parents:
