          label: Brachytherapy
- name: Enucleation
  description: >-
    Surgical removal of the eye. Indicated for large tumors, those with optic
    nerve involvement, or when vision cannot be preserved. Provides excellent
    local control but does not prevent metastatic disease.
  treatment_term:
