name: angioosteohypertrophic syndrome
creation_date: '2026-04-14T12:05:00Z'
updated_date: '2026-04-14T22:30:00Z'
category: Genetic
synonyms:
- Klippel-Trenaunay syndrome
- Klippel-Trenaunay-Weber syndrome
description: >-
  Angioosteohypertrophic syndrome is a congenital vascular malformation and
  overgrowth disorder, often overlapping clinically with Klippel-Trenaunay
  syndrome. The disease is characterized by capillary-lymphatic-venous
  malformation of an extremity together with enlarged veins and segmental soft
  tissue or bony overgrowth. Many affected individuals harbor somatic mosaic
  activating PIK3CA mutations within affected tissue.
disease_term:
  preferred_term: angioosteohypertrophic syndrome
  term:
    id: MONDO:0007864
    label: angioosteohypertrophic syndrome
parents:
- vascular malformation syndrome
- overgrowth syndrome
inheritance:
- name: Somatic mosaicism
  description: >-
    Many affected individuals have post-zygotic mosaic activating PIK3CA
    variants confined to malformed tissue rather than a constitutional
    inherited mutation.
  evidence:
  - reference: PMID:25681199
    reference_title: Lymphatic and other vascular malformative/overgrowth disorders are caused by somatic mutations in PIK3CA.
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Most individuals from Boston Children's Hospital who had isolated LM (16/17) or LM as part of a syndrome, such as KTS (19/21), fibro-adipose vascular anomaly (5/8), and congenital lipomatous overgrowth with vascular, epidermal, and skeletal anomalies syndrome (31/33) were somatic mosaic for PIK3CA mutations, with 5 specific PIK3CA mutations accounting for ∼ 80% of cases.
    explanation: >-
      This directly supports somatic mosaic PIK3CA activation as the main
      genetic mechanism in Klippel-Trenaunay-spectrum vascular overgrowth.
pathophysiology:
- name: Somatic PIK3CA activation in malformed tissue
  description: >-
    Activating mosaic PIK3CA mutations arise in affected tissue and initiate the
    vascular malformation and overgrowth phenotype.
  genes:
  - preferred_term: PIK3CA
    term:
      id: hgnc:8975
      label: PIK3CA
  evidence:
  - reference: PMID:25681199
    reference_title: Lymphatic and other vascular malformative/overgrowth disorders are caused by somatic mutations in PIK3CA.
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Somatic PIK3CA mutations are the most common cause of isolated LMs and disorders in which LM is a component feature.
    explanation: >-
      This places somatic PIK3CA activation upstream of the vascular
      malformation/overgrowth phenotype that includes KTS-spectrum disease.
  downstream:
  - target: Abnormal endothelial growth and sprouting
    description: Activated PI3K signaling drives pathological vascular growth.
- name: Abnormal endothelial growth and sprouting
  description: >-
    PIK3CA activation increases endothelial proliferation and angiogenic
    behavior, promoting malformed vascular channels.
  cell_types:
  - preferred_term: endothelial cell
    term:
      id: CL:0000115
      label: endothelial cell
  biological_processes:
  - preferred_term: angiogenesis
    modifier: ABNORMAL
    term:
      id: GO:0001525
      label: angiogenesis
  evidence:
  - reference: DOI:10.1038/s41419-017-0064-x
    reference_title: PI3K/mTOR inhibition promotes the regression of experimental vascular malformations driven by PIK3CA-activating mutations
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: >-
      Moreover, active forms of PIK3CA strongly promote the angiogenic sprouting.
    explanation: >-
      Human endothelial-cell experiments directly support pathological
      angiogenic behavior downstream of activating PIK3CA mutations.
  downstream:
  - target: Combined vascular malformation and segmental overgrowth
    description: Persistent endothelial dysregulation produces malformed vessels and tissue overgrowth.
- name: Combined vascular malformation and segmental overgrowth
  description: >-
    The resulting phenotype combines capillary and venous malformation with
    regional soft tissue and bony enlargement.
phenotypes:
- name: Nevus flammeus
  category: Skin
  frequency: FREQUENT
  description: >-
    Cutaneous capillary malformation is one of the characteristic surface
    markers of the syndrome.
  phenotype_term:
    preferred_term: Port-wine stain
    term:
      id: HP:0001052
      label: Nevus flammeus
  evidence:
  - reference: PMID:25788406
    reference_title: Surgical treatment of varicose veins and venous malformations in Klippel-Trenaunay syndrome.
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      All had varicose veins, 36 (73%) had limb hypertrophy, and 33 (67%) had capillary malformations, with two of three clinical features present in all.
    explanation: >-
      This cohort shows that capillary malformation is one of the defining
      major features of Klippel-Trenaunay-spectrum disease.
- name: Limb hypertrophy
  category: Musculoskeletal
  frequency: FREQUENT
  description: >-
    Segmental overgrowth involving soft tissue and bone commonly affects the
    involved limb.
  evidence:
