  downstream:
  - target: Activated PI3K/mTOR signaling
    description: Activated PIK3CA signaling drives pathological vascular growth.
- name: Activated PI3K/mTOR signaling
  description: >-
    Constitutive PIK3CA activation drives PI3K/mTOR pathway signaling in
    malformed endothelial tissue.
  cell_types:
