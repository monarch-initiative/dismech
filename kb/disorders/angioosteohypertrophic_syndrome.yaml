differential_diagnoses:
- name: CLOVES syndrome
  disease_term:
    preferred_term: CLOVES syndrome
    term:
      id: MONDO:0013038
      label: CLOVES syndrome
  description: >-
    CLOVES syndrome is another PIK3CA-related overgrowth disorder with vascular
    malformations but broader truncal adipose and skeletal involvement.
  evidence:
  - reference: PMID:25681199
    reference_title: Lymphatic and other vascular malformative/overgrowth disorders are caused by somatic mutations in PIK3CA.
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Individuals with malformative syndromes resulting from somatic PIK3CA mutations have a spectrum of phenotypes, often non-overlapping (e.g., hemimegalencaphy versus macrodactyly) 4–9. Lymphatic malformations (LM), which arise most frequently as an isolated vascular anomaly, are a major component feature in patients that have CLOVES syndrome 11 and Klippel-Trenaunay syndrome (KTS) 12.
    explanation: >-
      This explicitly links CLOVES and KTS as overlapping PIK3CA-related
      vascular overgrowth disorders and supports CLOVES syndrome as a key
      differential diagnosis.
