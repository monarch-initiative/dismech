    reference_title: PI3K/mTOR inhibition promotes the regression of experimental vascular malformations driven by PIK3CA-activating mutations
    supports: SUPPORT
    evidence_source: MODEL_ORGANISM
    snippet: >-
      Our findings reveal that PIK3CA mutations have a key role in the
      pathogenesis of VM and PIK3CA-driven experimental lesions can be
      effectively treated by PI3K/mTOR inhibitors.
    explanation: >-
      This directly supports PI3K/mTOR pathway activation as the mechanistic
      intermediate between PIK3CA mutation and vascular malformation.
  downstream:
  - target: Abnormal endothelial growth and sprouting
    description: Activated PI3K/mTOR signaling promotes endothelial overgrowth and pathological sprouting.
