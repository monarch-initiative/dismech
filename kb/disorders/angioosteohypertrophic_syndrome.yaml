    reference_title: Surgical treatment of varicose veins and venous malformations in Klippel-Trenaunay syndrome.
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      All had varicose veins, 36 (73%) had limb hypertrophy, and 33 (67%) had capillary malformations, with two of three clinical features present in all.
    explanation: >-
      This directly documents limb hypertrophy as a frequent component of the
      clinical triad.
- name: Localized pain
  category: Musculoskeletal
  frequency: FREQUENT
  description: >-
    Pain is a common symptomatic consequence of the extensive venous and
    vascular malformation burden.
  phenotype_term:
    preferred_term: Pain
    term:
      id: HP:0012531
      label: Pain
  evidence:
  - reference: PMID:25788406
    reference_title: Surgical treatment of varicose veins and venous malformations in Klippel-Trenaunay syndrome.
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      The most frequent symptom was pain (N = 43, 88%).
    explanation: >-
      This directly supports pain as a common clinical manifestation.
