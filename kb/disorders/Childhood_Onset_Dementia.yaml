differential_diagnoses:
- name: Childhood disintegrative disorder
  description: >-
    Childhood disintegrative disorder overlaps with childhood-onset dementia by
    presenting with developmental regression after a period of earlier normal
    development, but it is a narrower historical concept and does not capture
    the broader collective of progressive pediatric neurodegenerative disorders
    encompassed by childhood-onset dementia.
  disease_term:
    preferred_term: childhood disintegrative disorder
    term:
      id: MONDO:0015681
      label: childhood disintegrative disorder
  distinguishing_features:
  - Childhood-onset dementia is an overarching neurodegenerative grouping concept, whereas childhood disintegrative disorder is a narrower diagnostic construct.
  - The childhood-onset dementia framework is intended to unify many heterogeneous, usually monogenic progressive disorders rather than only late-onset regression syndromes.
  evidence:
  - reference: PMID:12033746
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Dementia as an overarching diagnostic concept offers integrative possibilities for research, management and service planning and provision. Childhood disintegrative disorder as a concept is criticised."
    explanation: This study explicitly argues for childhood dementia as the broader organizing concept and criticizes childhood disintegrative disorder as the framing construct.
- name: Autism spectrum disorder
  description: >-
    Autism spectrum disorder can overlap clinically when regression and
    behavioral disturbance are prominent, but childhood-onset dementia is
    distinguished by progressive global neurocognitive decline, broader loss of
    acquired skills, and a worse neurodegenerative prognosis.
  disease_term:
    preferred_term: autism spectrum disorder
    term:
      id: MONDO:0005258
      label: autism spectrum disorder
  distinguishing_features:
  - Childhood-onset dementia involves progressive global neurocognitive decline rather than a static neurodevelopmental profile.
  - Regression in childhood-onset dementia is typically more global and severe than regression associated with autism spectrum disorder.
  evidence:
  - reference: PMID:30548847
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "However, participants with CDD seemed to have more severe symptoms and a different symptom profile, including apparently typical development before regression, faster regression, more affective symptoms, and more global developmental deficit."
    explanation: This systematic review supports more global and severe regression in the late-regression syndromes that overlap with childhood-onset dementia than in autism spectrum disorder.
  - reference: PMID:23340080
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "the regression is more global and more severe than in autism; seizures are more frequent than in autism"
    explanation: This supports autism spectrum disorder as a key differential diagnosis when regression is present, while highlighting that the regressive syndrome is more severe and neurologically progressive.
diagnosis:
- name: Recognition of progressive neurocognitive decline in childhood
  description: >-
    Diagnosis begins with recognizing progressive neurocognitive decline and
    developmental regression in a child or adolescent rather than a static
    neurodevelopmental disorder.
  diagnosis_term:
    preferred_term: neuropsychological assessment
    term:
      id: MAXO:0009018
      label: neuropsychological assessment
  evidence:
  - reference: PMID:37471493
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Typically monogenic in origin, this collective of individual neurodegenerative conditions are defined by a progressive impairment of neurocognitive function, presenting in childhood and adolescence."
    explanation: This supports progressive neurocognitive decline in childhood or adolescence as the central diagnostic framing of the disorder grouping.
  - reference: PMID:37806042
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Families reported delays in receiving an accurate diagnosis following initial symptoms (mean: 1.6 ± 1.4 years, range: 0-5 years)."
    explanation: This shows that timely recognition of the progressive syndrome is a major diagnostic challenge in practice.
- name: Molecular genetic diagnosis of the specific underlying disorder
  description: >-
    Because childhood onset dementia is usually caused by heterogeneous
    monogenic disorders, etiologic diagnosis requires molecular genetic testing
    to identify the specific disease and uncover potentially treatable forms.
  diagnosis_term:
    preferred_term: molecular genetic testing
    term:
      id: MAXO:0000533
      label: molecular genetic testing
  evidence:
  - reference: PMID:37471493
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Typically monogenic in origin, this collective of individual neurodegenerative conditions are defined by a progressive impairment of neurocognitive function, presenting in childhood and adolescence."
    explanation: The scoping review identifies childhood dementia disorders as predominantly monogenic, supporting molecular testing for etiologic diagnosis.
  - reference: PMID:37471493
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "An additional 49.8 per 100 000 births are attributable to treatable conditions that would cause childhood dementia if not diagnosed early and stringently treated."
    explanation: This supports the clinical importance of early etiologic diagnosis because some underlying disorders are treatable when identified promptly.
treatments:
- name: Coordinated family-centered supportive care
  description: >-
    Coordinated healthcare and community-based psychosocial supports are a core
    management strategy for affected children and families and can improve
    coping and psychological resilience.
  treatment_term:
    preferred_term: supportive care
    term:
      id: MAXO:0000950
      label: supportive care
  evidence:
  - reference: PMID:37679855
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Access to coordinated healthcare and community-based psychosocial supports was associated with improved parent coping, psychological resilience and reduced psychological isolation."
    explanation: This systematic review supports coordinated psychosocial and supportive care as an important management component for childhood dementia.
  - reference: PMID:37679855
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Analysis identified a critical need to prioritize access to integrated family-centred psychosocial supports throughout distinct stages of their child's condition trajectory."
    explanation: This supports a longitudinal family-centered supportive-care model across the disease course.
- name: Behavioral intervention for behaviors and psychological symptoms of dementia
  description: >-
    Person-centered multimodal psychosocial and behavioral interventions can
    reduce irritability, aggression, and related behaviors in childhood dementia
    disorders.
  treatment_term:
    preferred_term: behavioral intervention
    term:
      id: MAXO:0000882
      label: behavioral intervention
  evidence:
  - reference: PMID:39247715
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Person-centred, multimodal psychosocial interventions were recognised as effective therapies in resolving BPSD in these cases."
    explanation: This case series provides direct human evidence that behavioral and psychosocial interventions can reduce BPSD in childhood dementia disorders.
