name: Childhood Onset Dementia
creation_date: '2026-03-24T18:43:54Z'
updated_date: '2026-03-24T19:24:00Z'
description: >-
  Childhood onset dementia is a collective term for rare and ultra-rare
  pediatric neurodegenerative disorders, usually monogenic, that present in
  childhood or adolescence with progressive neurocognitive decline, loss of
  previously acquired developmental skills, functional dependence, and often
  shortened life expectancy. It is a heterogeneous grouping rather than a
  single molecular disease entity, encompassing many disorder-specific primary
  pathogenic mechanisms that converge on progressive central nervous system
  dysfunction.
