  downstream:
  - target: Developmental regression
    description: Progressive CNS dysfunction drives loss of previously acquired developmental skills.
    causal_link_type: DIRECT
    evidence:
    - reference: PMID:37679855
      supports: SUPPORT
      evidence_source: HUMAN_CLINICAL
      snippet: "Childhood dementias are a group of rare and ultra-rare paediatric conditions clinically characterised by enduring global decline in central nervous system function, associated with a progressive loss of developmentally acquired skills, quality of life and shortened life expectancy."
      explanation: This directly links progressive CNS decline with developmental skill loss.
  - target: Cognitive impairment
    description: Chronic CNS decline leads to the core dementia phenotype of cognitive impairment.
    causal_link_type: DIRECT
    evidence:
    - reference: PMID:36571866
      supports: SUPPORT
      evidence_source: HUMAN_CLINICAL
      snippet: "Childhood dementias are a group of over 100 rare and ultra-rare pediatric conditions that are clinically characterized by chronic global neurocognitive decline."
      explanation: This supports cognitive impairment as a direct result of progressive CNS dysfunction.
  - target: Sleep disturbance
    description: Neural network dysfunction contributes to frequent sleep abnormalities.
    causal_link_type: DIRECT
    evidence:
    - reference: PMID:36571866
      supports: SUPPORT
      evidence_source: HUMAN_CLINICAL
      snippet: "Like adult neurodegenerative syndromes, the heterogeneous phenotypes extend beyond cognitive decline and may involve changes in eating, motor function, pain, sleep, and behavior, mediated by physiological changes in neural networks."
      explanation: This supports sleep disturbance as a downstream manifestation of network-level brain dysfunction.
  - target: Motor regression
    description: Progressive CNS failure commonly produces declining mobility and motor function.
    causal_link_type: DIRECT
    evidence:
    - reference: PMID:36571866
      supports: SUPPORT
      evidence_source: HUMAN_CLINICAL
      snippet: "Like adult neurodegenerative syndromes, the heterogeneous phenotypes extend beyond cognitive decline and may involve changes in eating, motor function, pain, sleep, and behavior, mediated by physiological changes in neural networks."
      explanation: This supports motor regression as a downstream manifestation of network-level neurodegeneration.
  - target: Hyperactivity
    description: Progressive disruption of neural networks can manifest with behavioral dysregulation including hyperactivity.
    causal_link_type: DIRECT
    evidence:
    - reference: PMID:36571866
      supports: SUPPORT
      evidence_source: HUMAN_CLINICAL
      snippet: "Like adult neurodegenerative syndromes, the heterogeneous phenotypes extend beyond cognitive decline and may involve changes in eating, motor function, pain, sleep, and behavior, mediated by physiological changes in neural networks."
      explanation: This supports behavioral dysregulation as part of the shared downstream phenotype of neural network dysfunction.
  evidence:
  - reference: PMID:37679855
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Childhood dementias are a group of rare and ultra-rare paediatric conditions clinically characterised by enduring global decline in central nervous system function, associated with a progressive loss of developmentally acquired skills, quality of life and shortened life expectancy."
    explanation: This review provides the clearest syndrome-level description of progressive CNS dysfunction in childhood dementia.
  - reference: PMID:36571866
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Like adult neurodegenerative syndromes, the heterogeneous phenotypes extend beyond cognitive decline and may involve changes in eating, motor function, pain, sleep, and behavior, mediated by physiological changes in neural networks."
    explanation: This supports neural network dysfunction as the physiologic basis for the shared multisystem phenotype.
- name: Neuroinflammatory and oxidative stress-associated downstream injury
  description: >-
    Across childhood dementia clinical trials, biomarker programs repeatedly
    measure inflammatory mediators and oxidative stress-related analytes,
    supporting recurring downstream injury mechanisms despite heterogeneous
    upstream etiologies.
  cell_types:
  - preferred_term: glial cell
    term:
      id: CL:0000125
      label: glial cell
  - preferred_term: neuron
    term:
      id: CL:0000540
      label: neuron
  biological_processes:
  - preferred_term: glial cell activation
    term:
      id: GO:0061900
      label: glial cell activation
  - preferred_term: cellular response to oxidative stress
    term:
      id: GO:0034599
      label: cellular response to oxidative stress
  downstream:
  - target: Progressive central nervous system dysfunction
    description: >-
      Shared inflammatory and oxidative injury programs likely amplify
      downstream CNS dysfunction across the heterogeneous childhood dementia
      disorders.
    causal_link_type: INDIRECT_KNOWN_INTERMEDIATES
    intermediate_mechanisms:
    - biomarker-linked downstream pathogenic events measured across multiple clinical trials
    evidence:
    - reference: PMID:39948021
      supports: SUPPORT
      evidence_source: HUMAN_CLINICAL
      snippet: "The predominant biological measures were metabolites linked to the primary pathophysiological pathway (102 measures, 185 studies), while use of cytoskeletal proteins (3 measures, 15 studies), inflammatory mediators (19 measures, 24 studies), oxidative stress-related analytes (15 measures, 8 studies), neurotransmitters or related neuro-metabolites (3 measures, 5 studies) were limited."
      explanation: The widespread use of inflammatory and oxidative-stress analytes across childhood dementia trials supports recurring downstream injury programs, although this is an inference from biomarker usage rather than proof of universality.
  evidence:
  - reference: PMID:39948021
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Disease-related biomarkers were associated with 1) the primary pathophysiology 2) downstream pathogenic events 3) drug-related pharmacokinetics, safety and/or tolerability."
    explanation: This review explicitly distinguishes primary pathophysiology from downstream pathogenic events across childhood dementia trials.
  - reference: PMID:39948021
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Development of a panel of biomarkers has potential to interrogate and link shared biological pathways across the heterogeneity of childhood dementias to exert a significant impact for the development of disease-modifying therapies."
    explanation: This supports the existence of shared downstream biology that can be interrogated across otherwise heterogeneous childhood dementia disorders.
