progression:
- phase: Childhood or adolescent onset neurocognitive decline
  age_range: childhood to adolescence
  notes: >-
    Childhood onset dementia begins during childhood or adolescence with
    progressive impairment of cognition and other acquired developmental
    functions.
  evidence:
  - reference: PMID:37471493
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Typically monogenic in origin, this collective of individual neurodegenerative conditions are defined by a progressive impairment of neurocognitive function, presenting in childhood and adolescence."
    explanation: This supports childhood or adolescent onset of progressive neurocognitive decline as the defining initial phase.
- phase: Developmental regression and functional dependence
  notes: >-
    As disease progresses, affected children lose previously acquired skills and
    commonly develop moderate-to-severe neurologic disability with daily
    dependence.
  evidence:
  - reference: PMID:37679855
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Childhood dementias are a group of rare and ultra-rare paediatric conditions clinically characterised by enduring global decline in central nervous system function, associated with a progressive loss of developmentally acquired skills, quality of life and shortened life expectancy."
    explanation: This review supports progressive loss of acquired skills as a core stage of disease evolution.
  - reference: PMID:37806042
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Among 45 children with 23 different dementia syndromes, the modified Rankin Scale demonstrated at least moderate neurological disability and functional dependence in 82% (37/45)."
    explanation: This cross-sectional study shows that progression commonly leads to substantial neurologic disability and dependence.
- phase: Life-limiting neurodegeneration
  notes: >-
    Childhood onset dementia is frequently life-limiting, with many deaths
    occurring before adulthood in the currently untreatable disorders.
  evidence:
  - reference: PMID:37471493
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Collectively, currently untreatable childhood dementia was estimated to have an incidence of 34.5 per 100 000 (1 in 2900 births), median life expectancy of 9 years and prevalence of 5.3 per 100 000 persons."
    explanation: This provides the modeled survival burden consistent with a late life-limiting phase.
  - reference: PMID:37471493
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "approximately 70% of those deaths will be prior to adulthood."
    explanation: This supports that most premature deaths occur before adulthood.
pathophysiology:
- name: Progressive central nervous system dysfunction
  description: >-
    Across the heterogeneous childhood dementia disorders, progressive failure
    of central nervous system and neural network function produces the shared
    syndrome of developmental regression, cognitive decline, and multisystem
    neurologic impairment.
