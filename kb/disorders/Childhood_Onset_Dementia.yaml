definitions:
- name: Clinical grouping definition for childhood onset dementia
  definition_type: CASE_DEFINITION
  description: >-
    Childhood onset dementia denotes a collective group of pediatric
    neurodegenerative disorders defined by progressive neurocognitive decline
    with loss of previously acquired skills beginning in childhood or
    adolescence.
  scope: Collective clinical framing of pediatric dementia disorders
  evidence:
  - reference: PMID:37471493
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Typically monogenic in origin, this collective of individual neurodegenerative conditions are defined by a progressive impairment of neurocognitive function, presenting in childhood and adolescence."
    explanation: This scoping review directly defines childhood dementia as a collective of usually monogenic neurodegenerative disorders with progressive neurocognitive decline in childhood or adolescence.
  - reference: PMID:36571866
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Childhood dementias are a group of over 100 rare and ultra-rare pediatric conditions that are clinically characterized by chronic global neurocognitive decline."
    explanation: This clinical review reinforces the grouping concept and its defining neurocognitive decline phenotype.
