name: Postpoliomyelitis Syndrome
creation_date: "2026-06-26T00:00:00Z"
category: Complex
description: >
  Postpoliomyelitis syndrome (PPS, post-polio syndrome) is a slowly progressive lower
  motor neuron disorder characterized by new, persistent muscle weakness, abnormal muscle
  fatigability, generalized fatigue, muscle atrophy, and pain that develop decades (usually
  15 or more years) after recovery from acute paralytic poliomyelitis, in survivors who had
  attained a long period of stable neuromuscular function. The leading mechanistic model
  holds that, during recovery from the acute infection, surviving anterior-horn lower motor
  neurons reinnervated muscle fibers orphaned by the poliovirus-induced loss of their
  original motor neurons through terminal and collateral axonal sprouting, creating greatly
  enlarged motor units. Over decades, the chronic metabolic overload of maintaining these
  overextended motor units is thought to cause distal degeneration of the terminal sprouts
  and progressive denervation that outpaces ongoing reinnervation, producing new weakness
  and atrophy. PPS is not poliovirus reactivation; physiological aging with motor neuron
  loss, overuse, disuse, and possible low-grade inflammation are discussed as contributing
  factors. Diagnosis is clinical and requires prior paralytic polio, a stable interval, and
  exclusion of other causes.
