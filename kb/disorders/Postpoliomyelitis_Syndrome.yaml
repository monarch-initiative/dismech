treatments:
- name: Individualized Rehabilitation and Energy Conservation
  description: >
    Multidisciplinary rehabilitation with individually modified physical activity, energy
    conservation strategies, and careful muscle training is the mainstay of PPS management;
    patients are advised to avoid both inactivity and overuse of weak muscles.
  treatment_term:
    preferred_term: rehabilitation
    term:
      id: NCIT:C15315
      label: Rehabilitation
  evidence:
  - reference: PMID:20494327
    supports: SUPPORT
    evidence_source: OTHER
    snippet: "Rehabilitation in patients with postpolio syndrome should \ntake a multiprofessional and multidisciplinary approach, with an emphasis on \nphysiotherapy, including enhanced or individually modified physical activity, \nand muscle training."
    explanation: Lancet Neurology review endorses multidisciplinary rehabilitation with individualized physical activity and muscle training.
  - reference: PMID:20494327
    supports: SUPPORT
    evidence_source: OTHER
    snippet: "Patients with postpolio syndrome should be advised to avoid \nboth inactivity and overuse of weak muscles."
    explanation: Guidance to avoid both inactivity and overuse of weak muscles is a core management principle.
- name: Physical Therapy
  description: >
    Physiotherapy, including muscle strengthening within tolerance and management of fatigue,
    forms part of the symptomatic, rehabilitation-centered care for PPS.
  treatment_term:
    preferred_term: Physical Therapy
    term:
      id: NCIT:C15302
      label: Physical Therapy
  evidence:
  - reference: PMID:31379723
    supports: SUPPORT
    evidence_source: OTHER
    snippet: "the mainstay of therapy centers on symptomatic relief and individualized \nrehabilitation strategies such as energy conservation and muscle strengthening \nexercise regimes."
    explanation: Frontiers review states the therapeutic mainstay is symptomatic relief and individualized rehabilitation including muscle strengthening exercise.
differential_diagnoses:
- name: Amyotrophic Lateral Sclerosis
  description: >
    PPS mimics motor neuron disease and must be distinguished from ALS, which features
    combined upper and lower motor neuron degeneration and a far more rapid, fatal course;
    rare reports describe polio survivors developing ALS.
  disease_term:
    preferred_term: amyotrophic lateral sclerosis
    term:
      id: MONDO:0004976
      label: amyotrophic lateral sclerosis
  evidence:
  - reference: PMID:37092507
    supports: SUPPORT
    evidence_source: OTHER
    snippet: "mimics motor neuron diseases (MNDs), such as \namyotrophic lateral sclerosis (ALS), due to its selective impairment, \ndegeneration, or death of motor neurons in the brainstem and spinal cord."
    explanation: PPS clinically mimics ALS and other motor neuron diseases, making ALS a key differential.
- name: Compressive and Orthopedic Causes of New Weakness
  description: >
    New weakness in a polio survivor may stem from radiculopathy, entrapment neuropathy,
    degenerative joint disease, or other orthopedic problems; the diagnosis of PPS requires
    exclusion of such alternative neuromuscular, medical, and orthopedic causes.
  evidence:
  - reference: PMID:15599928
    supports: SUPPORT
    evidence_source: OTHER
    snippet: "persistent new muscle weakness or abnormal muscle \nfatigability, and the exclusion of other causes of new symptoms."
    explanation: Diagnosis of PPS requires exclusion of other causes of new symptoms, including orthopedic and compressive conditions.
