mechanistic_hypotheses:
- hypothesis_group_id: distal_motor_unit_degeneration_overload_model
  hypothesis_label: Distal Degeneration of Enlarged, Overloaded Motor Units
  status: CANONICAL
  description: >-
    The prevailing model of PPS attributes new weakness to distal degeneration of the
    enlarged post-poliomyelitis motor units that were created during recovery from acute
    polio. Surviving anterior-horn motor neurons reinnervated orphaned muscle fibers by
    terminal and collateral axonal sprouting, expanding individual motor units up to several
    fold. Decades of metabolic stress on these overextended motor neurons and their distal
    axons cause progressive degeneration of terminal sprouts, so that denervation eventually
    exceeds compensatory reinnervation. Aging-related motor neuron loss, overuse, disuse, and
    a possible low-grade inflammatory process are proposed contributors rather than poliovirus
    reactivation.
  evidence:
  - reference: PMID:15599928
    reference_title: "Post-poliomyelitis syndrome."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "The cause of \nPPS remains unclear, but is likely due to a distal degeneration of enlarged \npost-poliomyelitis motor units."
    explanation: >
      Canonical Muscle & Nerve review states the leading model of PPS as distal degeneration
      of enlarged post-poliomyelitis motor units.
  - reference: PMID:15599928
    reference_title: "Post-poliomyelitis syndrome."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Contributing factors to PPS may be aging (with \nmotor neuron loss), overuse, and disuse."
    explanation: >
      The same review names aging with motor neuron loss, overuse, and disuse as contributing
      factors, consistent with the multifactorial overload model.
  - reference: PMID:31379723
    reference_title: "Post-polio Syndrome: More Than Just a Lower Motor Neuron Disease."
    supports: SUPPORT
    evidence_source: OTHER
    snippet: "Motor units gradually become abnormally enlarged, up to 7-fold their original size (10) rendering them metabolically unsustainable"
    explanation: >
      Review describes progressive enlargement of reinnervated motor units to metabolically
      unsustainable size as the basis for later motor unit failure.
pathophysiology:
- name: Enlarged Reinnervated Motor Units from Prior Polio Recovery
  description: >
    During and after acute paralytic poliomyelitis, poliovirus-induced anterior horn cell loss
    leaves muscle fibers denervated. Surviving lower motor neurons reinnervate these orphaned
    fibers through terminal and collateral axonal sprouting at the neuromuscular junction,
    producing greatly enlarged motor units that can innervate several times the normal number
    of muscle fibers. This compensatory reinnervation underlies the functional recovery seen
    after acute polio but creates motor units far larger than physiological.
  role: trigger
  cell_types:
  - preferred_term: motor neuron
    term:
      id: CL:0000100
      label: motor neuron
  biological_processes:
  - preferred_term: collateral axonal sprouting
    term:
      id: GO:0048668
      label: collateral sprouting
    modifier: INCREASED
  - preferred_term: axon regeneration at neuromuscular junction
    term:
      id: GO:0014814
      label: axon regeneration at neuromuscular junction
    modifier: INCREASED
  downstream:
  - target: Chronic Motor Neuron and Terminal Axon Metabolic Overload
    description: >-
      Maintaining greatly enlarged motor units imposes a sustained metabolic and trophic
      demand on the surviving motor neurons and their distal axons.
    causal_link_type: DIRECT
    evidence:
    - reference: PMID:31379723
      supports: SUPPORT
      evidence_source: OTHER
      snippet: "Motor units gradually become abnormally enlarged, up to 7-fold their original size (10) rendering them metabolically unsustainable"
      explanation: >
        Enlargement of reinnervated motor units to a metabolically unsustainable size links
        the compensatory reinnervation to chronic overload of the motor neuron.
  evidence:
  - reference: PMID:31379723
    reference_title: "Post-polio Syndrome: More Than Just a Lower Motor Neuron Disease."
    supports: SUPPORT
    evidence_source: OTHER
    snippet: "Following the acute phase, axonal sprouting takes place reinnervating the muscle of the affected regions"
    explanation: >
      Review confirms that axonal sprouting reinnervates affected muscle after acute polio,
      establishing the enlarged motor units that later become vulnerable.
  - reference: PMID:2261887
    reference_title: "Disintegration of the motor unit in post-polio syndrome. Part I."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "It seems that the reinnervation after acute polio is a \ncontinuing process and thus complete stabilization and integration of the motor \nunit cannot be achieved."
    explanation: >
      Single-fiber EMG in post-polio patients shows that reinnervation is an ongoing process,
      so the enlarged motor units never fully stabilize.
- name: Chronic Motor Neuron and Terminal Axon Metabolic Overload
  description: >
    Decades of sustaining abnormally enlarged motor units place chronic metabolic and
    bioenergetic stress on the overextended surviving motor neurons and their distal axons.
    This overload, together with normal age-related attrition of motor neurons, is proposed
    to render the terminal sprouts of these units progressively unable to be maintained,
    setting the stage for distal degeneration.
  role: intermediate
  cell_types:
  - preferred_term: motor neuron
    term:
      id: CL:0000100
      label: motor neuron
  biological_processes:
  - preferred_term: oxidative phosphorylation
    term:
      id: GO:0006119
      label: oxidative phosphorylation
    modifier: ABNORMAL
  downstream:
  - target: Distal Axonal Sprout Degeneration and Progressive Denervation
    description: >-
      Chronic metabolic overload of overextended motor neurons leads to degeneration of the
      most distal terminal sprouts, beginning the denervation process.
    causal_link_type: DIRECT
    evidence:
    - reference: PMID:15599928
      supports: SUPPORT
      evidence_source: HUMAN_CLINICAL
      snippet: "The cause of \nPPS remains unclear, but is likely due to a distal degeneration of enlarged \npost-poliomyelitis motor units."
      explanation: >
        Distal degeneration of the enlarged motor units is the proposed consequence of their
        chronic overload.
  evidence:
  - reference: PMID:31379723
    reference_title: "Post-polio Syndrome: More Than Just a Lower Motor Neuron Disease."
    supports: SUPPORT
    evidence_source: OTHER
    snippet: "Metabolic stress (11, 20), overuse (21, 22), physiological aging (20, 23), and persistent inflammation (24) are also thought to contribute to gradual motor unit failure."
    explanation: >
      Review lists metabolic stress, overuse, aging, and inflammation as contributors to
      gradual motor unit failure, supporting overload as a driver.
  - reference: PMID:15599928
    reference_title: "Post-poliomyelitis syndrome."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Contributing factors to PPS may be aging (with \nmotor neuron loss), overuse, and disuse."
    explanation: >
      Aging with motor neuron loss, overuse, and disuse are named as factors compounding the
      chronic stress on surviving motor neurons.
- name: Distal Axonal Sprout Degeneration and Progressive Denervation
  description: >
    Progressive degeneration of the distal terminal sprouts of the enlarged post-polio motor
    units produces ongoing denervation of muscle fibers. Because reinnervation by the same
    overburdened motor neurons can no longer fully compensate, denervation outpaces
    reinnervation, leading to net loss of functioning motor units. Electrophysiologically this
    is reflected by increased jitter, blocking, increased fiber density, and spontaneous
    activity in newly weakened muscles, and clinically by new weakness and atrophy.
  role: intermediate
  cell_types:
  - preferred_term: motor neuron
    term:
      id: CL:0000100
      label: motor neuron
  biological_processes:
  - preferred_term: muscle atrophy
    term:
      id: GO:0014889
      label: muscle atrophy
    modifier: INCREASED
  - preferred_term: neuromuscular process
    term:
      id: GO:0050905
      label: neuromuscular process
    modifier: ABNORMAL
  downstream:
  - target: Low-grade Neuroinflammation
    description: >-
      Ongoing denervation and motor neuron stress are accompanied by inflammatory changes in
      the spinal cord and elevated pro-inflammatory cytokines, which may further amplify
      denervation.
    causal_link_type: INDIRECT_UNKNOWN_INTERMEDIATES
    evidence:
    - reference: PMID:31379723
      supports: SUPPORT
      evidence_source: OTHER
      snippet: "Increased serum and CSF levels of pro-inflammatory cytokines and peptides such as TNF-α, IFN-γ were repeatedly observed in PPS"
      explanation: >
        Elevated pro-inflammatory cytokines accompany the denervation process and may feed
        back on motor unit failure.
  evidence:
  - reference: PMID:2286169
    reference_title: "Disintegration of the motor unit in post-polio syndrome. Part II."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "PPMA occurring later in life represents disintegration of the \npreviously reinnervated motor units."
    explanation: >
      EMG/SFEMG study concludes that late post-polio muscular atrophy represents
      disintegration of the previously reinnervated (enlarged) motor units.
  - reference: PMID:2286169
    reference_title: "Disintegration of the motor unit in post-polio syndrome. Part II."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "we found in newly weakened muscles: spontaneous activity, high \npercentage of complex potentials, increased jitter, increased FD."
    explanation: >
      Newly weakened post-polio muscles show spontaneous activity, increased jitter, and
      increased fiber density, the electrophysiological signature of active denervation and
      reinnervation.
  - reference: PMID:20494327
    reference_title: "Management of postpolio syndrome."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "associated with an ongoing process of denervation and reinnervation, \nreaching a point at which denervation is no longer compensated for by \nreinnervation."
    explanation: >
      Lancet Neurology review frames PPS weakness as denervation that is no longer compensated
      for by reinnervation.
- name: Low-grade Neuroinflammation
  description: >
    Inflammatory changes in the spinal cord on post-mortem examination, together with
    increased serum and CSF levels of pro-inflammatory cytokines (TNF-alpha, IFN-gamma) and
    inflammatory changes in skeletal muscle, suggest a low-grade inflammatory or immune
    component to PPS. Inflammation is proposed as a contributing factor to motor unit failure
    rather than the primary cause, and is not equivalent to poliovirus reactivation; its
    causal role remains debated.
  role: modifier
  cell_types:
  - preferred_term: motor neuron
    term:
      id: CL:0000100
      label: motor neuron
  biological_processes:
  - preferred_term: inflammatory response
    term:
      id: GO:0006954
      label: inflammatory response
    modifier: INCREASED
  evidence:
  - reference: PMID:31379723
    reference_title: "Post-polio Syndrome: More Than Just a Lower Motor Neuron Disease."
    supports: SUPPORT
    evidence_source: OTHER
    snippet: "This hypothesis originates from post mortem observations of inflammatory changes in the spinal cord of PPS patients"
    explanation: >
      Post-mortem inflammatory changes in the spinal cord underpin the proposed inflammatory
      basis of PPS.
  - reference: PMID:20494327
    reference_title: "Management of postpolio syndrome."
    supports: PARTIAL
    evidence_source: HUMAN_CLINICAL
    snippet: "The cause of this denervation is unknown, but an inflammatory \nprocess is possible."
    explanation: >
      Lancet Neurology review notes that an inflammatory process is a possible but unproven
      cause of the ongoing denervation.
