name: YWHAG Syndrome
creation_date: "2026-04-05T18:46:08Z"
updated_date: "2026-04-05T18:46:08Z"
category: Mendelian
description: >-
  YWHAG syndrome, also known as developmental and epileptic encephalopathy 56
  (DEE56), is an ultra-rare Mendelian neurodevelopmental disorder caused by
  heterozygous pathogenic variants in YWHAG, which encodes the 14-3-3gamma
  phosphoserine-binding scaffold protein. The clinical spectrum ranges from mild
  developmental delay to developmental and epileptic encephalopathy with
  early-onset seizures, intellectual disability, and variable behavioral or
  movement abnormalities. Human cohort data suggest that missense variants in
  the ligand-binding domain are enriched among the more severe DEE presentations.
  Emerging human-cell-model work in isogenic YWHAG p.Arg132Cys cortical neurons
  implicates ROCK-associated cytoskeletal instability, elevated baseline calcium,
  reduced calcium signaling, and lower network activity, with partial lovastatin
  rescue of cytoskeletal fragility and calcium-baseline abnormalities.
notes: >-
  The most detailed direct mechanistic study currently focuses on the recurrent
  p.Arg132Cys allele in isogenic iPSC-derived cortical neurons. Those findings
  are modeled here as disease-relevant but should not yet be assumed to
  generalize equally to all pathogenic YWHAG variants.
