name: Severe Combined Immunodeficiency
creation_date: "2026-06-22T00:00:00Z"
category: Mendelian
synonyms:
- SCID
- severe combined immunodeficiency disease
- bubble boy disease
description: >-
  Severe combined immunodeficiency (SCID) is a group of inborn errors of immunity
  characterized by profound defects in T-lymphocyte development and function, with
  variable effects on B and NK cells. It is caused by pathogenic variants in more
  than 20 genes acting in cytokine receptor signaling (IL2RG, JAK3, IL7R), V(D)J
  recombination and DNA repair (RAG1, RAG2, DCLRE1C), purine metabolism (ADA), and
  TCR/pre-TCR signaling. The resulting failure of adaptive immunity produces
  life-threatening recurrent and opportunistic infections, chronic diarrhea, and
  failure to thrive that present in the first months of life. SCID is fatal in
  infancy without immune reconstitution by hematopoietic stem cell transplantation
  or gene therapy.
disease_term:
  preferred_term: severe combined immunodeficiency
  term:
    id: MONDO:0015974
    label: severe combined immunodeficiency
parents:
- combined immunodeficiency
- primary immunodeficiency

classifications:
  iuis_category:
    classification_value: combined immunodeficiency
    notes: >-
      IUIS Table 1 (immunodeficiencies affecting cellular and humoral immunity).
      SCID is the most severe phenotype in this category.
    evidence:
    - reference: PMID:32181275
      supports: SUPPORT
      evidence_source: HUMAN_CLINICAL
      snippet: "Severe Combined Immunodeficiency (SCID) is an inherited group of rare, life-threatening disorders due to the defect in T cell development and function."
      explanation: >-
        SCID is a disorder of combined cellular and humoral immunity, consistent
        with the IUIS combined-immunodeficiency category.

