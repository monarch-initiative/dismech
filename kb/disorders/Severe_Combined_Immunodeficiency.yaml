has_subtypes:
- name: X-linked SCID
  display_name: X-linked SCID (IL2RG, T-B+NK-)
  description: >-
    The most common form of SCID in Western populations, caused by hemizygous
    pathogenic variants in IL2RG encoding the common gamma chain shared by the
    IL-2, IL-4, IL-7, IL-9, IL-15, and IL-21 receptors. Affected males have absent
    T and NK cells but present (non-functional) B cells (T-B+NK- immunophenotype).
  inheritance:
  - name: X-linked recessive inheritance
    inheritance_term:
      preferred_term: X-linked recessive inheritance
      term:
        id: HP:0001419
        label: X-linked recessive inheritance
  evidence:
  - reference: PMID:37375091
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Autosomal, X-linked, and sporadic forms exist."
    explanation: X-linked SCID is one of the recognized inheritance forms of SCID.
- name: ADA deficiency
  display_name: ADA-SCID (adenosine deaminase deficiency, T-B-NK-)
  description: >-
    Adenosine deaminase deficiency, an autosomal recessive purine metabolic
    disorder accounting for about 15% of SCID, in which accumulation of toxic
    deoxyadenosine metabolites kills developing lymphocytes, producing a
    T-B-NK- immunophenotype.
  inheritance:
  - name: Autosomal recessive inheritance
    inheritance_term:
      preferred_term: Autosomal recessive inheritance
      term:
        id: HP:0000007
        label: Autosomal recessive inheritance
  evidence:
  - reference: PMID:20301656
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Adenosine deaminase (ADA) deficiency is a systemic purine metabolic disorder that primarily affects lymphocyte development, viability, and function."
    explanation: >-
      ADA deficiency is a distinct metabolic cause of SCID affecting all
      lymphocyte lineages.
- name: RAG1/RAG2 deficiency
  display_name: RAG1/RAG2 deficiency (V(D)J recombination defect, T-B-NK+)
  description: >-
    Autosomal recessive defects in the recombination-activating genes RAG1 or
    RAG2 prevent V(D)J recombination, blocking both T- and B-cell receptor
    assembly while sparing NK cells (T-B-NK+). Most common in populations with
    high consanguinity; hypomorphic variants can cause Omenn syndrome.
  inheritance:
  - name: Autosomal recessive inheritance
    inheritance_term:
      preferred_term: Autosomal recessive inheritance
      term:
        id: HP:0000007
        label: Autosomal recessive inheritance
  evidence:
  - reference: PMID:33628209
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Severe Combined Immune Deficiency (SCID) is an inherited defect in lymphocyte development and function that results in life-threatening opportunistic infections in early infancy."
    explanation: >-
      RAG1/RAG2 defects are a major autosomal recessive cause of SCID,
      particularly in consanguineous populations.
- name: IL7R deficiency
  display_name: IL7R deficiency (IL-7 receptor alpha, T-B+NK+)
  description: >-
    Autosomal recessive deficiency of the IL-7 receptor alpha chain, which is
    required for thymic T-cell development. Affected individuals lack T cells but
    retain B and NK cells (T-B+NK+).
  inheritance:
  - name: Autosomal recessive inheritance
    inheritance_term:
      preferred_term: Autosomal recessive inheritance
      term:
        id: HP:0000007
        label: Autosomal recessive inheritance
  evidence:
  - reference: PMID:32181275
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Severe Combined Immunodeficiency (SCID) is an inherited group of rare, life-threatening disorders due to the defect in T cell development and function."
    explanation: >-
      IL7R deficiency selectively blocks T-cell development, a defining feature
      of this T-B+NK+ SCID subtype.
- name: JAK3 deficiency
  display_name: JAK3 deficiency (T-B+NK-)
  description: >-
    Autosomal recessive deficiency of Janus kinase 3, the signaling kinase
    associated with the common gamma chain. JAK3 deficiency phenocopies X-linked
    SCID with a T-B+NK- immunophenotype but is inherited autosomal recessively.
  inheritance:
  - name: Autosomal recessive inheritance
    inheritance_term:
      preferred_term: Autosomal recessive inheritance
      term:
        id: HP:0000007
        label: Autosomal recessive inheritance
  evidence:
  - reference: PMID:32181275
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "The pattern of inheritance of SCID may be X-linked or autosomal recessive."
    explanation: >-
      JAK3 deficiency is an autosomal recessive form of SCID that signals through
      the same pathway as X-linked SCID.
- name: Artemis deficiency
  display_name: Artemis (DCLRE1C) deficiency (radiosensitive, T-B-NK+)
  description: >-
    Autosomal recessive deficiency of DCLRE1C (Artemis), a DNA cross-link repair
    nuclease required for V(D)J recombination and non-homologous end joining.
    Defects block T- and B-cell development (T-B-NK+) and confer radiosensitivity,
    which has important implications for conditioning before transplant.
  inheritance:
  - name: Autosomal recessive inheritance
    inheritance_term:
      preferred_term: Autosomal recessive inheritance
      term:
        id: HP:0000007
        label: Autosomal recessive inheritance
  evidence:
  - reference: PMID:32181275
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "genetic diagnosis is often needed for genetic counselling, prognostication, and modification of pre-transplant chemotherapeutic agents."
    explanation: >-
      Radiosensitive SCID such as Artemis deficiency requires modification of
      pre-transplant chemotherapy, underscoring its distinct DNA-repair mechanism.

pathophysiology:
- name: Genetic defect in lymphocyte development
  description: >-
    SCID is caused by pathogenic variants in more than 20 genes acting along
    distinct molecular axes: cytokine-receptor signaling (IL2RG, JAK3, IL7R),
    V(D)J recombination and DNA repair (RAG1, RAG2, DCLRE1C), and purine
    metabolism (ADA). Each defect converges on a failure to generate functional
    T lymphocytes, with variable effects on B and NK lineages.
  cell_types:
  - preferred_term: common lymphoid progenitor
    term:
      id: CL:0000051
      label: common lymphoid progenitor
  biological_processes:
  - preferred_term: cytokine-mediated signaling pathway
    term:
      id: GO:0019221
      label: cytokine-mediated signaling pathway
    modifier: DECREASED
  - preferred_term: V(D)J recombination
    term:
      id: GO:0033151
      label: V(D)J recombination
    modifier: DECREASED
  - preferred_term: adenosine catabolic process
    term:
      id: GO:0006154
      label: adenosine catabolic process
    modifier: DECREASED
  evidence:
  - reference: PMID:32181275
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Severe Combined Immunodeficiency (SCID) is an inherited group of rare, life-threatening disorders due to the defect in T cell development and function."
    explanation: >-
      The genetic defects underlying SCID converge on impaired T-cell
      development and function.
  downstream:
  - target: Blocked T-cell development
    description: >-
      Defects in cytokine signaling, V(D)J recombination, or purine metabolism
      arrest T-lymphocyte maturation in the thymus.
    causal_link_type: DIRECT
- name: Blocked T-cell development
  description: >-
    Disrupted IL-7/common gamma chain signaling, failed V(D)J recombination, or
    accumulation of toxic purine metabolites halts thymocyte maturation, producing
    absent or profoundly reduced T cells. B- and NK-cell lineages are affected
    differentially depending on the underlying gene, defining the T/B/NK
    immunophenotypes.
  cell_types:
  - preferred_term: pro-T cell
    term:
      id: CL:0000827
      label: pro-T cell
  - preferred_term: T cell
    term:
      id: CL:0000084
      label: T cell
    modifier: DECREASED
  biological_processes:
  - preferred_term: T cell differentiation in thymus
    term:
      id: GO:0033077
      label: T cell differentiation in thymus
    modifier: DECREASED
  - preferred_term: interleukin-7-mediated signaling pathway
    term:
      id: GO:0038111
      label: interleukin-7-mediated signaling pathway
    modifier: DECREASED
  evidence:
  - reference: PMID:20301656
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Characteristic immune abnormalities are lymphocytopenia (low numbers of T, B, and NK cells) combined with the absence of both humoral and cellular immune function."
    explanation: >-
      Blocked lymphocyte development manifests as lymphocytopenia with absent
      cellular and humoral immune function.
  downstream:
  - target: Absent adaptive immunity
    description: >-
      Without mature T cells (and, depending on subtype, B and NK cells), the
      adaptive immune system cannot mount antigen-specific responses.
    causal_link_type: DIRECT
- name: Absent adaptive immunity
  description: >-
    Loss of functional T cells abolishes cell-mediated immunity and, because most
    antibody responses are T-cell dependent, also cripples humoral immunity even
    when B cells are present. The result is a profound failure of antigen-specific
    adaptive immune defense.
  cell_types:
  - preferred_term: T cell
    term:
      id: CL:0000084
      label: T cell
    modifier: DECREASED
  - preferred_term: B cell
    term:
      id: CL:0000236
      label: B cell
  biological_processes:
  - preferred_term: adaptive immune response
    term:
      id: GO:0002250
      label: adaptive immune response
    modifier: DECREASED
  evidence:
  - reference: PMID:37375091
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "resulting in a decrease in number and impairment in the function of T and B cells."
    explanation: >-
      SCID produces a combined loss of T- and B-cell number and function,
      i.e. absent adaptive immunity.
  downstream:
  - target: Life-threatening opportunistic infections
    description: >-
      The absence of adaptive immunity leaves infants defenseless against
      bacterial, viral, fungal, and protozoal pathogens, including opportunistic
      organisms.
    causal_link_type: DIRECT
  - target: Failure to thrive and chronic diarrhea
    description: >-
      Persistent and recurrent infections, particularly chronic gastrointestinal
      infection, drive failure to thrive and protracted diarrhea.
    causal_link_type: INDIRECT_KNOWN_INTERMEDIATES
    intermediate_mechanisms:
    - Chronic enteric and systemic infection leads to malabsorption, catabolism, and poor weight gain.
- name: Life-threatening opportunistic infections
  description: >-
    Untreated SCID presents in the first weeks to months of life with severe,
    recurrent, and opportunistic infections that are fatal without immune
    reconstitution. Characteristic infections include disseminated BCG and
    cytomegalovirus, persistent candidiasis, and Pneumocystis pneumonia.
  cell_types:
  - preferred_term: T cell
    term:
      id: CL:0000084
      label: T cell
    modifier: DECREASED
  biological_processes:
  - preferred_term: adaptive immune response
    term:
      id: GO:0002250
      label: adaptive immune response
    modifier: DECREASED
  evidence:
  - reference: PMID:37375091
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "It is usually due to opportunistic infections caused by bacteria, viruses, fungi, and protozoa"
    explanation: >-
      The terminal clinical consequence of absent adaptive immunity is fatal
      opportunistic infection.
- name: Failure to thrive and chronic diarrhea
  description: >-
    Persistent and recurrent infection, particularly chronic gastrointestinal
    infection, produces protracted diarrhea, malabsorption, and poor linear
    growth and weight gain (failure to thrive) in untreated SCID.
  cell_types:
  - preferred_term: T cell
    term:
      id: CL:0000084
      label: T cell
    modifier: DECREASED
  biological_processes:
  - preferred_term: adaptive immune response
    term:
      id: GO:0002250
      label: adaptive immune response
    modifier: DECREASED
  evidence:
  - reference: PMID:20301656
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "with poor linear growth and weight gain secondary to persistent diarrhea, extensive dermatitis, and recurrent pneumonia."
    explanation: >-
      Persistent diarrhea drives poor growth and weight gain (failure to thrive)
      in untreated SCID.

