    explanation: Recurrent severe infections from early infancy characterize SCID.
- category: Laboratory
  name: Lymphopenia
  description: >-
    SCID is characterized by very low numbers of circulating lymphocytes,
    particularly T cells, often detected as a profound decrease in total
    lymphocyte count.
  phenotype_term:
    preferred_term: Decreased total lymphocyte count
    term:
      id: HP:0001888
      label: Decreased total lymphocyte count
  evidence:
  - reference: PMID:37375091
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Evidence of recurrent opportunistic infections and lymphopenia very early in life should prompt immunological investigation and suspicion of this rare disorder."
    explanation: Lymphopenia in early life is a key diagnostic clue for SCID.
- category: Laboratory
  name: Cellular immunodeficiency
  description: >-
    Absence of functional T cells abolishes cell-mediated (cellular) immunity,
    with absent proliferative responses to mitogens.
  phenotype_term:
    preferred_term: Cellular immunodeficiency
    term:
      id: HP:0005374
      label: Cellular immunodeficiency
  evidence:
  - reference: PMID:20301656
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Characteristic immune abnormalities are lymphocytopenia (low numbers of T, B, and NK cells) combined with the absence of both humoral and cellular immune function."
    explanation: SCID abolishes cellular immune function.
- category: Laboratory
  name: Hypogammaglobulinemia
  description: >-
    Because most antibody responses are T-cell dependent, SCID is accompanied by
    decreased circulating immunoglobulin and absent humoral immune function.
  phenotype_term:
    preferred_term: Decreased circulating immunoglobulin concentration
    term:
      id: HP:0004313
      label: Decreased circulating immunoglobulin concentration
  evidence:
  - reference: PMID:20301656
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "combined with the absence of both humoral and cellular immune function."
    explanation: Humoral immune function is absent in SCID, reflecting impaired antibody production.
- category: Clinical
  name: Chronic diarrhea
  description: Persistent diarrhea contributing to poor growth in untreated SCID.
  phenotype_term:
    preferred_term: Chronic diarrhea
    term:
      id: HP:0002028
      label: Chronic diarrhea
  evidence:
  - reference: PMID:20301656
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "with poor linear growth and weight gain secondary to persistent diarrhea, extensive dermatitis, and recurrent pneumonia."
    explanation: Persistent diarrhea is a characteristic feature of untreated SCID.
- category: Clinical
  name: Failure to thrive
  description: >-
    Poor linear growth and weight gain secondary to recurrent infection and
    persistent diarrhea.
  phenotype_term:
    preferred_term: Failure to thrive
    term:
      id: HP:0001508
      label: Failure to thrive
  evidence:
  - reference: PMID:20301656
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Untreated ADA-SCID presents as life-threatening opportunistic illnesses in the first weeks to months of life with poor linear growth and weight gain"
    explanation: Poor growth (failure to thrive) is a presenting feature of untreated SCID.
- category: Clinical
  name: Pneumonia
  description: Recurrent pneumonia, including Pneumocystis jirovecii pneumonia, is common in SCID.
  phenotype_term:
    preferred_term: Pneumonia
    term:
      id: HP:0002090
      label: Pneumonia
  evidence:
  - reference: PMID:20301656
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "persistent diarrhea, extensive dermatitis, and recurrent pneumonia."
    explanation: Recurrent pneumonia is a frequent infectious manifestation of SCID.
- category: Clinical
  name: Dermatitis
  description: >-
    Extensive dermatitis can occur in untreated SCID and is a prominent feature
    of Omenn syndrome.
  phenotype_term:
    preferred_term: Eczematoid dermatitis
    term:
      id: HP:0000964
      label: Eczematoid dermatitis
  evidence:
  - reference: PMID:20301656
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "persistent diarrhea, extensive dermatitis, and recurrent pneumonia."
    explanation: Extensive dermatitis is a recognized cutaneous manifestation of untreated SCID.

