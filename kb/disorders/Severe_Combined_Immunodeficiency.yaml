treatments:
- name: Hematopoietic Stem Cell Transplantation
  description: >-
    Allogeneic hematopoietic stem cell transplantation is the definitive
    curative treatment for SCID, with best outcomes when performed early before
    the onset of infections.
  treatment_term:
    preferred_term: hematopoietic stem cell transplantation
    term:
      id: MAXO:0000747
      label: hematopoietic stem cell transplantation
  evidence:
  - reference: PMID:37375091
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Adequate stem cell transplantation is the treatment of choice."
    explanation: HSCT is the definitive treatment for SCID.
- name: Gene Therapy
  description: >-
    Autologous hematopoietic stem cell gene therapy (viral-vector gene addition
    or gene editing) is an established alternative to allogeneic HSCT for several
    SCID forms, including ADA-SCID and X-linked SCID.
  therapeutic_modality: GENE_THERAPY
  treatment_term:
    preferred_term: gene therapy
    term:
      id: MAXO:0001001
      label: gene therapy
  evidence:
  - reference: PMID:38355973
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Long-term and real-world safety and efficacy of retroviral gene therapy for adenosine deaminase deficiency."
    explanation: >-
      Retroviral gene therapy has demonstrated long-term safety and efficacy for
      ADA-SCID.
- name: Enzyme Replacement Therapy (PEG-ADA)
  description: >-
    Pegylated adenosine deaminase (pegademase) enzyme replacement therapy can
    stabilize patients with ADA-SCID by detoxifying purine metabolites, though it
    provides limited long-term immune reconstitution and is used as a bridge to
    definitive therapy.
  therapeutic_modality: PROTEIN_REPLACEMENT
  treatment_term:
    preferred_term: enzyme replacement therapy
    term:
