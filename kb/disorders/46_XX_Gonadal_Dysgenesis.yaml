    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: >-
      Flow cytometry demonstrated an average of 48% reduction in cell-surface
      signal detection (P < 0.01).
    explanation: >-
      This functional assay supports impaired FSHR membrane trafficking as one
      mechanism of FSH-resistant ovarian failure.
  - reference: PMID:21963259
    reference_title: >-
