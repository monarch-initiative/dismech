- Gonadal development disorder
inheritance:
- name: Autosomal recessive inheritance
  inheritance_term:
    preferred_term: Autosomal recessive inheritance
    term:
      id: HP:0000007
      label: Autosomal recessive inheritance
  description: >-
    Several severe familial 46,XX gonadal dysgenesis forms are recessive,
    including reported NUP107, PSMC3IP, and FSHR-associated disease.
  evidence:
  - reference: PMID:26485283
    reference_title: A mutation in the nucleoporin-107 gene causes XX gonadal dysgenesis.
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Using homozygosity mapping and whole-exome sequencing, we identified a
      recessive missense mutation in nucleoporin-107 (NUP107, c.1339G>A,
      p.D447N).
    explanation: >-
      This directly supports autosomal recessive inheritance in a NUP107-linked
      46,XX gonadal dysgenesis family.
- name: X-linked inheritance
  inheritance_term:
    preferred_term: X-linked inheritance
    term:
      id: HP:0001417
      label: X-linked inheritance
  description: >-
    BMP15-related ovarian dysgenesis provides an X-linked mechanism affecting
    heterozygous females who inherit the variant from an unaffected father.
  evidence:
  - reference: PMID:15136966
    reference_title: >-
      Hypergonadotropic ovarian failure associated with an inherited mutation of
      human bone morphogenetic protein-15 (BMP15) gene.
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      This condition represents an exceptional example of X-linked human disease
      exclusively affecting heterozygous females who inherited the genetic
      alteration from the unaffected father.
    explanation: >-
      This supports X-linked inheritance for a BMP15-associated ovarian
      dysgenesis subset.
definitions:
- name: Clinical disease framing for 46,XX gonadal dysgenesis
  definition_type: CASE_DEFINITION
  description: >-
    46,XX gonadal dysgenesis is a disease-level ovarian developmental failure
    state defined by a normal 46,XX karyotype, phenotypically female external
    genitalia, underdeveloped or streak ovaries, absent spontaneous puberty,
    primary amenorrhea, uterine hypoplasia, and hypergonadotropic
    hypogonadism.
  scope: >-
    Disease anchor for isolated 46,XX gonadal dysgenesis rather than a generic
    46,XX DSD phenotype bucket.
  evidence:
  - reference: PMID:26485283
    reference_title: A mutation in the nucleoporin-107 gene causes XX gonadal dysgenesis.
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      XX female gonadal dysgenesis (XX-GD) is a rare, genetically heterogeneous
      disorder that is characterized by underdeveloped, dysfunctional ovaries,
      with subsequent lack of spontaneous pubertal development, primary
      amenorrhea, uterine hypoplasia, and hypergonadotropic hypogonadism.
    explanation: >-
      This abstract provides a compact disease-level definition for isolated
      46,XX gonadal dysgenesis.
