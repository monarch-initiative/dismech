  evidence:
  - reference: PMID:21963259
    reference_title: >-
      XX ovarian dysgenesis is caused by a PSMC3IP/HOP2 mutation that abolishes
      coactivation of estrogen-driven transcription.
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Most cases are unexplained but thought to be autosomal recessive. We
      elucidated the genetic basis of XX-GD in a highly consanguineous
      Palestinian family by using homozygosity mapping and candidate-gene and
      whole-exome sequencing.
    explanation: >-
      This supports family-based genetic risk assessment and counseling in
      recessive familial XX-GD.
diagnosis:
- name: Hormone profile and karyotype evaluation
  description: >-
    Hormone-profile testing and karyotype analysis distinguish 46,XX gonadal
    dysgenesis from outflow-tract disorders such as MRKH syndrome and identify
    the hypergonadotropic ovarian-failure pattern.
  diagnosis_term:
    preferred_term: clinical assessment
    term:
      id: MAXO:0000487
      label: clinical assessment
  evidence:
  - reference: PMID:31809259
    reference_title: >-
      Misdiagnosis of Mullerian agenesis in a patient with 46, XX gonadal
      dysgenesis: a missed opportunity for prevention of osteoporosis.
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Hormone profiles and karyotype should be investigated in all cases of the
      presumptive diagnosis of Mayer-Rokitansky-Kuster-Hauser (MRKH) syndrome or
      Mullerian agenesis.
    explanation: >-
      This supports combined endocrine and cytogenetic evaluation in the primary
      amenorrhea differential that includes 46,XX gonadal dysgenesis.
- name: Molecular genetic testing
  description: >-
    Genetic testing can identify the causal lesion in the heterogeneous
    ovarian-development gene set, including FSHR, NUP107, PSMC3IP, BMP15, and
    NR5A1-associated cases.
  diagnosis_term:
    preferred_term: genetic testing
    term:
      id: MAXO:0000127
      label: genetic testing
  evidence:
  - reference: PMID:38785542
    reference_title: >-
      Role of NR5A1 Gene Mutations in Disorders of Sex Development: Molecular
      and Clinical Features.
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Genetic tests are crucial diagnostic tools that should be used early in
      the diagnostic pathway, as early as the neonatal period, when gonadal
      dysgenesis is the main manifestation of NR5A1 mutation.
    explanation: >-
      This supports early genetic testing when gonadal dysgenesis is the main
      presentation of a DSD gene such as NR5A1.
