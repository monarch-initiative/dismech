    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      We report two sisters with a normal karyotype who are affected with
      hypergonadotropic ovarian failure due to OD.
    explanation: >-
      This reports normal-karyotype sisters with ovarian dysgenesis and
      hypergonadotropic ovarian failure in association with a BMP15 variant.
  - reference: PMID:15136966
    reference_title: >-
      Hypergonadotropic ovarian failure associated with an inherited mutation of
      human bone morphogenetic protein-15 (BMP15) gene.
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: >-
      Mutant BMP15 appears to be processed abnormally, is associated with
      reduced GC growth, and antagonizes the stimulatory activity of wild-type
      protein on GC proliferation.
    explanation: >-
      This functional evidence links the BMP15 variant to impaired
      granulosa-cell growth and folliculogenesis.
