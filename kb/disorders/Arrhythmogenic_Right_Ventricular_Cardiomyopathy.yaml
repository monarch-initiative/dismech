- name: Ventricular tachyarrhythmia
  description: >-
    The key clinical consequence of the conduction substrate is ventricular
    tachycardia or ventricular fibrillation, often preceding severe structural
    disease.
  evidence:
  - reference: PMID:24817548
    reference_title: >-
      Arrhythmogenic cardiomyopathy: diagnosis, genetic background, and risk
      management.
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Patients with AC typically present between the second and the fourth
      decade of life with palpitations, lightheadedness, or syncope due to
      ventricular ectopy or (monomorphic) ventricular tachycardia (VT) with
      left bundle branch block (LBBB) morphology
    explanation: >-
      This directly supports ventricular tachyarrhythmia as the main electrical
      manifestation.
  downstream:
  - target: Sudden cardiac death
    description: >-
      Malignant ventricular arrhythmia can cause sudden death, including during
      the concealed phase.
    causal_link_type: DIRECT
    evidence:
    - reference: PMID:24817548
      reference_title: >-
        Arrhythmogenic cardiomyopathy: diagnosis, genetic background, and risk
        management.
      supports: SUPPORT
      evidence_source: HUMAN_CLINICAL
      snippet: >-
        However, sudden cardiac death (SCD) may be the first manifestation,
        often at young age in the concealed stage of disease.
      explanation: >-
        This directly supports sudden death as a downstream consequence of the
        arrhythmogenic substrate.
- name: Ventricular dysfunction
  description: >-
    Structural disease progresses from right ventricular dysfunction to
    biventricular failure in some patients.
