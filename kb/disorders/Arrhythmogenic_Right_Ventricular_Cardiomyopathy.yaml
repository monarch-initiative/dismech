      management.
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      The molecular genetic substrate for the disease is mainly acknowledged in
      genes encoding desmosomal adhesion proteins in the intercalated disk.
    explanation: >-
      This directly supports desmosomal adhesion failure as the main proximal
      mechanism in the disease.
  downstream:
  - target: Electrical uncoupling and conduction delay
    description: >-
      Intercalated-disc disruption alters sodium-channel and gap-junction
      organization, slowing conduction and creating an arrhythmogenic substrate.
    causal_link_type: DIRECT
    evidence:
    - reference: PMID:24817548
      reference_title: >-
        Arrhythmogenic cardiomyopathy: diagnosis, genetic background, and risk
        management.
      supports: SUPPORT
      evidence_source: HUMAN_CLINICAL
      snippet: >-
        These alterations give rise to electrical cell-cell uncoupling and slow
        conduction, respectively, thereby providing a substrate for early
        activation delay resulting in ventricular tachyarrhythmia, a hallmark
        of AC
      explanation: >-
        This directly links intercalated-disc remodeling to slowed conduction
        and ventricular arrhythmia.
- name: Electrical uncoupling and conduction delay
  description: >-
    Altered connexin43 and sodium-channel distribution reduces effective
    electrical coupling and slows conduction in ventricular myocardium.
  cell_types:
