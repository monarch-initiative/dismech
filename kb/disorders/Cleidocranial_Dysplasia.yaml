name: Cleidocranial Dysplasia
creation_date: '2026-03-04T07:37:20Z'
updated_date: '2026-04-16T19:23:24Z'
category: Mendelian
description: >
  Cleidocranial dysplasia is a genetically heterogeneous skeletal dysplasia
  spectrum characterized by clavicular hypoplasia/aplasia, delayed closure of
  cranial sutures and fontanelles, and dental abnormalities including delayed
  tooth eruption and supernumerary teeth. Recognized monogenic forms include
  RUNX2-related cleidocranial dysplasia 1 and CBFB-related cleidocranial
  dysplasia 2. Across the spectrum, disease reflects dysfunction of the
  RUNX2-CBFB core-binding factor complex required for osteoblast maturation and
  normal intramembranous and endochondral ossification.
# MONDO currently lacks a live umbrella CCD term; the active RUNX2-linked term
# is retained here pending umbrella-term curation in Mondo.
disease_term:
  preferred_term: cleidocranial dysplasia
  term:
    id: MONDO:0007340
    label: cleidocranial dysplasia 1
parents:
- Skeletal Dysplasia
has_subtypes:
- name: CCD1
  display_name: Cleidocranial Dysplasia 1 (RUNX2-related)
  description: >
    The classic and most common form of cleidocranial dysplasia is caused by
    heterozygous pathogenic variants in RUNX2 and typically features clavicular
    hypoplasia/aplasia, delayed cranial suture closure, dental anomalies, and
    variable short stature.
  subtype_term:
    preferred_term: cleidocranial dysplasia 1
    term:
      id: MONDO:0007340
      label: cleidocranial dysplasia 1
  genes:
  - preferred_term: RUNX2
    term:
      id: hgnc:10472
      label: RUNX2
  evidence:
  - reference: PMID:10204840
    reference_title: "Cleidocranial dysplasia: clinical and molecular genetics."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Cleidocranial dysplasia (CCD) (MIM 119600) is an autosomal dominant
      skeletal dysplasia characterised by abnormal clavicles, patent sutures and
      fontanelles, supernumerary teeth, short stature, and a variety of other
      skeletal changes.
    explanation: >-
      This review summarizes the canonical RUNX2-related cleidocranial
      dysplasia phenotype corresponding to CCD1.
- name: CCD2
  display_name: Cleidocranial Dysplasia 2 (CBFB-related)
  description: >
    CBFB-related cleidocranial dysplasia is caused by heterozygous pathogenic
    variants affecting the beta subunit of the core-binding factor complex. It
    overlaps strongly with classic CCD but normal stature and mild
    neurodevelopmental findings have been reported in some affected
    individuals.
  subtype_term:
    preferred_term: cleidocranial dysplasia 2
    term:
      id: MONDO:0859307
      label: cleidocranial dysplasia 2
  genes:
  - preferred_term: CBFB
    term:
      id: hgnc:1539
      label: CBFB
  evidence:
  - reference: PMID:36241386
    reference_title: "Heterozygous pathogenic variants involving CBFB cause a new skeletal disorder resembling cleidocranial dysplasia."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      In each subject a heterozygous pathogenic variant in CBFB was detected,
      whereas no genomic alteration involving RUNX2 was found.
    explanation: >-
      This establishes CBFB as the disease gene for a distinct cleidocranial
      dysplasia subtype separate from RUNX2-related CCD1.
  - reference: PMID:39894570
    reference_title: "A Cryptic CBFB Deletion-Inversion Expands the Mutational Spectrum of Variants Associated With Cleidocranial Dysplasia."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      five families with cleidocranial dysplasia (CCD) were identified
      harbouring presumed loss of function variants in CBFB.
    explanation: >-
      This follow-up study expands the mutational spectrum of CBFB-related CCD
      and reinforces CBFB as the cause of CCD2.
