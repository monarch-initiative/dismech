      This identifies pathogenic RUNX2/CBFA1 mutations in affected CCD patients.
- name: CBFB Pathogenic Variants
  gene_term:
    preferred_term: CBFB
    term:
      id: hgnc:1539
      label: CBFB
  association: Causative
  notes: >
    Heterozygous loss-of-function and structural pathogenic variants in CBFB are
    causative for cleidocranial dysplasia 2, extending the CCD spectrum beyond
    RUNX2.
  evidence:
  - reference: PMID:36241386
    reference_title: "Heterozygous pathogenic variants involving CBFB cause a new skeletal disorder resembling cleidocranial dysplasia."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      In each subject a heterozygous pathogenic variant in CBFB was detected,
      whereas no genomic alteration involving RUNX2 was found.
    explanation: >-
      This establishes CBFB as a distinct causative CCD gene in patients lacking
      RUNX2 variants.
  - reference: PMID:39894570
    reference_title: "A Cryptic CBFB Deletion-Inversion Expands the Mutational Spectrum of Variants Associated With Cleidocranial Dysplasia."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      our data strengthens the evidence linking aberrations of the
      core-binding factor complex to CCD and extends the mutational spectrum of
      pathogenic variants.
    explanation: >-
      This follow-up report broadens the spectrum of pathogenic CBFB
      alterations causing CCD2.
