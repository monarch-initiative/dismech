  inheritance_term:
    preferred_term: Autosomal dominant inheritance
    term:
      id: HP:0000006
      label: Autosomal dominant inheritance
  penetrance: COMPLETE
  description: >
    The recognized monogenic CCD subtypes are inherited in an autosomal
    dominant pattern and are associated with heterozygous pathogenic variants in
    either RUNX2 or CBFB.
  evidence:
  - reference: PMID:10204840
    reference_title: "Cleidocranial dysplasia: clinical and molecular genetics."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Cleidocranial dysplasia (CCD) (MIM 119600) is an autosomal dominant
      skeletal dysplasia characterised by abnormal clavicles, patent sutures and
      fontanelles, supernumerary teeth, short stature, and a variety of other
      skeletal changes.
    explanation: >-
      This sentence directly supports autosomal dominant inheritance for the
      classic RUNX2-related form of CCD.
  - reference: PMID:36241386
    reference_title: "Heterozygous pathogenic variants involving CBFB cause a new skeletal disorder resembling cleidocranial dysplasia."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      In each subject a heterozygous pathogenic variant in CBFB was detected,
      whereas no genomic alteration involving RUNX2 was found.
    explanation: >-
      The recurrent heterozygous CBFB variants in multiple affected families
      support autosomal dominant inheritance for CCD2.
pathophysiology:
- name: RUNX2-CBFB Core-Binding Factor Dysfunction
  description: >
    Cleidocranial dysplasia spectrum results from dysfunction of the
    RUNX2-CBFB core-binding factor heterodimer. RUNX2 provides the DNA-binding
    alpha subunit and CBFB is its obligate beta-subunit partner that stabilizes
    complex activity; pathogenic variants in either component impair osteoblast
    differentiation and disrupt both intramembranous and endochondral
    ossification, with additional effects on chondrocyte differentiation.
  genes:
  - preferred_term: RUNX2
    term:
      id: hgnc:10472
      label: RUNX2
  - preferred_term: CBFB
    term:
      id: hgnc:1539
      label: CBFB
  cell_types:
  - preferred_term: Osteoblast
    term:
      id: CL:0000062
      label: osteoblast
  - preferred_term: Chondrocyte
    term:
      id: CL:0000138
      label: chondrocyte
  biological_processes:
  - preferred_term: Intramembranous Ossification
    term:
      id: GO:0001957
      label: intramembranous ossification
  - preferred_term: Endochondral Ossification
    term:
      id: GO:0001958
      label: endochondral ossification
  evidence:
  - reference: PMID:12434156
    reference_title: "Cbfbeta interacts with Runx2 and has a critical role in bone development."
    supports: SUPPORT
    evidence_source: MODEL_ORGANISM
    snippet: >-
      We demonstrate that Cbfbeta is expressed in developing bone and forms a
      functional interaction with Runx2
    explanation: >-
      This directly supports the mechanistic dependence of skeletal development
      on the RUNX2-CBFB heterodimer.
  - reference: PMID:10204840
    reference_title: "Cleidocranial dysplasia: clinical and molecular genetics."
    supports: SUPPORT
    evidence_source: MODEL_ORGANISM
    snippet: >-
      Loss of both alleles (-/-) leads to a complete absence of bone owing to a
      lack of osteoblast differentiation.
    explanation: >-
      This model-organism evidence directly supports RUNX2-dependent osteoblast
      differentiation as a causal mechanism.
  - reference: PMID:10204840
    reference_title: "Cleidocranial dysplasia: clinical and molecular genetics."
    supports: SUPPORT
    evidence_source: MODEL_ORGANISM
    snippet: >-
      CBFA1 controls differentiation of precursor cells into osteoblasts and is
      thus essential for membranous as well as endochondral bone formation.
    explanation: >-
      This supports the dual intramembranous and endochondral ossification
      defects caused by disruption of the RUNX2-containing core-binding factor
      complex.
  - reference: PMID:39894570
    reference_title: "A Cryptic CBFB Deletion-Inversion Expands the Mutational Spectrum of Variants Associated With Cleidocranial Dysplasia."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      CBFB encodes the core-binding factor β subunit, a small protein which
      heterodimerises with RUNX1-3 and activates transcription of genes
      important in bone development.
    explanation: >-
      This supports CBFB as the obligate heterodimer partner whose disruption
      causes CCD2 through the same core-binding factor pathway.
