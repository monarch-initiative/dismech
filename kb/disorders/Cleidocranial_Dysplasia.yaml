name: Cleidocranial Dysplasia
creation_date: '2026-03-04T07:37:20Z'
updated_date: '2026-03-04T07:37:20Z'
category: Mendelian
description: >
  Cleidocranial Dysplasia is a skeletal dysplasia associated with pathogenic variation in
  RUNX2, causing abnormal cartilage and growth plate biology with disturbed
  endochondral ossification and disproportionate skeletal growth.
disease_term:
  preferred_term: cleidocranial dysplasia 1
  term:
    id: MONDO:0007340
    label: cleidocranial dysplasia 1
parents:
- Skeletal Dysplasia
inheritance:
- name: Autosomal Dominant
  description: >
    Cleidocranial Dysplasia is reported with a autosomal dominant inheritance pattern in
    association with pathogenic variation affecting RUNX2.
  evidence:
  - reference: PMID:25206109
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Cleidocranial dysplasia: case report of three siblings.
    explanation: >-
      This reference supports inheritance and core disease characterization for
      Cleidocranial Dysplasia.
pathophysiology:
- name: Cartilage Matrix and Growth Plate Dysfunction
  description: >
    Pathogenic variation in RUNX2 perturbs cartilage matrix homeostasis and
    growth plate organization, disrupting endochondral ossification.
