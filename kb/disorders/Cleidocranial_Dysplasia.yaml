name: Cleidocranial Dysplasia
creation_date: '2026-03-04T07:37:20Z'
updated_date: '2026-04-18T02:07:44Z'
category: Mendelian
description: >
  Cleidocranial dysplasia is a genetically heterogeneous skeletal dysplasia
  spectrum characterized by clavicular hypoplasia/aplasia, delayed closure of
  cranial sutures and fontanelles, and dental abnormalities including delayed
  tooth eruption and supernumerary teeth. Recognized monogenic forms include
  RUNX2-related cleidocranial dysplasia 1 and CBFB-related cleidocranial
  dysplasia 2. Across the spectrum, disease reflects dysfunction of the
  RUNX2-CBFB core-binding factor complex required for osteoblast maturation and
  normal intramembranous and endochondral ossification.
# As of 2026-04-17, the ontology snapshot used by this repo has live CCD1 and
# CCD2 subtype terms but no live umbrella cleidocranial dysplasia term, so the
# top-level mapping remains on MONDO:0007340 pending MONDO curation.
disease_term:
  preferred_term: cleidocranial dysplasia
  term:
    id: MONDO:0007340
    label: cleidocranial dysplasia 1
parents:
- Skeletal Dysplasia
has_subtypes:
- name: CCD1
  display_name: Cleidocranial Dysplasia 1 (RUNX2-related)
  description: >
    The classic and most common form of cleidocranial dysplasia is caused by
    heterozygous pathogenic variants in RUNX2 and typically features clavicular
    hypoplasia/aplasia, delayed cranial suture closure, dental anomalies, and
    variable short stature.
  subtype_term:
    preferred_term: cleidocranial dysplasia 1
    term:
      id: MONDO:0007340
      label: cleidocranial dysplasia 1
  genes:
  - preferred_term: RUNX2
    term:
      id: hgnc:10472
      label: RUNX2
  evidence:
  - reference: PMID:10204840
    reference_title: "Cleidocranial dysplasia: clinical and molecular genetics."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Mutations in the CBFA1 gene that presumably lead to synthesis of an
      inactive gene product were identified in patients with CCD.
    explanation: >-
      This directly identifies RUNX2/CBFA1 mutations in CCD patients,
      supporting CCD1 as the RUNX2-related subtype.
- name: CCD2
  display_name: Cleidocranial Dysplasia 2 (CBFB-related)
  description: >
    CBFB-related cleidocranial dysplasia is caused by heterozygous pathogenic
    variants affecting the beta subunit of the core-binding factor complex. It
    overlaps strongly with classic CCD but normal stature and mild
    neurodevelopmental findings have been reported in some affected
    individuals.
  subtype_term:
    preferred_term: cleidocranial dysplasia 2
    term:
      id: MONDO:0859307
      label: cleidocranial dysplasia 2
  genes:
  - preferred_term: CBFB
    term:
      id: hgnc:1539
      label: CBFB
  evidence:
  - reference: PMID:36241386
    reference_title: "Heterozygous pathogenic variants involving CBFB cause a new skeletal disorder resembling cleidocranial dysplasia."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      In each subject a heterozygous pathogenic variant in CBFB was detected,
      whereas no genomic alteration involving RUNX2 was found.
    explanation: >-
      This establishes CBFB as the disease gene for a distinct cleidocranial
      dysplasia subtype separate from RUNX2-related CCD1.
  - reference: PMID:39894570
    reference_title: "A Cryptic CBFB Deletion-Inversion Expands the Mutational Spectrum of Variants Associated With Cleidocranial Dysplasia."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      five families with cleidocranial dysplasia (CCD) were identified
      harbouring presumed loss of function variants in CBFB.
    explanation: >-
      This follow-up study expands the mutational spectrum of CBFB-related CCD
      and reinforces CBFB as the cause of CCD2.
prevalence:
- population: Global reported populations
  percentage: 1 in 1,000,000 births
  notes: >-
    Cleidocranial dysplasia is consistently described in the clinical literature
    as an ultra-rare skeletal dysplasia with incidence or prevalence around 1
    per 1,000,000 births.
  evidence:
  - reference: PMID:19063717
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Cleidocranial dysplasia is very rare in occurrence, incidence being 1: 1,000,000."
    explanation: This clinical case report explicitly states the accepted incidence estimate for cleidocranial dysplasia.
  - reference: PMID:34946295
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Cleidocranial dysplasia (CCD) is a rare, autosomal dominant skeletal dysplasia with a prevalence of one per million births."
    explanation: This recent review-oriented case report independently gives the same prevalence estimate.
inheritance:
- name: Autosomal Dominant
  inheritance_term:
    preferred_term: Autosomal dominant inheritance
    term:
      id: HP:0000006
      label: Autosomal dominant inheritance
  penetrance: COMPLETE
  description: >
    The recognized monogenic CCD subtypes are inherited in an autosomal
    dominant pattern and are associated with heterozygous pathogenic variants in
    either RUNX2 or CBFB.
  evidence:
  - reference: PMID:10204840
    reference_title: "Cleidocranial dysplasia: clinical and molecular genetics."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Cleidocranial dysplasia (CCD) (MIM 119600) is an autosomal dominant
      skeletal dysplasia characterised by abnormal clavicles, patent sutures and
      fontanelles, supernumerary teeth, short stature, and a variety of other
      skeletal changes.
    explanation: >-
      This sentence directly supports autosomal dominant inheritance for the
      classic RUNX2-related form of CCD.
  - reference: PMID:36241386
    reference_title: "Heterozygous pathogenic variants involving CBFB cause a new skeletal disorder resembling cleidocranial dysplasia."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      In each subject a heterozygous pathogenic variant in CBFB was detected,
      whereas no genomic alteration involving RUNX2 was found.
    explanation: >-
      The recurrent heterozygous CBFB variants in multiple affected families
      support autosomal dominant inheritance for CCD2.
pathophysiology:
- name: RUNX2-CBFB Heterodimer Dysfunction
  description: >
    Cleidocranial dysplasia spectrum begins with dysfunction of the RUNX2-CBFB
    core-binding factor heterodimer. RUNX2 provides the DNA-binding alpha
    subunit, and CBFB is its obligate beta-subunit partner that stabilizes the
    complex and supports transcription of genes required for bone development.
  genes:
  - preferred_term: RUNX2
    term:
      id: hgnc:10472
      label: RUNX2
  - preferred_term: CBFB
    term:
      id: hgnc:1539
      label: CBFB
  evidence:
  - reference: PMID:12434156
    reference_title: "Cbfbeta interacts with Runx2 and has a critical role in bone development."
    supports: SUPPORT
    evidence_source: MODEL_ORGANISM
    snippet: >-
      We demonstrate that Cbfbeta is expressed in developing bone and forms a
      functional interaction with Runx2
    explanation: >-
      This directly supports the mechanistic root of CCD as dysfunction of the
      RUNX2-CBFB heterodimer.
  - reference: PMID:39894570
    reference_title: "A Cryptic CBFB Deletion-Inversion Expands the Mutational Spectrum of Variants Associated With Cleidocranial Dysplasia."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      CBFB encodes the core-binding factor β subunit, a small protein which
      heterodimerises with RUNX1-3 and activates transcription of genes
      important in bone development.
    explanation: >-
      This clinical genetics study supports CBFB as the obligate heterodimer
      partner whose disruption contributes to the CCD mechanism.
  downstream:
  - target: Impaired Osteoblast Differentiation
    description: Core-binding factor dysfunction reduces osteoblast lineage maturation.
  - target: Impaired Chondrocyte Differentiation
    description: Core-binding factor dysfunction perturbs chondrocyte differentiation programs.
- name: Impaired Osteoblast Differentiation
  description: >
    Reduced RUNX2-CBFB activity impairs osteoblast differentiation, limiting the
    formation and maturation of bone-producing cells.
  cell_types:
  - preferred_term: Osteoblast
    term:
      id: CL:0000062
      label: osteoblast
  evidence:
  - reference: PMID:10204840
    reference_title: "Cleidocranial dysplasia: clinical and molecular genetics."
    supports: SUPPORT
    evidence_source: MODEL_ORGANISM
    snippet: >-
      Loss of both alleles (-/-) leads to a complete absence of bone owing to a
      lack of osteoblast differentiation.
    explanation: >-
      This model-organism evidence directly supports impaired osteoblast
      differentiation as an atomic disease mechanism in CCD.
  downstream:
  - target: Impaired Intramembranous Ossification
    description: Reduced osteoblast maturation compromises direct formation of membranous bone.
  - target: Impaired Endochondral Ossification
    description: Osteoblast maturation defects also limit ossification of cartilage templates.
- name: Impaired Intramembranous Ossification
  description: >
    Reduced osteoblast differentiation impairs intramembranous ossification,
    particularly affecting clavicles and calvarial bones.
  biological_processes:
  - preferred_term: Intramembranous Ossification
    modifier: DECREASED
    term:
      id: GO:0001957
      label: intramembranous ossification
  evidence:
  - reference: PMID:10204840
    reference_title: "Cleidocranial dysplasia: clinical and molecular genetics."
    supports: SUPPORT
    evidence_source: MODEL_ORGANISM
    snippet: >-
      CBFA1 controls differentiation of precursor cells into osteoblasts and is
      thus essential for membranous as well as endochondral bone formation.
    explanation: >-
      This directly supports impaired intramembranous ossification as a
      distinct downstream consequence of RUNX2 dysfunction.
  downstream:
  - target: Aplasia/Hypoplasia of the Clavicles
    description: Failed membranous bone formation produces clavicular hypoplasia or aplasia.
  - target: Large Fontanelles
    description: Delayed calvarial ossification contributes to persistent large fontanelles.
  - target: Wormian Bones
    description: Abnormal calvarial ossification and persistent sutures promote Wormian bone formation.
- name: Impaired Endochondral Ossification
  description: >
    Reduced core-binding factor activity delays endochondral ossification in
    cartilaginous skeletal elements and contributes to growth impairment.
  biological_processes:
  - preferred_term: Endochondral Ossification
    modifier: DECREASED
    term:
      id: GO:0001958
      label: endochondral ossification
  evidence:
  - reference: PMID:12434156
    reference_title: "Cbfbeta interacts with Runx2 and has a critical role in bone development."
    supports: SUPPORT
    evidence_source: MODEL_ORGANISM
    snippet: >-
      The Cbfb(GFP/GFP) mice exhibited a delay in endochondral and
      intramembranous ossification as well as in chondrocyte differentiation
    explanation: >-
      This directly supports impaired endochondral ossification as an atomic
      downstream mechanism in CCD.
  downstream:
  - target: Short Stature
    description: Delayed endochondral ossification contributes to reduced linear growth.
- name: Impaired Chondrocyte Differentiation
  description: >
    Reduced core-binding factor activity impairs chondrocyte differentiation,
    further limiting endochondral bone formation.
  cell_types:
  - preferred_term: Chondrocyte
    term:
      id: CL:0000138
      label: chondrocyte
  evidence:
  - reference: PMID:12434156
    reference_title: "Cbfbeta interacts with Runx2 and has a critical role in bone development."
    supports: SUPPORT
    evidence_source: MODEL_ORGANISM
    snippet: >-
      The Cbfb(GFP/GFP) mice exhibited a delay in endochondral and
      intramembranous ossification as well as in chondrocyte differentiation
    explanation: >-
      This directly supports impaired chondrocyte differentiation as a distinct
      disease mechanism in CCD.
  downstream:
  - target: Impaired Endochondral Ossification
    description: Defective chondrocyte maturation worsens endochondral bone formation.
