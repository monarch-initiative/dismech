progression:
- phase: Onset
  age_range: Childhood to adulthood
  notes: Epistaxis typically begins in childhood; visceral AVMs may be present
    from birth but complications often manifest in adulthood.
pathophysiology:
- name: Impaired BMP/TGF-beta Signaling in Vascular Endothelium
  description: >
    Loss-of-function mutations in ENG or ACVRL1 disrupt BMP/TGF-beta signaling
    in vascular endothelial cells. Endoglin and ALK1 are co-receptors essential
    for proper angiogenesis, vessel maturation, and stabilization. Their loss
    leads to dysregulated angiogenesis and formation of fragile, abnormal vascular
    structures including telangiectases and arteriovenous malformations.
  cell_types:
  - preferred_term: endothelial cell
    term:
      id: CL:0000115
      label: endothelial cell
  biological_processes:
  - preferred_term: BMP signaling pathway
    term:
      id: GO:0030509
      label: BMP signaling pathway
  - preferred_term: angiogenesis
    term:
      id: GO:0001525
      label: angiogenesis
  evidence:
  - reference: PMID:39788978
    reference_title: "Hereditary haemorrhagic telangiectasia."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Hereditary haemorrhagic telangiectasia (HHT) is a vascular dysplasia
      inherited as an autosomal dominant trait and caused by loss-of-function
      pathogenic variants in genes encoding proteins of the BMP signalling pathway."
    explanation: Confirms HHT as caused by loss-of-function in BMP pathway genes.
  - reference: PMID:33801690
    reference_title: "Pulmonary Vascular Complications in Hereditary Hemorrhagic Telangiectasia and the Underlying Pathophysiology."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "All three genes play a role in the TGF-β signaling pathway that is
      essential in angiogenesis where it plays a pivotal role in neoangiogenesis,
      vessel maturation and stabilization."
    explanation: Confirms the role of TGF-beta pathway in angiogenesis and vessel
      maturation relevant to HHT pathophysiology.
  - reference: PMID:28796572
    reference_title: "Endoglin and alk1 as therapeutic targets for hereditary hemorrhagic telangiectasia."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Because haploinsufficiency is the pathogenic mechanism in HHT, several
      therapeutic approaches able to enhance protein expression and/or function of
      endoglin and ALK1 are keys to find novel and efficient treatments for the
      disease."
    explanation: Confirms haploinsufficiency as the pathogenic mechanism in HHT.
- name: Somatic Second-Hit Mutation and AVM Formation
  description: >
    While germline haploinsufficiency underlies HHT, focal lesion formation
    follows a two-hit model analogous to tumor suppressor genes. Somatic
    second-hit loss-of-function mutations in ENG or ACVRL1 have been identified
    in telangiectasias and solid organ AVMs, leading to biallelic loss. This
    explains the focal nature of vascular lesions despite systemic
    haploinsufficiency and why only specific vascular beds develop AVMs.
  cell_types:
  - preferred_term: endothelial cell
    term:
      id: CL:0000115
      label: endothelial cell
  biological_processes:
  - preferred_term: somatic cell DNA recombination
    term:
      id: GO:0016444
      label: somatic cell DNA recombination
  - preferred_term: angiogenesis
    term:
      id: GO:0001525
      label: angiogenesis
  evidence:
  - reference: PMID:39062925
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Somatic second-hit loss-of-function variations in the HHT causative
      genes, ENG and ACVRL1, have been described in dermal telangiectasias."
    explanation: Confirms somatic second-hit mutations in HHT causative genes
      in telangiectasia lesions.
  - reference: PMID:39062925
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "This is the first report that nasal telangiectasias and solid organ
      AVMs in HHT are caused by very-low-level somatic biallelic second-hit
      mutations."
    explanation: Extends the two-hit model to nasal telangiectasias and solid
      organ AVMs including brain, lung, liver, and gallbladder.
  downstream:
  - target: Impaired BMP/TGF-beta Signaling in Vascular Endothelium
phenotypes:
- category: Hematologic
  name: Epistaxis
  frequency: VERY_FREQUENT
  diagnostic: true
  description: >
    Recurrent spontaneous nosebleeds are the most common manifestation, affecting
    over 90% of patients. Epistaxis typically begins in childhood and can range
    from mild to severe enough to cause iron deficiency anemia.
  phenotype_term:
    preferred_term: Epistaxis
    term:
      id: HP:0000421
      label: Epistaxis
  evidence:
  - reference: PMID:39788978
    reference_title: "Hereditary haemorrhagic telangiectasia."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "In adults, the most frequent HHT manifestations relate to iron
      deficiency and anaemia owing to recurrent epistaxis (nosebleeds) or bleeding
      from gastrointestinal telangiectases."
    explanation: Recurrent epistaxis is the most frequent HHT manifestation.
- category: Dermatologic
  name: Mucocutaneous Telangiectases
  frequency: VERY_FREQUENT
  diagnostic: true
  description: >
    Small dilated blood vessels on the skin and mucous membranes, particularly
    on the lips, tongue, fingertips, and nasal mucosa. They are a hallmark
    diagnostic feature of HHT.
  phenotype_term:
    preferred_term: Telangiectasia
    term:
      id: HP:0001009
      label: Telangiectasia
  evidence:
  - reference: PMID:20345718
    reference_title: "Hereditary hemorrhagic telangiectasia: from molecular biology to patient care."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Hereditary hemorrhagic telangiectasia (HHT) is an autosomal dominant
      vascular disorder characterized by severe and recurrent nosebleeds,
      mucocutaneous telangiectases, and, in some cases, life-threatening visceral
      arteriovenous malformations"
    explanation: Mucocutaneous telangiectases are a defining feature of HHT.
- category: Gastrointestinal
  name: Gastrointestinal Hemorrhage
  frequency: FREQUENT
  description: >
    Gastrointestinal telangiectases can cause chronic bleeding and iron deficiency
    anemia, particularly in older patients.
  phenotype_term:
    preferred_term: Gastrointestinal hemorrhage
    term:
      id: HP:0002239
      label: Gastrointestinal hemorrhage
  evidence:
  - reference: PMID:20345718
    reference_title: "Hereditary hemorrhagic telangiectasia: from molecular biology to patient care."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Gastrointestinal telangiectases are frequent and may cause severe
      bleeding."
    explanation: GI bleeding from telangiectases is a well-recognized HHT complication.
- category: Neurologic
  name: Ischemic Stroke
  frequency: OCCASIONAL
  description: >
    Pulmonary AVMs allow paradoxical embolization through right-to-left shunting,
    causing ischemic stroke.
  phenotype_term:
    preferred_term: Stroke
    term:
      id: HP:0001297
      label: Stroke
  evidence:
  - reference: PMID:39788978
    reference_title: "Hereditary haemorrhagic telangiectasia."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "right-to-left through pulmonary AVMs (causing ischaemic stroke or
      cerebral abscess)"
    explanation: Pulmonary AVMs cause paradoxical embolization leading to stroke
      or brain abscess.
- category: Respiratory
  name: Dyspnea
  frequency: OCCASIONAL
  description: >
    Pulmonary AVMs affect approximately 15-50% of HHT patients and can cause
    dyspnea, hypoxemia, and hemoptysis.
  phenotype_term:
    preferred_term: Dyspnea
    term:
      id: HP:0002094
      label: Dyspnea
- category: Respiratory
  name: Pulmonary Arteriovenous Malformation
  frequency: FREQUENT
  subtype: HHT1
  description: >
    Pulmonary AVMs are present in approximately 15-50% of HHT patients, with
    higher prevalence in HHT1 (ENG mutations). They create right-to-left shunts
    that bypass the pulmonary capillary bed, leading to hypoxemia and risk of
    paradoxical embolization.
  phenotype_term:
    preferred_term: Pulmonary arteriovenous malformation
    term:
      id: HP:0006548
      label: Pulmonary arteriovenous malformation
  evidence:
  - reference: PMID:39788978
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Arteriovenous malformations (AVMs) in the lungs, liver and the
      central nervous system cause additional major complications and often
      complex symptoms, primarily due to vascular shunting, which is
      right-to-left through pulmonary AVMs (causing ischaemic stroke or
      cerebral abscess)"
    explanation: Confirms pulmonary AVMs as a major HHT manifestation with
      right-to-left shunting complications.
  - reference: PMID:30251589
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "The prevalence of pulmonary arteriovenous malformations (AVM)
      is higher in HHT type 1, whereas hepatic AVMs are more common in HHT2."
    explanation: Confirms higher prevalence of pulmonary AVMs in HHT1.
- category: Respiratory
  name: Hemoptysis
  frequency: OCCASIONAL
  description: >
    Hemoptysis can occur from pulmonary AVMs or from bronchial telangiectases.
  phenotype_term:
    preferred_term: Hemoptysis
    term:
      id: HP:0002105
      label: Hemoptysis
  evidence:
  - reference: PMID:33801690
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "HHT is additionally frequently complicated by arteriovenous
      malformations (AVMs) in the lung, brain, liver and digestive system"
    explanation: Pulmonary AVMs are a recognized HHT complication; hemoptysis
      results from rupture or bleeding of pulmonary vascular lesions.
- category: Neurologic
  name: Cerebral Arteriovenous Malformation
  frequency: OCCASIONAL
  subtype: HHT1
  description: >
    Cerebral AVMs occur in approximately 10-23% of HHT patients, with higher
    prevalence in HHT1. They can cause hemorrhagic stroke, seizures, or
    headaches.
  phenotype_term:
    preferred_term: Cerebral arteriovenous malformation
    term:
      id: HP:0002408
      label: Cerebral arteriovenous malformation
  evidence:
  - reference: PMID:20345718
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "life-threatening visceral arteriovenous malformations of various
      types, including pulmonary, hepatic, cerebral, and spinal"
    explanation: Cerebral AVMs are a recognized visceral manifestation of HHT.
  - reference: PMID:20301525
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Large AVMs occur most often in the lungs, liver, or brain;
      complications from bleeding or shunting may be sudden and catastrophic."
    explanation: GeneReviews confirms brain AVMs as a major HHT complication.
- category: Neurologic
  name: Transient Ischemic Attack
  frequency: OCCASIONAL
  description: >
    TIAs occur due to paradoxical embolization through pulmonary AVMs, with
    right-to-left shunting allowing venous emboli to reach the cerebral
    circulation.
  phenotype_term:
    preferred_term: Transient ischemic attack
    term:
      id: HP:0002326
      label: Transient ischemic attack
  evidence:
  - reference: PMID:39788978
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "right-to-left through pulmonary AVMs (causing ischaemic stroke or
      cerebral abscess)"
    explanation: Ischemic cerebrovascular events including TIA result from
      paradoxical embolization through pulmonary AVMs.
- category: Neurologic
  name: Brain Abscess
  frequency: OCCASIONAL
  description: >
    Brain abscesses occur in HHT patients due to paradoxical septic
    embolization through pulmonary AVMs, bypassing the normal pulmonary
    capillary filtration.
  phenotype_term:
    preferred_term: Brain abscess
    term:
      id: HP:0030049
      label: Brain abscess
  evidence:
  - reference: PMID:39788978
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "right-to-left through pulmonary AVMs (causing ischaemic stroke or
      cerebral abscess)"
    explanation: Brain abscess results from paradoxical embolization through
      pulmonary AVMs.
  - reference: PMID:30251589
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Nearly one in five patients in our HHT population has been
      diagnosed with stroke or cerebral abscess, indicating a high prevalence
      of cerebral complications."
    explanation: Uppsala cohort shows high prevalence of cerebral complications
      including brain abscess.
- category: Hepatic
  name: Hepatic Arteriovenous Malformation
  frequency: FREQUENT
  subtype: HHT2
  description: >
    Hepatic AVMs are more common in HHT2 (ACVRL1 mutations) and can cause
    high-output cardiac failure, portal hypertension, or biliary ischemia.
  phenotype_term:
    preferred_term: Hepatic arteriovenous malformation
    term:
      id: HP:0006574
      label: Hepatic arteriovenous malformation
  evidence:
  - reference: PMID:30251589
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "The prevalence of pulmonary arteriovenous malformations (AVM)
      is higher in HHT type 1, whereas hepatic AVMs are more common in HHT2."
    explanation: Confirms hepatic AVMs are enriched in HHT2 patients.
  - reference: PMID:20301525
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Large AVMs occur most often in the lungs, liver, or brain;
      complications from bleeding or shunting may be sudden and catastrophic."
    explanation: Hepatic AVMs are a major visceral manifestation of HHT.
- category: Cardiovascular
  name: Pulmonary Arterial Hypertension
  frequency: OCCASIONAL
  subtype: HHT2
  description: >
    Pulmonary arterial hypertension is particularly associated with HHT2
    (ACVRL1 mutations) and can occur independently of hepatic or pulmonary
    AVMs.
  phenotype_term:
    preferred_term: Pulmonary arterial hypertension
    term:
      id: HP:0002092
      label: Pulmonary arterial hypertension
  evidence:
  - reference: PMID:33801690
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "HHT carries an additional increased risk of PH because of high
      cardiac output as a result of anemia and shunting through hepatic AVMs,
      or development of pulmonary arterial hypertension due to interference
      of the TGF-β pathway."
    explanation: Confirms pulmonary arterial hypertension as a recognized
      complication in HHT, driven by TGF-beta pathway disruption.
- category: Constitutional
  name: Fatigue
  frequency: FREQUENT
  description: >
    Fatigue is a common symptom in HHT, driven by chronic iron deficiency
    anemia from recurrent bleeding as well as by hypoxemia from pulmonary AVMs.
  phenotype_term:
    preferred_term: Fatigue
    term:
      id: HP:0012378
      label: Fatigue
  evidence:
  - reference: PMID:39788978
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "the most frequent HHT manifestations relate to iron deficiency
      and anaemia owing to recurrent epistaxis (nosebleeds) or bleeding from
      gastrointestinal telangiectases"
    explanation: Chronic iron deficiency anemia from recurrent bleeding is a
      major driver of fatigue in HHT patients.
genetic:
- name: ENG
  association: Pathogenic Mutations
  presence: Positive
  subtype: HHT1
  inheritance:
  - name: Autosomal dominant inheritance
    inheritance_term:
      preferred_term: Autosomal dominant inheritance
      term:
        id: HP:0000006
        label: Autosomal dominant inheritance
    penetrance: INCOMPLETE
    description: >
      Age-related penetrance; most individuals manifest by age 40. Considerable
      intrafamilial variability in severity and organ involvement.
  notes: >
    ENG on chromosome 9q34 encodes endoglin, a TGF-beta co-receptor on endothelial
    cells. Loss-of-function mutations cause HHT type 1, which is associated with
    higher frequency of pulmonary and cerebral AVMs. Pathogenic variants include
    missense, nonsense, splice-site, and copy number variants.
    Somatic second-hit mutations in ENG have been identified in telangiectasias
    and solid organ AVMs, supporting a two-hit model for focal lesion formation.
  evidence:
  - reference: PMID:20345718
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "HHT type 1 results from mutations in ENG on chromosome 9 (coding for
      endoglin), and HHT type 2 results from mutations in ACVRL1 on chromosome 12
      (coding for activin receptor-like kinase 1)."
    explanation: Confirms ENG mutations as the cause of HHT type 1.
  - reference: PMID:39062925
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Eight of nine (88.9%) patients in whom telangiectasia tissues were
      evaluated had a somatic mutation ranging from 0.68 to 1.96% in the same gene
      with the germline mutation."
    explanation: Somatic second-hit mutations in ENG identified in telangiectasia
      and AVM tissues, supporting biallelic loss as mechanism for focal lesion
      formation.
  - reference: PMID:20301525
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "HHT is inherited in an autosomal dominant manner with considerable
      intrafamilial variability and age-related penetrance of individual
      manifestations."
    explanation: Confirms autosomal dominant inheritance with age-related
      penetrance.
- name: ACVRL1
  association: Pathogenic Mutations
  presence: Positive
  subtype: HHT2
  inheritance:
  - name: Autosomal dominant inheritance
    inheritance_term:
      preferred_term: Autosomal dominant inheritance
      term:
        id: HP:0000006
        label: Autosomal dominant inheritance
  notes: >
    ACVRL1 on chromosome 12q13 encodes ALK1, a type I TGF-beta receptor.
    Loss-of-function mutations cause HHT type 2, which is associated with higher
    frequency of hepatic AVMs and pulmonary hypertension. Pathogenic variants
    include missense, nonsense, and splice-site mutations.
  evidence:
  - reference: PMID:20345718
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "HHT type 2 results from mutations in ACVRL1 on chromosome 12 (coding
      for activin receptor-like kinase 1)."
    explanation: Confirms ACVRL1 mutations as the cause of HHT type 2.
  - reference: PMID:30251589
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Epistaxis debuts earlier and may be more severe in HHT1 than in HHT2.
      The prevalence of pulmonary arteriovenous malformations (AVM) is higher in
      HHT type 1, whereas hepatic AVMs are more common in HHT2."
    explanation: Confirms genotype-phenotype correlations for ACVRL1 mutations
      including hepatic AVM enrichment.
- name: SMAD4
  association: Pathogenic Mutations
  presence: Positive
  subtype: JP-HHT
  inheritance:
  - name: Autosomal dominant inheritance
    inheritance_term:
      preferred_term: Autosomal dominant inheritance
      term:
        id: HP:0000006
        label: Autosomal dominant inheritance
  notes: >
    SMAD4 mutations cause a combined juvenile polyposis/HHT syndrome. Less common
    than ENG or ACVRL1 mutations. Patients require colonoscopic surveillance for
    gastrointestinal polyps in addition to standard HHT management.
  evidence:
  - reference: PMID:39788978
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Up to 90% of disease-causal variants are observed in ENG and ACVRL1,
      with SMAD4 and GDF2 less frequently responsible for HHT."
    explanation: Confirms SMAD4 as a less frequent HHT gene.
  - reference: PMID:20345718
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "mutations in MADH4 (encoding SMAD4), which cause a juvenile
      polyposis/HHT overlap syndrome, have been described"
    explanation: Confirms the JP-HHT overlap syndrome phenotype.
- name: GDF2
  association: Pathogenic Mutations
  presence: Positive
  subtype: HHT5
  inheritance:
  - name: Autosomal dominant inheritance
    inheritance_term:
      preferred_term: Autosomal dominant inheritance
      term:
        id: HP:0000006
        label: Autosomal dominant inheritance
  notes: >
    GDF2 (encoding BMP9) mutations are a rare cause of HHT (type 5), recently
    identified. BMP9 is a ligand for the ALK1 receptor.
  evidence:
  - reference: PMID:39788978
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Up to 90% of disease-causal variants are observed in ENG and ACVRL1,
      with SMAD4 and GDF2 less frequently responsible for HHT."
    explanation: Confirms GDF2 as a less frequent cause of HHT.
treatments:
- name: Epistaxis Management
  description: >
    Management of epistaxis includes topical therapies (humidification, saline
    sprays), cauterization, and in severe cases, surgical procedures such as
    septal dermoplasty or Young's procedure (nasal closure).
  treatment_term:
    preferred_term: supportive care
    term:
      id: MAXO:0000950
      label: supportive care
- name: Iron Replacement Therapy
  description: >
    Iron supplementation (oral or intravenous) is essential for managing iron
    deficiency anemia from chronic bleeding.
  treatment_term:
    preferred_term: pharmacotherapy
    term:
      id: MAXO:0000058
      label: pharmacotherapy
- name: Embolization of Pulmonary AVMs
  description: >
    Transcatheter embolization is the standard treatment for pulmonary AVMs to
    prevent paradoxical embolization and stroke.
  treatment_term:
    preferred_term: surgical procedure
    term:
      id: MAXO:0000004
      label: surgical procedure
- name: Antiangiogenic Therapy (Bevacizumab)
  description: >
    Systemic antiangiogenic therapy with bevacizumab is being investigated for
    severe HHT manifestations including refractory epistaxis, GI bleeding, and
    hepatic AVMs.
  treatment_term:
    preferred_term: pharmacotherapy
    term:
      id: MAXO:0000058
      label: pharmacotherapy
  evidence:
  - reference: PMID:39788978
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Novel therapeutics, such as systemic antiangiogenic therapies, are
      actively being investigated."
    explanation: Confirms antiangiogenic therapies including bevacizumab are
      under active investigation for HHT.
- name: Tacrolimus
  description: >
    Low-dose oral tacrolimus has shown promise in treating refractory epistaxis
    and gastrointestinal bleeding in HHT. The mechanistic rationale is that
    tacrolimus increases endoglin and ALK1 expression in endothelial cells,
    partially compensating for haploinsufficiency.
  treatment_term:
    preferred_term: pharmacotherapy
    term:
      id: MAXO:0000058
      label: pharmacotherapy
    therapeutic_agent:
    - preferred_term: tacrolimus
      term:
        id: CHEBI:61049
        label: tacrolimus (anhydrous)
  evidence:
  - reference: PMID:36142926
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Oral tacrolimus, thus, significantly increased hemoglobin levels
      and decreased blood transfusion needs, epistaxis and/or gastrointestinal
      bleeding in patients with HHT."
    explanation: Open-label pilot study in 25 HHT patients showing significant
      improvement in hemoglobin and reduction in transfusion needs with oral
      tacrolimus.
  - reference: PMID:38068462
    supports: SUPPORT
