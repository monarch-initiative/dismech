    explanation: >-
      Identifies the SCA31 repeat insertion in the BEAN1/TK2 region and links it
      to the brain-expressed BEAN transcript.
- name: MME (SCA43)
  subtype: SCA43
  gene_term:
    preferred_term: MME
    term:
      id: hgnc:7154
      label: MME
  association: heterozygous missense variant affecting neprilysin
  presence: Positive
  notes: >-
    Dominant MME-associated SCA43 combines cerebellar ataxia with axonal
