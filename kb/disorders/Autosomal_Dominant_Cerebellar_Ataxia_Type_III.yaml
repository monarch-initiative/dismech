  evidence:
  - reference: PMID:27583304
    reference_title: MME mutation in dominant spinocerebellar ataxia with
      neuropathy (SCA43).
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      We identified a variant in the MME gene, p.C143Y, that was absent from
      control databases, cosegregated with the phenotype
    explanation: >-
      Establishes the dominant MME p.C143Y variant as the causal candidate in
      an SCA43 family with cerebellar ataxia and polyneuropathy.
- name: PLD3 (SCA46)
  subtype: SCA46
  gene_term:
    preferred_term: PLD3
    term:
      id: hgnc:17158
      label: PLD3
  association: heterozygous missense variant; causality remains limited
  presence: Positive
  notes: >-
    PLD3 was reported among novel autosomal dominant SCA genes in exome and
    network analyses. Because subsequent work questioned whether PLD3 loss of
    function is sufficient to cause ataxia, this entry records PLD3 as the SCA46
