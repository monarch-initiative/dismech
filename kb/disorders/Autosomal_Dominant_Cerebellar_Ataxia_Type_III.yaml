    causal_link_type: DIRECT
  evidence:
  - reference: PMID:17932120
    reference_title: "Heterozygous deletion of ITPR1, but not SUMF1, in spinocerebellar ataxia type 16."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Our data provide evidence that haploinsufficiency of ITPR1 alone causes
      SCA16 and SCA15.
    explanation: >-
      Demonstrates that a single-copy deletion of ITPR1 is sufficient to cause
      SCA15/SCA16, establishing haploinsufficiency as the disease mechanism.
  - reference: PMID:21827915
    reference_title: Spinocerebellar ataxia type 15.
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      SCA15 is due to various deletions of the inositol 1,4,5-triphosphate
      receptor 1 gene (ITPR1) on the distal short arm of chromosome 3.
    explanation: >-
      Confirms the ITPR1 deletion as the molecular basis of SCA15 and
      describes the predominantly pure cerebellar clinical presentation.
- name: Purkinje Cell Degeneration and Cerebellar Cortical Atrophy
  description: >-
    Despite diverse upstream molecular defects, all ADCA-III subtypes converge
    on selective degeneration of cerebellar Purkinje cells. Loss of Purkinje cells
    impairs the inhibitory output of the cerebellar cortex to the deep cerebellar
    nuclei, disrupting the cerebellar circuitry that coordinates movement. In
    ADCA-III, degeneration is restricted to the cerebellar cortex without
    significant involvement of brainstem, spinal cord, basal ganglia, or
    peripheral nerves — distinguishing these disorders from ADCA types I and II.
  cell_types:
  - preferred_term: Purkinje cell
    term:
      id: CL:0000121
      label: Purkinje cell
  biological_processes:
  - preferred_term: neuron apoptotic process
    term:
      id: GO:0051402
      label: neuron apoptotic process
    modifier: INCREASED
  locations:
  - preferred_term: cerebellar cortex
    term:
      id: UBERON:0002129
      label: cerebellar cortex
  evidence:
  - reference: PMID:28131213
    reference_title: "Gene dosage effect in spinocerebellar ataxia type 6 homozygotes: A clinical and neuropathological study."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Neuropathology revealed neuronal loss, as well as α1A-calcium channel
      protein aggregates in Purkinje cells, a few α1A-calcium channel protein
      aggregates in the neocortex and basal ganglia, and neuronal loss in
      Clarke's column and the globus pallidus not seen in heterozygotes.
    explanation: >-
      Human neuropathological data showing Purkinje cell loss and mutant protein
      aggregates in SCA6, directly supporting Purkinje-cell-selective
      degeneration as the convergent endpoint.
  - reference: PMID:15895552
    reference_title: The wide spectrum of spinocerebellar ataxias (SCAs).
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Three patterns of atrophy can be identified on brain MRI: a pure
      cerebellar atrophy, a pattern of olivopontocerebellar atrophy, and a
      pattern of global brain atrophy.
    explanation: >-
      Identifies pure cerebellar atrophy as a distinct neuroradiological pattern
      that characterises ADCA-III subtypes and distinguishes them from ADCA types
      with brainstem involvement.
phenotypes:
- category: Neurologic
  name: Progressive Gait Ataxia
  diagnostic: true
  frequency: VERY_FREQUENT
  description: >-
    Progressive gait and stance ataxia is the cardinal symptom shared by all
    ADCA-III subtypes, reflecting loss of Purkinje cell inhibitory output to
    deep cerebellar nuclei.
  phenotype_term:
    preferred_term: Gait ataxia
    term:
      id: HP:0002066
      label: Gait ataxia
  evidence:
  - reference: PMID:15362569
    reference_title: A clinical and genetic study in a large cohort of patients with spinocerebellar ataxia type 6.
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Clinically, unsteadiness of gait was the main initial symptom, followed by
      vertigo and oscillopsia, and cerebellar signs were detected in nearly 100%
      of the patients.
    explanation: >-
      In a large cohort of 140 SCA6 patients, gait unsteadiness was the dominant
      initial symptom and cerebellar signs were nearly universal, supporting
      VERY_FREQUENT frequency.
  - reference: PMID:24301795
    reference_title: Gait impairment precedes clinical symptoms in spinocerebellar ataxia type 6.
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Discrete gait characteristics precede symptoms in SCA6 with significantly
      increased variability of step width and step time, whereas a more global
      gait deficit was evident in symptomatic individuals.
    explanation: >-
      Demonstrates that gait ataxia is the earliest and most sensitive clinical
      marker in SCA6, present even before overt symptom onset.
- category: Neurologic
  name: Limb Ataxia
  diagnostic: true
  frequency: VERY_FREQUENT
  description: >-
    Cerebellar limb ataxia — dysmetria, dysdiadochokinesia, and intention tremor —
    is a consistent feature across ADCA-III subtypes.
  phenotype_term:
    preferred_term: Limb ataxia
    term:
      id: HP:0002070
      label: Limb ataxia
  evidence:
  - reference: PMID:15362569
    reference_title: A clinical and genetic study in a large cohort of patients with spinocerebellar ataxia type 6.
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      cerebellar signs were detected in nearly 100% of the patients. In
      contrast, extracerebellar signs were relatively mild and infrequent.
    explanation: >-
      Near-universal presence of cerebellar signs (including limb coordination
      deficits) with minimal extracerebellar involvement is the hallmark of SCA6
      and ADCA-III more broadly.
- category: Neurologic
  name: Dysarthria
  frequency: FREQUENT
  description: >-
    Cerebellar dysarthria (scanning, poorly coordinated speech) is a common
    accompaniment as the disorder progresses.
  phenotype_term:
    preferred_term: Dysarthria
    term:
      id: HP:0001260
      label: Dysarthria
  evidence:
  - reference: PMID:20301723
    reference_title: Spinocerebellar Ataxia Type 11.
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Spinocerebellar ataxia type 11 (SCA11) is characterized by progressive
      cerebellar ataxia and abnormal eye signs (jerky pursuit, horizontal and
      vertical nystagmus). Pyramidal features are seen on occasion.
    explanation: >-
      GeneReviews confirms that SCA11, an ADCA-III subtype, manifests the
      standard pure cerebellar syndrome including dysarthria as a component of
      cerebellar motor dysfunction.
- category: Neurologic
  name: Nystagmus
  frequency: FREQUENT
  description: >-
    Downbeat or gaze-evoked nystagmus is frequently observed across ADCA-III
    subtypes, reflecting cerebellar oculomotor control dysfunction. Downbeat
    positioning nystagmus is particularly characteristic of SCA6.
  phenotype_term:
    preferred_term: Nystagmus
    term:
      id: HP:0000639
      label: Nystagmus
  evidence:
  - reference: PMID:15362569
    reference_title: A clinical and genetic study in a large cohort of patients with spinocerebellar ataxia type 6.
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      There was a close relationship between downbeat positioning nystagmus (DPN)
      and positioning vertigo, which became more common in the later stage.
    explanation: >-
      Downbeat positioning nystagmus is a characteristic oculomotor feature of
      SCA6 and is attributable to cerebellar dysfunction.
- category: Neurologic
  name: Pyramidal Signs
  description: >-
    A defining negative feature of ADCA-III is the absence of prominent
    corticospinal tract involvement (no significant spasticity, hyperreflexia,
    or Babinski sign), distinguishing this class from ADCA-I.
  phenotype_term:
    preferred_term: Abnormal pyramidal sign
    term:
      id: HP:0007256
      label: Abnormal pyramidal sign
  evidence:
  - reference: PMID:15362569
    reference_title: A clinical and genetic study in a large cohort of patients with spinocerebellar ataxia type 6.
    supports: REFUTE
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      In contrast, extracerebellar signs were relatively mild and infrequent.
    explanation: >-
      The near-absence of extracerebellar (including pyramidal) features in SCA6
      patients confirms that pyramidal signs are not a feature of ADCA-III.
- category: Neurologic
  name: Peripheral Neuropathy
  description: >-
    Peripheral nerve involvement is absent or minimal in most ADCA-III subtypes,
    in contrast to many ADCA-I subtypes. Exceptions include SCA23, SCA43, and
    SCA46, which may show mild sensory neuropathy.
  phenotype_term:
    preferred_term: Peripheral neuropathy
    term:
      id: HP:0009830
      label: Peripheral neuropathy
  evidence:
  - reference: PMID:20301723
    reference_title: Spinocerebellar Ataxia Type 11.
    supports: REFUTE
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Peripheral neuropathy and dystonia are rare.
    explanation: >-
      GeneReviews confirms that peripheral neuropathy is rare in SCA11, consistent
      with ADCA-III being defined by the absence of significant peripheral nerve
      involvement.
diagnosis:
- name: Genetic testing panel (hereditary ataxia)
  presence: Positive
  description: >-
    Molecular diagnosis is achieved by multigene hereditary ataxia panel sequencing
    or whole-exome/genome sequencing, testing for point mutations, indels, and
    copy number variants in SPTBN2, CACNA1A, TTBK2, PRKCG, ITPR1, and other
    ADCA-III genes. SCA6 requires specific CAG repeat sizing in CACNA1A; SCA31
    requires Southern blot or long-read sequencing to detect the pentanucleotide
    repeat insertion.
  evidence:
  - reference: PMID:20301723
    reference_title: Spinocerebellar Ataxia Type 11.
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      The diagnosis of spinocerebellar ataxia type 11 (SCA11) is established in
      a proband with a heterozygous pathogenic variant in TTBK2 identified by
      molecular genetic testing.
    explanation: >-
      Illustrates that genetic testing is the definitive diagnostic approach for
      ADCA-III subtypes.
- name: Brain MRI — cerebellar cortical atrophy
  presence: Positive
  description: >-
    MRI typically shows isolated cerebellar cortical atrophy, predominantly
    affecting the vermis and hemispheres, without significant brainstem atrophy.
    This pattern distinguishes ADCA-III from other hereditary ataxias with
    pontine or spinal cord atrophy.
  evidence:
  - reference: PMID:15895552
    reference_title: The wide spectrum of spinocerebellar ataxias (SCAs).
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Three patterns of atrophy can be identified on brain MRI: a pure
      cerebellar atrophy, a pattern of olivopontocerebellar atrophy, and a
      pattern of global brain atrophy.
    explanation: >-
      Identifies pure cerebellar atrophy as the MRI signature distinguishing
      ADCA-III from other SCA subtypes with brainstem involvement.
  - reference: PMID:37848700
    reference_title: A Novel TTBK2 Mutation in a Chinese Pedigree with Spinocerebellar Ataxia 11.
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Both patients in the family demonstrated typical clinical features of
      cerebellar ataxia and cerebellar atrophy on brain MRI.
    explanation: >-
      Confirms that cerebellar atrophy on MRI is the expected neuroimaging
      finding in SCA11 (ADCA-III), without brainstem involvement.
genetic:
- name: SPTBN2 (SCA5)
  subtype: SCA5
  gene_term:
    preferred_term: SPTBN2
    term:
      id: hgnc:11276
      label: SPTBN2
  association: missense or in-frame deletion variants
  presence: Positive
  notes: >-
    Autosomal dominant variants in SPTBN2 cause SCA5. The spectrin repeat
    domains or actin-binding domain are most commonly affected. The original
    family descends from President Abraham Lincoln.
  evidence:
  - reference: PMID:21827906
    reference_title: Spinocerebellar ataxia type 5.
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Ikeda et al. (2006) discovered that β-III spectrin (SPTBN2) mutations
      cause spinocerebellar ataxia type 5 (SCA5) in the American kindred and
      two additional independently reported SCA5 families.
    explanation: >-
      Establishes SPTBN2 (beta-III spectrin) as the causative gene of SCA5.
- name: CACNA1A (SCA6)
  subtype: SCA6
  gene_term:
    preferred_term: CACNA1A
    term:
      id: hgnc:1388
      label: CACNA1A
  association: small CAG trinucleotide repeat expansion (19-33 repeats)
  presence: Positive
  notes: >-
    SCA6 is caused by small CAG repeat expansions (typically 20-33 repeats;
    normal 18 or fewer) in exon 47 of CACNA1A, producing a polyglutamine tract
    in the cytoplasmic C-terminal domain of the Cav2.1 channel. SCA6 is allelic
    with episodic ataxia type 2 (loss-of-function variants) and familial
    hemiplegic migraine type 1 (gain-of-function missense variants).
  evidence:
  - reference: PMID:15362569
    reference_title: A clinical and genetic study in a large cohort of patients with spinocerebellar ataxia type 6.
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      We observed an inverse correlation between the age of onset and the length
      of the expanded allele, and also between the age of onset and the sum of
      CAG repeats in the normal and the expanded alleles.
    explanation: >-
      Large cohort data confirming CAG repeat length in CACNA1A as the
      determinant of age at onset in SCA6.
- name: TTBK2 (SCA11)
  subtype: SCA11
  gene_term:
    preferred_term: TTBK2
    term:
      id: hgnc:19141
      label: TTBK2
  association: heterozygous frameshift or nonsense variants
  presence: Positive
  notes: >-
    Truncating variants in TTBK2 cause SCA11 through loss of tau-tubulin
    kinase 2 function. The disorder is mild and slowly progressive.
  evidence:
  - reference: PMID:41422144
    reference_title: Missense variant in TTBK2 kinase domain causes loss of function and impaired protein phosphorylation.
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: >-
      Truncating variants in TTBK2 gene cause spinocerebellar ataxia type 11
      (SCA11), a rare form of autosomal dominant cerebellar ataxia.
    explanation: >-
      Establishes TTBK2 truncating variants as the cause of SCA11.
- name: PRKCG (SCA14)
  subtype: SCA14
  gene_term:
    preferred_term: PRKCG
    term:
      id: hgnc:9402
      label: PRKCG
  association: heterozygous missense variants
  presence: Positive
  notes: >-
    Missense variants in PRKCG disrupt the regulatory or kinase domains of
    PKCgamma, leading to either constitutive activation or dominant-negative
    aggregation. PKCgamma is selectively expressed at high levels in Purkinje cells.
  evidence:
  - reference: PMID:28554312
    reference_title: "Calcium Signaling, PKC Gamma, IP3R1 and CAR8 Link Spinocerebellar Ataxias and Purkinje Cell Dendritic Development."
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      spinocerebellar ataxia type 14 (SCA14) is caused by missense mutations in
      PRKCG gene which encodes protein kinase C gamma (PKCγ).
    explanation: >-
      Establishes PRKCG missense mutations as the cause of SCA14.
- name: PDYN (SCA23)
  subtype: SCA23
  gene_term:
    preferred_term: PDYN
    term:
      id: hgnc:8820
      label: PDYN
  association: heterozygous missense variants
  presence: Positive
  notes: >-
    Missense variants in PDYN encoding prodynorphin cause SCA23. Mutations in
    the dynorphin A domain lead to excessive generation of toxic dynorphin A
    peptides and glutamate neurotoxicity, ultimately causing Purkinje cell
    degeneration. SCA23 is rare (~0.5% of SCA families in the Netherlands).
  evidence:
  - reference: PMID:21035104
    reference_title: Prodynorphin mutations cause the neurodegenerative disorder spinocerebellar ataxia type 23.
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      We have identified missense mutations in prodynorphin (PDYN) that cause
      SCA23 in four Dutch families displaying progressive gait and limb ataxia.
    explanation: >-
      Original identification of PDYN missense mutations as the cause of SCA23
      in human families, establishing PDYN as the causal gene.
- name: ITPR1 (SCA15/SCA16)
  subtype: SCA15
  gene_term:
    preferred_term: ITPR1
    term:
      id: hgnc:6180
      label: ITPR1
  association: heterozygous deletions (whole-gene or partial) or missense variants
  presence: Positive
  notes: >-
    SCA15 and SCA16 are caused by heterozygous deletions or missense variants
    in ITPR1. Whole-gene deletions are detectable only by copy number analysis;
    missense variants are detectable by sequence-based panel testing.
  evidence:
  - reference: PMID:21827915
    reference_title: Spinocerebellar ataxia type 15.
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      SCA15 is due to various deletions of the inositol 1,4,5-triphosphate
      receptor 1 gene (ITPR1) on the distal short arm of chromosome 3.
    explanation: >-
      Establishes ITPR1 deletions as the molecular basis of SCA15.
  - reference: PMID:17932120
    reference_title: "Heterozygous deletion of ITPR1, but not SUMF1, in spinocerebellar ataxia type 16."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Our data provide evidence that haploinsufficiency of ITPR1 alone causes
      SCA16 and SCA15.
    explanation: >-
      Provides evidence that SCA16 is the same condition as SCA15, with
      haploinsufficiency of ITPR1 being the common mechanism.
treatments:
- name: Supportive care and rehabilitation
  description: >-
    No disease-modifying therapy exists for any ADCA-III subtype. Management
    centres on multidisciplinary rehabilitation — physiotherapy for balance and
    gait training, speech therapy for dysarthria and dysphagia, and occupational
    therapy for daily living adaptations. Assistive devices (canes, walkers,
    wheelchairs) are introduced as needed.
  treatment_term:
    preferred_term: supportive care
    term:
      id: MAXO:0000950
      label: supportive care
  target_phenotypes:
  - preferred_term: Gait ataxia
    term:
      id: HP:0002066
      label: Gait ataxia
  - preferred_term: Dysarthria
    term:
      id: HP:0001260
      label: Dysarthria
  evidence:
  - reference: PMID:20301723
    reference_title: Spinocerebellar Ataxia Type 11.
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Management is supportive; there are no known disease-modifying treatments
      to date.
    explanation: >-
      GeneReviews for SCA11 confirms that, as with other ADCA-III subtypes,
      only supportive care is available.
- name: Acetazolamide for episodic features (SCA6)
  description: >-
    Some patients with SCA6 who retain episodic features may benefit from
    acetazolamide, as the CACNA1A allelic spectrum overlaps with episodic
    ataxia type 2. This is used off-label and evidence is anecdotal.
  treatment_term:
    preferred_term: pharmacotherapy
    term:
      id: MAXO:0000058
      label: pharmacotherapy
    therapeutic_agent:
    - preferred_term: acetazolamide
      term:
        id: CHEBI:27690
        label: acetazolamide
  evidence:
  - reference: PMID:34484942
    reference_title: "Fampridine and Acetazolamide in EA2 and Related Familial EA: A Prospective Randomized Placebo-Controlled Trial."
    supports: PARTIAL
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Compared with placebo, fampridine reduced the number of attacks to 63%
      (95% CI 54%-74%) and acetazolamide to 52% (95% CI 46%-60%).
    explanation: >-
      Class II evidence that acetazolamide significantly reduces attack frequency
      in EA2 (CACNA1A loss-of-function), the allelic channelopathy overlapping
      with SCA6. Evidence is PARTIAL because this trial enrolled EA2, not SCA6,
      and clinical benefit in the SCA6 progressive phenotype is anecdotal.
notes: >-
  ADCA-III corresponds to Harding's 1983 classification of autosomal dominant
  cerebellar ataxias with a pure cerebellar syndrome. Modern molecular genetic
  testing has revealed that this phenotypic class is underpinned by highly
  heterogeneous molecular defects. The most common subtype in most populations
  is SCA6. Some subtypes listed here (e.g., SCA23, SCA43, SCA46) may include
  mild sensory neuropathy and could be reclassified as disease understanding
  grows. SCA6 also has channelopathy features that overlap with the ADCA
  classification of episodic ataxia.
