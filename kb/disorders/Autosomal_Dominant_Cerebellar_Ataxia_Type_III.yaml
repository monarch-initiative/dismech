- name: Neprilysin-Dependent Neuropeptide Catabolism Defect in SCA43
  description: >-
    Dominant MME variants such as p.C143Y implicate neprilysin, a membrane
    metalloprotease expressed in the central and peripheral nervous systems.
    Impaired neprilysin-dependent peptide handling may alter dynorphin or other
    neuropeptide catabolism, contributing to cerebellar dysfunction with
    peripheral neuropathy in SCA43.
