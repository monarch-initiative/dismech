      and SCA14.
    explanation: >-
      Directly establishes PKCgamma dysregulation as the mechanism linking
      PRKCG mutations to Purkinje cell pathology and cerebellar ataxia.
- name: IP3R1 Haploinsufficiency and Calcium Release Defects
  description: >-
    SCA15/SCA16 is caused by heterozygous deletions or missense variants in ITPR1,
    encoding the inositol 1,4,5-trisphosphate receptor type 1 (IP3R1), the dominant
    calcium-release channel on the endoplasmic reticulum of cerebellar Purkinje
    cells. Haploinsufficiency of ITPR1 impairs IP3-mediated calcium release,
    disrupting the calcium signals that regulate Purkinje cell excitability, LTD
    at parallel fibre synapses, and climbing fibre synapse elimination during
    development.
