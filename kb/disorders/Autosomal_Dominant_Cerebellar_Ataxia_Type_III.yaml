    reference_title: Missense variant in TTBK2 kinase domain causes loss of
      function and impaired protein phosphorylation.
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: >-
      Tau tubulin kinase 2 (TTBK2) is a ubiquitous serine-threonine protein
      kinase implicated in diverse cellular processes, including microtubule
      regulation, ciliogenesis, synaptic signaling, and the phosphorylation of
      key proteins like TDP-43.
    explanation: >-
      Establishes TTBK2's multifunctional role in microtubule regulation and
      ciliogenesis, processes disrupted in SCA11 when truncating variants cause
      loss of function.
  - reference: PMID:20301723
    reference_title: Spinocerebellar Ataxia Type 11.
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Spinocerebellar ataxia type 11 (SCA11) is characterized by progressive
      cerebellar ataxia and abnormal eye signs (jerky pursuit, horizontal and
      vertical nystagmus). Pyramidal features are seen on occasion.
    explanation: >-
      Confirms SCA11 as a predominantly pure cerebellar ataxia with minimal
      extracerebellar features, consistent with ADCA-III classification.
- name: PKC Gamma Signaling Dysregulation
  description: >-
    SCA14 is caused by missense variants in PRKCG encoding protein kinase C gamma
    (PKCgamma), which is highly and selectively expressed in Purkinje cells and plays
    critical roles in long-term depression (LTD) at parallel fibre-Purkinje cell
    synapses. Pathogenic PRKCG missense variants lead to constitutive activation
    or aggregation of PKCgamma, disrupting synaptic plasticity. Misfolded mutant
    PKCgamma can aggregate and trigger Purkinje cell apoptosis.
