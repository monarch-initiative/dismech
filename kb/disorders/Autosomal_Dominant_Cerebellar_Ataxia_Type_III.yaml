    causal_link_type: DIRECT
    description: >-
      Dysregulated calcium leads to impaired Purkinje cell pacemaking and
      downstream excitotoxic stress, ultimately causing cell death.
  evidence:
  - reference: PMID:18687887
    reference_title: Spinocerebellar ataxia type 6 knockin mice develop a progressive neuronal dysfunction with age-dependent accumulation of mutant CaV2.1 channels.
    supports: SUPPORT
    evidence_source: MODEL_ORGANISM
    snippet: >-
      The mice expressing hyperexpanded polyglutamine (Sca6(84Q)) developed
      progressive motor impairment and aggregation of mutant Ca(V)2.1 channels.
    explanation: >-
      Demonstrates that SCA6 CAG expansion causes age-dependent accumulation of
      mutant Cav2.1 channels and progressive neurological dysfunction in knockin
      mice, supporting the calcium dysregulation mechanism.
  - reference: PMID:28554312
    reference_title: "Calcium Signaling, PKC Gamma, IP3R1 and CAR8 Link Spinocerebellar Ataxias and Purkinje Cell Dendritic Development."
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      IP3R1, CAR8 and PKCγ proteins are strongly and specifically expressed in
      Purkinje cells. The common function among them is that they are involved
      in the regulation of calcium homeostasis in Purkinje cells and their
      dysfunction causes ataxia in mouse and human.
    explanation: >-
      Directly links Purkinje-cell-selective calcium homeostasis to the
      pathogenesis of multiple ADCA-III subtypes, including SCA6 and SCA15.
- name: Cytoskeletal and Scaffold Protein Defects in Purkinje Cells
  description: >-
    SCA5 is caused by variants in SPTBN2 encoding beta-III spectrin, a major
    cytoskeletal scaffold protein in Purkinje cells. Beta-III spectrin stabilises
    the dendritic membrane, anchors the glutamate transporter EAAT4 and other
    postsynaptic proteins, and supports dendritic arborisation. Loss-of-function
    or dominant-negative variants reduce EAAT4 surface expression, impairing
    glutamate clearance at Purkinje cell dendrites and increasing excitotoxic
    stress.
  cell_types:
  - preferred_term: Purkinje cell
    term:
      id: CL:0000121
      label: Purkinje cell
  biological_processes:
  - preferred_term: cytoskeleton organization
    term:
      id: GO:0007010
      label: cytoskeleton organization
  - preferred_term: L-glutamate import across plasma membrane
    term:
      id: GO:0098712
      label: L-glutamate import across plasma membrane
    modifier: DECREASED
  locations:
  - preferred_term: cerebellar cortex
    term:
      id: UBERON:0002129
      label: cerebellar cortex
  downstream:
  - target: Purkinje Cell Degeneration and Cerebellar Cortical Atrophy
    causal_link_type: DIRECT
    description: >-
      Reduced EAAT4 surface expression causes glutamate accumulation and
      excitotoxic stress in Purkinje cells.
  evidence:
  - reference: PMID:21827906
    reference_title: Spinocerebellar ataxia type 5.
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      mutant β-III spectrin fails to stabilize the glutamate transporter EAAT4
      at the plasma membrane. Additionally, marked differences in EAAT4 and
      GluRδ2 were found by protein blot and cell fractionation in SCA5 autopsy
      tissue.
    explanation: >-
      Directly supports the EAAT4 mislocalization mechanism by showing loss of
      EAAT4 stabilisation and altered EAAT4/GluRδ2 in human SCA5 autopsy tissue.
  - reference: PMID:25057192
    reference_title: Mutant β-III spectrin causes mGluR1α mislocalization and functional deficits in a mouse model of spinocerebellar ataxia type 5.
    supports: SUPPORT
    evidence_source: MODEL_ORGANISM
    snippet: >-
      SCA5, a dominant neurodegenerative disease characterized by profound
      Purkinje cell loss, is caused by mutations in SPTBN2, a gene that encodes
      β-III spectrin.
    explanation: >-
      Confirms SPTBN2 as the causal gene of SCA5 and characterises Purkinje cell
      loss as the pathological hallmark in a validated mouse model.
- name: Tau-Tubulin Kinase 2 Loss and Purkinje Cell Dysfunction
  description: >-
    SCA11 is caused by truncating variants in TTBK2, encoding tau-tubulin kinase 2.
    TTBK2 is required for ciliogenesis — it phosphorylates cilia-associated proteins
    to remove the capping complex CP110 from the mother centriole — and it also
    phosphorylates tau and MARK proteins involved in microtubule stability. Loss of
    TTBK2 impairs cilia formation and microtubule dynamics, with particular
    vulnerability in Purkinje cells.
  cell_types:
  - preferred_term: Purkinje cell
    term:
      id: CL:0000121
      label: Purkinje cell
  biological_processes:
  - preferred_term: cilium assembly
    term:
      id: GO:0060271
      label: cilium assembly
    modifier: DECREASED
  - preferred_term: microtubule cytoskeleton organization
    term:
      id: GO:0000226
