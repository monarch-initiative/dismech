  - reference: PMID:21035104
    reference_title: Prodynorphin mutations cause the neurodegenerative disorder
      spinocerebellar ataxia type 23.
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      We have identified missense mutations in prodynorphin (PDYN) that cause
      SCA23 in four Dutch families displaying progressive gait and limb ataxia.
    explanation: >-
      Identifies SCA23 as a PDYN neuropeptide-processing subtype within the
      ADCA-III spectrum.
  - reference: PMID:19878914
    reference_title: Spinocerebellar ataxia type 31 is associated with
      "inserted" penta-nucleotide repeats containing (TGGAA)n.
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      The repeat insertion was located in introns of TK2 and BEAN (brain
      expressed, associated with Nedd4) expressed in the brain and formed RNA
      foci in the nuclei of patients' Purkinje cells.
    explanation: >-
      Establishes the SCA31 BEAN1/TK2-region repeat and supports an RNA-foci
      mechanism directly involving Purkinje cells.
  - reference: PMID:29053796
    reference_title: Exome sequencing and network analysis identifies shared
      mechanisms underlying spinocerebellar ataxia.
    supports: PARTIAL
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Here, we report five novel spinocerebellar ataxia genes, FAT2, PLD3,
      KIF26B, EP300, and FAT1
    explanation: >-
      Provides genetic support for PLD3 as an SCA46-associated gene, but this
      is marked PARTIAL because later correspondence challenged the strength and
      mechanism of PLD3 causality.
phenotypes:
- category: Neurologic
  name: Progressive Gait Ataxia
  diagnostic: true
  frequency: VERY_FREQUENT
  description: >-
    Progressive gait and stance ataxia is the cardinal symptom shared by all
    ADCA-III subtypes, reflecting loss of Purkinje cell inhibitory output to
    deep cerebellar nuclei.
  phenotype_term:
    preferred_term: Gait ataxia
    term:
      id: HP:0002066
      label: Gait ataxia
  evidence:
  - reference: PMID:15362569
    reference_title: A clinical and genetic study in a large cohort of patients
      with spinocerebellar ataxia type 6.
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Clinically, unsteadiness of gait was the main initial symptom, followed by
      vertigo and oscillopsia, and cerebellar signs were detected in nearly 100%
      of the patients.
    explanation: >-
      In a large cohort of 140 SCA6 patients, gait unsteadiness was the dominant
      initial symptom and cerebellar signs were nearly universal, supporting
      VERY_FREQUENT frequency.
  - reference: PMID:24301795
    reference_title: Gait impairment precedes clinical symptoms in
      spinocerebellar ataxia type 6.
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Discrete gait characteristics precede symptoms in SCA6 with significantly
      increased variability of step width and step time, whereas a more global
      gait deficit was evident in symptomatic individuals.
    explanation: >-
      Demonstrates that gait ataxia is the earliest and most sensitive clinical
      marker in SCA6, present even before overt symptom onset.
- category: Neurologic
  name: Limb Ataxia
  diagnostic: true
  frequency: VERY_FREQUENT
  description: >-
    Cerebellar limb ataxia — dysmetria, dysdiadochokinesia, and intention tremor —
    is a consistent feature across ADCA-III subtypes.
  phenotype_term:
    preferred_term: Limb ataxia
    term:
      id: HP:0002070
      label: Limb ataxia
  evidence:
  - reference: PMID:15362569
    reference_title: A clinical and genetic study in a large cohort of patients
      with spinocerebellar ataxia type 6.
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      cerebellar signs were detected in nearly 100% of the patients. In
      contrast, extracerebellar signs were relatively mild and infrequent.
    explanation: >-
      Near-universal presence of cerebellar signs (including limb coordination
