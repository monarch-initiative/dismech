    causal_link_type: DIRECT
  evidence:
  - reference: PMID:20938103
    reference_title: "Congo red, an amyloid-inhibiting compound, alleviates various types of cellular dysfunction triggered by mutant protein kinase cγ that causes spinocerebellar ataxia type 14 (SCA14) by inhibiting oligomerization and aggregation."
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: >-
      We previously demonstrated that the mutant γPKC found in SCA14 is
      susceptible to aggregation that induces apoptotic cell death.
    explanation: >-
      Shows that SCA14 pathogenic PKCgamma variants cause protein aggregation
      leading to apoptotic Purkinje cell death, the key downstream event.
  - reference: PMID:28554312
    reference_title: "Calcium Signaling, PKC Gamma, IP3R1 and CAR8 Link Spinocerebellar Ataxias and Purkinje Cell Dendritic Development."
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      PKCγ dysregulation causes abnormal Purkinje cell dendritic development
      and SCA14.
    explanation: >-
      Directly establishes PKCgamma dysregulation as the mechanism linking
      PRKCG mutations to Purkinje cell pathology and cerebellar ataxia.
- name: IP3R1 Haploinsufficiency and Calcium Release Defects
  description: >-
    SCA15/SCA16 is caused by heterozygous deletions or missense variants in ITPR1,
    encoding the inositol 1,4,5-trisphosphate receptor type 1 (IP3R1), the dominant
    calcium-release channel on the endoplasmic reticulum of cerebellar Purkinje
    cells. Haploinsufficiency of ITPR1 impairs IP3-mediated calcium release,
    disrupting the calcium signals that regulate Purkinje cell excitability, LTD
    at parallel fibre synapses, and climbing fibre synapse elimination during
    development.
  cell_types:
  - preferred_term: Purkinje cell
