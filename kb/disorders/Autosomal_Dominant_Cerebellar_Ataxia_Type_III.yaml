      the proposed mechanism.
treatments:
- name: Supportive care and rehabilitation
  description: >-
    No disease-modifying therapy exists for any ADCA-III subtype. Management
    centres on multidisciplinary rehabilitation — physiotherapy for balance and
    gait training, speech therapy for dysarthria and dysphagia, and occupational
    therapy for daily living adaptations. Assistive devices (canes, walkers,
    wheelchairs) are introduced as needed.
  treatment_term:
    preferred_term: supportive care
    term:
      id: MAXO:0000950
      label: supportive care
  target_phenotypes:
  - preferred_term: Gait ataxia
    term:
      id: HP:0002066
      label: Gait ataxia
  - preferred_term: Dysarthria
    term:
      id: HP:0001260
      label: Dysarthria
  evidence:
  - reference: PMID:20301723
    reference_title: Spinocerebellar Ataxia Type 11.
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Management is supportive; there are no known disease-modifying treatments
      to date.
    explanation: >-
      GeneReviews for SCA11 confirms that, as with other ADCA-III subtypes,
      only supportive care is available.
- name: Acetazolamide for episodic features (SCA6)
  description: >-
    Some patients with SCA6 who retain episodic features may benefit from
    acetazolamide, as the CACNA1A allelic spectrum overlaps with episodic
    ataxia type 2. This is used off-label and evidence is anecdotal.
  treatment_term:
    preferred_term: pharmacotherapy
    term:
      id: MAXO:0000058
      label: pharmacotherapy
    therapeutic_agent:
    - preferred_term: acetazolamide
      term:
        id: CHEBI:27690
        label: acetazolamide
  evidence:
  - reference: PMID:34484942
    reference_title: "Fampridine and Acetazolamide in EA2 and Related Familial EA:
      A Prospective Randomized Placebo-Controlled Trial."
    supports: PARTIAL
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Compared with placebo, fampridine reduced the number of attacks to 63%
      (95% CI 54%-74%) and acetazolamide to 52% (95% CI 46%-60%).
    explanation: >-
      Class II evidence that acetazolamide significantly reduces attack frequency
      in EA2 (CACNA1A loss-of-function), the allelic channelopathy overlapping
      with SCA6. Evidence is PARTIAL because this trial enrolled EA2, not SCA6,
      and clinical benefit in the SCA6 progressive phenotype is anecdotal.
notes: >-
  ADCA-III corresponds to Harding's 1983 classification of autosomal dominant
  cerebellar ataxias with a pure cerebellar syndrome. Modern molecular genetic
  testing has revealed that this phenotypic class is underpinned by highly
  heterogeneous molecular defects. The most common subtype in most populations
  is SCA6. Some subtypes listed here (especially PNPT1/SCA25 and MME/SCA43)
  include sensory neuropathy and remain boundary cases for a strict
  pure-cerebellar classification. SCA6 also has channelopathy features that
  overlap with the ADCA classification of episodic ataxia.
