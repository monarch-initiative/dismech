- name: Mitochondrial dsRNA Accumulation and Interferon Activation in SCA25
  description: >-
    Heterozygous loss-of-function variants in PNPT1 reduce PNPase
    (polyribonucleotide nucleotidyltransferase 1) activity, impairing
    surveillance and degradation of mitochondrial double-stranded RNA.
    Accumulation of dsRNA in mitochondria leads to its leakage into the
    cytoplasm, triggering a type I interferon response. This innate immune
    activation is proposed to underlie the sensory ganglionopathy and
    cerebellar neurodegeneration characteristic of SCA25.
