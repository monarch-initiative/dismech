inheritance:
- name: Autosomal dominant
  inheritance_term:
    preferred_term: autosomal dominant inheritance
    term:
      id: HP:0000006
      label: Autosomal dominant inheritance
  description: >-
    All subtypes within ADCA-III follow autosomal dominant inheritance.
    Penetrance is generally high but varies by subtype and allele; some
    SCA14 alleles show reduced penetrance.
  evidence:
  - reference: PMID:15362569
    reference_title: A clinical and genetic study in a large cohort of patients with spinocerebellar ataxia type 6.
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      We observed an inverse correlation between the age of onset and the length
      of the expanded allele, and also between the age of onset and the sum of
      CAG repeats in the normal and the expanded alleles.
    explanation: >-
      Establishes SCA6 (an ADCA-III subtype) as an autosomal dominant disorder
      with a clear genotype-phenotype correlation in a large clinical cohort.
has_subtypes:
- name: SCA5
  display_name: Spinocerebellar ataxia type 5 (SPTBN2)
  description: >-
    Pure cerebellar ataxia caused by missense or in-frame deletion variants in
    SPTBN2, encoding the spectrin beta-III cytoskeletal scaffold protein highly
    expressed in Purkinje cells. Clinical onset ranges from childhood to
    adulthood; disease course is relatively slow and lifespan is normal.
- name: SCA6
  display_name: Spinocerebellar ataxia type 6 (CACNA1A)
  description: >-
    Late-onset pure cerebellar ataxia caused by small CAG repeat expansions in
    the CACNA1A gene (encoding the Cav2.1 P/Q-type voltage-gated calcium channel
    alpha-1 subunit). SCA6 is allelic with episodic ataxia type 2 and familial
    hemiplegic migraine type 1. Some patients with SCA6 also exhibit episodic
    features or mild oculomotor channelopathy findings, reflecting the shared
    CACNA1A allelic spectrum.
- name: SCA11
  display_name: Spinocerebellar ataxia type 11 (TTBK2)
  description: >-
    Pure cerebellar ataxia caused by heterozygous truncating variants in TTBK2,
    encoding tau-tubulin kinase 2. Clinical course is mild and slowly progressive.
- name: SCA14
  display_name: Spinocerebellar ataxia type 14 (PRKCG)
  description: >-
    Progressive cerebellar ataxia caused by missense variants in PRKCG, encoding
    protein kinase C gamma. Some patients show myoclonus and/or cognitive impairment
    alongside the cerebellar syndrome, though this typically remains mild.
- name: SCA15
  display_name: Spinocerebellar ataxia type 15/16 (ITPR1)
  description: >-
    Pure cerebellar ataxia caused by heterozygous deletions or missense variants
    in ITPR1, encoding the type-1 inositol 1,4,5-trisphosphate receptor (IP3R1),
    a major calcium-release channel on the endoplasmic reticulum of Purkinje cells.
    SCA15 and SCA16 are now considered the same condition.
- name: SCA23
  display_name: Spinocerebellar ataxia type 23 (PDYN)
  description: >-
    Rare late-onset pure cerebellar ataxia caused by missense variants in PDYN,
    encoding prodynorphin. Sensory neuropathy may be present in some individuals.
- name: SCA25
  display_name: Spinocerebellar ataxia type 25
  description: >-
    Slowly progressive sensory and cerebellar ataxia caused by heterozygous
    variants in PNPT1, encoding the mitochondrial RNA-processing enzyme PNPase.
    This subtype often has sensory ganglionopathy or neuropathy, making it a
    recognized exception to the otherwise pure-cerebellar ADCA-III pattern.
- name: SCA31
  display_name: Spinocerebellar ataxia type 31 (BEAN1/TK2)
  description: >-
    Pure cerebellar ataxia prevalent in Japan caused by a pentanucleotide
    (TGGAA) repeat insertion in the introns of both BEAN1 and TK2. Onset is
    in the fifth to seventh decade.
- name: SCA43
  display_name: Spinocerebellar ataxia type 43 (MME)
  description: >-
    Pure cerebellar ataxia caused by missense variants in MME, encoding neprilysin
    (membrane metalloendopeptidase). Sensory peripheral neuropathy may accompany
    the cerebellar syndrome.
- name: SCA46
  display_name: Spinocerebellar ataxia type 46 (PLD3)
  description: >-
    Late-onset pure cerebellar ataxia caused by missense variants in PLD3, encoding
    phospholipase D3. Sensory neuropathy may also be present.
pathophysiology:
- name: Purkinje Cell Calcium Dysregulation
  description: >-
    A central convergence point across ADCA-III subtypes is disrupted calcium
    homeostasis in Purkinje cells. In SCA6, small CAG repeat expansions in CACNA1A
    produce a toxic polyglutamine domain in the C-terminal cytoplasmic tail of
    Cav2.1, reducing channel density at Purkinje cell dendrites and impairing
    calcium-dependent pacemaking. This impairs the finely tuned calcium
    oscillations required for Purkinje cell pacemaking and synaptic plasticity.
    The IP3R1 mechanism in SCA15 is described separately in the IP3R1
    Haploinsufficiency node.
