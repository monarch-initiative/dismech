- name: Pentanucleotide Repeat RNA Foci in SCA31
  description: >-
    SCA31 is caused by an intronic BEAN1/TK2-region pentanucleotide repeat
    insertion. Repeat-containing transcripts form RNA foci in Purkinje-cell
    nuclei and bind serine/arginine-rich splicing factors, supporting an
    RNA-foci and splicing-factor sequestration mechanism.
