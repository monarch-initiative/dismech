name: Autosomal Dominant Cerebellar Ataxia Type III
creation_date: "2026-04-25T00:00:00Z"
updated_date: "2026-04-25T00:00:00Z"
category: Mendelian
description: >-
  Autosomal dominant cerebellar ataxia type III (ADCA-III) is Harding's
  classification for hereditary ataxias with a pure or predominantly cerebellar
  syndrome without prominent extracerebellar features such as pyramidal tract
  signs, peripheral neuropathy, ophthalmoplegia, retinal degeneration, or
  dementia. The defining clinical hallmarks are progressive gait and limb
  ataxia, dysarthria, and nystagmus. ADCA-III encompasses a genetically
  heterogeneous group of conditions — including SCA5, SCA6, SCA11, SCA14,
  SCA15/16, SCA23, SCA25, SCA31, SCA43, and SCA46 — whose shared pathological
  endpoint is the restricted degeneration of Purkinje cells in the cerebellar
  cortex. The heterogeneous molecular causes include voltage-gated calcium
  channel dysfunction (CACNA1A/SCA6), perturbation of IP3 receptor-mediated
  calcium signalling (ITPR1/SCA15), scaffold and cytoskeletal protein defects
  (SPTBN2/SCA5), tau kinase impairment (TTBK2/SCA11), and PKC signalling
  dysregulation (PRKCG/SCA14).
