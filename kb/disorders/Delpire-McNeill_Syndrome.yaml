name: Delpire-McNeill Syndrome
creation_date: "2026-04-14T00:00:00Z"
updated_date: "2026-04-14T00:00:00Z"
category: Mendelian
disease_term:
  preferred_term: Delpire-McNeill syndrome
  term:
    id: MONDO:0033667
    label: Delpire-McNeill syndrome
parents:
  - Neurodevelopmental Disorders
  - Ion Channel Disorders
pathophysiology:
  - name: SLC12A2 (NKCC1) Loss of Function
    description: >
      Delpire-McNeill syndrome is caused by de novo heterozygous mutations in the SLC12A2
      gene, which encodes the Na-K-2Cl cotransporter 1 (NKCC1). NKCC1 is a widely expressed
      electroneutral cation-chloride cotransporter that mediates coupled transport of sodium,
      potassium, and chloride ions across cell membranes. Loss-of-function mutations disrupt
      intracellular chloride homeostasis, affecting neuronal development, auditory function,
      and multiple organ systems. All tested variants reduce cotransporter function in
      Xenopus laevis oocytes.
    cell_types:
      - preferred_term: neuron
        term:
          id: CL:0000540
          label: neuron
    biological_processes:
      - preferred_term: monoatomic ion transmembrane transport
        term:
          id: GO:0034220
          label: monoatomic ion transmembrane transport
      - preferred_term: chloride transmembrane transport
        term:
          id: GO:1902476
          label: chloride transmembrane transport
    downstream:
      - target: Impaired Neurogenesis via GABAergic Signaling Disruption
      - target: Inner Ear Endolymph Dysfunction
      - target: Secretory Epithelial Dysfunction
    evidence:
      - reference: PMID:32658972
        reference_title: "SLC12A2 variants cause a neurodevelopmental disorder or cochleovestibular defect."
        supports: SUPPORT
        evidence_source: HUMAN_CLINICAL
        snippet: "Through trio exome sequencing we identified de novo mutations in SLC12A2 in six children with neurodevelopmental disorders. All had developmental delay or intellectual disability ranging from mild to severe."
        explanation: "Landmark study identifying de novo SLC12A2 mutations as causal in neurodevelopmental disorders."
      - reference: PMID:37399495
        reference_title: "NKCC1 in human diseases: is the SLC12A2 gene haploinsufficient?"
        supports: SUPPORT
        evidence_source: HUMAN_CLINICAL
        snippet: "Mutations in the SLC12A2 gene, which encodes the Na-K-2Cl cotransporter-1 (NKCC1), are linked to various conditions such as neurodevelopmental deficits, deafness, and fluid secretion in different epithelia."
        explanation: "Comprehensive review establishing SLC12A2 as a haploinsufficient human disease gene."
  - name: Impaired Neurogenesis via GABAergic Signaling Disruption
    description: >
      NKCC1 plays a critical role in establishing intracellular chloride concentration
      in developing neurons. In radial glial cells during fetal corticogenesis (16-18 weeks
      post-conception), NKCC1 maintains elevated intracellular chloride, making GABA
      depolarizing and excitatory, which supports neuronal migration, differentiation, and
      synaptogenesis. Mutations disrupting NKCC1 function prematurely shift the developmental
      GABA excitatory-inhibitory switch, impairing neural progenitor expansion and
      cortical development.
    cell_types:
      - preferred_term: radial glial cell
        term:
          id: CL:0000681
          label: radial glial cell
      - preferred_term: GABAergic neuron
        term:
          id: CL:0000617
          label: GABAergic neuron
    biological_processes:
      - preferred_term: gamma-aminobutyric acid signaling pathway
        term:
          id: GO:0007214
          label: gamma-aminobutyric acid signaling pathway
      - preferred_term: neurogenesis
        term:
          id: GO:0022008
          label: neurogenesis
    evidence:
      - reference: PMID:32658972
        reference_title: "SLC12A2 variants cause a neurodevelopmental disorder or cochleovestibular defect."
        supports: SUPPORT
        evidence_source: HUMAN_CLINICAL
        snippet: "Analysis of SLC12A2 expression in foetal brain at 16-18 weeks post-conception revealed high expression in radial glial cells, compatible with a role in neurogenesis."
        explanation: "Demonstrates that SLC12A2 is highly expressed in radial glial cells during critical neurogenic period."
      - reference: PMID:32658972
        reference_title: "SLC12A2 variants cause a neurodevelopmental disorder or cochleovestibular defect."
        supports: SUPPORT
        evidence_source: HUMAN_CLINICAL
        snippet: "Gene co-expression analysis in cells robustly expressing SLC12A2 at 16-18 weeks post-conception identified a transcriptomic programme associated with active neurogenesis."
        explanation: "Shows SLC12A2-expressing cells have a transcriptomic program reflecting active neurogenesis."
      - reference: PMID:11027211
        reference_title: "Abnormal GABAA receptor-mediated currents in dorsal root ganglion neurons isolated from Na-K-2Cl cotransporter null mice."
        supports: SUPPORT
        evidence_source: MODEL_ORGANISM
        snippet: "In contrast to control neurons, little or no net current was observed at the resting membrane potential in homozygote NKCC1 mutant DRG neurons. E(GABA) was significantly more negative, demonstrating the absence of Cl(-) accumulation in these cells."
        explanation: "NKCC1 knockout mice show loss of chloride accumulation and absence of GABA-mediated depolarization."
  - name: Inner Ear Endolymph Dysfunction
    description: >
      NKCC1 is essential for endolymph production in the inner ear. It is expressed in
      the strial marginal cells of the cochlea and vestibular dark cells, where it drives
      potassium and chloride transport into the endolymph. Loss of NKCC1 function leads
      to reduced endolymph volume, decreased endocochlear potential, hair cell degeneration,
      and bilateral sensorineural deafness with vestibular areflexia.
    cell_types:
      - preferred_term: strial marginal cell
        term:
          id: CL:0002492
          label: strial marginal cell
    biological_processes:
      - preferred_term: potassium ion transport
        term:
          id: GO:0006813
          label: potassium ion transport
    evidence:
      - reference: PMID:19633174
        reference_title: "Nkcc1 (Slc12a2) is required for the regulation of endolymph volume in the otic vesicle and swim bladder volume in the zebrafish larva."
        supports: SUPPORT
        evidence_source: MODEL_ORGANISM
        snippet: "We show here that lte mutations correspond to lesions in nkcc1."
        explanation: "Zebrafish model demonstrates NKCC1 is required for regulation of endolymph volume."
      - reference: PMID:40503591
        reference_title: "De Novo SLC12A2 Variant Presenting as Congenital Hearing Loss With Vestibular Areflexia."
        supports: SUPPORT
        evidence_source: HUMAN_CLINICAL
        snippet: "In the inner ear, K+ transport is required for the mechano-transduction of auditory stimuli. SLC12A2 functions as a dimer and has several isoforms; only one isoform contains exon 21, and this isoform is almost exclusively expressed in the inner ear/cochlea."
        explanation: "Confirms cochlear-specific expression of NKCC1 exon 21 isoform essential for endolymph homeostasis."
  - name: Secretory Epithelial Dysfunction
    description: >
      NKCC1 is expressed on basolateral membranes of secretory epithelia including
      salivary glands, pancreas, trachea, intestine, and sweat glands, where it supports
      transepithelial fluid secretion. Severe NKCC1 deficiency causes absent or reduced
      salivation, tear production, and sweat production, as well as respiratory
      complications from dry mucosa and mucus plugging.
    cell_types:
      - preferred_term: epithelial cell
        term:
          id: CL:0000066
          label: epithelial cell
    biological_processes:
      - preferred_term: fluid transport
        term:
          id: GO:0042044
          label: fluid transport
    evidence:
      - reference: PMID:27900370
        reference_title: "A patient with multisystem dysfunction carries a truncation mutation in human SLC12A2, the gene encoding the Na-K-2Cl cotransporter, NKCC1."
        supports: SUPPORT
        evidence_source: HUMAN_CLINICAL
        snippet: "This study describes a 13-yr-old girl with orthostatic intolerance, respiratory weakness, multiple endocrine abnormalities, pancreatic insufficiency, and multiorgan failure involving the gut and bladder."
        explanation: "First human case demonstrating multisystem secretory dysfunction from heterozygous SLC12A2 truncation."
      - reference: PMID:30740830
        reference_title: "Kilquist syndrome: A novel syndromic hearing loss disorder caused by homozygous deletion of SLC12A2."
        supports: SUPPORT
        evidence_source: HUMAN_CLINICAL
        snippet: "Herein we describe a child admitted to the NIH Undiagnosed Diseases Program with global developmental delay, sensorineural hearing loss, gastrointestinal abnormalities, and absent salivation."
        explanation: "Kilquist syndrome case showing severe secretory epithelial dysfunction from homozygous SLC12A2 deletion."
phenotypes:
  - category: Neurological
    name: Global Developmental Delay
    description: >
      Delayed attainment of developmental milestones is a hallmark feature, with all
      identified patients showing motor and cognitive delays from infancy.
    frequency: VERY_FREQUENT
    phenotype_term:
      preferred_term: Global developmental delay
      term:
        id: HP:0001263
        label: Global developmental delay
    evidence:
      - reference: PMID:32658972
        reference_title: "SLC12A2 variants cause a neurodevelopmental disorder or cochleovestibular defect."
        supports: SUPPORT
        evidence_source: HUMAN_CLINICAL
        snippet: "All had developmental delay or intellectual disability ranging from mild to severe."
        explanation: "All six children with de novo SLC12A2 mutations had developmental delay."
  - category: Neurological
    name: Intellectual Disability
    description: >
      Mild to moderate intellectual disability is present in most affected individuals,
      with some cases showing severe impairment.
    frequency: VERY_FREQUENT
    phenotype_term:
      preferred_term: Intellectual disability
      term:
        id: HP:0001249
        label: Intellectual disability
    evidence:
      - reference: PMID:32658972
        reference_title: "SLC12A2 variants cause a neurodevelopmental disorder or cochleovestibular defect."
        supports: SUPPORT
        evidence_source: HUMAN_CLINICAL
        snippet: "All had developmental delay or intellectual disability ranging from mild to severe."
        explanation: "Intellectual disability across the spectrum was documented in the McNeill cohort."
  - category: Neurological
    name: Delayed or Absent Speech
    description: >
      Speech and language development is significantly delayed or absent.
    phenotype_term:
      preferred_term: Delayed speech and language development
      term:
        id: HP:0000750
        label: Delayed speech and language development
    evidence:
      - reference: PMID:32658972
        reference_title: "SLC12A2 variants cause a neurodevelopmental disorder or cochleovestibular defect."
        supports: SUPPORT
        evidence_source: HUMAN_CLINICAL
        snippet: "All had developmental delay or intellectual disability ranging from mild to severe."
        explanation: "Speech and language delay is part of the global developmental delay phenotype described in SLC12A2 patients."
  - category: Neurological
    name: Muscular Hypotonia
    description: >
      Reduced muscle tone is commonly observed in infancy, contributing to delayed motor
      milestones. Some patients transition from hypotonia to hypertonia and spasticity.
    phenotype_term:
      preferred_term: Muscular hypotonia
      term:
        id: HP:0001252
        label: Hypotonia
    notes: >
      Hypotonia is listed as a variable feature in OMIM 619083 and observed in some
      patients with heterozygous SLC12A2 mutations.
    evidence: []
  - category: Ear
    name: Bilateral Sensorineural Hearing Loss
    description: >
      Sensorineural deafness occurs in a subset of patients due to impaired endolymph
      production from NKCC1 dysfunction in the stria vascularis.
    frequency: FREQUENT
    phenotype_term:
      preferred_term: Bilateral sensorineural hearing impairment
      term:
        id: HP:0008619
        label: Bilateral sensorineural hearing impairment
    evidence:
      - reference: PMID:32658972
        reference_title: "SLC12A2 variants cause a neurodevelopmental disorder or cochleovestibular defect."
        supports: SUPPORT
        evidence_source: HUMAN_CLINICAL
        snippet: "Two had sensorineural deafness. We also identified SLC12A2 variants in three individuals with non-syndromic bilateral sensorineural hearing loss and vestibular areflexia."
        explanation: "Two of six neurodevelopmental patients plus three DFNA78 patients had sensorineural hearing loss."
      - reference: PMID:40503591
        reference_title: "De Novo SLC12A2 Variant Presenting as Congenital Hearing Loss With Vestibular Areflexia."
        supports: SUPPORT
        evidence_source: HUMAN_CLINICAL
        snippet: "We report a patient with profound congenital hearing loss and vestibular areflexia with a de novo variant in SLC12A2 located in the splice donor site: NM_001046.2: c.2977+4_2977+7del causing an in-frame skip of exon 21"
        explanation: "Additional case confirming exon 21 variants cause cochlear-restricted hearing loss."
  - category: Neurological
    name: Autistic Features
    description: >
      Autistic spectrum features including social communication difficulties and
      restricted interests are observed in some affected individuals.
    phenotype_term:
      preferred_term: Autistic behavior
      term:
        id: HP:0000729
        label: Autistic behavior
    evidence:
      - reference: PMID:40503591
        reference_title: "De Novo SLC12A2 Variant Presenting as Congenital Hearing Loss With Vestibular Areflexia."
        supports: SUPPORT
        evidence_source: HUMAN_CLINICAL
        snippet: "de novo heterozygous SLC12A2 variants have also been implicated in developmental delay with autistic features."
        explanation: "Confirms autistic features are part of the SLC12A2-associated neurodevelopmental phenotype."
  - category: Neurological
    name: Vestibular Areflexia
    description: >
      Bilateral loss of vestibular function frequently accompanies hearing impairment,
      contributing to delayed motor development and balance difficulties.
    frequency: FREQUENT
    phenotype_term:
      preferred_term: Vestibular areflexia
      term:
        id: HP:0008568
        label: Vestibular areflexia
    evidence:
      - reference: PMID:32658972
        reference_title: "SLC12A2 variants cause a neurodevelopmental disorder or cochleovestibular defect."
        supports: SUPPORT
        evidence_source: HUMAN_CLINICAL
        snippet: "We also identified SLC12A2 variants in three individuals with non-syndromic bilateral sensorineural hearing loss and vestibular areflexia."
        explanation: "Vestibular areflexia documented alongside hearing loss in SLC12A2-associated disease."
      - reference: PMID:40503591
        reference_title: "De Novo SLC12A2 Variant Presenting as Congenital Hearing Loss With Vestibular Areflexia."
        supports: SUPPORT
        evidence_source: HUMAN_CLINICAL
        snippet: "We report a patient with profound congenital hearing loss and vestibular areflexia with a de novo variant in SLC12A2"
        explanation: "Additional case confirming vestibular areflexia in SLC12A2 mutations."
  - category: Neurological
    name: Seizures
    description: >
      Epilepsy occurs in some patients, with variable frequency and severity.
    phenotype_term:
      preferred_term: Seizures
      term:
        id: HP:0001250
        label: Seizure
    notes: >
      Seizures are listed as a variable feature in OMIM 619083 and Orphanet 633024.
    evidence: []
  - category: Neurological
    name: Cortical Dysplasia
    description: >
      Structural brain malformation reflecting disrupted neuronal migration during
      fetal development, observed on brain MRI in some patients.
    phenotype_term:
      preferred_term: Cortical dysplasia
      term:
        id: HP:0002539
        label: Cortical dysplasia
    notes: >
      Cortical dysplasia and agenesis of the corpus callosum listed as variable features
      in OMIM 619083.
    evidence: []
  - category: Neurological
    name: Spasticity
    description: >
      Some patients transition from early hypotonia to hypertonia and spasticity.
    phenotype_term:
      preferred_term: Spasticity
      term:
        id: HP:0001257
        label: Spasticity
    notes: >
      Spasticity is listed as a variable feature in OMIM 619083.
    evidence: []
  - category: Gastrointestinal
    name: Feeding Difficulties
    description: >
      Swallowing difficulties that may require tube feeding in more severely
      affected individuals.
    phenotype_term:
      preferred_term: Feeding difficulties
      term:
        id: HP:0011968
        label: Feeding difficulties
    notes: >
      Feeding difficulties may occur as part of multisystem dysfunction observed in
      severe cases of SLC12A2 mutations.
    evidence: []
inheritance:
  - name: Autosomal dominant
    inheritance_term:
      preferred_term: Autosomal dominant inheritance
      term:
        id: HP:0000006
        label: Autosomal dominant inheritance
    penetrance: INCOMPLETE
    description: >
      Delpire-McNeill syndrome follows autosomal dominant inheritance through de novo
      mutations. All well-characterized cases result from de novo mutations. Some family
      members carrying identical mutations show no clinical phenotype, demonstrating
      incomplete penetrance.
    evidence:
      - reference: PMID:32658972
        reference_title: "SLC12A2 variants cause a neurodevelopmental disorder or cochleovestibular defect."
        supports: SUPPORT
        evidence_source: HUMAN_CLINICAL
        snippet: "Through trio exome sequencing we identified de novo mutations in SLC12A2 in six children with neurodevelopmental disorders."
        explanation: "Trio exome sequencing established de novo origin of SLC12A2 mutations."
      - reference: PMID:37399495
        reference_title: "NKCC1 in human diseases: is the SLC12A2 gene haploinsufficient?"
        supports: SUPPORT
        evidence_source: HUMAN_CLINICAL
        snippet: "Overall, the preponderance of evidence suggests that the SLC12A2 gene is a human disease-causing and likely haploinsufficient gene that requires further investigation."
        explanation: "Review confirming SLC12A2 haploinsufficiency with variable penetrance."
genetic:
  - name: SLC12A2 Mutations
    gene_term:
      preferred_term: SLC12A2
      term:
        id: hgnc:10911
        label: SLC12A2
    association: Causative
    inheritance:
      - name: Autosomal Dominant
    variants:
      - name: Missense variants in transmembrane domains
        description: >
          Missense mutations affecting evolutionarily conserved residues including
          p.(Ala327Val), p.(Arg410Gln), p.(Asn376Ile), p.(Ala379Pro), and p.(Glu980Lys).
      - name: Protein-truncating variants
        description: >
          Frameshift and nonsense variants including p.(Val1026Phefs*2) from an 11-bp
          deletion in exon 22. GnomAD shows strong constraint (pLI = 0.96).
    notes: >
      Heterozygous mutations in SLC12A2 on chromosome 5q23.3. All tested variants reduce
      cotransporter function. The de novo mutation rate shows 9.62-fold enrichment in the
      DDD cohort (P = 2.71 x 10^-6).
    evidence:
      - reference: PMID:32658972
        reference_title: "SLC12A2 variants cause a neurodevelopmental disorder or cochleovestibular defect."
        supports: SUPPORT
        evidence_source: HUMAN_CLINICAL
        snippet: "The SLC12A2 de novo mutation rate was demonstrated to be significantly elevated in the deciphering developmental disorders cohort."
        explanation: "Demonstrates elevated de novo mutation rate in the DDD cohort."
      - reference: PMID:32658972
        reference_title: "SLC12A2 variants cause a neurodevelopmental disorder or cochleovestibular defect."
        supports: SUPPORT
        evidence_source: IN_VITRO
        snippet: "All tested variants were shown to reduce co-transporter function in Xenopus laevis oocytes."
        explanation: "Functional validation showing all tested variants reduce cotransporter activity."
      - reference: PMID:27900370
        reference_title: "A patient with multisystem dysfunction carries a truncation mutation in human SLC12A2, the gene encoding the Na-K-2Cl cotransporter, NKCC1."
        supports: SUPPORT
        evidence_source: HUMAN_CLINICAL
        snippet: "Exome sequencing revealed a de novo, loss-of-function allele in SLC12A2, the gene encoding the Na-K-2Cl cotransporter-1. The 11-bp deletion in exon 22 results in frameshift (p.Val1026Phefs*2) and truncation of the carboxy-terminal tail of the cotransporter."
        explanation: "First characterization of a truncating SLC12A2 variant causing multisystem dysfunction."
