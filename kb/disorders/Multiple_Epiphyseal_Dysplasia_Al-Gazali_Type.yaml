genetic:
- name: KIF7 Mutation
  association: Causative
  gene_term:
    preferred_term: KIF7
    term:
      id: hgnc:30497
      label: KIF7
  notes: >-
    A homozygous p.N1060S missense mutation in KIF7 (15q26.1) was identified by
    whole-exome sequencing in a consanguineous family with this disorder. KIF7
    encodes the human ortholog of Drosophila Costal2, a cilium-tip kinesin-4
    regulator of the Sonic hedgehog pathway. This was the first reported missense
    homozygous disease-causing KIF7 mutation; the hypomorphic missense nature is
    proposed to underlie the distinctive epiphyseal-dysplasia presentation, in
    contrast to the loss-of-function alleles causing acrocallosal and
    hydrolethalus syndromes.
  evidence:
  - reference: PMID:22587682
    reference_title: "A mutation in KIF7 is responsible for the autosomal recessive syndrome of macrocephaly, multiple epiphyseal dysplasia and distinctive facial appearance."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      the identification of a homozygous p.N1060S missense mutation in a highly
      conserved residue in KIF7, a regulator of Hedgehog signaling that has been
      recently found to be causing Joubert syndrome, fetal hydrolethalus and
      acrocallosal syndromes
    explanation: >-
      Identifies the causative homozygous KIF7 missense mutation and the allelic
      relationship with the other KIF7 ciliopathies.
  - reference: PMID:22587682
    reference_title: "A mutation in KIF7 is responsible for the autosomal recessive syndrome of macrocephaly, multiple epiphyseal dysplasia and distinctive facial appearance."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      expand the clinical spectrum associated with mutations in this gene to
      include multiple epiphyseal dysplasia
    explanation: >-
      Establishes KIF7 as the causative gene and expands the KIF7 clinical
      spectrum to include multiple epiphyseal dysplasia.
diagnosis:
- name: Clinical and Molecular Diagnosis
  description: >-
    The disorder is suspected from the combination of multiple epiphyseal
    dysplasia, macrocephaly, and a distinctive facial appearance, and is
    confirmed by identification of biallelic KIF7 pathogenic variants on
    molecular genetic testing.
  diagnosis_term:
    preferred_term: molecular genetic testing
    term:
      id: MAXO:0000533
      label: molecular genetic testing
  evidence:
  - reference: PMID:22587682
    reference_title: "A mutation in KIF7 is responsible for the autosomal recessive syndrome of macrocephaly, multiple epiphyseal dysplasia and distinctive facial appearance."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      we have used whole exome sequencing on two affected members of a
      consanguineous family with this condition
    explanation: >-
      Documents the molecular (exome-sequencing) approach used to establish the
      genetic diagnosis.
differential_diagnoses:
- name: Multiple Epiphyseal Dysplasia (cartilage-matrix forms)
  description: >-
    Classic multiple epiphyseal dysplasia caused by variants in cartilage
    extracellular-matrix genes (COMP, MATN3, COL9A1/2/3) or the sulfate
    transporter SLC26A2 shares the epiphyseal-dysplasia skeletal phenotype but
    acts through chondrocyte matrix/ER-stress mechanisms rather than ciliary
    Hedgehog signaling, and lacks the macrocephaly and distinctive facies of the
    Al-Gazali (KIF7) type.
- name: Acrocallosal Syndrome
  description: >-
    Acrocallosal syndrome is an allelic KIF7 ciliopathy distinguished by corpus
    callosum agenesis/hypoplasia and postaxial/preaxial polydactyly with hallux
    duplication; it shares macrocephaly and the underlying KIF7 Hedgehog
    mechanism but is brain- and limb-predominant rather than
    epiphyseal-dysplasia-predominant.
  evidence:
  - reference: PMID:22587682
    reference_title: "A mutation in KIF7 is responsible for the autosomal recessive syndrome of macrocephaly, multiple epiphyseal dysplasia and distinctive facial appearance."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      a regulator of Hedgehog signaling that has been recently found to be
      causing Joubert syndrome, fetal hydrolethalus and acrocallosal syndromes
    explanation: >-
      Documents the allelic KIF7 relationship with acrocallosal, hydrolethalus,
      and Joubert syndromes, relevant to differential diagnosis.
treatments:
- name: Supportive and Multidisciplinary Care
  description: >-
    There is no disease-modifying therapy. Management is supportive and
    multidisciplinary, addressing the skeletal, growth, and developmental
    manifestations.
  treatment_term:
