inheritance:
- name: Autosomal Recessive
  description: >-
    Multiple epiphyseal dysplasia, Al-Gazali type is inherited in an autosomal
    recessive manner; it was identified in a consanguineous family carrying a
    homozygous KIF7 missense mutation.
  evidence:
  - reference: PMID:22587682
    reference_title: "A mutation in KIF7 is responsible for the autosomal recessive syndrome of macrocephaly, multiple epiphyseal dysplasia and distinctive facial appearance."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      We previously reported the existence of a unique autosomal recessive
      syndrome consisting of macrocephaly, multiple epiphyseal dysplasia and
      distinctive facial appearance mapping to chromosome 15q26
    explanation: >-
      Establishes the autosomal recessive inheritance and the defining triad of
      macrocephaly, multiple epiphyseal dysplasia, and distinctive facies.
pathophysiology:
- name: KIF7 Cilium-Tip Dysfunction and Impaired Hedgehog Signal Transduction
  conforms_to: "ciliopathy_dysfunction#Impaired Hedgehog Signal Transduction"
  description: >-
    KIF7, the human ortholog of Drosophila Costal2, is an immotile kinesin-4
    protein that localizes to the tip of the primary cilium, where it regulates
    the GLI transcription factors of the Hedgehog pathway. In the absence of
    Hedgehog ligand KIF7 promotes processing of GLI3 into its transcriptional
    repressor form; biallelic loss-of-function KIF7 mutations deregulate most GLI
    target genes and impair GLI3 processing, disrupting the tightly dosed
    Hedgehog output required for skeletal, limb, and craniofacial patterning. The
    homozygous p.N1060S missense mutation identified in Al-Gazali type multiple
    epiphyseal dysplasia is a hypomorphic allele whose partial activity is
    proposed to account for the distinctive skeletal presentation.
  biological_processes:
  - preferred_term: Smoothened (Hedgehog) Signaling
    term:
      id: GO:0007224
      label: smoothened signaling pathway
    modifier: ABNORMAL
  - preferred_term: Regulation of Hedgehog Signaling
    term:
      id: GO:0008589
      label: regulation of smoothened signaling pathway
    modifier: DECREASED
  cellular_components:
  - preferred_term: Ciliary Tip
    term:
      id: GO:0097542
      label: ciliary tip
  - preferred_term: Primary Cilium
    term:
      id: GO:0005929
      label: cilium
  downstream:
  - target: Skeletal and Craniofacial Patterning Defect
    description: >-
      Deregulated cilium-dependent Hedgehog/GLI signaling disrupts skeletal
      (epiphyseal), craniofacial, and head-growth patterning.
  evidence:
  - reference: PMID:22587682
    reference_title: "A mutation in KIF7 is responsible for the autosomal recessive syndrome of macrocephaly, multiple epiphyseal dysplasia and distinctive facial appearance."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      the identification of a homozygous p.N1060S missense mutation in a highly
      conserved residue in KIF7, a regulator of Hedgehog signaling
    explanation: >-
      Identifies the causative KIF7 missense mutation and KIF7's role as a
      regulator of Hedgehog signaling, establishing the molecular basis of the
      mechanism.
  - reference: PMID:21552264
    reference_title: "KIF7 mutations cause fetal hydrolethalus and acrocallosal syndromes."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      KIF7, the human ortholog of Drosophila Costal2, is a key component of the
      Hedgehog signaling pathway
    explanation: >-
      Identifies KIF7 as a core Hedgehog pathway component (Costal2 ortholog),
      establishing the molecular basis shared across the KIF7 ciliopathies.
  - reference: PMID:21552264
    reference_title: "KIF7 mutations cause fetal hydrolethalus and acrocallosal syndromes."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      we show deregulation of most GLI transcription factor targets and impaired
      GLI3 processing in tissues from individuals with KIF7 mutations
    explanation: >-
      Demonstrates the downstream molecular consequence of KIF7 loss in patient
      tissues: deregulated GLI targets and impaired GLI3 processing.
  - reference: PMID:21552264
    reference_title: "KIF7 mutations cause fetal hydrolethalus and acrocallosal syndromes."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Our data show the role of KIF7 in human primary cilia, especially in the
      Hedgehog pathway through the regulation of GLI targets, and expand the
      clinical spectrum of ciliopathies
    explanation: >-
      Places KIF7 disorders within the primary-cilium Hedgehog-signaling
      ciliopathy spectrum, supporting conformance to the ciliopathy module
      Hedgehog node.
- name: Skeletal and Craniofacial Patterning Defect
  description: >-
    Deregulated KIF7-dependent Hedgehog/GLI3 signaling disrupts dosed skeletal
    and craniofacial patterning. The hallmark consequence in Al-Gazali type is
    multiple epiphyseal dysplasia (abnormal development of the epiphyses of the
    long bones), accompanied by macrocephaly and a distinctive facial
    appearance. This skeletal-predominant presentation distinguishes the disorder
    from the brain- and limb-predominant allelic KIF7 ciliopathies.
