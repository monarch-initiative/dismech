name: Multiple Epiphyseal Dysplasia, Al-Gazali Type
creation_date: "2026-06-22T19:40:49Z"
category: Mendelian
description: >-
  Multiple epiphyseal dysplasia, Al-Gazali type (also called Al-Gazali-Bakalinova
  syndrome, AGBK) is a rare autosomal recessive disorder characterized by
  multiple epiphyseal dysplasia, macrocephaly, and a distinctive facial
  appearance. It is caused by a biallelic missense mutation in KIF7, the human
  ortholog of Drosophila Costal2 and a cilium-tip regulator of the Sonic
  hedgehog (SHH) pathway. KIF7 dysfunction deregulates GLI transcription-factor
  output and impairs GLI3 processing, placing this disorder within the
  primary-cilium Hedgehog-signaling ciliopathy spectrum together with the
  allelic KIF7 disorders acrocallosal syndrome, fetal hydrolethalus syndrome,
  and a subset of Joubert syndrome. The skeletal (epiphyseal dysplasia)
  presentation is the distinctive feature that distinguishes this disorder from
  the other KIF7 ciliopathies. It is mechanistically distinct from the classic
  cartilage-matrix forms of multiple epiphyseal dysplasia (COMP, MATN3, COL9,
  SLC26A2), which act through chondrocyte matrix/ER-stress mechanisms rather than
  ciliary Hedgehog signaling.
