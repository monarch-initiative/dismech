    term:
      id: MAXO:0000950
      label: supportive care
- name: Orthopedic and Physical Therapy for Skeletal Dysplasia
  description: >-
    Physical therapy and orthopedic management address joint and gait problems
    arising from the multiple epiphyseal dysplasia.
  treatment_term:
    preferred_term: physical therapy
    term:
      id: MAXO:0000011
      label: physical therapy
- name: Genetic Counseling
  description: >-
    Autosomal recessive inheritance entails a 25% recurrence risk for siblings.
    Once the biallelic KIF7 variants are identified, carrier testing and prenatal
    or preimplantation genetic testing become available to families.
  treatment_term:
    preferred_term: Genetic Counseling
    term:
      id: NCIT:C15240
      label: Genetic Counseling
notes: >-
  Curated as a standalone ciliopathy entry rather than as a subtype of the
  existing Multiple_Epiphyseal_Dysplasia entry. Rationale (mechanism-first
  curation): the classic MED entry (MONDO:0016648) is a cartilage
  extracellular-matrix / sulfate-transporter disorder (COMP, MATN3, COL9,
  SLC26A2) acting through chondrocyte matrix and ER-stress mechanisms, whereas
  Al-Gazali type (MONDO:0011778) is mechanistically a KIF7 Hedgehog/GLI3
  ciliopathy (MONDO additionally classifies it is-a KIF7-related ciliopathy and
  is-a multiple epiphyseal dysplasia). It therefore clusters with the existing
  dismech KIF7 ciliopathy entries (Acrocallosal Syndrome, Hydrolethalus Syndrome
  2, Joubert syndrome, Meckel Syndrome) and is added as a member of the
  Ciliopathies grouping. Resolves the lump/split decision deferred in issue
  #4243; maintainers may override via review.
