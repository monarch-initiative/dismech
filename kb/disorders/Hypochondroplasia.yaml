name: Hypochondroplasia
creation_date: '2026-02-02T00:16:36Z'
updated_date: '2026-04-04T00:00:00Z'
category: Mendelian
description: >
  Hypochondroplasia is a milder FGFR3-related skeletal dysplasia characterized by
  proportionate or mildly disproportionate short stature, with less pronounced features
  than achondroplasia. The most common mutation is FGFR3 N540K (c.1620C>A or c.1620C>G),
  found in approximately 50-70% of clinically diagnosed cases. Unlike achondroplasia,
  the phenotype is variable and may not be recognized until later childhood. Macrocephaly
  is less prominent, and spinal stenosis is less common. The diagnosis may be challenging
  in individuals with subtle features.
disease_term:
  preferred_term: hypochondroplasia
  term:
    id: MONDO:0007793
    label: hypochondroplasia
parents:
- FGFR3-related skeletal dysplasia
inheritance:
- name: Autosomal dominant
  description: >
    Hypochondroplasia follows autosomal dominant inheritance. Many cases are de novo
    mutations. Compound heterozygosity for achondroplasia and hypochondroplasia alleles
    results in an intermediate phenotype more severe than hypochondroplasia alone.
  evidence:
  - reference: PMID:41184854
    reference_title: "Achondroplasia and hypochondroplasia in France: a nationwide epidemiological analysis."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Overall, 85.5% of ACH cases and 57.2% of HCH cases were related to de novo genetic variants (p < 0.0001)."
    explanation: This French nationwide registry study confirms autosomal dominant inheritance with a high proportion of de novo cases in hypochondroplasia.
prevalence:
- population: French pediatric live births (2008-2023)
  percentage: 1.31 per 100,000
  notes: >-
    The first nationwide French registry analysis estimated a mean live-birth
    prevalence of 1.31 per 100,000 for hypochondroplasia, while noting that milder
    postnatally diagnosed forms may still be under-recognized.
  evidence:
  - reference: PMID:41184854
    reference_title: "Achondroplasia and hypochondroplasia in France: a nationwide epidemiological analysis."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "To estimate live birth prevalence, we focused on pediatric patients (0-15 years) born between 2008 and 2023. The mean (range) live birth prevalence was 3.27 per 100,000 for ACH (1.90-4.03) and 1.31 per 100,000 for HCH (0.54-2.08)."
    explanation: This nationwide French rare-disease registry study provides the clearest disease-specific birth prevalence estimate for hypochondroplasia.
pathophysiology:
- name: FGFR3 gain-of-function signaling (mild)
  description: >
    The FGFR3 N540K mutation causes constitutive activation of the receptor, but with
    less severe effects than the G380R mutation in achondroplasia. This results in
    moderately impaired endochondral ossification with reduced chondrocyte proliferation
    in the growth plate, leading to mild short stature.
  gene:
    preferred_term: FGFR3
    description: Fibroblast growth factor receptor 3 with activating mutation
      causing mild gain-of-function.
    modifier: INCREASED
    term:
      id: hgnc:3690
      label: FGFR3
  cell_types:
  - preferred_term: Growth plate chondrocyte
    term:
      id: CL:1000217
      label: growth plate cartilage chondrocyte
  biological_processes:
  - preferred_term: FGFR signaling pathway
    term:
      id: GO:0008543
      label: fibroblast growth factor receptor signaling pathway
  - preferred_term: Endochondral ossification
    term:
      id: GO:0001958
      label: endochondral ossification
  evidence:
  - reference: PMID:10696568
    reference_title: "The molecular and genetic basis of fibroblast growth factor receptor 3 disorders: the achondroplasia family of skeletal dysplasias, Muenke craniosynostosis, and Crouzon syndrome with acanthosis nigricans."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Recent evidence suggests that the phenotypic differences may be due to specific alleles with varying degrees of ligand-independent activation, allowing the receptor to be constitutively active."
    explanation: This review confirms that FGFR3 gain-of-function mutations in hypochondroplasia cause constitutive receptor activation with varying degrees of severity across the achondroplasia family of disorders.
  - reference: PMID:9887329
    reference_title: "A Lys644Glu substitution in fibroblast growth factor receptor 3 (FGFR3) causes dwarfism in mice by activation of STATs and ink4 cell cycle inhibitors."
    supports: SUPPORT
    evidence_source: MODEL_ORGANISM
    snippet: "the Lys644Glu mutation resulted in retarded endochondral bone growth with severity directly linked to the expression level of the mutated Fgfr3"
    explanation: Mouse model demonstrates that FGFR3 gain-of-function mutations directly cause retarded endochondral bone growth, supporting the pathophysiology of hypochondroplasia as a milder FGFR3-related skeletal dysplasia.
phenotypes:
- name: Mild short stature
  description: >
    Adults typically have heights in the low-normal to mildly short range, with average
    adult height of 145-165 cm. Short stature may be proportionate or mildly
    disproportionate.
  frequency: HP_0040281
  phenotype_term:
    preferred_term: Mild short stature
    term:
      id: HP:0003502
      label: Mild short stature
  evidence:
  - reference: PMID:41184854
    reference_title: "Achondroplasia and hypochondroplasia in France: a nationwide epidemiological analysis."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "HCH was diagnosed postnatally in 65.7% of cases (p < 0.0001)."
    explanation: The predominantly postnatal diagnosis of hypochondroplasia reflects its milder short stature phenotype compared to achondroplasia, which is often identified prenatally.
- name: Rhizomelic limb shortening (mild)
  description: >
    Mild proximal limb shortening may be present but is less pronounced than in
    achondroplasia. Some individuals have proportionate shortening.
  frequency: HP_0040282
  phenotype_term:
    preferred_term: Rhizomelic arm shortening
    term:
      id: HP:0004991
      label: Rhizomelic arm shortening
  evidence:
  - reference: PMID:41184854
    reference_title: "Achondroplasia and hypochondroplasia in France: a nationwide epidemiological analysis."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Achondroplasia (ACH) and hypochondroplasia (HCH) are among the most common forms of skeletal dysplasia, caused by gain-of-function variants in the FGFR3 gene, leading to disproportionate short stature."
    explanation: This study confirms that hypochondroplasia is characterized by disproportionate short stature caused by FGFR3 variants, consistent with rhizomelic limb shortening.
- name: Relative macrocephaly
  description: >
    Head circumference may be relatively large compared to body size, but frank
    macrocephaly is less common than in achondroplasia.
  frequency: HP_0040282
  phenotype_term:
    preferred_term: Relative macrocephaly
