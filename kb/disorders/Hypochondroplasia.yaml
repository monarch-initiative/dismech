  evidence:
  - reference: PMID:9887329
    reference_title: "A Lys644Glu substitution in fibroblast growth factor receptor 3 (FGFR3) causes dwarfism in mice by activation of STATs and ink4 cell cycle inhibitors."
    supports: SUPPORT
    evidence_source: MODEL_ORGANISM
    snippet: "the retardation of bone growth became more severe and showed phenotypes resembling those of achondroplasia patients, characterized by a dramatically reduced proliferation of growth plate cartilage, macrocephaly and shortening of the long bones"
    explanation: Mouse models of FGFR3 gain-of-function mutations demonstrate macrocephaly as a key feature, supporting relative macrocephaly as part of the hypochondroplasia phenotype.
- name: Lumbar hyperlordosis
  description: Exaggerated lumbar curvature, though generally milder than in
