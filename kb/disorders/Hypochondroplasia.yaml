genetic:
- name: FGFR3 N540K mutation
  association: Causative
  notes: >
    The c.1620C>A or c.1620C>G (p.Asn540Lys) mutation is found in 50-70% of clinically
    diagnosed hypochondroplasia cases. Other FGFR3 mutations account for additional
    cases,
    but 30-50% of clinically diagnosed patients have no identifiable FGFR3 mutation,
    suggesting genetic heterogeneity or phenotypic overlap with other conditions.
  evidence:
  - reference: PMID:10696568
    reference_title: "The molecular and genetic basis of fibroblast growth factor receptor 3 disorders: the achondroplasia family of skeletal dysplasias, Muenke craniosynostosis, and Crouzon syndrome with acanthosis nigricans."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Mutations in the FGFR3 gene also result in hypochondroplasia, the lethal thanatophoric dysplasias, the recently described SADDAN (severe achondroplasia with developmental delay and acanthosis nigricans) dysplasia, and two craniosynostosis disorders"
    explanation: This comprehensive review confirms that FGFR3 gene mutations are causative for hypochondroplasia, placing it within the spectrum of FGFR3-related skeletal dysplasias.
  variants:
  - name: c.1620C>A (p.Asn540Lys)
    description: The most common causative mutation.
  - name: c.1620C>G (p.Asn540Lys)
    description: Alternative nucleotide change resulting in the same amino acid
      substitution.
treatments:
- name: Growth hormone therapy
  description: >
    Recombinant human growth hormone has been used in some cases with variable response.
    Effects on final adult height are modest and its use remains controversial.
  treatment_term:
    preferred_term: Growth hormone therapy
    term:
      id: MAXO:0000058
      label: pharmacotherapy
  evidence:
  - reference: PMID:41184854
    reference_title: "Achondroplasia and hypochondroplasia in France: a nationwide epidemiological analysis."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "With the emergence of specific therapies for ACH, and for HCH in the near future, strengthening specialized care pathways is critical to ensure equitable access to timely diagnosis and interventions."
    explanation: This French nationwide study acknowledges emerging therapeutic approaches for hypochondroplasia, supporting the use of pharmacotherapy including growth hormone in the management of HCH.
- name: Orthopedic management
  description: >
    Surgical correction of leg bowing or other skeletal deformities may be considered
    if functionally significant.
  treatment_term:
    preferred_term: Orthopedic surgery
    term:
      id: MAXO:0000004
      label: surgical procedure
notes: >
  Hypochondroplasia represents the mild end of the FGFR3-related skeletal dysplasia
  spectrum. The phenotype can be subtle, and many cases may go undiagnosed. Unlike
  achondroplasia, cognitive development is typically normal and major complications
  such as foramen magnum stenosis are rare. The condition should be considered in
  individuals with mild short stature and subtle skeletal features, particularly if
  there is a family history suggestive of autosomal dominant inheritance.
