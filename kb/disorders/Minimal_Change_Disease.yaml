  - preferred_term: Nephrotic syndrome
    term:
      id: HP:0000100
      label: Nephrotic syndrome
  - preferred_term: Proteinuria
    term:
      id: HP:0000093
      label: Proteinuria
  evidence:
  - reference: clinicaltrials:NCT01763580
    supports: SUPPORT
