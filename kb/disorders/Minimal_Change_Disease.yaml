name: Minimal Change Disease
creation_date: "2026-04-13T00:00:00Z"
updated_date: "2026-04-13T00:00:00Z"
category: Complex
disease_term:
  preferred_term: Minimal Change Disease
  term:
    id: MONDO:0006835
    label: lipoid nephrosis
parents:
- Glomerular Diseases
- Nephrotic Syndrome
pathophysiology:
- name: Immune Dysregulation
  description: >
    MCD is driven by immune dysregulation involving both T-cell and B-cell
    compartments. Dysregulated T cells produce circulating permeability
    factors that target podocytes. Cytokine abnormalities include elevated
    GM-CSF, TRANCE, and urinary CD80 levels, indicating Th1/Th2/Th17
    imbalance. The dramatic response to corticosteroids and rituximab
    supports an immune-mediated pathogenesis.
  cell_types:
  - preferred_term: T cell
    term:
      id: CL:0000084
      label: T cell
  - preferred_term: B cell
    term:
      id: CL:0000236
      label: B cell
  biological_processes:
  - preferred_term: Immune Response
    term:
      id: GO:0006955
      label: immune response
  - preferred_term: Cytokine Production
    term:
      id: GO:0001816
      label: cytokine production
  downstream:
  - target: Podocyte Foot Process Effacement
    description: Circulating immune factors directly injure podocytes,
      disrupting foot process architecture and slit diaphragm integrity.
  evidence:
  - reference: PMID:35004732
    reference_title: "Molecular Mechanisms of Proteinuria in Minimal Change Disease."
    supports: SUPPORT
    evidence_source: OTHER
    snippet: "MCD has been traditionally thought to be mediated by an unknown
      circulating factor(s), probably released by T cells that directly target
      podocytes leading to podocyte ultrastructural changes and proteinuria."
    explanation: Reviews the circulating factor hypothesis and T-cell-mediated
      pathogenesis of MCD.
  - reference: PMID:33194357
    reference_title: "Th1/Th2/Th17 cytokines and urinary CD80 excretion in adult-onset minimal change disease."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "The cytokines GM-CSF and TRANCE are increased and the urinary
      CD80 levels are elevated in adult-onset MCD patients in relapse,
      indicating a disorder of Th1/Th2/Th17 balance and that the elevated
      excretion of CD80 may underlie the pathogenesis and development of
      adult-onset MCD"
    explanation: Demonstrates specific cytokine and CD80 abnormalities in
      MCD relapse, supporting immune dysregulation as a driver.
- name: Anti-Nephrin Autoantibody-Mediated Injury
  description: >
    A paradigm-shifting discovery identified anti-nephrin autoantibodies as
    causal agents in a substantial proportion of MCD patients. These
    antibodies target nephrin, the critical slit diaphragm protein, and
    correlate with disease activity. They decrease during remission and
    reappear before proteinuria relapse, serving as both pathogenic agents
    and predictive biomarkers.
  cell_types:
  - preferred_term: B cell
    term:
      id: CL:0000236
      label: B cell
  - preferred_term: Podocyte
    term:
      id: CL:0000653
      label: podocyte
  downstream:
  - target: Podocyte Foot Process Effacement
    description: Anti-nephrin antibodies directly disrupt slit diaphragm
      integrity, leading to podocyte foot process effacement.
  evidence:
  - reference: PMID:40147632
    reference_title: "Prevalence and Clinical Significance of Anti-Nephrin Antibodies in Adult Patients With Idiopathic Nephrotic Syndrome."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Anti-nephrin antibodies were detected in 43% of all patients,
      with 30% testing positive for anti-nephrin IgG, 26% for anti-nephrin
      IgM, and 13.1% for both antibodies."
    explanation: Establishes that anti-nephrin autoantibodies are present in
      a large proportion of MCD/FSGS patients, supporting an autoantibody-
      mediated mechanism.
  - reference: PMID:41563842
    reference_title: "A New Hope for Treating Podocytopathies: Emerging Role of Anti-Nephrin Antibody."
    supports: SUPPORT
    evidence_source: OTHER
    snippet: "The development of robust anti-nephrin autoantibody detection
      methods, the identification of these antibodies in idiopathic nephrotic
      syndrome, and the demonstration of their causal role in podocytopathy
      have led to a paradigm shift in our understanding of these diseases"
    explanation: Authoritative review confirming the paradigm-shifting nature
      of anti-nephrin antibody discovery in MCD.
- name: Podocyte Foot Process Effacement
  description: >
    The hallmark of MCD is diffuse effacement of podocyte foot processes
    visible on electron microscopy, despite normal-appearing glomeruli on
    light microscopy. Podocyte injury involves disruption of the actin
    cytoskeleton, nephrin and slit diaphragm disorganization, and loss
    of the glomerular filtration barrier, resulting in massive proteinuria.
  cell_types:
  - preferred_term: Podocyte
    term:
      id: CL:0000653
      label: podocyte
  biological_processes:
  - preferred_term: Regulation of Actin Cytoskeleton Organization
    term:
      id: GO:0032956
      label: regulation of actin cytoskeleton organization
  - preferred_term: Renal Filtration
    term:
      id: GO:0097205
      label: renal filtration
  downstream:
  - target: Nephrotic Syndrome Complications
    description: Loss of glomerular filtration barrier integrity causes
      massive proteinuria, leading to the clinical nephrotic syndrome
      with hypoalbuminemia, edema, and hypercoagulability.
  evidence:
  - reference: PMID:27940460
    reference_title: "Minimal Change Disease."
    supports: SUPPORT
    evidence_source: OTHER
    snippet: "The pathologic hallmark of disease is absence of visible
      alterations by light microscopy and effacement of foot processes by
      electron microscopy."
    explanation: Defines the characteristic ultrastructural finding of podocyte
      foot process effacement as the pathologic hallmark of MCD.
  - reference: PMID:29942802
    reference_title: "Molecular and Cellular Mechanisms for Proteinuria in Minimal Change Disease."
    supports: SUPPORT
    evidence_source: OTHER
    snippet: "The differences between the two conditions are not well defined,
      since molecular mechanisms may be shared by the two diseases."
    explanation: Discusses shared molecular mechanisms between MCD and FSGS,
      emphasizing that podocyte injury exists on a continuum.
- name: Nephrotic Syndrome Complications
  description: >
    Podocyte injury and loss of the glomerular filtration barrier result in
    massive proteinuria, leading to hypoalbuminemia, edema, hyperlipidemia,
    and hypercoagulability. Acute kidney injury occurs in approximately 40%
    of adult MCD patients. Thromboembolism occurs in approximately 9%.
  evidence:
  - reference: PMID:28089478
    reference_title: "Clinical course of adult-onset minimal change disease."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Acute kidney injury was observed in 50 (40%) patients. Recovery
      of kidney function occurred almost without exception. Arterial or
      venous thrombosis occurred in 11 (9%) patients."
    explanation: Largest adult case series documenting the high frequency of
      AKI and thromboembolism as complications of MCD.
- name: MCD to FSGS Progression
  description: >
    MCD and FSGS exist on a disease continuum. Chronic or severe podocyte
    injury can lead to podocyte loss, glomerular scarring, and histologic
    progression from MCD to FSGS. Frequent relapses and multi-drug
    dependence may drive this evolution.
  cell_types:
  - preferred_term: Podocyte
    term:
      id: CL:0000653
      label: podocyte
  evidence:
  - reference: PMID:29942802
    reference_title: "Molecular and Cellular Mechanisms for Proteinuria in Minimal Change Disease."
    supports: SUPPORT
    evidence_source: OTHER
    snippet: "Such multi-drug dependence and frequent relapses may cause
      disease evolution to focal and segmental glomerulosclerosis (FSGS)
      over time."
    explanation: Describes the clinical scenario in which MCD can progress
      to FSGS through chronic podocyte injury.
phenotypes:
- category: Clinical
  name: Nephrotic Syndrome
  description: >
    Massive proteinuria (>3.5 g/day in adults), hypoalbuminemia, edema,
    and hyperlipidemia constitute the classic presentation. In children,
    MCD accounts for 70-90% of idiopathic nephrotic syndrome.
  phenotype_term:
    preferred_term: Nephrotic syndrome
    term:
      id: HP:0000100
      label: Nephrotic syndrome
  evidence:
  - reference: PMID:27940460
    reference_title: "Minimal Change Disease."
    supports: SUPPORT
    evidence_source: OTHER
    snippet: "Minimal change disease (MCD) is a major cause of idiopathic
      nephrotic syndrome (NS), characterized by intense proteinuria leading
      to edema and intravascular volume depletion."
    explanation: Directly defines MCD as a major cause of nephrotic syndrome.
- category: Clinical
  name: Proteinuria
  description: >
    Heavy proteinuria predominantly of albumin (selective proteinuria) is
    characteristic. Proteinuria typically exceeds 3.5 g/day in adults and
    resolves with steroid treatment in steroid-sensitive disease.
  phenotype_term:
    preferred_term: Proteinuria
    term:
      id: HP:0000093
      label: Proteinuria
- category: Clinical
  name: Peripheral Edema
  description: >
    Generalized edema, often periorbital and dependent, due to
    hypoalbuminemia and sodium retention. May progress to anasarca
    in severe cases.
  phenotype_term:
    preferred_term: Peripheral edema
    term:
      id: HP:0012398
      label: Peripheral edema
- category: Clinical
  name: Hypoalbuminemia
  description: >
    Serum albumin falls below 2.5 g/dL due to massive urinary protein loss,
    contributing to edema and intravascular volume depletion.
  phenotype_term:
    preferred_term: Hypoalbuminemia
    term:
      id: HP:0003073
      label: Hypoalbuminemia
- category: Clinical
  name: Hyperlipidemia
  description: >
    Compensatory hepatic lipoprotein overproduction in response to
    hypoalbuminemia leads to elevated cholesterol and triglycerides.
  phenotype_term:
    preferred_term: Hyperlipidemia
    term:
      id: HP:0003077
      label: Hyperlipidemia
- category: Clinical
  name: Acute Kidney Injury
  description: >
    AKI occurs in approximately 40% of adult MCD patients. Recovery of
    kidney function is nearly universal, distinguishing MCD from other
    causes of nephrotic-range proteinuria with AKI.
  phenotype_term:
    preferred_term: Acute kidney injury
    term:
      id: HP:0001919
      label: Acute kidney injury
  evidence:
  - reference: PMID:28089478
    reference_title: "Clinical course of adult-onset minimal change disease."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Acute kidney injury was observed in 50 (40%) patients. Recovery
      of kidney function occurred almost without exception."
    explanation: Documents that AKI is a frequent but reversible complication
      in adult MCD.
- category: Clinical
  name: Thromboembolism
  description: >
    Arterial or venous thromboembolism occurs in approximately 9% of adult
    MCD patients, driven by nephrotic syndrome-associated hypercoagulability
    and further amplified by concurrent AKI.
  phenotype_term:
    preferred_term: Thromboembolism
    term:
      id: HP:0001907
      label: Thromboembolism
  evidence:
  - reference: PMID:28089478
    reference_title: "Clinical course of adult-onset minimal change disease."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Arterial or venous thrombosis occurred in 11 (9%) patients."
    explanation: Quantifies thromboembolism risk in adult MCD.
genetic:
- name: HLA-DQA1/DQB1
  association: RISK
  notes: >
    HLA-DQA1*0201 and HLA-DQB1*0201 are strongly associated with steroid-
    sensitive nephrotic syndrome with relative risks of 3.8-8.5. HLA-DRB1*07
    shows a relative risk of 6.2. These HLA class II associations are
    specific to steroid-sensitive disease and absent in steroid-resistant
    nephrotic syndrome, reinforcing the immune-mediated pathogenesis.
  evidence:
  - reference: PMID:9203175
    reference_title: "HLA class II oligotyping in early childhood idiopathic nephrotic syndrome."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "In steroid-sensitive patients we observed an increased frequency
      of the alleles HLA-DQA1*0201 and -DQB1*0201 in both populations with
      relative risks ranging from 3.8 to 8.5"
    explanation: Establishes specific HLA class II allele associations with
      steroid-sensitive nephrotic syndrome.
  - reference: PMID:30761277
    reference_title: "Genetics of Childhood Steroid Sensitive Nephrotic Syndrome."
    supports: SUPPORT
    evidence_source: OTHER
    snippet: "Recent exome and genome wide association studies from well-defined
      cohorts of children with SSNS identified variants in multiple MHC class
      II molecules such as HLA-DQA1 and HLA-DQB1 as risk factors for SSNS,
      thus stressing the central role of adaptive immunity in the pathogenesis
      of SSNS"
    explanation: GWAS confirmation of HLA class II involvement in steroid-
      sensitive nephrotic syndrome.
environmental:
- name: Drug-Induced MCD
  description: >
    NSAIDs are the most common drug trigger. Immune checkpoint inhibitors,
    interferons, D-penicillamine, tiopronin, and bisphosphonates have also
    been associated with secondary MCD.
  evidence:
  - reference: PMID:37973491
    reference_title: "Drug-Induced Glomerular Diseases."
    supports: SUPPORT
    evidence_source: OTHER
    snippet: "Drugs such as non-steroidal anti-inflammatory drugs (NSAIDs),
      D-penicillamine, tiopronin, trace elements, bisphosphonate, and
      interferons have been historically associated with the occurrence
      of MCD, FSGS, and MN"
    explanation: Comprehensive review of drug triggers for secondary MCD.
treatments:
- name: Corticosteroid Therapy
  description: >
    First-line treatment for MCD. Achieves complete remission in 85-90%
    of children and 75-88% of adults. Median time to remission is 2-4
    weeks in children and 4 weeks in adults. Relapse rates are high
    (60-80% lifetime in children, 54% in adults), necessitating
    steroid-sparing strategies for frequently relapsing disease.
  treatment_term:
    preferred_term: Corticosteroid therapy
    term:
      id: MAXO:0000058
      label: pharmacotherapy
  evidence:
  - reference: PMID:28089478
    reference_title: "Clinical course of adult-onset minimal change disease."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "After 16 weeks of corticosteroid treatment, 92 (88%) of these
      patients had reached remission."
    explanation: Largest adult case series documenting high steroid response
      rate in MCD.
  - reference: PMID:27940460
    reference_title: "Minimal Change Disease."
    supports: SUPPORT
    evidence_source: OTHER
    snippet: "The mainstay of therapy is prednisone, but steroid-sensitive
      forms frequently relapse and this leads to a percentage of patients
      requiring second-line steroid-sparing immunosuppression."
    explanation: Confirms prednisone as first-line therapy and the need for
      steroid-sparing agents due to frequent relapse.
- name: Rituximab
  description: >
    Anti-CD20 monoclonal antibody with a 78% overall response rate in adult
    MCD. Increasingly used for frequently relapsing or steroid-dependent
    disease. Targeting B cells is consistent with the anti-nephrin
    autoantibody-mediated pathogenesis model.
  treatment_term:
    preferred_term: Rituximab therapy
    term:
      id: MAXO:0000058
      label: pharmacotherapy
  evidence:
  - reference: PMID:24920841
    reference_title: "Rituximab for minimal-change disease in adulthood."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Complete (NS remission and withdrawal of all immunosuppressants)
      and partial (NS remission and withdrawal of at least one
      immunosuppressants) clinical responses were obtained for 25 and 7
      patients, respectively (overall response 78%)"
    explanation: Demonstrates high rituximab efficacy in adult MCD with
      quantified complete and partial response rates.
- name: Calcineurin Inhibitors
  description: >
    Cyclosporine and tacrolimus are used as steroid-sparing agents for
    frequently relapsing or steroid-dependent MCD. Combined with reduced-
    dose prednisolone, they achieve equivalent remission rates with
    significantly reduced Cushingoid side effects.
  treatment_term:
    preferred_term: Calcineurin inhibitor therapy
    term:
      id: MAXO:0000058
      label: pharmacotherapy
  evidence:
  - reference: PMID:35230699
    reference_title: "Interventions for minimal change disease in adults with nephrotic syndrome."
    supports: SUPPORT
    evidence_source: OTHER
    snippet: "Compared with prednisolone alone, CNIs with reduced-dose
      prednisolone or without prednisolone probably make little or no
      difference to the number achieving complete remission"
    explanation: Cochrane systematic review showing CNIs achieve equivalent
      remission with reduced steroid side effects.
prevalence:
- population: Children
  percentage: 2
  notes: >
    MCD accounts for 70-90% of idiopathic nephrotic syndrome in children
    >1 year of age. Annual incidence of 2-7 per 100,000 children with
    peak onset at ages 2-6 years. Male-to-female ratio approximately 2:1.
  evidence:
  - reference: PMID:27940460
    reference_title: "Minimal Change Disease."
    supports: SUPPORT
    evidence_source: OTHER
    snippet: "In adults, it accounts for approximately 15% of patients with
      idiopathic NS, reaching a much higher percentage at younger ages, up
      to 70%-90% in children >1 year of age."
    explanation: Provides epidemiological data for MCD prevalence by age group.
- population: Adults
  percentage: 0.5
  notes: >
    MCD accounts for approximately 15-25% of adult nephrotic syndrome,
    with a second smaller peak at ages 40-50 years. Kidney biopsy is
    required for definitive diagnosis in adults.
progression:
- phase: Acute Presentation
  age_range: Childhood to Adulthood
  notes: >
    Sudden onset of nephrotic syndrome with massive proteinuria,
    edema, hypoalbuminemia, and hyperlipidemia. In children, diagnosis
    is clinical; in adults, kidney biopsy is required.
- phase: Steroid Response and Relapse
  age_range: Childhood to Adulthood
  notes: >
    85-90% of children and 75-88% of adults achieve remission with
    corticosteroids. However, 60-80% of children and 54% of adults
    relapse, often requiring steroid-sparing immunosuppression.
- phase: Long-Term Outcome
  notes: >
    Renal function is generally preserved in steroid-sensitive disease.
    Histologic chronicity at diagnosis predicts kidney survival, with
    each one-point increase in chronicity score raising dialysis risk
    by 31%. Approximately 33% of childhood MCD patients relapse in
    adulthood.
  evidence:
  - reference: PMID:33090339
    reference_title: "Histological Chronic Changes Predict Outcomes in Adult MCD."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "each one-point increase in score raised with 27% the risk
      of relapse and with 31% the risk of dialysis initiation."
    explanation: Demonstrates that histologic chronicity independently
      predicts both relapse risk and kidney survival in adult MCD.
notes: >
  MCD exists on a continuum with focal segmental glomerulosclerosis (FSGS),
  sharing pathogenic mechanisms and potential for progression. The 2024-2026
  discovery of anti-nephrin autoantibodies has fundamentally altered our
  understanding, transforming MCD from a mysterious circulating factor
  disease into a partially autoantibody-mediated podocytopathy.
