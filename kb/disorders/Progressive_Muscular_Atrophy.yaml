differential_diagnoses:
- name: Amyotrophic Lateral Sclerosis
  disease_term:
    preferred_term: amyotrophic lateral sclerosis
    term:
      id: MONDO:0004976
      label: amyotrophic lateral sclerosis
  description: Classic ALS combines clinical upper and lower motor neuron signs; PMA lacks clinical upper motor neuron signs but lies on the same TDP-43 spectrum and may convert to ALS.
  distinguishing_features:
  - PMA lacks clinical upper motor neuron signs (spasticity, hyperreflexia, Babinski) at presentation.
  - A proportion of PMA patients develop upper motor neuron signs and convert to clinically definite ALS over time.
  - PMA generally carries longer survival than classic ALS.
  evidence:
  - reference: PMID:19917992
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "In PMA, patients were more likely to be male (p < 0.001), older (p = 0.007), and lived longer (p = 0.01) than in ALS."
    explanation: Direct cohort comparison documents longer survival and demographic differences distinguishing PMA from ALS.
- name: Multifocal Motor Neuropathy
  disease_term:
    preferred_term: multifocal motor neuropathy
    term:
      id: MONDO:0018979
      label: multifocal motor neuropathy
  description: A treatable, immune-mediated pure motor neuropathy that mimics lower motor neuron disease and must be excluded before diagnosing PMA.
  distinguishing_features:
  - Multifocal motor conduction block on nerve conduction studies (absent in PMA).
  - Frequently elevated anti-GM1 IgM antibodies.
  - Responds to immunotherapy (e.g., cyclophosphamide, IVIG), unlike PMA.
  evidence:
  - reference: PMID:2843079
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Both patients were initially diagnosed as having lower motor neuron forms of amyotrophic lateral sclerosis."
    explanation: >
      Patients with treatable multifocal motor neuropathy were initially misdiagnosed as
      lower motor neuron motor neuron disease, illustrating why MMN must be excluded
      before diagnosing PMA.
  - reference: PMID:2843079
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Treatment with cyclophosphamide, however, was followed by marked improvement in strength in both patients."
    explanation: The treatability of MMN underscores the clinical importance of distinguishing it from PMA.
- name: Spinal Muscular Atrophy
  disease_term:
    preferred_term: spinal muscular atrophy
    term:
      id: MONDO:0001516
      label: spinal muscular atrophy
  description: A hereditary lower motor neuron disorder (commonly SMN1-related) presenting with anterior horn cell loss; PMA is sporadic and adult-onset.
  distinguishing_features:
  - SMA is hereditary (typically autosomal recessive SMN1 deletion); PMA is sporadic.
  - SMA usually has earlier (often childhood) onset, whereas PMA is an adult-onset disease.
  evidence:
  - reference: PMID:17420313
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "To investigate the natural history and prognostic factors in patients with nonhereditary, adult-onset progressive muscular atrophy."
    explanation: >
      PMA is explicitly defined as nonhereditary and adult-onset, distinguishing it from
      hereditary, typically earlier-onset spinal muscular atrophy.
