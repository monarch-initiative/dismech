name: Progressive Muscular Atrophy
creation_date: "2026-06-26T00:00:00Z"
category: Complex
description: >
  Progressive muscular atrophy (PMA) is a sporadic, adult-onset motor neuron disease
  clinically restricted to the lower motor neurons, presenting with slowly progressive
  flaccid weakness, muscle wasting, fasciculations, and reduced or absent tendon reflexes
  without clinical upper motor neuron signs. Degeneration of anterior horn and brainstem
  lower motor neurons drives skeletal muscle denervation. At autopsy PMA shares the
  TDP-43 proteinopathy of amyotrophic lateral sclerosis, and a substantial fraction of
  patients develop upper motor neuron signs over time, converting to clinically definite
  ALS; PMA is therefore regarded as a lower-motor-neuron-predominant variant within the
  ALS spectrum. It is a diagnosis of exclusion that must be distinguished from treatable
  lower motor neuron mimics, and generally carries longer survival than classic ALS.
disease_term:
  preferred_term: progressive muscular atrophy
  term:
    id: MONDO:0018687
    label: progressive muscular atrophy
parents:
- Motor Neuron Disease
- Neurodegenerative Disease
pathophysiology:
- name: Lower Motor Neuron Degeneration
  description: >
    Progressive degeneration of lower motor neurons in the anterior (ventral) horn of the
    spinal cord and the brainstem motor nuclei produces denervation of skeletal muscle.
    Loss of these alpha motor neurons clinically manifests as flaccid weakness, muscle
    atrophy, fasciculations, and hyporeflexia or areflexia, with no clinical evidence of
    upper motor neuron involvement at presentation.
  cell_types:
  - preferred_term: spinal cord motor neuron
    term:
      id: CL:0011001
      label: spinal cord motor neuron
  - preferred_term: motor neuron
    term:
      id: CL:0000100
      label: motor neuron
  locations:
  - preferred_term: anterior horn of the spinal cord
    term:
      id: UBERON:0002257
      label: ventral horn of spinal cord
  - preferred_term: medulla oblongata (brainstem motor nuclei)
    term:
      id: UBERON:0001896
      label: medulla oblongata
  biological_processes:
  - preferred_term: motor neuron apoptotic death
    term:
      id: GO:0043523
      label: regulation of neuron apoptotic process
    modifier: INCREASED
  evidence:
  - reference: PMID:19917992
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Progressive muscular atrophy (PMA) is clinically characterized by signs of lower motor neuron dysfunction and may evolve into amyotrophic lateral sclerosis (ALS)."
    explanation: >
      Large clinical cohort defines PMA as a lower-motor-neuron syndrome, establishing
      lower motor neuron dysfunction as the defining pathophysiology.
  - reference: PMID:21225272
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "All patients showed significant TDP-43 linked degeneration of LMNs"
    explanation: >
      Autopsy series of isolated lower-motor-neuron disease and PMA confirms degeneration
      of lower motor neurons.
  downstream:
  - target: Skeletal Muscle Denervation and Atrophy
    description: Loss of lower motor neurons denervates skeletal muscle, producing weakness and wasting.
    evidence:
    - reference: PMID:21225272
      supports: SUPPORT
      evidence_source: HUMAN_CLINICAL
      snippet: "All patients showed significant TDP-43 linked degeneration of LMNs"
      explanation: Lower motor neuron loss is the proximate cause of downstream muscle denervation.
- name: TDP-43 Proteinopathy
  description: >
    Despite clinical restriction to the lower motor neuron, PMA shares the molecular
    neuropathology of ALS: widespread neuronal and glial accumulation of pathological,
    cytoplasmic 43 kDa transactive response DNA-binding protein (TDP-43) inclusions
    across the central nervous system. TDP-43 is an RNA-binding protein, and its nuclear
    depletion and cytoplasmic aggregation disrupt RNA processing in vulnerable motor
    neurons. This places PMA, isolated lower-motor-neuron disease, ALS, and FTLD-TDP on a
    single TDP-43 proteinopathy continuum. A minority of slowly progressive
    lower-motor-neuron-predominant cases lack TDP-43 inclusions at autopsy, indicating
    molecular heterogeneity within the clinical syndrome.
  cell_types:
  - preferred_term: motor neuron
    term:
      id: CL:0000100
      label: motor neuron
  genes:
  - preferred_term: TARDBP
    term:
      id: hgnc:11571
      label: TARDBP
  biological_processes:
  - preferred_term: TDP-43 inclusion body assembly
    term:
      id: GO:0070841
      label: inclusion body assembly
    modifier: INCREASED
  - preferred_term: RNA processing
    term:
      id: GO:0006397
      label: mRNA processing
    modifier: ABNORMAL
  evidence:
  - reference: PMID:21225272
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "MND limited to the LMN and PMA is part of a disease continuum that includes ALS and FTLD-TDP, all of which are characterized by widespread TDP-43 pathology"
    explanation: >
      Neuropathological study demonstrates that PMA carries the same widespread TDP-43
      proteinopathy as ALS, placing it on a shared disease continuum.
  - reference: PMID:21225272
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "we suggest that the next revision of the El Escorial criteria for the diagnosis of ALS include MND patients with disease clinically limited to the LMN and PMA as variants of ALS, which like classical ALS, are TDP-43 proteinopathies"
    explanation: >
      Authors classify PMA as a TDP-43 proteinopathy variant of ALS based on the
      autopsy distribution of TDP-43 pathology.
  - reference: PMID:30511354
    supports: PARTIAL
    evidence_source: HUMAN_CLINICAL
    snippet: "there may be a sporadic ALS subgroup that progresses slowly and shows no accumulation of phosphorylated TDP-43"
    explanation: >
      Clinicopathological report documents TDP-43-negative slowly progressive
      lower-motor-neuron-predominant ALS, qualifying the universality of TDP-43
      proteinopathy in the PMA phenotype.
- name: Phenotypic Conversion to ALS Spectrum
  description: >
    PMA is not a fixed entity but the lower-motor-neuron-predominant pole of the ALS
    spectrum. A substantial proportion of patients clinically diagnosed with PMA develop
    upper motor neuron signs during follow-up and convert to clinically definite ALS, and
    upper motor neuron pathology is frequently demonstrable at autopsy even when clinical
    signs are absent. This continuum has direct clinical and trial-design consequences,
    and motivates classifying PMA as a form of ALS rather than a distinct disease.
  cell_types:
  - preferred_term: motor neuron
    term:
      id: CL:0000100
      label: motor neuron
  evidence:
  - reference: PMID:19917992
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Upper motor neuron (UMN) signs developed in 22% of patients with PMA within 61 months after diagnosis."
    explanation: >
      Cohort quantifies clinical conversion: 22% of PMA patients develop upper motor
      neuron signs within ~5 years, demonstrating progression along the ALS spectrum.
  - reference: PMID:19917992
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "PMA is relentlessly progressive, and UMN involvement can occur, as also reported in imaging and postmortem studies. For these reasons, PMA should be considered a form of ALS."
    explanation: >
      Authors conclude that occult and clinical upper motor neuron involvement justifies
      classifying PMA as a form of ALS.
  - reference: PMID:30511354
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "clinically appeared to only affect the lower motor neurons; however, upper motor neuron degeneration was detected at autopsy"
    explanation: >
      Long-course case with purely clinical lower-motor-neuron presentation shows
      subclinical upper motor neuron degeneration at autopsy, supporting occult ALS-spectrum
      pathology.
- name: Skeletal Muscle Denervation and Atrophy
  description: >
    Loss of lower motor neurons removes trophic and contractile innervation of skeletal
    muscle fibers, producing chronic neurogenic atrophy. Clinically this manifests as
    relentlessly progressive flaccid weakness and wasting, often beginning asymmetrically
    and distally, accompanied by fasciculations and cramps, with electrophysiological
    evidence of denervation. Progressive respiratory muscle involvement (declining vital
    capacity) is the principal determinant of survival.
  biological_processes:
  - preferred_term: motor neuron apoptotic process
    term:
      id: GO:0006915
      label: apoptotic process
    modifier: INCREASED
  evidence:
  - reference: PMID:17420313
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Significant decline of muscle strength"
    explanation: >
      Prospective inception cohort documents progressive loss of muscle strength,
      reflecting ongoing denervation and neurogenic atrophy.
  - reference: PMID:17420313
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Vital capacity (VC) at baseline and decrease of VC during the first 6 months were significantly associated with outcome."
    explanation: >
      Respiratory muscle denervation, indexed by vital capacity, predicts survival,
      linking the denervation cascade to clinical outcome.
