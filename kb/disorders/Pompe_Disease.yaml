  downstream:
  - target: Skeletal and respiratory myofiber injury
    description: Autophagic buildup and impaired lysosomal delivery contribute to progressive muscle fiber damage.
- name: Skeletal and respiratory myofiber injury
  description: >
    Glycogen storage and autophagic debris injure skeletal and respiratory muscle
    fibers, producing progressive limb-girdle weakness, exercise intolerance, and
    respiratory insufficiency.
