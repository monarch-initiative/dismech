  downstream:
  - target: Autophagy dysregulation
    description: Glycogen-overloaded lysosomes perturb lysosome-dependent autophagic flux in muscle.
  - target: Skeletal and respiratory myofiber injury
    description: Glycogen storage in skeletal and respiratory muscles disrupts contractile tissue and respiratory mechanics.
  - target: Cardiomyocyte glycogen storage and hypertrophic remodeling
    description: Glycogen storage in cardiomyocytes drives the hypertrophic cardiac phenotype of infantile-onset disease.
- name: Autophagy dysregulation
  description: >
    Beyond glycogen accumulation, Pompe disease involves profound dysregulation of
    autophagy. Autophagic buildup in type II muscle fibers represents a major
    pathological feature in both IOPD and LOPD. Impaired autophagosome-lysosome
    fusion leads to accumulation of autophagic debris, which can be as destructive
    to muscle architecture as glycogen storage itself. This autophagic pathology may
    limit the effectiveness of enzyme replacement therapy.
  evidence:
  - reference: PMID:20040311
    reference_title: "Autophagy in skeletal muscle: implications for Pompe disease."
    supports: SUPPORT
    evidence_source: MODEL_ORGANISM
    snippet: "In the GAA-knockout mouse model, progressive accumulation of autophagic vesicles is restricted to Type II-rich muscle fibers. Not only does this build-up of autophagosomes disrupt the contractile apparatus in the muscle fibers, it also interferes with enzyme replacement therapy by acting as a sink for the recombinant enzyme and preventing its efficient delivery to the lysosomes."
    explanation: Shea and Raben demonstrated in GAA-knockout mice that autophagic buildup disrupts muscle architecture and impairs ERT efficacy by preventing enzyme delivery to lysosomes.
  - reference: PMID:38785980
    reference_title: "Failure of Autophagy in Pompe Disease."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "The autophagic pathway is largely responsible for the delivery of cytosolic glycogen to the lysosome where it is degraded to glucose via acid α-glucosidase."
    explanation: Do, Meena, and Raben review links lysosome-dependent autophagy to glycogen delivery and acid alpha-glucosidase-dependent degradation.
  biological_processes:
  - preferred_term: Autophagy
    term:
      id: GO:0006914
      label: autophagy
  cell_types:
  - preferred_term: Skeletal muscle fiber
    term:
      id: CL:0008002
