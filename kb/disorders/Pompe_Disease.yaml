name: Pompe Disease
creation_date: '2026-03-08T00:00:00Z'
updated_date: '2026-03-09T00:00:00Z'
category: Mendelian
description: >
  Pompe disease (glycogen storage disease type II, acid maltase deficiency) is an
  autosomal recessive lysosomal storage disorder caused by deficiency of acid
  alpha-glucosidase (GAA), the enzyme responsible for lysosomal glycogen degradation.
  GAA deficiency leads to progressive glycogen accumulation in lysosomes, particularly
  in skeletal muscle, cardiac muscle, and smooth muscle. The disease spans a clinical
  continuum from severe infantile-onset Pompe disease (IOPD), characterized by
  hypertrophic cardiomyopathy, generalized hypotonia, and death within the first
  year if untreated, to late-onset Pompe disease (LOPD), presenting with progressive
  proximal myopathy and respiratory insufficiency. Enzyme replacement therapy with
  recombinant human GAA (alglucosidase alfa, avalglucosidase alfa) has transformed
  outcomes, particularly in IOPD when initiated early.
disease_term:
  preferred_term: Pompe disease
  term:
    id: MONDO:0009290
    label: glycogen storage disease II
parents:
- Glycogen Storage Disease
- Lysosomal Storage Disease
has_subtypes:
- name: Infantile-onset Pompe disease (IOPD)
  description: >
    Classic infantile-onset form presenting within the first few months of life with
    hypertrophic cardiomyopathy, profound hypotonia (floppy infant), feeding
    difficulties, failure to thrive, hepatomegaly, and macroglossia. Without
    treatment, death typically occurs from cardiorespiratory failure before age 1-2
    years. Residual GAA enzyme activity is usually less than 1%.
- name: Late-onset Pompe disease (LOPD)
  description: >
    Encompasses childhood, juvenile, and adult-onset forms presenting with progressive
    proximal and limb-girdle muscle weakness, respiratory insufficiency, and elevated
    creatine kinase. Cardiac involvement is typically absent or minimal. Residual GAA
    enzyme activity is usually 1-30%. Symptoms may present from early childhood to
    late adulthood depending on residual enzyme activity.
inheritance:
- name: Autosomal recessive
  inheritance_term:
    preferred_term: Autosomal recessive inheritance
    term:
      id: HP:0000007
      label: Autosomal recessive inheritance
  description: >
    Pompe disease is inherited in an autosomal recessive manner. Affected individuals
    carry biallelic pathogenic variants in the GAA gene. Carrier frequency is estimated
    at approximately 1 in 100-200 in most populations. Disease incidence varies by
    population, estimated at approximately 1 in 40,000 overall.
  evidence:
  - reference: PMID:18929906
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "It is a pan-ethnic autosomal recessive trait characterised by acid
      alpha-glucosidase deficiency leading to lysosomal glycogen storage."
    explanation: The Lancet review by van der Ploeg and Reuser establishes Pompe
      disease as an autosomal recessive trait.
pathophysiology:
- name: Lysosomal glycogen accumulation
  description: >
    Deficiency of acid alpha-glucosidase (GAA) prevents normal lysosomal degradation
    of glycogen. Glycogen progressively accumulates within lysosomes, causing massive
    lysosomal enlargement and eventual rupture. In skeletal muscle, this leads to
    displacement and destruction of contractile elements. In cardiac muscle, glycogen
    storage causes progressive hypertrophic cardiomyopathy. The extent of glycogen
    accumulation correlates with residual GAA enzyme activity.
  gene:
    preferred_term: GAA
    description: Acid alpha-glucosidase, a lysosomal enzyme that hydrolyzes
      alpha-1,4 and alpha-1,6 glycosidic linkages in glycogen to release glucose.
    modifier: DECREASED
    term:
      id: hgnc:4065
      label: GAA
  evidence:
  - reference: PMID:32745073
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "GAA catalyzes the hydrolysis of \u03B1-1,4 and \u03B1-1,6-glucosidic
      bonds of glycogen and its deficiency leads to lysosomal storage of glycogen in
      several tissues, particularly in muscle."
    explanation: Taverna et al. review confirms that GAA deficiency leads to
      lysosomal glycogen storage predominantly in muscle tissue.
  - reference: PMID:18929906
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "acid alpha-glucosidase deficiency leading to lysosomal glycogen storage"
    explanation: The Lancet review establishes the core pathogenic mechanism
      of GAA deficiency causing lysosomal glycogen accumulation.
