name: Pompe disease
creation_date: '2026-03-07T20:39:14Z'
updated_date: '2026-03-07T21:02:10Z'
category: Mendelian
parents:
- Lysosomal storage disease
- Glycogen storage disease
synonyms:
- Glycogen storage disease type II
- Acid maltase deficiency
description: >-
  Pompe disease is an autosomal recessive lysosomal storage disorder caused by
  acid alpha-glucosidase (GAA) deficiency, resulting in glycogen accumulation in
  multiple tissues with predominant skeletal and respiratory muscle involvement.

has_subtypes:
- name: Infantile-onset Pompe disease
  description: >-
    Severe early-onset form, often presenting in infancy and typically associated
    with cardiomyopathy and rapid progression when untreated.
  evidence:
  - reference: PMID:41450529
    supports: SUPPORT
    snippet: "The disease is classified into infantile-onset and late-onset forms and is treated with enzyme replacement therapy."
    explanation: Supports explicit classification into infantile-onset and late-onset forms.
- name: Late-onset Pompe disease
  description: >-
    Later-onset form with variable progression, classically dominated by proximal
    muscle weakness and respiratory involvement.
  evidence:
  - reference: PMID:41450529
    supports: SUPPORT
    snippet: "The disease is classified into infantile-onset and late-onset forms and is treated with enzyme replacement therapy."
    explanation: Supports explicit classification into infantile-onset and late-onset forms.

pathophysiology:
- name: GAA deficiency and lysosomal glycogen accumulation
  description: >-
    Deficiency of lysosomal acid alpha-glucosidase causes abnormal glycogen
    accumulation across tissues, establishing the core molecular mechanism of
    Pompe disease.
  genes:
  - preferred_term: GAA
    term:
      id: hgnc:4065
      label: GAA
  biological_processes:
  - preferred_term: glycogen catabolic process
    term:
      id: GO:0005980
      label: glycogen catabolic process
  - preferred_term: lysosomal transport
    term:
      id: GO:0007041
      label: lysosomal transport
  evidence:
  - reference: PMID:41783848
    supports: SUPPORT
    snippet: "Pompe disease is an autosomal recessive lysosomal storage disorder caused by deficiency of acid alpha-glucosidase (GAA), leading to pathological glycogen accumulation in multiple tissues."
    explanation: Directly supports the causative GAA deficiency and glycogen accumulation mechanism.

- name: Broad tissue involvement with muscle-predominant pathology
  description: >-
    Pathologic glycogen storage affects multiple tissues, but clinical disability
    is frequently driven by progressive myopathy and respiratory muscle weakness.
  biological_processes:
  - preferred_term: muscle system process
    term:
      id: GO:0003012
      label: muscle system process
  evidence:
  - reference: PMID:41783848
    supports: SUPPORT
    snippet: "Pompe disease is an autosomal recessive lysosomal storage disorder caused by deficiency of acid alpha-glucosidase (GAA), leading to pathological glycogen accumulation in multiple tissues."
    explanation: Supports multisystem glycogen storage pathology underlying downstream muscle disease.

phenotypes:
- name: Muscle weakness
  category: Musculoskeletal
  frequency: VERY_FREQUENT
  description: >-
    Progressive skeletal muscle weakness is a central and often disabling
    manifestation, especially in late-onset disease.
  phenotype_term:
    preferred_term: Muscle weakness
    term:
      id: HP:0001324
      label: Muscle weakness
  evidence:
  - reference: PMID:41769220
    supports: SUPPORT
    snippet: "Late-onset Pompe disease (LOPD) is a rare inherited disorder caused by deficiency of the lysosomal enzyme acid α-glucosidase (GAA), leading to an accumulation of lysosomal glycogen in tissues, profoundly affecting muscle function and causing progressive weakness."
    explanation: Directly supports progressive weakness and muscle function impairment in late-onset Pompe disease.

- name: Hypertrophic cardiomyopathy in infantile disease
  category: Cardiac
  frequency: FREQUENT
  description: >-
    Infantile-onset disease often manifests with marked cardiomyopathy that is a
    major determinant of early morbidity and mortality.
  phenotype_term:
    preferred_term: Hypertrophic cardiomyopathy
    term:
      id: HP:0001639
      label: Hypertrophic cardiomyopathy
  evidence:
  - reference: PMID:40947720
    supports: PARTIAL
    snippet: "While ERT significantly improves survival, cardiomyopathy, and respiratory function, its limited uptake in skeletal muscle and immunogenicity pose challenges."
    explanation: Supports cardiomyopathy as a major clinical domain in Pompe disease responsive to therapy, though not exclusive to infantile cases.

- name: Respiratory muscle involvement and ventilatory risk
  category: Respiratory
  frequency: FREQUENT
  description: >-
    Progressive respiratory muscle impairment can lead to ventilatory support
    needs and contributes substantially to long-term disease burden.
  phenotype_term:
    preferred_term: Respiratory insufficiency
    term:
      id: HP:0002093
      label: Respiratory insufficiency
  evidence:
  - reference: PMID:29155436
    supports: SUPPORT
    snippet: "Long-term alglucosidase alfa treatment markedly extended survival as well as ventilation-free survival and improved cardiomyopathy (low-quality evidence)."
    explanation: Supports ventilatory outcomes as a clinically meaningful disease burden domain in infantile-onset Pompe disease.

genetic:
- name: GAA
  association: Causative
  notes: >-
    Pathogenic variants in GAA underlie disease; reported molecular heterogeneity
    includes missense, nonsense, insertion/deletion, and splicing variants.
  evidence:
  - reference: PMID:40947720
    supports: SUPPORT
    snippet: "Over 500 mutations in the GAA gene, including missense, nonsense, insertions, deletions, and splicing defects, contribute to varying levels of enzyme deficiency, accounting for the diverse clinical manifestations of Pompe disease."
    explanation: Supports broad allelic heterogeneity and genotype-related variability in disease expression.

biochemical:
- name: Acid alpha-glucosidase (GAA) activity
  presence: Decreased
  context: Enzymatic deficiency is the defining biochemical abnormality in Pompe disease.
  evidence:
  - reference: PMID:41450529
    supports: SUPPORT
    snippet: "Pompe disease is a rare, inherited metabolic disorder characterised by lysosomal acid alpha-glucosidase deficiency."
    explanation: Directly supports deficient lysosomal acid alpha-glucosidase activity.

treatments:
- name: Enzyme replacement therapy
  description: >-
    Recombinant GAA-based enzyme replacement remains the core disease-modifying
    therapy across disease phenotypes.
  evidence:
  - reference: PMID:41450529
    supports: SUPPORT
    snippet: "The disease is classified into infantile-onset and late-onset forms and is treated with enzyme replacement therapy."
    explanation: Supports ERT as standard treatment in contemporary clinical guidance.

- name: Alglucosidase alfa (recombinant human GAA)
  description: >-
    Alglucosidase alfa is widely used in infantile-onset disease and is associated
    with improved survival and ventilation-related outcomes.
  evidence:
  - reference: PMID:29155436
    supports: SUPPORT
    snippet: "Long-term alglucosidase alfa treatment markedly extended survival as well as ventilation-free survival and improved cardiomyopathy (low-quality evidence)."
    explanation: Supports key survival and cardiopulmonary benefits reported for long-term alglucosidase alfa therapy.

- name: Next-generation ERT strategies
  description: >-
    Newer ERT approaches, including avalglucosidase alfa and cipaglucosidase alfa
    plus miglustat, are being used to improve efficacy and safety in late-onset disease.
  evidence:
  - reference: PMID:41783848
    supports: SUPPORT
    snippet: "Next-generation ERTs, including avalglucosidase alfa and cipaglucosidase alfa combined with miglustat, have improved outcomes and safety."
    explanation: Supports newer ERT options and reported improvements in outcomes and safety.
