name: Pompe Disease
creation_date: '2026-03-08T00:00:00Z'
updated_date: '2026-04-29T19:25:04Z'
category: Mendelian
description: >
  Pompe disease (glycogen storage disease type II, acid maltase deficiency) is an
  autosomal recessive lysosomal storage disorder caused by deficiency of acid
  alpha-glucosidase (GAA), the enzyme responsible for lysosomal glycogen degradation.
  GAA deficiency leads to progressive glycogen accumulation in lysosomes, particularly
  in skeletal muscle, cardiac muscle, and smooth muscle. The disease spans a clinical
  continuum from severe infantile-onset Pompe disease (IOPD), characterized by
  hypertrophic cardiomyopathy, generalized hypotonia, and death within the first
  year if untreated, to late-onset Pompe disease (LOPD), presenting with progressive
  proximal myopathy and respiratory insufficiency. Enzyme replacement therapy with
  recombinant human GAA (alglucosidase alfa, avalglucosidase alfa) has transformed
  outcomes, particularly in IOPD when initiated early.
