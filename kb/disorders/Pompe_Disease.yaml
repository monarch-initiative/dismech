has_subtypes:
- name: IOPD
  display_name: Infantile-onset Pompe disease (IOPD)
  description: >
    Classic infantile-onset form presenting within the first few months of life with
    hypertrophic cardiomyopathy, profound hypotonia (floppy infant), feeding
    difficulties, failure to thrive, hepatomegaly, and macroglossia. Without
    treatment, death typically occurs from cardiorespiratory failure before age 1-2
    years. Residual GAA enzyme activity is usually less than 1%.
- name: LOPD
  display_name: Late-onset Pompe disease (LOPD)
  description: >
    Encompasses childhood, juvenile, and adult-onset forms presenting with progressive
    proximal and limb-girdle muscle weakness, respiratory insufficiency, and elevated
    creatine kinase. Cardiac involvement is typically absent or minimal. Residual GAA
    enzyme activity is usually 1-30%. Symptoms may present from early childhood to
    late adulthood depending on residual enzyme activity.
inheritance:
- name: Autosomal recessive
  inheritance_term:
    preferred_term: Autosomal recessive inheritance
    term:
      id: HP:0000007
      label: Autosomal recessive inheritance
  description: >
    Pompe disease is inherited in an autosomal recessive manner. Affected individuals
    carry biallelic pathogenic variants in the GAA gene. Carrier frequency is estimated
    at approximately 1 in 100-200 in most populations. Disease incidence varies by
    population, estimated at approximately 1 in 40,000 overall.
  evidence:
  - reference: PMID:18929906
    reference_title: "Pompe's disease."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "It is a pan-ethnic autosomal recessive trait characterised by acid alpha-glucosidase deficiency leading to lysosomal glycogen storage."
    explanation: The Lancet review by van der Ploeg and Reuser establishes Pompe disease as an autosomal recessive trait.
  - reference: ORPHA:365
    reference_title: "Glycogen storage disease due to acid maltase deficiency (Orphanet structured-database record)"
    supports: SUPPORT
    evidence_source: OTHER
    snippet: "Autosomal recessive"
    explanation: Orphanet records autosomal recessive inheritance for Pompe disease.
prevalence:
- population: Global live births
  percentage: 2.0 per 100,000 live births
  notes: >-
    Recent meta-analysis data suggest a global birth prevalence of 2.0 per
    100,000 live births overall, with infantile-onset disease at 1.0 per
    100,000 and late-onset disease at 2.4 per 100,000. Older evidence reviews
    commonly cited an overall prevalence of about 1 case per 40,000.
  evidence:
  - reference: PMID:39424261
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Global birth prevalence of Pompe disease was 2.0 cases (95% CI: 1.5-2.4) per 100,000 live births. Global birth prevalence of infantile-onset Pompe disease was 1.0 cases (95% CI: 0.5-1.5) per 100,000 live births. Global birth prevalence of late-onset Pompe disease was 2.4 cases (95% CI: 1.8-3.0) per 100,000 live births."
    explanation: This 2024 systematic review and meta-analysis provides pooled global birth prevalence estimates for overall Pompe disease and its major clinical subtypes.
  - reference: PMID:17974725
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "The prevalence of Pompe disease has been estimated to be approximately 1 case per 40,000."
    explanation: This evidence synthesis captures the traditional benchmark prevalence estimate used before broader newborn screening data became available.
pathophysiology:
- name: Lysosomal glycogen accumulation
  description: >
    Deficiency of acid alpha-glucosidase (GAA) prevents normal lysosomal degradation
    of glycogen. Glycogen progressively accumulates within lysosomes, establishing
    the substrate-storage lesion that drives downstream autophagic, skeletal muscle,
    respiratory muscle, and cardiac pathology.
  gene:
    preferred_term: GAA
    description: Acid alpha-glucosidase, a lysosomal enzyme that hydrolyzes alpha-1,4 and alpha-1,6 glycosidic linkages in glycogen to release glucose.
    modifier: DECREASED
    term:
      id: hgnc:4065
      label: GAA
  evidence:
  - reference: PMID:32745073
    reference_title: "Pompe disease: pathogenesis, molecular genetics and diagnosis."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "GAA catalyzes the hydrolysis of α-1,4 and α-1,6-glucosidic bonds of glycogen and its deficiency leads to lysosomal storage of glycogen in several tissues, particularly in muscle."
    explanation: Taverna et al. review confirms that GAA deficiency leads to lysosomal glycogen storage predominantly in muscle tissue.
  - reference: PMID:18929906
    reference_title: "Pompe's disease."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "acid alpha-glucosidase deficiency leading to lysosomal glycogen storage"
    explanation: The Lancet review establishes the core pathogenic mechanism of GAA deficiency causing lysosomal glycogen accumulation.
  cell_types:
