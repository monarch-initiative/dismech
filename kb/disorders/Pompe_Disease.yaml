- name: Progressive proximal myopathy
  description: >
    Progressive weakness of proximal and limb-girdle muscles is the predominant
    feature of LOPD. Patients develop difficulty climbing stairs, rising from
    chairs, and walking. The pelvic girdle is typically affected before the
    shoulder girdle.
