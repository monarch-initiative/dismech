genetic:
- name: GAA gene mutations
  association: Causative
  notes: >
    Over 600 pathogenic variants in the GAA gene have been identified. The most
    common variant in Caucasian populations is the intronic splice-site mutation
    c.-32-13T>G (IVS1), which retains some residual enzyme activity and is
    typically associated with LOPD. Null mutations that abolish all enzyme activity
    are associated with severe IOPD. Genotype-phenotype correlations are complex,
    with residual enzyme activity being the primary determinant of disease severity.
  evidence:
  - reference: PMID:32745073
    reference_title: "Pompe disease: pathogenesis, molecular genetics and diagnosis."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Currently, more than 560 mutations spread throughout GAA gene have been reported."
    explanation: Taverna et al. review confirms the large number of pathogenic variants reported in the GAA gene.
  variants:
  - name: c.-32-13T>G (IVS1)
    description: >
      The most common GAA pathogenic variant in Caucasian populations. This
      intronic variant affects splicing efficiency, allowing some normal transcript
      production and residual enzyme activity. Typically associated with late-onset
      disease when compound heterozygous with another pathogenic variant.
biochemical:
- name: Decreased acid alpha-glucosidase activity
  presence: DECREASED
  context: >
    Deficient lysosomal acid alpha-glucosidase activity is the defining biochemical
    abnormality and can be assayed in dried blood spot or liquid blood samples.
  evidence:
  - reference: PMID:33554498
    reference_title: "Advances in diagnosis and management of Pompe disease."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "The diagnosis requires demonstration of deficiency of the lysosomal acid alpha-glucosidase enzyme, which can be assayed in dried blood spot or liquid blood samples, together with supportive biomarker tests, and confirmed with molecular genetic analysis."
    explanation: Directly supports decreased acid alpha-glucosidase activity as the diagnostic biochemical abnormality and names relevant assay sample types.
  - reference: ORPHA:365
    reference_title: "Glycogen storage disease due to acid maltase deficiency (Orphanet structured-database record)"
    supports: SUPPORT
    evidence_source: OTHER
    snippet: "HP:0034932 | Decreased circulating acid maltase activity | Very frequent (99-80%)"
    explanation: Orphanet records decreased circulating acid maltase activity as very frequent in Pompe disease.
treatments:
- name: Enzyme replacement therapy (ERT)
  description: >
    Intravenous infusion of recombinant human GAA is the standard of care for
    Pompe disease. Alglucosidase alfa (Myozyme/Lumizyme) was the first approved
    ERT (2006). Avalglucosidase alfa (Nexviazyme), a next-generation ERT with
    enhanced mannose-6-phosphate receptor binding, was approved in 2021 and
    shows improved skeletal muscle uptake. ERT significantly improves survival
    and cardiac outcomes in IOPD and stabilizes or improves respiratory and
    motor function in LOPD.
  treatment_term:
    preferred_term: Enzyme replacement therapy
    term:
      id: MAXO:0000058
      label: pharmacotherapy
  evidence:
  - reference: PMID:17151339
    reference_title: "Recombinant human acid [alpha]-glucosidase: major clinical benefits in infantile-onset Pompe disease."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "All patients (100%) survived to 18 months of age. A Cox proportional hazards analysis demonstrated that treatment reduced the risk of death by 99%, reduced the risk of death or invasive ventilation by 92%, and reduced the risk of death or any type of ventilation by 88%, as compared to an untreated historical control group."
    explanation: The landmark Kishnani et al. clinical trial demonstrated that rhGAA ERT reduced risk of death by 99% in infantile-onset Pompe disease compared to untreated historical controls.
  - reference: PMID:20393176
    reference_title: "A randomized study of alglucosidase alfa in late-onset Pompe's disease."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "At 78 weeks, the estimated mean changes from baseline in the primary end points favored alglucosidase alfa (an increase of 28.1+/-13.1 m on the 6-minute walk test and an absolute increase of 3.4+/-1.2 percentage points in FVC; P=0.03 and P=0.006, respectively)."
    explanation: The van der Ploeg et al. NEJM randomized controlled trial showed that alglucosidase alfa significantly improved walking distance and stabilized pulmonary function in late-onset Pompe disease.
  - reference: PMID:34800399
    reference_title: "Safety and efficacy of avalglucosidase alfa versus alglucosidase alfa in patients with late-onset Pompe disease (COMET): a phase 3, randomised, multicentre trial."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "We consider that this study provides evidence of clinically meaningful improvement with avalglucosidase alfa therapy over alglucosidase alfa in respiratory function, ambulation, and functional endurance, with no new safety signals reported."
    explanation: The COMET phase 3 trial demonstrated that avalglucosidase alfa provided clinically meaningful improvements in respiratory function over alglucosidase alfa in late-onset Pompe disease.
- name: Cipaglucosidase alfa plus miglustat
  description: >
    A two-component therapy combining cipaglucosidase alfa, a novel recombinant
    human acid alpha-glucosidase, with miglustat, an enzyme stabilizer that
    enhances intracellular delivery. FDA-approved in 2023 for adults with
    late-onset Pompe disease. The PROPEL phase 3 trial (125 patients) showed
    numerical improvements in 6-minute walk distance and respiratory function
    versus alglucosidase alfa, with benefits particularly in patients previously
    receiving ERT for more than 2 years.
  treatment_term:
    preferred_term: Enzyme replacement therapy with enzyme stabilizer
    term:
      id: MAXO:0000058
      label: pharmacotherapy
    therapeutic_agent:
    - preferred_term: cipaglucosidase alfa
      term:
        id: NCIT:C175059
        label: Cipaglucosidase Alfa
    - preferred_term: miglustat
      term:
        id: CHEBI:50381
        label: miglustat
  evidence:
  - reference: PMID:34800400
    reference_title: "Safety and efficacy of cipaglucosidase alfa plus miglustat versus alglucosidase alfa plus placebo in late-onset Pompe disease (PROPEL): an international, randomised, double-blind, parallel-group, phase 3 trial."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "At week 52, mean change from baseline in 6-min walk distance was 20·8 m (SE 4·6) in the cipaglucosidase alfa plus miglustat group versus 7·2 m (6·6) in the alglucosidase alfa plus placebo group using last observation carried forward (between-group difference 13·6 m [95% CI -2·8 to 29·9])."
    explanation: The PROPEL phase 3 trial showed a numerical improvement in 6-minute walk distance with cipaglucosidase alfa plus miglustat versus standard ERT, though the primary endpoint did not reach statistical superiority in the overall population.
- name: Respiratory support
  description: >
    Non-invasive ventilation (BiPAP) or invasive mechanical ventilation may be
    required for respiratory insufficiency. Many LOPD patients require nocturnal
    ventilatory support, and some progress to continuous ventilator dependence.
  treatment_term:
    preferred_term: Respiratory support
    term:
      id: MAXO:0000950
      label: supportive care
  evidence:
  - reference: PMID:22173792
    reference_title: "Consensus treatment recommendations for late-onset Pompe disease."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "A multidisciplinary team should be involved to properly treat the pulmonary, neuromuscular, orthopedic, and gastrointestinal elements of late-onset Pompe disease."
    explanation: Consensus treatment recommendations support pulmonary management as a component of Pompe disease care.
  - reference: PMID:39457174
    reference_title: "Effectiveness of Respiratory Muscle Training in Pompe Disease: A Systematic Review and Meta-Analysis."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "RMT has potential to be integrated into the cardioplulmonary rehabilitation for patients with Pompe disease."
    explanation: Supports respiratory muscle training as part of cardiopulmonary rehabilitation in Pompe disease.
- name: Physical therapy and rehabilitation
  description: >
    Structured physical therapy and rehabilitation programs help maintain
    mobility, prevent contractures, and optimize residual muscle function.
    Exercise programs should be tailored to avoid overexertion.
  treatment_term:
    preferred_term: Physical therapy
    term:
      id: MAXO:0000011
      label: physical therapy
  evidence:
  - reference: PMID:31811531
    reference_title: "Adapted physical activity and therapeutic exercise in late-onset Pompe disease (LOPD): a two-step rehabilitative approach."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Therefore, we evaluated the role of physical activity, therapeutic exercise, and pulmonary rehabilitation programs in order to promote an appropriate management of motor and respiratory dysfunctions and improve QoL in patients with LOPD."
    explanation: Supports therapeutic exercise and rehabilitation programs for motor and respiratory dysfunction in late-onset Pompe disease.
- name: Dietary management
  description: >
    High-protein diet may help preserve muscle mass. In IOPD, specialized
    feeding support including nasogastric or gastrostomy feeding may be needed.
  treatment_term:
    preferred_term: Dietary management
    term:
      id: MAXO:0000088
      label: dietary intervention
  evidence:
  - reference: PMID:32505193
    reference_title: "Exercise training alone or in combination with high-protein diet in patients with late onset Pompe disease: results of a cross over study."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Exercise training, particularly if combined with high-protein diet, could reverse this decrease and result in an improvement, which was accompanied by improved quality of life."
    explanation: Supports high-protein dietary intervention in combination with exercise for late-onset Pompe disease.
notes: >
  Pompe disease was first described by J.C. Pompe in 1932. The concept of
  lysosomal storage was established by Hers in 1963. Enzyme replacement therapy
  with alglucosidase alfa was approved in 2006. Newborn screening programs have
  enabled earlier diagnosis and treatment of IOPD, significantly improving
  outcomes.
  The development of CRIM (cross-reactive immunologic material) status assessment
  is important for predicting immune response to ERT - CRIM-negative patients
  (who produce no endogenous GAA protein) are at high risk for developing
  high-sustained antibody titers that can render ERT ineffective. Gene therapy
  approaches are in clinical trials. Long-term survivors with Pompe disease are
  now manifesting novel aspects including widespread vascular disease, smooth
  muscle and central nervous system involvement.
