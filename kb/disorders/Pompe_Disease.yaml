phenotypes:
- name: Hypertrophic cardiomyopathy
  description: >
    Massive cardiac glycogen storage causes biventricular hypertrophic cardiomyopathy
    in infantile-onset Pompe disease. Left ventricular wall thickness may be
    dramatically increased. This is the hallmark feature distinguishing IOPD from
    LOPD and is a major cause of death if untreated.
  frequency: HP_0040281
  subtype: IOPD
  phenotype_term:
    preferred_term: Hypertrophic cardiomyopathy
