    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Affected newborns typically have mild-to-moderate hypotonia, feeding
      difficulties, and poor head control.
    explanation: >-
      GeneReviews documents early hypotonia as a characteristic feature of
