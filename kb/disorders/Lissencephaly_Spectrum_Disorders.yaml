  evidence:
  - reference: PMID:20301752
    reference_title: PAFAH1B1-Related Lissencephaly / Subcortical Band Heterotopia.
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      In individuals with PAFAH1B1-related lissencephaly/SBH, developmental
