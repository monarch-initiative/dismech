    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Seizures occur in more than 90% of individuals with lissencephaly and
      often include infantile spasms.
    explanation: >-
      GeneReviews explicitly notes that lissencephaly-associated seizures
