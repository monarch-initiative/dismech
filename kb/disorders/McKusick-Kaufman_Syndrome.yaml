name: McKusick-Kaufman Syndrome
creation_date: "2026-06-14T21:30:00Z"
category: Mendelian
description: >-
  McKusick-Kaufman syndrome (MKS) is a rare autosomal recessive multiple
  congenital anomaly disorder caused by biallelic mutations in MKKS (BBS6) on
  chromosome 20p12. It is classically defined by the triad of hydrometrocolpos
  (HMC), postaxial polydactyly (PAP), and congenital heart disease (CHD), with
  genital malformations (hypospadias, cryptorchidism) in affected males. MKKS
  encodes a divergent, chaperonin-like protein that localizes to the
  pericentriolar material / basal body and participates in BBSome-related
  protein processing, placing MKS within the ciliopathy spectrum. MKS is
  allelic with Bardet-Biedl syndrome type 6 (BBS6): the same gene causes both,
  but the MKS allele preserves cilia function and lacks the retinal dystrophy,
  obesity, and intellectual disability that define BBS, and recent work
  attributes the MKS congenital heart defects to a non-ciliary BBS6 function in
  nuclear-cytoplasmic transport and chromatin remodeling. Because BBS features
  are age-dependent, MKS and BBS can be clinically indistinguishable in
  infancy, and the diagnosis of MKS should be made with caution before age 5.
