inheritance:
- name: Autosomal Recessive
  description: >-
    McKusick-Kaufman syndrome is inherited in an autosomal recessive manner,
    caused by biallelic (homozygous or compound heterozygous) mutations in
    MKKS. In the original gene-discovery cohort the Old Order Amish patient was
    homozygous and a non-Amish patient was compound heterozygous.
  evidence:
  - reference: PMID:10802661
    reference_title: "Mutation of a gene encoding a putative chaperonin causes McKusick-Kaufman syndrome."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      The Old Order Amish patient was found to be homozygous for an allele that
      had two missense substitutions and the non-Amish patient was a compound
      heterozygote for a frameshift mutation predicting premature protein
      truncation and a distinct missense mutation
    explanation: >-
      Documents homozygous and compound-heterozygous MKKS genotypes, consistent
      with autosomal recessive inheritance.
  - reference: PMID:20301675
    reference_title: "McKusick-Kaufman Syndrome."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      MKS is inherited in an autosomal recessive manner
    explanation: >-
      GeneReviews explicitly states the autosomal recessive inheritance of MKS.
prevalence:
- population: Published clinical estimates
  percentage: Rare; mostly isolated case reports outside the Old Order Amish
  notes: >-
    MKS is a rare disorder; outside the Old Order Amish population (in which it
    was originally mapped) it is reported mostly as isolated cases. The
    diagnosis is further complicated by clinical overlap with Bardet-Biedl
    syndrome.
  evidence:
  - reference: PMID:35860126
    reference_title: "A case of McKusick-Kaufman syndrome with perinatal diagnosis: Case report and literature review."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      McKusick-Kaufman syndrome (MKS) is a rarely reported autosomal recessive
      syndrome characterized by hydrometrocolpos (HMC), polydactyly and various
      gastrointestinal and renal manifestations
    explanation: >-
      Confirms the rarity of MKS and the cardinal hydrometrocolpos/polydactyly
      features.
pathophysiology:
- name: MKKS/BBS6 Chaperonin and Basal Body Dysfunction
  conforms_to: "ciliopathy_dysfunction#Basal Body and Transition Zone Dysfunction"
  description: >-
    MKKS encodes a divergent, Group II chaperonin-like protein (BBS6) that
    evolved from a subunit of the eukaryotic chaperonin CCT/TRiC and resides
    largely within the pericentriolar material surrounding the centrioles —
    the basal body from which the primary cilium is templated. Wild-type MKKS
    shuttles between the centrosome and cytosol, whereas disease-causing
    mutants adopt an abnormal conformation, fail to localize to the centrosome,
    and are rapidly degraded by CHIP-mediated, chaperone-dependent
    ubiquitination. Loss of normal BBS6 function at the basal body/centrosome
    impairs centrosomal and ciliary protein processing, producing cytokinesis
    defects on knockdown and linking MKS to the basal-body arm of the
    ciliopathy spectrum.
  biological_processes:
  - preferred_term: Chaperonin-Mediated Protein Folding
    term:
      id: GO:0006457
      label: protein folding
    modifier: DECREASED
  - preferred_term: Cytokinesis
    term:
      id: GO:0000910
      label: cytokinesis
    modifier: ABNORMAL
  cellular_components:
  - preferred_term: Pericentriolar Material
    term:
