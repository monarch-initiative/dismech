    term:
      id: CL:0000064
      label: ciliated cell
  downstream:
  - target: Nuclear-Cytoplasmic Transport Defect and Congenital Heart Disease
    description: >-
      Beyond its basal-body role, the same MKKS/BBS6 protein has a distinct
      nuclear-cytoplasmic shuttling function whose disruption by the MKS allele
      underlies the congenital heart disease characteristic of MKS.
  evidence:
  - reference: PMID:15731008
    reference_title: "MKKS/BBS6, a divergent chaperonin-like protein linked to the obesity disorder Bardet-Biedl syndrome, is a novel centrosomal component required for cytokinesis."
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: >-
      MKKS/BBS6, one of several proteins associated with Bardet-Biedl syndrome
      (BBS), is a Group II chaperonin-like protein that has evolved recently in
      animals from a subunit of the eukaryotic chaperonin CCT/TRiC, and diverged
      rapidly to acquire distinct functions
    explanation: >-
      Establishes BBS6 as a divergent chaperonin-like protein derived from
      CCT/TRiC, the molecular basis of the MKS mechanism.
  - reference: PMID:15731008
    reference_title: "MKKS/BBS6, a divergent chaperonin-like protein linked to the obesity disorder Bardet-Biedl syndrome, is a novel centrosomal component required for cytokinesis."
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: >-
      the majority of BBS6 resides within the pericentriolar material (PCM), a
      proteinaceous tube surrounding centrioles
    explanation: >-
      Localizes BBS6 to the pericentriolar material/basal body region,
      supporting conformance to the basal-body module node.
  - reference: PMID:15731008
    reference_title: "MKKS/BBS6, a divergent chaperonin-like protein linked to the obesity disorder Bardet-Biedl syndrome, is a novel centrosomal component required for cytokinesis."
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: >-
      silencing of the BBS6 transcript by RNA interference in different cell
      types leads to multinucleate and multicentrosomal cells with cytokinesis
      defects
    explanation: >-
      Demonstrates the cellular consequence of BBS6 loss: cytokinesis failure,
      consistent with a centrosomal/basal-body function.
  - reference: PMID:18094050
    reference_title: "MKKS is a centrosome-shuttling protein degraded by disease-causing mutations via CHIP-mediated ubiquitination."
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: >-
      Although wild-type MKKS quickly shuttles between the centrosome and cytosol
      in living cells, the rapidly degraded mutants often fail to localize to the
      centrosome
    explanation: >-
      Shows that disease-causing MKKS mutants mislocalize from the centrosome,
      the cellular lesion underlying loss of BBS6 function.
  - reference: PMID:18094050
    reference_title: "MKKS is a centrosome-shuttling protein degraded by disease-causing mutations via CHIP-mediated ubiquitination."
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: >-
      These results indicate that the MKKS mutants have an abnormal conformation
      and that chaperone-dependent degradation mediated by CHIP is a key feature
      of MKKS/BBS diseases
    explanation: >-
      Identifies CHIP-mediated degradation of misfolded MKKS as a shared
      molecular feature of MKKS and BBS.
- name: Nuclear-Cytoplasmic Transport Defect and Congenital Heart Disease
  description: >-
    The congenital heart disease of MKS appears to arise from a non-ciliary
    function of BBS6. BBS6 is actively transported between the cytoplasm and
    the nucleus, where it interacts with the SWI/SNF chromatin-remodeling
    protein SMARCC1; the MKS-associated allele is defective in this transport
    while still maintaining cilia function. Perturbation of this
    nuclear-cytoplasmic/chromatin-remodeling axis is proposed to underlie the
    congenital heart defects that distinguish MKS from the largely cilia-driven
    Bardet-Biedl syndrome. Note: this mechanism is established in zebrafish and
    cell models, and its precise fidelity to human cardiac morphogenesis
    remains to be confirmed.
  biological_processes:
  - preferred_term: Nucleocytoplasmic Transport
    term:
      id: GO:0006913
      label: nucleocytoplasmic transport
    modifier: ABNORMAL
  - preferred_term: Chromatin Remodeling
    term:
      id: GO:0006338
      label: chromatin remodeling
    modifier: ABNORMAL
  - preferred_term: Heart Development
    term:
      id: GO:0007507
      label: heart development
    modifier: ABNORMAL
  cellular_components:
  - preferred_term: Nucleus
    term:
      id: GO:0005634
      label: nucleus
  cell_types:
  - preferred_term: Cardiomyocyte
    term:
      id: CL:0000746
      label: cardiac muscle cell
  evidence:
  - reference: PMID:28753627
    reference_title: "Nuclear/cytoplasmic transport defects in BBS6 underlie congenital heart disease through perturbation of a chromatin remodeling protein."
    supports: SUPPORT
    evidence_source: MODEL_ORGANISM
    snippet: >-
      Mutations in BBS6 cause two clinically distinct syndromes, Bardet-Biedl
      syndrome (BBS), a syndrome caused by defects in cilia transport and
      function, as well as McKusick-Kaufman syndrome, a genetic disorder
      characterized by congenital heart defects
    explanation: >-
      Establishes that the MKS allele of BBS6 produces a distinct,
      CHD-predominant phenotype separate from the cilia-driven BBS phenotype.
  - reference: PMID:28753627
    reference_title: "Nuclear/cytoplasmic transport defects in BBS6 underlie congenital heart disease through perturbation of a chromatin remodeling protein."
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: >-
      We demonstrate that BBS6 is actively transported between the cytoplasm and
      nucleus, and that BBS6H84Y; A242S, is defective in this transport
    explanation: >-
      Shows the MKS-associated allele is specifically defective in BBS6
      nuclear-cytoplasmic transport.
  - reference: PMID:28753627
    reference_title: "Nuclear/cytoplasmic transport defects in BBS6 underlie congenital heart disease through perturbation of a chromatin remodeling protein."
    supports: SUPPORT
    evidence_source: MODEL_ORGANISM
    snippet: >-
      Our work identifies a new function for BBS6 in nuclear-cytoplasmic
      transport, and provides insight into the disease mechanism underlying the
      congenital heart defects in McKusick-Kaufman syndrome patients
    explanation: >-
      Links the BBS6 nuclear-cytoplasmic transport defect to the congenital
      heart disease mechanism in MKS.
phenotypes:
- name: Hydrometrocolpos
  category: Genitourinary
  description: >-
    Hydrometrocolpos — dilatation of the vagina and uterus by accumulated
    secretions — is a cardinal feature of MKS in affected females, typically
    presenting as a large cystic abdominal/pelvic mass in the neonate.
  phenotype_term:
    preferred_term: Hydrometrocolpos
    term:
      id: HP:0030010
      label: Hydrometrocolpos
  evidence:
  - reference: PMID:20301675
    reference_title: "McKusick-Kaufman Syndrome."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      HMC in infants usually presents as a large cystic abdominal mass arising
      out of the pelvis, caused by dilatation of the vagina and uterus as a
      result of the accumulation of cervical secretions from maternal estrogen
      stimulation
    explanation: >-
      Describes hydrometrocolpos, one of the two cardinal diagnostic features of
      MKS, and its neonatal presentation.
- name: Postaxial Polydactyly
  category: Skeletal
  description: >-
    Postaxial polydactyly — extra digits on the ulnar side of the hand and the
    fibular side of the foot — is one of the two cardinal limb features of MKS.
  phenotype_term:
    preferred_term: Postaxial polydactyly
    term:
      id: HP:0100259
      label: Postaxial polydactyly
  evidence:
  - reference: PMID:20301675
    reference_title: "McKusick-Kaufman Syndrome."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      PAP is the presence of additional digits on the ulnar side of the hand and
      the fibular side of the foot
    explanation: >-
      Defines postaxial polydactyly, a cardinal limb malformation of MKS.
- name: Congenital Heart Disease
  category: Cardiovascular
  description: >-
    A variety of congenital heart defects occur in MKS, including
    atrioventricular canal, atrial septal defect, ventricular septal defect, or
    complex malformations. CHD is the third element of the classic MKS triad and
    appears to reflect a non-ciliary BBS6 function.
  phenotype_term:
    preferred_term: Congenital heart defect
    term:
      id: HP:0001627
      label: Abnormal heart morphology
  evidence:
  - reference: PMID:20301675
    reference_title: "McKusick-Kaufman Syndrome."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      A variety of congenital heart defects have been reported including
      atrioventricular canal, atrial septal defect, ventricular septal defect,
      or a complex congenital heart malformation
    explanation: >-
      Documents the spectrum of congenital heart defects forming the third
      element of the MKS triad.
- name: Atrioventricular Canal Defect
  category: Cardiovascular
  description: >-
    Atrioventricular canal (endocardial cushion) defect is among the reported
    congenital heart malformations in MKS.
  phenotype_term:
