notes: >-
  Framed as a distinct clinical and MONDO entity that is allelic to Bardet-Biedl
  syndrome 6 (both caused by MKKS/BBS6). The MKKS↔BBS6 relationship is the
  vertical (per-locus) axis already curated by MONDO as "MKKS-related
  ciliopathy"; this entry captures the McKusick-Kaufman-specific branch subset
  (limb + genitourinary) of the shared BBSome trafficking mechanism. Genotype-
  phenotype correlation between McKusick-Kaufman-restricted and full Bardet-Biedl
  presentations is imperfect, and some patients diagnosed with McKusick-Kaufman
  syndrome in infancy are later reclassified as Bardet-Biedl syndrome.
