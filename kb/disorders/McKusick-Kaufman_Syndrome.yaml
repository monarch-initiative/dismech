genetic:
- name: MKKS (BBS6) Mutations
  association: Causative
  gene_term:
    preferred_term: MKKS
    term:
      id: hgnc:7108
      label: MKKS
  notes: >-
    Biallelic mutations in MKKS (also known as BBS6; chromosome 20p12) cause
    McKusick-Kaufman syndrome. MKKS encodes a divergent chaperonin-like protein
    of the pericentriolar material. The same gene causes Bardet-Biedl syndrome
    type 6, making MKS and BBS6 allelic disorders distinguished by the presence
    (BBS) or absence (MKS) of retinitis pigmentosa, obesity, and intellectual
    disability.
  evidence:
  - reference: PMID:10802661
    reference_title: "Mutation of a gene encoding a putative chaperonin causes McKusick-Kaufman syndrome."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      The MKKS predicted protein shows amino acid similarity to the chaperonin
      family of proteins, suggesting a role for protein processing in limb,
      cardiac and reproductive system development
    explanation: >-
      Original gene-discovery report identifying MKKS as the causative gene and
      its chaperonin-like nature.
  - reference: PMID:10802661
    reference_title: "Mutation of a gene encoding a putative chaperonin causes McKusick-Kaufman syndrome."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      We believe that this is the first description of a human disorder caused
      by mutations affecting a putative chaperonin molecule
    explanation: >-
      Establishes MKS as the first human disorder attributed to a putative
      chaperonin defect.
  - reference: PMID:15266619
    reference_title: "A female with complete lack of Müllerian fusion, postaxial polydactyly, and tetralogy of fallot: genetic heterogeneity of McKusick-Kaufman syndrome or a unique syndrome?"
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Both MKS and BBS can be caused by mutations in the MKKS or BBS6 gene on
      chromosome 20p12
    explanation: >-
      Confirms the MKKS/BBS6 gene identity and its location at 20p12, and the
      allelic relationship between MKS and BBS.
diagnosis:
- name: Clinical and Molecular Diagnosis
  description: >-
    MKS is suspected clinically from the combination of hydrometrocolpos and
    postaxial polydactyly (with or without congenital heart disease), and is
    confirmed by identification of biallelic MKKS pathogenic variants. Because
    the age-dependent features of Bardet-Biedl syndrome may not yet be
    apparent, care must be taken to exclude BBS before committing to a diagnosis
    of MKS, particularly in young children.
  diagnosis_term:
    preferred_term: molecular genetic testing
    term:
      id: MAXO:0000533
      label: molecular genetic testing
  evidence:
  - reference: PMID:20301675
    reference_title: "McKusick-Kaufman Syndrome."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      The molecular diagnosis can be established in proband with suggestive
      findings and biallelic pathogenic variants in MKKS identified by molecular
      genetic testing
    explanation: >-
      Defines the molecular diagnostic criterion (biallelic MKKS variants) for
      MKS.
differential_diagnoses:
- name: Bardet-Biedl Syndrome
  description: >-
    Bardet-Biedl syndrome is the allelic (MKKS/BBS6) condition with the greatest
    clinical overlap with MKS. It shares hydrometrocolpos and polydactyly but is
    distinguished by age-dependent retinal dystrophy, obesity, and intellectual
    disability; these features may be absent in infancy, so MKS and BBS can be
    clinically indistinguishable in the neonatal period.
  evidence:
  - reference: PMID:20301675
    reference_title: "McKusick-Kaufman Syndrome."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      care must be taken to ensure that the proband does not have Bardet-Biedl
      syndrome, an allelic condition with considerable clinical overlap and
      age-dependent features including retinal dystrophy, obesity, and
      intellectual disability
    explanation: >-
      Establishes Bardet-Biedl syndrome as the principal allelic differential
      diagnosis distinguished by age-dependent retinal/metabolic features.
  - reference: PMID:35860126
    reference_title: "A case of McKusick-Kaufman syndrome with perinatal diagnosis: Case report and literature review."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Main differential diagnosis includes Bardet-Beidel syndrome (BBS) which
      can present with HMC and polydactyly but retinal manifestations are a
      differentiating feature from MKS
    explanation: >-
      Confirms BBS as the main differential and identifies retinal involvement
      as the key distinguishing feature.
treatments:
- name: Surgical Correction of Hydrometrocolpos and Malformations
  description: >-
    Management of MKS is directed at its structural anomalies: surgical repair
    of the obstruction causing hydrometrocolpos with drainage of the
    accumulated fluid, and standard surgical/medical treatment of polydactyly
    and congenital heart defects.
  treatment_term:
    preferred_term: surgical procedure
    term:
      id: MAXO:0000004
      label: surgical procedure
  evidence:
  - reference: PMID:20301675
    reference_title: "McKusick-Kaufman Syndrome."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Surgical repair of the obstruction causing HMC and drainage of the
      accumulated fluid. Treatment for polydactyly and congenital heart defects
      and any other anomalies is standard
    explanation: >-
      Defines the standard surgical management of the structural anomalies of
      MKS.
- name: Supportive and Multidisciplinary Care
  description: >-
    Care is supportive and multidisciplinary, with surveillance for later
    complications of hydrometrocolpos surgery and ongoing monitoring for
    emerging features of Bardet-Biedl syndrome (vision, growth, renal, and
    developmental assessments).
  treatment_term:
    preferred_term: supportive care
    term:
      id: MAXO:0000950
      label: supportive care
- name: Genetic Counseling
  description: >-
    Autosomal recessive inheritance entails a 25% recurrence risk for siblings.
    Once the biallelic MKKS variants are identified, carrier testing, prenatal
    testing, and preimplantation genetic testing become available; counseling
    should note the possibility that an apparent MKS diagnosis may later prove
    to be Bardet-Biedl syndrome.
  treatment_term:
    preferred_term: genetic counseling
    term:
      id: MAXO:0000079
      label: genetic counseling
  evidence:
  - reference: PMID:20301675
    reference_title: "McKusick-Kaufman Syndrome."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      each sib of an affected individual has at conception a 25% chance of being
      affected
    explanation: >-
      States the 25% sibling recurrence risk that underpins genetic counseling
      for MKS.
