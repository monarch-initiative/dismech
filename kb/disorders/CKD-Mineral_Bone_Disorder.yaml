genetic:
- name: CASR
  association: Risk Factor
  notes: >
    Calcium-sensing receptor variants modify susceptibility to secondary hyperparathyroidism severity. GWAS top hit for serum
    calcium.
  evidence:
  - reference: PMID:20661308
    reference_title: "Genome-wide meta-analysis for serum calcium identifies significantly associated SNPs near the calcium-sensing receptor (CASR) gene."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: Our meta-analysis shows that serum calcium is associated with SNPs in or near the calcium-sensing receptor (CASR)
      gene on 3q13.
    explanation: GWAS meta-analysis of 12,865 individuals identifies CASR as top hit for serum calcium, confirming its role
      in calcium homeostasis relevant to CKD-MBD.
- name: CYP24A1
  association: Risk Factor
  notes: >
    24-hydroxylase variants affect vitamin D catabolism. GWAS association with serum calcium and kidney stones.
  evidence:
  - reference: PMID:31729369
    reference_title: "Genetic variants of calcium and vitamin D metabolism in kidney stone disease."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: A CYP24A1 locus is predicted to affect vitamin D metabolism and five loci, DGKD, DGKH, WDR72, GPIC1, and BCR,
      are predicted to influence calcium-sensing receptor (CaSR) signaling.
    explanation: GWAS of 12,123 kidney stone cases identifies CYP24A1 locus as nephrolithiasis-associated, with predicted
      effects on vitamin D metabolism and correlation with serum calcium.
- name: CYP27B1
  association: Risk Factor
  notes: >
    1-alpha-hydroxylase gene. Variants affect calcitriol synthesis capacity.
  evidence:
  - reference: PMID:27074284
    reference_title: "Vascular Calcification Induced by Chronic Kidney Disease Is Mediated by an Increase of 1α-Hydroxylase Expression in Vascular Smooth Muscle Cells."
    supports: SUPPORT
    evidence_source: MODEL_ORGANISM
    snippet: Rats with subtotal nephrectomy and kidney recipient patients showed increased arterial expression of 1α-hydroxylase
      in vivo.
    explanation: Demonstrates CYP27B1 (1-alpha-hydroxylase) upregulation in vascular smooth muscle cells during CKD, mediating
      vascular calcification through local calcitriol production.
  - reference: PMID:33784965
    reference_title: "Hyperphosphatemia with elevated serum PTH and FGF23, reduced 1,25(OH)(2)D and normal FGF7 concentrations characterize patients with CKD."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: FGF23 also suppresses renal synthesis of 1,25(OH)2D by inhibiting expression of the enzyme 1-alpha-hydroxylase
      (CYP27B1), while stimulating the catabolic enzyme 24-hydroxylase (CYP24A1)
    explanation: Confirms CYP27B1 as the key enzyme suppressed by FGF23 in CKD, contributing to calcitriol deficiency.
- name: ALPL
  association: Risk Factor
  notes: >
    Tissue-nonspecific alkaline phosphatase. Variants associated with bone mineralization defects.
  evidence:
  - reference: PMID:36510335
    reference_title: "Bone Turnover Markers: Basic Biology to Clinical Applications."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: commonly used bone formation markers (bone alkaline phosphatase, osteocalcin, and procollagen I N-propeptide)
    explanation: Reviews bone alkaline phosphatase (encoded by ALPL) as a key bone formation marker used in CKD-MBD management.
- name: GPD1
  association: Risk Factor
  notes: >
    Glycerol-3-phosphate dehydrogenase 1. Required for the kidney glycolysis phosphate-sensing pathway that produces G-3-P
    to trigger FGF23.
  evidence:
  - reference: PMID:36821389
    reference_title: "Kidney glycolysis serves as a mammalian phosphate sensor that maintains phosphate homeostasis."
    supports: SUPPORT
    evidence_source: MODEL_ORGANISM
    snippet: these findings place glycolysis at the nexus of mineral and energy metabolism and identify a kidney-bone feedback
      loop that controls phosphate homeostasis
    explanation: GPD1 knockout in mice abolished phosphate-stimulated G-3-P and FGF23 responses, confirming its role in the
      phosphate-sensing pathway.
- name: SOST
  association: Biomarker
  notes: >
    Sclerostin gene. Vascular production of sclerostin through osteoblastic transdifferentiation links vascular calcification
    to bone disease.
  evidence:
  - reference: PMID:33301619
    reference_title: "Chronic Kidney Disease-Induced Vascular Calcification Impairs Bone Metabolism."
    supports: SUPPORT
    evidence_source: MODEL_ORGANISM
    snippet: the presence of VC lowers BMD, impairs bone metabolism, and affects several pathways in bone. The present results
      prove the existence of a vasculature to bone tissue cross-talk.
    explanation: Using aorta transplantation in rats, demonstrates that vascular calcification (with sclerostin secretion
      from SOST) directly impairs bone metabolism.
- name: FGF23
  association: Biomarker
  notes: >
    Not typically mutated in CKD-MBD (unlike XLH/ADHR), but dramatically elevated as a consequence of nephron loss.
  evidence:
  - reference: PMID:37258233
    reference_title: "Role of Chronic Kidney Disease (CKD)-Mineral and Bone Disorder (MBD) in the Pathogenesis of Cardiovascular Disease in CKD."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: increased circulating concentrations of fibroblast growth factor 23 (FGF23) and parathyroid hormone (PTH), which
      increase urinary phosphate excretion
    explanation: Reviews FGF23 as dramatically elevated in CKD as a compensatory phosphaturic hormone, not due to gene mutations
      but to nephron loss.
- name: KLOTHO (KL)
  association: Biomarker
  notes: >
    Klotho deficiency accelerates CKD-MBD features. Klotho-null mice recapitulate the full CKD-MBD phenotype.
  evidence:
  - reference: PMID:26303319
    reference_title: "Pathophysiology of Calcium, Phosphorus, and Magnesium Dysregulation in Chronic Kidney Disease."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: the phosphaturic effect of FGF23 is reduced by downregulation of its cofactor Klotho necessary for binding FGF23
      to FGF receptors
    explanation: Confirms Klotho downregulation in CKD reduces FGF23 signaling efficacy, creating a vicious cycle of phosphate
      retention.
- name: SLC20A1
  association: Risk Factor
  notes: >
    Pit-1 sodium-dependent phosphate transporter. Mediates phosphate uptake in VSMCs, driving osteogenic transdifferentiation.
  evidence:
  - reference: PMID:11576919
    reference_title: "Vascular calcification and inorganic phosphate."
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: The effects of elevated Pi on HSMC were mediated by a sodium-dependent phosphate cotransporter (NPC), as indicated
      by the ability of the specific NPC inhibitor, phosphonoformic acid (PFA), to dose-dependently inhibit Pi-induced calcium
      deposition
    explanation: Landmark study identifying Pit-1 (SLC20A1) as the sodium-dependent phosphate transporter mediating phosphate-induced
      VSMC calcification.
  - reference: PMID:11576919
    reference_title: "Vascular calcification and inorganic phosphate."
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: the NPC in HSMC was identified as Pit-1 (Glvr-1), a member of the type III NPCs
    explanation: Identifies Pit-1 (SLC20A1/Glvr-1) specifically as the phosphate transporter in human aortic smooth muscle
      cells driving osteogenic transdifferentiation.
- name: SLC20A2
  association: Risk Factor
  notes: >
    Pit-2 sodium-dependent phosphate transporter. Together with Pit-1, mediates phosphate-driven vascular calcification.
  evidence:
  - reference: PMID:11576919
    reference_title: "Vascular calcification and inorganic phosphate."
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: elevated Pi may directly stimulate HSMC to undergo phenotypic changes that predispose to calcification
    explanation: While the study specifically identified Pit-1, Pit-2 (SLC20A2) is the closely related type III phosphate
      transporter also expressed in VSMCs and implicated in phosphate-driven calcification.
treatments:
- name: Phosphate Binders
  description: >
    Calcium-based (calcium carbonate, calcium acetate) or non-calcium-based (sevelamer, lanthanum carbonate, sucroferric oxyhydroxide)
    agents that bind dietary phosphate in the gut to reduce absorption.
  treatment_term:
    preferred_term: phosphate binder therapy
    term:
      id: MAXO:0000058
      label: pharmacotherapy
  evidence:
  - reference: PMID:36107466
    reference_title: "Effect of the phosphate binder sucroferric oxyhydroxide in dialysis patients on endogenous calciprotein particles, inflammation, and vascular cells."
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: High-dose SO reduced endogenous CPP formation in dialysis patients and yielded serum with attenuated pro-calcific
      and inflammatory effects in vitro.
    explanation: Sucroferric oxyhydroxide reduces CPP formation and attenuates vascular calcification effects, supporting
      phosphate binder efficacy.
- name: Active Vitamin D Therapy
  description: >
    Calcitriol or active vitamin D analogs (paricalcitol, doxercalciferol) to suppress PTH, improve calcium absorption, and
    support bone mineralization. Must balance against risk of hypercalcemia and hyperphosphatemia.
  treatment_term:
    preferred_term: active vitamin D analog therapy
    term:
      id: MAXO:0000058
      label: pharmacotherapy
  evidence:
  - reference: PMID:29523679
    reference_title: "Parathyroidectomy in the Management of Secondary Hyperparathyroidism."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: There is insufficient data on whether to prefer vitamin D analogs compared with calcimimetics, but the available
      evidence suggests advantages with combination therapy.
    explanation: Supports use of vitamin D analogs in CKD secondary hyperparathyroidism, noting combination therapy with calcimimetics
      may be optimal.
- name: Calcimimetics
  description: >
    Cinacalcet and etelcalcetide allosterically activate the calcium-sensing receptor on parathyroid cells, suppressing PTH
    secretion without raising serum calcium. First-line for secondary hyperparathyroidism in dialysis.
  treatment_term:
    preferred_term: calcimimetic therapy
    term:
      id: MAXO:0000058
      label: pharmacotherapy
  evidence:
  - reference: PMID:23121374
    reference_title: "Effect of cinacalcet on cardiovascular disease in patients undergoing dialysis."
    supports: PARTIAL
    evidence_source: HUMAN_CLINICAL
    snippet: In an unadjusted intention-to-treat analysis, cinacalcet did not significantly reduce the risk of death or major
      cardiovascular events in patients with moderate-to-severe secondary hyperparathyroidism who were undergoing dialysis.
    explanation: The EVOLVE trial (n=3883) showed cinacalcet did not significantly reduce cardiovascular events in the primary
      ITT analysis, though secondary analyses suggested benefit after adjustment for baseline characteristics.
- name: Parathyroidectomy
  description: >
    Surgical removal of hyperplastic parathyroid glands for refractory secondary or tertiary hyperparathyroidism unresponsive
    to medical therapy.
  treatment_term:
    preferred_term: parathyroidectomy
    term:
      id: MAXO:0000004
      label: surgical procedure
  evidence:
  - reference: PMID:29523679
    reference_title: "Parathyroidectomy in the Management of Secondary Hyperparathyroidism."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: When parathyroid hormone level persists >800 pg/ml for >6 months, despite exhaustive medical interventions, monoclonal
      proliferation with nodular hyperplasia is likely present along with decreased expression of vitamin D and calcium-sensing
      receptors. Hence, surgical parathyroidectomy should be considered
    explanation: Defines indications for parathyroidectomy in refractory secondary hyperparathyroidism based on PTH thresholds
      and medical therapy failure.
- name: Dialysis Optimization
  description: >
    Adjustment of dialysate calcium concentration and extended/frequent dialysis sessions to improve phosphate and calcium
    clearance.
  treatment_term:
    preferred_term: dialysis optimization
    term:
      id: MAXO:0000602
      label: hemodialysis
  evidence:
  - reference: PMID:38573243
    reference_title: "New therapeutic perspectives for vascular and valvular calcifications in chronic kidney disease."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: Conventional therapies targeted at CKD-mineral and bone disorder (MBD) modulation have yielded conflicting or
      inconclusive results.
    explanation: Highlights that conventional CKD-MBD therapies including dialysis optimization have inconsistent effects
      on vascular calcification outcomes.
- name: Kidney Transplantation
  description: >
    Restores renal 1-alpha-hydroxylase activity and phosphate excretion. Most effective treatment for CKD-MBD, though persistent
    hyperparathyroidism (tertiary) may occur post-transplant.
  treatment_term:
    preferred_term: kidney transplantation
    term:
      id: MAXO:0010039
      label: organ transplantation
  evidence:
  - reference: PMID:33765230
    reference_title: "Bone Mineral Disease After Kidney Transplantation."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: Chronic kidney disease-mineral bone disorder (CKD-MBD) after kidney transplantation is a mix of pre-existing
      disorders and new alterations.
    explanation: Reviews post-transplant CKD-MBD including persistent hyperparathyroidism, hypercalcemia, and ongoing bone
      disease despite restored renal function.
