    - elevated calcium-phosphate product
- name: Bone-Vascular Paradox (Sclerostin/Wnt Axis)
  description: >
    Calcified arteries in CKD produce sclerostin and other factors that inhibit bone remodeling, explaining the paradox of
    simultaneous vascular calcification and low-turnover (adynamic) bone disease. Vascular osteoblastic/osteocytic transdifferentiation
    produces sclerostin that brakes Wnt-driven calcification in the vasculature but also suppresses skeletal bone formation.
    Anti-sclerostin antibody therapy improves bone but can worsen vascular calcification, highlighting the therapeutic complexity.
  cell_types:
  - preferred_term: Vascular Smooth Muscle Cell
    term:
      id: CL:0000359
      label: vascular associated smooth muscle cell
  - preferred_term: Osteocyte
    term:
      id: CL:0000137
      label: osteocyte
  biological_processes:
  - preferred_term: Wnt Signaling Pathway
    term:
      id: GO:0016055
      label: Wnt signaling pathway
  - preferred_term: Bone Remodeling
    term:
      id: GO:0046849
      label: bone remodeling
  evidence:
  - reference: PMID:36776982
    reference_title: "Updates in the chronic kidney disease-mineral bone disorder show the role of osteocytic proteins, a potential mechanism of the bone-Vascular paradox, a therapeutic target, and a biomarker."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: The discovery that calcified arteries in chronic kidney disease inhibit bone remodeling lead to the identification
      of factors produced by the vasculature that inhibit the skeleton, thus providing a potential explanation for the bone-vascular
      paradox.
    explanation: Identifies the mechanism of the bone-vascular paradox where calcified arteries produce factors that inhibit
      skeletal bone remodeling.
  - reference: PMID:36776982
    reference_title: "Updates in the chronic kidney disease-mineral bone disorder show the role of osteocytic proteins, a potential mechanism of the bone-Vascular paradox, a therapeutic target, and a biomarker."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: Sclerostin is a potent inhibitor of bone remodeling and an osteocyte specific protein. Its production by the
      vasculature in chronic kidney disease identifies the key role of vascular cell osteoblastic/osteocytic transdifferentiation
      in vascular calcification and renal osteodystrophy.
    explanation: Vascular production of sclerostin through osteoblastic transdifferentiation of vascular cells links vascular
      calcification to bone disease.
  - reference: PMID:36776982
    reference_title: "Updates in the chronic kidney disease-mineral bone disorder show the role of osteocytic proteins, a potential mechanism of the bone-Vascular paradox, a therapeutic target, and a biomarker."
    supports: SUPPORT
    evidence_source: MODEL_ORGANISM
    snippet: inhibition of sclerostin activity by a monoclonal antibody improved bone remodeling as expected, but stimulated
      vascular calcification, demonstrate that vascular sclerostin functions to brake the Wnt stimulation of the calcification
      milieu
    explanation: Anti-sclerostin antibody demonstrates the paradox - improving bone worsens vascular calcification, confirming
      sclerostin's protective role in vasculature.
  downstream:
  - target: Decreased Bone Mineral Density
    description: Vascular sclerostin suppresses skeletal Wnt signaling and bone formation
    causal_link_type: INDIRECT_KNOWN_INTERMEDIATES
    intermediate_mechanisms:
    - sclerostin inhibition of Wnt pathway
    - suppressed osteoblast activity
- name: RANKL/OPG Imbalance
  description: >
    Elevated PTH increases RANKL expression by osteoblasts and osteocytes while suppressing osteoprotegerin (OPG), shifting
    the balance toward excessive osteoclastogenesis and bone resorption. Uremic toxins may independently alter RANKL/OPG signaling.
    Novel biologicals targeting RANKL (denosumab) and sclerostin are being explored in CKD-MBD but require careful consideration
    of the bone-vascular paradox.
  biological_processes:
  - preferred_term: Osteoclast Differentiation
    term:
      id: GO:0030316
      label: osteoclast differentiation
  evidence:
  - reference: PMID:28540603
    reference_title: "Positioning novel biologicals in CKD-mineral and bone disorders."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: Renal osteodystrophy (ROD), the histologic bone lesions of chronic kidney disease (CKD), is now included in a
      wider syndrome with laboratory abnormalities of mineral metabolism and extra-skeletal calcifications or CKD-mineral
      and bone disorders (CKD-MBD), to highlight the increased burden of mortality.
    explanation: Reviews the positioning of novel biologicals including denosumab (anti-RANKL) in CKD-MBD, discussing the
      RANKL/OPG axis as a therapeutic target.
  downstream:
  - target: Decreased Bone Mineral Density
    description: Excessive osteoclastogenesis increases bone resorption, reducing BMD
    causal_link_type: INDIRECT_KNOWN_INTERMEDIATES
    intermediate_mechanisms:
    - increased osteoclast activity
    - excessive bone resorption
  - target: Pathological Fractures
    description: Reduced BMD from RANKL-driven resorption increases fracture risk
    causal_link_type: INDIRECT_KNOWN_INTERMEDIATES
    intermediate_mechanisms:
    - reduced bone mineral density
    - impaired bone microarchitecture
  - target: Bone Pain
    description: High-turnover bone disease with excessive resorption causes bone pain
    causal_link_type: INDIRECT_KNOWN_INTERMEDIATES
    intermediate_mechanisms:
    - increased bone turnover
    - periosteal inflammation
