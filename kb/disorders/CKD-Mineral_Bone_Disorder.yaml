      term:
        id: LOINC:54390-0
        label: Fibroblast growth factor 23 [Mass/volume] in Serum or Plasma
  - name: Soluble_Klotho
    dataset_identifier: sKlotho
    description: Soluble alpha-Klotho, FGF23 co-receptor shed from kidney
