  evidence:
  - reference: PMID:37258233
    reference_title: "Role of Chronic Kidney Disease (CKD)-Mineral and Bone Disorder (MBD) in the Pathogenesis of Cardiovascular Disease in CKD."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: CKD-MBD manifests as hypocalcemia and hyperphosphatemia in the later stages of CKD; however, it initially develops
      much earlier in disease course. The initial step in CKD-MBD involves decreased phosphate excretion in the urine, followed
      by increased circulating concentrations of fibroblast growth factor 23 (FGF23) and parathyroid hormone (PTH), which
      increase urinary phosphate excretion.
    explanation: Confirms that FGF23 and PTH rise early in CKD as compensatory responses to decreased phosphate excretion,
      before overt hyperphosphatemia.
  - reference: PMID:36821389
    reference_title: "Kidney glycolysis serves as a mammalian phosphate sensor that maintains phosphate homeostasis."
    supports: SUPPORT
    evidence_source: MODEL_ORGANISM
    snippet: phosphate increases kidney-specific glycolysis and synthesis of glycerol-3-phosphate (G-3-P), which then circulates
      to bone to trigger FGF23 production
    explanation: Identifies the molecular mechanism linking phosphate load to FGF23 production via a kidney-bone metabolic
      feedback loop involving G-3-P. Mouse and human data.
  - reference: PMID:38541742
    reference_title: "Chronic Kidney Disease with Mineral Bone Disorder and Vascular Calcification: An Overview."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: These disturbances, observed early in CKD, contribute to the progression of bone disorders and renal osteodystrophy
    explanation: Confirms mineral metabolism disturbances including FGF23 are observed early in CKD progression.
  downstream:
  - target: Secondary Hyperparathyroidism
    description: Hyperphosphatemia directly stimulates PTH secretion; FGF23 suppresses calcitriol removing PTH inhibition
    causal_link_type: INDIRECT_KNOWN_INTERMEDIATES
    intermediate_mechanisms:
