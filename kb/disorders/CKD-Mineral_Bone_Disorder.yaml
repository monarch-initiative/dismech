    label: renal osteodystrophy
has_subtypes:
- name: High-Turnover Bone Disease (Osteitis Fibrosa)
  description: >
    Driven by secondary hyperparathyroidism with excessive osteoclast-mediated bone resorption and disorganized new bone formation.
    The most common form in dialysis patients.
  evidence:
  - reference: PMID:34137924
    reference_title: "Bone Histomorphometry and (18)F-Sodium Fluoride Positron Emission Tomography Imaging: Comparison Between only Bone Turnover-based and Unified TMV-based Classification of Renal Osteodystrophy."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: 42% had high turnover/hyperparathyroid bone disease and 23% had low turnover/adynamic bone disease
    explanation: Bone biopsy study of 26 dialysis patients using TMV classification showing hyperparathyroid/high-turnover
      disease as the most common subtype.
- name: Low-Turnover Bone Disease (Adynamic Bone Disease)
  description: >
    Characterized by suppressed bone formation and resorption, often from over-suppression of PTH or aluminum toxicity. Associated
    with increased fracture risk and vascular calcification.
  evidence:
  - reference: PMID:34137924
    reference_title: "Bone Histomorphometry and (18)F-Sodium Fluoride Positron Emission Tomography Imaging: Comparison Between only Bone Turnover-based and Unified TMV-based Classification of Renal Osteodystrophy."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: 42% had high turnover/hyperparathyroid bone disease and 23% had low turnover/adynamic bone disease
    explanation: Bone biopsy study confirms adynamic bone disease as a recognized subtype of renal osteodystrophy, present
      in 23% of dialysis patients.
- name: Mixed Uremic Osteodystrophy
  description: >
    Features of both high- and low-turnover disease. Shows areas of increased resorption alongside defective mineralization.
  evidence:
  - reference: PMID:28540603
    reference_title: "Positioning novel biologicals in CKD-mineral and bone disorders."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: Renal osteodystrophy (ROD), the histologic bone lesions of chronic kidney disease (CKD), is now included in a
      wider syndrome with laboratory abnormalities of mineral metabolism and extra-skeletal calcifications or CKD-mineral
      and bone disorders (CKD-MBD)
    explanation: Reviews the spectrum of renal osteodystrophy subtypes including mixed forms within the broader CKD-MBD framework.
- name: Osteomalacia
  description: >
    Defective bone mineralization due to vitamin D deficiency or aluminum accumulation. Characterized by increased osteoid
    volume with decreased mineralization rate.
  evidence:
  - reference: PMID:28646995
    reference_title: "Executive summary of the 2017 KDIGO Chronic Kidney Disease-Mineral and Bone Disorder (CKD-MBD) Guideline Update: what's changed and why it matters."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: Topic areas encompassing updated recommendations include diagnosis of bone abnormalities in CKD-mineral and bone
      disorder (MBD), treatment of CKD-MBD by targeting phosphate lowering and calcium maintenance
    explanation: KDIGO 2017 guideline recognizes osteomalacia (defective mineralization) as a distinct bone pathology within
      CKD-MBD requiring specific diagnostic and treatment approaches.
pathophysiology:
- name: Phosphate Retention and FGF23 Axis
  description: >
    As nephron mass declines, phosphate excretion per nephron increases via FGF23 and PTH-mediated suppression of proximal
    tubular sodium-phosphate cotransporters (NaPi-2a/NaPi-2c). FGF23 rises early in CKD (stage 2) before serum phosphate becomes
    overtly elevated. FGF23 requires the co-receptor alpha-Klotho, which is predominantly expressed in the kidney and declines
    with CKD progression, creating a vicious cycle.
  cell_types:
