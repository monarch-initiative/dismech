treatments:
- name: Riboflavin (Vitamin B2) Supplementation
  description: >
    High-dose riboflavin (vitamin B2), the precursor of the FAD cofactor,
    improves complex I activity in the majority of patient-derived fibroblasts
    and in many treated patients, and is associated with significantly better
    survival in early-onset disease. The proposed mechanism is that increased
    mitochondrial FAD supports FAD binding and improves ACAD9 folding and
    stability, thereby promoting complex I assembly.
  therapeutic_modality: SMALL_MOLECULE
  treatment_term:
    preferred_term: B vitamin supplementation
    term:
      id: MAXO:0000761
      label: B vitamin supplementation
    therapeutic_agent:
    - preferred_term: riboflavin
      term:
        id: CHEBI:17015
        label: riboflavin
  target_mechanisms:
  - target: ACAD9 loss of complex I assembly-factor function
    treatment_effect: MODULATES
    description: >
      Supplemental riboflavin raises mitochondrial FAD, supporting FAD binding
      and improving ACAD9 folding/stability to promote complex I assembly.
    evidence:
    - reference: PMID:30025539
      reference_title: "Clinical, biochemical and genetic spectrum of 70 patients with ACAD9 deficiency: is riboflavin supplementation effective?"
      supports: SUPPORT
      evidence_source: IN_VITRO
      snippet: >-
        Our data show that riboflavin treatment improves complex I activity in
        the majority of patient-derived fibroblasts tested.
      explanation: >-
        Patient-fibroblast data show riboflavin improves complex I activity, the
        rescued assembly-factor mechanism.
    - reference: PMID:30025539
      reference_title: "Clinical, biochemical and genetic spectrum of 70 patients with ACAD9 deficiency: is riboflavin supplementation effective?"
      supports: SUPPORT
      evidence_source: OTHER
      snippet: >-
        previous studies suggested that riboflavin increases the mitochondrial
        FAD concentration thereby supporting FAD binding and consecutively
        improving ACAD9 folding and stability, thus promoting complex I assembly
      explanation: >-
        States the proposed molecular mechanism by which riboflavin rescues
        complex I assembly via ACAD9 stabilization.
  evidence:
  - reference: PMID:30025539
    reference_title: "Clinical, biochemical and genetic spectrum of 70 patients with ACAD9 deficiency: is riboflavin supplementation effective?"
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      In the patient group with disease-onset below 1 year of age, we observed a
      statistically-significant better survival for patients treated with
      riboflavin.
    explanation: >-
      Clinical outcome data show a survival benefit of riboflavin in early-onset
      ACAD9 deficiency.
  - reference: PMID:20929961
