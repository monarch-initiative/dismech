  features: >
    ACAD9 deficiency results from biallelic pathogenic variants in ACAD9.
    Causal variants are distributed throughout the gene with no clear
    genotype-phenotype correlation, and biallelic loss-of-function is not
    observed, suggesting complete loss is incompatible with life.
