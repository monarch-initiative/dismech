name: ACAD9 Deficiency
creation_date: '2026-07-02T00:00:00Z'
category: Genetic
synonyms:
- Acyl-CoA dehydrogenase 9 deficiency
- ACAD9-related mitochondrial complex I deficiency
- Mitochondrial complex I deficiency, nuclear type 20
description: >
  ACAD9 deficiency is an autosomal recessive mitochondrial disorder caused by
  biallelic pathogenic variants in ACAD9. Although ACAD9 is a member of the
  mitochondrial acyl-CoA dehydrogenase family - closely related to very
  long-chain acyl-CoA dehydrogenase (VLCAD) and retaining residual long-chain
  acyl-CoA dehydrogenase activity - its essential physiological role is as a
  mitochondrial respiratory chain complex I assembly factor. ACAD9 associates
  with the assembly factors NDUFAF1 and ECSIT within the mitochondrial complex I
  assembly (MCIA) complex, so loss of ACAD9 function causes isolated
  mitochondrial complex I deficiency and defective oxidative phosphorylation
  rather than a primary fatty-acid-oxidation flux block. The clinical picture is
  dominated by hypertrophic cardiomyopathy, exercise intolerance with lactic
  acidosis, and muscular weakness, with encephalopathy and other neurologic
  features in a subset; onset ranges from the neonatal period through childhood.
  A clinically important feature is that many patients are riboflavin-responsive:
  supplemental riboflavin (vitamin B2), the precursor of the FAD cofactor,
  improves ACAD9 folding/stability and complex I activity and is associated with
  better survival in early-onset disease. This entry is included in the
  beta-oxidation acyl-CoA-dehydrogenase-family sweep because of ACAD9's family
  membership, but the disease mechanism is respiratory-chain/complex I, not a
  classic fatty-acid-oxidation disorder.
disease_term:
  preferred_term: acyl-CoA dehydrogenase 9 deficiency
  term:
    id: MONDO:0012624
    label: acyl-CoA dehydrogenase 9 deficiency
parents:
- Mitochondrial Disease
- Inborn Error of Metabolism
prevalence:
- population: Children with cardiac hypertrophy and isolated complex I deficiency
  notes: >-
    No population-wide prevalence estimate is established. In a retrospective
    series of 20 unrelated children with cardiac hypertrophy and isolated
    complex I deficiency, biallelic ACAD9 variants were identified in 8/20 (40%),
    making ACAD9 deficiency the most frequent identified cause in that subgroup.
  evidence:
  - reference: PMID:26669660
    reference_title: "High incidence and variable clinical outcome of cardiac hypertrophy due to ACAD9 mutations in childhood."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      We retrospectively studied a series of 20 unrelated children with cardiac
      hypertrophy and isolated complex I deficiency and identified compound
      heterozygosity for missense, splice site or frame shift ACAD9 variants in
      8/20 patients (40%).
    explanation: >-
      Human clinical series quantifies ACAD9 as the identified cause in 40% of
      children with cardiac hypertrophy and isolated complex I deficiency.
progression:
- notes: >-
    Most patients present in the first year of life. Early-onset disease carries
    poor survival (about 50% not surviving the first 2 years), whereas
    later-onset presentation has a much better prognosis (more than 90%
    surviving 10 years). Survivors of the neonatal period may develop
    delayed-onset neurologic and muscular symptoms.
  evidence:
  - reference: PMID:30025539
    reference_title: "Clinical, biochemical and genetic spectrum of 70 patients with ACAD9 deficiency: is riboflavin supplementation effective?"
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      For this subgroup the survival was poor (50% not surviving the first 2
      years) comparing to patients with a later presentation (more than 90%
      surviving 10 years).
    explanation: >-
      Human cohort documents the age-of-onset-dependent survival gradient in
      ACAD9 deficiency.
pathophysiology:
- name: ACAD9 loss of complex I assembly-factor function
  description: >
    ACAD9 functions as a mitochondrial respiratory chain complex I assembly
    factor, binding the assembly factors NDUFAF1 and ECSIT within the MCIA
    complex. Biallelic ACAD9 variants impair this assembly-factor role.
    Although ACAD9 belongs to the acyl-CoA dehydrogenase family and retains
    residual long-chain acyl-CoA dehydrogenase activity, its disease-relevant
    essential function is complex I assembly, not fatty acid oxidation flux.
  genes:
  - preferred_term: ACAD9
    term:
      id: hgnc:21497
      label: ACAD9
  molecular_functions:
  - preferred_term: acyl-CoA dehydrogenase activity
    term:
      id: GO:0003995
      label: acyl-CoA dehydrogenase activity
    modifier: DECREASED
  biological_processes:
  - preferred_term: mitochondrial respiratory chain complex I assembly
    term:
      id: GO:0032981
      label: mitochondrial respiratory chain complex I assembly
    modifier: DECREASED
  locations:
  - preferred_term: mitochondrial inner membrane
    term:
      id: GO:0005743
      label: mitochondrial inner membrane
  evidence:
  - reference: PMID:20816094
    reference_title: "Acyl-CoA dehydrogenase 9 is required for the biogenesis of oxidative phosphorylation complex I."
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: >-
      ACAD9 binds complex I assembly factors NDUFAF1 and Ecsit and is
      specifically required for the assembly of complex I.
    explanation: >-
      Cell-based work establishes ACAD9 as a complex I assembly factor binding
      NDUFAF1 and ECSIT.
  - reference: PMID:20816094
    reference_title: "Acyl-CoA dehydrogenase 9 is required for the biogenesis of oxidative phosphorylation complex I."
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: >-
      It closely resembles very long-chain acyl-CoA dehydrogenase (VLCAD),
      involved in mitochondrial beta oxidation of long-chain fatty acids.
    explanation: >-
      Documents ACAD9's membership in the acyl-CoA dehydrogenase family and its
      close relationship to VLCAD, the basis for including it in the
      beta-oxidation-family sweep.
  - reference: PMID:30025539
    reference_title: "Clinical, biochemical and genetic spectrum of 70 patients with ACAD9 deficiency: is riboflavin supplementation effective?"
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      residual ACAD9 enzyme activity, and not complex I activity, correlates
      with the severity of clinical symptoms in ACAD9 deficient patients
    explanation: >-
      Confirms ACAD9 retains residual acyl-CoA dehydrogenase activity, which
      modifies clinical severity, while the disease is a complex I disorder.
  downstream:
  - target: Mitochondrial complex I deficiency
    description: >
      Loss of ACAD9 assembly-factor function prevents proper assembly of
      respiratory chain complex I, producing isolated complex I deficiency.
    causal_link_type: DIRECT
    evidence:
    - reference: PMID:20816094
      reference_title: "Acyl-CoA dehydrogenase 9 is required for the biogenesis of oxidative phosphorylation complex I."
      supports: SUPPORT
      evidence_source: IN_VITRO
      snippet: >-
        Furthermore, ACAD9 mutations result in complex I deficiency and not in
        disturbed long-chain fatty acid oxidation.
      explanation: >-
        Directly establishes that ACAD9 mutations cause complex I deficiency,
        not a fatty-acid-oxidation defect.
    - reference: PMID:21057504
      reference_title: "Exome sequencing identifies ACAD9 mutations as a cause of complex I deficiency."
      supports: SUPPORT
      evidence_source: IN_VITRO
      snippet: >-
        We demonstrated the pathogenic role of the ACAD9 variants by the
        correction of the complex I defect on expression of the wildtype ACAD9
        protein in fibroblasts derived from affected individuals.
      explanation: >-
        Complementation rescue in patient fibroblasts causally links ACAD9
        variants to the complex I defect.
- name: Mitochondrial complex I deficiency
  description: >
    Impaired assembly of respiratory chain complex I (NADH:ubiquinone
    oxidoreductase) produces isolated complex I deficiency, the most common
    oxidative phosphorylation defect. This is demonstrable biochemically in
    patient skeletal muscle and fibroblasts.
  locations:
  - preferred_term: mitochondrial inner membrane
    term:
      id: GO:0005743
      label: mitochondrial inner membrane
  biological_processes:
  - preferred_term: oxidative phosphorylation
    term:
      id: GO:0006119
      label: oxidative phosphorylation
    modifier: DECREASED
  evidence:
  - reference: PMID:21057504
    reference_title: "Exome sequencing identifies ACAD9 mutations as a cause of complex I deficiency."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      An isolated defect of respiratory chain complex I activity is a frequent
      biochemical abnormality in mitochondrial disorders.
    explanation: >-
      Frames isolated complex I deficiency as the biochemical hallmark, the
      defect ACAD9 mutations were found to cause.
  - reference: PMID:20929961
    reference_title: "Riboflavin-responsive oxidative phosphorylation complex I deficiency caused by defective ACAD9: new function for an old gene."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      In muscle, subsarcolemmal mitochondrial proliferation and a severe
      complex I deficiency were observed.
    explanation: >-
      Patient skeletal muscle shows severe complex I deficiency with
      mitochondrial proliferation.
  downstream:
  - target: Defective oxidative phosphorylation and cellular energy failure
    description: >
      Complex I deficiency impairs electron transport and oxidative
      phosphorylation, reducing mitochondrial ATP production and forcing a shift
      to anaerobic glycolysis.
    causal_link_type: DIRECT
    evidence:
    - reference: PMID:20816094
      reference_title: "Acyl-CoA dehydrogenase 9 is required for the biogenesis of oxidative phosphorylation complex I."
      supports: SUPPORT
      evidence_source: IN_VITRO
      snippet: >-
        Contrary to its previously proposed involvement in fatty acid
        oxidation, we describe a role for ACAD9 in oxidative phosphorylation.
      explanation: >-
        Places ACAD9 - and therefore its deficiency - squarely within oxidative
        phosphorylation.
- name: Defective oxidative phosphorylation and cellular energy failure
  description: >
    Reduced complex I-dependent oxidative phosphorylation causes an energy
    deficit that most affects high-demand oxidative tissues (heart, skeletal
    muscle, brain) and drives increased lactate production. Clinically this
    manifests as hypertrophic cardiomyopathy, exercise intolerance with lactic
    acidosis, muscular weakness, and neurologic involvement.
  biological_processes:
  - preferred_term: aerobic respiration
    term:
      id: GO:0009060
      label: aerobic respiration
    modifier: DECREASED
  chemical_entities:
  - preferred_term: lactate
    term:
      id: CHEBI:24996
      label: lactate
    modifier: INCREASED
  evidence:
  - reference: PMID:30025539
    reference_title: "Clinical, biochemical and genetic spectrum of 70 patients with ACAD9 deficiency: is riboflavin supplementation effective?"
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Disease causing biallelic variants in ACAD9 have been reported in
      individuals presenting with lactic acidosis and cardiomyopathy.
    explanation: >-
      Links the ACAD9 complex I energy defect to its cardinal clinical
      manifestations, lactic acidosis and cardiomyopathy.
  downstream:
  - target: Hypertrophic cardiomyopathy
    description: >
      Cardiac dependence on oxidative ATP makes hypertrophic cardiomyopathy the
      dominant and often fatal manifestation of ACAD9 complex I deficiency.
    causal_link_type: INDIRECT_KNOWN_INTERMEDIATES
    intermediate_mechanisms:
    - Cardiomyocyte energy failure from complex I deficiency drives hypertrophic remodeling.
    evidence:
    - reference: PMID:26669660
      reference_title: "High incidence and variable clinical outcome of cardiac hypertrophy due to ACAD9 mutations in childhood."
      supports: SUPPORT
      evidence_source: HUMAN_CLINICAL
      snippet: >-
        Acyl-CoA dehydrogenase family, member 9 (ACAD9) mutation is a frequent,
        usually fatal cause of early-onset cardiac hypertrophy and mitochondrial
        respiratory chain complex I deficiency in early childhood.
      explanation: >-
        Human clinical series identifies cardiac hypertrophy as the frequent,
        often fatal presentation of ACAD9 complex I deficiency.
  - target: Lactic acidosis
    description: >
      Impaired oxidative phosphorylation shifts metabolism toward anaerobic
      glycolysis, elevating lactate and producing lactic acidosis, especially
      during metabolic or exertional stress.
    causal_link_type: DIRECT
    evidence:
    - reference: PMID:20929961
      reference_title: "Riboflavin-responsive oxidative phosphorylation complex I deficiency caused by defective ACAD9: new function for an old gene."
      supports: SUPPORT
      evidence_source: HUMAN_CLINICAL
      snippet: >-
        In a consanguineous family, patients presented easy fatigability,
        exercise intolerance and lactic acidosis in blood from early childhood.
      explanation: >-
        Documents lactic acidosis (and exercise intolerance) as early clinical
        features of ACAD9 complex I deficiency.
  - target: Exercise intolerance
    description: >
      Skeletal muscle cannot meet oxidative energy demand during exertion,
      producing exercise intolerance and easy fatigability.
    causal_link_type: DIRECT
    evidence:
    - reference: PMID:20929961
      reference_title: "Riboflavin-responsive oxidative phosphorylation complex I deficiency caused by defective ACAD9: new function for an old gene."
      supports: SUPPORT
      evidence_source: HUMAN_CLINICAL
      snippet: >-
        In a consanguineous family, patients presented easy fatigability,
        exercise intolerance and lactic acidosis in blood from early childhood.
      explanation: >-
        Documents exercise intolerance as an early clinical feature.
  - target: Muscle weakness
    description: >
      Chronic muscle energy failure from complex I deficiency causes muscular
      weakness, one of the most common findings.
    causal_link_type: INDIRECT_KNOWN_INTERMEDIATES
    intermediate_mechanisms:
    - Skeletal muscle ATP deficit from complex I deficiency impairs contractile function.
    evidence:
    - reference: PMID:30025539
      reference_title: "Clinical, biochemical and genetic spectrum of 70 patients with ACAD9 deficiency: is riboflavin supplementation effective?"
      supports: SUPPORT
      evidence_source: HUMAN_CLINICAL
      snippet: >-
        The most common clinical findings were cardiomyopathy (85%), muscular
        weakness (75%) and exercise intolerance (72%).
      explanation: >-
        Human cohort quantifies muscular weakness among the most common
        findings.
  - target: Delayed-onset neurologic involvement
    description: >
      Brain dependence on oxidative metabolism produces delayed-onset
      neurologic features (cognitive impairment, seizures) in survivors.
    causal_link_type: INDIRECT_UNKNOWN_INTERMEDIATES
    evidence:
    - reference: PMID:26669660
      reference_title: "High incidence and variable clinical outcome of cardiac hypertrophy due to ACAD9 mutations in childhood."
      supports: SUPPORT
      evidence_source: HUMAN_CLINICAL
      snippet: >-
        the surviving patients later developed delayed-onset neurologic or
        muscular symptoms, namely cognitive impairment, seizures, muscle
        weakness and exercise intolerance.
      explanation: >-
        Documents delayed-onset neurologic involvement in ACAD9-deficient
        survivors.
  - target: Multiorgan involvement
    description: >
      Additional oxidative-demand tissues can be affected, including proximal
      renal tubulopathy, renal failure, and optic atrophy.
    causal_link_type: INDIRECT_UNKNOWN_INTERMEDIATES
    evidence:
    - reference: PMID:26669660
      reference_title: "High incidence and variable clinical outcome of cardiac hypertrophy due to ACAD9 mutations in childhood."
      supports: SUPPORT
      evidence_source: HUMAN_CLINICAL
      snippet: >-
        Other organ involvement included proximal tubulopathy, renal failure,
        secondary ovarian failure and optic atrophy.
      explanation: >-
        Documents additional organ involvement in ACAD9 deficiency.
