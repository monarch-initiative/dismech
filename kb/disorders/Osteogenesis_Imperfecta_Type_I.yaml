    evidence_source: HUMAN_CLINICAL
    snippet: "HP:0002645 | Wormian bones | Occasional (29-5%)"
    explanation: >-
      Orphanet lists Wormian bones as an occasional feature of the OI spectrum,
      consistent with their recognised occurrence across OI types including type I.
  - reference: PMID:34688943
    reference_title: "Monitoring Skull Base Abnormalities in Children with Osteogenesis Imperfecta."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "findings (presence of Wormian bones, platybasia, basilar impression (McGregor's"
    explanation: >-
      This NHS England specialist OI service study systematically recorded Wormian
      bones on skull radiographs across OI subtypes, confirming their role as a
      monitored cranial finding in OI including milder forms.
