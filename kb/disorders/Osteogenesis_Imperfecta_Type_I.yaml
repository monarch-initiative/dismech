diagnosis:
- name: Clinical and Molecular Diagnosis
  description: >-
    The diagnosis of osteogenesis imperfecta type I (now described in
    GeneReviews as classic non-deforming OI with blue sclerae) rests on the
    characteristic clinical and radiographic features of mild bone fragility
    with blue sclerae, and is confirmed by identification of a heterozygous
    COL1A1 null variant on molecular genetic testing.
  diagnosis_term:
    preferred_term: molecular genetic testing
    term:
      id: MAXO:0000533
      label: molecular genetic testing
  evidence:
  - reference: PMID:20301472
    reference_title: "COL1A1- and COL1A2-Related Osteogenesis Imperfecta."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "The diagnosis of COL1A1/COL1A2-OI is established in a proband with clinical and radiographic manifestations of OI by identification of a heterozygous in COL1A1 or COL1A2 by molecular genetic testing."
    explanation: >-
      GeneReviews defines the combined clinical/radiographic plus molecular
      diagnostic criteria for COL1A1/COL1A2-related OI, which includes the mild
      type I (classic non-deforming) form.
  - reference: PMID:20301472
    reference_title: "COL1A1- and COL1A2-Related Osteogenesis Imperfecta."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "classic non-deforming OI with blue sclerae (previously OI type I)"
    explanation: >-
      GeneReviews maps the legacy Sillence type I label to the modern
      descriptive nomenclature for the mild, non-deforming form.
- name: Multidisciplinary Surveillance
  description: >-
    Surveillance appropriate to OI severity includes serial bone-density
    assessment, hearing evaluation, dental review, and growth/spine monitoring.
  evidence:
  - reference: PMID:20301472
    reference_title: "COL1A1- and COL1A2-Related Osteogenesis Imperfecta."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "DXA scans beginning at age five years with follow-up scan based on severity of OI, initial results, and pharmacologic treatment status."
    explanation: >-
      GeneReviews specifies bone-density surveillance as part of routine OI
      monitoring, tailored for mild type I to fracture history and treatment
      status.
treatments:
- name: Bisphosphonate Therapy
  description: >
    Bisphosphonate therapy is used in OI type I primarily in those with vertebral
    fractures or frequent long-bone fractures; evidence for fracture reduction is
    less robust in mild OI than in severe forms. Benefit is most clearly
    established for improving bone mineral density in children.
  treatment_term:
    preferred_term: Bisphosphonate therapy
    term:
      id: MAXO:0000954
      label: bisphosphonate agent therapy
  evidence:
  - reference: PMID:20301472
    reference_title: "COL1A1- and COL1A2-Related Osteogenesis Imperfecta."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Bisphosphonates continue to be used most extensively in those with vertebral fractures, frequent long bone fractures, or more severe OI."
    explanation: >-
      GeneReviews notes bisphosphonate use is most strongly indicated for patients
      with vertebral or frequent fractures, applying a severity-based threshold
      rather than prescribing universally for mild OI.
- name: Physical Therapy
  description: >
    Exercise and physical therapy to strengthen muscles and improve mobility
    while protecting fragile bones.
  treatment_term:
    preferred_term: Physical therapy
    term:
      id: MAXO:0000011
      label: physical therapy
- name: Fracture Management
  description: >
    Most fractures in OI type I are managed conservatively with casting,
    splinting, and brief immobilization. Intramedullary rodding is reserved
    for recurrent long-bone fractures causing deformity.
  treatment_term:
    preferred_term: Orthopedic surgery
    term:
      id: MAXO:0000004
      label: surgical procedure
  evidence:
  - reference: PMID:20301472
    reference_title: "COL1A1- and COL1A2-Related Osteogenesis Imperfecta."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Fractures are treated with as short a period of immobility as is practical, small and lightweight casts, and physical therapy as soon as casts are removed; intramedullary rodding when indicated to provide anatomic positioning of limbs; bracing of limbs depending on OI severity."
    explanation: >-
      GeneReviews describes the standard conservative fracture management approach
      and the criteria for intramedullary rodding in OI type I.
- name: Genetic Counseling
  description: >
    Genetic counseling is recommended given autosomal dominant inheritance.
    Approximately 60% of probands with mild OI have de novo mutations; each
    child of an affected individual has a 50% chance of inheriting the
    causative variant. Parental mosaicism occurs in up to 16% of apparently
    unaffected parents, influencing recurrence risk estimation.
  treatment_term:
    preferred_term: Genetic counseling
    term:
      id: MAXO:0000079
      label: genetic counseling
  evidence:
  - reference: PMID:20301472
    reference_title: "COL1A1- and COL1A2-Related Osteogenesis Imperfecta."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "The overall rate of mosaicism is up to 16% in the parents of children with COL1A1/COL1A2-OI. Each child of an individual with COL1A1/COL1A2-OI has a 50% chance of inheriting the causative variant."
    explanation: >-
      GeneReviews quantifies key recurrence risk figures: up to 16% parental
      mosaicism rate and 50% transmission risk per child, supporting the counseling
      description.
- name: Audiological Surveillance and Management
  description: >
    Hearing evaluation every three years from age five until hearing loss is
    identified, then as indicated. Approximately 50% of adults with OI type I
    develop hearing impairment by age 50. Conductive hearing loss may improve
    with middle-ear surgery; sensorineural or mixed hearing loss is managed
    with standard audiological care and hearing aids.
  treatment_term:
    preferred_term: Audiologist evaluation
    term:
      id: MAXO:0000734
      label: audiologist evaluation
  evidence:
  - reference: PMID:20301472
    reference_title: "COL1A1- and COL1A2-Related Osteogenesis Imperfecta."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Conductive hearing loss may be improved with middle ear surgery; standard treatments for later-onset sensorineural hearing loss."
    explanation: >-
      GeneReviews specifies audiological management for progressive hearing loss
      affecting approximately 50% of OI type I patients by age 50.
  - reference: PMID:11276328
    reference_title: "How common is hearing impairment in osteogenesis imperfecta?"
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "At the age of 50 approximately 50 per cent of the patients had symptoms of hearing impairment; over the next 20 years there was little further increase."
    explanation: >-
      Population study of 1,394 OI patients quantifying hearing impairment
      prevalence and onset, informing the audiological surveillance schedule.
- name: Dental Management
  description: >
    Dental examination every six months beginning in early childhood for those
    with or at risk for dentinogenesis imperfecta; annual exams for those
    without DI. Goals include maintaining dentition, functional occlusion,
    gingival health, and appearance.
  treatment_term:
    preferred_term: Dental care
    term:
      id: MAXO:0000264
      label: dental and oral agent therapy
  evidence:
  - reference: PMID:20301472
    reference_title: "COL1A1- and COL1A2-Related Osteogenesis Imperfecta."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Dental care to maintain both primary and permanent dentition, a functional bite or occlusion, optimal gingival health, and overall appearance."
    explanation: >-
      GeneReviews specifies dental care goals for COL1A1/COL1A2-related OI,
      with frequency based on dentinogenesis imperfecta status.
