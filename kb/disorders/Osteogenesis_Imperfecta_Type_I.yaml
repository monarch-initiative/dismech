    explanation: >-
      Orphanet lists hyperhidrosis as a frequent feature of the OI spectrum, supporting its
      occurrence in type I OI. No type I-specific frequency is asserted here because
      the Orphanet band reflects the whole OI spectrum rather than type I alone.
- category: Ear
