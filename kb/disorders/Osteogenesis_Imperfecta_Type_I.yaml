- category: Skin
  name: Hyperhidrosis
  description: >
    Increased sweating is reported in a substantial minority of OI patients.
    It arises from altered connective-tissue and autonomic thermoregulatory
    responses related to type I collagen deficiency.
  phenotype_term:
    preferred_term: Hyperhidrosis
    term:
      id: HP:0000975
      label: Hyperhidrosis
