  - reference: PMID:23529829
    reference_title: "Skeletal clinical characteristics of osteogenesis imperfecta caused by haploinsufficiency mutations in COL1A1."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "year, one-half of which affected the tibia/fibula. Long-bone fracture rate was"
    explanation: >-
      The inverse relationship between fracture rate and lumbar spine BMD in
      this COL1A1 haploinsufficiency cohort directly reflects the low bone mass
      underlying the osteoporotic phenotype in OI type I.
- category: Skeletal
  name: Bruising Susceptibility
  description: >
    Easy bruising is a recognised extraskeletal feature of OI type I, more
    prominent than in type IV. It reflects deficient type I collagen in skin and
    subcutaneous connective tissue.
  phenotype_term:
    preferred_term: Bruising susceptibility
    term:
      id: HP:0000978
      label: Bruising susceptibility
  frequency: OCCASIONAL
  evidence:
  - reference: ORPHA:666
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "HP:0000978 | Bruising susceptibility | Occasional (29-5%)"
    explanation: >-
      Orphanet lists bruising susceptibility as an occasional feature across the
      OI spectrum, consistent with its documented occurrence in type I.
  - reference: PMID:6822598
    reference_title: "Osteogenesis imperfecta with dominant inheritance and normal sclerae."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      In Type 4 the first fracture more commonly occurs at birth,
      dentinogenesis imperfecta is more frequent than in Type 1 and bruising
      and nose-bleeds are less common.
    explanation: >-
      This type I versus type IV comparison explicitly states that bruising and
      nose-bleeds are more common in type I than in type IV, confirming bruising
      susceptibility as a feature of type I OI.
- category: Skeletal
  name: Bone Pain
  description: >
    Chronic or recurrent bone pain is reported by adults with OI type I and is
    among the most frequently cited unmet clinical concerns in this population.
  phenotype_term:
    preferred_term: Bone pain
    term:
      id: HP:0002653
      label: Bone pain
  frequency: FREQUENT
  evidence:
  - reference: ORPHA:666
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "HP:0002653 | Bone pain | Frequent (79-30%)"
