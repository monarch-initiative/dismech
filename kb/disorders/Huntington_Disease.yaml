  - target: Poor Fine Motor Coordination
  - target: Abnormality of Eye Movement
  - target: Staring Gaze
  - target: Bradykinesia
  - target: Hypokinesia
  - target: Hyperreflexia
  - target: Involuntary Movements
  - target: Speech Articulation Difficulties
