    reference_title: "Phenotypic spectrum of STRA6 mutations: from Matthew-Wood syndrome to non-lethal anophthalmia."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "We performed STRA6 molecular analysis in three fetuses and one child diagnosed with Matthew-Wood syndrome and in three siblings where two adult living brothers are affected with combinations of clinical anophthalmia, tetralogy of Fallot, and mental retardation."
    explanation: This supports intellectual disability as a variable feature in longer-term survivors with STRA6-related disease.
