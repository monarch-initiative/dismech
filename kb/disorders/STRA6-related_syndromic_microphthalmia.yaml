name: STRA6-related syndromic microphthalmia
creation_date: "2026-04-16T19:20:39Z"
updated_date: "2026-04-16T19:20:39Z"
description: >-
  STRA6-related syndromic microphthalmia is a rare autosomal recessive
  developmental disorder, also known as Matthew-Wood syndrome, characterized by
  anophthalmia or microphthalmia together with variable pulmonary hypoplasia or
  agenesis, diaphragmatic defects, and congenital heart malformations. The
  disorder is caused by biallelic pathogenic variants in STRA6 that disrupt
  retinol uptake and embryonic retinoid signaling.
category: Mendelian
parents:
- hereditary disease
- syndromic microphthalmia
synonyms:
- Matthew-Wood syndrome
- syndromic microphthalmia 9
- anophthalmia-pulmonary hypoplasia syndrome
- PDAC syndrome
- Spear syndrome
disease_term:
  preferred_term: STRA6-related syndromic microphthalmia
  term:
    id: MONDO:0011010
    label: Matthew-Wood syndrome
notes: >-
  Preferred display label follows MONDO NTR #10151 while the current MONDO term
  label for MONDO:0011010 remains Matthew-Wood syndrome.
inheritance:
- name: Autosomal recessive inheritance
  description: >-
    STRA6-related syndromic microphthalmia is inherited in an autosomal
    recessive pattern caused by biallelic pathogenic STRA6 variants.
  inheritance_term:
    preferred_term: Autosomal recessive inheritance
    term:
      id: HP:0000007
      label: Autosomal recessive inheritance
  evidence:
  - reference: PMID:26373900
    reference_title: "A novel mutation in two Hmong families broadens the range of STRA6-related malformations to include contractures and camptodactyly."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "PDAC (also termed Matthew Wood) syndrome is a rare, autosomal recessive disorder characterized by pulmonary hypoplasia/aplasia, diaphragmatic defects, bilateral anophthalmia, and cardiac malformations."
    explanation: This directly supports autosomal recessive inheritance for the STRA6-related Matthew-Wood/PDAC syndrome spectrum.
pathophysiology:
- name: STRA6-mediated retinoid signaling defect
  description: >-
    STRA6 encodes a cell-surface receptor and transporter for retinol bound to
    plasma retinol-binding protein. Biallelic STRA6 deficiency disrupts
    embryonic vitamin A uptake and perturbs retinoic acid receptor signaling,
    producing combined defects of eye, lung, diaphragm, and heart development.
  genes:
  - preferred_term: STRA6
    term:
      id: hgnc:30650
      label: STRA6
  biological_processes:
  - preferred_term: retinoic acid receptor signaling pathway
    modifier: ABNORMAL
    term:
      id: GO:0048384
      label: retinoic acid receptor signaling pathway
  - preferred_term: eye morphogenesis
    modifier: ABNORMAL
    term:
      id: GO:0048592
      label: eye morphogenesis
  - preferred_term: lung development
    modifier: ABNORMAL
    term:
      id: GO:0030324
      label: lung development
  - preferred_term: diaphragm development
    modifier: ABNORMAL
    term:
      id: GO:0060539
      label: diaphragm development
  - preferred_term: heart development
    modifier: ABNORMAL
    term:
      id: GO:0007507
      label: heart development
  evidence:
  - reference: PMID:18316031
    reference_title: "RBP4 disrupts vitamin A uptake homeostasis in a STRA6-deficient animal model for Matthew-Wood syndrome."
    supports: SUPPORT
    evidence_source: MODEL_ORGANISM
    snippet: "We provide evidence that, in the absence of Stra6, holo-Rbp4 provokes nonspecific vitamin A excess in several embryonic tissues, impairing retinoic acid receptor signaling and gene regulation."
    explanation: This directly supports disrupted retinoid homeostasis and abnormal retinoic acid receptor signaling as the proximal molecular mechanism of STRA6 deficiency.
  - reference: PMID:18316031
    reference_title: "RBP4 disrupts vitamin A uptake homeostasis in a STRA6-deficient animal model for Matthew-Wood syndrome."
    supports: SUPPORT
    evidence_source: MODEL_ORGANISM
    snippet: "Loss-of-function analysis in zebrafish embryos revealed that Stra6 deficiency caused vitamin A deprivation of the developing eyes."
    explanation: This supports defective embryonic vitamin A uptake as a mechanism for abnormal eye development in STRA6-related disease.
  - reference: PMID:26373900
    reference_title: "A novel mutation in two Hmong families broadens the range of STRA6-related malformations to include contractures and camptodactyly."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "The disorder is caused by mutations in STRA6, an important regulator of vitamin A and retinoic acid metabolism."
    explanation: Human clinical genetics literature connects the STRA6 disease spectrum to abnormal vitamin A and retinoic acid metabolism.
  downstream:
  - target: Anophthalmia
    description: Severe failure of ocular morphogenesis can lead to absent globes.
  - target: Microphthalmia
    description: Partial impairment of ocular morphogenesis can lead to abnormally small eyes.
  - target: Pulmonary hypoplasia
    description: Abnormal cardiopulmonary development contributes to lung underdevelopment.
  - target: Congenital diaphragmatic hernia
    description: Abnormal diaphragm development produces hernia or eventration defects.
  - target: Abnormal heart morphology
    description: Abnormal cardiac morphogenesis produces variable congenital heart defects.
genetic:
- name: STRA6
  association: Causal biallelic pathogenic variant
  gene_term:
    preferred_term: STRA6
    term:
      id: hgnc:30650
      label: STRA6
  notes: >-
    Pathogenic STRA6 alleles include truncating, splice, and missense variants.
    Reported human cases support loss of STRA6 function as the molecular basis
    of Matthew-Wood syndrome / syndromic microphthalmia 9.
  evidence:
  - reference: PMID:17503335
    reference_title: "Matthew-Wood syndrome is caused by truncating mutations in the retinol-binding protein receptor gene STRA6."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "The fetuses had either a homozygous insertion/deletion in exon 2 or a homozygous insertion in exon 7 predicting a premature stop codon in STRA6 transcripts."
    explanation: This directly identifies biallelic truncating STRA6 variants in fetuses with Matthew-Wood syndrome.
  - reference: PMID:19309693
    reference_title: "Phenotypic spectrum of STRA6 mutations: from Matthew-Wood syndrome to non-lethal anophthalmia."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Among these patients, six novel mutations were identified, bringing the current total of known STRA6 mutations to seventeen."
    explanation: This expands the allelic series and reinforces STRA6 as the causal gene across the broader phenotypic spectrum.
phenotypes:
- name: Anophthalmia
  category: Ophthalmologic
  diagnostic: true
  description: Bilateral clinical anophthalmia is one of the classic ocular manifestations of the syndrome.
  phenotype_term:
    preferred_term: Anophthalmia
    term:
      id: HP:0000528
      label: Anophthalmia
  evidence:
  - reference: PMID:26373900
    reference_title: "A novel mutation in two Hmong families broadens the range of STRA6-related malformations to include contractures and camptodactyly."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "PDAC (also termed Matthew Wood) syndrome is a rare, autosomal recessive disorder characterized by pulmonary hypoplasia/aplasia, diaphragmatic defects, bilateral anophthalmia, and cardiac malformations."
    explanation: This directly supports bilateral anophthalmia as a core diagnostic phenotype of STRA6-related disease.
- name: Microphthalmia
  category: Ophthalmologic
  diagnostic: true
  description: Some affected individuals have bilateral microphthalmia rather than complete anophthalmia.
  phenotype_term:
    preferred_term: Microphthalmia
    term:
      id: HP:0000568
      label: Microphthalmia
  evidence:
  - reference: PMID:30880327
    reference_title: "Microphthalmia Syndrome 9: Case Report of a Newborn Baby with Pulmonary Hypoplasia, Diaphragmatic Eventration, Microphthalmia, Cardiac Defect and Severe Primary Pulmonary Hypertension."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "We report a case of a full-term living male infant with pulmonary hypoplasia, left diaphragmatic eventration, bilateral microphthalmia, congenital cardiac defects, and severe pulmonary hypertension."
    explanation: This directly documents bilateral microphthalmia as an alternative core ocular presentation in syndromic microphthalmia 9.
- name: Pulmonary hypoplasia
  category: Respiratory
  diagnostic: true
  description: Pulmonary hypoplasia or agenesis is a hallmark extracocular feature and a major driver of perinatal severity.
  phenotype_term:
    preferred_term: Pulmonary hypoplasia
    term:
      id: HP:0002089
      label: Pulmonary hypoplasia
  evidence:
  - reference: PMID:30880327
    reference_title: "Microphthalmia Syndrome 9: Case Report of a Newborn Baby with Pulmonary Hypoplasia, Diaphragmatic Eventration, Microphthalmia, Cardiac Defect and Severe Primary Pulmonary Hypertension."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "We report a case of a full-term living male infant with pulmonary hypoplasia, left diaphragmatic eventration, bilateral microphthalmia, congenital cardiac defects, and severe pulmonary hypertension."
    explanation: This directly supports pulmonary hypoplasia as a hallmark cardiopulmonary feature of the STRA6-related syndrome.
- name: Congenital diaphragmatic hernia
  category: Respiratory
  diagnostic: true
  description: Diaphragmatic defects are common and include congenital diaphragmatic hernia and eventration.
  phenotype_term:
    preferred_term: congenital diaphragmatic hernia
    term:
      id: HP:0000776
      label: Congenital diaphragmatic hernia
  evidence:
  - reference: PMID:19309693
    reference_title: "Phenotypic spectrum of STRA6 mutations: from Matthew-Wood syndrome to non-lethal anophthalmia."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Matthew-Wood, Spear, PDAC or MCOPS9 syndrome are alternative names used to refer to combinations of microphthalmia/anophthalmia, malformative cardiac defects, pulmonary dysgenesis, and diaphragmatic hernia."
    explanation: This directly supports diaphragmatic hernia as part of the canonical STRA6-associated malformation pattern; clinically, eventration is also reported in some patients.
- name: Abnormal heart morphology
  category: Cardiac
  diagnostic: true
  description: Variable congenital heart malformations are part of the characteristic STRA6-related multisystem phenotype.
  phenotype_term:
    preferred_term: congenital heart defect
    term:
      id: HP:0001627
      label: Abnormal heart morphology
  evidence:
  - reference: PMID:30880327
    reference_title: "Microphthalmia Syndrome 9: Case Report of a Newborn Baby with Pulmonary Hypoplasia, Diaphragmatic Eventration, Microphthalmia, Cardiac Defect and Severe Primary Pulmonary Hypertension."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "We report a case of a full-term living male infant with pulmonary hypoplasia, left diaphragmatic eventration, bilateral microphthalmia, congenital cardiac defects, and severe pulmonary hypertension."
    explanation: This directly supports congenital cardiac defects as a core extracocular manifestation of STRA6-related syndromic microphthalmia.
- name: Intellectual disability
  category: Neurodevelopmental
  description: Surviving affected individuals can have intellectual disability, indicating broader neurodevelopmental involvement in a subset of cases.
  phenotype_term:
    preferred_term: Intellectual disability
    term:
      id: HP:0001249
      label: Intellectual disability
  evidence:
  - reference: PMID:19309693
    reference_title: "Phenotypic spectrum of STRA6 mutations: from Matthew-Wood syndrome to non-lethal anophthalmia."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "We performed STRA6 molecular analysis in three fetuses and one child diagnosed with Matthew-Wood syndrome and in three siblings where two adult living brothers are affected with combinations of clinical anophthalmia, tetralogy of Fallot, and mental retardation."
    explanation: This supports intellectual disability as a variable feature in longer-term survivors with STRA6-related disease.
