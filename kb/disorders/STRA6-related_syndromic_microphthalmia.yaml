name: STRA6-related syndromic microphthalmia
creation_date: "2026-04-16T19:20:39Z"
description: >-
  STRA6-related syndromic microphthalmia is a rare autosomal recessive
  developmental disorder, also known as Matthew-Wood syndrome, characterized by
  anophthalmia or microphthalmia together with variable pulmonary hypoplasia or
  agenesis, diaphragmatic defects, and congenital heart malformations. The
  disorder is caused by biallelic pathogenic variants in STRA6 that disrupt
  retinol uptake and embryonic retinoid signaling.
category: Mendelian
parents:
- hereditary disease
- syndromic microphthalmia
synonyms:
- Matthew-Wood syndrome
- syndromic microphthalmia 9
- anophthalmia-pulmonary hypoplasia syndrome
- PDAC syndrome
- Spear syndrome
disease_term:
  preferred_term: STRA6-related syndromic microphthalmia
  term:
    id: MONDO:0011010
    label: Matthew-Wood syndrome
notes: >-
  Preferred display label follows MONDO NTR #10151 while the current MONDO term
  label for MONDO:0011010 remains Matthew-Wood syndrome. Reported STRA6 disease
  severity spans lethal PDAC/Matthew-Wood presentations with major
  cardiopulmonary and diaphragmatic malformations as well as milder non-lethal
  ocular-predominant presentations.
inheritance:
- name: Autosomal recessive inheritance
  description: >-
    STRA6-related syndromic microphthalmia is inherited in an autosomal
    recessive pattern caused by biallelic pathogenic STRA6 variants.
  inheritance_term:
    preferred_term: Autosomal recessive inheritance
    term:
      id: HP:0000007
      label: Autosomal recessive inheritance
  evidence:
  - reference: PMID:26373900
    reference_title: "A novel mutation in two Hmong families broadens the range of STRA6-related malformations to include contractures and camptodactyly."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "PDAC (also termed Matthew Wood) syndrome is a rare, autosomal recessive disorder characterized by pulmonary hypoplasia/aplasia, diaphragmatic defects, bilateral anophthalmia, and cardiac malformations."
    explanation: This directly supports autosomal recessive inheritance for the STRA6-related Matthew-Wood/PDAC syndrome spectrum.
pathophysiology:
- name: Impaired cellular retinol uptake
  description: >-
    STRA6 encodes a cell-surface receptor and transporter for retinol bound to
    plasma retinol-binding protein. Biallelic STRA6 deficiency impairs cellular
    vitamin A uptake as the initiating molecular defect in the syndrome.
  genes:
  - preferred_term: STRA6
    term:
      id: hgnc:30650
      label: STRA6
  evidence:
  - reference: PMID:18316031
    reference_title: "RBP4 disrupts vitamin A uptake homeostasis in a STRA6-deficient animal model for Matthew-Wood syndrome."
    supports: SUPPORT
    evidence_source: MODEL_ORGANISM
    snippet: "The cellular uptake of vitamin A from its RBP4-bound circulating form (holo-RBP4) is a homeostatic process that evidently depends on the multidomain membrane protein STRA6."
    explanation: This directly supports STRA6-dependent retinol uptake as the initiating transport step disrupted in the syndrome.
  - reference: PMID:26373900
    reference_title: "A novel mutation in two Hmong families broadens the range of STRA6-related malformations to include contractures and camptodactyly."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "The disorder is caused by mutations in STRA6, an important regulator of vitamin A and retinoic acid metabolism."
    explanation: Human clinical genetics literature supports impaired vitamin A handling as the proximal biochemical context of STRA6 deficiency.
  downstream:
  - target: Abnormal retinoic acid receptor signaling
    description: Altered retinol flux perturbs downstream embryonic retinoid signaling.
- name: Abnormal retinoic acid receptor signaling
  description: >-
    STRA6 deficiency disrupts retinoid homeostasis and perturbs retinoic acid
    receptor signaling and gene regulation during embryogenesis.
  biological_processes:
  - preferred_term: retinoic acid receptor signaling pathway
    modifier: ABNORMAL
    term:
      id: GO:0048384
      label: retinoic acid receptor signaling pathway
  evidence:
  - reference: PMID:18316031
    reference_title: "RBP4 disrupts vitamin A uptake homeostasis in a STRA6-deficient animal model for Matthew-Wood syndrome."
    supports: SUPPORT
    evidence_source: MODEL_ORGANISM
    snippet: "We provide evidence that, in the absence of Stra6, holo-Rbp4 provokes nonspecific vitamin A excess in several embryonic tissues, impairing retinoic acid receptor signaling and gene regulation."
    explanation: This directly supports abnormal retinoic acid receptor signaling as the next mechanistic step downstream of STRA6 deficiency.
  downstream:
  - target: Abnormal eye development
    description: Impaired embryonic retinoid signaling disrupts ocular development.
  - target: Abnormal lung development
    description: Impaired embryonic retinoid signaling disrupts pulmonary development.
  - target: Abnormal diaphragm development
    description: Impaired embryonic retinoid signaling disrupts diaphragm formation.
  - target: Abnormal cardiac development
    description: Impaired embryonic retinoid signaling disrupts cardiac morphogenesis.
- name: Abnormal eye development
  description: >-
    Reduced embryonic retinoid availability in the developing eye disrupts
    ocular morphogenesis and contributes to anophthalmia or microphthalmia.
  evidence:
  - reference: PMID:18316031
    reference_title: "RBP4 disrupts vitamin A uptake homeostasis in a STRA6-deficient animal model for Matthew-Wood syndrome."
    supports: SUPPORT
    evidence_source: MODEL_ORGANISM
    snippet: "Loss-of-function analysis in zebrafish embryos revealed that Stra6 deficiency caused vitamin A deprivation of the developing eyes."
    explanation: This directly supports abnormal eye development as a downstream consequence of STRA6 deficiency.
  downstream:
  - target: Anophthalmia
    description: Severe ocular developmental failure can produce absent globes.
  - target: Microphthalmia
    description: Partial ocular developmental failure can produce abnormally small eyes.
- name: Abnormal lung development
  description: >-
    Impaired embryonic retinoid signaling disrupts pulmonary development and can
    lead to pulmonary hypoplasia or agenesis.
  evidence:
  - reference: PMID:26373900
    reference_title: "A novel mutation in two Hmong families broadens the range of STRA6-related malformations to include contractures and camptodactyly."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "PDAC (also termed Matthew Wood) syndrome is a rare, autosomal recessive disorder characterized by pulmonary hypoplasia/aplasia, diaphragmatic defects, bilateral anophthalmia, and cardiac malformations."
    explanation: This directly supports abnormal pulmonary development as part of the canonical STRA6-associated malformation pattern.
  downstream:
  - target: Pulmonary hypoplasia
    description: Abnormal pulmonary development produces lung underdevelopment.
- name: Abnormal diaphragm development
  description: >-
    Impaired embryonic retinoid signaling disrupts diaphragm formation and can
    produce hernia or eventration defects.
  evidence:
  - reference: PMID:19309693
    reference_title: "Phenotypic spectrum of STRA6 mutations: from Matthew-Wood syndrome to non-lethal anophthalmia."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Matthew-Wood, Spear, PDAC or MCOPS9 syndrome are alternative names used to refer to combinations of microphthalmia/anophthalmia, malformative cardiac defects, pulmonary dysgenesis, and diaphragmatic hernia."
    explanation: This directly supports abnormal diaphragm development as a recurring part of the STRA6 disease spectrum.
  downstream:
  - target: Congenital diaphragmatic hernia
    description: Abnormal diaphragm formation produces diaphragmatic hernia or eventration.
- name: Abnormal cardiac development
  description: >-
    Impaired embryonic retinoid signaling disrupts cardiac morphogenesis and
    contributes to variable congenital heart malformations.
  evidence:
  - reference: PMID:18316031
    reference_title: "RBP4 disrupts vitamin A uptake homeostasis in a STRA6-deficient animal model for Matthew-Wood syndrome."
    supports: SUPPORT
    evidence_source: MODEL_ORGANISM
    snippet: "These fatal consequences of Stra6 deficiency, including craniofacial and cardiac defects and microphthalmia, were largely alleviated by reducing embryonic Rbp4 levels by morpholino oligonucleotide or pharmacological treatments."
    explanation: This supports cardiac developmental defects as a downstream consequence of abnormal STRA6-dependent retinoid signaling.
  downstream:
  - target: Abnormal heart morphology
    description: Abnormal cardiac morphogenesis produces congenital heart defects.
genetic:
- name: STRA6
  association: Causal biallelic pathogenic variant
  gene_term:
    preferred_term: STRA6
    term:
      id: hgnc:30650
      label: STRA6
  notes: >-
    Pathogenic STRA6 alleles include truncating, splice, and missense variants.
    Reported human cases support loss of STRA6 function as the molecular basis
    of Matthew-Wood syndrome / syndromic microphthalmia 9.
  evidence:
  - reference: PMID:17503335
    reference_title: "Matthew-Wood syndrome is caused by truncating mutations in the retinol-binding protein receptor gene STRA6."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "The fetuses had either a homozygous insertion/deletion in exon 2 or a homozygous insertion in exon 7 predicting a premature stop codon in STRA6 transcripts."
    explanation: This directly identifies biallelic truncating STRA6 variants in fetuses with Matthew-Wood syndrome.
  - reference: PMID:19309693
    reference_title: "Phenotypic spectrum of STRA6 mutations: from Matthew-Wood syndrome to non-lethal anophthalmia."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Among these patients, six novel mutations were identified, bringing the current total of known STRA6 mutations to seventeen."
    explanation: This expands the allelic series and reinforces STRA6 as the causal gene across the broader phenotypic spectrum.
phenotypes:
- name: Anophthalmia
