    snippet: "PDAC (also termed Matthew Wood) syndrome is a rare, autosomal recessive disorder characterized by pulmonary hypoplasia/aplasia, diaphragmatic defects, bilateral anophthalmia, and cardiac malformations."
    explanation: This directly supports bilateral anophthalmia as a core diagnostic phenotype of STRA6-related disease.
- name: Microphthalmia
