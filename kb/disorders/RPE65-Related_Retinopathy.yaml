  phenotype_term:
    preferred_term: Nystagmus
    term:
      id: HP:0000639
      label: Nystagmus
  evidence:
  - reference: PMID:31725251
    supports: SUPPORT
    evidence_source: OTHER
    snippet: "In RPE65-related LCA, onset of visual manifestations frequently occurs in infancy during the first year of life."
    explanation: >-
      The GeneReview describes onset of visual manifestations in infancy; nystagmus
      is a characteristic early sign of severe retinal dysfunction beginning in
      the first year of life in RPE65-LCA.
- category: Ophthalmological
  name: Abnormal electroretinogram
  frequency: VERY_FREQUENT
  description: >-
    Electroretinography typically shows markedly reduced or absent rod responses
    on dark-adapted testing and impaired cone responses on light-adapted testing,
    consistent with the panretinal visual cycle defect affecting both rod and
    cone photoreceptors.
  phenotype_term:
    preferred_term: Abnormal electroretinogram
    term:
      id: HP:0000512
      label: Abnormal electroretinogram
  evidence:
  - reference: PMID:28712537
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Individuals aged 3 years or older with a confirmed genetic diagnosis of biallelic RPE65 gene mutations were eligible for enrolment if both eyes had visual acuity of 20/60 or worse or visual field less than 20 degrees in any meridian"
    explanation: >-
      The phase 3 trial enrolled participants based on functional visual impairment
      consistent with the panretinal dysfunction characterizing RPE65-related
      retinopathy on electroretinogram testing.
- category: Ophthalmological
  name: Progressive peripheral visual field loss
  frequency: VERY_FREQUENT
  description: >-
    Constriction of the peripheral visual field accompanies rod degeneration and
    is progressive; severe constriction is present by early adulthood in most
    LCA2/EOSRD patients.
  phenotype_term:
    preferred_term: Peripheral visual field constriction
