genetic:
- name: 2q32-q33 contiguous-gene deletion
  association: Causal chromosomal deletion
  notes: >-
    Interstitial deletion of 2q32-q33 encompassing SATB2 and adjacent genes;
    SATB2 haploinsufficiency is the best-established gene-level driver of the
    cognitive and palatal phenotype.
  evidence:
  - reference: PMID:26811410
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Chromosomal abnormalities involving 2q32q33 deletions are very rare and
      present with a specific phenotype.
    explanation: >-
      Establishes the causal 2q32q33 deletion and its recognizable phenotype.
  - reference: PMID:19668335
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Our results suggest that deletion of SATB2 is responsible for several of
      the clinical features associated with 2q32q33 microdeletion syndrome.
    explanation: >-
      Pinpoints SATB2 within the deletion as responsible for several core
      features.
- name: SATB2 haploinsufficiency
  association: Major dosage-sensitive driver gene
  notes: >-
    SATB2 is the major dosage-sensitive driver gene; its loss by deletion (or by
    point mutation in the broader SATB2-associated syndrome) produces a convergent
    phenotype.
  evidence:
  - reference: PMID:27409069
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Haploinsufficiency of SATB2 causes cleft palate, intellectual disability
      with deficient speech, facial and dental abnormalities, and other variable
      features known collectively as SATB2-associated syndrome.
    explanation: >-
      Summarizes SATB2 haploinsufficiency as the driver of the recognizable
      phenotype.
