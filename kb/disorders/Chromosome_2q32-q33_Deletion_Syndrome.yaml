  - reference: PMID:28151491
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      The behavioral phenotype appeared to show the most marked discrepancy
      within the cohort, with both severe autistic features and friendly/happy
      personalities being recurrently reported.
    explanation: >-
      Severe autistic features are recurrently reported within the behavioural
      phenotype.
- name: Aggressive behavior
  description: >-
    A specific behavioural pattern with aggression, self-injury, and motor
    restlessness has been described.
  phenotype_term:
    preferred_term: Aggressive behavior
    term:
      id: HP:0000718
      label: Aggressive behavior
  evidence:
  - reference: PMID:26811410
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      A specific behavioural pattern, with hyperactivity and motor restlessness,
      chaotic behaviour, a happy personality but with periods of aggression and
      anxiety, sleeping problems and self-mutilation, has also been reported in
      some of these patients.
    explanation: >-
      Aggression and self-injury are described within the recurrent behavioural
      pattern.
- name: Sleep disturbance
  description: >-
    Sleeping problems recur within the behavioural phenotype.
  phenotype_term:
    preferred_term: Sleep disturbance
    term:
      id: HP:0002360
      label: Sleep disturbance
  evidence:
  - reference: PMID:26811410
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      A specific behavioural pattern, with hyperactivity and motor restlessness,
      chaotic behaviour, a happy personality but with periods of aggression and
      anxiety, sleeping problems and self-mutilation, has also been reported in
      some of these patients.
    explanation: >-
      Sleeping problems are part of the recurrent behavioural phenotype.
- name: Seizure
  frequency: OCCASIONAL
  description: >-
    Clinical seizures occur in a minority of patients, while subclinical EEG
    abnormalities are more frequent.
  phenotype_term:
    preferred_term: Seizure
    term:
      id: HP:0001250
      label: Seizure
  evidence:
  - reference: PMID:29023086
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      While only about 20% of affected individuals have clinical seizures, a
      subset of affected individuals have electrical status epilepticus in sleep.
    explanation: >-
      GeneReviews documents clinical seizures in about 20% of patients.
- name: Reduced bone mineral density
  frequency: FREQUENT
  description: >-
    Reduced bone mineral density / osteoporosis is part of the skeletal phenotype
    and warrants surveillance. Reported frequency is strongly
    ascertainment-dependent: a dedicated skeletal-imaging cohort found
    skeletal demineralization
    in 94% (Mouillé et al., PMID:35241104), whereas GeneReviews estimates
    documented low bone mineral density in only about one quarter of affected
    individuals (PMID:29023086), reflecting the difference between systematic
    skeletal phenotyping and routine clinical ascertainment.
  phenotype_term:
    preferred_term: Reduced bone mineral density
    term:
      id: HP:0004349
      label: Reduced bone mineral density
  evidence:
  - reference: PMID:35241104
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Skeletal demineralization (16/17, 94%) and cortical thinning of vertebrae
      (15/17) were the most frequent radiological features at the spine.
    explanation: >-
      Skeletal demineralization in 94% supports a frequent low-bone-mass
      phenotype.
- name: Increased susceptibility to fractures
  frequency: FREQUENT
  description: >-
    Fractures, including vertebral compression fractures, occur as a consequence
    of bone fragility.
  phenotype_term:
    preferred_term: Increased susceptibility to fractures
    term:
      id: HP:0002659
      label: Increased susceptibility to fractures
  evidence:
  - reference: PMID:35241104
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Vertebral compression fractures affected 6/17 patients (35%).
    explanation: >-
      Vertebral compression fractures in 35% support a frequent fracture
      susceptibility.
- name: Tibial bowing
  description: >-
    Progressive tibial bowing is reported, particularly with SATB2 alleles
    associated with more severe bone disease.
  phenotype_term:
    preferred_term: Tibial bowing
    term:
      id: HP:0002982
      label: Tibial bowing
  evidence:
  - reference: PMID:27409069
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      We report a SATB2 mutation (c.2018dupA; p.(H673fs)) in a 15-year-old
      patient whose SATB2-associated syndrome phenotype is accompanied by
      osteoporosis, fractures, progressive tibial bowing, and scoliosis.
    explanation: >-
      Documents progressive tibial bowing within the bone phenotype.
- name: Scoliosis
  description: >-
    Scoliosis is part of the skeletal phenotype.
  phenotype_term:
    preferred_term: Scoliosis
    term:
      id: HP:0002650
      label: Scoliosis
  evidence:
  - reference: PMID:29023086
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Skeletal anomalies can include scoliosis, tibial bowing, and joint
      contractures.
    explanation: >-
      GeneReviews lists scoliosis among the skeletal anomalies.
- name: Strabismus
  description: >-
    Eye anomalies, including strabismus and refractive error, are reported.
  phenotype_term:
    preferred_term: Strabismus
    term:
      id: HP:0000486
      label: Strabismus
  evidence:
  - reference: PMID:29023086
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Other finding can include pre- and postnatal growth restriction, feeding
      issues, and eye anomalies (strabismus, refractive error).
    explanation: >-
      GeneReviews lists strabismus among the eye anomalies.
- name: Abnormal heart morphology
  frequency: OCCASIONAL
  description: >-
    Congenital cardiovascular defects are reported mainly in patients with larger
    deletions involving SATB2 and adjacent genes.
  phenotype_term:
    preferred_term: Abnormal heart morphology
    term:
      id: HP:0001627
      label: Abnormal heart morphology
  evidence:
  - reference: PMID:29023086
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      In those with a larger deletion involving SATB2 and adjacent genes,
      cardiovascular, genitourinary, and ectodermal findings may also be present.
    explanation: >-
      GeneReviews attributes cardiovascular findings to larger contiguous
      deletions.
