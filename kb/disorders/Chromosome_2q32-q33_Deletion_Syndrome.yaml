name: Chromosome 2q32-q33 Deletion Syndrome
creation_date: "2026-06-30T00:00:00Z"
synonyms:
- 2q32q33 microdeletion syndrome
- 2q33.1 microdeletion syndrome
- SATB2-associated syndrome (deletion form)
- Glass syndrome
description: >-
  Chromosome 2q32-q33 deletion syndrome is a contiguous-gene microdeletion
  disorder caused by interstitial deletions of chromosome 2q32-q33 that include
  SATB2 and several neighbouring dosage-sensitive genes (e.g., GLS, MYO1B,
  TMEFF2, PGAP1). It is characterized by severe developmental delay / intellectual
  disability with absent or severely limited speech, growth retardation,
  craniofacial dysmorphism, feeding difficulties, thin and sparse hair, cleft or
  high-arched palate, and dental anomalies, with a recurrent behavioural phenotype
  and skeletal/bone fragility. SATB2 haploinsufficiency is the major dosage-sensitive
  driver of the cognitive and palatal phenotype, while loss of the adjacent genes
  is thought to contribute to the more complex behavioural and ectodermal features.
  Because alterations of SATB2 by any mechanism (contiguous deletion, intragenic
  deletion/duplication, translocation, or point mutation) produce a convergent
  clinically recognizable phenotype, this deletion syndrome is now lumped with
  point-mutation cases under the umbrella term SATB2-associated syndrome (Glass
  syndrome, OMIM 612313).
category: Mendelian
parents:
- hereditary disease
- chromosomal disorder
disease_term:
  preferred_term: chromosome 2q32-q33 deletion syndrome
  term:
    id: MONDO:0012864
    label: chromosome 2q32-q33 deletion syndrome
inheritance:
- name: Autosomal dominant inheritance
  description: >-
    The deletion acts in an autosomal dominant fashion through haploinsufficiency
    and almost always arises de novo; rare recurrence occurs through parental
    mosaicism.
  inheritance_term:
    preferred_term: autosomal dominant inheritance
    term:
      id: HP:0000006
      label: Autosomal dominant inheritance
  evidence:
  - reference: PMID:29023086
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      SAS is an autosomal dominant disorder. Almost all probands with SAS
      reported to date have the disorder as the result of a de novo genetic
      event.
    explanation: >-
      GeneReviews establishes autosomal dominant inheritance with a predominantly
      de novo occurrence for SATB2-associated syndrome, which subsumes the
      2q32-q33 deletion form.
progression:
- phase: Congenital and early-childhood multisystem presentation
  age_range: Birth through early childhood
  notes: >-
    Palatal and feeding difficulties are evident from birth, while developmental
    delay, severe speech impairment, hypotonia, and behavioural problems emerge
    in infancy and early childhood.
  evidence:
  - reference: PMID:40474278
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Early and persistent feeding difficulties were found in 55% of the
      children. Communication was abnormal from the first months of life, with
      poor babbling in 85% of them.
    explanation: >-
      Cohort data confirm an early-onset oral and communication phenotype
      apparent from the first months of life.
- phase: Childhood-to-adulthood skeletal and neurobehavioural course
  age_range: Childhood through adulthood
  notes: >-
    Bone fragility (osteopenia/osteoporosis, fractures, tibial bowing, scoliosis)
    and behavioural manifestations become increasingly relevant with age, and
    secondary cognitive decline has been documented in at least one long-followed
    adult, supporting age-dependent surveillance.
  evidence:
  - reference: PMID:26811410
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      This current patient is also, to our knowledge, the only patient with
      2q32q33 microdeletion syndrome with secondary cognitive decline documented
      by psychometric tests.
    explanation: >-
      A long-followed adult demonstrates that the neurocognitive course can
      progress over time in this deletion syndrome.
pathophysiology:
- name: Contiguous-gene 2q32-q33 haploinsufficiency
  description: >-
    Interstitial deletion of chromosome 2q32-q33 removes one copy of a contiguous
    block of genes. The commonly deleted region contains SATB2 plus neighbouring
    dosage-sensitive genes (GLS, MYO1B, TMEFF2, PGAP1, among others), so the
    phenotype reflects combined haploinsufficiency, with SATB2 loss as the major
    driver of the cognitive and craniofacial/palatal features.
  genes:
  - preferred_term: SATB2
    term:
      id: hgnc:21637
      label: SATB2
  - preferred_term: GLS
    term:
      id: hgnc:4331
      label: GLS
  - preferred_term: MYO1B
    term:
      id: hgnc:7596
      label: MYO1B
  - preferred_term: TMEFF2
    term:
      id: hgnc:11867
      label: TMEFF2
  - preferred_term: PGAP1
    term:
      id: hgnc:25712
      label: PGAP1
  evidence:
  - reference: PMID:19668335
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      The commonly deleted region contains at least seven genes.
    explanation: >-
      Establishes that 2q32q33 microdeletion syndrome is a contiguous-gene
      disorder involving multiple genes, not a single-gene defect.
  - reference: PMID:26811410
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      The deletion encompassed 22 known OMIM genes, including GLS, MYO1B,
      TMEFF2, PGAP1 and SATB2.
    explanation: >-
      A molecularly characterized 8.6 Mb 2q32.2q33.1 deletion documents the
      contiguous block of dosage-sensitive genes that includes SATB2.
  downstream:
  - target: SATB2 haploinsufficiency
    description: >-
      Loss of one SATB2 copy is the major dosage-sensitive driver of the
      cognitive and palatal phenotype.
  - target: Additional contiguous-gene contribution to the behavioural and ectodermal phenotype
    description: >-
      Loss of adjacent genes (GLS, MYO1B, TMEFF2) and ectodermal features are
      attributed to the broader deletion beyond SATB2.
- name: SATB2 haploinsufficiency
  description: >-
    SATB2 encodes a nuclear-matrix-attachment-region-binding transcription factor
    that activates transcription of multiple genes and shapes higher-order
    chromatin structure. A 50% reduction in functional SATB2 protein
    (haploinsufficiency) disrupts the dosage-sensitive developmental programs SATB2
    controls in the palate, cortex, and skeleton.
  genes:
  - preferred_term: SATB2
    term:
      id: hgnc:21637
      label: SATB2
  biological_processes:
  - preferred_term: transcriptional regulation
    modifier: DECREASED
    term:
      id: GO:0006357
      label: regulation of transcription by RNA polymerase II
  evidence:
  - reference: PMID:19668335
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Haploinsufficiency of one of these genes, SATB2, a DNA-binding protein
      that regulates gene expression, has been implicated as causative in the
      cleft or high palate of individuals with 2q32q33 microdeletion syndrome.
    explanation: >-
      Identifies SATB2 haploinsufficiency as the gene-level mechanism driving the
      core craniofacial features of the deletion syndrome.
  - reference: PMID:28151491
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      SATB2 haploinsufficiency is a common cause of syndromic intellectual
      disability.
    explanation: >-
      Confirms haploinsufficiency as the shared pathogenic mechanism producing
      syndromic intellectual disability.
  downstream:
  - target: Craniofacial and palatal developmental dysregulation
    description: >-
      Reduced SATB2 dosage disrupts midline craniofacial patterning and palate
      formation.
  - target: Cortical neuron specification defect
    description: >-
      Reduced SATB2 dosage impairs specification of upper-layer cortical
      projection neurons.
  - target: Osteoblast differentiation defect and bone fragility
    description: >-
      Reduced SATB2 dosage impairs osteoblast differentiation and bone
      mineralization.
- name: Craniofacial and palatal developmental dysregulation
  description: >-
    SATB2 controls midline craniofacial patterning, jaw growth, and palate
    formation. Its loss disrupts roof-of-mouth development, producing cleft or
    high-arched palate, micrognathia, dental anomalies, and facial dysmorphism.
  cell_types:
  - preferred_term: osteoblast
    term:
      id: CL:0000062
      label: osteoblast
  biological_processes:
  - preferred_term: palate development
    modifier: DECREASED
    term:
      id: GO:0060021
      label: roof of mouth development
  - preferred_term: embryonic cranial skeleton morphogenesis
    modifier: DECREASED
    term:
      id: GO:0048701
      label: embryonic cranial skeleton morphogenesis
  evidence:
  - reference: PMID:24301056
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      In humans, chromosomal translocations and deletions of 2q33.1 leading to
      SATB2 haploinsufficiency are associated with cleft palate (CP), facial
      dysmorphism and intellectual disability (ID).
    explanation: >-
      Directly links SATB2 haploinsufficiency from 2q33.1 deletions to cleft
      palate and facial dysmorphism.
  - reference: PMID:27774744
    supports: SUPPORT
    evidence_source: MODEL_ORGANISM
    snippet: >-
      At birth, mice lacking Satb2 have severely reduced jaw length and die from
      cleft palate
    explanation: >-
      Mouse knockout data establish the dosage-sensitive role of SATB2 in jaw
      growth and palate closure underlying the human craniofacial phenotype.
  downstream:
  - target: Cleft palate
    description: >-
      Failure of palatal shelf fusion produces cleft palate.
  - target: High palate
    description: >-
      Disrupted palatal morphogenesis produces a high-arched palate when overt
      clefting is absent.
  - target: Abnormal facial shape
    description: >-
      Disturbed craniofacial patterning produces the characteristic facial
      dysmorphism.
  - target: Micrognathia
    causal_link_type: DIRECT
    description: >-
      Impaired SATB2-dependent jaw growth and distal mandibular patterning
      produces micrognathia.
  - target: Abnormality of the dentition
    causal_link_type: DIRECT
    description: >-
      Disrupted craniofacial/odontogenic development produces dental crowding and
      abnormally shaped teeth.
- name: Cortical neuron specification defect
  description: >-
    SATB2 specifies upper-layer cortico-cortical projection neurons and the
    formation of callosal axonal projections. Its loss misroutes these neurons,
    providing a mechanism for the severe intellectual disability and the profound
    speech/language impairment.
  cell_types:
  - preferred_term: cortical upper-layer projection neuron
    term:
      id: CL:0000540
      label: neuron
  biological_processes:
  - preferred_term: cerebral cortex neuron differentiation
    modifier: DECREASED
    term:
      id: GO:0021895
      label: cerebral cortex neuron differentiation
  evidence:
  - reference: PMID:27774744
    supports: SUPPORT
    evidence_source: MODEL_ORGANISM
    snippet: >-
      In mice, studies have found a critical role for Satb2 in brain
      development, particularly in the specification of cortical upper layer
      neurons
    explanation: >-
      Mouse data establish SATB2's role in specifying upper-layer cortical
      neurons, the developmental basis for the cognitive phenotype.
  - reference: PMID:24301056
    supports: SUPPORT
    evidence_source: MODEL_ORGANISM
    snippet: >-
      Vertebrate animal models have shown that Satb2 has a crucial role in
      craniofacial patterning and osteoblast differentiation, as well as in
      determining the fates of neuronal projections in the developing neocortex.
    explanation: >-
      Confirms the conserved role of SATB2 in determining cortical neuronal
      projection fates relevant to the neurodevelopmental phenotype.
  downstream:
  - target: Intellectual disability
    description: >-
      Defective cortical neuron specification produces intellectual disability.
  - target: Global developmental delay
    description: >-
      Disrupted neurodevelopment presents as global developmental delay.
  - target: Delayed speech and language development
    description: >-
      Cortical/speech-network involvement produces severely impaired speech and
      language development.
  - target: Absent speech
    description: >-
      The most severe end of the speech phenotype is absent speech.
- name: Osteoblast differentiation defect and bone fragility
  description: >-
    SATB2 promotes osteoblast differentiation and bone mineralization (in part by
    regulating osteogenic transcription). Its haploinsufficiency reduces bone
    mineral density and, particularly with alleles that escape nonsense-mediated
    decay, produces increased bone turnover, fractures, tibial bowing, and
    scoliosis.
  cell_types:
  - preferred_term: osteoblast
    term:
      id: CL:0000062
      label: osteoblast
  biological_processes:
  - preferred_term: osteoblast differentiation
    modifier: DECREASED
    term:
      id: GO:0001649
      label: osteoblast differentiation
  evidence:
  - reference: PMID:35241104
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      We conclude that SATB2 pathogenic variants are responsible for skeletal
      demineralization and osteoporosis. We found increased levels of bone
      formation markers, supporting the key role of SATB2 in osteoblast
      differentiation.
    explanation: >-
      A prospective cohort links SATB2 loss to skeletal demineralization and
      osteoporosis via osteoblast dysfunction.
  - reference: PMID:27774744
    supports: SUPPORT
    evidence_source: MODEL_ORGANISM
    snippet: >-
      loss of Satb2 leads to reduced levels of bone mineralization, resulting in
      short and brittle limb bones
    explanation: >-
      Mouse data establish the osteogenic role of SATB2 underlying the human bone
      fragility phenotype.
  downstream:
  - target: Reduced bone mineral density
    description: >-
      Impaired osteoblast function reduces bone mineral density.
  - target: Increased susceptibility to fractures
    description: >-
      Low bone mass and increased bone turnover predispose to fractures.
  - target: Tibial bowing
    causal_link_type: DIRECT
    description: >-
      Mechanically weakened bone produces progressive tibial bowing.
  - target: Scoliosis
    causal_link_type: DIRECT
    description: >-
      Skeletal fragility and vertebral involvement contribute to scoliosis.
- name: Additional contiguous-gene contribution to the behavioural and ectodermal phenotype
  description: >-
    Beyond SATB2, loss of neighbouring genes is thought to shape the more complex
    behavioural phenotype (with the glutaminase gene GLS and MYO1B/TMEFF2 proposed
    as candidates), while thin skin and sparse hair in patients with larger
    deletions are attributed to loss of additional, as-yet-undefined ectodermal
    genes.
  genes:
  - preferred_term: GLS
    term:
      id: hgnc:4331
      label: GLS
  - preferred_term: MYO1B
    term:
      id: hgnc:7596
      label: MYO1B
  - preferred_term: TMEFF2
    term:
      id: hgnc:11867
      label: TMEFF2
  evidence:
  - reference: PMID:26811410
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      it is our opinion that the SATB2 gene is also crucial to the behavioural
      problems noted in this current proband and that deletion of the GLS,
      MYO1B, and TMEFF2 genes presumably contributes to the more complex
      behavioural characteristics observed
    explanation: >-
      Supports a contiguous-gene contribution beyond SATB2 to the complex
      behavioural phenotype.
  - reference: PMID:19668335
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Only one of the subjects presented here had a cleft palate, suggesting
      reduced penetrance for this feature.
    explanation: >-
      Intragenic SATB2 deletions show reduced penetrance of cleft palate,
      consistent with variable expressivity and contributions of additional loci
      to the full deletion phenotype.
  downstream:
  - target: Autistic behavior
    description: >-
      Combined gene loss contributes to autistic features within the behavioural
      spectrum.
  - target: Aggressive behavior
    description: >-
      The recurrent behavioural pattern includes aggression and self-injury.
  - target: Sleep disturbance
    description: >-
      Sleeping problems are part of the recurrent behavioural phenotype.
  - target: Sparse hair
    causal_link_type: INDIRECT_UNKNOWN_INTERMEDIATES
    intermediate_mechanisms:
    - loss of additional ectodermal genes in larger deletions
    description: >-
      Thin, sparse hair is an ectodermal feature attributed to broader 2q32-q33
      deletion beyond SATB2.
