treatments:
- name: Supportive and multidisciplinary care
  description: >-
    Management is supportive and multidisciplinary, with standard treatment of
    developmental delay/intellectual disability, neurobehavioural issues, palatal,
    dental, skeletal, and ophthalmologic manifestations.
  treatment_term:
    preferred_term: supportive care
    term:
      id: MAXO:0000950
      label: supportive care
  evidence:
  - reference: PMID:27774744
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      The multisystemic nature of this syndrome demands a multisystemic approach
      and we propose evaluation and management guidelines.
    explanation: >-
      The review frames a multisystem, supportive management approach.
- name: Genetic counseling
  description: >-
    Genetic counseling addresses the de novo nature of most cases and the small
    recurrence risk from parental mosaicism.
  treatment_term:
    preferred_term: genetic counseling
    term:
      id: MAXO:0000079
      label: genetic counseling
  evidence:
  - reference: PMID:29023086
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      SAS is an autosomal dominant disorder. Almost all probands with SAS
      reported to date have the disorder as the result of a de novo genetic
      event.
    explanation: >-
      The inheritance pattern and de novo nature underpin genetic counseling.
- name: Speech therapy and augmentative communication
  description: >-
    Early speech therapy and augmentative/alternative communication are central
    given the near-universal severe speech impairment.
  treatment_term:
    preferred_term: speech therapy
    term:
      id: MAXO:0000930
      label: speech therapy
  evidence:
  - reference: PMID:40474278
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      A major language delay was described in all patients; 65% had a vocabulary
      of 10 words or less.
    explanation: >-
      The universal severe language phenotype supports early speech-language
      intervention.
- name: Feeding and nutritional therapy
  description: >-
    Feeding therapy, swallowing evaluation, and nutritional support address the
    common early feeding difficulties; gastrostomy may be required when feeding
    issues persist.
  treatment_term:
    preferred_term: dietary intervention
    term:
      id: MAXO:0000088
      label: dietary intervention
  evidence:
  - reference: PMID:40474278
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Early and persistent feeding difficulties were found in 55% of the
      children.
    explanation: >-
      Frequent feeding difficulties support feeding/nutritional intervention.
- name: Physical therapy
  description: >-
    Physical therapy addresses hypotonia and motor delay.
  treatment_term:
    preferred_term: physical therapy
    term:
      id: MAXO:0000011
      label: physical therapy
  evidence:
  - reference: PMID:27774744
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Physical and occupational therapies assessment is equally indicated, with
      therapy provided as necessary.
    explanation: >-
      The review recommends physical therapy as part of management.
- name: Occupational therapy
  description: >-
    Occupational therapy supports adaptive and fine-motor skills.
  treatment_term:
    preferred_term: occupational therapy
    term:
      id: MAXO:0001351
      label: occupational therapy
  evidence:
  - reference: PMID:27774744
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Physical and occupational therapies assessment is equally indicated, with
      therapy provided as necessary.
    explanation: >-
      The review recommends occupational therapy as part of management.
- name: Early intervention and educational support
  description: >-
    Early-intervention programs and individualized education plans support
    development given the universal cognitive and speech involvement.
  treatment_term:
    preferred_term: early intervention services
    term:
      id: MAXO:0009101
      label: early intervention services
  evidence:
  - reference: PMID:29023086
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Standard treatment for developmental delay / intellectual disability,
      neurobehavioral issues, cleft palate, micrognathia, dental anomalies,
      scoliosis, tibial bowing, joint contractures, spasticity, epilepsy,
      undescended testes, inguinal hernia, hypospadias, refractive error,
      strabismus, and congenital heart defects.
    explanation: >-
      GeneReviews recommends standard developmental treatment for the cognitive
      phenotype.
- name: Behavioral and mental-health support
  description: >-
    Behavioural interventions and mental-health support address the recurrent
    behavioural phenotype (aggression, self-injury, hyperactivity, sleep
    problems).
  treatment_term:
    preferred_term: cognitive and behavioral intervention
    term:
      id: MAXO:0000010
      label: cognitive and behavioral intervention
  evidence:
  - reference: PMID:27774744
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      From the neurodevelopmental perspective, medical management of behavioral
      issues could be required with further psychological mental health support.
    explanation: >-
      The review recommends behavioural and mental-health management.
- name: Antiepileptic drug therapy
  description: >-
    Anticonvulsant therapy is indicated when clinical seizures occur (about 20%
    of patients).
  treatment_term:
    preferred_term: anticonvulsant agent therapy
    term:
      id: MAXO:0000167
      label: anticonvulsant agent therapy
  evidence:
  - reference: PMID:29023086
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      While only about 20% of affected individuals have clinical seizures, a
      subset of affected individuals have electrical status epilepticus in sleep.
    explanation: >-
      Clinical seizures in a subset support antiepileptic management when present.
- name: Bone-directed therapy and bisphosphonates
  description: >-
    Bone health management includes optimizing physical activity and calcium /
    vitamin D, with bisphosphonates or denosumab and bone-turnover surveillance to
    prevent fractures and progressive deformity.
  treatment_term:
    preferred_term: bisphosphonate agent therapy
    term:
      id: MAXO:0000954
      label: bisphosphonate agent therapy
  evidence:
  - reference: PMID:27409069
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      We propose surveillance and treatment with osteoclast inhibitors to
      prevent fractures and to slow progressive bone deformities.
    explanation: >-
      Osteoclast-inhibitor therapy (bisphosphonates) is proposed for the bone
      phenotype.
diagnosis:
- name: Chromosomal microarray
  description: >-
    Chromosomal microarray defines the 2q32-q33 deletion and its gene content and
    is the principal diagnostic test for the contiguous-gene deletion.
  diagnosis_term:
    preferred_term: genetic testing
    term:
      id: MAXO:0000127
      label: genetic testing
  evidence:
  - reference: PMID:29023086
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      a heterozygous non-recurrent deletion at 2q33.1 that includes SATB2
    explanation: >-
      GeneReviews lists a 2q33.1 deletion including SATB2 as a diagnostic
      molecular finding, identified by chromosomal microarray.
- name: Molecular genetic testing
  description: >-
    Sequencing and deletion/duplication analysis of SATB2 (or a multigene panel /
    exome) confirms the diagnosis across the spectrum of SATB2 alterations.
  diagnosis_term:
    preferred_term: molecular genetic testing
    term:
      id: MAXO:0000533
      label: molecular genetic testing
  evidence:
  - reference: PMID:24301056
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Exome sequencing revealed a de novo nonsense mutation in the SATB2 gene
      (c.715C>T; p.R239*).
    explanation: >-
      Molecular sequencing identifies SATB2 alterations in patients without a
      visible deletion.
