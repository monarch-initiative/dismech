pathophysiology:
- name: TCF4 CTG Repeat Expansion Susceptibility
  description: >-
    An intronic CTG repeat expansion in TCF4 is the strongest common genetic
    association with late-onset FECD and is found in many affected patients.
  genes:
  - preferred_term: TCF4
    term:
      id: hgnc:11634
      label: TCF4
  locations:
