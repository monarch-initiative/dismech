name: Cytomegalovirus Retinitis
creation_date: '2026-05-30T12:00:00Z'
description: >-
  Cytomegalovirus (CMV) retinitis is a sight-threatening opportunistic infection
  of the retina caused by reactivation of latent cytomegalovirus in
  immunocompromised hosts, most classically people with advanced HIV/AIDS and
  low CD4 counts, as well as transplant and immunosuppressed patients. Productive
  CMV infection produces a progressive, full-thickness necrotizing retinitis that
  can rapidly lead to retinal detachment and irreversible blindness if untreated.
  It is historically notable as the indication for fomivirsen, the first antisense
  oligonucleotide drug ever approved by the FDA (1998).
category: Infectious
