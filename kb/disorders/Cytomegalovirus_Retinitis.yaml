infectious_agent:
- name: Human cytomegalovirus
  description: >-
    Human cytomegalovirus (HCMV, human betaherpesvirus 5) is a ubiquitous
    betaherpesvirus that establishes lifelong latency after primary infection and
    reactivates to cause end-organ disease, including retinitis, when host cellular
    immunity is impaired.
  evidence:
  - reference: PMID:11294581
    reference_title: Laboratory diagnosis of cytomegalovirus (CMV) infections in immunodepressed patients, mainly in patients with AIDS.
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      An important proportion of immunodepressed patients are latent carriers of
      the virus, and under these conditions, the lack of cellular immunity
      predisposes the patient to an active infection in which the virus is
      replicating.
    explanation: Establishes that CMV persists latently and reactivates to active replication when cellular immunity is lost.
pathophysiology:
- name: CMV reactivation under impaired cellular immunity
  description: >-
    In hosts with deficient CD4+ T-cell-mediated immunity (advanced HIV/AIDS,
    transplant recipients, or other iatrogenic immunosuppression), latent
    cytomegalovirus escapes immune control and resumes active replication. Loss of
    protective cellular immunity is the proximal permissive event for end-organ CMV
    disease.
  downstream:
  - target: Productive CMV infection of the retina
    description: Reactivated, replicating virus disseminates and seeds the retina.
  cell_types:
