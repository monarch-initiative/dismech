treatments:
- name: Fomivirsen
  description: >-
    Fomivirsen (Vitravene) is an intravitreally administered antisense
    oligonucleotide complementary to cytomegalovirus immediate-early region 2 (IE2)
    mRNA. Approved by the FDA in 1998, it was the first antisense oligonucleotide
    drug ever approved and was used for CMV retinitis in AIDS patients, including
    relapsed disease unresponsive to conventional antivirals.
  treatment_term:
    preferred_term: pharmacotherapy
    term:
      id: MAXO:0000058
      label: pharmacotherapy
    therapeutic_agent:
    - preferred_term: fomivirsen
      term:
        id: NCIT:C174902
        label: Fomivirsen
  target_phenotypes:
  - preferred_term: Retinitis
    term:
      id: HP:0032118
      label: Retinitis
  evidence:
  - reference: PMID:12768225
    reference_title: Fomivirsen.
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Fomivirsen is a novel antisense drug with a 21-nucleotide sequence
      complementary to the immediate early region 2 of CMV messenger ribonucleic
      acid.
    explanation: Establishes fomivirsen's antisense mechanism targeting CMV IE2 mRNA.
  - reference: PMID:12768225
    reference_title: Fomivirsen.
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      In clinical trials, fomivirsen was shown to provide effective treatment for
      newly diagnosed, peripheral CMV retinitis in patients with AIDS and in those
      with relapsed CMV retinitis that is unresponsive to conventional therapy.
    explanation: Supports clinical efficacy of fomivirsen for newly diagnosed and relapsed CMV retinitis.
  - reference: PMID:38914784
    reference_title: Mechanisms of Action of the US Food and Drug Administration-Approved Antisense Oligonucleotide Drugs.
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "fomiversen (for opportunistic cytomegalovirus infection)"
    explanation: Lists fomivirsen among FDA-approved antisense oligonucleotide drugs, for opportunistic CMV infection.
- name: Intravitreal ganciclovir
  description: >-
    Intravitreal ganciclovir delivers high local antiviral drug concentrations to
    control CMV retinitis, used alone or combined with systemic antiviral therapy.
  treatment_term:
    preferred_term: antiviral agent therapy
    term:
      id: MAXO:0000168
      label: antiviral agent therapy
    therapeutic_agent:
    - preferred_term: ganciclovir
      term:
