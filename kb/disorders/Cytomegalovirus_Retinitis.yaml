    reference_title: Comparison of two different intravitreal treatment regimens combined with systemic antiviral therapy for cytomegalovirus retinitis in patients with AIDS.
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      To compare the efficacy and injection frequency of intravitreal low-dose vs.
      intermediate-dose ganciclovir therapy in acquired immune deficiency syndrome
      (AIDS) patients exhibiting cytomegalovirus retinitis (CMVR).
    explanation: Supports intravitreal ganciclovir as a treatment for CMV retinitis in AIDS patients.
- name: Oral valganciclovir
  description: >-
    Oral valganciclovir is a prodrug of ganciclovir providing systemic anti-CMV
    therapy for induction and maintenance treatment of CMV retinitis.
  treatment_term:
