    modifier: DECREASED
    term:
      id: GO:0002250
      label: adaptive immune response
  - preferred_term: viral genome replication
    modifier: INCREASED
    term:
      id: GO:0019079
      label: viral genome replication
  evidence:
  - reference: PMID:11294581
    reference_title: Laboratory diagnosis of cytomegalovirus (CMV) infections in immunodepressed patients, mainly in patients with AIDS.
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      An important proportion of immunodepressed patients are latent carriers of
      the virus, and under these conditions, the lack of cellular immunity
      predisposes the patient to an active infection in which the virus is
      replicating.
    explanation: Directly links loss of cellular immunity to reactivation and active CMV replication.
- name: Productive CMV infection of the retina
  description: >-
    Replicating cytomegalovirus reaches the eye and productively infects retinal
    cells. In profoundly immunosuppressed HIV-positive patients, the retina is one
    of the most characteristic sites of CMV end-organ disease.
  downstream:
  - target: Full-thickness necrotizing retinitis
    description: Cytopathic viral infection drives inflammation and retinal cell destruction.
  cell_types:
  - preferred_term: retinal pigment epithelial cell
    term:
      id: CL:0002586
      label: retinal pigment epithelial cell
  - preferred_term: photoreceptor cell
    term:
      id: CL:0000210
      label: photoreceptor cell
  biological_processes:
  - preferred_term: viral process
    modifier: INCREASED
    term:
      id: GO:0016032
      label: viral process
  evidence:
  - reference: PMID:11294581
    reference_title: Laboratory diagnosis of cytomegalovirus (CMV) infections in immunodepressed patients, mainly in patients with AIDS.
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      In HIV-positive patients, CMVD tends to manifest itself as retinitis and
      involvement of the gastrointestinal tract.
    explanation: Supports the retina as a principal site of CMV end-organ disease in HIV-positive patients.
- name: Full-thickness necrotizing retinitis
  description: >-
    Productive retinal CMV infection produces a progressive, full-thickness
    necrotizing retinitis with characteristic yellow-white retinal opacification
    and associated hemorrhage. Untreated, it advances centrifugally and can rapidly
    destroy the retina, leading to blindness.
  downstream:
  - target: Immune recovery uveitis
    description: Restoration of immunity in a retina bearing prior CMV antigen can trigger paradoxical intraocular inflammation.
  biological_processes:
  - preferred_term: cell death
    modifier: INCREASED
    term:
      id: GO:0008219
      label: cell death
  - preferred_term: inflammatory response
    modifier: INCREASED
    term:
      id: GO:0006954
      label: inflammatory response
  evidence:
  - reference: PMID:12768225
    reference_title: Fomivirsen.
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Cytomegalovirus (CMV) retinitis can rapidly lead to blindness in patients
      with acquired immune deficiency syndrome (AIDS).
    explanation: Supports rapid progression of CMV retinitis to blindness in AIDS.
- name: Immune recovery uveitis
  description: >-
    When cellular immunity is restored, most often after initiation of
    antiretroviral therapy in HIV/AIDS, a paradoxical intraocular inflammatory
    reaction can develop in eyes with prior CMV retinitis. This immune recovery
    uveitis is an important cause of visual morbidity despite control of the
    underlying viral infection.
  biological_processes:
  - preferred_term: adaptive immune response
    modifier: INCREASED
    term:
