- name: Antiretroviral therapy for immune reconstitution
  description: >-
    In HIV/AIDS-associated CMV retinitis, antiretroviral therapy restores CD4+
    T-cell-mediated immunity and is essential for durable control of the underlying
    opportunistic infection, though it can precipitate immune recovery uveitis.
  treatment_term:
