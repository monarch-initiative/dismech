      label: adaptive immune response
  - preferred_term: inflammatory response
    modifier: INCREASED
    term:
      id: GO:0006954
      label: inflammatory response
  evidence:
  - reference: PMID:39046420
    reference_title: "Immune recovery uveitis: an ocular manifestation in HIV/AIDS receiving treatment."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      It is a paradoxical reaction that is frequently associated with a prior
      cytomegalovirus retinitis infection.
    explanation: Supports immune recovery uveitis as a paradoxical inflammatory sequela of prior CMV retinitis.
