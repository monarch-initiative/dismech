agent_life_cycle:
  description: Trypanosoma brucei alternates between tsetse flies and human
    hosts.
  hosts:
  - preferred_term: human
    term:
      id: NCBITaxon:9606
      label: Homo sapiens
    role: definitive host
  - preferred_term: tsetse fly
    term:
      id: NCBITaxon:7394
      label: Glossina morsitans
    role: intermediate host
  vectors:
  - tsetse flies (Glossina)
  life_cycle_stages:
  - name: Procyclic trypomastigote stage in tsetse midgut
    life_cycle_stage_term:
      preferred_term: Trypanosoma brucei procyclic trypomastigote stage
      term:
        id: OPL:0000081
        label: Trypanosoma brucei procyclic trypomastigote stage
    description: Procyclic forms develop in the tsetse fly midgut.
    evidence:
    - reference: PMID:28232490
      reference_title: "The Trypanosoma brucei TbHrg protein is a heme transporter
        involved in the regulation of stage-specific morphological transitions."
      supports: SUPPORT
      snippet: "in the procyclic developmental stage, in which T. brucei is confined
        to the tsetse fly midgut"
      explanation: The abstract places procyclic T. brucei in the tsetse midgut.
  - name: Metacyclic trypomastigote stage injected by tsetse flies
    life_cycle_stage_term:
      preferred_term: Trypanosoma brucei metacyclic trypomastigote stage
      term:
        id: OPL:0000056
        label: Trypanosoma brucei metacyclic trypomastigote stage
    description: Metacyclic trypomastigotes are injected into skin during tsetse
      feeding.
    evidence:
    - reference: PMID:33972588
      reference_title: "Dermal bacterial LPS-stimulation reduces susceptibility to
        intradermal Trypanosoma brucei infection."
      supports: SUPPORT
      snippet: "Infections with Trypanosoma brucei sp. are established after the injection
        of metacyclic trypomastigotes into the skin dermis by the tsetse fly vector."
      explanation: The abstract identifies metacyclic trypomastigotes as the
        infective stage injected by tsetse flies.
  - name: Bloodstream trypomastigote stage in human host
    life_cycle_stage_term:
      preferred_term: Trypanosoma brucei trypomastigote stage
      term:
        id: OPL:0000175
        label: Trypanosoma brucei trypomastigote stage
    description: Bloodstream trypomastigotes circulate in mammalian hosts.
    evidence:
    - reference: PMID:7581322
      reference_title: "Identification and partial purification of a stage-specific
        33 kDa mitochondrial protein as the alternative oxidase of the Trypanosoma
        brucei brucei bloodstream trypomastigotes."
      supports: SUPPORT
      snippet: "bloodstream trypomastigotes of Trypanosoma brucei"
      explanation: The abstract explicitly references bloodstream
        trypomastigotes of T. brucei.
transmission:
- name: Tsetse fly bite transmission
  description: Infection is transmitted to humans by bites of infected tsetse
    flies.
  evidence:
  - reference: PMID:23829907
    reference_title: "Human African trypanosomiasis."
    supports: SUPPORT
    snippet: "is transmitted to humans by bites of infected tsetse flies."
    explanation: The abstract specifies tsetse fly bites as the transmission
      route.
stages:
- name: Hemolymphatic stage
  description: Early stage with bloodstream and lymphatic involvement before CNS
    invasion.
  evidence:
  - reference: PMID:23829907
    reference_title: "Human African trypanosomiasis."
    supports: SUPPORT
    snippet: "The disease evolves in two stages, the hemolymphatic and meningoencephalitic
      stages"
    explanation: The abstract defines the hemolymphatic stage as one of the two
      stages.
- name: Meningoencephalitic stage
  description: CNS stage defined by trypanosomal traversal of the blood-brain
    barrier.
  evidence:
  - reference: PMID:23829907
    reference_title: "Human African trypanosomiasis."
    supports: SUPPORT
    snippet: "the latter being defined by central nervous system infection after trypanosomal
      traversal of the blood-brain barrier."
    explanation: The abstract defines the CNS stage by BBB traversal and
      infection.
pathophysiology:
- name: Central nervous system infection after BBB traversal
  description: Trypanosomes cross the blood-brain barrier to infect the CNS in
    late-stage disease.
  evidence:
  - reference: PMID:23829907
    reference_title: "Human African trypanosomiasis."
    supports: SUPPORT
    snippet: "central nervous system infection after trypanosomal traversal of the
      blood-brain barrier"
    explanation: The abstract links BBB traversal to CNS infection.
