  evidence:
  - reference: DOI:10.1210/endrev/bnad009
    reference_title: Molecular and Clinical Spectrum of Primary Hyperparathyroidism
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
