      correspond to renal osteodystrophy.
- name: Bone Pain
  description: Bone pain can accompany persistent symptomatic secondary hyperparathyroidism.
  phenotype_term:
    preferred_term: Bone pain
    term:
      id: HP:0002653
      label: Bone pain
  evidence:
