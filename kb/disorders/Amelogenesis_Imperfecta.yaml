treatments:
- name: Restorative and Prosthetic Rehabilitation
  description: >
    Full-coverage crowns, composite restorations, overlays, and prosthetic rehabilitation
    restore function, protect remaining enamel/dentin, reduce sensitivity, and improve
    esthetics in AI.
  treatment_term:
    preferred_term: dental restoration
    term:
      id: MAXO:0000004
      label: surgical procedure
- name: Genetic Counseling
  description: >
    Genetic counseling addresses the X-linked, autosomal dominant, and autosomal recessive
    inheritance patterns and recurrence risk for affected families.
  treatment_term:
    preferred_term: genetic counseling
    term:
      id: MAXO:0000079
      label: genetic counseling
  evidence:
  - reference: PMID:21127961
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Autosomal dominant, recessive, and X-linked types have been previously described."
    explanation: >
      The Mendelian inheritance of AI supports genetic counseling for affected families.

notes: >
  AI is mechanistically distinct from acquired developmental defects of enamel. Dental
  fluorosis (see Dental_Fluorosis) and the demineralization phenotype of dental caries
  (see Dental_Caries) are non-hereditary enamel defects and are curated separately. The
  iPSC-derived ameloblast / 3D enamel organoid system (PMID:37582367) is the first human
  in vitro disease model for AI and is the natural substrate for future MorPhiC-style
  cellular phenotyping of individual AI genes.

