name: Amelogenesis Imperfecta
creation_date: "2026-06-17T00:00:00Z"
category: Mendelian
disease_term:
  preferred_term: amelogenesis imperfecta
  term:
    id: MONDO:0019507
    label: amelogenesis imperfecta
parents:
- Ectodermal Dysplasia
- Oral Cavity Disease
synonyms:
- AI
- Hereditary enamel dysplasia
- Amelogenesis imperfecta, hereditary

description: >
  Amelogenesis imperfecta (AI) is a clinically and genetically heterogeneous group of
  inherited disorders of tooth enamel formation, in which the enamel is abnormal in
  quantity, structure, and/or mineral content in the absence of a generalized systemic
  disorder. Enamel is the most highly mineralized tissue in the body and is produced by
  ameloblasts, epithelial cells of ectodermal origin that secrete a protein-rich enamel
  matrix (amelogenin, enamelin, ameloblastin) and then orchestrate its proteolytic
  processing and progressive mineralization during the secretory and maturation stages of
  amelogenesis. AI arises when mutations disrupt the genes encoding these matrix proteins
  (AMELX, ENAM) or the proteases that process them (MMP20, KLK4), or other regulators of
  the secretory/maturation program (FAM83H, WDR72, DLX3 and others). Because the dental
  phenotype reflects which stage of amelogenesis is disrupted, AI is conventionally
  classified into hypoplastic (reduced enamel thickness, a secretory-stage quantitative
  defect), hypomaturation (normal-thickness but soft, mottled enamel from defective
  maturation), and hypocalcified/hypomineralized (poorly mineralized, rapidly attriting
  enamel) types, with X-linked, autosomal dominant, and autosomal recessive inheritance.
  AI is mechanistically and clinically distinct from acquired developmental defects of
  enamel such as dental fluorosis (excess fluoride) and from molar-incisor hypomineralization.

inheritance:
- name: X-linked inheritance
  inheritance_term:
    preferred_term: X-linked inheritance
    term:
      id: HP:0001417
      label: X-linked inheritance
  description: >
    AMELX (amelogenin) is located on the X chromosome; mutations cause X-linked AI, with
    males more severely and uniformly affected than heterozygous females.
  evidence:
  - reference: PMID:16304440
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Mutations in the amelogenin gene (AMELX) cause X-linked amelogenesis imperfecta, while mutations in the enamelin gene (ENAM) cause autosomal-inherited forms of amelogenesis imperfecta."
    explanation: >
      Establishes the X-linked inheritance of AMELX-related AI versus autosomal
      inheritance of ENAM-related AI.
- name: Autosomal dominant inheritance
  inheritance_term:
    preferred_term: Autosomal dominant inheritance
    term:
      id: HP:0000006
      label: Autosomal dominant inheritance
  description: >
    Autosomal dominant AI is caused by mutations in genes such as ENAM and FAM83H.
  evidence:
  - reference: PMID:21127961
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Autosomal dominant, recessive, and X-linked types have been previously described."
    explanation: >
      Documents the full range of Mendelian inheritance patterns described for AI.
- name: Autosomal recessive inheritance
  inheritance_term:
    preferred_term: Autosomal recessive inheritance
    term:
      id: HP:0000007
      label: Autosomal recessive inheritance
  description: >
    Autosomal recessive AI is caused by biallelic mutations in genes such as MMP20, KLK4,
    and WDR72, which mediate enamel matrix processing and maturation.
  evidence:
  - reference: PMID:21127961
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Autosomal dominant, recessive, and X-linked types have been previously described."
    explanation: >
      Documents autosomal recessive inheritance as one of the established AI patterns.

has_subtypes:
- name: Hypoplastic
  display_name: Hypoplastic AI (secretory-stage quantitative defect)
  description: >
    Reduced enamel thickness due to a defect during the secretory stage of amelogenesis,
    when the enamel matrix is laid down. Classically associated with AMELX and ENAM
    mutations.
  evidence:
  - reference: PMID:21127961
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "The types (hypoplastic, hypocalcified, and hypomature) are correlated with defects in different stages of the process of enamel synthesis."
    explanation: >
      Defines the hypoplastic type as a defect in a specific stage of enamel synthesis.
- name: Hypomaturation
  display_name: Hypomaturation AI (maturation-stage defect)
  description: >
    Enamel of relatively normal thickness but soft and mottled, due to defective
    maturation-stage processing of the enamel matrix. Classically associated with MMP20
    and KLK4 protease mutations.
  evidence:
  - reference: PMID:21127961
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "The types (hypoplastic, hypocalcified, and hypomature) are correlated with defects in different stages of the process of enamel synthesis."
    explanation: >
      Defines the hypomature type as a maturation-stage defect of enamel synthesis.
- name: Hypocalcified
  display_name: Hypocalcified AI (mineralization defect)
  description: >
    Enamel of normal thickness but poorly mineralized, soft, and rapidly lost to
    attrition. FAM83H mutations are a common cause of autosomal dominant hypocalcified AI.
  evidence:
  - reference: PMID:21127961
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "The types (hypoplastic, hypocalcified, and hypomature) are correlated with defects in different stages of the process of enamel synthesis."
    explanation: >
      Defines the hypocalcified type as a defect in the enamel synthesis process.

pathophysiology:
- name: Ameloblast Dysfunction and Defective Enamel Biomineralization
  description: >
    AI is fundamentally a disorder of the ameloblast, the ectoderm-derived epithelial cell
    that builds enamel. Enamel formation is a tightly staged biomineralization process in
    which ameloblasts first secrete an organic enamel matrix and then drive its
    mineralization. Mutations in the genes critical for this process disrupt ameloblast
    function and produce structurally and/or quantitatively abnormal enamel. The specific
    inherited dental phenotype maps onto the developmental stage at which the mutated gene
    is critically required.
  cell_types:
  - preferred_term: Ameloblast
    term:
      id: CL:0000059
      label: ameloblast
  biological_processes:
  - preferred_term: Amelogenesis
    term:
      id: GO:0097186
      label: amelogenesis
    modifier: DECREASED
  - preferred_term: Biomineral tissue development
    term:
      id: GO:0031214
      label: biomineral tissue development
    modifier: ABNORMAL
  downstream:
  - target: Defective Enamel Matrix Secretion
    causal_link_type: DIRECT
  - target: Defective Enamel Matrix Processing and Maturation
    causal_link_type: DIRECT
  evidence:
  - reference: PMID:16304440
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Dental enamel formation is a remarkable example of a biomineralization process."
    explanation: >
      Frames enamel formation as a biomineralization process whose disruption underlies AI.
  - reference: PMID:17552940
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "The type of inherited dental malformations observed in a given kindred relate to when, during odontogenesis, the defective gene is critically expressed."
    explanation: >
      Establishes the central principle that the AI phenotype reflects the developmental
      stage of ameloblast function that the mutated gene disrupts.

- name: Defective Enamel Matrix Secretion
  description: >
    During the secretory stage, ameloblasts deposit an enamel matrix rich in amelogenin
    (AMELX) and enamelin (ENAM) that templates the elongating enamel crystallites.
    Mutations in AMELX (X-linked) and ENAM (autosomal) impair matrix deposition, reducing
    enamel thickness and producing the hypoplastic AI phenotype.
  cell_types:
  - preferred_term: Ameloblast
    term:
      id: CL:0000059
      label: ameloblast
  biological_processes:
  - preferred_term: Enamel mineralization
    term:
      id: GO:0070166
      label: enamel mineralization
    modifier: DECREASED
  downstream:
  - target: Enamel Structural Failure
    causal_link_type: DIRECT
  evidence:
  - reference: PMID:16304440
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Mutations in the amelogenin gene (AMELX) cause X-linked amelogenesis imperfecta, while mutations in the enamelin gene (ENAM) cause autosomal-inherited forms of amelogenesis imperfecta."
    explanation: >
      Links secretory-stage matrix protein genes AMELX and ENAM to AI.

- name: Defective Enamel Matrix Processing and Maturation
  description: >
    During the maturation stage, the enamel proteases MMP20 (enamelysin) and KLK4
    (kallikrein-4) progressively degrade and remove the enamel matrix, allowing crystallites
    to grow and the tissue to harden. Biallelic mutations in MMP20 and KLK4 impair matrix
    processing, leaving residual protein and soft, hypomineralized/hypomature enamel.
  cell_types:
  - preferred_term: Ameloblast
    term:
      id: CL:0000059
      label: ameloblast
  biological_processes:
  - preferred_term: Enamel mineralization
    term:
      id: GO:0070166
      label: enamel mineralization
    modifier: DECREASED
  downstream:
  - target: Enamel Structural Failure
    causal_link_type: DIRECT
  evidence:
  - reference: PMID:17552940
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Genes expressed by odontoblasts (COL1A1, COL1A2, and DSPP), and ameloblasts (AMELX, ENAM, MMP20, and KLK4) during the crown formation stage, are associated with dentinogenesis imperfecta, dentin dysplasia, and amelogenesis imperfecta."
    explanation: >
      Identifies the ameloblast-expressed processing genes MMP20 and KLK4 as AI genes
      acting during crown formation.

- name: Enamel Structural Failure
  description: >
    The proximate consequence of disrupted secretion, processing, or mineralization is
    enamel that is thin, soft, discolored, and/or rapidly worn. This is the structural
    phenotype underlying the clinical presentation of AI: hypoplastic, hypomature, or
    hypocalcified enamel with attendant sensitivity, attrition, and esthetic impairment.
  biological_processes:
  - preferred_term: Enamel mineralization
    term:
      id: GO:0070166
      label: enamel mineralization
    modifier: DECREASED
  evidence:
  - reference: PMID:16838342
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "The amelogenesis imperfectas (AIs) are a clinically and genetically diverse group of conditions that are caused by mutations in a variety of genes that are critical for normal enamel formation."
    explanation: >
      Frames the diverse AI phenotypes as the downstream result of disrupted normal enamel
      formation.

phenotypes:
- category: Dental
  name: Amelogenesis imperfecta
  diagnostic: true
  description: >
    The defining phenotype: hereditary abnormal enamel formation affecting the primary
    and/or permanent dentition, encompassing hypoplastic, hypomature, and hypocalcified
    enamel.
  phenotype_term:
    preferred_term: Amelogenesis imperfecta
    term:
      id: HP:0000705
      label: Amelogenesis imperfecta
  evidence:
  - reference: PMID:16838342
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "The amelogenesis imperfectas (AIs) are a clinically and genetically diverse group of conditions that are caused by mutations in a variety of genes that are critical for normal enamel formation."
    explanation: >
      Directly characterizes AI as a hereditary disorder of enamel formation.

- category: Dental
  name: Enamel hypoplasia
  description: >
    Reduced thickness of enamel, the quantitative defect characteristic of secretory-stage
    (hypoplastic) AI caused by AMELX/ENAM mutations.
  phenotype_term:
    preferred_term: Enamel hypoplasia
    term:
      id: HP:0006297
      label: Enamel hypoplasia
  evidence:
  - reference: PMID:21127961
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "The types (hypoplastic, hypocalcified, and hypomature) are correlated with defects in different stages of the process of enamel synthesis."
    explanation: >
      The hypoplastic type corresponds to reduced enamel (enamel hypoplasia).

- category: Dental
  name: Enamel hypomineralization
  description: >
    Reduced mineral content of enamel, producing soft, discolored, attrition-prone enamel
    characteristic of hypomature and hypocalcified AI from MMP20/KLK4/FAM83H defects.
  phenotype_term:
    preferred_term: Enamel hypomineralization
    term:
      id: HP:0006285
      label: Enamel hypomineralization
  evidence:
  - reference: PMID:39321764
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "AI phenotypes, whether hypoplastic or hypomineralised, entail mutations in genes, such as AMELX, ENAM, MMP20, KLK4, WDR72, FAM83H, C4ORF26, amelotin, GPR68, and ACPT."
    explanation: >
      Documents hypomineralized enamel as a core AI phenotype linked to the maturation/
      mineralization genes.

- category: Cellular
  name: iPSC-Derived Ameloblast Enamel-Formation Defect (Organoid Model)
  description: >
    A human induced pluripotent stem cell (iPSC)-derived ameloblast model reproduces the
    differentiation program of human ameloblasts and, in a three-dimensional organoid
    system, recapitulates amelogenesis imperfecta as a disease model — providing a
    human cellular platform for AI mechanism and regenerative studies. This organoid
    model is the cellular counterpart of the in vivo ameloblast dysfunction that drives AI.
  phenotype_term:
    preferred_term: Defective iPSC-derived ameloblast enamel formation
    term:
      id: HP:0000705
      label: Amelogenesis imperfecta
  evidence:
  - reference: PMID:37582367
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: "We furthermore develop a disease model of amelogenesis imperfecta in a three-dimensional (3D) organoid system and show AM maturation to mineralized structure in vivo."
    explanation: >
      A 3D organoid system serves as an in vitro disease model of AI, recapitulating
      defective ameloblast-driven enamel formation in human cells.
  - reference: PMID:37582367
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: "recapitulate those findings in human ameloblast in vitro differentiation from induced pluripotent stem cells (iPSCs)."
    explanation: >
      Confirms that human ameloblast differentiation is modeled in vitro from iPSCs,
      the basis for the AI organoid disease model.

