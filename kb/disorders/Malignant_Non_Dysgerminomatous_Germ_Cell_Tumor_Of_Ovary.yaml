    reference_title: "Unusual Cases of Pure Malignant Germ Cell Tumors of the Ovary: A Case Series on 10 Years Experience at a Tertiary Care Center."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
