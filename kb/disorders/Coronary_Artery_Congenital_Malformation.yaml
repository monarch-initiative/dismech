  downstream:
  - target: Mechanical interference and perfusion mismatch
    description: >-
      Anomalous origin and course set the stage for subtype-specific
      hemodynamic insults — interarterial compression, intramural narrowing,
      coronary steal, or absence of antegrade flow.
  evidence:
  - reference: PMID:34543069
    reference_title: "Coronary Artery Anomalies."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Coronary artery anomalies (CAAs) are a group of congenital conditions characterized by abnormal origin or course of any of the 3 main epicardial coronary arteries.
    explanation: Defines coronary artery anomalies as congenital abnormalities of origin or course of the epicardial coronary arteries.
- name: AAOCA interarterial/intramural coronary compression
  description: >-
    Subtype-specific mechanism for AAOCA. The anomalous proximal segment may
    be compressed between the aorta and pulmonary trunk (interarterial
    course), tunnel through the aortic wall as an intramural segment with a
    slit-like ostium, kink at an acute take-off angle, or stretch on exertion
    when aortopulmonary distention increases. These mechanisms reduce
    coronary luminal area and flow reserve during exercise, producing dynamic
    ischemia that can trigger lethal ventricular arrhythmias.
  cell_types:
  - preferred_term: smooth muscle cell of the coronary artery
    term:
      id: CL:0002592
      label: smooth muscle cell of the coronary artery
  - preferred_term: cardiac muscle cell
    term:
      id: CL:0000746
      label: cardiac muscle cell
  downstream:
  - target: Exertional ischemia and arrhythmogenic substrate
    description: >-
      Exercise-induced reduction in coronary luminal area drives myocardial
      ischemia and ventricular arrhythmia; SCD risk concentrates in young
      athletes during or just after vigorous exertion.
  evidence:
  - reference: PMID:39816672
    reference_title: "Anomalous Aortic Origin of a Coronary Artery in Pediatric Patients."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Anomalous left coronary artery from the right aortic sinus (L-AAOCA) with interarterial course carries a high risk of sudden cardiac death (SCD); therefore, current guidelines recommend exercise restriction and surgical intervention.
    explanation: Links interarterial AAOCA course to high SCD risk and supports the mechanical-interference mechanism.
  - reference: PMID:34459947
    reference_title: "Congenital Coronary Artery Anomalies and Sudden Cardiac Death."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Although rare, congenital CAAs confer a high risk of myocardial ischemia and SCD, especially in young, previously "healthy" athletes during or immediately after vigorous exertion.
    explanation: Documents exertional ischemia and SCD as the dominant clinical consequence of CAA anatomy in young patients.
- name: ALCAPA coronary steal and low-pressure perfusion
  description: >-
    Subtype-specific mechanism for ALCAPA. The postnatal fall in pulmonary
    vascular resistance leaves the left coronary territory perfused at low
    pressure from the pulmonary trunk. Once intercoronary collaterals develop,
    blood is shunted retrograde from the right coronary into the pulmonary
    trunk (coronary steal), producing chronic subendocardial ischemia of the
    left ventricle and the classic infantile dilated cardiomyopathy with
    mitral regurgitation.
  cell_types:
  - preferred_term: cardiac muscle cell
    term:
      id: CL:0000746
      label: cardiac muscle cell
  downstream:
  - target: Exertional ischemia and arrhythmogenic substrate
    description: >-
      Sustained low-pressure perfusion and coronary steal produce chronic
      subendocardial ischemia, infantile dilated cardiomyopathy, mitral
      regurgitation, and heart failure.
  evidence:
  - reference: PMID:31176627
    reference_title: "Mid-Term Outcome for Anomalous Origin of the Left Coronary Artery From the Pulmonary Artery."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Overall, 114 (82.6%) patients received coronary reimplantation, 21 (15.2%) underwent Takeuchi repair, and three (2.1%) were treated by closure of the ALCAPA plus coronary artery bypass graft.
    explanation: Large ALCAPA cohort shows that re-establishing dual-coronary perfusion is the dominant therapeutic strategy, consistent with the perfusion-mismatch / coronary-steal pathophysiology.
- name: Congenital ostial obstruction
  description: >-
    Subtype-specific mechanism for congenital coronary atresia/ostial
    stenosis. There is fixed structural obstruction to antegrade coronary
    flow from the aortic root. Unlike AAOCA (dynamic interference) and ALCAPA
    (perfusion mismatch), obstruction is anatomic and constant, producing
    neonatal/infantile ischemia, cardiomyopathy, and often early death.
  cell_types:
  - preferred_term: smooth muscle cell of the coronary artery
    term:
      id: CL:0002592
      label: smooth muscle cell of the coronary artery
  - preferred_term: cardiac muscle cell
    term:
      id: CL:0000746
      label: cardiac muscle cell
  downstream:
  - target: Exertional ischemia and arrhythmogenic substrate
    description: >-
      Fixed obstruction to coronary inflow drives neonatal ischemia and
      infantile cardiomyopathy, often presenting as early heart failure or
      sudden death.
  evidence:
  - reference: PMID:23706366
    reference_title: "Early neonatal death and congenital left coronary abnormalities: ostial atresia, stenosis and anomalous aortic origin."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "ostial atresia, stenosis and anomalous aortic origin"
    explanation: Case series of early neonatal deaths from ostial atresia/stenosis supports fixed-obstruction physiology as a distinct mechanism within congenital coronary malformations.
- name: Exertional ischemia and arrhythmogenic substrate
  description: >-
    Demand-induced myocardial ischemia produced by AAOCA mechanical
    interference, ALCAPA coronary steal, or fixed ostial stenosis creates
    regional electrophysiological heterogeneity, fibrosis, and ventricular
    arrhythmias that can culminate in sudden cardiac death. In infants with
    ALCAPA and severe ostial obstruction, sustained ischemia leads to left
    ventricular dysfunction, mitral regurgitation, and dilated
    cardiomyopathy.
  cell_types:
  - preferred_term: cardiac muscle cell
    term:
      id: CL:0000746
      label: cardiac muscle cell
  biological_processes:
  - preferred_term: cardiac muscle contraction
    modifier: ABNORMAL
    term:
      id: GO:0060048
      label: cardiac muscle contraction
  evidence:
  - reference: PMID:34459947
    reference_title: "Congenital Coronary Artery Anomalies and Sudden Cardiac Death."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Coronary artery anomalies (CAAs) are a heterogeneous group of rare congenital diseases whose features and pathophysiological mechanisms are extremely variable, ranging from silent anomalies to sudden cardiac death (SCD) in the most severe cases.
    explanation: Anchors the clinical range from silent disease to sudden cardiac death as the downstream consequence of CAA mechanisms.
  - reference: PMID:31176627
    reference_title: "Mid-Term Outcome for Anomalous Origin of the Left Coronary Artery From the Pulmonary Artery."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      In patients with decreased preoperative left ventricular ejection fraction (LVEF) (<50%), the LVEF significantly improved from 25% to 33% at discharge (p = 0.001).
    explanation: ALCAPA patients present with markedly depressed LVEF that is reversible after restoration of dual coronary perfusion, supporting the ischemia-driven LV dysfunction mechanism.
