name: Coronary Artery Congenital Malformation
creation_date: "2026-05-14T10:00:00Z"
updated_date: "2026-05-14T10:00:00Z"
description: >-
  Coronary artery congenital malformations are a heterogeneous group of
  congenital structural anomalies of the coronary arterial tree characterized
  by abnormal origin, course, termination, atresia, or fistulous connection of
  one or more coronary arteries. Clinical consequences depend on subtype and
  range from incidental imaging findings to myocardial ischemia, sudden cardiac
  death in young athletes, infantile heart failure, and arrhythmia. The
  category encompasses anomalous aortic origin of a coronary artery (AAOCA),
  anomalous origin of the left coronary artery from the pulmonary artery
  (ALCAPA / Bland-White-Garland syndrome), coronary artery fistula, and
  congenital coronary artery atresia or ostial stenosis.
category: Congenital
