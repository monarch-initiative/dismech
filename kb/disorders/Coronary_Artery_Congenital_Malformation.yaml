has_subtypes:
- name: AAOCA
  display_name: Anomalous aortic origin of a coronary artery
  description: >-
    A coronary artery (most clinically relevant when the left or right main
    coronary) arises from the inappropriate sinus of Valsalva, often with an
    interarterial course between the aorta and pulmonary artery. Anomalous
    left coronary from the right aortic sinus (L-AAOCA) carries a high risk
    of sudden cardiac death; anomalous right coronary from the left aortic
    sinus (R-AAOCA) is more common but lower risk. High-risk anatomic
    features include interarterial course, intramural proximal segment,
    slit-like ostium, and acute take-off angle.
  classification: anatomic
  subtype_term:
    preferred_term: malposition of the coronary ostium
    term:
      id: MONDO:0020426
      label: malposition of the coronary ostium
  evidence:
  - reference: PMID:28335843
    reference_title: "Anomalous Aortic Origin of a Coronary Artery From the Inappropriate Sinus of Valsalva."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Anomalous aortic origin of a coronary artery (AAOCA) from the inappropriate sinus of Valsalva is increasingly recognized by cardiac imaging.
    explanation: Defines AAOCA as origin from an inappropriate sinus of Valsalva.
  - reference: PMID:28335843
    reference_title: "Anomalous Aortic Origin of a Coronary Artery From the Inappropriate Sinus of Valsalva."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      autopsy studies report an associated risk of sudden death with interarterial anomalous left coronary artery (ALCA) and anomalous right coronary artery (ARCA).
    explanation: Documents the AAOCA subtypes (interarterial ALCA and ARCA) most strongly associated with risk of sudden death.
- name: ALCAPA
  display_name: Bland-White-Garland syndrome (ALCAPA)
  description: >-
    Anomalous origin of the left coronary artery from the pulmonary artery
    (ALCAPA), also known as Bland-White-Garland syndrome. After the postnatal
    fall in pulmonary vascular resistance, perfusion of the left coronary
    territory becomes inadequate and depends on retrograde flow from the
    right coronary artery via collaterals, with coronary steal into the
    pulmonary trunk. Infants typically present with heart failure, mitral
    regurgitation, and dilated cardiomyopathy; adults may present with
    arrhythmia or sudden death.
  classification: anatomic
  subtype_term:
    preferred_term: anomalous left coronary artery from the pulmonary artery
    term:
      id: MONDO:0000811
      label: anomalous left coronary artery from the pulmonary artery
  evidence:
  - reference: PMID:32207452
    reference_title: "Anomalous origin of the left coronary artery from the pulmonary artery: A surgical certainty."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      This study aims to assess the clinical presentation and the outcomes of a surgical correction of an anomalous origin of the left coronary artery from the pulmonary artery (ALCAPA).
    explanation: Names ALCAPA and frames it as a discrete malformation amenable to surgical correction.
- name: Coronary Artery Fistula
  display_name: Coronary artery fistula
  description: >-
    A congenital abnormal communication between a coronary artery and a
    cardiac chamber, the coronary sinus, the pulmonary trunk, or another
    vascular structure, bypassing the myocardial capillary bed. Small fistulas
    are often asymptomatic; medium-to-large fistulas can produce coronary
    steal, ischemia, chamber enlargement, congestive heart failure,
    arrhythmia, endocarditis, or myocardial infarction. Detailed
    pathophysiology, phenotype set, and treatments are curated in the
    dedicated dismech entry for coronary arterial fistulas.
  classification: anatomic
  subtype_term:
    preferred_term: coronary arterial fistulas
    term:
      id: MONDO:0016081
      label: coronary arterial fistulas
  evidence:
  - reference: PMID:16125261
    reference_title: "Coronary artery fistulas: clinical and therapeutic considerations."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      These fistulas are congenital or acquired coronary artery abnormalities in which blood is shunted into a cardiac chamber, great vessel, or other structure, bypassing the myocardial capillary network.
    explanation: Defines coronary artery fistula and its bypass of the myocardial capillary network.
- name: Congenital Coronary Atresia
  display_name: Congenital coronary artery atresia / ostial stenosis
  description: >-
    Congenital absence (atresia) or critical narrowing (stenosis) of a
    coronary artery ostium, most commonly involving the left main. These are
    extremely rare lesions and typically present in neonates with severe
    heart failure or unexpected death; older children may present with
    ischemia, arrhythmia, or syncope. Coronary angiography remains the
    diagnostic standard.
  classification: anatomic
  subtype_term:
    preferred_term: stenosis or atrophy of the coronary ostium
    term:
      id: MONDO:0020423
      label: stenosis or atrophy of the coronary ostium
  evidence:
  - reference: PMID:23706366
    reference_title: "Early neonatal death and congenital left coronary abnormalities: ostial atresia, stenosis and anomalous aortic origin."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Congenital left coronary artery abnormalities such as ostial stenosis or atresia are extremely rare.
    explanation: Establishes congenital coronary ostial stenosis and atresia as discrete, rare malformations.
  - reference: PMID:23706366
    reference_title: "Early neonatal death and congenital left coronary abnormalities: ostial atresia, stenosis and anomalous aortic origin."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Congenital coronary ostial abnormalities can lead to severe heart failure and unexpected neonatal death.
    explanation: Supports neonatal heart failure and sudden death as defining sequelae of ostial atresia/stenosis.
pathophysiology:
- name: Aberrant coronary artery embryologic development
  description: >-
    Coronary arteries form during embryogenesis through coordinated
    contributions of the proepicardium, epicardial epithelial-to-mesenchymal
    transition (EMT), endothelial progenitor migration into the developing
    myocardium, and connection of the nascent coronary plexus to the aortic
    root at the sinuses of Valsalva. Aberrations in coronary vasculogenesis,
    coronary stem formation, or septation of the outflow tract can produce
    anomalous origin from the aorta or pulmonary trunk, ostial atresia or
    stenosis, single coronary artery, or fistulous persistence of intramural
    sinusoidal connections. Cardiac neural crest cells and second heart field
    derivatives shape the outflow-tract anatomy that determines the final
    position of coronary ostia.
  cell_types:
  - preferred_term: endothelial cell of coronary artery
    term:
      id: CL:2000018
      label: endothelial cell of coronary artery
  - preferred_term: smooth muscle cell of the coronary artery
    term:
      id: CL:0002592
      label: smooth muscle cell of the coronary artery
  biological_processes:
