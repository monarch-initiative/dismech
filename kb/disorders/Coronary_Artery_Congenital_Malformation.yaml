treatments:
- name: Surgical coronary re-implantation (ALCAPA)
  description: >-
    Coronary re-implantation transfers the anomalous left coronary back to
    the aortic root and restores a dual-coronary supply. It is the mainstay
    of ALCAPA management and produces normalization of LV function within
    months in most infants.
  treatment_term:
    preferred_term: Cardiovascular Surgical Procedure
    term:
      id: NCIT:C49803
      label: Cardiovascular Surgical Procedure
  evidence:
  - reference: PMID:31176627
    reference_title: "Mid-Term Outcome for Anomalous Origin of the Left Coronary Artery From the Pulmonary Artery."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Overall, 114 (82.6%) patients received coronary reimplantation, 21 (15.2%) underwent Takeuchi repair, and three (2.1%) were treated by closure of the ALCAPA plus coronary artery bypass graft.
    explanation: Documents coronary re-implantation as the dominant surgical strategy for ALCAPA repair in a large cohort.
- name: Surgical unroofing or re-implantation for AAOCA
  description: >-
    For high-risk AAOCA (notably interarterial L-AAOCA, and selected
    R-AAOCA with inducible ischemia), surgical unroofing of the intramural
    segment, coronary re-implantation, or pulmonary artery translocation is
    indicated to relieve mechanical interference and abolish exertional
    ischemia.
  treatment_term:
    preferred_term: Cardiovascular Surgical Procedure
    term:
      id: NCIT:C49803
      label: Cardiovascular Surgical Procedure
  evidence:
  - reference: PMID:39816672
    reference_title: "Anomalous Aortic Origin of a Coronary Artery in Pediatric Patients."
    supports: SUPPORT
