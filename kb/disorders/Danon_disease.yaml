name: Danon disease
creation_date: '2026-02-03T19:04:58Z'
updated_date: '2026-04-12T22:17:10Z'
category: Mendelian
disease_term:
  preferred_term: Danon disease
  term:
    id: MONDO:0010281
    label: Danon disease
parents:
- Lysosomal storage diseases
- X-linked genetic disorders
- Autophagic vacuolar myopathies

description: >
  Danon disease is an X-linked dominant LAMP2-related lysosomal myopathy and
  cardiomyopathy in which loss of LAMP-2, especially the muscle-enriched
  LAMP-2B isoform, impairs autophagosome-lysosome fusion. The resulting block in
  autophagic flux drives accumulation of autophagic vacuoles, defective
  mitophagy, mitochondrial injury, metabolic remodeling, fibrosis, and
  progressive cardiac dysfunction. Affected males usually present in childhood or
  adolescence with hypertrophic cardiomyopathy, skeletal myopathy, and
  intellectual disability, whereas females tend to develop later and more
  variable, often cardiac-predominant disease.

inheritance:
- name: X-linked dominant
  description: >
    Danon disease is inherited as an X-linked dominant trait. Males with a
    single pathogenic LAMP2 allele are typically more severely affected, whereas
    heterozygous females show later and more variable manifestations because of
    mosaic LAMP-2 expression.
  evidence:
  - reference: PMID:31698507
    reference_title: "Review: Danon disease: Review of natural history and recent advances."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: The disease is inherited as an X-linked dominant trait.
    explanation: Confirms the mode of inheritance for Danon disease.

prevalence:
- population: Published literature review
  percentage: 146 reported patients across 83 manuscripts
  notes: >-
    No stable general-population prevalence estimate was identified in PubMed
    abstracts. The clearest abstract-level count is a 2019 systematic review of
    published cases.
  evidence:
  - reference: PMID:30857840
    reference_title: "Danon disease: Gender differences in presentation and outcomes"
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Among 83 manuscripts in MEDLINE and EMBASE on DD cases published until
      October 2017, we identified 146 patients with positive genetic testing
      for DD or positive muscle biopsy in a relative of a genetically diagnosed
      proband.
    explanation: >-
      Provides the most explicit PubMed-abstract estimate of reported Danon
      disease cases in the literature.
- population: Patients with unexplained LVH and ventricular preexcitation
  percentage: 30%
  notes: >-
    In a genetically tested enriched cardiomyopathy cohort, Danon disease
    accounted for 3 of 10 patients who had both unexplained left ventricular
    hypertrophy and electrocardiographic preexcitation.
  evidence:
  - reference: PMID:30929317
    reference_title: "Prevalence and clinical characteristics of Danon disease among patients with left ventricular hypertrophy and concomitant electrocardiographic preexcitation"
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Electrocardiographic preexcitation was identified in 10 of 197 patients
      with unexplained LVH in whom genetic testing was performed using
      next-generation sequencing. Results: Three (3/10, 30%) patients with
      Danon disease were found in association with different mutations in the
      gene of lysosome-associated membrane protein 2 (LAMP2).
    explanation: >-
      Quantifies how often Danon disease appears in a clinically enriched
      hypertrophic cardiomyopathy subgroup with ventricular preexcitation.

progression:
- phase: Early male onset
  age_range: mean first symptom 12.1 years
  notes: >-
    Male patients usually develop first manifestations in childhood or
    adolescence, often beginning with cardiomyopathy and later multisystem
    involvement.
  evidence:
  - reference: PMID:21415759
    reference_title: "Natural history of Danon disease."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Combining our data with that of 63 other Danon disease case reports in
      the literature, the average ages of first symptom, cardiac
      transplantation, and death were 12.1, 17.9, and 19.0 years in men and
      27.9, 33.7, and 34.6 years in women, respectively.
    explanation: >-
      Establishes the early average age of symptom onset in affected males.
- phase: Delayed female presentation
  age_range: mean first symptom 27.9 years
  notes: >-
    Female patients typically present substantially later, often with
    cardiac-predominant disease and more variable skeletal or cognitive
    involvement.
  evidence:
  - reference: PMID:21415759
    reference_title: "Natural history of Danon disease."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Combining our data with that of 63 other Danon disease case reports in
      the literature, the average ages of first symptom, cardiac
      transplantation, and death were 12.1, 17.9, and 19.0 years in men and
      27.9, 33.7, and 34.6 years in women, respectively.
    explanation: >-
      Demonstrates the delayed average onset of clinical disease in females.
- phase: Progression to advanced cardiomyopathy and transplantation
  age_range: mean cardiac transplantation 17.9 years in men; 33.7 years in women
  notes: >-
    Severe cardiac disease often progresses rapidly in males, with
    transplantation or death in late adolescence or early adulthood; females
    have later but still substantial cardiac event risk.
  evidence:
  - reference: PMID:21415759
    reference_title: "Natural history of Danon disease."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Combining our data with that of 63 other Danon disease case reports in
      the literature, the average ages of first symptom, cardiac
      transplantation, and death were 12.1, 17.9, and 19.0 years in men and
      27.9, 33.7, and 34.6 years in women, respectively.
    explanation: >-
      Quantifies the timing of transplantation and death that define advanced
      disease progression.
  - reference: PMID:31698507
    reference_title: "Review: Danon disease: Review of natural history and recent advances."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      An early molecular diagnosis is of crucial importance for genetic
      counselling and for therapeutic interventions: in male patients, the
      prognosis is poor due to rapid progression towards heart failure, and only
      heart transplantation modifies the disease course.
    explanation: >-
      Supports the characteristic rapid progression to end-stage cardiac disease
      and transplantation in severe male Danon disease.

pathophysiology:
- name: LAMP2 protein deficiency
  description: >
    Pathogenic loss-of-function variants in LAMP2 reduce lysosome-associated
    membrane protein 2, particularly the cardiac and skeletal muscle-enriched
    LAMP-2B isoform that is required for normal autophagic flux.
  gene:
    preferred_term: LAMP2
    term:
      id: hgnc:6501
      label: LAMP2
  cell_types:
  - preferred_term: cardiomyocyte
    term:
      id: CL:0000746
      label: cardiac muscle cell
  - preferred_term: skeletal muscle fiber
    term:
      id: CL:0008002
      label: skeletal muscle fiber
  biological_processes:
  - preferred_term: lysosome organization
    term:
      id: GO:0007040
      label: lysosome organization
  downstream:
  - target: Impaired autophagosome-lysosome fusion
    description: >
      LAMP-2B deficiency prevents efficient autophagosome docking and fusion
      with lysosomes in cardiomyocytes and muscle.
    evidence:
    - reference: PMID:30584088
      reference_title: "LAMP-2B regulates human cardiomyocyte function by mediating autophagosome-lysosome fusion."
      supports: SUPPORT
      evidence_source: IN_VITRO
      snippet: >-
        Here, we identify the LAMP-2 isoform B (LAMP-2B) as required for
        autophagosome-lysosome fusion in human cardiomyocytes (CMs).
      explanation: >-
        Directly supports the causal edge from LAMP2B deficiency to failed
        autophagosome-lysosome fusion in cardiomyocytes.
  evidence:
  - reference: PMID:31698507
    reference_title: "Review: Danon disease: Review of natural history and recent advances."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      The primary deficiency of lysosome-associated membrane protein-2 (LAMP-2)
      causes disruption of autophagy, leading to an impaired fusion of
      lysosomes to autophagosomes and biogenesis of lysosomes.
    explanation: >-
      Establishes LAMP-2 deficiency as the initiating molecular defect in Danon
      disease.
  - reference: PMID:30584088
    reference_title: "LAMP-2B regulates human cardiomyocyte function by mediating autophagosome-lysosome fusion."
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: >-
      Here, we identify the LAMP-2 isoform B (LAMP-2B) as required for
      autophagosome-lysosome fusion in human cardiomyocytes (CMs).
    explanation: >-
      Demonstrates that the LAMP-2B isoform is the disease-relevant fusion
      factor in human cardiomyocytes.

- name: Impaired autophagosome-lysosome fusion
  description: >
    Danon disease causes a late-stage block in autophagy, with impaired
    autophagosome-lysosome fusion and abnormal lysosome maturation in cardiac
    and skeletal muscle.
  cell_types:
  - preferred_term: cardiomyocyte
    term:
      id: CL:0000746
      label: cardiac muscle cell
  - preferred_term: skeletal muscle fiber
    term:
      id: CL:0008002
      label: skeletal muscle fiber
  biological_processes:
  - preferred_term: macroautophagy
    term:
      id: GO:0016236
      label: macroautophagy
  - preferred_term: autophagosome maturation
    term:
      id: GO:0097352
      label: autophagosome maturation
  downstream:
  - target: Autophagic vacuole accumulation
    description: >
      Blocked autophagic clearance results in pathognomonic accumulation of
      autophagic vacuoles with sarcolemmal features in muscle.
    evidence:
    - reference: PMID:39456205
      reference_title: "History and Perspective of LAMP-2 Deficiency (Danon Disease)."
      supports: SUPPORT
      evidence_source: HUMAN_CLINICAL
      snippet: >-
        Pathologically, the disease is characterized by the appearance of
        unique autophagic vacuoles with sarcolemmal features (AVSFs).
      explanation: >-
        Supports autophagic vacuole accumulation as the downstream tissue
        consequence of blocked autophagic fusion.
  - target: Impaired mitophagy
    description: >
      Failure of autophagosome-lysosome fusion interrupts mitochondrial quality
      control and prevents efficient clearance of damaged mitochondria.
    evidence:
    - reference: PMID:28526246
      reference_title: "Impaired mitophagy facilitates mitochondrial damage in Danon disease."
      supports: SUPPORT
      snippet: >-
        Danon hiPSC-CMs demonstrated an accumulation of damaged mitochondria,
        disrupted mitophagic flux, depressed mitochondrial respiratory capacity,
        and abnormal gene expression of key mitochondrial pathways.
      explanation: >-
        Links the autophagic block in Danon disease to impaired mitophagy and
        accumulation of damaged mitochondria.
  evidence:
  - reference: PMID:28102838
    reference_title: "Autophagy dysregulation in Danon disease."
    supports: SUPPORT
    snippet: >-
      The DD mouse model suggests that inefficient lysosome
      biogenesis/maturation and impairment of autophagosome-lysosome fusion
      contribute to the pathogenesis of muscle wasting.
    explanation: >-
      Supports late-stage autophagy failure as a core Danon disease mechanism.
  - reference: PMID:30584088
    reference_title: "LAMP-2B regulates human cardiomyocyte function by mediating autophagosome-lysosome fusion."
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: >-
      CMs derived from induced pluripotent stem cells (hiPSC-CMs) from Danon
      patients exhibit decreased colocalization between ATG14 and VAMP8,
      profound defects in autophagic fusion, as well as mitochondrial and
      contractile abnormalities.
    explanation: >-
      Demonstrates the human cardiomyocyte fusion defect and its immediate
      downstream contractile and mitochondrial consequences.

- name: Autophagic vacuole accumulation
  description: >
    Cardiac and skeletal muscle accumulate autophagic vacuoles with sarcolemmal
    features (AVSFs), a pathological hallmark of Danon disease that reflects
    stalled autophagic degradation.
  cell_types:
  - preferred_term: cardiomyocyte
    term:
      id: CL:0000746
      label: cardiac muscle cell
  - preferred_term: skeletal muscle fiber
    term:
      id: CL:0008002
      label: skeletal muscle fiber
  biological_processes:
  - preferred_term: macroautophagy
    term:
      id: GO:0016236
      label: macroautophagy
  evidence:
  - reference: PMID:39456205
    reference_title: "History and Perspective of LAMP-2 Deficiency (Danon Disease)."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Pathologically, the disease is characterized by the appearance of unique
      autophagic vacuoles with sarcolemmal features (AVSFs).
    explanation: Confirms AVSFs as a defining pathological hallmark of Danon disease.
  - reference: PMID:28102838
    reference_title: "Autophagy dysregulation in Danon disease."
    supports: SUPPORT
    snippet: >-
      Our data show that, similar to GSDII, DD patients display an autophagy
      block that correlates with the severity of the disease.
    explanation: >-
      Supports clinically relevant autophagic flux failure in patient muscle
      biopsies.

- name: Impaired mitophagy
  description: >
    Defective autophagic clearance in cardiomyocytes interrupts mitophagy,
    allowing damaged mitochondria to accumulate rather than being delivered to
    lysosomes for degradation.
  cell_types:
  - preferred_term: cardiomyocyte
    term:
      id: CL:0000746
      label: cardiac muscle cell
  biological_processes:
  - preferred_term: mitophagy
    term:
      id: GO:0000423
      label: mitophagy
  downstream:
  - target: Mitochondrial dysfunction and oxidative stress
    description: >
      Incomplete mitochondrial clearance leads to depressed respiratory capacity
      and oxidative injury in Danon cardiomyocytes.
    evidence:
    - reference: PMID:28526246
      reference_title: "Impaired mitophagy facilitates mitochondrial damage in Danon disease."
      supports: SUPPORT
      snippet: >-
        Danon hiPSC-CMs demonstrated an accumulation of damaged mitochondria,
        disrupted mitophagic flux, depressed mitochondrial respiratory capacity,
        and abnormal gene expression of key mitochondrial pathways.
      explanation: >-
        Supports the causal edge from impaired mitophagy to mitochondrial
        dysfunction in Danon disease.
  evidence:
  - reference: PMID:28526246
    reference_title: "Impaired mitophagy facilitates mitochondrial damage in Danon disease."
    supports: SUPPORT
    snippet: >-
      Danon hiPSC-CMs demonstrated an accumulation of damaged mitochondria,
      disrupted mitophagic flux, depressed mitochondrial respiratory capacity,
      and abnormal gene expression of key mitochondrial pathways.
    explanation: >-
      Directly demonstrates defective mitophagic flux and mitochondrial
      accumulation in Danon patient-derived cardiomyocytes.

- name: Mitochondrial dysfunction and oxidative stress
  description: >
    Damaged mitochondria accumulate in Danon cardiomyocytes, reducing
    respiratory capacity and increasing oxidative stress, which contributes to
    calcium-handling abnormalities and arrhythmogenic vulnerability.
  cell_types:
  - preferred_term: cardiomyocyte
    term:
      id: CL:0000746
      label: cardiac muscle cell
  biological_processes:
  - preferred_term: response to oxidative stress
    term:
      id: GO:0006979
      label: response to oxidative stress
  downstream:
  - target: Cardiac metabolic remodeling and fibrosis
    description: >
      Persistent mitochondrial stress is accompanied by metabolic reprogramming,
      senescence-associated signaling, and fibrotic remodeling that impair
      myocardial biomechanics.
    evidence:
    - reference: PMID:32751926
      reference_title: "Danon Disease-Associated LAMP-2 Deficiency Drives Metabolic Signature Indicative of Mitochondrial Aging and Fibrosis in Cardiac Tissue and hiPSC-Derived Cardiomyocytes."
      supports: SUPPORT
      snippet: >-
        Metabolic profiling indicated LAMP-2 deficiency promoted a switch toward
        glycolysis accompanied by rerouting of tryptophan metabolism.
        Cardiomyocytes' energetic balance and NAD+/NADH ratio appeared to be
        maintained despite mitochondrial aging. In turn, metabolic adaption was
        accompanied by a senescence-associated signature.
      explanation: >-
        Supports mitochondrial stress driving broader metabolic and remodeling
        responses in Danon heart tissue and hiPSC-derived cardiomyocytes.
  evidence:
  - reference: PMID:28526246
    reference_title: "Impaired mitophagy facilitates mitochondrial damage in Danon disease."
    supports: SUPPORT
    snippet: >-
      Danon hiPSC-CMs demonstrated an accumulation of damaged mitochondria,
      disrupted mitophagic flux, depressed mitochondrial respiratory capacity,
      and abnormal gene expression of key mitochondrial pathways.
    explanation: >-
      Supports mitochondrial respiratory dysfunction as a direct consequence of
      defective mitophagy.
  - reference: PMID:36671453
    reference_title: "Metabolic Maturation Exaggerates Abnormal Calcium Handling in a Lamp2 Knockout Human Pluripotent Stem Cell-Derived Cardiomyocyte Model of Danon Disease."
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: >-
      Excess ROS accumulation in LAMP2 KO CMs resulted in the over-activation
      of calcium/calmodulin dependent protein kinase IIδ (CaMKIIδ) and
      arrhythmogenesis, which was partially rescued by the treatment of ROS
      scavenger.
    explanation: >-
      Links oxidative stress in LAMP2-deficient cardiomyocytes to abnormal
      calcium signaling and arrhythmogenesis.

- name: Cardiac metabolic remodeling and fibrosis
  description: >
    LAMP-2 deficiency reshapes cardiomyocyte metabolism toward glycolysis and
    senescence-associated programs while promoting fibrotic remodeling and loss
    of biomechanical competence in the myocardium.
  cell_types:
  - preferred_term: cardiomyocyte
    term:
      id: CL:0000746
      label: cardiac muscle cell
  biological_processes:
  - preferred_term: glycolytic process
    term:
      id: GO:0006096
      label: glycolytic process
  - preferred_term: extracellular matrix organization
    term:
      id: GO:0030198
      label: extracellular matrix organization
  evidence:
  - reference: PMID:32751926
    reference_title: "Danon Disease-Associated LAMP-2 Deficiency Drives Metabolic Signature Indicative of Mitochondrial Aging and Fibrosis in Cardiac Tissue and hiPSC-Derived Cardiomyocytes."
    supports: SUPPORT
    snippet: >-
      Metabolic profiling indicated LAMP-2 deficiency promoted a switch toward
      glycolysis accompanied by rerouting of tryptophan metabolism.
      Cardiomyocytes' energetic balance and NAD+/NADH ratio appeared to be
      maintained despite mitochondrial aging. In turn, metabolic adaption was
      accompanied by a senescence-associated signature.
    explanation: >-
      Supports a metabolic remodeling program with mitochondrial aging and
      senescence-associated features in Danon cardiomyocytes.
  - reference: PMID:34459252
    reference_title: "LAMP2 Cardiomyopathy: Consequences of Impaired Autophagy in the Heart."
    supports: SUPPORT
    evidence_source: MODEL_ORGANISM
    snippet: >-
      Myocardial fibrosis was strikingly increased in 40-week-old L2Δ6 mice,
      recapitulating findings of human LAMP2 cardiomyopathy.
    explanation: >-
      Demonstrates fibrotic cardiac remodeling downstream of impaired autophagy
      in a Danon disease model.

phenotypes:
- name: Hypertrophic cardiomyopathy
  description: >
    Hypertrophic cardiomyopathy is the dominant cardiac presentation, especially
    in affected males, and is the main determinant of prognosis and need for
    transplantation.
  phenotype_term:
    preferred_term: Hypertrophic cardiomyopathy
    term:
      id: HP:0001639
      label: Hypertrophic cardiomyopathy
  evidence:
  - reference: PMID:21415759
    reference_title: "Natural history of Danon disease."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Men were severely affected with cognitive disabilities (100%),
      hypertrophic cardiomyopathy (88%), and muscle weakness (80%).
    explanation: >-
      Quantifies hypertrophic cardiomyopathy as the dominant phenotype in males.
  - reference: PMID:31698507
    reference_title: "Review: Danon disease: Review of natural history and recent advances."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Danon disease is a severe multisystem disorder clinically characterized by
      hypertrophic cardiomyopathy, skeletal myopathy and mental retardation in
      male patients, and by a milder phenotype (predominantly involving cardiac
      muscle) in female patients.
    explanation: >-
      Supports hypertrophic cardiomyopathy as a defining clinical manifestation.

- name: Dilated cardiomyopathy
  description: >
    Dilated cardiomyopathy is part of the Danon cardiac spectrum, particularly
    in females and in later-stage disease after progressive remodeling.
  phenotype_term:
    preferred_term: Dilated cardiomyopathy
    term:
      id: HP:0001644
      label: Dilated cardiomyopathy
  evidence:
  - reference: PMID:21415759
    reference_title: "Natural history of Danon disease."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Women were less severely affected but reported higher than expected levels
      of cognitive (47%) and skeletal muscle complaints (50%) and manifesting
      an equal prevalence of dilated cardiomyopathy and hypertrophic
      cardiomyopathy.
    explanation: >-
      Documents dilated cardiomyopathy as an important component of female Danon
      disease.
  - reference: PMID:32751926
    reference_title: "Danon Disease-Associated LAMP-2 Deficiency Drives Metabolic Signature Indicative of Mitochondrial Aging and Fibrosis in Cardiac Tissue and hiPSC-Derived Cardiomyocytes."
    supports: SUPPORT
    snippet: >-
      Clinical manifestations are phenotypically diverse and consist of
      hypertrophic and dilated cardiomyopathies, skeletal myopathy,
      retinopathy, and intellectual dysfunction.
    explanation: >-
      Confirms that dilated cardiomyopathy is part of the recognized Danon
      phenotype spectrum.

- name: Skeletal myopathy
  description: >
    Skeletal muscle weakness is common, especially in males, and corresponds to
    autophagic vacuolar myopathy with AVSFs on muscle biopsy.
  phenotype_term:
    preferred_term: Myopathy
    term:
      id: HP:0003198
      label: Myopathy
  evidence:
  - reference: PMID:21415759
    reference_title: "Natural history of Danon disease."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Men were severely affected with cognitive disabilities (100%),
      hypertrophic cardiomyopathy (88%), and muscle weakness (80%).
    explanation: >-
      Quantifies skeletal muscle weakness as a common male phenotype.
  - reference: PMID:31698507
    reference_title: "Review: Danon disease: Review of natural history and recent advances."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Danon disease is a severe multisystem disorder clinically characterized by
      hypertrophic cardiomyopathy, skeletal myopathy and mental retardation in
      male patients, and by a milder phenotype (predominantly involving cardiac
      muscle) in female patients.
    explanation: >-
      Supports skeletal myopathy as a core component of the classic Danon
      disease triad.

- name: Intellectual disability
  description: >
    Intellectual disability or broader cognitive involvement is frequent in
    affected males and occurs more often in females than older descriptions
    suggested.
  phenotype_term:
    preferred_term: Intellectual disability
    term:
      id: HP:0001249
      label: Intellectual disability
  evidence:
  - reference: PMID:21415759
    reference_title: "Natural history of Danon disease."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Men were severely affected with cognitive disabilities (100%),
      hypertrophic cardiomyopathy (88%), and muscle weakness (80%).
    explanation: >-
      Shows that cognitive disability is highly prevalent in male Danon disease.
  - reference: PMID:31698507
    reference_title: "Review: Danon disease: Review of natural history and recent advances."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Danon disease is a severe multisystem disorder clinically characterized by
      hypertrophic cardiomyopathy, skeletal myopathy and mental retardation in
      male patients, and by a milder phenotype (predominantly involving cardiac
      muscle) in female patients.
    explanation: >-
      Supports intellectual disability as part of the classic male phenotype.

- name: Arrhythmia
  description: >
    Danon disease is strongly arrhythmogenic, with malignant ventricular
    arrhythmias, conduction disease, and sudden-death risk emerging from
    cardiomyocyte autophagy defects and abnormal calcium handling.
  phenotype_term:
    preferred_term: Arrhythmia
    term:
      id: HP:0011675
      label: Arrhythmia
  evidence:
  - reference: PMID:34459252
    reference_title: "LAMP2 Cardiomyopathy: Consequences of Impaired Autophagy in the Heart."
    supports: SUPPORT
    evidence_source: MODEL_ORGANISM
    snippet: >-
      Human mutations in the X-linked lysosome-associated membrane protein-2
      (LAMP2) gene can cause a multisystem Danon disease or a primary
      cardiomyopathy characterized by massive hypertrophy, conduction system
      abnormalities, and malignant ventricular arrhythmias.
    explanation: >-
      Supports malignant ventricular arrhythmias as a defining cardiac
      manifestation of LAMP2 cardiomyopathy.
  - reference: PMID:21415759
    reference_title: "Natural history of Danon disease."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Danon disease is a rare but serious cardiac and skeletal myopathy leading
      to substantial morbidity and early mortality due to arrhythmia and
      cardiomyopathy.
    explanation: >-
      Demonstrates the clinical importance of arrhythmia in Danon disease
      outcomes.

- name: Wolff-Parkinson-White syndrome
  description: >
    Ventricular pre-excitation due to accessory atrioventricular conduction
    pathways can precede overt cardiomyopathy and may represent an early Danon
    presentation.
  phenotype_term:
    preferred_term: Wolff-Parkinson-White syndrome
    term:
      id: HP:0001716
      label: Wolff-Parkinson-White syndrome
  evidence:
  - reference: PMID:37628591
    reference_title: "Danon Disease: Entire LAMP2 Gene Deletion with Unusual Clinical Presentation-Case Report and Review of the Literature."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      At the age of 13, he was diagnosed with mild ventricular pre-excitation
      known as Wolf-Parkinson-White syndrome (WPWs), very mild and mostly
      asymptomatic cardiomyopathy and left ventricular hypertrophy.
    explanation: >-
      Documents Wolff-Parkinson-White syndrome as an early cardiac manifestation
      in Danon disease.

- name: Retinal dystrophy
  description: >
    Ocular involvement can include cone-rod retinal degeneration with
    progressive visual impairment, expanding Danon disease beyond heart and
    skeletal muscle.
  phenotype_term:
    preferred_term: Retinal dystrophy
    term:
      id: HP:0000556
      label: Retinal dystrophy
  evidence:
  - reference: PMID:37628591
    reference_title: "Danon Disease: Entire LAMP2 Gene Deletion with Unusual Clinical Presentation-Case Report and Review of the Literature."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      At the age of 13, he was diagnosed with mild ventricular pre-excitation
      known as Wolf-Parkinson-White syndrome (WPWs), very mild and mostly
      asymptomatic cardiomyopathy and left ventricular hypertrophy, and at about
      the age of 25 presented with visual impairment due to cone-rod dystrophy.
    explanation: >-
      Supports retinal dystrophy as a recognized though less frequent Danon
      disease manifestation.

genetic:
- name: LAMP2 mutations
  association: Causative
  gene_term:
    preferred_term: LAMP2
    term:
      id: hgnc:6501
      label: LAMP2
  notes: >
    Danon disease is caused by loss-of-function LAMP2 variants at Xq24. The
    LAMP-2B isoform is especially important for cardiac and skeletal muscle, and
    pathogenic variation includes truncating alleles, splice or missense
    variants, and whole-gene deletions.
  evidence:
  - reference: PMID:31698507
    reference_title: "Review: Danon disease: Review of natural history and recent advances."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      The primary deficiency of lysosome-associated membrane protein-2 (LAMP-2)
      causes disruption of autophagy, leading to an impaired fusion of
      lysosomes to autophagosomes and biogenesis of lysosomes.
    explanation: >-
      Supports LAMP2 deficiency as the molecular cause of Danon disease.
  - reference: PMID:37628591
    reference_title: "Danon Disease: Entire LAMP2 Gene Deletion with Unusual Clinical Presentation-Case Report and Review of the Literature."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: Genetic testing revealed an Xq24 microdeletion encompassing the entire LAMP2 gene.
    explanation: >-
      Provides a concrete example of a whole-gene deletion causing Danon
      disease.

- name: Sex-specific phenotypic differences
  association: Modifying
  notes: >
    Males usually present earlier with severe hypertrophic cardiomyopathy,
    skeletal myopathy, and cognitive involvement, whereas females have later and
    more variable disease with a larger proportion of dilated cardiomyopathy and
    cardiac-predominant presentations.
  evidence:
  - reference: PMID:21415759
    reference_title: "Natural history of Danon disease."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Women with Danon disease present with clinical symptoms and events
      approximately 15 years after men and report a higher proportion of
      cognitive and skeletal muscle problems than previously recognized.
    explanation: >-
      Quantifies the sex-dependent delay and phenotypic differences in disease
      expression.
  - reference: PMID:31698507
    reference_title: "Review: Danon disease: Review of natural history and recent advances."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Danon disease is a severe multisystem disorder clinically characterized by
      hypertrophic cardiomyopathy, skeletal myopathy and mental retardation in
      male patients, and by a milder phenotype (predominantly involving cardiac
      muscle) in female patients.
    explanation: >-
      Supports the characteristic male-severe and female-cardiac-predominant
      pattern.

treatments:
- name: Heart transplantation
  description: >
    Heart transplantation remains the main disease-modifying intervention for
    end-stage Danon cardiomyopathy, especially in rapidly progressive male
    disease.
  treatment_term:
    preferred_term: heart transplantation
    term:
      id: MAXO:0000068
      label: transplantation procedure
  evidence:
  - reference: PMID:31698507
    reference_title: "Review: Danon disease: Review of natural history and recent advances."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      An early molecular diagnosis is of crucial importance for genetic
      counselling and for therapeutic interventions: in male patients, the
      prognosis is poor due to rapid progression towards heart failure, and only
      heart transplantation modifies the disease course.
    explanation: >-
      Supports heart transplantation as the principal disease-modifying therapy
      for advanced Danon cardiomyopathy.

- name: Gene therapy (RP-A501; AAV9.LAMP2B)
  description: >
    Systemic AAV9-mediated LAMP2B gene replacement is the leading targeted
    therapy in clinical development, with published phase 1 human data and an
    ongoing phase 2 program.
  treatment_term:
    preferred_term: gene therapy
    term:
      id: MAXO:0001001
      label: gene therapy
  evidence:
  - reference: PMID:39556016
    reference_title: "Phase 1 Study of AAV9.LAMP2B Gene Therapy in Danon Disease."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      In the six patients with normal left ventricular ejection fraction at
      baseline, we observed cardiac LAMP2 protein expression and a reduction
      from baseline in or stabilization of the left ventricular mass index,
      preservation of left ventricular ejection fraction, and reduction in or
      stabilization of the levels of cardiac troponin I and N-terminal
      pro-B-type natriuretic peptide.
    explanation: >-
      Provides direct human evidence that AAV9.LAMP2B gene therapy can restore
      myocardial LAMP2 expression and stabilize key cardiac outcomes.
  - reference: clinicaltrials:NCT06092034
    reference_title: "Gene Therapy for Danon Disease: A Phase 2 Study Evaluating the Efficacy and Safety of Intravenously Administered Adeno-Associated Virus Serotype 9 (rAAV9) Vector Containing the Human LAMP2 Isoform B Transgene (RP-A501; AAV9.LAMP2B) in Male Patients With Danon Disease"
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      This is a single arm Phase 2 trial to evaluate the efficacy and safety of
      RP-A501, a recombinant adeno-associated virus serotype 9 (AAV9)
      containing the human lysosome-associated membrane protein 2 isoform B
      (LAMP2B) transgene, in male patients with Danon Disease.
    explanation: >-
      Confirms active phase 2 clinical development of targeted LAMP2B gene
      replacement.

