      reference_title: Atopic dermatitis.
      supports: SUPPORT
      evidence_source: HUMAN_CLINICAL
      snippet: "Atopic dermatitis is associated with increased risk of multiple comorbidities, including food allergy, asthma, allergic rhinitis, and mental health disorders."
      explanation: Lancet review identifies food allergy as a major AD comorbidity.
  - target: Allergic Rhinitis
    description: >-
      Allergic immune skewing in AD is associated with allergic rhinitis as part
      of the atopic comorbidity spectrum.
    causal_link_type: INDIRECT_KNOWN_INTERMEDIATES
    intermediate_mechanisms:
    - allergic sensitization
    - atopic march
    evidence:
    - reference: PMID:32738956
      reference_title: Atopic dermatitis.
      supports: SUPPORT
      evidence_source: HUMAN_CLINICAL
      snippet: "Atopic dermatitis is associated with increased risk of multiple comorbidities, including food allergy, asthma, allergic rhinitis, and mental health disorders."
      explanation: Lancet review identifies allergic rhinitis as a major AD comorbidity.
  - target: Asthma
    description: >-
      Impaired skin barrier and allergic sensitization can precede asthma in
      the atopic march.
    causal_link_type: INDIRECT_KNOWN_INTERMEDIATES
    intermediate_mechanisms:
    - impaired skin barrier
    - allergic sensitization
    - atopic march
    evidence:
    - reference: PMID:30819278
      reference_title: "Pathophysiology of atopic dermatitis: Clinical implications."
      supports: SUPPORT
      evidence_source: HUMAN_CLINICAL
      snippet: "An impaired skin barrier may be the initial step in the development of the atopic march as well as AD, which leads to further skin inflammation and allergic sensitization."
      explanation: This review links impaired skin barrier in AD to allergic sensitization and the atopic march, supporting asthma as a downstream atopic comorbidity.
