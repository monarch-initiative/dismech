discussions:
- discussion_id: gap_eml1_mouse_organoid_translatability
  prompt: >-
    Which EML1 progenitor defects are conserved between mouse cortical
    heterotopia models and human iPSC-derived cerebral organoids, and which
    disease branches depend on human-specific basal radial glia, extracellular
    matrix, or OSVZ-like biology?
  kind: HUMAN_MODEL_MISMATCH
  status: OPEN
  attaches_to:
  - pathophysiology#Centrosome, Cilium and Mitotic Spindle Perturbation in Apical Radial Glia
  - pathophysiology#Apical Radial Glia Delamination and Ectopic Progenitors
  - pathophysiology#Ectopic Neurogenesis and Cortical Neuron Misplacement
  - pathophysiology#Ribbon-like Subcortical Heterotopia and Brain Overgrowth
  rationale: >-
    Mouse HeCo, knockout and conditional Eml1 models establish the conserved
    centrosome/cilium/spindle lesion and in vivo microtubule-rescue effect, but
    human cerebral organoids add disease-specific evidence for ectopic neural
    rosettes, heterotopic neuron clusters, basal radial glial marker expansion
    and human-specific extracellular matrix signatures. The open question is
    whether these organoid phenotypes are direct consequences of the same
    EML1-centrosome lesion or a human-amplified OSVZ/oRG branch that is only
    partly represented in lissencephalic rodent cortex.
  evidence:
  - reference: PMID:35289477
    reference_title: "Human cerebral organoids reveal progenitor pathology in EML1-linked cortical malformation."
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: >-
      The lack of human-specific models hampers our understanding of the
      molecular underpinnings of the intricate processes leading to MCD.
    explanation: >-
      Supports treating mouse-to-human translatability as an explicit knowledge
      gap for EML1-linked malformations of cortical development.
  - reference: PMID:35289477
    reference_title: "Human cerebral organoids reveal progenitor pathology in EML1-linked cortical malformation."
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: >-
      Single-cell RNA sequencing shows an upregulation of basal radial glial
      (RG) markers and human-specific extracellular matrix components in the
      ectopic cell population.
    explanation: >-
      Supports a human organoid branch involving basal radial glial and
      human-specific extracellular matrix programs that is not fully resolved by
      mouse models alone.
  proposed_experiments:
  - experiment_id: exp_eml1_isogenic_organoid_microtubule_yap1_rescue
    name: EML1 isogenic organoid microtubule and YAP1 rescue panel
    description: >-
      Compare patient-derived EML1 organoids, CRISPR-corrected isogenic
      organoids and knock-in mutant controls, with orthogonal rescue arms that
      restore microtubule formation or dampen YAP1-triggered expansion. Quantify
      centrosome/cilium integrity, spindle orientation, radial-glial
      delamination, ectopic rosette formation, basal radial glial markers,
      extracellular matrix programs and heterotopic neuron clusters.
    experiment_type:
      preferred_term: isogenic cerebral organoid rescue assay
    model_systems:
    - name: Human iPSC-derived cerebral organoid EML1 model
      description: >-
        Patient-derived or genome-edited human cerebral organoids carrying EML1
        loss-of-function or patient missense variants, with matched isogenic
        corrected controls.
      experimental_model_type: ORGANOID
      namo_type: namo:Organoid
      organism:
        preferred_term: human
        term:
          id: NCBITaxon:9606
          label: Homo sapiens
      tissue_term:
        preferred_term: cerebral cortex
        term:
          id: UBERON:0000956
          label: cerebral cortex
      cell_types:
      - preferred_term: radial glial cell
        term:
          id: CL:0000681
          label: radial glial cell
      - preferred_term: neural progenitor cell
        term:
          id: CL:0011020
          label: neural progenitor cell
      cell_source: Patient-derived or isogenic engineered human induced pluripotent stem cells
      culture_system: Three-dimensional cerebral organoid with imaging and single-cell readouts
    perturbations:
    - name: EML1 variant correction or knock-in
      target: pathophysiology#EML1 Loss of Function and Microtubule Dysregulation
      description: >-
        Correct patient EML1 variants or introduce matched variants into control
        iPSCs to separate causal EML1 effects from donor background.
    - name: Microtubule formation rescue
      target: pathophysiology#Apical Radial Glia Delamination and Ectopic Progenitors
      description: >-
        Test whether the mouse in vivo microtubule-rescue effect also rescues
        human organoid radial-glial delamination and ectopic rosette formation.
    - name: YAP1 pathway dampening
      target: pathophysiology#Ectopic Neurogenesis and Cortical Neuron Misplacement
      description: >-
        Perturb the organoid YAP1 expansion branch to test whether it is
        necessary for ectopic progenitor expansion and heterotopic neuron
        clusters downstream of EML1 loss.
    readouts:
    - name: Progenitor architecture and heterotopic neuron output
      target: pathophysiology#Ribbon-like Subcortical Heterotopia and Brain Overgrowth
      description: >-
        Quantify ectopic neural rosettes, basal radial glial markers,
        extracellular matrix programs and heterotopic neuron clusters across
        mutant, corrected and rescue conditions.
      assays:
      - preferred_term: immunostaining
      - preferred_term: single-cell transcriptomic profiling
      direction: POSITIVE
    controls:
    - name: Isogenic corrected organoids
      description: Matched organoids in which the EML1 variant is corrected.
    - name: Isogenic knock-in organoids
      description: Wild-type-background organoids carrying introduced EML1 variants.
    decision_criterion: >-
      A conserved EML1-centrosome skeleton is supported if variant correction or
      microtubule rescue normalizes both mouse and organoid progenitor
      delamination readouts. A human-specific branch is supported if organoid
      basal radial glial, extracellular-matrix or YAP1 phenotypes persist as
      separable outputs not captured by the mouse model.
    would_support:
    - pathophysiology#Apical Radial Glia Delamination and Ectopic Progenitors
    - pathophysiology#Ectopic Neurogenesis and Cortical Neuron Misplacement
notes: >-
  Entry created from cortical-malformation epic 4098 (issue 4089), seeded from
  Romero, Bahi-Buisson & Francis 2018 (Sem Cell Dev Biol 76:33-75). Modeled as a
  coherent EML1 neural-progenitor centrosome/spindle/cilium pathomechanism
  (ectopic apical radial glia delamination -> ectopic neurogenesis ->
  ribbon-like subcortical heterotopia) and split from the classical DCX/PAFAH1B1
  subcortical band heterotopia (a microtubule-dependent postmitotic neuronal
  migration defect) and from FLNA periventricular nodular heterotopia. The
  progenitor pathophysiology nodes declare conforms_to the
  neural_progenitor_centrosome_spindle_dysfunction module. Mechanistic nodes are
  supported by the HeCo mouse / conditional Eml1 mutant and patient-cell studies
  (tagged MODEL_ORGANISM / IN_VITRO), while the human clinical phenotype derives
  from the Oegema et al. 2019 cohort of eight individuals from five families
  (HUMAN_CLINICAL). No EML1-specific MONDO term currently exists; the entry is
  anchored to the closest available grouping (MONDO:0020491 subcortical band
  heterotopia) as a cross-reference and is relevant to the missing-MONDO-anchor
  epic 3691. The RPGRIP1L interaction (Uzquiano et al. 2019) and the precise
  ordering of centrosome versus cilium defects (partly addressed by Zaidi et al.
  2024) remain open questions.
