pathophysiology:
- name: EML1 Loss of Function and Microtubule Dysregulation
  description: >-
    Biallelic loss-of-function variants in EML1 abolish full-length EMAP-1, a
    microtubule-associated protein expressed in cortical apical radial glia. In
    the spontaneous HeCo mouse, a retrotransposon insertion eliminates
    full-length Eml1 transcripts, and knockdown reproduces the progenitor
    phenotype while re-expression rescues it, establishing EML1 loss as the
    initiating molecular lesion. EML1 loss perturbs microtubule dynamics in
    progenitor cells, the proximal cytoskeletal defect from which the centrosome,
    cilium and spindle abnormalities follow.
  cell_types:
  - preferred_term: apical radial glial cell
    term:
      id: CL:0000681
      label: radial glial cell
  biological_processes:
  - preferred_term: microtubule cytoskeleton organization
    term:
      id: GO:0000226
      label: microtubule cytoskeleton organization
    modifier: DYSREGULATED
  evidence:
  - reference: PMID:24859200
    reference_title: "Mutations in Eml1 lead to ectopic progenitors and neuronal heterotopia in mouse and human."
    supports: SUPPORT
    evidence_source: MODEL_ORGANISM
    snippet: >-
      We identified Eml1, encoding a microtubule-associated protein, as the gene
      mutated in HeCo mice
    explanation: >-
      Identifies Eml1 (a microtubule-associated protein) as the gene mutated in
      the HeCo heterotopia mouse, establishing the molecular lesion.
  - reference: PMID:29229923
    reference_title: "Eml1 loss impairs apical progenitor spindle length and soma shape in the developing cerebral cortex."
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: >-
      MT dynamics are perturbed in mutant progenitor cells in vitro
    explanation: >-
      Demonstrates that Eml1 loss perturbs microtubule dynamics in progenitor
      cells, the proximal cytoskeletal defect.
- name: Centrosome, Cilium and Mitotic Spindle Perturbation in Apical Radial Glia
  conforms_to: "neural_progenitor_centrosome_spindle_dysfunction#Centrosome and Mitotic Spindle Perturbation"
  description: >-
    Microtubule dysregulation in EML1-deficient apical radial glia disrupts the
    centrosome and primary cilium and abnormally elongates the mitotic spindle.
    Cilia are shorter, less numerous and aberrantly oriented within vesicles,
    and centrosomes and microtubule regrowth are impaired in both mouse mutant
    radial glia and human patient cells, placing the proximal lesion at the
    progenitor centrosome/spindle apparatus.
  cell_types:
  - preferred_term: apical radial glial cell
    term:
      id: CL:0000681
      label: radial glial cell
  biological_processes:
  - preferred_term: mitotic spindle organization
    term:
      id: GO:0007052
      label: mitotic spindle organization
    modifier: DYSREGULATED
