name: EML1-related Ribbon-like Subcortical Heterotopia
creation_date: "2026-06-12T00:00:00Z"
category: Mendelian
disease_term:
  preferred_term: EML1-associated ribbon-like subcortical heterotopia
  term:
    id: MONDO:0020491
    label: subcortical band heterotopia
description: >-
  EML1-related ribbon-like subcortical heterotopia (EML1-associated brain
  overgrowth syndrome) is a rare autosomal recessive malformation of cortical
  development caused by biallelic loss-of-function variants in EML1, which
  encodes Echinoderm microtubule-associated protein-like 1 (EMAP-1), a
  microtubule-associated protein of the EMAP family. EML1 is required in apical
  radial glia (aRG) for normal microtubule dynamics, centrosome and primary
  cilium integrity, and mitotic spindle length and orientation. Loss of EML1
  function perturbs these progenitor microtubule mechanisms, causing apical
  radial glia to delaminate and become abnormally positioned away from the
  ventricular zone. These ectopic progenitors continue to proliferate within the
  cortical wall and generate neurons that are produced and retained ectopically,
  giving rise to a strikingly specific imaging signature of megalencephaly with
  bilateral giant ribbon-like subcortical heterotopia, partial or complete
  agenesis of the corpus callosum, and an overlying polymicrogyria-like cortical
  malformation. Affected individuals present with severe developmental delay,
  drug-resistant epilepsy and visual impairment, and hydrocephalus is seen in a
  substantial fraction. The mechanism is a primary progenitor (centrosome /
  spindle / cilium) defect rather than a postmitotic neuronal migration defect:
  neuronal migration speed per se is normal, and the migration disturbance is
  secondary to loss of the normal radial glial scaffold. This distinguishes the
  disorder mechanistically from the classical subcortical band heterotopia of
  DCX / PAFAH1B1 (a microtubule-dependent neuronal migration defect) and from
  FLNA periventricular nodular heterotopia (an apical-junction/actin defect),
  justifying a distinct entry built on the neural-progenitor centrosome/spindle
  skeleton.
