      label: cilium assembly
    modifier: DECREASED
  evidence:
  - reference: PMID:29229923
    reference_title: "Eml1 loss impairs apical progenitor spindle length and soma shape in the developing cerebral cortex."
    supports: SUPPORT
    evidence_source: MODEL_ORGANISM
    snippet: >-
      centrosome and primary cilia were altered and spindles were found to be
      abnormally long in HeCo progenitors
    explanation: >-
      Documents altered centrosome and primary cilia with abnormally elongated
      mitotic spindles in EML1-deficient progenitors.
  - reference: PMID:31390572
    reference_title: "Mutations in the Heterotopia Gene Eml1/EML1 Severely Disrupt the Formation of Primary Cilia."
    supports: SUPPORT
    evidence_source: MODEL_ORGANISM
    snippet: >-
      In HeCo aRGs, cilia are shorter, less numerous, and often found aberrantly
      oriented within vesicles
    explanation: >-
      Documents the primary-cilium defect in EML1-deficient apical radial glia.
  - reference: PMID:39316454
    reference_title: "Forebrain Eml1 depletion reveals early centrosomal dysfunction causing subcortical heterotopia."
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: >-
      In a forebrain conditional Eml1 mutant model and human patient cells,
      primary cilia and centrosomes are altered
    explanation: >-
      Confirms centrosome and primary-cilium alterations in both the mouse model
      and human patient cells, supporting the centrosomal proximal lesion.
- name: Apical Radial Glia Delamination and Ectopic Progenitors
  conforms_to: "neural_progenitor_centrosome_spindle_dysfunction#Abnormal Progenitor Division and Fate Choice"
  description: >-
    Centrosome/spindle perturbation causes apical radial glia to lose their
    apical anchoring and delaminate from the ventricular zone, so that dividing
    progenitors become abnormally distributed throughout the cortical wall rather
    than confined to the ventricular and subventricular zones. Misplaced apical
    progenitors are the critical initiating event for heterotopia formation, and
    rescuing microtubule formation in vivo reduces both delamination and
    heterotopia volume, establishing the causal link.
  cell_types:
  - preferred_term: apical radial glial cell
    term:
      id: CL:0000681
      label: radial glial cell
  - preferred_term: neural progenitor cell
    term:
      id: CL:0011020
      label: neural progenitor cell
  biological_processes:
  - preferred_term: establishment of mitotic spindle orientation
    term:
      id: GO:0000132
      label: establishment of mitotic spindle orientation
    modifier: DYSREGULATED
  evidence:
  - reference: PMID:24859200
    reference_title: "Mutations in Eml1 lead to ectopic progenitors and neuronal heterotopia in mouse and human."
    supports: SUPPORT
    evidence_source: MODEL_ORGANISM
    snippet: >-
      While HeCo neurons migrated at the same speed as wild type, abnormally
      distributed dividing progenitors were found throughout the cortical wall
      from embryonic day 13
    explanation: >-
      Shows that the primary defect is abnormally distributed dividing
      progenitors, not slowed neuronal migration.
  - reference: PMID:31390572
    reference_title: "Mutations in the Heterotopia Gene Eml1/EML1 Severely Disrupt the Formation of Primary Cilia."
    supports: SUPPORT
    evidence_source: MODEL_ORGANISM
    snippet: >-
      In HeCo mice, some aRGs are abnormally positioned away from the
      ventricular zone (VZ)
    explanation: >-
      Documents delamination of apical radial glia away from the ventricular
      zone in the EML1-deficient cortex.
  - reference: PMID:39316454
    reference_title: "Forebrain Eml1 depletion reveals early centrosomal dysfunction causing subcortical heterotopia."
    supports: SUPPORT
    evidence_source: MODEL_ORGANISM
    snippet: >-
      By rescuing microtubule formation in Eml1 mutant embryonic brains,
      abnormal radial glia delamination and heterotopia volume were
      significantly reduced
    explanation: >-
      Causal rescue experiment linking microtubule-dependent radial glia
      delamination to heterotopia formation.
- name: Ectopic Neurogenesis and Cortical Neuron Misplacement
  conforms_to: "neural_progenitor_centrosome_spindle_dysfunction#Progenitor Pool Distortion"
  description: >-
    Ectopic progenitors retained within the cortical wall continue to divide and
    generate neurons outside their normal niche. These neurons are produced and
    trapped ectopically, accounting for the excessive number of cortical neurons
    found in the subcortical white matter rather than in the cortical plate.
  cell_types:
