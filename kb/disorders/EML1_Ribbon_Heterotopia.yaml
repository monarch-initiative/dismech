    reference_title: "Forebrain Eml1 depletion reveals early centrosomal dysfunction causing subcortical heterotopia."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Subcortical heterotopia is a cortical malformation associated with
