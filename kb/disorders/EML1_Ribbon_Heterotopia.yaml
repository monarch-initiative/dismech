- name: Ribbon-like Subcortical Heterotopia and Brain Overgrowth
  conforms_to: "neural_progenitor_centrosome_spindle_dysfunction#Abnormal Cortical Neuron Output and Gyration"
  description: >-
    The distorted progenitor output produces the characteristic malformation:
    bilateral megalencephaly with a giant ribbon-like subcortical heterotopia,
    partial or complete callosal agenesis and an overlying polymicrogyria-like
    cortex. EML1 mutations underlie ribbon-like heterotopia in humans, and the
    spindle, ectopic-progenitor and heterotopia phenotypes are linked across
    mouse and human.
