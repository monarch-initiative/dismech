- name: YARS2 mitochondrial tyrosyl-tRNA aminoacylation defect
  description: >-
    Biallelic YARS2 variants reduce mitochondrial tyrosyl-tRNA synthetase
    catalytic efficiency and impair aminoacylation needed for mitochondrial
    protein synthesis.
