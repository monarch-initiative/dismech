- name: STAC3-associated syndromic susceptibility
  association: Disease-associated
  gene_term:
    preferred_term: STAC3
    term:
      id: hgnc:28423
      label: STAC3
  notes: >-
    STAC3 is included as a qualified susceptibility gene because reported MH
