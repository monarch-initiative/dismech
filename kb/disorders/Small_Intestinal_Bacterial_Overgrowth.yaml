pathophysiology:
- name: Bacterial overgrowth in small intestine
  description: >
    Excessive bacterial colonization of the small intestine leads to malabsorption,
    nutrient deficiencies, and gastrointestinal symptoms. Disruption of gastric acid,
    motility (including migrating motor complex), and the ileocecal barrier promotes
    overgrowth. Bacterial fermentation produces hydrogen, methane, and short-chain
    fatty acids while bile acid deconjugation impairs fat absorption.
  biological_processes:
  - preferred_term: response to bile acid
    term:
      id: GO:1903412
      label: response to bile acid
  - preferred_term: tight junction assembly
    term:
      id: GO:0070830
      label: bicellular tight junction assembly
  cell_types:
  - preferred_term: enterocyte
    term:
      id: CL:0000584
      label: enterocyte
  locations:
  - preferred_term: small intestine
    term:
      id: UBERON:0002108
      label: small intestine
  evidence:
  - reference: PMID:38798120
    reference_title: "Critical appraisal of the SIBO hypothesis and breath testing: A clinical practice update endorsed by the European society of neurogastroenterology and motility (ESNM) and the American neurogastroenterology and motility society (ANMS)."
    supports: SUPPORT
    snippet: "Small intestinal bacterial overgrowth (SIBO) has been recognized for over a century in patients with predisposing conditions causing intestinal stasis, such as surgical alteration of the small bowel or chronic diseases"
    explanation: ESNM/ANMS practice update confirms SIBO is well-established in stasis conditions.
  - reference: PMID:20572300
    reference_title: Small intestinal bacterial overgrowth syndrome.
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "There are several endogenous defence mechanisms for preventing bacterial overgrowth: gastric acid secretion, intestinal motility, intact ileo-caecal valve, immunoglobulins within intestinal secretion and bacteriostatic properties of pancreatic and biliary secretion."
    explanation: Bures et al. review describes the endogenous defense mechanisms whose failure leads to SIBO.
  - reference: PMID:35398346
    reference_title: Small Intestinal Bacterial Overgrowth-Pathophysiology and Its Implications for Definition and Management.
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "The concept of small intestinal bacterial overgrowth (SIBO) arose in the context of maldigestion and malabsorption among patients with obvious risk factors that permitted the small bowel to be colonized by potentially injurious colonic microbiota."
    explanation: Bushyhead and Quigley confirm the pathophysiological framework of SIBO involving colonic microbiota colonizing the small bowel.
