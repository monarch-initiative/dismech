    term:
      id: CHEBI:16412
      label: lipopolysaccharide
  locations:
  - preferred_term: small intestine
    term:
      id: UBERON:0002108
      label: small intestine
  downstream:
  - target: Malabsorption
    description: Mucosal inflammation and barrier dysfunction can impair epithelial digestive and absorptive function.
