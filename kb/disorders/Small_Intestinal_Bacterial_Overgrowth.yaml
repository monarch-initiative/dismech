name: Small Intestinal Bacterial Overgrowth
creation_date: '2025-12-19T01:18:09Z'
category: Complex
disease_term:
  preferred_term: small intestinal bacterial overgrowth
  term:
    id: MONDO:0400000
    label: small intestinal bacterial overgrowth
parents:
- Gastrointestinal disorders
- Dysbiosis syndromes
pathophysiology:
- name: Small-intestinal defense mechanism failure
  description: >
    Loss of endogenous defenses, including gastric acid secretion, intestinal
    motility, ileocecal valve integrity, secretory immunoglobulins, and
    pancreaticobiliary antibacterial activity, permits excessive bacterial
    colonization of the small intestine.
  locations:
  - preferred_term: small intestine
    term:
      id: UBERON:0002108
      label: small intestine
  downstream:
  - target: Bacterial overgrowth in small intestine
    description: Failure of host and anatomic defenses permits expansion or altered composition of small-intestinal bacteria.
  evidence:
  - reference: PMID:20572300
    reference_title: Small intestinal bacterial overgrowth syndrome.
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "defence mechanisms for preventing bacterial overgrowth: gastric acid secretion"
    explanation: Bures et al. identify the endogenous defenses whose disruption predisposes to small-intestinal bacterial overgrowth.
- name: Bacterial overgrowth in small intestine
  description: >
    Increased number or altered composition of bacteria in the small intestine,
    often with colonic-type microbiota in predisposed patients, creates the
    upstream state that drives fermentation, bile acid disruption, inflammation,
    and malabsorption.
  locations:
  - preferred_term: small intestine
    term:
      id: UBERON:0002108
      label: small intestine
  downstream:
  - target: Bacterial carbohydrate fermentation
    description: Overgrown small-intestinal microbes ferment luminal carbohydrates and generate gases and metabolites.
  - target: Bile acid deconjugation and fat malabsorption
    description: Bacterial bile salt hydrolase activity disrupts conjugated bile acids needed for fat absorption.
  - target: LPS-driven mucosal inflammation and barrier dysfunction
    description: Bacterial products from overgrowth stimulate mucosal inflammatory responses and epithelial barrier dysfunction.
  evidence:
  - reference: PMID:38798120
    reference_title: "Critical appraisal of the SIBO hypothesis and breath testing: A clinical practice update endorsed by the European society of neurogastroenterology and motility (ESNM) and the American neurogastroenterology and motility society (ANMS)."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "intestinal stasis, such as surgical alteration of the small bowel or chronic"
    explanation: ESNM/ANMS practice update confirms SIBO is well-established in stasis conditions.
  - reference: PMID:35398346
    reference_title: Small Intestinal Bacterial Overgrowth-Pathophysiology and Its Implications for Definition and Management.
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "The concept of small intestinal bacterial overgrowth (SIBO) arose in the context"
    explanation: Bushyhead and Quigley confirm the pathophysiological framework of SIBO involving colonic microbiota colonizing the small bowel.
- name: Bacterial carbohydrate fermentation
  description: >
    Overgrown small-intestinal microbes ferment carbohydrates to gases and
    short-chain fatty acids, contributing to bloating, distension, discomfort,
    and breath-test hydrogen or methane signals.
  biological_processes:
  - preferred_term: bacterial carbohydrate fermentation
    term:
      id: GO:0006113
      label: fermentation
  locations:
  - preferred_term: small intestine
    term:
      id: UBERON:0002108
      label: small intestine
  downstream:
  - target: Abdominal bloating
    description: Luminal gas and metabolites generated by fermentation contribute to abdominal distension and bloating.
  - target: Abdominal pain
    description: Fermentation-associated distension contributes to abdominal discomfort and pain.
  evidence:
  - reference: PMID:20572300
    reference_title: Small intestinal bacterial overgrowth syndrome.
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "tests are most commonly used for the diagnosis of SIBO using glucose or"
    explanation: Hydrogen and methane breath testing reflects gas production associated with small-intestinal microbial metabolism after carbohydrate substrates.
  - reference: PMID:32679220
    reference_title: "AGA Clinical Practice Update on Small Intestinal Bacterial Overgrowth: Expert Review."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Symptoms traditionally linked to SIBO include"
    explanation: The clinical symptom pattern supports fermentation-associated bloating and discomfort as important consequences of SIBO.
- name: Bile acid deconjugation and fat malabsorption
  description: >
    Bacterial bile salt hydrolase activity deconjugates primary bile acids in
    the small intestine, reducing bile-acid digestive function and contributing
    to fat malabsorption and steatorrhea.
  biological_processes:
  - preferred_term: bile acid deconjugation
    term:
      id: GO:0008206
      label: bile acid metabolic process
  locations:
  - preferred_term: small intestine
    term:
      id: UBERON:0002108
      label: small intestine
  downstream:
  - target: Steatorrhea
    description: Reduced bile-acid function impairs lipid absorption and can produce fatty stools.
  - target: Malabsorption
    description: Impaired bile-acid digestive function contributes to broader nutrient malabsorption.
  evidence:
  - reference: PMID:38727244
    reference_title: Preservation of conjugated primary bile acids by oxygenation of the small intestinal microbiota in vitro.
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: "Bile acid function can be disrupted by the gut microbiota via the"
    explanation: In vitro modeling of human small-intestinal microbiota supports bile acid deconjugation as a mechanism relevant to SIBO-associated malabsorption.
  - reference: PMID:32679220
    reference_title: "AGA Clinical Practice Update on Small Intestinal Bacterial Overgrowth: Expert Review."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Steatorrhea may be seen in"
    explanation: The AGA review links severe SIBO with steatorrhea, the clinical consequence expected from impaired fat absorption.
- name: LPS-driven mucosal inflammation and barrier dysfunction
  description: >
    Bacterial lipopolysaccharide and other microbial products stimulate innate
    immune responses at the enterocyte barrier, including TLR4-dependent
    signaling, mucosal inflammatory cytokines, tight-junction dysfunction, and
    increased intestinal permeability.
  biological_processes:
  - preferred_term: response to lipopolysaccharide
    term:
      id: GO:0032496
      label: response to lipopolysaccharide
  - preferred_term: tight junction assembly
    term:
      id: GO:0070830
      label: bicellular tight junction assembly
    modifier: ABNORMAL
  cell_types:
