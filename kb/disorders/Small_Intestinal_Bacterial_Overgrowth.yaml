treatments:
- name: Antibiotic therapy
  description: Rifaximin is the most studied antibiotic for SIBO eradication, with meta-analytic evidence supporting its efficacy and safety.
  treatment_term:
    preferred_term: antibiotic therapy
    term:
      id: NCIT:C15620
      label: Antibiotic Therapy
    therapeutic_agent:
    - preferred_term: rifaximin
      term:
        id: CHEBI:75246
        label: rifaximin
  evidence:
  - reference: PMID:28078798
    reference_title: "Systematic review with meta-analysis: rifaximin is effective and safe for the treatment of small intestine bacterial overgrowth."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "eradication rate according to intention-to-treat analysis was 70.8% (95% CI"
    explanation: Meta-analysis of 32 studies shows rifaximin achieves approximately 71% SIBO eradication rate.
  - reference: PMID:32679220
    reference_title: "AGA Clinical Practice Update on Small Intestinal Bacterial Overgrowth: Expert Review."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "should focus on the identification and correction (where possible) of underlying"
    explanation: AGA expert review recommends antibiotics as part of SIBO management alongside addressing underlying causes.
- name: Dietary modification
  description: Low-fermentable carbohydrate diets to reduce substrate for bacterial fermentation.
  treatment_term:
    preferred_term: dietary intervention
    term:
      id: MAXO:0000088
      label: dietary intervention
- name: Prokinetic agents
  description: Medications to improve intestinal motility and reduce stasis.
