  - reference: PMID:23201091
    reference_title: Lipopolysaccharide causes an increase in intestinal tight junction permeability in vitro and in vivo by inducing enterocyte membrane expression and localization of TLR-4 and CD14.
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: "increase in intestinal TJ permeability was mediated by an increase in enterocyte"
    explanation: Mechanistic epithelial-barrier evidence supports the LPS-TLR4 link to tight-junction permeability used in the SIBO inflammation node.
