name: Common Variable Immunodeficiency
creation_date: "2026-03-06T00:00:00Z"
updated_date: "2026-03-06T00:00:00Z"
category: Complex
parents:
- Primary Immunodeficiency
- Antibody Deficiency Disorder
disease_term:
  preferred_term: Common Variable Immunodeficiency
  term:
    id: MONDO:0015517
    label: common variable immunodeficiency
description: >-
  Common variable immunodeficiency (CVID) is the most prevalent symptomatic
  primary immunodeficiency, characterized by defective B cell differentiation,
  hypogammaglobulinemia, and failure of antibody production. Patients present
  with recurrent bacterial infections, particularly of the respiratory and
  gastrointestinal tracts, and have increased susceptibility to autoimmune
  manifestations, granulomatous disease, and lymphoproliferative disorders.
  CVID is best understood as an umbrella diagnosis with heterogeneous genetic
  and immunologic etiologies spanning monogenic, digenic, and polygenic models.
pathophysiology:
- name: Defective B Cell Differentiation and Class-Switch Recombination
  description: >-
    The hallmark of CVID is a failure of B cells to differentiate into
    immunoglobulin-secreting plasma cells. Defective class-switch recombination
    leads to impaired production of IgG, IgA, and often IgM. Most patients
    show reduced switched memory B cells (CD27+IgD-IgM-). Defects in B cell
    receptor signaling, BAFF/APRIL axis, and NF-kB signaling all converge
    on impaired germinal center output.
  cell_types:
  - preferred_term: B cell
    term:
      id: CL:0000236
      label: B cell
  - preferred_term: Plasma cell
    term:
      id: CL:0000786
      label: plasma cell
  biological_processes:
  - preferred_term: Immunoglobulin Production
    term:
      id: GO:0002377
      label: immunoglobulin production
  - preferred_term: Isotype Switching
    term:
      id: GO:0045190
      label: isotype switching
  - preferred_term: B Cell Activation
    term:
      id: GO:0042113
      label: B cell activation
  evidence:
  - reference: DOI:10.3390/jcm13061717
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      The pathogenesis of CVID involves complex immunological dysregulation,
      including defects in B cell development, antibody class switching, and
      plasma cell differentiation. These abnormalities contribute to an impaired
      humoral immune response against viral agents, predisposing individuals
      with CVID to a broad range of viral infections.
    explanation: >-
      This 2024 review confirms that CVID pathogenesis centers on defective
      B cell development, class switching, and plasma cell differentiation.
  - reference: PMID:16007086
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      B cells from individuals with TACI mutations expressed TACI but did not
      produce IgG and IgA in response to the TACI ligand APRIL, probably
      reflecting impaired isotype switching.
    explanation: >-
      Demonstrates that TACI mutations in CVID patients lead to impaired
      isotype switching, a key mechanism of defective class-switch recombination.
- name: T Cell Dysregulation
  description: >-
    Many CVID patients exhibit T cell abnormalities including reduced naive
    CD4+ T cells, expanded CD21low B cells, impaired T cell proliferation,
    and skewed T helper cell responses. T follicular helper cell dysfunction
    contributes to impaired germinal center reactions and defective B cell help.
    ICOS deficiency specifically impairs T cell help for late B cell
    differentiation and memory B cell generation.
  cell_types:
  - preferred_term: CD4+ T Cell
    term:
      id: CL:0000624
      label: CD4-positive, alpha-beta T cell
  biological_processes:
  - preferred_term: T Cell Activation
    term:
      id: GO:0042110
      label: T cell activation
  evidence:
  - reference: PMID:12577056
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      we found four of 32 patients to lack ICOS, the "inducible costimulator"
      on activated T cells, due to an inherited homozygous deletion in the ICOS
      gene. T cells from these individuals were normal with regard to subset
      distribution, activation, cytokine production and proliferation. In
      contrast, naive, switched and memory B cells were reduced.
    explanation: >-
      Demonstrates that ICOS deficiency causes CVID through impaired T cell
      costimulation for B cell differentiation, with reduced naive, switched,
      and memory B cells despite normal T cell subsets.
  - reference: DOI:10.1007/s10875-023-01618-0
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Levels of microRNA-34a correlated with 11 proteins such as CXCL9, TNF,
      and IL10, which were predicted to be biologically connected. Moreover,
      there was a negative correlation between mir-34 levels and the number of
      naïve CD4 T cells in CVID.
    explanation: >-
      Demonstrates reduced naive CD4 T cells in CVID correlating with
      inflammatory markers, supporting T cell dysregulation as a key
      pathophysiological feature.
- name: Immune Dysregulation and Autoimmunity
  description: >-
    Approximately 25-50% of CVID patients develop autoimmune complications,
    most commonly autoimmune cytopenias (immune thrombocytopenia and autoimmune
    hemolytic anemia). This reflects a breakdown of peripheral tolerance and
    defective regulatory T cell function, particularly through the CTLA-4/LRBA
    checkpoint axis. Expansion of autoreactive CD21low B cells contributes
    to antibody-mediated autoimmunity.
  cell_types:
  - preferred_term: Regulatory T cell
    term:
      id: CL:0000815
      label: regulatory T cell
  biological_processes:
  - preferred_term: Immune Response
    term:
      id: GO:0006955
      label: immune response
  evidence:
  - reference: PMID:25213377
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      human CTLA4 haploinsufficiency caused dysregulation of FoxP3(+) regulatory
      T (Treg) cells, hyperactivation of effector T cells, and lymphocytic
      infiltration of target organs. Patients also exhibited progressive loss of
      circulating B cells, associated with an increase of predominantly
      autoreactive CD21(lo) B cells and accumulation of B cells in nonlymphoid
      organs.
    explanation: >-
      Shows that CTLA4 haploinsufficiency, found in a subset of CVID patients,
      causes Treg dysfunction, expansion of autoreactive CD21low B cells, and
      immune dysregulation, explaining autoimmune manifestations in CVID.
- name: Granulomatous Disease and GLILD
  description: >-
    CVID-associated granulomatous and lymphocytic interstitial lung disease
    (GLILD) involves poorly organized granulomas with abundant T and B cells.
    Key features include Th1 polarization with elevated IFN-gamma and sIL-2R,
    B cell abnormalities with elevated BAFF and CD21low B cells, and innate
    immune alterations including M2 macrophage skewing and neutrophil
    dysregulation.
  cell_types:
  - preferred_term: B cell
    term:
      id: CL:0000236
      label: B cell
  - preferred_term: Macrophage
    term:
      id: CL:0000235
      label: macrophage
  biological_processes:
  - preferred_term: Inflammatory Response
    term:
      id: GO:0006954
      label: inflammatory response
  evidence:
  - reference: DOI:10.1097/aci.0000000000001032
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Histological analysis shows that T and B cells are abundantly present in
      the granulomas that are less well organized and are frequently associated
      with lymphoid hyperplasia. Increased presence of activation markers such
      as soluble IL-2 receptor (sIL-2R) and IFN-ɣ, suggest increased
      Th1-cell activity. Moreover, B-cell abnormalities are prominent in CVID,
      with elevated IgM, BAFF, and CD21low B cells correlating with
      granulomatous disease progression.
    explanation: >-
      This 2024 review describes the immunopathology of CVID-associated
      granulomatous disease, demonstrating T and B cell involvement, Th1
      polarization, and BAFF/CD21low B cell expansion.
