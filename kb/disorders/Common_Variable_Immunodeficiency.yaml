genetic:
- name: TNFRSF13B (TACI) Mutations
  association: PREDISPOSING
  evidence:
  - reference: PMID:16007086
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      We found that 4 of 19 unrelated individuals with common variable
      immunodeficiency (CVID) and 1 of 16 individuals with IgA deficiency
      (IgAD) had a missense mutation in one allele of TNFRSF13B (encoding
      TACI).
    explanation: >-
      Landmark study identifying TACI mutations in approximately 20% of
      CVID patients studied, establishing TACI as a risk factor for CVID.
- name: ICOS Deficiency
  association: CAUSATIVE
  evidence:
  - reference: PMID:12577056
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      we found four of 32 patients to lack ICOS, the "inducible costimulator"
      on activated T cells, due to an inherited homozygous deletion in the ICOS
      gene.
    explanation: >-
      First identification of ICOS deficiency as a monogenic cause of CVID,
      demonstrating homozygous ICOS deletion in affected patients.
- name: NFKB1 Haploinsufficiency
  association: CAUSATIVE
  evidence:
  - reference: PMID:26279205
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      we conclude that the CVID phenotype in these families is caused by
      NF-κB1 p50 haploinsufficiency.
    explanation: >-
      Identifies NFKB1 haploinsufficiency as a cause of CVID through
      degradation of the altered protein with loss of p50 transcription factor.
  - reference: PMID:29477724
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Loss-of-function nuclear factor κB subunit 1 (NFKB1) variants are the
      most common monogenic cause of common variable immunodeficiency in
      Europeans.
    explanation: >-
      Large-scale study confirming NFKB1 as the most common monogenic cause
      of CVID in European populations.
- name: CTLA4 Haploinsufficiency
  association: CAUSATIVE
  evidence:
  - reference: PMID:25213377
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      We identified germline heterozygous mutations in CTLA4 in subjects with
      severe immune dysregulation from four unrelated families.
    explanation: >-
      Identifies CTLA4 haploinsufficiency as a cause of CVID-like immune
      dysregulation with hypogammaglobulinemia, autoimmune cytopenias, and
      lymphocytic organ infiltration.
- name: BAFF-R (TNFRSF13C) Mutations
  association: CAUSATIVE
treatments:
- name: Immunoglobulin Replacement Therapy
  description: >-
    Lifelong intravenous (IVIG) or subcutaneous (SCIG) immunoglobulin
    replacement is the cornerstone of CVID treatment, reducing the frequency
    and severity of infections.
  treatment_term:
    preferred_term: immunoglobulin replacement therapy
    term:
      id: MAXO:0000058
      label: pharmacotherapy
  evidence:
  - reference: DOI:10.3390/jcm13061717
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      It assesses the efficacy of prophylactic measures for COVID-19, including
      vaccination and immunoglobulin replacement therapy, as well as trialled
      therapies.
    explanation: >-
      Confirms immunoglobulin replacement therapy as a standard treatment
      modality for CVID patients.
- name: Antibiotic Prophylaxis and Treatment
  description: >-
    Prophylactic and therapeutic antibiotics are used to manage recurrent
    bacterial infections, particularly sinopulmonary infections.
  treatment_term:
    preferred_term: antibiotic therapy
    term:
      id: MAXO:0000058
      label: pharmacotherapy
- name: Immunosuppressive Therapy for Autoimmune Complications
  description: >-
    Corticosteroids, rituximab, and other immunosuppressants are used
    to manage autoimmune cytopenias and granulomatous disease. Treatment
    selection is increasingly aligned to biological mechanisms: rituximab
    for B cell hyperplasia, abatacept for CTLA-4/LRBA biology, and
    sirolimus for mTOR/Th1 programs.
  treatment_term:
    preferred_term: immunosuppressive therapy
    term:
      id: MAXO:0000058
      label: pharmacotherapy
  evidence:
  - reference: DOI:10.1097/aci.0000000000001032
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Therapeutic regimens include glucocorticoids, DMARDs, and biologicals
      like rituximab.
    explanation: >-
      Confirms the use of glucocorticoids, DMARDs, and rituximab for
      granulomatous disease in CVID.
