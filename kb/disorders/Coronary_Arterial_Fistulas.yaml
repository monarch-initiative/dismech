name: Coronary Arterial Fistulas
creation_date: "2026-05-05T11:41:54Z"
updated_date: "2026-05-05T11:41:54Z"
description: >-
  Coronary arterial fistulas are abnormal communications between one or more
  coronary arteries and a cardiac chamber, great vessel, or other vascular
  structure. They can be congenital or acquired and may create coronary steal,
  cardiac chamber enlargement, ischemia, arrhythmia, myocardial infarction, or
  congestive heart failure depending on fistula size and drainage site.
category: Congenital
disease_term:
  preferred_term: coronary arterial fistulas
  term:
    id: MONDO:0016081
    label: coronary arterial fistulas
parents:
- Vascular disorder
synonyms:
- Coronaro-cardiac fistula
- Coronary arterial malformations
pathophysiology:
- name: Abnormal coronary artery-to-chamber or vessel shunt
  description: >-
    Developmental or acquired disruption of coronary vascular anatomy creates a
    persistent communication from a coronary artery to a cardiac chamber, great
    vessel, or other structure, bypassing the myocardial capillary bed.
  cell_types:
  - preferred_term: endothelial cell
    term:
      id: CL:0000115
      label: endothelial cell
  - preferred_term: vascular smooth muscle cell
    term:
      id: CL:0000359
      label: vascular associated smooth muscle cell
  biological_processes:
  - preferred_term: vasculature development
    modifier: ABNORMAL
    term:
      id: GO:0001944
      label: vasculature development
  downstream:
  - target: Coronary runoff and hemodynamic complications
    description: The fistulous low-resistance connection diverts blood away from the myocardial capillary network and can impose volume load on the drainage site.
  evidence:
  - reference: PMID:16125261
    reference_title: "Coronary artery fistulas: clinical and therapeutic considerations."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      These fistulas are congenital or acquired coronary artery abnormalities in which blood is shunted into a cardiac chamber, great vessel, or other structure, bypassing the myocardial capillary network.
    explanation: This clinical review defines the core abnormal coronary shunt and its bypass of the myocardial capillary bed.
- name: Coronary runoff and hemodynamic complications
  description: >-
    Medium or large fistulas can enlarge and produce coronary steal, distal
    myocardial ischemia, chamber enlargement, arrhythmia, myocardial infarction,
    or congestive heart failure.
  evidence:
  - reference: PMID:34238550
    reference_title: "Coronary Artery Fistulas: Indications, Techniques, Outcomes, and Complications of Transcatheter Fistula Closure."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Small CAFs are generally asymptomatic and can close over time, while some untreated medium or large CAFs can enlarge, leading to clinical sequelae such as cardiac chamber enlargement or myocardial ischemia.
    explanation: This supports the size-dependent progression from CAF anatomy to chamber enlargement and myocardial ischemia.
