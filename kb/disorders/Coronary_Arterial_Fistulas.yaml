treatments:
- name: Transcatheter fistula closure
  description: >-
    Percutaneous transcatheter closure is used increasingly for suitable CAF
    anatomy, while balancing risks such as myocardial infarction, device
    embolization, and recanalization.
  treatment_term:
    preferred_term: surgical procedure
    term:
      id: MAXO:0000004
      label: surgical procedure
  evidence:
  - reference: PMID:34238550
    reference_title: "Coronary Artery Fistulas: Indications, Techniques, Outcomes, and Complications of Transcatheter Fistula Closure."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      With the advancement of transcatheter equipment and techniques, CAFs have been increasingly closed using a percutaneous approach.
    explanation: This supports transcatheter closure as a contemporary CAF intervention.
- name: Surgical correction or transcatheter embolization for at-risk fistulas
  description: >-
    Symptomatic patients and selected asymptomatic patients at risk for future
    complications may undergo closure by surgical correction or transcatheter
    embolization.
  treatment_term:
    preferred_term: surgical procedure
    term:
      id: MAXO:0000004
      label: surgical procedure
  evidence:
  - reference: PMID:16125261
    reference_title: "Coronary artery fistulas: clinical and therapeutic considerations."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Treatment is advocated for symptomatic patients and for those asymptomatic patients who are at risk for future complications.
    explanation: This supports intervention in symptomatic or high-risk asymptomatic patients.
