genetic:
- name: SOST Mutations
  association: Causative
  notes: >
    Homozygous loss-of-function mutations in SOST on chromosome 17q12-q21.
    Two nonsense mutations and one splice site mutation identified. Affected
    Afrikaners carry a nonsense mutation near the amino terminus; an unrelated
    person of Senegalese origin carries a splicing mutation in the single
    intron. No SOST mutations found in Van Buchem disease patients, who
    instead have a 52-kb regulatory deletion downstream.
  evidence:
  - reference: PMID:11181578
    reference_title: "Increased bone density in sclerosteosis is due to the deficiency of a novel secreted protein (SOST)."
    supports: SUPPORT
    snippet: "Two nonsense mutations and one splice site mutation were identified in sclerosteosis patients"
    explanation: "Identifies the three types of SOST mutations in sclerosteosis."
  - reference: PMID:11179006
    reference_title: "Bone dysplasia sclerosteosis results from loss of the SOST gene product, a novel cystine knot-containing protein."
    supports: SUPPORT
    snippet: "Affected Afrikaners carry a nonsense mutation near the amino terminus of the encoded protein, whereas an unrelated affected person of Senegalese origin carries a splicing mutation within the single intron of the gene"
    explanation: "Details the specific mutations in Afrikaner and Senegalese patients."
diagnosis:
- name: Clinical, Radiographic, and Molecular Diagnosis
  description: >-
    Sclerosteosis is diagnosed from generalized progressive bone overgrowth
    with tall stature, facial features of cranial sclerosis, syndactyly, and
    raised intracranial pressure / cranial nerve palsies from skull
    thickening, and is confirmed by identification of biallelic
    loss-of-function SOST variants on molecular genetic testing.
  diagnosis_term:
    preferred_term: molecular genetic testing
    term:
      id: MAXO:0000533
      label: molecular genetic testing
  evidence:
  - reference: PMID:11181578
    reference_title: "Increased bone density in sclerosteosis is due to the deficiency of a novel secreted protein (SOST)."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Sclerosteosis is a progressive sclerosing bone dysplasia with an autosomal recessive mode of inheritance"
    explanation: >-
      Defines sclerosteosis as a recessive progressive sclerosing bone dysplasia, the clinical/radiographic basis of diagnosis.
  - reference: PMID:11181578
    reference_title: "Increased bone density in sclerosteosis is due to the deficiency of a novel secreted protein (SOST)."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "the three disease-causing mutations lead to loss of function of the SOST protein resulting in the formation of massive amounts of normal bone throughout life, the physiological role of SOST is most likely the suppression of bone formation"
    explanation: >-
      Supports SOST loss-of-function molecular testing as the basis of confirmation.
