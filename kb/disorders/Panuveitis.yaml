      id: GO:0030595
      label: leukocyte chemotaxis
  downstream:
  - target: Macular edema
    description: Cellular infiltration and inflammatory exudation can promote macular edema and other posterior-segment complications.
    causal_link_type: DIRECT
  evidence:
