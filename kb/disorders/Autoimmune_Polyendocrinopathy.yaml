    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "The classic triad of APS-1 includes chronic candidiasis of the skin and mucous membranes, adrenal insufficiency, and hypoparathyroidism."
    explanation: Confirms chronic mucocutaneous candidiasis as part of the classic APS-1 triad.
- name: Vitiligo
  description: >
    Autoimmune destruction of melanocytes causing depigmented skin patches.
