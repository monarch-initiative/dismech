genetic:
- name: AIRE
  gene_term:
    preferred_term: AIRE
    term:
      id: hgnc:360
      label: AIRE
  association: Causal
  subtype: Type 1
  inheritance:
  - name: Autosomal Recessive
    inheritance_term:
      preferred_term: Autosomal recessive inheritance
      term:
        id: HP:0000007
        label: Autosomal recessive inheritance
  notes: >
    Loss-of-function mutations in the AIRE (autoimmune regulator) gene on
    chromosome 21q22.3 cause APS type 1. AIRE encodes a transcription factor
    essential for promiscuous gene expression in medullary thymic epithelial
    cells. Over 100 pathogenic variants have been identified.
  evidence:
  - reference: PMID:35690244
    reference_title: "Autoimmune polyendocrine syndrome type 1: Clinical manifestations, pathogenetic features, and management approach."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Autoimmune polyendocrine syndrome type 1 (APS-1) is an autosomal recessive hereditary pathology that develops with endocrine and non-endocrine manifestations in childhood."
    explanation: Confirms autosomal recessive inheritance of APS-1.
  - reference: PMID:35690244
    reference_title: "Autoimmune polyendocrine syndrome type 1: Clinical manifestations, pathogenetic features, and management approach."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "APS-1 occurs because of mutations in the autoimmune regulator (AIRE) gene, leading to a disrupted mechanism of normal antigen expression, the formation of abnormal clones of immune cells, and autoimmune damage to various organs. Analysis of the AIRE gene is the main diagnostic method for early detection of APS-1"
    explanation: Confirms AIRE gene mutations as the cause of APS-1 and the role of genetic testing in diagnosis.
