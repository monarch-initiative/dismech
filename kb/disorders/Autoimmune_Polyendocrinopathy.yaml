    evidence_source: HUMAN_CLINICAL
    snippet: "the diagnostic objective is to detect APD at an early stage, with the advantage of less frequent complications, effective therapy and better prognosis. This requires that patients at risk be regularly screened for subclinical endocrinopathies prior to clinical manifestation."
    explanation: Supports regular autoantibody screening for early detection and improved outcomes.
  - reference: PMID:31606344
