treatments:
- name: Hormone Replacement Therapy
  description: >
    Lifelong replacement of deficient hormones is the mainstay of treatment.
    Includes hydrocortisone for adrenal insufficiency, levothyroxine for
    hypothyroidism, insulin for type 1 diabetes, calcium and vitamin D for
    hypoparathyroidism, and sex hormones for hypogonadism.
  treatment_term:
    preferred_term: hormone replacement therapy
    term:
      id: MAXO:0000283
      label: hormone modifying therapy
  notes: >
    Lifelong hormone replacement is universally recommended for APS and is
    considered standard of care. Specific agents are tailored to each deficient
    gland.
- name: Adrenal Hormone Replacement
  description: >
    Glucocorticoid and mineralocorticoid replacement for autoimmune adrenal
    insufficiency. Hydrocortisone is the standard glucocorticoid replacement,
    with fludrocortisone for mineralocorticoid replacement.
  treatment_term:
    preferred_term: adrenal hormone replacement therapy
    term:
      id: MAXO:0001391
      label: adrenal hormone replacement therapy
- name: Thyroid Hormone Therapy
  description: >
    Levothyroxine replacement for autoimmune hypothyroidism (Hashimoto
    thyroiditis). Dose titrated to normalize TSH levels.
  treatment_term:
    preferred_term: thyroid hormone therapy
    term:
      id: MAXO:0001474
      label: thyroid hormone therapy
- name: Immunosuppressive Therapy
  description: >
    Used for severe or refractory autoimmune manifestations, particularly
    autoimmune hepatitis, interstitial lung disease, or tubulointerstitial
    nephritis in APS type 1.
  treatment_term:
    preferred_term: pharmacotherapy
    term:
      id: MAXO:0000058
      label: pharmacotherapy
    therapeutic_agent:
    - preferred_term: corticosteroid
      term:
        id: CHEBI:50858
        label: corticosteroid
- name: Antifungal Therapy
  description: >
    Treatment of chronic mucocutaneous candidiasis in APS type 1 with systemic
    or topical antifungal agents such as fluconazole.
  treatment_term:
    preferred_term: pharmacotherapy
