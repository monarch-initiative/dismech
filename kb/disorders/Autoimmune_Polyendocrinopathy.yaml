    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Considering the high incidence of one or more endocrinopathies in first-degree relatives of patients with APD, family members should be regularly screened since they may also develop autoimmune endocrinopathies."
