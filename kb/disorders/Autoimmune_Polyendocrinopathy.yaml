name: Autoimmune Polyendocrinopathy
creation_date: "2026-05-12T18:00:00Z"
category: Complex
synonyms:
- Autoimmune polyendocrine syndrome
- APS
- Polyglandular autoimmune syndrome
- Autoimmune polyglandular disease
description: >
  Autoimmune polyendocrinopathy encompasses a group of disorders characterized by
  autoimmune-mediated destruction of multiple endocrine glands, often in
  combination with non-endocrine autoimmune manifestations. The syndromes are
  classified into four types based on component diseases and genetic etiology.
  Type 1 (APECED) is a monogenic autosomal recessive disorder caused by AIRE
  gene mutations affecting central immune tolerance. Types 2-4 are polygenic,
  HLA-associated conditions with complex inheritance. Type 2 (Schmidt syndrome)
  features adrenal insufficiency with autoimmune thyroid disease and/or type 1
  diabetes. Type 3 involves autoimmune thyroid disease with other autoimmune
  conditions excluding adrenal insufficiency and hypoparathyroidism. Type 4 comprises combinations not
  fitting types 1-3. Shared pathogenic mechanisms include loss of immune
  tolerance to endocrine self-antigens, T cell-mediated organ destruction, and
  autoantibody production against tissue-specific antigens.
disease_term:
  preferred_term: autoimmune polyendocrinopathy
  term:
    id: MONDO:0017278
    label: autoimmune polyendocrinopathy
parents:
- Autoimmune disorder of endocrine system
- Polyendocrinopathy
has_subtypes:
- name: Type 1
  display_name: Type 1 (APECED)
  description: >
    Autoimmune polyendocrine syndrome type 1, also known as APECED
    (autoimmune polyendocrinopathy-candidiasis-ectodermal dystrophy). Monogenic
    autosomal recessive disorder caused by AIRE gene mutations. Classic triad of
    chronic mucocutaneous candidiasis, hypoparathyroidism, and adrenal
    insufficiency. Highest prevalence in genetically isolated populations.
  subtype_term:
    preferred_term: autoimmune polyendocrine syndrome type 1
    term:
      id: MONDO:0009411
      label: autoimmune polyendocrine syndrome type 1
  evidence:
  - reference: PMID:33958142
    reference_title: "Autoinmune polyendocrinopathy."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "APS type 1 presents with hypoparathyroidism, mucocutaneous candidiasis and Addison's disease. It is caused by AutoImmune Regulator (AIRE) gene mutation."
    explanation: Defines the clinical triad and genetic cause of APS type 1.
- name: Type 2
  display_name: Type 2 (Schmidt Syndrome)
  description: >
    Autoimmune polyendocrinopathy type 2, also known as Schmidt syndrome. The
    most common form of APS. Defined by adrenal insufficiency (Addison disease)
    with autoimmune thyroid disease and/or type 1 diabetes mellitus. Polygenic
    with strong HLA associations (HLA-DR3, HLA-DR4).
  subtype_term:
    preferred_term: autoimmune polyendocrinopathy type 2
    term:
      id: MONDO:0010012
      label: autoimmune polyendocrinopathy type 2
  evidence:
  - reference: PMID:33958142
    reference_title: "Autoinmune polyendocrinopathy."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "SPA type 2 presents with Addison's disease, type 1 diabetes, or autoimmune thyroid disease. Multiple genes have been implicated, including those of the class II major histocompatibility complex."
    explanation: Defines the component diseases and genetic basis of APS type 2.
- name: Type 3
  display_name: Type 3
  description: >
    Autoimmune polyendocrinopathy type 3. Characterized by autoimmune thyroid
    disease combined with other autoimmune conditions (type 1 diabetes, pernicious
    anemia, vitiligo, alopecia) but without adrenal insufficiency or
    hypoparathyroidism.
  subtype_term:
    preferred_term: autoimmune polyendocrinopathy type 3
    term:
      id: MONDO:0016422
      label: autoimmune polyendocrinopathy type 3
  evidence:
  - reference: PMID:33958142
    reference_title: "Autoinmune polyendocrinopathy."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "SPA type 3 is characterized by autoimmune thyroid disease and other autoimmune disease, excluding Addison's disease and hypoparathyroidism, 4 genes have been implicated and confer susceptibility."
    explanation: Defines APS type 3 by its inclusion/exclusion criteria and polygenic basis.
- name: Type 4
  display_name: Type 4
  description: >
    Autoimmune polyendocrinopathy type 4. Combinations of autoimmune endocrine
    diseases that do not fit the criteria for types 1, 2, or 3.
  subtype_term:
    preferred_term: autoimmune polyendocrinopathy type 4
    term:
      id: MONDO:0016423
      label: autoimmune polyendocrinopathy type 4
  evidence:
  - reference: PMID:12050123
    reference_title: "Autoimmune adrenal insufficiency and autoimmune polyendocrine syndromes: autoantibodies, autoantigens, and their applicability in diagnosis and disease prediction."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Autoimmune AD presented in four forms: as APS type 1 (13% of the patients), APS type 2 (41%), APS type 4 (5%), and isolated AD (41%)."
    explanation: Confirms APS type 4 as a recognized classification distinct from types 1-3, representing 5% of autoimmune Addison cases.
pathophysiology:
- name: AIRE-Mediated Central Tolerance Failure
  description: >
    In APS type 1, mutations in the AIRE gene impair thymic expression of
    tissue-restricted self-antigens in medullary thymic epithelial cells,
    leading to failure of negative selection and escape of autoreactive T cells
    into the periphery. AIRE controls the broad spectrum of self-antigens
    presented to developing thymocytes, and its deficiency results in
    multi-organ autoimmune destruction.
  cell_types:
  - preferred_term: medullary thymic epithelial cell
    term:
      id: CL:0002365
      label: medullary thymic epithelial cell
  biological_processes:
  - preferred_term: central T cell tolerance induction
    term:
      id: GO:0002512
      label: central T cell tolerance induction
    modifier: DECREASED
  - preferred_term: negative thymic T cell selection
    term:
      id: GO:0043383
      label: negative T cell selection
    modifier: DECREASED
  downstream:
  - target: T Cell-Mediated Organ Destruction
    description: Failed central tolerance allows autoreactive T cells to escape and attack endocrine organs.
  evidence:
  - reference: PMID:33729987
    reference_title: "AIRE deficiency, from preclinical models to human APECED disease."
    supports: SUPPORT
    evidence_source: MODEL_ORGANISM
    snippet: "Autoimmune polyendocrinopathy candidiasis ectodermal dystrophy (APECED) is a rare life-threatening autoimmune disease that attacks multiple organs and has its onset in childhood. It is an inherited condition caused by a variety of mutations in the autoimmune regulator (AIRE) gene that encodes a protein whose function has been uncovered by the generation and study of Aire-KO mice. These provided invaluable insights into the link between AIRE expression in medullary thymic epithelial cells (mTECs), and the broad spectrum of self-antigens that these cells express and present to the developing thymocytes."
    explanation: Demonstrates AIRE function in mTECs for self-antigen expression and thymocyte education, with AIRE deficiency causing autoimmune disease.
  - reference: PMID:35690244
    reference_title: "Autoimmune polyendocrine syndrome type 1: Clinical manifestations, pathogenetic features, and management approach."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "APS-1 occurs because of mutations in the autoimmune regulator (AIRE) gene, leading to a disrupted mechanism of normal antigen expression, the formation of abnormal clones of immune cells, and autoimmune damage to various organs."
    explanation: Confirms that AIRE mutations disrupt antigen expression and lead to autoreactive immune cell formation.
- name: HLA-Associated Susceptibility to Tolerance Breakdown
  description: >
    In APS types 2-4, HLA class II susceptibility alleles (particularly
    HLA-DR3/DRB1*0301 and HLA-DR4/DRB1*0401) alter peptide presentation by
    antigen-presenting cells, predisposing to breakdown of peripheral tolerance
    against endocrine self-antigens. Additional susceptibility genes (CTLA4,
    PTPN22) further impair T cell regulation, but environmental triggers are
    also required since identical twins show incomplete concordance.
  cell_types:
  - preferred_term: professional antigen presenting cell
    term:
      id: CL:0000145
      label: professional antigen presenting cell
  biological_processes:
  - preferred_term: antigen processing and presentation via MHC class II
    term:
      id: GO:0002495
      label: antigen processing and presentation of peptide antigen via MHC class II
  - preferred_term: peripheral T cell tolerance induction
    term:
      id: GO:0002458
      label: peripheral T cell tolerance induction
    modifier: DECREASED
  downstream:
  - target: Autoantibody-Mediated Endocrine Destruction
    description: HLA-mediated susceptibility enables autoreactive B cell activation and autoantibody production.
  - target: T Cell-Mediated Organ Destruction
    description: Altered HLA peptide presentation promotes autoreactive T cell responses against endocrine antigens.
  evidence:
  - reference: PMID:23159534
    reference_title: "Polyglandular autoimmune syndrome type II."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "The nature of PAS has been based on the presence of lymphocyte infiltration in the affected gland, organ-specific antibodies in the serum, cellular immune defects and an association with the human leucocyte antigen (HLA) DR/DQ genes or immune response genes."
    explanation: Confirms HLA gene associations as a defining feature of the polygenic APS types.
  - reference: PMID:23159534
    reference_title: "Polyglandular autoimmune syndrome type II."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Genetic susceptibility is necessary but not sufficient to produce the disorder. This is illustrated by the lack of 100% concordance of disease in identical twins."
    explanation: Demonstrates that genetic susceptibility alone is insufficient, requiring environmental triggers.
  - reference: PMID:33958142
    reference_title: "Autoinmune polyendocrinopathy."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "SPA type 2 presents with Addison's disease, type 1 diabetes, or autoimmune thyroid disease. Multiple genes have been implicated, including those of the class II major histocompatibility complex."
    explanation: Confirms MHC class II gene involvement in APS type 2 susceptibility.
- name: Autoantibody-Mediated Endocrine Destruction
  description: >
    Organ-specific autoantibodies target endocrine gland antigens, contributing
    to gland destruction. Key autoantibodies include anti-21-hydroxylase
    (adrenal), anti-GAD65 and anti-IA2 (pancreatic islets), anti-TPO and
    anti-thyroglobulin (thyroid), and anti-IFN-omega and anti-IL-22 (APS-1
    specific cytokine antibodies). These autoantibodies serve as diagnostic
    markers and may directly contribute to tissue damage.
  biological_processes:
  - preferred_term: B cell activation
    term:
      id: GO:0042113
      label: B cell activation
    modifier: INCREASED
  - preferred_term: complement activation, classical pathway
    term:
      id: GO:0006958
      label: complement activation, classical pathway
    modifier: INCREASED
  evidence:
  - reference: PMID:12050123
    reference_title: "Autoimmune adrenal insufficiency and autoimmune polyendocrine syndromes: autoantibodies, autoantigens, and their applicability in diagnosis and disease prediction."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "At the onset, all patients with autoimmune AD (100%) had detectable adrenal cortex and/or steroid 21-hydroxylase autoantibodies. In the course of natural history of autoimmune AD, the presence of adrenal cortex and/or steroid 21-hydroxylase autoantibodies identified patients at risk to develop AD."
    explanation: Demonstrates 100% prevalence of adrenal autoantibodies at disease onset and their predictive value for disease progression.
  - reference: PMID:23159534
    reference_title: "Polyglandular autoimmune syndrome type II."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Autoantibodies to the various endocrine and non-endocrine tissues not only offer a diagnostic clue to the autoimmune nature of diseases but also can be used to identify asymptomatic individuals who are at risk of developing other component diseases of the syndrome."
    explanation: Confirms the dual diagnostic and predictive role of organ-specific autoantibodies in APS.
- name: T Cell-Mediated Organ Destruction
  description: >
    Autoreactive CD4+ and CD8+ T cells infiltrate endocrine glands, leading to
    progressive tissue destruction. CD8+ cytotoxic T cells directly kill
    endocrine cells targeting antigens such as 21-hydroxylase, while CD4+ T
    helper cells provide help for B cell autoantibody production and secrete
    pro-inflammatory cytokines. Regulatory T cell dysfunction further
    contributes to loss of peripheral tolerance.
  cell_types:
  - preferred_term: CD8-positive cytotoxic T cell
    term:
      id: CL:0000794
      label: CD8-positive, alpha-beta cytotoxic T cell
  - preferred_term: CD4-positive helper T cell
    term:
      id: CL:0000492
      label: CD4-positive helper T cell
  - preferred_term: regulatory T cell
    term:
      id: CL:0000815
      label: regulatory T cell
  biological_processes:
  - preferred_term: T cell-mediated cytotoxicity
    term:
      id: GO:0001913
      label: T cell mediated cytotoxicity
    modifier: INCREASED
  evidence:
  - reference: PMID:20685079
    reference_title: "21-Hydroxylase epitopes are targeted by CD8 T cells in autoimmune Addison's disease."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "IFNγ ELISPOT responses against these peptides were stronger, broader and more prevalent among patients than in controls, whatever the disease presentation. Five peptides elicited T-cell responses in patients only (68% sensitivity, 100% specificity). Blocking experiments identified IFNγ-producing cells as CD8 T lymphocytes"
    explanation: Demonstrates that CD8 T cells targeting 21-hydroxylase epitopes are specific effectors in autoimmune adrenal destruction across APS subtypes.
  - reference: PMID:34526996
    reference_title: "Transcriptional Changes in Regulatory T Cells From Patients With Autoimmune Polyendocrine Syndrome Type 1 Suggest Functional Impairment of Lipid Metabolism and Gut Homing."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "AIRE facilitates the expression of organ-specific transcripts in the thymus, which is essential for efficient removal of dangerous self-reacting T cells and for inducing regulatory T cells (Tregs). Although reduced numbers and function of Tregs have been reported in APS-I patients, the impact of AIRE deficiency on gene expression in these cells is unknown."
    explanation: Confirms regulatory T cell impairment in APS-1 patients as a contributing factor to autoimmune pathogenesis.
phenotypes:
- name: Adrenal Insufficiency
  description: >
    Autoimmune destruction of the adrenal cortex leading to primary adrenal
    insufficiency (Addison disease). Present in APS types 1, 2, and 4. Manifests
    as fatigue, hypotension, hyperpigmentation, and electrolyte abnormalities.
  frequency: FREQUENT
  phenotype_term:
    preferred_term: Adrenal insufficiency
    term:
      id: HP:0000846
      label: Adrenal insufficiency
  evidence:
  - reference: PMID:12050123
    reference_title: "Autoimmune adrenal insufficiency and autoimmune polyendocrine syndromes: autoantibodies, autoantigens, and their applicability in diagnosis and disease prediction."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Autoimmune AD presented in four forms: as APS type 1 (13% of the patients), APS type 2 (41%), APS type 4 (5%), and isolated AD (41%)."
    explanation: Quantifies the distribution of autoimmune Addison disease across APS subtypes, confirming it as a major component of APS types 1, 2, and 4.
- name: Hashimoto Thyroiditis
  description: >
    Autoimmune thyroiditis leading to hypothyroidism. Central feature of
    APS types 2 and 3. The most common autoimmune thyroid manifestation.
    Graves disease (hyperthyroidism) may also occur but is less frequent.
  frequency: FREQUENT
  phenotype_term:
    preferred_term: Hashimoto thyroiditis
    term:
      id: HP:0000872
      label: Hashimoto thyroiditis
  evidence:
  - reference: PMID:33958142
    reference_title: "Autoinmune polyendocrinopathy."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "SPA type 3 is characterized by autoimmune thyroid disease and other autoimmune disease, excluding Addison's disease and hypoparathyroidism"
    explanation: Confirms autoimmune thyroid disease as the defining feature of APS type 3.
- name: Type 1 Diabetes Mellitus
  description: >
    Autoimmune destruction of pancreatic beta cells leading to insulin-dependent
    diabetes. Occurs in APS types 1, 2, and 3.
  frequency: FREQUENT
  phenotype_term:
    preferred_term: Type 1 diabetes mellitus
    term:
      id: HP:0100651
      label: Type I diabetes mellitus
  evidence:
  - reference: PMID:33958142
    reference_title: "Autoinmune polyendocrinopathy."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "SPA type 2 presents with Addison's disease, type 1 diabetes, or autoimmune thyroid disease."
    explanation: Confirms type 1 diabetes as a component of APS type 2.
- name: Hypoparathyroidism
  description: >
    Autoimmune destruction of parathyroid glands causing hypocalcemia. Most
    characteristic of APS type 1, where it is often the first endocrine
    manifestation.
  frequency: FREQUENT
  subtype: Type 1
  phenotype_term:
    preferred_term: Hypoparathyroidism
    term:
      id: HP:0000829
      label: Hypoparathyroidism
  evidence:
  - reference: PMID:35690244
    reference_title: "Autoimmune polyendocrine syndrome type 1: Clinical manifestations, pathogenetic features, and management approach."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "The classic triad of APS-1 includes chronic candidiasis of the skin and mucous membranes, adrenal insufficiency, and hypoparathyroidism."
    explanation: Confirms hypoparathyroidism as part of the classic APS-1 triad.
- name: Chronic Mucocutaneous Candidiasis
  description: >
    Persistent or recurrent candidal infections of skin, nails, and mucous
    membranes. Hallmark of APS type 1, typically the earliest manifestation.
    Related to autoantibodies against IL-17A, IL-17F, and IL-22.
  frequency: VERY_FREQUENT
  subtype: Type 1
  phenotype_term:
    preferred_term: Chronic mucocutaneous candidiasis
    term:
      id: HP:0002728
      label: Chronic mucocutaneous candidiasis
  evidence:
  - reference: PMID:35690244
