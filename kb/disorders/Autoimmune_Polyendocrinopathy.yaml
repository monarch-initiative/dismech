- name: Autoantibody Screening
  description: >
    Regular screening for organ-specific autoantibodies to detect new
    autoimmune components before clinical disease develops. Enables early
    intervention and hormone replacement. Patients at risk should be regularly
    screened for subclinical endocrinopathies prior to clinical manifestation.
  treatment_term:
    preferred_term: disease screening
    term:
      id: MAXO:0000124
      label: disease screening
