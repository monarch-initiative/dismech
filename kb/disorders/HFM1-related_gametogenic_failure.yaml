    supports: SUPPORT
    evidence_source: MODEL_ORGANISM
    snippet: >-
      Hfm1 mutant female mice displayed infertility or subfertility with oogenesis
      variously affected.
    explanation: >-
      Mouse models demonstrate germ-cell failure in both sexes on HFM1 loss,
