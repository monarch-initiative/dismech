name: NARP syndrome
creation_date: '2026-04-13T04:00:00Z'
updated_date: '2026-04-13T17:20:00Z'
description: >-
  NARP syndrome is a maternally inherited mitochondrial disease caused most
  often by pathogenic MT-ATP6 variants. The syndrome is characterized by
  impaired oxidative phosphorylation with prominent neurologic and retinal
  vulnerability, classically manifesting with neuropathy, ataxia, and retinitis
  pigmentosa. Clinical severity varies with heteroplasmy and may overlap with
  Leigh syndrome.
category: Mendelian
parents:
- hereditary disease
- mitochondrial disease
disease_term:
  preferred_term: NARP syndrome
  term:
    id: MONDO:0010794
    label: NARP syndrome
pathophysiology:
- name: MT-ATP6 ATP synthase dysfunction
  description: >-
    Pathogenic MT-ATP6 variants impair the proton-translocating membrane sector
    of mitochondrial ATP synthase.
  genes:
  - preferred_term: MT-ATP6
    term:
      id: hgnc:7414
      label: MT-ATP6
  downstream:
  - target: Reduced mitochondrial ATP production
    description: Defective ATP synthase coupling decreases efficient ATP generation.
- name: Reduced mitochondrial ATP production
  description: >-
    Inefficient oxidative phosphorylation limits ATP availability in tissues
    with high metabolic demand.
  downstream:
  - target: Neuroretinal energy failure
    description: Neurons, peripheral nerves, and retinal cells are especially vulnerable.
- name: Neuroretinal energy failure
  description: >-
    Energy failure in the nervous system and retina drives the core neurologic
    and ophthalmologic phenotype.
  downstream:
  - target: Ataxia
    description: Cerebellar and sensory pathway dysfunction contributes to gait instability.
  - target: Peripheral neuropathy
    description: Peripheral nerve dysfunction produces sensory and motor neuropathy.
  - target: Retinitis pigmentosa
    description: Retinal energy failure leads to pigmentary retinopathy and vision loss.
phenotypes:
- name: Ataxia
  category: Neurologic
  description: Progressive gait and coordination impairment is a core clinical feature.
  phenotype_term:
    preferred_term: Ataxia
    term:
      id: HP:0001251
      label: Ataxia
- name: Peripheral neuropathy
  category: Neurologic
  description: Peripheral neuropathy contributes to sensory loss, weakness, and areflexia.
  phenotype_term:
    preferred_term: Peripheral neuropathy
    term:
      id: HP:0009830
      label: Peripheral neuropathy
- name: Retinitis pigmentosa
  category: Ophthalmologic
  description: Pigmentary retinal degeneration causes progressive visual impairment.
  phenotype_term:
    preferred_term: Retinitis pigmentosa
    term:
      id: HP:0000510
      label: Rod-cone dystrophy
- name: Muscle weakness
  category: Neurologic
  description: Mitochondrial energy failure frequently contributes to limb weakness and fatigue.
  phenotype_term:
    preferred_term: Muscle weakness
    term:
      id: HP:0001324
      label: Muscle weakness
