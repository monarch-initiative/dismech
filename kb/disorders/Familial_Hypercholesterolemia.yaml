name: Familial Hypercholesterolemia
creation_date: "2026-03-06T00:00:00Z"
updated_date: "2026-03-06T00:00:00Z"
description: >
  Familial hypercholesterolemia (FH) is a common autosomal dominant disorder of
  lipid metabolism characterized by significantly elevated serum low-density
  lipoprotein (LDL) cholesterol levels from birth, leading to premature
  atherosclerotic cardiovascular disease. Most cases are caused by mutations in
  LDLR encoding the LDL receptor, though mutations in APOB and PCSK9 also
  contribute. Heterozygous FH affects approximately 1 in 250 individuals, making
  it one of the most common Mendelian disorders. Homozygous FH is rare but causes
  severe cardiovascular disease in childhood. Lifelong LDL cholesterol-lowering
  treatment substantially improves cardiovascular outcomes.
category: Mendelian
disease_term:
  preferred_term: Familial Hypercholesterolemia
  term:
    id: MONDO:0005439
    label: familial hypercholesterolemia
parents:
- Dyslipidemia
- Cardiovascular Disease
prevalence:
- population: Global (heterozygous)
  percentage: "0.4"
  notes: Heterozygous FH affects approximately 1 in 250 individuals.
- population: Global (homozygous)
  percentage: Rare
  notes: Homozygous FH affects approximately 1 in 160,000-300,000 individuals.
progression:
- phase: Onset
  age_range: From birth
  notes: LDL cholesterol is elevated from birth; clinical cardiovascular events
    typically occur in adulthood for heterozygous FH, and in childhood for
    homozygous FH.
pathophysiology:
- name: Impaired LDL Receptor Function
  description: >
    Mutations in LDLR reduce the number or function of LDL receptors on hepatocyte
    surfaces, impairing clearance of LDL cholesterol from the blood. This leads to
    chronically elevated circulating LDL levels and accelerated atherosclerosis.
  cell_types:
  - preferred_term: hepatocyte
    term:
      id: CL:0000182
      label: hepatocyte
  biological_processes:
  - preferred_term: cholesterol metabolic process
    term:
      id: GO:0008203
      label: cholesterol metabolic process
  locations:
  - preferred_term: liver
    term:
      id: UBERON:0002107
      label: liver
  evidence:
  - reference: PMID:29219151
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Most cases are caused by autosomal dominant mutations in LDLR, which
      encodes the LDL receptor, although mutations in other genes coding for proteins
      involved in cholesterol metabolism or LDLR function and processing, such as
      APOB and PCSK9, can also be causative, although less frequently."
    explanation: Confirms LDLR mutations as the primary cause with APOB and PCSK9 as
      additional causative genes.
  - reference: PMID:38125244
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Chromosome 19 codes data for low-density lipoprotein (LDL) receptor
      (LDLR). LDLR either reduces increased LDL levels from the circulation or
      maintains a normal level of LDL."
    explanation: Describes the role of LDLR in LDL clearance and its chromosomal location.
- name: Accelerated Atherosclerosis
  description: >
    Chronically elevated LDL cholesterol promotes lipid deposition in arterial
    walls, leading to plaque formation and premature atherosclerotic cardiovascular
    disease including coronary artery disease, aortic stenosis, and peripheral
    vascular disease.
  cell_types:
  - preferred_term: macrophage
    term:
      id: CL:0000235
      label: macrophage
  - preferred_term: vascular associated smooth muscle cell
    term:
      id: CL:0000359
      label: vascular associated smooth muscle cell
  biological_processes:
  - preferred_term: lipid metabolic process
    term:
      id: GO:0006629
      label: lipid metabolic process
  evidence:
  - reference: PMID:38125244
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Plaque gets deposited in the lumen of the arteries, called atherosclerosis,
      which occurs at an early young age."
    explanation: Confirms premature atherosclerosis as a consequence of elevated LDL in FH.
phenotypes:
- category: Metabolic
  name: Hypercholesterolemia
  frequency: VERY_FREQUENT
  diagnostic: true
  description: >
    Markedly elevated LDL cholesterol levels from birth. Heterozygous FH typically
    shows LDL-C of 190-400 mg/dL; homozygous FH shows LDL-C >500 mg/dL.
  phenotype_term:
    preferred_term: Hypercholesterolemia
    term:
      id: HP:0003124
      label: Hypercholesterolemia
  evidence:
  - reference: PMID:29219151
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Familial hypercholesterolaemia is a common inherited disorder
      characterized by abnormally elevated serum levels of low-density lipoprotein
      (LDL) cholesterol from birth, which in time can lead to cardiovascular
      disease (CVD)."
    explanation: Elevated LDL cholesterol from birth is the defining feature of FH.
- category: Cardiovascular
  name: Premature Coronary Artery Disease
  frequency: VERY_FREQUENT
  description: >
    Premature atherosclerotic coronary artery disease is the major cause of
    morbidity and mortality in FH. Untreated heterozygous males may develop
    coronary events by age 40-50; homozygous patients may develop them in
    childhood.
  phenotype_term:
    preferred_term: Premature coronary artery atherosclerosis
    term:
      id: HP:0005181
      label: Premature coronary artery atherosclerosis
  evidence:
  - reference: PMID:29219151
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "common diagnostic features are an elevated LDL cholesterol level and
      a family history of hypercholesterolaemia or (premature) CVD."
    explanation: Premature cardiovascular disease is a key diagnostic feature of FH.
- category: Dermatologic
  name: Tendon Xanthomas
  frequency: FREQUENT
  description: >
    Xanthomas (lipid deposits) in tendons, particularly the Achilles tendon and
    extensor tendons of the hands, are pathognomonic for FH, though they develop
    over decades and may not be present in younger patients.
  phenotype_term:
    preferred_term: Tendon xanthomatosis
    term:
      id: HP:0010874
      label: Tendon xanthomatosis
genetic:
- name: LDLR
  association: Pathogenic Mutations
  presence: Positive
  notes: >
    Mutations in LDLR on chromosome 19p13.2 account for the majority of FH cases.
    Over 2000 different LDLR mutations have been described. They can be classified
    by their effect on receptor synthesis, transport, binding, internalization,
    or recycling.
  evidence:
  - reference: PMID:29219151
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Most cases are caused by autosomal dominant mutations in LDLR, which
      encodes the LDL receptor"
    explanation: LDLR mutations are the most frequent genetic cause of FH.
- name: APOB
  association: Pathogenic Mutations
  presence: Positive
  notes: >
    Mutations in APOB, encoding apolipoprotein B-100, reduce binding of LDL
    particles to the LDL receptor. This accounts for approximately 5% of FH cases.
- name: PCSK9
  association: Gain-of-Function Mutations
  presence: Positive
  notes: >
    Gain-of-function mutations in PCSK9 increase degradation of LDL receptors,
    reducing LDL clearance. This is a less common cause of FH.
treatments:
- name: Statin Therapy
  description: >
    Statins are the first-line therapy for FH, reducing LDL cholesterol by
    inhibiting HMG-CoA reductase. High-intensity statin therapy is recommended.
  treatment_term:
    preferred_term: pharmacotherapy
    term:
      id: MAXO:0000058
      label: pharmacotherapy
  evidence:
  - reference: PMID:29219151
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Statins are the first-line therapy, but additional drugs, such as
      ezetimibe, bile acid sequestrants, PCSK9 inhibitors and other emerging
      therapies, are often required."
    explanation: Statins confirmed as first-line therapy with additional agents often needed.
- name: PCSK9 Inhibitor Therapy
  description: >
    Monoclonal antibodies targeting PCSK9 (evolocumab, alirocumab) provide
    additional LDL lowering on top of statin therapy, particularly useful in
    patients not achieving LDL goals.
  treatment_term:
    preferred_term: pharmacotherapy
    term:
      id: MAXO:0000058
      label: pharmacotherapy
- name: LDL Apheresis
  description: >
    Extracorporeal removal of LDL particles from the blood, used particularly
    in homozygous FH when pharmacotherapy is insufficient.
  treatment_term:
    preferred_term: supportive care
    term:
      id: MAXO:0000950
      label: supportive care
- name: Genetic Counseling
  description: >
    Cascade screening of first-degree relatives is recommended for early
    identification and treatment of affected family members.
  treatment_term:
    preferred_term: genetic counseling
    term:
      id: MAXO:0000079
      label: genetic counseling
  evidence:
  - reference: PMID:29219151
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Cascade screening can contribute to early diagnosis of the disease in
      family members of an affected individual, which is crucial because familial
      hypercholesterolaemia can be asymptomatic for decades."
    explanation: Cascade screening of family members is crucial for early diagnosis.
