    reference_title: "Familial Hypercholesterolemia: A Literature Review of the Pathophysiology and Current and Novel Treatments."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Plaque gets deposited in the lumen of the arteries, called atherosclerosis,
      which occurs at an early young age."
    explanation: Confirms premature atherosclerosis as a consequence of elevated LDL in FH.
  - reference: DOI:10.3390/ijms25031637
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "a chronically elevated concentration of LDL-C in the plasma leads to
      the occurrence of certain abnormalities, such as xanthomas in the tendons and
      skin, as well as corneal arcus. Nevertheless, a significantly more severe
      phenomenon is leading to the premature onset of cardiovascular disease (CVD)"
    explanation: Documents that chronic LDL-C elevation leads to both cutaneous
      manifestations and premature CVD.
- name: Cholesterol Homeostasis Disruption
  description: >
    The normal feedback regulation of cholesterol metabolism is disrupted in FH.
    Hepatic cholesterol sensing via SREBP pathway responds to reduced intracellular
    cholesterol by upregulating cholesterol synthesis and LDLR transcription, but
    mutant LDLR cannot adequately clear circulating LDL despite transcriptional
    upregulation. This creates a vicious cycle of persistent hypercholesterolemia.
  biological_processes:
  - preferred_term: cholesterol homeostasis
    term:
      id: GO:0042632
      label: cholesterol homeostasis
  evidence:
  - reference: DOI:10.3390/cells12121648
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Since the discovery of the LDL receptor in 1973 by Brown and Goldstein
      as a causative protein in hypercholesterolemia, tremendous amounts of effort
      have gone into finding ways to manage high LDL cholesterol in familial
      hypercholesterolemic (HoFH and HeFH) individuals with loss-of-function
      mutations in the LDL receptor (LDLR) gene."
    explanation: Reviews the central role of LDLR loss-of-function in disrupting
      cholesterol homeostasis.
