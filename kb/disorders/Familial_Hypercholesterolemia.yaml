    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: "Overexpression of PCSK9 in HepG2 cells caused a decrease in whole-cell
      and cell-surface LDLR levels. PCSK9 overexpression had no effect on LDLR
      synthesis but caused a dramatic increase in the degradation of the mature LDLR"
    explanation: Demonstrates that PCSK9 overexpression accelerates LDLR degradation
      without affecting synthesis.
- name: Accelerated Atherosclerosis
  description: >
    Chronically elevated LDL cholesterol promotes lipid deposition in arterial
    walls, particularly at disturbed-flow regions. Subendothelial LDL is
    oxidatively modified to oxLDL, triggering endothelial activation, monocyte
    recruitment, and foam cell formation. Both macrophages and smooth muscle cells
    contribute to foam cell populations. Progressive plaque growth leads to
    premature atherosclerotic cardiovascular disease including coronary artery
    disease, aortic stenosis, and peripheral vascular disease.
