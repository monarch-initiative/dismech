- name: PCSK9-Mediated LDLR Degradation
  description: >
    PCSK9 is a secreted serine protease that binds the extracellular domain of
    LDLR on the hepatocyte surface. The PCSK9-LDLR complex is internalized via
    clathrin-mediated endocytosis and routed to lysosomes for degradation instead
    of recycling the receptor back to the cell surface. Gain-of-function mutations
    in PCSK9 increase this degradation, reducing functional LDLR on the cell
    surface and elevating circulating LDL-C.
  cell_types:
  - preferred_term: hepatocyte
