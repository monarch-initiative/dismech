treatments:
- name: Trimethoprim-Sulfamethoxazole
  description: >
    Co-trimoxazole (trimethoprim plus sulfamethoxazole) inhibits the folate-synthesis
    pathway (DHFR and dihydropteroate synthase, respectively); it is the first-line
    treatment and prophylaxis for Pneumocystis pneumonia. Alternatives for
    intolerance or treatment failure include dapsone, atovaquone, pentamidine, and
    clindamycin-primaquine.
  therapeutic_modality: SMALL_MOLECULE
  treatment_term:
    preferred_term: Pharmacotherapy
    term:
      id: NCIT:C15986
      label: Pharmacotherapy
    therapeutic_agent:
    - preferred_term: trimethoprim
      term:
        id: CHEBI:45924
        label: trimethoprim
    - preferred_term: sulfamethoxazole
      term:
        id: CHEBI:9332
        label: sulfamethoxazole
  target_mechanisms:
  - target: Folate Synthesis (Antifolate Target)
    treatment_effect: INHIBITS
    description: >-
      Trimethoprim-sulfamethoxazole inhibits dihydrofolate reductase and
      dihydropteroate synthase, blocking folate synthesis the organism requires.
  evidence:
  - reference: PMID:33870843
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      First-line therapy for prophylaxis and treatment remains
      trimethoprim-sulfamethoxazole
    explanation: >-
      TMP-SMX is first-line therapy and prophylaxis for PJP. Evidence source is
      OTHER as this is a review article.
- name: Adjunctive Corticosteroids
  description: >
    In HIV-associated PCP with hypoxemia, adjunctive corticosteroids (typically
    prednisone) reduce mortality.
  therapeutic_modality: SMALL_MOLECULE
  treatment_term:
    preferred_term: Pharmacotherapy
    term:
      id: NCIT:C15986
      label: Pharmacotherapy
    therapeutic_agent:
    - preferred_term: prednisone
      term:
        id: CHEBI:8382
        label: prednisone
  evidence:
  - reference: PMID:33870843
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      In people living with HIV (PLWH), adjunctive corticosteroid use in treatment
      has shown a mortality benefit.
    explanation: >-
      Supports adjunctive corticosteroids reducing mortality in HIV-associated PCP.
      Evidence source is OTHER as this is a review article.
notes: >
  Created as part of the Respiratory Infections project (opportunistic fungal
  pneumonia). Deliberately NOT conformed to the bacterial_folate_synthesis_inhibition
  module: although TMP-SMX targets the same folate enzymes, that module's selectivity
  rationale is prokaryote-specific and Pneumocystis is a fungus. disease_term uses
  MONDO:0005923 (Pneumocystis infectious disease) with a more specific preferred_term
  because MONDO lacks a dedicated "Pneumocystis pneumonia" term. The infectious_agent
  (NCBITaxon) block was omitted at creation and P. jirovecii is described in text.
