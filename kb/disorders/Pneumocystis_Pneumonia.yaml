name: Pneumocystis Pneumonia
creation_date: "2026-06-28T00:00:00Z"
description: >
  Pneumocystis pneumonia (PCP/PJP) is an opportunistic fungal pneumonia caused by
  Pneumocystis jirovecii, occurring almost exclusively in hosts with impaired
  cell-mediated immunity. Risk factors include HIV infection (classically with CD4
  counts <200 cells/µL), solid-organ transplantation, malignancy, and inflammatory
  or rheumatologic conditions and their immunosuppressive therapies. The organism
  attaches to the alveolar epithelium and produces a diffuse alveolar pneumonia
  with hypoxemia. First-line therapy and prophylaxis is
  trimethoprim-sulfamethoxazole, which targets the folate-synthesis pathway; adjunctive
  corticosteroids reduce mortality in hypoxemic HIV-associated disease.
category: Infectious Disease
parents:
- Fungal Respiratory Infection
synonyms:
- PCP
- PJP
- Pneumocystis jirovecii pneumonia
disease_term:
  preferred_term: Pneumocystis pneumonia
  term:
    id: MONDO:0005923
    label: Pneumocystis infectious disease
pathophysiology:
- name: Opportunistic Infection in Cell-Mediated Immunodeficiency
  role: trigger
  description: >
    Pneumocystis jirovecii is an opportunistic fungal pathogen that causes severe
    pneumonia in immunocompromised hosts. Disease requires impaired cell-mediated
    immunity — HIV (classically CD4 <200 cells/µL), organ transplantation,
    malignancy, and inflammatory/rheumatologic conditions and their
    immunosuppressive therapies — which permits uncontrolled alveolar replication.
  biological_processes:
  - preferred_term: symbiont entry into host cell
    term:
      id: GO:0046718
      label: symbiont entry into host cell
  evidence:
  - reference: PMID:33870843
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Pneumocystis jirovecii (PJ) is an opportunistic fungal pathogen that can
      cause severe pneumonia in immunocompromised hosts.
    explanation: >-
      Establishes P. jirovecii as an opportunistic fungal pathogen causing severe
      pneumonia in immunocompromised hosts. Evidence source is OTHER as this is a
      review article.
  - reference: PMID:27242349
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      CD4+ lymphocyte count <200 cells/µL is the primary risk factor for PJP
      presentation in these patients.
    explanation: >-
      Identifies CD4 <200 cells/µL as the primary risk factor, anchoring the
      cell-mediated-immunodeficiency trigger. Evidence source is OTHER as this is a
      review article.
  downstream:
  - target: Alveolar Pneumonia and Respiratory Compromise
    description: >-
      Uncontrolled alveolar replication produces a diffuse pneumonia with impaired
      gas exchange.

- name: Alveolar Pneumonia and Respiratory Compromise
  role: consequence
  description: >
    P. jirovecii attaches to the alveolar epithelium (type I pneumocytes) and
    produces a diffuse alveolar pneumonia with impaired gas exchange and hypoxemia;
    clinical signs are nonspecific and definitive diagnosis requires direct
    detection of the organism in lower respiratory secretions or tissue.
  cell_types:
  - preferred_term: pulmonary alveolar type 1 cell
    term:
      id: CL:0002062
      label: pulmonary alveolar type 1 cell
  biological_processes:
  - preferred_term: inflammatory response
    term:
      id: GO:0006954
      label: inflammatory response
    modifier: INCREASED
  locations:
  - preferred_term: lung
    term:
      id: UBERON:0002048
      label: lung
  evidence:
  - reference: PMID:33870843
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Clinical signs of PJP are nonspecific and definitive diagnosis requires
      direct detection of the organism in lower respiratory secretions or tissue.
    explanation: >-
      Supports the nonspecific pneumonia presentation and the requirement for direct
      organism detection. Evidence source is OTHER as this is a review article.
  downstream: []

- name: Folate Synthesis (Antifolate Target)
  role: therapeutic_vulnerability
  description: >
    P. jirovecii depends on de novo folate synthesis. Trimethoprim-sulfamethoxazole
    inhibits this pathway (sulfamethoxazole inhibits dihydropteroate synthase;
    trimethoprim inhibits dihydrofolate reductase), and is the first-line treatment
    and prophylaxis. (This antifolate target is analogous to the bacterial folate
    pathway but is not modeled here as conforming to the bacterial folate module,
    since Pneumocystis is a fungus.)
  biological_processes:
  - preferred_term: folic acid biosynthetic process
    term:
      id: GO:0046656
      label: folic acid biosynthetic process
  evidence:
  - reference: PMID:33870843
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      First-line therapy for prophylaxis and treatment remains
      trimethoprim-sulfamethoxazole
    explanation: >-
      Identifies trimethoprim-sulfamethoxazole (a folate-synthesis inhibitor) as
      first-line therapy and prophylaxis. Evidence source is OTHER as this is a
      review article.
  downstream: []
