name: Osteogenesis Imperfecta Type XVII
creation_date: "2026-06-30T00:00:00Z"
category: Mendelian
disease_term:
  preferred_term: Osteogenesis imperfecta type 17
  term:
    id: MONDO:0014672
    label: osteogenesis imperfecta type 17
description: >-
  Osteogenesis imperfecta type XVII (OI type XVII) is a severe autosomal
  recessive brittle bone disease caused by biallelic loss-of-function variants in
  SPARC, the gene encoding osteonectin (also called secreted protein acidic and
  rich in cysteine, SPARC, or BM-40). Osteonectin is a collagen-binding
  matricellular glycoprotein — one of the most abundant noncollagenous proteins
  in bone — that binds collagen type I and other extracellular-matrix proteins
  and regulates collagen fibril assembly, matrix maturation, metalloproteinase
  expression, and bone mineralization. The disorder is mechanistically distinct
  from the intracellular collagen-folding/modification recessive OI types
  (CRTAP/P3H1/CyPB 3-hydroxylation complex, HSP47 chaperone): OI type XVII is a
  matricellular/extracellular-matrix-protein OI in which the primary lesion lies
  in a secreted matrix regulator rather than in an intracellular collagen
  biosynthetic enzyme or chaperone. The defining human variants (c.497G>A,
  p.Arg166His and c.787G>A, p.Glu263Lys) disrupt an intramolecular salt bridge
  essential for SPARC binding to collagen type I; SPARC secretion is reduced in
  some patients, and bone material is hypermineralized at the trabecular level
  despite the overall fragility. Loss of osteonectin function compromises
  osteoblast formation, maturation, and survival and, in osteonectin-null mice,
  produces decreased bone formation and profound osteopenia. Clinically OI type
  XVII presents as severe, progressive bone fragility with recurrent fractures,
  low bone mineral density, growth deficiency, and bone deformity.
