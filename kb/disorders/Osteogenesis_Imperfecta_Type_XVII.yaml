    reference_title: "Osteopenia and decreased bone formation in osteonectin-deficient mice."
    supports: SUPPORT
    evidence_source: MODEL_ORGANISM
    snippet: >-
      We found that osteonectin-null mice have decreased bone formation and
      decreased osteoblast and osteoclast surface and number, leading to
      decreased bone remodeling with a negative bone balance and causing profound
      osteopenia.
    explanation: >-
      The osteonectin-null mouse recapitulates the decreased bone formation and
      profound osteopenia (reduced bone mass) of OI type XVII.
  - reference: PMID:26027498
    reference_title: "Recessive osteogenesis imperfecta caused by missense mutations in SPARC."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      these observations show that homozygous mutations in SPARC
      can give rise to severe bone fragility in humans.
    explanation: >-
      Establishes that biallelic SPARC loss-of-function causes severe human bone
      fragility, the defining clinical feature of OI type XVII.
