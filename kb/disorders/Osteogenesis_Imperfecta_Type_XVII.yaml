      defect.
  downstream:
  - target: Impaired Bone Matrix Maturation and Osteoblast Function
    description: >-
      Loss of osteonectin collagen binding impairs collagen fibril maturation and
      compromises osteoblast formation, maturation, and survival, degrading bone
      matrix quality.
- name: Impaired Bone Matrix Maturation and Osteoblast Function
  description: >-
    Osteonectin supports bone remodeling and the maintenance of bone mass; its
    loss compromises osteoblast formation, maturation, and survival and impairs
    collagen fibril organization within the bone extracellular matrix. In OI type
    XVII patient fibroblasts, SPARC secretion is reduced and collagen type I
    secretion is mildly delayed with some overmodification, reflecting disturbed
    matrix maturation. Osteonectin-null mice show decreased bone formation and
    decreased osteoblast number and surface, the cellular basis of the matrix
    defect.
  cell_types:
