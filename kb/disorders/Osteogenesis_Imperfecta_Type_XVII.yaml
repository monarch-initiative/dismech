pathophysiology:
- name: SPARC Loss-of-Function Disrupts Osteonectin Collagen Binding in the Bone ECM
  description: >-
    SPARC encodes osteonectin, a secreted collagen-binding matricellular
    glycoprotein and one of the most abundant noncollagenous proteins in bone.
    Osteonectin binds collagen type I and other extracellular-matrix proteins
    and regulates collagen fibril assembly and matrix maturation. The defining OI
    type XVII missense variants (p.Arg166His, p.Glu263Lys) substitute residues
    that form an intramolecular salt bridge essential for SPARC binding to
    collagen type I, so the proximal lesion is loss of the collagen-binding
    matricellular function of secreted osteonectin in the bone ECM — distinct
    from the intracellular collagen-folding/modification recessive OI types.
