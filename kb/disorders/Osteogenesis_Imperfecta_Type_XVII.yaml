  - reference: PMID:12746322
    reference_title: "Osteonectin-null mutation compromises osteoblast formation, maturation, and survival."
    supports: SUPPORT
    evidence_source: MODEL_ORGANISM
    snippet: >-
      Mutant cells exhibited decreased formation of mineralized nodules, as well
      as diminished expression of osteocalcin mRNA and response to PTH.
    explanation: >-
      Documents impaired mineralized-nodule formation and osteoblast
      differentiation in osteonectin-null cells, linking SPARC loss to defective
      bone matrix maturation.
  - reference: PMID:26027498
    reference_title: "Recessive osteogenesis imperfecta caused by missense mutations in SPARC."
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: >-
      Pulse-chase experiments showed that collagen type I secretion was mildly
      delayed in skin fibroblasts from both individuals.
    explanation: >-
      Documents delayed collagen type I secretion in OI type XVII patient
      fibroblasts, reflecting disturbed collagen matrix maturation downstream of
      the SPARC defect.
  downstream:
  - target: Defective Bone Matrix, Reduced Bone Mineral Density, and Skeletal Fragility
    description: >-
      Impaired collagen matrix maturation and osteoblast function yield a
      defective bone extracellular matrix with reduced bone mass and mechanical
      strength, producing severe skeletal fragility.
- name: Defective Bone Matrix, Reduced Bone Mineral Density, and Skeletal Fragility
  description: >-
    The disturbed osteonectin-dependent collagen matrix and impaired osteoblast
    function produce a defective bone extracellular matrix with abnormal
    mineralization. Although trabecular bone material can be hypermineralized at
    the material level, the overall result is reduced bone mass and mechanical
    strength with severe bone fragility. Osteonectin-null mice develop profound
    osteopenia from decreased bone formation, recapitulating the reduced bone
    mass of OI type XVII. Clinically this manifests as recurrent fractures, low
    bone mineral density, growth deficiency, vertebral compression, and bone
    deformity.
