      autoimmune disorder, abnormally increased sympathetic activity and catecholamine
      excess, and sympathetic denervation leading to central hypovolaemia and reflex
      tachycardia.
    explanation: >-
      Describes the three main hypothesized autonomic mechanisms underlying POTS.
treatments:
- name: Exercise Training
  description: >-
    Graded exercise programs, particularly recumbent exercise initially, have
    been shown to improve cardiovascular conditioning, expand blood volume, and
    reduce orthostatic tachycardia in POTS patients. After 3 months of training,
    over 50% of patients no longer met criteria for POTS.
  treatment_term:
    preferred_term: physical therapy
    term:
      id: MAXO:0000011
      label: physical therapy
  evidence:
  - reference: PMID:30001836
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      physical reconditioning with exercise training and volume expansion via
      increased salt and fluid intake should be initiated early in the course of
      treatment for patients with POTS if possible. The use of horizontal exercise
      (e.g., rowing, swimming, recumbent bike, etc.) at the beginning is a critical
      strategy, allowing patients to exercise while avoiding the upright posture that
      elicits their POTS symptoms.
    explanation: >-
      Describes the rationale and approach for graded exercise training as a primary
      treatment for POTS.
- name: Volume Expansion and Salt Supplementation
  description: >-
    Increased fluid intake (2-3 liters/day) and sodium supplementation (6-10 g/day)
    to expand plasma volume and improve venous return.
  treatment_term:
    preferred_term: dietary intervention
    term:
      id: MAXO:0000088
      label: dietary intervention
  evidence:
  - reference: PMID:30001836
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      physical reconditioning with exercise training and volume expansion via
      increased salt and fluid intake should be initiated early in the course of
      treatment for patients with POTS if possible.
    explanation: >-
      Recommends volume expansion via salt and fluid intake as an early intervention
      in POTS treatment.
  - reference: PMID:34144933
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Once diagnosed, management typically begins with patient education and
      non-pharmacologic treatment options.
    explanation: >-
      NIH expert consensus confirms non-pharmacologic treatments as first-line management.
- name: Pharmacotherapy - Beta-Blockers
  description: >-
    Low-dose propranolol (20 mg) to attenuate the excessive heart rate response
    upon standing. Higher doses may worsen symptoms despite greater heart rate
    reduction.
  treatment_term:
    preferred_term: beta-blocker pharmacotherapy
    term:
      id: MAXO:0000058
      label: pharmacotherapy
  evidence:
  - reference: PMID:19687359
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Low-dose oral propranolol significantly attenuated tachycardia and improved
      symptoms in POTS. Higher-dose propranolol did not further improve, and may
      worsen, symptoms.
    explanation: >-
      Randomized crossover trial demonstrating that low-dose propranolol improves
      POTS symptoms while higher doses may be counterproductive.
  - reference: PMID:23616163
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Low-dose propranolol improved VO2max in patients with POTS (24.5 +/- 0.7
      placebo vs 27.6 +/- 1.0 mL/min/kg propranolol; p = 0.024), but not healthy
      subjects.
    explanation: >-
      Randomized study showing low-dose propranolol improved exercise capacity in
      POTS patients.
- name: Pharmacotherapy - Midodrine
  description: >-
    Alpha-1 adrenergic agonist that promotes peripheral vasoconstriction,
    improving venous return and reducing orthostatic symptoms.
  treatment_term:
    preferred_term: midodrine pharmacotherapy
    term:
      id: MAXO:0000058
      label: pharmacotherapy
  evidence:
  - reference: PMID:31412221
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Stockings, abdominal binders, and vasoconstrictors are used to enhance venous
      return in partial neuropathic POTS.
    explanation: >-
      Identifies vasoconstrictors as a treatment strategy for enhancing venous return
      in neuropathic POTS.
- name: Pharmacotherapy - Fludrocortisone
  description: >-
    Mineralocorticoid that promotes sodium and fluid retention to expand
    intravascular volume.
  treatment_term:
    preferred_term: fludrocortisone pharmacotherapy
    term:
      id: MAXO:0000058
      label: pharmacotherapy
  evidence:
  - reference: PMID:31412221
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Exercise and volume expansion are the main treatment strategies for
      hypo-volemic POTS.
    explanation: >-
      Volume expansion is a main treatment strategy for hypovolemic POTS;
      fludrocortisone achieves this pharmacologically.
- name: Compression Garments
  description: >-
    Abdominal binders and lower extremity compression stockings to reduce venous
    pooling and improve venous return upon standing.
  treatment_term:
    preferred_term: supportive care
    term:
      id: MAXO:0000950
      label: supportive care
  evidence:
  - reference: PMID:30001836
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      reduction in venous pooling during orthostasis by lower body compression
      garments extending at least to the xiphoid or with an abdominal binder
    explanation: >-
      Describes compression garments as a non-pharmacological intervention to reduce
      venous pooling in POTS.
  - reference: PMID:31412221
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Stockings, abdominal binders, and vasoconstrictors are used to enhance venous
      return in partial neuropathic POTS.
    explanation: >-
      Confirms stockings and abdominal binders as treatments for neuropathic POTS.
