name: Postural Orthostatic Tachycardia Syndrome
creation_date: "2026-03-07T12:00:00Z"
updated_date: "2026-03-08T18:00:00Z"
description: >-
  Postural orthostatic tachycardia syndrome (POTS) is a form of chronic
  orthostatic intolerance defined by an excessive rise in heart rate on standing
  without orthostatic hypotension, accompanied by symptoms such as palpitations,
  lightheadedness, and fatigue. Heterogeneous mechanisms contribute, including
  partial autonomic (sympathetic) neuropathy, a hyperadrenergic state, and
  reduced blood volume with venous pooling that lowers cardiac preload.
category: Complex
parents:
- Autonomic Nervous System Disorder
- Dysautonomia
disease_term:
  preferred_term: postural orthostatic tachycardia syndrome
  term:
    id: MONDO:0011479
    label: postural orthostatic tachycardia syndrome
has_subtypes:
- name: Neuropathic POTS
  description: >-
    Characterized by peripheral sympathetic denervation, particularly in the lower
    extremities, leading to impaired vasoconstriction and venous blood pooling upon standing.
  evidence:
  - reference: PMID:31412221
    reference_title: "Postural Orthostatic Tachycardia Syndrome: Mechanisms and New Therapies."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      The three major pathophysiologic mechanisms include partial autonomic neuropathy,
      hypovolemia, and hyperadrenergic state. Patients often will exhibit overlapping
      characteristics from more than one of these mechanisms.
    explanation: >-
      Identifies partial autonomic neuropathy as one of the three major pathophysiologic
      mechanisms of POTS.
  - reference: PMID:24647968
    reference_title: "Small-fiber neuropathy with cardiac denervation in postural tachycardia syndrome."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      A subset of neuropathic POTS patients may harbor mild small fiber neuropathy
      with abnormalities of unmyelinated nerve fibers in the skin associated with
      reduced myocardial postganglionic sympathetic innervation.
    explanation: >-
      Demonstrates small fiber neuropathy with cardiac sympathetic denervation in
      neuropathic POTS patients.
- name: Hyperadrenergic POTS
  description: >-
    Characterized by elevated standing norepinephrine levels (>600 pg/mL), often with
    hypertension upon standing, and excessive sympathetic nervous system activation.
  evidence:
  - reference: PMID:31412221
    reference_title: "Postural Orthostatic Tachycardia Syndrome: Mechanisms and New Therapies."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      The three major pathophysiologic mechanisms include partial autonomic neuropathy,
      hypovolemia, and hyperadrenergic state.
    explanation: >-
      Identifies the hyperadrenergic state as one of the three major pathophysiologic
      mechanisms of POTS.
- name: Hypovolemic POTS
  description: >-
    Associated with low blood volume and reduced plasma and red cell volumes,
    contributing to inadequate cardiac preload upon standing.
  evidence:
  - reference: PMID:30001836
    reference_title: "Exercise and non-pharmacological treatment of POTS."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      cardiovascular deconditioning (i.e., cardiac atrophy and hypovolemia) contributes
      significantly to the Postural Orthostatic Tachycardia Syndrome (POTS) and its
      functional disability.
    explanation: >-
      Identifies cardiovascular deconditioning and hypovolemia as a significant
      contributor to POTS.
mechanistic_hypotheses:
- hypothesis_group_id: autoimmune_receptor_model
  hypothesis_label: Autoimmune Receptor-Antibody Model
  status: ALTERNATIVE
  description: >-
    Autoantibodies against adrenergic, muscarinic, angiotensin II type 1, or
    related autonomic receptors directly perturb autonomic signaling or contribute
    to autonomic nerve injury after immune triggers such as infection. This model
    treats receptor autoantibodies as potentially causal rather than merely
    biomarkers of systemic immune dysregulation.
- hypothesis_group_id: neuropathic_denervation_model
  hypothesis_label: Neuropathic Sympathetic-Denervation Model
  status: ALTERNATIVE
  applies_to_subtypes:
  - Neuropathic POTS
  description: >-
    Partial postganglionic sympathetic denervation, often framed as small-fiber
    autonomic neuropathy, impairs lower-extremity vasoconstriction, causing
    orthostatic venous pooling, reduced central blood volume, and reflex
    tachycardia.
- hypothesis_group_id: hyperadrenergic_model
  hypothesis_label: Hyperadrenergic Sympathetic-Activation Model
  status: ALTERNATIVE
  applies_to_subtypes:
  - Hyperadrenergic POTS
  description: >-
    Excess central sympathetic tone and catecholamine excess are primary drivers
    of the tachycardia and adrenergic symptom phenotype, rather than only a
    secondary response to low preload.
- hypothesis_group_id: hypovolemic_deconditioning_model
  hypothesis_label: Hypovolemic and Deconditioning Model
  status: ALTERNATIVE
  applies_to_subtypes:
  - Hypovolemic POTS
  description: >-
    Reduced plasma volume and cardiovascular deconditioning lower cardiac preload
    during orthostasis, driving compensatory tachycardia and functional disability.
pathophysiology:
- name: Sympathetic Denervation
  subtypes:
  - Neuropathic POTS
  description: >-
    Partial sympathetic denervation, particularly of the lower extremities,
    impairs norepinephrine release at sympathetic nerve terminals. This leads to
    failure of peripheral vasoconstriction upon standing.
  cell_types:
  - preferred_term: Sympathetic neuron
    term:
      id: CL:0011103
      label: sympathetic neuron
  biological_processes:
  - preferred_term: Norepinephrine secretion
    term:
      id: GO:0048243
      label: norepinephrine secretion
  downstream:
  - target: Venous Pooling and Reduced Preload
    description: >-
      Loss of sympathetic vasoconstriction in the lower extremities allows
      excessive venous pooling upon standing, reducing cardiac preload.
    hypothesis_groups:
    - neuropathic_denervation_model
  evidence:
  - reference: PMID:36055438
    reference_title: "Postural Orthostatic Tachycardia Syndrome (POTS): An Update for Clinical Practice."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      The 3 major hypotheses about the pathophysiology of POTS are autoimmunity,
      abnormally increased sympathetic activity, and sympathetic denervation leading
      to central hypovolemia and reflex tachycardia.
    explanation: >-
      Identifies sympathetic denervation as a major pathophysiology hypothesis in POTS.
  - reference: PMID:24647968
    reference_title: "Small-fiber neuropathy with cardiac denervation in postural tachycardia syndrome."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      A subset of neuropathic POTS patients may harbor mild small fiber neuropathy
      with abnormalities of unmyelinated nerve fibers in the skin associated with
      reduced myocardial postganglionic sympathetic innervation.
    explanation: >-
      Demonstrates sympathetic denervation affecting both skin nerve fibers and
      cardiac postganglionic sympathetic innervation.
- name: Venous Pooling and Reduced Preload
  subtypes:
  - Neuropathic POTS
  - Hypovolemic POTS
  description: >-
    Excessive venous blood pooling in the splanchnic and lower limb vasculature
    upon standing reduces venous return and cardiac preload, triggering
    compensatory tachycardia via the baroreflex.
  cell_types:
  - preferred_term: Vascular associated smooth muscle cell
    term:
      id: CL:0000359
      label: vascular associated smooth muscle cell
  biological_processes:
  - preferred_term: Vasoconstriction
    term:
      id: GO:0042310
      label: vasoconstriction
  downstream:
  - target: Compensatory Reflex Tachycardia
    description: >-
      Reduced stroke volume from venous pooling triggers baroreceptor-mediated
      sympathetic activation and compensatory heart rate increase.
    hypothesis_groups:
    - neuropathic_denervation_model
    - hypovolemic_deconditioning_model
  evidence:
  - reference: PMID:30001836
    reference_title: "Exercise and non-pharmacological treatment of POTS."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Recent research has demonstrated that cardiovascular deconditioning (i.e.,
      cardiac atrophy and hypovolemia) contributes significantly to the Postural
      Orthostatic Tachycardia Syndrome (POTS) and its functional disability.
    explanation: >-
      Establishes that hypovolemia and cardiac atrophy contribute to reduced
      preload and the POTS phenotype.
  - reference: PMID:31412221
    reference_title: "Postural Orthostatic Tachycardia Syndrome: Mechanisms and New Therapies."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Stockings, abdominal binders, and vasoconstrictors are used to enhance venous
      return in partial neuropathic POTS.
    explanation: >-
      Treatments targeting venous pooling confirm its role in the pathophysiology.
- name: Compensatory Reflex Tachycardia
  subtypes:
  - Neuropathic POTS
  - Hyperadrenergic POTS
  - Hypovolemic POTS
  description: >-
    Reduced cardiac preload from venous pooling triggers an excessive
    baroreceptor-mediated increase in heart rate to maintain cardiac output.
    This compensatory tachycardia is the defining hemodynamic abnormality of POTS.
  biological_processes:
  - preferred_term: Positive regulation of heart rate by norepinephrine
    term:
      id: GO:0003066
      label: positive regulation of heart rate by norepinephrine
  evidence:
  - reference: PMID:30372565
    reference_title: "Postural orthostatic tachycardia syndrome: clinical presentation, aetiology and management."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Postural orthostatic tachycardia syndrome (POTS) is a variant of cardiovascular
      autonomic disorder characterized by an excessive heart rate increase on standing
      and orthostatic intolerance.
    explanation: >-
      Defines POTS as characterized by excessive heart rate increase on standing.
  - reference: PMID:34144933
    reference_title: "Postural orthostatic tachycardia syndrome (POTS): State of the science and clinical care from a 2019 National Institutes of Health Expert Consensus Meeting - Part 1."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      A variety of pathophysiologies are involved in the abnormal postural
      tachycardia response; however, the pathophysiology of the syndrome is
      incompletely understood and undoubtedly multifaceted.
    explanation: >-
      NIH expert consensus confirms the tachycardia response involves multiple
      contributing pathophysiologic mechanisms.
- name: Excessive Sympathetic Activation
  subtypes:
  - Hyperadrenergic POTS
  description: >-
    Elevated central sympathetic outflow produces excessive circulating
    norepinephrine, resulting in hyperadrenergic symptoms including standing
    hypertension, tremor, and anxiety. This may be a primary central nervous
    system abnormality or a compensatory response to hypovolemia.
  biological_processes:
  - preferred_term: Positive regulation of norepinephrine secretion
    term:
      id: GO:0010701
      label: positive regulation of norepinephrine secretion
  downstream:
  - target: Compensatory Reflex Tachycardia
    description: >-
      Excessive catecholamine release drives the exaggerated heart rate response.
    hypothesis_groups:
    - hyperadrenergic_model
  evidence:
  - reference: PMID:30372565
    reference_title: "Postural orthostatic tachycardia syndrome: clinical presentation, aetiology and management."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      The aetiology of POTS is largely unknown and three main hypotheses include an
      autoimmune disorder, abnormally increased sympathetic activity and catecholamine
      excess, and sympathetic denervation leading to central hypovolaemia and reflex
      tachycardia.
    explanation: >-
      Identifies abnormally increased sympathetic activity and catecholamine excess
      as a main pathophysiological hypothesis in POTS.
  - reference: PMID:19687359
    reference_title: "Propranolol decreases tachycardia and improves symptoms in the postural tachycardia syndrome: less is more."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Postural tachycardia syndrome (POTS) induces disabling chronic orthostatic
      intolerance with an excessive increase in heart rate on standing.
    explanation: >-
      Describes the excessive heart rate increase characteristic of POTS.
- name: Autoimmune Autonomic Dysfunction
  description: >-
    Autoantibodies targeting G-protein coupled autonomic receptors may interfere
    with normal autonomic signaling, contributing to the autonomic dysregulation
    seen in POTS. Adrenergic and muscarinic receptor antibodies have been
    reported in some cohorts, while a recent cohort instead found elevated
    angiotensin II type 1 receptor antibodies, leaving receptor specificity and
    causality unresolved.
  cell_types:
  - preferred_term: B cell
    term:
      id: CL:0000236
      label: B cell
  biological_processes:
  - preferred_term: B cell mediated immunity
    term:
      id: GO:0019724
      label: B cell mediated immunity
  - preferred_term: Renin-angiotensin-aldosterone system regulation
    term:
      id: GO:0001991
      label: regulation of systemic arterial blood pressure by circulatory renin-angiotensin
    modifier: ABNORMAL
  downstream:
  - target: Sympathetic Denervation
    description: >-
      Autoimmune-mediated damage to autonomic nerves may cause the partial
      sympathetic denervation seen in neuropathic POTS.
    hypothesis_groups:
    - autoimmune_receptor_model
  - target: Venous Pooling and Reduced Preload
    description: >-
      AT1R autoantibody activity may disrupt angiotensin II receptor
      responsiveness and contribute indirectly to low effective circulating
      volume or low preload in a subset of POTS.
    causal_link_type: INDIRECT_UNKNOWN_INTERMEDIATES
    hypothesis_groups:
    - autoimmune_receptor_model
  evidence:
  - reference: PMID:31495251
    reference_title: "Postural Orthostatic Tachycardia Syndrome Is Associated With Elevated G-Protein Coupled Receptor Autoantibodies."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      We detected a significant number of patients with elevated levels of
      autoantibodies against the adrenergic alpha 1 receptor (89%) and against the
      muscarinic acetylcholine M4 receptor (53%).
    explanation: >-
      Demonstrates elevated G-protein coupled receptor autoantibodies in POTS patients,
      supporting an autoimmune mechanism involving B cell-produced autoantibodies.
  - reference: PMID:29618472
    reference_title: "Angiotensin II Type 1 Receptor Autoantibodies in Postural Tachycardia Syndrome."
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: >-
      Of 17 subjects with POTS, 12 demonstrated significant AT1R antibody
      activity in immunoglobulin G purified from their serum. No significant
      AT1R antibody activity was found in the subjects with vasovagal syncope
      or healthy subjects.
    explanation: >-
      Functional in vitro testing of patient IgG supports AT1R autoantibody
      activity in POTS and provides a mechanistic basis for the RAAS branch of
      the autoimmune hypothesis.
  - reference: PMID:40432440
    reference_title: "Autoimmune Antibodies in Orthostatic Intolerance Syndromes."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Significantly higher levels of angiotensin II type 1 receptor (AT1R)
      autoantibodies were found in the POTS group compared with controls
    explanation: >-
      Supports adding AT1R autoantibodies and renin-angiotensin biology to the
      autoimmune hypothesis, while not proving causality.
  - reference: PMID:40432440
    reference_title: "Autoimmune Antibodies in Orthostatic Intolerance Syndromes."
    supports: REFUTE
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Autoantibody concentration against ADRA1, ADRB1, ADRB2, and M4R were not
      significantly different between the groups.
    explanation: >-
      Refutes a generalized claim that adrenergic or muscarinic receptor
      autoantibodies are consistently elevated across POTS cohorts; it does not
      refute AT1R-associated autoimmunity.
- name: Post-Infectious Trigger
  description: >-
    Viral infections, including SARS-CoV-2, can precipitate POTS onset through
    immunological stress, potentially triggering autoimmune responses against
    autonomic nervous system components.
  evidence:
  - reference: PMID:34144933
    reference_title: "Postural orthostatic tachycardia syndrome (POTS): State of the science and clinical care from a 2019 National Institutes of Health Expert Consensus Meeting - Part 1."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      The onset of POTS may be precipitated by immunological stressors such as a viral
      infection.
    explanation: >-
      NIH expert consensus confirms that viral infections can precipitate POTS onset.
  - reference: PMID:38163814
    reference_title: "Cardiovascular autonomic dysfunction in post-COVID-19 syndrome: a major health-care burden."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Many severely affected patients with long COVID meet the diagnostic criteria for
      two common presentations of CVAD: postural orthostatic tachycardia syndrome and
      inappropriate sinus tachycardia.
    explanation: >-
      Confirms that post-COVID-19 syndrome can manifest as POTS.
  downstream:
  - target: Autoimmune Autonomic Dysfunction
    description: >-
      Viral infection may trigger autoantibody production against autonomic receptors.
    hypothesis_groups:
    - autoimmune_receptor_model
- name: Cardiovascular Deconditioning
  subtypes:
  - Hypovolemic POTS
  description: >-
    Chronic physical inactivity due to symptom burden leads to cardiac atrophy
    and reduced heart size, further reducing stroke volume and worsening
    orthostatic intolerance in a vicious cycle.
  cell_types:
  - preferred_term: Cardiac muscle cell
    term:
      id: CL:0000746
      label: cardiac muscle cell
  downstream:
  - target: Venous Pooling and Reduced Preload
    description: >-
      Cardiac atrophy reduces stroke volume, compounding the effect of venous pooling.
    hypothesis_groups:
    - hypovolemic_deconditioning_model
  evidence:
  - reference: PMID:30001836
    reference_title: "Exercise and non-pharmacological treatment of POTS."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Recent research has demonstrated that cardiovascular deconditioning (i.e.,
      cardiac atrophy and hypovolemia) contributes significantly to the Postural
      Orthostatic Tachycardia Syndrome (POTS) and its functional disability.
    explanation: >-
      Establishes cardiovascular deconditioning as a significant contributor to POTS
      pathophysiology and disability.
discussions:
- discussion_id: gap_pots_receptor_autoantibody_causality
  prompt: >-
    Are receptor autoantibodies causal drivers of POTS autonomic dysfunction,
    biomarkers of systemic immune activation, or epiphenomena that vary by
    cohort and assay?
  kind: KNOWLEDGE_GAP
  status: OPEN
  attaches_to:
  - mechanistic_hypothesis#autoimmune_receptor_model
  - pathophysiology#Autoimmune Autonomic Dysfunction
  - pathophysiology#Sympathetic Denervation
  rationale: >-
    The entry now represents receptor autoimmunity as an alternative hypothesis
    rather than as a unified cause. Cohort evidence supports antibodies against
    autonomic receptors, but the antigen pattern differs across studies and
    antibody depletion or passive-transfer evidence is still needed to establish
    causality.
  proposed_experiments:
  - experiment_id: exp_pots_autoantibody_depletion_titer_response
    name: Autoantibody depletion with blinded symptom and titer tracking
    description: >-
      Test immunomodulatory or antibody-depletion therapy in antibody-positive
      POTS with blinded orthostatic hemodynamic outcomes, symptom scores, and
      serial receptor-autoantibody titers to determine whether clinical response
      follows antibody reduction.
  - experiment_id: exp_pots_receptor_autoantibody_passive_transfer
    name: Passive-transfer testing of purified POTS receptor autoantibodies
    description: >-
      Transfer patient immunoglobulin or affinity-purified receptor antibodies
      into an autonomic signaling model and measure vascular tone, heart-rate
      responses, and autonomic nerve function against healthy-control IgG.
  - experiment_id: exp_pots_blinded_multiplatform_gpcr_autoantibody_assays
    name: Blinded multi-platform GPCR autoantibody assay validation
    description: >-
      Compare antibody-positive POTS, antibody-negative POTS, disease-control,
      and healthy-control serum across ELISA and functional receptor bioassay
      platforms to determine whether receptor specificity and functional
      activity replicate independently.
  - experiment_id: exp_pots_longitudinal_autoantibody_phenotyping
    name: Longitudinal antibody and subtype phenotyping cohort
    description: >-
      Follow incident POTS patients with repeated ADRA1, ADRB1, ADRB2, M4R, and
      AT1R antibody assays, autonomic testing, plasma-volume measures, and
      small-fiber neuropathy readouts to separate causal trajectories from
      stable biomarkers.
  evidence:
  - reference: PMID:40432440
    reference_title: "Autoimmune Antibodies in Orthostatic Intolerance Syndromes."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Autoimmune mechanisms may lead to abnormal regulation of the
      renin-angiotensin-aldosterone system and may contribute to the
      pathophysiology of POTS.
    explanation: >-
      The authors interpret their antibody findings as potentially mechanistic,
      but the wording remains cautious and supports keeping causality open.
  - reference: PMID:40432440
    reference_title: "Autoimmune Antibodies in Orthostatic Intolerance Syndromes."
    supports: PARTIAL
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Autoantibody concentration against ADRA1, ADRB1, ADRB2, and M4R were not
      significantly different between the groups.
    explanation: >-
      The negative adrenergic/muscarinic result in this cohort supports the
      knowledge gap about receptor specificity and assay/cohort heterogeneity.
  - reference: PMID:35766055
    reference_title: "Detection of G Protein-Coupled Receptor Autoantibodies in Postural Orthostatic Tachycardia Syndrome Using Standard Methodology."
    supports: REFUTE
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Autoantibody concentrations against all of the receptors tested were not
      significantly different between controls and patients with POTS.
    explanation: >-
      A larger standard ELISA study found no group differences across tested
      cardiovascular GPCR autoantibodies, reinforcing that assay method and
      receptor specificity remain unresolved.
  - reference: PMID:38311655
    reference_title: "Randomized controlled trial of intravenous immunoglobulin for autoimmune postural orthostatic tachycardia syndrome (iSTAND)."
    supports: PARTIAL
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      This small randomized controlled trial of IVIG in POTS found no
      statistical difference in response compared with albumin infusion.
    explanation: >-
      The negative, underpowered immunotherapy trial supports keeping antibody
      causality and treatment responsiveness open rather than settled.
- discussion_id: gap_pots_mcas_etiologic_heterogeneity
  prompt: >-
    Does mast cell activation syndrome identify a mechanistic POTS subset, a
    comorbidity that amplifies orthostatic symptoms, or a marker of broader
    etiological heterogeneity?
  kind: KNOWLEDGE_GAP
  status: OPEN
  attaches_to:
  - mechanistic_hypothesis#autoimmune_receptor_model
  - pathophysiology#Autoimmune Autonomic Dysfunction
  - pathophysiology#Venous Pooling and Reduced Preload
  rationale: >-
    MCAS is relevant to immune and autonomic phenotyping, but the available
    abstract-level evidence describes association and preliminary classification
    rather than a resolved causal edge. This should remain a knowledge gap until
    mediator-driven mechanisms are linked to orthostatic tachycardia outcomes.
  proposed_experiments:
  - experiment_id: exp_pots_mcas_stratified_autonomic_cohort
    name: MCAS-stratified POTS autonomic cohort
    description: >-
      Compare POTS patients with and without objective mast-cell mediator
      elevation using standing catecholamines, plasma-volume measures, skin
      biopsy, and orthostatic symptom provocation to test whether MCAS marks a
      distinct mechanism rather than coincidental comorbidity.
  evidence:
  - reference: PMID:39200375
    reference_title: "Navigating Complexity in Postural Orthostatic Tachycardia Syndrome."
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      It further examines key contributing factors such as dysautonomia,
      thoracic hypovolemia, autonomic neuropathies, sympathetic denervation,
      autoimmune responses, and associations with conditions such as small-fiber
      neuropathy and mast cell activation syndrome.
    explanation: >-
      This review explicitly lists MCAS among POTS-associated conditions while
      also emphasizing multiple competing etiological factors.
  - reference: PMID:39200375
    reference_title: "Navigating Complexity in Postural Orthostatic Tachycardia Syndrome."
    supports: PARTIAL
    evidence_source: OTHER
    snippet: >-
      This classification, while aiming to enhance understanding and optimize
      treatment targets, is presented as a preliminary model needing further
      study and refinement.
    explanation: >-
      Supports treating MCAS and etiological classification as unresolved rather
      than as a settled POTS causal subtype.
phenotypes:
- category: Cardiovascular
