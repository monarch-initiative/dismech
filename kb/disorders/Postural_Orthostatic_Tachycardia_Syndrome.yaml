    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Low-dose oral propranolol significantly attenuated tachycardia and improved
      symptoms in POTS. Higher-dose propranolol did not further improve, and may
      worsen, symptoms.
    explanation: >-
      Randomized crossover trial demonstrating that low-dose propranolol improves
      POTS symptoms while higher doses may be counterproductive.
  - reference: PMID:23616163
    reference_title: "Low-dose propranolol and exercise capacity in postural tachycardia syndrome: a randomized study."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Low-dose propranolol improved VO2max in patients with POTS (24.5 +/- 0.7
