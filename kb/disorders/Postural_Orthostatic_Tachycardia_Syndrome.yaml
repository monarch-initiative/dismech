treatments:
- name: Exercise Training
  description: >-
    Graded exercise programs, particularly recumbent exercise initially, have
    been shown to improve cardiovascular conditioning, expand blood volume, and
    reduce orthostatic tachycardia in POTS patients. After 3 months of training,
    over 50% of patients no longer met criteria for POTS.
  treatment_term:
    preferred_term: physical therapy
    term:
      id: MAXO:0000011
      label: physical therapy
  evidence:
  - reference: PMID:30001836
    reference_title: "Exercise and non-pharmacological treatment of POTS."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      physical reconditioning with exercise training and volume expansion via
      increased salt and fluid intake should be initiated early in the course of
      treatment for patients with POTS if possible. The use of horizontal exercise
      (e.g., rowing, swimming, recumbent bike, etc.) at the beginning is a critical
      strategy, allowing patients to exercise while avoiding the upright posture that
      elicits their POTS symptoms.
    explanation: >-
      Describes the rationale and approach for graded exercise training as a primary
      treatment for POTS.
- name: Volume Expansion and Salt Supplementation
  description: >-
    Increased fluid intake (2-3 liters/day) and sodium supplementation (6-10 g/day)
    to expand plasma volume and improve venous return.
  treatment_term:
    preferred_term: dietary intervention
    term:
      id: MAXO:0000088
      label: dietary intervention
  evidence:
  - reference: PMID:30001836
    reference_title: "Exercise and non-pharmacological treatment of POTS."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      physical reconditioning with exercise training and volume expansion via
      increased salt and fluid intake should be initiated early in the course of
      treatment for patients with POTS if possible.
    explanation: >-
      Recommends volume expansion via salt and fluid intake as an early intervention
      in POTS treatment.
  - reference: PMID:34144933
    reference_title: "Postural orthostatic tachycardia syndrome (POTS): State of the science and clinical care from a 2019 National Institutes of Health Expert Consensus Meeting - Part 1."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Once diagnosed, management typically begins with patient education and
      non-pharmacologic treatment options.
    explanation: >-
      NIH expert consensus confirms non-pharmacologic treatments as first-line management.
- name: Pharmacotherapy - Beta-Blockers
  description: >-
    Low-dose propranolol (20 mg) to attenuate the excessive heart rate response
    upon standing. Higher doses may worsen symptoms despite greater heart rate
    reduction.
  treatment_term:
    preferred_term: beta-blocker pharmacotherapy
    term:
      id: NCIT:C15986
      label: Pharmacotherapy
    therapeutic_agent:
    - preferred_term: propranolol
      term:
        id: CHEBI:8499
        label: propranolol
  evidence:
  - reference: PMID:19687359
    reference_title: "Propranolol decreases tachycardia and improves symptoms in the postural tachycardia syndrome: less is more."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Low-dose oral propranolol significantly attenuated tachycardia and improved
      symptoms in POTS. Higher-dose propranolol did not further improve, and may
      worsen, symptoms.
    explanation: >-
      Randomized crossover trial demonstrating that low-dose propranolol improves
      POTS symptoms while higher doses may be counterproductive.
  - reference: PMID:23616163
    reference_title: "Low-dose propranolol and exercise capacity in postural tachycardia syndrome: a randomized study."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Low-dose propranolol improved VO2max in patients with POTS (24.5 +/- 0.7
      placebo vs 27.6 +/- 1.0 mL/min/kg propranolol; p = 0.024), but not healthy
      subjects.
    explanation: >-
      Randomized study showing low-dose propranolol improved exercise capacity in
      POTS patients.
