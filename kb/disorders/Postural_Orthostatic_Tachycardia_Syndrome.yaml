name: Postural Orthostatic Tachycardia Syndrome
creation_date: "2026-03-07T12:00:00Z"
updated_date: "2026-03-08T15:00:00Z"
category: Complex
parents:
- Autonomic Nervous System Disorder
- Dysautonomia
disease_term:
  preferred_term: postural orthostatic tachycardia syndrome
  term:
    id: MONDO:0011479
    label: postural orthostatic tachycardia syndrome
has_subtypes:
- name: Neuropathic POTS
  description: >-
    Characterized by peripheral sympathetic denervation, particularly in the lower
    extremities, leading to impaired vasoconstriction and venous blood pooling upon standing.
  evidence:
  - reference: PMID:31412221
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      The three major pathophysiologic mechanisms include partial autonomic neuropathy,
      hypovolemia, and hyperadrenergic state. Patients often will exhibit overlapping
      characteristics from more than one of these mechanisms.
    explanation: >-
      Identifies partial autonomic neuropathy as one of the three major pathophysiologic
      mechanisms of POTS.
  - reference: PMID:24647968
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      A subset of neuropathic POTS patients may harbor mild small fiber neuropathy
      with abnormalities of unmyelinated nerve fibers in the skin associated with
      reduced myocardial postganglionic sympathetic innervation.
    explanation: >-
      Demonstrates small fiber neuropathy with cardiac sympathetic denervation in
      neuropathic POTS patients.
- name: Hyperadrenergic POTS
  description: >-
    Characterized by elevated standing norepinephrine levels (>600 pg/mL), often with
    hypertension upon standing, and excessive sympathetic nervous system activation.
  evidence:
  - reference: PMID:31412221
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      The three major pathophysiologic mechanisms include partial autonomic neuropathy,
      hypovolemia, and hyperadrenergic state.
    explanation: >-
      Identifies the hyperadrenergic state as one of the three major pathophysiologic
      mechanisms of POTS.
- name: Hypovolemic POTS
  description: >-
    Associated with low blood volume and reduced plasma and red cell volumes,
    contributing to inadequate cardiac preload upon standing.
  evidence:
  - reference: PMID:30001836
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      cardiovascular deconditioning (i.e., cardiac atrophy and hypovolemia) contributes
      significantly to the Postural Orthostatic Tachycardia Syndrome (POTS) and its
      functional disability.
    explanation: >-
      Identifies cardiovascular deconditioning and hypovolemia as a significant
      contributor to POTS.
pathophysiology:
- name: Autonomic Dysregulation
  description: >-
    Impaired autonomic nervous system function leads to an inappropriate cardiovascular
    response upon assuming an upright posture. The normal baroreceptor-mediated reflex arc
    fails to adequately compensate for gravitational blood pooling, resulting in
    excessive heart rate increase to maintain cardiac output.
  cell_types:
  - preferred_term: Sympathetic neuron
    term:
      id: CL:0011103
      label: sympathetic neuron
  biological_processes:
  - preferred_term: Regulation of heart rate
    term:
      id: GO:0002027
      label: regulation of heart rate
  - preferred_term: Regulation of blood pressure
    term:
      id: GO:0008217
      label: regulation of blood pressure
  - preferred_term: Regulation of systemic arterial blood pressure by norepinephrine-epinephrine
    term:
      id: GO:0001993
      label: regulation of systemic arterial blood pressure by norepinephrine-epinephrine
  evidence:
  - reference: PMID:34144933
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      A variety of pathophysiologies are involved in the abnormal postural
      tachycardia response; however, the pathophysiology of the syndrome is
      incompletely understood and undoubtedly multifaceted.
    explanation: >-
      NIH expert consensus confirms POTS involves multiple pathophysiologic mechanisms
      affecting the cardiovascular autonomic response.
  - reference: PMID:30372565
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Postural orthostatic tachycardia syndrome (POTS) is a variant of cardiovascular
      autonomic disorder characterized by an excessive heart rate increase on standing
      and orthostatic intolerance.
    explanation: >-
      Defines POTS as a cardiovascular autonomic disorder with excessive heart rate
      increase on standing.
- name: Peripheral Vasoconstriction Failure
  description: >-
    In neuropathic POTS, partial sympathetic denervation of the lower extremities
    leads to impaired norepinephrine-mediated vasoconstriction. This results in
    excessive venous pooling in the splanchnic and lower limb vasculature upon
    standing, reducing venous return and cardiac preload.
  cell_types:
  - preferred_term: Endothelial cell of vascular tree
    term:
      id: CL:0002139
      label: endothelial cell of vascular tree
  biological_processes:
  - preferred_term: Vasoconstriction
    term:
      id: GO:0042310
      label: vasoconstriction
  evidence:
  - reference: PMID:31412221
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Stockings, abdominal binders, and vasoconstrictors are used to enhance venous
      return in partial neuropathic POTS.
    explanation: >-
      Confirms that neuropathic POTS involves impaired venous return addressed by
      vasoconstriction-enhancing interventions.
  - reference: PMID:36055438
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      The 3 major hypotheses about the pathophysiology of POTS are autoimmunity,
      abnormally increased sympathetic activity, and sympathetic denervation leading
      to central hypovolemia and reflex tachycardia.
    explanation: >-
      Describes sympathetic denervation leading to central hypovolemia and reflex
      tachycardia as a major POTS pathophysiology hypothesis.
- name: Autoimmune and Post-Infectious Mechanisms
  description: >-
    A subset of POTS cases develop following viral infections (including SARS-CoV-2)
    or have autoantibodies targeting adrenergic, muscarinic, or ganglionic
    acetylcholine receptors, suggesting autoimmune-mediated autonomic dysfunction.
  cell_types:
  - preferred_term: Mast cell
    term:
      id: CL:0000097
      label: mast cell
  biological_processes:
  - preferred_term: Inflammatory response
    term:
      id: GO:0006954
      label: inflammatory response
  evidence:
  - reference: PMID:31495251
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      We detected a significant number of patients with elevated levels of
      autoantibodies against the adrenergic alpha 1 receptor (89%) and against the
      muscarinic acetylcholine M4 receptor (53%).
    explanation: >-
      Demonstrates elevated G-protein coupled receptor autoantibodies in POTS patients,
      supporting an autoimmune mechanism.
  - reference: PMID:34144933
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      The onset of POTS may be precipitated by immunological stressors such as a viral
      infection.
    explanation: >-
      NIH expert consensus confirms that viral infections can precipitate POTS onset.
  - reference: PMID:38163814
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Many severely affected patients with long COVID meet the diagnostic criteria for
      two common presentations of CVAD: postural orthostatic tachycardia syndrome and
      inappropriate sinus tachycardia.
    explanation: >-
      Confirms that post-COVID-19 syndrome can cause cardiovascular autonomic dysfunction
      including POTS.
- name: Hyperadrenergic State
  description: >-
    Elevated central sympathetic outflow and excessive circulating norepinephrine
    produce hyperadrenergic symptoms including standing hypertension, tremor,
    and anxiety. This may reflect a primary central nervous system abnormality
    or a compensatory response to hypovolemia.
  biological_processes:
  - preferred_term: Positive regulation of heart rate by norepinephrine
    term:
      id: GO:0003066
      label: positive regulation of heart rate by norepinephrine
  evidence:
  - reference: PMID:30372565
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      The aetiology of POTS is largely unknown and three main hypotheses include an
      autoimmune disorder, abnormally increased sympathetic activity and catecholamine
      excess, and sympathetic denervation leading to central hypovolaemia and reflex
      tachycardia.
    explanation: >-
      Identifies abnormally increased sympathetic activity and catecholamine excess
      as a main pathophysiological hypothesis in POTS.
  - reference: PMID:19687359
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Postural tachycardia syndrome (POTS) induces disabling chronic orthostatic
      intolerance with an excessive increase in heart rate on standing.
    explanation: >-
      Describes the excessive heart rate increase characteristic of POTS, which in
      the hyperadrenergic subtype is driven by elevated sympathetic tone.
- name: Cardiovascular Deconditioning
  description: >-
    Many POTS patients exhibit cardiovascular deconditioning with cardiac atrophy,
    reduced heart size and mass, and hypovolemia. This deconditioning may be a cause
    or consequence of the disorder and contributes significantly to functional disability.
  biological_processes:
  - preferred_term: Regulation of heart rate
    term:
      id: GO:0002027
      label: regulation of heart rate
  evidence:
  - reference: PMID:30001836
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Recent research has demonstrated that cardiovascular deconditioning (i.e.,
      cardiac atrophy and hypovolemia) contributes significantly to the Postural
      Orthostatic Tachycardia Syndrome (POTS) and its functional disability.
    explanation: >-
      Establishes cardiovascular deconditioning as a significant contributor to POTS
      pathophysiology and disability.
phenotypes:
- category: Cardiovascular
  name: Orthostatic Tachycardia
  frequency: OBLIGATE
  diagnostic: true
  description: >-
    Sustained heart rate increase of 30 bpm or more (or >40 bpm in adolescents)
    within 10 minutes of standing or head-up tilt, without orthostatic hypotension.
  phenotype_term:
    preferred_term: Orthostatic tachycardia
    term:
      id: HP:0012173
      label: Orthostatic tachycardia
  evidence:
  - reference: PMID:31412221
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Postural orthostatic tachycardia syndrome (POTS) is a clinically heterogeneous
      disorder with multiple contributing pathophysiologic mechanisms manifesting as
      symptoms of orthostatic intolerance in the setting of orthostatic tachycardia
      (increase in heart rate by at least 30 beats per minute upon assuming an upright
      position) without orthostatic hypotension.
    explanation: >-
      Defines the diagnostic criterion of 30 bpm heart rate increase upon standing
      without orthostatic hypotension.
- category: Cardiovascular
  name: Palpitations
  frequency: VERY_FREQUENT
  description: >-
    Awareness of rapid or forceful heartbeat, often triggered by standing or exertion.
  phenotype_term:
    preferred_term: Palpitations
    term:
      id: HP:0001962
      label: Palpitations
  evidence:
  - reference: PMID:30372565
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      The most common complaints are dizziness, weakness, rapid heartbeat and
      palpitation on standing.
    explanation: >-
      Identifies palpitations as one of the most common complaints in POTS patients.
- category: Neurological
  name: Brain Fog
  frequency: VERY_FREQUENT
  description: >-
    Cognitive impairment characterized by difficulty concentrating, poor memory,
    and mental clouding, particularly when upright.
  phenotype_term:
    preferred_term: Brain fog
    term:
      id: HP:0033630
      label: Brain fog
  evidence:
  - reference: PMID:36055438
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Postural Orthostatic Tachycardia Syndrome (POTS) is a variant of autonomic
      cardiovascular disorder characterized by an excessive increase in heart rate
      upon standing associated with light-headedness, headaches, chest pain, shortness
      of breath, and brain fog.
    explanation: >-
      Identifies brain fog as a characteristic symptom of POTS.
- category: Neurological
  name: Headache
  frequency: FREQUENT
  description: >-
    Headaches, often orthostatic in nature, worsening upon standing and improving
