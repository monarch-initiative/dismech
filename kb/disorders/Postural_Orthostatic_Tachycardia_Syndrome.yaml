name: Postural Orthostatic Tachycardia Syndrome
creation_date: "2026-03-07T12:00:00Z"
updated_date: "2026-03-07T12:00:00Z"
category: Complex
parents:
- Autonomic Nervous System Disorder
- Dysautonomia
disease_term:
  preferred_term: postural orthostatic tachycardia syndrome
  term:
    id: MONDO:0011479
    label: postural orthostatic tachycardia syndrome
has_subtypes:
- name: Neuropathic POTS
  description: >-
    Characterized by peripheral sympathetic denervation, particularly in the lower
    extremities, leading to impaired vasoconstriction and venous blood pooling upon standing.
- name: Hyperadrenergic POTS
  description: >-
    Characterized by elevated standing norepinephrine levels (>600 pg/mL), often with
    hypertension upon standing, and excessive sympathetic nervous system activation.
- name: Hypovolemic POTS
  description: >-
    Associated with low blood volume and reduced plasma and red cell volumes,
    contributing to inadequate cardiac preload upon standing.
pathophysiology:
- name: Autonomic Dysregulation
  description: >-
    Impaired autonomic nervous system function leads to an inappropriate cardiovascular
    response upon assuming an upright posture. The normal baroreceptor-mediated reflex arc
    fails to adequately compensate for gravitational blood pooling, resulting in
    excessive heart rate increase to maintain cardiac output.
  cell_types:
  - preferred_term: Sympathetic neuron
    term:
      id: CL:0011103
      label: sympathetic neuron
  biological_processes:
  - preferred_term: Regulation of heart rate
    term:
      id: GO:0002027
      label: regulation of heart rate
  - preferred_term: Regulation of blood pressure
    term:
      id: GO:0008217
      label: regulation of blood pressure
  - preferred_term: Regulation of systemic arterial blood pressure by norepinephrine-epinephrine
    term:
      id: GO:0001993
      label: regulation of systemic arterial blood pressure by norepinephrine-epinephrine
- name: Peripheral Vasoconstriction Failure
  description: >-
    In neuropathic POTS, partial sympathetic denervation of the lower extremities
    leads to impaired norepinephrine-mediated vasoconstriction. This results in
    excessive venous pooling in the splanchnic and lower limb vasculature upon
    standing, reducing venous return and cardiac preload.
  cell_types:
  - preferred_term: Endothelial cell of vascular tree
    term:
      id: CL:0002139
      label: endothelial cell of vascular tree
  biological_processes:
  - preferred_term: Vasoconstriction
    term:
      id: GO:0042310
      label: vasoconstriction
- name: Autoimmune and Post-Infectious Mechanisms
  description: >-
    A subset of POTS cases develop following viral infections (including SARS-CoV-2)
    or have autoantibodies targeting adrenergic, muscarinic, or ganglionic
    acetylcholine receptors, suggesting autoimmune-mediated autonomic dysfunction.
  cell_types:
  - preferred_term: Mast cell
    term:
      id: CL:0000097
      label: mast cell
  biological_processes:
  - preferred_term: Inflammatory response
    term:
      id: GO:0006954
      label: inflammatory response
- name: Hyperadrenergic State
  description: >-
    Elevated central sympathetic outflow and excessive circulating norepinephrine
    produce hyperadrenergic symptoms including standing hypertension, tremor,
    and anxiety. This may reflect a primary central nervous system abnormality
    or a compensatory response to hypovolemia.
  biological_processes:
  - preferred_term: Positive regulation of heart rate by norepinephrine
    term:
      id: GO:0003066
      label: positive regulation of heart rate by norepinephrine
phenotypes:
- category: Cardiovascular
  name: Orthostatic Tachycardia
  frequency: OBLIGATE
  diagnostic: true
  description: >-
    Sustained heart rate increase of 30 bpm or more (or >40 bpm in adolescents)
    within 10 minutes of standing or head-up tilt, without orthostatic hypotension.
  phenotype_term:
    preferred_term: Orthostatic tachycardia
    term:
      id: HP:0012173
      label: Orthostatic tachycardia
- category: Cardiovascular
  name: Palpitations
  frequency: VERY_FREQUENT
  description: >-
    Awareness of rapid or forceful heartbeat, often triggered by standing or exertion.
  phenotype_term:
    preferred_term: Palpitations
    term:
      id: HP:0001962
      label: Palpitations
- category: Neurological
  name: Brain Fog
  frequency: VERY_FREQUENT
  description: >-
    Cognitive impairment characterized by difficulty concentrating, poor memory,
    and mental clouding, particularly when upright.
  phenotype_term:
    preferred_term: Brain fog
    term:
      id: HP:0033630
      label: Brain fog
- category: Neurological
  name: Headache
  frequency: FREQUENT
  description: >-
    Headaches, often orthostatic in nature, worsening upon standing and improving
    when recumbent.
  phenotype_term:
    preferred_term: Headache
    term:
      id: HP:0002315
      label: Headache
- category: Neurological
  name: Syncope
  frequency: OCCASIONAL
  description: >-
    Transient loss of consciousness due to cerebral hypoperfusion, occurring in
    a subset of patients.
  phenotype_term:
    preferred_term: Syncope
    term:
      id: HP:0001279
      label: Syncope
- category: Constitutional
  name: Fatigue
  frequency: VERY_FREQUENT
  description: >-
    Chronic, debilitating fatigue that significantly impairs daily activities and
    is one of the most disabling symptoms of POTS.
  phenotype_term:
    preferred_term: Fatigue
    term:
      id: HP:0012378
      label: Fatigue
- category: Constitutional
  name: Exercise Intolerance
  frequency: VERY_FREQUENT
  description: >-
    Reduced ability to perform physical activity, with exaggerated heart rate
    response and symptom exacerbation during exercise.
  phenotype_term:
    preferred_term: Exercise intolerance
    term:
      id: HP:0003546
      label: Exercise intolerance
- category: Gastrointestinal
  name: Nausea
  frequency: FREQUENT
  description: >-
    Nausea, often postprandial or positional, related to splanchnic blood pooling
    and gastrointestinal dysmotility.
  phenotype_term:
    preferred_term: Nausea
    term:
      id: HP:0002018
      label: Nausea
- category: Respiratory
  name: Dyspnea
  frequency: FREQUENT
  description: >-
    Subjective breathlessness, particularly upon standing or exertion, despite
    normal pulmonary function.
  phenotype_term:
    preferred_term: Dyspnea
    term:
      id: HP:0002094
      label: Dyspnea
- category: Cardiovascular
  name: Chest Pain
  frequency: FREQUENT
  description: >-
    Non-cardiac chest pain, frequently described as pressure or tightness,
    exacerbated by upright posture.
  phenotype_term:
    preferred_term: Chest pain
    term:
      id: HP:0100749
      label: Chest pain
- category: Neurological
  name: Tremor
  frequency: OCCASIONAL
  description: >-
    Postural tremor, particularly in hyperadrenergic POTS, associated with
    elevated catecholamine levels.
  phenotype_term:
    preferred_term: Tremor
    term:
      id: HP:0001337
      label: Tremor
- category: Integumentary
  name: Acrocyanosis
  frequency: OCCASIONAL
  description: >-
    Bluish-red discoloration of the dependent extremities upon standing,
    reflecting venous pooling and poor peripheral circulation.
  phenotype_term:
    preferred_term: Acrocyanosis
    term:
      id: HP:0001063
      label: Acrocyanosis
- category: Autonomic
  name: Abnormal Autonomic Nervous System Physiology
  frequency: OBLIGATE
  description: >-
    Dysregulation of the autonomic nervous system is the hallmark of POTS,
    manifesting as impaired cardiovascular reflexes and multi-system autonomic
    dysfunction.
  phenotype_term:
    preferred_term: Abnormal autonomic nervous system physiology
    term:
      id: HP:0012332
      label: Abnormal autonomic nervous system physiology
treatments:
- name: Exercise Training
  description: >-
    Graded exercise programs, particularly recumbent exercise initially, have
    been shown to improve cardiovascular conditioning, expand blood volume, and
    reduce orthostatic tachycardia in POTS patients.
  treatment_term:
    preferred_term: physical therapy
    term:
      id: MAXO:0000011
      label: physical therapy
- name: Volume Expansion and Salt Supplementation
  description: >-
    Increased fluid intake (2-3 liters/day) and sodium supplementation (6-10 g/day)
    to expand plasma volume and improve venous return.
  treatment_term:
    preferred_term: dietary intervention
    term:
      id: MAXO:0000088
      label: dietary intervention
- name: Pharmacotherapy - Beta-Blockers
  description: >-
    Low-dose propranolol or other beta-blockers to attenuate the excessive heart
    rate response upon standing. Propranolol is the most commonly studied agent.
  treatment_term:
    preferred_term: beta-blocker pharmacotherapy
    term:
      id: MAXO:0000058
      label: pharmacotherapy
- name: Pharmacotherapy - Midodrine
  description: >-
    Alpha-1 adrenergic agonist that promotes peripheral vasoconstriction,
    improving venous return and reducing orthostatic symptoms.
  treatment_term:
    preferred_term: midodrine pharmacotherapy
    term:
      id: MAXO:0000058
      label: pharmacotherapy
- name: Pharmacotherapy - Fludrocortisone
  description: >-
    Mineralocorticoid that promotes sodium and fluid retention to expand
    intravascular volume.
  treatment_term:
    preferred_term: fludrocortisone pharmacotherapy
    term:
      id: MAXO:0000058
      label: pharmacotherapy
- name: Compression Garments
  description: >-
    Abdominal binders and lower extremity compression stockings to reduce venous
    pooling and improve venous return upon standing.
  treatment_term:
    preferred_term: supportive care
    term:
      id: MAXO:0000950
      label: supportive care
datasets:
