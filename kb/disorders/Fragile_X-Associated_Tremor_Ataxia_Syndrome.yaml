- name: Glial and oligodendrocyte dysregulation
  description: >-
    Human postmortem single-nucleus RNA-seq of frontal cortex and cerebellum implicates
    glial dysregulation as a critical, upstream facet of premutation pathophysiology,
    with cell-type- and region-specific dysregulation of FMR1 protein-target gene
    networks, decreased cortical astrocyte proportions, and notable perturbation of the
    cortical oligodendrocyte lineage, consistent with the white-matter pathology seen
    radiologically.
