    snippet: "In Drosophila, ubiquitin proteasome system (UPS) impairment led to enhancement of CGG-repeat-induced degeneration, whereas overexpression of the chaperone protein HSP70 suppressed this toxicity."
    explanation: The Drosophila model demonstrates a genetic interaction between UPS impairment and CGG-repeat toxicity, supporting proteostasis failure as a driver of degeneration.
  - reference: PMID:26060190
    reference_title: "Reversibility of neuropathology and motor deficits in an inducible mouse model for FXTAS."
    supports: SUPPORT
