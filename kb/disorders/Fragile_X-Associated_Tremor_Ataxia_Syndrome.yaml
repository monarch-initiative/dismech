name: Fragile X-Associated Tremor Ataxia Syndrome
creation_date: "2026-06-04T12:00:00Z"
category: Mendelian
parents:
- Trinucleotide Repeat Disorder
- X-linked Cerebellar Ataxia
description: >-
  Fragile X-associated tremor/ataxia syndrome (FXTAS) is a late-onset, progressive
  neurodegenerative disorder of FMR1 premutation carriers (55-200 CGG repeats in the
  FMR1 5' UTR). It is mechanistically and clinically distinct from full-mutation fragile
  X syndrome: rather than FMR1 silencing and FMRP loss, FXTAS is driven by an RNA
  toxic gain-of-function from elevated CGG-repeat FMR1 mRNA (sequestration of
  RNA-binding proteins) together with repeat-associated non-AUG (RAN) translation that
  produces a toxic polyglycine protein, FMRpolyG. The neuropathological hallmark is
  ubiquitin-positive intranuclear inclusions in neurons and astrocytes. Core clinical
  features are adult-onset intention/action tremor and cerebellar gait ataxia, with
  parkinsonism, executive dysfunction and dementia, peripheral neuropathy, and
  dysautonomia; the radiologic hallmark is increased T2 signal in the middle cerebellar
  peduncles (the MCP sign).
