    snippet: "In transfected mammalian cells, CGG repeat expression triggered accumulation of a UPS reporter in a length-dependent fashion."
    explanation: Cell-based data show CGG-repeat expression impairs the ubiquitin-proteasome system in a length-dependent manner.
  - reference: PMID:25954027
