    snippet: "8 weeks of dox exposure was sufficient to induce the formation of ubiquitin-positive intranuclear inclusions, which also stain positive for the RAN translation product FMRpolyG."
    explanation: An inducible mouse model confirms FMRpolyG is a component of the FXTAS-type ubiquitin-positive intranuclear inclusions.
- name: Ubiquitin-proteasome system and autophagy impairment
  description: >-
    FXTAS inclusions are enriched for components of the protein-degradation machinery.
    Nearly 200 proteins have been identified in FXTAS inclusions, with SUMO2, ubiquitin,
    and p62/SQSTM1 among the most abundant. Postmortem FXTAS brains are positive for
    SUMO2/3 conjugates and show transcriptional upregulation of SUMOylation, while
    patient fibroblasts accumulate p62 and autophagosomes with downregulation of
    autophagy-related gene-ontology terms, indicating impaired autophagic flux.
  cell_types:
