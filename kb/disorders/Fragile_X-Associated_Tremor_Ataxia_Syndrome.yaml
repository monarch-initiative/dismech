    snippet: "FMR1 disorders are inherited in an X-linked manner."
    explanation: GeneReviews establishes X-linked inheritance for FMR1 disorders, including FXTAS.
  - reference: PMID:20301558
    reference_title: "FMR1 Disorders."
    supports: SUPPORT
    evidence_source: OTHER
    snippet: "Age of onset is typically between 60 and 65 years and is more common among males who are hemizygous for the premutation (40%) than among females who are heterozygous for the premutation (16%-20%)."
    explanation: GeneReviews documents the sex-differential, age-dependent penetrance of FXTAS among premutation carriers.
mechanistic_hypotheses:
- hypothesis_group_id: canonical_fmr1_premutation_rna_gof_ran_translation_model
  hypothesis_label: Canonical FMR1 Premutation RNA Gain-of-Function / RAN-Translation (FMRpolyG) Model
  status: CANONICAL
  description: >-
    FXTAS arises from a 55-200 CGG repeat premutation expansion in the FMR1 5' UTR.
    Unlike the full mutation (which silences FMR1 and causes fragile X syndrome via
    FMRP loss), the premutation is transcribed at elevated levels and is pathogenic
    through two non-exclusive gain-of-function routes: (1) RNA toxicity, in which the
    expanded CGG-repeat FMR1 mRNA sequesters CGG-repeat-binding proteins (e.g., Pur
    alpha, hnRNP A2/B1) into RNA foci, depleting them from their normal functions; and
    (2) repeat-associated non-AUG (RAN) translation, which produces a toxic polyglycine
    protein, FMRpolyG, that drives ubiquitin-proteasome system impairment. These
    converge on ubiquitin-positive intranuclear inclusions in neurons and astrocytes,
    proteostasis/autophagy failure, mitochondrial dysfunction and oxidative stress, and
    glial/white-matter disruption, culminating in cerebellar and fronto-subcortical
    circuit degeneration.
  evidence:
  - reference: PMID:17618523
    reference_title: "Fragile X-associated tremor/ataxia syndrome: clinical features, genetics, and testing guidelines."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "The pathogenic mechanism is related to overexpression and toxicity of the FMR1 mRNA per se."
    explanation: The landmark clinical/genetics review establishes the FMR1 mRNA toxic gain-of-function as the core mechanism distinguishing FXTAS from fragile X syndrome.
  - reference: PMID:25954027
    reference_title: "RAN translation at CGG repeats induces ubiquitin proteasome system impairment in models of fragile X-associated tremor ataxia syndrome."
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: "the repeat also elicits production of a toxic polyglycine protein, FMRpolyG, via repeat-associated non-AUG (RAN)-initiated translation"
    explanation: This adds RAN translation of FMRpolyG as a parallel toxic gain-of-function arm of the canonical model.
pathophysiology:
- name: FMR1 premutation CGG expansion and elevated FMR1 mRNA
  description: >-
    The initiating lesion is a premutation-range (55-200 CGG) trinucleotide repeat
    expansion in the FMR1 5' UTR. In contrast to the full mutation, the premutation
    allele is not silenced; it is transcribed at elevated levels, producing an
    expanded CGG-repeat FMR1 mRNA that is the substrate for downstream RNA toxicity
    and RAN translation. Human postmortem single-nucleus RNA-seq shows the magnitude
    of FMR1 upregulation in brain is more modest (~1.3-fold in some glia) than the
    4-8-fold reported in peripheral blood, implicating tissue- and cell-type-specific
    toxicity.
  gene:
    preferred_term: FMR1
    modifier: INCREASED
    term:
      id: hgnc:3775
      label: FMR1
