    snippet: "Nearly 200 different proteins have been identified in FXTAS inclusions, being the small ubiquitin-related modifier 2 (SUMO2), ubiquitin and p62 the most highly abundant."
    explanation: Identifies the protein-degradation-machinery composition of FXTAS inclusions, supporting proteostasis dysfunction.
  - reference: PMID:37830578
    reference_title: "Exploration of SUMO2/3 Expression Levels and Autophagy Process in Fragile X-Associated Tremor/Ataxia Syndrome."
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: "the analysis of the autophagy flux showed the accumulation of p62 protein levels and autophagosomes in skin fibroblasts from FXTAS patients. Similarly, gene set analysis evidenced a significant downregulation in gene ontology terms related to autophagy in FXTAS samples."
    explanation: Patient fibroblast and transcriptomic data support impaired autophagic flux as part of FXTAS proteostasis failure.
- name: Mitochondrial dysfunction and oxidative stress
  description: >-
    Mitochondrial dysfunction is a convergent downstream mechanism in FXTAS, including
    impaired mitochondrial protein import, altered morphology, disrupted calcium
    handling, reduced respiratory-chain activity, and elevated reactive oxygen species
    with lipid peroxidation and protein carbonylation. These changes amplify neuronal
    injury and have motivated antioxidant and mitochondrial-nutrient therapeutic
    strategies.
