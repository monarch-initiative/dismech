    explanation: Identifies Pur alpha as a sequestered RNA-binding protein whose restoration rescues toxicity and which co-localizes with FXTAS inclusions.
- name: RAN translation and FMRpolyG production
  description: >-
    The expanded CGG repeat undergoes repeat-associated non-AUG (RAN) translation,
    generating a toxic polyglycine-containing protein, FMRpolyG. FMRpolyG accumulates
    within the characteristic intranuclear inclusions and impairs the
    ubiquitin-proteasome system. In cell models, driving FMRpolyG expression enhances
    UPS impairment, whereas preventing RAN translation attenuates it.
  cell_types:
