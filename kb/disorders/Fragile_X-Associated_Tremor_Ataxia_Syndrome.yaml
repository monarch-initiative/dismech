    supports: SUPPORT
    evidence_source: OTHER
    snippet: "Agents/circumstances to avoid: FXTAS: typical and atypical antipsychotics with significant anti-dopaminergic effects and metoclopramide, which can exacerbate parkinsonism; anticholinergic agents, which can exacerbate cognitive complaints; excessive alcohol, which can enhance cerebellar dysfunction and postural instability; agents with known cerebellar toxicity or side effects."
    explanation: GeneReviews specifies drug-safety warnings (Agents/Circumstances to Avoid) for FXTAS.
