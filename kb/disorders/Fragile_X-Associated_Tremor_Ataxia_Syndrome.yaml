    description: >-
      The expanded CGG repeat is a substrate for repeat-associated non-AUG (RAN)
      translation, producing the toxic polyglycine protein FMRpolyG.
  - target: Glial and oligodendrocyte dysregulation
    causal_link_type: INDIRECT_UNKNOWN_INTERMEDIATES
    description: >-
      Premutation-range FMR1 expansion and elevated FMR1 mRNA drive cell-type- and
      region-specific glial and oligodendrocyte-lineage transcriptional dysregulation,
      an upstream facet of premutation brain pathophysiology.
  evidence:
  - reference: PMID:17618523
    reference_title: "Fragile X-associated tremor/ataxia syndrome: clinical features, genetics, and testing guidelines."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "FXTAS is caused by moderate expansions (55-200 repeats; premutation range) of a CGG trinucleotide in the fragile X mental retardation 1 (FMR1) gene, the same gene which causes fragile X syndrome when in the full mutation range (200 or greater CGG repeats)."
    explanation: Establishes the premutation-range CGG expansion in FMR1 as the causal genetic lesion of FXTAS, distinct from the full mutation.
  - reference: PMID:37252957
    reference_title: "Glial dysregulation in the human brain in fragile X-associated tremor/ataxia syndrome."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "We found only modest upregulation (~1.3-fold) of FMR1 in some glial populations associated with premutation expansions."
    explanation: Human brain single-nucleus RNA-seq quantifies the modest tissue-level FMR1 upregulation, refining the RNA-overexpression model.
- name: RNA toxic gain-of-function and protein sequestration
  description: >-
    The expanded CGG-repeat FMR1 mRNA forms nuclear RNA foci that bind and sequester
    specific RNA-binding proteins, including Pur alpha and hnRNP A2/B1, away from their
    normal functions. In a Drosophila model, transcribed premutation repeats alone are
    sufficient to cause neurodegeneration, and Pur alpha overexpression suppresses this
    toxicity, supporting a sequestration mechanism. Pur alpha is also found within the
    intranuclear inclusions of FXTAS patient brains.
  cell_types:
