  description: >-
    FXTAS is transmitted in an X-linked manner via FMR1 premutation alleles, with
    age-dependent reduced penetrance. Penetrance is higher among hemizygous male
    carriers (~40% of males >50) than heterozygous female carriers (~16-20%).
