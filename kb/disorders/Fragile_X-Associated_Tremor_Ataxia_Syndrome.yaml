genetic:
- name: FMR1
  gene_term:
    preferred_term: FMR1
    term:
      id: hgnc:3775
      label: FMR1
  association: Causative premutation CGG repeat expansion (55-200 repeats)
  relationship_type: CAUSATIVE
  variant_origin: GERMLINE
  notes: >-
    FXTAS is caused by a premutation-range CGG repeat expansion (55-200 repeats) in the
    FMR1 5' UTR. Unlike the full mutation (>200 repeats) that silences FMR1 and causes
    fragile X syndrome, the premutation allele is expressed at elevated levels and is
    pathogenic via RNA toxic gain-of-function and RAN translation of FMRpolyG.
  variants:
  - name: FMR1 premutation CGG repeat expansion
    description: >-
      Premutation-range expansion of the FMR1 5' UTR CGG repeat to 55-200 repeats,
      producing elevated expanded-repeat FMR1 mRNA with toxic gain-of-function and RAN
      translation rather than gene silencing.
    gene:
      preferred_term: FMR1
      term:
        id: hgnc:3775
        label: FMR1
    type: trinucleotide repeat expansion
    clinical_significance: PATHOGENIC
  evidence:
  - reference: PMID:17618523
    reference_title: "Fragile X-associated tremor/ataxia syndrome: clinical features, genetics, and testing guidelines."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "FXTAS is caused by moderate expansions (55-200 repeats; premutation range) of a CGG trinucleotide in the fragile X mental retardation 1 (FMR1) gene, the same gene which causes fragile X syndrome when in the full mutation range (200 or greater CGG repeats)."
    explanation: Establishes FMR1 premutation CGG expansion as the causal variant class of FXTAS, distinct from the full mutation.
  - reference: PMID:20301558
    reference_title: "FMR1 Disorders."
    supports: SUPPORT
    evidence_source: OTHER
    snippet: "the diagnosis of FXTAS or FXPOI is associated with a premutation-sized repeat (55-200 CGG repeats)."
    explanation: GeneReviews confirms the premutation-sized (55-200 CGG) repeat as the FXTAS-associated allele class.
prevalence:
- population: FMR1 premutation carriers (general population)
  notes: >-
    FXTAS occurs specifically in FMR1 premutation carriers; not all carriers develop
    FXTAS. General-population premutation carrier frequency is commonly cited as
    roughly 1 in 250-300 females and 1 in 800 males, but a quantitative source is not
    cited here for those specific figures.
  evidence:
  - reference: PMID:41940304
    reference_title: "Comprehensive, multidisciplinary care for fragile X-associated tremor/ataxia syndrome."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "a neurodegenerative disorder affecting FMR1 premutation carriers (55-200 CCG repeats)"
    explanation: Confirms FXTAS occurs specifically in FMR1 premutation carriers.
- population: Male premutation carriers over age 50
  measure_type: CARRIER_FREQUENCY
  prevalence_class: ABOVE_1_IN_1000
  rate_per_100000: 40000.0
  percentage: "~40%"
  notes: >-
    Age-dependent penetrance of FXTAS is higher in male (40%) than female (16-20%)
    premutation carriers (GeneReviews).
  evidence:
  - reference: PMID:20301558
    reference_title: "FMR1 Disorders."
    supports: SUPPORT
    evidence_source: OTHER
    snippet: "more common among males who are hemizygous for the premutation (40%) than among females who are heterozygous for the premutation (16%-20%)."
    explanation: GeneReviews documents the higher FXTAS penetrance in male than female premutation carriers.
progression:
- phase: Onset
  age_range: Typically age 60-65 (after age 50)
  notes: >-
    FXTAS is a late-onset disorder; tremor usually appears first, with median onset
    around age 60 in male carriers.
  evidence:
  - reference: PMID:20301558
    reference_title: "FMR1 Disorders."
    supports: SUPPORT
    evidence_source: OTHER
    snippet: "Age of onset is typically between 60 and 65 years"
    explanation: GeneReviews documents the late-adult typical age of onset of FXTAS.
  - reference: PMID:17133502
    reference_title: "Progression of tremor and ataxia in male carriers of the FMR1 premutation."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "tremor usually occurs first, with median onset at approximately 60 years of age."
    explanation: Cohort natural-history data support tremor as the first motor sign at median age ~60.
- phase: Progression and survival
  notes: >-
    Median intervals from first motor sign: ataxia 2 years, falls 6 years, walking-aid
    dependence 15 years, and death 21 years; reported survival after onset is variable
    (5-25 years).
  evidence:
  - reference: PMID:17133502
    reference_title: "Progression of tremor and ataxia in male carriers of the FMR1 premutation."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "From the onset of the initial motor sign, median delay of onset of ataxia was 2 years; onset of falls, 6 years; dependence on a walking aid, 15 years; and death, 21 years. Preliminary data on life expectancy are variable, with a range from 5 to 25 years."
    explanation: Provides cohort-based progression milestones and survival range for FXTAS.
