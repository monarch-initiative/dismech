  description: >
    Cerebral vascular dysfunction in preeclampsia can include impaired
    autoregulatory reserve, endothelial injury, blood-brain barrier disruption,
    and vasogenic edema. This branch connects systemic endothelial dysfunction
    to headache, visual symptoms, PRES-like edema, seizures, stroke, and
    eclampsia.
