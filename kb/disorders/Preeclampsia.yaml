    description: Hepatic sinusoidal obstruction and ischemia injure hepatocytes, increasing circulating transaminases.
  - target: Thrombocytopenia
    description: Prothrombotic endothelial injury consumes platelets in the HELLP microangiopathy.
  - target: Hemolytic anemia
    description: Microangiopathic vascular injury fragments erythrocytes and produces hemolysis.
