      supports: SUPPORT
      evidence_source: HUMAN_CLINICAL
      snippet: "Particularly in microcirculations with extremely low shear forces, such as in the hepatic sinusoids, this will facilitate microthrombi formation and fibrin deposition eventually resulting in obstruction of the sinusoids similar as in SOS."
      explanation: Supports the liver-specific endothelial microvascular mechanism for HELLP-related hepatic injury.
  - target: Cerebrovascular Autoregulation Failure and Eclampsia
    description: Cerebral endothelial dysfunction and impaired vascular autoregulation can disrupt the blood-brain barrier, produce vasogenic edema or PRES, and precipitate eclamptic seizures.
    hypothesis_groups:
