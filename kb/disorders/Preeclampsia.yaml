- name: Glomerular Endotheliosis and Proteinuria
  description: >
    Antiangiogenic injury to glomerular endothelial cells disrupts the
    fenestrated filtration barrier, producing glomerular endotheliosis and
    proteinuria. This renal branch is the most direct organ-specific
    consequence of the sFlt-1/VEGF/PlGF imbalance.
