      reference_title: "Excess placental soluble fms-like tyrosine kinase 1 (sFlt1) may contribute to endothelial dysfunction, hypertension, and proteinuria in preeclampsia."
      supports: SUPPORT
      evidence_source: MODEL_ORGANISM
      snippet: "administration of sFlt1 to pregnant rats induces hypertension, proteinuria, and glomerular endotheliosis, the classic lesion of preeclampsia."
      explanation: Directly links sFlt-1-driven endothelial dysfunction to the renal lesion and proteinuria.
  - target: Hepatic Sinusoidal Obstruction and HELLP
    description: Endothelial injury and prothrombotic inflammation can cause hepatic sinusoidal microthrombi, fibrin deposition, hepatocyte ischemia, and the HELLP phenotype.
