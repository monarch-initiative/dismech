    explanation: Demonstrates the renal lesion and proteinuria after sFlt-1 exposure in pregnant rats.
- name: Hepatic Sinusoidal Obstruction and HELLP
  description: >
    In severe preeclampsia and HELLP syndrome, systemic endothelial injury and
    inflammatory prothrombotic signaling can be amplified in hepatic sinusoids,
    where low shear favors microthrombi and fibrin deposition. Sinusoidal
    obstruction causes ischemic hepatocyte injury, elevated liver enzymes,
    platelet consumption, and microangiopathic hemolysis.
  cell_types:
