discussions:
- discussion_id: preeclampsia_upstream_trigger_heterogeneity
  prompt: >
    Which upstream trigger best explains each presentation of preeclampsia:
    decidual immune maladaptation, abnormal placentation, placental stress,
    complement/inflammatory injury, or maternal vascular susceptibility?
  kind: KNOWLEDGE_GAP
  status: OPEN
  attaches_to:
  - pathophysiology#Immune Maladaptation at Maternal-Fetal Interface
  - pathophysiology#Defective Trophoblast Invasion and Spiral Artery Remodeling
  - pathophysiology#Placental Anti-Angiogenic Factor Release
  - pathophysiology#Maternal Vascular Susceptibility Threshold
  rationale: >
    The antiangiogenic endothelial dysfunction pathway is comparatively well
    supported, but the initiating biology is heterogeneous. Resolving whether
    early-onset and late-onset preeclampsia are dominated by distinct upstream
    triggers would improve subtype-specific biomarker interpretation,
    preventive trial design, and organ-risk prediction.
  notes: >-
    Added for monarch-initiative/dismech issue 3667. The OpenScientist
    hypothesis deep-research report for
    early_onset_placenta_dominant is available at
    kb/hypotheses/Preeclampsia/early_onset_placenta_dominant/openscientist.md;
    treat report-specific citation suggestions as literature leads requiring
    independent PMID and snippet verification before adding new evidence.
