name: Preeclampsia
creation_date: "2026-05-13T00:00:00Z"
category: Complex
synonyms:
- Pre-eclampsia
- Toxemia of pregnancy
- Pregnancy-induced hypertension with proteinuria
description: >
  Preeclampsia is a multisystemic pregnancy disorder characterized by new-onset
  hypertension and often proteinuria after 20 weeks of gestation, which can
  progress to multi-organ dysfunction including hepatic, renal, and cerebral
  disease. It complicates 2-8% of pregnancies globally and is a leading cause
  of maternal and perinatal morbidity and mortality. The pathophysiology involves
  defective trophoblast invasion and spiral artery remodeling leading to placental
  ischemia, followed by release of anti-angiogenic factors (sFlt-1, soluble
  endoglin) that cause widespread maternal endothelial dysfunction. The only
  definitive treatment is delivery of the fetus and placenta.
disease_term:
  preferred_term: preeclampsia
  term:
    id: MONDO:0005081
    label: preeclampsia
parents:
- Hypertensive disorder of pregnancy
- Placental disease
has_subtypes:
- name: Early-onset
  display_name: Early-onset preeclampsia (<34 weeks)
  description: >
    Preeclampsia with onset before 34 weeks of gestation. Strongly associated
    with defective placentation and more severe angiogenic imbalance. Associated
    with higher rates of maternal and fetal complications, intrauterine growth
    restriction, and features resembling atherosclerosis.
  evidence:
  - reference: PMID:35177220
    reference_title: "Preeclampsia and eclampsia: the conceptual evolution of a syndrome."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Early-onset preeclampsia has many features in common with atherosclerosis, whereas late-onset preeclampsia seems to result from a mismatch of fetal demands and maternal supply, that is, a metabolic crisis."
    explanation: Distinguishes early-onset preeclampsia as having features of vascular pathology resembling atherosclerosis.
- name: Late-onset
  display_name: Late-onset preeclampsia (>=34 weeks)
  description: >
    Preeclampsia with onset at or after 34 weeks of gestation. The more common
    form, often associated with less severe placental pathology and thought to
    result from a mismatch between fetal metabolic demands and maternal
    cardiovascular supply capacity.
  evidence:
  - reference: PMID:35177220
    reference_title: "Preeclampsia and eclampsia: the conceptual evolution of a syndrome."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Early-onset preeclampsia has many features in common with atherosclerosis, whereas late-onset preeclampsia seems to result from a mismatch of fetal demands and maternal supply, that is, a metabolic crisis."
    explanation: Characterizes late-onset preeclampsia as a metabolic crisis from demand-supply mismatch.
- name: HELLP
  display_name: HELLP syndrome
  description: >
    Severe variant characterized by hemolysis, elevated liver enzymes, and low
    platelet count. Represents the severe end of the preeclampsia spectrum and
    can occur with or without significant hypertension or proteinuria.
  evidence:
  - reference: PMID:34033373
    reference_title: "Preeclampsia."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "This disease represents a spectrum of hypertensive disease in pregnancy, beginning with gestational hypertension and progressing to develop severe features, ultimately leading to its more severe manifestations, such as eclampsia and HELLP syndrome."
    explanation: Identifies HELLP syndrome as a severe manifestation on the preeclampsia spectrum.
progression:
- phase: Postpartum long-term cardiovascular risk
  age_range: Years to decades after affected pregnancy
  notes: >
    A pregnancy affected by preeclampsia is followed by persistently elevated
    maternal vascular risk, including later hypertension, ischemic heart
    disease, stroke, cardiovascular death, and heart failure. This progression
    item records the long-term sequelae without assuming that acute pregnancy
    endothelial injury is the only cause; shared antecedent vascular
    susceptibility may also contribute.
  evidence:
  - reference: PMID:17975258
    reference_title: "Pre-eclampsia and risk of cardiovascular disease and cancer in later life: systematic review and meta-analysis."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "The relative risks (95% confidence intervals) for hypertension were 3.70 (2.70 to 5.05) after 14.1 years weighted mean follow-up, for ischaemic heart disease 2.16 (1.86 to 2.52) after 11.7 years, for stroke 1.81 (1.45 to 2.27) after 10.4 years"
    explanation: Quantifies the long-term post-preeclampsia risks for hypertension, ischemic heart disease, and stroke.
  - reference: PMID:28228456
    reference_title: "Preeclampsia and Future Cardiovascular Health: A Systematic Review and Meta-Analysis."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Preeclampsia is associated with a 4-fold increase in future incident heart failure and a 2-fold increased risk in coronary heart disease, stroke, and death because of coronary heart or cardiovascular disease."
    explanation: Confirms elevated future heart failure, coronary disease, stroke, and cardiovascular mortality risks.
mechanistic_hypotheses:
- hypothesis_group_id: early_onset_placenta_dominant
  hypothesis_label: Early-Onset Placenta-Dominant Antiangiogenic Model
  status: CANONICAL
  applies_to_subtypes:
  - Early-onset
  - HELLP
  description: >
    In early-onset preeclampsia, immune maladaptation at the maternal-fetal
    interface and defective trophoblast invasion produce severe placental
    malperfusion before clinical disease. Placental hypoxia and stress drive a
    marked antiangiogenic shift, especially excess sFlt-1 and soluble endoglin
    with reduced free PlGF, causing maternal endothelial dysfunction and
    organ-specific renal, hepatic, CNS, and uteroplacental manifestations.
  notes: >
    The 2026 OpenScientist hypothesis-search report
    (kb/hypotheses/Preeclampsia/early_onset_placenta_dominant/openscientist.md)
    retained this model as strongly supported after reviewing 98 papers. It
    emphasized convergent support for the antiangiogenic cascade and KIR/HLA-C
    upstream trigger, while flagging three boundaries: late-onset disease is not
    primarily explained by this model, HELLP may include a parallel complement
    microangiopathy branch, and definitive Phase III interventional evidence for
    targeted sFlt-1 reduction is still missing.
  evidence:
  - reference: PMID:35177220
    reference_title: "Preeclampsia and eclampsia: the conceptual evolution of a syndrome."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Early-onset preeclampsia has many features in common with atherosclerosis, whereas late-onset preeclampsia seems to result from a mismatch of fetal demands and maternal supply, that is, a metabolic crisis."
    explanation: Supports modeling early-onset preeclampsia separately from late-onset disease.
- hypothesis_group_id: late_onset_maternal_constitutional
  hypothesis_label: Late-Onset Maternal Constitutional Threshold Model
  status: ALTERNATIVE
  applies_to_subtypes:
  - Late-onset
  description: >
    In late-onset preeclampsia, placental stress and antiangiogenic imbalance
    can be milder, while maternal cardiovascular, metabolic, renal, or immune
    susceptibility lowers the threshold for systemic endothelial dysfunction
    as fetal and placental demands peak near term. This model explains cases
    with limited placental lesions but clinically important hypertension and
    end-organ dysfunction.
  evidence:
  - reference: PMID:35177220
    reference_title: "Preeclampsia and eclampsia: the conceptual evolution of a syndrome."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Early-onset preeclampsia has many features in common with atherosclerosis, whereas late-onset preeclampsia seems to result from a mismatch of fetal demands and maternal supply, that is, a metabolic crisis."
    explanation: Supports a late-onset model centered on maternal-fetal demand-supply mismatch.
pathophysiology:
- name: Immune Maladaptation at Maternal-Fetal Interface
  description: >
    Decidual natural killer cells normally interact with fetal extravillous
    trophoblast HLA-C through maternal KIR receptors and help regulate
    placental development, trophoblast invasion, and spiral artery remodeling.
    In susceptible maternal-fetal genotype combinations, especially maternal
    KIR AA with fetal HLA-C2, excessive inhibitory signaling can reduce dNK
    activation and impair trophoblast invasion. This upstream immune
    maladaptation is modeled as an early-onset, placenta-dominant trigger
    rather than as the established antiangiogenic effector pathway itself.
  cell_types:
  - preferred_term: decidual natural killer cell
    term:
      id: CL:0002343
      label: decidual natural killer cell, human
  - preferred_term: extravillous trophoblast
    term:
      id: CL:0008036
      label: extravillous trophoblast
  biological_processes:
  - preferred_term: maternal-fetal immune tolerance
    term:
      id: GO:0002507
      label: tolerance induction
    modifier: DYSREGULATED
  - preferred_term: natural killer cell activation balance
    term:
      id: GO:0045954
      label: positive regulation of natural killer cell mediated cytotoxicity
    modifier: DYSREGULATED
  downstream:
  - target: Defective Trophoblast Invasion and Spiral Artery Remodeling
    description: Dysregulated dNK-KIR recognition of fetal trophoblast HLA-C can bias the decidua toward inadequate trophoblast invasion and poor spiral artery transformation.
    hypothesis_groups:
    - early_onset_placenta_dominant
    evidence:
    - reference: PMID:15477349
      reference_title: "Combinations of maternal KIR and fetal HLA-C genes influence the risk of preeclampsia and reproductive success."
      supports: SUPPORT
      evidence_source: HUMAN_CLINICAL
      snippet: "Overall, the conclusion is that the interaction between maternal KIR on uNK cells and fetal HLA class I molecules on trophoblast has a physiological function in regulating the development of the placenta"
      explanation: Places maternal KIR and fetal trophoblast HLA interactions upstream of placental development.
  evidence:
  - reference: PMID:15477349
    reference_title: "Combinations of maternal KIR and fetal HLA-C genes influence the risk of preeclampsia and reproductive success."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "We have found that the combination of maternal KIR AA genotype with a fetal HLA-C2 is associated with an increased risk of preeclampsia."
    explanation: Supports the KIR/HLA-C maternal-fetal genotype interaction as an upstream risk mechanism.
  - reference: PMID:15477349
    reference_title: "Combinations of maternal KIR and fetal HLA-C genes influence the risk of preeclampsia and reproductive success."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "too much inhibition of uNK cells leading to poor trophoblast invasion into the uterine arteries."
    explanation: Supports the proposed bridge from excessive inhibitory uterine NK signaling to poor trophoblast invasion.
  - reference: PMID:32309433
    reference_title: "The Roles of Uterine Natural Killer (NK) Cells and KIR/HLA-C Combination in the Development of Preeclampsia: A Systematic Review."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Decidual NK (dNK) cells significantly contribute to the vascular remodeling through the secretion of cytokines and angiogenic mediators in normal placental development."
    explanation: Review evidence supports the role of decidual NK cells in normal placental vascular remodeling.
- name: Maternal Vascular Susceptibility Threshold
  description: >
    Late-onset preeclampsia can be modeled as a threshold phenomenon in which
    near-term fetal and placental demands interact with maternal cardiovascular,
    renal, metabolic, or inflammatory susceptibility. In this model, placental
    antiangiogenic stress can be less severe than in early-onset disease, but
    maternal endothelial reserve is lower, so hypertension and end-organ
    dysfunction emerge when physiologic demand exceeds vascular supply.
  cell_types:
