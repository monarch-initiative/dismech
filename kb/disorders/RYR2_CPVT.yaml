  - reference: PMID:32115705
    reference_title: Molecular and tissue mechanisms of catecholaminergic polymorphic ventricular tachycardia.
    supports: SUPPORT
    evidence_source: OTHER
    snippet: "At present, mutations in six genes involved in SR calcium release have been identified as the genetic cause of CPVT: RYR2 (encoding ryanodine receptor calcium release channel), CASQ2 (encoding cardiac calsequestrin), TRDN (encoding triadin), CALM1, CALM2 and CALM3 (encoding identical calmodulin protein)."
    explanation: Establishes that the core CPVT genes converge on sarcoplasmic reticulum calcium release machinery.
  - reference: PMID:35222090
    reference_title: Molecular Changes in the Cardiac RyR2 With Catecholaminergic Polymorphic Ventricular Tachycardia (CPVT).
    supports: SUPPORT
    evidence_source: OTHER
    snippet: "The most common cellular phenotype in CPVT is higher than normal cytoplasmic Ca2+ concentrations during diastole due to Ca2+ leak from the SR through mutant RyR2."
    explanation: Supports the shared final common mechanism of pathological diastolic calcium leak in CPVT.
  downstream:
  - target: Delayed After-Depolarizations
    description: >-
      Excess cytosolic calcium is extruded by the sodium-calcium exchanger,
      generating an inward depolarizing current that produces delayed
      after-depolarizations.
- name: Delayed After-Depolarizations
  description: >-
    Sodium-calcium exchanger-mediated extrusion of excess cytosolic calcium
    imports sodium and produces delayed after-depolarizations (DADs). When DADs
    reach threshold, they trigger premature ventricular beats that can initiate
    sustained ventricular tachyarrhythmias.
  cell_types:
  - preferred_term: cardiomyocyte
    term:
      id: CL:0000746
      label: cardiac muscle cell
  evidence:
  - reference: PMID:35222090
    reference_title: Molecular Changes in the Cardiac RyR2 With Catecholaminergic Polymorphic Ventricular Tachycardia (CPVT).
    supports: SUPPORT
    evidence_source: OTHER
    snippet: "The Na+ influx leads to delayed after depolarizations (DADs) which trigger arrhythmia when reaching action potential threshold."
    explanation: Directly supports DADs as the electrophysiologic bridge from calcium overload to triggered arrhythmias.
  downstream:
  - target: Catecholamine-Triggered Ventricular Arrhythmia
    description: >-
      DAD-triggered ectopy initiates bidirectional or polymorphic ventricular
      tachycardia, especially during exercise or emotional stress.
- name: Catecholamine-Triggered Ventricular Arrhythmia
  description: >-
    Adrenergic stimulation during exercise or acute emotion provokes
    bidirectional or polymorphic ventricular tachycardia in a structurally
    normal heart. This stress dependence is a defining feature of CPVT and
    explains the diagnostic role of exercise stress testing.
  evidence:
  - reference: PMID:37558300
    reference_title: "Catecholaminergic Polymorphic Ventricular Tachycardia: A Review of Therapeutic Strategies."
    supports: SUPPORT
    evidence_source: OTHER
    snippet: "Catecholaminergic polymorphic ventricular tachycardia (CPVT) is an inherited arrhythmia syndrome characterized by bidirectional or polymorphic ventricular arrhythmia provoked by exercise or emotion."
    explanation: Defines the canonical triggered ventricular arrhythmia phenotype of CPVT.
  - reference: PMID:38542006
    reference_title: "Catecholaminergic Polymorphic Ventricular Tachycardia: Clinical Characteristics, Diagnostic Evaluation and Therapeutic Strategies."
    supports: SUPPORT
    evidence_source: OTHER
    snippet: "Diagnosing CPVT typically involves unmasking the arrhythmia through exercise stress testing. This diagnosis emerges in the absence of structural heart disease by cardiac imaging and with a normal baseline electrocardiogram."
    explanation: Supports exercise stress testing as the key way to reveal the adrenergically triggered arrhythmia in CPVT.
  downstream:
  - target: Syncope, Cardiac Arrest, and Sudden Death
    description: >-
      Sustained ventricular tachycardia can cause syncope and may degenerate
      into ventricular fibrillation, cardiac arrest, and sudden cardiac death.
- name: Syncope, Cardiac Arrest, and Sudden Death
  description: >-
    CPVT ranges from recurrent exertional syncope to ventricular fibrillation,
    cardiac arrest, and sudden death. Untreated disease is highly lethal and
    sudden death may be the first manifestation.
  evidence:
  - reference: PMID:20301466
    reference_title: Catecholaminergic Polymorphic Ventricular Tachycardia.
    supports: SUPPORT
    evidence_source: OTHER
    snippet: "If untreated, CPVT is highly lethal, as approximately 30% of affected individuals experience at least one cardiac arrest and up to 80% have one or more syncopal spells. Sudden death may be the first manifestation of the disease."
    explanation: Summarizes the major clinical outcomes of untreated CPVT, from syncope to cardiac arrest and sudden death.
