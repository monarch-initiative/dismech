    snippet: "At present, mutations in six genes involved in SR calcium release have been identified as the genetic cause of CPVT: RYR2 (encoding ryanodine receptor calcium release channel), CASQ2 (encoding cardiac calsequestrin), TRDN (encoding triadin), CALM1, CALM2 and CALM3 (encoding identical calmodulin protein)."
    explanation: Supports CALM1 as one of the established calmodulin genes causing CPVT.
