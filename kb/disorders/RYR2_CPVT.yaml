name: Catecholaminergic Polymorphic Ventricular Tachycardia
creation_date: '2026-04-04T00:00:00Z'
updated_date: '2026-04-12T22:14:30Z'
description: >-
  Catecholaminergic polymorphic ventricular tachycardia (CPVT) is a rare,
  heritable cardiac channelopathy that usually presents in children and young
  adults with exercise- or emotion-triggered bidirectional or polymorphic
  ventricular tachycardia in the setting of a structurally normal heart and a
  normal resting electrocardiogram. Established genetic causes converge on
  abnormal sarcoplasmic reticulum calcium handling, leading to delayed
  after-depolarizations and triggered ventricular arrhythmias during adrenergic
  stress. RYR2 is the most common cause, but CASQ2, CALM1, CALM2, CALM3, TRDN,
  and TECRL are also established disease genes. If untreated, CPVT can progress
  from syncope to ventricular fibrillation, cardiac arrest, and sudden cardiac
  death.
synonyms:
- CPVT
- catecholaminergic polymorphic ventricular tachycardia
- familial polymorphic ventricular tachycardia
