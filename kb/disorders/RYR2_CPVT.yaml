treatments:
- name: Nonselective Beta-Blocker Therapy
  description: >-
    Beta-blockers are first-line therapy for CPVT, with nadolol generally
    preferred over beta1-selective agents because it more effectively suppresses
    exercise-induced ventricular arrhythmias.
  treatment_term:
    preferred_term: nadolol therapy
    term:
      id: MAXO:0000058
      label: pharmacotherapy
  evidence:
  - reference: PMID:26432584
    reference_title: Nadolol decreases the incidence and severity of ventricular arrhythmias during exercise stress testing compared with β1-selective β-blockers in patients with catecholaminergic polymorphic ventricular tachycardia.
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "The incidence and severity of ventricular arrhythmias decreased during treatment with nadolol compared with during treatment with β1-selective β-blockers."
    explanation: Supports nadolol-preferred nonselective beta-blocker therapy as the most effective first-line pharmacologic strategy.
- name: Flecainide
  description: >-
    Flecainide is an established add-on therapy for patients with breakthrough
    ventricular arrhythmias despite beta-blocker treatment and acts in part by
    reducing arrhythmogenic calcium waves.
  treatment_term:
    preferred_term: flecainide therapy
    term:
      id: MAXO:0000058
      label: pharmacotherapy
  evidence:
  - reference: PMID:19835880
    reference_title: Flecainide inhibits arrhythmogenic Ca2+ waves by open state block of ryanodine receptor Ca2+ release channels and reduction of Ca2+ spark mass.
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: "In ventricular myocytes isolated from a CPVT mouse model, flecainide significantly reduced spark amplitude and spark width, resulting in a 40% reduction in spark mass."
    explanation: Supports flecainide as a suppressor of arrhythmogenic calcium release in CPVT cardiomyocytes.
  - reference: PMID:19835880
    reference_title: Flecainide inhibits arrhythmogenic Ca2+ waves by open state block of ryanodine receptor Ca2+ release channels and reduction of Ca2+ spark mass.
    supports: SUPPORT
    evidence_source: MODEL_ORGANISM
    snippet: "We recently found that the drug flecainide inhibits RyR2 channels and prevents CPVT in mice and humans."
    explanation: Supports flecainide as an effective antiarrhythmic strategy in CPVT translational models.
- name: Left Cardiac Sympathetic Denervation
  description: >-
    Left cardiac sympathetic denervation is an escalation therapy for patients
    with inadequately controlled arrhythmias despite optimal medical therapy,
    particularly when ICD therapy alone would be undesirable or insufficient.
  treatment_term:
    preferred_term: left cardiac sympathetic denervation
    term:
      id: MAXO:0000476
      label: left cardiac sympathetic denervation
  evidence:
  - reference: PMID:27761156
    reference_title: "Left cardiac sympathetic denervation: An important treatment option for patients with hereditary ventricular arrhythmias."
    supports: SUPPORT
    evidence_source: OTHER
    snippet: "Although LCSD is highly effective in prevention of cardiac events in patients with LQTS and CPVT, it is rarely used."
    explanation: Supports left cardiac sympathetic denervation as an effective but underused escalation therapy in CPVT.
- name: Implantable Cardioverter-Defibrillator
  description: >-
    ICD implantation is reserved for survivors of cardiac arrest or patients
    with persistent life-threatening ventricular arrhythmias despite optimized
    pharmacologic and autonomic therapy.
  treatment_term:
    preferred_term: ICD implantation
    term:
      id: MAXO:0000004
      label: surgical procedure
  evidence:
  - reference: PMID:20301466
    reference_title: Catecholaminergic Polymorphic Ventricular Tachycardia.
    supports: SUPPORT
    evidence_source: OTHER
    snippet: "an implantable cardioverter defibrillator is effective for those individuals in whom arrhythmias are not adequately controlled by drug therapy."
    explanation: Supports ICD use for refractory or high-risk CPVT after failure of medical therapy.
- name: Exercise Restriction
  description: >-
    Avoidance of competitive sports and other strenuous exercise reduces
    catecholamine-triggered arrhythmic provocation and remains a core
    nonpharmacologic management strategy.
  treatment_term:
    preferred_term: exercise restriction
    term:
      id: MAXO:0000950
      label: supportive care
  evidence:
  - reference: PMID:20301466
    reference_title: Catecholaminergic Polymorphic Ventricular Tachycardia.
    supports: SUPPORT
    evidence_source: OTHER
    snippet: "Agents/circumstances to avoid: Competitive sports and other strenuous exercise; use of digitalis."
    explanation: Supports activity restriction as a central preventive management strategy in CPVT.
notes: >-
  This entry now uses the broad disease-level CPVT framing rather than keeping a
  purely RYR2-rooted disorder split. It preserves the existing RYR2-heavy
  mechanistic curation because RYR2 remains the dominant genotype-positive
  subtype, while adding the other established CPVT genes needed for disease-level
  coverage: CASQ2, CALM1, CALM2, CALM3, TRDN, and TECRL. The intended scope is
  the shared stress-triggered ventricular arrhythmia syndrome captured by
  MONDO:0017990 and its canonical gene-defined subtypes, rather than creating
  separate standalone files for each established CPVT subtype. Disputed or
  secondary CPVT-like associations such as ANK2, KCNJ2, and PKP2 are not modeled
  here as core causative disease genes. Extra-cardiac manifestations reported in
  some RYR2-enriched cohorts, including epilepsy or neurodevelopmental delay,
  are acknowledged in the literature but are not represented here as core CPVT
  phenotypes because they are not consistent across the established CPVT gene
  set.
