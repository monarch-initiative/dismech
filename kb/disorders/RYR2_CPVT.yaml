pathophysiology:
- name: Defective Sarcoplasmic Reticulum Calcium Release Control
  description: >-
    Pathogenic variants in RYR2 or proteins that regulate or stabilize
    sarcoplasmic reticulum calcium release, including CASQ2, TRDN, CALM1,
    CALM2, CALM3, and TECRL, destabilize intracellular calcium handling during
    adrenergic stimulation. The shared final defect is spontaneous or excessive
    diastolic calcium release from the sarcoplasmic reticulum, especially when
    catecholamine signaling increases sarcoplasmic reticulum calcium loading.
  genes:
