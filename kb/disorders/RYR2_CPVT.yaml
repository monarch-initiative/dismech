genetic:
- name: RYR2 pathogenic variants
  association: Causative
  features: >-
    RYR2 is the predominant CPVT gene and defines the classic autosomal dominant
    CPVT1 subtype. Most genotype-positive cohorts are enriched for RYR2
    variants, so much of the mechanistic literature in CPVT reflects RyR2
    dysregulation.
  gene_term:
    preferred_term: RYR2
    term:
      id: hgnc:10484
      label: RYR2
  evidence:
  - reference: PMID:28158428
    reference_title: "The clinical and genetic spectrum of catecholaminergic polymorphic ventricular tachycardia: findings from an international multicentre registry."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "The majority (60%) had RyR2-associated CPVT1."
    explanation: Supports RYR2 as the dominant genetic cause in a large multicentre CPVT cohort.
- name: CASQ2 pathogenic variants
  association: Causative
  features: >-
    CASQ2 is the canonical recessive CPVT2 gene and perturbs calcium buffering
    inside the junctional sarcoplasmic reticulum, converging on the same
    triggered-arrhythmia mechanism as RYR2-mediated disease.
  gene_term:
    preferred_term: CASQ2
    term:
      id: hgnc:1513
      label: CASQ2
  evidence:
  - reference: PMID:28158428
    reference_title: "The clinical and genetic spectrum of catecholaminergic polymorphic ventricular tachycardia: findings from an international multicentre registry."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Mutations in RYR2-coded Ryanodine Receptor-2 (RyR2) and CASQ2-coded Calsequestrin-2 (CASQ2) genes underlie CPVT1 and CPVT2, respectively."
    explanation: Directly supports CASQ2 as the established cause of CPVT2.
- name: CALM1 pathogenic variants
  association: Causative
  features: >-
    CALM1 is a rare dominant cause of CPVT within the calmodulinopathy spectrum
