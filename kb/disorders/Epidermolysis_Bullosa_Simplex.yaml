has_subtypes:
- name: EBS Localized (formerly Weber-Cockayne)
  description: >
    Blistering mainly confined to hands and feet, exacerbated by heat and
    increased physical activity. The mildest and most common form of EBS.
    Onset typically in infancy or early childhood.
- name: EBS Intermediate (formerly Koebner)
  description: >
    Generalized non-scarring blistering that may affect any body site.
    More widespread than localized EBS but less severe than the severe form.
    Blisters heal without significant scarring.
- name: EBS Severe (formerly Dowling-Meara)
  description: >
    Grouped herpetiform blistering, palmoplantar keratoderma, and nail
    dystrophy. The most severe keratin-associated form of EBS. Blistering
    tends to improve with age, likely due to the suprabasal switch from
    K5/K14 to K1/K10 during keratinocyte differentiation reducing
    dependence on mutant basal keratins. Improvement with age is common
    in all variants of EBS but is not invariable. The pathognomonic
    transmission electron microscopy (TEM) finding is tonofilament
    (keratin) clumping in basal cells. Laryngeal involvement may occur.
- name: EBS with Muscular Dystrophy
  description: >
    Caused by PLEC mutations leading to skin fragility combined with
    progressive muscular dystrophy. Autosomal recessive inheritance.
    Plectin deficiency disrupts both epidermal and muscle cytoskeletal
    integrity.
- name: EBS Autosomal Recessive (KRT14 null)
  description: >
    Severe, generalized blistering caused by biallelic loss-of-function
    mutations in KRT14 resulting in complete absence of keratin 14 protein.
    More severe than typical dominant EBS.
inheritance:
- name: Autosomal dominant
  description: >
    Most EBS subtypes (localized, intermediate, severe/Dowling-Meara) are
    inherited in an autosomal dominant manner due to dominant-negative
    keratin mutations in KRT5 or KRT14.
  evidence:
  - reference: PMID:20301543
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "The diagnosis of EBS is established in a proband by: the identification
      of a heterozygous dominant-negative variant or biallelic loss-of-function
      variants in KRT5, KRT14, or PLEC"
    explanation: GeneReviews confirms dominant-negative variants in KRT5/KRT14
      as a major cause of EBS.
  - reference: PMID:16098032
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "18 were found to harbor heterozygous mutations in the keratin 5 or
      keratin 14 genes, KRT5 and KRT14, respectively"
    explanation: Confirms heterozygous (dominant) keratin mutations as a cause
      of EBS.
- name: Autosomal recessive
  description: >
    EBS with muscular dystrophy (PLEC mutations) and EBS autosomal recessive
    (KRT14 null) are inherited in an autosomal recessive manner.
  evidence:
  - reference: PMID:34572129
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "The most common disorder is autosomal recessive disease epidermolysis
      bullosa simplex with muscular dystrophy (EBS-MD), which is characterized by
      skin blistering and progressive muscle weakness"
    explanation: Confirms autosomal recessive inheritance of EBS-MD caused by
      PLEC mutations.
  - reference: PMID:25530118
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Plectin deficiency causes autosomal recessive epidermolysis bullosa
      simplex (EBS) with involvement of the skin and other organs"
    explanation: Confirms autosomal recessive inheritance pattern for
      plectin-related EBS.
prevalence:
- population: Global
  notes: >-
    EBS is the most common type of epidermolysis bullosa, accounting for
    approximately 70% of all EB cases. Estimated prevalence is 1 in 30,000
    to 50,000. US National EB Registry data (1986-2002) reported an overall
    EB incidence of 19.57 per million live births, with EBS prevalence
    increasing by 30.4% over the 16-year study period as ascertainment
    improved.
  evidence:
  - reference: PMID:27463098
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "the overall incidence and prevalence of inherited EB were 19.60
      and 8.22 per 1 million live births, respectively"
    explanation: US National EB Registry provides incidence and prevalence
      estimates for inherited EB including EBS as the most common subtype.
  - reference: PMID:32973163
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Epidermolysis bullosa (EB) is an inherited, heterogeneous group
      of rare genetic dermatoses characterized by mucocutaneous fragility and
      blister formation, inducible by often minimal trauma"
    explanation: Nature Reviews Disease Primers confirms EB as a group of
      rare genetic skin fragility disorders with EBS being the most common
      major type.
pathophysiology:
- name: KRT5/KRT14 Mutations Disrupt Keratin Intermediate Filament Network
  description: >
    Mutations in KRT5 or KRT14 genes disrupt the keratin intermediate filament
    network in basal keratinocytes of the epidermis. Keratins 5 and 14 are
    the obligate type II and type I intermediate filament partners that
    copolymerize to form the 10 nm filament network providing mechanical
    resilience to basal keratinocytes.
  genes:
  - preferred_term: KRT5
    term:
      id: hgnc:6442
      label: KRT5
  - preferred_term: KRT14
    term:
      id: hgnc:6416
      label: KRT14
  biological_processes:
  - preferred_term: intermediate filament organization
    modifier: ABNORMAL
    term:
      id: GO:0045109
      label: intermediate filament organization
  cell_types:
  - preferred_term: epidermal cell
    term:
      id: CL:0000362
      label: epidermal cell
  downstream:
  - target: Dominant-Negative Disruption of Filament Assembly
    description: >
      Mutant keratins poison the filament network by incorporating into
      filaments and destabilizing them.
  evidence:
  - reference: PMID:22277943
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Most cases of EBS are due to dominantly acting mutations in keratin
      14 (K14) or K5, the type I and II intermediate filament (IF) proteins that
      copolymerize to form a pancytoplasmic network of 10 nm filaments in basal
      keratinocytes of epidermis and related epithelia"
    explanation: Confirms K5/K14 as the obligate IF pair in basal keratinocytes
      and dominant mutations as the cause of EBS.
  - reference: PMID:30078200
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "the most important and most commonly occurring molecular defects in
      these patients are the defects of keratins 5 and14 (KRT5 and KRT14)"
    explanation: Confirms KRT5 and KRT14 defects as the primary molecular
      basis of EBS.
- name: Dominant-Negative Disruption of Filament Assembly
  description: >
    Mutant keratins exert a dominant-negative effect by incorporating into
    keratin filaments and poisoning the entire filament network. This
    disrupts filament architecture and leads to keratin aggregate formation,
    particularly under conditions of mechanical or thermal stress.
  biological_processes:
  - preferred_term: intermediate filament cytoskeleton organization
    modifier: ABNORMAL
    term:
      id: GO:0045104
      label: intermediate filament cytoskeleton organization
  cell_types:
  - preferred_term: epidermal cell
    term:
      id: CL:0000362
      label: epidermal cell
  downstream:
  - target: Mechanical Stress-Induced Keratinocyte Cytolysis
    description: >
      Disrupted keratin network renders basal keratinocytes fragile and
      prone to rupture under mechanical stress.
  evidence:
  - reference: PMID:22277943
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Defects in K5-K14 filament network architecture cause basal
      keratinocytes to become fragile, and account for their rupture upon exposure
      to mechanical trauma"
    explanation: Confirms that disrupted keratin filament architecture causes
      basal keratinocyte fragility and rupture.
  - reference: PMID:34830328
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: "Keratin aggregates display impaired dynamics of assembly and diminished
      solubility and appear to be the trigger for endoplasmic reticulum (ER) stress
      upon being phosphorylated by MAPKs"
    explanation: Confirms that mutant keratins form aggregates with impaired
      dynamics, triggering downstream ER stress signaling.
- name: Mechanical Stress-Induced Keratinocyte Cytolysis
  description: >
    Basal keratinocytes with disrupted keratin networks rupture (cytolyse)
    when subjected to mechanical trauma. The blistering in EBS is
    intraepidermal, occurring within the basal cell layer rather than at
    tissue interfaces, distinguishing it from junctional and dystrophic EB.
  biological_processes:
  - preferred_term: cell death
    modifier: INCREASED
    term:
      id: GO:0008219
      label: cell death
  cell_types:
  - preferred_term: epidermal cell
    term:
      id: CL:0000362
      label: epidermal cell
  evidence:
  - reference: PMID:16098032
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Epidermolysis bullosa simplex (EBS) is a mechano-bullous disorder
      characterized by intraepidermal blistering within the basal keratinocytes as
      a result of trauma to the skin"
    explanation: Confirms intraepidermal blistering within basal keratinocytes
      as the hallmark of EBS.
  - reference: PMID:34830328
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: "Epidermolysis bullosa simplex (EBS) is a group of inherited
      keratinopathies that, in most cases, arise due to mutations in keratins and
      lead to intraepidermal ruptures"
    explanation: Confirms that keratin mutations lead to intraepidermal rupture.
- name: PLEC Mutations Disrupt Hemidesmosome-Cytoskeleton Linkage
  description: >
    Mutations in PLEC disrupt plectin, a giant cytoskeletal crosslinker that
    connects the keratin intermediate filament network to hemidesmosomes at
    the dermal-epidermal junction and to the desmin cytoskeleton in muscle.
    Loss of plectin causes a dual phenotype affecting both skin (blistering)
    and skeletal muscle (progressive dystrophy).
  genes:
  - preferred_term: PLEC
    term:
      id: hgnc:9069
      label: PLEC
  biological_processes:
  - preferred_term: cell-substrate junction organization
    modifier: ABNORMAL
    term:
      id: GO:0150115
      label: cell-substrate junction organization
  cell_types:
  - preferred_term: epidermal cell
    term:
      id: CL:0000362
      label: epidermal cell
  - preferred_term: skeletal muscle fiber
    term:
      id: CL:0008002
      label: skeletal muscle fiber
  downstream:
  - target: Mechanical Stress-Induced Keratinocyte Cytolysis
    description: >
      Disrupted hemidesmosome-cytoskeleton linkage leads to skin fragility.
  evidence:
  - reference: PMID:34572129
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Plectin is a giant cytoskeletal crosslinker and intermediate filament
      stabilizing protein. Mutations in the human plectin gene (PLEC) cause several
      rare diseases that are grouped under the term plectinopathies"
    explanation: Confirms plectin as a cytoskeletal crosslinker whose mutations
      cause plectinopathies including EBS-MD.
  - reference: PMID:25530118
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Plectin deficiency causes autosomal recessive epidermolysis bullosa
      simplex (EBS) with involvement of the skin and other organs, such as muscle
      and gastrointestinal tract, depending on the expression pattern of the
      defective protein"
    explanation: Confirms plectin deficiency causes EBS with multi-organ
      involvement including skin and muscle.
- name: Heat Sensitivity of Mutant Keratin Networks
  description: >
    Mutant keratin filament networks are thermally unstable. Elevated
    temperature causes filament breakdown into aggregates, explaining the
    clinical observation that blistering worsens in warm weather and with
    increased perspiration. This is particularly prominent in localized EBS.
  biological_processes:
  - preferred_term: response to heat
    modifier: ABNORMAL
    term:
      id: GO:0009408
      label: response to heat
  evidence:
  - reference: PMID:8586658
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: "after thermal stress a reduced stability of the keratin filaments
      was demonstrable in the epidermolysis bullosa simplex cell lines, with
      filaments breaking into aggregates"
    explanation: Demonstrates that thermal stress causes keratin filament
      breakdown into aggregates in EBS cell lines, explaining heat-exacerbated
      blistering.
phenotypes:
- category: Integument
  name: Skin Blistering
  description: >
    Intraepidermal blistering caused by basal keratinocyte fragility.
    Blisters arise at sites of mechanical trauma and generally heal without
    significant scarring, distinguishing EBS from dystrophic EB.
  frequency: OBLIGATE
  phenotype_term:
    preferred_term: skin blistering
    term:
      id: HP:0008066
      label: Abnormal blistering of the skin
  evidence:
  - reference: PMID:20301543
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Epidermolysis bullosa simplex (EBS) is characterized by fragility
      of the skin (and mucosal epithelia in some instances) that results in
      non-scarring blisters and erosions caused by minor mechanical trauma"
    explanation: GeneReviews confirms non-scarring blisters from minor
      mechanical trauma as the hallmark of EBS.
  - reference: PMID:32973163
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Epidermolysis bullosa (EB) is an inherited, heterogeneous group of
      rare genetic dermatoses characterized by mucocutaneous fragility and blister
      formation, inducible by often minimal trauma"
    explanation: Nature Reviews Disease Primers confirms blister formation from
      minimal trauma as the defining feature of EB.
- category: Integument
  name: Heat-Exacerbated Blistering
  description: >
    Worsening of blistering during warm weather or with increased physical
    activity and perspiration. Caused by thermal instability of mutant
    keratin filament networks. Particularly prominent in localized EBS
    affecting hands and feet.
  frequency: VERY_FREQUENT
  phenotype_term:
    preferred_term: heat-exacerbated blistering
    term:
      id: HP:0008066
      label: Abnormal blistering of the skin
  evidence:
  - reference: PMID:8586658
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: "after thermal stress a reduced stability of the keratin filaments
      was demonstrable in the epidermolysis bullosa simplex cell lines, with
      filaments breaking into aggregates"
    explanation: Demonstrates thermal instability of mutant keratin filaments,
      providing the molecular basis for heat-exacerbated blistering.
- category: Integument
  name: Palmoplantar Keratoderma
  description: >
    Thickening of the skin on palms and soles, particularly prominent in
    EBS severe (Dowling-Meara) subtype. May develop progressively with age.
  frequency: FREQUENT
  notes: Primarily seen in EBS severe (Dowling-Meara)
  phenotype_term:
    preferred_term: palmoplantar keratoderma
    term:
      id: HP:0000982
      label: Palmoplantar keratoderma
  evidence:
  - reference: PMID:20301543
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Additional features can include hyperkeratosis of the palms and
      soles (keratoderma), nail dystrophy, milia, and hyper- and/or
      hypopigmentation"
    explanation: GeneReviews confirms palmoplantar keratoderma as an additional
      feature of EBS.
- category: Integument
  name: Herpetiform Blistering Pattern
  description: >
    Grouped (herpetiform) blistering pattern characteristic of EBS severe
    (Dowling-Meara). Blisters cluster in a pattern resembling herpes simplex
    lesions. Associated with keratin filament clumping visible on electron
    microscopy.
  frequency: FREQUENT
  notes: Characteristic of EBS severe (Dowling-Meara) subtype
  phenotype_term:
    preferred_term: grouped herpetiform blistering
    term:
      id: HP:0008066
      label: Abnormal blistering of the skin
  evidence:
  - reference: PMID:34830328
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: "Mutations in keratins 5/14 or in other genes that encode associated
      proteins induce structural disarrangements of different strengths depending
      on their locations in the genes"
    explanation: Confirms that mutation location determines severity of
      structural disarrangement, explaining the severe herpetiform phenotype
      in Dowling-Meara EBS.
- category: Integument
  name: Nail Dystrophy
  description: >
    Abnormal nail growth and morphology including thickened, dystrophic, or
    absent nails. Present in severe EBS subtypes and EBS with muscular
    dystrophy.
  frequency: FREQUENT
  phenotype_term:
    preferred_term: nail dystrophy
    term:
      id: HP:0008404
      label: Nail dystrophy
  evidence:
  - reference: PMID:34572129
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "PLEC mutations lead to EBS with nail dystrophy"
    explanation: Confirms nail dystrophy as a recognized feature of
      PLEC-associated EBS.
- category: Integument
  name: Milia
  description: >
    Small white cysts (milia) that may occur at sites of healed blisters.
    Less prominent in EBS than in dystrophic EB forms.
  frequency: OCCASIONAL
  phenotype_term:
    preferred_term: milia
    term:
      id: HP:0001056
      label: Milia
  evidence:
  - reference: PMID:20301543
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Additional features can include hyperkeratosis of the palms and
      soles (keratoderma), nail dystrophy, milia, and hyper- and/or
      hypopigmentation"
    explanation: GeneReviews lists milia as an additional feature of EBS.
- category: Musculoskeletal
  name: Muscular Dystrophy
  description: >
    Progressive muscular dystrophy in EBS with muscular dystrophy (EBS-MD)
    caused by PLEC mutations. Plectin is essential for muscle cytoskeletal
    integrity. Skeletal muscle biopsies show dystrophic features with
    variation in fiber size, degenerative myofibrillar changes, and
    pathological desmin-positive protein aggregates.
  frequency: OBLIGATE
  notes: Specific to EBS with muscular dystrophy (PLEC mutations)
  phenotype_term:
    preferred_term: progressive muscular dystrophy
    term:
      id: HP:0003560
      label: Muscular dystrophy
  evidence:
  - reference: PMID:34572129
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "The most common disorder is autosomal recessive disease
      epidermolysis bullosa simplex with muscular dystrophy (EBS-MD), which is
      characterized by skin blistering and progressive muscle weakness"
    explanation: Confirms progressive muscle weakness as a defining feature
      of EBS-MD.
  - reference: PMID:34572129
    supports: SUPPORT
    evidence_source: MODEL_ORGANISM
    snippet: "Skeletal muscle biopsies from EBS-MD patients and plectin-deficient
      mice revealed severe dystrophic features with variation in fiber size,
      degenerative myofibrillar changes, mitochondrial alterations, and
      pathological desmin-positive protein aggregates"
    explanation: Confirms dystrophic muscle pathology in both human EBS-MD
      patients and plectin-deficient mouse models.
treatments:
- name: Wound Care
  description: >
    Supportive wound care is the mainstay of EBS management. Includes use
    of non-adherent dressings to protect fragile skin and promote healing
    of blistered areas. Blister lancing with sterile technique to prevent
    blister extension.
  treatment_term:
    preferred_term: wound care
    term:
      id: MAXO:0000950
      label: supportive care
  evidence:
  - reference: PMID:20301543
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Supportive care to protect the skin from blistering; use of
      dressings that will protect the skin and promote healing of wounds"
    explanation: GeneReviews confirms supportive wound care as the primary
      management strategy for EBS.
- name: Avoidance of Heat and Friction
  description: >
    Minimizing exposure to heat, excessive physical activity, and friction
    to prevent blistering episodes. Includes wearing loose-fitting clothing,
    soft footwear, and avoiding high ambient temperatures.
  treatment_term:
    preferred_term: avoidance of triggers
    term:
      id: MAXO:0000950
      label: supportive care
  notes: Particularly important for localized EBS where heat is a major trigger.
  evidence:
  - reference: PMID:20301543
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Excessive heat exposure may exacerbate blistering and infection.
      Avoid poorly fitting or coarse-textured clothing/footwear and activities
      that traumatize the skin"
    explanation: GeneReviews lists heat exposure and skin trauma as agents to
      avoid in EBS management.
- name: Antiperspirants for Palmoplantar Disease
  description: >
    Topical antiperspirant application to palms and soles to reduce
    perspiration-induced blistering, especially in localized EBS.
  treatment_term:
    preferred_term: topical antiperspirant therapy
    term:
      id: MAXO:0000950
      label: supportive care
  evidence:
  - reference: PMID:20301543
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Aluminum chloride (20%) applied to palms and soles can reduce
      sweating and therefore minimize blister formation in some individuals
      with EBS"
    explanation: GeneReviews confirms aluminum chloride antiperspirant as a
      treatment to reduce sweating-induced blistering.
- name: Pain Management
  description: >
    Analgesic therapy for pain associated with blistering and erosions.
    May include topical and systemic pain medications depending on severity.
  treatment_term:
    preferred_term: pain management
    term:
      id: MAXO:0000950
      label: supportive care
  evidence:
  - reference: PMID:20301543
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Identification and management of specific causes of pain and
      itching; management with a pain specialist as needed"
    explanation: GeneReviews confirms pain and itch management as part of EBS
      care.
- name: Physical Therapy
  description: >
    Rehabilitation and physical therapy for patients with EBS-MD to maintain
    mobility and muscle function as muscular dystrophy progresses.
  treatment_term:
    preferred_term: physical therapy
    term:
      id: MAXO:0000011
      label: physical therapy
  evidence:
  - reference: PMID:20301543
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "appropriate footwear and physical therapy to preserve ambulation"
    explanation: GeneReviews confirms physical therapy to preserve ambulation
      as part of EBS management.
- name: Genetic Counseling
  description: >
    Genetic counseling for affected families regarding inheritance patterns,
    recurrence risk, and prenatal diagnosis options. Important given both
    dominant and recessive forms and significant de novo mutation rate.
  treatment_term:
    preferred_term: genetic counseling
    term:
      id: MAXO:0000079
      label: genetic counseling
  evidence:
  - reference: PMID:16098032
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "These findings have implications for genetic counseling and
      prenatal diagnosis for EBS"
    explanation: Confirms the importance of genetic counseling for EBS
      families, particularly given de novo mutations and mixed inheritance
      patterns.
- name: Diacerein (Anti-IL-1beta Therapy)
  description: >
    Topical diacerein 1% ointment, an anti-inflammatory agent that inhibits
    IL-1beta signaling. A phase 2/3 crossover trial (n=17) showed 86% of
    diacerein-treated patients achieved >40% blister reduction versus 14%
    with placebo. However, a larger randomized controlled trial (n=54)
    found no significant difference in the primary endpoint (>=60% BSA
    reduction at 8 weeks), though post hoc analysis in severe EBS showed
    a potential signal (46.2% vs 15.4% achieving optimal skin scores).
    Multiple ongoing trials continue to evaluate diacerein in EBS.
  treatment_term:
    preferred_term: diacerein anti-IL-1beta therapy
    term:
      id: MAXO:0000058
      label: pharmacotherapy
  evidence:
  - reference: PMID:29410318
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Of the patients receiving diacerein, 86% in episode 1 and 37.5%
      in episode 2 met the primary end point (vs 14% and 17% with placebo,
      respectively). This effect was still significant after the follow-up"
    explanation: Phase 2/3 crossover trial demonstrating diacerein efficacy
      in reducing EBS blisters compared to placebo.
  - reference: PMID:37276163
    supports: PARTIAL
    evidence_source: HUMAN_CLINICAL
    snippet: "Although there was no significant difference in outcomes between
      the groups, further study may elucidate the effects of diacerein on EBS
      lesions, especially in patients with severe EBS"
    explanation: Larger RCT (n=54) did not meet primary endpoint overall,
      though post hoc analysis suggested benefit in severe EBS subgroup.
- name: Sulforaphane (Nrf2 Activator, Preclinical)
  description: >
    Sulforaphane, a natural product from cruciferous vegetables, activates
    the Nrf2 transcription factor to induce compensatory keratins K16/K17
    in basal keratinocytes. In an EBS mouse model with K14 deficiency,
    sulforaphane treatment alleviated blistering by upregulating K17
    expression. This represents an attractive preclinical approach
    exploiting functional redundancy within the keratin gene family.
  notes: Preclinical stage only; not yet tested in human clinical trials for EBS.
  treatment_term:
    preferred_term: sulforaphane Nrf2 activator therapy
    term:
      id: MAXO:0000058
      label: pharmacotherapy
  evidence:
  - reference: PMID:17724334
    supports: SUPPORT
    evidence_source: MODEL_ORGANISM
    snippet: "treatment with a pharmacological activator of Nrf2, two
      transcription factors eliciting distinct transcriptional programs,
      alleviates the blistering caused by a K14 deficiency in an EBS mouse
      model, correlating with K17 induction in basal epidermal keratinocytes.
      Nrf2 induction is brought about by treatment with sulforaphane, a
      natural product"
    explanation: Mouse model demonstrates sulforaphane activates Nrf2 to
      induce compensatory K17 expression in basal keratinocytes, alleviating
      blistering in K14-deficient EBS.
genetic:
- name: KRT5
  association: Causative
  inheritance:
  - name: Autosomal dominant
    evidence:
    - reference: PMID:20301543
      supports: SUPPORT
      evidence_source: HUMAN_CLINICAL
      snippet: "Autosomal dominant EBS is associated with either a heterozygous
        dominant-negative variant in KRT5, KRT14, or PLEC"
      explanation: GeneReviews confirms autosomal dominant inheritance for KRT5
        via dominant-negative variants.
  notes: >
    Keratin 5 gene on chromosome 12q13.13. Encodes the type II keratin that
    pairs with keratin 14 in basal keratinocytes. Dominant-negative
    missense mutations, particularly in the helix boundary motifs, cause
    EBS. Hotspot mutations in the 1A and 2B rod domain helix boundaries
    correlate with more severe phenotypes.
  evidence:
  - reference: PMID:16098032
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "18 were found to harbor heterozygous mutations in the keratin 5 or
      keratin 14 genes, KRT5 and KRT14, respectively"
    explanation: Confirms heterozygous KRT5 mutations as a cause of EBS.
  - reference: PMID:30078200
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "the most important and most commonly occurring molecular defects in
      these patients are the defects of keratins 5 and14 (KRT5 and KRT14)"
    explanation: Confirms KRT5 as one of the two principal genes mutated in EBS.
- name: KRT14
  association: Causative
  inheritance:
  - name: Autosomal dominant
    evidence:
    - reference: PMID:20301543
      supports: SUPPORT
      evidence_source: HUMAN_CLINICAL
      snippet: "Autosomal dominant EBS is associated with either a heterozygous
        dominant-negative variant in KRT5, KRT14, or PLEC"
      explanation: GeneReviews confirms autosomal dominant inheritance for KRT14.
  - name: Autosomal recessive
    evidence:
    - reference: PMID:20301543
      supports: SUPPORT
      evidence_source: HUMAN_CLINICAL
      snippet: "Autosomal recessive EBS is associated with either biallelic
        loss-of-function variants in KRT5, KRT14, or PLEC"
      explanation: GeneReviews confirms autosomal recessive inheritance for
        biallelic KRT14 loss-of-function variants.
  notes: >
    Keratin 14 gene on chromosome 17q21.2. Encodes the type I keratin
    partner of keratin 5 in basal keratinocytes. Dominant-negative missense
    mutations cause EBS localized through severe. Biallelic loss-of-function
    (null) mutations cause autosomal recessive EBS with severe generalized
    blistering.
  evidence:
  - reference: PMID:22277943
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Most cases of EBS are due to dominantly acting mutations in keratin
      14 (K14) or K5"
    explanation: Confirms dominant KRT14 mutations as a major cause of EBS.
  - reference: PMID:16098032
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "many cases result from de novo mutations in KRT5 and KRT14 genes"
    explanation: Confirms that many EBS cases arise from de novo KRT14
      mutations.
- name: PLEC
  association: Causative
  inheritance:
  - name: Autosomal recessive
    evidence:
    - reference: PMID:20301543
      supports: SUPPORT
      evidence_source: HUMAN_CLINICAL
      snippet: "Autosomal recessive EBS is associated with either biallelic
        loss-of-function variants in KRT5, KRT14, or PLEC"
      explanation: GeneReviews confirms autosomal recessive inheritance for PLEC.
  notes: >
    Plectin gene on chromosome 8q24.3. Encodes a giant (>500 kDa)
    cytoskeletal crosslinker protein. Biallelic loss-of-function mutations
    cause EBS with muscular dystrophy. Plectin links the keratin
    intermediate filament network to hemidesmosomes in skin and to the
    desmin cytoskeleton in muscle.
  evidence:
  - reference: PMID:34572129
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Mutations in the human plectin gene (PLEC) cause several rare
      diseases that are grouped under the term plectinopathies"
    explanation: Confirms PLEC mutations as causative for plectinopathies
      including EBS-MD.
  - reference: PMID:16098032
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "in 14 cases, the disease was associated with mutations in both
      alleles of the plectin gene"
    explanation: Confirms biallelic plectin mutations in EBS patients,
      establishing recessive inheritance.
- name: DST
  association: Causative
  inheritance:
  - name: Autosomal recessive
    evidence:
    - reference: PMID:20301543
      supports: SUPPORT
      evidence_source: HUMAN_CLINICAL
      snippet: "biallelic pathogenic variants in CD151, DST, or EXPH5"
      explanation: GeneReviews confirms autosomal recessive inheritance for DST.
  notes: >
    Dystonin gene (also known as BPAG1) on chromosome 6p12.1. Encodes a
    cytoskeletal linker protein related to plectin. Rare biallelic mutations
    cause EBS with additional features.
  evidence:
  - reference: PMID:20301543
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "biallelic pathogenic variants in CD151, DST, or EXPH5"
    explanation: GeneReviews lists DST as a gene with biallelic pathogenic
      variants causing autosomal recessive EBS.
- name: EXPH5
  association: Causative
  inheritance:
  - name: Autosomal recessive
    evidence:
    - reference: PMID:20301543
      supports: SUPPORT
      evidence_source: HUMAN_CLINICAL
      snippet: "biallelic pathogenic variants in CD151, DST, or EXPH5"
      explanation: GeneReviews confirms autosomal recessive inheritance for EXPH5.
  notes: >
    Exophilin 5 gene on chromosome 11q22.3. Encodes a Rab27b effector
    involved in melanosome and lamellar body transport. Biallelic mutations
    cause a rare autosomal recessive form of EBS.
  evidence:
  - reference: PMID:20301543
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "biallelic pathogenic variants in CD151, DST, or EXPH5"
    explanation: GeneReviews lists EXPH5 as a gene with biallelic pathogenic
      variants causing autosomal recessive EBS.
- name: KLHL24
  association: Causative
  inheritance:
  - name: Autosomal dominant
    evidence:
    - reference: PMID:20301543
      supports: SUPPORT
      evidence_source: HUMAN_CLINICAL
      snippet: "a heterozygous pathogenic variant in KLHL24"
      explanation: GeneReviews confirms autosomal dominant inheritance for KLHL24.
  gene_term:
    preferred_term: KLHL24
    term:
      id: hgnc:25947
      label: KLHL24
  notes: >
    Kelch-like family member 24 gene on chromosome 3q27.1. Encodes a
    cullin 3-RBX1 ubiquitin ligase substrate receptor. Gain-of-function
    mutations in the translation initiation codon (c.1A>G, c.2T>C) produce
    a truncated protein (KLHL24-deltaN28) that escapes autoubiquitination
    and causes excessive ubiquitin-mediated degradation of keratin 14
    (KRT14). Patients present with extensive skin denudation at birth and
    dilated cardiomyopathy. The c.1A>G mutation has occurred de novo and is
    recurrent across unrelated families from different countries.
  evidence:
  - reference: PMID:27798626
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "dominant mutations of KLHL24, encoding a cullin 3-RBX1 ubiquitin
      ligase substrate receptor, cause EB. We have identified start-codon
      mutations in the KLHL24 gene in five patients with EB. These mutations
      lead to truncated KLHL24 protein lacking the initial 28 amino acids
      (KLHL24-ΔN28). KLHL24-ΔN28 is more stable than its wild-type
      counterpart owing to abolished autoubiquitination. We have further
      identified keratin 14 (KRT14) as a KLHL24 substrate and found that
      KLHL24-ΔN28 induces excessive ubiquitination and degradation of KRT14"
    explanation: Identifies KLHL24 start-codon mutations as a novel cause
      of EBS through stabilized truncated protein that excessively degrades
      KRT14.
  - reference: PMID:27889062
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "monoallelic mutations, c.1A>G and c.2T>C, in the translation
      initiation codon of the gene encoding kelch-like protein 24 (KLHL24)
      in 14 individuals with a distinct skin-fragility phenotype and skin
      cleavage within basal keratinocytes"
    explanation: Independently confirms KLHL24 initiation codon mutations
      in 14 individuals with skin fragility and basal keratinocyte cleavage.
