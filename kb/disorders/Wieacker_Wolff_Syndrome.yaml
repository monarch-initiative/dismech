- Wieacker syndrome
- Wieacker-Wolff syndrome, X-linked
- Wieacker-Wolff syndrome, X-linked recessive
- Foot contractures-muscle atrophy-oculomotor apraxia syndrome
- Intellectual disability-developmental delay-contractures syndrome
