    - preferred_term: acetazolamide
      term:
        id: CHEBI:27690
        label: acetazolamide
  description: >-
    Acetazolamide is the best-studied medical therapy and improves visual
    outcomes when combined with a weight-reduction program in patients with mild
    visual loss.
