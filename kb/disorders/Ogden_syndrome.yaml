name: Ogden syndrome
creation_date: '2026-04-11T16:28:32Z'
category: Mendelian
description: >-
  Ogden syndrome is a rare X-linked recessive NAA10-related disorder caused
  classically by the recurrent hemizygous p.Ser37Pro missense variant in NAA10.
  NAA10 encodes the catalytic subunit of the NatA N-terminal acetyltransferase
  complex. The syndrome is characterized by severe developmental impairment,
  hypotonia, postnatal growth failure, prematurely aged appearance, structural
  cardiac defects, and cardiac arrhythmias with early lethality in the classic
  male phenotype.
