    description: Reduced NatA catalytic activity decreases N-terminal acetylation of selected substrates
- name: Selective NatA substrate hypoacetylation
  description: >-
    Reduced NatA function in Ogden syndrome causes incomplete N-terminal
    acetylation of a subset of NatA and NatE substrates rather than a global
    proteome-wide collapse, defining a selective proteostasis defect downstream
    of impaired NatA complex activity.
