differential_diagnoses:
- name: NAA15-related neurodevelopmental disorder
  description: >-
    Primary pathogenic NAA15 variants cause a distinct autosomal dominant
    neurodevelopmental disorder with overlapping developmental and cardiac
    features. This should not be conflated with classic NAA10 p.Ser37Pro Ogden
    syndrome, even though the NAA15-binding interface is relevant to NatA complex
    biology and to severity of some NAA10 variants.
  distinguishing_features:
  - Primary NAA15 variants indicate an autosomal dominant NAA15-related neurodevelopmental disorder, not classic X-linked Ogden syndrome.
  - Classic Ogden syndrome is defined by hemizygous NAA10 p.Ser37Pro in affected males with early lethal progeroid/cardiac disease.
  evidence:
  - reference: PMID:30054457
    reference_title: "NAA10-related syndrome."
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Variants in NAA15 have also been found in patients with congenital heart
      disease, intellectual disability, and/or autism20,56,57.
    explanation: >-
      This supports NAA15 as an overlapping but distinct NatA-related disease
      consideration rather than a causal Ogden gene.
- name: NAA10-related syndrome
  description: >-
    Ogden syndrome represents the severe classic end of the broader
    NAA10-related syndrome spectrum and must be distinguished from milder
    NAA10-associated neurodevelopmental phenotypes in females and in individuals
    with non-Ser37Pro variants.
  distinguishing_features:
  - The recurrent hemizygous NAA10 p.Ser37Pro genotype with early lethality, progeroid appearance, and prominent cardiac disease favors classic Ogden syndrome.
  - Broader NAA10-related syndrome typically includes more variable and often milder developmental phenotypes across both sexes.
  disease_term:
    preferred_term: NAA10-related syndrome
    term:
      id: MONDO:0100124
      label: NAA10-related syndrome
  evidence:
  - reference: PMID:30054457
    reference_title: "NAA10-related syndrome."
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      NAA10-related syndrome is an X-linked condition with a broad spectrum of findings ranging from a severe phenotype in males with p.Ser37Pro in NAA10, originally described as Ogden syndrome, to the milder NAA10-related intellectual disability found with different variants in both males and females.
    explanation: >-
      This review explicitly places Ogden syndrome within the broader
      NAA10-related syndrome spectrum and supports that distinction as a
      clinically relevant differential diagnosis.
- name: Donohue syndrome
  description: >-
    Donohue syndrome can resemble Ogden syndrome in infancy through severe
    failure to thrive, progeroid appearance, and multisystem illness, but is
    distinguished by extreme insulin resistance rather than NAA10-related
    developmental disease.
  distinguishing_features:
  - Severe insulin resistance with hyperinsulinemia favors Donohue syndrome.
  - Congenital heart disease, arrhythmia risk, and a pathogenic NAA10 variant favor Ogden syndrome.
  disease_term:
    preferred_term: Donohue syndrome
    term:
      id: MONDO:0009517
      label: Donohue syndrome
  evidence:
  - reference: PMID:34075687
    reference_title: "Confirmation of Ogden syndrome as an X-linked recessive fatal disorder due to a recurrent NAA10 variant and review of the literature."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      A diagnosis of Donohue syndrome was considered but insulin levels were normal.
    explanation: >-
      This case report directly documents Donohue syndrome as an initial
      clinical differential diagnosis for an infant with Ogden syndrome.
