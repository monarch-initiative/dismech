genetic:
- name: NAA10
  association: Missense mutation
  notes: >-
    Classic Ogden syndrome is caused by a recurrent hemizygous NAA10 missense
    variant, p.Ser37Pro, which impairs NatA complex function. Broader
    NAA10-related syndromes caused by other variants can have overlapping but
    more variable phenotypes.
  evidence:
  - reference: PMID:34075687
    reference_title: "Confirmation of Ogden syndrome as an X-linked recessive fatal disorder due to a recurrent NAA10 variant and review of the literature."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Ogden syndrome is a rare lethal X-linked recessive disorder caused by a recurrent missense variant (Ser37Pro) in the NAA10 gene
    explanation: >-
      This directly establishes NAA10 p.Ser37Pro as the canonical disease
      variant for classic Ogden syndrome.
- name: NAA15
  association: Modifier
  notes: >-
    Disease severity in Ogden syndrome appears to be influenced by whether a
    variant lies within the NAA15-binding domain, consistent with the importance
    of NatA complex stability for pathogenesis.
  evidence:
  - reference: PMID:40293509
    reference_title: "The Cardiovascular Manifestations and Management Recommendations for Ogden Syndrome."
    supports: PARTIAL
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Sub-analysis showed that male probands and those with variants within the NAA15-binding domain had more severe phenotypes than females or those with variants outside of the NAA15-binding domain.
    explanation: >-
      This supports NAA15-binding-domain dependence as a modifier of phenotype
      severity rather than a primary independent disease gene.
