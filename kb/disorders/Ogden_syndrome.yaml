name: Ogden syndrome
creation_date: '2026-04-11T16:28:32Z'
updated_date: '2026-04-11T18:18:00Z'
category: Mendelian
description: >-
  Ogden syndrome is used here for the classic rare X-linked recessive
  NAA10-related disorder caused by the recurrent hemizygous p.Ser37Pro missense
  variant in NAA10. NAA10 encodes the catalytic subunit of the NatA N-terminal
  acetyltransferase complex. The syndrome is characterized by severe
  developmental impairment, hypotonia, feeding and postnatal growth failure,
  prematurely aged appearance, structural cardiac defects, and cardiac
  arrhythmias with infant male lethality in the classic phenotype. Broader
  NAA10-related syndromes caused by other NAA10 variants and primary
  NAA15-related neurodevelopmental disorder are clinically overlapping but
  distinct disease-boundary considerations.
