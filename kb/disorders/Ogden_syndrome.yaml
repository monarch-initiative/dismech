genetic:
- name: NAA10
  association: Missense mutation
  notes: >-
    Classic Ogden syndrome is caused by a recurrent hemizygous NAA10 missense
    variant, p.Ser37Pro, which impairs NatA complex function. Broader
    NAA10-related syndromes caused by other variants can have overlapping but
    more variable phenotypes.
  evidence:
  - reference: PMID:34075687
    reference_title: "Confirmation of Ogden syndrome as an X-linked recessive fatal disorder due to a recurrent NAA10 variant and review of the literature."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Ogden syndrome is a rare lethal X-linked recessive disorder caused by a recurrent missense variant (Ser37Pro) in the NAA10 gene
    explanation: >-
      This directly establishes NAA10 p.Ser37Pro as the canonical disease
      variant for classic Ogden syndrome.
diagnosis:
- name: NAA10 molecular genetic testing
  diagnosis_term:
    preferred_term: molecular genetic testing
    term:
      id: MAXO:0000533
      label: molecular genetic testing
  description: >-
    Sequence analysis of NAA10, with exome/genome sequencing or a
    neurodevelopmental/cardiac panel when the phenotype is less specific,
    establishes the diagnosis and distinguishes classic p.Ser37Pro Ogden syndrome
    from broader NAA10-related presentations.
  results: >-
    A hemizygous NAA10 p.Ser37Pro variant in an affected male establishes classic
    Ogden syndrome; other NAA10 variants should be interpreted within the broader
    NAA10-related syndrome spectrum.
  evidence:
  - reference: PMID:21700266
    reference_title: Using VAAST to identify an X-linked disorder resulting in lethality in male infants due to N-terminal acetyltransferase deficiency.
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      we identified in one family a c.109T>C (p.Ser37Pro) variant in NAA10, a
      gene encoding the catalytic subunit of the major human N-terminal
      acetyltransferase (NAT).
    explanation: >-
      The founding study supports NAA10 variant detection as the diagnostic
      anchor for classic Ogden syndrome.
  - reference: PMID:30054457
    reference_title: "NAA10-related syndrome."
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      The diagnosis of NAA10-related syndrome is established in a male proband
      with the identification of a disease-contributory hemizygous NAA10 variant
      and in a female proband with the identification of a disease-contributory
      heterozygous NAA10 variant by molecular genetic testing.
    explanation: >-
      This review provides the molecular diagnostic framework for NAA10-related
      disorders.
