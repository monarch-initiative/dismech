pathophysiology:
- name: Impaired NatA catalytic activity and complex assembly
  description: >-
    The recurrent NAA10 p.Ser37Pro variant disrupts the catalytic function of
    the NatA complex and weakens interactions between NAA10 and its binding
    partners NAA15 and NAA50. Because NatA is the major N-terminal
    acetyltransferase in human cells, this defect reduces co-translational
    N-terminal acetylation of selected substrates and establishes the primary
    molecular lesion in Ogden syndrome.
  gene:
    preferred_term: NAA10
    description: Catalytic subunit of the NatA N-terminal acetyltransferase complex.
    modifier: ABNORMAL
    term:
      id: hgnc:18704
      label: NAA10
