    reference_title: "Biochemical and cellular analysis of Ogden syndrome reveals downstream Nt-acetylation defects."
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: >-
      Biochemical data further demonstrate a reduced catalytic capacity and an impaired interaction between hNaa10 S37P and Naa15 as well as Naa50 (NatE), another interactor of the NatA complex.
    explanation: >-
      Patient-linked biochemical experiments directly show that the Ogden
      variant impairs NatA catalytic function and complex assembly.
  - reference: PMID:24408909
    reference_title: "A Saccharomyces cerevisiae model reveals in vivo functional impairment of the Ogden syndrome N-terminal acetyltransferase NAA10 Ser37Pro mutant."
    supports: SUPPORT
    evidence_source: MODEL_ORGANISM
    snippet: >-
      Combined, these data provide strong support for the functional impairment of hNaa10 S37P in vivo and suggest that reduced Nt-acetylation of one or more target substrates contributes to the pathogenesis of the Ogden syndrome.
    explanation: >-
      The yeast complementation model independently confirms in vivo functional
      impairment of the Ser37Pro NAA10 allele and links reduced Nt-acetylation
      to pathogenesis.
