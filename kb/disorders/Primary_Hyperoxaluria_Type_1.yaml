    - FDA-SE-pediatric-noncancer-062
    interpretation: >-
      Higher 24-hour urinary oxalate reflects greater hepatic oxalate
      overproduction and renal excretion; treatment-related reductions indicate
      reduced hepatic oxalate production.
    evidence:
    - reference: PMID:33789010
      reference_title: "Lumasiran, an RNAi Therapeutic for Primary Hyperoxaluria Type 1."
      supports: SUPPORT
      evidence_source: HUMAN_CLINICAL
      snippet: "Lumasiran, an investigational RNA interference (RNAi) therapeutic agent, reduces hepatic oxalate production by targeting glycolate oxidase."
      explanation: The trial states that lumasiran reduces hepatic oxalate production, the pathophysiology node that urinary oxalate reports on.
    - reference: PMID:33789010
      reference_title: "Lumasiran, an RNAi Therapeutic for Primary Hyperoxaluria Type 1."
      supports: SUPPORT
      evidence_source: HUMAN_CLINICAL
      snippet: "The primary end point was the percent change in 24-hour urinary oxalate excretion from baseline to month 6 (mean percent change across months 3 through 6)."
      explanation: ILLUMINATE-A used 24-hour urinary oxalate excretion as the primary pharmacodynamic endpoint.
    - reference: PMID:33789010
      reference_title: "Lumasiran, an RNAi Therapeutic for Primary Hyperoxaluria Type 1."
      supports: SUPPORT
      evidence_source: HUMAN_CLINICAL
      snippet: "The least-squares mean difference in the change in 24-hour urinary oxalate excretion (lumasiran minus placebo) was -53.5 percentage points (P<0.001), with a reduction in the lumasiran group of 65.4% and an effect seen as early as month 1."
      explanation: The phase 3 trial supports urinary oxalate as a treatment-responsive pharmacodynamic readout in PH1.
  evidence:
