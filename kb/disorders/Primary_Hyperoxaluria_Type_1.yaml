name: Primary Hyperoxaluria Type 1
category: Mendelian
creation_date: "2026-05-11T00:00:00Z"
updated_date: "2026-05-11T20:21:17Z"
synonyms:
- PH1
- Glycolic aciduria
- Peroxisomal alanine-glyoxylate aminotransferase deficiency
- Primary hyperoxaluria type I
description: >
  Primary hyperoxaluria type 1 is an autosomal recessive disorder of hepatic
  glyoxylate metabolism caused by biallelic AGXT pathogenic variants and
  deficiency of peroxisomal alanine-glyoxylate aminotransferase. Reduced AGT
  activity diverts glyoxylate to oxalate, producing hepatic oxalate
  overproduction, high urinary oxalate excretion, calcium oxalate crystal
  formation, nephrolithiasis, nephrocalcinosis, progressive kidney dysfunction,
  and, in advanced disease, systemic oxalosis. Targeted therapies include
  pyridoxine for responsive AGXT variants, RNA interference therapies that
  reduce hepatic oxalate production, and liver transplantation to restore
  hepatic AGT activity. Urinary oxalate is the FDA-listed surrogate endpoint for
  PH1 in adult and pediatric non-cancer tables.
