- name: Serially Homologous Autopod Malformation
  conforms_to: "limb_digit_patterning_serial_homology#Serially Homologous Autopod Malformation"
  description: >
    Because the autopod patterning program is serially reused in fore- and
    hindlimb, the perturbed GLI3 repressor gradient produces a coordinated
    malformation bundle across serially homologous elements: polysyndactyly
    affecting both the hands and the feet (preaxial and postaxial polydactyly,
    finger and toe syndactyly) rather than an isolated single-limb defect.
  role: consequence
