- name: Protein misfolding, aggregation and oxidative stress
  description: >
    Nearly all SCADD-associated ACADS variants are missense changes, and both the
    common variants and most rare variants impair folding and stability. In vitro
    studies show these variant proteins misfold and aggregate within mitochondria,
    especially at elevated temperatures, and this cellular toxicity has been linked
    to excessive reactive oxygen species production and chronic oxidative stress.
    This gain-of-toxicity mechanism, together with as-yet-unknown genetic and
    environmental modifiers, has been proposed to contribute to symptomatic disease
    in a subset of individuals, but no correlation between the degree of SCAD
    dysfunction and clinical phenotype has been established.
