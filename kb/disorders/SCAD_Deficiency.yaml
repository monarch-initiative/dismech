progression:
- notes: >-
    SCADD is a biochemical phenotype that is not predicted to cause clinical
    findings; long-term follow-up of individuals identified on newborn screening
    shows normal growth and development. Where nonspecific symptoms have been
    reported, they are generally uncomplicated and often transient, with many
    patients improving or normalizing over time.
pathophysiology:
- name: ACADS molecular function deficiency
  description: >
    Biallelic variants in ACADS reduce short-chain acyl-CoA dehydrogenase (SCAD)
    activity in the mitochondrial matrix. SCAD is a homotetrameric flavoprotein
    with a non-covalently bound FAD prosthetic group that catalyzes the first,
    FAD-dependent dehydrogenation step of beta-oxidation, with its physiologic
    role specific to butyryl-CoA. Most disease-associated variants are missense
    changes that impair folding and stability rather than abolishing intrinsic
    catalytic chemistry.
