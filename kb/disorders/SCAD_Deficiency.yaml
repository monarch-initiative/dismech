notes: >
  SCADD exemplifies the interpretive challenge of expanded newborn screening: an
  elevated C4 acylcarnitine reliably flags reduced SCAD activity, but the majority
  of individuals so identified remain asymptomatic, and the two common ACADS
  variants (c.511C>T, c.625G>A) behave as susceptibility alleles rather than
  fully penetrant mutations. The disorder is deliberately curated with UNKNOWN
  causal links from metabolite/protein-aggregation mechanisms to the nonspecific
  neuromuscular and developmental features, reflecting the unresolved debate over
  whether ACADS gene variants are disease-associated at all. Ethylmalonic aciduria
  is characteristic but not specific (also seen in glutaric acidemia type II,
  ethylmalonic encephalopathy, and some OXPHOS defects), and isobutyryl-CoA
  dehydrogenase deficiency must be distinguished as another cause of elevated C4
  on newborn screening.
