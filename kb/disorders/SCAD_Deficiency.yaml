- name: Toxic metabolite accumulation
  description: >
    Blocked short-chain beta-oxidation causes accumulation of butyryl-CoA, which
    is diverted into butyrylcarnitine, butyrylglycine, ethylmalonic acid (EMA),
    and methylsuccinic acid. EMA, the biochemical hallmark, is thought to form by
    carboxylation of excess butyryl-CoA by propionyl-CoA carboxylase. These
    metabolites appear in blood and urine and are the basis of newborn-screening
    detection, though levels may be normal when the individual is well and rise
    during fasting or illness.
