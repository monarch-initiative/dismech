- name: Impaired short-chain fatty acid beta-oxidation
  description: >
    Loss of SCAD activity blocks dehydrogenation of butyryl-CoA, the terminal
    short-chain step of the mitochondrial beta-oxidation spiral. Because SCAD acts
    only at the end of the cycle and its substrate specificity partly overlaps
    with MCAD, fasting ketogenesis and gluconeogenesis are largely preserved,
    which distinguishes SCADD from medium- and long-chain fatty acid oxidation
    disorders.
