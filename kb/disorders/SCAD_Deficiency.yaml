name: Short-Chain Acyl-CoA Dehydrogenase Deficiency
category: Genetic
creation_date: '2026-07-02T00:00:00Z'
synonyms:
- SCAD deficiency
- SCADD
- ACADS deficiency
- Deficiency of butyryl-CoA dehydrogenase
- Short-chain acyl-coenzyme A dehydrogenase deficiency
description: >
  Short-chain acyl-CoA dehydrogenase (SCAD) deficiency is an autosomal recessive
  disorder of mitochondrial fatty acid beta-oxidation caused by biallelic variants
  in ACADS, which encodes the FAD-dependent flavoprotein that catalyzes the first,
  dehydrogenation step of the beta-oxidation spiral for short-chain (C4-C6)
  acyl-CoA substrates, principally butyryl-CoA. Loss of SCAD activity blocks
  butyryl-CoA dehydrogenation, causing accumulation of butyryl-CoA and its
  byproducts: elevated butyrylcarnitine (C4 acylcarnitine) in blood and increased
  ethylmalonic acid, methylsuccinic acid, and butyrylglycine in urine, the
  biochemical hallmarks used for detection on tandem mass spectrometry newborn
  screening. In marked contrast to medium-chain (MCAD) and long-chain fatty acid
  oxidation disorders, SCADD does not typically produce hypoketotic hypoglycemia,
  rhabdomyolysis, or cardiomyopathy, and its clinical significance is debated:
  most individuals identified by newborn screening remain asymptomatic, and
  reported features in symptomatic cases (developmental delay, hypotonia, seizures,
  feeding difficulties, failure to thrive, behavioral disturbance) are nonspecific,
  often transient, and not correlated with genotype. Two common ACADS variants,
  c.511C>T (p.Arg147Trp) and c.625G>A (p.Gly185Ser), impair folding and stability
  and are regarded as susceptibility/variant alleles of uncertain clinical
  significance rather than fully penetrant pathogenic mutations.
