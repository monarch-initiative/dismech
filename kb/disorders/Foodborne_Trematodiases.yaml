infectious_agent:
- name: Clonorchis sinensis
  infectious_agent_term:
    preferred_term: Clonorchis sinensis
    term:
      id: NCBITaxon:79923
      label: Clonorchis sinensis
  description: Liver fluke implicated in foodborne trematodiases.
  evidence:
  - reference: PMID:19597009
    reference_title: "Food-borne trematodiases."
    supports: SUPPORT
    snippet: "An estimated 750 million people are at risk of infections with food-borne
      trematodes, which comprise liver flukes (Clonorchis sinensis, Fasciola gigantica,
      Fasciola hepatica, Opisthorchis felineus, and Opisthorchis viverrini), lung
      flukes (Paragonimus spp.), and intestinal flukes (e.g., Echinostoma spp., Fasciolopsis
      buski, and the heterophyids)."
    explanation: The abstract lists C. sinensis among the major liver flukes.
