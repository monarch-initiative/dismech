    term:
      id: CL:0000236
      label: B cell
  - preferred_term: plasmablast
    term:
      id: CL:0000980
      label: plasmablast
  - preferred_term: regulatory T cell
    term:
      id: CL:0000815
      label: regulatory T cell
  biological_processes:
