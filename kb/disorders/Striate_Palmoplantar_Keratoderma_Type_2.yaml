name: Striate Palmoplantar Keratoderma Type 2
creation_date: "2026-04-04T00:00:00Z"
updated_date: "2026-04-04T18:00:00Z"
description: >-
  Striate palmoplantar keratoderma type 2 (SPPK2) is an autosomal dominant
  skin disorder caused by heterozygous loss-of-function mutations in the
  desmoplakin (DSP) gene. It is the first inherited skin disorder in which
  haploinsufficiency of a structural component was identified as the mechanism.
  Affected individuals have a linear pattern of skin thickening on the fingers
  and palms and circumscribed areas of thickening on the soles. Affected skin
  shows loosening of intercellular connections, disruption of desmosome-keratin
  intermediate filament interactions, and rudimentary desmosomal structures.
  Unlike the biallelic DSP disorders (Carvajal syndrome, skin fragility-woolly
  hair), cardiac involvement is not a typical feature.
