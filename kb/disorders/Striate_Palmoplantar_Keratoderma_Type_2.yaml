pathophysiology:
  - name: Desmoplakin Haploinsufficiency in Epidermis
    description: >-
      Heterozygous null mutations in DSP result in haploinsufficiency of
      desmoplakin, reducing the dosage below the threshold needed for normal
      epidermal integrity. This causes loosening of intercellular connections,
      disruption of desmosome-keratin intermediate filament interactions, and
      formation of rudimentary desmosomal structures in areas of mechanical
      stress (palms and soles). Dosage of desmoplakin is critical in
      maintaining epidermal integrity, making this the first skin disorder
      attributed to haploinsufficiency of a structural protein.
    cell_types:
      - preferred_term: Keratinocyte
        term:
          id: CL:0000312
          label: keratinocyte
    biological_processes:
      - preferred_term: Desmosome organization
        term:
          id: GO:0002934
          label: desmosome organization
        modifier: DECREASED
    locations:
      - preferred_term: Skin of palm and sole
        term:
          id: UBERON:0013776
          label: skin of palmar/plantar part of autopod
    evidence:
      - reference: PMID:9887343
        supports: SUPPORT
        evidence_source: HUMAN_CLINICAL
        snippet: >-
          The mutation was a heterozygous C-->T transition in exon 4 of the
          desmoplakin gene and predicted a premature termination codon in the
          N-terminal region of the peptide.
        explanation: >-
          Identifies the first DSP mutation causing striate PPK through
          haploinsufficiency.
      - reference: PMID:9887343
        supports: SUPPORT
        evidence_source: HUMAN_CLINICAL
        snippet: >-
          This is the first reported mutation of desmo-plakin and also the
          first inherited skin disorder in which haploinsufficiency of a
          structural component has been implicated. It identifies dosage of
          desmoplakin as critical in maintaining epidermal integrity.
        explanation: >-
          Establishes DSP haploinsufficiency as a novel disease mechanism.
