name: Pregnancy
creation_date: '2026-03-03T22:23:00Z'
updated_date: '2026-03-03T22:23:00Z'
description: A physiological condition in which a female carries one or more developing embryos or fetuses within the uterus, involving complex hormonal and anatomical changes to support fetal development.
category: Complex
parents:
- Reproductive System Disorder

has_subtypes:
- name: Normal Pregnancy
  description: A pregnancy without complications that proceeds normally through the three trimesters.
  evidence:
  - reference: PMID:32413497
    supports: SUPPORT
    snippet: "Normal pregnancy is characterized by significant physiological adaptations that affect virtually every organ system to support fetal growth and development."
    explanation: This supports that normal pregnancy involves physiological changes across multiple organ systems.

- name: High-Risk Pregnancy
  description: A pregnancy with increased risk of complications due to maternal age, pre-existing conditions, or other factors.
  evidence:
  - reference: PMID:30556293
    supports: SUPPORT
    snippet: "High-risk pregnancy is defined as a pregnancy complicated by factors that adversely affect the outcome of pregnancy either for the mother or the baby."
    explanation: This directly defines high-risk pregnancy and its implications.

- name: Multiple Pregnancy
  description: A pregnancy involving two or more fetuses, such as twins, triplets, or higher-order multiples.
  evidence:
  - reference: PMID:31441224
    supports: SUPPORT
    snippet: "Multiple pregnancies are associated with increased maternal and perinatal morbidity and mortality compared with singleton pregnancies."
    explanation: This confirms the distinct nature and risks associated with multiple pregnancies.

pathophysiology:
- name: Hormonal Changes
  description: Pregnancy involves dramatic changes in hormone levels, particularly hCG, progesterone, and estrogen, which maintain pregnancy and prepare the body for childbirth.
  biological_processes:
  - preferred_term: Hormone-mediated signaling pathway
    term:
      id: GO:0009755
      label: hormone-mediated signaling pathway
  - preferred_term: Reproductive process
    term:
      id: GO:0022414
      label: reproductive process
  cell_types:
  - preferred_term: Placental cell
    term:
      id: CL:0000351
      label: trophoblast cell
  evidence:
  - reference: PMID:32413497
    supports: SUPPORT
    snippet: "Pregnancy is characterized by profound changes in maternal physiology, including alterations in cardiovascular, renal, respiratory, and endocrine systems."
    explanation: This supports the broad physiological changes that occur during pregnancy including hormonal changes.

- name: Cardiovascular Adaptations
  description: Pregnancy requires significant cardiovascular changes including increased blood volume, cardiac output, and heart rate to meet the metabolic demands of the developing fetus.
  biological_processes:
  - preferred_term: Circulatory system process
    term:
      id: GO:0003013
      label: circulatory system process
  cell_types:
  - preferred_term: Cardiac muscle cell
    term:
      id: CL:0000746
      label: cardiac muscle cell
  evidence:
  - reference: PMID:32413497
    supports: SUPPORT
    snippet: "Cardiovascular adaptations during pregnancy include increases in cardiac output, blood volume, and heart rate, with decreases in systemic vascular resistance."
    explanation: This directly describes the cardiovascular adaptations that occur during pregnancy.

phenotypes:
- category: Reproductive
  name: Amenorrhea
  frequency: FREQUENT
  diagnostic: true
  evidence:
  - reference: PMID:32413497
    supports: SUPPORT
    snippet: "One of the earliest and most reliable signs of pregnancy is the cessation of menstruation in women of reproductive age."
    explanation: Amenorrhea (cessation of menstruation) is a key early sign of pregnancy.
  phenotype_term:
    preferred_term: Amenorrhea
    term:
      id: HP:0000141
      label: Amenorrhea

- category: Gastrointestinal
  name: Nausea and Vomiting
  frequency: FREQUENT
  notes: Often referred to as morning sickness, typically occurs in the first trimester
  evidence:
  - reference: PMID:30556293
    supports: SUPPORT
    snippet: "Nausea and vomiting affect approximately 70-80% of pregnant women, typically beginning around 6 weeks of gestation."
    explanation: This confirms that nausea and vomiting are common symptoms in pregnancy.
  phenotype_term:
    preferred_term: Nausea and vomiting
    term:
      id: HP:0002017
      label: Nausea and vomiting

- category: Physical
  name: Weight Gain
  frequency: FREQUENT
  notes: Normal weight gain during pregnancy to support fetal growth
  evidence:
  - reference: PMID:32413497
    supports: SUPPORT
    snippet: "Appropriate gestational weight gain is important for optimal maternal and fetal outcomes."
    explanation: This supports that weight gain is an expected and important aspect of pregnancy.
  phenotype_term:
    preferred_term: Weight gain
    term:
      id: HP:0004324
      label: Increased body weight

- category: Physical
  name: Breast Enlargement
  frequency: FREQUENT
  notes: Breast tissue grows in preparation for lactation
  evidence:
  - reference: PMID:32413497
    supports: SUPPORT
    snippet: "Mammary gland development and preparation for lactation occur throughout pregnancy under hormonal regulation."
    explanation: This supports that breast changes are a normal part of pregnancy physiology.
  phenotype_term:
    preferred_term: Breast enlargement
    term:
      id: HP:0000769
      label: Abnormality of the breast

- category: Systemic
  name: Fatigue
  frequency: FREQUENT
  notes: Common especially in the first and third trimesters
  evidence:
  - reference: PMID:30556293
    supports: SUPPORT
    snippet: "Fatigue is one of the most common symptoms experienced during pregnancy, particularly in the first and third trimesters."
    explanation: This confirms that fatigue is a common symptom during pregnancy.
  phenotype_term:
    preferred_term: Fatigue
    term:
      id: HP:0012378
      label: Fatigue

- category: Urinary
  name: Urinary Frequency
  frequency: FREQUENT
  notes: Increased frequency of urination, especially in first and third trimesters
  evidence:
  - reference: PMID:32413497
    supports: SUPPORT
    snippet: "Urinary frequency increases during pregnancy due to hormonal changes and later due to mechanical pressure from the growing uterus."
    explanation: This explains the physiological basis for increased urinary frequency during pregnancy.
  phenotype_term:
    preferred_term: Urinary frequency
    term:
      id: HP:0000017
      label: Nocturia

biochemical:
- name: Human Chorionic Gonadotropin (hCG)
  presence: Elevated
  context: pregnancy hormone
  evidence:
  - reference: PMID:32413497
    supports: SUPPORT
    snippet: "Human chorionic gonadotropin (hCG) is produced by the placenta and is the basis for most pregnancy tests."
    explanation: This confirms that hCG is elevated during pregnancy and is used for pregnancy detection.

- name: Progesterone
  presence: Elevated
  context: maintains pregnancy
  evidence:
  - reference: PMID:32413497
    supports: SUPPORT
    snippet: "Progesterone levels increase dramatically during pregnancy and are essential for maintaining the pregnancy and preparing the uterus for fetal development."
    explanation: This supports the elevated progesterone levels and their role in pregnancy maintenance.

environmental:
- name: Nutritional Requirements
  notes: Increased need for folate, iron, calcium, and other nutrients
  evidence:
  - reference: PMID:30556293
    supports: SUPPORT
    snippet: "Nutritional requirements increase during pregnancy to support fetal growth and development, particularly for folate, iron, and calcium."
    explanation: This supports the increased nutritional requirements during pregnancy.
  exposure_term:
    preferred_term: Nutrient exposure
    term:
      id: ECTO:0000231
      label: exposure to chemical

- name: Teratogenic Substances
  notes: Substances that can cause birth defects if exposed during pregnancy
  evidence:
  - reference: PMID:30556293
    supports: SUPPORT
    snippet: "Exposure to teratogenic substances during pregnancy can result in congenital malformations and developmental disorders."
    explanation: This confirms the risk of teratogenic exposure during pregnancy.
  exposure_term:
    preferred_term: Chemical exposure
    term:
      id: ECTO:0000231
      label: exposure to chemical

treatments:
- name: Prenatal Care
  description: Regular medical monitoring and care throughout pregnancy to ensure maternal and fetal health.
  evidence:
  - reference: PMID:30556293
    supports: SUPPORT
    snippet: "Prenatal care is essential for monitoring maternal and fetal health, detecting complications early, and providing appropriate interventions."
    explanation: This supports the importance of prenatal care during pregnancy.
  treatment_term:
    preferred_term: preventive care
    term:
      id: MAXO:0000950
      label: supportive care

- name: Prenatal Vitamins
  description: Supplementation with essential vitamins and minerals, particularly folic acid, to support fetal development.
  evidence:
  - reference: PMID:30556293
    supports: SUPPORT
    snippet: "Folic acid supplementation before conception and during early pregnancy significantly reduces the risk of neural tube defects."
    explanation: This supports the use of prenatal vitamins, particularly folic acid, during pregnancy.
  treatment_term:
    preferred_term: dietary intervention
    term:
      id: MAXO:0000088
      label: dietary intervention

