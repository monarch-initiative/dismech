    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      We conclude that FAM46A mutations are responsible for a severe form of OI
      with congenital bowing of the lower limbs
    explanation: >-
      Documents congenital long-bone (lower-limb) bowing as a defining feature
      of FAM46A/TENT5A OI type XVIII.
- name: Reduced Bone Mineral Density
  description: >-
    Skeletal hypomineralization with reduced bone mineral density, reflecting
    the defective, collagen-deficient bone matrix.
  phenotype_term:
    preferred_term: Reduced bone mineral density
    term:
      id: HP:0004349
      label: Reduced bone mineral density
  evidence:
  - reference: PMID:33882302
    reference_title: "Cytoplasmic polyadenylation by TENT5A is required for proper bone formation."
    supports: SUPPORT
    evidence_source: MODEL_ORGANISM
    snippet: >-
      the Tent5a knockout (KO) mouse line displays bone fragility and skeletal
      hypomineralization phenotype resulting from quantitative and qualitative
      collagen defects.
    explanation: >-
      The Tent5a-null mouse shows skeletal hypomineralization, the model
