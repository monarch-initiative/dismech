    evidence_source: MODEL_ORGANISM
    snippet: >-
      an ENU-derived (N-ethyl-N-nitrosourea) mouse model characterised by
      decreased body length, limb, rib, pelvis, and skull deformities
    explanation: >-
      The Fam46a mutant mouse shows decreased body length (growth deficiency),
