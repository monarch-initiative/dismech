    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: >-
      TENT5A, whose mutations were found in congenital bone disease osteogenesis
      imperfecta patients, is a cytoplasmic poly(A) polymerase playing a crucial
      role in regulating bone mineralization.
    explanation: >-
      Identifies TENT5A as the cytoplasmic poly(A) polymerase whose loss causes
