genetic:
- name: TENT5A (FAM46A) Loss-of-Function Mutations
  association: Causative
  gene_term:
    preferred_term: TENT5A (terminal nucleotidyltransferase 5A; cytoplasmic poly(A) polymerase)
    term:
      id: hgnc:18345
      label: TENT5A
  notes: >-
    OI type XVIII is caused by biallelic loss-of-function variants in TENT5A.
    The gene was previously named FAM46A (family with sequence similarity 46
    member A) and is the symbol used in the original disease-gene report.
    Reported alleles include a frameshift (p.Ser205Tyrfs*13) and homozygous
    missense variants classed as deleterious (p.His127Arg in two affected sibs;
    p.Asp231Gly in a type III OI patient of consanguineous parents). TENT5A is a
    member of the nucleotidyltransferase fold superfamily.
  evidence:
  - reference: PMID:29358272
    reference_title: "FAM46A mutations are responsible for autosomal recessive osteogenesis imperfecta."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      We identified a homozygous deleterious variant in FAM46A in two affected
      sibs with typical OI
    explanation: >-
      Documents a causative homozygous FAM46A (TENT5A) variant segregating with
      OI, defining the disease gene for type XVIII.
  - reference: PMID:29358272
    reference_title: "FAM46A mutations are responsible for autosomal recessive osteogenesis imperfecta."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      FAM46A is a member of the superfamily of nucleotidyltransferase fold
      proteins
    explanation: >-
      Classifies FAM46A/TENT5A as a nucleotidyltransferase-fold protein,
      consistent with its later-defined poly(A) polymerase activity.
phenotypes:
- name: Recurrent Fractures
