    reference_title: "FAM46A mutations are responsible for autosomal recessive osteogenesis imperfecta."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Survivors develop progressive scoliosis and spontaneous fractures.
    explanation: >-
      Documents spontaneous fractures in the clinical spectrum of patients,
      consistent with the bone fragility of OI type XVIII.
- name: Congenital Bowing of the Long Bones
  description: >-
    Congenital bowing and deformity of the long bones (notably the lower limbs)
    is a hallmark presenting feature of OI type XVIII, reflecting the fragile,
    deformable bone matrix.
  phenotype_term:
    preferred_term: Bowing of the long bones
    term:
