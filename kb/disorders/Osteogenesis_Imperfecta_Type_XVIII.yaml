name: Osteogenesis Imperfecta Type XVIII
creation_date: "2026-06-30T00:00:00Z"
category: Mendelian
disease_term:
  preferred_term: Osteogenesis imperfecta type 18
  term:
    id: MONDO:0044329
    label: osteogenesis imperfecta, type 18
description: >-
  Osteogenesis imperfecta type XVIII (OI type XVIII; OMIM 617952) is a severe
  autosomal recessive brittle bone disease caused by biallelic loss-of-function
  variants in TENT5A (terminal nucleotidyltransferase 5A; previously named
  FAM46A). TENT5A is a non-canonical cytoplasmic poly(A) polymerase that is
  induced during osteoblast differentiation and polyadenylates mRNAs encoding
  type I collagen (Col1a1, Col1a2) and other secreted bone extracellular-matrix
  proteins, thereby stabilizing those transcripts and increasing their
  expression. Biallelic TENT5A loss removes this post-transcriptional support,
  destabilizing the osteoblast secretome mRNAs and reducing production of bone
  matrix proteins, including type I collagen. The resulting quantitative and
  qualitative collagen defect yields a defective, hypomineralized bone matrix
  and skeletal fragility, clinically manifesting as congenital bowing of the
  long bones, recurrent fractures, vertebral collapse, blue sclerae, wormian
  bones, and bone deformity in the first years of life. The disorder was defined
  in consanguineous human kindreds (Doyard et al., 2018) and is recapitulated by
  the Tent5a-knockout mouse, which displays bone fragility and skeletal
  hypomineralization from quantitative and qualitative collagen defects.
