pathophysiology:
- name: TENT5A (FAM46A) Loss Eliminates Cytoplasmic Polyadenylation of Osteoblast ECM mRNAs
  description: >-
    TENT5A (terminal nucleotidyltransferase 5A, previously FAM46A) is a
    non-canonical cytoplasmic poly(A) polymerase that is induced during
    osteoblast differentiation and polyadenylates mRNAs encoding type I collagen
    (Col1a1, Col1a2) and other secreted proteins involved in osteogenesis,
    stabilizing them and increasing their expression. FAM46A/TENT5A is
    specifically expressed in human osteoblasts. Biallelic loss-of-function
    TENT5A variants eliminate this cytoplasmic polyadenylation activity, the
    proximal molecular lesion of the disorder.
  cell_types:
