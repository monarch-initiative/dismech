  downstream:
  - target: Destabilized Collagen/ECM Transcripts and Reduced Bone Matrix Protein Output
    description: >-
      Without TENT5A-dependent cytoplasmic polyadenylation, the collagen and
      secreted-matrix mRNAs are no longer stabilized, so production of type I
      collagen and other bone matrix proteins falls.
- name: Destabilized Collagen/ECM Transcripts and Reduced Bone Matrix Protein Output
  description: >-
    Loss of TENT5A cytoplasmic polyadenylation removes the post-transcriptional
    support for osteoblast secretome transcripts, reducing expression of type I
    collagen (Col1a1, Col1a2) and other matrix proteins. The result is a
    quantitative and qualitative deficit in collagen and bone matrix protein
    output by osteoblasts, the post-transcriptional counterpart of the collagen
    defects seen in classical (COL1A1/COL1A2) OI.
