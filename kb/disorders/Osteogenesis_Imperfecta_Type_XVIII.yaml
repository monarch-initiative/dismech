  - reference: PMID:33882302
    reference_title: "Cytoplasmic polyadenylation by TENT5A is required for proper bone formation."
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: >-
      TENT5A is induced during osteoblast differentiation and polyadenylates
      mRNAs encoding Col1α1, Col1α2, and other secreted proteins involved in
      osteogenesis, increasing their expression.
    explanation: >-
      Documents the molecular function lost in OI type XVIII: TENT5A
      polyadenylates collagen and secretome mRNAs in differentiating osteoblasts
      to increase their expression.
  - reference: PMID:29358272
    reference_title: "FAM46A mutations are responsible for autosomal recessive osteogenesis imperfecta."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
