name: STAT5B Deficiency
creation_date: "2026-04-16T19:36:58Z"
updated_date: "2026-04-16T19:36:58Z"
category: Mendelian
description: >-
  STAT5B deficiency is a rare gene-level inborn error of immunity caused by
  loss-of-function STAT5B variants. The phenotype combines severe postnatal
  growth hormone insensitivity with low IGF-I, short stature, eczema,
  recurrent infections, chronic pulmonary disease, and autoimmunity.
  Mechanistically, impaired GH-JAK2-STAT5B signaling blunts IGF1 induction,
  while defective STAT5B-dependent cytokine signaling destabilizes
  FOXP3-positive regulatory T-cell homeostasis and broader adaptive immune
  regulation.
disease_term:
  preferred_term: STAT5B deficiency
  term:
    id: MONDO:0100211
    label: growth hormone insensitivity with immune dysregulation 1, autosomal recessive
parents:
- Combined immunodeficiency
- Primary Immunodeficiency
- Endocrine Disorder
inheritance:
- name: Autosomal recessive
  inheritance_term:
    preferred_term: Autosomal recessive inheritance
    term:
      id: HP:0000007
      label: Autosomal recessive inheritance
  description: >-
    Classic STAT5B deficiency with combined endocrine and immune disease is the
    autosomal recessive loss-of-function form.
  evidence:
  - reference: PMID:33122102
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Inactivating STAT5B mutations, both autosomal recessive (AR) and
      dominant-negative (DN), are causal of a spectrum of GH insensitivity
      (GHI) syndrome, IGF-I deficiency and postnatal growth failure. Only AR
      STAT5B defects, however, confer additional characteristics of immune
      dysfunction which can manifest as chronic, potentially fatal, pulmonary
      disease.
    explanation: >-
      Supports autosomal recessive inheritance for the classic STAT5B
      deficiency syndrome that includes severe immune dysregulation and
      pulmonary disease.
pathophysiology:
- name: Impaired GH-induced IGF-I production
  description: >-
    Loss of functional STAT5B interrupts the core GH receptor-JAK2-STAT5B
    transcriptional axis required for normal IGF-I production, producing severe
    postnatal growth hormone insensitivity.
  gene:
    preferred_term: STAT5B
    modifier: DECREASED
    term:
      id: hgnc:11368
      label: STAT5B
  evidence:
  - reference: PMID:26703237
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      The critical importance of STAT5B in human IGF-I production was confirmed
      with the identification of the first homozygous, autosomal recessive,
      STAT5B mutation in a young female patient who phenotypically resembled
      patients with classical growth hormone insensitivity (GHI) syndrome
      (Laron syndrome) due to mutations in the GHR gene, presenting with
      severe postnatal growth failure and marked IGF-I deficiency.
    explanation: >-
      Directly supports impaired STAT5B-dependent IGF-I production as the core
      endocrine mechanism underlying postnatal growth failure.
- name: FOXP3-positive regulatory T-cell dysfunction
  description: >-
    STAT5B deficiency impairs regulatory T-cell maintenance and suppressive
    function, weakening immune tolerance and promoting downstream
    autoimmunity.
  cell_types:
  - preferred_term: regulatory T cell
    term:
      id: CL:0000815
      label: regulatory T cell
  biological_processes:
  - preferred_term: negative regulation of immune response
    term:
      id: GO:0050777
      label: negative regulation of immune response
    modifier: DECREASED
  evidence:
  - reference: PMID:23773921
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Functional ex vivo studies in homozygous STAT5B-deficient patients
      showed reduced FOXP3 expression with impaired regulatory function of
      STAT5B-null Treg cells, also of increased memory phenotype.
    explanation: >-
      Patient-derived Treg studies directly link STAT5B loss to impaired FOXP3
      expression and defective regulatory function.
- name: Adaptive immune dysregulation
  description: >-
    Beyond Treg dysfunction, STAT5B deficiency drives B-cell hyperactivity and
    abnormal memory T-cell differentiation, producing combined immune
    dysregulation with atopy, chronic infections, and autoimmunity.
  cell_types:
  - preferred_term: B cell
    term:
      id: CL:0000236
      label: B cell
  - preferred_term: CD8-positive alpha-beta T cell
    term:
      id: CL:0000625
      label: CD8-positive, alpha-beta T cell
  evidence:
  - reference: PMID:33090292
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      All three siblings demonstrated consistent B cell hyperactivity
      including elevated IgE levels and autoantibody production, associated
      with diagnoses of atopy and autoimmunity.
    explanation: >-
      Longitudinal patient data support a broad adaptive immune dysregulation
      phenotype with B-cell hyperactivity and autoimmunity.
  - reference: PMID:33090292
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Progressive dysregulation of FOXP3+ regulatory T cells and CD8+ memory
      T cell subsets reveal a crucial role of STAT5B in T cell homeostasis.
    explanation: >-
      Supports abnormal T-cell homeostasis as a central downstream immune
      mechanism in STAT5B deficiency.
- name: Chronic pulmonary disease
  description: >-
    STAT5B deficiency frequently progresses to severe chronic lung disease,
    including interstitial inflammatory and fibrotic complications, and is a
    major contributor to morbidity and mortality.
  evidence:
  - reference: PMID:33122102
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Shared symptoms amongst the 11 AR STAT5B deficient probands include
      severe eczema (9 out of 9), auto-immune thyroiditis (7 out of 11),
      chronic pulmonary disease (8 out of 11) manifesting as early as the
      first year of life (54,57,58), and confirmed lung fibrosis and/or
      lymphoid interstitial pneumonia (LIP) (7 out of 9), a condition of
      unknown etiology that is rare in children and associated with autoimmune
      disease (84).
    explanation: >-
      Cohort-level review data support chronic inflammatory and fibrotic lung
      disease as a defining major end-organ complication.
