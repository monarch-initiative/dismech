    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      The critical importance of STAT5B in human IGF-I production was
      confirmed with the identification of the first homozygous, autosomal
      recessive, STAT5B mutation in a young female patient who phenotypically
      resembled patients with classical growth hormone insensitivity (GHI)
      syndrome (Laron syndrome) due to mutations in the GHR gene, presenting
      with severe postnatal growth failure and marked IGF-I deficiency.
    explanation: >-
      Supports severe growth failure and short stature as a near-universal
      endocrine phenotype of classic STAT5B deficiency.
- name: Recurrent infections
  category: Immunologic
  frequency: FREQUENT
  phenotype_term:
    preferred_term: Recurrent infections
    term:
      id: HP:0002719
      label: Recurrent infections
  evidence:
  - reference: PMID:33090292
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Patients with rare homozygous mutations in signal transducer and
      activator of transcription 5B (STAT5B) develop immunodeficiency
      resulting in chronic eczema, chronic infections, autoimmunity, and
      chronic lung disease.
    explanation: >-
      Supports recurrent infectious susceptibility as a core clinical
      consequence of STAT5B-associated immunodeficiency.
- name: Autoimmunity
  category: Immunologic
  phenotype_term:
    preferred_term: Autoimmunity
    term:
      id: HP:0002960
      label: Autoimmunity
  evidence:
  - reference: PMID:22912632
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Most subjects with STAT5b deficiency show severe eczema, and autoimmune
      disease (juvenile idiopathic arthritis, autoimmune thyroiditis,
      idiopathic thrombocytic purpura) which are thought to be associated with
      Treg dysfunction.
    explanation: >-
      Review-level human evidence establishes autoimmunity as a major phenotype
      linked to Treg dysfunction.
