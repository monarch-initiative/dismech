    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      At presentation, our STAT5B deficient siblings exhibited severe short
      stature, atopic eczema, autoimmune thyroiditis, and chronic infections.
    explanation: >-
      Early longitudinal patient data support severe eczematous atopic disease
      as a characteristic immune phenotype.
