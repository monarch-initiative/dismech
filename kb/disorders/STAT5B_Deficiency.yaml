    snippet: >-
      Shared symptoms amongst the 11 AR STAT5B deficient probands include
      severe eczema (9 out of 9), auto-immune thyroiditis (7 out of 11),
      chronic pulmonary disease (8 out of 11) manifesting as early as the
      first year of life (54,57,58), and confirmed lung fibrosis and/or
      lymphoid interstitial pneumonia (LIP) (7 out of 9), a condition of
      unknown etiology that is rare in children and associated with autoimmune
      disease (84).
    explanation: >-
      Supports pulmonary fibrosis within the chronic lung disease spectrum of
      autosomal recessive STAT5B deficiency.
biochemical:
- name: Serum IGF-I
  presence: Decreased
  context: >-
    Low serum IGF-I despite preserved GH secretion is a hallmark biochemical
    consequence of impaired STAT5B-dependent GH signaling.
  evidence:
  - reference: PMID:33122102
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Serum IGF-I, IGFBP-3 and ALS concentrations in all cases were abnormally
      low, and remained low after GH treatment, during IGF-I generation tests
      (45,55,83) or during GH therapy (54,56).
    explanation: >-
      Directly supports low IGF-I as the defining biochemical correlate of GH
      insensitivity in STAT5B deficiency.
genetic:
- name: STAT5B
  gene_term:
    preferred_term: STAT5B
    term:
      id: hgnc:11368
      label: STAT5B
  association: Causative
  notes: >-
    Biallelic loss-of-function STAT5B variants cause the classic deficiency
    phenotype curated here. Dominant-negative heterozygous STAT5B syndromes are
    related but are not collapsed into this autosomal recessive entry.
  evidence:
  - reference: PMID:28590503
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Homozygous STAT5B mutations causing growth hormone insensitivity with
      immune dysfunction were described in 10 patients since 2003, including
      two Brazilian brothers from the south of Brazil.
    explanation: >-
      Supports STAT5B as the causal gene for the classic homozygous deficiency
      syndrome with combined endocrine and immune features.
