name: STAT5B Deficiency
creation_date: "2026-04-16T19:36:58Z"
updated_date: "2026-04-18T02:09:45Z"
category: Mendelian
description: >-
  STAT5B deficiency is a rare gene-level inborn error of immunity caused by
  loss-of-function STAT5B variants. The phenotype combines severe postnatal
  growth hormone insensitivity with low IGF-I, short stature, eczema,
  recurrent infections, chronic pulmonary disease, and autoimmunity.
  Mechanistically, impaired GH-JAK2-STAT5B signaling blunts IGF1 induction,
  while defective STAT5B-dependent cytokine signaling destabilizes
  FOXP3-positive regulatory T-cell homeostasis and broader adaptive immune
  regulation.
disease_term:
  preferred_term: STAT5B deficiency
  term:
    id: MONDO:0100211
    label: growth hormone insensitivity with immune dysregulation 1, autosomal recessive
parents:
- Combined immunodeficiency
- Primary Immunodeficiency
- Endocrine Disorder
inheritance:
- name: Autosomal recessive
  inheritance_term:
    preferred_term: Autosomal recessive inheritance
    term:
      id: HP:0000007
      label: Autosomal recessive inheritance
  description: >-
    Classic STAT5B deficiency with combined endocrine and immune disease is the
    autosomal recessive loss-of-function form.
  evidence:
  - reference: PMID:33122102
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Inactivating STAT5B mutations, both autosomal recessive (AR) and
      dominant-negative (DN), are causal of a spectrum of GH insensitivity
      (GHI) syndrome, IGF-I deficiency and postnatal growth failure. Only AR
      STAT5B defects, however, confer additional characteristics of immune
      dysfunction which can manifest as chronic, potentially fatal, pulmonary
      disease.
    explanation: >-
      Supports autosomal recessive inheritance for the classic STAT5B
      deficiency syndrome that includes severe immune dysregulation and
      pulmonary disease.
pathophysiology:
- name: Impaired GH-induced IGF-I production
  description: >-
    Loss of functional STAT5B interrupts the core GH receptor-JAK2-STAT5B
    transcriptional axis required for normal IGF-I production, producing severe
    postnatal growth hormone insensitivity.
  gene:
    preferred_term: STAT5B
    modifier: DECREASED
    term:
      id: hgnc:11368
      label: STAT5B
  evidence:
  - reference: PMID:26703237
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      The critical importance of STAT5B in human IGF-I production was confirmed
      with the identification of the first homozygous, autosomal recessive,
      STAT5B mutation in a young female patient who phenotypically resembled
      patients with classical growth hormone insensitivity (GHI) syndrome
      (Laron syndrome) due to mutations in the GHR gene, presenting with
      severe postnatal growth failure and marked IGF-I deficiency.
    explanation: >-
      Directly supports impaired STAT5B-dependent IGF-I production as the core
      endocrine mechanism underlying postnatal growth failure.
- name: FOXP3-positive regulatory T-cell dysfunction
  description: >-
    STAT5B deficiency impairs regulatory T-cell maintenance and suppressive
    function, weakening immune tolerance and promoting downstream
    autoimmunity.
  cell_types:
  - preferred_term: regulatory T cell
    term:
      id: CL:0000815
      label: regulatory T cell
  biological_processes:
  - preferred_term: negative regulation of immune response
    term:
      id: GO:0050777
      label: negative regulation of immune response
    modifier: DECREASED
  evidence:
  - reference: PMID:23773921
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Functional ex vivo studies in homozygous STAT5B-deficient patients
      showed reduced FOXP3 expression with impaired regulatory function of
      STAT5B-null Treg cells, also of increased memory phenotype.
    explanation: >-
      Patient-derived Treg studies directly link STAT5B loss to impaired FOXP3
      expression and defective regulatory function.
  downstream:
  - target: Adaptive immune dysregulation
    causal_link_type: DIRECT
    description: >-
      Loss of FOXP3-positive regulatory T-cell suppression propagates broader
      adaptive immune dysregulation with autoimmunity, atopy, and chronic
      infection susceptibility.
- name: Adaptive immune dysregulation
  description: >-
    Beyond Treg dysfunction, STAT5B deficiency drives B-cell hyperactivity and
    abnormal memory T-cell differentiation, producing combined immune
    dysregulation with atopy, chronic infections, and autoimmunity.
  cell_types:
  - preferred_term: B cell
    term:
      id: CL:0000236
      label: B cell
  - preferred_term: CD8-positive alpha-beta T cell
    term:
      id: CL:0000625
      label: CD8-positive, alpha-beta T cell
  evidence:
  - reference: PMID:33090292
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      All three siblings demonstrated consistent B cell hyperactivity
      including elevated IgE levels and autoantibody production, associated
      with diagnoses of atopy and autoimmunity.
    explanation: >-
      Longitudinal patient data support a broad adaptive immune dysregulation
      phenotype with B-cell hyperactivity and autoimmunity.
  - reference: PMID:33090292
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Progressive dysregulation of FOXP3+ regulatory T cells and CD8+ memory
      T cell subsets reveal a crucial role of STAT5B in T cell homeostasis.
    explanation: >-
      Supports abnormal T-cell homeostasis as a central downstream immune
      mechanism in STAT5B deficiency.
  downstream:
  - target: Chronic pulmonary disease
    causal_link_type: DIRECT
    description: >-
      Progressive immune dysregulation is associated with the interstitial and
      fibrotic lung complications that dominate STAT5B-related morbidity.
- name: Chronic pulmonary disease
  description: >-
    STAT5B deficiency frequently progresses to severe chronic lung disease,
    including interstitial inflammatory and fibrotic complications, and is a
    major contributor to morbidity and mortality.
  cell_types:
  - preferred_term: T cell
    term:
      id: CL:0000084
      label: T cell
  biological_processes:
  - preferred_term: inflammatory response
    term:
      id: GO:0006954
      label: inflammatory response
    modifier: INCREASED
  - preferred_term: T cell activation
    term:
      id: GO:0042110
      label: T cell activation
    modifier: INCREASED
  evidence:
  - reference: PMID:33122102
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Shared symptoms amongst the 11 AR STAT5B deficient probands include
      severe eczema (9 out of 9), auto-immune thyroiditis (7 out of 11),
      chronic pulmonary disease (8 out of 11) manifesting as early as the
      first year of life (54,57,58), and confirmed lung fibrosis and/or
      lymphoid interstitial pneumonia (LIP) (7 out of 9), a condition of
      unknown etiology that is rare in children and associated with autoimmune
      disease (84).
    explanation: >-
      Cohort-level review data support chronic inflammatory and fibrotic lung
      disease as a defining major end-organ complication.
  - reference: PMID:22912632
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      These pulmonary lesions are T cell predominant, despite peripheral
      lymphopenia.
    explanation: >-
      Supports explicit T-cell annotation for the lung disease node and
      reinforces that pulmonary pathology is inflammatory and lymphocyte driven.
phenotypes:
- name: Short stature
  category: Growth
  phenotype_term:
    preferred_term: Short stature
    term:
      id: HP:0004322
      label: Short stature
  evidence:
  - reference: PMID:33122102
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Patients with molecular STAT5B defects, similar to GHR deficient
      patients, present with growth hormone insensitivity (GHI) syndrome
      (MIM262500), severe insulin-like growth factor (IGF)-1 deficiency
      (IGFD), and profound postnatal growth failure (4).
    explanation: >-
      Supports severe growth failure and short stature as a core endocrine
      phenotype of classic STAT5B deficiency.
- name: Recurrent infections
  category: Immunologic
  phenotype_term:
    preferred_term: Recurrent infections
    term:
      id: HP:0002719
      label: Recurrent infections
  evidence:
  - reference: PMID:33090292
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Patients with rare homozygous mutations in signal transducer and
      activator of transcription 5B (STAT5B) develop immunodeficiency
      resulting in chronic eczema, chronic infections, autoimmunity, and
      chronic lung disease.
    explanation: >-
      Supports recurrent infectious susceptibility as a core clinical
      consequence of STAT5B-associated immunodeficiency.
- name: Autoimmunity
  category: Immunologic
  phenotype_term:
    preferred_term: Autoimmunity
    term:
      id: HP:0002960
      label: Autoimmunity
  evidence:
  - reference: PMID:22912632
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Most subjects with STAT5b deficiency show severe eczema, and autoimmune
      disease (juvenile idiopathic arthritis, autoimmune thyroiditis,
      idiopathic thrombocytic purpura) which are thought to be associated with
      Treg dysfunction.
    explanation: >-
      Review-level human evidence establishes autoimmunity as a major phenotype
      linked to Treg dysfunction.
- name: Atopic dermatitis
  category: Immunologic
  frequency: FREQUENT
  phenotype_term:
    preferred_term: Atopic dermatitis
    term:
      id: HP:0001047
      label: Atopic dermatitis
  evidence:
  - reference: PMID:33122102
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Shared symptoms amongst the 11 AR STAT5B deficient probands include
      severe eczema (9 out of 9), auto-immune thyroiditis (7 out of 11),
      chronic pulmonary disease (8 out of 11) manifesting as early as the
      first year of life (54,57,58), and confirmed lung fibrosis and/or
      lymphoid interstitial pneumonia (LIP) (7 out of 9), a condition of
      unknown etiology that is rare in children and associated with autoimmune
      disease (84).
    explanation: >-
      Cohort-style review evidence supports eczematous dermatitis as a common
      immune phenotype in autosomal recessive STAT5B deficiency.
- name: Pulmonary fibrosis
  category: Respiratory
  frequency: FREQUENT
  phenotype_term:
    preferred_term: Pulmonary fibrosis
    term:
      id: HP:0002206
      label: Pulmonary fibrosis
  evidence:
  - reference: PMID:33122102
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Shared symptoms amongst the 11 AR STAT5B deficient probands include
      severe eczema (9 out of 9), auto-immune thyroiditis (7 out of 11),
      chronic pulmonary disease (8 out of 11) manifesting as early as the
      first year of life (54,57,58), and confirmed lung fibrosis and/or
      lymphoid interstitial pneumonia (LIP) (7 out of 9), a condition of
      unknown etiology that is rare in children and associated with autoimmune
      disease (84).
    explanation: >-
      Supports pulmonary fibrosis within the chronic lung disease spectrum of
      autosomal recessive STAT5B deficiency.
treatments:
- name: Recombinant human IGF-I therapy
  description: >-
    Recombinant human IGF-I can bypass the upstream GH-STAT5B signaling block,
    but published clinical responses in STAT5B deficiency have been limited.
  treatment_term:
    preferred_term: pharmacotherapy
    term:
      id: MAXO:0000058
      label: pharmacotherapy
  target_phenotypes:
  - preferred_term: Short stature
    term:
      id: HP:0004322
      label: Short stature
  evidence:
  - reference: PMID:33122102
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      For linear growth, efficacy of recombinant human IGF-I treatment remains
      uncertain, as linear growth response was poor in one treated AR STAT5B
      deficient patient (54) and two DN STAT5B deficient subjects (65).
    explanation: >-
      Directly supports recombinant human IGF-I as a disease-relevant therapy
      that has been attempted clinically, albeit with limited efficacy.
- name: Combination immunosuppressive therapy
  description: >-
    Steroid-based immunosuppression with calcineurin inhibition or sirolimus is
    used to dampen T-cell-driven immune dysregulation in severe disease.
  treatment_term:
    preferred_term: pharmacotherapy
    term:
      id: MAXO:0000058
      label: pharmacotherapy
    therapeutic_agent:
    - preferred_term: cyclosporine
      term:
        id: CHEBI:4031
        label: cyclosporin A
    - preferred_term: tacrolimus
      term:
        id: CHEBI:61049
        label: tacrolimus (anhydrous)
    - preferred_term: sirolimus
      term:
        id: CHEBI:9168
        label: sirolimus
  target_mechanisms:
  - target: Adaptive immune dysregulation
    treatment_effect: INHIBITS
    description: >-
      Immunosuppressive combinations are used to reduce the T-cell
      dysregulation that follows STAT5B-dependent regulatory failure.
    evidence:
    - reference: PMID:33122102
      supports: SUPPORT
      evidence_source: HUMAN_CLINICAL
      snippet: >-
        For immune dysregulation, a combination of steroids with either
        cyclosporine A (cell cycle inhibitor), tacrolimus (calcineurin
        inhibitor) or sirolimus (mTOR inhibitor) may provide temporary sparing
        from T-cell dysregulation as have been shown for patients with IPEX
        (Immune Dysregulation, Enteropathy, X-linked) and IPEX-like syndrome
        (94).
      explanation: >-
        Supports a mechanistically targeted immunosuppressive approach for the
        T-cell dysregulation arm of STAT5B deficiency.
  evidence:
  - reference: PMID:33122102
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      For immune dysregulation, a combination of steroids with either
      cyclosporine A (cell cycle inhibitor), tacrolimus (calcineurin
      inhibitor) or sirolimus (mTOR inhibitor) may provide temporary sparing
      from T-cell dysregulation as have been shown for patients with IPEX
      (Immune Dysregulation, Enteropathy, X-linked) and IPEX-like syndrome
      (94).
    explanation: >-
      Directly supports combination immunosuppressive therapy for the immune
      dysregulation component of STAT5B deficiency.
- name: Lung transplantation
  description: >-
    Lung transplantation has been used as salvage therapy for severe
    STAT5B-associated pulmonary disease.
  treatment_term:
    preferred_term: transplantation procedure
    term:
      id: MAXO:0000068
      label: transplantation procedure
  target_phenotypes:
  - preferred_term: Pulmonary fibrosis
    term:
      id: HP:0002206
      label: Pulmonary fibrosis
  evidence:
  - reference: PMID:33122102
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      A lung transplantation appeared to have, at least temporarily,
      alleviated problems caused by chronic pulmonary disease (54).
    explanation: >-
      Supports lung transplantation as a reported rescue option for advanced
      pulmonary disease in STAT5B deficiency.
- name: Hematopoietic stem cell transplantation
  description: >-
    Hematopoietic stem cell transplantation has been considered as a potential
    immune-reconstitution strategy for severe STAT5B deficiency.
  treatment_term:
    preferred_term: hematopoietic stem cell transplantation
    term:
      id: MAXO:0000747
      label: hematopoietic stem cell transplantation
  target_phenotypes:
  - preferred_term: Combined immunodeficiency
    term:
      id: HP:0005387
      label: Combined immunodeficiency
  evidence:
  - reference: PMID:33122102
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Bone marrow transplants is currently being considered for STAT5B
      deficiency.
    explanation: >-
      Supports hematopoietic stem cell transplantation as an actively
      considered immune-directed therapy for severe disease.
biochemical:
- name: Serum IGF-I
  presence: Decreased
  context: >-
    Low serum IGF-I despite preserved GH secretion is a hallmark biochemical
    consequence of impaired STAT5B-dependent GH signaling.
  evidence:
  - reference: PMID:33122102
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Serum IGF-I, IGFBP-3 and ALS concentrations in all cases were abnormally
      low, and remained low after GH treatment, during IGF-I generation tests
      (45,55,83) or during GH therapy (54,56).
    explanation: >-
      Directly supports low IGF-I as the defining biochemical correlate of GH
      insensitivity in STAT5B deficiency.
genetic:
- name: STAT5B
  gene_term:
    preferred_term: STAT5B
    term:
      id: hgnc:11368
      label: STAT5B
  association: Causative
  notes: >-
    Biallelic loss-of-function STAT5B variants cause the classic deficiency
    phenotype curated here. Dominant-negative heterozygous STAT5B syndromes are
    related but are not collapsed into this autosomal recessive entry.
  evidence:
  - reference: PMID:28590503
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Homozygous STAT5B mutations causing growth hormone insensitivity with
      immune dysfunction were described in 10 patients since 2003, including
      two Brazilian brothers from the south of Brazil.
    explanation: >-
      Supports STAT5B as the causal gene for the classic homozygous deficiency
      syndrome with combined endocrine and immune features.
