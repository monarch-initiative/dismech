name: Arterial Calcification of Infancy
creation_date: "2026-05-05T15:37:54Z"
updated_date: "2026-05-05T16:28:00Z"
description: >-
  Arterial calcification of infancy, also called generalized arterial
  calcification of infancy, is an ultra-rare autosomal recessive disorder marked
  by ectopic mineralization and stenosis of arteries in fetal life or infancy.
  Most cases are associated with loss-of-function ENPP1 variants and a smaller
  fraction with ABCC6 variants, disrupting extracellular pyrophosphate-mediated
  inhibition of hydroxyapatite deposition.
