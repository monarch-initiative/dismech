- category: Musculoskeletal
  name: Hypophosphatemic rickets
  subtype: ENPP1-related
  description: >-
    Survivors with ENPP1 deficiency commonly develop FGF23-mediated phosphate
    wasting and hypophosphatemic rickets or osteomalacia.
  phenotype_term:
    preferred_term: Hypophosphatemic rickets
    term:
      id: HP:0004912
      label: Hypophosphatemic rickets
  evidence:
  - reference: PMID:34355424
    reference_title: "Ectopic Calcification and Hypophosphatemic Rickets: Natural History of ENPP1 and ABCC6 Deficiencies."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Higher prevalence of rickets was reported in 70.8% of surviving affected individuals with ENPP1 compared with that of ABCC6 (11.8%; p = 0.0001).
    explanation: The natural-history cohort quantifies rickets as a common ENPP1-survivor phenotype.
  - reference: PMID:33005041
    reference_title: Prospective phenotyping of long-term survivors of generalized arterial calcification of infancy (GACI).
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      The development of rickets in survivors of ENPP1-GACI appears universal by age 14 years.
    explanation: The prospective survivor cohort supports ENPP1-related rickets as a major late manifestation.
- category: Hearing
  name: Hearing loss
  subtype: ENPP1-related
  description: Hearing loss is frequent in ENPP1-deficient GACI survivors and may be progressive.
  phenotype_term:
