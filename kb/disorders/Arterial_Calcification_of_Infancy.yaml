    reference_title: Clinical and Molecular Characterization of a Patient with Generalized Arterial Calcification of Infancy Caused by Rare ABCC6 Mutation.
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Generalized arterial calcification of infancy (GACI) is a rare autosomal-recessive disease characterized by extensive arterial calcification in infancy, with clinical manifestations such as arterial stenoses and heart failure.
    explanation: This supports calcification, stenosis, and heart failure as linked clinical consequences.
  - reference: PMID:39457141
    reference_title: "Preterm Infant with Generalized Arterial Calcification of Infancy Who Survived Due to Early Diagnosis and Appropriate Treatment with Bisphosphonates: A Case Report."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      GACI causes severe hypertension and heart failure, and approximately 50% of patients die within the first 6 months.
    explanation: This supports severe cardiovascular compromise and early mortality in GACI.
