    explanation: The review directly states autosomal recessive inheritance and the major disease genes.
pathophysiology:
- name: ENPP1/ABCC6 disruption of extracellular pyrophosphate anti-mineralization
  description: >-
    ENPP1 or ABCC6 loss of function perturbs extracellular pyrophosphate and
    phosphate balance, reducing anti-mineralization capacity and promoting
    hydroxyapatite deposition in arteries and soft tissues.
  cell_types:
  - preferred_term: vascular smooth muscle cell
    term:
      id: CL:0000359
      label: vascular associated smooth muscle cell
  biological_processes:
  - preferred_term: ectopic mineralization
    modifier: INCREASED
    term:
      id: GO:0031214
      label: biomineral tissue development
  evidence:
  - reference: PMID:39343469
    reference_title: Generalized Arterial Calcification of Infancy (GACI).
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Loss-of-function pathogenic variants of ENPP1 and ABCC6 lead to perturbations in the PPi/Pi ratio, thereby promoting hydroxyapatite mineralization in peripheral tissues.
    explanation: This directly supports disrupted PPi/Pi balance and hydroxyapatite mineralization as the core mechanism.
  - reference: PMID:33005041
    reference_title: Prospective phenotyping of long-term survivors of generalized arterial calcification of infancy (GACI).
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      In 67% of cases, GACI is caused by biallelic inactivating variants in ENPP1 (ectonucleotide pyrophosphatase/phosphodiesterase 1),3 which encodes an enzyme that cleaves ATP into AMP and inorganic pyrophosphate (PPi) at the cell surface.
    explanation: This supports ENPP1 loss as direct impairment of extracellular ATP hydrolysis to AMP and PPi.
  - reference: PMID:33005041
    reference_title: Prospective phenotyping of long-term survivors of generalized arterial calcification of infancy (GACI).
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      While the exact molecule transported by ABCC6 into the extracellular space is uncertain, one candidate is ATP, a substrate for ENPP1 and thus a source of plasma PPi.
    explanation: This supports ABCC6 as an upstream contributor to extracellular ATP supply and PPi generation.
  downstream:
  - target: Arterial calcification and stenosis
    description: Loss of pyrophosphate-mediated mineralization inhibition permits arterial calcium deposition and narrowing.
- name: Reduced AMP/adenosine signaling and myointimal proliferation
  description: >-
    ENPP1 deficiency can reduce AMP and downstream adenosine signaling in
    addition to reducing PPi. This mechanism is proposed to contribute to
    intimal proliferation, multivessel narrowing, and stenosis even when overt
    calcification is less prominent.
  cell_types:
  - preferred_term: vascular smooth muscle cell
    term:
      id: CL:0000359
      label: vascular associated smooth muscle cell
  biological_processes:
  - preferred_term: blood vessel remodeling
    modifier: ABNORMAL
    term:
      id: GO:0001974
      label: blood vessel remodeling
  evidence:
  - reference: PMID:33005041
    reference_title: Prospective phenotyping of long-term survivors of generalized arterial calcification of infancy (GACI).
    supports: PARTIAL
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Specifically, intimal proliferation results from AMP or adenosine deficiency40 and comprises part of the ENPP1-GACI phenotype.
    explanation: The cohort discussion supports AMP/adenosine deficiency as a plausible driver of intimal proliferation in ENPP1-related GACI.
  downstream:
  - target: Arterial calcification and stenosis
    description: Intimal proliferation can narrow vessels and compound stenosis from mineral deposition.
- name: Arterial calcification and stenosis
  description: >-
    Ectopic arterial mineralization and associated stenosis increase vascular
    resistance, driving severe hypertension, cardiac dysfunction, and high early
    mortality in severe infantile presentations.
  cell_types:
  - preferred_term: vascular smooth muscle cell
    term:
