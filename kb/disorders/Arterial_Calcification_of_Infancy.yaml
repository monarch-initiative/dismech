review_notes: >-
  Falcon reported prenatal findings including hydrops fetalis, polyhydramnios,
  and hyperechogenic fetal vasculature, but the available PubMed/ClinicalTrials
  caches in this branch did not provide quotable primary text for those specific
  prenatal manifestations. The subtype descriptions retain the reviewer-noted
  OMIM identifiers because the schema does not expose a dedicated OMIM mapping
  slot for subtypes.
