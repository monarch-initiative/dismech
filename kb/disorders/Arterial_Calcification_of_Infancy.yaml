- name: ABCC6
  association: Causative loss-of-function variants
  presence: Positive
  gene_term:
    preferred_term: ABCC6
  subtype: ABCC6-related
  notes: ABCC6 variants account for a smaller fraction of GACI and overlap with pseudoxanthoma elasticum biology.
  evidence:
  - reference: PMID:38248755
    reference_title: Clinical and Molecular Characterization of a Patient with Generalized Arterial Calcification of Infancy Caused by Rare ABCC6 Mutation.
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      We have identified the underlying cause as biallelic mutations in ABCC6 (NM_00117: exon30, c.4223_4227dupAGCTC p.(Leu1410Serfs*56)) and a unique exonic deletion that spans from the first to the fourth exons of ABCC6 (chr16:16313388-16330869)).
    explanation: This case report identifies biallelic ABCC6 mutations as the cause in an affected GACI patient.
diagnosis:
- name: Vascular imaging and molecular testing
  description: >-
    Ultrasound, CT, and related imaging demonstrate diffuse arterial
    calcification and stenosis, while molecular testing identifies ENPP1 or
    ABCC6 variants and distinguishes overlapping phenotypes.
  diagnosis_term:
    preferred_term: diagnostic imaging
  results: Imaging shows extensive arterial calcification, and genetic testing may confirm ENPP1 or ABCC6 pathogenic variants.
  evidence:
  - reference: PMID:36937905
    reference_title: "Case report: A rare homozygous variation in the ENPP1 gene, presenting with generalized arterial calcification of infancy in a Chinese infant."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      GACI should be considered in an infant presenting with hypertension and extensive arterial calcification, and that genetic testing should be performed.
    explanation: This supports suspecting GACI in infants with hypertension and arterial calcification and performing genetic testing.
treatments:
- name: Bisphosphonate therapy
  description: >-
    Bisphosphonates such as pamidronate and etidronate may be started early in
    severe GACI, but reported evidence remains case-based and no standardized
    regimen is established.
  treatment_term:
    preferred_term: bisphosphonate agent therapy
    term:
      id: MAXO:0000954
      label: bisphosphonate agent therapy
  evidence:
  - reference: PMID:39343469
    reference_title: Generalized Arterial Calcification of Infancy (GACI).
    supports: PARTIAL
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Treatment options for severe forms of GACI are mostly based on symptomatic management, including the option of starting bisphosphonates early after birth, such as etidronate and pamidronate, analogues of PPi.
    explanation: The review supports early bisphosphonate use as an option but frames therapy as symptomatic rather than curative.
  - reference: PMID:39457141
    reference_title: "Preterm Infant with Generalized Arterial Calcification of Infancy Who Survived Due to Early Diagnosis and Appropriate Treatment with Bisphosphonates: A Case Report."
    supports: PARTIAL
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Bisphosphonates are effective in treating GACI; however, no standardized treatment regimen is available.
    explanation: This supports benefit while noting the absence of a standardized regimen.
- name: Multidisciplinary supportive management
  description: >-
    Supportive care includes management of arterial hypertension, mineral
    metabolism, hearing and ophthalmologic complications, and coordinated
    follow-up by an expert multidisciplinary team.
  treatment_term:
    preferred_term: supportive care
    term:
      id: MAXO:0000950
      label: supportive care
  evidence:
  - reference: PMID:39343469
    reference_title: Generalized Arterial Calcification of Infancy (GACI).
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Follow-up within an expert and coordinated multidisciplinary team includes treatment of arterial hypertension, calcitriol and phosphorus adjustments, hearing aids, and early detection of possible angioid streaks.
    explanation: This directly supports multidisciplinary supportive management in GACI.
