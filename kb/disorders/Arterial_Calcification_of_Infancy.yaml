  evidence:
  - reference: PMID:33005041
    reference_title: Prospective phenotyping of long-term survivors of generalized arterial calcification of infancy (GACI).
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      For ENPP1-deficient individuals, the lifetime risk of cervical spine fusion was 25%, that of hearing loss was 75%, and the main morbidity in adults was related to enthesis calcification.
    explanation: The prospective survivor cohort quantifies hearing loss risk in ENPP1 deficiency.
