    explanation: This directly supports multidisciplinary supportive management in GACI.
- name: INZ-701 enzyme replacement therapy
  description: >-
    INZ-701 is a recombinant ENPP1 enzyme-replacement approach intended to
    restore extracellular PPi generation in ENPP1 deficiency and related GACI
    biology. Clinical evidence is currently trial-stage.
  treatment_term:
    preferred_term: pharmacotherapy
    term:
      id: MAXO:0000058
      label: pharmacotherapy
  evidence:
  - reference: clinicaltrials:NCT07473973
    reference_title: "The ENERGY 2 Study: An Open-Label Phase 3 Study to Evaluate the Efficacy and Safety of INZ-701 in Infants With Ectonucleotide Pyrophosphatase/Phosphodiesterase 1 (ENPP1) Deficiency"
    supports: PARTIAL
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      The primary purpose of ENERGY 2 (Study INZ701-105) is to assess the efficacy
      and safety of INZ-701 in infants with ENPP1 Deficiency.
    explanation: The Phase 3 trial record supports INZ-701 as an investigational disease-targeted therapy for ENPP1 deficiency.
  - reference: PMID:33900645
    reference_title: INZ-701 Prevents Ectopic Tissue Calcification and Restores Bone Architecture and Growth in ENPP1-Deficient Mice.
    supports: PARTIAL
    evidence_source: MODEL_ORGANISM
    snippet: >-
      INZ-701, a human ENPP1-Fc protein, is in clinical development as an enzyme
      replacement therapy for the treatment of ENPP1 deficiency.
    explanation: The mouse-model study supports the therapeutic rationale and clinical-development status of INZ-701, while human efficacy remains under clinical-trial evaluation.
