    reference_title: "Molecular consequences of PQBP1 deficiency, involved in the X-linked Renpenning syndrome."
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: >-
      PQBP1 encodes a protein involved in transcriptional and
      post-transcriptional regulation of gene expression.
    explanation: This directly supports PQBP1-dependent regulation of gene expression as a core mechanism.
  - reference: PMID:36797465
    reference_title: "Identification of a DNA methylation signature for Renpenning syndrome (RENS1), a spliceopathy."
    supports: PARTIAL
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Renpenning syndrome (RENS1 - OMIM 309500), which is an X-linked
      recessive neurodevelopmental disorder caused by variants in
      polyglutamine-binding protein 1 (PQBP1) is reported.
    explanation: This supports PQBP1-related disease causality and the authors' characterization of Renpenning syndrome as a spliceopathy.
  downstream:
  - target: Impaired neural progenitor proliferation and differentiation
    description: PQBP1 dysfunction perturbs neural progenitor cell behavior and brain development.
- name: Impaired neural progenitor proliferation and differentiation
  description: >-
    PQBP1 loss decreases proliferation in human neural stem cells and impairs
    progenitor transitions during brain development, providing a cellular basis
    for microcephaly and cognitive impairment.
  genes:
  - preferred_term: PQBP1
    term:
      id: hgnc:9330
      label: PQBP1
  cell_types:
  - preferred_term: neural progenitor cell
    term:
      id: CL:0011020
      label: neural progenitor cell
  biological_processes:
  - preferred_term: cell population proliferation
    modifier: DECREASED
    term:
      id: GO:0008283
      label: cell population proliferation
  - preferred_term: neurogenesis
    modifier: ABNORMAL
    term:
      id: GO:0022008
      label: neurogenesis
  evidence:
  - reference: PMID:38030819
    reference_title: "Molecular consequences of PQBP1 deficiency, involved in the X-linked Renpenning syndrome."
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: >-
      We observed a decrease of cell proliferation, as well as the deregulation
      of the expression of 58 genes, comprising genes encoding proteins
      associated with neurodegenerative diseases, playing a role in mRNA
      regulation or involved in innate immunity.
    explanation: This directly supports reduced progenitor proliferation after PQBP1 loss.
  - reference: PMID:41507200
    reference_title: "The missense mutation Y65C in PQBP1 causes microcephaly and cognitive deficits through a combination of partial loss-of-function and gain-of-function effects."
    supports: SUPPORT
    evidence_source: MODEL_ORGANISM
    snippet: >-
      we generated Pqbp1Y65C/Y knock-in male mice and discovered that the Y65C
      mutation impairs the proliferation of apical progenitors and their
      subsequent transition to basal progenitors, resulting in microcephaly and
      cognitive deficits like those observed in Renpenning syndrome patients.
    explanation: This directly supports the neural progenitor mechanism linking PQBP1 dysfunction to microcephaly and cognitive impairment.
  downstream:
  - target: Microcephaly
    description: Impaired neural progenitor proliferation contributes to reduced brain growth.
  - target: Intellectual disability
    description: Abnormal neurodevelopment contributes to the core cognitive phenotype.
  - target: Global developmental delay
    description: Early neurodevelopmental impairment contributes to delayed milestones.
genetic:
- name: PQBP1
  association: Causal hemizygous variant
  gene_term:
    preferred_term: PQBP1
    term:
      id: hgnc:9330
      label: PQBP1
  notes: >-
    Renpenning syndrome is caused by hemizygous PQBP1 variants in affected
    males; reported alleles include frameshift, missense, splice, and deletion
    variants.
  evidence:
  - reference: PMID:41978772
    reference_title: "Renpenning syndrome caused by the c.459_462delAGAG mutation in PQBP1: a case report and literature review."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Whole exome sequencing identified a hemizygous PQBP1 frameshift variant,
      NM_001032382.2:c.459_462delAGAG (p.Arg153fs) (VCV000010980.79), in the
      proband.
    explanation: This directly supports PQBP1 as the causal gene and illustrates a representative pathogenic allele class.
  - reference: PMID:40372223
    reference_title: "[Clinical analysis of a child with heterotopic ventricular gray matter Renpenning syndrome caused by PQBP1 gene mutation and a literature review]."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      A hemizygous deletion, c.459_462del (p.Arg153SerfsTer41), was
      identified in exon 5 of the PQBP1 gene in patient 1, which was inherited
      from his mother by Sanger sequencing.
    explanation: This directly supports hemizygous PQBP1 causality and maternal transmission in a male proband.
  - reference: PMID:41507200
    reference_title: "The missense mutation Y65C in PQBP1 causes microcephaly and cognitive deficits through a combination of partial loss-of-function and gain-of-function effects."
    supports: SUPPORT
    evidence_source: MODEL_ORGANISM
    snippet: >-
      The missense mutation Y65C in polyglutamine-binding protein 1 (PQBP1) is
      associated with Renpenning syndrome, characterized by X-linked
      intellectual disability and microcephaly.
    explanation: This supports PQBP1 missense alleles as a recognized causal class in Renpenning syndrome.
  - reference: CGGV:assertion_8128f36b-f273-49ee-bfd8-bee64b4df921-2018-11-07T110000.000Z
    reference_title: "PQBP1 / Renpenning syndrome (Definitive)"
    supports: SUPPORT
    evidence_source: OTHER
    snippet: "PQBP1 | HGNC:9330 | Renpenning syndrome | MONDO:0010653 | XL | Definitive"
    explanation: ClinGen classifies the PQBP1-Renpenning syndrome gene-disease relationship as definitive with X-linked inheritance.
