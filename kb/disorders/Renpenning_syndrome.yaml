name: Renpenning syndrome
creation_date: "2026-04-15T00:00:00Z"
description: >-
  Renpenning syndrome is an X-linked recessive neurodevelopmental disorder
  caused by pathogenic PQBP1 variants and characterized by intellectual
  disability, microcephaly, short stature, and facial dysmorphism.
category: Mendelian
parents:
- X-linked intellectual disability
- Neurodevelopmental disorder
synonyms:
- RENS1
