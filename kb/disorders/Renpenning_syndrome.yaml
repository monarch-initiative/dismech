diagnosis:
- name: Whole exome sequencing
  description: >-
    Whole-exome sequencing or targeted exome sequencing is a practical first-line
    method to identify pathogenic PQBP1 variants in suspected Renpenning syndrome.
  diagnosis_term:
    preferred_term: Whole Exome Sequencing
    term:
      id: NCIT:C101295
      label: Whole Exome Sequencing
  evidence:
  - reference: PMID:40372223
    reference_title: "[Clinical analysis of a child with heterotopic ventricular gray matter Renpenning syndrome caused by PQBP1 gene mutation and a literature review]."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Genomic DNA was extracted from the child and his family members, and
      Trios-whole exome sequencing (Trios-WES) was performed.
    explanation: This directly supports whole-exome sequencing as a diagnostic approach for PQBP1-related Renpenning syndrome.
  - reference: PMID:41978772
    reference_title: "Renpenning syndrome caused by the c.459_462delAGAG mutation in PQBP1: a case report and literature review."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Comprehensive clinical evaluation and whole exome sequencing were
      performed to identify the genetic basis of the clinical presentation in
      a 4-year-7-month-old male proband from a Chinese family.
    explanation: This supports whole-exome sequencing as a practical diagnostic procedure in Renpenning syndrome.
- name: DNA methylation analysis
  description: >-
    Genome-wide DNA methylation analysis can identify a Renpenning-specific
    episignature and may help reclassify variants of uncertain significance.
  diagnosis_term:
    preferred_term: DNA Methylation Analysis
    term:
      id: NCIT:C63328
      label: DNA Methylation Analysis
  evidence:
  - reference: PMID:36797465
    reference_title: "Identification of a DNA methylation signature for Renpenning syndrome (RENS1), a spliceopathy."
    supports: PARTIAL
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Genome-wide DNA methylation analysis has recently been adapted for
      clinical testing of patients with genetic neurodevelopmental disorders.
    explanation: This supports DNA methylation analysis as an emerging diagnostic adjunct, although the paper frames the Renpenning episignature as preliminary.
