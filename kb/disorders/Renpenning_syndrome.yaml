    id: MONDO:0010653
    label: Renpenning syndrome
inheritance:
- name: X-linked recessive inheritance
  description: >-
    Renpenning syndrome follows X-linked recessive inheritance and primarily
    affects hemizygous males.
  inheritance_term:
    preferred_term: X-linked recessive inheritance
    term:
      id: HP:0001419
      label: X-linked recessive inheritance
  evidence:
  - reference: PMID:36797465
    reference_title: "Identification of a DNA methylation signature for Renpenning syndrome (RENS1), a spliceopathy."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Renpenning syndrome (RENS1 - OMIM 309500), which is an X-linked
      recessive neurodevelopmental disorder caused by variants in
      polyglutamine-binding protein 1 (PQBP1) is reported.
    explanation: This directly supports X-linked recessive inheritance and PQBP1 causality.
pathophysiology:
- name: PQBP1 spliceopathy
  description: >-
    Pathogenic PQBP1 variants disrupt transcriptional and post-transcriptional
    regulation of gene expression, producing a spliceopathy that alters
    neurodevelopmental gene networks.
