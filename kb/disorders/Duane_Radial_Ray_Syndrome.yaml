    The clinical disorder combines Duane anomaly, radial ray defects, renal and
    ocular abnormalities, hearing impairment, and variable anorectal, cardiac,
    spinal, and foot malformations with marked phenotypic variability.
  evidence:
  - reference: ORPHA:93293
    reference_title: Okihiro syndrome
    supports: SUPPORT
    evidence_source: OTHER
