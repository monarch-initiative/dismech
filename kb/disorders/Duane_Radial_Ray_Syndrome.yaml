  - reference: PMID:36635047
    reference_title: Structure of SALL4 zinc finger domain reveals link between AT-rich DNA binding and Okihiro syndrome.
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: "reduced overall binding to DNA but not the preference for AT-rich sequences."
    explanation: >-
      Structural and DNA-binding data support impaired SALL4 DNA binding for
      patient-reported missense variants in the zinc-finger domain.
