pathophysiology:
- name: SALL4 Haploinsufficiency and DNA-Binding Defect
  description: >-
    Heterozygous SALL4 nonsense, frameshift, deletion, or selected missense
    variants reduce SALL4 transcription-factor function by haploinsufficiency
    or impaired AT-rich DNA binding.
  genes:
  - preferred_term: SALL4
    term:
      id: hgnc:15924
      label: SALL4
  molecular_functions:
  - preferred_term: DNA-binding transcription factor activity, RNA polymerase II-specific
    term:
      id: GO:0000981
      label: DNA-binding transcription factor activity, RNA polymerase II-specific
    modifier: DECREASED
  biological_processes:
  - preferred_term: embryo development
    term:
      id: GO:0009790
      label: embryo development
    modifier: ABNORMAL
  evidence:
  - reference: PMID:16086360
    reference_title: >-
      SALL4 mutations in Okihiro syndrome (Duane-radial ray syndrome),
