name: Duane-Radial Ray Syndrome
creation_date: "2026-05-10T00:00:00Z"
updated_date: "2026-05-10T00:00:00Z"
description: >-
  Duane-radial ray syndrome, also called Okihiro syndrome, is an autosomal
  dominant SALL4-related multiple congenital anomaly syndrome. The shared
  mechanism is disruption of SALL4 zinc-finger transcription-factor function
  during embryonic development, producing Duane anomaly, radial ray
  malformations, renal and ocular abnormalities, hearing loss, and variable
  cardiac, anorectal, spinal, and foot malformations.
category: Mendelian
parents:
- autosomal dominant disease
- congenital limb malformation
- dysostosis
- syndromic disease
synonyms:
- Okihiro syndrome
- DRRS
- SALL4-related disorder
- acro-renal-ocular syndrome
disease_term:
  preferred_term: Duane-radial ray syndrome
  term:
    id: MONDO:0011812
    label: Duane-radial ray syndrome
has_subtypes:
- name: Okihiro
  display_name: Okihiro syndrome / Duane-radial ray syndrome
  description: >-
    Core Duane-radial ray presentation with Duane anomaly, radial defects,
    renal abnormalities, hearing loss, and less frequent anorectal and spinal
    malformations.
  evidence:
  - reference: ORPHA:93293
    reference_title: Okihiro syndrome
    supports: SUPPORT
    evidence_source: OTHER
    snippet: "A rare multiple congenital anomalies syndrome characterized by the association of uni- or bilateral radial defects"
    explanation: >-
      Orphanet defines Okihiro syndrome as the core Duane-radial ray
      syndrome entity.
- name: Acro-renal-ocular overlap
  display_name: Acro-renal-ocular overlap within the SALL4-related spectrum
  description: >-
    An overlapping SALL4-related phenotype with radial ray malformations, renal
    abnormalities, and structural ocular anomalies including coloboma, with
    overlap with Okihiro syndrome.
  evidence:
  - reference: ORPHA:959
    reference_title: Acro-renal-ocular syndrome
    supports: SUPPORT
    evidence_source: OTHER
    snippet: "The phenotype overlaps with other <i>SALL4</i>-related disorders including Okihiro syndrome and Holt-Oram syndrome."
    explanation: >-
      Orphanet explicitly places acro-renal-ocular syndrome within the
      overlapping SALL4-related disorder spectrum.
- name: Holt-Oram-like presentation
  display_name: SALL4-related Holt-Oram-like presentation
  description: >-
    Rare SALL4-related presentation resembling Holt-Oram syndrome, with radial
    ray and cardiac malformations without the full Duane-radial ray spectrum.
  evidence:
  - reference: PMID:20301547
    reference_title: SALL4-Related Disorders.
    supports: SUPPORT
    evidence_source: OTHER
    snippet: "HOS (i.e., radial ray malformations and cardiac malformations without additional"
    explanation: >-
      GeneReviews describes a rare SALL4-related Holt-Oram-like presentation.
