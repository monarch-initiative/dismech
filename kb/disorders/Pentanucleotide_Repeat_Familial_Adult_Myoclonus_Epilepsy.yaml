      term:
        id: CHEBI:39867
        label: valproic acid
    - preferred_term: levetiracetam
      term:
        id: CHEBI:6437
        label: levetiracetam
    - preferred_term: benzodiazepine
      term:
        id: CHEBI:22720
        label: benzodiazepine
  target_phenotypes:
