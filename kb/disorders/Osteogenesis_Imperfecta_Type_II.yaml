      period in OI type II.
diagnosis:
- name: Clinical, Radiographic, and Molecular Diagnosis
  description: >-
    The diagnosis of osteogenesis imperfecta type II (now described in
    GeneReviews as perinatally lethal OI) is based on the characteristic
    prenatal and neonatal clinical and radiographic findings of severe
    hypomineralization, multiple fractures, and pulmonary insufficiency, and is
    confirmed by identification of a heterozygous COL1A1 or COL1A2 variant on
    molecular genetic testing.
  diagnosis_term:
    preferred_term: molecular genetic testing
    term:
      id: MAXO:0000533
      label: molecular genetic testing
  evidence:
  - reference: PMID:20301472
    reference_title: "COL1A1- and COL1A2-Related Osteogenesis Imperfecta."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "The diagnosis of COL1A1/COL1A2-OI is established in a proband with clinical and radiographic manifestations of OI by identification of a heterozygous in COL1A1 or COL1A2 by molecular genetic testing."
    explanation: >-
      GeneReviews defines the combined clinical/radiographic and molecular
      diagnostic criteria for COL1A1/COL1A2-related OI, including the
      perinatally lethal type II form.
  - reference: PMID:20301472
    reference_title: "COL1A1- and COL1A2-Related Osteogenesis Imperfecta."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "perinatally lethal OI (previously OI type II)"
    explanation: >-
      GeneReviews maps the legacy Sillence type II label to the modern
      descriptive nomenclature for the perinatally lethal form.
- name: Prenatal Diagnosis and Recurrence Counseling
  description: >-
    Prenatal ultrasound can detect lethal/severe OI early in gestation, and
    genetic counseling must address the high proportion of de novo variants and
    the recurrence risk arising from parental gonadal mosaicism.
  evidence:
  - reference: PMID:20301472
    reference_title: "COL1A1- and COL1A2-Related Osteogenesis Imperfecta."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Ultrasound examination performed in a center with experience in diagnosing OI can be valuable in the prenatal diagnosis of the lethal form and most severe forms prior to 20 weeks' gestation"
    explanation: >-
      Supports prenatal ultrasound as a diagnostic modality for perinatally
      lethal OI.
  - reference: PMID:20301472
    reference_title: "COL1A1- and COL1A2-Related Osteogenesis Imperfecta."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "The overall rate of mosaicism is up to 16% in the parents of children with COL1A1/COL1A2-OI."
    explanation: >-
      Supports recurrence-risk counseling: most lethal OI is de novo, but
      parental mosaicism produces a meaningful recurrence risk.
treatments:
- name: Supportive Care
  description: >
    Palliative supportive care given the lethal nature of the condition.
    Focus on comfort and family support.
  treatment_term:
    preferred_term: Supportive care
    term:
      id: MAXO:0000950
      label: supportive care
- name: Neonatal Respiratory Support
  description: >
    Immediate intubation and mechanical ventilation at birth for neonates
    presenting with respiratory distress. For the rare infants who survive
    with aggressive support, ongoing respiratory management (invasive
    ventilation or high-flow nasal cannula) may be required for months.
  treatment_term:
    preferred_term: artificial respiration
    term:
      id: MAXO:0000503
      label: artificial respiration
  evidence:
  - reference: PMID:37188488
    reference_title: "Cyclic intravenous pamidronate for an infant with osteogenesis imperfecta type II."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "tracheal intubation was performed due to the respiratory distress"
    explanation: >-
      Documents immediate neonatal intubation as the required initial respiratory
      intervention in a surviving OI type II infant.
- name: Bisphosphonate Therapy
  description: >
    Cyclic intravenous bisphosphonate therapy (pamidronate or zoledronate) is
    used in rare surviving infants to reduce fracture frequency and increase
    bone density. The efficacy, safety, and optimal dosing for OI type II
    remain undefined; reported use is based on case reports only.
  therapeutic_modality: SMALL_MOLECULE
  treatment_term:
    preferred_term: Pharmacotherapy
    term:
      id: NCIT:C15986
      label: Pharmacotherapy
    therapeutic_agent:
    - preferred_term: pamidronate
      term:
        id: CHEBI:7903
        label: pamidronate
  evidence:
  - reference: PMID:37188488
    reference_title: "Cyclic intravenous pamidronate for an infant with osteogenesis imperfecta type II."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Cyclic intravenous pamidronate was started at 41 days old with dose modification and was successfully administered every month."
    explanation: >-
      First reported case of cyclic pamidronate use in a surviving OI type II
      infant, demonstrating feasibility but noting undefined optimal dosing.
- name: Genetic Counseling
  description: >
    Genetic counseling addresses the high de novo rate and the recurrence risk
    from parental gonadal mosaicism (up to 16%). Counseling covers prenatal
    diagnosis options including chorionic villus sampling and preimplantation
    genetic testing for subsequent pregnancies.
  treatment_term:
    preferred_term: genetic counseling
    term:
      id: MAXO:0000079
      label: genetic counseling
  evidence:
  - reference: PMID:20301472
    reference_title: "COL1A1- and COL1A2-Related Osteogenesis Imperfecta."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "The overall rate of mosaicism is up to 16% in the parents of children with COL1A1/COL1A2-OI."
    explanation: >-
      Establishes the clinically significant mosaicism rate that makes genetic
      counseling and recurrence risk discussion essential for all families.
