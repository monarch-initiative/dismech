pathophysiology:
- name: BRAF Fusion Oncogene Formation
  description: >-
    Most pilocytic astrocytomas are initiated by tandem-duplication-mediated
    KIAA1549-BRAF fusion or related RAF fusions that remove BRAF autoinhibition
    and create constitutive upstream MAPK signaling.
  genes:
  - preferred_term: KIAA1549
    term:
      id: hgnc:22219
      label: KIAA1549
  - preferred_term: BRAF
    term:
      id: hgnc:1097
      label: BRAF
  cell_types:
  - preferred_term: neural stem cell
    term:
      id: CL:0000047
      label: neural stem cell
  locations:
  - preferred_term: brain
    term:
      id: UBERON:0000955
      label: brain
  evidence:
  - reference: PMID:28448514
    reference_title: "A new GTF2I-BRAF fusion mediating MAPK pathway activation in pilocytic astrocytoma."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      A recurrent feature of PA is deregulation of the mitogen activated protein
      kinase (MAPK) pathway most often through KIAA1549-BRAF fusion, but also by
      other BRAF- or RAF1-gene fusions and point mutations (e.g. BRAFV600E).
    explanation: >-
      Human tumor profiling supports BRAF fusion formation as the dominant upstream
      initiating event in PA.
  downstream:
  - target: Constitutive MAPK Cascade Activation
    description: RAF fusion signaling converges on sustained MAPK pathway output
- name: Constitutive MAPK Cascade Activation
  description: >-
    Diverse driver lesions including KIAA1549-BRAF fusion, other RAF fusions,
    BRAFV600E mutation, and NF1 loss converge on persistent MAPK cascade
    activation, which is the shared core signaling dependency across PA subtypes.
  genes:
  - preferred_term: BRAF
    term:
      id: hgnc:1097
      label: BRAF
  - preferred_term: RAF1
    term:
      id: hgnc:9829
      label: RAF1
  - preferred_term: NF1
    term:
      id: hgnc:7765
      label: NF1
  biological_processes:
  - preferred_term: MAPK cascade
    modifier: INCREASED
    term:
      id: GO:0000165
      label: MAPK cascade
  evidence:
  - reference: PMID:28448514
    reference_title: "A new GTF2I-BRAF fusion mediating MAPK pathway activation in pilocytic astrocytoma."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      A recurrent feature of PA is deregulation of the mitogen activated protein
      kinase (MAPK) pathway most often through KIAA1549-BRAF fusion, but also by
      other BRAF- or RAF1-gene fusions and point mutations (e.g. BRAFV600E).
    explanation: >-
      Supports MAPK-pathway activation as the disease-level convergent signaling mechanism.
  - reference: PMID:38837168
    reference_title: "An Overview of Optic Pathway Glioma With Neurofibromatosis Type 1: Pathogenesis, Risk Factors, and Therapeutic Strategies."
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      the loss of the NF1 gene activates 3 distinct Ras effector pathways,
      including the PI3K/AKT/mTOR pathway, the MEK/ERK pathway, and the cAMP
      pathway, which mediate glioma tumorigenesis
    explanation: >-
      Supports NF1 loss as an alternative upstream lesion converging on MAPK-pathway
      activation in gliomagenesis relevant to NF1-associated PA.
  downstream:
  - target: Oncogene-Induced Senescence
    description: Sustained MAPK signaling can trigger a senescence brake in piloid tumors
- name: Oncogene-Induced Senescence
  description: >-
    Activated BRAF in neural stem and progenitor cells induces a senescence
    program that limits proliferation and helps explain the usual WHO grade 1,
    indolent biology of pilocytic astrocytoma.
  genes:
  - preferred_term: BRAF
    term:
      id: hgnc:1097
      label: BRAF
  cell_types:
  - preferred_term: neural stem cell
    term:
      id: CL:0000047
      label: neural stem cell
  biological_processes:
  - preferred_term: cellular senescence
    modifier: INCREASED
    term:
      id: GO:0090398
      label: cellular senescence
  - preferred_term: negative regulation of cell population proliferation
    modifier: INCREASED
    term:
      id: GO:0008285
      label: negative regulation of cell population proliferation
  evidence:
  - reference: PMID:21636552
    reference_title: "BRAF activation induces transformation and then senescence in human neural stem cells: a pilocytic astrocytoma model."
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: >-
      BRAF(V600E)-expressing cells subsequently stopped proliferating and induced
      markers of oncogene-induced senescence including acidic β-galactosidase,
      PAI-1, and p16(INK4a) whereas controls did not.
    explanation: >-
      Functional experiments show that activated BRAF can trigger a senescence
      brake after initial transformation in neural progenitor contexts relevant to PA.
  - reference: PMID:21636552
    reference_title: "BRAF activation induces transformation and then senescence in human neural stem cells: a pilocytic astrocytoma model."
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: >-
      Induction of senescence by BRAF may help explain the low-grade pathobiology
      of pilocytic astrocytoma
    explanation: >-
      Directly supports senescence as a mechanistic explanation for the usual
      indolent, grade 1 biology of PA.
phenotypes:
- category: Neurological
  name: Hydrocephalus
  subtype: Cerebellar
  frequency: FREQUENT
  description: >-
    Obstructive hydrocephalus is a common presenting feature of cerebellar PA and
    often requires individualized preoperative management.
  phenotype_term:
    preferred_term: Hydrocephalus
    term:
      id: HP:0000238
      label: Hydrocephalus
  evidence:
  - reference: PMID:37021292
    reference_title: "Cerebellar pilocytic astrocytoma. Retrospective cohort study assessing postoperative functional outcome, cerebellar mutism and hydrocephalus."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      79 patients had hydrocephalus at diagnosis and 48% required preoperative treatment.
    explanation: >-
      Supports hydrocephalus as a frequent presenting phenotype in cerebellar PA.
- category: Ophthalmologic
  name: Visual Impairment
  frequency: FREQUENT
  description: >-
    Visual dysfunction is a major morbidity of optic pathway/hypothalamic PA,
    especially in NF1-associated tumors affecting the anterior visual pathways.
  phenotype_term:
    preferred_term: Visual impairment
    term:
      id: HP:0000505
      label: Visual impairment
  evidence:
  - reference: PMID:38837168
    reference_title: "An Overview of Optic Pathway Glioma With Neurofibromatosis Type 1: Pathogenesis, Risk Factors, and Therapeutic Strategies."
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      OPGs in individuals with NF1 primarily affect the optic pathway and lead to
      visual disturbance.
    explanation: >-
      Supports visual impairment as a clinically important phenotype in the optic
      pathway subset of PA, especially in NF1-associated disease.
- category: Endocrine
  name: Hypopituitarism
  description: >-
    Hypothalamic invasion by optic pathway/hypothalamic PA can cause later
    hypopituitarism after early-life tumor growth or treatment.
  phenotype_term:
    preferred_term: Hypopituitarism
    term:
      id: HP:0040075
      label: Hypopituitarism
  evidence:
  - reference: PMID:37033188
    reference_title: "A new era for optic pathway glioma: A developmental brain tumor with life-long health consequences."
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      The main risks are to threaten vision loss by progressive tumor damage to
      optic pathways; furthermore, invasion of the hypothalamus can lead to
      diencephalic syndrome in infancy and hypopituitarism later in life.
    explanation: >-
      Supports hypopituitarism as an important site-dependent phenotype of
      hypothalamic/optic pathway PA.
histopathology:
- name: Biphasic Pattern
  finding_term:
    preferred_term: biphasic pattern
    term:
      id: NCIT:C35907
      label: Biphasic Pattern
  frequency: VERY_FREQUENT
  description: >-
    Classic PA shows a biphasic architecture with compact piloid areas and looser
    microcystic zones.
  evidence:
  - reference: PMID:16998597
    reference_title: "Neuropathological spectrum of pilocytic astrocytoma: an Indian series of 120 cases."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      On histopathology, biphasic pattern (89.2%) along with Rosenthal fibers
      (66.7%) and eosinophilic granular bodies (60%) were present in the majority
      of cases.
    explanation: >-
      Supports biphasic architecture as a very frequent histopathologic feature of PA.
