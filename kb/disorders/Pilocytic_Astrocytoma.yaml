treatments:
- name: Gross Total Resection
  description: >-
    Gross total resection is preferred for surgically accessible tumors and remains
    the core first-line treatment for most cerebellar PA.
  treatment_term:
    preferred_term: gross total resection
    term:
      id: NCIT:C131672
      label: Gross Total Resection
  evidence:
  - reference: PMID:26351221
    reference_title: "Pediatric cerebellar astrocytoma: a review."
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Surgical resection remains the first-line treatment with complete removal of
      the tumor the goal.
    explanation: >-
      Supports surgical resection, ideally gross total removal, as first-line
      therapy for accessible PA.
  - reference: PMID:37021292
    reference_title: "Cerebellar pilocytic astrocytoma. Retrospective cohort study assessing postoperative functional outcome, cerebellar mutism and hydrocephalus."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Early treatment with the intention of GTR should be considered, opting, if
      this is not possible, to leave a tumor residue over neurological damage.
    explanation: >-
      Human cohort evidence supports gross total resection as the surgical goal
      while preserving neurologic function.
- name: Carboplatin/Vincristine Chemotherapy
  description: >-
    Carboplatin/vincristine remains a standard conventional regimen for residual,
    progressive, or unresectable pediatric low-grade glioma when surgery alone is
    insufficient and radiotherapy is undesirable.
  treatment_term:
    preferred_term: chemotherapy
    term:
      id: MAXO:0000647
      label: chemotherapy
    therapeutic_agent:
    - preferred_term: carboplatin
      term:
        id: CHEBI:31355
        label: carboplatin
    - preferred_term: vincristine
      term:
        id: CHEBI:28445
        label: vincristine
  evidence:
  - reference: PMID:22665535
    reference_title: "Randomized study of two chemotherapy regimens for treatment of low-grade glioma in young children: a report from the Children's Oncology Group."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Previously untreated children younger than age 10 years with progressive or
      residual LGGs were eligible. Children were randomly assigned to receive
      carboplatin and vincristine (CV) or thioguanine, procarbazine, lomustine,
      and vincristine (TPCV).
    explanation: >-
      Supports carboplatin/vincristine as an established pediatric low-grade glioma
      regimen used when complete resection is not feasible.
- name: Selumetinib
  description: >-
    MEK inhibition with selumetinib is active in recurrent or progressive
    MAPK-driven low-grade glioma, including pilocytic astrocytoma and
    optic-pathway/hypothalamic subsets where visual preservation matters.
  treatment_term:
    preferred_term: targeted therapy
    term:
      id: NCIT:C93352
      label: Targeted Therapy
    therapeutic_agent:
    - preferred_term: selumetinib
      term:
        id: NCIT:C66939
        label: Selumetinib
  target_mechanisms:
  - target: Constitutive MAPK Cascade Activation
    treatment_effect: INHIBITS
    description: MEK inhibition suppresses the shared MAPK signaling dependency of PA.
  evidence:
  - reference: PMID:40241281
    reference_title: "A phase 2 PBTC study of selumetinib for recurrent/progressive pediatric low-grade glioma: Strata 2, 5, and 6 with long-term outcomes on strata 1, 3, and 4."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Selumetinib provided stability and responses across many pLGG subgroups,
      and some patients achieved prolonged disease control without additional therapy.
    explanation: >-
      Supports selumetinib as an active targeted therapy across recurrent/progressive
      pediatric low-grade glioma subgroups that include PA.
  - reference: PMID:33631016
    reference_title: "A phase II trial of selumetinib in children with recurrent optic pathway and hypothalamic low-grade glioma without NF1: a Pediatric Brain Tumor Consortium study."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Selumetinib was tolerable and led to responses and prolonged disease
      stability in children with recurrent/progressive OPHGs based upon
      radiographic response, PFS, and visual outcomes.
    explanation: >-
      Supports selumetinib specifically in the optic pathway/hypothalamic subset
      where functional visual outcomes are central.
- name: Tovorafenib
  description: >-
    Tovorafenib is an FDA-approved type II RAF inhibitor for relapsed or
    refractory pediatric low-grade glioma with BRAF fusion, rearrangement, or
    V600E mutation, making it directly relevant to recurrent BRAF-altered PA.
  treatment_term:
    preferred_term: targeted therapy
    term:
      id: NCIT:C93352
      label: Targeted Therapy
    therapeutic_agent:
    - preferred_term: tovorafenib
      term:
        id: NCIT:C106254
        label: Tovorafenib
  target_mechanisms:
  - target: Constitutive MAPK Cascade Activation
    treatment_effect: INHIBITS
    description: Type II RAF inhibition targets the upstream RAF/MAPK dependency in BRAF-altered PA.
  evidence:
  - reference: PMID:39412085
    reference_title: "Type II RAF inhibitor tovorafenib for the treatment of pediatric low-grade glioma."
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      On 23 April 2024, the U.S. FDA approved a new type II RAF inhibitor,
      tovorafenib (OJEMDATM), previously known as DAY101, for the treatment of
      patients aged 6 months and older with relapsed or refractory (R/R) pLGG
      harboring a BRAF fusion or rearrangement, or BRAF V600E mutation.
    explanation: >-
      Review-level evidence supports current clinical use of tovorafenib in
      recurrent BRAF-altered pediatric low-grade glioma, a setting directly
      relevant to many recurrent PA cases.
