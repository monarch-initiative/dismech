name: Pilocytic Astrocytoma
creation_date: "2026-04-12T00:00:00Z"
updated_date: "2026-04-12T00:00:00Z"
description: >-
  Pilocytic astrocytoma (PA) is a circumscribed World Health Organization grade 1
  astrocytic glioma and the most common pediatric brain tumor. Most tumors arise
  in the cerebellum, optic pathway/hypothalamus, or brainstem and are driven by a
  single MAPK-pathway-activating alteration, most often KIAA1549-BRAF fusion.
  Clinical behavior is usually indolent, especially after gross total resection,
  but site-constrained tumors can cause major visual, endocrine, or hydrocephalic
  morbidity, and pilomyxoid astrocytoma represents a more aggressive histologic
  subtype within the same broader piloid disease program.
categories:
- Central Nervous System Neoplasm
- Pediatric Brain Tumor
- Circumscribed Astrocytic Glioma
- MAPK-Driven Tumor
