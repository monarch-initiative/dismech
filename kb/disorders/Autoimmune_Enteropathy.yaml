    term:
      id: HP:0002014
      label: Diarrhea
  target_mechanisms:
  - target: Mucosal Epithelial Injury
    treatment_effect: MODULATES
    description: Glucocorticoids suppress inflammatory mucosal injury and improve diarrhea in responsive patients.
  evidence:
  - reference: PMID:38817655
