genetic:
- name: FGFR2 Mutations
  association: Causative
  notes: >
    Various FGFR2 mutations have been identified, with C342R and C342S providing
    clear examples of alleles shared with Crouzon and Pfeiffer syndromes. The
    current evidence suggests that syndrome assignment is not determined by
    residue alone: developmental context and modifier background help determine
    whether a shared FGFR2 allele presents with the foot-predominant
    Jackson-Weiss phenotype rather than cranial-only disease or broader
    acrocephalosyndactyly.
  evidence:
  - reference: PMID:7874170
    reference_title: "Jackson-Weiss and Crouzon syndromes are allelic with mutations in fibroblast growth factor receptor 2."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "We now report an FGFR2 mutation in the conserved region of the immunoglobulin IIIc domain in the Jackson-Weiss syndrome family in which the syndrome was originally described."
    explanation: "First identification of FGFR2 mutation in JWS, establishing FGFR2 as the causative gene."
  - reference: PMID:8644708
    reference_title: "FGFR2 exon IIIa and IIIc mutations in Crouzon, Jackson-Weiss, and Pfeiffer syndromes: evidence for missense changes, insertions, and a deletion due to alternative RNA splicing."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Fibroblast growth factor receptor 2 (FGFR2) mutations have been associated with the craniosynostotic conditions Crouzon, Jackson-Weiss, and Pfeiffer syndromes."
    explanation: "Confirms FGFR2 mutations cause JWS along with related craniosynostosis syndromes."
  - reference: PMID:8528214
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "In addition, the Jackson-Weiss syndrome mutation, C342R, in exon IIIc was observed previously in other craniosynostotic syndromes, Crouzon and Pfeiffer."
    explanation: "This directly shows that a Jackson-Weiss-associated FGFR2 allele is shared with Crouzon and Pfeiffer syndrome rather than being syndrome-private."
  - reference: PMID:9385368
    reference_title: "Jackson-Weiss syndrome: identification of two novel FGFR2 missense mutations shared with Crouzon and Pfeiffer craniosynostotic disorders."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Mutations in the fibroblast growth factor receptor 2 (FGFR2) gene have been recently identified as causes of this syndrome and of at least four other craniosynostotic disorders, namely the Apert, Beare-Stevenson cutis gyrata, Crouzon and Pfeiffer syndromes."
    explanation: "Identifies novel FGFR2 mutations specific to JWS that overlap with Crouzon syndrome mutations."
