    evidence_source: HUMAN_CLINICAL
    snippet: "In addition, the Jackson-Weiss syndrome mutation, C342R, in exon IIIc was observed previously in other craniosynostotic syndromes, Crouzon and Pfeiffer."
    explanation: "This identifies p.Cys342Arg as a shared FGFR2 hotspot across Jackson-Weiss, Crouzon, and Pfeiffer syndrome."
- name: p.Cys342Ser
  description: >-
    Jackson-Weiss-associated FGFR2 Ig-III domain missense variant at the same
    hotspot codon as p.Cys342Arg, further illustrating codon-level allelic
    overlap across FGFR2 craniosynostosis syndromes.
  gene:
    preferred_term: FGFR2
    term:
      id: hgnc:3689
