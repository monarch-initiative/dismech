name: Jackson-Weiss Syndrome
creation_date: '2026-02-06T03:25:37Z'
updated_date: '2026-03-27T16:32:18Z'
category: Mendelian
description: >
  Jackson-Weiss syndrome is a craniosynostosis syndrome caused by heterozygous
  mutations in FGFR2, characterized by craniosynostosis, midface hypoplasia, and
  foot abnormalities including broad great toes and tarsal/metatarsal fusion. Unlike
  Apert and Pfeiffer syndromes, hand involvement is typically absent or minimal.
  The syndrome was originally described in a large Amish kindred and shows significant
  intrafamilial variability.
disease_term:
  preferred_term: Jackson-Weiss syndrome
  term:
    id: MONDO:0007400
    label: Jackson-Weiss syndrome
parents:
- FGFR2-related craniosynostosis
inheritance:
- name: Autosomal Dominant
  description: >
    Autosomal dominant inheritance with variable expressivity. Some individuals
    may have only subtle craniofacial features or isolated foot abnormalities.
  evidence:
  - reference: PMID:1271196
    reference_title: "Craniosynostosis, midfacial hypoplasia and foot abnormalities: an autosomal dominant phenotype in a large Amish kindred."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "An autosomal dominant inheritance pattern was observed associated with variable expressivity."
    explanation: "Original description of JWS in Amish kindred established autosomal dominant inheritance with variable expressivity."
  - reference: PMID:8644708
    reference_title: "FGFR2 exon IIIa and IIIc mutations in Crouzon, Jackson-Weiss, and Pfeiffer syndromes: evidence for missense changes, insertions, and a deletion due to alternative RNA splicing."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "The inter- and intrafamilial variability in expression of FGFR2 mutations suggests that these three syndromes, presumed to be clinically distinct, are instead representative of a spectrum of related craniosynostotic and digital disorders."
    explanation: "Confirms variable expressivity both within and between families with FGFR2 mutations."
prevalence:
- population: Published pedigrees and molecular case reports
  percentage: 15 affected individuals in one four-generation pedigree
  notes: >-
    No population-based prevalence estimate was identified in PubMed-indexed
    literature. Jackson-Weiss syndrome appears to be exceptionally rare and is
    mainly documented through isolated families and small molecular case series.
  evidence:
  - reference: PMID:7924855
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "A family with 15 individuals in four successive generations affected by Jackson-Weiss syndrome, craniosynostosis with Crouzon-variant-like phenotype and feet's abnormalities, is presented."
    explanation: This pedigree report provides one of the clearest quantified counts of affected individuals published for Jackson-Weiss syndrome.
  - reference: PMID:9385368
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "The replacement of Cys342 with arginine has previously been reported in one of the three Jackson-Weiss cases investigated."
    explanation: This molecular report underscores that the syndrome was still represented by only a few molecularly characterized cases in the literature.
pathophysiology:
- name: FGFR2 Gain-of-Function Signaling
  description: >
    Mutations in FGFR2 cause constitutive receptor activation, leading to
    premature cranial suture fusion and abnormal skeletal development in
    the feet. The specific mutations overlap with those causing Crouzon
    and Pfeiffer syndromes, with phenotype depending on genetic background
    and other modifying factors.
  cell_types:
  - preferred_term: Osteoblast
    term:
      id: CL:0000062
      label: osteoblast
  biological_processes:
  - preferred_term: FGFR Signaling
    term:
      id: GO:0008543
      label: fibroblast growth factor receptor signaling pathway
  - preferred_term: Cranial Suture Morphogenesis
    term:
      id: GO:0060363
      label: cranial suture morphogenesis
  evidence:
  - reference: PMID:7874170
    reference_title: "Jackson-Weiss and Crouzon syndromes are allelic with mutations in fibroblast growth factor receptor 2."
    supports: PARTIAL
    evidence_source: HUMAN_CLINICAL
    snippet: "We now report an FGFR2 mutation in the conserved region of the immunoglobulin IIIc domain in the Jackson-Weiss syndrome family in which the syndrome was originally described."
    explanation: "Landmark paper identifying FGFR2 mutations as the cause of Jackson-Weiss syndrome in the original Amish kindred."
  - reference: PMID:9385368
    reference_title: "Jackson-Weiss syndrome: identification of two novel FGFR2 missense mutations shared with Crouzon and Pfeiffer craniosynostotic disorders."
    supports: PARTIAL
    evidence_source: HUMAN_CLINICAL
    snippet: "Both nucleotide changes predict a serine for cysteine-342 substitution in the second half of the third immunoglobulin-like domain."
    explanation: "Identifies specific FGFR2 mutations in JWS patients affecting the immunoglobulin-like domain critical for receptor function."
genetic:
- name: FGFR2 Mutations
  association: Causative
  notes: >
    Various FGFR2 mutations have been identified, with C342R and C342S providing
    clear examples of alleles shared with Crouzon and Pfeiffer syndromes. The
    current evidence suggests that syndrome assignment is not determined by
    residue alone: developmental context and modifier background help determine
    whether a shared FGFR2 allele presents with the foot-predominant
    Jackson-Weiss phenotype rather than cranial-only disease or broader
    acrocephalosyndactyly.
  evidence:
  - reference: PMID:7874170
    reference_title: "Jackson-Weiss and Crouzon syndromes are allelic with mutations in fibroblast growth factor receptor 2."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "We now report an FGFR2 mutation in the conserved region of the immunoglobulin IIIc domain in the Jackson-Weiss syndrome family in which the syndrome was originally described."
    explanation: "First identification of FGFR2 mutation in JWS, establishing FGFR2 as the causative gene."
  - reference: PMID:8644708
    reference_title: "FGFR2 exon IIIa and IIIc mutations in Crouzon, Jackson-Weiss, and Pfeiffer syndromes: evidence for missense changes, insertions, and a deletion due to alternative RNA splicing."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Fibroblast growth factor receptor 2 (FGFR2) mutations have been associated with the craniosynostotic conditions Crouzon, Jackson-Weiss, and Pfeiffer syndromes."
    explanation: "Confirms FGFR2 mutations cause JWS along with related craniosynostosis syndromes."
  - reference: PMID:8528214
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "In addition, the Jackson-Weiss syndrome mutation, C342R, in exon IIIc was observed previously in other craniosynostotic syndromes, Crouzon and Pfeiffer."
    explanation: "This directly shows that a Jackson-Weiss-associated FGFR2 allele is shared with Crouzon and Pfeiffer syndrome rather than being syndrome-private."
  - reference: PMID:9385368
    reference_title: "Jackson-Weiss syndrome: identification of two novel FGFR2 missense mutations shared with Crouzon and Pfeiffer craniosynostotic disorders."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Mutations in the fibroblast growth factor receptor 2 (FGFR2) gene have been recently identified as causes of this syndrome and of at least four other craniosynostotic disorders, namely the Apert, Beare-Stevenson cutis gyrata, Crouzon and Pfeiffer syndromes."
    explanation: "Identifies novel FGFR2 mutations specific to JWS that overlap with Crouzon syndrome mutations."
variants:
- name: p.Cys342Arg
  description: >-
    Jackson-Weiss-associated FGFR2 Ig-III domain missense variant that is also
    reported in Crouzon and Pfeiffer syndrome, illustrating non-one-to-one
    mapping between allele and syndrome label.
  gene:
    preferred_term: FGFR2
