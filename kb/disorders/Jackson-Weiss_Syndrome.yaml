diagnosis:
- name: Clinical, Radiographic, and Molecular Diagnosis
  description: >-
    Jackson-Weiss syndrome is diagnosed from craniosynostosis with midface
    retrusion plus characteristic foot anomalies (broad great toes,
    tarsal/metatarsal fusion) and relative sparing of the hands, and is
    confirmed by identification of a heterozygous FGFR2 pathogenic variant.
    Because FGFR2 craniosynostosis syndromes (Crouzon, Pfeiffer, Jackson-Weiss)
    overlap and share variants such as C342, diagnosis is framed within the
    FGFR craniosynostosis spectrum.
  diagnosis_term:
    preferred_term: molecular genetic testing
    term:
      id: MAXO:0000533
      label: molecular genetic testing
  evidence:
  - reference: PMID:7874170
    reference_title: "Jackson-Weiss and Crouzon syndromes are allelic with mutations in fibroblast growth factor receptor 2."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Jackson-Weiss syndrome is an autosomal dominant condition characterized by craniosynostosis, foot anomalies and great phenotypic variability."
    explanation: >-
      Defines the core clinical diagnostic features of Jackson-Weiss syndrome
      (craniosynostosis plus foot anomalies) and establishes its allelism with
      other FGFR2 craniosynostosis syndromes. The FGFR Craniosynostosis
      Syndromes Overview (PMID:20301628) is retained as the GeneReviews baseline
      reference for the spectrum.
