inheritance:
- name: Autosomal Dominant
  description: >
    Autosomal dominant inheritance with variable expressivity. Some individuals
    may have only subtle craniofacial features or isolated foot abnormalities.
  evidence:
  - reference: PMID:1271196
    reference_title: "Craniosynostosis, midfacial hypoplasia and foot abnormalities: an autosomal dominant phenotype in a large Amish kindred."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "An autosomal dominant inheritance pattern was observed associated with variable expressivity."
    explanation: "Original description of JWS in Amish kindred established autosomal dominant inheritance with variable expressivity."
  - reference: PMID:8644708
    reference_title: "FGFR2 exon IIIa and IIIc mutations in Crouzon, Jackson-Weiss, and Pfeiffer syndromes: evidence for missense changes, insertions, and a deletion due to alternative RNA splicing."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "The inter- and intrafamilial variability in expression of FGFR2 mutations suggests that these three syndromes, presumed to be clinically distinct, are instead representative of a spectrum of related craniosynostotic and digital disorders."
    explanation: "Confirms variable expressivity both within and between families with FGFR2 mutations."
prevalence:
- population: Published pedigrees and molecular case reports
  percentage: 15 affected individuals in one four-generation pedigree
  notes: >-
    No population-based prevalence estimate was identified in PubMed-indexed
    literature. Jackson-Weiss syndrome appears to be exceptionally rare and is
    mainly documented through isolated families and small molecular case series.
  evidence:
  - reference: PMID:7924855
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "A family with 15 individuals in four successive generations affected by Jackson-Weiss syndrome, craniosynostosis with Crouzon-variant-like phenotype and feet's abnormalities, is presented."
    explanation: This pedigree report provides one of the clearest quantified counts of affected individuals published for Jackson-Weiss syndrome.
  - reference: PMID:9385368
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "The replacement of Cys342 with arginine has previously been reported in one of the three Jackson-Weiss cases investigated."
    explanation: This molecular report underscores that the syndrome was still represented by only a few molecularly characterized cases in the literature.
