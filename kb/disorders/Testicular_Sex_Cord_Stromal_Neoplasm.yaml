    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      β-catenin mutation in SCT results in nuclear β-catenin
      and cyclin-D1 expressions on immunohistochemical analysis.
    explanation: >-
      Exon 3 CTNNB1 (beta-catenin) mutation in testicular Sertoli cell tumors produces
      nuclear beta-catenin and cyclin D1 expression, the molecular hallmark of
      constitutive canonical Wnt pathway activation.
- name: cAMP/PKA Pathway Activation
  description: >-
    Activating GNAS mutations (constitutive Gs-alpha) and loss of the PKA regulatory
    subunit PRKAR1A (in Carney complex) both increase protein kinase A signaling, driving
    proliferation and steroidogenesis in Leydig and Sertoli cell tumors. PRKAR1A
    inactivation underlies large-cell calcifying Sertoli cell tumors in Carney complex.
  cell_types:
  - preferred_term: Leydig cell
    term:
      id: CL:0000178
