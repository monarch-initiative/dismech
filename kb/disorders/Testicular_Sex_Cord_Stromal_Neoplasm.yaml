  - target: Autonomous Gonadal Steroidogenesis
    description: Tumor cells secrete sex steroids independent of normal regulation.
- name: Wnt/Beta-Catenin Pathway Activation
  description: >-
    Recurrent activating (exon 3) mutations in CTNNB1 stabilize beta-catenin, leading to
    constitutive canonical Wnt signaling and nuclear beta-catenin accumulation in a subset
    of testicular Sertoli cell and Leydig cell tumors.
