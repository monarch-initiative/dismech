treatments:
- name: Radical or Testis-Sparing Orchiectomy
  description: >-
    Surgical removal of the tumor is the mainstay of treatment. Most sex cord-stromal
    tumors are benign and cured by radical inguinal orchiectomy or, for small benign
    lesions, testis-sparing (partial) orchiectomy.
  treatment_term:
    preferred_term: Surgical Procedure
    term:
      id: NCIT:C15329
      label: Surgical Procedure
  evidence:
  - reference: PMID:20301463
    reference_title: "Carney Complex."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      orchiectomy for boys with aggressive LCCSCT and gynecomastia to avoid premature
      epiphyseal fusion and induction of central precocious puberty
    explanation: >-
      Orchiectomy is indicated for aggressive Sertoli cell tumors with endocrine
      manifestations, supporting surgery as the mainstay of management.
- name: Retroperitoneal Lymph Node Dissection
  description: >-
    Considered for malignant sex cord-stromal tumors with features predictive of
    metastasis, since these tumors respond poorly to chemotherapy and radiotherapy.
  treatment_term:
    preferred_term: Surgical Procedure
    term:
      id: NCIT:C15329
      label: Surgical Procedure
  evidence:
  - reference: PMID:12910519
    reference_title: "Does retroperitoneal lymph node dissection have a curative role for patients with sex cord-stromal testicular tumors?"
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      RPLND remains an option to be performed
      immediately after orchiectomy, especially in patients who have tumors with
      malignant features and/or small-volume metastatic disease.
    explanation: >-
      Retroperitoneal lymph node dissection is an option performed after orchiectomy
      for testicular sex cord-stromal tumors with malignant features or small-volume
      metastatic disease, directly supporting RPLND as a surgical management modality.
  - reference: PMID:40345119
    reference_title: "A Single Centre Review of the Management of Testicular Sex Cord-Stromal Cell Tumours."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      It has been demonstrated that certain histopathological risk factors
      can be useful in identifying those with malignant potential.
    explanation: >-
      Histopathological risk factors identify sex cord-stromal tumors with malignant
      potential, guiding selection for patients who warrant more aggressive surgical
      management such as retroperitoneal lymph node dissection.
