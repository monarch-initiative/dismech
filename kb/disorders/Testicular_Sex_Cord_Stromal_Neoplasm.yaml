name: Testicular Sex Cord-Stromal Neoplasm
creation_date: "2026-06-08T00:00:00Z"
description: >-
  Testicular sex cord-stromal tumors (SCSTs) are uncommon neoplasms (about 4-6% of
  testicular tumors in adults, but a larger fraction in children) that arise from the
  non-germ-cell, gonadal-stromal compartment of the testis rather than from germ cells.
  They derive from the Sertoli cells, Leydig cells, granulosa cells, and undifferentiated
  gonadal stroma. Leydig cell tumor is the most common subtype and frequently presents
  with hormone production (testosterone or, via aromatization, estrogen), producing
  gynecomastia in adults or isosexual precocious puberty in boys. Sertoli cell tumors
  include a sclerosing variant and a large-cell calcifying variant that is strongly
  associated with Carney complex (PRKAR1A) and Peutz-Jeghers syndrome (STK11). Recurrent
  activating mutations in CTNNB1 (Wnt/beta-catenin) and GNAS underlie a subset of Sertoli
  and Leydig cell tumors. The great majority are benign and cured by orchiectomy or
  testis-sparing surgery; a minority (roughly 10%) are malignant, and malignant SCSTs
  respond poorly to chemotherapy and radiotherapy.
