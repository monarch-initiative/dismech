- name: TGF-beta-Driven Sertoli-to-Granulosa Transdifferentiation
  description: >-
    In a genetically engineered mouse model, sustained Sertoli cell-specific activation
    of the TGF-beta receptor TGFBR1 is sufficient to reprogram Sertoli cells toward a
    granulosa-like fate and to drive testicular granulosa cell tumor formation. This
    provides a mechanistic link between TGF-beta signaling dysregulation and the
    granulosa-cell phenotype of a subset of testicular sex cord-stromal tumors.
  cell_types:
  - preferred_term: Sertoli cell
