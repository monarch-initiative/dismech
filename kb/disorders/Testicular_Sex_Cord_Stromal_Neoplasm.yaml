  - reference: PMID:38154678
    reference_title: "Molecular characterization of large cell calcifying sertoli cell tumors: A multi-institutional study of 6 benign and 2 malignant tumors."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      PRKAR1A alterations were present in all cases and appear to
      be the major driver in LCCSCTs.
    explanation: >-
      Targeted sequencing of large-cell calcifying Sertoli cell tumors identified
      PRKAR1A alterations as the major molecular driver, supporting dysregulated
      cAMP/PKA signaling as the central mechanism in this Sertoli cell tumor variant.
  downstream:
