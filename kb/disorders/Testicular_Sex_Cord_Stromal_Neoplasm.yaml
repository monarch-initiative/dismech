    explanation: >-
      A mouse model demonstrates that constitutive TGFBR1 activation in Sertoli cells
      drives their transdifferentiation into granulosa-like cells and testicular
      granulosa cell tumor formation, implicating TGF-beta signaling in SCST pathogenesis.
- name: Autonomous Gonadal Steroidogenesis
  description: >-
    Hormonally active Leydig cell tumors autonomously synthesize testosterone; peripheral
    and intratumoral aromatase converts androgens to estrogens. Excess sex steroids produce
    gynecomastia in adults and isosexual precocious puberty in prepubertal boys.
