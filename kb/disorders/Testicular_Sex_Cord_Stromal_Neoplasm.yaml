has_subtypes:
- name: Leydig Cell Tumor
  display_name: Leydig Cell Tumor
  subtype_term:
    preferred_term: testicular Leydig cell tumor
    term:
      id: MONDO:0003124
      label: testicular Leydig cell tumor
  description: >-
    The most common testicular sex cord-stromal tumor, arising from steroidogenic
    Leydig cells of the testicular interstitium. Frequently hormonally active,
    producing testosterone and/or estrogen and presenting with gynecomastia in adults
    or precocious puberty in children. About 90% are benign. Recurrent activating
    mutations affect the cAMP/PKA pathway, including GNAS, and a subset harbor CTNNB1
    (beta-catenin) mutations.
- name: Sertoli Cell Tumor
  display_name: Sertoli Cell Tumor
  subtype_term:
    preferred_term: testicular Sertoli cell tumor
    term:
      id: MONDO:0020808
      label: testicular sertoli cell tumor
  description: >-
    Arises from the supporting Sertoli cells of the seminiferous tubules. Includes a
    sclerosing variant. Recurrent CTNNB1 (Wnt/beta-catenin) activating mutations are
    characteristic of a subset, and GNAS mutations occur in some cases. Most are benign.
- name: Large-Cell Calcifying Sertoli Cell Tumor
  display_name: Large-Cell Calcifying Sertoli Cell Tumor
  description: >-
    A distinctive Sertoli cell tumor variant characterized by large eosinophilic cells
    and conspicuous intratumoral calcification, frequently bilateral and multifocal. It
    is strongly associated with Carney complex (germline PRKAR1A inactivation) and with
    Peutz-Jeghers syndrome (germline STK11 inactivation).
  evidence:
  - reference: PMID:38154678
    reference_title: "Molecular characterization of large cell calcifying sertoli cell tumors: A multi-institutional study of 6 benign and 2 malignant tumors."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Almost 40 % of patients with
      LCCSCTs will present in the context of the inherited tumor predisposition
      syndrome, the Carney complex.
    explanation: >-
      Confirms the strong association between large cell calcifying Sertoli cell tumor
      and the Carney complex predisposition syndrome.
  - reference: PMID:20301463
    reference_title: "Carney Complex."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Large cell calcifying Sertoli cell tumors (LCCSCTs) are observed in one third of
      affected males within the first decade and in most adult males.
    explanation: >-
      Carney complex GeneReviews documents that LCCSCTs occur in a large fraction of
      affected males, often in childhood, underscoring the syndromic predisposition.
- name: Granulosa Cell Tumor
  display_name: Granulosa Cell Tumor (Adult and Juvenile)
  subtype_term:
    preferred_term: testicular granulosa cell tumor
    term:
      id: MONDO:0003395
      label: testicular granulosa cell tumor
  description: >-
    Granulosa cell tumors of the testis recapitulate ovarian granulosa cell tumors. The
    juvenile type is the most common congenital testicular tumor and is virtually always
    benign. The adult type is rare and can behave aggressively. Adult-type tumors may
    carry a FOXL2 mutation (e.g., C134W) as seen in ovarian counterparts.
  evidence:
  - reference: PMID:37565864
    reference_title: "Adult granulosa cell tumor of the testis with malignant tendency: A case report with genetic analysis using high-throughput sequencing."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      A high-throughput sequencing of 520 cancer-related genes revealed FOXL2 C134W,
      CDKN2A E87Gfs*24, TP53 S183*, TERT c.-124C > T, and H3F3A K28R mutations in this
      case.
    explanation: >-
      An adult testicular granulosa cell tumor carried the FOXL2 C134W mutation
      characteristic of adult-type granulosa cell tumors.
- name: Malignant Sex Cord-Stromal Tumor
  display_name: Malignant Sex Cord-Stromal Tumor
  description: >-
    A minority (approximately 10%) of testicular sex cord-stromal tumors are malignant,
    most often malignant Leydig or Sertoli cell tumors. Malignancy is suggested by large
    size (>5 cm), infiltrative margins, vascular invasion, necrosis, cytologic atypia,
    and increased mitotic activity. Malignant SCSTs metastasize to retroperitoneal lymph
    nodes, lung, liver, and bone, and respond poorly to chemotherapy and radiotherapy.
  evidence:
  - reference: PMID:40345119
    reference_title: "A Single Centre Review of the Management of Testicular Sex Cord-Stromal Cell Tumours."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Sex cord stromal cell tumours (SCSCT) are a rare subset of testicular
      tumours, the majority of which are benign but a small proportion can be
      malignant.
    explanation: >-
      Establishes that most testicular sex cord-stromal tumors are benign, with only a
      small malignant subset, and that histopathological risk factors predict malignancy.
pathophysiology:
- name: Neoplastic Transformation of Gonadal Stromal Cells
  description: >-
    Testicular sex cord-stromal tumors arise from clonal proliferation of the
    non-germ-cell gonadal stromal lineages of the testis: steroidogenic Leydig cells of
    the interstitium, supporting Sertoli cells of the seminiferous tubules, and
    granulosa-type cells. This distinguishes them from germ cell tumors, which arise from
    the germ cell lineage.
