name: Jervell and Lange-Nielsen Syndrome
creation_date: "2026-04-12T22:04:32Z"
updated_date: "2026-04-12T22:19:56Z"
category: Mendelian
description: >-
  Jervell and Lange-Nielsen syndrome is a rare autosomal recessive cardioauditory
  channelopathy characterized by congenital bilateral sensorineural hearing
  impairment together with marked QT prolongation, syncope, torsade de pointes,
  and risk of sudden cardiac death. It is caused most often by biallelic
  pathogenic variants in KCNQ1 and less commonly in KCNE1, which disrupt the
  potassium currents required for ventricular repolarization in the heart and
  potassium recycling in the inner ear.
