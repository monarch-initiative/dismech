pathophysiology:
- name: IKs Channel Loss in Cardiomyocytes
  description: >-
    Biallelic loss-of-function variants in KCNQ1 or KCNE1 reduce or abolish the
    slow delayed rectifier potassium current (IKs) in cardiomyocytes. This
    compromises repolarization reserve and is the primary electrical defect
    underlying the severe recessive cardiac phenotype of JLNS.
  genes:
  - preferred_term: KCNQ1
    term:
      id: hgnc:6294
      label: KCNQ1
  - preferred_term: KCNE1
    term:
      id: hgnc:6240
      label: KCNE1
  cell_types:
  - preferred_term: cardiomyocyte
    term:
      id: CL:0000746
      label: cardiac muscle cell
  molecular_functions:
  - preferred_term: delayed rectifier potassium channel activity
    term:
      id: GO:0005251
      label: delayed rectifier potassium channel activity
  biological_processes:
  - preferred_term: membrane repolarization during cardiac muscle cell action potential
    term:
      id: GO:0086013
      label: membrane repolarization during cardiac muscle cell action potential
    modifier: DECREASED
  locations:
  - preferred_term: heart
    term:
      id: UBERON:0000948
      label: heart
  evidence:
  - reference: PMID:16987820
    reference_title: "Skipping of Exon 1 in the KCNQ1 gene causes Jervell and Lange-Nielsen syndrome."
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: >-
      Mutant subunits, functionally characterized in Xenpous oocytes, were unable
      to form homomeric channels but strongly reduced IKs (slowly activating
      delayed rectifier potassium current) in vitro (mutant isoforms 1 and 2 by
      62 and 86%, respectively)
    explanation: Functional study directly shows marked IKs loss caused by a JLNS KCNQ1 variant.
  - reference: PMID:25453094
    reference_title: "Recessive cardiac phenotypes in induced pluripotent stem cell models of Jervell and Lange-Nielsen syndrome: disease mechanisms and pharmacological rescue."
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: >-
      Electrophysiological comparison of hiPSC-derived cardiomyocytes (CMs) from
      homozygous JLNS, heterozygous, and wild-type lines recapitulated the typical
      and severe features of JLNS, including pronounced action and field potential
      prolongation and severe reduction or absence of IKs.
    explanation: Human iPSC-derived cardiomyocytes confirm that severe JLNS phenotypes track with marked IKs loss.
  downstream:
  - target: Ventricular Repolarization Delay and Adrenergic Arrhythmia Susceptibility
    description: >-
      Loss of IKs prolongs cardiac action potentials and reduces repolarization
      reserve, increasing vulnerability to adrenergically triggered ventricular
      tachyarrhythmias.
- name: Ventricular Repolarization Delay and Adrenergic Arrhythmia Susceptibility
  description: >-
    Delayed ventricular repolarization produces marked QT prolongation and
    predisposes to malignant ventricular tachyarrhythmias, especially during
    adrenergic stress such as exercise, fright, or emotional arousal.
  locations:
  - preferred_term: heart
    term:
      id: UBERON:0000948
      label: heart
  evidence:
  - reference: PMID:25453094
    reference_title: "Recessive cardiac phenotypes in induced pluripotent stem cell models of Jervell and Lange-Nielsen syndrome: disease mechanisms and pharmacological rescue."
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: >-
      Moreover, adrenergic stimulation caused action potential prolongation
      specifically in JLNS-CMs.
    explanation: Shows that adrenergic stress further worsens repolarization abnormalities in JLNS cardiomyocytes.
  - reference: PMID:28364778
    reference_title: "Clinical and molecular findings in a Moroccan family with Jervell and Lange-Nielsen syndrome: a case report."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Cardiac symptoms arise mostly in early childhood and consist of syncopal
      episodes during periods of stress, exercise, or fright and are associated
      with a high risk of sudden cardiac death.
    explanation: Clinical evidence linking stress-triggered symptoms to the arrhythmia-prone phenotype.
  downstream:
  - target: Prolonged QT Interval
    description: Severe repolarization delay lengthens the QT interval on ECG.
  - target: Torsade de pointes
    description: Triggered ventricular tachyarrhythmias can degenerate into torsade de pointes.
  - target: Syncope
    description: Transient cerebral hypoperfusion during arrhythmia causes exertional or fright-induced syncope.
  - target: Sudden Cardiac Death
    description: Untreated malignant ventricular arrhythmias can cause sudden death in childhood.
- name: Impaired Cochlear Potassium Homeostasis
  description: >-
    The same KCNQ1/KCNE1 channel defect disrupts potassium handling required for
    potassium-rich endolymph production in the cochlea, leading to congenital,
    bilateral, profound sensorineural hearing impairment.
