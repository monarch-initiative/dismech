genetic:
- name: Biallelic KCNQ1 loss-of-function variants
  association: Causative
  features: >-
    Homozygous or compound heterozygous KCNQ1 loss-of-function variants cause the
    classic recessive cardioauditory syndrome with severe IKs reduction and a
    combined cardiac and hearing phenotype.
  gene_term:
    preferred_term: KCNQ1
    term:
      id: hgnc:6294
      label: KCNQ1
  evidence:
  - reference: PMID:28364778
    reference_title: "Clinical and molecular findings in a Moroccan family with Jervell and Lange-Nielsen syndrome: a case report."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Jervell and Lange-Nielsen syndrome is caused by homozygous or compound
      heterozygous mutations in KCNQ1 on 11p15.5 or KCNE1 on 1q22.1-q22.2.
    explanation: Confirms KCNQ1 as one of the two canonical biallelic JLNS genes.
  - reference: PMID:16987820
    reference_title: "Skipping of Exon 1 in the KCNQ1 gene causes Jervell and Lange-Nielsen syndrome."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      The Jervell and Lange-Nielsen syndrome (JLNS) is a rare autosomal recessive
      form of the long QT syndrome linked with a profound hearing loss caused by
      mutations affecting both alleles of either the KCNQ1 or the KCNE1 gene.
    explanation: Confirms that biallelic KCNQ1 mutations cause the classical recessive cardioauditory syndrome.
- name: Biallelic KCNE1 loss-of-function variants
  association: Causative
  features: >-
    KCNE1-related JLNS is much less common than KCNQ1-related disease but causes
    the same recessive cardioauditory syndrome through loss of the IKs beta subunit.
  gene_term:
    preferred_term: KCNE1
    term:
      id: hgnc:6240
      label: KCNE1
  evidence:
  - reference: PMID:28364778
    reference_title: "Clinical and molecular findings in a Moroccan family with Jervell and Lange-Nielsen syndrome: a case report."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Jervell and Lange-Nielsen syndrome is caused by homozygous or compound
      heterozygous mutations in KCNQ1 on 11p15.5 or KCNE1 on 1q22.1-q22.2.
    explanation: Supports KCNE1 as the rare second canonical JLNS gene.
treatments:
- name: Beta-blocker Therapy
  description: >-
    Beta-blockers are first-line therapy for JLNS and reduce the risk of cardiac
    events, although they may not fully prevent arrhythmias in previously
    symptomatic patients.
  treatment_term:
    preferred_term: pharmacotherapy
    term:
      id: MAXO:0000058
      label: pharmacotherapy
  target_phenotypes:
  - preferred_term: Prolonged QT interval
    term:
      id: HP:0001657
      label: Prolonged QT interval
  - preferred_term: Torsade de pointes
    term:
      id: HP:0001664
      label: Torsade de pointes
  evidence:
  - reference: PMID:22539601
    reference_title: "Prevalence, mutation spectrum, and cardiac phenotype of the Jervell and Lange-Nielsen syndrome in Sweden."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      β-Blockers reduced, but did not abolish, cardiac events in any previously
      symptomatic case. β-Blocker type, dosage, and compliance probably affect
      outcome significantly.
    explanation: Supports beta-blockers as standard therapy while emphasizing the need for high-dose, adherent treatment.
  notes: >-
    Severe childhood presentations may still require device therapy or other
    escalation strategies despite pharmacologic treatment.
- name: Cardiac Device Therapy
  description: >-
    In very high-risk young children, atrial pacing and later ICD implantation
    may be used when severe arrhythmic risk persists despite beta-blockade or when
    bridging to more definitive therapy is needed.
  treatment_term:
    preferred_term: cardiac device therapy
    term:
      id: NCIT:C49236
      label: Therapeutic Procedure
  target_phenotypes:
  - preferred_term: Syncope
    term:
      id: HP:0001279
      label: Syncope
  - preferred_term: Sudden cardiac death
    term:
      id: HP:0001645
      label: Sudden cardiac death
  evidence:
  - reference: PMID:27451284
    reference_title: "The Jervell and Lange-Nielsen syndrome; atrial pacing combined with ß-blocker therapy, a favorable approach in young high-risk patients with long QT syndrome?"
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      No arrhythmic events occurred in 6 very young JLNS patients who received
      atrial pacing in combination with increased doses of beta-blockers during
      7-year follow-up.
    explanation: Supports atrial pacing as an effective adjunct in selected young high-risk patients.
  - reference: PMID:22539601
    reference_title: "Prevalence, mutation spectrum, and cardiac phenotype of the Jervell and Lange-Nielsen syndrome in Sweden."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Implantable cardioverter-defibrillator therapy (ICD, n = 6) was associated
      with certain complications; however, no case of sudden death.
    explanation: Supports ICD use for prevention of sudden death, while acknowledging device-related complications.
- name: Genetic Counseling
  description: >-
    Genetic counseling is important for confirming the recessive diagnosis,
    informing family testing, and guiding recurrence-risk discussions.
  treatment_term:
    preferred_term: genetic counseling
    term:
      id: MAXO:0000079
      label: genetic counseling
  evidence:
  - reference: PMID:28364778
    reference_title: "Clinical and molecular findings in a Moroccan family with Jervell and Lange-Nielsen syndrome: a case report."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      The identification of the genetic substrate in this patient confirmed the
      clinical diagnosis of Jervell and Lange-Nielsen syndrome and allowed us to
      provide him with appropriate management and genetic counseling to his family.
    explanation: Demonstrates the practical role of molecular confirmation in counseling affected families.
notes: >-
  JLNS is the recessive, syndromic end of the KCNQ1/KCNE1 long-QT spectrum.
  Heterozygous carriers can be asymptomatic or have a milder dominant long-QT
  phenotype without congenital deafness, whereas the classic JLNS phenotype
  usually reflects biallelic loss of repolarizing channel function.
