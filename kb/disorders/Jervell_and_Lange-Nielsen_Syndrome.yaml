    evidence_source: HUMAN_CLINICAL
    snippet: >-
      It is characterized by congenital profound bilateral sensorineural hearing
      loss, a long QT interval, ventricular tachyarrhythmias, and episodes of
      torsade de pointes on an electrocardiogram.
    explanation: >-
      The abstract directly establishes congenital profound hearing loss as a
      core consequence of the shared JLNS channel defect; the specific cochlear
      potassium-homeostasis step is inferred from known KCNQ1/KCNE1 channel biology.
  downstream:
  - target: Profound Sensorineural Hearing Impairment
    description: Cochlear potassium homeostasis failure produces congenital profound hearing loss.
