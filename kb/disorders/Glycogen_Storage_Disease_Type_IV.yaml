name: Glycogen Storage Disease Type IV
category: Mendelian
creation_date: "2026-05-08T02:54:48Z"
synonyms:
- Andersen disease
- Amylopectinosis
- Glycogen branching enzyme deficiency
- Glycogen storage disease due to glycogen branching enzyme deficiency
- Glycogen storage disease type 4
- Glycogen storage disease type IV
- GSD IV
description: >
  Glycogen storage disease type IV is an autosomal recessive GBE1-related
  glycogen storage disorder caused by deficient glycogen branching enzyme
  activity. Impaired glycogen branching produces poorly branched glycogen
  (polyglucosan) that accumulates in liver, skeletal muscle, heart, and nervous
  system tissues. The clinical continuum includes fatal perinatal and congenital
  neuromuscular presentations, classic progressive hepatic disease,
  non-progressive hepatic disease, childhood neuromuscular disease, and
  adult-onset adult polyglucosan body disease.
