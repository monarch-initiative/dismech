progression:
- phase: Multisystem clinical continuum
  notes: >
    GSD IV spans perinatal, neonatal, infantile, childhood, adolescent, and
    adult-onset presentations with variable hepatic, cardiac, muscular, and
    neurologic severity.
  evidence:
  - reference: PMID:23285490
    reference_title: Glycogen Storage Disease Type IV.
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      The clinical manifestations of glycogen storage disease type IV (GSD IV)
      discussed in this entry span a continuum of different subtypes with
      variable ages of onset, severity, and clinical features.
    explanation: GeneReviews explicitly describes the variable subtype continuum.
  - reference: PMID:36796138
    reference_title: "Diagnosis and management of glycogen storage disease type IV, including adult polyglucosan body disease: A clinical practice resource."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      GSD IV is characterized by a remarkable degree of phenotypic heterogeneity
      with presentations in utero, during infancy, early childhood, adolescence,
      or middle to late adulthood.
    explanation: Clinical practice recommendations support the broad age-of-onset continuum.
has_subtypes:
- name: Fatal perinatal
  display_name: Fatal perinatal neuromuscular subtype
  description: >
    In utero neuromuscular presentation with fetal akinesia deformation sequence,
    polyhydramnios, fetal hydrops, and neonatal death.
  evidence:
  - reference: PMID:23285490
    reference_title: Glycogen Storage Disease Type IV.
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      The fatal perinatal neuromuscular subtype presents in utero with fetal
      akinesia deformation sequence, including decreased fetal movements,
      polyhydramnios, and fetal hydrops.
    explanation: GeneReviews defines the fatal perinatal neuromuscular subtype.
- name: Congenital neuromuscular
  display_name: Congenital neuromuscular subtype
  description: >
    Neonatal presentation with profound hypotonia, respiratory distress, and
    dilated cardiomyopathy, usually fatal in early infancy.
  evidence:
  - reference: PMID:23285490
    reference_title: Glycogen Storage Disease Type IV.
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      The congenital neuromuscular subtype presents in the newborn period with
      profound hypotonia, respiratory distress, and dilated cardiomyopathy.
    explanation: GeneReviews defines the congenital neuromuscular subtype.
- name: Progressive hepatic
  display_name: Classic progressive hepatic subtype
  description: >
    Infantile hepatic presentation with failure to thrive, hepatomegaly, liver
    dysfunction, progressive cirrhosis, hypotonia, and cardiomyopathy.
  evidence:
  - reference: PMID:23285490
    reference_title: Glycogen Storage Disease Type IV.
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Infants with the classic (progressive) hepatic subtype may appear normal
      at birth, but rapidly develop failure to thrive; hepatomegaly, liver
      dysfunction, and progressive liver cirrhosis; hypotonia; and
      cardiomyopathy.
    explanation: GeneReviews defines the classic progressive hepatic subtype.
- name: Non-progressive hepatic
  display_name: Non-progressive hepatic subtype
  description: >
    Childhood hepatic presentation with hepatomegaly, liver dysfunction,
    myopathy, and hypotonia that may survive without progressive liver disease.
  evidence:
  - reference: PMID:23285490
    reference_title: Glycogen Storage Disease Type IV.
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Children with the non-progressive hepatic subtype tend to present with
      hepatomegaly, liver dysfunction, myopathy, and hypotonia
    explanation: GeneReviews defines the non-progressive hepatic subtype.
- name: Childhood neuromuscular
  display_name: Childhood neuromuscular subtype
  description: >
    Rare later childhood or adolescent neuromuscular presentation with variable
    progression from mild disease to death in the third decade.
  evidence:
  - reference: PMID:23285490
    reference_title: Glycogen Storage Disease Type IV.
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      The childhood neuromuscular subtype is rare and the course is variable,
      ranging from onset in the second decade with a mild disease course to a
      more severe, progressive course resulting in death in the third decade.
    explanation: GeneReviews defines the childhood neuromuscular subtype and its variable course.
