- reference: ORPHA:367
  title: Glycogen storage disease due to glycogen branching enzyme deficiency
  findings:
  - statement: >
      Orphanet records GSD IV as an autosomal recessive glycogen storage disease
      with hepatic, neuromuscular, and cardiac symptoms and provides HPO
      frequency annotations.
    supporting_text: >
      A rare form of glycogen storage disease characterized by a continuum of
      clinical manifestations of variable presentation and severity, involving
      hepatic, neuromuscular and/or cardiac symptoms.
- reference: PMID:23285490
  title: Glycogen Storage Disease Type IV.
  tags:
  - GeneReviews
  findings:
  - statement: >
      GeneReviews defines the GSD IV clinical continuum, diagnostic testing, and
      management including liver transplantation, heart transplantation, and
      physical therapy.
    supporting_text: >
      The clinical manifestations of glycogen storage disease type IV (GSD IV)
      discussed in this entry span a continuum of different subtypes with
      variable ages of onset, severity, and clinical features.
- reference: PMID:36796138
  title: "Diagnosis and management of glycogen storage disease type IV, including adult polyglucosan body disease: A clinical practice resource."
  findings:
  - statement: >
      Clinical practice recommendations identify pathogenic GBE1 variants,
      reduced glycogen branching enzyme activity, polyglucosan accumulation,
      multisystem clinical heterogeneity, APBD, and management domains.
    supporting_text: >
      Glycogen storage disease type IV (GSD IV) is an ultra-rare autosomal
      recessive disorder caused by pathogenic variants in GBE1 which results in
      reduced or deficient glycogen branching enzyme activity.
- reference: PMID:30228975
  title: "Analysis of GBE1 mutations via protein expression studies in glycogen storage disease type IV: A report on a non-progressive form with a literature review."
  findings:
  - statement: >
      Patient and functional studies support reduced GBE activity, PAS-positive
      partially diastase-resistant hepatic inclusions, and multisystem
      polyglucosan storage in GSD IV.
    supporting_text: >
      Upon liver biopsy, periodic acid-Schiff-positive cytoplasmic inclusions
      were reported with partial resistance to diastase digestion
- reference: PMID:33141444
  title: "GBE1-related disorders: Adult polyglucosan body disease and its neuromuscular phenotypes."
  findings:
  - statement: >
      APBD is a GBE1-related adult GSD IV phenotype with polyglucosan storage in
      skeletal muscle, autonomic and peripheral nerves, brain white matter,
      spinal cord, and related neuromuscular tissues.
    supporting_text: >
      Adult polyglucosan body disease (APBD) represents a complex autosomal
      recessive inherited neurometabolic disorder due to homozygous or compound
      heterozygous pathogenic variants in GBE1 gene
