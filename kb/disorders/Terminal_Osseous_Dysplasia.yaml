        id: HP:0001423
        label: X-linked dominant inheritance
    evidence:
    - reference: PMID:20598277
      reference_title: "Terminal osseous dysplasia is caused by a single recurrent mutation in the FLNA gene."
      supports: SUPPORT
      evidence_source: HUMAN_CLINICAL
      snippet: >-
        In the families, the variant segregated with the disease, and
        it was transmitted four times from a mildly affected mother to
        a more seriously affected daughter.
      explanation: >-
        Demonstrates X-linked dominant transmission with mother-to-daughter
        segregation and variable expressivity.
  features: >-
    Single recurrent mutation c.5217G>A at the last nucleotide of exon 31.
    X-linked dominant with male lethality. Variable expressivity due to
    nonrandom X chromosome inactivation. Affects only females.
  evidence:
  - reference: PMID:20598277
    reference_title: "Terminal osseous dysplasia is caused by a single recurrent mutation in the FLNA gene."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Our data show that TOD is caused by this single recurrent mutation
      in the FLNA gene.
    explanation: >-
      Confirms a single recurrent mutation as the cause of all TOD cases.
  - reference: PMID:26059211
    reference_title: "Anetoderma in a patient with terminal osseous dysplasia with pigmentary defects."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Recent studies have identified a FLNA c.5217G>A mutation as the
      cause of TODPD, allowing for diagnostic genetic testing.
    explanation: >-
      Confirms the specific mutation and its diagnostic utility.
