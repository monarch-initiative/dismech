name: Terminal Osseous Dysplasia
creation_date: "2026-04-04T00:00:00Z"
updated_date: "2026-04-04T00:00:00Z"
description: >-
  Terminal osseous dysplasia with pigmentary defects (TODPD) is a rare X-linked
  dominant male-lethal skeletal dysplasia caused by a single recurrent mutation
  (c.5217G>A) in the FLNA gene. The condition is seen only in females and is
  characterized by skeletal dysplasia predominantly affecting the hands and feet,
  pigmentary defects of the skin (particularly punched-out lesions on the face
  and scalp), and recurrent digital fibromata with onset in female infancy.
  The mutation activates a cryptic splice site, removing 16 amino acids from
  filamin repeat 15. X-inactivation plays a major role in determining the range
  of phenotypic expression, with marked variability between affected individuals.
  Despite being grouped with OPD spectrum disorders in some classifications,
  TOD has a distinct molecular mechanism and clinical presentation.
category: Genetic
parents:
  - Skeletal Dysplasia
disease_term:
  preferred_term: terminal osseous dysplasia-pigmentary defects syndrome
  term:
    id: MONDO:0010279
    label: terminal osseous dysplasia-pigmentary defects syndrome
prevalence:
  - population: Global
    percentage: Rare
inheritance:
  - name: X-linked Dominant
    inheritance_term:
      preferred_term: X-linked dominant inheritance
      term:
        id: HP:0001423
        label: X-linked dominant inheritance
pathophysiology:
  - name: FLNA Cryptic Splice Site Activation
    description: >-
      A single recurrent mutation (c.5217G>A) at the last nucleotide of exon 31
      of FLNA activates a cryptic splice site, removing the last 48 nucleotides
      from exon 31.
    biological_processes:
      - preferred_term: mRNA splicing
        term:
          id: GO:0000398
          label: mRNA splicing, via spliceosome
    evidence:
      - reference: PMID:20598277
        supports: SUPPORT
        evidence_source: HUMAN_CLINICAL
        snippet: >-
          The variant c.5217G>A was found in six unrelated cases (three
          families and three sporadic cases)
        explanation: >-
          Identifies the single recurrent FLNA mutation causing TOD.
      - reference: PMID:20598277
        supports: SUPPORT
        evidence_source: HUMAN_CLINICAL
        snippet: >-
          The variant activates a cryptic splice site, removing the last 48
          nucleotides from exon 31. At the protein level, this results in a
          loss of 16 amino acids (p.Val1724_Thr1739del), predicted to remove
          a sequence at the surface of filamin repeat 15.
        explanation: >-
          Defines the molecular mechanism of the TOD mutation.
    downstream:
      - target: Truncated Filamin A Protein
  - name: Truncated Filamin A Protein
    description: >-
      At the protein level, the splice site activation results in loss of 16
      amino acids (p.Val1724_Thr1739del), predicted to remove a surface
      sequence of filamin repeat 15, producing a structurally altered filamin A.
    biological_processes:
      - preferred_term: Actin cytoskeleton organization
        term:
          id: GO:0030036
          label: actin cytoskeleton organization
    downstream:
      - target: Nonrandom X-Inactivation and Tissue-Specific Expression
  - name: Nonrandom X-Inactivation and Tissue-Specific Expression
    description: >-
      Due to nonrandom X chromosome inactivation, the mutant allele is not
      expressed in patient fibroblasts but is expressed in cultured fibroma
      cells. This tissue-specific expression pattern determines the range
      of phenotypic manifestations.
    cell_types:
      - preferred_term: Fibroblast
        term:
          id: CL:0000057
          label: fibroblast
    evidence:
      - reference: PMID:20598277
        supports: SUPPORT
        evidence_source: HUMAN_CLINICAL
        snippet: >-
          RNA expression of the mutant allele was detected only in cultured
          fibroma cells obtained from 15-year-old surgically removed material.
        explanation: >-
          Demonstrates tissue-specific expression of the mutant allele
          due to X-inactivation patterns.
    downstream:
      - target: Dysregulated Elastin Biology and Connective Tissue Manifestations
  - name: Dysregulated Elastin Biology and Connective Tissue Manifestations
    description: >-
      Mutated filamin A exerts effects through dysregulated elastin biology,
      with absent elastic fibers in skin lesions, explaining the connective
      tissue manifestations including skeletal dysplasia and pigmentary defects.
    cell_types:
      - preferred_term: Osteoblast
        term:
          id: CL:0000062
          label: osteoblast
    biological_processes:
      - preferred_term: Skeletal system development
        term:
          id: GO:0001501
          label: skeletal system development
    locations:
      - preferred_term: Hand
        term:
          id: UBERON:0002398
          label: manus
      - preferred_term: Foot
        term:
          id: UBERON:0002387
          label: pes
      - preferred_term: Skin
        term:
          id: UBERON:0002097
          label: skin of body
    evidence:
      - reference: PMID:26059211
        supports: SUPPORT
        evidence_source: HUMAN_CLINICAL
        snippet: >-
          The finding of absent elastic fibers in the skin lesions suggests
          that mutated filamin A, in part, exerts its effects through
          dysregulated elastin biology
        explanation: >-
          Proposes dysregulated elastin biology as a mechanism for connective
          tissue manifestations in FLNA disorders including TOD.
phenotypes:
  - category: Musculoskeletal
    name: Distal Limb Skeletal Dysplasia
    frequency: Very frequent
    description: >-
      Skeletal dysplasia predominantly affecting the hands and feet, including
      brachydactyly and terminal bone abnormalities. Although most striking
      in hands and feet, skeletal involvement can be more generalized.
    phenotype_term:
      preferred_term: Brachydactyly
      term:
        id: HP:0001156
        label: Brachydactyly
    evidence:
      - reference: PMID:20598277
        supports: SUPPORT
        evidence_source: HUMAN_CLINICAL
        snippet: >-
          Terminal osseous dysplasia (TOD) is an X-linked dominant male-lethal
          disease characterized by skeletal dysplasia of the limbs
        explanation: >-
          Confirms limb skeletal dysplasia as a defining feature.
  - category: Dermatologic
    name: Pigmentary Skin Defects
    frequency: Very frequent
    description: >-
      Punched-out pigmentary abnormalities over the face and scalp, with
      discolored linear facial lesions. Skin biopsy reveals absent papillary
      dermal elastic fibers (anetoderma).
    phenotype_term:
      preferred_term: Abnormality of skin pigmentation
      term:
        id: HP:0001000
        label: Abnormality of skin pigmentation
    evidence:
      - reference: PMID:20598277
        supports: SUPPORT
        evidence_source: HUMAN_CLINICAL
        snippet: >-
          pigmentary defects of the skin
        explanation: >-
          Pigmentary skin defects are a defining feature of TOD.
      - reference: PMID:26059211
        supports: SUPPORT
        evidence_source: HUMAN_CLINICAL
        snippet: >-
          deformities of the hands and feet, craniofacial abnormalities, and
          discolored, linear facial lesions
        explanation: >-
          Confirms the pigmentary skin defect phenotype.
  - category: Musculoskeletal
    name: Recurrent Digital Fibromata
    frequency: Very frequent
    description: >-
      Recurrent fibromas of the digits with onset in female infancy.
      Surgically removed material shows expression of the mutant FLNA allele
      in fibroma cells.
    phenotype_term:
      preferred_term: Digital fibromas
      term:
        id: HP:0009724
        label: Subungual fibromas
    evidence:
      - reference: PMID:20598277
        supports: SUPPORT
        evidence_source: HUMAN_CLINICAL
        snippet: >-
          recurrent digital fibroma with onset in female infancy
        explanation: >-
          Recurrent digital fibromas are a defining feature of TOD.
      - reference: PMID:20598277
        supports: SUPPORT
        evidence_source: HUMAN_CLINICAL
        snippet: >-
          RNA expression of the mutant allele was detected only in cultured
          fibroma cells obtained from 15-year-old surgically removed material.
        explanation: >-
          Demonstrates that the mutant FLNA allele escapes X-inactivation
          silencing specifically in fibroma tissue.
  - category: Musculoskeletal
    name: Camptodactyly
    description: >-
      Fixed flexion contracture of the digits is a recurrent finding in the
      hands of TODPD patients.
    phenotype_term:
      preferred_term: Camptodactyly
      term:
        id: HP:0012385
        label: Camptodactyly
    evidence:
      - reference: PMID:25614868
        reference_title: "Terminal osseous dysplasia with pigmentary defects (TODPD) due to a recurrent filamin A (FLNA) mutation."
        supports: SUPPORT
        evidence_source: HUMAN_CLINICAL
        snippet: "Camptodactyly is also present."
        explanation: >-
          A TODPD case series documents camptodactyly among the digital
          anomalies of affected patients.
  - category: Craniofacial
    name: Multiple Oral Frenula
    description: >-
      Multiple accessory oral frenula are a recognized feature of TODPD and may
      be the only sign in mosaic carrier mothers.
    phenotype_term:
      preferred_term: Multiple oral frenula
      term:
        id: HP:0000191
        label: Accessory oral frenulum
    evidence:
      - reference: PMID:20583181
        reference_title: "Terminal osseous dysplasia with pigmentary defects (TODPD): Follow-up of the first reported family, characterization of the radiological phenotype, and refinement of the linkage region."
        supports: SUPPORT
        evidence_source: HUMAN_CLINICAL
        snippet: >-
          digital fibromas, multiple oral frenula, iris colobomas, cardiac, and
          urogenital malformations.
        explanation: >-
          The TODPD follow-up study lists multiple oral frenula among the
          defining clinical features.
  - category: Ophthalmologic
    name: Iris Coloboma
    description: >-
      Iris colobomas are part of the ocular involvement reported in TODPD.
    phenotype_term:
      preferred_term: Iris coloboma
      term:
        id: HP:0000612
        label: Iris coloboma
    evidence:
      - reference: PMID:20583181
        reference_title: "Terminal osseous dysplasia with pigmentary defects (TODPD): Follow-up of the first reported family, characterization of the radiological phenotype, and refinement of the linkage region."
        supports: SUPPORT
        evidence_source: HUMAN_CLINICAL
        snippet: >-
          The presentation in the affected patients included multiple anomalies,
          hypertelorism, iris colobomas, punched-out pigmentary abnormalities
          over the face and scalp, brachydactyly, and digital fibromatosis.
        explanation: >-
          The TODPD follow-up study lists iris colobomas among the presenting
          features of affected patients.
  - category: Craniofacial
    name: Hypertelorism
    description: >-
      Increased interorbital distance is reported among the craniofacial
      features of TODPD.
    phenotype_term:
      preferred_term: Hypertelorism
      term:
        id: HP:0000316
        label: Hypertelorism
    evidence:
      - reference: PMID:20583181
        reference_title: "Terminal osseous dysplasia with pigmentary defects (TODPD): Follow-up of the first reported family, characterization of the radiological phenotype, and refinement of the linkage region."
        supports: SUPPORT
        evidence_source: HUMAN_CLINICAL
        snippet: >-
          The presentation in the affected patients included multiple anomalies,
          hypertelorism, iris colobomas, punched-out pigmentary abnormalities
          over the face and scalp, brachydactyly, and digital fibromatosis.
        explanation: >-
          The TODPD follow-up study lists hypertelorism among the presenting
          features of affected patients.
  - category: Cardiovascular
    name: Cardiac Malformation
    description: >-
      Congenital cardiac malformations are part of the multisystem involvement
      reported in TODPD.
    phenotype_term:
      preferred_term: Cardiac malformation
      term:
        id: HP:0001627
        label: Abnormal heart morphology
    evidence:
      - reference: PMID:20583181
        reference_title: "Terminal osseous dysplasia with pigmentary defects (TODPD): Follow-up of the first reported family, characterization of the radiological phenotype, and refinement of the linkage region."
        supports: SUPPORT
        evidence_source: HUMAN_CLINICAL
        snippet: >-
          digital fibromas, multiple oral frenula, iris colobomas, cardiac, and
          urogenital malformations.
        explanation: >-
          The TODPD follow-up study lists cardiac malformations among the
          defining clinical features.
  - category: Dermatologic
    name: Anetoderma
    description: >-
      Skin biopsy of facial lesions shows absent papillary dermal elastic
      fibers, consistent with anetoderma, reflecting the dysregulated elastin
      biology of FLNA-related disease.
    phenotype_term:
      preferred_term: Anetoderma
      term:
        id: HP:0032026
        label: Anetoderma
    evidence:
      - reference: PMID:26059211
        reference_title: "Anetoderma in a patient with terminal osseous dysplasia with pigmentary defects."
        supports: SUPPORT
        evidence_source: HUMAN_CLINICAL
        snippet: >-
          Skin biopsy of the patient's facial lesion revealed absent papillary
          dermal elastic fibers, consistent with anetoderma
        explanation: >-
          A molecularly confirmed TODPD case shows facial-lesion histology
          consistent with anetoderma.
genetic:
  - name: FLNA c.5217G>A Recurrent Mutation
    association: Pathogenic Variants
    gene_term:
      preferred_term: FLNA
      term:
        id: hgnc:3754
        label: FLNA
    inheritance:
      - name: X-linked Dominant
        inheritance_term:
          preferred_term: X-linked dominant inheritance
          term:
            id: HP:0001423
            label: X-linked dominant inheritance
    features: >-
      Single recurrent mutation c.5217G>A at the last nucleotide of exon 31.
      X-linked dominant with male lethality. Variable expressivity due to
      nonrandom X chromosome inactivation. Affects only females.
    evidence:
      - reference: PMID:20598277
        supports: SUPPORT
        evidence_source: HUMAN_CLINICAL
        snippet: >-
          Our data show that TOD is caused by this single recurrent mutation
          in the FLNA gene.
        explanation: >-
          Confirms a single recurrent mutation as the cause of all TOD cases.
      - reference: PMID:26059211
        supports: SUPPORT
        evidence_source: HUMAN_CLINICAL
        snippet: >-
          Recent studies have identified a FLNA c.5217G>A mutation as the
          cause of TODPD, allowing for diagnostic genetic testing.
        explanation: >-
          Confirms the specific mutation and its diagnostic utility.
treatments:
  - name: Surgical Excision of Digital Fibromas
    description: >-
      Recurrent digital fibromas may require surgical excision, though
      recurrence is common.
    treatment_term:
      preferred_term: Surgical excision
      term:
        id: MAXO:0000004
        label: surgical procedure
  - name: Genetic Counseling
    description: >-
      Counseling regarding X-linked inheritance, male lethality, and
      variable expressivity due to X-inactivation patterns.
    treatment_term:
      preferred_term: Genetic counseling
      term:
        id: MAXO:0000079
        label: genetic counseling
