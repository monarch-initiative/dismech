      evidence_source: HUMAN_CLINICAL
      snippet: "mutations in IFIH1 are all heterozygous gain-of-function"
      explanation: Crow et al. support dominant IFIH1 gain-of-function disease in AGS.
  evidence:
  - reference: PMID:25604658
