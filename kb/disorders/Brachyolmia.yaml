    label: brachyolmia
parents:
- Skeletal dysplasia
- Platyspondyly syndrome
has_subtypes:
- name: AD-TRPV4
  display_name: Autosomal Dominant Brachyolmia (TRPV4)
  description: >
    Caused by gain-of-function mutations in TRPV4, encoding a calcium-permeable
    mechanosensitive cation channel. Characterized by disproportionate short stature
    with short trunk, scoliosis, platyspondyly, and chronic pain. Growth is typically
    normal in early childhood but deteriorates with increasing spinal involvement.
  evidence:
  - reference: PMID:18587396
    reference_title: "Gain-of-function mutations in TRPV4 cause autosomal dominant brachyolmia."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Here, we identify a locus for an autosomal dominant form of brachyolmia on chromosome 12q24.1-12q24.2."
    explanation: Establishes the autosomal dominant TRPV4 subtype and its genetic locus.
- name: AR-PAPSS2
  display_name: Autosomal Recessive Brachyolmia (PAPSS2)
  description: >
    Caused by loss-of-function mutations in PAPSS2, encoding PAPS synthase 2. Features
    short-trunk short stature with onset in childhood, platyspondyly with rectangular
    vertebral bodies and irregular endplates, precocious rib cartilage calcification,
    short femoral neck, and low serum DHEAS. Includes the historical Hobaek and Toledo
    types.
  evidence:
  - reference: PMID:22791835
    reference_title: "PAPSS2 mutations cause autosomal recessive brachyolmia."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "We identified PAPSS2 as the disease gene for an AR brachyolmia."
    explanation: Identifies PAPSS2 as the causal gene for autosomal recessive brachyolmia.
- name: LTBP3
  display_name: Brachyolmia with Amelogenesis Imperfecta (LTBP3)
  description: >
    Caused by recessive mutations in LTBP3. Features brachyolmia combined with
    hypoplastic amelogenesis imperfecta with thin to absent dental enamel. LTBP3
    encodes latent TGF-beta binding protein 3, involved in TGF-beta signaling
    required for both skeletal and dental development.
  evidence:
  - reference: PMID:25669657
    reference_title: "Mutations in the latent TGF-beta binding protein 3 (LTBP3) gene cause brachyolmia with amelogenesis imperfecta."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "recessive hypomorphic mutations including deletion, nonsense and splice mutations, in the LTBP3 gene, which is involved in the TGF-beta signaling pathway"
    explanation: Identifies LTBP3 mutations as the cause of brachyolmia with amelogenesis imperfecta.
inheritance:
- name: Autosomal dominant
  inheritance_term:
    preferred_term: Autosomal dominant inheritance
    term:
      id: HP:0000006
      label: Autosomal dominant inheritance
  description: >
    The TRPV4-related form follows autosomal dominant inheritance. Two families have
    been identified with heterozygous missense mutations (R616Q and V620I) segregating
    with the brachyolmia phenotype.
  evidence:
  - reference: PMID:18587396
    reference_title: "Gain-of-function mutations in TRPV4 cause autosomal dominant brachyolmia."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "In two families with the phenotype, we identified point mutations in TRPV4 that encoded R616Q and V620I substitutions, respectively."
    explanation: Documents autosomal dominant inheritance with heterozygous TRPV4 mutations in two families.
- name: Autosomal recessive
  inheritance_term:
    preferred_term: Autosomal recessive inheritance
    term:
      id: HP:0000007
      label: Autosomal recessive inheritance
  description: >
    Both PAPSS2-related and LTBP3-related brachyolmia follow autosomal recessive
    inheritance, with affected individuals carrying homozygous or compound heterozygous
    loss-of-function mutations.
  evidence:
  - reference: PMID:22791835
    reference_title: "PAPSS2 mutations cause autosomal recessive brachyolmia."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "The patients had a homozygous loss of function mutation, c.337_338insG (p.A113GfsX18)."
    explanation: Demonstrates autosomal recessive inheritance with homozygous PAPSS2 mutations.
  - reference: PMID:25669657
    reference_title: "Mutations in the latent TGF-beta binding protein 3 (LTBP3) gene cause brachyolmia with amelogenesis imperfecta."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Here, we report on four families, three of them consanguineous, with an identical phenotype, characterized by significant short stature with brachyolmia and hypoplastic amelogenesis imperfecta"
    explanation: Consanguineous families support autosomal recessive inheritance for the LTBP3 form.
pathophysiology:
- name: TRPV4 gain-of-function calcium channel activation
  description: >
    Gain-of-function mutations in TRPV4 cause constitutive activation of a
    calcium-permeable mechanosensitive cation channel that is selectively expressed
    in cartilage. The R616Q and V620I mutations increase constitutive channel
    activity and elevate responses to mechanical stimulation, arachidonic acid,
    and the TRPV4-specific agonist 4alpha-phorbol 12,13-didecanoate. The R616Q
    mutation disrupts a cholesterol-binding motif, leading to altered membrane
    localization and loss of lipid raft interaction. Aberrant calcium signaling
    in growth plate chondrocytes impairs endochondral ossification, predominantly
    affecting the vertebral column.
  cell_types:
  - preferred_term: Growth plate chondrocyte
    term:
      id: CL:1000217
      label: growth plate cartilage chondrocyte
  biological_processes:
  - preferred_term: Calcium ion transport
    term:
      id: GO:0006816
      label: calcium ion transport
    modifier: INCREASED
  - preferred_term: Endochondral ossification
    term:
      id: GO:0001958
      label: endochondral ossification
    modifier: ABNORMAL
  evidence:
  - reference: PMID:18587396
    reference_title: "Gain-of-function mutations in TRPV4 cause autosomal dominant brachyolmia."
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: "both mutations resulted in a dramatic gain of function characterized by increased constitutive activity"
    explanation: Patch clamp studies in transfected HEK cells demonstrate gain-of-function with increased constitutive and agonist-stimulated channel activity.
  - reference: PMID:18587396
    reference_title: "Gain-of-function mutations in TRPV4 cause autosomal dominant brachyolmia."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "we selected TRPV4, which encodes a calcium permeable cation channel of the transient receptor potential (TRP) vanilloid family, as a candidate gene because of its cartilage-selective gene expression pattern"
    explanation: TRPV4 was identified as a candidate gene because of its cartilage-selective expression, linking gain-of-function to skeletal dysplasia.
  - reference: PMID:20605796
    reference_title: "Wild-type and brachyolmia-causing mutant TRPV4 channels respond directly to stretch force."
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: "R616Q channels maintain mechanosensitivity but have greater constitutive activity and no change in unitary conductance or rectification"
    explanation: Single-channel analysis confirms the R616Q mutant is directly mechanosensitive with increased constitutive activity.
  - reference: PMID:31387748
    reference_title: "TRPV4 expresses in bone cell lineages and TRPV4-R616Q mutant causing Brachyolmia in human reveals 'loss-of-interaction' with cholesterol."
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: "TRPV4-Wt but not the TRPV4-R616Q localizes preferably in cholesterol-enriched lipid rafts in osteogenic cell line Saos2"
    explanation: Demonstrates that the R616Q mutation disrupts cholesterol binding and lipid raft localization, providing a molecular mechanism for altered channel function.
  downstream:
  - target: Platyspondyly and spinal involvement
- name: PAPSS2 deficiency and impaired sulfation
  description: >
    Loss-of-function mutations in PAPSS2 impair the biosynthesis of PAPS
    (3'-phosphoadenosine 5'-phosphosulfate), the universal sulfate donor required for
    sulfation of glycosaminoglycans in cartilage extracellular matrix. Undersulfated
    proteoglycans compromise the structural integrity of growth plate cartilage,
    leading to platyspondyly with irregular endplates, short femoral neck, and
    metaphyseal changes. PAPSS2 deficiency also disrupts steroid sulfation, leading
    to low serum DHEAS and abnormal androgen metabolism.
  cell_types:
