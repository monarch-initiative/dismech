- name: LTBP3 deficiency and disrupted TGF-beta signaling
  description: >
    Recessive mutations in LTBP3 disrupt latent TGF-beta binding protein 3, which
    is required for proper TGF-beta signaling during both skeletal and dental
    development. LTBP3 is expressed in developing bone undergoing endochondral
    ossification and in differentiated ameloblasts. Loss of LTBP3 function leads
    to brachyolmia with impaired enamel formation (amelogenesis imperfecta).
