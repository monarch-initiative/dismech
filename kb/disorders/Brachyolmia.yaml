  - preferred_term: LTBP3
    term:
      id: hgnc:6716
      label: LTBP3
  description: >
    The Ltbp3 knockout mouse recapitulates the amelogenesis imperfecta phenotype
    of human LTBP3-related brachyolmia, displaying thin to absent enamel in both
    incisors and molars. Mandibular prognathism secondary to maxillary underdevelopment
    is also present.
  associated_phenotypes:
  - Amelogenesis imperfecta
  - Mandibular prognathism
  evidence:
  - reference: PMID:25669657
    reference_title: "Mutations in the latent TGF-beta binding protein 3 (LTBP3) gene cause brachyolmia with amelogenesis imperfecta."
    supports: SUPPORT
    evidence_source: MODEL_ORGANISM
    snippet: "mutant mice displayed very thin to absent enamel in both incisors and molars, hereby recapitulating the AI phenotype in the human disorder"
    explanation: Ltbp3 knockout mice replicate the dental enamel defect seen in human patients.
notes: >
  Prenatal presentation with short femora on ultrasound has been reported in some
  PAPSS2-related cases, with the short-trunk phenotype emerging later in childhood.
  PAPSS2-related brachyolmia may be under-recognized in infancy. The phenotypic
  spectrum of PAPSS2 mutations includes a gradation from isolated brachyolmia to
  spondylo-epi-metaphyseal dysplasia.
