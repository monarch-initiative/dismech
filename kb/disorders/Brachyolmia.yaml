- name: Platyspondyly and spinal involvement
  description: >
    All brachyolmia subtypes converge on impaired vertebral body development,
    resulting in generalized platyspondyly. This reflects disrupted endochondral
    ossification in the vertebral growth plates, regardless of the upstream molecular
    defect. The predominantly axial skeletal involvement distinguishes brachyolmia
    from more generalized spondyloepiphyseal or spondylometaphyseal dysplasias.
