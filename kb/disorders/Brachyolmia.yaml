name: Brachyolmia
creation_date: "2026-04-02T12:00:00Z"
updated_date: "2026-04-02T12:00:00Z"
category: Mendelian
description: >
  Brachyolmia (Greek: 'short trunk') is a clinically and genetically heterogeneous group
  of skeletal dysplasias characterized by disproportionate short-trunk short stature,
  generalized platyspondyly, and relatively minor long-bone abnormalities. At least three
  genetic forms are recognized: autosomal dominant brachyolmia caused by gain-of-function
  mutations in TRPV4, autosomal recessive brachyolmia caused by loss-of-function mutations
  in PAPSS2, and brachyolmia with amelogenesis imperfecta caused by LTBP3 mutations. The
  TRPV4 form results from constitutive activation of a mechanosensitive calcium-permeable
  cation channel expressed in growth plate chondrocytes. The PAPSS2 form disrupts
  3'-phosphoadenosine 5'-phosphosulfate biosynthesis, impairing glycosaminoglycan sulfation
  essential for cartilage extracellular matrix integrity. The LTBP3 form disrupts TGF-beta
  signaling required for both skeletal and dental development. All forms share the hallmark
  of platyspondyly with predominantly axial skeletal involvement, though the severity and
  extra-skeletal features vary by genotype.
