prevalence:
- population: General (worldwide)
  notes: >-
    OI type XXIII is ultra-rare. As of the defining 2022 report, only five
    affected children from two unrelated families had been described; no
    population-level prevalence estimate is available.
pathophysiology:
- name: Biallelic PHLDB1 Loss-of-Function Eliminates PHLDB1 Protein
  description: >-
    PHLDB1 encodes pleckstrin homology-like domain family B member 1, a protein
    with a reported role in insulin-dependent Akt phosphorylation. In OI type
    XXIII, biallelic frameshift variants reduce PHLDB1 mRNA expression in blood
    and skin fibroblasts and abolish the protein, as confirmed by western blot
    of cultured patient fibroblasts. This loss of PHLDB1 is the proximal
    molecular lesion; the downstream pathway by which it impairs bone is not yet
    established.
