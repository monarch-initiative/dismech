diagnosis:
- name: Molecular Genetic Diagnosis
  description: >-
    OI type XXIII is suspected in a child with mild OI showing recurrent
    fractures and/or osteopenia together with regressive spondylometaphyseal
    changes (platyspondyly, short/bowed long bones, widened metaphyses). Because
    these features overlap other forms of OI and spondylometaphyseal dysplasia,
    diagnosis rests on identifying biallelic PHLDB1 loss-of-function variants by
    whole-exome or gene-panel sequencing; reduced PHLDB1 mRNA and loss of PHLDB1
    protein in patient fibroblasts are supportive.
  diagnosis_term:
    preferred_term: molecular genetic testing
    term:
      id: MAXO:0000533
      label: molecular genetic testing
  evidence:
  - reference: PMID:36543534
    reference_title: "Biallelic frameshift variants in PHLDB1 cause mild-type osteogenesis imperfecta with regressive spondylometaphyseal changes."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Whole-exome sequencing and clinical evaluation were performed in five
      patients from two unrelated families.
    explanation: >-
      Documents whole-exome sequencing as the method that established the
      molecular diagnosis of OI type XXIII.
