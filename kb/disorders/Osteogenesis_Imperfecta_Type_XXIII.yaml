name: Osteogenesis Imperfecta Type XXIII
creation_date: "2026-06-30T00:00:00Z"
category: Mendelian
disease_term:
  preferred_term: Osteogenesis imperfecta, type 23
  term:
    id: MONDO:0957988
    label: osteogenesis imperfecta, type 23
description: >-
  Osteogenesis imperfecta type XXIII (OI type XXIII; OMIM 620639) is an
  ultra-rare, recently described autosomal recessive brittle bone disorder
  caused by biallelic loss-of-function variants in PHLDB1, the gene encoding
  pleckstrin homology-like domain family B member 1. It was first defined in
  2022 in five affected children from two unrelated families carrying biallelic
  PHLDB1 frameshift variants. The reported phenotype is a distinctive
  "mild-type" OI: recurrent fractures and/or osteopenia, platyspondyly, short
  and bowed long bones, and widened metaphyses, with the metaphyseal and
  vertebral changes regressing after early childhood and no further fractures
  occurring under bisphosphonate treatment. The precise molecular mechanism by
  which PHLDB1 loss causes brittle bone is still emerging and has not been fully
  established. PHLDB1 protein has a reported role in insulin-dependent Akt
  phosphorylation; in patient blood and skin fibroblasts, PHLDB1 mRNA expression
  was decreased and western blot confirmed loss of PHLDB1 protein, supporting
  the causative role of the biallelic variants. How loss of PHLDB1 translates
  into the observed skeletal fragility and matrix changes remains an open
  question and should not be overstated.
