genetic:
- name: PHLDB1 Loss-of-Function (Frameshift) Variants
  association: Causative
  gene_term:
    preferred_term: PHLDB1 (pleckstrin homology-like domain family B member 1)
    term:
      id: hgnc:23697
      label: PHLDB1
  notes: >-
    OI type XXIII is caused by biallelic loss-of-function variants in PHLDB1.
    The defining report identified two frameshift alleles
    (NM_001144758.3:c.2392dup and NM_001144758.3:c.2690_2693del), each segregating
    as homozygous/biallelic within one of two unrelated families, with
    heterozygous unaffected parents. PHLDB1 is the only gene associated with this
    OI type to date and the molecular consequence is loss of PHLDB1 protein.
  evidence:
  - reference: PMID:36543534
    reference_title: "Biallelic frameshift variants in PHLDB1 cause mild-type osteogenesis imperfecta with regressive spondylometaphyseal changes."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      We identified biallelic NM_001144758.3:c.2392dup and
      NM_001144758.3:c.2690_2693del pathogenic variants in PHLDB1 in the
      affected patients, respectively, in the families; parents were
      heterozygous for these variants.
    explanation: >-
      Identifies the causative biallelic PHLDB1 frameshift variants and their
      recessive segregation defining OI type XXIII.
