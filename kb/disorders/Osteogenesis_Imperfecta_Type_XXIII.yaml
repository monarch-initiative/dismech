      Loss of PHLDB1 leads, through an as-yet-undefined mechanism, to a
      bone-fragility and spondylometaphyseal phenotype.
- name: Defective Bone Formation and Skeletal Fragility
  description: >-
    Loss of PHLDB1 produces a mild OI phenotype with recurrent fractures and/or
    osteopenia together with characteristic spondylometaphyseal changes
    (platyspondyly, short and bowed long bones, widened metaphyses). A
    distinctive feature is that the metaphyseal and vertebral changes regress
    after early childhood. Because the molecular link between PHLDB1 loss and the
    bone matrix defect has not been established, the mechanism connecting the
    proximal lesion to the skeletal phenotype remains tentative and is described
    here only at the level of the observed bone phenotype.
