notes: >-
  Asta deep research was completed for this disorder. Final curation focused on
  the original CHD1 missense cohort because it provided both clinical syndrome
  definition and mechanistic evidence with directly quotable text. The CHD1
  diagnostic entry is retained as standard confirmatory molecular testing, but
  the GeneMatcher recruitment sentence was removed because it was not direct
  diagnostic evidence.
