diagnosis:
- name: Audiologic Electrophysiology
  description: >-
    Diagnosis depends on demonstrating preserved OAE or cochlear microphonics
    with absent or abnormal ABR, alongside behavioral speech perception testing
    when developmentally possible.
  results: Present OAE or cochlear microphonics with absent/abnormal ABR supports ANSD.
  evidence:
  - reference: PMID:38016438
    reference_title: "Cochlear Implantation in Children with Auditory Neuropathy: Meta-Analysis."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Its diagnosis is based on presence of otoacoustic emissions and lack of, or abnormal, brainstem auditory evoked potential."
    explanation: Supports the diagnostic electrophysiology pattern.
- name: Molecular Genetic Testing
  diagnosis_term:
    preferred_term: genetic testing
    term:
      id: MAXO:0000127
      label: genetic testing
  description: >-
    Sequencing panels, exome sequencing, or genome sequencing help identify
    causal genes and localize lesion site, especially in infant, bilateral, or
    familial cases.
  results: Pathogenic or likely pathogenic variants in ANSD genes support molecular diagnosis.
  evidence:
  - reference: PMID:38456936
    reference_title: Clinical and genetic architecture of a large cohort with auditory neuropathy.
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "In a retrospective cohort of 311 patients with AN, pathogenic and likely pathogenic variants of 23 genes were identified in 98 patients (31.5% in 311 patients)"
    explanation: Supports molecular testing yield in a large AN cohort.
treatments:
- name: Hearing Aid Use
  description: >-
    Hearing aids may be trialed as part of hearing rehabilitation, but benefit
    is variable because ANSD primarily disrupts neural timing and speech
    perception.
  treatment_term:
    preferred_term: hearing aid usage
    term:
      id: MAXO:0009030
      label: hearing aid usage
  target_phenotypes:
  - preferred_term: Hearing impairment
    term:
      id: HP:0000365
      label: Hearing impairment
  evidence:
  - reference: PMID:36769387
    reference_title: Current Advances in Gene Therapies of Genetic Auditory Neuropathy Spectrum Disorder.
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "To date, the only clinical treatment options for ANSD are hearing aids and cochlear implantation."
    explanation: Review identifies hearing aids as one of the current clinical treatment options.
- name: Cochlear Implantation
  description: >-
    Cochlear implantation is a major rehabilitative option for selected ANSD
    patients, with outcomes influenced by lesion site and cochlear nerve
    integrity.
  treatment_term:
    preferred_term: surgical procedure
    term:
      id: MAXO:0000004
      label: surgical procedure
  target_phenotypes:
  - preferred_term: Hearing impairment
    term:
      id: HP:0000365
      label: Hearing impairment
  evidence:
  - reference: PMID:38027523
    reference_title: Outcomes of cochlear implantation in 75 patients with auditory neuropathy.
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "CI is a viable therapy option for patients with AN; CN deficiency might impact outcomes of CI."
    explanation: Directly supports cochlear implantation while noting cochlear nerve deficiency as an outcome modifier.
  - reference: PMID:38809896
    reference_title: "Predictors of cochlear implant outcomes in pediatric auditory neuropathy: A matched case-control study."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Children with ANSD can achieve similar open-set speech perception outcomes as children with SNHL."
    explanation: Supports pediatric cochlear implantation outcomes comparable to matched SNHL controls.
  - reference: PMID:38016438
    reference_title: "Cochlear Implantation in Children with Auditory Neuropathy: Meta-Analysis."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "CI provides the comparable benefit to children with ANSD in comparison to children with neurosensory hearing loss associated with other causes in their speech development."
    explanation: Meta-analysis supports cochlear implantation benefit for speech development in children with ANSD.
- name: OTOF-Targeted Gene Therapy
  description: >-
    Gene-replacement or gene-editing approaches for genetic ANSD, particularly
    OTOF-related presynaptic synaptopathy, remain emerging rather than standard
    clinical care.
  treatment_term:
    preferred_term: gene therapy
    term:
      id: MAXO:0001001
      label: gene therapy
  target_phenotypes:
  - preferred_term: Hearing impairment
    term:
      id: HP:0000365
      label: Hearing impairment
  evidence:
  - reference: PMID:36769387
    reference_title: Current Advances in Gene Therapies of Genetic Auditory Neuropathy Spectrum Disorder.
    supports: PARTIAL
    evidence_source: HUMAN_CLINICAL
    snippet: "genetic routes involving the replacement or corrective editing of mutant sequences or defected genes to repair damaged cells for the future restoration of hearing in deaf people are showing promise."
    explanation: Review supports gene therapy as a promising emerging approach, but not established standard therapy.
notes: >-
  Falcon deep research completed on 2026-05-08 and emphasized recent 2023-2024
  ANSD literature: large-cohort genetic architecture, cochlear-implant outcome
  predictors, lesion-site classification, and emerging OTOF-targeted gene
  therapy. Clinical trial registry entries from the report were not cited in
  this page to keep the initial curation focused on PMID-backed literature.
