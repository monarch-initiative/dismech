name: Auditory Neuropathy
creation_date: "2026-05-08T16:19:19Z"
updated_date: "2026-05-08T16:41:58Z"
category: Genetic
description: >-
  Auditory neuropathy spectrum disorder (ANSD) is a heterogeneous hearing
  disorder in which cochlear outer hair cell activity is often preserved while
  neural transmission from inner hair cells, ribbon synapses, spiral ganglion
  neurons, or the auditory nerve is impaired. This produces abnormal or absent
  auditory brainstem responses, variable hearing thresholds, and speech
  perception that is often worse than expected from the pure-tone audiogram.
synonyms:
- auditory neuropathy spectrum disorder
- ANSD
- auditory dys-synchrony
- auditory neuropathy
disease_term:
  preferred_term: auditory neuropathy
  term:
    id: MONDO:0021944
    label: auditory neuropathy
parents:
- hearing loss disorder
- inherited auditory system disease
has_subtypes:
- name: AUNA1
  display_name: Autosomal Dominant Auditory Neuropathy 1
  subtype_term:
    preferred_term: autosomal dominant auditory neuropathy 1
    term:
      id: MONDO:0012196
      label: autosomal dominant auditory neuropathy 1
  description: >-
    DIAPH3-associated autosomal dominant auditory neuropathy caused by increased
    DIAPH3 activity and associated with progressive neural hearing dysfunction.
  evidence:
  - reference: PMID:20624953
    reference_title: "Increased activity of Diaphanous homolog 3 (DIAPH3)/diaphanous causes hearing defects in humans with auditory neuropathy and in Drosophila."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "We have identified Diaphanous homolog 3 (DIAPH3) as the gene responsible for autosomal dominant nonsyndromic auditory neuropathy (AUNA1), which we previously mapped to chromosome 13q21-q24."
    explanation: Establishes DIAPH3 as the causative gene for the AUNA1 subtype.
- name: AUNA2
  display_name: Auditory Neuropathy, Autosomal Dominant 2
  subtype_term:
    preferred_term: auditory neuropathy, autosomal dominant 2
    term:
      id: MONDO:0957279
      label: auditory neuropathy, autosomal dominant 2
  description: >-
    ATP11A-associated autosomal dominant auditory neuropathy characterized by
    slowly progressive postlingual auditory synaptopathy/neuropathy.
  evidence:
  - reference: PMID:36300302
    reference_title: A mutation in ATP11A causes autosomal-dominant auditory neuropathy type 2.
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "By combining whole-genome sequencing, immunohistochemistry, in vitro functional assays and generation of a mouse model, we could thus identify a partial deletion of ATP11A as the genetic cause of AUNA2."
    explanation: Supports ATP11A as the genetic cause of the AUNA2 subtype.
- name: AUNA3
  display_name: Auditory Neuropathy, Autosomal Dominant 3
  subtype_term:
    preferred_term: auditory neuropathy, autosomal dominant 3
    term:
      id: MONDO:0859235
      label: auditory neuropathy, autosomal dominant 3
  description: >-
    TMEM43-associated autosomal dominant auditory neuropathy subtype listed
    under the MONDO auditory neuropathy branch.
  evidence:
  - reference: PMID:39834515
    reference_title: Modeling of auditory neuropathy spectrum disorders associated with the TEME43 variant reveals impaired gap junction function of iPSC-derived glia-like support cells.
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: "TMEM43 mutation is identified as a causative factor in ANSD."
    explanation: Supports TMEM43 as a causative gene for an auditory neuropathy spectrum disorder subtype.
pathophysiology:
- name: Lesion-Site Spectrum
  description: >-
    ANSD is not a single lesion but a spectrum spanning inner hair cells, ribbon
    synapses, postsynaptic spiral ganglion terminals, and auditory nerve
    demyelination or axonal loss.
  cell_types:
  - preferred_term: cochlear inner hair cell
    term:
      id: CL:0000589
      label: cochlear inner hair cell
  - preferred_term: spiral ganglion neuron
    term:
      id: CL:0011113
      label: spiral ganglion neuron
  - preferred_term: Schwann cell
    term:
      id: CL:0002573
      label: Schwann cell
  evidence:
  - reference: PMID:36769387
    reference_title: Current Advances in Gene Therapies of Genetic Auditory Neuropathy Spectrum Disorder.
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "This defect can be due to a lesion or defect in the inner hair cell (IHC), IHC ribbon synapse (e.g., pre-synaptic release of glutamate), postsynaptic terminals of the spiral ganglion neurons, or demyelination and axonal loss within the auditory nerve."
    explanation: Defines the cellular lesion-site spectrum underlying ANSD.
  downstream:
  - target: Abnormal Auditory Brainstem Response
    description: >-
      Impaired neural transmission disrupts synchronized brainstem responses
      despite preserved peripheral cochlear receptor activity.
- name: Presynaptic Inner Hair Cell Synaptopathy
  description: >-
    Biallelic OTOF variants impair otoferlin-dependent vesicle release and
    synapse maturation at inner hair cell ribbon synapses, producing a
    presynaptic auditory synaptopathy.
  cell_types:
  - preferred_term: cochlear inner hair cell
    term:
      id: CL:0000589
      label: cochlear inner hair cell
  - preferred_term: spiral ganglion neuron
    term:
      id: CL:0011113
      label: spiral ganglion neuron
  biological_processes:
  - preferred_term: chemical synaptic transmission
    term:
      id: GO:0007268
      label: chemical synaptic transmission
    modifier: DECREASED
  evidence:
  - reference: PMID:34335185
    reference_title: Otoferlin Is Required for Proper Synapse Maturation and for Maintenance of Inner and Outer Hair Cells in Mouse Models for DFNB9.
    supports: SUPPORT
    evidence_source: MODEL_ORGANISM
    snippet: "We found otoferlin to be required for proper synapse development in the immature rodent cochlea: In absence of otoferlin, synaptic pruning was delayed, and postsynaptic boutons appeared enlarged at 2 weeks of age."
    explanation: Mouse data support otoferlin loss as a synaptic maturation defect at cochlear inner hair cell synapses.
  - reference: PMID:23562982
    reference_title: Genetic analysis of auditory neuropathy spectrum disorder in the Korean population.
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "A novel nonsense mutation (p.Y1064X) and a known pathogenic mutation (p.R1939Q) of the OTOF gene were identified in a patient as compound heterozygote."
    explanation: Human genetic evidence supports OTOF as a causative gene for recessive ANSD.
  downstream:
  - target: Poor Speech Perception
    description: >-
      Impaired synaptic release reduces temporal precision of auditory coding,
      which degrades speech discrimination.
- name: Auditory Nerve Dyssynchrony
  description: >-
    Postsynaptic ANSD involves spiral ganglion terminals or auditory nerve
    fibers; impaired spike initiation, demyelination, axonal loss, or distal
    dendritic dysfunction reduce temporal precision of auditory nerve discharge.
  cell_types:
  - preferred_term: spiral ganglion neuron
    term:
      id: CL:0011113
      label: spiral ganglion neuron
  - preferred_term: Schwann cell
    term:
      id: CL:0002573
      label: Schwann cell
  biological_processes:
  - preferred_term: axon ensheathment
    term:
      id: GO:0008366
      label: axon ensheathment
    modifier: DECREASED
  evidence:
  - reference: PMID:21176122
    reference_title: Information from cochlear potentials and genetic mutations helps localize the lesion site in auditory neuropathy.
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Abnormal discharge of auditory fibers results from lesions involving the nerve fibers themselves (postsynaptic AN), the inner hair cells (IHCs) or their synapses with auditory nerve terminals (presynaptic AN) [1]."
    explanation: Supports separation of presynaptic and postsynaptic lesion classes in auditory neuropathy.
  - reference: PMID:21176122
    reference_title: Information from cochlear potentials and genetic mutations helps localize the lesion site in auditory neuropathy.
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "The demyelination of auditory nerve fibers observed in demyelinating neuropathies is expected to result in slowed conduction velocity with consequent disruption of temporal coding of acoustic signals (desynchrony)"
    explanation: Links auditory nerve demyelination to temporal dyssynchrony.
  downstream:
  - target: Poor Speech Perception
    description: >-
      Temporal coding impairment causes speech perception to be reduced out of
      proportion to hearing threshold elevation.
- name: AIFM1-Associated Mitochondrial Neuronal Injury
  description: >-
    AIFM1 variants can impair AIF dimerization and CHCHD4 interaction, producing
    mitochondrial dysfunction, mitochondrial calcium overload, ROS elevation,
    and caspase-independent apoptosis in patient-derived neurons.
  cell_types:
  - preferred_term: spiral ganglion neuron
    term:
      id: CL:0011113
      label: spiral ganglion neuron
  evidence:
  - reference: PMID:37365177
    reference_title: Impaired AIF-CHCHD4 interaction and mitochondrial calcium overload contribute to auditory neuropathy spectrum disorder in patient-iPSC-derived neurons with AIFM1 variant.
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: "On the one hand, the mitochondrial import of ETC complex subunits was inhibited, subsequently leading to an increased ADP/ATP ratio and elevated ROS levels."
    explanation: Patient iPSC-derived neuronal evidence supports mitochondrial energy and oxidative-stress mechanisms.
  - reference: PMID:37365177
    reference_title: Impaired AIF-CHCHD4 interaction and mitochondrial calcium overload contribute to auditory neuropathy spectrum disorder in patient-iPSC-derived neurons with AIFM1 variant.
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: "Mitochondrial dysfunction, especially mCa2+ overload, plays a prominent role in ANSD associated with AIFM1."
    explanation: Directly supports mitochondrial calcium overload as an AIFM1-associated ANSD mechanism.
phenotypes:
- category: Clinical
  name: Hearing Impairment
  description: >-
    Hearing thresholds are variable, ranging from mild to profound impairment,
    and may improve, remain stable, fluctuate, or deteriorate depending on
    etiology and lesion site.
  phenotype_term:
    preferred_term: Hearing impairment
    term:
      id: HP:0000365
      label: Hearing impairment
  evidence:
  - reference: PMID:38456936
    reference_title: Clinical and genetic architecture of a large cohort with auditory neuropathy.
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Auditory neuropathy (AN) is a unique type of language developmental disorder, with no precise rate of genetic contribution that has been deciphered in a large cohort."
    explanation: Supports auditory neuropathy as a hearing-related developmental disorder evaluated in a large human cohort.
  - reference: PMID:36769387
    reference_title: Current Advances in Gene Therapies of Genetic Auditory Neuropathy Spectrum Disorder.
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Auditory neuropathy spectrum disorder (ANSD) refers to a range of hearing impairments characterized by an impaired transmission of sound from the cochlea to the brain."
    explanation: Defines ANSD as a hearing-impairment spectrum.
- category: Clinical
  name: Poor Speech Perception
  description: >-
    Speech perception is often disproportionately poor relative to pure-tone
    thresholds because temporal neural coding is impaired.
  evidence:
  - reference: PMID:21176122
    reference_title: Information from cochlear potentials and genetic mutations helps localize the lesion site in auditory neuropathy.
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "The disruption of auditory nerve discharge underlies both the absence of or profound alterations in auditory brainstem responses and the severe impairment of speech perception."
    explanation: Links auditory nerve discharge disruption to severe speech-perception impairment.
  - reference: PMID:21176122
    reference_title: Information from cochlear potentials and genetic mutations helps localize the lesion site in auditory neuropathy.
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "some patients with AN may have normal hearing thresholds and an impairment of speech perception that is only apparent in the presence of noise"
    explanation: Supports speech-in-noise impairment as an important clinical feature that may be missed by threshold testing.
- category: Diagnostic
  name: Abnormal Auditory Brainstem Response
  description: >-
    Absent or markedly abnormal auditory brainstem responses are a core
    diagnostic hallmark of ANSD.
  evidence:
  - reference: PMID:20624953
    reference_title: "Increased activity of Diaphanous homolog 3 (DIAPH3)/diaphanous causes hearing defects in humans with auditory neuropathy and in Drosophila."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Auditory neuropathy is a rare form of deafness characterized by an absent or abnormal auditory brainstem response with preservation of outer hair cell function."
    explanation: Provides the classic ABR/OHC diagnostic contrast.
  - reference: PMID:38016438
    reference_title: "Cochlear Implantation in Children with Auditory Neuropathy: Meta-Analysis."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Its diagnosis is based on presence of otoacoustic emissions and lack of, or abnormal, brainstem auditory evoked potential."
    explanation: Meta-analysis abstract restates the diagnostic requirement.
- category: Diagnostic
  name: Preserved Otoacoustic Emissions or Cochlear Microphonics
  description: >-
    Outer hair cell activity is often preserved, particularly early, as shown by
    otoacoustic emissions or cochlear microphonics despite abnormal ABR.
  evidence:
  - reference: PMID:21176122
    reference_title: Information from cochlear potentials and genetic mutations helps localize the lesion site in auditory neuropathy.
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Affected subjects show impairment of speech perception beyond that expected for the hearing loss, abnormality of auditory brainstem potentials and preserved outer hair-cell activities."
    explanation: Supports preserved outer hair cell activity as part of the diagnostic pattern.
genetic:
- name: DIAPH3
  gene_term:
    preferred_term: DIAPH3
    term:
      id: hgnc:15480
      label: DIAPH3
  association: Causative
  inheritance:
  - name: Autosomal dominant
  notes: >-
    DIAPH3 overexpression causes AUNA1, an autosomal dominant nonsyndromic
    auditory neuropathy subtype.
  evidence:
  - reference: PMID:20624953
    reference_title: "Increased activity of Diaphanous homolog 3 (DIAPH3)/diaphanous causes hearing defects in humans with auditory neuropathy and in Drosophila."
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: "Using genome-wide expression arrays and quantitative RT-PCR, we demonstrate a 2- to 3-fold overexpression of DIAPH3 mRNA in lymphoblastoid cell lines from affected individuals."
    explanation: Supports gain-of-expression DIAPH3 mechanism in affected humans.
- name: ATP11A
  gene_term:
    preferred_term: ATP11A
    term:
      id: hgnc:13552
      label: ATP11A
  association: Causative
  inheritance:
  - name: Autosomal dominant
  notes: >-
    ATP11A partial deletion causes AUNA2 through loss of phosphatidylserine
    flippase activity and progressive auditory nerve dysfunction.
  evidence:
  - reference: PMID:36300302
    reference_title: A mutation in ATP11A causes autosomal-dominant auditory neuropathy type 2.
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "By whole-genome sequencing, we now detected a 5500 bp deletion in ATP11A on chromosome 13q34 segregating with the phenotype in this family."
    explanation: Supports ATP11A as a causative autosomal dominant auditory neuropathy gene.
- name: OTOF
  gene_term:
    preferred_term: OTOF
    term:
      id: hgnc:8515
      label: OTOF
  association: Causative
  inheritance:
  - name: Autosomal recessive
  notes: >-
    OTOF is a major infant-onset ANSD gene, with biallelic variants causing
    presynaptic otoferlin-related synaptopathy.
  evidence:
  - reference: PMID:38456936
    reference_title: Clinical and genetic architecture of a large cohort with auditory neuropathy.
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Most of the OTOF gene (96.6%, 28/29) could only be identified in the infant group, while the AIFM1 gene could only be identified in the non-infant group"
    explanation: Large cohort evidence supports OTOF as the major infant-onset AN gene.
- name: AIFM1
  gene_term:
    preferred_term: AIFM1
    term:
      id: hgnc:8768
      label: AIFM1
  association: Causative
  inheritance:
  - name: X-linked
  notes: >-
    AIFM1 variants contribute especially to later-onset auditory neuropathy and
    can act through mitochondrial neuronal injury.
  evidence:
  - reference: PMID:38456936
    reference_title: Clinical and genetic architecture of a large cohort with auditory neuropathy.
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "In conclusion, genes distribution of AN, with the most common genes being OTOF and AIFM1, is totally different from other sensorineural hearing loss."
    explanation: Large cohort evidence identifies AIFM1 as one of the two most common AN genes.
  - reference: PMID:37365177
    reference_title: Impaired AIF-CHCHD4 interaction and mitochondrial calcium overload contribute to auditory neuropathy spectrum disorder in patient-iPSC-derived neurons with AIFM1 variant.
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: "This study demonstrates that the AIFM1 variant is one of the molecular bases of ANSD."
    explanation: Patient-derived iPSC neuronal evidence supports AIFM1 as a molecular basis of ANSD.
- name: OPA1
  gene_term:
