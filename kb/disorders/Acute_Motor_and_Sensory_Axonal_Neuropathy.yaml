- name: Complement-Dependent Axonal Degeneration
  description: >-
    Complement-fixing antiganglioside antibodies are a mechanistically plausible
    effector of axonal injury. Mouse AMAN models show that blocking early
    classical complement activation reduces complement deposition, immune-cell
    recruitment, and axonal injury; this is mechanistic model evidence rather
    than AMSAN-specific human proof.
  biological_processes:
