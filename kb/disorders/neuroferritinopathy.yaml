    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: >-
      Patients may present with tremor, cerebellar signs, parkinsonism, psychiatric problems, abnormal involuntary movements (dystonia, chorea), pyramidal syndrome, pseudo-bulbar symptoms, and cognitive deficit.
    explanation: >-
      The background summary in this disease-focused paper directly lists
      parkinsonism among the recognized manifestations.
