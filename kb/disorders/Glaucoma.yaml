disease_term:
  preferred_term: glaucoma
  term:
    id: MONDO:0005041
    label: glaucoma
has_subtypes:
- name: Primary Open-Angle Glaucoma
  description: Most common form, gradual onset with open drainage angle.
- name: Angle-Closure Glaucoma
  description: Blocked drainage angle, can be acute or chronic.
- name: Normal-Tension Glaucoma
  description: Optic nerve damage despite normal IOP.
- name: Secondary Glaucoma
  description: Due to other conditions (trauma, steroids, uveitis).
pathophysiology:
- name: Elevated Intraocular Pressure
  description: >
    Impaired aqueous humor drainage through trabecular meshwork
    leads to increased IOP in most cases. Elevated pressure damages
    retinal ganglion cells and optic nerve.
  locations:
  - preferred_term: Anterior Chamber of Eye
    term:
      id: UBERON:0001766
      label: anterior chamber of eyeball
  biological_processes:
  - preferred_term: Fluid Homeostasis
    term:
      id: GO:0050891
      label: multicellular organismal-level water homeostasis
  evidence:
  - reference: PMID:26497784
    reference_title: "Retinal ganglion cell apoptotic pathway in glaucoma: Initiating and downstream mechanisms."
    supports: SUPPORT
    snippet: "Elevated intraocular pressure and aging, the main risk factors for glaucoma,
      accelerate RGC apoptosis."
    explanation: Identifies elevated IOP as a main risk factor that accelerates
      retinal ganglion cell apoptosis in glaucoma.
- name: Retinal Ganglion Cell Death
  description: >
    Progressive apoptosis of retinal ganglion cells leads to
    irreversible vision loss. Mechanical stress, ischemia, and
    excitotoxicity contribute to cell death.
  locations:
  - preferred_term: Retina
    term:
      id: UBERON:0000966
      label: retina
  cell_types:
  - preferred_term: Retinal Ganglion Cell
    term:
      id: CL:0000740
      label: retinal ganglion cell
  biological_processes:
  - preferred_term: Apoptosis
    term:
      id: GO:0006915
      label: apoptotic process
  evidence:
  - reference: PMID:26497784
    reference_title: "Retinal ganglion cell apoptotic pathway in glaucoma: Initiating and downstream mechanisms."
    supports: SUPPORT
    snippet: "Apoptosis of retinal ganglion cells (RGCs) in glaucoma causes progressive
      visual field loss, making it the primary cause of irreversible blindness worldwide."
    explanation: Establishes that RGC apoptosis is the direct cause of visual
      field loss in glaucoma, confirming the central role of programmed cell
      death in disease pathogenesis.
  - reference: PMID:26302410
    reference_title: "Defects in autophagy caused by glaucoma-associated mutations in optineurin."
    supports: SUPPORT
    snippet: "A glaucoma-associated mutant of optineurin, E50K, impairs autophagy
      as well as vesicle trafficking, leading to death of retinal cells by apoptosis."
    explanation: Links OPTN mutations to RGC apoptosis through impaired
      autophagy, providing a molecular mechanism for how genetic variants cause
      retinal ganglion cell death.
  - reference: PMID:37542647
    reference_title: "Anti-inflammatory Effects of Siponimod in a Mouse Model of Excitotoxicity-Induced Retinal Injury."
    supports: PARTIAL
    snippet: "Glaucoma is a leading cause of permanent blindness worldwide and is
      characterized by neurodegeneration linked to progressive retinal ganglion cell
      (RGC) death, axonal damage, and neuroinflammation."
    explanation: Confirms that RGC death is a hallmark of glaucoma
      neurodegeneration and highlights the role of neuroinflammation in the
      degenerative process.
- name: Optic Nerve Degeneration
  description: >
    Loss of ganglion cell axons causes characteristic optic disc
    cupping. Progressive nerve fiber layer loss detectable before
    symptomatic visual field loss.
  locations:
  - preferred_term: Optic Nerve
    term:
      id: UBERON:0000941
      label: cranial nerve II
  - preferred_term: Optic Disc
    term:
      id: UBERON:0001783
      label: optic disc
- name: Trabecular Meshwork Dysfunction
  description: >
    Age-related changes, oxidative stress, and altered extracellular
    matrix reduce outflow facility. Increased resistance to aqueous
    outflow.
  locations:
  - preferred_term: Trabecular Meshwork
    term:
      id: UBERON:0005969
      label: eye trabecular meshwork
  cell_types:
  - preferred_term: Trabecular Meshwork Cell
    term:
      id: CL:0002367
      label: trabecular meshwork cell
  evidence:
  - reference: PMID:10617907
    reference_title: "The myocilin (MYOC) gene expression in the human trabecular meshwork."
    supports: PARTIAL
    snippet: "Myocilin gene is expressed clearly in the trabecular meshwork cells
      of both glaucomatous and nonglaucomatous eyes."
    explanation: Confirms MYOC expression in trabecular meshwork cells, but
      expression alone only indirectly supports dysfunction.
  - reference: PMID:37217093
    reference_title: "Myocilin misfolding and glaucoma: A 20-year update."
    supports: SUPPORT
    snippet: "The prevailing pathogenic mechanism involves a gain of toxic function
      whereby mutant myocilin aggregates intracellularly instead of being secreted,
      which causes cell stress and an early timeline for TM cell death, elevated intraocular
      pressure, and subsequent glaucoma-associated retinal degeneration."
    explanation: Describes how mutant myocilin causes trabecular meshwork cell
      death through intracellular aggregation, directly linking MYOC mutations
      to trabecular dysfunction and elevated IOP.
