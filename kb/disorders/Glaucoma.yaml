biochemical:
- name: Intraocular Pressure
  presence: Elevated
  context: "Greater than 21 mmHg in most cases"
genetic:
- name: MYOC
  association: Causative
  notes: Primary open-angle glaucoma
  evidence:
  - reference: PMID:37217093
    reference_title: "Myocilin misfolding and glaucoma: A 20-year update."
    supports: SUPPORT
    snippet: "Mutations in the gene MYOC account for approximately 5% of cases of
      primary open angle glaucoma (POAG)."
    explanation: Establishes MYOC as a causative gene for POAG, accounting for a
      significant proportion of cases.
  - reference: PMID:37217093
    reference_title: "Myocilin misfolding and glaucoma: A 20-year update."
    supports: SUPPORT
    snippet: "While myocilin is expressed in numerous tissues, mutant myocilin is
      only associated with disease in the anterior segment of the eye, in the trabecular
      meshwork."
    explanation: Demonstrates tissue-specific pathogenicity of MYOC mutations in
      the trabecular meshwork of the eye.
- name: OPTN
  association: Risk Factor
  notes: Normal-tension glaucoma
  evidence:
  - reference: PMID:26302410
    reference_title: "Defects in autophagy caused by glaucoma-associated mutations in optineurin."
    supports: SUPPORT
    snippet: "Certain mutations in optineurin (gene OPTN) are associated with primary
      open angle glaucoma."
    explanation: Confirms OPTN mutations as a genetic risk factor for primary
      open angle glaucoma.
  - reference: PMID:26302410
    reference_title: "Defects in autophagy caused by glaucoma-associated mutations in optineurin."
    supports: SUPPORT
    snippet: "Thus, an optimum level of optineurin-mediated autophagy is crucial for
      survival of retinal cells, and impaired autophagy is likely to contribute to
      glaucoma pathogenesis."
    explanation: Explains how OPTN variants contribute to glaucoma through
      dysregulated autophagy in retinal cells.
- name: WDR36
