    snippet: "We conclude that the biallelic BLOC1S1 variants characterized here primarily result in a neurological disorder with prominent leukodystrophy, similar to the recently reported condition caused by variants in the BORCS8 subunit of BORC."
    explanation: This conclusion directly frames the disorder as a leukodystrophy and links it mechanistically to other BORC-related white matter diseases.
