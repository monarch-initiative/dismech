    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Brain MR images show variable hypomyelination with or without superimposed
      sequela of deep cerebral white matter dysmyelination or demyelination,
      corpus callosum abnormalities (hypoplasia, hypogenesis/dysgenesis, or
      agenesis), and brain volume loss.
    explanation: >-
      The figure legend summarizes the MRI pattern that supports diagnostic
      recognition of the disorder.
