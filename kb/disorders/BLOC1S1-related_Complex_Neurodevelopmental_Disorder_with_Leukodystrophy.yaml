diagnosis:
- name: Brain MRI pattern recognition
  description: >-
    Brain MRI should assess for hypomyelinating leukodystrophy with possible
    superimposed deep white matter dysmyelination or demyelination, corpus
    callosum abnormalities, and brain volume loss.
  diagnosis_term:
    preferred_term: MRI of the brain
    term:
