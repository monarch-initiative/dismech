genetic:
- name: BLOC1S1
  association: Causal biallelic variant
  gene_term:
    preferred_term: BLOC1S1
    term:
      id: hgnc:4200
      label: BLOC1S1
  notes: >-
    Reported pathogenic alleles include compound heterozygous missense variants,
    homozygous missense variants, a splice-altering frameshift predicted to
    undergo nonsense-mediated decay, and a multi-exon deletion. Current evidence
    supports loss of function with BORC-predominant endolysosomal consequences.
  evidence:
  - reference: PMID:40791729
    reference_title: "BLOC1S1 variants cause lysosomal and autophagic defects resulting in a hypomyelinating leukodystrophy with epileptic encephalopathy."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "These findings provide genetic, clinical, and functional evidence that loss-of-function (LoF) of BLOC1S1 leads to more pronounced deficits in BORC than BLOC-1 function."
    explanation: This provides the strongest current evidence linking BLOC1S1 loss of function to the disease.
  - reference: PMID:36070637
    reference_title: "Generation of human induced pluripotential stem cells from individuals with complex heterozygous, isogenic corrected, and homozygous Bloc1s1 mutations."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "The Vanderver laboratory identified additional individuals with leukodystrophy that harbored either complex heterozygous (Bloc1s1 c.206A > C and c.359G > A), or homozygous (Bloc1s1 c.185 T > C) point mutations."
    explanation: This independently supports recurrent biallelic BLOC1S1 variation in individuals with leukodystrophy.
  variants:
  - name: Biallelic BLOC1S1 missense variants
    description: >-
      Reported alleles include compound heterozygous missense variants and
      multiple homozygous missense variants.
    gene:
      preferred_term: BLOC1S1
      term:
        id: hgnc:4200
        label: BLOC1S1
    type: missense
    clinical_significance: PATHOGENIC
    functional_effects:
    - function: loss_of_function
      description: >-
        Missense variants show reduced expression, impaired BORC/BLOC-1
        assembly, or impaired rescue of lysosome transport and autophagy.
    evidence:
    - reference: url:https://www.medrxiv.org/content/10.1101/2025.07.17.25331211v1.full
      reference_title: BLOC1S1 variants cause lysosomal and autophagic defects resulting in a hypomyelinating leukodystrophy with epileptic encephalopathy.
      supports: SUPPORT
      evidence_source: HUMAN_CLINICAL
      snippet: >-
        FI:1 was found to have compound heterozygous variants, including
