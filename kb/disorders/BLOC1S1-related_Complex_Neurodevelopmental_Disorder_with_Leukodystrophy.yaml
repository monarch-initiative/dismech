name: BLOC1S1-related Complex Neurodevelopmental Disorder with Leukodystrophy
creation_date: "2026-04-16T00:00:00Z"
category: Mendelian
description: >-
  BLOC1S1-related complex neurodevelopmental disorder with leukodystrophy is a
  rare autosomal recessive white matter and neurodevelopmental disorder caused
  by biallelic BLOC1S1 variants. BLOC1S1 encodes a subunit shared by the BLOC-1
  and BORC complexes, and current evidence supports a BORC-predominant
  endolysosomal trafficking defect with impaired lysosomal transport and
  autophagy. Affected individuals present with early psychomotor delay,
  hypotonia, progressive spasticity, epileptic encephalopathy, optic atrophy,
  and hypomyelinating leuko-axonopathy, with milder hypopigmentation or ocular
  albinism in a subset.
notes: >-
  MONDO NTR anchor: monarch-initiative/mondo#10118. As of 2026-04-16, the exact
  requested MONDO term was not returned by local OLS search, so this entry is
  provisionally anchored to the broader parent term MONDO:0100038 (complex
  neurodevelopmental disorder). The 2026 BLOC1S1 cohort paper further frames the
  condition as a BORCopathy with prominent leukodystrophy.
disease_term:
  preferred_term: BLOC1S1-related complex neurodevelopmental disorder with leukodystrophy
  term:
