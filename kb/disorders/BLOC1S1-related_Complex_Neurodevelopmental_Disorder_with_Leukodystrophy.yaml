  results: Biallelic pathogenic or likely pathogenic BLOC1S1 variants support diagnosis.
  evidence:
  - reference: url:https://www.medrxiv.org/content/10.1101/2025.07.17.25331211v1.full
    reference_title: BLOC1S1 variants cause lysosomal and autophagic defects resulting in a hypomyelinating leukodystrophy with epileptic encephalopathy.
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Variants in <em>BLOC1S1</em> (NM_001487.4), located on chromosome 12q13.2,
