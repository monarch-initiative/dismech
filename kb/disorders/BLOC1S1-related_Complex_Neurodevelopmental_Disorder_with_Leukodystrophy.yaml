  - reference: PMID:40791729
    reference_title: "BLOC1S1 variants cause lysosomal and autophagic defects resulting in a hypomyelinating leukodystrophy with epileptic encephalopathy."
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: "Rescue experiments reveal that most BLOC1S1 variants exhibit reduced expression, decreased assembly with other BORC/BLOC-1 subunits, and/or impaired restoration of lysosome transport and autophagy in BLOC1S1-KO cells."
    explanation: Variant-rescue experiments link the patient alleles to defective complex assembly and failed restoration of lysosome transport and autophagy.
