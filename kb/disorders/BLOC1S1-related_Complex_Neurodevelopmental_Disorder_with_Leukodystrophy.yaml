    homozygous BLOC1S1 variants, consistent with autosomal recessive
    inheritance.
  inheritance_term:
    preferred_term: Autosomal recessive inheritance
    term:
      id: HP:0000007
      label: Autosomal recessive inheritance
  evidence:
  - reference: PMID:36070637
    reference_title: "Generation of human induced pluripotential stem cells from individuals with complex heterozygous, isogenic corrected, and homozygous Bloc1s1 mutations."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "The Vanderver laboratory identified additional individuals with leukodystrophy that harbored either complex heterozygous (Bloc1s1 c.206A > C and c.359G > A), or homozygous (Bloc1s1 c.185 T > C) point mutations."
    explanation: Compound heterozygous and homozygous affected individuals support autosomal recessive inheritance.
pathophysiology:
- name: BLOC1S1 loss of function in the shared BLOC-1/BORC module
  description: >-
    BLOC1S1 encodes a shared subunit of the BLOC-1 and BORC complexes.
    Disease-causing variants impair this shared module, with current evidence
    indicating a BORC-predominant neurologic disorder rather than the full
    canonical BLOC-1/Hermansky-Pudlak syndrome phenotype. Mild pigmentary
    findings can occur, but bleeding diathesis, pulmonary fibrosis,
    granulomatous colitis, and immunodeficiency should not be generalized to
    BLOC1S1-related disease from other BLOC-1 subunit disorders.
  genes:
  - preferred_term: BLOC1S1
    term:
      id: hgnc:4200
      label: BLOC1S1
  biological_processes:
  - preferred_term: lysosomal transport
    term:
      id: GO:0007041
      label: lysosomal transport
  - preferred_term: lysosome organization
    term:
      id: GO:0007040
      label: lysosome organization
  evidence:
  - reference: PMID:40791729
    reference_title: "BLOC1S1 variants cause lysosomal and autophagic defects resulting in a hypomyelinating leukodystrophy with epileptic encephalopathy."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "BLOC1S1 encodes a subunit shared by the BLOC-1 and BORC hetero-octameric complexes that regulate various endolysosomal processes."
    explanation: This establishes BLOC1S1 as a shared BLOC-1/BORC component and anchors the disease to endolysosomal biology.
  - reference: PMID:40791729
    reference_title: "BLOC1S1 variants cause lysosomal and autophagic defects resulting in a hypomyelinating leukodystrophy with epileptic encephalopathy."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "These findings provide genetic, clinical, and functional evidence that loss-of-function (LoF) of BLOC1S1 leads to more pronounced deficits in BORC than BLOC-1 function."
    explanation: This directly supports loss of function as the pathogenic mechanism and indicates BORC-predominant dysfunction.
  - reference: url:https://www.medrxiv.org/content/10.1101/2025.07.17.25331211v1.full
    reference_title: BLOC1S1 variants cause lysosomal and autophagic defects resulting in a hypomyelinating leukodystrophy with epileptic encephalopathy.
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      These findings suggest that disease phenotypes segregate distinctly with
      the affected complex, with LoF variants in BLOC-1-specific subunits
      resulting in HPS while LoF variants in BORC specific-subunits result in
      primary neurological disorders.
    explanation: >-
      The full text distinguishes BLOC-1-specific HPS biology from
      BORC-specific neurologic disease biology.
  - reference: url:https://www.medrxiv.org/content/10.1101/2025.07.17.25331211v1.full
    reference_title: BLOC1S1 variants cause lysosomal and autophagic defects resulting in a hypomyelinating leukodystrophy with epileptic encephalopathy.
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Otherwise, there were no findings characteristic of HPS such as bleeding
      diathesis, pulmonary fibrosis, granulomatous colitis, or immunodeficiency
      (Table S2).
    explanation: >-
      This constrains the BLOC-1/HPS overlap and prevents overgeneralizing
      non-neurologic HPS manifestations to BLOC1S1-related BORCopathy.
  downstream:
  - target: Impaired lysosome transport and autophagy
    description: BORC/BLOC-1 dysfunction disrupts endolysosomal trafficking and degradative homeostasis.
    evidence:
    - reference: PMID:40791729
      reference_title: "BLOC1S1 variants cause lysosomal and autophagic defects resulting in a hypomyelinating leukodystrophy with epileptic encephalopathy."
      supports: SUPPORT
      evidence_source: IN_VITRO
      snippet: "Functional analyses show that BLOC1S1 knockout (KO) impairs the anterograde transport of lysosomes and autophagy in both non-neuronal cells and iPSC-derived neurons."
      explanation: This directly supports impaired lysosomal transport and autophagy as downstream consequences of BLOC1S1 deficiency.
  - target: Pigmentation organelle dysfunction
    description: Shared BLOC-1 biology also perturbs lysosome-related organelles in pigment cells.
    evidence:
    - reference: PMID:40791729
      reference_title: "BLOC1S1 variants cause lysosomal and autophagic defects resulting in a hypomyelinating leukodystrophy with epileptic encephalopathy."
      supports: SUPPORT
      evidence_source: IN_VITRO
      snippet: "Additionally, we show that KO of BLOC1S1 reduces pigmentation in a melanocytic cell line, and that five of the BLOC1S1 variants partially or fully restore pigmentation."
      explanation: The melanocyte rescue experiments directly support pigmentation organelle dysfunction downstream of BLOC1S1 loss.
- name: Impaired lysosome transport and autophagy
  description: >-
    Functional studies in BLOC1S1-knockout cells and patient-derived neuronal
    models show defective lysosome positioning, impaired lysosomal transport,
    and abnormal autophagy, consistent with an endolysosomal trafficking
    disorder in neural cells.
