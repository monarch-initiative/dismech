    explanation: This directly supports molecular testing for biallelic BLOC1S1 variants.
- name: EEG and epilepsy characterization
  description: >-
    EEG is appropriate when seizures, developmental epileptic encephalopathy, or
    refractory epilepsy are present, to classify seizure burden and guide
    antiseizure management.
