    preferred_term: electroencephalography
    term:
      id: MAXO:0000932
      label: electroencephalography
  evidence:
  - reference: PMID:40791729
    reference_title: "BLOC1S1 variants cause lysosomal and autophagic defects resulting in a hypomyelinating leukodystrophy with epileptic encephalopathy."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Here, we report the identification of seven distinct variants in BLOC1S1 in eleven individuals from seven independent families presenting with early psychomotor delay, hypotonia, spasticity, epileptic encephalopathy, optic atrophy, and leuko-axonopathy with hypomyelination."
    explanation: >-
      The cohort establishes epileptic encephalopathy as a core feature,
      supporting EEG-based clinical characterization.
