      supports: PARTIAL
      evidence_source: HUMAN_CLINICAL
      snippet: "Here, we report the identification of seven distinct variants in BLOC1S1 in eleven individuals from seven independent families presenting with early psychomotor delay, hypotonia, spasticity, epileptic encephalopathy, optic atrophy, and leuko-axonopathy with hypomyelination."
      explanation: The cohort establishes hypomyelinating leuko-axonopathy as a key disease outcome, partially supporting it as a downstream consequence of the trafficking defect demonstrated in cellular models.
  - target: Epileptic encephalopathy
    description: Neuronal trafficking and autophagy defects likely contribute to severe epilepsy and encephalopathy.
    evidence:
