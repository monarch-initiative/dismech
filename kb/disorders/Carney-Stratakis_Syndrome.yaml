      label: SDHB
  - preferred_term: SDHC
    term:
      id: hgnc:10682
      label: SDHC
  - preferred_term: SDHD
    term:
      id: hgnc:10683
      label: SDHD
  biological_processes:
  - preferred_term: mitochondrial electron transport, succinate to ubiquinone
    modifier: DECREASED
    term:
