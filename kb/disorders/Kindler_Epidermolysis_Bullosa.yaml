    explanation: GeneReviews lists urethral stenosis as a mucosal manifestation.
- category: Head and Neck
  name: Periodontal Disease
  description: >
    Periodontal disease including periodontitis and gingivitis is a common and
    significant complication of Kindler syndrome. Hemorrhagic mucositis of the oral
    cavity, premature loss of teeth, and labial leukokeratosis are also observed.
  frequency: VERY_FREQUENT
  phenotype_term:
    preferred_term: periodontitis
    term:
      id: HP:0000704
      label: Periodontitis
  evidence:
  - reference: PMID:26937547
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Mucosal manifestations are also common and include hemorrhagic
      mucositis and gingivitis, periodontal disease, premature loss of teeth"
    explanation: GeneReviews confirms periodontal disease as a common mucosal
      manifestation.
  - reference: PMID:26937547
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Severe long-term complications of KS include periodontitis, mucosal
      strictures, and aggressive squamous cell carcinomas"
    explanation: Confirms periodontitis as a severe long-term complication.
- category: Neoplasm
  name: Squamous Cell Carcinoma Risk
  description: >
    Patients with Kindler syndrome have a markedly elevated risk of developing
    aggressive squamous cell carcinomas. In a retrospective study of 91 adult KS
    patients, SCC developed in 13 (14.3%), with cumulative risk reaching 66.7% in
    patients over 60 years of age. SCCs in KS are highly aggressive, with 53.8%
    developing metastatic disease and 38.5% of SCC-bearing patients dying from the
    tumor. Tumors concentrate in the hands and around the oral cavity, areas of
    chronic inflammation. Screening should begin in adolescence and continue
    annually.
  frequency: OCCASIONAL
  phenotype_term:
    preferred_term: squamous cell carcinoma
    term:
      id: HP:0002860
      label: Squamous cell carcinoma
  evidence:
  - reference: PMID:21936020
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "propensity to skin cancer"
    explanation: Confirms increased skin cancer risk in Kindler syndrome.
  - reference: PMID:26937547
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Severe long-term complications of KS include periodontitis, mucosal
      strictures, and aggressive squamous cell carcinomas"
    explanation: GeneReviews identifies aggressive SCCs as a severe long-term
      complication.
  - reference: PMID:31340837
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "SCC developed in 13 of the 91 patients"
    explanation: Largest systematic study of SCC in KS quantifies the frequency
      at 14.3% of adult patients in this cohort.
  - reference: PMID:31340837
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "the cumulative risk of SCC increased to 66.7% in patients over
      60 years of age"
    explanation: Demonstrates that cumulative SCC risk increases dramatically
      with age, reaching two-thirds by age 60.
  - reference: PMID:31340837
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "53.8% of the patients bearing SCCs develop metastatic disease"
    explanation: Confirms the highly aggressive nature of SCCs in KS with
      majority developing metastases.
treatments:
- name: Wound Care and Skin Protection
  description: >
    Standard blister care with use of moisturizers and protection from mechanical
    trauma. Multidisciplinary management by a team experienced in skin fragility
    disorders is recommended.
  treatment_term:
    preferred_term: supportive care
    term:
      id: MAXO:0000950
      label: supportive care
  evidence:
  - reference: PMID:26937547
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Skin care includes standard blister care, use of moisturizers, and
      protection from trauma and the sun"
    explanation: GeneReviews describes wound care and skin protection as key
      management strategies.
- name: Photoprotection
  description: >
    Sun avoidance and sunscreen use to reduce photosensitivity-related skin damage.
    Sun exposure is listed as an agent to avoid.
  treatment_term:
    preferred_term: supportive care
    term:
      id: MAXO:0000950
      label: supportive care
  evidence:
  - reference: PMID:26937547
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Agents/circumstances to avoid: Sun exposure"
    explanation: GeneReviews explicitly recommends avoiding sun exposure.
- name: Gastrointestinal Management
  description: >
    Management of gastrointestinal complications including colitis and esophageal
    strictures. Gastroenterology input is part of the multidisciplinary team.
  treatment_term:
    preferred_term: supportive care
    term:
      id: MAXO:0000950
      label: supportive care
  evidence:
  - reference: PMID:26937547
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "management of gastrointestinal and urethral complications"
    explanation: GeneReviews includes GI management as part of treatment.
- name: Dental Care
  description: >
    Regular dental care to ensure optimal oral hygiene and reduce periodontal
    disease. Screening for oral ulcerations, gingivitis, and periodontitis starting
    in adolescence with regular dental checkups.
  treatment_term:
    preferred_term: supportive care
    term:
      id: MAXO:0000950
      label: supportive care
  evidence:
  - reference: PMID:26937547
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "regular dental care to ensure optimal oral hygiene to reduce
      periodontal disease"
    explanation: GeneReviews recommends regular dental care for periodontal disease
      prevention.
- name: Squamous Cell Carcinoma Surveillance
  description: >
    Screening for premalignant keratoses and early squamous cell carcinomas starting
    in adolescence and repeated annually.
  treatment_term:
    preferred_term: cancer screening
    term:
      id: MAXO:0000126
      label: cancer screening
  evidence:
  - reference: PMID:26937547
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Screening for premalignant keratoses and early squamous cell
      carcinomas starting in adolescence and repeated annually"
    explanation: GeneReviews recommends annual SCC screening starting in
      adolescence.
- name: Genetic Counseling
  description: >
    Kindler syndrome is inherited in an autosomal recessive manner. Carrier testing
    for at-risk relatives, prenatal testing, and preimplantation genetic testing are
    possible once FERMT1 pathogenic variants have been identified.
  treatment_term:
    preferred_term: genetic counseling
    term:
      id: MAXO:0000079
      label: genetic counseling
  evidence:
  - reference: PMID:26937547
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "KS is inherited in an autosomal recessive manner. If both parents are
      known to be heterozygous for an FERMT1 pathogenic variant, each sib of an
      affected individual has at conception a 25% chance of being affected"
    explanation: GeneReviews confirms autosomal recessive inheritance and
      recommends genetic counseling.
genetic:
- name: FERMT1
  association: Causative
  inheritance:
  - name: Autosomal recessive
  notes: >
    FERMT1 (also known as KIND1) encodes kindlin-1 (fermitin family homolog-1),
    a focal adhesion protein that activates integrins. Located on chromosome
    20p12.3. Mutations include gross genomic deletions, splice site, nonsense,
    frameshift, and missense mutations. Missense and in-frame deletion mutations
    are associated with milder phenotypes and later onset of complications.
  evidence:
  - reference: PMID:26937547
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "The diagnosis of KS is established in a proband with suggestive
      clinical findings and biallelic pathogenic variants in FERMT1 identified by
      molecular genetic testing"
    explanation: GeneReviews confirms biallelic FERMT1 variants as the molecular
      basis of Kindler syndrome.
  - reference: PMID:21936020
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Although most mutations are predicted to lead to premature termination
      of translation, and to loss of kindlin-1 function, significant clinical
      variability is observed among patients"
    explanation: Confirms that most FERMT1 mutations are loss-of-function with
      variable clinical expression.
  - reference: PMID:19762710
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "It results from loss-of-function mutations in the FERMT1 gene
      encoding the focal adhesion protein, fermitin family homolog-1"
    explanation: Confirms FERMT1 loss-of-function mutations cause Kindler syndrome.
