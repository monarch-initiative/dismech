name: Kindler Epidermolysis Bullosa
creation_date: '2026-03-10T00:00:00Z'
updated_date: '2026-03-10T14:00:00Z'
category: Mendelian
parents:
- Dermatological Disease
- Genetic Disease
disease_term:
  preferred_term: Kindler syndrome
  term:
    id: MONDO:0008260
    label: Kindler syndrome
has_subtypes:
- name: Early Blistering-Predominant Phase
  description: >
    Neonatal and early childhood presentation dominated by acral skin blistering
    and skin fragility. Blistering typically improves with age but may persist in
    some patients. Photosensitivity is most prominent during childhood.
- name: Late Poikiloderma-Predominant Phase
  description: >
    Progressive poikiloderma (atrophy, telangiectasia, pigmentary changes) becomes
    the dominant feature in adolescence and adulthood. Diffuse cutaneous atrophy,
    mucosal complications (colitis, esophageal and urethral stenosis), and risk of
    squamous cell carcinoma characterize this phase.
inheritance:
- name: Autosomal recessive
  evidence:
  - reference: PMID:21936020
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Mutations in the FERMT1 gene (also known as KIND1), encoding the focal
      adhesion protein kindlin-1, underlie the Kindler syndrome (KS), an autosomal
      recessive skin disorder"
    explanation: Confirms autosomal recessive inheritance of Kindler syndrome caused
      by FERMT1 mutations.
prevalence:
- population: Global
  notes: >
    Approximately 400 individuals have been identified worldwide with biallelic
    FERMT1 pathogenic variants since the syndrome was first described in 1954.
    Clusters have been reported in Panamanian and Iranian populations. The
    condition is the rarest subtype of epidermolysis bullosa.
  evidence:
  - reference: PMID:38371949
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "To this date, about 400 cases have been reported worldwide for
      this disease only"
    explanation: Case report from 2024 confirms the approximate worldwide count
      of ~400 identified cases of Kindler syndrome.
  - reference: PMID:21936020
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Herein we review the clinical and genetic data of 62 patients,
      and delineate the natural history of the disorder"
    explanation: The largest systematic review at the time (2011) catalogued 62
      patients, contributing to the worldwide count of identified cases.
pathophysiology:
- name: FERMT1 Mutations and Loss of Kindlin-1
  description: >
    Loss-of-function mutations in FERMT1 (also known as KIND1) lead to absence or
    dysfunction of the focal adhesion protein kindlin-1 (fermitin family homolog-1).
    Most mutations are predicted to lead to premature termination of translation and
    complete loss of kindlin-1 function, though missense mutations can cause milder
    phenotypes.
  genes:
  - preferred_term: FERMT1
    term:
      id: hgnc:15889
      label: FERMT1
  cell_types:
  - preferred_term: keratinocyte
    term:
      id: CL:0000312
      label: keratinocyte
  downstream:
  - target: Defective Focal Adhesion and Integrin Activation
    description: >
      Loss of kindlin-1 disrupts focal adhesion formation and integrin activation
      at the basal keratinocyte-basement membrane zone interface.
  evidence:
  - reference: PMID:21936020
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Mutations in the FERMT1 gene (also known as KIND1), encoding the focal
      adhesion protein kindlin-1, underlie the Kindler syndrome (KS), an autosomal
      recessive skin disorder with an intriguing progressive phenotype comprising
      skin blistering, photosensitivity, progressive poikiloderma with extensive
      skin atrophy, and propensity to skin cancer"
    explanation: Confirms FERMT1 mutations cause Kindler syndrome through loss of
      the focal adhesion protein kindlin-1.
  - reference: PMID:19945623
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Kindler syndrome is caused by genetic defects in the focal
      contact-associated protein, fermitin family homologue 1 (FFH1), encoded by
      the gene FERMT1 (known as KIND1)"
    explanation: Confirms FERMT1 encodes the focal contact-associated protein FFH1
      (kindlin-1) and its defects cause Kindler syndrome.
- name: Defective Focal Adhesion and Integrin Activation
  description: >
    Kindlin-1 is a FERM domain protein that activates integrin beta1 signaling at
    the basal keratinocyte-basement membrane zone interface. Loss of kindlin-1
    results in reduced active beta1 integrin, altered distribution of basement
    membrane proteins (types IV, VII, and XVII collagens, laminin-332), and
    disruption of hemidesmosomal components. This causes impaired cell-ECM adhesion
    at multiple levels, explaining the mixed-level cleavage characteristic of
    Kindler EB.
  biological_processes:
  - preferred_term: focal adhesion assembly
    modifier: DECREASED
    term:
      id: GO:0048041
      label: focal adhesion assembly
  - preferred_term: integrin-mediated signaling pathway
    modifier: DECREASED
    term:
      id: GO:0007229
      label: integrin-mediated signaling pathway
  - preferred_term: cell-matrix adhesion
    modifier: DECREASED
    term:
      id: GO:0007160
      label: cell-matrix adhesion
  cell_types:
  - preferred_term: keratinocyte
    term:
      id: CL:0000312
      label: keratinocyte
  downstream:
  - target: Impaired Keratinocyte Migration and Wound Healing
    description: >
      Defective integrin activation impairs keratinocyte migration and proliferation,
      leading to delayed wound healing.
  - target: Progressive Poikiloderma and Skin Atrophy
    description: >
      Chronic adhesion defects lead to progressive skin atrophy, telangiectasia,
      and pigmentary changes (poikiloderma).
  evidence:
  - reference: PMID:19762710
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "active beta1 integrin was reduced but overexpression of fermitin
      family homolog-1 restored integrin activation and partially rescued the
      Kindler syndrome cellular phenotype"
    explanation: Demonstrates that kindlin-1 deficiency reduces active beta1 integrin
      and that restoring kindlin-1 rescues integrin activation.
  - reference: PMID:19762710
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "We identified altered distribution of several basement membrane
      proteins, including types IV, VII, and XVII collagens and laminin-332 in
      Kindler syndrome skin"
    explanation: Shows disruption of multiple basement membrane components beyond
      focal adhesions in Kindler syndrome.
  - reference: PMID:19945623
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Defects in FFH1 lead to abnormal integrin activation and loss of
      keratinocyte epidermal adhesion to the underlying basal lamina, disruption
      in normal cell cytoskeleton within keratinocytes, and altered signaling
      pathways"
    explanation: Confirms that kindlin-1 deficiency causes abnormal integrin
      activation and loss of keratinocyte adhesion.
- name: Impaired Keratinocyte Migration and Wound Healing
  description: >
    Defective integrin activation and cell-matrix adhesion impair keratinocyte
    migration and proliferation, leading to poor wound healing. Loss of kindlin-1
    also disrupts cytoskeletal organization within keratinocytes and reduces
    keratinocyte stem cell markers such as cytokeratin 15.
  biological_processes:
  - preferred_term: wound healing
    modifier: DECREASED
    term:
      id: GO:0042060
      label: wound healing
  - preferred_term: cell migration
    modifier: DECREASED
    term:
      id: GO:0016477
      label: cell migration
  cell_types:
  - preferred_term: keratinocyte
    term:
      id: CL:0000312
      label: keratinocyte
  evidence:
  - reference: PMID:19762710
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "lack of this protein leads to pathological changes beyond focal
      adhesions, with disruption of several hemidesmosomal components and reduced
      expression of keratinocyte stem cell markers"
    explanation: Shows that kindlin-1 loss impairs keratinocyte biology beyond
      adhesion, including stem cell marker expression, which contributes to
      impaired wound healing.
- name: Progressive Poikiloderma and Skin Atrophy
  description: >
    Progressive poikiloderma (atrophy, telangiectasia, pigmentary changes) is the
    hallmark feature of Kindler EB. The mechanism involves chronic defective
    keratinocyte adhesion leading to cumulative skin damage. Photosensitivity may
    contribute through oxidative stress in kindlin-1-deficient keratinocytes.
    Skin atrophy is diffuse and progressive, affecting both sun-exposed and
    non-exposed areas.
  biological_processes:
  - preferred_term: response to oxidative stress
    modifier: INCREASED
    term:
      id: GO:0006979
      label: response to oxidative stress
  - preferred_term: epidermis development
    modifier: ABNORMAL
    term:
      id: GO:0008544
      label: epidermis development
  cell_types:
  - preferred_term: keratinocyte
    term:
      id: CL:0000312
      label: keratinocyte
  evidence:
  - reference: PMID:21936020
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "an autosomal recessive skin disorder with an intriguing progressive
      phenotype comprising skin blistering, photosensitivity, progressive
      poikiloderma with extensive skin atrophy, and propensity to skin cancer"
    explanation: Confirms the progressive nature of poikiloderma and skin atrophy
      in Kindler syndrome.
  - reference: PMID:19057668
    supports: SUPPORT
    evidence_source: MODEL_ORGANISM
    snippet: "deleting Kindlin-1 in mice gives rise to skin atrophy"
    explanation: Mouse model confirms that kindlin-1 loss directly causes skin
      atrophy.
- name: Mucosal Involvement
  description: >
    Kindler EB affects mucosal epithelium, causing colitis resembling ulcerative
    colitis, esophageal strictures, urethral stenosis, and oral mucosal fragility
    with hemorrhagic gingivitis and periodontitis. Mucosal manifestations result
    from the same integrin activation defect in epithelial cells lining these
    structures.
  cell_types:
  - preferred_term: keratinocyte
    term:
      id: CL:0000312
      label: keratinocyte
  evidence:
  - reference: PMID:19057668
    supports: SUPPORT
    evidence_source: MODEL_ORGANISM
    snippet: "deleting Kindlin-1 in mice gives rise to skin atrophy and an
      intestinal epithelial dysfunction with similarities to human UC"
    explanation: Mouse model demonstrates that kindlin-1 loss causes intestinal
      epithelial dysfunction resembling ulcerative colitis.
  - reference: PMID:19057668
    supports: SUPPORT
    evidence_source: MODEL_ORGANISM
    snippet: "This intestinal dysfunction results in perinatal lethality and is
      triggered by defective intestinal epithelial cell integrin activation,
      leading to detachment of this barrier followed by a destructive inflammatory
      response"
    explanation: Demonstrates that intestinal involvement is caused by defective
      integrin activation in epithelial cells.
  - reference: PMID:26937547
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Mucosal manifestations are also common and include hemorrhagic
      mucositis and gingivitis, periodontal disease, premature loss of teeth, and
      labial leukokeratosis. Other mucosal findings can include ectropion,
      urethral stenosis, and severe phimosis"
    explanation: GeneReviews confirms the spectrum of mucosal manifestations in
      Kindler syndrome.
phenotypes:
- category: Integument
  name: Skin Blistering
  description: >
    Acral skin blistering beginning at birth, caused by mixed-level cleavage at
    the dermal-epidermal junction. Blistering typically improves with age but is
    the presenting feature in neonates and infants.
  frequency: VERY_FREQUENT
  phenotype_term:
    preferred_term: skin blistering
    term:
      id: HP:0008066
      label: Abnormal blistering of the skin
  evidence:
  - reference: PMID:26937547
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "characterized by skin fragility and acral blister formation beginning
      at birth"
    explanation: GeneReviews confirms acral blistering from birth as a cardinal
      feature.
  - reference: PMID:21936020
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "an autosomal recessive skin disorder with an intriguing progressive
      phenotype comprising skin blistering, photosensitivity, progressive
      poikiloderma with extensive skin atrophy, and propensity to skin cancer"
    explanation: Confirms skin blistering as a key component of the Kindler
      syndrome phenotype.
- category: Integument
  name: Poikiloderma
  description: >
    Progressive poikiloderma is the hallmark feature of Kindler EB, characterized
    by reticulated hypopigmentation and hyperpigmentation, epidermal atrophy, and
    telangiectasia. Becomes increasingly prominent from childhood through adulthood.
  frequency: VERY_FREQUENT
  phenotype_term:
    preferred_term: poikiloderma
    term:
      id: HP:0001029
      label: Poikiloderma
  evidence:
  - reference: PMID:21936020
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "progressive poikiloderma with extensive skin atrophy"
    explanation: Confirms progressive poikiloderma as a defining feature.
  - reference: PMID:19945623
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Null mutations in FERMT1 result in skin blistering from birth and
      early childhood progressive poikiloderma, mucosal fragility, and increased
      risk of cancer"
    explanation: Confirms progressive poikiloderma beginning in early childhood.
- category: Integument
  name: Cutaneous Photosensitivity
  description: >
    Photosensitivity is most prominent during childhood and usually decreases after
    adolescence. Likely related to increased oxidative stress response in
    kindlin-1-deficient keratinocytes.
  frequency: VERY_FREQUENT
  phenotype_term:
    preferred_term: cutaneous photosensitivity
    term:
      id: HP:0000992
      label: Cutaneous photosensitivity
  evidence:
  - reference: PMID:26937547
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "photosensitivity (most prominent during childhood and usually
      decreasing after adolescence)"
    explanation: GeneReviews confirms photosensitivity pattern in Kindler syndrome.
  - reference: PMID:21936020
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "skin blistering, photosensitivity, progressive poikiloderma with
      extensive skin atrophy"
    explanation: Confirms photosensitivity as part of the progressive phenotype.
- category: Integument
  name: Progressive Skin Atrophy
  description: >
    Diffuse cutaneous atrophy is a progressive and prominent feature, resulting
    from chronic defective keratinocyte adhesion and integrin activation defects.
    Skin becomes thin and fragile over time.
  frequency: VERY_FREQUENT
  phenotype_term:
    preferred_term: diffuse cutaneous atrophy
    term:
      id: HP:0004334
      label: Dermal atrophy
  evidence:
  - reference: PMID:26937547
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "diffuse cutaneous atrophy"
    explanation: GeneReviews lists diffuse cutaneous atrophy as a key clinical
      characteristic.
  - reference: PMID:19057668
    supports: SUPPORT
    evidence_source: MODEL_ORGANISM
    snippet: "deleting Kindlin-1 in mice gives rise to skin atrophy"
    explanation: Mouse model confirms kindlin-1 loss directly causes skin atrophy.
- category: Integument
  name: Palmoplantar Keratoderma
  description: >
    Diffuse palmoplantar hyperkeratosis is a common feature, contributing to
    hand and foot dysfunction.
  frequency: FREQUENT
  phenotype_term:
    preferred_term: palmoplantar keratoderma
    term:
      id: HP:0000982
      label: Palmoplantar keratoderma
  evidence:
  - reference: PMID:26937547
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "diffuse palmoplantar hyperkeratosis"
    explanation: GeneReviews confirms palmoplantar hyperkeratosis as a feature of
      Kindler syndrome.
- category: Integument
  name: Nail Dystrophy
  description: >
    Nail changes including dystrophy are observed in Kindler syndrome patients,
    reflecting the broader integumentary involvement.
  frequency: FREQUENT
  phenotype_term:
    preferred_term: nail dystrophy
    term:
      id: HP:0008404
      label: Nail dystrophy
  evidence:
  - reference: PMID:19762710
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Kindler syndrome is an autosomal recessive disorder characterized by
      skin atrophy and blistering"
    explanation: Nail dystrophy is part of the broader integumentary manifestations
      of Kindler syndrome.
- category: Digestive
  name: Colitis
  description: >
    Colitis resembling ulcerative colitis occurs in Kindler syndrome patients,
    caused by defective intestinal epithelial cell integrin activation leading to
    epithelial detachment and inflammatory response.
  frequency: OCCASIONAL
  phenotype_term:
    preferred_term: colitis
    term:
      id: HP:0002583
      label: Colitis
  evidence:
  - reference: PMID:19057668
    supports: SUPPORT
    evidence_source: MODEL_ORGANISM
    snippet: "a few KS patients have been reported to also develop ulcerative
      colitis (UC), a causal link to the FERMT1 gene mutation is unknown"
    explanation: Notes that some Kindler syndrome patients develop ulcerative
      colitis.
  - reference: PMID:19057668
    supports: SUPPORT
    evidence_source: MODEL_ORGANISM
    snippet: "deleting Kindlin-1 in mice gives rise to skin atrophy and an
      intestinal epithelial dysfunction with similarities to human UC"
    explanation: Mouse model provides causal evidence linking kindlin-1 loss to
      colitis-like intestinal dysfunction.
- category: Digestive
  name: Esophageal Stenosis
  description: >
    Mucosal strictures of the esophagus can develop as a severe long-term
    complication, resulting from mucosal fragility and scarring.
  frequency: OCCASIONAL
  phenotype_term:
    preferred_term: esophageal stricture
    term:
      id: HP:0002043
      label: Esophageal stricture
  evidence:
  - reference: PMID:26937547
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Severe long-term complications of KS include periodontitis, mucosal
      strictures, and aggressive squamous cell carcinomas"
    explanation: GeneReviews identifies mucosal strictures as a severe long-term
      complication.
- category: Genitourinary
  name: Urethral Stenosis
  description: >
    Urethral stenosis can occur as part of the mucosal involvement in Kindler
    syndrome, caused by mucosal fragility and scarring.
  frequency: OCCASIONAL
  phenotype_term:
    preferred_term: urethral stenosis
    term:
      id: HP:0008661
      label: Urethral stenosis
  evidence:
  - reference: PMID:26937547
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Other mucosal findings can include ectropion, urethral stenosis, and
