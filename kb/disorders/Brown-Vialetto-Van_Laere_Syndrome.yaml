name: Brown-Vialetto-Van Laere Syndrome
creation_date: "2026-06-26T00:00:00Z"
category: Mendelian
description: >
  Brown-Vialetto-Van Laere (BVVL) syndrome is a rare, autosomal recessive
  motor, sensory, and cranial-nerve neuronopathy caused by deficiency of
  plasma-membrane riboflavin (vitamin B2) transporters — RFVT3 (encoded by
  SLC52A3, BVVL type 1, MONDO:0024537) and RFVT2 (encoded by SLC52A2, BVVL
  type 2, MONDO:0013867). Impaired cellular riboflavin uptake depletes the
  flavocofactors FAD and FMN, producing mitochondrial dysfunction (impaired
  flavoprotein-dependent electron transport and fatty-acid/amino-acid
  oxidation) and progressive degeneration of cranial-nerve motor nuclei
  (pontobulbar palsy), sensory neurons, and spinal motor neurons. The clinical
  hallmarks are progressive sensorineural deafness, bulbar palsy (dysphagia,
  dysarthria, facial and tongue weakness), respiratory compromise, limb
  weakness, sensory ataxia, and optic atrophy; onset ranges from infancy to
  adulthood. The allelic childhood form presenting as progressive bulbar palsy
  WITHOUT prominent deafness is Fazio-Londe disease, now regarded as the same
  disease entity within the riboflavin-transporter-deficiency spectrum.
  CRITICALLY, BVVL is a TREATABLE neurodegenerative disorder: high-dose oral
  riboflavin supplementation halts or reverses progression, making early
  diagnosis (and an empirical riboflavin trial before genetic confirmation)
  life-saving.
