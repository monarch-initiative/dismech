    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Progressive and severe sensorineural deafness is the most frequently observed presenting symptom."
    explanation: Sensorineural deafness is the most frequent presenting feature of BVVL.
  - reference: PMID:26918385
