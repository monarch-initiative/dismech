pathophysiology:
- name: Riboflavin Transporter Deficiency
  description: >
    Biallelic loss-of-function mutations in the riboflavin transporter genes
    SLC52A3 (RFVT3; BVVL1) and SLC52A2 (RFVT2; BVVL2) reduce riboflavin
    transport activity at the plasma membrane, impairing cellular uptake of
    riboflavin from food (SLC52A3, with decreased plasma riboflavin) and from
    the blood into target cells (SLC52A2).
  cell_types:
  - preferred_term: motor neuron
    term:
      id: CL:0000100
      label: motor neuron
  biological_processes:
  - preferred_term: riboflavin transport
    term:
      id: GO:0032218
      label: riboflavin transport
    modifier: DECREASED
  evidence:
  - reference: PMID:20206331
    reference_title: "Brown-Vialetto-Van Laere syndrome, a ponto-bulbar palsy with deafness, is caused by mutations in c20orf54."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "We identified a candidate gene, C20orf54, by studying a consanguineous family with multiple affected individuals and subsequently demonstrated that mutations in this gene were the cause of disease in other, unrelated families."
    explanation: Establishes mutations in C20orf54 (SLC52A3, riboflavin transporter RFVT3) as the cause of BVVL syndrome.
  - reference: PMID:22864630
    reference_title: "Impaired riboflavin transport due to missense mutations in SLC52A2 causes Brown-Vialetto-Van Laere syndrome."
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: "Overexpression studies confirmed that the gene products of both mutant alleles have reduced riboflavin transport activities."
    explanation: Functional confirmation that SLC52A2 (RFVT2) mutant alleles reduce riboflavin transport activity.
  downstream:
  - target: Flavocofactor (FAD/FMN) Depletion
    description: >
      Reduced cellular riboflavin uptake limits the precursor pool for synthesis
      of the flavin cofactors FMN and FAD.
    causal_link_type: DIRECT

- name: Flavocofactor (FAD/FMN) Depletion
  description: >
    Riboflavin is the obligate precursor of the flavin cofactors flavin
    mononucleotide (FMN) and flavin adenine dinucleotide (FAD). Reduced
    riboflavin availability depletes these flavocofactors, which are essential
    prosthetic groups for the flavoprotein enzymes of mitochondrial energy
    metabolism.
  cell_types:
  - preferred_term: motor neuron
    term:
      id: CL:0000100
      label: motor neuron
  biological_processes:
  - preferred_term: FAD biosynthetic process
    term:
      id: GO:0006747
      label: FAD biosynthetic process
    modifier: DECREASED
  - preferred_term: flavin adenine dinucleotide metabolic process
    term:
      id: GO:0072387
      label: flavin adenine dinucleotide metabolic process
    modifier: DECREASED
  evidence:
  - reference: PMID:29053833
    reference_title: "Clinical, pathological and functional characterization of riboflavin-responsive neuropathy."
    supports: SUPPORT
    evidence_source: MODEL_ORGANISM
    snippet: "global knockdown of the single Drosophila melanogaster riboflavin transporter homologue revealed reduced levels of riboflavin, downstream metabolites, and electron transport chain complex I activity."
    explanation: Riboflavin transporter knockdown reduces riboflavin and its downstream flavin metabolites, depleting the flavocofactor pool.
  - reference: PMID:22864630
    reference_title: "Impaired riboflavin transport due to missense mutations in SLC52A2 causes Brown-Vialetto-Van Laere syndrome."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "providing a rational basis for a high-dose riboflavin treatment."
    explanation: The flavocofactor-precursor role of riboflavin provides the rationale for high-dose riboflavin supplementation in BVVL.
  downstream:
  - target: Mitochondrial Flavoprotein Dysfunction
    description: >
      Depletion of FAD/FMN deprives flavoprotein-dependent mitochondrial enzymes
      (electron transport chain complexes I and II, acyl-CoA dehydrogenases) of
      their essential cofactors.
    causal_link_type: DIRECT

- name: Mitochondrial Flavoprotein Dysfunction
  description: >
    Loss of FAD/FMN cofactors impairs flavoprotein-dependent mitochondrial
    bioenergetics: reduced electron transport chain complex I and complex II
    activity, abnormal mitochondrial membrane potential and morphology, and
    impaired flavoprotein-dependent fatty-acid beta-oxidation (acyl-CoA
    dehydrogenation), the latter producing an abnormal acylcarnitine profile in
    some patients. The brainstem neuropathology resembles that of primary
    mitochondrial disease.
  cell_types:
  - preferred_term: motor neuron
    term:
      id: CL:0000100
      label: motor neuron
  biological_processes:
  - preferred_term: respiratory electron transport chain
    term:
      id: GO:0022904
      label: respiratory electron transport chain
    modifier: DECREASED
  - preferred_term: fatty acid beta-oxidation
    term:
      id: GO:0006635
      label: fatty acid beta-oxidation
    modifier: DECREASED
  evidence:
  - reference: PMID:29053833
    reference_title: "Clinical, pathological and functional characterization of riboflavin-responsive neuropathy."
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: "Electron transport chain complex I and complex II activity were decreased in SLC52A2 patient fibroblasts"
    explanation: Directly demonstrates impaired flavoprotein-dependent electron transport chain activity in patient cells.
  - reference: PMID:29053833
    reference_title: "Clinical, pathological and functional characterization of riboflavin-responsive neuropathy."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "showed classical symmetrical brainstem lesions resembling pathology seen in mitochondrial disease, including severe neuronal loss in the lower cranial nerve nuclei, anterior horns and corresponding nerves"
    explanation: Neuropathology links mitochondrial-type brainstem lesions to loss of cranial-nerve and anterior-horn (motor) neurons.
  downstream:
  - target: Cranial, Sensory, and Motor Neuronopathy
    description: >
      Energy-demanding cranial-nerve motor nuclei, sensory neurons, and spinal
      motor neurons are especially vulnerable to flavoprotein-dependent
      mitochondrial failure, leading to their degeneration.
    causal_link_type: DIRECT

- name: Cranial, Sensory, and Motor Neuronopathy
  description: >
    Progressive degeneration of lower cranial-nerve motor nuclei (pontobulbar
    palsy), sensory neurons (sensory ataxia, sensorineural/auditory neuropathy),
    spinal anterior-horn motor neurons, and optic and other long tracts. The
    resulting clinical picture is rapidly progressive axonal sensorimotor
    neuropathy with sensorineural hearing loss, bulbar palsy, optic atrophy, and
    respiratory insufficiency; an upper-motor-neuron component reminiscent of
    amyotrophic lateral sclerosis can also evolve.
  cell_types:
  - preferred_term: cranial nerve motor neuron
    term:
      id: CL:0015000
      label: cranial motor neuron
  - preferred_term: sensory neuron
    term:
      id: CL:0000101
      label: sensory neuron
  - preferred_term: lower motor neuron
    term:
      id: CL:0008039
      label: lower motor neuron
  biological_processes:
  - preferred_term: motor neuron apoptotic process
    term:
      id: GO:0097049
      label: motor neuron apoptotic process
    modifier: INCREASED
  evidence:
  - reference: PMID:24253200
    reference_title: "Treatable childhood neuronopathy caused by mutations in riboflavin transporter RFVT2."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Affected individuals share a core phenotype of rapidly progressive axonal sensorimotor neuropathy (manifesting with sensory ataxia, severe weakness of the upper limbs and axial muscles with distinctly preserved strength of the lower limbs), hearing loss, optic atrophy and respiratory insufficiency."
    explanation: Defines the core cranial/sensory/motor neuronopathy phenotype of BVVL.
  - reference: PMID:20206331
    reference_title: "Brown-Vialetto-Van Laere syndrome, a ponto-bulbar palsy with deafness, is caused by mutations in c20orf54."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "The key features are progressive ponto-bulbar palsy and bilateral sensorineural deafness."
    explanation: Establishes pontobulbar palsy with sensorineural deafness as the cardinal neuronopathy phenotype.
  downstream:
  - target: Sensorineural hearing loss
  - target: Bulbar palsy
  - target: Respiratory insufficiency
  - target: Optic atrophy
  - target: Sensory ataxia

