genetic:
- name: SLC52A3
  gene_term:
    preferred_term: SLC52A3
    term:
      id: hgnc:16187
      label: SLC52A3
  inheritance:
  - name: Autosomal Recessive
  notes: >
    Biallelic SLC52A3 (formerly C20orf54) mutations cause BVVL type 1
    (MONDO:0024537). SLC52A3 encodes riboflavin transporter RFVT3 (hRFT2),
    which mediates intestinal riboflavin uptake; mutations cause decreased
    plasma riboflavin levels.
  evidence:
  - reference: PMID:20206331
    reference_title: "Brown-Vialetto-Van Laere syndrome, a ponto-bulbar palsy with deafness, is caused by mutations in c20orf54."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Brown-Vialetto-Van Laere syndrome, a ponto-bulbar palsy with deafness, is caused by mutations in c20orf54."
    explanation: Identifies C20orf54 (SLC52A3) as a BVVL gene.
  - reference: PMID:22864630
    reference_title: "Impaired riboflavin transport due to missense mutations in SLC52A2 causes Brown-Vialetto-Van Laere syndrome."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "While mutations in SLC52A3 cause decreased plasma riboflavin levels, concordant with a role of SLC52A3 in riboflavin uptake from food"
    explanation: SLC52A3 mutations reduce plasma riboflavin, consistent with its role in intestinal riboflavin uptake.
- name: SLC52A2
  gene_term:
    preferred_term: SLC52A2
    term:
      id: hgnc:30224
      label: SLC52A2
  inheritance:
  - name: Autosomal Recessive
  notes: >
    Biallelic SLC52A2 mutations cause BVVL type 2 (MONDO:0013867). SLC52A2
    encodes riboflavin transporter RFVT2 (hRFT3), which mediates uptake of
    riboflavin from blood into target cells; affected individuals may have
    normal plasma riboflavin concentrations.
  evidence:
  - reference: PMID:22740598
    reference_title: "Exome sequencing reveals riboflavin transporter mutations as a cause of motor neuron disease."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "We identified a novel mutation in a second member of the riboflavin transporter gene family (gene symbol: SLC52A2) as the cause of disease in this family."
    explanation: Identifies SLC52A2 as a second BVVL-causing riboflavin transporter gene.
  - reference: PMID:22864630
    reference_title: "Impaired riboflavin transport due to missense mutations in SLC52A2 causes Brown-Vialetto-Van Laere syndrome."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "the SLC52A2-mutant individual had normal plasma riboflavin concentrations, a finding in line with a postulated function of SLC52A2 in riboflavin uptake from blood into target cells."
    explanation: SLC52A2 mediates riboflavin uptake into target cells; plasma riboflavin may be normal.

treatments:
- name: High-dose Riboflavin Supplementation
  description: >
    High-dose oral riboflavin (vitamin B2) replenishes the deficient flavocofactor
    pool and is a life-saving, disease-modifying therapy. Clinical and biochemical
    improvement can be rapid (days to weeks) or gradual over months; early
    initiation, before genetic confirmation, is recommended because outcome
    depends on prompt treatment. Some deficits (e.g., established sensorineural
    hearing loss) may not reverse.
  treatment_term:
    preferred_term: Pharmacotherapy
    term:
      id: NCIT:C15986
      label: Pharmacotherapy
    therapeutic_agent:
    - preferred_term: riboflavin
      term:
        id: CHEBI:17015
        label: riboflavin
  target_phenotypes:
  - preferred_term: Bulbar palsy
    term:
      id: HP:0001283
      label: Bulbar palsy
  - preferred_term: Respiratory failure
    term:
      id: HP:0002878
      label: Respiratory failure
  evidence:
  - reference: PMID:24253200
    reference_title: "Treatable childhood neuronopathy caused by mutations in riboflavin transporter RFVT2."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "The clinical and biochemical responses of this SLC52A2-specific cohort suggest that riboflavin supplementation can ameliorate the progression of this neurodegenerative condition, particularly when initiated soon after the onset of symptoms."
    explanation: Demonstrates that high-dose riboflavin ameliorates progression, especially when started early.
  - reference: PMID:23107375
    reference_title: "The Brown-Vialetto-Van Laere and Fazio Londe syndrome revisited: natural history, genetics, treatment and future perspectives."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "All 13 patients who were treated with riboflavin survived, with a strong clinical improvement after days to months of treatment in eight patients."
    explanation: All riboflavin-treated patients survived with clinical improvement, supporting riboflavin responsiveness.
  - reference: PMID:23107375
    reference_title: "The Brown-Vialetto-Van Laere and Fazio Londe syndrome revisited: natural history, genetics, treatment and future perspectives."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "treatment should be started immediately without first awaiting results of molecular analysis."
    explanation: Supports immediate empirical riboflavin treatment before genetic confirmation.
