    spectrum disorder, is the most frequent presenting symptom and (when
    present) distinguishes BVVL from Fazio-Londe disease.
  phenotype_term:
    preferred_term: Sensorineural hearing loss
    term:
      id: HP:0000407
      label: Sensorineural hearing impairment
