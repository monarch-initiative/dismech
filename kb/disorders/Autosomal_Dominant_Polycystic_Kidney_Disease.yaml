mechanistic_hypotheses:
- hypothesis_group_id: canonical_pkd1_pkd2_cilia_signaling_cystogenesis_model
  hypothesis_label: Canonical PKD1/PKD2 / Primary Cilium / Cystogenesis Model
  status: CANONICAL
  description: >-
    Autosomal dominant polycystic kidney disease (ADPKD) is caused by heterozygous loss-of-function
    variants in PKD1 (~78%) or PKD2 (~15%) encoding polycystin-1 and polycystin-2, transmembrane
    proteins that localize to the primary cilium of renal tubular epithelial cells and form a
    mechanosensitive calcium channel complex. Loss of polycystin function disrupts ciliary calcium
    signaling, elevates cAMP, activates B-Raf/MEK/ERK proliferative signaling, and triggers progressive
    cyst formation, expansion, and tubular dilation throughout the kidney (and liver/pancreas). The
    'two-hit' model — germline heterozygosity followed by somatic second-hit events in individual
    tubular epithelial cells — explains the focal nature of cyst initiation. Tolvaptan (V2-vasopressin
    receptor antagonist, lowering renal cAMP) is the first disease-modifying therapy and slows GFR
    decline, corroborating the cAMP-driven cystogenesis axis of the canonical model.
  evidence:
  - reference: PMID:40126492
    reference_title: "Autosomal dominant polycystic kidney disease."
    supports: SUPPORT
    evidence_source: OTHER
    snippet: "Most persons with ADPKD have an affected parent, but de novo disease is suggested in 10% to 25% of families."
    explanation: >
      Existing canonical mechanism citation in the dismech
      knowledge base, used as the seed for the hypothesis-search
      deep-research run.
pathophysiology:
- name: Polycystin complex dosage loss at the renal primary cilium
  description: >-
    The proximal defect is reduced activity or loss of the polycystin-1 and
    polycystin-2 complex in kidney epithelial primary cilia. PKD1 encodes
    polycystin-1 and PKD2 encodes polycystin-2; pathogenic variants or reduced
    polycystin dosage disturb the receptor-channel complex that normally helps
    maintain tubular architecture.
