- accession: PMID:32900939
  title: >-
    Targeting myostatin/activin A protects against skeletal muscle and bone
    loss during spaceflight.
  description: >-
    ISS experiment testing myostatin knockout and soluble ActRIIB receptor
    treatment in mice during 33 days of spaceflight. Myostatin inhibition
    is an active DMD therapeutic strategy.
  organism:
    preferred_term: mouse
    term:
      id: NCBITaxon:10090
      label: Mus musculus
  data_type: PROTEOMICS
  sample_types:
  - preferred_term: skeletal muscle
    tissue_term:
      preferred_term: skeletal muscle tissue
      term:
        id: UBERON:0001134
        label: skeletal muscle tissue
  conditions:
  - spaceflight (ISS, 33 days)
  - ground control
  - myostatin knockout
  - ACVR2B treatment
  publication: PMID:32900939
  notes: >-
    The 'Mighty Mice' experiment (RR-19) validated myostatin/activin A
    inhibition as a countermeasure for muscle loss in microgravity. Myostatin
    inhibition is also being pursued as a therapeutic strategy for DMD.
  evidence:
  - reference: PMID:32900939
    supports: SUPPORT
    evidence_source: MODEL_ORGANISM
    snippet: >-
      Systemic inhibition of MSTN/activin A signaling using a soluble form
      of the activin type IIB receptor (ACVR2B), which can bind each of
      these ligands, led to dramatic increases in both muscle and bone mass,
      with effects being comparable in ground and flight mice.
    explanation: >-
      Myostatin pathway inhibition preserves muscle mass in spaceflight,
      validating a pathway that is also a therapeutic target for DMD muscle
      wasting.
