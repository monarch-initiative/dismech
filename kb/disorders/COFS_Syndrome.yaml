        evidence_source: HUMAN_CLINICAL
        snippet: "Histologic evaluation revealed accelerated neural and neuronal degeneration at the cochlear and retrocochlear levels."
        explanation: Provides mechanistic basis for the sensorineural classification — direct histologic evidence of cochlear nerve degeneration in COFS.
