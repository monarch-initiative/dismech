        supports: SUPPORT
        evidence_source: HUMAN_CLINICAL
        snippet: "Cerebro-oculo-facio-skeletal (COFS) syndrome is an autosomal recessive disorder characterized by microcephaly, congenital cataracts, facial dysmorphism, neurogenic arthrogryposis, growth failure and severe psychomotor retardation."
