name: COFS Syndrome
creation_date: "2026-05-14T00:00:00Z"
updated_date: "2026-05-14T00:00:00Z"
description: >-
  Cerebro-oculo-facio-skeletal (COFS) syndrome is a severe autosomal recessive
  nucleotide excision repair (NER) disorder in the Cockayne syndrome / xeroderma
  pigmentosum spectrum. It is characterized by prenatal-onset microcephaly,
  congenital cataracts, microphthalmia, arthrogryposis, severe growth failure,
  facial dysmorphism, and progressive neurodegeneration with early death.
  Genetically distinct subtypes are caused by biallelic loss-of-function variants
  in NER genes ERCC6 (CSB), ERCC2 (XPD), ERCC5 (XPG), and ERCC1.
category: Genetic
parents:
  - DNA Repair Disorder
  - Neurodevelopmental Disorder
synonyms:
  - cerebro-oculo-facio-skeletal syndrome
  - Pena-Shokeir syndrome type II
  - COFS
disease_term:
  preferred_term: COFS syndrome
  term:
    id: MONDO:0008926
    label: COFS syndrome
has_subtypes:
  - name: COFS1
    display_name: Cerebrooculofacioskeletal syndrome 1 (ERCC6/CSB)
    description: >-
      ERCC6 (CSB)-associated COFS syndrome, the most common subtype with severe
      prenatal-onset microcephaly, congenital cataracts, arthrogryposis, and
      progressive neurodegeneration. Allelic with severe Cockayne syndrome
      type II.
    subtype_term:
      preferred_term: cerebrooculofacioskeletal syndrome 1
      term:
        id: MONDO:0008955
        label: cerebrooculofacioskeletal syndrome 1
  - name: COFS2
    display_name: Cerebrooculofacioskeletal syndrome 2 (ERCC2/XPD)
    description: >-
      ERCC2 (XPD)-associated COFS syndrome. Allelic with xeroderma pigmentosum
      group D and trichothiodystrophy; severe phenotype with COFS features
      results from missense alleles disrupting TFIIH-coupled NER and
      transcription.
    subtype_term:
      preferred_term: cerebrooculofacioskeletal syndrome 2
      term:
        id: MONDO:0012553
        label: cerebrooculofacioskeletal syndrome 2
  - name: COFS3
    display_name: Cerebrooculofacioskeletal syndrome 3 (ERCC5/XPG)
    description: >-
      ERCC5 (XPG)-associated COFS syndrome. Allelic with xeroderma pigmentosum
      group G and the XP/CS complex; COFS-spectrum cases harbor severe XPG
      loss-of-function alleles.
    subtype_term:
      preferred_term: cerebrooculofacioskeletal syndrome 3
      term:
        id: MONDO:0014696
        label: cerebrooculofacioskeletal syndrome 3
  - name: COFS4
    display_name: Cerebrooculofacioskeletal syndrome 4 (ERCC1)
    description: >-
      ERCC1-associated COFS syndrome. Severe loss-of-function alleles in ERCC1
      destabilize the ERCC1-XPF endonuclease complex producing a COFS-spectrum
      phenotype with prenatal onset and lethality in infancy.
    subtype_term:
      preferred_term: cerebrooculofacioskeletal syndrome 4
      term:
        id: MONDO:0012554
        label: cerebrooculofacioskeletal syndrome 4
pathophysiology:
  - name: Defective Transcription-Coupled Nucleotide Excision Repair
    description: >-
      Biallelic pathogenic variants in ERCC6, ERCC2, ERCC5, or ERCC1 disrupt the
      transcription-coupled nucleotide excision repair (TC-NER) pathway,
      impairing removal of transcription-blocking DNA lesions in actively
      transcribed genes. COFS syndrome represents the severe prenatal-onset end
      of the NER deficiency clinical spectrum and shares the TC-NER defect with
      Cockayne syndrome (see Cockayne_Syndrome.yaml). The shared biology is
      mirrored here rather than inherited via `conforms_to` because dismech
      modules are reserved for cross-disorder conserved mechanisms.
    biological_processes:
      - preferred_term: transcription-coupled nucleotide-excision repair
        term:
          id: GO:0006283
          label: transcription-coupled nucleotide-excision repair
        modifier: DECREASED
    evidence:
      - reference: PMID:20687508
        supports: SUPPORT
        evidence_source: OTHER
        snippet: "In COFS syndrome, as in Cockayne syndrome, DNA repair is impaired in the transcription-coupled NER pathway, but not in the global genome NER pathway."
        explanation: >-
          Review establishes that COFS is mechanistically defined by a TC-NER
          defect (not a global-genome NER defect), placing it in the same NER
          pathway niche as Cockayne syndrome.
      - reference: PMID:30919937
        supports: SUPPORT
        evidence_source: OTHER
        snippet: "Deficiencies in NER typically result in a group of heterogeneous distinct disorders ranging from the mild UV sensitive syndrome to the cancer-prone xeroderma pigmentosum and the neurodevelopmental/progeroid conditions trichothiodystrophy, Cockayne syndrome and cerebro-oculo-facio-skeletal-syndrome."
        explanation: >-
          Recent review of NER disorders positions COFS within the
          neurodevelopmental/progeroid end of the NER-deficiency clinical
          spectrum.
      - reference: PMID:41921730
        supports: SUPPORT
        evidence_source: OTHER
        snippet: "Impaired TC-NER pathway activity manifests in tissue-level pathologies, including neurodegeneration and increased susceptibility to neurological deficits."
        explanation: >-
          Mechanistic review of TC-NER in mammalian forebrain development
          links impaired TC-NER to the neurodegenerative phenotype seen in
          COFS, Cockayne, and trichothiodystrophy.
phenotypes:
  - category: Neurologic
    name: Microcephaly
    description: >-
      Congenital, prenatal-onset microcephaly with markedly reduced head
      circumference, present in fetuses and at birth.
    phenotype_term:
      preferred_term: Microcephaly
      term:
        id: HP:0000252
        label: Microcephaly
    evidence:
      - reference: PMID:20687508
        supports: SUPPORT
        evidence_source: HUMAN_CLINICAL
        snippet: "Cerebro-oculo-facio-skeletal (COFS) syndrome is an autosomal recessive inherited disorder characterized by congenital microcephaly, congenital cataracts and/or microphthalmia, arthrogryposis, severe developmental delay, severe postnatal growth failure and facial dysmorphism with prominent nasal root and/or overhanging upper lip."
        explanation: Foundational COFS review lists congenital microcephaly as a cardinal feature.
      - reference: PMID:32052936
        supports: SUPPORT
        evidence_source: HUMAN_CLINICAL
        snippet: "Microencephaly is present in the three fetuses with delayed development of the gyri, but normal microscopic anatomy at the supratentorial level."
        explanation: Direct fetal pathology evidence of microcephaly in COFS pregnancies.
  - category: Ophthalmologic
    name: Congenital Cataracts
    description: >-
      Bilateral congenital cataracts, often with microphthalmia, microcornea,
      and optic atrophy. A defining ocular feature of the syndrome.
    phenotype_term:
      preferred_term: Congenital cataract
      term:
        id: HP:0000519
        label: Developmental cataract
    evidence:
      - reference: PMID:32052936
        supports: SUPPORT
        evidence_source: HUMAN_CLINICAL
        snippet: "Cerebro-oculo-facio-skeletal syndrome (COFS) is a rare autosomal recessive neurodegenerative disease belonging to the family of DNA repair disorders, characterized by microcephaly, congenital cataracts, facial dysmorphism and arthrogryposis."
        explanation: Defining clinical feature listed in the review of three fetal COFS cases.
      - reference: PMID:11443545
        supports: SUPPORT
        evidence_source: HUMAN_CLINICAL
        snippet: "Cerebro-oculo-facio-skeletal (COFS) syndrome is a recessively inherited rapidly progressive neurologic disorder leading to brain atrophy, with calcifications, cataracts, microcornea, optic atrophy, progressive joint contractures, and growth failure."
        explanation: Classical XPD-mutated COFS case series enumerates ocular features.
  - category: Musculoskeletal
    name: Arthrogryposis
    description: >-
      Congenital, often prenatal-onset multiple joint contractures with a
      neurogenic basis, frequently detected on antenatal ultrasound.
    phenotype_term:
      preferred_term: Arthrogryposis multiplex congenita
      term:
        id: HP:0002804
        label: Arthrogryposis multiplex congenita
    evidence:
      - reference: PMID:20456449
        supports: SUPPORT
        evidence_source: HUMAN_CLINICAL
        snippet: "Cerebro-oculo-facio-skeletal (COFS) syndrome is an autosomal recessive disorder characterized by microcephaly, congenital cataracts, facial dysmorphism, neurogenic arthrogryposis, growth failure and severe psychomotor retardation."
        explanation: ERCC6 Finnish founder cohort documents neurogenic arthrogryposis as a cardinal feature.
      - reference: PMID:24700531
        supports: SUPPORT
        evidence_source: HUMAN_CLINICAL
        snippet: "We report on a family with five fetuses conceived to first cousin parents presenting with abnormal ultrasound findings including contractures and microcephaly."
        explanation: ERCC5-truncating family with prenatally diagnosed contractures supports the prenatal-onset joint pathology.
  - category: Growth
    name: Growth Failure
    description: >-
      Severe prenatal and postnatal growth failure with intrauterine growth
      retardation and failure to thrive in survivors.
    phenotype_term:
      preferred_term: Growth delay
      term:
        id: HP:0001510
        label: Growth delay
    evidence:
      - reference: PMID:20687508
        supports: SUPPORT
        evidence_source: HUMAN_CLINICAL
        snippet: "Cerebro-oculo-facio-skeletal (COFS) syndrome is an autosomal recessive inherited disorder characterized by congenital microcephaly, congenital cataracts and/or microphthalmia, arthrogryposis, severe developmental delay, severe postnatal growth failure and facial dysmorphism with prominent nasal root and/or overhanging upper lip."
        explanation: COFS review lists severe postnatal growth failure as a cardinal feature.
      - reference: PMID:32052936
        supports: SUPPORT
        evidence_source: HUMAN_CLINICAL
        snippet: "COFS syndrome should be considered in fetuses when intrauterine growth retardation is associated with microcephaly, arthrogryposis and ocular anomalies."
        explanation: Prenatal review highlights IUGR as a diagnostic feature alongside microcephaly and arthrogryposis.
  - category: Ophthalmologic
    name: Microphthalmia
    description: >-
      Reduced ocular globe size frequently co-occurring with congenital
      cataracts, microcornea, and optic atrophy.
    phenotype_term:
      preferred_term: Microphthalmia
      term:
        id: HP:0000568
        label: Microphthalmia
    evidence:
      - reference: PMID:20687508
        supports: SUPPORT
        evidence_source: HUMAN_CLINICAL
        snippet: "Cerebro-oculo-facio-skeletal (COFS) syndrome is an autosomal recessive inherited disorder characterized by congenital microcephaly, congenital cataracts and/or microphthalmia, arthrogryposis, severe developmental delay, severe postnatal growth failure and facial dysmorphism with prominent nasal root and/or overhanging upper lip."
        explanation: Microphthalmia is listed among the defining ocular anomalies in the cardinal feature set.
  - category: Cutaneous
    name: Cutaneous Photosensitivity
    description: >-
      Increased skin sensitivity to ultraviolet light, reflecting the underlying
      NER deficiency. Severity varies with the specific NER gene defect.
    phenotype_term:
      preferred_term: Cutaneous photosensitivity
      term:
        id: HP:0000992
        label: Cutaneous photosensitivity
    evidence:
      - reference: PMID:20687508
        supports: SUPPORT
        evidence_source: HUMAN_CLINICAL
        snippet: "This syndrome is now recognized as a disorder belonging to the spectrum of inherited defects in Nucleotide Excision Repair (NER) resulting in profound photosensitivity."
        explanation: Review explicitly links COFS to profound photosensitivity via the underlying NER defect.
      - reference: PMID:33369099
        supports: SUPPORT
        evidence_source: HUMAN_CLINICAL
        snippet: "He presented with profound microcephaly, psychomotor retardation, failure to thrive, cutaneous photosensitivity, a bilateral hearing deficit and optic atrophy, thrombocytopenia, and recurrent episodes of pneumonia."
        explanation: ERCC2-Gly47Arg case report documents cutaneous photosensitivity as a clinical feature.
  - category: Neurologic
    name: Severe Psychomotor Retardation
    description: >-
      Profound global developmental delay with progressive neurodegeneration
      typically leading to early death.
    phenotype_term:
      preferred_term: Severe global developmental delay
      term:
        id: HP:0011344
        label: Severe global developmental delay
      clinical_course: PROGRESSIVE
    evidence:
      - reference: PMID:20456449
        supports: SUPPORT
        evidence_source: HUMAN_CLINICAL
        snippet: "Cerebro-oculo-facio-skeletal (COFS) syndrome is an autosomal recessive disorder characterized by microcephaly, congenital cataracts, facial dysmorphism, neurogenic arthrogryposis, growth failure and severe psychomotor retardation."
        explanation: ERCC6 founder cohort lists severe psychomotor retardation among defining features.
      - reference: PMID:17273966
        supports: SUPPORT
        evidence_source: HUMAN_CLINICAL
        snippet: "Patient cells showed moderate hypersensitivity to ultraviolet rays and mitomycin C, yet the clinical features were very severe and, unexpectedly, were compatible with a diagnosis of cerebro-oculo-facio-skeletal syndrome."
        explanation: First ERCC1-deficient COFS case documents the severe clinical phenotype despite only moderate cellular UV hypersensitivity.
genetic:
  - name: ERCC6
    subtype: COFS1
    gene_term:
      preferred_term: ERCC6
      term:
        id: hgnc:3438
        label: ERCC6
    association: Pathogenic Variants
    notes: >-
      Biallelic loss-of-function variants in ERCC6 (CSB) cause COFS1. Allelic
      with Cockayne syndrome (including severe type II).
    evidence:
      - reference: PMID:20456449
        supports: SUPPORT
        evidence_source: HUMAN_CLINICAL
        snippet: "We report a large consanguineous pedigree from northern Finland with six individuals belonging into four different sibships and affected with typical COFS syndrome phenotype."
        explanation: Finnish founder pedigree confirms ERCC6 as a COFS-causing gene; six patients across four sibships share a homozygous ERCC6 founder mutation.
      - reference: PMID:20687508
        supports: SUPPORT
        evidence_source: OTHER
        snippet: "All mutations have been found in Cockayne syndrome gene, CSB, xeroderma pigmentosum genes, XPD and XPG and ERCC1 gene involved in the transcription-coupled NER pathway."
        explanation: Review confirms ERCC6/CSB as one of four COFS-causing NER genes.
  - name: ERCC2
    subtype: COFS2
    gene_term:
      preferred_term: ERCC2
      term:
        id: hgnc:3434
        label: ERCC2
    association: Pathogenic Variants
    notes: >-
      Biallelic variants in ERCC2 (XPD) cause COFS2. Allelic with xeroderma
      pigmentosum group D and trichothiodystrophy.
    evidence:
      - reference: PMID:11443545
        supports: SUPPORT
        evidence_source: HUMAN_CLINICAL
        snippet: "Here we report the first involvement of the XPD gene in a new case of UV-sensitive COFS syndrome"
        explanation: First report of ERCC2/XPD biallelic variants causing COFS syndrome.
      - reference: PMID:33369099
        supports: SUPPORT
        evidence_source: HUMAN_CLINICAL
        snippet: "Only three patients with cerebro-oculo-facio-skeletal syndrome (COFS), caused by mutations in ERCC2, have been published so far."
        explanation: Recent case report adds a fourth ERCC2-mutated COFS patient, demonstrating the rarity but consistency of the ERCC2-COFS association.
  - name: ERCC5
    subtype: COFS3
    gene_term:
      preferred_term: ERCC5
      term:
        id: hgnc:3437
        label: ERCC5
    association: Pathogenic Variants
    notes: >-
      Biallelic variants in ERCC5 (XPG) cause COFS3. Allelic with xeroderma
      pigmentosum group G and XP/CS complex.
    evidence:
      - reference: PMID:24700531
        supports: SUPPORT
        evidence_source: HUMAN_CLINICAL
        snippet: "ERCC5 is a component of the nucleotide excision repair machinery and biallelic mutations in the gene have previously been associated with xeroderma pigmentosum (group G), Cockayne syndrome and the more severe cerebrooculofacioskeletal syndrome."
        explanation: ERCC5/XPG biallelic mutations are an established cause of the severe COFS phenotype within the NER allelic spectrum.
      - reference: PMID:24700531
        supports: SUPPORT
        evidence_source: HUMAN_CLINICAL
        snippet: "The phenotype in the family we report on is consistent with a severe manifestation of cerebrooculofacioskeletal syndrome."
        explanation: Family-based exome sequencing identifies an ERCC5 truncating mutation segregating with severe COFS phenotype.
  - name: ERCC1
    subtype: COFS4
    gene_term:
      preferred_term: ERCC1
      term:
        id: hgnc:3433
        label: ERCC1
    association: Pathogenic Variants
    notes: >-
      Biallelic variants in ERCC1 destabilize the ERCC1-XPF structure-specific
      endonuclease complex required for NER, producing severe COFS4.
    evidence:
      - reference: PMID:17273966
        supports: SUPPORT
        evidence_source: HUMAN_CLINICAL
        snippet: "Here, we describe the first case of human inherited ERCC1 deficiency."
        explanation: First-in-human ERCC1-deficient COFS case establishes ERCC1 as a COFS-causing gene.
      - reference: PMID:17273966
        supports: SUPPORT
        evidence_source: HUMAN_CLINICAL
        snippet: "Patient cells showed moderate hypersensitivity to ultraviolet rays and mitomycin C, yet the clinical features were very severe and, unexpectedly, were compatible with a diagnosis of cerebro-oculo-facio-skeletal syndrome."
        explanation: Documents the genotype-phenotype discordance characteristic of ERCC1 deficiency — moderate cellular UV-hypersensitivity but severe clinical disease.
treatments:
  - name: Sun and UV Protection
    description: >-
      Strict sun avoidance, photoprotective clothing, and broad-spectrum
      sunscreens are recommended given the underlying NER deficiency and
      associated cutaneous photosensitivity, although the severity of the
      neurodevelopmental phenotype usually dominates clinical management.
    treatment_term:
      preferred_term: ultraviolet light protection
      term:
        id: MAXO:0000950
        label: supportive care
    evidence:
      - reference: PMID:20687508
        supports: SUPPORT
        evidence_source: OTHER
        snippet: "This syndrome is now recognized as a disorder belonging to the spectrum of inherited defects in Nucleotide Excision Repair (NER) resulting in profound photosensitivity."
        explanation: Underlying NER deficiency rationale for UV avoidance and skin protection.
  - name: Multidisciplinary Supportive Care
    description: >-
      Given progressive neurodegeneration, severe psychomotor retardation, and
      multisystem involvement, management is supportive: nutritional support
      for failure to thrive, orthopaedic care for contractures, ophthalmologic
      management for cataracts, and palliative care planning. No
      disease-modifying therapy exists.
    treatment_term:
      preferred_term: supportive care
      term:
        id: MAXO:0000950
        label: supportive care
    evidence:
      - reference: PMID:33369099
        supports: SUPPORT
        evidence_source: HUMAN_CLINICAL
        snippet: "Occurring homozygous, this variant was associated with COFS syndrome, leading to early death of the patient at the age of 21 months."
        explanation: Demonstrates the rapidly fatal natural history that necessitates supportive and palliative management.
  - name: Genetic Counseling
    description: >-
      Autosomal-recessive inheritance with substantial recurrence risk in
      consanguineous families. Carrier testing and prenatal diagnosis (DNA
      repair assays on chorionic villi or amniocytes, plus targeted molecular
      testing) are available once the family-specific variant(s) are known.
    treatment_term:
      preferred_term: genetic counseling
      term:
        id: MAXO:0000079
        label: genetic counseling
    evidence:
      - reference: PMID:11443545
        supports: SUPPORT
        evidence_source: HUMAN_CLINICAL
        snippet: "we document successful use of DNA repair for prenatal diagnosis in triplet and singleton pregnancies at risk for COFS syndrome."
        explanation: Establishes DNA-repair-based prenatal diagnosis as a viable family-counseling tool once the index case is identified.
      - reference: PMID:32052936
        supports: SUPPORT
        evidence_source: HUMAN_CLINICAL
        snippet: "COFS syndrome should be considered in fetuses when intrauterine growth retardation is associated with microcephaly, arthrogryposis and ocular anomalies."
        explanation: Prenatal-diagnosis review supports antenatal counseling and recurrence-risk assessment workflows.
