      label: complement activation
  cellular_components:
  - preferred_term: NLRP3 inflammasome complex
    term:
      id: GO:0072559
      label: NLRP3 inflammasome complex
  evidence:
  - reference: PMID:34890998
    reference_title: "Atlas of circulating immune cells in Kawasaki disease."
    supports: SUPPORT
    snippet: Increasing evidence shows that the pathogenesis of Kawasaki disease
      (KD) is caused by abnormal and unbalanced innate and adaptive immune
      responses.
    explanation: The literature supports the statement that Kawasaki Disease is
      characterized by immune response dysregulation leading to vessel wall
      damage and inflammation.
  - reference: PMID:30183655
    reference_title: "Autoimmune Aspects of Kawasaki Disease."
    supports: SUPPORT
    snippet: Kawasaki disease (KD) is a vasculitis that is part of systemic
      vasculitis syndrome. It affects medium-sized vessels and is characterized
      by hypercytokinemia.
    explanation: This reference supports that KD involves immune dysregulation
      leading to vessel wall damage.
  - reference: PMID:30619331
    reference_title: "How Should We Classify Kawasaki Disease?"
    supports: SUPPORT
    snippet: Others have favored an autoreactive hypothesis that KD is triggered
      by an antigen that shares homology with structures in the vascular wall,
      and molecular mimicry resulting in an immune response directed to that
      tissue.
    explanation: This supports the notion of an abnormal immune response leading
      to vessel wall damage in KD.
  - reference: PMID:39117827
    reference_title: "Kawasaki Disease-Associated Cytokine Storm Syndrome."
    supports: SUPPORT
    snippet: Kawasaki disease (KD) is a hyperinflammatory syndrome manifesting
      as an acute systemic vasculitis characterized by fever, nonsuppurative
      conjunctival injection, rash, oral mucositis, extremity changes, and
      cervical lymphadenopathy.
    explanation: This reference supports the statement by describing KD as a
      hyperinflammatory syndrome, which involves immune dysregulation.
phenotypes:
- category: Systemic
  name: Fever
  description: High fever lasting at least 5 days, a mandatory criterion for
    diagnosis of Kawasaki disease.
  frequency: VERY_FREQUENT
  diagnostic: true
  evidence:
  - reference: PMID:30029859
    reference_title: "Intestinal Involvement in Kawasaki Disease."
    supports: SUPPORT
    snippet: Fever, abdominal pain, and vomiting were the most frequent symptoms
      observed and typical Kawasaki disease signs and symptoms appeared after
      intestinal complaints in all cases.
    explanation: The literature mentions fever as one of the most frequent
      symptoms observed in Kawasaki disease, supporting the statement that fever
      is a very frequent systemic diagnostic symptom of Kawasaki disease.
  - reference: PMID:31900257
    reference_title: "Fifteen-minute consultation: Kawasaki disease: how to distinguish from other febrile illnesses: tricks and tips."
    supports: SUPPORT
    snippet: The conundrum for acute paediatricians is which clinical features
      best distinguish the febrile child with possible KD, needing intravenous
      immunoglobulin, from the many other children with febrile illnesses.
    explanation: The literature highlights the challenge of distinguishing
      Kawasaki disease from other febrile illnesses, indicating that fever is a
      very frequent systemic diagnostic symptom in Kawasaki disease.
  - reference: PMID:26631821
    reference_title: "Kawasaki disease in adults: Observations in France and literature review."
    supports: SUPPORT
    snippet: The main symptoms were fever (100%), exanthema (98%), changes in
      the extremities (91%), conjunctivitis (77%), oral cavity changes (89%),
      cervical adenitis (55%) and cardiac abnormalities (45%).
    explanation: The literature states that fever is present in 100% of the
      cases, supporting the statement that fever is a very frequent systemic
      diagnostic symptom of Kawasaki disease.
  - reference: ORPHA:2331
    supports: PARTIAL
    snippet: "HP:0001945 | Fever | Frequent (79-30%)"
    explanation: Orphanet classifies fever as frequent (79-30%), but clinical
      data consistently shows fever in virtually 100% of cases and it is a
      mandatory diagnostic criterion. The VERY_FREQUENT classification is
      supported by multiple clinical cohort studies.
  phenotype_term:
    preferred_term: Fever
    description: Elevated body temperature above the normal range, typically
      above 38°C (100.4°F).
    term:
      id: HP:0001945
      label: Fever
- category: Dermatologic
  name: Rash
  description: Polymorphous exanthem typically affecting the trunk and
    extremities, without vesicles or crusting.
  frequency: VERY_FREQUENT
  evidence:
  - reference: PMID:26631821
    reference_title: "Kawasaki disease in adults: Observations in France and literature review."
    supports: SUPPORT
    snippet: The main symptoms were fever (100%), exanthema (98%)...
    explanation: Exanthema, which refers to a widespread rash, was present in
      98% of the adult patients with Kawasaki Disease.
  - reference: PMID:1440951
    reference_title: "Kawasaki syndrome."
    supports: SUPPORT
    snippet: We describe a four-year-old girl who presented with fever, a
      diffuse erythematous maculopapular rash...
    explanation: The case description includes a diffuse erythematous
      maculopapular rash as one of the clinical features.
  - reference: PMID:33453126
    reference_title: "Kawasaki disease for the paediatric dermatologist: skin manifestations and new insights into the pathophysiology."
    supports: SUPPORT
    snippet: All children with KD have fever accompanied by clinical signs, with
      four of the five classic criteria for complete KD being mucocutaneous...
    explanation: The abstract emphasizes the mucocutaneous manifestations, which
      include skin rashes, as critical for diagnosing Kawasaki Disease.
  - reference: PMID:23481152
    reference_title: "Incomplete Kawasaki disease."
    supports: SUPPORT
    snippet: This is a report of a 4-year-old Hispanic boy who presented with
      skin changes to the lips and oral cavity, a generalized rash...
    explanation: The case report mentions a generalized rash as one of the
      symptoms of Kawasaki Disease.
  - reference: PMID:32843441
    reference_title: "COVID-19 Inflammatory Syndrome With Clinical Features Resembling Kawasaki Disease."
    supports: SUPPORT
    snippet: Both patients presented with fever lasting >5 days and were found
      to have rash, conjunctival injection, and swollen lips.
    explanation: The patients with COVID-19 inflammatory syndrome had clinical
      features resembling Kawasaki Disease, including a rash.
  phenotype_term:
    preferred_term: Skin rash
    description: Visible change in skin color or texture, typically involving
      erythema or papules.
    term:
      id: HP:0000988
      label: Skin rash
- category: Ocular
  name: Conjunctivitis
  description: Bilateral bulbar conjunctival injection without exudate,
    typically limbal sparing.
  frequency: VERY_FREQUENT
  notes: Non-purulent (no pus)
  evidence:
  - reference: PMID:34814144
    reference_title: "Kawasaki Disease and Atopic Diseases: A Systematic Review and Meta-Analysis of Observational Studies."
    supports: SUPPORT
    snippet: In cross-sectional studies, KD was associated with allergic
      rhinitis (n = 6; OR, 1.69; 95% CI, 1.52-1.87), asthma (n = 3; OR, 1.72;
      95% CI, 1.38-2.14), allergic conjunctivitis (n = 2; OR, 1.95; 95% CI,
      1.68-2.27), and atopic dermatitis (n = 3; OR, 1.35; 95% CI, 1.22-1.49).
    explanation: The study shows that Kawasaki Disease is associated with
      allergic conjunctivitis, supporting the statement that conjunctivitis is
      very frequent in Kawasaki Disease.
  - reference: PMID:32843441
    reference_title: "COVID-19 Inflammatory Syndrome With Clinical Features Resembling Kawasaki Disease."
    supports: SUPPORT
    snippet: Both patients presented with fever lasting >5 days and were found
      to have rash, conjunctival injection, and swollen lips.
    explanation: The description of conjunctival injection in patients with
      Kawasaki Disease supports the statement.
  - reference: PMID:7299613
    reference_title: "Eye involvement in Kawasaki disease."
    supports: SUPPORT
    snippet: In a prospective series, ophthalmologic examinations on 10 children
      with Kawasaki disease showed that eight had anterior uveitis during the
      acute phase of the illness.
    explanation: Although the study focuses on anterior uveitis, it indicates
      significant ocular involvement in Kawasaki Disease, supporting the
      statement indirectly.
  - reference: ORPHA:2331
    supports: SUPPORT
    snippet: "HP:0000509 | Conjunctivitis | Very frequent (99-80%)"
    explanation: Orphanet classifies conjunctivitis as very frequent in Kawasaki
      disease, consistent with it being one of the five classic diagnostic criteria.
  phenotype_term:
    preferred_term: Conjunctivitis
    description: Inflammation of the conjunctiva resulting in redness and
      irritation of the eye.
    term:
      id: HP:0000509
      label: Conjunctivitis
- category: Musculoskeletal
  name: Swelling of Hands and Feet
  description: Acute erythema and induration of the hands and feet with
    subsequent periungual desquamation.
  frequency: VERY_FREQUENT
  evidence:
  - reference: PMID:1704148
    reference_title: "[Kawasaki disease]."
    supports: SUPPORT
    snippet: 'The six main clinical presentations of Kawasaki disease are: prolonged
      fever, conjunctivitis, lesions of the oral and pharyngeal mucosa, inflammatory
      reddening and swelling of the hands and feet, skin rash and cervical lymph node
      enlargement.'
    explanation: The literature explicitly mentions that swelling of the hands
      and feet is one of the six main clinical presentations of Kawasaki
      disease.
  - reference: PMID:3333141
    reference_title: "Pathological features of Kawasaki disease (mucocutaneous lymph node syndrome)."
    supports: SUPPORT
    snippet: Early clinical features include fever, rash, conjunctival
      injection, dry reddened lips, oropharyngeal reddening, enlarged cervical
      nodes, and swelling and redness of hands and feet.
    explanation: The literature lists swelling and redness of hands and feet as
      early clinical features of Kawasaki disease.
- category: Cardiovascular
  frequency: OCCASIONAL
  name: Coronary Artery Aneurysms
  description: Abnormal dilation of coronary arteries that can lead to
    thrombosis, stenosis, and myocardial infarction.
  notes: Can lead to serious heart complications
  evidence:
  - reference: PMID:10512599
    reference_title: "Kawasaki disease."
    supports: REFUTE
    snippet: Coronary artery aneurysms or ectasia develop in approximately
      15-25% of children with the disease.
    explanation: The literature indicates that coronary artery aneurysms are a
      common complication of Kawasaki disease, occurring in 15-25% of cases,
      which is more frequent than 'occasional'.
  - reference: PMID:31732547
    reference_title: "Systemic Artery Aneurysms and Kawasaki Disease."
    supports: REFUTE
    snippet: Twenty-three patients had SAAs, demonstrating an incidence of 14.2%
      (23 of 162) in patients who were screened at 1 month after onset. The
      proportion of patients with SAAs was estimated to be 2% (23 of 1148) of
      all patients with KD.
    explanation: The incidence of coronary artery aneurysms (CAAs) in Kawasaki
      disease is significant, with a notable percentage of patients developing
      CAAs, indicating that the frequency is more than 'occasional'.
  - reference: PMID:34651205
    reference_title: "Analysis of multiple organ involvement in Kawasaki disease."
    supports: REFUTE
    snippet: Among the 640 KD children, most were 1-5 years old (415/640,
      64.8%). Children < 1 year old (31.6%) and > 5 years old (28.3%) were more
      likely to have cardiovascular complications.
    explanation: The study shows a high incidence of cardiovascular
      complications in children with Kawasaki disease, indicating that coronary
      artery aneurysms and other heart complications are not just occasional.
  - reference: PMID:23075819
    reference_title: "Kawasaki disease: late cardiovascular sequelae."
    supports: REFUTE
    snippet: Patients with persistent or remodeled coronary aneurysms after
      Kawasaki disease have a high rate of complications including thrombosis or
      stenosis leading to myocardial infarction.
    explanation: The literature indicates a high rate of complications from
      coronary artery aneurysms in Kawasaki disease, suggesting that these
      complications are not occasional but rather significant.
- category: Hematologic
  name: Thrombocytosis
  description: Elevated platelet count commonly found in the subacute phase of
    Kawasaki disease.
  frequency: VERY_FREQUENT
  notes: Often appears 1-2 weeks after onset
  evidence:
