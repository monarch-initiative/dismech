biochemical:
- name: C-Reactive Protein (CRP)
  presence: Elevated
  context: Indicator of inflammation
  evidence:
  - reference: PMID:34078404
    reference_title: "The occurrence of coronary artery lesions in Kawasaki disease based on C-reactive protein levels: a retrospective cohort study."
    supports: SUPPORT
    snippet: CAL were found in 12.9 and 18.3% of the high and low CRP patients,
      respectively (p < 0.001), based on z-scores; and in 9.9 and 12.5%,
      respectively (p = 0.001), based on the Japanese criteria in the acute
      phase.
    explanation: The study indicates that CRP levels are elevated in Kawasaki
      Disease patients, with specific percentages of high and low CRP levels
      noted.
  - reference: PMID:39117827
    reference_title: "Kawasaki Disease-Associated Cytokine Storm Syndrome."
    supports: SUPPORT
    snippet: Kawasaki disease (KD) is a hyperinflammatory syndrome manifesting
      as an acute systemic vasculitis characterized by fever, nonsuppurative
      conjunctival injection, rash, oral mucositis, extremity changes, and
      cervical lymphadenopathy.
    explanation: The abstract describes KD as a hyperinflammatory syndrome,
      implying elevated inflammatory markers such as CRP.
  - reference: PMID:37551875
    reference_title: "N-Terminal Pro-Brain Natriuretic Peptide Levels in Kawasaki Disease, Sepsis and Other Febrile Illnesses."
    supports: SUPPORT
    snippet: Complete blood count, C-reactive protein (CRP), liver and renal
      function tests, serum electrolytes, chest X-ray, NT-proBNP level, Bactec
      blood culture, urine microscopy and culture along with detailed physical
      examination was done for all cases and control.
    explanation: The study includes CRP as part of the diagnostic tests for
      Kawasaki Disease, indicating its relevance as an inflammatory marker.
  - reference: PMID:34731266
    reference_title: "Clinical indications for Kawasaki disease in febrile infants aged less than three months."
    supports: SUPPORT
    snippet: The KD group had a significantly higher level of initial c-reactive
      protein (CRP) compared to the BI and NBI groups, with a cutoff value of
      4.85 mg/dL in comparison with the BI group and 3.32 mg/dL in comparison
      with the NBI group.
    explanation: The study provides specific CRP levels that are elevated in
      Kawasaki Disease compared to bacterial and non-bacterial infections.
- name: Erythrocyte Sedimentation Rate (ESR)
  presence: Elevated
  context: Indicator of inflammation
  evidence:
  - reference: PMID:36604937
    reference_title: "Neutrophil-Lymphocyte Ratio for Predicting Coronary Artery Lesions in Children With Kawasaki Disease."
    supports: SUPPORT
    snippet: NLR >/=2.08 was 82% sensitive and 80% specific in predicting CAL.
      ESR >/=88 mm/h was 85% sensitive and 64% specific in predicting IVIg
      resistance.
    explanation: The study indicates that ESR is elevated in Kawasaki Disease
      and can be used to predict IVIg resistance.
  - reference: PMID:33413220
    reference_title: "Clinical aspects for differential diagnosis of Kawasaki disease shock syndrome: a case control study."
    supports: SUPPORT
    snippet: In comparison between KDSS and TSS, patients with KDSS had a
      significantly higher erythrocyte sedimentation rate (ESR) and
      significantly lower creatinine.
    explanation: The study shows that patients with Kawasaki Disease Shock
      Syndrome (KDSS) have significantly higher ESR levels.
  - reference: PMID:15677370
    reference_title: "High-dose intravenous immunoglobulin downregulates the activated levels of inflammatory indices except erythrocyte sedimentation rate in acute stage of Kawasaki Disease."
    supports: SUPPORT
    snippet: The erythrocyte sedimentation rate (ESR) increased significantly 24
      h after IVIG, and the elevated level was sustained for 7 days.
    explanation: This reference shows that ESR levels are elevated during the
      acute stage of Kawasaki Disease.
- name: Platelet Count
  presence: Elevated
  context: Often seen in the subacute phase
  evidence:
  - reference: PMID:33527178
    reference_title: "Clinical implications of thrombocytosis in acute phase Kawasaki disease."
    supports: SUPPORT
    snippet: In Kawasaki disease (KD), thrombocytosis is commonly found in the
      subacute phase.
    explanation: The abstract states that thrombocytosis (elevated platelet
      count) is commonly found in the subacute phase of Kawasaki disease.
  - reference: PMID:6833960
    reference_title: "Kawasaki disease."
    supports: SUPPORT
    snippet: The second, subacute, phase begins with a decline of the acute
      findings and proceeds with desquamation of rash, joint manifestations,
      thrombocytosis, and cardiac disease.
    explanation: The text explicitly mentions that thrombocytosis occurs during
      the subacute phase of Kawasaki disease.
diagnosis:
- name: Echocardiogram
  description: Cardiac ultrasound to detect coronary artery dilation, aneurysms,
    and other cardiac abnormalities.
  notes: Used to check for coronary artery involvement
  evidence:
  - reference: PMID:28921836
    reference_title: "Clinical assessment of coronary arteries in Kawasaki disease: Focus on echocardiographic assessment."
    supports: SUPPORT
    snippet: Echocardiography is an excellent noninvasive imaging modality for
      evaluation and follow-up of cardiac lesions, especially coronary artery
      changes occurring as a result of Kawasaki disease.
    explanation: The reference clearly states that echocardiography is used to
      evaluate coronary artery changes in Kawasaki disease, supporting the
      statement.
- name: Blood Tests
  description: Laboratory assessment including CRP, ESR, platelet count, and
    white blood cell count to evaluate inflammation.
  notes: Elevated inflammatory markers (CRP and ESR)
  evidence:
  - reference: PMID:36569014
    reference_title: "Kawasaki disease without changes in inflammatory biomarkers: A case report."
    supports: PARTIAL
    snippet: Since KD is a disease caused by arterial inflammation, many
      patients with KD have elevated levels of inflammatory biomarkers, such as
      C-reactive protein (CRP), erythrocyte sedimentation rate (ESR), and serum
      amyloid A protein (SAA) in blood tests.
    explanation: The literature suggests that many patients with Kawasaki
      Disease have elevated inflammatory markers, but it also reports cases
      where such elevations are not observed.
  - reference: PMID:34854940
    reference_title: "Assessing the Association of Kawasaki Disease Symptoms and Echocardiographic Findings."
    supports: SUPPORT
    snippet: Thrombocytosis, conjunctivitis, and oral and/or pharyngeal erythema
      and/or strawberry tongue were associated with higher rates of
      echocardiographic abnormalities.
    explanation: The study indicates that inflammatory markers are associated
      with echocardiographic abnormalities in Kawasaki Disease, supporting the
      statement.
  - reference: PMID:33481812
    reference_title: "A novel score system of blood tests for differentiating Kawasaki disease from febrile children."
    supports: SUPPORT
    snippet: We obtained eight independent predictors (platelets, eosinophil,
      alanine aminotransferase, C-reactive protein, hemoglobin, mean corpuscular
      hemoglobin, mean corpuscular hemoglobin concentration, and monocyte).
    explanation: CRP is identified as one of the independent predictors for
      Kawasaki Disease, supporting the statement.
  - reference: PMID:27881022
    reference_title: "Elevated serum YKL-40 levels in patients with Kawasaki disease."
    supports: SUPPORT
    snippet: YKL-40 concentration in the serum of KD patients significantly
      increased during the acute disease phase compared with those of disease
      controls and healthy controls.
    explanation: The study supports the presence of elevated inflammatory
      markers in Kawasaki Disease patients.
  - reference: PMID:37188888
    reference_title: "Prokineticin 2 as a potential biomarker for the diagnosis of Kawasaki disease."
    supports: SUPPORT
    snippet: PK2 can significantly predict Kawasaki disease independently of CRP
      and ESR (p < 0.0001).
    explanation: CRP and ESR are mentioned as markers that can independently
      predict Kawasaki Disease, supporting the statement.
genetic:
- name: ITPKC
  association: Risk variant reduces negative regulation of Ca2+/NFAT signaling
    leading to enhanced T-cell activation
  notes: Associated with coronary lesions and hyperinflammation; rationale for
    calcineurin inhibitors
- name: FCGR2A
  association: Mediates immune-complex driven neutrophil/monocyte activation
  notes: Mechanistic basis for IVIG competing at FcγRs; genetic association with
    susceptibility
- name: FCGR3A
  association: Mediates immune-complex driven neutrophil/monocyte activation
  notes: Involved in FcγR signaling and immune complex handling
- name: BLK
  association: B lymphoid tyrosine kinase involved in B-cell receptor signaling
  notes: Genetic locus implicated in altered B-cell/plasmablast responses
- name: CD40
  association: Promotes B/T cell and endothelial activation via CD40-CD40L
    co-stimulation
  notes: CD40L on T cells linked to endothelial cell activation and inflammation
- name: HLA-B
  association: HLA associations support antigen-driven or superantigen-like
    T-cell responses
  notes: Shapes disease susceptibility; useful for dissecting trigger(s) and
    host response subtypes
- name: CASP3
  association: Implicated in endothelial cell apoptosis and vascular remodeling
    during acute vasculitis
  notes: Apoptosis modulation is investigational
- name: ORAI1
  association: Store-operated calcium entry component; variants alter SOCE
    leading to dysregulated Ca2+ signaling
  notes: Heightened T-cell responses contribute to hyperinflammation
- name: STIM1
  association: Store-operated calcium entry component; variants alter SOCE
    leading to dysregulated Ca2+ signaling
  notes: Points to SOCE or calcineurin/NFAT modulation as therapeutic option
- name: TGFBR2
  association: TGF-β receptor involved in endothelial-to-mesenchymal transition
  notes: Drives EndMT and luminal myofibroblast proliferation leading to
    stenosis/aneurysm formation
- name: SMAD3
  association: TGF-β signaling mediator involved in vascular remodeling
  notes: Anti-fibrotic or TGF-β pathway modulation is theoretical target
- name: TGFB2
  association: TGF-β signaling involved in chronic vascular remodeling
  notes: Informs long-term vascular remodeling targets
- name: IL1B
  association: IL-1β promotes endothelial injury, inflammation and remodeling
  notes: Direct IL-1 blockade (anakinra) has mechanistic and clinical rationale
    for IVIG-resistant KD
- name: IL1R1
  association: IL-1 receptor; downstream of inflammasome activation
  notes: IL-1 pathway is therapeutic target
- name: TNF
  association: Induces endothelial cell expression of ICAM-1/VCAM-1, iNOS and
    proinflammatory cascade
  notes: Anti-TNF therapy (infliximab) used for IVIG-resistant cases
- name: IL17A
  association: Th17 expansion and elevated IL-17 associate with coronary damage
    and IVIG resistance
  notes: Promotes neutrophil recruitment; IL-17/IL-23 pathway inhibitors are
    investigational
- name: IL23A
  association: IL-23 involved in Th17 axis and IL-17 signaling
  notes: Potential investigational approach in select patients
- name: NLRP3
  association: NLRP3 inflammasome activation leads to IL-1β release and
    pyroptosis
  notes: NLRP3 or IL-1 pathway inhibition offers mechanistic target
- name: NOS3
  association: Reduced eNOS expression/activity leads to decreased NO,
    vasoconstriction, and thrombosis
  notes: Supports vascular-protective strategies and monitoring of endothelial
    function
- name: ICAM1
  association: Upregulated by TNF/IL-1 leading to leukocyte recruitment and
    endothelial dysfunction
  notes: Adhesion-inflammation axis is biomarker and potential target
- name: VCAM1
  association: Upregulated by TNF/IL-1 leading to vascular injury
  notes: Part of adhesion-inflammation axis
treatments:
- name: Intravenous Immunoglobulin (IVIG)
  description: First-line treatment to reduce inflammation and risk of coronary
    artery complications.
  evidence:
  - reference: PMID:23283289
    reference_title: "Advances in the treatment of Kawasaki disease."
    supports: SUPPORT
    snippet: Intravenous immunoglobulin (IVIG) and aspirin is the standard
      initial therapy in the treatment of Kawasaki disease.
    explanation: The literature confirms that IVIG is part of the standard
      initial therapy for Kawasaki disease, aimed at reducing inflammation and
      preventing coronary artery complications.
  - reference: PMID:38135926
    reference_title: "Early Clinical Evaluation of Coronary Artery Lesions in Kawasaki Disease."
    supports: SUPPORT
    snippet: For KD patients, male, children aged 3 to 9 years, and those with
      fever longer than 6 days before intravenous immunoglobulin (IVIG) use were
      more likely to have CAL.
    explanation: The study discusses the use of IVIG and its timing in relation
      to the risk of coronary artery lesions, supporting its role in reducing
      such risks.
  - reference: PMID:24034380
    reference_title: "Kawasaki disease: part II. Complications and treatment."
    supports: SUPPORT
    snippet: The standard of care for treatment is intravenous immunoglobulin
      plus aspirin, but adding corticosteroids may provide additional benefit
      for high-risk patients.
    explanation: The literature states that IVIG is the standard of care for
      treating Kawasaki disease to reduce coronary artery complications.
  - reference: PMID:34535199
    reference_title: "Shaanxi Provincial Diagnosis and Treatment Center of Kawasaki Disease."
    supports: SUPPORT
    snippet: Intravenous immunoglobulin (IVIG) has become an effective treatment
      regimen, which can effectively reduce the incidence of cardiovascular
      complications.
    explanation: The literature confirms that IVIG is effective in reducing
      cardiovascular complications in Kawasaki disease.
  - reference: PMID:32888683
    reference_title: "Update on the Management of Kawasaki Disease."
    supports: SUPPORT
    snippet: Treatment of Kawasaki disease (KD) with intravenous immunoglobulin
      (IVIG) administered within the initial 10 days of fever onset decreases
      the risk of coronary artery aneurysms (CAAs) from ∼ 25% to less than 5%.
    explanation: The literature provides evidence that IVIG significantly
      reduces the risk of coronary artery complications when administered early.
  treatment_term:
    preferred_term: pharmacotherapy
    description: Treatment of disease through the administration of medications.
    term:
      id: MAXO:0000058
      label: pharmacotherapy
- name: Aspirin
  description: Used in high doses for its anti-inflammatory and antipyretic
    effects, followed by a lower dose to prevent blood clots.
  evidence:
  - reference: PMID:9513217
    reference_title: "Kawasaki disease: a dangerous acute childhood illness."
    supports: SUPPORT
    snippet: Treatment includes the hospitalization of the child and subsequent
      administration of high doses of aspirin and intravenous immunoglobulin.
      With recovery, aspirin doses are reduced and the child may be monitored at
      home with outpatient follow-up.
    explanation: This reference confirms that high doses of aspirin are used
      initially for Kawasaki disease, followed by lower doses after recovery.
  - reference: PMID:10935427
    reference_title: "New perspectives in the drug treatment of Kawasaki disease."
    supports: SUPPORT
    snippet: Conventional therapy for KD includes intravenous gammaglobulin (2
      g/kg as a single dose over 12 hours) and aspirin (acetylsalicylic acid;
      high dose until the fourteenth day of illness then low dose).
    explanation: This reference also supports the statement that high doses of
      aspirin are used initially, followed by lower doses.
  - reference: PMID:32159800
    reference_title: "What dose of aspirin should be used in the initial treatment of Kawasaki disease? A meta-analysis."
    supports: PARTIAL
    snippet: Low-dose aspirin plus IVIG might be as effective as high-dose
      aspirin plus IVIG for the initial treatment of Kawasaki disease.
      Considering that high-dose aspirin may cause more adverse reactions than
      low-dose aspirin, low-dose aspirin plus IVIG should be recommended as the
      first-line therapy in the initial treatment of Kawasaki disease.
    explanation: This reference suggests that low-dose aspirin might be equally
      effective as high-dose aspirin and should be recommended to avoid adverse
      reactions, indicating a shift in treatment preference.
  - reference: PMID:28043685
    reference_title: "Medium- or Higher-Dose Acetylsalicylic Acid for Acute Kawasaki Disease and Patient Outcomes."
    supports: PARTIAL
    snippet: The use of medium- or higher-dose ASA in acute Kawasaki disease did
      not prevent CAA. A future randomized controlled trial is needed to
      determine the optimum dose of ASA.
    explanation: This reference indicates that higher doses of aspirin did not
      prevent coronary artery aneurysms and suggests the need for further
      research to determine the optimal dose.
  treatment_term:
    preferred_term: cardiovascular agent therapy
    description: Treatment using medications that affect the cardiovascular
      system, including antiplatelet agents.
    term:
      id: MAXO:0000181
      label: cardiovascular agent therapy
- name: Anakinra
  description: IL-1 receptor antagonist used for IVIG-resistant Kawasaki disease
    to block IL-1-mediated endothelial injury.
  notes: Mechanistic rationale based on NLRP3 inflammasome and IL-1β pathway
    activation
  treatment_term:
    preferred_term: pharmacotherapy
    description: Treatment using IL-1 pathway inhibition for refractory
      inflammation.
    term:
      id: MAXO:0000058
      label: pharmacotherapy
    therapeutic_agent:
    - preferred_term: anakinra
      term:
        id: NCIT:C38717
        label: Anakinra
- name: Cyclosporine
  description: Calcineurin inhibitor used to modulate Ca2+/NFAT signaling in
    genetically susceptible patients.
  notes: Targets dysregulated calcium signaling pathway; used for IVIG-resistant
    cases
  treatment_term:
    preferred_term: pharmacotherapy
    description: Treatment using calcineurin inhibition to reduce T-cell
      activation.
    term:
      id: MAXO:0000058
      label: pharmacotherapy
    therapeutic_agent:
    - preferred_term: cyclosporine
      term:
        id: NCIT:C406
        label: Cyclosporine
- name: Corticosteroids
  description: Used in cases resistant to IVIG or with severe inflammation.
  evidence:
  - reference: PMID:31914832
    reference_title: "The role of corticosteroids in the treatment of Kawasaki disease."
    supports: SUPPORT
    snippet: We suggest using methylprednisolone pulse therapy as an alternative
      rescue therapy for immunoglobulin-resistant KD, as well as identifying
      high-risk patients who need initial corticosteroid with IVIG treatment
      with an adequate route, dose, and duration.
    explanation: The literature supports the use of corticosteroids in cases of
      Kawasaki Disease that are resistant to IVIG or in high-risk patients with
      severe inflammation.
  - reference: PMID:29101553
    reference_title: "Treatment Options for Resistant Kawasaki Disease."
    supports: SUPPORT
    snippet: '"Resistant" Kawasaki disease is defined by the American Heart Association
      as failure to respond within 36 h following the first dose of intravenous immunoglobulin.
      The optimal management of resistant Kawasaki disease remains uncertain, the
      outcomes are potentially serious, and the cost of some treatments is considerable.'
    explanation: This reference discusses the management of resistant Kawasaki
      Disease, which includes considering corticosteroid use.
  - reference: PMID:33541111
    reference_title: "Risk Factors of Coronary Artery Abnormalities and Resistance to Intravenous Immunoglobulin Plus Corticosteroid Therapy in Severe Kawasaki Disease: An Analysis of Post RAISE."
    supports: SUPPORT
    snippet: To prevent CAA, more intensified or adjunctive therapies using
      other agents, such as pulsed methylprednisolone, ciclosporin, infliximab,
      and Anakinra, should be considered for patients with these risk factors.
    explanation: This reference mentions the use of pulsed methylprednisolone (a
      corticosteroid) for patients with Kawasaki Disease who are at risk of
      developing coronary artery abnormalities, indicating severe inflammation.
  treatment_term:
    preferred_term: pharmacotherapy
    description: Treatment using corticosteroids to reduce inflammation in
      refractory cases.
    term:
      id: MAXO:0000058
      label: pharmacotherapy
- name: Infliximab
  description: Anti-TNF monoclonal antibody used for IVIG-resistant Kawasaki
    disease to block TNF-mediated endothelial activation and inflammation.
  notes: Second-line treatment for refractory KD; targets TNF-driven
    inflammation
  evidence:
  - reference: PMID:33541111
    supports: SUPPORT
    snippet: To prevent CAA, more
      intensified or adjunctive therapies using other agents, such as pulsed
      methylprednisolone, ciclosporin, infliximab, and Anakinra, should be considered
      for patients with these risk factors.
    explanation: Infliximab is listed among adjunctive therapies for IVIG-resistant
      KD patients at risk of coronary artery abnormalities.
  treatment_term:
    preferred_term: pharmacotherapy
    description: Anti-TNF biologic therapy for refractory Kawasaki disease.
    term:
      id: MAXO:0000058
      label: pharmacotherapy
    therapeutic_agent:
    - preferred_term: infliximab
      term:
        id: NCIT:C1789
        label: Infliximab
