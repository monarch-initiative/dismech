name: Kawasaki Disease
creation_date: '2025-12-04T16:57:31Z'
updated_date: '2026-04-30T12:00:00Z'
description: Kawasaki Disease is a condition in children that involves
  inflammation of blood vessels throughout the body and is characterized by
  fever, rash, and other symptoms.
category: Pediatric Condition
parents:
- Vasculitis
inheritance:
- name: Polygenic inheritance
  inheritance_term:
    preferred_term: Polygenic inheritance
    term:
      id: HP:0010982
      label: Polygenic inheritance
  description: >
    Kawasaki disease has a multigenic/multifactorial inheritance pattern with
    susceptibility loci identified in ITPKC, FCGR2A, BLK, CD40, CASP3, and
    HLA regions.
  evidence:
  - reference: ORPHA:2331
    supports: SUPPORT
    snippet: "Multigenic/multifactorial"
    explanation: Orphanet classifies the inheritance pattern of Kawasaki disease
      as multigenic/multifactorial.
prevalence:
- population: Children under 5
  percentage: Rare
  evidence:
  - reference: PMID:10392592
    reference_title: "Kawasaki disease."
    supports: REFUTE
    snippet: Most children who contract this illness are less than two years
      old, and 80 percent of affected children are younger than five years of
      age.
    explanation: The statement that Kawasaki disease is rare in children under 5
      is refuted by the literature, which indicates that 80% of affected
      children are younger than five years of age.
  - reference: PMID:36611091
    reference_title: "Epidemiology and risk factors for resistance to treatment of Kawasaki disease in Cyprus."
    supports: REFUTE
    snippet: 83% of patients were < 5 years of age and 10% were < 6 months.
    explanation: The study shows that a significant proportion of Kawasaki
      disease cases occur in children under 5 years of age, refuting the
      statement that it is rare in this population.
  - reference: ORPHA:2331
    supports: SUPPORT
    snippet: "Unknown | Worldwide | Point prevalence | ORPHANET"
    explanation: Orphanet classifies the worldwide point prevalence as unknown,
      reflecting the variability in incidence across populations (highest in
      Japan and East Asia).
progression:
- phase: Onset
  age_range: 6 months to 5 years
  notes: Sudden onset with high fever
  evidence:
  - reference: PMID:36472296
    reference_title: "A CASE OF KAWASAKI DISEASE IN AN EIGHT-YEAR-OLD BOY."
    supports: PARTIAL
    snippet: Given the variety and inconsistency of the clinical symptoms (the
      child had four of the five mandatory criteria together with prolonged
      fever), there was a late diagnosis, namely on day 10 of the disease.
    explanation: This reference mentions prolonged fever as a symptom of
      Kawasaki Disease but does not specify the sudden onset of high fever.
  - reference: PMID:34459958
    reference_title: "Kawasaki disease in children younger than 6 months of age: characteristics of a Spanish cohort."
    supports: PARTIAL
    snippet: A retrospective study that compared children younger than 6 months
      versus older children of a Spanish cohort of patients diagnosed with
      Kawasaki disease between 2011 and 2016 (Kawa-Race study).
    explanation: This reference provides information on Kawasaki Disease in
      children younger than 6 months and older but does not specifically mention
      the age range of 6 months to 5 years or the sudden onset with high fever.
  - reference: PMID:37553209
    reference_title: "Rising Kawasaki disease incidence in New Zealand: analysis of national population incidence and outcomes 2000-2017."
    supports: PARTIAL
    snippet: The mean age was 39.8 months (SD 37) and 592 (59%) were boys.
    explanation: This reference indicates that the mean age of Kawasaki Disease
      patients was within the 6 months to 5 years range but does not
      specifically mention the sudden onset with high fever.
  - reference: PMID:31910632
    reference_title: "Japanese Kawasaki Disease Scoring Systems: Are they Applicable to the Iranian Population?"
    supports: PARTIAL
    snippet: Kawasaki disease (KD) is the most frequent cause of coronary artery
      aneurysm (CAA) in children.
    explanation: This reference focuses on coronary artery aneurysm in children
      with Kawasaki Disease but does not provide specific details about the age
      range or the sudden onset with high fever.
  - reference: PMID:36611091
    reference_title: "Epidemiology and risk factors for resistance to treatment of Kawasaki disease in Cyprus."
    supports: PARTIAL
    snippet: 83% of patients were < 5 years of age and 10% were < 6 months.
    explanation: This reference mentions that 83% of Kawasaki Disease patients
      were under 5 years of age but does not specify the sudden onset with high
      fever.
- phase: Acute
  duration: 1-2 weeks
  notes: High fever, rash, conjunctivitis, swollen hands and feet
  evidence:
  - reference: PMID:9665974
    reference_title: "Kawasaki syndrome."
    supports: PARTIAL
    snippet: The illness is manifested by prolonged fever, conjunctival
      injection, enanthem, exanthem, erythema and swelling of the hands and
      feet, and cervical adenopathy. These acute features of illness are
      self-limiting.
    explanation: The reference confirms the symptoms mentioned in the statement
      (high fever, rash, conjunctivitis, swollen hands and feet) during the
      acute phase of Kawasaki Disease. However, it does not specify the exact
      duration of 1-2 weeks.
  - reference: PMID:31974671
    reference_title: "Clinico-laboratory profile of Kawasaki disease with arthritis in children."
    supports: PARTIAL
    snippet: Arthritis in KD is usually non-erosive, self-limiting, and responds
      well to a short course of NSAIDs.
    explanation: The reference mentions that arthritis in KD is self-limiting,
      which implies a limited duration. However, it does not explicitly confirm
      the 1-2 week duration for the acute phase.
  - reference: PMID:39117827
    reference_title: "Kawasaki Disease-Associated Cytokine Storm Syndrome."
    supports: PARTIAL
    snippet: Kawasaki disease (KD) is a hyperinflammatory syndrome manifesting
      as an acute systemic vasculitis characterized by fever, nonsuppurative
      conjunctival injection, rash, oral mucositis, extremity changes, and
      cervical lymphadenopathy.
    explanation: The reference confirms the symptoms mentioned in the statement
      during the acute phase of Kawasaki Disease. However, it does not specify
      the exact duration of 1-2 weeks.
- phase: Subacute
  duration: 2-4 weeks
  notes: Peeling skin, joint pain, possible coronary artery changes
  evidence:
  - reference: PMID:28580712
    reference_title: "Kawasaki disease: State of the art."
    supports: PARTIAL
    snippet: Kawasaki disease begins as a necrotizing arteritis with
      neutrophilic infiltrate, followed by subacute/chronic changes and luminal
      myofibroblastic proliferation that can cause coronary artery stenosis.
    explanation: This reference mentions the subacute phase and coronary artery
      changes but does not specify the duration of 2-4 weeks or mention peeling
      skin and joint pain.
  - reference: PMID:33453126
    reference_title: "Kawasaki disease for the paediatric dermatologist: skin manifestations and new insights into the pathophysiology."
    supports: PARTIAL
    snippet: All children with KD have fever accompanied by clinical signs, with
      four of the five classic criteria for complete KD being mucocutaneous,
      thus creating an important role for dermatologists.
    explanation: This reference discusses skin manifestations, which could
      include peeling, but does not specify the subacute phase duration or joint
      pain.
- phase: Convalescent
  duration: 6-8 weeks
  notes: Symptoms resolve, but coronary artery abnormalities may persist
  evidence:
  - reference: PMID:28580712
    reference_title: "Kawasaki disease: State of the art."
    supports: PARTIAL
    snippet: Kawasaki disease is an acute febrile arteritis of childhood that
      can result in coronary artery aneurysms if untreated in the first 10 and
      ideally 7 days of illness. Kawasaki disease begins as a necrotizing
      arteritis with neutrophilic infiltrate, followed by subacute/chronic
      changes and luminal myofibroblastic proliferation that can cause coronary
      artery stenosis.
    explanation: The literature indicates that Kawasaki disease can lead to
      coronary artery abnormalities, but it does not specify that the
      convalescent phase lasts 6-8 weeks. It supports the persistence of
      coronary artery abnormalities but does not confirm the exact duration of
      the convalescent phase.
  - reference: PMID:17033807
    reference_title: "Predictive risk factors for coronary artery abnormalities in Kawasaki disease."
    supports: PARTIAL
    snippet: Conclusively, the most important predictor of CAA in KD is total
      duration of fever longer than 8 days. Early identification of IVGG
      non-responders and active therapeutic intervention for fever in KD cases
      might decrease the incidence of CAA.
    explanation: This reference discusses the importance of early intervention
      to prevent coronary artery abnormalities but does not provide specific
      information about the duration of the convalescent phase.
  - reference: PMID:29437127
    reference_title: "Kawasaki Disease."
    supports: NO_EVIDENCE
    snippet: Kawasaki Disease.
    explanation: This reference does not provide specific information about the
      duration of the convalescent phase or the persistence of coronary artery
      abnormalities.
pathophysiology:
- name: Vascular Inflammation
  description: Widespread inflammation of medium-sized arteries, including
    coronary arteries.
  cell_types:
  - preferred_term: vascular endothelial cell
    description: Primary target cells undergoing activation and dysfunction
    term:
      id: CL:0000071
      label: blood vessel endothelial cell
  - preferred_term: neutrophil
    description: Recruited to vessel walls during necrotizing arteritis phase
    term:
      id: CL:0000775
      label: neutrophil
  - preferred_term: monocyte
    description: Activated by immune complexes and FcγR signaling
    term:
      id: CL:0000576
      label: monocyte
  - preferred_term: macrophage
    description: Present in coronary lesions producing cytokines
    term:
      id: CL:0000235
      label: macrophage
  biological_processes:
  - preferred_term: endothelial cell activation
    description: Cytokine-driven upregulation of adhesion molecules and
      inflammatory mediators
    term:
      id: GO:0042118
      label: endothelial cell activation
  - preferred_term: leukocyte adhesion to vascular endothelial cell
    description: ICAM-1/VCAM-1 mediated leukocyte recruitment
    term:
      id: GO:1904996
      label: positive regulation of leukocyte adhesion to vascular endothelial
        cell
  - preferred_term: inflammatory response
    description: Systemic hyperinflammatory syndrome with cytokine cascades
    term:
      id: GO:0006954
      label: inflammatory response
  locations:
  - preferred_term: coronary artery
    description: Primary site of arteritis and aneurysm formation
    term:
      id: UBERON:0001621
      label: coronary artery
  - preferred_term: artery wall
    description: All three layers (intima, media, adventitia) undergo
      inflammation
    term:
      id: UBERON:0000415
      label: artery wall
  downstream:
  - target: Aneurysm Formation
    description: Coronary arteritis causes structural damage to arterial walls
      leading to dilation and aneurysm formation.
    evidence:
    - reference: PMID:21447126
      reference_title: "Pathogenesis of Kawasaki disease."
      supports: SUPPORT
      snippet: Histologically, coronary arteritis begins 6-8 days after the
        onset of KD, and leads immediately to inflammation of all layers of the
        artery. The inflammation spreads completely around the artery; as a
        result, structural components of the artery undergo intense damage; the
        artery then begins to dilate.
      explanation: This reference directly establishes the mechanistic link
        between coronary arteritis and aneurysm formation through structural
        damage.
  evidence:
  - reference: PMID:23188196
    reference_title: "Kawasaki disease: basic and pathological findings."
    supports: SUPPORT
    snippet: Kawasaki disease (KD) is considered to be a kind of systemic
      vasculitis syndrome. It most frequently affects infants and young children
      and primarily invades medium-sized muscular arteries, including the
      coronary arteries.
    explanation: The literature confirms that Kawasaki disease involves
      widespread inflammation of medium-sized arteries, including coronary
      arteries.
  - reference: PMID:31599798
    reference_title: "One year in review: Kawasaki disease."
    supports: SUPPORT
    snippet: Kawasaki disease is a childhood vasculitis of unknown origin, whose
      major complication is the development of coronary artery aneurysms (CAA).
    explanation: The literature supports that Kawasaki disease leads to vascular
      inflammation and aneurysm formation.
  - reference: PMID:27090101
    reference_title: "[Coronary artery aneurysms probably due to Kawasaki's disease]."
    supports: SUPPORT
    snippet: Coronary angiography showed multiple aneurysms which suggested
      sequelae of misdiagnosed Kawasaki disease.
    explanation: The case report indicates that Kawasaki disease can lead to
      aneurysm formation as a result of vascular inflammation.
  - reference: PMID:36102118
    reference_title: "Long-term vascular dysfunction in Kawasaki disease: systematic review and meta-analyses."
    supports: SUPPORT
    snippet: Long-term physiological dysfunction in coronary/systemic
      vasculature may persist in individuals with Kawasaki disease even in the
      absence of coronary artery abnormalities.
    explanation: The literature suggests long-term vascular dysfunction due to
      Kawasaki disease, supporting the idea of widespread vascular inflammation.
  - reference: PMID:35420684
    reference_title: "Silent Kawasaki Disease Affecting Multiple Coronary Arteries in a 39-Year-Old Egyptian Woman."
    supports: SUPPORT
    snippet: Kawasaki disease, an acute febrile illness, can cause vasculitis in
      the coronary arteries.
    explanation: The literature confirms that Kawasaki disease causes
      inflammation in coronary arteries, leading to complications such as
      aneurysms.
  - reference: PMID:16990356
    reference_title: "The pathophysiology of coronary artery aneurysms in Kawasaki disease: role of matrix metalloproteinases."
    supports: SUPPORT
    snippet: Kawasaki disease is an acute inflammatory syndrome that takes the
      form of systemic vasculitis, and predominantly affects children. Important
      complications of this disease are coronary artery dilation and aneurysm
      formation.
    explanation: The literature supports the statement that Kawasaki disease
      involves widespread vascular inflammation and aneurysm formation.
- name: Immune Response Dysregulation
  description: An abnormal immune response leading to vessel wall damage and
    inflammation.
  cell_types:
  - preferred_term: CD8-positive, alpha-beta T cell
    description: CD8+ T cells present in coronary lesions
    term:
      id: CL:0000625
      label: CD8-positive, alpha-beta T cell
  - preferred_term: T-helper 17 cell
    description: Th17 expansion associated with coronary damage and IVIG
      resistance
    term:
