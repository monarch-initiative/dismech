    reference_title: "WT1 Disorder."
    supports: SUPPORT
    evidence_source: OTHER
    snippet: "The diagnosis of WT1 disorder is established in a proband with suggestive clinical findings and a heterozygous pathogenic variant in WT1 identified by molecular genetic testing."
    explanation: >-
      GeneReviews defines molecular confirmation for the WT1 disorder continuum
