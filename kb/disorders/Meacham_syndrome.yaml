        coelomic mesothelial developmental defect.
  - target: Gonadal and Müllerian Differentiation Defect
    description: >-
      WT1-related gonadal developmental disruption can impair fetal testicular
      differentiation and the testosterone/Müllerian-inhibitory-factor program
      needed for virilization and Müllerian regression.
    evidence:
