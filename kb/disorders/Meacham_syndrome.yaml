name: Meacham syndrome
creation_date: '2026-04-11T16:20:34Z'
updated_date: '2026-04-11T18:41:00Z'
description: >-
  Meacham syndrome is a very rare WT1-related multiple malformation syndrome
  characterized by 46,XY disorder of sex development with male
  pseudohermaphroditism and mullerian structures, congenital diaphragmatic
  defects, pulmonary malformations such as hypoplastic lungs, and complex
  congenital heart malformations. The disorder is caused by heterozygous
  missense variants in the C-terminal zinc finger DNA-binding domains of WT1,
  which disturb mesothelial, gonadal, diaphragmatic, and cardiopulmonary
  developmental programs.
category: Mendelian
parents:
- WT1 disorder
- disorder of sexual differentiation
synonyms:
- Meacham-Winn-Culler syndrome
