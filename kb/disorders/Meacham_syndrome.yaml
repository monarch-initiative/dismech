datasets: []
notes: >-
  Meacham syndrome is modeled here as a Meacham presentation within the WT1
  disorder continuum. Steroid-resistant nephrotic syndrome, diffuse mesangial
  sclerosis, and Wilms tumor are not defining features of classic Meacham
  syndrome and may not appear in early-lethal cardiopulmonary presentations,
  but WT1-confirmed survivors should receive standard WT1 disorder renal,
  Wilms tumor, gonadal-insufficiency, and gonadoblastoma surveillance. Asta
  deep research was run for Meacham syndrome but retrieved largely irrelevant
  literature, so primary curation relied on PubMed case reports and WT1
  disorder reviews after the required Asta step.
