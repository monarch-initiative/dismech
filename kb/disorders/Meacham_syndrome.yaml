    reference_title: "WT1 Disorder."
    supports: PARTIAL
    evidence_source: OTHER
    snippet: "Surveillance: Monitor for first appearance of the following: proteinuria every six months until age ten years, yearly thereafter; Wilms tumor every three months until age seven years; early gonadal insufficiency yearly after puberty."
    explanation: >-
      GeneReviews supports renal, Wilms tumor, and gonadal-insufficiency
