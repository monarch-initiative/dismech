- name: Renal and Wilms tumor risk assessment
  description: >-
    WT1-confirmed survivors should receive renal assessment, including
    proteinuria monitoring and renal or abdominal imaging for Wilms tumor
    surveillance, because nephropathy and tumor risk belong to the broader WT1
    disorder spectrum even when they are not defining Meacham features.
  diagnosis_term:
    preferred_term: clinical assessment
    term:
      id: MAXO:0000487
      label: clinical assessment
  results: Proteinuria, renal anomalies, or renal masses redirect management toward WT1-disorder renal and tumor surveillance.
  evidence:
