name: Spaceflight Associated Neuro-Ocular Syndrome
creation_date: '2026-03-17T00:00:00Z'
updated_date: '2026-03-17T00:00:00Z'
category: Complex
parents:
- Neuro-Ophthalmologic Disorder
- Spaceflight-Induced Condition
description: >
  Spaceflight Associated Neuro-Ocular Syndrome (SANS) is a constellation of
  neuro-ophthalmic findings observed in astronauts during and after long-duration
  spaceflight. The syndrome includes optic disc edema, globe flattening,
  choroidal and retinal folds, hyperopic refractive shifts, and cotton wool spots.
  SANS is hypothesized to result from cephalad fluid shifts in microgravity
  leading to elevated intracranial pressure, cerebral venous congestion, and
  compartmentalization of cerebrospinal fluid within the optic nerve sheath.
  It is a major physiologic barrier to future planetary spaceflight missions.
pathophysiology:
- name: Cephalad Fluid Shift in Microgravity
  description: >
    In microgravity, the absence of hydrostatic pressure gradients causes a
    redistribution of body fluids toward the head. This cephalad fluid shift
    increases venous pressure in the head and neck, elevates intracranial
    pressure, and contributes to optic disc edema and posterior globe flattening.
  cell_types:
  - preferred_term: vascular endothelial cell
    term:
      id: CL:0000071
      label: blood vessel endothelial cell
  biological_processes:
  - preferred_term: cerebrospinal fluid circulation
    term:
      id: GO:0090660
      label: cerebrospinal fluid circulation
  evidence:
  - reference: PMID:21849212
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      We hypothesize that the optic nerve and ocular changes we describe may
      result from cephalad fluid shifts brought about by prolonged microgravity
      exposure.
    explanation: >-
      The landmark paper describing SANS findings in 7 astronauts proposes
      cephalad fluid shifts as the primary mechanism.
  - reference: PMID:39827235
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      several hypotheses have been proposed including increased intracranial
      pressure, cerebral venous congestion and glymphatic stasis,
      compartmentalization of CSF within the orbital nerve sheath sub-arachnoid
      space (SAS), upward brain shift, inflammation, disrupted axoplasmic
      transport, and radiation exposure
    explanation: >-
      This 2025 multifactorial analysis reviews all proposed SANS mechanisms,
      noting they may be interconnected rather than mutually exclusive.
- name: Elevated Intracranial Pressure
  description: >
    Chronic mildly elevated intracranial pressure during long-duration spaceflight
    is hypothesized to transmit along the optic nerve sheath, compressing the optic
    nerve and causing papilledema, globe flattening, and choroidal folds. Unlike
    terrestrial idiopathic intracranial hypertension, the ICP elevation in SANS
    is typically mild and not associated with severe headaches.
  cell_types:
  - preferred_term: retinal ganglion cell
    term:
      id: CL:0000740
      label: retinal ganglion cell
  - preferred_term: retinal astrocyte
    term:
      id: CL:4033015
      label: retinal astrocyte
  biological_processes:
  - preferred_term: cerebrospinal fluid secretion
    term:
      id: GO:0033326
      label: cerebrospinal fluid secretion
  evidence:
  - reference: PMID:21849212
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Lumbar punctures performed in the 4 with disc edema documented opening
      pressures of 22, 21, 28, and 28.5 cm H(2)O performed 60, 19, 12, and 57
      days postmission, respectively.
    explanation: >-
      Direct lumbar puncture measurements in post-flight astronauts demonstrated
      mildly elevated opening pressures, supporting the elevated ICP hypothesis.
  - reference: PMID:33117025
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Two main hypotheses are proposed for the pathophysiology of SANS. The first
      being elevated intracranial pressure and the second compartmentalization of
      CSF to the globe. These hypotheses are not mutually exclusive
    explanation: >-
      This systematic review identifies elevated ICP as one of two primary
      hypothesized mechanisms, noting the two are not mutually exclusive.
- name: Optic Nerve Sheath Distension and CSF Compartmentalization
  description: >
    Increased cerebrospinal fluid pressure within the optic nerve sheath leads to
    sheath distension, which can be visualized on orbital MRI and ocular ultrasound.
    Compartmentalization of CSF within the orbital subarachnoid space may create
    a pressure differential that contributes to optic disc edema independently of
    overall ICP elevation.
  cell_types:
  - preferred_term: retinal ganglion cell
    term:
      id: CL:0000740
      label: retinal ganglion cell
  evidence:
  - reference: PMID:33083526
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      potential changes in optic nerve (ON) tortuosity and ON sheath (ONS)
      distension may indicate altered cerebrospinal fluid dynamics during
      weightlessness
    explanation: >-
      Quantitative MRI study of astronauts showing that optic nerve and sheath
      changes reflect altered CSF dynamics in microgravity.
  - reference: PMID:33083526
    supports: PARTIAL
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      a subject diagnosed with optic disc edema (Frisen Grade 1, right eye)
      displayed increased ONS area post flight, although this increase is
      relatively small compared to clinical populations with increased ICP
    explanation: >-
      While one astronaut with optic disc edema showed increased ONS area,
      the changes were small compared to terrestrial ICP patients, suggesting
      mechanisms beyond simple ICP elevation.
- name: Choroidal Engorgement and Vascular Congestion
  description: >
    Microgravity-induced venous congestion leads to choroidal thickening and
    engorgement. This contributes to hyperopic refractive shifts and choroidal
    folds observed in affected astronauts. The lack of normal gravitational
    venous drainage impairs outflow from the orbital and ocular vasculature.
  cell_types:
  - preferred_term: choroidal cell of the eye
    term:
      id: CL:0000348
      label: choroidal cell of the eye
  evidence:
  - reference: PMID:32047839
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      a spaceflight-induced decrease in CSF drainage into the venous system and
      cerebral venous congestion could potentially result in a rise in ICP that
      may be transferred down the orbital optic nerve sheaths resulting in optic
      nerve sheath expansion, stasis of axoplasmic flow and globe flattening
    explanation: >-
      Review describing how venous congestion in microgravity contributes to
      altered ocular hemodynamics and globe flattening.
- name: Retinal Oxidative Stress and Gene Expression Changes
  description: >
    Spaceflight induces gene expression changes in retinal tissue, with
    differentially expressed genes enriched for visual perception, phototransduction,
    and photoreceptor phenotypes. Oxidative stress-related damage and epigenetic
    alterations in the retina may contribute to the ocular pathology observed in SANS.
  cell_types:
  - preferred_term: retinal ganglion cell
    term:
      id: CL:0000740
      label: retinal ganglion cell
  biological_processes:
  - preferred_term: visual perception
    term:
      id: GO:0007601
      label: visual perception
  evidence:
  - reference: PMID:31527661
    supports: SUPPORT
    evidence_source: MODEL_ORGANISM
    snippet: >-
      RNA sequencing detected 600 differentially expressed genes (DEGs) in
      murine spaceflight retinas, which were enriched for genes related to
      visual perception, the phototransduction pathway, and numerous retina and
      photoreceptor phenotype categories
    explanation: >-
      Mouse retinas from ISS-flown animals showed significant transcriptomic
      changes in visual perception and phototransduction pathways.
  - reference: PMID:34179686
    supports: SUPPORT
    evidence_source: MODEL_ORGANISM
    snippet: >-
      Several biological pathways involved in retinal diseases such as macular
      degeneration were significantly altered
    explanation: >-
      Epigenomic analysis of spaceflight mouse retinas revealed alterations
      in pathways associated with retinal disease.
phenotypes:
- category: Ophthalmologic
  name: Optic Disc Edema
  frequency: VERY_FREQUENT
  description: >
    Swelling of the optic disc (papilledema) is the hallmark finding of SANS,
    observed in a significant proportion of astronauts after long-duration
    spaceflight on the International Space Station. Variable Frisén grades
    have been documented.
  phenotype_term:
    preferred_term: Papilledema
    term:
      id: HP:0001085
      label: Papilledema
  evidence:
  - reference: PMID:21849212
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      After 6 months of space flight, 7 astronauts had ophthalmic findings,
      consisting of disc edema in 5, globe flattening in 5, choroidal folds in
      5, cotton wool spots (CWS) in 3, nerve fiber layer thickening by OCT in
      6, and decreased near vision in 6 astronauts.
    explanation: >-
      Landmark study documenting optic disc edema in 5 of 7 examined astronauts
      after long-duration spaceflight.
  - reference: PMID:31162175
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      SANS is currently clinically defined by the development of optic disc
      edema during prolonged exposure to the weightless (microgravity) environment
    explanation: >-
      Optic disc edema is considered the defining clinical feature of SANS.
- category: Ophthalmologic
  name: Posterior Globe Flattening
  frequency: FREQUENT
  description: >
    Flattening of the posterior aspect of the globe, detected on MRI, is a
    characteristic structural change in SANS. It results from increased
    retrobulbar pressure transmitted through the optic nerve sheath and has
    been shown to persist for years after return to Earth.
  phenotype_term:
    preferred_term: Posterior globe flattening
    term:
      id: HP:0012795
      label: Abnormal optic disc morphology
  evidence:
  - reference: PMID:21849212
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Five of 7 with near vision complaints had a hyperopic shift ≥+0.50
      diopters (D) between pre/postmission spherical equivalent refraction in 1
      or both eyes (range, +0.50 to +1.75 D). These 5 showed globe flattening
      on MRI.
    explanation: >-
      Globe flattening on MRI was documented in 5 of 7 astronauts and
      correlated with hyperopic refractive shifts.
- category: Ophthalmologic
  name: Choroidal and Retinal Folds
  frequency: FREQUENT
  description: >
    Folds in the choroid and retina detected on fundoscopy and optical coherence
    tomography, resulting from choroidal engorgement and posterior globe
    deformation in microgravity. These may persist after return to Earth.
  phenotype_term:
    preferred_term: Choroidal folds
    term:
      id: HP:0025568
      label: Abnormal morphology of the choroidal vasculature
  evidence:
  - reference: PMID:21849212
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      After 6 months of space flight, 7 astronauts had ophthalmic findings,
      consisting of disc edema in 5, globe flattening in 5, choroidal folds in
      5, cotton wool spots (CWS) in 3
    explanation: >-
      Choroidal folds were found in 5 of 7 examined astronauts after
      long-duration spaceflight.
  - reference: PMID:32047839
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      the clinical manifestations of SANS including: unilateral and bilateral
      optic disc edema, globe flattening, choroidal and retinal folds, hyperopic
      refractive error shifts, and focal areas of ischemic retina (i.e., cotton
      wool spots)
    explanation: >-
      Comprehensive review confirming choroidal and retinal folds as core
      clinical features of SANS.
- category: Ophthalmologic
  name: Cotton Wool Spots
  frequency: OCCASIONAL
  description: >
    Retinal cotton wool spots representing focal areas of retinal nerve fiber
    layer ischemia, observed in some astronauts with SANS.
  phenotype_term:
    preferred_term: Retinal cotton wool spots
    term:
      id: HP:0031606
      label: Retinal cotton wool spot
  evidence:
  - reference: PMID:21849212
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      After 6 months of space flight, 7 astronauts had ophthalmic findings,
      consisting of disc edema in 5, globe flattening in 5, choroidal folds in
      5, cotton wool spots (CWS) in 3
    explanation: >-
      Cotton wool spots were found in 3 of 7 examined astronauts.
- category: Ophthalmologic
  name: Hyperopic Refractive Shift
  frequency: FREQUENT
  description: >
    A shift toward hyperopia (farsightedness) occurs in affected astronauts,
    likely due to posterior globe flattening shortening the axial length of the
    eye. Approximately 29% of short-duration and 60% of long-duration astronauts
    report degraded visual acuity.
  phenotype_term:
    preferred_term: Hyperopic shift
    term:
      id: HP:0000540
      label: Hypermetropia
  evidence:
  - reference: PMID:21849212
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      The 300 postflight questionnaires documented that approximately 29% and
      60% of astronauts on short and long-duration missions, respectively,
      experienced a degradation in distant and near visual acuity.
    explanation: >-
      Large survey documenting high prevalence of visual acuity degradation
      in astronauts, with higher rates after long-duration missions.
  - reference: PMID:21849212
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Five of 7 with near vision complaints had a hyperopic shift ≥+0.50
      diopters (D) between pre/postmission spherical equivalent refraction in 1
      or both eyes (range, +0.50 to +1.75 D).
    explanation: >-
      Quantitative measurement of hyperopic shift in astronauts after
      long-duration spaceflight.
- category: Ophthalmologic
  name: Optic Nerve Sheath Distension
  frequency: FREQUENT
  description: >
    Distension of the optic nerve sheath with increased cerebrospinal fluid,
    visualized on MRI and ultrasound, reflecting elevated perioptic
    subarachnoid space pressure.
  phenotype_term:
    preferred_term: Optic nerve sheath distension
    term:
      id: HP:6001281
      label: Optic nerve sheath dilatation
  evidence:
  - reference: PMID:33083526
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Ten astronauts undergoing ~6-month missions on the International Space
      Station (ISS) underwent high-resolution magnetic resonance imaging (MRI)
      preflight and at five recovery time points extending to 1 year after
      return from the ISS.
    explanation: >-
      Longitudinal MRI study quantifying optic nerve and sheath changes in
      10 astronauts before and after ISS missions.
- category: Neurologic
  name: Mildly Elevated Intracranial Pressure
  frequency: FREQUENT
  description: >
    Opening pressures measured via lumbar puncture in post-flight astronauts
    are mildly elevated above the normal terrestrial range. Unlike idiopathic
    intracranial hypertension, severe headaches are not typically prominent.
  phenotype_term:
    preferred_term: Increased intracranial pressure
    term:
      id: HP:0002516
      label: Increased intracranial pressure
  evidence:
  - reference: PMID:21849212
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Lumbar punctures performed in the 4 with disc edema documented opening
      pressures of 22, 21, 28, and 28.5 cm H(2)O performed 60, 19, 12, and 57
      days postmission, respectively.
    explanation: >-
      Direct measurement of elevated opening pressures in post-flight
      astronauts. Normal range is typically 7-18 cm H2O.
  - reference: PMID:30286250
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Patients with elevated intracranial pressure (ICP) exhibit neuro-ocular
      symptoms including headache, papilloedema and loss of vision. Some of
      these symptoms are also present in astronauts during and after prolonged
      space-flight where lack of gravitational stress prevents daily lowering
      of ICP associated with upright posture.
    explanation: >-
      Confirms that astronauts exhibit symptoms consistent with elevated ICP
      due to absence of gravitational unloading during spaceflight.
- category: Ophthalmologic
  name: Reduced Visual Acuity
  frequency: OCCASIONAL
  description: >
    Decreased visual acuity has been reported in astronauts during and after
    long-duration spaceflight. Although correctable with spectacles, some
    vision changes remain unresolved years after flight.
  phenotype_term:
    preferred_term: Reduced visual acuity
    term:
      id: HP:0007663
      label: Reduced visual acuity
  evidence:
  - reference: PMID:21849212
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Some of these vision changes remain unresolved years after flight.
    explanation: >-
      Documents persistent visual acuity changes in some astronauts even
      years after return from spaceflight.
  - reference: PMID:33117025
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      even with persistent anatomic and physiologic neuro-ocular changes, any
      functional impact has been correctable with spectacles
    explanation: >-
      Systematic review notes functional visual changes are correctable
      with spectacles, though structural changes may persist.
environmental:
- name: Microgravity Exposure
  description: >
    Prolonged exposure to microgravity during spaceflight is the primary
    environmental factor driving SANS. The condition is predominantly seen
    after missions of 6 months or longer aboard the International Space Station.
    Over the last 10 years, approximately 1 in 3 astronauts flying long-duration
    ISS missions have presented with one or more SANS findings.
  evidence:
  - reference: PMID:31162175
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Over the last 10 years, ~1 in 3 astronauts flying long-duration ISS
      missions have presented with ≥1 of these ocular findings.
    explanation: >-
      Establishes the epidemiologic association between long-duration
      microgravity exposure and SANS.
  - reference: PMID:37072472
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Long-duration spaceflight is associated with neurologic and ophthalmic
      clinical and imaging findings in astronauts termed spaceflight associated
      neuro-ocular syndrome (SANS).
    explanation: >-
      Confirms the association of SANS specifically with long-duration
      spaceflight.
- name: Elevated Ambient Carbon Dioxide
  description: >
    The ISS cabin atmosphere contains CO2 levels higher than terrestrial
    ambient (typically 2-5 mmHg vs <1 mmHg on Earth). Elevated CO2 causes
    cerebral vasodilation, which may exacerbate intracranial pressure
    elevation and contribute to SANS pathology.
  evidence:
  - reference: PMID:32047839
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      These potential risk factors include high salt diets, rigorous resistive
      exercise, exposure to elevated ambient CO2 levels and possible defects in
      the vitamin B12-dependent 1-carbon transfer pathways.
    explanation: >-
      Elevated ambient CO2 on the ISS is identified as a potential risk
      factor that may augment intracranial pressure during spaceflight.
treatments:
- name: Lower Body Negative Pressure
  description: >
    Application of negative pressure to the lower body to counteract cephalad
    fluid shift by drawing blood and fluids toward the legs. LBNP at 20 mmHg
    has been demonstrated to safely reduce intracranial pressure without
    impairing cerebral perfusion, and is a leading countermeasure candidate
    for SANS during spaceflight.
  evidence:
  - reference: PMID:30286250
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      An LBNP of 20 mmHg may be the optimal level to lower ICP without
      impairing CPP to counteract spaceflight-associated neuro-ocular syndrome
      in astronauts.
    explanation: >-
      Clinical study demonstrating LBNP effectively lowers ICP in a
      dose-dependent fashion while maintaining cerebral perfusion pressure.
  - reference: PMID:33335101
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Lower body negative pressure (LBNP) can simulate gravitational stress
      during spaceflight that is likely to counteract SANS and venous
      thrombosis, but the ideal dose and method of delivery have yet to be
      determined.
    explanation: >-
      Review supporting LBNP as a promising countermeasure while noting
      the need to optimize dosing for in-flight use.
- name: Mobile Lower Body Negative Pressure Suit
  description: >
    A wearable negative pressure suit that allows astronauts to apply
    caudal-directed fluid redistribution during normal crew activities,
    serving as a practical in-flight countermeasure.
  evidence:
  - reference: PMID:31747995
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      The flexible GravitySuit at 20 mmHg LBNP comfortably induced mechanical
      loading and desired fluid displacement while maintaining the mobility of
      hips and knee joints.
    explanation: >-
      The GravitySuit mobile LBNP device induced footward fluid shift and
      mechanical loading at 20 mmHg without interfering with daily activity,
      providing a feasible in-flight countermeasure.
