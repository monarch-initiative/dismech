inheritance:
- name: Autosomal Dominant
  description: >-
    LCAEOD is inherited in an autosomal dominant manner, caused by heterozygous
    missense variants in TUBB4B. Vertical transmission has been documented,
    including an affected mother and two affected children sharing the same
    variant.
  inheritance_term:
    preferred_term: Autosomal dominant inheritance
    term:
      id: HP:0000006
      label: Autosomal dominant inheritance
prevalence:
- population: Published clinical reports
  percentage: Exceedingly rare; only a small number of families reported worldwide
  notes: >-
    LCAEOD was delineated in 2017 from a multiplex family and three simplex
    case subjects, and a second multiplex (Hungarian) family was reported in
    2022. The entity remains exceedingly rare, with only a handful of families
    described in the literature; the recurrent Arg391 substitution accounts for
    most reported cases.
pathophysiology:
- name: TUBB4B Microtubule Dynamics Defect
  description: >-
    TUBB4B encodes the beta-tubulin 4B (class IVb) isotype, a subunit of the
    alpha/beta-tubulin heterodimer that polymerizes to form microtubules and
    is required for the maintenance of microtubule stability. The recurrent
    disease-associated substitution affects Arg391, a residue that contributes
    to the longitudinal binding pocket interacting with alpha-tubulin in the
    adjacent heterodimer. Mutant TUBB4B still folds, forms heterodimers, and
    co-assembles into the endogenous microtubule lattice, but the dynamics of
    growing microtubules are consistently altered, with a dampening impact on
    normal microtubule growth. This primary lesion in microtubule behavior is
    the molecular basis of the sensorineural (retinal and cochlear) phenotype.
  biological_processes:
  - preferred_term: Microtubule cytoskeleton organization
    term:
      id: GO:0000226
      label: microtubule cytoskeleton organization
    modifier: ABNORMAL
  - preferred_term: Regulation of microtubule dynamics
    term:
      id: GO:0031110
      label: regulation of microtubule polymerization or depolymerization
    modifier: ABNORMAL
  cellular_components:
  - preferred_term: Microtubule
    term:
      id: GO:0005874
      label: microtubule
  downstream:
  - target: Rod Photoreceptor Degeneration and Leber Congenital Amaurosis
    description: >-
      Impaired microtubule dynamics in retinal photoreceptors — whose outer
      segments are served by a microtubule-based connecting cilium — lead to
      early photoreceptor neurodegeneration and congenital blindness.
  - target: Cochlear Hair Cell Dysfunction and Sensorineural Hearing Loss
    description: >-
      Impaired microtubule dynamics in the inner ear compromise sensory hair
      cell function, producing early-onset sensorineural hearing loss.
