genetic:
- name: TUBB4B Mutations
  association: Causative
  gene_term:
    preferred_term: TUBB4B
    term:
      id: hgnc:20771
      label: TUBB4B
  notes: >-
    Heterozygous missense variants in TUBB4B (9q34.3), encoding the beta-tubulin
    4B (class IVb) isotype, cause LCAEOD. Most reported families carry recurrent
    substitutions affecting Arg391; a recurrent c.1171C>T variant has been
    reported in a multiplex family. TUBB4B is distinct from TUBB4A, whose
    variants cause leukodystrophy/dystonia; care should be taken not to conflate
    the two paralogs.
  evidence:
  - reference: PMID:29198720
    reference_title: "Mutations in TUBB4B Cause a Distinctive Sensorineural Disease."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      we identified two heterozygous mutations affecting Arg391 in β-tubulin 4B
      isotype-encoding (TUBB4B)
    explanation: >-
      Original identification of TUBB4B as the causative gene via recurrent
      Arg391 substitutions.
  - reference: PMID:35240325
    reference_title: "TUBB4B gene mutation in Leber phenotype of congenital amaurosis syndrome associated with early-onset deafness."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      we report a Hungarian family with three affected members, mother and her
      12- and 14-year-old children, who suffer from ophthalmologic and hearing
      impairments probably due to c.1171C > T missense variant in the TUBB4B gene
    explanation: >-
      Confirms TUBB4B causation in a second multiplex family with autosomal
      dominant transmission.
diagnosis:
- name: Molecular Genetic Diagnosis
  description: >-
    LCAEOD is suspected from the combination of Leber congenital amaurosis
    (congenital blindness, undetectable/severely reduced electroretinogram) and
    early-onset sensorineural hearing loss, and is confirmed by identification
    of a heterozygous pathogenic TUBB4B variant on molecular genetic testing.
  diagnosis_term:
    preferred_term: molecular genetic testing
    term:
      id: MAXO:0000533
      label: molecular genetic testing
  evidence:
  - reference: PMID:29198720
    reference_title: "Mutations in TUBB4B Cause a Distinctive Sensorineural Disease."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Using exome sequencing in a multiplex family and three simplex case
      subjects with an atypical association of LCA with early-onset hearing loss
    explanation: >-
      Exome sequencing of patients with the LCA-plus-deafness phenotype is the
      diagnostic route that identified the gene.
differential_diagnoses:
- name: Isolated Leber Congenital Amaurosis
  description: >-
    Non-syndromic LCA (e.g. CEP290-, GUCY2D-, RPE65-related) presents with
    congenital blindness but without the early-onset sensorineural hearing loss
    that defines LCAEOD.
- name: Usher Syndrome
  description: >-
    Usher syndrome combines sensorineural hearing loss with retinitis
    pigmentosa, but the retinal degeneration is typically later in onset than
    the congenital amaurosis of LCAEOD and the genetics (MYO7A, USH2A, etc.)
    and inheritance (autosomal recessive) differ.
- name: TUBB4A-related Leukodystrophy
  description: >-
    Variants in the paralogous TUBB4A gene cause hypomyelinating leukodystrophy
    and dystonia (H-ABC); despite the similar gene name, TUBB4A disease is
    distinct from TUBB4B-related LCAEOD.
treatments:
- name: Cochlear Implantation / Auditory Rehabilitation
  description: >-
    Management of the sensorineural hearing loss with hearing aids or cochlear
    implantation and auditory-verbal rehabilitation; combined visual and
    auditory impairment makes early audiologic intervention important.
  treatment_term:
