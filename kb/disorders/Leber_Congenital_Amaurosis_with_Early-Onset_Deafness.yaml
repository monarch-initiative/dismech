    term:
      id: MAXO:0000950
      label: supportive care
discussions:
- discussion_id: gap_lcaeod_ciliopathy_vs_tubulinopathy
  prompt: >-
    Is LCAEOD mechanistically a retinal ciliopathy, as MONDO classifies it, or a
    primary tubulinopathy of microtubule dynamics, as the founding study
    concluded ("a syndromic LCA unrelated to ciliary dysfunction")? Does the
    TUBB4B Arg391 microtubule-dynamics defect cause sensory degeneration chiefly
    through the microtubule-based photoreceptor connecting cilium / hair-cell
    apparatus, or through cilium-independent microtubule functions?
  kind: KNOWLEDGE_GAP
  status: OPEN
  attaches_to:
  - pathophysiology#TUBB4B Microtubule Dynamics Defect
  - pathophysiology#Rod Photoreceptor Degeneration and Leber Congenital Amaurosis
  rationale: >-
    Luscan et al. 2017 explicitly described LCAEOD as a syndromic LCA "unrelated
    to ciliary dysfunction," attributing the phenotype to altered microtubule
    growth dynamics rather than primary ciliary failure. MONDO nonetheless files
    the entity under retinal ciliopathy (and TUBB4B-related ciliopathy), partly
    because TUBB4B was subsequently implicated in motile-cilia disease (primary
    ciliary dyskinesia) and because photoreceptor outer-segment renewal and
    hair-cell function depend on microtubule-based cytoskeletal structures
    (the connecting cilium / kinocilium). Whether the sensory degeneration in
    LCAEOD is driven by a ciliary or a cilium-independent microtubule mechanism
    is unresolved, and this determines whether the entry's conformance to the
    ciliopathy framework is mechanistically appropriate or only nosological.
  proposed_experiments:
  - experiment_id: exp_lcaeod_patient_organoid_microtubule_cilium
    name: Patient iPSC retinal/cochlear organoid microtubule and connecting-cilium assays
    description: >-
      Cell-type-specific assays of microtubule dynamics and connecting-cilium
      integrity in patient iPSC-derived retinal organoids and cochlear models
      carrying the Arg391 variant, to test whether sensory degeneration is
      cilium-dependent.
  - experiment_id: exp_lcaeod_vs_pcd_variant_comparison
    name: LCAEOD-versus-PCD TUBB4B variant functional comparison
    description: >-
      Comparison of LCAEOD TUBB4B variants with the primary-ciliary-dyskinesia
      TUBB4B variants to test whether sensory and motile-cilia phenotypes
      segregate by distinct microtubule functional defects.
