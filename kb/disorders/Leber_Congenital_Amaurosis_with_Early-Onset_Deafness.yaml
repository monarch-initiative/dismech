- name: Cochlear Hair Cell Dysfunction and Sensorineural Hearing Loss
  conforms_to: "sensorineural_hair_cell_loss#Hair Cell Mechanotransduction Failure and Death"
  description: >-
    Early-onset sensorineural hearing loss is the second cardinal feature of
    LCAEOD. The TUBB4B microtubule-dynamics defect impairs sensory hair cell
    function in the cochlea, producing hearing impairment that co-segregates
    with the retinal disease. This couples a sensorineural auditory phenotype
    to the same anomaly in microtubule behavior that drives the retinal
    degeneration.
