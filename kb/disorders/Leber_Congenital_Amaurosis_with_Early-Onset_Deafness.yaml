      mutations have a significant dampening impact on normal MT growth
    explanation: >-
      Functional studies in cultured cells and patient fibroblasts show the
      mutations dampen microtubule growth dynamics, the core molecular lesion.
  - reference: PMID:35240325
    reference_title: "TUBB4B gene mutation in Leber phenotype of congenital amaurosis syndrome associated with early-onset deafness."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Beta-tubulin 4B isotype is one of the subunits of microtubules encoded by
      TUBB4B gene on chromosome 9, which is responsible for the maintenance of
      microtubule stability
    explanation: >-
      Establishes TUBB4B's normal role as a microtubule subunit maintaining
      microtubule stability, the function disrupted in LCAEOD.
- name: Rod Photoreceptor Degeneration and Leber Congenital Amaurosis
  conforms_to: "photoreceptor_degeneration#Rod Photoreceptor Apoptosis"
  description: >-
    Leber congenital amaurosis is a neurodegenerative disease of photoreceptor
    cells that causes blindness within the first year of life. In LCAEOD the
    impaired microtubule dynamics from mutant TUBB4B compromise the
    microtubule-dependent architecture of photoreceptors, driving early rod
    photoreceptor degeneration and congenital blindness with severely reduced
    visual acuity and an undetectable electroretinogram.
