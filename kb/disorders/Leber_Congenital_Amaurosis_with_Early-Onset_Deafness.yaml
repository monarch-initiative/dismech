diagnosis:
- name: Molecular Genetic Diagnosis
  description: >-
    LCAEOD is suspected from the combination of Leber congenital amaurosis
    (congenital blindness, undetectable/severely reduced electroretinogram) and
    early-onset sensorineural hearing loss, and is confirmed by identification
    of a heterozygous pathogenic TUBB4B variant on molecular genetic testing.
  diagnosis_term:
    preferred_term: molecular genetic testing
    term:
      id: MAXO:0000533
      label: molecular genetic testing
  evidence:
  - reference: PMID:29198720
    reference_title: "Mutations in TUBB4B Cause a Distinctive Sensorineural Disease."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Using exome sequencing in a multiplex family and three simplex case
      subjects with an atypical association of LCA with early-onset hearing loss
    explanation: >-
      Exome sequencing of patients with the LCA-plus-deafness phenotype is the
      diagnostic route that identified the gene.
differential_diagnoses:
- name: Isolated Leber Congenital Amaurosis
  description: >-
    Non-syndromic LCA (e.g. CEP290-, GUCY2D-, RPE65-related) presents with
    congenital blindness but without the early-onset sensorineural hearing loss
    that defines LCAEOD.
- name: Usher Syndrome
  description: >-
    Usher syndrome combines sensorineural hearing loss with retinitis
    pigmentosa, but the retinal degeneration is typically later in onset than
    the congenital amaurosis of LCAEOD and the genetics (MYO7A, USH2A, etc.)
    and inheritance (autosomal recessive) differ.
- name: TUBB4A-related Leukodystrophy
  description: >-
    Variants in the paralogous TUBB4A gene cause hypomyelinating leukodystrophy
    and dystonia (H-ABC); despite the similar gene name, TUBB4A disease is
    distinct from TUBB4B-related LCAEOD.
