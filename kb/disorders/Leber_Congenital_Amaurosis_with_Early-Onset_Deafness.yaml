name: Leber Congenital Amaurosis with Early-Onset Deafness
creation_date: "2026-06-20T00:00:00Z"
category: Mendelian
description: >-
  Leber congenital amaurosis with early-onset deafness (LCAEOD) is a rare,
  autosomal dominant sensorineural disease caused by heterozygous missense
  mutations in TUBB4B, the gene encoding the beta-tubulin 4B (class IVb)
  isotype. It combines Leber congenital amaurosis — a severe, early-onset
  neurodegeneration of retinal photoreceptors causing blindness in the first
  year of life — with early-onset sensorineural hearing loss. Most reported
  families carry recurrent missense substitutions affecting the same residue
  (Arg391), with rarer variants at other residues (e.g. Tyr310, Arg390). Beta-
  tubulin 4B is a core microtubule subunit required for microtubule stability;
  the disease-associated substitutions are incorporated into the microtubule
  lattice but dampen normal microtubule growth dynamics, linking sensorineural
  disease to anomalies in microtubule behavior. The phenotype is one of a
  spectrum of TUBB4B-related disorders; the founding study explicitly described
  it as a syndromic LCA "unrelated to ciliary dysfunction," whereas MONDO
  classifies the entity within the retinal ciliopathies — a mechanistic
  classification tension captured below.
