    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "clinically distinguishing factors between Type 1 and Type 2 GM1 gangliosidosis"
    explanation: "Type 2 is a later-onset neurodegenerative form clinically distinguished from type 1."
