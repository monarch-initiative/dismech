    reference_title: "Sunitinib malate for the treatment of pancreatic neuroendocrine tumors."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Continuous daily administration of sunitinib at a dose of 37.5 mg
