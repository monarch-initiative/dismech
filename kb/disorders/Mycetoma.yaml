pathophysiology:
- name: Cutaneous and subcutaneous infection by fungi or bacteria
  description: Mycetoma includes fungal (eumycetoma) and bacterial
    (actinomycetoma) infections.
  evidence:
  - reference: PMID:35887499
    reference_title: "Mycetoma: Development of Diagnosis and Treatment."
    supports: SUPPORT
    snippet: "Mycetoma describes a heterogeneous group of cutaneous and subcutaneous
      infections caused by either fungi (eumycetomas) or bacteria (actinomycetomas)."
    explanation: The abstract defines mycetoma as fungal or bacterial
      cutaneous/subcutaneous infection.
