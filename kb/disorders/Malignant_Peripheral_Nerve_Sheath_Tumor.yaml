    evidence_source: HUMAN_CLINICAL
    snippet: "We report recurrent mutations in NF1, SUZ12, EED, TP53 and CDKN2A in our study cohort."
    explanation: This genomic study confirms TP53 as a recurrent MPNST driver lesion.
