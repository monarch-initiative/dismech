genetic:
- name: IGHMBP2
  gene_term:
    preferred_term: IGHMBP2
    term:
      id: hgnc:5542
      label: IGHMBP2
  inheritance:
  - name: Autosomal Recessive
  notes: >
    Biallelic loss-of-function variants in IGHMBP2 (immunoglobulin mu DNA binding
    protein 2; chromosome 11q13.2-q13.4), encoding an ATP-dependent 5'->3' DNA/RNA
    helicase, cause SMARD1 (dSMA1 / HMNR1 / dHMN6). Most SMARD1-causing missense
    mutations lie in the helicase domain. IGHMBP2 is allelic to the milder
    Charcot-Marie-Tooth disease type 2S. SMN1 is normal, distinguishing SMARD1 from
    SMN1-related proximal SMA.
  evidence:
  - reference: PMID:11528396
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Here we demonstrate that SMARD type 1 (SMARD1) results from mutations in the gene encoding immunoglobulin micro-binding protein 2 (IGHMBP2; on chromosome 11q13.2-q13.4)."
    explanation: IGHMBP2 is the SMARD1 gene.
  - reference: PMID:35611426
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "a very rare autosomal recessive disorder caused by mutations in the"
    explanation: Confirms SMARD1 as an autosomal recessive disorder caused by IGHMBP2 mutations.
differential_diagnoses:
- name: SMN1-related spinal muscular atrophy type 1 (Werdnig-Hoffmann)
  description: >
    Classic infantile proximal SMA caused by biallelic SMN1 loss. Both present with
    infantile hypotonia, weakness, and motor neuron loss, but SMN1-SMA begins
    proximally and relatively spares the diaphragm, whereas SMARD1 begins distally
    with early diaphragmatic palsy.
  disease_term:
    preferred_term: spinal muscular atrophy, type 1
    term:
      id: MONDO:0009669
      label: spinal muscular atrophy, type 1
  distinguishing_features:
  - SMN1-SMA begins proximally; SMARD1 weakness begins distally.
  - SMN1-SMA has a bell-shaped chest with paradoxical respiration from intercostal palsy and relative diaphragmatic sparing.
  - SMARD1 has a normal-shaped thorax with early neurogenic diaphragmatic palsy and hemidiaphragm eventration.
  - SMARD1 has biallelic IGHMBP2 variants with normal SMN1.
  evidence:
  - reference: PMID:11528396
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Spinal muscular atrophy with respiratory distress (SMARD) is clinically and genetically distinct from SMA."
    explanation: SMARD1 is clinically and genetically distinct from SMN1-related SMA.
- name: Congenital diaphragmatic eventration / congenital diaphragmatic hernia
  description: >
    Structural or non-neurogenic causes of diaphragmatic elevation and respiratory
    compromise in the newborn, which can mimic the diaphragmatic eventration of
    SMARD1 but lack the progressive lower motor neuron degeneration and distal
    weakness.
  distinguishing_features:
  - SMARD1 diaphragmatic palsy is neurogenic and accompanied by progressive distal limb weakness, amyotrophy, and areflexia from motor neuron degeneration.
  - SMARD1 is confirmed by biallelic IGHMBP2 variants on genetic testing.
  notes: >
    Other infantile differentials include congenital myotonic dystrophy type 1 and
    EMARDD (early-onset myopathy, areflexia, respiratory distress, and dysphagia).
treatments:
- name: Respiratory Support
  description: >
    Mechanical ventilation and respiratory support for the neurogenic diaphragmatic
    palsy and respiratory failure of SMARD1. There is no approved disease-modifying
    therapy; artificial ventilation can prolong survival, and management focuses on
    ventilation, nutrition, and quality of life.
  treatment_term:
    preferred_term: supportive care
    term:
      id: MAXO:0000950
      label: supportive care
  target_phenotypes:
  - preferred_term: Respiratory failure
    term:
      id: HP:0002878
      label: Respiratory failure
  evidence:
  - reference: PMID:39202358
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Artificial ventilation can prolong survival, but no specific treatment is available."
    explanation: Supportive ventilation is the mainstay for SMARD1; no disease-modifying therapy exists.
- name: Genetic Counseling
  description: >
    Counseling for autosomal recessive recurrence risk and carrier/cascade testing
    once biallelic IGHMBP2 variants are identified; the primary preventive strategy
    given the genetic etiology.
  treatment_term:
    preferred_term: genetic counseling
    term:
      id: MAXO:0000079
      label: genetic counseling
