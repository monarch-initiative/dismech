name: Spinal Muscular Atrophy with Respiratory Distress Type 1
creation_date: "2026-06-26T00:00:00Z"
category: Mendelian
description: >
  Spinal muscular atrophy with respiratory distress type 1 (SMARD1; also called
  autosomal recessive distal spinal muscular atrophy 1 / dSMA1, distal hereditary
  motor neuropathy type 6 / dHMN6, and severe infantile axonal neuropathy with
  respiratory failure type 1) is a rare autosomal recessive infantile motor neuron
  disease caused by biallelic loss-of-function variants in IGHMBP2 (immunoglobulin
  mu DNA binding protein 2), which encodes an ATP-dependent 5'->3' DNA/RNA helicase
  implicated in pre-mRNA processing and ribosomal translation. The disorder is
  characterized by degeneration of spinal anterior-horn lower (alpha) motor neurons
  with a characteristic distal and diaphragmatic predilection. Its hallmark is early
  infantile respiratory distress and failure from neurogenic diaphragmatic palsy
  (with radiographic diaphragmatic eventration), which—together with weakness that
  begins distally in the limbs—distinguishes SMARD1 from SMN1-related proximal SMA
  (in which the diaphragm is relatively spared and weakness begins proximally).
  Distal limb weakness and amyotrophy, areflexia, failure to thrive, and progressive
  autonomic and sensory involvement are common. SMN1 is normal. SMARD1 is allelic
  to the milder Charcot-Marie-Tooth disease type 2S and overlaps with the
  IGHMBP2-related autosomal recessive distal hereditary motor neuronopathy.
