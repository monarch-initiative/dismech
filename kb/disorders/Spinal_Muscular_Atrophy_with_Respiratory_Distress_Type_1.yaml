pathophysiology:
- name: IGHMBP2 Helicase Deficiency
  description: >
    Biallelic loss-of-function variants in IGHMBP2 reduce or abolish the function
    of an ATP-dependent 5'->3' DNA/RNA helicase of superfamily 1 (UPF1-like) that
    associates with ribosomes in the cytoplasm and colocalizes with the
    RNA-processing machinery. The deficiency is thought to impair pre-mRNA
    processing and ribosomal translation/biogenesis required for motor neuron
    maintenance and integrity. Most SMARD1-causing missense mutations cluster in
    the helicase domain.
  cell_types:
  - preferred_term: motor neuron
    term:
      id: CL:0000100
      label: motor neuron
  biological_processes:
  - preferred_term: mRNA processing
    term:
      id: GO:0006397
      label: mRNA processing
    modifier: DECREASED
  - preferred_term: Ribosomal translation
    term:
      id: GO:0006412
      label: translation
    modifier: DECREASED
  evidence:
  - reference: PMID:11528396
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Here we demonstrate that SMARD type 1 (SMARD1) results from mutations in the gene encoding immunoglobulin micro-binding protein 2 (IGHMBP2; on chromosome 11q13.2-q13.4)."
    explanation: Establishes biallelic IGHMBP2 mutation as the cause of SMARD1.
  - reference: PMID:11528396
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Like the SMN1 product, IGHMBP2 colocalizes with the RNA-processing machinery in both the cytoplasm and the nucleus."
    explanation: IGHMBP2 colocalizes with the RNA-processing machinery, supporting its role in mRNA processing.
  - reference: PMID:31802621
    supports: SUPPORT
    evidence_source: OTHER
    snippet: "Biochemical characterization has determined that IGHMBP2 is an ATP‐dependent 5’→3’ DNA/RNA helicase."
    explanation: Defines the ATP-dependent 5'->3' DNA/RNA helicase activity of IGHMBP2.
  - reference: PMID:31802621
    supports: SUPPORT
    evidence_source: OTHER
    snippet: "Most SMARD1‐causing missense mutations have been found in the helicase domain"
    explanation: Locates the SMARD1-causing mutations in the helicase domain, supporting helicase deficiency as the molecular lesion.
  downstream:
  - target: Anterior Horn Lower Motor Neuron Degeneration
    description: >
      IGHMBP2 helicase deficiency leads to progressive degeneration of spinal
      anterior-horn lower (alpha) motor neurons, with a distal and diaphragmatic
      predilection.
    causal_link_type: DIRECT
- name: Anterior Horn Lower Motor Neuron Degeneration
  description: >
    Progressive degeneration of spinal anterior-horn lower (alpha) motor neurons,
    beginning before clinical symptom onset, with a characteristic distal-predominant
    and diaphragmatic/phrenic predilection. Motor neuron loss preferentially affects
    the distal muscles, particularly the lower extremities, while phrenic motor
    output to the diaphragm fails early.
  cell_types:
  - preferred_term: motor neuron
    term:
      id: CL:0000100
      label: motor neuron
  biological_processes:
  - preferred_term: Motor neuron apoptotic process
    term:
      id: GO:0097049
      label: motor neuron apoptotic process
    modifier: INCREASED
  evidence:
  - reference: PMID:35611426
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "The initial symptoms of patients with SMARD1 are respiratory distress and distal muscle weakness manifesting in the infantile period due to progressive degeneration of α-motor neurons."
    explanation: Attributes the infantile respiratory distress and distal weakness to progressive alpha motor neuron degeneration.
  - reference: PMID:31802621
    supports: SUPPORT
    evidence_source: OTHER
    snippet: "SMARD1 patients typically present with phrenic nerve palsy between the ages of six weeks and six months, and motor neuron degeneration primarily affects the distal muscles, particularly those of the lower extremities."
    explanation: Documents the distal-predominant pattern of motor neuron degeneration with early phrenic involvement.
  - reference: PMID:11528396
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "indicate that IGHMBP2 and SMN share common functions important for motor neuron maintenance and integrity in mammals"
    explanation: Links IGHMBP2 function to motor neuron maintenance and integrity.
  downstream:
  - target: Diaphragmatic and Phrenic Motor Failure
    description: >
      Degeneration of phrenic motor neurons produces neurogenic diaphragmatic palsy
      and respiratory failure, the early and life-threatening hallmark of SMARD1.
    causal_link_type: DIRECT
  - target: Distal Denervation and Limb Weakness
    description: >
      Degeneration of distal-projecting lower motor neurons produces distal
      denervation, limb weakness, and amyotrophy beginning in the lower limbs.
    causal_link_type: DIRECT
- name: Diaphragmatic and Phrenic Motor Failure
  description: >
    Degeneration of the phrenic nerve and its motor neurons causes neurogenic
    diaphragmatic palsy, manifest radiographically as eventration (abnormal
    elevation) of the right or both hemidiaphragms—a highly suggestive sign of
    SMARD1—and clinically as respiratory distress and failure requiring mechanical
    ventilation between 6 weeks and 6 months of age. Unlike SMN1-related SMA, the
    thorax is normally shaped because the defect mainly involves the diaphragm.
  cell_types:
  - preferred_term: motor neuron
    term:
      id: CL:0000100
      label: motor neuron
  evidence:
  - reference: PMID:31802621
    supports: SUPPORT
    evidence_source: OTHER
    snippet: "Respiratory distress is usually the presenting clinical symptom and occurs between 6 weeks and 6 months of age as a consequence of the development of neurogenic diaphragmatic palsy."
    explanation: Links neurogenic diaphragmatic palsy to the presenting respiratory distress of SMARD1.
  - reference: PMID:31802621
    supports: SUPPORT
    evidence_source: OTHER
    snippet: "the characteristic eventration (the abnormal elevation) of the right or, less frequently, both hemidiaphragms, which is considered a highly suggestive sign of SMARD1"
    explanation: Diaphragmatic eventration on chest X-ray is a hallmark radiographic sign of SMARD1.
  - reference: PMID:39202358
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "it presents with respiratory failure due to diaphragmatic paralysis, progressive muscle weakness starting in the distal parts of the limbs, dysphagia, and damage to sensory and autonomic nerves"
    explanation: Describes respiratory failure from diaphragmatic paralysis with distal-onset weakness and sensory/autonomic involvement.
  downstream:
  - target: Respiratory distress and failure
  - target: Diaphragmatic eventration
- name: Distal Denervation and Limb Weakness
  description: >
    Distal denervation from lower motor neuron loss produces progressive wasting of
    the distal limb muscles—lower limbs affected earlier than upper—extending
    proximally with disease progression, with loss of deep tendon reflexes
    (areflexia), foot deformities, and progressive autonomic and sensory involvement.
  cell_types:
  - preferred_term: motor neuron
    term:
      id: CL:0000100
      label: motor neuron
  evidence:
  - reference: PMID:31802621
    supports: SUPPORT
    evidence_source: OTHER
    snippet: "The degeneration of the phrenic nerve is accompanied by the progressive wasting of the distal muscles of the limbs; the lower limbs are affected earlier than the upper limbs, and the proximal muscles become affected along with the progression of the disease."
    explanation: Documents the distal-onset, lower-limb-predominant, progressive denervation pattern.
  - reference: PMID:31802621
    supports: SUPPORT
    evidence_source: OTHER
    snippet: "progressive autonomic nervous system dysfunction also develops in association with the progressive worsening of motor functions in affected children"
    explanation: Establishes progressive autonomic involvement accompanying motor decline.
  downstream:
  - target: Distal muscle weakness
  - target: Distal amyotrophy
  - target: Areflexia
