    snippet: Cobalamin C is the most common inborn error of intracellular cobalamin metabolism caused by biallelic pathogenic variants in the MMACHC gene, leading to impaired conversion of dietary vitamin B12 into its two metabolically active forms, methylcobalamin and adenosylcobalamin.
    explanation: Human cohort summary directly supports MMACHC loss as the initiating defect and ties it to failed generation of both active cobalamin cofactors.
  - reference: PMID:40441036
    reference_title: "Missense mutations in MMACHC protein from cblC disease affect its conformational stability and vitamin B12-binding activity: The example of R161Q mutation."
