  features: 'MMACHC encodes the intracellular cobalamin-processing protein required to generate both methylcobalamin and adenosylcobalamin. Disease severity is strongly modified by genotype, with recurrent variants such as c.482G>A associated with later onset and milder phenotypes in large cohorts.

