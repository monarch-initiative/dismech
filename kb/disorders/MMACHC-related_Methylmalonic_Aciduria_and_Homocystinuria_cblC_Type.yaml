diagnosis:
- name: Newborn screening with second-tier methylmalonic acid assessment
  description: 'Expanded newborn screening can identify cblC presymptomatically, but mild disease may be missed if follow-up relies only on first-tier C3 markers without second-tier MMA measurement.

    '
  evidence:
  - reference: PMID:40981307
    reference_title: "Milder Form of Cobalamin C Disease May Be Missed by Newborn Screening: The Importance of Methylmalonic Acid Assessment."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: Notably, three infants had completely normal C3 levels and ratios during the second screening test, yet they showed MMA levels above the cut-off value (2 µmol/L), enabling a diagnosis of otherwise undetectable mild CblC cases.
    explanation: Directly supports second-tier MMA testing as necessary to avoid missing mild cblC on newborn screening.
treatments:
- name: Hydroxocobalamin therapy
  description: 'Parenteral hydroxocobalamin is the central disease-modifying therapy for cblC deficiency. Higher-dose regimens are associated with better biochemical and neurodevelopmental outcomes in early-onset disease and with rapid metabolic correction in late-onset adults.

    '
  treatment_term:
