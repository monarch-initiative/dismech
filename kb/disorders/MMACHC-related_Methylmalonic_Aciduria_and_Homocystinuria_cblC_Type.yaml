    - reference: PMID:40441036
      reference_title: "Missense mutations in MMACHC protein from cblC disease affect its conformational stability and vitamin B12-binding activity: The example of R161Q mutation."
      supports: SUPPORT
      evidence_source: IN_VITRO
      snippet: Moreover, we show that the R161Q mutation decreases AdoCbl binding affinity and impairs the protein's ability to form homodimers, which are supposed to have a functional role.
