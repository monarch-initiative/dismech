    snippet: We recommend initiating therapy immediately after biochemical diagnosis, along with close ophthalmological monitoring, before the appearance of any signs.
    explanation: Ophthalmic case study directly recommends close eye monitoring because retinal injury can emerge early despite treatment.
notes: 'cblC disease should be curated as a distinct combined cobalamin-processing disorder rather than being collapsed into isolated methylmalonic acidemia or generic homocystinuria. The central mechanistic split is failure to supply methylcobalamin and adenosylcobalamin, which creates parallel remethylation and methylmalonyl-CoA mutase defects. Early biochemical control improves outcome, but ocular disease is notably treatment-resistant relative to systemic metabolites. Variant-specific heterogeneity is substantial; c.482G>A tends to mark a milder, later-onset disease course, whereas severe early-onset disease remains common in cohorts dominated by truncating alleles.

  '
