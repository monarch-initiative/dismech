name: MMACHC-related Methylmalonic Aciduria and Homocystinuria, cblC Type
category: Mendelian
creation_date: '2026-04-13T01:16:34Z'
updated_date: '2026-04-22T20:53:03Z'
synonyms:
- Cobalamin C deficiency
- cblC deficiency
- Combined methylmalonic aciduria and homocystinuria, cblC type
- Combined methylmalonic acidemia and homocystinuria, cblC type
- Methylmalonic acidemia with homocystinuria, cblC type
description: 'MMACHC-related methylmalonic aciduria and homocystinuria, cblC type (cblC deficiency) is the most common inborn error of intracellular cobalamin metabolism. MMACHC dysfunction blocks conversion of dietary vitamin B12 into methylcobalamin and adenosylcobalamin, jointly impairing methionine synthase-dependent remethylation and methylmalonyl-CoA mutase-dependent propionate metabolism. The resulting biochemical signature combines hyperhomocysteinemia, hypomethioninemia, and methylmalonic acid accumulation. Early-onset disease is dominated by developmental and ocular injury, whereas late-onset disease more often presents with neuropsychiatric, renal, and cardiovascular complications including thrombotic microangiopathy and pulmonary hypertension. Prompt newborn-screening-driven diagnosis and hydroxocobalamin-based treatment improve outcome, but maculopathy and neurodevelopmental morbidity can persist despite good biochemical control.

  '
