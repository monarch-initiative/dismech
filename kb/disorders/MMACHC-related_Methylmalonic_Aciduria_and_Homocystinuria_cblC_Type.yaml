  evidence:
  - reference: PMID:39152755
    reference_title: "Improved biochemical and neurodevelopmental profiles with high-dose hydroxocobalamin therapy in cobalamin C defect."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: This study showed that "high-dose" OH-Cbl treatment in NBS-diagnosed children with severe early-onset Cbl-C defect led to a significant improvement in the metabolic profile and in neurocognitive outcome, compared to age-matched patients treated with a "low-dose" regimen.
    explanation: Early-onset treatment cohort directly supports better metabolic and neurocognitive outcomes with higher-dose hydroxocobalamin.
  - reference: PMID:32071835
    reference_title: "High-dose hydroxocobalamin achieves biochemical correction and improvement of neuropsychiatric deficits in adults with late onset cobalamin C deficiency."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: A regimen of high-dose hydroxocobalamin (25 mg/day) together with betaine and folic acid resulted in rapid and sustainable biochemical correction, resolution of psychosis, improvement of neurological functions, and amelioration of brain and spinal cord lesions.
    explanation: Adult late-onset series directly supports strong clinical and biochemical benefit from intensified hydroxocobalamin-based therapy.
