    explanation: Directly supports late-onset cblC as a clinically distinct presentation stratum.
pathophysiology:
- name: MMACHC intracellular cobalamin processing deficiency
  description: 'Biallelic MMACHC pathogenic variants impair intracellular processing of dietary cobalamin into its two metabolically active cofactor forms.

    '
