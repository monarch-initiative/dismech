    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "In utero, DHT is crucial for growth of the prostate gland and for differentiation of the external genitalia into male genitalia."
    explanation: The review supports DHT as the critical fetal signal for external genital development.
