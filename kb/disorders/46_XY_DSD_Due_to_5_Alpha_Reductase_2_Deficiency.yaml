name: 46,XY disorder of sex development due to 5-alpha-reductase 2 deficiency
creation_date: "2026-05-11T04:00:08Z"
updated_date: "2026-05-19T14:34:59Z"
category: Mendelian
description: >-
  46,XY disorder of sex development due to 5-alpha-reductase 2 deficiency is an
  autosomal recessive androgen metabolism disorder caused by biallelic SRD5A2
  loss-of-function variants. Impaired 5-alpha-reductase type 2 activity reduces
  conversion of testosterone to dihydrotestosterone, causing incomplete
  intrauterine masculinization of external genitalia in individuals with a
  46,XY karyotype. Pubertal virilization may occur when testosterone production
  rises.
