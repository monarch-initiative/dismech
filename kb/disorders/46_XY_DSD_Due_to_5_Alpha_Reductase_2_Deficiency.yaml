- name: Pubertal Testosterone Exposure
  description: >-
    At puberty, endogenous testosterone can drive androgen effects despite the
    persistent DHT-production defect, contributing to masculinization and gender
    development patterns in some affected individuals raised female.
  biological_processes:
  - preferred_term: androgen receptor signaling pathway
    term:
      id: GO:0030521
      label: androgen receptor signaling pathway
    modifier: INCREASED
  evidence:
  - reference: PMID:32346305
    reference_title: Integrative and Analytical Review of the 5-Alpha-Reductase Type 2 Deficiency Worldwide.
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "testosterone is enough for the brain virilization."
    explanation: The review explains that testosterone can support androgen-dependent virilization effects even when DHT-dependent external virilization is impaired.
  downstream:
  - target: Pubertal Virilization
    causal_link_type: DIRECT
    description: >-
      Testosterone exposure at puberty contributes to virilization despite
      reduced DHT synthesis.
    evidence:
    - reference: PMID:32346305
      reference_title: Integrative and Analytical Review of the 5-Alpha-Reductase Type 2 Deficiency Worldwide.
      supports: SUPPORT
      evidence_source: HUMAN_CLINICAL
      snippet: "presenting with a wide range of genital ambiguity at birth and pronounced virilization at puberty."
      explanation: The review links the neonatal undervirilization phenotype with pronounced pubertal virilization.
- name: Pubertal Virilization
  description: >-
    Pubertal androgen exposure may produce deepening of the voice, phallic
    enlargement, increased muscle mass, and other virilizing changes.
  evidence:
  - reference: PMID:32346305
    reference_title: Integrative and Analytical Review of the 5-Alpha-Reductase Type 2 Deficiency Worldwide.
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Typically, affected individuals presented virilization (clinical and psychological) at puberty"
    explanation: The worldwide review describes pubertal virilization as a typical presentation.
  downstream:
  - target: Pubertal virilization
    causal_link_type: DIRECT
    description: Pubertal androgen exposure produces the reported virilization phenotype.
    evidence:
    - reference: PMID:32346305
      reference_title: Integrative and Analytical Review of the 5-Alpha-Reductase Type 2 Deficiency Worldwide.
      supports: SUPPORT
      evidence_source: HUMAN_CLINICAL
      snippet: "pronounced virilization at puberty."
      explanation: The worldwide review supports pubertal virilization as a characteristic feature.
