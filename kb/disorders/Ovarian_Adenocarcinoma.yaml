name: Ovarian Adenocarcinoma
creation_date: "2026-06-17T21:30:00Z"
synonyms:
- Epithelial ovarian cancer
- Ovarian carcinoma
- Epithelial ovarian carcinoma
- EOC
description: >-
  Ovarian adenocarcinoma is the epithelial-ovarian-cancer (EOC) umbrella under which the
  five WHO 2020 carcinoma histotypes are grouped: high-grade serous carcinoma (HGSC),
  low-grade serous carcinoma (LGSC), endometrioid carcinoma, clear cell carcinoma, and
  mucinous carcinoma. Epithelial malignancies account for roughly 90% of ovarian cancers,
  with HGSC the dominant and most lethal histotype. Although these histotypes share a
  common anatomic site and a similar advanced-stage clinical presentation (ascites,
  abdominal distention, nonspecific pelvic symptoms) treated with cytoreductive surgery
  plus platinum-taxane chemotherapy, they are biologically distinct diseases with
  different cells of origin and molecular drivers. This entry is the umbrella root and
  deliberately does NOT duplicate the deeper, already-split dismech disease graphs for
  the two histotypes curated separately (see notes): Ovarian High-Grade Serous Carcinoma
  and Clear Cell Ovarian Carcinoma. It models the histotype-divergent driver biology at
  the umbrella level and the shared homologous-recombination-deficiency / PARP synthetic-
  lethality axis that defines actionable EOC subsets.
categories:
- Gynecologic Cancer
- Ovarian Cancer
- Solid Tumor
parents:
- ovarian carcinoma
disease_term:
  preferred_term: ovarian adenocarcinoma
  term:
    id: MONDO:0002752
    label: ovarian adenocarcinoma
mappings:
  mondo_mappings:
  - term:
      id: MONDO:0002752
      label: ovarian adenocarcinoma
    mapping_predicate: skos:exactMatch
    mapping_source: MONDO
    mapping_justification: >-
      MONDO:0002752 ovarian adenocarcinoma is the epithelial-ovarian-carcinoma umbrella
      that subsumes the individual serous, endometrioid, clear cell, and mucinous
      histotypes curated as subtype facets in this entry. NCIT:C7700 (Ovarian
      Adenocarcinoma) is the corresponding oncology disease concept.
notes: >-
  This umbrella root sits over already-split dismech entries. Do NOT duplicate their
  deeper mechanism graphs here. The high-grade serous histotype has its own full entry
  (Ovarian_High-Grade_Serous_Carcinoma.yaml, MONDO:0005211) modeling the fimbrial tubal
  origin, near-universal TP53 alteration, copy-number instability, HRD/PARP synthetic
  lethality, POLQ escape, and BRCA reversion resistance. The clear cell histotype has its
  own full entry (Clear_Cell_Ovarian_Carcinoma.yaml, MONDO:0000548) modeling early ARID1A
  loss, PIK3CA activation, HNF1B stress adaptation, and intrinsic platinum resistance.
  Related but distinct entries also exist for Metastatic Ovarian Cancer and Hereditary
  Breast and Ovarian Cancer Syndrome. The low-grade serous, endometrioid, and mucinous
  histotypes are represented here only as has_subtypes facets pending any future dedicated
  entries. NCIT disease-level counterpart for the umbrella is Ovarian Adenocarcinoma
  (NCIT:C7700).
classifications:
  harrisons_chapter:
  - classification_value: ONCOLOGY_HEMATOLOGY
    evidence:
    - reference: PMID:40690248
      supports: SUPPORT
      evidence_source: OTHER
      snippet: >-
        Approximately 90% of ovarian cancers are epithelial malignancies, of which 70% to
        80% are high-grade serous ovarian cancers.
      explanation: >-
        This review frames ovarian adenocarcinoma as an epithelial malignancy, placing it
        in Harrison's Oncology/Hematology Part.
  icdo_morphology:
    classification_value: Adenocarcinoma
    evidence:
    - reference: PMID:33919741
      supports: SUPPORT
      evidence_source: OTHER
      snippet: >-
        genital tract divides ovarian carcinomas into at least five main and distinct
        types of ovarian carcinomas: high-grade serous carcinoma, low-grade serous
        carcinoma, endometrioid carcinoma, clear cell carcinoma, and mucinous carcinoma.
      explanation: >-
        The WHO classification establishes ovarian adenocarcinoma as a carcinoma arising
        from glandular/epithelial tissue, supporting the Adenocarcinoma ICD-O morphology.
mechanistic_hypotheses:
- hypothesis_group_id: histotype_divergent_driver_model
  hypothesis_label: Histotype-Divergent Driver Model
  status: CANONICAL
  description: >-
    Epithelial ovarian carcinoma is not a single disease but at least five molecularly
    distinct histotypes with different cells of origin and driver landscapes: HGSC (TP53
    near-universal, BRCA1/2, HRD, copy-number instability), LGSC (MAPK-pathway activation
    via KRAS/BRAF), endometrioid carcinoma (CTNNB1/beta-catenin, PTEN, POLE, microsatellite
    instability), clear cell carcinoma (ARID1A loss, PI3K activation), and mucinous
    carcinoma (KRAS, CDKN2A loss). This canonical model underpins histotype-specific
    treatment (PARP inhibitors in HRD HGSC, MEK inhibition in LGSC) rather than a uniform
    one-size-fits-all approach to ovarian adenocarcinoma.
  evidence:
  - reference: PMID:33919741
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      TP53 and BRCA mutations are typical of high-grade serous carcinoma, whereas BRAF and
      KRAS mutations frequently occur in low-grade serous carcinoma.
    explanation: >-
      The WHO 2020 molecular review directly contrasts the serous histotype driver
      landscapes, supporting the histotype-divergent driver model.
  - reference: PMID:33919741
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Endometrioid tumors are characterized by β-catenin alterations, microsatellite
      instability, and PTEN and POLE mutations, while ARID1A mutations occur in both
      endometrioid and clear cell carcinomas.
    explanation: >-
      Supports the endometrioid and clear cell driver assignments within the divergent
      model.
- hypothesis_group_id: canonical_hrd_parp_synthetic_lethality_model
  hypothesis_label: HRD-PARP Synthetic Lethality Model (Non-Mucinous EOC)
  status: CANONICAL
  description: >-
    Across non-mucinous epithelial ovarian carcinoma, and most strongly in HGSC, BRCA1/2
    loss and broader homologous recombination deficiency create dependence on PARP-mediated
    DNA repair and confer platinum sensitivity. This is the disease-level instantiation of
    the dna_repair_synthetic_lethality module and the rationale for guideline-recommended
    BRCA1/2 and HRD testing at primary diagnosis. The deeper HGSC mechanism graph
    (POLQ escape, BRCA reversion resistance) is curated in the dedicated HGSC entry and is
    not duplicated here.
  evidence:
  - reference: PMID:33475295
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      PARP inhibition causes synthetic lethality in breast cancers associated with germline
      BRCA1 and BRCA2 mutations and is routinely used in clinical practice for metastatic
      breast cancer.
    explanation: >-
      Review evidence supports PARP-inhibitor synthetic lethality in BRCA-associated tumors,
      the paradigm applied across HRD-positive epithelial ovarian cancer.
  - reference: PMID:36082969
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      At 7 years, 67.0% of olaparib patients versus 46.5% of placebo patients were alive,
      and 45.3% versus 20.6%, respectively, were alive and had not received a first
      subsequent treatment
    explanation: >-
      SOLO1 long-term survival benefit is the clinical embodiment of HRD-PARP synthetic
      lethality in BRCA-associated ovarian cancer.
has_subtypes:
- name: HGSC
  display_name: High-Grade Serous Carcinoma
  description: >-
    The dominant and most lethal epithelial ovarian cancer histotype (~70% of EOC,
    ~80% of deaths). Fimbrial fallopian-tube origin, near-universal TP53 mutation,
    pervasive copy-number instability, and frequent HRD with BRCA1/2 alteration.
    Fully modeled in the separate dismech entry Ovarian High-Grade Serous Carcinoma
    (MONDO:0005211); represented here only as an umbrella facet.
  evidence:
  - reference: PMID:40690248
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Approximately 90% of ovarian cancers are epithelial malignancies, of which 70% to
      80% are high-grade serous ovarian cancers.
    explanation: >-
      Establishes HGSC as the dominant epithelial histotype within the ovarian
      adenocarcinoma umbrella.
- name: LGSC
  display_name: Low-Grade Serous Carcinoma
  description: >-
    A distinct serous entity from HGSC, characterized by MAPK-pathway activation
    (KRAS/BRAF mutation) and infrequent TP53 abnormality, with reduced chemosensitivity
    and a clinical response to MEK inhibition (trametinib).
  evidence:
  - reference: PMID:35123694
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Low-grade serous carcinoma of the ovary or peritoneum is characterised by MAPK
      pathway aberrations and its reduced sensitivity to chemotherapy relative to
      high-grade serous carcinoma.
    explanation: >-
      Directly characterizes LGSC as a MAPK-driven, chemo-resistant entity distinct from
      HGSC.
- name: Endometrioid
  display_name: Endometrioid Carcinoma
  description: >-
    Frequently endometriosis-associated; enriched for beta-catenin (CTNNB1) alterations,
    PTEN and POLE mutations, microsatellite instability / mismatch-repair deficiency
    (including Lynch-associated cases), and ARID1A loss.
  evidence:
  - reference: PMID:33919741
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Endometrioid tumors are characterized by β-catenin alterations, microsatellite
      instability, and PTEN and POLE mutations, while ARID1A mutations occur in both
      endometrioid and clear cell carcinomas.
    explanation: >-
      Establishes the endometrioid histotype driver profile within the umbrella.
- name: Clear Cell
  display_name: Clear Cell Carcinoma
  description: >-
    Frequently endometriosis-associated; commonly shows ARID1A loss and PI3K pathway
    activation, with intrinsic platinum resistance. Fully modeled in the separate dismech
    entry Clear Cell Ovarian Carcinoma (MONDO:0000548); represented here only as an
    umbrella facet.
  evidence:
  - reference: PMID:20942669
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      ARID1A mutations were seen in 55 of 119 ovarian clear-cell carcinomas (46%), 10 of
      33 endometrioid carcinomas (30%), and none of the 76 high-grade serous ovarian
      carcinomas.
    explanation: >-
      Quantifies ARID1A loss as a defining clear cell (and endometrioid) driver that is
      absent in HGSC, supporting clear cell as a distinct facet.
- name: Mucinous
  display_name: Mucinous Carcinoma
  description: >-
    An uncommon primary EOC histotype associated with KRAS alterations and CDKN2A
    copy-number loss; metastasis from gastrointestinal or other sites must always be
    excluded in the differential diagnosis.
  evidence:
  - reference: PMID:33919741
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Mucinous carcinomas are uncommon tumors associated with copy-number loss of CDKN2A
      and KRAS alterations and metastasis from other sites should always be considered in
      the differential diagnosis.
    explanation: >-
      Establishes the mucinous histotype driver profile and its diagnostic caveat within
      the umbrella.
pathophysiology:
- name: Tubal and Endometriosis-Associated Cells of Origin
  description: >-
    Epithelial ovarian carcinomas largely arise outside the native ovarian surface: the
    serous histotypes (especially HGSC) originate from fallopian tube epithelium, often via
    serous tubal intraepithelial carcinoma (STIC), while endometrioid and clear cell
    carcinomas frequently arise from endometriosis. This multi-origin model frames the
    histotype divergence captured in this umbrella entry.
  cell_types:
  - preferred_term: fallopian tube secretory epithelial cell
    term:
      id: CL:4030006
      label: fallopian tube secretory epithelial cell
  locations:
  - preferred_term: ovary
    term:
      id: UBERON:0000992
      label: ovary
  - preferred_term: fimbria of fallopian tube
    term:
      id: UBERON:8410010
      label: fimbria of fallopian tube
  evidence:
  - reference: PMID:33919741
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Endometrioid and clear cell carcinomas are frequently associated with endometriosis.
    explanation: >-
      Supports the endometriosis-associated origin of the non-serous histotypes within the
      umbrella multi-origin model.
  - reference: PMID:33011111
    reference_title: "The Origin of Ovarian Cancer Species and Precancerous Landscape."
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Unlike other human cancers, in which all primary tumors arise de novo, ovarian
      epithelial cancers are primarily imported from either endometrial or fallopian tube
      epithelium.
    explanation: >-
      Supports the imported tubal/endometrial cell-of-origin framework spanning the
      epithelial ovarian carcinoma histotypes.
  downstream:
  - target: Histotype-Specific Driver Activation
    description: >-
      Distinct cells of origin acquire histotype-specific driver lesions that define the
      five carcinoma types.
- name: Histotype-Specific Driver Activation
  description: >-
    Each histotype is defined by a characteristic driver landscape: TP53 and BRCA in HGSC;
    KRAS/BRAF-driven MAPK activation in LGSC; CTNNB1, PTEN, and POLE with microsatellite
    instability in endometrioid carcinoma; ARID1A loss in clear cell carcinoma; and KRAS
    with CDKN2A loss in mucinous carcinoma. These divergent drivers convert the cell of
    origin into a malignant epithelial clone with histotype-specific therapeutic
    vulnerabilities.
  genes:
  - preferred_term: TP53
    term:
      id: hgnc:11998
      label: TP53
  - preferred_term: KRAS
    term:
      id: hgnc:6407
      label: KRAS
  - preferred_term: BRAF
    term:
      id: hgnc:1097
      label: BRAF
  - preferred_term: CTNNB1
    term:
      id: hgnc:2514
      label: CTNNB1
  - preferred_term: PTEN
    term:
      id: hgnc:9588
      label: PTEN
  - preferred_term: ARID1A
    term:
      id: hgnc:11110
      label: ARID1A
  - preferred_term: CDKN2A
    term:
      id: hgnc:1787
      label: CDKN2A
  biological_processes:
  - preferred_term: MAPK cascade
    modifier: INCREASED
    term:
      id: GO:0000165
      label: MAPK cascade
  - preferred_term: Wnt signaling pathway
    modifier: ABNORMAL
    term:
      id: GO:0016055
      label: Wnt signaling pathway
  evidence:
  - reference: PMID:33919741
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      TP53 and BRCA mutations are typical of high-grade serous carcinoma, whereas BRAF and
      KRAS mutations frequently occur in low-grade serous carcinoma.
    explanation: >-
      Supports the serous-histotype driver assignments within the divergent activation
      node.
  - reference: PMID:20942669
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      These data implicate ARID1A as a tumor-suppressor gene frequently disrupted in
      ovarian clear-cell and endometrioid carcinomas.
    explanation: >-
      Supports ARID1A loss as the driver linking the clear cell and endometrioid
      histotypes.
  downstream:
  - target: MAPK-Driven Low-Grade Serous Proliferation
    description: KRAS/BRAF activation sustains the MAPK output that drives LGSC growth.
  - target: Homologous Recombination Deficiency
    description: >-
      In HGSC and other non-mucinous histotypes, BRCA1/2 loss converges on HRD.
  - target: Malignant Epithelial Proliferation
    description: Histotype drivers converge on sustained malignant epithelial proliferation.
- name: MAPK-Driven Low-Grade Serous Proliferation
  description: >-
    In low-grade serous carcinoma, recurrent KRAS or BRAF mutation drives constitutive
    MAPK-cascade signaling that sustains proliferation and confers relative chemoresistance.
    This MAPK dependency is the therapeutic rationale for MEK inhibition, which improves
    progression-free survival relative to standard care in recurrent LGSC.
  genes:
  - preferred_term: KRAS
    term:
      id: hgnc:6407
      label: KRAS
  - preferred_term: BRAF
    term:
      id: hgnc:1097
      label: BRAF
  biological_processes:
  - preferred_term: MAPK cascade
    modifier: INCREASED
    term:
      id: GO:0000165
      label: MAPK cascade
  evidence:
  - reference: PMID:35123694
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Low-grade serous carcinoma of the ovary or peritoneum is characterised by MAPK
      pathway aberrations and its reduced sensitivity to chemotherapy relative to
      high-grade serous carcinoma.
    explanation: >-
      Establishes MAPK-pathway dependence and reduced chemosensitivity as the defining LGSC
      mechanism.
  downstream:
  - target: Malignant Epithelial Proliferation
    description: MAPK signaling sustains malignant LGSC epithelial proliferation.
- name: Homologous Recombination Deficiency
  conforms_to: "dna_repair_synthetic_lethality#HRR or FA/BRCA Repair Deficiency"
  description: >-
    A large fraction of non-mucinous EOC, and roughly half of HGSC, demonstrates defective
    homologous recombination repair through BRCA1/2 mutation, BRCA1 promoter methylation,
    or other HR-pathway lesions. HRD produces genomic scarring, underlies platinum
    sensitivity, and instantiates the trigger node of the DNA-repair synthetic-lethality
    module, making epithelial ovarian cancer the prototypical disease for PARP-inhibitor
    synthetic lethality.
  genes:
  - preferred_term: BRCA1
    term:
      id: hgnc:1100
      label: BRCA1
  - preferred_term: BRCA2
    term:
      id: hgnc:1101
      label: BRCA2
  biological_processes:
  - preferred_term: double-strand break repair via homologous recombination
    modifier: DECREASED
    term:
      id: GO:0000724
      label: double-strand break repair via homologous recombination
  evidence:
  - reference: PMID:21720365
    reference_title: "Integrated genomic analyses of ovarian carcinoma."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Pathway analyses suggested that homologous recombination is defective in about half
      of the tumours analysed
    explanation: >-
      TCGA establishes HRD as a central mechanism in the dominant HGSC histotype of ovarian
      adenocarcinoma.
  downstream:
  - target: PARP and Platinum Synthetic Lethality
    description: >-
      HRD creates the synthetic-lethal vulnerability that PARP inhibitors and platinum
      agents exploit.
- name: PARP and Platinum Synthetic Lethality
  conforms_to: "dna_repair_synthetic_lethality#PARP and Platinum Synthetic Lethality"
  description: >-
    In HRD-positive epithelial ovarian cancer, PARP inhibition blocks single-strand break
    repair and converts unresolved lesions into double-strand breaks that cannot be
    faithfully repaired, while platinum agents add interstrand crosslinks that similarly
    stress HRR. This canonical synthetic-lethal exploitation drives durable maintenance
    PARP-inhibitor benefit in BRCA-associated and HRD-positive ovarian cancer. The deeper
    HGSC-specific resistance graph (POLQ escape, BRCA reversion) is curated in the dedicated
    HGSC entry and not duplicated here.
  genes:
  - preferred_term: PARP1
    term:
      id: hgnc:270
      label: PARP1
  biological_processes:
  - preferred_term: DNA repair
    modifier: DECREASED
    term:
      id: GO:0006281
      label: DNA repair
  evidence:
  - reference: PMID:36082969
    reference_title: "Overall Survival With Maintenance Olaparib at a 7-Year Follow-Up in Patients With Newly Diagnosed Advanced Ovarian Cancer and a BRCA Mutation: The SOLO1/GOG 3004 Trial."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      At 7 years, 67.0% of olaparib patients versus 46.5% of placebo patients were alive,
      and 45.3% versus 20.6%, respectively, were alive and had not received a first
      subsequent treatment
    explanation: >-
      SOLO1 long-term survival data are the clinical embodiment of PARP-platinum synthetic
      lethality in BRCA-associated ovarian cancer.
- name: Malignant Epithelial Proliferation
  description: >-
    Across all histotypes, the divergent driver lesions converge on sustained malignant
    proliferation of ovarian/tubal epithelial tumor cells, transcoelomic peritoneal
    dissemination, and the advanced-stage clinical presentation common to epithelial
    ovarian cancer.
  cell_types:
  - preferred_term: epithelial cell
    term:
      id: CL:0000066
      label: epithelial cell
  biological_processes:
  - preferred_term: cell population proliferation
    modifier: INCREASED
    term:
      id: GO:0008283
      label: cell population proliferation
  evidence:
  - reference: PMID:40690248
    reference_title: "Ovarian Cancer: A Review."
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      about 80% have advanced-stage disease (stage III-IV), including extrapelvic disease,
      ascites, and abdominal masses.
    explanation: >-
      Supports the shared advanced-stage disseminated presentation that epithelial ovarian
      carcinoma proliferation produces.
