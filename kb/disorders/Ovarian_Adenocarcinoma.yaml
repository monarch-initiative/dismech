      label: ARID1A
  notes: >-
    ARID1A loss is a frequent, early SWI/SNF-pathway driver in clear cell and endometrioid
    carcinomas and is absent in high-grade serous carcinoma.
  evidence:
  - reference: PMID:20942669
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      ARID1A mutations were seen in 55 of 119 ovarian clear-cell carcinomas (46%), 10 of
      33 endometrioid carcinomas (30%), and none of the 76 high-grade serous ovarian
      carcinomas.
    explanation: >-
      Quantifies ARID1A as a clear cell / endometrioid driver absent in HGSC.
- name: CTNNB1
  association: Activating beta-catenin mutation in endometrioid carcinoma
  gene_term:
    preferred_term: CTNNB1
    term:
      id: hgnc:2514
      label: CTNNB1
  notes: >-
    CTNNB1 (beta-catenin) alterations activate Wnt signaling and are characteristic of the
    endometrioid histotype.
  evidence:
  - reference: PMID:33919741
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Endometrioid tumors are characterized by β-catenin alterations, microsatellite
      instability, and PTEN and POLE mutations, while ARID1A mutations occur in both
      endometrioid and clear cell carcinomas.
    explanation: >-
      Supports CTNNB1/beta-catenin alteration as an endometrioid-histotype driver.
treatments:
- name: Cytoreductive Surgery
  description: >-
    Cytoreductive (debulking) surgery is a core component of epithelial ovarian cancer
    management, performed as primary or interval debulking depending on resectability and
    response to neoadjuvant chemotherapy.
  evidence:
  - reference: PMID:40690248
    reference_title: "Ovarian Cancer: A Review."
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Advanced-stage ovarian cancer may be treated with primary cytoreductive surgery
      (removal of all visible cancer in the abdominal cavity) and adjuvant chemotherapy
      (carboplatin and paclitaxel) or with neoadjuvant chemotherapy followed by
      cytoreductive surgery and adjuvant chemotherapy.
    explanation: >-
      Supports cytoreductive surgery as a standard component of epithelial ovarian cancer
      care.
  treatment_term:
    preferred_term: cytoreductive surgery
    term:
      id: MAXO:0000004
      label: surgical procedure
- name: Carboplatin/Paclitaxel
  description: >-
    Platinum-taxane chemotherapy is the first-line systemic backbone across epithelial
    ovarian cancer histotypes, in both early-stage adjuvant and advanced-stage settings.
  evidence:
  - reference: PMID:40690248
    reference_title: "Ovarian Cancer: A Review."
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Advanced-stage ovarian cancer may be treated with primary cytoreductive surgery
      (removal of all visible cancer in the abdominal cavity) and adjuvant chemotherapy
      (carboplatin and paclitaxel) or with neoadjuvant chemotherapy followed by
      cytoreductive surgery and adjuvant chemotherapy.
    explanation: >-
      Supports carboplatin/paclitaxel as the standard systemic backbone in epithelial
      ovarian cancer.
  treatment_term:
    preferred_term: chemotherapy
    term:
      id: MAXO:0000647
      label: chemotherapy
    therapeutic_agent:
    - preferred_term: carboplatin
      term:
        id: NCIT:C1282
        label: Carboplatin
    - preferred_term: paclitaxel
      term:
        id: NCIT:C1411
        label: Paclitaxel
- name: PARP Inhibitor Maintenance
  description: >-
    PARP-inhibitor maintenance (e.g., olaparib) provides durable benefit after first-line
    platinum response in BRCA-associated and HRD-positive epithelial ovarian cancer.
  therapeutic_modality: SMALL_MOLECULE
  evidence:
  - reference: PMID:36082969
    reference_title: "Overall Survival With Maintenance Olaparib at a 7-Year Follow-Up in Patients With Newly Diagnosed Advanced Ovarian Cancer and a BRCA Mutation: The SOLO1/GOG 3004 Trial."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      At 7 years, 67.0% of olaparib patients versus 46.5% of placebo patients were alive,
      and 45.3% versus 20.6%, respectively, were alive and had not received a first
      subsequent treatment
    explanation: >-
      SOLO1 provides direct long-term randomized evidence for maintenance olaparib in
      BRCA-associated ovarian cancer.
  treatment_term:
    preferred_term: targeted therapy
    term:
      id: NCIT:C93352
      label: Targeted Therapy
    therapeutic_agent:
    - preferred_term: olaparib
      term:
        id: NCIT:C71721
        label: Olaparib
- name: Bevacizumab
  description: >-
    Bevacizumab, an anti-angiogenic monoclonal antibody, is used with chemotherapy and as
    maintenance therapy in advanced epithelial ovarian cancer.
  therapeutic_modality: MONOCLONAL_ANTIBODY
  evidence:
  - reference: PMID:40690248
    reference_title: "Ovarian Cancer: A Review."
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Most patients with advanced-stage ovarian cancer receive maintenance therapy with
      bevacizumab (a monoclonal antibody that blocks angiogenesis) and/or
      poly-adenosine diphosphate ribose polymerase (PARP) inhibitors.
    explanation: >-
      Supports bevacizumab as a standard maintenance option in advanced ovarian cancer.
  treatment_term:
    preferred_term: targeted therapy
    term:
      id: NCIT:C93352
      label: Targeted Therapy
    therapeutic_agent:
    - preferred_term: bevacizumab
      term:
        id: NCIT:C2039
        label: Bevacizumab
- name: Trametinib (Low-Grade Serous Carcinoma)
  description: >-
    The MEK inhibitor trametinib targets MAPK-pathway dependence in recurrent low-grade
    serous carcinoma and improves progression-free survival relative to standard care.
  therapeutic_modality: SMALL_MOLECULE
  evidence:
  - reference: PMID:35123694
    reference_title: "Trametinib versus standard of care in patients with recurrent low-grade serous ovarian cancer (GOG 281/LOGS): an international, randomised, open-label, multicentre, phase 2/3 trial."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Median progression-free survival in the trametinib group was 13·0 months (95% CI
      9·9-15·0) compared with 7·2 months (5·6-9·9) in the standard-of-care group
    explanation: >-
      GOG 281/LOGS provides randomized evidence that MEK inhibition benefits the
      MAPK-driven low-grade serous histotype.
  treatment_term:
    preferred_term: targeted therapy
    term:
      id: NCIT:C93352
      label: Targeted Therapy
    therapeutic_agent:
    - preferred_term: trametinib
      term:
        id: NCIT:C77908
        label: Trametinib
