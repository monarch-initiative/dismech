pathophysiology:
- name: FGFR1 gain-of-function signaling in cranial sutures
  conforms_to: "fgfr_gain_of_function_skeletal_dysplasia#Constitutive FGFR Activation"
  description: >-
    Gain-of-function mutations in FGFR1 lead to constitutive receptor activation,
    promoting premature osteoblast differentiation and premature fusion of cranial
    sutures. The enhanced FGFR signaling drives accelerated cranial suture
    morphogenesis and osteogenesis, resulting in craniosynostosis and the
    characteristic broad digits phenotype.
  gene:
    preferred_term: FGFR1
    description: Fibroblast growth factor receptor 1, a transmembrane tyrosine kinase crucial for craniofacial and limb skeletal development.
    modifier: INCREASED
    term:
      id: hgnc:3688
      label: FGFR1
  cell_types:
  - preferred_term: Osteoblast
    term:
      id: CL:0000062
      label: osteoblast
  biological_processes:
  - preferred_term: FGFR signaling pathway
    term:
      id: GO:0008543
      label: fibroblast growth factor receptor signaling pathway
    modifier: INCREASED
  - preferred_term: Cranial suture morphogenesis
    term:
      id: GO:0060363
      label: cranial suture morphogenesis
  - preferred_term: Bone development
    term:
      id: GO:0060348
      label: bone development
  evidence:
  - reference: PMID:29019756
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "FGFR1, FGFR2, and FGFR3 are crucial for both chondrogenesis and osteogenesis. Mutations in the genes encoding FGFRs, types 1-3, are responsible for various skeletal dysplasias and craniosynostosis syndromes."
    explanation: Establishes FGFR1 role in skeletal development and craniosynostosis.
  downstream:
  - target: Accelerated cranial suture osteogenesis
    description: >-
      Constitutively active FGFR1 promotes osteogenic differentiation in cranial
      suture mesenchyme.
    causal_link_type: DIRECT
  - target: Limb and Digital Skeletal Patterning Abnormality
    description: >-
      FGFR gain-of-function also alters appendicular skeletal development,
      producing broad, deviated thumbs and great toes with variable syndactyly.
    causal_link_type: INDIRECT_KNOWN_INTERMEDIATES
- name: Accelerated cranial suture osteogenesis
  conforms_to: "fgfr_gain_of_function_skeletal_dysplasia#Cranial Suture Osteogenic Acceleration"
  description: >
    Activated FGFR1 signaling accelerates osteoblast differentiation within
    cranial suture mesenchyme, the conserved osteogenic branch shared across the
    FGFR craniosynostoses.
  cell_types:
  - preferred_term: Osteoblast
    term:
      id: CL:0000062
      label: osteoblast
