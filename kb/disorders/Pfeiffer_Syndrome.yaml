name: Pfeiffer Syndrome
creation_date: '2026-02-06T03:25:37Z'
updated_date: '2026-04-04T18:00:00Z'
category: Mendelian
description: >-
  This entry covers FGFR1-related Pfeiffer syndrome specifically. Pfeiffer syndrome
  is a craniosynostosis syndrome that can be caused by gain-of-function mutations in
  either FGFR1 or FGFR2; FGFR2 mutations are more common and can cause all three
  clinical subtypes, but are not covered here. FGFR1 mutations (particularly p.Pro252Arg)
  account for a subset of cases, typically presenting with the milder Type 1 (classic)
  phenotype characterized by premature fusion of cranial sutures, broad thumbs and
  great toes, variable syndactyly, and normal intelligence. Types 2 and 3, which are
  more severe with cloverleaf skull or multisuture synostosis, are predominantly
  associated with FGFR2 mutations.
