treatments:
- name: Cranial vault reconstruction
  description: >-
    Surgical expansion of the cranial vault to relieve intracranial pressure and
    correct skull deformity. May require staged procedures depending on severity.
  treatment_term:
    preferred_term: Cranial vault reconstruction
    term:
      id: MAXO:0000004
      label: surgical procedure
- name: Midface advancement surgery
  description: >-
    Le Fort III or monobloc osteotomy to advance the midface, improving airway,
    proptosis, and facial appearance.
  treatment_term:
    preferred_term: Midface advancement
    term:
      id: MAXO:0000004
      label: surgical procedure
