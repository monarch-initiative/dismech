name: Pfeiffer Syndrome
creation_date: '2026-02-06T03:25:37Z'
updated_date: '2026-04-04T12:00:00Z'
category: Mendelian
description: >-
  Pfeiffer syndrome is a craniosynostosis syndrome caused by gain-of-function mutations
  in FGFR1 or FGFR2. It is characterized by premature fusion of cranial sutures,
  broad thumbs and great toes, and variable syndactyly of the hands and feet. Three
  clinical subtypes are recognized. Type 1 (classic) has the best prognosis with normal
  intelligence. Types 2 and 3 are more severe with cloverleaf skull deformity or
  multisuture synostosis respectively, and carry significant morbidity. FGFR1 mutations
  account for a subset of cases, typically presenting with the milder Type 1 phenotype.
