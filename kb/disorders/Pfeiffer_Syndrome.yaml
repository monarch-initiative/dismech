      label: osteoblast differentiation
    modifier: INCREASED
  evidence:
  - reference: PMID:29019756
    supports: PARTIAL
    evidence_source: HUMAN_CLINICAL
    snippet: "FGFR1, FGFR2, and FGFR3 are crucial for both chondrogenesis and osteogenesis. Mutations in the genes encoding FGFRs, types 1-3, are responsible for various skeletal dysplasias and craniosynostosis syndromes."
    explanation: >-
      Family-level evidence that FGFRs (including FGFR1) drive osteogenesis and
      that their activating mutations cause craniosynostosis. This supports the
      suture osteogenic-acceleration branch by analogy with the FGFR2/FGFR3
      mechanisms; FGFR1-specific osteoblast-differentiation data in Pfeiffer
      sutures is not yet captured here.
  downstream:
  - target: Premature cranial suture fusion
    description: Excess suture osteogenesis precipitates premature suture fusion.
    causal_link_type: DIRECT
- name: Premature cranial suture fusion
  conforms_to: "fgfr_gain_of_function_skeletal_dysplasia#Premature Suture Fusion and Craniosynostosis"
  description: >
    Accelerated osteogenesis prematurely fuses cranial sutures, producing the
    craniosynostosis that, with the broad thumbs and great toes, defines
    Pfeiffer syndrome.
  locations:
  - preferred_term: cranial suture
