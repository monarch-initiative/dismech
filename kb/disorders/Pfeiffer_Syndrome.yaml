    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "premature fusion of cranial sutures and deviated broad thumbs and toes in PS;"
    explanation: >-
      Directly describes premature cranial suture fusion as the defining cranial
      outcome of Pfeiffer syndrome (PS).
  downstream:
  - target: Craniosynostosis
    description: Premature suture fusion manifests clinically as craniosynostosis.
    causal_link_type: DIRECT
  - target: Craniofacial Skeletal Dysmorphogenesis
    description: >-
      Premature suture fusion and abnormal craniofacial bone growth create the
      facial and intracranial complication branch.
    causal_link_type: INDIRECT_KNOWN_INTERMEDIATES
- name: Craniofacial Skeletal Dysmorphogenesis
  description: >
    Premature cranial suture fusion and abnormal craniofacial skeletal growth
    produce the facial and intracranial complication branch of Pfeiffer syndrome,
    including proptosis, hypertelorism, midface hypoplasia/retrusion,
    hydrocephalus, and neurodevelopmental complications in severe types.
  evidence:
  - reference: PMID:16740155
    reference_title: "Pfeiffer syndrome."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Pfeiffer syndrome can be diagnosed prenatally by sonography showing craniosynostosis, hypertelorism with proptosis, and broad thumb"
    explanation: The Orphanet Journal review links craniosynostosis to hypertelorism and proptosis in Pfeiffer syndrome.
  - reference: PMID:33083874
    reference_title: "Nervous system involvement in Pfeiffer syndrome."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "it is the premature fusion and abnormal growth of the facial skeleton's bones that cause the characteristic facial features of these patients."
    explanation: Systematic review supports abnormal craniofacial skeletal growth as the source of facial features.
  downstream:
  - target: Proptosis
    description: Shallow/abnormally grown craniofacial skeleton causes ocular proptosis.
    causal_link_type: DIRECT
    evidence:
    - reference: PMID:16740155
      reference_title: "Pfeiffer syndrome."
      supports: SUPPORT
      evidence_source: HUMAN_CLINICAL
      snippet: "Hydrocephaly may be found occasionally, along with severe ocular proptosis, ankylosed elbows, abnormal viscera, and slow development."
      explanation: The review documents severe ocular proptosis in Pfeiffer syndrome.
  - target: Hypertelorism
    description: Craniofacial skeletal dysmorphogenesis produces hypertelorism.
    causal_link_type: DIRECT
    evidence:
    - reference: PMID:16740155
      reference_title: "Pfeiffer syndrome."
      supports: SUPPORT
      evidence_source: HUMAN_CLINICAL
      snippet: "Pfeiffer syndrome can be diagnosed prenatally by sonography showing craniosynostosis, hypertelorism with proptosis, and broad thumb"
      explanation: The review identifies hypertelorism with proptosis as a prenatal diagnostic feature.
  - target: Depressed nasal bridge
    description: >-
      Abnormal craniofacial skeletal growth can include nasal-root flattening;
      this pathograph edge is retained without a direct cached snippet because
      the local PubMed abstracts support the broader craniofacial branch.
    causal_link_type: INDIRECT_UNKNOWN_INTERMEDIATES
  - target: Midface retrusion
    description: Midface hypoplasia/retrusion is part of the craniofacial skeletal branch.
    causal_link_type: DIRECT
    evidence:
    - reference: PMID:25129254
      reference_title: "Pfeiffer syndrome: clinical and genetic findings in five Brazilian families."
      supports: SUPPORT
      evidence_source: HUMAN_CLINICAL
      snippet: "Pfeiffer syndrome (PS) is mainly characterized by craniosysnostosis, midface hypoplasia, great toes with partial syndactyly of the digits, broad and medially deviated thumbs."
      explanation: The family series identifies midface hypoplasia as a core Pfeiffer feature.
  - target: Hydrocephalus
    description: Severe craniosynostosis can produce secondary intracranial complications including hydrocephalus.
    causal_link_type: INDIRECT_KNOWN_INTERMEDIATES
    intermediate_mechanisms:
    - Skull deformity and impaired cerebrospinal fluid dynamics
    evidence:
    - reference: PMID:33083874
      reference_title: "Nervous system involvement in Pfeiffer syndrome."
      supports: SUPPORT
      evidence_source: HUMAN_CLINICAL
      snippet: "Secondary anomalies are the result of skull deformity and include intracranial hypertension, hydrocephalus, and Chiari type I malformation."
      explanation: Systematic review links skull deformity in Pfeiffer syndrome to hydrocephalus.
  - target: Intellectual disability
    description: Severe Pfeiffer types can include delayed development, learning difficulties, and intellectual disability.
    causal_link_type: INDIRECT_KNOWN_INTERMEDIATES
    evidence:
    - reference: PMID:33083874
      reference_title: "Nervous system involvement in Pfeiffer syndrome."
      supports: SUPPORT
      evidence_source: HUMAN_CLINICAL
      snippet: "The main neurological abnormalities are mental retardation, learning difficulties, and seizures."
      explanation: Systematic review supports intellectual disability/learning difficulty as a neurological abnormality in severe Pfeiffer syndrome.
  - target: High palate
    description: Craniofacial skeletal dysmorphogenesis can include high-arched palate.
    causal_link_type: INDIRECT_UNKNOWN_INTERMEDIATES
    evidence:
    - reference: PMID:957376
      reference_title: "Pfeiffer syndrome: report of a family and review of the literature."
      supports: SUPPORT
      evidence_source: HUMAN_CLINICAL
      snippet: "high-arched palate"
      explanation: The family report directly documents high-arched palate in Pfeiffer syndrome.
- name: Limb and Digital Skeletal Patterning Abnormality
  description: >
    FGFR1/FGFR2 gain-of-function perturbs limb and digit skeletal patterning,
    accounting for broad, medially deviated thumbs and great toes and variable
    partial syndactyly of the hands and feet.
  evidence:
  - reference: PMID:16740155
    reference_title: "Pfeiffer syndrome."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "associates craniosynostosis, broad and deviated thumbs and big toes, and partial syndactyly on hands and feet."
    explanation: The review summarizes the diagnostic limb/digit phenotype of Pfeiffer syndrome.
  - reference: PMID:25129254
    reference_title: "Pfeiffer syndrome: clinical and genetic findings in five Brazilian families."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Pfeiffer syndrome (PS) is mainly characterized by craniosysnostosis, midface hypoplasia, great toes with partial syndactyly of the digits, broad and medially deviated thumbs."
    explanation: The family series supports broad/deviated thumbs and partial digit syndactyly.
  downstream:
  - target: Broad thumbs
    description: Altered digital skeletal patterning produces broad, deviated thumbs.
    causal_link_type: DIRECT
    evidence:
    - reference: PMID:16740155
      reference_title: "Pfeiffer syndrome."
      supports: SUPPORT
      evidence_source: HUMAN_CLINICAL
      snippet: "associates craniosynostosis, broad and deviated thumbs and big toes, and partial syndactyly on hands and feet."
      explanation: The review identifies broad and deviated thumbs as part of the core Pfeiffer phenotype.
  - target: Broad great toes
    description: Altered hallux skeletal patterning produces broad, deviated great toes.
    causal_link_type: DIRECT
    evidence:
    - reference: PMID:16740155
      reference_title: "Pfeiffer syndrome."
      supports: SUPPORT
      evidence_source: HUMAN_CLINICAL
      snippet: "associates craniosynostosis, broad and deviated thumbs and big toes, and partial syndactyly on hands and feet."
      explanation: The review identifies broad and deviated big toes as part of the core Pfeiffer phenotype.
  - target: Syndactyly
    description: Limb-patterning disruption produces partial syndactyly of hands and feet.
    causal_link_type: DIRECT
    evidence:
    - reference: PMID:16740155
      reference_title: "Pfeiffer syndrome."
      supports: SUPPORT
      evidence_source: HUMAN_CLINICAL
      snippet: "partial syndactyly on hands and feet."
      explanation: The review directly identifies partial syndactyly as a Pfeiffer phenotype.
