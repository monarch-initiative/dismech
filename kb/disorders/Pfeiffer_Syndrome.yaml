genetic:
- name: FGFR1 gain-of-function mutations
  association: Causative
  gene_term:
    preferred_term: FGFR1
    term:
      id: hgnc:3688
      label: FGFR1
  notes: >-
    FGFR1 mutations (particularly p.Pro252Arg) account for a subset of Pfeiffer syndrome
    cases, typically presenting with the milder Type 1 phenotype. FGFR2 mutations are
    more common and can cause all three types.
  evidence:
  - reference: PMID:29019756
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Skeletal disorders caused by type 1 mutations include Pfeiffer syndrome (PS) and osteoglophonic dysplasia"
    explanation: Confirms FGFR1 (type 1) mutations as a cause of Pfeiffer syndrome.
treatments:
- name: Cranial vault reconstruction
  description: >-
    Surgical expansion of the cranial vault to relieve intracranial pressure and
    correct skull deformity. May require staged procedures depending on severity.
  treatment_term:
    preferred_term: Cranial vault reconstruction
    term:
      id: MAXO:0000004
      label: surgical procedure
- name: Midface advancement surgery
  description: >-
    Le Fort III or monobloc osteotomy to advance the midface, improving airway,
    proptosis, and facial appearance.
  treatment_term:
    preferred_term: Midface advancement
    term:
      id: MAXO:0000004
      label: surgical procedure
