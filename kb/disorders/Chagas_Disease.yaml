      supports: SUPPORT
      snippet: "differentiate into amastigotes that replicate by binary fission"
      explanation: The abstract reports amastigote differentiation and
        replication in host cells.
transmission:
- name: Triatomine fecal contamination during blood feeding
  description: Infected triatomines release metacyclic trypomastigotes in feces
    during blood meals.
  evidence:
  - reference: PMID:18512345
    reference_title: "Host cell actin remodeling in response to Trypanosoma cruzi:
      trypomastigote versus amastigote entry."
    supports: SUPPORT
    snippet: "While feeding on host's blood, infected triatomines release in their
      feces highly motile and infective metacyclic trypomastigotes that may initiate
      infection."
    explanation: The abstract links transmission to triatomine blood feeding and
      fecal contamination.
pathophysiology:
- name: Intracellular amastigote replication in host cells
  description: Metacyclic trypomastigotes invade host cells and differentiate
    into amastigotes that proliferate intracellularly.
  evidence:
  - reference: PMID:18512345
    reference_title: "Host cell actin remodeling in response to Trypanosoma cruzi:
      trypomastigote versus amastigote entry."
    supports: SUPPORT
    snippet: "Metacyclic trypomastigotes promptly invade host cells (including gastric
      mucosa) and once free in the cytoplasm, differentiate into amastigotes that
      replicate by binary fission."
    explanation: The abstract describes intracellular invasion and amastigote
      replication.
