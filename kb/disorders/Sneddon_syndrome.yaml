- name: Cerebral ischemic injury
  description: >-
    Recurrent occlusive cerebrovascular events produce stroke, cerebral
    atrophy, and long-term neurologic impairment.
  evidence:
  - reference: PMID:17665002
    reference_title: Clinical, neurovascular and neuropathological features in Sneddon's syndrome.
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      The patients had repeated ischemic cerebral episodes, livedo
      reticularis and thrombocytopenia. CT and MRI showed strokes and cerebral
      atrophy.
    explanation: >-
      This directly supports recurrent ischemic brain injury as a central
      downstream mechanism.
- name: Cutaneous livedo
  description: >-
    Generalized livedo reticularis or livedo racemosa is the characteristic
    dermatologic expression of the underlying vasculopathy.
