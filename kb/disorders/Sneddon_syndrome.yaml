differential_diagnoses:
- name: Antiphospholipid syndrome
  description: >-
    Antiphospholipid syndrome can overlap clinically with Sneddon syndrome
    because both can combine livedo and ischemic cerebrovascular disease.
  disease_term:
    preferred_term: antiphospholipid syndrome
    term:
      id: MONDO:8000010
      label: antiphospholipid syndrome
  evidence:
  - reference: PMID:17665002
    reference_title: Clinical, neurovascular and neuropathological features in Sneddon's syndrome.
    supports: PARTIAL
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Antiphospholipid antibodies may be found in some patients with ischemic
      cerebrovascular events and livedo reticularis. SS may thus be associated
      with antiphospholipid syndrome.
    explanation: >-
      This supports antiphospholipid syndrome as an important overlapping
      diagnosis and differential consideration.
