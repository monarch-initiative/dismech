- name: Combination vasculoprotective pharmacotherapy
  description: >-
    Combination therapy adding alprostadil and captopril to standard
    antithrombotic treatment may reduce recurrent ischemic events.
  treatment_term:
    preferred_term: pharmacotherapy
    term:
      id: MAXO:0000058
