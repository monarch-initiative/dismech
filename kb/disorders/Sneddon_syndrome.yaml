name: Sneddon syndrome
creation_date: '2026-04-14T12:00:00Z'
updated_date: '2026-04-14T21:35:00Z'
category: Complex
description: >-
  Sneddon syndrome is a rare occlusive vasculopathy characterized by livedo
  reticularis or livedo racemosa and recurrent ischemic cerebrovascular events.
  The core disease mechanism is a chronic arteriopathy affecting skin and brain,
  producing transient ischemic attacks, stroke, and progressive neurologic
  impairment.
