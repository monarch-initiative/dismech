pathophysiology:
- name: Occlusive vasculopathy
  description: >-
    Sneddon syndrome is understood as an occlusive vasculopathy or thrombotic
    microangiopathy affecting small- and medium-sized vessels.
  evidence:
  - reference: DOI:10.1111/ddg.15422
    reference_title: >-
      Combination therapy for Sneddon syndrome to reduce the incidence of
      cerebrovascular complications
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Sneddon syndrome is an occlusive vasculopathy that presents clinically
      with generalized livedo racemosa on the skin and transient ischemic
      attacks, strokes, and cognitive or motor deficits in the central nervous
      system.
    explanation: >-
      This directly supports occlusive vasculopathy as the central disease
      mechanism.
