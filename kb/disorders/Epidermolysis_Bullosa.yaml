  downstream:
  - target: Mechanical Fragility and Blister Formation
    description: >
      Loss of structural integrity at the dermal-epidermal junction leads
      to tissue separation and blister formation upon minimal mechanical stress.
    evidence:
    - reference: PMID:39090514
      reference_title: "Treatment of Epidermolysis Bullosa and Future Directions: A Review."
      supports: SUPPORT
      evidence_source: HUMAN_CLINICAL
      snippet: "Epidermolysis bullosa (EB) comprises rare genetic disorders
        characterized by skin and mucosal membrane blistering induced by
        mechanical trauma. Molecularly, pathogenic variants affect genes
        encoding proteins crucial for epidermal-dermal adhesion and stability"
      explanation: Directly supports the causal link between loss of adhesion/stability proteins and mechanically induced blistering.
  evidence:
  - reference: PMID:32973163
    reference_title: "Epidermolysis bullosa."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "pathogenetic mutations in 16 distinct genes have been implicated
      in EB, encoding proteins influencing cellular integrity and adhesion"
    explanation: Confirms that mutations in at least 16 genes encoding structural
      and adhesion proteins underlie all forms of EB.
  - reference: PMID:32017015
    reference_title: "Consensus reclassification of inherited epidermolysis bullosa and other disorders with skin fragility."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "we introduce the concept of genetic disorders with skin fragility,
      of which classical EB represents the prototype"
    explanation: Confirms that EB is the prototypical genetic disorder with skin
      fragility resulting from structural protein defects.
- name: Mechanical Fragility and Blister Formation
  description: >
    Disruption of the structural proteins that anchor the epidermis to the
    dermis results in tissue separation and blister formation in response to
    minimal mechanical trauma or friction. The level of cleavage within the
    skin determines the EB type and influences the severity of blistering
    and the propensity for scarring.
  biological_processes:
  - preferred_term: cell adhesion
    modifier: DECREASED
    term:
      id: GO:0007155
      label: cell adhesion
  cell_types:
  - preferred_term: keratinocyte
    term:
      id: CL:0000312
      label: keratinocyte
  downstream:
  - target: Wound Healing Impairment and Chronic Wounds
    description: >
      Repeated blister formation and epithelial loss leads to chronic wounds
      and impaired wound healing.
    evidence:
    - reference: PMID:31920360
      reference_title: "From Clinical Phenotype to Genotypic Modelling: Incidence and Prevalence of Recessive Dystrophic Epidermolysis Bullosa (RDEB)."
      supports: SUPPORT
      evidence_source: HUMAN_CLINICAL
      snippet: "Recessive dystrophic epidermolysis bullosa (RDEB) is an inherited
        genetic disorder characterized by recurrent and chronic open wounds"
      explanation: Supports progression from recurrent blistering in severe EB to chronic open wounds and impaired healing.
  - target: Secondary Complications
    description: >
      Chronic skin barrier disruption leads to infection, scarring, nutritional
      deficiency, and pain.
    evidence:
    - reference: PMID:39090514
      reference_title: "Treatment of Epidermolysis Bullosa and Future Directions: A Review."
      supports: SUPPORT
      evidence_source: HUMAN_CLINICAL
      snippet: "Management of severe EB is multidisciplinary, focusing on wound
        healing support, ensuring that patients thrive, and complication
        treatment"
      explanation: Supports that severe EB commonly progresses beyond blistering to complications requiring dedicated wound-healing and complication management.
  evidence:
  - reference: PMID:32973163
    reference_title: "Epidermolysis bullosa."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "mucocutaneous fragility and blister formation, inducible by often
      minimal trauma"
    explanation: Confirms that the cardinal feature of EB is blister formation
      triggered by minimal trauma due to mucocutaneous fragility.
  - reference: PMID:34036913
    reference_title: "Epidermolysis Bullosa: Pediatric Perspectives."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "a group of rare congenital genetic conditions that result in
      painful blistering of the skin and mucous membranes, which occur with
      minor trauma or friction"
    explanation: Confirms that blistering is triggered by minor trauma or friction
      in EB.
- name: Wound Healing Impairment and Chronic Wounds
  description: >
    Chronic and recurrent blister formation leads to impaired wound healing,
    particularly in the more severe forms of EB. In dystrophic EB, deficiency
    of type VII collagen impairs anchoring fibril formation, leading to
    chronic non-healing wounds and progressive scarring. Chronic wounds are
    associated with pain, infection risk, and in severe cases, development
    of squamous cell carcinoma.
  biological_processes:
  - preferred_term: wound healing
    modifier: ABNORMAL
    term:
      id: GO:0042060
      label: wound healing
  cell_types:
  - preferred_term: fibroblast
    term:
      id: CL:0000057
      label: fibroblast
  downstream:
  - target: Secondary Complications
    description: >
      Chronic wounds predispose to infection, scarring, and malignant
      transformation in severe EB subtypes.
    evidence:
    - reference: PMID:32973163
      reference_title: "Epidermolysis bullosa."
      supports: SUPPORT
      evidence_source: HUMAN_CLINICAL
      snippet: "specific complications, the most feared of which - and also the
        leading cause of mortality - is squamous cell carcinoma"
      explanation: Supports that chronic wound burden in EB is linked to serious downstream complications, including malignant transformation.
  evidence:
  - reference: PMID:32973163
    reference_title: "Epidermolysis bullosa."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "multidisciplinary care is targeted towards minimizing the risk
      of blister formation, wound care, symptom relief and specific
      complications, the most feared of which - and also the leading cause of
      mortality - is squamous cell carcinoma"
    explanation: Confirms that chronic wound complications including squamous
      cell carcinoma are major concerns in EB management.
  - reference: PMID:25279494
    reference_title: "Inherited epidermolysis bullosa."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "a specific attention to the fragile skin is required in order
      to reduce pain, risk of trauma, ulceration and infection"
    explanation: Confirms that ulceration and impaired wound healing are
      significant complications requiring specialized management.
- name: Secondary Complications
  description: >
    Chronic skin barrier disruption in EB leads to a range of secondary
    complications including bacterial infection of wounds, progressive scarring
    (especially in dystrophic EB), nutritional deficiency due to oral and
    esophageal involvement, anemia of chronic disease, and growth retardation.
    Severe forms carry risk of squamous cell carcinoma as the leading cause
    of mortality.
  biological_processes:
  - preferred_term: inflammatory response
    modifier: INCREASED
    term:
      id: GO:0006954
      label: inflammatory response
  - preferred_term: collagen fibril organization
    modifier: ABNORMAL
    term:
      id: GO:0030199
      label: collagen fibril organization
  cell_types:
  - preferred_term: fibroblast
    term:
      id: CL:0000057
      label: fibroblast
  evidence:
  - reference: PMID:32973163
    reference_title: "Epidermolysis bullosa."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "A broad phenotypic spectrum has been described, with potentially
      severe extracutaneous manifestations, morbidity and mortality"
    explanation: Confirms that EB has severe extracutaneous complications
      contributing to morbidity and mortality.
  - reference: PMID:20507631
    reference_title: "Inherited epidermolysis bullosa."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Clinical manifestations range widely, from localized blistering
      of the hands and feet to generalized blistering of the skin and oral
      cavity, and injury to many internal organs"
    explanation: Confirms the broad range of secondary complications including
      internal organ involvement.
phenotypes:
- category: Integument
  name: Skin Fragility and Blistering
  description: >
    The cardinal feature of all EB types. Recurrent blister formation as the
    result of structural fragility within the skin, triggered by minimal
    mechanical trauma or friction. Severity ranges from localized blistering
    of hands and feet to generalized involvement.
  frequency: VERY_FREQUENT
  phenotype_term:
    preferred_term: skin fragility with blistering
    term:
      id: HP:0008066
      label: Abnormal blistering of the skin
  evidence:
  - reference: PMID:32973163
    reference_title: "Epidermolysis bullosa."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "mucocutaneous fragility and blister formation, inducible by often
      minimal trauma"
    explanation: Confirms skin fragility and blister formation as the defining
      feature of EB.
  - reference: PMID:20507631
    reference_title: "Inherited epidermolysis bullosa."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "a number of disorders characterized by recurrent blister formation
      as the result of structural fragility within the skin and selected other
      tissues"
    explanation: Confirms recurrent blistering due to structural skin fragility
      across all EB types.
- category: Integument
  name: Mucosal Involvement
  description: >
    Blistering and erosions of mucous membranes including oral, esophageal,
    and ocular surfaces. Oral involvement can lead to microstomia, ankyloglossia,
    and dental complications. Esophageal involvement may cause strictures,
    particularly in dystrophic EB.
  frequency: FREQUENT
  phenotype_term:
    preferred_term: oral mucosal blistering
    term:
      id: HP:0011830
      label: Abnormal oral mucosa morphology
  notes: Oral, esophageal, and ocular mucous membranes may all be affected.
  evidence:
  - reference: PMID:20507631
    reference_title: "Inherited epidermolysis bullosa."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "generalized blistering of the skin and oral cavity, and injury to
      many internal organs"
    explanation: Confirms oral cavity involvement as part of the generalized
      disease spectrum.
  - reference: PMID:34036913
    reference_title: "Epidermolysis Bullosa: Pediatric Perspectives."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Severe complications may arise in some EB types and subtypes
      within the eye, ear, nose, upper airway, gastrointestinal and
      genitourinary tracts"
    explanation: Confirms extracutaneous mucosal involvement across multiple
      organ systems.
- category: Integument
  name: Nail Dystrophy
  description: >
    Nail changes ranging from mild ridging to complete nail loss. Common
    across all major EB types with variable severity.
  frequency: FREQUENT
  phenotype_term:
    preferred_term: nail dystrophy
    term:
      id: HP:0008404
      label: Nail dystrophy
  evidence:
  - reference: PMID:20301304
    reference_title: "Junctional Epidermolysis Bullosa."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Additional features shared by JEB and the other major forms of
      epidermolysis bullosa (EB) include congenital localized absence of skin
      (aplasia cutis congenita), milia, nail dystrophy, scarring alopecia"
    explanation: JEB GeneReviews confirms nail dystrophy as a shared feature
      across all major forms of EB.
- category: Integument
  name: Milia
  description: >
    Small white keratin-filled cysts that develop at sites of healed blisters.
    Particularly characteristic of dystrophic EB but can occur in other types.
  frequency: FREQUENT
  phenotype_term:
    preferred_term: milia
    term:
      id: HP:0001056
      label: Milia
  evidence:
  - reference: PMID:20301481
    reference_title: "Dystrophic Epidermolysis Bullosa."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "skin fragility manifested by blistering and erosions with minimal
      trauma that heals with milia and scarring"
    explanation: Supports milia as a characteristic healing outcome in dystrophic epidermolysis bullosa.
- category: Integument
  name: Scarring
  description: >
    Scarring at sites of blister healing, variable by EB type. Minimal in EB
    simplex, prominent in dystrophic EB where it can lead to pseudosyndactyly
    (mitten deformities) of hands and feet.
  frequency: FREQUENT
  phenotype_term:
    preferred_term: abnormal scarring
    term:
      id: HP:0100699
      label: Scarring
  evidence:
  - reference: PMID:20301481
    reference_title: "Dystrophic Epidermolysis Bullosa."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "skin fragility manifested by blistering and erosions with minimal
      trauma that heals with milia and scarring"
    explanation: GeneReviews confirms that blisters in DEB heal with scarring,
      a key distinguishing feature of dystrophic forms.
- category: Growth
  name: Failure to Thrive
  description: >
    Growth retardation and failure to thrive, particularly in severe generalized
    forms. Results from chronic wounds, increased metabolic demands, oral and
    esophageal involvement limiting nutritional intake, and chronic inflammation.
  frequency: FREQUENT
  phenotype_term:
    preferred_term: failure to thrive
    term:
      id: HP:0001508
      label: Failure to thrive
  evidence:
  - reference: PMID:20507631
    reference_title: "Inherited epidermolysis bullosa."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Optimal patient management requires a multidisciplinary approach,
      and revolves around the protection of susceptible tissues against trauma,
      use of sophisticated wound care dressings, aggressive nutritional support,
      and early medical or surgical interventions to correct whenever possible
      the extracutaneous complications"
    explanation: The need for aggressive nutritional support as a core
      management pillar implies significant growth and nutritional challenges
      in severe EB.
  - reference: PMID:34036913
    reference_title: "Epidermolysis Bullosa: Pediatric Perspectives."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "involves wound care, pain control, controlling infections,
      nutritional support, and prevention and treatment of complications"
    explanation: Nutritional support as a core management pillar confirms
      failure to thrive as a significant clinical issue.
- category: Blood
  name: Anemia
  description: >
    Anemia of chronic disease and/or iron deficiency anemia due to chronic
    wounds, blood loss, inflammation, and poor nutritional intake. Common
    in moderate to severe EB.
  frequency: FREQUENT
  phenotype_term:
    preferred_term: anemia
    term:
      id: HP:0001903
      label: Anemia
  evidence:
  - reference: PMID:20301481
    reference_title: "Dystrophic Epidermolysis Bullosa."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Anemia is treated with iron supplements and transfusions as needed"
    explanation: GeneReviews confirms anemia as a recognized complication of
      DEB requiring treatment with iron supplementation and transfusions.
- category: Constitutional
  name: Pain
