    term:
      id: HP:0100033
      label: Tics
  evidence:
  - reference: DOI:10.1007/s00787-021-01899-z
    reference_title: "European clinical guidelines for Tourette syndrome and other tic disorders-version 2.0. Part III: pharmacological treatment"
