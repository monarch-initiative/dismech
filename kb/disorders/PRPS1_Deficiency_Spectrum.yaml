name: PRPS1 Deficiency Spectrum
creation_date: "2026-04-04T00:00:00Z"
updated_date: "2026-04-04T00:00:00Z"
description: >-
  The PRPS1 deficiency spectrum encompasses X-linked disorders caused by
  loss-of-function mutations in PRPS1, encoding phosphoribosylpyrophosphate
  synthetase 1 (PRS-I), which catalyzes the first step of nucleotide synthesis.
  Lower residual PRS-I activity leads to more severe clinical manifestation,
  forming a severity continuum: mild deficiency causes nonsyndromic
  sensorineural hearing loss (DFN2/DFNX2), moderate deficiency causes
  Charcot-Marie-Tooth disease X5 with optic neuropathy and hearing loss,
  and severe deficiency causes Arts syndrome with early-onset ataxia,
  hypotonia, hearing loss, optic atrophy, and recurrent infections leading
  to early death. Retinal dystrophy is an additional tissue-specific
  manifestation. S-adenosylmethionine (SAM) supplementation has shown
  therapeutic promise.
category: Genetic
parents:
  - Inborn Error of Purine Metabolism
  - Neurological Disorder
disease_term:
  preferred_term: Arts syndrome
  term:
    id: MONDO:0010533
    label: Arts syndrome
has_subtypes:
  - name: Arts Syndrome
    display_name: Arts Syndrome (Severe PRPS1 Deficiency)
    description: >-
      Most severe form. Early-onset ataxia, hypotonia, prelingual
      sensorineural hearing loss, optic atrophy, intellectual disability,
      recurrent infections, and early death. Minimal residual PRS-I activity.
    subtype_term:
      preferred_term: Arts syndrome
      term:
        id: MONDO:0010533
        label: Arts syndrome
  - name: CMTX5
    display_name: Charcot-Marie-Tooth Disease X-linked 5 (Moderate Deficiency)
    description: >-
      Moderate form. Peripheral neuropathy, optic neuropathy, and
      progressive sensorineural hearing loss. Partial residual PRS-I
      activity.
    subtype_term:
      preferred_term: Charcot-Marie-Tooth disease X-linked recessive 5
      term:
        id: MONDO:0010699
        label: Charcot-Marie-Tooth disease X-linked recessive 5
  - name: DFN2
    display_name: X-linked Nonsyndromic Hearing Loss (Mild Deficiency)
    description: >-
      Mildest form. Nonsyndromic progressive sensorineural hearing loss
      without neurological involvement. Highest residual PRS-I activity
      among the deficiency subtypes.
    subtype_term:
      preferred_term: X-linked hearing loss 1
      term:
        id: MONDO:0010577
        label: hearing loss, X-linked 1
prevalence:
  - population: Global
    percentage: Rare
inheritance:
  - name: X-linked Recessive
    inheritance_term:
      preferred_term: X-linked recessive inheritance
      term:
        id: HP:0001419
        label: X-linked recessive inheritance
pathophysiology:
  - name: PRS-I Deficiency and Nucleotide Depletion
    description: >-
      Loss-of-function mutations in PRPS1 reduce PRS-I enzyme activity,
      impairing the first committed step of purine and pyrimidine nucleotide
      biosynthesis. Reduced nucleotide availability is particularly
      damaging to metabolically active tissues including neurons, auditory
      hair cells, and optic nerve. The degree of residual enzyme activity
      directly correlates with clinical severity: minimal activity causes
      Arts syndrome, partial activity causes CMTX5, and mild reduction
      causes isolated hearing loss.
    cell_types:
      - preferred_term: Neuron
        term:
          id: CL:0000540
          label: neuron
    biological_processes:
      - preferred_term: Purine nucleotide biosynthesis
        term:
          id: GO:0006164
          label: purine nucleotide biosynthetic process
    evidence:
      - reference: PMID:26089585
        supports: SUPPORT
        evidence_source: HUMAN_CLINICAL
        snippet: >-
          decreased activity leads to X-linked nonsyndromic sensorineural
          deafness (DFNX-2), Charcot-Marie-Tooth disease-5 (CMTX5), and
          Arts syndrome depending on the residual activity of PRS-I
        explanation: >-
          Establishes residual activity as determinant of clinical severity.
      - reference: PMID:23190330
        supports: SUPPORT
        evidence_source: HUMAN_CLINICAL
        snippet: >-
          Lower residual activity in PRS-I leads to a more severe clinical
          manifestation. Clinical and molecular findings suggest that the
          four PRPS1 disorders discovered to date belong to the same disease
          spectrum.
        explanation: >-
          Confirms severity continuum based on residual enzyme activity.
phenotypes:
  - category: Hearing
    name: Sensorineural Hearing Loss
    frequency: Very frequent
    description: >-
      Bilateral sensorineural hearing loss present across all subtypes.
      Can be prelingual or postlingual, progressive or stable. Audiogram
      shapes are usually residual and flat. Female carriers may have
      unilateral or bilateral hearing impairment.
    phenotype_term:
      preferred_term: Sensorineural hearing impairment
      term:
        id: HP:0000407
        label: Sensorineural hearing impairment
    evidence:
      - reference: PMID:23190330
        supports: SUPPORT
        evidence_source: HUMAN_CLINICAL
        snippet: >-
          Hearing loss in male patients with PRPS1 mutations is bilateral,
          moderate to profound, and can be prelingual or postlingual,
          progressive or non-progressive.
        explanation: >-
          Characterizes hearing loss across the PRPS1 spectrum.
  - category: Neurological
    name: Ataxia
    frequency: Frequent
    subtype: Arts Syndrome
    description: >-
      Early-onset cerebellar ataxia in Arts syndrome due to severe PRS-I
      deficiency affecting cerebellar neurons.
    phenotype_term:
      preferred_term: Ataxia
      term:
        id: HP:0001251
        label: Ataxia
    evidence:
      - reference: PMID:26089585
        supports: SUPPORT
        evidence_source: HUMAN_CLINICAL
        snippet: >-
          severe PRS-I deficiency (Arts syndrome) present with peripheral or
          optic neuropathy, prelingual progressive sensorineural hearing
          loss, and central nervous system impairment
        explanation: >-
          Ataxia and CNS impairment are features of severe deficiency.
  - category: Neurological
    name: Peripheral Neuropathy
    frequency: Frequent
    subtype: CMTX5
    description: >-
      Peripheral neuropathy characteristic of CMTX5 subtype, with
      features of Charcot-Marie-Tooth disease.
    phenotype_term:
      preferred_term: Peripheral neuropathy
      term:
        id: HP:0009830
        label: Peripheral neuropathy
    evidence:
      - reference: PMID:26089585
        supports: SUPPORT
        evidence_source: HUMAN_CLINICAL
        snippet: >-
          moderate PRS-I deficiency (CMTX5)
        explanation: >-
          Peripheral neuropathy defines the CMTX5 subtype.
  - category: Ophthalmologic
    name: Optic Atrophy
    frequency: Frequent
    description: >-
      Optic neuropathy and atrophy in Arts syndrome and CMTX5 subtypes.
    phenotype_term:
      preferred_term: Optic atrophy
      term:
        id: HP:0000648
        label: Optic atrophy
  - category: Neurological
    name: Hypotonia
    frequency: Occasional
    subtype: Arts Syndrome
    description: >-
      Hypotonia in Arts syndrome reflecting severe CNS involvement.
    phenotype_term:
      preferred_term: Hypotonia
      term:
        id: HP:0001252
        label: Hypotonia
genetic:
  - name: PRPS1 Loss-of-Function Variants
    association: Pathogenic Variants
    gene_term:
      preferred_term: PRPS1
      term:
        id: hgnc:9462
        label: PRPS1
    inheritance:
      - name: X-linked Recessive
        inheritance_term:
          preferred_term: X-linked recessive inheritance
          term:
            id: HP:0001419
            label: X-linked recessive inheritance
    features: >-
      Missense mutations reducing PRS-I enzyme activity. Severity correlates
      with residual activity. Primarily affects hemizygous males; carrier
      females may have mild hearing loss.
    evidence:
      - reference: PMID:23190330
        supports: SUPPORT
        evidence_source: HUMAN_CLINICAL
        snippet: >-
          the loss-of-function mutations result in X-linked nonsyndromic
          sensorineural deafness type 2 (DFN2), or in syndromic deafness
          including Arts syndrome and X-linked Charcot-Marie-Tooth
          disease-5 (CMTX5)
        explanation: >-
          LOF mutations cause the deficiency spectrum.
treatments:
  - name: S-Adenosylmethionine Supplementation
    description: >-
      SAM supplementation has shown therapeutic promise in Arts syndrome
      patients, suggesting it can compensate for PRS-I deficiency and
      alleviate symptoms.
    treatment_term:
      preferred_term: SAM supplementation
      term:
        id: MAXO:0000088
        label: dietary intervention
    evidence:
      - reference: PMID:26089585
        supports: SUPPORT
        evidence_source: HUMAN_CLINICAL
        snippet: >-
          purine replacement via S-adenosylmethionine (SAM) supplementation
          in patients with Arts syndrome appears to improve their condition
        explanation: >-
          SAM supplementation as potential therapy for PRPS1 deficiency.
      - reference: PMID:23190330
        supports: SUPPORT
        evidence_source: HUMAN_CLINICAL
        snippet: >-
          SAM could compensate for PRS-I deficiency
        explanation: >-
          Confirms SAM as a potential therapeutic approach.
  - name: Hearing Rehabilitation
    description: >-
      Hearing aids or cochlear implants for sensorineural hearing loss.
    treatment_term:
      preferred_term: Hearing rehabilitation
      term:
        id: MAXO:0000950
        label: supportive care
  - name: Genetic Counseling
    description: >-
      Genetic counseling regarding X-linked recessive inheritance and
      carrier testing for at-risk females.
    treatment_term:
      preferred_term: Genetic counseling
      term:
        id: MAXO:0000079
        label: genetic counseling
