      label: Anxiety
  evidence:
  - reference: DOI:10.1038/s41380-022-01503-z
    reference_title: "Borderline personality disorder: associations with psychiatric disorders, somatic illnesses, trauma, and adverse behaviors"
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Anxiety disorders were most common (cumulative incidence 95% CI 33.13%
      [31.48–34.73]).
    explanation: >-
      Nationwide register study supports anxiety as a common psychiatric
      comorbidity in BPD.
