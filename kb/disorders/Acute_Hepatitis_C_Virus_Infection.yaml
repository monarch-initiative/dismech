pathophysiology:
- name: Early HCV infection of hepatocytes
  description: >-
    Blood-borne HCV exposure establishes early viremia and infection of the
    liver; during this recent-infection phase, outcomes diverge toward
    spontaneous clearance or chronic viremia.
  downstream:
  - target: Hepatic inflammation and transaminase elevation
    description: Viral infection and immune recognition cause acute hepatocellular injury.
  cell_types:
  - preferred_term: hepatocyte
    term:
      id: CL:0000182
      label: hepatocyte
  biological_processes:
  - preferred_term: viral process
    modifier: ABNORMAL
    term:
      id: GO:0016032
      label: viral process
  evidence:
  - reference: PMID:39599853
    reference_title: "Acute Hepatitis C: Current Status and Future Perspectives."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      The early phase of HCV infection represents a pivotal point in the evolution of hepatitis C.
    explanation: This review directly supports early HCV infection as the defining phase of acute hepatitis C.
- name: Immune-mediated viral clearance versus persistence
  description: >-
    Host antiviral immunity can clear HCV, but many recently acquired infections
    persist beyond six months and become chronic HCV infection.
  downstream:
  - target: Chronic hepatitis C virus infection
    description: Persistence of viremia beyond six months defines chronic infection.
  biological_processes:
  - preferred_term: response to virus
    modifier: ABNORMAL
    term:
      id: GO:0009615
      label: response to virus
  - preferred_term: T cell activation
    modifier: ABNORMAL
    term:
      id: GO:0042110
      label: T cell activation
  evidence:
  - reference: PMID:39599853
    reference_title: "Acute Hepatitis C: Current Status and Future Perspectives."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      approximately 50-70% of individuals with recently acquired hepatitis C will develop a chronic infection, defined as the persistence of viremia for a period exceeding six months.
    explanation: This directly supports the clearance-versus-persistence outcome branch.
- name: Diagnostic window period with early RNA positivity
  description: >-
    Acute HCV is diagnostically difficult because HCV RNA may be detectable
    before anti-HCV seroconversion; antibody-only algorithms can miss early
    RNA-positive infections.
  downstream:
  - target: Delayed recognition of acute infection
    description: Negative antibody testing during the window period can delay diagnosis without RNA or antigen testing.
  biological_processes:
  - preferred_term: detection of virus
    term:
      id: GO:0009597
      label: detection of virus
  evidence:
  - reference: PMID:36800699
    reference_title: "Acute hepatitis C virus infection: clinical update and remaining challenges."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      The diagnosis of acute HCV infection is particularly challenging in immunocompromised, reinfected, and superinfected patients due to difficulty in detecting anti-HCV antibody seroconversion and HCV ribonucleic acid from a previously negative antibody response.
    explanation: This review directly supports the diagnostic challenge in early or complex acute HCV infection.
