    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: >-
      DDX11/ChlR1 (Chl1 in yeast) is a DNA helicase involved in sister chromatid
      cohesion and in DNA repair pathways.
    explanation: This directly supports the core DDX11 biochemical role that is disrupted in Warsaw breakage syndrome.
