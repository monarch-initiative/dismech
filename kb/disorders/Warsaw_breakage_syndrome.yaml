    explanation: This directly supports the chromosomal cohesion defect phenotype that initiates Warsaw breakage syndrome.
  - reference: PMID:30469382
    reference_title: "Molecular and Cellular Functions of the Warsaw Breakage Syndrome DNA Helicase DDX11."
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: >-
      DDX11/ChlR1 (Chl1 in yeast) is a DNA helicase involved in sister chromatid
      cohesion and in DNA repair pathways.
    explanation: This directly supports DDX11 dysfunction as the mechanistic basis for the cohesion and replication defects.
  downstream:
  - target: Heterochromatin organization defects
    description: Cohesion and replication stress perturb higher-order chromatin organization.
  - target: Ribosome biogenesis defects
    description: Replication stress and altered transcription disturb nucleolar ribosome production.
  - target: Growth delay
    description: Replication-stress and chromatin-organization defects contribute to growth failure.
  - target: Microcephaly
    description: Developmental impairment contributes to reduced head growth.
  - target: Sensorineural hearing impairment
    description: Developmental disturbance contributes to inner-ear dysfunction and hearing loss.
