    snippet: >-
      Warsaw breakage syndrome (WABS) is a genetic disorder characterized by
      sister chromatid cohesion defects, growth retardation, microcephaly,
      hearing loss and other variable clinical manifestations.
    explanation: This directly supports the cohesion-defect phenotype downstream of DDX11 dysfunction.
