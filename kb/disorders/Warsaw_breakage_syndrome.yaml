differential_diagnoses:
- name: Fanconi anemia
  description: >-
    Fanconi anemia overlaps because both disorders can show chromosomal
    breakage and congenital anomalies.
  distinguishing_features:
  - Biallelic DDX11 variants and sister chromatid cohesion defects favor Warsaw breakage syndrome.
  - Fanconi anemia classically presents with bone marrow failure and FA-gene defects.
  disease_term:
    preferred_term: Fanconi anemia
    term:
      id: MONDO:0019391
      label: Fanconi anemia
  evidence:
  - reference: PMID:30469382
    reference_title: "Molecular and Cellular Functions of the Warsaw Breakage Syndrome DNA Helicase DDX11."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Analysis of cultured T lymphocytes and immortalized B lymphoblasts from
      WABS patients showed increased MMC-induced chromosomal breakage, a
      phenotype reminiscent of Fanconi anemia (FA), a genetic disorder
      characterized by progressive bone marrow failure, congenital abnormalities
      and cancer predisposition.
    explanation: This directly supports Fanconi anemia as an important differential diagnosis.
- name: Roberts-SC phocomelia syndrome
  description: >-
    Roberts-SC phocomelia syndrome overlaps because it is also a cohesinopathy
    with sister chromatid cohesion defects.
  distinguishing_features:
  - ESCO2-related Roberts syndrome is the classic alternative cohesinopathy.
  - The genetic cause differs from DDX11-related Warsaw breakage syndrome.
  disease_term:
    preferred_term: Roberts-SC phocomelia syndrome
    term:
      id: MONDO:0100253
      label: Roberts-SC phocomelia syndrome
  evidence:
  - reference: PMID:30469382
    reference_title: "Molecular and Cellular Functions of the Warsaw Breakage Syndrome DNA Helicase DDX11."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      These cohesion defects resemble the ones observed in metaphase
      lymphoblasts from individuals affected by Roberts syndrome (RBS),
      another rare autosomal recessive disease due to mutations in the ESCO2
      gene [85].
    explanation: This directly supports Roberts syndrome as a key differential diagnosis.
- name: Cornelia de Lange syndrome
  description: >-
    Cornelia de Lange syndrome overlaps through the broader cohesinopathy
    category and shared developmental abnormalities.
  distinguishing_features:
  - CdLS is usually caused by cohesin structural or regulatory genes rather than DDX11.
  - The chromosomal cohesion phenotype of WABS can help distinguish the disorder.
  disease_term:
    preferred_term: Cornelia de Lange syndrome
    term:
      id: MONDO:0016033
      label: Cornelia de Lange syndrome
  evidence:
  - reference: PMID:30469382
    reference_title: "Molecular and Cellular Functions of the Warsaw Breakage Syndrome DNA Helicase DDX11."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      However, the partial overlap of clinical manifestations (growth
      retardation,
      microcephaly, intellectual disability) with other cohesinopathies (CdLS
      and RBS) suggests that all these diseases share common developmental
      defects due to altered transcription profiles during embryonic
      development.
    explanation: This directly supports Cornelia de Lange syndrome as a relevant differential diagnosis.
