- name: Heterochromatin organization defects
  description: >-
    DDX11 contributes to heterochromatin maintenance, so loss of function
    perturbs chromatin architecture.
  biological_processes:
  - preferred_term: chromatin organization
    modifier: ABNORMAL
    term:
      id: GO:0006325
      label: chromatin organization
  evidence:
  - reference: PMID:30469382
    reference_title: "Molecular and Cellular Functions of the Warsaw Breakage Syndrome DNA Helicase DDX11."
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: >-
      Moreover, DDX11 was believed to contribute to heterochromatin formation by
      targeting HP1α factor to proper sites in pericentric regions and at
      telomeres in DDX11-depleted HeLa and in DDX11 knockout mouse embryo-derived
      cells [67].
    explanation: This directly supports heterochromatin-organization defects downstream of DDX11 loss.
  - reference: PMID:30469382
    reference_title: "Molecular and Cellular Functions of the Warsaw Breakage Syndrome DNA Helicase DDX11."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      However, the partial overlap of clinical manifestations (growth
      retardation, microcephaly, intellectual disability) with other
      cohesinopathies (CdLS and RBS) suggests that all these diseases share
      common developmental defects due to altered transcription profiles during
      embryonic development.
    explanation: This supports embryonic gene-regulation defects as a mechanistic link to the developmental phenotype.
  downstream:
  - target: Growth delay
    description: Impaired developmental proliferation contributes to growth retardation.
  - target: Global developmental delay
    description: Developmental gene-expression defects contribute to delayed milestones.
  - target: Intellectual disability
    description: Developmental chromatin defects contribute to cognitive impairment.
  - target: Microcephaly
    description: Impaired developmental proliferation contributes to reduced brain growth.
- name: Ribosome biogenesis defects
  description: >-
    DDX11 down-regulation suppresses ribosomal RNA synthesis and reduces cell
    proliferation, indicating a ribosome biogenesis defect.
  biological_processes:
  - preferred_term: ribosome biogenesis
    modifier: ABNORMAL
    term:
      id: GO:0042254
      label: ribosome biogenesis
  evidence:
  - reference: PMID:30469382
    reference_title: "Molecular and Cellular Functions of the Warsaw Breakage Syndrome DNA Helicase DDX11."
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: >-
      In addition, it was recently found that DDX11 localizes at the nucleolus in
      HeLa cells and preferentially binds to hypomethylated active ribosomal DNA
      gene loci, where it interacts with the RNA polymerase I transcriptional
      machinery. DDX11 down-regulation caused suppression of ribosomal RNA
      synthesis, inhibiting cell proliferation [68].
    explanation: This directly supports ribosome biogenesis defects and reduced proliferative capacity.
  downstream:
  - target: Growth delay
    description: Reduced ribosome production impairs developmental proliferation.
  - target: Global developmental delay
    description: Ribosome biogenesis defects contribute to delayed developmental milestones.
  - target: Intellectual disability
    description: Ribosome biogenesis defects can impair neurodevelopment.
  - target: Microcephaly
    description: Reduced developmental proliferation contributes to diminished brain growth.
