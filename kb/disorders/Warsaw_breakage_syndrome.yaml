name: Warsaw breakage syndrome
creation_date: "2026-04-15T00:00:00Z"
updated_date: "2026-04-16T02:19:22Z"
description: >-
  Warsaw breakage syndrome is a rare DDX11-related cohesinopathy characterized
  by severe pre- and postnatal growth retardation, microcephaly, sensorineural
  hearing impairment, facial dysmorphism, and sister chromatid cohesion defects.
category: Mendelian
parents:
- Neurodevelopmental disorder
- Genetic disease
synonyms:
- WABS
- Warsaw syndrome
disease_term:
  preferred_term: Warsaw breakage syndrome
  term:
    id: MONDO:0013252
    label: Warsaw breakage syndrome
inheritance:
- name: Autosomal recessive inheritance
  description: >-
    Warsaw breakage syndrome is caused by biallelic DDX11 variants and follows
    autosomal recessive inheritance.
  inheritance_term:
    preferred_term: Autosomal recessive inheritance
    term:
      id: HP:0000007
      label: Autosomal recessive inheritance
  evidence:
  - reference: PMID:33669056
    reference_title: "Role of the DDX11 DNA Helicase in Warsaw Breakage Syndrome Etiology."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      WABS is due to biallelic mutations of the gene coding for the super-family
      2 DNA helicase DDX11/ChlR1, orthologous to the yeast chromosome loss
      protein 1 (Chl1).
    explanation: This directly supports biallelic DDX11 causality and autosomal recessive inheritance.
pathophysiology:
- name: DDX11 helicase dysfunction
  description: >-
    Biallelic DDX11 variants impair helicase function at the interface of DNA
    replication, repair, and sister chromatid cohesion.
