transmission:
- name: Contaminated drinking water with infected copepods
  description: Humans acquire infection by drinking water containing infected
    Cyclops copepods.
  evidence:
  - reference: PMID:27162746
    reference_title: "Dracunculiasis in oral and maxillofacial surgery."
    supports: SUPPORT
    snippet: "Humans can acquire GWD by drinking water that contains vectors infected
      with guinea worm larvae."
    explanation: The abstract describes waterborne transmission via infected
      copepods.
pathophysiology:
- name: Larval transmission by copepods
  description: Cyclops copepods transmit guinea worm larvae to humans.
  evidence:
  - reference: PMID:27162746
    reference_title: "Dracunculiasis in oral and maxillofacial surgery."
    supports: SUPPORT
    snippet: "The transmitting vectors are Cyclops copepods (water fleas), which are
      tiny free-swimming crustaceans usually found abundantly in freshwater ponds."
    explanation: The abstract identifies Cyclops copepods as transmitting
      vectors.
