    evidence_source: OTHER
    snippet: "HP:0032230 | Cytoplasmic antineutrophil antibody positivity | Frequent (79-30%)"
    explanation: >-
      Orphanet records cytoplasmic ANCA positivity in MPA, reflecting the PR3-ANCA
