name: deafness-lymphedema-leukemia syndrome
creation_date: "2026-04-21T14:07:20Z"
updated_date: "2026-04-21T21:42:00Z"
description: >-
  deafness-lymphedema-leukemia syndrome, also known as Emberger syndrome, is an
  autosomal dominant presentation within the broader GATA2 deficiency spectrum.
  It is characterized by congenital or early-onset sensorineural hearing
  impairment, primary lymphedema, immunodeficiency with viral, fungal, and
  nontuberculous mycobacterial infections, and strong predisposition to
  myelodysplastic syndrome and acute myeloid leukemia. It overlaps clinically
  with MonoMAC syndrome, DCML deficiency, and familial MDS/AML, reflecting
  GATA2 haploinsufficiency with downstream defects in lymphatic vascular
  development, hematopoietic stem-cell regulation, and monocyte, dendritic-cell,
  B-cell, and natural-killer-cell homeostasis.
category: Mendelian
parents:
- hereditary disease
synonyms:
- Emberger syndrome
disease_term:
  preferred_term: deafness-lymphedema-leukemia syndrome
  term:
    id: MONDO:0013540
    label: deafness-lymphedema-leukemia syndrome
inheritance:
- name: Autosomal dominant inheritance
  inheritance_term:
    preferred_term: Autosomal dominant inheritance
    term:
      id: HP:0000006
      label: Autosomal dominant inheritance
  description: >-
    deafness-lymphedema-leukemia syndrome is caused by heterozygous germline
    GATA2 variants that segregate as an autosomal dominant disorder.
  evidence:
  - reference: PMID:21892158
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      We report an allelic series of eight mutations in GATA2 underlying Emberger
      syndrome, an autosomal dominant primary lymphedema associated with a
      predisposition to acute myeloid leukemia.
    explanation: >-
      This directly establishes autosomal dominant inheritance for Emberger
      syndrome caused by GATA2 variants.
pathophysiology:
- name: GATA2 haploinsufficiency
  description: >-
    Heterozygous loss-of-function GATA2 variants reduce dosage of a
    transcription factor required for vascular development and hematopoietic
    differentiation.
  genes:
  - preferred_term: GATA2
    term:
      id: hgnc:4171
      label: GATA2
  evidence:
  - reference: PMID:21892158
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      GATA2 is a transcription factor that plays an essential role in gene
      regulation during vascular development and hematopoietic differentiation.
    explanation: >-
      This abstract defines the core developmental and hematopoietic functions
      disrupted by GATA2 haploinsufficiency.
  downstream:
  - target: Impaired lymphatic valve development
    description: >-
      Reduced GATA2 activity disrupts transcriptional programs required for
      normal lymphatic vessel valve formation and function.
    evidence:
    - reference: PMID:22147895
      supports: SUPPORT
      evidence_source: MODEL_ORGANISM
      snippet: >-
        We demonstrate here that GATA2 protein is present at high levels in
        lymphatic vessel valves and that GATA2 controls the expression of genes
        important for programming lymphatic valve development.
      explanation: >-
        This supports a direct downstream lymphatic developmental mechanism for
        GATA2 deficiency.
  - target: Dysregulated hematopoiesis
    description: >-
      Reduced GATA2 dosage perturbs hematopoietic stem-cell regulation and
      predisposes to marrow failure, myelodysplasia, and leukemia.
    evidence:
    - reference: PMID:21892158
      supports: SUPPORT
      evidence_source: HUMAN_CLINICAL
      snippet: >-
        GATA2 is a transcription factor that plays an essential role in gene
        regulation during vascular development and hematopoietic differentiation.
      explanation: >-
        This supports a direct mechanistic link between GATA2 dysfunction and
        abnormal hematopoietic differentiation.
- name: Impaired lymphatic valve development
  description: >-
    GATA2 deficiency compromises lymphatic endothelial transcriptional programs
    required for lymphatic valve development, predisposing to primary
    lymphedema.
  cell_types:
  - preferred_term: lymphatic endothelial cell
    term:
      id: CL:0002138
      label: endothelial cell of lymphatic vessel
  evidence:
  - reference: PMID:22147895
    supports: SUPPORT
    evidence_source: MODEL_ORGANISM
    snippet: >-
      We demonstrate here that GATA2 protein is present at high levels in
      lymphatic vessel valves and that GATA2 controls the expression of genes
      important for programming lymphatic valve development.
    explanation: >-
      This provides a mechanistic basis for lymphatic valve dysfunction and the
      resulting lymphedema phenotype.
  downstream:
  - target: Lymphedema
    description: >-
      Lymphatic valve dysfunction impairs lymphatic drainage and causes primary
      lymphedema.
    evidence:
    - reference: PMID:22147895
      supports: SUPPORT
      evidence_source: HUMAN_CLINICAL
      snippet: >-
        Intriguingly, 2 MDS/AML or "MonoMAC" syndrome patients with GATA2
        deletions and one with a frameshift mutation also have primary
        lymphedema.
      explanation: >-
        This links GATA2 loss-of-function alleles to the lymphedema phenotype
        in affected patients.
- name: Dysregulated hematopoiesis
  description: >-
    GATA2 haploinsufficiency impairs hematopoietic stem-cell maintenance and
    differentiation, creating susceptibility to myelodysplasia, acute myeloid
    leukemia, cytopenias, and infection.
  cell_types:
  - preferred_term: hematopoietic stem cell
    term:
      id: CL:0000037
      label: hematopoietic stem cell
  biological_processes:
  - preferred_term: hematopoiesis
    term:
      id: GO:0030097
      label: hemopoiesis
  evidence:
  - reference: PMID:22147895
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Recent work has established that heterozygous germline GATA2 mutations
      predispose carriers to familial myelodysplastic syndrome (MDS)/acute
      myeloid leukemia (AML), "MonoMAC" syndrome, and DCML deficiency.
    explanation: >-
      This supports the hematopoietic consequences of germline GATA2
      insufficiency, including marrow disease and immunodeficiency syndromes.
  downstream:
  - target: Myelodysplasia
    description: >-
      Abnormal hematopoietic differentiation can manifest as myelodysplastic
      syndrome.
    evidence:
    - reference: PMID:29189513
      supports: SUPPORT
      evidence_source: HUMAN_CLINICAL
      snippet: >-
        We report a case of Emberger syndrome with GATA2 mutation in a 9-year-old
        girl who presented with congenital sensorineural deafness, warts,
        lymphedema, and Myelodysplastic syndrome.
      explanation: >-
        This directly supports myelodysplasia as a hematologic manifestation of
        Emberger syndrome.
  - target: Acute myeloid leukemia
    description: >-
      Hematopoietic dysregulation also creates strong susceptibility to acute
      myeloid leukemia.
    evidence:
    - reference: PMID:21892158
      supports: SUPPORT
      evidence_source: HUMAN_CLINICAL
      snippet: >-
        We report an allelic series of eight mutations in GATA2 underlying Emberger
        syndrome, an autosomal dominant primary lymphedema associated with a
        predisposition to acute myeloid leukemia.
      explanation: >-
        This explicitly links GATA2-mutant Emberger syndrome to AML
        predisposition.
  - target: Recurrent infections
    description: >-
      Immune-cell depletion and marrow dysfunction contribute to frequent
      infections during disease onset and follow-up.
    evidence:
    - reference: PMID:37837580
      supports: SUPPORT
      evidence_source: HUMAN_CLINICAL
      snippet: >-
        Infections (39%), hematological malignancies (23%) and undefined
        cytopenia (16%) were the most frequent symptoms at the onset of the
        disease.
      explanation: >-
        This cohort study supports recurrent infection as a common presenting
        feature within the GATA2 deficiency spectrum that includes Emberger
        syndrome.
- name: DCML immune-cell deficiency
  description: >-
    GATA2 haploinsufficiency can cause dendritic cell, monocyte, B-cell, and
    natural-killer-cell lymphoid deficiency, explaining susceptibility to
    nontuberculous mycobacterial, viral, fungal, and papillomavirus infections.
  cell_types:
  - preferred_term: dendritic cell
    term:
      id: CL:0000451
      label: dendritic cell
  - preferred_term: monocyte
    term:
      id: CL:0000576
      label: monocyte
  - preferred_term: B cell
    term:
      id: CL:0000236
      label: B cell
  - preferred_term: natural killer cell
    term:
      id: CL:0000623
      label: natural killer cell
  evidence:
  - reference: PMID:24227816
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Haploinsufficiency of the hematopoietic transcription factor GATA2
      underlies monocytopenia and mycobacterial infections; dendritic cell,
      monocyte, B, and natural killer (NK) lymphoid deficiency.
    explanation: >-
      This directly ties GATA2 haploinsufficiency to the DCML immune-cell
      deficiency that broadens the syndrome beyond lymphatic and marrow disease.
  - reference: PMID:21242295
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Combined loss of peripheral DCs, monocytes, and B and NK lymphocytes was
      mirrored in the bone marrow by complete absence of multilymphoid
      progenitors and depletion of granulocyte-macrophage progenitors.
    explanation: >-
      This independently establishes the dendritic-cell, monocyte, B-cell, and
      NK-cell depletion pattern that became known as DCML deficiency.
  downstream:
  - target: Disseminated nontuberculous mycobacterial infection
    description: >-
      Monocyte and dendritic-cell depletion contributes to disseminated
      nontuberculous mycobacterial infections in affected individuals.
    evidence:
    - reference: PMID:24227816
      supports: SUPPORT
      evidence_source: HUMAN_CLINICAL
      snippet: >-
        We identified a broad spectrum of disease: hematologic (MDS 84%, AML
        14%, chronic myelomonocytic leukemia 8%), infectious (severe viral 70%,
        disseminated mycobacterial 53%, and invasive fungal infections 16%)
      explanation: >-
        This cohort quantifies disseminated mycobacterial infection as a major
        manifestation of GATA2 deficiency.
  - target: Persistent human papillomavirus infection
    description: >-
      NK-cell and other immune-cell defects contribute to persistent
      papillomavirus infection, warts, and HPV-associated tumors.
    evidence:
    - reference: PMID:24227816
      supports: SUPPORT
      evidence_source: HUMAN_CLINICAL
      snippet: >-
        dermatologic (warts 53%, panniculitis 30%), neoplastic (human
        papillomavirus+ tumors 35%, Epstein-Barr virus+ tumors 4%).
      explanation: >-
        This supports persistent papillomavirus disease and warts as part of
        the immunodeficiency phenotype.
  - target: Pulmonary alveolar proteinosis
    description: >-
      Immune and myeloid dysfunction can be accompanied by pulmonary diffusion
      or ventilatory defects and pulmonary alveolar proteinosis.
    evidence:
    - reference: PMID:24227816
      supports: SUPPORT
      evidence_source: HUMAN_CLINICAL
      snippet: >-
        pulmonary (diffusion 79% and ventilatory defects 63%, pulmonary
        alveolar proteinosis 18%, pulmonary arterial hypertension 9%).
      explanation: >-
        This directly supports pulmonary alveolar proteinosis and abnormal
        pulmonary testing as part of GATA2 deficiency.
