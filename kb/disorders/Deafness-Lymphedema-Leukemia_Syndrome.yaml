genetic:
- name: GATA2
  association: Causal heterozygous loss-of-function variant
  gene_term:
    preferred_term: GATA2
    term:
      id: hgnc:4171
      label: GATA2
  evidence:
  - reference: PMID:21892158
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      We report an allelic series of eight mutations in GATA2 underlying Emberger
      syndrome, an autosomal dominant primary lymphedema associated with a
      predisposition to acute myeloid leukemia.
    explanation: >-
      This establishes GATA2 as the causal disease gene for
      deafness-lymphedema-leukemia syndrome.
  - reference: PMID:22147895
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Our data expand the phenotypes associated with germline GATA2 mutations
      to include predisposition to primary lymphedema and suggest that complete
      haploinsufficiency or loss of function of GATA2, rather than missense
      mutations, is the key predisposing factor for lymphedema onset.
    explanation: >-
      This supports loss of function and haploinsufficiency as the key
      pathogenic genetic mechanism.
