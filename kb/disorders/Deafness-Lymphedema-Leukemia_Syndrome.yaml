genetic:
- name: GATA2
  association: Causal heterozygous loss-of-function variant
  gene_term:
    preferred_term: GATA2
    term:
      id: hgnc:4171
      label: GATA2
  evidence:
  - reference: PMID:21892158
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      We report an allelic series of eight mutations in GATA2 underlying Emberger
      syndrome, an autosomal dominant primary lymphedema associated with a
      predisposition to acute myeloid leukemia.
    explanation: >-
      This establishes GATA2 as the causal disease gene for
      deafness-lymphedema-leukemia syndrome.
  - reference: PMID:22147895
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Our data expand the phenotypes associated with germline GATA2 mutations
      to include predisposition to primary lymphedema and suggest that complete
      haploinsufficiency or loss of function of GATA2, rather than missense
      mutations, is the key predisposing factor for lymphedema onset.
    explanation: >-
      This supports loss of function and haploinsufficiency as the key
      pathogenic genetic mechanism.
diagnosis:
- name: GATA2 molecular genetic testing
  diagnosis_term:
    preferred_term: genetic testing
    term:
      id: MAXO:0000127
      label: genetic testing
  description: >-
    Germline sequencing or deletion analysis of GATA2 confirms the diagnosis in
    patients with syndromic lymphedema and hematologic predisposition.
  results: >-
    A heterozygous pathogenic or likely pathogenic GATA2 variant establishes
    the molecular diagnosis.
  evidence:
  - reference: PMID:21892158
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      We report an allelic series of eight mutations in GATA2 underlying Emberger
      syndrome, an autosomal dominant primary lymphedema associated with a
      predisposition to acute myeloid leukemia.
    explanation: >-
      This supports molecular confirmation through identification of a causal
      GATA2 mutation.
  - reference: PMID:37837580
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Here, we describe a cohort of 31 Italian patients (26 families) with
      molecular diagnosis of GATA2 deficiency.
    explanation: >-
      This confirms routine use of molecular diagnosis across a national GATA2
      cohort.
treatments:
- name: Hematopoietic stem cell transplantation
  description: >-
    Allogeneic hematopoietic stem cell transplantation is the disease-modifying
    therapy for marrow failure, myelodysplasia, or leukemia arising in GATA2
    deficiency.
  treatment_term:
    preferred_term: hematopoietic stem cell transplantation
    term:
      id: MAXO:0000747
      label: hematopoietic stem cell transplantation
  evidence:
  - reference: PMID:29189513
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Nonmyeloablatove HSCT is feasible and safe for the patients with GATA2
      mutation.
    explanation: >-
      This directly supports HSCT as a feasible treatment in Emberger syndrome.
  - reference: PMID:32088370
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Hematopoietic stem cell transplantation (HSCT) remains the only curative
      therapy.
    explanation: >-
      This broader pediatric GATA2 transplant study supports HSCT as the
      only curative therapy for GATA2-associated marrow disease.
differential_diagnoses:
- name: Milroy disease
  disease_term:
    preferred_term: Milroy disease
    term:
      id: MONDO:0007919
      label: lymphatic malformation 1
  description: >-
    Milroy disease is an inherited primary lymphedema syndrome to consider when
    limb swelling is congenital, but it does not explain the marrow disease and
    leukemia predisposition of GATA2-related disease.
- name: HDR syndrome
  disease_term:
    preferred_term: HDR syndrome
    term:
      id: MONDO:0007797
      label: hypoparathyroidism-deafness-renal disease syndrome
  description: >-
    HDR syndrome can overlap through sensorineural hearing loss, but renal and
    parathyroid disease rather than lymphedema and myeloid neoplasia dominate
    that differential diagnosis.
