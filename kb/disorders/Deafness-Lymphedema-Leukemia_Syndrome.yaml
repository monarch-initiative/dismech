treatments:
- name: Hematopoietic stem cell transplantation
  description: >-
    Allogeneic hematopoietic stem cell transplantation is the disease-modifying
    therapy for marrow failure, myelodysplasia, or leukemia arising in GATA2
    deficiency.
  treatment_term:
    preferred_term: hematopoietic stem cell transplantation
    term:
      id: MAXO:0000747
      label: hematopoietic stem cell transplantation
  evidence:
  - reference: PMID:29189513
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Nonmyeloablatove HSCT is feasible and safe for the patients with GATA2
      mutation.
    explanation: >-
      This directly supports HSCT as a feasible treatment in Emberger syndrome.
  - reference: PMID:32088370
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Hematopoietic stem cell transplantation (HSCT) remains the only curative
      therapy.
    explanation: >-
      This broader pediatric GATA2 transplant study supports HSCT as the
      only curative therapy for GATA2-associated marrow disease.
- name: Hematologic surveillance
  description: >-
    Serial blood counts, marrow evaluation when clinically indicated, and clonal
    cytogenetic monitoring are used to detect marrow failure, MDS, AML, and
    chromosome 7 evolution early enough to guide transplant timing.
  treatment_term:
    preferred_term: surveillance for malignancies
    term:
      id: MAXO:0001492
      label: surveillance for malignancies
  evidence:
  - reference: url:https://www.ncbi.nlm.nih.gov/books/NBK571103/
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      to inform surveillance and to allow early diagnosis so that definitive
      therapy with bone marrow transplantation can be initiated prior to the
      emergence of a leukemic clone.
    explanation: >-
      GeneReviews supports surveillance and early diagnosis to guide definitive
      transplant timing in monosomy 7 predisposition syndromes.
- name: Infection-directed monitoring and antimicrobial therapy
  description: >-
    Monitor for severe viral, disseminated nontuberculous mycobacterial, and
    invasive fungal infections, and use organism-directed antimicrobial therapy
    with immunology and infectious disease input.
  treatment_term:
    preferred_term: pharmacotherapy
    term:
      id: MAXO:0000058
      label: pharmacotherapy
  evidence:
  - reference: PMID:24227816
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      We identified a broad spectrum of disease: hematologic (MDS 84%, AML
      14%, chronic myelomonocytic leukemia 8%), infectious (severe viral 70%,
      disseminated mycobacterial 53%, and invasive fungal infections 16%)
    explanation: >-
      This supports active monitoring and treatment planning for the major
      infectious complications of GATA2 deficiency.
- name: Lymphedema supportive care
  description: >-
    Use lymphedema-directed supportive care such as compression, physical
    therapy, skin care, and prompt management of cellulitis risk while
    coordinating hematologic and immunologic care.
  treatment_term:
    preferred_term: physical therapy
    term:
      id: MAXO:0000011
      label: physical therapy
  evidence:
  - reference: PMID:24227816
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      vascular/lymphatic (venous thrombosis 25%, lymphedema 11%),
      sensorineural hearing loss 76%, miscarriage 33%, and hypothyroidism 14%.
    explanation: >-
      This supports lymphedema as a clinically important feature requiring
      supportive management.
- name: Hearing support
  description: >-
    Audiology follow-up, hearing aids, cochlear-implant evaluation when
    appropriate, and educational or communication support address the
    sensorineural hearing impairment.
  treatment_term:
    preferred_term: hearing aid usage
    term:
      id: MAXO:0009030
      label: hearing aid usage
  evidence:
  - reference: PMID:24227816
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      vascular/lymphatic (venous thrombosis 25%, lymphedema 11%),
      sensorineural hearing loss 76%, miscarriage 33%, and hypothyroidism 14%.
    explanation: >-
      This supports hearing-directed care because sensorineural hearing loss is
      common in GATA2 deficiency.
- name: Genetic counseling
  description: >-
    Counsel families about autosomal dominant inheritance, variable penetrance,
    family testing, reproductive risk, and implications for related HSCT donor
    selection.
  treatment_term:
    preferred_term: genetic counseling
    term:
      id: MAXO:0000079
      label: genetic counseling
  evidence:
  - reference: PMID:21670465
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Both autosomal dominant and sporadic cases occur.
    explanation: >-
      This supports counseling for autosomal dominant and apparently sporadic
      GATA2 deficiency presentations.
differential_diagnoses:
- name: Milroy disease
  disease_term:
    preferred_term: Milroy disease
    term:
      id: MONDO:0007919
      label: lymphatic malformation 1
  description: >-
    Milroy disease is an inherited primary lymphedema syndrome to consider when
    limb swelling is congenital, but it does not explain the marrow disease and
    leukemia predisposition of GATA2-related disease.
- name: HDR syndrome
  disease_term:
    preferred_term: HDR syndrome
    term:
      id: MONDO:0007797
      label: hypoparathyroidism-deafness-renal disease syndrome
  description: >-
    HDR syndrome can overlap through sensorineural hearing loss, but renal and
    parathyroid disease rather than lymphedema and myeloid neoplasia dominate
    that differential diagnosis.
