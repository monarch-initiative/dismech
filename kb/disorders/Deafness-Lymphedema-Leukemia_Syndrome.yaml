      GATA2 deficiency is suspected or established.
- name: Audiologic evaluation
  diagnosis_term:
    preferred_term: diagnostic procedure of auditory system
    term:
      id: MAXO:0001445
      label: diagnostic procedure of auditory system
  description: >-
    Formal audiologic testing documents congenital or early sensorineural
    hearing impairment and guides supportive interventions.
  results: >-
    Sensorineural hearing loss supports the Emberger syndrome presentation
    within GATA2 deficiency.
  evidence:
  - reference: PMID:24227816
