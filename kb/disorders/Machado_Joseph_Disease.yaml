has_subtypes:
- name: Type 1
  display_name: Machado-Joseph disease type 1 (early-onset, pyramidal/dystonic)
  description: >-
    Earliest-onset and most rapidly progressive subtype, typically presenting
    in adolescence or young adulthood. Pyramidal signs (spasticity,
    hyperreflexia) and dystonia accompany the cerebellar syndrome. Associated
    with the longest CAG expansions in the pathogenic range.
  subtype_term:
    preferred_term: Machado-Joseph disease type 1
    term:
      id: MONDO:0017174
      label: Machado-Joseph disease type 1
  evidence:
  - reference: PMID:11405804
    reference_title: "Neurologic findings in Machado-Joseph disease: relation with disease duration, subtypes, and (CAG)n."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Type 1 MJD was positively associated with nuclear ophthalmoplegia; type
      3 MJD was positively associated with supranuclear ophthalmoplegia.
      Higher mean CAG lengths were found to correlate with the pyramidal
      syndrome and dystonia.
    explanation: Supports Type 1 MJD as the longer-CAG, pyramidal-syndrome- and dystonia-associated subtype.
- name: Type 2
  display_name: Machado-Joseph disease type 2 (classical ataxia + ophthalmoplegia)
  description: >-
    Most common presenting form, with onset typically in middle adulthood.
    Combines progressive cerebellar ataxia with prominent ophthalmoplegia and
    upper motor neuron signs. Considered the prototypic Machado-Joseph
    presentation.
  subtype_term:
    preferred_term: Machado-Joseph disease type 2
    term:
      id: MONDO:0017175
      label: Machado-Joseph disease type 2
  evidence:
  - reference: PMID:19811945
    reference_title: "Caring for Machado-Joseph disease: current understanding and how to help patients."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Machado-Joseph disease or spinocerebellar ataxia 3 (MJD/SCA3) is a
      clinically heterogeneous, neurodegenerative disorder characterized by
      varying degrees of ataxia, ophthalmoplegia, peripheral neuropathy,
      pyramidal dysfunction and movement disorder.
    explanation: Anchors the prototypic ataxia-plus-ophthalmoplegia core syndrome characteristic of the most commonly observed (Type 2) MJD presentation.
- name: Type 3
  display_name: Machado-Joseph disease type 3 (late-onset, peripheral neuropathy and amyotrophy)
  description: >-
    Late-onset subtype (typically after age 40) with shorter pathogenic CAG
    expansions. Cerebellar ataxia is accompanied by prominent peripheral
    sensorimotor neuropathy and lower motor neuron amyotrophy reflecting
    spinal anterior horn involvement.
  subtype_term:
    preferred_term: Machado-Joseph disease type 3
    term:
      id: MONDO:0017176
      label: Machado-Joseph disease type 3
  evidence:
  - reference: PMID:11405804
    reference_title: "Neurologic findings in Machado-Joseph disease: relation with disease duration, subtypes, and (CAG)n."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      The most severe forms of nuclear ophthalmoplegia were associated with
      type 1 MJD, whereas those of supranuclear ophthalmoplegia were
      associated with type 3 MJD (P<.001).
    explanation: Supports a clinically distinct Type 3 MJD subtype with characteristic supranuclear ophthalmoplegia, distinguishable from Type 1.
- name: Type 4
  display_name: Machado-Joseph disease type 4 (parkinsonism-predominant)
  description: >-
    Rarest classical subtype. Parkinsonism (bradykinesia, rigidity, resting
    tremor) dominates the clinical picture and may be levodopa-responsive,
    sometimes overshadowing or preceding the cerebellar syndrome. Reflects
    selective vulnerability of nigrostriatal dopaminergic neurons.
  subtype_term:
    preferred_term: Machado-Joseph disease type 4
    term:
      id: MONDO:0042964
      label: Machado-Joseph disease type 4
  evidence:
  - reference: PMID:19811945
    reference_title: "Caring for Machado-Joseph disease: current understanding and how to help patients."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Symptomatic treatment for clinical findings such as depression, sleep
      disorders, parkinsonism, dystonia, cramps, and pain is important to
      improve the quality of life for those with MJD/SCA3.
    explanation: Documents parkinsonism (the defining feature of the Type 4 subtype) within the recognized clinical spectrum of MJD/SCA3 requiring symptomatic treatment.
inheritance:
- name: Autosomal dominant
  inheritance_term:
    preferred_term: autosomal dominant inheritance
    term:
      id: HP:0000006
      label: Autosomal dominant inheritance
  description: >-
    MJD/SCA3 is transmitted as an autosomal dominant repeat-expansion
    disorder with anticipation, in which longer transmitted CAG expansions
    correlate with earlier age at onset and more severe phenotypes,
    particularly in paternal transmissions.
  evidence:
  - reference: PMID:7874163
    reference_title: "CAG expansions in a novel gene for Machado-Joseph disease at chromosome 14q32.1."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      In normal individuals the gene contains between 13 and 36 CAG repeats,
      whereas most of the clinically diagnosed patients and all of the
      affected members of a family with the clinical and pathological
      diagnosis of MJD show expansion of the repeat-number (from 68-79).
    explanation: Original identification of the ATXN3 CAG expansion as the dominantly inherited molecular cause of MJD.
prevalence:
- population: Global (autosomal dominant hereditary cerebellar ataxia)
  notes: >-
    SCA3/MJD is consistently identified as the single most common dominantly
    inherited spinocerebellar ataxia in systematic reviews of hereditary
    ataxia prevalence, although the absolute prevalence varies by ascertainment
    method and population.
  evidence:
  - reference: PMID:24603320
    reference_title: "The global epidemiology of hereditary ataxia and spastic paraplegia: a systematic review of prevalence studies."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Spinocerebellar ataxia type 3 (SCA3)/Machado-Joseph disease was the
      most common dominant ataxia, followed by SCA2 and SCA6.
    explanation: Systematic review establishing SCA3/MJD as the most common autosomal dominant cerebellar ataxia globally.
- population: Dominant hereditary cerebellar ataxia (pooled)
  percentage: "2.7/100,000"
  notes: >-
    Pooled average prevalence of dominant hereditary cerebellar ataxia
    across population-based studies. SCA3/MJD accounts for the largest
    fraction of this group worldwide.
  evidence:
  - reference: PMID:24603320
    reference_title: "The global epidemiology of hereditary ataxia and spastic paraplegia: a systematic review of prevalence studies."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      The prevalence range of dominant HCA was 0.0-5.6/10(5), with an average
      of 2.7/10(5) (1.5-4.0/10(5)).
    explanation: Provides the pooled prevalence figure for the dominant hereditary cerebellar ataxia group within which SCA3 is the largest contributor.
progression:
- phase: Manifest disease
  age_range: Most often adult onset
  notes: >-
    Onset is most often in adult life and the disease is progressive, with
    loss of balance and coordination accompanied by slurred speech as the
    clinical hallmark of the SCA group. Many SCAs, including SCA3, ultimately
    lead to premature death; no treatment currently slows or halts disease
    progression.
  evidence:
  - reference: PMID:30975995
    reference_title: "Spinocerebellar ataxia."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      The spinocerebellar ataxias (SCAs) are a genetically heterogeneous
      group of autosomal dominantly inherited progressive disorders, the
      clinical hallmark of which is loss of balance and coordination
      accompanied by slurred speech; onset is most often in adult life.
    explanation: Establishes the clinical hallmark and adult-onset, progressive natural history shared by SCA3.
  - reference: PMID:30975995
    reference_title: "Spinocerebellar ataxia."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      As there is currently no treatment to slow or halt SCAs (many SCAs
      lead to premature death), the clinical care of patients with SCA
      focuses on managing the symptoms through physiotherapy, occupational
      therapy and speech therapy.
    explanation: Supports the progressive, ultimately disabling natural history and the symptomatic-care standard.
pathophysiology:
- name: ATXN3 CAG repeat expansion produces polyglutamine-expanded ataxin-3
  description: >-
    The proximal molecular lesion is an unstable CAG trinucleotide repeat
    expansion in ATXN3, encoding an expanded polyglutamine (polyQ) tract in
    the disease protein ataxin-3, a deubiquitinase. The polyglutamine
    expansion is the shared feature placing MJD/SCA3 within the broader
    polyQ neurodegenerative disease class.
  genes:
  - preferred_term: ATXN3
    term:
      id: hgnc:7106
      label: ATXN3
  biological_processes:
  - preferred_term: ubiquitin-dependent protein catabolic process
    term:
      id: GO:0006511
      label: ubiquitin-dependent protein catabolic process
    modifier: ABNORMAL
  downstream:
  - target: Polyglutamine-expanded ataxin-3 misfolds, aggregates, and disrupts proteostasis
    description: >-
      The expanded polyglutamine tract drives misfolding and aggregation of
      ataxin-3, generating toxic species that disrupt cellular proteostasis
      and additional downstream cellular processes.
    causal_link_type: DIRECT
    evidence:
    - reference: PMID:29959858
      reference_title: "Machado-Joseph disease/spinocerebellar ataxia type 3: lessons from disease pathogenesis and clues into therapy."
      supports: SUPPORT
      evidence_source: OTHER
      snippet: >-
        The aberrantly expanded protein product - ataxin-3 - is known to
        aggregate and generate toxic species that disrupt several cell
        systems, including autophagy, proteostasis, transcription,
        mitochondrial function and signalling.
      explanation: Directly supports the edge from polyQ-expanded ataxin-3 to aggregation and proteostasis disruption.
  evidence:
  - reference: PMID:29959858
    reference_title: "Machado-Joseph disease/spinocerebellar ataxia type 3: lessons from disease pathogenesis and clues into therapy."
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Machado-Joseph disease (MJD), also known as spinocerebellar ataxia type
      3 (SCA3), is an incurable disorder, widely regarded as the most common
      form of spinocerebellar ataxia in the world. MJD/SCA3 arises from
      mutation of the ATXN3 gene, but this simple monogenic cause contrasts
      with the complexity of the pathogenic mechanisms that are currently
      admitted to underlie neuronal dysfunction and death.
    explanation: Anchors ATXN3 mutation as the monogenic cause and frames the multi-system pathogenic complexity that follows.
  - reference: PMID:21827905
    reference_title: "Machado-Joseph disease/spinocerebellar ataxia type 3."
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      MJD/SCA3 is one of nine identified polyglutamine neurodegenerative
      diseases which share features of pathogenesis centered on protein
      misfolding and accumulation.
    explanation: Places MJD/SCA3 within the polyQ disease class with shared misfolding/accumulation pathogenesis.
- name: Polyglutamine-expanded ataxin-3 misfolds, aggregates, and disrupts proteostasis
  description: >-
    Expanded ataxin-3 misfolds and forms intracellular aggregates that
    sequester normal cellular interaction partners, including the AAA+
    ATPase P97/VCP and ubiquitin conjugates, into inclusions. This loss of
    function for sequestered proteins, combined with toxic gain-of-function
    properties of the aggregates themselves, perturbs ubiquitin-proteasome
    flux and autophagy and amplifies proteostasis collapse in vulnerable
    neurons.
  cell_types:
  - preferred_term: neuron
    term:
      id: CL:0000540
      label: neuron
  biological_processes:
  - preferred_term: inclusion body assembly
    term:
      id: GO:0070841
      label: inclusion body assembly
    modifier: INCREASED
  - preferred_term: autophagy
    term:
      id: GO:0006914
      label: autophagy
    modifier: ABNORMAL
  evidence:
  - reference: PMID:25231079
    reference_title: "Aggregation of polyglutamine-expanded ataxin-3 sequesters its specific interacting partners into inclusions: implication in a loss-of-function pathology."
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: >-
      We found that the aggregates formed by polyQ-expanded Atx3 sequester
      its interacting partners, such as P97/VCP and ubiquitin conjugates,
      into the protein inclusions through specific interactions both in
      vitro and in cells.
    explanation: Demonstrates sequestration of P97/VCP and ubiquitin conjugates by polyQ-expanded ataxin-3 aggregates as a direct molecular mechanism.
  - reference: PMID:29959858
    reference_title: "Machado-Joseph disease/spinocerebellar ataxia type 3: lessons from disease pathogenesis and clues into therapy."
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      The aberrantly expanded protein product - ataxin-3 - is known to
      aggregate and generate toxic species that disrupt several cell
      systems, including autophagy, proteostasis, transcription,
      mitochondrial function and signalling.
    explanation: Supports aggregation-driven disruption of autophagy, proteostasis, and additional cellular systems as the central downstream pathology.
- name: Multifocal Purkinje, brainstem, and anterior horn neurodegeneration
  description: >-
    Aggregation-driven proteostasis failure converges on a stereotyped
    pattern of multifocal neurodegeneration that targets cerebellar Purkinje
    cells and dentate nucleus, brainstem (pontine and cranial nerve motor
    nuclei), basal ganglia and substantia nigra, and spinal cord anterior
    horn cells. The distribution of vulnerable populations explains the
    cardinal cerebellar syndrome and the extracerebellar features
    (ophthalmoplegia, dysarthria, parkinsonism, amyotrophy, peripheral
    neuropathy) that distinguish the four classical subtypes.
  cell_types:
  - preferred_term: Purkinje cell
    term:
      id: CL:0000121
      label: Purkinje cell
  - preferred_term: neuron
    term:
      id: CL:0000540
      label: neuron
  evidence:
  - reference: PMID:30975995
    reference_title: "Spinocerebellar ataxia."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Most SCA mutations cause prominent damage to cerebellar Purkinje
      neurons with consecutive cerebellar atrophy, although Purkinje neurons
      are only mildly affected in some SCAs. Furthermore, other parts of the
      nervous system, such as the spinal cord, basal ganglia and pontine
      nuclei in the brainstem, can be involved.
    explanation: Supports cerebellar Purkinje neuron damage with extracerebellar involvement of spinal cord, basal ganglia, and pontine nuclei as the shared neuropathological pattern, including SCA3.
