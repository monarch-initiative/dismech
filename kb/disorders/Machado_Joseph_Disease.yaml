name: Machado-Joseph disease
creation_date: "2026-04-28T00:00:00Z"
updated_date: "2026-04-28T00:00:00Z"
category: Mendelian
synonyms:
- MJD
- SCA3
- Spinocerebellar ataxia type 3
- Azorean disease of the nervous system
description: >-
  Machado-Joseph disease (MJD), also known as spinocerebellar ataxia type 3
  (SCA3), is the most common autosomal dominant spinocerebellar ataxia
  worldwide. It is caused by an expanded CAG trinucleotide repeat in the
  ATXN3 gene that encodes a polyglutamine tract in the deubiquitinase
  ataxin-3. Polyglutamine-expanded ataxin-3 is prone to misfolding and
  aggregation, forming intraneuronal nuclear and cytoplasmic inclusions and
  disrupting proteostasis, autophagy, transcription, mitochondrial function,
  and signalling. Multifocal neurodegeneration affects the cerebellum,
  brainstem, basal ganglia, substantia nigra, and spinal anterior horn,
  producing progressive ataxia with extracerebellar features. Four classic
  clinical subtypes (Coutinho/Sequeiros Types 1–4) are recognised based on
  age at onset and predominant extracerebellar features (pyramidal/dystonic,
  ophthalmoplegic, peripheral neuropathic, parkinsonian). No
  disease-modifying therapy is approved; antisense oligonucleotide-mediated
  ATXN3 lowering is the most clinically advanced disease-modifying strategy
  in preclinical and early clinical development.
