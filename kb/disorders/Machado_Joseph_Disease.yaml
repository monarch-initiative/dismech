genetic:
- name: ATXN3
  gene_term:
    preferred_term: ATXN3
    term:
      id: hgnc:7106
      label: ATXN3
  association: CAG polyglutamine repeat expansion
  presence: Positive
  notes: >-
    Pathogenic variants in MJD/SCA3 are unstable CAG trinucleotide repeat
    expansions in ATXN3 on chromosome 14q32.1. Normal alleles contain
    13-36 CAG repeats; clinically affected individuals carry expanded
    alleles in the ~60-87 repeat range in the originally described
    pedigrees. Repeat length correlates inversely with age at onset and
    contributes to subtype assignment, with longer repeats producing
    earlier-onset Type 1 (pyramidal/dystonic) presentations.
  evidence:
  - reference: PMID:7874163
    reference_title: "CAG expansions in a novel gene for Machado-Joseph disease at chromosome 14q32.1."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      We have identified a novel gene containing CAG repeats and mapped it
      to chromosome 14q32.1, the genetic locus for Machado-Joseph disease
      (MJD).
    explanation: Identifies ATXN3 on chromosome 14q32.1 as the MJD locus.
  - reference: PMID:7874163
    reference_title: "CAG expansions in a novel gene for Machado-Joseph disease at chromosome 14q32.1."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      In normal individuals the gene contains between 13 and 36 CAG repeats,
      whereas most of the clinically diagnosed patients and all of the
      affected members of a family with the clinical and pathological
      diagnosis of MJD show expansion of the repeat-number (from 68-79).
    explanation: Establishes the normal vs. pathogenic CAG repeat ranges in the originally described MJD families.
treatments:
- name: Supportive and rehabilitative care
  description: >-
    Multidisciplinary symptomatic management is the current standard of
    care for SCA3/MJD. Physical therapy, occupational therapy, speech
    therapy, mobility aids, swallow management, and treatment of comorbid
    psychiatric symptoms address progressive disability in the absence of a
    disease-modifying therapy.
  treatment_term:
    preferred_term: supportive care
    term:
      id: MAXO:0000950
      label: supportive care
  target_phenotypes:
  - preferred_term: ataxia
    term:
      id: HP:0001251
      label: Ataxia
  - preferred_term: dysarthria
    term:
      id: HP:0001260
      label: Dysarthria
  - preferred_term: dysphagia
    term:
      id: HP:0002015
      label: Dysphagia
  evidence:
  - reference: PMID:30975995
    reference_title: "Spinocerebellar ataxia."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      As there is currently no treatment to slow or halt SCAs (many SCAs
      lead to premature death), the clinical care of patients with SCA
      focuses on managing the symptoms through physiotherapy, occupational
      therapy and speech therapy.
    explanation: Supports symptomatic, multidisciplinary rehabilitative care as the current standard of care for SCA, including SCA3.
- name: Investigational ATXN3-targeted antisense oligonucleotide therapy
  description: >-
    Antisense oligonucleotides (ASOs) that lower ATXN3 mRNA are the most
    advanced disease-modifying strategy in preclinical and early clinical
    development for MJD/SCA3. Intracerebroventricular ASO administration in
    transgenic SCA3 mouse models reduces polyglutamine-expanded ataxin-3,
    prevents oligomeric/nuclear ATXN3 accumulation, and rescues motor and
    Purkinje neuron firing deficits. No ATXN3-targeted ASO is yet approved
    for clinical use; this entry captures the strategy as investigational.
  treatment_term:
    preferred_term: pharmacotherapy
    term:
      id: MAXO:0000058
      label: pharmacotherapy
  target_phenotypes:
  - preferred_term: ataxia
    term:
      id: HP:0001251
      label: Ataxia
  evidence:
  - reference: PMID:29908063
    reference_title: "Oligonucleotide therapy mitigates disease in spinocerebellar ataxia type 3 mice."
    supports: SUPPORT
    evidence_source: MODEL_ORGANISM
    snippet: >-
      The ATXN3-targeting ASO achieved sustained reduction of
      polyglutamine-expanded ATXN3 up to 8 weeks after treatment and
      prevented oligomeric and nuclear accumulation of ATXN3 up to at least
      14 weeks after treatment.
    explanation: Demonstrates sustained reduction of polyQ-expanded ATXN3 and prevention of oligomeric/nuclear accumulation by an ATXN3-targeted ASO in vivo.
  - reference: PMID:29908063
    reference_title: "Oligonucleotide therapy mitigates disease in spinocerebellar ataxia type 3 mice."
    supports: SUPPORT
