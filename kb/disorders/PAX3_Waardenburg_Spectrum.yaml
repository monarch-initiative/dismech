name: PAX3 Waardenburg Spectrum
creation_date: '2026-05-28T00:00:00Z'
description: >-
  A gene-axis spectrum of auditory-pigmentary disorders caused by heterozygous
  pathogenic variants in PAX3, the paired box 3 transcription factor that
  specifies dorsal neural tube and neural crest derivatives. PAX3 acts upstream
  of MITF: together with SOX10 it transactivates the MITF promoter, driving
  melanoblast specification, so PAX3 loss reduces neural-crest-derived
  melanocytes in skin, hair, iris, and the cochlear stria vascularis. This
  produces the shared auditory-pigmentary phenotype of pigmentary disturbances
  (white forelock, heterochromia, congenital leukoderma) and sensorineural
  hearing loss. The PAX3 axis is clinically distinguished from the other
  Waardenburg genes (MITF, SOX10, EDN3/EDNRB) by dystopia canthorum (lateral
  displacement of the inner canthi). Heterozygous loss-of-function and
  paired-domain variants cause Waardenburg syndrome type 1 (WS1); paired-domain
  variants with a more severe dosage/zygosity effect additionally cause
  Klein-Waardenburg syndrome (WS3), which adds musculoskeletal abnormalities of
  the limbs. This entry covers the PAX3 axis; the MITF, SOX10, and EDN3/EDNRB
  axes are represented separately.
category: Genetic
parents:
- Waardenburg Syndrome
- Pigmentary Disorder
- Sensorineural Hearing Loss
