notes: >-
  This entry represents the PAX3 gene axis of the Waardenburg spectrum, the
  mechanism-first complement to ClinGen's gene-by-gene curation (PAX3 -
  Waardenburg syndrome, MONDO:0018094, autosomal dominant, Definitive). It is one
  of a planned set of gene-axis Waardenburg entries (issue #3309); the MITF axis
  is already represented in MITF_Waardenburg_Tietz_Spectrum, and the SOX10 and
  EDN3/EDNRB axes are proposed separately. Craniofacial-deafness-hand syndrome
  (CDHS, MONDO:0007395) is a PAX3-allelic disorder that ClinGen explicitly
  excludes from the Waardenburg assertion; it is noted here as an allelic
  observation rather than a subtype. The pigmentation/hearing nodes are shared
  with the MITF axis through the PAX3-SOX10-MITF transactivation cascade and are
  candidates for a future neural-crest melanocyte-deficiency mechanism module.
  GeneReviews additionally recommends folic acid supplementation in pregnancy for
  women at increased risk of having a child with WS1 because of a possibly
  increased risk for neural tube defects.
