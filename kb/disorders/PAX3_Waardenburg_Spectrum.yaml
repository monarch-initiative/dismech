pathophysiology:
- name: PAX3 Haploinsufficiency and Paired-Domain Dysfunction
  description: >-
    Heterozygous PAX3 pathogenic variants reduce the activity of the paired box
    3 transcription factor, a DNA-binding regulator of dorsal neural tube and
    neural crest development. Loss-of-function variants cause haploinsufficiency,
    while paired-domain and homeodomain missense variants impair DNA binding.
    The mouse Splotch mutant (Pax-3 mutation) is the homologous model, and the
    auditory-pigmentary phenotype reflects defective embryonic neural crest
    function.
  cell_types:
  - preferred_term: migratory neural crest cell
    term:
      id: CL:0000333
      label: migratory neural crest cell
  biological_processes:
  - preferred_term: neural crest cell development
    term:
      id: GO:0014032
      label: neural crest cell development
    modifier: DECREASED
  evidence:
  - reference: PMID:1347148
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Here we show that some families with WS have mutations in the human
      homologue of Pax-3
    explanation: >-
      Original demonstration that PAX3 (human Pax-3 homologue) mutations cause
      Waardenburg syndrome.
  - reference: PMID:1347148
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Waardenburg's syndrome (WS) is an autosomal dominant combination of
      deafness and pigmentary disturbances, probably caused by defective
      function of the embryonic neural crest
    explanation: >-
      Establishes the neural crest as the affected developmental compartment in
      WS.
  - reference: PMID:8447316
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      PAX3 is a DNA-binding protein that contains a structural motif known as
      the paired domain and is believed to regulate the expression of other
      genes
    explanation: >-
      Describes PAX3 as a paired-domain DNA-binding transcriptional regulator.
  downstream:
  - target: Impaired MITF Transactivation
    description: >-
      Reduced PAX3 activity impairs transactivation of the MITF promoter, which
      PAX3 normally drives in synergy with SOX10.
  - target: Neural Crest-Derived Melanocyte Deficiency
    description: >-
      Defective neural crest development reduces melanoblast specification and
      melanocyte numbers.
- name: Impaired MITF Transactivation
  description: >-
    PAX3 regulates MITF gene expression and, together with SOX10, binds a
    proximal region of the MITF promoter to strongly activate MITF transcription.
    PAX3 (or SOX10) mutant proteins fail to transactivate this promoter, so
    reduced PAX3 function lowers MITF-driven melanocyte development. This places
    PAX3 mechanistically upstream of the MITF-axis Waardenburg disorders.
  evidence:
  - reference: PMID:10942418
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      PAX3 has been shown to regulate MITF gene expression
    explanation: >-
      Establishes PAX3 as a regulator of MITF expression.
  - reference: PMID:10942418
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: >-
      Here we show that SOX10, in synergy with PAX3, strongly activates MITF
      expression in transfection assays
    explanation: >-
      Transfection assays demonstrate that PAX3 and SOX10 synergistically
      activate MITF expression.
  - reference: PMID:10942418
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: >-
      SOX10 or PAX3 mutant proteins fail to transactivate this promoter,
      providing further evidence that the two genes act in concert to directly
      regulate expression of MITF
    explanation: >-
      Mutant PAX3 fails to transactivate the MITF promoter, linking PAX3 loss to
      reduced MITF activation.
  downstream:
  - target: Neural Crest-Derived Melanocyte Deficiency
    description: >-
      Reduced MITF transcriptional output impairs melanocyte differentiation and
      survival.
- name: Neural Crest-Derived Melanocyte Deficiency
  description: >-
    Reduced PAX3/MITF activity decreases differentiation and survival of
    neural-crest-derived melanocytes in skin, hair follicles, iris, and the
    cochlear stria vascularis, lowering melanin biosynthesis. This single
    cellular deficit underlies both the pigmentary and auditory features of the
    PAX3 spectrum.
  cell_types:
  - preferred_term: melanocyte
    term:
      id: CL:0000148
      label: melanocyte
  biological_processes:
  - preferred_term: melanocyte differentiation
    term:
      id: GO:0030318
      label: melanocyte differentiation
    modifier: DECREASED
  - preferred_term: melanin biosynthetic process
    term:
      id: GO:0042438
      label: melanin biosynthetic process
    modifier: DECREASED
  - preferred_term: developmental pigmentation
