    modifier: DECREASED
  evidence:
  - reference: PMID:20127975
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Waardenburg syndrome (WS) is characterized by the association of
      pigmentation abnormalities, including depigmented patches of the skin and
      hair, vivid blue eyes or heterochromia irides, and sensorineural hearing
      loss
    explanation: >-
      Links the melanocyte-dependent pigmentation abnormalities and hearing loss
      that define WS.
  - reference: PMID:10942418
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: >-
      These experiments, which demonstrate an interaction between three of the
      genes that are altered in WS, could explain the auditory-pigmentary
      symptoms of this disease
    explanation: >-
      Connects the PAX3-SOX10-MITF interaction to the combined
      auditory-pigmentary symptoms of WS.
  downstream:
  - target: Pigmentary Abnormalities
    description: >-
      Melanocyte deficiency in skin, hair, and iris produces white forelock,
      congenital leukoderma, premature graying, and heterochromia.
  - target: Cochlear Melanocyte Deficiency
    description: >-
      Absence of melanocytes in the stria vascularis disrupts cochlear function,
      causing sensorineural hearing loss.
- name: Cochlear Melanocyte Deficiency
  description: >-
    Melanocytes (intermediate cells) of the cochlear stria vascularis are
    required to generate the endocochlear potential that powers hair-cell
    mechanotransduction. Their PAX3/MITF-dependent deficiency is the basis of the
    sensorineural hearing loss seen across the Waardenburg spectrum.
  cell_types:
  - preferred_term: melanocyte
    term:
      id: CL:0000148
      label: melanocyte
  locations:
  - preferred_term: stria vascularis
    term:
      id: UBERON:0002282
      label: stria vascularis of cochlear duct
  evidence:
  - reference: PMID:1347148
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Waardenburg's syndrome (WS) is an autosomal dominant combination of
      deafness and pigmentary disturbances, probably caused by defective
      function of the embryonic neural crest
    explanation: >-
      Links the deafness of WS to a neural-crest (melanocyte) developmental
      defect.
- name: Pigmentary Abnormalities
  description: >-
    Visible pigmentation defects resulting from melanocyte deficiency: white
    forelock, premature graying, congenital leukoderma, and heterochromia
    iridis. These are shared across the Waardenburg spectrum and reflect the
    melanocyte lineage deficit.
  evidence:
  - reference: PMID:20127975
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      pigmentation abnormalities, including depigmented patches of the skin and
      hair, vivid blue eyes or heterochromia irides
    explanation: >-
      Enumerates the pigmentary abnormalities arising from melanocyte deficiency
      in WS.
