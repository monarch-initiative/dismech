has_subtypes:
- name: WS1
  display_name: Waardenburg Syndrome Type 1
  subtype_term:
    preferred_term: Waardenburg syndrome type 1
    term:
      id: MONDO:0008670
      label: Waardenburg syndrome type 1
  description: >
    The classic, most common PAX3-related Waardenburg phenotype. Autosomal
    dominant disorder caused by heterozygous PAX3 pathogenic variants
    (loss-of-function and paired-domain/homeodomain missense), characterized by
    congenital sensorineural hearing loss, pigmentary disturbances of the iris,
    hair, and skin (white forelock, heterochromia, congenital leukoderma), and
    dystopia canthorum. Dystopia canthorum (a lateral displacement of the inner
    canthi quantified by the W index) distinguishes WS1 from WS2.
  evidence:
  - reference: PMID:8447316
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Waardenburg syndrome type I (WS-I) is an autosomal dominant disorder
      characterized by sensorineural hearing loss, dystopia canthorum,
      pigmentary disturbances, and other developmental defects
    explanation: >-
      Establishes WS1 as an autosomal dominant PAX3 disorder defined by the
      combination of hearing loss, dystopia canthorum, and pigmentary changes.
  - reference: PMID:20301703
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Waardenburg syndrome type I (WS1) is an auditory-pigmentary disorder
      comprising congenital sensorineural hearing loss and pigmentary
      disturbances of the iris, hair, and skin along with dystopia canthorum
      (lateral displacement of the inner canthi)
    explanation: >-
      GeneReviews definition of WS1 as an auditory-pigmentary disorder with
      dystopia canthorum as the distinguishing feature.
- name: WS3
  display_name: Klein-Waardenburg Syndrome (Type 3)
  subtype_term:
    preferred_term: Waardenburg syndrome type 3
    term:
      id: MONDO:0007862
      label: Waardenburg syndrome type 3
  description: >
    Klein-Waardenburg syndrome shares the auditory-pigmentary features of WS1
    but additionally includes musculoskeletal abnormalities of the limbs (upper
    limb muscle hypoplasia, contractures, and syndactyly). It results from PAX3
    paired-domain variants, with the more severe limb phenotype reflecting a
    dosage/zygosity axis (heterozygous dominant cases as well as severe
    homozygous/biallelic cases have been reported).
  evidence:
  - reference: PMID:8447316
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Klein-Waardenburg syndrome (WS-III) is a disorder with many of the same
      characteristics as WS-I and includes musculoskeletal abnormalities
    explanation: >-
      Defines WS3 as sharing WS1 features plus musculoskeletal abnormalities.
  - reference: PMID:8447316
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      The results indicate that mutations in the PAX3 gene can cause both WS-I
      and WS-III
    explanation: >-
      Demonstrates that WS1 and WS3 are allelic, both caused by PAX3 variants.
