        gouty inflammation mediators (C5, IL-1B, CXCL8, IL6)."
      explanation: Identifies C5 among the key emergent gouty inflammation mediators,
        linking the inflammatory response to complement activation.
  - target: Acute Arthritis
    description: >
      Macrophage NLRP3 inflammasome activation initiates the acute gouty
      inflammatory flare manifesting as acute arthritis.
    causal_link_type: DIRECT
