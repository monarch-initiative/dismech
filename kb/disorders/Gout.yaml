name: Gout
creation_date: '2025-12-18T17:01:35Z'
updated_date: '2026-05-12T00:25:12Z'
description: >-
  Gout results from chronic hyperuricemia, driven by increased purine turnover or reduced renal urate excretion through transporters such as ABCG2, SLC2A9, and SLC22A12.
  When serum urate exceeds saturation, monosodium urate crystals deposit in joints and soft tissues.
  Phagocytosed crystals activate the NLRP3 inflammasome and IL-1beta release, recruiting neutrophils and producing the intensely painful acute inflammatory arthritis of gout.
category: Complex
parents:
- Metabolic Disease
- Musculoskeletal Disease
