biochemical:
- name: Serum Uric Acid
  presence: Elevated
  context: Usually >6.8 mg/dL, may be normal during acute attack
  readouts:
  - target: Hyperuricemia
    relationship: PHARMACODYNAMIC_MARKER_OF
    direction: POSITIVE
    endpoint_context: PHARMACODYNAMIC
    regulatory_endpoint_refs:
    - FDA-SE-adult-noncancer-029
    interpretation: >-
      Higher serum uric acid tracks the hyperuricemic biochemical state that
      drives urate crystal supersaturation; reduction under xanthine oxidase
      inhibitors, URAT1 inhibitors, or uricase reports pharmacodynamic
      urate-lowering in gout.
    evidence:
    - reference: PMID:39426967
      reference_title: "Effective xanthine oxidase inhibitor urate lowering therapy in gout is linked to an emergent serum protein interactome of complement and inflammation modulators."
      supports: SUPPORT
      evidence_source: HUMAN_CLINICAL
      snippet: >-
        At 48 weeks ULT, serum urate normalized in all gout patients, and
        flares declined in association with significantly altered proteins
      explanation: >-
        Supports serum urate normalization as a pharmacodynamic readout of
        urate-lowering therapy in gout.
  biomarker_term:
    preferred_term: Serum Uric Acid Measurement
    term:
      id: NCIT:C61034
      label: Serum Uric Acid Measurement
  synonyms:
  - Serum urate
  - Uric acid
  reference_ranges:
  - loinc_term:
      id: LOINC:3084-1
      label: Urate [Mass/volume] in Serum or Plasma
    lower_bound: 3.5
    upper_bound: 7.2
    unit: mg/dL
    population: adult males and postmenopausal women
    evidence:
    - reference: PMID:24867507
      reference_title: "Is it time to revise the normal range of serum uric acid levels?"
      supports: SUPPORT
      evidence_source: HUMAN_CLINICAL
      snippet: "serum uric acid values between 3.5 and 7.2 mg/dL in adult males and postmenopausal women and between 2.6 and 6.0 mg/dL in premenopausal women have been identified as normal in many countries"
      explanation: Establishes the conventional adult male / postmenopausal-female serum urate reference interval of 3.5-7.2 mg/dL.
    - reference: PMID:30145637
      reference_title: "The benchmark dose estimation of reference levels of serum urate for gout."
      supports: SUPPORT
      evidence_source: HUMAN_CLINICAL
      snippet: "A stricter threshold of serum urate (< 6.0 mg/dL) should be made"
      explanation: Supports a stricter <6.0 mg/dL serum-urate target for protection against gout.
    interpretation_bands:
    - name: Urate-lowering target met
      upper_bound: 6.0
      unit: mg/dL
      abnormal_flag: NORMAL
      interpretation: >-
        Below the <6.0 mg/dL serum-urate target recommended for gout; sustained
        levels here favor dissolution of existing monosodium urate deposits.
    - name: Above target, below saturation
      lower_bound: 6.0
      upper_bound: 6.8
      unit: mg/dL
      abnormal_flag: HIGH
      interpretation: >-
        Above the recommended urate-lowering target but below the monosodium
        urate saturation point; a suboptimal intermediate range in gout.
    - name: Hyperuricemia (supersaturated)
      lower_bound: 6.8
      unit: mg/dL
      abnormal_flag: HIGH
      phenotype_term:
        preferred_term: Hyperuricemia
        term:
          id: HP:0002149
          label: Hyperuricemia
      interpretation: >-
        Exceeds the monosodium urate saturation threshold, promoting crystal
        nucleation and deposition that drives gout.
    notes: >-
      The <6.0 mg/dL urate-lowering target follows Desideri et al. 2014 and Chen
      et al. 2018; ~6.8 mg/dL (~404 umol/L) is the widely cited physiologic
      monosodium urate saturation point at body temperature.
  - loinc_term:
      id: LOINC:3084-1
