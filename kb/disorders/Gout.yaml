      explanation: Links recruitment of neutrophils to the primary inflammatory
        manifestation of the acute gout attack.
  - target: Joint Swelling
    description: >
      Neutrophil-amplified joint inflammation produces the swelling
      characteristic of the acute gout attack.
    causal_link_type: INDIRECT_KNOWN_INTERMEDIATES
