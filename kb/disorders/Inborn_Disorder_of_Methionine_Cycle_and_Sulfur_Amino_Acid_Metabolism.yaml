name: Inborn Disorder of Methionine Cycle and Sulfur Amino Acid Metabolism
creation_date: "2026-05-10T16:47:28Z"
updated_date: "2026-05-19T07:37:41Z"
category: Mendelian
description: >-
  Inborn disorder of methionine cycle and sulfur amino acid metabolism is a
  pathway-based group of rare inherited metabolic disorders that disrupt
  methionine-cycle flux, homocysteine remethylation, cobalamin-dependent
  one-carbon metabolism, or transsulfuration. Major supported branches include
  CBS-deficient classical homocystinuria, MTHFR-related remethylation disease,
  MMACHC-related cblC disease, and MAT1A-related methionine
  adenosyltransferase I/III deficiency. The group is unified by abnormal sulfur
  amino-acid biomarkers, including hyperhomocystinemia, hypermethioninemia,
  hypomethioninemia, and, in combined cobalamin-processing disorders,
  methylmalonic acidemia, with subtype-specific neurologic, vascular, ocular,
  skeletal, renal, and pulmonary manifestations.
disease_term:
  preferred_term: inborn disorder of methionine cycle and sulfur amino acid metabolism
  term:
    id: MONDO:0019222
    label: inborn disorder of methionine cycle and sulfur amino acid metabolism
