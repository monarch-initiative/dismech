- name: CBS Transsulfuration Block
  description: >-
    CBS deficiency impairs conversion of homocysteine into cystathionine in the
    methionine catabolic pathway, producing homocysteine accumulation and
    multisystem disease dominated by vascular, ocular, skeletal, and neurologic
    complications.
  genes:
