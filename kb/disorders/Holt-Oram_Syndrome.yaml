  title: >-
    MorPhiC Consortium null allele phenotyping of ISL1 in iPSC-derived
    cardiomyocytes
  description: >-
    ISL1 is a MorPhiC anchor gene shared across all consortium data
    production centers. ISL1 cooperates with NKX2-5 in cardiac
    development, and both interact with TBX5 (the causative gene for
    Holt-Oram syndrome) in cardiac septation and conduction-system
    programs. MorPhiC iPSC-to-cardiomyocyte differentiation assays are
    directly relevant to interrogating the TBX5/NKX2-5/ISL1 cardiac
    transcription factor network whose dosage perturbation underlies
    HOS cardiac phenotypes.
