  downstream:
  - target: Cofactor and Chromatin Remodeling Dysfunction
    causal_link_type: DIRECT
    description: >
      TBX5 haploinsufficiency reduces TBX5 occupancy at cardiac
      enhancers, weakening recruitment of the GATA4/NKX2-5/ZFPM2
      cofactor module and the BAF and CHD4/NuRD chromatin remodelers
      that depend on TBX5 for targeting.
  - target: Cardiac Septation and Conduction Defects
    causal_link_type: INDIRECT_KNOWN_INTERMEDIATES
    intermediate_mechanisms:
    - Reduced enhancer activity at cardiac chamber and conduction-system genes
    - Loss of TBX5-dependent 3D chromatin loops at conduction loci
    description: >
      Reduced TBX5 dosage decreases transcription of downstream
      conduction and septation effectors (ANF/NPPA, GJA5/Cx40, Atp2a2,
      Ryr2), driving the structural and electrical cardiac phenotypes
      of HOS.
  - target: Upper Limb Morphogenesis Disruption
    causal_link_type: DIRECT
    description: >
      In the lateral plate mesoderm of the prospective forelimb field,
      TBX5 haploinsufficiency falls below the dosage threshold
      required for forelimb bud initiation and preaxial radial
      patterning, producing the HOS upper-limb spectrum.
- name: Cofactor and Chromatin Remodeling Dysfunction
  description: >
    TBX5 function depends critically on physical interactions with cardiac transcription
    factor
    GATA4 and the chromatin modulating protein ZFPM2/FOG2, which together co-occupy
    atrial-specific
    enhancers controlling genes required for atrial conduction and calcium handling.
    Additionally,
    TBX5 directly interacts with chromatin remodeling complexes including CHD4 (NuRD)
    and SMARCA4/BRG1
    (BAF/SWI-SNF) to maintain accessible chromatin at cardiac enhancers. Reduced TBX5
    dosage impairs
    the formation and maintenance of these enhancer-promoter loops and topologically
    associating
    domains (TADs), leading to widespread transcriptional dysregulation of conduction
    and chamber
    specification genes.
  evidence:
  - reference: PMID:38189150
    reference_title: "A Genomic Link From Heart Failure to Atrial Fibrillation Risk: FOG2 Modulates a TBX5/GATA4-Dependent Atrial Gene Regulatory Network."
    supports: SUPPORT
    evidence_source: MODEL_ORGANISM
    snippet: "FOG2 bound a subset of GATA4 and TBX5 co-bound genomic locations... FOG2 repressed TBX5-dependent transcription from a subset of co-bound enhancers"
    explanation: ChIP-seq in mouse cardiomyocytes (adult cardiomyocyte-specific FOG2 overexpression model) demonstrates the functional interaction between TBX5, GATA4, and FOG2 at atrial enhancers.
  - reference: PMID:38189150
    reference_title: "A Genomic Link From Heart Failure to Atrial Fibrillation Risk: FOG2 Modulates a TBX5/GATA4-Dependent Atrial Gene Regulatory Network."
    supports: SUPPORT
    evidence_source: MODEL_ORGANISM
    snippet: "Atrial rhythm abnormalities in mice caused by Tbx5 haploinsufficiency were rescued by Zfpm2 haploinsufficiency"
    explanation: Genetic evidence in mice that FOG2/ZFPM2 modulates TBX5-dependent conduction defects, supporting a direct functional interaction
  - reference: PMID:39677667
    reference_title: "CHD4 Interacts With TBX5 to Maintain the Gene Regulatory Network of Postnatal Atrial Cardiomyocytes."
    supports: SUPPORT
    evidence_source: MODEL_ORGANISM
    snippet: "TBX5 recruits CHD4, a chromatin remodeling ATPase, to 33,170 genomic regions... CHD4 is essential for maintaining aCM gene expression, aCM identity, and atrial rhythm homeostasis"
    explanation: Atrial cardiomyocyte-specific Chd4 conditional knockout mouse model with snRNA-seq/snATAC-seq showing that CHD4 is directly recruited by TBX5 and is critical for maintaining atrial cardiomyocyte identity and rhythm homeostasis.
