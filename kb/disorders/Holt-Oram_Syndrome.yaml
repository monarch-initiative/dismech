    causal_link_type: DIRECT
    description: >
      Loss of GATA4/NKX2-5/ZFPM2 cofactor binding and CHD4/BAF
      chromatin-remodeler recruitment at TBX5-bound atrial enhancers
      collapses the gene-regulatory network for conduction
      (GJA5/Cx40, Atp2a2, Ryr2) and chamber septation, producing
      structural and electrical cardiac defects.
- name: Cardiac Septation and Conduction Defects
  description: >
    The classical molecular mechanism by which TBX5 haploinsufficiency
    produces structural and electrical heart disease in HOS. TBX5
    cooperates with the homeodomain transcription factor NKX2-5 to
    activate cardiac target genes including atrial natriuretic factor
    (ANF/NPPA) and connexin 40 (GJA5/Cx40), which are required for
    chamber septation and atrioventricular conduction. A 50% reduction
    in TBX5 dosage markedly decreases ANF and Cx40 transcription,
    impairing endocardial cushion contributions to atrial/ventricular
    septation and reducing conduction-system gap junction coupling.
    Missense TBX5 mutations additionally disrupt protein-protein
    interactions with NKX2-5 and impair nuclear localization of the
    mutant protein, providing a complementary loss-of-function
    mechanism alongside truncating haploinsufficiency.
