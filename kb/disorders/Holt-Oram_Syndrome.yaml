      TBX5-knockout iPSC-derived cardiomyocytes display proarrhythmic
      action-potential abnormalities (EADs), modeling the cardiac
      conduction abnormalities and arrhythmia susceptibility seen in
      Holt-Oram syndrome patients.
genetic:
- name: TBX5
  presence: Positive
  association: Causative
  notes: >
    Loss-of-function mutations in TBX5 cause Holt-Oram syndrome with autosomal dominant
    inheritance. Heterozygous loss-of-function variants account for approximately
    90% of
    familial cases. The T-box transcription factor TBX5 is essential for cardiac and
    upper limb development. Gene dosage sensitivity is critical, as even partial loss
    of
    TBX5 function due to haploinsufficiency disrupts regulatory networks.
  evidence:
  - reference: PMID:36936432
    reference_title: "Case report: Novel TBX5-related pathogenic mechanism of Holt-Oram syndrome."
    supports: SUPPORT
    snippet: "Sequence alteration of T-box transcription factor 5 (TBX5) is correlated with the incidence of HOS"
    explanation: Directly establishes the causal relationship between TBX5 sequence variants and HOS development
  - reference: PMID:38189150
    reference_title: "A Genomic Link From Heart Failure to Atrial Fibrillation Risk: FOG2 Modulates a TBX5/GATA4-Dependent Atrial Gene Regulatory Network."
    supports: SUPPORT
    evidence_source: MODEL_ORGANISM
    snippet: "Atrial rhythm abnormalities in mice caused by Tbx5 haploinsufficiency were rescued by Zfpm2 haploinsufficiency"
    explanation: Mouse Tbx5 haploinsufficiency model demonstrates that reduced TBX5 dosage is sufficient to produce atrial rhythm abnormalities, paralleling HOS cardiac phenotypes
  - reference: PMID:8988165
    reference_title: "Mutations in human TBX5 [corrected] cause limb and cardiac malformation in Holt-Oram syndrome."
    supports: SUPPORT
