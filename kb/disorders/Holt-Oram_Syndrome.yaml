    profoundly altered gene expression, and dysregulated extracellular
    matrix and ion-handling pathways. This in-vitro cellular phenotype
    recapitulates the conduction-disease and arrhythmia susceptibility
    seen in HOS patients and provides a tractable model of the
    TBX5-haploinsufficient cardiomyocyte state.
