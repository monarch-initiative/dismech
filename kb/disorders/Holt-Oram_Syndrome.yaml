      the truncating-allele haploinsufficiency mechanism.
  downstream:
  - target: Atrial septal defect
    causal_link_type: INDIRECT_KNOWN_INTERMEDIATES
    intermediate_mechanisms:
    - Reduced TBX5/NKX2-5-driven expression of atrial septation genes
    - Failed primary atrial septum / endocardial cushion remodeling
    description: >
      Reduced TBX5 dosage and impaired TBX5-NKX2-5 cooperative
      transactivation of atrial chamber/septation genes (e.g.,
      ANF/NPPA) lead to failure of atrial septum morphogenesis and
      ostium-secundum-type ASD, the most common cardiac phenotype in
      HOS.
  - target: Ventricular septal defect
    causal_link_type: INDIRECT_KNOWN_INTERMEDIATES
    intermediate_mechanisms:
    - Reduced TBX5-dependent ventricular chamber program
    description: >
      TBX5 dosage reduction also impairs ventricular septation,
      producing VSDs that may occur in isolation or together with ASD.
  - target: Atrioventricular block
    causal_link_type: INDIRECT_KNOWN_INTERMEDIATES
    intermediate_mechanisms:
    - Decreased GJA5 (connexin 40) transcription
    - Impaired conduction-system gap-junction coupling
    description: >
      Loss of TBX5/NKX2-5-dependent transcription of connexin 40
      (Cx40) and other conduction-system genes reduces gap-junction
      coupling in the atrioventricular conduction system, producing
      progressive AV block independent of structural heart disease.
  - target: Atrial fibrillation
    causal_link_type: INDIRECT_KNOWN_INTERMEDIATES
    intermediate_mechanisms:
    - Loss of atrial-cardiomyocyte identity
    - Dysregulation of Ca2+-handling genes (Atp2a2, Ryr2)
    description: >
      TBX5/GATA4/FOG2 atrial enhancer-network disruption combined with
      altered Ca2+ handling and proarrhythmic action-potential
      remodeling (EADs) increases atrial fibrillation susceptibility.
- name: Upper Limb Morphogenesis Disruption
  description: >
    TBX5 is required cell-autonomously in the lateral plate mesoderm of
    the prospective forelimb field for forelimb bud initiation and for
    preaxial (radial) ray patterning. Heterozygous loss-of-function
    variants reduce TBX5 dosage below the threshold required for normal
    radial ray morphogenesis, producing the dosage-sensitive HOS limb
    spectrum that ranges from triphalangeal thumb and thumb hypoplasia
    to absent thumb, radial hypoplasia and phocomelia. Limb defects in
    HOS are bilateral but characteristically asymmetric and can occur
    independently of the severity of the cardiac phenotype.
  biological_processes:
  - preferred_term: Embryonic limb morphogenesis
    term:
      id: GO:0030326
      label: embryonic limb morphogenesis
  locations:
  - preferred_term: Forelimb bud
    term:
      id: UBERON:0005417
      label: forelimb bud
  evidence:
  - reference: PMID:8988165
    reference_title: "Mutations in human TBX5 [corrected] cause limb and cardiac malformation in Holt-Oram syndrome."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "mutations in the human TBX5 gene underlie this disorder"
    explanation: >-
      Original positional cloning of TBX5 from the 12q24.1 HOS locus,
      establishing TBX5 as the gene whose disruption causes the
      characteristic radial ray and cardiac malformations.
  - reference: PMID:8988165
    reference_title: "Mutations in human TBX5 [corrected] cause limb and cardiac malformation in Holt-Oram syndrome."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "haploinsufficiency of TBX5 causes Holt-Oram syndrome"
    explanation: >-
      Establishes that loss of one functional TBX5 allele
      (haploinsufficiency) is the primary molecular mechanism producing
      the limb phenotype, consistent with a dosage-sensitive
      transcription-factor mechanism.
  downstream:
  - target: Upper limb abnormality
    causal_link_type: DIRECT
    description: >
      Failed TBX5-driven forelimb-bud initiation and radial patterning
      produces the cardinal HOS upper-limb phenotype, observed in
      essentially 100% of clinically diagnosed cases.
  - target: Radial ray defect
    causal_link_type: DIRECT
    description: >
      TBX5 is specifically required for preaxial (radial) ray
      patterning; haploinsufficiency disrupts this program, generating
      the spectrum of radial ray defects from radial bowing to
      hypoplasia/aplasia of the radius.
  - target: Triphalangeal thumb
    causal_link_type: INDIRECT_KNOWN_INTERMEDIATES
    intermediate_mechanisms:
    - Dosage-sensitive radial ray patterning failure
    description: >
      Triphalangeal thumb is a milder manifestation of disrupted
      preaxial ray patterning in TBX5-haploinsufficient limb
      mesenchyme.
