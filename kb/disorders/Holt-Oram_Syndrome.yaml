    explanation: >-
      Original positional cloning of TBX5 from the 12q24.1 HOS locus,
      identifying it as the causative T-box transcription factor.
  - reference: PMID:30552424
    reference_title: "Holt-Oram syndrome: clinical and molecular description of 78 patients with TBX5 variants."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
