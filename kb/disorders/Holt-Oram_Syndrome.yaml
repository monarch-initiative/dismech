    supports: SUPPORT
    snippet: "The patient inherited a base T (reference C) at rs883079 from her mother and base C (reference T) at rs10850326 from her father"
    explanation: Case report demonstrating inheritance of TBX5 variants from heterozygous carrier parents, consistent with autosomal dominant inheritance
  - reference: PMID:16183809
    reference_title: "TBX5 genetic testing validates strict clinical criteria for Holt-Oram syndrome."
    supports: SUPPORT
