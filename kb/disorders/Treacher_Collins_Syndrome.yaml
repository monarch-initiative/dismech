diagnosis:
- name: Clinical diagnosis
  description: TCS is diagnosed based on characteristic bilateral symmetric craniofacial features including malar hypoplasia,
    micrognathia, downslanted palpebral fissures, ear anomalies, and conductive hearing loss.
  evidence:
  - reference: PMID:20301704
    reference_title: Treacher Collins Syndrome.
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: Treacher Collins syndrome (TCS) is characterized by lower eyelid abnormalities, malar hypoplasia, downslanted
      palpebral fissures, and micro- or retrognathia due to symmetric hypoplasia of the zygomatic bones, maxilla, and mandible.
    explanation: GeneReviews defines the clinical diagnostic criteria.
- name: Molecular genetic testing
  description: Diagnosis confirmed by identification of heterozygous pathogenic variants in TCOF1, POLR1D, or POLR1B, or biallelic
    pathogenic variants in POLR1C or POLR1D.
  diagnosis_term:
    preferred_term: genetic testing
    term:
      id: MAXO:0000127
      label: genetic testing
  evidence:
  - reference: PMID:20301704
    reference_title: Treacher Collins Syndrome.
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: The diagnosis of TCS is established in a proband with characteristic clinical features and/or a heterozygous
      pathogenic variant in TCOF1, POLR1D, or POLR1B, biallelic pathogenic variants in POLR1C, or, rarely, biallelic pathogenic
      variants in POLR1D identified by molecular genetic testing.
    explanation: GeneReviews specifies the molecular diagnostic criteria for TCS.
