    snippet: P53 heterozygosity is protective against TCS, and that P53 and TCOF1 hemizygous embryos do not affect ribosomal
      function, implicates P53 or elements downstream of P53 as playing a role in TCS pathogenesis.
    explanation: Mouse model data showing p53 heterozygosity rescues the TCS phenotype, confirming p53-dependent apoptosis
      as the key mechanism.
  downstream:
