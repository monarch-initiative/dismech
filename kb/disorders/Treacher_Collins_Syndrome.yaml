pathophysiology:
- name: Impaired Ribosome Biogenesis in Neural Crest Cells
  description: 'Mutations in TCOF1/POLR1B/POLR1C/POLR1D impair ribosomal RNA transcription and ribosome biogenesis. Neural
    crest cells are uniquely sensitive to reduced ribosome output due to their high proliferative and migratory demands during
    embryonic craniofacial development.

    '
  cell_types:
  - preferred_term: neural crest cell
    term:
      id: CL:0000333
      label: migratory neural crest cell
  biological_processes:
  - preferred_term: Ribosome biogenesis
    term:
      id: GO:0042254
      label: ribosome biogenesis
    modifier: DECREASED
  locations:
  - preferred_term: pharyngeal arch
    term:
      id: UBERON:0002539
      label: pharyngeal arch
  evidence:
  - reference: PMID:24690222
    reference_title: 'Treacher Collins Syndrome: the genetics of a craniofacial disease.'
    supports: SUPPORT
    evidence_source: MODEL_ORGANISM
    snippet: The association of the TCOF1 gene product, Treacle, and gene products of POLR1C and POLR1D with ribosome biosynthesis
      suggests that a loss of function mutation in these genes disrupts ribosome biosynthesis in constituent neural crest
      cells and neuroepithelium leading to apoptosis.
    explanation: Establishes the mechanistic link between TCS gene mutations, impaired ribosome biogenesis, and neural crest
      cell apoptosis.
  - reference: PMID:33804586
    reference_title: 'The Role of TCOF1 Gene in Health and Disease: Beyond Treacher Collins Syndrome.'
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: One of the crucial proteins involved in most of the key nucleolar functions is treacle phosphoprotein encoded
      by the TCOF1 gene.
    explanation: Identifies Treacle as a crucial nucleolar protein involved in key nucleolar functions including ribosome
      biogenesis.
  downstream:
  - target: p53-Dependent Neural Crest Cell Apoptosis
    causal_link_type: DIRECT
    description: Reduced ribosome biogenesis activates nucleolar stress, stabilizing p53 and triggering apoptosis in neural
      crest cells.
    evidence:
    - reference: PMID:24690222
      reference_title: 'Treacher Collins Syndrome: the genetics of a craniofacial disease.'
      supports: SUPPORT
      evidence_source: MODEL_ORGANISM
      snippet: a loss of function mutation in these genes disrupts ribosome biosynthesis in constituent neural crest cells
        and neuroepithelium leading to apoptosis.
      explanation: Describes the causal chain from ribosome disruption to apoptosis.
- name: p53-Dependent Neural Crest Cell Apoptosis
  description: 'Nucleolar stress from impaired ribosome biogenesis stabilizes p53 in neural crest cells, triggering apoptosis
    during the critical window of craniofacial development. p53 heterozygosity is protective, confirming p53''s central role
    in TCS pathogenesis.

    '
  cell_types:
  - preferred_term: neural crest cell
