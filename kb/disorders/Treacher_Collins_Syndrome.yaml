      supports: SUPPORT
      evidence_source: HUMAN_CLINICAL
      snippet: Treacher Collins syndrome (TCS) is associated with abnormal differentiation of the first and second pharyngeal
        arches, occurring during fetal development.
      explanation: Links neural crest deficiency to pharyngeal arch malformation.
- name: Craniofacial Skeletal Hypoplasia
  description: 'Depletion of cranial neural crest cells results in bilateral symmetric hypoplasia of the zygomatic bones,
    maxilla, and mandible, as well as external and middle ear malformations and orbital abnormalities.

    '
  locations:
