treatments:
- name: Craniofacial Reconstruction
  description: Zygomatic, orbital, and mandibular reconstruction surgery tailored to severity. Zygomatic/orbital reconstruction
    typically at age 5-7 years, ear reconstruction after age 6 years, orthognathic surgery before age 16.
  treatment_term:
    preferred_term: craniofacial surgical procedure
    term:
      id: MAXO:0000004
      label: surgical procedure
  evidence:
  - reference: PMID:20301704
    reference_title: Treacher Collins Syndrome.
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: 'Craniofacial reconstruction is often necessary: zygomatic and orbital reconstruction at about age five to seven
      years, and bilateral microtia and/or narrow ear canal reconstruction after age six years.'
    explanation: GeneReviews describes the staged surgical reconstruction approach.
  - reference: PMID:20301704
    reference_title: Treacher Collins Syndrome.
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
