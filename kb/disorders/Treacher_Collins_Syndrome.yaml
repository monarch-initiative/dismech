name: Treacher Collins Syndrome
creation_date: '2026-05-28T12:00:00Z'
synonyms:
- Mandibulofacial dysostosis without limb anomalies
- Franceschetti-Klein syndrome
- TCS
description: 'Treacher Collins syndrome (TCS) is an autosomal dominant craniofacial disorder characterized by bilateral and
  symmetric hypoplasia of the zygomatic bones, maxilla, and mandible, resulting in malar flattening, micrognathia, downslanted
  palpebral fissures, lower eyelid colobomas, external ear anomalies, and conductive hearing loss. TCS is caused by mutations
  in genes involved in ribosome biogenesis (TCOF1, POLR1B, POLR1C, POLR1D), which lead to inadequate ribosome production in
  neural crest cells, triggering p53-dependent apoptosis during embryonic development. Incidence is approximately 1 in 50,000
  live births. Intellect is typically normal.

  '
category: Mendelian
parents:
- Mandibulofacial dysostosis
disease_term:
  preferred_term: Treacher Collins syndrome
  term:
    id: MONDO:0002457
    label: Treacher-Collins syndrome
has_subtypes:
- name: TCS1
  display_name: Treacher Collins Syndrome 1 (TCOF1)
  description: Most common subtype (>90% of cases), caused by heterozygous pathogenic variants in TCOF1 encoding Treacle,
    a nucleolar phosphoprotein essential for ribosomal DNA transcription.
  subtype_term:
    preferred_term: Treacher Collins syndrome 1
    term:
      id: MONDO:0007944
      label: Treacher Collins syndrome 1
  evidence:
  - reference: PMID:34573374
    reference_title: 'Treacher Collins Syndrome: Genetics, Clinical Features and Management.'
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: TCS can be caused by pathogenic variants in the TCOF1, POLR1D, POLR1C and POLR1B genes. Genetically, the TCOF1
      gene contains 27 exons which encodes the Treacle protein. In TCOF1, over 200 pathogenic variants have been identified
    explanation: Identifies TCOF1 as a causative gene for TCS with over 200 known pathogenic variants.
- name: TCS2
  display_name: Treacher Collins Syndrome 2 (POLR1D, AD)
  description: Caused by heterozygous pathogenic variants in POLR1D, encoding a subunit shared by RNA polymerases I and III.
  subtype_term:
    preferred_term: Treacher Collins syndrome 2
    term:
      id: MONDO:0013385
      label: Treacher Collins syndrome 2
  evidence:
  - reference: PMID:20301704
    reference_title: Treacher Collins Syndrome.
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: heterozygous pathogenic variant in TCOF1, POLR1D, or POLR1B, biallelic pathogenic variants in POLR1C, or, rarely,
      biallelic pathogenic variants in POLR1D identified by molecular genetic testing.
    explanation: GeneReviews lists POLR1D heterozygous variants as a diagnostic criterion for TCS.
- name: TCS3
  display_name: Treacher Collins Syndrome 3 (POLR1C, AR)
  description: Caused by biallelic pathogenic variants in POLR1C, encoding a subunit shared by RNA polymerases I and III.
    Autosomal recessive inheritance.
  subtype_term:
    preferred_term: Treacher Collins syndrome 3
    term:
      id: MONDO:0009558
      label: Treacher Collins syndrome 3
  evidence:
  - reference: PMID:20301704
    reference_title: Treacher Collins Syndrome.
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: Autosomal recessive inheritance (biallelic pathogenic variants in POLR1C or POLR1D) accounts for a minority of
      TCS.
    explanation: GeneReviews confirms biallelic POLR1C variants cause autosomal recessive TCS.
- name: TCS4
  display_name: Treacher Collins Syndrome 4 (POLR1B)
  description: Caused by heterozygous pathogenic variants in POLR1B, encoding the second largest subunit of RNA polymerase
    I.
  subtype_term:
    preferred_term: Treacher Collins syndrome 4
    term:
      id: MONDO:0030067
      label: Treacher Collins syndrome 4
  evidence:
  - reference: PMID:34573374
    reference_title: 'Treacher Collins Syndrome: Genetics, Clinical Features and Management.'
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: Four subtypes of Treacher Collins syndrome exist. TCS can be caused by pathogenic variants in the TCOF1, POLR1D,
      POLR1C and POLR1B genes.
    explanation: Identifies POLR1B as one of the four causative genes defining TCS subtypes.
inheritance:
- name: Autosomal dominant inheritance
  description: Most TCS cases (~93%) follow autosomal dominant inheritance with variable expressivity. About 55-61% of autosomal
    dominant cases are de novo.
  inheritance_term:
    preferred_term: Autosomal dominant inheritance
    term:
      id: HP:0000006
      label: Autosomal dominant inheritance
  evidence:
  - reference: PMID:20301704
    reference_title: Treacher Collins Syndrome.
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: Autosomal dominant inheritance accounts for most of TCS, most commonly heterozygous pathogenic variants in TCOF1
      and less commonly heterozygous pathogenic variants in POLR1B or POLR1D.
    explanation: GeneReviews confirms autosomal dominant inheritance as the predominant pattern for TCS.
  - reference: PMID:20301704
    reference_title: Treacher Collins Syndrome.
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: About 55%-61% of individuals with autosomal dominant TCS have the disorder as the result of a de novo pathogenic
      variant.
    explanation: High de novo rate explains sporadic cases.
- name: Autosomal recessive inheritance
  description: A minority of TCS cases are caused by biallelic pathogenic variants in POLR1C or POLR1D, following autosomal
    recessive inheritance.
  inheritance_term:
