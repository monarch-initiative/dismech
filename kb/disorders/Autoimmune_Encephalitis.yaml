      label: immune response
  evidence:
  - reference: PMID:31326280
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: autoantibodies serve as a diagnostic marker and alter NMDAR-related synaptic
      transmission
    explanation: Confirms antibodies both diagnose and directly cause disease by altering
      NMDAR synaptic transmission.
- name: Intrathecal Antibody Production
  description: B cells and plasma cells within the central nervous system produce
    pathogenic antibodies intrathecally. Germinal center-like structures may form
    in the meninges, sustaining local antibody production. This explains why serum
    antibody titers do not always correlate with disease severity.
  cell_types:
  - preferred_term: Plasma cell
    term:
      id: CL:0000786
      label: plasma cell
phenotypes:
- category: Neurological
  name: Seizures
  frequency: VERY_FREQUENT
  diagnostic: true
  notes: Seizures occur in the majority of patients and may be the presenting symptom.
    Can be focal or generalized.
  evidence:
  - reference: PMID:31326280
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: some patients with rapidly progressive psychiatric symptoms or cognitive
      impairment, seizures, abnormal movements, or coma of unknown cause, had an autoimmune
      disease
    explanation: Seizures identified as a key presenting feature of anti-NMDAR encephalitis.
  phenotype_term:
    preferred_term: Seizure
    term:
      id: HP:0001250
      label: Seizure
- category: Psychiatric
  name: Psychosis
  frequency: VERY_FREQUENT
  notes: Acute psychiatric symptoms including hallucinations, delusions, agitation,
    and catatonia. Often leads to initial psychiatric hospitalization before the autoimmune
    diagnosis is recognized.
  evidence:
  - reference: PMID:31326280
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: some patients with rapidly progressive psychiatric symptoms or cognitive
      impairment, seizures, abnormal movements, or coma of unknown cause, had an autoimmune
      disease
    explanation: Rapidly progressive psychiatric symptoms are a hallmark presentation
      of autoimmune encephalitis.
  phenotype_term:
    preferred_term: Psychosis
    term:
      id: HP:0000709
      label: Psychosis
- category: Neurological
  name: Memory Impairment
  frequency: VERY_FREQUENT
  notes: Short-term memory loss is a hallmark, particularly prominent in anti-LGI1
    encephalitis where it may be the predominant feature.
  evidence:
  - reference: PMID:31326280
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: some patients with rapidly progressive psychiatric symptoms or cognitive
      impairment, seizures, abnormal movements, or coma of unknown cause, had an autoimmune
      disease
    explanation: Cognitive impairment (including memory) is a key presenting feature.
  phenotype_term:
    preferred_term: Memory impairment
    term:
      id: HP:0002354
      label: Memory impairment
- category: Neurological
  name: Dyskinesia
  frequency: FREQUENT
  notes: Orofacial dyskinesias and choreoathetoid movements are characteristic of
    anti-NMDA receptor encephalitis.
  evidence:
  - reference: PMID:31326280
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: some patients with rapidly progressive psychiatric symptoms or cognitive
      impairment, seizures, abnormal movements, or coma of unknown cause, had an autoimmune
      disease
    explanation: Abnormal movements (dyskinesias) are part of the diagnostic spectrum.
  phenotype_term:
    preferred_term: Dyskinesia
    term:
      id: HP:0100660
      label: Dyskinesia
- category: Neurological
  name: Abnormality of the Autonomic Nervous System
  frequency: FREQUENT
  notes: Autonomic instability including cardiac dysrhythmias, blood pressure fluctuations,
    central hypoventilation, and hyperthermia. Can be life-threatening.
  phenotype_term:
    preferred_term: Abnormality of the autonomic nervous system
    term:
      id: HP:0002270
      label: Abnormality of the autonomic nervous system
- category: Constitutional
  name: Fever
  frequency: FREQUENT
  notes: Low-grade fever is common in the prodromal phase.
  phenotype_term:
    preferred_term: Recurrent fever
    term:
      id: HP:0001954
      label: Recurrent fever
treatments:
- name: First-Line Immunotherapy
  description: Combination of corticosteroids, intravenous immunoglobulin, and/or
    plasma exchange. Approximately 53% of patients improve within 4 weeks of first-line
    treatment or tumor removal.
  evidence:
  - reference: PMID:23290630
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: 472 (94%) underwent first-line immunotherapy or tumour removal, resulting
      in improvement within 4 weeks in 251 (53%).
    explanation: Large observational cohort showing majority of patients receive first-line
      immunotherapy with about half responding within 4 weeks.
  treatment_term:
    preferred_term: immunotherapy
    term:
      id: NCIT:C15262
      label: Immunotherapy
- name: Rituximab
  description: Second-line immunotherapy for patients who fail first-line treatment.
    Depletes CD20+ B cells to reduce antibody production. Patients who receive second-line
    immunotherapy have significantly better outcomes than those who do not.
  evidence:
  - reference: PMID:23290630
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: Of 221 patients who did not improve with first-line treatment, 125 (57%)
      received second-line immunotherapy that resulted in a better outcome (mRS 0-2)
      than those who did not
    explanation: Second-line immunotherapy (rituximab/cyclophosphamide) significantly
      improves outcomes in treatment-refractory patients.
  - reference: PMID:31326280
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: About 80% of patients improve with immunotherapy and, if needed, tumour
      removal, but the recovery is slow.
    explanation: Overall 80% response rate to immunotherapy including second-line
      agents.
  treatment_term:
    preferred_term: rituximab therapy
    term:
      id: MAXO:0000058
      label: pharmacotherapy
    therapeutic_agent:
    - preferred_term: rituximab
      term:
        id: CHEBI:64357
        label: rituximab
- name: Tumor Resection
  description: Removal of associated tumors (ovarian teratoma in anti-NMDA receptor
    encephalitis, thymoma in anti-CASPR2) is critical for treatment response and reduces
    relapse risk.
  evidence:
  - reference: PMID:31326280
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: About 80% of patients improve with immunotherapy and, if needed, tumour
      removal, but the recovery is slow.
    explanation: Tumor removal is part of the standard treatment approach for autoimmune
      encephalitis with associated tumors.
  treatment_term:
    preferred_term: surgical procedure
    term:
      id: MAXO:0000004
      label: surgical procedure
