name: Autoimmune Encephalitis
creation_date: '2026-03-06T00:00:00Z'
updated_date: '2026-03-13T18:57:16Z'
category: Autoimmune
disease_term:
  preferred_term: autoimmune encephalitis
  term:
    id: MONDO:0020640
    label: autoimmune encephalitis
parents:
- Neurological Disease
- Autoimmune Disease
description: A group of rare autoimmune neurological disorders characterized by antibodies
  targeting neuronal surface or synaptic proteins, leading to subacute onset of neuropsychiatric
  symptoms including seizures, memory impairment, psychosis, movement disorders, and
  autonomic dysfunction. Anti-NMDA receptor encephalitis is the most common and best-characterized
  subtype. Early immunotherapy is associated with improved outcomes.
has_subtypes:
- name: Anti-NMDA Receptor Encephalitis
  description: 'The most common form, predominantly affecting young women and children.
    Caused by antibodies against the GluN1 subunit of the NMDA receptor. Progresses
    through phases: prodromal, psychiatric, movement disorder, autonomic instability,
    and recovery. Associated with ovarian teratomas in a significant proportion of
    adult women.'
  evidence:
  - reference: PMID:31326280
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: The disease is more prevalent in women (with a female to male ratio of
      around 8:2) and about 37% of patients are younger than 18 years at presentation
      of the disease. Tumours, usually ovarian teratoma, and herpes simplex encephalitis
      are known triggers of NMDAR autoimmunity.
    explanation: Confirms female predominance and ovarian teratoma association in
      anti-NMDAR encephalitis.
- name: Anti-LGI1 Encephalitis
  description: Limbic encephalitis caused by antibodies against leucine-rich glioma-inactivated
    1 (LGI1). Predominantly affects older men. Presents with faciobrachial dystonic
    seizures, memory impairment, and hyponatremia.
- name: Anti-CASPR2 Encephalitis
  description: Caused by antibodies against contactin-associated protein-like 2 (CASPR2).
    Presents with limbic encephalitis, neuromyotonia, or Morvan syndrome. Associated
    with thymoma.
pathophysiology:
- name: Antibody-Mediated NMDA Receptor Internalization
  description: In anti-NMDA receptor encephalitis, IgG antibodies crosslink and internalize
    NMDA receptors, reducing receptor density at synapses and disrupting glutamatergic
    neurotransmission. This leads to disinhibition of excitatory pathways and the
    characteristic neuropsychiatric manifestations. The antibodies serve as both a
    diagnostic marker and a pathogenic mediator that alters NMDAR-related synaptic
    transmission.
