  phenotype_term:
    preferred_term: Dysphonia
    term:
      id: HP:0001618
      label: Dysphonia
treatments:
- name: Riluzole
  description: >
    Disease-modifying glutamate-modulating agent approved to slow progression across the
    ALS/motor neuron disease spectrum, including bulbar-onset disease.
  therapeutic_modality: SMALL_MOLECULE
  treatment_term:
    preferred_term: Pharmacotherapy
    term:
      id: NCIT:C15986
      label: Pharmacotherapy
  evidence:
  - reference: PMID:40364643
    supports: SUPPORT
    evidence_source: OTHER
    snippet: "lateral sclerosis: riluzole, edaravone, AMX0035, and tofersen"
    explanation: >
      Riluzole is among the FDA-approved drugs that delay progression of ALS-spectrum motor
      neuron disease, which includes progressive bulbar palsy.
- name: Percutaneous Endoscopic Gastrostomy (PEG)
  description: >
    Enteral feeding tube placed to maintain nutrition and reduce aspiration risk when bulbar
    dysphagia compromises safe oral intake.
  treatment_term:
    preferred_term: surgical procedure
    term:
      id: MAXO:0000004
      label: surgical procedure
  evidence:
  - reference: PMID:41100402
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "percutaneous endoscopic gastrostomy (PEG)"
    explanation: >
      Percutaneous endoscopic gastrostomy is a standard supportive intervention in the
      motor neuron disease care pathway for bulbar dysphagia.
- name: Noninvasive Ventilation (NIV)
  description: >
    Respiratory support for declining respiratory function and secretion-related compromise
    associated with bulbar and respiratory muscle weakness.
  treatment_term:
    preferred_term: supportive care
    term:
      id: MAXO:0000950
      label: supportive care
  evidence:
  - reference: PMID:41100402
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "noninvasive ventilation (NIV)"
    explanation: >
      Noninvasive ventilation is part of the supportive management pathway in motor neuron
      disease, relevant to the respiratory compromise of bulbar disease.
- name: Sialorrhea Management
  description: >
    Management of excess saliva with anticholinergics, salivary-gland botulinum toxin
    injection, or salivary-gland radiation therapy.
  treatment_term:
    preferred_term: supportive care
    term:
      id: MAXO:0000950
      label: supportive care
  evidence:
  - reference: PMID:37816542
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Salivary secretion management includes the use of anticholinergics, botulinum toxin, and radiation therapy"
    explanation: >
      Sialorrhea in bulbar disease is managed with anticholinergics, botulinum toxin, and
      radiation therapy.
- name: Dextromethorphan/Quinidine for Pseudobulbar Affect
  description: >
    Combination therapy used to treat pseudobulbar affect (pathological laughter and crying)
    in ALS-spectrum disease.
  therapeutic_modality: SMALL_MOLECULE
  treatment_term:
    preferred_term: Pharmacotherapy
    term:
      id: NCIT:C15986
      label: Pharmacotherapy
  evidence:
  - reference: PMID:37647907
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "a combination of dextromethorphan and quinidine"
    explanation: >
      Dextromethorphan-quinidine combination is a recognized therapeutic option for
      pseudobulbar affect in the ALS/MND spectrum.
differential_diagnoses:
- name: Myasthenia Gravis
  disease_term:
    preferred_term: myasthenia gravis
    term:
      id: MONDO:0009688
      label: myasthenia gravis
  description: >
    Autoimmune neuromuscular junction disorder that can present with bulbar weakness, but
    characteristically fatigable, fluctuating, and with ocular involvement (ptosis,
    diplopia); responsive to acetylcholinesterase inhibitors and immunotherapy.
  distinguishing_features:
  - Fatigable, fluctuating weakness rather than steadily progressive degeneration.
  - Acetylcholine receptor / MuSK antibodies and decremental response on repetitive nerve stimulation.
  - No tongue fasciculations or atrophy; no upper-motor-neuron (pseudobulbar) signs.
  evidence:
  - reference: PMID:41194820
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Myasthenia gravis (MG) is an autoimmune neuromuscular disorder commonly"
    explanation: >
      Myasthenia gravis is an autoimmune neuromuscular-junction disorder with fatigable
      weakness, distinguishing it from the degenerative bulbar palsy of PBP.
- name: Amyotrophic Lateral Sclerosis
  disease_term:
    preferred_term: amyotrophic lateral sclerosis
    term:
      id: MONDO:0004976
      label: amyotrophic lateral sclerosis
  description: >
    The broader motor neuron disease into which most PBP cases evolve; ALS adds prominent
    limb and respiratory (spinal) motor involvement beyond the bulbar region.
  distinguishing_features:
  - Generalized limb upper- and lower-motor-neuron involvement, not confined to bulbar region.
  - PBP is regarded as a bulbar-onset regional variant of the same disease process.
  evidence:
  - reference: PMID:40364643
    supports: SUPPORT
    evidence_source: OTHER
    snippet: "The main types include amyotrophic lateral sclerosis, progressive muscular atrophy, primary lateral sclerosis, and progressive bulbar palsy, the pathological processes of which are largely identical, with the main disparity lying in the location of the lesions"
    explanation: >
      ALS and progressive bulbar palsy are listed among the main motor neuron disease types
      with largely identical pathology, differing in lesion location.
- name: Brainstem Stroke
  disease_term:
    preferred_term: brain stem infarction
    term:
      id: MONDO:0006686
      label: brain stem infarction
  description: >
    Acute vascular brainstem lesion can produce bulbar weakness (dysarthria, dysphagia) but
    with sudden onset, additional crossed sensory/long-tract signs, and characteristic MRI
    findings, contrasting with the insidious, purely motor course of PBP.
  distinguishing_features:
  - Acute/sudden onset rather than insidious progression.
  - Associated long-tract and sensory signs; diffusion-restricted lesion on MRI.
references:
- reference: PMID:40364643
  title: "Latest progress and challenges in drug development for degenerative motor neuron diseases."
