    snippet: "atrophy and fasciculations of the musculature of the tongue, dysarthria"
    explanation: A progressive bulbar palsy case report describes degeneration of the medullary motor nuclei producing tongue atrophy and fasciculations, directly documenting hypoglossal lower-motor-neuron tongue wasting in PBP.
- name: Tongue Fasciculations
  category: Neurologic
