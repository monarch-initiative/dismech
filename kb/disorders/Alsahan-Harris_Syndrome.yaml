inheritance:
- name: Autosomal Recessive
  description: >-
    Alsahan-Harris syndrome is inherited in an autosomal recessive manner,
    caused by biallelic (homozygous or compound heterozygous) pathogenic
    variants in TBC1D32.
  evidence:
