biochemical:
- name: Interleukin-6 (IL-6)
  presence: Elevated
  context: >-
    Markedly elevated serum IL-6 levels drive the systemic inflammatory
    manifestations. IL-6 levels correlate with disease activity and severity.
  evidence:
  - reference: PMID:25042199
    reference_title: "Siltuximab for multicentric Castleman's disease: a randomised, double-blind, placebo-controlled trial."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Multicentric Castleman's disease is a rare lymphoproliferative disorder
      driven by dysregulated production of interleukin 6.
    explanation: >-
      Establishes IL-6 as the central pathogenic cytokine in MCD.
- name: C-Reactive Protein (CRP)
  presence: Elevated
  context: >-
    Elevated as an acute phase reactant driven by IL-6 signaling. CRP levels
    serve as a biomarker for disease activity and progression risk.
  evidence:
  - reference: PMID:37288720
    reference_title: "Higher rate of progression in HIV- than in HIV+ patients after rituximab for HHV8+ multicentric Castleman disease."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      serum C-reactive protein (CRP) >20 mg/mL were independently associated
      with an increased risk of progression after rituximab-induced CR
    explanation: >-
      CRP identified as an independent prognostic factor for disease
      progression in HHV8+ MCD.
- name: VEGF
  presence: Elevated
  context: >-
    Vascular endothelial growth factor is elevated due to IL-6-driven
    production, contributing to angiogenesis and vascular leak.
treatments:
- name: Siltuximab
  description: >-
    Anti-IL-6 monoclonal antibody that directly binds and neutralizes IL-6.
    FDA-approved for iMCD. In the pivotal randomized trial, durable tumor and
    symptomatic responses occurred in 34% of siltuximab-treated patients versus
    0% with placebo.
  evidence:
  - reference: PMID:25042199
    reference_title: "Siltuximab for multicentric Castleman's disease: a randomised, double-blind, placebo-controlled trial."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Durable tumour and symptomatic responses occurred in 18 (34%) of 53
      patients in the siltuximab group and none of 26 in the placebo group
      (difference 34·0%, 95% CI 11·1-54·8, p=0·0012).
    explanation: >-
      Pivotal randomized controlled trial demonstrating siltuximab efficacy
      in iMCD.
  - reference: PMID:25042199
    reference_title: "Siltuximab for multicentric Castleman's disease: a randomised, double-blind, placebo-controlled trial."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Siltuximab plus best supportive care was superior to best supportive care
      alone for patients with symptomatic multicentric Castleman's disease and
      well tolerated with prolonged exposure. Siltuximab is an important new
      treatment option for this disease.
    explanation: >-
      Trial conclusion establishing siltuximab as a key treatment for MCD.
  treatment_term:
    preferred_term: anti-IL-6 monoclonal antibody therapy
    term:
      id: MAXO:0000058
      label: pharmacotherapy
- name: Tocilizumab
  description: >-
    Anti-IL-6 receptor monoclonal antibody that blocks IL-6 signaling.
    Approved in Japan for MCD treatment. Recommended as an alternative to
    siltuximab when siltuximab is unavailable.
  evidence:
  - reference: PMID:30181172
    reference_title: "International, evidence-based consensus treatment guidelines for idiopathic multicentric Castleman disease."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      The anti-interleukin-6 monoclonal antibody siltuximab (or tocilizumab,
      if siltuximab is not available) with or without corticosteroids is the
      preferred first-line therapy for iMCD.
    explanation: >-
      International consensus guidelines recommend tocilizumab as alternative
      first-line therapy for iMCD.
  treatment_term:
    preferred_term: anti-IL-6 receptor monoclonal antibody therapy
    term:
      id: MAXO:0000058
      label: pharmacotherapy
- name: Rituximab
  description: >-
    Anti-CD20 monoclonal antibody used as first-line therapy for HHV-8
    associated MCD. Depletes B cells harboring HHV-8 virus. Has converted
    HHV-8+ MCD from a rapidly fatal illness to a relapsing disease with
    markedly improved survival.
  evidence:
  - reference: PMID:21778341
    reference_title: "Improved outcome with rituximab in patients with HIV-associated multicentric Castleman disease."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Clinical outcome and overall survival of HIV-MCD have markedly improved
      with rituximab-based therapies, considering rituximab-based therapies
      (with or without cytostatic agents) to be among the preferred first-line
      options in patients with HIV-MCD.
    explanation: >-
      Multicenter retrospective study demonstrating improved outcomes with
      rituximab in HIV-associated MCD.
  - reference: PMID:37288720
    reference_title: "Higher rate of progression in HIV- than in HIV+ patients after rituximab for HHV8+ multicentric Castleman disease."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Rituximab has revolutionized the treatment of Kaposi sarcoma-associated
      herpesvirus/human herpesvirus 8-associated multicentric Castleman disease
      (HHV8+ MCD), converting a rapidly fatal illness into a relapsing disease.
    explanation: >-
      Confirms rituximab as transformative therapy for HHV-8+ MCD.
  - reference: PMID:37288720
    reference_title: "Higher rate of progression in HIV- than in HIV+ patients after rituximab for HHV8+ multicentric Castleman disease."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Ninety-five patients (70 HIV+ and 25 HIV-) achieved complete remission
      (CR) after rituximab-based therapy.
    explanation: >-
      Demonstrates high complete remission rates with rituximab-based therapy
      across both HIV+ and HIV- HHV8+ MCD patients.
  treatment_term:
    preferred_term: rituximab therapy
    term:
      id: MAXO:0000058
      label: pharmacotherapy
- name: Combination Chemotherapy
  description: >-
    Adjuvant combination chemotherapy is recommended in the most severe iMCD
    cases, particularly when anti-IL-6 therapy alone is insufficient.
  evidence:
  - reference: PMID:30181172
    reference_title: "International, evidence-based consensus treatment guidelines for idiopathic multicentric Castleman disease."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      In the most severe cases, adjuvant combination chemotherapy is
      recommended.
    explanation: >-
      International consensus guidelines recommend chemotherapy for severe
      refractory iMCD.
  treatment_term:
    preferred_term: chemotherapy
    term:
      id: MAXO:0000647
      label: chemotherapy
