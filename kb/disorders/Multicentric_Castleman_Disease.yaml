name: Multicentric Castleman Disease
creation_date: "2026-03-06T00:00:00Z"
updated_date: "2026-05-10T13:07:07Z"
category: Complex
disease_term:
  preferred_term: multicentric Castleman disease
  term:
    id: MONDO:0019754
    label: multicentric Castleman disease
parents:
- Lymphoproliferative Disease
- Autoimmune Disease
description: >-
  A rare lymphoproliferative disorder characterized by systemic lymphadenopathy
  with characteristic histopathological features including angiofollicular
  lymph node hyperplasia. Multicentric Castleman disease (MCD) can be driven by
  human herpesvirus 8 (HHV-8) infection or occur as an idiopathic form (iMCD).
  The pathogenesis centers on dysregulated interleukin-6 (IL-6) signaling leading
  to systemic inflammation, constitutional symptoms, cytopenias, and multi-organ
  dysfunction. IL-6 targeting with siltuximab or tocilizumab has transformed
  treatment outcomes.
has_subtypes:
- name: HHV-8 Associated MCD
  description: >-
    Form driven by human herpesvirus 8 (HHV-8/KSHV) infection, which produces
    viral IL-6 (vIL-6) that activates the JAK-STAT signaling pathway. More
    common in immunocompromised individuals, particularly those with HIV.
  evidence:
  - reference: PMID:37288720
    reference_title: "Higher rate of progression in HIV- than in HIV+ patients after rituximab for HHV8+ multicentric Castleman disease."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Rituximab has revolutionized the treatment of Kaposi sarcoma-associated
      herpesvirus/human herpesvirus 8-associated multicentric Castleman disease
      (HHV8+ MCD), converting a rapidly fatal illness into a relapsing disease.
      HHV8+ MCD mainly affects patients with HIV infection but can also be
      observed in patients without HIV infection.
    explanation: >-
      Confirms HHV-8 associated MCD as a distinct subtype predominantly
      affecting HIV-positive patients.
- name: Idiopathic MCD (iMCD)
  description: >-
    Form without HHV-8 infection, driven by endogenous IL-6 overproduction
    from an unknown trigger. Further subdivided into iMCD-TAFRO
    (thrombocytopenia, anasarca, fever, reticulin fibrosis, organomegaly)
    and iMCD-NOS (not otherwise specified).
  evidence:
  - reference: PMID:24622327
    reference_title: "HHV-8-negative, idiopathic multicentric Castleman disease: novel insights into biology, pathogenesis, and therapy."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      There is also a group of HIV-negative and HHV-8-negative patients with
      unknown etiology and pathophysiology, which we propose referring to as
      idiopathic MCD (iMCD).
    explanation: >-
      Defines the concept of idiopathic MCD as distinct from HHV-8-driven MCD.
  - reference: PMID:29157612
    reference_title: "TAFRO Syndrome."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      TAFRO syndrome is a newly recognized variant of idiopathic multicentric
      Castleman disease (iMCD) that involves a constellation of syndromes:
      thrombocytopenia (T), anasarca (A), fever (F), reticulin fibrosis (R),
      and organomegaly (O).
    explanation: >-
      Defines iMCD-TAFRO as a recognized subvariant with characteristic
      clinical features.
pathophysiology:
- name: IL-6 Hypersecretion and Cytokine Storm
  description: >-
    Dysregulated overproduction of interleukin-6 drives the systemic
    inflammatory manifestations of MCD. In HHV-8-associated MCD, the virus
    produces viral IL-6 (vIL-6) that mimics human IL-6. In iMCD, the source
    of IL-6 overproduction remains unclear but may involve autoimmune mechanisms,
    paraneoplastic cytokine secretion, or non-HHV-8 viral triggers. IL-6
    activates JAK-STAT3 signaling, driving B-cell proliferation, plasmacytosis,
    acute phase protein production, and vascular endothelial growth factor
    (VEGF) release.
