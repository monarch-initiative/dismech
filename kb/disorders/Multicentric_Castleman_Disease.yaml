  evidence:
  - reference: PMID:25042199
    reference_title: "Siltuximab for multicentric Castleman's disease: a randomised, double-blind, placebo-controlled trial."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Multicentric Castleman's disease is a rare lymphoproliferative disorder
      driven by dysregulated production of interleukin 6.
    explanation: >-
      The pivotal siltuximab trial establishes IL-6 dysregulation as the
      central driver of MCD.
  - reference: PMID:24622327
    reference_title: "HHV-8-negative, idiopathic multicentric Castleman disease: novel insights into biology, pathogenesis, and therapy."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Multicentric Castleman's disease (MCD) describes a heterogeneous group
      of disorders involving proliferation of morphologically benign lymphocytes
      due to excessive proinflammatory hypercytokinemia, most notably of
      interleukin-6.
    explanation: >-
      Confirms IL-6 hypercytokinemia as the central pathogenic mechanism in MCD.
  - reference: PMID:24622327
    reference_title: "HHV-8-negative, idiopathic multicentric Castleman disease: novel insights into biology, pathogenesis, and therapy."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      We propose that 1 or more of the following 3 candidate processes may
      drive iMCD hypercytokinemia: systemic inflammatory disease mechanisms
      via autoantibodies or inflammatory gene mutations, paraneoplastic
      syndrome mechanisms via ectopic cytokine secretion, and/or a non-HHV-8
      virus.
    explanation: >-
      Proposes three candidate processes that may drive IL-6 hypersecretion
      in idiopathic MCD.
- name: Angiogenesis and Vascular Proliferation
  description: >-
    IL-6-driven VEGF overproduction causes exuberant angiogenesis in affected
    lymph nodes, producing the characteristic angiofollicular hyperplasia. This
    vascular proliferation contributes to organomegaly and fluid retention.
  biological_processes:
  - preferred_term: Angiogenesis
    term:
      id: GO:0001525
      label: angiogenesis
  evidence:
  - reference: PMID:24622327
    reference_title: "HHV-8-negative, idiopathic multicentric Castleman disease: novel insights into biology, pathogenesis, and therapy."
    supports: PARTIAL
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Patients demonstrate intense episodes of systemic inflammatory symptoms,
      polyclonal lymphocyte and plasma cell proliferation, autoimmune
      manifestations, and organ system impairment.
    explanation: >-
      Describes the systemic effects of hypercytokinemia including organ
      impairment, consistent with VEGF-driven vascular pathology.
