genetic:
- name: PDGFRB Gain-of-Function Mutations
  gene_term:
    preferred_term: PDGFRB
    term:
      id: hgnc:8804
      label: PDGFRB
  association: Causative
  features: >-
    The recurrent c.1994T>A p.Val665Ala variant in exon 14 of PDGFRB is the most
    common cause of Penttinen syndrome. This variant leads to constitutive activation
    of the receptor tyrosine kinase. The Val665Ala variant shows greater sensitivity
    to dasatinib than imatinib in molecular studies.
