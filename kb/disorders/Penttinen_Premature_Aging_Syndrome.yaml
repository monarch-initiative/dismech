disease_term:
  preferred_term: premature aging syndrome, Penttinen type
  term:
    id: MONDO:0011150
    label: acroosteolysis-keloid-like lesions-premature aging syndrome
description: >-
  Penttinen premature aging syndrome is an autosomal dominant disorder caused
  by heterozygous gain-of-function mutations in PDGFRB, most commonly the
  c.1994T>A p.Val665Ala variant. Affected individuals present shortly after
  birth with a prematurely aged appearance, distinctive facial features,
  cutaneous atrophy with hypertrophic scar-like or keloid-like lesions,
  lipodystrophy, brachydactyly with acro-osteolysis, and flexion contractures.
  Cognitive impairment is typically absent. The condition is part of a spectrum
  of PDGFRB gain-of-function disorders that includes infantile myofibromatosis
  and Kosaki overgrowth syndrome. Tyrosine kinase inhibitors including imatinib
  and dasatinib have shown clinical efficacy.
