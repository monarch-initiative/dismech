pathophysiology:
- name: Constitutive PDGFRB Activation
  description: >-
    The Val665Ala mutation in the kinase domain of PDGFRB leads to constitutive
    receptor activation, resulting in dysregulated signaling through downstream
    pathways including AKT and STAT. This causes premature aging of connective
    tissues, lipoatrophy, skin atrophy, and skeletal abnormalities. In mouse
    models, PDGFRB gain-of-function mutations cause osteopenia associated with
    intrinsic changes in skeletal stem cells, promoting chondrogenesis over
    osteogenesis.
  evidence:
  - reference: PMID:34894066
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: "in vitro molecular studies with imatinib and dasatinib showed that the Val665Ala variant had greater sensitivity to dasatinib than imatinib."
    explanation: Molecular studies confirm constitutive activation of the Val665Ala variant.
  - reference: PMID:34738614
    supports: SUPPORT
    evidence_source: MODEL_ORGANISM
    snippet: "Mice with PDGFRbetaD849V exhibit osteopenia."
    explanation: Mouse model demonstrates osteopenic skeletal phenotype from PDGFRB gain-of-function.
treatments:
- name: Imatinib
  description: >-
    First-line tyrosine kinase inhibitor used in Penttinen syndrome, targeting
    constitutively activated PDGFRB with partial clinical response.
  treatment_term:
    preferred_term: pharmacotherapy
    term:
      id: MAXO:0000058
      label: pharmacotherapy
  evidence:
  - reference: PMID:34894066
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Imatinib, a receptor tyrosine kinase (RTK) inhibitor, has been used in Penttinen syndrome (PS) patients with good results."
    explanation: Clinical evidence of imatinib efficacy.
- name: Dasatinib
  description: >-
    Second-generation tyrosine kinase inhibitor with greater potency against the
    Val665Ala variant than imatinib. Used when imatinib response is incomplete.
  treatment_term:
    preferred_term: pharmacotherapy
    term:
      id: MAXO:0000058
      label: pharmacotherapy
  evidence:
  - reference: PMID:34894066
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Improved clinical response was observed after treatment with dasatinib."
    explanation: Demonstrates clinical improvement with dasatinib after incomplete imatinib response.
