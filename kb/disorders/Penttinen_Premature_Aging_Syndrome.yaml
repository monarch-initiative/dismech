    snippet: "Penttinen type of premature aging syndrome is an autosomal-dominant disorder that can be caused by the c.1994T>A pVal665Ala pathogenic variant in platelet-derived growth factor receptor-B (PDGFRB)."
    explanation: Identifies the causative variant in PDGFRB.
  - reference: PMID:33449152
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "gain-of-function mutants are present in patients with fusiform aneurysms, Kosaki overgrowth syndrome or Penttinen premature aging syndrome."
    explanation: Review confirms PDGFRB gain-of-function mutations cause Penttinen syndrome.
