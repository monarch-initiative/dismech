name: Leiomyosarcoma
creation_date: '2026-04-12T05:10:52Z'
updated_date: '2026-05-16T00:00:00Z'
description: >-
  Leiomyosarcoma is an aggressive soft tissue sarcoma arising from smooth muscle
  cells or mesenchymal precursors with smooth-muscle differentiation. It most
  often occurs in the retroperitoneum, uterus, and extremities, and behaves as a
  genetically complex sarcoma defined by recurrent tumor-suppressor loss rather
  than a single pathognomonic driver alteration. Higher-grade tumors have a
  strong tendency toward distant metastasis, and advanced disease remains
  difficult to control despite surgery, cytotoxic chemotherapy, and radiation.
categories:
- Soft Tissue Sarcoma
- Sarcoma
- Mesenchymal Neoplasm
parents:
- soft tissue sarcoma
has_subtypes:
- name: Uterine Leiomyosarcoma
  description: >-
    Leiomyosarcoma arising from the myometrium. Uterine tumors represent a major
    anatomic subset and often present with distinct gynecologic imaging and
    operative considerations.
  evidence:
  - reference: PMID:31869131
    reference_title: Leiomyosarcoma.
    supports: SUPPORT
    evidence_source: OTHER
    snippet: "leiomyosarcoma primarily occurs in the retroperitoneum, uterus, and extremities, in descending order of frequency."
    explanation: This identifies the uterus as one of the principal anatomic sites of leiomyosarcoma, supporting uterine leiomyosarcoma as a major anatomic subtype.
- name: Retroperitoneal Leiomyosarcoma
  description: >-
    Deep abdominopelvic tumors arising in the retroperitoneum or pelvis. These
    lesions are often large at diagnosis and have a high risk of metastatic
    progression.
  evidence:
  - reference: PMID:35715148
    reference_title: "Leiomyosarcoma: Current Clinical Management and Future Horizons."
    supports: SUPPORT
    evidence_source: OTHER
    snippet: "Leiomyosarcomas are soft tissue tumors that are derived from smooth muscle mainly in the pelvis and retroperitoneum."
    explanation: This supports the pelvis and retroperitoneum as the predominant sites of leiomyosarcoma, anchoring retroperitoneal leiomyosarcoma as a major anatomic subtype.
- name: Extremity or Truncal Leiomyosarcoma
  description: >-
    Extrauterine soft tissue tumors arising in the extremities or trunk wall.
    These tumors share the genetically complex biology of leiomyosarcoma while
    differing in surgical approach and local recurrence patterns.
  evidence:
  - reference: PMID:31869131
    reference_title: Leiomyosarcoma.
    supports: SUPPORT
    evidence_source: OTHER
    snippet: "leiomyosarcoma primarily occurs in the retroperitoneum, uterus, and extremities, in descending order of frequency."
    explanation: This identifies the extremities as a principal anatomic site of leiomyosarcoma, supporting extremity or truncal leiomyosarcoma as a recognized anatomic subtype.
pathophysiology:
- name: Smooth Muscle Lineage Malignant Transformation
  description: >-
    Leiomyosarcoma develops from smooth muscle cells or mesenchymal precursors
    committed to smooth-muscle differentiation. The disease most commonly arises
    in the retroperitoneum, uterus, and extremities.
  cell_types:
  - preferred_term: smooth muscle cell
    term:
      id: CL:0000192
      label: smooth muscle cell
  downstream:
  - target: Tumor Suppressor Loss and Genomic Complexity
    description: Malignant transformation is accompanied by complex chromosomal and tumor suppressor alterations
  evidence:
  - reference: PMID:31869131
    reference_title: Leiomyosarcoma.
    supports: SUPPORT
    evidence_source: OTHER
    snippet: "Originating from either smooth muscle cells or their mesenchymal cell precursors, leiomyosarcoma primarily occurs in the retroperitoneum, uterus, and extremities, in descending order of frequency."
    explanation: This supports the smooth-muscle lineage origin and the major anatomic sites of leiomyosarcoma.
- name: Tumor Suppressor Loss and Genomic Complexity
  description: >-
    Leiomyosarcoma is a genetically complex sarcoma with recurrent loss of major
    tumor suppressor pathways rather than a single recurrent oncogenic fusion.
    Frequent alterations involve TP53, RB1, PTEN, and ATRX, with additional copy
    number gains such as MYOCD amplification in a subset of tumors.
  biological_processes:
  - preferred_term: cell cycle checkpoint signaling
    modifier: ABNORMAL
    term:
      id: GO:0000075
      label: cell cycle checkpoint signaling
  - preferred_term: DNA repair
    modifier: ABNORMAL
    term:
      id: GO:0006281
      label: DNA repair
  downstream:
  - target: Uncontrolled Proliferation
    description: Checkpoint failure and genomic instability support persistent tumor cell growth
  - target: Loss of Myogenic Differentiation
    description: Progressive genomic derangement is associated with less differentiated tumor states
  - target: Alternative Lengthening of Telomeres
    description: ATRX loss enables telomerase-independent telomere maintenance via recombination
  evidence:
  - reference: PMID:26541895
    reference_title: Targeted exome sequencing profiles genetic alterations in leiomyosarcoma.
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Losses of chromosomal regions involving key tumor suppressor genes PTEN (10q), RB1 (13q), CDH1 (16q), and TP53 (17p) were the most frequent genetic events."
    explanation: This supports recurrent tumor suppressor loss as a core genomic feature of leiomyosarcoma.
  - reference: PMID:26692951
    reference_title: Targeted next-generation sequencing of cancer genes identified frequent TP53 and ATRX mutations in leiomyosarcoma.
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "In conclusion, we identified loss of function of the p53 and ATRX pathways being the main mechanisms for leiomyosarcomas."
    explanation: This directly supports disruption of TP53 and ATRX pathways as central leiomyosarcoma mechanisms.
- name: Alternative Lengthening of Telomeres
  description: >-
    Loss-of-function ATRX alterations drive a recombination-based, telomerase-independent
    telomere maintenance mechanism (ALT) in a subset of leiomyosarcomas. The ALT phenotype
    is enriched in ATRX-mutated tumors and associates with poorly differentiated morphology,
    tumor necrosis, and worse overall survival.
  biological_processes:
  - preferred_term: telomere maintenance via recombination
    modifier: INCREASED
    term:
      id: GO:0000722
      label: telomere maintenance via recombination
  downstream:
  - target: Uncontrolled Proliferation
    description: ALT sustains replicative immortality and supports continued tumor cell division
  evidence:
  - reference: PMID:26692951
    reference_title: Targeted next-generation sequencing of cancer genes identified frequent TP53 and ATRX mutations in leiomyosarcoma.
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "All of the ATRX-mutated leiomyosarcomas showed the alternative lengthening of telomere phenotype."
    explanation: This directly demonstrates the ALT phenotype in ATRX-mutated leiomyosarcoma, anchoring ALT as a recurrent telomere-maintenance mechanism in this disease.
- name: Uncontrolled Proliferation
  description: >-
    Cell-cycle dysregulation drives persistent leiomyosarcoma growth. Recent data
    support an ESPL1-E2F1 proliferative axis that promotes tumor cell viability,
    genomic integrity under stress, and progression through G2/M.
  biological_processes:
  - preferred_term: cell population proliferation
    modifier: INCREASED
    term:
      id: GO:0008283
      label: cell population proliferation
  evidence:
  - reference: PMID:39958881
    reference_title: E2F1-mediated ESPL1 transcriptional activation predicts poor prognosis and promotes the proliferation of leiomyosarcoma.
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: "Functional studies in the LMS cell line SK-LMS-1 demonstrated that ESPL1 knockdown slowed cell proliferation and increased G2/M cell cycle arrest, suggesting its crucial role in maintaining LMS cell viability and genomic integrity."
    explanation: This supports a direct role for cell-cycle regulators in sustaining leiomyosarcoma proliferation.
- name: Loss of Myogenic Differentiation
  description: >-
    Poorly differentiated leiomyosarcoma can progressively lose classic smooth
    muscle features and overlap morphologically with undifferentiated pleomorphic
    sarcoma. This phenotypic drift is accompanied by loss of conventional muscle
    markers.
  biological_processes:
  - preferred_term: cell differentiation
    modifier: DECREASED
    term:
      id: GO:0030154
      label: cell differentiation
  evidence:
  - reference: PMID:24889065
    reference_title: Progressive loss of myogenic differentiation in leiomyosarcoma has prognostic value.
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Well-differentiated leiomyosarcomas show morphologically recognizable smooth muscle differentiation, whereas poorly differentiated tumours may form a spectrum with a subset of undifferentiated pleomorphic sarcomas."
    explanation: This supports progressive loss of smooth-muscle differentiation in higher-grade leiomyosarcoma.
