  name: Soft Tissue Neoplasm
  diagnostic: true
  description: >-
    Leiomyosarcoma presents as an aggressive soft tissue tumor arising from
    smooth muscle-bearing or smooth-muscle-like anatomic sites, especially the
    pelvis, retroperitoneum, uterus, and extremities.
  phenotype_term:
    preferred_term: Soft tissue neoplasm
    term:
      id: HP:0031459
      label: Soft tissue neoplasm
  evidence:
  - reference: PMID:35715148
    reference_title: "Leiomyosarcoma: Current Clinical Management and Future Horizons."
    supports: SUPPORT
    evidence_source: OTHER
    snippet: "Leiomyosarcomas are soft tissue tumors that are derived from smooth muscle mainly in the pelvis and retroperitoneum."
    explanation: This supports the core clinical identity of leiomyosarcoma as a soft tissue tumor derived from smooth muscle.
- category: Systemic
  name: Metastatic Disease
  description: >-
    Leiomyosarcoma has a strong propensity for distant spread, especially in
    higher-grade tumors and advanced disease.
  phenotype_term:
