    snippet: "With higher-grade lesions, the rate of distant metastasis increases."
    explanation: This supports metastatic dissemination as a key adverse clinical feature of higher-grade leiomyosarcoma.
biochemical:
- name: Smooth Muscle Marker Immunohistochemistry
  notes: >-
    Immunohistochemistry commonly uses smooth muscle actin, desmin,
    h-caldesmon, and smooth muscle myosin to support the diagnosis, although
    poorly differentiated tumors may lose one or more of these markers.
  evidence:
  - reference: PMID:24889065
    reference_title: Progressive loss of myogenic differentiation in leiomyosarcoma has prognostic value.
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Poorly differentiated tumours frequently lost one or more conventional smooth muscle markers [smooth muscle actin, desmin, h-caldesmon, and smooth muscle myosin (P < 0.0001)]"
    explanation: This supports the diagnostic use of smooth muscle markers and their loss in poorly differentiated tumors.
genetic:
- name: TP53
  association: Somatic mutation or deletion
  notes: >-
    TP53 is among the most frequently altered genes in leiomyosarcoma and
    contributes to loss of cell-cycle control.
  evidence:
  - reference: PMID:26692951
    reference_title: Targeted next-generation sequencing of cancer genes identified frequent TP53 and ATRX mutations in leiomyosarcoma.
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "We identified TP53 mutations in 19 of the 54 tumors (35%) and ATRX mutations in 9 of the 54 tumors (17%)."
    explanation: This provides direct evidence that TP53 mutation is a recurrent genetic event in leiomyosarcoma.
- name: ATRX
  association: Somatic mutation
  notes: >-
    ATRX alteration is associated with poorly differentiated morphology, tumor
    necrosis, and alternative lengthening of telomeres in a subset of tumors.
  evidence:
  - reference: PMID:26692951
    reference_title: Targeted next-generation sequencing of cancer genes identified frequent TP53 and ATRX mutations in leiomyosarcoma.
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "We identified TP53 mutations in 19 of the 54 tumors (35%) and ATRX mutations in 9 of the 54 tumors (17%)."
    explanation: This provides direct evidence that ATRX mutation recurs in leiomyosarcoma.
- name: PTEN and RB1
  association: Somatic copy-number loss
  notes: >-
    Copy-number loss affecting PTEN and RB1 is a recurrent feature of
    leiomyosarcoma and reinforces the disease's tumor-suppressor-driven biology.
  evidence:
  - reference: PMID:26541895
    reference_title: Targeted exome sequencing profiles genetic alterations in leiomyosarcoma.
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Losses of chromosomal regions involving key tumor suppressor genes PTEN (10q), RB1 (13q), CDH1 (16q), and TP53 (17p) were the most frequent genetic events."
    explanation: This supports recurrent PTEN and RB1 loss in leiomyosarcoma.
- name: MYOCD
  association: Focal amplification
  notes: >-
    MYOCD amplification occurs in a subset of leiomyosarcomas and may reinforce
    smooth-muscle lineage programs.
  evidence:
  - reference: PMID:26541895
    reference_title: Targeted exome sequencing profiles genetic alterations in leiomyosarcoma.
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "FISH analysis showed amplification of the myocardin (MYOCD) gene in 5 of 25 (20%) cases analyzed."
    explanation: This supports recurrent MYOCD amplification in a subset of leiomyosarcomas.
treatments:
- name: Surgical Resection
  description: >-
    Complete surgical resection is the main curative-intent treatment for
    localized leiomyosarcoma and should be planned in experienced sarcoma
    centers.
  treatment_term:
    preferred_term: surgical procedure
    term:
      id: MAXO:0000004
      label: surgical procedure
  evidence:
  - reference: PMID:23635801
    reference_title: "Diagnosis, prognosis, and management of leiomyosarcoma: recognition of anatomic variants."
    supports: SUPPORT
    evidence_source: OTHER
    snippet: "Currently, the only curative option in LMS is surgery and despite progress in systemic therapy the outcome of patients with advanced/metastatic disease remains poor."
    explanation: This directly supports surgery as the only established curative treatment modality.
- name: Radiation Therapy
  description: >-
    Radiation is commonly used as an adjunct to surgery for local control,
    particularly when achieving adequate margins is difficult.
  treatment_term:
    preferred_term: radiation therapy
    term:
      id: MAXO:0000014
      label: radiation therapy
  evidence:
  - reference: PMID:31869131
    reference_title: Leiomyosarcoma.
    supports: SUPPORT
    evidence_source: OTHER
    snippet: "The current standard of care involves upfront surgery for resectable tumors, with chemotherapy and radiation typically serving as adjuncts."
    explanation: This supports radiation as an adjunctive modality in multidisciplinary management.
- name: Anthracycline-Based Chemotherapy
  description: >-
    Doxorubicin-based chemotherapy remains a standard first-line systemic option
    for metastatic or unresectable leiomyosarcoma.
  treatment_term:
    preferred_term: chemotherapy
    term:
      id: MAXO:0000647
      label: chemotherapy
    therapeutic_agent:
    - preferred_term: doxorubicin
      term:
        id: CHEBI:28748
        label: doxorubicin
  evidence:
  - reference: PMID:36969049
    reference_title: Therapeutic advances in leiomyosarcoma.
    supports: SUPPORT
    evidence_source: OTHER
    snippet: "First-line therapy for metastatic and/or unresectable leiomyosarcoma includes anthracycline or gemcitabine based regimens, which provide a median progression-free survival time of about 5 months and overall survival time between 14-16 months."
    explanation: This supports anthracycline-based chemotherapy as a standard first-line systemic treatment.
- name: Gemcitabine-Based Chemotherapy
  description: >-
    Gemcitabine-based regimens are also used in metastatic or unresectable
    leiomyosarcoma, particularly when anthracycline therapy is unsuitable or
    after prior treatment exposure.
  treatment_term:
    preferred_term: chemotherapy
    term:
      id: MAXO:0000647
      label: chemotherapy
    therapeutic_agent:
    - preferred_term: gemcitabine
      term:
        id: CHEBI:175901
        label: gemcitabine
  evidence:
  - reference: PMID:36969049
    reference_title: Therapeutic advances in leiomyosarcoma.
    supports: SUPPORT
    evidence_source: OTHER
    snippet: "First-line therapy for metastatic and/or unresectable leiomyosarcoma includes anthracycline or gemcitabine based regimens, which provide a median progression-free survival time of about 5 months and overall survival time between 14-16 months."
    explanation: This supports gemcitabine-based chemotherapy as another first-line systemic option.
