pathophysiology:
- name: Repeat Expansion and Polyglutamine Toxic Gain-of-Function
  description: >-
    The unifying molecular lesion across ADCA-I subtypes is an unstable
    expanded repeat that confers a toxic gain-of-function. In the
    polyglutamine subtypes (SCA1/ATXN1, SCA2/ATXN2, SCA17/TBP) a CAG
    expansion encodes an elongated polyglutamine tract; in SCA8 a
    bidirectionally transcribed CTG/CAG expansion combines RNA toxicity with
    a polyglutamine product; and in SCA36 a non-coding GGCCTG hexanucleotide
    expansion drives RNA-mediated toxicity. Repeat instability during meiosis
    underlies anticipation and the inverse correlation between repeat length
    and age at onset.
