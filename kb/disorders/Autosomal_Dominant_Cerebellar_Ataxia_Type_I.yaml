- name: Extracerebellar Neurodegeneration
  description: >-
    The defining distinction of ADCA-I from the pure-cerebellar ADCA-III
    class is involvement of extracerebellar systems: brainstem and pontine
    nuclei, the pyramidal tracts, basal ganglia (extrapyramidal signs),
    peripheral sensory and motor nerves, and — in some subtypes — cognitive
    networks. The specific extracerebellar burden varies by subtype (e.g.,
    motor-neuron involvement in SCA36; cognitive/psychiatric and
    extrapyramidal features in SCA17; peripheral neuropathy in SCA2/SCA4).
