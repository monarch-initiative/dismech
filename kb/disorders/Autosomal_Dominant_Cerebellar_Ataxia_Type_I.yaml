  evidence:
  - reference: PMID:29427103
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      SCA2 is characterized by progressive ataxia, and slow saccades.
    explanation: Directly identifies slow saccades as a diagnostic hallmark of SCA2.
- category: Neurologic
  name: Peripheral neuropathy
  subtype: SCA4
