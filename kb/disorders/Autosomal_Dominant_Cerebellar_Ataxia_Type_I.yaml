name: Autosomal Dominant Cerebellar Ataxia Type I
creation_date: "2026-05-16T00:00:00Z"
updated_date: "2026-05-16T00:00:00Z"
category: Mendelian
description: >-
  Autosomal dominant cerebellar ataxia type I (ADCA-I) is Harding's clinical
  classification for hereditary ataxias in which a progressive cerebellar
  syndrome is accompanied by prominent extracerebellar features — pyramidal
  and extrapyramidal signs, ophthalmoplegia, peripheral neuropathy, cognitive
  decline, and brainstem involvement — distinguishing it from the
  pure-cerebellar ADCA-III pattern. ADCA-I is a genetically heterogeneous
  group whose most representative molecular subtypes are repeat-expansion
  spinocerebellar ataxias, including the polyglutamine disorders SCA1
  (ATXN1), SCA2 (ATXN2), and SCA17 (TBP), the non-coding/repeat disorders
  SCA8 and SCA36, and SCA4. The shared pathological theme is a toxic
  gain-of-function from an expanded repeat tract (most often CAG-encoded
  polyglutamine) that drives misfolded-protein aggregation, transcriptional
  and proteostatic dysregulation, and progressive degeneration of cerebellar
  Purkinje cells together with brainstem, pyramidal-tract, and other
  extracerebellar systems. Onset is typically in adulthood with autosomal
  dominant transmission, frequent anticipation, and an inverse correlation
  between expanded-repeat length and age at onset. No disease-modifying
  therapy is established; management is symptomatic and supportive.
