genetic:
- name: ATXN1
  subtype: SCA1
  gene_term:
    preferred_term: ATXN1
    term:
      id: hgnc:10548
      label: ATXN1
  association: CAG polyglutamine repeat expansion
  presence: Positive
  notes: >-
    SCA1 is caused by an expansion of the CAG trinucleotide repeat in ATXN1
