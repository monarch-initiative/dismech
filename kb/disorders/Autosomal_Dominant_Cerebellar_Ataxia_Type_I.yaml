    correlate with earlier onset.
  evidence:
  - reference: PMID:35802260
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      SCA1 is caused by an increase in the number of CAG repeats in the
      ATXN1 gene leading to an expanded polyQ tract in the ATAXIN-1
      protein.
    explanation: Defines the SCA1 molecular lesion.
