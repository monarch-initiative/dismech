    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      SCA17 is characterized by ataxia, pyramidal and extrapyramidal signs,
      cognitive impairments, psychosis, and seizures as well as involuntary
      movements including chorea and dystonia
    explanation: >-
      Documents the extracerebellar burden — pyramidal and extrapyramidal
      signs, cognitive impairment, and psychiatric features — in the
      representative ADCA-I subtype SCA17. This combination of cerebellar
      plus extracerebellar involvement is exactly the feature that
      distinguishes the ADCA-I class from pure-cerebellar ADCA-III.
