- category: Neurologic
  name: Progressive Cerebellar Ataxia
  diagnostic: true
  description: >-
    Progressive gait and limb ataxia from cerebellar Purkinje-cell
    degeneration is the core, defining clinical feature shared by all
    ADCA-I subtypes. Subtype-level frequency and severity detail is
    deferred to the individual subtype entries (scaffold stage).
  phenotype_term:
