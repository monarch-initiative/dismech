inheritance:
- name: Autosomal dominant
  inheritance_term:
    preferred_term: autosomal dominant inheritance
    term:
      id: HP:0000006
      label: Autosomal dominant inheritance
  description: >-
    All ADCA-I subtypes follow autosomal dominant inheritance and are caused
    by unstable repeat expansions. Penetrance is generally high for fully
    expanded alleles but is reduced near the lower pathogenic threshold for
    several subtypes, and anticipation is common because the repeat tract is
    meiotically unstable.
  evidence:
  - reference: PMID:30532692
    reference_title: "Complexity of the Genetics and Clinical Presentation of Spinocerebellar Ataxia 17."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Spinocerebellar ataxia type 17 (SCA17) is a rare autosomal dominant
      neurodegenerative disease caused by a CAG repeat expansion in the
      TATA-box binding protein gene (TBP).
    explanation: >-
      Establishes SCA17, a representative ADCA-I subtype, as an autosomal
      dominant repeat-expansion disorder.
  - reference: PMID:15989694
    reference_title: "Spinocerebellar ataxia type 17: report of a family with reduced penetrance of an unstable Gln49 TBP allele, haplotype analysis supporting a founder effect for unstable alleles and comparative analysis of SCA17 genotypes."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Observed pathogenic expansions ranged from 43-63 glutamine (Gln)
      codons (Gln43-63). Reduced penetrance is known for Gln43-48 alleles.
    explanation: >-
      Supports reduced penetrance near the lower pathogenic repeat-length
      threshold within an autosomal dominant ADCA-I subtype (SCA17).
has_subtypes:
- name: SCA1
  display_name: Spinocerebellar ataxia type 1 (ATXN1)
  subtype_term:
    preferred_term: spinocerebellar ataxia type 1
    term:
      id: MONDO:0008119
      label: spinocerebellar ataxia type 1
  description: >-
    Polyglutamine cerebellar ataxia caused by a CAG repeat expansion in ATXN1
    encoding ataxin-1. The phenotype combines progressive cerebellar ataxia
    with prominent extracerebellar features — pyramidal signs, peripheral
    neuropathy, and brainstem involvement — that are characteristic of the
    ADCA-I class. Anticipation is pronounced, especially with paternal
    transmission.
- name: SCA2
  display_name: Spinocerebellar ataxia type 2 (ATXN2)
  subtype_term:
    preferred_term: spinocerebellar ataxia type 2
    term:
      id: MONDO:0008458
      label: spinocerebellar ataxia type 2
  description: >-
    Polyglutamine cerebellar ataxia caused by a CAG repeat expansion in ATXN2
    encoding ataxin-2. Slow saccades, peripheral neuropathy, and sometimes
    parkinsonism accompany the cerebellar syndrome. Intermediate-length ATXN2
    expansions are also a recognized risk factor for amyotrophic lateral
    sclerosis.
- name: SCA4
  display_name: Spinocerebellar ataxia type 4 (ZFHX3)
  subtype_term:
    preferred_term: spinocerebellar ataxia type 4
    term:
      id: MONDO:0010847
      label: spinocerebellar ataxia type 4
  description: >-
    Adult-onset cerebellar ataxia with prominent sensory axonal neuropathy and
    pyramidal signs, mapped to a GGC repeat expansion in ZFHX3. The combination
    of cerebellar and prominent extracerebellar (sensory neuropathy, pyramidal)
    involvement places SCA4 within the ADCA-I class.
- name: SCA8
  display_name: Spinocerebellar ataxia type 8 (ATXN8/ATXN8OS)
  subtype_term:
    preferred_term: spinocerebellar ataxia type 8
    term:
      id: MONDO:0012116
      label: spinocerebellar ataxia type 8
  description: >-
    Slowly progressive cerebellar ataxia caused by a bidirectionally
    transcribed CTG/CAG repeat expansion at the ATXN8OS/ATXN8 locus,
    combining RNA gain-of-function toxicity with production of a
    polyglutamine ATXN8 product. Reduced penetrance and a wide normal/
    pathogenic overlap make genotype interpretation complex.
- name: SCA17
  display_name: Spinocerebellar ataxia type 17 (TBP)
  subtype_term:
    preferred_term: spinocerebellar ataxia type 17
    term:
      id: MONDO:0011781
      label: spinocerebellar ataxia type 17
  description: >-
    Polyglutamine disorder caused by a CAG/CAA repeat expansion in TBP
    (TATA-box binding protein). The syndrome combines cerebellar ataxia with
    cognitive decline, psychiatric symptoms, and extrapyramidal movement
    disorders (chorea, dystonia, parkinsonism), and is also termed
    Huntington disease-like 4. A fully curated standalone entry exists at
    kb/disorders/Spinocerebellar_Ataxia_Type_17.yaml; consolidation of that
    content under this parent is flagged for human review (see issue 1675).
- name: SCA36
  display_name: Spinocerebellar ataxia type 36 (NOP56)
  subtype_term:
    preferred_term: spinocerebellar ataxia type 36
    term:
      id: MONDO:0013594
      label: spinocerebellar ataxia type 36
  description: >-
    Late-onset cerebellar ataxia caused by an intronic GGCCTG hexanucleotide
    repeat expansion in NOP56, characteristically combining cerebellar
    degeneration with motor neuron involvement (tongue and skeletal-muscle
    fasciculations, amyotrophy) — an extracerebellar feature consistent with
    the ADCA-I class. Also known as Asidan.
