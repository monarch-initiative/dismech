name: Autosomal dominant cerebellar ataxia type I
creation_date: "2026-04-24T00:00:00Z"
updated_date: "2026-04-24T00:00:00Z"
category: Mendelian
synonyms:
- ADCA type I
- ADCA-I
- Harding ADCA type I
description: >-
  Autosomal dominant cerebellar ataxia type I (ADCA-I) is Harding's clinical
  classification for autosomal dominant spinocerebellar ataxias that combine
  progressive cerebellar ataxia with extracerebellar features such as
  pyramidal signs, brainstem/bulbar involvement, ophthalmoplegia,
  peripheral neuropathy, extrapyramidal features (chorea, dystonia,
  parkinsonism), and cognitive or psychiatric manifestations. The class is
  genetically heterogeneous and groups together repeat-expansion
  spinocerebellar ataxias — the polyglutamine SCAs SCA1 (ATXN1), SCA2 (ATXN2)
  and SCA17 (TBP), the polyglycine disease SCA4 (ZFHX3), and the non-coding
  repeat SCAs SCA8 (ATXN8OS/ATXN8) and SCA36 (NOP56). Shared mechanisms
  include toxic protein aggregation or RNA gain of function,
  transcriptional dysregulation, impaired autophagy/proteostasis, and
  selective Purkinje and brainstem neuronal vulnerability. No
  disease-modifying therapies are established; management is symptomatic.
