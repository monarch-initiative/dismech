    causal_link_type: DIRECT
    description: >-
      Expanded polyglutamine proteins misfold and aggregate, overwhelming
      neuronal protein-quality-control systems.
  - target: Transcriptional Dysregulation
    causal_link_type: DIRECT
    description: >-
      Expanded ATXN1 and TBP perturb transcriptional regulatory complexes in
      vulnerable neurons.
  evidence:
  - reference: PMID:17417937
    reference_title: "Trinucleotide repeat disorders."
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      The discovery that expansion of unstable repeats can cause a variety of
      neurological disorders has changed the landscape of disease-oriented
      research for several forms of mental retardation, Huntington disease,
      inherited ataxias, and muscular dystrophy.
    explanation: >-
      Establishes unstable repeat expansion as the shared causal mechanism
      across the inherited ataxias that make up the ADCA-I class.
