    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Spinocerebellar ataxia type 17 (SCA17) is a rare autosomal dominant
      neurodegenerative disease caused by a CAG repeat expansion in the
      TATA-box binding protein gene (TBP).
    explanation: >-
      Documents the CAG repeat-expansion gain-of-function lesion in the
      representative ADCA-I subtype SCA17.
- name: Misfolded Protein Aggregation and Proteostatic Stress
  description: >-
    Expanded polyglutamine ataxin-1, ataxin-2, and TBP adopt aberrant
    conformations and form nuclear and cytoplasmic inclusions. Sequestration
    of chaperones, ubiquitin-proteasome and autophagy components, and
    interacting partners progressively impairs neuronal proteostasis,
    contributing to Purkinje-cell and brainstem-neuron dysfunction. This
    proteostatic stress is a convergent downstream consequence of the
    polyglutamine subtypes and is described mechanistically here without an
    independent ADCA-I-specific quantitative claim.
  cell_types:
  - preferred_term: cerebellar Purkinje cell
    term:
      id: CL:0000121
      label: Purkinje cell
  biological_processes:
  - preferred_term: inclusion body assembly
    term:
      id: GO:0070841
      label: inclusion body assembly
    modifier: INCREASED
  - preferred_term: protein folding
    term:
      id: GO:0006457
      label: protein folding
    modifier: DECREASED
  locations:
  - preferred_term: cerebellar cortex
    term:
      id: UBERON:0002129
      label: cerebellar cortex
  downstream:
  - target: Purkinje Cell Degeneration and Cerebellar Cortical Atrophy
    causal_link_type: DIRECT
    description: >-
      Chronic proteostatic stress and aggregate burden drive progressive
      Purkinje cell dysfunction and loss.
  - target: Extracerebellar Neurodegeneration
    causal_link_type: DIRECT
    description: >-
      The same misfolded-protein toxicity acts in parallel on brainstem,
      pyramidal-tract, and peripheral neuron populations, producing
      extracerebellar degeneration independently of (rather than secondary
      to) Purkinje-cell loss.
  evidence:
  - reference: PMID:17417937
    reference_title: "Trinucleotide repeat disorders."
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      the dramatic effects of altering protein conformations on neuronal
      function and survival
    explanation: >-
      This review of trinucleotide-repeat disorders identifies altered
      protein conformation as a key driver of impaired neuronal function
      and survival, supporting misfolded-protein aggregation and
      proteostatic stress as a core ADCA-I disease mechanism.
- name: Transcriptional Dysregulation
  description: >-
    Several ADCA-I proteins act in the nucleus: TBP is a core general
    transcription factor and expanded ataxin-1 reorganizes native
    transcriptional regulator complexes (e.g., with CIC and RBM17),
    skewing gene-expression programs required for Purkinje-cell homeostasis.
    Transcriptional dysregulation is a shared nuclear mechanism among the
    polyglutamine ADCA-I subtypes; subtype-specific molecular detail is left
    for follow-up curation of the individual subtype entries.
  cell_types:
