- name: TBP
  subtype: SCA17
  gene_term:
    preferred_term: TBP
    term:
      id: hgnc:11588
      label: TBP
  association: CAG/CAA polyglutamine repeat expansion
  presence: Positive
  notes: >-
    Pathogenic variant is an expanded glutamine-encoding repeat in exon 3
    of TBP. Normal alleles are typically mid-20s to ~40 repeats. Reduced
    penetrance is established for many 43-48-repeat alleles, and some
    49-51-repeat alleles can remain nonpenetrant or have very late onset.
    CAA interruptions generally stabilize transmission, so anticipation is
    less frequent than in many other polyglutamine SCAs.
  evidence:
  - reference: PMID:30532692
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      We found a negative linear correlation between total CAG repeat length
      and age at disease onset and, unlike SCA1, there was no correlation
      between the longest contiguous CAG tract and age at disease onset.
    explanation: Supports genotype-phenotype correlation between total repeat length and age at onset in SCA17.
  - reference: PMID:15989694
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Observed pathogenic expansions ranged from 43-63 glutamine (Gln)
      codons (Gln43-63). Reduced penetrance is known for Gln43-48 alleles.
    explanation: Defines the lower pathogenic range and reduced penetrance interval for SCA17.
  - reference: PMID:29427105
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Second, compared to the other SCA subtypes caused by expanded
      trinucleotide repeats, anticipation in SCA17 kindreds is rare because
      of the characteristic structure of the TBP gene.
    explanation: Supports the relative rarity of anticipation due to repeat-tract structure in SCA17.
