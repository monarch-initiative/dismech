      label: Progressive cerebellar ataxia
- category: Neurologic
  name: Dysarthria
  description: >-
    Scanning/cerebellar dysarthria accompanies the ataxic syndrome across
    ADCA-I subtypes as part of the progressive cerebellar degeneration.
  phenotype_term:
