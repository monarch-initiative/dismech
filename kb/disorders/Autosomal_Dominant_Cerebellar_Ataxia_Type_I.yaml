diagnosis:
- name: Targeted repeat-expansion testing across ADCA-I loci
  presence: Positive
  description: >-
    Genetic testing sizes or sequences pathogenic repeat expansions in
    ATXN1, ATXN2, ZFHX3, ATXN8OS/ATXN8, TBP, and NOP56. Short-read
    whole-exome sequencing can miss GC-rich expansions (e.g. ZFHX3), so
    long-read sequencing is increasingly used when targeted panels are
    negative.
  evidence:
  - reference: PMID:38684900
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      The coding GGC-repeat expansion in an extremely G+C-rich region was
      not detectable by short-read whole-exome sequencing, which
      demonstrates the power of LR-GS for variant discovery.
    explanation: Supports long-read sequencing as a diagnostic tool for ADCA-I repeat expansions missed by short-read methods.
- name: Brain MRI and PET markers of early neurodegeneration (SCA17)
  presence: Positive in manifest and presymptomatic mutation carriers
  description: >-
    Structural MRI and functional PET can show cerebellar and caudate
    atrophy together with striatal metabolic or dopaminergic abnormalities
    even before overt symptoms in SCA17 mutation carriers.
  evidence:
  - reference: PMID:22653791
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      CONCLUSION: MRI volumetry, as well as (11)C-raclopride and (18)F-FDG
      PET, reveal neuronal dysfunction and neurodegeneration even in the
      presymptomatic stage and may serve as markers for disease activity in
      upcoming interventional trials on SCA17.
    explanation: Supports imaging biomarkers for early detection and disease monitoring in SCA17.
