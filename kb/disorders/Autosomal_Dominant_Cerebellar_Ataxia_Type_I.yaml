pathophysiology:
- name: Polyglutamine expansion toxicity
  description: >-
    SCA1, SCA2, and SCA17 are caused by CAG/CAA trinucleotide repeat
    expansions that lengthen a polyglutamine (polyQ) tract in the respective
    disease proteins (ATXN1, ATXN2, TBP). The expanded polyQ proteins
    misfold, form nuclear/cytoplasmic aggregates, and acquire toxic gain of
    function that perturbs transcription, RNA metabolism, calcium signaling
    and proteostasis, ultimately causing selective Purkinje neuron and
    brainstem degeneration.
  biological_processes:
  - preferred_term: inclusion body assembly
    term:
      id: GO:0070841
      label: inclusion body assembly
  - preferred_term: regulation of transcription by RNA polymerase II
    term:
      id: GO:0006357
      label: regulation of transcription by RNA polymerase II
  cell_types:
  - preferred_term: Purkinje cell
    term:
      id: CL:0000121
      label: Purkinje cell
  locations:
  - preferred_term: cerebellum
    term:
      id: UBERON:0002037
      label: cerebellum
  evidence:
  - reference: PMID:29427103
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      ATXN2 mutation causes gains of new or toxic functions for the ATXN2
      protein, resulting in abnormally slow Purkinje cell (PC) firing
      frequency and ultimately PC loss.
    explanation: Supports toxic gain-of-function polyQ mechanism targeting Purkinje cells in SCA2.
  - reference: PMID:32306062
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      convergence onto a few key cellular changes, namely ion channel
      dysfunction and transcriptional dysregulation, has become apparent
      and may represent central mechanisms of cerebellar disease
      pathogenesis.
    explanation: Supports transcriptional dysregulation and ion channel dysfunction as convergent SCA mechanisms.
- name: Non-coding repeat RNA gain of function
  description: >-
    SCA8 and SCA36 are caused by non-coding repeat expansions that generate
    toxic RNA species. The GGCCTG hexanucleotide expansion in NOP56 intron 1
    (SCA36) produces RNA foci that sequester splicing factors such as
    SRSF2. The bidirectional CTG/CAG expansion at the ATXN8OS/ATXN8 locus
    (SCA8) produces both a CUG antisense transcript and a polyglutamine
    sense transcript, with repeat-associated non-ATG (RAN) translation
    adding to toxicity.
  biological_processes:
  - preferred_term: RNA splicing
    term:
      id: GO:0008380
      label: RNA splicing
  evidence:
  - reference: PMID:21683323
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      RNA foci formation was detected in lymphoblastoid cells from affected
      subjects by fluorescence in situ hybridization.
    explanation: Demonstrates RNA foci as a direct consequence of the NOP56 GGCCTG expansion in patient cells.
  - reference: PMID:21683323
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Our finding suggests that SCA36 is caused by hexanucleotide repeat
      expansions through RNA gain of function.
    explanation: Explicit statement of RNA gain-of-function as the SCA36 mechanism.
  - reference: PMID:19229559
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Spinocerebellar ataxia type 8 (SCA8) involves bidirectional expression
      of CUG (ATXN8OS) and CAG (ATXN8) expansion transcripts.
    explanation: Supports bidirectional repeat transcription as the SCA8 molecular basis.
- name: Polyglycine aggregation and impaired autophagy
  description: >-
    SCA4 is caused by a heterozygous GGC repeat expansion in ZFHX3 encoding
    an expanded polyglycine tract. The expansion produces intranuclear
    ZFHX3/p62/ubiquitin aggregates (prominent in basis pontis neurons),
    elevated ZFHX3 protein levels, and impaired autophagy. siRNA knockdown
    of ZFHX3 normalizes autophagy, suggesting a therapeutic avenue.
  biological_processes:
  - preferred_term: autophagy
    term:
      id: GO:0006914
      label: autophagy
  - preferred_term: inclusion body assembly
    term:
      id: GO:0070841
      label: inclusion body assembly
  evidence:
  - reference: PMID:38684900
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      we identified a heterozygous GGC-repeat expansion in a large Utah
      pedigree encoding polyglycine (polyG) in zinc finger homeobox protein
      3 (ZFHX3), also known as AT-binding transcription factor 1 (ATBF1).
    explanation: Identifies the SCA4 molecular lesion as a coding GGC polyglycine expansion in ZFHX3.
  - reference: PMID:38684900
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Intranuclear ZFHX3-p62-ubiquitin aggregates were abundant in SCA4
      basis pontis neurons.
    explanation: Demonstrates aggregate pathology in affected brainstem neurons in SCA4.
  - reference: PMID:38684900
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: >-
      In fibroblasts and induced pluripotent stem cells, the GGC expansion
      led to increased ZFHX3 protein levels and abnormal autophagy, which
      were normalized with small interfering RNA-mediated ZFHX3 knockdown
      in both cell types.
    explanation: Supports impaired autophagy as a tractable SCA4 disease mechanism.
- name: Extra-cerebellar neurodegeneration
  description: >-
    ADCA-I is distinguished from pure cerebellar ADCA-III by prominent
    extra-cerebellar involvement, including brainstem, pyramidal tracts,
    basal ganglia, and cerebral cortex. In SCA1, mutant ATAXIN-1 is
    broadly expressed, and patients exhibit respiratory, cognitive,
    memory, anxiety, and depressive features that cannot be explained by
    cerebellar degeneration alone. SCA36 shows brainstem motor neuron
    involvement with tongue fasciculation.
  locations:
  - preferred_term: brainstem
    term:
      id: UBERON:0002298
      label: brainstem
  evidence:
  - reference: PMID:35802260
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      there are, however, also other symptoms such as respiratory problems,
      cognitive defects and memory impairment, anxiety, and depression
      observed in SCA1 patients and mouse models, which indicate that there
      are extra-cerebellar effects of SCA1 that cannot be explained solely
      through changes in the cerebellar region of the brain alone.
    explanation: Supports extra-cerebellar involvement as a defining ADCA-I feature.
  - reference: PMID:21683323
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      we performed genetic analysis of a unique form of SCA (SCA36) that is
      accompanied by motor neuron involvement.
    explanation: Supports motor neuron (brainstem/pyramidal) involvement in SCA36.
- name: Polyglutamine-expanded TBP disrupts transcriptional programs
  description: >-
    Expanded CAG/CAA repeats in exon 3 of TBP lengthen the polyglutamine
    tract of a general transcription factor. Mutant TBP remains nuclear and
    perturbs gene expression through abnormal interactions with other
    transcriptional regulators, linking a ubiquitously expressed protein to
    selective neuronal dysfunction. (SCA17-specific.)
  genes:
  - preferred_term: TBP
    term:
      id: hgnc:11588
      label: TBP
  biological_processes:
  - preferred_term: regulation of transcription by RNA polymerase II
    term:
      id: GO:0006357
      label: regulation of transcription by RNA polymerase II
  downstream:
  - target: Cerebellar INPP5A loss drives Purkinje cell vulnerability
    description: >-
      Mutant TBP represses SP1-dependent transcription of cerebellar INPP5A,
      linking broad transcriptional dysregulation to selective Purkinje cell
      vulnerability.
    causal_link_type: DIRECT
    evidence:
    - reference: PMID:32107387
      supports: SUPPORT
      evidence_source: MODEL_ORGANISM
      snippet: >-
        In SCA17 knock-in mice, mutant TBP inhibits SP1-mediated gene
        transcription to down-regulate INPP5A, a protein that is highly
        abundant in the cerebellum.
      explanation: >-
        Directly supports the edge from mutant TBP transcriptional dysfunction
        to cerebellar INPP5A loss.
  evidence:
  - reference: PMID:30532692
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Spinocerebellar ataxia type 17 (SCA17) is a rare autosomal dominant
      neurodegenerative disease caused by a CAG repeat expansion in the
      TATA-box binding protein gene (TBP).
    explanation: Establishes TBP repeat expansion as the initiating molecular lesion.
  - reference: PMID:19643914
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: >-
      We found that the high-affinity nerve growth factor receptor, TrkA, is
      down-regulated by mutant TBP in cells.
    explanation: Directly shows transcriptional consequences of mutant TBP in cellular models.
  - reference: PMID:19643914
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: >-
      Mutant TBP binds more Sp1, reduces its occupancy of the TrkA promoter
      and inhibits the activity of the TrkA promoter.
    explanation: Provides a mechanistic explanation for transcriptional dysregulation caused by mutant TBP.
- name: Cerebellar INPP5A loss drives Purkinje cell vulnerability
  description: >-
    Cerebellar neurons are particularly vulnerable to mutant TBP. In the
    cerebellum, mutant TBP suppresses SP1-dependent INPP5A expression,
    perturbing IP3-linked calcium signaling in a region enriched for INPP5A
    and promoting Purkinje cell degeneration. (SCA17-specific.)
  cell_types:
  - preferred_term: Purkinje cell
    term:
      id: CL:0000121
      label: Purkinje cell
  locations:
  - preferred_term: cerebellum
    term:
      id: UBERON:0002037
      label: cerebellum
  biological_processes:
  - preferred_term: intracellular calcium ion homeostasis
    term:
      id: GO:0006874
      label: intracellular calcium ion homeostasis
  - preferred_term: IP3-linked calcium signaling
    term:
      id: GO:0019722
      label: calcium-mediated signaling
  evidence:
  - reference: PMID:32107387
    supports: SUPPORT
    evidence_source: MODEL_ORGANISM
    snippet: >-
      By expressing mutant TBP in different brain regions in adult
      wild-type mice via stereotaxic injection of adeno-associated virus, we
      found that adult cerebellar neurons are particularly vulnerable to
      mutant TBP.
    explanation: Demonstrates regional cerebellar vulnerability to mutant TBP in vivo.
  - reference: PMID:32107387
    supports: SUPPORT
    evidence_source: MODEL_ORGANISM
    snippet: >-
      CRISPR/Cas9-mediated deletion of Inpp5a in the cerebellum of
      wild-type mice leads to Purkinje cell degeneration, and Inpp5a
      overexpression decreases inositol 1,4,5-trisphosphate (IP3) levels and
      ameliorates Purkinje cell degeneration in SCA17 knock-in mice.
    explanation: Shows that INPP5A loss is mechanistically sufficient and therapeutically reversible in vivo.
- name: Astrocyte-mediated NF-kappaB neuroinflammation amplifies neuronal injury
  description: >-
    Astrocytic mutant TBP contributes non-cell-autonomously to neuronal loss.
    Severe degeneration requires mutant TBP in both neurons and glia, and
    inflammatory signaling in astrocytes, particularly NF-kappaB pathway
    activation, augments neurotoxicity. (SCA17-specific.)
  cell_types:
  - preferred_term: astrocyte
    term:
      id: CL:0000127
      label: astrocyte
  - preferred_term: neuron
    term:
      id: CL:0000540
      label: neuron
  biological_processes:
  - preferred_term: inflammatory response
    term:
      id: GO:0006954
      label: inflammatory response
  - preferred_term: canonical NF-kappaB signal transduction
    term:
      id: GO:0007249
      label: canonical NF-kappaB signal transduction
  evidence:
  - reference: PMID:28821675
    supports: SUPPORT
    evidence_source: MODEL_ORGANISM
    snippet: >-
      We found that mutant TBP expression in neuronal cells or astrocytes
      alone only caused mild neurodegeneration, whereas severe neuronal
      toxicity requires the expression of mutant TBP in both neuronal and
      glial cells.
    explanation: Supports a synergistic neuron-glia mechanism rather than purely cell-autonomous neuronal toxicity.
  - reference: PMID:28821675
    supports: SUPPORT
    evidence_source: MODEL_ORGANISM
    snippet: >-
      We identified activated inflammatory signaling pathways in mutant
      TBP-expressing astrocytes, and blocking nuclear factor κB (NF-κB)
      signaling in astrocytes ameliorated neurodegeneration.
    explanation: Directly implicates astrocytic inflammatory signaling as a modifiable contributor to SCA17 neurodegeneration.
- name: Impaired proteostasis promotes mutant polyQ protein aggregation
  description: >-
    Limited chaperone and autophagy capacity permits accumulation of
    aggregation-prone mutant polyQ species (e.g. mutant TBP in SCA17),
    whereas boosting proteostasis pathways enhances aggregate clearance
    and improves survival.
  biological_processes:
  - preferred_term: inclusion body assembly
    term:
      id: GO:0070841
      label: inclusion body assembly
  - preferred_term: autophagy
    term:
      id: GO:0006914
      label: autophagy
  evidence:
  - reference: PMID:35482253
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: >-
      Pharmacological or genetic calpain inhibition reduced TBP cleavage and
      aggregation, consequently improving cell viability.
    explanation: >-
      Supports mutant TBP aggregation as a measurable downstream toxic event
      that can be reduced when upstream fragment generation is limited.
  - reference: PMID:26972528
    supports: SUPPORT
    evidence_source: MODEL_ORGANISM
    snippet: >-
      Upregulation of chaperone and autophagy levels further enhances the
      clearance of mutant protein aggregation, slowing the progression of
      pathology in SCA17 mice.
    explanation: Supports impaired proteostasis as a therapeutically relevant mechanism in vivo.
phenotypes:
- category: Neurologic
  name: Progressive gait ataxia
  frequency: VERY_FREQUENT
  diagnostic: true
  description: >-
    Progressive gait and balance impairment is the core clinical feature of
    ADCA-I across all subtypes and is typically the presenting symptom.
  phenotype_term:
    preferred_term: gait ataxia
    term:
      id: HP:0002066
      label: Gait ataxia
    clinical_course: PROGRESSIVE
  evidence:
  - reference: PMID:32306062
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Generally, the SCAs are characterized by a progressive gait impairment
      with classical cerebellar features, and in a subset of SCAs,
      accompanied by extra-cerebellar features.
    explanation: Supports progressive gait ataxia as the defining cross-subtype feature of the autosomal dominant SCAs.
- category: Neurologic
  name: Dysarthria
  description: >-
    Progressive cerebellar speech impairment is typical across ADCA-I
    subtypes.
  phenotype_term:
    preferred_term: dysarthria
    term:
      id: HP:0001260
      label: Dysarthria
  evidence:
  - reference: PMID:23475385
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      SCA17 is clinically heterogeneous and typically presents with slowly
      evolving ataxia, dysarthria, dementia, depression, and other movement
      disorders such as chorea.
    explanation: Explicitly names dysarthria among typical SCA17 (ADCA-I subtype) manifestations.
- category: Neurologic
  name: Pyramidal tract signs
  subtype: SCA1
  description: >-
    Pyramidal signs (spasticity, hyperreflexia, extensor plantar responses)
    are a characteristic extra-cerebellar feature of SCA1 and other ADCA-I
    subtypes, distinguishing ADCA-I from purely cerebellar ADCA-III.
  phenotype_term:
    preferred_term: pyramidal signs
    term:
      id: HP:0007256
      label: Abnormal pyramidal sign
  evidence:
  - reference: PMID:32306062
    supports: PARTIAL
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Beyond the common gait impairment and cerebellar atrophy, the wide
      range of additional clinical features observed across the SCAs is
      likely explained by the diverse set of mutated genes that encode
      proteins with seemingly disparate functional roles in nervous system
      biology.
    explanation: Supports the broad range of extra-cerebellar signs (including pyramidal features) that define the ADCA-I group.
- category: Neurologic
  name: Slow saccades
  subtype: SCA2
  description: >-
    Characteristic slowing of saccadic eye movements is a distinctive
