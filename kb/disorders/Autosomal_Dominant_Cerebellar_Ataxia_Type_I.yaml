      survival programs.
  - target: Extracerebellar Neurodegeneration
    causal_link_type: DIRECT
    description: >-
      Transcriptional dysregulation acts on the same vulnerable
      extracerebellar neuron populations (brainstem, pyramidal-tract,
      and peripheral neurons), contributing in parallel to their
      degeneration.
- name: Purkinje Cell Degeneration and Cerebellar Cortical Atrophy
  description: >-
    The convergent pathological endpoint across ADCA-I subtypes is
    progressive degeneration of cerebellar Purkinje cells with loss of the
    cerebellar cortical architecture, producing the progressive gait and
    limb ataxia, dysarthria, and oculomotor abnormalities that define the
    syndrome.
  cell_types:
  - preferred_term: cerebellar Purkinje cell
    term:
