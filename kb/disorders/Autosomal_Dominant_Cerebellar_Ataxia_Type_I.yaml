  evidence:
  - reference: PMID:17417937
    reference_title: "Trinucleotide repeat disorders."
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      The discovery that expansion of unstable repeats can cause a variety of
      neurological disorders has changed the landscape of disease-oriented
      research for several forms of mental retardation, Huntington disease,
      inherited ataxias, and muscular dystrophy.
    explanation: >-
      Establishes unstable repeat expansion as the shared causal mechanism
      across the inherited ataxias that make up the ADCA-I class.
  - reference: PMID:30532692
    reference_title: "Complexity of the Genetics and Clinical Presentation of Spinocerebellar Ataxia 17."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Spinocerebellar ataxia type 17 (SCA17) is a rare autosomal dominant
      neurodegenerative disease caused by a CAG repeat expansion in the
      TATA-box binding protein gene (TBP).
    explanation: >-
      Documents the CAG repeat-expansion gain-of-function lesion in the
      representative ADCA-I subtype SCA17.
- name: Misfolded Protein Aggregation and Proteostatic Stress
  description: >-
    Expanded polyglutamine ataxin-1, ataxin-2, and TBP adopt aberrant
    conformations and form nuclear and cytoplasmic inclusions. Sequestration
    of chaperones, ubiquitin-proteasome and autophagy components, and
    interacting partners progressively impairs neuronal proteostasis,
    contributing to Purkinje-cell and brainstem-neuron dysfunction. This
    proteostatic stress is a convergent downstream consequence of the
    polyglutamine subtypes and is described mechanistically here without an
    independent ADCA-I-specific quantitative claim.
  cell_types:
  - preferred_term: cerebellar Purkinje cell
    term:
      id: CL:0000121
      label: Purkinje cell
