name: X-Linked Infantile Spinal Muscular Atrophy
creation_date: "2026-06-26T00:00:00Z"
category: Mendelian
description: >-
  X-linked infantile spinal muscular atrophy (XL-SMA; SMAX2; X-linked spinal
  muscular atrophy with arthrogryposis) is a rare X-linked recessive lower motor
  neuron disease caused by hemizygous pathogenic variants in UBA1, the gene
  encoding the ubiquitin-like modifier activating enzyme 1 (the E1
  ubiquitin-activating enzyme that initiates the ubiquitin-proteasome cascade).
  Impairment of UBA1 ubiquitin-activating function disrupts cellular protein
  homeostasis in motor neurons, producing degeneration and loss of anterior horn
  (lower motor) neurons in the spinal cord and brainstem. Affected males present
  at birth with severe congenital hypotonia, areflexia, and profound generalized
  weakness, together with arthrogryposis (multiple congenital joint contractures)
  and a tendency to bone fractures; the course is frequently complicated by early
  respiratory failure and death in infancy. Pregnancies are often preceded by
  reduced fetal movements and polyhydramnios. Carrier mothers are typically
  unaffected. SMAX2 is genetically and mechanistically distinct from SMN1-related
  proximal spinal muscular atrophy (in which SMN1 is disrupted and SMN1 is normal
  in SMAX2) and from adult-onset X-linked spinal and bulbar muscular atrophy
  (Kennedy disease), which is caused by an androgen-receptor CAG expansion.
