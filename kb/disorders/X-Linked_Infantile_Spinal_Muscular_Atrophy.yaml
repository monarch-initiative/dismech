pathophysiology:
- name: UBA1 E1 Ubiquitin-Activation Deficiency
  description: >-
    Hemizygous pathogenic variants in UBA1 (clustered in exon 15 / the active
    adenylation domain) impair the function of the E1 ubiquitin-activating enzyme,
    the most upstream enzyme of the ubiquitin cascade that activates ubiquitin
    before its transfer to E2 conjugating enzymes and E3 ligases. Reduced or
    altered UBA1 activity is the primary molecular lesion of SMAX2.
  biological_processes:
  - preferred_term: protein ubiquitination
    term:
      id: GO:0016567
      label: protein ubiquitination
    modifier: DECREASED
  evidence:
  - reference: PMID:18179898
    reference_title: "Rare missense and synonymous variants in UBE1 are associated with X-linked infantile spinal muscular atrophy."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "This resulted in detection of three rare novel variants in exon 15 of UBE1 that segregate with disease"
    explanation: Identifies UBA1 (UBE1) exon 15 variants segregating with XL-SMA as the disease-causing lesion.
  - reference: PMID:39762237
    reference_title: "A novel UBA1 gene mutation in a patient with infantile respiratory distress syndrome."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "UBA1 is an E1 ubiquitin-activating enzyme that initiates the ubiquitylation of target proteins and is thus a key component of the ubiquitin signaling pathway."
    explanation: Defines UBA1 as the E1 ubiquitin-activating enzyme that initiates ubiquitylation.
  - reference: PMID:39762237
    reference_title: "A novel UBA1 gene mutation in a patient with infantile respiratory distress syndrome."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "This missense mutation was located with the AAD (active adenylation domain) of the protein, a known hotspot of SMAX2 mutations."
    explanation: Locates SMAX2 mutations in the active adenylation domain of UBA1.
  downstream:
  - target: Impaired Ubiquitin-Proteasome Proteostasis
    description: Loss of UBA1 ubiquitin-activating function compromises the downstream ubiquitin-proteasome and ubiquitin-dependent protein homeostasis machinery.
- name: Impaired Ubiquitin-Proteasome Proteostasis
  description: >-
    Because UBA1 sits at the apex of the ubiquitin cascade, its impairment
    disrupts all downstream ubiquitylation-dependent processes, including
    proteasome-mediated protein degradation and protein homeostasis. Disturbed
    proteostasis is a shared feature of UBA1-linked neurodegeneration and renders
    motor neurons, which are highly dependent on intact protein quality control,
    vulnerable to degeneration.
  cell_types:
  - preferred_term: Motor Neuron
    term:
      id: CL:0000100
      label: motor neuron
  biological_processes:
  - preferred_term: proteasome-mediated ubiquitin-dependent protein catabolic process
    term:
      id: GO:0043161
      label: proteasome-mediated ubiquitin-dependent protein catabolic process
    modifier: DECREASED
  evidence:
  - reference: PMID:23151135
    reference_title: "Targeting the ubiquitin E1 as a novel anti-cancer strategy."
    supports: SUPPORT
    evidence_source: OTHER
    snippet: "UBA1 is the initial enzyme in the ubiquitination cascade and initiates the transfer of ubiquitin molecules to target proteins where they are degraded by the proteasome."
    explanation: Establishes UBA1 as the apex enzyme whose activity gates proteasomal degradation of ubiquitinated proteins.
  - reference: PMID:32315770
    reference_title: "The pivotal role of ubiquitin-activating enzyme E1 (UBA1) in neuronal health and neurodegeneration."
    supports: SUPPORT
    evidence_source: OTHER
    snippet: "UBA1 is thus of fundamental importance to the modulation of ubiquitin homeostasis and to all downstream ubiquitylation-dependent cellular processes, including proteolysis through the ubiquitin-proteasome system and selective autophagy."
    explanation: Links UBA1 impairment to disruption of ubiquitin homeostasis and ubiquitin-proteasome proteolysis.
  - reference: PMID:26432019
    reference_title: "UBA1: At the Crossroads of Ubiquitin Homeostasis and Neurodegeneration."
    supports: SUPPORT
    evidence_source: OTHER
    snippet: "A common feature of these conditions is disruption of protein homeostasis."
    explanation: Frames disrupted protein homeostasis as the unifying mechanism of UBA1-linked neurodegeneration.
  downstream:
  - target: Anterior Horn Motor Neuron Degeneration
    description: Proteostatic failure in motor neurons drives their degeneration and loss.
- name: Anterior Horn Motor Neuron Degeneration
  description: >-
    Degeneration and loss of anterior horn (lower motor) neurons in the spinal
    cord and brainstem is the defining neuropathological lesion of XL-SMA,
    producing denervation of skeletal muscle. UBA1 levels and ubiquitin-dependent
    pathways are critical to motor neuron survival, and impaired UBA1 activity is
    implicated in motor neuron degeneration.
  cell_types:
  - preferred_term: Motor Neuron
    term:
      id: CL:0000100
      label: motor neuron
  biological_processes:
  - preferred_term: ubiquitin-dependent protein catabolic process
    term:
