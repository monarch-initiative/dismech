    snippet: "X-linked infantile spinal-muscular atrophy (XL-SMA) is a rare disorder, which presents with the clinical characteristics of hypotonia, areflexia, and multiple congenital contractures (arthrogryposis) associated with loss of anterior horn cells and death in infancy."
    explanation: Defines XL-SMA pathology as loss of anterior horn cells with the characteristic clinical triad.
  - reference: PMID:20301739
    reference_title: "Spinal Muscular Atrophy, X-Linked Infantile."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "X-linked infantile spinal muscular atrophy (XL-SMA) is characterized by congenital hypotonia, areflexia, and evidence of degeneration and loss of anterior horn cells (i.e., lower motor neurons) in the spinal cord and brain stem."
    explanation: Confirms degeneration and loss of lower motor neurons (anterior horn cells) in spinal cord and brainstem.
  - reference: PMID:32315770
    reference_title: "The pivotal role of ubiquitin-activating enzyme E1 (UBA1) in neuronal health and neurodegeneration."
    supports: SUPPORT
    evidence_source: OTHER
    snippet: "accumulating evidence implicating impaired UBA1 activity in a range of neurodegenerative conditions, including Parkinson's disease, Alzheimer's disease, Huntington's disease and spinal muscular atrophy"
    explanation: Implicates impaired UBA1 activity in motor-neuron neurodegenerative disease including spinal muscular atrophy.
  downstream:
  - target: Severe Neuromuscular Weakness and Hypotonia
    description: Motor neuron loss denervates skeletal muscle, producing congenital hypotonia, areflexia, and profound weakness.
  - target: Secondary Arthrogryposis from Fetal Akinesia
    description: In utero motor neuron loss reduces fetal movement, leading to joint contractures and reduced fetal movement / polyhydramnios.
- name: Severe Neuromuscular Weakness and Hypotonia
  description: >-
    Denervation of skeletal muscle by degenerating lower motor neurons produces
    the severe congenital hypotonia, areflexia, and profound generalized weakness
    that define the neonatal presentation, with progressive chest-muscle
    involvement leading to ventilatory insufficiency, feeding difficulty, and a
    shortened life span.
  cell_types:
  - preferred_term: Motor Neuron
    term:
      id: CL:0000100
      label: motor neuron
  evidence:
  - reference: PMID:20301739
    reference_title: "Spinal Muscular Atrophy, X-Linked Infantile."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Life span is significantly shortened because of progressive ventilatory insufficiency resulting from chest muscle involvement."
    explanation: Links progressive motor-unit failure of respiratory muscles to ventilatory insufficiency and shortened life span.
  downstream:
  - target: Respiratory Insufficiency
    description: Phrenic and intercostal motor unit failure compromises ventilation.
  - target: Feeding Difficulties
    description: Bulbar and generalized weakness impair sucking and swallowing.
- name: Secondary Arthrogryposis from Fetal Akinesia
  description: >-
    Loss of anterior horn motor neurons during fetal life reduces fetal movement
    (fetal akinesia). Chronic intrauterine immobility of joints leads to multiple
    congenital contractures (arthrogryposis), and the akinesia sequence is often
    heralded by reduced fetal movements and polyhydramnios; reduced ossification
    and disuse contribute to a tendency to perinatal bone fractures.
  evidence:
  - reference: PMID:17224690
    reference_title: "X-linked infantile spinal muscular atrophy: clinical definition and molecular mapping."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "multiple congenital contractures (arthrogryposis) associated with loss of anterior horn cells"
    explanation: Directly links arthrogryposis to anterior horn cell loss (fetal motor denervation).
  - reference: PMID:20301739
    reference_title: "Spinal Muscular Atrophy, X-Linked Infantile."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Often congenital contractures and/or fractures are present."
    explanation: Confirms congenital contractures and fractures as characteristic features.
  downstream:
  - target: Arthrogryposis Multiplex Congenita
    description: Fetal akinesia from motor neuron loss produces multiple congenital joint contractures.
  - target: Increased Susceptibility to Fractures
    description: Reduced fetal movement and ossification predispose to perinatal bone fractures.
