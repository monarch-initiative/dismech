genetic:
- name: UBA1
  association: Causative
  inheritance:
  - name: X-linked recessive inheritance
    inheritance_term:
      preferred_term: X-linked recessive inheritance
      term:
        id: HP:0001419
        label: X-linked recessive inheritance
  gene_term:
    preferred_term: UBA1
    term:
      id: hgnc:12469
      label: UBA1
  notes: >-
    UBA1 (ubiquitin-like modifier activating enzyme 1), the E1 ubiquitin-activating
    enzyme, on Xp11.3. Hemizygous pathogenic variants cluster in exon 15 / the
    active adenylation domain (e.g. p.Met539Ile, p.Ser547Gly, the c.1731C>T
    synonymous variant reducing expression). Loss/impairment of ubiquitin-activating
    function (loss-of-function mechanism), distinct from the SMN1 loss of proximal
    SMA and the androgen-receptor CAG expansion of Kennedy disease.
  evidence:
  - reference: PMID:18179898
    reference_title: "Rare missense and synonymous variants in UBE1 are associated with X-linked infantile spinal muscular atrophy."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "two missense mutations (c.1617 G-->T, p.Met539Ile; c.1639 A-->G, p.Ser547Gly) present each in one XL-SMA family, and one synonymous C-->T substitution (c.1731 C-->T, p.Asn577Asn) identified in another three unrelated families"
    explanation: Identifies the causative UBA1 (UBE1) variants segregating with XL-SMA.
  - reference: PMID:18179898
    reference_title: "Rare missense and synonymous variants in UBE1 are associated with X-linked infantile spinal muscular atrophy."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "XL-SMA is part of a growing list of neurodegenerative disorders associated with defects in the ubiquitin-proteasome pathway"
    explanation: Places XL-SMA among ubiquitin-proteasome pathway neurodegenerative disorders, consistent with a UBA1 loss-of-function mechanism.
differential_diagnoses:
- name: Spinal Muscular Atrophy
  description: >-
    SMN1-related proximal spinal muscular atrophy (including the severe congenital
    type 0 and type 1) is the principal differential diagnosis, presenting with
    congenital/infantile hypotonia, areflexia, and motor neuron loss. It is
    autosomal recessive and caused by biallelic SMN1 disruption; SMN1 is normal in
    SMAX2, which is X-linked and caused by UBA1 variants and is distinguished by
    prominent arthrogryposis and fractures.
  distinguishing_features:
  - X-linked recessive inheritance (affected males) and UBA1 variants favor SMAX2; autosomal recessive SMN1 disruption favors proximal SMA.
  - Prominent congenital arthrogryposis and perinatal fractures favor SMAX2.
  - Normal SMN1 in SMAX2 versus biallelic SMN1 loss in proximal SMA.
  disease_term:
    preferred_term: spinal muscular atrophy
    term:
      id: MONDO:0001516
      label: spinal muscular atrophy
  evidence:
  - reference: PMID:18179898
    reference_title: "Rare missense and synonymous variants in UBE1 are associated with X-linked infantile spinal muscular atrophy."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "X-linked infantile spinal muscular atrophy (XL-SMA) is an X-linked disorder"
    explanation: Establishes the X-linked nature distinguishing SMAX2 from autosomal recessive SMN1-SMA.
- name: Kennedy Disease
  description: >-
    Kennedy disease (X-linked spinal and bulbar muscular atrophy, SBMA) is also an
    X-linked lower motor neuron disease, but is adult-onset and caused by an
    androgen-receptor (AR) CAG trinucleotide repeat expansion (a toxic
    gain-of-function polyglutamine mechanism), not UBA1 loss of function, and lacks
    the congenital arthrogryposis and infantile lethality of SMAX2.
  distinguishing_features:
  - Adult midlife onset in Kennedy disease versus congenital/infantile onset in SMAX2.
  - AR CAG expansion (gain of function) versus UBA1 loss of function.
  - Absence of congenital contractures/arthrogryposis in Kennedy disease.
  disease_term:
    preferred_term: Kennedy disease
    term:
      id: MONDO:0010735
      label: Kennedy disease
  evidence:
  - reference: PMID:20301739
    reference_title: "Spinal Muscular Atrophy, X-Linked Infantile."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "X-linked infantile spinal muscular atrophy (XL-SMA) is characterized by congenital hypotonia, areflexia, and evidence of degeneration and loss of anterior horn cells"
    explanation: Confirms the congenital infantile presentation of SMAX2, distinguishing it from adult-onset Kennedy disease.
