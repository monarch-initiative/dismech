environmental:
- name: Chronic Cannabis Use
  notes: Primary trigger and risk factor for development of CHS
  evidence:
  - reference: PMID:33162734
    supports: SUPPORT
    snippet: "CHS occurs in the setting of prolonged, chronic cannabis use, typically for years before symptom onset."
    explanation: Chronic cannabis use is the primary environmental factor necessary for CHS development.
  exposure_term:
    preferred_term: marijuana exposure
    term:
      id: ECTO:0001006
      label: exposure to marijuana

- name: High-Potency THC Products
  notes: Higher THC concentrations may increase risk of developing CHS
  evidence:
  - reference: PMID:33162734
    supports: SUPPORT
    snippet: "The increasing potency of cannabis products may contribute to the rising incidence of CHS."
    explanation: Higher potency THC products may increase the risk of developing CHS.
  exposure_term:
    preferred_term: drug exposure
    term:
      id: ECTO:0000509
      label: exposure to drug

treatments:
- name: Cannabis Cessation
  description: Complete discontinuation of cannabis use is the definitive treatment for CHS and prevents recurrence.
  evidence:
  - reference: PMID:33162734
    supports: SUPPORT
    snippet: "The only definitive treatment for CHS is complete cessation of cannabis use."
    explanation: Cannabis cessation is the only definitive treatment that prevents CHS recurrence.
  treatment_term:
    preferred_term: substance abuse treatment
    term:
      id: MAXO:0000011
      label: substance abuse treatment

- name: Supportive Care and Hydration
  description: Intravenous fluids, electrolyte replacement, and supportive care during acute episodes.
  evidence:
  - reference: PMID:33162734
    supports: SUPPORT
    snippet: "Treatment is primarily supportive with IV hydration and electrolyte replacement."
    explanation: Supportive care with IV fluids is the main symptomatic treatment during acute CHS episodes.
  treatment_term:
    preferred_term: supportive care
    term:
      id: MAXO:0000950
      label: supportive care

- name: Hot Water Therapy
  description: Prolonged hot showers or baths provide temporary symptomatic relief during acute episodes.
  evidence:
  - reference: PMID:19121257
    supports: SUPPORT
    snippet: "Symptoms are refractory to antiemetic medications and only respond to prolonged hot showers."
    explanation: Hot water therapy is the characteristic symptomatic relief method that patients discover and use compulsively.
  treatment_term:
    preferred_term: hydrotherapy
    term:
      id: MAXO:0001298
      label: hydrotherapy