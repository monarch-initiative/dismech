    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Early recognition of CHS is essential to prevent complications related to severe volume depletion."
    explanation: This indicates that CHS can lead to clinically significant fluid depletion.
  phenotype_term:
    preferred_term: Dehydration
    term:
      id: HP:0001944
      label: Dehydration

- category: Systemic
  name: Weight Loss
  frequency: OCCASIONAL
  notes: May occur due to decreased oral intake during symptomatic periods
  phenotype_term:
    preferred_term: Weight loss
    term:
      id: HP:0001824
      label: Weight loss

environmental:
- name: Chronic Cannabis Use
  notes: Primary trigger and risk factor for development of CHS
  evidence:
  - reference: PMID:19121257
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Cannabinoid hyperemesis is a clinical syndrome characterized by repeated vomiting and associated learned compulsive hot water bathing behavior due to long-term marijuana use."
    explanation: This directly ties CHS to chronic cannabis exposure.
  exposure_term:
    preferred_term: cannabis exposure
    term:
      id: ECTO:0100005
      label: exposure to cannabis

- name: High-Potency THC Products
  notes: Higher THC concentrations may increase risk of developing CHS
  evidence:
  - reference: PMID:33162734
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "The frequency and prevalence of CHS change in accordance with the doses of tetrahydrocannabinol and other cannabinoids in various formulations of cannabis."
    explanation: This supports a dose and formulation relationship for CHS risk.
  exposure_term:
    preferred_term: high-potency cannabis exposure
    term:
      id: ECTO:0100005
      label: exposure to cannabis

treatments:
- name: Cannabis Cessation
  description: Complete discontinuation of cannabis use is the definitive treatment for CHS and prevents recurrence.
  treatment_term:
    preferred_term: cannabis cessation counseling
    term:
      id: MAXO:0000077
      label: behavioral counseling

- name: Supportive Care and Hydration
  description: Intravenous fluids, electrolyte replacement, and supportive care during acute episodes.
  treatment_term:
    preferred_term: supportive care
    term:
      id: MAXO:0000950
      label: supportive care

- name: Hot Water Therapy
  description: Prolonged hot showers or baths provide temporary symptomatic relief during acute episodes.
  evidence:
  - reference: PMID:33162734
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "It is considered as a variant of cyclical vomiting syndrome seen in cannabis users especially characterized by compulsive hot bathing/showers to relieve the symptoms."
    explanation: This describes hot bathing as a source of symptom relief in CHS.
  treatment_term:
    preferred_term: hydrotherapy
    term:
      id: MAXO:0000458
      label: hydrotherapy
