name: Cannabis Hyperemesis Syndrome
creation_date: '2026-03-03T22:51:00Z'
updated_date: '2026-03-03T22:51:00Z'
description: >
  Cannabis Hyperemesis Syndrome (CHS) is a paradoxical disorder characterized by
  cyclic nausea and vomiting in chronic cannabis users. Despite cannabis's
  traditionally antiemetic properties, prolonged use leads to severe emesis
  episodes that are characteristically relieved by hot showers or baths. The
  syndrome results from chronic overstimulation and dysregulation of cannabinoid
  receptors, particularly CB1 receptors in the central nervous system and
  gastrointestinal tract.
category: Complex
disease_term:
  preferred_term: Cannabis hyperemesis syndrome
  term:
    id: MONDO:0018902
    label: cannabis hyperemesis syndrome
parents:
- Gastrointestinal Disease
- Substance-Related Disorder

pathophysiology:
- name: CB1 Receptor Desensitization
  description: >
    Chronic cannabis use leads to prolonged activation of cannabinoid CB1 receptors,
    resulting in receptor desensitization and/or downregulation. This disrupts the
    endocannabinoid system's normal antiemetic function and paradoxically leads to
    pro-emetic effects. The brain's emetic control centers become dysregulated,
    particularly in the area postrema and dorsal vagal complex.
  biological_processes:
  - preferred_term: G protein-coupled receptor desensitization
    term:
      id: GO:0098762
      label: G protein-coupled receptor desensitization
  - preferred_term: cannabinoid receptor signaling pathway
    term:
      id: GO:0038171
      label: cannabinoid receptor signaling pathway
    modifier: ABNORMAL
  genes:
  - preferred_term: CNR1
    term:
      id: hgnc:2159
      label: CNR1
  downstream:
  - target: HPA Axis Disruption
  - target: Gastrointestinal Dysmotility
  evidence:
  - reference: PMID:33162734
    supports: SUPPORT
    snippet: "The prevailing theory about how CHS develops is that extended activation of the CB1 receptor by prolonged exposure to THC leads to desensitization and/or downregulation of the CB1 receptor and changes to endocannabinoid-related enzymes, resulting in endocannabinoid system dysregulation."
    explanation: This describes the primary mechanism of CB1 receptor desensitization leading to CHS development.

- name: HPA Axis Disruption
  description: >
    The endocannabinoid system normally exerts negative feedback on the
    hypothalamic-pituitary-adrenal (HPA) axis. Chronic cannabis use disrupts this
    feedback mechanism, leading to increased vagal nerve discharge and enhanced
    emetic responses. Stress states activate the sympathetic nervous system and
    increase ACTH release, which mobilizes THC stored in adipose tissue.
  biological_processes:
  - preferred_term: regulation of hormone secretion
    term:
      id: GO:0046883
      label: regulation of hormone secretion
    modifier: ABNORMAL
  - preferred_term: hypothalamic-pituitary-adrenal axis response
    term:
      id: GO:0120162
      label: positive regulation of cold-induced thermogenesis
    modifier: ABNORMAL
  downstream:
  - target: THC Mobilization from Adipose Tissue
  - target: Vagal Hyperactivity
  evidence:
  - reference: PMID:33162734
    supports: SUPPORT
    snippet: "The endocannabinoid system exerts constant negative feedback on the hypothalamic–pituitary–adrenal axis. Stimulation of these CB receptors can lead to loss of this feedback, resulting in increased vagal nerve discharges contributing to vomiting."
    explanation: Explains how HPA axis disruption leads to increased vagal activity and vomiting in CHS.

- name: THC Mobilization from Adipose Tissue
  description: >
    During stress states and food deprivation, sympathetic nervous system activation
    increases lipolysis through ACTH action on adipocyte receptors. This releases
    THC stored in fat tissue, creating a positive feedback loop that perpetuates
    emetic episodes during stress or when patients stop eating due to nausea.
  biological_processes:
  - preferred_term: lipolysis
    term:
      id: GO:0016042
      label: lipid catabolic process
  cell_types:
  - preferred_term: adipocyte
    term:
      id: CL:0000136
      label: fat cell
  downstream:
  - target: Cyclic Vomiting Episodes
  evidence:
  - reference: PMID:33162734
    supports: SUPPORT
    snippet: "Stress and food-deprivation stimulate the sympathetic nervous system, which increases lipolysis mediated by ACTH on adipocyte receptors. Increased ACTH enhances the release of THC stored in adipocytes, leading to emesis."
    explanation: Describes the mechanism by which stored THC is released from fat tissue during stress, perpetuating CHS symptoms.

- name: Gastrointestinal Dysmotility
  description: >
    CB1 receptors in the gastrointestinal tract normally regulate gut motility.
    Chronic cannabis exposure leads to inhibition of gastric acid secretion,
    delayed gastric emptying, and reduced intestinal motility. This contributes
    to abdominal pain and nausea, creating a cycle where the symptoms worsen
    with continued cannabis use.
  biological_processes:
  - preferred_term: gastric acid secretion
    term:
      id: GO:0001696
      label: gastric acid secretion
    modifier: DECREASED
  - preferred_term: intestinal motility
    term:
      id: GO:0097746
      label: regulation of blood vessel diameter
    modifier: ABNORMAL
  cell_types:
  - preferred_term: enteric neuron
    term:
      id: CL:0000009
      label: enteric neuron
  - preferred_term: gastric gland cell
    term:
      id: CL:0002178
      label: gastric gland cell
  downstream:
  - target: Abdominal Pain
  - target: Delayed Gastric Emptying
  evidence:
  - reference: PMID:33162734
    supports: SUPPORT
    snippet: "Inhibition of gastric acid secretion, gastric motility and emptying, and more distal gut motility affected by activation of peripheral CB1 receptors may contribute to development of the vomiting syndromes."
    explanation: Explains how CB1 receptor activation in the GI tract contributes to motility problems in CHS.

- name: TRPV1 Receptor Interactions
  description: >
    The transient receptor potential vanilloid-1 (TRPV1) receptors interact with
    the endocannabinoid system and may be involved in the characteristic relief
    patients experience with hot showers. Heat exposure activates TRPV1 receptors
    on sensory nerve endings, potentially modulating pain perception and providing
    symptomatic relief through vasodilation and neural pathway modulation.
  biological_processes:
  - preferred_term: sensory perception of temperature stimulus
    term:
      id: GO:0050951
      label: sensory perception of temperature stimulus
  - preferred_term: vasodilation
    term:
      id: GO:0042311
      label: vasodilation
  genes:
  - preferred_term: TRPV1
    term:
      id: hgnc:17764
      label: TRPV1
  downstream:
  - target: Hot Shower Relief Response
  evidence:
  - reference: PMID:19121257
    supports: SUPPORT
    snippet: "The thermoregulatory role of endocannabinoids may be responsible for the patient's need to take hot showers."
    explanation: Describes the connection between endocannabinoids, thermoregulation, and the characteristic hot shower behavior in CHS.

phenotypes:
- category: Gastrointestinal
  name: Cyclic Nausea and Vomiting
  frequency: FREQUENT
  diagnostic: true
  evidence:
  - reference: PMID:19121257
    supports: SUPPORT
    snippet: "Cannabinoid hyperemesis is characterized by repeated vomiting and associated learned compulsive hot water bathing behavior due to long-term marijuana use."
    explanation: Describes the characteristic cyclic vomiting pattern that defines CHS.
  phenotype_term:
    preferred_term: Nausea and vomiting
    term:
      id: HP:0002017
      label: Nausea and vomiting

- category: Behavioral
  name: Compulsive Hot Bathing
  frequency: FREQUENT
  diagnostic: true
  notes: Pathognomonic behavior where patients compulsively take hot showers or baths for symptom relief
  evidence:
  - reference: PMID:19121257
    supports: SUPPORT
    snippet: "Symptoms are refractory to antiemetic medications and only respond to prolonged hot showers, some lasting 6 hours or more."
    explanation: Describes the characteristic compulsive hot bathing behavior that is nearly pathognomonic for CHS.
  phenotype_term:
    preferred_term: Repetitive behavior
    term:
      id: HP:0000733
      label: Repetitive behavior

