    snippet: >-
      Heat shock protein 47 (Hsp47) is an endoplasmic reticulum (ER)-resident
      molecular chaperone essential for correct folding of procollagen in
      mammalian cells.
    explanation: >-
      Defines HSP47 as the ER collagen-folding chaperone whose loss causes OI
      type X.
  - reference: PMID:30541925
    reference_title: "Roles of the endoplasmic reticulum-resident, collagen-specific molecular chaperone Hsp47 in vertebrate cells and human disease."
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: >-
      Hsp47 binds to collagenous (Gly-Xaa-Arg) repeats within triple-helical
      procollagen in the ER and can prevent its local unfolding or aggregate
      formation, resulting in accelerating triple-helix formation of procollagen.
    explanation: >-
      Describes the molecular chaperone function of HSP47 in procollagen
      triple-helix folding that is lost in OI type X.
  downstream:
  - target: Impaired Procollagen Quality Control and Defective Secretion
    description: >-
      Without HSP47 to chaperone and monitor the triple helix, type I procollagen
      transits the ER too rapidly, misfolds, and accumulates abnormally in the
      Golgi.
- name: Impaired Procollagen Quality Control and Defective Secretion
  description: >-
    HSP47 normally monitors the integrity of the type I procollagen triple helix
    at the ER/cis-Golgi boundary; in its absence the rate of transit from the ER
    to the Golgi is increased and helical structure is compromised. Type I
    procollagen accumulates abnormally in the Golgi of patient fibroblasts, and a
    fraction of the secreted type I procollagen is protease-sensitive, reflecting
    an improperly folded triple helix. The net result is secretion of structurally
    defective collagen.
