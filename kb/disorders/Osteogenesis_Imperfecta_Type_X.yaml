genetic:
- name: SERPINH1 (HSP47) Loss-of-Function Mutation
  association: Causative
  gene_term:
    preferred_term: SERPINH1 (HSP47, collagen-specific ER chaperone)
    term:
      id: hgnc:1546
      label: SERPINH1
  notes: >-
    OI type X is caused by a biallelic loss-of-function variant in SERPINH1, the
    gene encoding the collagen-specific ER chaperone HSP47. The defining human
    allele is a homozygous missense variant (c.233T>C, p.Leu78Pro) that
    destabilizes HSP47 and leads to its proteasomal degradation. A naturally
    occurring recessive SERPINH1 missense mutation (c.977C>T, p.L326P) causes an
    analogous OI in Dachshunds, establishing SERPINH1 as a conserved OI gene.
  evidence:
  - reference: PMID:20188343
    reference_title: "Homozygosity for a missense mutation in SERPINH1, which encodes the collagen chaperone protein HSP47, results in severe recessive osteogenesis imperfecta."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      We have identified an autosomal-recessive missense mutation (c.233T>C,
      p.Leu78Pro) in SERPINH1, which encodes the collagen chaperone-like protein
      HSP47, that leads to a severe OI phenotype.
    explanation: >-
      Identifies the causative homozygous SERPINH1 missense variant defining OI
      type X in humans.
  - reference: PMID:19629171
    reference_title: "A missense mutation in the SERPINH1 gene in Dachshunds with osteogenesis imperfecta."
    supports: SUPPORT
    evidence_source: MODEL_ORGANISM
    snippet: >-
      A missense mutation (c.977C>T, p.L326P) located in an evolutionary
      conserved domain was perfectly associated with the OI phenotype.
    explanation: >-
      Documents a naturally occurring recessive SERPINH1 missense mutation
      causing OI in Dachshunds, a model that establishes SERPINH1 as an OI gene.
phenotypes:
- name: Recurrent Fractures
  description: >-
    Severe bone fragility with recurrent fractures, frequently congenital, the
    cardinal feature of OI type X.
  phenotype_term:
    preferred_term: Recurrent fractures
    term:
