name: Osteogenesis Imperfecta Type X
creation_date: "2026-06-30T00:00:00Z"
category: Mendelian
disease_term:
  preferred_term: Osteogenesis imperfecta type 10
  term:
    id: MONDO:0013459
    label: osteogenesis imperfecta type 10
description: >-
  Osteogenesis imperfecta type X (OI type X) is a severe autosomal recessive
  brittle bone disease caused by biallelic loss-of-function variants in SERPINH1,
  the gene encoding heat shock protein 47 (HSP47). HSP47 is an
  endoplasmic-reticulum-resident, collagen-specific molecular chaperone that
  binds collagenous (Gly-Xaa-Arg) repeats within triple-helical procollagen and
  is essential for correct folding of procollagen, accelerating and stabilizing
  triple-helix formation before pH-dependent dissociation at the ER/cis-Golgi
  boundary. Mechanistically HSP47 acts downstream of the CRTAP/P3H1/CyPB prolyl
  3-hydroxylation complex (deficient in OI types VII/VIII/IX), monitoring the
  integrity of the type I procollagen triple helix as a late ER quality-control
  step. In OI type X the disease-causing missense variant (c.233T>C, p.Leu78Pro)
  destabilizes HSP47 and leads to its proteasomal degradation; loss of the
  chaperone allows type I procollagen to transit the ER too rapidly and to
  accumulate abnormally in the Golgi, with a fraction of secreted procollagen
  being protease-sensitive (helically compromised). The resulting defective,
  abnormally folded bone collagen matrix fails to mineralize normally, producing
  extreme skeletal fragility, recurrent congenital fractures, reduced bone
  mineral density, growth deficiency, and bone deformity. The disorder was first
  defined in a consanguineous human kindred (Christiansen et al., 2010) and is
  recapitulated by a naturally occurring recessive SERPINH1 missense mutation in
  Dachshunds.
