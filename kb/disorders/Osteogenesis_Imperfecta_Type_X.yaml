diagnosis:
- name: Molecular Genetic Diagnosis
  description: >-
    OI type X is suspected in an infant with severe recessive OI (recurrent
    congenital fractures, low bone mineral density, deformity) when COL1A1/COL1A2
    and the recessive 3-hydroxylation-complex genes (CRTAP, P3H1/LEPRE1, PPIB)
    are negative. Diagnosis is confirmed by identifying a biallelic SERPINH1
    (HSP47) loss-of-function variant by gene-panel or exome sequencing.
    Supportive cellular findings include proteasomal loss of HSP47 with abnormal
    Golgi accumulation of type I procollagen.
  diagnosis_term:
    preferred_term: molecular genetic testing
    term:
      id: MAXO:0000533
      label: molecular genetic testing
  evidence:
  - reference: PMID:20188343
    reference_title: "Homozygosity for a missense mutation in SERPINH1, which encodes the collagen chaperone protein HSP47, results in severe recessive osteogenesis imperfecta."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      We have identified an autosomal-recessive missense mutation (c.233T>C,
      p.Leu78Pro) in SERPINH1, which encodes the collagen chaperone-like protein
      HSP47, that leads to a severe OI phenotype.
    explanation: >-
      Molecular identification of a biallelic SERPINH1 variant establishes the
      diagnosis of OI type X.
treatments:
- name: Bisphosphonate Therapy
  description: >-
    Intravenous bisphosphonates (e.g., pamidronate, zoledronic acid) are the
    pharmacological mainstay of severe OI, increasing bone mineral density and
    reducing fracture frequency. They are antiresorptive and do not correct the
    underlying collagen-chaperone defect.
  treatment_term:
    preferred_term: bisphosphonate agent therapy
    term:
      id: MAXO:0000954
      label: bisphosphonate agent therapy
  evidence:
  - reference: PMID:20301472
    reference_title: "COL1A1- and COL1A2-Related Osteogenesis Imperfecta."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Bisphosphonates continue to be used most extensively in those with
      vertebral fractures, frequent long bone fractures, or more severe OI.
    explanation: >-
      GeneReviews documents bisphosphonates as the mainstay pharmacotherapy for
      severe OI, the management category that applies to OI type X.
- name: Orthopedic Surgery and Intramedullary Rodding
  description: >-
    Intramedullary (telescoping) rod fixation and corrective osteotomy stabilize
    fracture-prone, deformed long bones; spinal surgery addresses progressive
    scoliosis.
  treatment_term:
    preferred_term: surgical procedure
    term:
      id: MAXO:0000004
      label: surgical procedure
  evidence:
  - reference: PMID:20301472
    reference_title: "COL1A1- and COL1A2-Related Osteogenesis Imperfecta."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      intramedullary rodding when
      indicated to provide anatomic positioning of limbs
    explanation: >-
      GeneReviews documents intramedullary rodding as standard orthopedic
      management for OI long-bone fractures and deformity.
- name: Physical Therapy and Rehabilitation
  description: >-
    Physical and occupational therapy increase bone stability, improve mobility
    and muscle strength, and prevent contractures and deformity; early physical
    therapy follows brief post-fracture immobilization.
  treatment_term:
    preferred_term: physical therapy
    term:
      id: MAXO:0000011
      label: physical therapy
  evidence:
  - reference: PMID:20301472
    reference_title: "COL1A1- and COL1A2-Related Osteogenesis Imperfecta."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Fractures are treated with as
      short a period of immobility as is practical, small and lightweight casts, and
      physical therapy as soon as casts are removed
    explanation: >-
      GeneReviews documents early physical therapy and brief immobilization as
      part of standard OI fracture rehabilitation.
