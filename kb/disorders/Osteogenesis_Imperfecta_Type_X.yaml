      loss accelerates ER-to-Golgi transit and compromises helical structure.
  downstream:
  - target: Defective Bone Collagen Matrix, Undermineralization, and Fragility
    description: >-
      Structurally defective, helically compromised collagen assembles into an
      abnormal bone extracellular matrix that fails to mineralize normally,
      producing skeletal fragility.
- name: Defective Bone Collagen Matrix, Undermineralization, and Fragility
  description: >-
    The misfolded, abnormally processed type I collagen assembles into a defective
    bone extracellular matrix with abnormal collagen fibril formation and impaired
    mineralization, yielding very low bone mineral density and severe bone
    fragility. Clinically this manifests as recurrent congenital fractures, bone
    deformity, and growth deficiency. The pivotal chaperone role of HSP47 in
    collagen matrix formation is underscored by the embryonic lethality of HSP47
    gene disruption in mice from impaired collagen fibril formation.
