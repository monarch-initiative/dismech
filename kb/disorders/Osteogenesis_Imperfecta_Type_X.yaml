      label: Recurrent fractures
  evidence:
  - reference: PMID:20188343
    reference_title: "Homozygosity for a missense mutation in SERPINH1, which encodes the collagen chaperone protein HSP47, results in severe recessive osteogenesis imperfecta."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Osteogenesis imperfecta (OI) is characterized by bone fragility and
      fractures that may be accompanied by bone deformity, dentinogenesis
      imperfecta, short stature, and shortened life span.
    explanation: >-
      Documents bone fragility and fractures as the cardinal feature of the OI
      phenotype caused by the SERPINH1 mutation.
