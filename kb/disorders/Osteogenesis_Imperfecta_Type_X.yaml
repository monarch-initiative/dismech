pathophysiology:
- name: SERPINH1 Loss Eliminates the ER Collagen-Specific Chaperone HSP47
  description: >-
    SERPINH1 encodes HSP47, an endoplasmic-reticulum-resident, collagen-specific
    molecular chaperone that binds collagenous (Gly-Xaa-Arg) repeats within
    triple-helical procollagen and is essential for its correct folding,
    accelerating and stabilizing triple-helix formation. The OI type X missense
    variant (p.Leu78Pro) destabilizes HSP47 and targets it for proteasomal
    degradation, so the chaperone is effectively absent from the ER. HSP47 acts
    downstream of the CRTAP/P3H1/CyPB prolyl 3-hydroxylation complex, functioning
    as a late ER folding chaperone and quality-control monitor rather than a
    collagen-modifying enzyme.
