diagnosis:
- name: Skin biopsy
  description: >-
    Skin biopsy of a characteristic lesion can support the diagnosis by showing
    thrombotic microangiopathy, endothelial injury, and fibrin deposition.
  diagnosis_term:
    preferred_term: skin biopsy
    term:
      id: MAXO:0000423
      label: biopsy of skin
  results: Pauci-inflammatory thrombotic microangiopathy with endothelial injury.
  evidence:
  - reference: PMID:38606375
    reference_title: "Malignant atrophic papulosis treated with eculizumab and hirudin: a fatal case report and literature review."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      The clinical diagnosis of MAP was supported by skin biopsy
    explanation: This directly supports skin biopsy as a diagnostic procedure.
  - reference: PMID:41474865
    reference_title: "The Evolution in the Cutaneous and Gastrointestinal Pathology of Pediatric Kohlmeier-Degos Disease Under Combined Modality Therapy."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      We had the opportunity of examining before and after treatment biopsies in
      a pediatric patient receiving the 3-drug protocol for the treatment of
      Kohlmeier-Degos disease.
    explanation: This supports tissue biopsy-based diagnosis and follow-up in MAP.
- name: Laparoscopy
  description: >-
    Abdominal symptoms may require prompt laparoscopy and evaluation to assess
    gastrointestinal involvement.
  diagnosis_term:
    preferred_term: laparoscopy
    term:
      id: MAXO:0001188
      label: laparoscopy
  results: Serosal porcelain plaques and severe intestinal ischemia.
  evidence:
  - reference: PMID:38606375
    reference_title: "Malignant atrophic papulosis treated with eculizumab and hirudin: a fatal case report and literature review."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      MAP patients who exhibit any abdominal symptoms should undergo laparoscopy
      and evaluation in time
    explanation: This directly supports laparoscopy for evaluation of abdominal symptoms in MAP.
treatments:
- name: Eculizumab
  description: >-
    Terminal complement inhibition is used in severe systemic disease, especially
    when gastrointestinal involvement is present.
  treatment_term:
    preferred_term: pharmacotherapy
    term:
      id: MAXO:0000058
      label: pharmacotherapy
    therapeutic_agent:
    - preferred_term: eculizumab
      term:
        id: NCIT:C48386
        label: Eculizumab
  evidence:
  - reference: PMID:36353773
    reference_title: "Atrophic Papulosis."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      eculizumab, a complement inhibitor, is the most effective therapy in
      malignant AP with gastrointestinal involvement of the disease and should
      be combined with treprostinil to prevent relapse.
    explanation: This directly supports eculizumab as a preferred treatment for severe MAP.
  - reference: PMID:38606375
    reference_title: "Malignant atrophic papulosis treated with eculizumab and hirudin: a fatal case report and literature review."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      start on eculizumab and treprostinil as soon as possible
    explanation: This supports eculizumab use in gastrointestinal MAP.
  - reference: PMID:41474865
    reference_title: "The Evolution in the Cutaneous and Gastrointestinal Pathology of Pediatric Kohlmeier-Degos Disease Under Combined Modality Therapy."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      The combination of therapeutic complement inhibition, downregulation of type I interferon expression, and the promotion of vascular patency and reduced platelet activation through prostacyclin administration define the cornerstone of treatment.
    explanation: This supports complement inhibition as a core treatment principle.
- name: Treprostinil
  description: >-
    Prostacyclin analogue therapy is paired with complement inhibition to
    improve vascular patency and reduce relapse risk.
  treatment_term:
    preferred_term: pharmacotherapy
    term:
      id: MAXO:0000058
      label: pharmacotherapy
    therapeutic_agent:
    - preferred_term: treprostinil
      term:
        id: CHEBI:50861
        label: treprostinil
  evidence:
  - reference: PMID:36353773
    reference_title: "Atrophic Papulosis."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      eculizumab, a complement inhibitor, is the most effective therapy in
      malignant AP with gastrointestinal involvement of the disease and should
      be combined with treprostinil to prevent relapse.
    explanation: This directly supports treprostinil as part of the recommended combination therapy.
  - reference: PMID:41474865
    reference_title: "The Evolution in the Cutaneous and Gastrointestinal Pathology of Pediatric Kohlmeier-Degos Disease Under Combined Modality Therapy."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      the promotion of vascular patency and reduced platelet activation through
      prostacyclin administration
    explanation: This supports prostacyclin-based therapy such as treprostinil in MAP.
  - reference: PMID:38606375
    reference_title: "Malignant atrophic papulosis treated with eculizumab and hirudin: a fatal case report and literature review."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      eculizumab and treprostinil as soon as possible
    explanation: This supports treprostinil as part of the disease-specific treatment approach.
differential_diagnoses:
- name: Systemic sclerosis
  disease_term:
    preferred_term: systemic sclerosis
    term:
      id: MONDO:0005100
      label: systemic sclerosis
  description: >-
    Scleroderma-like fibrosis and serosal involvement can resemble systemic
    sclerosis clinically and pathologically.
  evidence:
  - reference: PMID:35588602
    reference_title: "Exploring the pathophysiologic basis of constrictive pericarditis of Kohlmeier Degos disease: A case series and review of the literature."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      A profibrogenic process resembling scleroderma was seen
    explanation: This supports systemic sclerosis as an important clinical mimic.
- name: Vasculitis
  disease_term:
    preferred_term: vasculitis
    term:
      id: MONDO:0018882
      label: vasculitis
  description: >-
    MAP is an occlusive vasculopathy that can be mistaken for inflammatory
    vasculitis when skin and visceral ischemic lesions are present.
- name: Thromboangiitis obliterans
  disease_term:
    preferred_term: thromboangiitis obliterans
    term:
      id: MONDO:0008889
      label: thromboangiitis obliterans
  description: >-
    Multi-organ occlusive vascular lesions can raise concern for thromboangiitis
    obliterans in the differential diagnosis.
- name: Antiphospholipid syndrome
  disease_term:
    preferred_term: antiphospholipid syndrome
    term:
      id: MONDO:8000010
      label: antiphospholipid syndrome
  description: >-
    Thrombotic skin and visceral ischemia can resemble antiphospholipid
    syndrome.
