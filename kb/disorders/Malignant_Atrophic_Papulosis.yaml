name: Malignant Atrophic Papulosis
creation_date: "2026-04-15T23:58:50Z"
description: >-
  Malignant atrophic papulosis is a rare obliterative vasculopathy with
  characteristic atrophic porcelain-white papules. Disease expression ranges
  from purely cutaneous lesions to lethal gastrointestinal, neurologic, and
  cardiopulmonary involvement.
category: Complex
disease_term:
  preferred_term: malignant atrophic papulosis
  term:
    id: MONDO:0011208
    label: malignant atrophic papulosis
pathophysiology:
- name: Complement and interferon-mediated endothelial injury
  description: >-
    Complement activation and enhanced type I interferon signaling damage
    vascular endothelial cells and initiate the vasculopathic process.
  cell_types:
  - preferred_term: vascular endothelial cell
    term:
      id: CL:0002139
      label: endothelial cell of vascular tree
  biological_processes:
  - preferred_term: complement activation
    term:
      id: GO:0006956
      label: complement activation
  - preferred_term: type I interferon-mediated signaling pathway
    term:
      id: GO:0060337
      label: type I interferon-mediated signaling pathway
  evidence:
  - reference: PMID:35588602
    reference_title: "Exploring the pathophysiologic basis of constrictive pericarditis of Kohlmeier Degos disease: A case series and review of the literature."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      There was significant upregulation in type I interferon signaling in cases
      tested as revealed by the degree of staining for MXA, the surrogate type I
      interferon marker.
    explanation: >-
      This directly supports complement- and interferon-mediated endothelial
      injury as an initiating pathophysiologic event.
  - reference: PMID:41474865
    reference_title: "The Evolution in the Cutaneous and Gastrointestinal Pathology of Pediatric Kohlmeier-Degos Disease Under Combined Modality Therapy."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      complement pathway activation and enhanced type I interferon signaling are
      held to be a critical impetus for the endothelial cell injury
    explanation: >-
      This supports the same initiating endothelial injury mechanism in a
      treated pediatric case with paired skin and intestinal biopsies.
  downstream:
  - target: Thrombotic microangiopathy and arteriolar occlusion
    description: Endothelial injury promotes intravascular thrombosis and fibrointimal arteriopathy.
- name: Thrombotic microangiopathy and arteriolar occlusion
  description: >-
    The disease evolves into a thrombotic microvascular and arteriopathic
    vasculopathy with microangiopathy, neointimal hyperplasia, and obliterative
    vascular occlusion.
  biological_processes:
  - preferred_term: blood coagulation
    term:
      id: GO:0007596
      label: blood coagulation
  evidence:
  - reference: PMID:35588602
    reference_title: "Exploring the pathophysiologic basis of constrictive pericarditis of Kohlmeier Degos disease: A case series and review of the literature."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      a thrombogenic microangiopathy to a fibrointimal obliterative arteriopathy
      with an accompanying background of extravascular fibrosis
    explanation: >-
      This directly supports the occlusive microangiopathic and arteriopathic
      lesion that underlies downstream organ ischemia.
  - reference: PMID:41474865
    reference_title: "The Evolution in the Cutaneous and Gastrointestinal Pathology of Pediatric Kohlmeier-Degos Disease Under Combined Modality Therapy."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      endothelial cell necrosis and microvascular thrombosis and arteriolar and
      arterial neointimal hyperplasia with intimal fibrosis
    explanation: >-
      This provides direct pathologic evidence for thrombotic microangiopathy,
      arteriolar occlusion, and intimal fibrosis.
  downstream:
  - target: Papule
    description: Cutaneous microvascular occlusion produces the characteristic atrophic papules.
  - target: Abdominal pain
    description: Mesenteric involvement can cause abdominal pain and bowel symptoms.
  - target: Intestinal ischemia
    description: Gastrointestinal microvascular occlusion can progress to ischemia and perforation.
  - target: Stroke
    description: Central nervous system infarction can occur from small-vessel occlusion.
  - target: Constrictive pericarditis
    description: Serosal and pericardial involvement can culminate in constrictive pericarditis.
  - target: Extravascular fibrosing reaction
    description: >-
      Persistent vascular injury can extend into a fibrosing reaction in the
      surrounding tissues.
- name: Extravascular fibrosing reaction
  description: >-
    A fibrosing reaction develops in affected tissues, contributing to serosal
    and pericardial restriction.
  evidence:
  - reference: PMID:35588602
    reference_title: "Exploring the pathophysiologic basis of constrictive pericarditis of Kohlmeier Degos disease: A case series and review of the literature."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      A potentially lethal complication of Kohlmeier-Degos disease is
      constrictive pericarditis and pleuritis
    explanation: >-
      This supports a fibrosing serosal/pericardial complication of the
      vasculopathy.
  - reference: PMID:41474865
    reference_title: "The Evolution in the Cutaneous and Gastrointestinal Pathology of Pediatric Kohlmeier-Degos Disease Under Combined Modality Therapy."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Extravascular fibrosis with a loss in the expression of CD34 amid
      fibroblasts was observed
    explanation: This directly supports a fibrosing reaction in affected tissues.
histopathology:
- name: Pauci-inflammatory microangiopathy with intimal fibrosis
  finding_term:
    preferred_term: fibrosis
    term:
      id: NCIT:C3044
      label: Fibrosis
  description: >-
    Histology shows pauci-inflammatory microangiopathy, endothelial necrosis,
    arteriolar and arterial neointimal hyperplasia with intimal fibrosis,
    vascular C5b-9 deposition, and extravascular fibrosis.
  evidence:
  - reference: PMID:41474865
    reference_title: "The Evolution in the Cutaneous and Gastrointestinal Pathology of Pediatric Kohlmeier-Degos Disease Under Combined Modality Therapy."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      pauci-inflammatory microangiopathy associated with endothelial cell
      necrosis and microvascular thrombosis and arteriolar and arterial
      neointimal hyperplasia with intimal fibrosis, extensive vascular C5b-9
      deposition and enhanced type I interferon signaling in the skin and
      intestine
    explanation: >-
      This directly supports the characteristic MAP histopathology and
      vascular injury pattern.
phenotypes:
- name: Papule
  category: Dermatologic
  frequency: VERY_FREQUENT
  description: >-
    Characteristic porcelain-white atrophic papules with erythematous or
    telangiectatic rims are the defining skin lesion.
  phenotype_term:
    preferred_term: papule
    term:
      id: HP:0200034
      label: papule
  evidence:
  - reference: PMID:36353773
    reference_title: "Atrophic Papulosis."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      The pathognomonic skin lesions evolve over time and are large papules with
      an atrophic porcelain-white center and an erythematous rim
    explanation: This directly describes the hallmark cutaneous lesion of malignant atrophic papulosis.
  - reference: PMID:41474865
    reference_title: "The Evolution in the Cutaneous and Gastrointestinal Pathology of Pediatric Kohlmeier-Degos Disease Under Combined Modality Therapy."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      depressed white macular skin lesions
    explanation: This supports the characteristic cutaneous lesion morphology.
- name: Telangiectasia
  category: Dermatologic
  frequency: FREQUENT
  description: >-
    Lesions often develop an erythematous or telangiectatic rim.
  phenotype_term:
    preferred_term: telangiectasia
    term:
      id: HP:0001009
      label: telangiectasia
  evidence:
  - reference: PMID:41474865
