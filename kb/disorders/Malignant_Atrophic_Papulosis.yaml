    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      depressed porcelain white plaques with telangiectatic rims
    explanation: This directly supports telangiectatic lesion margins.
- name: Abdominal pain
  category: Gastrointestinal
  frequency: OCCASIONAL
  description: >-
    Abdominal pain often reflects gastrointestinal tract involvement.
  phenotype_term:
    preferred_term: abdominal pain
    term:
      id: HP:0002027
      label: abdominal pain
  evidence:
  - reference: PMID:38606375
    reference_title: "Malignant atrophic papulosis treated with eculizumab and hirudin: a fatal case report and literature review."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      intermittent abdominal pain
    explanation: This directly documents abdominal pain in MAP with systemic disease.
- name: Intestinal ischemia
  category: Gastrointestinal
  frequency: OCCASIONAL
  description: >-
    Mesenteric and intestinal vascular occlusion can produce bowel ischemia
    and perforation.
  phenotype_term:
    preferred_term: intestinal ischemia
    term:
      id: HP:0033404
      label: intestinal ischemia
  evidence:
  - reference: PMID:41474865
    reference_title: "The Evolution in the Cutaneous and Gastrointestinal Pathology of Pediatric Kohlmeier-Degos Disease Under Combined Modality Therapy."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      evidence of acute severe intestinal ischemia
    explanation: This directly supports intestinal ischemia as a gastrointestinal manifestation.
  - reference: PMID:38606375
    reference_title: "Malignant atrophic papulosis treated with eculizumab and hirudin: a fatal case report and literature review."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      recurrent bowel perforation
    explanation: This supports severe intestinal vascular injury downstream of the disease process.
- name: Stroke
  category: Neurologic
  frequency: OCCASIONAL
  description: >-
    Cerebral small-vessel occlusion can lead to infarction and stroke.
  phenotype_term:
    preferred_term: stroke
    term:
      id: HP:0001297
      label: stroke
  evidence:
  - reference: PMID:36353773
    reference_title: "Atrophic Papulosis."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Gastrointestinal involvement and central nervous system infarctions are
      the most frequent causes of death
    explanation: Central nervous system infarctions support stroke as a recognized systemic complication.
- name: Constrictive pericarditis
  category: Cardiovascular
  frequency: OCCASIONAL
  description: >-
    Serosal and pericardial fibrosis can lead to constrictive pericarditis and
    restrictive cardiopulmonary failure.
  phenotype_term:
    preferred_term: constrictive pericarditis
    term:
      id: HP:0002563
      label: constrictive pericarditis
  evidence:
  - reference: PMID:35588602
    reference_title: "Exploring the pathophysiologic basis of constrictive pericarditis of Kohlmeier Degos disease: A case series and review of the literature."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      A potentially lethal complication of Kohlmeier-Degos disease is
      constrictive pericarditis and pleuritis
    explanation: This directly supports constrictive pericarditis as a clinical complication.
