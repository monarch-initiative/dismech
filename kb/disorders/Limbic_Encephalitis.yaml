biochemical:
- name: Serum or CSF Neuronal Antigen Antibodies
  presence: Positive in many cases
  context: Serum or cerebrospinal fluid
  notes: >
    Neuronal antibodies define many autoimmune and paraneoplastic limbic
    encephalitis subgroups, although antibody-negative autoimmune limbic
    encephalitis is recognized clinically.
  evidence:
  - reference: PMID:23250843
    reference_title: "Limbic encephalitis and related cortical syndromes."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Serum and cerebrospinal antibodies against neuronal antigens can be detected in most patients."
    explanation: >
      The review supports neuronal antibody testing in serum and CSF as a key
      biomarker domain.
  - reference: DOI:10.3390/cells13010015
    reference_title: Pathophysiological Effects of Autoantibodies in Autoimmune Encephalitides
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "There are many subtypes of autoimmune encephalitides, which now entails both diseases with autoantibodies targeting extracellular antigens and classical paraneoplastic syndromes with autoantibodies targeting intracellular antigens."
    explanation: >
      This review supports the split between extracellular neuronal
      antigen-associated disease and intracellular paraneoplastic antibody
      syndromes.
- name: LGI1 Antibodies
  presence: Positive in subtype
  context: Serum or cerebrospinal fluid
  evidence:
  - reference: PMID:20663977
    reference_title: "Antibodies to Kv1 potassium channel-complex proteins leucine-rich, glioma inactivated 1 protein and contactin-associated protein-2 in limbic encephalitis, Morvan's syndrome and acquired neuromyotonia."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Antibodies to Kv1 subunits were found in three sera, to contactin-associated protein-2 in 19 sera, to leucine-rich, glioma inactivated 1 protein in 55 sera and to contactin-2 in five sera"
    explanation: >
      The cohort identifies LGI1 antibodies as the largest VGKC-complex target
      group.
- name: CASPR2 Antibodies
  presence: Positive in subtype
  context: Serum or cerebrospinal fluid
  evidence:
  - reference: PMID:20663977
    reference_title: "Antibodies to Kv1 potassium channel-complex proteins leucine-rich, glioma inactivated 1 protein and contactin-associated protein-2 in limbic encephalitis, Morvan's syndrome and acquired neuromyotonia."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Antibodies to Kv1 subunits were found in three sera, to contactin-associated protein-2 in 19 sera, to leucine-rich, glioma inactivated 1 protein in 55 sera and to contactin-2 in five sera"
    explanation: >
      CASPR2 antibodies define one VGKC-complex antibody subgroup relevant to
      limbic encephalitis and Morvan/neuromyotonia phenotypes.
- name: GABAB Receptor Antibodies
  presence: Positive in subtype
  context: Serum or cerebrospinal fluid
  evidence:
  - reference: PMID:19962348
    reference_title: "Antibodies to the GABA(B) receptor in limbic encephalitis with seizures: case series and characterisation of the antigen."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "All patients had antibodies (mainly IgG1) against a neuronal cell-surface antigen; in three patients antibodies were detected only in CSF."
    explanation: >
      The GABAB receptor case series demonstrates subtype-defining neuronal
      cell-surface antibodies, including CSF-only detection in some patients.
- name: AMPAR GluR1/GluR2 Antibodies
  presence: Positive in subtype
  context: Serum or cerebrospinal fluid
  evidence:
  - reference: PMID:19338055
    reference_title: "AMPA receptor antibodies in limbic encephalitis alter synaptic receptor location."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "All patients had antibodies against neuronal cell surface antigens that by immunoprecipitation were found to be the glutamate receptor 1 (GluR1) and GluR2 subunits"
    explanation: >
      The AMPAR subtype is defined by GluR1/GluR2 neuronal surface antibodies.
environmental:
- name: Underlying Neoplasm
  description: >-
    Limbic encephalitis can be paraneoplastic; tumor type and antibody class
    affect prognosis, evaluation, and treatment.
  effect: Triggers or sustains paraneoplastic autoimmunity
  evidence:
  - reference: PMID:23250843
    reference_title: "Limbic encephalitis and related cortical syndromes."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Some patients develop limbic encephalitis as a paraneoplastic manifestation of systemic cancer, where immune tolerance is thought to be lost."
    explanation: >
      The review supports systemic cancer as a trigger for paraneoplastic limbic
      encephalitis.
- name: Small-Cell Lung Cancer
  description: >-
    Small-cell lung cancer is a major tumor association, particularly in
    classic paraneoplastic limbic encephalitis and GABAB receptor antibody
    limbic encephalitis.
  effect: Paraneoplastic trigger
  evidence:
  - reference: PMID:19962348
    reference_title: "Antibodies to the GABA(B) receptor in limbic encephalitis with seizures: case series and characterisation of the antigen."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Seven of 15 patients had tumours, five of which were small-cell lung cancer, and seven patients had non-neuronal autoantibodies."
    explanation: >
      The GABAB receptor antibody series shows small-cell lung cancer was the
      dominant tumor association.
- name: Thymus, Breast, or Lung Tumor
  description: >-
    AMPAR antibody limbic encephalitis is often associated with tumors of the
    thymus, breast, or lung.
  effect: Paraneoplastic trigger
  evidence:
  - reference: PMID:19338055
    reference_title: "AMPA receptor antibodies in limbic encephalitis alter synaptic receptor location."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Seven had tumors of the lung, breast, or thymus."
    explanation: >
      The AMPAR antibody cohort identifies lung, breast, and thymus tumors as
      important paraneoplastic associations.
progression:
- phase: Subacute limbic syndrome onset
  notes: >
    Limbic encephalitis commonly begins over weeks with memory impairment,
    confusion, behavioral or psychiatric change, and seizures.
  evidence:
  - reference: PMID:19338055
    reference_title: "AMPA receptor antibodies in limbic encephalitis alter synaptic receptor location."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Nine patients presented with subacute (< 8 weeks) confusion, disorientation and memory loss, classic of LE; 1 patient presented with a 4 month history of progressive memory loss, behavioral change and agitation"
    explanation: >
      The AMPAR cohort illustrates the usual subacute limbic presentation.
- phase: Diagnostic evaluation and antibody/tumor stratification
  notes: >
    Workup integrates MRI, EEG, CSF, serum/CSF antibody testing, and malignancy
    screening because antibody subtype and tumor status shape prognosis and
    treatment.
  evidence:
  - reference: PMID:23250843
    reference_title: "Limbic encephalitis and related cortical syndromes."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "According to the type of antibodies found, patients may be classified into two broad groups, with implications for neurological and cancer diagnosis, treatment and prognosis."
    explanation: >
      Antibody grouping is central to diagnostic and prognostic stratification.
  - reference: PMID:38497971
    reference_title: "Magnetic Resonance Imaging Characteristics of LGI1-Antibody and CASPR2-Antibody Encephalitis."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "These observations should assist clinical decision-making toward expediting immunotherapy."
    explanation: >
      MRI patterns can help distinguish autoimmune limbic encephalitis from
      infectious and degenerative mimics while antibody results are pending.
- phase: Treatment response, recovery, or relapse
  notes: >
    Cell-surface antibody-associated disease is often immunotherapy responsive,
    but relapse and residual cognitive or behavioral deficits can occur,
    especially if relapses are not promptly controlled.
  evidence:
  - reference: PMID:19338055
    reference_title: "AMPA receptor antibodies in limbic encephalitis alter synaptic receptor location."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Antibodies to GluR1/2 associate with LE that is often paraneoplastic, treatment responsive, and has a tendency to relapse."
    explanation: >
      AMPAR antibody limbic encephalitis illustrates both treatment response
      and relapse risk.
  - reference: PMID:26559389
    reference_title: "Immune therapy in autoimmune encephalitis: a systematic review."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "patients given immune therapy do better and relapse less than patients given no treatment."
    explanation: >
      The systematic review supports immune therapy as improving outcomes and
      reducing relapse across autoimmune encephalitis.
