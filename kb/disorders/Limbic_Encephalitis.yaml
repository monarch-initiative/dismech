    snippet: "Treatment should be started within the first 4 weeks of symptoms. The first-line option is methylprednisolone plus intravenous immunoglobulin (IVIG) or plasmapheresis, the second-line includes rituximab and/or cyclophosphamide, while third-line treatment options are bortezomib and tocilizumab."
    explanation: >
      The 2024 consensus recommendation supports early treatment timing and the
      first-line treatment combination options.
