- name: AMPAR Synaptic Cluster Loss
  description: >-
    AMPAR autoantibodies bind GluR1/GluR2-containing receptors on hippocampal
    neurons and reduce synaptic AMPAR cluster number and localization, producing
    potentially reversible limbic dysfunction.
  cell_types:
  - preferred_term: neuron
    term:
      id: CL:0000540
      label: neuron
  locations:
  - preferred_term: hippocampal formation
    term:
      id: UBERON:0002421
      label: hippocampal formation
  biological_processes:
  - preferred_term: glutamate receptor signaling pathway
    modifier: DECREASED
    term:
      id: GO:0007215
      label: glutamate receptor signaling pathway
  - preferred_term: synapse organization
    modifier: ABNORMAL
    term:
      id: GO:0050808
      label: synapse organization
  downstream:
  - target: Limbic Network Dysfunction
    description: >
      Reduced synaptic AMPAR localization impairs hippocampal excitatory
      signaling involved in memory and seizures.
    evidence:
    - reference: PMID:19338055
      reference_title: "AMPA receptor antibodies in limbic encephalitis alter synaptic receptor location."
      supports: SUPPORT
      evidence_source: IN_VITRO
      snippet: "AMPAR are ionotropic glutamate receptors that are highly conserved among mammals, and mediate most of the fast excitatory neurotransmission in the brain."
      explanation: >
        AMPAR localization effects can disrupt excitatory neurotransmission in
        limbic circuitry.
  evidence:
  - reference: PMID:19338055
    reference_title: "AMPA receptor antibodies in limbic encephalitis alter synaptic receptor location."
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: "Application of antibodies to cultures of neurons significantly decreased the number of GluR2-containing AMPAR clusters at synapses with a smaller decrease in overall AMPAR cluster density; these effects were reversed after antibody removal."
    explanation: >
      Patient antibodies directly altered AMPAR synaptic clusters in neuronal
      culture.
