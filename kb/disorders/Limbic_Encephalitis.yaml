description: >-
  Limbic encephalitis is an autoimmune or paraneoplastic encephalitis syndrome
  centered on medial temporal and other limbic regions. It typically presents
  with short-term memory impairment, seizures, confusion or psychiatric and
  behavioral symptoms, and may be supported by neuronal antibody testing, CSF
  inflammation, temporal-lobe EEG abnormalities, and medial temporal MRI
  T2/FLAIR hyperintensity. Treatment depends on antibody and tumor context and
  commonly combines immunotherapy with tumor-directed therapy when a neoplasm is
  identified.
has_subtypes:
- name: Autoimmune Limbic Encephalitis
  subtype_term:
    preferred_term: autoimmune limbic encephalitis
    term:
      id: MONDO:0850097
      label: autoimmune limbic encephalitis
  description: >-
    Autoimmune limbic encephalitis is the antibody-associated or
    seronegative autoimmune subgroup involving mesial temporal structures, with
    subacute memory, seizure, psychiatric, CSF, EEG, MRI, or antibody evidence.
  evidence:
  - reference: PMID:26906964
    reference_title: "A clinical approach to diagnosis of autoimmune encephalitis."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "we based the initial diagnostic approach on neurological assessment and conventional tests that are accessible to most clinicians."
    explanation: >
      The Graus consensus framework supports diagnosing autoimmune
      encephalitis syndromes using clinical and conventional paraclinical tests
      rather than waiting for antibody or treatment-response results.
- name: Classic Paraneoplastic Limbic Encephalitis
  subtype_term:
    preferred_term: classic paraneoplastic limbic encephalitis
    term:
      id: MONDO:0015590
      label: classic paraneoplastic limbic encephalitis
  description: >-
    A cancer-associated limbic encephalitis subgroup, often linked to
    intracellular/onconeural antibodies such as Hu, Ma2, amphiphysin, or
    CV2/CRMP5 and commonly requiring combined antineoplastic and
    immunomodulatory treatment.
  evidence:
  - reference: PMID:23250843
    reference_title: "Limbic encephalitis and related cortical syndromes."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Some patients develop limbic encephalitis as a paraneoplastic manifestation of systemic cancer, where immune tolerance is thought to be lost."
    explanation: >
      The review supports paraneoplastic limbic encephalitis as a major
      disease subgroup.
  - reference: PMID:23250843
    reference_title: "Limbic encephalitis and related cortical syndromes."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Patients with antibodies to intracellular neuronal antigens (onconeuronal antibodies: Hu, Ma2, amphiphysin, CV2/CRMP5) almost invariably have an underlying neoplasm (lung, testis, breast, etc.)"
    explanation: >
      Intracellular/onconeural antibody-associated limbic encephalitis is
      strongly linked to underlying neoplasia.
- name: Limbic Encephalitis with LGI1 Antibodies
  subtype_term:
    preferred_term: limbic encephalitis with LGI1 antibodies
    term:
      id: MONDO:0015592
      label: limbic encephalitis with LGI1 antibodies
  description: >-
    LGI1-antibody limbic encephalitis is a common neuronal-surface antibody
    subtype, usually non-paraneoplastic, often affecting older adults and
    associated with cognitive symptoms, seizures, faciobrachial dystonic
    seizures, and hyponatremia.
  evidence:
  - reference: DOI:10.3389/fneur.2021.674368
    reference_title: "Clinical Characteristics and Long-Term Prognosis of Anti-LGI1 Encephalitis: A Single-Center Cohort Study in Beijing, China"
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "All patients presented with seizures at the initial consultation. Other common manifestations included cognitive dysfunction (82.2%), psychiatric disturbance (66.7%), sleep disorder (54.5%), and hyponatremia (66.7%)."
    explanation: >
      This LGI1 cohort supports seizures, cognitive and psychiatric symptoms,
      sleep disturbance, and hyponatremia as common anti-LGI1 encephalitis
      features.
  - reference: PMID:20663977
    reference_title: "Antibodies to Kv1 potassium channel-complex proteins leucine-rich, glioma inactivated 1 protein and contactin-associated protein-2 in limbic encephalitis, Morvan's syndrome and acquired neuromyotonia."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "leucine-rich, glioma inactivated 1 protein-antibody positive patients (P < 0.0001), who predominantly had limbic encephalitis."
    explanation: >
      This antibody-characterization cohort supports LGI1 antibodies as a
      major marker of limbic encephalitis.
- name: Limbic Encephalitis with CASPR2 Antibodies
  subtype_term:
    preferred_term: limbic encephalitis with caspr2 antibodies
    term:
      id: MONDO:0017179
      label: limbic encephalitis with caspr2 antibodies
  description: >-
    CASPR2-antibody limbic encephalitis overlaps with peripheral nerve
    hyperexcitability and Morvan syndrome and has a stronger tumor and poorer
    prognosis signal than LGI1-antibody disease in early VGKC-complex cohorts.
  evidence:
  - reference: PMID:20663977
    reference_title: "Antibodies to Kv1 potassium channel-complex proteins leucine-rich, glioma inactivated 1 protein and contactin-associated protein-2 in limbic encephalitis, Morvan's syndrome and acquired neuromyotonia."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "detection of contactin-associated protein-2 antibodies should help identify the risk of an underlying tumour and a poor prognosis in future patients."
    explanation: >
      The study distinguishes CASPR2-antibody disease from LGI1-antibody
      limbic encephalitis by tumor and prognosis associations.
- name: GABAB Receptor Autoimmune Limbic Encephalitis
  description: >-
    A neuronal-surface antibody subtype characterized by prominent seizures and
    frequent association with small-cell lung cancer, although non-paraneoplastic
    cases also occur.
  evidence:
  - reference: PMID:19962348
    reference_title: "Antibodies to the GABA(B) receptor in limbic encephalitis with seizures: case series and characterisation of the antigen."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "GABA(B) receptor autoimmune encephalitis is a potentially treatable disorder characterised by seizures and, in some patients, associated with small-cell lung cancer and with other autoantibodies."
    explanation: >
      The case series defines the GABAB receptor antibody-associated limbic
      encephalitis phenotype.
- name: AMPAR Autoimmune Limbic Encephalitis
  description: >-
    A GluR1/GluR2 AMPA receptor antibody-associated subtype that is often
    paraneoplastic, treatment responsive, and relapse prone.
  evidence:
  - reference: PMID:19338055
    reference_title: "AMPA receptor antibodies in limbic encephalitis alter synaptic receptor location."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Antibodies to GluR1/2 associate with LE that is often paraneoplastic, treatment responsive, and has a tendency to relapse."
    explanation: >
      The AMPAR antibody study supports a distinct antibody-defined limbic
      encephalitis subtype.
definitions:
- name: Limbic encephalitis clinical syndrome
  definition_type: CASE_DEFINITION
  description: >-
    Limbic encephalitis is recognized clinically by an encephalitic syndrome
    centered on limbic structures, especially subacute short-term memory
    impairment, seizures, confusion, psychiatric or behavioral symptoms, and
    supportive MRI, EEG, CSF, or antibody evidence after exclusion of competing
    causes.
  criteria_sets:
  - name: Core limbic syndrome features
    core_clinical_characteristics:
    - preferred_term: Memory impairment
      term:
        id: HP:0002354
        label: Memory impairment
      description: Short-term or working memory impairment.
    - preferred_term: Seizure
      term:
        id: HP:0001250
        label: Seizure
      description: Focal temporal-lobe seizures, generalized seizures, or status epilepticus.
    - preferred_term: Confusion
      term:
        id: HP:0001289
        label: Confusion
      description: Confusion or disorientation.
    - preferred_term: Psychosis
      term:
        id: HP:0000709
        label: Psychosis
      description: Psychiatric symptoms may include psychosis, hallucinations, anxiety, or mood symptoms.
    evidence:
    - reference: PMID:19338055
      reference_title: "AMPA receptor antibodies in limbic encephalitis alter synaptic receptor location."
      supports: SUPPORT
      evidence_source: HUMAN_CLINICAL
      snippet: "Limbic encephalitis (LE) is an inflammatory disorder that predominantly affects the grey matter of the medial temporal lobes, amygdala, and orbitofrontal cortex."
      explanation: >
        The full-text introduction defines the anatomical limbic syndrome.
    - reference: PMID:19338055
      reference_title: "AMPA receptor antibodies in limbic encephalitis alter synaptic receptor location."
      supports: SUPPORT
      evidence_source: HUMAN_CLINICAL
      snippet: "As a result patients develop short-term memory deficits, emotional and behavioral disturbances, seizures, and sometimes dementia."
      explanation: >
        This statement supports the core clinical features used in the criteria
        set.
  evidence:
  - reference: PMID:26906964
    reference_title: "A clinical approach to diagnosis of autoimmune encephalitis."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Through logical differential diagnosis, levels of evidence for autoimmune encephalitis (possible, probable, or definite) are achieved, which can lead to prompt immunotherapy."
    explanation: >
      The consensus review supports a graded syndrome-based diagnostic
      approach that can guide early treatment.
