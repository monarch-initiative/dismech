name: Diastrophic Dysplasia
creation_date: '2026-03-04T07:00:00Z'
updated_date: '2026-03-04T08:45:04Z'
category: Mendelian
description: >
  Diastrophic dysplasia is an autosomal recessive skeletal dysplasia caused by
  biallelic pathogenic variants in SLC26A2. Deficient sulfate transport causes
  proteoglycan undersulfation in cartilage matrix, disrupting endochondral
  ossification and producing a characteristic pattern of limb shortening, joint
  contractures, spinal deformity, and hand/foot malformations.
disease_term:
  preferred_term: diastrophic dysplasia
  term:
    id: MONDO:0009107
    label: diastrophic dysplasia
parents:
- Skeletal Dysplasia
inheritance:
- name: Autosomal Recessive
  description: >
    Diastrophic dysplasia is inherited in an autosomal recessive pattern due to
    biallelic SLC26A2 pathogenic variants.
  evidence:
  - reference: PMID:24598000
    reference_title: "SLC26A2 disease spectrum in Sweden - high frequency of recessive multiple epiphyseal dysplasia (rMED)."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Diastrophic dysplasia (DTD) is an autosomal recessive skeletal dysplasia
      caused by SLC26A2 mutations.
    explanation: >-
      This cohort report directly states recessive inheritance and SLC26A2
      causality.
pathophysiology:
- name: Sulfate Transport Defect in Cartilage
  description: >
    Loss of SLC26A2 transporter activity reduces intracellular sulfate in
    chondrocytes and causes undersulfation of cartilage proteoglycans, altering
    extracellular matrix composition.
  cell_types:
  - preferred_term: Chondrocyte
    term:
      id: CL:0000138
      label: chondrocyte
  biological_processes:
  - preferred_term: Cartilage Development
    term:
      id: GO:0051216
      label: cartilage development
  - preferred_term: Extracellular Matrix Organization
    term:
      id: GO:0030198
      label: extracellular matrix organization
  evidence:
  - reference: PMID:23369989
    reference_title: "Alteration of proteoglycan sulfation affects bone growth and remodeling."
    supports: SUPPORT
    evidence_source: MODEL_ORGANISM
    snippet: >-
      Diastrophic dysplasia (DTD) is a chondrodysplasia caused by mutations in
      the SLC26A2 gene, leading to reduced intracellular sulfate pool in
      chondrocytes, osteoblasts and fibroblasts.
    explanation: >-
      The study links SLC26A2 dysfunction to sulfate depletion in skeletal
      matrix-producing cells.
  - reference: PMID:23369989
    reference_title: "Alteration of proteoglycan sulfation affects bone growth and remodeling."
    supports: SUPPORT
    evidence_source: MODEL_ORGANISM
    snippet: >-
      Hence, proteoglycans are undersulfated in the cartilage and bone of DTD
      patients.
    explanation: >-
      This directly supports proteoglycan undersulfation as the biochemical core
      of disease.
- name: Impaired Endochondral Ossification
  description: >
    Defective cartilage matrix quality disrupts growth plate maturation,
    delaying ossification and leading to disproportionate skeletal growth.
  biological_processes:
  - preferred_term: Endochondral Ossification
    term:
      id: GO:0001958
      label: endochondral ossification
  evidence:
  - reference: PMID:15703192
    reference_title: "A diastrophic dysplasia sulfate transporter (SLC26A2) mutant mouse: morphological and biochemical characterization of the resulting chondrodysplasia phenotype."
    supports: SUPPORT
    evidence_source: MODEL_ORGANISM
    snippet: >-
      The skeletal phenotype included reduced toluidine blue staining of
      cartilage, chondrocytes of irregular size, delay in the formation of the
      secondary ossification center and osteoporosis of long bones.
    explanation: >-
      The mouse model shows growth-plate/cartilage abnormalities and delayed
      ossification, supporting impaired endochondral bone development.
- name: UPR-Dependent FGFR3 Overactivation
  description: >
    SLC26A2 deficiency can trigger unfolded protein response signaling in
    chondrocytes that secondarily overactivates FGFR3 signaling, worsening
    growth plate dysfunction.
  cell_types:
  - preferred_term: Chondrocyte
    term:
      id: CL:0000138
      label: chondrocyte
  biological_processes:
  - preferred_term: Response to Unfolded Protein
    term:
      id: GO:0006986
      label: response to unfolded protein
  - preferred_term: Fibroblast Growth Factor Receptor Signaling Pathway
    term:
      id: GO:0008543
      label: fibroblast growth factor receptor signaling pathway
  evidence:
  - reference: PMID:30685387
    reference_title: "Suppressing UPR-dependent overactivation of FGFR3 signaling ameliorates SLC26A2-deficient chondrodysplasias."
    supports: SUPPORT
    evidence_source: MODEL_ORGANISM
    snippet: >-
      As a consequence, the ATF6 arm of the unfolded protein response (UPR) is
      preferentially triggered to overactivate FGFR3 signaling by inducing
      excessive FGFR3 in slc26a2-/- chondrocytes.
    explanation: >-
      This identifies a mechanistic link between SLC26A2 deficiency, UPR
      activation, and pathogenic FGFR3 over-signaling.
