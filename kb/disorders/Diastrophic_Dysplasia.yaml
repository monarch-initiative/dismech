name: Diastrophic Dysplasia
creation_date: '2026-03-04T07:00:00Z'
updated_date: '2026-03-04T07:26:21Z'
category: Mendelian
description: >
  Diastrophic dysplasia is an autosomal recessive skeletal dysplasia caused by
  biallelic pathogenic variants in SLC26A2. Impaired sulfate transport in
  chondrocytes causes undersulfation of cartilage proteoglycans, disrupting
  extracellular matrix organization and endochondral ossification.
disease_term:
  preferred_term: diastrophic dysplasia
  term:
    id: MONDO:0009107
    label: diastrophic dysplasia
parents:
- Skeletal Dysplasia
inheritance:
- name: Autosomal Recessive
  description: >
    Diastrophic dysplasia is inherited in an autosomal recessive pattern due to
    biallelic SLC26A2 pathogenic variants.
  evidence:
  - reference: PMID:34064542
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      SLC26A2-Associated Diastrophic Dysplasia and rMED-Clinical Features in Affected Finnish Children and Review of the Literature.
    explanation: >-
      This clinical review characterizes SLC26A2-associated diastrophic
      dysplasia and supports recessive inheritance for the SLC26A2 spectrum.
pathophysiology:
- name: Sulfate Transport Defect in Cartilage
  description: >
    Loss of SLC26A2 transporter function reduces intracellular sulfate in
    chondrocytes, causing undersulfation of proteoglycans and abnormal cartilage
    extracellular matrix composition.
  cell_types:
  - preferred_term: Chondrocyte
    term:
      id: CL:0000138
      label: chondrocyte
  biological_processes:
  - preferred_term: Cartilage Development
    term:
      id: GO:0051216
      label: cartilage development
  - preferred_term: Extracellular Matrix Organization
    term:
      id: GO:0030198
      label: extracellular matrix organization
  evidence:
  - reference: PMID:15703192
    supports: SUPPORT
    evidence_source: MODEL_ORGANISM
    snippet: >-
      A diastrophic dysplasia sulfate transporter (SLC26A2) mutant mouse: morphological and biochemical characterization of the resulting chondrodysplasia phenotype.
    explanation: >-
      A mutant SLC26A2 mouse model demonstrates the transporter defect and
      resulting chondrodysplasia phenotype, supporting sulfate-transport-driven
      cartilage pathology.
- name: Impaired Endochondral Ossification
  description: >
    Defective cartilage matrix quality leads to disturbed growth plate biology,
    impaired endochondral ossification, and disproportionate skeletal growth.
  biological_processes:
  - preferred_term: Endochondral Ossification
    term:
      id: GO:0001958
      label: endochondral ossification
  evidence:
  - reference: PMID:34064542
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      SLC26A2-Associated Diastrophic Dysplasia and rMED-Clinical Features in Affected Finnish Children and Review of the Literature.
    explanation: >-
      This review links SLC26A2-related cartilage abnormalities to the core
      skeletal growth defects seen in diastrophic dysplasia.
genetic:
- name: SLC26A2 Pathogenic Variants
  association: Causative
  notes: >
    Biallelic pathogenic variants in SLC26A2 are causative for diastrophic
    dysplasia.
  evidence:
  - reference: PMID:34064542
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      SLC26A2-Associated Diastrophic Dysplasia and rMED-Clinical Features in Affected Finnish Children and Review of the Literature.
    explanation: >-
      This study directly reviews and summarizes the causal association between
      SLC26A2 variants and the diastrophic dysplasia phenotype.
phenotypes:
- name: Short Stature
  description: >
    Affected individuals typically have disproportionate short stature due to
    impaired endochondral bone growth.
  phenotype_term:
    preferred_term: Short stature
    term:
      id: HP:0004322
      label: Short stature
  evidence:
  - reference: PMID:34064542
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      SLC26A2-Associated Diastrophic Dysplasia and rMED-Clinical Features in Affected Finnish Children and Review of the Literature.
    explanation: >-
      Clinical characterization of SLC26A2-associated disease includes
      disproportionate skeletal growth defects with short stature.
- name: Platyspondyly
  description: >
    Vertebral flattening and spinal deformity can occur as part of the skeletal
    dysplasia pattern.
  phenotype_term:
    preferred_term: Platyspondyly
    term:
      id: HP:0000926
      label: Platyspondyly
  evidence:
  - reference: PMID:34064542
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      SLC26A2-Associated Diastrophic Dysplasia and rMED-Clinical Features in Affected Finnish Children and Review of the Literature.
    explanation: >-
      The clinical spectrum review describes characteristic vertebral and
      spinal abnormalities in SLC26A2-associated skeletal dysplasia.
