      clinical management.
- name: FGFR3 Signaling Inhibition (Investigational)
  description: >
    Experimental FGFR inhibition has shown rescue of cartilage growth in
    SLC26A2-deficient models and represents a potential targeted therapy.
  treatment_term:
    preferred_term: pharmacotherapy
    term:
      id: MAXO:0000058
      label: pharmacotherapy
  target_mechanisms:
  - target: UPR-Dependent FGFR3 Overactivation
    treatment_effect: INHIBITS
    evidence:
    - reference: PMID:30685387
      reference_title: "Suppressing UPR-dependent overactivation of FGFR3 signaling ameliorates SLC26A2-deficient chondrodysplasias."
      supports: SUPPORT
      evidence_source: MODEL_ORGANISM
      snippet: >-
        Consistently, suppressing FGFR3 signaling by blocking either FGFR3 or
        phosphorylation of the downstream effector favors the recovery of
        slc26a2-/- cartilage cultures from impaired growth and unbalanced cell
        proliferation and apoptosis.
      explanation: >-
        This mechanistic evidence supports inhibiting FGFR3-pathway activity to
        counter downstream growth-plate dysfunction.
  evidence:
  - reference: PMID:30685387
    reference_title: "Suppressing UPR-dependent overactivation of FGFR3 signaling ameliorates SLC26A2-deficient chondrodysplasias."
    supports: SUPPORT
    evidence_source: MODEL_ORGANISM
    snippet: >-
      Consistently, suppressing FGFR3 signaling by blocking either FGFR3 or
      phosphorylation of the downstream effector favors the recovery of
      slc26a2-/- cartilage cultures from impaired growth and unbalanced cell
      proliferation and apoptosis.
    explanation: >-
      Mouse-model experiments show that reducing FGFR3 pathway activity can
      partially rescue growth-plate defects.
