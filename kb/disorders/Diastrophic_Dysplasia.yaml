  - preferred_term: SLC26A2
    term:
      id: hgnc:10994
      label: SLC26A2
  molecular_functions:
  - preferred_term: sulfate transmembrane transporter activity
    term:
      id: GO:0015116
      label: sulfate transmembrane transporter activity
