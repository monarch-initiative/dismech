treatments:
- name: Physiotherapy
  description: >
    Supportive physical therapy is a standard component of care to preserve
    mobility and function.
  treatment_term:
    preferred_term: physical therapy
    term:
      id: MAXO:0000011
      label: physical therapy
  evidence:
  - reference: PMID:34064542
    reference_title: "SLC26A2-Associated Diastrophic Dysplasia and rMED-Clinical Features in Affected Finnish Children and Review of the Literature."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      There is currently no curative treatment for DTD. The affected
      individuals are mainly treated with physiotherapy and corrective
      orthopedic surgery.
    explanation: >-
      This clinical review identifies physiotherapy as a mainstay of DTD
      management.
- name: Corrective Orthopedic Surgery
  description: >
    Orthopedic surgeries are commonly used to treat severe deformities including
    foot, knee, and spinal complications.
  treatment_term:
    preferred_term: orthopedic surgery
    term:
      id: MAXO:0000004
      label: surgical procedure
  evidence:
  - reference: PMID:34064542
    reference_title: "SLC26A2-Associated Diastrophic Dysplasia and rMED-Clinical Features in Affected Finnish Children and Review of the Literature."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
