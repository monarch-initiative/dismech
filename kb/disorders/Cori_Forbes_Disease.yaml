phenotypes:
- name: Hepatomegaly
  description: >
    Enlargement of the liver due to glycogen accumulation, present from infancy.
    Typically most prominent in childhood and may decrease with age. Hepatomegaly
    is the most common presenting sign.
  frequency: HP_0040281
  phenotype_term:
    preferred_term: Hepatomegaly
    term:
      id: HP:0002240
      label: Hepatomegaly
  evidence:
  - reference: PMID:27106217
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "GSDIII patients first presented before the age of 1.5 years,
      hepatomegaly was the most common presenting clinical sign."
    explanation: Large international cohort confirms hepatomegaly as the most common
      presenting sign of GSD III, appearing before 1.5 years of age.
- name: Fasting hypoglycemia
  description: >
    Ketotic hypoglycemia during fasting due to impaired glycogenolysis. Less severe
    than in GSD I because gluconeogenesis is intact. More than half of patients
    report hospitalizations due to hypoglycemia.
  frequency: HP_0040281
  phenotype_term:
    preferred_term: Fasting hypoglycemia
    term:
      id: HP:0003162
      label: Fasting hypoglycemia
  evidence:
  - reference: PMID:20301788
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "In infancy and early childhood, liver involvement presents as
      hepatomegaly and failure to thrive, with fasting ketotic hypoglycemia,
      hyperlipidemia, and elevated hepatic transaminases."
    explanation: GeneReviews describes fasting ketotic hypoglycemia as a key feature
      of GSD III in infancy and early childhood.
  - reference: PMID:38196773
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Hypoglycemia was frequently reported in both adults and children, with
      more than half reporting hospitalizations due to hypoglycemia."
    explanation: Patient burden study confirms high prevalence of hypoglycemia
      requiring hospitalization.
- name: Hyperlipidemia
  description: >
    Elevated blood lipids, including elevated triglycerides and cholesterol.
  frequency: HP_0040282
  phenotype_term:
    preferred_term: Hyperlipidemia
    term:
      id: HP:0003077
      label: Hyperlipidemia
  evidence:
  - reference: PMID:20301788
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "fasting ketotic hypoglycemia, hyperlipidemia, and elevated hepatic
      transaminases."
    explanation: GeneReviews lists hyperlipidemia as a key metabolic feature in GSD III.
- name: Myopathy
  description: >
    Progressive skeletal myopathy in GSD IIIa, manifesting as proximal muscle
    weakness and exercise intolerance. Distal myopathy may also develop. Muscle
    weakness is the major cause of morbidity in adult GSD IIIa patients.
  frequency: HP_0040282
  phenotype_term:
    preferred_term: Myopathy
    term:
      id: HP:0003198
      label: Myopathy
  evidence:
  - reference: PMID:34820282
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "In the GSD IIIa group, muscle weakness was a major feature, noted in 89%
      of the GSD IIIa cohort, a third of whom depended on a wheelchair or an assistive
      walking device."
    explanation: Retrospective study of adults quantifies muscle weakness at 89%
      prevalence in GSD IIIa with significant functional impact.
  - reference: PMID:38196773
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Adults most often reported muscle weakness as a top interfering symptom
      and the most important goal of a potential therapy."
    explanation: Patient burden study identifies muscle weakness as the most impactful
      symptom from the patient perspective.
- name: Hypertrophic cardiomyopathy
  description: >
    Left ventricular hypertrophy is common in GSD IIIa patients and may be
    present from childhood. Asymptomatic LVH is the most common cardiac
    manifestation. Symptomatic cardiomyopathy with reduced ejection fraction
    occurs in approximately 10-15% of patients.
  frequency: HP_0040282
  phenotype_term:
    preferred_term: Hypertrophic cardiomyopathy
    term:
      id: HP:0001639
      label: Hypertrophic cardiomyopathy
  evidence:
  - reference: PMID:34820282
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Asymptomatic left ventricular hypertrophy (LVH) was the most common
      cardiac manifestation, present in 43%. Symptomatic cardiomyopathy and reduced
      ejection fraction was evident in 10%."
    explanation: Adult cohort study quantifies LVH at 43% and symptomatic
      cardiomyopathy at 10%.
  - reference: PMID:27106217
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "heart (cardiac involvement and cardiomyopathy, in 58 % and 15 %,
      respectively, generally presenting in early childhood)"
    explanation: International study reports cardiac involvement in 58% and
      cardiomyopathy in 15% of GSD III patients.
- name: Elevated circulating creatine kinase concentration
  description: >
    Elevated CK levels reflecting skeletal muscle involvement, frequently found
    in GSD IIIa patients. CK is significantly associated with disease burden.
  frequency: HP_0040282
  phenotype_term:
    preferred_term: Elevated circulating creatine kinase concentration
    term:
      id: HP:0003236
      label: Elevated circulating creatine kinase concentration
  evidence:
  - reference: PMID:31263214
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Creatine phosphokinase was also elevated with no significant correlation
      with age (p = 0.4)."
    explanation: Study shows CK is persistently elevated in GSD III patients
      regardless of age.
- name: Hepatic fibrosis
  description: >
    Progressive hepatic fibrosis develops in many patients, potentially leading
    to cirrhosis in adulthood. Fibrosis can be present from infancy and may be
    severe even in young children.
  frequency: HP_0040282
  phenotype_term:
    preferred_term: Hepatic fibrosis
    term:
      id: HP:0001395
      label: Hepatic fibrosis
  evidence:
  - reference: PMID:31263214
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Liver fibrosis can occur at an early age, and may explain the decrease
      in aminotransferases and Glc4 with age."
    explanation: Study demonstrates early onset of liver fibrosis in GSD III
      and its paradoxical relationship to normalizing aminotransferases.
  - reference: PMID:34820282
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "28% developed decompensated liver disease and portal hypertension"
    explanation: Adult cohort shows significant progression to decompensated liver
      disease.
- name: Failure to thrive
  description: >
    Growth retardation and short stature, particularly in childhood, due to
    metabolic derangements and recurrent hypoglycemia.
  frequency: HP_0040282
  phenotype_term:
    preferred_term: Failure to thrive
    term:
      id: HP:0001508
      label: Failure to thrive
  evidence:
  - reference: PMID:20301788
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "In infancy and early childhood, liver involvement presents as
      hepatomegaly and failure to thrive"
    explanation: GeneReviews identifies failure to thrive as a key early presentation.
- name: Elevated circulating hepatic transaminase concentration
  description: >
    Elevated liver transaminases (AST and ALT) reflecting hepatocyte injury
    from glycogen accumulation. Tend to normalize with age as fibrosis progresses.
  frequency: HP_0040281
  phenotype_term:
    preferred_term: Elevated circulating hepatic transaminase concentration
    term:
      id: HP:0002910
      label: Elevated circulating hepatic transaminase concentration
  evidence:
  - reference: PMID:31263214
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Markers of liver injury (aminotransferases), dysfunction (cholesterol,
      triglycerides), and glycogen storage (glucose tetrasaccharide, Glc4) were
      elevated at an early age, and decreased significantly thereafter"
    explanation: Demonstrates elevated aminotransferases in early GSD III that
      paradoxically decrease with age.
treatments:
- name: Dietary management
  description: >
    Frequent meals and cornstarch supplementation to prevent hypoglycemia.
    High-protein diet (3 g/kg) is recommended to provide amino acid substrate for
    gluconeogenesis and to support muscle integrity. Uncooked cornstarch
    provides a slow-release glucose source. Modified Atkins or ketogenic diets
    may improve cardiac and skeletal muscle function by reducing glycogen storage.
  treatment_term:
    preferred_term: dietary intervention
    term:
      id: MAXO:0000088
      label: dietary intervention
  evidence:
  - reference: PMID:20301788
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Dietary management tailored to the individual patient remains the
      primary therapy. Frequent feeds (every 3-4 hours) are needed to maintain
      euglycemia in infancy."
    explanation: GeneReviews establishes dietary management as the primary therapy
      with specific recommendations for meal frequency.
  - reference: PMID:2403059
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Cornstarch therapy was associated with maintenance of normoglycemia,
      increased growth velocity, and decreased serum aminotransferase concentrations
      in all patients."
    explanation: Clinical study demonstrates efficacy of cornstarch therapy in
      GSD III for glycemic control, growth, and liver function.
  - reference: PMID:25308556
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "A diet rich in fats as well as proteins and poor in carbohydrates could
      be a beneficial therapeutic choice for GSD III with cardiomyopathy."
    explanation: Case report of two siblings shows high-fat low-carbohydrate diet
      improves cardiomyopathy in GSD IIIa.
- name: Liver transplantation
  description: >
    Liver transplantation may be considered for patients with severe hepatic
    fibrosis, cirrhosis, or hepatocellular carcinoma. It corrects the hepatic
    metabolic defect but does not address myopathy and may exacerbate muscle disease.
  treatment_term:
    preferred_term: organ transplantation
    term:
      id: MAXO:0010039
      label: organ transplantation
  evidence:
  - reference: PMID:20301788
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Liver transplantation is reserved for those with severe hepatic
      cirrhosis, liver dysfunction, and/or hepatocellular carcinoma. Liver
      transplantation may exacerbate myopathy and cardiomyopathy."
    explanation: GeneReviews describes liver transplantation indications and the
      important caveat that it may worsen muscle disease.
- name: Genetic counseling
  description: >
    Genetic counseling for affected families regarding autosomal recessive
    inheritance, carrier testing, and reproductive options. Once pathogenic variants
    are identified, prenatal and preimplantation genetic testing are possible.
  treatment_term:
    preferred_term: genetic counseling
    term:
      id: MAXO:0000079
      label: genetic counseling
  evidence:
  - reference: PMID:20301788
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Once the AGL pathogenic variants have been identified in an affected
      family member, carrier testing for at-risk family members and prenatal and
      preimplantation genetic testing for a pregnancy at increased risk are possible."
    explanation: GeneReviews outlines genetic counseling recommendations for GSD III
      families.
