- name: Hepatic glycogen accumulation and fibrosis
  description: >
    Progressive accumulation of limit dextrin in hepatocytes causes hepatomegaly
    and hepatic dysfunction. Over time, the glycogen storage leads to hepatocyte
    injury, inflammation, fibrosis, and potentially cirrhosis. Hepatocellular
    adenomas and carcinoma can develop as long-term complications. Liver fibrosis
    can begin early in life; aminotransferases may paradoxically normalize with
    age as fibrosis progresses.
  evidence:
  - reference: PMID:31263214
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Liver fibrosis can occur at an early age, and may explain the decrease
      in aminotransferases and Glc4 with age."
    explanation: Demonstrates that liver fibrosis occurs early in GSD III and that
      normalization of aminotransferases with age does not indicate hepatic improvement.
  - reference: PMID:27106217
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Chronic complications involved the liver (hepatic cirrhosis, adenoma(s),
      and/or hepatocellular carcinoma in 11 %)"
    explanation: Large cohort study documents hepatic cirrhosis and HCC as chronic
      complications of GSD III.
  - reference: PMID:34820282
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "hepatomegaly and cirrhosis were the most common radiological findings;
      and 28% developed decompensated liver disease and portal hypertension, the
      latter being more prevalent in older patients."
    explanation: Retrospective study of adults shows high rate of liver disease
      progression including cirrhosis and portal hypertension.
