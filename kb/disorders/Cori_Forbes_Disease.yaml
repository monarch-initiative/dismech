    label: glycogen storage disease III
parents:
- Glycogen Storage Disease
prevalence:
- population: Global and founder populations
  percentage: 1 in 100,000 globally; 1 in 5,400 in North African Jews; 1 in 3,100-3,600 in the Faroe Islands
  notes: >-
    Glycogen storage disease type III is rare in the general population but
    shows major founder enrichment in certain populations, especially North
    African Jewish and Faroese groups.
  evidence:
  - reference: PMID:9412782
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "The overall incidence of the disease is about 1:100,000 life births in the USA; however, it is unusually frequent among North African Jews in Israel (prevalence 1:5,400, carrier prevalence 1:35)."
    explanation: This population study provides both the general-population incidence estimate and the founder-population prevalence estimate for North African Jews.
  - reference: PMID:11378828
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "From the fact that we are currently aware of a total of 14 GSD IIIA cases in the Faroese population of 45 000, the observed prevalence is 1 : 3100."
    explanation: This founder-population study documents exceptionally high prevalence of GSD IIIA in the Faroe Islands.
inheritance:
- name: Autosomal recessive
  inheritance_term:
    preferred_term: Autosomal recessive inheritance
    term:
      id: HP:0000007
      label: Autosomal recessive inheritance
  description: >
    GSD III follows autosomal recessive inheritance. The AGL gene is located on
    chromosome 1p21.2. Carrier frequency varies by population, with notably higher
    prevalence in certain ethnic groups including Faroese, North African Jewish,
    and Inuit communities.
  evidence:
  - reference: PMID:20301788
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "GSD III is inherited in an autosomal recessive manner. If both parents
      are known to be heterozygous for an AGL pathogenic variant, each sib of an
      affected individual has at conception a 25% chance of being affected with GSD
      III, a 50% chance of being an asymptomatic carrier, and a 25% chance of
      inheriting neither of the familial AGL pathogenic variants."
    explanation: GeneReviews confirms autosomal recessive inheritance of GSD III with
      standard Mendelian ratios for carrier parents.
  - reference: PMID:11949933
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Deficiency of the glycogen debranching enzyme (gene, AGL) causes glycogen
      storage disease type III (GSD-III), an autosomal recessive disease affecting
      glycogen metabolism."
    explanation: Confirms autosomal recessive inheritance and AGL gene involvement.
has_subtypes:
- name: GSD IIIa
  description: >
    The most common subtype, accounting for approximately 85% of GSD III cases.
    Involves both liver and muscle (skeletal and cardiac). Characterized by
    hepatomegaly and hypoglycemia in childhood with progressive myopathy and
    cardiomyopathy developing over time.
  subtype_frequency: "~85%"
  evidence:
  - reference: PMID:20301788
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "GSD IIIa is the most common subtype, present in about 85% of affected
      individuals; it manifests with liver and muscle involvement."
    explanation: GeneReviews confirms GSD IIIa as the predominant subtype with
      liver and muscle involvement.
- name: GSD IIIb
  description: >
    Accounts for approximately 15% of GSD III cases. Affects liver only without
    muscle involvement. Exon 3 mutations in AGL are specifically associated with
    this subtype.
  subtype_frequency: "~15%"
  evidence:
  - reference: PMID:20301788
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "GSD IIIb, with liver involvement only, comprises about 15% of all
      affected individuals."
    explanation: GeneReviews confirms GSD IIIb as the liver-only subtype comprising
      approximately 15% of cases.
  - reference: PMID:11949933
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "exon 3 mutations (17delAG and Q6X) are specifically associated with
      GSD-IIIb"
    explanation: Molecular characterization identifies specific genotype-phenotype
      correlation for the GSD IIIb subtype.
pathophysiology:
- name: Glycogen debranching enzyme deficiency
  description: >
    Deficiency of the glycogen debranching enzyme (AGL) impairs the complete
    degradation of glycogen. The enzyme normally has two catalytic activities:
    oligo-1,4-1,4-glucantransferase (transferase) and amylo-1,6-glucosidase
    (glucosidase). Without this enzyme, glycogen breakdown halts at the branch
    points, leading to accumulation of limit dextrin (abnormally short-branched
    glycogen) in hepatocytes, skeletal myocytes, and cardiomyocytes.
  gene:
    preferred_term: AGL
    description: Amylo-1,6-glucosidase, 4-alpha-glucanotransferase; the glycogen
      debranching enzyme with dual transferase and glucosidase activities.
    modifier: DECREASED
    term:
      id: hgnc:321
      label: AGL
  evidence:
  - reference: PMID:11949933
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Most GSD-III patients have AGL deficiency in both the liver and muscle
      (type IIIa), but some have it in the liver but not muscle (type IIIb)."
    explanation: Confirms AGL deficiency causes GSD III with tissue-specific subtypes.
  - reference: PMID:27106217
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Glycogen storage disease type III (GSDIII) is a rare disorder of
      glycogenolysis due to AGL gene mutations, causing glycogen debranching enzyme
      deficiency and storage of limited dextrin."
    explanation: Large international cohort study confirms AGL mutations cause
      debranching enzyme deficiency and limit dextrin accumulation.
  - reference: PMID:33368379
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Glycogen storage disorder type III (GSDIII) is a rare inborn error of
      metabolism due to loss of glycogen debranching enzyme activity, causing inability
      to fully mobilize glycogen stores and its consequent accumulation in various
      tissues, notably liver, cardiac and skeletal muscle."
    explanation: Review confirms the pathophysiology of debranching enzyme loss
      causing glycogen accumulation in liver, cardiac, and skeletal muscle.
