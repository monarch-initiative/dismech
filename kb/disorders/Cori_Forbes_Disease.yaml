- name: Skeletal and cardiac myopathy
  description: >
    In GSD IIIa, glycogen accumulation in skeletal and cardiac muscle leads to
    progressive myopathy and cardiomyopathy. Muscle involvement may be minimal
    in childhood but typically worsens with age. The myopathy is slowly progressive
    and can lead to significant disability. Cardiac involvement manifests primarily
    as left ventricular hypertrophy, which may progress to cardiomyopathy.
  evidence:
  - reference: PMID:20301788
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Most individuals develop cardiac involvement with cardiac hypertrophy
      and/or cardiomyopathy. Skeletal myopathy manifesting as weakness may be evident
      in childhood and slowly progresses, typically becoming prominent in the third to
      fourth decade."
    explanation: GeneReviews describes the progressive nature of cardiac and skeletal
      muscle involvement in GSD III.
  - reference: PMID:27106217
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "heart (cardiac involvement and cardiomyopathy, in 58 % and 15 %,
      respectively, generally presenting in early childhood), and muscle (pain in
      34 %)."
    explanation: Large international cohort quantifies cardiac involvement at 58%
      and cardiomyopathy at 15% in GSD III patients.
  - reference: PMID:34820282
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "muscle weakness was a major feature, noted in 89% of the GSD IIIa cohort,
      a third of whom depended on a wheelchair or an assistive walking device."
    explanation: Adult cohort study shows high prevalence and severity of muscle
      weakness in GSD IIIa, with significant functional disability.
