discussions:
- discussion_id: gap_csan_cutaneous_fgfr3_branch
  prompt: >-
    What is the cell-specific mechanism by which FGFR3 A391E produces flexural
    acanthosis nigricans, and is keratinocyte-autonomous FGFR3 signaling
    sufficient to explain the cutaneous phenotype?
  kind: KNOWLEDGE_GAP
  status: OPEN
  attaches_to:
  - pathophysiology#FGFR3 Signaling in Keratinocytes
  - pathophysiology#Epidermal Hyperkeratosis and Hyperpigmentation
  - phenotype#Acanthosis Nigricans
  rationale: >-
    Human genetics strongly links the A391E allele to acanthosis nigricans, and
    the phenotype is described as hyperkeratosis and hyperpigmentation. The
    disease-specific path from activated FGFR3 to keratinocyte proliferation,
    abnormal epidermal differentiation, and flexural tissue specificity remains
    less directly evidenced than the receptor activation and craniosynostosis
    branches.
