      label: fibroblast growth factor receptor signaling pathway
    modifier: INCREASED
  evidence:
  - reference: PMID:21536014
    reference_title: "The A391E mutation enhances FGFR3 activation in the absence of ligand."
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: >-
      It has been hypothesized that the mutant glutamic acid stabilizes the
      dimeric receptor due to hydrogen bonding and enhances its
      ligand-independent activation.
    explanation: >-
      This full-length FGFR3 cell-system study frames A391E as a
      transmembrane-domain dimer-stabilizing mutation that enhances
      ligand-independent receptor activation.
  - reference: PMID:23437153
    reference_title: "Multiple consequences of a single amino acid pathogenic RTK mutation: the A391E mutation in FGFR3."
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: >-
      It is believed that the mutation increases FGFR3 dimerization, and our
      results verify this.
    explanation: >-
      Supports explicit representation of increased FGFR3 dimerization as a
      separable proximal effect of the A391E mutation.
  downstream:
  - target: Constitutive FGFR3 Kinase Autophosphorylation
    description: >-
      Stabilized A391E dimers bring FGFR3 kinase domains into an activating
      configuration, increasing ligand-independent receptor phosphorylation.
    causal_link_type: DIRECT
- name: Constitutive FGFR3 Kinase Autophosphorylation
  description: >
    The A391E receptor has increased ligand-independent activation and enhanced
    phosphorylation efficiency at critical activation-loop tyrosines. This
    activated receptor state is the branch point for downstream RAS-MAPK, STAT,
    and cutaneous FGFR3 signaling outputs.
