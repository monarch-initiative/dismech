genetic:
- name: FGFR3
  gene_term:
    preferred_term: FGFR3
    term:
      id: hgnc:3690
      label: FGFR3
  association: Pathogenic Variants
  relationship_type: CAUSATIVE
  notes: >
    A single recurrent heterozygous variant, c.1172C>A (p.Ala391Glu), in
    FGFR3 causes this syndrome. The variant is in the transmembrane domain and
    increases ligand-independent activation through dimer stabilization and
    increased phosphorylation efficiency.
  evidence:
  - reference: CGGV:assertion_98727c21-26dd-4e65-b75e-8ec82d95ba97-2021-11-18T170000.000Z
    reference_title: "FGFR3 / Crouzon syndrome-acanthosis nigricans syndrome (Definitive)"
    supports: SUPPORT
    evidence_source: OTHER
    snippet: "FGFR3 | HGNC:3690 | Crouzon syndrome-acanthosis nigricans syndrome | MONDO:0012833 | AD | Definitive"
    explanation: ClinGen classifies the FGFR3-Crouzon syndrome-acanthosis nigricans syndrome gene-disease relationship as definitive with autosomal dominant inheritance.
  variants:
  - name: FGFR3 A391E Mutation
    description: >
      Recurrent missense variant c.1172C>A (p.Ala391Glu) in the FGFR3
      transmembrane domain.
    gene:
      preferred_term: FGFR3
      term:
        id: hgnc:3690
        label: FGFR3
    evidence:
    - reference: PMID:7493034
      reference_title: "Fibroblast growth factor receptor 3 (FGFR3) transmembrane mutation in Crouzon syndrome with acanthosis nigricans."
      supports: SUPPORT
      evidence_source: HUMAN_CLINICAL
      snippet: >-
        We now report the unexpected observation of a FGFR3 transmembrane domain
        mutation, Ala391Glu, in three unrelated families with Crouzon syndrome
        and acanthosis nigricans, a specific skin disorder of hyperkeratosis and
        hyperpigmentation.
      explanation: >
        Landmark paper identifying the recurrent FGFR3 A391E transmembrane
        variant in families with Crouzon syndrome and acanthosis nigricans.
    - reference: PMID:10696568
      reference_title: "The molecular and genetic basis of fibroblast growth factor receptor 3 disorders: the achondroplasia family of skeletal dysplasias, Muenke craniosynostosis, and Crouzon syndrome with acanthosis nigricans."
      supports: SUPPORT
      evidence_source: HUMAN_CLINICAL
      snippet: >-
        Mutations in the FGFR3 gene also result in hypochondroplasia, the lethal
        thanatophoric dysplasias, the recently described SADDAN (severe
        achondroplasia with developmental delay and acanthosis nigricans)
        dysplasia, and two craniosynostosis disorders: Muenke coronal
        craniosynostosis and Crouzon syndrome with acanthosis nigricans.
      explanation: >
        Review confirming CSAN as part of the FGFR3-related disorder spectrum.
