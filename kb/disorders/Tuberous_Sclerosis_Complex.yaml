    term:
      id: GO:0031929
      label: TOR signaling
  - preferred_term: cell growth
    term:
      id: GO:0016049
      label: cell growth
  locations:
  - preferred_term: brain
    term:
      id: UBERON:0000955
      label: brain
  - preferred_term: kidney
    term:
