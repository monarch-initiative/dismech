- name: Insufficient Bone Matrix, Reduced Mineralization, and Skeletal Fragility
  description: >-
    Reduced collagen deposition and impaired osteoblast proliferation and
    function produce an insufficient bone extracellular matrix with poor
    mineralization, yielding low bone mineral density (osteopenia) and skeletal
    fragility. Clinically this manifests as recurrent fractures, growth
    deficiency, and long-bone bowing/deformity. Tric-b-knockout mice serve as an
    OI model in which deranged ER Ca2+ handling reduces ECM synthesis in
    osteoblasts, leading to poor mineralization.
