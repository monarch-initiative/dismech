    reference_title: "Absence of the ER Cation Channel TMEM38B/TRIC-B Disrupts Intracellular Calcium Homeostasis and Dysregulates Collagen Synthesis in Recessive Osteogenesis Imperfecta."
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: >-
      TRIC-B deficiency causes impaired release of ER luminal Ca2+, associated
      with deficient store-operated calcium entry, although SERCA and IP3R have
