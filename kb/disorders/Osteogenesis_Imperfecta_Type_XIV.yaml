genetic:
- name: TMEM38B (TRIC-B) Loss-of-Function Mutations
  association: Causative
  gene_term:
    preferred_term: TMEM38B (TRIC-B, ER monovalent cation channel)
    term:
      id: hgnc:25535
      label: TMEM38B
  notes: >-
    OI type XIV is caused by biallelic null (loss-of-function) variants in
    TMEM38B on chromosome 9q31, the gene encoding the ER cation channel TRIC-B.
    The originally reported alleles are a homozygous truncating deletion of exon
    4 in consanguineous Arabian families (Shaheen et al., 2012) and an
    independent homozygous exon 4 deletion producing an early stop codon and low
    TMEM38B mRNA in Israeli Bedouin families (Volodarsky et al., 2013). TRIC-B
    protein is undetectable in patient fibroblasts and osteoblasts.
  evidence:
  - reference: PMID:23054245
    reference_title: "Study of autosomal recessive osteogenesis imperfecta in Arabia reveals a novel locus defined by TMEM38B mutation."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      In three multiplex families, autozygosity and linkage analysis revealed a
      novel recessive OI locus on chromosome 9q31.1-31.3, and a novel truncating
      deletion of exon 4 of TMEM38B was identified within that interval.
    explanation: >-
      Identifies the causative truncating TMEM38B exon 4 deletion defining the
      novel recessive OI locus (OI type XIV).
  - reference: PMID:23316006
    reference_title: "A deletion mutation in TMEM38B associated with autosomal recessive osteogenesis imperfecta."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      a homozygous deletion mutation of exon 4 of TMEM38B, leading to an early
      stop codon and a truncated protein, as well as low TMEM38B mRNA levels.
    explanation: >-
      Independent confirmation of a homozygous loss-of-function TMEM38B exon 4
      deletion causing recessive OI.
  - reference: PMID:23316006
    reference_title: "A deletion mutation in TMEM38B associated with autosomal recessive osteogenesis imperfecta."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      TMEM38B encodes TRIC-B, a ubiquitous component of TRIC, a monovalent
      cation-specific channel involved in Ca(2+) release from intracellular
      stores
    explanation: >-
      Documents that TMEM38B encodes the monovalent cation channel TRIC-B
      involved in intracellular Ca2+ release.
