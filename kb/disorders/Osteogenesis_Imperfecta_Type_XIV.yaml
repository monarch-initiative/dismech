      for OI type XIV.
pathophysiology:
- name: TMEM38B Loss Eliminates the ER Cation Channel TRIC-B and Disrupts ER Calcium Flux
  description: >-
    TMEM38B encodes TRIC-B, a trimeric intracellular cation channel of the
    endoplasmic-reticulum membrane that conducts monovalent cations (K+) and is
    proposed to counterbalance IP3R-mediated Ca2+ release from intracellular
    stores. Biallelic null mutations render TRIC-B protein undetectable in
    patient fibroblasts and osteoblasts. The loss impairs release of ER luminal
    Ca2+ and store-operated calcium entry; steady-state ER Ca2+ is unchanged,
    indicating that TRIC-B governs the kinetics of ER calcium depletion and
    recovery rather than the resting store level. The disturbed Ca2+ flux
    triggers ER stress with increased BiP.
