diagnosis:
- name: Molecular Genetic Diagnosis
  description: >-
    OI type XIV is suspected in an infant or child with recessive OI (recurrent
    fractures from infancy, osteopenia, deformity) when COL1A1/COL1A2 and other
    recessive OI genes are negative. Diagnosis is confirmed by identifying
    biallelic loss-of-function TMEM38B variants by gene-panel or exome
    sequencing; supportive cellular findings include undetectable TRIC-B protein
    with altered ER Ca2+ flux and reduced collagen secretion in patient cells.
  diagnosis_term:
    preferred_term: molecular genetic testing
    term:
      id: MAXO:0000533
      label: molecular genetic testing
  evidence:
  - reference: PMID:23054245
    reference_title: "Study of autosomal recessive osteogenesis imperfecta in Arabia reveals a novel locus defined by TMEM38B mutation."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      We used autozygome guided mutation analysis of AR OI (AR OI) genes
      followed by exome sequencing when such analysis failed to identify the
      causative mutation.
    explanation: >-
      Molecular genetic testing (autozygosity mapping and exome sequencing)
      establishes the TMEM38B diagnosis of OI type XIV.
treatments:
- name: Bisphosphonate Therapy
  description: >-
    Intravenous bisphosphonates (e.g., pamidronate, zoledronic acid) are the
    pharmacological mainstay of severe OI, increasing bone mineral density and
    reducing fracture frequency. They are antiresorptive and do not correct the
    underlying ER calcium-channel defect.
  treatment_term:
    preferred_term: Bisphosphonate Therapy
    term:
      id: NCIT:C198585
      label: Bisphosphonate Therapy
  evidence:
  - reference: PMID:20301472
    reference_title: "COL1A1- and COL1A2-Related Osteogenesis Imperfecta."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Bisphosphonates continue to be used most extensively in those with
      vertebral fractures, frequent long bone fractures, or more severe OI.
    explanation: >-
      GeneReviews documents bisphosphonates as the mainstay pharmacotherapy for
      OI with frequent fractures or more severe disease, the management category
      that applies to OI type XIV.
- name: Orthopedic Surgery and Intramedullary Rodding
  description: >-
    Intramedullary (telescoping) rod fixation and corrective osteotomy stabilize
    fracture-prone, deformed long bones; spinal surgery addresses progressive
    scoliosis.
  treatment_term:
    preferred_term: surgical procedure
    term:
      id: MAXO:0000004
      label: surgical procedure
  evidence:
  - reference: PMID:20301472
    reference_title: "COL1A1- and COL1A2-Related Osteogenesis Imperfecta."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      intramedullary rodding when
      indicated to provide anatomic positioning of limbs
    explanation: >-
      GeneReviews documents intramedullary rodding as standard orthopedic
      management for OI long-bone fractures and deformity.
- name: Physical Therapy and Rehabilitation
  description: >-
    Physical and occupational therapy improve mobility and muscle strength and
    prevent contractures and deformity; early physical therapy follows brief
    post-fracture immobilization.
  treatment_term:
    preferred_term: physical therapy
    term:
      id: MAXO:0000011
      label: physical therapy
  evidence:
  - reference: PMID:20301472
    reference_title: "COL1A1- and COL1A2-Related Osteogenesis Imperfecta."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Fractures are treated with as
      short a period of immobility as is practical, small and lightweight casts, and
      physical therapy as soon as casts are removed
    explanation: >-
      GeneReviews documents early physical therapy and brief immobilization as
      part of standard OI fracture rehabilitation.
