  - reference: PMID:27441836
    reference_title: "Absence of the ER Cation Channel TMEM38B/TRIC-B Disrupts Intracellular Calcium Homeostasis and Dysregulates Collagen Synthesis in Recessive Osteogenesis Imperfecta."
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: >-
      Notably, steady state ER Ca2+ is unchanged in TRIC-B deficiency,
      supporting a role for TRIC-B in the kinetics of ER calcium depletion and
      recovery.
    explanation: >-
      Clarifies that TRIC-B controls the kinetics of ER Ca2+ flux rather than
      the resting store level.
  downstream:
  - target: Dysregulated Collagen Synthesis and Defective Secretion
    description: >-
      The disturbed ER Ca2+ flux and ER stress dysregulate type I collagen
      synthesis, modification, folding, and secretion in osteoblasts.
- name: Dysregulated Collagen Synthesis and Defective Secretion
  description: >-
    The disturbed Ca2+ flux dysregulates type I collagen synthesis at multiple
    steps. Collagen helical lysine hydroxylation is reduced while telopeptide
    hydroxylation is increased, reflecting altered activity of Ca2+-dependent
    collagen-modifying enzymes and chaperones (increased LH1, decreased FKBP65).
    Procollagen chain assembly is delayed and the resulting misfolded collagen is
    substantially retained intracellularly, producing a 50-70% reduction in
    secreted collagen. Lower-stability forms that escape proteasomal degradation
    are not incorporated into matrix, so collagen production — rather than
    collagen quality — is the primary deficit.
