name: Osteogenesis Imperfecta Type XIV
creation_date: "2026-06-30T00:00:00Z"
category: Mendelian
disease_term:
  preferred_term: Osteogenesis imperfecta type 14
  term:
    id: MONDO:0014029
    label: osteogenesis imperfecta type 14
description: >-
  Osteogenesis imperfecta type XIV (OI type XIV) is a rare autosomal recessive
  brittle bone disease caused by biallelic null mutations in TMEM38B, the gene
  encoding TRIC-B, a trimeric intracellular cation channel of the
  endoplasmic-reticulum (ER) membrane that is specific for monovalent cations
  (potassium). TRIC-B is proposed to counterbalance IP3R-mediated Ca2+ release
  from intracellular stores by providing a counter-ionic K+ flux. Loss of TRIC-B
  disrupts the kinetics of ER calcium release and store-operated calcium entry,
  causing ER stress and dysregulating type I collagen synthesis at multiple
  steps — altered helical lysine and telopeptide hydroxylation, delayed
  procollagen chain assembly, intracellular retention of misfolded collagen, and
  markedly reduced collagen secretion — so that the bone extracellular matrix is
  insufficient even though the collagen that is incorporated is of near-normal
  stability. The disorder was first defined as a novel autosomal recessive OI
  locus on chromosome 9q31 by a TMEM38B mutation in consanguineous Arabian
  families (Shaheen et al., 2012) and independently in Israeli Bedouin families
  (Volodarsky et al., 2013). Clinically it produces moderately severe OI with
  recurrent fractures, reduced bone mineral density (osteopenia), growth
  deficiency, and long-bone bowing/deformity. Tric-b-knockout mice and
  CRISPR-engineered TMEM38B-null human osteoblasts recapitulate the impaired ER
  Ca2+ handling, defective collagen secretion, and poor mineralization.
