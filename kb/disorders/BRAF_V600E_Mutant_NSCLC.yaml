      term:
        id: CHEBI:75998
        label: trametinib
- name: Dabrafenib Monotherapy
  description: >-
    BRAF inhibitor with activity against V600E mutant. Generally used in
    combination with trametinib for improved efficacy and reduced paradoxical
    activation.
  treatment_term:
