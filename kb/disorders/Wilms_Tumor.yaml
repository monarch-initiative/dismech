    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      While only 3% of patients without LOH/LOI relapsed, 20% with LOH 11p15 and
      25% with LOI 11p15 relapsed
    explanation: >-
      Demonstrates the prognostic significance of 11p15 LOH/LOI in Wilms tumor,
