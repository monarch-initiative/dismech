treatments:
- name: Multidrug therapy with rifampicin, dapsone, and clofazimine
  description: Multidrug therapy includes rifampicin, dapsone, and clofazimine for multibacillary disease.
  treatment_term:
    preferred_term: pharmacotherapy
    term:
      id: MAXO:0000058
      label: pharmacotherapy
    therapeutic_agent:
    - preferred_term: rifampicin
      term:
        id: CHEBI:28077
        label: rifampicin
    - preferred_term: clofazimine
      term:
        id: CHEBI:3749
        label: clofazimine
  evidence:
  - reference: PMID:28763601
    reference_title: "Leprosy - an overview of clinical features, diagnosis, and treatment."
    supports: SUPPORT
    snippet: "While paucibacillary forms are treated with rifampicin and dapsone for at least six months, multibacillary leprosy is treated for at least twelve months, additionally requiring clofazimine."
    explanation: The abstract describes multidrug therapy regimens.
- name: Corticosteroids for Type 1 Reaction
  description: Systemic corticosteroids (prednisone or prednisolone) are the primary immunosuppressive treatment for leprosy Type 1 reactions (reversal reactions), suppressing the excessive cell-mediated immune response against M. leprae antigens and resolving acute inflammatory episodes.
  treatment_term:
    preferred_term: pharmacotherapy
    term:
      id: MAXO:0000058
      label: pharmacotherapy
    therapeutic_agent:
    - preferred_term: prednisone
      term:
        id: CHEBI:8382
        label: prednisone
    - preferred_term: prednisolone
      term:
        id: CHEBI:8378
        label: prednisolone
  target_mechanisms:
  - target: Type 1 Delayed-Type Hypersensitivity Response
    description: Corticosteroids suppress the cell-mediated immune cascade underlying Type 1 reactions by inhibiting T cell activation and inflammatory cytokine production.
  evidence:
  - reference: PMID:42157916
    reference_title: "Reactions in Leprosy: Updated Insights Into Pathophysiology, Clinical Spectrum, and Therapeutic Approaches-A Narrative Review"
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Type 1 leprosy reaction is a delayed-type hypersensitivity response due to enhanced cell-mediated immunity, leading to the aggravation of pre-existing skin lesions and neuritis."
    explanation: Review describes Type 1 reaction pathophysiology and the need for immunosuppression; corticosteroids are the standard treatment targeting this cell-mediated mechanism.
- name: Thalidomide, Corticosteroids, and Clofazimine for Type 2 Reaction (ENL)
  description: >-
    Type 2 reactions (erythema nodosum leprosum, ENL) are immune-complex mediated and require combination therapy.
    Thalidomide (immunomodulator) reduces TNF-alpha and immune-complex formation; corticosteroids suppress inflammation;
    clofazimine provides additional immunosuppression. These agents target the immune-complex pathophysiology of ENL.
  treatment_term:
    preferred_term: pharmacotherapy
    term:
      id: MAXO:0000058
      label: pharmacotherapy
    therapeutic_agent:
    - preferred_term: thalidomide
      term:
        id: CHEBI:9513
        label: thalidomide
    - preferred_term: prednisone
      term:
        id: CHEBI:8382
        label: prednisone
    - preferred_term: prednisolone
      term:
        id: CHEBI:8378
        label: prednisolone
    - preferred_term: clofazimine
      term:
        id: CHEBI:3749
        label: clofazimine
  target_mechanisms:
  - target: Immune-Complex Formation in Type 2 Reaction
    description: >-
      Thalidomide, corticosteroids, and clofazimine suppress immune-complex mediated inflammation through complementary
      mechanisms: TNF-alpha inhibition, broad anti-inflammatory effects, and immunosuppression respectively.
  evidence:
  - reference: PMID:42157916
    reference_title: "Reactions in Leprosy: Updated Insights Into Pathophysiology, Clinical Spectrum, and Therapeutic Approaches-A Narrative Review"
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Type 2 reaction is an immune-complex mediated phenomenon associated with systemic symptoms along with the fresh appearance of reddish subcutaneous nodules."
    explanation: Review characterizes Type 2 reaction as immune-complex mediated, supporting treatment strategies targeting this pathophysiology.
- name: Aggressive Multidrug Therapy and Supportive Care for Lucio Phenomenon
  description: >-
    Lucio phenomenon (Type 3 reaction) is characterized by vascular endothelial injury and rapid tissue necrosis.
    Management combines high-dose antimicrobial therapy (rifampicin-based multidrug therapy) to reduce bacillary load and
    limit immune-complex deposition, with supportive care (wound management, hemodynamic support) to prevent progression.
  treatment_term:
    preferred_term: pharmacotherapy
    term:
      id: MAXO:0000058
      label: pharmacotherapy
    therapeutic_agent:
    - preferred_term: rifampicin
      term:
        id: CHEBI:28077
        label: rifampicin
  target_mechanisms:
  - target: Endothelial Cell Injury in Lucio Phenomenon
    description: >-
      High-dose antimicrobial therapy rapidly reduces bacillary load and associated immune-complex deposition,
      limiting endothelial injury and preventing progressive vascular necrosis.
  - target: Cutaneous Vascular Necrosis in Lucio Phenomenon
    description: >-
      Aggressive therapy and supportive wound care prevent progression from vascular necrosis to extensive tissue loss and ulceration.
  evidence:
  - reference: PMID:42157916
    reference_title: "Reactions in Leprosy: Updated Insights Into Pathophysiology, Clinical Spectrum, and Therapeutic Approaches-A Narrative Review"
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Lucio phenomenon, which is due to endothelial cell injury, usually presents with tender purpura on the extremities which becomes necrotic and ulcerated."
    explanation: Review establishes endothelial cell injury as the underlying mechanism of Lucio phenomenon, guiding management toward reducing bacterial antigen load and supporting tissue repair.
