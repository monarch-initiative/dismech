    intermediate_mechanisms:
    - Inflammatory infiltration of the myocardium and AV conduction system (Lyme carditis).
    description: Inflammation of the cardiac conduction system disrupts AV nodal conduction, producing variable-degree atrioventricular block.
  - target: Myelitis
    causal_link_type: DIRECT
    description: Inflammatory involvement of the spinal cord during acute neuroborreliosis produces myelitis.
  - target: Dementia (Reversible Neuroborreliosis)
