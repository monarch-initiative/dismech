- name: Host Lipid Scavenging and Membrane Biogenesis
  description: >
    Borrelia burgdorferi is a metabolically compromised spirochete (~1.5 Mbp
    genome) that cannot survive without host-derived lipids: it lacks de novo
    sterol synthesis and most lipid-biosynthetic capacity, requires exogenous
    cholesterol for growth and viability, and must scavenge lipids from the tick
    and vertebrate host to build and remodel its LPS-free, lipoprotein-rich cell
    envelope during the enzootic cycle. A multi-platform untargeted and targeted
    LC-MS/GC-MS lipidomic compendium detected more than 500 lipids in
    B. burgdorferi, the majority sourced from the environment through apparently
    discriminatory uptake (some species depleted 600-1500-fold during growth).
    The pathogen organizes neutral lipids — cholesteryl esters and triglycerides —
    into distinct intracellular foci (the first visual/molecular evidence of
    lipid-droplet-like storage in this minimal bacterium), and incorporates
    host sphingolipids and ceramides, with phosphatidylcholine established as a
    principal membrane constituent alongside cholesterol and cholesterol
    galactolipids (AcGal) that form cholesterol/sphingolipid lipid rafts.
    Unexpectedly, the spirochete also biosynthesizes predominantly eukaryotic
    lipids: four lysosomal bis(monoacylglycerol)phosphate (BMP) species (proposed
    roles in membrane plasticity/stress adaptation), phosphatidylglycerol and
    phosphatidylethanolamine, the plant galactolipid monogalactosyl diacylglycerol
    (MGDG; against which late-stage Lyme patients mount an antibody response), an
    acylated glycosylated phytosterol (acylhexosylcampesterol from scavenged
    campesterol), and the plant-type anionic sulfolipid sulfoquinovosyl
    diacylglycerol (SQDG). Structural-homology modeling against Arabidopsis SQD1/SQD2
    and heterologous E. coli reconstitution identified two interdependent B.
    burgdorferi enzymes, BB0444 and BB0454, as sufficient for SQDG biosynthesis
    (BB0454 also makes MGDG); homologs are broadly conserved across spirochetes
    and >30 Borrelia species. This "lipid chimera" strategy of intensive
    scavenging plus niche biosynthesis is essential for envelope integrity and
    persistence, nominating lipid acquisition, sulfolipid synthesis, and neutral-
    lipid storage as candidate antimicrobial targets.
  evidence:
  - reference: PMID:42239376
    reference_title: "A lipid compendium of a metabolically compromised bacterium provides insights into lipid acquisition, biosynthesis, and metabolism."
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: "belongs to a class of metabolically compromised bacteria that cannot survive without host-derived lipids"
    explanation: Lipidomic study establishes B. burgdorferi as a lipid auxotroph dependent on host-derived lipids for survival.
  - reference: PMID:42239376
    reference_title: "A lipid compendium of a metabolically compromised bacterium provides insights into lipid acquisition, biosynthesis, and metabolism."
