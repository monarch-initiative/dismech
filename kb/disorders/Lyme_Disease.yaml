datasets:
- accession: DOI:10.64898/2026.05.22.727245
  title: A lipid compendium of a metabolically compromised bacterium provides insights into lipid acquisition, biosynthesis, and metabolism
  description: >
    Untargeted and targeted high-resolution mass-spectrometry lipidomics of the
    Lyme disease spirochete Borrelia burgdorferi, profiling more than 500 membrane
    and storage lipids and tracing their host/environmental origin versus residual
    de novo biosynthesis. Identifies discriminatory lipid uptake, cholesteryl
    ester and triglyceride accumulation in intracellular foci, and biosynthesis of
    eukaryotic-type lipids (bis(monoacylglycerol)phosphate and sulfoquinovosyl
    diacylglycerol), nominating lipid acquisition and synthesis pathways as
    survival-critical antimicrobial targets.
  organism:
    preferred_term: Borrelia burgdorferi
    term:
      id: NCBITaxon:139
      label: Borreliella burgdorferi
  data_type: METABOLOMICS
  conditions:
  - In vitro-cultured Borrelia burgdorferi (BSK-II medium with 6% rabbit serum)
  platform: Multi-platform LC-MS (Orbitrap, triple quadrupole, quadrupole time-of-flight) and GC-MS untargeted and targeted lipidomics
  publication: PMID:42239376
  findings:
  - statement: Borrelia burgdorferi is a lipid auxotroph that cannot survive without host-derived lipids.
    supporting_text: "belongs to a class of metabolically compromised bacteria that cannot survive without host-derived lipids"
  - statement: More than 500 lipids were detected, the majority sourced from the environment via discriminatory uptake.
    supporting_text: "The analysis detected more than 500 lipids in"
  - statement: Neutral lipids (cholesteryl esters and triglycerides) are organized into distinct intracellular foci — the first evidence of lipid-droplet-like storage in this minimal bacterium.
    supporting_text: "neutral lipids are organized into distinct intracellular foci"
  - statement: Phosphatidylcholine is a principal membrane constituent alongside cholesterol and cholesterol galactolipids.
    supporting_text: "phosphatidylcholine as one of the principal membrane constituents alongside cholesterol and cholesterol galactolipids"
  - statement: Four lysosomal bis(monoacylglycerol)phosphate (BMP) species, absent from the medium, are biosynthesized by the pathogen.
    supporting_text: "We identified four BMPs in B. burgdorferi that were entirely absent from the CM"
  - statement: The interdependent enzymes BB0444 and BB0454 are sufficient for biosynthesis of the plant-type sulfolipid SQDG (confirmed by heterologous expression in E. coli).
    supporting_text: "we discovered two enzymes, BB0444 and BB0454, in B. burgdorferi that are sufficient for the synthesis of SQDG"
  evidence:
  - reference: PMID:42239376
    reference_title: "A lipid compendium of a metabolically compromised bacterium provides insights into lipid acquisition, biosynthesis, and metabolism."
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: "we used a suite of untargeted and targeted high-resolution mass spectrometry methods to reveal a complex lipid profile of the pathogen and to identify the origin of its lipids"
    explanation: Describes the untargeted and targeted high-resolution MS lipidomics workflow that generated this dataset.
  notes: >-
    Preprint dataset (bioRxiv DOI:10.64898/2026.05.22.727245; also PMID:42239376 /
    PMC13228262). Lipidomics is recorded under the METABOLOMICS data_type because
    the schema has no dedicated lipidomics value. The evidence snippets are exact
    quotes from the published abstract; the additional `findings` supporting_text
    quotes are drawn from the full-text preprint PDF.
