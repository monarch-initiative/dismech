    term:
      id: HP:0031180
      label: Erythema migrans
- name: Intravenous Ceftriaxone
  description: >
    Recommended for neurological Lyme disease (neuroborreliosis), Lyme carditis
    with high-degree AV block, and some cases of Lyme arthritis. Duration
