    description: Ceftriaxone penetrates the CNS and is bactericidal against Borrelia burgdorferi, clearing spirochetes disseminated to the nervous system, heart, and joints.
  - target: Borrelial Peptidoglycan Cross-Linking (Beta-Lactam Target)
