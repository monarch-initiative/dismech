    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: "highlights lipid acquisition and synthesis pathways as potentially critical for pathogen survival"
    explanation: The authors nominate lipid acquisition and biosynthesis pathways as survival-critical and therefore as potential antimicrobial targets.
