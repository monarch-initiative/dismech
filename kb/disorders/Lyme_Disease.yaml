  - reference: PMID:42239376
    reference_title: "A lipid compendium of a metabolically compromised bacterium provides insights into lipid acquisition, biosynthesis, and metabolism."
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: "the bacterium selectively accumulates certain lipids while excluding others, suggesting discriminatory uptake. These include cholesteryl esters and triglycerides that are organized in foci within the pathogen"
    explanation: The spirochete shows discriminatory lipid uptake, concentrating cholesteryl esters and triglycerides into intracellular foci.
  - reference: PMID:42239376
    reference_title: "A lipid compendium of a metabolically compromised bacterium provides insights into lipid acquisition, biosynthesis, and metabolism."
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: "the pathogen also synthesizes predominantly eukaryotic lipids such as the lysosomal bis(monoacylglycerol)phosphate and the plant glycolipid sulfoquinovosyl diacylglycerol (SQDG)"
    explanation: Despite its metabolic limitations, B. burgdorferi retains biosynthesis of eukaryotic-type lipids (BMP and SQDG).
  - reference: PMID:42239376
