    evidence_source: HUMAN_CLINICAL
    snippet: "Forty-one of 51 cases with informative clinical data had pure MBD including progressive growth impairment, kyphoscoliosis, coxa/genua valga, joint laxity, platyspondyly, odontoid hypoplasia."
    explanation: This extends the same skeletal/joint phenotype cluster explicitly into Morquio B disease.
