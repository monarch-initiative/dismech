    reference_title: Natural history of Morquio A patient with tracheal obstruction from birth to death.
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "As a result, partially degraded GAGs accumulate in bone, ligaments, and cartilage, as well as the extracellular matrix (ECM) of these tissues, impeding endochondral ossification and chondrogenesis"
    explanation: This directly supplies the mechanistic bridge from storage to cartilage/connective-tissue dysfunction.
