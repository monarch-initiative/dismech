treatments:
- name: Type A elosulfase alfa enzyme replacement therapy
  description: >-
    Weekly intravenous recombinant GALNS replaces the deficient Type A enzyme,
    lowers storage biomarkers, and improves endurance, respiratory function, and
    growth-related outcomes. Skeletal, tracheal, and ocular tissues remain only
    partially responsive because of limited penetration.
  treatment_term:
    preferred_term: enzyme replacement therapy
    term:
      id: MAXO:0000933
      label: enzyme replacement or supplementation therapy
  evidence:
  - reference: PMID:33256811
    reference_title: "Diagnostic journey and impact of enzyme replacement therapy for mucopolysaccharidosis IVA: a sibling control study."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Early recognition, diagnosis, and treatment of this progressive, multisystem disease by enzyme replacement therapy (ERT) can lead to improved outcomes and reduced mortality."
    explanation: This supports ERT as a disease-modifying Type A treatment with clinically meaningful outcome improvement.
  - reference: PMID:33256811
    reference_title: "Diagnostic journey and impact of enzyme replacement therapy for mucopolysaccharidosis IVA: a sibling control study."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "All three patients demonstrated improvements in growth, 6-min walk distance, joint range of motion, and respiratory function after 30 months of ERT."
    explanation: This gives disease-specific clinical evidence for improvement in mobility, growth, and respiratory function.
  - reference: PMID:26331768
    reference_title: Safety and clinical activity of elosulfase alfa in pediatric patients with Morquio A syndrome (mucopolysaccharidosis IVA) less than 5 y.
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Early intervention with elosulfase alfa is well-tolerated and produces a decrease in uKS and a trend toward improvement in growth."
    explanation: This supports biochemical and growth-related benefit when therapy is started early.
  - reference: PMID:30442189
    reference_title: "Enzyme replacement therapy: efficacy and limitations."
    supports: SUPPORT
    evidence_source: OTHER
    snippet: "While ERT is effective in reducing urinary glycosaminoglycans (GAGs) and liver and spleen volume, cartilaginous organs such as the trachea and bronchi, bones and eyes are poorly impacted by ERT probably due to limited penetration in the specific tissue."
    explanation: This keeps the limitation statement honest for bone, airway, and ocular disease.
  target_mechanisms:
  - target: Type A GALNS deficiency
    treatment_effect: RESTORES
    description: Recombinant GALNS replaces the missing lysosomal enzyme in Type A disease.
    evidence:
    - reference: PMID:26331768
      supports: SUPPORT
      evidence_source: HUMAN_CLINICAL
      snippet: "Early intervention with elosulfase alfa is well-tolerated and produces a decrease in uKS and a trend toward improvement in growth."
      explanation: Lower uKS with clinical improvement supports restoration of proximal Type A enzymatic function.
  - target: Keratan sulfate-dominant lysosomal storage in cartilage and connective tissue
