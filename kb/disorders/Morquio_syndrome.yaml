name: Morquio syndrome
creation_date: '2026-04-14T19:54:40Z'
updated_date: '2026-04-14T19:54:40Z'
category: Mendelian
description: >-
  Morquio syndrome, or mucopolysaccharidosis type IV (MPS IV), is a lysosomal
  storage skeletal dysplasia caused by defective lysosomal degradation of
  keratan sulfate. Type A results from GALNS deficiency and causes storage of
  both keratan sulfate and chondroitin-6-sulfate, whereas Type B results from
  GLB1 deficiency with keratan-sulfate-dominant beta-galactosidase dysfunction.
  Storage in cartilage and other connective tissues disrupts chondrocyte
  biology, extracellular matrix organization, endochondral ossification, and
  ligament stability, producing short-trunk short stature, dysostosis
  multiplex, joint laxity, odontoid hypoplasia, cervical cord compression,
  airway obstruction, corneal clouding, hearing loss, and valve disease.
  Intelligence is usually preserved. Elosulfase alfa is disease-modifying for
  Type A, while both subtypes require intensive orthopedic, airway, and
  supportive management.
