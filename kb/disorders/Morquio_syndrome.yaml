- name: Type B GLB1 deficiency with keratan sulfate-biased catalytic loss
  description: >-
    In Morquio type B, GLB1 mutations create a beta-galactosidase deficiency
    phenotype in which keratan sulfate handling is disproportionately impaired,
    producing a skeletal/connective-tissue presentation rather than classic GM1
    gangliosidosis.
  genes:
  - preferred_term: GLB1
