    reference_title: Natural history of Morquio A patient with tracheal obstruction from birth to death.
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Examination of the tissues demonstrated systemic storage materials in multiple tissues, as well as severely ballooned and vacuolated chondrocytes in the trachea, humerus, knee cartilage, and lung bronchus."
    explanation: Human autopsy pathology confirms distorted chondrocyte morphology in multiple disease-relevant tissues.
  downstream:
  - target: Progressive skeletal dysplasia and joint laxity
    description: Defective cartilage and growth plate biology generates dysostosis multiplex, short stature, limb deformity, and joint laxity.
- name: Progressive skeletal dysplasia and joint laxity
  description: >-
    Morquio syndrome expresses its core phenotype as progressive dysostosis
    multiplex, short stature, kyphoscoliosis, limb deformity, and joint laxity.
