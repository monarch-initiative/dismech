has_subtypes:
- name: Type A
  display_name: Type A (MPS IVA, GALNS)
  subtype_term:
    preferred_term: Morquio syndrome A
    term:
      id: MONDO:0009659
      label: mucopolysaccharidosis type 4A
  description: >-
    GALNS-related Morquio syndrome with deficiency of
    N-acetylgalactosamine-6-sulfatase. Type A stores both keratan sulfate and
    chondroitin-6-sulfate and is the Morquio subtype for which elosulfase alfa
    enzyme replacement therapy is approved.
  evidence:
  - reference: PMID:32905071
    reference_title: Chondroitin sulfate disaccharide is a specific and sensitive biomarker for mucopolysaccharidosis type IVA.
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Mucopolysaccharidosis type IVA (MPS IVA) is an inborn error of glycosaminoglycan (GAG) catabolism characterized by a deficiency of the lysosomal enzyme, N-acetylgalactosamine 6-sulphatase (GALNS)."
    explanation: This directly defines Type A as the GALNS-deficient Morquio subtype.
- name: Type B
  display_name: Type B (MPS IVB, GLB1)
  subtype_term:
    preferred_term: Morquio syndrome B
    term:
      id: MONDO:0009660
      label: mucopolysaccharidosis type 4B
  description: >-
    GLB1-related Morquio syndrome with beta-galactosidase deficiency and
    keratan-sulfate-dominant storage. Type B is usually attenuated relative to
    Type A, although intermediate GLB1 phenotypes bridging GM1 gangliosidosis
    and Morquio B have been reported.
  evidence:
  - reference: PMID:33558080
    reference_title: "Morquio B disease: From pathophysiology towards diagnosis."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Morquio B disease is an attenuated phenotype within the spectrum of beta galactosidase (GLB1) deficiencies."
    explanation: This directly defines Type B as a GLB1-related Morquio phenotype and supports retaining it as an explicit subtype.
