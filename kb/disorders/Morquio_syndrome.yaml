    explanation: This directly supports autosomal recessive inheritance for Type B.
prevalence:
- subtype: Type A
  population: Reported incidence range
  notes: >-
    Published incidence estimates for Type A range from approximately
    1 in 640,000 live births in Western Australia to 1 in 76,000 in
    Northern Ireland.
  evidence:
  - reference: PMID:25346323
    reference_title: International guidelines for the management and treatment of Morquio A syndrome.
    supports: SUPPORT
    evidence_source: OTHER
    snippet: "The disease is extremely rare, with incidence rates ranging from 1 in 640,000 live births in Western Australia to 1 in 76,000 live births in Northern Ireland"
    explanation: International guidelines summarize the published incidence range for Morquio A syndrome.
- subtype: Type B
  population: Reported incidence range
  notes: >-
    Type B is ultra-rare, with published incidence around 1:250,000 to
    1:1,000,000 live births.
