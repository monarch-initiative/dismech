    reference_title: Natural history of Morquio A patient with tracheal obstruction from birth to death.
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "The accumulation of these GAGs leads to distinguishing features as skeletal dysplasia with disproportionate dwarfism, short neck, kyphoscoliosis, pectus carinatum, tracheal obstruction, coxa valga, genu valgum, and joint laxity."
    explanation: This directly supports the shared skeletal/connective-tissue phenotype cluster downstream of storage.
