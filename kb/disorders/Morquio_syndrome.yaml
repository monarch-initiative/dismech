progression:
- phase: Birth to early childhood
  subtype: Type A
  age_range: Birth to first years of life
  notes: >-
    Infants usually appear normal at birth, then progressively develop profound
    skeletal and joint abnormalities with additional non-skeletal involvement as
    storage accumulates.
  evidence:
  - reference: PMID:25346323
    reference_title: International guidelines for the management and treatment of Morquio A syndrome.
    supports: SUPPORT
    evidence_source: OTHER
    snippet: "Infants with Morquio A syndrome usually appear normal at birth. However, due to the accumulation of storage material in tissues and organs, leading to cellular dysfunction, they progressively develop profound skeletal and joint abnormalities and an array of non-skeletal manifestations"
    explanation: This directly supports the typical normal-at-birth but progressive early-childhood natural history of Morquio A syndrome.
