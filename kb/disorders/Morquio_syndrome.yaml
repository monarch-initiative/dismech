  - reference: PMID:21497194
    reference_title: "GM1 gangliosidosis and Morquio B disease: an update on genetic alterations and clinical findings."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "GM1 gangliosidosis and Morquio B syndrome, both arising from beta-galactosidase (GLB1) deficiency, are very rare lysosomal storage diseases"
    explanation: This directly identifies GLB1 deficiency as the proximal lesion in Morquio B disease.
  - reference: PMID:12559848
    reference_title: Imbalanced substrate specificity of mutant beta-galactosidase in patients with Morquio B disease.
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: "These findings suggest that imbalanced substrate specificity of the mutant beta-Gals induces predominant accumulation of keratan sulfate and a rationale for performing differential diagnostic analysis for both disorders."
    explanation: Fibroblast kinetic studies show why GLB1-related Morquio disease is keratan-sulfate dominant rather than a generic beta-galactosidase phenotype.
  downstream:
  - target: Keratan sulfate-dominant lysosomal storage in cartilage and connective tissue
    description: GLB1 substrate imbalance produces keratan-sulfate-dominant storage in connective tissues.
- name: Keratan sulfate-dominant lysosomal storage in cartilage and connective tissue
  description: >-
    Keratan sulfate accumulates in both Morquio subtypes; Type A also stores
    chondroitin-6-sulfate. Storage is concentrated in cartilage and other
    connective tissues, where distended lysosomes initiate downstream tissue
    injury.
