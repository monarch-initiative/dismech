pathophysiology:
- name: Lafora body formation through aberrant glycogen metabolism
  description: >
    Loss of laforin phosphatase activity leads to glycogen hyperphosphorylation
    and abnormal chain length patterns. Laforin normally controls glycogen chain
    lengths in a malin-dependent fashion, maintaining glycogen solubility and
    proper branching structure. Without functional laforin or malin, glycogen becomes
    poorly branched, hyperphosphorylated, and insoluble, aggregating into Lafora
    bodies (polyglucosan inclusions) in neurons, astrocytes, and other tissues.
  gene:
    preferred_term: EPM2A
    description: Laforin, a dual-specificity phosphatase that dephosphorylates glycogen
    modifier: DECREASED
    term:
      id: hgnc:3413
      label: EPM2A
  cell_types:
  - preferred_term: Neuron
    term:
      id: CL:0000540
      label: neuron
  - preferred_term: Astrocyte
    term:
      id: CL:0000127
      label: astrocyte
  biological_processes:
  - preferred_term: Glycogen metabolic process
    term:
      id: GO:0005977
      label: glycogen metabolic process
  downstream:
  - target: Neuronal dysfunction and death
    description: >
      Lafora body accumulation in neurons and astrocytes disrupts cellular function,
      causes neuroinflammation, impairs proteostasis, and leads to progressive
      neurodegeneration.
  evidence:
  - reference: PMID:30143794
    reference_title: "Lafora disease - from pathogenesis to treatment strategies."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "The absence of either protein results in poorly branched, hyperphosphorylated glycogen, which precipitates, aggregates and accumulates into Lafora bodies."
    explanation: Directly describes the core mechanism of Lafora body formation from defective laforin/malin function.
  - reference: PMID:28536304
    reference_title: "Abnormal glycogen chain length pattern, not hyperphosphorylation, is critical in Lafora disease."
    supports: SUPPORT
    evidence_source: MODEL_ORGANISM
    snippet: "We conclude that laforin's principle function is to control glycogen chain lengths, in a malin-dependent fashion, and that loss of this control underlies LD."
    explanation: Demonstrates that abnormal glycogen chain length, controlled by laforin in a malin-dependent manner, is the critical mechanism.
  - reference: PMID:29483193
    reference_title: "Lafora disease offers a unique window into neuronal glycogen metabolism."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Individuals with LD develop cytoplasmic, aberrant glycogen inclusions in nearly all tissues that more closely resemble plant starch than human glycogen."
    explanation: Confirms the aberrant nature of the glycogen inclusions and their widespread tissue distribution.
  - reference: PMID:36899857
    reference_title: "Role of Astrocytes in the Pathophysiology of Lafora Disease and Other Glycogen Storage Disorders."
    supports: SUPPORT
    evidence_source: MODEL_ORGANISM
    snippet: "most of these glycogen aggregates are present in astrocytes. Importantly, astrocytic Lafora bodies have been shown to contribute to pathology in Lafora disease."
    explanation: Demonstrates the primary role of astrocytes in Lafora body pathology, previously thought to be exclusively neuronal.
- name: Malin-laforin complex dysfunction in glycogen regulation
  description: >
    Malin (NHLRC1) is an E3 ubiquitin ligase that forms a functional complex with
    laforin. Malin functions to maintain laforin associated with soluble glycogen,
    and its absence causes sequestration of laforin to an insoluble polysaccharide
    fraction where it is functionally inert. Tagged-malin mouse work further shows
    that malin localizes to glycogen, interacts with laforin at glycogen, and depends
    on laforin for glycogen localization. Loss of malin impairs ubiquitination of
    substrates involved in glycogen metabolism. While autophagy disruption has
    been observed in Lafora disease models, evidence indicates that general
    impairment of autophagy is not necessary for disease pathogenesis; rather,
    the primary defect is loss of glycogen chain length control through the
    malin-laforin axis.
  gene:
    preferred_term: NHLRC1
    description: Malin, an E3 ubiquitin ligase that partners with laforin
    modifier: DECREASED
    term:
      id: hgnc:21576
      label: NHLRC1
  biological_processes:
  - preferred_term: Protein ubiquitination
    term:
      id: GO:0016567
      label: protein ubiquitination
  downstream:
  - target: Lafora body formation through aberrant glycogen metabolism
    description: >
      Malin dysfunction contributes to Lafora body formation by failing to
      ubiquitinate and regulate glycogen synthase and other substrates.
  evidence:
  - reference: PMID:12958597
    reference_title: "Mutations in NHLRC1 cause progressive myoclonus epilepsy."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "NHLRC1 (also called EPM2B), which encodes malin, a putative E3 ubiquitin ligase with a RING finger domain and six NHL motifs. Laforin and malin colocalize to the ER, suggesting they operate in a related pathway protecting against polyglucosan accumulation and epilepsy."
    explanation: Establishes malin as an E3 ubiquitin ligase that colocalizes with laforin and operates in a common pathway.
  - reference: PMID:20538597
    reference_title: "Genetic depletion of the malin E3 ubiquitin ligase in mice leads to lafora bodies and the accumulation of insoluble laforin."
    supports: SUPPORT
    evidence_source: MODEL_ORGANISM
    snippet: "we conclude that malin functions to maintain laforin associated with soluble glycogen and that its absence causes sequestration of laforin to an insoluble polysaccharide fraction where it is functionally inert."
    explanation: Demonstrates malin's role in maintaining laforin function and how its absence leads to functional inactivation of laforin.
  - reference: PMID:30336494
    reference_title: "Lafora Disease: A Review of Molecular Mechanisms and Pathology."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Laforin and malin interact to regulate glycogen phosphorylation and chain length pattern, the latter critical to glycogen's solubility."
    explanation: Confirms the functional interaction between laforin and malin in regulating glycogen structure.
  - reference: PMID:36511140
    reference_title: "Laforin targets malin to glycogen in Lafora progressive myoclonus epilepsy."
    supports: SUPPORT
    evidence_source: MODEL_ORGANISM
    snippet: "malin localizes to glycogen, laforin and malin indeed interact, at glycogen, and malin's presence at glycogen depends on laforin."
    explanation: Tagged-malin mouse data support laforin-dependent malin localization at glycogen as a mechanistic step in the laforin-malin axis.
  - reference: PMID:28536304
    reference_title: "Abnormal glycogen chain length pattern, not hyperphosphorylation, is critical in Lafora disease."
    supports: PARTIAL
    evidence_source: MODEL_ORGANISM
    snippet: "general impairment of autophagy is not necessary in LD"
    explanation: Demonstrates that autophagy impairment is not a necessary component of Lafora disease pathogenesis, challenging the hypothesis that autophagy disruption is a primary driver.
- name: Neuronal dysfunction and death
  description: >
    Lafora bodies in neuronal and astrocytic compartments disrupt brain cellular
    function, provoke pathological stress responses, and drive progressive
    neurodegeneration. This node completes the pathograph transition from insoluble
    polyglucosan accumulation to neurological decline.
  cell_types:
  - preferred_term: Neuron
    term:
      id: CL:0000540
      label: neuron
  - preferred_term: Astrocyte
    term:
      id: CL:0000127
      label: astrocyte
  biological_processes:
  - preferred_term: Nervous system process
    modifier: DYSREGULATED
    term:
      id: GO:0050877
      label: nervous system process
  - preferred_term: Inflammatory response
    modifier: INCREASED
    term:
      id: GO:0006954
      label: inflammatory response
  downstream:
  - target: Cortical hyperexcitability and epileptic network dysfunction
    description: >
      Lafora body burden in neuronal and astrocytic processes is hypothesized to
      disturb synaptic function and cortical network excitability, producing progressive
      myoclonus epilepsy.
    causal_link_type: INDIRECT_KNOWN_INTERMEDIATES
    intermediate_mechanisms:
    - Synaptic process disruption, astrocytic disturbance at synapses, and possible interneuron vulnerability.
    evidence:
    - reference: PMID:30336494
      reference_title: "Lafora Disease: A Review of Molecular Mechanisms and Pathology."
      supports: PARTIAL
      evidence_source: HUMAN_CLINICAL
      snippet: "It has been speculated that the gradual overtaking of synaptic cell processes by LB may underlie the epileptogenesis by escalating disturbance of synaptic function."
      explanation: Supports a plausible intermediate route from Lafora body burden to epileptogenesis while acknowledging that the mechanism is not fully resolved.
  - target: Progressive cognitive decline and dementia
    description: Progressive neurodegeneration causes relentless cognitive deterioration and dementia.
  - target: Progressive neurologic deterioration
    description: Progressive neuronal dysfunction produces global neurologic decline toward severe disability.
  - target: Ataxia
    description: Neurodegenerative involvement of motor coordination networks contributes to ataxia.
  evidence:
  - reference: PMID:30143794
    reference_title: "Lafora disease - from pathogenesis to treatment strategies."
    supports: SUPPORT
    evidence_source: MODEL_ORGANISM
    snippet: "Evidence from Lafora disease genetic mouse models indicates that these intracellular inclusions are a principal driver of neurodegeneration and neurological disease."
    explanation: Supports Lafora bodies as causal drivers of neurodegeneration and neurological disease in genetic models.
  - reference: PMID:36899857
    reference_title: "Role of Astrocytes in the Pathophysiology of Lafora Disease and Other Glycogen Storage Disorders."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Several reports have demonstrated that the accumulation of this abnormal glycogen underlies all the pathologic traits of the disease."
    explanation: Supports abnormal glycogen accumulation as the upstream driver of Lafora disease pathology.
- name: Cortical hyperexcitability and epileptic network dysfunction
  description: >
    Brain Lafora body pathology produces progressive myoclonus epilepsy with
    photosensitivity, occipital visual seizures, generalized tonic-clonic seizures,
    absence/myoclonic absence seizures, and worsening EEG background slowing with
    spike-wave or polyspike-wave discharges.
  cell_types:
  - preferred_term: Neuron
    term:
      id: CL:0000540
      label: neuron
  - preferred_term: Astrocyte
    term:
      id: CL:0000127
      label: astrocyte
  biological_processes:
  - preferred_term: Nervous system process
    modifier: DYSREGULATED
    term:
      id: GO:0050877
      label: nervous system process
  downstream:
  - target: Myoclonus
    description: Cortical epileptic network dysfunction manifests as progressive, intractable myoclonus.
  - target: Seizures
    description: Cortical hyperexcitability drives recurrent epileptic seizures.
  - target: Generalized tonic-clonic seizures
    description: Progressive network dysfunction includes generalized tonic-clonic seizures.
  - target: Absence seizures
    description: Progressive network dysfunction includes atypical and myoclonic absence seizures.
  - target: Visual hallucinations
    description: Occipital seizure involvement produces visual hallucinations, scotomata, and photoconvulsions.
  evidence:
  - reference: PMID:30336494
    reference_title: "Lafora Disease: A Review of Molecular Mechanisms and Pathology."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "successive electroencephalographs (EEG's) show, unlike in JME, a slowing background and spike-wave discharges"
    explanation: Supports cortical epileptic network dysfunction as part of Lafora disease progression.
  - reference: PMID:11483392
    reference_title: "Lafora's disease: towards a clinical, pathologic, and molecular synthesis."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Characteristic seizures include myoclonic and occipital lobe seizures with visual hallucinations, scotomata, and photoconvulsions."
    explanation: Supports the seizure and visual pathway from epileptic network dysfunction to characteristic Lafora phenotypes.
