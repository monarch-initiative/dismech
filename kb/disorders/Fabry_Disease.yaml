- name: Peripheral sensory neuron glycosphingolipid storage
  description: >
    Glycosphingolipid accumulation in neurons and peripheral sensory pathways contributes to small-fiber dysfunction,
    neuropathic pain, and early acroparesthesia.
  evidence:
