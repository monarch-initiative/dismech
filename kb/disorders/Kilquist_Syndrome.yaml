  evidence:
  - reference: PMID:40678848
    reference_title: "Identification and Characterization of a Novel Biallelic SLC12A2 Variant Associated With Kilquist Syndrome (OMIM #619080)."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      The effect of this mutation was further investigated using exon-walking PCR and Sanger sequencing, which confirmed exon 23 skipping in the patient's mRNA, resulting in a truncated NKCC1 protein.
    explanation: >-
      This directly supports RNA-level and protein-level disruption of NKCC1.
  - reference: PMID:40678848
    reference_title: "Identification and Characterization of a Novel Biallelic SLC12A2 Variant Associated With Kilquist Syndrome (OMIM #619080)."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      In silico structural modeling suggested compromised dimerization stability, which was supported by immunoblotting analysis, revealing the absence of the dimeric form of NKCC1 in patient-derived peripheral blood mononuclear cells.
    explanation: >-
      This supports a structural mechanism in which mutant NKCC1 fails to form
      the normal dimeric transporter state.
  downstream:
  - target: Cochlear, neurologic, and secretory epithelial dysfunction
    description: Loss of NKCC1 impairs fluid homeostasis and secretion across multiple tissues
- name: Cochlear, neurologic, and secretory epithelial dysfunction
  description: >-
    NKCC1 deficiency compromises auditory, neurologic, gastrointestinal, and
    secretory epithelial function, producing the defining Kilquist phenotype.
  evidence:
  - reference: PMID:30740830
    reference_title: "Kilquist syndrome: A novel syndromic hearing loss disorder caused by homozygous deletion of SLC12A2."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Our case is the first known human presentation of complete loss of NKCC1 and demonstrates the role of SLC12A2 in human secretory systems and disease.
    explanation: >-
      This directly supports widespread secretory-system involvement from NKCC1
      loss.
