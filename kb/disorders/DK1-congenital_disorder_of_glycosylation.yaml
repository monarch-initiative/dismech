- name: Echocardiography
  diagnosis_term:
    preferred_term: echocardiography
    term:
      id: MAXO:0010203
      label: echocardiography
  description: >-
    Serial echocardiography defines the severity of dilated cardiomyopathy and
    monitors response to supportive therapy or transplantation.
  results: >-
    Ventricular dilatation and impaired systolic function support the cardiac
    manifestation of DK1-CDG.
  evidence:
  - reference: PMID:22327749
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      The diagnosis of dilated cardiomyopathy was made using the standard
      American and European guidelines for LV size and systolic function in
      children.
    explanation: >-
      This supports echocardiography as part of diagnostic evaluation and
      longitudinal monitoring.
  - reference: PMID:24144945
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Borderline cardiac dilatation, concentric left ventricular hypertrophy,
      and decreased left ventricular function were noted.
    explanation: >-
      This demonstrates the cardiac imaging findings used to define severe
      DK1-CDG involvement.
treatments:
- name: Supportive heart failure therapy
  description: >-
    Standard heart-failure therapy with ACE inhibitors, beta blockers, diuretics,
    and digoxin is used to stabilize patients with milder dilated
    cardiomyopathy.
  treatment_term:
    preferred_term: supportive care
    term:
      id: MAXO:0000950
      label: supportive care
  evidence:
  - reference: PMID:22327749
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      The other 4 children diagnosed with mild dilated cardiomyopathy are doing
      well on supportive heart failure therapy.
    explanation: >-
      This directly supports supportive heart-failure treatment in DK1-CDG.
  - reference: PMID:22327749
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      They include ACE inhibitors and β blockers, in addition to diuretics and
      even Digoxin.
    explanation: >-
      This provides the specific components of supportive cardiomyopathy
      management.
- name: Heart transplantation
