    explanation: >-
      This directly supports seizures in the severe DK1-CDG case.
  - reference: PMID:23890587
    reference_title: "Dolichol kinase deficiency (DOLK-CDG) with a purely neurological presentation caused by a novel mutation."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      A 4-month old boy presented with multiple epileptic seizure types
      including West syndrome.
    explanation: >-
      This confirms that seizure can be the dominant neurologic presentation in
      DK1-CDG.
- name: Failure to thrive
  category: Growth
  description: >-
