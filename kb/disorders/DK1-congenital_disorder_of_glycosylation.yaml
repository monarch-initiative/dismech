biochemical:
- name: Carbohydrate-deficient transferrin profile
  presence: ABNORMAL
  context: >-
    DK1-CDG shows a type I carbohydrate-deficient transferrin pattern with
    underglycosylated transferrin and impaired N-linked glycosylation.
  evidence:
  - reference: PMID:22327749
    reference_title: "From discrete dilated cardiomyopathy to successful cardiac transplantation in congenital disorders of glycosylation due to dolichol kinase deficiency (DK1-CDG)."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Plasma transferrin isoelectric focusing (TIEF) is used as a simple and
      reliable biochemical screening tool for CDG.
    explanation: >-
      This supports the characteristic biochemical screening abnormality used
      in DK1-CDG.
  - reference: PMID:24144945
    reference_title: "Severe, fatal multisystem manifestations in a patient with dolichol kinase-congenital disorder of glycosylation."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      ESI-MS of transferrin (Mayo Clinic, Rochester, MN) demonstrated elevated
      mono-oligosaccharide:di-oligosaccharide transferrin ratio of 0.707
      (reference range < 0.100) and a-oligosaccharide:di-oligosaccharide
      transferrin ratio of 0.216 (reference range < 0.050). These ratios are
      indicative of Type I CDG, resulting in impaired synthesis or transfer of
      the LLO precursor that subsequently generates proteins with unoccupied
      glycosylation sites [2].
    explanation: >-
      This directly supports an abnormal type I transferrin glycosylation
      profile in DK1-CDG.
- name: Abnormal coagulation profile
  presence: ABNORMAL
  context: >-
    DK1-CDG can reduce natural anticoagulant activities and produce a
    characteristic coagulation-factor abnormality even without overt bleeding.
  evidence:
  - reference: PMID:22327749
    reference_title: "From discrete dilated cardiomyopathy to successful cardiac transplantation in congenital disorders of glycosylation due to dolichol kinase deficiency (DK1-CDG)."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Clotting factor XI and antithrombin III activity were decreased in all
      patients. Interestingly, no significant bleeding event or thrombotic
      event was observed in any of the patients.
    explanation: >-
      This directly supports the recurrent coagulation abnormality reported in
      DK1-CDG.
