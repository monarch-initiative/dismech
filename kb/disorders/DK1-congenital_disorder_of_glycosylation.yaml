  evidence:
  - reference: PMID:24144945
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      He also developed renal failure and hepatic synthetic dysfunction...
    explanation: >-
      The severe case report documents renal failure as part of the terminal
