  phenotype_term:
    preferred_term: Hyperglycemia
    term:
      id: HP:0003074
      label: Hyperglycemia
  evidence:
  - reference: PMID:24144945
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      At age 3 months, the patient developed ... hyperglycemia (glucose 461
      mg/dL ...). Even high continuous insulin infusion ... did not stabilize
      the glucose.
    explanation: >-
      This directly supports severe neonatal hyperglycemia in DK1-CDG.
- name: Renal insufficiency
  category: Renal
  description: >-
    Severe DK1-CDG may progress to renal dysfunction or renal failure.
  phenotype_term:
    preferred_term: Renal insufficiency
    term:
