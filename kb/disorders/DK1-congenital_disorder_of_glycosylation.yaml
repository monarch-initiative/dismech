      label: Hyperglycemia
  evidence:
  - reference: PMID:24144945
    reference_title: "Severe, fatal multisystem manifestations in a patient with dolichol kinase-congenital disorder of glycosylation."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      At age 3 months, the patient developed sinus tachycardia, hypertension,
      unexplained hypokalemia (K+ 3.0 mEq/L, reference range 3.6–6.0 mEq/L),
      and hyperglycemia (glucose 461 mg/dL, reference range 65–110 mg/dL)
      despite low glucose infusion rate of 2 mg/kg/minute. While potassium
      levels eventually stabilized, his glucose remained markedly elevated
      without ketoacidosis. Even high continuous insulin infusion (1.3 units/kg/hour)
      did not stabilize the glucose.
    explanation: >-
      This directly supports severe neonatal hyperglycemia in DK1-CDG.
