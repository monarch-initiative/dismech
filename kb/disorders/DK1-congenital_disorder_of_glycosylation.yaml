name: DK1-congenital disorder of glycosylation
creation_date: "2026-04-15T23:36:42Z"
updated_date: "2026-04-21T21:14:34Z"
description: >-
  DK1-congenital disorder of glycosylation is an autosomal recessive DOLK-
  related congenital disorder of glycosylation characterized by impaired
  dolichol phosphate biosynthesis, abnormal N-linked glycosylation, and
  variable neonatal-onset multisystem disease featuring dilated
  cardiomyopathy, ichthyosis, hypotonia, seizures, and early death.
category: Mendelian
disease_term:
  preferred_term: DK1-congenital disorder of glycosylation
  term:
    id: MONDO:0012556
    label: DK1-congenital disorder of glycosylation
parents:
- hereditary disease
- congenital disorder of glycosylation type I
- familial dilated cardiomyopathy
- disorder of multiple glycosylation
- hereditary skin disorder
inheritance:
- name: Autosomal recessive inheritance
  inheritance_term:
    preferred_term: Autosomal recessive inheritance
    term:
      id: HP:0000007
      label: Autosomal recessive inheritance
  description: >-
    DK1-congenital disorder of glycosylation is caused by biallelic DOLK
    pathogenic variants and segregates in an autosomal recessive pattern.
  evidence:
  - reference: PMID:22327749
    reference_title: "From discrete dilated cardiomyopathy to successful cardiac transplantation in congenital disorders of glycosylation due to dolichol kinase deficiency (DK1-CDG)."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Mutation analysis in the DK1 gene revealed homozygous mutations c.1222C
      > G; (p.His408Asp) in all affected surviving individuals in Family I and
      Family II. The homozygous mutation c.912G>T (p.Trp304Cys) was detected
      in all affected members of Family III.
    explanation: >-
      The familial segregation and homozygous pathogenic variants support an
      autosomal recessive mode of inheritance.
  - reference: PMID:24144945
    reference_title: "Severe, fatal multisystem manifestations in a patient with dolichol kinase-congenital disorder of glycosylation."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      next-generation sequencing demonstrated homozygous p.Q483K DOLK mutations
      that were confirmed in patient fibroblasts to result in severely reduced
      substrate binding and catalytic activity.
    explanation: >-
      This case report confirms biallelic DOLK-related disease in a human
      patient.
pathophysiology:
- name: DOLK deficiency
  description: >-
    Biallelic DOLK variants reduce dolichol kinase activity and compromise
    dolichol phosphate biosynthesis in the endoplasmic reticulum membrane.
  genes:
  - preferred_term: DOLK
    term:
      id: hgnc:23406
      label: DOLK
  evidence:
  - reference: PMID:24144945
    reference_title: "Severe, fatal multisystem manifestations in a patient with dolichol kinase-congenital disorder of glycosylation."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Dolichol kinase (DOLK) catalyzes the final step in biosynthesis of
      dolichol phosphate (Dol-P), which is the oligosaccharide carrier required
      for protein N-glycosylation.
    explanation: >-
      This case report states the enzymatic role of DOLK in dolichol phosphate
      biosynthesis and links it to glycosylation.
  downstream:
  - target: Reduced dolichol phosphate-dependent glycosylation
    description: Loss of dolichol phosphate production limits downstream glycosylation reactions.
    evidence:
    - reference: PMID:24144945
      reference_title: "Severe, fatal multisystem manifestations in a patient with dolichol kinase-congenital disorder of glycosylation."
      supports: SUPPORT
      evidence_source: HUMAN_CLINICAL
      snippet: >-
        Dolichol kinase (DOLK) catalyzes the final step in biosynthesis of
        dolichol phosphate (Dol-P), which is the oligosaccharide carrier required
        for protein N-glycosylation.
      explanation: >-
        Establishes the direct enzymatic link between DOLK deficiency and
        impaired dolichol phosphate-dependent glycosylation.
- name: Reduced dolichol phosphate-dependent glycosylation
  description: >-
    Dolichol phosphate is required for N-glycosylation and for other dolichol-
    dependent glycosylation pathways, so DOLK deficiency causes broad glycan
    synthesis defects.
  evidence:
  - reference: PMID:24144945
    reference_title: "Severe, fatal multisystem manifestations in a patient with dolichol kinase-congenital disorder of glycosylation."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      N-linked CDG was suspected when ESI-MS of transferrin (Mayo Clinic,
      Rochester, MN) demonstrated elevated mono-oligosaccharide:di-
      oligosaccharide transferrin ratio of 0.707 (reference range < 0.100) and
      a-oligosaccharide:di-oligosaccharide transferrin ratio of 0.216
      (reference range < 0.050). These ratios are indicative of Type I CDG,
      resulting in impaired synthesis or transfer of the LLO precursor that
      subsequently generates proteins with unoccupied glycosylation sites [2].
    explanation: >-
      The type I transferrin pattern and accompanying explanation support a
      defect in LLO synthesis/transfer and abnormal N-linked glycosylation.
  downstream:
  - target: Abnormal alpha-dystroglycan O-mannosylation
    description: Defective dolichol-dependent glycosylation alters alpha-dystroglycan modification.
    evidence:
    - reference: PMID:22242004
      reference_title: "Autosomal recessive dilated cardiomyopathy due to DOLK mutations results from abnormal dystroglycan O-mannosylation."
      supports: SUPPORT
      evidence_source: HUMAN_CLINICAL
      snippet: >-
        Investigation of other dolichol-phosphate dependent glycosylation
        pathways in biopsied heart tissue indicated reduced O-mannosylation of
        alpha-dystroglycan with concomitant functional loss of its
        laminin-binding capacity
      explanation: >-
        Directly links dolichol-phosphate dependent glycosylation defects in
        DOLK patients to abnormal alpha-dystroglycan O-mannosylation.
  - target: Defective glycoprotein maturation
    description: Broad glycoprotein hypoglycosylation drives multisystem manifestations.
    evidence:
    - reference: PMID:22242004
      reference_title: "Autosomal recessive dilated cardiomyopathy due to DOLK mutations results from abnormal dystroglycan O-mannosylation."
      supports: SUPPORT
      evidence_source: HUMAN_CLINICAL
      snippet: >-
        Metabolic investigations showed deficient protein N-glycosylation,
        leading to a diagnosis of Congenital Disorders of Glycosylation (CDG).
      explanation: >-
        DOLK mutations produce deficient protein N-glycosylation (the defining
        CDG biochemical signature of defective glycoprotein maturation).
  - target: Epidermal lipid metabolism defect
    description: >-
      Severe cutaneous DOLK-CDG includes epidermal lipid-handling defects that
      contribute to the ichthyotic skin phenotype.
    evidence:
    - reference: PMID:28816422
      reference_title: "Dolichol kinase deficiency (DOLK-CDG): Two new cases and expansion of phenotype."
      supports: SUPPORT
      evidence_source: HUMAN_CLINICAL
      snippet: >-
        Histology of the skin showed lipid droplet accumulation in the stratum
        corneum and keratinocytes, which suggests defective epidermal lipid
        metabolism.
      explanation: >-
        This directly supports epidermal lipid metabolic disruption as a
        downstream consequence of DOLK deficiency in the skin.
- name: Abnormal alpha-dystroglycan O-mannosylation
  description: >-
    DOLK-related glycosylation defects reduce O-mannosylation of
    alpha-dystroglycan in the heart, weakening extracellular-matrix linkage.
  evidence:
  - reference: PMID:22242004
    reference_title: "Autosomal recessive dilated cardiomyopathy due to DOLK mutations results from abnormal dystroglycan O-mannosylation."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      reduced O-mannosylation of alpha-dystroglycan with concomitant functional
      loss of its laminin-binding capacity
    explanation: >-
      This directly links DOLK mutations to abnormal dystroglycan
      glycosylation in affected human heart tissue.
  downstream:
  - target: Dilated cardiomyopathy
    description: Cardiac dystroglycan hypoglycosylation contributes to cardiomyopathy and heart failure.
    evidence:
    - reference: PMID:22242004
      reference_title: "Autosomal recessive dilated cardiomyopathy due to DOLK mutations results from abnormal dystroglycan O-mannosylation."
      supports: SUPPORT
      evidence_source: HUMAN_CLINICAL
      snippet: >-
        reduced O-mannosylation of alpha-dystroglycan with concomitant functional
        loss of its laminin-binding capacity, which has been linked to DCM.
      explanation: >-
        Establishes the causal link from alpha-dystroglycan hypoglycosylation
        and laminin-binding loss to dilated cardiomyopathy in DOLK patients.
- name: Defective glycoprotein maturation
  description: >-
    Global glycoprotein hypoglycosylation contributes to neurologic, skin,
    hematologic, and renal manifestations across the DK1-CDG spectrum.
  evidence:
  - reference: PMID:22327749
    reference_title: "From discrete dilated cardiomyopathy to successful cardiac transplantation in congenital disorders of glycosylation due to dolichol kinase deficiency (DK1-CDG)."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      CDG is generally associated with multi-organ symptoms, including
      psychomotor retardation, ataxia, polyneuropathy, epilepsy, endocrine
      abnormalities, growth retardation, visual and hearing loss, ichthyosis,
      cardiac, renal, liver, and gastrointestinal involvement [2, 5–9].
    explanation: >-
      This review of the early DK1-CDG families supports broad multisystem
      disease with neurologic, skin, and metabolic consequences.
  - reference: PMID:24144945
    reference_title: "Severe, fatal multisystem manifestations in a patient with dolichol kinase-congenital disorder of glycosylation."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Symptoms generally associated with CDGs include profound global delay,
      epilepsy, polyneuropathy, ataxia, endocrine abnormalities, ichthyosis,
      visual and hearing loss, cardiac, liver, renal, and gastrointestinal
      involvement [3].
    explanation: >-
      The severe case report supports downstream multisystem consequences of
      defective glycoprotein maturation, including neurologic, metabolic, and
      renal disease.
  downstream:
  - target: Muscular hypotonia
    description: Neuromuscular glycosylation defects contribute to generalized hypotonia.
  - target: Ichthyosis
    description: Skin glycosylation defects contribute to ichthyosiform skin disease.
  - target: Seizure
    description: Neurologic glycosylation defects can manifest as refractory seizures.
  - target: Failure to thrive
