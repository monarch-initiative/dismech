    reference_title: "From discrete dilated cardiomyopathy to successful cardiac transplantation in congenital disorders of glycosylation due to dolichol kinase deficiency (DK1-CDG)."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Patient I/6, a younger sister of patient I/5, had a history of mild hypotonia, failure to thrive, short stature, and ichthyosiform dermatitis. She was diagnosed with mild dilated cardiomyopathy (LVEDD and LVESD Z-scores 2.27 and 2.38, respectively) at the age of 6 without any clinical symptoms."
    explanation: >-
      This supports failure to thrive as a reported DK1-CDG feature.
  - reference: PMID:24144945
    reference_title: "Severe, fatal multisystem manifestations in a patient with dolichol kinase-congenital disorder of glycosylation."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      He had gastroesophageal reflux and dysphagia, failed to thrive, and
      eventually required a gastrostomy tube for enteral feeding.
    explanation: >-
      The severe case report directly documents failure to thrive.
