name: DK1-congenital disorder of glycosylation
creation_date: "2026-04-15T23:36:42Z"
updated_date: "2026-04-15T23:54:33Z"
description: >-
  DK1-congenital disorder of glycosylation is an autosomal recessive DOLK-
  related congenital disorder of glycosylation characterized by impaired
  dolichol phosphate biosynthesis, abnormal N-linked glycosylation, and
  variable neonatal-onset multisystem disease featuring dilated
  cardiomyopathy, ichthyosis, hypotonia, seizures, and early death.
category: Mendelian
disease_term:
  preferred_term: DK1-congenital disorder of glycosylation
  term:
    id: MONDO:0012556
    label: DK1-congenital disorder of glycosylation
parents:
- hereditary disease
- congenital disorder of glycosylation type I
- familial dilated cardiomyopathy
- disorder of multiple glycosylation
- hereditary skin disorder
inheritance:
- name: Autosomal recessive inheritance
  inheritance_term:
    preferred_term: Autosomal recessive inheritance
    term:
      id: HP:0000007
      label: Autosomal recessive inheritance
  description: >-
    DK1-congenital disorder of glycosylation is caused by biallelic DOLK
    pathogenic variants and segregates in an autosomal recessive pattern.
  evidence:
  - reference: PMID:22327749
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Mutation analysis in the DK1 gene revealed homozygous mutations c.1222C
      > G; (p.His408Asp) in all affected surviving individuals in Family I and
      Family II. The homozygous mutation c.912G>T (p.Trp304Cys) was detected
      in all affected members of Family III.
    explanation: >-
      The familial segregation and homozygous pathogenic variants support an
      autosomal recessive mode of inheritance.
  - reference: PMID:24144945
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      next-generation sequencing demonstrated homozygous p.Q483K DOLK mutations
      that were confirmed in patient fibroblasts to result in severely reduced
      substrate binding and catalytic activity.
    explanation: >-
      This case report confirms biallelic DOLK-related disease in a human
      patient.
pathophysiology:
- name: DOLK deficiency
  description: >-
    Biallelic DOLK variants reduce dolichol kinase activity and compromise
    dolichol phosphate biosynthesis in the endoplasmic reticulum membrane.
  genes:
  - preferred_term: DOLK
    term:
      id: hgnc:23406
      label: DOLK
  evidence:
  - reference: PMID:24144945
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Dolichol kinase (DOLK) catalyzes the final step in biosynthesis of
      dolichol phosphate (Dol-P), which is the oligosaccharide carrier required
      for protein N-glycosylation.
    explanation: >-
      This case report states the enzymatic role of DOLK in dolichol phosphate
      biosynthesis and links it to glycosylation.
  downstream:
  - target: Reduced dolichol phosphate-dependent glycosylation
    description: Loss of dolichol phosphate production limits downstream glycosylation reactions.
- name: Reduced dolichol phosphate-dependent glycosylation
  description: >-
    Dolichol phosphate is required for N-glycosylation and for other dolichol-
    dependent glycosylation pathways, so DOLK deficiency causes broad glycan
    synthesis defects.
  evidence:
  - reference: PMID:24144945
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      N-linked CDG was suspected when ESI-MS of transferrin ... demonstrated
      elevated mono-oligosaccharide:di-oligosaccharide transferrin ratio ...
      These ratios are indicative of Type I CDG, resulting in impaired synthesis
      or transfer of the LLO precursor that subsequently generates proteins
      with unoccupied glycosylation sites.
    explanation: >-
      The type I transferrin pattern and accompanying explanation support a
      defect in LLO synthesis/transfer and abnormal N-linked glycosylation.
  downstream:
  - target: Abnormal alpha-dystroglycan O-mannosylation
    description: Defective dolichol-dependent glycosylation alters alpha-dystroglycan modification.
  - target: Defective glycoprotein maturation
    description: Broad glycoprotein hypoglycosylation drives multisystem manifestations.
- name: Abnormal alpha-dystroglycan O-mannosylation
  description: >-
    DOLK-related glycosylation defects reduce O-mannosylation of
    alpha-dystroglycan in the heart, weakening extracellular-matrix linkage.
  evidence:
  - reference: PMID:22242004
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      reduced O-mannosylation of alpha-dystroglycan with concomitant functional
      loss of its laminin-binding capacity
    explanation: >-
      This directly links DOLK mutations to abnormal dystroglycan
      glycosylation in affected human heart tissue.
  downstream:
  - target: Dilated cardiomyopathy
    description: Cardiac dystroglycan hypoglycosylation contributes to cardiomyopathy and heart failure.
- name: Defective glycoprotein maturation
  description: >-
    Global glycoprotein hypoglycosylation contributes to neurologic, skin,
    hematologic, and renal manifestations across the DK1-CDG spectrum.
  evidence:
  - reference: PMID:22327749
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      The children died in the first year of life from a severe infection or
      due to cardiac failure and dilated cardiomyopathy. The neonatally observed
      neurological involvement and severe muscular hypotonia dominated the
      clinical presentation. All patients had significant skin findings
      (hyperkeratosis, ichthyosis, minimal hair growth), and one child had
      symptoms of hypoglycemia, failure to thrive, and liver involvement.
    explanation: >-
      This review of the early DK1-CDG families supports broad multisystem
      disease with neurologic, skin, and metabolic consequences.
  - reference: PMID:24144945
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Our patient developed heart failure and seizures, he also had multiple
      major malformations such as talipes equinovarus and penoscrotal fusion...
      In addition, he had severe insulin-resistant hyperglycemia... He also
      developed renal failure and hepatic synthetic dysfunction.
    explanation: >-
      The severe case report supports downstream multisystem consequences of
      defective glycoprotein maturation, including neurologic, metabolic, and
      renal disease.
  downstream:
  - target: Muscular hypotonia
    description: Neuromuscular glycosylation defects contribute to generalized hypotonia.
  - target: Ichthyosis
    description: Skin glycosylation defects contribute to ichthyosiform skin disease.
  - target: Seizure
    description: Neurologic glycosylation defects can manifest as refractory seizures.
  - target: Failure to thrive
    description: Multisystem metabolic disease contributes to poor growth and feeding difficulty.
  - target: Microcytic anemia
    description: Abnormal glycoprotein biology can accompany chronic microcytic anemia.
  - target: Renal insufficiency
    description: Severe multisystem involvement can include renal dysfunction.
  - target: Hyperglycemia
    description: Severe neonatal disease may include insulin-resistant hyperglycemia.
  - target: Global developmental delay
    description: Neurodevelopmental impairment is part of the broad CDG phenotype.
  - target: Abnormal facial shape
    description: Dysmorphic features can occur in severe multisystem disease.
  - target: Talipes equinovarus
    description: Fetal hypokinesia and muscular dystrophy can contribute to limb contractures.
phenotypes:
- name: Dilated cardiomyopathy
  category: Cardiovascular
  diagnostic: true
  description: >-
    Dilated cardiomyopathy is the most consistent and clinically dominant
    manifestation of DK1-CDG.
  phenotype_term:
    preferred_term: Dilated cardiomyopathy
    term:
      id: HP:0001644
      label: Dilated cardiomyopathy
  evidence:
  - reference: PMID:22327749
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Dilated cardiomyopathy has been long known to be associated with various
      inborn errors of metabolism. ... A lethal form of DCM has been described
      in DK1-CDG.
    explanation: >-
      This review identifies dilated cardiomyopathy as a defining cardiac
      feature of DK1-CDG.
  - reference: PMID:22327749
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      The cardiac symptoms varied from discrete, mild dilation to overt heart
      failure with death.
    explanation: >-
      The cohort data support dilated cardiomyopathy as a very frequent
      phenotype.
- name: Muscular hypotonia
  category: Neurologic
  diagnostic: true
  description: >-
    Hypotonia is a frequent early neurologic feature in DK1-CDG.
  phenotype_term:
    preferred_term: Hypotonia
    term:
      id: HP:0001252
      label: Hypotonia
  evidence:
  - reference: PMID:22327749
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      The neonatally observed neurological involvement and severe muscular
      hypotonia dominated the clinical presentation.
    explanation: >-
      This directly supports muscular hypotonia as a key clinical feature.
  - reference: PMID:24144945
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Physical examination showed systolic heart murmur, hypotonia, bilateral
      talipes equinovarus...
    explanation: >-
      The severe case report confirms neonatal hypotonia in DK1-CDG.
- name: Ichthyosis
  category: Dermatologic
  diagnostic: true
  description: >-
    Ichthyosis or severe hyperkeratotic skin disease is a recurrent cutaneous
    phenotype.
  phenotype_term:
    preferred_term: Ichthyosis
    term:
      id: HP:0008064
      label: Ichthyosis
  evidence:
  - reference: PMID:22327749
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      All patients had significant skin findings (hyperkeratosis, ichthyosis,
      minimal hair growth)...
    explanation: >-
      This review directly identifies ichthyosis as a recurrent DK1-CDG
      manifestation.
  - reference: PMID:34956305
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      the congenital skin phenotype (often ichthyosis) is later associated with
      variable extracutaneous features such as dilatative cardiomyopathy,
      epilepsy, microcephaly, visual impairment, and hypoglycemia and may lead
      to a fatal course.
    explanation: >-
      This report supports severe ichthyotic skin disease as part of the DK1-
      CDG spectrum.
- name: Seizure
  category: Neurologic
  diagnostic: true
  description: >-
    Seizures can occur in severe neonatal and infantile DK1-CDG.
  phenotype_term:
    preferred_term: Seizure
    term:
      id: HP:0001250
      label: Seizure
  evidence:
  - reference: PMID:24144945
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      The events were found to be caused by partial or generalized seizures, as
      an electroencephalogram revealed non-specific encephalopathy and
      generalized multifocal seizures.
    explanation: >-
      This directly supports seizures in the severe DK1-CDG case.
  - reference: PMID:23890587
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      A 4-month old boy presented with multiple epileptic seizure types
      including West syndrome.
    explanation: >-
      This confirms that seizure can be the dominant neurologic presentation in
      DK1-CDG.
- name: Failure to thrive
  category: Growth
  description: >-
    Feeding difficulty and poor growth are reported in some affected children.
  phenotype_term:
    preferred_term: Failure to thrive
    term:
      id: HP:0001508
      label: Failure to thrive
  evidence:
  - reference: PMID:22327749
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Patient I/6, a younger sister of patient I/5, had a history of mild hypotonia, failure to thrive, short stature, and ichthyosiform dermatitis. She was diagnosed with mild dilated cardiomyopathy (LVEDD and LVESD Z-scores 2.27 and 2.38, respectively) at the age of 6 without any clinical symptoms."
    explanation: >-
      This supports failure to thrive as a reported DK1-CDG feature.
  - reference: PMID:24144945
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      He had gastroesophageal reflux and dysphagia, failed to thrive, and
      eventually required a gastrostomy tube for enteral feeding.
    explanation: >-
      The severe case report directly documents failure to thrive.
- name: Microcytic anemia
  category: Hematologic
  description: >-
    Chronic microcytic anemia is common in the Israeli cohort.
  phenotype_term:
    preferred_term: Microcytic anemia
    term:
      id: HP:0001935
      label: Microcytic anemia
  evidence:
  - reference: PMID:22327749
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Most patients presented with chronic microcytic anemia and recurrent
      episodes of leucopenia without thrombocytopenia.
    explanation: >-
      This supports microcytic anemia as a frequent hematologic feature.
- name: Hyperglycemia
  category: Endocrine
  description: >-
    Severe insulin-resistant hyperglycemia has been reported in the neonatal
