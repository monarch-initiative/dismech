      label: transplantation procedure
  evidence:
  - reference: PMID:22327749
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Three children had repeated TIEF analysis upon cardiac transplantation.
    explanation: >-
      This demonstrates that heart transplantation was performed in affected
      DK1-CDG patients.
  - reference: PMID:22327749
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      They all went through successful heart transplantation;
    explanation: >-
      This directly supports transplantation as a disease-relevant therapy.
