  - target: Renal insufficiency
    description: Severe multisystem involvement can include renal dysfunction.
  - target: Hyperglycemia
    description: Severe neonatal disease may include insulin-resistant hyperglycemia.
  - target: Hypoglycemia
    description: >-
      Some patients with syndromic ichthyotic DOLK-CDG develop neonatal or
      infantile hypoglycemia.
  - target: Global developmental delay
    description: Neurodevelopmental impairment is part of the broad CDG phenotype.
  - target: Abnormal facial shape
    description: Dysmorphic features can occur in severe multisystem disease.
  - target: Talipes equinovarus
    description: Fetal hypokinesia and muscular dystrophy can contribute to limb contractures.
- name: Epidermal lipid metabolism defect
  description: >-
    DOLK-related glycosylation abnormalities can disrupt epidermal lipid
    metabolism, producing keratinocyte lipid-droplet accumulation and severe
    ichthyosis.
  evidence:
  - reference: PMID:28816422
    reference_title: "Dolichol kinase deficiency (DOLK-CDG): Two new cases and expansion of phenotype."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Histology of the skin showed lipid droplet accumulation in the stratum
      corneum and keratinocytes, which suggests defective epidermal lipid
      metabolism.
    explanation: >-
      This provides a direct cutaneous mechanistic correlate for the
      ichthyosiform phenotype in severe neonatal DOLK-CDG.
  downstream:
  - target: Ichthyosis
    description: >-
      Defective epidermal lipid metabolism contributes to the congenital
      ichthyotic skin phenotype.
    evidence:
    - reference: PMID:28816422
      reference_title: "Dolichol kinase deficiency (DOLK-CDG): Two new cases and expansion of phenotype."
      supports: SUPPORT
      evidence_source: HUMAN_CLINICAL
      snippet: >-
        Both patients presented in the neonatal period with severe ichthyosis,
        unusual distal digital constrictions and dilated cardiomyopathy which
        resulted in death.
      explanation: >-
        This links the skin-specific pathophysiology to severe ichthyosis in
        affected neonates.
phenotypes:
- name: Dilated cardiomyopathy
  category: Cardiovascular
  diagnostic: true
  description: >-
    Dilated cardiomyopathy is the most consistent and clinically dominant
    manifestation of DK1-CDG.
  phenotype_term:
    preferred_term: Dilated cardiomyopathy
    term:
      id: HP:0001644
      label: Dilated cardiomyopathy
  evidence:
  - reference: PMID:22327749
    reference_title: "From discrete dilated cardiomyopathy to successful cardiac transplantation in congenital disorders of glycosylation due to dolichol kinase deficiency (DK1-CDG)."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      A lethal form of DCM has been described in DK1-CDG (dolichol kinase
      defect, MIM 610768; 9q34.11 due to mutations in TMEM15, also labeled as
      the DK1 and DOLK gene) [2, 17].
    explanation: >-
      This review identifies dilated cardiomyopathy as a defining cardiac
      feature of DK1-CDG.
  - reference: PMID:22327749
    reference_title: "From discrete dilated cardiomyopathy to successful cardiac transplantation in congenital disorders of glycosylation due to dolichol kinase deficiency (DK1-CDG)."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      The cardiac symptoms varied from discrete, mild dilation to overt heart
      failure with death.
    explanation: >-
      The cohort data support dilated cardiomyopathy as a very frequent
      phenotype.
- name: Muscular hypotonia
  category: Neurologic
  diagnostic: true
  description: >-
    Hypotonia is a frequent early neurologic feature in DK1-CDG.
  phenotype_term:
    preferred_term: Hypotonia
    term:
      id: HP:0001252
      label: Hypotonia
  evidence:
  - reference: PMID:22327749
    reference_title: "From discrete dilated cardiomyopathy to successful cardiac transplantation in congenital disorders of glycosylation due to dolichol kinase deficiency (DK1-CDG)."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      The neonatally observed neurological involvement and severe muscular
      hypotonia dominated the clinical presentation.
    explanation: >-
      This directly supports muscular hypotonia as a key clinical feature.
  - reference: PMID:24144945
    reference_title: "Severe, fatal multisystem manifestations in a patient with dolichol kinase-congenital disorder of glycosylation."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Physical examination showed systolic heart murmur, hypotonia, bilateral
      talipes equinovarus, sacral dimple with hairy tuft, localized lower
      extremity hypertrichosis, and penoscrotal fusion.
    explanation: >-
      The severe case report confirms neonatal hypotonia in DK1-CDG.
- name: Ichthyosis
  category: Dermatologic
  diagnostic: true
  description: >-
    Ichthyosis or severe hyperkeratotic skin disease is a recurrent cutaneous
    phenotype.
  phenotype_term:
    preferred_term: Ichthyosis
    term:
      id: HP:0008064
      label: Ichthyosis
  evidence:
  - reference: PMID:22327749
    reference_title: "From discrete dilated cardiomyopathy to successful cardiac transplantation in congenital disorders of glycosylation due to dolichol kinase deficiency (DK1-CDG)."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      All patients had significant skin findings (hyperkeratosis, ichthyosis,
      minimal hair growth), and one child had symptoms of hypoglycemia,
      failure to thrive, and liver involvement.
    explanation: >-
      This review directly identifies ichthyosis as a recurrent DK1-CDG
      manifestation.
  - reference: PMID:34956305
    reference_title: "Fatal Neonatal DOLK-CDG as a Rare Form of Syndromic Ichthyosis."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      the congenital skin phenotype (often ichthyosis) is later associated with
      variable extracutaneous features such as dilatative cardiomyopathy,
      epilepsy, microcephaly, visual impairment, and hypoglycemia and may lead
      to a fatal course.
    explanation: >-
      This report supports severe ichthyotic skin disease as part of the DK1-
      CDG spectrum.
- name: Seizure
  category: Neurologic
  diagnostic: true
  description: >-
    Seizures can occur in severe neonatal and infantile DK1-CDG.
  phenotype_term:
    preferred_term: Seizure
    term:
      id: HP:0001250
