    preferred_term: Global developmental delay
    term:
      id: HP:0001263
      label: Global developmental delay
  evidence:
  - reference: PMID:24144945
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Symptoms generally associated with CDGs include profound global delay,
