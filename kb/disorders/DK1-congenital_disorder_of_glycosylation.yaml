genetic:
- name: DOLK
  association: Loss of function mutation
  gene_term:
    preferred_term: DOLK
    term:
      id: hgnc:23406
      label: DOLK
  evidence:
  - reference: PMID:22327749
    reference_title: "From discrete dilated cardiomyopathy to successful cardiac transplantation in congenital disorders of glycosylation due to dolichol kinase deficiency (DK1-CDG)."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Mutation analysis in the DK1 gene revealed homozygous mutations c.1222C
      > G; (p.His408Asp) in all affected surviving individuals in Family I and
      Family II. The homozygous mutation c.912G>T (p.Trp304Cys) was detected in
      all affected members of Family III.
    explanation: >-
      This establishes DOLK as the causal gene and documents disease-segregating
      pathogenic variants.
  - reference: PMID:24144945
    reference_title: "Severe, fatal multisystem manifestations in a patient with dolichol kinase-congenital disorder of glycosylation."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      next-generation sequencing demonstrated homozygous p.Q483K DOLK mutations
      that were confirmed in patient fibroblasts to result in severely reduced
      substrate binding and catalytic activity.
    explanation: >-
      This case report independently confirms DOLK as the disease gene.
