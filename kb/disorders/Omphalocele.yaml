genetic:
- name: Chromosomal aneuploidy (trisomy 13, 18, 21)
  inheritance:
  - name: Chromosomal
  features: >-
    Omphalocele is frequently associated with chromosomal aneuploidy, most
    commonly trisomy 13, trisomy 18, and trisomy 21. Across population cohorts,
    the chromosomal-abnormality subgroup carries markedly elevated mortality;
    in the Swedish national cohort about 62% of cases had associated
    malformations and/or genetic disorders.
  subtype: Syndromic
  evidence:
  - reference: PMID:34392395
    reference_title: "Omphalocele: national current birth prevalence and survival."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "About 62% of the cases had associated malformations and/or genetic disorders; most common was ventricular septal defect."
    explanation: >-
      Supports the high proportion of omphalocele cases with associated genetic
      disorders, including chromosomal abnormalities.
- name: Associated chromosomal abnormalities (population estimate)
  inheritance:
  - name: Chromosomal
  features: >-
    In a Finnish population-based study, chromosomal abnormalities were the most
    common associated anomaly (9.3%), and 1-year survival was far lower for
    neonates with chromosomal defects (17%) than for isolated cases (80%).
  evidence:
  - reference: PMID:32131131
    reference_title: "Omphalocele in Finland from 1993 to 2014: Trends, Prevalence, Mortality, and Associated Malformations-A Population-Based Study."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "most commonly chromosomal abnormalities (9.3%), heart defects (6.3%), central nervous system anomalies (3.0%)"
    explanation: >-
      Supports chromosomal abnormalities as the most common associated anomaly
      in a population-based omphalocele cohort.
- name: Monogenic variants in selected non-isolated cases
  features: >-
    When prenatal karyotype and chromosomal microarray are normal, whole exome
    sequencing can identify monogenic variants in selected non-isolated cases. In
    a Chinese prenatal cohort, WES of six karyotype/CMA-normal non-isolated cases
    revealed one pathogenic and two suspected pathogenic variants.
  subtype: Syndromic
  evidence:
  - reference: PMID:37726736
    reference_title: "Ultrasonographic characteristics, genetic features, and maternal and fetal outcomes in fetuses with omphalocele in China: a single tertiary center study."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Six nonisolated cases had normal CMA results and conventional karyotype tests, and further WES examination revealed one pathogenic variant and two suspected pathogenic variants."
    explanation: >-
      Supports a monogenic contribution detectable by WES in selected
      non-isolated omphalocele cases with normal karyotype/CMA.

prevalence:
- population: Danish live births (1997-2021)
  percentage: "0.0098"
  notes: >-
    Danish nationwide live-birth register study: omphalocele birth prevalence of
    0.98 per 10,000 infants (95% CI 0.83-1.15). Over half (53.7%) had one or more
    major malformations and an additional 17.0% had a diagnosed syndrome.
  evidence:
  - reference: PMID:39576336
    reference_title: "Omphalocele prevalence and co-occurring malformations: a nationwide register-based study of Danish live births in 1997-2021."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Among 1,498,685 live births, 147 infants with omphalocele were identified, yielding a combined and stable prevalence (per 10,000 infants) of 0.98 (95% CI 0.83-1.15). Over one-half (53.7%) presented with one or more major malformations, and an additional 17.0% were diagnosed with a syndrome."
    explanation: >-
      Provides nationwide live-birth prevalence and the proportion of cases with
      co-occurring major malformations and syndromes.
- population: Finnish births (1993-2014, including terminations)
  notes: >-
    Finnish population-based register study including terminations: total
    prevalence 4.71 per 10,000 births, birth prevalence 1.96 per 10,000, with
    55% of pregnancies terminated.
  evidence:
  - reference: PMID:32131131
    reference_title: "Omphalocele in Finland from 1993 to 2014: Trends, Prevalence, Mortality, and Associated Malformations-A Population-Based Study."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Birth prevalence in Finland was 1.96 per 10,000 births with no consistent trend over time. However, total prevalence was much higher (4.71/10,000) because more than half of these families chose option for the termination of pregnancy."
    explanation: >-
      Provides total and birth prevalence including terminations, and the high
      termination rate.

progression:
- phase: Neonatal outcome (chromosome/anomaly dependent)
  notes: >-
    Omphalocele is congenital and frequently diagnosed prenatally by ultrasound.
    Prognosis is driven primarily by associated anomalies and chromosomal/
    syndromic diagnoses rather than the abdominal wall defect alone; in the
    absence of chromosomal defects survival is reasonably good. In the Finnish
    cohort, 1-year survival was 80% for isolated omphalocele versus 17% for
    neonates with chromosomal defects.
  evidence:
  - reference: PMID:32131131
    reference_title: "Omphalocele in Finland from 1993 to 2014: Trends, Prevalence, Mortality, and Associated Malformations-A Population-Based Study."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Total 1-year survival rates for isolated omphalocele, cases with multiple anomalies and neonates with chromosomal defects were 80, 88, and 17%, respectively."
    explanation: >-
      Quantifies the large survival difference between isolated and
      chromosomally abnormal omphalocele.
  - reference: PMID:32131131
    reference_title: "Omphalocele in Finland from 1993 to 2014: Trends, Prevalence, Mortality, and Associated Malformations-A Population-Based Study."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "In the absence of chromosomal defects, survival is reasonably good."
    explanation: >-
      Supports good survival when chromosomal defects are absent.

treatments:
- name: Primary surgical closure
  description: >-
    Definitive early operative reduction of herniated viscera and closure of the
    abdominal wall defect. Best suited to small omphaloceles or cases without
    major viscero-abdominal disproportion; urgent reduction can dangerously raise
    intra-abdominal pressure and precipitate abdominal compartment syndrome.
  treatment_term:
    preferred_term: surgical procedure
    term:
      id: MAXO:0000004
      label: surgical procedure
  evidence:
  - reference: PMID:40389219
    reference_title: "European Paediatric Surgeons' Association Consensus Statement on the Management of Giant Omphalocele."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Giant omphalocele is appropriately defined as viscero-abdominal disproportion preventing primary closure."
    explanation: >-
      The EUPSA consensus defines giant omphalocele by viscero-abdominal
      disproportion that precludes primary closure, indicating primary closure
      is the approach for non-giant defects.
- name: Staged / traction-assisted closure
  description: >-
    Staged reduction (e.g., silo) or vertical traction-assisted staged closure
    is used when primary closure is unsafe because of a large defect, liver
    herniation, or marked viscero-abdominal disproportion. A prospective device
    series achieved complete fascial closure in all 16 patients (10 giant
    omphalocele, 6 gastroschisis) with no abdominal compartment syndrome.
  treatment_term:
    preferred_term: surgical procedure
    term:
      id: MAXO:0000004
      label: surgical procedure
  evidence:
  - reference: PMID:38960901
    reference_title: "Use of a new vertical traction device for early traction-assisted staged closure of congenital abdominal wall defects: a prospective series of 16 patients."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Complete fascial closure was achieved after a median time of 7 days (range 4-22) in GOC and 5 days (range 4-11) in GS."
    explanation: >-
      Supports traction-assisted staged closure achieving complete fascial
      closure in giant omphalocele and gastroschisis.
- name: Conservative "paint and wait" management
  description: >-
    Non-operative topical epithelialization of the intact sac, recommended when
    anatomical constraints or high surgical risk preclude primary closure
    (especially giant omphalocele with liver exteriorization and/or pulmonary
    hypoplasia/hypertension). Common painting agents include povidone-iodine and
    silver sulfadiazine. Later definitive ventral hernia repair is often needed.
  treatment_term:
    preferred_term: topical pharmacotherapy
    term:
      id: MAXO:0001573
      label: topical pharmacotherapy
  evidence:
  - reference: PMID:40389219
    reference_title: "European Paediatric Surgeons' Association Consensus Statement on the Management of Giant Omphalocele."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "the \"paint and wait\" approach is recommended when anatomical constraints or high surgical risk preclude primary closure. Common painting agents include povidone-iodine and silver sulfadiazine"
    explanation: >-
      EUPSA consensus recommends paint-and-wait conservative topical management
      when primary closure is precluded.
- name: Awake graduated compression dressing
  description: >-
    A bedside, awake gradual compression dressing technique for exomphalos major
    that reduces sac contents without general anaesthetic or respiratory
    compromise and permits simultaneous early enteral feeding.
  treatment_term:
    preferred_term: supportive care
    term:
      id: MAXO:0000950
      label: supportive care
  evidence:
  - reference: PMID:38376641
    reference_title: "A case series of successfully managing exomphalos major with awake graduated compression dressing and early enteral feeding."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "This case series describes a successful compression dressing technique that reduces sac content without the need for general anaesthetic or respiratory compromise, whereby simultaneous enteral feeding is tolerated."
    explanation: >-
      Supports awake graduated compression dressing as a conservative bedside
      reduction strategy for exomphalos major.
- name: Prenatal diagnosis and genetic testing
  description: >-
    Prenatal ultrasound is the principal diagnostic modality and supports
    classification into isolated versus non-isolated omphalocele, guiding genetic
    testing (karyotype + chromosomal microarray, with WES escalation) and
    counseling.
  treatment_term:
    preferred_term: prenatal examination
    term:
      id: MAXO:0000528
      label: prenatal examination
  evidence:
  - reference: PMID:37726736
    reference_title: "Ultrasonographic characteristics, genetic features, and maternal and fetal outcomes in fetuses with omphalocele in China: a single tertiary center study."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Routine karyotyping with CMA testing should be provided for fetuses with omphalocele. WES is an option if karyotype and CMA tests are normal."
    explanation: >-
      Supports prenatal genetic testing workflow (karyotype + CMA, then WES) for
      prenatally diagnosed omphalocele.
- name: Genetic counseling
  description: >-
    Genetic counseling addresses the high rate of associated chromosomal
    abnormalities and syndromes (including Beckwith-Wiedemann syndrome) and their
    prognostic and recurrence implications.
  treatment_term:
    preferred_term: genetic counseling
    term:
      id: MAXO:0000079
      label: genetic counseling
  evidence:
  - reference: PMID:39576336
    reference_title: "Omphalocele prevalence and co-occurring malformations: a nationwide register-based study of Danish live births in 1997-2021."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Over one-half (53.7%) presented with one or more major malformations, and an additional 17.0% were diagnosed with a syndrome."
    explanation: >-
      The high burden of co-occurring malformations and syndromes supports the
      role of genetic counseling.

