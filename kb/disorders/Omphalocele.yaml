has_subtypes:
- name: Isolated
  display_name: Isolated (non-syndromic) omphalocele
  description: >-
    Omphalocele occurring without associated major malformations, chromosomal
    abnormality, or recognized syndrome. Isolated cases have the most favorable
    prognosis, with high survival in the absence of chromosomal defects.
- name: Syndromic
  display_name: Syndromic / chromosomal omphalocele
  description: >-
    Omphalocele occurring as part of a recognized genetic syndrome or
    chromosomal abnormality. Includes aneuploidies (trisomy 13, 18, 21) and
    monogenic/imprinting syndromes. Carries substantially worse prognosis,
    driven by the associated anomalies and chromosomal/syndromic diagnosis.
- name: BWS-associated
  display_name: Beckwith-Wiedemann syndrome-associated omphalocele
  description: >-
    Omphalocele as a cardinal feature of Beckwith-Wiedemann syndrome, an
    overgrowth/imprinting disorder of chromosome 11p15.5. Counseling and
    follow-up differ because of the BWS tumor-predisposition and overgrowth
    phenotype.
- name: Pentalogy of Cantrell
  display_name: Pentalogy of Cantrell (thoraco-abdominal omphalocele)
  description: >-
    A rare midline defect complex combining a (supraumbilical) omphalocele with
    defects of the lower sternum, anterior diaphragm, diaphragmatic pericardium,
    and intracardiac anomalies. Reflects a defect of cephalic/anterior body-fold
    closure.
- name: OEIS
  display_name: OEIS complex (cloacal exstrophy)
  description: >-
    Omphalocele-Exstrophy of the cloaca-Imperforate anus-Spinal defects complex,
    a caudal body-fold closure defect in which omphalocele co-occurs with
    cloacal exstrophy, imperforate anus, and spinal/vertebral anomalies.

pathophysiology:
- name: Ventral Body Wall Closure Failure
  description: >-
    The primary developmental lesion in omphalocele is failure to complete
    normal ventral body wall formation at the umbilical region. During normal
    embryogenesis the lateral, cephalic, and caudal body folds migrate ventrally
    and fuse at the umbilical ring; failure of this morphogenetic process leaves
    a central defect through which abdominal viscera herniate into the base of
    the umbilical cord, covered by a membranous (peritoneum/Wharton's
    jelly/amnion) sac. This distinguishes omphalocele from gastroschisis (a
    paraumbilical defect without a sac).
  cell_types:
  - preferred_term: Body wall mesenchymal cell
    term:
      id: CL:0000134
      label: mesenchymal stem cell
  - preferred_term: Body wall fibroblast
    term:
      id: CL:0000057
      label: fibroblast
  biological_processes:
  - preferred_term: Embryonic body morphogenesis (ventral body wall closure)
    term:
      id: GO:0010172
      label: embryonic body morphogenesis
    modifier: ABNORMAL
  - preferred_term: Mesenchymal cell migration (body-fold migration)
    term:
      id: GO:0090497
      label: mesenchymal cell migration
    modifier: DECREASED
  - preferred_term: Umbilical cord morphogenesis
    term:
      id: GO:0036304
      label: umbilical cord morphogenesis
    modifier: ABNORMAL
  evidence:
  - reference: PMID:38021990
    reference_title: "Enhancing Omphalocele Care: Navigating Complications and Innovative Treatment Approaches."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Omphalocele refers to the herniation of abdominal contents through a defect in the abdominal wall at the umbilicus with or without the presence of a sac."
    explanation: >-
      Review defining omphalocele as herniation of abdominal contents through a
      ventral abdominal wall defect at the umbilicus, the anatomic consequence
      of failed ventral body wall closure.
  - reference: PMID:37726736
    reference_title: "Ultrasonographic characteristics, genetic features, and maternal and fetal outcomes in fetuses with omphalocele in China: a single tertiary center study."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Patients with omphalocele, a midline abdominal wall defect at the umbilical cord base, have a low survival rate."
    explanation: >-
      Confirms the midline umbilical-base location of the abdominal wall defect
      that defines omphalocele.
- name: Midgut Herniation and Viscero-Abdominal Disproportion
  description: >-
    Abdominal viscera - intestine and, in large/giant defects, the liver -
    herniate through the body wall defect into the sac. In normal development a
    physiologic midgut herniation occurs at ~6-10 weeks' gestation and returns
    to the abdominal cavity; persistence/failure of this return contributes to
    the pathologic herniation. The resulting reduction in intra-abdominal domain
    produces viscero-abdominal disproportion, which both complicates surgical
    reduction (risk of abdominal compartment syndrome) and, in giant defects,
    constrains thoraco-abdominal development.
  cell_types:
  - preferred_term: Hepatocyte (herniated liver)
    term:
      id: CL:0000182
      label: hepatocyte
  biological_processes:
  - preferred_term: Midgut development
    term:
      id: GO:0007494
      label: midgut development
    modifier: ABNORMAL
  evidence:
  - reference: PMID:38021990
    reference_title: "Enhancing Omphalocele Care: Navigating Complications and Innovative Treatment Approaches."
    supports: PARTIAL
    evidence_source: HUMAN_CLINICAL
    snippet: "Omphalocele refers to the herniation of abdominal contents through a defect in the abdominal wall at the umbilicus with or without the presence of a sac."
    explanation: >-
      Supports herniation of abdominal contents (midgut, and in large defects
      liver) through the umbilical defect; the abstract does not separately
      quantify viscero-abdominal disproportion.
  - reference: PMID:40150018
    reference_title: "Omphalocele and Associated Anomalies: Exploring Pulmonary Development and Genetic Correlations-A Literature Review."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "giant omphaloceles are frequently linked to lung hypoplasia, as reduced intra-abdominal space restricts fetal lung expansion"
    explanation: >-
      Supports that reduced intra-abdominal space (viscero-abdominal
      disproportion) in giant omphalocele restricts fetal development.
- name: Pulmonary Hypoplasia and Pulmonary Hypertension
  description: >-
    In large/giant omphalocele the reduced intra-abdominal domain and abnormal
    thoraco-abdominal dynamics constrain fetal lung expansion, producing
    pulmonary hypoplasia with impaired pulmonary vascular development. This
    contributes to elevated pulmonary vascular resistance and pulmonary
    hypertension, a major driver of neonatal respiratory morbidity and
    mortality, and a key consideration when planning closure (avoiding
    increases in intra-abdominal pressure that worsen ventilation).
  cell_types:
  - preferred_term: Pulmonary artery endothelial cell
    term:
      id: CL:1001568
      label: pulmonary artery endothelial cell
  - preferred_term: Pulmonary arterial smooth muscle cell
    term:
      id: CL:0002591
      label: smooth muscle cell of the pulmonary artery
  biological_processes:
  - preferred_term: Lung development
    term:
      id: GO:0030324
      label: lung development
    modifier: DECREASED
  - preferred_term: Pulmonary vasculature development
    term:
      id: GO:0001944
      label: vasculature development
    modifier: ABNORMAL
  evidence:
  - reference: PMID:40150018
    reference_title: "Omphalocele and Associated Anomalies: Exploring Pulmonary Development and Genetic Correlations-A Literature Review."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Among its most significant complications, pulmonary hypoplasia (PH) and pulmonary hypertension (PPH) have been shown to negatively impact neonatal prognosis. These conditions result from impaired pulmonary vascular development, leading to respiratory distress and hypoxemia."
    explanation: >-
      Directly supports pulmonary hypoplasia and pulmonary hypertension arising
      from impaired pulmonary vascular development as major complications.
  - reference: PMID:40150018
    reference_title: "Omphalocele and Associated Anomalies: Exploring Pulmonary Development and Genetic Correlations-A Literature Review."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "giant omphaloceles are frequently linked to lung hypoplasia, as reduced intra-abdominal space restricts fetal lung expansion, leading to structural lung abnormalities and increased pulmonary vascular resistance."
    explanation: >-
      Supports the mechanistic chain from reduced intra-abdominal space to lung
      hypoplasia and increased pulmonary vascular resistance.

