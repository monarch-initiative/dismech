- category: Physical
  name: Congenital heart defects
  description: >-
    Cardiac anomalies are among the most frequent associated malformations in
    omphalocele and are an important prognostic determinant. In one postnatal
    cohort, cardiac anomalies were identified in 37.5% of omphalocele patients.
