name: Omphalocele
creation_date: "2026-06-15T00:00:00Z"
description: >-
  Omphalocele (exomphalos) is a congenital midline ventral abdominal wall defect
  at the base of the umbilical cord in which abdominal viscera herniate outside
  the abdomen, typically protected by a membranous sac composed of peritoneum,
  Wharton's jelly, and amnion. It arises from a developmental defect of ventral
  body wall formation, with persistence of the normal physiologic midgut
  herniation (which occurs at roughly 6-10 weeks' gestation and normally returns
  to the abdomen). Defects are commonly classified as small (no liver herniation)
  versus large/giant (liver herniation with viscero-abdominal disproportion).
  Omphalocele is etiologically heterogeneous: many cases are sporadic, but a
  substantial subset is associated with aneuploidy (trisomy 13, 18, 21),
  chromosomal rearrangements, and genetic syndromes (notably
  Beckwith-Wiedemann syndrome). Associated malformations - especially congenital
  heart defects - and chromosomal/syndromic diagnoses are the principal
  determinants of prognosis, rather than the abdominal wall defect alone.
