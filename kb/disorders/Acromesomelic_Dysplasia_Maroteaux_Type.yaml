name: Acromesomelic Dysplasia Maroteaux Type
creation_date: "2026-04-02T12:00:00Z"
updated_date: "2026-04-02T12:00:00Z"
category: Mendelian
description: >
  Acromesomelic dysplasia, Maroteaux type (AMDM) is a rare autosomal recessive
  skeletal dysplasia caused by biallelic loss-of-function mutations in NPR2,
  encoding natriuretic peptide receptor B (NPR-B). Loss of NPR-B disrupts
  C-type natriuretic peptide (CNP) signaling in growth plate chondrocytes,
  reducing intracellular cGMP and impairing endochondral ossification. The
  disorder is characterized by severe disproportionate short stature with
  predominant shortening of the middle and distal limb segments, brachydactyly,
  and mild vertebral changes. Intelligence and facial appearance are normal.
  Adult height is typically below 120 cm.
disease_term:
  preferred_term: acromesomelic dysplasia, Maroteaux type
  term:
    id: MONDO:0011275
    label: acromesomelic dysplasia 1, Maroteaux type
parents:
- Skeletal Dysplasia
inheritance:
- name: Autosomal Recessive
  description: >
    AMDM is inherited in an autosomal recessive pattern due to biallelic
    loss-of-function mutations in NPR2. Obligate heterozygous carriers have
    heights below the population mean.
  evidence:
  - reference: PMID:15146390
    reference_title: "Mutations in the transmembrane natriuretic peptide receptor NPR-B impair skeletal growth and cause acromesomelic dysplasia, type Maroteaux."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      We sequenced DNA from 21 families affected by AMDM and found 4 nonsense
      mutations, 4 frameshift mutations, 2 splice-site mutations, and 11
      missense mutations.
    explanation: >-
      Identification of biallelic NPR2 mutations in 21 AMDM families confirms
      autosomal recessive inheritance.
  - reference: PMID:15146390
    reference_title: "Mutations in the transmembrane natriuretic peptide receptor NPR-B impair skeletal growth and cause acromesomelic dysplasia, type Maroteaux."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      We also found that obligate carriers of NPR2 mutations have heights that
      are below the mean for matched controls.
    explanation: >-
      Carrier effect on stature confirms gene dosage sensitivity but recessive
      pattern for the full phenotype.
genetic:
- name: NPR2 Loss-of-Function Mutations
  gene_term:
    preferred_term: NPR2
    term:
      id: hgnc:7944
      label: NPR2
  association: Causative
  evidence:
  - reference: PMID:15146390
    reference_title: "Mutations in the transmembrane natriuretic peptide receptor NPR-B impair skeletal growth and cause acromesomelic dysplasia, type Maroteaux."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Three missense mutations were tested in a functional assay and were found
      to have markedly deficient guanylyl cyclase activity.
    explanation: >-
      Functional assays confirm that NPR2 missense mutations eliminate guanylyl
      cyclase activity, establishing loss-of-function as the disease mechanism.
  - reference: PMID:32694885
    reference_title: "A novel NPR2 mutation (p.Arg388Gln) in a patient with acromesomelic dysplasia, type Maroteaux."
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: >-
      Cells expressing HA-R388Q-NPRB showed negligible cGMP responses to
      C-type natriuretic peptide (CNP) stimulation, indicating that the
      mutation led to severe loss-of-function.
    explanation: >-
      In vitro functional study of the R388Q variant demonstrates loss of
      cGMP production and defective membrane trafficking.
  - reference: PMID:30359775
    reference_title: "Novel variants in natriuretic peptide receptor 2 in unrelated patients with acromesomelic dysplasia type Maroteaux."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Several homozygous inactivating mutations in NPR2 have been identified
      in different AMDM patients. We report five novel variants in affected
      individuals in four different families.
    explanation: >-
      Continued identification of novel NPR2 variants in additional AMDM
      families broadens the mutational spectrum and confirms genetic
      homogeneity.
  notes: >
    Mutations span the entire gene and include nonsense, frameshift,
    splice-site, and missense variants. Some missense mutations cause
    defective intracellular trafficking with endoplasmic reticulum retention
    and dominant-negative effects when co-expressed with wild-type NPR-B.
pathophysiology:
- name: Impaired CNP-NPR-B-cGMP Signaling in Growth Plate
  description: >
    NPR-B is a transmembrane guanylyl cyclase receptor that converts GTP to
    cGMP upon binding its ligand CNP. In growth plate chondrocytes, CNP/NPR-B
    signaling promotes chondrocyte proliferation and hypertrophy, which are
    essential for endochondral ossification and longitudinal bone growth.
    Biallelic loss-of-function mutations in NPR2 eliminate cGMP production,
    causing a markedly shortened hypertrophic zone in the growth plate and
    reduced endochondral bone growth.
  cell_types:
  - preferred_term: Growth plate chondrocyte
    term:
      id: CL:0000138
      label: chondrocyte
  biological_processes:
  - preferred_term: Endochondral Bone Growth
    term:
      id: GO:0003416
      label: endochondral bone growth
  - preferred_term: Chondrocyte Hypertrophy
    term:
      id: GO:0003415
      label: chondrocyte hypertrophy
  - preferred_term: cGMP Biosynthesis
    term:
      id: GO:0006182
      label: cGMP biosynthetic process
  evidence:
  - reference: PMID:15146390
    reference_title: "Mutations in the transmembrane natriuretic peptide receptor NPR-B impair skeletal growth and cause acromesomelic dysplasia, type Maroteaux."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      We conclude that, although NPR-B is expressed in a number of tissues,
      its major role is in the regulation of skeletal growth.
    explanation: >-
      Establishes the primacy of NPR-B in skeletal growth regulation, the
      pathway disrupted in AMDM.
  - reference: PMID:25319082
    reference_title: "The cn/cn dwarf mouse. Histomorphometric, ultrastructural, and radiographic study in mutants corresponding to human acromesomelic dysplasia Maroteaux type (AMDM)."
    supports: SUPPORT
    evidence_source: MODEL_ORGANISM
    snippet: >-
      The main physeal abnormality was a markedly shortened hypertrophic zone
    explanation: >-
      The cn/cn mouse model demonstrates that loss of NPR-B function leads
      to a shortened hypertrophic zone in the growth plate, the proximate
      cause of reduced bone length.
  - reference: PMID:23065701
    reference_title: "A novel loss-of-function mutation in Npr2 clarifies primary role in female reproduction and reveals a potential therapy for acromesomelic dysplasia, Maroteaux type."
    supports: SUPPORT
    evidence_source: MODEL_ORGANISM
    snippet: >-
      We determined that the loss of Npr2 causes a reduction in the
      hypertrophic and proliferative zones of the growth plate, but
      mineralization of skeletal elements is normal.
    explanation: >-
      The Npr2-pwe mouse confirms that loss of NPR-B reduces both
      proliferative and hypertrophic zones while mineralization is preserved.
  downstream:
  - target: Reduced Longitudinal Bone Growth
- name: Reduced Longitudinal Bone Growth
  description: >
    Impaired chondrocyte hypertrophy and proliferation in the growth plate
    result in shortened endochondral bones, affecting limbs (particularly
    middle and distal segments) and vertebral bodies. Normal ultrastructure
    of individual chondrocytes indicates the defect is in growth plate
    organization rather than intrinsic cell structure.
