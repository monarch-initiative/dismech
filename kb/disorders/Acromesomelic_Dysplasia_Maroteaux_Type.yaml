    snippet: >-
      Cn/cn mice were two thirds the size of the cn/+.
    explanation: >-
      In the cn/cn mouse, body size is approximately two thirds of normal,
      demonstrating the severity of growth reduction from NPR-B loss.
  - reference: PMID:25319082
    reference_title: "The cn/cn dwarf mouse. Histomorphometric, ultrastructural, and radiographic study in mutants corresponding to human acromesomelic dysplasia Maroteaux type (AMDM)."
    supports: SUPPORT
    evidence_source: MODEL_ORGANISM
    snippet: >-
      The disorder causes a shortened physeal hypertrophic zone but
      normal ultrastructure of cn/cn chondrocytes points to abnormality
      primarily affecting the hypertrophic zone rather than a structural cell
      or matrix synthesis problem.
    explanation: >-
      Normal chondrocyte ultrastructure indicates the defect is in growth
      plate zone organization, not individual cell pathology.
- name: FGF-NPR2 Signaling Crosstalk
  description: >
    FGF receptor signaling promotes dephosphorylation of NPR2, reducing its
    guanylyl cyclase activity and lowering cGMP in growth plate chondrocytes.
    This regulatory mechanism positions NPR-B as a convergence point where
    both loss-of-function mutations (AMDM) and excessive FGF signaling
    (achondroplasia) impair bone elongation.
  cell_types:
  - preferred_term: Growth plate chondrocyte
    term:
      id: CL:0000138
      label: chondrocyte
  biological_processes:
  - preferred_term: Intracellular Signal Transduction
    term:
      id: GO:0035556
      label: intracellular signal transduction
  evidence:
  - reference: PMID:29199951
    reference_title: "Dephosphorylation of the NPR2 guanylyl cyclase contributes to inhibition of bone growth by fibroblast growth factor."
    supports: SUPPORT
    evidence_source: MODEL_ORGANISM
    snippet: >-
      Activating mutations in fibroblast growth factor (FGF) receptor 3 and
      inactivating mutations in the NPR2 guanylyl cyclase both cause severe
      short stature
    explanation: >-
      Introduces the convergence of FGF and NPR2 signaling pathways in
      skeletal growth regulation.
  - reference: PMID:29199951
    reference_title: "Dephosphorylation of the NPR2 guanylyl cyclase contributes to inhibition of bone growth by fibroblast growth factor."
    supports: SUPPORT
    evidence_source: MODEL_ORGANISM
    snippet: >-
      FGF-induced dephosphorylation of NPR2 decreases its guanylyl cyclase
      activity in growth plate chondrocytes in living bone.
    explanation: >-
      Demonstrates that FGF signaling negatively regulates NPR2 activity
      through dephosphorylation, providing a mechanistic link between FGF
      pathway disorders and NPR-B dysfunction.
