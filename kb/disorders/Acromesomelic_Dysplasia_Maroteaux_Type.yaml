animal_models:
- species: Mus musculus
  genotype: Npr2(cn/cn) loss-of-function
  description: >
    The cn/cn (cartilage matrix deficiency) mouse carries a spontaneous
    loss-of-function mutation in Npr2. It recapitulates AMDM with
    disproportionate dwarfism, shortened growth plate hypertrophic zone, and
    normal chondrocyte ultrastructure. Bones are approximately 65% of normal
    length.
  genes:
  - preferred_term: NPR2
    term:
      id: hgnc:7944
      label: NPR2
  evidence:
  - reference: PMID:25319082
    reference_title: "The cn/cn dwarf mouse. Histomorphometric, ultrastructural, and radiographic study in mutants corresponding to human acromesomelic dysplasia Maroteaux type (AMDM)."
    supports: SUPPORT
    evidence_source: MODEL_ORGANISM
    snippet: >-
      The cn/cn dwarf mouse is caused by a loss-of-function mutation in the
      natriuretic peptide receptor 2 (NPR-2) gene which helps positively
      regulate endochondral longitudinal bone growth.
    explanation: >-
      Establishes the cn/cn mouse as a direct model for human AMDM.
- species: Mus musculus
  genotype: Npr2(slw/slw) loss-of-function
  description: >
    The short-limbed dwarfism (slw) mouse is an independent Npr2 allele
    causing chondrodysplasia with markedly short body, limbs, and tail.
    Histology shows diminished proliferating and hypertrophic chondrocytes
    in the growth plate.
  genes:
  - preferred_term: NPR2
    term:
      id: hgnc:7944
      label: NPR2
  evidence:
  - reference: PMID:17728275
    reference_title: "Short-limbed dwarfism: slw is a new allele of Npr2 causing chondrodysplasia."
    supports: SUPPORT
    evidence_source: MODEL_ORGANISM
    snippet: >-
      Histological examination of tibial growth plates of the affected mice
      showed that the numbers of proliferating and hypertrophic chondrocytes
      were obviously diminished.
    explanation: >-
      The slw mouse confirms that Npr2 loss reduces chondrocyte proliferation
      and hypertrophy in the growth plate.
- species: Mus musculus
  genotype: Npr2(pwe/pwe) 4-bp deletion
  description: >
    The peewee (pwe) mouse carries a spontaneous 4-bp deletion in Npr2 exon
    3 causing a premature stop codon. It exhibits severe disproportionate
    dwarfism and female infertility. Treatment of fetal tibiae explants with
    MEK/ERK inhibitors rescues the growth defect, suggesting a potential
    therapeutic approach.
  genes:
  - preferred_term: NPR2
    term:
      id: hgnc:7944
      label: NPR2
  evidence:
  - reference: PMID:23065701
    reference_title: "A novel loss-of-function mutation in Npr2 clarifies primary role in female reproduction and reveals a potential therapy for acromesomelic dysplasia, Maroteaux type."
    supports: SUPPORT
    evidence_source: MODEL_ORGANISM
    snippet: >-
      The Npr2(pwe/pwe) mouse is a model for the human skeletal dysplasia
      acromesomelic dysplasia, Maroteaux type (AMDM).
    explanation: >-
      The peewee mouse is directly stated to be a model for human AMDM.
  - reference: PMID:23065701
    reference_title: "A novel loss-of-function mutation in Npr2 clarifies primary role in female reproduction and reveals a potential therapy for acromesomelic dysplasia, Maroteaux type."
    supports: SUPPORT
    evidence_source: MODEL_ORGANISM
    snippet: >-
      Treatment of fetal tibiae explants with mitogen activated protein kinase
      1 and 2 inhibitors U0126 and PD325901 rescues the Npr2(pwe/pwe) growth
      defect, providing a promising foundation for skeletal dysplasia
      therapeutics.
    explanation: >-
      MEK/ERK inhibition rescues the growth plate defect in Npr2-null
      explants, identifying a candidate therapeutic pathway.
treatments:
- name: Recombinant Human Growth Hormone
  description: >
    Some individuals with AMDM have been treated with recombinant human
    growth hormone therapy with variable response. Efficacy is limited
    because the growth defect is intrinsic to the growth plate rather than
    due to growth hormone deficiency.
  treatment_term:
    preferred_term: human growth hormone replacement therapy
    term:
      id: MAXO:0000780
