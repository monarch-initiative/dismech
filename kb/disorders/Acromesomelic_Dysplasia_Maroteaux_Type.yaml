    supports: PARTIAL
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Some individuals with AMDM have been treated with recombinant human
      growth hormone therapy with a variable response
    explanation: >-
      Growth hormone therapy has been attempted but shows variable and
      generally limited efficacy.
notes: >
  AMDM is distinct from the more severe Hunter-Thompson and Grebe types of
  acromesomelic dysplasia, which are caused by mutations in GDF5 and BMPR1B
  and lack craniofacial and axial involvement. Heterozygous NPR2
  loss-of-function mutations account for a subset of idiopathic short stature.
  Gain-of-function NPR2 mutations cause the overgrowth condition epiphyseal
  chondrodysplasia, Miura type.
