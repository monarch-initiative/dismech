name: STAT5A Deficiency
creation_date: "2026-04-16T19:36:58Z"
updated_date: "2026-04-16T19:36:58Z"
category: Mendelian
description: >-
  STAT5A deficiency is curated as a distinct gene-level disorder concept and is
  not merged with STAT5B deficiency. Available evidence suggests that reduced
  STAT5A function preferentially perturbs immune and hematopoietic signaling,
  especially cytokine-responsive myeloid proliferation and lymphocyte survival,
  rather than reproducing the severe growth hormone insensitivity phenotype
  that defines STAT5B deficiency. Current human germline evidence remains
  sparse and incompletely penetrant, so this entry should be read as a
  provisional, paralog-specific curation.
disease_term:
  preferred_term: STAT5A deficiency
parents:
- Primary Immunodeficiency
- Hematologic Disease
notes: >-
  No exact MONDO term for STAT5A deficiency was found in the current ontology
  snapshot. MONDO issue  # 9961 is a related upstream discussion about STAT5
  paralog scoping and haploinsufficiency, and is tracked here to document why
  STAT5A and STAT5B should not be collapsed into a single STAT5 entry.
tracked_issues:
- url: https://github.com/monarch-initiative/mondo/issues/9961
  title: "New Term Request: STAT5 Haploinsufficiency"
  tracked_issue_role: ontology_coverage_gap
  tracked_issue_status: OPEN
  notes: >-
    Related MONDO discussion about STAT5 paralog scoping. The issue is framed
    as haploinsufficiency rather than a direct STAT5A-deficiency leaf term, but
    it captures the upstream need to keep STAT5A- and STAT5B-associated
    concepts separate.
pathophysiology:
- name: Impaired GM-CSF-responsive myeloid proliferation
  description: >-
    Experimental Stat5a loss impairs GM-CSF-driven transcriptional output and
    proliferation in myeloid cells, supporting a paralog-specific role for
    STAT5A in hematopoietic cytokine responses.
  gene:
    preferred_term: STAT5A
    modifier: DECREASED
    term:
      id: hgnc:11367
      label: STAT5A
  cell_types:
  - preferred_term: macrophage
    term:
      id: CL:0000235
      label: macrophage
  biological_processes:
  - preferred_term: leukocyte proliferation
    term:
      id: GO:0070661
      label: leukocyte proliferation
    modifier: DECREASED
  evidence:
  - reference: PMID:9292509
    supports: SUPPORT
    evidence_source: MODEL_ORGANISM
    snippet: >-
      Proliferation experiments revealed that, when exposed to increasing
      concentrations of GM-CSF, cells derived from the null mice grew
      considerably more slowly than cells derived from the wild-type mice.
    explanation: >-
      Stat5a-null macrophage lineage cells show reduced cytokine-driven
      proliferation, supporting a hematopoietic phenotype centered on impaired
      GM-CSF responsiveness.
  - reference: PMID:9292509
    supports: SUPPORT
    evidence_source: MODEL_ORGANISM
    snippet: >-
      expression of GM-CSF-dependent genes, CIS and A1, was markedly inhibited
      in cells derived from null mice as compared with those of wild-type mice.
    explanation: >-
      Supports impaired downstream transcriptional responses to GM-CSF in the
      absence of STAT5A.
- name: Reduced STAT5A-dependent survival transcription in T cells
  description: >-
    Paralog-selective knockdown studies in human primary T cells suggest that
    STAT5A contributes to lymphocyte survival programs that are not fully
    shared with STAT5B.
  cell_types:
  - preferred_term: T cell
    term:
      id: CL:0000084
      label: T cell
  biological_processes:
  - preferred_term: Apoptotic Process
    term:
      id: GO:0006915
      label: apoptotic process
    modifier: INCREASED
  evidence:
  - reference: PMID:23773921
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: >-
      Upon knocking down STAT5A or STAT5B in human primary T cells, we found
      differentially regulated expression of FOXP3 and IL-2R in STAT5B
      knockdown T cells and down-regulated Bcl-X only in STAT5A knockdown T
      cells.
    explanation: >-
      Human primary T-cell experiments support a STAT5A-specific contribution
      to anti-apoptotic transcriptional programs, consistent with immune-cell
      survival defects rather than endocrine failure.
genetic:
- name: STAT5A
  gene_term:
    preferred_term: STAT5A
    term:
      id: hgnc:11367
      label: STAT5A
  association: Provisional paralog-specific deficiency concept
  notes: >-
    STAT5A is curated separately from STAT5B to preserve paralog specificity.
    Current evidence supports distinct immune and hematopoietic functions for
    STAT5A, but the human clinical syndrome is not yet as well delineated as
    STAT5B deficiency.
  evidence:
  - reference: PMID:24497979
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: >-
      STAT5A and STAT5B show peptide sequence similarities greater than 90%,
      but subtle structural differences suggest possible non-redundant roles in
      gene regulation.
    explanation: >-
      Human T-cell genomic studies support a biologically distinct STAT5A
      paralog and justify separate curation rather than a merged STAT5 concept.
  - reference: PMID:41596571
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      All four variants are inherited through the germline without any evident
      clinical or physiological manifestations in the carriers.
    explanation: >-
      Recent human germline data emphasize that STAT5A-associated disease
      remains clinically sparse and incompletely penetrant, which justifies
      keeping this entry provisional and separate from well-defined STAT5B
      deficiency.
