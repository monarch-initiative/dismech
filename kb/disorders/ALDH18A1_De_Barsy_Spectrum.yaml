    the blocked glutamate-derived amino-acid pathway to impaired nitrogen handling.
    Classic P5CS deficiency can therefore present with hyperammonemia together with
    hypoornithinemia, hypocitrullinemia, hypoargininemia, and hypoprolinemia.
