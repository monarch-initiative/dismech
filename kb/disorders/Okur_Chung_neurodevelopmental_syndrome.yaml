    explanation: >-
      Natural-history work confirms hypotonia remains common and may be more
      prominent in specific variant groups.
- category: Neurological
  name: Microcephaly
  frequency: FREQUENT
  description: >-
    Reduced head circumference is a common but historically under-recognized
