  evidence:
  - reference: PMID:29383814
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Consistent with previously reported patients, patients in this series had
      apparent intellectual disability, swallowing difficulties, and hypotonia.
    explanation: >-
