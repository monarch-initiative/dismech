diagnosis:
- name: Skin biopsy PCR with sequencing
  description: >-
    Real-time PCR on skin biopsy followed by sequencing can confirm Rickettsia
    infection and support species identification.
  diagnosis_term:
    preferred_term: diagnostic procedure
    term:
      id: MAXO:0000003
      label: diagnostic procedure
  evidence:
  - reference: DOI:10.1590/S1678-9946202567041
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "real-time PCR performed on skin biopsy samples confirmed Rickettsia spp."
    explanation: The case series directly supports skin-biopsy PCR confirmation.
  - reference: DOI:10.1590/S1678-9946202567041
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Subsequent DNA sequencing of the gltA and ompA gene regions enabled species identification."
    explanation: The case series supports sequencing of rickettsial genes for species identification.
- name: Indirect immunofluorescence serology
  description: Rising IgM and IgG titers by indirect immunofluorescence can support diagnosis.
  diagnosis_term:
    preferred_term: diagnostic procedure
    term:
      id: MAXO:0000003
      label: diagnostic procedure
  evidence:
  - reference: DOI:10.1590/S1678-9946202567041
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "serological tests showed a significant rise in IgM and IgG antibody titers reacting with Rickettsia conorii antigen by indirect immunofluorescence assay."
    explanation: The case series supports IFA serology with rising titers as diagnostic evidence.
treatments:
- name: Doxycycline therapy
  description: Doxycycline is the first-line antimicrobial therapy for suspected or confirmed boutonneuse fever.
  treatment_term:
    preferred_term: pharmacotherapy
    term:
      id: MAXO:0000058
      label: pharmacotherapy
    therapeutic_agent:
    - preferred_term: doxycycline
      term:
        id: CHEBI:50845
        label: doxycycline
  target_phenotypes:
  - preferred_term: Fever
    term:
      id: HP:0001945
      label: Fever
  target_mechanisms:
  - target: Tick inoculation and intracellular rickettsial infection
    treatment_effect: INHIBITS
    description: Doxycycline antimicrobial therapy targets intracellular rickettsial infection.
  evidence:
  - reference: DOI:10.1017/S095026882400178X
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Treatment with doxycycline (n = 161) resolved fever"
    explanation: The hospitalized cohort supports doxycycline-associated fever resolution.
  - reference: DOI:10.1590/S1678-9946202567041
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "All patients were treated with doxycycline and recovered without complications."
    explanation: The Turkey case series supports doxycycline treatment with recovery.
