name: Boutonneuse Fever
creation_date: "2026-05-09T15:21:54Z"
updated_date: "2026-05-09T15:21:54Z"
category: Infectious Disease
description: >-
  Boutonneuse fever, also known as Mediterranean spotted fever or Marseilles
  fever, is an acute tick-borne spotted-fever-group rickettsiosis caused by
  Rickettsia conorii and transmitted primarily by the brown dog tick
  Rhipicephalus sanguineus. The illness classically presents with fever, rash,
  and an inoculation eschar and can progress to vascular and multisystem
  complications when diagnosis or therapy is delayed.
disease_term:
  preferred_term: boutonneuse fever
  term:
    id: MONDO:0024472
    label: boutonneuse fever
parents:
- Rickettsia conorii infectious disease
synonyms:
- Mediterranean spotted fever
- Mediterranean tick fever
- Marseilles fever
- Marseille fever
- Kenya tick typhus
- tache noire fever
definitions:
- name: Tick-borne rickettsial disease definition
  definition_type: CASE_DEFINITION
  description: >-
    Boutonneuse fever is a Mediterranean and Black Sea spotted fever caused by
    Rickettsia conorii and transmitted by Rhipicephalus sanguineus ticks.
  scope: Human boutonneuse fever / Mediterranean spotted fever
  evidence:
  - reference: DOI:10.3390/microorganisms11112734
    supports: SUPPORT
    evidence_source: OTHER
    snippet: "Boutonneuse fever (BF) is an eruptive disease and is classified as a spotted fever, which is endemic in the Mediterranean basin (i.e., Marseille fever or Mediterranean spotted fever) and the Black Sea, caused by Rickettsia conorii, with dog ticks being a vector (i.e., Rhipicephalus sanguineus)."
    explanation: The review abstract defines the disease, endemic regions, causal agent, and vector.
infectious_agent:
- name: Rickettsia conorii
  infectious_agent_term:
    preferred_term: Rickettsia conorii
    term:
      id: NCBITaxon:781
      label: Rickettsia conorii
  description: Spotted-fever-group obligate intracellular bacterium causing boutonneuse fever.
  evidence:
  - reference: DOI:10.1017/S095026882400178X
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Mediterranean spotted fever (MSF) is a rickettsial disease caused by Rickettsia conorii, transmitted by brown dog ticks, and endemic in the Mediterranean region."
    explanation: The hospitalized cohort abstract identifies R. conorii as the causal organism.
- name: Rickettsia conorii subsp. conorii
  infectious_agent_term:
    preferred_term: Rickettsia conorii subsp. conorii
    term:
      id: NCBITaxon:319546
      label: Rickettsia conorii subsp. conorii
  description: Subspecies associated with classic Mediterranean spotted fever.
  evidence:
  - reference: DOI:10.3390/pathogens12091161
    supports: SUPPORT
    evidence_source: OTHER
    snippet: "Mediterranean spotted fever (MSF) is a tick-borne rickettsiosis caused by Rickettsia conorii subspecies conorii and transmitted to humans by Rhipicephalus sanguineus ticks."
    explanation: The Black Sea review abstract identifies R. conorii subsp. conorii as the etiologic agent.
transmission:
- name: Brown dog tick transmission
  description: >-
    Human infection follows exposure to infected Rhipicephalus sanguineus ticks,
    often in endemic warm-season settings with dog or animal exposure.
  evidence:
  - reference: DOI:10.3390/pathogens12091161
    supports: SUPPORT
    evidence_source: OTHER
    snippet: "Mediterranean spotted fever (MSF) is a tick-borne rickettsiosis caused by Rickettsia conorii subspecies conorii and transmitted to humans by Rhipicephalus sanguineus ticks."
    explanation: The abstract directly supports tick-borne transmission by R. sanguineus.
  - reference: DOI:10.1590/S1678-9946202567041
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "All cases occurred during summer and had documented exposure to Rhipicephalus sanguineus."
    explanation: The Turkey case series supports warm-season exposure to the brown dog tick in confirmed cases.
environmental:
- name: Endemic-region tick and animal exposure
  presence: Present
  description: >-
    Exposure risk increases in endemic Mediterranean and Black Sea settings,
    especially during hot seasons and after animal or tick contact.
  evidence:
  - reference: DOI:10.1017/S095026882400178X
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Animal exposure was reported in 74.6%, and cases peaked during the hot season (68.8%), with no cases in winter months."
    explanation: The cohort quantifies animal exposure and seasonal clustering among hospitalized MSF cases.
epidemiology:
- name: Mediterranean-region hospitalized adult cohort
  description: >-
    A Tunis university hospital cohort over 2000-2020 included predominantly
    adult male patients, with urban residence, animal exposure, and hot-season
    clustering.
  evidence:
  - reference: DOI:10.1017/S095026882400178X
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "This study retrospectively included 173 adult patients hospitalized for MSF at La Rabta University Hospital, Tunis, from 2000 to 2020."
    explanation: Establishes the cohort size, location, and retrospective human-clinical design.
progression:
- phase: Acute febrile exanthem after tick exposure
  notes: >-
    The early clinical course centers on acute fever with rash and often an
    eschar at the tick bite site.
  evidence:
  - reference: DOI:10.1017/S095026882400178X
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "The classic triad of fever, rash, and eschar was observed in 69.9%, with maculopapular lesions affecting palms and soles in 83.8%."
    explanation: The cohort abstract supports the acute fever-rash-eschar clinical phase.
- phase: Complication-prone vascular disease
  notes: Severe or delayed cases can involve inflammatory vascular complications.
  evidence:
  - reference: DOI:10.1017/S095026882400178X
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Complications, including encephalitis, chorioretinitis, anterior uveitis and vasculitis, occurred in 2.3% of cases, but all patients recovered without relapse."
    explanation: The cohort identifies neurologic, ocular, and vascular complications.
- phase: Response to doxycycline
  notes: Fever usually resolves rapidly after doxycycline treatment in reported cohorts.
  evidence:
  - reference: DOI:10.1017/S095026882400178X
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Treatment with doxycycline (n = 161) resolved fever"
    explanation: The cohort abstract supports doxycycline-associated fever resolution.
pathophysiology:
- name: Tick inoculation and intracellular rickettsial infection
  description: >-
    Rhipicephalus sanguineus tick exposure introduces obligate intracellular
    Rickettsia conorii, initiating localized infection and subsequent systemic
    spotted-fever illness.
  biological_processes:
  - preferred_term: symbiont entry into host cell
    term:
      id: GO:0046718
      label: symbiont entry into host cell
  - preferred_term: response to bacterium
    term:
      id: GO:0009617
      label: response to bacterium
  evidence:
  - reference: DOI:10.1590/S1678-9946202567041
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Rickettsia species are Gram-negative, pleomorphic coccobacilli that are obligate intracellular pathogens transmitted by arthropod vectors such as ticks."
    explanation: The case-series abstract supports tick-borne transmission and obligate intracellular pathogen biology.
  downstream:
  - target: Endothelial barrier disruption and vascular permeability
    description: Intracellular rickettsial infection can involve microvascular endothelial injury.
- name: Endothelial barrier disruption and vascular permeability
  description: >-
    Rickettsia conorii infection disrupts microvascular endothelial tight
    junction integrity, reducing ZO-1 and increasing endothelial permeability;
    this vascular barrier injury provides a mechanistic basis for rash,
    vasculitis, edema, and severe systemic complications.
  cell_types:
  - preferred_term: endothelial cell
    term:
      id: CL:0000115
      label: endothelial cell
  biological_processes:
  - preferred_term: regulation of vascular permeability
    modifier: DYSREGULATED
    term:
      id: GO:0043114
      label: regulation of vascular permeability
  - preferred_term: tight junction disassembly
    modifier: INCREASED
    term:
      id: GO:1905071
      label: tight junction disassembly
  evidence:
  - reference: PMID:39679710
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: "The fundamental pathophysiological changes in fatal rickettsial diseases are disrupted endothelial barrier and increased microvascular permeability."
    explanation: The in vitro endothelial study frames barrier disruption and permeability as central rickettsial pathophysiology.
  - reference: PMID:39679710
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: "In the present study, we demonstrated that Rickettsia conorii infection disrupts the continuous immunofluorescence expression of the interendothelial tight junction protein, zonula occludens-1 (ZO-1), in infected monolayers of microvascular endothelial cells (MVECs), accompanied by significantly diminished total expression levels of ZO-1."
    explanation: Directly supports R. conorii endothelial tight-junction disruption.
  downstream:
  - target: Systemic inflammatory vasculitis
    description: Barrier disruption and endothelial injury contribute to vasculitic complications.
- name: Inflammasome-associated endothelial injury
  description: >-
    R. conorii activates NLRP3 inflammasome signaling in microvascular
    endothelial cells, linking intracellular infection to inflammatory vascular
    injury.
  cell_types:
  - preferred_term: endothelial cell
    term:
      id: CL:0000115
      label: endothelial cell
  biological_processes:
  - preferred_term: positive regulation of NLRP3 inflammasome complex assembly
    modifier: INCREASED
    term:
      id: GO:1900227
      label: positive regulation of NLRP3 inflammasome complex assembly
  - preferred_term: inflammatory response
    modifier: INCREASED
    term:
      id: GO:0006954
      label: inflammatory response
  evidence:
  - reference: PMID:39679710
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: "R. conorii activated inflammasome in MVECs, as evidenced by cleaved caspase-1"
    explanation: Supports NLRP3 inflammasome activation in R. conorii-infected microvascular endothelial cells.
  downstream:
  - target: Systemic inflammatory vasculitis
    description: Inflammasome-linked endothelial injury can amplify vascular inflammation.
- name: Systemic inflammatory vasculitis
  description: >-
    Endothelial injury and immune activation manifest clinically as rash,
    vasculitis, and rare neurologic or ocular complications.
  cell_types:
  - preferred_term: endothelial cell
    term:
      id: CL:0000115
      label: endothelial cell
  biological_processes:
  - preferred_term: inflammatory response
    modifier: INCREASED
    term:
      id: GO:0006954
      label: inflammatory response
  evidence:
  - reference: DOI:10.1017/S095026882400178X
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Complications, including encephalitis, chorioretinitis, anterior uveitis and vasculitis, occurred in 2.3% of cases, but all patients recovered without relapse."
    explanation: Human clinical data identify vasculitis and organ complications in MSF.
