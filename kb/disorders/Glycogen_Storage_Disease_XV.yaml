    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      cardiac abnormalities ... were found in 40.7%
    explanation: >-
      This supports occasional cardiac involvement among reported GYG1-deficient patients.
  downstream:
  - target: Arrhythmia
    description: Cardiac involvement can manifest as rhythm disturbance.
