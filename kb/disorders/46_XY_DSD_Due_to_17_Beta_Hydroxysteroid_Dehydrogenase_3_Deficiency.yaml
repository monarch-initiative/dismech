      explanation: The review describes the enzymatic step disrupted by HSD17B3 deficiency.
- name: Impaired Androstenedione to Testosterone Conversion
  description: >-
    Defective 17-beta-HSD3 activity reduces testosterone synthesis while
    androstenedione accumulates, causing a low testosterone-to-androstenedione
    ratio after gonadotropin stimulation.
  biological_processes:
  - preferred_term: androgen biosynthetic process
