      snippet: "in the fetal testis, resulting in a Disorder of Sex Development (DSD)."
      explanation: This directly links HSD17B3 mutations to impaired fetal testicular testosterone synthesis.
- name: Fetal Testicular Testosterone Deficiency
  description: >-
    Low fetal testosterone and downstream androgen production impair
    masculinization of external genitalia despite a 46,XY karyotype and testes.
  evidence:
  - reference: PMID:41035179
    reference_title: "Identifying 17-β-HSD3 Deficiency in Patients with Karyotype 46,XY Misdiagnosed with Androgen Insensitivity Syndrome: A Pediatric Case Report."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "people with karyotype 46,XY due to impaired testosterone and dihydrotestosterone"
    explanation: The case report links impaired androgen production to the disorder.
  downstream:
  - target: 46XY Undervirilization Phenotype
    causal_link_type: DIRECT
    description: >-
      Reduced androgen synthesis produces female-appearing or ambiguous
      external genitalia, hypospadias, cryptorchidism, and related genital
      findings.
    evidence:
    - reference: PMID:36077423
      reference_title: "Disorder of Sex Development Due to 17-Beta-Hydroxysteroid Dehydrogenase Type 3 Deficiency: A Case Report and Review of 70 Different HSD17B3 Mutations Reported in 239 Patients."
      supports: SUPPORT
      evidence_source: HUMAN_CLINICAL
      snippet: "in the fetal testis, resulting in a Disorder of Sex Development (DSD)."
      explanation: The review directly links fetal testosterone deficiency to 46,XY undervirilization.
- name: 46XY Undervirilization Phenotype
  description: >-
    The clinical phenotype includes 46,XY undervirilization with ambiguous or
    female-appearing external genitalia, hypospadias, bifid scrotum,
    cryptorchidism, inguinal testes or hernias, and infertility. Pubertal
    virilization can occur when androstenedione secretion increases.
  evidence:
  - reference: ORPHA:752
    reference_title: 46,XY difference of sex development due to 17-beta-hydroxysteroid dehydrogenase 3 deficiency
    supports: SUPPORT
    evidence_source: OTHER
    snippet: "underandrogenization of the genitalia"
    explanation: Orphanet summarizes underandrogenization as the defining clinical phenotype.
  - reference: PMID:33586216
    reference_title: Early and late diagnoses of 17β-Hydroxysteroid dehydrogenase type-3 deficiency in two unrelated patients.
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "presented due to pubertal virilisation and primary amenorrhoea"
    explanation: This case series supports pubertal virilization as a later presentation.
