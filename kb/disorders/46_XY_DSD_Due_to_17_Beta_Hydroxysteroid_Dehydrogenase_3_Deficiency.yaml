    snippet: "revealed a markedly low testosterone-to-androstenedione (T/AND) ratio of 0.1"
    explanation: This case report supports the low testosterone-to-androstenedione ratio as the biochemical consequence.
  downstream:
  - target: Fetal Testicular Testosterone Deficiency
    causal_link_type: DIRECT
    description: >-
      Reduced androstenedione-to-testosterone conversion lowers fetal
