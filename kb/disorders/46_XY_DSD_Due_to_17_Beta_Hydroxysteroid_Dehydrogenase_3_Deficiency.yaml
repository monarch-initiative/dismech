name: 46,XY disorder of sex development due to 17-beta-hydroxysteroid dehydrogenase 3 deficiency
creation_date: "2026-05-11T03:03:02Z"
updated_date: "2026-05-11T03:03:02Z"
category: Mendelian
description: >-
  46,XY disorder of sex development due to 17-beta-hydroxysteroid
  dehydrogenase 3 deficiency is an autosomal recessive androgen biosynthesis
  disorder caused by biallelic HSD17B3 loss-of-function variants. Impaired
  conversion of androstenedione to testosterone lowers fetal testicular
  testosterone production, producing underandrogenization of external genitalia
  in individuals with a 46,XY karyotype. Diagnosis relies on steroid hormone
  ratios and molecular confirmation; pubertal virilization may occur when
  androstenedione secretion rises.
