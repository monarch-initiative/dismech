    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Kidney involvement was heterogenous between patients (ANCA-associated vasculitis-like disease, lupus or immune-complex mediated glomerulonephritis or overlapping phenotypes), and all had advanced histological damage at clinical presentation."
    explanation: Case series describes five COPA syndrome patients with advanced renal histology presenting for kidney transplant evaluation.
- name: STING-directed therapy (experimental)
  description: >
    Direct STING pathway inhibition (e.g., small-molecule inhibitors such
    as H-151) and STING1-directed gene therapy aimed at introducing the
    protective HAQ allele are emerging upstream therapeutic strategies
    based on the central role of Golgi-localised STING activation in COPA
    syndrome. Evidence level: experimental/preclinical, with BI 3000202 now in
    Phase 1 safety and tolerability testing for selected type I
    interferonopathies including COPA syndrome.
  treatment_term:
    preferred_term: pharmacotherapy
    term:
      id: MAXO:0000058
      label: pharmacotherapy
  target_mechanisms:
