    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "All subjects received immunosuppressive therapy."
    explanation: Tsui et al. report that all subjects in the international pulmonary cohort received immunosuppressive therapy as standard care.
- name: Lung transplantation
  description: >
    Lung transplantation is offered to patients with end-stage progressive
    interstitial lung disease refractory to immunosuppression and JAK
    inhibition. Evidence level: case reports/literature review for end-stage
    COPA lung disease, with allograft dysfunction reported.
