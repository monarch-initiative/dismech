    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Among the 46 individuals carrying a COPA mutation, 38 had at least 1 clinical manifestation likely related to their mutant state (clinical penetrance of 83%)."
    explanation: Cohort data support incomplete penetrance among mutation carriers.
diagnosis:
- name: COPA molecular genetic testing
  description: >-
    COPA syndrome should be confirmed by molecular genetic testing for a
    heterozygous pathogenic COPA variant, particularly in a child or adult with
    early-onset interstitial lung disease, diffuse alveolar hemorrhage,
    arthritis, nephritis, high-titer autoantibodies, or a family history
    consistent with autosomal dominant disease. Sequencing should cover both
    canonical WD40 cargo-recognition variants and the newer C-terminal domain
    variant class.
  diagnosis_term:
    preferred_term: molecular genetic testing
    term:
      id: MAXO:0000533
      label: molecular genetic testing
  evidence:
  - reference: PMID:37821196
    reference_title: "COPA Syndrome from Diagnosis to Treatment: A Clinician's Guide."
    supports: SUPPORT
    evidence_source: OTHER
    snippet: "This review explores the clinical presentation, genetics, molecular mechanisms, organ manifestations, and treatment approaches for COPA syndrome, and presents a diagnostic framework of suggested indications for patient testing."
    explanation: Clinician's guide supports a testing framework for suspected COPA syndrome.
  - reference: PMID:29977900
    reference_title: "Analysis of pulmonary features and treatment approaches in the COPA syndrome."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Targeted sequencing should be performed in all subjects suspected of having the disease to establish the diagnosis and distinguish the COPA syndrome from other disorders in which DPLD may occur such as lymphangioleiomyomatosis, Sjögren's syndrome and JIA (table 5)."
    explanation: Pulmonary cohort recommends COPA sequencing to establish diagnosis and distinguish phenocopies.
- name: Pulmonary workup for ILD and diffuse alveolar hemorrhage
  description: >-
    Pulmonary evaluation should include high-resolution chest CT or equivalent
    chest CT review, pulmonary function tests, and hemorrhage-focused evaluation
    when hemoptysis, anemia, ground-glass opacities, or suspected diffuse
    alveolar hemorrhage are present. Bronchoscopy/biopsy can document diffuse
    alveolar hemorrhage, capillaritis, hemosiderin-laden macrophages, follicular
    bronchiolitis, or lymphoid hyperplasia when clinically indicated.
  diagnosis_term:
    preferred_term: computed tomography procedure
    term:
      id: MAXO:0000571
      label: computed tomography procedure
  evidence:
  - reference: PMID:36746811
    reference_title: "Imaging findings of COPA Syndrome."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "All 12 had abnormal chest CT exams, with findings including ground-glass opacities (12/12), cysts (8/12), septal thickening (9/12), nodules (8/12), fibrosis (7/12), crazy-paving (2/12), consolidation (1/12), hilar/mediastinal lymphadenopathy (11/12), and chest wall deformity (5/12)."
    explanation: Pediatric imaging series supports chest CT as a high-yield pulmonary diagnostic study.
  - reference: PMID:29977900
    reference_title: "Analysis of pulmonary features and treatment approaches in the COPA syndrome."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Data were collected for a minimum of 5 years, up to 25 years. The majority of PFTs were performed at UCSF according to American Thoracic Society (ATS) standards."
    explanation: Pulmonary cohort used serial pulmonary function testing to characterize COPA lung disease.
  - reference: PMID:29977900
    reference_title: "Analysis of pulmonary features and treatment approaches in the COPA syndrome."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Three subjects were biopsied at the time they developed haemoptysis and diagnosed with DAH via bronchoscopy."
    explanation: Supports bronchoscopy/biopsy when diffuse alveolar hemorrhage is suspected.
- name: Renal evaluation for immune-mediated glomerulonephritis
  description: >-
    Renal evaluation should screen for nephritis with urinalysis, kidney
    function testing, renal imaging when indicated, and kidney biopsy when
    immune-mediated glomerulonephritis or advanced renal involvement is
    suspected.
  diagnosis_term:
    preferred_term: clinical assessment
    term:
      id: MAXO:0000487
      label: clinical assessment
  evidence:
  - reference: PMID:36746811
    reference_title: "Imaging findings of COPA Syndrome."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Five had at least one renal US, revealing renal size abnormalities (4/5) and cortical hyperechogenicity (3/5)."
    explanation: Imaging cohort supports renal imaging as part of COPA renal phenotyping.
  - reference: PMID:29977900
    reference_title: "Analysis of pulmonary features and treatment approaches in the COPA syndrome."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Three (21%) out of 14 patients developed biopsy confirmed immune-mediated kidney disease and concurrent DAH."
    explanation: Supports renal biopsy when immune-mediated kidney involvement is suspected.
  - reference: PMID:41932423
    reference_title: "Kidney Transplant Outcomes in Coatomer Protein Complex Subunit Alpha (COPA) Syndrome: Report of Five Patients."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Kidney involvement was heterogenous between patients (ANCA-associated vasculitis-like disease, lupus or immune-complex mediated glomerulonephritis or overlapping phenotypes), and all had advanced histological damage at clinical presentation."
    explanation: Transplant case series supports broad renal differential and histologic assessment in severe kidney disease.
- name: Autoantibody and type I interferon signature testing
  description: >-
    Serologic workup should include autoantibodies that often misdirect the
    initial diagnosis, including ANA, ANCA, rheumatoid factor, and related
    lupus/vasculitis/arthritis markers. A peripheral blood type I interferon or
    interferon-stimulated gene signature can support mechanism-based diagnosis
    and monitoring, although it is not specific to COPA syndrome.
  diagnosis_term:
    preferred_term: clinical assessment
    term:
      id: MAXO:0000487
      label: clinical assessment
  evidence:
  - reference: PMID:29977900
    reference_title: "Analysis of pulmonary features and treatment approaches in the COPA syndrome."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "All subjects were positive for anti-neutrophil cytoplasmic antibody, anti-nuclear antibody or both and 71% of subjects had rheumatoid factor positivity."
    explanation: Supports ANA/ANCA/RF testing as part of COPA serologic workup.
  - reference: PMID:29030294
    reference_title: "Type I interferon pathway activation in COPA syndrome."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Analysis of peripheral blood showed activation of type 1 interferon pathway, which was also confirmed in 4 previously reported COPA patients."
    explanation: Supports peripheral interferon pathway testing as a mechanistic biomarker.
- name: Differential diagnosis with pulmonary-renal autoimmunity and interferonopathies
  description: >-
    Differential diagnosis should include SAVI and other type I
    interferonopathies, systemic lupus erythematosus, ANCA-associated
    vasculitis, juvenile idiopathic arthritis/rheumatoid arthritis, Sjögren
    syndrome, lymphangioleiomyomatosis, idiopathic pulmonary hemosiderosis, and
    other causes of childhood-onset diffuse parenchymal lung disease.
  diagnosis_term:
    preferred_term: clinical assessment
    term:
      id: MAXO:0000487
      label: clinical assessment
  evidence:
  - reference: PMID:41395910
    reference_title: "Insights from a novel monogenic autoinflammatory disease: overview of a multicentric European cohort of 38 patients with COPA syndrome."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "further demonstrating the clinical overlap with SAVI and other type I interferonopathies."
    explanation: Large cohort supports SAVI and other interferonopathies in the differential diagnosis.
  - reference: PMID:29977900
    reference_title: "Analysis of pulmonary features and treatment approaches in the COPA syndrome."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "The presence of ANA and/or ANCA in the COPA syndrome suggests a connection to systemic lupus erythematous (SLE) or ANCA-associated vasculitides such as granulomatosis with polyangiitis (GPA) or microscopic polyangiitis (MPA)."
    explanation: Supports lupus and ANCA-associated vasculitis in the pulmonary-renal differential.
treatments:
- name: Janus kinase inhibitor therapy
  description: >
    JAK inhibitors block JAK-STAT signalling downstream of the type I
    interferon receptor and are the most promising mechanism-targeted
    therapy in COPA syndrome. Evidence level: observational cohort and
    review-level support, with published cohort-level evidence
    supporting baricitinib and ruxolitinib for both interstitial lung
    disease and arthritis.
  treatment_term:
    preferred_term: pharmacotherapy
    term:
      id: MAXO:0000058
      label: pharmacotherapy
    therapeutic_agent:
    - preferred_term: JAK inhibitor
      term:
        id: NCIT:C172200
        label: JAK Inhibitor
  target_mechanisms:
  - target: Constitutive type I interferon signaling
    treatment_effect: INHIBITS
  evidence:
  - reference: PMID:41395910
    reference_title: "Insights from a novel monogenic autoinflammatory disease: overview of a multicentric European cohort of 38 patients with COPA syndrome."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Twenty-two patients were treated with Janus kinase inhibitors with promising efficacy."
    explanation: Large European cohort provides the strongest available abstract-level support for JAK inhibitor use in COPA syndrome.
  - reference: PMID:39767180
    reference_title: "COPA Syndrome-From Pathogenesis to Treatment."
    supports: SUPPORT
