    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: "Expressing HAQ STING in patient cells rescued the molecular phenotype of COPA syndrome."
    explanation: Cellular rescue with HAQ STING establishes proof-of-concept for STING-directed gene therapy, framed as "a potential universal gene therapy approach for patients."
