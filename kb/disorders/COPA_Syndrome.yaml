    causal_link_type: DIRECT
  - target: ER stress and unfolded protein response
    causal_link_type: DIRECT
  evidence:
  - reference: PMID:38175705
    reference_title: "Heterozygous mutations in the C-terminal domain of COPA underlie a complex autoinflammatory syndrome."
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: "we demonstrated that COPI dysfunction causes both an anterograde ER-to-Golgi and a retrograde Golgi-to-ER trafficking defect."
    explanation: CTD variant fibroblasts directly show bidirectional trafficking failure when COPI integrity is disrupted.
- name: STING accumulation and activation at the Golgi
  description: >
    Failed COPA/SURF4-mediated retrieval traps ER-resident STING at the
    Golgi, where it multimerises and undergoes ligand-independent activation
    with TBK1 phosphorylation. STING activation is constitutive in WD40
    variants and hyperactivated upon stimulation in dendritic cells from
    CTD- and other mutant carriers.
