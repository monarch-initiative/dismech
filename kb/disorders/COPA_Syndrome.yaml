    explanation: Case report documents lung transplantation as a treatment option for end-stage COPA syndrome interstitial lung disease unresponsive to immunosuppression.
- name: Kidney transplantation
  description: >
    Patients who progress to advanced glomerular damage and end-stage renal
    disease require kidney transplantation, with outcomes documented in a
    multi-patient case series. Evidence level: five-patient observational case
    series.
  treatment_term:
