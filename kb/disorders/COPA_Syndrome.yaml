name: COPA Syndrome
creation_date: "2026-04-12T17:08:20Z"
updated_date: "2026-04-25T19:00:00Z"
category: Mendelian
synonyms:
- autoimmune interstitial lung disease-arthritis syndrome
- autoimmune interstitial lung, joint, and kidney disease
- AILJK
- coatomer subunit alpha syndrome
description: >
  COPA syndrome is an autosomal dominant inborn error of immunity caused by
  heterozygous pathogenic variants in COPA encoding coatomer subunit alpha. It
  presents in early childhood with interstitial lung disease (often with
  diffuse alveolar hemorrhage and pulmonary lymphoid hyperplasia),
  inflammatory polyarthritis, high-titer autoantibodies, and variable
  immune-mediated kidney disease. The molecular cascade reflects impaired
  COPI-mediated retrograde Golgi-to-ER trafficking with failed retrieval of
  STING by the SURF4 adapter, ligand-independent STING accumulation at the
  Golgi, cGAS/STING-dependent type I interferon signaling, ER stress and
  unfolded protein response activation, NF-kappaB-driven proinflammatory
  cytokine output, and TH17-skewed adaptive immune dysregulation that
  promotes autoantibody-positive end-organ inflammation. Penetrance is
  incomplete, and the common HAQ STING haplotype dominantly suppresses STING
  signaling and prevents clinical disease in carriers.
disease_term:
  preferred_term: COPA syndrome
  term:
    id: MONDO:0014629
    label: autoimmune interstitial lung disease-arthritis syndrome
parents:
- Autoinflammatory diseases
- Inborn errors of immunity
- Interstitial lung disease
- Type I interferonopathies
has_subtypes:
- name: WD40 domain
  display_name: COPA WD40 domain (N-terminal) variants
  description: >
    Classical COPA syndrome caused by heterozygous missense variants in the
    N-terminal WD40 cargo-recognition domain of coatomer subunit alpha
    (e.g., p.Glu241Lys, p.Arg233His, p.Val242Gly). These variants impair
    binding of dilysine ER-retrieval cargo and SURF4-mediated STING
    retrieval, causing ligand-independent STING activation at the Golgi and
    a constitutive type I interferon signature.
  evidence:
  - reference: PMID:25894502
    reference_title: "COPA mutations impair ER-Golgi transport and cause hereditary autoimmune-mediated lung disease and arthritis."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "We identified four unique deleterious variants in the COPA gene (encoding coatomer subunit α) affecting the same functional domain."
    explanation: Watkin et al. localised the original recurrent disease-causing variants to a single functional WD40 cargo-recognition domain.
- name: C-terminal domain
  display_name: COPA C-terminal domain (CTD) variants
  description: >
    A clinically similar but mechanistically distinct subtype caused by
    heterozygous variants in the COPA C-terminal domain (e.g., p.Cys1013Ser,
    p.Arg1058Cys, p.Arg1142X). CTD mutations disrupt COPI integrity and
    cause both anterograde ER-to-Golgi and retrograde Golgi-to-ER
    trafficking defects, with cGAS/STING-dependent type I IFN upregulation
    accompanied by prominent ER stress and NF-kappaB activation.
  evidence:
  - reference: PMID:38175705
    reference_title: "Heterozygous mutations in the C-terminal domain of COPA underlie a complex autoinflammatory syndrome."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "We described 3 heterozygous mutations in the C-terminal domain (CTD) of COPA (p.C1013S, p.R1058C, and p.R1142X) in 6 children from 3 unrelated families with a similar syndrome of autoinflammation and autoimmunity."
    explanation: Delafontaine et al. delineate the CTD variant subtype with overlapping clinical features but a distinct molecular mechanism from canonical WD40 variants.
pathophysiology:
- name: COPA pathogenic variants
  description: >
    Heterozygous deleterious COPA variants - most commonly missense changes
    in the N-terminal WD40 cargo-recognition domain of coatomer subunit
    alpha, with a smaller subset in the C-terminal domain - initiate the
    molecular cascade underlying COPA syndrome. The disease behaves as a
    dominant interferonopathy with incomplete clinical penetrance.
  gene:
    preferred_term: COPA
    term:
      id: hgnc:2230
      label: COPA
  downstream:
