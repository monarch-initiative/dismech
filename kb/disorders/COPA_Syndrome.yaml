genetic:
- name: COPA
  gene_term:
    preferred_term: COPA
    term:
      id: hgnc:2230
      label: COPA
  association: Causative
  relationship_type: CAUSATIVE
  presence: PRESENT
  inheritance:
  - name: Autosomal dominant
  notes: >
    Heterozygous pathogenic COPA variants are the cause of COPA syndrome.
    Classical disease variants are missense changes in the N-terminal WD40
    cargo-recognition domain (recurrent residues include Lys230, Arg233,
    Glu241, Asp243, and Val242), which impair binding of dilysine
    ER-retrieval cargo. A second variant class affects the C-terminal
    domain (e.g., p.Cys1013Ser, p.Arg1058Cys, p.Arg1142X) and disrupts COPI
    integrity, producing a clinically similar but mechanistically distinct
    phenotype.
  evidence:
  - reference: PMID:25894502
    reference_title: "COPA mutations impair ER-Golgi transport and cause hereditary autoimmune-mediated lung disease and arthritis."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "We identified four unique deleterious variants in the COPA gene (encoding coatomer subunit α) affecting the same functional domain."
    explanation: Original family-based genetic study establishes COPA as the causative disease gene with WD40 domain variants.
  - reference: PMID:38175705
    reference_title: "Heterozygous mutations in the C-terminal domain of COPA underlie a complex autoinflammatory syndrome."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "We described 3 heterozygous mutations in the C-terminal domain (CTD) of COPA (p.C1013S, p.R1058C, and p.R1142X) in 6 children from 3 unrelated families with a similar syndrome of autoinflammation and autoimmunity."
    explanation: Delafontaine et al. expand the COPA mutational spectrum to include CTD variants.
- name: STING1 HAQ protective modifier (non-causal)
  gene_term:
    preferred_term: STING1
    term:
      id: hgnc:27962
      label: STING1
  association: Non-causal protective haplotype that prevents clinical penetrance
  relationship_type: PROTECTIVE
  presence: PRESENT
  notes: >
    STING1 is not a causal COPA syndrome gene. The common HAQ STING haplotype
    (R71H/G230A/R293Q in STING1) is represented here only as a dominant
    protective modifier: when co-inherited with a pathogenic COPA variant, HAQ
    STING dampens STING signalling and provides complete clinical protection.
    It accounts for much of the ~15-20% nonpenetrance observed in COPA syndrome
    families and motivates STING-directed gene therapy strategies.
  evidence:
  - reference: PMID:40014299
    reference_title: "The common HAQ STING allele prevents clinical penetrance of COPA syndrome."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "We show that the common HAQ STING allele mediates complete clinical protection."
    explanation: Co-segregation analysis of 35 COPA variant carriers establishes HAQ STING as a dominant clinical modifier.
  - reference: PMID:40014299
    reference_title: "The common HAQ STING allele prevents clinical penetrance of COPA syndrome."
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: "we found that HAQ STING acts dominantly to dampen COPA-dependent STING signaling."
    explanation: Cellular experiments confirm the dominant suppressive mechanism of HAQ STING on COPA-dependent STING signalling.
inheritance:
