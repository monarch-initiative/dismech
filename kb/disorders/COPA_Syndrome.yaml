    reference_title: "COPA mutations impair ER-Golgi transport and cause hereditary autoimmune-mediated lung disease and arthritis."
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: "COPA variants impair binding to proteins targeted for retrograde Golgi-to-ER transport."
    explanation: Watkin et al. show direct loss of cargo binding by mutant COPA in vitro.
  - reference: PMID:32725126
    reference_title: "A defect in COPI-mediated transport of STING causes immune dysregulation in COPA syndrome."
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: "SURF4 is an adapter molecule that facilitates COPA-mediated retrieval of STING at the Golgi."
    explanation: Deng et al. identify SURF4 as the adapter that physically links COPA to STING during retrograde retrieval, defining the proximal cargo-selection defect.
- name: Impaired Golgi-to-ER protein retrieval
  description: >
    Loss of COPI-mediated cargo selection compromises retrograde retrieval
    of client proteins, including STING, from the Golgi to the endoplasmic
    reticulum and perturbs ER-Golgi homeostasis. CTD variants also disrupt
    anterograde ER-to-Golgi transport.
  biological_processes:
  - preferred_term: retrograde Golgi-to-ER transport
    term:
      id: GO:0006890
      label: retrograde vesicle-mediated transport, Golgi to endoplasmic reticulum
    modifier: ABNORMAL
  downstream:
