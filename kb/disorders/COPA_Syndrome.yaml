  evidence:
  - reference: PMID:32725128
    reference_title: "Mutations in COPA lead to abnormal trafficking of STING to the Golgi and interferon signaling."
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: "mutant COPA was associated with an accumulation of ER-resident STING at the Golgi."
    explanation: Experimental evidence links COPA dysfunction directly to aberrant STING localization.
  - reference: PMID:32725126
    reference_title: "A defect in COPI-mediated transport of STING causes immune dysregulation in COPA syndrome."
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: "We show that a defect in COPI transport causes ligand-independent activation of STING."
    explanation: Deng et al. demonstrate that the trafficking failure itself is sufficient to activate STING in a ligand-independent manner.
  - reference: PMID:33982886
    reference_title: "Augmentation of Stimulator of Interferon Genes-Induced Type I Interferon Production in COPA Syndrome."
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: "In CopaV242G/+ dendritic cells, the STING pathway was not constitutively activated but was hyperactivated upon stimulation, leading to increased type I IFN production."
    explanation: Kato et al. show that even when COPA-mutant immune cells are not constitutively activated, STING signalling is hyperresponsive to ligand, providing a second mode of pathway dysregulation.
- name: ER stress and unfolded protein response
  description: >
    Disturbed intracellular trafficking accumulates misfolded cargo and
    activates the unfolded protein response. ER stress contributes to
    proinflammatory cytokine output, NF-kappaB activation, and TH17
    polarisation, and is genetically conserved in C. elegans copa-1 disease
    models.
  biological_processes:
  - preferred_term: response to endoplasmic reticulum stress
    term:
      id: GO:0034976
      label: response to endoplasmic reticulum stress
    modifier: INCREASED
  - preferred_term: ER unfolded protein response
    term:
      id: GO:0030968
      label: endoplasmic reticulum unfolded protein response
    modifier: INCREASED
  downstream:
  - target: NF-kappaB-driven proinflammatory signaling
    causal_link_type: DIRECT
  - target: TH17-skewed adaptive immune dysregulation
    causal_link_type: INDIRECT_KNOWN_INTERMEDIATES
    intermediate_mechanisms:
    - ER stress-induced IL-1beta and IL-6 cytokine output priming TH17 differentiation
  evidence:
  - reference: PMID:25894502
    reference_title: "COPA mutations impair ER-Golgi transport and cause hereditary autoimmune-mediated lung disease and arthritis."
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: "expression of mutant COPA results in ER stress and the upregulation of cytokines priming for a T helper type 17 (TH17) response."
    explanation: Watkin et al. directly link mutant COPA to ER stress and TH17-priming cytokines.
  - reference: PMID:36748043
    reference_title: "copa-1 mutants experience heightened endoplasmic reticulum stress sensitivity in a C. elegans COPA Syndrome model."
    supports: SUPPORT
    evidence_source: MODEL_ORGANISM
    snippet: "these animals demonstrate an increased ER stress sensitivity."
    explanation: A C. elegans copa-1 patient-allele model recapitulates ER stress sensitivity, supporting evolutionary conservation of this branch of the cascade.
  - reference: PMID:38175705
    reference_title: "Heterozygous mutations in the C-terminal domain of COPA underlie a complex autoinflammatory syndrome."
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: "We showed that CTD COPA mutations induce an activation of ER stress and NF-κB signaling in patient-derived primary cell lines."
    explanation: Delafontaine et al. directly couple ER stress to NF-kappaB activation in CTD variant cells.
- name: Constitutive type I interferon signaling
  description: >
    Golgi-retained STING drives persistent cGAS/STING-dependent type I
    interferon pathway activation through TBK1-IRF3 signalling and
    downstream JAK-STAT amplification, producing the elevated IFN-alpha and
    interferon-stimulated gene (ISG) signature seen in symptomatic
    patients. JAK inhibition is the principal mechanism-targeted therapy.
  biological_processes:
  - preferred_term: type I interferon-mediated signaling pathway
    term:
      id: GO:0060337
      label: type I interferon-mediated signaling pathway
    modifier: INCREASED
  - preferred_term: JAK-STAT signaling
    term:
      id: GO:0007259
      label: cell surface receptor signaling pathway via JAK-STAT
    modifier: INCREASED
  downstream:
  - target: TH17-skewed adaptive immune dysregulation
    causal_link_type: DIRECT
  - target: Autoimmune end-organ inflammation
    causal_link_type: INDIRECT_KNOWN_INTERMEDIATES
    intermediate_mechanisms:
    - ISG-driven endothelial and epithelial activation
    - Autoantibody-mediated tissue injury
  - target: Interstitial lung disease
    causal_link_type: INDIRECT_KNOWN_INTERMEDIATES
    intermediate_mechanisms:
    - STING-dependent type I interferon signaling in lung tissue
  - target: Diffuse alveolar hemorrhage
    causal_link_type: INDIRECT_KNOWN_INTERMEDIATES
    intermediate_mechanisms:
    - Autoimmune pulmonary capillaritis and alveolar hemorrhage
  evidence:
  - reference: PMID:32725128
    reference_title: "Mutations in COPA lead to abnormal trafficking of STING to the Golgi and interferon signaling."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "We observed elevated levels of ISGs and IFN-α in blood of symptomatic COPA patients."
    explanation: Patient blood profiling demonstrates the interferon signature expected from constitutive STING activation.
  - reference: PMID:32725126
    reference_title: "A defect in COPI-mediated transport of STING causes immune dysregulation in COPA syndrome."
    supports: SUPPORT
    evidence_source: MODEL_ORGANISM
    snippet: "Activated STING stimulates type I interferon-driven inflammation in CopaE241K/+ mice that is rescued in STING-deficient animals."
    explanation: STING knockout rescues the IFN-driven inflammatory phenotype in CopaE241K/+ mice, formally placing STING downstream of mutant COPA in the disease cascade.
  - reference: PMID:38175705
    reference_title: "Heterozygous mutations in the C-terminal domain of COPA underlie a complex autoinflammatory syndrome."
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: "The disturbed intracellular trafficking resulted in a cGAS/STING-dependent upregulation of the type I IFN signaling in patients and patient-derived cell lines"
    explanation: CTD variant cells show that the IFN signature is cGAS/STING-dependent, generalising the mechanism beyond WD40 variants.
- name: NF-kappaB-driven proinflammatory signaling
  description: >
    Sustained ER stress and Golgi-localised STING signalling activate
    canonical NF-kappaB and induce IL-1beta, IL-6, and other proinflammatory
    cytokines that amplify autoinflammation. NF-kappaB activation is most
    prominently demonstrated in CTD variant cells.
  biological_processes:
  - preferred_term: canonical NF-kappaB signal transduction
    term:
      id: GO:0007249
      label: canonical NF-kappaB signal transduction
    modifier: INCREASED
  downstream:
  - target: TH17-skewed adaptive immune dysregulation
    causal_link_type: INDIRECT_KNOWN_INTERMEDIATES
    intermediate_mechanisms:
    - IL-6 / IL-1beta-driven TH17 polarisation
  - target: Arthritis
    causal_link_type: INDIRECT_KNOWN_INTERMEDIATES
    intermediate_mechanisms:
    - Proinflammatory cytokine activation of synovial inflammation
  - target: Autoimmune antibody positivity
    causal_link_type: INDIRECT_KNOWN_INTERMEDIATES
    intermediate_mechanisms:
    - NF-kappaB-supported inflammatory B-cell activation
  evidence:
  - reference: PMID:38175705
    reference_title: "Heterozygous mutations in the C-terminal domain of COPA underlie a complex autoinflammatory syndrome."
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: "CTD COPA mutations result in disease by increased ER stress, disturbed intracellular transport, and increased proinﬂammatory signaling."
    explanation: Delafontaine et al. summarise the CTD mechanism as ER stress plus increased proinflammatory (NF-kappaB) signalling.
  - reference: PMID:30804679
    reference_title: "Genetics of COPA syndrome."
    supports: SUPPORT
    evidence_source: OTHER
    snippet: "Immunological features involve autoantibody formation, elevated expression of IL-1β and IL-6, and increase in the number of Th17 cells."
    explanation: Kumrah et al. describe the elevated IL-1beta and IL-6 cytokine profile expected from NF-kappaB activation, linking it to TH17 expansion in patients.
- name: TH17-skewed adaptive immune dysregulation
  description: >
    Sustained type I interferon signalling, ER stress, and IL-6/IL-1beta
    output skew CD4+ T cells toward a TH17 fate, drive B-cell autoantibody
    production, and produce the autoimmune cytokine milieu underlying
    chronic injury in lung, joint, and kidney tissues.
  cell_types:
