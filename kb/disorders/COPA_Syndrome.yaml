- name: Immunosuppression for diffuse alveolar hemorrhage
  description: >
    Standard induction for severe alveolar hemorrhage uses systemic
    glucocorticoids combined with cyclophosphamide, with subsequent
    maintenance using mycophenolate mofetil or azathioprine. Evidence level:
    case series/observational standard care. Radiographic improvement is common
    but pulmonary function may continue to decline.
  treatment_term:
    preferred_term: pharmacotherapy
    term:
      id: MAXO:0000058
      label: pharmacotherapy
