  evidence:
  - reference: PMID:25894502
    reference_title: "COPA mutations impair ER-Golgi transport and cause hereditary autoimmune-mediated lung disease and arthritis."
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: "Patient-derived CD4(+) T cells also demonstrate significant skewing toward a TH17 phenotype that is implicated in autoimmunity."
    explanation: Patient-derived T-cell data provide direct evidence of TH17-biased adaptive immune activation in COPA syndrome.
  - reference: PMID:41395910
    reference_title: "Insights from a novel monogenic autoinflammatory disease: overview of a multicentric European cohort of 38 patients with COPA syndrome."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "All but 1 patient tested positive for autoantibodies, and increased interferon signalling was noted in all those tested."
    explanation: Large cohort data confirm the characteristic combination of autoantibody positivity and interferon activation in clinically affected patients.
- name: Autoimmune end-organ inflammation
  description: >
    Convergent type I interferon, NF-kappaB, and TH17/autoantibody output
    targets the lung (interstitial pneumonia, capillaritis, alveolar
    haemorrhage, lymphoid hyperplasia), the synovium (inflammatory
    arthritis), and the kidney (ANCA-associated, lupus-like or
    immune-complex glomerulonephritis), and is the proximate driver of the
    clinical phenotype.
  downstream:
  - target: Interstitial lung disease
    causal_link_type: DIRECT
  - target: Diffuse alveolar hemorrhage
    causal_link_type: DIRECT
  - target: Arthritis
    causal_link_type: DIRECT
  - target: Glomerulonephritis
    causal_link_type: DIRECT
  evidence:
  - reference: PMID:36746811
    reference_title: "Imaging findings of COPA Syndrome."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "The most prevalent imaging finding of COPA syndrome is diffuse lung disease related to early childhood-onset recurrent pulmonary hemorrhage and lymphoid hyperplasia that may progress to pulmonary fibrosis."
    explanation: Imaging cohort confirms that the dominant clinical manifestation is lung-targeted autoimmune injury, with progression to fibrosis.
  - reference: PMID:41932423
    reference_title: "Kidney Transplant Outcomes in Coatomer Protein Complex Subunit Alpha (COPA) Syndrome: Report of Five Patients."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Kidney involvement was heterogenous between patients (ANCA-associated vasculitis-like disease, lupus or immune-complex mediated glomerulonephritis or overlapping phenotypes), and all had advanced histological damage at clinical presentation."
    explanation: Renal histology in COPA syndrome shows multiple immune-mediated glomerulonephritis patterns consistent with autoimmune end-organ injury.
- name: HAQ STING dominant suppression of STING signalling
  description: >
    The common HAQ haplotype of STING1 (R71H/G230A/R293Q) dominantly
    dampens STING signalling. When co-inherited with a pathogenic COPA
    variant, HAQ STING fully prevents the constitutive STING activation
    that drives type I interferon signalling and provides complete clinical
    protection in carriers, accounting for much of the observed incomplete
    penetrance.
  genes:
  - preferred_term: STING1
    term:
      id: hgnc:27962
      label: STING1
  biological_processes:
  - preferred_term: cGAS/STING signaling pathway
    term:
      id: GO:0140896
      label: cGAS/STING signaling pathway
    modifier: DECREASED
  evidence:
  - reference: PMID:40014299
    reference_title: "The common HAQ STING allele prevents clinical penetrance of COPA syndrome."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "We show that the common HAQ STING allele mediates complete clinical protection."
    explanation: Simchoni et al. establish HAQ STING as a dominant clinical modifier in COPA syndrome.
  - reference: PMID:40014299
    reference_title: "The common HAQ STING allele prevents clinical penetrance of COPA syndrome."
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: "Expressing HAQ STING in patient cells rescued the molecular phenotype of COPA syndrome."
    explanation: Cellular rescue experiments confirm the molecular mechanism of HAQ STING-mediated protection and motivate STING-directed gene therapy.
phenotypes:
- name: Interstitial lung disease
  category: Respiratory
