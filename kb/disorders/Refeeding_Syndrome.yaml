differential_diagnoses:
- name: Alcoholic ketoacidosis
  disease_term:
    preferred_term: alcoholic ketoacidosis
    term:
      id: MONDO:0100160
      label: alcoholic ketoacidosis
  description: >-
    Acute metabolic derangement that can present with hypophosphatemia in high-risk
    settings and may overlap biochemically with refeeding syndrome.
  distinguishing_features:
  - Typically associated with heavy alcohol use and ketoacidosis rather than nutritional reintroduction.
  evidence:
  - reference: PMID:41146174
    reference_title: "Indications for the evaluation and supplementation of hypophosphatemia: an umbrella systematic review of reviews and guidelines."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Phosphate measurement to evaluate acute hypophosphatemia is advised in high-risk settings: refeeding syndrome, hyperglycemic hyperosmolar syndrome, alcoholic ketoacidosis, worsening COPD or asthma exacerbations."
    explanation: This identifies alcoholic ketoacidosis as a high-risk setting for acute hypophosphatemia.
- name: Hyperventilation-induced hypophosphatemia
  disease_term:
    preferred_term: hypophosphatemia
    term:
      id: MONDO:0000313
      label: hypophosphatemia
  description: >-
    Respiratory alkalosis from hyperventilation can cause intracellular
    phosphate shifting and severe hypophosphatemia, mimicking refeeding-related
    electrolyte disturbances.
  distinguishing_features:
  - Hyperventilation with respiratory alkalosis drives phosphate shifts rather than nutritional reintroduction.
  evidence:
  - reference: PMID:41281097
    reference_title: "Severe Hypophosphatemia Induced by Hyperventilation: A Case Report."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "One uncommon cause is hyperventilation-induced respiratory alkalosis, which promotes intracellular phosphate shifting and enhanced glycolysis, leading to depletion of serum phosphate."
    explanation: This case report links hyperventilation-induced respiratory alkalosis to severe hypophosphatemia.
- name: Thyrotoxic periodic paralysis
  disease_term:
    preferred_term: thyrotoxic periodic paralysis
    term:
      id: MONDO:0019201
      label: thyrotoxic periodic paralysis
  description: >-
    Thyrotoxic periodic paralysis can cause acute weakness with significant
    hypokalemia and may be confused with refeeding-related electrolyte shifts.
  distinguishing_features:
  - Occurs in the setting of thyrotoxicosis and paralysis with hypokalemia rather than refeeding.
  evidence:
  - reference: PMID:39896956
    reference_title: "A Rare Case of Thyrotoxic Periodic Paralysis in a Patient With Concomitant Methimazole-Induced Agranulocytosis."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Thyrotoxic periodic paralysis (TPP) is a rare condition causing weakness of the lower extremities associated with significant hypokalemia."
    explanation: This case report describes TPP with hypokalemia, supporting it as a differential in electrolyte-driven weakness.
