name: Papillary Thyroid Carcinoma
creation_date: '2026-04-12T05:10:03Z'
updated_date: '2026-04-28T20:00:00Z'
description: >-
  Papillary thyroid carcinoma is the most common differentiated thyroid cancer
  arising from thyroid follicular cells. It comprises the majority of thyroid
  malignancies and includes classical, follicular-patterned, and more aggressive
  variants such as tall cell carcinoma. Papillary thyroid carcinoma is typically
  driven by MAPK-pathway activating alterations including BRAF V600E, RET/PTC
  rearrangements, and RAS-family mutations, while additional events such as TERT
  promoter mutation and aberrant PI3K-PTEN-AKT signaling are associated with
  aggressive progression and radioactive iodine-refractory disease. Most cases
  have excellent disease-specific survival, but regional nodal metastasis and
  recurrence remain clinically important.
categories:
- Endocrine Cancer
- Differentiated Thyroid Cancer
parents:
- thyroid carcinoma
has_subtypes:
- name: Classical Papillary Thyroid Carcinoma
  description: >-
    Conventional papillary thyroid carcinoma with papillary architecture and the
    characteristic nuclear features used for diagnosis.
- name: Follicular Variant Papillary Thyroid Carcinoma
  description: >-
    Papillary thyroid carcinoma with predominantly follicular architecture and
    papillary-type nuclear features. Often aligns with a more RAS-like molecular
    profile than classical PTC.
- name: Tall Cell Variant Papillary Thyroid Carcinoma
  description: >-
    Aggressive histologic variant enriched for BRAF V600E, extrathyroidal
    extension, and recurrence risk.
pathophysiology:
- name: Driver Alterations in Thyroid Follicular Cells
  description: >-
    Early oncogenic alterations in papillary thyroid carcinoma commonly include
    BRAF V600E, RET/PTC rearrangements, and RAS-family mutations. These driver
    events arise in thyroid follicular cells and establish the genotype-phenotype
    patterns that distinguish conventional papillary tumors from more
    follicular-patterned neoplasms.
  cell_types:
  - preferred_term: thyroid follicular cell
    term:
      id: CL:0002258
      label: thyroid follicular cell
  locations:
  - preferred_term: thyroid gland
    term:
      id: UBERON:0002046
      label: thyroid gland
  evidence:
  - reference: PMID:39502057
    reference_title: "[Correlations of Ultrasound Features With Gene Mutations and Pathologic Subtypes in Papillary Thyroid Carcinoma]."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "The common gene mutations in PTC include BRAF V600E,RET/PTC rearrangement,and RAS mutations."
    explanation: Supports the major early driver classes emphasized in papillary thyroid carcinoma.
  downstream:
  - target: MAPK Pathway Hyperactivation
    description: Driver mutations and fusions converge on persistent mitogenic signaling
- name: MAPK Pathway Hyperactivation
  description: >-
    Driver alterations converge on chronic MAPK signaling, which promotes thyroid
    follicular cell proliferation and malignant transformation. BRAF-like tumors
    especially depend on this pathway and often show loss of thyroid
    differentiation programs relevant to iodine handling.
  biological_processes:
  - preferred_term: MAPK cascade
    modifier: INCREASED
    term:
      id: GO:0000165
      label: MAPK cascade
  - preferred_term: cell population proliferation
    modifier: INCREASED
    term:
      id: GO:0008283
      label: cell population proliferation
  evidence:
  - reference: PMID:41175860
    reference_title: "Somatic genetic alterations in the development and progression in thyroid tumors of follicular cells."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "In most tumors of follicular cell origin, the primary molecular events are RAS or RAS-like (follicular-patterned tumors) and BRAF p.V600E or BRAF V600E-like (conventional papillary carcinomas) alterations."
    explanation: Supports the dominant BRAF-like and RAS-like molecular programs that organize papillary thyroid carcinoma biology.
  - reference: PMID:41368991
    reference_title: "BRAF V600E in thyroid cancer: navigating prognostic uncertainty and therapeutic opportunity."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "BRAF V600E, the most common oncogenic driver in papillary thyroid carcinoma, activates the MAPK pathway and suppresses genes involved in iodine metabolism and differentiation."
    explanation: Supports the role of BRAF-driven MAPK activation and reduced differentiation in a major papillary thyroid carcinoma subset.
  downstream:
  - target: Aggressive Progression and Reduced Differentiation
    description: Additional oncogenic hits superimposed on driver signaling promote dedifferentiation and treatment resistance
- name: Aggressive Progression and Reduced Differentiation
  description: >-
    A subset of papillary thyroid carcinomas acquires additional alterations such
    as TERT promoter mutation, TP53 disruption, and aberrant PI3K-PTEN-AKT
    signaling. These changes are associated with progression toward more
    aggressive, less-differentiated, and radioiodine-refractory disease.
  biological_processes:
  - preferred_term: phosphatidylinositol 3-kinase/protein kinase B signal transduction
    modifier: INCREASED
    term:
      id: GO:0043491
      label: phosphatidylinositol 3-kinase/protein kinase B signal transduction
  - preferred_term: cell differentiation
    modifier: DECREASED
    term:
      id: GO:0030154
      label: cell differentiation
  evidence:
  - reference: PMID:41175860
    reference_title: "Somatic genetic alterations in the development and progression in thyroid tumors of follicular cells."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Progression of thyroid tumors to advanced and less-differentiated carcinomas requires additional oncogenic alterations, including TP53 and TERT promoter mutation, and aberrant PI3K-PTEN-AKT signaling."
    explanation: Supports the progression model linking additional alterations to aggressive and less-differentiated thyroid carcinoma states.
histopathology:
- name: Papillary Thyroid Carcinoma
  finding_term:
    preferred_term: Thyroid Gland Papillary Carcinoma
    term:
      id: NCIT:C4035
      label: Thyroid Gland Papillary Carcinoma
  frequency: VERY_FREQUENT
  description: >-
    Papillary thyroid carcinoma is the dominant malignant thyroid histology and
    includes classical, follicular variant, tall cell, and other less common
    morphologic forms.
  evidence:
  - reference: PMID:21221869
    reference_title: "Papillary thyroid carcinoma variants."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Papillary thyroid carcinomas are the most common thyroid cancers and constitute more than 70% of thyroid malignancies."
    explanation: Supports papillary thyroid carcinoma as the predominant malignant thyroid histology.
phenotypes:
- category: Endocrine
  name: Thyroid Nodule
  diagnostic: true
  description: >-
    Most patients present with a thyroid nodule detected clinically or on
    imaging.
  phenotype_term:
    preferred_term: Thyroid nodule
    term:
      id: HP:0025388
      label: Thyroid nodule
- category: Systemic
  name: Cervical Lymphadenopathy
  description: >-
    Regional cervical lymph node involvement is common and may be present at
    diagnosis, particularly in younger patients and in tumors with higher-risk
    molecular or histologic features.
  phenotype_term:
    preferred_term: Lymphadenopathy
    term:
      id: HP:0002716
      label: Lymphadenopathy
biochemical:
- name: Thyroglobulin
  notes: >-
    Thyroglobulin remains a practical diagnostic and surveillance biomarker in
    differentiated thyroid cancer. Immunohistochemical staining is especially
    helpful in confirming papillary thyroid carcinoma at metastatic sites, and
    serum thyroglobulin is widely used for postoperative monitoring.
  evidence:
  - reference: PMID:21221869
    reference_title: "Papillary thyroid carcinoma variants."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Immunohistochemical staining with TTF-1 and thyroglobulin is very useful in confirming the diagnosis of papillary thyroid carcinoma especially in metastatic sites."
    explanation: Supports the diagnostic utility of thyroglobulin in papillary thyroid carcinoma, especially when evaluating metastatic tissue.
- name: Molecular Driver Testing
  notes: >-
    Molecular testing for BRAF V600E, RET/PTC rearrangements, and RAS-family
    mutations can refine prognostic assessment, clarify subtype biology, and
    guide targeted therapy discussions in advanced disease.
  evidence:
  - reference: PMID:39502057
    reference_title: "[Correlations of Ultrasound Features With Gene Mutations and Pathologic Subtypes in Papillary Thyroid Carcinoma]."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "The prognosis of papillary thyroid carcinoma (PTC) is highly dependent on gene mutations and pathologic features."
    explanation: Supports routine clinical relevance of molecular and pathologic stratification in papillary thyroid carcinoma.
genetic:
- name: BRAF
  association: Somatic Activating Mutations
  notes: >-
    BRAF V600E is the most common single driver alteration in conventional
    papillary thyroid carcinoma. It activates MAPK signaling and is associated
    with higher risk of nodal metastasis and recurrence in aggregate analyses.
  evidence:
  - reference: PMID:41368991
    reference_title: "BRAF V600E in thyroid cancer: navigating prognostic uncertainty and therapeutic opportunity."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "BRAF V600E, the most common oncogenic driver in papillary thyroid carcinoma, activates the MAPK pathway and suppresses genes involved in iodine metabolism and differentiation."
    explanation: Supports BRAF V600E as the dominant papillary thyroid carcinoma driver and a mechanism for MAPK activation.
  - reference: PMID:41419184
    reference_title: "Prognostic Value of BRAF V600E Mutation in Papillary Thyroid Carcinoma: A Meta-Analysis of Nodal Involvement, Distant Metastases, Recurrence, and Mortality."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Overall, these findings confirm that BRAF V600E mutation is associated with an increased risk of nodal metastasis and recurrence in papillary thyroid carcinoma."
    explanation: Supports the clinical association between BRAF V600E and adverse recurrence-related features.
- name: RET
  association: Somatic Gene Fusions
  notes: >-
    RET/PTC rearrangements define an important papillary thyroid carcinoma subset,
    especially in radiation-associated disease, and converge on the same
    mitogenic pathways as other canonical drivers.
  evidence:
  - reference: PMID:39502057
    reference_title: "[Correlations of Ultrasound Features With Gene Mutations and Pathologic Subtypes in Papillary Thyroid Carcinoma]."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "The common gene mutations in PTC include BRAF V600E,RET/PTC rearrangement,and RAS mutations."
    explanation: Supports RET/PTC rearrangements as one of the major recurrent driver classes in papillary thyroid carcinoma.
- name: RAS family genes
  association: Somatic Activating Mutations
  notes: >-
    RAS-family mutations are common in more follicular-patterned papillary thyroid
    carcinoma and related differentiated thyroid neoplasms, reflecting a RAS-like
    signaling program distinct from classical BRAF-like tumors.
  evidence:
  - reference: PMID:39502057
    reference_title: "[Correlations of Ultrasound Features With Gene Mutations and Pathologic Subtypes in Papillary Thyroid Carcinoma]."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "The common gene mutations in PTC include BRAF V600E,RET/PTC rearrangement,and RAS mutations."
    explanation: Supports RAS-family alterations as recurrent papillary thyroid carcinoma drivers.
  - reference: PMID:41175860
    reference_title: "Somatic genetic alterations in the development and progression in thyroid tumors of follicular cells."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "In most tumors of follicular cell origin, the primary molecular events are RAS or RAS-like (follicular-patterned tumors) and BRAF p.V600E or BRAF V600E-like (conventional papillary carcinomas) alterations."
    explanation: Supports the distinction between RAS-like follicular-patterned tumors and BRAF-like conventional papillary carcinomas.
- name: TERT
  association: Somatic Promoter Mutations
  notes: >-
    TERT promoter mutations are progression-associated events linked to aggressive,
    less-differentiated, and radioiodine-refractory thyroid carcinoma states.
  evidence:
  - reference: PMID:41175860
    reference_title: "Somatic genetic alterations in the development and progression in thyroid tumors of follicular cells."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Progression of thyroid tumors to advanced and less-differentiated carcinomas requires additional oncogenic alterations, including TP53 and TERT promoter mutation, and aberrant PI3K-PTEN-AKT signaling."
    explanation: Supports TERT promoter mutation as a late progression event in aggressive thyroid carcinoma biology.
environmental:
- name: Ionizing Radiation Exposure
  notes: >-
    Ionizing radiation is the strongest established environmental risk factor for
    papillary thyroid carcinoma, especially after childhood or adolescent exposure.
  evidence:
  - reference: PMID:21221869
    reference_title: "Papillary thyroid carcinoma variants."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "The most common etiologic factor is radiation"
    explanation: Supports radiation exposure as the leading established environmental risk factor for papillary thyroid carcinoma.
treatments:
- name: Thyroidectomy
  description: >-
    Surgical resection is the mainstay of treatment for localized papillary
    thyroid carcinoma.
  treatment_term:
    preferred_term: surgical procedure
    term:
      id: MAXO:0000004
      label: surgical procedure
- name: Radioiodine Therapy
  description: >-
    Radioactive iodine is used selectively after surgery for intermediate-risk,
    high-risk, or metastatic differentiated thyroid cancer.
  treatment_term:
    preferred_term: radiation therapy
    term:
      id: MAXO:0000014
      label: radiation therapy
- name: Mutation-Directed Targeted Therapy
  description: >-
    Advanced papillary thyroid carcinoma with actionable driver alterations may
    be treated with genotype-matched targeted therapy, including RET inhibitors
    for RET fusion-positive disease and BRAF-directed regimens in BRAF V600E-
    driven refractory tumors.
  treatment_term:
    preferred_term: targeted therapy
    term:
      id: NCIT:C93352
      label: Targeted Therapy
- name: Lenvatinib or Sorafenib
  description: >-
    Multi-kinase inhibitors are standard systemic options for progressive
    radioiodine-refractory differentiated thyroid cancer when surgery and
    radioiodine are no longer sufficient.
  treatment_term:
    preferred_term: targeted therapy
    term:
      id: NCIT:C93352
      label: Targeted Therapy
    therapeutic_agent:
    - preferred_term: lenvatinib
      term:
        id: CHEBI:85994
        label: lenvatinib
    - preferred_term: sorafenib
      term:
        id: CHEBI:50924
        label: sorafenib
