- name: Neuroglial Lysosomal Dysfunction and Neurodegeneration
  description: >-
    Sulfatide and glycosaminoglycan storage disrupts central and peripheral
    nervous-system cells, producing leukodystrophy-like disease, developmental
    impairment, regression, seizures, hearing/vision loss, and peripheral nerve
    involvement.
  locations:
  - preferred_term: lysosome
    term:
      id: GO:0005764
      label: lysosome
  evidence:
  - reference: PMID:32414121
    supports: SUPPORT
    evidence_source: OTHER
    snippet: "This abnormal storage results in lysosomal dysfunction, impacting several cellular processes including autophagy"
    explanation: Review supports lysosomal dysfunction downstream of storage.
  - reference: PMID:32414121
    supports: SUPPORT
    evidence_source: MODEL_ORGANISM
    snippet: "Astrocyte specific knock-out of SUMF1 in a Cre/Lox MSD mouse model revealed lysosomal storage of substrates and autophagy substrates impairing astrocyte function. This led to neuronal loss"
    explanation: Model-organism evidence summarized by the review connects SUMF1 loss, astrocyte dysfunction, and neuronal loss.
  - reference: PMID:32620537
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "MSD is an ultra-rare multisystem disorder with mainly neurologic, hearing and skin involvements."
    explanation: Systematic clinical survey supports neurologic involvement as a main disease domain.
