name: Atelosteogenesis Type III
creation_date: '2026-03-04T07:57:38Z'
updated_date: '2026-03-04T07:57:38Z'
category: Mendelian
description: >
  Atelosteogenesis Type III is a skeletal dysplasia associated with pathogenic variation in
  FLNB, causing abnormal cartilage and growth plate biology with disturbed
  endochondral ossification and disproportionate skeletal growth.
disease_term:
  preferred_term: atelosteogenesis type III
  term:
    id: MONDO:0007168
    label: atelosteogenesis type III
parents:
- Skeletal Dysplasia
inheritance:
- name: Autosomal Dominant
  description: >
    Atelosteogenesis Type III is reported with a autosomal dominant inheritance pattern in
    association with pathogenic variation affecting FLNB.
  evidence:
  - reference: PMID:14991055
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Mutations in the gene encoding filamin B disrupt vertebral segmentation, joint formation and skeletogenesis.
    explanation: >-
      This reference supports inheritance and core disease characterization for
      Atelosteogenesis Type III.
pathophysiology:
- name: Cartilage Matrix and Growth Plate Dysfunction
  description: >
    Pathogenic variation in FLNB perturbs cartilage matrix homeostasis and
    growth plate organization, disrupting endochondral ossification.
