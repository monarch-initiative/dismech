- name: Liver transplantation
  description: 'Liver transplantation is the only established curative intervention at the metabolic level for CTLN1. It provides metabolic stability by restoring hepatic ASS1 activity, preventing further hyperammonemic events, and allowing liberalization of protein intake. Five-year patient survival exceeds 90%. However, pre-existing neurocognitive impairment does not improve after transplantation.

    '
