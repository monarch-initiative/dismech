  inheritance:
  - name: Autosomal recessive
    evidence:
    - reference: PMID:37485339
      reference_title: "Functional identification of two novel variants and a hypomorphic variant in ASS1 from patients with Citrullinemia type I."
      supports: SUPPORT
      evidence_source: HUMAN_CLINICAL
      snippet: Citrullinemia type I (CTLN1) is a rare autosomal recessive inborn error of the urea cycle caused by mutations in the gene encoding the arginosuccinate synthetase (ASS1) enzyme.
      explanation: Directly states autosomal recessive inheritance for CTLN1.
  variants:
  - name: ASS1 - p.P217del (c.649-651del)
    description: 'Novel in-frame deletion that results in decreased ASS1 expression at both protein and transcription levels, with highly significant reduction in enzyme activity.

      '
  - name: ASS1 - p.Q350* (c.1048C>T)
    description: 'Novel nonsense variant producing a truncated ASS1 protein with marked decrease in expression at the protein level and highly significant reduction in enzyme activity.

      '
    evidence:
    - reference: PMID:37485339
      reference_title: "Functional identification of two novel variants and a hypomorphic variant in ASS1 from patients with Citrullinemia type I."
      supports: SUPPORT
      evidence_source: HUMAN_CLINICAL
      snippet: The other novel variant, c.1048C>T (p.Q350*), showed a marked decrease in expression at the protein level, with the formation of truncated proteins but an increased transcription.
      explanation: Functional characterization of a novel truncating ASS1 variant.
  - name: ASS1 - p.Arg265Cys (rs148918985)
    description: 'Rare pathogenic coding variant leading to ASS1 enzyme deficiency. Found in patients with late-onset citrullinemia type I and associated with hyperammonemia-related dementia.

      '
    evidence:
    - reference: PMID:38927689
      reference_title: "Rare Pathogenic Variants in Pooled Whole-Exome Sequencing Data Suggest Hyperammonemia as a Possible Cause of Dementia Not Classified as Alzheimer's Disease or Frontotemporal Dementia."
      supports: SUPPORT
      evidence_source: HUMAN_CLINICAL
      snippet: The p.Arg265Cys variant leads to enzyme deficiency, whereas p.Gly390Arg renders the enzyme inactive.
      explanation: Demonstrates that p.Arg265Cys causes partial enzyme deficiency consistent with late-onset disease.
  - name: ASS1 - p.Gly390Arg (rs121908641)
    description: 'Rare pathogenic coding variant that renders ASS1 enzyme completely inactive. In compound heterozygosity can produce late-onset citrullinemia type I.

      '
    evidence:
    - reference: PMID:38927689
      reference_title: "Rare Pathogenic Variants in Pooled Whole-Exome Sequencing Data Suggest Hyperammonemia as a Possible Cause of Dementia Not Classified as Alzheimer's Disease or Frontotemporal Dementia."
      supports: SUPPORT
      evidence_source: HUMAN_CLINICAL
      snippet: The p.Arg265Cys variant leads to enzyme deficiency, whereas p.Gly390Arg renders the enzyme inactive.
      explanation: Demonstrates that p.Gly390Arg abolishes enzyme activity.
  - name: ASS1 - c.-4C>T (5'UTR hypomorphic variant)
    description: 'A non-coding variant in the 5''UTR region of ASS1 that reduces expression at both protein and transcription levels but does not directly affect enzyme activity. Represents a hypomorphic variant that may modify disease severity.

      '
  features: 'Over 100 pathogenic variants in ASS1 have been documented. The clinical spectrum from classic neonatal-onset to asymptomatic is determined by residual enzyme activity. Variants affecting the citrulline-binding site, the C-terminal oligomerization helix required for tetramer formation, or causing premature truncation typically produce severe disease, while hypomorphic variants allow milder presentations. Nonsense mutations account for approximately 7-10% of ASS1 variants.

    '
  evidence:
  - reference: PMID:39649700
    reference_title: "Visualization of argininosuccinate synthetase by in silico analysis: novel insights into citrullinemia type I disorders."
    supports: SUPPORT
    evidence_source: COMPUTATIONAL
    snippet: the C- terminal helix domain of the mutant protein structure, which was an important structure for ASS1 protein to form protein tetramers, was indeed more unstable than that of the wild-type protein structure.
    explanation: Structural analysis demonstrating how specific variants disrupt ASS1 tetramer stability.
  - reference: PMID:37485339
    reference_title: "Functional identification of two novel variants and a hypomorphic variant in ASS1 from patients with Citrullinemia type I."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: Both c.649_651del (p.P217del) and c.1048C>T (p.Q350*) showed a highly significant reduction in enzyme activity, while c.-4C>T had no effect.
    explanation: Functional studies demonstrating variable residual activity across different ASS1 variant types.
  - reference: PMID:39449289
    reference_title: "Exploring RNA therapeutics for urea cycle disorders."
    supports: SUPPORT
    evidence_source: OTHER
    snippet: LNP-formulated mRNA therapy has been assayed preclinically for citrullinemia type I (CTLN1), adolescent and adult citrin deficiency, argininosuccinic aciduria, arginase deficiency and ornithine transcarbamylase deficiency
    explanation: Review noting nonsense mutations in approximately 7-10% of ASS1, relevant for therapeutic targeting.
  - reference: CGGV:assertion_5dc5ef32-81ca-478e-be42-436da3416e4d-2018-12-27T170000.000Z
    reference_title: "ASS1 / citrullinemia type I (Definitive)"
    supports: SUPPORT
    evidence_source: OTHER
    snippet: "ASS1 | HGNC:758 | citrullinemia type I | MONDO:0008988 | AR | Definitive"
    explanation: ClinGen classifies the ASS1-citrullinemia type I gene-disease relationship as definitive with autosomal recessive inheritance.
