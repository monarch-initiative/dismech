    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: LTx enabled metabolic stability by prevention of further hyperammonemic events after transplantation and was associated with a more favorable growth outcome compared with individuals remaining under MM.
    explanation: Severity-adjusted analysis demonstrating metabolic stability and growth benefit after liver transplant in UCDs.
  - reference: PMID:40218931
