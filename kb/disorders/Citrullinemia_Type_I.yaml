- name: Genotype-to-phenotype correlation through residual ASS1 activity
  description: 'The severity spectrum of CTLN1 (classic neonatal, late-onset, pregnancy-triggered, asymptomatic) is determined by residual ASS1 enzyme activity. Pathogenic variants affect the citrulline-binding site, oligomerization helix stability, protein expression levels, or cause premature truncation. Variants with less than 2% of wild-type activity typically produce classic neonatal presentations, while hypomorphic variants may allow milder or late-onset disease.

    '
