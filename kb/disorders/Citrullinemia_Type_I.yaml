- name: Hyperammonemic neurotoxicity via astrocyte glutamine-osmotic injury
  description: 'During hyperammonemic crises, systemic ammonia crosses into the CNS where astrocytes detoxify ammonia by converting it to glutamine. Rapid intracellular glutamine accumulation increases osmolarity, causing astrocyte swelling, inflammatory cascades, and cerebral edema. This mechanism connects the hepatic metabolic defect to acute brain pathology including lethargy, seizures, increased intracranial pressure, and coma.

    '
