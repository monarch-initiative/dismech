name: GUCY2D-Related Retinopathy
creation_date: "2026-06-25T08:50:00Z"
category: Mendelian
description: >-
  GUCY2D-related retinopathy is an inherited retinal disease caused by pathogenic
  variants in GUCY2D, encoding retinal guanylate cyclase-1 (RETGC-1), the enzyme
  responsible for cGMP synthesis in photoreceptor outer segments. RETGC-1 is essential
  for phototransduction recovery: after light activation triggers cGMP hydrolysis,
  RETGC-1 resynthesizes cGMP to reopen cyclic nucleotide-gated (CNG) channels and
  restore the photoreceptor dark current. Biallelic loss-of-function variants cause
  autosomal recessive Leber congenital amaurosis type 1 (LCA1/EOSRD), a severe
  congenital retinal dystrophy affecting 6-21% of all LCA cases. Heterozygous
  gain-of-function variants — predominantly at codon 838 — cause autosomal dominant
  cone-rod dystrophy type 6 (CORD6), accounting for 25-40% of dominant cone-rod
  dystrophy. The recessive form is notable for a characteristic structure-function
  dissociation: profound visual dysfunction from infancy despite relatively preserved
  photoreceptor structure on OCT, creating a therapeutic window for gene augmentation.
  The Phase I/II ATSN-101 clinical trial (NCT03920007) is the most advanced gene
  therapy program, targeting GUCY2D-LCA1 with AAV5-mediated GUCY2D replacement.
disease_term:
  preferred_term: GUCY2D-related recessive retinopathy
  term:
    id: MONDO:0100453
    label: GUCY2D-related recessive retinopathy
synonyms:
- Leber congenital amaurosis type 1
- LCA1
- GUCY2D-LCA
- GUCY2D-associated Leber congenital amaurosis
- LCA type 1
- early-onset severe retinal dystrophy GUCY2D
parents:
- Inherited Retinal Dystrophy
- Leber Congenital Amaurosis
notes: >-
  The recessive (LCA1/EOSRD) and dominant (CORD6/CACD1) forms of GUCY2D-related
  retinopathy have opposite molecular mechanisms: biallelic LOF variants cause
  absent cGMP synthesis (functional silence without immediate cell death), while
  heterozygous GOF variants cause excess cGMP and Ca2+ overload driving progressive
  cone-predominant degeneration. The parent MONDO term MONDO:0100454 (GUCY2D
  retinopathy) encompasses both forms. LCA1 epidemiology: GUCY2D variants account
  for 6-21% of all LCA cases. CORD6 epidemiology: GUCY2D variants account for
  25-40% of autosomal dominant cone-rod dystrophy. The dominant variant hotspot
  c.2513G>A (p.Arg838His) accounts for ~54% of CORD patients in the largest cohort.
has_subtypes:
- name: Dominant
  display_name: GUCY2D-Related Dominant Retinopathy (CORD6)
  subtype_term:
    preferred_term: GUCY2D-related dominant retinopathy
    term:
      id: MONDO:0100441
      label: GUCY2D-related dominant retinopathy
  description: >-
    Autosomal dominant cone-rod dystrophy (CORD6/CACD1) caused by heterozygous
    gain-of-function variants in GUCY2D. The dominant variant hotspot is at codon
    838 in exon 13: c.2513G>A (p.Arg838His) occurs in ~54% of CORD patients,
    with c.2512C>T (p.Arg838Cys) and c.2513G>C (p.Arg838Pro) also recurrent.
    These variants alter calcium-sensitivity of RETGC-1 regulation by guanylate
    cyclase activating proteins (GCAPs), rendering the enzyme constitutively
    hyperactive and producing excess cGMP, sustained CNG channel opening, Na+/Ca2+
    overload, and progressive cone-predominant photoreceptor apoptosis via PKG
    activation, calpain activation, and ER stress pathways. Disease presents in
    childhood or adolescence with progressive visual acuity loss, dyschromatopsia,
    photophobia, central scotoma, and progressive macular atrophy on OCT. ERG shows
    predominantly reduced cone responses with relative rod preservation early.
    Natural history studies document annual BCVA worsening of ~0.022 logMAR/year,
    with a 32% probability of blindness or severe visual impairment by age 40.

inheritance:
- name: Autosomal recessive
  inheritance_term:
    preferred_term: Autosomal recessive inheritance
    term:
      id: HP:0000007
      label: Autosomal recessive inheritance
  description: >-
    Biallelic loss-of-function variants in GUCY2D cause autosomal recessive
    GUCY2D-LCA1/EOSRD. Both parents of an affected child are obligate heterozygous
    carriers; each sibling has a 25% chance of being affected.
  evidence:
  - reference: DOI:10.3390/genes12081261
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Leber's congenital amaurosis (LCA), one of the most severe inherited retinal dystrophies, is typically associated with extremely early onset of visual loss, nystagmus, and amaurotic pupils, and is responsible for 20% of childhood blindness."
    explanation: >-
      Huang et al. describe LCA as an autosomal recessive inherited retinal dystrophy
      with severe congenital visual loss, consistent with the recessive GUCY2D-LCA form.
- name: Autosomal dominant
  inheritance_term:
    preferred_term: Autosomal dominant inheritance
    term:
      id: HP:0000006
      label: Autosomal dominant inheritance
  description: >-
    Heterozygous gain-of-function variants in GUCY2D cause autosomal dominant
    CORD6/CACD1. Each child of an affected parent has a 50% chance of inheriting
    the pathogenic variant.
  evidence:
  - reference: PMID:35656327
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Mutations of six genes (PRPH2, GUCA1A, GUCY2D, CDHR1, ABCA4, and TTLL5) are implicated in the monogenic dominant inheritance of CACD."
    explanation: >-
      Kazmierczak de Camargo et al. confirm GUCY2D as a causative gene for dominant
      inheritance CACD (central areolar choroidal dystrophy), part of the GUCY2D
      dominant spectrum.

pathophysiology:
- name: RETGC-1 Deficiency
  description: >-
    Biallelic loss-of-function variants in GUCY2D abolish or severely reduce the
    guanylyl cyclase activity of retinal guanylate cyclase-1 (RETGC-1), the enzyme
    responsible for cGMP synthesis in photoreceptor outer segments. RETGC-1 accounts
    for over 70% of cGMP production in photoreceptors and is expressed in both rod
    and cone outer segments. More than 248 pathogenic variants cause autosomal
    recessive LCA1/EOSRD; null alleles (frameshift, nonsense, splice-site) account
    for approximately 88% of LCA-causing alleles. Missense variants account for
    ~71% of all variant types. Notable recurrent variants include c.1694T>C
    (p.Phe565Ser) and c.2302C>T (p.Arg768Trp).
  gene:
    preferred_term: GUCY2D
    modifier: DECREASED
    term:
      id: hgnc:4689
      label: GUCY2D
  cell_types:
  - preferred_term: retinal rod cell
    term:
      id: CL:0000604
      label: retinal rod cell
  - preferred_term: retinal cone cell
    term:
      id: CL:0000573
      label: retinal cone cell
  biological_processes:
  - preferred_term: cGMP biosynthetic process
    modifier: DECREASED
    term:
      id: GO:0006182
      label: cGMP biosynthetic process
  evidence:
  - reference: PMID:38278208
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Leber congenital amaurosis/early-onset severe retinal dystrophy (GUCY2D, CEP290, CRB1, RDH12, RPE65, TULP1, AIPL1 and NMNAT1)"
    explanation: >-
      Georgiou et al. confirm GUCY2D as a primary causal gene for Leber congenital
      amaurosis / early-onset severe retinal dystrophy in this comprehensive inherited
      retinal disease review.
  - reference: DOI:10.1136/bjophthalmol-2020-318483
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Leber congenital amaurosis (LCA) is a severe congenital/early-onset retinal dystrophy."
    explanation: >-
      Daich Varela et al. review LCA/EOSRD management and confirm that GUCY2D is
      among the primary causative genes for this severe inherited retinal dystrophy.
  downstream:
  - target: Impaired Phototransduction Recovery
    description: >-
      Without RETGC-1 activity, cGMP cannot be regenerated after phototransduction,
      preventing CNG channel reopening and locking photoreceptors in a functionally
      silent state.

- name: Impaired Phototransduction Recovery
  description: >-
    Under normal conditions, RETGC-1 resynthesizes cGMP under GCAP-mediated calcium
    regulation after phototransduction, reopening CNG channels to restore the
    photoreceptor dark current. When RETGC-1 is absent or catalytically inactive,
    cGMP cannot be regenerated after light-induced hydrolysis by phosphodiesterase 6
    (PDE6). CNG channels fail to reopen and photoreceptors remain in a persistently
    hyperpolarized, functionally silent state. This produces profound visual dysfunction
    despite early structural preservation of photoreceptor outer segments — the
    hallmark structure-function dissociation of GUCY2D-LCA that makes it particularly
    amenable to gene augmentation.
  cell_types:
  - preferred_term: retinal rod cell
    term:
      id: CL:0000604
      label: retinal rod cell
  - preferred_term: retinal cone cell
    term:
      id: CL:0000573
      label: retinal cone cell
  biological_processes:
  - preferred_term: phototransduction
    modifier: DECREASED
    term:
      id: GO:0007602
      label: phototransduction
  evidence:
  - reference: DOI:10.3390/ijms241311200
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: "cGMP governs the cyclic nucleotide-gated (CNG) channels on the plasma membrane of the photoreceptor outer segments, thereby regulating membrane potential and signal transmission."
    explanation: >-
      Li et al. establish that cGMP governs CNG channel function on photoreceptor
      outer segments. When RETGC-1 is absent, cGMP cannot be regenerated and channels
      fail to reopen, causing the persistent functional silence characteristic of GUCY2D-LCA.
  downstream:
  - target: Rod Photoreceptor Apoptosis
    description: >-
      Prolonged photoreceptor dysfunction and cellular stress eventually drive
      progressive rod and cone photoreceptor degeneration, though the rate of
      structural degeneration is slower than the onset of functional deficit.

- name: Rod Photoreceptor Apoptosis
  conforms_to: "photoreceptor_degeneration#Rod Photoreceptor Apoptosis"
  description: >-
    Progressive rod and cone photoreceptor degeneration and apoptosis result from
    sustained phototransduction failure and downstream cellular stress. A key feature
    distinguishing GUCY2D-LCA from other LCA subtypes is structure-function
    dissociation: OCT imaging frequently reveals preserved ellipsoid zone (EZ) and
    outer nuclear layer (ONL) centrally despite profoundly reduced visual function,
    indicating photoreceptors remain anatomically intact for extended periods before
    irreversible degeneration. This preservation represents the therapeutic window
    for gene augmentation therapy. Dysregulated cGMP signaling drives downstream
    stress pathways including PKG activation, Ca2+ overload via CNG channel
    dysregulation, calpain activation, ER stress, and photoreceptor cell death.
  cell_types:
  - preferred_term: retinal rod cell
    term:
      id: CL:0000604
      label: retinal rod cell
  biological_processes:
  - preferred_term: apoptotic process
    modifier: INCREASED
    term:
      id: GO:0006915
      label: apoptotic process
  evidence:
  - reference: DOI:10.3390/ijms241311200
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: "The potential mechanisms underlying cGMP signaling-induced photoreceptor degeneration involve the activation of PKG and impaired Ca2+ homeostasis/Ca2+ overload, resulting from overactivation of the CNG channels, as well as the subsequent activation of the downstream cellular stress/death pathways."
    explanation: >-
      Li et al. delineate the downstream apoptotic pathways activated by dysregulated
      cGMP signaling, including PKG activation and Ca2+ overload through CNG channel
      dysregulation, driving photoreceptor degeneration.

phenotypes:
- category: Ophthalmological
  name: Severe visual impairment
  frequency: VERY_FREQUENT
  description: >-
    Profound visual impairment present from birth or early infancy in recessive
    GUCY2D-LCA1. Approximately 76% of patients are severely visually impaired
    (hand movements or worse); only ~24% achieve measurable Snellen visual acuity.
    Visual function is profoundly and relatively stably impaired over years to decades
    of follow-up, though some patients experience additional visual decline from
    complications such as keratoconus or early-onset cataract.
  phenotype_term:
    preferred_term: Reduced visual acuity
    term:
      id: HP:0007663
      label: Reduced visual acuity
  evidence:
  - reference: DOI:10.3390/genes12081261
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Leber's congenital amaurosis (LCA), one of the most severe inherited retinal dystrophies, is typically associated with extremely early onset of visual loss"
    explanation: >-
      Huang et al. confirm that LCA (including GUCY2D-related LCA1) is characterized
      by extremely early-onset severe visual loss.

- category: Ophthalmological
  name: Nystagmus
  frequency: VERY_FREQUENT
  description: >-
    Infantile nystagmus is a near-universal presenting feature of GUCY2D-LCA1,
    developing within the first three years of life and typically present from
    birth. It reflects severe photoreceptor dysfunction impairing visual fixation
    from early infancy.
  phenotype_term:
    preferred_term: Nystagmus
    term:
      id: HP:0000639
      label: Nystagmus

- category: Ophthalmological
  name: Photophobia
  frequency: FREQUENT
  description: >-
    Light sensitivity is a prominent and characteristic feature of GUCY2D-related
    retinopathy occurring in both the recessive (LCA1) and dominant (CORD6) forms.
    In recessive disease, photophobia likely reflects cone photoreceptor dysfunction;
    in dominant CORD6 it results from abnormal cone sensitivity secondary to the
    gain-of-function mechanism.
  phenotype_term:
    preferred_term: Photophobia
    term:
      id: HP:0000613
      label: Photophobia

- category: Electrophysiological
  name: Abnormal electroretinogram
  frequency: VERY_FREQUENT
  description: >-
    Full-field ERG in GUCY2D-LCA1 shows severely reduced or extinguished rod and
    cone responses (panphotoreceptor dysfunction) consistent with profound
    phototransduction failure caused by RETGC-1 absence. In dominant CORD6, ERG
    shows predominantly reduced cone responses with relative rod preservation early,
    with later rod involvement as disease progresses.
  phenotype_term:
    preferred_term: Abnormal electroretinogram
    term:
      id: HP:0000512
      label: Abnormal electroretinogram

- category: Ophthalmological
  name: Hypermetropia
  frequency: FREQUENT
  description: >-
    High hyperopia is the most common refractive error in GUCY2D-LCA1, reported
    as a consistent finding across multiple natural history cohorts.
  phenotype_term:
    preferred_term: Hypermetropia
    term:
      id: HP:0000540
      label: Hypermetropia

- category: Ophthalmological
  name: Progressive visual loss
  subtype: Dominant
  frequency: VERY_FREQUENT
  description: >-
    Dominant CORD6 shows clearly progressive visual decline with annual BCVA
    worsening of approximately 0.022 logMAR/year. Natural history studies document
    a 32% probability of blindness or severe visual impairment by age 40.
    Structural degeneration on OCT becomes more apparent over time with progressive
    macular atrophy.
  phenotype_term:
    preferred_term: Progressive visual loss
    term:
      id: HP:0000529
      label: Progressive visual loss

- category: Ophthalmological
  name: Color vision defect
  subtype: Dominant
  frequency: FREQUENT
  description: >-
    Dyschromatopsia (color vision defect) is a characteristic finding in dominant
    GUCY2D-CORD6, reflecting early and preferential cone dysfunction. Color
    perception defects are reported across affected members of GUCY2D-CORD families.
  phenotype_term:
    preferred_term: Color vision defect
    term:
      id: HP:0000551
      label: Color vision defect
  evidence:
  - reference: DOI:10.1371/journal.pone.0278857
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "All affected family members presented specific genotypes mainly determined by mutated GUCY2D gene, and different phenotypical traits, mainly related to focus and color perception."
    explanation: >-
      Donato et al. confirm color perception defects among affected family members
      with GUCY2D-associated cone-rod dystrophy, consistent with the cone-predominant
      nature of the dominant form.

- category: Ophthalmological
  name: Macular atrophy
  subtype: Dominant
  frequency: FREQUENT
  description: >-
    Progressive macular atrophy is a hallmark structural finding in dominant
    GUCY2D-CORD6. Early granular RPE changes in the macular region progress to
    frank macular atrophy in older patients. OCT demonstrates progressive loss
    of outer retinal bands and reduced retinal thickness over time.
  phenotype_term:
    preferred_term: Macular atrophy
    term:
      id: HP:0007401
      label: Macular atrophy

genetic:
- name: GUCY2D pathogenic variants
  gene_term:
    preferred_term: GUCY2D
    term:
      id: hgnc:4689
      label: GUCY2D
  association: Causative
  features: >-
    Over 248 pathogenic variants in GUCY2D cause autosomal recessive LCA1/EOSRD;
    null alleles (frameshift, nonsense, splice-site) account for approximately 88%
    of LCA-causing alleles. Approximately 30 additional variants cause autosomal
    dominant CORD6, strongly enriched at codon 838 in exon 13 (c.2513G>A
    p.Arg838His accounting for ~54% of dominant cases). Variants in the extracellular
    domain (exon 2) are associated with milder LCA phenotypes and better-preserved
    visual acuity.
  inheritance:
  - name: Autosomal recessive
    evidence:
    - reference: DOI:10.3390/genes12081261
      supports: SUPPORT
      evidence_source: HUMAN_CLINICAL
      snippet: "Leber's congenital amaurosis (LCA), one of the most severe inherited retinal dystrophies, is typically associated with extremely early onset of visual loss, nystagmus, and amaurotic pupils"
      explanation: >-
        LCA from biallelic GUCY2D loss-of-function variants follows autosomal
        recessive inheritance.
  - name: Autosomal dominant
    evidence:
    - reference: PMID:35656327
      supports: SUPPORT
      evidence_source: HUMAN_CLINICAL
      snippet: "Mutations of six genes (PRPH2, GUCA1A, GUCY2D, CDHR1, ABCA4, and TTLL5) are implicated in the monogenic dominant inheritance of CACD."
      explanation: >-
        GUCY2D gain-of-function variants cause autosomal dominant CACD1/CORD6.
  evidence:
  - reference: PMID:38278208
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Leber congenital amaurosis/early-onset severe retinal dystrophy (GUCY2D, CEP290, CRB1, RDH12, RPE65, TULP1, AIPL1 and NMNAT1)"
    explanation: >-
      GUCY2D is confirmed as a primary causative gene for LCA/EOSRD in this
      comprehensive inherited retinal disease phenotyping and genotyping review.

treatments:
- name: ATSN-101 Gene Augmentation Therapy
  therapeutic_modality: GENE_THERAPY
  description: >-
    ATSN-101 is an AAV5-based gene augmentation therapy delivering the human GUCY2D
    transgene under the photoreceptor-specific GRK1 promoter via unilateral subretinal
    injection, developed by Atsena Therapeutics for GUCY2D-LCA1. GUCY2D-LCA1 is
    particularly favorable for gene augmentation because of the characteristic
    structure-function dissociation — preserved central photoreceptor structure
    despite profound functional silence — providing viable cellular targets for
    gene replacement. Preliminary Phase I/II results report mean improvement of
    20.3 dB on full-field stimulus testing, with 3/6 treated patients reaching
    the maximum Multi-Luminance Mobility Test (MLMT) score.
  treatment_term:
    preferred_term: gene therapy
    term:
      id: MAXO:0001001
      label: gene therapy
  evidence:
  - reference: clinicaltrials:NCT03920007
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "To evaluate the safety and tolerability of ascending doses of ATSN-101 administered as a unilateral subretinal injection in patients with Leber Congenital Amaurosis (LCA) caused by autosomal recessive guanylate cyclase 2D (GUCY2D) mutations (GUCY2D-LCA)."
    explanation: >-
      NCT03920007 is the Phase I/II clinical trial evaluating ATSN-101 gene replacement
      therapy for GUCY2D-LCA, directly targeting the core mechanism of RETGC-1
      deficiency by restoring functional GUCY2D expression in photoreceptors.

- name: Supportive care and low vision rehabilitation
  therapeutic_modality: OTHER
  description: >-
    Standard of care for GUCY2D-related retinopathy patients, encompassing low
    vision aids, orientation and mobility training, educational support, and assistive
    technology. Essential for managing the profound lifelong visual impairment in
    LCA1 patients and the progressive visual loss in CORD6 patients.
  treatment_term:
    preferred_term: supportive care
    term:
      id: MAXO:0000950
      label: supportive care

- name: Genetic counseling
  therapeutic_modality: OTHER
  description: >-
    Essential for clarifying autosomal recessive risk in LCA1 (25% recurrence for
    siblings of affected individuals), autosomal dominant risk in CORD6 (50% risk
    for offspring), family planning guidance, cascade genetic testing of at-risk
    relatives, and clinical trial eligibility assessment.
  treatment_term:
    preferred_term: genetic counseling
    term:
      id: MAXO:0000079
      label: genetic counseling

clinical_trials:
- name: NCT03920007
  phase: PHASE_I
  status: ACTIVE_NOT_RECRUITING
  description: >-
    Phase I/II dose-escalation study of ATSN-101 (AAV5-hGRK1-GUCY2D), an AAV5-based
    gene augmentation therapy for patients with Leber Congenital Amaurosis caused by
    biallelic GUCY2D mutations. Administered as a unilateral subretinal injection
    in 15 participants. Sponsored by Atsena Therapeutics Inc. Estimated study
    completion: May 2027.
  target_phenotypes:
  - preferred_term: Reduced visual acuity
    term:
      id: HP:0007663
      label: Reduced visual acuity
  - preferred_term: Nystagmus
    term:
      id: HP:0000639
      label: Nystagmus
  evidence:
  - reference: clinicaltrials:NCT03920007
    supports: SUPPORT
    snippet: "To evaluate the safety and tolerability of ascending doses of ATSN-101 administered as a unilateral subretinal injection in patients with Leber Congenital Amaurosis (LCA) caused by autosomal recessive guanylate cyclase 2D (GUCY2D) mutations (GUCY2D-LCA)."
    explanation: >-
      Phase I/II trial for ATSN-101 (AAV5-GUCY2D) gene therapy in GUCY2D-LCA,
      the most advanced gene therapy program for this condition.
