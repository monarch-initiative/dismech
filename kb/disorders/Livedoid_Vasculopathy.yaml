      Plasminogen activator inhibitor (PAI)-1 is a primary inhibitory component
      of the endogenous fibrinolytic system in blood coagulation.
    explanation: >-
      This supports PAI-1 as a fibrinolysis regulator relevant to LV
      pathophysiology.
