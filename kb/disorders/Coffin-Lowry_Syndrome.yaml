treatments:
- name: Supportive multidisciplinary care
  description: >-
    Current management is supportive and includes developmental therapies,
    orthopedic monitoring, seizure management, and surveillance for cardiac and
    neurologic complications.
differential_diagnoses:
- name: Kabuki syndrome
  disease_term:
    preferred_term: Kabuki syndrome
    term:
      id: MONDO:0016512
      label: Kabuki syndrome
  description: >-
    Kabuki syndrome overlaps with Coffin-Lowry syndrome through developmental
    delay, craniofacial dysmorphism, and skeletal abnormalities, but it follows
    a different Mendelian mechanism and lacks the classic RPS6KA3-associated
    stimulus-induced drop episode phenotype.
  distinguishing_features:
  - X-linked inheritance and stimulus-induced drop episodes favor Coffin-Lowry syndrome.
  - Persistent fingertip pads and the typical Kabuki facial gestalt favor Kabuki syndrome.
- name: Noonan syndrome
  disease_term:
    preferred_term: Noonan syndrome
    term:
      id: MONDO:0018997
      label: Noonan syndrome
  description: >-
    Noonan syndrome can overlap through short stature, developmental issues, and
    chest or spinal abnormalities, but it is usually distinguished by
    RASopathy-associated cardiac and lymphatic findings rather than the classic
    Coffin-Lowry neurocognitive-skeletal pattern.
  distinguishing_features:
  - Severe intellectual disability with progressive skeletal deformity favors Coffin-Lowry syndrome.
  - Pulmonary valve stenosis and typical RASopathy facies favor Noonan syndrome.
