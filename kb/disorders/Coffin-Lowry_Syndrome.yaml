  evidence:
  - reference: PMID:23389038
    reference_title: "Rsk2 Knockdown in PC12 Cells Results in Sp1 Dependent Increased Expression of the Gria2 Gene, Encoding the AMPA Receptor Subunit GluR2."
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: >-
      We show that Rsk2 silencing leads also to an elevation of ERK1/2 phosphorylation as well as of GluR2 expression and that the increased level of GluR2 expression results from the increased ERK1/2 activity on the transcription factor Sp1.
    explanation: >-
      This cell-model study directly supports abnormal ERK-dependent
      transcriptional signaling downstream of RSK2 deficiency.
