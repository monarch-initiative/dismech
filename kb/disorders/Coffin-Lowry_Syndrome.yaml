  downstream:
  - target: Abnormal ERK-RSK2-Sp1 transcriptional signaling
    description: Loss of RSK2 dysregulates downstream ERK-dependent transcriptional control
- name: Abnormal ERK-RSK2-Sp1 transcriptional signaling
  description: >-
    RSK2 normally modulates ERK output. RSK2 deficiency leads to abnormally
    increased ERK1/2 activity with altered transcriptional control in neural
    cells.
