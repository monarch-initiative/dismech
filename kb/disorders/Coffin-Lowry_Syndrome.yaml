  evidence:
  - reference: PMID:41589305
    reference_title: "Coffin-Lowry syndrome: a systematic review of RPS6KA3 confirmed cases and implications for diagnosis and counseling."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      This systematic review highlights recurrent neurodevelopmental, neurologic, and skeletal phenotypes in CLS and delineates mutation-specific risks, particularly for SIDEs and seizures.
    explanation: >-
      The disease-focused review supports neurodevelopmental dysfunction as a
      distinct downstream consequence of RSK2 deficiency.
- name: Seizure susceptibility and stimulus-induced drop episodes
  description: >-
    The neurologic phenotype includes recurrent seizures and stimulus-induced drop
    episodes in a clinically important subset of affected individuals.
  evidence:
  - reference: PMID:41589305
    reference_title: "Coffin-Lowry syndrome: a systematic review of RPS6KA3 confirmed cases and implications for diagnosis and counseling."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Developmental delay (87.5%) and intellectual disability (66.7%) were the most frequent features, alongside musculoskeletal deformities (kyphoscoliosis 33.3%, pectus anomalies 19.4%) and neurologic involvement (SIDEs 12.5%, seizures 15.3%, spasticity 5.6%).
    explanation: >-
      This directly supports a distinct downstream neurologic branch involving
      SIDEs and seizures.
- name: Progressive skeletal abnormalities
  description: >-
