name: Coffin-Lowry syndrome
creation_date: '2026-04-11T19:38:25Z'
updated_date: '2026-04-12T00:02:00Z'
category: Mendelian
description: >-
  Coffin-Lowry syndrome is an X-linked neurodevelopmental disorder caused by
  pathogenic variants in RPS6KA3, which encodes the serine-threonine kinase
  RSK2. Loss of RSK2 function perturbs downstream ERK signaling and
  activity-dependent transcriptional regulation in neural and skeletal tissues.
  The syndrome is characterized by developmental delay or intellectual
  disability, distinctive facial appearance, progressive skeletal abnormalities,
  stimulus-induced drop episodes, seizures in a subset of patients, and other
  systemic complications.
