    reference_title: "Rsk2 Knockdown in PC12 Cells Results in Sp1 Dependent Increased Expression of the Gria2 Gene, Encoding the AMPA Receptor Subunit GluR2."
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: >-
      Highly heterogeneous loss-of-function mutations affecting this gene are responsible for a severe syndromic form of cognitive impairment, Coffin-Lowry syndrome.
