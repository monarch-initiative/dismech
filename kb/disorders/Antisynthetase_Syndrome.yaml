  association: Risk Factor
  relationship_type: SUSCEPTIBILITY
  notes: >-
    MHC class II is the strongest susceptibility locus; HLA-DRB1*03:01 (and the linked 8.1
    ancestral haplotype) is the principal predisposing marker, particularly for anti-Jo-1.
    This is a susceptibility association, not a Mendelian causal mutation.
  evidence:
  - reference: PMID:27594777
