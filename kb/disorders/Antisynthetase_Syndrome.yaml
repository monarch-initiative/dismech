- name: Tacrolimus
  description: >-
    Calcineurin inhibitor used as add-on therapy, particularly for more severe ILD; case
    series in antisynthetase-syndrome-ILD show improved lung function and reduced
    corticosteroid dose.
  therapeutic_modality: SMALL_MOLECULE
  treatment_term:
