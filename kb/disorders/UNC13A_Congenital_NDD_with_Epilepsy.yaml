    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      EMG studies revealed abnormally low-amplitude compound muscle action potentials
      (CMAPs) at rest
    explanation: >-
      Electrophysiological evidence of presynaptic neuromuscular transmission
      defect in UNC13A loss-of-function.
