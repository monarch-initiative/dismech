    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: "The organoids exhibit premature differentiation, and Neuronatin (NNAT) over-expression. Furthermore, pathways related to DNA damage response and cell cycle are differentially regulated compared to controls. After exposure to bleomycin, NBS organoids undergo delayed p53-mediated DNA damage response and aberrant trans-synaptic signaling, which ultimately leads to neuronal apoptosis."
    explanation: This directly supports abnormal neurogenesis with downstream neuronal apoptosis in NBS.
  downstream:
