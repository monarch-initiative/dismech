  description: >-
    Human SOX10 clinical cohort spanning Waardenburg, PCWH, and neurologic
    neurocristopathy phenotypes with imaging and genotype-phenotype correlation.
  organism:
    preferred_term: Homo sapiens
    term:
      id: NCBITaxon:9606
      label: Homo sapiens
  conditions:
  - PCWH syndrome
  - SOX10-related neurocristopathy
  publication: PMID:29681101
