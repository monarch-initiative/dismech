name: Ovarian High-Grade Serous Carcinoma
creation_date: "2026-03-06T12:00:00Z"
updated_date: "2026-03-06T12:00:00Z"
description: >-
  Ovarian high-grade serous carcinoma (HGSOC) is the most common and lethal subtype of
  epithelial ovarian cancer, accounting for approximately 70-80% of ovarian cancer deaths.
  It is characterized by near-universal TP53 mutations, frequent BRCA1/2 deficiency
  (~50% including germline and somatic), and widespread homologous recombination deficiency.
  Current evidence supports origin from the fallopian tube epithelium rather than the
  ovarian surface epithelium. Treatment includes platinum-based chemotherapy, PARP
  inhibitors for BRCA-mutant/HRD-positive tumors, bevacizumab, and debulking surgery.
categories:
- Molecularly-Defined Cancer
- Gynecologic Cancer
- Solid Tumor
disease_term:
  preferred_term: ovarian high-grade serous carcinoma
  term:
    id: MONDO:0005211
    label: ovarian serous adenocarcinoma
parents:
- ovarian carcinoma
has_subtypes:
- name: BRCA1/2-Mutant HGSOC
  description: >-
    HGSOC harboring germline or somatic BRCA1 or BRCA2 mutations, representing
    approximately 50% of cases. These tumors exhibit homologous recombination
    deficiency and are particularly sensitive to platinum-based chemotherapy and
    PARP inhibitors.
- name: Homologous Recombination Proficient HGSOC
  description: >-
    HGSOC without detectable homologous recombination deficiency. These tumors
    generally have a poorer prognosis with platinum-based chemotherapy and do
    not respond as well to PARP inhibitors.
pathophysiology:
- name: TP53 Mutation and Loss of Function
  description: >-
    TP53 mutations occur in virtually all HGSOC cases (96-100%). Both missense
    gain-of-function mutations and truncating loss-of-function mutations are observed.
    Loss of p53 tumor suppressor function leads to genomic instability, impaired
    DNA damage response, and uncontrolled cell proliferation.
  cell_types:
  - preferred_term: fallopian tube secretory epithelial cell
    term:
      id: CL:4030006
      label: fallopian tube secretory epithelial cell
  biological_processes:
  - preferred_term: DNA damage response
    modifier: ABNORMAL
    term:
      id: GO:0006974
      label: cellular response to DNA damage stimulus
  - preferred_term: cell cycle arrest
    modifier: ABSENT
    term:
      id: GO:0007050
      label: cell cycle arrest
  downstream:
  - target: Genomic Instability
    description: Loss of p53 leads to failure of DNA damage checkpoints
- name: Homologous Recombination Deficiency
  description: >-
    Approximately 50% of HGSOC tumors have defective homologous recombination
    DNA repair, most commonly through BRCA1/2 mutations (germline or somatic),
    BRCA1 promoter methylation, or mutations in other HR pathway genes (RAD51C,
    RAD51D, PALB2). HRD leads to reliance on error-prone DNA repair pathways and
    sensitivity to platinum agents and PARP inhibitors.
  biological_processes:
  - preferred_term: double-strand break repair via homologous recombination
    modifier: DECREASED
    term:
      id: GO:0000724
      label: double-strand break repair via homologous recombination
  downstream:
  - target: Genomic Instability
    description: Defective HR leads to accumulation of DNA damage
- name: Genomic Instability
  description: >-
    HGSOC is characterized by extreme chromosomal instability including widespread
    copy number alterations, structural rearrangements, and aneuploidy. This genomic
    instability results from combined TP53 loss and homologous recombination deficiency,
    and contributes to tumor heterogeneity and treatment resistance.
  biological_processes:
  - preferred_term: chromosome segregation
    modifier: ABNORMAL
    term:
      id: GO:0007059
      label: chromosome segregation
  - preferred_term: cell population proliferation
    modifier: INCREASED
    term:
      id: GO:0008283
      label: cell population proliferation
- name: Fallopian Tube Origin
  description: >-
    Evidence supports that most HGSOC arises from the secretory epithelial cells of
    the fallopian tube fimbria, specifically from serous tubal intraepithelial
    carcinoma (STIC) precursor lesions, rather than from the ovarian surface
    epithelium as previously thought.
  cell_types:
  - preferred_term: fallopian tube secretory epithelial cell
    term:
      id: CL:4030006
      label: fallopian tube secretory epithelial cell
phenotypes:
- category: Neoplastic
  name: Ovarian Carcinoma
  frequency: VERY_FREQUENT
  description: >-
    Patients typically present with an adnexal or pelvic mass, often detected
    on imaging or during evaluation for abdominal symptoms.
  phenotype_term:
    preferred_term: Ovarian carcinoma
    term:
      id: HP:0025318
      label: Ovarian carcinoma
- category: Clinical
  name: Ascites
  frequency: FREQUENT
  description: >-
    Malignant ascites is common at presentation due to peritoneal dissemination
    of tumor cells and impaired peritoneal fluid reabsorption.
  phenotype_term:
    preferred_term: Ascites
    term:
      id: HP:0001541
      label: Ascites
- category: Clinical
  name: Abdominal Pain
  frequency: FREQUENT
  description: >-
    Abdominal or pelvic pain is a common presenting symptom, often due to
    tumor bulk, ascites, or peritoneal carcinomatosis.
  phenotype_term:
    preferred_term: Abdominal pain
    term:
      id: HP:0002027
      label: Abdominal pain
- category: Clinical
  name: Abdominal Distention
  frequency: FREQUENT
  description: >-
    Abdominal bloating and distention are common presenting symptoms, often
    resulting from ascites or tumor bulk.
  phenotype_term:
    preferred_term: Abdominal distention
    term:
      id: HP:0003270
      label: Abdominal distention
genetic:
- name: TP53
  association: Near-universal somatic mutation
  gene_term:
    preferred_term: TP53
    term:
      id: hgnc:11998
      label: TP53
  notes: >-
    TP53 is mutated in 96-100% of HGSOC, making it the defining molecular
    feature. Both missense and truncating mutations occur across the gene.
- name: BRCA1
  association: Germline and somatic mutation
  gene_term:
    preferred_term: BRCA1
    term:
      id: hgnc:1100
      label: BRCA1
  notes: >-
    Germline BRCA1 mutations are found in approximately 13-15% of HGSOC patients,
    with additional somatic mutations increasing the total to approximately 20%.
    BRCA1 promoter methylation accounts for additional cases.
- name: BRCA2
  association: Germline and somatic mutation
  gene_term:
    preferred_term: BRCA2
    term:
      id: hgnc:1101
      label: BRCA2
  notes: >-
    Germline BRCA2 mutations are found in approximately 6-8% of HGSOC patients.
    BRCA2 mutations confer sensitivity to platinum and PARP inhibitors.
treatments:
- name: Platinum-Based Chemotherapy
  description: >-
    Carboplatin-paclitaxel combination is the standard first-line chemotherapy
    for HGSOC. Platinum sensitivity is a key prognostic factor, with initial
    response rates of 70-80%.
  treatment_term:
    preferred_term: platinum-based chemotherapy
    term:
      id: MAXO:0000647
      label: chemotherapy
- name: PARP Inhibitor Therapy
  description: >-
    PARP inhibitors (olaparib, niraparib, rucaparib) exploit synthetic lethality
    in HRD-positive tumors. They are used as maintenance therapy after
    platinum-based chemotherapy and have significantly improved progression-free
    survival, particularly in BRCA-mutant tumors.
  treatment_term:
    preferred_term: PARP inhibitor therapy
    term:
      id: MAXO:0000058
      label: pharmacotherapy
- name: Bevacizumab
  description: >-
    Bevacizumab, an anti-VEGF monoclonal antibody, is used in combination with
    chemotherapy and as maintenance therapy. It improves progression-free survival
    in advanced HGSOC.
  treatment_term:
    preferred_term: anti-VEGF therapy
    term:
      id: MAXO:0000058
      label: pharmacotherapy
- name: Debulking Surgery
  description: >-
    Primary or interval cytoreductive surgery aims to remove all visible tumor
    (complete gross resection). Optimal debulking to no residual disease is one of
    the strongest prognostic factors in HGSOC.
  treatment_term:
    preferred_term: cytoreductive surgery
    term:
      id: MAXO:0000004
      label: surgical procedure
