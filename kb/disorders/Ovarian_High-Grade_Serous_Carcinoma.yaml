name: Ovarian High-Grade Serous Carcinoma
creation_date: "2026-03-06T12:00:00Z"
updated_date: "2026-03-06T18:30:00Z"
description: >-
  Ovarian high-grade serous carcinoma (HGSOC) is the most common and lethal subtype of
  epithelial ovarian cancer, accounting for approximately 70-80% of ovarian cancer deaths.
  It is characterized by near-universal TP53 mutations (96%), frequent BRCA1/2 deficiency
  (~50% including germline and somatic), and widespread homologous recombination deficiency.
  Current evidence supports origin from the fallopian tube secretory epithelium via serous
  tubal intraepithelial carcinoma (STIC) precursor lesions. Treatment includes platinum-based
  chemotherapy, PARP inhibitors for BRCA-mutant/HRD-positive tumors, bevacizumab, and
  debulking surgery. TCGA analysis identified four transcriptional subtypes (Immunoreactive,
  Differentiated, Proliferative, Mesenchymal) and recurrent somatic mutations in NF1,
  BRCA1, BRCA2, RB1, and CDK12.
categories:
- Molecularly-Defined Cancer
- Gynecologic Cancer
- Solid Tumor
