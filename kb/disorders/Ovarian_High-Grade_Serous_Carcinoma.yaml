treatments:
- name: Platinum-Based Chemotherapy
  description: >-
    Carboplatin-paclitaxel combination is the standard first-line chemotherapy
    for HGSOC. Platinum sensitivity is a key prognostic factor, with initial
    response rates of 70-80%. Approximately 25% of patients develop platinum
    resistance within 6 months.
  evidence:
  - reference: PMID:26493647
    reference_title: "Rethinking ovarian cancer II: reducing mortality from high-grade serous ovarian cancer."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      High-grade serous ovarian cancer (HGSOC) accounts for 70-80% of ovarian
      cancer deaths, and overall survival has not changed significantly for
      several decades
    explanation: >-
      Bowtell et al. review establishing HGSOC treatment landscape and
      challenges with current chemotherapy approaches.
  treatment_term:
    preferred_term: platinum-based chemotherapy
    term:
      id: MAXO:0000647
      label: chemotherapy
- name: PARP Inhibitor Therapy
  description: >-
    PARP inhibitors (olaparib, niraparib, rucaparib) exploit synthetic lethality
    in HRD-positive tumors. In the SOLO1 trial, maintenance olaparib after
    platinum-based chemotherapy showed a hazard ratio of 0.55 for overall survival
    at 7-year follow-up in BRCA-mutant patients, with 67% alive versus 46.5%
    on placebo.
  evidence:
  - reference: PMID:36082969
    reference_title: "Overall Survival With Maintenance Olaparib at a 7-Year Follow-Up in Patients With Newly Diagnosed Advanced Ovarian Cancer and a BRCA Mutation: The SOLO1/GOG 3004 Trial."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      At 7 years, 67.0% of olaparib patients versus 46.5% of placebo patients
      were alive, and 45.3% versus 20.6%, respectively, were alive and had not
      received a first subsequent treatment
    explanation: >-
      SOLO1 trial 7-year follow-up demonstrating substantial overall survival
      benefit with maintenance olaparib in BRCA-mutant newly diagnosed advanced
      ovarian cancer.
  treatment_term:
    preferred_term: PARP inhibitor therapy
    term:
      id: MAXO:0000058
      label: pharmacotherapy
- name: Bevacizumab
  description: >-
    Bevacizumab, an anti-VEGF monoclonal antibody, is used in combination with
    chemotherapy and as maintenance therapy. The GOG-0218 validation study showed
    that patients with poorly chemosensitive disease (unfavorable KELIM score)
    derive the most benefit from bevacizumab.
  evidence:
  - reference: PMID:36252167
    reference_title: "Identification of Patients With Ovarian Cancer Experiencing the Highest Benefit From Bevacizumab in the First-Line Setting on the Basis of Their Tumor-Intrinsic Chemosensitivity (KELIM): The GOG-0218 Validation Study."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      An unfavorable KELIM score was associated with bevacizumab benefit
      compared with placebo (PFS: HR, 0.70; 95% CI, 0.59 to 0.82; OS: HR,
      0.87; 95% CI, 0.73 to 1.03)
    explanation: >-
      GOG-0218 validation confirming KELIM score as a predictive biomarker for
      bevacizumab benefit in ovarian cancer.
  treatment_term:
    preferred_term: anti-VEGF therapy
    term:
      id: MAXO:0000058
      label: pharmacotherapy
- name: Debulking Surgery
  description: >-
    Primary or interval cytoreductive surgery aims to remove all visible tumor
    (complete gross resection). Optimal debulking to no residual disease is one of
    the strongest prognostic factors in HGSOC.
  treatment_term:
    preferred_term: cytoreductive surgery
    term:
      id: MAXO:0000004
      label: surgical procedure
