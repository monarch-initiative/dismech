biochemical:
- name: CA-125 (Cancer Antigen 125)
  notes: >-
    CA-125 (MUC16) is the most widely used serum biomarker for ovarian cancer.
    It is elevated in approximately 80% of advanced HGSOC but has limited
    sensitivity in early-stage disease and can be elevated in benign conditions
    such as endometriosis.
  evidence:
  - reference: PMID:30917847
    reference_title: "Biomarkers and algorithms for diagnosis of ovarian cancer: CA125, HE4, RMI and ROMA, a review."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Serum CA125 assay has low sensitivity in the early stages and can be
      increased in certain conditions such as menstruation or endometriosis
    explanation: >-
      Review of CA-125 limitations as an early diagnostic biomarker for
      ovarian cancer.
- name: HE4 (Human Epididymis Protein 4)
  notes: >-
    HE4 (WFDC2) is overexpressed in ovarian tumors with a specificity of 94%.
    Unlike CA-125, HE4 levels are not affected by endometriosis. The combination
    of CA-125 and HE4 provides the most efficient biological diagnostic tool.
  evidence:
  - reference: PMID:30917847
    reference_title: "Biomarkers and algorithms for diagnosis of ovarian cancer: CA125, HE4, RMI and ROMA, a review."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      The level of HE4 is overexpressed in ovarian tumors. Its specificity is
      94% and its level is not affected by endometriosis cysts
    explanation: >-
      HE4 has superior specificity to CA-125 for ovarian cancer diagnosis.
  - reference: PMID:30917847
    reference_title: "Biomarkers and algorithms for diagnosis of ovarian cancer: CA125, HE4, RMI and ROMA, a review."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      the most efficient biological diagnostic tool to diagnose ovarian cancer
      is the combination of CA125 and HE4
    explanation: >-
      Combined CA-125 and HE4 measurement provides optimal diagnostic performance.
