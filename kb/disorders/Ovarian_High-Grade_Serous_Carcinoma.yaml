has_subtypes:
- name: BRCA1/2-Mutant HGSOC
  description: >-
    HGSOC harboring germline or somatic BRCA1 or BRCA2 mutations, representing
    approximately 50% of cases. These tumors exhibit homologous recombination
    deficiency and are particularly sensitive to platinum-based chemotherapy and
    PARP inhibitors. At 7-year follow-up in SOLO1, 67% of BRCA-mutant patients
    on maintenance olaparib were alive versus 46.5% on placebo.
  evidence:
  - reference: PMID:36082969
    reference_title: "Overall Survival With Maintenance Olaparib at a 7-Year Follow-Up in Patients With Newly Diagnosed Advanced Ovarian Cancer and a BRCA Mutation: The SOLO1/GOG 3004 Trial."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      At 7 years, 67.0% of olaparib patients versus 46.5% of placebo patients
      were alive
    explanation: >-
      SOLO1 trial 7-year follow-up demonstrates significant survival benefit
      of PARP inhibitor maintenance in BRCA-mutant ovarian cancer.
- name: Homologous Recombination Proficient HGSOC
  description: >-
    HGSOC without detectable homologous recombination deficiency. These tumors
    generally have a poorer prognosis with platinum-based chemotherapy and do
    not respond as well to PARP inhibitors.
pathophysiology:
- name: TP53 Mutation and Loss of Function
  description: >-
    TP53 mutations occur in virtually all HGSOC cases (96%). Both missense
    gain-of-function mutations and truncating loss-of-function mutations are observed.
    Loss of p53 tumor suppressor function leads to genomic instability, impaired
    DNA damage response, and uncontrolled cell proliferation. TP53 mutation is
    the earliest known molecular alteration in HGSOC pathogenesis.
  evidence:
  - reference: PMID:21720365
    reference_title: "Integrated genomic analyses of ovarian carcinoma."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      high-grade serous ovarian cancer is characterized by TP53 mutations in
      almost all tumours (96%)
    explanation: >-
      TCGA comprehensive genomic analysis of 316 HGS-OvCa samples confirmed
      near-universal TP53 mutation.
  cell_types:
  - preferred_term: fallopian tube secretory epithelial cell
    term:
      id: CL:4030006
      label: fallopian tube secretory epithelial cell
  biological_processes:
  - preferred_term: DNA damage response
    modifier: ABNORMAL
    term:
      id: GO:0006974
      label: DNA damage response
  - preferred_term: cell cycle arrest
    modifier: ABSENT
    term:
      id: GO:2000134
      label: negative regulation of G1/S transition of mitotic cell cycle
  downstream:
  - target: Genomic Instability
    description: Loss of p53 leads to failure of DNA damage checkpoints
- name: Homologous Recombination Deficiency
  description: >-
    Approximately 50% of HGSOC tumors have defective homologous recombination
    DNA repair, most commonly through BRCA1/2 mutations (germline or somatic),
    BRCA1 promoter methylation, or mutations in other HR pathway genes (RAD51C,
    RAD51D, PALB2). HRD leads to reliance on error-prone DNA repair pathways and
    sensitivity to platinum agents and PARP inhibitors.
  evidence:
  - reference: PMID:21720365
    reference_title: "Integrated genomic analyses of ovarian carcinoma."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Pathway analyses suggested that homologous recombination is defective in
      about half of the tumours analysed
    explanation: >-
      TCGA integrated genomic analysis found HR deficiency in ~50% of HGSOC,
      including BRCA1/2 mutations and BRCA1 promoter methylation.
  biological_processes:
  - preferred_term: double-strand break repair via homologous recombination
    modifier: DECREASED
    term:
      id: GO:0000724
      label: double-strand break repair via homologous recombination
  downstream:
  - target: Genomic Instability
    description: Defective HR leads to accumulation of DNA damage
- name: Genomic Instability
  description: >-
    HGSOC is characterized by extreme chromosomal instability including widespread
    copy number alterations, structural rearrangements, and aneuploidy. TCGA
    identified 113 significant focal DNA copy number aberrations including recurrent
    amplifications of CCNE1, MYC, and MECOM. This genomic instability results from
    combined TP53 loss and homologous recombination deficiency, and contributes to
    tumor heterogeneity and treatment resistance.
  evidence:
  - reference: PMID:21720365
    reference_title: "Integrated genomic analyses of ovarian carcinoma."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      113 significant focal DNA copy number aberrations; and promoter methylation
      events involving 168 genes
    explanation: >-
      TCGA analysis demonstrated the extensive chromosomal instability characteristic
      of HGSOC.
  biological_processes:
  - preferred_term: chromosome segregation
    modifier: ABNORMAL
    term:
      id: GO:0007059
      label: chromosome segregation
  - preferred_term: cell population proliferation
    modifier: INCREASED
    term:
      id: GO:0008283
      label: cell population proliferation
- name: Fallopian Tube Origin
  description: >-
    Evidence supports that most HGSOC arises from the secretory epithelial cells of
    the fallopian tube fimbria, specifically from serous tubal intraepithelial
    carcinoma (STIC) precursor lesions, rather than from the ovarian surface
    epithelium as previously thought. Mathematical models imply that decades elapse
    from a TP53 mutation to STIC, followed by approximately 6 years for progression
    to HGSOC.
  evidence:
  - reference: PMID:33011111
    reference_title: "The Origin of Ovarian Cancer Species and Precancerous Landscape."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      ovarian epithelial cancers are primarily imported from either endometrial
      or fallopian tube epithelium
    explanation: >-
      Comprehensive review of the tubal origin paradigm for HGSOC, including
      STIC precursor lesion characterization.
  - reference: PMID:33011111
    reference_title: "The Origin of Ovarian Cancer Species and Precancerous Landscape."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Mathematical models imply that a prolonged time (decades) elapses from the
      development of a TP53 mutation, the earliest known molecular alteration, to
      an STIC, followed by a shorter span (6 years) for progression to an HGSC
    explanation: >-
      Timeline modeling of HGSOC progression from TP53 mutation through STIC to
      invasive carcinoma.
  cell_types:
  - preferred_term: fallopian tube secretory epithelial cell
    term:
      id: CL:4030006
      label: fallopian tube secretory epithelial cell
