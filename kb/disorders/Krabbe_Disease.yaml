prevalence:
  - population: Global
    percentage: Rare
    notes: Estimated incidence of 1 in 100,000 live births
progression:
  - phase: Infantile Onset
    age_range: 0-6 months
    notes: >
      Most common form. Rapid neurological deterioration with irritability,
      spasticity, feeding difficulties, and developmental regression.
  - phase: Late-Infantile/Juvenile Onset
    age_range: 6 months - 16 years
    notes: >
      Progressive gait disturbance, visual impairment, and cognitive decline
      with slower progression than the infantile form.
  - phase: Adult Onset
    age_range: ">16 years"
    notes: >
      Rarest form with slowly progressive spastic paraparesis, peripheral
      neuropathy, and variable cognitive involvement.
pathophysiology:
  - name: GALC Deficiency and Psychosine Accumulation
    description: >
      Loss-of-function mutations in the GALC gene lead to deficiency of
      galactosylceramidase, causing accumulation of the cytotoxic lipid
      psychosine (galactosylsphingosine) in oligodendrocytes and Schwann cells.
      Psychosine disrupts lipid rafts, activates apoptotic pathways, and is
      directly toxic to myelin-forming cells.
    cell_types:
      - preferred_term: oligodendrocyte
        term:
          id: CL:0000128
          label: oligodendrocyte
      - preferred_term: Schwann cell
        term:
          id: CL:0002573
          label: Schwann cell
    biological_processes:
