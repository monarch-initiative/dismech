        term:
          id: UBERON:0003544
          label: brain white matter
      - preferred_term: cerebral hemisphere white matter
        term:
          id: UBERON:0002437
          label: cerebral hemisphere white matter
    evidence:
      - reference: PMID:31527255
        supports: SUPPORT
        evidence_source: MODEL_ORGANISM
        snippet: >
          Infantile globoid cell leukodystrophy (GLD, Krabbe disease) is a fatal
          demyelinating disorder caused by a deficiency in the lysosomal enzyme
          galactosylceramidase (GALC). GALC deficiency leads to the accumulation
          of the cytotoxic glycolipid, galactosylsphingosine (psychosine).
        explanation: >
          Confirms that GALC deficiency causes psychosine accumulation, and
          that psychosine is the key cytotoxic agent in Krabbe disease.
      - reference: PMID:7354254
        supports: SUPPORT
        evidence_source: HUMAN_CLINICAL
        snippet: >
          The concentration of psychosine will steadily increase and reach toxic
          levels and kill the oligodendroglial cells. This results in an arrest of
          the galactosylceramide biosynthesis.
        explanation: >
          Seminal paper establishing that psychosine accumulation kills
          oligodendrocytes, forming the basis of the psychosine hypothesis.
  - name: Demyelination
    description: >
      Psychosine-mediated destruction of oligodendrocytes and Schwann cells
      causes progressive loss of myelin in the central and peripheral nervous
      systems. This leads to formation of multinucleated globoid cells
      (macrophages containing undigested galactosylceramide) and severe
      gliosis as hallmark neuropathological features.
