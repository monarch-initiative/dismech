      - preferred_term: white matter of spinal cord
        term:
          id: UBERON:0002318
          label: white matter of spinal cord
    evidence:
      - reference: PMID:36113749
        supports: SUPPORT
        evidence_source: HUMAN_CLINICAL
        snippet: >
          Functional deficiency of GALC is toxic to myelin-producing cells, which
          leads to progressive demyelination in both the central and peripheral
          nervous systems.
        explanation: >
          Neuropathological study of human Krabbe disease brains confirming
          progressive demyelination in CNS and PNS due to GALC deficiency.
      - reference: PMID:36113749
        supports: SUPPORT
        evidence_source: HUMAN_CLINICAL
        snippet: >
          an early-infantile case (age of death at 10 months) had about 3-fold
          increases in both globoid cells, a pathological hallmark for KD
        explanation: >
          Quantifies the presence of globoid cells as a hallmark neuropathological
          feature, with more severe cases showing greater globoid cell burden.
  - name: Neuroinflammation
    description: >
      Psychosine accumulation triggers robust neuroinflammatory responses
      including microglial activation, astrogliosis, and elevated
      proinflammatory cytokines. This neuroinflammation contributes to
      progressive white matter destruction and neuronal damage.
    cell_types:
