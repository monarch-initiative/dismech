notes: >-
  This entry models the broader TSEN2-specific disease spectrum requested in
  MONDO NTR #9956 rather than binding the page directly to MONDO:0012890
  (pontocerebellar hypoplasia type 2B), which is too narrow because it excludes
  the TRACK/thrombotic-microangiopathy branch. Until the exact MONDO term is
  minted upstream, the record is anchored conservatively to the NTR's proposed
  parent term MONDO:0700092 (neurodevelopmental disorder), while PCH2B is
  retained as an explicitly grounded subtype. The NTR framing also mentions
  growth delay and pulmonary involvement, but the PubMed abstracts curated here
  provide much stronger direct support for the neurodevelopmental,
  renal-hematologic, and cardiac features than for those additional
  manifestations, so they are left in notes rather than elevated to phenotype
  assertions.
