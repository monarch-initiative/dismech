name: TSEN2-related Neurodevelopmental Disorder with or without Thrombotic Microangiopathy
creation_date: "2026-04-16T19:21:28Z"
updated_date: "2026-04-16T19:42:37Z"
category: Mendelian
description: >-
  TSEN2-related neurodevelopmental disorder with or without thrombotic
  microangiopathy is an ultra-rare autosomal recessive TSEN2 spectrum disorder
  caused by biallelic variants affecting the tRNA splicing endonuclease complex.
  Reported cases span two currently recognizable presentations: a TRACK-like,
  thrombotic-microangiopathy-positive branch with microcephaly, craniofacial and
  central nervous system malformations, atypical hemolytic uremic syndrome, and
  early kidney failure; and a thrombotic-microangiopathy-negative
  pontocerebellar hypoplasia type 2B branch with developmental delay,
  progressive microcephaly, hypotonia, feeding difficulty, and cerebellar
  atrophy or hypoplasia. This entry intentionally models the broader
  TSEN2-specific disease spectrum rather than collapsing it into the narrower
  pontocerebellar hypoplasia type 2B concept.
disease_term:
  preferred_term: neurodevelopmental disorder
  term:
    id: MONDO:0700092
    label: neurodevelopmental disorder
parents:
- Mendelian neurodevelopmental disorder
- tRNA splicing endonuclease complex disorder
- Syndromic thrombotic microangiopathy
synonyms:
- TSEN2-related neurodevelopmental disorder
- TSEN2-related disorder with or without thrombotic microangiopathy
has_subtypes:
- name: TRACK
  display_name: TRACK Syndrome
  description: >-
    TMA-positive TSEN2 presentation caused by a recessive intronic splice
    variant with microcephaly, craniofacial and CNS malformations, atypical
    hemolytic uremic syndrome, proteinuria, severe hypertension, end-stage
    kidney disease, and occasional cardiac involvement.
  evidence:
  - reference: PMID:34964109
    reference_title: "A splice site mutation in the TSEN2 causes a new syndrome with craniofacial and central nervous system malformations, and atypical hemolytic uremic syndrome."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Here, we report an intronic recessive founder variant in the gene TSEN2
      that results in abnormal splicing of the mRNA of this gene, in six
      individuals from four consanguineous families affected with microcephaly,
      multiple craniofacial malformations, radiological abnormalities of the
      central nervous system, and cognitive retardation of variable severity.
    explanation: >-
      This discovery cohort defines the syndromic TSEN2 presentation later named
      TRACK syndrome.
- name: PCH2B
  display_name: Pontocerebellar Hypoplasia Type 2B
  description: >-
    TMA-negative TSEN2 presentation with developmental delay, progressive
    microcephaly, hypotonia, feeding difficulty, and cerebellar-pontine
    atrophy/hypoplasia corresponding to the classic TSEN2-associated PCH2B
    branch.
  subtype_term:
    preferred_term: pontocerebellar hypoplasia type 2B
    term:
      id: MONDO:0012890
      label: pontocerebellar hypoplasia type 2B
  evidence:
  - reference: PMID:41621844
    reference_title: "[Pontocerebellar hypoplasia type 2B due to compound heterozygous variants of TSEN2 gene: A case report and literature review]."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Literature review has identified six PCH2B patients with missense,
      nonsense, frameshift, and splice site variants of the TSEN2 gene. Their
      main clinical manifestations included global developmental delay,
      progressive microcephaly, feeding difficulties, irritability, and vermis
      hypoplasia.
    explanation: >-
      This review summary supports a distinct TSEN2-associated PCH2B branch that
      lacks the TRACK thrombotic microangiopathy phenotype.
inheritance:
- name: Autosomal recessive inheritance
  inheritance_term:
    preferred_term: Autosomal recessive inheritance
    term:
      id: HP:0000007
      label: Autosomal recessive inheritance
  description: >-
    The known TSEN2 spectrum is caused by biallelic pathogenic variants,
    including a recessive founder intronic splice variant in TRACK syndrome and
    compound heterozygous missense, nonsense, frameshift, or splice variants in
    PCH2B.
  evidence:
  - reference: PMID:34964109
    reference_title: "A splice site mutation in the TSEN2 causes a new syndrome with craniofacial and central nervous system malformations, and atypical hemolytic uremic syndrome."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Here, we report an intronic recessive founder variant in the gene TSEN2
      that results in abnormal splicing of the mRNA of this gene, in six
      individuals from four consanguineous families
    explanation: >-
      The TRACK branch is explicitly recessive and segregates in four
      consanguineous families.
  - reference: PMID:41621844
    reference_title: "[Pontocerebellar hypoplasia type 2B due to compound heterozygous variants of TSEN2 gene: A case report and literature review]."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Genetic testing revealed that she has harbored compound heterozygous
      variants of the TSEN2 gene (NM_025265.4), namely c.1054A>T (p.Lys352*)
      and c.899G>T (p.Ser300Ile), which were inherited from her father and
      mother, respectively.
    explanation: >-
      The PCH2B branch is also recessive, with biallelic TSEN2 variants in
      trans.
prevalence:
- population: Published TSEN2 disease spectrum
  percentage: Unknown; low double-digit published case count
  notes: >-
    No population prevalence estimate is available. The TRACK discovery paper
    reported six individuals from four families, and recent PCH2B literature
    reviews summarize only a handful of additional TSEN2 patients. Because the
    PCH2B counts come from review summaries that may overlap across reports, the
    most defensible statement is that the known spectrum currently comprises only
    low double-digit published cases.
  evidence:
  - reference: PMID:34964109
    reference_title: "A splice site mutation in the TSEN2 causes a new syndrome with craniofacial and central nervous system malformations, and atypical hemolytic uremic syndrome."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Here, we report an intronic recessive founder variant in the gene TSEN2
      that results in abnormal splicing of the mRNA of this gene, in six
      individuals from four consanguineous families
    explanation: >-
      The TMA-positive branch currently rests on a very small founder cohort.
  - reference: PMID:41621844
    reference_title: "[Pontocerebellar hypoplasia type 2B due to compound heterozygous variants of TSEN2 gene: A case report and literature review]."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Literature review has identified six PCH2B patients with missense,
      nonsense, frameshift, and splice site variants of the TSEN2 gene.
    explanation: >-
      The TMA-negative PCH2B branch is likewise supported by only a few reported
      patients.
pathophysiology:
- name: TSEN2-dependent tRNA splicing endonuclease dysfunction
  description: >-
    TSEN2 encodes a catalytic subunit of the tRNA splicing endonuclease complex.
    Pathogenic TSEN2 variants disrupt pre-tRNA processing by either altering
    TSEN2 transcript splicing or destabilizing the TSEN2-TSEN54 interface and
    catalytic domain, producing a shared upstream defect in tRNA biogenesis
    across both the TRACK and PCH2B branches.
  gene:
    preferred_term: TSEN2
    description: tRNA splicing endonuclease subunit 2.
    modifier: ABNORMAL
    term:
      id: hgnc:28422
      label: TSEN2
  genes:
  - preferred_term: TSEN2
    term:
      id: hgnc:28422
      label: TSEN2
  cellular_components:
  - preferred_term: tRNA splicing endonuclease complex
    term:
      id: GO:0000214
      label: tRNA-intron endonuclease complex
  biological_processes:
  - preferred_term: tRNA splicing
    term:
      id: GO:0006388
      label: tRNA splicing, via endonucleolytic cleavage and ligation
  evidence:
  - reference: PMID:34964109
    reference_title: "A splice site mutation in the TSEN2 causes a new syndrome with craniofacial and central nervous system malformations, and atypical hemolytic uremic syndrome."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Bulk RNA sequencing of peripheral blood cells of four affected
      individuals revealed abnormal tRNA transcripts, indicating an alteration
      of the tRNA biogenesis.
    explanation: >-
      Patient-derived RNA sequencing directly links TSEN2 splice disruption to
      abnormal tRNA biogenesis.
  - reference: PMID:40858833
    reference_title: "Biallelic TSEN2 variants causing pontocerebellar hypoplasia type 2."
    supports: SUPPORT
    evidence_source: COMPUTATIONAL
    snippet: >-
      Structural modeling suggested that p.(Tyr309Cys) moderately destabilizes
      the TSEN2-TSEN54 interface, while p.(Arg350*) truncates the catalytic
      domain.
    explanation: >-
      Structural modeling of a PCH2B allele pair supports TSEN complex
      destabilization as a shared molecular mechanism.
  downstream:
  - target: Neurodevelopmental dysfunction with cerebellar-pontine involvement
    description: Impaired pre-tRNA processing perturbs neural development and maintenance.
  - target: Vascular endothelium homeostasis failure
    description: TSEN2 dysfunction in the TRACK branch is linked to endothelial injury and thrombotic microangiopathy.
- name: Neurodevelopmental dysfunction with cerebellar-pontine involvement
  description: >-
    Across the TSEN2 spectrum, impaired TSEN complex function produces a
    neurodevelopmental phenotype marked by developmental impairment, progressive
    microcephaly, and cerebellar-pontine structural disease. The PCH2B branch
    presents as a classic pontocerebellar hypoplasia phenotype, whereas the
    TRACK branch adds craniofacial and broader CNS malformations.
  cell_types:
  - preferred_term: neuron
    term:
      id: CL:0000540
      label: neuron
  evidence:
  - reference: PMID:40858833
    reference_title: "Biallelic TSEN2 variants causing pontocerebellar hypoplasia type 2."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Here, we report a 7-year-old girl with typical PCH2 features, including
      progressive microcephaly, epilepsy, developmental delay, cerebellar
      atrophy, and dystonia.
    explanation: >-
      This recent PCH2B report confirms the core neurodevelopmental and
      cerebellar neurodegenerative branch of TSEN2 disease.
  - reference: PMID:34964109
    reference_title: "A splice site mutation in the TSEN2 causes a new syndrome with craniofacial and central nervous system malformations, and atypical hemolytic uremic syndrome."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Here, we report an intronic recessive founder variant in the gene TSEN2
      that results in abnormal splicing of the mRNA of this gene, in six
      individuals from four consanguineous families affected with microcephaly,
      multiple craniofacial malformations, radiological abnormalities of the
      central nervous system, and cognitive retardation of variable severity.
    explanation: >-
      The TRACK cohort broadens TSEN2 neurodevelopmental disease beyond classic
      PCH2B to include syndromic CNS and craniofacial malformations.
- name: Vascular endothelium homeostasis failure
  description: >-
    The TRACK branch of TSEN2 disease is distinguished from other TSEN-subunit
    disorders by atypical hemolytic uremic syndrome with thrombotic
    microangiopathy, suggesting that defective TSEN2-dependent RNA processing
    can secondarily compromise vascular endothelial homeostasis and trigger
    renal-predominant endotheliopathy.
  cell_types:
  - preferred_term: blood vessel endothelial cell
    term:
      id: CL:0000071
      label: blood vessel endothelial cell
  evidence:
  - reference: PMID:34964109
    reference_title: "A splice site mutation in the TSEN2 causes a new syndrome with craniofacial and central nervous system malformations, and atypical hemolytic uremic syndrome."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Thus, we have identified a novel syndrome accompanied by aHUS suggesting
      the existence of a link between tRNA biology and vascular endothelium
      homeostasis
    explanation: >-
      The discovery paper explicitly proposes endothelial homeostasis failure as
      the distinguishing mechanistic bridge to TSEN2-associated TMA.
  downstream:
  - target: Atypical hemolytic uremic syndrome and kidney failure
    description: Endothelial injury drives renal thrombotic microangiopathy with severe hypertension, proteinuria, and early ESKD.
