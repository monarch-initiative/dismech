    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Remarkably, unlike patients with previously described mutations in the
      components of the TSEN complex, all the individuals that we report
      developed atypical hemolytic uremic syndrome (aHUS) with thrombotic
      microangiopathy, microangiopathic hemolytic anemia, thrombocytopenia,
      proteinuria, severe hypertension, and end-stage kidney disease (ESKD)
      early in life.
    explanation: >-
      This is the defining distinguishing clinical feature of the TRACK branch.
