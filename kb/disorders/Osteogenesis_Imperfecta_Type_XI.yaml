name: Osteogenesis Imperfecta Type XI
creation_date: "2026-06-30T00:00:00Z"
category: Mendelian
disease_term:
  preferred_term: Osteogenesis imperfecta type 11
  term:
    id: MONDO:0012592
    label: osteogenesis imperfecta type 11
description: >-
  Osteogenesis imperfecta type XI (OI type XI) is an autosomal recessive,
  moderately severe to progressive-deforming brittle bone disease caused by
  biallelic loss-of-function variants in FKBP10, the gene encoding FKBP65, a
  65 kDa endoplasmic-reticulum-resident peptidyl-prolyl cis-trans isomerase
  (immunophilin) and molecular chaperone that participates in type I procollagen
  folding and maturation. Unlike the prolyl 3-hydroxylation complex defects of
  OI types VII/VIII/IX, the principal molecular consequence of FKBP65 loss is not
  a generalized collagen-folding failure: helix folding, chain incorporation and
  melting temperature are largely preserved. Instead, FKBP65 is required for
  hydroxylation of the collagen telopeptide lysyl residues that form the
  intermolecular cross-links of bone collagen — acting through (or alongside) the
  lysyl hydroxylase LH2 (PLOD2) — so its absence produces diminished telopeptide
  lysyl hydroxylation, markedly reduced collagen cross-linking, and reduced
  deposition of collagen into a sparse, disorganized extracellular matrix. The
  resulting structurally inadequate bone matrix mineralizes abnormally, yielding
  low bone mass, recurrent fractures, bone deformity, progressive scoliosis and
  short stature. OI type XI sits on a phenotypic continuum with Bruck syndrome
  (OI with congenital joint contractures): FKBP10 mutations cause both
  contracture-free recessive OI and Bruck-syndrome-like OI with congenital
  contractures, and the FKBP10/PLOD2 telopeptide-cross-linking axis explains the
  mechanistic overlap between FKBP10-related OI and PLOD2-related Bruck syndrome
  type II. The disorder was first defined as a distinct recessive OI in
  consanguineous Turkish and Mexican-American kindreds (Alanay et al., 2010).
