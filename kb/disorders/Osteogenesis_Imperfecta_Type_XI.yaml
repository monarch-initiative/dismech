genetic:
- name: FKBP10 (FKBP65) Loss-of-Function Mutation
  association: Causative
  gene_term:
    preferred_term: FKBP10 (FKBP65, ER peptidyl-prolyl isomerase/chaperone)
    term:
      id: hgnc:18169
      label: FKBP10
  notes: >-
    OI type XI is caused by biallelic loss-of-function variants in FKBP10, which
    encodes the 65 kDa ER peptidyl-prolyl cis-trans isomerase/chaperone FKBP65.
    Most reported alleles introduce premature termination codons or frameshifts
    (e.g., the recurrent c.831_832insC) leading to mRNA instability, or are
    missense variants that cause loss of most of the protein. The same gene
    underlies both contracture-free recessive OI and Bruck-syndrome-like OI with
    congenital contractures (FKBP10-related Bruck syndrome, often designated
    Bruck syndrome type 1), reflecting a phenotypic continuum.
  evidence:
  - reference: PMID:20362275
    reference_title: "Mutations in the gene encoding the RER protein FKBP65 cause autosomal-recessive osteogenesis imperfecta."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      homozygosity for mutations in FKBP10, which encodes FKBP65, a chaperone that
      participates in type I procollagen folding, was identified. Further, we
      determined that FKBP10 mutations affect type I procollagen secretion.
    explanation: >-
      Identifies homozygous FKBP10 (FKBP65) mutations as the cause of recessive
      OI, defining the OI type XI gene.
  - reference: PMID:20839288
    reference_title: "Mutations in FKBP10 cause recessive osteogenesis imperfecta and Bruck syndrome."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Here we describe five families with OI-like bone fragility in association
      with congenital contractures who all had FKBP10 mutations. Therefore, we
      conclude that FKBP10 mutations are a cause of recessive osteogenesis
      imperfecta and Bruck syndrome
    explanation: >-
      Establishes FKBP10 mutations as a cause of both recessive OI and
      Bruck syndrome, documenting the contracture-associated end of the spectrum.
phenotypes:
- name: Recurrent Fractures
  description: >-
    Bone fragility with recurrent fractures, frequently beginning at or near
    birth, the cardinal feature of OI type XI.
  phenotype_term:
    preferred_term: Recurrent fractures
    term:
      id: HP:0002757
      label: Recurrent fractures
  evidence:
  - reference: PMID:22949511
    reference_title: "Mutations in FKBP10, which result in Bruck syndrome and recessive forms of osteogenesis imperfecta, inhibit the hydroxylation of telopeptide lysines in bone collagen."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      The clinical effects of these mutations are short stature, a high incidence
      of joint contractures at birth and progressive scoliosis and fractures, but
      there is remarkable variability in phenotype even within families.
    explanation: >-
      Documents fractures as a core clinical effect of FKBP10 mutations in OI
      type XI.
- name: Reduced Bone Mineral Density
  description: >-
    Low bone mass / reduced bone mineral density reflecting the undercrosslinked,
    sparsely deposited, abnormally mineralized collagen matrix.
  phenotype_term:
    preferred_term: Reduced bone mineral density
    term:
      id: HP:0004349
      label: Reduced bone mineral density
  evidence:
  - reference: PMID:22949511
    reference_title: "Mutations in FKBP10, which result in Bruck syndrome and recessive forms of osteogenesis imperfecta, inhibit the hydroxylation of telopeptide lysines in bone collagen."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      These findings define a set of genes, FKBP10, PLOD2 and SERPINH1, that act
      during procollagen maturation to contribute to molecular stability and
      post-translational modification of type I procollagen, without which bone
      mass and quality are abnormal and fractures and contractures result.
    explanation: >-
      Documents abnormal bone mass and quality (reduced bone mineral density)
      resulting from FKBP10 deficiency.
- name: Growth Deficiency
  description: >-
    Short stature / growth deficiency, a consistent clinical feature of
    FKBP10-related OI type XI.
  phenotype_term:
    preferred_term: Growth delay
    term:
      id: HP:0001510
      label: Growth delay
  evidence:
  - reference: PMID:22949511
    reference_title: "Mutations in FKBP10, which result in Bruck syndrome and recessive forms of osteogenesis imperfecta, inhibit the hydroxylation of telopeptide lysines in bone collagen."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      The clinical effects of these mutations are short stature, a high incidence
      of joint contractures at birth and progressive scoliosis and fractures
    explanation: >-
      Documents short stature (growth deficiency) as a clinical effect of FKBP10
      mutations.
- name: Congenital Joint Contractures (Bruck-Syndrome Overlap)
  description: >-
    Congenital joint contractures occur at high incidence in the Bruck-syndrome
    end of the FKBP10 phenotypic spectrum, distinguishing FKBP10-related Bruck
    syndrome from contracture-free recessive OI caused by the same gene. The
    contractures and bone fragility share the diminished-telopeptide-cross-linking
    mechanism that FKBP10-related disease holds in common with PLOD2-related
    Bruck syndrome type II.
  phenotype_term:
    preferred_term: Congenital joint contractures
    term:
      id: HP:0002803
      label: Congenital contracture
  evidence:
  - reference: PMID:20839288
    reference_title: "Mutations in FKBP10 cause recessive osteogenesis imperfecta and Bruck syndrome."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Bruck syndrome is a recessive disorder featuring congenital contractures in
      addition to bone fragility
    explanation: >-
      Documents congenital contractures as the defining feature of the Bruck
      syndrome end of the FKBP10 phenotypic spectrum.
  - reference: PMID:22949511
    reference_title: "Mutations in FKBP10, which result in Bruck syndrome and recessive forms of osteogenesis imperfecta, inhibit the hydroxylation of telopeptide lysines in bone collagen."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      a high incidence of joint contractures at birth
    explanation: >-
      Documents the high incidence of congenital joint contractures in the FKBP10
      cohort, the Bruck-overlap phenotype.
diagnosis:
- name: Molecular Genetic Diagnosis
  description: >-
    OI type XI is suspected in an individual with moderately severe to
    progressive-deforming recessive OI (recurrent fractures, low bone mass,
    deformity, short stature, ± congenital joint contractures suggesting
    Bruck-syndrome overlap) when COL1A1/COL1A2 and the recessive
    3-hydroxylation-complex genes (CRTAP, P3H1/LEPRE1, PPIB) are negative.
    Diagnosis is confirmed by identifying biallelic FKBP10 loss-of-function
    variants by gene-panel or exome sequencing. Supportive findings include
    absence of FKBP65 protein and biochemical demonstration of diminished
    collagen telopeptide lysyl hydroxylation and cross-linking.
  diagnosis_term:
    preferred_term: molecular genetic testing
    term:
      id: MAXO:0000533
      label: molecular genetic testing
  evidence:
  - reference: PMID:20362275
    reference_title: "Mutations in the gene encoding the RER protein FKBP65 cause autosomal-recessive osteogenesis imperfecta."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      homozygosity for mutations in FKBP10, which encodes FKBP65, a chaperone that
      participates in type I procollagen folding, was identified.
    explanation: >-
      Molecular identification of biallelic FKBP10 variants establishes the
      diagnosis of OI type XI.
treatments:
- name: Bisphosphonate Therapy
  description: >-
    Intravenous bisphosphonates (e.g., pamidronate, zoledronic acid) are the
    pharmacological mainstay of severe OI, increasing bone mineral density and
    reducing fracture frequency. They are antiresorptive and do not correct the
    underlying collagen-cross-linking defect.
  treatment_term:
    preferred_term: bisphosphonate agent therapy
    term:
      id: MAXO:0000954
      label: bisphosphonate agent therapy
  evidence:
  - reference: PMID:20301472
    reference_title: "COL1A1- and COL1A2-Related Osteogenesis Imperfecta."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Bisphosphonates continue to be used most extensively in those with
      vertebral fractures, frequent long bone fractures, or more severe OI.
    explanation: >-
      GeneReviews documents bisphosphonates as the mainstay pharmacotherapy for
      severe OI, the management category that applies to OI type XI.
- name: Orthopedic Surgery and Intramedullary Rodding
  description: >-
    Intramedullary (telescoping) rod fixation and corrective osteotomy stabilize
    fracture-prone, deformed long bones; spinal surgery addresses progressive
    scoliosis. In FKBP10-related OI type XI, corrective orthopedic procedures and
    intramedullary rodding have been used to restore ambulation.
  treatment_term:
    preferred_term: surgical procedure
    term:
      id: MAXO:0000004
      label: surgical procedure
  evidence:
  - reference: PMID:20301472
    reference_title: "COL1A1- and COL1A2-Related Osteogenesis Imperfecta."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      intramedullary rodding when
      indicated to provide anatomic positioning of limbs
    explanation: >-
      GeneReviews documents intramedullary rodding as standard orthopedic
      management for OI long-bone fractures and deformity.
- name: Physical Therapy and Rehabilitation
  description: >-
    Physical and occupational therapy increase mobility and muscle strength,
    improve bone stability, and help prevent contractures and deformity — of
    particular relevance in the Bruck-overlap arm with congenital joint
    contractures; early physical therapy follows brief post-fracture
    immobilization.
  treatment_term:
    preferred_term: physical therapy
    term:
      id: MAXO:0000011
      label: physical therapy
  evidence:
  - reference: PMID:20301472
    reference_title: "COL1A1- and COL1A2-Related Osteogenesis Imperfecta."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Fractures are treated with as
      short a period of immobility as is practical, small and lightweight casts, and
      physical therapy as soon as casts are removed
    explanation: >-
      GeneReviews documents early physical therapy and brief immobilization as
      part of standard OI fracture rehabilitation.
