  evidence:
  - reference: PMID:22949511
    reference_title: "Mutations in FKBP10, which result in Bruck syndrome and recessive forms of osteogenesis imperfecta, inhibit the hydroxylation of telopeptide lysines in bone collagen."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      We identified mutations in FKBP10, which encodes the 65 kDa prolyl cis-trans
      isomerase, FKBP65, in 38 members of 21 families with OI.
    explanation: >-
      Identifies FKBP10/FKBP65 (a 65 kDa prolyl cis-trans isomerase) loss as the
      proximal lesion in a large recessive-OI cohort.
  - reference: PMID:22718341
    reference_title: "Absence of FKBP10 in recessive type XI osteogenesis imperfecta leads to diminished collagen cross-linking and reduced collagen deposition in extracellular matrix."
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: >-
      a child with moderate type XI OI has a homozygous FKBP10 mutation
      (c.1271_1272delCCinsA). Proband FKBP10 transcripts are 4% of control and
      FKBP65 protein is absent from proband cells.
    explanation: >-
      Demonstrates that the type XI OI FKBP10 variant abolishes FKBP65 protein in
      patient cells, the proximal molecular defect.
  - reference: PMID:22718341
    reference_title: "Absence of FKBP10 in recessive type XI osteogenesis imperfecta leads to diminished collagen cross-linking and reduced collagen deposition in extracellular matrix."
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: >-
      Normal chain incorporation, helix folding, and collagen T(m) support a
      minimal general collagen chaperone role for FKBP65.
    explanation: >-
      Establishes that FKBP65 loss does not impair general collagen folding,
      distinguishing OI type XI mechanism from a generalized folding-chaperone
      defect.
  downstream:
  - target: Diminished Telopeptide Lysyl Hydroxylation and Collagen Cross-Linking
    description: >-
      Without FKBP65, hydroxylation of the collagen telopeptide lysines required
      for intermolecular cross-link formation is diminished, reducing collagen
      cross-linking.
- name: Diminished Telopeptide Lysyl Hydroxylation and Collagen Cross-Linking
  description: >-
    FKBP65 is required for hydroxylation of the telopeptide lysyl residues that
    form the intermolecular cross-links of bone collagen, acting through or
    alongside the lysyl hydroxylase LH2 (PLOD2) — possibly via its peptidyl-prolyl
    isomerase function granting LH2 access to the telopeptide lysines. In its
    absence, mass spectrometry shows near-absence of telopeptide lysine
    hydroxylation in secreted collagen, producing diminished intermolecular
    cross-linking. This shared telopeptide-cross-linking axis mechanistically
    links FKBP10-related OI to PLOD2-related Bruck syndrome type II.
