    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      there is diminished hydroxylation of the telopeptide lysyl residues involved
      in intermolecular cross-link formation in bone. The phenotype overlaps with
      that seen with mutations in PLOD2 (Bruck syndrome II), which encodes LH2, the
      enzyme that hydroxylates the telopeptide lysyl residues.
    explanation: >-
      Documents diminished telopeptide lysyl hydroxylation and intermolecular
      cross-linking on FKBP65 loss, and the mechanistic overlap with PLOD2/LH2
      Bruck syndrome type II.
  - reference: PMID:22718341
    reference_title: "Absence of FKBP10 in recessive type XI osteogenesis imperfecta leads to diminished collagen cross-linking and reduced collagen deposition in extracellular matrix."
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: >-
      Mass spectrometry reveals absence of hydroxylation of the collagen
      telopeptide lysine involved in cross-linking, suggesting that FKBP65 is
      required for lysyl hydroxylase activity or access to type I collagen
      telopeptide lysines, perhaps through its function as a peptidylprolyl
      isomerase.
    explanation: >-
      Provides direct mass-spectrometry evidence that FKBP65 loss abolishes
      telopeptide lysine hydroxylation, the cross-linking defect underlying the
      matrix abnormality.
  downstream:
  - target: Reduced Collagen Deposition, Defective Bone Matrix, and Fragility
    description: >-
      Undercrosslinked collagen is poorly deposited into the extracellular matrix,
      forming a sparse, disorganized, abnormally mineralized bone matrix that is
      mechanically fragile.
- name: Reduced Collagen Deposition, Defective Bone Matrix, and Fragility
  description: >-
    The undercrosslinked collagen is deposited into the extracellular matrix in
    markedly reduced amounts despite near-normal secretion, producing sparse,
    disorganized collagen fibrils and a collagen-to-mineral matrix ratio far below
    normal. The structurally inadequate, abnormally mineralized bone matrix
    yields low bone mass and severe skeletal fragility, manifesting clinically as
    recurrent fractures, bone deformity, progressive scoliosis and short stature;
    in the Bruck-overlap arm of the spectrum, congenital joint contractures
    accompany the bone fragility.
