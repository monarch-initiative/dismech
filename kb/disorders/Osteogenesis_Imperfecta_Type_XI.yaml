inheritance:
- name: Autosomal Recessive
  description: >-
    Autosomal recessive inheritance from biallelic (homozygous or compound
    heterozygous) loss-of-function FKBP10 variants; heterozygous carriers are
    clinically unaffected.
  inheritance_term:
    preferred_term: Autosomal recessive inheritance
    term:
      id: HP:0000007
      label: Autosomal recessive inheritance
  evidence:
  - reference: PMID:20362275
    reference_title: "Mutations in the gene encoding the RER protein FKBP65 cause autosomal-recessive osteogenesis imperfecta."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      We studied a cohort of five consanguineous Turkish families, originating
      from the Black Sea region of Turkey, with moderately severe recessively
      inherited OI and identified a novel locus for OI on chromosome 17. In these
      families, and in a Mexican-American family, homozygosity for mutations in
      FKBP10, which encodes FKBP65, a chaperone that participates in type I
      procollagen folding, was identified.
    explanation: >-
      Establishes the autosomal recessive inheritance of OI type XI from biallelic
      (homozygous) FKBP10 (FKBP65) loss-of-function variants in consanguineous
      kindreds.
pathophysiology:
- name: FKBP10 Loss Eliminates the ER Chaperone/Isomerase FKBP65
  description: >-
    FKBP10 encodes FKBP65, a 65 kDa endoplasmic-reticulum-resident peptidyl-prolyl
    cis-trans isomerase and immunophilin that acts as a chaperone in type I
    procollagen folding and maturation. Biallelic loss-of-function FKBP10 variants
    (frameshifts and premature termination codons causing mRNA instability, or
    missense variants causing loss of most of the protein) eliminate FKBP65 from
    the ER. In contrast to the prolyl 3-hydroxylation complex (CRTAP/P3H1/CyPB,
    deficient in OI types VII/VIII/IX), loss of FKBP65 leaves general collagen
    helical folding, chain incorporation and thermal stability largely intact,
    pointing to a more specialized role in collagen post-translational
    modification rather than bulk folding.
  cell_types:
  - preferred_term: osteoblast
    term:
