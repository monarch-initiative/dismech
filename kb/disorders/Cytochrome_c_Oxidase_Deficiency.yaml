    Biallelic loss-of-function COA8 variants cause isolated Complex IV
    deficiency, classically with cavitating leukoencephalopathy and, in a
    familial report, a prominent mitochondrial myopathy phenotype.
  evidence:
  - reference: PMID:38098475
    reference_title: "Prominent muscle involvement in a familial form of mitochondrial disease due to a COA8 variant."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: Whole Exome Sequencing analysis identified the novel homozygous COA8 defect c.170_173dupGACC, p.(Pro59fs) in the probands.
    explanation: Identifies a homozygous COA8 loss-of-function variant as the cause of isolated COX deficiency in an affected family.
- name: COX10 pathogenic variants causing COX deficiency
  gene_term:
    preferred_term: COX10
    term:
      id: hgnc:2260
      label: COX10
  features: >
    Variants in COX10 (heme O synthase, required for heme a biosynthesis) cause
    isolated COX deficiency and have been detected among nuclear-gene causes of
    Leigh syndrome.
  evidence:
  - reference: PMID:36675121
    reference_title: "Leigh syndrome: spectrum of molecular defects and clinical features in Russia."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "we were able to detect pathogenic variants in other nuclear genes: NDUFV1, NDUFS2, NDUFS8, NDUFAF5, NDUFAF6, NDUFA10, SUCLG1, GFM2, COX10, PMPCB, NARS2, PDHB and SLC19A3"
    explanation: COX10 is identified among the nuclear genes carrying pathogenic variants in a Leigh syndrome cohort.
treatments:
- name: Supportive and Metabolic Care
  description: >
    No curative therapy exists. Management is supportive and includes treatment
    of lactic acidosis, nutritional support, and avoidance of metabolic
    decompensation. Vitamin and cofactor "mitochondrial cocktails" are commonly
    used though evidence of efficacy is limited.
  treatment_term:
    preferred_term: supportive care
    term:
      id: MAXO:0000950
      label: supportive care
  evidence:
  - reference: PMID:20301352
    reference_title: "Mitochondrial DNA-Associated Leigh Syndrome Spectrum."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Treatment is supportive."
    explanation: GeneReviews states that management of the Leigh syndrome spectrum (including COX deficiency) is supportive, with organ-specific symptomatic care.
