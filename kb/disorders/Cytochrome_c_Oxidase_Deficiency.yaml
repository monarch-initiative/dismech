    explanation: Encephalomyopathy and Leigh syndrome (subacute necrotizing encephalopathy) are listed as human manifestations of COX deficiency.
biochemical:
- name: Reduced cytochrome c oxidase (Complex IV) enzyme activity
  presence: DECREASED
  context: >
    Decreased cytochrome c oxidase specific activity is the defining biochemical
    feature of the disorder and is measured spectrophotometrically or
    histochemically in skeletal muscle, fibroblasts, or affected tissues. In
    SURF1-related Leigh syndrome, residual COX activity in patient fibroblasts
    is markedly reduced relative to controls.
  evidence:
  - reference: PMID:39632678
    reference_title: "SURF1 Deficiency: Expanding on Disease Phenotype and Assessing Disease Burden by Describing Clinical and Biochemical Phenotype."
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: Patient COX activity was at most 50% of controls, averaging 32%
    explanation: Quantifies the reduced COX (Complex IV) enzyme activity measured in SURF1-deficient patient fibroblasts.
- name: Lactic acidosis (elevated blood/CSF lactate)
  presence: INCREASED
  context: >
    Elevated lactate in blood and/or cerebrospinal fluid reflects the shift to
    anaerobic glycolysis when oxidative phosphorylation fails, and is a common
    biochemical signature during metabolic decompensation.
  evidence:
  - reference: PMID:20301352
    reference_title: "Mitochondrial DNA-Associated Leigh Syndrome Spectrum."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: Decompensation (often with elevated lactate levels in blood and/or cerebrospinal fluid) is typically associated with developmental delay and/or regression.
    explanation: GeneReviews documents elevated blood/CSF lactate as a biochemical marker of decompensation in the Leigh syndrome spectrum.
genetic:
- name: SURF1 pathogenic variants causing COX deficiency
  gene_term:
    preferred_term: SURF1
    term:
      id: hgnc:11474
      label: SURF1
  inheritance:
  - name: Autosomal recessive
    evidence:
    - reference: PMID:39632678
      reference_title: "SURF1 Deficiency: Expanding on Disease Phenotype and Assessing Disease Burden by Describing Clinical and Biochemical Phenotype."
      supports: SUPPORT
      evidence_source: HUMAN_CLINICAL
      snippet: Leigh syndrome, a severe neurological disorder is commonly caused by homozygous or bi-allelic pathogenic variants in the SURF1 gene.
      explanation: Documents biallelic (autosomal recessive) SURF1 variants as the common cause of SURF1-related Leigh syndrome.
  features: >
    Biallelic loss-of-function variants in SURF1, encoding a Complex IV
    assembly factor, are the most common nuclear cause of isolated COX
    deficiency and Leigh syndrome.
  evidence:
  - reference: PMID:39632678
    reference_title: "SURF1 Deficiency: Expanding on Disease Phenotype and Assessing Disease Burden by Describing Clinical and Biochemical Phenotype."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: SURF1 deficiency leads to dysfunction of Cytochrome C Oxidase (COX) activity, which is crucial for mitochondrial oxidative phosphorylation.
    explanation: Confirms SURF1 loss causes COX (Complex IV) dysfunction, the biochemical basis of this nuclear COX deficiency subtype.
  - reference: PMID:10545952
    reference_title: "Fatal infantile cardioencephalomyopathy with COX deficiency and mutations in SCO2, a COX assembly gene."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: SURF1, the only other known COX assembly gene associated with a human disease, Leigh syndrome.
    explanation: Identifies SURF1 as a COX assembly gene whose mutations cause Leigh syndrome.
- name: SCO2 pathogenic variants causing COX deficiency
  gene_term:
    preferred_term: SCO2
    term:
      id: hgnc:10604
      label: SCO2
  features: >
    Biallelic SCO2 variants impair copper delivery to COX, causing fatal
