name: Cytochrome c Oxidase Deficiency
category: Mendelian
creation_date: "2026-05-30T00:00:00Z"
synonyms:
- COX deficiency
- Complex IV deficiency
- Mitochondrial complex IV deficiency
- Isolated cytochrome c oxidase deficiency
description: >
  Cytochrome c oxidase (COX) deficiency is an inherited mitochondrial disorder
  caused by reduced activity of Complex IV of the mitochondrial respiratory
  chain. Cytochrome c oxidase is the terminal enzyme of the electron transport
  chain, transferring electrons from reduced cytochrome c to molecular oxygen
  and contributing to the proton-motive force used for ATP synthesis. The
  holoenzyme is a multi-subunit complex whose three catalytic core subunits
  (MT-CO1, MT-CO2, MT-CO3) are encoded by mitochondrial DNA and whose remaining
  subunits, together with a large set of assembly factors (e.g., SURF1, SCO1,
  SCO2, COX10, COX15, COX14, COA3), are encoded by nuclear DNA. Isolated COX
  deficiency is therefore genetically heterogeneous, arising from pathogenic
  variants in mtDNA-encoded structural subunits or, more commonly, in
  nuclear-encoded assembly factors. Clinically the disorder is highly variable,
  ranging from fatal infantile encephalopathy (Leigh syndrome) and hypertrophic
  cardiomyopathy to hepatopathy, myopathy, and milder later-onset forms. Lactic
  acidosis is a common biochemical hallmark.
disease_term:
  preferred_term: cytochrome c oxidase deficiency
  term:
    id: MONDO:0033885
    label: mitochondrial complex IV deficiency, nuclear-type
notes: >
  This is a grouping/umbrella entry for isolated cytochrome c oxidase (Complex
  IV) deficiency. MONDO has no non-obsolete grouping class that spans both
  nuclear and mtDNA-encoded forms: the historical umbrella "cytochrome-c oxidase
  deficiency disease" (MONDO:0009068) is obsolete, and unlike Complex I (which
  has the pan-form grouping MONDO:0100133) there is no equivalent pan-form
  Complex IV term. MONDO:0033885 "mitochondrial complex IV deficiency,
  nuclear-type" is used as the closest available umbrella (it is the parent of
  the MC4DN nuclear type 1-23 series); preferred_term is broadened to
  "cytochrome c oxidase deficiency" and the mtDNA-encoded forms (MT-CO1/2/3) are
  represented via has_subtypes. An NTR for a generic "mitochondrial complex IV
  deficiency" grouping class would let this entry point to a semantically exact
  term.
parents:
