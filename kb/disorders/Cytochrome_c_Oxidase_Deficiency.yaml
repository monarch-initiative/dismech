biochemical:
- name: Reduced cytochrome c oxidase (Complex IV) enzyme activity
  presence: DECREASED
  context: >
    Decreased cytochrome c oxidase specific activity is the defining biochemical
    feature of the disorder and is measured spectrophotometrically or
    histochemically in skeletal muscle, fibroblasts, or affected tissues. In
    SURF1-related Leigh syndrome, residual COX activity in patient fibroblasts
    is markedly reduced relative to controls.
  evidence:
  - reference: PMID:39632678
    reference_title: "SURF1 Deficiency: Expanding on Disease Phenotype and Assessing Disease Burden by Describing Clinical and Biochemical Phenotype."
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: Patient COX activity was at most 50% of controls, averaging 32%
    explanation: Quantifies the reduced COX (Complex IV) enzyme activity measured in SURF1-deficient patient fibroblasts.
  - reference: PMID:38154062
    reference_title: "Cytochrome c oxidase deficiency detection in human fibroblasts using scanning electrochemical microscopy."
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: This study demonstrates the applicability of scanning electrochemical microscopy to quantify COX activity in living human fibroblast cells.
    explanation: Demonstrates an emerging less-invasive method to quantify reduced COX activity in patient fibroblasts; the artifact image contrasts control versus SCO1-deficient fibroblasts.
    images:
    - Cytochrome_c_Oxidase_Deficiency-deep-research-falcon_artifacts/image-1.png
- name: Lactic acidosis (elevated blood/CSF lactate)
