prevalence:
- notes: >
    Isolated COX (Complex IV) deficiency is one of the most common
    respiratory-chain enzyme defects. In Leigh syndrome cohorts, nuclear SURF1
    variants are the leading identifiable cause.
  evidence:
  - reference: PMID:38098475
    reference_title: "Prominent muscle involvement in a familial form of mitochondrial disease due to a COA8 variant."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: Isolated mitochondrial respiratory chain Complex IV (Cytochrome c Oxidase or COX) deficiency is the second most frequent isolated respiratory chain defect.
    explanation: Establishes that isolated COX/Complex IV deficiency is the second most frequent isolated respiratory chain defect.
  - reference: PMID:36675121
    reference_title: "Leigh syndrome: spectrum of molecular defects and clinical features in Russia."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: The most common cause of LS in Russian patients are pathogenic variants in the SURF1 gene (44.3% of patients).
    explanation: In a 219-patient Leigh syndrome cohort, SURF1 (a COX assembly gene) was the single most common cause.
progression:
- notes: >
    Disease course is highly variable, from fatal infantile encephalopathy or
    cardioencephalomyopathy to milder later-onset myopathic forms. Severe
    early-onset Leigh syndrome spectrum disease carries high mortality in the
    first years of life, frequently from respiratory or cardiac failure.
  evidence:
  - reference: PMID:20301352
    reference_title: "Mitochondrial DNA-Associated Leigh Syndrome Spectrum."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: Up to 50% of individuals die by age three years, most often from respiratory or cardiac failure.
    explanation: GeneReviews quantifies early mortality in the Leigh syndrome spectrum that includes mtDNA-encoded COX deficiency.
  - reference: PMID:33171185
    reference_title: "Cytochrome c oxidase deficiency."
    supports: SUPPORT
    evidence_source: OTHER
    snippet: disease onsets ranging from birth to late adulthood
    explanation: Documents the wide range of onset and disease natural history in COX deficiency.
has_subtypes:
- name: SURF1 Leigh
  display_name: SURF1-related Leigh syndrome
  description: >
    The most common nuclear cause of isolated COX deficiency, due to biallelic
    SURF1 variants. Presents in infancy with subacute necrotizing
    encephalomyelopathy (Leigh syndrome), psychomotor regression, brainstem and
    basal ganglia lesions, and lactic acidosis.
  evidence:
  - reference: PMID:10545952
    reference_title: "Fatal infantile cardioencephalomyopathy with COX deficiency and mutations in SCO2, a COX assembly gene."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: SURF1, the only other known COX assembly gene associated with a human disease, Leigh syndrome.
    explanation: Identifies SURF1 mutations as a COX assembly defect causing Leigh syndrome, the basis of this subtype.
- name: SCO2 cardioencephalomyopathy
  display_name: SCO2-related fatal infantile cardioencephalomyopathy
  description: >
    Fatal infantile cardioencephalomyopathy due to biallelic SCO2 variants,
    characterized by hypertrophic cardiomyopathy, encephalopathy, and early
    death.
  evidence:
  - reference: PMID:10545952
    reference_title: "Fatal infantile cardioencephalomyopathy with COX deficiency and mutations in SCO2, a COX assembly gene."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: we have identified mutations in the human homologue, SCO2, in three unrelated infants with a newly recognized fatal cardioencephalomyopathy and COX deficiency.
    explanation: Original description of the SCO2-related fatal infantile cardioencephalomyopathy subtype.
- name: SCO1 hepatoencephalopathy
  display_name: SCO1-related COX deficiency (MC4DN4)
  description: >
    Mitochondrial complex IV deficiency nuclear type 4 (MC4DN4), due to SCO1
    variants affecting copper delivery. The classic presentation is neonatal
    hepatic failure, encephalopathy, lactic acidosis, and cardiomyopathy; the
    phenotypic spectrum has been expanded to include developmental and epileptic
    encephalopathy with progressive hypopituitarism.
  evidence:
  - reference: PMID:11013136
    reference_title: "Mutations of the SCO1 gene in mitochondrial cytochrome c oxidase deficiency with neonatal-onset hepatic failure and encephalopathy."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: Mutation screening revealed compound heterozygosity for SCO1 gene mutations in the patients.
    explanation: Identifies SCO1 mutations as the cause of isolated COX deficiency in a family with neonatal-onset disease, defining this subtype.
  - reference: PMID:39214134
    reference_title: "Endocrinological features and epileptic encephalopathy in COX deficiency due to SCO1 mutations: case series and review of literature."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: Mitochondrial complex IV deficiency nuclear type 4 (MC4DN4) is a form of COX deficiency associated with pathogenic variants in the SCO1 gene.
    explanation: Confirms SCO1 variants cause MC4DN4, the formal designation of this COX deficiency subtype.
  - reference: PMID:39214134
    reference_title: "Endocrinological features and epileptic encephalopathy in COX deficiency due to SCO1 mutations: case series and review of literature."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: We describe three patients with MC4DN4 with developmental and epileptic encephalopathy (DEE), hypopituitarism, and SCO1 pathogenic variants.
    explanation: Documents the expanded SCO1/MC4DN4 phenotype including developmental and epileptic encephalopathy and hypopituitarism.
- name: mtDNA COX subunit
  display_name: mtDNA-encoded COX subunit deficiency
  description: >
    COX deficiency due to pathogenic variants in mitochondrial DNA-encoded
    catalytic subunits MT-CO1, MT-CO2, or MT-CO3, with variable maternally
    inherited or sporadic presentations.
  evidence:
  - reference: PMID:10545952
    reference_title: "Fatal infantile cardioencephalomyopathy with COX deficiency and mutations in SCO2, a COX assembly gene."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: Mitochondrial DNA (mtDNA) encodes three COX subunits (I-III) and nuclear DNA (nDNA) encodes ten.
    explanation: Establishes that three COX catalytic subunits are mtDNA-encoded, the structural basis for the mtDNA-encoded COX subunit deficiency subtype.
pathophysiology:
- name: Impaired Terminal Electron Transfer and ATP Synthesis
  conforms_to: "complex_iv_assembly_deficiency#Impaired Terminal Electron Transfer and ATP Synthesis"
  description: >
    Loss of cytochrome c oxidase activity blocks the terminal step of the
    electron transport chain, preventing transfer of electrons from cytochrome
    c to molecular oxygen and reducing proton pumping across the inner
    mitochondrial membrane. This collapses the proton-motive force and impairs
    oxidative ATP synthesis, leading to an energy deficit in highly
    oxidative tissues such as brain, heart, and skeletal muscle.
  evidence:
  - reference: PMID:19682572
    reference_title: "Cytochrome c oxidase deficiency: patients and animal models."
    supports: SUPPORT
    evidence_source: OTHER
    snippet: COX is a multimeric inner mitochondrial membrane enzyme formed by subunits encoded by both the nuclear and the mitochondrial genome.
    explanation: Establishes that cytochrome c oxidase is the inner-membrane respiratory enzyme with dual-genome subunit origin underlying the energy defect.
  - reference: PMID:10545952
    reference_title: "Fatal infantile cardioencephalomyopathy with COX deficiency and mutations in SCO2, a COX assembly gene."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: Mammalian cytochrome c oxidase (COX) catalyses the transfer of reducing equivalents from cytochrome c to molecular oxygen and pumps protons across the inner mitochondrial membrane.
    explanation: Describes the normal terminal electron-transfer and proton-pumping function of COX that is lost in COX deficiency.
  cell_types:
  - preferred_term: neuron
    term:
      id: CL:0000540
      label: neuron
  biological_processes:
  - preferred_term: aerobic respiration
    term:
      id: GO:0009060
      label: aerobic respiration
    modifier: DECREASED
  - preferred_term: ATP synthesis coupled electron transport
    term:
      id: GO:0042775
      label: mitochondrial ATP synthesis coupled electron transport
    modifier: DECREASED
  downstream:
  - target: Lactic Acidosis from Reduced Oxidative Metabolism
    causal_link_type: DIRECT
    description: >
      Failure of oxidative ATP synthesis forces a shift to anaerobic
      glycolysis, driving lactate accumulation.
  - target: Encephalopathy
    causal_link_type: INDIRECT_UNKNOWN_INTERMEDIATES
    description: >
      Energy deficit in highly oxidative neural tissue produces the
      necrotizing encephalopathy/Leigh lesions.
- name: Defective Complex IV Assembly
  conforms_to: "complex_iv_assembly_deficiency#Complex IV Biogenesis Failure"
  description: >
    Most nuclear genetic causes of isolated COX deficiency disrupt assembly
    factors rather than structural subunits. SURF1 is required for early COX
    assembly; SCO1 and SCO2 mediate copper delivery to the CuA and CuB centers;
    COX10 and COX15 catalyze heme a biosynthesis. Loss of these factors
    prevents maturation of a functional holoenzyme.
  evidence:
  - reference: PMID:19682572
    reference_title: "Cytochrome c oxidase deficiency: patients and animal models."
    supports: SUPPORT
    evidence_source: OTHER
    snippet: COX biosynthesis requires numerous assembly factors that do not form part of the final complex but participate in prosthetic group synthesis and metal delivery in addition to membrane insertion and maturation of COX subunits.
    explanation: Supports the mechanism that nuclear-encoded assembly factors mediate metal/cofactor delivery and subunit maturation, the step disrupted in most nuclear COX deficiency.
  - reference: PMID:33171185
    reference_title: "Cytochrome c oxidase deficiency."
    supports: SUPPORT
    evidence_source: OTHER
    snippet: More than 30 genes have been linked to COX deficiency
    explanation: Documents the large number of genes (structural subunits plus assembly factors) whose loss causes COX deficiency.
  biological_processes:
  - preferred_term: mitochondrial respiratory chain complex IV assembly
    term:
      id: GO:0033617
      label: mitochondrial respiratory chain complex IV assembly
    modifier: DECREASED
  downstream:
  - target: Impaired Terminal Electron Transfer and ATP Synthesis
    causal_link_type: DIRECT
    description: >
      Failure to assemble a mature holoenzyme abolishes terminal electron
      transfer and proton pumping.
- name: Defective Copper Delivery and Heme A Biosynthesis
  conforms_to: "complex_iv_assembly_deficiency#Complex IV Biogenesis Failure"
  description: >
    Assembly of a functional COX holoenzyme requires insertion of copper into
    the CuA (COX2) and CuB (COX1) catalytic centers and incorporation of heme a.
    Copper is delivered through a metallochaperone relay (COX17 to SCO1/SCO2 and
    COX11, with accessory factors such as COA6), while COX10 (heme O synthase)
    and COX15 (heme A synthase) generate the heme a cofactor. Pathogenic
    variants in these copper-delivery and heme-biosynthesis factors prevent
    cofactor insertion and cause isolated COX deficiency.
  biological_processes:
  - preferred_term: copper ion transport
    term:
      id: GO:0006825
      label: copper ion transport
    modifier: DECREASED
  - preferred_term: heme A biosynthetic process
    term:
      id: GO:0006784
      label: heme A biosynthetic process
    modifier: DECREASED
  evidence:
  - reference: PMID:36435678
    reference_title: "Mitochondrial copper in human genetic disorders."
    supports: SUPPORT
    evidence_source: OTHER
    snippet: Mitochondria are critical copper-utilizing organelles that harbor an essential cuproenzyme cytochrome c oxidase, which powers energy production.
    explanation: Establishes that COX is a copper-dependent enzyme requiring mitochondrial copper delivery for function.
  - reference: PMID:36435678
    reference_title: "Mitochondrial copper in human genetic disorders."
    supports: SUPPORT
    evidence_source: OTHER
    snippet: Mutations in copper transporters and chaperones that perturb mitochondrial copper homeostasis result in fatal genetic disorders.
    explanation: Links disruption of mitochondrial copper-delivery machinery (e.g., SCO1/SCO2) to genetic disease, the mechanism of copper-handling COX deficiency subtypes.
  downstream:
  - target: Impaired Terminal Electron Transfer and ATP Synthesis
    causal_link_type: DIRECT
    description: >
      Failure to insert copper into the CuA/CuB centers or to deliver heme a
      yields a catalytically inactive enzyme, abolishing terminal electron
      transfer.
- name: Lactic Acidosis from Reduced Oxidative Metabolism
  conforms_to: "complex_iv_assembly_deficiency#Lactic Acidosis and Metabolic Decompensation"
  description: >
    Impaired oxidative phosphorylation forces a shift to anaerobic glycolysis,
    increasing pyruvate-to-lactate conversion and producing lactic acidosis,
    a common biochemical hallmark of COX deficiency.
  biological_processes:
  - preferred_term: lactate biosynthetic process
    term:
      id: GO:0019249
      label: lactate biosynthetic process
    modifier: INCREASED
  downstream:
  - target: Lactic acidosis
    causal_link_type: DIRECT
    description: >
      Increased lactate production manifests clinically as the lactic acidosis
      observed in blood and CSF.
