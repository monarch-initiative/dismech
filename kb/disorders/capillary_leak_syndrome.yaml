name: capillary leak syndrome
creation_date: '2026-04-14T12:00:00Z'
updated_date: '2026-04-14T22:30:00Z'
category: Complex
synonyms:
- systemic capillary leak syndrome
- Clarkson disease
description: >-
  Capillary leak syndrome is a rare vascular permeability disorder in which
  episodic endothelial barrier failure causes rapid movement of plasma and
  proteins from the intravascular space into the interstitium. The clinical
  syndrome is characterized by hypotension, edema, hemoconcentration, and
  hypoalbuminemia; idiopathic recurrent disease is often referred to as
  systemic capillary leak syndrome or Clarkson disease.
disease_term:
  preferred_term: capillary leak syndrome
  term:
    id: MONDO:0001956
    label: capillary leak syndrome
parents:
- vascular disorder
- immune-mediated disease
pathophysiology:
- name: Endothelial barrier dysfunction
  description: >-
    The central pathogenic event is abrupt failure of the endothelial barrier,
    allowing proteins and plasma water to escape from the vascular lumen.
  cell_types:
  - preferred_term: endothelial cell
    term:
      id: CL:0000115
      label: endothelial cell
  downstream:
  - target: Plasma extravasation
    description: Barrier failure permits rapid capillary leakage.
- name: Plasma extravasation
  description: >-
    Intravascular proteins and fluid shift into the interstitial compartment,
    contracting effective circulating volume.
  downstream:
  - target: Intravascular volume depletion
    description: Fluid loss from the vascular space lowers effective preload and perfusion.
  - target: Generalized edema
    description: Extravasated fluid accumulates in tissues during the leak phase.
- name: Intravascular volume depletion
  description: >-
    Severe plasma loss produces hypotension and shock physiology during acute
    attacks.
- name: Generalized edema
  description: >-
    Interstitial fluid accumulation follows the capillary leak and contributes
    to the characteristic edematous phase of the disorder.
phenotypes:
- name: Hypotension
  category: Cardiovascular
  frequency: FREQUENT
  description: >-
    Acute attacks commonly present with marked hypotension from abrupt
    intravascular volume depletion.
  phenotype_term:
    preferred_term: Hypotension
    term:
      id: HP:0002615
      label: Hypotension
- name: Edema
  category: Cardiovascular
  frequency: FREQUENT
  description: >-
    Generalized edema develops as plasma leaks into the interstitial
    compartment.
  phenotype_term:
    preferred_term: Edema
    term:
      id: HP:0000969
      label: Edema
- name: Hypoalbuminemia
  category: Laboratory
  frequency: FREQUENT
  description: >-
    Serum albumin falls during episodes because protein-rich plasma escapes the
    vascular compartment.
  phenotype_term:
    preferred_term: Hypoalbuminemia
    term:
      id: HP:0003073
      label: Hypoalbuminemia
