  preferred_term: capillary leak syndrome
  term:
    id: MONDO:0001956
    label: capillary leak syndrome
parents:
- vascular disorder
- immune-mediated disease
pathophysiology:
- name: Endothelial barrier dysfunction
  description: >-
    The central pathogenic event is abrupt failure of the endothelial barrier,
    allowing proteins and plasma water to escape from the vascular lumen.
  cell_types:
  - preferred_term: endothelial cell
    term:
      id: CL:0000115
      label: endothelial cell
  biological_processes:
  - preferred_term: regulation of vascular permeability
    term:
      id: GO:0043114
      label: regulation of vascular permeability
    modifier: ABNORMAL
  evidence:
  - reference: PMID:29732372
    reference_title: The Role of Failing Autonomic Nervous System on Life-Threatening Idiopathic Systemic Capillary Leak Syndrome.
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      In acute phases, endothelial cells sieving properties are almost
      completely disrupted resulting in massive fluid and protein loss.
    explanation: >-
      This directly supports abrupt endothelial barrier dysfunction as the
      initiating pathogenic event in idiopathic systemic capillary leak
      syndrome.
  downstream:
  - target: Plasma extravasation
    description: Barrier failure permits rapid capillary leakage.
- name: Plasma extravasation
  description: >-
    Intravascular proteins and fluid shift into the interstitial compartment,
    contracting effective circulating volume.
  biological_processes:
  - preferred_term: regulation of vascular permeability
    term:
      id: GO:0043114
      label: regulation of vascular permeability
    modifier: INCREASED
  evidence:
  - reference: PMID:29732372
    reference_title: The Role of Failing Autonomic Nervous System on Life-Threatening Idiopathic Systemic Capillary Leak Syndrome.
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      The resulting shift of fluids and proteins from the intravascular to the
      interstitial compartment causes the hypovolemic shock that characterizes
      disease recurrences.
    explanation: >-
      This directly supports plasma and protein extravasation into the
      interstitium as the core downstream consequence of barrier failure.
  downstream:
  - target: Intravascular volume depletion
    description: Fluid loss from the vascular space lowers effective preload and perfusion.
  - target: Generalized edema
    description: Extravasated fluid accumulates in tissues during the leak phase.
  - target: Hemoconcentration
    description: Plasma-volume loss concentrates circulating blood elements.
    causal_link_type: DIRECT
  - target: Hypoalbuminemia
    description: Protein-rich plasma leakage lowers circulating serum albumin.
    causal_link_type: DIRECT
- name: Intravascular volume depletion
  description: >-
    Severe plasma loss produces hypotension and shock physiology during acute
    attacks.
  notes: >-
    This is a systemic hemodynamic consequence of capillary leak, and a more
    specific cell-level GO process was not added in this curation pass.
  evidence:
  - reference: PMID:29732372
    reference_title: The Role of Failing Autonomic Nervous System on Life-Threatening Idiopathic Systemic Capillary Leak Syndrome.
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      The resulting shift of fluids and proteins from the intravascular to the
      interstitial compartment causes the hypovolemic shock that characterizes
      disease recurrences.
    explanation: >-
      This directly supports intravascular volume depletion and hypovolemic
      shock as immediate consequences of plasma leakage.
  downstream:
  - target: Hypotension
    description: Effective circulating-volume loss produces hypotension during acute attacks.
    causal_link_type: DIRECT
- name: Generalized edema
  description: >-
    Interstitial fluid accumulation follows the capillary leak and contributes
    to the characteristic edematous phase of the disorder.
  biological_processes:
  - preferred_term: regulation of vascular permeability
    term:
      id: GO:0043114
      label: regulation of vascular permeability
    modifier: INCREASED
  evidence:
  - reference: PMID:29732372
    reference_title: The Role of Failing Autonomic Nervous System on Life-Threatening Idiopathic Systemic Capillary Leak Syndrome.
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Capillary leakage leads to hemoconcentration, hypoalbuminemia,
      generalized edema, and refractory hypovolemic shock with subsequent
      complications (8).
    explanation: >-
      This directly supports generalized edema as a defining consequence of the
      leak phase.
  downstream:
  - target: Edema
    description: Interstitial fluid accumulation is expressed clinically as generalized edema.
    causal_link_type: DIRECT
