name: capillary leak syndrome
creation_date: '2026-04-14T12:00:00Z'
updated_date: '2026-04-15T01:00:00Z'
category: Complex
synonyms:
- systemic capillary leak syndrome
- Clarkson disease
description: >-
  Capillary leak syndrome is a rare vascular permeability disorder in which
  episodic endothelial barrier failure causes rapid movement of plasma and
  proteins from the intravascular space into the interstitium. The clinical
  syndrome is characterized by hypotension, edema, hemoconcentration, and
  hypoalbuminemia; idiopathic recurrent disease is often referred to as
  systemic capillary leak syndrome or Clarkson disease.
