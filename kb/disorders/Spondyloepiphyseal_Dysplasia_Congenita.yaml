    evidence_source: HUMAN_CLINICAL
    snippet: "extraskeletal features, including myopia, retinal degeneration with
      retinal detachment, and cleft palate"
    explanation: Recent series confirming cleft palate among the extraskeletal
      features of SEDC.
- category: Ophthalmologic
  name: Myopia
  description: >
    High myopia (5.00 diopters or more) due to vitreous abnormalities from
    defective type II collagen. Reported in approximately 45% of SEDC patients.
  phenotype_term:
    preferred_term: Myopia
    term:
      id: HP:0000545
      label: Myopia
  evidence:
  - reference: PMID:6807266
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Seven patients had nonprogressive myopia of 5.00 or more diopters.
      Vitreoretinal degeneration was encountered in six patients with high myopia, and
      vitreous syneresis was present in all patients."
    explanation: Ophthalmic study of 18 SEDC patients documenting high myopia and
      universal vitreous syneresis.
  - reference: PMID:31824186
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Ocular complications such as myopia have been reported in 45% of
      patients but retinal detachment is less frequent (12%) than in type 1
      Strickler syndrome."
    explanation: Review providing frequency data for myopia in SEDC.
- category: Ophthalmologic
  name: Retinal Detachment
  description: >
    Increased risk of retinal detachment due to vitreous abnormalities. Occurs
    in approximately 12% of SEDC patients, less frequently than in Stickler
    syndrome type 1.
  phenotype_term:
    preferred_term: Retinal detachment
    term:
      id: HP:0000541
      label: Retinal detachment
  evidence:
  - reference: PMID:31824186
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Ocular complications such as myopia have been reported in 45% of
      patients but retinal detachment is less frequent (12%) than in type 1
      Strickler syndrome."
    explanation: Review quantifying retinal detachment frequency in SEDC at 12%.
  - reference: PMID:6807266
    supports: PARTIAL
    evidence_source: HUMAN_CLINICAL
    snippet: "Retinal detachment was not encountered, although reports in the
      nonophthalmic literature claim up to 50% retinal detachment rate and poor
      visual prognosis in these patients."
    explanation: This ophthalmic series did not observe retinal detachment in 18
      patients, suggesting the true rate may be lower than some early reports
      claimed.
- category: Auditory
  name: Sensorineural Hearing Loss
  description: >
    Sensorineural hearing impairment occurs in 25-30% of SEDC patients, though
    mixed hearing loss with a conductive component has also been documented.
  phenotype_term:
    preferred_term: Sensorineural hearing impairment
    term:
      id: HP:0000407
      label: Sensorineural hearing impairment
  evidence:
  - reference: PMID:10743764
    reference_title: "Spondyloepiphyseal dysplasia congenita associated with conductive hearing loss."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Hearing loss has been reported to occur in 25 to 30% of affected patients.
      To date, all reports of associated hearing loss have indicated the presence
      of a sensorineural component."
    explanation: Documents hearing loss prevalence in SEDC patients and notes that
      hearing loss typically has a sensorineural component.
  - reference: PMID:31824186
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Adult patients suffer from sensorineural (25% to 30% of reported cases)
      or less frequently mixed hearing loss."
    explanation: Review confirming the 25-30% frequency of sensorineural hearing
      loss in SEDC.
- category: Skeletal
  name: Odontoid Hypoplasia
  description: >
    Underdevelopment of the odontoid process creates risk of atlantoaxial
    instability and cervical cord compression, a potentially life-threatening
    complication requiring vigilance during intubation or surgery.
  phenotype_term:
    preferred_term: Odontoid hypoplasia
    term:
      id: HP:0003311
      label: Hypoplasia of the odontoid process
  evidence:
  - reference: PMID:31824186
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Frequently patients suffer from atlantoaxial instability due to
      odontoid hypoplasia that can cause cervical cord compression, especially
      when repairing during intubation or surgery."
    explanation: Review emphasizing the clinical significance of odontoid
      hypoplasia and the risk of cervical cord compression.
- category: Skeletal
  name: Pectus Carinatum
  description: >
    Protuberant barrel chest deformity with pectus carinatum.
  phenotype_term:
    preferred_term: Pectus carinatum
    term:
      id: HP:0000768
      label: Pectus carinatum
  evidence:
  - reference: PMID:31824186
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Adult patients also show flat face for skeletal hypoplasia with
      prominent eyes and cleft palate, barrel-chest and pectus carinatum."
    explanation: Review documenting pectus carinatum as a recognized feature of
      adult SEDC patients.
- category: Skeletal
  name: Coxa Vara
  description: >
    Hip deformity with reduced femoral neck angle, contributing to waddling
    gait and early-onset hip osteoarthritis. Hip dislocation may also occur.
  phenotype_term:
    preferred_term: Coxa vara
    term:
      id: HP:0002812
      label: Coxa vara
  evidence:
  - reference: PMID:31824186
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "coxa vara, dislocated hips, talipes equinovarus, clubfeet and waddling
      gate are reported"
    explanation: Review documenting coxa vara among the lower limb abnormalities
      in SEDC.
- category: Skeletal
  name: Kyphoscoliosis
  description: >
    Progressive kyphoscoliosis developing in childhood from platyspondyly and
    vertebral body wedging. Lumbar lordosis is also characteristic.
  phenotype_term:
    preferred_term: Kyphoscoliosis
    term:
      id: HP:0002751
      label: Kyphoscoliosis
  evidence:
  - reference: PMID:31824186
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "This ultimately leads to wedge-shaped thoracic vertebrae and severe
      kyphoscoliosis with lumbar lordosis."
    explanation: Review documenting progressive kyphoscoliosis as a consequence
      of platyspondyly in SEDC.
- category: Skeletal
  name: Clubfoot
  description: >
    Congenital talipes equinovarus occurs in some affected individuals.
  phenotype_term:
    preferred_term: Talipes equinovarus
    term:
      id: HP:0001762
      label: Talipes equinovarus
  evidence:
  - reference: PMID:31824186
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "coxa vara, dislocated hips, talipes equinovarus, clubfeet and waddling
      gate are reported"
    explanation: Review listing talipes equinovarus among the SEDC features.
- category: Skeletal
  name: Waddling Gait
  description: >
    Characteristic gait abnormality resulting from hip dysplasia and coxa vara.
  phenotype_term:
    preferred_term: Waddling gait
    term:
      id: HP:0002515
      label: Waddling gait
  evidence:
  - reference: PMID:31824186
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "coxa vara, dislocated hips, talipes equinovarus, clubfeet and waddling
      gate are reported"
    explanation: Review listing waddling gait as a reported feature.
- category: Skeletal
  name: Genu Valgum
  description: >
    Knock-knee deformity due to epiphyseal and metaphyseal dysplasia of the
    distal femur and proximal tibia.
  phenotype_term:
    preferred_term: Genu valgum
    term:
      id: HP:0002857
      label: Genu valgum
  evidence:
  - reference: PMID:31824186
    reference_title: "COL2A1 Gene Mutations: Mechanisms of Spondyloepiphyseal Dysplasia Congenita."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Tubular bones, except hands, are short with delayed and dysplastic
      epiphyseal ossification."
    explanation: Dysplastic epiphyseal ossification of long bones underlies the
      angular deformities including genu valgum observed in SEDC.
- category: Skeletal
  name: Delayed Epiphyseal Ossification
  description: >
    Delayed and dysplastic ossification of epiphyses, particularly at the
    femoral head and distal femoral epiphyses. Ossification is absent at
    birth in pubic bones and distal femoral epiphyses, and absent or reduced
    in cervical and sacral vertebrae.
  phenotype_term:
    preferred_term: Delayed epiphyseal ossification
    term:
      id: HP:0002663
      label: Delayed epiphyseal ossification
  evidence:
  - reference: PMID:31824186
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "ossification is absent in pubic bones and distal femoral epiphyses,
      absent or reduced in cervical and sacral vertebras"
    explanation: Review detailing the pattern of absent or delayed ossification
      in neonatal SEDC.
- category: Respiratory
  name: Respiratory Insufficiency
  description: >
    Severe SEDC can present with respiratory failure due to small rib cage,
    tracheobronchomalacia, and respiratory muscle weakness. Infants with
    severe SEDC may be stillborn or die shortly after birth from
    hypoventilation.
  phenotype_term:
    preferred_term: Respiratory insufficiency
    term:
      id: HP:0002093
      label: Respiratory insufficiency
  evidence:
  - reference: PMID:31824186
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Infants with severe SEDC are often stillborn or premature and die
      shortly after birth because of hypoventilation."
    explanation: Review documenting that severe SEDC can be lethal due to
      respiratory insufficiency.
progression:
- phase: Neonatal presentation
  age_range: birth
  evidence:
  - reference: PMID:31824186
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "At birth patients with SEDC are short (mean length 45 cm at term) with
      flattened vertebras; ossification is absent in pubic bones and distal femoral
      epiphyses, absent or reduced in cervical and sacral vertebras."
    explanation: Review detailing the neonatal radiographic and clinical
      presentation of SEDC.
- phase: Childhood skeletal progression
  age_range: infancy to adolescence
  evidence:
  - reference: PMID:31824186
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Shortly after birth, platispondyly of the lower thoracic and lumbar
      vertebral bodies develops. This ultimately leads to wedge-shaped thoracic
      vertebrae and severe kyphoscoliosis with lumbar lordosis."
    explanation: Review documenting the progressive vertebral changes during
      childhood.
- phase: Adult complications
  age_range: adulthood
  evidence:
  - reference: PMID:22155431
    supports: SUPPORT
    evidence_source: MODEL_ORGANISM
    snippet: "We conclude that the sedc/+ mouse is a useful model for the study
      of OA in individuals with overtly normal skeletal structure and a
      predisposition for articular cartilage degeneration."
    explanation: Animal model evidence supporting the progression to premature
      osteoarthritis in adulthood.
treatments:
- name: Cervical Spine Stabilization
  description: >
    Evaluation and management of cervical instability from odontoid
    hypoplasia. Cervical spine imaging is essential before anesthesia,
    surgical procedures, or contact activities. Posterior cervical fusion
    may be required for significant atlantoaxial instability.
  treatment_term:
    preferred_term: Cervical spine stabilization surgery
    term:
      id: MAXO:0000004
      label: surgical procedure
- name: Orthopedic Management
  description: >
    Management of progressive hip dysplasia, kyphoscoliosis, limb
    deformities, and early-onset osteoarthritis. Procedures may include
    hip osteotomy, spinal fusion for progressive scoliosis, and eventual
    joint replacement for degenerative arthritis.
  treatment_term:
    preferred_term: Orthopedic surgery
    term:
      id: MAXO:0000004
      label: surgical procedure
- name: Ophthalmologic Surveillance
  description: >
    Regular eye examinations for myopia management and early detection
    of retinal detachment. Given the approximately 45% rate of myopia and
    12% rate of retinal detachment, ongoing ophthalmologic follow-up is
    a standard of care.
  treatment_term:
    preferred_term: Eye examination
    term:
      id: MAXO:0001155
      label: eye examination
- name: Audiologic Monitoring
  description: >
    Regular hearing assessments given the 25-30% rate of sensorineural
    hearing loss. Hearing aids as needed for progressive impairment.
  treatment_term:
    preferred_term: Audiologic monitoring
    term:
      id: MAXO:0000950
      label: supportive care
- name: Genetic Counseling
  description: >
    Genetic counseling for affected individuals and families regarding
    autosomal dominant inheritance, variable expressivity, de novo
    mutation risk, and reproductive options.
  treatment_term:
    preferred_term: Genetic counseling
    term:
      id: MAXO:0000079
      label: genetic counseling
- name: Respiratory Support
  description: >
    Monitoring and management of respiratory compromise in severe neonatal
    cases, including ventilatory support and airway management for
    tracheobronchomalacia.
  treatment_term:
    preferred_term: Respiratory support
    term:
      id: MAXO:0000950
      label: supportive care
