    snippet: "Histology revealed growth plate disorganization in 14-day-old Lpk/+ mice
      and embryonic cartilage from Lpk/+ and Lpk/Lpk mice had reduced safranin-O
      and type-II collagen staining in the extracellular matrix."
    explanation: The Longpockets (Lpk) ENU mouse model with Col2a1 Ser1386Pro
      mutation shows growth plate disorganization and reduced collagen II in the
      ECM, directly demonstrating the mechanism of growth plate disruption.
  - reference: PMID:31824186
    supports: SUPPORT
    evidence_source: MODEL_ORGANISM
    snippet: "Proliferative and hypertrophic zones of cartilage were shorter or
      indistinguishable and deposition of cartilage matrix is notably impaired,
      collagen fibrils were fewer and less elaborate."
    explanation: Review of transgenic mouse models demonstrating the characteristic
      growth plate disorganization in COL2A1 mutants.
- name: Vitreous Collagen Abnormality
  description: >
    Type II collagen is a major component of the vitreous humor and is critical for
    vitreous gel structure. Abnormal collagen leads to vitreous liquefaction,
    vitreous syneresis, and posterior vitreous detachment, increasing the risk of
    retinal detachment. Myopia is reported in approximately 45% of SEDC patients,
    while retinal detachment occurs in about 12%.
  biological_processes:
  - preferred_term: Eye Development
    term:
      id: GO:0001654
      label: eye development
  evidence:
  - reference: PMID:6807266
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Eighteen patients had ocular changes associated with spondyloepiphyseal
      dysplasia congenita, a rare cause of congenital dwarfism with normal mental
      development. Seven patients had nonprogressive myopia of 5.00 or more diopters.
      Vitreoretinal degeneration was encountered in six patients with high myopia, and
      vitreous syneresis was present in all patients."
    explanation: This ophthalmic case series of 18 SEDC patients systematically
      documents the vitreoretinal abnormalities including universal vitreous
      syneresis, high myopia, and vitreoretinal degeneration.
  - reference: PMID:7550321
    reference_title: "Dominant mutations in the type II collagen gene, COL2A1, produce spondyloepimetaphyseal dysplasia, Strudwick type."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Individuals affected with these disorders exhibit abnormalities of the
      growth plate, nucleus pulposus, and vitreous humor, which are tissues that contain
      type II collagen."
    explanation: This study documents that vitreous humor abnormalities are a
      feature of COL2A1-related chondrodysplasias due to type II collagen being a
      major component of the vitreous.
- name: Secondary Osteoarthritis
  description: >
    Abnormal type II collagen in articular cartilage predisposes to premature
    degenerative joint disease. Even in heterozygous carriers without overt
    dwarfism, abnormal collagen leads to progressive cartilage degradation
    through upregulation of the HtrA1-Ddr2-Mmp-13 degradative pathway.
    Skeletal deterioration with trabecular osteopenia and increased osteoclast
    activity occurs prior to the onset of osteoarthritis, suggesting a primary
    bone defect in addition to the cartilage pathology.
  cell_types:
  - preferred_term: Chondrocyte
    term:
      id: CL:0000138
      label: chondrocyte
  - preferred_term: Osteoclast
    term:
      id: CL:0000092
      label: osteoclast
