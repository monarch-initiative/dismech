    term:
      id: GO:0030574
      label: collagen catabolic process
    modifier: INCREASED
  - preferred_term: Bone Mineralization
    term:
      id: GO:0030282
      label: bone mineralization
    modifier: DECREASED
  evidence:
  - reference: PMID:22155431
    supports: SUPPORT
    evidence_source: MODEL_ORGANISM
    snippet: "The sedc/+ mouse did, however, show significantly higher OARSI scores
      in knee (9, 12 and 18 months) and temporomandibular joints at all ages examined.
      Histological staining showed regions of proteoglycan degradation as early as
      2 months in both temporomandibular and knee joints of the mutant."
    explanation: The heterozygous sedc mouse develops premature OA despite normal
      skeletal morphology, demonstrating that abnormal collagen II directly
      predisposes to cartilage degeneration.
  - reference: PMID:31958497
    supports: SUPPORT
    evidence_source: MODEL_ORGANISM
    snippet: "Our results indicate that collagen type II deficiency in
      spondyloepiphyseal dysplasia leads to skeletal deterioration with early-onset
      in humans and mice that occurs prior to the development of osteoarthritis."
    explanation: Both human patients and Col2a1 heterozygous mice show skeletal
      deterioration (osteopenia, increased osteoclast activity) that precedes OA,
      suggesting a primary bone defect.
genetic:
- name: COL2A1 Mutations
  association: Causative
  gene_term:
    preferred_term: COL2A1
    term:
      id: hgnc:2200
      label: COL2A1
  notes: >
    Heterozygous mutations in COL2A1 (12q13.1-q13.2) cause SEDC. The gene
    has 54 exons encoding the 1487-amino acid alpha-1 chain of type II collagen.
    Over 400 pathogenic variants have been cataloged. The dominant-negative
    mechanism predominates: glycine substitutions in the Gly-X-Y repeat (74%
    of triple-helix mutations) and arginine-to-cysteine changes (10%) disrupt
    triple-helix assembly. Haploinsufficiency from premature stop codons is
    associated with milder phenotypes. No mutational hot spots have been
    identified, and no amino-to-carboxyterminal gradient in phenotypic severity
    exists, unlike osteogenesis imperfecta.
  evidence:
  - reference: PMID:1971141
    reference_title: "Spondyloepiphyseal dysplasia congenita: genetic linkage to type II collagen (COL2AI)."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Previous evidence suggesting defects of type II collagen associated
      with the SEDC phenotype led us to genotype the family for various COL2A1 gene-associated
      RFLPs. A total of 17 affected and unaffected members of this family were studied.
      The family was informative for a recently discovered HinfI RFLP. No recombinants
      between the marker and the phenotype were found in eight informative meioses.
      A maximum LOD score of 3.01 was obtained at a recombination fraction of .00."
    explanation: Landmark linkage study establishing that SEDC is caused by
      mutations in or near the COL2A1 gene, with a highly significant LOD score.
  - reference: PMID:26443184
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Over 700 patients were recorded, harboring 415 different mutations.
      One-third of the mutations are dominant-negative mutations that affect the
      glycine residue in the G-X-Y repeats of the alpha 1 chain."
    explanation: Comprehensive mutation database establishing the mutational
      spectrum of COL2A1, with dominant-negative glycine substitutions being the
      most common mechanism in severe phenotypes.
  - reference: PMID:31824186
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "In spondyloephyseal dysplasia congenita over 100 COL2A1 mutations have
      been described. Most common are in the triple helix (74% glycine substitutions
      and 10% Arg-to-Cys changes) and are dominantly inherited while only few mutations
      have been found involving C-peptide region."
    explanation: Review detailing the mutational spectrum specific to SEDC,
      documenting that glycine and arginine-to-cysteine substitutions in the triple
      helix account for the vast majority of mutations.
  - reference: PMID:35581182
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Spondyloepiphyseal dysplasia congenita (SEDC) (OMIM#183900) is an
      autosomal dominant chondrodysplasia characterized by disproportionate short
      stature, abnormal epiphyses, flattened vertebral bodies (skeletal abnormalities),
      and extraskeletal features, including myopia, retinal degeneration with retinal
      detachment, and cleft palate. SEDC is caused by a heterozygous variant in the
      collagen II alpha 1 (COL2A1) gene."
    explanation: Recent Japanese cohort study of five SEDC patients, all with novel
      glycine substitutions, confirming the consistent genotype-phenotype pattern.
animal_models:
- species: Mouse
  genotype: Col2a1 R1417C (sedc)
  category: spontaneous mutation
  description: >
    Spontaneous autosomal recessive Col2a1 missense mutation (R1417C, exon 48)
    identified at the Jackson Laboratory. Homozygous sedc/sedc mice have
    shortened trunks, dysplastic vertebrae and long bones, retinoschisis, and
    hearing loss. The same arginine-to-cysteine substitution at the
    orthologous human position (R789C) causes SEDC in patients. Heterozygous
    sedc/+ mice appear phenotypically normal but develop premature
    osteoarthritis with upregulation of the HtrA1-Ddr2-Mmp-13 degradative
    pathway.
  genes:
  - preferred_term: COL2A1
    term:
      id: hgnc:2200
      label: COL2A1
  associated_phenotypes:
  - Shortened trunk
  - Dysplastic vertebrae
  - Retinoschisis
  - Hearing loss
  - Premature osteoarthritis (heterozygotes)
  evidence:
  - reference: PMID:12968670
    reference_title: "A missense mutation in the mouse Col2a1 gene causes spondyloepiphyseal dysplasia congenita, hearing loss, and retinoschisis."
    supports: SUPPORT
    evidence_source: MODEL_ORGANISM
    snippet: "A new mouse autosomal recessive mutation has been discovered and
      named spondyloepiphyseal dysplasia congenita (gene symbol sedc)."
    explanation: Original description of the sedc mouse, demonstrating molecular
      and phenotypic homology with human SEDC.
  - reference: PMID:22155431
    reference_title: "Osteoarthritis-like changes in the heterozygous sedc mouse associated with the HtrA1-Ddr2-Mmp-13 degradative pathway: a new model of osteoarthritis."
    supports: SUPPORT
    evidence_source: MODEL_ORGANISM
    snippet: "The sedc/+ mouse did, however, show significantly higher OARSI scores
      in knee (9, 12 and 18 months) and temporomandibular joints at all ages examined."
    explanation: The heterozygous sedc mouse models the OA predisposition seen in
      human COL2A1 mutation carriers.
- species: Mouse
  genotype: Col2a1 S1386P (Longpockets, Lpk)
  category: ENU-induced mutation
  description: >
    ENU-induced Col2a1 missense mutation (Ser1386Pro) in the C-propeptide domain.
    Heterozygous Lpk/+ mice are viable with short humeri, abnormal vertebrae,
    and growth plate disorganization. Homozygous Lpk/Lpk mice die perinatally.
    Mutant protein shows abnormal processing with endoplasmic reticulum
    retention. Electron microscopy reveals fewer and less elaborate collagen
    fibrils with enlarged ER vacuoles containing amorphous inclusions. At 12
    weeks, Lpk/+ mice show decreased bone mineral density with joint erosions
    and osteophytes.
  genes:
  - preferred_term: COL2A1
    term:
      id: hgnc:2200
      label: COL2A1
  associated_phenotypes:
  - Short humeri
  - Abnormal vertebrae
  - Growth plate disorganization
  - Decreased bone mineral density
  - Secondary osteoarthritis
  evidence:
  - reference: PMID:22028304
    reference_title: "A mouse model for spondyloepiphyseal dysplasia congenita with secondary osteoarthritis due to a Col2a1 mutation."
    supports: SUPPORT
    evidence_source: MODEL_ORGANISM
    snippet: "Transient transfection of wild-type and Ser1386Pro mutant Col2a1 c-Myc
      constructs in COS-7 cells and CH8 chondrocytes demonstrated abnormal processing
      and endoplasmic reticulum retention of the mutant protein."
    explanation: ENU mouse model demonstrating that the Col2a1 C-propeptide mutation
      causes ER retention, growth plate disorganization, and secondary OA, closely
      phenocopying human SEDC.
- species: Mouse
  genotype: col2a1 p.Gly1170Ser knock-in
  category: engineered mutation
  description: >
    Engineered Col2a1 Gly1170Ser missense mouse model. Homozygotes show severe
    chondrodysplasia with chondrocyte apoptosis preceding hypertrophy. ER
    stress-UPR-apoptosis cascade is activated, preventing hypertrophic zone
    formation and disrupting chondrogenic signaling. Heterozygotes have normal
    phenotypes with limited ER stress and no abnormal apoptosis.
  genes:
  - preferred_term: COL2A1
    term:
      id: hgnc:2200
      label: COL2A1
  associated_phenotypes:
  - Chondrodysplasia
  - ER stress
  - Chondrocyte apoptosis
  evidence:
  - reference: PMID:24475193
    reference_title: "Endoplasmic reticulum stress-unfolding protein response-apoptosis cascade causes chondrodysplasia in a col2a1 p.Gly1170Ser mutated mouse model."
    supports: SUPPORT
    evidence_source: MODEL_ORGANISM
    snippet: "Misfolded procollagen was largely synthesized and retained in dilated
      endoplasmic reticulum and the endoplasmic reticulum stress (ERS)-unfolded
      protein response (UPR)-apoptosis cascade was activated."
    explanation: This model provides key evidence linking ER stress to the
      chondrodysplasia mechanism of COL2A1 mutations.
- species: Mouse
  genotype: Col2a1+/d (haploinsufficient)
  category: loss of function
  description: >
    Heterozygous loss-of-function Col2a1 mice (Col2a1+/d) develop a moderate
    skeletal phenotype with reduced cortical and trabecular bone parameters at
    4 weeks, prior to the onset of osteoarthritis at 12 weeks. Demonstrates
    that collagen II deficiency leads to skeletal deterioration that precedes
    cartilage degeneration.
  genes:
  - preferred_term: COL2A1
    term:
      id: hgnc:2200
      label: COL2A1
  associated_phenotypes:
  - Trabecular osteopenia
  - Reduced cortical bone
  - Secondary osteoarthritis
  evidence:
  - reference: PMID:31958497
    reference_title: "Skeletal deterioration in COL2A1-related spondyloepiphyseal dysplasia occurs prior to osteoarthritis."
    supports: SUPPORT
    evidence_source: MODEL_ORGANISM
    snippet: "Col2a1+/d mice developed a moderate skeletal phenotype expressed by
      reduced cortical and trabecular parameters at 4 weeks. Importantly, no
      articular defects could be observed in the knee joints at 4 weeks, while
      osteoarthritis was only detectable in 12-week-old mice."
    explanation: Demonstrates that bone loss precedes OA in Col2a1 deficiency,
      paralleling findings in human SED patients.
