    modifier: INCREASED
  evidence:
  - reference: PMID:24475193
    supports: SUPPORT
    evidence_source: MODEL_ORGANISM
    snippet: "Misfolded procollagen was largely synthesized and retained in dilated
      endoplasmic reticulum and the endoplasmic reticulum stress (ERS)-unfolded
      protein response (UPR)-apoptosis cascade was activated. Apoptosis occurred prior
      to hypertrophy, prevented the formation of a hypertrophic zone, disrupted normal
      chondrogenic signaling pathways, and eventually caused chondrodysplasia."
    explanation: This col2a1 p.Gly1170Ser mouse model directly demonstrates that ER
      stress-UPR-apoptosis is the chief mechanism of chondrodysplasia caused by
      COL2A1 mutations.
  - reference: PMID:31824186
    supports: SUPPORT
    evidence_source: MODEL_ORGANISM
    snippet: "chondrocytes show greatly extended cisternae of rough endoplasmic
      reticulum with a retention of procollagen and other molecules (eg, fibronectin).
      This retention hence causes endoplasmic reticulum stress sufficient to reduce
      proliferation rate at the growth plates."
    explanation: Review summarizing that transgenic mouse models show ER retention
      of procollagen leading to ER stress and reduced proliferation in growth plates.
  downstream:
  - target: Impaired Growth Plate Organization
- name: Impaired Growth Plate Organization
  description: >
    The combined effects of abnormal extracellular collagen fibrils and ER
    stress-driven chondrocyte apoptosis lead to severe disorganization of
    growth plate architecture. Proliferative and hypertrophic zones become
    shortened or indistinguishable, columnar arrangement of chondrocytes is
    disrupted, and deposition of cartilage matrix is impaired. Collagen fibrils
    are fewer and less elaborate, and expression of chondrocyte differentiation
    markers (Ihh, Fgfr3, Col10a1, Runx2) is markedly reduced. This disrupted
    endochondral ossification accounts for the disproportionate short stature,
    platyspondyly, and epiphyseal dysplasia.
  cell_types:
  - preferred_term: Growth Plate Chondrocyte
    term:
      id: CL:1000217
      label: growth plate cartilage chondrocyte
