      label: protein folding
  evidence:
  - reference: PMID:26443184
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "One-third of the mutations are dominant-negative mutations that affect
      the glycine residue in the G-X-Y repeats of the alpha 1 chain. These mutations
      disrupt the collagen triple helix and are common in achondrogenesis type II and
      hypochondrogenesis."
    explanation: This comprehensive mutation update of over 700 patients documents
      that glycine substitutions in the Gly-X-Y repeats are the predominant
      dominant-negative mechanism in type II collagenopathies including SEDC.
  - reference: PMID:29439465
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: "Retention of misfolded R740C and R789C proteins triggered an ER stress
      response leading to apoptosis of the expressing cells. Arginine to cysteine
      mutations towards the C-terminus of the triple helix had a deleterious effect,
      whereas mutations towards the N-terminus of the triple helix (R75C and R134C)
      and R704C had less impact."
    explanation: In vitro study demonstrating that C-terminal arginine-to-cysteine
      mutations in collagen II cause ER retention, ER stress, and apoptosis, with a
      position-dependent gradient of severity.
  - reference: PMID:31824186
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "The most common mutation (over 70%, Table 1) is missense mutation, some
      of which lead to substitution of glycine residue in the Gly-X-Y repeat,
      presenting as dominant-negative effect"
    explanation: Review confirming that glycine substitution missense mutations
      are the most common COL2A1 mutation type and act via dominant-negative effect.
  downstream:
  - target: ER Stress and Unfolded Protein Response in Chondrocytes
- name: ER Stress and Unfolded Protein Response in Chondrocytes
  description: >
    Misfolded mutant procollagen II is retained in dilated endoplasmic reticulum
    cisternae of growth plate chondrocytes, activating the endoplasmic reticulum
    stress (ERS)-unfolded protein response (UPR)-apoptosis cascade. In mouse models,
    chondrocyte apoptosis occurs prior to hypertrophy, preventing formation of a
    normal hypertrophic zone, disrupting chondrogenic signaling pathways including
    Ihh, Fgfr3, and Runx2, and ultimately impairing endochondral ossification.
    The ER stress-mediated chondrocyte death is considered the chief cellular
    mechanism linking collagen misfolding to the skeletal malformation phenotype.
  cell_types:
  - preferred_term: Growth Plate Chondrocyte
    term:
      id: CL:1000217
      label: growth plate cartilage chondrocyte
  - preferred_term: Hypertrophic Chondrocyte
    term:
      id: CL:0000743
