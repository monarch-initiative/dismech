pathophysiology:
- name: SCN5A-related sodium current reduction
  description: >-
    The best-established molecular mechanism in Brugada syndrome is reduced
    cardiac sodium current caused by loss-of-function variation affecting
    Nav1.5, the alpha subunit encoded by SCN5A.
  genes:
  - preferred_term: SCN5A
    term:
      id: hgnc:10593
      label: SCN5A
  biological_processes:
  - preferred_term: membrane depolarization during cardiac muscle cell action potential
    modifier: ABNORMAL
    term:
      id: GO:0086012
      label: membrane depolarization during cardiac muscle cell action potential
  evidence:
  - reference: PMID:39896197
    reference_title: Brugada syndrome update.
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Brugada syndrome (BrS), a genetic disorder affecting cardiac ion channels, predominantly manifests due to mutations that impair the function of the Nav1.5 sodium channel's α-subunit.
    explanation: This directly supports Nav1.5 dysfunction as the dominant mechanistic axis.
  - reference: PMID:29709101
    reference_title: Genotype-phenotype relationship and risk stratification in loss-of-function SCN5A mutation carriers.
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Loss-of-function (LoF) mutations in the SCN5A gene cause multiple phenotypes including Brugada Syndrome (BrS)
    explanation: This human cohort directly supports SCN5A loss-of-function as a causal Brugada mechanism.
  downstream:
  - target: Type 1 Brugada ECG substrate
    description: Reduced inward sodium current promotes the diagnostic type 1 ECG substrate and arrhythmogenic electrophysiology.
- name: Type 1 Brugada ECG substrate
  description: >-
    Reduced sodium current creates an electrophysiologic substrate that favors
    the diagnostic type 1 Brugada ECG pattern and phase 2 reentry-related
    ventricular arrhythmogenesis.
  biological_processes:
  - preferred_term: cardiac conduction
    modifier: ABNORMAL
    term:
      id: GO:0061337
      label: cardiac conduction
  evidence:
  - reference: PMID:34963310
    reference_title: "Why Is Only Type 1 Electrocardiogram Diagnostic of Brugada Syndrome? Mechanistic Insights From Computer Modeling."
    supports: SUPPORT
    evidence_source: COMPUTATIONAL
    snippet: >-
      Blocking either the peak or late components of sodium current promoted P2R
    explanation: This supports sodium-current-dependent generation of the type 1 ECG/phase 2 reentry substrate.
  - reference: PMID:34963310
    reference_title: "Why Is Only Type 1 Electrocardiogram Diagnostic of Brugada Syndrome? Mechanistic Insights From Computer Modeling."
    supports: SUPPORT
    evidence_source: COMPUTATIONAL
    snippet: >-
      Three types of characteristic ST-segment elevation are associated with Brugada syndrome but only type 1 is diagnostic.
    explanation: This supports the specific diagnostic primacy of the type 1 ECG pattern.
  downstream:
  - target: Ventricular arrhythmia susceptibility
    description: The ECG substrate increases risk of malignant ventricular tachyarrhythmia.
- name: Ventricular arrhythmia susceptibility
  description: >-
    The Brugada electrophysiologic substrate predisposes to polymorphic
    ventricular tachycardia and ventricular fibrillation, which can present with
    syncope or sudden cardiac death.
  biological_processes:
  - preferred_term: cardiac muscle cell action potential
    modifier: ABNORMAL
    term:
      id: GO:0086001
      label: cardiac muscle cell action potential
  evidence:
  - reference: PMID:39896197
    reference_title: Brugada syndrome update.
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      This condition, identified by Josep and Pedro Brugada, is often marked by symptoms such as syncope and episodes of polymorphic ventricular tachycardia (PVT) or ventricular fibrillation (VF).
    explanation: This supports the key downstream arrhythmic manifestations.
