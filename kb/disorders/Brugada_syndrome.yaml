name: Brugada syndrome
creation_date: '2026-04-13T04:00:00Z'
updated_date: '2026-04-13T15:42:00Z'
description: >-
  Brugada syndrome is an inherited cardiac channelopathy characterized by
  abnormal right precordial ST-segment elevation, ventricular arrhythmia
  susceptibility, and risk of sudden cardiac death in the absence of overt
  structural heart disease. The core established mechanism is loss of inward
  sodium current, most often due to heterozygous pathogenic variants in SCN5A,
  producing conduction and repolarization abnormalities that facilitate
  malignant ventricular arrhythmias.
category: Mendelian
parents:
- hereditary disease
- cardiac channelopathy
synonyms:
- BrS
