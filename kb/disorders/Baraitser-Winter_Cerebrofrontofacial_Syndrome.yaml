        supports: SUPPORT
        evidence_source: HUMAN_CLINICAL
        snippet: >-
          Reduction of shoulder girdle muscle bulk and progressive joint stiffness
          is common. Early muscular involvement, occasionally with congenital
          arthrogryposis, may be present.
        explanation: >-
