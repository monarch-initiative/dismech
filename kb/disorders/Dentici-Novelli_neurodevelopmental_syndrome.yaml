    snippet: >-
      Recent studies suggest that biallelic pathogenic variants in ZNF526 may lead to Dentici‐Novelli neurodevelopmental syndrome, characterized by microcephaly, developmental delay, epilepsy, and ocular anomalies.
    explanation: This directly supports global developmental delay as a defining clinical feature.
- name: Microcephaly
  category: Neurologic
