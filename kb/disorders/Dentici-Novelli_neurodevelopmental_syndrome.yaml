    snippet: >-
      This syndrome exhibits a highly heterogeneous clinical phenotype, with key features including early-onset severe global developmental delay and microcephaly.
    explanation: This directly supports global developmental delay as a defining clinical feature.
- name: Microcephaly
  category: Neurologic
  diagnostic: true
  description: Severe microcephaly is a major recurring feature of the syndrome.
  phenotype_term:
    preferred_term: Microcephaly
    term:
      id: HP:0000252
      label: Microcephaly
  evidence:
  - reference: PMID:33397746
    reference_title: Biallelic variants in ZNF526 cause a severe neurodevelopmental disorder with microcephaly, bilateral cataract, epilepsy and simplified gyration.
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      RESULTS: We identified five patients from four unrelated families with homozygous ZNF526 variants by whole exome sequencing. Four had variants resulting in truncation of ZNF526; they were affected by severe prenatal and postnatal microcephaly (ranging from -4 SD to -8 SD), profound psychomotor delay, hypertonic-dystonic movements, epilepsy and simplified gyral pattern on MRI.
    explanation: This directly supports severe microcephaly as a major phenotype in patients with biallelic ZNF526 variants.
- name: Seizure
  category: Neurologic
  diagnostic: true
  description: Epilepsy is part of the characteristic neurologic syndrome.
  phenotype_term:
    preferred_term: Seizure
    term:
      id: HP:0001250
      label: Seizure
  evidence:
  - reference: DOI:10.1002/mgg3.70089
    reference_title: "Novel Compound Heterozygous Variants in <scp><i>ZNF526</i></scp> Causing Dentici‐Novelli Neurodevelopmental Syndrome: A Case Report and Literature Review"
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Affected individuals often present with various neurologic symptoms, such as axial hypotonia, spastic hypertonia, dystonic quadriplegia, profound intellectual disability, and seizures.
    explanation: This directly supports seizures as a recurring neurologic manifestation.
- name: Cataract
  category: Ophthalmologic
  diagnostic: true
  description: Bilateral cataract is a characteristic ocular manifestation.
  phenotype_term:
    preferred_term: Cataract
    term:
      id: HP:0000518
      label: Cataract
  evidence:
  - reference: PMID:33397746
    reference_title: Biallelic variants in ZNF526 cause a severe neurodevelopmental disorder with microcephaly, bilateral cataract, epilepsy and simplified gyration.
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      All of them also displayed bilateral progressive cataracts.
    explanation: This directly supports cataract as a characteristic ocular feature of the syndrome.
