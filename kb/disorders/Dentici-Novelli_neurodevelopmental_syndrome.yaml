    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Whole exome sequencing revealed two heterozygous variants in the ZNF526 gene (NM_133444.3): c.1426del (p.Val476Phefs*9), a de novo frameshift variant, and c.1513T;> C (p.Cys505Arg), inherited from her mother.
    explanation: This directly supports molecular genetic testing as the diagnostic method used to establish the diagnosis.
