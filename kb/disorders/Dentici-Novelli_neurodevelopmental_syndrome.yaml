name: Dentici-Novelli neurodevelopmental syndrome
creation_date: "2026-04-15T15:45:03Z"
updated_date: "2026-04-15T15:45:03Z"
description: >-
  Dentici-Novelli neurodevelopmental syndrome is a rare ZNF526-related
  autosomal recessive disorder characterized by severe neurodevelopmental
  impairment with microcephaly, epilepsy, cataracts, and brain malformations.
  Available evidence supports ZNF526-related transcriptional dysregulation with
  downstream abnormalities of brain and eye development.
category: Mendelian
parents:
- hereditary disease
- neurodevelopmental disorder
disease_term:
  preferred_term: Dentici-Novelli neurodevelopmental syndrome
  term:
    id: MONDO:0859251
    label: Dentici-Novelli neurodevelopmental syndrome
inheritance:
- name: Autosomal recessive inheritance
  description: >-
    Dentici-Novelli neurodevelopmental syndrome is caused by biallelic
    pathogenic variants in ZNF526 and is inherited in an autosomal recessive
    pattern.
  inheritance_term:
    preferred_term: Autosomal recessive inheritance
    term:
      id: HP:0000007
      label: Autosomal recessive inheritance
  evidence:
  - reference: DOI:10.1002/mgg3.70089
    reference_title: "Novel Compound Heterozygous Variants in <scp><i>ZNF526</i></scp> Causing Dentici‐Novelli Neurodevelopmental Syndrome: A Case Report and Literature Review"
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Dentici-Novelli neurodevelopmental syndrome (DENNED, OMIM#619877) is a rare autosomal recessive disorder caused by pathogenic variants in the ZNF526 gene, first described by Dentici in 2022 (Dentici et al. 2022).
    explanation: This directly supports autosomal recessive inheritance and ZNF526 causality.
pathophysiology:
- name: ZNF526-related transcriptional dysregulation
  description: >-
    ZNF526 encodes a Kruppel-type zinc finger protein with transcriptional
    regulatory function. Biallelic pathogenic variants disrupt this regulatory
    role and initiate the syndrome.
  genes:
  - preferred_term: ZNF526
    term:
      id: hgnc:29415
      label: ZNF526
  biological_processes:
  - preferred_term: regulation of transcription by RNA polymerase II
    modifier: ABNORMAL
    term:
      id: GO:0006357
      label: regulation of transcription by RNA polymerase II
  evidence:
  - reference: DOI:10.1002/mgg3.70089
    reference_title: "Novel Compound Heterozygous Variants in <scp><i>ZNF526</i></scp> Causing Dentici‐Novelli Neurodevelopmental Syndrome: A Case Report and Literature Review"
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      The ZNF526 gene encodes a ubiquitously expressed Kruppel‐type zinc finger protein crucial in transcriptional regulation.
    explanation: This supports transcriptional dysregulation as the initiating molecular mechanism when ZNF526 is disrupted.
  downstream:
  - target: Abnormal brain development
    description: Disrupted ZNF526-dependent regulation perturbs neurodevelopment.
  - target: Abnormal eye development
    description: Developmental eye defects arise downstream of altered ZNF526 function.
- name: Abnormal brain development
  description: >-
    The syndrome prominently affects brain development and produces
    microcephaly, cortical simplification, and epileptic encephalopathy.
  biological_processes:
  - preferred_term: neurogenesis
    modifier: ABNORMAL
    term:
      id: GO:0022008
      label: neurogenesis
  evidence:
  - reference: PMID:33397746
    reference_title: Biallelic variants in ZNF526 cause a severe neurodevelopmental disorder with microcephaly, bilateral cataract, epilepsy and simplified gyration.
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      CONCLUSION: Our findings support the role of ZNF526 biallelic variants in a complex neurodevelopmental disorder, primarily affecting brain and eyes, resulting in severe microcephaly, simplified gyral pattern, epileptic encephalopathy and bilateral cataracts.
    explanation: This directly supports abnormal brain development as a core downstream consequence of ZNF526 dysfunction.
  downstream:
  - target: Microcephaly
    description: Abnormal brain growth contributes to severe microcephaly.
  - target: Seizure
    description: Brain developmental abnormality contributes to epileptic encephalopathy.
- name: Abnormal eye development
  description: >-
    ZNF526 dysfunction perturbs ocular development and is associated with
    cataract formation.
  biological_processes:
  - preferred_term: eye development
    modifier: ABNORMAL
    term:
      id: GO:0001654
      label: eye development
  evidence:
  - reference: PMID:33397746
    reference_title: Biallelic variants in ZNF526 cause a severe neurodevelopmental disorder with microcephaly, bilateral cataract, epilepsy and simplified gyration.
    supports: SUPPORT
    evidence_source: MODEL_ORGANISM
    snippet: >-
      Mutant znf526 zebrafish larvae had notable malformations of the eye and central nervous system, resembling findings seen in the human holoprosencephaly spectrum.
    explanation: This model-organism evidence supports a developmental role for ZNF526 in ocular morphogenesis.
  downstream:
  - target: Cataract
    description: Developmental eye abnormalities contribute to bilateral cataracts.
