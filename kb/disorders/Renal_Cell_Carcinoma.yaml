discussions:
- discussion_id: gap_rcc_prr15_cuproptosis
  prompt: >-
    PRR15 (Proline-rich 15) was recently reported to suppress renal cell
    carcinoma progression by promoting cuproptosis via an NF-κB/FDX1 axis, yet
    the upstream signals that silence PRR15 during tumorigenesis, the functional
    hierarchy of the PRR15/NF-κB/FDX1 axis, and the relevance of impaired
    cuproptosis to therapy resistance remain unknown. Which signals trigger PRR15
    loss, is PRR15 a direct or indirect regulator of NF-κB, and is PRR15 loss a
    driver or passenger event in RCC?
  kind: KNOWLEDGE_GAP
  status: OPEN
  attaches_to:
  - pathophysiology#Renal Epithelial Malignancy
  - pathophysiology#Histologic and Molecular Heterogeneity
  rationale: >-
    Cuproptosis, a copper-dependent regulated cell death, contributes to RCC
    proliferation, metastasis, and drug-resistance with Ferredoxin 1 (FDX1) as a
    core regulator. Ma et al. (2026) report that PRR15 promotes cuproptosis and
    mitochondrial damage in RCC cells and that PRR15 silencing activates NF-κB,
    which represses FDX1 and blocks cuproptosis, increasing tumor invasiveness.
    However, the upstream events that drive PRR15 loss in developing RCC are not
    defined, leaving open whether PRR15 silencing is a tumor-initiating driver or
    a passenger consequence of malignant transformation. It is also unresolved
    whether PRR15 regulates NF-κB directly or through intermediate effectors, and
    whether the same axis operates across the histologic and molecular subtypes
    of RCC. Finally, the contribution of cuproptosis evasion to resistance
    against conventional and targeted RCC therapies is unknown. Resolving these
    gaps would clarify whether the PRR15/NF-κB/FDX1 axis is a tractable
    therapeutic target and a biomarker of RCC aggressiveness.
  proposed_experiments:
  - experiment_id: exp_rcc_prr15_silencing_triggers
    name: Identify upstream triggers and driver/passenger status of PRR15 silencing
    description: >-
      Profile PRR15 expression, promoter methylation, copy-number, and mutation
      status across primary RCC tumors and matched normal kidney, stratified by
      histologic and molecular subtype. Combine with engineered restoration or
      knockout of PRR15 in RCC cell lines and orthotopic xenografts to test
      whether PRR15 loss is sufficient to initiate or accelerate malignant
      progression versus arising downstream of established transformation, and
      whether candidate upstream signals (e.g., inflammatory cytokine exposure,
      epigenetic silencing) suppress PRR15.
    experiment_type:
      preferred_term: integrative molecular profiling with functional perturbation
    readouts:
    - name: PRR15 silencing mechanism across subtypes
      target: pathophysiology#Histologic and Molecular Heterogeneity
      description: >
        Quantify PRR15 expression, promoter methylation, and genomic alterations
        across RCC subtypes to determine the dominant silencing mechanism and
        whether it is subtype-specific.
      assays:
      - preferred_term: bisulfite sequencing
      - preferred_term: RNA sequencing
      direction: NEGATIVE
    - name: Tumorigenic consequence of PRR15 manipulation
      target: pathophysiology#Renal Epithelial Malignancy
      description: >
        Measure proliferation, invasion, and metastatic burden after PRR15
        restoration or knockout to test whether PRR15 loss is a driver of
        malignant progression.
      assays:
      - preferred_term: orthotopic xenograft tumor growth assay
      - preferred_term: transwell invasion assay
      direction: POSITIVE
    decision_criterion: >-
      PRR15 loss is supported as a driver if its restoration suppresses, and its
      knockout enhances, tumor proliferation/invasion in vivo, and if a
      reproducible upstream silencing mechanism (e.g., promoter hypermethylation)
      is identified in primary tumors with low PRR15. A predominantly passenger
      role is supported if PRR15 manipulation does not alter tumor behavior
      despite axis perturbation.
    would_support:
    - pathophysiology#Renal Epithelial Malignancy
    - pathophysiology#Histologic and Molecular Heterogeneity
  evidence:
  - reference: PMID:41673093
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: "PRR15 promotes cuproptosis and mitochondrial damage in RCC cells"
    explanation: >-
      Establishes the cell-based finding that PRR15 promotes cuproptosis and
      mitochondrial damage in RCC cells, motivating the gap around how PRR15 is
      silenced and its driver/passenger status.
  - reference: PMID:41673093
    supports: SUPPORT
    evidence_source: MODEL_ORGANISM
    snippet: "inhibits tumor proliferation and metastasis, as demonstrated in vivo"
    explanation: >-
      Reports the in vivo (xenograft) tumor-suppressive effect of PRR15,
      separating the animal-model evidence for tumor suppression from the
      cell-based cuproptosis mechanism.
  - reference: PMID:41673093
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: "When RCC develops, PRR15 silencing activates the nuclear factor kappa-B (NF-κB) signaling pathway, which inhibits FDX1 expression, ultimately blocking the cuproptosis process and increasing tumor invasiveness."
    explanation: >-
      Defines the PRR15/NF-κB/FDX1 axis whose upstream triggers and direct-versus-
      indirect mechanism remain the central knowledge gap.
