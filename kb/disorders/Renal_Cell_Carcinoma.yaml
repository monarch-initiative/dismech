pathophysiology:
- name: Renal Epithelial Malignancy
  description: >-
    Malignant transformation of renal epithelial cells gives rise to renal cell
    carcinoma with diverse molecular subtypes.
  evidence:
  - reference: PMID:28898679
    reference_title: "Systemic treatment of renal cell cancer: A comprehensive review."
    supports: SUPPORT
    snippet: "The most common form of kidney cancer arises from renal epithelium, named renal cell carcinoma (RCC)."
    explanation: The abstract identifies RCC as arising from renal epithelium.
- name: Histologic and Molecular Heterogeneity
  description: >-
    Renal cell carcinoma comprises multiple histological and molecular
    subtypes, reflecting heterogeneous biology.
  evidence:
  - reference: PMID:28898679
    reference_title: "Systemic treatment of renal cell cancer: A comprehensive review."
    supports: SUPPORT
    snippet: "This entity comprises different histological and molecular subtypes."
    explanation: The abstract notes RCC heterogeneity across histologic and molecular subtypes.
- name: Impaired Cuproptosis via PRR15/NF-κB/FDX1 Axis
  description: >-
    Cuproptosis is a copper-dependent form of regulated cell death that acts as a
    tumor suppressor in RCC. Ferredoxin 1 (FDX1) serves as a core regulator of
    cuproptosis and its associated mitochondrial dysfunction. PRR15 (Proline-rich 15)
    promotes cuproptosis through a regulatory axis, but during RCC development, PRR15
    is silenced. This silencing activates NF-κB signaling, which represses FDX1
    expression, blocking cuproptosis and promoting tumor invasiveness and metastasis.
    The evasion of cuproptosis contributes to RCC progression by allowing tumor cells
    to escape this cell-death pathway while maintaining enhanced lipid metabolism and
    altered oxidative stress regulation in the tumor microenvironment.
  evidence:
  - reference: PMID:41673093
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: "PRR15 promotes cuproptosis and mitochondrial damage in RCC cells"
    explanation: Establishes that PRR15 directly promotes cuproptosis and mitochondrial dysfunction in RCC cells, demonstrating the core mechanism.
  - reference: PMID:41673093
    supports: SUPPORT
    evidence_source: MODEL_ORGANISM
    snippet: "inhibits tumor proliferation and metastasis, as demonstrated in vivo"
    explanation: In vivo studies in RCC xenografts demonstrate that PRR15-mediated cuproptosis suppresses tumor progression.
  - reference: PMID:41673093
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: "When RCC develops, PRR15 silencing activates the nuclear factor kappa-B (NF-κB) signaling pathway, which inhibits FDX1 expression, ultimately blocking the cuproptosis process and increasing tumor invasiveness."
    explanation: Demonstrates the PRR15/NF-κB/FDX1 axis that controls cuproptosis evasion during RCC development.
