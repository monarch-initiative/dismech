  term:
    id: MONDO:0005086
    label: renal cell carcinoma
description: >-
  Renal cell carcinoma is the most common form of kidney cancer arising from
  renal epithelial cells.
pathophysiology:
- name: Renal Epithelial Malignancy
  description: >-
    Malignant transformation of renal epithelial cells gives rise to renal cell
    carcinoma with diverse molecular subtypes.
  evidence:
  - reference: PMID:28898679
    reference_title: "Systemic treatment of renal cell cancer: A comprehensive review."
    supports: SUPPORT
    snippet: "The most common form of kidney cancer arises from renal epithelium, named renal cell carcinoma (RCC)."
    explanation: The abstract identifies RCC as arising from renal epithelium.
- name: Histologic and Molecular Heterogeneity
  description: >-
    Renal cell carcinoma comprises multiple histological and molecular
    subtypes, reflecting heterogeneous biology.
  evidence:
  - reference: PMID:28898679
    reference_title: "Systemic treatment of renal cell cancer: A comprehensive review."
    supports: SUPPORT
    snippet: "This entity comprises different histological and molecular subtypes."
    explanation: The abstract notes RCC heterogeneity across histologic and molecular subtypes.
- name: Impaired Cuproptosis via PRR15 Loss
  description: >-
    PRR15 silencing in RCC cells leads to NF-κB pathway activation, which suppresses FDX1 expression,
    impairing cuproptosis and promoting tumor progression and invasiveness. This represents a loss of
    a cuproptosis-dependent tumor suppression mechanism.
  evidence:
  - reference: PMID:41673093
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: "PRR15 promotes cuproptosis and mitochondrial damage in RCC cells and inhibits tumor proliferation and metastasis, as demonstrated in vivo and in vitro. When RCC develops, PRR15 silencing activates the nuclear factor kappa-B (NF-κB) signaling pathway, which inhibits FDX1 expression, ultimately blocking the cuproptosis process and increasing tumor invasiveness."
    explanation: The study demonstrates that PRR15 loss leads to NF-κB activation and FDX1 suppression, blocking cuproptosis and promoting RCC progression.
