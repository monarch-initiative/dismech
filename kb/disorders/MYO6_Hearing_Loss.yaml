name: MYO6_Hearing_Loss
creation_date: '2026-04-04T00:00:00Z'
updated_date: '2026-04-04T00:00:00Z'
category: Mendelian
description: >
  MYO6-related hearing loss encompasses autosomal dominant nonsyndromic hearing loss 22
  (DFNA22) and autosomal recessive nonsyndromic hearing loss 37 (DFNB37), both caused
  by pathogenic variants in MYO6 encoding the unconventional myosin VI motor protein.
  Myosin VI is unique among myosins in moving toward the minus end of actin filaments
  and is essential for stereocilia maintenance in cochlear hair cells. Dominant (DFNA22)
  mutations typically cause progressive postlingual sensorineural hearing loss with
  juvenile onset that accelerates after age 40, while recessive (DFNB37) mutations
  cause congenital profound deafness. A subset of families with dominant MYO6 mutations
  also present with hypertrophic cardiomyopathy featuring left ventricular hypertrophy,
  reflecting the role of myosin VI in cardiac tissue. MYO6 accounts for approximately
  2.4% of autosomal dominant sensorineural hearing loss.
disease_term:
  preferred_term: MYO6-related hearing loss
  term:
    id: MONDO:0019497
    label: nonsyndromic genetic hearing loss
parents:
- Nonsyndromic Hearing Loss
- Inner Ear Disorder
inheritance:
- name: Autosomal dominant (DFNA22)
  inheritance_term:
    preferred_term: Autosomal dominant inheritance
    term:
      id: HP:0000006
      label: Autosomal dominant inheritance
  description: >
    Autosomal dominant nonsyndromic hearing loss 22 (DFNA22) is caused by heterozygous
    pathogenic variants in MYO6. Progressive postlingual sensorineural hearing loss
    typically begins in childhood or adolescence and worsens with age.
  evidence:
  - reference: PMID:11468689
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "We describe the mapping of a new deafness locus, DFNA22, on chromosome
      6q13 in a family affected by a nonsyndromic dominant form of deafness (NSAD),
      and the subsequent identification of a missense mutation in the MYO6 gene in
      all members of the family with hearing loss."
    explanation: Original identification of DFNA22 locus with autosomal dominant
      inheritance linked to MYO6 mutation.
- name: Autosomal recessive (DFNB37)
  inheritance_term:
    preferred_term: Autosomal recessive inheritance
    term:
      id: HP:0000007
      label: Autosomal recessive inheritance
  description: >
    Autosomal recessive nonsyndromic hearing loss 37 (DFNB37) is caused by biallelic
    pathogenic variants in MYO6, resulting in congenital profound deafness.
  evidence:
  - reference: PMID:12687499
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Cosegregation of profound, congenital deafness with markers on chromosome
      6q13 in three Pakistani families defines a new recessive deafness locus, DFNB37."
    explanation: Establishes DFNB37 as an autosomal recessive deafness locus
      mapping to MYO6 on chromosome 6q13.
prevalence:
- population: Japanese ADSNHL families
  percentage: '2.4'
  notes: >-
    MYO6 mutations accounted for 2.40% of autosomal dominant sensorineural hearing
    loss in a large Japanese cohort of 1336 ADSNHL families.
  evidence:
  - reference: PMID:32143290
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "In total, 2.40% of autosomal dominant sensorineural hearing loss (ADSNHL)
      in families in this study (32 out of 1336) was found to be caused by MYO6 mutations."
    explanation: Large-scale genetic screening of Japanese hearing loss patients
      establishes MYO6 mutation frequency among ADSNHL families.
pathophysiology:
- name: Stereocilia Dysfunction in Cochlear Hair Cells
  description: >
    MYO6 encodes myosin VI, the only known minus-end-directed actin-based motor
    protein. In cochlear hair cells, myosin VI is essential for anchoring the
    stereocilia plasma membrane to the actin core and for maintaining stereocilia
    structural integrity. Loss-of-function mutations lead to disorganized and
    malformed stereocilia, impairing mechanotransduction and causing sensorineural
    hearing loss.
  cell_types:
  - preferred_term: Auditory hair cell
    term:
      id: CL:0000202
      label: auditory hair cell
  biological_processes:
  - preferred_term: Actin cytoskeleton organization
    term:
      id: GO:0030036
      label: actin cytoskeleton organization
  evidence:
  - reference: PMID:32143290
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "the present data clearly showed that MYO6 is one of the genes to keep
      in mind with regard to ADSNHL, and the molecular characteristics of the identified
      gene variants suggest that a possible pathology seems to result from malformed
      stereocilia of the cochlear hair cells."
    explanation: Links MYO6 variants to stereocilia malformation as the mechanism
      underlying hearing loss.
  - reference: PMID:31103816
    supports: SUPPORT
    evidence_source: MODEL_ORGANISM
    snippet: "We also observed disorganized stereocilia with irregular morphological
      features by immunohistochemistry and scanning electron microscopy."
    explanation: Mouse model confirms that MYO6 mutation causes stereocilia
      disorganization in vivo.
  downstream:
  - target: Progressive Sensorineural Hearing Loss
- name: Progressive Sensorineural Hearing Loss
  description: >
    In DFNA22, heterozygous MYO6 mutations cause progressive sensorineural hearing
    loss typically beginning in childhood and accelerating after age 40. The progressive
    nature resembles presbyacusis. In DFNB37, biallelic MYO6 mutations cause congenital
    profound deafness.
  evidence:
  - reference: PMID:32143290
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "The present study clarified that most cases showed juvenile-onset progressive
      hearing loss and their hearing deteriorated markedly after 40 years of age."
    explanation: Characterizes the progressive nature and age-dependent acceleration
      of MYO6-related hearing loss.
  - reference: PMID:23340379
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "This missense mutation results in a flat configured audiogram with a mild
      hearing loss, which becomes severe to profound and gently to steeply downsloping
      later in life."
    explanation: Further characterization of progressive hearing loss pattern in
      a DFNA22 family showing presbyacusis-like progression.
  - reference: PMID:12687499
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "In families with recessively inherited deafness, DFNB37, our sequence
      analyses of MYO6 reveal a frameshift mutation (36-37insT), a nonsense mutation
      (R1166X), and a missense mutation (E216V)."
    explanation: Documents the allelic spectrum in recessive DFNB37 including
      truncating and missense variants causing congenital deafness.
- name: Cardiac Involvement
  description: >
    A subset of individuals with dominant MYO6 mutations develop hypertrophic
    cardiomyopathy with left ventricular hypertrophy. Myosin VI is expressed in
    cardiac tissue, predominantly in vascular endothelial cells, and loss of function
    leads to left ventricular hypertrophy with interstitial and perivascular fibrosis.
  evidence:
  - reference: PMID:26265212
    supports: SUPPORT
    evidence_source: MODEL_ORGANISM
    snippet: "Sv/sv heart mass is significantly greater than that of sv/+ littermates,
      a result of left ventricle hypertrophy. The left ventricle of the sv/sv exhibits
      extensive fibrosis, both interstitial and perivascular"
    explanation: Snell's waltzer mouse model demonstrates that MYO6 loss of function
      causes left ventricular hypertrophy and cardiac fibrosis.
  - reference: PMID:26265212
    supports: SUPPORT
    evidence_source: MODEL_ORGANISM
    snippet: "In mice and humans, loss of myosin VI (Myo6) function results in deafness,
      and certain Myo6 mutations also result in cardiomyopathies in humans."
    explanation: Establishes the dual phenotype of deafness and cardiomyopathy
      associated with myosin VI dysfunction.
phenotypes:
- category: Clinical
  name: Sensorineural hearing impairment
  description: >
    Progressive sensorineural hearing loss is the hallmark feature. In DFNA22,
    onset is typically juvenile with accelerating deterioration after age 40.
    In DFNB37, hearing loss is congenital and profound.
  phenotype_term:
    preferred_term: Sensorineural hearing impairment
    term:
      id: HP:0000407
      label: Sensorineural hearing impairment
  evidence:
  - reference: PMID:32143290
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "most cases showed juvenile-onset progressive hearing loss and their hearing
      deteriorated markedly after 40 years of age"
    explanation: Characterizes the progressive sensorineural hearing loss pattern
      in MYO6 DFNA22 patients.
- category: Clinical
  name: Progressive hearing impairment
  description: >
    Hearing deterioration is progressive, estimated at 0.57 dB per year overall,
    accelerating to 1.07 dB per year after age 40.
  phenotype_term:
    preferred_term: Progressive hearing impairment
    term:
      id: HP:0001730
      label: Progressive hearing impairment
  evidence:
  - reference: PMID:32143290
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "The estimated hearing deterioration was found to be 0.57 dB per year;
      when restricted to change after 40 years of age, the deterioration speed was
      accelerated to 1.07 dB per year."
    explanation: Quantifies the progressive nature of MYO6-related hearing loss
      with age-dependent acceleration.
- category: Clinical
  name: Hypertrophic cardiomyopathy
  description: >
    A subset of families with dominant MYO6 mutations present with hypertrophic
    cardiomyopathy, particularly left ventricular hypertrophy. This was first
    described in association with the H246R mutation.
  phenotype_term:
    preferred_term: Hypertrophic cardiomyopathy
    term:
      id: HP:0001639
      label: Hypertrophic cardiomyopathy
  evidence:
  - reference: PMID:26265212
    supports: SUPPORT
    evidence_source: MODEL_ORGANISM
    snippet: "In mice and humans, loss of myosin VI (Myo6) function results in deafness,
      and certain Myo6 mutations also result in cardiomyopathies in humans."
    explanation: Confirms the association of MYO6 mutations with cardiomyopathy
      in humans and animal models.
- category: Clinical
  name: Left ventricular hypertrophy
  description: >
    Left ventricular hypertrophy with fibrosis has been documented in MYO6
    loss-of-function contexts, both in human kindreds and in the Snell's waltzer
    mouse model.
  phenotype_term:
    preferred_term: Left ventricular hypertrophy
    term:
      id: HP:0001712
      label: Left ventricular hypertrophy
  evidence:
  - reference: PMID:26265212
    supports: SUPPORT
    evidence_source: MODEL_ORGANISM
    snippet: "Sv/sv heart mass is significantly greater than that of sv/+ littermates,
      a result of left ventricle hypertrophy."
    explanation: Demonstrates left ventricular hypertrophy in the MYO6-null
      Snell's waltzer mouse model.
genetic:
- name: MYO6 pathogenic variants
  gene_term:
    preferred_term: MYO6
    term:
      id: hgnc:7605
      label: MYO6
  association: Causative
  features: 'MYO6 encodes unconventional myosin VI, the only known minus-end-directed
    actin-based motor. Pathogenic variants include missense mutations causing dominant
    progressive hearing loss (DFNA22), and frameshift, nonsense, and missense mutations
    causing recessive congenital deafness (DFNB37). Specific mutations such as H246R
    have been associated with both hearing loss and hypertrophic cardiomyopathy.'
  inheritance:
  - name: Autosomal dominant
    inheritance_term:
      preferred_term: Autosomal dominant inheritance
      term:
        id: HP:0000006
        label: Autosomal dominant inheritance
  - name: Autosomal recessive
    inheritance_term:
      preferred_term: Autosomal recessive inheritance
      term:
        id: HP:0000007
        label: Autosomal recessive inheritance
  variants:
  - name: c.737A>G (p.His246Arg)
    description: Missense mutation associated with both sensorineural hearing loss
      and hypertrophic cardiomyopathy in a large kindred.
    evidence:
    - reference: PMID:15060111
      supports: SUPPORT
      evidence_source: HUMAN_CLINICAL
      snippet: "Novel association of hypertrophic cardiomyopathy, sensorineural deafness,
        and a mutation in unconventional myosin VI (MYO6)."
      explanation: Key paper establishing the association of MYO6 H246R with both
        hearing loss and hypertrophic cardiomyopathy.
  - name: c.36-37insT (frameshift)
    description: Frameshift mutation causing recessive congenital profound deafness
      (DFNB37).
    evidence:
    - reference: PMID:12687499
      supports: SUPPORT
      evidence_source: HUMAN_CLINICAL
      snippet: "our sequence analyses of MYO6 reveal a frameshift mutation (36-37insT),
        a nonsense mutation (R1166X), and a missense mutation (E216V)"
      explanation: Documents truncating and missense MYO6 variants in DFNB37
        families with congenital deafness.
  evidence:
  - reference: PMID:32451864
    supports: SUPPORT
    evidence_source: OTHER
    snippet: "The evidence that pathogenic variants of human MYO3A, MYO6, MYO7A, MYO15A,
      MYH14 and MYH9 are associated with deafness ranges from moderate to definitive."
    explanation: Review confirms definitive evidence for MYO6 as a deafness gene.
  - reference: PMID:11468689
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Mutations in the unconventional myosin VI gene, Myo6, are associated with
      deafness and vestibular dysfunction in the Snell's waltzer (sv) mouse. The corresponding
      human gene, MYO6, is located on chromosome 6q13."
    explanation: First identification of MYO6 as the causative gene for DFNA22.
animal_models:
- species: Mouse
  genotype: Snell's waltzer (sv/sv) - Myo6 functional null
  description: >
    The Snell's waltzer mouse carries a spontaneous null mutation in Myo6 and exhibits
    deafness, vestibular dysfunction, and cardiac defects including left ventricular
    hypertrophy with extensive fibrosis.
  evidence:
  - reference: PMID:26265212
    supports: SUPPORT
    evidence_source: MODEL_ORGANISM
    snippet: "The current studies have utilized the Snell's waltzer (sv) mouse (a
      functional null mutation for Myo6) to determine if this mouse also exhibits
      cardiac defects"
    explanation: Characterization of the Snell's waltzer mouse as a model for
      MYO6-related cardiac and hearing phenotypes.
- species: Mouse
  genotype: Myo6-C442Y knock-in
  description: >
    Humanized knock-in mouse model mimicking the p.C442Y DFNA22 variant. Both
    homozygous and heterozygous mice exhibit progressive hearing loss from three
    weeks after birth, with semi-dominant inheritance pattern.
  evidence:
  - reference: PMID:31103816
    supports: SUPPORT
    evidence_source: MODEL_ORGANISM
    snippet: "Heterozygous Myo6-C442Y mice recapitulated the progressive postlingual
      sensorineural deafness in human, thus providing a useful model for elucidating
      the role myosin VI plays in the mammalian auditory system."
    explanation: Humanized mouse model recapitulates the progressive hearing loss
      seen in human DFNA22 patients.
has_subtypes:
- name: DFNA22
  display_name: DFNA22 (Autosomal Dominant)
  description: >
    Autosomal dominant nonsyndromic hearing loss caused by heterozygous MYO6 mutations.
    Progressive postlingual sensorineural hearing loss, sometimes with hypertrophic
    cardiomyopathy.
- name: DFNB37
  display_name: DFNB37 (Autosomal Recessive)
  description: >
    Autosomal recessive nonsyndromic hearing loss caused by biallelic MYO6 mutations.
    Congenital profound deafness.
