- name: Prophylactic gonadectomy
  description: >-
    Early gonadectomy is used to reduce the substantial gonadal malignancy risk
    associated with dysgenetic streak gonads.
  treatment_term:
    preferred_term: gonadectomy
    term:
      id: MAXO:0001055
