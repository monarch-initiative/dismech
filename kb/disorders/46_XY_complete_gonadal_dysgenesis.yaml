      malignant outcomes and a review of literature.
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Gonadectomy was performed in 12 cases (80%).
    explanation: >-
      This directly supports gonadectomy as a standard management step in many
      affected patients.
