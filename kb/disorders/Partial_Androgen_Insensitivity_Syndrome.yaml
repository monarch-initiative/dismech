    explanation: The Lancet seminar supports multidisciplinary management for AIS.
- name: Individualized gonadectomy
  description: >-
    Gonadectomy is considered when gonadal tumor-risk management, gonadal
    position, sex assignment, pubertal goals, fertility goals, and hormone
    replacement planning support removal.
