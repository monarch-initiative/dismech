name: Partial androgen insensitivity syndrome
creation_date: "2026-05-11T05:50:01Z"
updated_date: "2026-05-11T05:50:01Z"
category: Mendelian
description: >-
  Partial androgen insensitivity syndrome is an X-linked 46,XY difference of
  sex development caused most often by pathogenic variants in AR, the androgen
  receptor gene. Residual androgen receptor activity produces partial, variable
  target-tissue responsiveness to testosterone and dihydrotestosterone, leading
  to predominantly male or ambiguous external genitalia, hypospadias,
  cryptorchidism, gynecomastia, abnormal secondary sexual hair development, and
  impaired fertility.
disease_term:
  preferred_term: partial androgen insensitivity syndrome
  term:
    id: MONDO:0010720
    label: partial androgen insensitivity syndrome
synonyms:
- PAIS
- Partial androgen resistance syndrome
parents:
