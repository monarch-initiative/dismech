diagnosis:
- name: Clinical 46,XY DSD assessment
  description: >-
    PAIS is suspected when a 46,XY individual with testes has predominantly male
    or ambiguous external genitalia, hypospadias, cryptorchidism, gynecomastia,
    or other signs of partial androgen resistance.
  diagnosis_term:
    preferred_term: clinical assessment
    term:
      id: MAXO:0000487
      label: clinical assessment
  results: 46,XY DSD phenotype with partial androgen-resistance features.
  evidence:
  - reference: ORPHA:90797
    reference_title: Partial androgen insensitivity syndrome
    supports: SUPPORT
    evidence_source: OTHER
    snippet: "abnormal genital development in a 46,XY individual with normal testis development"
    explanation: Orphanet defines PAIS by abnormal genital development in a 46,XY individual with normal testis development.
  - reference: PMID:29785970
    reference_title: Phenotypic and molecular characteristics of androgen insensitivity syndrome patients.
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "partial androgen insensitivity syndrome (PAIS) with predominantly male or ambiguous external genitalia"
    explanation: This AIS cohort paper describes the PAIS clinical phenotype.
- name: Karyotyping
  description: Karyotyping confirms the 46,XY chromosomal sex context for the DSD presentation.
  diagnosis_term:
    preferred_term: karyotyping
    term:
      id: MAXO:0001611
      label: karyotyping
  results: 46,XY karyotype.
  evidence:
  - reference: PMID:29785970
    reference_title: Phenotypic and molecular characteristics of androgen insensitivity syndrome patients.
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "all had a 46, XY karyotype."
    explanation: The cohort describes karyotyping as part of AIS clinical characterization.
- name: Hormone measurement and hCG stimulation
  description: >-
    Hormone testing evaluates testosterone production and gonadotropins,
    distinguishing androgen resistance from testosterone biosynthesis defects.
  diagnosis_term:
