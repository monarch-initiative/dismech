pathophysiology:
- name: AR Germline Pathogenic Variant
  description: >-
    Hemizygous pathogenic variants in AR disrupt the X-linked androgen receptor,
    the nuclear receptor that mediates androgen-dependent transcriptional
    programs in reproductive and other androgen-responsive tissues.
  genes:
  - preferred_term: AR
    term:
      id: hgnc:644
      label: AR
  biological_processes:
  - preferred_term: androgen receptor signaling pathway
    term:
      id: GO:0030521
      label: androgen receptor signaling pathway
    modifier: DECREASED
  evidence:
  - reference: ORPHA:90797
    reference_title: Partial androgen insensitivity syndrome
    supports: SUPPORT
    evidence_source: OTHER
    snippet: "AR | androgen receptor | hgnc:644 | Disease-causing germline mutation(s) in"
    explanation: Orphanet records germline AR variants as disease-causing in PAIS.
  - reference: PMID:29785970
    reference_title: Phenotypic and molecular characteristics of androgen insensitivity syndrome patients.
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "A pathogenic mutation of the androgen receptor gene (AR; OMIM# 313700) is the only established molecular cause of the X-linked recessive inherited disease."
    explanation: This AIS cohort identifies pathogenic AR mutation as the established molecular cause.
  downstream:
  - target: Partial Androgen Receptor Dysfunction
    causal_link_type: DIRECT
    description: >-
      AR variants impair receptor expression, ligand binding, DNA binding,
      receptor interactions, or downstream transcriptional activation.
    evidence:
    - reference: PMID:32338288
      reference_title: Novel compound variants of the AR and MAP3K1 genes are related to the clinical heterogeneity of androgen insensitivity syndrome.
      supports: SUPPORT
      evidence_source: HUMAN_CLINICAL
      snippet: "There are at least five potential mechanisms by which AR variants reduce or abolish AR function"
      explanation: The paper summarizes mechanisms by which AR variants reduce or abolish receptor function.
- name: Partial Androgen Receptor Dysfunction
  description: >-
    The mutant androgen receptor retains variable residual function, so androgen
    signaling is impaired but not completely absent in target tissues.
  biological_processes:
  - preferred_term: androgen receptor signaling pathway
    term:
      id: GO:0030521
      label: androgen receptor signaling pathway
    modifier: DECREASED
  evidence:
  - reference: PMID:29785970
    reference_title: Phenotypic and molecular characteristics of androgen insensitivity syndrome patients.
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "This protein functions as a steroid hormone-activated transcription factor"
    explanation: The cohort paper describes the androgen receptor's normal transcription-factor function.
  - reference: PMID:32338288
    reference_title: Novel compound variants of the AR and MAP3K1 genes are related to the clinical heterogeneity of androgen insensitivity syndrome.
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Impairment in androgen or DNA binding is the most common mechanism"
    explanation: This supports impaired ligand or DNA binding as common mechanisms of receptor dysfunction.
  downstream:
  - target: Partial Androgen Target-Tissue Resistance
    causal_link_type: DIRECT
    description: >-
      Reduced receptor signaling makes androgen-responsive tissues only
      partially responsive to age-appropriate androgen exposure.
    evidence:
    - reference: ORPHA:90797
      reference_title: Partial androgen insensitivity syndrome
      supports: SUPPORT
      evidence_source: OTHER
      snippet: "partial responsiveness to age-appropriate levels of androgens."
      explanation: Orphanet defines PAIS by partial responsiveness to age-appropriate androgens.
- name: Partial Androgen Target-Tissue Resistance
  description: >-
    Partial androgen resistance causes variable 46,XY undervirilization while
    permitting some androgen-dependent masculinization and pubertal response.
  evidence:
  - reference: PMID:29785970
    reference_title: Phenotypic and molecular characteristics of androgen insensitivity syndrome patients.
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "complete or partial resistance to the biological actions of androgens."
    explanation: The AIS cohort paper defines AIS as complete or partial resistance to androgen action.
  - reference: ORPHA:90797
    reference_title: Partial androgen insensitivity syndrome
    supports: SUPPORT
    evidence_source: OTHER
    snippet: "abnormal genital development in a 46,XY individual with normal testis development"
    explanation: Orphanet links partial androgen responsiveness to abnormal genital development in a 46,XY individual.
  downstream:
  - target: Variable 46XY Undervirilization
    causal_link_type: DIRECT
    description: >-
      Partial androgen resistance produces a spectrum of hypospadias,
      micropenis, bifid or fused labioscrotal structures, and ambiguous
      genitalia.
    evidence:
    - reference: PMID:29785970
      reference_title: Phenotypic and molecular characteristics of androgen insensitivity syndrome patients.
      supports: SUPPORT
      evidence_source: HUMAN_CLINICAL
      snippet: "partial androgen insensitivity syndrome (PAIS) with predominantly male or ambiguous external genitalia"
      explanation: This directly supports variable external genital undervirilization in PAIS.
  - target: Gynecomastia and Secondary Sexual Hair Abnormality
    causal_link_type: DIRECT
    description: >-
      Partial androgen resistance can alter pubertal sex-steroid balance,
      breast development, voice, and androgen-dependent secondary sexual hair.
    evidence:
    - reference: ORPHA:90797
      reference_title: Partial androgen insensitivity syndrome
      supports: SUPPORT
      evidence_source: OTHER
      snippet: "HP:0000771 | Gynecomastia | Frequent (79-30%)"
      explanation: Orphanet records gynecomastia as frequent in PAIS.
  - target: Impaired Spermatogenesis and Sexual Function
    causal_link_type: DIRECT
    description: >-
      Reduced androgen receptor signaling in testicular somatic cells disrupts
      spermatogenesis and contributes to infertility and sexual dysfunction.
    evidence:
    - reference: PMID:26303086
      reference_title: Androgen receptor roles in spermatogenesis and infertility.
      supports: SUPPORT
      evidence_source: HUMAN_CLINICAL
      snippet: "Androgens exert their action through AR and its signalling in the testis is"
      explanation: This review supports the need for AR signaling in spermatogenesis.
  - target: Undescended Testes
    causal_link_type: DIRECT
    description: >-
      Partial androgen resistance is associated with cryptorchidism and abnormal
      scrotal development.
    evidence:
    - reference: ORPHA:90797
      reference_title: Partial androgen insensitivity syndrome
      supports: SUPPORT
      evidence_source: OTHER
      snippet: "HP:0008689 | Bilateral cryptorchidism | Frequent (79-30%)"
      explanation: Orphanet records bilateral cryptorchidism as frequent in PAIS.
- name: Variable 46XY Undervirilization
  description: >-
    Affected individuals may present with predominantly male or ambiguous
    external genitalia, including hypospadias, micropenis, perineal meatus,
    bifid scrotum, clitoral hypertrophy, fused labia majora, blind vagina, or
    urogenital sinus anomaly.
  evidence:
  - reference: ORPHA:90797
    reference_title: Partial androgen insensitivity syndrome
    supports: SUPPORT
    evidence_source: OTHER
    snippet: "HP:0000047 | Hypospadias | Frequent (79-30%)"
    explanation: Orphanet records hypospadias as frequent in PAIS.
  - reference: ORPHA:90797
    reference_title: Partial androgen insensitivity syndrome
    supports: SUPPORT
    evidence_source: OTHER
    snippet: "HP:0000062 | Ambiguous genitalia | Frequent (79-30%)"
    explanation: Orphanet records ambiguous genitalia as frequent in PAIS.
  - reference: PMID:33363845
    reference_title: "Male pseudohermaphroditism: A case study of 46,XY disorder of sexual development using whole-exome sequencing."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "micropenis, penoscrotal hypospadias, perineal meatus, ventral preputial split, and testicular hypoplasia."
    explanation: This PAIS case report documents several undervirilization features.
- name: Gynecomastia and Secondary Sexual Hair Abnormality
  description: >-
    Pubertal androgen resistance can produce gynecomastia, high-pitched voice,
    and abnormal androgen-dependent secondary sexual hair.
  evidence:
  - reference: ORPHA:90797
    reference_title: Partial androgen insensitivity syndrome
    supports: SUPPORT
    evidence_source: OTHER
    snippet: "HP:0009888 | Abnormality of secondary sexual hair | Occasional (29-5%)"
    explanation: Orphanet records abnormality of secondary sexual hair as occasional in PAIS.
  - reference: ORPHA:90797
    reference_title: Partial androgen insensitivity syndrome
    supports: SUPPORT
    evidence_source: OTHER
    snippet: "HP:0001620 | Abnormally high-pitched voice | Occasional (29-5%)"
    explanation: Orphanet records abnormally high-pitched voice as occasional in PAIS.
- name: Impaired Spermatogenesis and Sexual Function
  description: >-
    Partial AR dysfunction impairs spermatogenesis, frequently causing male
    infertility and sexual dysfunction; azoospermia is also reported.
  evidence:
  - reference: ORPHA:90797
    reference_title: Partial androgen insensitivity syndrome
    supports: SUPPORT
    evidence_source: OTHER
    snippet: "HP:0003251 | Male infertility | Very frequent (99-80%)"
