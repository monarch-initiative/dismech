datasets: []
notes: >-
  PAIS overlaps clinically with other 46,XY DSDs, including testosterone
  biosynthesis defects, so diagnosis requires careful integration of phenotype,
  karyotype, hormone testing, and molecular results. The Asta deep-research run
  surfaced a PAIS PBMC RNA-seq biomarker paper (PMID:34867780); this entry cites
  it in the reference list but does not model transcriptomic screening as a
  routine diagnostic procedure because the abstract frames the markers as
  potential clinical-screening candidates for future investigation.
references:
- reference: ORPHA:90797
  title: Partial androgen insensitivity syndrome
  tags: []
  findings:
  - statement: >-
      Orphanet structured record supporting PAIS definition, X-linked
      inheritance, AR disease-gene association, unknown worldwide prevalence,
      exact HPO phenotype rows, MONDO mapping, and OMIM cross-reference.
- reference: PMID:29785970
  title: Phenotypic and molecular characteristics of androgen insensitivity syndrome patients.
  tags: []
  findings:
  - statement: >-
      AIS cohort/review source supporting AR molecular causality, AR receptor
      biology, PAIS external-genital phenotype, hormone profiles, karyotyping,
      and AR sequencing utility.
- reference: PMID:30251955
  title: "Androgen Insensitivity Syndrome: Clinical Phenotype and Molecular Analysis in a Single Tertiary Center Cohort."
  tags: []
  findings:
  - statement: >-
      Tertiary-center AIS cohort documenting lower AR mutation detection in
      clinically suspected PAIS and somatic mosaicism among AR-positive AIS
      patients.
- reference: PMID:32338288
  title: Novel compound variants of the AR and MAP3K1 genes are related to the clinical heterogeneity of androgen insensitivity syndrome.
  tags: []
  findings:
  - statement: >-
      AIS heterogeneity source supporting X-linked AR causality, AR dysfunction
      mechanisms, preserved testosterone response after hCG stimulation, and a
      possible MAP3K1 modifier effect.
- reference: PMID:33363845
  title: "Male pseudohermaphroditism: A case study of 46,XY disorder of sexual development using whole-exome sequencing."
  tags: []
  findings:
  - statement: >-
      PAIS case report supporting 46,XY DSD presentation, WES-based diagnostic
      workup, hCG stimulation testing, and short-course androgen therapy response.
- reference: PMID:26303086
  title: Androgen receptor roles in spermatogenesis and infertility.
  tags: []
  findings:
  - statement: >-
      Review supporting the role of androgen receptor signaling in
      spermatogenesis and male fertility.
- reference: PMID:22698698
  title: Androgen insensitivity syndrome.
  tags: []
  findings:
  - statement: >-
      Lancet seminar supporting multidisciplinary AIS care, gonadectomy for
      gonadal tumor-risk management, and sex-hormone replacement.
- reference: PMID:34867780
  title: Identification of Potential Genes in Pathogenesis and Diagnostic Value Analysis of Partial Androgen Insensitivity Syndrome Using Bioinformatics Analysis.
  tags: []
  findings:
