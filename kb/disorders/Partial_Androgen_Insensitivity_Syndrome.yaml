treatments:
- name: Multidisciplinary DSD care and counseling
  description: >-
    PAIS care is individualized in a multidisciplinary DSD setting, including
    endocrine, surgical, genetic, psychosocial, fertility, and disclosure
    counseling.
  treatment_term:
    preferred_term: supportive care
    term:
      id: MAXO:0000950
