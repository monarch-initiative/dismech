    explanation: This PAIS case supports hormone testing with hCG stimulation in diagnostic workup.
  - reference: PMID:32338288
    reference_title: Novel compound variants of the AR and MAP3K1 genes are related to the clinical heterogeneity of androgen insensitivity syndrome.
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "After hCG stimulation, testosterone also displayed a normal rise, excluding testosterone synthesis defects."
    explanation: This supports hCG-stimulated testosterone testing to distinguish AIS from testosterone synthesis defects.
