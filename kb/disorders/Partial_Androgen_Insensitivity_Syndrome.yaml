- name: Sex hormone replacement or androgen trial
  description: >-
    Sex-steroid therapy is individualized by sex assignment, gonadal status, and
    residual androgen responsiveness; short-course androgen therapy has been
    reported to increase penile and scrotal tissue size in a PAIS case.
  treatment_term:
    preferred_term: sex hormone modifying agent therapy
