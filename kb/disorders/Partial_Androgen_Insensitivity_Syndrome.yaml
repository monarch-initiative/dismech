  - reference: PMID:26303086
    reference_title: Androgen receptor roles in spermatogenesis and infertility.
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "milder mutations may be responsible for some cases of male infertility."
    explanation: This review links milder AR mutations to male infertility.
- name: Undescended Testes
  description: >-
    Testicular descent is abnormal in many individuals with PAIS, with bilateral
    cryptorchidism recorded as a frequent phenotype.
  evidence:
  - reference: ORPHA:90797
    reference_title: Partial androgen insensitivity syndrome
    supports: SUPPORT
    evidence_source: OTHER
    snippet: "HP:0008689 | Bilateral cryptorchidism | Frequent (79-30%)"
    explanation: Orphanet records bilateral cryptorchidism as frequent in PAIS.
  - reference: PMID:29785970
    reference_title: Phenotypic and molecular characteristics of androgen insensitivity syndrome patients.
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "ambiguous external genitalia, including perineal hypospadias, unilateral cryptorchidism"
    explanation: The cohort includes a PAIS patient with cryptorchidism and ambiguous genitalia.
  downstream:
  - target: Gonadal Germ Cell Neoplasia Risk
    causal_link_type: DIRECT
    description: >-
      Retained undescended gonadal tissue creates a tumor-risk management issue
      in AIS and is consistent with Orphanet's germ-cell-neoplasia listing for
      PAIS.
    evidence:
    - reference: PMID:22698698
      reference_title: Androgen insensitivity syndrome.
      supports: SUPPORT
      evidence_source: HUMAN_CLINICAL
      snippet: "include gonadectomy to avoid gonad tumours in later"
      explanation: The Lancet seminar links AIS gonadectomy decisions to later gonadal tumor prevention.
- name: Gonadal Germ Cell Neoplasia Risk
  description: >-
    Germ cell neoplasia is an occasional reported complication, particularly
