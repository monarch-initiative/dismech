- name: Cortical circuit and neurotransmitter vulnerability
  description: >-
    Neuropsychiatric risk arises from multiple dosage-sensitive mechanisms in
    the deleted interval. RANBP1 loss disrupts cortical progenitor proliferation
    and layer 2/3 projection-neuron generation in models, while COMT and PRODH
    dosage can alter proline-dopamine interactions and prefrontal cortical
    function in children with the deletion.
