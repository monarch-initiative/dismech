prevalence:
- population: Population-based live births
  percentage: 1 in 4,000-7,092
  notes: >-
    Population-based studies place birth prevalence in the low single digits per
    10,000 live births. A systematic review reported minimum prevalence
    estimates ranging from 1 in 4,000 to 1 in 7,092 live births, and a combined
    prenatal/postnatal cohort in Victoria, Australia estimated 1 in 4,558
    births.
  evidence:
  - reference: PMID:29906080
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Estimates of minimum prevalence rates on the basis of the presence of this syndrome in cohorts of patients with cardiovascular malformations were from one in 4,000 to one in 7,092 live births."
    explanation: Systematic review of population-based studies provides a consolidated birth-prevalence range for 22q11.2 deletion syndrome.
  - reference: PMID:32207823
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "After excluding the miscarriage case and accounting for duplicate testing, the estimated prevalence of 22q11 DS was 1 in 4558 Victorian births."
    explanation: A modern population-based prenatal and infant cohort provides a directly measured regional birth-prevalence estimate within the systematic-review range.
progression:
- phase: Congenital multisystem presentation
  age_range: Prenatal period through infancy
  notes: >-
    Many medically important findings are developmental and present at birth or
    early infancy, including conotruncal cardiac defects, palatal anomalies,
    thymic dysfunction, immune deficiency, and hypocalcemia.
  evidence:
  - reference: PMID:20301696
    reference_title: "22q11.2 Deletion Syndrome."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "The major clinical manifestations of 22q11.2DS include congenital heart disease, particularly conotruncal malformations (ventricular septal defect, tetralogy of Fallot, interrupted aortic arch, and truncus arteriosus), palatal abnormalities (velopharyngeal incompetence, submucosal cleft palate, bifid uvula, and cleft palate), immune deficiency, characteristic facial features, and learning difficulties."
    explanation: GeneReviews summarizes the characteristic early multisystem clinical presentation.
- phase: Lifespan immune evolution
  age_range: Infancy through adulthood
  notes: >-
    Immune findings are variable and can evolve over time; complete athymia is
    rare, while partial DiGeorge presentations may show improvement in T-cell
    lymphopenia.
  evidence:
  - reference: PMID:36897497
    reference_title: "Chromosome 22q11.2 Deletion (DiGeorge Syndrome): Immunologic Features, Diagnosis, and Management."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "demonstrates successful spontaneous immune reconstitution in"
    explanation: This 2023 immunology review supports a variable immune course with possible spontaneous reconstitution in partial DiGeorge syndrome.
- phase: Adolescent and adult psychiatric risk
  age_range: Adolescence through adulthood
  notes: >-
    Psychotic-disorder risk increases with age, so psychiatric surveillance is
    particularly important during adolescence and adulthood.
  evidence:
  - reference: PMID:36786112
    reference_title: "Prevalence and incidence of psychotic disorders in 22q11.2 deletion syndrome: a meta-analysis."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Mean age was also significantly positively associated with"
    explanation: Meta-analysis supports age-associated increase in observed psychotic-disorder prevalence.
pathophysiology:
- name: TBX1 haploinsufficiency and pharyngeal arch development
  description: >
    The critical gene within the 22q11.2 deletion is TBX1, a T-box transcription
    factor essential for pharyngeal arch development. TBX1 haploinsufficiency
    disrupts the proliferation and survival of pharyngeal mesoderm and neural
    crest cells, leading to defective development of pharyngeal arch derivatives
    including the thymus (3rd pouch), parathyroid glands (3rd/4th pouches),
    and cardiac outflow tract.
