    snippet: "Typical miRNA expression patterns have been identified in 22q11.2DS, due to an alteration in miRNA biogenesis, affecting the expression of several target genes."
    explanation: Recent review supports miRNA-biogenesis disruption as a genome-wide regulatory contributor to variable 22q11.2DS manifestations.
  - reference: DOI:10.3390/genes15030321
    reference_title: "Understanding the Variability of 22q11.2 Deletion Syndrome: The Role of Epigenetic Factors"
    supports: SUPPORT
    evidence_source: OTHER
    snippet: "The review of the literature confirms the hypothesis that the 22q11.2DS phenotype results from a network of interactions between deleted protein-coding genes and altered epigenetic regulation."
    explanation: Supports modeling the syndrome as a multigene dosage and epigenetic-regulatory network rather than TBX1 alone.
- name: Cardiac neural crest migration defect
  description: >
    Neural crest cells from the occipital somites migrate through pharyngeal
    arches 3, 4, and 6 to contribute to aorticopulmonary septation and great
    vessel remodeling. TBX1 deficiency impairs neural crest cell migration and
    survival through non-cell-autonomous mechanisms, as TBX1 is expressed in
    pharyngeal mesoderm rather than neural crest cells themselves.
