name: Eastern Equine Encephalitis
creation_date: "2026-05-06T22:20:18Z"
updated_date: "2026-05-06T22:20:18Z"
category: Infectious
description: >-
  Eastern equine encephalitis is an acute mosquito-borne arboviral infection
  caused by Eastern equine encephalitis virus, an alphavirus. Human infection is
  uncommon but can progress from nonspecific febrile illness to severe central
  nervous system involvement with encephalitis, coma, neurologic sequelae, and
  high mortality.
disease_term:
  preferred_term: eastern equine encephalitis
  term:
    id: MONDO:0005736
    label: eastern equine encephalitis
parents:
- Alphavirus infection
- Viral encephalitis
synonyms:
- EEE
- Eastern equine encephalitis virus disease
- EEEV disease
infectious_agent:
- name: Eastern equine encephalitis virus
  description: >-
    Mosquito-borne alphavirus maintained in enzootic mosquito-bird cycles, with
    spillover to dead-end vertebrate hosts including humans and horses.
  infectious_agent_term:
    preferred_term: Eastern equine encephalitis virus
    term:
      id: NCBITaxon:11021
      label: Eastern equine encephalitis virus
  evidence:
  - reference: PMID:42060520
    supports: SUPPORT
    evidence_source: OTHER
    snippet: "Eastern equine encephalitis (EEE) virus (EEEV) is a mosquitoborne alphavirus maintained in an enzootic cycle with mosquitoes and birds."
    explanation: Public-health surveillance note identifies EEEV as the causative mosquito-borne alphavirus and its enzootic maintenance cycle.
transmission:
- name: Mosquito-borne spillover transmission
  description: >-
    EEEV is transmitted to people by mosquitoes that bridge enzootic bird cycles
    and mammalian hosts; humans are incidental dead-end hosts rather than
    amplifying hosts.
  evidence:
  - reference: PMID:42060520
    supports: SUPPORT
    evidence_source: OTHER
    snippet: "EEEV can be transmitted to humans and susceptible animals by mosquitoes that bite both mammals and birds."
    explanation: The surveillance report directly supports mosquito-mediated spillover transmission to humans and animals.
pathophysiology:
- name: Mosquito-borne alphavirus exposure
  description: >-
    Infected mosquitoes inoculate EEEV during blood feeding. Human disease begins
    with spillover exposure from the enzootic mosquito-bird cycle rather than
    sustained human-to-human transmission.
  biological_processes:
  - preferred_term: viral process
    term:
      id: GO:0016032
      label: viral process
  - preferred_term: response to virus
    term:
      id: GO:0009615
      label: response to virus
  downstream:
  - target: VLDLR-mediated viral attachment and entry
    description: Viral exposure is upstream of receptor engagement on susceptible host cells.
    evidence:
    - reference: PMID:39095394
      supports: SUPPORT
      evidence_source: IN_VITRO
      snippet: "Alphavirus spike proteins comprise trimers of heterodimers of glycoproteins E2 and E1 that mediate binding to cellular receptors and fusion of virus and host cell membranes during entry."
      explanation: The structural study explains that spike-mediated receptor binding and membrane fusion follow exposure and initiate cellular entry.
  evidence:
  - reference: PMID:39769082
    supports: SUPPORT
    evidence_source: OTHER
    snippet: "Eastern equine encephalitis virus (EEEV) is a mosquito-transmitted alphavirus that, among humans, can cause a severe and often fatal illness."
    explanation: Review abstract supports mosquito-transmitted alphavirus exposure as the initiating cause of severe human disease.
- name: VLDLR-mediated viral attachment and entry
  description: >-
    EEEV spike glycoproteins bind LDLR-family receptors including VLDLR and
    ApoER2, enabling viral attachment and membrane fusion during entry. VLDLR
    binding can occur through multiple LA-repeat binding modes, and the VLDLR
    W132G variant has been reported to enhance EEEV cell attachment.
  cell_types:
  - preferred_term: neuron
    term:
      id: CL:0000540
      label: neuron
  biological_processes:
  - preferred_term: symbiont entry into host cell
    term:
      id: GO:0046718
      label: symbiont entry into host cell
  - preferred_term: receptor-mediated endocytosis of virus by host cell
    term:
      id: GO:0019065
      label: receptor-mediated endocytosis of virus by host cell
  downstream:
  - target: Neuroinvasive encephalitic inflammation
    description: Productive entry in susceptible cells enables neuroinvasive infection and downstream CNS injury.
    evidence:
    - reference: PMID:37339758
      supports: PARTIAL
      evidence_source: HUMAN_CLINICAL
      snippet: "Eastern equine encephalitis virus (EEEV) is a relatively little-studied alphavirus that can cause devastating viral encephalitis, potentially leading to severe neurological sequelae or death."
      explanation: Human brain-tissue study supports the link between EEEV infection and severe encephalitic CNS disease, though it does not directly trace entry to neuroinvasion.
  evidence:
  - reference: PMID:39095394
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: "We recently identified very-low density lipoprotein receptor (VLDLR) and apolipoprotein E receptor 2 (ApoER2) as cellular receptors for EEEV and a distantly related alphavirus, Semliki Forest virus (SFV)."
    explanation: Structural biology abstract identifies VLDLR and ApoER2 as cellular EEEV receptors.
  - reference: PMID:39127734
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: "Disruption of the LA1-2 mediated binding significantly affect the cell attachment of EEEV."
    explanation: VLDLR LA-repeat disruption affecting EEEV attachment supports the receptor-binding entry mechanism.
  - reference: PMID:39127734
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: "The W132G variant of VLDLR could be identified in human genome and SNP sequences, implying that people with similar mutations in VLDLR may be highly susceptible to EEEV infection."
    explanation: The study supports VLDLR variation as a plausible host susceptibility modifier.
- name: Neuroinvasive encephalitic inflammation
  description: >-
    EEEV can invade the central nervous system and produce severe viral
    encephalitis. Human brain-tissue studies show EEEV RNA in discrete brain
    regions, supporting direct CNS infection; severe disease can culminate in
    neurological sequelae or death.
  cell_types:
  - preferred_term: neuron
    term:
      id: CL:0000540
      label: neuron
  - preferred_term: microglial cell
    term:
      id: CL:0000129
      label: microglial cell
  biological_processes:
  - preferred_term: inflammatory response
    term:
      id: GO:0006954
      label: inflammatory response
  - preferred_term: immune response
    term:
      id: GO:0006955
      label: immune response
  evidence:
  - reference: PMID:37339758
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "To this end, we obtained formalin-fixed paraffin-embedded tissue blocks from discrete brain regions from five contemporary (2004-2020) patients from Massachusetts, confirmed the presence of EEEV RNA by in situ hybridization (ISH) staining, and sequenced viral genomes."
    explanation: Human pathology series directly demonstrates EEEV RNA in brain tissue from infected patients.
  - reference: PMID:37339758
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Eastern equine encephalitis virus (EEEV) is a relatively little-studied alphavirus that can cause devastating viral encephalitis, potentially leading to severe neurological sequelae or death."
    explanation: The abstract links EEEV infection to devastating viral encephalitis and severe outcomes.
phenotypes:
- name: Fever
  category: Constitutional
  description: Acute febrile illness is a common early manifestation before or
    during neurologic progression.
  phenotype_term:
    preferred_term: Fever
    term:
      id: HP:0001945
      label: Fever
- name: Headache
  category: Neurological
  description: Headache is a frequent symptom of acute arboviral meningoencephalitis.
  phenotype_term:
    preferred_term: Headache
    term:
      id: HP:0002315
      label: Headache
- name: Encephalitis
  category: Neurological
  description: Neuroinvasive central nervous system infection and inflammation
    define severe Eastern equine encephalitis.
  phenotype_term:
    preferred_term: Infectious encephalitis
    term:
      id: HP:0002383
      label: Infectious encephalitis
  evidence:
  - reference: PMID:42060520
    supports: SUPPORT
    evidence_source: OTHER
    snippet: "EEEV causes severe neuroinvasive disease in humans; although an EEE vaccine is available for horses, no human vaccine is currently licensed, and treatment is supportive."
    explanation: Public-health surveillance source directly supports severe neuroinvasive disease as the defining major phenotype.
- name: Seizure
  category: Neurological
  description: Seizures can occur with acute encephalitic brain injury.
  phenotype_term:
    preferred_term: Seizure
    term:
      id: HP:0001250
      label: Seizure
- name: Coma
  category: Neurological
  description: Severe cases can progress to coma and life-threatening neurologic
    impairment.
  phenotype_term:
    preferred_term: Coma
    term:
      id: HP:0001259
      label: Coma
- name: Long-term neurologic sequelae
  category: Neurological
  description: Survivors can have persistent neurologic disability, including
    paralysis and cognitive impairment.
  phenotype_term:
    preferred_term: Neurological sequelae
    term:
      id: HP:0000707
      label: Abnormality of the nervous system
    temporality: CHRONIC
  evidence:
  - reference: PMID:39095394
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: "Eastern equine encephalitis virus (EEEV) is the most virulent alphavirus that infects humans, and many survivors develop neurological sequelae, including paralysis and intellectual disability."
    explanation: Structural biology paper's abstract summarizes the recognized long-term neurologic sequelae among human survivors.
  - reference: PMID:42060520
    supports: SUPPORT
    evidence_source: OTHER
    snippet: "Approximately one third of human cases are fatal, and many survivors experience long-term neurologic sequelae (1)."
    explanation: Public-health surveillance note supports high mortality and long-term neurologic morbidity among survivors.
environmental:
- name: Mosquito exposure in endemic regions
  description: >-
    Exposure to mosquitoes in regions with active enzootic transmission is the
    primary environmental risk factor for human spillover infection.
  evidence:
  - reference: PMID:42060520
    supports: SUPPORT
    evidence_source: OTHER
    snippet: "In the United States, a majority of EEE cases occur in states along the Atlantic Coast, Gulf Coast, and Great Lakes."
    explanation: Geographic concentration in mosquito-transmission regions supports environmental exposure risk.
treatments:
- name: Supportive care
  description: >-
    No licensed human vaccine or established disease-specific antiviral therapy
    is available for routine care; management is supportive, including intensive
    neurologic and respiratory support when severe neuroinvasive disease occurs.
  treatment_term:
    preferred_term: supportive care
    term:
      id: MAXO:0000950
      label: supportive care
  evidence:
  - reference: PMID:42060520
    supports: SUPPORT
    evidence_source: OTHER
    snippet: "EEEV causes severe neuroinvasive disease in humans; although an EEE vaccine is available for horses, no human vaccine is currently licensed, and treatment is supportive."
    explanation: Public-health surveillance source states current management is supportive and no licensed human vaccine exists.
- name: Investigational MVA-based vaccination
  description: >-
    MVA-BN-EEEV and MVA-BN-WEV vaccine candidates are investigational approaches
    with protective efficacy in cynomolgus macaque aerosol challenge models, but
    they are not established clinical treatment for human EEE disease.
  treatment_term:
    preferred_term: vaccination
    term:
      id: MAXO:0001017
      label: vaccination
  evidence:
  - reference: PMID:38413593
    supports: SUPPORT
    evidence_source: MODEL_ORGANISM
    snippet: "MVA-based monovalent eastern equine encephalitis virus (MVA-BN-EEEV) and multivalent western, eastern, and Venezuelan equine encephalitis virus (MVA-BN-WEV) vaccines were evaluated in the cynomolgus macaque aerosol model of EEEV infection."
    explanation: Macaque model study evaluates investigational MVA-based vaccine candidates against EEEV.
  - reference: PMID:38413593
    supports: SUPPORT
    evidence_source: MODEL_ORGANISM
    snippet: "Robust protection was observed, with 7/8 animals receiving MVA-BN-EEEV and 100% (8/8) animals receiving MVA-BN-WEV surviving while only 2/8 mock vaccinated controls survived lethal challenge."
    explanation: Survival after lethal challenge supports protective efficacy in the macaque model.
clinical_trials:
- name: NCT00584805
  phase: PHASE_II
  status: COMPLETED
  description: Phase 2 open-label safety and immunogenicity study of inactivated dried Eastern Equine Encephalitis vaccine in adults at risk for exposure.
  evidence:
  - reference: clinicaltrials:NCT00584805
    supports: SUPPORT
    snippet: "This study is designed to determine the safety and immunogenicity of Eastern Equine Encephalitis (EEE) Vaccine."
    explanation: ClinicalTrials.gov summary supports this as a human EEE vaccine safety and immunogenicity trial.
- name: NCT02654509
  phase: PHASE_II
  status: COMPLETED
  description: Phase 2 open-label safety and immunogenicity study of an inactivated dried EEE vaccine lot in healthy adults at risk of exposure.
  evidence:
  - reference: clinicaltrials:NCT02654509
    supports: SUPPORT
    snippet: "This study is being conducted to collect safety and immunogenicity data for the Eastern Equine Encephalitis (EEE) vaccine."
    explanation: ClinicalTrials.gov summary supports this as a human EEE vaccine safety and immunogenicity trial.
