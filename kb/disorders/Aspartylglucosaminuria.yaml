biochemical:
- name: Increased urinary aspartylglucosamine
  presence: INCREASED
  context: >
    Aspartylglucosamine/GlcNAc-Asn is excreted in urine in large quantities and
    provides a characteristic biochemical marker of AGA deficiency.
  biomarker_term:
