  readouts:
  - target: AGA lysosomal enzyme deficiency
    relationship: READOUT_OF
    direction: NEGATIVE
    endpoint_context: DIAGNOSTIC
    interpretation: Reduced aspartylglucosaminidase activity reports the primary AGA lysosomal enzyme defect.
  evidence:
