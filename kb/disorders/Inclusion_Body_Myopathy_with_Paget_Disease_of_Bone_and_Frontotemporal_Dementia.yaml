name: Inclusion body myopathy with Paget disease of bone and frontotemporal dementia
category: Mendelian
creation_date: "2026-05-09T05:20:00Z"
synonyms:
- IBMPFD
- Multisystem proteinopathy 1
- VCP disease
- Limb-girdle muscular dystrophy with Paget disease of bone
- Pagetoid amyotrophic lateral sclerosis
- Pagetoid neuroskeletal syndrome
description: >
  Inclusion body myopathy with Paget disease of bone and frontotemporal dementia
  is an autosomal dominant multisystem degenerative proteinopathy characterized
  by adult-onset proximal and distal muscle weakness, early-onset Paget disease
  of bone, and premature frontotemporal dementia. In classic VCP-associated
  disease, pathogenic VCP variants disrupt protein homeostasis, especially
  ubiquitin-associated autophagosome maturation, producing rimmed-vacuole
  myopathy, pagetic bone remodeling, and frontotemporal neurodegeneration.
references:
- reference: ORPHA:52430
  title: Inclusion body myopathy with Paget disease of bone and frontotemporal dementia
  found_in:
  - Inclusion_Body_Myopathy_with_Paget_Disease_of_Bone_and_Frontotemporal_Dementia-deep-research-fallback.md
  findings:
  - statement: >
      Orphanet defines IBMPFD as an autosomal dominant adult-onset multisystem
      degenerative genetic disorder and provides the MONDO mapping, prevalence,
      disease-gene table, and HPO phenotype frequencies used here.
    supporting_text: >
      ORPHA:52430 includes the disease definition, autosomal dominant
      inheritance, adult onset, <1/1,000,000 worldwide point prevalence, VCP /
      HNRNPA1 / HNRNPA2B1 gene assertions, and phenotype rows.
- reference: PMID:18845250
  title: "VCP disease associated with myopathy, Paget disease of bone and frontotemporal dementia: review of a unique disorder."
  found_in:
  - Inclusion_Body_Myopathy_with_Paget_Disease_of_Bone_and_Frontotemporal_Dementia-deep-research-fallback.md
  findings:
  - statement: >
      Human clinical review supports classic VCP-associated IBMPFD as a
      progressive autosomal dominant disorder with muscle weakness, Paget
      disease of bone, premature FTD, and ubiquitin/TDP-43-positive inclusions.
    supporting_text: >
      The review reports VCP causation, approximately 90% myopathy, about half
      Paget disease of bone, one-third premature FTD, and ubiquitin / beta
      amyloid / TDP-43 inclusions in affected tissues.
- reference: PMID:20104022
  title: VCP/p97 is essential for maturation of ubiquitin-containing autophagosomes and this function is impaired by mutations that cause IBMPFD.
  found_in:
  - Inclusion_Body_Myopathy_with_Paget_Disease_of_Bone_and_Frontotemporal_Dementia-deep-research-fallback.md
  findings:
  - statement: >
      Experimental cell and patient-myoblast evidence supports defective
      ubiquitin-containing autophagosome maturation as a central IBMPFD
      mechanism.
    supporting_text: >
      The study shows VCP is essential for autophagosome maturation, disease
      mutants cause an autophagy defect, accumulated autophagosomes contain
      ubiquitin-positive contents, and IBMPFD myoblasts accumulate LAMP-positive
      vacuoles and LC3-II.
- reference: PMID:20410287
  title: "Inclusion body myopathy, Paget's disease of the bone and fronto-temporal dementia: a disorder of autophagy."
  found_in:
  - Inclusion_Body_Myopathy_with_Paget_Disease_of_Bone_and_Frontotemporal_Dementia-deep-research-fallback.md
  findings:
  - statement: >
      Review-level evidence independently frames IBMPFD as an autophagy
      disorder and links p97/VCP mutations to defective autophagosome
      maturation.
    supporting_text: >
      The review states that IBMPFD mutations in p97/VCP lead to accumulation
      of autophagic structures and that this is likely due to defective
      p97/VCP-mediated autophagosome maturation.
- reference: PMID:37026610
  title: Provisional practice recommendation for the management of myopathy in VCP-associated multisystem proteinopathy.
  found_in:
  - Inclusion_Body_Myopathy_with_Paget_Disease_of_Bone_and_Frontotemporal_Dementia-deep-research-fallback.md
  findings:
  - statement: >
      Practice recommendations support genetic testing as definitive,
      muscle-biopsy rimmed vacuoles as an adjunctive hallmark, EMG/MRI as
      supportive workup, and standardized supportive management.
    supporting_text: >
      The recommendation states that genetic testing is definitive, muscle
      biopsy is important in diagnostic uncertainty, rimmed vacuoles are a
      hallmark, electrodiagnostic studies and MRI help rule out mimics, and
      standardized management optimizes care.
