progression:
- phase: Adult-onset muscle and bone disease
  age_range: Adulthood
  notes: >
    The disorder begins in adulthood, often with proximal and distal limb
    weakness and later-recognized bone involvement, including pain, deformity,
    enlargement, fractures, and elevated alkaline phosphatase.
  evidence:
  - reference: ORPHA:52430
    reference_title: "Inclusion body myopathy with Paget disease of bone and frontotemporal dementia (Orphanet structured-database record)"
    supports: SUPPORT
    evidence_source: OTHER
    snippet: "Age of onset: Adult"
    explanation: Orphanet records adult onset.
  - reference: PMID:18845250
    reference_title: "VCP disease associated with myopathy, Paget disease of bone and frontotemporal dementia: review of a unique disorder."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "About half of affected study participants have Paget disease of bone characterized by abnormal rates of bone growth that can result in bone pain, enlargement and fractures."
    explanation: Human clinical review supports frequent pagetic bone involvement after or alongside myopathy.
- phase: Progressive neurodegenerative and cardiorespiratory complications
  notes: >
    As IBMPFD progresses, frontotemporal dementia can emerge and expanding
    weakness can involve respiratory muscles, with respiratory or cardiac
    failure as late complications.
  evidence:
  - reference: ORPHA:52430
    reference_title: "Inclusion body myopathy with Paget disease of bone and frontotemporal dementia (Orphanet structured-database record)"
    supports: SUPPORT
    evidence_source: OTHER
    snippet: "As the disease progresses, muscle weakness begins to affect the other limbs and respiratory muscles, ultimately resulting in respiratory or cardiac failure."
    explanation: Orphanet describes the progressive respiratory and cardiac failure risk.
  - reference: PMID:18845250
    reference_title: "VCP disease associated with myopathy, Paget disease of bone and frontotemporal dementia: review of a unique disorder."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Findings of premature FTD affecting behavior and personality are seen in a third of affected individuals."
    explanation: The VCP disease review supports frontotemporal dementia as a recurrent later neurodegenerative manifestation.
