diagnosis:
- name: Molecular genetic testing
  description: >
    Molecular confirmation is the definitive diagnostic test, using targeted
    familial variant testing or a multigene myopathy/proteinopathy panel that
    includes VCP, HNRNPA2B1, and HNRNPA1 when the phenotype is compatible.
  diagnosis_term:
    preferred_term: molecular genetic testing
    term:
      id: MAXO:0000533
      label: molecular genetic testing
  results: Identification of a pathogenic disease-gene variant confirms the diagnosis.
  evidence:
  - reference: PMID:37026610
    reference_title: "Provisional practice recommendation for the management of myopathy in VCP-associated multisystem proteinopathy."
    supports: SUPPORT
    evidence_source: OTHER
    snippet: "single-variant testing in the case of a known familial VCP variant, or multi-gene panel sequencing in undifferentiated cases can be considered."
    explanation: Consensus practice recommendations support targeted VCP testing or multigene panel sequencing in undifferentiated cases.
  - reference: ORPHA:52430
    reference_title: "Inclusion body myopathy with Paget disease of bone and frontotemporal dementia (Orphanet structured-database record)"
    supports: SUPPORT
    evidence_source: OTHER
    snippet: "VCP | valosin containing protein | hgnc:12666 | Disease-causing germline mutation(s) in"
    explanation: Orphanet supports VCP inclusion on diagnostic testing panels for this disorder.
  - reference: ORPHA:52430
    reference_title: "Inclusion body myopathy with Paget disease of bone and frontotemporal dementia (Orphanet structured-database record)"
    supports: SUPPORT
    evidence_source: OTHER
    snippet: "HNRNPA2B1 | heterogeneous nuclear ribonucleoprotein A2/B1 | hgnc:5033 | Disease-causing germline mutation(s) in"
    explanation: Orphanet supports HNRNPA2B1 inclusion when testing the broader multisystem proteinopathy gene set.
  - reference: ORPHA:52430
    reference_title: "Inclusion body myopathy with Paget disease of bone and frontotemporal dementia (Orphanet structured-database record)"
    supports: SUPPORT
    evidence_source: OTHER
    snippet: "HNRNPA1 | heterogeneous nuclear ribonucleoprotein A1 | hgnc:5031 | Disease-causing germline mutation(s) in"
    explanation: Orphanet supports HNRNPA1 inclusion when testing the broader multisystem proteinopathy gene set.
- name: Muscle biopsy
  description: >
    Muscle biopsy is useful in diagnostically unresolved cases, especially when
    it shows rimmed vacuoles and related vacuolar myopathy.
  diagnosis_term:
    preferred_term: biopsy of muscle tissue
    term:
      id: MAXO:0000387
      label: biopsy of muscle tissue
  results: Rimmed vacuoles and vacuolar myopathy support the diagnosis in the right clinical context.
  evidence:
  - reference: PMID:37026610
    reference_title: "Provisional practice recommendation for the management of myopathy in VCP-associated multisystem proteinopathy."
    supports: SUPPORT
    evidence_source: OTHER
    snippet: "Muscle biopsy is important in cases of diagnostic uncertainty or lack of a definitive pathogenic genetic variant"
    explanation: Practice recommendations support biopsy as an adjunct when genetic confirmation is unavailable or uncertain.
- name: Electrodiagnostic studies and muscle MRI
  description: >
    EMG/NCS and muscle MRI help characterize the myopathy pattern and rule out
    mimicking neuromuscular disorders.
  results: Myopathic EMG abnormalities and compatible muscle imaging support the neuromuscular phenotype.
  evidence:
  - reference: PMID:37026610
    reference_title: "Provisional practice recommendation for the management of myopathy in VCP-associated multisystem proteinopathy."
    supports: SUPPORT
    evidence_source: OTHER
    snippet: "Electrodiagnostic studies and magnetic resonance imaging can also help rule out disease mimics."
    explanation: Practice recommendations include electrodiagnostics and MRI as supportive workup tools.
treatments:
- name: Supportive multidisciplinary care
  description: >
    No curative disease-modifying therapy is established for IBMPFD. Current
    care is supportive and multidisciplinary, with monitoring and symptomatic
    management of myopathy, respiratory compromise, bone disease, dementia, and
    cardiomyopathy as clinically indicated.
  treatment_term:
    preferred_term: supportive care
    term:
      id: MAXO:0000950
      label: supportive care
  target_phenotypes:
  - preferred_term: Proximal muscle weakness
    term:
      id: HP:0003701
      label: Proximal muscle weakness
  - preferred_term: Weakness of muscles of respiration
    term:
      id: HP:0004347
      label: Weakness of muscles of respiration
  evidence:
  - reference: PMID:37026610
    reference_title: "Provisional practice recommendation for the management of myopathy in VCP-associated multisystem proteinopathy."
    supports: SUPPORT
    evidence_source: OTHER
    snippet: "Standardized management of VCP myopathy will optimize patient care and help future research initiatives."
    explanation: Practice recommendations support standardized multidisciplinary supportive management.
- name: Genetic counseling
  description: >
    Genetic counseling is important for affected individuals and relatives
    because the disorder is autosomal dominant and may require predictive or
    cascade testing.
  treatment_term:
    preferred_term: genetic counseling
    term:
      id: MAXO:0000079
      label: genetic counseling
  evidence:
  - reference: PMID:37026610
    reference_title: "Provisional practice recommendation for the management of myopathy in VCP-associated multisystem proteinopathy."
    supports: PARTIAL
    evidence_source: OTHER
    snippet: "VCP myopathy has a heterogeneous clinical phenotype and should be considered in patients with limb-girdle muscular dystrophy phenotype, or any myopathy with an autosomal dominant pattern of inheritance."
    explanation: The autosomal dominant diagnostic context supports counseling and cascade-testing implications for relatives.
clinical_trials:
- name: NCT04823143
  phase: NOT_APPLICABLE
  description: >
    Prospective natural history study measuring one-year disease progression in
    individuals with confirmed pathogenic VCP variants.
  evidence:
  - reference: clinicaltrials:NCT04823143
    reference_title: "Natural History of Disease Progression in Individuals With a Confirmed Diagnosis of Disease Caused by Mutation of the Valosin Containing Protein (VCP) Gene"
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "A natural history study to understand the expected progression of disease in patients with confirmed mutations in the VCP gene over 1 year."
    explanation: This observational study directly targets disease progression in genetically confirmed VCP disease.
- name: NCT01353430
  phase: NOT_APPLICABLE
  description: >
    Observational phenotyping study of families with VCP-associated disease,
    including biospecimens, histories, questionnaires, MRI, and bone scans in a
    subset.
  evidence:
  - reference: clinicaltrials:NCT01353430
    reference_title: Characterization of Familial Myopathy and Paget Disease of Bone
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "The investigators are collecting biological specimen such as blood and urine samples, family and medical histories, questionnaire data of patients with a personal or family history of VCP associated disease."
    explanation: This ClinicalTrials.gov record documents structured observational phenotyping in VCP families.
