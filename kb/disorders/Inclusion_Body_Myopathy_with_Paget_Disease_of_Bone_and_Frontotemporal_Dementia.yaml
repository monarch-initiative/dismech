pathophysiology:
- name: VCP-dependent proteostasis failure
  description: >
    Pathogenic VCP variants perturb the AAA+ ATPase functions that normally
    coordinate ubiquitin-dependent protein turnover and retrotranslocation of
    misfolded endoplasmic-reticulum proteins, creating the proximal
    proteostasis defect in classic IBMPFD.
  genes:
  - preferred_term: VCP
    term:
      id: hgnc:12666
      label: VCP
  biological_processes:
  - preferred_term: ubiquitin-dependent protein catabolic process
    modifier: DYSREGULATED
    term:
      id: GO:0006511
      label: ubiquitin-dependent protein catabolic process
  evidence:
  - reference: PMID:18845250
    reference_title: "VCP disease associated with myopathy, Paget disease of bone and frontotemporal dementia: review of a unique disorder."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "the VCP (p97 or CDC48) gene which plays a key role in the ubiquitin-proteasome dependent degradation of cytosolic proteins and in the retro translocation of misfolded proteins from the endoplasmic reticulum into the cytoplasm."
    explanation: This review links disease-causing VCP variants to protein quality-control functions.
  downstream:
  - target: Defective ubiquitin-containing autophagosome maturation
    description: VCP dysfunction impairs maturation of ubiquitin-containing autophagosomes.
    causal_link_type: DIRECT
  - target: Pagetic bone remodeling
    description: VCP-related multisystem disease includes abnormal bone remodeling.
    causal_link_type: INDIRECT_UNKNOWN_INTERMEDIATES
- name: Defective ubiquitin-containing autophagosome maturation
  description: >
    VCP is required for autophagosome maturation under basal and proteasome
    stress conditions. Disease-associated VCP variants produce enlarged,
    ubiquitin-positive autophagic vesicles and patient-derived myoblast vacuoles,
    linking the upstream proteostasis defect to IBMPFD tissue pathology.
  genes:
