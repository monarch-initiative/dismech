      label: Autosomal dominant inheritance
  description: >
    ADCL3 arises from de novo heterozygous missense mutations in ALDH18A1,
    confirmed in all probands for whom parental DNA was available. No familial
    transmission has been reported; all cases to date have been sporadic.
  evidence:
  - reference: PMID:26320891
    reference_title: "Recurrent De Novo Mutations Affecting Residue Arg138 of Pyrroline-5-Carboxylate Synthase Cause a Progeroid Form of Autosomal-Dominant Cutis Laxa."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "A de novo origin was confirmed in all six probands for whom parental DNA was available."
    explanation: The landmark paper establishing ADCL3 confirms de novo origin of all characterized mutations.
  - reference: PMID:28228640
    reference_title: "Autosomal dominant cutis laxa with progeroid features due to a novel, de novo mutation in ALDH18A1."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "We report an 8-year-old male with a clinical diagnosis of autosomal dominant cutis laxa (ADCL) with progeroid features and a novel de novo missense mutation in ALDH18A1"
    explanation: Additional case report confirms de novo dominant inheritance at a residue other than Arg138.
genetic:
- name: ALDH18A1
  gene_term:
