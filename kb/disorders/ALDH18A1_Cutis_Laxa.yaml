inheritance:
- name: Autosomal Dominant (de novo)
  inheritance_term:
    preferred_term: Autosomal dominant inheritance
    term:
      id: HP:0000006
      label: Autosomal dominant inheritance
  description: >
    ADCL3 arises from de novo heterozygous missense mutations in ALDH18A1,
    confirmed in all probands for whom parental DNA was available. No familial
    transmission has been reported; all cases to date have been sporadic.
  evidence:
  - reference: PMID:26320891
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "A de novo origin was confirmed in all six probands for whom parental DNA was available."
    explanation: The landmark paper establishing ADCL3 confirms de novo origin of all characterized mutations.
  - reference: PMID:28228640
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "We report an 8-year-old male with a clinical diagnosis of autosomal dominant cutis laxa (ADCL) with progeroid features and a novel de novo missense mutation in ALDH18A1"
    explanation: Additional case report confirms de novo dominant inheritance at a residue other than Arg138.
genetic:
- name: ALDH18A1
  gene_term:
    preferred_term: ALDH18A1
    term:
      id: hgnc:9722
      label: ALDH18A1
  association: Causative
  features: >
    Recurrent de novo heterozygous missense mutations affecting residue Arg138 of
    P5CS (R138W, R138Q, R138L) cause most reported cases. A substitution at
    Arg126 (R126H) has also been described. Mutant P5CS is stable and interacts
    with wild-type protein but shows altered sub-mitochondrial distribution and
    reduced oligomerization, consistent with a dominant-negative mechanism.
  inheritance:
  - name: Autosomal Dominant
  evidence:
  - reference: PMID:26320891
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "We found three heterozygous mutations in ALDH18A1 leading to amino acid substitutions of the same highly conserved residue, Arg138 in P5CS."
    explanation: Identifies the recurrent Arg138 mutations as the molecular basis of ADCL3.
  - reference: PMID:28228640
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "This is the first report of an individual with ALDH18A1-ADCL due to a substitution at a residue other than p.Arg138."
    explanation: Expands the mutational spectrum of ADCL3 beyond the Arg138 hotspot.
pathophysiology:
- name: P5CS dominant-negative disruption
  description: >
    Heterozygous Arg138 mutations produce a stable P5CS protein that incorporates
    into P5CS oligomers but disrupts their structure or composition, resulting in
    a dominant-negative effect. This leads to reduced enzymatic activity and
    delayed proline accumulation, impairing connective tissue integrity through
    deficient collagen biosynthesis.
  gene:
    preferred_term: ALDH18A1
    modifier: DECREASED
    term:
      id: hgnc:9722
      label: ALDH18A1
  biological_processes:
  - preferred_term: L-proline biosynthetic process
    term:
      id: GO:0055129
      label: L-proline biosynthetic process
    modifier: DECREASED
  evidence:
  - reference: PMID:26320891
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: "we found that the mutant cells had a reduced P5CS enzymatic activity leading to a delayed proline accumulation"
    explanation: Fibroblast studies demonstrate that Arg138 mutations reduce P5CS activity and proline production through a dominant-negative mechanism.
  - reference: PMID:26320891
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: "the P5CS-p.Arg138Trp protein was stable and able to interact with wild-type P5CS but showed an altered sub-mitochondrial distribution"
    explanation: Biochemical evidence supports dominant-negative mechanism rather than simple haploinsufficiency.
phenotypes:
- category: Dermatological
  name: Cutis laxa with progeroid appearance
  description: >
    Thin, lax, wrinkled skin with visible veins giving a prematurely aged
    appearance. All reported patients exhibit this finding.
  phenotype_term:
    preferred_term: Cutis laxa
    term:
      id: HP:0000973
      label: Cutis laxa
  evidence:
  - reference: PMID:26320891
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "recurrent de novo mutations, affecting the highly conserved residue Arg138 of P5CS, cause an autosomal-dominant form of cutis laxa with progeroid features"
    explanation: All eight patients in the original cohort displayed cutis laxa with progeroid features.
- category: Ophthalmological
  name: Cataracts
  description: >
    Cataracts or corneal clouding present in the majority of affected individuals,
    often requiring surgical intervention.
  phenotype_term:
    preferred_term: Cataract
    term:
      id: HP:0000518
      label: Cataract
  evidence:
  - reference: PMID:25077174
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "bilateral cataracts have been seen in 6/10 cases and so appear more frequent than in patients with PYCR1 mutations"
    explanation: Cataracts are a frequent ophthalmological feature of ALDH18A1-related disorders, reported in the majority of cases.
- category: Growth
  name: Growth retardation
  description: >
    Prenatal and postnatal growth retardation is a consistent feature, with
    short stature persisting throughout life.
  phenotype_term:
    preferred_term: Short stature
    term:
      id: HP:0004322
      label: Short stature
  notes: >
    Growth retardation is consistently described in the ADCL3 literature but
    no quotable snippet supporting this specific phenotype was available from
    the cached abstracts.
- category: Musculoskeletal
  name: Joint hyperlaxity
  description: >
    Generalized joint hypermobility, likely related to deficient proline-dependent
    collagen crosslinking.
  phenotype_term:
    preferred_term: Joint hypermobility
    term:
      id: HP:0001382
      label: Joint hypermobility
- category: Neurological
  name: Intellectual disability
  description: >
    Mild to moderate intellectual disability is reported in most affected
    individuals.
  phenotype_term:
    preferred_term: Intellectual disability
    term:
      id: HP:0001249
      label: Intellectual disability
