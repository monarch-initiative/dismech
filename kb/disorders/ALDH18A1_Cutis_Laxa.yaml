name: ALDH18A1-Related Autosomal Dominant Cutis Laxa Type 3
creation_date: "2026-04-04T00:00:00Z"
updated_date: "2026-04-04T12:00:00Z"
category: Mendelian
description: >
  Autosomal dominant cutis laxa type 3 (ADCL3) is an exceptionally rare progeroid
  connective tissue disorder caused by de novo heterozygous dominant-negative
  missense mutations in ALDH18A1, which encodes delta-1-pyrroline-5-carboxylate
  synthase (P5CS). Most reported mutations cluster at the highly conserved Arg138
  residue in the glutamate 5-kinase domain. The mutant P5CS protein is stable and
  interacts with wild-type P5CS but shows altered sub-mitochondrial distribution
  and disrupted oligomerization, resulting in a dominant-negative reduction of P5CS
  enzymatic activity and delayed proline accumulation. Clinical features include
  thin, lax, wrinkled skin with visible veins and a progeroid appearance, prenatal
  and postnatal growth retardation, cataracts or corneal clouding, joint
  hyperlaxity, adducted thumbs, cranial vessel tortuosity, and mild to moderate
  intellectual disability. ADCL3 is the mildest cutis laxa subtype, with minimal
  pulmonary or cardiovascular involvement.
