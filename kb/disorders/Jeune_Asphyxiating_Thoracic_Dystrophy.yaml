has_subtypes:
- name: DYNC2H1-associated
  display_name: DYNC2H1-associated JATD (SRTD3)
  description: >
    The most common genetic form, accounting for 33-59% of families. Caused by biallelic
    mutations in DYNC2H1 (dynein-2 heavy chain). Characterized by predominantly skeletal
    involvement with limited extra-skeletal features: polydactyly, renal cysts, and
    retinal dystrophy are rare or absent. Corresponds to short-rib thoracic dysplasia 3
    (SRTD3).
- name: IFT80-associated
  display_name: IFT80-associated JATD (SRTD1)
  description: >
    The first genetically defined JATD subtype, caused by biallelic mutations in IFT80
    (IFT-B complex anterograde transport subunit). A rare cause, accounting for
    approximately 5% of families. Corresponds to short-rib thoracic dysplasia 1 (SRTD1).
- name: IFT-A-associated
  display_name: IFT-A complex-associated JATD
  description: >
    Forms caused by biallelic mutations in IFT-A complex genes including IFT140 and
    WDR19. Associated with higher rates of extra-skeletal involvement including renal
    cystic disease, hepatic fibrosis, and retinal dystrophy compared to DYNC2H1-associated
    cases. Includes SRTD5 (WDR19) and SRTD7 (IFT140).
- name: Dynein-2-auxiliary-associated
  display_name: Dynein-2 auxiliary subunit-associated JATD
  description: >
    Forms caused by biallelic mutations in dynein-2 auxiliary subunit genes including
    WDR34. Characterized by variable expressivity, with disease-associated WDR34 mutations
    producing a spectrum of molecular defects in dynein-2 assembly, IFT-B localization,
    transition zone integrity, and Hedgehog signaling.
- name: IFT74-associated
  display_name: IFT74-associated JATD
  description: >
    Caused by biallelic mutations in IFT74 (IFT-B tubulin-binding subunit). Allele-specific
    phenotypes: exon 2 deletion alleles produce ciliary chondrodysplasia plus mucociliary
    clearance disorder (combined primary and motile cilia disease), while splice site
    variants cause lethal skeletal chondrodysplasia. Unique among JATD genes in affecting
    both primary and motile cilia function.
- name: IFT172-associated
  display_name: IFT172-associated JATD (SRTD10)
  description: >
    Caused by biallelic mutations in IFT172, a structural component of the IFT-B complex
    required for anterograde ciliary transport. Recognized prenatally by narrow thorax
    and short long bones. Corresponds to short-rib thoracic dysplasia 10 (SRTD10).
- name: GRK2-associated
  display_name: GRK2-associated JATD
  description: >
    A very rare form caused by biallelic loss-of-function variants in GRK2, encoding a
    kinase that phosphorylates ciliary Smoothened to activate Hedgehog signaling. Unlike
    IFT-based forms, cilia morphology is intact; disease results from impaired cilia-based
    Hedgehog and Wnt signaling without structural IFT defects. Currently documented in a
    single case (2024); replication in additional families is needed.
inheritance:
- name: Autosomal Recessive
  description: >
    Autosomal recessive inheritance with significant genetic heterogeneity.
    Multiple causative genes identified in the intraflagellar transport and
    dynein motor pathways.
  evidence:
  - reference: PMID:17468754
    reference_title: "IFT80, which encodes a conserved intraflagellar transport protein, is mutated in Jeune asphyxiating thoracic dystrophy."
    supports: SUPPORT
    snippet: >-
      Jeune asphyxiating thoracic dystrophy, an autosomal recessive
      chondrodysplasia
    explanation: >-
      Confirms autosomal recessive inheritance of JATD.
prevalence:
- population: Live births
  percentage: 1 in 100,000 to 1 in 130,000
  notes: >-
    Reported incidence estimates place Jeune syndrome in the very rare range,
    with most mortality concentrated in infancy from thoracic restriction and
    respiratory complications.
  evidence:
  - reference: PMID:20037857
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "It is estimated to occur in 1 per 100.000-130.000 live births."
    explanation: This case report abstract explicitly states a commonly cited incidence range for Jeune asphyxiating thoracic dystrophy.
pathophysiology:
- name: Intraflagellar Transport Dysfunction
  conforms_to: "ciliopathy_dysfunction#Basal Body and Transition Zone Dysfunction"
  description: >
    Mutations in IFT genes (IFT80, IFT140, IFT172, WDR19, and others) disrupt
    the bidirectional transport system within primary cilia. This impairs ciliary
    assembly, maintenance, and signaling, particularly Hedgehog pathway transduction
    required for skeletal development.
  biological_processes:
