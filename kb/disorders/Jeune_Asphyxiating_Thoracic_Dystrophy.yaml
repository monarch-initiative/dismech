    snippet: "HP:0000889 | Abnormality of the clavicle | Frequent (79-30%)"
    explanation: >-
      Orphanet lists abnormality of the clavicle as a frequent feature of
      Jeune syndrome.
genetic:
- name: DYNC2H1 Mutations
  association: Causative
  subtype: DYNC2H1-associated
  notes: >
    Biallelic mutations in DYNC2H1, encoding the heavy chain of
    cytoplasmic dynein-2. The most common genetic cause of JATD,
    accounting for 33-59% of families depending on the cohort.
    DYNC2H1 patients tend to have a primarily skeletal phenotype
    without major extra-skeletal involvement.
  evidence:
  - reference: PMID:19442771
    reference_title: "DYNC2H1 mutations cause asphyxiating thoracic dystrophy and short rib-polydactyly syndrome, type III."
    supports: SUPPORT
    snippet: >-
      identified homozygous mutations in the cytoplasmic dynein 2 heavy
      chain 1 (DYNC2H1) gene in the affected children.
    explanation: >-
      Identifies DYNC2H1 as a causative gene for JATD.
  - reference: PMID:23456818
    reference_title: "Exome sequencing identifies DYNC2H1 mutations as a common cause of asphyxiating thoracic dystrophy (Jeune syndrome) without major polydactyly, renal or retinal involvement."
    supports: SUPPORT
    snippet: >-
      We detected 34 DYNC2H1 mutations in 29/71 (41%) patients from 19/57
      families (33%), showing it as a major cause of JATD especially in
      Northern European patients.
    explanation: >-
      Large cohort showing DYNC2H1 mutations in 41% of JATD patients,
      establishing it as the most common genetic cause.
  - reference: PMID:23456818
    reference_title: "Exome sequencing identifies DYNC2H1 mutations as a common cause of asphyxiating thoracic dystrophy (Jeune syndrome) without major polydactyly, renal or retinal involvement."
    supports: SUPPORT
    snippet: >-
      DYNC2H1 patients largely lacked significant extra-skeletal involvement,
      demonstrating an important genotype-phenotype correlation in JATD.
    explanation: >-
      Important genotype-phenotype correlation showing DYNC2H1 patients
      have primarily skeletal disease.
  - reference: PMID:23339108
    reference_title: "Asphyxiating thoracic dysplasia: clinical and molecular review of 39 families."
    supports: SUPPORT
    snippet: >-
      We identified DYNC2H1 mutations in 23 families (59%) and IFT80
      mutations in two families (5%).
    explanation: >-
      French cohort showing DYNC2H1 mutations in 59% of JATD families.
- name: IFT80 Mutations
  association: Causative
  subtype: IFT80-associated
  notes: >
    Biallelic mutations in IFT80, encoding intraflagellar transport
    protein 80. IFT80 is a component of the IFT-B complex required
    for anterograde transport in cilia. A rare cause of JATD (5%).
  evidence:
  - reference: PMID:17468754
    reference_title: "IFT80, which encodes a conserved intraflagellar transport protein, is mutated in Jeune asphyxiating thoracic dystrophy."
    supports: SUPPORT
    snippet: >-
      We show that IFT80 mutations underlie a subset of Jeune asphyxiating
      thoracic dystrophy cases, establishing the first association of a
      defective intraflagellar transport (IFT) protein with human disease.
    explanation: >-
      First identification of IFT80 as a causative gene for JATD.
  - reference: PMID:23339108
    reference_title: "Asphyxiating thoracic dysplasia: clinical and molecular review of 39 families."
    supports: SUPPORT
    snippet: >-
      We identified DYNC2H1 mutations in 23 families (59%) and IFT80
      mutations in two families (5%).
    explanation: >-
      Confirms IFT80 is a rare cause of JATD at 5% of families.
- name: IFT140 Mutations
  association: Causative
  subtype: IFT-A-associated
  notes: >
    Biallelic mutations in IFT140, encoding a component of the IFT-A
    complex involved in retrograde intraflagellar transport.
- name: WDR19 Mutations
  association: Causative
  subtype: IFT-A-associated
  notes: >
    Biallelic mutations in WDR19, encoding another IFT-A complex
    component. WDR19 mutations also cause cranioectodermal dysplasia
    and nephronophthisis.
  evidence:
  - reference: DOI:10.1186/s12920-023-01753-y
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Our findings expand the mutation spectrum of DYNC2H1, IFT172 and WDR19 associated with skeletal ciliopathies, and provide useful information for prenatal diagnosis and genetic counseling on rare skeletal disorders."
    explanation: >-
      Prenatal case series confirms WDR19 as causative in skeletal ciliopathy
      spectrum including JATD.
- name: WDR34 Mutations
  gene_term:
    preferred_term: WDR34
    term:
      id: hgnc:28296
      label: DYNC2I2
  association: Causative
  subtype: Dynein-2-auxiliary-associated
  notes: >
    Biallelic mutations in WDR34 (DYNC2I2), encoding dynein-2 intermediate chain 3.
    Disease-associated WDR34 mutations produce a diverse spectrum of molecular defects
    including dynein-2 assembly disruption, IFT-B protein mislocalization, transition
    zone integrity loss, and Hedgehog signaling impairment. This mechanistic
    heterogeneity underlies the variable expressivity of WDR34-associated JATD.
  evidence:
  - reference: PMID:36268591
    reference_title: "Disease-associated mutations in WDR34 lead to diverse impacts on the assembly and function of dynein-2."
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: "WDR34 mutations led to different spectrums of phenotypes. Quantitative proteomics demonstrated changes in dynein-2 assembly, whereas initiation and extension of the axoneme, localization of intraflagellar transport complex-B proteins, transition zone integrity and Hedgehog signalling were also affected."
    explanation: >-
      Published in vitro characterization of WDR34 JATD mutations demonstrates diverse
      molecular consequences in dynein-2 assembly, IFT-B localization, transition zone
      integrity, and Hedgehog signaling, establishing WDR34 as causative and
      mechanistically complex.
- name: IFT172 Mutations
  gene_term:
    preferred_term: IFT172
    term:
      id: hgnc:30391
      label: IFT172
  association: Causative
  subtype: IFT172-associated
  notes: >
    Biallelic mutations in IFT172, encoding a structural component of the IFT-B complex
    required for anterograde ciliary transport. IFT172 mutations cause skeletal ciliopathy
    recognized prenatally by narrow thorax and short long bones. Corresponds to SRTD10.
  evidence:
  - reference: DOI:10.1186/s12920-023-01753-y
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Our findings expand the mutation spectrum of DYNC2H1, IFT172 and WDR19 associated with skeletal ciliopathies, and provide useful information for prenatal diagnosis and genetic counseling on rare skeletal disorders."
    explanation: >-
      Prenatal case series confirms IFT172 as causative in skeletal ciliopathy
      spectrum including JATD/SRTD10.
- name: IFT74 Mutations
  gene_term:
    preferred_term: IFT74
    term:
      id: hgnc:21424
      label: IFT74
  association: Causative
  subtype: IFT74-associated
  notes: >
    Biallelic mutations in IFT74, encoding the tubulin-binding subunit of the IFT-B
    complex. Exhibits allele-specific phenotypes: exon 2 deletion alleles produce ciliary
    chondrodysplasia with narrow thorax plus mucociliary clearance disorder (combined
    primary and motile cilia phenotype), while splice site variants cause lethal skeletal
    chondrodysplasia. This dual primary/motile cilia involvement is mechanistically
    explained by the higher demand for tubulin transport in motile cilia.
  evidence:
  - reference: DOI:10.1371/journal.pgen.1010796
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Homozygous exon 2 deletion cases presented a ciliary chondrodysplasia with narrow thorax and progressive growth retardation along with a mucociliary clearance disorder phenotype with severely shorted cilia."
    explanation: >-
      Reports IFT74 exon 2 deletion causing ciliary chondrodysplasia with narrow thorax
      and mucociliary clearance disorder, confirming IFT74 as causative in JATD spectrum
      with a distinctive motile cilia crossover phenotype.
- name: GRK2 Mutations
  gene_term:
    preferred_term: GRK2
    term:
      id: hgnc:289
      label: GRK2
  association: Causative
  subtype: GRK2-associated
  notes: >
    Biallelic loss-of-function variants in GRK2 produce a Jeune syndrome phenotype
    via impairment of cilia-based Hedgehog and Wnt signaling without structural cilia
    abnormalities. This non-IFT mechanism identifies GRK2 as a regulator of ciliary
    Smoothened phosphorylation required for skeletogenesis. Evidence is currently limited
    to a single case report (2024); replication in additional families is needed.
  evidence:
  - reference: DOI:10.1159/000534031
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "impaired function of GRK2 compromises cilia-based signaling of Hedgehog pathway as well as Wnt signaling, while cilia morphology remains intact"
    explanation: >-
      Establishes GRK2 as a novel JATD mechanism via Hedgehog/Wnt signaling impairment
      independent of structural IFT defects or cilia morphology changes.
diagnosis:
- name: Clinical, Radiographic, and Molecular Diagnosis
  description: >-
    Jeune asphyxiating thoracic dystrophy is diagnosed from the characteristic
    narrow thorax, short long bones, and trident acetabular roof on
    radiographs, with attention to renal, hepatic, and retinal involvement, and
    is confirmed by molecular genetic testing of the short-rib/ciliopathy genes
    (most often DYNC2H1). It belongs to the short-rib polydactyly / skeletal
    ciliopathy spectrum.
  diagnosis_term:
    preferred_term: molecular genetic testing
    term:
      id: MAXO:0000533
      label: molecular genetic testing
  evidence:
  - reference: PMID:23339108
    reference_title: "Asphyxiating thoracic dysplasia: clinical and molecular review of 39 families."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Asphyxiating Thoracic Dysplasia (ATD) belongs to the short rib polydactyly group and is characterized by a narrow thorax, short long bones and trident acetabular roof."
    explanation: >-
      Defines the clinical/radiographic diagnostic hallmarks and the
      short-rib-polydactyly spectrum placement of ATD.
  - reference: PMID:23339108
    reference_title: "Asphyxiating thoracic dysplasia: clinical and molecular review of 39 families."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "We conclude that DYNC2H1 is a major gene responsible for ATD"
    explanation: >-
      Supports DYNC2H1 as the principal molecular diagnostic target in ATD.
- name: Prenatal Diagnosis
  description: >-
    Jeune asphyxiating thoracic dystrophy can be detected prenatally from the second
    trimester by ultrasound findings of short long bones of the limbs and narrow thorax.
    Genetic confirmation is achieved by exome sequencing of amniocytes or fetal tissue
    targeting short-rib thoracic dysplasia genes (most commonly DYNC2H1, IFT172, WDR19).
    Molecular diagnosis allows subtype classification (SRTD3/5/10) and genetic counseling
    for the 25% recurrence risk.
  diagnosis_term:
    preferred_term: molecular genetic testing
    term:
      id: MAXO:0000533
      label: molecular genetic testing
  evidence:
  - reference: DOI:10.1186/s12920-023-01753-y
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "The major and common ultrasound anomalies for the four unrelated fetuses included short long bones of the limbs and narrow thorax."
    explanation: >-
      Documents prenatal ultrasound detectability of skeletal ciliopathies including
      JATD by characteristic short long bones and narrow thorax in the second/third trimester.
  - reference: DOI:10.1186/s12920-023-01753-y
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Our findings expand the mutation spectrum of DYNC2H1, IFT172 and WDR19 associated with skeletal ciliopathies, and provide useful information for prenatal diagnosis and genetic counseling on rare skeletal disorders."
    explanation: >-
      Confirms exome sequencing of DYNC2H1, IFT172, and WDR19 as the molecular
      confirmation strategy for prenatal JATD diagnosis.
treatments:
- name: Respiratory Support
  description: >
    Mechanical ventilation and respiratory support in neonates with
    severe thoracic restriction. May require prolonged ventilatory
    support or tracheostomy.
- name: Thoracic Expansion Surgery
  description: >
    Vertical expandable prosthetic titanium rib (VEPTR) to increase
    thoracic volume and improve respiratory function. Surgery achieves
    nearly 70% survival compared to 70-80% mortality without treatment.
  treatment_term:
    preferred_term: surgical procedure
    term:
      id: MAXO:0000004
      label: surgical procedure
    located_in:
      preferred_term: thorax
      term:
        id: UBERON:0000915
        label: thoracic segment of trunk
  evidence:
  - reference: PMID:25575358
    reference_title: "Management of Thoracic Insufficiency Syndrome in Patients With Jeune Syndrome Using the 70 mm Radius Vertical Expandable Prosthetic Titanium Rib."
    supports: SUPPORT
    snippet: >-
      Survival rate of the 22 patients was 68%.
    explanation: >-
      Reports 68% survival rate with VEPTR surgical treatment.
  - reference: PMID:25575358
    reference_title: "Management of Thoracic Insufficiency Syndrome in Patients With Jeune Syndrome Using the 70 mm Radius Vertical Expandable Prosthetic Titanium Rib."
    supports: SUPPORT
    snippet: >-
      The survival rate in JS with surgery was nearly 70% (compared with
      70% to 80% mortality without treatment) with less ventilator dependence.
    explanation: >-
      Demonstrates dramatic improvement in survival with VEPTR surgery
      compared to untreated JATD.
  - reference: PMID:25575358
    reference_title: "Management of Thoracic Insufficiency Syndrome in Patients With Jeune Syndrome Using the 70 mm Radius Vertical Expandable Prosthetic Titanium Rib."
    supports: SUPPORT
    snippet: >-
      Average chest width increased from 121 to 168 mm at follow-up (P<0.001).
    explanation: >-
      Quantifies the significant increase in thoracic dimensions achieved
      by VEPTR expansion surgery.
- name: Renal Management
  description: >
    Monitoring and management of progressive renal cystic disease,
    including dialysis or transplantation for end-stage renal failure.
- name: Hepatology Surveillance and Management
  description: >
    Monitoring for hepatic fibrosis and biliary dysgenesis, which occurs in 22% of
    postnatal JATD cases. Includes serial liver function testing and hepatic ultrasound
    with hepatology referral. Liver disease may progress to biliary cirrhosis in a subset
    of patients requiring hepatological management.
  treatment_term:
    preferred_term: supportive care
    term:
      id: MAXO:0000950
      label: supportive care
  evidence:
  - reference: PMID:23339108
    reference_title: "Asphyxiating thoracic dysplasia: clinical and molecular review of 39 families."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Renal and liver diseases occurred respectively in 17% and 22% of cases"
    explanation: >-
      Quantifies hepatic involvement at 22% of postnatal JATD cases, establishing
      the need for routine hepatology surveillance.
- name: Ophthalmology Surveillance
  description: >
    Regular ophthalmologic evaluation for retinal dystrophy, which occurs in 50% of
    JATD patients over age 5. Surveillance should begin in early childhood. Low-vision
    aids for affected patients; no disease-modifying therapy currently exists for the
    retinal disease component.
  treatment_term:
    preferred_term: supportive care
    term:
      id: MAXO:0000950
      label: supportive care
  evidence:
  - reference: PMID:23339108
    reference_title: "Asphyxiating thoracic dysplasia: clinical and molecular review of 39 families."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "retinal alteration was present in 50% of cases aged more than 5 years."
    explanation: >-
      Documents high frequency of retinal dystrophy in JATD patients over age 5,
      justifying routine ophthalmologic surveillance starting in early childhood.
- name: Genetic Counseling
  description: >
    Genetic counseling for families regarding the 25% recurrence risk with autosomal
    recessive inheritance, prenatal diagnosis options (fetal exome sequencing of JATD
    genes), carrier testing for family members, and distinguishing JATD from lethal
    short-rib polydactyly syndromes in the prenatal setting.
  treatment_term:
    preferred_term: genetic counseling
    term:
      id: MAXO:0000079
      label: genetic counseling
