name: Aicardi Syndrome
creation_date: "2026-04-14T00:00:00Z"
updated_date: "2026-04-15T00:11:35Z"
category: Mendelian
description: >
  Aicardi syndrome is a rare neurodevelopmental disorder characterized by the
  classic triad of agenesis of the corpus callosum, chorioretinal lacunae, and
  infantile spasms. It occurs almost exclusively in females and is thought to
  result from a de novo X-linked dominant mutation that is lethal in males. The
  causative gene has not been definitively identified, though recent studies
  suggest genetic heterogeneity with candidate variants in genes such as KMT2B,
  SLF1, SMARCB1, SZT2, and WNT8B. Patients present with severe intellectual
  disability, seizures that are typically refractory to treatment, and
  characteristic ophthalmologic findings. Additional features include cortical
  malformations (polymicrogyria, heterotopia), intracranial cysts, vertebral
  anomalies, microphthalmia, and optic disc coloboma. Incidence is estimated at
  approximately 1 per 93,000 to 110,000 live births. Median survival from birth
  exceeds 30 years, with mortality estimated at 6% by age 1 and 17% by age 5.
disease_term:
  preferred_term: Aicardi syndrome
  term:
    id: MONDO:0010568
    label: Aicardi syndrome
parents:
  - Neurodevelopmental Disorders
  - Corpus Callosum Disorders
inheritance:
  - name: X-linked dominant
    inheritance_term:
      preferred_term: X-linked dominant inheritance
      term:
        id: HP:0001423
        label: X-linked dominant inheritance
    evidence:
      - reference: PMID:15737696
        supports: SUPPORT
        evidence_source: HUMAN_CLINICAL
        snippet: "It occurs only in individuals with two X chromosomes and is not familial."
        explanation: "Aicardi's own review confirms the X-linked pattern with exclusive female presentation."
      - reference: PMID:19116729
        supports: SUPPORT
        evidence_source: HUMAN_CLINICAL
        snippet: "The prevalence of non-random XCI in Aicardi syndrome is significantly different from that in the general population (p < 0.0001) and provides additional support for the hypothesis that Aicardi syndrome is an X-linked disorder."
        explanation: "Non-random X-inactivation patterns in 33% of patients support X-linked etiology."
pathophysiology:
  - name: Agenesis of Corpus Callosum
    description: >
      Complete or partial absence of the corpus callosum, the major white matter
      tract connecting the two cerebral hemispheres. Complete agenesis is found
      in approximately 72% of affected individuals. This disrupts interhemispheric
      communication and manifests as a characteristic split-brain pattern on EEG,
      contributing to seizure intractability and neurodevelopmental impairment.
    cell_types:
      - preferred_term: Neuron
        term:
          id: CL:0000540
          label: neuron
    biological_processes:
      - preferred_term: Corpus callosum morphogenesis
        term:
          id: GO:0021540
          label: corpus callosum morphogenesis
        modifier: DECREASED
    evidence:
      - reference: PMID:15737696
        supports: SUPPORT
        evidence_source: HUMAN_CLINICAL
        snippet: "Aicardi syndrome (AS) is characterized by a triad of callosal agenesis, infantile spasms and chorioretinal 'lacunae'."
        explanation: "Aicardi's own comprehensive review identifies callosal agenesis as part of the defining triad."
    downstream:
      - target: Seizure Evolution and Intractability
  - name: Cortical Migration Abnormalities
    description: >
      Widespread neuronal migration defects including polymicrogyria (predominantly
      frontal and perisylvian), periventricular and subcortical heterotopia, and
      intracranial cysts. These likely result from partial cortical necrosis during
      development rather than a primary migratory disturbance.
    cell_types:
      - preferred_term: Neuron
        term:
          id: CL:0000540
          label: neuron
      - preferred_term: Radial glial cell
        term:
          id: CL:0000681
          label: radial glial cell
    biological_processes:
      - preferred_term: Neuron migration
        term:
          id: GO:0001764
          label: neuron migration
        modifier: ABNORMAL
    evidence:
      - reference: PMID:3799920
        supports: SUPPORT
        evidence_source: HUMAN_CLINICAL
        snippet: "The neuropathological examination of the brain of a 4-month-old girl with Aicardi syndrome (infantile spasms, chorioretinal lacunae, psychomotor retardation, agenesis of the corpus callosum and vertebral anomalies) showed agenesis of the corpus callosum, agenesis of the anterior commissure and abnormal orientation of the hippocampal formation, in addition to periventricular cerebral nodules and extensive non-laminated cortical polymicrogyria of the fronto-parietal regions and gyrus cinguli of both hemispheres."
        explanation: "Neuropathological study demonstrating extensive cortical migration abnormalities and polymicrogyria."
      - reference: PMID:15737696
        supports: SUPPORT
        evidence_source: HUMAN_CLINICAL
        snippet: "The brain malformation is complex with cortical migration abnormalities, often cystic formations and sometimes choroid plexus papillomas"
        explanation: "Aicardi's review confirms complex brain malformations beyond simple callosal agenesis."
    downstream:
      - target: Infantile Spasms
  - name: Chorioretinal Lacunae Formation
    description: >
      Pathognomonic chorioretinal lacunae are depigmented, well-circumscribed lesions
      of the retinal pigment epithelium and choroid. These lesions result from
      thinning of the choroid and sclera with degeneration of overlying photoreceptor
      cells. They are bilateral, clustered around the optic nerve head and posterior
      pole, and remain stable over time.
    cell_types:
      - preferred_term: Retinal pigment epithelial cell
        term:
          id: CL:0002586
          label: retinal pigment epithelial cell
    biological_processes:
      - preferred_term: Retinal pigment epithelium development
        term:
          id: GO:0003406
          label: retinal pigment epithelium development
        modifier: ABNORMAL
    evidence:
      - reference: PMID:21214162
        supports: SUPPORT
        evidence_source: HUMAN_CLINICAL
        snippet: "Aicardi syndrome is characterized by agenesis of the corpus callosum, chorioretinal lacunae, and infantile spasms. The authors describe the case of a girl with chorioretinal lacunae, seizures, and cerebral cyst, but a normal corpus callosum. Incomplete forms of Aicardi syndrome are reported in the literature, but typical choroidal lacunae are always present and are pathognomonic."
        explanation: "Confirms chorioretinal lacunae are pathognomonic and always present in Aicardi syndrome."
  - name: Infantile Spasms
    description: >
      Infantile spasms typically present by median age 2.2 months and are a
      hallmark feature of Aicardi syndrome. Cortical malformations provide a
      structural substrate for early seizure onset.
    cell_types:
      - preferred_term: Neuron
        term:
          id: CL:0000540
          label: neuron
    biological_processes:
      - preferred_term: Synaptic transmission
        term:
          id: GO:0007268
          label: chemical synaptic transmission
        modifier: ABNORMAL
    evidence:
      - reference: PMID:39633384
        supports: SUPPORT
        evidence_source: HUMAN_CLINICAL
        snippet: "Median age at disease onset was 2.2 months. Median diagnostic delay was 1 month. Mortality was estimated with 6% at 1 and 17% at 5 years of age."
        explanation: "Natural history study of 245 cases establishes median seizure onset at 2.2 months."
    downstream:
      - target: Seizure Evolution and Intractability
  - name: Seizure Evolution and Intractability
    description: >
      Epilepsy in Aicardi syndrome is usually refractory to treatment and often
      evolves into focal, tonic, and myoclonic seizure types. Callosal agenesis
      and other structural brain abnormalities likely impair normal inhibitory
      signaling between hemispheres and promote seizure propagation.
    cell_types:
      - preferred_term: Neuron
        term:
          id: CL:0000540
          label: neuron
    biological_processes:
      - preferred_term: Synaptic transmission
        term:
          id: GO:0007268
          label: chemical synaptic transmission
        modifier: ABNORMAL
    evidence:
      - reference: PMID:14568821
        supports: SUPPORT
        evidence_source: HUMAN_CLINICAL
        snippet: "In addition to the classic findings, patients typically experience intractable epilepsy of multiple seizure types, profound mental retardation, and costovertebral anomalies."
        explanation: "Review article supports refractory epilepsy with multiple seizure types in Aicardi syndrome."
  - name: Genetic Heterogeneity and Cortical Development Disruption
    description: >
      Although the causal gene remains unidentified, recent genomic analyses
      have identified rare de novo variants in KMT2B, SLF1, SMARCB1, SZT2, and
      WNT8B in clinically diagnosed individuals. These implicated genes converge
      on molecular pathways central to cortical development. Earlier candidate
      genes TEAD1 and OCEL1 were not confirmed in an independent cohort of 38
      patients. Non-random X-inactivation in 33% of patients provides support
      for X-linked inheritance, but a distinct lack of X-linked candidate genes
      was observed, raising questions about possible autosomal causes with
      sex-limited expression.
    biological_processes:
      - preferred_term: Cerebral cortex development
        term:
          id: GO:0021987
          label: cerebral cortex development
        modifier: ABNORMAL
    evidence:
      - reference: PMID:37628618
        supports: SUPPORT
        evidence_source: HUMAN_CLINICAL
        snippet: "Our findings suggest that AIC is genetically heterogeneous with implicated genes converging on molecular pathways central to cortical development."
        explanation: "Comprehensive genomic study demonstrating genetic heterogeneity and autosomal candidate genes."
      - reference: PMID:28361097
        supports: REFUTE
        evidence_source: HUMAN_CLINICAL
        snippet: "We did not detect the previously reported or any other deleterious variants in any of the analyzed samples."
        explanation: "Failed to identify TEAD1 or OCEL1 variants in 38 clinically diagnosed patients, refuting these as common causative genes."
phenotypes:
  - category: Clinical
    name: Agenesis of Corpus Callosum
    description: >
      Complete or partial absence of the corpus callosum, one of the three
      classic features of the Aicardi triad. Complete agenesis in ~72% of cases.
    phenotype_term:
      preferred_term: Agenesis of corpus callosum
      term:
        id: HP:0001274
        label: Agenesis of corpus callosum
    frequency: VERY_FREQUENT
    evidence:
      - reference: PMID:15737696
        supports: SUPPORT
        evidence_source: HUMAN_CLINICAL
        snippet: "Aicardi syndrome (AS) is characterized by a triad of callosal agenesis, infantile spasms and chorioretinal 'lacunae'."
        explanation: "Callosal agenesis is a defining feature of the classic triad."
  - category: Clinical
    name: Infantile Spasms
    description: >
      Early-onset infantile spasms are a defining feature, typically appearing
      at median age 2.2 months. Spasms frequently occur in clusters and tend to
      increase in frequency over time.
    phenotype_term:
      preferred_term: Infantile spasms
      term:
        id: HP:0012469
        label: Infantile spasms
    frequency: VERY_FREQUENT
    evidence:
      - reference: PMID:39633384
        supports: SUPPORT
        evidence_source: HUMAN_CLINICAL
        snippet: "Median age at disease onset was 2.2 months."
        explanation: "Natural history study of 245 cases confirms early-onset infantile spasms as presenting symptom."
  - category: Clinical
    name: Chorioretinal Lacunae
    description: >
      Pathognomonic chorioretinal lacunae visible on fundoscopy, the third
      component of the classic Aicardi triad. These are essentially specific
      to Aicardi syndrome among congenital disorders.
    phenotype_term:
      preferred_term: Chorioretinal lacunae
      term:
        id: HP:0007858
        label: Chorioretinal lacunae
    frequency: VERY_FREQUENT
    evidence:
      - reference: PMID:21214162
        supports: SUPPORT
        evidence_source: HUMAN_CLINICAL
        snippet: "typical choroidal lacunae are always present and are pathognomonic."
        explanation: "Confirms chorioretinal lacunae are pathognomonic and always present."
  - category: Clinical
    name: Intellectual Disability
    description: >
      Severe to profound intellectual disability is present in virtually all cases,
      though emerging evidence suggests a broader phenotypic spectrum with a small
      proportion showing milder cognitive involvement.
    phenotype_term:
      preferred_term: Severe intellectual disability
      term:
        id: HP:0010864
        label: Severe intellectual disability
    frequency: VERY_FREQUENT
    evidence:
      - reference: PMID:15737696
        supports: SUPPORT
        evidence_source: HUMAN_CLINICAL
        snippet: "The outcome of AS is severe, with a high early mortality, considerable morbidity and a generally poor developmental outcome. However, the spectrum of AS seems broader than previously defined with a small proportion of the affected girls only moderately or mildly retarded."
        explanation: "Confirms severe developmental outcome in most cases with a broader spectrum recognized."
  - category: Clinical
    name: Polymicrogyria
    description: >
      Excessive folding of the cerebral cortex creating abnormally small gyri,
      with predominantly frontal and perisylvian distribution. Present in nearly
      all affected individuals.
    phenotype_term:
      preferred_term: Polymicrogyria
      term:
        id: HP:0002126
        label: Polymicrogyria
    frequency: VERY_FREQUENT
    evidence:
      - reference: PMID:3799920
        supports: SUPPORT
        evidence_source: HUMAN_CLINICAL
        snippet: "extensive non-laminated cortical polymicrogyria of the fronto-parietal regions and gyrus cinguli of both hemispheres"
        explanation: "Neuropathological study demonstrating widespread polymicrogyria."
  - category: Clinical
    name: Periventricular Heterotopia
    description: >
      Collections of gray matter in abnormal locations within white matter or
      ventricular regions, reflecting incomplete neuronal migration.
    phenotype_term:
      preferred_term: Periventricular nodular heterotopia
      term:
        id: HP:0032388
        label: Periventricular nodular heterotopia
    frequency: VERY_FREQUENT
    evidence:
      - reference: PMID:3799920
        supports: SUPPORT
        evidence_source: HUMAN_CLINICAL
        snippet: "periventricular cerebral nodules and extensive non-laminated cortical polymicrogyria"
        explanation: "Neuropathological confirmation of periventricular heterotopic nodules."
  - category: Clinical
    name: Intracranial Cysts
    description: >
      Intracranial cysts, typically interhemispheric or periventricular, are
      a common finding and included in revised diagnostic criteria as a major
      feature.
    phenotype_term:
      preferred_term: Intracranial cystic lesion
      term:
        id: HP:0010576
        label: Intracranial cystic lesion
    frequency: VERY_FREQUENT
    evidence:
      - reference: PMID:15737696
        supports: SUPPORT
        evidence_source: HUMAN_CLINICAL
        snippet: "The brain malformation is complex with cortical migration abnormalities, often cystic formations and sometimes choroid plexus papillomas"
        explanation: "Intracranial cysts are part of the complex brain malformation pattern."
  - category: Clinical
    name: Ventriculomegaly
    description: >
      Enlargement of the cerebral ventricles, reflecting underlying brain
      structural abnormalities.
    phenotype_term:
      preferred_term: Ventriculomegaly
      term:
        id: HP:0002119
        label: Ventriculomegaly
    frequency: FREQUENT
  - category: Clinical
    name: Optic Disc Coloboma
    description: >
      Gaps or defects in the optic disc and nerve, occurring in approximately
      44% of patients.
    phenotype_term:
      preferred_term: Optic disc coloboma
      term:
        id: HP:0000588
        label: Optic disc coloboma
    frequency: FREQUENT
    evidence:
      - reference: PMID:15737696
        supports: SUPPORT
        evidence_source: HUMAN_CLINICAL
        snippet: "the eye anomalies, often feature a coloboma in addition to the lacunae"
        explanation: "Optic coloboma identified as a frequent additional eye finding."
  - category: Clinical
    name: Microphthalmia
    description: >
      Abnormally small eye size, present in approximately 20% of affected
      individuals.
    phenotype_term:
      preferred_term: Microphthalmia
      term:
        id: HP:0000568
        label: Microphthalmia
    frequency: OCCASIONAL
  - category: Clinical
    name: Scoliosis
    description: >
      Abnormal curvature of the spine, developing in approximately one-third
      of affected children. Scoliosis in Aicardi syndrome is rapidly progressive
      and bracing is ineffective, often necessitating early surgical intervention.
    phenotype_term:
      preferred_term: Scoliosis
      term:
        id: HP:0002650
        label: Scoliosis
    frequency: FREQUENT
    evidence:
      - reference: PMID:25494028
        supports: SUPPORT
        evidence_source: HUMAN_CLINICAL
        snippet: "Scoliosis in ACS can represent a clinically significant problem that is underdiagnosed and overshadowed by the other severe medical complications associated with the syndrome. Our data suggest that scoliosis in patients with ACS is rapidly progressive and bracing is ineffective"
        explanation: "Demonstrates rapidly progressive scoliosis requiring early surgical consideration."
  - category: Clinical
    name: Seizures
    description: >
      Beyond infantile spasms, patients develop multiple seizure types including
      focal, tonic, myoclonic, atonic, and absence seizures. Nearly universally
      refractory to antiseizure medications.
    phenotype_term:
      preferred_term: Drug-resistant seizures
      term:
        id: HP:0001250
        label: Seizure
    frequency: VERY_FREQUENT
    evidence:
      - reference: PMID:14568821
        supports: SUPPORT
        evidence_source: HUMAN_CLINICAL
        snippet: "patients typically experience intractable epilepsy of multiple seizure types, profound mental retardation, and costovertebral anomalies."
        explanation: "Confirms intractable epilepsy with multiple seizure types."
  - category: Clinical
    name: Hypotonia
    description: >
      Decreased muscle tone, commonly present in infancy.
    phenotype_term:
      preferred_term: Hypotonia
      term:
        id: HP:0001252
        label: Hypotonia
    frequency: FREQUENT
  - category: Clinical
    name: Global Developmental Delay
    description: >
      Significant delays in all areas of development. Only approximately 17% of
      affected girls acquire the ability to speak words.
    phenotype_term:
      preferred_term: Global developmental delay
      term:
        id: HP:0001263
        label: Global developmental delay
    frequency: VERY_FREQUENT
  - category: Clinical
    name: Microcephaly
    description: >
      Abnormally small head circumference, associated with worse developmental
      outcomes.
    phenotype_term:
      preferred_term: Microcephaly
      term:
        id: HP:0000252
        label: Microcephaly
    frequency: FREQUENT
  - category: Clinical
    name: Cerebellar Vermis Hypoplasia
    description: >
      Underdevelopment of the inferior cerebellar vermis, contributing to
      posterior fossa abnormalities.
    phenotype_term:
      preferred_term: Cerebellar vermis hypoplasia
      term:
        id: HP:0001320
        label: Cerebellar vermis hypoplasia
    frequency: FREQUENT
    evidence:
      - reference: PMID:3799920
        supports: SUPPORT
        evidence_source: HUMAN_CLINICAL
        snippet: "underdevelopment of the inferior cerebellar vermis tonsils were also observed."
        explanation: "Neuropathological confirmation of cerebellar vermis hypoplasia."
  - category: Clinical
    name: Dysphagia
    description: >
      Difficulty swallowing, frequently necessitating tube feeding support.
    phenotype_term:
      preferred_term: Dysphagia
      term:
        id: HP:0002015
        label: Dysphagia
    frequency: FREQUENT
  - category: Clinical
    name: EEG Abnormality
    description: >
      Characteristic split-brain EEG pattern with dissociated suppression-burst
      activity, reflecting independent electrical activity between cerebral
      hemispheres due to absent corpus callosum.
    phenotype_term:
      preferred_term: EEG abnormality
      term:
        id: HP:0002353
        label: EEG abnormality
    frequency: VERY_FREQUENT
genetic:
  - name: Unknown X-linked Gene
    notes: >
      The specific causative gene remains unidentified despite decades of
      research. The disorder is believed to result from a de novo mutation
      in an X-linked gene, supported by exclusive female presentation and
      non-random X-inactivation patterns. A locus at Xp22.3 has been suggested
      but not confirmed. Recent genomic studies suggest genetic heterogeneity
      with autosomal candidates including KMT2B, SLF1, SMARCB1, SZT2, and WNT8B.
    evidence:
      - reference: PMID:37628618
        supports: SUPPORT
        evidence_source: HUMAN_CLINICAL
        snippet: "Our findings suggest that AIC is genetically heterogeneous with implicated genes converging on molecular pathways central to cortical development."
        explanation: "Demonstrates genetic heterogeneity with rare de novo variants in multiple genes."
      - reference: PMID:28361097
        supports: PARTIAL
        evidence_source: HUMAN_CLINICAL
        snippet: "This suggests that the published variants represent either an extremely rare cause of Aicardi syndrome or an incidental finding."
        explanation: "Failed to confirm TEAD1 and OCEL1 as causative genes in independent cohort."
      - reference: PMID:19116729
        supports: SUPPORT
        evidence_source: HUMAN_CLINICAL
        snippet: "The prevalence of non-random XCI in Aicardi syndrome is significantly different from that in the general population (p < 0.0001) and provides additional support for the hypothesis that Aicardi syndrome is an X-linked disorder."
        explanation: "Non-random X-inactivation in 33% of patients supports X-linked etiology."
treatments:
  - name: Antiepileptic Drug Therapy
    description: >
      Seizure management with antiepileptic drugs including ACTH and vigabatrin
      for initial infantile spasms, followed by levetiracetam, clobazam,
      valproic acid, and others. Seizures are nearly universally refractory
      to medication.
    treatment_term:
      preferred_term: pharmacotherapy
      term:
        id: MAXO:0000058
        label: pharmacotherapy
    evidence:
      - reference: PMID:14568821
        supports: SUPPORT
        evidence_source: HUMAN_CLINICAL
        snippet: "patients typically experience intractable epilepsy of multiple seizure types, profound mental retardation, and costovertebral anomalies."
        explanation: "Confirms intractable epilepsy requiring aggressive pharmacotherapy."
  - name: Ketogenic Diet Therapy
    description: >
      High-fat, low-carbohydrate therapeutic diet. In a study of 15 patients,
      67% experienced at least 50% seizure reduction at 3 months, and 20%
      achieved at least 90% reduction. Seizure freedom was rare. More effective
      in patients without infantile spasms at initiation.
    treatment_term:
      preferred_term: ketogenic diet therapy
      term:
        id: MAXO:0000088
        label: dietary intervention
    evidence:
      - reference: PMID:34240629
        supports: SUPPORT
        evidence_source: HUMAN_CLINICAL
        snippet: "Fifteen patients, ages 4 months to 34 years, were identified. Ten (67%) patients experienced a ≥50% seizure reduction after 3 months, with 3 (20%) having a ≥90% reduction. Only 1 patient was seizure-free for a short period of time."
        explanation: "Demonstrates ketogenic diet benefit in Aicardi syndrome epilepsy."
  - name: Epilepsy Surgery
    description: >
      Surgical options for selected cases include hemispherectomy, cortical
      resection, and corpus callosotomy. Most patients do not qualify due to
      multiple areas of epileptogenesis. Outcomes are variable.
    treatment_term:
      preferred_term: epilepsy surgery
      term:
        id: MAXO:0000004
        label: surgical procedure
  - name: Scoliosis Surgery
    description: >
      Orthopedic surgical intervention for progressive scoliosis. Bracing is
      ineffective in Aicardi syndrome, necessitating early surgical referral.
    treatment_term:
      preferred_term: orthopedic surgical procedure
      term:
        id: MAXO:0000004
        label: surgical procedure
    evidence:
      - reference: PMID:25494028
        supports: SUPPORT
        evidence_source: HUMAN_CLINICAL
        snippet: "Our data suggest that scoliosis in patients with ACS is rapidly progressive and bracing is ineffective; early screening, close observation, and low threshold for referral to an orthopedic surgeon are crucial."
        explanation: "Demonstrates need for surgical rather than conservative management of scoliosis."
  - name: Supportive Rehabilitation
    description: >
      Multidisciplinary rehabilitation including physical therapy, occupational
      therapy, and speech therapy to maximize developmental potential.
    treatment_term:
      preferred_term: physical therapy
      term:
        id: MAXO:0000011
        label: physical therapy
  - name: Genetic Counseling
    description: >
      Recurrence risk counseling for families. Recurrence risk for siblings
      is believed to be less than 1% due to the de novo nature of mutations.
    treatment_term:
      preferred_term: genetic counseling
      term:
        id: MAXO:0000079
        label: genetic counseling
progression:
  - phase: Onset
    age_range: 0-6 months
    notes: >
      Infantile spasms typically present at median age 2.2 months, usually as
      the first recognized symptom. Structural brain abnormalities are present
      at birth.
    evidence:
      - reference: PMID:39633384
        supports: SUPPORT
        evidence_source: HUMAN_CLINICAL
        snippet: "Median age at disease onset was 2.2 months. Median diagnostic delay was 1 month."
        explanation: "Establishes median onset and diagnostic timeline."
  - phase: Early childhood
    age_range: 6 months to 5 years
    notes: >
      Seizures evolve from infantile spasms into multiple types including focal,
      tonic, and myoclonic. Developmental delay becomes increasingly apparent.
      Mortality estimated at 6% by age 1 and 17% by age 5.
    evidence:
      - reference: PMID:39633384
        supports: SUPPORT
        evidence_source: HUMAN_CLINICAL
        snippet: "Mortality was estimated with 6% at 1 and 17% at 5 years of age."
        explanation: "Quantitative mortality data from systematic review of 245 cases."
  - phase: Long-term
    notes: >
      Median survival from birth exceeds 30 years. Common causes of death include
      respiratory failure, systemic infections, and sudden unexpected death in
      epilepsy (SUDEP).
epidemiology:
  - name: Global incidence
    description: >
      Approximately 1 per 93,000 to 110,000 live births. Approximately 1,000
      documented cases in the US and 4,000+ worldwide. Affects all ethnicities
      equally. Nearly all cases are female; rare male cases have 47,XXY karyotype.
datasets:
