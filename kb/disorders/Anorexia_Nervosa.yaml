    reference_title: Incidence and Risk of Cardiovascular Outcomes in Patients With Anorexia Nervosa
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Clinicians should monitor comorbid cardiovascular conditions among
