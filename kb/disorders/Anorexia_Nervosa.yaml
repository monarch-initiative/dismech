  - reference: DOI:10.3390/nu16132095
    reference_title: "Peripheral Biomarkers of Anorexia Nervosa: A Meta-Analysis"
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
