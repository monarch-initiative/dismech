    reference_title: "Abatacept as a Long-Term Targeted Therapy for LRBA Deficiency."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      The third common manifestation in LRBA-deficient patients was LP, which
      was characterized by splenomegaly (n:14, 63.6%), hepatomegaly (n:12,
      54,5%) and lymphadenopathy (n: 11, 50%).
    explanation: Supports splenomegaly as a frequent manifestation of LRBA-associated lymphoproliferation.
