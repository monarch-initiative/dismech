pathophysiology:
- name: Impaired CTLA4 vesicle recycling
  description: >-
    LRBA normally colocalizes with CTLA4 in endosomal vesicles and promotes
    CTLA4 recycling. Loss of LRBA disrupts this intracellular recycling step
    in regulatory T cells.
  cell_types:
  - preferred_term: regulatory T cell
    term:
      id: CL:0000815
      label: regulatory T cell
  biological_processes:
  - preferred_term: protein transport
    term:
      id: GO:0015031
      label: protein transport
  downstream:
  - target: Increased CTLA4 lysosomal turnover
    causal_link_type: DIRECT
    description: Failed recycling shifts CTLA4 toward degradative trafficking.
  evidence:
  - reference: PMID:26206937
    reference_title: "AUTOIMMUNE DISEASE. Patients with LRBA deficiency show CTLA4 loss and immune dysregulation responsive to abatacept therapy."
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: >-
      We found that LRBA colocalized with CTLA4 in endosomal vesicles and that
      LRBA deficiency or knockdown increased CTLA4 turnover, which resulted in
      reduced levels of CTLA4 protein in FoxP3(+) regulatory and activated
      conventional T cells.
    explanation: Demonstrates that LRBA participates in CTLA4 vesicle trafficking and recycling.
- name: Increased CTLA4 lysosomal turnover
  description: >-
    LRBA deficiency increases CTLA4 turnover and routing toward lysosomal
    degradation, accelerating loss of CTLA4 protein.
  cell_types:
  - preferred_term: regulatory T cell
    term:
      id: CL:0000815
      label: regulatory T cell
  biological_processes:
  - preferred_term: protein localization to lysosome
    modifier: INCREASED
    term:
      id: GO:0061462
      label: protein localization to lysosome
  downstream:
  - target: CTLA4 depletion in regulatory T cells
    causal_link_type: DIRECT
    description: Accelerated turnover lowers steady-state CTLA4 abundance.
  evidence:
  - reference: PMID:26206937
    reference_title: "AUTOIMMUNE DISEASE. Patients with LRBA deficiency show CTLA4 loss and immune dysregulation responsive to abatacept therapy."
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: >-
      We found that LRBA colocalized with CTLA4 in endosomal vesicles and that
      LRBA deficiency or knockdown increased CTLA4 turnover, which resulted in
      reduced levels of CTLA4 protein in FoxP3(+) regulatory and activated
      conventional T cells.
    explanation: Supports increased CTLA4 turnover and lysosomal loss after LRBA deficiency.
- name: CTLA4 depletion in regulatory T cells
  description: >-
    Accelerated CTLA4 turnover in LRBA deficiency reduces CTLA4 protein
