- name: Impaired B-cell activation
  description: >-
    LRBA-deficient B cells show a cell-intrinsic activation defect during
    early effector responses.
  cell_types:
  - preferred_term: B cell
    term:
      id: CL:0000236
      label: B cell
  biological_processes:
  - preferred_term: B cell activation
    modifier: DECREASED
    term:
      id: GO:0042113
      label: B cell activation
  downstream:
  - target: Reduced switched memory B-cell and plasmablast compartments
    causal_link_type: DIRECT
    description: Defective activation limits differentiation into memory and antibody-secreting states.
  evidence:
  - reference: PMID:22608502
    reference_title: "Deleterious mutations in LRBA are associated with a syndrome of immune deficiency and autoimmunity."
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: >-
      Individuals with homozygous LRBA mutations had no LRBA, had disturbed B
      cell development, defective in vitro B cell activation, plasmablast
      formation, and immunoglobulin secretion, and had low proliferative
      responses.
    explanation: Directly supports impaired B-cell activation in LRBA-deficient cells.
- name: Reduced switched memory B-cell and plasmablast compartments
  description: >-
    LRBA deficiency is associated with depletion of switched memory B cells and
    plasmablasts, indicating defective B-cell maturation and effector
    differentiation.
  cell_types:
  - preferred_term: memory B cell
    term:
      id: CL:0000787
      label: memory B cell
  - preferred_term: plasmablast
    term:
      id: CL:0000980
      label: plasmablast
  downstream:
  - target: Defective immunoglobulin production
    causal_link_type: DIRECT
    description: Loss of mature antibody-secreting compartments limits immunoglobulin output.
  evidence:
  - reference: PMID:26768763
    reference_title: "The extended phenotype of LPS-responsive beige-like anchor protein (LRBA) deficiency."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Most LRBA-deficient patients had low B-cell subset counts, mainly in
      switched memory B cells (80%) and plasmablasts (92%), with a defective
      specific antibody response in 67%.
    explanation: Human cohort data confirms reduced switched memory B cells and plasmablasts in LRBA deficiency.
