    explanation: ClinGen classifies the LRBA-combined immunodeficiency due to LRBA deficiency gene-disease relationship as definitive with autosomal recessive inheritance.
treatments:
- name: Abatacept
  description: >-
    CTLA4-Ig replacement therapy that addresses the checkpoint defect caused by
    LRBA loss. It is particularly useful for immune dysregulation,
    lymphoproliferation, and chronic enteropathy.
  treatment_term:
    preferred_term: immunotherapy
    term:
      id: NCIT:C15262
      label: Immunotherapy
    therapeutic_agent:
    - preferred_term: abatacept
      term:
        id: NCIT:C28898
        label: Abatacept
  target_mechanisms:
  - target: Impaired immune checkpoint suppression
    treatment_effect: RESTORES
    description: >-
      Abatacept supplies CTLA4-Ig activity that restores inhibitory checkpoint
      signaling lost when LRBA deficiency depletes endogenous CTLA4.
    evidence:
    - reference: PMID:26206937
      reference_title: "AUTOIMMUNE DISEASE. Patients with LRBA deficiency show CTLA4 loss and immune dysregulation responsive to abatacept therapy."
      supports: SUPPORT
      evidence_source: HUMAN_CLINICAL
      snippet: >-
        We found that patients with LRBA deficiency manifested a dramatic and
        sustained improvement in response to abatacept, a CTLA4 (cytotoxic T
        lymphocyte antigen-4)-immunoglobulin fusion drug.
      explanation: Clinical response to CTLA4-Ig supports restoration of checkpoint-mediated immune suppression.
  target_phenotypes:
  - preferred_term: Autoimmunity
    term:
      id: HP:0002960
      label: Autoimmunity
  - preferred_term: Chronic diarrhea
    term:
      id: HP:0002028
      label: Chronic diarrhea
  evidence:
  - reference: PMID:26206937
    reference_title: "AUTOIMMUNE DISEASE. Patients with LRBA deficiency show CTLA4 loss and immune dysregulation responsive to abatacept therapy."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      We found that patients with LRBA deficiency manifested a dramatic and
      sustained improvement in response to abatacept, a CTLA4 (cytotoxic T
      lymphocyte antigen-4)-immunoglobulin fusion drug.
    explanation: Landmark human evidence showing that CTLA4-Ig replacement can reverse key LRBA manifestations.
  - reference: PMID:31238161
    reference_title: "Abatacept as a Long-Term Targeted Therapy for LRBA Deficiency."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Long-term abatacept therapy is effective in most patients with LRBA
      deficiency.
    explanation: Supports sustained clinical benefit from abatacept in a prospective LRBA cohort.
- name: Immunoglobulin replacement therapy
  description: >-
    Supportive IVIG or SCIG replacement is commonly used to manage the humoral
    immune deficiency and recurrent infections associated with LRBA deficiency.
  treatment_term:
    preferred_term: intravenous immunoglobulin therapy
    term:
      id: MAXO:0001480
      label: immunoglobulin infusion therapy
    therapeutic_agent:
