  evidence:
  - reference: PMID:22608502
    reference_title: "Deleterious mutations in LRBA are associated with a syndrome of immune deficiency and autoimmunity."
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: >-
      Individuals with homozygous LRBA mutations had no LRBA, had disturbed B
      cell development, defective in vitro B cell activation, plasmablast
      formation, and immunoglobulin secretion, and had low proliferative
      responses.
    explanation: Establishes the direct B-cell developmental and functional defects caused by LRBA loss.
  - reference: PMID:26768763
    reference_title: "The extended phenotype of LPS-responsive beige-like anchor protein (LRBA) deficiency."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Most LRBA-deficient patients had low B-cell subset counts, mainly in
      switched memory B cells (80%) and plasmablasts (92%), with a defective
      specific antibody response in 67%.
    explanation: Cohort data confirms that impaired memory B-cell and plasmablast compartments are common in LRBA deficiency.
phenotypes:
- name: Hypogammaglobulinemia
  category: Immunologic
  frequency: FREQUENT
  phenotype_term:
    preferred_term: Hypogammaglobulinemia
    term:
      id: HP:0004313
      label: Decreased circulating immunoglobulin concentration
  evidence:
  - reference: PMID:26768763
    reference_title: "The extended phenotype of LPS-responsive beige-like anchor protein (LRBA) deficiency."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Immune dysregulation (95%), organomegaly (86%), recurrent infections
      (71%), and hypogammaglobulinemia (57%) were the main clinical
      complications observed in LRBA-deficient patients.
    explanation: Supports hypogammaglobulinemia as a frequent core phenotype in the largest abstract-level cohort.
- name: Recurrent Infections
