    reference_title: "Abatacept as a Long-Term Targeted Therapy for LRBA Deficiency."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Most patient had chronic diarrhea (CD) (n:18, 81.8%) and enteropathy was
      proven by biopsy in 14 (63.6%) patients.
    explanation: Supports chronic diarrhea and enteropathy as very frequent gastrointestinal manifestations.
- name: Splenomegaly
  category: Immunologic
  frequency: FREQUENT
  phenotype_term:
