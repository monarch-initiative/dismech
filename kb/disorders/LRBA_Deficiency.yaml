genetic:
- name: LRBA
  gene_term:
    preferred_term: LRBA
    term:
      id: hgnc:1742
      label: LRBA
  association: CAUSATIVE
  notes: >-
    LRBA deficiency is caused by biallelic LRBA variants, usually loss-of-function
    alleles that abolish or markedly reduce LRBA protein expression.
  evidence:
  - reference: PMID:30386343
    reference_title: "LRBA Deficiency in a Patient With a Novel Homozygous Mutation Due to Chromosome 4 Segmental Uniparental Isodisomy."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      LRBA deficiency was first described in 2012 as an autosomal recessive
      disorder caused by biallelic mutations in the LRBA gene (OMIM  # 614700).
    explanation: Establishes LRBA as the disease gene and frames the disorder as biallelic.
  - reference: PMID:22608502
    reference_title: "Deleterious mutations in LRBA are associated with a syndrome of immune deficiency and autoimmunity."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      All LRBA mutations segregated with the disease because homozygous
      individuals showed hypogammaglobulinemia and autoimmunity, whereas
      heterozygous individuals were healthy.
    explanation: Supports a causal recessive gene-disease relationship with disease segregation in affected families.
treatments:
- name: Abatacept
  description: >-
    CTLA4-Ig replacement therapy that addresses the checkpoint defect caused by
    LRBA loss. It is particularly useful for immune dysregulation,
    lymphoproliferation, and chronic enteropathy.
  treatment_term:
    preferred_term: pharmacotherapy
    term:
      id: MAXO:0000058
      label: pharmacotherapy
    therapeutic_agent:
    - preferred_term: abatacept
      term:
        id: NCIT:C28898
        label: Abatacept
  target_phenotypes:
  - preferred_term: Autoimmunity
    term:
      id: HP:0002960
      label: Autoimmunity
  - preferred_term: Chronic diarrhea
    term:
      id: HP:0002028
      label: Chronic diarrhea
  evidence:
  - reference: PMID:26206937
    reference_title: "AUTOIMMUNE DISEASE. Patients with LRBA deficiency show CTLA4 loss and immune dysregulation responsive to abatacept therapy."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      We found that patients with LRBA deficiency manifested a dramatic and
      sustained improvement in response to abatacept, a CTLA4 (cytotoxic T
      lymphocyte antigen-4)-immunoglobulin fusion drug.
    explanation: Landmark human evidence showing that CTLA4-Ig replacement can reverse key LRBA manifestations.
  - reference: PMID:31238161
    reference_title: "Abatacept as a Long-Term Targeted Therapy for LRBA Deficiency."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Long-term abatacept therapy is effective in most patients with LRBA
      deficiency.
    explanation: Supports sustained clinical benefit from abatacept in a prospective LRBA cohort.
- name: Immunoglobulin replacement therapy
  description: >-
    Supportive IVIG or SCIG replacement is commonly used to manage the humoral
    immune deficiency and recurrent infections associated with LRBA deficiency.
  treatment_term:
    preferred_term: pharmacotherapy
    term:
      id: MAXO:0000058
      label: pharmacotherapy
  target_phenotypes:
  - preferred_term: Hypogammaglobulinemia
    term:
      id: HP:0004313
      label: Decreased circulating immunoglobulin concentration
  - preferred_term: Recurrent Infections
    term:
      id: HP:0002719
      label: Recurrent infections
  evidence:
  - reference: PMID:26768763
    reference_title: "The extended phenotype of LPS-responsive beige-like anchor protein (LRBA) deficiency."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Of the 22 patients, 3 are deceased, 2 were treated successfully with
      hematopoietic stem cell transplantation, 7 are receiving immunoglobulin
      replacement, and 15 are receiving immunosuppressive treatment with
      systemic corticosteroids alone or in combination with steroid-sparing
      agents.
    explanation: Supports immunoglobulin replacement as a standard supportive therapy used in LRBA cohorts.
- name: Allogeneic stem cell transplantation
  description: >-
    Allogeneic HSCT can provide durable immune reconstitution and remission in
    selected patients with severe or refractory disease, although transplant
    risk remains substantial.
  treatment_term:
    preferred_term: hematopoietic stem cell transplantation
    term:
      id: MAXO:0000747
      label: hematopoietic stem cell transplantation
  target_phenotypes:
  - preferred_term: Combined immunodeficiency
    term:
      id: HP:0005387
      label: Combined immunodeficiency
  - preferred_term: Autoimmunity
    term:
      id: HP:0002960
      label: Autoimmunity
  evidence:
  - reference: PMID:37595759
    reference_title: "Therapeutic modalities and clinical outcomes in a large cohort with LRBA deficiency and CTLA4 insufficiency."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      HSCT was performed in 14 LRBA-/- patients; 9 patients (64.2%) showed
      complete remission, and 3 (21.3%) continued to receive immunosuppressants
      after transplantation.
    explanation: Supports HSCT as a potentially curative option for severe LRBA deficiency.
- name: Genetic counseling
  description: >-
    Genetic counseling is indicated for affected families because LRBA
    deficiency is a recessive Mendelian disorder that may recur in siblings
    when both parents carry pathogenic LRBA variants.
  treatment_term:
    preferred_term: genetic counseling
    term:
      id: MAXO:0000079
      label: genetic counseling
  evidence:
  - reference: PMID:30386343
    reference_title: "LRBA Deficiency in a Patient With a Novel Homozygous Mutation Due to Chromosome 4 Segmental Uniparental Isodisomy."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      LRBA deficiency was first described in 2012 as an autosomal recessive
      disorder caused by biallelic mutations in the LRBA gene (OMIM  # 614700).
    explanation: Autosomal recessive inheritance makes genetic counseling appropriate for family planning and carrier-risk discussion.
