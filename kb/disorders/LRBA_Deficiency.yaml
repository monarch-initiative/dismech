phenotypes:
- name: Hypogammaglobulinemia
  category: Immunologic
  frequency: FREQUENT
  phenotype_term:
    preferred_term: Hypogammaglobulinemia
    term:
      id: HP:0004313
      label: Decreased circulating immunoglobulin concentration
  evidence:
  - reference: PMID:26768763
    reference_title: "The extended phenotype of LPS-responsive beige-like anchor protein (LRBA) deficiency."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Immune dysregulation (95%), organomegaly (86%), recurrent infections
      (71%), and hypogammaglobulinemia (57%) were the main clinical
      complications observed in LRBA-deficient patients.
    explanation: Supports hypogammaglobulinemia as a frequent core phenotype in the largest abstract-level cohort.
- name: Recurrent Infections
  category: Immunologic
  frequency: FREQUENT
  phenotype_term:
    preferred_term: Recurrent Infections
    term:
      id: HP:0002719
      label: Recurrent infections
  evidence:
  - reference: PMID:26768763
    reference_title: "The extended phenotype of LPS-responsive beige-like anchor protein (LRBA) deficiency."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Immune dysregulation (95%), organomegaly (86%), recurrent infections
      (71%), and hypogammaglobulinemia (57%) were the main clinical
      complications observed in LRBA-deficient patients.
    explanation: Supports recurrent infections as a frequent major complication of LRBA deficiency.
- name: Autoimmunity
  category: Immunologic
  phenotype_term:
    preferred_term: Autoimmunity
    term:
      id: HP:0002960
      label: Autoimmunity
  evidence:
  - reference: PMID:22608502
    reference_title: "Deleterious mutations in LRBA are associated with a syndrome of immune deficiency and autoimmunity."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      We conclude that mutations in LRBA cause an immune deficiency
      characterized by defects in B cell activation and autophagy and by
      susceptibility to apoptosis, all of which are associated with a clinical
      phenotype of hypogammaglobulinemia and autoimmunity.
    explanation: The discovery paper directly identifies autoimmunity as part of the core clinical phenotype.
