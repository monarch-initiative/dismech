      term:
        id: NCIT:C2701
        label: Therapeutic Immune Globulin
  target_phenotypes:
  - preferred_term: Hypogammaglobulinemia
    term:
      id: HP:0004313
      label: Decreased circulating immunoglobulin concentration
  - preferred_term: Recurrent Infections
    term:
      id: HP:0002719
      label: Recurrent infections
  evidence:
  - reference: PMID:26768763
    reference_title: "The extended phenotype of LPS-responsive beige-like anchor protein (LRBA) deficiency."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Of the 22 patients, 3 are deceased, 2 were treated successfully with
      hematopoietic stem cell transplantation, 7 are receiving immunoglobulin
      replacement, and 15 are receiving immunosuppressive treatment with
      systemic corticosteroids alone or in combination with steroid-sparing
      agents.
    explanation: Supports immunoglobulin replacement as a standard supportive therapy used in LRBA cohorts.
- name: Allogeneic stem cell transplantation
  description: >-
    Allogeneic HSCT can provide durable immune reconstitution and remission in
    selected patients with severe or refractory disease, although transplant
    risk remains substantial.
  treatment_term:
    preferred_term: hematopoietic stem cell transplantation
    term:
      id: MAXO:0000747
      label: hematopoietic stem cell transplantation
  target_phenotypes:
  - preferred_term: Combined immunodeficiency
    term:
      id: HP:0005387
      label: Combined immunodeficiency
  - preferred_term: Autoimmunity
    term:
      id: HP:0002960
      label: Autoimmunity
  evidence:
  - reference: PMID:37595759
    reference_title: "Therapeutic modalities and clinical outcomes in a large cohort with LRBA deficiency and CTLA4 insufficiency."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      HSCT was performed in 14 LRBA-/- patients; 9 patients (64.2%) showed
      complete remission, and 3 (21.3%) continued to receive immunosuppressants
      after transplantation.
    explanation: Supports HSCT as a potentially curative option for severe LRBA deficiency.
