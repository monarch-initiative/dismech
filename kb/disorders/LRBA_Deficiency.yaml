      label: Autosomal recessive inheritance
  description: >-
    LRBA deficiency is inherited in an autosomal recessive pattern and is caused
    by biallelic pathogenic variants in LRBA.
  evidence:
  - reference: PMID:30386343
    reference_title: "LRBA Deficiency in a Patient With a Novel Homozygous Mutation Due to Chromosome 4 Segmental Uniparental Isodisomy."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      LRBA deficiency was first described in 2012 as an autosomal recessive
      disorder caused by biallelic mutations in the LRBA gene (OMIM  # 614700).
    explanation: Supports autosomal recessive inheritance caused by biallelic LRBA variants.
pathophysiology:
- name: Defective CTLA4 recycling and checkpoint control
  description: >-
    LRBA normally helps recycle CTLA4-containing vesicles and protects CTLA4
    from lysosomal degradation. Loss of LRBA accelerates CTLA4 turnover,
    reduces CTLA4 abundance in regulatory and activated T cells, and weakens
    checkpoint-mediated suppression of immune activation, driving
    autoimmunity and lymphoproliferation.
  cell_types:
  - preferred_term: regulatory T cell
    term:
      id: CL:0000815
      label: regulatory T cell
  biological_processes:
  - preferred_term: protein transport
    term:
      id: GO:0015031
      label: protein transport
  - preferred_term: protein localization to lysosome
    term:
      id: GO:0061462
      label: protein localization to lysosome
  - preferred_term: regulation of T cell activation
    term:
      id: GO:0050863
      label: regulation of T cell activation
  - preferred_term: negative regulation of immune response
    term:
      id: GO:0050777
      label: negative regulation of immune response
  evidence:
  - reference: PMID:26206937
    reference_title: "AUTOIMMUNE DISEASE. Patients with LRBA deficiency show CTLA4 loss and immune dysregulation responsive to abatacept therapy."
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: >-
      We found that LRBA colocalized with CTLA4 in endosomal vesicles and that
      LRBA deficiency or knockdown increased CTLA4 turnover, which resulted in
      reduced levels of CTLA4 protein in FoxP3(+) regulatory and activated
      conventional T cells.
    explanation: Demonstrates the core vesicle-trafficking defect that depletes CTLA4 and impairs checkpoint function.
  - reference: PMID:26768763
    reference_title: "The extended phenotype of LPS-responsive beige-like anchor protein (LRBA) deficiency."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Although 81% of LRBA-deficient patients had normal T-cell counts, 73% had
      reduced regulatory T (Treg) cell numbers.
    explanation: Human cohort data links LRBA deficiency to reduced Treg numbers despite preserved total T-cell counts.
- name: Defective B-cell activation and antibody production
  description: >-
    LRBA deficiency disrupts B-cell development and effector differentiation.
    Patients show impaired B-cell activation, reduced switched memory B cells
    and plasmablasts, defective immunoglobulin secretion, and poor specific
    antibody responses, providing the mechanistic basis for
    hypogammaglobulinemia and recurrent infection susceptibility.
