    term:
      id: hgnc:1742
      label: LRBA
  association: CAUSATIVE
  notes: >-
    LRBA deficiency is caused by biallelic LRBA variants, usually loss-of-function
    alleles that abolish or markedly reduce LRBA protein expression.
  evidence:
  - reference: PMID:30386343
    reference_title: "LRBA Deficiency in a Patient With a Novel Homozygous Mutation Due to Chromosome 4 Segmental Uniparental Isodisomy."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      LRBA deficiency is an autosomal recessive disorder caused by biallelic
      mutations in the LRBA gene.
    explanation: Establishes LRBA as the disease gene and frames the disorder as biallelic.
  - reference: PMID:22608502
    reference_title: "Deleterious mutations in LRBA are associated with a syndrome of immune deficiency and autoimmunity."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      All LRBA mutations segregated with the disease because homozygous
      individuals showed hypogammaglobulinemia and autoimmunity, whereas
      heterozygous individuals were healthy.
    explanation: Supports a causal recessive gene-disease relationship with disease segregation in affected families.
