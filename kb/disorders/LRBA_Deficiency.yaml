      id: CL:0000815
      label: regulatory T cell
  downstream:
  - target: Impaired immune checkpoint suppression
    causal_link_type: DIRECT
    description: Reduced CTLA4 availability weakens inhibitory checkpoint signaling.
  evidence:
  - reference: PMID:26206937
    reference_title: "AUTOIMMUNE DISEASE. Patients with LRBA deficiency show CTLA4 loss and immune dysregulation responsive to abatacept therapy."
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: >-
      We found that LRBA colocalized with CTLA4 in endosomal vesicles and that
      LRBA deficiency or knockdown increased CTLA4 turnover, which resulted in
      reduced levels of CTLA4 protein in FoxP3(+) regulatory and activated
      conventional T cells.
    explanation: Directly supports CTLA4 depletion in LRBA-deficient regulatory T cells.
- name: Reduced regulatory T-cell numbers
  description: >-
    Many patients with LRBA deficiency have reduced regulatory T-cell counts,
    further limiting suppressive immune control.
  cell_types:
  - preferred_term: regulatory T cell
    term:
      id: CL:0000815
      label: regulatory T cell
  downstream:
  - target: Impaired immune checkpoint suppression
    causal_link_type: DIRECT
    description: Fewer regulatory T cells reduce the capacity for checkpoint-mediated suppression.
  evidence:
  - reference: PMID:26768763
    reference_title: "The extended phenotype of LPS-responsive beige-like anchor protein (LRBA) deficiency."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Although 81% of LRBA-deficient patients had normal T-cell counts, 73% had
      reduced regulatory T (Treg) cell numbers.
    explanation: Human cohort data shows contraction of the regulatory T-cell compartment in LRBA deficiency.
- name: Impaired immune checkpoint suppression
  description: >-
    Reduced CTLA4-mediated inhibitory signaling weakens checkpoint suppression
    of immune activation in LRBA deficiency.
  cell_types:
  - preferred_term: regulatory T cell
    term:
