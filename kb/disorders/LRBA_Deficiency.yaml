name: LRBA Deficiency
creation_date: '2026-04-12T17:08:41Z'
updated_date: '2026-04-12T17:18:13Z'
category: Mendelian
synonyms:
- LPS-responsive beige-like anchor protein deficiency
- LATAIE syndrome
description: >-
  LRBA deficiency is a Mendelian inborn error of immunity caused by biallelic
  pathogenic variants in LRBA. The disorder combines humoral immune deficiency
  with broad immune dysregulation, including recurrent infections,
  hypogammaglobulinemia, autoimmunity, lymphoproliferation, and enteropathy.
  At a mechanistic level, LRBA loss impairs intracellular CTLA4 recycling and
  destabilizes immune-checkpoint control while also perturbing B-cell
  activation, plasmablast formation, and antibody secretion.
