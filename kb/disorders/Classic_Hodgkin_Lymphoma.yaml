diagnosis:
- name: Open Lymph Node Biopsy
  description: >-
    Tissue diagnosis is preferably established with open lymph node biopsy.
  evidence:
  - reference: PMID:31894937
    reference_title: "Lymphoma: Diagnosis and Treatment."
    supports: SUPPORT
    evidence_source: OTHER
    snippet: "An open lymph node biopsy is preferred for diagnosis."
    explanation: This review explicitly states that open lymph node biopsy is the preferred diagnostic procedure for lymphoma.
- name: Immunohistochemistry for classical Hodgkin lymphoma markers
  description: >-
    Diagnosis of classic Hodgkin lymphoma is supported by the characteristic
    immunophenotype of CD30, CD15, and PAX5 expression with absence of CD45 and
    T-lineage markers.
  diagnosis_term:
    preferred_term: diagnostic procedure
    term:
      id: MAXO:0000003
      label: diagnostic procedure
  markers: CD30, CD15, PAX5, CD45
  evidence:
  - reference: PMID:26839195
    reference_title: "Atypical Phenotypes in Classical Hodgkin Lymphoma."
    supports: SUPPORT
    evidence_source: OTHER
    snippet: "Classical Hodgkin lymphoma has a characteristic immunophenotype in most cases, with expression of CD30, CD15, and PAX-5, and absence of CD45 and T-lineage markers."
    explanation: This pathology review abstract directly supports the diagnostic immunophenotypic profile used in classic Hodgkin lymphoma.
- name: PET/CT-Based Lugano Staging
  description: >-
    PET/CT is integrated into Lugano staging to define disease extent and guide
    treatment selection.
  evidence:
  - reference: PMID:31894937
    reference_title: "Lymphoma: Diagnosis and Treatment."
    supports: SUPPORT
    evidence_source: OTHER
    snippet: "The Lugano classification system incorporates symptoms and the extent of the disease as shown on positron emission tomography/computed tomography to stage lymphoma, which is then used to determine treatment."
    explanation: This review supports PET/CT-based Lugano staging as a standard part of lymphoma diagnosis and management.
differential_diagnoses:
- name: Nodular lymphocyte predominant Hodgkin lymphoma
  disease_term:
    preferred_term: nodular lymphocyte predominant Hodgkin lymphoma
    term:
      id: MONDO:0044778
      label: nodular lymphocyte predominant Hodgkin lymphoma
  description: >-
    NLPHL is a major pathologic differential because it can overlap morphologically
    with classic Hodgkin lymphoma while differing in immunophenotype and clinical
    behavior.
  distinguishing_features:
  - NLPHL retains a B-cell program with LP cells rather than classic Hodgkin/Reed-Sternberg cells.
  - NLPHL requires careful separation from classic Hodgkin lymphoma because management and biologic behavior differ.
  evidence:
  - reference: PMID:34208705
    reference_title: "Pitfalls in the Diagnosis of Nodular Lymphocyte Predominant Hodgkin Lymphoma: Variant Patterns, Borderlines and Mimics."
    supports: SUPPORT
    evidence_source: OTHER
    snippet: "NLPHL also shows overlap with other lymphomas, particularly, classic Hodgkin lymphoma and T-cell lymphomas."
    explanation: This review explicitly identifies classic Hodgkin lymphoma as a diagnostic overlap and differential consideration for NLPHL.
- name: Primary mediastinal large B-cell lymphoma
  disease_term:
    preferred_term: primary mediastinal large B-cell lymphoma
    term:
      id: MONDO:0020323
      label: primary mediastinal large B-cell lymphoma
  description: >-
    PMBCL is a relevant mediastinal differential because it shares B-cell
    lineage features and overlapping immune-evasion biology with classic
    Hodgkin lymphoma, especially in mediastinal presentations.
  distinguishing_features:
  - PMBCL typically presents as a rapidly enlarging anterior mediastinal mass with preserved B-cell surface marker expression.
  - Classic Hodgkin lymphoma is defined by Hodgkin/Reed-Sternberg cells in an inflammatory background rather than a diffuse large B-cell phenotype.
  evidence:
  - reference: PMID:34590432
    reference_title: Primary mediastinal large B cell lymphoma.
    supports: SUPPORT
    evidence_source: OTHER
    snippet: "Primary mediastinal large B cell lymphoma (PMBCL) is an aggressive large B cell lymphoma originating in the mediastinum, that mainly expresses B cell surface molecules, such as CD19, CD20, CD22, andCD79a."
    explanation: This supports PMBCL as a clinically and pathologically distinct mediastinal B-cell lymphoma that must be separated from classic Hodgkin lymphoma.
genetic:
- name: TNFAIP3
  association: Somatic Loss-of-Function Mutation
  gene_term:
    preferred_term: TNFAIP3
    term:
      id: hgnc:11896
      label: TNFAIP3
  notes: >-
    TNFAIP3 encodes the NF-kappaB negative regulator A20. Destructive somatic
    lesions contribute to constitutive NF-kappaB activation in Hodgkin/Reed-Sternberg cells.
  evidence:
  - reference: PMID:27221964
    reference_title: "NF-κB deregulation in Hodgkin lymphoma."
    supports: SUPPORT
    evidence_source: OTHER
    snippet: "This includes interaction with other cells in the lymphoma microenvironment through CD30, CD40, BCMA and other receptors, but also recurrent somatic genetic lesions in various factors of the NF-κB pathway, including destructive mutations in negative regulators of NF-κB signaling (e.g. TNFAIP3, NFKBIA), and copy number gains of genes encoding positive regulators (e.g. REL, MAP3K14)."
    explanation: This review directly identifies TNFAIP3 as a recurrently mutated negative regulator of NF-kappaB signaling in Hodgkin lymphoma.
- name: NFKBIA
  association: Somatic Loss-of-Function Mutation
  gene_term:
    preferred_term: NFKBIA
    term:
      id: hgnc:7797
      label: NFKBIA
  notes: >-
    NFKBIA encodes IkappaBalpha, a negative regulator of canonical NF-kappaB
    signaling. Its loss contributes to constitutive pathway activation.
  evidence:
  - reference: PMID:27221964
    reference_title: "NF-κB deregulation in Hodgkin lymphoma."
    supports: SUPPORT
    evidence_source: OTHER
    snippet: "This includes interaction with other cells in the lymphoma microenvironment through CD30, CD40, BCMA and other receptors, but also recurrent somatic genetic lesions in various factors of the NF-κB pathway, including destructive mutations in negative regulators of NF-κB signaling (e.g. TNFAIP3, NFKBIA), and copy number gains of genes encoding positive regulators (e.g. REL, MAP3K14)."
    explanation: This review directly identifies NFKBIA as a recurrently mutated negative regulator of NF-kappaB signaling in Hodgkin lymphoma.
- name: B2M
  association: Somatic Mutation
  gene_term:
    preferred_term: B2M
    term:
      id: hgnc:914
      label: B2M
  notes: >-
    B2M mutations disrupt major histocompatibility complex class I antigen
    presentation and contribute to immune evasion by Hodgkin/Reed-Sternberg cells.
  evidence:
  - reference: PMID:31816062
    reference_title: "Genomic analyses of flow-sorted Hodgkin Reed-Sternberg cells reveal complementary mechanisms of immune evasion."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Of note, recurrent cHL alterations, including B2M, TNFAIP3, STAT6, GNA13, and XPO1 mutations and 2p/2p15, 6p21.32, 6q23.3, and 9p/9p24.1 copy number alterations, were also identified in >20% of primary mediastinal B-cell lymphomas, highlighting shared pathogenetic mechanisms in these diseases."
    explanation: This genomic study identifies recurrent B2M mutations as one of the characteristic immune-evasion-associated lesions in classic Hodgkin lymphoma.
- name: CIITA
  association: Somatic Rearrangement/Fusion
  gene_term:
    preferred_term: CIITA
    term:
      id: hgnc:7067
      label: CIITA
  notes: >-
    Recurrent CIITA breaks or fusions occur in a subset of classic Hodgkin
    lymphoma and can alter antigen-presentation and checkpoint-ligand programs.
  evidence:
  - reference: PMID:21368758
    reference_title: "MHC class II transactivator CIITA is a recurrent gene fusion partner in lymphoid cancers."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "In a subsequent evaluation of 263 B-cell lymphomas, we also demonstrate that genomic CIITA breaks are highly recurrent in primary mediastinal B-cell lymphoma (38%) and classical Hodgkin lymphoma (cHL) (15%)."
    explanation: This study directly supports recurrent CIITA genomic breaks in a subset of classic Hodgkin lymphoma.
- name: 9p24.1 Copy Gain
  association: Somatic Copy-Number Gain
  notes: >-
    Recurrent copy gain of the 9p24.1 locus increases PD-1 ligand expression and
    is a hallmark of classic Hodgkin lymphoma immune evasion.
  evidence:
  - reference: PMID:31816062
    reference_title: "Genomic analyses of flow-sorted Hodgkin Reed-Sternberg cells reveal complementary mechanisms of immune evasion."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "HRS cells exhibit near-universal somatic copy gains of chromosome 9p/9p24.1, which increase expression of the programmed cell death protein 1 (PD-1) ligands."
    explanation: This directly supports recurrent 9p24.1 copy gain as a defining genetic immune-evasion lesion in classic Hodgkin lymphoma.
treatments:
- name: ABVD-Based Chemotherapy
  description: >-
    Combination chemotherapy with ABVD remains a standard systemic treatment
    backbone for Hodgkin lymphoma.
  treatment_term:
    preferred_term: chemotherapy
    term:
      id: MAXO:0000647
      label: chemotherapy
    therapeutic_agent:
    - preferred_term: doxorubicin
      term:
        id: CHEBI:28748
        label: doxorubicin
    - preferred_term: bleomycin
      term:
        id: CHEBI:22907
        label: bleomycin
    - preferred_term: vinblastine
      term:
        id: CHEBI:27375
        label: vincaleukoblastine
    - preferred_term: dacarbazine
      term:
        id: CHEBI:4305
        label: dacarbazine
  evidence:
  - reference: PMID:31894937
    reference_title: "Lymphoma: Diagnosis and Treatment."
    supports: SUPPORT
    evidence_source: OTHER
    snippet: "Hodgkin lymphoma is treated with combined chemotherapy with ABVD (doxorubicin, bleomycin, vinblastine, and dacarbazine), Stanford V (a chemotherapy regimen consisting of mechlorethamine, doxorubicin, vinblastine, vincristine, bleomycin, etoposide, and prednisone), or BEACOPP (bleomycin, etoposide, doxorubicin, cyclophosphamide, vincristine, procarbazine, and prednisone) with radiotherapy."
    explanation: This treatment review identifies ABVD-containing combination chemotherapy as a standard treatment approach for Hodgkin lymphoma.
- name: Radiation Therapy
