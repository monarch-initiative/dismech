- Hodgkin Lymphoma
synonyms:
- classical Hodgkin lymphoma
- classical Hodgkin's lymphoma
- classic Hodgkin disease
- CHL
disease_term:
  preferred_term: classic Hodgkin lymphoma
  term:
    id: MONDO:0009348
    label: classic Hodgkin lymphoma
parents:
- Lymphoma
description: >-
  Classic Hodgkin lymphoma is a B-cell lymphoma characterized histologically by
  the presence of Hodgkin cells and multinucleated Reed-Sternberg cells.
definitions:
- name: Pathologic definition of classic Hodgkin lymphoma
  definition_type: CASE_DEFINITION
  description: >-
    Classic Hodgkin lymphoma is defined by neoplastic Hodgkin/Reed-Sternberg
    cells in a dense inflammatory background and is now understood to arise from
    germinal center B cells despite loss of many canonical B-cell markers.
  scope: General pathologic and molecular definition of classic Hodgkin lymphoma
  evidence:
  - reference: PMID:34075767
    reference_title: "Classic Hodgkin Lymphoma - Old Disease, New Directions: An Update on Pathology, Molecular Features and Biological Prognostic Markers."
    supports: SUPPORT
    evidence_source: OTHER
    snippet: "The hallmark of this disease is the neoplastic Hodgkin/Reed-Sternberg (HRS) cell, which is favored to be derived from germinal center B-cells but has lost many of the B-cell markers."
    explanation: This review provides a concise disease definition centered on the hallmark HRS cell and its germinal center B-cell derivation.
prevalence:
- population: All lymphomas in the Western world
  percentage: "15-25"
  evidence:
  - reference: PMID:34075767
    reference_title: "Classic Hodgkin Lymphoma - Old Disease, New Directions: An Update on Pathology, Molecular Features and Biological Prognostic Markers."
    supports: SUPPORT
    evidence_source: OTHER
    snippet: "Classic Hodgkin lymphoma (CHL) accounts for 15-25% of all lymphomas in the Western world."
    explanation: This review quantifies the proportion of all lymphomas represented by classic Hodgkin lymphoma in Western populations.
infectious_agent:
- name: Epstein-Barr Virus
  infectious_agent_term:
    preferred_term: Human gammaherpesvirus 4
    term:
      id: NCBITaxon:10376
      label: Human gammaherpesvirus 4
  description: >-
    Epstein-Barr virus is associated with a subset of classic Hodgkin lymphoma
    cases, with heterogeneity in association linked to the host immune context.
  evidence:
  - reference: PMID:29799516
    reference_title: "Epstein Barr Virus-Associated Hodgkin Lymphoma."
    supports: PARTIAL
    evidence_source: OTHER
    snippet: "The variable association of cHL with EBV infection is probably related to the different levels of patient immunosuppression, both locally in the tumour tissue and at the systemic level."
    explanation: This review supports EBV as a relevant but non-universal infectious cofactor in classic Hodgkin lymphoma.
pathophysiology:
- name: Germinal Center B-Cell Origin of HRS Cells
  description: >-
    The malignant Hodgkin/Reed-Sternberg cell is derived from germinal center B
    cells but loses many typical B-cell features during transformation.
  cell_types:
  - preferred_term: germinal center B cell
    term:
      id: CL:0000844
      label: germinal center B cell
  evidence:
  - reference: PMID:34075767
    reference_title: "Classic Hodgkin Lymphoma - Old Disease, New Directions: An Update on Pathology, Molecular Features and Biological Prognostic Markers."
    supports: SUPPORT
    evidence_source: OTHER
    snippet: "The hallmark of this disease is the neoplastic Hodgkin/Reed-Sternberg (HRS) cell, which is favored to be derived from germinal center B-cells but has lost many of the B-cell markers."
    explanation: This directly supports the germinal center B-cell origin of the malignant HRS cell.
  downstream:
  - target: Cytokine and Chemokine-Mediated Microenvironment Remodeling
    description: Transformed HRS cells remodel a supportive inflammatory niche.
- name: Mutation-Driven JAK/STAT Activation
  description: >-
    Recurrent mutations in classic Hodgkin lymphoma activate JAK/STAT signaling
    programs that support tumor-cell survival and cytokine-responsive growth.
  genes:
  - preferred_term: JAK2
    term:
      id: hgnc:6192
      label: JAK2
  - preferred_term: STAT6
    term:
      id: hgnc:11368
      label: STAT6
  biological_processes:
  - preferred_term: cell surface receptor signaling pathway via JAK-STAT
    modifier: INCREASED
    term:
      id: GO:0007259
      label: cell surface receptor signaling pathway via JAK-STAT
  evidence:
  - reference: PMID:29340061
    reference_title: "Analysis of the mutational landscape of classic Hodgkin lymphoma identifies disease heterogeneity and potential therapeutic targets."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "However, several variants were consistently detected in genes related to relevant signaling pathways, such as GM-CSF/IL-3, CBP/EP300, JAK/STAT, NF-kappaB, and numerous variants of genes affecting the B-cell receptor (BCR) pathway, such as BTK, CARD11, BCL10, among others."
    explanation: This genomic study directly supports recurrent genetic lesions affecting JAK/STAT signaling in classic Hodgkin lymphoma.
  downstream:
  - target: Cytokine and Chemokine-Mediated Microenvironment Remodeling
    description: JAK/STAT signaling supports inflammatory niche formation.
- name: Mutation-Driven NF-kappaB Activation
  description: >-
    Recurrent lesions affecting negative regulators and upstream activators of
    NF-kappaB signaling drive constitutive survival signaling in Hodgkin/Reed-Sternberg cells.
  biological_processes:
  - preferred_term: canonical NF-kappaB signal transduction
    modifier: INCREASED
    term:
      id: GO:0007249
      label: canonical NF-kappaB signal transduction
  evidence:
  - reference: PMID:27221964
    reference_title: "NF-κB deregulation in Hodgkin lymphoma."
    supports: SUPPORT
    evidence_source: OTHER
    snippet: "This includes interaction with other cells in the lymphoma microenvironment through CD30, CD40, BCMA and other receptors, but also recurrent somatic genetic lesions in various factors of the NF-κB pathway, including destructive mutations in negative regulators of NF-κB signaling (e.g. TNFAIP3, NFKBIA), and copy number gains of genes encoding positive regulators (e.g. REL, MAP3K14)."
    explanation: This review directly supports recurrent somatic lesions in NF-kappaB pathway regulators, including TNFAIP3 and NFKBIA, as core mechanisms in Hodgkin lymphoma.
  downstream:
  - target: Cytokine and Chemokine-Mediated Microenvironment Remodeling
    description: NF-kappaB signaling sustains the inflammatory tumor niche.
  - target: PD-1 Ligand-Mediated Immune Evasion
    description: Constitutive NF-kappaB signaling cooperates with checkpoint-ligand upregulation to promote immune escape.
- name: EBV LMP1-Mediated NF-kappaB Activation
  description: >-
    In Epstein-Barr virus-positive classic Hodgkin lymphoma, viral latent
    membrane protein 1 mimics active CD40 signaling and drives NF-kappaB
    activation in Hodgkin/Reed-Sternberg cells.
  biological_processes:
  - preferred_term: canonical NF-kappaB signal transduction
    modifier: INCREASED
    term:
      id: GO:0007249
      label: canonical NF-kappaB signal transduction
  evidence:
  - reference: PMID:27221964
    reference_title: "NF-κB deregulation in Hodgkin lymphoma."
    supports: SUPPORT
    evidence_source: OTHER
    snippet: "In Epstein-Barr virus-positive cases of classical HL, the virus-encoded latent membrane protein 1 causes NF-κB activation by mimicking an active CD40 receptor."
    explanation: This directly supports EBV LMP1 as a mechanism of NF-kappaB activation in EBV-positive classical Hodgkin lymphoma.
  downstream:
  - target: Cytokine and Chemokine-Mediated Microenvironment Remodeling
    description: EBV-driven NF-kappaB activation reinforces the inflammatory tumor niche.
- name: Cytokine and Chemokine-Mediated Microenvironment Remodeling
  description: >-
    HRS cells persist within a dense inflammatory infiltrate that they actively
    recruit and shape through cytokine and chemokine signaling.
  biological_processes:
  - preferred_term: chemokine production
    modifier: INCREASED
    term:
      id: GO:0032602
      label: chemokine production
  evidence:
  - reference: PMID:34075767
    reference_title: "Classic Hodgkin Lymphoma - Old Disease, New Directions: An Update on Pathology, Molecular Features and Biological Prognostic Markers."
    supports: SUPPORT
    evidence_source: OTHER
    snippet: "HRS cells are scattered within a dense inflammatory infiltrate, and through a network of cytokines and chemokines they shape their microenvironment, evade immune response, survive, and grow."
    explanation: This review directly supports the dependence of classic Hodgkin lymphoma on cytokine and chemokine-mediated microenvironmental remodeling.
  downstream:
  - target: PD-1 Ligand-Mediated Immune Evasion
    description: The inflammatory niche is coupled to ineffective anti-tumor immunity.
  - target: Lymphadenopathy
    description: The HRS-supported inflammatory niche contributes to bulky nodal enlargement.
  - target: Fever
    description: Cytokine-rich tumor inflammation contributes to B symptoms including fever.
- name: PD-1 Ligand-Mediated Immune Evasion
  conforms_to: "immune_checkpoint_blockade#Adaptive Immune Resistance"
  description: >-
    Near-universal 9p24.1 copy gain increases PD-1 ligand expression on HRS
    cells and contributes to immune escape in classic Hodgkin lymphoma.
  biological_processes:
  - preferred_term: Negative Regulation of T Cell Mediated Immunity
    term:
      id: GO:0002710
      label: negative regulation of T cell mediated immunity
    modifier: INCREASED
  evidence:
  - reference: PMID:31816062
    reference_title: "Genomic analyses of flow-sorted Hodgkin Reed-Sternberg cells reveal complementary mechanisms of immune evasion."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "HRS cells exhibit near-universal somatic copy gains of chromosome 9p/9p24.1, which increase expression of the programmed cell death protein 1 (PD-1) ligands."
    explanation: This study directly links recurrent 9p24.1 gains in HRS cells to elevated PD-1 ligand expression and immune evasion.
