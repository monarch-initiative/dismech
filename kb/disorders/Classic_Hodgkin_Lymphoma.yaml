    reference_title: "Classic Hodgkin Lymphoma: A Nonclassic Presentation."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Hodgkin lymphoma classically presents as lymphadenopathy with contiguous spread with or without associated B symptoms including night sweats, weight loss, and fever."
    explanation: This directly supports lymphadenopathy as the classic presenting feature of Hodgkin lymphoma.
