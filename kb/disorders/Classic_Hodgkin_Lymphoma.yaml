    Radiotherapy is used with chemotherapy in selected Hodgkin lymphoma
    treatment strategies.
  treatment_term:
    preferred_term: radiation therapy
    term:
      id: MAXO:0000014
      label: radiation therapy
  evidence:
  - reference: PMID:31894937
    reference_title: "Lymphoma: Diagnosis and Treatment."
    supports: SUPPORT
    evidence_source: OTHER
    snippet: "Hodgkin lymphoma is treated with combined chemotherapy with ABVD (doxorubicin, bleomycin, vinblastine, and dacarbazine), Stanford V (a chemotherapy regimen consisting of mechlorethamine, doxorubicin, vinblastine, vincristine, bleomycin, etoposide, and prednisone), or BEACOPP (bleomycin, etoposide, doxorubicin, cyclophosphamide, vincristine, procarbazine, and prednisone) with radiotherapy."
    explanation: This review explicitly states that radiotherapy is used in combination treatment regimens for Hodgkin lymphoma.
- name: Brentuximab Vedotin
  description: >-
    CD30-directed antibody-drug conjugate therapy has activity in relapsed or
    refractory classic Hodgkin lymphoma and is commonly combined with chemotherapy.
  treatment_term:
    preferred_term: immunotherapy
    term:
      id: NCIT:C15262
      label: Immunotherapy
    therapeutic_agent:
    - preferred_term: brentuximab vedotin
      term:
        id: NCIT:C66944
        label: Brentuximab Vedotin
  evidence:
  - reference: PMID:39039881
    reference_title: "[Analysis of 10 cases of brentuximab vedotin combined with chemotherapy in the treatment of children with refractory and or relapsed classic Hodgkin lymphoma]."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Brentuximab vedotin has demonstrated efficacy and a tolerable safety profile in the treatment of refractory and relapsed CD30-positive Hodgkin's lymphoma in children."
    explanation: This study supports brentuximab vedotin as an active CD30-targeted therapy in relapsed or refractory classic Hodgkin lymphoma.
- name: Pembrolizumab
  description: >-
    PD-1 blockade with pembrolizumab is active in relapsed or refractory classic
    Hodgkin lymphoma.
  treatment_term:
    preferred_term: immunotherapy
    term:
      id: NCIT:C15262
      label: Immunotherapy
    therapeutic_agent:
    - preferred_term: pembrolizumab
      term:
        id: NCIT:C106432
        label: Pembrolizumab
  evidence:
  - reference: PMID:28441111
    reference_title: "Phase II Study of the Efficacy and Safety of Pembrolizumab for Relapsed/Refractory Classic Hodgkin Lymphoma."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Pembrolizumab was associated with high response rates and an acceptable safety profile in patients with rrHL, offering a new treatment paradigm for this disease."
    explanation: This phase II trial supports pembrolizumab as an effective PD-1-blocking therapy in relapsed or refractory classic Hodgkin lymphoma.
  target_mechanisms:
  - target: PD-1 Ligand-Mediated Immune Evasion
    treatment_effect: INHIBITS
    description: >-
      Pembrolizumab blocks PD-1 signaling and counteracts PD-1 ligand-mediated
      suppression of anti-tumor T-cell activity in classic Hodgkin lymphoma.
    evidence:
    - reference: PMID:28441111
      supports: SUPPORT
      evidence_source: HUMAN_CLINICAL
      snippet: "Pembrolizumab was associated with high response rates and an acceptable safety profile in patients with rrHL, offering a new treatment paradigm for this disease."
      explanation: The clinical activity of pembrolizumab supports inhibition of PD-1 ligand-mediated immune evasion as a therapeutically relevant mechanism in relapsed or refractory classic Hodgkin lymphoma.
- name: Nivolumab
  description: >-
    PD-1 blockade with nivolumab is an established treatment option in previously
    treated classic Hodgkin lymphoma and is tightly aligned to the disease's
    9p24.1-driven checkpoint biology.
  treatment_term:
