    explanation: >-
      Supports hematuria as part of the renal involvement spectrum in IgAV.
  - reference: PMID:34858429
    reference_title: "Pathogenesis of IgA Vasculitis: An Up-To-Date Review."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
