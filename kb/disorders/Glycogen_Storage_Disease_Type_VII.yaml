name: Glycogen Storage Disease Type VII
creation_date: "2026-05-11T13:32:18Z"
category: Mendelian
synonyms:
- Glycogen storage disease due to muscle phosphofructokinase deficiency
- GSD due to muscle phosphofructokinase deficiency
- GSD type 7
- GSD type VII
- Glycogenosis type VII
- Tarui disease
description: >-
  Glycogen storage disease type VII is an autosomal recessive glycogen storage
  disease caused by pathogenic variants in PFKM, encoding muscle
  phosphofructokinase. The enzymatic block impairs skeletal-muscle glycolysis
  and is classically associated with exertional fatigue, exercise intolerance,
  myotonia, muscle weakness, hemolytic anemia, hyperuricemia, and increased
  muscle glycogen content.
