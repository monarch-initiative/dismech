diagnosis:
- name: Exercise lactate and ammonia profiling
  description: >-
    Maximal exercise testing with lactate and ammonia follow-up can reveal the
    Tarui disease pattern and help direct genetic testing.
  diagnosis_term:
    preferred_term: exercise lactate and ammonia profiling
    term:
      id: MAXO:0000487
      label: clinical assessment
  results: Low lactate during exercise with delayed post-exercise lactate rise and high ammonia.
  evidence:
  - reference: PMID:27303362
    reference_title: Unique Exercise Lactate Profile in Muscle Phosphofructokinase Deficiency (Tarui Disease); Difference Compared with McArdle Disease.
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      In diagnostic setting, we recommend to utilize maximal bicycle
      spiroergometry with sufficiently long (30–40 min) follow-up of ammonia and
      lactate levels after exercise.
    explanation: The study explicitly recommends post-exercise ammonia and lactate follow-up for diagnosis.
- name: PFKM molecular genetic testing
  description: Sequencing can identify biallelic PFKM pathogenic variants that confirm GSD VII.
  diagnosis_term:
    preferred_term: molecular genetic testing
    term:
      id: MAXO:0000533
      label: molecular genetic testing
  results: Identification of pathogenic PFKM variants.
  evidence:
  - reference: PMID:39156960
    reference_title: "Case report: Comprehensive exploration of a novel PFKM mutation in glycogen storage disease Type VII."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Whole genome sequencing (WGS) and whole exome sequencing (WES) identified
      two compound heterozygous mutations in the PFKM (NM_000289.6) gene:
      c.626G>A and c.1376G>A in exons 7 and 15, respectively.
    explanation: This case report demonstrates confirmatory detection of PFKM variants by genomic sequencing.
- name: Muscle biopsy and phosphofructokinase activity testing
  description: Muscle biopsy can show glycogen deposition and enzyme studies can demonstrate reduced phosphofructokinase activity.
  diagnosis_term:
    preferred_term: biopsy of muscle tissue
    term:
      id: MAXO:0000387
      label: biopsy of muscle tissue
  results: Muscle glycogen deposition with reduced phosphofructokinase activity.
  evidence:
  - reference: PMID:27303362
    reference_title: Unique Exercise Lactate Profile in Muscle Phosphofructokinase Deficiency (Tarui Disease); Difference Compared with McArdle Disease.
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Both patients with Tarui disease showed in muscle electron microscopic
      analysis extra lysosomal glycogen accumulations. Although
      phosphofructokinase staining was normal, the whole-exome sequencing
      revealed a causative homozygous PFKM gene defect, R39Q, in both siblings
      establishing the diagnosis of GSDVII. Additionally, in biochemical studies,
      phosphofructokinase activity was reduced to 3–4% of normal activity in
      muscle tissue.
    explanation: This human study supports muscle glycogen accumulation together with reduced muscle phosphofructokinase activity testing.
