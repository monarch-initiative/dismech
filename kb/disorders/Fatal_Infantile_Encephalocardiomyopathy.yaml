genetic:
- name: SCO2 biallelic pathogenic variants
  gene_term:
    preferred_term: SCO2
    term:
      id: hgnc:10604
      label: SCO2
  inheritance:
  - name: Autosomal recessive
    evidence:
    - reference: PMID:11673586
      reference_title: "Homozygosity (E140K) in SCO2 causes delayed infantile onset of cardiomyopathy and neuropathy."
      supports: SUPPORT
      evidence_source: HUMAN_CLINICAL
      snippet: "The patients all had a homozygous missense mutation in SCO2."
      explanation: Homozygous SCO2 missense mutations in affected infants indicate autosomal recessive inheritance.
  features: >
    SCO2 is the most common nuclear genetic cause. The recurrent p.E140K
    (c.1541G>A / G1541A) allele is present on at least one allele in nearly all
    reported cases and behaves as a founder/hotspot allele in Central European
    populations. Genotype predicts course: compound heterozygosity for E140K with
    a null allele gives the severe neonatal cardioencephalomyopathic form, E140K
    homozygosity gives a delayed-onset Leigh-/SMA-like form, and E140K/M177T gives
    the mildest form with survival of 2-4 years.
  evidence:
  - reference: PMID:23719228
    reference_title: "The natural history of SCO2 deficiency in 36 Polish children confirmed the genotype-phenotype correlation."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "A novel, milder phenotype (disease onset delayed until one year after birth, nonspecific encephalomyopathy, and 2-4 year survival period) associated with compound heterozygosity of the common p.E140K and a novel p.M177T mutations extends the range of symptoms of the SCO2 deficiency."
    explanation: Establishes the SCO2 genotype-phenotype correlation, including the common p.E140K allele and the milder E140K/M177T combination.
  - reference: PMID:19353847
    reference_title: "A novel homozygous SCO2 mutation, p.G193S, causing fatal infantile cardioencephalomyopathy."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Mutations in the COX assembly gene SCO2 cause fatal infantile cardioencephalomyopathy."
    explanation: Confirms SCO2 mutations as a cause of fatal infantile cardioencephalomyopathy, including a non-E140K homozygous p.G193S allele in a consanguineous family.
- name: COX15 biallelic pathogenic variants
  gene_term:
    preferred_term: COX15
    term:
      id: hgnc:2263
      label: COX15
  inheritance:
  - name: Autosomal recessive
    evidence:
    - reference: PMID:12474143
      reference_title: "Mutations in COX15 produce a defect in the mitochondrial heme biosynthetic pathway, causing early-onset fatal hypertrophic cardiomyopathy."
      supports: SUPPORT
      evidence_source: HUMAN_CLINICAL
      snippet: "Mutation analysis of COX15 in the patient identified a missense mutation (C700T) on one allele, changing a conserved arginine to tryptophan (R217W), and a splice-site mutation in intron 3 on the other allele"
      explanation: Biallelic (compound heterozygous) COX15 variants in an affected infant indicate autosomal recessive inheritance.
  features: >
    COX15 encodes heme A synthase; biallelic variants reduce mitochondrial heme A
    content and stall COX assembly, causing early-onset fatal hypertrophic
    cardiomyopathy with isolated COX deficiency.
  evidence:
  - reference: PMID:12474143
    reference_title: "Mutations in COX15 produce a defect in the mitochondrial heme biosynthetic pathway, causing early-onset fatal hypertrophic cardiomyopathy."
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: "These results suggest that reduced availability of heme A stalls the assembly of COX."
    explanation: Establishes the COX15 heme-A-deficiency mechanism that stalls COX assembly in this disorder.
- name: SCO1 biallelic pathogenic variants
  gene_term:
    preferred_term: SCO1
    term:
      id: hgnc:10603
      label: SCO1
  inheritance:
  - name: Autosomal recessive
    evidence:
    - reference: PMID:23878101
      reference_title: "Novel mutations in SCO1 as a cause of fatal infantile encephalopathy and lactic acidosis."
      supports: SUPPORT
      evidence_source: HUMAN_CLINICAL
      snippet: "we identified novel compound heterozygous mutations in SCO1 (p.M294V, p.Val93*) in one such patient with fatal encephalopathy."
      explanation: Compound heterozygous SCO1 variants in a patient with fatal encephalopathy indicate autosomal recessive inheritance of this rarer cause.
  features: >
    SCO1 is a rarer copper-delivery metallochaperone cause; allele-specific
    residual function correlates with the clinical phenotype (fatal encephalopathy,
    hepatopathy, or hypertrophic cardiomyopathy depending on the variants).
  evidence:
  - reference: PMID:23878101
    reference_title: "Novel mutations in SCO1 as a cause of fatal infantile encephalopathy and lactic acidosis."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Isolated cytochrome c oxidase (COX) deficiency is a common cause of mitochondrial disease, yet its genetic basis remains unresolved in many patients."
    explanation: Frames SCO1 as an additional genetic cause within the isolated COX-deficiency disease group.
treatments:
- name: Supportive and Metabolic Care
  description: >
    No curative therapy exists. Management is supportive: mechanical ventilation,
    nutritional support, seizure management, and management of cardiomyopathy and
    lactic acidosis. Mitochondrial cofactors (carnitine, riboflavin, coenzyme Q10,
    creatine, ascorbate) are used empirically without proven efficacy.
  treatment_term:
    preferred_term: supportive care
    term:
      id: MAXO:0000950
      label: supportive care
- name: Copper-Histidine Supplementation
  description: >
    Mechanism-based copper-histidine (Cu-His) supplementation has rescued COX
    activity in SCO2-deficient myoblasts in vitro and was associated with
    resolution of hypertrophic cardiomyopathy in a single patient; benefit appears
    to require early treatment before irreversible damage in post-mitotic tissues.
    This rationale is specific to copper-delivery (SCO2/SCO1) causes.
  treatment_term:
    preferred_term: Pharmacotherapy
    term:
      id: NCIT:C15986
      label: Pharmacotherapy
  evidence:
  - reference: PMID:11751685
    reference_title: "Cytochrome c oxidase deficiency due to mutations in SCO2, encoding a mitochondrial copper-binding protein, is rescued by copper in human myoblasts."
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: "COX activity in patient myoblasts was completely rescued by transduction with a retroviral vector expressing the human SCO2 coding sequence, and more interestingly by addition of copper-histidine (300 microM) to the culture medium."
    explanation: In vitro rescue of COX activity by copper-histidine in SCO2-deficient myoblasts provides the rationale for copper supplementation.
  - reference: PMID:14970747
    reference_title: "Reversion of hypertrophic cardiomyopathy in a patient with deficiency of the mitochondrial copper binding protein Sco2: is there a potential effect of copper?"
    supports: PARTIAL
    evidence_source: HUMAN_CLINICAL
    snippet: "Here, we report a patient with SCO 2 mutations and with resolution of severe hypertrophic cardiomyopathy."
    explanation: Single-patient report of resolution of hypertrophic cardiomyopathy attributed to subcutaneous copper-histidine; supports the approach but as anecdotal (PARTIAL) evidence.
- name: Genetic Counseling
  description: >
    Autosomal recessive inheritance carries a 25% recurrence risk for carrier
    parents; prenatal and preimplantation genetic diagnosis are available when the
    familial variants are known.
  treatment_term:
    preferred_term: genetic counseling
    term:
      id: MAXO:0000079
      label: genetic counseling
discussions:
- discussion_id: gap_fiec_sco2_mouse_cardiac_mismatch
  kind: HUMAN_MODEL_MISMATCH
  status: OPEN
  attaches_to:
  - pathophysiology#Nuclear COX Assembly Factor Loss and Complex IV Biogenesis Failure
  prompt: >
    Do existing Sco2 mouse models reproduce the human fatal infantile hypertrophic
    cardiomyopathy and early lethality, or does the model-human gap limit their
    use for preclinical therapy testing?
  rationale: >
    Constitutive Sco2 knockout mice are embryonic lethal, while the E129K knock-in
    (modeling the common human E140K allele) and compound KI/KO mice are viable
    with respiratory chain deficiency, complex IV assembly defects, reduced
    mitochondrial copper, and muscle weakness, but do NOT develop the hallmark
    infantile hypertrophic cardiomyopathy or fatal infantile course. This means
    the most genetically faithful mouse models fail to recapitulate the defining
    cardiac phenotype of the human disease, which is mechanistically meaningful for
    interpreting preclinical therapy results.
  proposed_experiments:
  - experiment_id: exp_fiec_sco2_cardiac_ipsc
    name: SCO2 patient iPSC-derived cardiomyocyte cardiac mechanism and therapy assay
    description: >-
      Use patient-derived (and isogenic-corrected) SCO2-mutant iPSC-derived
      cardiomyocytes to model the human cardiac phenotype that faithful Sco2 mouse
      models fail to reproduce, quantifying oxidative ATP production, calcium
      handling, arrhythmogenicity, and rescue by copper-histidine or
      protein/mRNA replacement.
    experiment_type:
      preferred_term: iPSC cardiomyocyte perturbation assay
    model_systems:
    - name: Human SCO2-mutant iPSC-derived cardiomyocytes
      description: >-
        Cardiomyocytes differentiated from patient-derived or gene-edited human
        iPSCs carrying SCO2 variants, preserving human cardiac bioenergetic
        biology not captured by viable Sco2 mouse models.
      experimental_model_type: OTHER
  evidence:
  - reference: PMID:19837698
    reference_title: "Analysis of mouse models of cytochrome c oxidase deficiency owing to mutations in Sco2."
    supports: SUPPORT
    evidence_source: MODEL_ORGANISM
    snippet: "Whereas homozygous KO mice were embryonic lethals, homozygous KI and compound heterozygous KI/KO mice were viable, but had muscle weakness; biochemically, they had respiratory chain deficiencies as well as complex IV assembly defects in multiple tissues."
    explanation: Documents that faithful Sco2 mouse models are either embryonic lethal or viable with myopathy/biochemical defects but without the human cardiomyopathy, defining the human-model mismatch.
