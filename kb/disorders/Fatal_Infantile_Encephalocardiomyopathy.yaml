name: Fatal Infantile Encephalocardiomyopathy
category: Mendelian
creation_date: "2026-06-30T00:00:00Z"
synonyms:
- Fatal infantile COX deficiency
- Fatal infantile cardioencephalomyopathy due to cytochrome c oxidase deficiency
- Fatal infantile cytochrome c oxidase deficiency
- Cardioencephalomyopathy, fatal infantile, due to COX deficiency
description: >
  Fatal infantile encephalocardiomyopathy is an ultra-rare, autosomal recessive
  mitochondrial disease defined by isolated cytochrome c oxidase (COX, respiratory
  chain Complex IV) deficiency presenting in the neonatal period or early infancy
  with the combination of hypertrophic cardiomyopathy and encephalopathy, together
  with muscular hypotonia and lactic acidosis, and leading to death in infancy.
  It is most often caused by biallelic loss-of-function variants in nuclear-encoded
  COX assembly factors, classically SCO2 (a copper-delivery metallochaperone that
  builds the CuA center of COX2) and COX15 (heme A synthase); rarer causes include
  SCO1. The recurrent SCO2 p.E140K allele is present on at least one allele in
  nearly all reported cases and acts as a founder/hotspot allele in Central
  European populations, with genotype determining onset and survival. The disorder
  conforms to the conserved Complex IV assembly deficiency mechanism, in which a
  block in terminal electron transfer collapses oxidative ATP synthesis and
  produces energy failure in high-demand cardiac and neural tissue.
