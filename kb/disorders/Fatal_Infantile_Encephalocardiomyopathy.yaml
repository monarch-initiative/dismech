  evidence:
  - reference: PMID:10545952
    reference_title: "Fatal infantile cardioencephalomyopathy with COX deficiency and mutations in SCO2, a COX assembly gene."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Mammalian cytochrome c oxidase (COX) catalyses the transfer of reducing equivalents from cytochrome c to molecular oxygen and pumps protons across the inner mitochondrial membrane."
    explanation: Defines the terminal electron-transfer and proton-pumping function of COX that is lost when the enzyme is deficient.
  - reference: PMID:29193756
    reference_title: "Investigating the cardiac pathology of SCO2-mediated hypertrophic cardiomyopathy using patients induced pluripotent stem cell-derived cardiomyocytes."
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: "Mutations in SCO2 are among the most common causes of COX deficiency, resulting in reduced mitochondrial oxidative ATP production capacity, often leading to hypertrophic cardiomyopathy (HCM)."
    explanation: Patient iPSC-derived cardiomyocytes link COX deficiency to reduced oxidative ATP production capacity and hypertrophic cardiomyopathy.
  downstream:
  - target: Lactic acidosis
    causal_link_type: DIRECT
    description: Failure of oxidative ATP synthesis forces a shift to anaerobic glycolysis with pyruvate-to-lactate conversion, producing lactic acidosis.
  - target: Hypertrophic cardiomyopathy
    causal_link_type: INDIRECT_UNKNOWN_INTERMEDIATES
    description: Energy failure in cardiomyocytes drives hypertrophic remodeling and progressive cardiac failure.
  - target: Encephalopathy
    causal_link_type: INDIRECT_UNKNOWN_INTERMEDIATES
    description: The bioenergetic deficit in the central nervous system produces a progressive, Leigh-like encephalopathy.
  - target: Muscular hypotonia
    causal_link_type: INDIRECT_UNKNOWN_INTERMEDIATES
    description: Combined central and neuromuscular involvement from energy failure produces profound muscular hypotonia.
  - target: Spinal muscular atrophy-like neurogenic atrophy
    causal_link_type: INDIRECT_UNKNOWN_INTERMEDIATES
    description: Anterior horn cell / motor neuron vulnerability produces a neurogenic, SMA-like muscular atrophy.
phenotypes:
- name: Hypertrophic cardiomyopathy
  description: >
    Infantile hypertrophic cardiomyopathy is the cardinal cardiac feature,
    particularly prominent and severe in neonatal-onset cases; obstructive forms
    are reported.
  phenotype_term:
    preferred_term: Hypertrophic cardiomyopathy
    term:
