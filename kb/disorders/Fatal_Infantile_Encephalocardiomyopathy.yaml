    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "To report three unrelated infants with a distinctive phenotype of Leigh-like syndrome, neurogenic muscular atrophy, and hypertrophic obstructive cardiomyopathy."
    explanation: Documents hypertrophic (obstructive) cardiomyopathy as a core feature of SCO2-related fatal infantile encephalocardiomyopathy.
- name: Encephalopathy
