pathophysiology:
- name: Nuclear COX Assembly Factor Loss and Complex IV Biogenesis Failure
  conforms_to: "complex_iv_assembly_deficiency#Complex IV Biogenesis Failure"
  description: >
    Biallelic loss-of-function variants in a nuclear-encoded COX assembly factor
    impair biogenesis of a catalytically competent Complex IV holoenzyme, causing
    isolated COX deficiency. The two classic causes act at distinct assembly
    sub-steps: SCO2 is a copper metallochaperone required to deliver copper to the
    CuA center of the mtDNA-encoded COX2 subunit, and COX15 is heme A synthase,
    the final enzyme of heme A biosynthesis that supplies the heme a prosthetic
    group of COX. SCO1 mutations represent a rarer cause acting in the same
    copper-delivery branch.
