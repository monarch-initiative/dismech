    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "MRI and muscle morphology demonstrated an age-dependent progression of disease with predominant involvement of white matter, late appearance of basal ganglia lesions, and neurogenic muscular atrophy"
    explanation: Documents the progressive, Leigh-like encephalopathy (white matter and basal ganglia involvement) of the disorder.
