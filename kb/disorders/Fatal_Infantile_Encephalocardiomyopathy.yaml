  - preferred_term: cardiac muscle cell
    term:
      id: CL:0000746
      label: cardiac muscle cell
  biological_processes:
  - preferred_term: mitochondrial respiratory chain complex IV assembly
    term:
      id: GO:0033617
      label: mitochondrial respiratory chain complex IV assembly
    modifier: DECREASED
  - preferred_term: copper ion transport
    term:
      id: GO:0006825
      label: copper ion transport
    modifier: DECREASED
  - preferred_term: heme A biosynthetic process
    term:
      id: GO:0006784
      label: heme A biosynthetic process
    modifier: DECREASED
  evidence:
  - reference: PMID:10545952
    reference_title: "Fatal infantile cardioencephalomyopathy with COX deficiency and mutations in SCO2, a COX assembly gene."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Here we have identified mutations in the human homologue, SCO2, in three unrelated infants with a newly recognized fatal cardioencephalomyopathy and COX deficiency."
    explanation: Original identification of SCO2 assembly-gene mutations as the cause of fatal infantile cardioencephalomyopathy with COX deficiency.
  - reference: PMID:12474143
    reference_title: "Mutations in COX15 produce a defect in the mitochondrial heme biosynthetic pathway, causing early-onset fatal hypertrophic cardiomyopathy."
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: "This study establishes COX15 as an additional cause, along with SCO2, of fatal infantile, hypertrophic cardiomyopathy associated with isolated COX deficiency."
    explanation: Establishes COX15 (heme A synthase) as a second nuclear assembly-factor cause of the same fatal infantile COX-deficiency phenotype, supporting the gene-agnostic biogenesis-failure node.
  - reference: PMID:11751685
    reference_title: "Cytochrome c oxidase deficiency due to mutations in SCO2, encoding a mitochondrial copper-binding protein, is rescued by copper in human myoblasts."
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: "Studies on a yeast homolog have suggested that human Sco2 acts as a copper chaperone, transporting copper to the Cu(A) site on the Cox II subunit"
    explanation: Defines the copper-delivery sub-step (Sco2 copper chaperone to the CuA site of Cox II) whose failure underlies Complex IV biogenesis failure.
  downstream:
  - target: Impaired Terminal Electron Transfer and ATP Synthesis
    causal_link_type: DIRECT
    description: Without a mature, cofactor-loaded holoenzyme, the terminal step of the respiratory chain cannot proceed.
- name: Impaired Terminal Electron Transfer and ATP Synthesis
  conforms_to: "complex_iv_assembly_deficiency#Impaired Terminal Electron Transfer and ATP Synthesis"
  description: >
    Loss of functional COX blocks transfer of electrons from reduced cytochrome c
    to molecular oxygen and abolishes the associated proton pumping across the
    inner mitochondrial membrane, collapsing the proton-motive force and oxidative
    ATP synthesis. The bioenergetic deficit is most severe in cardiac and skeletal
    muscle, where enzymatic COX deficiency is greatest.
  cell_types:
  - preferred_term: cardiac muscle cell
    term:
      id: CL:0000746
      label: cardiac muscle cell
  biological_processes:
  - preferred_term: mitochondrial electron transport, cytochrome c to oxygen
    term:
