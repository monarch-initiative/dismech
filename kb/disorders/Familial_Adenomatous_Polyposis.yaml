name: Familial Adenomatous Polyposis
creation_date: '2026-01-26T02:55:13Z'
updated_date: '2026-05-08T23:53:01Z'
description: >-
  Familial adenomatous polyposis (FAP) is an autosomal dominant hereditary cancer
  syndrome caused by germline pathogenic variants in the APC tumor suppressor gene.
  It is characterized by the development of hundreds to thousands of adenomatous
  polyps in the colon and rectum, with virtually 100% lifetime risk of colorectal
  cancer if untreated. FAP exemplifies the adenoma-carcinoma sequence and the role
  of Wnt/β-catenin pathway dysregulation in colorectal tumorigenesis. Extracolonic
  manifestations include desmoid tumors, duodenal adenomas, osteomas (Gardner syndrome),
  and congenital hypertrophy of the retinal pigment epithelium (CHRPE).
categories:
- Hereditary Cancer Syndrome
- Cancer Predisposition Syndrome
- Polyposis Syndrome
parents:
- hereditary cancer-predisposing syndrome
has_subtypes:
- name: Classic FAP
  description: >-
    Characterized by >100 colorectal adenomatous polyps, typically appearing in
    adolescence with polyposis by age 20-30. Without prophylactic colectomy,
    colorectal cancer develops by age 40 on average. Caused by mutations in the
    mutation cluster region (MCR) of APC.
  evidence:
  - reference: PMID:28668823
    reference_title: "Desmoid Tumors in Familial Adenomatous Polyposis."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "It is characterized by the presence of hundreds of colonic polyps, which have a high tendency to undergo malignant transformation."
    explanation: >-
      Establishes the classic FAP phenotype as hundreds of colonic polyps
      with high malignant transformation potential.
- name: Attenuated FAP (AFAP)
  description: >-
    Milder phenotype with fewer polyps (10-100), later onset of polyposis,
    right-sided colon predominance, and delayed colorectal cancer risk (average
    age 50-55). Associated with mutations at the 5' or 3' ends of APC or in
    the alternatively spliced region of exon 9.
- name: Gardner Syndrome
  description: >-
    FAP variant with prominent extracolonic manifestations including osteomas
    (especially mandible and skull), epidermoid cysts, desmoid tumors, and
    dental abnormalities. Historically considered separate but now recognized
    as FAP with variable expressivity.
mechanistic_hypotheses:
- hypothesis_group_id: canonical_apc_wnt_betacatenin_polyp_carcinoma_model
  hypothesis_label: Canonical APC / Wnt-β-Catenin / Polyp-to-Carcinoma Model
  status: CANONICAL
  description: >-
    Familial adenomatous polyposis (FAP) is caused by germline heterozygous loss-of-function variants in
    APC on 5q22.2 encoding the adenomatous polyposis coli tumor suppressor. APC normally serves as a
    scaffold in the β-catenin destruction complex (with Axin, GSK-3β, CK1) targeting β-catenin for
    ubiquitin-proteasomal degradation. Biallelic APC inactivation (germline + somatic 'second hit')
    stabilizes cytoplasmic β-catenin, allowing nuclear translocation and TCF/LEF-dependent transcription
    of pro-proliferative targets (MYC, CCND1, LGR5), initiating colorectal adenoma formation throughout
    the colon. Sequential acquisition of KRAS, TP53, and SMAD4 mutations follows the Vogelstein adenoma-
    carcinoma progression model, producing virtually 100% CRC risk by age 40 in classic FAP without
    intervention. Prophylactic colectomy is the standard of care; mouse Apc^Min/+ models recapitulate
    intestinal polyposis and validate the Wnt-axis as the canonical initiating lesion.
  notes: >-
    Retained as CANONICAL with mechanistic qualifications.
    The 2026 openscientist hypothesis-search report
    (kb/hypotheses/Familial_Adenomatous_Polyposis/canonical_apc_wnt_betacatenin_polyp_carcinoma_model)
    finds SUPPORTED. The core APC-loss → β-catenin
    stabilization → TCF/LEF-dependent proliferation → adenoma
    cascade is validated by biochemical reconstitution, near-100%
    untreated lifetime CRC risk, Apc^Min/+ mouse polyposis, and
    convergent APC/CTNNB1 mutations in extracolonic tumors
    (desmoids, thyroid, salivary). Three qualifications: (1) the
    'just-right' signaling model — second APC hits are non-
    randomly selected to produce OPTIMAL (not maximal) Wnt
    activation; truncating mutations after the SAMP-repeats are
    favored, producing intermediate β-catenin levels that maximize
    transformation; (2) APC has Wnt-independent tumor-suppressive
    functions including chromosomal instability regulation, DNA
    replication control, and cytoskeletal/microtubule regulation,
    explaining why complete APC loss often differs from CTNNB1
    activation; (3) some colorectal cancer contexts show lack of
    correlation between APC mutation and β-catenin nuclear
    localization, challenging the assumption that Wnt activation
    is the sole mechanistic output of APC loss. ClinGen formally
    curated APC-FAP as DEFINITIVE.
  evidence:
  - reference: PMID:28668823
    reference_title: "Familial adenomatous polyposis."
    supports: SUPPORT
    evidence_source: OTHER
    snippet: "It is characterized by the presence of hundreds of colonic polyps, which have a high tendency to undergo malignant transformation."
    explanation: >
      Existing canonical mechanism citation in the dismech
      knowledge base, used as the seed for the hypothesis-search
      deep-research run.
pathophysiology:
- name: APC Tumor Suppressor Loss
  description: >-
    Germline heterozygous APC mutations result in one functional allele. Somatic
    loss or mutation of the remaining wild-type allele (second hit) eliminates
    APC function, initiating adenoma formation. This follows Knudson's two-hit
    hypothesis for tumor suppressor gene inactivation.
