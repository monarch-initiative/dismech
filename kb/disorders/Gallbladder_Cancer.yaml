    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      On October 31, 2023, the FDA approved pembrolizumab in combination with cisplatin
      and gemcitabine for the same indication.
    explanation: >-
      FDA approval summary documents pembrolizumab plus gemcitabine-cisplatin as a
      second checkpoint-inhibitor first-line option for biliary tract cancer.
  - reference: DOI:10.1158/1078-0432.CCR-24-0517
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      In the KEYNOTE-966 trial, the median OS of patients receiving pembrolizumab was
      12.7 months (95% CI, 11.5–13.6) and 10.9 months (95% CI, 9.9–11.6) in patients
      receiving placebo [HR, 0.83 (95% CI, 0.72–0.95)].
    explanation: >-
      KEYNOTE-966 demonstrated a statistically significant overall survival benefit for
      adding pembrolizumab to gemcitabine-cisplatin.
- name: HER2 (ERBB2)-Targeted Therapy
  description: >-
    For the subset of gallbladder cancers with HER2 (ERBB2) amplification or activating
    mutation, HER2-directed therapy (e.g., trastuzumab-based regimens and HER2 antibody
    approaches) targets the ERBB/RTK-RAS driver program. This is part of the rationale
    for routine molecular testing in GBC to enable genome-guided therapy.
  treatment_term:
