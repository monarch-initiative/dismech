treatments:
- name: Radical Cholecystectomy
  description: >-
    Radical (extended) cholecystectomy with hepatic resection of the gallbladder fossa
    and regional lymphadenectomy is the only potentially curative treatment for
    gallbladder cancer. It is feasible in a minority of patients because most present
    with advanced, unresectable disease; for incidentally discovered early tumors,
    completion radical re-resection is considered when residual disease is suspected.
  treatment_term:
    preferred_term: cholecystectomy
    term:
      id: NCIT:C51676
      label: Cholecystectomy
  therapeutic_modality: SURGERY
- name: Gemcitabine-Cisplatin plus Durvalumab (TOPAZ-1)
  description: >-
    First-line immuno-chemotherapy combining gemcitabine and cisplatin with the
    anti-PD-L1 checkpoint inhibitor durvalumab for unresectable or metastatic biliary
    tract cancer, established by the TOPAZ-1 trial and FDA approved 2022-09-02.
    Gallbladder primaries appear to derive less benefit than other biliary tract sites.
  treatment_term:
    preferred_term: Pharmacotherapy
    term:
      id: NCIT:C15986
      label: Pharmacotherapy
    therapeutic_agent:
    - preferred_term: durvalumab
      term:
        id: NCIT:C103194
        label: Durvalumab
    - preferred_term: gemcitabine
      term:
        id: CHEBI:175901
        label: gemcitabine
    - preferred_term: cisplatin
      term:
        id: CHEBI:27899
        label: cisplatin
  therapeutic_modality: MONOCLONAL_ANTIBODY
  evidence:
  - reference: DOI:10.1158/1078-0432.CCR-24-0517
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      On September 2, 2022, the Food and Drug Administration (FDA) approved durvalumab
      in combination with cisplatin and gemcitabine, for the treatment of patients with
      unresectable or metastatic biliary tract cancers (BTC).
    explanation: >-
      FDA approval summary documents durvalumab plus gemcitabine-cisplatin as first-line
      therapy for unresectable/metastatic biliary tract cancer including gallbladder
      cancer.
  - reference: DOI:10.1158/1078-0432.CCR-24-0517
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      In the TOPAZ-1 trial, the median OS of patients receiving durvalumab was 12.8
      months [95% confidence interval (CI), 11.1–14.0] and 11.5 months (95% CI,
      10.1–12.5) in patients receiving placebo [hazard ratio (HR), 0.80 (95% CI,
      0.66–0.97)].
    explanation: >-
      TOPAZ-1 demonstrated a statistically significant overall survival benefit for
      adding durvalumab to gemcitabine-cisplatin.
  - reference: DOI:10.1002/ueg2.12656
    supports: PARTIAL
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      While extrahepatic and intrahepatic BTC showed similar outcomes, mOS was
      significantly shorter in patients with gall bladder cancer (GB‐CA) with 9 months
      (95% CI 5.5–12.4; p = 0.02).
    explanation: >-
      Real-world cohort confirms feasibility of gemcitabine-cisplatin-durvalumab but
      shows gallbladder cancer is an independent adverse prognostic factor with shorter
      survival than other biliary tract cancers.
