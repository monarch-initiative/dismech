    typically preceded by biliary intraepithelial neoplasia (dysplasia).
- name: Papillary
  display_name: Papillary Adenocarcinoma
  description: >-
    A papillary/intracystic papillary variant of gallbladder adenocarcinoma that
    grows as exophytic intraluminal fronds. It tends to present at an earlier stage
    and carries a relatively more favorable prognosis than the NOS pattern. No exact
    gallbladder-specific papillary adenocarcinoma NCIT term was identified.
