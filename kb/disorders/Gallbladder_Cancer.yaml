biochemical:
- name: CA 19-9
  notes: >-
    Carbohydrate antigen 19-9 (CA 19-9) is the most widely used serum tumor marker in
    gallbladder cancer and is associated with prognosis and resectability, though it
    lacks the sensitivity and specificity required for screening. Used together with
    CEA for monitoring.
- name: Carcinoembryonic Antigen (CEA)
  notes: >-
    CEA may be elevated in gallbladder cancer and is used as an adjunct tumor marker
    alongside CA 19-9 for prognostication and monitoring, although it is nonspecific.
