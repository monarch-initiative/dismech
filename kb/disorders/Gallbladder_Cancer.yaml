- name: Systemic Chemotherapy (Gemcitabine-Cisplatin backbone)
  description: >-
    Gemcitabine plus cisplatin has been the chemotherapy backbone for advanced biliary
    tract cancer for over a decade and remains the foundation upon which checkpoint
    inhibitors are added. Adjuvant chemotherapy is used in selected resected patients.
