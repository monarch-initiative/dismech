name: Gallbladder Cancer
creation_date: "2026-06-17T00:00:00Z"
description: >-
  Gallbladder cancer (GBC) is an aggressive epithelial malignancy of the biliary
  tract, most commonly adenocarcinoma arising from the gallbladder mucosa. It is
  frequently detected late because early disease is asymptomatic or produces only
  nonspecific symptoms, contributing to poor outcomes and limited curative options.
  GBC has marked geographic variation, with high incidence in India, Argentina, Chile,
  Japan, and parts of Asia and South America, and a roughly two-fold higher
  age-standardized incidence in females than males. The dominant carcinogenic driver
  is chronic biliary inflammation, most often from cholelithiasis (gallstones), with
  additional contributions from chronic cholecystitis, porcelain gallbladder, anomalous
  pancreaticobiliary junction, chronic Salmonella Typhi infection, obesity/high BMI,
  and tobacco exposure. The inflammation-driven dysplasia-carcinoma sequence accumulates
  somatic driver alterations in the RTK-RAS (including ERBB2/ERBB3/KRAS), WNT (CTNNB1,
  AXIN1), TP53, and PI3K-AKT pathways, alongside SMAD4 and CDKN2A loss. A subset harbors
  HER2 (ERBB2) amplification/mutation that is therapeutically targetable. The tumor
  microenvironment is immunosuppressive, with OLFM4-driven PD-L1 upregulation
  facilitating immune evasion. Radical cholecystectomy is the only potentially curative
  therapy, but fewer than a third of patients are resectable at presentation; gemcitabine
  plus cisplatin with the immune checkpoint inhibitor durvalumab (TOPAZ-1) or
  pembrolizumab (KEYNOTE-966) is the current first-line standard for unresectable or
  metastatic disease, though gallbladder primaries tend to derive less benefit than
  other biliary tract cancers.
categories:
- Gastrointestinal Cancer
- Hepatobiliary Cancer
