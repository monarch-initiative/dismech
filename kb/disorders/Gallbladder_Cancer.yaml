      label: Gallbladder Adenosquamous Carcinoma
  description: >-
    A more aggressive variant containing both glandular (adenocarcinoma) and squamous
    components; pure gallbladder squamous cell carcinoma (NCIT:C9170) is rarer and also
    carries a poor prognosis.
