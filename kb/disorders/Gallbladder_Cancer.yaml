    snippet: >-
      Our findings focused on the eight most altered genes with pathogenic and
      oncogenic mutations: TP53, SMAD4, ERBB3, KRAS, ARID1A, PIK3CA, RB1, and AXIN1.
      Genes with pathogenic single nucleotide variations (SNVs) were enriched in
      oncogenic signaling pathways, particularly RTK-RAS, WNT, and TP53 pathways.
    explanation: >-
      Whole-exome sequencing of 66 GBC tumors defines the recurrent driver genes and
      identifies RTK-RAS, WNT, and TP53 as the dominant altered oncogenic pathways.
  - reference: DOI:10.1097/JS9.0000000000002031
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      our research related certain mutational signatures, such as cosmic 1, cosmic 6,
      and cosmic 18, 29, to known characteristics including patient age and tobacco
      smoking, providing important insights into disease etiology.
    explanation: >-
      Mutational signature analysis links GBC driver alterations to patient age and
      tobacco exposure, connecting environmental risk to the somatic mutational
      landscape.
  downstream:
  - target: Immunosuppressive Microenvironment and Immune Evasion
    description: >-
      Oncogenic epithelial programs remodel the tumor microenvironment toward an
      immunosuppressive, immune-evasive state.
- name: Immunosuppressive Microenvironment and Immune Evasion
  description: >-
    Single-cell transcriptomic profiling of gallbladder cancer reveals a suppressive
    immune microenvironment with dysfunctional T cells and tumor-associated macrophage
    infiltration. The epithelial regulator olfactomedin 4 (OLFM4) is elevated in GBC
    epithelial cells and is associated with worse prognosis; mechanistically, OLFM4
    upregulates programmed death-ligand 1 (PD-L1) expression through the MAPK-AP1 axis,
    enabling tumor cells to evade immune clearance. This immune-evasive state
    underlies the rationale for combining immune checkpoint inhibitors with
    chemotherapy.
