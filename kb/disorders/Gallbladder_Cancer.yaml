  evidence:
  - reference: DOI:10.5306/wjco.v15.i6.695
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Gallbladder cancer (GBC) is one of the commonest biliary malignancies seen in
      India, Argentina, and Japan. The disease has dismal outcome as it is detected
      quite late due to nonspecific symptoms and signs.
    explanation: >-
      Establishes GBC as an aggressive biliary malignancy with poor outcomes from late
      detection; chronic biliary inflammation in high-incidence regions is the dominant
      carcinogenic context.
  - reference: DOI:10.3389/fmed.2024.1384314
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      High BMI is the primary risk factors underlying gallbladder and biliary tract
      cancer, accounted for 15.2% of deaths and 15.7% DALYs globally in 2019.
    explanation: >-
      GBD 2019 analysis quantifies high BMI (a metabolic-inflammatory risk) as a major
      attributable driver of gallbladder and biliary tract cancer burden.
  downstream:
  - target: Accumulation of Oncogenic Driver Alterations
    description: >-
      Repeated injury-repair cycles and oxidative DNA damage promote accumulation of
      somatic driver mutations in gallbladder epithelium.
- name: Accumulation of Oncogenic Driver Alterations
  description: >-
    Whole-exome sequencing of gallbladder tumors identifies recurrent pathogenic and
    oncogenic alterations concentrated in a small set of driver genes and signaling
    programs. The eight most altered genes are TP53, SMAD4, ERBB3, KRAS, ARID1A,
    PIK3CA, RB1, and AXIN1, with pathogenic variants enriched in the RTK-RAS, WNT, and
    TP53 pathways. TP53 loss-of-function disables cell-cycle checkpoints and apoptotic
    responses, KRAS/ERBB-driven RTK-RAS signaling and PI3K-AKT activation drive
    proliferation and survival, and WNT/beta-catenin activation (CTNNB1, AXIN1)
    sustains the malignant phenotype. Mutational signatures link a subset of these
    alterations to patient age and tobacco exposure.
