  evidence:
  - reference: DOI:10.1136/gutjnl-2023-331773
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: >-
      our study identified elevated olfactomedin 4 (OLFM4) in epithelial cells as a
      central player in GBC progression. OLFM4 was related to T-cell malfunction and
      tumour-associated macrophage infiltration, leading to a worse prognosis in GBC.
    explanation: >-
      Single-cell atlas of 230,737 cells identifies OLFM4 as an epithelial driver of an
      immunosuppressive microenvironment associated with worse GBC prognosis.
  - reference: DOI:10.1136/gutjnl-2023-331773
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: >-
      Further investigations revealed that OLFM4 upregulated programmed death-ligand 1
      (PD-L1) expression through the MAPK-AP1 axis, facilitating tumour cell immune
      evasion.
    explanation: >-
      Defines the OLFM4 to PD-L1 (via MAPK-AP1) mechanism of immune evasion, providing
      the mechanistic rationale for checkpoint inhibition.
- name: Invasion and Metastasis
  description: >-
    Gallbladder cancer progresses through loss of epithelial cell adhesion and
    acquisition of a migratory, invasive phenotype, with frequent early spread to
    adjacent liver segments and regional lymph nodes. Proteomic profiling identifies
    Carcinoembryonic Antigen-related Cell Adhesion Molecule 6 (CEACAM6) as
    significantly upregulated in GBC, where it decreases cell adhesion and promotes
    migration and invasion through integrin beta-1 (ITGB1) and protein kinase C delta
    (PRKCD) partners and downstream AKT/ERK signaling.
  cell_types:
  - preferred_term: gallbladder epithelial cell
    term:
      id: CL:1000415
      label: epithelial cell of gallbladder
