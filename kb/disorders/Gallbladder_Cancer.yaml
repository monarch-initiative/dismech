pathophysiology:
- name: Chronic Biliary Inflammation
  description: >-
    Chronic inflammation of the gallbladder mucosa, most commonly driven by
    cholelithiasis (gallstones) and chronic cholecystitis, but also by porcelain
    gallbladder, anomalous pancreaticobiliary junction, and chronic Salmonella Typhi
    infection, produces repeated cycles of epithelial injury and repair. Persistent
    inflammation and bile-acid exposure cause oxidative stress and DNA damage in
    gallbladder epithelial cells, creating the selective pressure that initiates
    malignant transformation. Metabolic risk (obesity/high BMI) further shapes
    incidence.
