  - preferred_term: CEACAM6
    term:
      id: NCIT:C107471
      label: Carcinoembryonic Antigen-Related Cell Adhesion Molecule 6
  biological_processes:
  - preferred_term: epithelial cell proliferation
    modifier: INCREASED
    term:
      id: GO:0050673
      label: epithelial cell proliferation
  locations:
  - preferred_term: gallbladder
    term:
      id: UBERON:0002110
      label: gallbladder
  evidence:
  - reference: DOI:10.1038/s41419-024-07171-x
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: >-
      Our functional analyses in vitro and in vivo mouse models revealed that CEACAM6
      supported the initial steps of cancer progression and metastasis by decreasing
      cell adhesion and promoting migration and invasion of GBC cells.
    explanation: >-
      Functional proteomic study shows CEACAM6 drives GBC invasion and metastasis by
      reducing adhesion and promoting migration.
  - reference: DOI:10.1038/s41419-024-07171-x
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: >-
      ERK and AKT signaling and their downstream target genes were regulated by
      CEACAM6 and thus the treatment with AKT inhibitor capivasertib or ERK inhibitor
      ulixertinib mitigated the CEACAM6-induced migration.
    explanation: >-
      Identifies AKT/ERK signaling downstream of CEACAM6 as the mechanism driving GBC
      migration and a potential therapeutic vulnerability.
