pathophysiology:
- name: FGFR1 gain-of-function signaling in bone
  description: >-
    Gain-of-function mutations in FGFR1 cause constitutive receptor activation
    affecting both craniofacial and appendicular skeletal development. This leads to
    premature cranial suture fusion, impaired endochondral ossification with
    rhizomelic limb shortening, and aberrant fibrous tissue formation in
    metaphyseal bone producing the characteristic nonossifying fibrous lesions.
  gene:
    preferred_term: FGFR1
    description: Fibroblast growth factor receptor 1, constitutively activated by gain-of-function mutations in osteoglophonic dysplasia.
    modifier: INCREASED
