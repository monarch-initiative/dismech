name: Triphalangeal_Thumb_Polysyndactyly
creation_date: '2026-04-04T00:00:00Z'
updated_date: '2026-04-06T02:14:15Z'
description: >-
  Triphalangeal thumb-polysyndactyly syndrome (TPT-PS) is an autosomal dominant
  limb malformation caused by regulatory variants in or near the zone of
  polarizing activity regulatory sequence (ZRS), a long-range limb-specific
  enhancer of the Sonic Hedgehog (SHH) gene located approximately 1 Mb upstream
  within intron 5 of LMBR1. Point mutations and microduplications in the ZRS
  cause ectopic anterior SHH expression in the developing limb bud, disrupting
  normal anterior-posterior limb patterning. This gain-of-function regulatory
  mechanism is fundamentally distinct from the loss-of-function SHH mutations
  that cause holoprosencephaly. The phenotypic spectrum includes triphalangeal
  thumbs, preaxial polydactyly, and syndactyly with variable expressivity and
  incomplete penetrance.
category: Genetic
parents:
- Congenital Disorder
- Limb Malformation
