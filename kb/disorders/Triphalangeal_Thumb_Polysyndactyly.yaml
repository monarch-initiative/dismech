genetic:
- name: ZRS regulatory variants causing ectopic SHH expression
  gene_term:
    preferred_term: SHH
    term:
      id: hgnc:10848
      label: SHH
  association: Causative
  features: >-
    Point mutations and microduplications in the ZRS (zone of polarizing
    activity regulatory sequence), a conserved enhancer in LMBR1 intron 5
    that controls limb-specific SHH expression. Mutations cause ectopic
    anterior SHH expression in the developing limb bud, a gain-of-function
    regulatory mechanism. More than 15 families with ZRS mutations have been
    reported. Variable penetrance and expressivity are observed, with some
    mutations showing genotype-phenotype correlations based on position
    within the ZRS.
  evidence:
  - reference: PMID:17152067
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Spatio-temporal expression of sonic hedgehog (SHH) is driven by a
      regulatory element (ZRS) that lies 1 Mb upstream from SHH.
    explanation: >-
      Identifies the ZRS as the regulatory element controlling SHH
      expression and reports novel point mutations in three families with
      triphalangeal thumb and preaxial polydactyly.
  - reference: PMID:18463159
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      A locus for triphalangeal thumb, variably associated with pre-axial
      polydactyly, was previously identified in the zone of polarizing
      activity regulatory sequence (ZRS), a long range limb-specific
      enhancer of the Sonic Hedgehog (SHH) gene at human chromosome 7q36.3.
    explanation: >-
      Identifies the ZRS at chromosome 7q36.3 as the regulatory locus
      underlying triphalangeal thumb and preaxial polydactyly in human
      families.
  - reference: PMID:35821352
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: >-
      This rare congenital limb anomaly is generally caused by
      microduplications encompassing the Sonic Hedgehog (SHH) limb enhancer,
      termed the zone of polarizing activity (ZPA) regulatory sequence (ZRS).
    explanation: >-
      Establishes that TPT-PS is generally caused by microduplications
      encompassing the ZRS enhancer, providing the genetic context for
      this locus.
  variants:
  - name: ZRS point mutations
    description: >-
      Multiple point mutations within the 774-bp conserved ZRS element
      alter transcription factor binding sites, causing ectopic anterior
      SHH expression in the developing limb.
    evidence:
    - reference: PMID:17152067
      supports: SUPPORT
      evidence_source: HUMAN_CLINICAL
      snippet: >-
        Mutations within ZRS appear to be a common cause of familial
        triphalangeal thumb and preaxial polydactyly.
  - name: pZRS point mutation
    description: >-
      A pathogenic variant in the pre-ZRS (pZRS), a conserved sequence
      near the ZRS, causes increased interactions within the SHH regulatory
      domain (SHH-LMBR1 TAD).
    evidence:
    - reference: PMID:35821352
      supports: SUPPORT
      evidence_source: IN_VITRO
      snippet: >-
        The results of 4C-seq experiments revealed increased interactions
        within the whole SHH regulatory domain (SHH-LMBR1 TAD) in the
        patient compared to controls.
phenotypes:
- category: Musculoskeletal
  name: Triphalangeal Thumb
  description: >-
    Thumb contains three phalanges instead of the normal two, resembling
    a finger. May be unilateral or bilateral.
  phenotype_term:
    preferred_term: Triphalangeal thumb
    term:
      id: HP:0001199
      label: Triphalangeal thumb
  evidence:
  - reference: PMID:17152067
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Four North American Caucasian families were identified with autosomal
      dominant triphalangeal thumb.
    explanation: >-
      Triphalangeal thumb is the primary phenotype in families with ZRS
      mutations.
  - reference: PMID:18463159
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      We found this variant in three independently ascertained probands from
      southern England with triphalangeal thumb, demonstrated significant
      linkage of the phenotype to the variant (LOD = 4.1)
    explanation: >-
      Significant linkage of triphalangeal thumb to ZRS variant with LOD 4.1.
- category: Musculoskeletal
  name: Preaxial Polydactyly
  description: >-
    Extra digits on the radial (thumb) side of the hand, reflecting
    ectopic anterior SHH signaling in the limb bud.
  phenotype_term:
    preferred_term: Preaxial hand polydactyly
    term:
      id: HP:0001177
      label: Preaxial hand polydactyly
  evidence:
  - reference: PMID:24777739
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Although most mutations cause preaxial polydactyly (PPD),
      triphalangeal thumb (TPT) or both, a mutation in position 404 of the
      ZRS causes more severe Werner mesomelic syndrome (WMS)
    explanation: >-
      Preaxial polydactyly is a common manifestation of ZRS mutations.
  - reference: PMID:20068592
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: >-
      This finding supports a model in which ectopic anterior SHH expression
      in the developing limb results from abnormal binding of one or more
      transcription factors to the mutant sequence.
    explanation: >-
      Mechanistically links ZRS mutations to ectopic SHH expression causing
      preaxial polydactyly.
- category: Musculoskeletal
  name: Syndactyly
  description: >-
    Fusion of digits, variably present in TPT-PS families.
  phenotype_term:
    preferred_term: Syndactyly
    term:
      id: HP:0001159
      label: Syndactyly
pathophysiology:
- name: Ectopic Anterior SHH Expression
  description: >-
    Point mutations or microduplications in the ZRS enhancer cause
    gain-of-function ectopic expression of SHH in the anterior limb bud
    mesenchyme. Normally SHH is restricted to the zone of polarizing
    activity (ZPA) in the posterior limb bud; ectopic anterior expression
    disrupts the morphogen gradient that specifies digit identity along
    the anterior-posterior axis.
  biological_processes:
  - preferred_term: Embryonic limb morphogenesis
    term:
      id: GO:0030326
      label: embryonic limb morphogenesis
  - preferred_term: Anterior/posterior pattern specification
    term:
      id: GO:0009952
      label: anterior/posterior pattern specification
  - preferred_term: Smoothened signaling pathway
    term:
      id: GO:0007224
      label: smoothened signaling pathway
    modifier: INCREASED
  locations:
  - preferred_term: limb bud
    term:
      id: UBERON:0004347
      label: limb bud
  evidence:
  - reference: PMID:18463159
    supports: SUPPORT
    evidence_source: MODEL_ORGANISM
    snippet: >-
      we utilized a mutated ZRS construct to demonstrate that it can drive
      ectopic anterior expression of a reporter gene in the developing mouse
      forelimb.
    explanation: >-
      Direct experimental demonstration that ZRS mutations drive ectopic
      anterior SHH expression in the developing limb.
  - reference: PMID:20068592
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: >-
      Electrophoretical mobility shift assay demonstrated a marked difference
      between wild-type and the mutant probe, which uniquely bound one or
      several transcription factors extracted from Caco-2 cells.
    explanation: >-
      ZRS mutations alter transcription factor binding, providing a
      molecular mechanism for ectopic enhancer activity.
  downstream:
  - target: Disrupted Anterior-Posterior Limb Patterning
- name: Disrupted Anterior-Posterior Limb Patterning
  description: >-
    Ectopic anterior SHH creates a mirror-image morphogen gradient in the
    limb bud, leading to duplication of posterior digit identities on the
    anterior (radial) side. This produces supernumerary preaxial digits
    and conversion of the two-phalanx thumb to a three-phalanx
    finger-like digit.
  locations:
  - preferred_term: hand
    term:
      id: UBERON:0002398
      label: manus
  evidence:
  - reference: PMID:24777739
    supports: SUPPORT
    evidence_source: MODEL_ORGANISM
    snippet: >-
      A mouse transgenic enhancer assay shows that this mutation causes an
      expansion of the enhancer's expression domain in the developing mouse
      limb, confirming its pathogenicity.
    explanation: >-
      Expansion of enhancer expression domain confirms disrupted
      anterior-posterior patterning in vivo.
- name: ZRS Dosage Effect
  description: >-
    Some ZRS mutations show a dosage effect where homozygous individuals
    display more severe phenotypes (Werner mesomelic syndrome) than
    heterozygotes (preaxial polydactyly and triphalangeal thumb),
    suggesting that the degree of ectopic SHH expression correlates with
    phenotypic severity.
  evidence:
  - reference: PMID:24777739
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      The homozygous phenotype for this mutation, WMS, is more severe than
      the numerous heterozygous individuals genotyped from both families who
      have TPT and PPD.
    explanation: >-
      Homozygosity for ZRS mutation 402C>T causes Werner mesomelic syndrome,
      more severe than heterozygous TPT/PPD, demonstrating dosage effect.
notes: >-
  The mechanism of TPT-PS is fundamentally distinct from SHH-related
  holoprosencephaly. HPE results from loss of SHH function affecting forebrain
  and midline development, whereas TPT-PS results from gain of ectopic SHH
  expression specifically in the anterior limb bud due to regulatory variants
  in the ZRS enhancer.
