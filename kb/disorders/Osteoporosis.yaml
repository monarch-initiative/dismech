disease_term:
  preferred_term: osteoporosis
  term:
    id: MONDO:0005298
    label: osteoporosis
pathophysiology:
- name: Bone Remodeling Imbalance
  description: >
    Increased osteoclast-mediated bone resorption relative to osteoblast-
    mediated bone formation leads to net bone loss. This imbalance
    accelerates with aging and estrogen deficiency.
  cell_types:
  - preferred_term: Osteoclast
    term:
      id: CL:0000092
      label: osteoclast
  - preferred_term: Osteoblast
    term:
      id: CL:0000062
      label: osteoblast
  biological_processes:
  - preferred_term: Bone Remodeling
    term:
      id: GO:0046849
      label: bone remodeling
  evidence:
  - reference: PMID:21874760
    supports: SUPPORT
    snippet: "aromatase activity and estrogen production are necessary for longitudinal
      bone growth, attainment of peak bone mass, the pubertal growth spurt, epiphyseal
      closure, and normal bone remodeling in young individuals."
    explanation: Demonstrates that estrogen, produced by aromatase, is essential
      for normal bone remodeling and that deficiency leads to bone loss
  - reference: PMID:23748068
    supports: SUPPORT
    snippet: "Estrogen deficiency can induce delayed epiphyseal closure, eunuchoid
      body habitus, osteopenia, and osteoporosis in both genders."
    explanation: Clinical evidence showing that estrogen deficiency directly
      causes osteoporosis through impaired bone remodeling
- name: RANKL/OPG Dysregulation
  description: >
    Increased RANKL and decreased osteoprotegerin (OPG) ratio promotes
    osteoclast differentiation and activation. Estrogen normally
    suppresses RANKL and increases OPG. Microgravity further exacerbates
    this imbalance by directly increasing the osteoblast RANKL/OPG ratio.
  biological_processes:
  - preferred_term: Osteoclast Differentiation
    term:
      id: GO:0030316
      label: osteoclast differentiation
  evidence:
  - reference: PMID:33692806
    supports: SUPPORT
    snippet: "The differentiation of osteoclasts is induced significantly in the presence
      of IL-17 either directly (207), or indirectly, through upregulation of RANKL."
    explanation: Demonstrates that RANKL upregulation is a key mechanism for
      osteoclast differentiation and bone resorption
  - reference: PMID:21874760
    supports: SUPPORT
    snippet: "with aging, individual differences in aromatase activity and thus in
      estrogen levels may significantly affect bone loss and fracture risk in both
      genders."
    explanation: Shows that age-related decline in estrogen production affects
      bone metabolism, linking to RANKL/OPG dysregulation
  - reference: PMID:16927271
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: "microgravity is capable to indirectly stimulate osteoclast formation
      and activity by regulating osteoblast secretion of crucial regulatory factors
      such as RANKL and OPG"
    explanation: Simulated microgravity using NASA Rotating Wall Vessel increases
      osteoblast RANKL/OPG ratio, stimulating osteoclastogenesis and bone resorption
  - reference: PMID:26318907
    supports: SUPPORT
    evidence_source: MODEL_ORGANISM
    snippet: "SF/VEH mice had lower BV/TV vs. GC/VEH mice, while SF/OPG-Fc mice
      had greater BV/TV than SF/VEH or GC/VEH"
    explanation: OPG-Fc (RANKL inhibitor) prevented spaceflight-induced bone loss
      in mice during 12-day shuttle mission, confirming RANKL pathway centrality
- name: Microarchitectural Deterioration
  description: >
    Loss of trabecular connectivity and cortical thinning compromises
    bone strength beyond what BMD alone indicates. Leads to fragility
    fractures with minimal trauma. Spaceflight accelerates this process,
    with incomplete microarchitectural recovery even one year post-flight.
  evidence:
  - reference: PMID:23748068
    supports: SUPPORT
    snippet: "recurrent bone fractures associated with minimal trauma starting in
      puberty"
    explanation: Clinical case demonstrating that estrogen deficiency leads to
      fragility fractures due to compromised bone microarchitecture
  - reference: PMID:35773442
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "nine of 17 astronauts did not fully recover tibia total BMD after
      12-months"
    explanation: HR-pQCT imaging of astronauts shows incomplete recovery of
      trabecular microarchitecture at weight-bearing tibia one year after
      long-duration spaceflight, equivalent to a decade of terrestrial bone aging
  - reference: PMID:31897866
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "bone structural quality (e.g., trabecular microarchitecture) is diminished
      and the quality of bone material is reduced via impaired tissue mineralization,
      maturation, and maintenance (e.g., mediated by osteocytes)"
    explanation: Review of spaceflight-induced bone quality changes beyond BMD,
      showing both structural and material quality are compromised in microgravity
  - reference: PMID:28572612
    supports: SUPPORT
    evidence_source: MODEL_ORGANISM
    snippet: "osteocyte death was evidenced along with a smaller and more spherical
      shape of the osteocyte lacunae because of lacunar mineralization"
    explanation: Bion-M1 one-month spaceflight caused trabecular disconnection,
      cortical thinning, and osteocyte death in mice, with no recovery at 8 days
- name: Microgravity-Induced Mechanical Unloading
  description: >
    Spaceflight removes gravitational mechanical loading on the skeleton,
    disrupting osteocyte mechanosensing and shifting the balance toward
    bone resorption. Astronauts lose approximately 1-1.5% of bone mass
    per month in weight-bearing sites, with bone resorption markers
    plateauing at 113% above pre-flight levels. Mitochondrial stress
    has been identified as a central biological hub for spaceflight impact.
  cell_types:
  - preferred_term: Osteocyte
    term:
      id: CL:0000137
      label: osteocyte
  biological_processes:
  - preferred_term: Cellular Response to Mechanical Stimulus
    term:
      id: GO:0071260
      label: cellular response to mechanical stimulus
  - preferred_term: Bone Resorption
    term:
      id: GO:0045453
      label: bone resorption
  evidence:
  - reference: PMID:32411816
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Bone loss in space travelers is a major challenge for long-duration
      space exploration."
    explanation: Meta-analysis of 148 space travelers quantifies lower limb bone
      loss rate of -0.8% per month during microgravity exposure
  - reference: PMID:32411816
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "microgravity-induced bone loss is a significant and unresolved health
      risk for space travelers"
    explanation: Bone resorption markers plateau at 113% above pre-flight levels
      with rapid onset (half-max at 11 days), confirming elevated resorption
  - reference: PMID:29559713
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "clear parallels exist between the effects of spaceflight, periods of
      immobilization and ageing, with possibly irreversible features"
    explanation: Comprehensive review establishing that spaceflight-induced bone
      changes parallel accelerated aging and may be partially irreversible
  - reference: PMID:33835498
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: "µG impairs the differentiation of osteocytes, consistent with prior
      osteoblast spaceflight experiments, which resulted in the downregulation
      of key osteocytic genes"
    explanation: Osteocyte cell line flown on ISS showed impaired differentiation
      and altered glycolysis pathways, effects not replicated by ground simulators
  - reference: PMID:33242417
    supports: SUPPORT
    evidence_source: COMPUTATIONAL
    snippet: "Overall pathway analyses on the multi-omics datasets showed significant
      enrichment for mitochondrial processes, as well as innate immunity, chronic
      inflammation, cell cycle, circadian rhythm, and olfactory functions"
    explanation: Multi-omics analysis across NASA GeneLab datasets identifies
      mitochondrial stress as central hub for spaceflight physiological impact
phenotypes:
- name: Decreased Bone Mineral Density
  category: Musculoskeletal
  frequency: VERY_FREQUENT
  diagnostic: true
  notes: T-score <= -2.5
  phenotype_term:
