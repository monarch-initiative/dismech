environmental:
- name: Estrogen Deficiency
  notes: Menopause is major risk factor
  evidence:
  - reference: PMID:21874760
    supports: SUPPORT
    snippet: "extraglandular aromatization of circulating androgen precursors is the
      major source of estrogen not only in men (since only 15% of circulating estradiol
      is released directly by the testis) but also in women after the menopause."
    explanation: Post-menopausal women rely on aromatase activity for estrogen
      production, making aromatase activity critical for bone health after
      menopause
  - reference: PMID:18567553
    supports: SUPPORT
    snippet: "studies in these unusual patients have stimulated research on defining
      the role of estrogen in regulating bone metabolism in normal adult and aging
      men, providing further insights into estrogen regulation of bone metabolism
      not only in men, but also in women."
    explanation: Demonstrates that estrogen is essential for bone metabolism in
      both sexes, with deficiency leading to osteoporosis
- name: Calcium Deficiency
  notes: Inadequate dietary intake
- name: Vitamin D Deficiency
  notes: Impairs calcium absorption
- name: Sedentary Lifestyle
  notes: Lack of weight-bearing exercise
- name: Smoking
  notes: Accelerates bone loss
  evidence:
  - reference: PMID:30631414
    supports: SUPPORT
    snippet: "tobacco smoking causes an imbalance in bone turnover, leading to lower
      bone mass and making bone vulnerable to osteoporosis and fracture"
    explanation: Review confirms that smoking causes bone turnover imbalance
      that increases osteoporosis and fracture risk.
- name: Glucocorticoid Use
  notes: Major cause of secondary osteoporosis
  evidence:
  - reference: PMID:29691807
    supports: SUPPORT
    snippet: "Glucocorticoid-induced osteoporosis is the most common secondary cause
      of osteoporosis and the resulting fractures cause significant morbidity."
    explanation: Review confirms glucocorticoid use is the leading cause of
      secondary osteoporosis.
- name: Microgravity Exposure
  notes: >
    Spaceflight-induced mechanical unloading causes 1-1.5% bone loss per
    month in weight-bearing sites. Recovery is slow and often incomplete,
    with some astronauts showing deficits equivalent to a decade of
    terrestrial aging after one year.
  evidence:
  - reference: PMID:32411816
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Bone loss in space travelers is a major challenge for long-duration
      space exploration."
    explanation: Systematic review and meta-analysis of bone loss in 148 space
      travelers documents site-dependent bone loss with lower limbs losing
      -0.8% per month
  - reference: PMID:35773442
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "nine of 17 astronauts did not fully recover tibia total BMD after
      12-months"
    explanation: HR-pQCT study showing incomplete bone recovery one year after
      spaceflight, commensurate with a decade of terrestrial age-related bone loss
  - reference: PMID:33597120
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Increases in training volume predicted preservation of tibia bone
      strength and trabecular vBMD and thickness"
    explanation: Pre-flight exercise and in-flight resistance training predict
      and partially mitigate spaceflight bone loss in astronauts
  - reference: PMID:32900939
    supports: SUPPORT
    evidence_source: MODEL_ORGANISM
    snippet: "Wild type mice lost significant muscle and bone mass during the 33 d
      spent in microgravity"
    explanation: ISS Rodent Research-19 confirmed that microgravity causes
      significant bone and muscle loss in wild-type mice
treatments:
- name: Bisphosphonates
  description: First-line antiresorptives (alendronate, risedronate, zoledronic
    acid).
  treatment_term:
    preferred_term: bisphosphonate agent therapy
    term:
      id: MAXO:0000954
      label: bisphosphonate agent therapy
  evidence:
  - reference: PMID:34807231
    supports: SUPPORT
    snippet: "The pooled meta-analysis found that 12.4 months (95% CI, 6.3-18.4 months)
      were needed to avoid 1 nonvertebral fracture per 100 postmenopausal women receiving
      bisphosphonate therapy."
    explanation: Meta-analysis of 10 RCTs with 23,384 women demonstrates
      bisphosphonate efficacy in preventing fractures.
