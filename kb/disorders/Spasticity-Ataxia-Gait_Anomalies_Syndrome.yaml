  - name: Gait Ataxia
    description: >-
      Gait impairment is a major functional manifestation of the combined
      ataxic and spastic syndrome.
    frequency: VERY_FREQUENT
    phenotype_term:
      preferred_term: gait ataxia
      term:
        id: HP:0002066
        label: Gait ataxia
