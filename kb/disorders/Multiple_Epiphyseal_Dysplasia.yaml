    causal_link_type: DIRECT
    description: >-
      Abnormal epiphyseal cartilage and joint incongruity drive early-onset
      degenerative joint disease in weight-bearing joints.
  evidence:
  - reference: PMID:40392407
    reference_title: "Recognizing multiple epiphyseal dysplasia in children presenting with joint pain: a commonly overlooked skeletal dysplasia."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Radiographs are characterized by flat, small, and irregularly shaped
      epiphyses, especially in the hips and knees.
    explanation: >-
      Documents the abnormal epiphyseal cartilage/ossification phenotype central
      to MED.
- name: Premature Osteoarthritis
  description: >
    Joint incongruity and abnormal cartilage from epiphyseal dysplasia lead to
    early-onset osteoarthritis of large weight-bearing joints, often requiring
    joint-preserving osteotomy or joint replacement at a relatively young age.
