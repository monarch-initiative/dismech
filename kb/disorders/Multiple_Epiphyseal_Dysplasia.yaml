- name: rMED
  display_name: MED type 4 / recessive MED (SLC26A2-related, MED-4)
  subtype_term:
    preferred_term: Multiple epiphyseal dysplasia type 4
    term:
      id: MONDO:0009189
      label: multiple epiphyseal dysplasia type 4
  description: >
    Autosomal recessive MED caused by biallelic variants in SLC26A2 (the
    diastrophic dysplasia sulfate transporter, DTDST). Characterized by joint
    pain, malformations of hands, feet and knees, scoliosis, and a relatively
    characteristic double-layered/bipartite patella. Approximately half of
    affected individuals have an abnormal finding at birth such as clubfoot.
- name: EDM7
  display_name: MED type 7 (CANT1-related, MED-7)
  subtype_term:
    preferred_term: Multiple epiphyseal dysplasia type 7
    term:
      id: MONDO:0054680
      label: epiphyseal dysplasia, multiple, 7
  description: >
    Autosomal recessive MED caused by biallelic variants in CANT1 (calcium
    activated nucleotidase 1). CANT1 is the same gene mutated in Desbuquois
    dysplasia, and MED type 7 represents a milder end of the CANT1-related
    phenotypic spectrum that can present as isolated multiple epiphyseal
    dysplasia without the classic Desbuquois features. No CANT1-positive family
    was identified in the Daşar 2025 cohort, but CANT1 is an established gene in
    the MED nosology.
