    snippet: >-
      MED, caused by mutations in the Cartilage Oligomeric Matrix Protein (COMP)
      gene, is the most common form of the disease.
    explanation: >-
      Establishes COMP as the most common cause of MED, the central gene in the
      dominant ECM-protein mechanism.
  - reference: PMID:39596690
    reference_title: "Multiple Osteochondritis Dissecans as Main Manifestation of Multiple Epiphyseal Dysplasia Caused by a Novel Cartilage Oligomeric Matrix Protein Pathogenic Variant: A Clinical Report."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      COMP-MED usually shows significant involvement of the capital femoral
      epiphyses and irregular acetabulum; instead, COL9A1-, COL9A2-, and
      COL9A3-MED appear to have more severe knee involvement than hips
    explanation: >-
      Documents the gene-specific anatomical patterns distinguishing COMP-MED
      from collagen IX-related MED.
- name: SLC26A2 Sulfate Transport Defect and Disturbed Chondrocyte Homeostasis
  description: >
    In recessive MED (MED-4), biallelic SLC26A2 variants reduce sulfate uptake
    into chondrocytes, producing undersulfated cartilage proteoglycans and
    disturbed chondrocyte homeostasis. Mutant SLC26A2 protein shows reduced
    expression and abnormal subcellular localization, and chondrocyte
    differentiation markers are altered (decreased MMP13, COL10A1, and RUNX2;
    increased aggrecan), favoring proliferation while inhibiting differentiation.
  genes:
