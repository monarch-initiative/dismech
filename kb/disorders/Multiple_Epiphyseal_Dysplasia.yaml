pathophysiology:
- name: Mutant Cartilage Matrix Protein Misfolding and ER Retention
  description: >
    In autosomal dominant MED, mutant cartilage extracellular matrix proteins
    (COMP, type IX collagen, matrilin-3) misfold and are retained within the
    rough endoplasmic reticulum of chondrocytes, where they co-retain other ECM
    proteins. This triggers endoplasmic reticulum stress and the unfolded
    protein response, producing abnormal cartilage matrix. COMP-MED is the most
    common and severe subtype, whereas collagen IX-related MED alters ECM
    composition with relatively prominent knee involvement.
  genes:
  - preferred_term: COMP
    term:
      id: hgnc:2227
      label: COMP
  - preferred_term: MATN3
    term:
      id: hgnc:6909
      label: MATN3
