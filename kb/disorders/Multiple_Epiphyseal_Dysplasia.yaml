      label: multiple epiphyseal dysplasia type 1
  description: >
    Autosomal dominant MED caused by heterozygous variants in COMP (cartilage
    oligomeric matrix protein). The most common MED subtype, accounting for
    roughly half of autosomal dominant MED, and generally the most severe, with
    prominent involvement of the capital femoral epiphyses and irregular
    acetabula and the greatest need for orthopedic surgery.
