      label: sulfate transmembrane transport
    modifier: DECREASED
  - preferred_term: Chondrocyte Differentiation
    term:
      id: GO:0002062
      label: chondrocyte differentiation
    modifier: ABNORMAL
  downstream:
  - target: Abnormal Epiphyseal Cartilage and Endochondral Ossification
    causal_link_type: DIRECT
    description: >-
      Undersulfated proteoglycans and disturbed chondrocyte differentiation
      impair epiphyseal cartilage and ossification.
  evidence:
  - reference: PMID:38956600
    reference_title: "Biallelic variants in SLC26A2 cause multiple epiphyseal dysplasia-4 by disturbing chondrocyte homeostasis."
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: >-
      Overall, our data demonstrate that the variants p.Val341del and
      p.Ile421Thr in SLC26A2 cause MED-4 and that these two variants promote
      chondrocyte proliferation while inhibiting chondrocyte differentiation.
    explanation: >-
      Functional study in primary human chondrocytes links SLC26A2 variants to
      disturbed chondrocyte differentiation in MED-4.
  - reference: PMID:38956600
    reference_title: "Biallelic variants in SLC26A2 cause multiple epiphyseal dysplasia-4 by disturbing chondrocyte homeostasis."
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: >-
      Expression levels of matrix metallopeptidase 13 (MMP13), α-1 chain of type
      X collagen (COL10A1), and Runt-related transcription factor 2 (RUNX2) were
      significantly decreased in the variant group. However, aggrecan (ACAN)
      expression was higher in the variant group than the WT group.
    explanation: >-
      Documents the specific shift in chondrocyte differentiation markers caused
      by SLC26A2 variants.
- name: Abnormal Epiphyseal Cartilage and Endochondral Ossification
  description: >
    Both the dominant ECM-protein and recessive sulfate-transport mechanisms
    converge on abnormal epiphyseal cartilage with delayed and irregular
    ossification of multiple epiphyses, producing the small, flat, irregular
    epiphyses that are the radiographic hallmark of MED, predominantly in the
    hips and knees, and driving progressive joint degeneration.
  cell_types:
