      encoding important cartilage extracellular matrix proteins, enzymes, and
      transporter proteins, including COMP, MATN3, COL9A1, COL9A2, COL9A3,
      CANT1, and SLC26A2.
    explanation: >-
      Lists CANT1 among the established multiple epiphyseal dysplasia genes in
      the disease nosology.
inheritance:
- name: Autosomal Dominant
  description: >
    MED caused by variants in COMP, MATN3, COL9A1, COL9A2, or COL9A3 is inherited
    in an autosomal dominant manner; many affected individuals have an affected
    parent, and each child of an affected individual has a 50% chance of
    inheriting the variant.
  evidence:
  - reference: PMID:20301302
    reference_title: "Multiple Epiphyseal Dysplasia, Autosomal Dominant."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      By definition, autosomal dominant MED is inherited in an autosomal
      dominant manner.
    explanation: >-
      GeneReviews establishes autosomal dominant inheritance for COMP/MATN3/COL9-
      related MED.
- name: Autosomal Recessive
  description: >
    SLC26A2-related MED (rMED, MED-4) is inherited in an autosomal recessive
    manner, with biallelic SLC26A2 variants required to cause disease.
  evidence:
  - reference: PMID:20301483
    reference_title: "SLC26A2-Related Multiple Epiphyseal Dysplasia."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      SLC26A2-MED is inherited in an autosomal recessive manner.
    explanation: >-
      GeneReviews establishes autosomal recessive inheritance for SLC26A2-related
      MED.
