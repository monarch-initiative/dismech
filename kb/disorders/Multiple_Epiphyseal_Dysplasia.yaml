name: Multiple Epiphyseal Dysplasia
creation_date: "2026-06-05T12:00:00Z"
category: Mendelian
description: >
  Multiple epiphyseal dysplasia (MED) is a clinically and genetically
  heterogeneous skeletal dysplasia characterized by abnormal development and
  delayed, irregular ossification of multiple epiphyses. It typically presents
  in early childhood with joint pain (especially of the hips and knees), joint
  stiffness, fatigue, and waddling gait, and progresses to early-onset
  osteoarthritis of the large weight-bearing joints with variable, usually mild,
  short stature. MED is caused by pathogenic variants in genes encoding
  cartilage extracellular matrix proteins and a sulfate transporter. Autosomal
  dominant forms result from heterozygous variants in COMP (the most common and
  generally most severe subtype), MATN3, COL9A1, COL9A2, and COL9A3; an
  autosomal recessive form (rMED, MED-4) is caused by biallelic SLC26A2 variants.
  Dominant ECM-gene mutations act through mutant protein misfolding and retention
  in the chondrocyte endoplasmic reticulum with ER stress and abnormal cartilage
  matrix, whereas SLC26A2 deficiency impairs chondrocyte sulfate uptake, leading
  to undersulfated proteoglycans and disturbed chondrocyte differentiation.
notes: >
  Health-related quality of life: the physical domain of HRQoL deteriorates at a
  young age in MED. On the Short Form-36, the physical component summary score is
  significantly lower than in the general population and tends to worsen with
  age, and MED patients with osteoarthritis have a particularly low physical
  component score (PMID:34909512). MED should be kept distinct from
  spondyloepiphyseal dysplasia (SED), which is epiphyseal plus vertebral and
  often involves ocular problems; MED is epiphyseal-predominant.
