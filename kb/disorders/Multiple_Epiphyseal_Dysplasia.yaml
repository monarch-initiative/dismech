  description: >
    Autosomal dominant MED caused by heterozygous variants in COL9A2 (collagen
    type IX alpha 2 chain). Part of the collagen IX-related MED spectrum, which
    tends to show relatively prominent knee involvement and may be associated
    with osteochondritis dissecans and myopathy in some families.
