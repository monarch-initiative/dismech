          label: nervous system development
    evidence:
      - reference: PMID:39179905
        reference_title: "HiPSC-derived 3D neural models reveal neurodevelopmental pathomechanisms of the Cockayne Syndrome B."
        supports: SUPPORT
        evidence_source: IN_VITRO
        snippet: >-
