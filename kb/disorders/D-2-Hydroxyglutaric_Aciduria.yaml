has_subtypes:
- name: D-2-HGA type I
  description: 'Caused by autosomal recessive loss-of-function mutations in D2HGDH, leading to impaired mitochondrial clearance of D-2-HG. Generally milder phenotype with lower D-2-HG levels compared to type II.

    '
  genes:
