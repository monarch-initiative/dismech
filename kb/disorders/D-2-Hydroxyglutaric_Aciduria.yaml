  inheritance:
  - name: Autosomal recessive
    evidence:
    - reference: PMID:15609246
      reference_title: "Mutations in the D-2-hydroxyglutarate dehydrogenase gene cause D-2-hydroxyglutaric aciduria."
      supports: SUPPORT
      evidence_source: HUMAN_CLINICAL
      snippet: One patient was homozygous for a missense mutation (c.1331T-->C; p.Val444Ala). The other patient was compound heterozygous for a missense mutation (c.440T-->G; p.Ile147Ser) and a splice-site mutation (IVS1-23A-->G)
      explanation: Homozygous and compound heterozygous mutations confirm autosomal recessive inheritance.
  variants:
  - name: Various D2HGDH pathogenic variants
    description: 'Multiple pathogenic variants including missense, splice-site, and null alleles have been identified. Examples include p.Val444Ala, p.Ile147Ser, and IVS1-23A>G. Mutations lead to marked reduction of D-2-hydroxyglutarate dehydrogenase activity.

      '
    evidence:
    - reference: PMID:15609246
      reference_title: "Mutations in the D-2-hydroxyglutarate dehydrogenase gene cause D-2-hydroxyglutaric aciduria."
      supports: SUPPORT
      evidence_source: IN_VITRO
      snippet: Overexpression studies in HEK-293 cells of proteins containing the missense mutations showed a marked reduction of d-2-hydroxyglutarate dehydrogenase activity, proving that mutations in the d-2-hydroxyglutarate dehydrogenase gene cause d-2-hydroxyglutaric aciduria.
      explanation: Functional studies confirm that D2HGDH mutations cause reduced enzyme activity.
  features: 'Loss-of-function mutations in D2HGDH impair mitochondrial oxidation of D-2-HG back to alpha-ketoglutarate. Pathogenic mutations were found in 24 of 50 D-2-HGA patients studied, with confirmed impaired enzyme activity in all mutation-positive patients.

    '
  evidence:
  - reference: PMID:20020533
    reference_title: "Evidence for genetic heterogeneity in D-2-hydroxyglutaric aciduria."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: Presumed pathogenic mutations were detected in 24 of 50 patients in the D-2-hydroxyglutarate dehydrogenase (D2HGDH) gene, which encodes D-2-hydroxyglutarate dehydrogenase (D-2-HGDH). Enzyme assay of D-2-HGDH confirmed that all patients with mutations had impaired enzyme activity
    explanation: Confirms D2HGDH mutations as causal with functional enzyme assay validation.
