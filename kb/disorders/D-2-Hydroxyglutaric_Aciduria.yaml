  - preferred_term: IDH2
  inheritance:
  - name: Autosomal dominant (de novo)
prevalence:
- population: Published international clinical cohorts
  percentage: 17 to 50 reported patients in major series
  notes: >-
    No population-based prevalence estimate was identified in PubMed abstracts.
    The best epidemiologic signal is that major international clinical series
    assembled only 17 patients in 1999 and 50 patients in 2010, supporting an
    ultra-rare disorder designation.
  evidence:
  - reference: PMID:9894884
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      An international survey of patients with D-2-hydroxyglutaric aciduria was
      initiated to solve this issue. The clinical history, neuroimaging, and
      biochemical findings of 17 patients were studied.
    explanation: >-
      This early international survey shows that only 17 clinically recognized
      patients could be assembled, consistent with extreme rarity.
  - reference: PMID:20020533
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      We performed molecular, enzyme, and metabolic studies in 50 patients with
      D-2-hydroxyglutaric aciduria (D-2-HGA) who accumulated
      D-2-hydroxyglutarate (D-2-HG) in physiological fluids.
    explanation: >-
      A later multicenter molecular study still assembled only 50 patients,
      reinforcing that D-2-HGA remains ultra-rare without stable population
      prevalence estimates.
