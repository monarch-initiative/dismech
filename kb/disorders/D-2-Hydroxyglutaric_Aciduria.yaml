  inheritance:
  - name: Autosomal recessive
- name: D-2-HGA type II
  description: 'Caused by heterozygous (typically de novo) gain-of-function mutations in IDH2 at residue Arg140, conferring neomorphic D-2-HG production. Generally more severe phenotype with higher D-2-HG levels and prominent cardiomyopathy.

    '
