      supports: SUPPORT
      evidence_source: HUMAN_CLINICAL
      snippet: "Inhibition of the phosphoinositol-3-kinase-AKT-mTOR pathway mitigates the detrimental synergistic effects of combined PTEN-BMPR1A deletion."
