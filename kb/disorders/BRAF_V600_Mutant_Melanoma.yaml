- name: Immune Checkpoint Inhibitors
  description: >-
    Anti-PD-1 antibodies (pembrolizumab, nivolumab) alone or combined with
    anti-CTLA-4 (ipilimumab) are also effective in BRAF-mutant melanoma. The
    optimal sequencing of targeted therapy versus immunotherapy remains an active
    area of investigation.
  treatment_term:
    preferred_term: immunotherapy
    term:
      id: NCIT:C15262
      label: Immunotherapy
    therapeutic_agent:
    - preferred_term: pembrolizumab
      term:
        id: NCIT:C106432
        label: Pembrolizumab
    - preferred_term: nivolumab
      term:
        id: NCIT:C68814
        label: Nivolumab
    - preferred_term: ipilimumab
      term:
        id: CHEBI:231679
        label: ipilimumab
  target_mechanisms:
  - target: Immune Evasion via PD-L1 Upregulation
    treatment_effect: INHIBITS
    description: >-
      Anti-PD-1/anti-CTLA-4 antibodies block checkpoint-mediated immune evasion,
      restoring the anti-tumor T cell response against neoantigen-rich melanoma cells.
      Melanoma's high mutational burden from UV exposure provides abundant neoantigens,
      making it among the most responsive tumor types to checkpoint blockade.
    evidence:
    - reference: PMID:33256089
      supports: SUPPORT
      evidence_source: OTHER
      snippet: >-
        FDA approved the combination therapy of anti-CTLA-4 (ipilimumab) with
        anti-PD-1 (nivolumab), for the treatment of unresectable or metastatic
        melanoma, and resulted in improved response rates by 50%–60%, with
        enhanced durable survival compared to either agent alone
      explanation: >-
        Review reports FDA-approved combination of ipilimumab (anti-CTLA-4)
        and nivolumab (anti-PD-1) in melanoma with 50-60% response rates
        and durable survival, directly supporting checkpoint inhibitor
        efficacy against melanoma immune evasion.
