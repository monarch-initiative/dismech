name: BRAF V600 Mutant Melanoma
creation_date: '2026-01-26T02:55:13Z'
updated_date: '2026-04-22T20:53:03Z'
description: >-
  BRAF V600-mutant melanoma is a molecular subtype of cutaneous melanoma characterized
  by activating mutations in the BRAF oncogene, most commonly V600E (substitution
  of
  valine for glutamic acid at codon 600), with V600K being the second most common
  variant.
  These mutations result in constitutive activation of the BRAF kinase and downstream
  MAPK/ERK signaling pathway, driving uncontrolled melanocyte proliferation. BRAF
  V600
  mutations occur in approximately 40-50% of cutaneous melanomas and are associated
  with
  intermittent sun exposure, younger patient age, and superficial spreading histology.
  This molecular subtype is paradigmatic for oncogene-targeted therapy, as the combination
  of BRAF and MEK inhibitors (dabrafenib plus trametinib) has transformed outcomes
  for
  patients with advanced disease.
categories:
- Skin Cancer
- Molecularly Defined Cancer
- Oncogene-Driven Cancer
parents:
- cutaneous melanoma
pathophysiology:
- name: BRAF V600 Oncogenic Mutation
  description: >-
    BRAF V600 mutations, predominantly V600E and V600K, result in substitution of
    the
    valine residue in the activation loop of the BRAF kinase. This removes an autoinhibitory
    mechanism, causing constitutive kinase activity independent of upstream RAS signaling.
    The mutant BRAF signals as a monomer, unlike wild-type BRAF which requires dimerization
    for activation.
  evidence:
  - reference: PMID:40023845
    reference_title: "The NF1 tumor suppressor regulates PD-L1 and immune evasion in melanoma."
    supports: PARTIAL
    snippet: Hotspot BRAF, hotspot NRAS, and NF1 loss-of-function mutations are found in approximately 50%, 25%, and 15% of cutaneous melanomas, respectively.
    explanation: This abstract reports frequent hotspot BRAF mutations in cutaneous melanoma, supporting the relevance of BRAF-driven melanoma.
  cell_types:
  - preferred_term: melanocyte
    term:
      id: CL:0000148
      label: melanocyte
  biological_processes:
  - preferred_term: MAPK cascade
    modifier: INCREASED
    term:
      id: GO:0000165
      label: MAPK cascade
  downstream:
  - target: Constitutive MAPK Pathway Activation
    description: V600E BRAF has 500-fold increased kinase activity compared to wild-type
- name: Constitutive MAPK Pathway Activation
  description: >-
    Mutant BRAF continuously phosphorylates and activates MEK1/2, which in turn activates
    ERK1/2. This constitutive MAPK signaling drives expression of genes promoting
    cell
    cycle progression, survival, and proliferation. The pathway operates independently
    of growth factor stimulation.
  biological_processes:
  - preferred_term: signal transduction
    modifier: INCREASED
    term:
      id: GO:0007165
      label: signal transduction
  - preferred_term: cell population proliferation
    modifier: INCREASED
    term:
      id: GO:0008283
      label: cell population proliferation
  downstream:
  - target: Uncontrolled Melanocyte Proliferation
    description: ERK drives cyclin D1 expression and G1/S progression
  - target: Apoptosis Resistance
    description: MAPK signaling promotes survival through multiple mechanisms
- name: Uncontrolled Melanocyte Proliferation
  description: >-
    Constitutive MAPK signaling drives melanocyte proliferation through ERK-mediated
    phosphorylation and stabilization of transcription factors controlling cell cycle
    progression, including upregulation of cyclin D1 and suppression of cell cycle
    inhibitors such as p27.
  cell_types:
  - preferred_term: melanocyte
    term:
      id: CL:0000148
      label: melanocyte
  locations:
  - preferred_term: skin of body
    term:
      id: UBERON:0002097
      label: skin of body
  biological_processes:
  - preferred_term: cell population proliferation
    modifier: INCREASED
    term:
      id: GO:0008283
      label: cell population proliferation
- name: Apoptosis Resistance
  description: >-
    BRAF V600 signaling promotes melanoma cell survival through multiple anti-apoptotic
    mechanisms, including upregulation of BCL2 family members and suppression of
    pro-apoptotic BIM. This contributes to tumor persistence and therapy resistance.
  biological_processes:
  - preferred_term: apoptotic process
    modifier: DECREASED
    term:
      id: GO:0006915
      label: apoptotic process
- name: Immune Evasion via PD-L1 Upregulation
  conforms_to: "immune_checkpoint_blockade#Adaptive Immune Resistance"
  description: >-
    BRAF V600-mutant melanoma is among the most immunogenic solid tumors due to high
    UV-induced tumor mutational burden generating abundant neoantigens. Tumor-infiltrating
    CD8+ T cells mount anti-tumor responses, but melanoma cells adaptively upregulate PD-L1
    in response to interferon-gamma, suppressing T cell cytotoxicity. BRAF-MAPK signaling
    itself also contributes to immune evasion through intrinsic PD-L1 upregulation via
    MEK/ERK-dependent mechanisms.
  cell_types:
  - preferred_term: CD8-positive, alpha-beta T cell
    term:
      id: CL:0000625
      label: CD8-positive, alpha-beta T cell
  biological_processes:
  - preferred_term: Negative Regulation of T Cell Mediated Immunity
    term:
      id: GO:0002710
      label: negative regulation of T cell mediated immunity
    modifier: INCREASED
  evidence:
  - reference: PMID:33256089
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Cancer cells including melanoma cells, upregulate PD-L1 expression
      on the cell surface. T-lymphocytes with surface expression of PD-1,
      interacts with PD-L1 on the tumor, leading to T-cell exhaustion,
      thereby, causing dysfunction of the immune system in detecting and
      eliminating the tumor cells
    explanation: >-
      Review directly describes melanoma cells upregulating PD-L1 to
      engage PD-1 on T lymphocytes, leading to T cell exhaustion and
      immune evasion - supporting the adaptive immune resistance
      mechanism in BRAF-mutant melanoma.
