    term:
      id: GO:0016226
      label: iron-sulfur cluster assembly
  - preferred_term: oxidative phosphorylation
    term:
      id: GO:0006119
      label: oxidative phosphorylation
  - preferred_term: intracellular iron ion homeostasis
    term:
      id: GO:0006879
      label: intracellular iron ion homeostasis
