      label: heart
  evidence:
  - reference: PMID:14653404
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "the unstable GAA expansion that underlies FA causes a deficiency of
      the mitochondrial protein frataxin, leading to potentially harmful oxidative
      injury associated with excessive iron deposits in mitochondria. In addition,
      pathogenesis may involve a primary defect in synthesis of iron-sulfur cluster
      containing enzymes."
    explanation: Confirms frataxin deficiency, mitochondrial iron accumulation, and
      iron-sulfur cluster assembly defect as the pathogenic mechanism.
  - reference: PMID:31456208
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "This protein is essential for mitochondrial function by the involvement
      of iron-sulfur cluster biogenesis. The effects of its deficiency also include
      disruption of cellular, particularly mitochondrial, iron homeostasis, i.e.,
      relatively more iron accumulated in mitochondria and less iron presented in
      cytosol."
    explanation: Confirms frataxin's role in iron-sulfur cluster biogenesis and
      mitochondrial iron accumulation upon deficiency.
phenotypes:
- category: Neurologic
  name: Progressive Gait and Limb Ataxia
  frequency: VERY_FREQUENT
  diagnostic: true
  description: >
    Progressive cerebellar and sensory ataxia affecting gait and limb coordination
    is the hallmark feature. Most patients require wheelchair use within 10-15
    years of onset.
  phenotype_term:
    preferred_term: Ataxia
    term:
      id: HP:0001251
      label: Ataxia
  evidence:
  - reference: PMID:23859346
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "his description remains at the core of the classical clinical phenotype
      of gait and limb ataxia, poor balance and coordination, leg weakness, sensory
      loss, areflexia, impaired walking, dysarthria, dysphagia, eye movement
      abnormalities, scoliosis, foot deformities, cardiomyopathy and diabetes."
    explanation: Comprehensive description of the classical Friedreich ataxia phenotype
      with ataxia as the core feature.
- category: Neurologic
  name: Dysarthria
  frequency: VERY_FREQUENT
  description: >
    Progressive speech difficulty due to cerebellar dysfunction, typically
    developing within a few years of disease onset.
  phenotype_term:
    preferred_term: Dysarthria
    term:
      id: HP:0001260
      label: Dysarthria
  evidence:
  - reference: PMID:23859346
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "gait and limb ataxia, poor balance and coordination, leg weakness,
      sensory loss, areflexia, impaired walking, dysarthria, dysphagia"
    explanation: Dysarthria is part of the classical phenotype.
- category: Neurologic
  name: Peripheral Neuropathy
  frequency: VERY_FREQUENT
  description: >
    Sensory neuropathy with loss of deep tendon reflexes (areflexia) and
    impaired proprioception and vibration sense. The dorsal root ganglia
    are preferentially affected.
  phenotype_term:
    preferred_term: Peripheral neuropathy
    term:
      id: HP:0009830
      label: Peripheral neuropathy
- category: Cardiac
  name: Hypertrophic Cardiomyopathy
  frequency: VERY_FREQUENT
  description: >
    Hypertrophic cardiomyopathy is present in approximately 60-75% of patients
    and is the leading cause of death. It can progress to dilated cardiomyopathy
    with heart failure.
  phenotype_term:
    preferred_term: Hypertrophic cardiomyopathy
    term:
      id: HP:0001639
      label: Hypertrophic cardiomyopathy
  evidence:
  - reference: PMID:23859346
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "his description remains at the core of the classical clinical phenotype
      of gait and limb ataxia, poor balance and coordination, leg weakness, sensory
      loss, areflexia, impaired walking, dysarthria, dysphagia, eye movement
      abnormalities, scoliosis, foot deformities, cardiomyopathy and diabetes."
    explanation: Cardiomyopathy is listed as part of the classical Friedreich ataxia
      phenotype.
- category: Musculoskeletal
  name: Scoliosis
  frequency: VERY_FREQUENT
  description: >
    Progressive scoliosis is common, often requiring surgical intervention.
  phenotype_term:
    preferred_term: Scoliosis
    term:
      id: HP:0002650
      label: Scoliosis
  evidence:
  - reference: PMID:23859346
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "scoliosis, foot deformities, cardiomyopathy and diabetes."
    explanation: Scoliosis is part of the classical phenotype.
- category: Musculoskeletal
  name: Pes Cavus
  frequency: VERY_FREQUENT
  description: >
    High-arched feet (pes cavus) are a characteristic skeletal deformity.
  phenotype_term:
    preferred_term: Pes cavus
    term:
      id: HP:0001761
      label: Pes cavus
  evidence:
  - reference: PMID:23859346
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Early-onset cases tend to have more rapid progression and a higher
