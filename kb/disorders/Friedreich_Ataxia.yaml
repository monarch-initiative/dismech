prevalence:
- population: Global
  percentage: "0.003"
  notes: Estimated prevalence of 1 in 29,000-50,000 in European populations.
    More rare in East Asian and sub-Saharan African populations.
progression:
- phase: Onset
  age_range: Childhood to adolescence
  notes: Typical onset around puberty (ages 10-15). Late-onset forms (after age 25)
    are associated with smaller GAA expansions and slower progression.
pathophysiology:
- name: Frataxin Deficiency and Iron-Sulfur Cluster Assembly Defect
  description: >
    The GAA repeat expansion in FXN silences frataxin gene expression through
    epigenetic mechanisms including heterochromatin formation. Frataxin deficiency
    impairs iron-sulfur cluster biogenesis in mitochondria, leading to dysfunction
    of respiratory chain complexes and aconitase, mitochondrial iron accumulation,
    and increased susceptibility to oxidative damage.
  cell_types:
  - preferred_term: neuron
    term:
      id: CL:0000540
      label: neuron
  - preferred_term: cardiac muscle cell
    term:
      id: CL:0000746
      label: cardiac muscle cell
  biological_processes:
