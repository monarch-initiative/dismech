name: Nestor-Guillermo progeria syndrome
creation_date: "2026-04-13T22:47:36Z"
updated_date: "2026-04-14T14:35:00Z"
description: >-
  Nestor-Guillermo progeria syndrome is a rare BANF1-related progeroid disorder
  with early onset but comparatively slow progression. Affected individuals
  show premature aging features including growth retardation, reduced
  subcutaneous fat, joint stiffness, and profound skeletal abnormalities
  without the prominent cardiovascular disease typical of some other progerias.
category: Mendelian
parents:
- hereditary disease
- premature aging syndrome
synonyms:
- NGPS
disease_term:
  preferred_term: Nestor-Guillermo progeria syndrome
  term:
    id: MONDO:0013523
    label: Nestor-Guillermo progeria syndrome
pathophysiology:
- name: BANF1 mutation
  description: >-
    Nestor-Guillermo progeria syndrome is caused by pathogenic BANF1 mutation,
    establishing the primary molecular lesion in this progeroid disorder.
  gene:
    preferred_term: BANF1
    description: Barrier-to-autointegration factor 1 nuclear envelope protein.
    term:
      id: hgnc:17397
      label: BANF1
  genes:
  - preferred_term: BANF1
    term:
      id: hgnc:17397
      label: BANF1
  evidence:
  - reference: PMID:21932319
    reference_title: "Néstor-Guillermo progeria syndrome: a novel premature aging condition with early onset and chronic development caused by BANF1 mutations."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Mutations in BANF1 have been recently reported to cause a new hereditary progeroid syndrome that we now propose to call the Néstor-Guillermo progeria syndrome (NGPS)."
    explanation: This directly supports BANF1 as the causal gene in NGPS.
  downstream:
  - target: Impaired DNA binding by BAF
    description: The recurrent BANF1 mutation impairs BAF DNA binding activity.
  - target: Nuclear envelope and chromatin dysregulation
    description: Altered BAF function perturbs nuclear structure and chromatin-related regulation.
- name: Impaired DNA binding by BAF
  description: >-
    The NGPS-associated BANF1 A12T protein is folded and stable but has impaired
    DNA binding, clarifying the key biochemical defect.
  evidence:
  - reference: PMID:25495845
    reference_title: "Néstor-Guillermo Progeria Syndrome: a biochemical insight into Barrier-to-Autointegration Factor 1, alanine 12 threonine mutation."
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: "We demonstrate, using biochemical assays, that the BANF1 A12T protein is impaired in its ability to bind DNA while its interaction with nuclear envelope proteins is unperturbed."
    explanation: This directly supports impaired DNA binding as the molecular defect in NGPS.
  downstream:
  - target: Nuclear envelope and chromatin dysregulation
    description: Impaired DNA binding perturbs normal BAF-mediated nuclear regulation.
- name: Nuclear envelope and chromatin dysregulation
  description: >-
    BANF1 dysfunction leads to progeroid cellular changes involving nuclear
    structure and chromatin-associated DNA interactions.
  evidence:
  - reference: PMID:25495845
    reference_title: "Néstor-Guillermo Progeria Syndrome: a biochemical insight into Barrier-to-Autointegration Factor 1, alanine 12 threonine mutation."
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: "Here we demonstrate that the BANF1 A12T protein is indeed correctly folded, stable and that the observed phenotype, is likely due to the disruption of the DNA binding surface of the A12T mutant."
    explanation: This supports a chromatin-associated nuclear defect by showing that the NGPS mutation disrupts the BANF1 DNA-binding surface rather than protein stability.
  downstream:
  - target: Growth delay
    description: Nuclear and chromatin dysregulation contributes to impaired somatic growth.
  - target: Joint stiffness
    description: Chronic connective-tissue and skeletal dysfunction contributes to joint stiffness.
  - target: Skeletal abnormalities
    description: Progressive skeletal consequences are a major clinical outcome of the disease.
