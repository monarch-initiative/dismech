differential_diagnoses:
- name: Hutchinson-Gilford progeria syndrome
  description: >-
    Hutchinson-Gilford progeria syndrome is a key differential diagnosis
    because NGPS shares a progeroid appearance but follows a slower course and
    lacks the same cardiovascular burden.
  distinguishing_features:
  - A slower chronic course and absence of early cardiovascular impairment favor NGPS.
  - Classic LMNA-related severe cardiovascular progeria favors Hutchinson-Gilford progeria syndrome.
  disease_term:
    preferred_term: Hutchinson-Gilford progeria syndrome
    term:
      id: MONDO:0008310
      label: Hutchinson-Gilford progeria syndrome
  evidence:
  - reference: PMID:21932319
    reference_title: "Néstor-Guillermo progeria syndrome: a novel premature aging condition with early onset and chronic development caused by BANF1 mutations."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "We describe herein the clinical features of the first two NGPS patients, who phenocopy features of classic progerias (i.e., Hutchinson-Gilford progeria syndrome or mandibuloacral dysplasia)"
    explanation: This directly supports Hutchinson-Gilford progeria syndrome as a differential diagnosis.
- name: Mandibuloacral dysplasia
  description: >-
    Mandibuloacral dysplasia is another important differential diagnosis because
    it overlaps with the progeroid and skeletal phenotype of NGPS.
  distinguishing_features:
  - BANF1-related chronic progeria with preserved cardiovascular status favors NGPS.
  - Mandibuloacral dysplasia-specific skeletal patterning and causal genes favor mandibuloacral dysplasia.
  disease_term:
    preferred_term: mandibuloacral dysplasia
    term:
      id: MONDO:0016584
      label: mandibuloacral dysplasia
  evidence:
