    modifier: ABNORMAL
    term:
      id: GO:0046666
      label: retinal cell programmed cell death
  evidence:
  - reference: PMID:36434575
    reference_title: "Acute annular outer retinopathy preceded by invasive ductal breast carcinoma: a case report."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      We identified RPE atrophy with nodular hyperreflectivity and loss of ellipsoid layer within the white annular ring with corresponding visual field loss.
    explanation: This directly connects RPE and ellipsoid-zone abnormalities to the visual field defect.
- name: Suspected immune-mediated outer retinopathy
  description: >-
    The initiating cause is unknown, but reports support an immune-mediated
    model based on an immune-ring hypothesis, antiretinal antibodies, and
    occasional systemic autoimmune or malignancy associations.
  downstream:
  - target: Acute outer retinal photoreceptor injury
    description: Immune-mediated injury is a proposed upstream driver of outer retinal disruption.
  biological_processes:
  - preferred_term: immune response
    modifier: ABNORMAL
    term:
      id: GO:0006955
      label: immune response
  - preferred_term: adaptive immune response
    modifier: ABNORMAL
    term:
      id: GO:0002250
      label: adaptive immune response
  evidence:
  - reference: PMID:7872395
    reference_title: Acute annular outer retinopathy as a variant of acute zonal occult outer retinopathy.
    supports: PARTIAL
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      We speculate that this disorder is part of the spectrum of acute zonal occult outer retinopathy and that the gray border, which separates the normal from the abnormal retina, represents an immune ring phenomenon.
    explanation: The original report explicitly proposes an immune-ring mechanism, but frames it as speculation.
  - reference: PMID:18195232
    reference_title: Association of antiretinal antibodies in acute annular outer retinopathy.
    supports: PARTIAL
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Association of antiretinal antibodies in acute annular outer retinopathy.
    explanation: The article title and indexing support an immune association, but the PubMed cache does not include an abstract with detailed findings.
phenotypes:
- category: Ophthalmologic
  name: Scotoma
  description: >-
    Acute localized visual field loss is a defining presentation and can expand
    briefly before stabilizing.
  phenotype_term:
    preferred_term: Scotoma
    term:
      id: HP:0000575
      label: Scotoma
  evidence:
  - reference: PMID:7872395
    reference_title: Acute annular outer retinopathy as a variant of acute zonal occult outer retinopathy.
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      A 23-year-old man developed a rapid-onset, large, dense scotoma that was associated with a peculiar gray intraretinal ring corresponding to the edge of the scotoma.
    explanation: This directly supports scotoma as a core AAOR phenotype.
- category: Ophthalmologic
  name: Visual field loss
  description: >-
    Visual field defects correspond to the annular outer retinal lesion and may
    be persistent.
  phenotype_term:
    preferred_term: Visual field defect
    term:
      id: HP:0001123
      label: Visual field defect
  evidence:
  - reference: PMID:11078842
    reference_title: "Acute annular outer retinopathy: report of four cases."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Four healthy patients developed the acute onset of visual field loss associated with a localized, white annular outer retinopathy.
    explanation: This case series directly supports acute visual field loss as a characteristic feature.
- category: Ophthalmologic
  name: Photopsia
  description: Flashing-light symptoms may accompany acute outer retinal dysfunction.
  phenotype_term:
    preferred_term: Photopsia
    term:
      id: HP:0030786
      label: Photopsia
  evidence:
  - reference: PMID:36434575
    reference_title: "Acute annular outer retinopathy preceded by invasive ductal breast carcinoma: a case report."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      The patient presented with photopsias and visual loss approximately 3 weeks prior to a diagnosis of invasive ductal breast carcinoma.
    explanation: This report directly documents photopsia at presentation.
- category: Ophthalmologic
