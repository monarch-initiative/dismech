    snippet: "Syndactyly of the remaining digits is most likely the effects of dysregulation of Fgf-Bmp-Msx signaling on apoptotic cell death."
    explanation: >-
      Links syndactyly of remaining digits to dysregulated FGF-BMP-MSX
