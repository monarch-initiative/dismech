name: Trachoma
creation_date: '2026-01-26T15:56:41Z'
updated_date: '2026-04-05T00:17:38Z'
category: Infectious Disease
description: >-
  Trachoma is a neglected tropical disease caused by conjunctival infection with
  Chlamydia trachomatis, leading to chronic conjunctival inflammation, scarring,
  trichiasis, and blindness.
disease_term:
  term:
    id: MONDO:0001249
    label: trachoma
  preferred_term: Trachoma
parents:
- Bacterial Infection
- Neglected tropical disease
infectious_agent:
- name: Chlamydia trachomatis
  infectious_agent_term:
    preferred_term: Chlamydia trachomatis
    term:
      id: NCBITaxon:813
      label: Chlamydia trachomatis
  description: Conjunctival strains of C. trachomatis cause trachoma.
  evidence:
  - reference: PMID:35618795
    reference_title: "Trachoma."
    supports: SUPPORT
    snippet: "Trachoma is a neglected tropical disease caused by infection with conjunctival
      strains of Chlamydia trachomatis."
    explanation: The abstract identifies conjunctival C. trachomatis as the
      cause of trachoma.
pathophysiology:
- name: Chronic conjunctival infection with scarring
  description: Recurrent infection drives chronic inflammation and scarring
    leading to trichiasis.
  evidence:
  - reference: PMID:35618795
    reference_title: "Trachoma."
    supports: SUPPORT
    snippet: "Trachoma is a disease complex composed of two linked chronic processes:
      a recurrent, generally subclinical infectious-inflammatory disease that mostly
      affects children, and a non-communicable, cicatricial and, owing to trichiasis,
      eventually blinding disease"
    explanation: The abstract describes chronic infection progressing to
      cicatricial disease with trichiasis.
phenotypes:
- name: Blindness
  category: Ophthalmologic
  frequency: OCCASIONAL
  phenotype_term:
    preferred_term: Blindness
    term:
      id: HP:0000618
      label: Blindness
  evidence:
  - reference: PMID:35618795
    reference_title: "Trachoma."
    supports: SUPPORT
    snippet: "Trachoma is a neglected tropical disease caused by infection with conjunctival
      strains of Chlamydia trachomatis. It can result in blindness."
    explanation: The abstract notes that trachoma can result in blindness.
treatments:
- name: Antibiotic mass drug administration (SAFE strategy)
  description: Antibiotic mass drug administration reduces infection prevalence
    and transmission.
  treatment_term:
    preferred_term: pharmacotherapy
    term:
      id: MAXO:0000058
      label: pharmacotherapy
  evidence:
  - reference: PMID:35618795
    reference_title: "Trachoma."
    supports: SUPPORT
    snippet: "Surgery is offered to individuals with trichiasis and antibiotic mass
      drug administration and interventions to stimulate facial cleanliness and environmental
      improvement are designed to reduce infection prevalence and transmission."
    explanation: The abstract describes antibiotic mass drug administration as
      part of SAFE.
