    reference_title: "CRTAP and LEPRE1 mutations in recessive osteogenesis imperfecta."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Cabral et al. (2007) suggested that the severely affected infants with
      LEPRE1 mutations differ from those with mutations in type I collagen genes
      in that they have white rather than grey or blue sclerae
    explanation: >-
      Describes white sclerae as a distinguishing feature of recessive OI caused
      by prolyl 3-hydroxylation complex mutations versus dominant collagen-mutation
      OI.
