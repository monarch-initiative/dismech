- name: MECP2 Pathogenic Variants
  description: >
    De novo and inherited pathogenic variants in the X-linked MECP2 gene disrupt
    methyl-CpG-binding protein 2. Reported Rett-causing variant classes include
    methyl-binding-domain missense substitutions and frameshift or nonsense
    variants that disrupt the transcription repression domain.
