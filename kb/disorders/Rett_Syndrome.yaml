definitions:
- name: Orphanet clinical definition for Rett syndrome
  definition_type: CASE_DEFINITION
  description: >-
    Orphanet defines Rett syndrome as a rare severe X-linked neurodevelopmental
    disorder with rapid developmental regression in infancy, loss of purposeful
    hand movements and speech, gait abnormalities, stereotypic hand movements,
    deceleration of head growth, seizures, breathing abnormalities, and
    gastrointestinal, scoliosis, and behavioral comorbidities.
  scope: Orphanet disease-level clinical framing for ORPHA:778
  evidence:
  - reference: ORPHA:778
    reference_title: "Rett syndrome (Orphanet structured-database record)"
    supports: SUPPORT
    evidence_source: OTHER
    snippet: "A rare severe, X-linked, neurodevelopmental disorder characterized by rapid developmental regression in infancy, partial or complete loss of purposeful hand movements, loss of speech, gait abnormalities, and stereotypic hand movements"
    explanation: Orphanet's definition supports the core clinical framing and infantile regression pattern for Rett syndrome.
