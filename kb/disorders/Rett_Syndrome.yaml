genetic:
- name: MECP2
  association: Causative
  gene_term:
    preferred_term: MECP2
    term:
      id: hgnc:6990
      label: MECP2
  variant_origin: DE_NOVO
  inheritance:
  - name: X-linked dominant inheritance
    inheritance_term:
      preferred_term: X-linked dominant inheritance
      term:
        id: HP:0001423
        label: X-linked dominant inheritance
    expressivity: VARIABLE
    evidence:
    - reference: ORPHA:778
      reference_title: "Rett syndrome (Orphanet structured-database record)"
      supports: SUPPORT
      evidence_source: OTHER
      snippet: "X-linked dominant"
      explanation: Orphanet's inheritance section independently supports X-linked dominant inheritance for Rett syndrome.
  notes: >
    X-linked dominant MECP2 disorder that almost exclusively affects females;
    most classic cases are de novo. Disease severity varies by recurrent
    mutation class and by X-chromosome inactivation context.
  variants:
  - name: MECP2 methyl-binding-domain missense variants
    clinical_significance: PATHOGENIC
    description: >
      Recurrent missense variants in the methyl-binding domain impair MeCP2 DNA
      binding and show variant-specific severity effects.
    evidence:
    - reference: PMID:10508514
      reference_title: "Rett syndrome is caused by mutations in X-linked MECP2, encoding methyl-CpG-binding protein 2."
      supports: SUPPORT
      evidence_source: HUMAN_CLINICAL
      snippet: "In 5 of 21 sporadic patients, we found 3 de novo missense mutations in the region encoding the highly conserved methyl-binding domain (MBD) as well as a de novo frameshift and a de novo nonsense mutation"
      explanation: Establishes methyl-binding-domain missense variants as Rett-causing MECP2 variants.
    - reference: PMID:18337588
      reference_title: "Specific mutations in methyl-CpG-binding protein 2 confer different severity in Rett syndrome."
      supports: SUPPORT
      evidence_source: HUMAN_CLINICAL
      snippet: "Participants with the R133C mutation are less severely affected than those with R168X or large DNA deletions (p < 0.05)."
      explanation: Shows a recurrent missense variant with relatively milder severity compared with truncating or deletion variants.
  - name: MECP2 truncating and large-deletion variants
    clinical_significance: PATHOGENIC
    description: >
      Nonsense, frameshift, and large-deletion variants can disrupt MeCP2
      transcriptional repression domains and are often associated with more
      severe clinical outcomes.
    evidence:
    - reference: PMID:10508514
      reference_title: "Rett syndrome is caused by mutations in X-linked MECP2, encoding methyl-CpG-binding protein 2."
      supports: SUPPORT
      evidence_source: HUMAN_CLINICAL
      snippet: "a de novo frameshift and a de novo nonsense mutation, both of which disrupt the transcription repression domain (TRD)."
      explanation: Original discovery paper documents truncating variants disrupting the transcription repression domain.
    - reference: PMID:18337588
      reference_title: "Specific mutations in methyl-CpG-binding protein 2 confer different severity in Rett syndrome."
      supports: SUPPORT
      evidence_source: HUMAN_CLINICAL
      snippet: "Likewise, individuals with the R168X mutation are more severely affected than those with R294X and late carboxy-terminal truncating mutations (p < 0.05)."
      explanation: Cohort genotype-phenotype analysis links truncating mutation class with severity differences.
  evidence:
  - reference: PMID:10508514
    reference_title: "Rett syndrome is caused by mutations in X-linked MECP2, encoding methyl-CpG-binding protein 2."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "we have identified mutations in the gene (MECP2 ) encoding X-linked methyl-CpG-binding protein 2 (MeCP2) as the cause of some cases of RTT"
    explanation: Original discovery paper identified MECP2 mutations as the cause of Rett syndrome.
  - reference: PMID:18337588
    reference_title: "Specific mutations in methyl-CpG-binding protein 2 confer different severity in Rett syndrome."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Specific mutations in MECP2 confer different severity."
    explanation: Establishes variable expressivity according to recurrent MECP2 mutation class.
  - reference: ORPHA:778
    reference_title: "Rett syndrome (Orphanet structured-database record)"
    supports: SUPPORT
    evidence_source: OTHER
    snippet: "MECP2 | methyl-CpG binding protein 2 | hgnc:6990 | Disease-causing germline mutation(s) in"
    explanation: Orphanet's gene table supports MECP2 as the disease-causing germline gene for Rett syndrome.
  - reference: CGGV:assertion_2df006ff-5ab4-4926-9b72-48909b09e608-2018-05-02T132629.570Z
