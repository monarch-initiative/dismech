treatments:
- name: Trofinetide
  description: >
    Oral synthetic glycine-proline-glutamate analog supported by a phase 3
    randomized trial for improvement in core Rett syndrome symptoms.
  treatment_term:
    preferred_term: pharmacotherapy
    term:
      id: MAXO:0000058
      label: pharmacotherapy
    therapeutic_agent:
    - preferred_term: trofinetide
      term:
        id: CHEBI:229599
        label: trofinetide
  target_phenotypes:
  - preferred_term: Autistic behavior
    term:
      id: HP:0000729
      label: Autistic behavior
  - preferred_term: Intellectual disability
    term:
      id: HP:0001249
      label: Intellectual disability
  target_mechanisms:
  - target: Reduced Synapse and Dendritic Spine Density
    treatment_effect: MODULATES
    description: >
      Trofinetide is an IGF-1-related tripeptide analog; IGF1 treatment in
      Rett patient-derived neurons increased glutamatergic synapse number,
      linking the drug class to the synaptic node in the pathograph.
    evidence:
    - reference: PMID:37291210
      reference_title: "Trofinetide for the treatment of Rett syndrome: a randomized phase 3 study."
      supports: SUPPORT
      evidence_source: HUMAN_CLINICAL
      snippet: "Trofinetide is a synthetic analog of glycine-proline-glutamate, the N-terminal tripeptide of the insulin-like growth factor 1 protein, and has demonstrated clinical benefit in phase 2 studies in Rett syndrome."
      explanation: Describes trofinetide as an IGF-1-related tripeptide analog and establishes the clinical rationale.
    - reference: PMID:21074045
      reference_title: "A model for neural development and treatment of Rett syndrome using human induced pluripotent stem cells."
      supports: PARTIAL
      evidence_source: IN_VITRO
      snippet: "We treated RTT-derived neurons carrying different MeCP2 mutations in culture with IGF1 and observed an increase in glutamatergic synapse number"
      explanation: Provides human cellular support that IGF1-related pharmacology can modulate the reduced synapse phenotype.
  evidence:
  - reference: PMID:37291210
    reference_title: "Trofinetide for the treatment of Rett syndrome: a randomized phase 3 study."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Significant improvement for trofinetide compared with placebo was observed for the coprimary efficacy endpoints, suggesting that trofinetide provides benefit in treating the core symptoms of Rett syndrome."
    explanation: Phase 3 randomized trial supports trofinetide benefit for core Rett syndrome symptoms.
  - reference: clinicaltrials:NCT04181723
    reference_title: "A Randomized, Double-Blind, Placebo-Controlled, Parallel-Group Study of Trofinetide for the Treatment of Girls and Women With Rett Syndrome"
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "To investigate the efficacy of treatment with oral trofinetide versus placebo in females with Rett syndrome"
    explanation: Trial registration documents the randomized oral trofinetide study in females with Rett syndrome.
