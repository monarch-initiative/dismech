mechanistic_hypotheses:
- hypothesis_group_id: canonical_mecp2_loss_transcriptional_synaptic_dysregulation_model
  hypothesis_label: Canonical MECP2 Loss / Transcriptional & Synaptic Dysregulation Model
  status: CANONICAL
  description: >-
    Rett syndrome is caused predominantly by de novo loss-of-function variants in MECP2 on Xq28 in
    heterozygous females (hemizygous males are typically neonatally lethal). MeCP2 is a methyl-CpG-
    binding nuclear protein that functions as a context-dependent transcriptional regulator
    (predominantly repressor of long, methylated genes) and a chromatin modifier, with highest
    expression in postmitotic neurons. MeCP2 loss disrupts the normal repression of long neuronal genes,
    dysregulates BDNF and other neurotrophin expression, and produces failure of postnatal synaptic and
    dendritic maturation. The resulting circuit dysfunction — affecting GABAergic interneurons,
    monoaminergic systems, and excitatory/inhibitory balance — drives the apparent developmental
    regression, loss of purposeful hand use, stereotypies, autonomic dysfunction, and epilepsy of Rett.
    Reversibility of the phenotype in conditional Mecp2 reactivation in mice, and gene-replacement (AAV-
    MECP2) and trofinetide (IGF-1 analogue) clinical-trial data, all corroborate MECP2-loss as the
    canonical, potentially reversible, pathogenic lesion.
  evidence:
  - reference: PMID:10508514
    reference_title: "Rett syndrome is caused by mutations in X-linked MECP2, encoding methyl-CpG-binding protein 2."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "we have identified mutations in the gene (MECP2 ) encoding X-linked methyl-CpG-binding protein 2 (MeCP2) as the cause of some cases of RTT"
    explanation: >
      Canonical mechanism reference used as the seed for the
      hypothesis-search deep-research run.
