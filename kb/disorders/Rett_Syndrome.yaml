- name: Loss of MeCP2 Epigenetic Regulation
  description: >
    MeCP2 normally binds methylated CpG dinucleotides and participates in
    transcriptional repression and activation. Loss or altered dosage of MeCP2
    changes neuronal gene-expression programs, providing the proximal molecular
    bridge from MECP2 mutation to downstream neurodevelopmental defects.
