biochemical:
- name: Elevated Vascular Endothelial Growth Factor (VEGF)
  notes: >-
    Markedly elevated serum or plasma VEGF is a hallmark biomarker and major
    diagnostic criterion, and generally correlates with disease activity.
  evidence:
  - reference: PMID:37732822
    reference_title: "POEMS syndrome: Update on diagnosis, risk-stratification, and management."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "The major criteria for the syndrome are polyradiculoneuropathy, clonal plasma cell disorder, sclerotic bone lesions, elevated vascular endothelial growth factor, and the presence of Castleman disease."
    explanation: >-
      Elevated VEGF is one of the major diagnostic criteria of POEMS syndrome.
  - reference: PMID:17629447
    reference_title: "[POEMS syndrome]."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "elevated levels of vascular endothelial growth factor (VEGF) appear to characterize it"
    explanation: >-
      Independent corroboration that elevated VEGF characterizes POEMS syndrome.
- name: Monoclonal Gammopathy (Lambda-Restricted)
  notes: >-
    The clonal plasma cell disorder produces a monoclonal immunoglobulin
    (M-protein), typically present in small quantities and characteristically of
    the lambda light-chain isotype; sensitive immunofixation is often required to
    detect it.
  evidence:
  - reference: PMID:17629447
    reference_title: "[POEMS syndrome]."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Consistent plasma cell disorders include a monoclonal component, often in small quantities with a lambda light chain isotype, and plasmacytoma, often solitary lesions."
    explanation: >-
      The monoclonal component is typically small-quantity and lambda-restricted,
      a characteristic feature of POEMS.
diagnosis:
- name: POEMS Diagnostic Criteria
  description: >
    Diagnosis requires three of the major criteria — two of which must be
    polyradiculoneuropathy and a clonal plasma cell disorder — plus at least one
    minor criterion.
  evidence:
  - reference: PMID:37732822
    reference_title: "POEMS syndrome: Update on diagnosis, risk-stratification, and management."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "The diagnosis of POEMS syndrome is made with three of the major criteria, two of which must include polyradiculoneuropathy and clonal plasma cell disorder, and at least one of the minor criteria."
    explanation: >-
      Defines the mandatory and supporting criteria for diagnosing POEMS
      syndrome.
differential_diagnoses:
- name: Chronic Inflammatory Demyelinating Polyradiculoneuropathy
  description: >
    CIDP is the most common misdiagnosis of POEMS syndrome because both present
    with a demyelinating polyneuropathy; the systemic features, sclerotic bone
    lesions, clonal plasma cells, and elevated VEGF distinguish POEMS.
  distinguishing_features:
  - POEMS has a clonal plasma cell disorder and markedly elevated VEGF; CIDP does not
  - Sclerotic bone lesions and multiorgan POEMS features are absent in CIDP
  evidence:
  - reference: PMID:31012139
    reference_title: "POEMS Syndrome: 2019 Update on diagnosis, risk-stratification, and management."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "most commonly chronic inflammatory demyelinating polyradiculoneuropathy"
    explanation: >-
      CIDP is identified as the most common neurologic disorder for which POEMS
      syndrome is mistaken.
- name: Castleman Disease Variant of POEMS
  description: >
    The Castleman disease variant of POEMS has no clonal plasma cell disorder and
    typically little to no peripheral neuropathy, but shares several minor
    criteria; it must be distinguished from classic POEMS.
  distinguishing_features:
  - Castleman-variant POEMS lacks a clonal plasma cell disorder
  - Castleman-variant POEMS has little to no peripheral neuropathy
  evidence:
  - reference: PMID:31012139
    reference_title: "POEMS Syndrome: 2019 Update on diagnosis, risk-stratification, and management."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "POEMS syndrome should be distinguished from the Castleman disease variant of POEMS syndrome, which has no clonal PCD and typically little to no peripheral neuropathy"
    explanation: >-
      Distinguishes classic POEMS from its Castleman disease variant.
treatments:
- name: Radiation Therapy
  description: >
    For patients with a dominant plasmacytoma (localized sclerotic bone lesion),
    first-line treatment is irradiation of the lesion.
  action_category: THERAPEUTIC
  treatment_term:
    preferred_term: radiation therapy
    term:
      id: MAXO:0000014
      label: radiation therapy
  evidence:
  - reference: PMID:37732822
    reference_title: "POEMS syndrome: Update on diagnosis, risk-stratification, and management."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "For those patients with a dominant plasmacytoma, first-line therapy is irradiation."
    explanation: >-
      Radiation is first-line therapy for POEMS with a dominant plasmacytoma.
- name: Alkylator and Lenalidomide-Based Systemic Therapy
  description: >
    For diffuse sclerotic lesions or disseminated marrow involvement, systemic
    therapy is used; alkylating agents and lenalidomide are the mainstays, given
    as low-dose conventional therapy or as high-dose conditioning for autologous
    stem cell transplantation. Corticosteroids are only temporizing.
  action_category: THERAPEUTIC
  therapeutic_modality: SMALL_MOLECULE
  treatment_term:
    preferred_term: Pharmacotherapy
    term:
      id: NCIT:C15986
      label: Pharmacotherapy
    therapeutic_agent:
    - preferred_term: lenalidomide
      term:
        id: CHEBI:63791
        label: lenalidomide
  evidence:
  - reference: PMID:37732822
    reference_title: "POEMS syndrome: Update on diagnosis, risk-stratification, and management."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Corticosteroids are temporizing, but alkylators and lenalidomide are the mainstays of treatment"
    explanation: >-
      Alkylators and lenalidomide are the mainstays of systemic therapy for POEMS
      syndrome.
discussions:
- discussion_id: gap_poems_pathogenesis
  prompt: >-
    What are the molecular mechanisms linking the clonal plasma cell disorder to
    VEGF overproduction and the multisystem manifestations of POEMS syndrome,
    given that its pathogenesis is not well understood?
  kind: KNOWLEDGE_GAP
  status: OPEN
  attaches_to:
  - pathophysiology#VEGF Overproduction
  rationale: >-
    Elevated VEGF is central and a diagnostic criterion, but the precise
    mechanism connecting the plasma cell clone to VEGF excess and to features
    such as neuropathy and organomegaly remains incompletely understood, which is
    why risk stratification relies on clinical phenotype rather than molecular
    markers.
  evidence:
  - reference: PMID:37732822
    reference_title: "POEMS syndrome: Update on diagnosis, risk-stratification, and management."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Because the pathogenesis of the syndrome is not well understood, risk stratification is limited to clinical phenotype rather than specific molecular markers."
    explanation: >-
      Authors state that POEMS pathogenesis is not well understood, limiting
      molecular risk stratification.
