name: POEMS Syndrome
creation_date: "2026-06-19T00:00:00Z"
category: Complex
disease_term:
  preferred_term: POEMS syndrome
  term:
    id: MONDO:0017364
    label: POEMS syndrome
parents:
  - paraneoplastic syndrome
  - plasma cell disorder
  - rare disease
synonyms:
  - Crow-Fukase syndrome
  - Takatsuki syndrome
  - PEP syndrome
description: >
  POEMS syndrome is a rare, life-threatening paraneoplastic multisystem disorder
  arising from an underlying clonal plasma cell neoplasm. Its name is an acronym
  for its principal features — Polyneuropathy, Organomegaly, Endocrinopathy,
  Monoclonal plasma cell disorder, and Skin changes — but the defining diagnostic
  features are a chronic polyradiculoneuropathy, a clonal plasma cell disorder,
  sclerotic bone lesions, markedly elevated vascular endothelial growth factor
  (VEGF), and an association with Castleman disease. VEGF overproduction drives
  vascular hyperpermeability and the characteristic multiorgan manifestations.
pathophysiology:
- name: Clonal Plasma Cell Neoplasm
  description: >
    POEMS syndrome is a paraneoplastic disorder driven by an underlying clonal
    plasma cell neoplasm (most often a lambda-restricted monoclonal plasma cell
    proliferation), the upstream lesion of the disease.
  cell_types:
  - preferred_term: plasma cell
    term:
      id: CL:0000786
      label: plasma cell
  evidence:
  - reference: PMID:37732822
    reference_title: "POEMS syndrome: Update on diagnosis, risk-stratification, and management."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "POEMS syndrome is a life-threatening condition due to an underlying plasma cell neoplasm."
    explanation: >-
      Establishes the underlying clonal plasma cell neoplasm as the cause of
      POEMS syndrome.
  downstream:
  - target: VEGF Overproduction
    causal_link_type: DIRECT
    description: >-
      The clonal plasma cell disorder is associated with marked overproduction of
      vascular endothelial growth factor.
- name: VEGF Overproduction
  description: >
    Markedly elevated vascular endothelial growth factor (VEGF) is a hallmark and
    major diagnostic criterion of POEMS syndrome and is central to its
    pathophysiology.
  biological_processes:
  - preferred_term: Vascular endothelial growth factor production
    term:
      id: GO:0010573
      label: vascular endothelial growth factor production
    modifier: INCREASED
  evidence:
  - reference: PMID:37732822
    reference_title: "POEMS syndrome: Update on diagnosis, risk-stratification, and management."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "The major criteria for the syndrome are polyradiculoneuropathy, clonal plasma cell disorder, sclerotic bone lesions, elevated vascular endothelial growth factor, and the presence of Castleman disease."
    explanation: >-
      Elevated VEGF is one of the major diagnostic criteria and a central
      pathogenic factor.
  downstream:
  - target: Vascular Hyperpermeability and Multiorgan Disease
    causal_link_type: DIRECT
    description: >-
      VEGF excess increases vascular permeability and angiogenesis, producing the
      multiorgan features.
- name: Vascular Hyperpermeability and Multiorgan Disease
  description: >
    VEGF-driven increased vascular permeability and angiogenesis underlie the
    extravascular volume overload (edema, effusions, ascites), organomegaly, and
    the broader multisystem manifestations of POEMS syndrome.
  biological_processes:
  - preferred_term: Regulation of vascular permeability
    term:
      id: GO:0043114
      label: regulation of vascular permeability
    modifier: INCREASED
  evidence:
  - reference: PMID:37732822
    reference_title: "POEMS syndrome: Update on diagnosis, risk-stratification, and management."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Minor features include organomegaly, endocrinopathy, characteristic skin changes, papilledema, extravascular volume overload, and thrombocytosis."
    explanation: >-
      The multiorgan features, including extravascular volume overload from
      vascular hyperpermeability, characterize the systemic disease.
