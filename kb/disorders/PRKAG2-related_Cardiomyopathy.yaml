prevalence:
- population: Patients with hypertrophic cardiomyopathy and premature sinoatrial or atrioventricular conduction disease
  percentage: 1%
  notes: >-
    No stable population prevalence estimate was identified in the reviewed
    PRKAG2 literature. In a targeted hypertrophic cardiomyopathy subgroup
    enriched for premature conduction disease, PRKAG2 syndrome accounted for
    about 1% of cases.
  evidence:
  - reference: PMID:26729852
    reference_title: "Clinical Spectrum of PRKAG2 Syndrome."
    supports: SUPPORT
    evidence_source: OTHER
    snippet: One study identified PS in 1 of 100 subjects affected by hypertrophic cardiomyopathy (HCM) with premature sinoatrial or atrio-ventricular conduction disease (1%).7
    explanation: This review cites the clearest enriched-cohort estimate for how often PRKAG2 syndrome appears among hypertrophic cardiomyopathy cases with premature conduction disease.
- population: Patients with left ventricular hypertrophy and pre-excitation on ECG
  percentage: 29%
  notes: >-
    In an electrocardiographically enriched subgroup with both left ventricular
    hypertrophy and pre-excitation, PRKAG2 syndrome accounted for nearly one
    third of genetically confirmed cases.
  evidence:
  - reference: PMID:26729852
    reference_title: "Clinical Spectrum of PRKAG2 Syndrome."
    supports: SUPPORT
    evidence_source: OTHER
    snippet: Arad et al. found genetically confirmed PS in 7 of 24 patients (29%) among a subgroup with both left ventricular hypertrophy (LVH) and pre-excitation on ECG.10
    explanation: This review-derived subgroup estimate shows that PRKAG2 syndrome is strongly enriched among patients with combined left ventricular hypertrophy and ventricular preexcitation.
