    reference_title: "Integrative Analysis of PRKAG2 Cardiomyopathy iPS and Microtissue Models Identifies AMPK as a Regulator of Metabolism, Survival, and Fibrosis."
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: Unlike most other forms of LVH including HCM, PRKAG2 cardiomyopathy is distinguished by a remarkable absence of myocardial fibrosis.
    explanation: This mechanistic study highlights the low-fibrosis phenotype that distinguishes PRKAG2 cardiomyopathy from sarcomeric hypertrophic cardiomyopathy.
  - reference: PMID:28009297
    reference_title: "Integrative Analysis of PRKAG2 Cardiomyopathy iPS and Microtissue Models Identifies AMPK as a Regulator of Metabolism, Survival, and Fibrosis."
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: Attenuated TGFβ signaling, that we identified in both iPS-CMs and mouse models of PRKAG2 cardiomyopathy, appears to account for the absence in fibrosis.
    explanation: Reduced TGF-beta signaling provides a mechanistic explanation for the relative paucity of fibrosis in PRKAG2-mutant hearts.
phenotypes:
