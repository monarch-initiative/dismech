name: PRKAG2-related cardiomyopathy
creation_date: '2026-04-12T22:29:21Z'
updated_date: '2026-04-12T22:52:03Z'
description: >-
  PRKAG2-related cardiomyopathy, also referred to as PRKAG2 cardiac syndrome,
  is an autosomal dominant metabolic cardiomyopathy caused by pathogenic
  variants in PRKAG2, which encodes the gamma-2 regulatory subunit of
  AMP-activated protein kinase (AMPK). The disorder combines left ventricular
  hypertrophy, ventricular preexcitation, and progressive conduction system
  disease, and differs from sarcomeric hypertrophic cardiomyopathy through its
  glycogen storage phenotype and its relative paucity of myocardial fibrosis
  before end-stage disease.
category: Genetic
synonyms:
- PRKAG2 cardiac syndrome
- PRKAG2 syndrome
- PRKAG2 cardiomyopathy
- hypertrophic cardiomyopathy 6
