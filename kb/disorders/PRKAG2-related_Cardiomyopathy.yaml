  evidence:
  - reference: PMID:26729852
    reference_title: "Clinical Spectrum of PRKAG2 Syndrome."
    supports: SUPPORT
    evidence_source: OTHER
    snippet: PRKAG2 syndrome (PS) is a rare, early-onset autosomal dominant inherited disease, characterized by ventricular pre-excitation, supraventricular arrhythmias and cardiac hypertrophy.
    explanation: This review provides the canonical inheritance framing for PRKAG2 syndrome and summarizes the core cardiac phenotype.
genetic:
- name: PRKAG2 activating variants
  gene_term:
    preferred_term: PRKAG2
    term:
      id: hgnc:9386
      label: PRKAG2
  association: Causative
  inheritance:
  - name: Autosomal dominant
  features: >-
    Disease-causing alleles are predominantly missense variants in the
    PRKAG2-encoded gamma-2 AMPK regulatory subunit, with rarer in-frame
    insertion alleles. Recurrent variants include Arg302Gln and Asn488Ile,
    but multiple additional CBS/Bateman-domain substitutions have also been
    reported.
  evidence:
  - reference: PMID:11371514
    reference_title: "Mutations in the gamma(2) subunit of AMP-activated protein kinase cause familial hypertrophic cardiomyopathy: evidence for the central role of energy compromise in disease pathogenesis."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: We now describe mutations in PRKAG2, encoding the gamma(2) subunit of AMP-activated protein kinase (AMPK), in two families with severe HCM and aberrant conduction from atria to ventricles in some affected individuals (pre-excitation or Wolff-Parkinson-White syndrome).
    explanation: This landmark familial study established PRKAG2 variants as the causal lesion linking hypertrophy and aberrant atrioventricular conduction.
  - reference: PMID:26729852
    reference_title: "Clinical Spectrum of PRKAG2 Syndrome."
    supports: SUPPORT
    evidence_source: OTHER
    snippet: "PRKAG2 mutations inheritance pattern is autosomal dominant. Almost all studies report missense mutations.5, 7-21 Only Blair et al. documented an insertion mutation (Exon 5:InsLeu).8"
    explanation: The clinical review summarizes the characteristic PRKAG2 allelic spectrum captured by the G2P row for this disorder.
pathophysiology:
- name: Dysregulated AMPK signaling and metabolic remodeling
  description: >-
    Pathogenic PRKAG2 variants alter the gamma-2 regulatory subunit of AMPK
    and reprogram cardiomyocyte metabolism toward glycogen storage and oxidative
    metabolism. This creates a metabolic cardiomyopathy that phenocopies
    hypertrophic cardiomyopathy while retaining a distinct conduction and
    fibrosis profile.
