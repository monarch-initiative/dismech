    supports: SUPPORT
    evidence_source: OTHER
    snippet: In humans, AMPK dysfunction alters the myocyte glucidic uptake and metabolism causing the deposition of glycogen and amylopectin, as seen in glycogen storage cardiomyopathies.
    explanation: The clinical review summarizes the human metabolic lesion as abnormal glycogen accumulation in cardiomyocytes.
  - reference: PMID:26729852
    reference_title: "Clinical Spectrum of PRKAG2 Syndrome."
    supports: SUPPORT
    evidence_source: OTHER
    snippet: During cardiogenesis, the disruption of the annulus fibrosus by glycogen-filled myocytes interferes with the normal atrio-ventricular septation, and can lead the way to ventricular pre-excitation and reciprocating arrhythmias.
    explanation: This mechanistic review links glycogen-filled cardiomyocytes to annulus fibrosus maldevelopment, accessory pathways, and ventricular preexcitation.
  downstream:
  - target: Ventricular preexcitation
    description: Accessory atrioventricular connections predispose to Wolff-Parkinson-White physiology and reciprocating tachyarrhythmias.
  - target: Atrioventricular block and bradycardia
    description: Progressive conduction tissue dysfunction produces advanced heart block, sinus node dysfunction, and chronotropic incompetence.
- name: Increased insulin-AKT signaling drives cardiomyocyte hypertrophy
  description: >-
    PRKAG2-mutant cardiomyocytes show increased insulin-AKT signaling that
    promotes hypertrophic growth and helps drive left ventricular wall
    thickening.
  cell_types:
