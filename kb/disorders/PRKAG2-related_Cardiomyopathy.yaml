    snippet: Mutant iPS-CMs also had increased insulin signaling, a recognized hypertrophic signal, as supported by increased AKT phosphorylation at threonine 308 (fig. 1G).
    explanation: Human iPSC-derived cardiomyocytes show that PRKAG2 mutations activate an insulin-AKT hypertrophic program.
  downstream:
