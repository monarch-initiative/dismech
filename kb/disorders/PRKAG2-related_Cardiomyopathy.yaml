    snippet: "After a median follow-up period of 6 years (IQR: 2.3 to 13.9 years), 71% of subjects had LVH, 29% had AF, 21% required de novo pacemakers (median age at implantation 37 years; IQR: 29 to 48 years), 14% required admission for heart failure, 8% experienced sudden cardiac death or equivalent, 4% required heart transplantation, and 13% died."
