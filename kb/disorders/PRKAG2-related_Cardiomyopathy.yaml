- name: Attenuated TGF-beta signaling limits myocardial fibrosis
  description: >-
    PRKAG2 cardiomyopathy shows reduced TGF-beta-dependent fibrotic signaling,
    which helps explain why myocardial fibrosis is relatively limited before
    end-stage disease.
