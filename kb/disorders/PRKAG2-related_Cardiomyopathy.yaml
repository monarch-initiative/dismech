    reference_title: "Integrative Analysis of PRKAG2 Cardiomyopathy iPS and Microtissue Models Identifies AMPK as a Regulator of Metabolism, Survival, and Fibrosis."
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: Missense mutations in the regulatory subunit, PRKAG2, activate AMPK and cause left ventricular hypertrophy, glycogen accumulation, and ventricular pre-excitation.
    explanation: Patient-derived and engineered cardiomyocyte models show that pathogenic PRKAG2 alleles act through AMPK activation and reproduce the defining metabolic and electrophysiologic phenotype.
  - reference: PMID:28009297
    reference_title: "Integrative Analysis of PRKAG2 Cardiomyopathy iPS and Microtissue Models Identifies AMPK as a Regulator of Metabolism, Survival, and Fibrosis."
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: PRKAG2 mutations that activate AMPK remodeled global metabolism by regulating RNA transcripts to favor glycogen storage and oxidative metabolism instead of glycolysis.
    explanation: This study directly links pathogenic PRKAG2 alleles to transcriptionally coordinated metabolic remodeling toward glycogen storage and oxidative metabolism.
  downstream:
  - target: Glycogen-filled cardiomyocytes disrupt atrioventricular insulation
    description: Abnormal glycogen handling produces glycogen-laden myocytes that contribute to preexcitation and conduction disease.
  - target: Increased insulin-AKT signaling drives cardiomyocyte hypertrophy
    description: Activated AMPK increases insulin-AKT signaling and promotes hypertrophic cardiomyocyte growth.
  - target: Attenuated TGF-beta signaling limits myocardial fibrosis
    description: Activated AMPK suppresses profibrotic signaling and contributes to the low-fibrosis phenotype.
- name: Glycogen-filled cardiomyocytes disrupt atrioventricular insulation
  description: >-
    In human PRKAG2 syndrome, altered glucose handling produces glycogen-filled
    cardiomyocytes that disrupt the annulus fibrosus and normal
    atrioventricular insulation. This developmental and structural defect
    creates accessory pathways, ventricular preexcitation, and a substrate for
    progressive conduction-system disease.
