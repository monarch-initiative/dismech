mechanistic_hypotheses:
- hypothesis_group_id: canonical_ids_deficiency_gag_lysosomal_storage_model
  hypothesis_label: Canonical IDS Deficiency / Glycosaminoglycan Lysosomal Storage Model
  status: CANONICAL
  description: >-
    Mucopolysaccharidosis type II (Hunter syndrome) is an X-linked lysosomal storage disorder caused by
    loss-of-function variants in IDS encoding iduronate-2-sulfatase (I2S). Loss of I2S activity prevents
    lysosomal degradation of heparan sulfate and dermatan sulfate, producing pathological
    glycosaminoglycan accumulation in lysosomes of fibroblasts, hepatocytes, cardiomyocytes,
    chondrocytes, neurons, and other cell types. Substrate accumulation drives progressive coarsening of
    features, skeletal dysplasia (dysostosis multiplex), hepatosplenomegaly, cardiac valvular and
    myocardial disease, airway obstruction, and (in neuronopathic forms) progressive CNS regression.
    Enzyme replacement therapy (idursulfase) and intrathecal / CSF-delivered ERT, HSCT, and gene therapy
    (AAV-IDS) all corroborate the IDS-deficiency / GAG-accumulation axis as the canonical pathogenic
    mechanism.
  notes: >-
    Retained as CANONICAL with important CNS scope
    limits. The 2026 falcon hypothesis-search report
    (kb/hypotheses/Hunter_syndrome/canonical_ids_deficiency_gag_lysosomal_storage_model;
    openscientist timed out at 3600s) finds SUPPORTED. The core
    causal axis — IDS loss-of-function → reduced iduronate-2-
    sulfatase (I2S) activity → impaired lysosomal heparan
    sulfate / dermatan sulfate degradation → multisystem GAG
    accumulation — is strongly supported by human cell models,
    mouse models with pathogenic IDS variants, and therapeutic
    rescue. Two important qualifications: (1) standard IV ERT
    (idursulfase) does NOT cross the blood-brain barrier
    sufficiently — it does not reliably reduce CSF HS or improve
    neurocognition; CNS benefit requires intrathecal / CSF
    delivery or BBB-penetrant fusion designs (e.g.,
    pabinafusp alfa fused to anti-TfR antibody, intravenously
    delivered); (2) even with BBB-penetrant ERT, clinical
    cognitive outcomes are heterogeneous and measurement-
    limited, suggesting downstream neurodegenerative cascades
    (microglial activation, neuroinflammation) may continue
    independent of substrate normalization in advanced
    neuronopathic disease. HSCT and AAV-IDS gene therapy
    approaches in trials further validate the IDS-deficiency /
    GAG-accumulation axis but face the same CNS-delivery
    challenge for severe (Hunter A) neuronopathic patients.
  evidence:
  - reference: PMID:25345092
    reference_title: "Hunter syndrome."
    supports: SUPPORT
