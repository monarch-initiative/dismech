    snippet: "Severely affected infants present in the neonatal period with severe hypoglycemia due to fasting intolerance. More commonly, untreated infants present at age three to four months with hepatomegaly, severe hypoglycemia with or without seizures, lactic acidosis, hyperuricemia, and hypertriglyceridemia."
    explanation: GeneReviews confirms fasting hypoglycemia as a cardinal feature of GSD I.
