    snippet: "Glycogen storage disease type I (GSD I) is characterized by accumulation
      of glycogen and fat in the liver and kidneys resulting in hepatomegaly and
      nephromegaly. Severely affected infants present in the neonatal period with
      severe hypoglycemia due to fasting intolerance."
    explanation: GeneReviews entry describes the core metabolic pathophysiology of
      GSD I including glycogen and fat accumulation and fasting hypoglycemia.
  - reference: PMID:29663270
    reference_title: "Molecular biology and gene therapy for glycogen storage disease type Ib."
    supports: SUPPORT
    evidence_source: MODEL_ORGANISM
    snippet: "In gluconeogenic organs, functional coupling of G6PT and G6Pase-α is
      required to maintain interprandial blood glucose homeostasis."
    explanation: Review explains how G6PT/G6Pase-alpha coupling is required for
      glucose production between meals.
- name: Secondary metabolic derangements
  description: >
    The block in glucose-6-phosphate hydrolysis leads to accumulation of metabolic
    intermediates, resulting in several secondary biochemical abnormalities. Excess
    glucose-6-phosphate is shunted into glycolysis, producing excess pyruvate and
    lactate (lactic acidosis). Increased acetyl-CoA flux drives de novo lipogenesis,
    causing hypertriglyceridemia and hypercholesterolemia. Accelerated purine
    degradation from excess glucose-6-phosphate metabolism, combined with decreased
    renal urate clearance due to competitive inhibition by lactate, leads to
    hyperuricemia.
  cell_types:
  - preferred_term: Hepatocyte
    term:
      id: CL:0000182
      label: hepatocyte
  biological_processes:
  - preferred_term: Gluconeogenesis
    term:
      id: GO:0006094
      label: gluconeogenesis
