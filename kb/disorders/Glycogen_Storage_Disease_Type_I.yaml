- name: Liver transplantation
  description: >
    Definitive therapy for patients with multiple or progressive hepatic adenomas
    refractory to medical management, or with evidence of malignant transformation.
    Liver transplantation corrects the hepatic metabolic defect.
  treatment_term:
    preferred_term: liver transplantation
    term:
      id: MAXO:0001175
      label: liver transplantation
  evidence:
  - reference: PMID:12373570
    reference_title: "Glycogen storage disease type I: pathophysiology of liver adenomas."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Surgery (partial hepatectomy or orthotopic liver transplantation) is
      the definitive therapy for these tumours"
    explanation: Review confirms liver transplantation as definitive therapy for
      hepatic adenomas in GSD I.
- name: Citrate supplementation
  description: >
    Citrate supplementation to prevent urinary calculi or ameliorate
    nephrocalcinosis in patients with renal involvement.
  treatment_term:
    preferred_term: citrate supplementation
    term:
      id: MAXO:0000088
      label: dietary intervention
  evidence:
  - reference: PMID:20301489
    reference_title: "Glycogen Storage Disease Type I."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "citrate supplementation to prevent urinary calculi or ameliorate
      nephrocalcinosis"
    explanation: GeneReviews recommends citrate supplementation for renal
      complications.
- name: Kidney transplantation
  description: >
    Kidney transplantation for patients who progress to end-stage kidney
    disease despite medical management. May be combined with liver transplant
    when needed.
  treatment_term:
    preferred_term: kidney transplantation
    term:
      id: MAXO:0010039
      label: organ transplantation
  evidence:
  - reference: PMID:20301489
    reference_title: "Glycogen Storage Disease Type I."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "kidney transplantation for end-stage kidney disease, and combined
      kidney and liver transplant when needed."
    explanation: GeneReviews recommends kidney transplantation for end-stage
      kidney disease.
- name: Gene therapy (investigational)
  description: >
    Adeno-associated virus (AAV)-based gene therapy is under investigation for both
    GSD Ia and GSD Ib. Preclinical studies in mouse models demonstrate that liver-directed
    gene transfer corrects metabolic abnormalities and prevents hepatocellular adenoma
    development.
  treatment_term:
    preferred_term: gene therapy
    term:
      id: MAXO:0001001
      label: gene therapy
  evidence:
  - reference: PMID:29663270
    reference_title: "Molecular biology and gene therapy for glycogen storage disease type Ib."
    supports: SUPPORT
    evidence_source: MODEL_ORGANISM
    snippet: "The results demonstrate that the liver-directed gene transfer and
      expression safely corrects metabolic abnormalities and prevents hepatocellular
      adenoma (HCA) development."
    explanation: Preclinical study demonstrates efficacy of AAV gene therapy in
      murine GSD Ib.
- name: Genetic counseling
  description: >
    Carrier testing for at-risk family members, prenatal testing for pregnancies at
    increased risk, and preimplantation genetic testing are possible when pathogenic
    variants have been identified.
  treatment_term:
    preferred_term: genetic counseling
    term:
      id: MAXO:0000079
      label: genetic counseling
  evidence:
  - reference: PMID:20301489
    reference_title: "Glycogen Storage Disease Type I."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Carrier testing for at-risk family members, prenatal testing for a
      pregnancy at increased risk, and preimplantation genetic testing are possible
      if both pathogenic variants have been identified in an affected family member."
    explanation: GeneReviews describes genetic counseling and testing options.
animal_models:
- species: Mouse
  genotype: G6pt-/-
  genes:
  - preferred_term: SLC37A4
  description: >
    G6PT knockout mouse model recapitulates the metabolic and immune manifestations
    of GSD Ib including impaired glucose homeostasis, neutropenia, and neutrophil
    dysfunction. Used to delineate pathophysiology and develop gene therapy.
  evidence:
  - reference: PMID:29663270
    reference_title: "Molecular biology and gene therapy for glycogen storage disease type Ib."
    supports: SUPPORT
    evidence_source: MODEL_ORGANISM
    snippet: "A G6pt knockout mouse model is being exploited to delineate the
      pathophysiology of GSD-Ib and develop new clinical treatment options,
      including gene therapy."
    explanation: Description of the G6pt knockout mouse model for GSD Ib research.
