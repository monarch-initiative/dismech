name: Glycogen Storage Disease Type I
creation_date: '2026-03-08T12:00:00Z'
updated_date: '2026-03-08T18:00:00Z'
category: Mendelian
description: >
  Glycogen storage disease type I (GSD I), also known as von Gierke disease, is an
  autosomal recessive disorder of glucose metabolism caused by deficiency of the
  glucose-6-phosphatase system. GSD Ia results from mutations in G6PC1 encoding the
  catalytic subunit glucose-6-phosphatase-alpha, while GSD Ib results from mutations
  in SLC37A4 encoding the glucose-6-phosphate transporter (G6PT). Both subtypes lead
  to impaired hydrolysis of glucose-6-phosphate to glucose, blocking the final step
  of both glycogenolysis and gluconeogenesis, resulting in fasting hypoglycemia,
  hepatomegaly, nephromegaly, lactic acidosis, hyperlipidemia, and hyperuricemia.
  GSD Ib additionally features neutropenia and neutrophil dysfunction leading to
  recurrent infections and inflammatory bowel disease.
