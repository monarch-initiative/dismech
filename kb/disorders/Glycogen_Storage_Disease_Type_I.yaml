- name: Hepatocellular adenoma development
  description: >
    Hepatocellular adenomas are a major long-term complication of GSD I, occurring
    in 22-75% of affected adults. The adenomas develop typically in post-pubertal
    patients and carry an approximately 10% risk of malignant transformation to
    hepatocellular carcinoma. The pathogenesis is multifactorial and may involve
    chronic metabolic stress, altered hepatocyte growth signaling, and hormonal
    influences. Better dietary management and metabolic control appear to reduce
    adenoma incidence.
  cell_types:
  - preferred_term: Hepatocyte
    term:
      id: CL:0000182
      label: hepatocyte
  evidence:
  - reference: PMID:12373570
    reference_title: "Glycogen storage disease type I: pathophysiology of liver adenomas."
    supports: SUPPORT
    evidence_source: OTHER
    snippet: "Hepatic adenomas occur in 22%-75% of affected adults, according to the population studied, and from those reported in the literature are thought to have an approximately 10% risk of undergoing malignant transformation."
    explanation: Review of GSD I hepatic adenomas documents prevalence and malignant transformation risk.
  - reference: PMID:12373570
    reference_title: "Glycogen storage disease type I: pathophysiology of liver adenomas."
    supports: SUPPORT
    evidence_source: OTHER
    snippet: "the incidence of liver tumours in younger adults seems less than in older ones, suggesting that better dietary treatment, and thus improved metabolic control, may be protective."
    explanation: Evidence that improved metabolic control reduces hepatic adenoma development.
  downstream:
  - target: Hepatocellular adenoma
    description: Adenoma development is the neoplastic phenotype produced by this long-term hepatic complication.
    causal_link_type: DIRECT
    evidence:
    - reference: PMID:12373570
      reference_title: "Glycogen storage disease type I: pathophysiology of liver adenomas."
      supports: SUPPORT
      evidence_source: OTHER
      snippet: "Hepatic adenomas occur in 22%-75% of\naffected adults"
      explanation: This review directly supports hepatic adenomas as the neoplastic phenotype of this GSD I complication.
