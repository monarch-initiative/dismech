  - reference: PMID:26001652
    reference_title: "Hepatic glycogen storage disorders: what have we learned in recent years?"
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Evidence accumulates that poor metabolic control is a risk factor for
      the development of long-term complications, such as liver adenomas, low bone
      density/osteoporosis, and kidney disease in GSD I."
    explanation: Review confirms that secondary metabolic derangements from poor
      metabolic control drive long-term complications.
- name: Neutropenia and neutrophil dysfunction in GSD Ib
  description: >
    In GSD Ib, deficiency of the ubiquitously expressed glucose-6-phosphate
    transporter (G6PT) impairs neutrophil energy homeostasis. Neutrophils express
    the G6PT/G6Pase-beta complex, which produces endogenous glucose for neutrophil
    function. Loss of G6PT activity leads to enhanced endoplasmic reticulum stress,
    oxidative stress, and apoptosis, underlying the neutropenia and neutrophil
    dysfunction characteristic of GSD Ib. This manifests as recurrent bacterial
    infections, oral and intestinal ulcers, and inflammatory bowel disease.
  gene:
    preferred_term: SLC37A4
    description: Solute carrier family 37 member 4, encoding the glucose-6-phosphate
      transporter (G6PT) that translocates glucose-6-phosphate from the cytoplasm
      into the endoplasmic reticulum lumen.
    modifier: DECREASED
    term:
      id: hgnc:11023
      label: SLC37A4
