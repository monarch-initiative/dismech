    snippet: "Glycogen storage disease type Ib (GSD-Ib) is an autosomal recessive disorder characterized by hypoglycemia, excessive glycogen accumulation in the liver and kidney, neutropenia, neutrophil dysfunction, and inflammatory bowel disease. GSD-Ib is caused by a deficiency of glucose-6-phosphate transporter (G6PT)."
    explanation: Review confirms that G6PT deficiency in GSD Ib causes both metabolic and immune manifestations including neutropenia and IBD.
  downstream:
  - target: Neutropenia (GSD Ib)
