treatments:
- name: Uncooked cornstarch therapy
  description: >
    Dietary management with frequent meals of uncooked cornstarch (a slow-release
    glucose polymer) is the cornerstone of GSD I treatment. Cornstarch provides a
    sustained source of glucose to prevent fasting hypoglycemia. Patients require
    multiple doses per day including overnight. Combined with avoidance of fructose,
    galactose, and sucrose. Optimal metabolic control reduces long-term complications.
  treatment_term:
    preferred_term: dietary intervention
    term:
      id: MAXO:0000088
      label: dietary intervention
  target_mechanisms:
  - target: Impaired glucose-6-phosphate hydrolysis and fasting hypoglycemia
    treatment_effect: BYPASSES
    description: Cornstarch supplies a sustained exogenous glucose source around the endogenous fasting glucose-release block.
    evidence:
    - reference: PMID:20301489
      reference_title: "Glycogen Storage Disease Type I."
      supports: SUPPORT
      evidence_source: OTHER
      snippet: "Uncooked cornstarch alternating with frequent meals and snacks high in complex carbohydrates as directed by a metabolic specialist and metabolic dietitian to maintain normal blood glucose levels, prevent hypoglycemia, and provide optimal nutrition for growth and development."
      explanation: GeneReviews supports cornstarch therapy as a bypass for the fasting hypoglycemia mechanism.
  evidence:
  - reference: PMID:12373568
    reference_title: "Effect of continuous glucose therapy with uncooked cornstarch on the long-term clinical course of type 1a glycogen storage disease."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "The achievement of optimal biochemical control of glycogen storage disease type 1a continues to be a challenge, but is attainable by meticulous adherence to an individualized dietary regimen based on the results of periodic metabolic evaluation and home blood glucose monitoring."
    explanation: Long-term study demonstrates that cornstarch-based dietary therapy can achieve metabolic control, though it remains challenging.
