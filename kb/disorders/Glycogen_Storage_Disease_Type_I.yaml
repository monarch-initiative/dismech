      label: Autosomal recessive inheritance
  description: >
    GSD I is inherited in an autosomal recessive manner. If both parents are known
    to be heterozygous for a GSD I-causing pathogenic variant, each sibling of an
    affected individual has a 25% chance of being affected, a 50% chance of being
    an asymptomatic carrier, and a 25% chance of being unaffected and not a carrier.
  evidence:
  - reference: PMID:20301489
    reference_title: "Glycogen Storage Disease Type I."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "GSD I is inherited in an autosomal recessive manner. If both parents
      are known to be heterozygous for a GSD I-causing pathogenic variant, each sib
      of an affected individual has at conception a 25% chance of being affected,
      a 50% chance of being an asymptomatic carrier, and a 25% chance of being
      unaffected and not a carrier."
    explanation: GeneReviews entry confirms autosomal recessive inheritance pattern
      for GSD I.
prevalence:
- population: Live births
  percentage: 1 in 100,000
  notes: >-
    Exact prevalence is not well established, but Orphanet's review reports an
    annual incidence around 1 in 100,000 births and notes that GSD Ia accounts
    for most cases.
  evidence:
  - reference: PMID:21599942
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Glucose-6-phosphatase deficiency (G6P deficiency), or glycogen storage disease type I (GSDI), is a group of inherited metabolic diseases, including types Ia and Ib, characterized by poor tolerance to fasting, growth retardation and hepatomegaly resulting from accumulation of glycogen and fat in the liver. Prevalence is unknown and annual incidence is around 1/100,000 births. GSDIa is the more frequent type, representing about 80% of GSDI patients."
    explanation: Orphanet review abstract provides the clearest concise
      epidemiologic summary for overall GSD I.
has_subtypes:
- name: GSD Ia (glucose-6-phosphatase deficiency)
  description: >
    Caused by biallelic pathogenic variants in G6PC1, encoding the catalytic subunit
    glucose-6-phosphatase-alpha expressed in liver, kidney, and intestine. GSD Ia
    accounts for approximately 80% of GSD I cases and presents with fasting
    hypoglycemia, hepatomegaly, growth retardation, lactic acidosis, hyperlipidemia,
    and hyperuricemia. Unlike GSD Ib, neutropenia is not a feature.
- name: GSD Ib (glucose-6-phosphate transporter deficiency)
  description: >
    Caused by biallelic pathogenic variants in SLC37A4, encoding the ubiquitously
    expressed glucose-6-phosphate transporter (G6PT). GSD Ib accounts for
    approximately 20% of GSD I cases. In addition to the metabolic phenotype shared
    with GSD Ia, patients with GSD Ib develop neutropenia, neutrophil dysfunction,
    and inflammatory bowel disease due to the role of G6PT in neutrophil energy
    homeostasis.
pathophysiology:
- name: Impaired glucose-6-phosphate hydrolysis and fasting hypoglycemia
  description: >
    Deficiency of the glucose-6-phosphatase system blocks the final step of both
    glycogenolysis and gluconeogenesis, preventing the liver and kidneys from releasing
    free glucose into the bloodstream during fasting. Glucose-6-phosphate accumulates
    in the cytoplasm of hepatocytes and renal tubular cells, driving excessive glycogen
    and fat synthesis. The inability to maintain blood glucose between meals causes
    severe fasting hypoglycemia, which is the hallmark metabolic derangement of GSD I.
  gene:
    preferred_term: G6PC1
    description: Glucose-6-phosphatase catalytic subunit 1, which catalyzes the
      hydrolysis of glucose-6-phosphate to glucose and inorganic phosphate in the
      endoplasmic reticulum of liver, kidney, and intestine.
    modifier: DECREASED
    term:
      id: hgnc:4056
      label: G6PC1
  cell_types:
