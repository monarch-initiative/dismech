    term:
      id: GO:0042593
      label: glucose homeostasis
  evidence:
  - reference: PMID:19741523
    reference_title: "Neutropenia in type Ib glycogen storage disease."
    supports: SUPPORT
    evidence_source: MODEL_ORGANISM
    snippet: "Loss of G6PT activity leads to enhanced endoplasmic reticulum stress,
      oxidative stress, and apoptosis that underlie neutropenia and neutrophil
      dysfunction in glycogen storage disease type Ib."
    explanation: Review of GSD Ib neutropenia mechanisms demonstrates that G6PT
      deficiency causes ER stress and apoptosis in neutrophils.
  - reference: PMID:31705665
    reference_title: "Glycogen storage disease type Ib: role of glucose-6-phosphate transporter in cell metabolism and function."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "GSD-Ib is an autosomal recessive disorder characterized by hypoglycemia,
      excessive glycogen accumulation in the liver and kidney, neutropenia,
      neutrophil dysfunction, and inflammatory bowel disease. GSD-Ib is caused by
      a deficiency of glucose-6-phosphate transporter (G6PT)."
    explanation: Review confirms that G6PT deficiency in GSD Ib causes both metabolic
      and immune manifestations including neutropenia and IBD.
- name: Hepatocellular adenoma development
  description: >
    Hepatocellular adenomas are a major long-term complication of GSD I, occurring
    in 22-75% of affected adults. The adenomas develop typically in post-pubertal
    patients and carry an approximately 10% risk of malignant transformation to
    hepatocellular carcinoma. The pathogenesis is multifactorial and may involve
    chronic metabolic stress, altered hepatocyte growth signaling, and hormonal
    influences. Better dietary management and metabolic control appear to reduce
    adenoma incidence.
  cell_types:
  - preferred_term: Hepatocyte
    term:
      id: CL:0000182
      label: hepatocyte
  evidence:
  - reference: PMID:12373570
    reference_title: "Glycogen storage disease type I: pathophysiology of liver adenomas."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Hepatic adenomas occur in 22%-75% of affected adults, according to the
      population studied, and from those reported in the literature are thought to
      have an approximately 10% risk of undergoing malignant transformation."
    explanation: Review of GSD I hepatic adenomas documents prevalence and malignant
      transformation risk.
  - reference: PMID:12373570
    reference_title: "Glycogen storage disease type I: pathophysiology of liver adenomas."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "the incidence of liver tumours in younger adults seems less than in
      older ones, suggesting that better dietary treatment, and thus improved
      metabolic control, may be protective."
    explanation: Evidence that improved metabolic control reduces hepatic adenoma
      development.
