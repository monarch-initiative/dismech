biochemical:
- name: Blood glucose
  presence: Decreased
  context: Fasting hypoglycemia; unable to maintain blood glucose between meals.
- name: Blood lactate
  presence: Elevated
  context: Elevated due to shunting of glucose-6-phosphate through glycolysis.
- name: Serum triglycerides
  presence: Elevated
  context: Markedly elevated due to increased de novo lipogenesis.
- name: Serum uric acid
  presence: Elevated
  context: Elevated due to increased purine degradation and decreased renal clearance.
- name: Serum cholesterol
  presence: Elevated
  context: Hypercholesterolemia due to increased lipid synthesis.
- name: Glucose-6-phosphatase enzyme activity
  presence: Decreased
  context: Measured in liver biopsy tissue; deficient in GSD Ia. Not directly
    measurable for GSD Ib without fresh tissue.
genetic:
- name: G6PC1
  association: Causative
  subtype: GSD Ia (glucose-6-phosphatase deficiency)
  notes: >
    Biallelic pathogenic variants in G6PC1 cause GSD Ia, accounting for approximately
    80% of GSD I cases. The gene encodes glucose-6-phosphatase catalytic subunit 1,
    restricted to liver, kidney, and intestine.
  evidence:
  - reference: PMID:20301489
    reference_title: "Glycogen Storage Disease Type I."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "The diagnosis of GSD I is established in a proband by identification
      of biallelic pathogenic variants in either G6PC1 (GSD Ia) or SLC37A4 (GSD Ib)."
    explanation: GeneReviews confirms G6PC1 as the causative gene for GSD Ia.
- name: SLC37A4
  association: Causative
  subtype: GSD Ib (glucose-6-phosphate transporter deficiency)
  notes: >
    Biallelic pathogenic variants in SLC37A4 cause GSD Ib, accounting for approximately
    20% of GSD I cases. The gene encodes the ubiquitously expressed glucose-6-phosphate
    transporter (G6PT).
  evidence:
  - reference: PMID:20301489
    reference_title: "Glycogen Storage Disease Type I."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "The diagnosis of GSD I is established in a proband by identification
      of biallelic pathogenic variants in either G6PC1 (GSD Ia) or SLC37A4 (GSD Ib)."
    explanation: GeneReviews confirms SLC37A4 as the causative gene for GSD Ib.
  - reference: PMID:29663270
    reference_title: "Molecular biology and gene therapy for glycogen storage disease type Ib."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Glycogen storage disease type Ib (GSD-Ib) is caused by a deficiency
      in the ubiquitously expressed glucose-6-phosphate (G6P) transporter (G6PT or
      SLC37A4)."
    explanation: Review confirms SLC37A4 encodes G6PT and its deficiency causes
      GSD Ib.
treatments:
- name: Uncooked cornstarch therapy
  description: >
    Dietary management with frequent meals of uncooked cornstarch (a slow-release
    glucose polymer) is the cornerstone of GSD I treatment. Cornstarch provides a
    sustained source of glucose to prevent fasting hypoglycemia. Patients require
    multiple doses per day including overnight. Combined with avoidance of fructose,
    galactose, and sucrose. Optimal metabolic control reduces long-term complications.
  treatment_term:
    preferred_term: dietary intervention
    term:
      id: MAXO:0000088
      label: dietary intervention
  evidence:
  - reference: PMID:12373568
    reference_title: "Effect of continuous glucose therapy with uncooked cornstarch on the long-term clinical course of type 1a glycogen storage disease."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "The achievement of optimal biochemical control of glycogen storage
      disease type 1a continues to be a challenge, but is attainable by meticulous
      adherence to an individualized dietary regimen based on the results of
      periodic metabolic evaluation and home blood glucose monitoring."
    explanation: Long-term study demonstrates that cornstarch-based dietary therapy
      can achieve metabolic control, though it remains challenging.
- name: Granulocyte colony-stimulating factor (G-CSF)
  description: >
    Recombinant human G-CSF is used to treat neutropenia, recurrent infections,
    enterocolitis, and bowel ulcers in GSD Ib. G-CSF stimulates neutrophil
    production and improves neutrophil function.
  treatment_term:
    preferred_term: pharmacotherapy
    term:
      id: MAXO:0000058
      label: pharmacotherapy
  evidence:
  - reference: PMID:20301489
    reference_title: "Glycogen Storage Disease Type I."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Human granulocyte colony-stimulating factor (G-CSF) for neutropenia,
      recurrent infections, enterocolitis and bowel ulcers."
    explanation: GeneReviews recommends G-CSF for GSD Ib neutropenia and its
      complications.
- name: Empagliflozin for GSD Ib neutropenia
  description: >
    The SGLT2 inhibitor empagliflozin has emerged as a mechanism-based treatment
    for symptoms caused by neutropenia and neutrophil dysfunction in GSD Ib,
    including mucosal lesions and inflammatory bowel disease. International
    consensus recommends a starting dose of 0.3-0.4 mg/kg/day.
  treatment_term:
    preferred_term: pharmacotherapy
    term:
      id: MAXO:0000058
      label: pharmacotherapy
  evidence:
  - reference: PMID:38277989
    reference_title: "Treatment recommendations for glycogen storage disease type IB- associated neutropenia and neutrophil dysfunction with empagliflozin: Consensus from an international workshop."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Since 2019, the SGLT2-inhibitor empagliflozin has provided a
      mechanism-based treatment option for the symptoms caused by
      neutropenia/neutrophil dysfunction (e.g. mucosal lesions, inflammatory bowel
      disease)."
    explanation: International consensus confirms empagliflozin as a mechanism-based
      treatment for GSD Ib neutropenia.
  - reference: PMID:38277989
    reference_title: "Treatment recommendations for glycogen storage disease type IB- associated neutropenia and neutrophil dysfunction with empagliflozin: Consensus from an international workshop."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "We recommend to start empagliflozin in all GSD Ib individuals with
      clinical or laboratory signs related to neutropenia/neutrophil dysfunction
      with a dose of 0.3-0.4 mg/kg/d given as a single dose in the morning."
    explanation: Consensus dosing recommendation for empagliflozin in GSD Ib.
- name: Allopurinol
  description: >
    Xanthine oxidase inhibitor used to prevent and treat hyperuricemia and gout.
  treatment_term:
    preferred_term: pharmacotherapy
    term:
      id: MAXO:0000058
      label: pharmacotherapy
  evidence:
  - reference: PMID:20301489
    reference_title: "Glycogen Storage Disease Type I."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "allopurinol to prevent and/or treat gout"
    explanation: GeneReviews recommends allopurinol for hyperuricemia and gout
