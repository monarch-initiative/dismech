- name: Neutropenia and neutrophil dysfunction in GSD Ib
  description: >
    In GSD Ib, deficiency of the ubiquitously expressed glucose-6-phosphate
    transporter (G6PT) impairs neutrophil energy homeostasis. Neutrophils express
    the G6PT/G6Pase-beta complex, which produces endogenous glucose for neutrophil
    function. Loss of G6PT activity leads to enhanced endoplasmic reticulum stress,
    oxidative stress, and apoptosis, underlying the neutropenia and neutrophil
    dysfunction characteristic of GSD Ib. This manifests as recurrent bacterial
    infections, oral and intestinal ulcers, and inflammatory bowel disease.
  gene:
    preferred_term: SLC37A4
    description: Solute carrier family 37 member 4, encoding the glucose-6-phosphate transporter (G6PT) that translocates glucose-6-phosphate from the cytoplasm into the endoplasmic reticulum lumen.
    modifier: DECREASED
    term:
      id: hgnc:4061
      label: SLC37A4
