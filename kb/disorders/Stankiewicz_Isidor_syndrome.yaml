name: Stankiewicz-Isidor syndrome
creation_date: "2026-04-15T00:00:00Z"
updated_date: "2026-04-16T01:15:00Z"
description: >-
  Stankiewicz-Isidor syndrome is a PSMD12-related autosomal dominant
  neurodevelopmental disorder characterized by developmental delay,
  intellectual disability, craniofacial dysmorphism, and a variable burden of
  congenital malformations.
category: Mendelian
parents:
- Neurodevelopmental disorder
- Genetic disease
synonyms:
- STISS
- PSMD12-related neurodevelopmental disorder
disease_term:
  preferred_term: Stankiewicz-Isidor syndrome
  term:
    id: MONDO:0054591
    label: Stankiewicz-Isidor syndrome
inheritance:
- name: Autosomal dominant inheritance
  description: >-
    Stankiewicz-Isidor syndrome is most often caused by heterozygous PSMD12
    loss-of-function variants and inherited truncating variants have broadened
    the recognized spectrum.
  inheritance_term:
    preferred_term: Autosomal dominant inheritance
    term:
      id: HP:0000006
      label: Autosomal dominant inheritance
  evidence:
  - reference: PMID:34906456
    reference_title: "Stankiewicz-Isidor syndrome: expanding the clinical and molecular phenotype."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Haploinsufficiency of PSMD12 has been reported in individuals with
      neurodevelopmental phenotypes, including developmental delay/intellectual
      disability (DD/ID), facial dysmorphism, and congenital malformations,
      defined as Stankiewicz-Isidor syndrome (STISS).
    explanation: This directly supports heterozygous PSMD12 haploinsufficiency as the underlying mode of inheritance.
  - reference: PMID:39641441
    reference_title: "Does It Run in Your Family? Inherited Truncating PSMD12 Variants Broaden the Phenotypic Spectrum of Stankiewicz-Isidor Syndrome."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      We described six patients (four adults) from two unrelated families
      carrying a known p.(Arg289*) or a novel p.(Tyr111*) PSMD12 variant.
    explanation: This directly supports familial truncating PSMD12 variants and therefore inherited autosomal dominant disease in at least some families.
pathophysiology:
- name: PSMD12 haploinsufficiency
  description: >-
    Heterozygous loss-of-function variants in PSMD12 reduce gene dosage during
    development.
  genes:
  - preferred_term: PSMD12
    term:
      id: hgnc:9557
      label: PSMD12
  evidence:
  - reference: PMID:34906456
    reference_title: "Stankiewicz-Isidor syndrome: expanding the clinical and molecular phenotype."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Haploinsufficiency of PSMD12 has been reported in individuals with
      neurodevelopmental phenotypes, including developmental delay/intellectual
      disability (DD/ID), facial dysmorphism, and congenital malformations,
      defined as Stankiewicz-Isidor syndrome (STISS).
    explanation: This directly supports PSMD12 haploinsufficiency and proteasome dysfunction as the initiating mechanism.
  - reference: PMID:39641441
    reference_title: "Does It Run in Your Family? Inherited Truncating PSMD12 Variants Broaden the Phenotypic Spectrum of Stankiewicz-Isidor Syndrome."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Alteration in the ubiquitin-proteasome system results in human disorders
      with neurological and/or autoinflammatory presentation.
    explanation: This supports the broader protein-homeostasis defect underlying PSMD12-related disease.
  downstream:
  - target: Proteasome dysfunction
    description: Loss of PSMD12 reduces proteasome function and perturbs protein homeostasis.
- name: Proteasome dysfunction
  description: >-
    Reduced proteasome activity perturbs growth, organelle-homeostasis, and
    inflammatory pathways.
  biological_processes:
  - preferred_term: proteasomal protein catabolic process
