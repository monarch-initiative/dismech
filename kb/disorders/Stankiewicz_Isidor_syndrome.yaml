      with neurological and/or autoinflammatory presentation.
    explanation: This supports the broader protein-homeostasis defect underlying PSMD12-related disease.
  downstream:
  - target: mTORC1 and mitophagy remodeling
    description: Proteasome dysfunction perturbs growth and organelle-homeostasis pathways.
  - target: Type I interferon gene signature
    description: PSMD12 loss is associated with an interferon-stimulated transcriptional response in patient cells.
- name: mTORC1 and mitophagy remodeling
  description: >-
    STISS patient cells show remodeling of mTORC1 and mitophagy pathways,
    linking proteostasis defects to altered cellular growth and quality-control
    programs.
  biological_processes:
  - preferred_term: regulation of TOR signaling
    modifier: ABNORMAL
    term:
      id: GO:0032006
      label: regulation of TOR signaling
  - preferred_term: autophagy of mitochondrion
