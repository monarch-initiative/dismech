      label: autophagy of mitochondrion
  evidence:
  - reference: PMID:34906456
    reference_title: "Stankiewicz-Isidor syndrome: expanding the clinical and molecular phenotype."
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: >-
      Remarkably, our data show that STISS patient cells exhibit a profound
      remodeling of the mTORC1 and mitophagy pathways with an induction of type
      I interferon-stimulated genes.
    explanation: This directly supports remodeling of mTORC1 and mitophagy in patient cells.
  downstream:
  - target: Global developmental delay
    description: Altered developmental growth control contributes to delayed milestones.
  - target: Intellectual disability
    description: Neurodevelopmental disruption contributes to persistent cognitive impairment.
  - target: Delayed speech and language development
    description: Developmental pathway disruption contributes to delayed communication milestones.
  - target: Autism
    description: Perturbed neurodevelopmental signaling contributes to autism spectrum features.
  - target: Abnormal facial shape
    description: Dysregulated morphogenesis contributes to craniofacial dysmorphism.
  - target: Abnormality of the skeletal system
    description: Disturbed developmental programs contribute to skeletal anomalies.
  - target: Abnormal heart morphology
    description: Congenital malformations can involve the heart.
  - target: Abnormality of the kidney
    description: Congenital malformations can involve the kidneys.
  - target: Short stature
    description: Altered developmental growth control contributes to reduced stature.
  - target: Obesity
    description: Later-childhood metabolic dysregulation may contribute to obesity.
- name: Type I interferon gene signature
  description: >-
    Patient cells show induction of type I interferon-stimulated genes, which
    provides a molecular biomarker for the syndrome and a clue to immune
    dysregulation.
  biological_processes:
  - preferred_term: type I interferon-mediated signaling pathway
    modifier: INCREASED
    term:
      id: GO:0060337
      label: type I interferon-mediated signaling pathway
  evidence:
  - reference: PMID:34906456
    reference_title: "Stankiewicz-Isidor syndrome: expanding the clinical and molecular phenotype."
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: >-
      Remarkably, our data show that STISS patient cells exhibit a profound
      remodeling of the mTORC1 and mitophagy pathways with an induction of type
      I interferon-stimulated genes.
    explanation: This directly supports a type I interferon response signature in patient cells.
  - reference: PMID:39641441
    reference_title: "Does It Run in Your Family? Inherited Truncating PSMD12 Variants Broaden the Phenotypic Spectrum of Stankiewicz-Isidor Syndrome."
    supports: PARTIAL
    evidence_source: IN_VITRO
    snippet: >-
      None presented clinical manifestations of autoinflammation and the
      detected IFN-I signature perturbations were not specific.
    explanation: This supports the presence of an interferon signature but cautions that it is not specific for overt autoinflammatory disease.
genetic:
- name: PSMD12
  association: Causal heterozygous loss-of-function variant
  gene_term:
    preferred_term: PSMD12
    term:
      id: hgnc:9557
      label: PSMD12
  notes: >-
    Pathogenic heterozygous PSMD12 truncating variants and deletions are the
    established molecular basis of Stankiewicz-Isidor syndrome.
  evidence:
  - reference: PMID:34906456
    reference_title: "Stankiewicz-Isidor syndrome: expanding the clinical and molecular phenotype."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      We report 24 additional unrelated patients with STISS with various
      truncating single nucleotide variants or copy-number variant deletions
      involving PSMD12.
    explanation: This directly supports PSMD12 as the causal gene and shows both sequence and deletion alleles.
  - reference: PMID:39641441
    reference_title: "Does It Run in Your Family? Inherited Truncating PSMD12 Variants Broaden the Phenotypic Spectrum of Stankiewicz-Isidor Syndrome."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      We described six patients (four adults) from two unrelated families
      carrying a known p.(Arg289*) or a novel p.(Tyr111*) PSMD12 variant.
    explanation: This supports truncating PSMD12 variants as recurrent causal alleles.
  - reference: CGGV:assertion_8ca4eea6-b6b2-41dd-8420-84f886e6d849-2024-03-05T070000.000Z
    reference_title: "PSMD12 / Stankiewicz-Isidor syndrome (Definitive)"
    supports: SUPPORT
    evidence_source: OTHER
    snippet: "PSMD12 | HGNC:9557 | Stankiewicz-Isidor syndrome | MONDO:0054591 | AD | Definitive"
    explanation: ClinGen classifies the PSMD12-Stankiewicz-Isidor syndrome gene-disease relationship as definitive with autosomal dominant inheritance.
