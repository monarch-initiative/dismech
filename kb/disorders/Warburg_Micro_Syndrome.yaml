pathophysiology:
- name: Rab GTPase regulatory complex dysfunction
  description: >-
    Biallelic pathogenic variants in RAB3GAP1 or RAB3GAP2 disrupt the
    RAB3GAP complex, disturbing Rab-family small GTPase signaling during
    nervous-system and ocular development.
  genes:
  - preferred_term: RAB3GAP1
    term:
      id: hgnc:17063
      label: RAB3GAP1
  - preferred_term: RAB3GAP2
    term:
      id: hgnc:17168
      label: RAB3GAP2
  biological_processes:
  - preferred_term: Rab protein signal transduction
    term:
      id: GO:0032482
      label: Rab protein signal transduction
    modifier: ABNORMAL
  downstream:
  - target: Membrane trafficking disruption
    description: Disrupted Rab regulation perturbs vesicle-mediated trafficking.
  - target: Neurodevelopmental impairment
    description: Rab-pathway disruption contributes to impaired brain 
      development.
  evidence:
  - reference: DOI:10.1098/rsob.150047
    reference_title: Warburg Micro syndrome is caused by RAB18 deficiency or
      dysregulation
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: >-
      RAB18 , RAB3GAP1 , RAB3GAP2 and TBC1D20 are each mutated in Warburg Micro
      syndrome, a rare autosomal recessive multisystem disorder.
    explanation: >-
      Supports the shared Rab-regulatory gene axis in Warburg micro syndrome.
- name: Membrane trafficking disruption
  description: >-
    Loss of RAB18 or TBC1D20 function disrupts Rab18-associated membrane
    trafficking across the endomembrane system, linking Warburg micro syndrome
    to abnormal vesicular transport and organelle organization.
