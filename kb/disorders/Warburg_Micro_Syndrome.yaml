name: Warburg micro syndrome
creation_date: "2026-05-07T15:59:44Z"
updated_date: "2026-05-07T16:36:52Z"
description: >-
  Warburg micro syndrome is a rare autosomal recessive Mendelian
  neurodevelopmental disorder characterized by congenital ocular abnormalities,
  severe developmental impairment, microcephaly, corpus callosum malformation,
  progressive tone abnormalities, and genital hypoplasia. The disease series is
  caused by biallelic pathogenic variants in genes that converge on Rab GTPase
  regulation and membrane-trafficking biology, including RAB3GAP1, RAB3GAP2,
  RAB18, and TBC1D20.
category: Mendelian
