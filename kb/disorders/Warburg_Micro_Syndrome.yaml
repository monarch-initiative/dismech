treatments:
- name: Supportive multidisciplinary management
  description: >-
    Management is supportive and coordinated across neurology, ophthalmology,
    rehabilitation, feeding, endocrine, orthopedic, and developmental-care
    services; no disease-modifying therapy is established.
  treatment_term:
    preferred_term: supportive care
    term:
      id: NCIT:C15747
      label: Supportive Care
- name: Cataract surgery
  description: >-
