  - target: Defective Autophagosome Maturation
    description: TBC1D20/Rab-pathway disruption perturbs autophagy maturation.
  - target: Lipid Droplet Homeostasis Defect
    description: TBC1D20-related trafficking defects alter ER-to-lipid droplet biology.
  evidence:
  - reference: DOI:10.1083/jcb.202406139
    reference_title: TBC1D20 coordinates vesicle transport and actin remodeling
      to regulate ciliogenesis
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: >-
      Here, we identify TBC1D20 as a novel Rab11 GTPase-activating protein that
      coordinates vesicle transport and actin remodeling to regulate
      ciliogenesis.
    explanation: >-
      Supports TBC1D20-mediated Rab trafficking disruption as a cellular
      mechanism in WARBM.
- name: Defective Autophagosome Maturation
  description: >-
    TBC1D20 and RAB3GAP1/Rab-pathway dysfunction links Warburg micro syndrome to
    impaired autophagy and autophagosome maturation, particularly in nervous
    system and patient-derived cellular contexts.
