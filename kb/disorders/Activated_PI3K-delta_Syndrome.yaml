    reference_title: "Clinical spectrum and features of activated phosphoinositide 3-kinase δ syndrome: A large patient cohort study."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "The majority of patients received immunoglobulin replacement and antibiotic prophylaxis, and 5 patients underwent hematopoietic stem cell transplantation."
    explanation: Large APDS cohort confirms antibiotic prophylaxis is standard co-management alongside immunoglobulin replacement.
diagnosis:
- name: Molecular genetic testing
  description: >-
    Definitive diagnosis is established by identifying a heterozygous gain-of-function
    variant in PIK3CD (APDS1) or PIK3R1 (APDS2), or a loss-of-function variant in PTEN
    (APDS-L). Panel-based or exome sequencing is appropriate given the clinical overlap
    with common variable immunodeficiency, hyper-IgM syndrome, and combined
    immunodeficiency.
  diagnosis_term:
    preferred_term: genetic testing
    term:
      id: MAXO:0000127
      label: genetic testing
  results: Heterozygous pathogenic variant in PIK3CD (APDS1), PIK3R1 (APDS2), or PTEN (APDS-L)
  evidence:
  - reference: PMID:34422726
    reference_title: "Disorders Related to PI3Kδ Hyperactivation: Characterizing the Clinical and Immunological Features of Activated PI3-Kinase Delta Syndromes."
    supports: SUPPORT
    evidence_source: OTHER
    snippet: "Diagnosis is made by detecting a heterozygous mutation in PIK3CD (APDS1), PIK3R1 (APDS2) or PTEN (APDS-L)."
    explanation: Review states that molecular identification of the causal variant is the definitive diagnostic step for APDS.
  - reference: PMID:31111319
    reference_title: "Clinical, Immunological, and Genetic Features in Patients with Activated PI3Kδ Syndrome (APDS): a Systematic Review."
    supports: SUPPORT
    evidence_source: OTHER
    snippet: "It should be suspected in patients with history of recurrent respiratory infections, lymphoproliferation, and raised IgM levels."
    explanation: Systematic review identifies the cardinal clinical triggers that should prompt PIK3CD/PIK3R1 genetic testing.
- name: Serum immunoglobulin profiling
  description: >-
    Serum immunoglobulin levels are abnormal in most patients. The most common pattern
    is elevated IgM with low IgG and IgA, but subclass deficiency, selective IgA
    deficiency, and hypogammaglobulinaemia are also described. Normal immunoglobulin
    levels do not exclude the diagnosis.
  results: Elevated IgM with low IgG or IgA in most patients; pattern varies
  markers: IgM, IgG, IgA
  evidence:
  - reference: PMID:27555459
    reference_title: "Clinical spectrum and features of activated phosphoinositide 3-kinase δ syndrome: A large patient cohort study."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Increased IgM levels (78%), IgG deficiency (43%), and CD4 lymphopenia (84%) were significant immunologic features."
    explanation: Large international cohort documents hyper-IgM with IgG deficiency as the dominant serologic pattern.
  - reference: PMID:34422726
    reference_title: "Disorders Related to PI3Kδ Hyperactivation: Characterizing the Clinical and Immunological Features of Activated PI3-Kinase Delta Syndromes."
    supports: SUPPORT
    evidence_source: OTHER
    snippet: "A hyper IgM-like pattern is the most common immunoglobulin profile reported (low IgG, low IgA and high IgM). This is explained by the fact that PI3Kδ signalling pathways are involved in immunoglobulin class switching (25) with class switched memory B cells reduced in APDS."
    explanation: Review explains the immunological basis for the hyper-IgM pattern and notes that normal levels do not exclude APDS.
- name: Lymphocyte subset analysis
  description: >-
    Flow cytometric quantification of lymphocyte subsets typically reveals B cell
    lymphopenia, CD4+ T cell reduction with an inverted CD4/CD8 ratio, and expanded
    transitional B cells with reduced class-switched memory B cells. Extended
    phenotyping supports the diagnosis and reflects underlying immune dysregulation.
  results: B cell lymphopenia; reduced CD4+ T cells; inverted CD4/CD8 ratio; expanded transitional B cells; reduced class-switched memory B cells
  evidence:
  - reference: PMID:34422726
    reference_title: "Disorders Related to PI3Kδ Hyperactivation: Characterizing the Clinical and Immunological Features of Activated PI3-Kinase Delta Syndromes."
    supports: SUPPORT
    evidence_source: OTHER
    snippet: "Lymphocyte subset testing typically reveals B cell lymphopenia, CD4+ T cell reduction, with an inverted CD4/CD8 ratio."
    explanation: Review summarizes the characteristic lymphocyte subset pattern as a key diagnostic feature of APDS.
  - reference: PMID:27555459
    reference_title: "Clinical spectrum and features of activated phosphoinositide 3-kinase δ syndrome: A large patient cohort study."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Increased IgM levels (78%), IgG deficiency (43%), and CD4 lymphopenia (84%) were significant immunologic features."
    explanation: Large cohort quantifies CD4 lymphopenia prevalence, supporting lymphocyte subset testing as a diagnostic component.
- name: Vaccine response assessment
  description: >-
    Measurement of specific antibody responses to pneumococcal polysaccharide and
    protein-conjugate vaccines reveals impaired humoral immunity in the majority of
    patients with APDS, analogous to other combined immunodeficiencies.
  results: Impaired polysaccharide and/or conjugate vaccine responses
  evidence:
  - reference: PMID:34422726
    reference_title: "Disorders Related to PI3Kδ Hyperactivation: Characterizing the Clinical and Immunological Features of Activated PI3-Kinase Delta Syndromes."
    supports: SUPPORT
    evidence_source: OTHER
    snippet: "Vaccine responses are often impaired (3, 16). Defective anti-polysaccharide vaccine responses were detected in 52 of 58 patients (90%) and defective anti-peptide antibody responses in 14 of 42 (33%) (15)."
    explanation: Review documents near-universal impairment of vaccine responses in APDS, supporting their use as a diagnostic marker.
- name: Thoracic CT imaging
  description: >-
    High-resolution CT of the thorax shows airway abnormalities in the majority of
    symptomatic patients, including mosaic attenuation reflecting small-airway disease
    and established bronchiectasis. CT is relevant to diagnosis, staging of airway
    injury, and pulmonary surveillance.
  results: Mosaic attenuation and/or bronchiectasis in most patients with pulmonary involvement
  evidence:
  - reference: PMID:27555459
    reference_title: "Clinical spectrum and features of activated phosphoinositide 3-kinase δ syndrome: A large patient cohort study."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Thoracic imaging revealed high rates of mosaic attenuation (90%) and bronchiectasis (60%)."
    explanation: Large APDS cohort documents characteristic CT findings supporting diagnosis and staging of pulmonary involvement.
- name: Enhanced phospho-AKT in circulating B cells
  description: >-
    Flow cytometric measurement of AKT phosphorylation at Ser473 in CD19+ peripheral
    blood B cells serves as a functional biomarker of PI3K-delta hyperactivation.
    Enhanced pAKT, particularly in CD10+ immature B cells, discriminates APDS from
    common variable immunodeficiency and hyper-IgM syndrome due to CD40L deficiency,
    and complements genetic testing.
  results: Elevated phospho-AKT (Ser473) in CD19+ B cells, most pronounced in CD10+ immature B cells; normalized by p110delta inhibitor
  evidence:
  - reference: PMID:29675019
    reference_title: "Enhanced AKT Phosphorylation of Circulating B Cells in Patients With Activated PI3Kδ Syndrome."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "These results suggest that the enhanced pAKT in circulating B cells may be useful for the discrimination of APDS1, APDS2, and APDS-L from other antibody deficiencies."
    explanation: Functional flow cytometry study demonstrates that enhanced pAKT in CD19+ B cells distinguishes APDS from other antibody deficiencies.
