name: Pallister-Hall Syndrome
creation_date: '2026-02-13T00:31:42Z'
updated_date: '2026-02-13T01:20:31Z'
category: Mendelian
description: >
  Pallister-Hall syndrome (PHS) is an autosomal dominant disorder caused by
  truncating mutations in the middle third of the GLI3 gene. These mutations
  produce a constitutive transcriptional repressor that inappropriately suppresses
  Hedgehog target genes, causing a distinct phenotype from the allelic disorder
  Greig cephalopolysyndactyly syndrome. PHS is characterized by hypothalamic
  hamartoma, postaxial or central polydactyly, bifid epiglottis, anal atresia,
  and variable other malformations. Severity ranges from lethal neonatal forms
  to mild adult presentations.
disease_term:
  preferred_term: Pallister-Hall syndrome
  term:
    id: MONDO:0007804
    label: Pallister-Hall syndrome
parents:
- Limb Development Disorders
inheritance:
- name: Autosomal Dominant
  description: >
    Autosomal dominant with variable expressivity. Unlike GCPS which
    results from GLI3 haploinsufficiency, PHS is caused specifically by
    frameshift/nonsense mutations in the middle third of GLI3 that
    produce a truncated constitutive repressor protein.
  evidence:
  - reference: PMID:15739154
    reference_title: "Molecular and clinical analyses of Greig cephalopolysyndactyly and Pallister-Hall syndromes: robust phenotype prediction from the type and position of GLI3 mutations."
    supports: SUPPORT
    snippet: "GLI3 mutations that predict a truncated functional repressor protein cause PHS and that functional haploinsufficiency of GLI3 causes GCPS"
    explanation: "Distinct pathogenic mechanism from GCPS: constitutive repressor rather than haploinsufficiency."
prevalence:
- population: GLI3 mutation-positive GCPS/PHS diagnostic cohort
  percentage: 27.6%
  notes: >-
    Population prevalence for Pallister-Hall syndrome is not well defined, but a
    large GLI3 cohort reported 21 PHS cases among 76 total GLI3 syndrome cases.
  evidence:
  - reference: PMID:24736735
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Here we report on the molecular and clinical study of 76 cases from 55 families with either a GLI3 mutation (49 GCPS and 21 PHS), or a large deletion encompassing the GLI3 gene (6 GCPS cases)."
    explanation: This large GLI3 cohort shows that 21 of 76 mutation-positive GCPS/PHS cases were Pallister-Hall syndrome, corresponding to 27.6%.
  - reference: PMID:29106787
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "This rare syndrome has not had prevalence defined, however."
    explanation: This adult case report explicitly notes that population prevalence for Pallister-Hall syndrome has not been defined.
pathophysiology:
- name: GLI3 Constitutive Repressor from Truncating Mutations
  description: >
    Truncating mutations in the middle third of GLI3 (ORF nt 1998-3481)
    produce a protein that retains the N-terminal zinc finger DNA-binding
    domain and repressor domain but lacks the C-terminal transactivation
    domain. This truncated protein functions as a constitutive repressor
    of Hedgehog target genes, independent of Hedgehog signaling input.
  biological_processes:
  - preferred_term: Hedgehog Signaling Pathway
    term:
      id: GO:0007224
      label: smoothened signaling pathway
  evidence:
  - reference: PMID:15739154
    reference_title: "Molecular and clinical analyses of Greig cephalopolysyndactyly and Pallister-Hall syndromes: robust phenotype prediction from the type and position of GLI3 mutations."
    supports: SUPPORT
    snippet: "In contrast, PHS was caused only by frameshift/nonsense and splicing mutations"
    explanation: "Only truncating mutations cause PHS, supporting the constitutive repressor model."
  - reference: PMID:15739154
    reference_title: "Molecular and clinical analyses of Greig cephalopolysyndactyly and Pallister-Hall syndromes: robust phenotype prediction from the type and position of GLI3 mutations."
    supports: SUPPORT
    snippet: "among the frameshift/nonsense mutations, there was a clear genotype-phenotype correlation"
    explanation: "Positional specificity of truncating mutations determines GCPS vs PHS phenotype."
  - reference: PMID:10375510
    reference_title: "Gli proteins encode context-dependent positive and negative functions: implications for development and disease."
    supports: SUPPORT
    snippet: "C-terminal sequences are required for positive inducing activity"
    explanation: "Loss of C-terminal transactivation domain explains why middle-third truncations produce a constitutive repressor."
  - reference: PMID:10693759
    reference_title: "Hedgehog-regulated processing of Gli3 produces an anterior/posterior repressor gradient in the developing vertebrate limb."
    supports: SUPPORT
    snippet: "The high relative abundance and potency of Gli3 repressor suggest specialization of Gli3 and its products for negative Hedgehog pathway regulation"
    explanation: "GLI3 is specialized for repressor function, explaining why truncated repressor proteins cause disease."
- name: Hypothalamic Development Disruption
  description: >
    Constitutive GLI3 repressor activity inappropriately silences Hedgehog
    target genes required for hypothalamic development, leading to
    hypothalamic hamartoma formation. This can cause precocious puberty
    through ectopic GnRH secretion or gelastic seizures.
  evidence:
  - reference: PMID:10375510
    reference_title: "Gli proteins encode context-dependent positive and negative functions: implications for development and disease."
    supports: SUPPORT
    snippet: "provide a molecular basis for the human Polydactyly type A and Pallister-Hall Syndrome phenotypes, derived from the deregulated production of C-terminally truncated GLI3 proteins"
    explanation: "Truncated GLI3 repressor disrupts multiple developmental programs including hypothalamic development."
- name: Posterior Limb Patterning Disruption
  description: >
    Constitutive GLI3 repressor activity disrupts Hedgehog-dependent limb
    patterning, causing postaxial or central polydactyly. This is distinct
    from the preaxial polydactyly seen in GCPS, where GLI3 haploinsufficiency
    (reduced activator) rather than constitutive repressor drives the phenotype.
  biological_processes:
  - preferred_term: Embryonic Limb Morphogenesis
    term:
      id: GO:0030326
      label: embryonic limb morphogenesis
  evidence:
  - reference: PMID:10375510
    reference_title: "Gli proteins encode context-dependent positive and negative functions: implications for development and disease."
    supports: SUPPORT
    snippet: "provide a molecular basis for the human Polydactyly type A and Pallister-Hall Syndrome phenotypes, derived from the deregulated production of C-terminally truncated GLI3 proteins"
    explanation: "Truncated GLI3 directly causes the polydactyly phenotype in PHS."
- name: Hypothalamic-Pituitary Axis Disruption
  description: >
    The hypothalamic hamartoma disrupts normal hypothalamic-pituitary axis
    signaling, producing a spectrum of endocrine insufficiency ranging from
    isolated growth hormone deficiency to panhypopituitarism. Adrenal
    insufficiency (secondary to ACTH deficiency) is a potentially lethal
    complication in neonates and infants that requires urgent evaluation and
    cortisol replacement before or alongside other endocrine workup. Precocious
    puberty may result from ectopic GnRH secretion by the hamartoma.
  evidence:
  - reference: PMID:20301638
    reference_title: "GLI3-Related Pallister-Hall Syndrome."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Individuals with GLI3-PHS can have pituitary insufficiency and may die as neonates from undiagnosed and untreated adrenal insufficiency."
    explanation: >-
      GeneReviews explicitly documents pituitary insufficiency as a complication
      and adrenal crisis as a potentially lethal outcome in untreated neonates.
phenotypes:
- name: Hypothalamic Hamartoma
  description: >
    Non-neoplastic malformation of the hypothalamus, often detected
    on brain MRI. May cause precocious puberty through GnRH secretion
    or gelastic seizures. A hallmark feature distinguishing PHS from
    GCPS.
  phenotype_term:
    preferred_term: Hypothalamic hamartoma
    term:
      id: HP:0002444
      label: Hypothalamic hamartoma
  evidence:
  - reference: PMID:24736735
    reference_title: "New insights into genotype-phenotype correlation for GLI3 mutations."
    supports: SUPPORT
    snippet: "PHS was first described as a lethal condition associating hypothalamic hamartoma, postaxial or central polydactyly, anal atresia and bifid epiglottis"
    explanation: "Hypothalamic hamartoma is a cardinal feature of PHS since original description."
- name: Postaxial Polydactyly
  description: >
    Extra digits on the postaxial (ulnar/fibular) side, in contrast
    to the preaxial polydactyly characteristic of GCPS. Central
    polydactyly (insertional) may also occur.
  phenotype_term:
    preferred_term: Postaxial hand polydactyly
    term:
      id: HP:0001162
      label: Postaxial hand polydactyly
  evidence:
  - reference: PMID:24736735
    reference_title: "New insights into genotype-phenotype correlation for GLI3 mutations."
    supports: SUPPORT
    snippet: "postaxial or central polydactyly, anal atresia and bifid epiglottis"
    explanation: "Postaxial/central polydactyly is the characteristic limb pattern in PHS."
  - reference: PMID:28224613
    reference_title: "GLI3-related polydactyly: a review."
    supports: SUPPORT
    snippet: "four separate entities; each characterized by a specific pattern of polydactyly"
    explanation: "PHS has a distinct polydactyly pattern (postaxial) from GCPS (preaxial)."
- name: Bifid Epiglottis
  description: >
    Midline cleft of the epiglottis, a distinctive feature of PHS.
    Usually does not cause significant airway compromise but is
    diagnostically important.
  phenotype_term:
    preferred_term: Bifid epiglottis
    term:
      id: HP:0010564
      label: Bifid epiglottis
  evidence:
  - reference: PMID:24736735
    reference_title: "New insights into genotype-phenotype correlation for GLI3 mutations."
    supports: SUPPORT
    snippet: "hypothalamic hamartoma, postaxial or central polydactyly, anal atresia and bifid epiglottis"
    explanation: "Bifid epiglottis is one of the cardinal features in the original PHS description."
- name: Anal Atresia
  description: >
    Imperforate anus, occurring in a significant proportion of PHS
    patients. Requires surgical correction in the neonatal period.
  phenotype_term:
    preferred_term: Anal atresia
    term:
      id: HP:0002023
      label: Anal atresia
  evidence:
  - reference: PMID:24736735
    reference_title: "New insights into genotype-phenotype correlation for GLI3 mutations."
    supports: SUPPORT
    snippet: "hypothalamic hamartoma, postaxial or central polydactyly, anal atresia and bifid epiglottis"
    explanation: "Anal atresia is a cardinal feature of PHS."
- name: Central Precocious Puberty
  description: >
    Ectopic GnRH secretion from hypothalamic hamartoma can trigger premature
    activation of the hypothalamic-pituitary-gonadal axis, causing central
    precocious puberty. Annual surveillance during childhood monitors for
    signs of early puberty onset.
  phenotype_term:
    preferred_term: Precocious puberty
    term:
      id: HP:0000826
      label: Precocious puberty
  evidence:
  - reference: PMID:20301638
    reference_title: "GLI3-Related Pallister-Hall Syndrome."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "monitor for signs of precocious puberty"
    explanation: >-
      GeneReviews surveillance guidelines specify annual monitoring for precocious
      puberty as a complication of hypothalamic hamartoma in GLI3-PHS.
- name: Gelastic Seizures
  description: >
    Hypothalamic hamartomas are associated with focal seizures, including
    characteristic gelastic (laughing) seizures. Seizures may begin or worsen
    with use of stimulants for ADHD. Symptomatic anti-seizure medication is
    the primary management approach; surgical resection of the hamartoma is
    generally contraindicated due to procedural risk.
  phenotype_term:
    preferred_term: Focal emotional seizure with laughing
    term:
      id: HP:0010821
      label: Focal emotional seizure with laughing
  evidence:
  - reference: PMID:20301638
    reference_title: "GLI3-Related Pallister-Hall Syndrome."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "symptomatic treatment of seizures"
    explanation: >-
      GeneReviews lists seizures as a key manifestation requiring symptomatic
      treatment in GLI3-PHS, associated with hypothalamic hamartoma.
- name: Hypopituitarism
  description: >
    Disruption of hypothalamic-pituitary signaling by the malformed
    hypothalamic tissue can cause partial or complete anterior pituitary
    insufficiency, including growth hormone deficiency and ACTH deficiency.
    Pituitary function must be assessed in all newly diagnosed individuals.
  phenotype_term:
    preferred_term: Hypopituitarism
    term:
      id: HP:0040075
      label: Hypopituitarism
  evidence:
  - reference: PMID:20301638
    reference_title: "GLI3-Related Pallister-Hall Syndrome."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Individuals with GLI3-PHS can have pituitary insufficiency and may die as neonates from undiagnosed and untreated adrenal insufficiency."
    explanation: >-
      GeneReviews identifies pituitary insufficiency as an important complication
      of GLI3-PHS that can be lethal if adrenal axis involvement is missed.
- name: Adrenal Insufficiency
  description: >
    Secondary (central) adrenal insufficiency from hypothalamic-pituitary
    axis disruption. Cortisol deficiency requires urgent evaluation in all
    newly diagnosed patients, particularly neonates and infants, where
    undiagnosed adrenal crisis can be fatal. Treatment with cortisol
    replacement must be initiated promptly.
  phenotype_term:
    preferred_term: Adrenal insufficiency
    term:
      id: HP:0000846
      label: Adrenal insufficiency
  evidence:
  - reference: PMID:20301638
    reference_title: "GLI3-Related Pallister-Hall Syndrome."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Individuals with GLI3-PHS can have pituitary insufficiency and may die as neonates from undiagnosed and untreated adrenal insufficiency."
    explanation: >-
      GeneReviews documents adrenal insufficiency as a potentially lethal
      complication requiring urgent evaluation and treatment.
- name: Laryngeal Cleft
  description: >
    At the severe end of the GLI3-PHS spectrum, laryngotracheal cleft can
    cause respiratory compromise and neonatal lethality. Management depends
    on the extent of the cleft and degree of respiratory impairment.
  phenotype_term:
    preferred_term: Laryngeal cleft
    term:
      id: HP:0008751
      label: Laryngeal cleft
  evidence:
  - reference: PMID:20301638
    reference_title: "GLI3-Related Pallister-Hall Syndrome."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "laryngotracheal cleft with neonatal lethality at the severe end"
    explanation: >-
      GeneReviews defines the clinical spectrum of GLI3-PHS from mild
      (polydactyly, bifid epiglottis) to lethal (laryngotracheal cleft).
genetic:
- name: GLI3 Mutations (Truncating, Middle Third)
  association: Causative
  notes: >
    Frameshift and nonsense mutations in the middle third of GLI3
    (ORF nt 1998-3481) on chromosome 7p14.1 specifically cause PHS.
    These produce a truncated protein that functions as a constitutive
    repressor of Hedgehog signaling targets. This is in contrast to
    GCPS, where mutations throughout the gene cause haploinsufficiency.
    The genotype-phenotype correlation is robust across multiple
    large cohort studies.

    Positional rule for disease classification: mutations in the first
    third (nt 1-1997) or final third (nt 3482-end) of the ORF cause GCPS
    only; mutations in the middle third (nt 1998-3481) cause PHS. An
    important mechanistic requirement is that PHS-causing truncated proteins
    must escape nonsense-mediated mRNA decay (NMD) to produce the constitutive
    repressor. If NMD degrades the transcript, haploinsufficiency results and
    the phenotype shifts toward GCPS. This NMD-escape requirement explains
    why not all middle-third nonsense variants produce the PHS phenotype (e.g.,
    c.2374C>T p.Arg792Ter maps to the middle-third position but causes GCPS).

    Approximately 25% of individuals have a de novo pathogenic variant; de novo
    cases tend to be more severely affected than those with an inherited variant.
  evidence:
  - reference: PMID:15739154
    reference_title: "Molecular and clinical analyses of Greig cephalopolysyndactyly and Pallister-Hall syndromes: robust phenotype prediction from the type and position of GLI3 mutations."
    supports: SUPPORT
    snippet: "Mutations in the GLI3 zinc-finger transcription factor gene cause Greig cephalopolysyndactyly syndrome (GCPS) and Pallister-Hall syndrome (PHS), which are variable but distinct clinical entities"
    explanation: "Establishes GLI3 as causative for both GCPS and PHS as allelic disorders."
  - reference: PMID:15739154
    reference_title: "Molecular and clinical analyses of Greig cephalopolysyndactyly and Pallister-Hall syndromes: robust phenotype prediction from the type and position of GLI3 mutations."
    supports: SUPPORT
    snippet: "These results demonstrate a robust correlation of genotype and phenotype for GLI3 mutations and strongly support the hypothesis that these two allelic disorders have distinct modes of pathogenesis"
    explanation: "Robust genotype-phenotype correlation across 135-patient cohort."
  - reference: PMID:20672375
    reference_title: "Molecular analysis expands the spectrum of phenotypes associated with GLI3 mutations."
    supports: SUPPORT
    snippet: "A range of phenotypes including Greig cephalopolysyndactyly and Pallister-Hall syndromes (GCPS, PHS) are caused by pathogenic mutation of the GLI3 gene"
    explanation: "Expanded cohort confirms GLI3 as the causative gene for PHS."
  - reference: PMID:24736735
    reference_title: "New insights into genotype-phenotype correlation for GLI3 mutations."
    supports: SUPPORT
    snippet: "76 cases from 55 families with either a GLI3 mutation (49 GCPS and 21 PHS), or a large deletion encompassing the GLI3 gene (6 GCPS cases)"
    explanation: "Additional large cohort confirming GLI3 genotype-phenotype correlations."
diagnosis:
- name: Clinical and Molecular Diagnosis
  description: >-
    GLI3-related Pallister-Hall syndrome is diagnosed clinically from the
    combination of hypothalamic hamartoma and mesoaxial (central) polydactyly,
    and is confirmed by identification of a heterozygous GLI3 pathogenic
    variant on molecular genetic testing. Recognition matters because
    hypothalamic hamartoma may cause hypopituitarism or gelastic seizures.
  diagnosis_term:
    preferred_term: molecular genetic testing
    term:
      id: MAXO:0000533
      label: molecular genetic testing
  evidence:
  - reference: PMID:20301638
    reference_title: "GLI3-Related Pallister-Hall Syndrome."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "The diagnosis of GLI3-PHS can be established in a proband with both hypothalamic hamartoma and mesoaxial polydactyly."
    explanation: >-
      GeneReviews defines the cardinal clinical diagnostic dyad for
      GLI3-related Pallister-Hall syndrome.
treatments:
- name: Surgical Correction of Polydactyly
  description: >
    Surgical removal of extra digits in early childhood for
    functional and cosmetic improvement.
  treatment_term:
    preferred_term: surgical procedure
    term:
      id: MAXO:0000004
      label: surgical procedure
    located_in:
      preferred_term: manus
      term:
        id: UBERON:0002398
        label: manus
- name: Anal Atresia Repair
  description: >
    Neonatal surgical correction of imperforate anus, typically
    posterior sagittal anorectoplasty (PSARP).
- name: Endocrine Management
  description: >
    Adrenal insufficiency is the first priority: cortisol deficiency must be
    evaluated urgently in all newly diagnosed patients, especially neonates,
    as untreated adrenal crisis can be fatal. Annual surveillance during
    childhood includes growth assessment (for growth hormone deficiency) and
    monitoring for signs of precocious puberty. GnRH analogs may be used if
    central precocious puberty develops. Pituitary function testing should be
    performed at baseline in all patients.
  treatment_term:
    preferred_term: pharmacotherapy
    term:
      id: MAXO:0000058
      label: pharmacotherapy
  evidence:
  - reference: PMID:20301638
    reference_title: "GLI3-Related Pallister-Hall Syndrome."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Urgent treatment for endocrine abnormalities, especially cortisol deficiency"
    explanation: >-
      GeneReviews prioritizes cortisol deficiency treatment above other endocrine
      management, emphasizing the lethal risk of undiagnosed adrenal insufficiency.
- name: Anti-Seizure Medication
  description: >
    Symptomatic treatment for seizures associated with hypothalamic hamartoma,
    using standard anti-seizure medications. Stimulants prescribed for
    ADHD may exacerbate seizures and should be used with caution or avoided.
  treatment_term:
    preferred_term: pharmacotherapy
    term:
      id: MAXO:0000058
      label: pharmacotherapy
  evidence:
  - reference: PMID:20301638
    reference_title: "GLI3-Related Pallister-Hall Syndrome."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "symptomatic treatment of seizures"
    explanation: >-
      GeneReviews lists symptomatic seizure treatment as a key management step
      and notes that stimulants may exacerbate seizures in GLI3-PHS.
- name: Hypothalamic Hamartoma — Watchful Waiting
  description: >
    Hypothalamic hamartomas in PHS are malformations, not neoplasms; they grow
    at the same rate as surrounding brain tissue. Biopsy or surgical resection
    is generally contraindicated because complications and the resulting need for
    lifelong hormone replacement typically outweigh any potential benefit.
    Management focuses on endocrine replacement and anti-seizure therapy rather
    than surgical intervention.
  treatment_term:
    preferred_term: supportive care
    term:
      id: MAXO:0000950
      label: supportive care
  evidence:
  - reference: PMID:20301638
    reference_title: "GLI3-Related Pallister-Hall Syndrome."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Biopsy or resection of hypothalamic hamartoma may result in complications and lifelong need for hormone replacement."
    explanation: >-
      GeneReviews explicitly states that hamartoma biopsy or resection is
      to be avoided in typical presentations of GLI3-PHS.
