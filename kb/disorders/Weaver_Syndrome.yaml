    causal_link_type: DIRECT
  - target: Large for Gestational Age (Prenatal Overgrowth)
    causal_link_type: DIRECT
  - target: Accelerated Skeletal Maturation (Advanced Bone Age)
    causal_link_type: DIRECT
  - target: Macrocephaly
