      supports: SUPPORT
      evidence_source: HUMAN_CLINICAL
      snippet: >-
        NR5A1 mutations are found in approximately 4% of men with otherwise
        unexplained severe spermatogenic failure.
      explanation: >-
        Quantifies NR5A1 as a recurrent monogenic cause of severe male
