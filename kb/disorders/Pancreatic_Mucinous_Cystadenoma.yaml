  phenotype_term:
    preferred_term: Vomiting
    term:
      id: HP:0002013
      label: Vomiting
  evidence:
  - reference: PMID:2446398
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Anorexia, weight loss, nausea and vomiting with a palpable abdominal mass
