- name: Weight Loss
  category: Constitutional
  frequency: OCCASIONAL
  notes: >-
    Weight loss may occur as a nonspecific symptom in patients with large or
    malignant MCNs, though most MCNs are asymptomatic. Weight loss correlates
    with malignancy in cystic pancreatic neoplasms.
  phenotype_term:
    preferred_term: Weight loss
    term:
      id: HP:0001824
      label: Weight loss
  evidence:
  - reference: PMID:18040749
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Symptoms that correlated with malignancy included jaundice (p < 0.001),
      weight loss (p < 0.003), and anorexia (p < 0.05).
    explanation: >-
      Multi-institutional study of 166 resected cystic pancreatic neoplasms
      (including 35 MCNs) identifies weight loss as a significant symptom
      correlating with malignancy.
  - reference: PMID:2446398
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Anorexia, weight loss, nausea and vomiting with a palpable abdominal mass
      were seen in five of eight patients.
    explanation: >-
      Clinical series of pancreatic cystic neoplasms including mucinous
      cystadenomas and cystadenocarcinomas explicitly lists weight loss as
      a presenting symptom.
- name: Nausea
  category: Gastrointestinal
  frequency: OCCASIONAL
  notes: >-
    Nausea is a nonspecific gastrointestinal symptom that may occur in
    symptomatic MCN patients due to mass effect.
  phenotype_term:
    preferred_term: Nausea
    term:
      id: HP:0002018
      label: Nausea
  evidence:
  - reference: PMID:18040749
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      symptoms (abdominal pain, nausea and vomiting, jaundice, presence of
      pancreatitis, unexplained weight loss, and anorexia)
    explanation: >-
      Multi-institutional study of 166 resected cystic pancreatic neoplasms
      (including 35 MCNs) explicitly lists nausea among the clinical symptoms
      evaluated in these patients.
- name: Vomiting
  category: Gastrointestinal
  frequency: OCCASIONAL
  notes: >-
    Vomiting may accompany nausea in symptomatic MCN patients, particularly
