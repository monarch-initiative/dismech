      enhancing mural nodules <5 mm can be considered relative indications for
      surgical resection
    explanation: >-
      European evidence-based guidelines identify new-onset diabetes mellitus as a
      symptom of pancreatic cystic neoplasms including MCNs, and list it as a
      relative indication for surgical resection.
