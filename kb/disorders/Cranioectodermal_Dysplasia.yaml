- name: Renal-Hepatic-Retinal Ciliopathy Pleiotropy
  conforms_to: "ciliopathy_dysfunction#Renal Tubular Cystic and Fibrotic Disease"
  description: >
    The degenerative multiorgan arm of CED. Ciliary dysfunction in renal tubular
    epithelium produces nephronophthisis that frequently progresses to end-stage
    kidney disease, the major cause of morbidity and mortality. Hepatic fibrosis
    and retinal dystrophy reflect the same ciliopathy mechanism in hepatobiliary
    tissue and photoreceptors.
