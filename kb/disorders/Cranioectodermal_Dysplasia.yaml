    term:
      id: GO:0001822
      label: kidney development
    modifier: ABNORMAL
  evidence:
  - reference: PMID:24027799
    reference_title: "Cranioectodermal Dysplasia."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Most affected children develop nephronophthisis that often leads to
      end-stage kidney disease in infancy or childhood, a major cause of morbidity
      and mortality. Hepatic fibrosis and retinal dystrophy are also observed.
    explanation: >-
      Establishes nephronophthisis with progression to end-stage kidney disease,
      hepatic fibrosis, and retinal dystrophy as the multiorgan ciliopathy
      pleiotropy of CED.
  - reference: PMID:32007091
    reference_title: "Compound heterozygous IFT140 variants in two Polish families with Sensenbrenner syndrome and early onset end-stage renal disease."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Both patients had severe renal failure requiring kidney transplantation in
      early childhood.
    explanation: >-
      Confirms early-onset, transplant-requiring renal failure in CED, supporting
      the severity of the renal arm.
  downstream:
  - target: Nephronophthisis
  - target: Hepatic Fibrosis
  - target: Retinal Dystrophy
