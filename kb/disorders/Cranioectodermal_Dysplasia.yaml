has_subtypes:
- name: CED1
  display_name: CED1 (IFT122-associated)
  description: >
    Caused by biallelic mutations in IFT122 (WDR10), the first and most frequently
    mutated gene identified in CED. IFT122 encodes a component of the intraflagellar
    transport complex-A required for retrograde ciliary transport.
- name: CED2
  display_name: CED2 (WDR35-associated)
  description: >
    Caused by biallelic mutations in WDR35 (IFT121), an intraflagellar transport
    complex-A subunit. Identified through exome sequencing of sporadic CED patients.
- name: CED3
  display_name: CED3 (IFT43-associated)
  description: >
    Caused by biallelic mutations in IFT43 (C14orf179), a small intraflagellar
    transport complex-A subunit.
- name: CED4
  display_name: CED4 (WDR19-associated)
  description: >
    Caused by biallelic mutations in WDR19 (IFT144), an intraflagellar transport
    complex-A subunit that drives retrograde ciliary transport. WDR19 mutations
    also cause clinically overlapping skeletal ciliopathies (Jeune syndrome) and
    isolated nephronophthisis.
inheritance:
- name: Autosomal Recessive
  description: >
    Autosomal recessive inheritance with genetic heterogeneity across IFT-A
    complex genes.
  evidence:
  - reference: PMID:20817137
    reference_title: "Exome sequencing identifies WDR35 variants involved in Sensenbrenner syndrome."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Sensenbrenner syndrome/cranioectodermal dysplasia (CED) is an
      autosomal-recessive disease that is characterized by craniosynostosis and
      ectodermal and skeletal abnormalities.
    explanation: >-
      Confirms autosomal recessive inheritance and the core craniosynostosis /
      ectodermal / skeletal triad of CED.
prevalence:
- population: General population
  notes: >-
    CED is a rare disorder; fewer than 100 affected individuals had been reported
    in the literature at the time of the GeneReviews summary, with no precise
    incidence established.
pathophysiology:
- name: IFT-A Complex Dysfunction
  conforms_to: "ciliopathy_dysfunction#Basal Body and Transition Zone Dysfunction"
  description: >
    Biallelic mutations in IFT-A complex genes (IFT122, WDR35, IFT43, WDR19, and
    the additional CED genes IFT140 and IFT52) disrupt retrograde intraflagellar
    transport. IFT-A drives retrograde (tip-to-base) cargo trafficking along the
    ciliary axoneme; its loss impairs primary cilium assembly, maintenance, and
    the gated compartmentalization of signaling machinery, producing a
    structurally deficient or functionally incompetent cilium.
  cell_types:
  - preferred_term: ciliated cell
    term:
      id: CL:0000064
      label: ciliated cell
  biological_processes:
  - preferred_term: intraflagellar transport
    term:
      id: GO:0042073
      label: intraciliary transport
    modifier: ABNORMAL
  - preferred_term: retrograde intraflagellar transport
    term:
      id: GO:0035735
      label: intraciliary transport involved in cilium assembly
    modifier: DECREASED
  - preferred_term: cilium assembly
    term:
      id: GO:0060271
      label: cilium assembly
    modifier: DECREASED
  cellular_components:
  - preferred_term: primary cilium
    term:
      id: GO:0005929
      label: cilium
  evidence:
  - reference: PMID:20493458
    reference_title: "Cranioectodermal Dysplasia, Sensenbrenner syndrome, is a ciliopathy caused by mutations in the IFT122 gene."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Because IFT122 plays an important role in the assembly and maintenance of
      eukaryotic cilia, we investigated patient fibroblasts and found
      significantly reduced frequency and length of primary cilia as compared to
      controls.
    explanation: >-
      Establishes IFT122 as a CED gene and shows that its loss reduces primary
      cilium frequency and length in patient fibroblasts, anchoring the ciliary
      basis of the disorder.
  - reference: PMID:22019273
    reference_title: "Ciliopathies with skeletal anomalies and renal insufficiency due to mutations in the IFT-A gene WDR19."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      WDR19 encodes IFT144, a member of the intraflagellar transport (IFT)
      complex A that drives retrograde ciliary transport.
    explanation: >-
      Identifies WDR19/IFT144 as an IFT-A subunit driving retrograde ciliary
      transport, the transport process disrupted in CED.
  - reference: PMID:33517396
    reference_title: "Molecular basis of ciliary defects caused by compound heterozygous IFT144/WDR19 mutations found in cranioectodermal dysplasia."
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: >-
      Mutations in genes encoding the IFT-A subunits (IFT43, IFT121/WDR35,
      IFT122, IFT139/TTC21B, IFT140 and IFT144/WDR19) often result in skeletal
      ciliopathies, including cranioectodermal dysplasia (CED).
    explanation: >-
      Confirms that the full set of IFT-A subunit genes, including all four
      classic CED genes, cause skeletal ciliopathies such as CED.
  downstream:
  - target: Cilium-Dependent Signaling Failure
    description: >-
      A functionally incompetent primary cilium cannot correctly transduce
      cilium-dependent developmental signaling, principally Hedgehog and
      non-canonical Wnt / planar cell polarity.
    causal_link_type: DIRECT
  - target: Craniofacial, Skeletal, and Ectodermal Dysplasia
    description: >-
      Defective ciliary signaling during development disrupts cranial suture,
      skeletal, and ectodermal-appendage morphogenesis.
    causal_link_type: DIRECT
  - target: Renal-Hepatic-Retinal Ciliopathy Pleiotropy
    description: >-
      Ciliary dysfunction in renal tubular epithelium, hepatobiliary tissue, and
      photoreceptors produces the progressive multiorgan involvement of CED.
    causal_link_type: DIRECT
- name: Cilium-Dependent Signaling Failure
  conforms_to: "ciliopathy_dysfunction#Impaired Hedgehog Signal Transduction"
  description: >
    The primary cilium is the obligate organelle for vertebrate Hedgehog signal
    transduction and coordinates non-canonical Wnt / planar cell polarity (PCP)
    signaling. IFT-A-driven ciliary assembly and trafficking defects derange these
    pathways, perturbing the developmental signaling that patterns the skull,
    skeleton, and tubular organs.
  biological_processes:
  - preferred_term: Hedgehog (smoothened) signaling pathway
    term:
      id: GO:0007224
      label: smoothened signaling pathway
    modifier: DYSREGULATED
  - preferred_term: establishment of planar polarity
    term:
      id: GO:0001736
      label: establishment of planar polarity
    modifier: ABNORMAL
  evidence:
  - reference: PMID:33517396
    reference_title: "Molecular basis of ciliary defects caused by compound heterozygous IFT144/WDR19 mutations found in cranioectodermal dysplasia."
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: >-
      When exogenously expressed in IFT144-knockout (KO) cells, IFT144(L710S) as
      well as IFT144(WT) rescued both moderately compromised ciliogenesis and the
      abnormal localization of ciliary proteins.
    explanation: >-
      Demonstrates that IFT-A (IFT144/WDR19) loss compromises ciliogenesis and the
      localization of ciliary proteins, the substrate for cilium-dependent
      signaling, in a cell model of CED genotypes.
  downstream:
  - target: Craniofacial, Skeletal, and Ectodermal Dysplasia
    description: >-
      Disrupted cilium-dependent Hedgehog and PCP signaling in the developing
      cranium, growth plate, and ectodermal appendages produces the craniofacial,
      skeletal, and ectodermal phenotype.
    causal_link_type: DIRECT
- name: Craniofacial, Skeletal, and Ectodermal Dysplasia
  description: >
    The developmental arm of CED. Impaired cilium-dependent signaling disturbs
    cranial suture patterning (producing sagittal craniosynostosis and
    dolichocephaly), endochondral skeletal growth (narrow thorax, short proximal
    limbs, brachydactyly, polydactyly), and the morphogenesis of ectodermal
    appendages (sparse hair, hypoplastic widely spaced teeth, abnormal nails).
    Dolichocephaly secondary to sagittal craniosynostosis is the manifestation
    that distinguishes CED from most other ciliopathies.
  cell_types:
  - preferred_term: chondrocyte
    term:
      id: CL:0000138
      label: chondrocyte
