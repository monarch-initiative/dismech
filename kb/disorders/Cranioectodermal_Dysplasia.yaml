name: Cranioectodermal Dysplasia
creation_date: "2026-06-17T00:00:00Z"
category: Mendelian
description: >
  Cranioectodermal dysplasia (CED), also known as Sensenbrenner syndrome, is a
  rare autosomal recessive skeletal ciliopathy characterized by craniofacial,
  skeletal, and ectodermal anomalies (dolichocephaly often secondary to sagittal
  craniosynostosis, narrow thorax, shortened proximal limbs, brachydactyly,
  polydactyly, sparse hair, widely spaced hypoplastic teeth, and abnormal nails),
  frequently complicated by nephronophthisis-type progressive renal failure,
  hepatic fibrosis, and retinal dystrophy. CED is caused by biallelic mutations in
  genes encoding intraflagellar transport (IFT) complex-A components. The four
  classically recognized molecular subtypes are CED1 (IFT122), CED2 (WDR35),
  CED3 (IFT43), and CED4 (WDR19); additional IFT-A genes (IFT140, IFT52) have
  since been associated with the syndrome. Loss of IFT-A function disrupts
  retrograde ciliary transport and primary cilium function, converging on the
  shared ciliopathy mechanism.
disease_term:
  preferred_term: cranioectodermal dysplasia
  term:
    id: MONDO:0009032
    label: cranioectodermal dysplasia
parents:
- Ciliopathies
references:
- reference: PMID:24027799
  title: "Cranioectodermal Dysplasia"
  tags:
