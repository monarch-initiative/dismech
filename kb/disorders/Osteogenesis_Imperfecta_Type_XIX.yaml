  downstream:
  - target: Mechanically Weak Bone Matrix, Low Bone Mass, and Skeletal Fragility
    description: >-
      Reduced collagen secretion plus impaired collagen crosslinking and
      defective osteoblast maturation yield a mechanically inferior bone matrix
      with low bone mass and fracture susceptibility.
- name: Mechanically Weak Bone Matrix, Low Bone Mass, and Skeletal Fragility
  description: >-
    The combination of reduced type I collagen secretion into bone matrix,
    impaired collagen crosslinking (reduced K87 hydroxylation, presumptively
    undermining bone strength), and defective osteoblast differentiation produces
    a mechanically weak, collagen-related bone defect with generalized osteopenia
    and low bone mineral density. Clinically this manifests in affected males as
    prenatal and childhood fractures, short stature, bowing of the long bones,
    scoliosis with anterior vertebral wedging, and pectal deformity in the
    moderate-to-severe OI range.
