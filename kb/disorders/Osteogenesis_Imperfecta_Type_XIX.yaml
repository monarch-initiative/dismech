  evidence:
  - reference: PMID:27380894
    reference_title: "MBTPS2 mutations cause defective regulated intramembrane proteolysis in X-linked osteogenesis imperfecta."
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: >-
      Mutant S2P has normal stability, but impaired functioning in regulated
      intramembrane proteolysis (RIP) of OASIS, ATF6 and SREBP transcription
      factors, consistent with decreased proband secretion of type I collagen.
    explanation: >-
      Establishes that hypomorphic MBTPS2 produces a stable but functionally
      impaired S2P that cannot perform RIP of its transcription-factor
      substrates, the proximal lesion of OI type XIX.
  - reference: PMID:27380894
    reference_title: "MBTPS2 mutations cause defective regulated intramembrane proteolysis in X-linked osteogenesis imperfecta."
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: >-
      mature intracellular OASIS cleavage fragment (50 kDa, S1P/S2P cleaved) was
      decreased, while the 55-kDa cleavage product (S1P cleaved) was increased,
      in fibroblasts with each mutation and in S2P p.L505F osteoblasts,
      indicating S2P cleavage impairment in OI probands
    explanation: >-
      Demonstrates at the molecular level that mutant S2P fails to complete the
      S2P-dependent cleavage step of OASIS in OI proband cells.
  downstream:
  - target: Defective OASIS-Driven Osteoblast Transcription and Reduced Type I Collagen
    description: >-
      Impaired S2P processing of OASIS/CREB3L1 reduces OASIS-dependent
      transcriptional output in osteoblasts, lowering type I collagen secretion
      and disrupting osteoblast differentiation.
- name: Defective OASIS-Driven Osteoblast Transcription and Reduced Type I Collagen
  description: >-
    Fully processed OASIS/CREB3L1 normally activates Col1a1 transcription and
    complexes with SMAD4 to upregulate matrix genes. When S2P-mediated OASIS
    processing is impaired, OASIS (CREB3L1) and SMAD4 expression fall across
    osteoblast differentiation, alkaline phosphatase expression is reduced, and
    proband osteoblasts show a broad differentiation defect. Mutant cells secrete
    significantly less type I collagen (20-73% of control in fibroblasts). In
    parallel, hydroxylation of the collagen helical lysine K87 critical for
    crosslinking is reduced — associated with substantially decreased lysyl
    hydroxylase 1 (PLOD1/LH1) in proband osteoblasts — yielding collagen with
    fewer mature crosslinks.
