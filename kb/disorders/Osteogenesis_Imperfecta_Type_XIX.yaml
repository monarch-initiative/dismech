genetic:
- name: MBTPS2 (S2P) Hypomorphic Missense Mutations
  association: Causative
  gene_term:
    preferred_term: MBTPS2 (site-2 protease, S2P; RIP intramembrane metalloprotease)
    term:
      id: hgnc:15455
      label: MBTPS2
  notes: >-
    OI type XIX is caused by hemizygous hypomorphic missense variants in MBTPS2
    at Xp22.12, encoding site-2 metalloprotease (S2P). The two founding alleles
    (p.N459S, at the first residue of the metal-ion-coordinating NPDG motif, and
    p.L505F) are highly conserved S2P substitutions that leave the protein stable
    but impair RIP of OASIS/ATF6/SREBP. MBTPS2 is also the cause of allelic
    X-linked dermatological disorders — IFAP/BRESHECK syndrome, keratosis
    follicularis spinulosa decalvans (KFSD), and Olmsted syndrome — but OI type
    XIX patients lack those skin/hair/eye features; this entry concerns the OI
    (bone-fragility) phenotype. Affected males are sons of unaffected obligate
    carriers.
  evidence:
  - reference: PMID:27380894
    reference_title: "MBTPS2 mutations cause defective regulated intramembrane proteolysis in X-linked osteogenesis imperfecta."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      MBTPS2 missense mutations in two independent kindreds with moderate/severe
      OI cause substitutions at highly conserved S2P residues.
    explanation: >-
      Identifies the causative MBTPS2 (S2P) missense variants in two independent
      OI kindreds, defining OI type XIX.
  - reference: PMID:27380894
    reference_title: "MBTPS2 mutations cause defective regulated intramembrane proteolysis in X-linked osteogenesis imperfecta."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Mutations previously reported to cause substitutions in S2P (Supplementary
      Fig. 8) underlie a spectrum of dermatological conditions: IFAP syndrome,
      characterized by a triad of ichthyosis follicularis, atrichia and
      photophobia
    explanation: >-
      Documents the allelic MBTPS2 dermatological disorders distinct from the OI
      phenotype, supporting the genotype note.
diagnosis:
- name: Molecular Genetic Diagnosis
  description: >-
    OI type XIX is suspected in a male with moderate-to-severe collagen-related
    OI (prenatal/childhood fractures, low bone mineral density, long-bone bowing,
    scoliosis) showing an X-linked recessive pattern (affected males, carrier
    mothers) when COL1A1/COL1A2 and the autosomal recessive OI genes are
    negative. Diagnosis is confirmed by identifying a hemizygous pathogenic
    MBTPS2 (S2P) missense variant by X-chromosome linkage and next-generation
    (gene-panel/exome) sequencing. An elevated urinary lysyl- to
    hydroxylysyl-pyridinoline (LP/HP) ratio is a supportive collagen-crosslinking
    marker.
  diagnosis_term:
    preferred_term: molecular genetic testing
    term:
      id: MAXO:0000533
      label: molecular genetic testing
  evidence:
  - reference: PMID:27380894
    reference_title: "MBTPS2 mutations cause defective regulated intramembrane proteolysis in X-linked osteogenesis imperfecta."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Linkage analysis and next-generation sequencing (NGS) identified a novel
      MBTPS2 missense mutation in each pedigree.
    explanation: >-
      Documents the molecular-genetic diagnostic route (linkage plus NGS) that
      establishes OI type XIX.
treatments:
- name: Bisphosphonate Therapy
  description: >-
    Intravenous bisphosphonates (e.g., pamidronate, zoledronic acid) are the
    pharmacological mainstay of moderate-to-severe OI, increasing bone mineral
    density and reducing fracture frequency in patients with vertebral fractures,
    frequent long-bone fractures, or more severe disease. They are antiresorptive
    and do not correct the underlying RIP/collagen defect of OI type XIX.
  treatment_term:
    preferred_term: bisphosphonate agent therapy
    term:
      id: MAXO:0000954
      label: bisphosphonate agent therapy
  evidence:
  - reference: PMID:20301472
    reference_title: "COL1A1- and COL1A2-Related Osteogenesis Imperfecta."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Bisphosphonates continue to be used most extensively in those with
      vertebral fractures, frequent long bone fractures, or more severe OI.
    explanation: >-
      GeneReviews documents bisphosphonates as the standard pharmacological
      treatment for severe OI, applicable to OI type XIX.
- name: Orthopedic Surgery and Intramedullary Rodding
  description: >-
    Intramedullary (telescoping) rod fixation and corrective osteotomy stabilize
    fracture-prone, deformed long bones; spinal surgery may address progressive
    scoliosis. Surgical management is standard in moderate-to-severe OI such as
    OI type XIX.
  treatment_term:
    preferred_term: surgical procedure
    term:
      id: MAXO:0000004
      label: surgical procedure
  evidence:
  - reference: PMID:20301472
    reference_title: "COL1A1- and COL1A2-Related Osteogenesis Imperfecta."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      intramedullary rodding when
      indicated to provide anatomic positioning of limbs
    explanation: >-
      GeneReviews documents intramedullary rodding as standard orthopedic
      management for OI long-bone fractures and deformity, applicable to OI
      type XIX.
- name: Physical Therapy and Rehabilitation
  description: >-
    Physical and occupational therapy improve mobility and muscle strength and
    prevent contractures and deformity; early physical therapy follows brief
    post-fracture immobilization.
  treatment_term:
    preferred_term: physical therapy
    term:
      id: MAXO:0000011
      label: physical therapy
  evidence:
  - reference: PMID:20301472
    reference_title: "COL1A1- and COL1A2-Related Osteogenesis Imperfecta."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Fractures are treated with as
      short a period of immobility as is practical, small and lightweight casts, and
      physical therapy as soon as casts are removed
    explanation: >-
      GeneReviews documents early physical therapy and brief immobilization as
      part of standard OI fracture rehabilitation.
