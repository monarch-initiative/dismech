pathophysiology:
- name: Hypomorphic MBTPS2 Impairs Site-2 Protease (S2P) Regulated Intramembrane Proteolysis
  description: >-
    MBTPS2 encodes site-2 metalloprotease (S2P), an integral Golgi membrane
    protein that, with site-1 protease (S1P), sequentially cleaves
    membrane-spanning regulatory transcription factors (OASIS/CREB3L1, ATF6,
    SREBP) transported from the ER during ER stress or sterol restriction,
    releasing mature N-terminal fragments that enter the nucleus to activate
    transcription (regulated intramembrane proteolysis, RIP). OI-causing
    hemizygous missense substitutions at highly conserved S2P residues (p.N459S
    at the first residue of the metal-ion-coordinating NPDG motif; p.L505F) leave
    the protein stable and normally expressed but functionally impaired, so RIP
    cleavage/activation of OASIS, ATF6 and SREBP is reduced.
