name: Osteogenesis Imperfecta Type XIX
creation_date: "2026-06-30T00:00:00Z"
category: Mendelian
disease_term:
  preferred_term: Osteogenesis imperfecta type 19
  term:
    id: MONDO:0049223
    label: osteogenesis imperfecta, type 19
description: >-
  Osteogenesis imperfecta type XIX (OI type XIX) is the only X-linked recessive
  form of osteogenesis imperfecta, a collagen-related brittle bone dysplasia. It
  is caused by hemizygous hypomorphic missense variants in MBTPS2 (on Xp22),
  which encodes site-2 metalloprotease (S2P), an integral Golgi membrane protease
  that, together with site-1 protease (S1P), performs regulated intramembrane
  proteolysis (RIP) of membrane-bound transcription factors transported from the
  ER under ER-stress or sterol-restriction conditions. S2P substrates include
  OASIS/CREB3L1 (a bZIP transcription factor expressed in osteoblasts that
  activates type I collagen transcription and complexes with SMAD4 to drive
  matrix-gene expression), ATF6 (unfolded protein response) and SREBP (sterol
  metabolism). OI-causing MBTPS2 substitutions occur at highly conserved S2P
  residues near the carboxyl end of the protein (e.g., p.N459S at the first
  residue of the metal-ion-coordinating NPDG motif, and p.L505F); the mutant
  protein is stable but functionally impaired, so RIP cleavage/activation of
  OASIS, ATF6 and SREBP is reduced. The downstream bone defect combines reduced
  type I collagen secretion by mutant cells, a broad defect in osteoblast
  differentiation, and reduced hydroxylation of the helical collagen lysine (K87)
  critical for crosslinking — the latter associated with reduced lysyl
  hydroxylase 1 (PLOD1/LH1) in proband osteoblasts and elevated urinary
  lysyl-/hydroxylysyl-pyridinoline ratio. The net result is mechanically weak
  bone with low bone mineral density and skeletal fragility. Affected males
  present with prenatal and childhood fractures, short stature, long-bone bowing,
  generalized osteopenia, scoliosis/vertebral wedging and pectal deformity, in
  the moderate-to-severe range; obligate-carrier mothers are clinically
  unaffected. OI type XIX is mechanistically continuous with CREB3L1-related OI
  type XVI: MBTPS2 defects impair RIP processing of the same OASIS transcription
  factor whose loss causes the recessive autosomal form, but the affected
  individuals lack the dermatological features (IFAP/KFSD/Olmsted) of other
  allelic MBTPS2 disorders.
