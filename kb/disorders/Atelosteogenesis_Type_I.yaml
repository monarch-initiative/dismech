name: Atelosteogenesis Type I
creation_date: '2026-03-04T07:42:25Z'
updated_date: '2026-03-04T07:42:25Z'
category: Mendelian
description: >
  Atelosteogenesis Type I is a skeletal dysplasia associated with pathogenic variation in
  FLNB, causing abnormal cartilage and growth plate biology with disturbed
  endochondral ossification and disproportionate skeletal growth.
