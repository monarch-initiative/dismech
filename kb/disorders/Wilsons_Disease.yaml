- name: Kayser-Fleischer Rings
  category: Ocular
  frequency: VERY_FREQUENT
  diagnostic: true
  notes: Copper deposits in Descemet membrane, pathognomonic
  evidence:
  - reference: PMID:16709660
    supports: SUPPORT
    snippet: "Diagnostic criteria for non-caeruloplasmin-bound serum copper, serum
      caeruloplasmin, 24-h urinary copper excretion, liver copper content, presence of
      Kayser-Fleischer rings and histological signs of chronic liver damage were reached
      in 86.6%, 88.2%, 87.1%, 92.7%, 66.3% and 73% of patients, respectively."
    explanation: Large-cohort data confirm frequent Kayser-Fleischer ring detection
      in diagnosed Wilson disease.
  - reference: PMID:38731973
    supports: SUPPORT
    snippet: "copper injures not only the liver, but also the brain, kidneys, eyes,
      heart, muscles, and bones, explaining the multifaceted clinical features of
      Wilson disease. Among these are depression, psychosis, dysarthria, ataxia, writing
      problems, dysphagia, renal tubular dysfunction, Kayser-Fleischer corneal rings"
    explanation: Confirms Kayser-Fleischer rings as a key clinical feature of
      Wilson's disease due to copper deposition in the eyes.
