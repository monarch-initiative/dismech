  treatment_term:
    preferred_term: dietary intervention
    term:
      id: MAXO:0000088
      label: dietary intervention
- name: Tetrathiomolybdate
  description: Emerging copper chelator that rapidly complexes free copper,
    reducing bioavailable copper.
  evidence:
  - reference: PMID:37741465
    supports: PARTIAL
    snippet: "Current treatment protocols are limited to either sequestration of copper
      via chelation or reduction of copper absorption in the gut"
    explanation: Tetrathiomolybdate represents an emerging chelation approach
      that tightly complexes copper.
  treatment_term:
    preferred_term: copper chelator agent therapy
    term:
