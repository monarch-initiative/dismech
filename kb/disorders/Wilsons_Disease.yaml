- name: Liver Transplantation
  description: Curative for hepatic Wilson disease, reverses copper metabolism
    defect.
  evidence:
  - reference: PMID:38731973
    supports: SUPPORT
    snippet: "Liver transplantation is an option viewed as ultima ratio in end-stage
      liver disease with untreatable complications or acute liver failure. Liver transplantation
      finally may thus be a life-saving approach and curative treatment of the disease
      by replacing the hepatic gene mutation."
    explanation: Confirms liver transplantation as curative treatment that
      replaces the defective gene.
  treatment_term:
    preferred_term: liver transplantation
    term:
      id: MAXO:0001175
      label: liver transplantation
differential_diagnoses:
- name: Autoimmune Hepatitis
  description: >
    Autoimmune hepatitis can present with similar hepatic inflammation,
    elevated transaminases, and cirrhosis. Wilson disease liver pathology
    is frequently misinterpreted as autoimmune hepatitis.
  distinguishing_features:
  - Positive autoimmune markers (ANA, anti-SMA) in autoimmune hepatitis
  - Low ceruloplasmin and elevated urinary copper distinguish Wilson disease
  - Kayser-Fleischer rings absent in autoimmune hepatitis
  evidence:
  - reference: PMID:28433112
    supports: SUPPORT
    snippet: "Wilson disease may be microscopically misinterpreted as many other liver
      diseases, including viral or autoimmune hepatitis, alcoholic/nonalcoholic
      steatohepatitis, toxic liver injury, cryptogenic cirrhosis"
    explanation: Directly states that Wilson disease liver pathology can mimic
      autoimmune hepatitis.
- name: Non-Alcoholic Steatohepatitis
  description: >
    NASH shares histological features with Wilson disease including steatosis,
    inflammation, and fibrosis.
  distinguishing_features:
  - Metabolic syndrome features (obesity, insulin resistance) in NASH
  - Normal ceruloplasmin and urinary copper in NASH
  - Copper quantification on liver biopsy differentiates
  evidence:
  - reference: PMID:28433112
    supports: SUPPORT
    snippet: "Wilson disease may be microscopically misinterpreted as many other liver
      diseases, including viral or autoimmune hepatitis, alcoholic/nonalcoholic
      steatohepatitis, toxic liver injury, cryptogenic cirrhosis"
    explanation: Confirms histological overlap between Wilson disease and
      steatohepatitis.
