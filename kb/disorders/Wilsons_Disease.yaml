- name: Impaired Ceruloplasmin Loading
  description: >
    ATP7B normally loads copper into apoceruloplasmin in the trans-Golgi network.
    Loss of ATP7B function results in secretion of copper-free apoceruloplasmin,
    which is rapidly degraded, leading to the characteristic low serum
    ceruloplasmin levels.
  evidence:
  - reference: PMID:16382340
    supports: SUPPORT
    snippet: "ATP7B is the gene product of the WD gene located on chromosome 13 and
      resides in hepatocytes in the trans-Golgi network, transporting copper into
      the secretory pathway for incorporation into apoceruloplasmin and excretion
      into the bile."
    explanation: Supports that ATP7B loads copper into apoceruloplasmin in the
      secretory pathway.
  biological_processes:
  - preferred_term: copper ion homeostasis
    term:
      id: GO:0055070
      label: copper ion homeostasis

- name: Hepatic Copper Accumulation
  description: >
    Impaired biliary excretion causes progressive copper retention in
    hepatocytes. When hepatic storage capacity is exceeded, copper is
    released into the circulation.
  evidence:
  - reference: PMID:16382340
    supports: SUPPORT
    snippet: "Wilson disease (WD) is an autosomal recessive inherited disorder of
      copper metabolism, resulting in pathological accumulation of copper in many
      organs and tissues."
    explanation: Supports multi-organ copper accumulation in Wilson disease.
  - reference: PMID:38731973
    supports: SUPPORT
    snippet: "Released from the liver cells due to limited storage capacity, the toxic
      copper enters the circulation and arrives at other organs, causing local accumulation
      and cell injury."
    explanation: Confirms hepatic copper overflow into systemic circulation.
  cell_types:
  - preferred_term: hepatocyte
    term:
      id: CL:0000182
      label: hepatocyte
  locations:
  - preferred_term: liver
    term:
      id: UBERON:0002107
      label: liver
  downstream:
  - target: Hepatocyte Injury
    description: Copper overload in hepatocytes drives oxidative stress and cell death.
  - target: Systemic Copper Distribution
    description: Overflow of copper from the liver enters the circulation and deposits in extrahepatic organs.

- name: Systemic Copper Distribution
  description: >
    When hepatic copper storage capacity is exceeded, free copper enters
    the circulation and deposits in the brain, kidneys, eyes, heart,
    muscles, and bones, causing multi-organ injury.
  evidence:
  - reference: PMID:38731973
    supports: SUPPORT
    snippet: "Released from the liver cells due to limited storage capacity, the toxic
      copper enters the circulation and arrives at other organs, causing local accumulation
      and cell injury. This explains why copper injures not only the liver, but also
      the brain"
    explanation: Explains the pathophysiology of systemic copper distribution from
      hepatic overflow.
  - reference: PMID:25002079
    supports: PARTIAL
    snippet: "Free copper in Wilson disease (WD) is toxic and may reduce antioxidant,
      increase oxidative stress marker and thereby cytokine release and excitotoxic
      injury, but there is paucity of studies in humans."
    explanation: Supports toxic effects of circulating free copper causing
      oxidative stress and excitotoxic injury.
  downstream:
  - target: Neurodegeneration
    description: Copper deposition in the basal ganglia and other brain regions causes neuronal injury.

- name: Hepatocyte Injury
  description: >
    Copper accumulation in hepatocytes causes oxidative stress, mitochondrial
    dysfunction, and cell death. Progressive liver damage leads to fibrosis
    and cirrhosis. Copper overload activates autophagy and mitophagy-based
    mitochondrial quality control responses.
  evidence:
  - reference: PMID:38731973
    supports: SUPPORT
    snippet: "Excess Cu2+ primarily leads to the generation of reactive oxygen species
      (ROS), as evidenced by early experimental studies exemplified with the detection
      of hydroxyl radical formation"
    explanation: Demonstrates that excess copper generates ROS leading to
      oxidative stress and cellular injury.
  - reference: PMID:24517326
    supports: SUPPORT
    snippet: "On the contrary, however, when copper is massively deposited in mitochondria,
      severe structural and respiratory impairments are observed upon disease progression.
      This provokes reactive oxygen species and consequently causes the mitochondrial
      membranes to disintegrate, which triggers hepatocyte death."
    explanation: Supports mitochondrial dysfunction, ROS generation, and
      hepatocyte death with copper overload.
  - reference: PMID:28433112
    supports: SUPPORT
    snippet: "Most liver biopsy specimens show moderate to severe steatosis, variable
      degree of portal and/or lobular inflammation, and fibrosis eventually progressing
      to cirrhosis."
    explanation: Supports progression from hepatic injury to fibrosis and
      cirrhosis.
  - reference: PMID:30452922
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "ATP7B-deficient hepatocytes, such as in those in patients with WD,
      activate autophagy in response to copper overload to prevent copper-induced
      apoptosis."
    explanation: Demonstrates that human Wilson disease hepatocytes activate
      autophagy as a protective response to copper overload.
  - reference: PMID:30452922
    supports: SUPPORT
    evidence_source: MODEL_ORGANISM
    snippet: "Hepatocytes in liver tissues from patients with WD and from Atp7b-/-
      mice and rats (but not controls) had multiple autophagosomes."
    explanation: Atp7b-/- mice and rats confirm autophagosome accumulation in
      ATP7B-deficient hepatocytes, corroborating the human findings.
  - reference: PMID:33360697
    supports: PARTIAL
    evidence_source: MODEL_ORGANISM
    snippet: "In general, the results reveal that Cu exposure can cause mitophagy
      through the PINK1/Parkin pathway in chicken livers, and that mitophagy might
      attenuate Cu-induced mitochondrial apoptosis."
    explanation: Shows copper-induced mitophagy in chicken liver tissue (non-standard
      model), supporting mitochondrial quality control responses to copper overload.
