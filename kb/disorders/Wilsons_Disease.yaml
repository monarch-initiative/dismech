biochemical:
- name: Ceruloplasmin
  presence: Decreased
  context: Low in over 90 percent of patients (less than 20 mg/dL)
  evidence:
  - reference: PMID:15205951
    supports: SUPPORT
    snippet: "The diagnosis of WD is commonly made on the basis of typical clinical and
      laboratory findings, including low serum ceruloplasmin, increased urinary copper
      excretion, and increased hepatic copper content."
    explanation: Directly supports low serum ceruloplasmin as a diagnostic biochemical
      feature.
- name: Non-Ceruloplasmin-Bound Serum Copper
  presence: Elevated
  context: Free copper fraction is elevated; a key diagnostic biomarker criterion met in 86.6% of patients
  evidence:
  - reference: PMID:16709660
    supports: SUPPORT
    snippet: "Diagnostic criteria for non-caeruloplasmin-bound serum copper, serum
      caeruloplasmin, 24-h urinary copper excretion, liver copper content, presence of
      Kayser-Fleischer rings and histological signs of chronic liver damage were reached
      in 86.6%, 88.2%, 87.1%, 92.7%, 66.3% and 73% of patients, respectively."
    explanation: Supports non-ceruloplasmin-bound copper as a commonly met diagnostic
      biomarker criterion.
  - reference: PMID:37741465
    supports: PARTIAL
    snippet: "The goal of these strategies is to reduce free copper, redox stress,
      and cellular toxicity"
    explanation: Elevated free copper is the therapeutic target in Wilson
      disease, confirming its pathological elevation.
- name: 24-Hour Urinary Copper
  presence: Elevated
  context: Elevated urinary copper is diagnostic
  evidence:
  - reference: PMID:15205951
    supports: SUPPORT
    snippet: "The diagnosis of WD is commonly made on the basis of typical clinical and
      laboratory findings, including low serum ceruloplasmin, increased urinary copper
      excretion, and increased hepatic copper content."
    explanation: Directly supports increased urinary copper excretion as a diagnostic
      biochemical feature.
- name: Hepatic Copper
  presence: Elevated
  context: Liver biopsy with elevated copper is diagnostic
  evidence:
  - reference: PMID:15205951
    supports: SUPPORT
    snippet: "The diagnosis of WD is commonly made on the basis of typical clinical and
      laboratory findings, including low serum ceruloplasmin, increased urinary copper
      excretion, and increased hepatic copper content."
    explanation: Directly supports increased hepatic copper content as a key diagnostic
      criterion.
genetic:
- name: ATP7B
  association: Causative
  gene_term:
    preferred_term: ATP7B
    term:
      id: hgnc:870
      label: ATP7B
  inheritance:
  - name: Autosomal Recessive
  notes: More than 200 mutations described; most common include H1069Q in European populations
  evidence:
  - reference: PMID:37741465
    supports: SUPPORT
    snippet: "Inactivating mutations of the copper-transporting P-type ATPase, ATP7B,
      result in Wilson's disease, an autosomal recessive disorder"
    explanation: Establishes ATP7B mutations as the causative genetic defect in
      Wilson's disease with autosomal recessive inheritance.
  - reference: PMID:15205951
    supports: SUPPORT
    snippet: "Thus far, more than 200 mutations of the WD gene have been detected,
      causing impairment of ATP7B function and, ultimately, copper accumulation."
    explanation: Confirms large number of ATP7B mutations causing Wilson disease.
environmental:
- name: Dietary Copper
  notes: High copper foods may accelerate accumulation
  evidence:
  - reference: PMID:38731973
    supports: PARTIAL
    snippet: "copper, which is found ubiquitously on earth and normally enters the
      human body in small amounts via the food chain"
    explanation: Dietary copper intake contributes to body copper load, making
      dietary restriction an important adjunctive measure.
treatments:
- name: D-Penicillamine
  description: Copper chelator, first-line therapy, promotes urinary copper
    excretion.
  evidence:
  - reference: PMID:38731973
    supports: SUPPORT
    snippet: "Patients with Wilson disease are well-treated first-line with copper
      chelators like D-penicillamine that facilitate the removal of circulating copper
      bound to albumin and increase in urinary copper excretion. Early chelation therapy
      improves prognosis."
    explanation: Establishes D-penicillamine as first-line chelation therapy
      with evidence for improved prognosis.
  - reference: PMID:37116715
    supports: PARTIAL
    snippet: "NW was observed with D-penicillamine, trientine and zinc therapy and was
      reversible in 15/30 (50%) with early NW and in 29/36 (81%) with late NW."
    explanation: Large cohort data show treatment-associated neurological worsening
      can occur, supporting close neurologic monitoring during chelation.
  treatment_term:
    preferred_term: copper chelator agent therapy
    term:
      id: MAXO:0001224
      label: copper chelator agent therapy
- name: Trientine
  description: Alternative copper chelator, better tolerated than penicillamine.
  evidence:
  - reference: PMID:35887738
    supports: SUPPORT
    snippet: "The two salts of trientine were effective in treating patients with WD."
    explanation: Directly supports trientine efficacy in treated Wilson disease
      cohorts.
  treatment_term:
    preferred_term: copper chelator agent therapy
    term:
      id: MAXO:0001224
      label: copper chelator agent therapy
- name: Zinc Acetate
  description: Blocks intestinal copper absorption, maintenance therapy.
  evidence:
  - reference: PMID:37741465
    supports: SUPPORT
    snippet: "reduction of copper absorption in the gut (zinc therapy)"
