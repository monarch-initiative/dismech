name: Acromegaly
category: Endocrine Disorder
creation_date: '2026-05-11T00:00:00Z'
updated_date: '2026-05-11T00:00:00Z'
description: >-
  Acromegaly is an endocrine disorder caused by chronic excess growth hormone
  (GH) and insulin-like growth factor 1 (IGF-1), most often from a
  GH-secreting pituitary somatotroph adenoma. Persistent GH hypersecretion
  drives hepatic and peripheral IGF-1 production, leading to acral and facial
  overgrowth, soft tissue enlargement, metabolic complications, and increased
  cardiovascular and respiratory morbidity.
