biochemical:
- name: Serum IGF-1
  presence: Elevated
  context: >-
    Key biochemical marker for acromegaly diagnosis, disease control, and
    pharmacodynamic response to GH-axis therapy.
  readouts:
  - target: GH-driven IGF-1 overproduction
    relationship: PHARMACODYNAMIC_MARKER_OF
    direction: POSITIVE
    endpoint_context: PHARMACODYNAMIC
    regulatory_endpoint_refs:
    - FDA-SE-adult-noncancer-002
    - FDA-SE-adult-noncancer-003
    - FDA-SE-pediatric-noncancer-003
    interpretation: >-
      Higher serum IGF-1 reflects greater GH-driven peripheral IGF-1 activity;
      normalization indicates biochemical disease control and treatment response.
    evidence:
    - reference: PMID:33803429
      reference_title: "The Biochemical Diagnosis of Acromegaly."
      supports: SUPPORT
      evidence_source: HUMAN_CLINICAL
      snippet: Measurement of IGF-1 levels is the key factor in the diagnosis and monitoring of acromegaly.
      explanation: The review supports IGF-1 as the central biochemical marker for acromegaly monitoring.
  evidence:
  - reference: PMID:33803429
    reference_title: "The Biochemical Diagnosis of Acromegaly."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: The most important assays for the biochemical diagnosis and management of acromegaly are growth hormone (GH) and insulin-like growth factor-1 (IGF-1).
    explanation: This supports serum IGF-1 as a core biochemical marker in acromegaly.
- name: Serum growth hormone
  presence: Elevated
  context: >-
    Biochemical marker of pituitary GH secretory activity, interpreted with
    IGF-1 and, when needed, GH suppression after oral glucose.
  readouts:
  - target: Somatotroph growth hormone hypersecretion
    relationship: PHARMACODYNAMIC_MARKER_OF
    direction: POSITIVE
    endpoint_context: PHARMACODYNAMIC
    regulatory_endpoint_refs:
    - FDA-SE-adult-noncancer-003
    interpretation: >-
      Higher serum GH tracks with greater somatotroph GH secretory activity;
      treatment-related suppression indicates reduced GH-axis drive.
    evidence:
    - reference: PMID:33803429
      reference_title: "The Biochemical Diagnosis of Acromegaly."
      supports: SUPPORT
      evidence_source: HUMAN_CLINICAL
      snippet: Basal GH levels are measured in the morning after fasting and are usually elevated in patients with acromegaly.
      explanation: This supports serum GH as a readout of the GH hypersecretion node.
  evidence:
  - reference: PMID:25356808
    reference_title: "Acromegaly: an endocrine society clinical practice guideline."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: The aim was to formulate clinical practice guidelines for acromegaly.
    explanation: The guideline covers biochemical assessment and management of acromegaly, including GH measurement.
