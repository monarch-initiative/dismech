      explanation: The review links GH/IGF-1 excess to clinical acromegaly.
- name: GH-driven IGF-1 overproduction
  description: >-
    Sustained GH signaling increases IGF-1 production, especially in liver, and
    circulating IGF-1 integrates the biological activity of the GH excess state.
