    reference_title: "The Biochemical Diagnosis of Acromegaly."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: IGF-1 is synthesized primarily in the liver, additional tissues can produce IGF-1, including bone, muscle, kidney and the pituitary gland itself.
    explanation: This supports GH-driven IGF-1 production as the peripheral biochemical effector state.
  downstream:
  - target: GH/IGF-1 tissue overgrowth and metabolic morbidity
    description: Chronic IGF-1 activity drives acral growth, soft tissue expansion, and systemic complications.
    causal_link_type: INDIRECT_KNOWN_INTERMEDIATES
    evidence:
    - reference: PMID:33803429
      reference_title: "The Biochemical Diagnosis of Acromegaly."
      supports: SUPPORT
      evidence_source: HUMAN_CLINICAL
      snippet: High levels of IGF-1 are responsible for most of the clinical manifestations of acromegaly.
      explanation: The review attributes most clinical manifestations to elevated IGF-1.
- name: GH/IGF-1 tissue overgrowth and metabolic morbidity
  description: >-
    Chronic GH and IGF-1 excess promotes acral and facial tissue overgrowth,
    soft-tissue enlargement, insulin resistance, sleep apnea, hypertension,
    arthropathy, and excess cardiometabolic risk.
