biochemical:
- name: Serum IGF-1
  presence: Elevated
  context: >-
    Key biochemical marker for acromegaly diagnosis, disease control, and
    pharmacodynamic response to GH-axis therapy.
  readouts:
  - target: GH-driven IGF-1 overproduction
    relationship: PHARMACODYNAMIC_MARKER_OF
    direction: POSITIVE
    endpoint_context: PHARMACODYNAMIC
    regulatory_endpoint_refs:
    - FDA-SE-adult-noncancer-002
    - FDA-SE-adult-noncancer-003
    - FDA-SE-pediatric-noncancer-003
    interpretation: >-
      Higher serum IGF-1 reflects greater GH-driven peripheral IGF-1 activity;
      normalization indicates biochemical disease control and treatment response.
    evidence:
    - reference: PMID:33803429
      reference_title: "The Biochemical Diagnosis of Acromegaly."
      supports: SUPPORT
      evidence_source: HUMAN_CLINICAL
      snippet: Measurement of IGF-1 levels is the key factor in the diagnosis and monitoring of acromegaly, but basal and nadir GH following OGTT are also important.
      explanation: The review supports IGF-1 as the central biochemical marker for acromegaly monitoring.
  evidence:
  - reference: PMID:33803429
    reference_title: "The Biochemical Diagnosis of Acromegaly."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: The most important assays for the biochemical diagnosis and management of acromegaly are growth hormone (GH) and insulin-like growth factor-1 (IGF-1).
    explanation: This supports serum IGF-1 as a core biochemical marker in acromegaly.
- name: Serum growth hormone
  presence: Elevated
  context: >-
    Biochemical marker of pituitary GH secretory activity, interpreted with
    IGF-1 and, when needed, GH suppression after oral glucose.
  readouts:
  - target: Somatotroph growth hormone hypersecretion
    relationship: PHARMACODYNAMIC_MARKER_OF
    direction: POSITIVE
    endpoint_context: PHARMACODYNAMIC
    regulatory_endpoint_refs:
    - FDA-SE-adult-noncancer-003
    interpretation: >-
      Higher serum GH tracks with greater somatotroph GH secretory activity;
      treatment-related suppression indicates reduced GH-axis drive.
    evidence:
    - reference: PMID:33803429
      reference_title: "The Biochemical Diagnosis of Acromegaly."
      supports: SUPPORT
      evidence_source: HUMAN_CLINICAL
      snippet: Basal GH levels are measured in the morning after fasting and are usually elevated in patients with acromegaly.
      explanation: This supports serum GH as a readout of the GH hypersecretion node.
  evidence:
  - reference: PMID:33803429
    reference_title: "The Biochemical Diagnosis of Acromegaly."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Butz and colleagues emphasized that while IGF-1 levels are the key factor in the diagnosis and monitoring of acromegaly, GH measurements should not be ignored, as these two hormones reflect different aspects of the disease: GH is a measure of the secretory activity of the tumor and provides a correlate of pituitary GH secretion, while IGF-1 is a measure of biochemical and biological activity of the disease and the peripheral response to circulating GH [33,34]."
    explanation: This directly supports GH as a biochemical marker of pituitary GH secretory activity.
treatments:
- name: Somatostatin receptor ligands
  description: >-
    Somatostatin analogs such as octreotide and lanreotide are used as first-line
    or adjuvant medical therapy to control GH and IGF-1 excess in acromegaly.
  treatment_term:
    preferred_term: pharmacotherapy
    term:
      id: MAXO:0000058
      label: pharmacotherapy
    therapeutic_agent:
    - preferred_term: somatostatin receptor agonist
      term:
        id: NCIT:C62799
        label: Somatostatin Receptor Agonist
  evidence:
  - reference: PMID:21123741
    reference_title: "Resistance to somatostatin analogs in acromegaly."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: Somatostatin analogs (SA) are widely used in acromegaly, either as first-line or adjuvant treatment after surgery.
    explanation: This review supports somatostatin receptor ligand therapy as standard acromegaly pharmacotherapy.
  target_mechanisms:
  - target: Somatotroph growth hormone hypersecretion
    treatment_effect: INHIBITS
    description: Somatostatin receptor ligands suppress the GH-axis excess state, with treatment response tracked by GH and IGF-1 control.
    evidence:
    - reference: PMID:21123741
      reference_title: "Resistance to somatostatin analogs in acromegaly."
      supports: SUPPORT
      evidence_source: HUMAN_CLINICAL
      snippet: Generally, the response to SA takes into account both control of GH and IGF-I excess, with consequent improvement of clinical symptoms directly related to GH and IGF-I excess, and tumor shrinkage.
      explanation: This supports the target-mechanism link between somatostatin analog therapy and reduced GH/IGF-1 excess.
- name: Pegvisomant
  description: >-
    Pegvisomant is a growth hormone receptor antagonist used to mitigate GH
    action and normalize IGF-1 in acromegaly that is not controlled by surgery.
  treatment_term:
    preferred_term: pharmacotherapy
    term:
      id: MAXO:0000058
      label: pharmacotherapy
    therapeutic_agent:
    - preferred_term: pegvisomant
      term:
        id: NCIT:C61881
        label: Pegvisomant
  evidence:
  - reference: PMID:27631335
    reference_title: "Pegvisomant: a growth hormone receptor antagonist used in the treatment of acromegaly."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: Pegvisomant is a genetically engineered, recombinant growth hormone receptor antagonist, which is effective in normalizing serum insulin-like growth factor 1 (IGF-1) levels in the majority of patients with acromegaly and ameliorating symptoms and signs associated with GH excess.
    explanation: This review supports pegvisomant as GH receptor antagonist pharmacotherapy for acromegaly.
  target_mechanisms:
  - target: GH-driven IGF-1 overproduction
    treatment_effect: INHIBITS
    description: GH receptor antagonism blocks peripheral GH action and lowers IGF-1 without directly inhibiting the pituitary adenoma.
    evidence:
    - reference: PMID:27631335
      reference_title: "Pegvisomant: a growth hormone receptor antagonist used in the treatment of acromegaly."
      supports: SUPPORT
      evidence_source: HUMAN_CLINICAL
      snippet: It mitigates excess GH action, as demonstrated by IGF-1 normalization, but has no direct effects on pituitary tumors causing acromegaly.
      explanation: This supports targeting the downstream GH-driven IGF-1 activity rather than the somatotroph tumor itself.
