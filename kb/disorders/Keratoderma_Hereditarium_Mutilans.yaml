  description: >
    Dermatologic diagnosis is based on the pattern of honeycomb palmoplantar
    keratoderma, pseudoainhum or constricting digital bands, starfish-like acral
    keratoses or knuckle lesions, and subtype-discriminating extracutaneous
    features.
  results: >
    Classic GJB2-associated disease is suggested by the full triad of
    honeycomb-pattern PPK, pseudoainhum, and sensorineural hearing loss; the
    LOR-associated variant is suggested by honeycomb PPK and pseudoainhum with
    ichthyosis and without deafness.
  evidence:
  - reference: PMID:30335335
    reference_title: "Vohwinkel Syndrome."
    supports: SUPPORT
    snippet: >
      The classic Vohwinkel syndrome is a hereditary PPK associated with
      "starfish" keratoses on the knuckles, a PPK in a "honeycomb" pattern,
      hearing impairment, and mutilating digital constriction bands
      (pseudoainhum)
    explanation: >
      This review summarizes the clinical findings used to recognize the classic
      GJB2-associated phenotype.
  - reference: PMID:30335335
    reference_title: "Vohwinkel Syndrome."
    supports: SUPPORT
    snippet: >
      loricrin keratoderma, presents as a honeycomb PPK with pseudoainhum with
      the addition of ichthyosis; deafness is not a feature of this
      ichthyosiform variant.
    explanation: >
      This directly supports the clinical distinction between loricrin
      keratoderma and classic Vohwinkel syndrome.
- name: GJB2-subtype audiometric testing
  diagnosis_term:
    preferred_term: audiometric testing
    term:
      id: MAXO:0000125
      label: audiometric testing
  description: >
    Audiometric testing should be performed when the classic GJB2-associated
    subtype is suspected, because sensorineural hearing loss is a defining
    discriminator for this subtype and guides hearing management.
  results: >
    Sensorineural hearing loss supports classic GJB2-associated Vohwinkel
    syndrome; absent hearing loss with ichthyosis supports the LOR-associated
    loricrin keratoderma variant.
  evidence:
  - reference: PMID:10369869
    reference_title: "A missense mutation in connexin26, D66H, causes mutilating keratoderma with sensorineural deafness (Vohwinkel's syndrome) in three unrelated families."
    supports: SUPPORT
    snippet: >
      VS is characterized by papular and honeycomb keratoderma associated with
      constrictions of digits leading to autoamputation, distinctive
      starfish-like acral keratoses and moderate degrees of deafness.
    explanation: >
      The GJB2 study defines deafness as part of the classic Vohwinkel syndrome
      phenotype.
  - reference: PMID:9326398
    reference_title: "Loricrin mutation in Vohwinkel's keratoderma is unique to the variant with ichthyosis."
    supports: SUPPORT
    snippet: >
      Our first family (VK1) also had ichthyosis but not deafness.
    explanation: >
      This supports using audiology results with ichthyosis status to separate
      the LOR-associated subtype from the GJB2-associated subtype.
- name: GJB2 and LOR molecular genetic testing
  diagnosis_term:
    preferred_term: molecular genetic testing
    term:
      id: MAXO:0000533
      label: molecular genetic testing
  description: >
    Molecular testing should assess GJB2 and LOR, either by targeted sequencing
    when the subtype is clinically clear or by a palmoplantar keratoderma/
    ichthyosis gene panel when the presentation overlaps other genodermatoses.
  results: >
    A heterozygous pathogenic GJB2 variant such as D66H confirms the classic
    connexin 26-associated subtype; a heterozygous LOR frameshift confirms the
    loricrin keratoderma/Camisa variant.
  evidence:
  - reference: PMID:10369869
    reference_title: "A missense mutation in connexin26, D66H, causes mutilating keratoderma with sensorineural deafness (Vohwinkel's syndrome) in three unrelated families."
    supports: SUPPORT
    snippet: >
      All 10 affected members were heterozygous for a non-conservative mutation,
      D66H, in Cx26.
    explanation: >
      This supports GJB2 sequencing as confirmatory for classic Vohwinkel
      syndrome.
  - reference: PMID:9326398
    reference_title: "Loricrin mutation in Vohwinkel's keratoderma is unique to the variant with ichthyosis."
    supports: SUPPORT
    snippet: >
      The loricrin gene was sequenced, identifying a heterozygous mutation as
      previously reported
    explanation: >
      This supports LOR sequencing for the ichthyotic loricrin keratoderma
      subtype.
- name: Differential diagnosis among palmoplantar keratodermas and ichthyoses
  diagnosis_term:
    preferred_term: diagnostic procedure of skin
    term:
      id: MAXO:0001404
      label: diagnostic procedure of skin
  description: >
    Distinguish keratoderma hereditarium mutilans from other hereditary and
    acquired palmoplantar keratodermas, including Bart-Pumphrey syndrome,
    Clouston syndrome, Olmsted syndrome, Mal de Meleda, and generalized
    ichthyoses, using pseudoainhum severity, starfish keratoses, hearing status,
    ichthyosis, family history, and molecular results.
  results: >
    The combination of pseudoainhum with subtype-specific hearing loss or
    ichthyosis guides whether the diagnosis is classic GJB2-associated
    Vohwinkel syndrome, LOR-associated loricrin keratoderma, or another
    palmoplantar keratoderma/ichthyosis syndrome.
  evidence:
  - reference: PMID:30335335
    reference_title: "Vohwinkel Syndrome."
    supports: SUPPORT
    snippet: >
      A PPK may be an isolated finding or part of a syndrome with extracutaneous
      involvement.
    explanation: >
      This supports systematic differential diagnosis rather than treating PPK
      as disease-specific in isolation.
  - reference: PMID:9326398
    reference_title: "Loricrin mutation in Vohwinkel's keratoderma is unique to the variant with ichthyosis."
    supports: SUPPORT
    snippet: >
      Vohwinkel's keratoderma is thus clinically and genetically heterogeneous.
    explanation: >
      This supports subtype-aware differential diagnosis for KHM presentations.
treatments:
- name: Keratolytic Therapy
  description: >
    Topical keratolytic agents such as salicylic acid or urea can soften and
    reduce hyperkeratotic skin lesions on palms and soles in either subtype, but
    they should not be relied on to reverse established pseudoainhum.
  treatment_term:
    preferred_term: keratolytic agent therapy
    term:
      id: MAXO:0001421
      label: keratolytic agent therapy
- name: Emollients
  description: >
    Regular emollient use helps maintain skin hydration and reduce cracking,
    fissuring, and discomfort from palmoplantar hyperkeratosis.
  treatment_term:
    preferred_term: application of emollient to skin
    term:
      id: MAXO:0000996
      label: application of emollient to skin
- name: Retinoids
  description: >
    Oral retinoids such as isotretinoin or acitretin may help control severe
    hyperkeratosis and ichthyosiform scaling, and can reduce progression of
    digital constriction in some patients. Relapse can occur after
    discontinuation, so treatment requires dermatology monitoring.
  treatment_term:
    preferred_term: retinoid agent therapy
    term:
      id: MAXO:0000237
      label: retinoid agent therapy
  evidence:
  - reference: PMID:6237617
    reference_title: "Variant of keratoderma hereditaria mutilans (Vohwinkel's syndrome). Treatment with orally administered isotretinoin."
    supports: SUPPORT
    snippet: >
      One of the patients was successfully treated with isotretinoin, 0.6 mg/kg/day
      orally.
    explanation: First report of successful isotretinoin treatment for the ichthyotic variant of Vohwinkel syndrome.
- name: Pseudoainhum surveillance and timely surgical release
  description: >
    Constricting digital bands should be monitored for pain, progressive
    tightening, altered sensation, impaired capillary refill, ischemia, and
    functional compromise. Hand or plastic surgery evaluation and timely release
    are prioritized when neurovascular compromise develops to avoid preventable
    autoamputation; surgery is not simply cosmetic and has recurrence risk.
  treatment_term:
    preferred_term: skin surgery
    term:
      id: MAXO:0001513
      label: skin surgery
  evidence:
  - reference: PMID:19282408
    reference_title: "Keratoderma hereditarium mutilans (Vohwinkel syndrome)."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >
      We therefore feel that the indication for surgical treatment should be a
      neurovascular compromise.
    explanation: >
      This surgical series supports prioritizing pseudoainhum monitoring for
      neurovascular compromise and timely surgical referral when compromise is
      present.
  - reference: PMID:30335335
    reference_title: "Vohwinkel Syndrome."
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >
      mutilating digital constriction bands (pseudoainhum) that often lead to
      autoamputation of the affected digit(s).
    explanation: >
      This supports treating pseudoainhum as a high-priority management issue.
- name: Hearing Aids and Cochlear Implants
  description: >
    For the classic GJB2-associated subtype, manage confirmed sensorineural
    hearing loss with audiology-directed amplification, educational supports, and
    cochlear implant evaluation when hearing loss is severe or profound. This
    intervention is conditional on audiometric evidence of hearing loss and is
    not generic management for LOR-associated loricrin keratoderma.
  treatment_term:
    preferred_term: hearing aid usage
    term:
      id: MAXO:0009030
      label: hearing aid usage
  context: Classic Vohwinkel Syndrome with confirmed sensorineural hearing loss
  evidence:
  - reference: PMID:10369869
    reference_title: "A missense mutation in connexin26, D66H, causes mutilating keratoderma with sensorineural deafness (Vohwinkel's syndrome) in three unrelated families."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >
      VS is characterized by papular and honeycomb keratoderma associated with
      constrictions of digits leading to autoamputation, distinctive
      starfish-like acral keratoses and moderate degrees of deafness.
    explanation: >
      This supports hearing-directed management for the GJB2-associated classic
      subtype.
  - reference: PMID:30335335
    reference_title: "Vohwinkel Syndrome."
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >
      deafness is not a feature of this ichthyosiform variant.
    explanation: >
      This supports limiting hearing interventions to patients with the classic
      GJB2-associated hearing-loss phenotype rather than the loricrin variant.
