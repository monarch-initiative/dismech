inheritance:
- name: Autosomal dominant
  inheritance_term:
    preferred_term: Autosomal dominant inheritance
    term:
      id: HP:0000006
      label: Autosomal dominant inheritance
  penetrance: INCOMPLETE
  description: >-
    EKV is most often inherited in an autosomal dominant pattern, with marked
    intra- and interfamilial variability and documented incomplete penetrance.
  evidence:
  - reference: PMID:34717022
    reference_title: "Erythrokeratodermia variabilis et progressiva due to a novel mutation in GJB4."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "The majority of EKVP cases display an autosomal dominant mode of inheritance with incomplete penetrance, although recessive transmission has also been described."
    explanation: Directly supports autosomal dominant inheritance as the major transmission pattern and explicitly notes incomplete penetrance.
  - reference: PMID:9843209
    reference_title: "Mutations in the human connexin gene GJB3 cause erythrokeratodermia variabilis."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Erythrokeratodermia variabilis (EKV, OMIM 133200) is an autosomal dominant genodermatosis with considerable intra- and interfamilial variability."
    explanation: Foundational family-based evidence supporting dominant inheritance with variable expression.
- name: Autosomal recessive
  inheritance_term:
    preferred_term: Autosomal recessive inheritance
    term:
      id: HP:0000007
      label: Autosomal recessive inheritance
  description: >-
    Recessive EKV is uncommon but established, particularly in consanguineous
    pedigrees with biallelic GJB3 variants.
  evidence:
  - reference: PMID:21564177
    reference_title: "Erythrokeratoderma variabilis caused by a recessive mutation in GJB3."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Autosomal recessive inheritance should be considered when providing genetic counselling to consanguineous families at risk for EKV."
    explanation: Directly supports recessive transmission in EKV.
  - reference: PMID:22266302
    reference_title: "Erythrokeratodermia variabilis: report of two cases and a novel missense variant in GJB4 encoding connexin 30.3."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "EKV is mainly inherited as an autosomal dominant disease, although recessive transmission has occasionally been reported."
    explanation: Confirms that recessive inheritance is part of the EKV disease spectrum even though it is less common.
progression:
- phase: Onset
  age_range: Birth to infancy
  evidence:
  - reference: PMID:22266302
    reference_title: "Erythrokeratodermia variabilis: report of two cases and a novel missense variant in GJB4 encoding connexin 30.3."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "The onset is usually at birth or during infancy"
    explanation: Supports typical early-life onset of EKV.
- phase: Chronic
  age_range: Lifelong
  evidence:
  - reference: PMID:22266302
    reference_title: "Erythrokeratodermia variabilis: report of two cases and a novel missense variant in GJB4 encoding connexin 30.3."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "the disease persists throughout life."
    explanation: Supports chronic persistence of EKV after onset.
phenotypes:
- category: Dermatological
  name: Transient figurate erythematous patches
  description: >-
    Migratory or figurate erythematous patches are a defining feature of EKV and
    can change location over hours to days.
  phenotype_term:
    preferred_term: transient figurate erythematous patches
    term:
      id: HP:0033622
      label: Migratory erythematous plaque
  evidence:
  - reference: PMID:26945536
    reference_title: "Erythrokeratodermia variabilis et progressiva."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Erythrokeratodermia variabilis et progressiva (EKVP) is a rare inherited skin disease characterized by fixed hyperkeratotic plaques and transient erythematous patches."
    explanation: Directly supports transient erythematous lesions as a core phenotype of EKV.
  - reference: PMID:16854764
    reference_title: "Erythrokeratodermia variabilis with adult onset: report of a sporadic case unresponsive to systemic retinoids."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Erythrokeratodermia variabilis is a rare autosomal-dominant genodermatosis characterized by migratory and erythematous patches changing over the course of hours to days, and fixed keratotic plaques."
    explanation: Supports the migratory, rapidly changing behavior of the erythematous lesions.
- category: Dermatological
  name: Fixed hyperkeratotic plaques
  description: >-
    Hyperkeratotic plaques are persistent lesions that may be localized or more
    generalized across the skin.
  phenotype_term:
    preferred_term: fixed hyperkeratotic plaques
    term:
      id: HP:0000962
      label: Hyperkeratosis
  evidence:
  - reference: PMID:26945536
    reference_title: "Erythrokeratodermia variabilis et progressiva."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Erythrokeratodermia variabilis et progressiva (EKVP) is a rare inherited skin disease characterized by fixed hyperkeratotic plaques and transient erythematous patches."
    explanation: Directly supports fixed hyperkeratotic plaques as a defining disease manifestation.
  - reference: PMID:12648223
    reference_title: "Genetic heterogeneity in erythrokeratodermia variabilis: novel mutations in the connexin gene GJB4 (Cx30.3) and genotype-phenotype correlations."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Erythrokeratodermia variabilis is an autosomal dominant genodermatosis characterized by persistent plaque-like or generalized hyperkeratosis and transient red patches of variable size, shape, and location."
    explanation: Supports persistent plaque-like or generalized hyperkeratosis across genetically heterogeneous EKV families.
- category: Dermatological
  name: Palmoplantar keratoderma
  description: >-
    Palmoplantar keratoderma occurs in a substantial subset of affected
    individuals and broadens the cutaneous disease burden beyond transient
    erythema and fixed plaques.
  phenotype_term:
    preferred_term: palmoplantar keratoderma
    term:
      id: HP:0000982
      label: Palmoplantar keratoderma
  evidence:
  - reference: PMID:26945536
    reference_title: "Erythrokeratodermia variabilis et progressiva."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Approximately 50% of affected individuals develop palmoplantar keratoderma."
    explanation: Directly supports palmoplantar keratoderma as a common component of the EKV phenotype.
  - reference: PMID:25398053
    reference_title: "Dominant De Novo Mutations in GJA1 Cause Erythrokeratodermia Variabilis et Progressiva, without Features of Oculodentodigital Dysplasia."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Erythrokeratodermia variabilis et progressiva (EKVP) is a rare, inherited skin disease that is characterized by transient figurate patches of erythema, localized or generalized scaling, and frequent palmoplantar keratoderma."
    explanation: Supports palmoplantar keratoderma within the GJA1-related branch of the EKV spectrum.
pathophysiology:
- name: Connexin Mislocalization
  description: >-
    Pathogenic EKV variants disrupt connexin trafficking or membrane
    localization, preventing normal delivery of epidermal connexins to the cell
    surface.
  cell_types:
  - preferred_term: keratinocyte
    term:
      id: CL:0000312
      label: keratinocyte
  biological_processes:
  - preferred_term: protein localization to plasma membrane
    term:
      id: GO:0072659
      label: protein localization to plasma membrane
    modifier: ABNORMAL
  locations:
  - preferred_term: skin epidermis
    term:
      id: UBERON:0001003
      label: skin epidermis
  downstream:
  - target: Impaired Gap Junction Assembly
    description: >-
      Loss of membrane-targeted connexins reduces the capacity of keratinocytes
      to form effective epidermal gap junctions.
    evidence:
    - reference: PMID:21564177
      reference_title: "Erythrokeratoderma variabilis caused by a recessive mutation in GJB3."
      supports: SUPPORT
      evidence_source: IN_VITRO
      snippet: "Under in vitro conditions, p.V30I prevents Cx31 reaching the cell membrane and taking part in gap-junction formation."
      explanation: Supports a causal link from failed membrane targeting to reduced gap-junction formation.
  evidence:
  - reference: PMID:21564177
    reference_title: "Erythrokeratoderma variabilis caused by a recessive mutation in GJB3."
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: "Under in vitro conditions, p.V30I prevents Cx31 reaching the cell membrane and taking part in gap-junction formation."
    explanation: Directly shows that a recessive GJB3 EKV mutation disrupts membrane targeting.
  - reference: PMID:30924322
    reference_title: "Two de novo GJA1 mutation in two sporadic patients with erythrokeratodermia variabilis et progressiva."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "GJA1 P283L and T290N mutations lead to Cx43 protein cytoplasmic mislocalization."
    explanation: Supports connexin mislocalization as a recurrent mechanism in GJA1-related EKV.
- name: Impaired Gap Junction Assembly
  description: >-
    Loss of membrane-targeted connexins reduces keratinocyte participation in
    epidermal gap-junction networks and disrupts intercellular signaling across
    the epidermis.
  cell_types:
  - preferred_term: keratinocyte
    term:
      id: CL:0000312
      label: keratinocyte
  biological_processes:
  - preferred_term: gap junction assembly
    term:
      id: GO:0016264
      label: gap junction assembly
    modifier: ABNORMAL
  - preferred_term: cell-cell signaling
    term:
      id: GO:0007267
      label: cell-cell signaling
    modifier: ABNORMAL
  locations:
  - preferred_term: skin epidermis
    term:
      id: UBERON:0001003
      label: skin epidermis
  downstream:
  - target: Abnormal Epidermal Homeostasis and Keratinization
    description: >-
      Loss of effective epidermal gap-junction communication disrupts the
      differentiation programs that normally maintain cutaneous homeostasis.
    evidence:
    - reference: PMID:9843209
      reference_title: "Mutations in the human connexin gene GJB3 cause erythrokeratodermia variabilis."
      supports: SUPPORT
      evidence_source: HUMAN_CLINICAL
      snippet: "Our results implicate Cx31 in the pathogenesis of EKV, and provide evidence that intercellular communication mediated by Cx31 is crucial for epidermal differentiation and response to external factors."
      explanation: Supports a causal link from impaired gap-junction communication to downstream defects in epidermal differentiation.
  evidence:
  - reference: PMID:21564177
    reference_title: "Erythrokeratoderma variabilis caused by a recessive mutation in GJB3."
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: "Under in vitro conditions, p.V30I prevents Cx31 reaching the cell membrane and taking part in gap-junction formation."
    explanation: Directly supports impaired gap-junction formation downstream of connexin mislocalization.
- name: Abnormal Epidermal Homeostasis and Keratinization
  description: >-
    Abnormal epidermal connexin signaling impairs epidermal differentiation and
    homeostasis, producing persistent hyperkeratosis and episodic erythematous
    lesions.
  cell_types:
  - preferred_term: keratinocyte
    term:
      id: CL:0000312
      label: keratinocyte
