name: Erythrokeratodermia Variabilis
creation_date: '2026-04-14T05:27:49Z'
updated_date: '2026-04-14T18:06:00Z'
category: Mendelian
description: >-
  Erythrokeratodermia variabilis (EKV), also called erythrokeratodermia
  variabilis et progressiva (EKVP) or Mendes da Costa disease, is a rare
  connexin-associated disorder of cornification. The disease is defined by
  transient figurate erythematous patches together with fixed hyperkeratotic
  plaques, often begins at birth or during infancy, and may be accompanied by
  palmoplantar keratoderma. Most reported families show autosomal dominant
  inheritance with incomplete penetrance, although recessive transmission has
  also been described. Established causal genes at this disease root include
  GJB3, GJB4, and GJA1, all encoding epidermal connexins whose dysfunction
  perturbs keratinocyte gap-junction communication and epidermal homeostasis.
synonyms:
- erythrokeratodermia variabilis et progressiva
- Mendes da Costa disease
disease_term:
  preferred_term: erythrokeratodermia variabilis
  term:
    id: MONDO:0017851
    label: erythrokeratodermia variabilis
parents:
- genodermatosis
