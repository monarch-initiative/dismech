    term:
      id: GO:0031424
      label: keratinization
    modifier: ABNORMAL
  - preferred_term: cell-cell signaling
    term:
      id: GO:0007267
      label: cell-cell signaling
    modifier: ABNORMAL
  locations:
  - preferred_term: skin epidermis
    term:
      id: UBERON:0001003
      label: skin epidermis
  evidence:
  - reference: PMID:9843209
    reference_title: "Mutations in the human connexin gene GJB3 cause erythrokeratodermia variabilis."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Our results implicate Cx31 in the pathogenesis of EKV, and provide evidence that intercellular communication mediated by Cx31 is crucial for epidermal differentiation and response to external factors."
    explanation: Supports disturbed epidermal differentiation as a core mechanistic consequence of GJB3-mediated EKV.
  - reference: PMID:25398053
    reference_title: "Dominant De Novo Mutations in GJA1 Cause Erythrokeratodermia Variabilis et Progressiva, without Features of Oculodentodigital Dysplasia."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "These findings reveal a critical role for Cx43 in epidermal homeostasis, and they provide evidence of organ-specific pathobiology resulting from different mutations within GJA1."
    explanation: Supports abnormal epidermal homeostasis as a mechanistic endpoint in the GJA1-related branch of EKV.
genetic:
- name: GJB3
  association: Causative
  gene_term:
    preferred_term: GJB3
    term:
      id: hgnc:4285
      label: GJB3
  notes: >-
    GJB3 is a foundational EKV gene with both dominant and recessive disease
    alleles reported.
  evidence:
  - reference: PMID:9843209
    reference_title: "Mutations in the human connexin gene GJB3 cause erythrokeratodermia variabilis."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "We detected heterozygous missense mutations in GJB3 in four EKV families"
    explanation: Foundational human family evidence establishing GJB3 as a causal EKV gene.
  - reference: PMID:21564177
    reference_title: "Erythrokeratoderma variabilis caused by a recessive mutation in GJB3."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "A novel missense mutation (c.G88A) was found in the human GJB3 gene"
    explanation: Extends GJB3 causality to recessive EKV.
  - reference: CGGV:assertion_1d48c959-31d8-44e2-985c-c48921e8f08a-2023-06-01T160000.000Z
    reference_title: "GJB3 / erythrokeratodermia variabilis (Definitive)"
    supports: SUPPORT
    evidence_source: OTHER
    snippet: "GJB3 | HGNC:4285 | erythrokeratodermia variabilis | MONDO:0017851 | AD | Definitive"
    explanation: ClinGen classifies the GJB3-erythrokeratodermia variabilis gene-disease relationship as definitive with autosomal dominant inheritance.
- name: GJB4
  association: Causative
  gene_term:
    preferred_term: GJB4
    term:
      id: hgnc:4286
      label: GJB4
  notes: >-
    GJB4 explains a genetically heterogeneous subset of EKV and appears
    particularly associated with some annular or rapidly changing erythematous
    patterns.
  evidence:
  - reference: PMID:12648223
    reference_title: "Genetic heterogeneity in erythrokeratodermia variabilis: novel mutations in the connexin gene GJB4 (Cx30.3) and genotype-phenotype correlations."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Mutation analysis revealed six distinct missense mutations in five families and a sporadic case of erythrokeratodermia variabilis, all of which were not found in controls."
    explanation: Human genetic evidence showing multiple disease-associated GJB4 mutations across unrelated EKV families.
  - reference: PMID:34717022
    reference_title: "Erythrokeratodermia variabilis et progressiva due to a novel mutation in GJB4."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Our findings reveal an essential role of GJB4 in the pathogenesis of EKVP"
    explanation: Contemporary support that GJB4 remains an established EKV gene.
- name: GJA1
  association: Causative
  gene_term:
    preferred_term: GJA1
    term:
      id: hgnc:4274
      label: GJA1
  notes: >-
    GJA1-related EKV is a skin-predominant branch of the EKV disease root and
    should not be collapsed into oculodentodigital dysplasia.
  evidence:
  - reference: PMID:25398053
    reference_title: "Dominant De Novo Mutations in GJA1 Cause Erythrokeratodermia Variabilis et Progressiva, without Features of Oculodentodigital Dysplasia."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "By using exome sequencing, we show that de novo missense mutations in GJA1 (gap junction protein alpha 1) cause EKVP."
    explanation: Directly establishes GJA1 as a causal EKV gene.
  - reference: PMID:25398053
    reference_title: "Dominant De Novo Mutations in GJA1 Cause Erythrokeratodermia Variabilis et Progressiva, without Features of Oculodentodigital Dysplasia."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "The severe, progressive skin disease in EKVP subjects with GJA1 mutations is distinct from limited cutaneous findings rarely found in the systemic disorder oculodentodigital dysplasia, also caused by dominant GJA1 mutations."
    explanation: Supports modeling GJA1-related EKV as a distinct EKV skin phenotype rather than as a side note under ODDD.
treatments:
- name: Acitretin
  description: >-
    Systemic retinoid therapy may substantially improve hyperkeratosis in some
    patients, but treatment response is variable and resistance has also been
    reported.
  evidence:
  - reference: PMID:2150049
    reference_title: "Acitretin in the treatment of erythrokeratodermia variabilis."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "An initial dose of 35 mg of acitretin and a maintenance dose of 25-35 mg resulted in a pronounced and sustained improvement."
    explanation: Supports acitretin as an effective systemic retinoid option in at least some EKV patients.
  - reference: PMID:16854764
    reference_title: "Erythrokeratodermia variabilis with adult onset: report of a sporadic case unresponsive to systemic retinoids."
    supports: PARTIAL
    evidence_source: HUMAN_CLINICAL
    snippet: "We present herein a sporadic case with adult onset that was unusually resistant to both isotretinoin and acitretin."
    explanation: Shows that systemic retinoid response is not uniform, so benefit should be treated as variable rather than universal.
  treatment_term:
    preferred_term: Pharmacotherapy
    term:
      id: NCIT:C15986
      label: Pharmacotherapy
    therapeutic_agent:
    - preferred_term: acitretin
      term:
        id: CHEBI:50172
        label: acitretin
notes: >-
  This entry is curated at the disease-root level for MONDO:0017851
  erythrokeratodermia variabilis. The root includes connexin-associated disease
  caused by GJB3, GJB4, and GJA1, while preserving the published distinction
  between GJA1-related EKV skin disease and oculodentodigital dysplasia.
