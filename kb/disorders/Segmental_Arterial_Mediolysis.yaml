    reference_title: "Segmental arterial mediolysis: course, sequelae, prognosis, and pathologic-radiologic correlation."
    supports: PARTIAL
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Segmental arterial mediolysis is a vascular disease of putative
      vasospastic origin that causes massive hemorrhages.
    explanation: >-
      This supports the vasospastic origin model while preserving its putative
      rather than proven causal status.
  downstream:
  - target: Medial lysis and arterial gaps
    description: Vasospastic or hypoxic injury is thought to trigger focal loss of medial smooth muscle integrity.
    causal_link_type: DIRECT
- name: Medial lysis and arterial gaps
  description: >-
    Lytic loss of arterial medial smooth muscle weakens the vessel wall and
    creates arterial gaps that evolve into dilatation, aneurysm, dissection,
    stenosis, or occlusion.
  cell_types:
  - preferred_term: smooth muscle cell
    term:
      id: CL:0000192
      label: smooth muscle cell
  locations:
  - preferred_term: tunica media
    term:
      id: UBERON:0002522
      label: tunica media
  biological_processes:
  - preferred_term: extracellular matrix organization
    term:
      id: GO:0030198
      label: extracellular matrix organization
    modifier: ABNORMAL
  evidence:
  - reference: PMID:19026575
    reference_title: "Segmental arterial mediolysis: course, sequelae, prognosis, and pathologic-radiologic correlation."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Pathologic correlations reveal that lytic loss of medial muscle causes
      arterial dilatation, dilated arterial gaps form aneurysms, dissections
      develop at arterial-medial gap junctions or from reparative granulation
      tissue and reparative alterations, and thrombi cause stenosis and
      occlusions.
    explanation: >-
      This directly connects medial muscle loss to the major imaging and
      clinical vascular sequelae.
  downstream:
  - target: Arterial aneurysm
    description: Arterial gaps and medial weakening produce dilatation, aneurysm, and dissection.
    causal_link_type: DIRECT
    evidence:
    - reference: PMID:29446669
      reference_title: "Segmental Arterial Mediolysis: Abdominal Imaging of and Disease Course in 111 Patients."
      supports: SUPPORT
      evidence_source: HUMAN_CLINICAL
      snippet: >-
        The most common imaging findings were dissection (86%), aneurysm (57%),
        beading or webs (28%), occlusion (19%), and a rind or wall thickening
        (15%).
      explanation: >-
        This imaging cohort identifies dissection and aneurysm as the dominant
        lesion types at presentation.
  - target: Arterial dissection
    description: Arterial-medial gap junctions can evolve into arterial dissection.
    causal_link_type: DIRECT
    evidence:
    - reference: PMID:29446669
      reference_title: "Segmental Arterial Mediolysis: Abdominal Imaging of and Disease Course in 111 Patients."
      supports: SUPPORT
      evidence_source: HUMAN_CLINICAL
      snippet: >-
        The most common imaging findings were dissection (86%), aneurysm (57%),
        beading or webs (28%), occlusion (19%), and a rind or wall thickening
        (15%).
      explanation: >-
        This imaging cohort identifies dissection as the most frequent imaging
        finding in SAM.
- name: Reparative remodeling and thrombotic narrowing
  description: >-
    After the injurious phase, reparative granulation tissue, fibrosis, and
    thrombus can remodel the arterial wall, sometimes stabilizing lesions and
    sometimes producing stenosis or occlusion.
  cell_types:
  - preferred_term: smooth muscle cell
    term:
      id: CL:0000192
      label: smooth muscle cell
  - preferred_term: fibroblast
    term:
      id: CL:0000057
      label: fibroblast
  biological_processes:
  - preferred_term: blood vessel remodeling
    term:
      id: GO:0001974
      label: blood vessel remodeling
    modifier: ABNORMAL
  - preferred_term: wound healing
    term:
      id: GO:0042060
      label: wound healing
    modifier: ABNORMAL
  evidence:
  - reference: PMID:19026575
    reference_title: "Segmental arterial mediolysis: course, sequelae, prognosis, and pathologic-radiologic correlation."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      The most common radiologic findings at onset are aneurysms, arterial
      dilatation, and occlusions, while dissections and stenotic lesions often
      are delayed.
    explanation: >-
      This supports temporal evolution from early dilatation/occlusion to
      delayed dissecting and stenotic lesions.
  downstream:
  - target: End-organ ischemia
    description: Flow-limiting stenosis, occlusion, dissection, and rupture can cause ischemic organ injury or life-threatening bleeding.
    causal_link_type: DIRECT
  - target: Intra-abdominal hemorrhage
    description: Arterial rupture can cause life-threatening intra-abdominal bleeding.
    causal_link_type: DIRECT
phenotypes:
- name: Arterial aneurysm
  category: Cardiovascular
  diagnostic: true
  description: >-
    SAM produces multifocal visceral arterial aneurysms, often
    involving renal, superior mesenteric, celiac, hepatic, and splenic arteries.
  phenotype_term:
    preferred_term: Vascular dilatation
    term:
      id: HP:0002617
      label: Vascular dilatation
  evidence:
  - reference: PMID:31793853
    reference_title: "Segmental arterial mediolysis (SAM): Systematic review and analysis of 143 cases."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      The most commonly affected vessels were the superior mesenteric (53%),
      hepatic (45%), celiac (36%), renal (26%), and splenic (25%) arteries with
      aneurysm (76%), dissection (61%), and arterial rupture (46%).
    explanation: >-
      The systematic review supports the main affected vessels and the high
      frequency of aneurysm.
- name: Arterial dissection
  category: Cardiovascular
  diagnostic: true
  description: >-
    SAM commonly produces visceral arterial dissections, a distinct vascular
    lesion from aneurysm or dilatation.
  phenotype_term:
    preferred_term: Arterial dissection
    term:
      id: HP:0005294
      label: Arterial dissection
  evidence:
  - reference: PMID:29446669
    reference_title: "Segmental Arterial Mediolysis: Abdominal Imaging of and Disease Course in 111 Patients."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      The most common imaging findings were dissection (86%), aneurysm (57%),
      beading or webs (28%), occlusion (19%), and a rind or wall thickening
      (15%).
    explanation: >-
      This directly supports arterial dissection as the most common imaging
      finding in the large SAM imaging cohort.
- name: Acute abdominal pain
  category: Gastrointestinal
  diagnostic: true
  description: >-
    Acute abdominal pain is the most common presenting symptom in large SAM
    cohorts and reflects visceral arterial involvement, dissection, ischemia, or
    hemorrhage.
  phenotype_term:
    preferred_term: Abdominal pain
    term:
      id: HP:0002027
      label: Abdominal pain
  evidence:
  - reference: PMID:31761101
    reference_title: Natural history and management outcomes of segmental arterial mediolysis.
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Mean age was 52.7 years (range, 23.4-90 years); 69.2% (n = 81) presented
      with acute abdominal pain, 22.2% (n = 26) with flank pain, and 19.7% (n =
      23) with back pain; 15.4% (n = 18) had abdominal pain longer than 30 days;
      13.7% (n = 16) had acute hypertension, and 5.1% (n = 6) were hypotensive;
      10.3% (n = 12) were asymptomatic.
    explanation: >-
      This cohort quantifies acute abdominal pain as the leading presentation
      and gives the adult age range.
