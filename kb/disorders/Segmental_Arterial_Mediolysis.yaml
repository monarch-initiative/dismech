treatments:
- name: Conservative medical management and surveillance imaging
  description: >-
    Stable patients are often managed with blood-pressure control,
    individualized antiplatelet or anticoagulant therapy, analgesia, and serial
    vascular imaging to detect regression, stability, or progression.
  treatment_term:
    preferred_term: Pharmacotherapy
    term:
      id: NCIT:C15986
      label: Pharmacotherapy
  evidence:
  - reference: PMID:31761101
    reference_title: Natural history and management outcomes of segmental arterial mediolysis.
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      After diagnosis of SAM, aspirin was prescribed in 60.7% (n = 71). Statins
      were prescribed in 29.9% (n = 35). Antihypertensive medications were
      prescribed in 65% (n = 76), including beta blockers in 42.7% (n = 50);
      40.2% (n = 47) of patients were prescribed anticoagulation.
    explanation: >-
      This cohort supports common real-world medical management with
      antiplatelet, statin, antihypertensive, and anticoagulant therapy.
  - reference: PMID:31761101
    reference_title: Natural history and management outcomes of segmental arterial mediolysis.
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Follow-up imaging is required to monitor for disease progression.
    explanation: >-
      This conclusion supports surveillance imaging after diagnosis.
- name: Endovascular embolization
  description: >-
    Endovascular treatment is used for selected unstable, bleeding, enlarging,
    or anatomically treatable lesions, most often by embolization.
  treatment_term:
    preferred_term: endovascular embolization
  evidence:
  - reference: PMID:31761101
    reference_title: Natural history and management outcomes of segmental arterial mediolysis.
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Of the 17 patients undergoing endovascular intervention, 19 procedures
      were performed, most commonly embolization
    explanation: >-
      This cohort identifies embolization as the dominant endovascular
      intervention.
- name: Vascular stenting
  description: >-
    Stenting is a less frequent endovascular option for selected SAM lesions.
  treatment_term:
    preferred_term: vascular stenting
  evidence:
  - reference: PMID:31761101
    reference_title: Natural history and management outcomes of segmental arterial mediolysis.
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      followed by stenting
    explanation: >-
      This cohort supports stenting as a distinct but less common endovascular
      intervention.
- name: Open vascular surgery or organ surgery
  description: >-
    Open repair, bypass, thrombectomy, aneurysm ligation, or organ surgery is
    reserved for patients with uncontrolled hemorrhage, ischemia, anatomy not
    suitable for endovascular therapy, or complications requiring operative
    management.
  treatment_term:
    preferred_term: surgical procedure
    term:
      id: MAXO:0000004
      label: surgical procedure
  evidence:
  - reference: PMID:31761101
    reference_title: Natural history and management outcomes of segmental arterial mediolysis.
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Of the 13 patients undergoing open surgery, 14 procedures were performed,
      including arterial bypass
    explanation: >-
      This cohort supports open surgery and organ surgery as selected
      interventions in SAM.
diagnosis:
- name: Computed tomography angiographic assessment
  description: >-
    CT-based vascular imaging is the most frequently reported diagnostic method
    and documents arterial dissection, aneurysm, occlusion, stenosis, wall
    thickening, and affected visceral territories.
  diagnosis_term:
    preferred_term: computed tomography procedure
    term:
      id: MAXO:0000571
      label: computed tomography procedure
  evidence:
  - reference: PMID:31793853
    reference_title: "Segmental arterial mediolysis (SAM): Systematic review and analysis of 143 cases."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Computed tomography was the most frequently used imaging method (78%), and
      histology was available in 44% of cases.
    explanation: >-
      This systematic review supports CT as the main diagnostic imaging method
      in published SAM cases.
- name: Exclusion-based clinicoradiologic diagnosis
  description: >-
    Diagnosis is made from compatible clinical presentation plus radiographic
    and serologic findings, including exclusion of inflammatory or autoimmune
    mimics.
  diagnosis_term:
    preferred_term: diagnostic procedure
    term:
      id: MAXO:0000003
      label: diagnostic procedure
  evidence:
  - reference: PMID:31761101
    reference_title: Natural history and management outcomes of segmental arterial mediolysis.
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Patients were identified by established criteria that include clinical
      presentation in combination with radiographic and serologic findings.
    explanation: >-
      This supports a combined clinical, imaging, and serologic diagnostic
      framework.
  - reference: DOI:10.4081/itjm.2024.1795
    reference_title: "Segmental arterial mediolysis: a challenging diagnosis in internal medicine"
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Based on imaging and the absence of inflammatory and autoimmune markers, a
      diagnosis of SAM was made.
    explanation: >-
      This case review supports exclusion of inflammatory and autoimmune
      mimickers in SAM diagnosis.
