  evidence:
  - reference: PMID:19026575
    reference_title: "Segmental arterial mediolysis: course, sequelae, prognosis, and pathologic-radiologic correlation."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      The most common radiologic findings at onset are aneurysms, arterial
      dilatation, and occlusions, while dissections and stenotic lesions often
      are delayed.
    explanation: >-
      This supports temporal evolution from early dilatation/occlusion to
      delayed dissecting and stenotic lesions.
  downstream:
  - target: End-organ ischemia and hemorrhage
    description: Flow-limiting stenosis, occlusion, dissection, and rupture can cause ischemic organ injury or life-threatening bleeding.
    causal_link_type: DIRECT
phenotypes:
- name: Dissection and aneurysm formation
  category: Cardiovascular
  diagnostic: true
  description: >-
    SAM produces multifocal visceral arterial dissections and aneurysms, often
    involving renal, superior mesenteric, celiac, hepatic, and splenic arteries.
  phenotype_term:
    preferred_term: Vascular dilatation
    term:
      id: HP:0002617
      label: Vascular dilatation
  evidence:
  - reference: PMID:31793853
    reference_title: "Segmental arterial mediolysis (SAM): Systematic review and analysis of 143 cases."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      The most commonly affected vessels were the superior mesenteric (53%),
      hepatic (45%), celiac (36%), renal (26%), and splenic (25%) arteries with
      aneurysm (76%), dissection (61%), and arterial rupture (46%).
    explanation: >-
      The systematic review supports the main affected vessels and the high
      frequency of aneurysm, dissection, and rupture.
- name: Acute abdominal pain
  category: Gastrointestinal
  diagnostic: true
  description: >-
    Acute abdominal pain is the most common presenting symptom in large SAM
    cohorts and reflects visceral arterial involvement, dissection, ischemia, or
    hemorrhage.
  phenotype_term:
    preferred_term: Abdominal pain
    term:
      id: HP:0002027
      label: Abdominal pain
  evidence:
  - reference: PMID:31761101
    reference_title: Natural history and management outcomes of segmental arterial mediolysis.
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Mean age was 52.7 years (range, 23.4-90 years); 69.2% (n = 81) presented
      with acute abdominal pain, 22.2% (n = 26) with flank pain, and 19.7% (n =
      23) with back pain; 15.4% (n = 18) had abdominal pain longer than 30 days;
      13.7% (n = 16) had acute hypertension, and 5.1% (n = 6) were hypotensive;
      10.3% (n = 12) were asymptomatic.
    explanation: >-
      This cohort quantifies acute abdominal pain as the leading presentation
      and gives the adult age range.
- name: Flank or back pain
  category: Musculoskeletal
  description: >-
    Flank pain and back pain are common additional acute pain presentations,
    especially when renal or retroperitoneal vascular territories are involved.
  phenotype_term:
    preferred_term: Back pain
    term:
      id: HP:0003418
      label: Back pain
  evidence:
  - reference: PMID:31761101
    reference_title: Natural history and management outcomes of segmental arterial mediolysis.
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Mean age was 52.7 years (range, 23.4-90 years); 69.2% (n = 81) presented
      with acute abdominal pain, 22.2% (n = 26) with flank pain, and 19.7% (n =
      23) with back pain; 15.4% (n = 18) had abdominal pain longer than 30 days;
      13.7% (n = 16) had acute hypertension, and 5.1% (n = 6) were hypotensive;
      10.3% (n = 12) were asymptomatic.
    explanation: >-
      The same cohort supports flank and back pain as common presenting
      symptoms.
- name: Intra-abdominal bleeding and shock
  category: Cardiovascular
  description: >-
    Rupture of affected arteries can cause intra-abdominal bleeding, severe
    hemorrhage, hypotension, and shock.
  phenotype_term:
    preferred_term: Shock
    term:
      id: HP:0031273
      label: Shock
  evidence:
  - reference: PMID:31793853
    reference_title: "Segmental arterial mediolysis (SAM): Systematic review and analysis of 143 cases."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Abdominal pain (80%) and intraabdominal bleeding (50%) were the most
      common presenting symptoms.
    explanation: >-
      This supports intra-abdominal bleeding as a major clinical presentation.
  - reference: DOI:10.4081/itjm.2024.1795
    reference_title: "Segmental arterial mediolysis: a challenging diagnosis in internal medicine"
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      The clinical presentation ranges from asymptomatic to severe,
      life-threatening intra-abdominal hemorrhage and shock.
    explanation: >-
      This recent clinical review abstract directly supports hemorrhage and
      shock as severe presentations.
- name: End-organ ischemia
  category: Cardiovascular
  description: >-
    Dissection, stenosis, or occlusion in visceral or renal arteries can cause
    ischemic injury to supplied organs.
  phenotype_term:
    preferred_term: End-organ ischemia
  evidence:
  - reference: DOI:10.12890/2023_004085
    reference_title: "Segmental arterial mediolysis and its mimickers: a case report and review of the literature"
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Abdominal computerized tomography showed arterial thickening, arterial
      dilatations, and dissections of the splenic and renal arteries, leading to
      organ ischemia.
    explanation: >-
      This case-review abstract directly links SAM arterial lesions to organ
      ischemia.
- name: Hypertension as associated comorbidity
  category: Cardiovascular
  description: >-
    Hypertension is frequently reported in SAM cohorts and may compound arterial
    wall stress, but current evidence supports it as an associated comorbidity
    rather than a proven primary cause.
  phenotype_term:
    preferred_term: Hypertension
    term:
      id: HP:0000822
      label: Hypertension
  evidence:
  - reference: PMID:31793853
    reference_title: "Segmental arterial mediolysis (SAM): Systematic review and analysis of 143 cases."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Patients with SAM were most commonly men (68%) in their 60s. Hypertension
      (43%), tobacco use (12%), and hyperlipidemia (12%) were common
      comorbidities.
    explanation: >-
      This supports hypertension as a common associated comorbidity in the
      systematic review.
