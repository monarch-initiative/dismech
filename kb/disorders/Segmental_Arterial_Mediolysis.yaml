- name: Intra-abdominal hemorrhage
  category: Cardiovascular
  description: >-
    Rupture of affected arteries can cause intra-abdominal bleeding or severe
    hemorrhage.
  phenotype_term:
    preferred_term: Intra-abdominal hemorrhage
    term:
      id: HP:0011029
      label: Internal hemorrhage
  evidence:
  - reference: PMID:31793853
    reference_title: "Segmental arterial mediolysis (SAM): Systematic review and analysis of 143 cases."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Abdominal pain (80%) and intraabdominal bleeding (50%) were the most
      common presenting symptoms.
    explanation: >-
      This supports intra-abdominal bleeding as a major clinical presentation.
- name: Shock
  category: Cardiovascular
  description: >-
    Severe hemorrhage can progress to hypotension and shock in life-threatening
    SAM presentations.
  phenotype_term:
    preferred_term: Shock
    term:
      id: HP:0031273
      label: Shock
  evidence:
  - reference: DOI:10.4081/itjm.2024.1795
    reference_title: "Segmental arterial mediolysis: a challenging diagnosis in internal medicine"
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      The clinical presentation ranges from asymptomatic to severe,
      life-threatening intra-abdominal hemorrhage and shock.
    explanation: >-
      This recent clinical review abstract directly supports hemorrhage and
      shock as severe presentations.
- name: End-organ ischemia
  category: Cardiovascular
  description: >-
    Dissection, stenosis, or occlusion in visceral or renal arteries can cause
    ischemic injury to supplied organs.
  phenotype_term:
    preferred_term: End-organ ischemia
  evidence:
  - reference: DOI:10.12890/2023_004085
    reference_title: "Segmental arterial mediolysis and its mimickers: a case report and review of the literature"
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Abdominal computerized tomography showed arterial thickening, arterial
      dilatations, and dissections of the splenic and renal arteries, leading to
      organ ischemia.
    explanation: >-
      This case-review abstract directly links SAM arterial lesions to organ
      ischemia.
- name: Cerebrovascular symptoms
  category: Neurological
  description: >-
    Cerebrovascular involvement is an uncommon but recurrent SAM presentation,
    including headache, focal neurologic symptoms, intracranial hemorrhage, or
    stroke-like events when cervical or cerebral vessels are involved.
  phenotype_term:
    preferred_term: Stroke
    term:
      id: HP:0001297
      label: Stroke
  evidence:
  - reference: PMID:31793853
    reference_title: "Segmental arterial mediolysis (SAM): Systematic review and analysis of 143 cases."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    explanation: >-
      Skeik et al. 2019 (143-case systematic review, PMID:31793853) reports
      cerebrovascular symptoms in approximately 11.9% and cerebrovascular
      artery involvement in 13.3% of SAM cases across the pooled cohort. This
      figure is from the full text; the abstract does not quote this percentage
      directly. HP:0001297 (Stroke) is the closest available local HPO binding
      for this category of cerebrovascular presentation.
- name: Hypertension as associated comorbidity
  category: Cardiovascular
  description: >-
    Hypertension is frequently reported in SAM cohorts and may compound arterial
    wall stress, but current evidence supports it as an associated comorbidity
    rather than a proven primary cause.
  phenotype_term:
    preferred_term: Hypertension
    term:
      id: HP:0000822
      label: Hypertension
  evidence:
  - reference: PMID:31793853
    reference_title: "Segmental arterial mediolysis (SAM): Systematic review and analysis of 143 cases."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Patients with SAM were most commonly men (68%) in their 60s. Hypertension
      (43%), tobacco use (12%), and hyperlipidemia (12%) were common
      comorbidities.
    explanation: >-
      This supports hypertension as a common associated comorbidity in the
      systematic review.
