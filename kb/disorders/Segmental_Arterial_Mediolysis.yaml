- Arterial Disease
definitions:
- name: Noninflammatory visceral arteriopathy definition
  definition_type: CASE_DEFINITION
  description: >-
    SAM is recognized as a nonatherosclerotic, noninflammatory vasculopathy of
    unknown etiology that most often affects abdominal arteries and produces
    dissection, aneurysm, occlusion, or stenosis.
  scope: Clinical, imaging, and pathologic recognition of segmental arterial mediolysis
  evidence:
  - reference: PMID:31793853
    reference_title: "Segmental arterial mediolysis (SAM): Systematic review and analysis of 143 cases."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Segmental arterial mediolysis (SAM) is a rare but serious
      nonatherosclerotic, noninflammatory vasculopathy of unknown etiology that
      often results in dissection, aneurysm, occlusion, or stenosis of,
      primarily, the abdominal arteries.
    explanation: >-
      The systematic review abstract directly defines SAM and its core vascular
      lesion spectrum.
progression:
- phase: Acute presentation and dynamic lesion evolution
  age_range: Adult onset, with cohort median or mean age near the early 50s
  notes: >-
    SAM often presents acutely with abdominal, flank, or back pain. Follow-up
    imaging shows that lesions can regress, remain stable, or progress, so
    surveillance imaging is clinically important.
  evidence:
  - reference: PMID:29446669
    reference_title: "Segmental Arterial Mediolysis: Abdominal Imaging of and Disease Course in 111 Patients."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      The 247 available follow-up imaging studies for 97 patients (median
      follow-up, 12 months) showed progression in 19 patients (20%), with either
      stability or regression observed in the remaining patients.
    explanation: >-
      This cohort supports dynamic but often stable or regressing vascular
      lesions during longitudinal imaging follow-up.
  - reference: PMID:31761101
    reference_title: Natural history and management outcomes of segmental arterial mediolysis.
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Follow-up imaging was performed in 96.6% (n = 112). Mean follow-up was
      1258 days (range, 2-5017 days). Of these, 27.7% (n = 31) had regression,
      43.8% (n = 49) stability, and 28.6% (n = 32) progression.
    explanation: >-
      This natural-history cohort quantifies the mix of regression, stability,
      and progression.
pathophysiology:
- name: Putative vasospastic medial injury
  description: >-
    SAM is hypothesized to begin with a vasospastic arterial insult that injures
    the arterial media rather than a primary inflammatory arteritis or
    atherosclerotic process.
