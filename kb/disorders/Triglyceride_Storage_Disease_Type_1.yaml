name: Triglyceride Storage Disease Type 1
creation_date: "2026-06-13T00:00:00Z"
description: >-
  Triglyceride storage disease type 1 corresponds to neutral lipid storage disease with
  ichthyosis (NLSD type I), an autosomal recessive disorder caused by biallelic ABHD5 (CGI-58)
  variants. ABHD5 co-activates adipose triglyceride lipase (ATGL/PNPLA2) for intracellular
  triacylglycerol hydrolysis; its loss causes systemic cytoplasmic triacylglycerol droplet
  accumulation with congenital ichthyosis, hepatic involvement (steatosis, sometimes hepatic
  failure), and variable myopathy. It is essentially synonymous with Chanarin-Dorfman syndrome.
synonyms:
- neutral lipid storage disease with ichthyosis
- NLSD type I
- NLSD-I
- Chanarin-Dorfman syndrome
category: Mendelian
