pathophysiology:
- name: ABHD5/CGI-58 Deficiency
  description: >-
    Biallelic ABHD5 (CGI-58) variants eliminate the lipid-droplet co-activator of adipose
    triglyceride lipase (ATGL); ABHD5 also has an ATGL-independent role in epidermal lipid
    metabolism underlying the ichthyosis.
  gene:
    preferred_term: ABHD5
    term:
      id: hgnc:21396
      label: ABHD5
  biological_processes:
  - preferred_term: triglyceride catabolic process
    term:
      id: GO:0019433
      label: triglyceride catabolic process
    modifier: DECREASED
  evidence:
  - reference: PMID:28499397
    reference_title: "Neutral Lipid Storage Diseases: clinical/genetic features and natural history in a large cohort of Italian patients."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Neutral Lipid Storage Diseases (NLSDs: NLSD type M with Myopathy and NLSD type I with Ichthyosis)"
    explanation: NLSD type I (ichthyosis form, ABHD5) is the disease corresponding to triglyceride storage disease type 1.
  downstream:
  - target: Systemic Triacylglycerol Droplet Accumulation
    description: Loss of ATGL co-activation prevents triacylglycerol hydrolysis, so TG droplets accumulate.
  - target: Epidermal Lipid-Barrier Defect
    description: In parallel (ATGL-independently), loss of the ABHD5 epidermal lipid role impairs the skin barrier.
- name: Systemic Triacylglycerol Droplet Accumulation
  description: >-
    Undegraded triacylglycerol accumulates as cytoplasmic lipid droplets in skin, liver,
    muscle, and leukocytes, driving the ichthyosis and visceral disease.
  biological_processes:
  - preferred_term: lipid storage
    term:
      id: GO:0019915
      label: lipid storage
    modifier: INCREASED
  cell_types:
  - preferred_term: keratinocyte
    term:
      id: CL:0000312
      label: keratinocyte
  - preferred_term: hepatocyte
    term:
      id: CL:0000182
      label: hepatocyte
  evidence:
  - reference: PMID:20023287
    reference_title: "Growth retardation, impaired triacylglycerol catabolism, hepatic steatosis, and lethal skin barrier defect in mice lacking comparative gene identification-58 (CGI-58)."
    supports: SUPPORT
    evidence_source: MODEL_ORGANISM
    snippet: "Mutations in both ATGL and CGI-58 cause \"neutral lipid storage disease\" \ncharacterized by massive accumulation of TG in various tissues"
    explanation: ATGL/CGI-58 mutations cause neutral lipid storage disease with TG accumulation in multiple tissues (mechanism shown in the CGI-58 mouse model).
- name: Epidermal Lipid-Barrier Defect
  description: >-
    ABHD5/CGI-58 has an ATGL-independent role in epidermal lipid metabolism (acylceramide
    synthesis via PNPLA1); its loss impairs the skin permeability barrier, underlying the
    ichthyosis that defines NLSD type I.
  cell_types:
  - preferred_term: keratinocyte
    term:
      id: CL:0000312
      label: keratinocyte
  evidence:
  - reference: PMID:20023287
    supports: SUPPORT
    evidence_source: MODEL_ORGANISM
    snippet: "severe skin permeability barrier defect\nuncovers an essential ATGL-independent role of CGI-58 in skin lipid metabolism"
    explanation: CGI-58/ABHD5 has an ATGL-independent epidermal lipid-metabolism role whose loss causes the skin-barrier defect (ichthyosis).
