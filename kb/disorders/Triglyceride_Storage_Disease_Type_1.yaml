biochemical:
- name: Cytoplasmic triacylglycerol droplet accumulation
  presence: INCREASED
  context: >-
    Intracellular accumulation of triacylglycerol droplets in most tissues (including
    leukocytes, where it is seen as Jordans' anomaly) is the hallmark biochemical lesion.
  evidence:
  - reference: PMID:21122093
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "an intracellular accumulation of triacylglycerol (TG) droplets in most tissues"
    explanation: Intracellular triacylglycerol droplet accumulation is the defining biochemical finding of NLSD type I.
