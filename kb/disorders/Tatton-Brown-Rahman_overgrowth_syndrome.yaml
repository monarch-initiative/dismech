    evidence_source: HUMAN_CLINICAL
    snippet: "Tatton-Brown–Rahman syndrome (TBRS) is a rare congenital genetic disorder caused by autosomal dominant pathogenic variants in the DNA methyltransferase DNMT3A gene."
    explanation: This directly supports autosomal dominant inheritance.
pathophysiology:
- name: DNMT3A loss of function
  description: >-
    Germline pathogenic DNMT3A variants reduce normal methyltransferase
    function, establishing the primary molecular lesion in Tatton-Brown-Rahman
    syndrome.
