name: Tatton-Brown-Rahman overgrowth syndrome
creation_date: "2026-04-13T22:47:36Z"
description: >-
  Tatton-Brown-Rahman overgrowth syndrome is a DNMT3A-related epigenetic
  disorder characterized by overgrowth, intellectual disability, and
  distinctive facial features, with an expanding phenotype that also includes
  cardiovascular abnormalities in some patients. The disease is caused by
  germline pathogenic DNMT3A variants affecting developmental methylation
  programs.
category: Mendelian
parents:
- hereditary disease
- overgrowth syndrome
synonyms:
- TBRS
- DNMT3A-overgrowth syndrome
