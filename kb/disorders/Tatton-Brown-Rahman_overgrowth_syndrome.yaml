    explanation: This directly supports a DNMT3A loss-of-function disease mechanism.
  downstream:
  - target: Altered epigenetic regulation
    description: Reduced DNMT3A activity perturbs developmental methylation and transcriptional programs.
  - target: Cardiovascular developmental dysfunction
    description: DNMT3A dysfunction can disrupt cardiovascular development and maintenance in a subset of patients.
- name: Altered epigenetic regulation
  description: >-
    DNMT3A dysfunction perturbs developmental epigenetic regulation and
    contributes to the growth and neurodevelopmental phenotype of TBRS.
