    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "A 34-year-old proband presented with progressive aortic dilatation, mitral valve (MV) regurgitation, left ventricular (LV) dilatation, and ventricular arrhythmias."
    explanation: This directly supports cardiovascular developmental and functional involvement in TBRS.
  downstream:
