    explanation: Grabowski review confirms L444P homozygosity predicts neuronopathic disease.
- name: GBA1
  gene_term:
    preferred_term: GBA1
    term:
      id: hgnc:4177
      label: GBA
  association: Causative
  subtype: Type 3
  notes: >
    Type 3 patients typically carry L444P or other severe mutations.
