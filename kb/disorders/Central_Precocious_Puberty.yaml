name: Central Precocious Puberty
creation_date: "2026-06-19T12:00:00Z"
category: Complex
description: >-
  Central precocious puberty (CPP) is gonadotropin-releasing hormone (GnRH)-dependent
  precocious puberty caused by premature reactivation of the hypothalamic-pituitary-gonadal
  (HPG) axis, with onset of secondary sexual characteristics before age 8 years in girls
  and 9 years in boys. Premature reactivation of pulsatile GnRH secretion drives pituitary
  gonadotropin (LH/FSH) release and gonadal sex-steroid production, producing accelerated
  linear growth, advanced skeletal maturation, and early pubertal development. The
  reawakening of the GnRH pulse generator reflects a loss of the prepubertal restraint that
  normally holds the axis quiescent during childhood. Most cases in girls are idiopathic,
  but monogenic causes are increasingly recognized, including loss-of-function variants in
  the imprinted, paternally expressed genes MKRN3 and DLK1, and rare gain-of-function
  variants in the kisspeptin pathway (KISS1, KISS1R). CPP is distinguished from peripheral
  (GnRH-independent) precocious puberty, in which sex steroids are produced independently of
  the HPG axis.
disease_term:
  preferred_term: central precocious puberty
  term:
    id: MONDO:0019165
    label: central precocious puberty
parents:
- Precocious puberty
- Disorders of puberty
has_subtypes:
- name: MKRN3
  display_name: MKRN3-related CPP (CPPB1)
  description: >-
    The most common identified monogenic cause of familial CPP. Loss-of-function variants
    in MKRN3 (makorin ring finger protein 3), an imprinted gene on chromosome 15q11.2
    expressed only from the paternal allele, cause CPP when transmitted from the father.
    MKRN3 acts as an inhibitory brake on GnRH secretion; its loss removes prepubertal
    restraint and permits premature GnRH pulsatility. Circulating MKRN3 normally declines
    before clinical puberty.
  evidence:
  - reference: PMID:23738509
    reference_title: "Central precocious puberty caused by mutations in the imprinted gene MKRN3."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "MKRN3 is a paternally expressed, imprinted gene located in the \nPrader-Willi syndrome critical region (chromosome 15q11-q13). All affected \npersons inherited the mutations from their fathers, a finding that indicates \nperfect segregation with the mode of inheritance expected for an imprinted gene."
    explanation: Establishes MKRN3 loss-of-function as a paternally inherited imprinted cause of CPP.
- name: DLK1
  display_name: DLK1-related CPP (CPPB2)
  description: >-
    CPP caused by loss-of-function variants in DLK1 (delta-like non-canonical Notch ligand
    1), another paternally expressed imprinted gene at the 14q32 locus. Like MKRN3, DLK1
    is transmitted in a parent-of-origin (paternal) pattern and may be associated with a
    broader metabolic phenotype including early obesity, hyperlipidemia, and type 2
    diabetes.
  evidence:
  - reference: PMID:28324015
    reference_title: "Paternally Inherited DLK1 Deletion Associated With Familial Central Precocious Puberty."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Only family \nmembers who inherited the defect from their father have precocious puberty, \nconsistent with the known imprinting of DLK1."
    explanation: Establishes paternally inherited DLK1 deletion as a cause of familial CPP via genomic imprinting.
- name: KISS1_KISS1R
  display_name: Kisspeptin-pathway CPP (KISS1 / KISS1R gain of function)
  description: >-
    Rare CPP caused by activating (gain-of-function) variants in the kisspeptin ligand KISS1
    or its receptor KISS1R (GPR54). Enhanced kisspeptin signaling on GnRH neurons drives
    premature activation of GnRH secretion. These variants are uncommon causes of CPP.
  evidence:
  - reference: PMID:18272894
    reference_title: "A GPR54-activating mutation in a patient with central precocious puberty."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "we have \nidentified an autosomal dominant GPR54 mutation--the substitution of proline for \narginine at codon 386 (Arg386Pro)--in an adopted girl with idiopathic central \nprecocious puberty"
    explanation: Reports an activating GPR54 (KISS1R) mutation in a patient with CPP.
  - reference: PMID:20237166
    reference_title: "Mutations of the KISS1 gene in disorders of puberty."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Two KISS1 mutations were identified in unrelated patients with \nidiopathic CPP."
    explanation: Identifies KISS1 mutations in patients with idiopathic CPP.
- name: Idiopathic
  display_name: Idiopathic CPP
  description: >-
    CPP with no identifiable organic CNS lesion or monogenic cause. Idiopathic CPP accounts
    for the large majority of cases in girls and is a diagnosis of exclusion after
    neuroimaging and, where indicated, genetic evaluation.
pathophysiology:
- name: Premature Reactivation of Pulsatile GnRH Secretion
  description: >-
    The central event in CPP is premature reawakening of the hypothalamic GnRH pulse
    generator. Hypothalamic GnRH neurons resume high-amplitude pulsatile GnRH secretion
    before the normal age of puberty, driving pituitary gonadotropin release. Upstream
    kisspeptin (KISS1/KISS1R) signaling stimulates GnRH neurons, while inhibitory factors
    including the paternally expressed imprinted genes MKRN3 and DLK1 normally restrain the
    axis during childhood; loss of this restraint or gain of kisspeptin tone triggers
    premature secretion.
  evidence:
  - reference: PMID:23738509
    reference_title: "Central precocious puberty caused by mutations in the imprinted gene MKRN3."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "The onset of puberty is first detected as an increase in pulsatile \nsecretion of gonadotropin-releasing hormone (GnRH). Early activation of the \nhypothalamic-pituitary-gonadal axis results in central precocious puberty."
    explanation: Establishes that premature pulsatile GnRH secretion and HPG axis activation underlie CPP.
  cell_types:
  - preferred_term: GnRH neuron
    term:
      id: CL:0011111
      label: hypothalamic gonadotropin-releasing hormone neuron
  biological_processes:
  - preferred_term: Gonadotropin secretion
    term:
      id: GO:0032274
      label: gonadotropin secretion
    modifier: INCREASED
  - preferred_term: Positive regulation of gonadotropin secretion
    term:
      id: GO:0032278
      label: positive regulation of gonadotropin secretion
    modifier: INCREASED
  downstream:
  - target: Early HPG Axis Activation and Premature Gonadarche
    description: >-
      Premature high-amplitude pulsatile GnRH secretion activates pituitary
      gonadotrophs, driving early HPG axis activation and premature gonadarche.
    causal_link_type: DIRECT
    evidence:
    - reference: PMID:30086862
      reference_title: "Central precocious puberty: From genetics to treatment."
      supports: SUPPORT
      evidence_source: HUMAN_CLINICAL
      snippet: "Central precocious puberty (CPP) results from early activation of the \nhypothalamic - pituitary -gonadal (HPG) axis and follows the same sequence as \nnormal puberty."
      explanation: Premature GnRH pulsatility is the proximal driver of early HPG axis activation in CPP.
- name: Early HPG Axis Activation and Premature Gonadarche
  description: >-
    Premature GnRH pulsatility activates pituitary gonadotrophs to secrete LH and FSH, which
    stimulate the gonads to produce sex steroids (estradiol in girls, testosterone in boys).
    The resulting premature gonadarche drives early development of secondary sexual
    characteristics, accelerated linear growth, and advanced skeletal maturation that can
    compromise adult height.
  evidence:
  - reference: PMID:30086862
    reference_title: "Central precocious puberty: From genetics to treatment."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Central precocious puberty (CPP) results from early activation of the \nhypothalamic - pituitary -gonadal (HPG) axis and follows the same sequence as \nnormal puberty."
    explanation: Confirms that early HPG axis activation drives the pubertal sequence in CPP.
  biological_processes:
  - preferred_term: Gonadotropin secretion
    term:
      id: GO:0032274
      label: gonadotropin secretion
    modifier: INCREASED
  downstream:
  - target: Precocious puberty
    description: >-
      Premature gonadarche and sex-steroid exposure produce early onset of
      secondary sexual characteristics (precocious puberty).
    causal_link_type: DIRECT
  - target: Accelerated skeletal maturation
    description: >-
      Early sex-steroid exposure advances skeletal maturation/bone age, which can
      compromise adult height.
    causal_link_type: DIRECT
  - target: Tall stature in childhood
    description: >-
      Sex-steroid-driven growth acceleration produces transiently increased
      height velocity and tall stature for age in childhood.
    causal_link_type: DIRECT
phenotypes:
- name: Precocious puberty
  description: >-
    Onset of secondary sexual characteristics before age 8 in girls and 9 in boys, driven by
    GnRH-dependent activation of the HPG axis.
  phenotype_term:
    preferred_term: Precocious puberty
    term:
      id: HP:0000826
      label: Precocious puberty
  evidence:
  - reference: PMID:18272894
    reference_title: "A GPR54-activating mutation in a patient with central precocious puberty."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Gonadotropin-dependent, or central, precocious puberty is caused by early \nmaturation of the hypothalamic-pituitary-gonadal axis. In girls, this condition \nis most often idiopathic."
    explanation: Defines GnRH-dependent (central) precocious puberty and notes it is most often idiopathic in girls.
- name: Accelerated skeletal maturation
  description: >-
    Sex-steroid exposure accelerates bone maturation, advancing bone age relative to
    chronological age and risking premature epiphyseal fusion and reduced adult height.
  phenotype_term:
    preferred_term: Accelerated skeletal maturation
    term:
      id: HP:0005616
      label: Accelerated skeletal maturation
- name: Tall stature in childhood
  description: >-
    Sex-steroid-driven growth acceleration produces tall stature relative to peers during
    childhood, although early epiphyseal fusion may compromise final adult height.
  phenotype_term:
    preferred_term: Tall stature
    term:
      id: HP:0000098
      label: Tall stature
- name: Premature thelarche
  description: >-
    Early breast development in girls, a common presenting sign of CPP.
  phenotype_term:
    preferred_term: Premature thelarche
    term:
      id: HP:0010314
      label: Premature thelarche
