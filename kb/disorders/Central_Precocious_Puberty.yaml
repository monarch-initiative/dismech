treatments:
- name: GnRH Analog Therapy
  description: >-
    Long-acting GnRH agonists (e.g., leuprolide) are first-line therapy for CPP. Continuous
    (non-pulsatile) GnRH receptor stimulation desensitizes pituitary gonadotrophs,
    suppressing LH/FSH and sex-steroid secretion, halting pubertal progression and
    preserving adult height potential.
  evidence:
  - reference: PMID:30086862
    reference_title: "Central precocious puberty: From genetics to treatment."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "GnRH analogs are the mainstay of treatment and are used \nwith the goal of height preservation."
    explanation: Confirms GnRH analogs as first-line treatment for CPP, aimed at height preservation.
  target_mechanisms:
  - target: Premature Reactivation of Pulsatile GnRH Secretion
    treatment_effect: INHIBITS
    description: >-
      Continuous (non-pulsatile) GnRH-receptor agonism desensitizes pituitary
      gonadotrophs, suppressing the prematurely reactivated GnRH/gonadotropin
      drive and halting pubertal progression.
  treatment_term:
    preferred_term: Pharmacotherapy
    term:
      id: NCIT:C15986
      label: Pharmacotherapy
    therapeutic_agent:
    - preferred_term: leuprolide
      term:
        id: CHEBI:6427
        label: leuprolide
