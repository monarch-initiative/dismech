- category: Immunological
  name: Disseminated infection with live viral vaccine
  description: >
    A hallmark presentation is disseminated infection after live attenuated
    viral vaccination, classically vaccine-strain measles following
    measles-mumps-rubella immunization.
  phenotype_term:
    preferred_term: Disseminated infection with live vaccine virus
    term:
