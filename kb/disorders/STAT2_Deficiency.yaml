    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "the proband developed disseminated vaccine strain measles following routine immunization, whereas an infant brother died after a 2-d febrile illness from an unknown viral infection."
    explanation: Documents disseminated vaccine-strain measles after routine MMR immunization, the characteristic live-vaccine complication of STAT2 deficiency.
- category: Immunological
  name: Hemophagocytic lymphohistiocytosis
  description: >
    A hyperinflammatory phenotype, including hemophagocytic lymphohistiocytosis
    (HLH) and multisystem inflammatory syndrome in children (MIS-C), has been
    reported in complete STAT2 deficiency, implicating dysregulated interferon
    biology in hyperinflammation as well as antiviral defense.
  phenotype_term:
    preferred_term: Hemophagocytosis
    term:
      id: HP:0012156
      label: Hemophagocytosis
  evidence:
  - reference: PMID:37074537
    reference_title: "Inborn Error of STAT2-Dependent IFN-I Immunity in a Patient Presented with Hemophagocytic Lymphohistiocytosis and Multisystem Inflammatory Syndrome in Children."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "a novel case of complete deficiency of STAT2 in a 3-year-old child that presented with typical features of HLH after mumps, measles, and rubella vaccination at the age of 12 months."
    explanation: Reports HLH (with subsequent MIS-C) in a child with complete STAT2 deficiency following MMR vaccination.
genetic:
- name: STAT2
  association: Causal
  gene_term:
    preferred_term: STAT2
    term:
      id: hgnc:11363
      label: STAT2
  notes: >
    Biallelic loss-of-function STAT2 variants cause this autosomal recessive
    disease. Reported lesions include a homozygous intron 4 splice-disrupting
    mutation (Hambleton et al) and compound heterozygous c.C1528T (p.R510X,
    nonsense-mediated decay) plus c.G1576A splice variants (Moens et al kindred).
    STAT1-dependent type II interferon signaling is preserved.
  evidence:
  - reference: PMID:23391734
    reference_title: "STAT2 deficiency and susceptibility to viral illness in humans."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Sequencing of genomic DNA and RNA revealed a homozygous mutation in intron 4 of STAT2 that prevented correct splicing in patient cells."
    explanation: Identifies a homozygous splice-disrupting STAT2 mutation as the molecular cause in the founder kindred.
treatments:
- name: Immunoglobulin Replacement Therapy
  description: >
    Immunoglobulin replacement (including high-dose intravenous immunoglobulin
    during severe infectious episodes) has been used to provide passive
    immunity and anti-inflammatory effect in STAT2-deficient patients,
    particularly in childhood before the adaptive immune system has matured.
  treatment_term:
    preferred_term: Intravenous immunoglobulin therapy
    term:
      id: NCIT:C121331
      label: Intravenous Immunoglobulin Therapy
- name: Avoidance of Live Attenuated Viral Vaccines
  description: >
    Because live attenuated viral vaccines (e.g., measles-mumps-rubella) can
    cause disseminated vaccine-strain infection in STAT2 deficiency, such
    vaccines should be avoided; this is a key agents/circumstances-to-avoid
    consideration once the diagnosis is known.
  treatment_term:
    preferred_term: supportive care
    term:
      id: MAXO:0000950
      label: supportive care
