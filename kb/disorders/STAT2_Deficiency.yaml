name: STAT2 Deficiency
creation_date: "2026-06-27T00:00:00Z"
category: Mendelian
disease_term:
  preferred_term: STAT2 deficiency
  term:
    id: MONDO:0014715
    label: primary immunodeficiency with post-measles-mumps-rubella vaccine viral infection
parents:
  - inborn error of immunity
  - autosomal recessive disease
references:
  - reference: PMID:28087227
    title: "A novel kindred with inherited STAT2 deficiency and severe viral illness."
description: >
  STAT2 deficiency (immunodeficiency 44; IMD44; OMIM 616636) is an autosomal
  recessive inborn error of immunity caused by biallelic loss-of-function
  variants in STAT2. STAT2 is an essential component of the ISGF3
  transcription-factor complex (STAT1-STAT2-IRF9) that mediates type I (and
  type III) interferon signaling. Loss of STAT2 abolishes interferon-stimulated
  gene factor 3-dependent induction of antiviral interferon-stimulated genes,
  rendering cells permissive to viral replication. Affected individuals
  characteristically develop severe, sometimes fatal, viral illness, including
  disseminated disease after live attenuated viral vaccines (e.g.,
  measles-mumps-rubella). Penetrance for severe infection is incomplete and the
  course of many common childhood viral infections is unexpectedly mild,
  reflecting redundancy of type I interferon for protective immunity to most
  viruses under natural conditions. A hyperinflammatory phenotype (hemophagocytic
  lymphohistiocytosis, MIS-C) has also been reported. Management is largely
  supportive, with immunoglobulin replacement and avoidance of live viral
  vaccines. A second kindred with autosomal recessive STAT2 deficiency and
  severe viral illness (compound heterozygous c.C1528T/c.G1576A) was reported by
  Moens et al (PMID:28087227); that JACI letter has no structured PubMed
  abstract, so claims here are corroborated with abstracted, snippet-validated
  sources.
pathophysiology:
- name: Defective Type I Interferon (ISGF3) Signaling
  description: >
    STAT2 is a required subunit of the heterotrimeric ISGF3 complex
    (STAT1-STAT2-IRF9) assembled downstream of the type I interferon receptor.
    Biallelic loss-of-function STAT2 variants abolish or cripple STAT2 protein
    expression and prevent ISGF3-dependent transcription, so type I
    interferon (IFN-alpha/beta) fails to induce its antiviral
    interferon-stimulated genes (e.g., MxA, ISG15, OAS1). Because type III
    interferon (IFN-lambda) signals through the same ISGF3 module, the mucosal
    IFN-lambda arm is likely impaired as well, whereas STAT1-dependent type II
    (IFN-gamma/GAF) signaling remains intact - distinguishing STAT2 deficiency
    from the broader STAT1 deficiency phenotype that also includes mycobacterial
    susceptibility.
  cell_types:
  - preferred_term: Fibroblast
    term:
      id: CL:0000057
      label: fibroblast
  biological_processes:
  - preferred_term: Type I interferon signaling
    term:
      id: GO:0060337
      label: type I interferon-mediated signaling pathway
    modifier: DECREASED
  - preferred_term: Cellular response to type I interferon
    term:
      id: GO:0071357
      label: cellular response to type I interferon
    modifier: DECREASED
  - preferred_term: Antiviral defense response
    term:
      id: GO:0051607
      label: defense response to virus
    modifier: DECREASED
  downstream:
  - target: Permissiveness to Viral Replication
    causal_link_type: DIRECT
    description: >
      Failure of ISGF3-dependent interferon-stimulated gene induction leaves
      cells unable to establish a type I interferon antiviral state, permitting
      unchecked viral replication.
  evidence:
  - reference: PMID:23391734
    reference_title: "STAT2 deficiency and susceptibility to viral illness in humans."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Patient fibroblasts were indeed abnormally permissive for viral replication in vitro, associated with profound failure of type I IFN signaling and absence of STAT2 protein."
    explanation: Directly demonstrates that STAT2 loss abolishes type I interferon signaling and produces a cell-intrinsic defect permitting viral replication.
  - reference: PMID:37074537
    reference_title: "Inborn Error of STAT2-Dependent IFN-I Immunity in a Patient Presented with Hemophagocytic Lymphohistiocytosis and Multisystem Inflammatory Syndrome in Children."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Functional studies showed an impaired IFN-I-induced response and a defective IFNα expression at later stages of STAT2 pathway induction."
    explanation: Confirms in an independent patient that complete STAT2 deficiency impairs the type I interferon-induced response.
- name: Permissiveness to Viral Replication
  description: >
    Without an inducible type I interferon antiviral program, host cells cannot
    restrict viral replication. Clinically this manifests as severe viral
    illness and, characteristically, disseminated disease following live
    attenuated viral vaccines such as measles-mumps-rubella. The defect is
    cell-intrinsic and reproducible in patient fibroblasts, which fail to be
    protected by exogenous IFN-alpha (but remain responsive to IFN-gamma).
  cell_types:
  - preferred_term: Fibroblast
    term:
      id: CL:0000057
      label: fibroblast
  biological_processes:
  - preferred_term: Viral defense failure
    term:
      id: GO:0051607
      label: defense response to virus
    modifier: DECREASED
  evidence:
  - reference: PMID:23391734
    reference_title: "STAT2 deficiency and susceptibility to viral illness in humans."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "the proband developed disseminated vaccine strain measles following routine immunization, whereas an infant brother died after a 2-d febrile illness from an unknown viral infection."
    explanation: Illustrates the severe viral illness phenotype, including disseminated live vaccine-strain measles, that follows from failed cell-intrinsic antiviral immunity.
mechanistic_hypotheses:
- hypothesis_group_id: incomplete_penetrance_model
  hypothesis_label: Incomplete penetrance and type I IFN redundancy
  description: >
    Although STAT2 is essential for type I interferon signaling in vitro, the
    clinical phenotype shows incomplete penetrance for severe viral infection
    and many common childhood viral illnesses run a mild course. This is
    interpreted as evidence that human type I interferons are more redundant for
    protective antiviral immunity under natural conditions than expected, with
    type I IFN-independent mechanisms of cell-intrinsic antiviral immunity
    compensating in most infections.
  evidence:
  - reference: PMID:23391734
    reference_title: "STAT2 deficiency and susceptibility to viral illness in humans."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "surviving STAT2-deficient individuals have remained generally healthy, with no obvious defects in their adaptive immunity or developmental abnormalities."
    explanation: Documents the generally healthy interval course in surviving patients, the clinical basis for the type I IFN redundancy hypothesis.
  - reference: PMID:33729549
    reference_title: "Viral infections in humans and mice with genetic deficiencies of the type I IFN response pathway."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "A picture is emerging of greater redundancy of human type I IFNs for protective immunity to viruses in natural conditions than was initially anticipated."
    explanation: Review across IFNAR1/2, STAT1, STAT2, and IRF9 deficiencies supports greater-than-anticipated redundancy of human type I IFNs for antiviral protection.
