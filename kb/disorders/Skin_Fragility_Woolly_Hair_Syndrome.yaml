pathophysiology:
  - name: Compound Heterozygous DSP Mutations and Keratinocyte Adhesion Failure
    description: >-
      Compound heterozygosity for nonsense and missense DSP mutations disrupts
      desmoplakin function in keratinocytes. The desmoplakin protein is
      mislocalized to the cytoplasm rather than the cell periphery, and
      electron microscopy reveals acantholysis throughout all skin layers,
      focal detachment of desmosomes, and perinuclear condensation of the
      keratin intermediate filament network. This demonstrates that while
      desmoplakin haploinsufficiency may be tolerated, the combination with
      a missense allele causes severe skin disease.
    cell_types:
      - preferred_term: Keratinocyte
        term:
          id: CL:0000312
          label: keratinocyte
    biological_processes:
      - preferred_term: Desmosome organization
        term:
          id: GO:0002934
          label: desmosome organization
      - preferred_term: Cell-cell junction assembly
        term:
          id: GO:0007043
          label: cell-cell junction assembly
    locations:
      - preferred_term: Skin
        term:
          id: UBERON:0002097
          label: skin of body
    evidence:
      - reference: PMID:11841538
        supports: SUPPORT
        evidence_source: HUMAN_CLINICAL
        snippet: >-
          Mutation screening of desmoplakin demonstrated compound
          heterozygosity for a non-sense/mis-sense combination of mutations
          in both cases, C809X/N287K and Q664X/R2366C, respectively.
        explanation: >-
          Identifies compound heterozygous DSP mutations as the molecular
          basis for skin fragility-woolly hair syndrome.
      - reference: PMID:11841538
        supports: SUPPORT
        evidence_source: HUMAN_CLINICAL
        snippet: >-
          electron microscopy demonstrated acantholysis throughout all layers
          of the skin, focal detachment of desmosomes into the intercellular
          spaces, and perinuclear condensation of the suprabasal keratin
          intermediate filament network
        explanation: >-
          Demonstrates the cellular pathology of desmosomal disruption in
          this condition.
phenotypes:
  - category: Dermatologic
    name: Skin Fragility
    frequency: Very frequent
    description: >-
      Skin fragility with non-scarring blistering throughout all layers
      of the epidermis due to acantholysis.
    phenotype_term:
      preferred_term: Skin fragility
      term:
        id: HP:0007585
        label: Skin fragility with non-scarring blistering
    evidence:
      - reference: PMID:11841538
        supports: SUPPORT
        evidence_source: HUMAN_CLINICAL
        snippet: >-
          a new autosomal recessive genodermatosis characterized by focal
          and diffuse palmoplantar keratoderma, hyperkeratotic plaques on
          the trunk and limbs, varying degrees of alopecia, but no apparent
          cardiac anomalies
        explanation: >-
          Describes the skin fragility phenotype.
  - category: Dermatologic
    name: Palmoplantar Keratoderma
    frequency: Very frequent
    description: >-
      Focal and diffuse palmoplantar keratoderma with hyperkeratotic
      plaques extending to trunk and limbs.
    phenotype_term:
