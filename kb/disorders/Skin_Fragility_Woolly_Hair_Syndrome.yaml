genetic:
  - name: DSP Compound Heterozygous Mutations
    association: Pathogenic Variants
    gene_term:
      preferred_term: DSP
      term:
        id: hgnc:3052
        label: DSP
    inheritance:
      - name: Autosomal Recessive
        inheritance_term:
          preferred_term: Autosomal recessive inheritance
          term:
            id: HP:0000007
            label: Autosomal recessive inheritance
    features: >-
      Compound heterozygosity for nonsense/missense DSP mutations.
      Heterozygous carriers of individual mutations show no phenotype.
    evidence:
      - reference: PMID:11841538
        supports: SUPPORT
        evidence_source: HUMAN_CLINICAL
        snippet: >-
          Heterozygous carriers of any of these mutations displayed no
          phenotypic abnormalities.
        explanation: >-
          Confirms that haploinsufficiency alone is tolerated; compound
          heterozygosity is required for the skin fragility phenotype.
      - reference: PMID:11841538
        supports: SUPPORT
        evidence_source: HUMAN_CLINICAL
        snippet: >-
          desmoplakin haploinsufficiency can be tolerated in some cases, but
          that in combination with a mis-sense mutation on the other allele,
          the consequences are a severe genodermatosis with specific clinical
          manifestations
        explanation: >-
          Establishes the genotype-phenotype correlation for compound
          heterozygosity.
