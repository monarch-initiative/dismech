name: Skin Fragility-Woolly Hair Syndrome
creation_date: "2026-04-04T00:00:00Z"
updated_date: "2026-04-04T00:00:00Z"
description: >-
  Skin fragility-woolly hair-palmoplantar keratoderma syndrome is a rare
  autosomal recessive genodermatosis caused by compound heterozygous
  loss-of-function mutations in the desmoplakin (DSP) gene. It is characterized
  by focal and diffuse palmoplantar keratoderma, hyperkeratotic plaques on the
  trunk and limbs, skin fragility with blistering, and varying degrees of
  alopecia. Unlike Carvajal syndrome, cardiac anomalies are not initially
  apparent, though cardiac involvement may develop over time. Desmoplakin
  haploinsufficiency can be tolerated, but compound heterozygosity with a
  missense mutation on the other allele causes severe cutaneous disease through
  disruption of desmosome-keratin intermediate filament interactions.
category: Genetic
parents:
  - Genodermatosis
  - Desmosomal Disease
