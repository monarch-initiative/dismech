        label: Palmoplantar keratoderma
  - category: Dermatologic
    name: Woolly Hair and Alopecia
    frequency: Very frequent
    description: >-
      Woolly hair with varying degrees of alopecia reflecting desmosomal
      dysfunction in hair follicles.
    phenotype_term:
      preferred_term: Woolly hair
      term:
        id: HP:0002224
        label: Woolly hair
  - category: Dermatologic
    name: Nail Dystrophy
    frequency: Occasional
    description: >-
      Nail abnormalities may be present as part of ectodermal involvement.
    phenotype_term:
      preferred_term: Nail dystrophy
      term:
