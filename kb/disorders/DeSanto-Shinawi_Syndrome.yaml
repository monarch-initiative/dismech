differential_diagnoses:
- name: Kabuki syndrome
  disease_term:
    preferred_term: Kabuki syndrome
    term:
      id: MONDO:0016512
      label: Kabuki syndrome
  description: >-
    Kabuki syndrome overlaps with DeSanto-Shinawi syndrome through developmental
    delay, hypotonia, and distinctive facial features, but differs in its
    characteristic epigenetic gene causes and broader multisystem pattern.
  distinguishing_features:
  - WAC loss-of-function with autism-predominant neurobehavioral features favors DeSanto-Shinawi syndrome.
  - Persistent fingertip pads and the classic Kabuki craniofacial gestalt favor Kabuki syndrome.
- name: Noonan syndrome
  disease_term:
    preferred_term: Noonan syndrome
    term:
      id: MONDO:0018997
      label: Noonan syndrome
  description: >-
    Noonan syndrome may enter the differential because of developmental delay
    and craniofacial overlap, but it is usually distinguished by congenital
    heart disease, short stature, and a RASopathy mechanism.
  distinguishing_features:
  - Autism and seizure-associated WAC-related neurodevelopmental findings favor DeSanto-Shinawi syndrome.
  - Pulmonary valve stenosis, lymphatic findings, and RASopathy facies favor Noonan syndrome.
