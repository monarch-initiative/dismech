  evidence:
  - reference: PMID:35018708
    reference_title: "Clinical and molecular characterization of five new individuals with WAC-related intellectual disability: Evidence of pathogenicity for a novel splicing variant."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      WAC-related intellectual disability (ID) is a rare genetic condition characterized by a spectrum of neurodevelopmental disorders of varying severity, including global developmental delay (GDD), ID, and autism spectrum disorder.
    explanation: >-
      This supports WAC-related haploinsufficiency as the basis of the
