  downstream:
  - target: Impaired ULK activation and autophagy
    description: Loss of WAC disrupts one of its established cellular functions in autophagy regulation
- name: Impaired ULK activation and autophagy
  description: >-
    WAC regulates starvation-induced autophagy by controlling centrosomal
    GABARAP trafficking and ULK kinase activation.
  biological_processes:
  - preferred_term: autophagy
    modifier: DECREASED
    term:
      id: GO:0006914
      label: autophagy
  evidence:
  - reference: PMID:26687599
    reference_title: "Activation of ULK Kinase and Autophagy by GABARAP Trafficking from the Centrosome Is Regulated by WAC and GM130."
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: >-
      WAC suppresses GM130 binding to GABARAP, regulating starvation-induced centrosomal GABARAP delivery to the phagophore.
    explanation: >-
      This directly supports a mechanistic role for WAC in autophagosome
      initiation.
  - reference: PMID:26687599
    reference_title: "Activation of ULK Kinase and Autophagy by GABARAP Trafficking from the Centrosome Is Regulated by WAC and GM130."
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: >-
      In short, during amino acid starvation WAC promotes ULK1 activation and the initiation of autophagosome formation.
    explanation: >-
      This directly links WAC to ULK1 activation and autophagy initiation.
  downstream:
  - target: Neurodevelopmental and seizure-related phenotypes
    description: WAC loss perturbs brain development and inhibitory-neuron-related phenotypes
- name: Neurodevelopmental and seizure-related phenotypes
  description: >-
    Vertebrate models of Wac loss show craniofacial changes, behavioral
    abnormalities, impacts on GABAergic neurons, seizure susceptibility, and
    brain-volume changes relevant to the human syndrome.
  evidence:
  - reference: PMID:38826421
    reference_title: "Complimentary vertebrate Wac models exhibit phenotypes relevant to DeSanto-Shinawi Syndrome."
    supports: SUPPORT
    evidence_source: MODEL_ORGANISM
    snippet: >-
      In addition, each model revealed impacts to GABAergic neurons and further studies showed that the mouse mutants are susceptible to seizures, changes in brain volumes that are different between sexes and relevant behaviors.
    explanation: >-
      The mouse and zebrafish models support a causal link from Wac loss to
      neurodevelopmental and seizure-related abnormalities.
