name: DeSanto-Shinawi syndrome
creation_date: '2026-04-11T19:38:25Z'
updated_date: '2026-04-11T23:20:00Z'
category: Mendelian
description: >-
  DeSanto-Shinawi syndrome is an autosomal dominant neurodevelopmental disorder
  caused by heterozygous loss-of-function variants in WAC. WAC participates in
  transcription-coupled chromatin regulation and in starvation-induced
  autophagy, where it regulates centrosomal GABARAP trafficking and ULK kinase
  activation. Loss of WAC function disrupts these cellular processes and is
  associated with developmental delay or intellectual disability, autism and
  behavioral symptoms, seizures in a subset of individuals, and characteristic
  craniofacial findings.
