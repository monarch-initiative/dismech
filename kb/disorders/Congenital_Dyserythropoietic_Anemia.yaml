- name: CDA I
  display_name: CDA Type I (CDAN1 / CDIN1)
  description: >-
    Autosomal recessive CDA caused by biallelic variants in CDAN1 (codanin-1)
    or CDIN1 (formerly C15orf41). Characterized by moderate-to-severe
    macrocytic anemia with pathognomonic "spongy" (Swiss-cheese)
    heterochromatin and internuclear chromatin bridges in erythroblasts.
    Interferon-alpha can reduce transfusion requirements.
