treatments:
- name: Red blood cell transfusion
  description: >-
    Blood transfusion supports patients with severe anemia; some patients are
    transfusion dependent.
  treatment_term:
    preferred_term: blood transfusion
    term:
      id: MAXO:0000756
      label: blood transfusion
  evidence:
  - reference: DOI:10.3389/frhem.2024.1389820
    reference_title: "Congenital dyserythropoietic anemia type II and ineffective erythropoiesis: challenges in diagnosis and management."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "some severe cases may require blood transfusion, iron chelation therapy, splenectomy, and in extreme cases, hematopoietic stem cell transplant may be necessary."
    explanation: Documents transfusion as a management option for severe CDA.

- name: Iron chelation therapy
  description: >-
    Iron chelation (e.g., deferasirox) treats secondary iron overload from
    increased absorption and transfusion. GeneReviews advises avoiding
    iron-containing preparations.
  treatment_term:
    preferred_term: pharmacotherapy
    term:
      id: MAXO:0000058
      label: pharmacotherapy
    therapeutic_agent:
    - preferred_term: deferasirox
      term:
        id: CHEBI:49005
        label: deferasirox
  target_mechanisms:
  - target: Secondary iron overload
    description: Iron chelation removes excess iron accumulated from increased absorption and transfusion.
  evidence:
  - reference: DOI:10.3389/frhem.2024.1389820
    reference_title: "Congenital dyserythropoietic anemia type II and ineffective erythropoiesis: challenges in diagnosis and management."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "some severe cases may require blood transfusion, iron chelation therapy, splenectomy, and in extreme cases, hematopoietic stem cell transplant may be necessary."
    explanation: Documents iron chelation therapy as a CDA management option.
  - reference: PMID:20301759
    reference_title: "Congenital Dyserythropoietic Anemia Type I."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Agents/circumstances to avoid: Any preparation containing iron."
    explanation: GeneReviews drug-safety warning to avoid iron-containing preparations in CDA I.

- name: Splenectomy
  description: Splenectomy may be used in selected patients with hemolysis/hypersplenism.
  treatment_term:
    preferred_term: splenectomy
    term:
      id: MAXO:0001077
      label: splenectomy
  evidence:
  - reference: DOI:10.3389/frhem.2024.1389820
    reference_title: "Congenital dyserythropoietic anemia type II and ineffective erythropoiesis: challenges in diagnosis and management."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "some severe cases may require blood transfusion, iron chelation therapy, splenectomy, and in extreme cases, hematopoietic stem cell transplant may be necessary."
    explanation: Documents splenectomy as a CDA management option.

- name: Hematopoietic stem cell transplantation
  description: >-
    Allogeneic HSCT is a potentially curative option reserved for severe,
    transfusion-dependent disease (e.g., interferon-resistant CDA I).
  treatment_term:
    preferred_term: hematopoietic stem cell transplantation
    term:
      id: MAXO:0000747
      label: hematopoietic stem cell transplantation
  evidence:
  - reference: DOI:10.3389/frhem.2024.1389820
    reference_title: "Congenital dyserythropoietic anemia type II and ineffective erythropoiesis: challenges in diagnosis and management."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "in extreme cases, hematopoietic stem cell transplant may be necessary."
    explanation: Documents HSCT as a treatment for the most severe CDA cases.
  - reference: PMID:20301759
    reference_title: "Congenital Dyserythropoietic Anemia Type I."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Allogeneic bone marrow transplantation should be considered only in transfusion-dependent persons who are resistant to IFN therapy."
    explanation: GeneReviews reserves HSCT for transfusion-dependent, interferon-resistant CDA I.

- name: Interferon-alpha therapy
  description: >-
    In CDA I, interferon-alpha (IFN-alpha2a/2b or peginterferon-alpha2b)
    increases hemoglobin and decreases iron overload, reducing transfusion
    dependence.
  treatment_term:
    preferred_term: pharmacotherapy
    term:
      id: MAXO:0000058
      label: pharmacotherapy
    therapeutic_agent:
    - preferred_term: recombinant interferon alfa
      term:
        id: NCIT:C225
        label: Recombinant Interferon Alfa
  target_mechanisms:
  - target: Secondary iron overload
    description: Interferon-alpha decreases iron overload in CDA I.
  evidence:
  - reference: PMID:20301759
    reference_title: "Congenital Dyserythropoietic Anemia Type I."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Intramuscular or subcutaneous injections of interferon IFN-α2a or IFN-α2b are given two or three times a week or peginterferon-α2b once a week to increase hemoglobin and decrease iron overload."
    explanation: GeneReviews documents interferon-alpha as CDA I treatment that raises hemoglobin and reduces iron overload.

- name: Genetic counseling
  description: >-
    Genetic counseling supports families; once familial pathogenic variants
    are identified, carrier testing and prenatal/preimplantation testing are
    possible.
  treatment_term:
    preferred_term: genetic counseling
    term:
      id: MAXO:0000079
      label: genetic counseling
  evidence:
  - reference: PMID:20301759
    reference_title: "Congenital Dyserythropoietic Anemia Type I."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Once the pathogenic variants have been identified in an affected family member, carrier testing for at-risk relatives and prenatal and preimplantation genetic testing are possible."
    explanation: GeneReviews supports genetic counseling and family-based testing in CDA.

animal_models:
- species: Mus musculus
  genotype: Erythroid-specific Cdan1 deletion (CdanΔEry)
  description: >-
    Erythroid-specific deletion of Cdan1 (using ErGFPcre) causes mid-gestation
    embryonic lethality from severe anemia and recapitulates the pathognomonic
    spongy heterochromatin and increased erythroblast apoptosis of CDA I.
  evidence:
  - reference: PMID:34234691
    reference_title: "Cdan1 Is Essential for Primitive Erythropoiesis."
    supports: SUPPORT
    evidence_source: MODEL_ORGANISM
    snippet: "The resulting CdanΔEry transgenic embryos died at mid-gestation (E12.5-E13.5) from severe anemia, with very low numbers of circulating erythroblast. Transmission electron microscopy studies of primitive erythroblasts (E9.5) revealed the pathognomonic spongy heterochromatin."
    explanation: Mouse model recapitulates CDA I severe anemia and the pathognomonic spongy heterochromatin.

clinical_trials:
