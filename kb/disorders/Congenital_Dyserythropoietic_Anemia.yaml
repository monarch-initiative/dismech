    supports: PARTIAL
    evidence_source: HUMAN_CLINICAL
    snippet: "Laboratory tests to evaluate for ineffective erythropoiesis include indirect bilirubin level, which can be normal or increased"
    explanation: Documents elevated indirect (unconjugated) bilirubin as a laboratory marker of ineffective erythropoiesis in CDA.

- name: Hydrops fetalis
  description: Rare severe in-utero presentation of CDA I.
