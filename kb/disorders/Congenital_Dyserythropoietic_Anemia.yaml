name: Congenital Dyserythropoietic Anemia
creation_date: "2026-06-05T12:00:00Z"
category: Mendelian
description: >-
  Congenital dyserythropoietic anemia (CDA) is a heterogeneous group of
  inherited disorders of late erythropoiesis characterized by ineffective
  erythropoiesis, distinctive morphological abnormalities of bone-marrow
  erythroid precursors (including bi- and multinucleated erythroblasts), and
  a variable hemolytic component. Anemia ranges from mild to transfusion
  dependent, and secondary iron overload develops even in non-transfused
  patients through erythroferrone-mediated suppression of hepcidin. The major
  subtypes are defined by causal gene and marrow morphology: CDA I (CDAN1,
  CDIN1/C15orf41), CDA II (SEC23B, the most common type), CDA III (KIF23),
  and the transcription-factor-related forms (GATA1, KLF1).
