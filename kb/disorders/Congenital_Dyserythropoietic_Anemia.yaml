    reference_title: "The Congenital Dyserythropoietic Anemia Registry (CDAR)"
    supports: SUPPORT
    snippet: "The goal of this registry is to collect long-term confidential data on patients with CDA in the US, Canada, and Mexico"
    explanation: Establishes the CDAR registry as an active CDA natural-history study.
