      id: HP:0012465
      label: Elevated hepatic iron concentration
  evidence:
  - reference: DOI:10.3389/frhem.2024.1389820
    reference_title: "Congenital dyserythropoietic anemia type II and ineffective erythropoiesis: challenges in diagnosis and management."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Evaluation includes basic laboratory testing, magnetic resonance imaging of organs for assessment of iron overload, bone marrow assessment, and genetic testing."
    explanation: Documents MRI assessment of organ (including hepatic) iron overload in CDA.

- name: Cholelithiasis
  description: Gallstones are a frequent complication of the chronic hemolytic state.
  phenotype_term:
    preferred_term: Cholelithiasis
    term:
      id: HP:0001081
      label: Cholelithiasis
  evidence:
  - reference: PMID:38765414
    reference_title: "Congenital Dyserythropoietic Anemia Type II With Myelofibrosis in an Adult Patient."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Patients with CDA type II generally present with variable degrees of anemia along with pallor, icterus, splenomegaly, gallstones, and iron overload."
    explanation: Documents gallstones as a typical CDA II complication.

- name: Unconjugated hyperbilirubinemia
  description: Indirect (unconjugated) hyperbilirubinemia reflects the hemolytic component.
  phenotype_term:
    preferred_term: Unconjugated hyperbilirubinemia
    term:
      id: HP:0008282
