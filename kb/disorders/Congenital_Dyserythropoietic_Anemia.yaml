- name: CDA II
  display_name: CDA Type II (SEC23B)
  description: >-
    The most common major CDA type. Autosomal recessive disorder caused by
    biallelic SEC23B variants affecting COPII-dependent endoplasmic-reticulum-
    to-Golgi vesicular trafficking, producing mild-to-severe normocytic
    anemia, hemolysis, jaundice, and splenomegaly with band-3
    hypoglycosylation and bi/multinucleated mature erythroblasts on marrow
    examination.
