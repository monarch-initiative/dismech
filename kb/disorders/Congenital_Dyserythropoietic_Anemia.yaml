genetic:
- name: CDAN1
  gene_term:
    preferred_term: CDAN1
    term:
      id: hgnc:1713
      label: CDAN1
  association: Causal
  subtype: CDA I
  inheritance:
  - name: Autosomal recessive inheritance
    inheritance_term:
      preferred_term: Autosomal recessive inheritance
      term:
        id: HP:0000007
        label: Autosomal recessive inheritance
  notes: >-
    CDAN1 encodes codanin-1 and is the main CDA I gene. Codanin-1 physically
    interacts with CDIN1.
  evidence:
  - reference: PMID:34234691
    reference_title: "Cdan1 Is Essential for Primitive Erythropoiesis."
    supports: SUPPORT
    evidence_source: MODEL_ORGANISM
    snippet: "The disease is mainly caused by mutations in CDAN1 (encoding for Codanin-1)."
    explanation: Identifies CDAN1 as the principal CDA I gene.

- name: CDIN1
  gene_term:
    preferred_term: CDIN1
    term:
      id: hgnc:26929
      label: CDIN1
  association: Causal
  subtype: CDA I
  inheritance:
  - name: Autosomal recessive inheritance
    inheritance_term:
      preferred_term: Autosomal recessive inheritance
      term:
        id: HP:0000007
        label: Autosomal recessive inheritance
  notes: >-
    CDIN1 (formerly C15orf41) is a second CDA I gene; CDAN1 and CDIN1 cause
    CDA I via a shared mechanism.
  evidence:
  - reference: PMID:33121234
    reference_title: "Recapitulation of erythropoiesis in congenital dyserythropoietic anaemia type I (CDA-I) identifies defects in differentiation and nucleolar abnormalities."
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: "Congenital Dyserythropoietic Anaemia type 1 (CDA-I) is a rare form of anaemia caused by mutations in two genes of unknown function: CDAN1 and CDIN1 (previously called C15orf41)"
    explanation: Identifies CDIN1 (C15orf41) as a CDA I gene alongside CDAN1.

- name: SEC23B
