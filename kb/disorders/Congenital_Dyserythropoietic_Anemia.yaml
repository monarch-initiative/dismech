pathophysiology:
- name: Ineffective erythropoiesis
  description: >-
    The unifying mechanism of all CDA subtypes is ineffective erythropoiesis:
    erythropoietin-driven expansion of erythroid precursors with apoptosis and
    maturation arrest of late-stage erythroblasts, so that the bone marrow
    shows erythroid hyperplasia and dyserythropoiesis while the peripheral
    reticulocyte response is inadequate for the degree of anemia. Subtype-
    specific molecular lesions (CDAN1/CDIN1 chromatin and nucleolar defects,
    SEC23B COPII trafficking defects, KIF23 cytokinesis defects) all converge
    on failed terminal erythroid maturation.
  cell_types:
  - preferred_term: erythroblast
    term:
      id: CL:0000765
      label: erythroblast
  - preferred_term: erythroid lineage cell
    term:
      id: CL:0000764
      label: erythroid lineage cell
  biological_processes:
  - preferred_term: erythrocyte differentiation
    term:
      id: GO:0030218
      label: erythrocyte differentiation
    modifier: DECREASED
  - preferred_term: erythrocyte maturation
    term:
      id: GO:0043249
      label: erythrocyte maturation
    modifier: DECREASED
  - preferred_term: apoptotic process
    term:
      id: GO:0006915
      label: apoptotic process
    modifier: INCREASED
  evidence:
  - reference: DOI:10.3389/frhem.2024.1389820
    reference_title: "Congenital dyserythropoietic anemia type II and ineffective erythropoiesis: challenges in diagnosis and management."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Congenital dyserythropoietic anemia (CDA) is characterized by anemia—mild to severe, hemolysis, ineffective erythropoiesis, and in some cases, iron overload."
    explanation: Defines ineffective erythropoiesis as the central feature of CDA.
  - reference: PMID:32702750
    reference_title: "Congenital dyserythropoietic anemias."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Congenital dyserythropoietic anemias (CDAs) are a heterogeneous group of inherited anemias that affect the normal differentiation-proliferation pathways of the erythroid lineage. They belong to the wide group of ineffective erythropoiesis conditions that mainly result in monolinear cytopenia."
    explanation: Establishes that CDAs perturb erythroid differentiation/proliferation and are ineffective erythropoiesis conditions.
  downstream:
  - target: Secondary iron overload
    description: >-
      Ineffective erythropoiesis drives erythroferrone overexpression, which
      suppresses hepcidin and increases intestinal iron absorption.
    evidence:
    - reference: PMID:32702750
      reference_title: "Congenital dyserythropoietic anemias."
      supports: SUPPORT
      evidence_source: HUMAN_CLINICAL
      snippet: "The erythroblast-derived hormone erythroferrone specifically inhibits hepcidin production, and its role in the mediation of hepatic iron overload has been dissected out."
      explanation: Links ineffective erythropoiesis to iron overload via the erythroferrone-hepcidin axis.
  - target: Anemia
    description: >-
      Failed terminal erythroid maturation reduces effective red-cell output,
      producing chronic anemia.
    evidence:
    - reference: DOI:10.3389/frhem.2024.1389820
      reference_title: "Congenital dyserythropoietic anemia type II and ineffective erythropoiesis: challenges in diagnosis and management."
      supports: SUPPORT
      evidence_source: HUMAN_CLINICAL
      snippet: "Congenital dyserythropoietic anemia (CDA) is characterized by anemia—mild to severe, hemolysis, ineffective erythropoiesis, and in some cases, iron overload."
      explanation: Links ineffective erythropoiesis to the resulting anemia.

- name: CDA I chromatin and nucleolar dysfunction
  description: >-
    In CDA I, biallelic CDAN1 (codanin-1) or CDIN1 variants disrupt erythroid
    chromatin organization and nucleolar structure/function. Codanin-1
    physically interacts with CDIN1, so CDAN1 and CDIN1 variants cause CDA I
    through a common pathway. Affected erythroblasts show delayed terminal
    differentiation, widespread changes in chromatin accessibility, increased
    proliferation and apoptosis, and the pathognomonic "spongy"
    heterochromatin seen on electron microscopy.
  cell_types:
  - preferred_term: erythroblast
    term:
      id: CL:0000765
      label: erythroblast
  biological_processes:
  - preferred_term: chromatin organization
    term:
      id: GO:0006325
      label: chromatin organization
    modifier: ABNORMAL
  evidence:
  - reference: PMID:33121234
    reference_title: "Recapitulation of erythropoiesis in congenital dyserythropoietic anaemia type I (CDA-I) identifies defects in differentiation and nucleolar abnormalities."
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: "erythroid cells in this condition show a delay during terminal erythroid differentiation, associated with increased proliferation and widespread changes in chromatin accessibility. We also show that the proteins encoded by CDAN1 and CDIN1 are enriched in nucleoli which are structurally and functionally abnormal in CDA-I."
    explanation: Demonstrates the chromatin-accessibility and nucleolar abnormalities underlying CDA I in a patient-derived culture system.
  - reference: PMID:35441598
    reference_title: "The congenital dyserythropoieitic anemias: genetics and pathophysiology."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Codanin-1 was found to physically interact with CDIN1, suggesting that mutations in CDAN1 and CDIN1 result in CDAI via a common mechanism."
    explanation: Supports a shared CDAN1/CDIN1 mechanism for CDA I.
  downstream:
  - target: Ineffective erythropoiesis
    description: >-
      Chromatin and nucleolar dysfunction blocks terminal erythroid
      maturation, feeding into ineffective erythropoiesis.

- name: CDA II COPII trafficking and hypoglycosylation defect
  description: >-
    In CDA II, biallelic SEC23B variants impair the COPII coat component
    required for endoplasmic-reticulum-to-Golgi vesicular transport. Disrupted
    secretory trafficking alters glycosylation of erythrocyte membrane
    proteins (e.g., band 3 hypoglycosylation), and patient erythroblasts show
    an additional membrane of residual endoplasmic reticulum beneath the
    plasma membrane. Patient-derived cells show reduced SEC23B protein without
    compensatory SEC23A upregulation, consistent with a loss-of-function
    mechanism.
  cell_types:
  - preferred_term: erythroblast
    term:
      id: CL:0000765
      label: erythroblast
  biological_processes:
  - preferred_term: endoplasmic reticulum to Golgi vesicle-mediated transport
    term:
      id: GO:0006888
      label: endoplasmic reticulum to Golgi vesicle-mediated transport
    modifier: DECREASED
  cellular_components:
  - preferred_term: COPII vesicle coat
    term:
      id: GO:0030134
      label: COPII-coated ER to Golgi transport vesicle
  evidence:
  - reference: PMID:37373084
    reference_title: "New Cases and Mutations in SEC23B Gene Causing Congenital Dyserythropoietic Anemia Type II."
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: "Analysis of SEC23B protein levels done in patient-derived lymphoblastoid cell lines (LCLs) showed a significant decrease in SEC23B protein expression, in the absence of SEC23A compensation."
    explanation: Supports loss of SEC23B protein function as the CDA II molecular lesion.
  - reference: PMID:37455305
    reference_title: "Development of High-Resolution Melting Curve Analysis for rapid detection of SEC23B gene mutation causing Congenital Dyserythropoietic Anemia type II in Indian population."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "CDA II is caused by mutations in the SEC23B gene. The most common mutation reported in India is c.1385 A > G, p.Y462C."
    explanation: Identifies SEC23B as the CDA II gene and documents a recurrent founder variant.
  downstream:
  - target: Ineffective erythropoiesis
    description: >-
      COPII trafficking/glycosylation failure impairs erythroblast maturation,
      contributing to ineffective erythropoiesis.

- name: CDA III impaired erythroblast cytokinesis
  description: >-
    CDA III is associated with KIF23, encoding mitotic kinesin-like protein 1
    (MKLP1), a motor protein essential for cytokinesis. Defective cytokinesis
    prevents complete division of maturing erythroblasts, producing the
    characteristic giant multinucleated erythroblasts of CDA III and
    contributing to ineffective erythropoiesis.
  cell_types:
  - preferred_term: erythroblast
    term:
      id: CL:0000765
      label: erythroblast
  biological_processes:
  - preferred_term: cytokinesis
    term:
      id: GO:0000910
      label: cytokinesis
    modifier: ABNORMAL
  evidence:
  - reference: PMID:32702750
    reference_title: "Congenital dyserythropoietic anemias."
    supports: PARTIAL
    evidence_source: HUMAN_CLINICAL
    snippet: "CDAs are classified into the 3 major types (I, II, III), plus the transcription factor-related CDAs, and the CDA variants, on the basis of the distinctive morphological, clinical, and genetic features."
    explanation: Supports CDA III as a distinct morphology/genetic CDA type; KIF23/cytokinesis mechanistic detail is from the disease classification literature and gene function.

- name: Secondary iron overload
  description: >-
    Ineffective erythropoiesis stimulates erythroblast-derived erythroferrone,
    which inhibits hepcidin. Reduced hepcidin increases intestinal iron
    absorption, producing progressive hepatic and systemic iron overload
    (secondary hemochromatosis) even in patients who are not transfused.
  biological_processes:
  - preferred_term: intracellular iron ion homeostasis
    term:
      id: GO:0006879
      label: intracellular iron ion homeostasis
    modifier: ABNORMAL
  evidence:
  - reference: DOI:10.3389/frhem.2024.1389820
    reference_title: "Congenital dyserythropoietic anemia type II and ineffective erythropoiesis: challenges in diagnosis and management."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "complete iron panel (serum iron, ferritin, and iron saturation), which may suggest iron overload."
    explanation: Documents iron overload as a clinical feature of CDA requiring iron-panel monitoring.
  - reference: PMID:32702750
    reference_title: "Congenital dyserythropoietic anemias."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "The erythroblast-derived hormone erythroferrone specifically inhibits hepcidin production, and its role in the mediation of hepatic iron overload has been dissected out."
    explanation: Establishes the erythroferrone-hepcidin axis driving hepatic iron overload in CDA.
  - reference: PMID:20301759
    reference_title: "Congenital Dyserythropoietic Anemia Type I."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Secondary hemochromatosis develops with age as a result of increased iron absorption even in those who are not transfused."
    explanation: Documents non-transfusional iron overload from increased absorption in CDA I.

