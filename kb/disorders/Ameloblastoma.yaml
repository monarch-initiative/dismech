name: Ameloblastoma
creation_date: "2026-06-22T00:00:00Z"
description: >-
  Ameloblastoma is the most common epithelial odontogenic tumor, arising from the
  epithelial component of the developing tooth (rests of dental lamina, the enamel
  organ, the lining of odontogenic cysts, or basal cells of the oral mucosa). It
  usually affects the molar-ramus region of the mandible (~80% of cases) and less
  commonly the maxilla. Although histologically benign, ameloblastoma is locally
  aggressive, slow-growing, and destructive, with a high recurrence rate after
  incomplete resection and rare metastatic potential. The dominant molecular driver
  is somatic activation of the MAPK pathway, most commonly the BRAF V600E mutation
  (pooled prevalence ~70%, enriched in mandibular tumors), with additional MAPK
  drivers (FGFR2, KRAS, NRAS, HRAS) and Hedgehog-pathway SMO mutations (more typical
  of maxillary tumors). These mutations drive constitutive signaling and uncontrolled
  proliferation of odontogenic epithelium. BRAF V600E status defines a precision-
  oncology target, with BRAF/MEK inhibitors (dabrafenib plus trametinib) showing
  promising responses.
categories:
- Odontogenic Tumor
- Oncogene-Driven Cancer
parents:
- odontogenic neoplasm
disease_term:
  preferred_term: ameloblastoma
  term:
    id: MONDO:0017795
    label: ameloblastoma
has_subtypes:
- name: Conventional
  display_name: Conventional (solid/multicystic) ameloblastoma
  description: >-
    The most common type (previously termed solid/multicystic), usually mandibular,
    locally aggressive with the highest recurrence risk. Histologic patterns include
    follicular, plexiform, acanthomatous, granular cell, basal cell, and desmoplastic.
- name: Unicystic
  description: >-
    Approximately 5-22% of ameloblastomas; occurs in younger patients and may mimic
    a dentigerous cyst radiographically. Luminal and intraluminal variants are managed
    conservatively, whereas the mural variant behaves like conventional ameloblastoma.
- name: Peripheral
  display_name: Peripheral (extraosseous) ameloblastoma
  description: >-
    Rare soft-tissue variant overlying the jaws, generally less aggressive than
    intraosseous forms.
- name: Metastasizing
  description: >-
    Rare; classified as benign despite metastatic potential (most commonly to the
    lungs) because the metastatic deposits retain benign ameloblastoma histology.
pathophysiology:
- name: BRAF V600E and MAPK-Pathway Activating Mutation
  description: >-
    Somatic activating mutations in the MAPK pathway, most commonly BRAF V600E
    (valine-to-glutamic-acid substitution at codon 600; pooled prevalence ~70% across
    833 cases), lock BRAF kinase in a constitutively active state. Additional MAPK
    drivers include FGFR2 (upstream RTK), KRAS, NRAS, and HRAS. These mutations are
    most frequent in mandibular tumors.
  cell_types:
  - preferred_term: odontogenic epithelial cell
    term:
      id: CL:0000059
      label: ameloblast
  gene_products:
  - preferred_term: BRAF V600E mutant kinase
    term:
      id: NCIT:C17476
      label: Serine/Threonine-Protein Kinase B-Raf
  biological_processes:
  - preferred_term: MAPK cascade
    modifier: INCREASED
    term:
      id: GO:0000165
      label: MAPK cascade
  evidence:
  - reference: PMID:36428683
    reference_title: "BRAF V600E Mutation in Ameloblastoma: A Systematic Review and Meta-Analysis."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Meta-analysis prevalence of BRAF V600E in ameloblastoma was 70.49%, and a significant meta-analysis association was reported for those younger than 54 years old and in the mandible."
    explanation: >-
      Meta-analysis of 833 cases establishes BRAF V600E as the dominant somatic
      driver and its enrichment in mandibular tumors.
  - reference: PMID:35689405
    reference_title: "New Ameloblastoma Cell Lines Enable Preclinical Study of Targeted Therapies."
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: "we report the establishment of 6 new AB cell lines-generated by \"conditional reprogramming\"-and their genomic characterization that reveals driver mutations in FGFR2, KRAS, NRAS, BRAF, PIK3CA, and SMO."
    explanation: >-
      Genomic characterization of patient-derived ameloblastoma cell lines confirms
      the spectrum of MAPK-pathway driver mutations (FGFR2, KRAS, NRAS, BRAF).
  downstream:
  - target: Constitutive Odontogenic Epithelial Proliferation
    description: >-
      Constitutively active BRAF continuously phosphorylates MEK and ERK, driving
      growth-promoting transcription independent of upstream growth-factor signaling.
    causal_link_type: INDIRECT_KNOWN_INTERMEDIATES
- name: Hedgehog Pathway SMO Activating Mutation
  description: >-
    Activating mutations in SMO (Smoothened), most commonly SMO-L412F and less commonly
    SMO-W535L, drive ligand-independent Hedgehog signaling and GLI-driven transcription.
    SMO mutations are more typical of maxillary ameloblastomas and represent an
    alternative oncogenic route to odontogenic epithelial proliferation.
  cell_types:
  - preferred_term: odontogenic epithelial cell
    term:
      id: CL:0000059
      label: ameloblast
  biological_processes:
  - preferred_term: smoothened signaling pathway
    modifier: INCREASED
    term:
      id: GO:0007224
      label: smoothened signaling pathway
  evidence:
  - reference: PMID:35689405
    reference_title: "New Ameloblastoma Cell Lines Enable Preclinical Study of Targeted Therapies."
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: "AB cells with activating SMO-L412F mutation (Hedgehog pathway) are insensitive to vismodegib; however, a distinct small-molecule SMO inhibitor, BMS-833923, significantly reduces both downstream Hedgehog signaling and tumor cell viability."
    explanation: >-
      Functional data confirm constitutive Hedgehog signaling driven by the SMO-L412F
      mutation in ameloblastoma cells.
  downstream:
  - target: Constitutive Odontogenic Epithelial Proliferation
    description: >-
      Constitutive SMO activation drives GLI-dependent transcription of proliferation
      and differentiation genes in odontogenic epithelium.
    causal_link_type: INDIRECT_KNOWN_INTERMEDIATES
- name: Constitutive Odontogenic Epithelial Proliferation
  description: >-
    Convergent MAPK and Hedgehog signaling drive uncontrolled proliferation of
    odontogenic epithelial cells with evasion of apoptosis, producing the islands,
    cords, and sheets of tumor epithelium characteristic of ameloblastoma.
  cell_types:
  - preferred_term: odontogenic epithelial cell
    term:
      id: CL:0000059
      label: ameloblast
  biological_processes:
  - preferred_term: epithelial cell proliferation
    modifier: INCREASED
    term:
      id: GO:0050679
      label: positive regulation of epithelial cell proliferation
  - preferred_term: apoptosis evasion
    modifier: INCREASED
    term:
      id: GO:0043066
      label: negative regulation of apoptotic process
  evidence:
  - reference: PMID:38812739
    reference_title: "Identification of Molecular Mechanisms of Ameloblastoma and Drug Repositioning by Integration of Bioinformatics Analysis and Molecular Docking Simulation."
    supports: SUPPORT
    evidence_source: COMPUTATIONAL
    snippet: "Ameloblastoma (AM) is a benign tumor locally originated from odontogenic epithelium that is commonly found in the jaw. This tumor makes aggressive invasions and has a high recurrence rate."
    explanation: >-
      Transcriptomic and network analysis characterizes ameloblastoma as an
      odontogenic-epithelium-derived tumor with aggressive, invasive proliferation.
  downstream:
  - target: Local Bone Invasion and Destruction
    description: >-
      Expanding tumor epithelium infiltrates medullary spaces and resorbs cortical
      bone of the jaw.
    causal_link_type: INDIRECT_KNOWN_INTERMEDIATES
- name: Local Bone Invasion and Destruction
  description: >-
    The locally invasive tumor infiltrates through the medullary spaces of the jawbone
    and resorbs cortical bone, destroying normal bone architecture and creating the
    characteristic unilocular or multilocular radiolucencies. Infiltration beyond
    radiographic margins underlies the high recurrence rate.
  cell_types:
  - preferred_term: osteoclast
    term:
      id: CL:0000092
      label: osteoclast
  biological_processes:
  - preferred_term: bone resorption
    modifier: INCREASED
    term:
      id: GO:0045453
      label: bone resorption
  evidence:
  - reference: PMID:35689405
    reference_title: "New Ameloblastoma Cell Lines Enable Preclinical Study of Targeted Therapies."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Although relatively uncommon and rarely metastatic, AB tumors are locally invasive and destructive to the jawbone and surrounding structures."
    explanation: >-
      Describes the locally invasive, bone-destructive behavior that produces the
      clinical phenotypes of ameloblastoma.
  downstream:
  - target: Jaw Swelling
    description: >-
      Progressive tumor growth and cortical expansion produce painless jaw swelling.
    causal_link_type: DIRECT
  - target: Tooth Malposition
    description: >-
      Tumor expansion displaces teeth within the affected jaw region.
    causal_link_type: DIRECT
  - target: Facial Asymmetry
    description: >-
      Unilateral jaw expansion produces visible facial deformity.
    causal_link_type: INDIRECT_KNOWN_INTERMEDIATES
  - target: Paresthesia
    description: >-
      Tumor involvement of the inferior alveolar nerve produces altered sensation.
    causal_link_type: DIRECT
phenotypes:
- name: Jaw Swelling
  category: Phenotypic
  description: >-
    Painless, slowly progressive swelling of the mandible or maxilla with expansion
    of buccal and lingual cortical plates; present in nearly all cases at diagnosis.
  phenotype_term:
    preferred_term: Jaw swelling
    term:
      id: HP:0030793
      label: Jaw swelling
    clinical_course: PROGRESSIVE
  evidence:
  - reference: PMID:38927880
    reference_title: "Anti-MAPK Targeted Therapy for Ameloblastoma: Case Report with a Systematic Review."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Ameloblastoma, a benign yet aggressive odontogenic tumor known for its recurrence and the severe morbidity from radical surgeries, may benefit from advancements in targeted therapy."
    explanation: >-
      Establishes ameloblastoma as a benign but aggressive jaw tumor; jaw swelling
      is its hallmark clinical presentation.
- name: Odontogenic Neoplasm
  category: Phenotypic
  description: >-
    Ameloblastoma is the most common odontogenic neoplasm of the jaws, accounting for
    a large proportion of odontogenic tumors.
  phenotype_term:
    preferred_term: Odontogenic neoplasm
    term:
      id: HP:0100612
      label: Odontogenic neoplasm
  evidence:
