    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Ameloblastoma is one of the most prevalent but enigmatic benign odontogenic tumors of the jaw, accounting for approximately 10% of all maxillary and mandibular tumors."
    explanation: >-
      Confirms ameloblastoma as a benign odontogenic tumor of the jaw.
- name: Facial Asymmetry
  category: Phenotypic
  description: >-
    Noticeable facial deformity resulting from unilateral jaw expansion in established
    disease.
  phenotype_term:
    preferred_term: Facial asymmetry
    term:
      id: HP:0000324
      label: Facial asymmetry
    clinical_course: PROGRESSIVE
  evidence:
  - reference: PMID:38021761
    reference_title: "The Role of BRAF Inhibitors in the Management of Ameloblastoma: A Literature Review."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "This neoplasia is distinguished by exhibiting several clinical and histological variants along with several mutations that affect its behavior."
    explanation: >-
      Supports the clinically variable disfiguring presentation; facial asymmetry
      arises from progressive unilateral jaw expansion.
- name: Tooth Malposition
  category: Phenotypic
  description: >-
    Displacement and mobility of teeth within the affected jaw region, which can lead
    to tooth loss and impaired mastication.
  phenotype_term:
    preferred_term: Tooth malposition
    term:
      id: HP:0000692
      label: Tooth malposition
  evidence:
  - reference: PMID:30614154
    reference_title: "Global incidence and profile of ameloblastoma: A systematic review and meta-analysis."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "A slight male preference (53%) was found, and the mandible appeared to be the preferred site."
    explanation: >-
      Mandibular tumors (the preferred site) characteristically displace teeth as
      they expand within the jaw.
- name: Premature Loss of Teeth
  category: Phenotypic
  description: >-
    Progressive tumor expansion and bone destruction can lead to loss of teeth in the
    involved region.
  phenotype_term:
    preferred_term: Premature loss of teeth
    term:
      id: HP:0006480
      label: Premature loss of teeth
  evidence:
  - reference: PMID:35689405
    reference_title: "New Ameloblastoma Cell Lines Enable Preclinical Study of Targeted Therapies."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "AB tumors are locally invasive and destructive to the jawbone and surrounding structures."
    explanation: >-
      Local destruction of the jawbone and surrounding structures underlies tooth loss.
- name: Paresthesia
  category: Phenotypic
  description: >-
    Numbness or altered sensation, particularly when the inferior alveolar nerve is
    involved; occurs more often in advanced disease.
  phenotype_term:
    preferred_term: Paresthesia
    term:
      id: HP:0003401
      label: Paresthesia
  evidence:
  - reference: PMID:35689405
    reference_title: "New Ameloblastoma Cell Lines Enable Preclinical Study of Targeted Therapies."
    supports: PARTIAL
    evidence_source: HUMAN_CLINICAL
    snippet: "AB tumors are locally invasive and destructive to the jawbone and surrounding structures."
    explanation: >-
      Invasion of surrounding structures, including the inferior alveolar nerve canal,
      produces paresthesia; this snippet supports the local-invasion basis of the
      phenotype rather than the symptom frequency.
histopathology:
- name: Follicular Pattern
  finding_term:
    preferred_term: Follicular ameloblastoma
    term:
      id: NCIT:C27397
      label: Follicular Ameloblastoma
  frequency: FREQUENT
  description: >-
    Islands of odontogenic epithelium with peripheral palisading and reverse
    polarization surrounding a central stellate reticulum-like tissue; the most common
    histologic pattern globally.
  evidence:
  - reference: PMID:30614154
    reference_title: "Global incidence and profile of ameloblastoma: A systematic review and meta-analysis."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "The histopathologic patterns were mostly follicular and plexiform."
    explanation: >-
      Systematic review of 6,446 patients identifies follicular as a predominant
      histopathologic pattern.
- name: Plexiform Pattern
  finding_term:
    preferred_term: Plexiform ameloblastoma
    term:
      id: NCIT:C39753
      label: Plexiform Ameloblastoma
  frequency: FREQUENT
  description: >-
    Anastomosing cords and sheets of odontogenic epithelium; the second most common
    histologic pattern.
  evidence:
  - reference: PMID:30614154
    reference_title: "Global incidence and profile of ameloblastoma: A systematic review and meta-analysis."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "The histopathologic patterns were mostly follicular and plexiform."
    explanation: >-
      Systematic review identifies plexiform as a predominant histopathologic pattern.
genetic:
- name: BRAF
  gene_term:
    preferred_term: BRAF
    term:
      id: hgnc:1097
      label: BRAF
  notes: >-
    Somatic BRAF V600E (p.Val600Glu) missense mutation is the most common driver,
    with a pooled prevalence of ~70% across 833 cases. It causes constitutive,
    ligand-independent MAPK signaling and is enriched in mandibular tumors and younger
    patients. BRAF V600E status guides eligibility for BRAF-inhibitor therapy.
  evidence:
  - reference: PMID:36428683
    reference_title: "BRAF V600E Mutation in Ameloblastoma: A Systematic Review and Meta-Analysis."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "The discovery that ameloblastoma has a high mutation incidence of BRAF V600E may enable a better investigation of pathophysiology."
    explanation: >-
      Establishes BRAF V600E as the high-frequency somatic driver of ameloblastoma.
- name: SMO
  gene_term:
    preferred_term: SMO
    term:
      id: hgnc:11119
      label: SMO
  notes: >-
    Activating SMO mutations (most commonly SMO-L412F, less commonly SMO-W535L) drive
    constitutive Hedgehog signaling and are more typical of maxillary ameloblastomas.
  evidence:
  - reference: PMID:35689405
    reference_title: "New Ameloblastoma Cell Lines Enable Preclinical Study of Targeted Therapies."
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: "AB cells with activating SMO-L412F mutation (Hedgehog pathway) are insensitive to vismodegib; however, a distinct small-molecule SMO inhibitor, BMS-833923, significantly reduces both downstream Hedgehog signaling and tumor cell viability."
    explanation: >-
      Confirms the activating SMO-L412F mutation and its Hedgehog-pathway consequences
      in ameloblastoma cells.
- name: FGFR2
  gene_term:
    preferred_term: FGFR2
    term:
      id: hgnc:3689
      label: FGFR2
  notes: >-
    Activating FGFR2 mutations act as an upstream receptor-tyrosine-kinase driver of
    MAPK signaling in a subset of ameloblastomas.
  evidence:
  - reference: PMID:35689405
    reference_title: "New Ameloblastoma Cell Lines Enable Preclinical Study of Targeted Therapies."
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: "their genomic characterization that reveals driver mutations in FGFR2, KRAS, NRAS, BRAF, PIK3CA, and SMO."
    explanation: >-
      Genomic characterization of ameloblastoma cell lines identifies FGFR2 among
      the driver mutations.
- name: KRAS
  gene_term:
    preferred_term: KRAS
    term:
      id: hgnc:6407
      label: KRAS
  notes: >-
    Activating KRAS mutations (e.g., codon 12) drive constitutive RAS-MAPK signaling;
    KRAS/NRAS-mutant cells are exquisitely sensitive to MEK inhibition.
  evidence:
  - reference: PMID:35689405
    reference_title: "New Ameloblastoma Cell Lines Enable Preclinical Study of Targeted Therapies."
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: "AB cells with KRAS or NRAS mutation (MAPK pathway) are exquisitely sensitive to MEK inhibition, which propels ameloblast differentiation."
    explanation: >-
      Confirms KRAS as a MAPK-pathway driver and establishes MEK-inhibitor sensitivity.
- name: NRAS
  gene_term:
    preferred_term: NRAS
    term:
      id: hgnc:7989
      label: NRAS
  notes: >-
    Activating NRAS mutations drive constitutive RAS-MAPK signaling; NRAS-mutant cells
    respond to MEK inhibition.
  evidence:
  - reference: PMID:35689405
    reference_title: "New Ameloblastoma Cell Lines Enable Preclinical Study of Targeted Therapies."
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: "AB cells with KRAS or NRAS mutation (MAPK pathway) are exquisitely sensitive to MEK inhibition, which propels ameloblast differentiation."
    explanation: >-
      Confirms NRAS as a MAPK-pathway driver in ameloblastoma.
- name: HRAS
  gene_term:
    preferred_term: HRAS
    term:
      id: hgnc:5173
      label: HRAS
  notes: >-
    Activating HRAS mutations are a less common RAS-family MAPK-pathway driver in
    ameloblastoma.
  evidence:
  - reference: PMID:35689405
    reference_title: "New Ameloblastoma Cell Lines Enable Preclinical Study of Targeted Therapies."
    supports: PARTIAL
    evidence_source: IN_VITRO
    snippet: "Recent genomic studies of AB have uncovered oncogenic driver mutations, including in the mitogen-activated protein kinase (MAPK) and Hedgehog signaling pathways."
    explanation: >-
      HRAS is part of the RAS family of MAPK-pathway drivers uncovered in genomic
      studies of ameloblastoma.
treatments:
- name: Radical Surgical Resection
  description: >-
    Segmental mandibulectomy or maxillectomy with 1.5-2 cm safety margins (en bloc
    resection), typically with immediate reconstruction (e.g., vascularized fibula
    free flap). Radical resection achieves the lowest recurrence rate (~11%) but
    carries significant functional and aesthetic morbidity.
  treatment_term:
    preferred_term: surgical procedure
    term:
      id: MAXO:0000004
      label: surgical procedure
  evidence:
  - reference: PMID:38927880
    reference_title: "Anti-MAPK Targeted Therapy for Ameloblastoma: Case Report with a Systematic Review."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Ameloblastoma, a benign yet aggressive odontogenic tumor known for its recurrence and the severe morbidity from radical surgeries, may benefit from advancements in targeted therapy."
    explanation: >-
      Establishes radical surgery as the standard treatment and the source of severe
      morbidity that motivates targeted alternatives.
- name: Conservative Surgical Resection
  description: >-
    Enucleation, curettage, or marginal resection for smaller lesions, unicystic
    luminal/intraluminal types, and younger patients. Offers better functional and
    aesthetic outcomes but carries a substantially higher recurrence rate (up to 65%).
  treatment_term:
    preferred_term: surgical procedure
    term:
      id: MAXO:0000004
      label: surgical procedure
  evidence:
  - reference: PMID:38021761
    reference_title: "The Role of BRAF Inhibitors in the Management of Ameloblastoma: A Literature Review."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "The ameloblastoma treatment plan is determined by the tumor's size, anatomical location, histologic variant, and anatomical involvement."
    explanation: >-
      Supports the size/location/variant-driven choice between conservative and
      radical surgical approaches.
- name: BRAF/MEK Inhibitor Targeted Therapy
  description: >-
    Pharmacotherapy targeting the MAPK pathway in BRAF V600E-mutant ameloblastoma,
    typically dabrafenib (BRAF inhibitor) combined with trametinib (MEK inhibitor),
    or vemurafenib. Used as neoadjuvant therapy to shrink tumors before conservative
    surgery, and in recurrent, metastatic, or unresectable disease. A systematic
    review of 23 patients reported that nearly all responded, with 4 complete
    radiologic remissions.
  treatment_term:
    preferred_term: Pharmacotherapy
    term:
      id: NCIT:C15986
      label: Pharmacotherapy
    therapeutic_agent:
    - preferred_term: dabrafenib
      term:
        id: CHEBI:75045
        label: dabrafenib
    - preferred_term: trametinib
      term:
        id: CHEBI:75998
        label: trametinib
    - preferred_term: vemurafenib
      term:
        id: CHEBI:63637
        label: vemurafenib
  therapeutic_modality: SMALL_MOLECULE
  target_mechanisms:
  - target: BRAF V600E and MAPK-Pathway Activating Mutation
  evidence:
  - reference: PMID:38927880
    reference_title: "Anti-MAPK Targeted Therapy for Ameloblastoma: Case Report with a Systematic Review."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "covering 23 patients treated with MAPK inhibitor therapies. The results were promising as nearly all patients showed a positive treatment response, with four achieving complete radiological remission and others showing substantial reductions in primary, recurrent, and metastatic ameloblastoma sizes."
    explanation: >-
      Systematic review evidence that anti-MAPK targeted therapy produces responses,
      including complete remissions, in ameloblastoma.
  - reference: PMID:37115331
    reference_title: "BRAF inhibitors in BRAF V600E-mutated ameloblastoma: systematic review of rare cases in the literature."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "These included seven case reports with nine patients who underwent monotherapy with Dabrafenib or Vemurafenib or combination therapy with Dabrafenib and Trametinib."
    explanation: >-
      Documents the BRAF/MEK inhibitor regimens (dabrafenib, vemurafenib, dabrafenib
      plus trametinib) used in BRAF V600E-mutant ameloblastoma.
