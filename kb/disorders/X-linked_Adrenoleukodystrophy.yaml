  - reference: PMID:24480483
    reference_title: "X-linked adrenoleukodystrophy in women: a cross-sectional cohort study."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Virtually all (44/45, 98%) X-linked adrenoleukodystrophy carriers had increased very long-chain fatty acids in plasma and/or fibroblasts, and/or decreased very long-chain fatty acids beta-oxidation in fibroblasts."
    explanation: Female-carrier cohort confirms that elevated VLCFAs remain a robust biochemical marker outside the classic male presentation.
