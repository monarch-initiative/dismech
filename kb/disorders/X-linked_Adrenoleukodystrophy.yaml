    reference_title: "Pathophysiology of X-linked adrenoleukodystrophy."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Cell autonomous processes such as oxidative stress and energy shortage in axons as well as non-cell autonomous processes involving axon-glial interactions seem pertinent to the dying-back axonopathy."
    explanation: This review places oxidative stress upstream of the AMN axonopathy branch in human disease.
  - reference: PMID:21786300
    reference_title: "Antioxidants halt axonal degeneration in a mouse model of X-adrenoleukodystrophy."
    supports: SUPPORT
    evidence_source: MODEL_ORGANISM
    snippet: "This conceptual proof of oxidative stress as a major disease-driving factor in X-AMN warrants translation into clinical trials for X-AMN, and invites assessment of antioxidant strategies in axonopathies in which oxidative damage might be a contributing factor."
    explanation: Model-organism evidence supports oxidative stress as a mechanistically relevant driver of the AMN branch.
