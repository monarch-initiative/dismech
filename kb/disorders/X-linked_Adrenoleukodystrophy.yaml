histopathology:
- name: Lipid-laden pro-inflammatory macrophages in CALD lesions
  subtype: Cerebral ALD
  description: >-
    Post-mortem cerebral lesions contain enlarged lipid-laden macrophages with a
    strongly pro-inflammatory immunophenotype, consistent with failed
    inflammatory resolution.
  evidence:
  - reference: PMID:29860501
    reference_title: "Impaired plasticity of macrophages in X-linked adrenoleukodystrophy."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Immunohistochemistry on post-mortem cerebral adrenoleukodystrophy lesions reflected the activation pattern by prominent presence of enlarged lipid-laden macrophages strongly positive for the pro-inflammatory marker co-stimulatory molecule CD86."
    explanation: Direct human neuropathology evidence for the macrophage-rich inflammatory lesion structure of CALD.
- name: Mild myelin loss with microglial activation in AMN spinal cord
  subtype: Adrenomyeloneuropathy
  description: >-
    Adult AMN spinal cord shows mild myelin loss commensurate with axonal loss
    together with prominent microglial activation.
  evidence:
  - reference: PMID:29059709
    reference_title: "Microglial dysfunction as a key pathological change in adrenomyeloneuropathy."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Luxol fast blue (LFB) staining showed reduced myelin staining in the dorsal column of AMN spinal cord, demonstrating mild myelin loss commensurate with axonal loss."
    explanation: Human AMN spinal cord pathology directly demonstrates structural myelin loss accompanying axonal degeneration.
  - reference: PMID:29059709
    reference_title: "Microglial dysfunction as a key pathological change in adrenomyeloneuropathy."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Dramatic increase of CD68 and IBA1 staining in AMN spinal cord was also observed compared to the control group (Fig 8B), suggesting activation of microglia in the spinal cord of AMN."
    explanation: Human spinal-cord histopathology supports microglial activation as a dominant lesion feature in AMN.
