  inheritance:
  - name: X-linked inheritance
    description: >-
      X-ALD is best framed as X-linked rather than forced into a purely
      recessive model, because hemizygous males are usually more severely
      affected but heterozygous women frequently develop later neurologic
      disease.
    evidence:
    - reference: PMID:15316978
      reference_title: "Inheritance of most X-linked traits is not dominant or recessive, just X-linked."
      supports: SUPPORT
      evidence_source: HUMAN_CLINICAL
      snippet: "many X-linked disorders such as adrenoleukodystrophy, fragile X syndrome, and ornithine transcarbamylase deficiency do not fit these rules."
      explanation: This inheritance review explicitly identifies adrenoleukodystrophy as an example that is better described broadly as X-linked.
    - reference: PMID:15316978
      reference_title: "Inheritance of most X-linked traits is not dominant or recessive, just X-linked."
      supports: SUPPORT
      evidence_source: HUMAN_CLINICAL
      snippet: "We recommend that use of the terms X-linked recessive and dominant be discontinued, and that all such disorders be simply described as following \"X-linked\" inheritance."
      explanation: Supports using the broader HPO inheritance term for X-ALD.
  features: >-
    ABCD1 pathogenic variants underlie the full X-ALD spectrum without a stable
    general genotype-phenotype correlation. The same family can show AMN,
    cerebral ALD, adrenal-predominant disease, or later-onset female myelopathy.
