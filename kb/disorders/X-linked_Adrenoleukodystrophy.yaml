    reference_title: "Pathophysiology of X-linked adrenoleukodystrophy."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "There is no general genotype-phenotype correlation in X-ALD."
    explanation: Major review directly states the lack of a general genotype-phenotype correlation.
  - reference: PMID:10190819
    reference_title: "Mutational analysis and genotype-phenotype correlation of 29 unrelated Japanese patients with X-linked adrenoleukodystrophy."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "There are no obvious correlations between the phenotypes of patients with ALD and their genotypes, suggesting that other genetic or environmental factors modify the phenotypic expressions of ALD."
    explanation: Classic cohort study independently supports the absence of robust genotype-phenotype correlation.
  - reference: PMID:24480483
