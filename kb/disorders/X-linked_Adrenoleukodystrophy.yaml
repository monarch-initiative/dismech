name: X-linked adrenoleukodystrophy
creation_date: "2026-04-13T01:07:40Z"
updated_date: "2026-04-13T01:31:25Z"
category: Mendelian
synonyms:
- X-ALD
- adrenoleukodystrophy
description: >-
  X-linked adrenoleukodystrophy (X-ALD) is an ABCD1-related peroxisomal disease
  spectrum in which defective peroxisomal import and degradation of very
  long-chain fatty acids causes systemic VLCFA accumulation. The disease-level
  term is used here because the core biochemical defect is shared across the
  spectrum, while the main mechanistic branches diverge into slowly progressive
  spinal cord axonopathy/adrenomyeloneuropathy, adrenal insufficiency, and a
  risk of cerebral inflammatory demyelination. Heterozygous women are not
  asymptomatic by default and often develop later AMN-like myelopathy and/or
  peripheral neuropathy.
disease_term:
  preferred_term: X-linked adrenoleukodystrophy
  term:
    id: MONDO:0018544
    label: adrenoleukodystrophy
parents:
- Peroxisomal Disorder
- Leukodystrophy
notes: >-
  This entry is intentionally curated at the disease-spectrum level using
  MONDO:0018544. Cerebral ALD and adrenomyeloneuropathy are represented as
  explicit subtypes because they have distinct downstream mechanisms despite a
  shared ABCD1/VLCFA biochemical core. Addison-only presentations are captured
  within progression and phenotype content rather than as a separate disease
  frame here.
prevalence:
- population: Combined hemizygous males and heterozygous females
  percentage: 1 in 17,000
  notes: >-
    Population studies cited in recent endocrine review literature place the
    birth prevalence of X-ALD at about 1 in 17,000 when both affected males and
    heterozygous females are counted.
  evidence:
  - reference: PMID:38034003
    reference_title: "X-linked adrenoleukodystrophy and primary adrenal insufficiency."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "According to population studies, X-ALD has an estimated birth prevalence of 1 in 17.000 subjects (considering both hemizygous males and heterozygous females), and there is no evidence that this prevalence varies among regions or ethnic groups."
    explanation: Recent review explicitly states the disease birth prevalence and clarifies that the estimate includes both affected males and heterozygous females.
has_subtypes:
- name: Cerebral ALD
  subtype_term:
    preferred_term: X-linked cerebral adrenoleukodystrophy
    term:
      id: MONDO:0010247
      label: X-linked cerebral adrenoleukodystrophy
  description: >-
    Inflammatory cerebral branch characterized by rapidly progressive cerebral
    demyelination, typically after a clinically silent conversion phase.
  evidence:
  - reference: PMID:24316281
    reference_title: "Pathophysiology of X-linked adrenoleukodystrophy."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "In about 60% of male X-ALD patients, either in childhood (35-40%) or in adulthood (20%), an initial, clinically silent, myelin destabilization results in conversion to a devastating, rapidly progressive form of cerebral inflammatory demyelination."
    explanation: This review defines the cerebral inflammatory branch as a major subtype within the X-ALD spectrum.
- name: Adrenomyeloneuropathy
  subtype_term:
    preferred_term: adrenomyeloneuropathy
    term:
      id: MONDO:0015339
      label: adrenomyeloneuropathy
  description: >-
    Default adult neurodegenerative branch dominated by slowly progressive
    spinal cord axonopathy with associated myelopathy and peripheral neuropathy.
  evidence:
  - reference: PMID:24316281
    reference_title: "Pathophysiology of X-linked adrenoleukodystrophy."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "The default manifestation of mutations in ABCD1 is adrenomyeloneuropathy, a slowly progressive dying-back axonopathy affecting both ascending and descending spinal cord tracts as well as in some cases, a peripheral neuropathy."
    explanation: This review identifies adrenomyeloneuropathy as the default manifestation of ABCD1 mutations and supports using it as a major subtype.
progression:
- phase: Childhood adrenal vulnerability
  notes: >-
    Adrenal insufficiency often appears early, with risk highest in childhood
    and a median time to adrenal insufficiency of about 14 years in male cohorts.
  evidence:
  - reference: PMID:30252065
    reference_title: "The Natural History of Adrenal Insufficiency in X-Linked Adrenoleukodystrophy: An International Collaboration."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Median time until adrenal insufficiency was 14 years (95% CI, 9.70 to 18.30 years)."
    explanation: Provides age-dependent timing for one of the earliest major clinical branches of X-ALD.
- phase: Adult myelopathy and peripheral neuropathy
  notes: >-
    Progressive spinal cord disease and peripheral neuropathy dominate the adult
    disease course in most affected males and in many heterozygous women.
  evidence:
  - reference: PMID:25115486
    reference_title: "X-linked adrenoleukodystrophy: pathogenesis and treatment."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Virtually all male X-ALD patients develop adrenocortical insufficiency in childhood and progressive myelopathy and peripheral neuropathy in adulthood."
    explanation: Summarizes the canonical transition from childhood adrenal disease to adult spinal/peripheral nerve disease in males.
  - reference: PMID:25115486
    reference_title: "X-linked adrenoleukodystrophy: pathogenesis and treatment."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Female patients also develop progressive myelopathy and peripheral neuropathy, but generally at a later age than males."
    explanation: Confirms that later-onset AMN-like progression also affects heterozygous women.
- phase: Conversion to cerebral inflammatory demyelination
  notes: >-
    A substantial fraction of males convert from the shared biochemical defect
    to an inflammatory cerebral phenotype with rapidly progressive neurologic
    decline.
  evidence:
  - reference: PMID:24316281
    reference_title: "Pathophysiology of X-linked adrenoleukodystrophy."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "In about 60% of male X-ALD patients, either in childhood (35-40%) or in adulthood (20%), an initial, clinically silent, myelin destabilization results in conversion to a devastating, rapidly progressive form of cerebral inflammatory demyelination."
    explanation: Defines the major cerebral conversion event that separates CALD from the default AMN course.
pathophysiology:
- name: ABCD1-mediated peroxisomal VLCFA import failure
  description: >-
    Loss of ABCD1 function impairs import of CoA-activated very long-chain fatty
    acids into peroxisomes, reducing their peroxisomal degradation.
  genes:
  - preferred_term: ABCD1
    term:
      id: hgnc:61
      label: ABCD1
  biological_processes:
  - preferred_term: long-chain fatty acid import into peroxisome
    modifier: DECREASED
    term:
      id: GO:0015910
      label: long-chain fatty acid import into peroxisome
  - preferred_term: very long-chain fatty acid beta-oxidation
    modifier: DECREASED
    term:
      id: GO:0140493
      label: very long-chain fatty acid beta-oxidation
  cellular_components:
  - preferred_term: peroxisome
