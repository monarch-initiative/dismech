  evidence:
  - reference: PMID:38034003
    reference_title: "X-linked adrenoleukodystrophy and primary adrenal insufficiency."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "ALDP deficiency results in a defective peroxisomal β-oxidation of very long chain fatty acids (VLCFA). As a consequence of this metabolic abnormality, VLCFAs accumulate in nervous system (brain white matter and spinal cord), testis and adrenal cortex."
    explanation: Human disease review explicitly links defective peroxisomal β-oxidation to VLCFA accumulation in the major affected tissues.
  - reference: PMID:25115486
    reference_title: "X-linked adrenoleukodystrophy: pathogenesis and treatment."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "All patients have mutations in the ABCD1 gene and accumulate very long chain fatty acids in all tissues."
    explanation: Confirms that VLCFA accumulation is shared across the clinical spectrum.
  downstream:
  - target: Oxidative stress and mitochondrial dysfunction
    description: Excess VLCFA contributes to oxidative injury and mitochondrial stress in axons and other vulnerable cells.
    causal_link_type: DIRECT
  - target: Impaired macrophage plasticity
    description: VLCFA-related ABCD1 deficiency is linked to abnormal innate immune-cell polarization.
    causal_link_type: DIRECT
  - target: Adrenal cortical dysfunction
    description: VLCFA accumulation in adrenal cortex is associated with defective ACTH responsiveness and adrenal failure.
    causal_link_type: DIRECT
- name: Oxidative stress and mitochondrial dysfunction
  description: >-
    Oxidative stress is an early, disease-driving component of the AMN/myelopathy
    branch and is linked to mitochondrial failure in ABCD1-deficient cells and
    tissues.
  subtypes:
  - Adrenomyeloneuropathy
