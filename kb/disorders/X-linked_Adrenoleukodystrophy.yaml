  evidence:
  - reference: PMID:24316281
    reference_title: "Pathophysiology of X-linked adrenoleukodystrophy."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "ABCD1 transports CoA-activated very long-chain fatty acids from the cytosol into the peroxisome for degradation."
    explanation: This review states the core upstream biochemical function lost in X-ALD.
  - reference: PMID:23671276
    reference_title: "Impaired very long-chain acyl-CoA β-oxidation in human X-linked adrenoleukodystrophy fibroblasts is a direct consequence of ABCD1 transporter dysfunction."
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: "the β-oxidation defect in X-ALD is directly caused by ABCD1 dysfunction as blocking ABCD1 function with a specific antibody reduced β-oxidation to levels observed in X-ALD fibroblasts."
    explanation: Human fibroblast experiments directly tie ABCD1 dysfunction to impaired peroxisomal β-oxidation.
