  - reference: PMID:36589157
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Six-month-old patient presented with cholestatic liver disease,
      macrocytic anemia, developmental delay, generalized hypotonia,
