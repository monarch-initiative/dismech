  preferred_term: adenosine kinase deficiency
  term:
    id: MONDO:0100255
    label: adenosine kinase deficiency
parents:
- Inborn error of purine metabolism
- Inborn error of metabolism
synonyms:
- hypermethioninemia due to adenosine kinase deficiency
- ADK deficiency
inheritance:
