pathophysiology:
- name: Lower Motor Neuron and Anterior Horn Degeneration
  description: >-
    The core lesion of MMND is degeneration of lower motor neurons in the spinal
    anterior horn, producing wasting and weakness of the limbs (predominantly distal)
    on a background of young onset. Electromyography and nerve conduction studies in
    MMND patients support lower-motor-neuron involvement, and the clinical picture has
    features of amyotrophic lateral sclerosis but with a much younger age of onset.
  cell_types:
  - preferred_term: lower motor neuron
    term:
      id: CL:0008039
      label: lower motor neuron
  biological_processes:
