differential_diagnoses:
- name: Amyotrophic lateral sclerosis
  description: >-
    ALS shares motor neuron degeneration but typically has a much later age of onset and
    lacks the characteristic sensorineural hearing loss; MMND resembles ALS clinically
    but presents in the young with auditory neuropathy.
  disease_term:
    preferred_term: amyotrophic lateral sclerosis
    term:
      id: MONDO:0004976
      label: amyotrophic lateral sclerosis
- name: Brown-Vialetto-Van Laere syndrome
  description: >-
    BVVL is a childhood motor neuron disease with bulbar palsy and sensorineural hearing
    loss that overlaps phenotypically with MMND but is caused by riboflavin transporter
    (SLC52A2/SLC52A3) defects, which are absent in MMND.
  disease_term:
    preferred_term: Brown-Vialetto-van Laere syndrome 1
    term:
      id: MONDO:0024537
      label: Brown-Vialetto-van Laere syndrome 1
notes: >-
  MMND is rare (fewer than ~200 reported cases, predominantly from Southern India). Mean
  age of onset is in the mid-teens. A familial form (FMMND) is recognized alongside the
  predominantly sporadic disease. The etiology is unknown; no specific causative gene is
  asserted in this entry because none is established in the literature reviewed. The
  comparatively benign/slowly progressive course described in early reports contrasts
  with occasional reports of more rapid deterioration, reflecting clinical heterogeneity.
