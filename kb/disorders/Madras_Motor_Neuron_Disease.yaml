- name: Cochlear and Auditory Pathway Involvement
  description: >-
    A hallmark and near-universal feature of MMND is sensorineural hearing loss; all
    patients in the largest series had clinical and/or audiological evidence of hearing
    impairment, and the deficit has been characterized as an auditory neuropathy.
    Impaired hearing is frequently among the predominant initial manifestations.
