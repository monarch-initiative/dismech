- name: Unknown Etiology with Negative Riboflavin-Transporter and C9ORF72 Genetics
  description: >-
    The cause of MMND remains unknown. Despite phenotypic overlap with
    Brown-Vialetto-Van Laere syndrome (BVVL), sequencing of the riboflavin transporter
    genes SLC52A1, SLC52A2 and SLC52A3 in MMND probands and sporadic cases identified no
    defects, and C9ORF72 repeat expansions were absent (all repeats <10), establishing
    MMND as a distinct clinico-genetic subgroup. The authors propose that MMND may share
    a common defective biological pathway with BVVL arising from a combination of genetic
    and environmental factors. No specific causative gene is asserted here.
  evidence:
  - reference: PMID:24139842
    reference_title: "Madras motor neuron disease (MMND) is distinct from the riboflavin transporter genetic defects that cause Brown-Vialetto-Van Laere syndrome."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "We sequenced the SLC52A1, SLC52A2 and SLC52A3 in affected probands and sporadic individuals from the MMND series as well as the C9ORF72 expansion. No genetic defects were identified and the C9ORF72 repeats were all less than 10."
    explanation: >-
      Riboflavin transporter genes and C9ORF72 were assessed and found negative in MMND,
      supporting an as-yet-unidentified etiology.
  - reference: PMID:24139842
    reference_title: "Madras motor neuron disease (MMND) is distinct from the riboflavin transporter genetic defects that cause Brown-Vialetto-Van Laere syndrome."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "these diseases are likely to share a common defective biological pathway that may be a combination of genetic and environmental factors"
    explanation: >-
      The authors hypothesize a shared defective biological pathway with BVVL driven by
      combined genetic and environmental factors.
