name: Madras Motor Neuron Disease
creation_date: "2026-06-26T00:00:00Z"
description: >-
  Madras motor neuron disease (MMND) is a geographically distinctive, predominantly
  sporadic juvenile/young-adult-onset motor neuron disease reported chiefly from
  Southern India (originally described in patients from Madras, now Chennai). It is
  characterized by onset in the young, atrophy and weakness of the limbs from
  lower-motor-neuron (anterior horn) degeneration, multiple lower cranial nerve palsies
  (notably the seventh and ninth-to-twelfth, producing facial weakness, tongue wasting
  and fasciculation, dysarthria and dysphagia), and a hallmark sensorineural hearing
  loss (auditory neuropathy); a subset (the MMND variant, MMNDV) additionally shows
  optic atrophy and cerebellar involvement. Compared with amyotrophic lateral sclerosis
  it has a much younger age of onset and a comparatively benign, slowly progressive
  course, though clinical heterogeneity exists. The condition is mostly sporadic, with a
  recognized familial form (FMMND). The etiology remains unknown: sequencing of the
  riboflavin transporter genes SLC52A1/SLC52A2/SLC52A3 (the cause of the
  phenotypically overlapping Brown-Vialetto-Van Laere syndrome) and assessment of the
  C9ORF72 expansion have been negative in MMND series, distinguishing it as a separate
  clinico-genetic entity whose cause may involve a combination of genetic and
  environmental factors. Management is supportive and symptomatic; there is no
  disease-modifying therapy.
