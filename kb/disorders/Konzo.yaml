pathophysiology:
- name: Cyanogenic Glucoside (Linamarin) and Cyanide Exposure from Bitter Cassava
  description: >-
    The initiating exposure of konzo is high dietary intake of the cyanogenic
    glucoside linamarin from insufficiently processed bitter cassava roots. During
    digestion linamarin is hydrolysed by the enzyme linamarase to cyanohydrins,
    which break down to toxic cyanide, so a monotonous diet of poorly processed
    bitter cassava delivers a high chronic cyanide load. Epidemiological studies
    associate urinary linamarin and its cyanide metabolite thiocyanate with the
    occurrence of konzo, and outbreaks cluster geographically and seasonally with
    high cyanide exposure.
  chemical_entities:
  - preferred_term: linamarin
    term:
      id: CHEBI:16441
      label: linamarin
  - preferred_term: cyanide
    term:
      id: CHEBI:17514
      label: cyanide
  biological_processes:
  - preferred_term: cyanide metabolic process
    modifier: INCREASED
    term:
      id: GO:0019499
      label: cyanide metabolic process
  evidence:
  - reference: PMID:20510334
    reference_title: "Uptake of wetting method in Africa to reduce cyanide poisoning and konzo from cassava."
    supports: SUPPORT
    evidence_source: OTHER
    snippet: "Cassava contains cyanogenic glucosides which are hydrolysed by an enzyme linamarase to produce cyanohydrins which breakdown to toxic cyanide."
    explanation: "Defines the linamarin -> cyanohydrin -> cyanide pathway by which bitter cassava delivers a dietary cyanide load."
  - reference: PMID:9438470
    reference_title: "Geographical and seasonal association between linamarin and cyanide exposure from cassava and the upper motor neurone disease konzo in former Zaire."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "urinary linamarin, the cyanogenic glucoside and source of cyanide in cassava, was more closely associated with the occurrence of konzo"
    explanation: "Field study links urinary linamarin (the cassava cyanogen) to the occurrence of konzo, anchoring linamarin/cyanide as the initiating exposure."
  downstream:
  - target: Impaired Cyanide Detoxification with Low Sulfur Amino Acid Intake
    description: The ingested cyanide load must be detoxified, a process dependent on dietary sulfur amino acids.
- name: Impaired Cyanide Detoxification with Low Sulfur Amino Acid Intake
  description: >-
    Cyanide is normally detoxified to thiocyanate by sulfurtransferase enzymes that
    require a sulfur donor supplied by dietary sulfur-containing amino acids
    (methionine, cysteine). In konzo-affected populations the bitter-cassava diet is
    protein-poor and deficient in sulfur amino acids, so a high cyanide intake is
    paired with low capacity to detoxify it. Children with konzo have measurably
    lower cyanide detoxification rates than controls, and worse nutritional status
    (stunting/wasting) distinguishes konzo patients from equally cyanide-exposed
    healthy individuals, implicating impaired detoxification and malnutrition as the
    decisive co-factors.
  biological_processes:
  - preferred_term: sulfur amino acid metabolic process
    modifier: DECREASED
    term:
      id: GO:0000096
      label: sulfur amino acid metabolic process
  - preferred_term: detoxification
    modifier: DECREASED
    term:
      id: GO:0098754
      label: detoxification
  evidence:
  - reference: PMID:20619859
    reference_title: "Etiology of Konzo, epidemic spastic paraparesis associated with cyanogenic glycosides in cassava: role of thiamine deficiency?"
    supports: SUPPORT
    evidence_source: OTHER
    snippet: "High cyanide consumption with low dietary sulfur intake due to almost exclusive consumption of insufficiently processed bitter cassava roots was proposed as the cause of Konzo"
    explanation: "States the core toxico-nutritional mechanism: high cyanide consumption with low dietary sulfur intake from bitter cassava."
  - reference: PMID:27246648
    reference_title: "Lower sulfurtransferase detoxification rates of cyanide in konzo-A tropical spastic paralysis linked to cassava cyanogenic poisoning."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "the odds of developing konzo was reduced by 63%"
    explanation: "Case-control study shows higher cyanide detoxification rate is protective, supporting impaired detoxification as a determinant of konzo."
  - reference: PMID:34444788
    reference_title: "Revisiting Konzo Risk Factors in Three Areas Differently Affected by Spastic Paraparesis in Eastern Democratic Republic of the Congo Discloses a Prominent Role of the Nutritional Status-A Comparative Cross-Sectional Study."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "The only factor differentiating konzo patients from healthy individuals exposed to cyanide poisoning appeared to be their worse nutritional status."
    explanation: "Protein malnutrition (limiting sulfur amino acid supply for detoxification) is the factor distinguishing konzo patients from equally cyanide-exposed controls."
  downstream:
  - target: Upper Motor Neuron and Corticospinal Tract Injury
    description: Inadequately detoxified cyanide and its metabolites injure upper motor neurons via excitotoxic and oxidative mechanisms.
- name: Upper Motor Neuron and Corticospinal Tract Injury
  description: >-
    Inadequately detoxified cyanide and its metabolites selectively injure upper
    motor neurons and their corticospinal (pyramidal) tract axons, with sparing of
    lower motor neurons, sensory pathways, and sphincter function. Proposed effector
    mechanisms include excitotoxicity and oxidative stress: cyanide is a
    mitochondrial toxin, and cassava-cyanide metabolites (thiocyanate, cyanate)
    act on neurons, with cyanate inducing reactive oxygen species, caspase
    activation, and depolarizing currents through ionotropic glutamate receptors in
    spinal cord neurons.
