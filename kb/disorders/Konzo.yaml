environmental:
- name: Insufficiently processed bitter cassava overconsumption
  description: >-
    A monotonous diet dominated by insufficiently processed bitter cassava
    (Manihot esculenta) is the cause of konzo. Short or shortcut processing leaves
    large amounts of the cyanogen linamarin in the consumed cassava, delivering a
    high dietary cyanide load. Outbreaks occur in cassava-dependent regions of
    sub-Saharan Africa (Democratic Republic of the Congo, Mozambique, Tanzania,
    Central African Republic, Angola, Cameroon, Zambia), chiefly among children and
    women of childbearing age.
  evidence:
  - reference: PMID:20619859
    reference_title: "Etiology of Konzo, epidemic spastic paraparesis associated with cyanogenic glycosides in cassava: role of thiamine deficiency?"
    supports: SUPPORT
    evidence_source: OTHER
    snippet: "invariably associated with monotonous consumption of inadequately processed bitter cassava roots (Manihot esculenta) with very minimal protein supplementation"
    explanation: "Konzo is invariably associated with monotonous consumption of inadequately processed bitter cassava with minimal protein."
  - reference: PMID:29981837
    reference_title: "Konzo: a distinct neurological disease associated with food (cassava) cyanogenic poisoning."
    supports: SUPPORT
    evidence_source: OTHER
    snippet: "an association between outbreaks of the disease and chronic dietary reliance on insufficiently processed cyanogenic cassava"
    explanation: "Outbreaks are associated with chronic dietary reliance on insufficiently processed cyanogenic cassava."
- name: Protein malnutrition with low sulfur amino acid intake
  description: >-
    A protein-poor diet deficient in sulfur-containing amino acids accompanies the
    bitter-cassava diet and limits the substrate available for cyanide
    detoxification. Worse nutritional status (wasting and stunting) is the factor
    that distinguishes konzo patients from equally cyanide-exposed healthy controls.
  evidence:
  - reference: PMID:34444788
    reference_title: "Revisiting Konzo Risk Factors in Three Areas Differently Affected by Spastic Paraparesis in Eastern Democratic Republic of the Congo Discloses a Prominent Role of the Nutritional Status-A Comparative Cross-Sectional Study."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "konzo patients had a high prevalence of both wasting (54.5%) and stunting (72.7%)"
    explanation: "Konzo patients show a high prevalence of wasting and stunting, indicating protein-energy malnutrition as an environmental co-factor."
  - reference: PMID:34444788
    reference_title: "Revisiting Konzo Risk Factors in Three Areas Differently Affected by Spastic Paraparesis in Eastern Democratic Republic of the Congo Discloses a Prominent Role of the Nutritional Status-A Comparative Cross-Sectional Study."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "malnutrition may be a key factor for the disease occurrence"
    explanation: "Malnutrition is identified as a key factor for konzo occurrence alongside cyanide poisoning."
- name: Drought and food shortage
  description: >-
    Epidemic outbreaks cluster during drought-provoked agricultural and social
    crises that force populations onto a diet of insufficiently processed bitter
    cassava, with shortcuts in processing that increase dietary cyanide exposure.
  evidence:
  - reference: PMID:12376882
    reference_title: "[Endemic spastic paraperesis (konzo)]."
    supports: SUPPORT
    evidence_source: OTHER
    snippet: "Epidemic outbreaks in subtropical and tropical regions are associated with drought-provoked agricultural and social crises rendering populations dependent on a diet of insufficiently processed bitter cassava."
    explanation: "Drought-provoked crises drive dependence on insufficiently processed bitter cassava, precipitating epidemic outbreaks."
treatments:
- name: Cassava Detoxification by the Wetting Method
  description: >-
    The wetting method removes residual cyanogens from cassava flour: the flour is
    wetted, spread in a thin layer in the shade (or sun) for a few hours, and used
    the same day, reducing total cyanide content several-fold. Community uptake has
    prevented new konzo cases and lowered urinary thiocyanate, making it the
    principal preventive intervention where bitter cassava remains a staple.
  treatment_term:
    preferred_term: dietary intervention
    term:
      id: MAXO:0000088
      label: dietary intervention
  evidence:
  - reference: PMID:22342647
    reference_title: "Control of konzo in DRC using the wetting method on cassava flour."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "No new konzo cases occurred"
    explanation: "A village-wide wetting-method intervention prevented new konzo cases over an 18-month period spanning two dry seasons."
  - reference: PMID:20510334
    reference_title: "Uptake of wetting method in Africa to reduce cyanide poisoning and konzo from cassava."
    supports: SUPPORT
    evidence_source: OTHER
    snippet: "we developed a simple wetting method that reduces the total cyanide content of cassava flour 3-6-fold"
    explanation: "Describes the wetting method that reduces cassava-flour total cyanide content 3-6-fold, the basis of prevention."
- name: Dietary Diversification and Protein Supplementation
  description: >-
    Reducing exclusive reliance on bitter cassava and improving intake of protein
    and sulfur-containing amino acids addresses both arms of konzo pathogenesis
    (cyanide exposure and impaired detoxification).
  treatment_term:
    preferred_term: dietary intervention
    term:
      id: MAXO:0000088
      label: dietary intervention
    dietary_modifications:
    - action: RESTRICT
      description: Reduce reliance on insufficiently processed bitter cassava as the staple food.
    - action: ADD
      description: Increase protein and sulfur-amino-acid intake to support cyanide detoxification.
  evidence:
  - reference: PMID:20619859
    reference_title: "Etiology of Konzo, epidemic spastic paraparesis associated with cyanogenic glycosides in cassava: role of thiamine deficiency?"
    supports: SUPPORT
    evidence_source: OTHER
    snippet: "High cyanide consumption with low dietary sulfur intake due to almost exclusive consumption of insufficiently processed bitter cassava roots was proposed as the cause of Konzo"
    explanation: "Identifies high cyanide intake with low dietary sulfur as the targetable nutritional cause, motivating diversification and protein supplementation."
- name: Supportive and Rehabilitative Care
  description: >-
    There is no cure for established konzo; care is supportive and rehabilitative,
    addressing the permanent motor disability with physiotherapy and assistive
    devices, since prevention is the only means of avoiding the disease.
  treatment_term:
    preferred_term: supportive care
    term:
      id: MAXO:0000950
      label: supportive care
  evidence:
  - reference: PMID:29981837
    reference_title: "Konzo: a distinct neurological disease associated with food (cassava) cyanogenic poisoning."
    supports: SUPPORT
    evidence_source: OTHER
    snippet: "Because there is no cure for Konzo, prevention of the disease remains of paramount importance."
    explanation: "There is no cure for konzo; management is supportive and prevention is paramount."
- name: Physical Therapy and Rehabilitation
  description: >-
    Physiotherapy, stretching, orthoses, and assistive devices to maintain mobility
