diagnosis:
- name: Clinical diagnosis of konzo
  description: >-
    Konzo is a clinical diagnosis based on the syndrome of abrupt-onset, symmetric,
    permanent spastic paraparesis of upper-motor-neuron type (spasticity,
    hyperreflexia, extensor plantar responses, clonus) with sparing of sensation and
    sphincter function, together with a history of sustained insufficiently processed
    bitter cassava consumption in an endemic area. Serological testing excludes
    HTLV-1; there is no confirmatory biomarker, though urinary thiocyanate documents
    cyanide exposure.
  diagnosis_term:
    preferred_term: physical examination
    term:
      id: MAXO:0000527
      label: physical examination
  markers: No confirmatory laboratory biomarker; urinary thiocyanate documents cyanide exposure but is not diagnostic.
  results: >-
    Symmetric upper-motor-neuron signs in the lower limbs with sensory and
    genitourinary sparing, plus a dietary history of insufficiently processed bitter
    cassava; HTLV-1 serology negative.
  evidence:
  - reference: PMID:29981837
    reference_title: "Konzo: a distinct neurological disease associated with food (cassava) cyanogenic poisoning."
    supports: SUPPORT
    evidence_source: OTHER
    snippet: "with no signs of sensory or genitourinary impairments"
    explanation: "The clinical syndrome has no sensory or genitourinary impairment, a key diagnostic feature distinguishing konzo from other myelopathies."
  - reference: PMID:29981837
    reference_title: "Konzo: a distinct neurological disease associated with food (cassava) cyanogenic poisoning."
    supports: SUPPORT
    evidence_source: OTHER
    snippet: "Serological studies have ruled out the role of retroviruses such as the human lymphotropic viruses HIV-I/II or HTLV-I/II."
    explanation: "Serology excludes HTLV-1, supporting the diagnostic distinction from HTLV-1-associated tropical spastic paraparesis."
definitions:
- name: Clinical case definition of konzo
  definition_type: CASE_DEFINITION
  description: >-
    Konzo is defined as an upper motor neuron disease presenting with abrupt-onset,
    symmetric, permanent spastic paraparesis of the lower limbs with sensory and
    genitourinary sparing, caused by chronic dietary cyanide exposure from
    insufficiently processed bitter cassava combined with protein/sulfur-amino-acid
    malnutrition.
  scope: Disease-level clinical case definition for konzo.
  evidence:
  - reference: PMID:33964344
    reference_title: "Konzo risk factors, determinants and etiopathogenesis: What is new? A systematic review."
    supports: SUPPORT
    evidence_source: OTHER
    snippet: "Konzo is a toxico-nutritional upper motor neuron disease causing a spastic paraparesis in schoolchildren and childbearing women in some African countries."
    explanation: "Defines konzo as a toxico-nutritional upper motor neuron disease causing spastic paraparesis, the basis of the case definition."
differential_diagnoses:
- name: Neurolathyrism
  description: >-
    Neurolathyrism is the closest mimic of konzo: an epidemic, abrupt-onset,
    symmetric upper-motor-neuron spastic paraparesis affecting young people during
    food shortages. It is caused by the excitatory amino acid neurotoxin beta-ODAP in
    grass pea (Lathyrus sativus) rather than by cassava-derived cyanide, so dietary
    history is the key discriminator.
  disease_term:
    preferred_term: neurolathyrism
    term:
      id: MONDO:0043339
      label: lathyrism
  distinguishing_features:
  - Causative exposure is grass pea (Lathyrus sativus) beta-ODAP, not cyanogenic bitter cassava.
  - Clinically near-identical upper-motor-neuron spastic paraparesis, so dietary history is the key discriminator.
  evidence:
  - reference: PMID:37620067
    reference_title: "Tropical spastic paraparesis."
    supports: SUPPORT
    evidence_source: OTHER
    snippet: "Other toxic etiologies of TSP include lathyrism and fluorosis."
    explanation: "Lathyrism is listed alongside konzo as a distinct toxic etiology of tropical spastic paraparesis."
- name: Tropical ataxic neuropathy
  description: >-
    Tropical ataxic neuropathy is the other major cassava-associated neurological
    disorder. Unlike konzo's upper-motor-neuron spastic paraparesis, it is
    characterized by sensory polyneuropathy, sensory ataxia, optic atrophy and
    sensorineural deafness, and occurs in elderly individuals.
  distinguishing_features:
  - Sensory polyneuropathy and sensory ataxia, in contrast to konzo's spastic (upper motor neuron) paraparesis with sensory sparing.
  - Occurs in elderly individuals, whereas konzo predominates in children and young women.
  evidence:
  - reference: PMID:21327546
    reference_title: "Neurological disorders associated with cassava diet: a review of putative etiological mechanisms."
    supports: SUPPORT
    evidence_source: OTHER
    snippet: "TAN is characterized by sensory polyneuropathy, sensory ataxia, bilateral optic atrophy and bilateral sensori-neural deafness."
    explanation: "Tropical ataxic neuropathy is a sensory syndrome, distinguishing it from konzo's upper-motor-neuron spastic paraparesis."
- name: Tropical spastic paraparesis (HTLV-1 myelopathy)
  description: >-
    HTLV-1-associated myelopathy / tropical spastic paraparesis produces a chronic
    spastic paraparesis that can resemble konzo but is caused by the retrovirus
    HTLV-1, is serologically diagnosable, and often involves sensory and bladder
    dysfunction.
  disease_term:
    preferred_term: tropical spastic paraparesis
    term:
      id: MONDO:0008039
      label: tropical spastic paraparesis
  distinguishing_features:
  - Infectious etiology (HTLV-1 retrovirus) confirmable by serology/PCR.
  - Frequently involves sensory and sphincter disturbance, whereas konzo characteristically spares sensation and genitourinary function.
  evidence:
  - reference: PMID:37620067
    reference_title: "Tropical spastic paraparesis."
    supports: SUPPORT
    evidence_source: OTHER
    snippet: "the retrovirus HTLV-1 is the causeof tropical spastic paraparesis/paraplegia or TSP"
    explanation: "TSP is caused by the retrovirus HTLV-1, distinguishing it from toxin-induced konzo (quote reproduces a spacing artifact in the source abstract)."
