- name: Symmetric Permanent Spastic Paraparesis
  description: >-
    The clinical endpoint of konzo is an abrupt-onset, symmetric, permanent and
    non-progressive spastic paraparesis of the lower limbs, with upper motor neuron
    signs (spasticity, hyperreflexia, extensor plantar responses, clonus) and a
    stiff, scissoring gait, and no sensory or genitourinary impairment. Once
    established the deficit is irreversible.
