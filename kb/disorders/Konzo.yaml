name: Konzo
creation_date: "2026-06-26T00:00:00Z"
description: >-
  Konzo (cassavism) is an acute-onset, symmetric, permanent and irreversible
  upper motor neuron disease producing spastic paraparesis of the legs, epidemic
  and endemic in cassava-dependent regions of sub-Saharan Africa. It is caused by
  sustained monotonous consumption of insufficiently processed bitter cassava
  (Manihot esculenta) containing the cyanogenic glucoside linamarin, combined with
  a protein-poor diet low in sulfur-containing amino acids; the resulting chronic
  high dietary cyanide exposure cannot be adequately detoxified, leading to
  selective injury of upper motor neurons and the corticospinal (pyramidal) tracts
  with characteristic sparing of sensory and genitourinary function. Outbreaks
  cluster during droughts and food shortages and disproportionately affect children
  and women of childbearing age. Konzo is clinically near-identical to grass-pea
  neurolathyrism (a distinct toxic spastic paraparesis) and is distinguished from
  tropical ataxic neuropathy and HTLV-1-associated tropical spastic paraparesis.
  There is no cure; management is supportive and rehabilitative, and prevention
  relies on cassava detoxification (the wetting method) and dietary diversification.
