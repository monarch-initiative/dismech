name: Dilated Cardiomyopathy
creation_date: '2026-03-06T00:00:00Z'
updated_date: '2026-03-06T04:30:00Z'
synonyms:
- DCM
category: Complex
disease_term:
  preferred_term: dilated cardiomyopathy
  term:
    id: MONDO:0005021
    label: dilated cardiomyopathy
parents:
- Cardiovascular Disease
- Genetic Disorder
has_subtypes:
- name: Familial Dilated Cardiomyopathy
  description: Genetically inherited form of DCM, accounting for 20-50% of cases,
    caused by mutations in genes encoding sarcomeric, cytoskeletal, or nuclear envelope
    proteins.
  evidence:
  - reference: PMID:37788487
    supports: SUPPORT
    snippet: An estimated 40% of cases of familial DCM have an identifiable genetic
      cause.
    explanation: Confirms that familial DCM has a significant genetic basis.
  - reference: PMID:39519012
    supports: SUPPORT
    snippet: Over the last 35 years, many cases of IDC have increasingly been recognized
      to be genetic in etiology with a core set of definitively causal genes in up
      to 40% of cases.
    explanation: Confirms that a significant proportion of DCM cases are familial/genetic.
- name: Idiopathic Dilated Cardiomyopathy
  description: DCM without identifiable genetic or secondary cause after comprehensive
    evaluation.
  evidence:
  - reference: PMID:39519012
    supports: SUPPORT
    snippet: Cases without an identified secondary cause are classified as idiopathic
      dilated cardiomyopathy (IDC).
    explanation: Directly defines idiopathic DCM as lacking an identified secondary cause.
- name: Peripartum Cardiomyopathy
  description: DCM occurring in the last month of pregnancy or within five months
    postpartum in women without prior heart disease.
- name: Alcoholic Cardiomyopathy
  description: DCM resulting from chronic excessive alcohol consumption leading to
    direct myocardial toxicity.
  evidence:
  - reference: PMID:39519012
    supports: SUPPORT
    snippet: These advances have also led to the discovery of causal and modifier genetic
      variants in secondary forms of DCM (e.g., alcohol-induced cardiomyopathy).
    explanation: Confirms that alcohol-induced cardiomyopathy is a recognized secondary form of DCM.
- name: Tachycardia-Induced Cardiomyopathy
  description: DCM caused by sustained tachyarrhythmias that is potentially reversible
    with rate or rhythm control.
pathophysiology:
- name: Sarcomeric and Cytoskeletal Dysfunction
  description: >
    Mutations in genes encoding sarcomeric proteins (e.g., TTN, MYH7, TNNT2)
    and cytoskeletal proteins (e.g., DES, LMNA) disrupt force generation and
    transmission within cardiomyocytes, leading to impaired contractility and
    progressive ventricular dilation. Truncating variants in TTN are the most
    common genetic cause, found in approximately 15% of DCM cases.
  cell_types:
  - preferred_term: cardiomyocyte
    term:
      id: CL:0000746
      label: cardiac muscle cell
  biological_processes:
  - preferred_term: cardiac muscle contraction
    term:
      id: GO:0060048
      label: cardiac muscle contraction
  evidence:
  - reference: PMID:37962957
    supports: SUPPORT
    snippet: Heterozygous (HET) truncating variant mutations in the TTN gene (TTNtvs),
      encoding the giant titin protein, are the most common genetic cause of dilated
      cardiomyopathy (DCM).
    explanation: Confirms TTN truncating variants as the most common genetic cause of DCM.
  - reference: PMID:37962957
    supports: SUPPORT
    snippet: The occurrence of TTNtv was found to be 15% in the DCM cohort.
    explanation: Provides the 15% frequency of TTNtv in a DCM cohort.
  - reference: PMID:37788487
    supports: SUPPORT
    snippet: Many gene mutations have been identified that contribute to phenotypically
      significant cardiomyopathy. DCM genes can affect a variety of cardiomyocyte
      functions, and particular genes whose function affects the cell-cell junction
      and cytoskeleton are associated with increased risk of arrhythmias and sudden
      cardiac death.
    explanation: Confirms that DCM genes affect cardiomyocyte functions including cytoskeletal integrity.
- name: Neurohormonal Activation
  description: >
    Reduced cardiac output activates the renin-angiotensin-aldosterone system
    and sympathetic nervous system, causing vasoconstriction, sodium and water
    retention, and further myocardial stress. Chronic neurohormonal activation
    promotes adverse cardiac remodeling.
  biological_processes:
  - preferred_term: renin-angiotensin regulation of aldosterone production
    term:
      id: GO:0002018
      label: renin-angiotensin regulation of aldosterone production
- name: Myocardial Fibrosis
  description: >
    Progressive replacement and interstitial fibrosis within the ventricular
    myocardium impairs diastolic filling, increases myocardial stiffness, and
    creates substrates for re-entrant arrhythmias. Late gadolinium enhancement
    on cardiac MRI is a strong predictor of adverse outcomes.
  cell_types:
  - preferred_term: cardiac fibroblast
    term:
      id: CL:0002548
      label: fibroblast of cardiac tissue
  biological_processes:
  - preferred_term: cardiac muscle tissue development
    term:
      id: GO:0048738
      label: cardiac muscle tissue development
  evidence:
  - reference: PMID:39298146
    supports: SUPPORT
    snippet: The presence and extent of LGE were associated with various adverse clinical
      outcomes, whereas LVEF was not significantly associated with mortality and arrhythmic
      end points in NIDCM.
    explanation: Demonstrates the prognostic significance of myocardial fibrosis
      (detected as LGE) in nonischemic DCM.
    evidence_source: HUMAN_CLINICAL
- name: RNA Splicing Dysregulation
  description: >
    Pathogenic variants in RBM20 disrupt alternative splicing of key cardiac genes
    including TTN and calcium-handling genes (CAMK2D, CACNA1C), leading to altered
    titin isoform expression and impaired excitation-contraction coupling. Some
    RBM20 variants also form toxic biomolecular condensates in the sarcoplasm.
  cell_types:
  - preferred_term: cardiomyocyte
    term:
      id: CL:0000746
      label: cardiac muscle cell
  evidence:
  - reference: PMID:38288598
    supports: SUPPORT
    snippet: pathogenic variants in RBM20 are linked to aggressive dilated cardiomyopathy
      with early onset heart failure and high mortality.
    explanation: Confirms RBM20 variants cause aggressive DCM with poor outcomes.
- name: Immune and Inflammatory Activation
  description: >
    Immune-mediated injury from viral myocarditis or autoimmune reactions can
    trigger or accelerate DCM progression. Chronic cardiac inflammation with
    distinct immune cell infiltration patterns contributes to adverse remodeling.
  cell_types:
  - preferred_term: cardiomyocyte
    term:
      id: CL:0000746
      label: cardiac muscle cell
  evidence:
  - reference: PMID:38321374
    supports: SUPPORT
    snippet: Our study demonstrated the obvious different ratio of T cell CD4 memory
      activated, T cell regulatory Tregs, and neutrophils between DCM and control
      donors.
    explanation: Demonstrates altered immune cell infiltration patterns in DCM hearts.
    evidence_source: COMPUTATIONAL
- name: Polygenic Risk and Common Variant Burden
  description: >
    Large-scale genome-wide association studies have identified dozens of loci
    associated with DCM, highlighting the role of common genetic variation in
    disease susceptibility. Enrichment analyses confirm the central role of the
    cardiomyocyte and contractile apparatus.
  evidence:
  - reference: PMID:39572784
    supports: SUPPORT
    snippet: We identify 70 genome-wide significant loci, which show broad replication
      in independent samples and map to 63 prioritized genes. Tissue, cell type and
      pathway enrichment analyses highlight the central role of the cardiomyocyte and
      contractile apparatus in DCM pathogenesis.
    explanation: GWAS meta-analysis identifies 70 loci and confirms cardiomyocyte/contractile
      apparatus enrichment in DCM.
    evidence_source: COMPUTATIONAL
  - reference: PMID:39572783
    supports: SUPPORT
    snippet: Dilated cardiomyopathy (DCM) is a leading cause of heart failure and cardiac
      transplantation.
    explanation: Second large-scale GWAS confirming polygenic architecture of DCM.
    evidence_source: COMPUTATIONAL
