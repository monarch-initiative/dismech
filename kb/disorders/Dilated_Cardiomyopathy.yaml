genetic:
- name: TTN Truncating Variants
  gene_term:
    preferred_term: TTN
    term:
      id: hgnc:12403
      label: TTN
  association: Causative
  inheritance:
  - name: Autosomal dominant
  features: >
    Truncating variants in TTN (titin) are the most common genetic cause
    of familial DCM, found in approximately 15-25% of cases. Truncated titin
    integrates structurally into the sarcomere, causing defects at the I/A
    junction and M-band that impair mechanosensing.
  evidence:
  - reference: PMID:37962957
    supports: SUPPORT
    snippet: Heterozygous (HET) truncating variant mutations in the TTN gene (TTNtvs),
      encoding the giant titin protein, are the most common genetic cause of dilated
      cardiomyopathy (DCM).
    explanation: Confirms TTN truncating variants as the most common genetic cause of DCM.
- name: LMNA Mutations
  gene_term:
    preferred_term: LMNA
    term:
      id: hgnc:6636
      label: LMNA
  association: Causative
  inheritance:
  - name: Autosomal dominant
  features: >
    Mutations in LMNA (lamin A/C) cause DCM frequently associated with
    conduction system disease and arrhythmias, representing one of the most
    malignant genetic forms. Found in 4-8% of all DCM cases.
  evidence:
  - reference: PMID:39519012
    supports: SUPPORT
    snippet: Current guidelines recommend genetic counseling and screening, as well
      as endorsing a handful of genotype-specific therapies (e.g., device placement
      in LMNA cardiomyopathy).
    explanation: LMNA cardiomyopathy is recognized as requiring genotype-specific
      management including device therapy.
- name: MYH7 Mutations
  gene_term:
    preferred_term: MYH7
    term:
      id: hgnc:7577
      label: MYH7
  association: Causative
  inheritance:
  - name: Autosomal dominant
  features: >
    Missense mutations in MYH7 (beta-myosin heavy chain) cause DCM through
    impaired sarcomeric function. High penetrance (~90% by age 60).
  evidence:
  - reference: PMID:37788487
    supports: SUPPORT
    snippet: Many gene mutations have been identified that contribute to phenotypically
      significant cardiomyopathy.
    explanation: MYH7 is among the well-established DCM genes affecting sarcomeric function.
- name: RBM20 Mutations
  gene_term:
    preferred_term: RBM20
    term:
      id: hgnc:9907
      label: RBM20
  association: Causative
  inheritance:
  - name: Autosomal dominant
  features: >
    Mutations in RBM20 cause aggressive DCM with early onset heart failure
    and high mortality through disrupted RNA splicing of TTN and calcium-handling
    genes.
  evidence:
  - reference: PMID:38288598
    supports: SUPPORT
    snippet: pathogenic variants in RBM20 are linked to aggressive dilated cardiomyopathy
      with early onset heart failure and high mortality.
    explanation: Confirms RBM20 variants cause aggressive DCM with poor outcomes.
treatments:
- name: ACE Inhibitors / ARBs
  description: First-line neurohormonal blockade to reduce afterload and prevent adverse
    remodeling.
  treatment_term:
    preferred_term: ACE inhibitor therapy
    term:
      id: MAXO:0000058
      label: pharmacotherapy
- name: Beta-Blockers
  description: Reduce heart rate and neurohormonal activation, improving survival in
    heart failure with reduced ejection fraction.
  treatment_term:
    preferred_term: beta-blocker therapy
    term:
      id: MAXO:0000058
      label: pharmacotherapy
- name: SGLT2 Inhibitors
  description: Newer therapy shown to reduce heart failure hospitalization and cardiovascular
    death in HFrEF regardless of diabetes status.
  treatment_term:
    preferred_term: SGLT2 inhibitor therapy
    term:
      id: MAXO:0000058
      label: pharmacotherapy
- name: Cardiac Resynchronization Therapy
  description: Biventricular pacing for patients with wide QRS and reduced LVEF to
    improve synchrony and outcomes.
  treatment_term:
    preferred_term: cardiac resynchronization therapy
    term:
      id: MAXO:0000004
      label: surgical procedure
- name: Heart Transplantation
  description: Definitive therapy for end-stage DCM refractory to medical and device
    therapy.
  treatment_term:
    preferred_term: heart transplantation
    term:
      id: MAXO:0010039
      label: organ transplantation
- name: Implantable Cardioverter-Defibrillator
  description: Indicated for primary prevention of sudden cardiac death in patients
    with LVEF <=35% despite optimal medical therapy.
  treatment_term:
    preferred_term: implantable cardioverter-defibrillator placement
    term:
      id: MAXO:0000004
      label: surgical procedure
- name: Genetic Counseling
  description: Recommended for patients with familial or genetic DCM to guide cascade
    screening and family management.
  treatment_term:
    preferred_term: genetic counseling
    term:
      id: MAXO:0000079
      label: genetic counseling
  evidence:
  - reference: PMID:37788487
    supports: SUPPORT
    snippet: Through advancements in next-generation sequencing and cardiac imaging,
      identification of genetic DCM has improved over the past couple decades, and
      precision medicine is now at the forefront of treatment for these patients and
      their families.
    explanation: Confirms the importance of genetic identification and precision medicine
      in DCM management.
  - reference: PMID:39519012
    supports: SUPPORT
    snippet: Current guidelines recommend genetic counseling and screening, as well
      as endorsing a handful of genotype-specific therapies
    explanation: Guidelines explicitly recommend genetic counseling and screening for DCM.
