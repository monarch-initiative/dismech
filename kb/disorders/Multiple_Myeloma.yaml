datasets:
discussions:
- discussion_id: gap_mm_obesity_accelerated_progression
  prompt: >-
    Severe obesity is epidemiologically associated with increased multiple myeloma
    risk and mortality, yet the mechanisms by which obesity accelerates myeloma
    progression are unknown. Which obesity-driven factors — adipokine dysregulation
    (leptin, adiponectin, IL-6, TNF-alpha), altered marrow lipid and metabolic flux,
    and immune disruption — causally promote clonal plasma cell expansion and
    impair anti-tumor immunity, and do these mechanisms operate universally or only
    in specific genetic and immune-competent backgrounds?
  kind: KNOWLEDGE_GAP
  status: OPEN
  attaches_to:
  - pathophysiology#Clonal Plasma Cell Proliferation
  - pathophysiology#Immune Dysregulation
  - pathophysiology#Bone Marrow Failure
  rationale: >-
    Epidemiologic data robustly link severe obesity to higher multiple myeloma
    incidence and mortality, and Fairfield et al. (2026) confirmed in CoMMpass
    clinical data that moderate-to-severe obesity at diagnosis associates with
    increased patient mortality and distinct myeloma-cell gene-expression and
    pathway signatures. They further showed that high-fat-diet obesity accelerated
    myeloma only in the immune-competent C57BL/6J 5TGM1 semisyngeneic model — not in
    the SCID-beige xenograft or the Vk*MYC model — implicating the host immune system
    rather than a tumor-intrinsic effect alone. However, the underlying mechanisms
    remain unknown: it is unresolved which specific immune populations (T cells,
    NK cells, macrophages, neutrophils, regulatory T cells) are disrupted, and how
    obesity-associated adipokines and altered marrow lipid/metabolic flux
    mechanistically drive plasma-cell survival and proliferation. It is also unclear
    whether the obesity-altered myeloma-cell gene signatures activate stemness,
    drug-resistance, or immune-evasion programs. Resolving whether obesity acts
    primarily through impaired anti-tumor immunity, a permissive adipocyte-rich
    marrow niche, or tumor-intrinsic reprogramming would clarify whether obesity is
    a modifiable target for myeloma prevention and which interventions to prioritize.
  proposed_experiments:
  - experiment_id: exp_mm_obesity_immune_niche_dissection
    name: Immune and metabolic dissection of obesity-accelerated myeloma in the 5TGM1 model
    description: >-
      Use the immune-competent HFD-fed C57BL/6J 5TGM1-TKGFP+/Luc+ semisyngeneic
      model with bioluminescent tumor tracking to compare obese versus lean mice.
      Profile bone-marrow and tumor-infiltrating immune populations by flow
      cytometry and single-cell RNA-seq, quantify circulating and marrow adipokines
      and lipid metabolites, and perform selective immune-cell depletion or adipokine
      blockade to test causal contributions. In parallel, mine MMRF CoMMpass
      obese-versus-normal myeloma-cell transcriptomes to nominate driver pathways
      for functional testing.
    experiment_type:
      preferred_term: integrated in vivo immunophenotyping and transcriptomic perturbation study
    readouts:
    - name: Tumor burden and engraftment in obese vs lean hosts
      target: pathophysiology#Clonal Plasma Cell Proliferation
      description: >
        Quantify myeloma engraftment, growth kinetics, and serum IgG/M-protein in
        HFD-obese versus lean mice using noninvasive bioluminescent imaging and
        serum immunoglobulin measurement, with and without adipokine blockade.
      assays:
      - preferred_term: bioluminescent tumor imaging
      - preferred_term: serum immunoglobulin quantification
      direction: POSITIVE
    - name: Tumor-infiltrating and marrow immune-cell composition
      target: pathophysiology#Immune Dysregulation
      description: >
        Characterize T-cell, NK-cell, macrophage, neutrophil, and regulatory T-cell
        frequencies and functional/exhaustion states in obese versus lean marrow,
        and test causality by selective immune-cell depletion.
      assays:
      - preferred_term: multiparameter flow cytometry
      - preferred_term: single-cell RNA sequencing
      direction: NEGATIVE
    - name: Marrow adipokine and lipid-metabolic environment
      target: pathophysiology#Bone Marrow Failure
      description: >
        Measure marrow and circulating leptin, adiponectin, IL-6, TNF-alpha, and
        lipid metabolites in obese versus lean hosts to link adipocyte-rich niche
        remodeling to plasma-cell support and suppressed hematopoiesis.
      assays:
      - preferred_term: adipokine immunoassay
      - preferred_term: marrow lipidomic profiling
      direction: POSITIVE
    decision_criterion: >-
      An obesity-driven immune/niche mechanism is supported if HFD-obese hosts show
      significantly higher myeloma engraftment than lean controls, if depletion of a
      specific immune population or blockade of a specific adipokine reverses the
      obesity-accelerated phenotype, and if the responsible pathway is concordantly
      enriched in obese-patient CoMMpass myeloma-cell transcriptomes.
    would_support:
    - pathophysiology#Clonal Plasma Cell Proliferation
    - pathophysiology#Immune Dysregulation
    - pathophysiology#Bone Marrow Failure
  evidence:
  - reference: PMID:41834458
    reference_title: "Obesity Accelerates Multiple Myeloma Progression in Certain Mouse Models and in Humans."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Obesity is associated with an increased risk of developing multiple myeloma;
      however, the underlying mechanisms are unknown.
    explanation: >-
      Fairfield et al. explicitly state that obesity raises myeloma risk while its
      mechanisms remain unknown, directly establishing this knowledge gap.
  - reference: PMID:41834458
    reference_title: "Obesity Accelerates Multiple Myeloma Progression in Certain Mouse Models and in Humans."
    supports: SUPPORT
    evidence_source: MODEL_ORGANISM
    snippet: >-
      obesity-accelerated multiple myeloma is coupled with immune disruptions in
      mice
    explanation: >-
      Links obesity-accelerated myeloma to immune disruption in an
      immune-competent mouse model, motivating the proposed immune-mechanism work.
  - reference: PMID:41834458
    reference_title: "Obesity Accelerates Multiple Myeloma Progression in Certain Mouse Models and in Humans."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      gene expression is altered in myeloma cells from patients with obesity,
      further implicating obesity as a critical modifier for prevention
    explanation: >-
      Reports altered myeloma-cell gene expression in obese patients (CoMMpass),
      the human arm motivating the proposed metabolic/transcriptomic mechanism work.
