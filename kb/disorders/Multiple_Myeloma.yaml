- name: Obesity-Driven Metabolic Dysregulation
  description: >-
    Obesity is a critical modifier of myeloma progression: severe obesity at
    diagnosis is associated with increased patient mortality and with altered
    gene-expression and pathway signatures in myeloma cells. Obesity reshapes the
    bone marrow adipose microenvironment and adipokine- and lipid-mediated
    metabolic signaling, creating a permissive niche that accelerates clonal
    plasma cell proliferation and disrupts anti-tumor immunity.
  evidence:
  - reference: PMID:41834458
    reference_title: "Obesity Accelerates Multiple Myeloma Progression in Certain Mouse Models and in Humans."
    supports: SUPPORT
    evidence_source: MODEL_ORGANISM
    snippet: >-
      obesity-accelerated multiple myeloma is coupled with immune disruptions in
      mice and that gene expression is altered in myeloma cells from patients with
      obesity, further implicating obesity as a critical modifier for prevention.
    explanation: >-
      The study demonstrates obesity-accelerated myeloma in immune-competent mice
      with associated immune disruptions and altered myeloma cell gene signatures,
      indicating obesity-driven metabolic reprogramming as a critical driver.
