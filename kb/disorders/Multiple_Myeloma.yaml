- name: Immune Dysregulation
  description: >-
    Myeloma causes profound immunodeficiency through suppression of normal
    immunoglobulin production (immunoparesis), impaired T cell and NK cell function,
    and alterations in the bone marrow microenvironment. This leads to increased
    susceptibility to infections, which remain a major cause of morbidity and mortality.
    In obesity-accelerated myeloma, this immune dysregulation is further amplified:
    obesity is coupled with immune disruptions that accelerate disease progression
    in immune-competent hosts.
  evidence:
  - reference: PMID:34201396
    reference_title: "Myeloma Bone Disease: A Comprehensive Review."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Reduction in normal gammaglobulins (immunoparesis) leads to an increased risk
      of infection.
    explanation: >-
      The review confirms immunoparesis as a key feature of myeloma leading to
      increased infection risk.
  - reference: PMID:41834458
    reference_title: "Obesity Accelerates Multiple Myeloma Progression in Certain Mouse Models and in Humans."
    supports: SUPPORT
    evidence_source: MODEL_ORGANISM
    snippet: >-
      obesity-accelerated multiple myeloma is coupled with immune disruptions in
      mice
    explanation: >-
      Obesity-driven immune disruption is a mechanistic driver of accelerated
      myeloma in immune-competent hosts, suggesting immune dysfunction as a key
      obesity-related pathophysiology.
