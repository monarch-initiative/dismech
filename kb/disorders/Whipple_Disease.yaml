  description: Gram-positive actinomycete responsible for Whipple disease.
pathophysiology:
- name: Macrophage dysfunction and malabsorption
  description: Chronic small bowel infection by Tropheryma whipplei leads to
    lymphostasis and impaired nutrient absorption driven by macrophage
    dysfunction.
  cell_types:
  - preferred_term: macrophage
    term:
      id: CL:0000235
      label: macrophage
  biological_processes:
  - preferred_term: macrophage activation
    term:
      id: GO:0042116
      label: macrophage activation
  evidence:
  - reference: PMID:26288590
    reference_title: "Whipple's Disease."
    supports: SUPPORT
    snippet: The disease is a chronic infection of the intestinal mucosa with
      the bacterium Tropheryma whipplei, which leads to a lymphostasis with an
      impaired absorption of the nutrition.
    explanation: Review describes lymphatic obstruction and malabsorption from
      chronic infection.
  - reference: PMID:26288590
    reference_title: "Whipple's Disease."
    supports: SUPPORT
    snippet: Recent studies suggest that a host-specific dysfunction of the
      intestinal macrophages is responsible for the chronic infection with T.
      whipplei.
    explanation: Highlights macrophage functional defect underlying persistent
      infection.
- name: Host susceptibility and immune dysregulation
  description: Only a small fraction of exposed individuals develop Whipple
    disease, implicating rare inborn or acquired immune defects and risk from
    anti-TNF therapy.
  biological_processes:
  - preferred_term: immune system process
    term:
      id: GO:0002376
      label: immune system process
  evidence:
  - reference: PMID:40062480
    reference_title: "Human genetics of Whipple's disease."
    supports: SUPPORT
    snippet: Half the world's population is exposed to T. whipplei, but only one
      in a million develop WD. This suggests that acquired or inborn errors of
      immunity (IEI) may underlie WD.
    explanation: Genetic review links rare immune defects to disease
      susceptibility.
  - reference: PMID:40062480
    reference_title: "Human genetics of Whipple's disease."
    supports: SUPPORT
    snippet: Anti-TNF treatment is a well established risk factor for flare-ups
      of WD.
    explanation: Notes iatrogenic immune suppression as a trigger for disease
      activation.
  - reference: PMID:32896657
    reference_title: "Whipple disease: a 15-year retrospective study on 36 patients
      with positive polymerase chain reaction for Tropheryma whipplei."
    supports: PARTIAL
    snippet: About 60% were immunosuppressed. The most frequent clinical
      presentations were joint pain (16/22), weight loss (15/22) and/or
      digestive tract disorder (15/22).
    explanation: Cohort shows high immunosuppression rate among confirmed
      Whipple disease cases.
  - reference: PMID:37727483
    reference_title: "Diagnosis and treatment of Whipple disease after kidney transplantation:
      A case report."
    supports: PARTIAL
    snippet: The patient was admitted to the hospital due to recurrent diarrhea
      for 1 mo, shortness of breath, and 1 wk of fever, after 3 years of renal
      transplantation.
    explanation: Post-transplant case illustrates Whipple disease emerging under
      chronic immunosuppression.
- name: TNF-inhibitor–driven macrophage apoptosis
  description: Anti-TNF biologics can reprogram macrophages infected with
    Tropheryma whipplei, increasing bacterial replication and macrophage
    apoptosis, exacerbating latent disease.
  cell_types:
  - preferred_term: macrophage
    term:
      id: CL:0000235
      label: macrophage
  biological_processes:
  - preferred_term: apoptotic process
    term:
      id: GO:0006915
      label: apoptotic process
  evidence:
  - reference: PMID:34093562
    reference_title: "Tumor Necrosis Factor Inhibitors Exacerbate Whipple's Disease
      by Reprogramming Macrophage and Inducing Apoptosis."
    supports: SUPPORT
    snippet: Etanercept, adalimumab or certolizumab treatment of
      monocyte-derived macrophages from healthy subjects significantly increased
      bacterial replication in vitro without affecting uptake.
    explanation: Demonstrates TNF inhibitors increase T. whipplei replication
      within macrophages.
  - reference: PMID:34093562
    reference_title: "Tumor Necrosis Factor Inhibitors Exacerbate Whipple's Disease
      by Reprogramming Macrophage and Inducing Apoptosis."
    supports: SUPPORT
    snippet: TNFI aggravate/exacerbate latent or subclinical undiagnosed
      Whipple's disease by promoting a strong inflammatory response and
      apoptosis.
    explanation: Study links TNF blockade to apoptosis-driven exacerbation of
      Whipple disease.
