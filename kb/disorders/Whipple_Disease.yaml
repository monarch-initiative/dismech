treatments:
- name: Ceftriaxone induction followed by trimethoprim/sulfamethoxazole
  description: Two-week intravenous ceftriaxone induction followed by oral
    TMP-SMX maintenance to eradicate infection and prevent relapse.
  treatment_term:
    preferred_term: pharmacotherapy
    term:
      id: MAXO:0000058
      label: pharmacotherapy
    therapeutic_agent:
    - preferred_term: ceftriaxone
      term:
        id: CHEBI:29007
