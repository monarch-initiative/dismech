  - reference: PMID:40398847
    reference_title: "Whipple Disease Initial Presentation as Supraclavicular Lymphadenopathy
      in a Patient With Rheumatoid Arthritis: A Diagnostic Challenge."
    supports: SUPPORT
    snippet: A supraclavicular lymph node excisional biopsy revealed complete
      architectural effacement by a diffuse foamy histiocytic infiltrate without
      granuloma formation or necrosis.
    explanation: Case report shows lymph node involvement with foamy macrophages
      due to Whipple disease.
- name: Respiratory involvement
  category: Respiratory
  description: Pulmonary symptoms such as cough, chest pain, and dyspnea with
    plaques or nodules on imaging.
  phenotype_term:
    preferred_term: Dyspnea
    term:
      id: HP:0002094
      label: Dyspnea
  evidence:
  - reference: PMID:38414785
    reference_title: "Whipple's disease of the respiratory system: A case report."
    supports: SUPPORT
    snippet: Whipple's disease (WD) is a multiple-system chronic disease caused
      by Tropheryma whipplei (T. whipplei) infection. The present study
      describes 3 cases of WD with clinical manifestations of cough, chest pain,
      headache, dyspnea, sputum, joint pain, abdominal pain, diarrhea and weight
      loss.
    explanation: Case series documents pulmonary symptoms including dyspnea and
      chest pain.
  - reference: PMID:38414785
    reference_title: "Whipple's disease of the respiratory system: A case report."
    supports: SUPPORT
    snippet: Chest computed tomography (CT) showed signs of plaques, nodules and
      pleural thickening; and bronchoscopic alveolar lavage fluid
      metagenomic-sequencing indicated that it was T. whipplei.
    explanation: Imaging and BAL sequencing confirm pulmonary involvement due to
      T. whipplei.
- name: Spinal cord involvement
  category: Neurologic
  description: Isolated spinal cord inflammation leading to neurologic damage.
  phenotype_term:
    preferred_term: Abnormality of the nervous system
    term:
