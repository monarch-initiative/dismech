        label: trimethoprim
    - preferred_term: sulfamethoxazole
      term:
        id: CHEBI:9332
        label: sulfamethoxazole
  evidence:
  - reference: PMID:26288590
    reference_title: "Whipple's Disease."
    supports: SUPPORT
    snippet: The German treatment recommendations include a two-week intravenous
      induction therapy with ceftriaxone, which is followed by a three-month
      oral maintenance therapy with trimethoprim/sulfamethoxazole.
    explanation: Details standard ceftriaxone induction and TMP-SMX maintenance
      regimen.
- name: Doxycycline plus hydroxychloroquine regimen
  description: Oral doxycycline and hydroxychloroquine for one year, followed by
    lifelong doxycycline for relapse prevention.
  treatment_term:
    preferred_term: pharmacotherapy
    term:
