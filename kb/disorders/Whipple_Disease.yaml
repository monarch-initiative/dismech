    reference_title: "Whipple Disease Presenting as Isolated Transverse Myelitis with
      Permanent Neurological Damage in a Patient with Systemic Lupus Erythematosus:
      A Case Report of a Difficult Diagnosis with a Literature Review."
    supports: SUPPORT
    snippet: We describe an atypical case of Whipple disease exclusively
      involving the spinal cord in an adolescent receiving immunosuppressive
      therapy for systemic lupus erythematosus.
    explanation: Case report highlights spinal cord involvement as a
      presentation of Whipple disease.
differential_diagnoses:
- name: Crohn disease
  distinguishing_features:
  - Transmural granulomatous inflammation with skip lesions; lacks PAS-positive
    macrophages filled with bacteria.
  disease_term:
    preferred_term: Crohn disease
    term:
      id: MONDO:0005011
      label: Crohn disease
  evidence:
  - reference: PMID:26288590
    reference_title: "Whipple's Disease."
    supports: PARTIAL
    snippet: The clinical symptoms are heterogeneous and challenge differential
      diagnoses, such as rheumatic diseases, vasculitides, AIDS enteropathy,
      tuberculosis, or other chronic granulomatous diseases (Crohn's disease,
      sarcoidosis).
    explanation: Review notes Crohn disease as a common granulomatous
      differential for Whipple disease presentations.
- name: Intestinal tuberculosis
  distinguishing_features:
