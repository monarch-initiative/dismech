diagnosis:
- name: Clinical and Molecular Diagnosis
  description: >-
    Episodic ataxia is diagnosed from recurrent attacks of ataxia and is
    subtyped by molecular genetic testing: episodic ataxia type 1 (KCNA1,
    Kv1.1 channelopathy) and the more common episodic ataxia type 2 (CACNA1A,
    Cav2.1 channelopathy), which guides prognosis and acetazolamide-responsive
    management.
  diagnosis_term:
    preferred_term: molecular genetic testing
    term:
      id: MAXO:0000533
      label: molecular genetic testing
  evidence:
  - reference: PMID:29891059
    reference_title: "Episodic ataxias."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "EA1 is caused by heterozygous mutations in KCNA1, which encodes the α1 subunit of a neuronal voltage-gated potassium channel, Kv1.1."
    explanation: >-
      Supports KCNA1 (Kv1.1) molecular testing for episodic ataxia type 1.
  - reference: PMID:29891059
    reference_title: "Episodic ataxias."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "EA2, the most common and best characterized, is caused by heterozygous mutations in CACNA1A, which encodes the α1A subunit of a neuronal voltage-gated calcium channel, Cav2.1."
    explanation: >-
      Supports CACNA1A (Cav2.1) molecular testing for episodic ataxia type 2.
treatments:
- name: Acetazolamide
  description: >
    Carbonic anhydrase inhibitor; first-line prophylactic therapy for EA2,
    reducing attack frequency and severity. Variable benefit in EA1.
  treatment_term:
    preferred_term: pharmacotherapy
    term:
      id: MAXO:0000058
      label: pharmacotherapy
    therapeutic_agent:
    - preferred_term: acetazolamide
      term:
        id: CHEBI:27690
        label: acetazolamide
  evidence:
  - reference: PMID:34484942
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Compared with placebo, fampridine reduced the number of attacks to
      63% (95% CI 54%-74%) and acetazolamide to 52% (95% CI 46%-60%)."
    explanation: Class II evidence from a randomized placebo-controlled crossover
      trial demonstrating acetazolamide efficacy in reducing EA2 attacks.
- name: 4-Aminopyridine
  description: >
    Potassium channel blocker used as prophylactic therapy for EA2; restores
    Purkinje cell firing precision.
  treatment_term:
    preferred_term: pharmacotherapy
    term:
      id: MAXO:0000058
      label: pharmacotherapy
    therapeutic_agent:
    - preferred_term: 4-aminopyridine
      term:
        id: CHEBI:34385
        label: 4-aminopyridine
  evidence:
  - reference: PMID:21734179
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Patients receiving placebo had a median monthly attack frequency of
      6.50, whereas patients taking 4AP had a frequency of 1.65 (p = 0.03)."
    explanation: Class II evidence from a 2011 randomized double-blind placebo-controlled
      crossover trial demonstrating that 4-aminopyridine significantly reduces attack
      frequency in EA2 and related familial episodic ataxias.
  - reference: PMID:34484942
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Compared with placebo, fampridine reduced the number of attacks to
      63% (95% CI 54%-74%) and acetazolamide to 52% (95% CI 46%-60%)."
    explanation: Class II evidence from a randomized placebo-controlled crossover
      trial demonstrating fampridine (prolonged-release 4-aminopyridine) efficacy
      in reducing EA2 attacks.
- name: Carbamazepine
  description: >
    Sodium channel blocker anti-seizure medication used off-label as symptomatic
    therapy for EA1 attacks. Acetazolamide is generally less effective in EA1
    than in EA2.
  treatment_term:
    preferred_term: pharmacotherapy
    term:
      id: MAXO:0000058
      label: pharmacotherapy
    therapeutic_agent:
    - preferred_term: carbamazepine
      term:
        id: CHEBI:3387
        label: carbamazepine
