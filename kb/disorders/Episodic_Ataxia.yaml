    inheritance_term:
      preferred_term: Autosomal dominant inheritance
      term:
        id: HP:0000006
        label: Autosomal dominant inheritance
  notes: >
    Heterozygous missense variants in KCNA1 (Kv1.1 potassium channel) cause EA1
    via loss-of-function or dominant-negative effects on channel tetramers.
  gene_term:
    preferred_term: KCNA1
    term:
      id: hgnc:6218
      label: KCNA1
  evidence:
  - reference: PMID:7842011
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Mutation analysis of the KCNA1 coding region in these families identified
      four different missense point mutations present in the heterozygous state,
      indicating that EA/myokymia can result from mutations in this gene."
    explanation: Foundational evidence linking heterozygous KCNA1 missense variants
      to EA1.
- name: CACNA1A Pathogenic Variants (EA2)
  subtype: EA2
  inheritance:
  - name: Autosomal dominant
    inheritance_term:
