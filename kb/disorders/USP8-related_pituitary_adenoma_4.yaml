- name: Pasireotide for SSTR5-high USP8-mutant tumors
  description: >-
    USP8-mutant corticotroph adenomas can express higher SSTR5, providing a
    treatment-relevant rationale for pasireotide, a somatostatin analog with
    high SSTR5 affinity.
