- name: Urinary glycopeptide excretion
  presence: INCREASED
  context: >-
    Markedly increased urinary glycopeptides, including blood-group-A trisaccharide and
    O-linked glycopeptides, reflecting impaired alpha-NAGA-mediated catabolism.
  evidence:
  - reference: PMID:2122121
    reference_title: "Schindler disease: an inherited neuroaxonal dystrophy due to alpha-N-acetylgalactosaminidase deficiency."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Abnormally increased amounts of urinary glycopeptides were observed"
    explanation: Urinary glycopeptide excretion is the characteristic biochemical abnormality.
genetic:
- name: NAGA pathogenic variants
  gene_term:
    preferred_term: NAGA
    term:
      id: hgnc:7631
      label: NAGA
  association: Causative
  notes: >-
    Biallelic loss-of-function NAGA variants cause Schindler disease; the original family D
    brothers were homozygous for the E325K (p.Glu325Lys) substitution, which abolishes
    enzyme activity.
  evidence:
  - reference: PMID:2243144
    reference_title: "Schindler disease: the molecular lesion in the alpha-N-acetylgalactosaminidase gene that causes an infantile neuroaxonal dystrophy."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "a glutamic acid to lysine substitution in residue 325 (E325K)"
    explanation: Identifies the founding pathogenic NAGA variant (E325K) in Schindler disease.
