    Classic infantile neuroaxonal dystrophy (Seitelberger disease, usually PLA2G6-related)
    shares axonal spheroids and infantile neurodegeneration with Schindler disease but has
    normal alpha-NAGA activity, distinguishing it biochemically.
  disease_term:
