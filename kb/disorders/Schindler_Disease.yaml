name: Schindler Disease
creation_date: "2026-06-13T00:00:00Z"
description: >-
  Schindler disease (alpha-N-acetylgalactosaminidase deficiency type 1) is the severe,
  infantile-onset neuroaxonal-dystrophy form of NAGA deficiency, an autosomal recessive
  lysosomal storage disorder caused by biallelic NAGA variants that abolish lysosomal
  alpha-N-acetylgalactosaminidase. Enzyme deficiency causes lysosomal accumulation of
  glycopeptides and glycoconjugates bearing terminal alpha-N-acetylgalactosamine, producing a
  rapidly progressive infantile neurodegeneration with developmental regression, hypotonia,
  spasticity, blindness, and characteristic CNS axonal spheroids, typically fatal in early
  childhood, in contrast to the mild adult Kanzaki (type II) form.
synonyms:
- alpha-N-acetylgalactosaminidase deficiency type 1
- Schindler disease type I
- infantile neuroaxonal dystrophy due to alpha-NAGA deficiency
- NAGA deficiency, infantile
