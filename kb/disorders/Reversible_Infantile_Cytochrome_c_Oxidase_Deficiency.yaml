    - reference: PMID:19720722
      reference_title: "Molecular basis of infantile reversible cytochrome c oxidase deficiency myopathy."
      supports: SUPPORT
      evidence_source: HUMAN_CLINICAL
      snippet: "homoplasmic m.14674T>C mt-tRNA(Glu) mutation in 17 patients from 12 families"
      explanation: Defines the principal causal variant and its recurrence.
  - name: m.14674T>G (MT-TE)
    description: >
      Homoplasmic m.14674T>G mutation at the same mt-tRNA(Glu) nucleotide
      position; a less common cause, underscoring the importance of this site.
    gene:
      preferred_term: MT-TE
      term:
        id: hgnc:7479
        label: MT-TE
