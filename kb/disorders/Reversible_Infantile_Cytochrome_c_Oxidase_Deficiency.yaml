name: Reversible Infantile Cytochrome c Oxidase Deficiency
category: Mendelian
creation_date: "2026-06-24T00:00:00Z"
synonyms:
- Reversible infantile respiratory chain deficiency
- RIRCD
- Benign infantile mitochondrial myopathy
- Benign cytochrome c oxidase deficiency myopathy
- Reversible infantile cytochrome c oxidase deficiency myopathy
- COX deficiency, benign infantile mitochondrial myopathy
description: >
  Reversible infantile cytochrome c oxidase (COX) deficiency — historically
  called "benign cytochrome c oxidase deficiency myopathy" and now better termed
  reversible infantile respiratory chain deficiency (RIRCD) — is a maternally
  inherited mitochondrial myopathy that is exceptional among childhood
  mitochondrial encephalomyopathies in showing spontaneous recovery in infants
  who survive the first months of life. The principal molecular cause is a
  homoplasmic point mutation in the mitochondrial DNA-encoded transfer RNA for
  glutamate (MT-TE / mt-tRNA(Glu)), most commonly m.14674T>C and less often
  m.14674T>G. The mutation reduces steady-state levels of mt-tRNA(Glu) and
  impairs mitochondrial translation, producing a respiratory chain defect that
  affects predominantly Complex IV (cytochrome c oxidase) and variably Complexes
  I and III. Affected infants present in the first weeks to months of life with
  profound hypotonia, feeding difficulties, lactic acidosis, and a
  COX-deficient mitochondrial myopathy, and may require respiratory support. The
  distinctive feature is spontaneous clinical and biochemical reversal over the
  first one to three years of life, attributed to tissue-specific, largely
  nuclear-encoded compensatory mechanisms — including a developmental isoform
  switch of cytochrome c oxidase subunits (COX6A, COX7A) in skeletal muscle and
  modulation of mt-tRNA 2-thiouridylation by the nuclear modifier TRMU. Because
  the MT-TE lesion is mitochondrially (not nuclear) encoded and carries no causal
  nuclear-gene edge, MONDO's placement of this entity under the nuclear-type
  Complex IV deficiency subtree (MONDO:0033885) is a classification artifact;
  RIRCD is mechanistically a mitochondrial-DNA translation disorder. The
  reversibility, the genetic test (a single homoplasmic mt-tRNA(Glu) variant),
  and the L-cysteine therapeutic rationale distinguish it from the relentlessly
  progressive infantile COX deficiencies.
disease_term:
  preferred_term: Reversible infantile cytochrome c oxidase deficiency (RIRCD)
  term:
