    snippet: "patients not carrying the m.14674T>C or T>G mt-tRNA(Glu) mutations may have mutations in the TRMU gene"
    explanation: Documents the genetic heterogeneity of the reversible infantile phenotype, including nuclear TRMU.
treatments:
- name: L-Cysteine Supplementation
  description: >
    Mechanistic rationale and in vitro evidence support L-cysteine
    supplementation in RIRCD: cysteine is required for optimal TRMU function and
    2-thiomodification of mitochondrial tRNAs, and L-cysteine (but not
    N-acetyl-cysteine) rescued respiratory chain enzyme activities in patient
    cell lines. This remains an investigational, mechanism-based therapy rather
    than an established standard of care.
  treatment_term:
    preferred_term: dietary supplementation
    term:
      id: MAXO:0000088
      label: dietary intervention
  evidence:
  - reference: PMID:23814040
    reference_title: "Altered 2-thiouridylation impairs mitochondrial translation in reversible infantile respiratory chain deficiency."
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: "Supplementation with l-cysteine, which is required for optimal TRMU function, rescued respiratory chain enzyme activities in human cell lines of patients with RIRCD"
    explanation: Provides the in vitro rationale for L-cysteine as a mechanism-based therapy.
  - reference: PMID:27854233
    reference_title: "Cysteine Supplementation May be Beneficial in a Subgroup of Mitochondrial Translation Deficiencies."
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: "supplementation with L-cysteine, but not with N-acetyl-cysteine partially rescues the mitochondrial translation defect"
    explanation: Confirms L-cysteine (not NAC) partially rescues the mitochondrial translation defect in patient cells.
- name: Supportive and Respiratory Care
  description: >
    Management in the symptomatic phase is supportive: respiratory support,
    nutritional support for feeding difficulties, and treatment of lactic
    acidosis. Recognizing the molecular diagnosis (a homoplasmic mt-tRNA(Glu)
    variant) is important because it identifies infants with an excellent
    prognosis who warrant continued intensive support through the reversible
    phase.
  treatment_term:
    preferred_term: supportive care
    term:
      id: MAXO:0000950
      label: supportive care
  evidence:
  - reference: PMID:21931168
    reference_title: "Reversible infantile respiratory chain deficiency is a unique, genetically heterogenous mitochondrial disease."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "enabling them to select children with an excellent prognosis for continuing respiratory support from those with severe mitochondrial presentation in infancy"
    explanation: Molecular diagnosis guides continued supportive (including respiratory) care for infants with the favorable, reversible form.
notes: >
  Reversible infantile cytochrome c oxidase deficiency / reversible infantile
  respiratory chain deficiency (RIRCD) is caused predominantly by the homoplasmic
  m.14674T>C (or m.14674T>G) mutation in MT-TE (mt-tRNA(Glu); hgnc:7479,
  OMIM:590025), reported by Horvath et al. (Brain 2009; PMID:19720722), Mimaki
  et al. (Ann Neurol 2010; PMID:21194154), and Uusimaa et al. (J Med Genet 2011;
  PMID:21931168). Recovery mechanisms are reviewed in Boczonadi et al. (Int J
  Biochem Cell Biol 2015; PMID:25666558, COX6A/COX7A isoform switch) and the
  2-thiouridylation / L-cysteine work of Boczonadi et al. (Hum Mol Genet 2013;
  PMID:23814040) and Bartsakoulia et al. (J Neuromuscul Dis 2016; PMID:27854233).

  Scope / classification note (issue #4239): MONDO:0957524 is filed by MONDO under
  the nuclear-type Complex IV deficiency subtree (MONDO:0033885), but the primary
  cause of RIRCD is a mitochondrial-DNA-encoded mt-tRNA(Glu) lesion impairing
  mitochondrial translation — not a nuclear assembly-factor defect — and the MONDO
  term carries no causal nuclear-gene edge. For this reason the entry is curated as
  a standalone mtDNA mitochondrial translation/myopathy disorder and is
  deliberately NOT conformed to the nuclear complex_iv_assembly_deficiency module
  nor added to the Mitochondrial_Complex_IV_Deficiency grouping. Whether RIRCD
  should be admitted to that (nuclear-type) grouping is left as a maintainer scope
  decision per the assessment in issue #4239. Note also the genetic heterogeneity:
  a phenotypically similar reversible infantile respiratory chain deficiency can be
  caused by biallelic nuclear TRMU mutations.
