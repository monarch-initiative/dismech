genetic:
- name: MT-TE (mt-tRNA(Glu)) homoplasmic mutations causing RIRCD
  gene_term:
    preferred_term: MT-TE (mitochondrially encoded tRNA-Glu)
    term:
      id: hgnc:7479
      label: MT-TE
  inheritance:
  - name: Mitochondrial (maternal)
    evidence:
    - reference: PMID:19720722
      reference_title: "Molecular basis of infantile reversible cytochrome c oxidase deficiency myopathy."
      supports: SUPPORT
      evidence_source: HUMAN_CLINICAL
      snippet: "a maternally inherited, homoplasmic m.14674T>C mt-tRNA(Glu) mutation"
      explanation: The causal mtDNA variant is maternally inherited and homoplasmic, consistent with mitochondrial inheritance.
  variants:
  - name: m.14674T>C (MT-TE)
    description: >
      Homoplasmic m.14674T>C mutation in the mitochondrial tRNA for glutamate;
      the most common cause of RIRCD, identified in 17 patients from 12 families
      in the founding report and in subsequent independent series.
    gene:
      preferred_term: MT-TE
      term:
        id: hgnc:7479
