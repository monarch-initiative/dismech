      supports: SUPPORT
      evidence_source: HUMAN_CLINICAL
      snippet: "Identification of a novel m.14674T>G mutation in addition to m.14674T>C indicated the importance of this site for disease causation"
      explanation: Establishes m.14674T>G as a second pathogenic allele at the same critical position.
  features: >
    RIRCD is most often caused by the homoplasmic m.14674T>C (or less commonly
    m.14674T>G) mt-tRNA(Glu) mutation. The disorder is genetically heterogeneous:
    a phenotypically similar reversible infantile respiratory chain deficiency
    can arise from biallelic mutations in the nuclear modifier gene TRMU, which
    2-thiouridylates mt-tRNA(Glu).
