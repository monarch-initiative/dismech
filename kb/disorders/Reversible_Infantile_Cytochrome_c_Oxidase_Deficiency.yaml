pathophysiology:
- name: Homoplasmic mt-tRNA(Glu) Mutation and Impaired Mitochondrial Translation
  description: >
    A maternally inherited, homoplasmic m.14674T>C (or m.14674T>G) mutation in
    the mitochondrial DNA-encoded tRNA for glutamate (MT-TE) reduces steady-state
    levels of mt-tRNA(Glu) and impairs intramitochondrial protein synthesis. The
    severity of the translation defect is further modulated by mt-tRNA(Glu)
    2-thiouridylation, which depends on the nuclear modifier TRMU; reduced
    2-thiouridylation exacerbates the effect of the tRNA(Glu) mutation on
    mitochondrial translation. This is a mitochondrial-DNA tRNA / translation
    lesion, mechanistically distinct from the nuclear assembly-factor defects
    classified alongside it under Complex IV deficiency.
  biological_processes:
  - preferred_term: mitochondrial translation
    term:
      id: GO:0032543
      label: mitochondrial translation
    modifier: DECREASED
  - preferred_term: mt-tRNA(Glu) 2-thiouridylation (wobble uridine thiolation)
    term:
      id: GO:0002143
      label: tRNA wobble position uridine thiolation
    modifier: DECREASED
  evidence:
  - reference: PMID:19720722
    reference_title: "Molecular basis of infantile reversible cytochrome c oxidase deficiency myopathy."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "identifying a maternally inherited, homoplasmic m.14674T>C mt-tRNA(Glu) mutation in 17 patients from 12 families"
    explanation: Defines the principal causal lesion — a homoplasmic mt-tRNA(Glu) (MT-TE) mutation in 17 patients from 12 families.
  - reference: PMID:21194154
    reference_title: "Reversible infantile respiratory chain deficiency: a clinical and molecular study."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "we identified a homoplasmic m.14674T>C or m.14674T>G mitochondrial transfer RNA-glutamate mutation"
    explanation: Confirms both m.14674T>C and m.14674T>G mt-tRNA(Glu) variants as causal across an independent patient series.
  - reference: PMID:21194154
    reference_title: "Reversible infantile respiratory chain deficiency: a clinical and molecular study."
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: "Northern blot analysis revealed decreased levels of mitochondrial transfer RNA-glutamate molecules"
    explanation: The mutation lowers steady-state mt-tRNA(Glu), the proximate cause of impaired mitochondrial translation.
  - reference: PMID:23814040
    reference_title: "Altered 2-thiouridylation impairs mitochondrial translation in reversible infantile respiratory chain deficiency."
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: "down-regulation of TRMU in RIRCD impairs 2-thiouridylation and exacerbates the effect of the mt-tRNA(Glu) mutation by triggering a mitochondrial translation defect in vitro"
    explanation: Links reduced mt-tRNA(Glu) 2-thiouridylation (a TRMU-dependent modification) to worsening of the translation defect.
  downstream:
  - target: Respiratory Chain (Complex IV) Deficiency in Skeletal Muscle
    causal_link_type: DIRECT
    description: Impaired mitochondrial translation reduces synthesis of mtDNA-encoded respiratory chain subunits, producing a Complex IV-predominant respiratory chain deficiency.
- name: Respiratory Chain (Complex IV) Deficiency in Skeletal Muscle
  description: >
    The mitochondrial translation defect lowers production of mtDNA-encoded
    cytochrome c oxidase subunits, producing a respiratory chain deficiency that
    affects predominantly Complex IV and variably Complexes I and III in skeletal
    muscle and patient-derived cybrids. The deficiency is tissue- and
    differentiation-dependent: it is seen in mature muscle and cybrids but not in
    naive myoblasts, indicating that nuclear-encoded factors can compensate.
  cell_types:
  - preferred_term: skeletal muscle cell
    term:
      id: CL:0000188
      label: cell of skeletal muscle
  biological_processes:
  - preferred_term: mitochondrial electron transport, cytochrome c to oxygen
    term:
      id: GO:0006123
      label: mitochondrial electron transport, cytochrome c to oxygen
    modifier: DECREASED
  - preferred_term: mitochondrial ATP synthesis coupled electron transport
    term:
      id: GO:0042775
      label: mitochondrial ATP synthesis coupled electron transport
    modifier: DECREASED
  evidence:
  - reference: PMID:21194154
    reference_title: "Reversible infantile respiratory chain deficiency: a clinical and molecular study."
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: "cybrids derived from patients showed decreased activity of respiratory complexes IV, and/or I, III; however, this was normal in naive myoblasts"
    explanation: Patient muscle and cybrids show a Complex IV-predominant (and variably I/III) deficiency that is absent in naive myoblasts, demonstrating the differentiation-dependent biochemical defect.
  downstream:
  - target: Infantile Mitochondrial Myopathy
    causal_link_type: DIRECT
    description: Bioenergetic failure from the respiratory chain deficiency produces the infantile COX-deficient mitochondrial myopathy.
  - target: Developmental Compensation and Spontaneous Recovery
    causal_link_type: INDIRECT_UNKNOWN_INTERMEDIATES
    description: Nuclear-encoded compensatory mechanisms progressively restore respiratory chain activity with development, driving the characteristic reversal.
- name: Infantile Mitochondrial Myopathy
  description: >
    In the symptomatic phase, bioenergetic failure in skeletal muscle produces a
    profound infantile myopathy with hypotonia, feeding difficulties, and lactic
    acidosis presenting within the first months of life, frequently requiring
    respiratory support. Muscle histopathology shows ragged-red and COX-negative
    fibres with increased lipid and/or glycogen. Clinical involvement is largely
    confined to skeletal muscle, although basal ganglia lesions have been
    reported in a subset.
  cell_types:
  - preferred_term: skeletal muscle cell
    term:
      id: CL:0000188
      label: cell of skeletal muscle
  evidence:
  - reference: PMID:21931168
    reference_title: "Reversible infantile respiratory chain deficiency is a unique, genetically heterogenous mitochondrial disease."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Patients presented with subacute onset of profound hypotonia, feeding difficulties and lactic acidosis within the first months of life"
    explanation: Describes the symptomatic infantile presentation of the myopathy.
  - reference: PMID:21931168
    reference_title: "Reversible infantile respiratory chain deficiency is a unique, genetically heterogenous mitochondrial disease."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Histopathological findings in muscle included increased lipid and/or glycogen content, ragged-red and COX negative fibres"
    explanation: Documents the COX-deficient mitochondrial myopathy on muscle histopathology.
  - reference: PMID:21194154
    reference_title: "Reversible infantile respiratory chain deficiency: a clinical and molecular study."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Clinical symptoms were limited to skeletal muscle and improved spontaneously in all cases; however, 2 siblings had basal ganglia lesions"
    explanation: Establishes the predominantly skeletal-muscle phenotype with occasional basal ganglia involvement.
  downstream:
  - target: Profound Hypotonia
    causal_link_type: DIRECT
    description: Myopathic weakness presents as profound infantile hypotonia.
  - target: Lactic Acidosis
    causal_link_type: DIRECT
    description: Impaired oxidative phosphorylation shifts metabolism toward lactate, producing lactic acidosis.
  - target: Feeding Difficulties
    causal_link_type: DIRECT
    description: Bulbar and generalized myopathic weakness impairs feeding.
  - target: Mitochondrial Myopathy with Ragged-Red and COX-Negative Fibers
    causal_link_type: DIRECT
    description: The respiratory chain deficiency produces the characteristic ragged-red and COX-negative fiber histopathology in skeletal muscle.
  - target: Respiratory Insufficiency
    causal_link_type: DIRECT
    description: Generalized myopathic weakness of respiratory muscles produces respiratory insufficiency requiring ventilatory support.
  - target: Abnormal Basal Ganglia Morphology
    causal_link_type: INDIRECT_UNKNOWN_INTERMEDIATES
    description: Basal ganglia lesions occur in a small subset, possibly reflecting energy failure extending beyond skeletal muscle.
- name: Developmental Compensation and Spontaneous Recovery
  description: >
    The hallmark of RIRCD is spontaneous clinical and biochemical recovery over
    the first one to three years of life. Recovery is attributed to
    tissue-specific, largely nuclear-encoded compensatory mechanisms rather than
    change in the homoplasmic mtDNA mutation load. One proposed mechanism — a
    developmental isoform switch of nuclear-encoded cytochrome c oxidase subunits
    (COX6A, COX7A) toward the heart/muscle isoforms around three months of age —
    was formally tested and refuted by Boczonadi et al. (2015): patient follow-up
    biopsies showed that the isoform switch does not contribute to disease
    manifestation or spontaneous recovery. The primary active mechanism is
    TRMU-dependent restoration of mt-tRNA 2-thiouridylation, which modulates the
    severity of the translation defect and drives age-dependent recovery in
    skeletal muscle. A mild residual myopathy may persist into adulthood.
  evidence:
  - reference: PMID:19720722
    reference_title: "Molecular basis of infantile reversible cytochrome c oxidase deficiency myopathy."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "tissue-specific mechanisms downstream of tRNA(Glu) may explain the spontaneous recovery"
    explanation: Attributes spontaneous recovery to tissue-specific downstream (nuclear) mechanisms rather than to the mtDNA mutation itself.
  - reference: PMID:21194154
    reference_title: "Reversible infantile respiratory chain deficiency: a clinical and molecular study."
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: "Normal respiratory chain enzyme activities in naive myoblasts suggested the compensatory influence of nuclear factors"
    explanation: Normal respiratory chain activity in naive myoblasts implicates compensatory nuclear factors underlying recovery.
  - reference: PMID:25666558
    reference_title: "Investigating the role of the physiological isoform switch of cytochrome c oxidase subunits in reversible mitochondrial disease."
    supports: REFUTE
    evidence_source: HUMAN_CLINICAL
    snippet: "the physiological isoform switch does not contribute to the clinical manifestation and to the spontaneous recovery of this disease"
    explanation: Patient follow-up biopsies formally refute the COX6A/COX7A isoform switch as a mechanism of spontaneous recovery in RIRCD.
  - reference: PMID:21931168
    reference_title: "Reversible infantile respiratory chain deficiency is a unique, genetically heterogenous mitochondrial disease."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "a mild myopathy persisted into adulthood"
    explanation: Recovery is remarkable but a mild residual myopathy may persist into adulthood.
