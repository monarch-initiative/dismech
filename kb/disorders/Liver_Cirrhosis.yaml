  evidence:
  - reference: PMID:37780566
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Acute decompensation of liver cirrhosis represents a watershed in prognosis and is characterized by the occurrence of clinical complications such as ascites, jaundice, hepatic encephalopathy, infections, or portal-hypertensive hemorrhages."
    explanation: Portal-hypertensive hemorrhages are identified as a key clinical complication of decompensated cirrhosis.
- name: Hepatorenal Syndrome
  category: Genitourinary
  frequency: OCCASIONAL
  description: >-
    Functional renal failure that develops in decompensated cirrhosis,
    particularly with ascites, and represents a severe cirrhosis complication.
  phenotype_term:
    preferred_term: Hepatorenal syndrome
    term:
      id: HP:0000083
      label: Renal insufficiency
  evidence:
  - reference: PMID:37159031
    reference_title: "Cirrhosis and Its Complications: A Review."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Among people with ascites, the annual incidence of spontaneous bacterial
      peritonitis is 11% and of hepatorenal syndrome is 8%
    explanation: >-
      This cirrhosis review identifies hepatorenal syndrome as a complication
      arising among people with cirrhotic ascites.
