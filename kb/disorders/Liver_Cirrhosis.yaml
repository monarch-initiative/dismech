treatments:
- name: Alcohol Abstinence
  description: Essential for alcoholic cirrhosis.
- name: Antiviral Therapy
  description: Curative for hepatitis C, suppressive for hepatitis B.
- name: Diuretics
  description: Spironolactone and furosemide for ascites management.
  evidence:
  - reference: PMID:37159031
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Compared with sequential initiation, combination aldosterone antagonist
      and loop diuretics were more likely to resolve ascites (76% vs 56%) with lower
      rates of hyperkalemia (4% vs 18%)."
    explanation: This JAMA review demonstrates that combination diuretic therapy with
      aldosterone antagonists and loop diuretics is effective for ascites resolution.
- name: Beta Blockers
  description: Non-selective beta blockers prevent variceal bleeding.
  evidence:
  - reference: PMID:37159031
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "In a 3-year randomized clinical trial of 201 patients with portal hypertension,
      nonselective β-blockers (carvedilol or propranolol) reduced the risk of decompensation
      or death compared with placebo (16% vs 27%)."
    explanation: This JAMA review provides RCT evidence that nonselective beta-blockers
      reduce decompensation and mortality risk in patients with portal hypertension.
- name: Lactulose
  description: Treats and prevents hepatic encephalopathy.
  evidence:
  - reference: PMID:37159031
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "In meta-analyses of randomized trials, lactulose was associated with
      reduced mortality relative to placebo (8.5% vs 14%) in randomized trials involving
      705 patients and reduced risk of recurrent overt hepatic encephalopathy (25.5%
      vs 46.8%) in randomized trials involving 1415 patients."
    explanation: This JAMA review summarizes meta-analysis evidence showing lactulose
      reduces both mortality and recurrent hepatic encephalopathy.
- name: Rifaximin
  description: Antibiotic for hepatic encephalopathy prophylaxis.
- name: Liver Transplantation
  description: Definitive treatment for decompensated cirrhosis.
- name: Hepatocellular Carcinoma Surveillance
  description: Regular ultrasound screening.
