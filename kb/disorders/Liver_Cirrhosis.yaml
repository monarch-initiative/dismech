name: Liver Cirrhosis
creation_date: '2025-12-18T17:01:35Z'
updated_date: '2026-03-27T16:35:00Z'
category: Complex
parents:
- Hepatic Disease
disease_term:
  preferred_term: cirrhosis of liver
  term:
    id: MONDO:0005155
    label: cirrhosis of liver
has_subtypes:
- name: Alcoholic Cirrhosis
  description: Cirrhosis due to chronic alcohol abuse.
- name: Viral Cirrhosis
  description: Cirrhosis from chronic hepatitis B or C infection.
- name: Non-Alcoholic Steatohepatitis Cirrhosis
  description: Cirrhosis from metabolic-associated fatty liver disease.
- name: Primary Biliary Cholangitis
  description: Autoimmune destruction of intrahepatic bile ducts.
- name: Primary Sclerosing Cholangitis
  description: Chronic inflammation and fibrosis of bile ducts.
pathophysiology:
- name: Hepatocyte Injury and Death
  description: >
    Chronic liver injury from any cause leads to ongoing hepatocyte death,
    triggering inflammation and regenerative responses that promote fibrosis.
  locations:
  - preferred_term: Liver
    term:
      id: UBERON:0002107
      label: liver
  cell_types:
  - preferred_term: Hepatocyte
    term:
      id: CL:0000182
      label: hepatocyte
  evidence:
  - reference: PMID:39063116
    reference_title: "Liver Fibrosis: From Basic Science towards Clinical Progress, Focusing on the Central Role of Hepatic Stellate Cells."
    supports: SUPPORT
    snippet: "Chronic liver injury leads to liver inflammation and fibrosis (LF) as
      critical determinants of long-term outcomes such as cirrhosis, liver cancer,
      and mortality."
    explanation: This review establishes that chronic liver injury is the
      initiating event leading to inflammation and fibrosis in cirrhosis
      development.
- name: Hepatic Stellate Cell Activation
  description: >
    Quiescent stellate cells transform into myofibroblasts, producing
    excessive collagen and extracellular matrix. This is the central
    event in liver fibrosis.
  locations:
  - preferred_term: Liver
    term:
      id: UBERON:0002107
      label: liver
  cell_types:
  - preferred_term: Hepatic Stellate Cell
    term:
      id: CL:0000632
      label: hepatic stellate cell
  biological_processes:
  - preferred_term: Collagen Biosynthesis
    term:
      id: GO:0032964
      label: collagen biosynthetic process
    modifier: INCREASED
  evidence:
  - reference: PMID:39063116
    reference_title: "Liver Fibrosis: From Basic Science towards Clinical Progress, Focusing on the Central Role of Hepatic Stellate Cells."
    supports: SUPPORT
    snippet: "LF is a wound-healing process characterized by excessive deposition
      of extracellular matrix (ECM) proteins due to the activation of hepatic stellate
      cells (HSCs). In the healthy liver, quiescent HSCs metabolize and store retinoids.
      Upon fibrogenic activation, quiescent HSCs transdifferentiate into myofibroblasts;
      lose their vitamin A; upregulate α-smooth muscle actin; and produce proinflammatory
      soluble mediators, collagens, and inhibitors of ECM degradation. Activated HSCs
      are the main effector cells during hepatic fibrogenesis."
    explanation: This review definitively establishes HSC activation and
      transdifferentiation into myofibroblasts as the central mechanism of liver
      fibrosis and cirrhosis.
  - reference: PMID:39063116
    reference_title: "Liver Fibrosis: From Basic Science towards Clinical Progress, Focusing on the Central Role of Hepatic Stellate Cells."
    supports: SUPPORT
    snippet: "The accumulation and activation of profibrogenic macrophages in response
      to hepatocyte death play a critical role in the initiation of HSC activation
      and survival."
    explanation: Macrophages play a key role in initiating and maintaining HSC
      activation, linking hepatocyte injury to stellate cell-mediated fibrosis.
- name: Portal Hypertension
  description: >
    Increased resistance to portal blood flow due to architectural
    distortion and nodule formation. Leads to varices, ascites, and
    splenomegaly.
  locations:
  - preferred_term: Hepatic Portal Vein
    term:
      id: UBERON:0001639
      label: hepatic portal vein
  - preferred_term: Hepatic Sinusoid
    term:
      id: UBERON:0001281
      label: hepatic sinusoid
  cell_types:
  - preferred_term: Endothelial Cell of Hepatic Sinusoid
    term:
      id: CL:1000398
      label: endothelial cell of hepatic sinusoid
  evidence:
  - reference: PMID:38642564
    reference_title: "Pathophysiology and therapeutic options for cirrhotic portal hypertension."
    supports: SUPPORT
    snippet: "Portal hypertension represents the primary non-neoplastic complication
      of liver cirrhosis and has life-threatening consequences, such as oesophageal
      variceal bleeding, ascites, and hepatic encephalopathy. Portal hypertension
      occurs due to increased resistance of the cirrhotic liver vasculature to portal
      blood flow and is further aggravated by the hyperdynamic circulatory syndrome."
    explanation: This comprehensive review establishes portal hypertension as
      the primary complication of cirrhosis, caused by increased intrahepatic
      vascular resistance and leading to major clinical complications.
  - reference: PMID:38642564
    reference_title: "Pathophysiology and therapeutic options for cirrhotic portal hypertension."
    supports: SUPPORT
    snippet: "Existing knowledge indicates that the profibrogenic phenotype acquired
      by sinusoidal cells is the initial factor leading to increased hepatic vascular
      tone and fibrosis, which cause increased vascular resistance and portal hypertension."
    explanation: This identifies the cellular mechanism by which sinusoidal cell
      dysfunction increases vascular resistance and drives portal hypertension
      development.
  - reference: PMID:38534382
    reference_title: "Tofogliflozin Delays Portal Hypertension and Hepatic Fibrosis by Inhibiting Sinusoidal Capillarization in Cirrhotic Rats."
    supports: SUPPORT
    snippet: "Liver cirrhosis leads to portal hypertension (PH) with capillarization
      of liver sinusoidal endothelial cells (LSECs), although drug treatment options
      for PH are currently limited."
    explanation: This study demonstrates that LSEC capillarization is a key
      pathological mechanism contributing to portal hypertension in cirrhosis.
  - reference: PMID:38534382
    reference_title: "Tofogliflozin Delays Portal Hypertension and Hepatic Fibrosis by Inhibiting Sinusoidal Capillarization in Cirrhotic Rats."
    supports: SUPPORT
    snippet: "Tofogliflozin prevented PH with attenuated intrahepatic vasoconstriction,
      sinusoidal capillarization, and remodeling independent of glycemic status in
      CCl4-treated rats."
    explanation: This experimental study demonstrates that preventing LSEC
      capillarization reduces portal hypertension, confirming the causal role of
      sinusoidal remodeling in PH development.
- name: Synthetic Dysfunction
  description: >
    Reduced hepatocyte mass impairs production of clotting factors,
    albumin, and other proteins, leading to coagulopathy and hypoalbuminemia.
  locations:
  - preferred_term: Liver
    term:
      id: UBERON:0002107
      label: liver
  biological_processes:
  - preferred_term: Protein Synthesis
    term:
      id: GO:0006412
      label: translation
  evidence:
  - reference: PMID:39063116
    reference_title: "Liver Fibrosis: From Basic Science towards Clinical Progress, Focusing on the Central Role of Hepatic Stellate Cells."
    supports: SUPPORT
    snippet: "Recent data demonstrated that LF can revert even at advanced stages
      of cirrhosis if the underlying cause is eliminated, which inhibits the inflammatory
      and profibrogenic cells."
    explanation: While addressing fibrosis reversibility, this demonstrates that
      loss of functional hepatocyte mass drives cirrhosis complications, and
      restoration depends on eliminating ongoing injury.
phenotypes:
- name: Ascites
  category: Gastrointestinal
  frequency: FREQUENT
  notes: Fluid accumulation in peritoneal cavity
  phenotype_term:
    preferred_term: Ascites
    term:
      id: HP:0001541
      label: Ascites
  evidence:
  - reference: PMID:38642564
    reference_title: "Pathophysiology and therapeutic options for cirrhotic portal hypertension."
    supports: SUPPORT
    snippet: "Portal hypertension represents the primary non-neoplastic complication
      of liver cirrhosis and has life-threatening consequences, such as oesophageal
      variceal bleeding, ascites, and hepatic encephalopathy."
    explanation: This establishes ascites as one of the major life-threatening
      complications arising from portal hypertension in cirrhosis.
- name: Jaundice
  category: Hepatic
  frequency: FREQUENT
  phenotype_term:
    preferred_term: Jaundice
    term:
      id: HP:0000952
      label: Jaundice
  evidence:
  - reference: PMID:37780566
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Acute decompensation of liver cirrhosis represents a watershed in prognosis
      and is characterized by the occurrence of clinical complications such as ascites,
      jaundice, hepatic encephalopathy, infections, or portal-hypertensive hemorrhages."
    explanation: This review identifies jaundice as one of the key clinical complications
      characterizing acute decompensation in liver cirrhosis.
- name: Hepatomegaly
  category: Hepatic
  frequency: FREQUENT
  notes: May become shrunken in advanced disease
  phenotype_term:
    preferred_term: Hepatomegaly
    term:
      id: HP:0002240
      label: Hepatomegaly
- name: Splenomegaly
  category: Hepatic
  frequency: FREQUENT
  notes: Due to portal hypertension
  phenotype_term:
    preferred_term: Splenomegaly
    term:
      id: HP:0001744
      label: Splenomegaly
  evidence:
  - reference: PMID:38642564
    reference_title: "Pathophysiology and therapeutic options for cirrhotic portal hypertension."
    supports: SUPPORT
    snippet: "Portal hypertension occurs due to increased resistance of the cirrhotic
      liver vasculature to portal blood flow and is further aggravated by the hyperdynamic
      circulatory syndrome."
    explanation: Splenomegaly results from portal hypertension and the
      hyperdynamic circulatory changes in cirrhosis, leading to splenic
      congestion.
- name: Coagulopathy
  category: Hematologic
  frequency: FREQUENT
  notes: Routine coagulation tests are often abnormal, but net hemostatic balance and bleeding risk are more nuanced in cirrhosis.
  phenotype_term:
    preferred_term: Coagulopathy
    term:
      id: HP:0003256
      label: Abnormality of the coagulation cascade
  evidence:
  - reference: PMID:22164337
    supports: PARTIAL
    evidence_source: HUMAN_CLINICAL
    snippet: "Patients with decompensated liver cirrhosis have significantly impaired
      synthetic function. Many proteins involved in the coagulation process are synthesized
      in the liver. Routinely performed tests of the coagulation are abnormal in patients
      with decompensated liver cirrhosis."
    explanation: This review supports abnormal routine coagulation testing in decompensated cirrhosis, but only partially supports a simple hemorrhagic coagulopathy phenotype because the same abstract emphasizes a rebalanced hemostatic state rather than uniformly increased bleeding tendency.
- name: Hepatic Encephalopathy
  category: Neurological
  frequency: OCCASIONAL
  notes: Confusion due to ammonia accumulation
  phenotype_term:
    preferred_term: Hepatic Encephalopathy
    term:
      id: HP:0002480
      label: Hepatic encephalopathy
  evidence:
  - reference: PMID:38642564
    reference_title: "Pathophysiology and therapeutic options for cirrhotic portal hypertension."
    supports: SUPPORT
    snippet: "Portal hypertension represents the primary non-neoplastic complication
      of liver cirrhosis and has life-threatening consequences, such as oesophageal
      variceal bleeding, ascites, and hepatic encephalopathy."
    explanation: This establishes hepatic encephalopathy as one of the major
      life-threatening complications of portal hypertension in cirrhosis.
- name: Fatigue
  category: Systemic
  frequency: VERY_FREQUENT
  phenotype_term:
    preferred_term: Fatigue
    term:
      id: HP:0012378
      label: Fatigue
