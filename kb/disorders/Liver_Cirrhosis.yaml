  presence: Elevated in hepatorenal syndrome
  context: >-
    Renal-function marker used to define and track hepatorenal syndrome
    reversal in cirrhosis treatment-response studies.
  readouts:
  - target: Hepatorenal Syndrome
    relationship: PHARMACODYNAMIC_MARKER_OF
    direction: NEGATIVE
    endpoint_context: PHARMACODYNAMIC
    regulatory_endpoint_refs:
    - FDA-SE-adult-noncancer-036
    interpretation: >-
      Lower serum creatinine during treatment reflects reversal or improvement
      of hepatorenal syndrome.
    evidence:
    - reference: PMID:33657294
      reference_title: "Terlipressin plus Albumin for the Treatment of Type 1 Hepatorenal Syndrome."
      supports: SUPPORT
      evidence_source: HUMAN_CLINICAL
      snippet: >-
        The primary end point was verified reversal of HRS, defined as two
        consecutive serum creatinine measurements of 1.5 mg per deciliter or
        less
      explanation: >-
        The phase 3 HRS-1 trial explicitly defines verified HRS reversal using
        serum creatinine thresholds, supporting creatinine as a pharmacodynamic
        response marker.
  biomarker_term:
