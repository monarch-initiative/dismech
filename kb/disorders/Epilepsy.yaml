genetic:
- name: SCN1A
  association: Causative
  notes: Dravet syndrome, GEFS+
  evidence:
  - reference: PMID:37812819
    reference_title: "Temporal manipulation of the Scn1a gene reveals its essential role in adult brain function."
    supports: SUPPORT
    snippet: "It is caused by haploinsufficiency of SCN1A gene encoding for the α-subunit
      of the voltage-gated sodium channel Nav1.1."
    explanation: Establishes SCN1A haploinsufficiency as the genetic cause of
      Dravet syndrome epileptic encephalopathy.
  - reference: PMID:37812819
    reference_title: "Temporal manipulation of the Scn1a gene reveals its essential role in adult brain function."
    supports: SUPPORT
    snippet: "Induction of heterozygous Nav1.1 mutation at P30 and P60 elicited susceptibility
      to the development of both spontaneous and hyperthermia-induced seizures and
      SUDEP rates comparable to P2-induced mice, with symptom onset accompanied by
      the characteristic GABAergic interneuron dysfunction."
    explanation: Demonstrates that SCN1A haploinsufficiency causes seizures
      through GABAergic interneuron dysfunction, and this mechanism is active
      throughout life, not just during development.
- name: SCN2A
  association: Causative
  notes: Early infantile epileptic encephalopathy
  evidence:
  - reference: PMID:31205438
    reference_title: "Biallelic SCN2A Gene Mutation Causing Early Infantile Epileptic Encephalopathy: Case Report and Review."
    supports: SUPPORT
    snippet: "The voltage-gated sodium channel neuronal type 2 alpha subunit
      (Navα1.2) encoded by the SCN2A gene causes early infantile epileptic
      encephalopathy (EIEE) inherited in an autosomal dominant manner."
    explanation: Establishes SCN2A mutations as a cause of early infantile
      epileptic encephalopathy.
- name: KCNQ2
  association: Causative
  notes: Benign familial neonatal seizures
  evidence:
  - reference: PMID:17675531
    reference_title: "Deletions or duplications in KCNQ2 can cause benign familial neonatal seizures."
    supports: SUPPORT
    snippet: "Benign familial neonatal seizures are most often caused by
      mutations in the voltage-gated potassium channel subunit gene KCNQ2. More
      than 60 mutations have been described in BFNS families, approximately
      half of which lead to protein truncation."
    explanation: Establishes KCNQ2 as the most common genetic cause of benign
      familial neonatal seizures.
- name: GABRA1
  association: Causative
  notes: Juvenile myoclonic epilepsy
  evidence:
  - reference: PMID:11992121
    reference_title: "Mutation of GABRA1 in an autosomal dominant form of juvenile myoclonic epilepsy."
    supports: SUPPORT
    snippet: "We report that an Ala322Asp mutation in GABRA1, encoding the alpha1
      subunit of the gamma-aminobutyric acid receptor subtype A (GABA(A)), is
      found in affected individuals of a large French Canadian family with
      juvenile myoclonic epilepsy."
    explanation: Establishes GABRA1 mutations as a cause of juvenile myoclonic
      epilepsy through GABA receptor dysfunction.
- name: CDKL5
  association: Causative
  notes: Early-onset epileptic encephalopathy
  evidence:
  - reference: PMID:20493745
    reference_title: "Epilepsy caused by CDKL5 mutations."
    supports: SUPPORT
    snippet: "Mutations in the cyclin-dependent kinase-like 5 gene (CDKL5) have
      been identified in female patients with early onset epileptic
      encephalopathy and severe mental retardation with a Rett-like phenotype."
    explanation: Establishes CDKL5 mutations as a cause of early-onset epileptic
      encephalopathy.
