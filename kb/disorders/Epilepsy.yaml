disease_term:
  preferred_term: epilepsy
  term:
    id: MONDO:0005027
    label: epilepsy
has_subtypes:
- name: Focal Epilepsy
  description: Seizures originate from a localized brain region.
- name: Generalized Epilepsy
  description: Seizures involve both hemispheres from onset.
- name: Temporal Lobe Epilepsy
  description: Most common focal epilepsy, often with mesial temporal sclerosis.
- name: Juvenile Myoclonic Epilepsy
  description: Generalized epilepsy with myoclonic, absence, and tonic-clonic
    seizures.
- name: Childhood Absence Epilepsy
  description: Frequent brief absence seizures beginning in childhood.
pathophysiology:
- name: Neuronal Hyperexcitability
  description: >
    Imbalance between excitatory (glutamate) and inhibitory (GABA)
    neurotransmission leads to synchronized, excessive neuronal firing.
    Ion channel dysfunction is a common mechanism.
  cell_types:
  - preferred_term: Pyramidal Neuron
    term:
      id: CL:0000598
      label: pyramidal neuron
  - preferred_term: GABAergic Interneuron
    term:
      id: CL:0000617
      label: GABAergic neuron
  biological_processes:
  - preferred_term: Synaptic Transmission
    term:
      id: GO:0007268
      label: chemical synaptic transmission
- name: Blood-Brain Barrier Disruption
  description: >
    Loss of tight junction proteins (claudin-5) in brain endothelial cells
    leads to blood-brain barrier breakdown, allowing albumin extravasation
    and disruption of ionic homeostasis.
  cell_types:
  - preferred_term: Endothelial Cell
    term:
      id: CL:0000115
      label: endothelial cell
  biological_processes:
  - preferred_term: Blood-Brain Barrier Maintenance
    term:
      id: GO:0035633
      label: maintenance of blood-brain barrier
  downstream:
  - target: Network Hyperexcitability
    description: BBB disruption causes albumin entry and altered ionic balance,
      increasing neuronal excitability.
  evidence:
  - reference: PMID:35422069
    reference_title: "Microvascular stabilization via blood-brain barrier regulation prevents seizure activity."
    supports: SUPPORT
    snippet: "claudin-5 protein levels are significantly diminished in surgically
      resected brain tissue from patients with treatment-resistant epilepsy. Concomitantly,
      dynamic contrast-enhanced MRI in these patients showed widespread BBB disruption."
    explanation: Demonstrates that BBB dysfunction occurs in human epilepsy
      patients and is characterized by loss of tight junction proteins.
  - reference: PMID:35422069
    reference_title: "Microvascular stabilization via blood-brain barrier regulation prevents seizure activity."
    supports: SUPPORT
    snippet: "inducible knockdown of claudin-5 in mice leads to spontaneous recurrent
      seizures, severe neuroinflammation, and mortality."
    explanation: Establishes causal role of BBB dysfunction in seizure
      generation, showing that disruption of endothelial tight junctions is
      sufficient to trigger spontaneous seizures.
  - reference: PMID:35422069
    reference_title: "Microvascular stabilization via blood-brain barrier regulation prevents seizure activity."
    supports: SUPPORT
    snippet: "RepSox, a regulator of claudin-5 expression, can prevent seizure activity
      in experimental epilepsy."
    explanation: Provides proof-of-concept that stabilizing the BBB through
      claudin-5 upregulation can prevent seizures, supporting BBB as a
      therapeutic target.
- name: Network Hyperexcitability
  description: >
    Abnormal synchronization of neuronal networks that can recruit
    adjacent or distant brain regions, leading to seizure propagation.
  biological_processes:
  - preferred_term: Neuronal Activity
    term:
      id: GO:0019226
      label: transmission of nerve impulse
- name: Neuroinflammation and Gliosis
  description: >
    Activation of microglia and reactive astrocytes following brain injury
    or during seizures, releasing inflammatory mediators and undergoing
    morphological changes that alter the brain microenvironment.
  cell_types:
  - preferred_term: Astrocyte
    term:
      id: CL:0000127
      label: astrocyte
  - preferred_term: Microglia
    term:
      id: CL:0000129
      label: microglial cell
  biological_processes:
  - preferred_term: Neuroinflammatory Response
    term:
      id: GO:0150076
      label: neuroinflammatory response
  downstream:
  - target: Synaptic Reorganization
    description: Inflammatory mediators and glial activation alter synaptic
      structure and connectivity.
- name: Synaptic Reorganization
  description: >
    Aberrant sprouting, formation of new synaptic connections, and
    altered synaptic plasticity that promote recurrent excitatory circuits
    and seizure susceptibility.
  biological_processes:
  - preferred_term: Synaptic Plasticity
    term:
      id: GO:0048167
      label: regulation of synaptic plasticity
- name: mTOR Pathway Hyperactivation
  description: >
    Constitutive activation of the mechanistic target of rapamycin (mTOR)
    signaling pathway, driving abnormal neuronal growth and development
    of dysmorphic neurons in focal cortical malformations.
  biological_processes:
  - preferred_term: mTOR Signaling
    term:
      id: GO:0031929
      label: TOR signaling
  downstream:
  - target: Dysmorphic Neuron Generation
    description: Hyperactive mTOR signaling causes abnormal neuronal soma
      enlargement and cytoskeletal changes.
  evidence:
  - reference: PMID:31174205
    reference_title: "Chronic mTORC1 inhibition rescues behavioral and biochemical deficits resulting from neuronal Depdc5 loss in mice."
    supports: SUPPORT
    snippet: "Treatment with the mTORC1 inhibitor rapamycin starting after 3 weeks
      of age significantly prolonged the survival of Depdc5cc+ mice and partially
      rescued the behavioral hyperactivity."
    explanation: Demonstrates that mTORC1 pathway hyperactivation caused by
      DEPDC5 loss drives epilepsy pathogenesis and that mTOR inhibition can
      rescue the phenotype.
  - reference: PMID:31174205
    reference_title: "Chronic mTORC1 inhibition rescues behavioral and biochemical deficits resulting from neuronal Depdc5 loss in mice."
    supports: SUPPORT
    snippet: "Rapamycin decreased the enlarged brain size of Depdc5cc+ mice with corresponding
      decrease in neuronal soma size."
    explanation: Shows that mTOR hyperactivation causes abnormal neuronal growth
      contributing to epileptogenesis, which can be reversed by mTOR inhibition.
- name: Dysmorphic Neuron Generation
  description: >
    Formation of abnormally enlarged neurons with cytoskeletal disruption
    and cellular senescence markers, creating epileptogenic foci in
    cortical malformations.
  evidence:
  - reference: PMID:38710875
    reference_title: "Targeting pathological cells with senolytic drugs reduces seizures in neurodevelopmental mTOR-related epilepsy."
    supports: PARTIAL
    snippet: "We uncovered multiple signatures of cellular senescence in these pathological
      cells, including p53/p16 expression, SASP expression and senescence-associated
      β-galactosidase activity."
    explanation: Supports senescence signatures in pathological cells of
      mTOR-related FCD, but only partially supports all structural details in
      this descriptor.
  - reference: PMID:38710875
    reference_title: "Targeting pathological cells with senolytic drugs reduces seizures in neurodevelopmental mTOR-related epilepsy."
    supports: PARTIAL
    snippet: "administration of senolytic drugs (dasatinib/quercetin) decreases the
      load of senescent cells and reduces seizure frequency in an MtorS2215F FCDII
      preclinical mouse model"
    explanation: Supports seizure reduction via senolytics in an mTOR-related
      model, but only partially supports this broader dysmorphic neuron
      descriptor.
