treatments:
- name: Antiseizure Medications
  description: First-line treatment - levetiracetam, lamotrigine, valproate,
    carbamazepine.
  evidence:
  - reference: PMID:30587993
    reference_title: "Levetiracetam for epilepsy: an evidence map of efficacy, safety and economic profiles."
    supports: SUPPORT
    snippet: "Meta-analysis of the included RCTs indicated that LEV was as
      effective as carbamazepine (CBZ; treatment for 6 months: 58.9% vs 64.8%,
      OR=0.76, 95% CI: 0.50-1.16; 12 months: 54.9% vs 55.5%, OR=1.24, 95% CI:
      0.79-1.93), oxcarbazepine (57.7% vs 59.8%, OR=1.34, 95% CI: 0.34-5.23),
      phenobarbital (50.0% vs 50.9%, OR=1.20, 95% CI: 0.51-2.82) and lamotrigine
      (LTG; 61.5% vs 57.7%, OR=1.22, 95% CI: 0.90-1.66)."
    explanation: Meta-analysis demonstrates comparable efficacy of levetiracetam
      with other first-line antiseizure medications.
- name: Ketogenic Diet
  description: High-fat, low-carbohydrate diet effective for drug-resistant
    epilepsy.
  evidence:
  - reference: PMID:18456557
    reference_title: "The ketogenic diet for the treatment of childhood epilepsy: a randomised controlled trial."
    supports: SUPPORT
    snippet: "28 children (38%) in the diet group had greater than 50% seizure
      reduction compared with four (6%) controls (p<0.0001), and five children
      (7%) in the diet group had greater than 90% seizure reduction compared
      with no controls"
    explanation: Landmark RCT demonstrating significant seizure reduction with
      ketogenic diet in drug-resistant childhood epilepsy.
- name: Vagus Nerve Stimulation
  description: Implanted device for drug-resistant epilepsy.
  evidence:
  - reference: PMID:21838505
    reference_title: "Vagus nerve stimulation for epilepsy: a meta-analysis of efficacy and predictors of response."
    supports: SUPPORT
    snippet: "After VNS, seizure frequency was reduced by an average of 45%, with
      a 36% reduction in seizures at 3-12 months after surgery and a 51%
      reduction after > 1 year of therapy."
    explanation: Meta-analysis of 74 studies with 3321 patients demonstrates VNS
      efficacy in medically refractory epilepsy.
- name: Epilepsy Surgery
  description: Resection of seizure focus for drug-resistant focal epilepsy.
  evidence:
  - reference: PMID:11484687
    reference_title: "A randomized, controlled trial of surgery for temporal-lobe epilepsy."
    supports: SUPPORT
    snippet: "At one year, the cumulative proportion of patients who were free of
      seizures impairing awareness was 58 percent in the surgical group and 8
      percent in the medical group (P<0.001)."
    explanation: Landmark RCT in NEJM demonstrating surgery is superior to
      prolonged medical therapy for temporal-lobe epilepsy.
- name: Responsive Neurostimulation
  description: Closed-loop brain stimulation for focal epilepsy.
  evidence:
  - reference: PMID:32690786
    reference_title: "Nine-year prospective efficacy and safety of brain-responsive neurostimulation for focal epilepsy."
    supports: SUPPORT
    snippet: "At 9 years, the median percent reduction in seizure frequency was
      75% (p < 0.0001, Wilcoxon signed rank), responder rate was 73%, and 35%
      had a ≥90% reduction in seizure frequency."
    explanation: Nine-year prospective study demonstrates sustained efficacy and
      safety of brain-responsive neurostimulation.
- name: Deep Brain Stimulation
  description: Anterior thalamic stimulation for drug-resistant epilepsy.
  evidence:
  - reference: PMID:25663221
    reference_title: "Long-term efficacy and safety of thalamic stimulation for drug-resistant partial epilepsy."
    supports: SUPPORT
    snippet: "The median percent seizure reduction from baseline at 1 year was
      41%, and 69% at 5 years. The responder rate (≥50% reduction in seizure
      frequency) at 1 year was 43%, and 68% at 5 years."
    explanation: SANTE trial 5-year follow-up demonstrates sustained efficacy of
      anterior thalamic deep brain stimulation.
