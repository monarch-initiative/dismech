discussions:
- discussion_id: gap_katnb1_cilia_hedgehog_human_model_mismatch
  prompt: >-
    Does the centriole-amplification / supernumerary-cilia / deficient-Hedgehog
    arm seen in Katnb1-null mouse cells operate in human KATNB1 disease, given
    that patient-derived human iPSC neural stem cells do not reproduce the excess
    cilia or reduced Shh signaling and affected humans lack classic ciliopathy/
    Shh features (e.g., holoprosencephaly, laterality defects, polydactyly)?
  kind: HUMAN_MODEL_MISMATCH
  status: OPEN
  attaches_to:
  - pathophysiology#Centriole Amplification, Supernumerary Cilia, and Deficient Hedgehog Signaling
  rationale: >-
    The cilia/Hedgehog arm is well documented in Katnb1-null mouse embryos and
    mouse embryonic fibroblasts (supernumerary cilia, failed Gli3 ciliary
    accumulation, holoprosencephaly), but the authors report that NSCs derived
    from patient human iPSCs do not develop excess cilia or decreased Shh
    signaling, and the identified human alleles are most likely hypomorphic
    rather than null. Affected humans also lack the midline patterning, laterality,
    and digit anomalies typical of ciliary/Shh dysfunction. The mismatch matters
    because the in vivo mechanistic evidence for this arm rests on mouse models
    that may overstate its contribution to the human disease, where the dominant
    lesion is centrosome/spindle-driven progenitor depletion and impaired
    migration. Resolving it determines whether the Hedgehog branch belongs in the
    human pathograph or is a model-system-specific consequence of complete loss
    of function.
  proposed_experiments:
  - experiment_id: exp_katnb1_human_organoid_cilia_shh
    name: KATNB1 human cortical organoid centriole/cilia/Hedgehog assay
    description: >-
      Generate isogenic KATNB1-null and patient-variant human iPSC-derived
      cortical organoids and quantify centriole number, ciliary number, Gli/Shh
      target induction, progenitor proliferation, and apoptosis relative to
      controls, to test whether the cilia/Hedgehog arm operates in human tissue
      and whether it depends on null versus hypomorphic allele dosage.
    experiment_type:
      preferred_term: iPSC organoid perturbation assay
    model_systems:
    - name: Human iPSC-derived cortical organoid
      description: >-
        Cortical organoid differentiated from patient-derived or gene-edited
        human iPSCs carrying KATNB1 loss-of-function variants.
      experimental_model_type: ORGANOID
notes: >-
  This entry was seeded from the cortical-malformation curation epic (Romero,
  Bahi-Buisson & Francis, Semin Cell Dev Biol 2018, section 3) and issue #4090,
  but all evidence is drawn from and verified against the primary reports:
  Mishra-Gorur et al., Neuron 2014 (PMID:25521378); Hu et al., Neuron 2014
  (PMID:25521379, "Katanin p80 regulates human cortical development by limiting
  centriole and cilia number"); and Jin et al., Sci Rep 2017 (PMID:28079116).
  The KATNB1 phenotype is lumped as one entry whose shared skeleton is
  katanin-dependent microtubule remodeling failure in progenitors and migrating
  neurons, with MRI-phenotype variation (microcephaly, simplified gyral pattern,
  microlissencephaly) modeled as downstream outputs rather than separate
  entries. The seeding review additionally describes periventricular and
  subcortical band heterotopia within the broader KATNB1 spectrum; those
  phenotypes are not asserted here because they are not documented in the three
  primary reports used for evidence, and should be added only with directly
  quotable primary-literature support. KATNB1 is anchored to MONDO:0014534
  (OMIM:616212, LIS6). The gene is HGNC:6217 (the seeding issue's "hgnc:6400"
  was incorrect and was corrected during curation).
