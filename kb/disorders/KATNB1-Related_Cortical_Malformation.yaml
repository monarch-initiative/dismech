name: KATNB1-Related Cortical Malformation
creation_date: "2026-06-12T04:30:00Z"
category: Mendelian
disease_term:
  preferred_term: KATNB1-related cortical malformation
  term:
    id: MONDO:0014534
    label: lissencephaly 6 with microcephaly
parents:
- Lissencephaly Spectrum Disorders
description: >-
  KATNB1-related cortical malformation is an autosomal recessive malformation of
  cortical development caused by biallelic loss-of-function variants in KATNB1,
  which encodes the p80 non-catalytic regulatory subunit of the
  microtubule-severing enzyme katanin (a heterodimer of p80/KATNB1 and the p60
  catalytic subunit KATNA1). Affected individuals, often from consanguineous
  families, present with severe congenital microcephaly together with a
  simplified gyral pattern, severe pachygyria, or microlissencephaly, plus
  global developmental delay and seizures. The unifying lesion is failure of
  katanin-dependent microtubule remodeling in dividing radial-glial progenitors
  and in migrating neurons. Loss of p80 destabilizes p60 and disrupts the
  centrosome/spindle apparatus, producing supernumerary centrioles, multipolar
  spindles, and impaired asymmetric progenitor division; in model systems it
  additionally amplifies mother centrioles and cilia with deficient Hedgehog
  signaling. The net effect is depletion of the neural-progenitor pool
  (reduced proliferation plus increased apoptosis) and impaired neuronal
  migration, yielding reduced cortical neuron output and a microcephaly-to-
  microlissencephaly spectrum. The entry is anchored to MONDO:0014534
  (OMIM:616212, "lissencephaly 6 with microcephaly", LIS6). It is modeled as a
  progenitor centrosome/spindle malformation that also carries a postmitotic
  neuronal-migration branch, and is the cortical-malformation counterpart of the
  microtubule-severing arm of corticogenesis.
pathophysiology:
- name: Loss of Katanin p80 Function and Centrosome/Spindle Disruption
  conforms_to: "neural_progenitor_centrosome_spindle_dysfunction#Centrosome and Mitotic Spindle Perturbation"
  description: >-
    Biallelic KATNB1 variants disrupt the N-terminal WD40 repeats of the p80
    regulatory subunit, reducing p80 protein and destabilizing the p60 catalytic
    subunit (KATNA1), so katanin-dependent microtubule severing fails. Mutant
    KATNB1 shows disrupted interactions with KATNA1 and other
    microtubule-associated proteins, and p80 normally cooperates with NuMA and
    cytoplasmic dynein to remodel microtubules and form spindle asters. The
    consequence is a defective centrosome/spindle apparatus with supernumerary
    centrioles and multipolar spindles in dividing cells.
  cell_types:
  - preferred_term: Radial glial cell
    term:
      id: CL:0000681
      label: radial glial cell
  - preferred_term: Fibroblast (patient-derived)
    term:
      id: CL:0000057
      label: fibroblast
