genetic:
- name: KATNB1
  gene_term:
    preferred_term: KATNB1
    term:
      id: hgnc:6217
      label: KATNB1
  association: Causal
  notes: >-
    KATNB1 encodes the p80 non-catalytic regulatory subunit of katanin. Biallelic
    loss-of-function variants (homozygous or compound heterozygous), frequently
    in consanguineous families, cause autosomal recessive cortical malformation
    anchored to MONDO:0014534 (OMIM:616212, "lissencephaly 6 with microcephaly",
    LIS6). Variants reduce p80 and secondarily destabilize the p60 catalytic
    subunit (KATNA1).
  evidence:
  - reference: PMID:25521378
    reference_title: "Mutations in KATNB1 cause complex cerebral malformations by disrupting asymmetrically dividing neural progenitors."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Exome sequencing analysis of over 2,000 children with complex malformations of cortical development identified five independent (four homozygous and one compound heterozygous) deleterious mutations in KATNB1, encoding the regulatory subunit of the microtubule-severing enzyme Katanin."
    explanation: Establishes KATNB1 as the causal gene through five independent recessive deleterious variants identified in a large cortical-malformation cohort.
  - reference: PMID:25521379
    reference_title: "Katanin p80 regulates human cortical development by limiting centriole and cilia number."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Here, we describe recessive mutations in KATNB1, encoding the p80 subunit of the microtubule-severing enzyme katanin, that cause severe microcephaly with simplification of cortical gyri and sulci, or microlissencephaly."
    explanation: Independent report of recessive KATNB1 mutations causing the cortical malformation, confirming causality.
