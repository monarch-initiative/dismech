- name: Impaired Asymmetric Progenitor Division and Cell-Cycle Progression
  conforms_to: "neural_progenitor_centrosome_spindle_dysfunction#Abnormal Progenitor Division and Fate Choice"
  description: >-
    The centrosome/spindle defect preferentially compromises the asymmetric
    divisions of radial-glial progenitors. In the developing Drosophila optic
    lobe, loss of the KATNB1 ortholog kat80 specifically affects asymmetrically
    dividing neuroblasts, which show supernumerary centrosomes and spindle
    abnormalities, cell-cycle progression delays, and reduced cell numbers. In
    mammalian cortex, intermediate progenitors generated by asymmetric divisions
    are disproportionately depleted, indicating that cells most dependent on
    asymmetric division are most vulnerable.
