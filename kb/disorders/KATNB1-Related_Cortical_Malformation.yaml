    neurogenesis and neuronal migration in the mouse embryonic brain, and these
    migration deficits are reproduced in patient-derived iPSCs and brain
    organoids. Impaired migration contributes to the lissencephalic/simplified
    cortical architecture alongside the reduced neuron number.
