- name: Neural Progenitor Pool Depletion
  conforms_to: "neural_progenitor_centrosome_spindle_dysfunction#Progenitor Pool Distortion"
  description: >-
    Defective progenitor division combined with increased cell death depletes
    the neural-progenitor pool during corticogenesis. Katnb1-null cortex shows
    fewer cycling progenitors and abundant apoptosis in the proliferative
    ventricular zones, and human iPSC-derived neural stem cells from a proband
    fail to grow and undergo widespread apoptosis. The contracted progenitor
    pool produces too few cortical neurons.
