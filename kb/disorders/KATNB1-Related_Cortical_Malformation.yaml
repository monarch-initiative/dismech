      label: centriole replication
    modifier: INCREASED
  evidence:
  - reference: PMID:25521378
    reference_title: "Mutations in KATNB1 cause complex cerebral malformations by disrupting asymmetrically dividing neural progenitors."
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: "Mitotic spindle formation is defective in patient-derived fibroblasts, a consequence of disrupted interactions of mutant KATNB1 with KATNA1, the catalytic subunit of Katanin, and other microtubule-associated proteins."
    explanation: Establishes that the pathogenic KATNB1 variants disrupt the katanin complex (p80-p60/KATNA1) and produce defective mitotic spindle formation in patient cells.
  - reference: PMID:28079116
    reference_title: "Katanin p80, NuMA and cytoplasmic dynein cooperate to control microtubule dynamics."
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: "we demonstrate that p80 regulates microtubule (MT) remodeling in combination with NuMA (nuclear mitotic apparatus protein) and cytoplasmic dynein."
    explanation: Defines the normal molecular role of p80 in microtubule remodeling with NuMA and dynein at the spindle pole, the function lost in disease.
  - reference: PMID:28079116
    reference_title: "Katanin p80, NuMA and cytoplasmic dynein cooperate to control microtubule dynamics."
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: "Importantly, p80 is essential for aster formation and maintenance in vitro."
    explanation: Shows p80 is required for mitotic aster formation, linking p80 loss to spindle-pole assembly failure.
  - reference: PMID:25521379
    reference_title: "Katanin p80 regulates human cortical development by limiting centriole and cilia number."
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: "iPSCs derived from Proband 1 displayed mitotic abnormalities in 51% of cells, compared to only 4% of control iPSCs"
    explanation: Patient-derived human iPSCs show a high rate of mitotic abnormalities, demonstrating the spindle defect in human cells.
  downstream:
  - target: Centriole Amplification, Supernumerary Cilia, and Deficient Hedgehog Signaling
  - target: Impaired Asymmetric Progenitor Division and Cell-Cycle Progression
- name: Centriole Amplification, Supernumerary Cilia, and Deficient Hedgehog Signaling
  description: >-
    Beyond the spindle, loss of katanin p80 dysregulates centriole number:
    Katnb1-null cells overduplicate centrioles and accumulate excess mother
    centrioles, which nucleate supernumerary primary cilia. The resulting
    multiple cilia fail to properly transduce Sonic hedgehog (Shh) signals,
    and Katnb1-null mouse embryos display hallmarks of aberrant Shh signaling
    including holoprosencephaly. This centriole/cilia/Hedgehog arm is prominent
    in mouse and is proposed to contribute to abnormal progenitor patterning,
    although its fidelity to human disease is uncertain (see discussion).
