name: Osteogenesis Imperfecta Type XX
creation_date: "2026-06-30T00:00:00Z"
category: Mendelian
disease_term:
  preferred_term: Osteogenesis imperfecta type 20
  term:
    id: MONDO:0032846
    label: osteogenesis imperfecta, type 20
description: >-
  Osteogenesis imperfecta type XX (OI type XX; MESD-related OI) is an autosomal
  recessive, progressively deforming brittle-bone disease caused by biallelic
  loss-of-function (hypomorphic) variants in MESD (Mesoderm Development LRP
  Chaperone; prior symbol MESDC2). MESD encodes an endoplasmic-reticulum (ER)
  chaperone required for the proper folding and surface trafficking of the
  canonical WNT co-receptors LRP5 and LRP6. Like WNT1-related OI type XV, OI type
  XX is therefore a WNT-signaling OI rather than a primary collagen-defect OI:
  the proximal lesion lies in the LRP5/LRP6-mediated WNT/beta-catenin
  osteoanabolic axis rather than in type I collagen. The OI-associated MESD
  alleles are truncating/frameshift mutations located downstream of the chaperone
  activity domain but upstream of the ER-retention domain; the resulting protein
  fails to be retained in the ER and significantly reduces (but does not
  completely eliminate) LRP5/LRP6 trafficking. Because complete MESD loss is
  embryonic-lethal in mice, viable human disease reflects these hypomorphic
  alleles. The consequence is diminished canonical WNT signaling in bone, reduced
  osteoblast-mediated bone formation, low bone mass, and severe skeletal
  fragility. Affected individuals have recurrent fractures with a progressively
  deforming phenotype; oligodontia (a reduced-LRP6 feature) is part of the
  spectrum, and complete loss-of-function alleles in the chaperone domain (e.g.,
  exon 2 frameshifts) produce a neonatal-lethal form with multiple intrauterine
  fractures and severe deformity. Because the defect is in WNT co-receptor
  trafficking, biologic agents that increase LRP5/LRP6-mediated WNT signaling are
  a proposed therapeutic strategy.
