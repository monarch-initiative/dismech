    description: >-
      Deficient WNT-driven osteoblast bone formation yields low bone mass and a
      mechanically weak, fracture-prone, progressively deforming skeleton.
- name: Reduced Bone Mass and Skeletal Fragility
  description: >-
    The deficit in WNT-driven osteoblast bone formation produces low bone mineral
    density, impaired and heterogeneous matrix mineralization, and impaired
    osseous development, manifesting clinically as recurrent fractures, growth
    deficiency, and progressive long-bone deformity. In the neonatal-lethal end
    of the spectrum, histology shows impaired osseous development with altered
    osteocyte morphology, reduced canalicular connectivity, and more heterogeneous
    matrix mineralization, alongside multiple intrauterine fractures and severe
    skeletal deformity.
