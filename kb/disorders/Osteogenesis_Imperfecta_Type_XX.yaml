  evidence:
  - reference: PMID:31564437
    reference_title: "Autosomal-Recessive Mutations in MESD Cause Osteogenesis Imperfecta."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Here, we report on five independent families with a progressively
      deforming type of OI, in whom we identified four homozygous truncation or
      frameshift mutations in MESD.
    explanation: >-
      Establishes the autosomal recessive inheritance of OI type XX from
      biallelic (homozygous) loss-of-function MESD variants across five families.
pathophysiology:
- name: MESD Loss Impairs ER Chaperoning and Trafficking of LRP5/LRP6
  description: >-
    MESD encodes an endoplasmic-reticulum chaperone protein for the canonical WNT
    signaling co-receptors LRP5 and LRP6, folding them and chaperoning their
    transit to the cell surface. The OI-associated MESD mutations are
    truncating/frameshift alleles located downstream of the chaperone activity
    domain but upstream of the ER-retention domain, so mutant MESD fails to be
    retained within the ER; this significantly reduces (but does not completely
    eliminate) LRP5/LRP6 trafficking. The proximal lesion is thus failure of WNT
    co-receptor maturation rather than a defect in type I collagen, placing OI
    type XX mechanistically alongside WNT1-related OI type XV.
