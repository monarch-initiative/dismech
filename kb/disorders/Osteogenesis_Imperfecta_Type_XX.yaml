      MESD-deficient bone, the mineralization defect underlying OI type XX.
genetic:
- name: MESD Loss-of-Function (Hypomorphic) Mutations
  association: Causative
  gene_term:
    preferred_term: MESD (Mesoderm Development LRP Chaperone; prior symbol MESDC2)
    term:
      id: hgnc:13520
      label: MESD
  notes: >-
    OI type XX is caused by biallelic loss-of-function variants in MESD (prior
    gene symbol MESDC2), the gene encoding the ER chaperone for the WNT
    co-receptors LRP5/LRP6. Reported OI-associated alleles are truncating or
    frameshift variants (e.g., c.632dupA p.Lys212Glufs, c.676C>T p.Arg226*)
    located downstream of the chaperone activity domain but upstream of the
    ER-retention domain, behaving as hypomorphic alleles. More proximal,
    complete-loss-of-function alleles in the chaperone domain (e.g., exon 2
    frameshifts) cause a neonatal-lethal form.
  evidence:
  - reference: PMID:31564437
    reference_title: "Autosomal-Recessive Mutations in MESD Cause Osteogenesis Imperfecta."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      we identified four homozygous truncation or frameshift mutations in MESD.
    explanation: >-
      Identifies MESD as the causative gene of OI type XX through biallelic
      truncation/frameshift mutations.
  - reference: PMID:35047842
    reference_title: "Biallelic variants in MESD, which encodes a WNT-signaling-related protein, in four new families with recessively inherited osteogenesis imperfecta."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      To date, two reports have linked Mesoderm Development LRP Chaperone (MESD)
      to autosomal recessive OI type XX.
    explanation: >-
      Confirms MESD (Mesoderm Development LRP Chaperone) as the OI type XX gene
      and spells out the gene name underlying the MESDC2 prior symbol.
  - reference: PMID:33596325
    reference_title: "Compound Heterozygous Frameshift Mutations in MESD Cause a Lethal Syndrome Suggestive of Osteogenesis Imperfecta Type XX."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      In each of the affected individuals, compound heterozygous mutations in
      MESD exon 2 and exon 3 were detected.
    explanation: >-
      Documents biallelic (compound heterozygous) MESD mutations, including a
      complete-loss-of-function exon 2 allele in the lethal form.
