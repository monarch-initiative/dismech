    snippet: >-
      MESD encodes an endoplasmic reticulum (ER) chaperone protein for the
      canonical Wingless-related integration site (WNT) signaling receptors LRP5
      and LRP6.
    explanation: >-
      Defines MESD as the ER chaperone for the WNT co-receptors LRP5/LRP6, the
      function lost in OI type XX.
  - reference: PMID:31564437
    reference_title: "Autosomal-Recessive Mutations in MESD Cause Osteogenesis Imperfecta."
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: >-
      Thus, OI-associated MESD mutations produce hypomorphic alleles whose
      failure to remain within the ER significantly reduces but does not
      completely eliminate LRP5 and LRP6 trafficking.
    explanation: >-
      Documents that the OI-associated MESD alleles are hypomorphic and reduce
      ER-dependent LRP5/LRP6 trafficking, the proximal molecular defect.
  - reference: PMID:35047842
    reference_title: "Biallelic variants in MESD, which encodes a WNT-signaling-related protein, in four new families with recessively inherited osteogenesis imperfecta."
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: >-
      MESD acts in the WNT signaling pathway, where it is thought to play a role
      in the folding of the WNT co-receptors low-density lipoprotein
      receptor-related proteins 5 and 6 (LRP5/LRP6) and in chaperoning their
      transit to the cell surface.
    explanation: >-
      Independent confirmation that MESD folds and chaperons LRP5/LRP6 to the
      cell surface within the WNT signaling pathway.
  downstream:
  - target: Reduced Canonical WNT/Beta-Catenin Signaling and Osteoblast Bone Formation
    description: >-
      Reduced LRP5/LRP6 co-receptor availability at the cell surface diminishes
      canonical WNT/beta-catenin signaling, impairing the osteoanabolic
      osteoblast bone-formation program.
- name: Reduced Canonical WNT/Beta-Catenin Signaling and Osteoblast Bone Formation
  description: >-
    With LRP5/LRP6 trafficking reduced, canonical WNT/beta-catenin signaling — the
    osteoanabolic axis essential for osteoblast differentiation and bone
    formation — is diminished. The phenotype mirrors the consequences of reduced
    LRP5 and LRP6 function: bone-mass accrual and dental patterning are inferred
    to be more sensitive to reduced canonical WNT signaling than other
    developmental processes, so the disease manifests predominantly as skeletal
    fragility (reduced LRP5) and oligodontia (reduced LRP6) without the eye, limb,
    or brain patterning defects of complete LRP5/LRP6 loss.
