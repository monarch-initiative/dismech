    label: Charcot-Marie-Tooth disease
parents:
- Peripheral Neuropathy
description: >-
  Charcot-Marie-Tooth disease (CMT) is the most common inherited disorder of
  the peripheral nervous system, with a prevalence of roughly 1 in 2,500.
  CMT is genetically and pathologically heterogeneous, with over 100 causative
  genes identified. This is the umbrella classification entry for the CMT family;
  the detailed pathophysiology is curated in two mechanism-coherent compartment
  entries that cleave the CMT pathograph at its natural seam — the primary
  cellular lesion. The demyelinating / Schwann-cell compartment (Charcot-Marie-Tooth
  disease type 1; PMP22, MPZ, GJB1) and the axonal / neuronal compartment
  (Charcot-Marie-Tooth disease type 2; MFN2, RAB7A, NEFL, GARS1, SORD) each hold
  gene-level mechanisms that converge on a single shared terminal node —
  length-dependent distal axonal degeneration — which produces the uniform
  clinical phenotype of slowly progressive distal weakness and atrophy, sensory
  loss, foot deformity (pes cavus, hammer toes), and depressed deep tendon
  reflexes regardless of the upstream gene. Inheritance can be autosomal dominant
  (most CMT1, CMT2), autosomal recessive (CMT4), or X-linked (CMTX). The single
  most common subtype is CMT1A, a 1.4 Mb duplication of chromosome 17p11.2
  containing PMP22. Hereditary neuropathy with liability to pressure palsies
  (HNPP), allelic to CMT1A but caused by the reciprocal PMP22 deletion, is curated
  separately because its terminal node differs (focal, reversible,
  compression-sensitive conduction block rather than dying-back degeneration).
has_subtypes:
- name: CMT1
  display_name: Charcot-Marie-Tooth Disease Type 1 (Demyelinating)
  description: >-
    Autosomal dominant demyelinating form with reduced motor nerve conduction
    velocities (<38 m/s in median nerve). The most common clinical category;
    in a 1,515-patient specialist cohort, CMT1 comprised 41.0% of cases and
    achieved the highest genetic diagnosis rate (96.8%). CMT1A (PMP22
    duplication) is the dominant subtype. Schwann cell dysfunction with
    onion-bulb formation on nerve biopsy.
  evidence:
  - reference: DOI:10.1093/brain/awae064
    reference_title: "Whole genome sequencing increases the diagnostic rate in Charcot-Marie-Tooth disease"
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "621 patients had CMT1 (41.0%)"
    explanation: Single-centre 1,515-patient specialist cohort quantifies CMT1 at 41.0% of CMT presentations.
- name: CMT2
  display_name: Charcot-Marie-Tooth Disease Type 2 (Axonal)
  description: >-
    Autosomal dominant axonal form with normal or near-normal nerve conduction
    velocities but reduced amplitudes. Primary axonal degeneration. Many
    causative genes identified including MFN2, MPZ, NEFL, GDAP1. Comprised
    19.4% of cases in the Brain 2024 specialist cohort, with a substantially
    lower genetic diagnosis rate (<50%) than CMT1.
  evidence:
  - reference: DOI:10.1093/brain/awae064
    reference_title: "Whole genome sequencing increases the diagnostic rate in Charcot-Marie-Tooth disease"
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "294 CMT2 (19.4%)"
    explanation: Specialist-cohort frequency of axonal CMT2.
  - reference: DOI:10.1093/brain/awae064
    reference_title: "Whole genome sequencing increases the diagnostic rate in Charcot-Marie-Tooth disease"
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Diagnostic rates remained less than 50% in CMT2, HMN and complex neuropathies."
    explanation: Quantifies the diagnostic gap in axonal CMT relative to demyelinating CMT1.
- name: CMTX
  display_name: X-Linked Charcot-Marie-Tooth Disease
  description: >-
    X-linked inheritance, most commonly caused by mutations in GJB1 encoding
    connexin-32 (CMTX1). Males more severely affected than carrier females.
    Intermediate electrophysiology between CMT1 and CMT2. GJB1 was the
    second most common genetic diagnosis (13.0% of solved cases) in the
    Brain 2024 cohort.
  evidence:
  - reference: DOI:10.1093/brain/awae064
    reference_title: "Whole genome sequencing increases the diagnostic rate in Charcot-Marie-Tooth disease"
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "then GJB1 (CMTX1; 151/1165, 13.0%)"
    explanation: GJB1/CMTX1 is the second most common genetically resolved CMT subtype.
- name: CMT4
  display_name: Charcot-Marie-Tooth Disease Type 4 (Autosomal Recessive)
  description: >-
    Autosomal recessive forms. Generally earlier onset and more severe than
    autosomal dominant CMT. Includes both demyelinating and axonal pathologies
    depending on the gene.
- name: HNPP
  display_name: Hereditary Neuropathy with Liability to Pressure Palsies
  description: >-
    Allelic to CMT1A but caused by deletion (rather than duplication) of the
    same chromosome 17p11.2 region containing PMP22. PMP22 underexpression
    leads to recurrent, focal, pressure-induced demyelinating mononeuropathies.
    Comprised 4.8% of cases (and 6.2% of solved diagnoses) in the Brain 2024
    cohort.
  evidence:
  - reference: DOI:10.1093/brain/awae064
    reference_title: "Whole genome sequencing increases the diagnostic rate in Charcot-Marie-Tooth disease"
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "PMP22 deletion (HNPP; 72/1165, 6.2%)"
    explanation: Frequency of PMP22-deletion-driven HNPP in the specialist cohort.
mechanistic_hypotheses:
- hypothesis_group_id: canonical_pmp22_mpz_axonal_demyelinating_neuropathy_model
  hypothesis_label: Canonical PMP22 / MPZ / Axonal & Demyelinating Peripheral Neuropathy Model
  status: CANONICAL
  description: >-
    Charcot-Marie-Tooth (CMT) disease is a clinically and genetically heterogeneous group of inherited
    peripheral neuropathies caused by variants in >100 genes encoding myelin components (PMP22, MPZ,
    GJB1), axonal cytoskeleton and transport proteins (MFN2, NEFL, KIF1B), and other Schwann-cell-axon
    interface factors. CMT1A (most common, PMP22 duplication on 17p11.2) produces demyelinating
    neuropathy through PMP22 overexpression-driven Schwann cell dysfunction and secondary axonal loss.
    Axonal CMT2 forms (MFN2, MPZ, others) primarily impair axonal function. The uniform clinical
    phenotype — distal motor and sensory loss in a length-dependent pattern, with foot deformity, distal
    weakness, and absent reflexes — reflects convergent length-dependent axonal degeneration regardless
    of upstream gene defect. The PMP22 duplication CMT1A mouse and rat models recapitulate the human
    phenotype, and PMP22-lowering ASO and PXT3003 (low-dose drug combination) corroborate the
    PMP22-dosage axis as a canonical mechanism in the most common subtype.
  notes: >-
    Retained as CANONICAL with seven major qualifications.
    The 2026 openscientist hypothesis-search report
    (kb/hypotheses/Charcot-Marie-Tooth_Disease/canonical_pmp22_mpz_axonal_demyelinating_neuropathy_model)
    finds SUPPORTED. Core architecture validated: PMP22
    duplication is 43-60% of diagnosed CMT; >130 genes show
    genetic heterogeneity; CMT1A and CMT2 subtypes converge on
    length-dependent axonal degeneration; transgenic models
    recapitulate the human phenotype. Seven substantive
    refinements: (1) CMT1A is fundamentally a DYSMYELINATING
    disorder with uniformly shortened internodes, NOT a
    segmental demyelinating neuropathy as classically taught;
    (2) PMP22 functions as a STRUCTURAL ORGANIZER of myelin
    architecture at nodes and Schmidt-Lanterman incisures, not
    merely a compact myelin component; (3) UPR / ER stress is a
    CONVERGENT pathomechanism across CMT1A and CMT1B (MPZ)
    subtypes; (4) SARM1 has been identified as the central
    EXECUTIONER of axonal degeneration in CMT2A, with a
    feedback loop to mitochondrial dysfunction (SARM1 inhibitors
    in development); (5) secondary neuroinflammation via
    macrophage-CSF1 signaling amplifies demyelination across
    CMT subtypes; (6) lipid metabolism dysregulation
    (sphingolipid, glycerophospholipid) and cholesterol
    trafficking defects are mechanistically linked to PMP22
    dosage; (7) human proof-of-concept for PMP22-lowering
    therapies remains the critical translational gap — all
    human trials to date (ascorbic acid x5, complement
    inhibition) failed except PXT3003 (modest Phase III, single
    trial). The PMP22-dosage axis is validated in rodents but
    not yet in humans. ASO and AAV9-miRNA gene therapies are
    advancing toward clinical translation.
  evidence:
  - reference: DOI:10.1093/brain/awae064
    reference_title: "Whole genome sequencing increases the diagnostic rate in Charcot-Marie-Tooth disease"
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "The most common genetic diagnosis was PMP22 duplication (CMT1A; 505/1165, 43.3%)"
    explanation: >
      Existing canonical mechanism citation in the dismech
      knowledge base, used as the seed for the hypothesis-search
      deep-research run.
