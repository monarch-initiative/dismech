    term:
      id: MAXO:0000011
      label: physical therapy
- name: Orthotic Bracing
  description: Ankle-foot orthoses to compensate for foot drop and improve gait.
  treatment_term:
    preferred_term: supportive care
    term:
      id: MAXO:0000950
      label: supportive care
- name: Genetic Counseling
  description: Counseling for affected individuals and families.
  treatment_term:
    preferred_term: Genetic Counseling
    term:
      id: NCIT:C15240
      label: Genetic Counseling
- name: PXT3003
  description: >-
    Oral fixed-dose combination of low-dose baclofen, naltrexone, and
    sorbitol designed to lower PMP22 expression and improve axonal
    function in CMT1A. Phase III trials (PLEO-CMT NCT02579759 completed,
    PREMIER NCT04762758).
  treatment_term:
    preferred_term: Pharmacotherapy
    term:
      id: NCIT:C15986
      label: Pharmacotherapy
  evidence:
  - reference: DOI:10.3390/genes14071391
    reference_title: "Therapeutic Strategies in Charcot-Marie-Tooth Disease"
    supports: SUPPORT
    evidence_source: OTHER
    snippet: "Compounds such as PXT3003, which are being clinically and preclinically investigated, and a broad array of therapeutic agents and their corresponding mechanisms are discussed."
    explanation: Establishes PXT3003 as an active clinical/preclinical therapeutic candidate for CMT.
- name: AAV9-MFN2 Gene Therapy
  description: >-
    Intrathecal delivery of an AAV9 vector expressing MFN2 to restore ER-mitochondria contacts
    and prevent axonal degeneration in CMT2A. In vivo studies demonstrate therapeutic efficacy
    even when administered after symptom onset, with good tolerability profile.
  therapeutic_modality: GENE_THERAPY
  treatment_term:
    preferred_term: gene therapy
    term:
      id: MAXO:0001001
      label: gene therapy
  evidence:
  - reference: PMID:42301793
    reference_title: "Restoring the interplay between the endoplasmic reticulum and mitochondria by gene therapy improves Charcot-Marie-Tooth type 2A disease"
    supports: SUPPORT
    evidence_source: MODEL_ORGANISM
    snippet: "Intrathecal delivery of an AAV9 vector expressing MFN2WT effectively targets motor and sensory neurons, restoring ER-mitochondria contacts and mitochondrial morphology, thereby preserving both neuromuscular junction integrity and motor function"
    explanation: Demonstrates that AAV9-MFN2 gene therapy restores ER-mitochondria contact homeostasis and prevents axonal degeneration in transgenic CMT2A models and patient-derived motor neurons.
