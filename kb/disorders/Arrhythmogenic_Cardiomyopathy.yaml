histopathology:
- name: Fibrofatty Replacement of Ventricular Myocardium
  finding_term:
    preferred_term: Abnormal cell morphology
    term:
      id: HP:0025461
      label: Abnormal cell morphology
  diagnostic: true
  description: >-
    Classic ACM histopathology shows fibrofatty replacement of ventricular
    myocardium with loss of residual cardiomyocytes. In the right-dominant form
    this is centered in the RV free wall, while in broader ACM the same process
    may extend into left-dominant and biventricular disease.
  evidence:
  - reference: PMID:33239987
    reference_title: "Focus on arrhythmogenic right ventricular cardiomyopathy."
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Arrhythmogenic Right Ventricular Cardiomyopathy (ARVC) is a primary heart
      muscle disease, characterized by progressive epi-endocardial replacement
      of cardiomyocytes with fibro-adipose tissue.
    explanation: >-
      Full-text review supports fibrofatty replacement as the defining
      histopathologic lesion and explicitly notes its epi-endocardial pattern.
  - reference: PMID:33239987
    reference_title: "Focus on arrhythmogenic right ventricular cardiomyopathy."
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Residual myocytes <60% on morphometric analysis (or <50% if estimated),
      with fibrous replacement of the RV free wall myocardium in ≥ 1 sample,
      with of without fatty replacement of tissue
    explanation: >-
      Full-text review captures the 2010 Task Force histomorphometric criterion
      for residual myocyte loss with fibrous or fibrofatty replacement.
- name: Myocardial Fibrosis with Epicardial Predominance
  finding_term:
    preferred_term: fibrosis
    term:
      id: NCIT:C3044
      label: Fibrosis
  description: >-
    The broader ACM spectrum includes progressive fibrotic replacement that
    often starts from the epicardium and contributes to scar-based arrhythmic
    substrate in right-dominant, left-dominant, and biventricular disease.
  evidence:
  - reference: PMID:32878278
    reference_title: "Established and Emerging Mechanisms in the Pathogenesis of Arrhythmogenic Cardiomyopathy: A Multifaceted Disease."
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      The pathological hallmark of ACM is a gradual replacement of the
      myocardium by fibroadiposis, which typically starts from the epicardium.
    explanation: >-
      Review abstract supports epicardial-predominant fibro-adipose replacement
      as a core histopathologic feature of ACM.
