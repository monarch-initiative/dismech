name: Arrhythmogenic Cardiomyopathy
creation_date: "2026-04-12T00:00:00Z"
updated_date: "2026-04-12T22:56:02Z"
description: >-
  Arrhythmogenic cardiomyopathy (ACM) is a heritable myocardial disease
  characterized by electrical instability, ventricular arrhythmias, sudden
  cardiac death risk, and progressive fibrofatty replacement of ventricular
  myocardium. Although historically described as a predominantly right
  ventricular disorder, ACM is now recognized as a phenotypic spectrum that
  includes right-dominant, biventricular, and left-dominant forms. Pathogenic
  variants most commonly affect desmosomal genes, but non-desmosomal genes
  involved in cytoskeletal organization, nuclear architecture, and
  excitation-contraction coupling also contribute to disease susceptibility and
  phenotypic heterogeneity.
category: Genetic
synonyms:
- ACM
- arrhythmogenic right ventricular cardiomyopathy
- ARVC
- arrhythmogenic right ventricular dysplasia/cardiomyopathy
- ARVD/C
parents:
- Cardiomyopathy
- Cardiovascular Disease
- Genetic Disorder
