    label: arrhythmogenic right ventricular cardiomyopathy
has_subtypes:
- name: Right-dominant ACM
  description: >-
    Classic phenotype with predominant right ventricular structural disease and
    ventricular arrhythmias.
  evidence:
  - reference: PMID:33239987
    reference_title: "Focus on arrhythmogenic right ventricular cardiomyopathy."
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      In the classic form of the disease right ventricle is predominantly
      affected.
    explanation: >-
      Review abstract supports the canonical right-dominant presentation of ACM.
- name: Biventricular ACM
  description: >-
    Phenotype with clinically important involvement of both ventricles,
    combining arrhythmia risk with progressive systolic dysfunction.
  evidence:
  - reference: PMID:33239987
    reference_title: "Focus on arrhythmogenic right ventricular cardiomyopathy."
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      However, biventricular and left-dominant variants have been recently
      recognized, leading to the new nosological definition of arrhythmogenic
      cardiomyopathy.
    explanation: >-
      Review abstract directly supports recognition of biventricular ACM as part
      of the broader disease spectrum.
- name: Left-dominant ACM
  description: >-
    Phenotype with predominant left ventricular injury, often associated with
    myocarditis-like inflammatory episodes and overlap with arrhythmogenic
    dilated cardiomyopathy.
  evidence:
  - reference: PMID:33239987
    reference_title: "Focus on arrhythmogenic right ventricular cardiomyopathy."
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      However, biventricular and left-dominant variants have been recently
      recognized, leading to the new nosological definition of arrhythmogenic
      cardiomyopathy.
    explanation: >-
      Review abstract directly supports recognition of left-dominant ACM as part
      of the umbrella disorder.
inheritance:
- name: Autosomal dominant
  inheritance_term:
    preferred_term: Autosomal dominant inheritance
    term:
      id: HP:0000006
      label: Autosomal dominant inheritance
  penetrance: INCOMPLETE
  description: >-
    Most familial ACM is inherited as an autosomal dominant disorder with
    incomplete penetrance and variable expressivity, although recessive
    cardiocutaneous syndromic forms also exist.
  evidence:
  - reference: PMID:34026867
    reference_title: "Electrocardiographic Screening of Arrhythmogenic Cardiomyopathy in Genotype-Positive and Phenotype-Negative Relatives."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Most common forms of arrhythmogenic cardiomyopathy are classically
      inherited in a dominant trait with incomplete penetrance and a variable
      clinical phenotype.
    explanation: >-
      Clinical family-screening study directly supports autosomal dominant
      inheritance with incomplete penetrance in the usual ACM presentation.
pathophysiology:
- name: Desmosomal and Connexome Disruption
  description: >-
    ACM most often begins with pathogenic variation in proteins of the
    desmosome and broader intercalated disc network. Defective cell-cell
    adhesion weakens mechanical coupling between cardiomyocytes and destabilizes
    the connexome, predisposing myocardium to electrical uncoupling, injury
    propagation, and progressive structural remodeling.
