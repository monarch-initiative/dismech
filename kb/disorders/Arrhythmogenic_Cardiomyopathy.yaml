    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Arrhythmogenic right ventricular cardiomyopathy is a myocardial disease
      generally caused by desmosomal mutations and characterized by progressive
      replacement of cardiomyocites with fibro-adipose tissue.
    explanation: >-
      Review abstract links ACM to desmosomal mutations and the defining
      fibro-adipose remodeling phenotype.
  - reference: PMID:32878278
    reference_title: "Established and Emerging Mechanisms in the Pathogenesis of Arrhythmogenic Cardiomyopathy: A Multifaceted Disease."
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Molecular genetic studies have identified causal mutations predominantly
      in genes encoding for desmosomal proteins; however, non-desmosomal causal
      mutations have also been described, including genes coding for nuclear
      proteins, cytoskeleton componentsand proteins involved in
      excitation-contraction coupling.
    explanation: >-
      Review abstract supports desmosomal predominance while capturing the
      broader non-desmosomal genetic architecture of ACM.
  downstream:
  - target: Gap Junction Remodeling
    description: >-
      Intercalated disc instability perturbs connexin-rich gap junction
      organization and slows conduction.
  - target: Fibro-Adipogenic Remodeling
    description: >-
      Junctional dysfunction activates downstream signaling programs that favor
      fibrosis and adipogenesis.
  - target: Myocardial Inflammation
    description: >-
      Ongoing cell injury and death can trigger inflammatory responses and
      myocarditis-like presentations.
- name: Gap Junction Remodeling
  description: >-
    Secondary remodeling of the intercalated disc reduces connexin43 expression
    and abnormalizes its localization, impairing electrical coupling between
    cardiomyocytes. This creates conduction delay and a re-entrant substrate
    that can precede overt ventricular remodeling.
