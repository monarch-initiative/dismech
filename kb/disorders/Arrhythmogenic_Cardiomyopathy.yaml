  evidence:
  - reference: PMID:16823493
    reference_title: "Suppression of canonical Wnt/beta-catenin signaling by nuclear plakoglobin recapitulates phenotype of arrhythmogenic right ventricular cardiomyopathy."
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: >-
      We show suppression of DP expression leads to nuclear localization of the
      desmosomal protein plakoglobin and a 2-fold reduction in canonical
      Wnt/beta-catenin signaling through Tcf/Lef1 transcription factors. The
      ensuing phenotype is increased expression of adipogenic and fibrogenic
      genes and accumulation of fat droplets.
    explanation: >-
      Primary mechanistic study links desmosomal disruption to Wnt suppression
      and adipogenic/fibrogenic reprogramming in ACM.
  - reference: PMID:32878278
    reference_title: "Established and Emerging Mechanisms in the Pathogenesis of Arrhythmogenic Cardiomyopathy: A Multifaceted Disease."
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Inhibition of the canonical Wnt/β-catenin pathway and activation of the
      Hippo and the TGF-β pathways have been implicated in the pathogenesis of
      ACM.
    explanation: >-
      Review abstract independently supports Wnt, Hippo, and TGF-beta pathway
      dysregulation as central ACM mechanisms.
  downstream:
  - target: Ventricular Arrhythmias
    description: >-
      Patchy fibro-fatty replacement creates heterogeneous conduction and
      re-entrant substrate.
  - target: Ventricular Dysfunction
    description: >-
      Progressive tissue loss and replacement impair ventricular systolic
      function and promote heart failure.
- name: Myocardial Inflammation
  description: >-
    Myocardial inflammation is increasingly recognized as a recurrent feature of
    ACM, especially in myocarditis-like inflammatory hot phases and left-dominant
    disease. Inflammation may both reflect ongoing myocyte injury and amplify
    remodeling, arrhythmic burden, and disease progression.
  evidence:
  - reference: PMID:37189393
    reference_title: "Myocardial Inflammation as a Manifestation of Genetic Cardiomyopathies: From Bedside to the Bench."
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      M-Infl resembling myocarditis on imaging and histology occurs frequently
      as a clinical manifestation of classically genetic cardiac diseases,
      including dilated and arrhythmogenic cardiomyopathy.
    explanation: >-
      Review abstract supports myocardial inflammation as a frequent clinical
      manifestation of ACM.
  - reference: PMID:34946881
    reference_title: "Imaging the \"Hot Phase\" of a Familiar Left-Dominant Arrhythmogenic Cardiomyopathy."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      We describe the case of a young man with an initial diagnosis of acute
      myocarditis that was finally recognized as a familial left-dominant
      arrhythmogenic cardiomyopathy. The diagnostic process was also based on
      demonstration, serial cardiac magnetic resonance imaging, and typical
      patterns of myocardial damage, including features of the disease's
      inflammatory "hot phase".
    explanation: >-
      Case report shows myocarditis-like inflammatory hot phases as a clinical
      manifestation of left-dominant ACM.
  downstream:
  - target: Fibro-Adipogenic Remodeling
    description: >-
      Inflammatory injury can intensify scar formation and ventricular
      remodeling.
  - target: Ventricular Dysfunction
    description: >-
      Recurrent inflammatory injury worsens myocardial damage and functional
      decline.
- name: Ventricular Arrhythmias
  description: >-
    Ventricular tachyarrhythmias are the hallmark clinical consequence of ACM
    and may occur even before overt structural abnormalities are evident. The
    arrhythmic substrate emerges from combined electrical uncoupling, scar, and
    fibrofatty heterogeneity across one or both ventricles.
  evidence:
  - reference: PMID:34026867
    reference_title: "Electrocardiographic Screening of Arrhythmogenic Cardiomyopathy in Genotype-Positive and Phenotype-Negative Relatives."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Arrhythmogenic cardiomyopathy is a hereditary cause of ventricular
      arrhythmias and sudden death.
    explanation: >-
      Human clinical study directly identifies ventricular arrhythmias as a core
      manifestation of ACM.
  - reference: PMID:39076647
    reference_title: "The Challenges of Diagnosis and Treatment of Arrhythmogenic Cardiomyopathy: Are We there yet?"
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      34 patients (47.2%) had 919 sustained episodes of ventricular arrhythmias
      (VA).
    explanation: >-
      ICD cohort data confirms the high burden of sustained ventricular
      arrhythmias in clinically manifest ACM.
  downstream:
  - target: Sudden Cardiac Death
    description: >-
      Malignant ventricular tachyarrhythmias can degenerate into sudden cardiac
      death.
- name: Ventricular Dysfunction
  description: >-
    Ongoing myocyte loss and fibro-fatty remodeling eventually lead to right,
    left, or biventricular systolic dysfunction with progressive heart failure.
    Advanced disease can culminate in refractory heart failure and cardiac
    transplantation.
  locations:
  - preferred_term: heart right ventricle
    term:
      id: UBERON:0002080
      label: heart right ventricle
  - preferred_term: heart left ventricle
    term:
      id: UBERON:0002084
      label: heart left ventricle
  evidence:
  - reference: PMID:39076647
    reference_title: "The Challenges of Diagnosis and Treatment of Arrhythmogenic Cardiomyopathy: Are We there yet?"
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      The progressive nature of ACM leads to severe biventricular enlargement
      and refractory heart failure, which pose significant treatment issues when
      a predominant RV dysfunction occurs owing to the reduced possibility for
      mechanical circulatory assistance.
    explanation: >-
      Clinical cohort and review data support late-stage ventricular enlargement
      and refractory heart failure as consequences of progressive ACM.
