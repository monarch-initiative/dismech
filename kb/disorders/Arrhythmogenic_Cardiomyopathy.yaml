  - reference: PMID:18662195
    reference_title: "Abnormal connexin43 in arrhythmogenic right ventricular cardiomyopathy caused by plakophilin-2 mutations."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Reduced connexin43 expression and localization to the intercalated disk
      occurs in heterozygous human PKP-2 mutations, potentially explaining the
      delayed conduction and propensity to develop arrhythmias seen in this
      disease.
    explanation: >-
      Human biopsy study provides direct evidence that ACM-related desmosomal
      defects drive connexin43 remodeling and arrhythmogenic conduction delay.
  downstream:
  - target: Ventricular Arrhythmias
    description: >-
      Reduced electrical coupling promotes slow conduction and re-entry.
- name: Fibro-Adipogenic Remodeling
