name: Niemann-Pick Disease Type E
creation_date: "2026-06-13T00:00:00Z"
description: >-
  Niemann-Pick disease type E is a historical, ill-defined nosologic label that was
  applied to rare (mostly adult) patients with Niemann-Pick-like lipid storage who did not
  fit the classic types A, B, or C. These patients showed hepatomegaly, foamy macrophage
  infiltration of tissues and bone marrow, partial acid sphingomyelinase deficiency, and
  sphingomyelin accumulation with variable neurological deterioration. In the molecular
  era, Niemann-Pick disease has been redefined as acid sphingomyelinase deficiency (ASMD;
  SMPD1) and Niemann-Pick disease type C (NPC1/NPC2), and the nosology of types D and E is
  no longer used. Patients historically labeled "type E" should be re-classified to ASMD,
  NPC, or another lysosomal disorder using enzyme activity, biomarkers, and molecular
  testing.
