differential_diagnoses:
- name: Acid sphingomyelinase deficiency (Niemann-Pick type B)
  description: >-
    The chronic visceral form of ASMD (SMPD1), one of the modern entities into which
    historical type E cases should be reclassified.
  disease_term:
    preferred_term: Niemann-Pick disease type B
    term:
      id: MONDO:0011871
      label: Niemann-Pick disease type B
  distinguishing_features:
  - Defined molecularly by SMPD1 variants and reduced acid sphingomyelinase activity, providing a precise diagnosis where "type E" did not.
  evidence:
  - reference: PMID:28164782
    reference_title: "Types A and B Niemann-Pick disease."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "The nosology of types D and E NPD are no longer used."
    explanation: "Type E is obsolete; such patients are reclassified to ASMD or NPC."
- name: Niemann-Pick disease type C
  description: >-
    The cholesterol-trafficking disorder (NPC1/NPC2) into which some historical adult
    Niemann-Pick cases are reclassified.
  disease_term:
    preferred_term: Niemann-Pick disease type C
    term:
      id: MONDO:0018982
      label: Niemann-Pick disease type C
  distinguishing_features:
  - Defined molecularly by NPC1/NPC2 defects of intracellular cholesterol transport.
  evidence:
  - reference: PMID:28164782
    reference_title: "Types A and B Niemann-Pick disease."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "We now know that type C NPD is due to defects in two distinct cholesterol-binding proteins (NPC1 and NPC2)."
    explanation: "Type C is the molecularly defined cholesterol-trafficking entity replacing parts of the historical C/D/E grouping."
definitions:
- name: Historical (deprecated) definition of Niemann-Pick disease type E
  definition_type: CASE_DEFINITION
  description: >-
    Niemann-Pick disease type E was a historical label for patients with Niemann-Pick-like
    lipid storage (hepatomegaly, foam cells, partial acid sphingomyelinase deficiency,
    sphingomyelin accumulation, neurological deterioration) who did not fit types A, B, or
    C. The label is obsolete; modern diagnosis reclassifies such patients into ASMD or NPC.
  scope: Disease-level historical case definition flagged as a deprecated nosologic label.
  evidence:
  - reference: PMID:28164782
    reference_title: "Types A and B Niemann-Pick disease."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "The nosology of types D and E NPD are no longer used."
    explanation: "Authoritative review states the type D and E nosology is obsolete."
discussions:
- discussion_id: gap_npe_obsolete_nosology
  prompt: >-
    Is "Niemann-Pick disease type E" a distinct disease entity, or an obsolete historical
    label whose cases should be reclassified into acid sphingomyelinase deficiency (SMPD1),
    Niemann-Pick disease type C (NPC1/NPC2), or another lysosomal disorder?
  kind: KNOWLEDGE_GAP
  status: OPEN
  attaches_to:
  - pathophysiology#Lysosomal Sphingomyelin and Lipid Storage with Foam Cell Infiltration
  rationale: >-
    Authoritative review states the nosology of types D and E Niemann-Pick disease is no
    longer used, and later case literature notes the biochemical nature of "type E" remains
    unclarified. The MONDO term is retained for historical mapping, but the entity has no
    established causal gene and should be resolved by enzyme, biomarker, and molecular
    testing into a modern diagnosis.
