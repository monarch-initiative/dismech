    Patients historically labeled type E showed partial acid sphingomyelinase deficiency
    with sphingomyelin accumulation and foamy macrophage (foam cell) infiltration of
    tissues and bone marrow, within the broader Niemann-Pick storage spectrum. The precise
    biochemical and molecular basis of the "type E" label was never clarified and is now
    subsumed under ASMD or NPC.
