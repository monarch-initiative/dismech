      disease definition.
- name: SMARCA4
  gene_term:
    preferred_term: SMARCA4
    term:
      id: hgnc:11100
      label: SMARCA4
  association: Rare Somatic/Germline Loss-of-Function
  notes: >-
    SMARCA4 alteration is a rare alternative driver in INI1-retained AT/RT and
