treatments:
- name: Allogeneic Hematopoietic Stem Cell Transplantation
  description: >
    HSCT is an emerging disease-modifying therapy increasingly offered to
    patients with CSF1R-ALSP, aiming to replace dysfunctional CSF1R-mutant
    microglia/brain macrophages with donor-derived cells. Outcomes are variable:
    gait problems as the predominant manifestation and younger age at transplant
    predict better outcomes, whereas a high burden of cognitive symptoms
    predicts worse outcomes.
  therapeutic_modality: CELL_THERAPY
  treatment_term:
    preferred_term: allogeneic hematopoietic stem cell transplantation
    term:
      id: MAXO:0001479
      label: allogeneic hematopoietic stem cell transplantation
  evidence:
  - reference: PMID:36559271
    reference_title: "Hematopoietic Stem Cell Transplantation in CSF1R-Related Leukoencephalopathy: Retrospective Study on Predictors of Outcomes."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Hematopoietic stem cell transplantation (HSCT) has been increasingly offered to patients with CSF1R-ALSP."
    explanation: >
      Documents HSCT as an emerging therapy increasingly used in CSF1R-ALSP.
  - reference: PMID:36559271
    reference_title: "Hematopoietic Stem Cell Transplantation in CSF1R-Related Leukoencephalopathy: Retrospective Study on Predictors of Outcomes."
    supports: PARTIAL
    evidence_source: HUMAN_CLINICAL
    snippet: "gait problems indicated a milder phenotype with better response to HSCT and good therapy outcomes. In contrast, patients with a higher burden of cognitive symptoms were most likely not to benefit from HSCT."
    explanation: >
      Outcomes are variable and depend on phenotype/timing, so HSCT benefit is
      partial and patient-dependent.
  - reference: PMID:31840744
    reference_title: "Allogeneic HSCT for adult-onset leukoencephalopathy with spheroids and pigmented glia."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Allogeneic HSCT may be beneficial in ALSP by providing a supply of bone marrow-derived brain-engrafting myeloid cells with donor wild-type CSF1R to repopulate the microglial niche."
    explanation: >
      Provides the mechanistic rationale for HSCT in ALSP: donor-derived myeloid
      cells with wild-type CSF1R engraft the brain and repopulate the dysfunctional
      microglial niche. The two-patient series showed MRI stabilization and partial
      clinical stabilization at >2 years.

- name: Supportive and Multidisciplinary Care
  description: >
    Mainstay management is multidisciplinary supportive care, including
    neurology, neuropsychological rehabilitation, physical, occupational, and
    speech-language therapy, psychotherapy, social support, and genetic
    counseling. Sedatives, antipsychotics, and other medications that decrease
    alertness or increase fall risk should be used cautiously in individuals
    with gait problems and cognitive decline.
  treatment_term:
    preferred_term: supportive care
    term:
      id: MAXO:0000950
      label: supportive care
  evidence:
  - reference: PMID:22934315
    reference_title: "CSF1R-Related Disorder."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Multidisciplinary care by specialists in neurology, psychotherapy, neuropsychological rehabilitation, physical therapy, occupational therapy, speech-language therapy, social services for family support, and genetic counseling."
    explanation: >
      GeneReviews specifies multidisciplinary supportive care as the management
      approach.
  - reference: PMID:22934315
    reference_title: "CSF1R-Related Disorder."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "sedatives, antipsychotics, and other medications that may decrease alertness and increase the risk of falling should be used cautiously"
    explanation: >
      GeneReviews "Agents/circumstances to avoid": caution with sedatives and
      antipsychotics in patients with gait problems and cognitive decline.

- name: Genetic Counseling
  description: >
    Genetic counseling is recommended given autosomal dominant (and, for
    biallelic early-onset disease, autosomal recessive) inheritance; predictive
    and prenatal/preimplantation genetic testing are possible once the familial
    CSF1R variant is known.
  treatment_term:
    preferred_term: Genetic Counseling
    term:
      id: NCIT:C15240
      label: Genetic Counseling
  evidence:
  - reference: PMID:22934315
    reference_title: "CSF1R-Related Disorder."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "predictive testing for at-risk relatives and prenatal and preimplantation genetic testing for CSF1R-related disorder are possible"
    explanation: >
      GeneReviews supports genetic counseling and predictive/prenatal testing
      once the familial variant is identified.

- name: iPSC-Derived Microglia Transplantation (experimental)
  description: >
    An emerging, preclinical microglia-replacement strategy. Transplantation of
    human iPSC-derived microglial (iMG) progenitors into a microglia-deficient
    (Csf1r FIRE-enhancer-deleted) ALSP mouse model restores a homeostatic
    microglial signature and prevents axonal spheroids, white-matter
    abnormalities, reactive astrocytosis, and brain calcifications. CRISPR-corrected
    ALSP-patient-derived iMG can reverse pre-existing pathology, supporting iMG
    transplantation as a candidate disease-modifying therapy. Not yet in human use.
  therapeutic_modality: CELL_THERAPY
  treatment_term:
    preferred_term: cellular therapy
    term:
      id: MAXO:0000016
      label: cellular therapy
  evidence:
  - reference: PMID:38897209
    reference_title: "Therapeutic potential of human microglia transplantation in a chimeric model of CSF1R-related leukoencephalopathy."
    supports: SUPPORT
    evidence_source: MODEL_ORGANISM
    snippet: "transplantation of human induced pluripotent stem cell (iPSC)-derived microglial (iMG) progenitors restores a homeostatic microglial signature and prevents the development of axonal spheroids, white matter abnormalities, reactive astrocytosis, and brain calcifications"
    explanation: >
      Preclinical proof of concept that iMG transplantation prevents ALSP-like
      neuropathology in the FIRE mouse model.
  - reference: PMID:38897209
    reference_title: "Therapeutic potential of human microglia transplantation in a chimeric model of CSF1R-related leukoencephalopathy."
    supports: SUPPORT
    evidence_source: MODEL_ORGANISM
    snippet: "transplantation of CRISPR-corrected ALSP-patient-derived iMG reverses pre-existing spheroids, astrogliosis, and calcification pathologies"
    explanation: >
      Transplantation of CRISPR-corrected patient-derived iMG into the ALSP mouse
      model reverses established pathology, supporting gene-corrected autologous
      microglia replacement as a therapeutic avenue.

clinical_trials:
- name: NCT05677659
  description: >
    The Ignite Study: a Phase 2, open-label study of iluzanebart (VGL101), a TREM2
    agonist monoclonal antibody, in CSF1R-mutation-confirmed ALSP patients,
    evaluating safety, tolerability, and effects on imaging and disease-progression
    biomarkers. The trial was subsequently terminated (status reflected on
    ClinicalTrials.gov).
  phase: PHASE_II
  status: TERMINATED
  target_phenotypes:
  - preferred_term: Abnormal cerebral white matter morphology
    term:
      id: HP:0002500
      label: Abnormal cerebral white matter morphology
  - preferred_term: Cognitive impairment
    term:
      id: HP:0100543
      label: Cognitive impairment
  evidence:
  - reference: clinicaltrials:NCT05677659
    reference_title: "A Phase 2 Safety, Tolerability, and Proof-of-Concept Study of VGL101 in Patients With Adult-Onset Leukoencephalopathy With Axonal Spheroids and Pigmented Glia (ALSP) (The Ignite Study)"
    supports: SUPPORT
    snippet: "This is a multicenter, open-label study to assess the safety and tolerability of iluzanebart (also referred to as VGL101) in subjects with documentation of a gene mutation in the CSF1R gene for the treatment of adult-onset leukoencephalopathy with axonal spheroids and pigmented glia (ALSP)"
    explanation: >
