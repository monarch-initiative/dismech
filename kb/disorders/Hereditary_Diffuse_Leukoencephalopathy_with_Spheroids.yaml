name: Hereditary Diffuse Leukoencephalopathy with Spheroids
creation_date: "2026-06-04T00:00:00Z"
category: Mendelian
synonyms:
- ALSP
- HDLS
- Adult-onset leukoencephalopathy with axonal spheroids and pigmented glia
- CSF1R-related leukoencephalopathy
disease_term:
  preferred_term: Hereditary diffuse leukoencephalopathy with spheroids
  term:
    id: MONDO:0800027
    label: leukoencephalopathy, diffuse hereditary, with spheroids 1
parents:
  - leukodystrophy
  - CSF1R-related disorder
description: >
  Hereditary diffuse leukoencephalopathy with spheroids (HDLS), also known as
  adult-onset leukoencephalopathy with axonal spheroids and pigmented glia
  (ALSP) or CSF1R-related leukoencephalopathy, is a rare, progressive
  white-matter neurodegenerative disease most commonly caused by heterozygous,
  typically autosomal dominant, pathogenic variants in CSF1R. CSF1R encodes the
  colony-stimulating factor 1 receptor, which is predominantly expressed on
  microglia, the resident brain macrophages. Impaired CSF1R signaling produces
  microglial dysfunction and a primary microgliopathy that drives demyelination,
  axonal degeneration with axonal spheroids, and accumulation of pigmented glia
  in cerebral white matter. Patients typically present in their 40s-50s with a
  frontotemporal-dementia-like phenotype, neuropsychiatric and personality
  changes, parkinsonism, pyramidal signs, gait disturbance, and seizures,
  progressing to a bedridden, vegetative state.

