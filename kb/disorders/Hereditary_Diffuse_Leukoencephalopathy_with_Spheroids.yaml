pathophysiology:
- name: Impaired Microglial CSF1R Signaling
  description: >
    CSF1R encodes the colony-stimulating factor 1 receptor, a receptor tyrosine
    kinase expressed predominantly on microglia. Disease-causing variants
    cluster in the tyrosine kinase domain and impair CSF-1-stimulated receptor
    autophosphorylation, producing partial loss of CSF1R function
    (haploinsufficiency). Because CSF1R is a crucial mediator of microglial
    proliferation, survival, and differentiation, impaired signaling causes
    microglial dysfunction that initiates the disease.
  cell_types:
  - preferred_term: microglial cell
    term:
      id: CL:0000129
      label: microglial cell
  biological_processes:
  - preferred_term: macrophage colony-stimulating factor signaling pathway
    term:
      id: GO:0038145
      label: macrophage colony-stimulating factor signaling pathway
    modifier: DECREASED
  molecular_functions:
  - preferred_term: macrophage colony-stimulating factor receptor activity
    term:
      id: GO:0005011
      label: macrophage colony-stimulating factor receptor activity
    modifier: DECREASED
  evidence:
  - reference: PMID:22197934
    reference_title: "Mutations in the colony stimulating factor 1 receptor (CSF1R) gene cause hereditary diffuse leukoencephalopathy with spheroids."
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: "In vitro, CSF-1 stimulation resulted in rapid autophosphorylation of selected tyrosine residues in the kinase domain of wild-type but not mutant CSF1R, suggesting that HDLS may result from partial loss of CSF1R function."
    explanation: >
      The discovery paper shows that HDLS-causing CSF1R mutations abolish
      CSF-1-stimulated autophosphorylation, establishing partial loss of CSF1R
      function as the molecular lesion.
  - reference: PMID:22197934
    reference_title: "Mutations in the colony stimulating factor 1 receptor (CSF1R) gene cause hereditary diffuse leukoencephalopathy with spheroids."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "As CSF1R is a crucial mediator of microglial proliferation and differentiation in the brain, our findings suggest an important role for microglial dysfunction in HDLS pathogenesis."
    explanation: >
      Links impaired CSF1R signaling to microglial dysfunction as the central
      pathogenic mechanism.
  downstream:
  - target: White Matter Degeneration with Axonal Spheroids
    causal_link_type: INDIRECT_UNKNOWN_INTERMEDIATES
    description: >
      Microglial dysfunction from impaired CSF1R signaling drives downstream
      white-matter neurodegeneration with axonal spheroids and pigmented glia.
    evidence:
    - reference: PMID:30429277
      reference_title: "CSF1R-related leukoencephalopathy: A major player in primary microgliopathies."
      supports: SUPPORT
      evidence_source: HUMAN_CLINICAL
      snippet: "Given that CSF1R mainly expresses in microglia, CSF1R-related leukoencephalopathy is representative of primary microgliopathies"
      explanation: >
        Establishes that microglial CSF1R dysfunction is the upstream driver of
        the downstream white-matter neurodegeneration, supporting this causal edge.

- name: White Matter Degeneration with Axonal Spheroids
  description: >
    As a primary microgliopathy, microglial dysfunction from impaired CSF1R
    signaling drives white-matter neurodegeneration. Pathology shows primary
    axonopathy followed by demyelination, with characteristic axonal spheroids
    and pigmented glia in affected cerebral white matter. In the Csf1r+/- mouse
    model, microgliosis and microglial transcriptomic alterations indicative of
    oxidative stress and demyelination are central, with elevated cerebral CSF-2
    (GM-CSF) signaling implicated; monoallelic CSF2 deletion rescues most
    deficits, and elevated CSF2 is confirmed in human ALSP brains.
  cell_types:
  - preferred_term: microglial cell
    term:
      id: CL:0000129
      label: microglial cell
    modifier: ABNORMAL
  - preferred_term: oligodendrocyte
    term:
      id: CL:0000128
      label: oligodendrocyte
  biological_processes:
  - preferred_term: myelination
    term:
      id: GO:0042552
      label: myelination
    modifier: DECREASED
  evidence:
  - reference: PMID:30429277
    reference_title: "CSF1R-related leukoencephalopathy: A major player in primary microgliopathies."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Primary axonopathy followed by demyelination was suggested by pathology."
    explanation: >
      Describes the neuropathologic sequence of axonal degeneration preceding
      demyelination in CSF1R-related leukoencephalopathy.
  - reference: PMID:30429277
    reference_title: "CSF1R-related leukoencephalopathy: A major player in primary microgliopathies."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Given that CSF1R mainly expresses in microglia, CSF1R-related leukoencephalopathy is representative of primary microgliopathies"
    explanation: >
      Establishes the disease as a primary microgliopathy driven by microglial
      CSF1R dysfunction.
  - reference: PMID:32130903
    reference_title: "Microglial Homeostasis Requires Balanced CSF-1/CSF-2 Receptor Signaling."
    supports: SUPPORT
    evidence_source: MODEL_ORGANISM
    snippet: "monoallelic deletion of Csf2 rescues most behavioral deficits and histopathological changes in Csf1r+/- mice by preventing microgliosis and eliminating most microglial transcriptomic alterations, including those indicative of oxidative stress and demyelination"
    explanation: >
      Mouse model evidence that unbalanced CSF-1R/CSF-2 signaling drives
      microgliosis and demyelination, with rescue by lowering CSF-2.
  - reference: PMID:32130903
    reference_title: "Microglial Homeostasis Requires Balanced CSF-1/CSF-2 Receptor Signaling."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "We also show elevation of Csf2 transcripts and of several CSF-2 downstream targets in the brains of ALSP patients, demonstrating that the mechanisms identified in the mouse model are functional in humans."
    explanation: >
      Confirms in human ALSP brains the elevated CSF-2 signaling implicated in
      the mouse model, supporting human relevance of the mechanism.
  - reference: PMID:38897209
    reference_title: "Therapeutic potential of human microglia transplantation in a chimeric model of CSF1R-related leukoencephalopathy."
    supports: SUPPORT
    evidence_source: MODEL_ORGANISM
    snippet: "we generated a xenotolerant mouse model lacking the fms-intronic regulatory element (FIRE) enhancer within Csf1r, which develops nearly all the hallmark pathologies associated with ALSP"
    explanation: >
      A Csf1r-FIRE-enhancer-deficient (microglia-depleted) mouse recapitulates
      nearly all hallmark ALSP pathologies, confirming that loss of microglial
      CSF1R function is sufficient to drive the white-matter neurodegeneration.

