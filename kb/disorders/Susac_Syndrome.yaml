    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Susac syndrome is a likely autoimmune microangiopathy affecting the brain, retina and inner ear.
    explanation: >-
      This supports autoimmune microangiopathy affecting the three core organs
