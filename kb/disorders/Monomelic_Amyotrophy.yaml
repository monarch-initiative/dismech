treatments:
- name: Cervical Collar Therapy
  description: >
    A cervical collar that limits neck flexion is the mainstay of conservative
    management; by preventing the flexion-induced anterior dural shift and cord
    compression it can halt progression, particularly when applied early.
  treatment_term:
    preferred_term: Therapeutic Procedure
    term:
      id: NCIT:C49236
      label: Therapeutic Procedure
  evidence:
  - reference: PMID:29541850
    reference_title: "Hirayama disease."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "He has been successfully treated in a cervical collar."
    explanation: Documents successful conservative management with a cervical collar.
- name: Surgical Decompression
  description: >
    Surgical decompression (anterior or posterior approaches, with or without
    fusion) is reserved for selected patients, especially those with anterior
    effacement and severe cervical kyphosis during flexion.
  treatment_term:
    preferred_term: Surgical Procedure
    term:
      id: NCIT:C15329
      label: Surgical Procedure
  evidence:
  - reference: PMID:20515348
    reference_title: "Hirayama disease."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "The anterior decompressive approach may be better for patients showing anterior effacement and severe cervical kyphosis during neck flexion in MR imaging."
    explanation: Supports surgical decompression for selected patients with anterior effacement and kyphosis.
differential_diagnoses:
- name: Amyotrophic Lateral Sclerosis
  description: >
    A progressive degenerative motor neuron disease combining upper and lower
    motor neuron signs; distinguished from MA by its relentless progression,
    generalized rather than focal distribution, and absence of flexion-dependent
    cord compression.
  disease_term:
    preferred_term: amyotrophic lateral sclerosis
    term:
      id: MONDO:0004976
      label: amyotrophic lateral sclerosis
  evidence:
  - reference: PMID:25766368
    reference_title: "Hirayama disease."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "differs from other motor neuron diseases by virtue of its ultimately non-progressive course"
    explanation: The ultimately non-progressive course distinguishes MA from progressive motor neuron diseases such as ALS.
- name: Distal Hereditary Motor Neuronopathy
  description: >
    Inherited (often symmetric, length-dependent) lower-motor-neuron disorder;
    differs from sporadic, focal, flexion-dependent MA by its genetic basis and
    typically progressive, symmetric distribution.
  disease_term:
    preferred_term: distal hereditary motor neuropathy
    term:
      id: MONDO:0015363
      label: "neuronopathy, distal hereditary motor, autosomal recessive"
  evidence:
  - reference: PMID:24063005
    reference_title: "Nosology of juvenile muscular atrophy of distal upper extremity: from monomelic amyotrophy to Hirayama disease--Indian perspective."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "HD differs from motor neuron diseases because of its nonprogressive course and pathologic findings of chronic microcirculatory changes in the lower cervical cord"
    explanation: The nonprogressive course and microcirculatory (rather than genetic-degenerative) pathology distinguish MA from hereditary motor neuronopathies.
- name: Syringomyelia
  description: >
    A fluid-filled cavity (syrinx) of the spinal cord that can produce
    segmental lower-motor-neuron wasting of the hands; distinguished from MA by
    its cavitary cord lesion and frequent dissociated sensory loss.
  disease_term:
    preferred_term: syringomyelia
    term:
      id: MONDO:0017987
      label: syringomyelia
  evidence:
  - reference: PMID:25766368
    reference_title: "Hirayama disease."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "It is characterized by a pure motor focal amyotrophy in the distribution of C7, C8 and T1 spinal segmental-innervated muscles"
    explanation: The pure-motor focal amyotrophy of MA contrasts with the dissociated sensory loss typical of syringomyelia.
