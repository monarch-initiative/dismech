pathophysiology:
- name: Flexion-Induced Cervical Cord Compression
  description: >
    Sustained or repeated neck flexion causes forward displacement of the
    posterior cervical dural sac and compressive antero-posterior flattening of
    the lower cervical cord against the vertebral bodies, with an enlarged
    crescentic dorsal epidural space. The dynamic anterior shift is confined to
    the early, progressive stage of disease and resolves in the late
    non-progressive stage, supporting its pathogenic significance.
  cell_types:
  - preferred_term: spinal cord motor neuron
    term:
      id: CL:0011001
      label: spinal cord motor neuron
  locations:
  - preferred_term: cervical spinal cord
    term:
      id: UBERON:0002726
      label: cervical spinal cord
  - preferred_term: dura mater
    term:
      id: UBERON:0002363
      label: dura mater
  evidence:
  - reference: PMID:10822430
    reference_title: "Cervical dural sac and spinal cord in juvenile muscular atrophy of distal upper extremity."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "A distinctive finding in the disorder was forward displacement of the cervical dural sac and compressive flattening of the lower cervical cord during neck flexion."
    explanation: Documents the forward dural displacement and cord flattening on neck flexion as the proximal mechanical lesion.
  - reference: PMID:35136641
    reference_title: "Hirayama disease: the importance of flexion imaging."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "There was anterior displacement of the thecal sac and spinal cord, and an enlarged, crescent-shaped dorsal epidural space"
    explanation: Confirms the anterior thecal-sac displacement and crescentic dorsal epidural space seen on flexion MRI.
  downstream:
  - target: Anterior Horn Motor Neuron Ischemic Injury
    description: >
      Mechanical compression of the lower cervical cord during flexion raises
      intramedullary pressure and compromises the anterior-horn microcirculation,
      producing ischemic injury to the motor neurons.
    causal_link_type: DIRECT
- name: Anterior Horn Motor Neuron Ischemic Injury
  description: >
    Compression of the lower cervical cord during neck flexion increases
    intramedullary pressure and disturbs the microcirculation of the anterior
    (ventral) horn, the spinal structure most vulnerable to ischemia. The
    resulting chronic, repetitive ischemia produces ischemic necrotic change of
    the C5-T1 anterior horns (most severe at C7-C8) with loss of lower motor
    neurons, while the intramedullary and extramedullary vessels themselves
    remain structurally normal.
  cell_types:
  - preferred_term: spinal cord motor neuron
    term:
      id: CL:0011001
      label: spinal cord motor neuron
  locations:
  - preferred_term: ventral horn of spinal cord
    term:
      id: UBERON:0002257
      label: ventral horn of spinal cord
  biological_processes:
  - preferred_term: Response to ischemia
    term:
      id: GO:0002931
      label: response to ischemia
    modifier: INCREASED
  - preferred_term: Anterior horn microcirculation
    term:
      id: GO:0008015
      label: blood circulation
    modifier: DECREASED
  - preferred_term: Motor neuron death
    term:
      id: GO:0051402
      label: neuron apoptotic process
    modifier: INCREASED
  evidence:
  - reference: PMID:18232329
    reference_title: "Juvenile muscular atrophy of unilateral upper extremity (Hirayama disease)--half-century progress and establishment since its discovery."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "The spinal cord showed anteroposterior flattening and ischemic necrotic changes of the anterior horns of the cervical cord at C5-T1, mostly severe at C7 and C8"
    explanation: Autopsy neuropathology demonstrates ischemic necrotic change of the lower cervical anterior horns, the substrate of the motor neuron loss.
  - reference: PMID:18232329
    reference_title: "Juvenile muscular atrophy of unilateral upper extremity (Hirayama disease)--half-century progress and establishment since its discovery."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "the compressed cervical cord at the segments induce an increased intramedullary pressure, resulting in microcirculatory disturbance in the anterior horn, the most vulnerable structure to ischemia in the spinal cord"
    explanation: States the mechanistic link from cord compression to raised intramedullary pressure and anterior-horn microcirculatory disturbance.
  - reference: PMID:22032508
    reference_title: "Hirayama disease."
    supports: SUPPORT
    evidence_source: OTHER
    snippet: "causing compression of the cervical cord, and results in atrophic and ischemic changes in the anterior horn"
    explanation: Review confirms that flexion-induced cord compression produces ischemic and atrophic anterior-horn change.
  downstream:
  - target: Asymmetric Distal Lower-Motor-Neuron Denervation
    description: >
      Ischemic loss of C7-T1 anterior-horn motor neurons denervates the
      hand and forearm muscles in their myotomal distribution, producing
      asymmetric distal lower-motor-neuron weakness and wasting.
    causal_link_type: DIRECT
- name: Asymmetric Distal Lower-Motor-Neuron Denervation
  description: >
    Loss of C7, C8, and T1 anterior-horn motor neurons produces chronic (and at
    times acute) neurogenic denervation of the muscles in these myotomes,
    manifest as pure motor focal amyotrophy of the hand and forearm. Wasting is
    typically unilateral or asymmetric with characteristic sparing of the
    brachioradialis, giving the appearance of oblique amyotrophy; EMG shows
    features of acute and/or chronic denervation in the C7-T1 myotomes, sometimes
    extending to the clinically unaffected contralateral limb.
  cell_types:
  - preferred_term: spinal cord motor neuron
    term:
      id: CL:0011001
      label: spinal cord motor neuron
  evidence:
  - reference: PMID:25766368
    reference_title: "Hirayama disease."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "It is characterized by a pure motor focal amyotrophy in the distribution of C7, C8 and T1 spinal segmental-innervated muscles"
    explanation: Defines the focal, pure-motor amyotrophy in the C7-T1 myotomal distribution that results from the anterior-horn lesion.
  - reference: PMID:24063005
    reference_title: "Nosology of juvenile muscular atrophy of distal upper extremity: from monomelic amyotrophy to Hirayama disease--Indian perspective."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Electromyography shows features of acute and/or chronic denervation in C7, C8, and T1 myotomes in clinically affected limb and sometimes also in clinically unaffected contralateral limb."
    explanation: Documents the neurogenic (denervation) EMG pattern in the affected myotomes, including subclinical contralateral involvement.
  downstream:
  - target: Distal upper limb amyotrophy
  - target: Distal upper limb muscle weakness
  - target: Hand muscle atrophy
  - target: Fasciculations
  - target: "EMG: neuropathic changes"
- name: Self-Limiting (Spontaneous Arrest) Course
  description: >
    After an initially progressive phase the disorder undergoes spontaneous
    arrest within several years and symptoms stabilize. The dynamic forward
    dural displacement that drives compression is present in early progressive
    disease and absent in the late non-progressive stage, which is thought to
    underlie the benign, ultimately non-progressive course and distinguishes MA
    from progressive motor neuron diseases such as ALS.
  evidence:
  - reference: PMID:22032508
    reference_title: "Hirayama disease."
    supports: SUPPORT
    evidence_source: OTHER
    snippet: "it is characterized by progressive muscular weakness and atrophy of distal upper limbs, followed by spontaneous arrest within several years"
    explanation: States the hallmark spontaneous arrest within several years after an initially progressive phase.
  - reference: PMID:25766368
    reference_title: "Hirayama disease."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "differs from other motor neuron diseases by virtue of its ultimately non-progressive course"
    explanation: Contrasts the ultimately non-progressive course with progressive motor neuron diseases.
