name: Monomelic Amyotrophy
creation_date: "2026-06-26T00:00:00Z"
category: Acquired
description: >
  Monomelic amyotrophy (MA; Hirayama disease, juvenile muscular atrophy of the
  distal upper extremity, juvenile non-progressive amyotrophy of the distal
  upper limb) is a rare, benign, focal, usually self-limiting lower-motor-neuron
  disorder that predominantly affects adolescent and young-adult males. The
  prevailing pathogenic model is a cervical flexion myelopathy: repeated or
  sustained neck flexion produces forward displacement of the posterior cervical
  dural sac, compressing and flattening the lower cervical cord (C7-T1) against
  the vertebral bodies and generating an enlarged crescentic dorsal epidural
  space. The resulting chronic, repetitive microcirculatory compromise causes
  ischemic injury to the anterior horn (ventral horn) motor neurons, the
  structure most vulnerable to ischemia in the cord. Clinically this yields
  insidious, asymmetric, distal upper-limb (hand and forearm) muscular weakness
  and wasting with characteristic sparing of the brachioradialis ("oblique
  amyotrophy"), often with cold paresis and a fine irregular tremor of the
  fingers. The disorder is largely sporadic, distinguished from progressive
  motor neuron diseases such as ALS by its spontaneous arrest after a few years
  of progression. Diagnosis rests on dynamic flexion MRI demonstrating the
  forward-shifting dura and crescentic epidural component; early cervical-collar
  therapy that limits neck flexion can halt progression.
