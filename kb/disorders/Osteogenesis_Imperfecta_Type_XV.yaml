diagnosis:
- name: Molecular Genetic Diagnosis
  description: >-
    OI type XV is suspected in an infant or child with recessive OI (reduced bone
    mass, recurrent fractures, progressive deformity), particularly when COL1A1/
    COL1A2 collagen studies are normal and other recessive OI genes are negative;
    CNS involvement in a severely affected child is a clue. Diagnosis is confirmed
    by identifying biallelic WNT1 variants by gene-panel or exome sequencing,
    distinguishing it from dominant OI type III, which it clinically resembles.
  diagnosis_term:
    preferred_term: molecular genetic testing
    term:
      id: MAXO:0000533
      label: molecular genetic testing
  evidence:
  - reference: PMID:23656646
    reference_title: "WNT1 mutations in early-onset osteoporosis and osteogenesis imperfecta."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Given the family history with two affected siblings and the negative fibroblast collagen studies, whole exome sequencing was performed as described previously7 to identify a potential recessive OI gene.
    explanation: >-
      Illustrates the diagnostic pathway: negative collagen studies followed by
      exome sequencing identifying the recessive WNT1 gene.
treatments:
- name: Bisphosphonate Therapy
  description: >-
    Intravenous bisphosphonates (e.g., pamidronate, zoledronic acid) are the
    pharmacological mainstay of severe OI, increasing bone mineral density and
    reducing fracture frequency. They are antiresorptive and do not correct the
    underlying WNT-signaling defect.
  treatment_term:
    preferred_term: bisphosphonate agent therapy
    term:
      id: MAXO:0000954
      label: bisphosphonate agent therapy
  evidence:
  - reference: PMID:20301472
    reference_title: "COL1A1- and COL1A2-Related Osteogenesis Imperfecta."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Bisphosphonates continue to be used most extensively in those with
      vertebral fractures, frequent long bone fractures, or more severe OI.
    explanation: >-
      GeneReviews documents bisphosphonates as the mainstay pharmacotherapy for
      severe OI, the management category that applies to OI type XV.
- name: Orthopedic Surgery and Intramedullary Rodding
  description: >-
    Intramedullary (telescoping) rod fixation and corrective osteotomy stabilize
    fracture-prone, deformed long bones; spinal surgery addresses progressive
    scoliosis.
  treatment_term:
    preferred_term: surgical procedure
    term:
      id: MAXO:0000004
      label: surgical procedure
  evidence:
  - reference: PMID:20301472
    reference_title: "COL1A1- and COL1A2-Related Osteogenesis Imperfecta."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      intramedullary rodding when
      indicated to provide anatomic positioning of limbs
    explanation: >-
      GeneReviews documents intramedullary rodding as standard orthopedic
      management for OI long-bone fractures and deformity.
- name: Physical Therapy and Rehabilitation
  description: >-
    Physical and occupational therapy increase bone stability, improve mobility
    and muscle strength, and prevent contractures and deformity; early physical
    therapy follows brief post-fracture immobilization.
  treatment_term:
    preferred_term: physical therapy
    term:
      id: MAXO:0000011
