genetic:
- name: WNT1 Loss-of-Function / Hypofunctional Mutations
  association: Causative
  gene_term:
    preferred_term: WNT1 (Wnt family member 1; secreted WNT ligand)
    term:
      id: hgnc:12774
      label: WNT1
  notes: >-
    OI type XV is caused by biallelic loss-of-function or hypofunctional variants
    in WNT1. Reported recessive alleles include homozygous missense, nonsense,
    frameshift, splice-site, and small-deletion variants; some nonsense/frameshift
    alleles are predicted to trigger nonsense-mediated decay and the absence of
    WNT1. By contrast, a heterozygous WNT1 missense variant (e.g., c.652T>G,
    p.Cys218Gly) causes dominantly inherited early-onset osteoporosis,
    illustrating WNT1 dosage sensitivity.
  evidence:
  - reference: PMID:23499310
    reference_title: "WNT1 mutations in families affected by moderately severe and progressive recessive osteogenesis imperfecta."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Here, we describe four recessive-OI-affected families in
      which we identified causative mutations in wingless-type MMTV integration site
      family 1 (WNT1).
    explanation: >-
      Identifies WNT1 as the causative gene in recessive OI (type XV) across four
      families.
  - reference: PMID:23656646
    reference_title: "WNT1 mutations in early-onset osteoporosis and osteogenesis imperfecta."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      In a separate family with 2 siblings affected by recessive osteogenesis
      imperfecta, we identified a homozygous nonsense mutation, c.884C→A, p.Ser295*.
    explanation: >-
      Documents a homozygous WNT1 nonsense allele causing recessive OI, alongside
      the dominant osteoporosis allele in the same report.
  - reference: PMID:23499309
    reference_title: "Mutations in WNT1 cause different forms of bone fragility."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      In consanguineous families, we identified five
      homozygous mutations in WNT1: one frameshift mutation, two missense mutations,
      one splice-site mutation, and one nonsense mutation.
    explanation: >-
      Catalogs the spectrum of recessive WNT1 mutations causing OI type XV.
