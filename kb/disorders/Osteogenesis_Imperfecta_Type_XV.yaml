pathophysiology:
- name: WNT1 Loss-of-Function Abolishes Canonical WNT/Beta-Catenin Signaling
  description: >-
    WNT1 is a secreted signaling protein that binds the Frizzled receptor (FZD)
    and the coreceptor LRP5/6 to activate canonical WNT/beta-catenin signaling.
    Biallelic loss-of-function or hypofunctional WNT1 variants (frameshift,
    nonsense, splice-site, missense) yield WNT1 protein that fails to activate
    canonical LRP5-mediated WNT-regulated beta-catenin signaling, so
    beta-catenin does not accumulate to induce WNT target genes. This places OI
    type XV mechanistically apart from the collagen-defect OI types: the proximal
    lesion is failure of an osteoanabolic signaling ligand rather than a defect in
    type I collagen.
