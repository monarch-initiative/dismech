name: Osteogenesis Imperfecta Type XV
creation_date: "2026-06-30T00:00:00Z"
category: Mendelian
disease_term:
  preferred_term: Osteogenesis imperfecta type 15
  term:
    id: MONDO:0014086
    label: osteogenesis imperfecta type 15
description: >-
  Osteogenesis imperfecta type XV (OI type XV; WNT1-related OI) is an autosomal
  recessive brittle-bone disease caused by biallelic loss-of-function (or
  hypofunctional) variants in WNT1, the gene encoding the secreted signaling
  ligand WNT1. Unlike the classic dominant collagen-defect forms of OI
  (COL1A1/COL1A2) and the recessive collagen-processing forms, OI type XV is a
  signaling-pathway OI: WNT1 is a secreted WNT ligand that binds the Frizzled
  receptor and the LRP5/6 coreceptor to activate canonical WNT/beta-catenin
  signaling, a pathway essential for osteoblast differentiation, bone formation,
  and bone mass maintenance. Disease-causing WNT1 variants fail to activate
  canonical LRP5-mediated WNT/beta-catenin signaling, reduce expression of WNT
  target genes, and impair osteoblast differentiation and mineralization,
  producing a moderately severe and progressive phenotype with reduced bone mass,
  recurrent fractures, growth deficiency, and long-bone deformity that is not
  easily distinguished from dominant OI type III. A subset of patients with
  biallelic WNT1 variants also have central nervous system involvement (brain
  malformation such as cerebellar hypoplasia and neurodevelopmental impairment),
  reflecting the developmental role of WNT1 in the brain. The allelic context is
  informative: heterozygous WNT1 missense variants instead cause dominantly
  inherited early-onset osteoporosis, underscoring WNT1 dosage as a determinant of
  bone mass. The central role of the WNT axis in osteoanabolic bone formation
  underpins the therapeutic rationale for WNT-pathway-directed (e.g.,
  anti-sclerostin) anabolic agents.
