  downstream:
  - target: Reduced Bone Mass and Skeletal Fragility
    description: >-
      Deficient osteoblast-mediated bone formation and mineralization yield low
      bone mass and a mechanically weak skeleton prone to fracture and deformity.
- name: Reduced Bone Mass and Skeletal Fragility
  description: >-
    The deficit in WNT-driven osteoblast bone formation and mineralization
    produces low bone mineral density and impaired bone quality, manifesting
    clinically as reduced bone mass, recurrent low-impact fractures, vertebral
    compression, growth deficiency, and progressive long-bone deformity. In
    affected children, radiographs show severe osteopenia with multiple fractures
    and sequelae including vertebral compression fractures, kyphoscoliosis, severe
    short stature, and long-bone deformities.
