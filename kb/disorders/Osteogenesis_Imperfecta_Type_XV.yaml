- name: Impaired Osteoblast Differentiation and Bone Formation
  description: >-
    Canonical WNT/beta-catenin signaling drives osteoblast differentiation and
    bone formation; WNT1 expression rises as osteoblasts differentiate,
    indicating a role for WNT1 in osteoblast function and bone development. With
    WNT1 signaling lost, WNT target-gene induction and osteoblast-mediated
    mineralization are reduced, so the osteoanabolic bone-formation program
    cannot proceed normally.
