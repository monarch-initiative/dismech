    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Unilateral adrenal resection may be considered as an option for women with
      fertility needs.
    explanation: >-
      Supports unilateral adrenalectomy as an option for fertility preservation.
