    reference_title: "FLNB-Related Disorders."
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      Scoliosis and clubfeet are managed in a routine manner.
    explanation: >-
      GeneReviews supports orthopedic management for spinal curvature and
