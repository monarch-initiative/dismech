  evidence:
  - reference: PMID:30655369
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: >-
      Platelet-type von Willebrand disease megakaryocytes bound vWF at an early differentiation stage and generated proplatelets with a decreased number of enlarged tips compared to control megakaryocytes.
    explanation: >-
      Patient-derived megakaryocyte experiments support abnormal proplatelet
      formation as a cellular mechanism.
  - reference: PMID:30655369
    supports: SUPPORT
    evidence_source: MODEL_ORGANISM
    snippet: >-
      Similarly, bone marrow from TgG233V mice showed an increased number of platelets compared to bone marrow from TgWT mice
    explanation: >-
      The murine transgenic model supports ectopic platelet release in bone
      marrow as a model-organism mechanism contributing to thrombocytopenia.
  downstream:
