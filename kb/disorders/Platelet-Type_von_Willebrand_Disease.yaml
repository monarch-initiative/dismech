  percentage: 136 per million
  notes: >-
    This computational prevalence estimate was based on known pathogenic GP1BA
    variants in gnomAD v4.1, and the authors concluded that PT-VWD may be more
    common than case registries suggest.
  evidence:
  - reference: PMID:39975577
    supports: SUPPORT
    evidence_source: COMPUTATIONAL
    snippet: >-
      Considering these 4 known pathogenic variants, we estimated a global PT-VWD prevalence of 136 cases/106.
    explanation: >-
      Population-scale variant frequency analysis estimated global PT-VWD
      prevalence from known pathogenic GP1BA variants.
