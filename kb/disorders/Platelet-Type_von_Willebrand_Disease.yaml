genetic:
- name: GP1BA gain-of-function variants
  gene_term:
    preferred_term: GP1BA
    term:
      id: hgnc:4439
      label: GP1BA
  association: Causative
  relationship_type: CAUSATIVE
  variant_origin: GERMLINE
  features: >-
    Heterozygous GP1BA gain-of-function variants increase platelet glycoprotein
    Ib alpha affinity for von Willebrand factor. Reported variants include
    classic VWF-binding-domain changes and newer variants outside the
    C-terminal disulphide loop, including p.Leu194Phe.
  evidence:
  - reference: PMID:22102188
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      This inherent platelet function defect is due to a gain-of-function mutation within the GP1BA gene coding for the platelet surface glycoprotein Ib alpha protein, the receptor for the adhesive protein von Willebrand factor (VWF).
    explanation: >-
      The clinical review identifies GP1BA gain-of-function as the causal
      platelet receptor defect.
  - reference: PMID:37592722
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      By direct sequencing of GP1BA, a novel leucine-rich repeat heterozygous variant was identified (c.580C>T; predictably p.Leu194Phe), strongly suggestive as being the underlying cause for the PT-VWD phenotype of our patient.
    explanation: >-
      A 2023 patient report expands the GP1BA variant spectrum with a
      heterozygous p.Leu194Phe variant.
pathophysiology:
- name: Hyperresponsive platelet GPIb-alpha binding to von Willebrand factor
  description: >-
    GP1BA gain-of-function variants make platelet GPIb-alpha hyperresponsive to
    von Willebrand factor, producing excessive platelet-VWF interaction at the
    platelet surface.
  cell_types:
