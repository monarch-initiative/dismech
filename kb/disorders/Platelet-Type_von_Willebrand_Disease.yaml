disease_term:
  preferred_term: platelet-type von Willebrand disease
  term:
    id: MONDO:0008332
    label: platelet-type von Willebrand disease
description: >-
  Platelet-type von Willebrand disease (PT-VWD) is an autosomal dominant
  inherited platelet disorder caused by gain-of-function variants in GP1BA.
  These variants increase platelet glycoprotein Ib alpha binding to von
  Willebrand factor, deplete hemostatically efficient high-molecular-weight VWF
  multimers and platelet-VWF complexes, and produce mucocutaneous bleeding with
  variable thrombocytopenia. The phenotype closely resembles von Willebrand
  disease type 2B, so molecular and platelet-mixing studies are important for
  treatment selection.
synonyms:
- PT-VWD
- pseudo-von Willebrand disease
- platelet type-von Willebrand disease
prevalence:
