environmental:
- name: Pregnancy and antiplatelet drug exposure
  description: >-
    Pregnancy and drugs that impair platelet function can worsen bleeding or
    thrombocytopenia in PT-VWD, even though the underlying disorder is genetic.
  effect: Exacerbates mucocutaneous bleeding and thrombocytopenia.
  evidence:
  - reference: PMID:22102188
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Patients with PT-VWD present with mild to moderate mucocutaneous bleeding, which becomes more pronounced during pregnancy and following aspirin ingestion or drugs that have antiplatelet activity.
    explanation: The review identifies pregnancy and antiplatelet drugs as exacerbating contexts.
  - reference: PMID:23327637
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      The patient's platelet count levels dropped significantly during the antenatal period.
    explanation: The pregnancy case report illustrates antenatal platelet-count worsening.
diagnosis:
- name: Ristocetin-induced platelet agglutination and mixing studies
  diagnosis_term:
    preferred_term: disease screening
    term:
      id: MAXO:0000124
      label: disease screening
  description: >-
    Laboratory evaluation includes low VWF:ristocetin cofactor, low or normal
    VWF antigen, enhanced RIPA, and follow-up mixing, cryoprecipitate challenge,
    or flow-cytometry assays to separate PT-VWD from type 2B VWD.
  results: Enhanced low-dose RIPA supports PT-VWD but must be differentiated from type 2B VWD.
  evidence:
  - reference: PMID:22102188
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Simplified RIPA mixing assays, cryoprecipitate challenge, and flow cytometry can differentiate between the two disorders.
    explanation: The abstract names specialized tests used to distinguish PT-VWD and type 2B VWD.
- name: GP1BA molecular testing
  diagnosis_term:
    preferred_term: genetic testing
    term:
      id: MAXO:0000127
      label: genetic testing
  description: >-
    GP1BA sequencing confirms PT-VWD when the clinical and platelet-function
    phenotype resembles type 2B VWD; VWF sequencing instead supports type 2B VWD.
  results: A pathogenic GP1BA variant confirms platelet-type von Willebrand disease.
  evidence:
  - reference: PMID:22102188
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      However, the gold standard is to identify mutations within the VWF gene (indicating type 2B VWD) or the platelet GP1BA gene (confirming PT-VWD).
    explanation: The abstract identifies gene testing as the definitive discriminator.
differential_diagnoses:
- name: von Willebrand disease type 2B
  disease_term:
    preferred_term: von Willebrand disease type 2B
    term:
      id: MONDO:0015629
      label: von Willebrand disease type 2B
  description: >-
    Type 2B VWD has overlapping enhanced RIPA, VWF multimer abnormalities, and
    thrombocytopenia, but the causal defect is in VWF rather than platelet GP1BA.
  distinguishing_features:
  - >-
    GP1BA variants confirm PT-VWD, whereas VWF variants indicate type 2B VWD.
  - >-
    RIPA mixing, cryoprecipitate challenge, and flow cytometry can support the
    distinction.
  evidence:
  - reference: PMID:22102188
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      These laboratory features are also indicators of the closely similar and more common bleeding disorder type 2B VWD.
    explanation: The review identifies type 2B VWD as the main overlapping diagnosis.
- name: Immune thrombocytopenia
  disease_term:
    preferred_term: immune thrombocytopenia
    term:
      id: MONDO:0002048
      label: thrombocytopenia due to immune destruction
  description: >-
    Isolated thrombocytopenia can lead to misclassification as immune or
    idiopathic thrombocytopenic purpura, especially if platelet-VWF studies are
    not performed.
  distinguishing_features:
  - >-
    PT-VWD has a GP1BA gain-of-function mechanism with enhanced RIPA and
    abnormal platelet-VWF interaction rather than primary immune platelet
    destruction.
  evidence:
  - reference: PMID:22102188
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      PT-VWD is very rare, likely to be misdiagnosed as type 2B VWD or idiopathic thrombocytopenic purpura, and represents 15% of type 2B VWD diagnoses.
    explanation: The review explicitly notes misdiagnosis as idiopathic thrombocytopenic purpura.
treatments:
- name: Platelet transfusion
  description: >-
    Platelet concentrates are preferred for significant bleeding or procedures
    because the primary defect is in the patient's platelet receptor rather than
    plasma VWF. VWF/FVIII preparations or desmopressin should not be assumed
    equivalent to standard VWD therapy because raising circulating VWF can worsen
    thrombocytopenia.
  treatment_term:
    preferred_term: platelet transfusion
    term:
      id: MAXO:0001490
      label: platelet transfusion
  target_phenotypes:
  - preferred_term: Mucocutaneous bleeding
    term:
      id: HP:0001892
      label: Abnormal bleeding
  evidence:
  - reference: PMID:22102188
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Treatment is based on making a correct diagnosis of PT-VWD where platelet concentrates instead of VWF/factor VIII preparations should be administered.
    explanation: The review supports platelet concentrate use after correct PT-VWD diagnosis.
  - reference: PMID:23327637
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      She was transfused two units of platelets before delivery.
    explanation: A pregnancy case report documents peripartum platelet transfusion.
- name: Desmopressin caution
  description: >-
    Desmopressin raises circulating VWF and may aggravate platelet-VWF complex
    clearance in PT-VWD, so it should be used only with careful specialist
    assessment rather than as routine von Willebrand disease therapy.
  treatment_term:
    preferred_term: pharmacotherapy
    term:
      id: MAXO:0000058
      label: pharmacotherapy
    therapeutic_agent:
    - preferred_term: desmopressin
      term:
        id: CHEBI:4450
        label: desmopressin
  evidence:
  - reference: PMID:30655369
    supports: PARTIAL
    evidence_source: MODEL_ORGANISM
    snippet: >-
      In addition, platelet survival of mutant mice was shortened compared to control mice, and the administration of desmopressin, raising circulating vWF, caused a marked drop in platelet count.
    explanation: >-
      Mouse data support the mechanistic caution that raising VWF can worsen
      platelet counts; this is indirect for human treatment decisions.
- name: VWF/factor VIII preparation caution
  description: >-
    VWF/factor VIII preparations should not be used as the default replacement
    strategy for PT-VWD bleeding, because platelet concentrates address the
    platelet-receptor defect more directly.
  treatment_term:
    preferred_term: pharmacotherapy
    term:
      id: MAXO:0000058
      label: pharmacotherapy
  target_phenotypes:
  - preferred_term: Mucocutaneous bleeding
    term:
      id: HP:0001892
      label: Abnormal bleeding
  evidence:
  - reference: PMID:22102188
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Treatment is based on making a correct diagnosis of PT-VWD where platelet concentrates instead of VWF/factor VIII preparations should be administered.
    explanation: The clinical review directly cautions against VWF/factor VIII preparations as the preferred treatment in PT-VWD.
- name: Genetic counseling
  description: >-
    Families with PT-VWD benefit from counseling and cascade evaluation because
    autosomal-dominant disease can be diagnosed in relatives after a proband is
    recognized.
  treatment_term:
    preferred_term: genetic counseling
    term:
      id: MAXO:0000079
      label: genetic counseling
  evidence:
  - reference: PMID:23327637
    supports: PARTIAL
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      The successful antenatal counselling has encouraged the diagnosis of the same condition in her mother and sister.
    explanation: The pregnancy case report supports family counseling and cascade recognition after PT-VWD diagnosis.
