- name: Megakaryocyte proplatelet formation dysregulation
  description: >-
    Experimental work in patient-derived and murine PT-VWD megakaryocytes shows
    early VWF binding, abnormal proplatelet formation, defective collagen-induced
    RhoA-MLC2 signaling, ectopic platelet release in bone marrow, and increased
    clearance of platelet-VWF complexes.
