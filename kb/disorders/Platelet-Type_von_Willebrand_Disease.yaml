biochemical:
- name: Enhanced ristocetin-induced platelet agglutination
  presence: Present
  notes: >-
    Low-dose RIPA is a key laboratory abnormality but overlaps with type 2B von
    Willebrand disease.
  evidence:
  - reference: PMID:22102188
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Laboratory testing shows low VWF:ristocetin cofactor and low or normal VWF:antigen and characteristically an enhanced ristocetin-induced platelet agglutination (RIPA).
    explanation: The abstract gives the characteristic RIPA laboratory finding.
