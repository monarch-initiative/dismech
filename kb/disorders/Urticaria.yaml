description: >-
  Urticaria is a mast cell-driven skin disorder in which activation and
  degranulation of cutaneous mast cells releases histamine and other mediators
  that cause vasodilation, increased vascular permeability, and sensory nerve
  stimulation. The result is transient, pruritic, edematous wheals confined to
  the superficial dermis, with deeper involvement producing angioedema. Acute
  urticaria is typically triggered by allergic (IgE-mediated) or other immediate
  hypersensitivity stimuli, whereas chronic spontaneous urticaria is largely
  autoimmune, driven by autoantibodies against IgE or its high-affinity receptor
  that lower the threshold for mast cell activation.
