    reference_title: "Diabetic ketoacidosis in an adult with beta-ketothiolase deficiency (BKD) involving a novel ACAT1 variant : first report of established diabetes in BKD and a review of the literature."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: BKD typically manifests in childhood as recurrent episodes of ketoacidosis, the frequency of which tends to reduce with age.
    explanation: Supports episodic nature and age-dependent reduction of decompensation.
- phase: Long-term outcome
  notes: 'The overall prognosis is generally favorable with appropriate management. Neurological complications, particularly extrapyramidal signs, may occur as sequelae of severe episodes or occasionally independent of recognized metabolic crises. Mortality occurs in a minority of patients during severe crises.

    '
  evidence:
