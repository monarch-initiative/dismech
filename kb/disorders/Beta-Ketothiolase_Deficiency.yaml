prevalence:
- population: Global
  percentage: Rare
  notes: 'BKD is rare. In a large Chinese newborn screening cohort of 206,977 neonates, the incidence was estimated at approximately 1:32,237, detected only in the Miao ethnic subgroup. To date, over 149 patients have been reported worldwide.

    '
progression:
- phase: Onset
  age_range: Infancy to early childhood
  notes: 'Typically presents between 6 months and 2 years with a first episode of ketoacidosis, often triggered by intercurrent illness.

    '
