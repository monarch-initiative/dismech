treatments:
- name: Avoidance of catabolic triggers
  description: 'The cornerstone of chronic BKD management is avoidance of prolonged fasting, ketogenic diets, and prompt treatment of intercurrent illness to prevent catabolic stress and ketoacidotic episodes.

    '
  treatment_term:
    preferred_term: supportive care
    term:
      id: MAXO:0000950
      label: supportive care
  evidence:
  - reference: PMID:38853254
    reference_title: "Diabetic ketoacidosis in an adult with beta-ketothiolase deficiency (BKD) involving a novel ACAT1 variant : first report of established diabetes in BKD and a review of the literature."
    supports: PARTIAL
    evidence_source: HUMAN_CLINICAL
    snippet: BKD typically manifests in childhood as recurrent episodes of ketoacidosis, the frequency of which tends to reduce with age.
    explanation: Episodic nature triggered by catabolic stress supports the importance of trigger avoidance.
- name: Dietary management
  description: 'Mild protein restriction with avoidance of excess fat intake, regular carbohydrate intake to prevent ketosis, and sick-day glucose and electrolyte solutions. The dietary approach is less restrictive than for many other organic acidemias due to the generally favorable prognosis.

    '
  treatment_term:
    preferred_term: dietary intervention
    term:
      id: MAXO:0000088
      label: dietary intervention
  notes: Mild protein restriction and dietary management are standard of care but specific published evidence from the available abstracts is limited. The favorable natural history of BKD permits a less restrictive approach than other organic acidemias.
- name: Acute crisis management with intravenous dextrose
  description: 'During acute ketoacidotic episodes, intravenous dextrose infusion to suppress ketogenesis (even if euglycemic), along with intravenous fluids and electrolyte correction. Bicarbonate may be used for severe acidosis. Severe crises may require intensive care with ventilation and dialysis when needed.

    '
  treatment_term:
    preferred_term: supportive care
    term:
      id: MAXO:0000950
      label: supportive care
  evidence:
  - reference: PMID:35850931
    reference_title: "Identification of two novel ACAT1 variant associated with beta-ketothiolase deficiency in a 9-month-old boy."
    supports: PARTIAL
    evidence_source: HUMAN_CLINICAL
    snippet: At the time of admission, the patient had acidosis, drowsiness, and respiratory failure.
    explanation: Documents the severity of acute crisis presentation requiring intensive care, but the abstract does not detail the treatment protocol itself.
- name: Carnitine supplementation
  description: 'L-carnitine supplementation may be considered if carnitine deficiency is documented, to support organic acid detoxification and excretion via acylcarnitine conjugation.

    '
  treatment_term:
    preferred_term: carnitine supplementation
    term:
      id: MAXO:0010006
      label: carnitine supplementation
  notes: L-carnitine supplementation is a standard adjunctive therapy in organic acidemias but direct evidence specific to BKD efficacy is limited.
- name: Newborn screening
  description: 'BKD can be detected through expanded newborn screening using tandem mass spectrometry (MS/MS) via elevated C5:1 and C5-OH acylcarnitines. However, screening sensitivity is not 100 percent, and some affected patients may be missed. Second-tier genetic testing using NGS panels can reduce false positive rates.

    '
  treatment_term:
    preferred_term: disease screening
    term:
      id: MAXO:0000124
      label: disease screening
  evidence:
  - reference: PMID:38535123
    reference_title: "Harnessing Next-Generation Sequencing as a Timely and Accurate Second-Tier Screening Test for Newborn Screening of Inborn Errors of Metabolism."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: The false positive rate for these six conditions after the NGS second-tier test was only 0.017%, and two cases of citrullinemia type II would have been missed as false negatives if only biochemical first-tier testing was performed.
    explanation: Documents implementation of NGS second-tier NBS including BKD, reducing false positives.
- name: Genetic counseling
  description: 'Genetic counseling for affected families, including discussion of autosomal recessive inheritance, recurrence risk (25%), and carrier testing for informative family members. Prenatal diagnosis is available through molecular analysis of ACAT1.

    '
  treatment_term:
    preferred_term: genetic counseling
    term:
      id: MAXO:0000079
      label: genetic counseling
  evidence:
  - reference: PMID:40598206
    reference_title: "Molecular characterization, clinical phenotype, and neurological outcome of twelve Palestinian children with beta-ketothiolase deficiency: report of two novel variants in the ACAT1 gene."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: By identifying haplotype blocks, founder mutations, and novel pathogenic variants, researchers can significantly improve diagnostic precision, enhance genetic counseling, and lay the groundwork for developing targeted therapies.
    explanation: Supports the role of genetic counseling in BKD management and family planning.
  - reference: PMID:30026775
    reference_title: "A Novel Mutation of Beta-ketothiolase Deficiency: The First Report from Iran and Review of Literature."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: We recommended carrier testing for all informative family members to recognize mutations in asymptomatic family members.
    explanation: Directly recommends carrier testing as part of genetic counseling for BKD families.
- name: HbA1c monitoring for dysglycemia
  description: 'Given the first reported case of persistent diabetes in an adult with BKD, checking HbA1c in people with BKD and hyperglycemia is recommended to uncover potential coexisting diabetes and facilitate timely management.

    '
  treatment_term:
    preferred_term: biomarker analysis
    term:
      id: MAXO:0000018
      label: biomarker analysis
  evidence:
  - reference: PMID:38853254
    reference_title: "Diabetic ketoacidosis in an adult with beta-ketothiolase deficiency (BKD) involving a novel ACAT1 variant : first report of established diabetes in BKD and a review of the literature."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: This case highlights the importance of checking HbA1c in people with BKD and hyperglycemia in order to uncover potential coexisting diabetes, facilitating timely management and preventing complications.
    explanation: Directly supports HbA1c monitoring as a new clinical recommendation for BKD.
notes: 'BKD can clinically mimic diabetic ketoacidosis, particularly in the pediatric setting. Atypical features such as persistent acidosis, fluctuating glucose, and normal HbA1c should prompt evaluation for inborn errors of metabolism. The biochemical triad (2M3HB, TIG, 2MAA) is not always complete, and MS/MS acylcarnitine screening does not ensure 100 percent sensitivity. Even patients with null mutations can show normal urine organic acids and blood acylcarnitines when clinically well.

  '
