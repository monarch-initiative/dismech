    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: diagnosed between 7 months and 22 months of age at two tertiary care centers in Palestine.
    explanation: Documents typical age of diagnosis in a cohort of 12 BKD patients.
- phase: Recurrent episodic crises
  notes: 'Recurrent ketoacidotic episodes occur during early childhood, triggered by infection, fasting, or ketogenic diet. Frequency tends to decrease with age and episodes are rare after age 10.

    '
  evidence:
