  - name: Founder mutations in consanguineous populations
    description: 'Founder mutations have been identified in specific populations. In a Palestinian cohort, a founder mutation was found in six patients from three families. All affected patients were offspring of consanguineous marriages, increasing the likelihood of homozygous pathogenic variants.

