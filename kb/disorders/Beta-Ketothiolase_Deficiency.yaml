  - name: Missense variants affecting buried residues
    description: 'Almost all of the 56 disease-associated missense ACAT1 variants affect residues that are completely or partially buried in the T2 structure, causing deficiency through lower in vivo T2 activity due to reduced folding efficiency or stability.

