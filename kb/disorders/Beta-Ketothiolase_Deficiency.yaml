- name: Impaired isoleucine catabolism
  description: 'ACAT1/T2 catalyzes the thiolytic cleavage of 2-methyl-acetoacetyl-CoA into propionyl-CoA and acetyl-CoA, the terminal step in the isoleucine degradation pathway. Loss of T2 activity blocks this step, leading to accumulation of upstream isoleucine-derived metabolites including 2-methyl-3-hydroxybutyrate, 2-methylacetoacetate, and tiglylglycine.

    '
