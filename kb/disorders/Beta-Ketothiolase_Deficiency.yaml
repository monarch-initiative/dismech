genetic:
- name: ACAT1 pathogenic variants
  gene_term:
    preferred_term: ACAT1
    term:
      id: hgnc:93
      label: ACAT1
  features: 'BKD is caused by biallelic pathogenic variants in the ACAT1 gene, which encodes mitochondrial acetoacetyl-CoA thiolase (T2). To date, 105 ACAT1 variants have been reported in 149 T2-deficient patients. The 56 disease-associated missense variants map to buried residues in the T2 crystal structure, likely causing deficiency through lower folding efficiency or stability. Residual T2 activity in vivo determines the severity of the biochemical phenotype, while clinical phenotype does not correlate well with genotype.

    '
  inheritance:
  - name: Autosomal recessive
    description: 'BKD follows autosomal recessive inheritance. All affected individuals carry biallelic (homozygous or compound heterozygous) pathogenic variants in ACAT1.

      '
    evidence:
    - reference: PMID:38853254
