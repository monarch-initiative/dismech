  description: >-
    Bilateral optic nerve involvement is a distinguishing clinical pattern in
    MOG-IgG-associated optic neuritis and may also occur in some NMOSD and
    pediatric presentations. HPO lacks a specific bilateral optic neuritis term,
    so the base optic neuritis phenotype is used with a bilateral preferred
    term.
  category: Ophthalmologic
