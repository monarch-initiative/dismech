- name: Multiple sclerosis-associated optic neuritis
  description: >-
    Optic neuritis attributable to multiple sclerosis, often a first
    demyelinating event requiring MS-specific prognostic assessment and
    disease-modifying treatment decisions.
  evidence:
  - reference: PMID:36179757
    reference_title: Diagnosis and classification of optic neuritis.
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      timely treatment of individuals with multiple sclerosis
    explanation: >-
      The international classification paper identifies multiple sclerosis as a
      key etiologic subgroup requiring early attribution.
- name: MOG-IgG-associated optic neuritis
  description: >-
    Optic neuritis occurring within MOG antibody-associated disease, commonly
    presenting as acute optic neuritis and often requiring MOGAD-specific
    relapse-risk assessment.
  evidence:
  - reference: PMID:36706773
    reference_title: "Diagnosis of myelin oligodendrocyte glycoprotein antibody-associated disease: International MOGAD Panel proposed criteria."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      MOGAD is typically associated with acute disseminated encephalomyelitis,
      optic neuritis, or transverse myelitis
    explanation: >-
      The international MOGAD criteria establish optic neuritis as a typical
      MOGAD phenotype.
  - reference: PMID:38783085
    reference_title: MOG antibody-associated optic neuritis.
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "MOGAD most frequently presents with optic neuritis"
    explanation: >-
      The MOG-ON review supports optic neuritis as the most frequent MOGAD
      presentation and describes bilateral involvement, disc swelling, and
      longitudinally extensive optic nerve hyperintensity as distinguishing
      features.
- name: AQP4-IgG/NMOSD-associated optic neuritis
  description: >-
    Optic neuritis caused by AQP4-IgG-positive neuromyelitis optica spectrum
    disorder. Attacks can be severe, may involve long optic-nerve segments or
    the chiasm, and should prompt NMOSD-specific relapse prevention.
  evidence:
  - reference: PMID:26092914
    reference_title: International consensus diagnostic criteria for neuromyelitis optica spectrum disorders.
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      clinical syndromes or MRI findings related to optic nerve
    explanation: >-
      The NMOSD criteria identify optic-nerve involvement as a core clinical
      characteristic in AQP4-IgG-positive disease.
