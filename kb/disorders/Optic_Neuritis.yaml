    explanation: >-
      The 2026 review emphasizes high-quality antibody assays in standardized
      diagnostic pathways.
differential_diagnoses:
- name: Nonarteritic anterior ischemic optic neuropathy
  description: >-
    Ischemic optic neuropathy is a common optic neuritis mimic in referred
    patients and should be considered when age, vascular risk factors, disc
    appearance, pain pattern, and imaging are atypical for inflammatory optic
    neuritis.
  distinguishing_features:
  - Often painless sudden vision loss rather than subacute painful inflammatory visual loss.
  - Optic disc findings and vascular risk profile may favor ischemic neuropathy.
  evidence:
  - reference: PMID:29222573
    reference_title: Incidence and Causes of Overdiagnosis of Optic Neuritis.
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      other optic neuropathies, particularly nonarteritic anterior ischemic
      optic neuropathy
    explanation: >-
      The overdiagnosis study identifies nonarteritic anterior ischemic optic
      neuropathy as a frequent alternative diagnosis.
- name: Headache, ocular pain, and functional visual loss mimics
  description: >-
    Headache syndromes, eye pain without optic nerve inflammation, and
    functional visual loss can be misclassified as optic neuritis when isolated
    history items are overweighted.
  distinguishing_features:
  - Normal objective afferent visual pathway findings argue against optic neuritis.
  - A single symptom such as eye pain should not substitute for optic nerve evidence.
  evidence:
  - reference: PMID:29222573
    reference_title: Incidence and Causes of Overdiagnosis of Optic Neuritis.
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      headache and eye pain, functional visual loss
    explanation: >-
      These were among the most common alternative diagnoses in patients
      referred with suspected acute optic neuritis.
- name: Infectious and systemic inflammatory optic neuropathies
  description: >-
    Infectious optic neuropathies and systemic inflammatory diseases such as
    sarcoidosis, SLE, Behcet disease, and vasculitis can produce optic neuritis
    or optic neuropathy and require targeted evaluation when clinical context or
    imaging is atypical for MS, MOGAD, NMOSD, or isolated optic neuritis.
  distinguishing_features:
  - Systemic symptoms, uveitis, granulomatous disease, vascular inflammation, or infectious exposure can redirect evaluation.
  - Etiology-specific treatment may be required beyond acute corticosteroids.
  evidence:
  - reference: PMID:41688447
    reference_title: An update on the developments and challenges with the diagnosis and classification of autoimmune optic neuritis.
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "and other etiologies"
    explanation: >-
      The 2026 review frames autoimmune optic neuritis as a spectrum that
      includes other etiologies beyond MS, NMOSD, and MOGAD.
progression:
- phase: Acute attack
  subtype: Isolated optic neuritis
  notes: >-
    Visual loss typically evolves subacutely over days to two weeks and is often
    accompanied by periocular pain, eye movement pain, dyschromatopsia, and
    reduced contrast sensitivity.
  duration_days: "1-14"
  evidence:
  - reference: ORPHA:499096
    reference_title: Isolated optic neuritis
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      progressing over several days to two weeks
    explanation: >-
      Orphanet provides the typical isolated optic neuritis time course.
- phase: Recurrence risk after first optic neuritis episode
  notes: >-
    Recurrence risk continues over long-term follow-up, especially in patients
    with early relapse or AQP4-IgG positivity.
  evidence:
  - reference: PMID:30612145
    reference_title: Incidence and timing of recurrence of optic neuritis.
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      recurrence in either eye was 26% at 1 year
    explanation: >-
      The adult follow-up cohort quantified recurrence after first optic
      neuritis and supports long-term monitoring.
- phase: Multiple sclerosis risk stratification after undifferentiated optic neuritis
  notes: >-
    At first presentation with undifferentiated optic neuritis, demographic
    variables plus an MS genetic risk score can improve prediction of later
    multiple sclerosis diagnosis.
  evidence:
  - reference: PMID:38418465
    reference_title: Applying a genetic risk score model to enhance prediction of future multiple sclerosis diagnosis at first presentation with optic neuritis.
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      one standard deviation of MS-GRS increased the Hazard of MS 1.3-fold
    explanation: >-
      This UK Biobank, Geisinger, and FinnGen analysis supports genetic-risk
      stratification as an emerging prognostic tool after first optic neuritis.
- phase: Pediatric presentation
  notes: >-
    Children, especially those younger than 10 years, more often have bilateral
    optic neuritis; pediatric workup must consider ADEM, MOGAD, NMOSD, MS,
    infection, and post-infectious or post-vaccination contexts.
  evidence:
  - reference: PMID:27572862
    reference_title: Pediatric optic neuritis.
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      younger children (<10 years of age) are more likely to present with
      bilateral ON
    explanation: >-
      The pediatric review supports age-dependent differences in bilateral
      presentation.
  - reference: PMID:28941527
    reference_title: Pediatric Optic Neuritis.
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      higher rate of bilaterality, poor visual acuity on presentation, and
      papillitis
    explanation: >-
      This pediatric review summarizes major clinical differences from adult
      optic neuritis.
treatments:
- name: Acute high-dose corticosteroids
  description: >-
    High-dose corticosteroids, usually intravenous methylprednisolone or a
    bioequivalent high-dose oral regimen, accelerate recovery in acute optic
    neuritis. Low-dose oral prednisone alone, as used in the original ONTT, is
    not equivalent and increased new optic neuritis episodes.
  treatment_term:
    preferred_term: systemic corticosteroid therapy
    term:
      id: NCIT:C122080
      label: Systemic Corticosteroid Therapy
    therapeutic_agent:
    - preferred_term: corticosteroid
      term:
        id: CHEBI:50858
        label: corticosteroid
  target_mechanisms:
  - target: Immune-mediated optic nerve inflammation
    treatment_effect: INHIBITS
    description: >-
      High-dose corticosteroids suppress acute inflammatory optic nerve injury
      and speed visual recovery.
  evidence:
  - reference: PMID:1734247
    reference_title: "A randomized, controlled trial of corticosteroids in the treatment of acute optic neuritis. The Optic Neuritis Study Group."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Visual function recovered faster in the group receiving intravenous
      methylprednisolone
    explanation: >-
      ONTT supports high-dose intravenous methylprednisolone for faster visual
      recovery in acute optic neuritis.
  - reference: PMID:29507942
    reference_title: "Effect of Treating Acute Optic Neuritis With Bioequivalent Oral vs Intravenous Corticosteroids: A Randomized Clinical Trial."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      bioequivalent doses of oral corticosteroids may be used as an alternative
      to IV corticosteroids
    explanation: >-
      This randomized trial supports bioequivalent high-dose oral
      corticosteroids as an alternative route to high-dose IV therapy.
  - reference: PMID:1734247
    reference_title: "A randomized, controlled trial of corticosteroids in the treatment of acute optic neuritis. The Optic Neuritis Study Group."
    supports: REFUTE
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Oral prednisone alone, as prescribed in this study, is an ineffective
      treatment
    explanation: >-
      The ONTT finding distinguishes high-dose steroid treatment from low-dose
      oral prednisone monotherapy.
- name: Plasma exchange escalation for severe or steroid-refractory optic neuritis
  description: >-
    Therapeutic plasma exchange is considered for severe or steroid-refractory
    optic neuritis, especially in NMOSD/AQP4-associated attacks. Evidence is
    strongest in observational NMO/NMOSD relapse cohorts, while aggregate data
    specific to acute NMO/NMOSD optic neuritis remain limited.
  treatment_term:
    preferred_term: plasmapheresis
    term:
      id: NCIT:C15304
      label: Plasmapheresis
  target_mechanisms:
  - target: AQP4-IgG/NMOSD-associated optic neuritis
    treatment_effect: INHIBITS
    description: >-
      Plasma exchange removes circulating pathogenic antibodies and complement
      mediators during severe antibody-associated attacks.
  evidence:
  - reference: PMID:25921047
    reference_title: "Treatment of acute relapses in neuromyelitis optica: Steroids alone versus steroids plus plasma exchange."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      PLEX+IVMP are more likely to improve EDSS after NMO relapses
    explanation: >-
      This NMO/NMOSD relapse cohort supports adding plasma exchange to
      high-dose steroids, including relapses involving the optic nerves.
  - reference: PMID:36822570
    reference_title: "Visual Outcomes Following Plasma Exchange for Optic Neuritis: An International Multicenter Retrospective Analysis of 395 Optic Neuritis Attacks."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Most ON attacks improved with PLEX"
    explanation: >-
      The 395-attack international cohort supports PLEX as a clinically useful
      escalation therapy for severe optic neuritis and identifies delayed PLEX
      as a poor-outcome predictor.
  - reference: PMID:15452303
    reference_title: "Plasma exchange for severe optic neuritis: treatment of 10 patients."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      PE may be beneficial as an escalating treatment
    explanation: >-
      This severe optic neuritis case series supports plasma exchange as an
      escalation option when high-dose steroids are insufficient.
  - reference: PMID:37387119
    reference_title: "Plasma exchange for acute optic neuritis in neuromyelitis optica or neuromyelitis optica spectrum disorder: a systematic review."
    supports: PARTIAL
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      inadequate data to determine whether PLEX effectively treats acute ON
    explanation: >-
      The systematic review supports clinical plausibility but cautions that
      definitive evidence for acute NMO/NMOSD optic neuritis remains limited.
- name: Maintenance intravenous immunoglobulin for relapsing MOGAD-associated optic neuritis
  description: >-
    Maintenance IVIG is used as a relapse-prevention option in relapsing MOGAD,
    including patients whose MOGAD phenotype includes optic neuritis. Evidence is
    retrospective and subtype-specific rather than a general treatment for all
    optic neuritis.
  treatment_term:
    preferred_term: intravenous immunoglobulin therapy
    term:
      id: MAXO:0001480
      label: immunoglobulin infusion therapy
  target_mechanisms:
  - target: MOG-IgG-mediated demyelinating optic neuritis
    treatment_effect: INHIBITS
    description: >-
      IVIG is used to reduce relapsing MOG-IgG-associated inflammatory
      demyelinating attacks.
  evidence:
  - reference: PMID:35377395
    reference_title: Association of Maintenance Intravenous Immunoglobulin With Prevention of Relapse in Adult Myelin Oligodendrocyte Glycoprotein Antibody-Associated Disease.
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      maintenance IVIG was associated with a reduction in disease relapse
    explanation: >-
      This international adult MOGAD cohort supports maintenance IVIG as a
      relapse-prevention strategy relevant to relapsing MOG-associated optic
      neuritis.
- name: Eculizumab relapse prevention for AQP4-IgG/NMOSD-associated optic neuritis
  description: >-
    Complement C5 blockade with eculizumab reduces relapse risk in
    AQP4-IgG-positive NMOSD; this is relevant to optic neuritis when optic nerve
    attacks occur as part of AQP4-IgG/NMOSD-associated disease.
  treatment_term:
    preferred_term: Pharmacotherapy
    term:
      id: NCIT:C15986
      label: Pharmacotherapy
    therapeutic_agent:
    - preferred_term: eculizumab
      term:
        id: NCIT:C48386
        label: Eculizumab
  target_mechanisms:
  - target: AQP4-IgG astrocytopathic optic neuritis
    treatment_effect: INHIBITS
    description: >-
      C5 blockade reduces terminal complement-mediated astrocyte injury in
      AQP4-IgG-positive NMOSD.
  evidence:
  - reference: PMID:31050279
    reference_title: Eculizumab in Aquaporin-4-Positive Neuromyelitis Optica Spectrum Disorder.
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Adjudicated relapses occurred in 3 of 96 patients (3%) in the eculizumab
      group and 20 of 47 (43%) in the placebo group
    explanation: >-
      The PREVENT trial supports eculizumab for relapse prevention in
      AQP4-IgG-positive NMOSD, including prevention of recurrent optic neuritis
      attacks in that subtype context.
