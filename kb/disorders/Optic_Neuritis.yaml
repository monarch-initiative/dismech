    snippet: >-
      overall 5-year incidence rate was 1.56 cases per 100,000 inhabitants per
      year
    explanation: >-
      COIDES provides a recent national population-based incidence estimate for
      optic neuritis.
- name: Afro-descendant Martinique cohort incidence, 2018-2022
  description: >-
    Retrospective cohort estimate from Martinique using the 2022 Lancet optic
    neuritis criteria after neuro-ophthalmologic evaluation.
  minimum_value: 1.61
  unit: cases per 100000 person-years
  notes: >-
    Final diagnoses included MS-associated, MOG-associated, NMOSD-associated,
    single isolated, relapsing isolated, and unclassified optic neuritis.
  evidence:
  - reference: PMID:39963868
    reference_title: "Incidence of optic neuritis among Afro-descendant, a cohort study."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "The overall incidence was 1.61"
    explanation: >-
      The Martinique cohort provides a population estimate in an
      Afro-descendant population and applies the 2022 criteria.
pathophysiology:
- name: Immune-mediated optic nerve inflammation
  description: >-
    Optic neuritis is driven by inflammatory injury within the optic nerve,
    producing acute or subacute visual dysfunction. The broad syndrome includes
    isolated inflammatory optic neuropathy as well as disease-specific immune
    mechanisms in MS, MOGAD, NMOSD, and systemic inflammatory disease.
  locations:
  - preferred_term: cranial nerve II
    term:
      id: UBERON:0000941
      label: cranial nerve II
  biological_processes:
  - preferred_term: inflammatory response
    term:
      id: GO:0006954
      label: inflammatory response
    modifier: INCREASED
  - preferred_term: neuroinflammatory response
    term:
      id: GO:0150076
      label: neuroinflammatory response
    modifier: INCREASED
  downstream:
  - target: Optic Nerve Conduction Delay
    description: >-
      Inflammation and demyelination delay optic pathway conduction, which can
      be measured with visual evoked potentials.
  - target: Visual Dysfunction
    description: >-
      Optic nerve inflammation causes visual acuity loss, dyschromatopsia,
      visual field defects, and reduced contrast sensitivity.
  evidence:
  - reference: ORPHA:499096
    reference_title: Isolated optic neuritis
    supports: SUPPORT
    evidence_source: OTHER
    snippet: "A rare inflammatory optic neuropathy"
    explanation: >-
      The Orphanet structured record anchors the isolated form as inflammatory
      optic neuropathy.
  - reference: PMID:41688447
    reference_title: An update on the developments and challenges with the diagnosis and classification of autoimmune optic neuritis.
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Autoimmune optic neuritis (ON) is a heterogeneous spectrum
    explanation: >-
      The 2026 review supports heterogeneous immune-mediated etiologies for
      optic neuritis.
- name: Inflammatory demyelinating optic neuropathy
  description: >-
    Many optic neuritis attacks are demyelinating optic neuropathies. Loss or
    dysfunction of optic nerve myelin slows visual pathway conduction and is
    reflected by prolonged visual evoked potential latency; retinal and optic
    nerve structural injury can be followed by OCT.
  locations:
  - preferred_term: cranial nerve II
    term:
      id: UBERON:0000941
      label: cranial nerve II
  cell_types:
  - preferred_term: oligodendrocyte
    term:
      id: CL:0000128
      label: oligodendrocyte
  biological_processes:
  - preferred_term: myelination
    term:
      id: GO:0042552
      label: myelination
    modifier: DECREASED
  cellular_components:
  - preferred_term: myelin sheath
    term:
      id: GO:0043209
      label: myelin sheath
    modifier: DECREASED
  downstream:
  - target: Visual Evoked Potential Latency Prolongation
    description: >-
      Demyelinating injury slows optic nerve conduction and prolongs P100 or
      full-field VEP latency.
  evidence:
  - reference: clinicaltrials:NCT01524250
    reference_title: "Recovery of Demyelinating Optic Neuritis After Treatment With Equivalent High Doses of Oral vs. Intravenous Corticosteroids: a Randomized Single Blinded Clinical Trial"
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "acute demyelinating optic neuritis"
    explanation: >-
      The randomized oral-versus-intravenous corticosteroid trial record
      specifically enrolled acute demyelinating optic neuritis.
  - reference: PMID:28229892
    reference_title: "Safety and efficacy of opicinumab in acute optic neuritis (RENEW): a randomised, placebo-controlled, phase 2 trial."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      measured as recovery of affected optic nerve conduction latency
    explanation: >-
      RENEW used optic nerve conduction latency recovery as a remyelination
      endpoint, linking optic neuritis to demyelinating conduction delay.
- name: MOG-IgG-mediated demyelinating optic neuritis
  description: >-
    In MOGAD-associated optic neuritis, antibodies to conformational MOG
    epitopes identify a demyelinating disease that is distinct from MS and
    AQP4-IgG NMOSD. MOG-IgG effector mechanisms include complement-dependent
    cytotoxicity, antibody-dependent cellular cytotoxicity, and T-cell supported
    CNS inflammation.
  biological_processes:
  - preferred_term: complement activation
    term:
      id: GO:0006956
      label: complement activation
    modifier: INCREASED
  - preferred_term: T cell mediated immunity
    term:
      id: GO:0002456
      label: T cell mediated immunity
    modifier: INCREASED
  downstream:
  - target: Inflammatory Demyelinating Optic Neuropathy
    description: >-
      MOG-IgG effector mechanisms converge on oligodendrocyte/myelin injury in
      optic neuritis attacks.
  evidence:
  - reference: PMID:36706773
    reference_title: "Diagnosis of myelin oligodendrocyte glycoprotein antibody-associated disease: International MOGAD Panel proposed criteria."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Serum antibodies directed against myelin oligodendrocyte glycoprotein
    explanation: >-
      International criteria establish serum MOG-IgG as the defining biomarker
      for MOGAD, a common optic neuritis etiology.
  - reference: PMID:40088708
    reference_title: "Myelin oligodendrocyte glycoprotein antibody-associated disease (MOGAD): Insights into pathogenesis and biomarkers of prognosis."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      MOG-IgG-mediated demyelination occurs via complement-dependent
      cytotoxicity
    explanation: >-
      The review describes antibody effector mechanisms relevant to MOGAD optic
      neuritis.
- name: AQP4-IgG astrocytopathic optic neuritis
  description: >-
    In AQP4-IgG-positive NMOSD, optic neuritis reflects astrocyte-targeted
    autoimmunity with complement-mediated injury and secondary demyelination.
    This mechanism differs from primary MS-type demyelination and from MOGAD.
  genes:
  - preferred_term: AQP4
    term:
      id: hgnc:637
      label: AQP4
  cell_types:
  - preferred_term: astrocyte
    term:
      id: CL:0000127
      label: astrocyte
  biological_processes:
  - preferred_term: complement activation, classical pathway
    term:
      id: GO:0006958
      label: complement activation, classical pathway
    modifier: INCREASED
  downstream:
  - target: Secondary Demyelination and Neuronal Injury
    description: >-
      Complement-mediated astrocyte injury propagates demyelinating and axonal
      damage in optic pathways.
  evidence:
  - reference: PMID:26092914
    reference_title: International consensus diagnostic criteria for neuromyelitis optica spectrum disorders.
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      associated with serum aquaporin-4 immunoglobulin G antibodies
    explanation: >-
      The NMOSD consensus criteria establish AQP4-IgG as the defining
      serologic marker for the AQP4-positive optic neuritis subgroup.
