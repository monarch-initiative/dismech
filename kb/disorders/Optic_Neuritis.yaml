    snippet: "recovery of the latency of the P100 component"
    explanation: >-
      VEP latency recovery was used as a functional optic nerve outcome in a
      randomized optic neuritis treatment trial.
- name: AQP4-IgG and MOG-IgG antibody testing
  description: >-
    Serum antibody testing is central for distinguishing MOGAD-associated and
    AQP4-IgG NMOSD-associated optic neuritis from MS-associated, isolated, and
    other inflammatory optic neuritis.
  results: >-
    Positive MOG-IgG or AQP4-IgG redirects the diagnosis to an antibody-defined
    demyelinating disease subgroup.
  diagnosis_term:
