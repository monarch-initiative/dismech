biochemical:
- name: MOG-IgG seropositivity
  presence: PRESENT
  context: >-
    Serum MOG-IgG identifies MOGAD-associated optic neuritis and should be
    interpreted with assay quality, titer, and phenotype in mind.
  evidence:
  - reference: PMID:36706773
    reference_title: "Diagnosis of myelin oligodendrocyte glycoprotein antibody-associated disease: International MOGAD Panel proposed criteria."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "presence of MOG-IgG is a core criterion"
    explanation: >-
      International MOGAD criteria define MOG-IgG as a core diagnostic
      criterion for MOGAD-associated optic neuritis.
- name: AQP4-IgG seropositivity
  presence: PRESENT
  context: >-
    Serum AQP4-IgG identifies NMOSD-associated optic neuritis and strongly
    changes relapse-prevention and acute-attack management.
  evidence:
  - reference: PMID:26092914
    reference_title: International consensus diagnostic criteria for neuromyelitis optica spectrum disorders.
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "NMOSD with or without AQP4-IgG"
    explanation: >-
      The NMOSD consensus framework stratifies disease by AQP4-IgG serostatus.
- name: Serum neurofilament light chain and serum GFAP
  presence: INCREASED
  context: >-
    Serum neurofilament light chain and serum glial fibrillary acidic protein
    are emerging injury biomarkers that may help refine risk estimates,
    particularly in seronegative or diagnostically gray-zone optic neuritis.
  evidence:
  - reference: PMID:41688447
    reference_title: An update on the developments and challenges with the diagnosis and classification of autoimmune optic neuritis.
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      may refine risk estimates, especially in seronegative cases
    explanation: >-
      The 2026 review identifies sNfL and sGFAP as emerging adjunct biomarkers
      for risk estimation in autoimmune optic neuritis.
diagnosis:
- name: Multimodal optic neuritis classification workup
  description: >-
    Diagnostic evaluation should establish optic neuritis and then attribute the
    attack to the correct subgroup using clinical pattern, brain/orbital/retinal
    imaging, antibody testing, VEP, and selected protein biomarkers.
  results: >-
    Supports classification into isolated, MS-associated, MOGAD-associated,
    NMOSD-associated, systemic inflammatory, infectious, or unclassified optic
    neuritis.
  diagnosis_term:
    preferred_term: diagnostic procedure
    term:
      id: MAXO:0000003
      label: diagnostic procedure
  evidence:
  - reference: PMID:36179757
    reference_title: Diagnosis and classification of optic neuritis.
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      brain, orbital, and retinal imaging, together with antibody and other
      protein biomarker data
    explanation: >-
      The international framework supports a multimodal diagnostic process for
      definite optic neuritis and subgroup classification.
- name: Orbital and brain MRI
  description: >-
    MRI documents optic nerve enhancement or T2 signal abnormality, screens for
    MS-type brain lesions, and helps identify NMOSD or MOGAD red flags such as
    long optic-nerve involvement, chiasmal extension, or associated myelitis.
  results: >-
    MRI supports diagnosis and etiologic classification when interpreted with
    clinical pattern and serology.
  diagnosis_term:
    preferred_term: magnetic resonance imaging procedure
    term:
      id: MAXO:0000424
      label: magnetic resonance imaging procedure
  evidence:
  - reference: PMID:41688447
    reference_title: An update on the developments and challenges with the diagnosis and classification of autoimmune optic neuritis.
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      standardized diagnostic pathways integrating orbital magnetic resonance
      imaging
    explanation: >-
      The 2026 review identifies orbital MRI as a key component of standardized
      diagnostic pathways.
- name: Optical coherence tomography
  description: >-
    OCT measures retinal nerve fiber layer and ganglion cell complex injury,
    helping quantify structural damage and follow recovery or atrophy after an
    attack.
  results: >-
    OCT provides retinal structural markers that complement MRI, VEP, and
    serologic testing.
  diagnosis_term:
    preferred_term: optical coherence tomography
    term:
      id: MAXO:0000969
      label: optical coherence tomography
  evidence:
  - reference: PMID:41688447
    reference_title: An update on the developments and challenges with the diagnosis and classification of autoimmune optic neuritis.
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "antibody assays, OCT, and visual evoked potentials"
    explanation: >-
      The 2026 review lists OCT among tools needed for standardized autoimmune
      optic neuritis diagnosis.
  - reference: PMID:36810323
    reference_title: Diagnostic value of intereye difference metrics for optic neuritis in aquaporin-4 antibody seropositive neuromyelitis optica spectrum disorders
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Results support the validation of the IED metrics
    explanation: >-
      This multicenter AQP4+ NMOSD study validates OCT intereye-difference
      metrics for optic neuritis in an antibody-defined subgroup.
  - reference: PMID:39231384
    reference_title: Diagnostic Value of Inter-Eye Difference Metrics on OCT for Myelin Oligodendrocyte Glycoprotein Antibody-Associated Optic Neuritis.
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      diagnostic accuracy of OCT-based IED metrics for ON was high
    explanation: >-
      This multicenter MOG-ON study validates OCT intereye-difference metrics,
      especially macular ganglion cell and inner plexiform layer percentage
      difference.
- name: Visual evoked potential procedure
  description: >-
    Visual evoked potentials assess optic pathway conduction delay and can
    provide functional evidence of demyelinating optic nerve injury.
  results: >-
    Prolonged VEP latency supports optic nerve conduction slowing and can be
    tracked during recovery.
  diagnosis_term:
    preferred_term: visual evoked potential procedure
    term:
      id: MAXO:0035097
      label: visual evoked potential procedure
