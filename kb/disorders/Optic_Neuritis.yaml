definitions:
- name: Autoimmune optic neuritis spectrum
  definition_type: CASE_DEFINITION
  description: >-
    Autoimmune optic neuritis is a heterogeneous inflammatory optic-nerve
    syndrome spanning multiple sclerosis, NMOSD, MOGAD, isolated optic neuritis,
    and other etiologies. First-attack attribution should combine clinical red
    flags with orbital MRI, antibody assays, OCT, visual evoked potentials, and
    selected fluid biomarkers.
  criteria_sets:
  - name: Multimodal first-attack attribution
    core_clinical_characteristics:
    - preferred_term: optic neuritis
      term:
        id: HP:0100653
        label: Optic neuritis
    - preferred_term: visual loss
      term:
        id: HP:0000572
        label: Visual loss
  evidence:
  - reference: PMID:41688447
    reference_title: An update on the developments and challenges with the diagnosis and classification of autoimmune optic neuritis.
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Early and accurate attribution at the first attack is clinically decisive
    explanation: >-
      The 2026 review frames autoimmune optic neuritis as a heterogeneous
      spectrum whose first-attack attribution affects treatment choice.
- name: International optic neuritis diagnostic-classification framework
  definition_type: DIAGNOSTIC_CRITERIA
  description: >-
    The 2022 international framework begins with clinical features sufficient
    for possible optic neuritis, then uses paraclinical tests including brain,
    orbital, and retinal imaging, antibody testing, and protein biomarkers to
    support definite optic neuritis and classify disease subgroups.
  evidence:
  - reference: PMID:36179757
    reference_title: Diagnosis and classification of optic neuritis.
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      developed diagnostic criteria for optic neuritis and a classification of
      optic neuritis subgroups
    explanation: >-
      Petzold et al. provide the consensus classification framework used to
      distinguish optic neuritis subgroups.
- name: Orphanet isolated optic neuritis definition
  definition_type: OTHER
  description: >-
    Isolated optic neuritis consists of single or recurrent optic neuritis
    episodes not associated with another neurologic or systemic disease.
  evidence:
  - reference: ORPHA:499096
    reference_title: Isolated optic neuritis
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      isolated episodes (either single or recurrent) of optic neuritis
    explanation: >-
      Orphanet defines the isolated subtype by single or recurrent attacks in
      the absence of another neurologic or systemic disorder.
