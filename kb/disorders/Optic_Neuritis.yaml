description: >-
  Optic neuritis is an inflammatory optic neuropathy in which immune-mediated
  injury of the optic nerve causes acute or subacute visual dysfunction. Modern
  classification treats optic neuritis as a heterogeneous syndrome: it can be
  isolated, multiple sclerosis-associated, MOG-IgG-associated, AQP4-IgG
  neuromyelitis optica spectrum disorder-associated, or linked to other systemic,
  infectious, or inflammatory disorders. Accurate etiologic attribution at the
  first attack is clinically important because acute treatment, relapse
  prevention, and prognosis differ across subgroups.
