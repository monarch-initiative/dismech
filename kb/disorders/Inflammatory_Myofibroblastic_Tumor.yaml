name: Inflammatory Myofibroblastic Tumor
creation_date: "2026-06-08T16:49:40Z"
category: Complex
disease_term:
  preferred_term: inflammatory myofibroblastic tumor
  term:
    id: MONDO:0015798
    label: inflammatory myofibroblastic tumor
description: >-
  Inflammatory myofibroblastic tumor (IMT) is a rare mesenchymal neoplasm of
  intermediate (rarely metastasizing) malignant potential composed of
  myofibroblastic and fibroblastic spindle cells in a variably myxoid to
  collagenous stroma, accompanied by a prominent inflammatory infiltrate of
  plasma cells, lymphocytes, and eosinophils. It predominantly affects children,
  adolescents, and young adults, with a predilection for the lung, abdomen,
  pelvis, mesentery, omentum, and retroperitoneum, though it can arise anywhere.
  Approximately half of IMTs are driven by clonal anaplastic lymphoma kinase
  (ALK) gene rearrangements; additional receptor tyrosine kinase fusions
  involving ROS1, NTRK, RET, and PDGFRB define further molecular subtypes, while
  a subset are kinase-fusion-negative. The molecular landscape underpins targeted
  therapy with tyrosine kinase inhibitors (e.g., crizotinib for ALK/ROS1-positive
  disease). Epithelioid inflammatory myofibroblastic sarcoma (EIMS) is a more
  aggressive variant, typically harboring RANBP2-ALK fusions with nuclear
  membranous ALK staining.
categories:
- Molecularly-Defined Cancer
- Fusion Gene-Driven Cancer
- Soft Tissue Sarcoma
parents:
- soft tissue neoplasm

has_subtypes:
- name: ALK-Positive
  display_name: ALK-rearranged IMT
  description: >-
    The most common molecular subtype (~50% of IMTs), defined by clonal
    rearrangements of the anaplastic lymphoma kinase (ALK) gene on chromosome
    2p23 fused to diverse partner genes (e.g., TPM3, TPM4, CLTC, DCTN1, RANBP2).
    Tumors are typically positive for ALK by immunohistochemistry and respond to
    ALK inhibitors such as crizotinib.
- name: ROS1-Fusion
  display_name: ROS1-rearranged IMT
  description: >-
    A subtype of ALK-negative IMT driven by rearrangements of the ROS1 receptor
    tyrosine kinase gene (e.g., YWHAE-ROS1, TFG-ROS1). ROS1
    immunohistochemistry correlates with ROS1 rearrangement and these tumors are
    candidates for ROS1-directed inhibitors (crizotinib, entrectinib).
- name: NTRK-Fusion
  display_name: NTRK-rearranged IMT
  description: >-
    A rare ALK-negative subtype driven by fusions of the neurotrophic tyrosine
    receptor kinase genes (NTRK1/NTRK3), targetable with TRK inhibitors
    (larotrectinib, entrectinib).
- name: ALK-Negative
  display_name: ALK-negative / kinase-fusion-negative IMT
  description: >-
    IMTs lacking ALK rearrangement. A proportion harbor alternative kinase
    fusions (ROS1, NTRK, RET, PDGFRB), while the molecular pathogenesis of the
    remainder is incompletely understood. ALK-negative status has historically
    been associated with a less favorable prognosis in some series.

pathophysiology:
- name: Clonal Receptor Tyrosine Kinase Gene Rearrangement
  description: >-
    A defining initiating event in roughly half of IMTs is a clonal chromosomal
    rearrangement of the ALK receptor tyrosine kinase gene at 2p23, fusing the
    ALK kinase domain to an N-terminal partner gene (e.g., TPM3, TPM4, CLTC,
    DCTN1, RANBP2). Analogous rearrangements involving ROS1, NTRK1/3, RET, and
    PDGFRB occur in ALK-negative cases. The fusion partner drives constitutive
    expression and oligomerization of the chimeric kinase.
  cell_types:
  - preferred_term: myofibroblast
    term:
      id: CL:0000186
      label: myofibroblast cell
  gene_products:
  - preferred_term: ALK tyrosine kinase receptor
    term:
      id: NCIT:C27032
      label: ALK Tyrosine Kinase Receptor
  evidence:
  - reference: PMID:34244015
    reference_title: "Inflammatory myofibroblastic tumor: molecular landscape, targeted therapeutics, and remaining challenges."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Approximately \nhalf of IMTs harbor anaplastic lymphoma kinase (ALK) gene rearrangements, and \nfusions involving ROS1, PDGFRβ, RET and NTRK have also been described."
    explanation: >-
      Establishes that ~50% of IMTs are driven by ALK rearrangements, with
      ROS1, PDGFRB, RET, and NTRK fusions defining the additional molecular
      subtypes modeled in has_subtypes.
  - reference: PMID:27874193
    reference_title: "ALK oncoproteins in atypical inflammatory myofibroblastic tumours: novel RRBP1-ALK fusions in epithelioid inflammatory myofibroblastic sarcoma."
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: "each of which had ALK genomic perturbations."
    explanation: >-
      Mass-spectrometry characterization of multiple ALK fusion oncoproteins
      (TPM3/4-ALK, DCTN1-ALK, RANBP2-ALK, RRBP1-ALK) confirms the chimeric
      kinase as the constitutively activated driver.
  downstream:
  - target: Constitutive Tyrosine Kinase Activation
    description: >-
      The fusion partner mediates ligand-independent oligomerization and
      constitutive activation of the chimeric ALK/ROS1/NTRK kinase domain.

- name: Constitutive Tyrosine Kinase Activation
  description: >-
    The fusion oncoprotein exhibits ligand-independent, constitutive tyrosine
    kinase activity. The chimeric kinase autophosphorylates and activates
    downstream proliferative and survival signaling cascades (RAS-MAPK,
    PI3K-AKT, JAK-STAT), driving oncogenic transformation of the myofibroblast.
  cell_types:
  - preferred_term: myofibroblast
    term:
      id: CL:0000186
      label: myofibroblast cell
  biological_processes:
  - preferred_term: receptor tyrosine kinase signaling
    modifier: INCREASED
    term:
      id: GO:0007169
      label: cell surface receptor protein tyrosine kinase signaling pathway
  - preferred_term: Ras protein signal transduction
    modifier: INCREASED
    term:
      id: GO:0007265
      label: Ras protein signal transduction
  evidence:
  - reference: PMID:27874193
    reference_title: "ALK oncoproteins in atypical inflammatory myofibroblastic tumours: novel RRBP1-ALK fusions in epithelioid inflammatory myofibroblastic sarcoma."
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: "ALK oncogenic activation mechanisms were characterized in four conventional \nspindle-cell inflammatory myofibroblastic tumours (IMT) and five atypical IMT, \neach of which had ALK genomic perturbations."
    explanation: >-
      Demonstrates that the ALK genomic rearrangements in IMT result in
      oncogenic kinase activation, the central pathophysiologic mechanism.
  downstream:
  - target: Myofibroblastic Proliferation and Inflammatory Recruitment
    description: >-
      Constitutive kinase signaling drives clonal myofibroblastic proliferation
      and an associated inflammatory microenvironment.

- name: Myofibroblastic Proliferation and Inflammatory Recruitment
  description: >-
    Constitutive kinase signaling drives clonal proliferation of neoplastic
    myofibroblasts arranged in fascicles, accompanied by recruitment of a dense
    polymorphous inflammatory infiltrate (plasma cells, lymphocytes,
    eosinophils). The resulting mass is locally infiltrative with a propensity
    for recurrence; rare cases metastasize.
  cell_types:
  - preferred_term: myofibroblast
    term:
      id: CL:0000186
      label: myofibroblast cell
  - preferred_term: plasma cell
    term:
      id: CL:0000786
      label: plasma cell
  biological_processes:
  - preferred_term: cell proliferation
    modifier: INCREASED
    term:
      id: GO:0008283
      label: cell population proliferation
  - preferred_term: inflammatory response
    modifier: INCREASED
    term:
      id: GO:0006954
      label: inflammatory response
  evidence:
  - reference: PMID:25612511
    reference_title: "Expression of ROS1 predicts ROS1 gene rearrangement in inflammatory myofibroblastic tumors."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Inflammatory myofibroblastic tumor is a distinctive, rarely metastasizing \nmesenchymal neoplasm composed of fascicles of spindle cells with a prominent \ninflammatory infiltrate."
    explanation: >-
      Confirms the defining histologic combination of proliferating spindle
      (myofibroblastic) cells in fascicles with a prominent inflammatory
      infiltrate.
  downstream:
  - target: Acquired Resistance to Kinase Inhibition
    description: >-
      Under selective pressure of targeted ALK/ROS1 inhibition, residual tumor
      cells acquire resistance, driving relapse of the proliferative process.

- name: Acquired Resistance to Kinase Inhibition
  description: >-
    In patients treated with ALK (or ROS1) tyrosine kinase inhibitors, acquired
    resistance commonly emerges through secondary mutations in the ALK kinase
    domain (e.g., L1196M, G1202R, I1171N, G1269A) that impair drug binding, or
    through compensatory activation of bypass signaling pathways (e.g., EGFR,
    PDGFRB, MAPK, SHH). This limits the durability of targeted therapy and
    motivates sequential next-generation inhibitors and repeat molecular
    profiling at relapse.
  cell_types:
  - preferred_term: myofibroblast
    term:
      id: CL:0000186
      label: myofibroblast cell
  biological_processes:
  - preferred_term: receptor tyrosine kinase signaling
    modifier: INCREASED
    term:
      id: GO:0007169
      label: cell surface receptor protein tyrosine kinase signaling pathway
  evidence:
  - reference: PMID:33116613
    reference_title: "Efficacy and Resistance of ALK Inhibitors in Two Inflammatory Myofibroblastic Tumor Patients with ALK Fusions Assessed by Whole Exome and RNA Sequencing."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Acquired resistance to ALK inhibitors is often accompanied by three types of secondary mutations in the ALK kinase domain."
    explanation: >-
      Documents secondary ALK kinase-domain mutations as a recurrent mechanism
      of acquired resistance to ALK inhibitors in ALK-fusion IMT.
  - reference: PMID:33116613
    reference_title: "Efficacy and Resistance of ALK Inhibitors in Two Inflammatory Myofibroblastic Tumor Patients with ALK Fusions Assessed by Whole Exome and RNA Sequencing."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "compensatory activation of bypass pathways is the basic principle of this type of resistance."
    explanation: >-
      Documents bypass-pathway (ALK-independent) signaling as a second principal
      mechanism of acquired resistance to ALK inhibitors in IMT.

histopathology:
- name: Myofibroblastic Spindle Cell Proliferation
  finding_term:
    preferred_term: spindle cell pattern
    term:
      id: NCIT:C53643
      label: Spindle Cell Pattern
  frequency: VERY_FREQUENT
  diagnostic: true
  description: >-
    Fascicles of bland myofibroblastic/fibroblastic spindle cells with
    eosinophilic cytoplasm in a variably myxoid to collagenous stroma. The
    spindle-cell proliferation is the defining mesenchymal component of IMT.
  evidence:
  - reference: PMID:25612511
    reference_title: "Expression of ROS1 predicts ROS1 gene rearrangement in inflammatory myofibroblastic tumors."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "mesenchymal neoplasm composed of fascicles of spindle cells with a prominent \ninflammatory infiltrate."
    explanation: >-
      Documents the fascicular spindle-cell morphology that is the hallmark
      histopathologic finding of IMT.
- name: Prominent Inflammatory Infiltrate
  finding_term:
    preferred_term: inflammatory infiltrate
    term:
      id: NCIT:C35978
      label: Inflammatory Infiltrate
  frequency: VERY_FREQUENT
  description: >-
    A dense polymorphous inflammatory infiltrate of plasma cells, lymphocytes,
    and eosinophils intermixed with the spindle-cell component is
    characteristic and gives the tumor its name.
  evidence:
  - reference: PMID:25612511
    reference_title: "Expression of ROS1 predicts ROS1 gene rearrangement in inflammatory myofibroblastic tumors."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "spindle cells with a prominent \ninflammatory infiltrate."
    explanation: >-
      Documents the prominent inflammatory infiltrate that defines the
      inflammatory component of IMT histology.

