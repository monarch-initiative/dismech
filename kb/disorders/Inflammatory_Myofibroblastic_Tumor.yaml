treatments:
- name: Surgical Resection
  description: >-
    Complete surgical resection is the treatment of choice for localized,
    resectable IMT.
  treatment_term:
    preferred_term: surgical procedure
    term:
      id: NCIT:C15329
      label: Surgical Procedure
  evidence:
  - reference: PMID:34244015
    reference_title: "Inflammatory myofibroblastic tumor: molecular landscape, targeted therapeutics, and remaining challenges."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Complete \nsurgical resection is the treatment of choice when feasible."
    explanation: >-
      Surgical resection is the established first-line therapy for resectable
      IMT.
- name: Crizotinib (ALK/ROS1 Inhibitor)
  description: >-
    Crizotinib, an ALK and ROS1 tyrosine kinase inhibitor, produces objective
    responses in patients with unresectable or advanced ALK-positive (and
    ROS1-rearranged) IMT, and is used in the targeted-therapy setting.
  therapeutic_modality: SMALL_MOLECULE
  treatment_term:
    preferred_term: Pharmacotherapy
    term:
      id: NCIT:C15986
      label: Pharmacotherapy
    therapeutic_agent:
    - preferred_term: crizotinib
      term:
        id: CHEBI:64310
        label: crizotinib
  evidence:
  - reference: PMID:29286567
    reference_title: "Crizotinib in ALK(+) inflammatory myofibroblastic tumors-Current experience and future perspectives."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "As about 50% of IMT and 100% of EIMS contain activating rearrangements of the \nanaplastic lymphoma kinase (ALK) gene, targeted kinase inhibition of ALK by \ncompounds such as crizotinib is a potential treatment option."
    explanation: >-
      Establishes the rationale for ALK inhibition with crizotinib in
      ALK-positive IMT/EIMS.
  - reference: PMID:29286567
    reference_title: "Crizotinib in ALK(+) inflammatory myofibroblastic tumors-Current experience and future perspectives."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "We performed a \nliterature review and analyzed a total of 30 patients with IMT/EIMS treated with \ncrizotinib. A total of 12 patients achieved complete or partial remission."
    explanation: >-
      Reports objective clinical responses (complete/partial remission) to
      crizotinib in a pooled IMT/EIMS cohort.
  - reference: PMID:32915420
    reference_title: "A novel LRRFIP1-ALK fusion in inflammatory myofibroblastic tumor of hip and response to crizotinib."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Crizotinib, an ALK inhibitor, was effective in the treatment of this \npatient"
    explanation: >-
      Case-level evidence of crizotinib efficacy in ALK-fusion IMT (LRRFIP1-ALK).

notes: >-
  Epithelioid inflammatory myofibroblastic sarcoma (EIMS) is an aggressive
  variant that almost always harbors RANBP2-ALK fusions with characteristic
  nuclear membranous ALK staining (PMID:27874193). ALK-negative status has been
  associated with worse outcomes in some pediatric series (PMID:15602716),
  although molecular subclassification with ROS1/NTRK/RET/PDGFRB testing now
  reclassifies many former "ALK-negative" tumors as kinase-fusion-driven and
  potentially targetable.

