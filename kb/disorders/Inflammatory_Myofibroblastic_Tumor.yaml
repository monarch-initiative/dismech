  biomarker_term:
    preferred_term: ALK tyrosine kinase receptor
    term:
      id: NCIT:C27032
      label: ALK Tyrosine Kinase Receptor
  evidence:
  - reference: PMID:15602716
    reference_title: "Pediatric inflammatory myofibroblastic tumor: anaplastic lymphoma kinase (ALK) expression and prognosis."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
