genetic:
- name: ALK Gene Rearrangement
  association: Causal somatic gene rearrangement
  notes: >-
    Clonal rearrangement of the ALK receptor tyrosine kinase gene (2p23) is the
    most common molecular driver of IMT (~50% of cases), generating
    constitutively active ALK fusion oncoproteins with diverse N-terminal
    partners.
  gene_term:
    preferred_term: ALK
    term:
      id: hgnc:427
      label: ALK
  evidence:
  - reference: PMID:34244015
    reference_title: "Inflammatory myofibroblastic tumor: molecular landscape, targeted therapeutics, and remaining challenges."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Approximately \nhalf of IMTs harbor anaplastic lymphoma kinase (ALK) gene rearrangements"
    explanation: >-
      Establishes ALK rearrangement as the predominant genetic driver of IMT.
- name: ROS1 Gene Rearrangement
  association: Causal somatic gene rearrangement (ALK-negative subset)
  notes: >-
    Rearrangements of the ROS1 receptor tyrosine kinase gene drive a subset of
    ALK-negative IMTs; ROS1 protein expression correlates with the
    rearrangement and supports targeted therapy.
  gene_term:
    preferred_term: ROS1
    term:
      id: hgnc:10261
      label: ROS1
  evidence:
  - reference: PMID:25612511
    reference_title: "Expression of ROS1 predicts ROS1 gene rearrangement in inflammatory myofibroblastic tumors."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Expression of ROS1 correlates with ROS1 gene rearrangement in \ninflammatory myofibroblastic tumor."
    explanation: >-
      Confirms ROS1 rearrangement as a driver in a subset of ALK-negative IMT,
      detectable by ROS1 immunohistochemistry.
- name: NTRK Gene Rearrangement
  association: Causal somatic gene rearrangement (ALK-negative subset)
  notes: >-
    Fusions of NTRK1/NTRK3 define a rare ALK-negative molecular subtype of IMT,
    targetable with TRK inhibitors.
  gene_term:
    preferred_term: NTRK3
    term:
      id: hgnc:8033
      label: NTRK3
  evidence:
  - reference: PMID:34244015
    reference_title: "Inflammatory myofibroblastic tumor: molecular landscape, targeted therapeutics, and remaining challenges."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "fusions involving ROS1, PDGFRβ, RET and NTRK have also been described."
    explanation: >-
      Documents NTRK (along with ROS1, PDGFRB, RET) fusions as recurrent
      drivers defining ALK-negative IMT subtypes.

