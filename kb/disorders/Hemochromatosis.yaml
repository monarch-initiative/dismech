  category: Hepatic
  frequency: FREQUENT
  description: >
    Enlarged liver due to iron accumulation in hepatocytes, often the earliest
    detectable physical finding.
  phenotype_term:
    preferred_term: hepatomegaly
    term:
      id: HP:0002240
      label: Hepatomegaly
  evidence:
