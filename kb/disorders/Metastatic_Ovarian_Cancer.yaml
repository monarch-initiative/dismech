name: Metastatic Ovarian Cancer
creation_date: '2026-03-28T21:40:00Z'
updated_date: '2026-04-11T14:29:25Z'
description: >-
  Metastatic ovarian cancer is usually advanced epithelial ovarian carcinoma, most often
  high-grade serous ovarian cancer, with dominant transcoelomic spread throughout the
  peritoneal cavity. Its metastatic biology is characterized by ascitic shedding, multicellular
  spheroid formation, mesothelial and extracellular matrix interactions, EMT-like plasticity,
  homologous recombination defects in BRCA-associated cases, and recurrent platinum resistance.
categories:
