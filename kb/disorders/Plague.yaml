genetic:
- name: ERAP2
  association: Evolutionary selection during Black Death
  gene_term:
    preferred_term: ERAP2
    term:
      id: hgnc:17910
      label: ERAP2
  notes: >
    The rs2549794 variant near ERAP2 was strongly selected during the
    1346-1353 Black Death pandemic. The selected allele produces a
    full-length ERAP2 aminopeptidase that enhances control of intracellular
    Y. pestis in macrophages through improved antigen processing. This
    protective allele is now associated with increased susceptibility to
    autoimmune diseases (antagonistic pleiotropy).
  evidence:
  - reference: PMID:36261521
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: The selected allele for one of these variants, rs2549794, is
      associated with the production of a full-length (versus truncated)
      ERAP2 transcript, variation in cytokine response to Y. pestis and
      increased ability to control intracellular Y. pestis in macrophages.
    explanation: ERAP2 rs2549794 was under positive selection during the
      Black Death and provides functional immune advantage.
treatments:
- name: Aminoglycoside Antibiotics
  description: >
    Streptomycin and gentamicin are first-line treatments for plague.
    Aminoglycosides have the longest track record of efficacy against
    Y. pestis infection.
  treatment_term:
    preferred_term: aminoglycoside antibiotic therapy
    term:
      id: MAXO:0000058
      label: pharmacotherapy
  evidence:
  - reference: PMID:32435802
    supports: SUPPORT
    snippet: Treatment with aminoglycosides such as streptomycin or gentamicin
      is effective when initiated early in illness but can have serious side
      effects.
    explanation: Confirms aminoglycosides as effective first-line treatment
      for plague.
  - reference: PMID:32435800
    supports: SUPPORT
    snippet: Tetracyclines, chloramphenicol, and aminoglycosides were
      associated with the lowest case fatality rates of all antimicrobials
      used for treatment of plague.
    explanation: Aggregate data confirms aminoglycosides among the most
      effective treatments for plague.
- name: Tetracycline Antibiotics
  description: >
    Doxycycline and other tetracyclines are effective alternatives for
    plague treatment and prophylaxis. Used when aminoglycosides are
    contraindicated.
  treatment_term:
    preferred_term: tetracycline antibiotic therapy
    term:
      id: MAXO:0000058
      label: pharmacotherapy
  evidence:
  - reference: PMID:32435800
    supports: SUPPORT
    snippet: Tetracyclines, chloramphenicol, and aminoglycosides were
      associated with the lowest case fatality rates of all antimicrobials
      used for treatment of plague.
    explanation: Confirms tetracyclines among the most effective plague
      treatments.
- name: Supportive Care
  description: >
    Intensive supportive care including fluid resuscitation, vasopressor
    support, and management of DIC complications for severe septicemic
    and pneumonic plague.
  treatment_term:
    preferred_term: supportive care
    term:
      id: MAXO:0000950
      label: supportive care
transmission:
- name: Flea-borne Transmission
  description: >
    Primary route of plague transmission. Infected fleas (primarily Xenopsylla
    cheopis, the Oriental rat flea) transmit Y. pestis to humans during blood
    meals. The bacterium forms a biofilm in the flea's proventriculus, which
    is regurgitated during feeding.
  evidence:
  - reference: PMID:30940874
    supports: SUPPORT
    snippet: Plague is a vector-borne disease caused by Yersinia pestis.
      Transmitted by fleas from rodent reservoirs
    explanation: Confirms the flea-borne vector transmission route from
      rodent reservoirs.
- name: Respiratory Droplet Transmission
  description: >
    Person-to-person transmission occurs via respiratory droplets from
    patients with pneumonic plague. This is the only form of plague that
    can spread directly between humans.
  notes: >
    Person-to-person respiratory droplet transmission is a defining feature
    of pneumonic plague; this is textbook knowledge not directly quoted in
    the abstract cache of cited references.
- name: Direct Contact
  description: >
    Handling infected animals or tissues, particularly during skinning or
    butchering of infected rodents or other mammals.
prevalence:
- population: Global
  percentage: 0.00003
  notes: >
    Approximately 2,000 cases reported annually to the WHO worldwide.
    Endemic foci in Africa, Asia, and the Americas. Madagascar, Democratic
    Republic of Congo, and Peru report the majority of modern cases.
  evidence:
  - reference: PMID:12951845
    supports: SUPPORT
    snippet: Approximately 2,000 cases of plague are reported each year to
      the World Health Organization, and concern has been raised about the
      possible use of Y pestis as an agent of bioterrorism.
    explanation: Confirms approximately 2,000 annual cases reported globally.
progression:
- phase: Onset
  incubation_days: 1-7
  notes: >
    Incubation period is typically 1-7 days for bubonic plague (usually 2-6
    days) and 1-3 days for pneumonic plague. Onset is acute with sudden
    fever, chills, and malaise.
- phase: Acute
  notes: >
    Rapid progression to bubo formation (bubonic), septicemia, or
    pneumonia depending on clinical form. Without treatment, pneumonic
    plague is fatal within 48 hours and bubonic plague within a week.
  evidence:
  - reference: PMID:30940874
    supports: SUPPORT
    snippet: the rapid onset of death in the absence of antibiotic treatment
      (less than a week for bubonic plague and <48 h for pneumonic plague)
    explanation: Confirms the timeline of untreated plague progression.
- phase: Resolution or Death
  notes: >
    With prompt antibiotic treatment, most patients recover. Without
    treatment, case fatality approaches 100% for pneumonic and septicemic
    forms. Even with treatment, overall case fatality is approximately 20%.
  evidence:
  - reference: PMID:32435802
    supports: SUPPORT
    snippet: The case fatality rate was 20% overall.
    explanation: Confirms 20% overall case fatality even with treatment.
notes: >
  The Black Death pandemic (1346-1353) is the single greatest mortality event
  in recorded history, killing 30-50% of the European population. Ancient DNA
  studies have confirmed Y. pestis as the causative agent and revealed that
  plague lineages were already circulating in Neolithic Europe thousands of
  years before the Black Death. Y. pestis evolved from the enteric pathogen
  Yersinia pseudotuberculosis less than 6,000 years ago through gene gain and
  genome reduction events.
