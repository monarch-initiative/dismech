  subtype: Pneumonic
  phenotype_term:
    preferred_term: Pneumonia
    term:
      id: HP:0002090
      label: Pneumonia
  evidence:
  - reference: PMID:30940874
    supports: SUPPORT
    snippet: allowing unrestricted bacterial replication in lymph nodes
