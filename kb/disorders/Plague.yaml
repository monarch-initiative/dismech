- Bacterial Infection
disease_term:
  preferred_term: plague
  term:
    id: MONDO:0019095
    label: plague
synonyms:
- Black Death
- Pestilence
- Bubonic Plague
- Pneumonic Plague
- Yersinia pestis infection
infectious_agent:
- name: Yersinia pestis
  infectious_agent_term:
    preferred_term: Yersinia pestis
    term:
      id: NCBITaxon:632
      label: Yersinia pestis
  evidence:
  - reference: PMID:12951845
    supports: SUPPORT
    snippet: Yersinia pestis is the cause of plague, an illness that may manifest
      in bubonic, pneumonic, or septicemic form.
    explanation: Establishes Y. pestis as the causative agent of all forms of plague.
has_subtypes:
- name: Bubonic
  display_name: Bubonic Plague
  description: >
    Most common form, resulting from flea bite inoculation. Y. pestis travels
    to regional lymph nodes, causing painful swollen lymph nodes (buboes),
    fever, and prostration. Without treatment, case fatality is approximately
    40-60%.
  evidence:
  - reference: PMID:32435802
    supports: SUPPORT
    snippet: Most patients had primary bubonic (63%), pneumonic (21%), or
      septicemic (5%) plague, with associated case fatality rates of 17%, 27%,
      and 38%, respectively.
    explanation: Confirms bubonic plague as the most common clinical form at 63%
      of cases.
- name: Septicemic
  display_name: Septicemic Plague
  description: >
    Bloodstream infection without prominent bubo formation, or secondary to
    bubonic plague. Characterized by disseminated intravascular coagulation,
    purpura, and multi-organ failure. Highest case fatality among treated
    patients.
  evidence:
  - reference: PMID:32435802
    supports: SUPPORT
    snippet: Most patients had primary bubonic (63%), pneumonic (21%), or
      septicemic (5%) plague, with associated case fatality rates of 17%, 27%,
      and 38%, respectively.
    explanation: Septicemic plague accounts for approximately 5% of cases but
      carries the highest treated case fatality rate at 38%.
- name: Pneumonic
  display_name: Pneumonic Plague
  description: >
    Infection of the lungs, either primary (from aerosol inhalation) or
    secondary (hematogenous spread from bubo). Transmissible person-to-person
    via respiratory droplets. Rapidly fatal without treatment within 48 hours.
  evidence:
  - reference: PMID:30940874
    supports: SUPPORT
    snippet: the rapid onset of death in the absence of antibiotic treatment
      (less than a week for bubonic plague and <48 h for pneumonic plague)
    explanation: Confirms the extreme lethality and rapid progression of
      pneumonic plague.
pathophysiology:
- name: Flea-Mediated Transmission
  description: >
    Y. pestis is transmitted to humans through the bite of an infected flea.
    The bacterium colonizes the flea midgut and forms a biofilm that blocks
    the proventriculus, causing the flea to regurgitate bacteria into the
    bite wound during feeding attempts.
  locations:
  - preferred_term: Skin
    term:
      id: UBERON:0002097
      label: skin of body
  downstream:
  - target: Type III Secretion System Deployment
    description: >
      After inoculation into the dermis, Y. pestis deploys its type III
      secretion system upon contact with host immune cells.
  evidence:
  - reference: PMID:30940874
    supports: SUPPORT
    snippet: Plague is a vector-borne disease caused by Yersinia pestis.
      Transmitted by fleas from rodent reservoirs, Y. pestis emerged <6000
      years ago from an enteric bacterial ancestor through events of gene gain
      and genome reduction.
    explanation: Establishes flea-mediated vector transmission as the primary
      route of Y. pestis infection.
- name: Type III Secretion System Deployment
  description: >
    Upon contact with host immune cells, Y. pestis deploys a type III
    secretion system (T3SS) encoded on the pYV/pCD1 virulence plasmid. The
    T3SS forms a needle-like injectisome that directly delivers Yop effector
    proteins into the cytoplasm of target immune cells.
  cell_types:
  - preferred_term: Macrophage
    term:
      id: CL:0000235
      label: macrophage
  - preferred_term: Neutrophil
    term:
      id: CL:0000775
      label: neutrophil
  - preferred_term: Dendritic Cell
    term:
      id: CL:0000451
      label: dendritic cell
  downstream:
  - target: Yop Effector Injection and Immune Subversion
    description: >
      The T3SS injects multiple Yop effector proteins that each target
      distinct immune cell signaling pathways.
  evidence:
  - reference: PMID:24198067
    supports: SUPPORT
    snippet: Within the host cell, the Yop effector proteins function to
      inhibit bacterial phagocytosis and to suppress the production of
      pro-inflammatory cytokines.
    explanation: Describes the T3SS-delivered Yop effectors and their
      functions within host cells.
  - reference: PMID:30940874
    supports: SUPPORT
    snippet: A complex set of virulence determinants, including the Yersinia
      outer-membrane proteins (Yops), the broad-range protease Pla,
      pathogen-associated molecular patterns (PAMPs), and iron capture systems
      play critical roles in the molecular strategies that Y. pestis employs to
      subvert the human immune system
    explanation: Confirms the multi-factorial virulence strategy including
      Yops and Pla protease.
- name: Yop Effector Injection and Immune Subversion
  description: >
    Individual Yop effector proteins target distinct immune cell functions.
    YopH dephosphorylates focal adhesion proteins to block phagocytosis.
    YopE and YopT inactivate Rho GTPases controlling cytoskeleton dynamics.
    YopJ/YopP prevents NF-kappaB activation, suppressing pro-inflammatory
    cytokine production.
  biological_processes:
  - preferred_term: Phagocytosis
    term:
      id: GO:0006909
      label: phagocytosis
    modifier: DECREASED
  - preferred_term: Innate immune response
    term:
      id: GO:0045087
      label: innate immune response
    modifier: DECREASED
  downstream:
  - target: Phagocytosis Inhibition and Bacterial Replication
    description: >
      Combined Yop-mediated suppression of phagocytosis allows unrestricted
      extracellular bacterial replication.
  evidence:
  - reference: PMID:10922034
    supports: SUPPORT
    snippet: YopH is a powerful phosphotyrosine phosphatase playing an
      antiphagocytic role by dephosphorylating several focal adhesion proteins.
      YopE and YopT contribute to antiphagocytic effects by inactivating
      GTPases controlling cytoskeleton dynamics. YopP/YopJ plays an
      anti-inflammatory role by preventing the activation of the transcription
      factor NF-kappaB.
    explanation: Details the specific molecular mechanisms of each Yop effector
      in immune evasion.
    evidence_source: IN_VITRO
- name: Phagocytosis Inhibition and Bacterial Replication
  description: >
    The combined effect of Yop-mediated immune subversion is that
    macrophages and neutrophils cannot effectively engulf and kill Y. pestis.
    This allows unrestricted extracellular bacterial replication at the
    inoculation site, enabling dissemination to draining lymph nodes.
  biological_processes:
  - preferred_term: Defense response to Gram-negative bacterium
    term:
      id: GO:0050829
      label: defense response to Gram-negative bacterium
    modifier: DECREASED
  downstream:
  - target: Lymph Node Colonization and Bubo Formation
    description: >
      Bacteria disseminate from the inoculation site via lymphatics to
      regional lymph nodes, where they replicate massively.
- name: Lymph Node Colonization and Bubo Formation
  description: >
    After immune evasion at the inoculation site, Y. pestis disseminates to
    draining lymph nodes where it replicates massively, causing hemorrhagic
    necrosis and the characteristic painful swollen lymph nodes (buboes) that
    define bubonic plague.
  cell_types:
  - preferred_term: Macrophage
    term:
      id: CL:0000235
      label: macrophage
  - preferred_term: Neutrophil
    term:
      id: CL:0000775
      label: neutrophil
  biological_processes:
  - preferred_term: Inflammatory response
    term:
      id: GO:0006954
      label: inflammatory response
  locations:
  - preferred_term: Lymph node
    term:
      id: UBERON:0000029
      label: lymph node
  downstream:
  - target: Systemic Spread and Septicemic Plague
    description: >
      Bacteria can escape from lymph nodes into the bloodstream, causing
      septicemia, disseminated intravascular coagulation, and multi-organ
      failure.
  evidence:
  - reference: PMID:30940874
    supports: SUPPORT
    snippet: allowing unrestricted bacterial replication in lymph nodes
      (bubonic plague) and in lungs (pneumonic plague)
    explanation: Confirms that lymph nodes are a primary site of Y. pestis
      replication in bubonic plague.
  - reference: PMID:12951845
    supports: SUPPORT
    snippet: Yersinia pestis is the cause of plague, an illness that may
      manifest in bubonic, pneumonic, or septicemic form. Plague has killed an
      estimated 200 million humans throughout history
    explanation: Establishes that bubonic form involves lymph node involvement
      and that plague has been historically devastating.
- name: Systemic Spread and Septicemic Plague
  description: >
    When Y. pestis enters the bloodstream from infected lymph nodes or
    directly, it causes septicemia with disseminated intravascular
    coagulation, purpura (historically giving the disease its 'Black Death'
    name), and multi-organ failure.
  cell_types:
  - preferred_term: Monocyte
    term:
      id: CL:0000576
      label: monocyte
  biological_processes:
  - preferred_term: Inflammatory response
    term:
      id: GO:0006954
      label: inflammatory response
    modifier: INCREASED
  - preferred_term: Apoptotic process
    term:
      id: GO:0006915
      label: apoptotic process
    modifier: INCREASED
  downstream:
  - target: Pneumonic Plague
    description: >
      Hematogenous spread to the lungs can cause secondary pneumonic plague.
  evidence:
  - reference: PMID:10922034
    supports: SUPPORT
    snippet: "YopP/YopJ plays an anti-inflammatory role by preventing the
      activation of the transcription factor NF-kappaB. It also induces rapid
      apoptosis of macrophages."
    explanation: Yop-mediated macrophage apoptosis contributes to uncontrolled
      bacterial dissemination and systemic disease.
    evidence_source: IN_VITRO
  - reference: PMID:15207311
    supports: SUPPORT
    snippet: Bubonic disease, pneumonic plague, and septicemic plague are seen
      in addition to a number of other less common manifestations.
    explanation: Confirms the clinical spectrum including septicemic plague.
- name: Pneumonic Plague
  description: >
    Lung infection with Y. pestis, arising either from hematogenous spread
    (secondary) or direct inhalation of infectious respiratory droplets
    (primary). Pneumonic plague is characterized by fulminant pneumonia,
    hemoptysis, and respiratory failure. It is the only form transmissible
    person-to-person and is nearly 100% fatal without early antibiotic
    treatment.
  cell_types:
  - preferred_term: Macrophage
    term:
      id: CL:0000235
      label: macrophage
  - preferred_term: Neutrophil
    term:
      id: CL:0000775
      label: neutrophil
  biological_processes:
  - preferred_term: Innate immune response
    term:
      id: GO:0045087
      label: innate immune response
    modifier: DECREASED
  - preferred_term: Inflammatory response
    term:
      id: GO:0006954
      label: inflammatory response
    modifier: INCREASED
  locations:
  - preferred_term: Lung
    term:
      id: UBERON:0002048
      label: lung
  evidence:
  - reference: PMID:30940874
    supports: SUPPORT
    snippet: the rapid onset of death in the absence of antibiotic treatment
      (less than a week for bubonic plague and <48 h for pneumonic plague)
    explanation: Confirms the extreme lethality and rapidity of pneumonic
      plague without treatment.
  - reference: PMID:24198067
    supports: SUPPORT
    snippet: Yersinia pestis, the etiologic agent of plague, utilizes a type
      III secretion system (T3SS) to subvert the defenses of its mammalian
      hosts.
    explanation: T3SS-mediated immune evasion applies to pulmonary infection
      as well.
- name: ERAP2 Evolutionary Selection
  description: >
    The Black Death pandemic of 1346-1353 exerted powerful selective pressure
    on the human genome, particularly at immune loci. The rs2549794 variant
    in ERAP2 was strongly selected, as the allele producing a full-length
    ERAP2 transcript conferred improved ability to control intracellular
    Y. pestis in macrophages. This same protective allele is now associated
    with increased susceptibility to autoimmune diseases, representing a
    classic case of antagonistic pleiotropy shaped by past pandemic selection.
  biological_processes:
  - preferred_term: Immune response
    term:
      id: GO:0006955
      label: immune response
  - preferred_term: Proteolysis
    term:
      id: GO:0006508
      label: proteolysis
  notes: >
    ERAP2 encodes an endoplasmic reticulum aminopeptidase involved in
    antigen processing for MHC class I presentation. The selected haplotype B
    produces a full-length functional protein, while the alternative produces
    a truncated, non-functional transcript.
  evidence:
  - reference: PMID:36261521
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: The selected allele for one of these variants, rs2549794, is
      associated with the production of a full-length (versus truncated)
      ERAP2 transcript, variation in cytokine response to Y. pestis and
      increased ability to control intracellular Y. pestis in macrophages.
    explanation: Directly demonstrates that ERAP2 rs2549794 was selected
      during the Black Death and confers functional immune advantage against
      Y. pestis.
  - reference: PMID:36261521
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: we show that protective variants overlap with alleles that are
      today associated with increased susceptibility to autoimmune diseases,
      providing empirical evidence for the role played by past pandemics in
      shaping present-day susceptibility to disease.
    explanation: Demonstrates antagonistic pleiotropy where plague-protective
      alleles now increase autoimmune disease risk.
phenotypes:
- name: Bubo (Lymphadenopathy)
  category: Signs and Symptoms
  description: >
    Painful, swollen lymph nodes (buboes) in the inguinal, axillary, or
    cervical region, characteristic of bubonic plague.
  subtype: Bubonic
  phenotype_term:
    preferred_term: Bubo (swollen lymph node)
    term:
      id: HP:0002716
      label: Lymphadenopathy
  evidence:
  - reference: PMID:15207311
    supports: SUPPORT
    snippet: Bubonic disease, pneumonic plague, and septicemic plague are seen
      in addition to a number of other less common manifestations.
    explanation: Bubonic plague is characterized by lymph node swelling (buboes).
- name: Fever
  category: Signs and Symptoms
  description: High fever, often with rigors, accompanying all forms of plague.
  notes: >
    Fever is a cardinal presenting feature of all forms of plague; cited
    abstracts do not explicitly name it in their text.
  phenotype_term:
    preferred_term: Fever
    term:
      id: HP:0001945
      label: Fever
- name: Purpura
  category: Signs and Symptoms
  description: >
    Skin hemorrhages (purpura and ecchymoses) resulting from disseminated
    intravascular coagulation in septicemic plague, historically responsible
    for the name 'Black Death'.
  subtype: Septicemic
  phenotype_term:
    preferred_term: Purpura
    term:
      id: HP:0000979
      label: Purpura
- name: Disseminated Intravascular Coagulation
  category: Signs and Symptoms
  description: >
    Consumption coagulopathy with simultaneous thrombosis and hemorrhage,
    a hallmark of septicemic plague leading to multi-organ failure.
  subtype: Septicemic
  phenotype_term:
    preferred_term: Disseminated intravascular coagulation
    term:
      id: HP:0005521
      label: Disseminated intravascular coagulation
- name: Pneumonia
  category: Signs and Symptoms
  description: >
    Fulminant pneumonia with bloody sputum (hemoptysis), dyspnea, and
