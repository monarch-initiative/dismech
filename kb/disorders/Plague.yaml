name: Plague
creation_date: '2026-04-03T00:00:00Z'
updated_date: '2026-04-03T00:00:00Z'
category: Infectious
description: >
  Plague is a severe zoonotic disease caused by the Gram-negative bacterium
  Yersinia pestis. Transmitted primarily by flea bites from infected rodent
  reservoirs, Y. pestis can manifest as bubonic, septicemic, or pneumonic
  plague. The bacterium deploys a type III secretion system to inject Yop
  effector proteins into host immune cells, suppressing phagocytosis and
  inflammatory responses. Without prompt antibiotic treatment, plague is
  frequently fatal, particularly in its pneumonic and septicemic forms.
  Historically, the Black Death pandemic of 1346-1353 killed an estimated
  30-50% of the European population and exerted one of the strongest known
  selective pressures on the human genome, notably driving selection of
  immune-related variants such as the ERAP2 rs2549794 allele.
