    mapping_predicate: skos:exactMatch
    mapping_source: MONDO
synonyms:
- PKAN
- Hallervorden-Spatz syndrome
- Hallervorden-Spatz disease
- neurodegeneration with brain iron accumulation 1
has_subtypes:
- name: Classic PKAN
  description: >-
    Early-onset disease, typically before age 10, with faster progression and
    more prominent retinal involvement.
- name: Atypical PKAN
  description: >-
    Later-onset disease, typically after age 10, with slower progression and
    more variable cognitive and psychiatric features.
parents:
- hereditary disease
- neurodegenerative disease
inheritance:
- name: Autosomal recessive inheritance
  inheritance_term:
    preferred_term: Autosomal recessive inheritance
    term:
      id: HP:0000007
      label: Autosomal recessive inheritance
  description: >-
    PKAN is inherited in an autosomal recessive pattern because pathogenic
    variants in PANK2 are biallelic.
  evidence:
  - reference: PMID:32043823
    reference_title: "Natural history and genotype-phenotype correlation of pantothenate kinase-associated neurodegeneration."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      In 2001, biallelic recessive mutations in PANK2 were revealed in PKAN.
    explanation: >-
      This directly supports autosomal recessive inheritance for PKAN.
genetic:
- name: PANK2
  association: Loss-of-function
