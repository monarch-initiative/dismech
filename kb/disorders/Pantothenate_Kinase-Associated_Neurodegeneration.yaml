differential_diagnoses:
- name: COASY protein-associated neurodegeneration
  disease_term:
    preferred_term: COASY protein-associated neurodegeneration
    term:
      id: MONDO:0014290
      label: neurodegeneration with brain iron accumulation 6
  description: >-
    COASY-related NBIA overlaps with PKAN because both are CoA biosynthesis
    disorders within the broader brain iron accumulation spectrum.
  evidence:
  - reference: PMID:36983025
    reference_title: "Inherited Disorders of Coenzyme A Biosynthesis: Models, Mechanisms, and Treatments."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      The first and last enzymes catalyzing the CoA biosynthetic pathway are
      associated with two neurological conditions, namely pantothenate kinase-
      associated neurodegeneration (PKAN) and COASY protein-associated
      neurodegeneration (CoPAN), which belong to the heterogeneous group of
      neurodegenerations with brain iron accumulation (NBIA)
    explanation: >-
      This directly supports COASY-related NBIA as an important differential
      diagnosis within the same CoA biosynthesis pathway.
treatments:
- name: Symptomatic pharmacotherapy
  description: >-
    PKAN is treated symptomatically with medications for dystonia and related
    motor features.
  treatment_term:
    preferred_term: Pharmacotherapy
    term:
      id: NCIT:C15986
      label: Pharmacotherapy
  evidence:
  - reference: PMID:39678459
    reference_title: "Pathology and treatment methods in pantothenate kinase-associated neurodegeneration."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Pharmacological methods include symptomatic medications, such as
      pregabalin, gabapentin, or botulinum toxin
    explanation: >-
      This directly supports symptomatic medication use for PKAN.
- name: Iron chelation therapy
  description: >-
    Iron chelation is used to target the iron overload component of PKAN.
  treatment_term:
    preferred_term: chelator agent therapy
    term:
      id: MAXO:0001223
      label: chelator agent therapy
    therapeutic_agent:
    - preferred_term: deferiprone
      term:
        id: CHEBI:68554
        label: deferiprone
  evidence:
  - reference: PMID:32043823
    reference_title: "Natural history and genotype‐phenotype correlation of pantothenate kinase‐associated neurodegeneration."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      A randomized double‐blind controlled study about deferiprone for PKAN
      revealed that deferiprone can decrease the disease progression in patients
      with PKAN.
    explanation: >-
      This directly supports deferiprone-based iron chelation as a disease-
      relevant treatment.
- name: Deep brain stimulation
  description: >-
    Deep brain stimulation can improve dystonia but does not alter the disease
    course.
  treatment_term:
    preferred_term: deep brain stimulation
    term:
      id: MAXO:0000943
      label: deep brain stimulation
  evidence:
  - reference: PMID:32043823
    reference_title: "Natural history and genotype‐phenotype correlation of pantothenate kinase‐associated neurodegeneration."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Some treatments, such as deep brain stimulation, can improve the dystonia
      of patients with PKAN, but they do not modify the disease course.
    explanation: >-
      This directly supports deep brain stimulation as a symptomatic treatment.
- name: Pantothenate replacement therapy
  description: >-
    Phosphopantothenate replacement is a rational pathway-bypass strategy under
    development for PKAN.
  treatment_term:
    preferred_term: Pharmacotherapy
    term:
      id: NCIT:C15986
      label: Pharmacotherapy
  evidence:
  - reference: PMID:29522513
    reference_title: "Fosmetpantotenate (RE-024), a phosphopantothenate replacement therapy for pantothenate kinase-associated neurodegeneration: Mechanism of action and efficacy in nonclinical models."
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: >-
      Fosmetpantotenate is a phosphopantothenic acid prodrug in clinical
      development for treatment of pantothenate kinase-associated
      neurodegeneration, which aims to replenish phosphopantothenic acid in
      patients.
    explanation: >-
      This directly supports pathway-replacement therapy as a PKAN treatment
      strategy.
- name: Metabolic supplement therapy
  description: >-
    Commercial supplements have been explored to reduce iron accumulation and
    improve cellular phenotypes in residual PANK2-expressing models.
  treatment_term:
    preferred_term: supportive care
    term:
      id: MAXO:0000950
      label: supportive care
  evidence:
  - reference: PMID:35945593
    reference_title: "Therapeutic approach with commercial supplements for pantothenate kinase-associated neurodegeneration with residual PANK2 expression levels."
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: >-
      Commercial supplements, pantothenate, pantethine, vitamin E, omega 3,
      carnitine and thiamine were able to eliminate iron accumulation, increase
      PANK2, mtACP, and NFS1 expression levels and improve pathological
      alterations in mutant cells with residual PANK2 expression levels
    explanation: >-
      This directly supports metabolic supplement strategies in responsive PKAN
      cellular models.
