  downstream:
  - target: Mitochondrial phosphopantetheinyl-protein loss
    description: Mitochondrial metabolic failure reduces phosphopantetheinyl-protein abundance.
    causal_link_type: DIRECT
- name: Mitochondrial phosphopantetheinyl-protein loss
  description: >-
    Loss of mitochondrial phosphopantetheinylated proteins disrupts lipoylation
    and pyruvate dehydrogenase function.
  evidence:
  - reference: PMID:33952316
    reference_title: "Down regulation of the expression of mitochondrial phosphopantetheinyl-proteins in pantothenate kinase-associated neurodegeneration: pathophysiological consequences and therapeutic perspectives"
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: >-
      the expression levels of 4′-phosphopantetheinyl proteins such as mtACP,
      ALDH1L2 and AASS were dramatically reduced
    explanation: >-
      This directly supports loss of mitochondrial phosphopantetheinyl proteins
      downstream of PANK2 dysfunction.
  downstream:
  - target: Impaired lipoylation and PDH dysfunction
    description: Reduced phosphopantetheinyl proteins impair lipoylation and pyruvate dehydrogenase activity.
    causal_link_type: DIRECT
- name: Impaired lipoylation and PDH dysfunction
  description: >-
    Reduced lipoylation compromises pyruvate dehydrogenase activity and redox
    homeostasis.
  evidence:
  - reference: PMID:33952316
    reference_title: "Down regulation of the expression of mitochondrial phosphopantetheinyl-proteins in pantothenate kinase-associated neurodegeneration: pathophysiological consequences and therapeutic perspectives"
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: >-
      PDH lipoylation and activity were severely reduced in PKAN cells.
    explanation: >-
      This directly supports impaired mitochondrial lipoylation and oxidative
      metabolism in PKAN cells.
  downstream:
  - target: Basal ganglia iron accumulation
    description: >-
      Mitochondrial dysfunction and impaired iron-sulfur homeostasis culminate in
      preferential iron deposition in the basal ganglia.
    causal_link_type: DIRECT
- name: Basal ganglia iron accumulation
  description: >-
    Iron preferentially accumulates in the globus pallidus and basal ganglia,
    producing the classic eye-of-the-tiger imaging phenotype and contributing to
    neurodegeneration.
  evidence:
  - reference: PMID:39678459
    reference_title: "Pathology and treatment methods in pantothenate kinase-associated neurodegeneration."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      The condition is caused by a mutation in the PANK2 gene, which results in
      iron accumulation in the brain
    explanation: >-
      This directly supports brain iron accumulation as a central downstream
      feature of PKAN.
  - reference: PMID:32043823
    reference_title: "Natural history and genotype‐phenotype correlation of pantothenate kinase‐associated neurodegeneration."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      The typical manifestation of neuroimaging is the “eye-of-the-tiger” sign
    explanation: >-
      This directly supports the characteristic iron-related MRI phenotype.
  - reference: PMID:32043823
    reference_title: "Natural history and genotype‐phenotype correlation of pantothenate kinase‐associated neurodegeneration."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      The mutations result in a decreased activity of pantothenic acid kinase 2,
      which is a key regulatory enzyme in coenzyme A production by pantothenic
      acid, possibly leading to the reduction of coenzyme A3 and accumulation of
      its substrates, cysteine, which may chelate iron accumulation.
    explanation: >-
      This directly links PANK2 dysfunction to cysteine-mediated iron
      accumulation in PKAN.
  downstream:
  - target: Dystonia
    description: >-
      Basal ganglia dysfunction manifests clinically as progressive dystonia.
    causal_link_type: DIRECT
  - target: Dysarthria
    description: >-
      Basal ganglia dysfunction contributes to speech impairment.
    causal_link_type: DIRECT
  - target: Spasticity
    description: >-
      Motor pathway involvement contributes to spasticity.
    causal_link_type: DIRECT
  - target: Dysphagia
    description: >-
      Progressive extrapyramidal dysfunction contributes to swallowing difficulty.
    causal_link_type: DIRECT
  - target: Cognitive impairment
    description: >-
      Progressive neurodegeneration can also affect cognition and behavior.
    causal_link_type: DIRECT
  - target: Retinal degeneration
    description: >-
      Neuroretinal vulnerability contributes to retinal degeneration.
    causal_link_type: DIRECT
  - target: Visual loss
    description: >-
      Neuroretinal injury causes vision loss.
    causal_link_type: DIRECT
  - target: Global developmental delay
    description: >-
      Early-onset PKAN can present with developmental delay before motor
      regression becomes prominent.
    causal_link_type: DIRECT
phenotypes:
- name: Dystonia
  category: Neurologic
  description: >-
    Progressive dystonia is the core movement disorder in PKAN.
  phenotype_term:
    preferred_term: Dystonia
    term:
      id: HP:0001332
      label: Dystonia
  evidence:
  - reference: PMID:32043823
    reference_title: "Natural history and genotype‐phenotype correlation of pantothenate kinase‐associated neurodegeneration."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Dystonia in lower limbs was the most common initial symptom in both early-
      and late-onset groups.
    explanation: >-
      This directly supports dystonia as the cardinal clinical feature of PKAN.
- name: Dysarthria
  category: Neurologic
  description: >-
    Speech impairment is common in PKAN, affecting patients with both classic
    and atypical forms.
  phenotype_term:
    preferred_term: Dysarthria
    term:
      id: HP:0001260
      label: Dysarthria
  evidence:
  - reference: PMID:32043823
    reference_title: "Natural history and genotype‐phenotype correlation of pantothenate kinase‐associated neurodegeneration."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Dysarthria occurred in 86.4% (89/103) of early‐onset and 80.0% (80/100)
      of late‐onset patients.
    explanation: >-
      This directly supports dysarthria as a frequent manifestation in both
      early- and late-onset PKAN.
- name: Neuropsychiatric manifestations
  category: Neuropsychiatric
  description: >-
    Psychological and behavior problems, including compulsive behavior,
    emotional lability, anxiety, depression, and attention deficiency, are
    reported in PKAN.
  phenotype_term:
    preferred_term: Behavioral abnormality
    term:
      id: HP:0000708
      label: Atypical behavior
  evidence:
  - reference: PMID:32043823
    reference_title: "Natural history and genotype‐phenotype correlation of pantothenate kinase-associated neurodegeneration."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Compulsive behavior, emotional lability, anxiety, depression, or attention
      deficiency was reported in 44.9% (48/107) of early‐onset and 38.8%
      (38/98) of late‐onset patients.
    explanation: >-
      This directly supports neuropsychiatric manifestations in PKAN.
- name: Spasticity
  category: Neurologic
  description: >-
    Upper motor neuron features can accompany the dystonia-predominant syndrome.
  phenotype_term:
    preferred_term: Spasticity
    term:
      id: HP:0001257
      label: Spasticity
  evidence:
  - reference: PMID:31205425
    reference_title: "Proposed Therapies for Pantothenate-Kinase-Associated Neurodegeneration."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Patients with PKAN exhibit a variety of symptoms, including dystonia,
      rigidity, bradykinesia, spasticity, difficulty swallowing and speaking,
      shortened lifespan, and sometimes cognitive and visual impairment.
    explanation: >-
      This directly supports spasticity as a recognized PKAN manifestation.
- name: Dysphagia
  category: Neurologic
  description: >-
    Bulbar dysfunction can produce swallowing difficulty in PKAN.
