name: pantothenate kinase-associated neurodegeneration
creation_date: "2026-04-15T00:00:00Z"
updated_date: "2026-04-16T02:20:03Z"
category: Mendelian
description: >-
  Pantothenate kinase-associated neurodegeneration is the most common form of
  neurodegeneration with brain iron accumulation, caused by pathogenic PANK2
  variants and characterized by progressive dystonia, dysarthria, spasticity,
  cognitive decline, retinal degeneration, and basal ganglia iron deposition.
disease_term:
  preferred_term: pantothenate kinase-associated neurodegeneration
  term:
