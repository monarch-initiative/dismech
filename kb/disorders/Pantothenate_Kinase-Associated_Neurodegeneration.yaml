  evidence:
  - reference: PMID:15659606
    reference_title: "Altered neuronal mitochondrial coenzyme A synthesis in neurodegeneration with brain iron accumulation caused by abnormal processing, stability, and catalytic activity of mutant pantothenate kinase 2."
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: >-
      PanK2 protein is localized to mitochondria of neurons in human brain,
      distinguishing it from other pantothenate kinases that do not possess
      mitochondrial-targeting sequences.
    explanation: >-
      This directly supports the neuronal mitochondrial localization of PANK2.
  - reference: PMID:15659606
    reference_title: "Altered neuronal mitochondrial coenzyme A synthesis in neurodegeneration with brain iron accumulation caused by abnormal processing, stability, and catalytic activity of mutant pantothenate kinase 2."
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: >-
      The mature protein catalyzes the initial step in coenzyme A (CoA)
      synthesis
    explanation: >-
      This directly supports the CoA-biosynthetic function disrupted in PKAN.
  downstream:
  - target: CoA depletion
    description: Loss of PANK2 activity reduces cellular CoA availability.
    causal_link_type: DIRECT
- name: CoA depletion
  description: >-
    Reduced CoA production is an early biochemical consequence of PANK2 loss.
  evidence:
  - reference: PMID:32043823
    reference_title: "Natural history and genotype-phenotype correlation of pantothenate kinase-associated neurodegeneration."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      The mutations result in a decreased activity of pantothenic acid kinase 2,
    explanation: >-
      This directly supports reduced CoA production as an early biochemical
      consequence of PANK2 dysfunction.
  - reference: PMID:39678459
    reference_title: "Pathology and treatment methods in pantothenate kinase-associated neurodegeneration."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      The condition is caused by a mutation in the PANK2 gene, which results in
      iron accumulation in the brain and changes in the functioning of
      biochemical pathways dependent on coenzyme A.
    explanation: >-
      This directly connects PANK2 mutation, CoA-dependent pathway disruption,
      and downstream brain iron accumulation.
  downstream:
  - target: Mitochondrial energy dysfunction
    description: CoA depletion compromises mitochondrial metabolism and energy homeostasis.
    causal_link_type: DIRECT
- name: Mitochondrial energy dysfunction
  description: >-
    CoA shortage compromises mitochondrial metabolism and energy homeostasis.
  evidence:
  - reference: PMID:39678459
    reference_title: "Pathology and treatment methods in pantothenate kinase-associated neurodegeneration."
    supports: PARTIAL
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      The condition is caused by a mutation in the PANK2 gene, which results in
