  gene_term:
    preferred_term: PANK2
    term:
      id: hgnc:15894
      label: PANK2
  notes: >-
    PKAN is caused by biallelic pathogenic PANK2 variants, including missense,
    nonsense, frameshift, and splice-site alleles.
  evidence:
  - reference: PMID:32043823
    reference_title: "Natural history and genotype-phenotype correlation of pantothenate kinase-associated neurodegeneration."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Patients who met all the following criteria were enrolled: (a) dystonia;
      (b) “eye‐of‐the‐tiger” sign on brain MRI; and (c) biallelic pathogenic or
      likely pathogenic variants in PANK2.
    explanation: >-
      This directly supports PANK2 as the causal gene and biallelic pathogenic
      variants as the disease-defining molecular finding.
pathophysiology:
- name: PANK2 loss of function
  description: >-
    Pathogenic PANK2 variants impair the mitochondrial pantothenate kinase 2
    enzyme and initiate the downstream neurodegenerative cascade.
