    Fussiness and irritability in young children, often due to pain
    from oral ulcers.
  phenotype_term:
    preferred_term: irritability
    term:
      id: HP:0000737
      label: Irritability
  evidence:
  - reference: PMID:36284392
    supports: SUPPORT
