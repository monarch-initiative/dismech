name: Borjeson-Forssman-Lehmann syndrome
creation_date: "2026-04-15T15:45:03Z"
updated_date: "2026-04-15T15:45:03Z"
description: >-
  Borjeson-Forssman-Lehmann syndrome is a rare PHF6-related X-linked
  neurodevelopmental disorder characterized by intellectual disability and a
  syndromic pattern that can include obesity, hypogonadism, and distinctive
  craniofacial features. Available mechanistic evidence supports PHF6-dependent
  transcriptional dysregulation with impaired neural stem cell regulation and
  abnormal neuronal development.
