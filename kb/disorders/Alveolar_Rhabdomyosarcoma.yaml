    explanation: >-
      Supports entinostat as a preclinical combination strategy in
      PAX3::FOXO1-positive ARMS models.
  target_mechanisms:
  - target: HDAC3-SMARCA4-miR-27a Chemotherapy Resistance Circuit
    treatment_effect: INHIBITS
    description: >-
      HDAC inhibition is modeled as acting on the HDAC3-SMARCA4-miR-27a
      checkpoint-adaptation circuit that mediates chemotherapy resistance.
    evidence:
    - reference: PMID:39147820
      reference_title: Entinostat as a combinatorial therapeutic for rhabdomyosarcoma.
      supports: SUPPORT
      evidence_source: MODEL_ORGANISM
      snippet: >-
        Chemotherapy resistance in ARMS has previously been attributed to
        PAX3::FOXO1-mediated cell cycle checkpoint adaptation, which is
        mediated by an HDAC3-SMARCA4-miR-27a-PAX3::FOXO1 circuit that can be
        disrupted by HDAC3 inhibition.
      explanation: >-
        Directly links HDAC3 inhibition to disruption of the modeled
        chemotherapy-resistance circuit.
discussions:
- discussion_id: gap_arms_pax_foxo1_dependency_hierarchy
  prompt: >-
    Which modeled PAX-FOXO1 dependency layer is most causal and
    therapeutically durable in fusion-positive ARMS: fusion-enhancer
    reprogramming, ETS1/KDM3A chromatin cofactor occupancy, YOD1/N-Myc protein
    stabilization and feedback, HDAC3-SMARCA4-miR-27a checkpoint adaptation, or
    downstream kinase and differentiation programs?
  kind: KNOWLEDGE_GAP
  status: OPEN
  attaches_to:
  - pathophysiology#PAX-FOXO1 Fusion Oncogene
  - pathophysiology#PAX-FOXO1 Disease Enhancer Reprogramming
  - pathophysiology#ETS1-KDM3A PAX-FOXO1 Chromatin Cofactor Module
  - pathophysiology#YOD1-N-Myc PAX-FOXO1 Feedback Loop
  - pathophysiology#HDAC3-SMARCA4-miR-27a Chemotherapy Resistance Circuit
  - pathophysiology#Chemotherapy Resistance and Relapse
  - treatment#PAX-FOXO1/ETS1 Complex Disruption
  - treatment#YOD1 Inhibition
  - treatment#Histone Deacetylase Inhibitor Therapy
  rationale: >-
    Older work established PAX3::FOXO1 and PAX7::FOXO1 as molecular drivers, but
    a 2025 therapy review still notes that standard systemic therapy remains
    VAC despite decades of fusion knowledge. The disease model now separates the
    fusion itself from enhancer reprogramming, ETS1/KDM3A cofactor occupancy,
    YOD1/N-Myc stabilization, HDAC3-SMARCA4-miR-27a-mediated checkpoint
    adaptation, and downstream RTK/proliferation outputs. Forward curation
    through 2024-2026 provides strong partial answers for each handle, but does
    not yet establish which layer is the best therapeutic choke point across
    diagnosis, relapse, and resistance states.
  proposed_experiments:
  - experiment_id: exp_arms_isogenic_pax_foxo1_dependency_prioritization
    name: Isogenic PAX-FOXO1 dependency-prioritization panel
    description: >-
      Build a matched FP-RMS model panel with acute PAX3-FOXO1 withdrawal and
      parallel perturbation of ETS1/KDM3A, YOD1/N-Myc, and HDAC3-SMARCA4-miR-27a
      circuitry. Compare diagnostic-like, relapse-like, and drug-resistant
      states to determine which layer is required for open chromatin state,
      fusion occupancy, differentiation blockade, proliferation, and
      chemotherapy escape.
    experiment_type:
      preferred_term: isogenic dependency mapping experiment
    model_systems:
    - name: FP-RMS cell-line and patient-derived culture panel
      description: >-
        Human fusion-positive rhabdomyosarcoma models spanning PAX3-FOXO1 and
        PAX7-FOXO1 states, ideally paired with relapse- or resistance-enriched
        cultures.
      experimental_model_type: CELL_LINE
      organism:
        preferred_term: human
        term:
          id: NCBITaxon:9606
          label: Homo sapiens
      cell_types:
      - preferred_term: skeletal muscle myoblast
        term:
          id: CL:0000515
          label: skeletal muscle myoblast
      publication: PMID:41401084
      modeled_mechanisms:
      - target: PAX-FOXO1 Fusion Oncogene
        description: Tests acute dependence on fusion-protein abundance and chromatin occupancy.
      - target: PAX-FOXO1 Disease Enhancer Reprogramming
        description: Measures whether each dependency layer maintains the disease-specific enhancer and open chromatin state.
      - target: ETS1-KDM3A PAX-FOXO1 Chromatin Cofactor Module
        description: Tests the cofactor-occupancy handle for fusion enhancer maintenance.
      - target: YOD1-N-Myc PAX-FOXO1 Feedback Loop
        description: Tests the protein-stabilization and reciprocal transcriptional feedback handle.
      - target: HDAC3-SMARCA4-miR-27a Chemotherapy Resistance Circuit
        description: Tests the checkpoint-adaptation handle for chemotherapy escape.
      - target: Chemotherapy Resistance and Relapse
        description: Measures whether each dependency layer is required for resistant outgrowth under treatment pressure.
    perturbations:
    - name: Acute PAX-FOXO1 withdrawal
      target: pathophysiology#PAX-FOXO1 Fusion Oncogene
      description: >-
        Degrade, silence, or inducibly withdraw the fusion protein to create the
        reference dependency state for all downstream comparisons.
    - name: Cofactor and feedback-loop perturbation
      target: pathophysiology#PAX-FOXO1 Disease Enhancer Reprogramming
      description: >-
        Perturb ETS1/KDM3A, YOD1/N-Myc, and HDAC3-SMARCA4-miR-27a arms singly
        and in combinations to distinguish direct fusion dependency from
        compensatory resistance circuitry.
    readouts:
    - name: Open chromatin, fusion occupancy, and transcriptional output
      target: pathophysiology#PAX-FOXO1 Disease Enhancer Reprogramming
      description: >-
        Measure disease-specific open chromatin peaks, fusion occupancy,
        enhancer activity, MYCN/N-Myc expression, and PAX-FOXO1 target-gene
        expression after each perturbation.
      biological_processes:
      - preferred_term: chromatin remodeling
        term:
          id: GO:0006338
          label: chromatin remodeling
      - preferred_term: positive regulation of transcription by RNA polymerase II
        term:
          id: GO:0045944
          label: positive regulation of transcription by RNA polymerase II
      assays:
      - preferred_term: ATAC-seq
      - preferred_term: CUT&Tag
      - preferred_term: single-cell RNA-seq
      direction: NEGATIVE
    - name: Differentiation, proliferation, and drug-resistance response
      target: pathophysiology#Chemotherapy Resistance and Relapse
      description: >-
        Measure myogenic differentiation, proliferation, apoptosis, and
        chemotherapy sensitivity after each dependency-layer perturbation.
      biological_processes:
      - preferred_term: cell differentiation
        term:
          id: GO:0030154
          label: cell differentiation
      assays:
      - preferred_term: differentiation assay
      - preferred_term: cell viability assay
      direction: POSITIVE
    controls:
    - name: Fusion-negative RMS comparator
      description: Tests whether perturbation effects are specific to PAX-FOXO1-driven disease.
    - name: Vehicle or non-targeting perturbation controls
      description: Baseline control for drug, degron, or genetic perturbation effects.
    decision_criterion: >-
      A dependency layer is prioritized if perturbing it reproducibly phenocopies
      acute fusion withdrawal across diagnostic and relapse-like FP-RMS models,
      reverses differentiation blockade, suppresses proliferation, and improves
      chemotherapy response without equivalent effects in fusion-negative
      comparators.
    would_support:
    - pathophysiology#PAX-FOXO1 Fusion Oncogene
    - pathophysiology#PAX-FOXO1 Disease Enhancer Reprogramming
    - pathophysiology#ETS1-KDM3A PAX-FOXO1 Chromatin Cofactor Module
    - pathophysiology#YOD1-N-Myc PAX-FOXO1 Feedback Loop
    - pathophysiology#HDAC3-SMARCA4-miR-27a Chemotherapy Resistance Circuit
