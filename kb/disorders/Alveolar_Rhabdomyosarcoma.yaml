      reference_title: "Molecular Targets in Alveolar Rhabdomyosarcoma: A Narrative Review of Progress and Pitfalls."
      supports: SUPPORT
      evidence_source: HUMAN_CLINICAL
      snippet: "Alveolar rhabdomyosarcoma (ARMS) is a highly aggressive pediatric soft-tissue sarcoma driven by PAX3/7-FOXO1 fusion proteins."
      explanation: Supports the central oncogenic driver role of PAX-FOXO1 in driving the aggressive proliferative behavior of ARMS.
- name: Blocked Myogenic Differentiation
  description: >-
    PAX-FOXO1 fusion protein blocks the normal myogenic differentiation program
    by interfering with MYOD1 and myogenin function. Tumor cells express early
    myogenic markers (desmin, myogenin) but fail to complete differentiation
    into mature skeletal muscle, remaining in a proliferative progenitor state.
  evidence:
  - reference: PMID:40508013
    reference_title: "Molecular Targets in Alveolar Rhabdomyosarcoma: A Narrative Review of Progress and Pitfalls."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "We discuss the central role of fusion proteins in transcriptional reprogramming, impaired myogenic differentiation, and super-enhancer activation."
    explanation: Directly supports the role of PAX-FOXO1 fusion proteins in driving impaired myogenic differentiation in ARMS.
  biological_processes:
  - preferred_term: cell differentiation
    modifier: DECREASED
    term:
      id: GO:0030154
      label: cell differentiation
- name: Aberrant Cell Proliferation
  description: >-
    PAX-FOXO1 activates genes promoting cell cycle progression and survival,
    including MYCN, which is commonly amplified in ARMS. The fusion protein
    also suppresses apoptosis through multiple mechanisms, contributing to
    tumor aggressiveness.
  evidence:
  - reference: PMID:40508013
    reference_title: "Molecular Targets in Alveolar Rhabdomyosarcoma: A Narrative Review of Progress and Pitfalls."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Emerging biomarkers (YAP, TFAP2B, P-cadherin) and oncogenic kinases (Aurora A, CDK4, PLK1) are evaluated alongside receptor tyrosine kinases (FGFR, MET) and transcription factors involved in metabolic rewiring (FOXF1, ETS1)."
    explanation: Supports the activation of cell cycle and proliferation kinases (CDK4, Aurora A, PLK1) downstream of PAX-FOXO1 fusion.
  biological_processes:
  - preferred_term: cell population proliferation
    modifier: INCREASED
    term:
      id: GO:0008283
      label: cell population proliferation
