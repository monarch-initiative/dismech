    snippet: >-
      pro-α1(I) expression was very low in fibroblasts which had knockdown of
      IFITM5, SP7, BMP1, WNT1, CREB3L1, MBTPS2, and CCDC134.
    explanation: >-
      Cellular OI models show very low type I procollagen expression on CCDC134
      knockdown, consistent with reduced collagen matrix output underlying the
      bone fragility.
genetic:
- name: CCDC134 Loss-of-Function Mutation
