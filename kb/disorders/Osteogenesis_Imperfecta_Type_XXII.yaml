  - reference: PMID:39509507
    reference_title: "Regulated N-glycosylation controls chaperone function and receptor trafficking."
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: >-
      Disruption of this pathway impairs WNT and IGF1R signaling and causes the
