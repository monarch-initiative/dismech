- name: Defective Bone Matrix, Reduced Mineralization, and Skeletal Fragility
  description: >-
    Impaired osteoblast bone-matrix synthesis (reduced COL1A1 and osteopontin) and
    reduced mineralization produce a defective bone extracellular matrix with low
    bone mass and mechanical fragility. Clinically this manifests as severe,
    progressively deforming OI with recurrent fractures, gracile long bones,
    pseudarthroses (non-union fractures), bone deformity, and growth deficiency.
