diagnosis:
- name: Molecular Genetic Diagnosis
  description: >-
    OI type XXII is suspected in a child with severe, progressively deforming
    recessive OI (recurrent fractures, gracile long bones, pseudarthroses, short
    stature, poor bisphosphonate response, typically without dentinogenesis
    imperfecta) when COL1A1/COL1A2 and other recessive OI genes are negative.
    Diagnosis is confirmed by identifying a biallelic CCDC134 loss-of-function
    variant (typically the recurrent c.2T>C translation-start-site allele) by
    gene-panel or exome sequencing.
  diagnosis_term:
    preferred_term: molecular genetic testing
    term:
      id: MAXO:0000533
      label: molecular genetic testing
  evidence:
  - reference: PMID:32181939
    reference_title: "Homozygous Loss-of-Function Mutations in CCDC134 Are Responsible for a Severe Form of Osteogenesis Imperfecta."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      By whole-exome sequencing, we identified a homozygous variant (c.2T>C) in
      CCDC134 gene in three patients from two unrelated families with severe bone
      fragility that did not respond to bisphosphonate treatment, short stature,
      and gracile long bones with pseudarthroses but no dentinogenesis
      imperfecta.
    explanation: >-
      Molecular identification of a biallelic CCDC134 variant by exome sequencing
      establishes the diagnosis of OI type XXII.
treatments:
- name: Bisphosphonate Therapy
  description: >-
    Intravenous bisphosphonates (e.g., pamidronate, zoledronic acid) are the
    pharmacological mainstay of severe OI, but CCDC134-related OI type XXII is
    characteristically poorly responsive to bisphosphonate treatment, and
    pathway-targeted (e.g., RAS/MAPK-directed) therapies have been proposed as
    alternatives.
  treatment_term:
    preferred_term: bisphosphonate agent therapy
    term:
      id: MAXO:0000954
      label: bisphosphonate agent therapy
  evidence:
  - reference: PMID:35019224
    reference_title: "The recurrent homozygous translation start site variant in CCDC134 in an individual with severe osteogenesis imperfecta of non-Morrocan ancestry."
    supports: PARTIAL
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      A poor response to bisphosphonate therapy was observed in these
      individuals.
    explanation: >-
      Documents that bisphosphonate therapy, the standard OI pharmacotherapy, is
      poorly effective in CCDC134-related OI type XXII.
- name: Orthopedic Surgery and Intramedullary Rodding
  description: >-
    Intramedullary (telescoping) rod fixation and corrective osteotomy stabilize
    fracture-prone, deformed gracile long bones; surgical management also addresses
    pseudarthroses (non-union fractures) common in this disorder.
  treatment_term:
    preferred_term: surgical procedure
    term:
      id: MAXO:0000004
      label: surgical procedure
  evidence:
  - reference: PMID:20301472
    reference_title: "COL1A1- and COL1A2-Related Osteogenesis Imperfecta."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      intramedullary rodding when
      indicated to provide anatomic positioning of limbs
    explanation: >-
      GeneReviews documents intramedullary rodding as standard orthopedic
      management for OI long-bone fractures and deformity, applicable to OI type
      XXII.
- name: Physical Therapy and Rehabilitation
  description: >-
    Physical and occupational therapy improve mobility and muscle strength and
    reduce fracture risk; early physical therapy follows brief post-fracture
    immobilization.
  treatment_term:
    preferred_term: physical therapy
    term:
      id: MAXO:0000011
      label: physical therapy
  evidence:
  - reference: PMID:20301472
    reference_title: "COL1A1- and COL1A2-Related Osteogenesis Imperfecta."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Fractures are treated with as
      short a period of immobility as is practical, small and lightweight casts, and
      physical therapy as soon as casts are removed
    explanation: >-
      GeneReviews documents early physical therapy and brief immobilization as
      part of standard OI fracture rehabilitation, applicable to OI type XXII.
