name: Osteogenesis Imperfecta Type XXII
creation_date: "2026-06-30T00:00:00Z"
category: Mendelian
disease_term:
  preferred_term: Osteogenesis imperfecta type 22
  term:
    id: MONDO:0030714
    label: osteogenesis imperfecta, IIA 22
description: >-
  Osteogenesis imperfecta type XXII (OI type XXII) is a severe autosomal
  recessive brittle bone disease caused by biallelic loss-of-function variants in
  CCDC134, the gene encoding a secreted, endoplasmic-reticulum-resident coiled-coil
  protein that regulates osteoblast differentiation and bone formation. CCDC134
  is widely expressed and was originally implicated in the regulation of the
  mitogen-activated protein kinase (MAPK)/ERK signaling pathway; more recent work
  places it as an ER luminal specificity factor that, together with the
  oligosaccharyltransferase OST-A, protects the ER chaperone HSP90B1 (GRP94)
  during folding, and whose disruption impairs WNT and IGF1R receptor signaling.
  The defining human allele is a recurrent homozygous translation-start-site
  variant (c.2T>C) that abolishes CCDC134 protein, first identified in
  consanguineous families of Moroccan origin and subsequently in unrelated
  ancestries. Loss of CCDC134 dysregulates osteoblast signaling (increased ERK1/2
  phosphorylation, reduced osteopontin and COL1A1 expression) and impairs bone
  matrix formation and mineralization, producing severe, progressively deforming
  OI with short stature, gracile long bones, recurrent fractures, and
  pseudarthroses (non-union), characteristically without dentinogenesis
  imperfecta, and with poor response to bisphosphonate therapy.
