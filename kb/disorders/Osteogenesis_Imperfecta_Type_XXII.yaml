inheritance:
- name: Autosomal Recessive
  description: >-
    Autosomal recessive inheritance from a biallelic (homozygous) loss-of-function
    CCDC134 variant; the recurrent allele is the homozygous translation-start-site
    variant c.2T>C.
  inheritance_term:
    preferred_term: Autosomal recessive inheritance
    term:
      id: HP:0000007
      label: Autosomal recessive inheritance
  evidence:
  - reference: PMID:32181939
    reference_title: "Homozygous Loss-of-Function Mutations in CCDC134 Are Responsible for a Severe Form of Osteogenesis Imperfecta."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      By whole-exome sequencing, we identified a homozygous variant (c.2T>C) in
      CCDC134 gene in three patients from two unrelated families with severe bone
      fragility that did not respond to bisphosphonate treatment, short stature,
      and gracile long bones with pseudarthroses but no dentinogenesis
      imperfecta.
    explanation: >-
      Establishes the autosomal recessive inheritance of OI type XXII from a
      biallelic (homozygous) CCDC134 loss-of-function variant in unrelated
      families.
pathophysiology:
- name: CCDC134 Loss Eliminates a Secreted ER Regulator of Osteoblast Signaling
  description: >-
    CCDC134 encodes a secreted, endoplasmic-reticulum-resident protein that is
    widely expressed and regulates osteoblast differentiation and bone formation.
    It was originally implicated in the regulation of the MAPK/ERK signaling
    pathway, and is now understood as an ER luminal specificity factor that, with
    the oligosaccharyltransferase OST-A, protects the ER chaperone HSP90B1 (GRP94)
    during folding. The recurrent OI type XXII allele is a homozygous
    translation-start-site variant (c.2T>C) that abolishes CCDC134 protein, as
    confirmed by the absence of CCDC134 in patient cells.
  cell_types:
  - preferred_term: osteoblast
    term:
      id: CL:0000062
      label: osteoblast
  - preferred_term: fibroblast
    term:
      id: CL:0000057
      label: fibroblast
  biological_processes:
  - preferred_term: MAPK cascade (ERK1/2 signaling)
    term:
      id: GO:0000165
      label: MAPK cascade
    modifier: INCREASED
  evidence:
  - reference: PMID:32181939
    reference_title: "Homozygous Loss-of-Function Mutations in CCDC134 Are Responsible for a Severe Form of Osteogenesis Imperfecta."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      CCDC134 encodes a secreted protein widely expressed and implicated in the
      regulation of some mitogen-activated protein kinases (MAPK) signaling
      pathway.
    explanation: >-
      Defines CCDC134 as the secreted MAPK-regulating protein whose loss causes
      OI type XXII.
  - reference: PMID:32181939
    reference_title: "Homozygous Loss-of-Function Mutations in CCDC134 Are Responsible for a Severe Form of Osteogenesis Imperfecta."
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: >-
      Western blot and immunofluorescence analyses confirmed the absence of
      CCDC134 protein in patient cells compared with controls.
    explanation: >-
      Documents that the c.2T>C variant eliminates CCDC134 protein, the proximal
      lesion of the disorder.
  - reference: PMID:39509507
    reference_title: "Regulated N-glycosylation controls chaperone function and receptor trafficking."
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: >-
      Genetic analyses linked OST-A to HSP90B1, an ER chaperone for membrane
      receptors, and CCDC134, an ER luminal protein.
    explanation: >-
      Establishes CCDC134 as an ER luminal protein acting with OST-A and the ER
      chaperone HSP90B1, refining the ER-resident mechanism.
  downstream:
  - target: Dysregulated Osteoblast Signaling and Impaired Bone Matrix Formation
    description: >-
      Loss of CCDC134 dysregulates osteoblast MAPK/ERK and WNT/IGF1R signaling and
      reduces osteoblast matrix-protein expression and mineralization.
- name: Dysregulated Osteoblast Signaling and Impaired Bone Matrix Formation
  description: >-
    In CCDC134-deficient osteoblasts, ERK1/2 phosphorylation is increased while
    osteopontin (OPN) mRNA and COL1A1 expression and mineralization are reduced,
    indicating dysregulated osteoblast differentiation and bone-forming function.
    Independently, disruption of the CCDC134-HSP90B1-OST-A ER pathway impairs WNT
    and IGF1R receptor signaling, both osteogenic pathways, linking CCDC134 loss to
    the LRP5/6-WNT and MAPK/ERK axes that govern bone formation.
