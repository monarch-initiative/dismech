  notes: >-
    OI type XXII is caused by a biallelic loss-of-function variant in CCDC134.
    The defining and recurrent human allele is a homozygous translation-start-site
    variant (c.2T>C) that abolishes CCDC134 protein, first reported in
    consanguineous Moroccan families and subsequently identified in an individual
    of non-Moroccan (Brazilian) ancestry.
  evidence:
  - reference: PMID:32181939
    reference_title: "Homozygous Loss-of-Function Mutations in CCDC134 Are Responsible for a Severe Form of Osteogenesis Imperfecta."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      By whole-exome sequencing, we identified a homozygous variant (c.2T>C) in
      CCDC134 gene in three patients from two unrelated families with severe bone
      fragility that did not respond to bisphosphonate treatment, short stature,
      and gracile long bones with pseudarthroses but no dentinogenesis
      imperfecta.
    explanation: >-
      Identifies the causative homozygous CCDC134 translation-start-site variant
      (c.2T>C) defining OI type XXII.
  - reference: PMID:35019224
    reference_title: "The recurrent homozygous translation start site variant in CCDC134 in an individual with severe osteogenesis imperfecta of non-Morrocan ancestry."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      We report on a 9-year-old Brazilian boy, harboring the same homozygous
      variant in CCDC134, also presenting severe bone involvement.
    explanation: >-
      Confirms the recurrent homozygous CCDC134 variant in an unrelated ancestry,
      reinforcing CCDC134 as the causative OI type XXII gene.
