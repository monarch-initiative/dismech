    preferred_term: Autosomal recessive inheritance
    term:
      id: HP:0000007
      label: Autosomal recessive inheritance
  description: >-
    Reported affected individuals come from consanguineous families and carry
    homozygous missense IRX5 variants, supporting autosomal recessive
    inheritance.
  evidence:
  - reference: PMID:22581230
    reference_title: Mutations in IRX5 impair craniofacial development and germ cell migration via SDF1.
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Using homozygosity mapping and locus resequencing, we found that
      alterations in the homeodomain of the IRX5 transcription factor cause a
      recessive congenital disorder affecting face, brain, blood, heart, bone
      and gonad development.
    explanation: >-
      The discovery paper explicitly characterizes the disorder as recessive and
