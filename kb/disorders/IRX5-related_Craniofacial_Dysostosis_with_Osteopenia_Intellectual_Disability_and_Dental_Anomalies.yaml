  evidence:
  - reference: PMID:22581230
    reference_title: Mutations in IRX5 impair craniofacial development and germ cell migration via SDF1.
    supports: SUPPORT
    evidence_source: MODEL_ORGANISM
    snippet: >-
      We found through in vivo modeling in Xenopus laevis embryos that Irx5
      modulates the migration of progenitor cell populations in branchial
      arches and gonads by repressing Sdf1.
    explanation: >-
      This provides the mechanistic bridge from IRX5 loss to abnormal
      craniofacial progenitor migration.
  downstream:
  - target: Craniofacial developmental defect
    description: >-
      Disturbed craniofacial patterning manifests as severe hypertelorism or
      telecanthus, brachycephaly, midface prominence, and related facial
