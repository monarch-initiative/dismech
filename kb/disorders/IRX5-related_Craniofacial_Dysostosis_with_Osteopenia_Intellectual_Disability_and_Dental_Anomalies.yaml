definitions:
- name: Clinical disease framing for IRX5-related craniofacial dysostosis
  definition_type: CASE_DEFINITION
  description: >-
    IRX5-related craniofacial dysostosis is a recessive multisystem
    developmental syndrome characterized by severe hypertelorism or telecanthus,
    dental anomalies, osteopenia with fractures, severe myopia, and variable
    neurodevelopmental impairment.
  scope: Disease-level clinical framing for the Hamamy syndrome / IRX5 deficiency spectrum
  evidence:
  - reference: PMID:17230486
    reference_title: 'Severe hypertelorism, midface prominence, prominent/simple ears, severe myopia, borderline intelligence, and bone fragility in two brothers: new syndrome?'
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      We report on two brothers, born to double first cousin Jordanian Arab
      parents, with a syndrome comprising severe hypertelorism with upslanted
      palpebral fissures, brachycephaly, abnormal ears, sloping shoulders,
      enamel hypoplasia, and osteopenia with repeated fractures.
    explanation: >-
      The original clinical report defines the recognizable craniofacial,
      dental, and skeletal syndrome later molecularly linked to IRX5.
  - reference: PMID:34899143
    reference_title: Clinical and Molecular Update on the Fourth Reported Family with Hamamy Syndrome.
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      We report on 2 cousins, a girl and a boy, born to first-cousin Lebanese
      parents with Hamamy syndrome, exhibiting developmental delay,
      intellectual disability, severe telecanthus, abnormal ears,
      dentinogenesis imperfecta, and bone fragility.
    explanation: >-
      This later family report confirms the same syndrome core and broadens the
      clinical spectrum to include explicit intellectual disability and
      dentinogenesis imperfecta.
- name: Molecular definition for IRX5-related craniofacial dysostosis
  definition_type: DIAGNOSTIC_CRITERIA
  description: >-
    Molecularly, this entry captures biallelic deleterious IRX5 variants that
    impair homeodomain transcription-factor function and disrupt embryonic
    craniofacial and skeletal developmental programs.
  scope: Molecular anchoring of the IRX5 developmental disorder branch
  evidence:
  - reference: PMID:22581230
    reference_title: Mutations in IRX5 impair craniofacial development and germ cell migration via SDF1.
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Using homozygosity mapping and locus resequencing, we found that
      alterations in the homeodomain of the IRX5 transcription factor cause a
      recessive congenital disorder affecting face, brain, blood, heart, bone
      and gonad development.
    explanation: >-
      This discovery paper directly establishes IRX5 homeodomain dysfunction as
      the molecular lesion underlying the syndrome.
