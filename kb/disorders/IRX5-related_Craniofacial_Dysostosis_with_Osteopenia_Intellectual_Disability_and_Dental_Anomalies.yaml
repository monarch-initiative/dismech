- name: Impaired osteoblast maturation and cranial mineralization
  description: >-
    IRX5 loss impairs osteogenic differentiation and later mineralization
    programs, especially in cranial bones, producing a low-mineralization /
    bone-fragility phenotype.
  cell_types:
  - preferred_term: osteoblast
    term:
      id: CL:0000062
      label: osteoblast
  biological_processes:
  - preferred_term: osteoblast differentiation
    modifier: DECREASED
    term:
      id: GO:0001649
      label: osteoblast differentiation
  - preferred_term: ossification
    modifier: ABNORMAL
    term:
      id: GO:0001503
      label: ossification
  evidence:
  - reference: PMID:32662900
    reference_title: IRX3 and IRX5 Inhibit Adipogenic Differentiation of Hypertrophic Chondrocytes and Promote Osteogenesis.
    supports: SUPPORT
    evidence_source: MODEL_ORGANISM
    snippet: >-
      Irx3 and Irx5 null mutants display severe bone deficiency in newborn and
      adult stages.
    explanation: >-
      Mouse skeletal data support a direct requirement for IRX5 in normal bone
      formation and maintenance.
  - reference: PMID:27453922
    reference_title: Loss of Iroquois homeobox transcription factors 3 and 5 in osteoblasts disrupts cranial mineralization.
    supports: SUPPORT
    evidence_source: MODEL_ORGANISM
    snippet: >-
      Our findings indicate that IRX3 and IRX5 can work together to regulate
      mineralization of specific cranial bones.
    explanation: >-
      This supports a specific cranial mineralization defect downstream of IRX5
      dysfunction.
  downstream:
  - target: Osteopenia and bone fragility
    description: >-
      Reduced mineralization lowers bone density and predisposes to repeated
      fractures and long-bone fragility.
    evidence:
    - reference: PMID:17230486
      reference_title: 'Severe hypertelorism, midface prominence, prominent/simple ears, severe myopia, borderline intelligence, and bone fragility in two brothers: new syndrome?'
      supports: SUPPORT
      evidence_source: HUMAN_CLINICAL
      snippet: >-
        We report on two brothers, born to double first cousin Jordanian Arab
        parents, with a syndrome comprising severe hypertelorism with upslanted
        palpebral fissures, brachycephaly, abnormal ears, sloping shoulders,
        enamel hypoplasia, and osteopenia with repeated fractures.
      explanation: >-
        This directly connects the developmental skeletal mechanism to the human
        osteopenia and fracture phenotype.
    - reference: PMID:34899143
      reference_title: Clinical and Molecular Update on the Fourth Reported Family with Hamamy Syndrome.
      supports: SUPPORT
      evidence_source: HUMAN_CLINICAL
      snippet: >-
        We report on 2 cousins, a girl and a boy, born to first-cousin Lebanese
