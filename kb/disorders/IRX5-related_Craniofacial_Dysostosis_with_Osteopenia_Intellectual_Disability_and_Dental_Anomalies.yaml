pathophysiology:
  - name: Biallelic IRX5 homeodomain dysfunction
    description: >-
      Homozygous deleterious variants impair IRX5, a developmental homeobox
      transcription factor that coordinates embryonic patterning across cranial,
      skeletal, and other organ systems.
    gene:
      preferred_term: IRX5
      modifier: DECREASED
      term:
        id: hgnc:14361
        label: IRX5
    evidence:
      - reference: PMID:22581230
        reference_title: Mutations in IRX5 impair craniofacial development and germ
          cell migration via SDF1.
        supports: SUPPORT
        evidence_source: HUMAN_CLINICAL
        snippet: >-
          Using homozygosity mapping and locus resequencing, we found that
          alterations in the homeodomain of the IRX5 transcription factor cause a
          recessive congenital disorder affecting face, brain, blood, heart, bone
          and gonad development.
        explanation: >-
          This provides the proximal causal lesion for the disease mechanism.
      - reference: PMID:34899143
        reference_title: Clinical and Molecular Update on the Fourth Reported Family
          with Hamamy Syndrome.
        supports: SUPPORT
        evidence_source: HUMAN_CLINICAL
        snippet: >-
          Whole-exome sequencing studies performed on the 2 affected individuals
          and one obligate carrier revealed the presence of a homozygous c.503G>A
          (p.Arg168His) missense mutation in IRX5 in both sibs, not reported in any
          other family.
        explanation: >-
          Independent familial confirmation supports recurrent biallelic IRX5
          involvement in the syndrome.
    downstream:
      - target: Impaired cranial neural crest and branchial arch progenitor migration
        description: >-
          Loss of IRX5-mediated repression of SDF1/CXCL12 perturbs migratory
          developmental programs needed for normal craniofacial morphogenesis.
        evidence:
          - reference: PMID:22581230
            reference_title: Mutations in IRX5 impair craniofacial development and
              germ cell migration via SDF1.
            supports: SUPPORT
            evidence_source: MODEL_ORGANISM
            snippet: >-
              We found through in vivo modeling in Xenopus laevis embryos that Irx5
              modulates the migration of progenitor cell populations in branchial
              arches and gonads by repressing Sdf1.
            explanation: >-
              Xenopus modeling directly links IRX5 dysfunction to failed migratory
              control in craniofacial progenitor populations.
      - target: Impaired osteoblast maturation and cranial mineralization
        description: >-
          IRX5 deficiency disrupts osteogenic maturation programs and the
          mineralization of specific cranial bones.
        evidence:
          - reference: PMID:27453922
            reference_title: Loss of Iroquois homeobox transcription factors 3 and
              5 in osteoblasts disrupts cranial mineralization.
            supports: SUPPORT
            evidence_source: MODEL_ORGANISM
            snippet: >-
              Although we found that the Osx-Cre transgene alone could also affect
              craniofacial mineralization, newborn Irx3 (flox/flox) /Irx5(-/-)/Osx-Cre
              (+)
              mice displayed additional mineralization defects in parietal, interparietal,
              and
              frontal bones with enlarged sutures and reduced calvarial expression
              of
              osteogenic genes.
            explanation: >-
              Osteoblast-lineage mouse data support a direct role for IRX5 deficiency
              in defective cranial mineralization and osteogenic gene expression.
  - name: Impaired cranial neural crest and branchial arch progenitor migration
    description: >-
      Aberrant embryonic migration in craniofacial progenitor populations disrupts
      facial patterning and contributes to the distinctive craniofacial anomaly
      spectrum.
    biological_processes:
      - preferred_term: neural crest cell migration
        modifier: ABNORMAL
        term:
