  term:
    id: MONDO:0012634
    label: craniofacial dysplasia - osteopenia syndrome
synonyms:
  - Hamamy syndrome
  - craniofacial dysplasia-osteopenia syndrome
  - facial dysmorphism-ocular anomalies-osteopenia-intellectual disability-dental
