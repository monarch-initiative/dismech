---
name: IRX5-related craniofacial dysostosis with osteopenia, intellectual disability,
  and dental anomalies
creation_date: '2026-04-16T19:30:15Z'
category: Mendelian
description: >-
  IRX5-related craniofacial dysostosis with osteopenia, intellectual
  disability, and dental anomalies is a very rare autosomal recessive
  developmental disorder in the Hamamy syndrome spectrum caused by biallelic
  deleterious variants in IRX5, which encodes the homeobox transcription factor
  IRX5. The syndrome combines distinctive craniofacial dysmorphism with dental
  enamel or dentin defects, osteopenia with bone fragility, severe myopia, and
  variable developmental delay or intellectual disability. Current mechanistic
  evidence supports impaired craniofacial progenitor migration via dysregulated
  SDF1/CXCL12 signaling together with defective osteogenic differentiation and
  cranial mineralization.
