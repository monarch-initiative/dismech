    reference_title: "Poliomyelitis."
    supports: SUPPORT
    evidence_source: OTHER
    snippet: "ranging from asymptomatic to a transient flu-like viral illness to paralysis, quadriplegia, and even respiratory failure and death"
    explanation: >-
      Severe poliomyelitis can progress to respiratory failure and death,
