treatments:
- name: Poliovirus vaccination (IPV/OPV)
  description: >-
    Vaccination with inactivated poliovirus vaccine (IPV) or oral poliovirus
    vaccine (OPV) is the cornerstone of prevention. IPV was the first vaccine
    used against poliomyelitis and its immunogenicity to prevent paralytic
    disease is well established; there is no specific antiviral therapy for
    established acute poliomyelitis.
  treatment_term:
    preferred_term: vaccination
    term:
      id: MAXO:0001017
      label: vaccination
  target_phenotypes:
  - preferred_term: acute flaccid paralysis
    term:
      id: HP:0003470
      label: Paralysis
  evidence:
  - reference: PMID:38535567
    reference_title: "Inactivated Poliovirus Vaccine: Recent Developments and the Tortuous Path to Global Acceptance."
    supports: SUPPORT
    evidence_source: OTHER
    snippet: "became the first vaccine to be used to protect against poliomyelitis"
    explanation: >-
      IPV was the first poliomyelitis vaccine, supporting vaccination as the
      central preventive intervention.
  - reference: PMID:38535567
    reference_title: "Inactivated Poliovirus Vaccine: Recent Developments and the Tortuous Path to Global Acceptance."
    supports: SUPPORT
    evidence_source: OTHER
    snippet: "the immunogenicity of IPV to prevent paralytic poliomyelitis continues to be irrefutable"
    explanation: >-
      The review affirms the established immunogenicity of IPV against
      paralytic poliomyelitis.
  - reference: PMID:25360208
    reference_title: "Poliomyelitis: historical facts, epidemiology, and current challenges in eradication."
    supports: SUPPORT
    evidence_source: OTHER
    snippet: "Contribution of Salk and Sabin in the form of vaccines"
    explanation: >-
      The historical review credits the Salk (IPV) and Sabin (OPV) vaccines as
      the basis of polio prevention.
- name: Supportive care
  description: >-
    Because no antiviral treatment exists for acute poliomyelitis, management is
    supportive, including monitoring for bulbar and respiratory compromise, pain
    control, and prevention of complications.
  treatment_term:
    preferred_term: supportive care
    term:
      id: MAXO:0000950
