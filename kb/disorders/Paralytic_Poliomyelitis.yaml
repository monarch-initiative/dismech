    description: >-
      Retrograde axonal transport delivers poliovirus to anterior horn motor
      neuron cell bodies, complementing the hematogenous CNS-invasion route.
  evidence:
  - reference: PMID:22529845
    reference_title: "Poliovirus trafficking toward central nervous system via human poliovirus receptor-dependent and -independent pathway."
    supports: SUPPORT
    evidence_source: MODEL_ORGANISM
    snippet: "PV is taken up by endocytosis at synapses"
    explanation: >-
      Intramuscularly inoculated poliovirus is taken up at synapses, the entry
      step of the neural dissemination route.
  - reference: PMID:22529845
    reference_title: "Poliovirus trafficking toward central nervous system via human poliovirus receptor-dependent and -independent pathway."
    supports: SUPPORT
    evidence_source: MODEL_ORGANISM
    snippet: "a fast retrograde axonal transport process is required for PV dissemination"
    explanation: >-
      Fast retrograde axonal transport is required for poliovirus dissemination
      through peripheral nerve to the CNS.
- name: Acute Flaccid Paralysis
  description: >-
    Loss of lower motor neurons denervates the muscles they innervate,
    producing the hallmark acute, asymmetric, flaccid weakness with diminished
    or absent reflexes and preserved sensation, followed by muscle atrophy.
    Most infections, however, are inapparent or abortive, with only a small
    minority progressing to paralytic disease.
  cell_types:
  - preferred_term: motor neuron
    term:
      id: CL:0000100
      label: motor neuron
  downstream:
  - target: Bulbar Involvement and Respiratory Failure
    description: >-
      When motor neuron destruction extends to brainstem motor nuclei, bulbar
      and respiratory muscle failure can follow.
  evidence:
  - reference: PMID:32644370
    reference_title: "Poliomyelitis."
    supports: SUPPORT
    evidence_source: OTHER
    snippet: "acute-onset flaccid paralysis, decreased or absent tendon reflexes, and without sensory or cognitive deficits"
    explanation: >-
      The clinical review captures the defining flaccid paralysis with
      areflexia and preserved sensation that follows motor neuron loss.
  - reference: PMID:32644370
    reference_title: "Poliomyelitis."
    supports: SUPPORT
    evidence_source: OTHER
    snippet: "most infections are asymptomatic"
    explanation: >-
      Most poliovirus infections are asymptomatic, with paralysis occurring in
      only a small minority.
  - reference: PMID:25360208
    reference_title: "Poliomyelitis: historical facts, epidemiology, and current challenges in eradication."
    supports: SUPPORT
    evidence_source: OTHER
    snippet: "inapparent infection without symptoms, mild illness (abortive poliomyelitis), aseptic meningitis (nonparalytic"
    explanation: >-
      The review describes the clinical spectrum from inapparent and abortive
      infection through nonparalytic to paralytic poliomyelitis.
- name: Bulbar Involvement and Respiratory Failure
  description: >-
    In bulbar poliomyelitis, motor neuron destruction involves the brainstem
    motor nuclei controlling swallowing and respiration. This can cause
    dysphagia, airway compromise, and respiratory failure, the most
    life-threatening manifestation of the disease.
  locations:
  - preferred_term: brainstem
    term:
      id: UBERON:0002298
      label: brainstem
  cell_types:
  - preferred_term: motor neuron
    term:
      id: CL:0000100
      label: motor neuron
  evidence:
