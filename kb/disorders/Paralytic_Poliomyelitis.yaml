    reference_title: "Poliomyelitis."
    supports: SUPPORT
    evidence_source: OTHER
    snippet: "As no antiviral treatment for acute poliomyelitis exists, prevention is critical"
    explanation: >-
      The absence of antiviral therapy makes supportive care and prevention the
      mainstays of management.
- name: Mechanical ventilatory support
  description: >-
    Patients with bulbar or respiratory muscle weakness may require mechanical
    ventilation, historically the iron lung and now invasive or noninvasive
