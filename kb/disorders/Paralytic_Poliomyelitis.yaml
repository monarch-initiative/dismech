  - reference: PMID:24367151
    reference_title: "Molecular aspects of poliovirus pathogenesis."
    supports: SUPPORT
    evidence_source: MODEL_ORGANISM
    snippet: "the mechanisms for viral permeation through the blood-brain barrier and retrograde axonal transport of the virus"
    explanation: >-
      The transgenic-mouse dissemination work supports both blood-brain barrier
      permeation and retrograde axonal transport as CNS-invasion routes.
- name: Anterior Horn Motor Neuron Tropism and Lysis
  description: >-
    Within the CNS poliovirus replicates preferentially in motor neurons,
    especially the lower motor neurons of the anterior (ventral) horn of the
    spinal cord gray matter and, in bulbar disease, brainstem motor nuclei.
    Lytic viral replication kills these neurons; the replicating capacity of the
    virus within the CNS is the principal determinant of neurovirulence.
  locations:
  - preferred_term: ventral horn of spinal cord
    term:
      id: UBERON:0002257
      label: ventral horn of spinal cord
  - preferred_term: gray matter
    term:
      id: UBERON:0002020
