    reference_title: "Modeling Poliovirus Infection Using Human Engineered Neural Tissue Enriched With Motor Neuron Derived From Embryonic Stem Cells"
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: "Poliomyelitis is caused by poliovirus (PV), a positive strand non-enveloped virus"
    explanation: >-
      The engineered neural tissue model confirms poliovirus as a non-enveloped
      positive-strand virus that is the cause of poliomyelitis.
  - reference: PMID:10915595
    reference_title: "Expression of the human poliovirus receptor/CD155 gene during development of the central nervous system: implications for the pathogenesis of poliomyelitis."
    supports: SUPPORT
    evidence_source: MODEL_ORGANISM
    snippet: "Expression of CD155 within embryonic structures giving rise to spinal cord anterior horn motor neurons may explain the"
    explanation: >-
      CD155 reporter-expression mapping links receptor distribution to the
      anterior horn motor neuron compartment targeted by poliovirus.
  - reference: PMID:10915595
    reference_title: "Expression of the human poliovirus receptor/CD155 gene during development of the central nervous system: implications for the pathogenesis of poliomyelitis."
    supports: SUPPORT
    evidence_source: MODEL_ORGANISM
    snippet: "restrictive host cell tropism of poliovirus for this cellular compartment of the"
    explanation: >-
      The same study attributes the restrictive cellular tropism of poliovirus
      to CD155-defined neuronal compartments.
- name: Viremia and CNS Invasion
  description: >-
    After fecal-oral acquisition, poliovirus multiplies in the alimentary mucosa
    and gut-associated lymphoid tissue, then enters the bloodstream. The
    resulting viremia delivers virus to the central nervous system by permeation
    of the blood-brain barrier and, alternatively, by retrograde axonal
    transport along peripheral motor neurons from muscle to the spinal cord.
  locations:
  - preferred_term: central nervous system
    term:
      id: UBERON:0001017
      label: central nervous system
  - preferred_term: spinal cord
    term:
      id: UBERON:0002240
      label: spinal cord
  biological_processes:
  - preferred_term: response to virus
    modifier: INCREASED
    term:
      id: GO:0009615
      label: response to virus
  downstream:
  - target: Anterior Horn Motor Neuron Tropism and Lysis
    description: >-
      Virus reaching the CNS replicates preferentially in spinal and brainstem
      motor neurons, where its lytic replication destroys the cells.
  evidence:
  - reference: PMID:22529845
    reference_title: "Poliovirus trafficking toward central nervous system via human poliovirus receptor-dependent and -independent pathway."
    supports: SUPPORT
    evidence_source: MODEL_ORGANISM
    snippet: "the virus multiplies in the alimentary mucosa"
    explanation: >-
      The trafficking review describes primary poliovirus replication in the
      alimentary mucosa before bloodstream entry.
  - reference: PMID:22529845
    reference_title: "Poliovirus trafficking toward central nervous system via human poliovirus receptor-dependent and -independent pathway."
    supports: SUPPORT
    evidence_source: MODEL_ORGANISM
    snippet: "paralytic poliomyelitis results from the invasion of the central nervous system"
    explanation: >-
      The review frames paralytic poliomyelitis as the consequence of CNS
