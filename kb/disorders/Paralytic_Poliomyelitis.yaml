name: Paralytic Poliomyelitis
creation_date: "2026-06-26T00:00:00Z"
category: Neurological Disorder
disease_term:
  preferred_term: paralytic poliomyelitis
  term:
    id: MONDO:0000341
    label: paralytic poliomyelitis
parents:
- Motor Neuron Disease
- Viral infectious disease
- Central nervous system disorder
description: >-
  Paralytic poliomyelitis is an acute lower-motor-neuron disease caused by
  poliovirus, an enterovirus of the family Picornaviridae. The virus is spread
  by the fecal-oral (and oral-oral) route, undergoes primary replication in the
  alimentary mucosa and gut-associated lymphoid tissue, and produces a viremia
  through which it can invade the central nervous system. Poliovirus enters
  cells via its receptor CD155 (PVR) and shows marked tropism for, and lytic
  destruction of, the anterior horn lower motor neurons of the spinal cord (and
  brainstem motor nuclei in bulbar polio), producing acute asymmetric flaccid
  paralysis, areflexia, and muscle atrophy with intact sensation. Most
  infections are asymptomatic or abortive and fewer than 1% progress to
  paralytic disease. Bulbar involvement threatens respiratory and swallowing
  centers and can be fatal. The disease is vaccine-preventable with the
  inactivated (IPV) and oral (OPV) poliovirus vaccines. It is mechanistically
  related to the polio-like syndrome acute flaccid myelitis (caused chiefly by
  non-polio enteroviruses) and to the late sequela post-polio syndrome.
pathophysiology:
- name: Poliovirus Entry via CD155 Receptor
  description: >-
    Poliovirus is a non-enveloped, positive-strand RNA enterovirus
    (Picornaviridae). Host-cell entry is governed by the poliovirus receptor
    CD155 (PVR), an immunoglobulin-superfamily membrane protein. CD155 binding
    determines species and cell-type susceptibility, and its expression in
    structures giving rise to anterior horn motor neurons helps explain the
    restrictive neuronal tropism of poliovirus.
  cell_types:
  - preferred_term: motor neuron
    term:
      id: CL:0000100
      label: motor neuron
  genes:
  - preferred_term: PVR (CD155, poliovirus receptor)
    term:
      id: hgnc:9705
      label: PVR
  biological_processes:
  - preferred_term: poliovirus entry into host cell via CD155
    modifier: INCREASED
    term:
      id: GO:0046718
      label: symbiont entry into host cell
  downstream:
  - target: Viremia and CNS Invasion
    description: >-
      CD155-mediated cell entry and replication in the alimentary mucosa seed
      the viremia that delivers poliovirus to the central nervous system.
  evidence:
