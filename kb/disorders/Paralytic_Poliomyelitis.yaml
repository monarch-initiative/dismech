      label: symbiont-mediated perturbation of host apoptosis
  downstream:
  - target: Acute Flaccid Paralysis
    description: >-
      Destruction of lower motor neurons denervates skeletal muscle, producing
      flaccid weakness, areflexia, and subsequent atrophy.
  evidence:
  - reference: PMID:22529845
