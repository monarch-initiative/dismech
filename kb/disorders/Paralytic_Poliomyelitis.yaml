- name: Retrograde Axonal Transport Neural Route
  description: >-
    Beyond hematogenous spread, poliovirus can reach the CNS by a neural route:
    after intramuscular uptake by endocytosis at the neuromuscular synapse, the
    virus is carried retrogradely along motor axons, a CD155-dependent fast
    axonal transport process, to the motor neuron cell body where uncoating and
    replication occur.
  locations:
  - preferred_term: spinal cord
    term:
      id: UBERON:0002240
      label: spinal cord
  cell_types:
  - preferred_term: motor neuron
    term:
      id: CL:0000100
