    supports: SUPPORT
    evidence_source: MODEL_ORGANISM
    snippet: "it replicates in neurons, especially in motor neurons, inducing the cell death that causes paralytic poliomyelitis"
    explanation: >-
      The review directly states that motor neuron replication and cell death
      cause paralytic poliomyelitis.
  - reference: PMID:24367151
    reference_title: "Molecular aspects of poliovirus pathogenesis."
    supports: SUPPORT
    evidence_source: MODEL_ORGANISM
    snippet: "strain-specific neurovirulence levels are shown to depend mainly on the replicating capacity of the virus in the central nervous system"
    explanation: >-
      Neurovirulence is attributed primarily to viral replicating capacity
      within the CNS, supporting the lytic motor-neuron-destruction model.
  - reference: PMID:33490061
    reference_title: "Modeling Poliovirus Infection Using Human Engineered Neural Tissue Enriched With Motor Neuron Derived From Embryonic Stem Cells"
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: "motor neurons are responsible for the permissiveness of poliovirus within the MN ENTs"
    explanation: >-
      In motor-neuron-enriched human neural tissue, motor neurons are the
