differential_diagnoses:
- name: Acute flaccid myelitis
  description: >-
    Acute flaccid myelitis is a polio-like syndrome caused chiefly by non-polio
    enteroviruses (especially enterovirus D68) and is the leading contemporary
    mimic of paralytic poliomyelitis.
  evidence:
  - reference: PMID:32644370
    reference_title: "Poliomyelitis."
    supports: SUPPORT
    evidence_source: OTHER
    snippet: "acute flaccid myelitis"
    explanation: >-
      The clinical review names acute flaccid myelitis as the principal
      polio-like syndrome to be distinguished from poliomyelitis.
- name: Guillain-Barre syndrome
  description: >-
    Guillain-Barre syndrome causes acute flaccid paralysis but is typically
    symmetric with sensory involvement and albuminocytologic dissociation,
    contrasting with the asymmetric, sensation-sparing pattern of polio.
  notes: >-
    Distinguished from polio by symmetric weakness and sensory involvement;
    no quotable abstract snippet is asserted for this differential.
