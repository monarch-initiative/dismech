name: PRPS1 Superactivity
creation_date: "2026-04-04T00:00:00Z"
updated_date: "2026-04-04T12:00:00Z"
description: >-
  Phosphoribosylpyrophosphate synthetase (PRS-I) superactivity is an X-linked
  disorder of purine metabolism caused by gain-of-function mutations in PRPS1.
  Overexpression of PRS-I leads to excessive purine nucleotide synthesis and
  consequent uric acid overproduction. Clinical features include hyperuricemia,
  gout, uric acid nephrolithiasis, and in some patients, neurodevelopmental
  abnormalities including hypotonia, ataxia, and postlingual hearing impairment.
  This is mechanistically opposite to the PRPS1 deficiency spectrum (Arts
  syndrome, CMTX5, DFN2) where loss-of-function mutations reduce enzyme activity.
category: Genetic
parents:
  - Inborn Error of Purine Metabolism
disease_term:
  preferred_term: phosphoribosylpyrophosphate synthetase superactivity
  term:
    id: MONDO:0010395
    label: phosphoribosylpyrophosphate synthetase superactivity
prevalence:
  - population: Global
    percentage: Rare
inheritance:
  - name: X-linked
    inheritance_term:
      preferred_term: X-linked inheritance
      term:
        id: HP:0001417
        label: X-linked inheritance
pathophysiology:
  - name: PRS-I Gain of Function
    description: >-
      Gain-of-function mutations in PRPS1 increase PRS-I enzyme activity,
      accelerating the conversion of ribose-5-phosphate to
      phosphoribosylpyrophosphate (PRPP).
    evidence:
      - reference: PMID:23190330
        supports: SUPPORT
        evidence_source: HUMAN_CLINICAL
        snippet: >-
          Gain of function mutations in PRPS1 cause a superactivity of the
          PRS-I protein
        explanation: >-
          Confirms GOF mechanism for superactivity.
    downstream:
      - target: Purine Overproduction
  - name: Purine Overproduction
    description: >-
      Excess PRPP drives purine nucleotide biosynthesis beyond metabolic
      demand, leading to overproduction of purines and their degradation
      product uric acid. Hyperuricemia causes urate crystal deposition in
      joints (gout) and kidneys (nephrolithiasis).
    biological_processes:
      - preferred_term: Purine nucleotide biosynthesis
        term:
          id: GO:0006164
          label: purine nucleotide biosynthetic process
    evidence:
      - reference: PMID:26089585
        supports: SUPPORT
        evidence_source: HUMAN_CLINICAL
        snippet: >-
          The overexpression of PRPS1 results in PRS-I superactivity
          resulting in purine overproduction. Patients with PRS-I
          superactivity demonstrate uric acid overproduction, hypotonia,
          ataxia, neurodevelopment abnormalities, and postlingual hearing
          impairment.
        explanation: >-
          Describes purine overproduction and its clinical consequences.
