      term:
        id: hgnc:9462
        label: PRPS1
    inheritance:
      - name: X-linked
        inheritance_term:
          preferred_term: X-linked inheritance
          term:
            id: HP:0001417
            label: X-linked inheritance
    features: >-
      Gain-of-function mutations increasing PRS-I enzyme activity.
      Primarily affects hemizygous males. Mechanistically opposite to
      the PRPS1 deficiency spectrum.
    evidence:
      - reference: PMID:23190330
        supports: SUPPORT
        evidence_source: HUMAN_CLINICAL
        snippet: >-
          Gain of function mutations in PRPS1 cause a superactivity of the
          PRS-I protein whereas the loss-of-function mutations result in
          X-linked nonsyndromic sensorineural deafness type 2 (DFN2), or
          in syndromic deafness including Arts syndrome
        explanation: >-
          Distinguishes GOF (superactivity) from LOF (deficiency spectrum).
