      label: lung
  evidence:
  - reference: PMID:29871052
    reference_title: "[Follicular thyroid carcinoma metastatic to the lung and bone and cutaneous: one case report]."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Follicular thyroid carcinoma usually metastasizes through a hematogenous route, the most frequent sites of distant metastases are bone and lung"
    explanation: >-
      Supports hematogenous dissemination to bone and lung as the
      characteristic metastatic pattern of follicular thyroid carcinoma.
  - reference: PMID:31370731
