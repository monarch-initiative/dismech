name: Thyroid Follicular Carcinoma
creation_date: '2026-06-22T00:00:00Z'
description: >-
  Thyroid follicular carcinoma is a differentiated adenocarcinoma arising from
  thyroid follicular cells and is the second most common histologic type of
  thyroid carcinoma. It is distinguished from the benign follicular adenoma not
  by cytology but by the histopathologic demonstration of capsular and/or
  vascular invasion. Follicular carcinoma is commonly driven by RAS-family
  (NRAS, HRAS, KRAS) activating point mutations and by the PAX8-PPARG gene
  fusion, with these "RAS-like" lesions co-activating the MAPK and PI3K/AKT
  pathways. Loss of PTEN further derepresses PI3K/AKT signaling, while TERT
  promoter and TP53 mutations are progression events associated with
  dedifferentiation, radioiodine-refractory disease, and adverse outcome. Unlike
  papillary thyroid carcinoma, follicular carcinoma characteristically spreads
  hematogenously to bone and lung rather than via regional cervical lymph nodes.
categories:
- Endocrine Cancer
- Differentiated Thyroid Cancer
parents:
- thyroid carcinoma
has_subtypes:
- name: Minimally Invasive
  display_name: Minimally Invasive Follicular Thyroid Carcinoma
  description: >-
    Encapsulated tumor with limited capsular invasion only, without extensive
    vascular invasion. Generally indolent with an excellent prognosis.
- name: Encapsulated Angioinvasive
  display_name: Encapsulated Angioinvasive Follicular Thyroid Carcinoma
  description: >-
    Encapsulated tumor with vascular invasion. Extensive vascular invasion is
    associated with a poorer prognosis.
- name: Widely Invasive
  display_name: Widely Invasive Follicular Thyroid Carcinoma
  description: >-
    Tumor with widespread infiltration of the thyroid and/or extrathyroidal
    tissues, frequently with extensive vascular invasion and a higher rate of
    distant metastasis.
pathophysiology:
- name: RAS and PAX8-PPARG Driver Alterations
  description: >-
    Early oncogenic events in follicular thyroid carcinoma are dominated by
    activating point mutations in the RAS family (NRAS, HRAS, KRAS) and by the
    PAX8-PPARG gene fusion arising from a t(2;3)(q13;p25) translocation. These
    truncal alterations occur in thyroid follicular cells and define the
    "RAS-like" molecular class of follicular-patterned thyroid tumors. Mutant
    RAS is locked in the active GTP-bound state, and the chimeric PAX8-PPARG
    protein exhibits neomorphic transcriptional activity dysregulating
    differentiation and metabolism.
  cell_types:
  - preferred_term: thyroid follicular cell
    term:
      id: CL:0002258
      label: thyroid follicular cell
  locations:
  - preferred_term: thyroid gland
    term:
      id: UBERON:0002046
      label: thyroid gland
  evidence:
  - reference: PMID:28864536
    reference_title: "Changes in the clinicopathological characteristics and genetic alterations of follicular thyroid cancer."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "In 134 samples, genetic tests for N/H/KRAS and TERT promoter mutations and PAX8/PPARγ rearrangement were performed."
    explanation: >-
      Confirms that RAS-family mutations and PAX8/PPARG rearrangement are the
      recurrent driver alterations assayed in a large follicular thyroid
      carcinoma cohort.
  downstream:
  - target: MAPK and PI3K-AKT Pathway Activation
    description: >-
      Constitutively active RAS and the PAX8-PPARG fusion drive sustained
      downstream proliferative signaling.
    causal_link_type: DIRECT
- name: MAPK and PI3K-AKT Pathway Activation
  description: >-
    RAS-family mutations and PI3K-pathway lesions co-activate the MAPK
    (RAS-RAF-MEK-ERK) and PI3K/AKT cascades. In follicular thyroid carcinoma the
    PI3K/AKT arm is especially prominent, promoting cell growth, survival,
    metabolism, and invasive behavior, while moderate "RAS-like" MAPK output is
    associated with the follicular architecture.
  biological_processes:
  - preferred_term: Ras protein signal transduction
    modifier: INCREASED
    term:
      id: GO:0007265
      label: Ras protein signal transduction
  - preferred_term: MAPK cascade
    modifier: INCREASED
    term:
      id: GO:0000165
      label: MAPK cascade
  - preferred_term: PI3K/AKT signal transduction
    modifier: INCREASED
    term:
      id: GO:0043491
      label: phosphatidylinositol 3-kinase/protein kinase B signal transduction
  evidence:
  - reference: PMID:28231576
    reference_title: "Molecular Markers Involved in Tumorigenesis of Thyroid Carcinoma: Focus on Aggressive Histotypes."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Genetic rearrangements in TCDFC (RET/PTC, PAX8/PPARG) and mutations in RAS, BRAF, TERT promoter (TERTp), TP53, PIK3CA, and AKT1 are discussed."
    explanation: >-
      Supports the convergence of RAS, PAX8/PPARG, PIK3CA, and AKT1 alterations
      onto MAPK and PI3K/AKT signaling in follicular-cell-derived thyroid
      carcinoma.
  downstream:
  - target: Follicular Cell Proliferation
    description: >-
      Sustained mitogenic signaling drives clonal expansion of transformed
      follicular cells.
    causal_link_type: DIRECT
- name: Follicular Cell Proliferation
  description: >-
    Persistent MAPK and PI3K/AKT signaling promotes uncontrolled proliferation
    of transformed thyroid follicular cells, producing an encapsulated
    follicular-patterned neoplasm.
  cell_types:
  - preferred_term: thyroid follicular cell
    term:
      id: CL:0002258
      label: thyroid follicular cell
  biological_processes:
  - preferred_term: cell population proliferation
    modifier: INCREASED
    term:
      id: GO:0008283
      label: cell population proliferation
  evidence:
  - reference: PMID:39419099
    reference_title: "Management of follicular thyroid carcinoma."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "The cytoarchitectural features of FTC are similar to those of follicular adenoma (FA), and it is difficult to preoperatively distinguish between FA and FTC."
    explanation: >-
      Supports that follicular thyroid carcinoma forms a follicular-patterned
      proliferation cytoarchitecturally resembling the benign follicular
      adenoma.
  downstream:
  - target: Capsular and Vascular Invasion
    description: >-
      The proliferating follicular neoplasm breaches its capsule and invades
      vessels, the defining malignant feature that separates carcinoma from
      adenoma.
    causal_link_type: DIRECT
- name: Capsular and Vascular Invasion
  description: >-
    Capsular and/or vascular invasion is the histopathologic hallmark that
    defines follicular thyroid carcinoma and distinguishes it from the benign
    follicular adenoma. The degree of vascular invasion (minimally invasive,
    encapsulated angioinvasive, widely invasive) is a key prognostic determinant.
  cell_types:
  - preferred_term: thyroid follicular cell
    term:
      id: CL:0002258
      label: thyroid follicular cell
  evidence:
  - reference: PMID:42157115
    reference_title: "Preliminary machine-learning model with clinical, US, and CEUS features for the diagnosis of thyroid follicular-patterned lesions."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Though follicular thyroid carcinoma can be confirmed postoperatively by the histological findings of capsular or vascular invasion"
    explanation: >-
      Supports capsular or vascular invasion as the defining histopathologic
      criterion for follicular thyroid carcinoma.
  - reference: PMID:39213599
    reference_title: "Prognostic factors of papillary and follicular carcinomas based on pre-, intra-, and post-operative findings."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "FTCs are classified as minimally invasive, encapsulated angioinvasive, and widely invasive FTCs."
    explanation: >-
      Supports the invasion-based histopathologic subclassification of
      follicular thyroid carcinoma.
  downstream:
  - target: Hematogenous Distant Metastasis
    description: >-
      Vascular invasion provides the route for hematogenous dissemination to
      distant organs, particularly bone and lung.
    causal_link_type: DIRECT
- name: Hematogenous Distant Metastasis
  description: >-
    Following vascular invasion, follicular thyroid carcinoma disseminates
    predominantly through the bloodstream rather than via lymphatics, with the
    most frequent distant metastatic sites being bone and lung. This
    hematogenous pattern distinguishes follicular carcinoma from the
    lymphatically spreading papillary carcinoma.
  cell_types:
  - preferred_term: thyroid follicular cell
    term:
      id: CL:0002258
      label: thyroid follicular cell
  locations:
  - preferred_term: bone
    term:
