biochemical:
- name: Thyroglobulin
  notes: >-
    Thyroglobulin is a thyroid-follicular-cell product used as a postoperative
    serum tumor marker for surveillance of differentiated thyroid cancer,
    including follicular carcinoma, after total thyroidectomy and radioiodine
    ablation.
  evidence:
  - reference: PMID:39419099
    reference_title: "Management of follicular thyroid carcinoma."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Recurrence and distant metastasis of FTC are treated with radioactive iodine (RAI)."
    explanation: >-
      Supports the differentiated, iodine-handling biology of follicular thyroid
      carcinoma that underlies thyroglobulin-based surveillance and radioiodine
      therapy.
genetic:
- name: NRAS
  association: Somatic Activating Mutations
  notes: >-
    NRAS is one of the RAS-family genes recurrently mutated in follicular thyroid
    carcinoma. Activating point mutations lock RAS in the GTP-bound state and
    drive MAPK and PI3K/AKT signaling; RAS mutations were associated with distant
    metastasis and persistent disease in a large FTC cohort.
  evidence:
  - reference: PMID:28864536
    reference_title: "Changes in the clinicopathological characteristics and genetic alterations of follicular thyroid cancer."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "RAS mutations were associated with distant metastasis and persistent disease"
    explanation: >-
      Supports RAS-family mutation as a recurrent driver associated with adverse
      outcome in follicular thyroid carcinoma.
- name: HRAS
  association: Somatic Activating Mutations
  notes: >-
    HRAS is among the RAS-family genes (N/H/KRAS) assayed and recurrently altered
    in follicular thyroid carcinoma, contributing to the "RAS-like" molecular
    class.
  evidence:
  - reference: PMID:28864536
    reference_title: "Changes in the clinicopathological characteristics and genetic alterations of follicular thyroid cancer."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "In 134 samples, genetic tests for N/H/KRAS and TERT promoter mutations and PAX8/PPARγ rearrangement were performed."
    explanation: >-
      Supports HRAS as one of the RAS-family genes (N/H/KRAS) tested as a
      recurrent driver in follicular thyroid carcinoma.
- name: KRAS
  association: Somatic Activating Mutations
  notes: >-
    KRAS is among the RAS-family genes (N/H/KRAS) recurrently mutated in
    follicular thyroid carcinoma and part of the RAS-like driver class.
  evidence:
  - reference: PMID:28864536
    reference_title: "Changes in the clinicopathological characteristics and genetic alterations of follicular thyroid cancer."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "In 134 samples, genetic tests for N/H/KRAS and TERT promoter mutations and PAX8/PPARγ rearrangement were performed."
    explanation: >-
      Supports KRAS as one of the RAS-family genes (N/H/KRAS) tested as a
      recurrent driver in follicular thyroid carcinoma.
- name: PPARG
  association: Somatic Gene Fusions
  notes: >-
    The PAX8-PPARG fusion, from a t(2;3)(q13;p25) translocation, is characteristic
    of follicular thyroid carcinoma. The chimeric protein fuses the PAX8
    DNA-binding domain to the PPARG ligand-binding domain and exhibits neomorphic
    transcriptional activity.
  evidence:
  - reference: PMID:28864536
    reference_title: "Changes in the clinicopathological characteristics and genetic alterations of follicular thyroid cancer."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "In 134 samples, genetic tests for N/H/KRAS and TERT promoter mutations and PAX8/PPARγ rearrangement were performed."
    explanation: >-
      Supports PAX8/PPARG rearrangement as a recurrent driver alteration tested
      in follicular thyroid carcinoma.
- name: PAX8
  association: Somatic Gene Fusions
  notes: >-
    PAX8 is the thyroid-specific transcription factor partner in the PAX8-PPARG
    fusion characteristic of follicular thyroid carcinoma; its DNA-binding domain
    is fused to the PPARG ligand-binding domain.
  evidence:
  - reference: PMID:28864536
    reference_title: "Changes in the clinicopathological characteristics and genetic alterations of follicular thyroid cancer."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "In 134 samples, genetic tests for N/H/KRAS and TERT promoter mutations and PAX8/PPARγ rearrangement were performed."
    explanation: >-
      Supports PAX8 as a fusion partner in the recurrent PAX8/PPARG rearrangement
      of follicular thyroid carcinoma.
- name: PTEN
  association: Somatic Inactivating Mutations
  notes: >-
    Loss of PTEN phosphatase function results in unopposed PI3K/AKT signaling and
    is a driver of follicular thyroid carcinoma; germline PTEN mutations underlie
    Cowden syndrome, which predisposes to follicular thyroid carcinoma. PTEN is
    one of the PIK3CA/AKT/PTEN-axis alterations driving PI3K pathway activation.
  evidence:
  - reference: PMID:28231576
    reference_title: "Molecular Markers Involved in Tumorigenesis of Thyroid Carcinoma: Focus on Aggressive Histotypes."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Genetic rearrangements in TCDFC (RET/PTC, PAX8/PPARG) and mutations in RAS, BRAF, TERT promoter (TERTp), TP53, PIK3CA, and AKT1 are discussed."
    explanation: >-
      Supports PI3K/AKT-pathway alterations (PIK3CA, AKT1; PTEN loss derepresses
      the same axis) as contributors to follicular-cell-derived thyroid
      carcinoma.
- name: TERT
  association: Somatic Promoter Mutations
  notes: >-
    TERT promoter mutations are progression events that activate telomerase and
    are the best current marker of poor prognosis in thyroid carcinoma. In FTC
    they are associated with distant metastasis, advanced stage, recurrence, and
    disease-specific mortality, especially when coexisting with RAS mutation.
  evidence:
  - reference: PMID:28864536
    reference_title: "Changes in the clinicopathological characteristics and genetic alterations of follicular thyroid cancer."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "TERT promoter mutations were associated with distant metastasis, advanced TNM stage, recurrence and disease-specific mortality."
    explanation: >-
      Supports TERT promoter mutation as a progression-associated marker of
      adverse outcome in follicular thyroid carcinoma.
  - reference: PMID:28231576
    reference_title: "Molecular Markers Involved in Tumorigenesis of Thyroid Carcinoma: Focus on Aggressive Histotypes."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "TERTp mutations can serve as a marker of more aggressive disease in all the subtypes of thyroid carcinoma, being the best current marker of poor prognosis"
    explanation: >-
      Supports TERT promoter mutation as the strongest current prognostic marker
      across thyroid carcinoma subtypes including follicular carcinoma.
environmental:
- name: Iodine Deficiency
  notes: >-
    Iodine deficiency is a recognized risk context associated with follicular
    thyroid histology; the proportion of thyroid cancers that are follicular
    carcinoma is traditionally higher in iodine-deficient populations.
treatments:
- name: Total Thyroidectomy
  description: >-
    Surgical resection is the mainstay of initial therapy for follicular thyroid
    carcinoma, aiming to improve survival, reduce recurrence, and permit accurate
    staging and risk stratification.
  treatment_term:
    preferred_term: surgical procedure
    term:
      id: MAXO:0000004
      label: surgical procedure
  evidence:
  - reference: PMID:39419099
    reference_title: "Management of follicular thyroid carcinoma."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "The goals of initial surgical therapy for patients with FTC are to improve overall and disease-specific survival, reduce the risk of persistent/recurrent disease and associated morbidity"
    explanation: >-
      Supports surgery as the mainstay of initial therapy for follicular thyroid
      carcinoma.
- name: Radioactive Iodine Therapy
  description: >-
    Radioactive iodine (RAI) is used to treat recurrence and distant metastasis
    of differentiated follicular thyroid carcinoma, exploiting iodine uptake by
    differentiated follicular tumor cells. Some tumors become RAI-refractory with
    dedifferentiation.
  treatment_term:
    preferred_term: radiation therapy
    term:
      id: MAXO:0000014
      label: radiation therapy
  evidence:
  - reference: PMID:39419099
    reference_title: "Management of follicular thyroid carcinoma."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Recurrence and distant metastasis of FTC are treated with radioactive iodine (RAI)."
    explanation: >-
      Supports radioactive iodine as therapy for recurrent and metastatic
      follicular thyroid carcinoma.
- name: Levothyroxine TSH Suppression
  description: >-
    Levothyroxine is given after thyroidectomy both as hormone replacement and to
    suppress TSH, removing a growth stimulus to any residual differentiated
    thyroid tumor cells.
  treatment_term:
    preferred_term: Pharmacotherapy
    term:
      id: NCIT:C15986
      label: Pharmacotherapy
    therapeutic_agent:
    - preferred_term: levothyroxine
      term:
        id: CHEBI:18332
        label: L-thyroxine
- name: Multikinase Inhibitor Therapy
  description: >-
    Multi-tyrosine kinase inhibitors such as sorafenib and lenvatinib are used
    for radioactive-iodine-refractory follicular thyroid carcinoma.
  treatment_term:
    preferred_term: targeted therapy
    term:
      id: NCIT:C93352
      label: Targeted Therapy
    therapeutic_agent:
    - preferred_term: lenvatinib
      term:
        id: CHEBI:85994
        label: lenvatinib
    - preferred_term: sorafenib
      term:
        id: CHEBI:50924
        label: sorafenib
  evidence:
  - reference: PMID:39419099
    reference_title: "Management of follicular thyroid carcinoma."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Multi-tyrosine kinase inhibitors such as sorafenib and lenvatinib are utilized for treating RAI-refractory FTCs."
    explanation: >-
      Supports multikinase inhibitors (sorafenib, lenvatinib) for
      radioiodine-refractory follicular thyroid carcinoma.
