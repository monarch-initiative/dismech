treatments:
- name: Very Low-Fat Diet
  description: >
    A strict, lifelong very low-fat diet (<15% of energy from fat) is the
    cornerstone of FCS management, reducing chylomicron formation and lowering
    plasma triglycerides to mitigate pancreatitis risk. Total alcohol
    avoidance and management of secondary aggravating factors are also
    recommended.
  treatment_term:
    preferred_term: dietary intervention
    term:
      id: MAXO:0000088
      label: dietary intervention
  evidence:
  - reference: PMID:40234111
    reference_title: "Familial chylomicronemia syndrome: An expert clinical review from the National Lipid Association."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Affected individuals require a strict, lifelong very low-fat diet with <15% of energy from fat."
    explanation: A strict lifelong very low-fat diet is the foundational management of FCS.
- name: Volanesorsen
  role: Antisense Oligonucleotide
  description: >
    Second-generation 2'-O-methoxyethyl antisense oligonucleotide that
    hybridizes with APOC3 mRNA and recruits RNase H1 to degrade the transcript,
    suppressing hepatic synthesis of apolipoprotein C-III. Lowering apoC-III
    restores triglyceride clearance independently of LPL, producing large
    reductions in plasma triglycerides in FCS. Volanesorsen (Waylivra) is
    approved by the European Medicines Agency as an adjunct to diet for adults
    with genetically confirmed FCS and high pancreatitis risk. The principal
    safety signals are thrombocytopenia and injection-site reactions, requiring
    platelet monitoring.
  treatment_term:
    preferred_term: pharmacotherapy
    term:
      id: MAXO:0000058
      label: pharmacotherapy
    therapeutic_agent:
    - preferred_term: volanesorsen
      term:
        id: NCIT:C152904
        label: Volanesorsen
  target_mechanisms:
  - target: Chylomicronemia and Severe Hypertriglyceridemia
    treatment_effect: INHIBITS
    description: >
      Antisense-mediated reduction of hepatic apoC-III lowers the elevated
      plasma triglyceride burden of FCS independently of residual LPL activity.
    evidence:
    - reference: PMID:31390500
      reference_title: "Volanesorsen and Triglyceride Levels in Familial Chylomicronemia Syndrome."
      supports: SUPPORT
      evidence_source: HUMAN_CLINICAL
      snippet: "Patients receiving volanesorsen had a 77% decrease in mean triglyceride levels"
      explanation: The pivotal APPROACH phase 3 trial showed volanesorsen produced a 77% reduction in triglycerides in FCS.
  evidence:
  - reference: PMID:31390500
    reference_title: "Volanesorsen and Triglyceride Levels in Familial Chylomicronemia Syndrome."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "antisense-mediated inhibition of hepatic APOC3 mRNA with volanesorsen led to decreased plasma apolipoprotein C-III and triglyceride levels"
    explanation: Defines volanesorsen's mechanism as antisense inhibition of hepatic APOC3 mRNA.
  - reference: PMID:31390500
    reference_title: "Volanesorsen and Triglyceride Levels in Familial Chylomicronemia Syndrome."
    supports: PARTIAL
    evidence_source: HUMAN_CLINICAL
    snippet: "Thrombocytopenia and injection-site reactions were common adverse events."
    explanation: Volanesorsen efficacy is tempered by common thrombocytopenia and injection-site reactions requiring monitoring.
- name: Olezarsen
  role: Antisense Oligonucleotide
  description: >
    Next-generation N-acetylgalactosamine (GalNAc)-conjugated antisense
    oligonucleotide targeting APOC3 mRNA for receptor-mediated hepatocyte
    uptake, reducing hepatic apolipoprotein C-III synthesis. The GalNAc
    conjugation enables lower, less frequent dosing with reduced systemic
    exposure than volanesorsen. In the phase 3 Balance trial, olezarsen lowered
    triglycerides and reduced acute pancreatitis events in FCS, and it is
    approved by the US Food and Drug Administration as an adjunct to diet for
    adults with FCS.
  treatment_term:
    preferred_term: pharmacotherapy
    term:
      id: MAXO:0000058
      label: pharmacotherapy
    therapeutic_agent:
    - preferred_term: olezarsen
      term:
        id: NCIT:C180652
        label: Olezarsen
  target_mechanisms:
  - target: Chylomicronemia and Severe Hypertriglyceridemia
    treatment_effect: INHIBITS
    description: >
      GalNAc-conjugated antisense reduction of hepatic apoC-III lowers plasma
      triglyceride levels in FCS.
    evidence:
    - reference: PMID:38587247
      reference_title: "Olezarsen, Acute Pancreatitis, and Familial Chylomicronemia Syndrome."
      supports: SUPPORT
      evidence_source: HUMAN_CLINICAL
      snippet: "Olezarsen reduces the plasma triglyceride level by reducing hepatic synthesis of apolipoprotein C-III."
      explanation: Olezarsen lowers triglycerides via reduced hepatic apoC-III synthesis.
  evidence:
  - reference: PMID:38587247
    reference_title: "Olezarsen, Acute Pancreatitis, and Familial Chylomicronemia Syndrome."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "By 53 weeks, 11 episodes of acute pancreatitis had occurred in the placebo group, and 1 episode had occurred in each olezarsen group"
    explanation: The Balance phase 3 trial showed olezarsen markedly reduced acute pancreatitis events in FCS.
  - reference: PMID:40068508
    reference_title: "Familial chylomicronemia syndrome and treatments to target hepatic APOC3 mRNA."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "the ASO olezarsen, is now approved by the US Food and Drug Administration (FDA) as an adjunct to diet to lower triglycerides in adults with FCS"
    explanation: Confirms olezarsen's FDA approval as an APOC3 antisense therapy for FCS.
