      label: Autosomal recessive inheritance
  description: >
    FCS is inherited in an autosomal recessive pattern and is caused by
    biallelic pathogenic variants in LPL (the most common cause) or in one of
    four genes encoding proteins required for LPL activity or secretion:
    APOC2, APOA5, GPIHBP1, and LMF1.
