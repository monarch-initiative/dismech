name: Familial Chylomicronemia Syndrome
creation_date: "2026-05-30T00:00:00Z"
description: >
  Familial chylomicronemia syndrome (FCS) is a rare autosomal recessive
  monogenic disorder of lipid metabolism characterized by extreme and sustained
  hypertriglyceridemia due to absent or markedly impaired lipoprotein lipase
  (LPL) activity. Loss of LPL-mediated hydrolysis of triglyceride-rich
  lipoproteins prevents clearance of dietary chylomicrons, producing fasting
  triglyceride levels typically >=10 mmol/L (>=885 mg/dL) and visibly lipemic
  plasma from a young age. FCS is caused by biallelic pathogenic variants in
  LPL or in one of four genes encoding proteins required for LPL function or
  secretion (APOC2, APOA5, GPIHBP1, LMF1). The dominant clinical risk is
  recurrent acute pancreatitis; other features include eruptive xanthomas,
  hepatosplenomegaly, lipemia retinalis, and recurrent abdominal pain. FCS is
  resistant to conventional triglyceride-lowering therapies, and management
  centers on a strict, lifelong very low-fat diet. The apolipoprotein C-III
  (apoC-III) pathway has emerged as the principal druggable target: antisense
  oligonucleotides (volanesorsen, olezarsen) and siRNAs (plozasiran) that
  reduce hepatic apoC-III synthesis substantially lower triglycerides and
  pancreatitis risk.
