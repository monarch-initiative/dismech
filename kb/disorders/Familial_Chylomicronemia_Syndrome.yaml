pathophysiology:
- name: Lipoprotein Lipase Deficiency
  description: >
    Biallelic loss-of-function variants in LPL, or in genes whose products are
    required for LPL maturation, transport, or activation (LMF1, GPIHBP1,
    APOC2, APOA5), abolish or severely reduce lipoprotein lipase activity at
    the capillary endothelial surface. LPL normally hydrolyzes the triglyceride
    core of chylomicrons and VLDL; its loss blocks the rate-limiting step of
    triglyceride-rich lipoprotein catabolism.
  genes:
  - preferred_term: LPL
    term:
      id: hgnc:6677
      label: LPL
  cell_types:
  - preferred_term: capillary endothelial cell
    term:
      id: CL:0002144
      label: capillary endothelial cell
  biological_processes:
  - preferred_term: triglyceride catabolic process
    term:
      id: GO:0019433
      label: triglyceride catabolic process
    modifier: DECREASED
  downstream:
  - target: Chylomicronemia and Severe Hypertriglyceridemia
    description: >
      Loss of LPL-mediated lipolysis prevents clearance of triglyceride-rich
      chylomicrons, causing their accumulation in plasma and extreme fasting
      hypertriglyceridemia.
    causal_link_type: DIRECT
    evidence:
    - reference: PMID:40234111
      reference_title: "Familial chylomicronemia syndrome: An expert clinical review from the National Lipid Association."
      supports: SUPPORT
      evidence_source: HUMAN_CLINICAL
      snippet: "characterized by extreme and sustained hypertriglyceridemia due to profound reduction of lipoprotein lipase (LPL) activity"
      explanation: Profound reduction of LPL activity directly produces the extreme hypertriglyceridemia of FCS.
  evidence:
  - reference: PMID:31390500
    reference_title: "Volanesorsen and Triglyceride Levels in Familial Chylomicronemia Syndrome."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Familial chylomicronemia syndrome is a rare genetic disorder that is caused by loss of lipoprotein lipase activity and characterized by chylomicronemia and recurrent episodes of pancreatitis."
    explanation: Identifies loss of lipoprotein lipase activity as the primary defect underlying FCS.
- name: Chylomicronemia and Severe Hypertriglyceridemia
  description: >
    Failure of triglyceride-rich lipoprotein clearance produces massive
    accumulation of chylomicrons and fasting triglyceride levels typically
    >=10 mmol/L (>=885 mg/dL), with visibly lipemic plasma. Apolipoprotein
    C-III (apoC-III) is a key physiological inhibitor of triglyceride
    clearance, and lowering apoC-III reduces plasma triglycerides even when LPL
    activity is absent or impaired, making the apoC-III axis the principal
    pharmacological target in FCS.
  biological_processes:
  - preferred_term: triglyceride homeostasis
    term:
      id: GO:0070328
      label: triglyceride homeostasis
    modifier: ABNORMAL
  downstream:
  - target: Recurrent Acute Pancreatitis
    description: >
      Severe chylomicronemia predisposes to recurrent, potentially
      life-threatening episodes of acute pancreatitis, the dominant clinical
      complication of FCS.
    causal_link_type: INDIRECT_UNKNOWN_INTERMEDIATES
    evidence:
    - reference: PMID:40234111
      reference_title: "Familial chylomicronemia syndrome: An expert clinical review from the National Lipid Association."
      supports: SUPPORT
      evidence_source: HUMAN_CLINICAL
      snippet: "a high lifetime risk of acute pancreatitis"
      explanation: Severe hypertriglyceridemia in FCS confers a high lifetime risk of acute pancreatitis.
  evidence:
  - reference: PMID:40068508
    reference_title: "Familial chylomicronemia syndrome and treatments to target hepatic APOC3 mRNA."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Naturally occurring very low levels of apoC-III are associated with low TG levels; thus, apoC-III is a target for TG lowering, and therapies have been developed to reduce apoC-III."
    explanation: Establishes apoC-III as the druggable node controlling triglyceride levels in chylomicronemia.
- name: Recurrent Acute Pancreatitis
  description: >
    Extreme chylomicronemia triggers recurrent episodes of acute pancreatitis,
    the principal source of morbidity and mortality in FCS. Reducing plasma
    triglycerides through apoC-III inhibition lowers the rate of acute
    pancreatitis events.
