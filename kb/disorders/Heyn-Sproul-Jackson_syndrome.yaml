differential_diagnoses:
- name: Tatton-Brown-Rahman syndrome
  description: >-
    Tatton-Brown-Rahman syndrome is the major differential diagnosis because it
    is also caused by DNMT3A variants but presents with an opposite overgrowth
    phenotype rather than microcephaly and growth failure.
  distinguishing_features:
  - Microcephaly and growth failure favor Heyn-Sproul-Jackson syndrome.
  - Overgrowth and macrocephaly favor Tatton-Brown-Rahman syndrome.
  disease_term:
    preferred_term: Tatton-Brown-Rahman syndrome
    term:
      id: MONDO:0014382
      label: Tatton-Brown-Rahman overgrowth syndrome
  evidence:
  - reference: DOI:10.3389/fped.2023.1165638
    reference_title: "A novel pathogenic variant of DNMT3A associated with craniosynostosis: a case report of Heyn-Sproul-Jackson syndrome"
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Pathogenic variants of DNMT3A have been implicated in Tatton-Brown-Rahman syndrome, an overgrowth disorder with macrocephaly and intellectual disability. However, there are recent reports of variants in the same gene giving rise to an opposing clinical phenotype presenting with microcephaly, growth failure, and impaired development—named Heyn-Sproul-Jackson syndrome (HESJAS)."
    explanation: This directly supports Tatton-Brown-Rahman syndrome as the key contrasting differential diagnosis.
