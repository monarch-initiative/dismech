name: Heyn-Sproul-Jackson syndrome
creation_date: "2026-04-13T22:47:36Z"
updated_date: "2026-04-14T14:35:00Z"
description: >-
  Heyn-Sproul-Jackson syndrome is a rare DNMT3A-related neurodevelopmental
  disorder characterized by microcephaly, growth failure, developmental
  impairment, dysmorphic facial features, and in some patients craniosynostosis.
  It represents an opposing growth phenotype to Tatton-Brown-Rahman syndrome
  despite involvement of the same gene.
category: Mendelian
parents:
- hereditary disease
- neurodevelopmental disorder
synonyms:
- HESJAS
disease_term:
  preferred_term: Heyn-Sproul-Jackson syndrome
  term:
    id: MONDO:0032882
    label: Heyn-Sproul-Jackson syndrome
inheritance:
- name: Autosomal dominant inheritance
  description: >-
    Heyn-Sproul-Jackson syndrome is caused by heterozygous DNMT3A variants and
    is typically identified as a de novo autosomal dominant disorder.
  inheritance_term:
    preferred_term: Autosomal dominant inheritance
    term:
      id: HP:0000006
      label: Autosomal dominant inheritance
  evidence:
  - reference: DOI:10.3389/fped.2023.1165638
    reference_title: "A novel pathogenic variant of DNMT3A associated with craniosynostosis: a case report of Heyn-Sproul-Jackson syndrome"
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Next generation sequencing revealed a novel heterozygous variant in DNMT3A (NM_175629.2: c.1012_1014 + 3del). The patient's parents did not carry the variant."
    explanation: >-
      This case report supports heterozygous, apparently de novo DNMT3A
      causality, consistent with autosomal dominant inheritance.
pathophysiology:
- name: DNMT3A dysfunction
  description: >-
    Pathogenic heterozygous DNMT3A variation disrupts epigenetic regulation
    during development and establishes the primary molecular lesion in
    Heyn-Sproul-Jackson syndrome. DNMT3A gain-of-function mutations cause
    accelerated gains in DNA methylation that recapitulate age-related epigenetic
    alterations, leading to multilineage stem cell dysfunction.
  gene:
    preferred_term: DNMT3A
    description: DNA methyltransferase 3 alpha developmental epigenetic regulator.
    term:
      id: hgnc:2978
      label: DNMT3A
  genes:
  - preferred_term: DNMT3A
    term:
      id: hgnc:2978
      label: DNMT3A
  evidence:
  - reference: DOI:10.3389/fped.2023.1165638
    reference_title: "A novel pathogenic variant of DNMT3A associated with craniosynostosis: a case report of Heyn-Sproul-Jackson syndrome"
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Here, we present a case of HESJAS caused by a novel pathogenic variant of DNMT3A."
    explanation: This directly supports DNMT3A as the disease-causing gene in HESJAS.
  - reference: PMID:42286141
    supports: SUPPORT
    evidence_source: MODEL_ORGANISM
    snippet: "We demonstrate that DNMT3A gain-of-function mutations in Heyn-Sproul-Jackson syndrome recapitulate age-related gains in DNA methylation (DNAme), cause multilineage stem cell dysfunction, and phenocopy aspects of aging in humans and mice."
    explanation: This paper establishes DNMT3A gain-of-function as causing DNA hypermethylation and multilineage stem cell dysfunction in model systems, implicating it in age-related pathologies.
  downstream:
  - target: Impaired neurodevelopment
    description: DNMT3A dysfunction perturbs developmental programs required for normal neurodevelopment.
  - target: Impaired cranial growth and morphogenesis
    description: Abnormal developmental regulation contributes to microcephaly and craniosynostosis.
  - target: Growth delay
    causal_link_type: INDIRECT_UNKNOWN_INTERMEDIATES
    description: DNMT3A developmental epigenetic dysregulation is associated with the opposing-growth HESJAS phenotype that includes growth failure.
    evidence:
    - reference: DOI:10.3389/fped.2023.1165638
      reference_title: "A novel pathogenic variant of DNMT3A associated with craniosynostosis: a case report of Heyn-Sproul-Jackson syndrome"
      supports: SUPPORT
      evidence_source: HUMAN_CLINICAL
      snippet: "there are recent reports of variants in the same gene giving rise to an opposing clinical phenotype presenting with microcephaly, growth failure, and impaired development—named Heyn-Sproul-Jackson syndrome (HESJAS)."
      explanation: This identifies growth failure as part of the DNMT3A-associated HESJAS presentation.
  - target: DNMT3A-mediated DNA hypermethylation
    description: DNMT3A gain-of-function mutations drive accelerated DNA methylation accumulation at lineage-specific genes, mimicking age-related epigenetic alterations.
- name: Impaired neurodevelopment
  description: >-
    Disrupted developmental regulation downstream of DNMT3A dysfunction drives
    the severe developmental phenotype of Heyn-Sproul-Jackson syndrome.
  evidence:
  - reference: DOI:10.3389/fped.2023.1165638
    reference_title: "A novel pathogenic variant of DNMT3A associated with craniosynostosis: a case report of Heyn-Sproul-Jackson syndrome"
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "A five-year-old girl presented with severe developmental delay."
    explanation: This directly supports severe neurodevelopmental impairment in HESJAS.
  downstream:
  - target: Global developmental delay
    description: Neurodevelopmental disruption produces profound global developmental delay.
- name: Impaired cranial growth and morphogenesis
  description: >-
    Altered developmental regulation contributes to reduced head growth and, in
    some patients, premature cranial suture fusion.
  evidence:
  - reference: DOI:10.3389/fped.2023.1165638
    reference_title: "A novel pathogenic variant of DNMT3A associated with craniosynostosis: a case report of Heyn-Sproul-Jackson syndrome"
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Physical exam showed microcephaly and facial dysmorphic features, and neurodevelopmental assessments revealed profound global developmental delay. Brain magnetic resonance imaging findings were normal; however, brain 3D computed tomography revealed craniosynostosis."
    explanation: >-
      This case report directly links the disorder to abnormal cranial growth,
      microcephaly, and craniosynostosis.
  downstream:
  - target: Microcephaly
    description: Impaired cranial growth leads to microcephaly.
  - target: Craniosynostosis
    description: Abnormal cranial morphogenesis can lead to premature cranial suture fusion.
  - target: Abnormal facial shape
    causal_link_type: DIRECT
    description: Abnormal craniofacial growth and morphogenesis produce facial dysmorphic features.
    evidence:
    - reference: DOI:10.3389/fped.2023.1165638
      reference_title: "A novel pathogenic variant of DNMT3A associated with craniosynostosis: a case report of Heyn-Sproul-Jackson syndrome"
      supports: SUPPORT
      evidence_source: HUMAN_CLINICAL
      snippet: "Physical exam showed microcephaly and facial dysmorphic features"
      explanation: This supports facial dysmorphism as a craniofacial manifestation of HESJAS.
- name: DNMT3A-mediated DNA hypermethylation
  description: >-
    DNMT3A gain-of-function mutations cause region-specific accumulation of DNA
    methylation (hypermethylation) at lineage-specific genes. This epigenetic
    dysregulation recapitulates age-related patterns of aberrant DNA methylation
    and directly impairs stem cell function across multiple tissue lineages,
    reducing stem cell output and causing lineage skewing.
  evidence:
  - reference: PMID:42286141
    supports: SUPPORT
    evidence_source: MODEL_ORGANISM
    snippet: "We also show that region-specific DNA hypermethylation at lineage-specific genes can explain reduced stem cell output and lineage skewing."
    explanation: This paper demonstrates that DNMT3A-driven DNA hypermethylation at lineage-specific genes causes stem cell dysfunction in model systems.
  downstream:
  - target: Multilineage stem cell dysfunction
    causal_link_type: DIRECT
    description: DNA hypermethylation at lineage-specific genes impairs stem cell maintenance and differentiation capacity across multiple tissue lineages.
- name: Multilineage stem cell dysfunction
  description: >-
    Region-specific DNA hypermethylation driven by DNMT3A gain-of-function causes
    dysfunction of stem/progenitor cells across multiple lineages. This manifests
    as reduced stem cell output and abnormal lineage skewing, compromising tissue
    regenerative capacity. In model systems, this mechanism is implicated in
    age-related hematological, bone, and metabolic dysfunction, though the extent
    to which these age-related phenotypes manifest clinically in pediatric HESJAS
    patients remains incompletely characterized.
  cell_types:
  - preferred_term: hematopoietic stem cell
    term:
      id: CL:0000037
      label: hematopoietic stem cell
  - preferred_term: mesenchymal stem cell
    term:
      id: CL:0000134
      label: mesenchymal stem cell
  evidence:
  - reference: PMID:42286141
    supports: SUPPORT
    evidence_source: MODEL_ORGANISM
    snippet: "DNMT3A gain-of-function mutations in Heyn-Sproul-Jackson syndrome recapitulate age-related gains in DNA methylation (DNAme), cause multilineage stem cell dysfunction, and phenocopy aspects of aging in humans and mice."
    explanation: This paper establishes multilineage stem cell dysfunction as a central mechanism in HESJAS model systems, with implications for age-related pathologies.
  downstream:
  - target: Impaired tissue regeneration and growth
    causal_link_type: INDIRECT_UNKNOWN_INTERMEDIATES
    description: Reduced stem cell output and lineage skewing compromise tissue regenerative capacity, contributing to the growth delay phenotype. The potential role of stem cell dysfunction in age-related hematological, bone, and metabolic complications remains to be characterized clinically in HESJAS.
