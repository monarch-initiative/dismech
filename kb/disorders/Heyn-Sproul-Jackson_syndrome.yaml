  downstream:
  - target: Impaired neurodevelopment
    description: DNMT3A dysfunction perturbs developmental programs required for normal neurodevelopment.
  - target: Impaired cranial growth and morphogenesis
    description: Abnormal developmental regulation contributes to microcephaly and craniosynostosis.
- name: Impaired neurodevelopment
  description: >-
    Disrupted developmental regulation downstream of DNMT3A dysfunction drives
    the severe developmental phenotype of Heyn-Sproul-Jackson syndrome.
  evidence:
  - reference: DOI:10.3389/fped.2023.1165638
    reference_title: "A novel pathogenic variant of DNMT3A associated with craniosynostosis: a case report of Heyn-Sproul-Jackson syndrome"
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "A five-year-old girl presented with severe developmental delay."
    explanation: This directly supports severe neurodevelopmental impairment in HESJAS.
  downstream:
  - target: Global developmental delay
    description: Neurodevelopmental disruption produces profound global developmental delay.
- name: Impaired cranial growth and morphogenesis
  description: >-
    Altered developmental regulation contributes to reduced head growth and, in
    some patients, premature cranial suture fusion.
  evidence:
  - reference: DOI:10.3389/fped.2023.1165638
    reference_title: "A novel pathogenic variant of DNMT3A associated with craniosynostosis: a case report of Heyn-Sproul-Jackson syndrome"
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Physical exam showed microcephaly and facial dysmorphic features, and neurodevelopmental assessments revealed profound global developmental delay. Brain magnetic resonance imaging findings were normal; however, brain 3D computed tomography revealed craniosynostosis."
    explanation: >-
      This case report directly links the disorder to abnormal cranial growth,
      microcephaly, and craniosynostosis.
  downstream:
  - target: Microcephaly
    description: Impaired cranial growth leads to microcephaly.
  - target: Craniosynostosis
    description: Abnormal cranial morphogenesis can lead to premature cranial suture fusion.
