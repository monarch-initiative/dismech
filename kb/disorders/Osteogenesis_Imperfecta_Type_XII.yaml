pathophysiology:
- name: SP7/Osterix Loss-of-Function Eliminates the Osteoblast Master Transcription Factor
  description: >-
    SP7 encodes Osterix (OSX), an osteoblast-specific zinc-finger transcription
    factor containing three Cys2-His2 zinc-finger DNA-binding domains at its C
    terminus. Osterix is specifically expressed in all developing bones and acts
    downstream of RUNX2/Cbfa1 in the osteoblast differentiation cascade. The OI
    type XII frameshift deletion (c.1052delA) removes the last 81 amino acids,
    including the third zinc-finger motif, abolishing DNA-binding and
    transcriptional function. The missense variant (p.Arg316Cys) similarly
    impairs the factor. This is a transcription-factor lesion, distinct from the
    collagen-structural and collagen-modification mechanisms of other OI types.
  cell_types:
  - preferred_term: osteoblast
    term:
