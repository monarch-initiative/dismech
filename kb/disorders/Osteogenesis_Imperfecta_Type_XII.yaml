  - reference: PMID:11792318
    reference_title: "The novel zinc finger-containing transcription factor osterix is required for osteoblast differentiation and bone formation."
    supports: SUPPORT
    evidence_source: MODEL_ORGANISM
    snippet: >-
      However, the mesenchymal cells do not deposit bone matrix. Similarly, cells
      in the periosteum and in the condensed mesenchyme of membranous skeletal
      elements cannot differentiate into osteoblasts.
    explanation: >-
      Documents the osteoblast-differentiation block and failed bone-matrix
      deposition that define the Osterix-deficient mechanism.
  - reference: PMID:29382611
    reference_title: "Novel variant in Sp7/Osx associated with recessive osteogenesis imperfecta with bone fragility and hearing impairment."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Osterix is expressed primarily by osteoblasts and has been shown to be
      vital for bone formation and bone homeostasis by promoting osteoblast
      differentiation and maturation.
    explanation: >-
      Establishes in the human disease context that Osterix drives osteoblast
      differentiation and maturation, the function lost in OI type XII.
  downstream:
  - target: Reduced Bone Matrix, Low Bone Density, and Skeletal Fragility
    description: >-
      Deficient osteoblast-mediated bone formation yields a hypomineralized,
      mechanically weak skeleton prone to fracture.
- name: Reduced Bone Matrix, Low Bone Density, and Skeletal Fragility
  description: >-
    The osteoblast-differentiation deficit produces a quantitatively reduced and
    poorly organized bone matrix with low bone mineral density and high
    trabecular bone turnover. Bone biopsies from affected children show
    significant cortical porosity and high trabecular bone turnover. Clinically
    this manifests as recurrent low-trauma fractures, mild bone deformity, short
    stature, and, in some families, progressive hearing loss from poor
    mineralization of the ossicles and petrous temporal bone.
