    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      OSX encodes a transcription factor containing three Cys2-His2 zinc-finger
      DNA-binding domains at its C terminus, which, in mice, has been shown to be
      essential for bone formation.
    explanation: >-
      Defines Osterix as a zinc-finger transcription factor essential for bone
      formation, the master regulator lost in OI type XII.
  - reference: PMID:20579626
    reference_title: "Identification of a frameshift mutation in Osterix in a patient with recessive osteogenesis imperfecta."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      The frameshift caused by the c.1052delA deletion removes the last 81 amino
      acids of the protein, including the third zinc-finger motif.
    explanation: >-
      Documents that the defining OI type XII frameshift truncates the Osterix
      DNA-binding zinc-finger domain, abolishing transcription-factor function.
  downstream:
  - target: Impaired Osteoblast Differentiation and Bone Matrix Deposition
    description: >-
      Without functional Osterix, RUNX2-expressing preosteoblasts cannot mature
      into bone-matrix-secreting osteoblasts, blocking osteogenesis.
- name: Impaired Osteoblast Differentiation and Bone Matrix Deposition
  description: >-
    Osterix is required for the terminal differentiation of preosteoblasts into
    mature osteoblasts that deposit bone matrix. In Osx-null mice no bone
    formation occurs: mesenchymal cells invade the cartilage but fail to deposit
    bone matrix and cannot differentiate into osteoblasts, even though they still
    express RUNX2/Cbfa1, placing Osterix downstream of RUNX2. In humans, Osterix
    is expressed primarily by osteoblasts and is vital for bone formation by
    promoting osteoblast differentiation and maturation; its loss impairs the
    bone-formation program rather than collagen structure.
