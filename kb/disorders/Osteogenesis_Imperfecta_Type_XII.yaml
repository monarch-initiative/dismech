      that are the clinical manifestation of the bone-formation deficit.
genetic:
- name: SP7 (Osterix) Loss-of-Function Mutation
  association: Causative
  gene_term:
    preferred_term: SP7 (OSX, Osterix; osteoblast transcription factor)
    term:
      id: hgnc:17321
      label: SP7
  notes: >-
    OI type XII is caused by a biallelic loss-of-function variant in SP7, the
    gene encoding the osteoblast-specific transcription factor Osterix (OSX).
    The defining human allele is a homozygous frameshift deletion (c.1052delA)
    that truncates the protein, removing its third zinc-finger DNA-binding motif.
    A second consanguineous sibship with a homozygous missense variant
    (c.946C>T, p.Arg316Cys) confirms SP7 as the OI type XII gene.
  evidence:
  - reference: PMID:20579626
    reference_title: "Identification of a frameshift mutation in Osterix in a patient with recessive osteogenesis imperfecta."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      This finding adds another locus to the spectrum of genes associated with
      osteogenesis imperfecta and reveals that SP7/OSX also plays a key role in
      human bone development.
    explanation: >-
      Identifies SP7/OSX as the causative locus for this recessive OI, defining
      OI type XII in humans.
  - reference: PMID:29382611
    reference_title: "Novel variant in Sp7/Osx associated with recessive osteogenesis imperfecta with bone fragility and hearing impairment."
    supports: SUPPORT
