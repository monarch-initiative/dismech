name: Osteogenesis Imperfecta Type XII
creation_date: "2026-06-30T00:00:00Z"
category: Mendelian
disease_term:
  preferred_term: Osteogenesis imperfecta type 12
  term:
    id: MONDO:0013460
    label: osteogenesis imperfecta type 12
description: >-
  Osteogenesis imperfecta type XII (OI type XII) is a rare autosomal recessive
  brittle bone disease caused by biallelic loss-of-function variants in SP7,
  the gene encoding the osteoblast-specific zinc-finger transcription factor
  Osterix (OSX). Unlike the collagen-structural (COL1A1/COL1A2) and
  collagen-modification (CRTAP, P3H1, PPIB, SERPINH1) forms of OI, OI type XII
  is a transcription-factor / osteoblast-differentiation disorder: Osterix acts
  downstream of RUNX2 and is essential for the differentiation of preosteoblasts
  into mature, matrix-secreting osteoblasts and for bone formation. The defining
  human allele is a homozygous single-base-pair frameshift deletion (c.1052delA)
  that removes the last 81 amino acids of the protein, including the third
  Cys2-His2 zinc-finger DNA-binding motif, abolishing the transcription factor's
  function. A second consanguineous sibship carrying a homozygous missense
  variant (c.946C>T, p.Arg316Cys) confirmed the gene-disease relationship and
  added significant hearing loss to the recognized spectrum. Loss of Osterix
  impairs osteoblast differentiation and bone matrix deposition, producing a
  bone-formation deficit with low bone mineral density, recurrent low-trauma
  fractures, mild bone deformity, short stature, and delayed tooth eruption.
  The disorder was first defined in an Egyptian child (Lapunzina et al., 2010)
  and is recapitulated by the bone-free phenotype of Osx-null mice (Nakashima
  et al., 2002).
