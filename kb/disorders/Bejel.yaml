    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "More than 100 million additional children are at risk for these disabling and disfiguring infections which destroy tissue and bone."
    explanation: Supports bone-destructive endemic treponematosis manifestations.
