  - statement: The Endemic Treponematoses
    supporting_text: 'SUMMARYThe agents of human treponematoses include four closely
      related members of the genusTreponema: three subspecies ofTreponema pallidumplusTreponema
      carateum.T. pallidumsubsp.pallidumcauses venereal syphilis, whileT. pallidumsubsp.pertenue,T.
      pallidumsubsp.endemicum, andT. carateumare the agents of the endemic treponematoses
      yaws, bejel (or endemic syphilis), and pinta, respectively.'
