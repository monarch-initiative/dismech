treatments:
- name: Penicillin therapy
  description: Penicillin therapy remains the preferred treatment for bejel and other endemic treponematoses.
  treatment_term:
    preferred_term: Pharmacotherapy
    term:
      id: NCIT:C15986
      label: Pharmacotherapy
  evidence:
  - reference: PMID:16615610
    reference_title: "[Overview of endemic treponematoses]."
    supports: SUPPORT
    snippet: "Although penicillin therapy is effective, these infectious diseases have yet to be eliminated."
    explanation: The abstract notes penicillin therapy is effective for endemic treponematoses.
- name: Resistance-Informed Azithromycin Use
  description: >-
    Oral azithromycin has been adopted for mass treatment strategies in yaws and
    endemic treponematoses, but bejel use should be guided by resistance context
    because adult TEN isolates with macrolide-resistance mutations have been
    reported.
  treatment_term:
    preferred_term: Pharmacotherapy
    term:
      id: NCIT:C15986
      label: Pharmacotherapy
    therapeutic_agent:
    - preferred_term: azithromycin
      term:
        id: CHEBI:2955
        label: azithromycin
  evidence:
  - reference: PMID:24396138
    reference_title: The endemic treponematoses.
    supports: PARTIAL
    evidence_source: HUMAN_CLINICAL
    snippet: "This challenging but potentially feasible endeavor is favored by the adoption of oral azithromycin for mass treatment"
    explanation: Supports azithromycin as a mass-treatment tool in endemic treponematoses, although not as unrestricted bejel replacement for penicillin.
  - reference: PMID:34836779
    reference_title: "Clinical perspectives of Treponema pallidum subsp. Endemicum infection in adults, particularly men who have sex with men in the Kansai area, Japan: A case series."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Most of the isolated strains had the A2058G mutation in 23S rDNA, which is responsible for resistance to macrolides."
    explanation: Supports qualifying azithromycin use by macrolide-resistance surveillance in TEN infection.
