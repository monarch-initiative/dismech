name: Bejel
creation_date: '2026-01-26T15:40:02Z'
updated_date: '2026-05-05T23:03:08Z'
category: Infectious Disease
description: >-
  Bejel (endemic syphilis) is a non-venereal treponemal infection caused by
  Treponema pallidum subsp. endemicum.
disease_term:
  term:
    id: MONDO:0001714
    label: bejel
  preferred_term: Bejel
parents:
- Bacterial Infection
- Neglected tropical disease
infectious_agent:
- name: Treponema pallidum subsp. endemicum
  infectious_agent_term:
    preferred_term: Treponema pallidum subsp. endemicum
    term:
      id: NCBITaxon:53436
      label: Treponema pallidum subsp. endemicum
  description: Treponemal agent of bejel.
  evidence:
  - reference: PMID:35687593
    reference_title: "Whole genome sequences of Treponema pallidum subsp. endemicum isolated from Cuban patients: The non-clonal character of isolates suggests a persistent human infection rather than a single outbreak."
    supports: SUPPORT
    snippet: "Bejel (endemic syphilis) is a neglected non-venereal disease caused by Treponema pallidum subsp. endemicum (TEN)."
    explanation: The abstract identifies the causative treponeme for bejel.
pathophysiology:
- name: Treponemal Mucosal Inoculation
  description: >-
    Treponema pallidum subsp. endemicum initiates bejel after mucosal or skin
    contact, producing primary mucosal lesions that may be subtle or clinically
    resemble primary syphilis in recent adult TEN infections.
  biological_processes:
  - preferred_term: symbiont entry into host
    modifier: INCREASED
    term:
      id: GO:0044409
      label: symbiont entry into host
  locations:
  - preferred_term: oral mucosa
    term:
      id: UBERON:0003729
      label: mouth mucosa
  downstream:
  - target: Disseminated Mucocutaneous and Osteoperiosteal Inflammation
    description: Dissemination produces secondary-stage mucocutaneous and skeletal disease.
  evidence:
  - reference: PMID:35687593
    reference_title: "Whole genome sequences of Treponema pallidum subsp. endemicum isolated from Cuban patients: The non-clonal character of isolates suggests a persistent human infection rather than a single outbreak."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Bejel (endemic syphilis) is a neglected non-venereal disease caused by Treponema pallidum subsp. endemicum (TEN)."
    explanation: Supports TEN as the infectious driver of bejel pathophysiology.
  - reference: PMID:34836779
    reference_title: "Clinical perspectives of Treponema pallidum subsp. Endemicum infection in adults, particularly men who have sex with men in the Kansai area, Japan: A case series."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Genital lesions were common as the primary lesion."
    explanation: Supports primary mucosal lesion formation in documented adult TEN infection.
- name: Disseminated Mucocutaneous and Osteoperiosteal Inflammation
  description: >-
    Secondary bejel reflects disseminated treponemal infection with mucocutaneous
    lesions and skeletal involvement. Clinical features overlap primary- and
    secondary-stage T. pallidum subsp. pallidum infection, while endemic
    treponematoses can destroy tissue and bone.
  biological_processes:
  - preferred_term: inflammatory response
    modifier: INCREASED
    term:
      id: GO:0006954
      label: inflammatory response
  locations:
  - preferred_term: mouth mucosa
    term:
      id: UBERON:0003729
      label: mouth mucosa
  - preferred_term: bone tissue
    term:
      id: UBERON:0002481
      label: bone tissue
  - preferred_term: lymph node
    term:
      id: UBERON:0000029
      label: lymph node
  downstream:
  - target: Macrophage-Mediated Treponemal Response
    description: Host cellular immunity attempts to clear disseminated treponemes.
  - target: Tertiary Destructive Gummatous Disease
    description: Untreated persistent infection can progress to destructive late disease.
  evidence:
  - reference: PMID:34836779
    reference_title: "Clinical perspectives of Treponema pallidum subsp. Endemicum infection in adults, particularly men who have sex with men in the Kansai area, Japan: A case series."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "The clinical features of cases of TEN infection were similar to those of primary- and secondary-stage T. pallidum subsp. pallidum (TPA) infection."
    explanation: Supports secondary-stage mucocutaneous overlap between TEN infection and syphilis-like treponemal disease.
  - reference: PMID:2682125
    reference_title: "[Review: endemic treponematoses are not always eradicated]."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "More than 100 million additional children are at risk for these disabling and disfiguring infections which destroy tissue and bone."
    explanation: Supports destructive tissue and skeletal involvement in endemic treponematoses including bejel.
- name: Macrophage-Mediated Treponemal Response
  description: >-
    Treponemal antigens and opsonized organisms activate macrophage-centered
    innate and adaptive immune responses. IFN-gamma and TLR2/JAK1/STAT1-linked
    pathways promote macrophage activation, phagocytosis, and inflammatory
    cytokine production.
  cell_types:
  - preferred_term: macrophage
    term:
      id: CL:0000235
      label: macrophage
  biological_processes:
  - preferred_term: macrophage activation
    modifier: INCREASED
    term:
      id: GO:0042116
      label: macrophage activation
  downstream:
  - target: Tertiary Destructive Gummatous Disease
    description: Persistent inflammation contributes to chronic destructive lesions.
  evidence:
  - reference: PMID:29051759
    reference_title: IFNγ Enhances CD64-Potentiated Phagocytosis of Treponema pallidum Opsonized with Human Syphilitic Serum by Human Macrophages.
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: "IFNγ-polarized macrophages resulted in a statistically significant increase in opsonophagocytosis of Tp accompanied by enhanced production of cytokines, macrophage activation markers (CD40, CD80), TLRs (TLR2, TLR7, TLR8), chemokines (CCL19, CXCL10, CXCL11), and TH1-promoting cytokines (IL-12, IL-15)."
    explanation: Supports IFN-gamma-enhanced macrophage uptake and inflammatory response to Treponema pallidum.
  - reference: PMID:40513619
    reference_title: "Recombinant protein TprK promotes M1 macrophage polarization and phagocytosis by inducing Indoleamine 2,3-dioxygenase protein production."
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: "rTprK induces indoleamine 2,3-dioxygenase (IDO) production through the TLR2/JAK1/STAT1 pathway, which is crucial for modulating macrophage function (P < 0.05)."
    explanation: Supports TLR2/JAK1/STAT1-linked macrophage modulation by a T. pallidum antigen.
- name: Tertiary Destructive Gummatous Disease
  description: >-
    Untreated persistent bejel can progress to late destructive lesions of the
    skin, mucosa, nose, palate, and bone, including gangosa-like nasopalatal
    destruction and skeletal deforming disease.
  biological_processes:
  - preferred_term: inflammatory response
    modifier: INCREASED
    term:
      id: GO:0006954
      label: inflammatory response
  locations:
  - preferred_term: nose
    term:
      id: UBERON:0000004
      label: nose
  - preferred_term: bone tissue
    term:
      id: UBERON:0002481
      label: bone tissue
  evidence:
  - reference: PMID:2682125
    reference_title: "[Review: endemic treponematoses are not always eradicated]."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "More than 100 million additional children are at risk for these disabling and disfiguring infections which destroy tissue and bone."
    explanation: Supports late destructive tissue and bone disease in endemic treponematoses.
phenotypes:
- name: Primary Mucosal Lesions
  category: Mucocutaneous
  description: >-
    Primary bejel may involve oral or oropharyngeal mucosal patches in classic
    endemic childhood disease; recent adult TEN case series also report genital
    lesions as common primary lesions.
  phenotype_term:
    preferred_term: Primary mucosal lesion
    term:
      id: HP:0011830
      label: Abnormal oral mucosa morphology
  evidence:
  - reference: PMID:34836779
    reference_title: "Clinical perspectives of Treponema pallidum subsp. Endemicum infection in adults, particularly men who have sex with men in the Kansai area, Japan: A case series."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Genital lesions were common as the primary lesion."
    explanation: Supports mucosal primary lesion formation in documented TEN infection.
- name: Secondary Mucocutaneous Eruption
  category: Dermatologic
  description: >-
    Secondary bejel includes disseminated mucocutaneous lesions such as
    maculopapular or non-itchy eruptions, mucous patches, condylomata lata-like
    lesions, and split labial papules.
  phenotype_term:
    preferred_term: Secondary mucocutaneous eruption
    term:
      id: HP:0000988
      label: Skin rash
  evidence:
  - reference: PMID:34836779
    reference_title: "Clinical perspectives of Treponema pallidum subsp. Endemicum infection in adults, particularly men who have sex with men in the Kansai area, Japan: A case series."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "The clinical features of cases of TEN infection were similar to those of primary- and secondary-stage T. pallidum subsp. pallidum (TPA) infection."
    explanation: Supports secondary-stage mucocutaneous disease overlap in TEN infection.
- name: Secondary Lymphadenopathy
  category: Immune
  description: >-
    Disseminated secondary bejel can include regional or generalized
    lymphadenopathy as part of the syphilis-like secondary treponemal syndrome.
  phenotype_term:
    preferred_term: Lymphadenopathy
    term:
      id: HP:0002716
      label: Lymphadenopathy
  evidence:
  - reference: PMID:34836779
    reference_title: "Clinical perspectives of Treponema pallidum subsp. Endemicum infection in adults, particularly men who have sex with men in the Kansai area, Japan: A case series."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "The clinical features of cases of TEN infection were similar to those of primary- and secondary-stage T. pallidum subsp. pallidum (TPA) infection."
    explanation: Supports secondary-stage clinical overlap; lymphadenopathy is curated here as part of that secondary treponemal syndrome.
- name: Osteoperiosteal Bone Disease
  category: Musculoskeletal
  description: >-
    Bejel can involve long bones with osteitis or periostitis, painful swelling,
    tibial involvement, and later destructive skeletal lesions.
  phenotype_term:
    preferred_term: Osteoperiosteal bone disease
    term:
      id: HP:0000924
      label: Abnormality of the skeletal system
  evidence:
