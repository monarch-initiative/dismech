  description: >-
    Diagnosis of classic HCL is established by hairy-cell morphology together
    with the canonical immunophenotypic pattern based on CD11c, CD25, CD103,
    and CD123.
  diagnosis_term:
    preferred_term: diagnostic procedure
    term:
