- name: Donidalorsen prekallikrein-knockdown antisense oligonucleotide
  description: >-
    Donidalorsen is a subcutaneously administered antisense oligonucleotide that
    selectively reduces hepatic synthesis of plasma prekallikrein (the KLKB1 gene
    product) by triggering RNase H1-mediated degradation of prekallikrein mRNA.
    Lowering the zymogen pool curtails kallikrein generation and the downstream
    cleavage of high-molecular-weight kininogen, reducing bradykinin production
    upstream of edema attacks. This RNA-knockdown mechanism is distinct from the
    direct kallikrein-inhibiting antibody (lanadelumab) and small-molecule
    (berotralstat) prophylaxis.
  treatment_term:
    preferred_term: pharmacotherapy
    term:
      id: MAXO:0000058
      label: pharmacotherapy
    therapeutic_agent:
    - preferred_term: donidalorsen
      term:
        id: NCIT:C177101
        label: Donidalorsen
  target_mechanisms:
  - target: Excess bradykinin signaling
    treatment_effect: INHIBITS
    description: >-
      Antisense knockdown of prekallikrein lowers available plasma prekallikrein,
      reducing kallikrein activity and bradykinin generation upstream of edema
      attacks.
    evidence:
    - reference: PMID:35294812
      reference_title: "Inhibition of Prekallikrein for Hereditary Angioedema."
      supports: SUPPORT
      evidence_source: HUMAN_CLINICAL
      snippet: >-
        Selective inhibition of plasma prekallikrein production by antisense
        oligonucleotide treatment (donidalorsen) may reduce the frequency of
        attacks and the burden of disease.
      explanation: >-
        Phase 2 trial background statement identifies donidalorsen as an
        antisense oligonucleotide that selectively suppresses prekallikrein
        production.
  evidence:
  - reference: PMID:35294812
    reference_title: "Inhibition of Prekallikrein for Hereditary Angioedema."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      donidalorsen treatment resulted in a significantly lower rate of angioedema
      attacks than placebo in this small, phase 2 trial.
    explanation: Phase 2 randomized trial evidence supports donidalorsen prophylactic efficacy.
  - reference: PMID:41767175
    reference_title: "Donidalorsen for Long-Term Prophylaxis of Hereditary Angioedema Attacks: Results from the OASISplus Open-Label Extension Cohort at Year 1."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Donidalorsen demonstrated sustained reductions in HAE attack rate,
      improvements in QoL, and an acceptable safety profile after 1 year of
      treatment.
    explanation: OASISplus extension evidence supports donidalorsen long-term prophylaxis.
