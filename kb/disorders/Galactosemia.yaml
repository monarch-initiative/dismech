  evidence:
  - reference: PMID:1561928
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Galactosemia in newborns and infants is associated with the following symptoms: jaundice, hepatomegaly, failure to thrive, feeding difficulties, hypoglycemia, convulsions, lethargy, amino-aciduria, cataracts, hepatic cirrhosis, ascites, and mental retardation."
    explanation: Clinical review documenting failure to thrive as a key symptom in galactosemic infants.
- name: Cataracts
  frequency: FREQUENT
  phenotype_term:
    preferred_term: Cataracts
    term:
      id: HP:0000518
      label: Cataract
  description: >
    Oil-droplet cataracts from galactitol accumulation in the lens.
    May be present at birth or develop in first weeks of life.
  evidence:
  - reference: PMID:3043741
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Any single deficient enzyme can result in cataract through the accumulation of galactitol in the lens."
    explanation: Review article confirming that galactitol accumulation in the lens causes cataract formation in all forms of galactosemia.
- name: E. coli sepsis
  frequency: OCCASIONAL
  phenotype_term:
    preferred_term: Neonatal E. coli sepsis
    term:
      id: HP:0040187
      label: Neonatal sepsis
  description: >
    Increased susceptibility to gram-negative sepsis, particularly
    E. coli, in the neonatal period. Mechanism involves impaired
    neutrophil function and complement activation.
  evidence:
  - reference: PMID:1561928
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "If the preliminary evaluation indicates galactosemia, there is high risk for E. coli sepsis and death."
    explanation: Clinical review emphasizing the high risk of E. coli sepsis in infants with galactosemia.
- name: Intellectual disability
  frequency: OCCASIONAL
  phenotype_term:
    preferred_term: Intellectual disability
    term:
      id: HP:0001249
      label: Intellectual disability
  description: >
    Cognitive impairment may occur despite early dietary treatment,
    likely due to endogenous galactose production and UDP-galactose
    deficiency affecting brain development.
  evidence:
  - reference: PMID:1561928
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Galactosemia in newborns and infants is associated with the following symptoms: jaundice, hepatomegaly, failure to thrive, feeding difficulties, hypoglycemia, convulsions, lethargy, amino-aciduria, cataracts, hepatic cirrhosis, ascites, and mental retardation."
    explanation: Clinical review documenting mental retardation (intellectual disability) as a symptom in galactosemia.
- name: Speech disorders
  frequency: VERY_FREQUENT
  phenotype_term:
    preferred_term: Abnormal speech pattern
    term:
      id: HP:0002167
      label: Abnormal speech pattern
  description: >
    Verbal dyspraxia and speech delays are common long-term complications
    even with early treatment.
  evidence:
  - reference: PMID:21347587
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Impairment of speech affects a significant number of patients with galactosemia, appears in early childhood, and persists into adulthood."
    explanation: Cross-sectional human cohort data directly support speech impairment as a common long-term phenotype in classic galactosemia.
- name: Premature ovarian insufficiency
  frequency: FREQUENT
  phenotype_term:
    preferred_term: Premature ovarian insufficiency
    term:
      id: HP:0008209
      label: Premature ovarian insufficiency
  description: >
    Over 80% of females with classic galactosemia develop hypergonadotropic
    hypogonadism with primary or secondary amenorrhea.
  evidence:
  - reference: PMID:20978943
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Primary or premature ovarian insufficiency (POI) is the most common long-term complication experienced by girls and women with classic galactosemia; more than 80% and perhaps more than 90% are affected despite neonatal diagnosis and careful lifelong dietary restriction of galactose."
    explanation: Review documenting that POI affects more than 80-90% of females with classic galactosemia despite dietary treatment.
- name: Tremor
  frequency: OCCASIONAL
  phenotype_term:
    preferred_term: Tremor
    term:
      id: HP:0001337
      label: Tremor
  description: >
    Movement disorders including tremor and ataxia may develop as
    long-term neurological complications.
  evidence:
  - reference: PMID:23400815
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Thirty-one patients showed evidence of motor dysfunction including: tremor (23 patients), dystonia (23 patients), cerebellar signs (6 patients), and pyramidal signs (4 patients)."
    explanation: This adult classical galactosemia cohort directly documents tremor as a frequent component of the motor phenotype.
- name: Reduced bone mineral density
  phenotype_term:
    preferred_term: Reduced bone mineral density
    term:
      id: HP:0004349
      label: Reduced bone mineral density
  description: >
    Diminished bone mineral content has been reported in children and adolescents
    with classical galactosemia and is a target for calcium, vitamin K1, and
    vitamin D3 supplementation.
  evidence:
  - reference: PMID:16782422
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Classical galactosemia is an inherited disorder of galactose metabolism. Recently, diminished bone mineral content (BMC) in children and adolescents has been found."
    explanation: Clinical trial background supports diminished bone mineral content in pediatric classical galactosemia.
biochemical:
- name: Erythrocyte galactose-1-phosphate
  presence: INCREASED
  frequency: VERY_FREQUENT
  context: >
    Elevated erythrocyte galactose-1-phosphate is a core biochemical marker of
    classic galactosemia; in classic disease it is typically above 10 mg/dL.
  biomarker_term:
    preferred_term: alpha-D-galactose 1-phosphate
    term:
      id: CHEBI:17973
      label: alpha-D-galactose 1-phosphate
  readouts:
  - target: Galactose-1-phosphate accumulation
    relationship: READOUT_OF
    direction: POSITIVE
    endpoint_context: DIAGNOSTIC
    interpretation: Elevated erythrocyte Gal-1-P reports the core intracellular Gal-1-P accumulation caused by the Leloir-pathway block.
    evidence:
    - reference: PMID:20301691
      supports: SUPPORT
      evidence_source: HUMAN_CLINICAL
      snippet: "In classic galactosemia, erythrocyte galactose-1-phosphate is usually >10 mg/dL and erythrocyte GALT enzyme activity is absent or barely detectable."
      explanation: GeneReviews identifies erythrocyte Gal-1-P elevation as the diagnostic biochemical readout of classic galactosemia.
  evidence:
  - reference: PMID:20301691
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "In classic galactosemia, erythrocyte galactose-1-phosphate is usually >10 mg/dL and erythrocyte GALT enzyme activity is absent or barely detectable."
    explanation: GeneReviews identifies elevated erythrocyte Gal-1-P as a defining biochemical abnormality in classic galactosemia.
- name: Erythrocyte GALT enzyme activity
  presence: DECREASED_OR_ABSENT
  frequency: VERY_FREQUENT
  context: >
