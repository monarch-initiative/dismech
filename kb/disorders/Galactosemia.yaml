treatments:
- name: Galactose-restricted diet
  description: >
    Lifelong dietary restriction of galactose is the cornerstone of
    treatment. Lactose-containing foods (milk, dairy) are eliminated
    and replaced with soy-based or elemental formulas in infancy.
  treatment_term:
    preferred_term: Galactose-restricted diet
    term:
      id: MAXO:0000088
      label: dietary intervention
  target_mechanisms:
  - target: Galactose-1-phosphate accumulation
    treatment_effect: INHIBITS
    description: Dietary galactose restriction lowers the substrate load that drives toxic galactose-metabolite accumulation.
    evidence:
    - reference: PMID:20301691
      supports: SUPPORT
      evidence_source: HUMAN_CLINICAL
      snippet: "If a lactose-restricted diet is provided during the first ten days of life, the neonatal signs usually quickly resolve and the complications of liver failure, sepsis, and neonatal death are prevented"
      explanation: Early lactose restriction reverses acute neonatal toxicity, supporting inhibition of upstream galactose metabolite accumulation.
  - target: Galactitol accumulation
    treatment_effect: INHIBITS
    description: Restricting dietary galactose reduces the precursor supply for galactitol formation.
    evidence:
    - reference: PMID:3043741
      supports: SUPPORT
      evidence_source: HUMAN_CLINICAL
      snippet: "Galactosemia is a disorder caused by a deficiency of any one of three possible enzymes involved in the metabolism of galactose: galactokinase, transferase or epimerase. Any single deficient enzyme can result in cataract through the accumulation of galactitol in the lens."
      explanation: Galactitol is downstream of galactose pathway disruption, so galactose restriction targets this accumulation mechanism.
  - target: Acute Hepatocellular Dysfunction
    treatment_effect: INHIBITS
    description: Early lactose restriction prevents acute neonatal liver failure and related systemic complications.
    evidence:
    - reference: PMID:20301691
      supports: SUPPORT
      evidence_source: HUMAN_CLINICAL
      snippet: "If a lactose-restricted diet is provided during the first ten days of life, the neonatal signs usually quickly resolve and the complications of liver failure, sepsis, and neonatal death are prevented"
      explanation: GeneReviews directly supports early lactose restriction as preventing liver failure and acute neonatal death.
  target_phenotypes:
  - preferred_term: Neonatal jaundice
    term:
      id: HP:0006579
      label: Prolonged neonatal jaundice
  - preferred_term: Hepatomegaly
    term:
      id: HP:0002240
      label: Hepatomegaly
  - preferred_term: Failure to thrive
    term:
      id: HP:0001508
      label: Failure to thrive
  - preferred_term: Neonatal E. coli sepsis
    term:
      id: HP:0040187
      label: Neonatal sepsis
  evidence:
  - reference: PMID:20978943
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "more than 80% and perhaps more than 90% are affected despite neonatal diagnosis and careful lifelong dietary restriction of galactose"
    explanation: Review confirming that dietary restriction of galactose is the standard treatment, though long-term complications persist.
- name: Calcium and vitamin D supplementation
  description: >
    Supplementation is necessary due to dairy restriction to prevent
    osteoporosis.
  target_phenotypes:
  - preferred_term: Reduced bone mineral density
    term:
      id: HP:0004349
      label: Reduced bone mineral density
  evidence:
  - reference: PMID:16782422
    supports: PARTIAL
    evidence_source: HUMAN_CLINICAL
    snippet: "Supplementation of calcium, vitamins K(1) and D(3) given in this dose (750 mg, 1.0 mg and 10.0 mug respectively) is likely to have a role in the treatment of BMC abnormalities in galactosemia."
    explanation: This randomized clinical trial supports calcium and vitamin D supplementation as part of bone-health management in galactosemia, although the studied regimen also included vitamin K1.
- name: Hormone replacement therapy
  description: >
    Estrogen and progesterone replacement for females with premature
    ovarian insufficiency.
  target_phenotypes:
  - preferred_term: Premature ovarian insufficiency
    term:
      id: HP:0008209
      label: Premature ovarian insufficiency
  evidence:
  - reference: PMID:35118398
    supports: PARTIAL
    evidence_source: HUMAN_CLINICAL
    snippet: "This means that in addition to the consequences of the disease, these women also face infertility and the potential need for hormone replacement therapy."
    explanation: This POI management review supports hormone replacement therapy as a recognized part of care for girls and women with classic galactosemia-associated ovarian insufficiency.
- name: Speech therapy
  description: >
    Early intervention for speech and language delays.
  treatment_term:
