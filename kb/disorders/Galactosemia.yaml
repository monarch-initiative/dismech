    explanation: This directly supports urinary galactitol elevation as a biochemical marker in classical galactosemia.
diagnosis:
- name: Newborn Screening
  notes: >
    Newborn screening detects most infants with classic galactosemia and enables
    early dietary treatment before severe neonatal injury develops.
  evidence:
  - reference: PMID:20301691
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Virtually 100% of infants with classic galactosemia or clinical variant galactosemia can be detected in newborn screening programs that include testing for galactosemia in their panel."
    explanation: This directly supports newborn screening as a highly effective case-finding approach for classic galactosemia.
- name: Erythrocyte GALT Enzyme Assay
  presence: Reduced or absent in classic galactosemia
  notes: >
    Erythrocyte GALT activity measurement remains the core enzymatic diagnostic
    assay and helps distinguish classic from variant forms.
  evidence:
  - reference: PMID:16838075
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "The gold standard for diagnosis of classical galactosaemia is measurement of GALT activity in erythrocytes."
    explanation: This review directly identifies erythrocyte GALT activity measurement as the diagnostic gold standard.
- name: Erythrocyte Galactose-1-phosphate Measurement
  presence: Elevated in classic galactosemia
  notes: >
    Measurement of erythrocyte galactose-1-phosphate is part of the standard
    diagnostic confirmation strategy.
  evidence:
  - reference: PMID:20301691
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "The diagnosis of classic galactosemia and clinical variant galactosemia is established by detection of elevated erythrocyte galactose-1-phosphate concentration, reduced erythrocyte galactose-1-phosphate uridylyltransferase (GALT) enzyme activity, and/or biallelic pathogenic variants in GALT."
    explanation: This directly supports elevated erythrocyte Gal-1-P as a standard confirmatory diagnostic finding.
- name: Molecular Genetic Testing
  notes: >
    Sequencing of GALT, and when indicated GALK1 or GALE, supports confirmation
    of the specific molecular subtype of galactosemia.
  evidence:
  - reference: PMID:20301691
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "The diagnosis of classic galactosemia and clinical variant galactosemia is established by detection of elevated erythrocyte galactose-1-phosphate concentration, reduced erythrocyte galactose-1-phosphate uridylyltransferase (GALT) enzyme activity, and/or biallelic pathogenic variants in GALT."
    explanation: GeneReviews includes biallelic pathogenic variants in GALT among the diagnostic criteria for classic galactosemia.
  - reference: PMID:38778342
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Applications of whole-exome sequencing to detect the two variants can improve the detection and early diagnosis of classical galactosemia"
    explanation: This case report and review supports molecular sequencing as a tool that improves early diagnosis of classic galactosemia.
genetic:
- name: GALT variants (Classic galactosemia)
  gene_term:
    preferred_term: GALT
    term:
      id: hgnc:4135
      label: GALT
  inheritance:
  - name: Autosomal recessive
    inheritance_term:
      preferred_term: Autosomal recessive inheritance
      term:
        id: HP:0000007
        label: Autosomal recessive inheritance
    evidence:
    - reference: PMID:32748411
      supports: SUPPORT
      evidence_source: HUMAN_CLINICAL
      snippet: "Via genome sequencing followed by Sanger confirmation we showed that all affected individuals were homozygous for a deep intronic GALT variant, c.1059+390A>G, which segregated as an autosomal recessive trait in all families."
      explanation: Family-based segregation data directly support autosomal recessive inheritance for GALT-related galactosemia.
  features: >
    Classic galactosemia is caused by biallelic pathogenic variants in
    GALT (9p13.3). The most common variants include Q188R (most common
    in European populations), K285N, S135L, and L195P. The Duarte variant
    (N314D) causes partial enzyme deficiency.
  evidence:
  - reference: PMID:11113841
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "The most prevalent mutation, Q188R, had a significant effect of genotype category (Q188R/Q188R, Q188R/Other, Other/Other) on POF"
    explanation: Clinical study demonstrating that Q188R is the most prevalent GALT mutation and has significant phenotypic effects.
