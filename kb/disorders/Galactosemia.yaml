name: Galactosemia
creation_date: '2026-02-06T03:39:54Z'
updated_date: '2026-03-31T18:05:00Z'
category: Genetic
synonyms:
- Galactose intolerance
description: >
  Galactosemia is an inborn error of galactose metabolism caused by deficiency
  of one of three enzymes in the Leloir pathway: galactose-1-phosphate
  uridyltransferase (GALT, classic galactosemia), galactokinase (GALK), or
  UDP-galactose-4-epimerase (GALE). Classic galactosemia (GALT deficiency) is
  the most severe form, presenting in neonates with feeding difficulties,
  failure to thrive, hepatomegaly, jaundice, and increased susceptibility to
  E. coli sepsis. Early dietary restriction of galactose prevents acute
  toxicity but long-term complications including cognitive impairment,
  speech disorders, and premature ovarian insufficiency may still occur.
disease_term:
  preferred_term: galactosemia
  term:
    id: MONDO:0018116
    label: galactosemia
parents:
- Inborn error of carbohydrate metabolism
- Newborn screening disorder
has_subtypes:
- name: Classic Galactosemia (GALT deficiency)
  subtype_term:
    preferred_term: classic galactosemia
    term:
      id: MONDO:0009258
      label: classic galactosemia
  description: >
    Most common and severe form caused by GALT deficiency. Presents in
    neonates with life-threatening illness if untreated.
  evidence:
  - reference: PMID:31774565
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Classic Galactosaemia is a genetic disorder, characterised by galactose intolerance in newborns. It occurs due to recessive mutations in the galactose-1-phosphate uridylyltransferase (GALT) gene."
    explanation: Study defining classic galactosemia as caused by GALT gene mutations.
- name: Galactokinase Deficiency
  description: >
    Milder form caused by GALK1 deficiency. Primary manifestation is
    cataracts without the systemic toxicity of classic galactosemia.
  evidence:
  - reference: PMID:3043741
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Galactosemia is a disorder caused by a deficiency of any one of three possible enzymes involved in the metabolism of galactose: galactokinase, transferase or epimerase. Any single deficient enzyme can result in cataract through the accumulation of galactitol in the lens."
    explanation: Review article documenting galactokinase deficiency as a form of galactosemia primarily causing cataracts.
- name: Epimerase Deficiency
  description: >
    Caused by GALE deficiency. Phenotype ranges from benign peripheral
    form to severe generalized form resembling classic galactosemia.
  evidence:
  - reference: PMID:3043741
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Galactosemia is a disorder caused by a deficiency of any one of three possible enzymes involved in the metabolism of galactose: galactokinase, transferase or epimerase."
    explanation: Review article documenting epimerase deficiency as a form of galactosemia.
prevalence:
- population: Newborn screening literature, predominantly classic galactosemia
  percentage: 1 in 30,000 to 1 in 100,000
  notes: >-
    PubMed review literature generally reports galactosemia as a rare newborn
    screening disorder with incidence around 1 in 30,000 to 1 in 100,000;
    these estimates primarily reflect classic galactosemia.
  evidence:
  - reference: PMID:31213878
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Many countries include neonatal screening for galactosemia in their
      national newborn screening program; however, others do not, as the
      condition is rather rare, with an incidence of 1:30,000-1:100,000, and
      screening may be seen as not cost-effective and logistically demanding.
    explanation: >-
      This review gives the broad incidence range most commonly cited for
      galactosemia in newborn screening contexts.
- population: United States newborn screening programs for classic galactosemia
  percentage: approximately 1 in 50,000 newborns
  notes: >-
    Surveyed U.S. programs reported identifying classic galactosemia in close
    to 1 in 50,000 newborns.
  evidence:
  - reference: PMID:24718839
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      On some matters the programs agreed: for example, those providing
      relevant data all identify classic galactosemia in close to 1/50,000
      newborns and recommend immediate and lifelong dietary restriction of
      galactose for those infants.
    explanation: >-
      This U.S. newborn-screening survey provides a concrete contemporary
      incidence estimate for classic galactosemia.
progression:
- phase: Untreated neonatal metabolic decompensation
  notes: >
    In untreated classic galactosemia, symptoms begin in the neonatal period
    after milk feeding and can rapidly progress to hepatic dysfunction, feeding
    intolerance, bleeding, sepsis, and death.
  evidence:
  - reference: PMID:20301691
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Classic galactosemia, which can result in life-threatening complications including feeding problems, failure to thrive, hepatocellular damage, bleeding, and E coli sepsis in untreated infants."
    explanation: GeneReviews describes the acute untreated neonatal phase as a life-threatening metabolic decompensation with hepatic, feeding, and infectious complications.
- phase: Rapid improvement after lactose restriction
  notes: >
    Acute neonatal manifestations usually improve quickly once lactose and
    galactose exposure are removed early in life.
  evidence:
  - reference: PMID:20301691
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "If a lactose-restricted diet is provided during the first ten days of life, the neonatal signs usually quickly resolve and the complications of liver failure, sepsis, and neonatal death are prevented"
    explanation: This directly supports a treatment-responsive early disease phase when dietary restriction is instituted promptly.
- phase: Persistent long-term neurologic and gonadal complications
  notes: >
    Even with early dietary treatment, many patients later develop chronic
    neurodevelopmental, speech, motor, and ovarian complications.
  evidence:
  - reference: PMID:29409891
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Although implementation of lactose restricted diet is efficient in resolving the acute complications, it is not sufficient to prevent long-term complications affecting the brain and female gonads, the two main target organs of damage."
    explanation: This review directly supports the transition from acute neonatal disease to persistent long-term neurologic and reproductive morbidity despite diet.
pathophysiology:
- name: GALT Deficiency in the Leloir Pathway
  description: >
    In classic galactosemia, deficient galactose-1-phosphate
    uridylyltransferase activity disrupts the core uridylyltransferase step of
    galactose metabolism.
  downstream:
  - target: Galactose-1-phosphate accumulation
    description: Loss of GALT activity causes intracellular accumulation of galactose-1-phosphate.
    causal_link_type: DIRECT
    evidence:
    - reference: PMID:31774565
      supports: SUPPORT
      evidence_source: IN_VITRO
      snippet: "One of the main alterations caused by GALT deficiency is the accumulation of galactose 1-phosphate (Gal-1P) in cells."
      explanation: This directly links GALT deficiency to intracellular Gal-1-P accumulation.
  - target: UDP-hexose depletion
    description: GALT deficiency also contributes to depletion of intracellular UDP-hexose pools.
    causal_link_type: DIRECT
    evidence:
    - reference: PMID:12626383
      supports: SUPPORT
      evidence_source: IN_VITRO
      snippet: "GALT deficiency causes UDP-hexose deficit in human galactosemic cells."
      explanation: This cell study directly ties GALT deficiency to a UDP-hexose deficit.
  evidence:
  - reference: PMID:33525536
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Type I (classic) galactosemia, galactose 1-phosphate uridylyltransferase (GALT)-deficiency is a hereditary disorder of galactose metabolism."
    explanation: This review identifies classic galactosemia as a disorder defined by GALT deficiency in galactose metabolism.
- name: Galactose-1-phosphate accumulation
  description: >
    Galactose-1-phosphate accumulates to high intracellular levels in classic
    galactosemia and is an important contributor to downstream metabolic
    toxicity, but not the sole pathogenic factor.
  downstream:
  - target: Endoplasmic Reticulum Stress and Altered Signaling
    description: Accumulated galactose metabolites contribute to downstream ER stress and signaling perturbation.
    causal_link_type: INDIRECT_UNKNOWN_INTERMEDIATES
    evidence:
    - reference: PMID:31808946
      supports: PARTIAL
      evidence_source: OTHER
      snippet: "Results revealed that Gal-1-P is not the sole pathophysiological agent responsible for the phenotype observed in galactosemia."
      explanation: This review indicates that Gal-1-P contributes to pathogenesis but acts within a broader downstream network that includes ER stress and altered signaling.
  evidence:
  - reference: PMID:31774565
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: "One of the main alterations caused by GALT deficiency is the accumulation of galactose 1-phosphate (Gal-1P) in cells."
    explanation: This directly supports Gal-1-P accumulation as a core biochemical abnormality in classic galactosemia.
  - reference: PMID:31808946
    supports: SUPPORT
    evidence_source: OTHER
    snippet: "Results revealed that Gal-1-P is not the sole pathophysiological agent responsible for the phenotype observed in galactosemia."
    explanation: This systematic review clarifies that Gal-1-P accumulation is central but insufficient on its own to explain the full phenotype.
- name: UDP-hexose depletion
  description: >
    GALT deficiency and Gal-1-P accumulation reduce intracellular UDP-hexose
    pools, especially UDP-galactose and related sugar donors.
  downstream:
  - target: Impaired Glycosylation
    description: Depleted UDP-hexose pools impair downstream glycoprotein galactosylation.
    causal_link_type: DIRECT
    evidence:
    - reference: PMID:12626383
      supports: SUPPORT
      evidence_source: IN_VITRO
      snippet: "Reduced Sambucus nigra agglutinin binding to glycoproteins isolated from cells with increased Gal-1-P is consistent with the resultant inhibition of glycoprotein glycosylation."
      explanation: This directly supports impaired glycosylation downstream of disturbed nucleotide-sugar metabolism.
  evidence:
  - reference: PMID:12626383
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: "intracellular concentrations of Gal-1-P found in classic galactosemia inhibit UDP-hexose pyrophosphorylases and reduce the intracellular concentrations of UDP-hexoses"
    explanation: This study directly supports depletion of intracellular UDP-hexose pools in galactosemic cells.
- name: Impaired Glycosylation
  description: >
    Abnormal glycosylation is a downstream consequence of disturbed UDP-hexose
    homeostasis and is thought to contribute to persistent neurologic and
    ovarian complications.
  downstream:
  - target: Intellectual disability
    description: Abnormal galactosylation is one proposed contributor to chronic cognitive impairment.
    causal_link_type: INDIRECT_UNKNOWN_INTERMEDIATES
    evidence:
    - reference: PMID:16838075
      supports: PARTIAL
      evidence_source: HUMAN_CLINICAL
      snippet: "It has been suggested that these complications may result from endogenous galactose synthesis or from abnormal galactosylation."
      explanation: This review partially supports abnormal galactosylation as one mechanism underlying long-term cognitive complications.
  - target: Speech disorders
    description: Disordered galactosylation is one proposed contributor to persistent speech impairment.
    causal_link_type: INDIRECT_UNKNOWN_INTERMEDIATES
    evidence:
    - reference: PMID:16838075
      supports: PARTIAL
      evidence_source: HUMAN_CLINICAL
      snippet: "It has been suggested that these complications may result from endogenous galactose synthesis or from abnormal galactosylation."
      explanation: This partially supports abnormal galactosylation as a mechanism contributing to verbal dyspraxia and other speech problems.
  - target: Premature ovarian insufficiency
    description: Impaired glycosylation is one proposed contributor to ovarian dysfunction in classic galactosemia.
    causal_link_type: INDIRECT_UNKNOWN_INTERMEDIATES
    evidence:
    - reference: PMID:16838075
      supports: PARTIAL
      evidence_source: HUMAN_CLINICAL
      snippet: "It has been suggested that these complications may result from endogenous galactose synthesis or from abnormal galactosylation."
      explanation: This partially supports abnormal galactosylation as one mechanism underlying hypergonadotrophic hypogonadism and ovarian insufficiency.
  evidence:
  - reference: PMID:7671968
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "There is circumstantial evidence that defective galactosylation of complex glycoconjugates exists in tissues from galactosemic patients."
    explanation: This review supports defective galactosylation in patient tissues.
  - reference: PMID:31808946
    supports: SUPPORT
    evidence_source: OTHER
    snippet: "Other currently described contributing factors include accumulation of galactose metabolites, uridine diphosphate (UDP)-hexose alterations and subsequent impaired glycosylation"
    explanation: This systematic review explicitly places impaired glycosylation downstream of UDP-hexose alterations.
- name: Galactitol accumulation
  description: >
    Excess galactose can be reduced to galactitol, which accumulates in the lens
    and causes osmotic injury. This is the dominant mechanism in galactokinase
    deficiency and also contributes to cataract risk in galactosemia more
    broadly.
  downstream:
  - target: Cataracts
    description: Lens galactitol accumulation drives cataract formation.
    causal_link_type: DIRECT
    evidence:
    - reference: PMID:3043741
      supports: SUPPORT
      evidence_source: HUMAN_CLINICAL
      snippet: "Any single deficient enzyme can result in cataract through the accumulation of galactitol in the lens."
      explanation: This directly links galactitol accumulation in the lens to cataract formation.
  evidence:
  - reference: PMID:3043741
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Any single deficient enzyme can result in cataract through the accumulation of galactitol in the lens."
    explanation: This review directly identifies galactitol accumulation as the mechanism of cataract formation.
- name: Endoplasmic Reticulum Stress and Altered Signaling
  description: >
    ER stress, altered signaling pathways, and oxidative stress are additional
    downstream mechanisms implicated in galactosemia beyond Gal-1-P
    accumulation alone.
  evidence:
  - reference: PMID:31808946
    supports: SUPPORT
    evidence_source: OTHER
    snippet: "Other currently described contributing factors include accumulation of galactose metabolites, uridine diphosphate (UDP)-hexose alterations and subsequent impaired glycosylation, endoplasmic reticulum (ER) stress, altered signalling pathways, and oxidative stress."
    explanation: This systematic review identifies ER stress, altered signaling, and oxidative stress as additional mechanistic contributors in galactosemia.
- name: Acute Hepatocellular Dysfunction
  description: >
    Untreated neonatal classic galactosemia produces acute hepatocellular injury
    with liver dysfunction, feeding intolerance, and systemic illness.
  downstream:
  - target: Neonatal jaundice
    description: Acute hepatocellular dysfunction contributes to neonatal jaundice.
    causal_link_type: DIRECT
    evidence:
    - reference: PMID:16838075
      supports: SUPPORT
      evidence_source: HUMAN_CLINICAL
      snippet: "Most patients present in the neonatal period, after ingestion of galactose, with jaundice, hepatosplenomegaly, hepatocellular insufficiency, food intolerance, hypoglycaemia, renal tubular dysfunction, muscle hypotonia, sepsis and cataract."
      explanation: This review directly supports neonatal jaundice as a consequence of acute hepatic dysfunction in classical galactosemia.
  - target: Hepatomegaly
    description: Acute liver injury contributes to hepatomegaly in untreated neonates.
    causal_link_type: DIRECT
    evidence:
    - reference: PMID:16838075
      supports: SUPPORT
      evidence_source: HUMAN_CLINICAL
      snippet: "Most patients present in the neonatal period, after ingestion of galactose, with jaundice, hepatosplenomegaly, hepatocellular insufficiency, food intolerance, hypoglycaemia, renal tubular dysfunction, muscle hypotonia, sepsis and cataract."
      explanation: This supports hepatosplenomegaly, including liver enlargement, as part of acute neonatal hepatic involvement.
  - target: Failure to thrive
    description: Acute metabolic and hepatic dysfunction contributes to poor early feeding and growth.
    causal_link_type: DIRECT
    evidence:
    - reference: PMID:20301691
      supports: SUPPORT
      evidence_source: HUMAN_CLINICAL
      snippet: "Classic galactosemia, which can result in life-threatening complications including feeding problems, failure to thrive, hepatocellular damage, bleeding, and E coli sepsis in untreated infants."
      explanation: This directly supports failure to thrive as a downstream consequence of the acute neonatal metabolic-hepatic syndrome.
  evidence:
  - reference: PMID:20301691
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Classic galactosemia, which can result in life-threatening complications including feeding problems, failure to thrive, hepatocellular damage, bleeding, and E coli sepsis in untreated infants."
    explanation: This GeneReviews summary directly supports acute hepatocellular damage as a key part of untreated neonatal classic galactosemia.
phenotypes:
- name: Neonatal jaundice
  frequency: FREQUENT
  phenotype_term:
    preferred_term: Neonatal jaundice
    term:
      id: HP:0006579
      label: Prolonged neonatal jaundice
  description: >
    Conjugated hyperbilirubinemia appearing in the first week of life
    due to hepatocellular dysfunction.
  evidence:
  - reference: PMID:1561928
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Galactosemia in newborns and infants is associated with the following symptoms: jaundice, hepatomegaly, failure to thrive, feeding difficulties, hypoglycemia, convulsions, lethargy, amino-aciduria, cataracts, hepatic cirrhosis, ascites, and mental retardation."
    explanation: Clinical review documenting jaundice as a key symptom in galactosemic infants.
- name: Hepatomegaly
  frequency: FREQUENT
  phenotype_term:
    preferred_term: Hepatomegaly
    term:
      id: HP:0002240
      label: Hepatomegaly
  description: >
    Enlarged liver from hepatocellular damage and fatty infiltration.
  evidence:
  - reference: PMID:1561928
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Galactosemia in newborns and infants is associated with the following symptoms: jaundice, hepatomegaly, failure to thrive, feeding difficulties, hypoglycemia, convulsions, lethargy, amino-aciduria, cataracts, hepatic cirrhosis, ascites, and mental retardation."
    explanation: Clinical review documenting hepatomegaly as a key symptom in galactosemic infants.
- name: Failure to thrive
  frequency: FREQUENT
  phenotype_term:
    preferred_term: Failure to thrive
    term:
      id: HP:0001508
      label: Failure to thrive
  description: >
    Poor weight gain and growth failure in affected neonates.
  evidence:
  - reference: PMID:1561928
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Galactosemia in newborns and infants is associated with the following symptoms: jaundice, hepatomegaly, failure to thrive, feeding difficulties, hypoglycemia, convulsions, lethargy, amino-aciduria, cataracts, hepatic cirrhosis, ascites, and mental retardation."
    explanation: Clinical review documenting failure to thrive as a key symptom in galactosemic infants.
- name: Cataracts
  frequency: FREQUENT
  phenotype_term:
    preferred_term: Cataracts
    term:
      id: HP:0000518
      label: Cataract
  description: >
    Oil-droplet cataracts from galactitol accumulation in the lens.
    May be present at birth or develop in first weeks of life.
  evidence:
  - reference: PMID:3043741
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Any single deficient enzyme can result in cataract through the accumulation of galactitol in the lens."
    explanation: Review article confirming that galactitol accumulation in the lens causes cataract formation in all forms of galactosemia.
- name: E. coli sepsis
  frequency: OCCASIONAL
  phenotype_term:
    preferred_term: Neonatal E. coli sepsis
    term:
      id: HP:0040187
      label: Neonatal sepsis
  description: >
    Increased susceptibility to gram-negative sepsis, particularly
    E. coli, in the neonatal period. Mechanism involves impaired
    neutrophil function and complement activation.
  evidence:
  - reference: PMID:1561928
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "If the preliminary evaluation indicates galactosemia, there is high risk for E. coli sepsis and death."
    explanation: Clinical review emphasizing the high risk of E. coli sepsis in infants with galactosemia.
- name: Intellectual disability
  frequency: OCCASIONAL
  phenotype_term:
    preferred_term: Intellectual disability
    term:
      id: HP:0001249
      label: Intellectual disability
  description: >
    Cognitive impairment may occur despite early dietary treatment,
    likely due to endogenous galactose production and UDP-galactose
    deficiency affecting brain development.
  evidence:
  - reference: PMID:1561928
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Galactosemia in newborns and infants is associated with the following symptoms: jaundice, hepatomegaly, failure to thrive, feeding difficulties, hypoglycemia, convulsions, lethargy, amino-aciduria, cataracts, hepatic cirrhosis, ascites, and mental retardation."
    explanation: Clinical review documenting mental retardation (intellectual disability) as a symptom in galactosemia.
- name: Speech disorders
  frequency: FREQUENT
  phenotype_term:
    preferred_term: Speech disorder
    term:
      id: HP:0000750
      label: Delayed speech and language development
  description: >
    Verbal dyspraxia and speech delays are common long-term complications
    even with early treatment.
  evidence:
  - reference: PMID:21347587
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Impairment of speech affects a significant number of patients with galactosemia, appears in early childhood, and persists into adulthood."
    explanation: Cross-sectional human cohort data directly support speech impairment as a common long-term phenotype in classic galactosemia.
- name: Premature ovarian insufficiency
  frequency: FREQUENT
  phenotype_term:
    preferred_term: Premature ovarian insufficiency
    term:
      id: HP:0008209
      label: Premature ovarian insufficiency
  description: >
    Over 80% of females with classic galactosemia develop hypergonadotropic
    hypogonadism with primary or secondary amenorrhea.
  evidence:
  - reference: PMID:20978943
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Primary or premature ovarian insufficiency (POI) is the most common long-term complication experienced by girls and women with classic galactosemia; more than 80% and perhaps more than 90% are affected despite neonatal diagnosis and careful lifelong dietary restriction of galactose."
    explanation: Review documenting that POI affects more than 80-90% of females with classic galactosemia despite dietary treatment.
- name: Tremor
  frequency: OCCASIONAL
  phenotype_term:
    preferred_term: Tremor
    term:
      id: HP:0001337
      label: Tremor
  description: >
    Movement disorders including tremor and ataxia may develop as
    long-term neurological complications.
  evidence:
  - reference: PMID:23400815
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Thirty-one patients showed evidence of motor dysfunction including: tremor (23 patients), dystonia (23 patients), cerebellar signs (6 patients), and pyramidal signs (4 patients)."
    explanation: This adult classical galactosemia cohort directly documents tremor as a frequent component of the motor phenotype.
biochemical:
- name: Erythrocyte galactose-1-phosphate
  presence: INCREASED
  frequency: VERY_FREQUENT
  context: >
    Elevated erythrocyte galactose-1-phosphate is a core biochemical marker of
    classic galactosemia; in classic disease it is typically above 10 mg/dL.
  evidence:
  - reference: PMID:20301691
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "In classic galactosemia, erythrocyte galactose-1-phosphate is usually >10 mg/dL and erythrocyte GALT enzyme activity is absent or barely detectable."
    explanation: GeneReviews identifies elevated erythrocyte Gal-1-P as a defining biochemical abnormality in classic galactosemia.
- name: Erythrocyte GALT enzyme activity
  presence: DECREASED_OR_ABSENT
  frequency: VERY_FREQUENT
  context: >
    Erythrocyte GALT activity is absent or barely detectable in classic
    galactosemia and remains the key enzyme marker used in diagnosis.
  evidence:
  - reference: PMID:20301691
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "In classic galactosemia, erythrocyte galactose-1-phosphate is usually >10 mg/dL and erythrocyte GALT enzyme activity is absent or barely detectable."
    explanation: This directly supports markedly reduced or absent erythrocyte GALT activity as a core biochemical finding.
  - reference: PMID:16838075
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "The gold standard for diagnosis of classical galactosaemia is measurement of GALT activity in erythrocytes."
    explanation: This review confirms erythrocyte GALT activity as the principal biochemical assay for classical galactosemia.
- name: Urinary galactitol
  presence: INCREASED
  frequency: FREQUENT
  context: >
    Urinary galactitol reflects diversion of excess galactose into the aldose
    reductase pathway and can support biochemical diagnosis and monitoring.
  evidence:
  - reference: PMID:16838075
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Gas-chromatographic determination of urinary sugars and sugar alcohols demonstrates elevated concentrations of galactose and galactitol."
    explanation: This directly supports urinary galactitol elevation as a biochemical marker in classical galactosemia.
diagnosis:
- name: Newborn Screening
  notes: >
    Newborn screening detects most infants with classic galactosemia and enables
    early dietary treatment before severe neonatal injury develops.
  evidence:
  - reference: PMID:20301691
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Virtually 100% of infants with classic galactosemia or clinical variant galactosemia can be detected in newborn screening programs that include testing for galactosemia in their panel."
    explanation: This directly supports newborn screening as a highly effective case-finding approach for classic galactosemia.
- name: Erythrocyte GALT Enzyme Assay
  presence: Reduced or absent in classic galactosemia
  notes: >
    Erythrocyte GALT activity measurement remains the core enzymatic diagnostic
    assay and helps distinguish classic from variant forms.
  evidence:
  - reference: PMID:16838075
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "The gold standard for diagnosis of classical galactosaemia is measurement of GALT activity in erythrocytes."
    explanation: This review directly identifies erythrocyte GALT activity measurement as the diagnostic gold standard.
- name: Erythrocyte Galactose-1-phosphate Measurement
  presence: Elevated in classic galactosemia
  notes: >
    Measurement of erythrocyte galactose-1-phosphate is part of the standard
    diagnostic confirmation strategy.
  evidence:
  - reference: PMID:20301691
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "The diagnosis of classic galactosemia and clinical variant galactosemia is established by detection of elevated erythrocyte galactose-1-phosphate concentration, reduced erythrocyte galactose-1-phosphate uridylyltransferase (GALT) enzyme activity, and/or biallelic pathogenic variants in GALT."
    explanation: This directly supports elevated erythrocyte Gal-1-P as a standard confirmatory diagnostic finding.
- name: Molecular Genetic Testing
  notes: >
    Sequencing of GALT, and when indicated GALK1 or GALE, supports confirmation
    of the specific molecular subtype of galactosemia.
  evidence:
  - reference: PMID:20301691
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "The diagnosis of classic galactosemia and clinical variant galactosemia is established by detection of elevated erythrocyte galactose-1-phosphate concentration, reduced erythrocyte galactose-1-phosphate uridylyltransferase (GALT) enzyme activity, and/or biallelic pathogenic variants in GALT."
    explanation: GeneReviews includes biallelic pathogenic variants in GALT among the diagnostic criteria for classic galactosemia.
  - reference: PMID:38778342
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Applications of whole-exome sequencing to detect the two variants can improve the detection and early diagnosis of classical galactosemia"
    explanation: This case report and review supports molecular sequencing as a tool that improves early diagnosis of classic galactosemia.
