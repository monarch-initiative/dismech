treatments:
- name: Galactose-restricted diet
  description: >
    Lifelong dietary restriction of galactose is the cornerstone of
    treatment. Lactose-containing foods (milk, dairy) are eliminated
    and replaced with soy-based or elemental formulas in infancy.
  treatment_term:
    preferred_term: Galactose-restricted diet
    term:
      id: MAXO:0000088
      label: dietary intervention
  evidence:
  - reference: PMID:20978943
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "more than 80% and perhaps more than 90% are affected despite neonatal diagnosis and careful lifelong dietary restriction of galactose"
    explanation: Review confirming that dietary restriction of galactose is the standard treatment, though long-term complications persist.
- name: Calcium and vitamin D supplementation
  description: >
    Supplementation is necessary due to dairy restriction to prevent
    osteoporosis.
  evidence:
  - reference: PMID:16782422
    supports: PARTIAL
    evidence_source: HUMAN_CLINICAL
    snippet: "Supplementation of calcium, vitamins K(1) and D(3) given in this dose (750 mg, 1.0 mg and 10.0 mug respectively) is likely to have a role in the treatment of BMC abnormalities in galactosemia."
    explanation: This randomized clinical trial supports calcium and vitamin D supplementation as part of bone-health management in galactosemia, although the studied regimen also included vitamin K1.
- name: Hormone replacement therapy
  description: >
    Estrogen and progesterone replacement for females with premature
    ovarian insufficiency.
  evidence:
  - reference: PMID:35118398
    supports: PARTIAL
    evidence_source: HUMAN_CLINICAL
    snippet: "This means that in addition to the consequences of the disease, these women also face infertility and the potential need for hormone replacement therapy."
    explanation: This POI management review supports hormone replacement therapy as a recognized part of care for girls and women with classic galactosemia-associated ovarian insufficiency.
- name: Speech therapy
  description: >
    Early intervention for speech and language delays.
  treatment_term:
    preferred_term: Speech therapy
    term:
      id: MAXO:0000930
      label: speech therapy
  evidence:
  - reference: PMID:34665663
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "The BBC appears to be a viable intervention to support the speech and expressive language development of children with GC."
    explanation: This intervention study provides direct human evidence that targeted speech-language therapy can support speech and language development in children with classic galactosemia.
