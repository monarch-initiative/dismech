name: Galactosemia
creation_date: '2026-02-06T03:39:54Z'
updated_date: '2026-03-04T23:45:00Z'
category: Genetic
synonyms:
- Galactose intolerance
description: >
  Galactosemia is an inborn error of galactose metabolism caused by deficiency
  of one of three enzymes in the Leloir pathway: galactose-1-phosphate
  uridyltransferase (GALT, classic galactosemia), galactokinase (GALK), or
  UDP-galactose-4-epimerase (GALE). Classic galactosemia (GALT deficiency) is
  the most severe form, presenting in neonates with feeding difficulties,
  failure to thrive, hepatomegaly, jaundice, and increased susceptibility to
  E. coli sepsis. Early dietary restriction of galactose prevents acute
  toxicity but long-term complications including cognitive impairment,
  speech disorders, and premature ovarian insufficiency may still occur.
disease_term:
  preferred_term: galactosemia
  term:
    id: MONDO:0018116
    label: galactosemia
parents:
- Inborn error of carbohydrate metabolism
- Newborn screening disorder
has_subtypes:
- name: Classic Galactosemia (GALT deficiency)
  subtype_term:
    preferred_term: classic galactosemia
    term:
      id: MONDO:0009258
      label: classic galactosemia
  description: >
    Most common and severe form caused by GALT deficiency. Presents in
    neonates with life-threatening illness if untreated.
  evidence:
  - reference: PMID:31774565
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Classic Galactosaemia is a genetic disorder, characterised by galactose intolerance in newborns. It occurs due to recessive mutations in the galactose-1-phosphate uridylyltransferase (GALT) gene."
    explanation: Study defining classic galactosemia as caused by GALT gene mutations.
- name: Galactokinase Deficiency
  description: >
    Milder form caused by GALK1 deficiency. Primary manifestation is
    cataracts without the systemic toxicity of classic galactosemia.
  evidence:
  - reference: PMID:3043741
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Galactosemia is a disorder caused by a deficiency of any one of three possible enzymes involved in the metabolism of galactose: galactokinase, transferase or epimerase. Any single deficient enzyme can result in cataract through the accumulation of galactitol in the lens."
    explanation: Review article documenting galactokinase deficiency as a form of galactosemia primarily causing cataracts.
- name: Epimerase Deficiency
  description: >
    Caused by GALE deficiency. Phenotype ranges from benign peripheral
    form to severe generalized form resembling classic galactosemia.
  evidence:
  - reference: PMID:3043741
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Galactosemia is a disorder caused by a deficiency of any one of three possible enzymes involved in the metabolism of galactose: galactokinase, transferase or epimerase."
    explanation: Review article documenting epimerase deficiency as a form of galactosemia.
prevalence:
- population: Newborn screening literature, predominantly classic galactosemia
  percentage: 1 in 30,000 to 1 in 100,000
  notes: >-
    PubMed review literature generally reports galactosemia as a rare newborn
    screening disorder with incidence around 1 in 30,000 to 1 in 100,000;
    these estimates primarily reflect classic galactosemia.
  evidence:
  - reference: PMID:31213878
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Many countries include neonatal screening for galactosemia in their
      national newborn screening program; however, others do not, as the
      condition is rather rare, with an incidence of 1:30,000-1:100,000, and
      screening may be seen as not cost-effective and logistically demanding.
    explanation: >-
      This review gives the broad incidence range most commonly cited for
      galactosemia in newborn screening contexts.
- population: United States newborn screening programs for classic galactosemia
  percentage: approximately 1 in 50,000 newborns
  notes: >-
    Surveyed U.S. programs reported identifying classic galactosemia in close
    to 1 in 50,000 newborns.
  evidence:
  - reference: PMID:24718839
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      On some matters the programs agreed: for example, those providing
      relevant data all identify classic galactosemia in close to 1/50,000
      newborns and recommend immediate and lifelong dietary restriction of
      galactose for those infants.
    explanation: >-
      This U.S. newborn-screening survey provides a concrete contemporary
      incidence estimate for classic galactosemia.
pathophysiology:
- name: Galactose-1-phosphate accumulation
  description: >
    In classic galactosemia, GALT deficiency prevents conversion of
    galactose-1-phosphate (Gal-1-P) to UDP-galactose. Accumulated Gal-1-P
    is directly toxic to liver, brain, kidneys, and ovaries through
    multiple mechanisms including inhibition of phosphoglucomutase and
    depletion of inorganic phosphate.
  evidence:
  - reference: PMID:31774565
    supports: SUPPORT
    evidence_source: OTHER
    snippet: "One of the main alterations caused by GALT deficiency is the accumulation of galactose 1-phosphate (Gal-1P) in cells."
    explanation: Cell-based study demonstrating that Gal-1-P accumulation is a central feature of GALT deficiency.
  - reference: PMID:12626383
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: "intracellular concentrations of Gal-1-P found in classic galactosemia inhibit UDP-hexose pyrophosphorylases and reduce the intracellular concentrations of UDP-hexoses"
    explanation: Study demonstrating that accumulated Gal-1-P inhibits key metabolic enzymes in galactosemic cells.
- name: UDP-galactose deficiency
  description: >
    Reduced UDP-galactose impairs galactosylation of glycoproteins and
    glycolipids. Abnormal glycosylation affects brain development,
    folliculogenesis, and multiple cellular processes. This deficiency
    persists despite dietary treatment, contributing to long-term
    complications.
  evidence:
  - reference: PMID:7671968
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "There is circumstantial evidence that defective galactosylation of complex glycoconjugates exists in tissues from galactosemic patients."
    explanation: Review discussing evidence for defective glycosylation in galactosemia patients.
  - reference: PMID:12626383
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: "Reduced Sambucus nigra agglutinin binding to glycoproteins isolated from cells with increased Gal-1-P is consistent with the resultant inhibition of glycoprotein glycosylation."
    explanation: Direct evidence of impaired glycoprotein glycosylation in GALT-deficient cells.
- name: Galactitol toxicity
  description: >
    Galactose is reduced to galactitol by aldose reductase. Galactitol
    accumulates in the lens causing osmotic stress and cataracts. In
    galactokinase deficiency, this is the primary pathogenic mechanism.
  evidence:
  - reference: PMID:3043741
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Any single deficient enzyme can result in cataract through the accumulation of galactitol in the lens."
    explanation: Review confirming the role of galactitol accumulation in cataract formation in galactosemia.
phenotypes:
- name: Neonatal jaundice
  frequency: FREQUENT
  phenotype_term:
    preferred_term: Neonatal jaundice
    term:
      id: HP:0006579
      label: Prolonged neonatal jaundice
  description: >
    Conjugated hyperbilirubinemia appearing in the first week of life
    due to hepatocellular dysfunction.
  evidence:
  - reference: PMID:1561928
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Galactosemia in newborns and infants is associated with the following symptoms: jaundice, hepatomegaly, failure to thrive, feeding difficulties, hypoglycemia, convulsions, lethargy, amino-aciduria, cataracts, hepatic cirrhosis, ascites, and mental retardation."
    explanation: Clinical review documenting jaundice as a key symptom in galactosemic infants.
- name: Hepatomegaly
  frequency: FREQUENT
  phenotype_term:
    preferred_term: Hepatomegaly
    term:
      id: HP:0002240
      label: Hepatomegaly
  description: >
    Enlarged liver from hepatocellular damage and fatty infiltration.
  evidence:
  - reference: PMID:1561928
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Galactosemia in newborns and infants is associated with the following symptoms: jaundice, hepatomegaly, failure to thrive, feeding difficulties, hypoglycemia, convulsions, lethargy, amino-aciduria, cataracts, hepatic cirrhosis, ascites, and mental retardation."
    explanation: Clinical review documenting hepatomegaly as a key symptom in galactosemic infants.
- name: Failure to thrive
  frequency: FREQUENT
  phenotype_term:
    preferred_term: Failure to thrive
    term:
      id: HP:0001508
      label: Failure to thrive
  description: >
    Poor weight gain and growth failure in affected neonates.
  evidence:
  - reference: PMID:1561928
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Galactosemia in newborns and infants is associated with the following symptoms: jaundice, hepatomegaly, failure to thrive, feeding difficulties, hypoglycemia, convulsions, lethargy, amino-aciduria, cataracts, hepatic cirrhosis, ascites, and mental retardation."
    explanation: Clinical review documenting failure to thrive as a key symptom in galactosemic infants.
- name: Cataracts
  frequency: FREQUENT
  phenotype_term:
    preferred_term: Cataracts
    term:
      id: HP:0000518
      label: Cataract
  description: >
    Oil-droplet cataracts from galactitol accumulation in the lens.
    May be present at birth or develop in first weeks of life.
  evidence:
  - reference: PMID:3043741
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Any single deficient enzyme can result in cataract through the accumulation of galactitol in the lens."
    explanation: Review article confirming that galactitol accumulation in the lens causes cataract formation in all forms of galactosemia.
- name: E. coli sepsis
  frequency: OCCASIONAL
  phenotype_term:
    preferred_term: Neonatal E. coli sepsis
    term:
      id: HP:0040187
      label: Neonatal sepsis
  description: >
    Increased susceptibility to gram-negative sepsis, particularly
    E. coli, in the neonatal period. Mechanism involves impaired
    neutrophil function and complement activation.
  evidence:
  - reference: PMID:1561928
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "If the preliminary evaluation indicates galactosemia, there is high risk for E. coli sepsis and death."
    explanation: Clinical review emphasizing the high risk of E. coli sepsis in infants with galactosemia.
- name: Intellectual disability
  frequency: OCCASIONAL
  phenotype_term:
    preferred_term: Intellectual disability
    term:
      id: HP:0001249
      label: Intellectual disability
  description: >
    Cognitive impairment may occur despite early dietary treatment,
    likely due to endogenous galactose production and UDP-galactose
    deficiency affecting brain development.
  evidence:
  - reference: PMID:1561928
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Galactosemia in newborns and infants is associated with the following symptoms: jaundice, hepatomegaly, failure to thrive, feeding difficulties, hypoglycemia, convulsions, lethargy, amino-aciduria, cataracts, hepatic cirrhosis, ascites, and mental retardation."
    explanation: Clinical review documenting mental retardation (intellectual disability) as a symptom in galactosemia.
- name: Speech disorders
  frequency: FREQUENT
  phenotype_term:
    preferred_term: Speech disorder
    term:
      id: HP:0000750
      label: Delayed speech and language development
  description: >
    Verbal dyspraxia and speech delays are common long-term complications
    even with early treatment.
- name: Premature ovarian insufficiency
  frequency: FREQUENT
  phenotype_term:
    preferred_term: Premature ovarian insufficiency
    term:
      id: HP:0008209
      label: Premature ovarian insufficiency
  description: >
    Over 80% of females with classic galactosemia develop hypergonadotropic
    hypogonadism with primary or secondary amenorrhea.
  evidence:
  - reference: PMID:20978943
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Primary or premature ovarian insufficiency (POI) is the most common long-term complication experienced by girls and women with classic galactosemia; more than 80% and perhaps more than 90% are affected despite neonatal diagnosis and careful lifelong dietary restriction of galactose."
    explanation: Review documenting that POI affects more than 80-90% of females with classic galactosemia despite dietary treatment.
- name: Tremor
  frequency: OCCASIONAL
  phenotype_term:
    preferred_term: Tremor
    term:
      id: HP:0001337
      label: Tremor
  description: >
    Movement disorders including tremor and ataxia may develop as
    long-term neurological complications.
genetic:
- name: GALT variants (Classic galactosemia)
  inheritance:
  - name: Autosomal recessive
    inheritance_term:
      preferred_term: Autosomal recessive inheritance
      term:
        id: HP:0000007
        label: Autosomal recessive inheritance
  features: >
    Classic galactosemia is caused by biallelic pathogenic variants in
    GALT (9p13.3). The most common variants include Q188R (most common
    in European populations), K285N, S135L, and L195P. The Duarte variant
    (N314D) causes partial enzyme deficiency.
  evidence:
  - reference: PMID:11113841
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "The most prevalent mutation, Q188R, had a significant effect of genotype category (Q188R/Q188R, Q188R/Other, Other/Other) on POF"
    explanation: Clinical study demonstrating that Q188R is the most prevalent GALT mutation and has significant phenotypic effects.
- name: GALK1 variants (Galactokinase deficiency)
  inheritance:
  - name: Autosomal recessive
    inheritance_term:
      preferred_term: Autosomal recessive inheritance
      term:
        id: HP:0000007
        label: Autosomal recessive inheritance
  features: >
    Caused by biallelic pathogenic variants in GALK1 (17q25.1).
  evidence:
  - reference: PMID:3043741
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Galactosemia is a disorder caused by a deficiency of any one of three possible enzymes involved in the metabolism of galactose: galactokinase, transferase or epimerase."
    explanation: Review article documenting galactokinase as one of three enzyme deficiencies causing galactosemia.
- name: GALE variants (Epimerase deficiency)
  inheritance:
  - name: Autosomal recessive
    inheritance_term:
      preferred_term: Autosomal recessive inheritance
      term:
        id: HP:0000007
        label: Autosomal recessive inheritance
  features: >
    Caused by biallelic pathogenic variants in GALE (1p36.11).
  evidence:
  - reference: PMID:3043741
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "Galactosemia is a disorder caused by a deficiency of any one of three possible enzymes involved in the metabolism of galactose: galactokinase, transferase or epimerase."
    explanation: Review article documenting epimerase as one of three enzyme deficiencies causing galactosemia.
treatments:
- name: Galactose-restricted diet
  description: >
    Lifelong dietary restriction of galactose is the cornerstone of
    treatment. Lactose-containing foods (milk, dairy) are eliminated
    and replaced with soy-based or elemental formulas in infancy.
  treatment_term:
    preferred_term: Galactose-restricted diet
    term:
      id: MAXO:0000088
      label: dietary intervention
  evidence:
  - reference: PMID:20978943
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "more than 80% and perhaps more than 90% are affected despite neonatal diagnosis and careful lifelong dietary restriction of galactose"
    explanation: Review confirming that dietary restriction of galactose is the standard treatment, though long-term complications persist.
- name: Calcium and vitamin D supplementation
  description: >
    Supplementation is necessary due to dairy restriction to prevent
    osteoporosis.
- name: Hormone replacement therapy
  description: >
    Estrogen and progesterone replacement for females with premature
    ovarian insufficiency.
- name: Speech therapy
  description: >
    Early intervention for speech and language delays.
  treatment_term:
    preferred_term: Speech therapy
    term:
      id: MAXO:0000930
      label: speech therapy
