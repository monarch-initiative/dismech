name: Leukoencephalopathy With Vanishing White Matter
creation_date: "2026-06-17T00:00:00Z"
description: >
  Leukoencephalopathy with vanishing white matter (VWM), also known as
  childhood ataxia with central nervous system hypomyelination (CACH), is an
  autosomal recessive leukodystrophy caused by biallelic pathogenic variants in
  any of the five genes (EIF2B1-EIF2B5) encoding the subunits of eukaryotic
  translation initiation factor 2B (eIF2B). eIF2B is the guanine nucleotide
  exchange factor for eIF2 and a central regulator of the integrated stress
  response (ISR). Partial loss of eIF2B activity causes constitutive,
  deregulated activation of the ISR and renders the central nervous system
  white matter, and in particular astrocytes (with secondary oligodendrocyte
  dysfunction), abnormally vulnerable. Disease onset spans the antenatal period
  to senescence and predicts severity. The disease is characterized by
  progressive cerebellar ataxia and spasticity with episodic, often rapid,
  neurological deterioration provoked by febrile infections, minor head trauma,
  major surgery, or acute fright, and by MRI evidence of diffuse white matter
  rarefaction and cystic degeneration (cavitation) in which the white matter is
  progressively replaced by fluid.
category: Genetic
disease_term:
  preferred_term: leukoencephalopathy with vanishing white matter
  term:
    id: MONDO:0800448
    label: leukoencephalopathy with vanishing white matter
parents:
- Leukodystrophy
references:
