    explanation: >-
      GeneReviews lists stressors to avoid because they trigger acute
      neurological deterioration.
- name: ISR Modulation (eIF2B activity enhancement, investigational)
  description: >
    Experimental disease-modifying approaches target the deregulated integrated
    stress response. The eIF2B activator ISRIB normalized ISR mRNA markers and
    ameliorated neuropathology in VWM mice, and the FDA-approved alpha2-agonist
    guanabenz, which modulates eIF2 phosphorylation/eIF2B activity, improved
    Bergmann glia and cerebellar myelin pathology in VWM mice. These remain
    investigational and are not established human therapies.
  therapeutic_modality: SMALL_MOLECULE
  treatment_term:
    preferred_term: Pharmacotherapy
    term:
      id: NCIT:C15986
      label: Pharmacotherapy
    therapeutic_agent:
    - preferred_term: guanabenz
      term:
        id: CHEBI:5553
        label: Guanabenz
  evidence:
  - reference: PMID:31402619
    reference_title: "Vanishing white matter: deregulated integrated stress response as therapy target."
    supports: SUPPORT
    evidence_source: MODEL_ORGANISM
    snippet: >-
      The compound ISRIB (for "ISR inhibitor") was administered to VWM mice to
      increase eIF2B activity.
    explanation: >-
      ISRIB, an eIF2B activator, was tested in VWM mice as an ISR-modulating
      disease-modifying strategy.
  - reference: PMID:28953319
    reference_title: "Bergmann glia translocation: a new disease marker for vanishing white matter identifies therapeutic effects of Guanabenz treatment."
    supports: SUPPORT
    evidence_source: MODEL_ORGANISM
    snippet: >-
      Both Bergmann glia pathology and cerebellar myelin pathology improved
      with Guanabenz treatment in mice, showing that Bergmann glia
      translocation is a sensitive measurement for improvement.
    explanation: >-
      Guanabenz, which modulates eIF2B/eIF2 phosphorylation, improved
      neuropathology in VWM mice, supporting ISR modulation as a therapeutic
      target.
prevalence:
- population: Global
  prevalence_class: RARE
  percentage: Rare
  notes: >
    VWM is a rare leukodystrophy; precise incidence is not well established. It
    is among the more common inherited childhood white matter disorders.
progression:
- phase: Antenatal / Subacute Infantile
  age_range: prenatal to <1 year
  notes: >
    Most severe; severe encephalopathy, rapid course, early death. Includes the
    prenatal/congenital (Cree) form.
- phase: Early Childhood (classic)
  age_range: 1 to <4 years
  notes: >
    Chronic progressive motor deterioration (ataxia, spasticity) with
    stress-provoked episodic decline; death typically within years of onset.
- phase: Late Childhood / Juvenile / Adult
  age_range: 4 years to adulthood
  notes: >
    Slower progression. Adult-onset disease is dominated by cognitive decline
    and personality changes; ovarian failure may co-occur in women.
