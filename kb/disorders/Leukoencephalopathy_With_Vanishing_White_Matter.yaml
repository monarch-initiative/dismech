has_subtypes:
- name: Antenatal-Infantile
  display_name: Antenatal / Subacute Infantile Onset
  description: >
    Most severe end of the spectrum, including the prenatal/congenital
    (Cree leukoencephalopathy) form and the subacute infantile form (onset
    age <1 year). Severe, rapidly progressive encephalopathy; the
    prenatal/congenital form can present with oligohydramnios, contractures,
    microcephaly, and early death.
- name: Early-Childhood
  display_name: Early Childhood Onset (classic CACH/VWM)
  description: >
    Classic form with onset between roughly 1 and <4 years of age, presenting
    with cerebellar ataxia and spasticity and stress-provoked episodic
    deterioration in which motor decline dominates, leading to death within
    several years of onset.
- name: Juvenile-Adult
  display_name: Late Childhood / Juvenile / Adult Onset
  description: >
    Milder, later-onset forms (onset age 4 to <18 years, or adult onset
    >=18 years) with slower progression. In adult-onset disease cognitive
    decline and personality changes dominate; in women premature ovarian
    failure may co-occur (ovarioleukodystrophy).
classifications:
  harrisons_chapter:
  - classification_value: NEUROLOGIC
    notes: >-
      VWM/CACH is a leukodystrophy presenting with progressive cerebellar
      ataxia, spasticity, and cognitive decline, placing it in Harrison's
      Neurologic Disorders Part.
  - classification_value: GENETICS_ENVIRONMENT_DISEASE
    notes: >-
      VWM is a monogenic autosomal recessive disorder caused by biallelic
      variants in the eIF2B subunit genes EIF2B1-EIF2B5.
pathophysiology:
- name: eIF2B Translation Initiation Complex Deficiency
  description: >
    Biallelic pathogenic variants in EIF2B1-EIF2B5 partially reduce the
    guanine nucleotide exchange activity of eIF2B, the five-subunit GEF that
    recycles inactive eIF2-GDP to active eIF2-GTP to permit translation
    initiation. eIF2B has an essential housekeeping role in translation and in
    its regulation during stress, yet the white matter (and ovaries) are
    selectively vulnerable.
  cell_types:
  - preferred_term: astrocyte
    term:
      id: CL:0000127
      label: astrocyte
  - preferred_term: oligodendrocyte
    term:
      id: CL:0000128
      label: oligodendrocyte
  biological_processes:
  - preferred_term: translational initiation
    modifier: DECREASED
    term:
      id: GO:0006413
      label: translational initiation
  - preferred_term: translation
    modifier: ABNORMAL
    term:
      id: GO:0006412
      label: translation
  evidence:
  - reference: PMID:11704758
    reference_title: "Subunits of the translation initiation factor eIF2B are mutant in leukoencephalopathy with vanishing white matter."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      We have identified mutations in EIF2B5 and EIF2B2, encoding the
      epsilon- and beta-subunits of the translation initiation factor eIF2B and
      located on chromosomes 3q27 and 14q24, respectively, as causing VWM.
    explanation: >-
      Identifies mutations in eIF2B subunit genes as the cause of VWM,
      establishing the primary molecular lesion.
  - reference: PMID:39322396
    reference_title: "Vanishing white matter."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      "Vanishing white matter" (VWM) is a leukodystrophy caused by autosomal
      recessive pathogenic variants in the genes encoding the subunits of
      eukaryotic initiation factor 2B (eIF2B).
    explanation: >-
      Confirms the genetic basis in eIF2B subunit genes and autosomal recessive
      inheritance.
  downstream:
  - target: Deregulated Integrated Stress Response
    causal_link_type: DIRECT
    description: >
      Reduced eIF2B GEF activity lowers the pool of active eIF2-GTP and causes
      constitutive, deregulated activation of the integrated stress response
      downstream of eIF2B.
- name: Deregulated Integrated Stress Response
  description: >
    eIF2B is the central regulatory factor of the integrated stress response
    (ISR): phosphorylation of eIF2-alpha inhibits eIF2B, reducing global
    translation while up-regulating ISR effector mRNAs. eIF2B-deficient
    mutations chronically mimic this state, producing constitutive ISR
    activation that is specifically pronounced in astrocytes; ISR mRNA
    expression levels correlate with disease severity.
  cell_types:
  - preferred_term: astrocyte
    term:
      id: CL:0000127
      label: astrocyte
  biological_processes:
  - preferred_term: integrated stress response signaling
    modifier: INCREASED
    term:
      id: GO:0140467
      label: integrated stress response signaling
  - preferred_term: regulation of translation
    modifier: ABNORMAL
    term:
      id: GO:0006417
      label: regulation of translation
  evidence:
  - reference: PMID:39322396
    reference_title: "Vanishing white matter."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      eIF2B is a central regulatory factor in the integrated stress response
      (ISR). Genetic variants decrease eIF2B activity and thereby cause
      constitutive activation of the ISR downstream of eIF2B. Strikingly, the
      ISR is specifically activated in astrocytes.
    explanation: >-
      Establishes deregulated, constitutive ISR activation as the core
      mechanism and its astrocyte specificity.
  - reference: PMID:31402619
    reference_title: "Vanishing white matter: deregulated integrated stress response as therapy target."
    supports: SUPPORT
    evidence_source: MODEL_ORGANISM
    snippet: >-
      In brains of VWM compared to wild-type mice we observed the most
      prominent changes in translation concerning ISR mRNAs; their expression
      levels correlated with disease severity.
    explanation: >-
      Mouse models show ISR mRNA translational changes that correlate with
      disease severity, linking ISR deregulation to pathology.
  downstream:
  - target: Astrocyte Dysfunction and Selective Glial Vulnerability
    causal_link_type: DIRECT
    description: >
      Constitutive ISR activation impairs maturation and function of white
      matter astrocytes, the cell type selectively affected in VWM.
- name: Astrocyte Dysfunction and Selective Glial Vulnerability
  description: >
    White matter astrocytes are the primary affected cell type in VWM.
    Impaired astrocyte maturation precedes disease onset and parallels
    severity; immature, morphologically abnormal astrocytes secrete factors
    that inhibit oligodendrocyte maturation, while wild-type astrocytes permit
    normal maturation of mutant oligodendrocytes. Specialized astrocytes such
    as cerebellar Bergmann glia and retinal Mueller cells are also involved.
  cell_types:
  - preferred_term: astrocyte
    term:
      id: CL:0000127
      label: astrocyte
  - preferred_term: Bergmann glial cell
    term:
      id: CL:0000644
      label: Bergmann glial cell
  - preferred_term: oligodendrocyte
    term:
      id: CL:0000128
      label: oligodendrocyte
  biological_processes:
  - preferred_term: astrocyte differentiation
    modifier: DECREASED
    term:
      id: GO:0048708
      label: astrocyte differentiation
  evidence:
  - reference: PMID:26974157
    reference_title: "Astrocytes are central in the pathomechanisms of vanishing white matter."
    supports: SUPPORT
    evidence_source: MODEL_ORGANISM
    snippet: >-
      In all mutant strains, impaired maturation of white matter astrocytes
      preceded onset and paralleled disease severity and progression.
    explanation: >-
      Demonstrates that astrocyte maturation impairment precedes and tracks
      disease, supporting astrocytes as the central affected cell type.
  - reference: PMID:26974157
    reference_title: "Astrocytes are central in the pathomechanisms of vanishing white matter."
    supports: SUPPORT
    evidence_source: IN_VITRO
    snippet: >-
      In coculture, VWM astrocytes secreted factors that inhibited
      oligodendrocyte maturation, whereas WT astrocytes allowed normal
      maturation of VWM oligodendrocytes.
    explanation: >-
      Coculture data show astrocytes drive secondary oligodendrocyte
      dysfunction, establishing the astrocyte-to-oligodendrocyte axis.
  - reference: PMID:36429009
    reference_title: "Cortical Pathology in Vanishing White Matter."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      that VWM cortical astrocytes exhibit morphological changes and are less
      complex in structure than control cells. Our findings also suggest that
      these astrocytes are immature and not reactive.
    explanation: >-
      Proteomic and immunohistochemical analysis of human VWM patient cortex
      confirms astrocytes are morphologically abnormal and immature, extending
      astrocyte involvement beyond white matter.
  downstream:
  - target: Progressive White Matter Rarefaction and Cavitation
    causal_link_type: DIRECT
    description: >
      Astrocyte dysfunction and the resulting failure of oligodendrocyte
      maturation lead to progressive loss and cystic degeneration of central
      nervous system white matter.
- name: Progressive White Matter Rarefaction and Cavitation
  description: >
    Diffuse cerebral white matter progressively acquires a CSF-like signal on
    MRI and undergoes cystic degeneration (cavitation), so that increasing
    areas of white matter are replaced by fluid while the cortex is relatively
    preserved. Long-surviving patients also show secondary cortical thinning.
  cell_types:
  - preferred_term: oligodendrocyte
    term:
      id: CL:0000128
      label: oligodendrocyte
  biological_processes:
  - preferred_term: myelination
    modifier: DECREASED
    term:
      id: GO:0042552
      label: myelination
  evidence:
  - reference: PMID:9109866
    reference_title: "A new leukoencephalopathy with vanishing white matter."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      In eight patients with advanced disease, MRI revealed a diffuse cerebral
      hemispheric leukoencephalopathy, in which increasing areas of the
      abnormal white matter had a signal intensity close to that of CSF on all
      pulse sequences.
    explanation: >-
      Original clinical description of progressive white matter signal change
      toward CSF intensity, the hallmark of VWM.
  - reference: PMID:9109866
    reference_title: "A new leukoencephalopathy with vanishing white matter."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Autopsy in one patient confirmed the presence of extensive cystic
      degeneration of the cerebral white matter with reactive change and a
      preserved cortex.
    explanation: >-
      Autopsy confirms cystic degeneration of white matter with cortical
      sparing, the cavitation hallmark.
  downstream:
  - target: Stress-Provoked Neurological Deterioration
    causal_link_type: INDIRECT_KNOWN_INTERMEDIATES
    description: >
      The vulnerable, rarefying white matter is prone to acute episodic
      decline when challenged by physiological stress, superimposed on the
      chronic progressive course.
- name: Stress-Provoked Neurological Deterioration
  description: >
    Because eIF2B governs translation during stress, the disease is dominated
    by chronic progressive decline punctuated by episodes of rapid, major
    neurological deterioration provoked by febrile infections, minor head
    trauma, major surgery, or acute and extreme fright, which may precipitate
    unexplained coma.
  cell_types:
  - preferred_term: astrocyte
    term:
      id: CL:0000127
      label: astrocyte
  biological_processes:
  - preferred_term: cellular response to stress
    modifier: ABNORMAL
    term:
      id: GO:0033554
      label: cellular response to stress
  evidence:
  - reference: PMID:11704758
    reference_title: "Subunits of the translation initiation factor eIF2B are mutant in leukoencephalopathy with vanishing white matter."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      As eIF2B has an essential role in the regulation of translation under
      different conditions, including stress, this may explain the rapid
      deterioration of people with VWM under stress.
    explanation: >-
      Links the eIF2B/ISR defect mechanistically to the characteristic
      stress-provoked deterioration.
  - reference: PMID:9109866
    reference_title: "A new leukoencephalopathy with vanishing white matter."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      There were episodes of deterioration following infections and minor head
      traumas, and these could results in unexplained coma.
    explanation: >-
      Original clinical observation of stress-provoked episodic deterioration
      and coma.
