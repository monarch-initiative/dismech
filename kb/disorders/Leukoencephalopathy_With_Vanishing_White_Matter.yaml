- name: Infection and Fever Prevention
  description: >
    Prevention of secondary deterioration through vaccinations, low-dose
    maintenance antibiotics during winter, antibiotics for minor infections,
    and antipyretics for fever, because febrile infections provoke rapid
    decline. Helmets and avoidance of contact sports, head trauma, high body
    temperature, and (where possible) major surgery are advised.
  treatment_term:
    preferred_term: vaccination
    term:
      id: MAXO:0001017
      label: vaccination
  evidence:
  - reference: PMID:20301435
    reference_title: "Childhood Ataxia with Central Nervous System Hypomyelination / Vanishing White Matter."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Prevention of infections and fever when possible through the use of
      vaccinations, low-dose maintenance antibiotics during winter, antibiotics
      for minor infections, and antipyretics for fever.
    explanation: >-
      GeneReviews recommends infection and fever prevention to reduce
      stress-provoked deterioration.
  - reference: PMID:20301435
    reference_title: "Childhood Ataxia with Central Nervous System Hypomyelination / Vanishing White Matter."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: >-
      Agents/circumstances to avoid: Contact sports, head trauma, infections,
