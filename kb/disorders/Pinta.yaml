infectious_agent:
- name: Treponema carateum
  description: Treponemal agent of pinta.
  evidence:
  - reference: PMID:24396138
    reference_title: "The endemic treponematoses."
    supports: SUPPORT
    snippet: "T. pallidum subsp. pertenue, T. pallidum subsp. endemicum, and T. carateum are the agents of the endemic treponematoses yaws, bejel (or endemic syphilis), and pinta, respectively."
    explanation: The abstract identifies T. carateum as the agent of pinta.
pathophysiology:
- name: Treponemal Peptidoglycan Cross-Linking (Beta-Lactam Target)
  description: >-
    Treponema carateum maintains its peptidoglycan cell wall by penicillin-binding
    protein (PBP) transpeptidase cross-linking. This essential, bacteria-specific
    reaction is the target of the penicillin used to treat pinta: beta-lactam
    acylation of the PBP active site halts cross-linking and is treponemicidal,
    which is why a single penicillin injection cures all stages.
  role: therapeutic_vulnerability
  conforms_to: "bacterial_cell_wall_synthesis_inhibition#Peptidoglycan Cross-Linking by Penicillin-Binding Proteins"
  biological_processes:
  - preferred_term: Peptidoglycan-Based Cell Wall Biogenesis
    term:
      id: GO:0009273
      label: peptidoglycan-based cell wall biogenesis
  evidence:
  - reference: PMID:22203377
    supports: SUPPORT
    evidence_source: OTHER
    snippet: >-
      although glycan chain polymerization occurs in the absence of
      transpeptidation (for example, in the presence of penicillin), efficient
      transpeptidation requires ongoing GTase reactions
    explanation: >-
      Establishes that beta-lactams (penicillin) act by blocking PBP
      transpeptidation, the cross-linking step this node represents. Evidence
      source is OTHER as this is a review article.
