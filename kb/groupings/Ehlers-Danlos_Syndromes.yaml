name: Ehlers-Danlos Syndromes
display_name: Ehlers-Danlos Syndromes (EDS)
creation_date: "2026-06-13T00:00:00Z"
description: >-
  A group of heritable connective-tissue disorders whose shared clinical space
  includes joint hypermobility or instability, skin hyperextensibility or
  fragility, atrophic scarring, easy bruising, and variable generalized tissue,
  vascular, ocular, skeletal, periodontal, or hollow-organ fragility. Members
  are explicit Ehlers-Danlos syndrome disease entries, spanning collagen
  fibrillogenesis and processing defects, collagen III vascular-wall fragility,
  glycosaminoglycan/proteoglycan biosynthesis defects, and clinically defined
  hypermobility-spectrum EDS with unresolved molecular etiology.
grouping_basis:
- SHARED_MECHANISM
- SHARED_PHENOTYPE
grouping_rationale: >-
  Grouped as an explicit curated union of EDS disease entries rather than as a
  broad connective-tissue hierarchy clone. The existing knowledge base contains
  an umbrella EDS entry, COL5A1-related classical EDS, and spondylodysplastic
  EDS; this batch adds standalone vascular and hypermobile EDS entries because
  they are high-priority, clinically distinctive subtypes already modeled as
  umbrella subtypes. Members are kept separate because their causal branches
  differ: type V collagen fibrillogenesis in classical EDS, type III collagen
  vascular and hollow-organ fragility in vascular EDS, GAG/proteoglycan defects
  in spondylodysplastic EDS, and clinically defined hypermobile EDS with no
  validated causal gene. The criteria are NECESSARY: EDS members should have
  explicit EDS nosology plus connective-tissue fragility phenotypes, but those
  phenotypes alone are not sufficient because Marfan syndrome, Loeys-Dietz
  syndrome, osteogenesis imperfecta, cutis laxa, and nonsyndromic hypermobility
  can overlap clinically.
