      id: MONDO:0020066
      label: Ehlers-Danlos syndrome
    mapping_predicate: skos:closeMatch
    mapping_source: MONDO
    mapping_justification: >-
      closeMatch: the grouping corresponds to the MONDO Ehlers-Danlos syndrome
      class but is implemented as an explicit, partial curated union of current
      dismech Disease entries and selected gap-filled subtype entries.
    consistency:
    - reference: MONDO
      consistent: CONSISTENT
      notes: >-
        The listed members are EDS entities or explicit EDS subtype entries.
        The grouping remains partial pending separate curation of rarer EDS
        subtypes such as TNXB/AEBP1 classical-like, PLOD1/FKBP14 kyphoscoliotic,
        ADAMTS2 dermatosparaxis, COL1A1/COL1A2 arthrochalasia/cardiac-valvular,
        CHST14/DSE musculocontractural, C1R/C1S periodontal, and COL12A1
        myopathic EDS.
membership_criteria:
- description: >-
    A member is an explicit Ehlers-Danlos syndrome disease entry and has at
    least one characteristic connective-tissue fragility phenotype, such as
    joint hypermobility or dislocation, hyperextensible or thin skin, atrophic
    scars, bruising susceptibility, arterial rupture, or intestinal perforation.
  criteria_semantics: NECESSARY
  logic:
    operator: OR
    operands:
    - criterion_predicate: HAS_PHENOTYPE
      description: Joint hypermobility.
      phenotype_term:
        preferred_term: Joint hypermobility
        term:
