members:
- member: Ehlers-Danlos Syndrome
  member_type: DISEASE
  differentiating_mechanisms:
  - description: >-
      Umbrella EDS entry representing the heterogeneous subtype family, including
      classical, hypermobile, vascular, kyphoscoliotic, dermatosparaxis,
      classical-like, and periodontal subtype concepts already modeled as
      subtypes or phenotype branches.
    gene:
      preferred_term: COL3A1
      term:
        id: hgnc:2201
        label: COL3A1
- member: Ehlers-Danlos Syndrome, COL5A1-related
  member_type: DISEASE
  differentiating_mechanisms:
  - description: >-
      COL5A1 haploinsufficiency or structural variants reduce type V collagen
      dosage or assembly, disturbing collagen fibrillogenesis and producing
      classical EDS with skin hyperextensibility, atrophic scarring, easy
      bruising, and generalized joint hypermobility.
    gene:
      preferred_term: COL5A1
      term:
        id: hgnc:2209
        label: COL5A1
- member: Vascular Ehlers-Danlos Syndrome
  member_type: DISEASE
  differentiating_mechanisms:
  - description: >-
      COL3A1/type III collagen variants weaken blood-vessel and hollow-organ
      extracellular matrix, distinguishing vascular EDS by arterial dissection
      or rupture, intestinal or uterine rupture, thin translucent skin, and easy
      bruising.
    gene:
      preferred_term: COL3A1
      term:
        id: hgnc:2201
        label: COL3A1
- member: Hypermobile Ehlers-Danlos Syndrome
  member_type: DISEASE
  differentiating_mechanisms:
  - description: >-
      Hypermobile EDS is clinically defined because no validated monogenic cause
      has been identified; it is differentiated by generalized joint
      hypermobility, joint instability or dislocation, chronic pain, fatigue,
      mild skin features, and multisystem symptoms.
- member: Spondylodysplastic Ehlers-Danlos Syndrome
  member_type: DISEASE
  differentiating_mechanisms:
  - description: >-
      B4GALT7/B3GALT6 linker-region defects and SLC39A13 metal-transporter
      defects impair proteoglycan/GAG biology or collagen homeostasis, producing
      short stature, hypotonia, skeletal dysplasia, joint hypermobility, and
      connective-tissue fragility.
    gene:
      preferred_term: B4GALT7
      term:
        id: hgnc:930
        label: B4GALT7
notes: >-
  Exclude Marfan syndrome, Loeys-Dietz syndrome, osteogenesis imperfecta, cutis
  laxa, arterial tortuosity syndrome, and hypermobility spectrum disorder unless
  a separate disease entry is explicitly curated as an EDS or EDS-related
  subtype. High-value future subtype entries include COL5A2 classical EDS,
  TNXB/AEBP1 classical-like EDS, PLOD1/FKBP14 kyphoscoliotic EDS, ADAMTS2
  dermatosparaxis EDS, COL1A1/COL1A2 arthrochalasia or cardiac-valvular EDS,
  CHST14/DSE musculocontractural EDS, C1R/C1S periodontal EDS, and COL12A1
  myopathic EDS.
