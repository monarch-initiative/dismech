name: Inherited Arrhythmia Syndromes
display_name: Inherited Arrhythmia Syndromes (Cardiac Channelopathies)
creation_date: "2026-06-12T00:00:00Z"
description: >-
  The inherited arrhythmia syndromes (cardiac channelopathies) are a group of
  Mendelian disorders of cardiac electrical function occurring in a
  structurally normal heart. Each is caused by variants in genes encoding
  cardiac ion channels or calcium-handling proteins, producing an
  arrhythmogenic substrate (altered repolarization or triggered activity) that
  predisposes to syncope and sudden cardiac death. They are distinguished from
  the structural cardiomyopathies, whose arrhythmias arise from myocardial
  remodeling rather than a primary electrical defect.
grouping_basis:
- SHARED_MECHANISM
- SHARED_GENE_FAMILY
grouping_rationale: >-
  Grouped on a shared electrophysiological mechanism: each member conforms to
  the cardiac_ion_channel_repolarization module (ion-channel/Ca-handling variant
  -> arrhythmogenic substrate -> ventricular tachyarrhythmia -> sudden death) in
  a structurally normal heart. Members are kept as separate Disease entries
  because they differ in the causal channel gene, the direction of the
  repolarization defect (QT prolongation vs shortening), and the arrhythmia
  trigger (adrenergic, rest/sleep, fever). The defining criterion is
  NECESSARY_AND_SUFFICIENT: conforming to the channelopathy module in the
  absence of a primary cardiomyopathy both characterizes every member and
  identifies candidate members not yet listed.
mappings:
  mondo_mappings:
  - term:
      id: MONDO:1010180
      label: cardiogenetic rhythm disorder
    mapping_predicate: skos:narrowMatch
    mapping_source: MONDO
    mapping_justification: >-
      narrowMatch: this grouping is the cardiac channelopathy subset of the
      broader MONDO cardiogenetic rhythm disorder class. MONDO:1010180 covers
      any monogenic cardiac rhythm disorder and explicitly includes entities
      beyond the DisMech channelopathy/module-defined scope, such as familial
      atrial fibrillation, progressive cardiac conduction disease, ventricular
      fibrillation, and other inherited rhythm disorders.
    consistency:
    - reference: MONDO
      consistent: CONSISTENT
      notes: >-
        MONDO currently lacks a precise cardiac-channelopathy grouping term.
        MONDO:1010180 is useful as a broader alignment target, but its descendant
        set should not be treated as exhaustive DisMech curation gaps for this
        grouping.
membership_criteria:
- description: >-
    A disorder is an inherited arrhythmia syndrome if and only if it conforms to
    the cardiac ion-channel repolarization module (an arrhythmogenic substrate
    driven by an ion-channel or calcium-handling variant) AND does not arise
    from a primary structural cardiomyopathy.
  criteria_semantics: NECESSARY_AND_SUFFICIENT
  logic:
    operator: AND
    operands:
    - criterion_predicate: CONFORMS_TO_MODULE
      module: cardiac_ion_channel_repolarization#Arrhythmogenic Substrate and Triggered Activity
      description: >-
        Conforms to the cardiac ion-channel repolarization module
        (arrhythmogenic substrate and triggered activity).
    - criterion_predicate: CONFORMS_TO_MODULE
      module: cardiomyopathy_maladaptive_remodeling
      negated: true
      description: >-
        Structurally normal heart — does NOT conform to the maladaptive
        cardiomyopathy remodeling module.
members:
- member: Familial Long QT Syndrome
  member_type: DISEASE
  differentiating_mechanisms:
  - description: >-
      Loss-of-function of repolarizing potassium currents (e.g., KCNQ1/IKs in
      LQT1) prolongs the action potential and QT interval, predisposing to
      torsades de pointes; adrenergically triggered in LQT1.
    gene:
      preferred_term: KCNQ1
      term:
        id: hgnc:6294
        label: KCNQ1
- member: Short QT Syndrome
  member_type: DISEASE
  differentiating_mechanisms:
  - description: >-
      Gain-of-function of repolarizing potassium currents (e.g., KCNH2/IKr)
      abbreviates the action potential and QT interval — the mirror image of
      long QT — shortening refractoriness and favoring reentry.
    gene:
      preferred_term: KCNH2
      term:
        id: hgnc:6251
        label: KCNH2
- member: Brugada syndrome
  member_type: DISEASE
  differentiating_mechanisms:
  - description: >-
      Loss-of-function of the cardiac sodium channel (SCN5A/INa) produces
      right-precordial ST elevation and phase-2 reentry; arrhythmias are
      classically triggered at rest, during sleep, or with fever.
    gene:
      preferred_term: SCN5A
      term:
        id: hgnc:10593
        label: SCN5A
- member: RYR2 CPVT
  member_type: DISEASE
  differentiating_mechanisms:
  - description: >-
      Gain-of-function of the ryanodine receptor (RYR2) causes diastolic
      sarcoplasmic-reticulum calcium leak and delayed afterdepolarizations;
      bidirectional VT is provoked by catecholamines (exercise/emotion) with a
      normal resting ECG.
    gene:
      preferred_term: RYR2
      term:
        id: hgnc:10484
        label: RYR2
- member: Timothy Syndrome
  member_type: DISEASE
  differentiating_mechanisms:
  - description: >-
      Gain-of-function of the L-type calcium channel (CACNA1C) impairs
      voltage-dependent inactivation, markedly prolonging the action potential
      and producing a multisystem syndrome (QT prolongation, syndactyly,
      autism) beyond the isolated arrhythmia.
    gene:
      preferred_term: CACNA1C
      term:
        id: hgnc:1390
        label: CACNA1C
- member: Familial Sick Sinus Syndrome
  member_type: DISEASE
  differentiating_mechanisms:
  - description: >-
      Variants in the pacemaker current (HCN4/If) or SCN5A impair sinoatrial
      automaticity, producing bradyarrhythmia and sinus-node dysfunction — the
      automaticity-failure branch of the module rather than ventricular
      tachyarrhythmia.
    gene:
      preferred_term: HCN4
      term:
        id: hgnc:16882
        label: HCN4
- member: Paroxysmal Familial Ventricular Fibrillation
  member_type: DISEASE
  differentiating_mechanisms:
  - description: >-
      Ventricular fibrillation in a structurally normal heart without a long
      QT, short QT, or Brugada ECG signature. The type 2 form is driven by
      cardiac DPP6 overexpression that selectively enhances Purkinje-fiber
      transient outward current (Ito) and accelerates Purkinje repolarization,
      producing a Purkinje early-repolarization substrate with rest-triggered
      VF; the type 1 form is SCN5A-associated and overlaps the sodium
      channelopathy spectrum.
    gene:
      preferred_term: DPP6
      term:
        id: hgnc:3010
        label: DPP6
notes: >-
  Worked example demonstrating NECESSARY_AND_SUFFICIENT criteria with a NOT
  (negated) leaf. Because the members declare conforms_to edges to the cardiac
  module, `just check-groupings` reports them as SATISFIED and flags any other
  conforming disorder (e.g., a short-coupled torsade/VF entry) as a candidate
  member.
