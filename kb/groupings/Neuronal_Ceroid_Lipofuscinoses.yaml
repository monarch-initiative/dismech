name: Neuronal Ceroid Lipofuscinoses
display_name: Neuronal Ceroid Lipofuscinoses (Batten Disease Spectrum)
creation_date: "2026-06-13T00:00:00Z"
description: >-
  A group of inherited lysosomal neurodegenerative disorders in which CLN-gene
  defects disrupt lysosomal enzymes, membrane proteins, endomembrane
  trafficking, or synaptic/endolysosomal protein handling, producing abnormal
  autofluorescent ceroid/lipopigment storage and progressive neuronal disease.
  The shared clinical space includes retinal degeneration or visual impairment,
  seizures, myoclonus, developmental or cognitive regression, dementia, motor
  decline, and cerebral or cerebellar neurodegeneration.
grouping_basis:
- SHARED_MECHANISM
- SHARED_PHENOTYPE
grouping_rationale: >-
  Grouped as an auditable union of NCL entries rather than as a generic
  lysosomal-storage bucket. Members share lysosomal/endolysosomal dysfunction
  with autofluorescent ceroid or lipopigment accumulation and progressive
  neurodegeneration, but remain separate Disease entries because the causal
  branches differ: soluble lysosomal enzyme defects such as PPT1/TPP1/CTSD/CTSF,
  lysosomal membrane or endomembrane trafficking defects such as CLN3, CLN5,
  CLN6, CLN8, and MFSD8/CLN7, and adult-onset DNAJC5/CSPalpha synaptic-protein
  handling defects. The criteria are NECESSARY: NCL membership entails
  lysosomal-storage module conformance and a characteristic neurologic or
  retinal phenotype, but those criteria are not by themselves sufficient because
  many other lysosomal storage diseases also cause neurodegeneration, seizures,
  or retinal disease.
mappings:
  mondo_mappings:
  - term:
      id: MONDO:0016295
      label: neuronal ceroid lipofuscinosis
    mapping_predicate: skos:closeMatch
    mapping_source: MONDO
    mapping_justification: >-
      closeMatch: the grouping corresponds to the MONDO neuronal ceroid
      lipofuscinosis class but is implemented as an explicit curated union of
      currently modeled dismech Disease entries rather than as a complete MONDO
      descendant closure.
    consistency:
    - reference: MONDO
      consistent: CONSISTENT
      notes: >-
        The listed subtype members are MONDO neuronal ceroid lipofuscinosis
        entities or immediate NCL specializations, while the grouping remains
        partial pending additional CLN subtype curation.
