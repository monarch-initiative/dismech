members:
- member: Neuronal Ceroid Lipofuscinosis
  member_type: DISEASE
  differentiating_mechanisms:
  - description: >-
      The umbrella NCL entry captures the childhood-predominant Batten disease
      spectrum with multiple definitive CLN genes, abnormal autofluorescent
      lysosomal storage material, visual loss, seizures, regression, and motor
      decline.
    gene:
      preferred_term: CLN3
      term:
        id: hgnc:2074
        label: CLN3
    module: "lysosomal_substrate_accumulation#Lysosomal Substrate Accumulation"
  - description: >-
      Soluble lysosomal enzyme branches, especially PPT1/CLN1 and TPP1/CLN2,
      distinguish enzyme-deficiency NCL subtypes and motivate future subtype
      split-out disease entries.
    gene:
      preferred_term: TPP1
      term:
        id: hgnc:2073
        label: TPP1
- member: Neuronal Ceroid Lipofuscinosis 1
  member_type: DISEASE
  differentiating_mechanisms:
  - description: >-
      PPT1/CLN1 is a soluble lysosomal thioesterase branch in which impaired
      depalmitoylation of S-palmitoylated proteins produces autofluorescent
      lysosomal storage material, synaptic trafficking defects,
      neuroinflammation, mTORC1/autophagy dysregulation, seizures, visual loss,
      and infantile neurodegeneration.
    gene:
      preferred_term: PPT1
      term:
        id: hgnc:9325
        label: PPT1
    module: "lysosomal_substrate_accumulation#Lysosomal Substrate Accumulation"
- member: Neuronal Ceroid Lipofuscinosis 2
  member_type: DISEASE
  differentiating_mechanisms:
  - description: >-
      TPP1/CLN2 is a soluble lysosomal peptidase deficiency branch in which loss
      of tripeptidyl peptidase 1 causes autofluorescent lysosomal storage,
      early language delay or regression, epilepsy, motor-language decline,
      retinal dystrophy, and a disease-targeted enzyme-replacement therapy
      branch with intracerebroventricular cerliponase alfa.
    gene:
      preferred_term: TPP1
      term:
        id: hgnc:2073
        label: TPP1
    module: "lysosomal_substrate_accumulation#Lysosomal Substrate Accumulation"
- member: Neuronal Ceroid Lipofuscinosis 3
  member_type: DISEASE
  differentiating_mechanisms:
  - description: >-
      CLN3 is the classic juvenile Batten disease branch, linking an
      endolysosomal membrane protein defect to lysosomal fingerprint inclusions,
      cholesterol storage, rapid childhood visual loss, retinal degeneration,
      cognitive or behavioral decline, seizures, and motor deterioration.
    gene:
      preferred_term: CLN3
      term:
        id: hgnc:2074
        label: CLN3
    module: "lysosomal_substrate_accumulation#Lysosomal Substrate Accumulation"
- member: Neuronal Ceroid Lipofuscinosis 7
  member_type: DISEASE
  differentiating_mechanisms:
  - description: >-
      MFSD8/CLN7 is a lysosomal membrane major facilitator superfamily protein;
      biallelic loss causes variant late-infantile NCL with lysosomal
      autofluorescent storage material, seizures, regression, retinal
      degeneration, and model-supported autophagy/mitochondrial stress branches.
    gene:
      preferred_term: MFSD8
      term:
        id: hgnc:28486
        label: MFSD8
    module: "lysosomal_substrate_accumulation#Lysosomal Substrate Accumulation"
- member: Adult Neuronal Ceroid Lipofuscinosis
  member_type: DISEASE
  differentiating_mechanisms:
  - description: >-
      CLN6-related Kufs disease links adult NCL to ER-to-Golgi lysosomal enzyme
      trafficking defects and ceroid storage without the childhood retinal-loss
      pattern.
    gene:
      preferred_term: CLN6
      term:
        id: hgnc:2077
        label: CLN6
    module: "lysosomal_substrate_accumulation#Lysosomal Substrate Accumulation"
  - description: >-
      DNAJC5/CSPalpha variants define the autosomal dominant CLN4 adult branch,
      connecting synaptic protein handling to lysosomal ceroid deposition and
      progressive myoclonus epilepsy/dementia.
    gene:
      preferred_term: DNAJC5
      term:
        id: hgnc:16235
        label: DNAJC5
  - description: >-
      CTSF/cathepsin F variants define a recessive Kufs type B branch through
      impaired lysosomal proteolysis and ceroid lipopigment accumulation.
    gene:
      preferred_term: CTSF
      term:
        id: hgnc:2531
        label: CTSF
notes: >-
  Batten disease is treated as a synonym for the neuronal ceroid lipofuscinosis
  spectrum rather than a separate member. This grouping currently enumerates the
  NCL Disease entries present in the knowledge base, including the new
  CLN1/PPT1, CLN2/TPP1, and CLN3 subtype entries. High-value future subtype
  split-outs include CLN5, CLN6, CLN8, CTSD/CLN10, GRN/CLN11, CTSF/CLN13, and
  KCTD7/CLN14 where separate curated Disease entries would improve
  subtype-specific mechanism, treatment, and progression modeling.
