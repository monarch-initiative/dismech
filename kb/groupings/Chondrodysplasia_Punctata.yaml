name: Chondrodysplasia Punctata
display_name: Chondrodysplasia Punctata (CDP)
creation_date: "2026-07-01T00:00:00Z"
description: >-
  Chondrodysplasia punctata (CDP) is a clinically defined, etiologically
  heterogeneous family of skeletal dysplasias unified by a single radiographic
  hallmark: punctate ("stippled") foci of abnormal calcification in the
  epiphyseal and other cartilaginous regions during infancy. Beyond that shared
  imaging signature the group is mechanistically diverse — it spans peroxisomal
  disorders (defective PTS2 matrix-protein import and single-enzyme ether-lipid
  / plasmalogen biosynthesis defects producing the rhizomelic forms), disorders
  of post-squalene cholesterol biosynthesis (e.g., X-linked dominant
  Conradi-Hunermann-Happle, CDPX2), vitamin-K-cycle / arylsulfatase and other
  brachytelephalangic forms, and chromosomal / acquired (maternal warfarin,
  autoimmune) phenocopies. Members therefore converge on the chondrodysplasia
  punctata radiographic phenotype while diverging in causal gene, metabolic
  pathway, inheritance, and extraskeletal features (rhizomelic vs non-rhizomelic
  limb shortening, cataracts, ichthyosis, developmental impairment). This
  grouping assembles the separately curated CDP Disease entries; it is not an
  attempt to recapitulate the full MONDO chondrodysplasia-punctata hierarchy.
grouping_basis:
- SHARED_PHENOTYPE
- CLINICAL_CONVENTION
grouping_rationale: >-
  The members are lumped by a shared *radiographic* phenotype — punctate /
  stippled epiphyseal calcification (chondrodysplasia punctata) — which is the
  defining, historically diagnostic feature and the basis of the clinical
  "chondrodysplasia punctata" convention. They are kept as separate Disease
  entries because the underlying *metabolic mechanism* differs: the rhizomelic
  forms are peroxisomal (RCDP1 = a PEX7 PTS2 matrix-import defect; the
  plasmalogen-synthesis-defect form = single-enzyme ether-lipid/plasmalogen
  biosynthesis loss in GNPAT/AGPS/FAR1), whereas the tibial-metacarpal type is a
  non-rhizomelic CDP whose molecular cause is still unresolved. Grouping by the
  convergent radiographic phenotype makes the family navigable while preserving
  the metabolic distinctions that drive diagnosis, biochemical testing, and
  prognosis. The criteria are stated as NECESSARY: exhibiting chondrodysplasia
  punctata (punctate epiphyseal calcification) is entailed by membership, but
  that finding alone — being a nonspecific hallmark shared with cholesterol-,
  vitamin-K-, and warfarin-related phenocopies — does not by itself establish
  membership in this curated set.
mappings:
  mondo_mappings:
  - term:
      id: MONDO:0019701
      label: chondrodysplasia punctata
    mapping_predicate: skos:broadMatch
    mapping_source: MONDO
    mapping_justification: >-
      MONDO:0019701 (chondrodysplasia punctata) is the clinical umbrella class
      for the CDP family. A broadMatch (rather than closeMatch) is used because
      this grouping currently lists only three curated members (the two
      rhizomelic peroxisomal forms and the tibial-metacarpal type) and does not
      yet cover the full MONDO subtree — the cholesterol-biosynthesis
      (Conradi-Hunermann-Happle / CDPX2), brachytelephalangic / X-linked
      recessive (arylsulfatase E), and chromosomal / acquired phenocopy
      descendants are not represented. The grouping is thus narrower in
      membership than, but semantically anchored to, this MONDO class.
    consistency:
    - reference: MONDO
      consistent: CONSISTENT
      notes: >-
        All three listed members are is-a descendants of MONDO:0019701
        (chondrodysplasia punctata): chondrodysplasia punctata, tibial-metacarpal
        type (MONDO:0007322); rhizomelic chondrodysplasia punctata type 1
        (MONDO:0008972); and rhizomelic chondrodysplasia punctata
        (MONDO:0015776). The grouping does not (yet) enumerate the remaining
        CDP descendants, so it is a consistent subset rather than a full cover.
membership_criteria:
- description: >-
    A member exhibits chondrodysplasia punctata — punctate / stippled epiphyseal
    calcification on infantile radiographs — the defining radiographic hallmark
    of the CDP family.
  criteria_semantics: NECESSARY
  logic:
    criterion_predicate: HAS_PHENOTYPE
    description: Punctate / stippled epiphyseal calcification (epiphyseal stippling).
    phenotype_term:
      preferred_term: Epiphyseal stippling
      term:
        id: HP:0010655
        label: Epiphyseal stippling
members:
- member: Chondrodysplasia Punctata, Tibial-metacarpal Type
  member_type: DISEASE
  differentiating_mechanisms:
  - description: >-
      A non-rhizomelic CDP subtype defined by neonatal calcific stippling with
      short tibiae, short central metacarpals, and coronal cleft vertebrae. Unlike
      the rhizomelic members, it is not a peroxisomal disorder: sterol, very-long-
      chain-fatty-acid, and phytanic-acid profiles are normal, and its molecular
      cause remains unresolved (no gene assertion). Distinguished clinically by the
      tibia-plus-metacarpal shortening pattern and generally preserved cognition.
- member: Rhizomelic Chondrodysplasia Punctata Type 1
  member_type: DISEASE
  differentiating_mechanisms:
  - description: >-
      Autosomal recessive peroxisome biogenesis disorder caused by biallelic PEX7
      loss of function. PEX7 is the cytosolic receptor for PTS2-targeted
      peroxisomal matrix enzymes, so its loss mislocalizes plasmalogen-synthesis
      enzymes (DHAPAT/GNPAT and alkyl-DHAP synthase/AGPS) *and* phytanoyl-CoA
      hydroxylase — producing plasmalogen deficiency together with phytanic-acid
      accumulation. Distinguished from the single-enzyme forms by the receptor-level
      (import) defect and by elevated phytanic acid.
    gene:
      preferred_term: PEX7
      term:
        id: hgnc:8860
        label: PEX7
- member: Rhizomelic Chondrodysplasia Punctata, Plasmalogen-Synthesis Defect
  member_type: DISEASE
  differentiating_mechanisms:
  - description: >-
      Autosomal recessive single-enzyme defects of ether-phospholipid
      (plasmalogen) biosynthesis — RCDP2 (GNPAT/DHAPAT) and RCDP3 (AGPS/alkyl-DHAP
      synthase) — lying downstream of peroxisomal import. They converge on the same
      lesion (cellular plasmalogen deficiency) and phenocopy RCDP1, but because they
      act below the PTS2 import step, phytanic-acid alpha-oxidation is preserved
      (normal phytanic acid) — the key biochemical discriminator from the PEX7
      import-receptor form.
    gene:
      preferred_term: GNPAT
      term:
        id: hgnc:4416
        label: GNPAT
  - description: >-
      RCDP3 arises from loss of AGPS (alkylglycerone-phosphate synthase), the
      enzyme that forms the ether bond in plasmalogen biosynthesis, converging on
      the same plasmalogen-deficiency lesion as the GNPAT (RCDP2) defect with
      preserved phytanic-acid oxidation.
    gene:
      preferred_term: AGPS
      term:
        id: hgnc:327
        label: AGPS
notes: >-
  Umbrella -> Grouping model over the clinically defined chondrodysplasia
  punctata family (MONDO:0019701); the members are already curated as distinct
  Disease entries, so no duplicate Disease root is created. Criteria are stated
  as a single NECESSARY HAS_PHENOTYPE block (epiphyseal stippling). Membership is
  currently a consistent subset of the MONDO CDP subtree; cholesterol-biosynthesis
  (Conradi-Hunermann-Happle / CDPX2), brachytelephalangic (arylsulfatase E), and
  chromosomal / acquired phenocopy forms are candidate future members. The
  advisory membership audit may report members as UNKNOWN where a disease entry
  does not (yet) declare the epiphyseal-stippling phenotype descriptor.
