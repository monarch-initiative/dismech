name: FGFR-Related Skeletal Dysplasias
display_name: FGFR-Related Skeletal Dysplasias and Craniosynostosis Syndromes
creation_date: "2026-06-13T00:00:00Z"
description: >-
  A group of Mendelian skeletal disorders caused by gain-of-function variants in
  the fibroblast growth factor receptor genes FGFR1, FGFR2, and FGFR3.
  Constitutive receptor activation drives sustained MAPK/STAT signaling that is
  read out in two skeletal compartments: in the cartilaginous growth plate it
  dysregulates chondrocyte proliferation and endochondral ossification (the
  short-limb chondrodysplasias, predominantly FGFR3), and at the cranial sutures
  it accelerates osteogenic differentiation and premature suture fusion (the
  craniosynostosis syndromes, predominantly FGFR1/FGFR2). The same pathway
  produces a severity gradient from mild (hypochondroplasia) to perinatally
  lethal (thanatophoric dysplasia).
grouping_basis:
- SHARED_GENE_FAMILY
- SHARED_MECHANISM
grouping_rationale: >-
  Grouped on a shared gene family and mechanism: each member conforms to the
  fgfr_gain_of_function_skeletal_dysplasia module (constitutive FGFR activation
  -> sustained MAPK/STAT signaling -> growth-plate and/or cranial-suture
  dysregulation). Members are kept as separate Disease entries because they
  differ in the causal receptor paralog (FGFR1/2/3), the specific activating
  variant and its strength, and which skeletal compartment dominates
  (endochondral chondrodysplasia vs craniosynostosis). The criteria are
  NECESSARY_AND_SUFFICIENT: conforming to the FGFR module both characterizes
  every member and identifies any other FGFR-driven skeletal disorder as a
  candidate member.
membership_criteria:
- description: >-
    A disorder is an FGFR-related skeletal dysplasia if and only if it conforms
    to the FGFR gain-of-function skeletal dysplasia module (a constitutively
    activating FGFR variant driving growth-plate or cranial-suture
    dysregulation).
  criteria_semantics: NECESSARY_AND_SUFFICIENT
  logic:
    criterion_predicate: CONFORMS_TO_MODULE
    module: fgfr_gain_of_function_skeletal_dysplasia#Constitutive FGFR Activation
    description: >-
      Conforms to the FGFR module's constitutive receptor-activation node.
members:
- member: Achondroplasia
  member_type: DISEASE
  differentiating_mechanisms:
  - description: >-
      The prototypical FGFR3 chondrodysplasia: the recurrent p.Gly380Arg variant
      causes rhizomelic short stature, macrocephaly, and trident hands — the
      reference point of the FGFR3 short-limb severity gradient.
    gene:
      preferred_term: FGFR3
      term:
        id: hgnc:3690
        label: FGFR3
- member: Hypochondroplasia
  member_type: DISEASE
  differentiating_mechanisms:
  - description: >-
      Milder FGFR3 activation (commonly p.Asn540Lys) producing disproportionate
      short stature without the craniofacial features of achondroplasia — the
      mild end of the FGFR3 gradient.
    gene:
      preferred_term: FGFR3
      term:
        id: hgnc:3690
        label: FGFR3
- member: Thanatophoric Dysplasia Type 1
  member_type: DISEASE
  differentiating_mechanisms:
  - description: >-
      Strong FGFR3 activation producing perinatally lethal short-limb dwarfism
      with curved ("telephone receiver") femurs and a narrow thorax — the severe
      end of the gradient.
    gene:
      preferred_term: FGFR3
      term:
        id: hgnc:3690
        label: FGFR3
- member: Thanatophoric Dysplasia Type 2
  member_type: DISEASE
  differentiating_mechanisms:
  - description: >-
      The recurrent FGFR3 p.Lys650Glu variant produces lethal dwarfism with
      straight femurs and cloverleaf skull, distinguishing it from type 1.
    gene:
      preferred_term: FGFR3
      term:
        id: hgnc:3690
        label: FGFR3
- member: SADDAN
  member_type: DISEASE
  differentiating_mechanisms:
  - description: >-
      Severe achondroplasia with developmental delay and acanthosis nigricans;
      the FGFR3 p.Lys650Met variant gives a survivable phenotype more severe than
      achondroplasia, bridging to thanatophoric dysplasia.
    gene:
      preferred_term: FGFR3
      term:
        id: hgnc:3690
        label: FGFR3
- member: Crouzon Syndrome with Acanthosis Nigricans
  member_type: DISEASE
  differentiating_mechanisms:
  - description: >-
      An FGFR3 craniosynostosis (recurrent p.Ala391Glu) — unusual in that an
      FGFR3 variant produces a craniosynostosis rather than a chondrodysplasia,
      combined with acanthosis nigricans.
    gene:
      preferred_term: FGFR3
      term:
        id: hgnc:3690
        label: FGFR3
- member: Muenke Syndrome
  member_type: DISEASE
  differentiating_mechanisms:
  - description: >-
      The single recurrent FGFR3 p.Pro250Arg variant causes coronal
      craniosynostosis with variable penetrance — an FGFR3 suture phenotype
      distinct from its chondrodysplasia phenotypes.
    gene:
      preferred_term: FGFR3
      term:
        id: hgnc:3690
        label: FGFR3
- member: Apert Syndrome
  member_type: DISEASE
  differentiating_mechanisms:
  - description: >-
      FGFR2 activation (p.Ser252Trp / p.Pro253Arg) producing bicoronal
      craniosynostosis with severe symmetric syndactyly of hands and feet — the
      most severe of the FGFR2 craniosynostoses.
    gene:
      preferred_term: FGFR2
      term:
        id: hgnc:3689
        label: FGFR2
- member: Crouzon Syndrome
  member_type: DISEASE
  differentiating_mechanisms:
  - description: >-
      FGFR2 craniosynostosis with midface hypoplasia and proptosis but normal
      hands and feet, distinguishing it from Apert and Pfeiffer.
    gene:
      preferred_term: FGFR2
      term:
        id: hgnc:3689
        label: FGFR2
- member: Pfeiffer Syndrome
  member_type: DISEASE
  differentiating_mechanisms:
  - description: >-
      Craniosynostosis with broad, medially deviated thumbs and great toes;
      caused by FGFR1 (p.Pro252Arg) or FGFR2 variants — the FGFR1 paralog member
      of the group.
    gene:
      preferred_term: FGFR1
      term:
        id: hgnc:3688
        label: FGFR1
- member: Jackson-Weiss Syndrome
  member_type: DISEASE
  differentiating_mechanisms:
  - description: >-
      FGFR2 craniosynostosis with characteristic foot anomalies (broad great
      toes, tarsal/metatarsal fusion) but normal hands.
    gene:
      preferred_term: FGFR2
      term:
        id: hgnc:3689
        label: FGFR2
notes: >-
  Internally organized into two arms: an FGFR3 short-limb chondrodysplasia arm
  (achondroplasia -> hypochondroplasia -> SADDAN -> thanatophoric dysplasia
  severity gradient) and an FGFR1/FGFR2 craniosynostosis arm, with FGFR3
  contributing the unusual Crouzon-with-acanthosis-nigricans and Muenke suture
  phenotypes.
  MONDO mapping: deliberately omitted. No single MONDO class corresponds to this
  FGFR gene-family grouping — MONDO splits the members across osteochondrodysplasia
  (FGFR3 chondrodysplasias) and craniosynostosis (FGFR1/2), with no
  "FGFR-related skeletal dysplasia" parent. The grouping is defined by shared
  receptor gene/mechanism, which crosscuts the MONDO anatomical taxonomy; the
  MONDO-descendant prioritization tool therefore does not apply to it.
