name: Lysosomal Storage Disorders
display_name: Lysosomal Storage Disorders (LSDs)
creation_date: "2026-06-12T00:00:00Z"
description: >-
  The lysosomal storage disorders (LSDs) are a large group of inherited
  metabolic diseases caused by deficiency of a lysosomal hydrolase, activator,
  membrane transporter, or trafficking protein. The common consequence is
  progressive accumulation of an undegraded macromolecular substrate within the
  lysosome, leading to storage-cell cytotoxicity, neuroinflammation, and a
  progressive multisystem and/or neurodegenerative phenotype. The group is
  classified biochemically by the stored substrate (sphingolipidoses,
  mucopolysaccharidoses, oligosaccharidoses, etc.).
grouping_basis:
- SHARED_MECHANISM
grouping_rationale: >-
  Grouped on the defining lysosomal storage mechanism: every member conforms to
  the lysosomal_substrate_accumulation module (hydrolase/cofactor deficiency ->
  undegraded substrate accumulation -> storage-cell cytotoxicity ->
  progressive disease). Members are kept as separate Disease entries because the
  deficient enzyme, stored substrate, and predominant tissue differ. This
  grouping also illustrates nesting: the mucopolysaccharidoses are themselves a
  Grouping and are included here as a single GROUPING member rather than by
  re-listing Hurler/Hunter/Sanfilippo/Morquio individually.
mappings:
  mondo_mappings:
  - term:
      id: MONDO:0002561
      label: lysosomal storage disease
    mapping_predicate: skos:exactMatch
    mapping_source: MONDO
    mapping_justification: >-
      The grouping concept corresponds to the MONDO lysosomal storage disease
      class, and the membership criterion mirrors its OWL logical definition
      (disease and RO:0004020 some GO:0005764 — "has basis in dysfunction of
      lysosome"). exactMatch records the intended conceptual alignment; MONDO
      descendants without DisMech entries are curation gaps rather than a reason
      to weaken the mapping predicate.
    consistency:
    - reference: MONDO
      consistent: CONSISTENT
      notes: >-
        8/9 listed members are is-a descendants of MONDO:0002561; the remaining
        member (Mucopolysaccharidoses) is a nested GROUPING with its own exact
        MONDO mapping. Additional MONDO LSD descendants without DisMech entries
        should be surfaced as curation gaps from this exact mapping.
membership_criteria:
- description: >-
    A disorder is a lysosomal storage disorder if and only if it conforms to the
    lysosomal substrate accumulation module — i.e., a lysosomal degradation
    defect causing progressive accumulation of an undegraded substrate within
    the lysosome.
  criteria_semantics: NECESSARY_AND_SUFFICIENT
  logic:
    criterion_predicate: CONFORMS_TO_MODULE
    module: lysosomal_substrate_accumulation#Lysosomal Substrate Accumulation
    description: >-
      Conforms to the lysosomal substrate accumulation module (lysosomal
      degradation defect with substrate storage).
members:
- member: Mucopolysaccharidoses
  member_type: GROUPING
  differentiating_mechanisms:
  - description: >-
      The mucopolysaccharidoses (a nested grouping) store glycosaminoglycans due
      to deficiency of GAG-degrading enzymes, with prominent skeletal disease
      (dysostosis multiplex) and coarse facies.
    module: lysosomal_substrate_accumulation
- member: Gaucher Disease
  member_type: DISEASE
  differentiating_mechanisms:
  - description: >-
      Glucocerebrosidase (GBA) deficiency stores glucosylceramide in
      macrophages (Gaucher cells), causing hepatosplenomegaly, cytopenias, and
      bone disease; the prototypical sphingolipidosis.
    gene:
      preferred_term: GBA
      term:
        id: hgnc:4177
        label: GBA
- member: Fabry disease
  member_type: DISEASE
  differentiating_mechanisms:
  - description: >-
      X-linked alpha-galactosidase A (GLA) deficiency stores globotriaosylceramide
      (Gb3) in vascular endothelium, causing acroparesthesias, angiokeratomas,
      renal and cardiac disease.
    gene:
      preferred_term: GLA
      term:
        id: hgnc:4296
        label: GLA
- member: Pompe Disease
  member_type: DISEASE
  differentiating_mechanisms:
  - description: >-
      Acid alpha-glucosidase (GAA) deficiency stores lysosomal glycogen,
      predominantly in cardiac and skeletal muscle, causing cardiomyopathy and
      myopathy; the glycogen-storage LSD.
    gene:
      preferred_term: GAA
      term:
        id: hgnc:4065
        label: GAA
- member: Tay-Sachs Disease
  member_type: DISEASE
  differentiating_mechanisms:
  - description: >-
      Beta-hexosaminidase A deficiency (HEXA alpha-subunit) stores GM2
      ganglioside in neurons, causing progressive neurodegeneration with a
      cherry-red macular spot.
    gene:
      preferred_term: HEXA
      term:
        id: hgnc:4878
        label: HEXA
- member: Sandhoff Disease
  member_type: DISEASE
  differentiating_mechanisms:
  - description: >-
      Beta-hexosaminidase A and B deficiency (HEXB beta-subunit) stores GM2
      ganglioside; clinically resembles Tay-Sachs but with additional visceral
      involvement.
    gene:
      preferred_term: HEXB
      term:
        id: hgnc:4879
        label: HEXB
- member: Krabbe Disease
  member_type: DISEASE
  differentiating_mechanisms:
  - description: >-
      Galactocerebrosidase (GALC) deficiency stores psychosine, causing globoid-
      cell leukodystrophy with severe demyelination of central and peripheral
      nervous systems.
    gene:
      preferred_term: GALC
      term:
        id: hgnc:4115
        label: GALC
- member: Metachromatic Leukodystrophy
  member_type: DISEASE
  differentiating_mechanisms:
  - description: >-
      Arylsulfatase A (ARSA) deficiency stores sulfatides, causing
      demyelinating leukodystrophy with metachromatic deposits.
    gene:
      preferred_term: ARSA
      term:
        id: hgnc:713
        label: ARSA
- member: Niemann-Pick Disease Type C
  member_type: DISEASE
  differentiating_mechanisms:
  - description: >-
      A lysosomal cholesterol/lipid trafficking defect (NPC1) — rather than a
      hydrolase deficiency — stores unesterified cholesterol and sphingolipids,
      causing progressive neurovisceral disease with vertical supranuclear gaze
      palsy.
    gene:
      preferred_term: NPC1
      term:
        id: hgnc:7897
        label: NPC1
notes: >-
  Worked example demonstrating a NECESSARY_AND_SUFFICIENT defining criterion
  (single CONFORMS_TO_MODULE leaf) and a nested GROUPING member (the
  Mucopolysaccharidoses grouping). Because the criterion is defining,
  `just check-groupings` will both audit listed members and scan kb/disorders/
  for any other module-conforming disorder as a candidate member.
