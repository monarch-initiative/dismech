name: Charcot-Marie-Tooth Diseases
display_name: Charcot-Marie-Tooth Diseases
creation_date: "2026-06-14T00:00:00Z"
description: >-
  A curated grouping of explicit Charcot-Marie-Tooth disease entries spanning
  the broad CMT umbrella entry and the currently curated type 1 demyelinating
  and type 2 axonal CMT entries. Members share inherited length-dependent
  peripheral neuropathy with distal muscle weakness, distal sensory impairment,
  pes cavus, reduced reflexes, gait impairment, and progressive motor-sensory
  axon or Schwann-cell/myelin pathology.
grouping_basis:
- SHARED_MECHANISM
- SHARED_PHENOTYPE
grouping_rationale: >-
  Grouped as an explicit curated union of Disease entries named as
  Charcot-Marie-Tooth disease or major CMT type-level entries, not as all
  hereditary peripheral neuropathies. The shared boundary is inherited
  motor-sensory peripheral neuropathy with convergent distal axon degeneration
  and/or Schwann-cell demyelination. Current members include the umbrella CMT
  entry plus the curated type 1 and type 2 entries. Boundary entities such as
  hereditary neuropathy with liability to pressure palsies and PRPS1 deficiency
  spectrum are not included unless a standalone entry is explicitly curated as
  a CMT disease subtype.
mappings:
  mondo_mappings:
  - term:
      id: MONDO:0015626
      label: Charcot-Marie-Tooth disease
    mapping_predicate: skos:closeMatch
    mapping_source: MONDO
    mapping_justification: >-
      closeMatch: the grouping corresponds to the MONDO Charcot-Marie-Tooth
      disease class, but is implemented as an explicit curated subset of current
      dismech Disease entries rather than as an automatic MONDO subtree closure.
    consistency:
    - reference: MONDO
      consistent: CONSISTENT
      notes: >-
        Listed members are the current KB Charcot-Marie-Tooth Disease,
        Charcot-Marie-Tooth Disease Type 1, and Charcot-Marie-Tooth Disease
        Type 2 entries. Additional CMT subtypes should be added only when
        standalone Disease entries are curated.
membership_criteria:
- description: >-
    A member is an explicit Charcot-Marie-Tooth disease entry with inherited
    peripheral motor-sensory neuropathy and at least one characteristic shared
    CMT manifestation such as distal muscle weakness, distal sensory impairment,
    pes cavus, hyporeflexia, or areflexia.
  criteria_semantics: NECESSARY
  logic:
    operator: OR
    operands:
    - criterion_predicate: HAS_PHENOTYPE
      description: Distal muscle weakness.
      phenotype_term:
        preferred_term: Distal muscle weakness
        term:
          id: HP:0002460
          label: Distal muscle weakness
    - criterion_predicate: HAS_PHENOTYPE
      description: Distal sensory impairment.
      phenotype_term:
        preferred_term: Distal sensory impairment
        term:
          id: HP:0002936
          label: Distal sensory impairment
    - criterion_predicate: HAS_PHENOTYPE
      description: Pes cavus.
      phenotype_term:
        preferred_term: Pes cavus
        term:
          id: HP:0001761
          label: Pes cavus
    - criterion_predicate: HAS_PHENOTYPE
      description: Hyporeflexia.
      phenotype_term:
        preferred_term: Hyporeflexia
        term:
          id: HP:0001265
          label: Hyporeflexia
    - criterion_predicate: HAS_PHENOTYPE
      description: Areflexia.
      phenotype_term:
        preferred_term: Areflexia
        term:
          id: HP:0001284
          label: Areflexia
members:
- member: Charcot-Marie-Tooth Disease
  member_type: DISEASE
  differentiating_mechanisms:
  - description: >-
      Broad genetically heterogeneous CMT umbrella entry spanning demyelinating,
      axonal, intermediate, recessive, and X-linked inherited motor-sensory
      neuropathies that converge on distal peripheral nerve dysfunction with
      length-dependent weakness, sensory loss, pes cavus, and reduced reflexes.
- member: Charcot-Marie-Tooth Disease Type 1
  member_type: DISEASE
  differentiating_mechanisms:
  - description: >-
      Demyelinating CMT dominated by Schwann-cell and peripheral myelin
      pathology, commonly involving PMP22 dosage gain in CMT1A, MPZ myelin
      protein defects, GJB1 connexin-32 dysfunction in overlapping X-linked or
      intermediate CMT, and EGR2 transcriptional regulation defects.
    gene:
      preferred_term: PMP22
      term:
        id: hgnc:9118
        label: PMP22
  - description: >-
      MPZ-related CMT1 disrupts myelin protein zero structure, trafficking, or
      unfolded-protein responses in Schwann cells, producing demyelinating
      peripheral neuropathy with slowed conduction and onion-bulb pathology.
    gene:
      preferred_term: MPZ
      term:
        id: hgnc:7225
        label: MPZ
- member: Charcot-Marie-Tooth Disease Type 2
  member_type: DISEASE
  differentiating_mechanisms:
  - description: >-
      Axonal CMT with primary motor and sensory axon degeneration, including
      MFN2-related mitochondrial fusion and transport failure, NEFL
      neurofilament disruption, RAB7A endolysosomal trafficking defects, GARS1
      tRNA-synthetase-mediated axonal toxicity, and SORD sorbitol-pathway
      disease.
    gene:
      preferred_term: MFN2
      term:
        id: hgnc:16877
        label: MFN2
  - description: >-
      SORD-related recessive axonal CMT2 links sorbitol dehydrogenase loss to
      peripheral nerve metabolic stress and is mechanistically distinct from
      dominant MFN2, NEFL, RAB7A, and GARS1 forms while sharing the axonal CMT2
      phenotype.
    gene:
      preferred_term: SORD
      term:
        id: hgnc:11184
        label: SORD
notes: >-
  Exclude hereditary neuropathy with liability to pressure palsies, isolated
  distal hereditary motor neuropathy, hereditary sensory and autonomic
  neuropathy, PRPS1 Deficiency Spectrum, mitochondrial trifunctional protein
  deficiency, and broad peripheral neuropathy entries unless a standalone
  Disease entry is explicitly curated as a Charcot-Marie-Tooth disease subtype.
