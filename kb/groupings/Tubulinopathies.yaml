name: Tubulinopathies
display_name: Tubulinopathies (Tubulin Gene Malformations of Cortical Development)
creation_date: "2026-06-13T00:00:00Z"
description: >-
  The tubulinopathies are a group of malformations of cortical development caused
  by dominant variants in the genes encoding the alpha- and beta-tubulin
  isotypes that polymerize into the neuronal microtubule cytoskeleton. Perturbed
  microtubule dynamics impair neuronal migration, axon guidance, and progenitor
  division, producing an overlapping spectrum of lissencephaly, polymicrogyria,
  microcephaly, dysmorphic basal ganglia, and corpus callosum and brainstem
  anomalies.
grouping_basis:
- SHARED_GENE_FAMILY
- SHARED_MECHANISM
grouping_rationale: >-
  Grouped on a shared gene family and mechanism: each member is caused by a
  variant in a tubulin isotype gene and conforms to the
  microtubule_dependent_neuronal_migration_failure module (microtubule apparatus
  perturbation -> neuronal motility failure -> cortical dyslamination). Members
  are kept as separate Disease entries because they involve different tubulin
  isotypes (alpha vs beta paralogs) with distinct expression timing and binding
  partners, producing characteristic but overlapping malformation patterns. The
  criteria are NECESSARY: tubulin-gene causation plus migration-module
  conformance is entailed by membership, but microtubule-dependent migration
  failure also arises from non-tubulin genes (e.g., LIS1, DCX), so the mechanism
  alone is not sufficient to make a disorder a tubulinopathy.
mappings:
  mondo_mappings:
  - term:
      id: MONDO:0100153
      label: tubulinopathy
    mapping_predicate: skos:exactMatch
    mapping_source: MONDO
membership_criteria:
- description: >-
    A member is caused by a variant in a tubulin isotype gene AND conforms to
    the microtubule-dependent neuronal migration failure module.
  criteria_semantics: NECESSARY
  logic:
    criterion_predicate: CONFORMS_TO_MODULE
    module: microtubule_dependent_neuronal_migration_failure#Microtubule Apparatus Perturbation
    description: >-
      Conforms to the microtubule apparatus perturbation node of the migration
      module (here driven by a tubulin isotype variant).
members:
- member: TUBA1A-related Tubulinopathy
  member_type: DISEASE
  differentiating_mechanisms:
  - description: >-
      TUBA1A is the major alpha-tubulin of migrating neurons; variants produce
      the most severe and common tubulinopathy — lissencephaly with cerebellar
      hypoplasia, dysmorphic basal ganglia, and corpus callosum agenesis.
    gene:
      preferred_term: TUBA1A
      term:
        id: hgnc:20766
        label: TUBA1A
- member: TUBB2A/TUBB2B-related Cortical Malformation
  member_type: DISEASE
  differentiating_mechanisms:
  - description: >-
      Beta-tubulin 2A/2B variants classically produce asymmetric or bilateral
      polymicrogyria-like cortical malformation, distinguishing them from the
      lissencephaly-predominant TUBA1A phenotype.
    gene:
      preferred_term: TUBB2A
      term:
        id: hgnc:12412
        label: TUBB2A
- member: TUBB3-related Tubulinopathy
  member_type: DISEASE
  differentiating_mechanisms:
  - description: >-
      The neuron-specific beta-tubulin TUBB3 has a distinctive axon-guidance
      phenotype: congenital fibrosis of the extraocular muscles (CFEOM3) with
      variable cortical malformation, reflecting the module's axon-wiring branch.
    gene:
      preferred_term: TUBB3
      term:
        id: hgnc:20772
        label: TUBB3
- member: TUBB/TUBB5-related Microcephaly
  member_type: DISEASE
  differentiating_mechanisms:
  - description: >-
      TUBB (TUBB5) variants couple the migration defect to a progenitor-division
      defect, producing microcephaly with structural cortical malformation —
      overlapping the centrosome/spindle microcephaly mechanism.
    gene:
      preferred_term: TUBB
      term:
        id: hgnc:20778
        label: TUBB
notes: >-
  A gene-family grouping (tubulin isotypes) that intersects the broader
  malformations-of-cortical-development space. TUBB/TUBB5 also conforms to the
  neural_progenitor_centrosome_spindle_dysfunction module and so additionally
  appears in the primary-microcephaly spectrum grouping — groupings are allowed
  to share members.
