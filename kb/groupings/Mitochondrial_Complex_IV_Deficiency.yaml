name: Mitochondrial Complex IV Deficiency
display_name: Mitochondrial Complex IV (Cytochrome c Oxidase) Deficiency, Nuclear-Type
creation_date: "2026-06-13T00:00:00Z"
description: >-
  A group of autosomal recessive mitochondrial disorders caused by defects in
  the nuclear-encoded assembly factors and metallochaperones required to build
  cytochrome c oxidase (complex IV) of the respiratory chain. Loss of an
  assembly factor blocks complex IV biogenesis, impairing terminal electron
  transfer and oxidative ATP synthesis. The resulting bioenergetic failure
  produces lactic acidosis and preferentially injures high-energy tissues —
  brain (Leigh syndrome), heart (fatal infantile cardioencephalomyopathy), and
  skeletal muscle.
grouping_basis:
- SHARED_MECHANISM
- SHARED_PATHWAY
grouping_rationale: >-
  Grouped on a shared biochemical lesion: each member conforms to the
  complex_iv_assembly_deficiency module (assembly-factor loss -> complex IV
  biogenesis failure -> impaired terminal electron transfer -> lactic acidosis
  and high-energy-tissue dysfunction). Members are kept as separate Disease
  entries because they differ in the specific assembly factor or metallochaperone
  affected (copper delivery via SCO1/SCO2, heme a synthesis via COX10/COX15,
  membrane insertion via COX18, holoenzyme assembly via SURF1, and the COA8
  stabilizer) and in the dominant organ phenotype. The criteria are
  NECESSARY_AND_SUFFICIENT: complex IV assembly-factor conformance both
  characterizes every member and identifies further nuclear COX-assembly defects
  as candidate members.
mappings:
  mondo_mappings:
  - term:
      id: MONDO:0033885
      label: mitochondrial complex IV deficiency, nuclear-type
    mapping_predicate: skos:exactMatch
    mapping_source: MONDO
membership_criteria:
- description: >-
    A disorder is a nuclear-type complex IV deficiency if and only if it
    conforms to the complex IV assembly-deficiency module (a nuclear-encoded
    assembly-factor defect causing cytochrome c oxidase biogenesis failure).
  criteria_semantics: NECESSARY_AND_SUFFICIENT
  logic:
    criterion_predicate: CONFORMS_TO_MODULE
    module: complex_iv_assembly_deficiency#Complex IV Biogenesis Failure
    description: >-
      Conforms to the complex IV biogenesis-failure node of the assembly module.
members:
- member: SURF1-Related Leigh Syndrome
  member_type: DISEASE
  differentiating_mechanisms:
  - description: >-
      SURF1 is required for early complex IV holoenzyme assembly; its loss is the
      most common cause of complex IV-deficient Leigh syndrome (subacute
      necrotizing encephalomyelopathy).
    gene:
      preferred_term: SURF1
      term:
        id: hgnc:11474
        label: SURF1
- member: SCO2-Related Fatal Infantile Cardioencephalomyopathy
  member_type: DISEASE
  differentiating_mechanisms:
  - description: >-
      SCO2 is a copper metallochaperone for the CuA site; its loss produces a
      cardiac-dominant phenotype (fatal infantile hypertrophic
      cardioencephalomyopathy), distinguishing it from the brain-dominant SURF1
      phenotype.
    gene:
      preferred_term: SCO2
      term:
        id: hgnc:10604
        label: SCO2
- member: SCO1-Related COX Deficiency
  member_type: DISEASE
  differentiating_mechanisms:
  - description: >-
      SCO1, the paralogous copper chaperone, causes a phenotype with hepatic and
      encephalopathic involvement, contrasting with the cardiac emphasis of SCO2.
    gene:
      preferred_term: SCO1
      term:
        id: hgnc:10603
        label: SCO1
- member: COX10-Related COX Deficiency
  member_type: DISEASE
  differentiating_mechanisms:
  - description: >-
      COX10 catalyzes the first step of heme a biosynthesis (farnesylation);
      defects impair heme a delivery to complex IV, with leukodystrophy and
      tubulopathy phenotypes.
    gene:
      preferred_term: COX10
      term:
        id: hgnc:2260
        label: COX10
- member: COX15-Related COX Deficiency
  member_type: DISEASE
  differentiating_mechanisms:
  - description: >-
      COX15 catalyzes the final heme a synthesis step; its loss causes
      heme a-deficient complex IV with cardiomyopathy and Leigh-like
      encephalopathy.
    gene:
      preferred_term: COX15
      term:
        id: hgnc:2263
        label: COX15
- member: COX18-Related COX Deficiency
  member_type: DISEASE
  differentiating_mechanisms:
  - description: >-
      COX18 mediates membrane insertion/export of the COX2 C-terminus; defects
      impair maturation of the mitochondrially encoded core subunit.
    gene:
      preferred_term: COX18
      term:
        id: hgnc:26801
        label: COX18
- member: COA8-Related COX Deficiency
  member_type: DISEASE
  differentiating_mechanisms:
  - description: >-
      COA8 stabilizes the assembling complex IV against oxidative stress; its
      loss gives a complex IV deficiency with a notably variable, sometimes
      slowly progressive course.
    gene:
      preferred_term: COA8
      term:
        id: hgnc:20492
        label: COA8
notes: >-
  All members are nuclear-encoded assembly-factor/metallochaperone defects
  (MONDO nuclear-type), distinct from primary mtDNA-encoded subunit mutations.
  The differentiating axis is the assembly step affected (copper delivery, heme a
  synthesis, membrane insertion, holoenzyme assembly, stabilization) and the
  dominant high-energy tissue (brain vs heart vs liver).
