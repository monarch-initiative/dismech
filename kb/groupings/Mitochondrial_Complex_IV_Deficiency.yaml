name: Mitochondrial Complex IV Deficiency
display_name: Mitochondrial Complex IV (Cytochrome c Oxidase) Deficiency, Nuclear-Type
creation_date: "2026-06-13T00:00:00Z"
description: >-
  A group of autosomal recessive mitochondrial disorders caused by defects in
  nuclear-encoded genes required to build cytochrome c oxidase (complex IV) of
  the respiratory chain. Most members harbor defects in assembly factors or
  metallochaperones; the COX6B1-, COX5A-, COX4I1-, COX8A-, COX6A2-, and
  COXFA4-Related COX
  Deficiencies (structural-subunit defects) and TACO1-Related COX Deficiency (a
  mitochondrial-translation defect) are exceptions. In each case, impaired
  complex IV biogenesis
  blocks terminal electron transfer and oxidative ATP synthesis, producing
  lactic acidosis and bioenergetic failure that preferentially injures
  high-energy tissues — brain (Leigh syndrome), heart (fatal infantile
  cardioencephalomyopathy), and skeletal muscle.
grouping_basis:
- SHARED_MECHANISM
- SHARED_PATHWAY
grouping_rationale: >-
  Grouped on a shared biochemical lesion: each member conforms to the
  complex_iv_assembly_deficiency module (nuclear-encoded gene defect -> complex
  IV biogenesis failure -> impaired terminal electron transfer -> lactic acidosis
  and high-energy-tissue dysfunction). Members are kept as separate Disease
  entries because they differ in the specific gene affected (copper delivery via
  SCO1/SCO2, heme a synthesis via COX10/COX15, membrane insertion via COX18,
  holoenzyme assembly via SURF1, the COA8 stabilizer, the COX6B1 structural
  subunit, or the TACO1 mtDNA-translational activator) and in the dominant organ
  phenotype. The criteria are
  NECESSARY_AND_SUFFICIENT: complex IV biogenesis-failure module conformance
  both characterizes every member and identifies further nuclear COX-assembly
  or structural-subunit defects as candidate members.
mappings:
  mondo_mappings:
  - term:
      id: MONDO:0033885
      label: mitochondrial complex IV deficiency, nuclear-type
    mapping_predicate: skos:exactMatch
    mapping_source: MONDO
    mapping_justification: >-
      The grouping concept corresponds to the MONDO "mitochondrial complex IV
      deficiency, nuclear-type" class. exactMatch records the intended
      conceptual alignment; current DisMech coverage and clinical-syndrome MONDO
      placements are consistency signals, not reasons to weaken the mapping
      predicate.
    consistency:
    - reference: MONDO
      consistent: CONSISTENT
      notes: >-
        13/15 listed members are is-a descendants of MONDO:0033885 (including
        COX6B1-Related COX Deficiency -> MONDO:0033637, nuclear type 7;
        COX20-Related COX Deficiency -> MONDO:0033645, nuclear type 11;
        COX11-Related COX Deficiency -> MONDO:0859520, nuclear type 23;
        PET100-Related COX Deficiency -> MONDO:0033646, nuclear type 12;
        COX14-Related COX Deficiency -> MONDO:0033639, nuclear type 10;
        COX5A-Related COX Deficiency -> MONDO:0033655, nuclear type 20;
        COX4I1-Related COX Deficiency -> MONDO:0033651, nuclear type 16; and
        TACO1-Related COX Deficiency -> MONDO:0033638, nuclear type 8). The two
        exceptions (SCO2-Related Fatal Infantile Cardioencephalomyopathy ->
        MONDO:0011451; COX15-Related COX Deficiency -> MONDO:0014051) are genuine
        nuclear-encoded complex IV assembly/cofactor defects whose dismech
        entries map to clinical-presentation MONDO terms rather than to a
        "nuclear type N" node. Treat these outside-subtree members as
        MONDO/member-alignment signals, while treating uncurated MONDO
        nuclear-type complex IV deficiency descendants as DisMech curation gaps.
membership_criteria:
- description: >-
    A disorder is a nuclear-type complex IV deficiency if and only if it
    conforms to the complex IV assembly-deficiency module (a nuclear-encoded
    assembly-factor defect causing cytochrome c oxidase biogenesis failure).
  criteria_semantics: NECESSARY_AND_SUFFICIENT
  logic:
    criterion_predicate: CONFORMS_TO_MODULE
    module: complex_iv_assembly_deficiency#Complex IV Biogenesis Failure
    description: >-
      Conforms to the complex IV biogenesis-failure node of the assembly module.
members:
- member: SURF1-Related Leigh Syndrome
  member_type: DISEASE
  differentiating_mechanisms:
  - description: >-
      SURF1 is required for early complex IV holoenzyme assembly; its loss is the
      most common cause of complex IV-deficient Leigh syndrome (subacute
      necrotizing encephalomyelopathy).
    gene:
      preferred_term: SURF1
      term:
        id: hgnc:11474
        label: SURF1
- member: SCO2-Related Fatal Infantile Cardioencephalomyopathy
  member_type: DISEASE
  differentiating_mechanisms:
  - description: >-
      SCO2 is a copper metallochaperone for the CuA site; its loss produces a
      cardiac-dominant phenotype (fatal infantile hypertrophic
      cardioencephalomyopathy), distinguishing it from the brain-dominant SURF1
      phenotype.
    gene:
      preferred_term: SCO2
      term:
        id: hgnc:10604
        label: SCO2
- member: SCO1-Related COX Deficiency
  member_type: DISEASE
  differentiating_mechanisms:
  - description: >-
      SCO1, the paralogous copper chaperone, causes a phenotype with hepatic and
      encephalopathic involvement, contrasting with the cardiac emphasis of SCO2.
    gene:
      preferred_term: SCO1
      term:
        id: hgnc:10603
        label: SCO1
- member: COX10-Related COX Deficiency
  member_type: DISEASE
  differentiating_mechanisms:
  - description: >-
      COX10 catalyzes the first step of heme a biosynthesis (farnesylation);
      defects impair heme a delivery to complex IV, with leukodystrophy and
      tubulopathy phenotypes.
    gene:
      preferred_term: COX10
      term:
        id: hgnc:2260
        label: COX10
- member: COX15-Related COX Deficiency
  member_type: DISEASE
  differentiating_mechanisms:
  - description: >-
      COX15 catalyzes the final heme a synthesis step; its loss causes
      heme a-deficient complex IV with cardiomyopathy and Leigh-like
      encephalopathy.
    gene:
      preferred_term: COX15
      term:
        id: hgnc:2263
        label: COX15
- member: COX18-Related COX Deficiency
  member_type: DISEASE
  differentiating_mechanisms:
  - description: >-
      COX18 mediates membrane insertion/export of the COX2 C-terminus; defects
      impair maturation of the mitochondrially encoded core subunit.
    gene:
      preferred_term: COX18
      term:
        id: hgnc:26801
        label: COX18
- member: COA8-Related COX Deficiency
  member_type: DISEASE
  differentiating_mechanisms:
  - description: >-
      COA8 stabilizes the assembling complex IV against oxidative stress; its
      loss gives a complex IV deficiency with a notably variable, sometimes
      slowly progressive course.
    gene:
      preferred_term: COA8
      term:
        id: hgnc:20492
        label: COA8
- member: TACO1-Related COX Deficiency
  member_type: DISEASE
  differentiating_mechanisms:
  - description: >-
      TACO1 is a mitochondrial mRNA translational activator specific for the
      mtDNA-encoded COX I (MT-CO1) core subunit; its loss selectively impairs
      COX I synthesis (a translational, rather than assembly/cofactor, lesion)
      and produces a notably mild, late-onset, basal ganglia-predominant Leigh
      phenotype.
    gene:
      preferred_term: TACO1
      term:
        id: hgnc:24316
        label: TACO1
- member: COX6B1-Related COX Deficiency
  member_type: DISEASE
  differentiating_mechanisms:
  - description: >-
      COX6B1 is a nuclear-encoded *structural* subunit of complex IV (not an
      assembly factor or metallochaperone); its loss destabilizes the holoenzyme
      directly. It is one of the very few structural-subunit defects identified
      in COX deficiency, presenting as infantile encephalomyopathy with
      hydrocephalus and hypertrophic cardiomyopathy (MC4DN7, MONDO:0033637).
    gene:
      preferred_term: COX6B1
      term:
        id: hgnc:2280
        label: COX6B1
- member: COX20-Related COX Deficiency
  member_type: DISEASE
  differentiating_mechanisms:
  - description: >-
      COX20 is an inner-membrane chaperone for the mitochondrially encoded core
      subunit COX2; it stabilizes newly synthesized COX2 and presents it to the
      SCO1/SCO2 copper-metallation module, so its loss stalls assembly at a
      COX2-deficient subassembly. Distinctively, the phenotype is a comparatively
      slowly progressive neurological disorder — hypotonia, cerebellar ataxia,
      dysarthria, dystonia, and sensory-predominant axonal neuropathy — rather
      than fatal infantile cardioencephalomyopathy (MC4DN11, MONDO:0033645).
    gene:
      preferred_term: COX20
      term:
        id: hgnc:26970
        label: COX20
- member: COX11-Related COX Deficiency
  member_type: DISEASE
  differentiating_mechanisms:
  - description: >-
      COX11 is the copper metallochaperone that delivers copper to the CuB
      centre of the core subunit COX1, complementary to the SCO1/SCO2
      metallochaperones that metallate the CuA centre of COX2 — so it completes
      the copper-delivery picture for the holoenzyme. Its loss causes an
      infantile-onset mitochondrial encephalopathy (with Leigh-like features in
      a later case), and the patient-fibroblast ATP deficit is distinctively
      rescuable by coenzyme Q10 (MC4DN23, MONDO:0859520).
    gene:
      preferred_term: COX11
      term:
        id: hgnc:2261
        label: COX11
- member: PET100-Related COX Deficiency
  member_type: DISEASE
  differentiating_mechanisms:
  - description: >-
      PET100 is a small mitochondrial inner-membrane chaperone acting at an
      intermediate stage of holoenzyme assembly, forming a subcomplex with the
      COX subunits and promoting their incorporation; its loss leaves the
      subunits unstable and blocks assembly of fully formed Complex IV.
      Distinctively, the same gene spans a Lebanese founder mutation presenting
      as complex IV-deficient Leigh syndrome with prominent seizures and a
      truncating variant causing fatal neonatal lactic acidosis with multiorgan
      involvement (MC4DN12, MONDO:0033646).
    gene:
      preferred_term: PET100
      term:
        id: hgnc:40038
        label: PET100
- member: COX14-Related COX Deficiency
  member_type: DISEASE
  differentiating_mechanisms:
  - description: >-
      COX14 (formerly C12orf62) is a very small (~6 kDa) single-pass inner-membrane
      factor that couples synthesis of the mtDNA-encoded core subunit COX I
      (MT-CO1) to early holoenzyme assembly; its loss uncouples COX I synthesis
      from assembly, leaving the nascent enzyme complex unstable. Distinctively,
      the lesion sits at the synthesis-assembly coupling step (contrasting with
      the copper/heme-cofactor and later-assembly defects of other members) and
      was first identified in an index subject with severe congenital lactic
      acidosis, dysmorphic features, and a fatal neonatal course (MC4DN10,
      MONDO:0033639).
    gene:
      preferred_term: COX14
      term:
        id: hgnc:28216
        label: COX14
- member: COX5A-Related COX Deficiency
  member_type: DISEASE
  differentiating_mechanisms:
  - description: >-
      COX5A is a nuclear-encoded *structural* subunit of complex IV (like COX6B1,
      and unlike the assembly-factor/metallochaperone defects of most members);
      the reported pathogenic variant sits in the conserved COX5A/COX4 interface
      domain and disrupts subunit interaction during biogenesis, so the monomeric
      COX1 assembly intermediate accumulates. Distinctively, the phenotype is
      early-onset pulmonary arterial hypertension with lactic acidemia and failure
      to thrive — a pulmonary-vascular-dominant presentation rather than the
      encephalopathy/cardiomyopathy of other members — and complex IV deficiency
      is partially rescued by copper supplementation in patient fibroblasts
      (MC4DN20, MONDO:0033655).
    gene:
      preferred_term: COX5A
      term:
        id: hgnc:2267
        label: COX5A
- member: COX4I1-Related COX Deficiency
  member_type: DISEASE
  differentiating_mechanisms:
  - description: >-
      COX4I1 encodes the ubiquitous common isoform of cytochrome c oxidase
      subunit 4 (COX4-1), a nuclear-encoded *structural*/regulatory subunit whose
      loss destabilizes the holoenzyme directly (one of the few structural-subunit
      defects, like COX6B1, rather than an assembly factor or metallochaperone).
      Distinctively, the respiratory-chain defect drives elevated reactive oxygen
      species and increased chromosomal breakage that simulated Fanconi anemia in
      the index case, while a second family showed an encephalopathic Leigh-like
      phenotype — spanning a growth-failure/genomic-instability presentation and a
      neurodegenerative one (MC4DN16, MONDO:0033651).
    gene:
      preferred_term: COX4I1
      term:
        id: hgnc:2265
        label: COX4I1
- member: COX8A-Related COX Deficiency
  member_type: DISEASE
  differentiating_mechanisms:
  - description: >-
      COX8A encodes the ubiquitously expressed isoform of subunit VIII, the
      smallest nuclear-encoded *structural* subunit of cytochrome c oxidase
      (like COX6B1 and COX4I1, a structural-subunit defect rather than an
      assembly factor or metallochaperone). Loss of the wild-type subunit
      severely destabilizes the entire holoenzyme, giving an isolated Complex IV
      deficiency in muscle and fibroblasts that biochemically mirrors SURF1
      disease. Distinctively, the single reported patient presented with a
      Leigh-like syndrome dominated by leukodystrophy and severe, drug-resistant
      epilepsy (MC4DN15, MONDO:0033650).
    gene:
      preferred_term: COX8A
      term:
        id: hgnc:2294
        label: COX8A
- member: COA3-Related COX Deficiency
  member_type: DISEASE
  differentiating_mechanisms:
  - description: >-
      COA3 (CCDC56) is a small inner-membrane Complex IV assembly factor that,
      together with COX14, couples synthesis of the mtDNA-encoded core catalytic
      subunit COX1 with its incorporation into the holoenzyme; the two factors are
      mutually interdependent (each is undetectable when the other is lost).
      Distinctively, the founding patient followed an unusually mild,
      adult-compatible course — sensorimotor peripheral neuropathy, exercise
      intolerance, obesity, and short stature — rather than the early-fatal
      encephalopathy/cardiomyopathy of most members, underscoring the
      tissue-specific expression of the COX1-coupling assembly defect
      (MC4DN14, MONDO:0033649).
    gene:
      preferred_term: COA3
      term:
        id: hgnc:24990
        label: COA3
- member: PET117-Related COX Deficiency
  member_type: DISEASE
  differentiating_mechanisms:
  - description: >-
      PET117 is a small nuclear-encoded Complex IV assembly factor; biallelic
      loss-of-function (a homozygous nonsense variant in the founding sibling
      pair) abolishes functional Pet117 and yields an isolated Complex IV
      deficiency with reduced steady-state COX subunit levels, rescued by
      lentiviral re-expression of wild-type PET117 in patient fibroblasts.
      Distinctively, an earlier proposed copper-insertion role for Pet117 could
      not be confirmed in patient cells, and the presentation is a Leigh-like
      brainstem-predominant phenotype — neurodevelopmental regression with
      medulla oblongata lesions on MRI — rather than the cardiomyopathy or
      peripheral-neuropathy presentations of other members (MC4DN19,
      MONDO:0033654).
    gene:
      preferred_term: PET117
      term:
        id: hgnc:40045
        label: PET117
- member: COX6A2-Related COX Deficiency
  member_type: DISEASE
  differentiating_mechanisms:
  - description: >-
      COX6A2 encodes the heart/skeletal-muscle isoform of structural subunit VIa
      of cytochrome c oxidase (like COX5A, COX6B1, COX8A, and COX4I1, a
      structural-subunit defect rather than an assembly factor or
      metallochaperone). Distinctively, COX6A2 is expressed *only* in striated
      muscle, so biallelic missense variants produce a tissue-restricted Complex
      IV deficiency confined to skeletal and cardiac muscle: the two founding
      Japanese patients had limb and facial muscle weakness with hypotonia (one
      with cardiomyopathy) and no involvement of other organs, contrasting with
      the encephalopathic and multisystem courses of most members (MC4DN18,
      MONDO:0033653).
    gene:
      preferred_term: COX6A2
      term:
        id: hgnc:2279
        label: COX6A2
- member: COXFA4-Related COX Deficiency
  member_type: DISEASE
  differentiating_mechanisms:
  - description: >-
      COXFA4 (formerly NDUFA4) encodes a nuclear-encoded structural subunit of
      cytochrome c oxidase that was historically misassigned to Complex I before
      being recognized as a stoichiometric 14th COX subunit. Like COX5A, COX6B1,
      COX8A, COX4I1, and COX6A2, this is a structural-subunit defect rather than
      an assembly factor or metallochaperone, but unlike the muscle-restricted
      COX6A2 it is ubiquitously expressed and presents as a predominantly
      neurological, relatively mild Leigh syndrome (psychomotor delay,
      brainstem-involving leukoencephalopathy, lactic acidosis) in the two
      reported families (MC4DN21, MONDO:0033656).
    gene:
      preferred_term: COXFA4
      term:
        id: hgnc:7687
        label: NDUFA4
- member: FASTKD5-Related COX Deficiency
  member_type: DISEASE
  differentiating_mechanisms:
  - description: >-
      FASTKD5 encodes a mitochondrial protein that processes the polycistronic
      primary mitochondrial transcript at non-canonical cleavage sites, a step
      required for maturation of the mtDNA-encoded mRNAs. This is mechanistically
      distinct from every other member: where the assembly factors, metallochaperones,
      and structural subunits act at or after holoenzyme assembly and TACO1 acts as
      a translational activator, FASTKD5 acts upstream of translation at the
      mRNA-processing step — its loss impairs maturation of the COX1 mRNA, reducing
      COX1 translation and stalling Complex IV assembly. It presents as early- to
      late-onset Leigh syndrome (MC4DN24, MONDO:0980755), with the magnitude of the
      Complex IV deficiency correlating with clinical severity.
    gene:
      preferred_term: FASTKD5
      term:
        id: hgnc:25790
        label: FASTKD5
notes: >-
  Most members are nuclear-encoded assembly-factor/metallochaperone defects
  (MONDO nuclear-type), distinct from primary mtDNA-encoded subunit mutations.
  Several members are exceptions to the assembly-factor/metallochaperone theme:
  COX6B1, COX5A, COX4I1, COX8A, COX6A2, and COXFA4 are nuclear-encoded *structural* subunits whose loss
  destabilizes the holoenzyme directly; TACO1 is a mitochondrial mRNA
  translational activator for the mtDNA-encoded COX I (MT-CO1) core subunit (a
  translational rather than assembly/cofactor lesion); and FASTKD5 is a
  mitochondrial mRNA-processing factor whose loss impairs maturation of the COX1
  mRNA (an RNA-processing lesion upstream of translation). All still produce
  nuclear-type complex IV biogenesis failure and so satisfy the
  module-conformance criterion. The
  differentiating axis is the lesion affected (copper delivery, heme a synthesis,
  membrane insertion, holoenzyme assembly, stabilization, structural subunit,
  mtDNA translation, or mtDNA mRNA processing) and the dominant high-energy tissue
  (brain vs heart vs liver).
