name: Disorders of Sex Development
display_name: Disorders/Differences of Sex Development (DSD)
creation_date: "2026-06-13T00:00:00Z"
description: >-
  Disorders/differences of sex development (DSD) are congenital conditions in
  which the development of chromosomal, gonadal, or anatomical sex is atypical,
  producing discordance between karyotype, gonadal differentiation, and the
  internal/external genital phenotype. The group spans defects of gonadal
  determination (the testis- or ovary-determination pathway) and defects of sex
  steroid synthesis or action downstream of a determined gonad. It is a clinical
  classification rather than a single mechanism: members are united by the
  diagnostic framework (karyotype + gonadal + phenotypic sex) used to evaluate
  atypical sex development.
grouping_basis:
- CLINICAL_CONVENTION
- SHARED_PHENOTYPE
grouping_rationale: >-
  Grouped by the clinical DSD framework, which is organized by karyotype (46,XX
  DSD, 46,XY DSD, sex-chromosome DSD) and by the level of the lesion (gonadal
  determination vs androgen synthesis/action). Members are kept as separate
  Disease entries because they have distinct molecular causes — testis/ovary
  determination genes (SRY/SOX9 pathway, FSHR), androgen biosynthetic enzymes
  (HSD17B3), and peripheral androgen activation (SRD5A2) — and distinct
  management implications. This is not a single-mechanism union, so the criteria
  are stated as NECESSARY (every member shows karyotype-phenotype sex discordance)
  rather than defining a mechanism; the grouping does not recapitulate the MONDO
  hierarchy.
mappings:
  mondo_mappings:
  - term:
      id: MONDO:0002145
      label: disorder of sexual differentiation
    mapping_predicate: skos:closeMatch
    mapping_source: MONDO
membership_criteria:
- description: >-
    A member is a congenital condition with discordance between chromosomal sex,
    gonadal sex, and/or anatomical sex — i.e., it falls within the clinical DSD
    classification (46,XX DSD, 46,XY DSD, or sex-chromosome DSD).
  criteria_semantics: NECESSARY
  logic:
    criterion_predicate: OTHER
    description: >-
      Atypical development of chromosomal, gonadal, or anatomical sex producing
      karyotype-gonad-phenotype discordance (clinical DSD definition).
members:
- member: 46,XY complete gonadal dysgenesis
  member_type: DISEASE
  differentiating_mechanisms:
  - description: >-
      Failure of testis determination in a 46,XY individual (e.g., SRY variants /
      Swyer syndrome): streak gonads, female external genitalia, and Mullerian
      structures despite a Y chromosome — a gonadal-determination DSD.
    gene:
      preferred_term: SRY
      term:
        id: hgnc:11311
        label: SRY
- member: 46,XX testicular disorder of sex development
  member_type: DISEASE
  differentiating_mechanisms:
  - description: >-
      Testis development in a 46,XX individual, usually from translocation of SRY
      onto an X chromosome — the mirror image of XY gonadal dysgenesis, with a
      male phenotype in a 46,XX karyotype.
    gene:
      preferred_term: SRY
      term:
        id: hgnc:11311
        label: SRY
- member: 46,XX Gonadal Dysgenesis
  member_type: DISEASE
  differentiating_mechanisms:
  - description: >-
      Failure of ovarian development in a 46,XX individual (e.g., FSHR defects),
      producing streak gonads and hypergonadotropic hypogonadism — the
      46,XX gonadal-determination DSD.
    gene:
      preferred_term: FSHR
      term:
        id: hgnc:3969
        label: FSHR
- member: 46,XY disorder of sex development due to 17-beta-hydroxysteroid dehydrogenase 3 deficiency
  member_type: DISEASE
  differentiating_mechanisms:
  - description: >-
      A 46,XY androgen-biosynthesis defect: HSD17B3 cannot convert
      androstenedione to testosterone, causing undervirilization with
      virilization at puberty — a steroidogenic (not determination) DSD.
    gene:
      preferred_term: HSD17B3
      term:
        id: hgnc:5212
        label: HSD17B3
- member: 46,XY disorder of sex development due to 5-alpha-reductase 2 deficiency
  member_type: DISEASE
  differentiating_mechanisms:
  - description: >-
      A 46,XY peripheral androgen-activation defect: SRD5A2 cannot convert
      testosterone to dihydrotestosterone, so external virilization fails
      prenatally but Wolffian structures form — a defect of androgen action, not
      synthesis or determination.
    gene:
      preferred_term: SRD5A2
      term:
        id: hgnc:11285
        label: SRD5A2
notes: >-
  A clinical-convention grouping (no shared mechanism module). The differentiating
  axis is the level of the lesion: gonadal determination (SRY, FSHR) vs androgen
  synthesis (HSD17B3) vs androgen activation (SRD5A2), stratified by karyotype.
