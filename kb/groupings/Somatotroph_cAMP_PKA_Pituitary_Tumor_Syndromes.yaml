name: Somatotroph cAMP/PKA Pituitary Tumor Syndromes
display_name: Somatotroph cAMP/PKA Pituitary Tumor Syndromes
creation_date: "2026-06-18T00:00:00Z"
description: >-
  Somatotroph cAMP/PKA pituitary tumor syndromes are growth-hormone-secreting
  pituitary adenoma or hyperplasia disorders in which distinct genetic lesions
  converge on increased cAMP availability, cAMP/PKA signaling, growth hormone
  secretion, and somatotroph proliferation. The group captures AIP-related
  familial pituitary adenoma predisposition, GNAS-driven somatotroph adenoma,
  and GPR101 dosage-driven pituitary adenoma/hyperplasia as parallel entry
  points into the same somatotroph signaling module.
grouping_basis:
- SHARED_MECHANISM
- SHARED_PATHWAY
grouping_rationale: >-
  Grouped on the shared somatotroph cAMP/PKA overactivation mechanism: every
  member conforms to the somatotroph_camp_pka_overactivation module, with
  increased cAMP/PKA signaling driving growth hormone excess and adenoma or
  hyperplasia growth. The members are kept as separate Disease entries because
  the initiating lesions differ substantially: AIP acts as a tumor-suppressor
  predisposition with reduced inhibitory/catabolic restraint, GNAS acts through
  somatic constitutive Gs-alpha activation, and GPR101 acts primarily through
  copy-number gain of a GPCR entry point.
membership_criteria:
- description: >-
    A disorder belongs to this grouping if and only if it conforms to the
    somatotroph cAMP/PKA overactivation module, linking a pituitary
    somatotroph-lineage lesion to increased cAMP/PKA signaling, growth hormone
    secretion, and somatotroph proliferation.
  criteria_semantics: NECESSARY_AND_SUFFICIENT
  logic:
    criterion_predicate: CONFORMS_TO_MODULE
    module: somatotroph_camp_pka_overactivation#Increased cAMP/PKA signaling in somatotrophs
    description: >-
      Conforms to the somatotroph cAMP/PKA overactivation module.
members:
- member: AIP-related pituitary adenoma predisposition
  member_type: DISEASE
  differentiating_mechanisms:
  - description: >-
      Germline AIP loss predisposes to young-onset, often macroadenomatous
      somatotroph-predominant pituitary tumors by weakening AIP-dependent
      restraint on cAMP signaling and somatotroph growth.
    gene:
      preferred_term: AIP
      term:
        id: hgnc:358
        label: AIP
- member: GNAS-related pituitary adenoma 3
  member_type: DISEASE
  differentiating_mechanisms:
  - description: >-
      Somatic activating GNAS variants stabilize Gs-alpha signaling, increase
      adenylyl cyclase and cAMP production, and drive growth-hormone-secreting
      pituitary adenoma through a cell-autonomous oncogenic entry point.
    gene:
      preferred_term: GNAS
      term:
        id: hgnc:4392
        label: GNAS
- member: GPR101-related pituitary adenoma 2
  member_type: DISEASE
  differentiating_mechanisms:
  - description: >-
      GPR101 copy-number gain or dysregulation creates a dosage-driven GPCR
      input into adenylyl cyclase and cAMP/PKA signaling, typically producing
      early growth hormone excess with pituitary hyperplasia or adenoma.
    gene:
      preferred_term: GPR101
      term:
        id: hgnc:14963
        label: GPR101
notes: >-
  Module-defined grouping over existing DisMech entries. It deliberately groups
  the shared downstream somatotroph signaling mechanism without merging the
  distinct gene-level etiologies.
