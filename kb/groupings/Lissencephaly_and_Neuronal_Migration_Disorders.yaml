            id: HP:0002269
            label: Abnormality of neuronal migration
members:
- member: Lissencephaly Spectrum Disorders
  member_type: DISEASE
  differentiating_mechanisms:
  - description: >-
      The classic lissencephaly/subcortical-band-heterotopia core, especially
      PAFAH1B1/LIS1 dosage-sensitive dynein regulation and DCX-dependent
      microtubule stabilization, anchors the microtubule migration branch.
    gene:
      preferred_term: PAFAH1B1
      term:
        id: hgnc:8574
        label: PAFAH1B1
    module: "microtubule_dependent_neuronal_migration_failure#Microtubule Apparatus Perturbation"
  - description: >-
      DCX variants distinguish the X-linked lissencephaly/subcortical band
      heterotopia branch through microtubule binding and stabilization defects
      in migrating neurons.
    gene:
      preferred_term: DCX
      term:
        id: hgnc:2714
        label: DCX
    module: "microtubule_dependent_neuronal_migration_failure#Microtubule-Based Neuronal Motility Failure"
- member: Miller-Dieker Lissencephaly Syndrome
  member_type: DISEASE
  differentiating_mechanisms:
  - description: >-
      A 17p13.3 contiguous-gene deletion removes PAFAH1B1/LIS1 and produces a
      severe classic lissencephaly phenotype with additional deletion-syndrome
      features.
    gene:
      preferred_term: PAFAH1B1
      term:
        id: hgnc:8574
        label: PAFAH1B1
    module: "microtubule_dependent_neuronal_migration_failure#Microtubule Apparatus Perturbation"
  - description: >-
      YWHAE co-deletion helps distinguish Miller-Dieker syndrome from isolated
      PAFAH1B1-related lissencephaly sequence.
    gene:
      preferred_term: YWHAE
      term:
        id: hgnc:12851
        label: YWHAE
- member: Reelin Pathway Lissencephaly
  member_type: DISEASE
  differentiating_mechanisms:
  - description: >-
      RELN/VLDLR/LRP8/DAB1 signaling failure disrupts terminal somal
      translocation and inside-out lamination rather than the LIS1/DCX
      microtubule migration skeleton.
    gene:
      preferred_term: RELN
      term:
        id: hgnc:9957
        label: RELN
    module: "reelin_terminal_translocation_lamination_failure#Terminal Somal Translocation Failure"
- member: ARX-Related Lissencephaly and Interneuronopathy
  member_type: DISEASE
  differentiating_mechanisms:
  - description: >-
      ARX perturbs subpallial interneuron lineage programs and tangential
      migration, linking cortical malformation to interneuron deficit, genital
      anomalies, and severe developmental epilepsy.
    gene:
      preferred_term: ARX
      term:
        id: hgnc:18060
        label: ARX
    module: "interneuron_specification_tangential_migration_failure#Tangential Migration Failure from Ganglionic Eminences"
- member: NDE1-related Microcephaly-Lissencephaly
  member_type: DISEASE
  differentiating_mechanisms:
  - description: >-
      NDE1 links dynein/centrosome function to both neural progenitor division
      and postmitotic migration, producing the severe microlissencephaly branch.
    gene:
      preferred_term: NDE1
      term:
        id: hgnc:17619
        label: NDE1
    module: "neural_progenitor_centrosome_spindle_dysfunction#Centrosome and Mitotic Spindle Perturbation"
- member: CRADD-Related Thin Lissencephaly
  member_type: DISEASE
  differentiating_mechanisms:
  - description: >-
      CRADD/RAIDD loss reduces PIDDosome-caspase-2 developmental neuronal
      apoptosis, producing megalencephaly with thin lissencephaly rather than a
      canonical migration-arrest lissencephaly.
    gene:
      preferred_term: CRADD
      term:
        id: hgnc:2340
        label: CRADD
    module: "neural_progenitor_centrosome_spindle_dysfunction#Abnormal Cortical Neuron Output and Gyration"
- member: TUBA1A-related Tubulinopathy
  member_type: DISEASE
  differentiating_mechanisms:
  - description: >-
      TUBA1A is the major neuronal alpha-tubulin branch, with alpha-tubulin
      heterodimer and MAP-binding defects causing lissencephaly, basal ganglia
      dysmorphism, corpus callosum anomalies, and cerebellar hypoplasia.
    gene:
      preferred_term: TUBA1A
      term:
        id: hgnc:20766
        label: TUBA1A
    module: "microtubule_dependent_neuronal_migration_failure#Microtubule Apparatus Perturbation"
- member: TUBB2A/TUBB2B-related Cortical Malformation
  member_type: DISEASE
  differentiating_mechanisms:
  - description: >-
      TUBB2A/TUBB2B beta-tubulin defects preferentially produce polymicrogyria
      or dysgyria-like cortical malformations, distinguishing this branch from
      classic LIS1/DCX lissencephaly.
    gene:
      preferred_term: TUBB2A
      term:
        id: hgnc:12412
        label: TUBB2A
    module: "microtubule_dependent_neuronal_migration_failure#Cortical Dyslamination and Neuronal Ectopia"
  - description: >-
      TUBB2B contributes the second beta-tubulin locus in this paired
      tubulinopathy entry.
    gene:
      preferred_term: TUBB2B
      term:
        id: hgnc:30829
        label: TUBB2B
- member: TUBB3-related Tubulinopathy
  member_type: DISEASE
  differentiating_mechanisms:
  - description: >-
      TUBB3 is distinguished by a strong axon guidance and projection-wiring
      branch, with variable cortical dyslamination and extraocular motor-neuron
      phenotypes.
    gene:
      preferred_term: TUBB3
      term:
        id: hgnc:20772
        label: TUBB3
    module: "microtubule_dependent_neuronal_migration_failure#Axon Guidance and Projection Wiring Defects"
- member: TUBB/TUBB5-related Microcephaly
  member_type: DISEASE
  differentiating_mechanisms:
  - description: >-
      TUBB/TUBB5 couples beta-tubulin dysfunction to both microtubule-dependent
      migration failure and progenitor-output defects, producing microcephaly
      with cortical malformation.
    gene:
      preferred_term: TUBB
      term:
        id: hgnc:20778
        label: TUBB
    module: "microtubule_dependent_neuronal_migration_failure#Microtubule Apparatus Perturbation"
- member: ADGRG1-related Bilateral Frontoparietal Polymicrogyria
  member_type: DISEASE
  differentiating_mechanisms:
  - description: >-
      ADGRG1/GPR56 disrupts collagen III-associated pial ECM signaling,
      radial-glial endfoot anchoring, and pial boundary integrity, causing
      regional overmigration and frontoparietal polymicrogyria.
    gene:
      preferred_term: ADGRG1
      term:
        id: hgnc:4512
        label: ADGRG1
    module: "pial_basement_membrane_radial_glial_endfoot_failure#Neuronal Overmigration Across the Pial Boundary"
- member: SRPX2-related Speech-Epilepsy-Polymicrogyria
  member_type: DISEASE
  differentiating_mechanisms:
  - description: >-
      SRPX2 links speech-language epilepsy phenotypes to polymicrogyria through
      a microtubule/migration-associated cortical dyslamination branch.
    gene:
      preferred_term: SRPX2
      term:
        id: hgnc:30668
        label: SRPX2
    module: "microtubule_dependent_neuronal_migration_failure#Cortical Dyslamination and Neuronal Ectopia"
- member: Periventricular Nodular Heterotopia
  member_type: DISEASE
  differentiating_mechanisms:
  - description: >-
      FLNA and related apical-neuroependyma genes disrupt ventricular-surface
      integrity and progenitor/neuron positioning, producing periventricular
      heterotopic nodules rather than surface gyral simplification.
    gene:
      preferred_term: FLNA
      term:
        id: hgnc:3754
        label: FLNA
    module: "apical_neuroependyma_integrity_failure#Periventricular Heterotopic Nodules"
- member: EML1-related Ribbon-like Subcortical Heterotopia
  member_type: DISEASE
  differentiating_mechanisms:
  - description: >-
      EML1/EMAP-1 perturbs centrosome and microtubule organization in neural
      progenitors, producing megalencephaly with ribbon-like subcortical
      heterotopia rather than the classic lissencephaly pattern.
    gene:
      preferred_term: EML1
      term:
        id: hgnc:3330
        label: EML1
    module: "neural_progenitor_centrosome_spindle_dysfunction#Abnormal Cortical Neuron Output and Gyration"
- member: KATNB1-related Cortical Malformation
  member_type: DISEASE
  differentiating_mechanisms:
  - description: >-
      KATNB1, the regulatory subunit of katanin, links centrosome integrity and
      microtubule severing to both neural progenitor defects and neuronal
      migration/cortical dyslamination.
    gene:
      preferred_term: KATNB1
      term:
        id: hgnc:6217
        label: KATNB1
    module: "microtubule_dependent_neuronal_migration_failure#Cortical Dyslamination and Neuronal Ectopia"
notes: >-
  This grouping intentionally overlaps Tubulinopathies and Primary Microcephaly
  Spectrum: those groupings organize different axes (gene family and
  progenitor-pool depletion), whereas this grouping organizes the shared
  malformation-of-cortical-development space around cortical positioning,
  lamination, and gyration. Congenital Zika Syndrome is excluded for now because
  it is primarily an acquired infectious fetal progenitor-cytopathy entry rather
  than a member of the inherited lissencephaly/neuronal-positioning nosology,
  although it remains a useful mechanistic comparator for disrupted cortical
  neurogenesis and congenital cortical malformation.
