name: Lissencephaly and Neuronal Migration Disorders
display_name: Lissencephaly and Neuronal Migration/Cortical Positioning Disorders
creation_date: "2026-06-13T00:00:00Z"
description: >-
  A group of malformations of cortical development in which defective neuronal
  positioning, cortical lamination, radial or tangential migration, terminal
  translocation, pial-boundary integrity, apical neuroependyma integrity, or
  progenitor output disrupts normal cortical gyration and layering. The shared
  clinical-anatomic space includes lissencephaly, pachygyria, subcortical band
  heterotopia, polymicrogyria, periventricular nodular heterotopia, and related
  cortical dyslamination phenotypes.
grouping_basis:
- SHARED_MECHANISM
- SHARED_PHENOTYPE
- CLINICAL_CONVENTION
grouping_rationale: >-
  Grouped as an auditable union of cortical malformation entries where the
  primary disease model disrupts cortical neuron placement, cortical lamination,
  or cortical gyration. The members are deliberately kept as separate Disease
  entries because the proximal mechanisms are not interchangeable: PAFAH1B1/DCX
  and tubulin disorders perturb microtubule-dependent migration, RELN/VLDLR
  disorders perturb terminal somal translocation and lamination, ARX disorders
  perturb interneuron specification and tangential migration, ADGRG1/GPR56
  disease perturbs pial basement membrane/radial-glial endfoot integrity, FLNA
  and related periventricular heterotopia genes perturb apical neuroependyma
  integrity, and CRADD/EML1/KATNB1/NDE1 connect cortical malformation to
  progenitor, apoptosis, centrosome, or microtubule branches. The criteria are
  NECESSARY: membership entails a cortical positioning/lamination/gyration
  mechanism and a cortical malformation phenotype, but those features alone are
  not sufficient to infer membership because broad developmental brain
  malformations, tumor-associated dyslamination, and acquired cortical injury
  can converge on similar imaging terms.
mappings:
  mondo_mappings:
  - term:
      id: MONDO:0018838
      label: lissencephaly spectrum disorders
    mapping_predicate: skos:relatedMatch
    mapping_source: MONDO
    mapping_justification: >-
      relatedMatch rather than closeMatch: the grouping includes the MONDO
      lissencephaly spectrum core but is intentionally broader, spanning related
      cortical positioning phenotypes such as polymicrogyria, heterotopia, and
      selected tubulinopathy/cortical malformation entries.
    consistency:
    - reference: MONDO
      consistent: INCONSISTENT
      notes: >-
        Several members are not is-a descendants of MONDO:0018838 because this
        grouping is mechanism and phenotype oriented rather than a direct
        recapitulation of the MONDO lissencephaly subtree.
membership_criteria:
- description: >-
    A member has a primary developmental cortical-positioning mechanism
    represented by one of the dismech cortical malformation modules, and has a
    cortical malformation phenotype such as lissencephaly, thin lissencephaly,
    pachygyria, polymicrogyria, bilateral perisylvian polymicrogyria, gray
    matter heterotopia, subcortical band heterotopia, periventricular nodular
    heterotopia, or abnormal neuronal migration.
  criteria_semantics: NECESSARY
  logic:
    operator: AND
    operands:
    - operator: OR
      operands:
      - criterion_predicate: CONFORMS_TO_MODULE
        module: "microtubule_dependent_neuronal_migration_failure#Microtubule-Based Neuronal Motility Failure"
        description: >-
          Microtubule-dependent neuronal motility, nucleokinesis, migration, or
          cortical dyslamination failure.
      - criterion_predicate: CONFORMS_TO_MODULE
        module: "reelin_terminal_translocation_lamination_failure#Terminal Somal Translocation Failure"
        description: >-
          Reelin-pathway terminal somal translocation and cortical lamination
          failure.
      - criterion_predicate: CONFORMS_TO_MODULE
        module: "interneuron_specification_tangential_migration_failure#Tangential Migration Failure from Ganglionic Eminences"
        description: >-
          Interneuron specification, differentiation, or tangential migration
          failure from subpallial progenitor domains.
      - criterion_predicate: CONFORMS_TO_MODULE
        module: "pial_basement_membrane_radial_glial_endfoot_failure#Neuronal Overmigration Across the Pial Boundary"
        description: >-
          Pial basement membrane or radial-glial basal endfoot failure with
          neuronal overmigration.
      - criterion_predicate: CONFORMS_TO_MODULE
        module: "apical_neuroependyma_integrity_failure#Secondary Neuronal Positioning and Migration Defects"
        description: >-
          Apical neuroependyma or ventricular-surface integrity failure causing
          secondary neuronal positioning defects.
      - criterion_predicate: CONFORMS_TO_MODULE
        module: "neural_progenitor_centrosome_spindle_dysfunction#Abnormal Cortical Neuron Output and Gyration"
        description: >-
          Progenitor centrosome, spindle, apoptosis, or cell-output defects that
          produce abnormal cortical size, gyration, or lamination.
    - operator: OR
      operands:
      - criterion_predicate: HAS_PHENOTYPE
        description: Lissencephaly.
        phenotype_term:
          preferred_term: Lissencephaly
          term:
            id: HP:0001339
            label: Lissencephaly
      - criterion_predicate: HAS_PHENOTYPE
        description: Thin lissencephaly.
        phenotype_term:
          preferred_term: Thin lissencephaly
          term:
            id: HP:0020188
            label: Anterior predominant pachygyria with 5-10 mm cortical thickness
      - criterion_predicate: HAS_PHENOTYPE
        description: Pachygyria.
        phenotype_term:
          preferred_term: Pachygyria
          term:
            id: HP:0001302
            label: Pachygyria
      - criterion_predicate: HAS_PHENOTYPE
        description: Polymicrogyria.
        phenotype_term:
          preferred_term: Polymicrogyria
          term:
            id: HP:0002126
            label: Polymicrogyria
      - criterion_predicate: HAS_PHENOTYPE
        description: Bilateral perisylvian polymicrogyria.
        phenotype_term:
          preferred_term: Bilateral perisylvian polymicrogyria
          term:
            id: HP:0032407
            label: Bilateral perisylvian polymicrogyria
      - criterion_predicate: HAS_PHENOTYPE
        description: Gray matter heterotopia.
        phenotype_term:
          preferred_term: Gray matter heterotopia
          term:
            id: HP:0002282
            label: Gray matter heterotopia
      - criterion_predicate: HAS_PHENOTYPE
        description: Subcortical band heterotopia.
        phenotype_term:
