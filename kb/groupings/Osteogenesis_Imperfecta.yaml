name: Osteogenesis Imperfecta
display_name: Osteogenesis Imperfecta
creation_date: "2026-06-14T00:00:00Z"
description: >-
  A curated grouping of explicit osteogenesis imperfecta disease entries
  spanning classic COL1A1/COL1A2-related type I collagen quantitative and
  structural disorders, IFITM5-related type V disease, and CRTAP-related type
  VII disease. Members share intrinsic bone fragility with recurrent or prenatal
  fractures, low bone mass, abnormal bone matrix or mineralization, skeletal
  deformity, and variable extraskeletal connective-tissue manifestations.
grouping_basis:
- SHARED_MECHANISM
- SHARED_PHENOTYPE
grouping_rationale: >-
  Grouped as an explicit curated union of Disease entries that are named
  osteogenesis imperfecta subtypes, not as all skeletal dysplasias, all
  osteoporosis disorders, or every MONDO descendant. The shared boundary is
  intrinsic heritable brittle-bone disease caused by defects in type I collagen
  quantity or structure, collagen post-translational modification/folding, bone
  matrix mineralization, or osteoblast differentiation/signaling. Current
  members include the curated KB entries for types I, II, III, IV, V, VI, VII,
  and VIII; future batches can add high-value missing OI subtypes such as type
  IX, X, XI, XIII, WNT1-related OI, and other dyadic gene-defined OI entities.
mappings:
  mondo_mappings:
  - term:
      id: MONDO:0019019
      label: osteogenesis imperfecta
    mapping_predicate: skos:closeMatch
    mapping_source: MONDO
    mapping_justification: >-
      closeMatch: the grouping corresponds to the MONDO osteogenesis imperfecta
      class, but is implemented as an explicit curated subset of current
      dismech Disease entries rather than as an automatic ontology closure over
      all OI and OI-like disorders.
    consistency:
    - reference: MONDO
      consistent: CONSISTENT
      notes: >-
        Listed members are MONDO osteogenesis imperfecta type I, II, III, IV, V,
        VI, VII, and VIII entries currently available in the knowledge base. Additional
        MONDO OI subtypes should be added only when standalone Disease entries
        are curated.
membership_criteria:
- description: >-
    A member is an explicit osteogenesis imperfecta disease entry with intrinsic
    heritable bone fragility and at least one core OI manifestation such as
    recurrent fractures, multiple prenatal fractures, reduced bone mineral
    density, or osteoporosis.
  criteria_semantics: NECESSARY
  logic:
    operator: OR
    operands:
    - criterion_predicate: HAS_PHENOTYPE
      description: Recurrent fractures.
      phenotype_term:
        preferred_term: Recurrent fractures
        term:
          id: HP:0002757
          label: Recurrent fractures
    - criterion_predicate: HAS_PHENOTYPE
      description: Multiple prenatal fractures.
      phenotype_term:
        preferred_term: Multiple prenatal fractures
        term:
          id: HP:0005855
          label: Multiple prenatal fractures
    - criterion_predicate: HAS_PHENOTYPE
      description: Reduced bone mineral density.
      phenotype_term:
        preferred_term: Reduced bone mineral density
        term:
          id: HP:0004349
          label: Reduced bone mineral density
    - criterion_predicate: HAS_PHENOTYPE
      description: Osteoporosis.
      phenotype_term:
        preferred_term: Osteoporosis
        term:
          id: HP:0000939
          label: Osteoporosis
members:
- member: Osteogenesis Imperfecta Type I
  member_type: DISEASE
  differentiating_mechanisms:
  - description: >-
      Mild non-deforming OI most often caused by COL1A1 haploinsufficiency,
      producing reduced quantity of otherwise normal type I collagen with
      recurrent fractures, blue sclerae, osteoporosis, and variable
      dentinogenesis imperfecta or hearing impairment.
    gene:
      preferred_term: COL1A1
      term:
        id: hgnc:2197
        label: COL1A1
- member: Osteogenesis Imperfecta Type II
  member_type: DISEASE
  differentiating_mechanisms:
  - description: >-
      Perinatal-lethal OI caused by severe dominant-negative type I collagen
      structural defects, with multiple prenatal fractures, profound reduced
      bone mineral density, crumpled long bones, rib fractures, and respiratory
      compromise.
    gene:
      preferred_term: COL1A1
      term:
        id: hgnc:2197
        label: COL1A1
  - description: >-
      COL1A2 structural variants can produce the same lethal type II collagen
      matrix phenotype with severely abnormal bone formation and prenatal
      fractures.
    gene:
      preferred_term: COL1A2
      term:
        id: hgnc:2198
        label: COL1A2
- member: Osteogenesis Imperfecta Type III
  member_type: DISEASE
  differentiating_mechanisms:
  - description: >-
      Severe progressively deforming OI caused by dominant-negative COL1A1 or
      COL1A2 collagen structural variants, with recurrent fractures, severe
      short stature, scoliosis, dentinogenesis imperfecta, reduced bone mineral
      density, and loss of ambulation in severe cases.
    gene:
      preferred_term: COL1A1
      term:
        id: hgnc:2197
        label: COL1A1
  - description: >-
      COL1A2 dominant-negative variants can drive the type III progressive
      deforming phenotype through abnormal type I collagen fibril organization
      and bone development.
    gene:
      preferred_term: COL1A2
      term:
        id: hgnc:2198
        label: COL1A2
- member: Osteogenesis Imperfecta Type IV
  member_type: DISEASE
  differentiating_mechanisms:
  - description: >-
      Moderate OI caused by COL1A1 or COL1A2 collagen defects, with recurrent
      fractures, reduced bone mineral density, bowing of the long bones,
      scoliosis, dentinogenesis imperfecta, and variable scleral color.
    gene:
      preferred_term: COL1A1
      term:
        id: hgnc:2197
        label: COL1A1
  - description: >-
      COL1A2 variants contribute to the genetically heterogeneous type IV
      spectrum through impaired collagen folding, fibril organization, and bone
      mineralization.
    gene:
      preferred_term: COL1A2
      term:
        id: hgnc:2198
        label: COL1A2
- member: Osteogenesis Imperfecta Type V
  member_type: DISEASE
  differentiating_mechanisms:
  - description: >-
      IFITM5-related non-collagen OI, usually driven by the recurrent 5' UTR
      gain-of-function variant, with recurrent fractures plus distinctive
      hyperplastic callus formation, interosseous membrane calcification,
      radial-head dislocation, dense metaphyseal bands, and abnormal osteoblast
      differentiation/signaling.
    gene:
      preferred_term: IFITM5
      term:
        id: hgnc:16644
        label: IFITM5
- member: Osteogenesis Imperfecta Type VI
  member_type: DISEASE
  differentiating_mechanisms:
  - description: >-
      SERPINF1-related recessive OI with structurally normal type I collagen and
      a unique primary mineralization defect: loss of secreted PEDF causes
      accumulation of unmineralized osteoid with a pathognomonic "fish-scale"
      lamellation pattern and increased RANKL-driven osteoclastic resorption.
      Distinguished by post-natal fracture onset, white/faintly blue sclerae,
      absent dentinogenesis imperfecta and hearing loss, elevated childhood serum
      alkaline phosphatase, and a characteristic responsiveness to anti-RANKL
      denosumab rather than bisphosphonates.
    gene:
      preferred_term: SERPINF1
      term:
        id: hgnc:8824
        label: SERPINF1
    module: osteoporosis_bone_resorption
- member: Osteogenesis Imperfecta Type VII
  member_type: DISEASE
  differentiating_mechanisms:
  - description: >-
      CRTAP-related recessive OI caused by impaired collagen prolyl
      3-hydroxylation and collagen folding/post-translational modification,
      with recurrent fractures, rhizomelia, growth delay, severe osteoporosis,
      and skeletal deformity.
    gene:
      preferred_term: CRTAP
      term:
        id: hgnc:2379
        label: CRTAP
- member: Osteogenesis Imperfecta Type VIII
  member_type: DISEASE
  differentiating_mechanisms:
  - description: >-
      P3H1 (LEPRE1)-related recessive OI; the closest sibling of type VII,
      caused by loss of the same ER prolyl 3-hydroxylation complex (P3H1 is the
      enzymatic subunit that mutually stabilizes CRTAP). Loss leaves alpha1(I)
      Pro986 unmodified, delays collagen folding, and causes overmodification
      and a defective, extremely undermineralized bone matrix. Severe-to-lethal
      with white sclerae and rhizomelia; relatively frequent in West African and
      African American populations through the c.1080+1G>T founder allele.
    gene:
      preferred_term: P3H1
      term:
        id: hgnc:19316
        label: P3H1
notes: >-
  Exclude isolated osteoporosis, hypophosphatasia, achondrogenesis,
  atelosteogenesis, Ehlers-Danlos syndrome, and broad skeletal dysplasia entries
  unless the standalone Disease entry is explicitly curated as osteogenesis
  imperfecta or as a clearly labeled OI/brittle-bone boundary entity.
