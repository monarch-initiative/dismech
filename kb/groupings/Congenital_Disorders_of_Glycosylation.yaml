name: Congenital Disorders of Glycosylation
display_name: Congenital Disorders of Glycosylation (CDG)
creation_date: "2026-06-13T00:00:00Z"
description: >-
  The congenital disorders of glycosylation (CDG) are a large group of inborn
  errors of metabolism caused by defects in the synthesis and attachment of
  glycans to proteins and lipids. Defects in the assembly of the lipid-linked
  oligosaccharide precursor, its transfer to nascent proteins (N-linked
  glycosylation), or its remodeling in the Golgi (including O-linked and
  multiple-pathway defects) impair the glycosylation of many client proteins
  simultaneously. The shared consequence is a multisystem disorder, classically
  with neurological involvement (developmental delay, hypotonia, seizures),
  often with hepatic, coagulation, endocrine, and dysmorphic features.
grouping_basis:
- SHARED_PATHWAY
grouping_rationale: >-
  Grouped on a shared biosynthetic pathway: each member is a defect in
  protein/lipid glycosylation. Members are kept as separate Disease entries
  because they disrupt different steps — assembly and extension of the
  lipid-linked oligosaccharide (ALG9, ALG12), the dolichol/dolichol-phosphate
  supply (DOLK/DK1, MPDU1), Golgi N-glycan branching (MGAT2), and Golgi
  trafficking via the conserved oligomeric Golgi complex (COG1, COG7). The
  criteria are NECESSARY (every member is a glycosylation defect); CDG is a
  pathway-based classification and the grouping does not attempt to recapitulate
  the full MONDO CDG hierarchy.
mappings:
  mondo_mappings:
  - term:
      id: MONDO:0015286
      label: congenital disorder of glycosylation
    mapping_predicate: skos:closeMatch
    mapping_source: MONDO
membership_criteria:
- description: >-
    A member is caused by a defect in the synthesis, attachment, or Golgi
    remodeling of protein N-glycans, and accordingly perturbs N-linked
    glycosylation — either its assembly/transfer step (protein N-linked
    glycosylation) or its downstream Golgi maturation step (N-glycan
    processing).
  criteria_semantics: NECESSARY
  logic:
    operator: OR
    description: >-
      Perturbs N-linked glycosylation at the assembly/transfer or Golgi-
      processing step — the shared, machine-checkable biological process across
      the group.
    operands:
    - criterion_predicate: HAS_BIOLOGICAL_PROCESS
      description: Involves protein N-linked glycosylation (assembly/transfer).
      biological_processes:
      - preferred_term: protein N-linked glycosylation
        term:
          id: GO:0006487
          label: protein N-linked glycosylation
    - criterion_predicate: HAS_BIOLOGICAL_PROCESS
      description: Involves N-glycan processing (Golgi maturation).
      biological_processes:
      - preferred_term: N-glycan processing
        term:
          id: GO:0006491
          label: N-glycan processing
members:
- member: ALG9-congenital disorder of glycosylation
  member_type: DISEASE
  differentiating_mechanisms:
  - description: >-
      ALG9 mannosyltransferase adds mannose residues to the lipid-linked
      oligosaccharide; its deficiency truncates the N-glycan precursor (CDG-Il),
      a classic N-linked assembly defect.
    gene:
      preferred_term: ALG9
      term:
        id: hgnc:15672
        label: ALG9
- member: ALG12-congenital disorder of glycosylation
  member_type: DISEASE
  differentiating_mechanisms:
  - description: >-
      ALG12 is a later mannosyltransferase in LLO assembly; deficiency (CDG-Ig)
      gives a similar N-linked assembly defect at a distinct step from ALG9.
    gene:
      preferred_term: ALG12
      term:
        id: hgnc:19358
        label: ALG12
- member: MPDU1-congenital disorder of glycosylation
  member_type: DISEASE
  differentiating_mechanisms:
  - description: >-
      MPDU1 is required for utilization of dolichol-phosphate-mannose and
      -glucose donors; its loss (CDG-If) starves multiple LLO-assembly steps of
      activated sugars — a donor-utilization defect.
    gene:
      preferred_term: MPDU1
      term:
        id: hgnc:7207
        label: MPDU1
- member: DK1-congenital disorder of glycosylation
  member_type: DISEASE
  differentiating_mechanisms:
  - description: >-
      DOLK (dolichol kinase) generates dolichol phosphate, the lipid carrier for
      glycosylation; deficiency (CDG-Im) impairs the supply of the carrier itself,
      with a characteristic dilated cardiomyopathy.
    gene:
      preferred_term: DOLK
      term:
        id: hgnc:23406
        label: DOLK
- member: MGAT2-congenital disorder of glycosylation
  member_type: DISEASE
  differentiating_mechanisms:
  - description: >-
      MGAT2 adds the second antenna to complex N-glycans in the Golgi; its loss
      (CDG-IIa) is a glycan-processing (type II) defect, contrasting with the
      type I LLO-assembly defects.
    gene:
      preferred_term: MGAT2
      term:
        id: hgnc:7045
        label: MGAT2
- member: COG1-congenital disorder of glycosylation
  member_type: DISEASE
  differentiating_mechanisms:
  - description: >-
      COG1 is a subunit of the conserved oligomeric Golgi (COG) complex
      controlling Golgi trafficking and enzyme localization; defects (CDG-IIg)
      disrupt multiple Golgi glycosylation steps simultaneously.
    gene:
      preferred_term: COG1
      term:
        id: hgnc:6545
        label: COG1
- member: COG7-congenital disorder of glycosylation
  member_type: DISEASE
  differentiating_mechanisms:
  - description: >-
      COG7 deficiency (CDG-IIe) likewise impairs COG-complex-dependent Golgi
      trafficking, producing a severe multisystem combined N-/O-glycosylation
      defect.
    gene:
      preferred_term: COG7
      term:
        id: hgnc:18622
        label: COG7
notes: >-
  Differentiating axis: the glycosylation step affected — cytosolic/ER LLO
  assembly and dolichol supply (type I: ALG9, ALG12, MPDU1, DOLK) vs Golgi
  processing and trafficking (type II: MGAT2, COG1, COG7).
