name: Motor Neuron Disorders
display_name: Motor Neuron Disorders (Motor Neuron Diseases)
creation_date: "2026-06-26T00:00:00Z"
description: >-
  The motor neuron disorders are a clinically recognized group of
  neurodegenerative diseases unified by the selective degeneration of upper
  motor neurons (cortical Betz cells and the corticospinal/corticobulbar
  tracts), lower motor neurons (brainstem and spinal anterior horn cells), or
  both, with relative sparing of sensory and autonomic systems. The group spans
  the amyotrophic lateral sclerosis spectrum (combined upper and lower motor
  neuron disease), the pure upper-motor-neuron disorders (primary lateral
  sclerosis, hereditary spastic paraplegia), and the lower-motor-neuron /
  anterior-horn-cell disorders (spinal muscular atrophy, spinobulbar muscular
  atrophy, the distal hereditary motor neuronopathies). Members are kept as
  separate Disease entries because they differ in the predominant motor-neuron
  compartment (upper vs lower vs both), inheritance and causal gene, age of
  onset, and the presence of extra-motor features.
grouping_basis:
- SHARED_PHENOTYPE
- SHARED_MECHANISM
grouping_rationale: >-
  Grouped on a shared anatomical-pathological target — selective motor neuron
  degeneration — rather than on a single molecular mechanism, which is
  deliberately heterogeneous across the group (TDP-43 proteinopathy in ALS,
  SMN deficiency in SMA, polyglutamine androgen-receptor toxicity in Kennedy
  disease, axonal-transport and membrane-trafficking defects in the distal
  hereditary motor neuronopathies and hereditary spastic paraplegias). The
  members are lumped because they converge on the same vulnerable cell
  population and share a common differential-diagnostic and clinical-management
  frame (the upper- vs lower-motor-neuron examination, EMG, and respiratory and
  bulbar surveillance), but kept as separate entries because the upstream cause
  and the affected motor-neuron compartment differ. The criterion is NECESSARY
  (selective motor neuron degeneration is entailed by membership) rather than
  NECESSARY_AND_SUFFICIENT: motor neuron involvement alone does not make a
  disorder a primary motor neuron disease, since it also occurs secondarily in
  length-dependent axonal neuropathies (e.g. Charcot-Marie-Tooth disease),
  metabolic and structural myelopathies, and multisystem degenerations.
mappings:
  mondo_mappings:
  - term:
      id: MONDO:0020128
      label: motor neuron disorder
    mapping_predicate: skos:narrowMatch
    mapping_source: MONDO
    mapping_justification: >-
      narrowMatch: this grouping is the curated clinical-syndrome subset of the
      broader MONDO motor neuron disorder class. MONDO:0020128 ("motor neuron
      disorder", which carries "motor neuron disease" as an exact synonym and
      subsumes the now-obsolete MONDO:0005270) is the current umbrella term;
      MONDO split the historical single class into hereditary
      (MONDO:0024257) and acquired (MONDO:0020129) branches, so no single
      narrower MONDO term captures the dismech clinical grouping that spans
      both. MONDO:0020128 includes entities beyond the dismech scope (e.g.
      facial-onset sensory and motor neuronopathy, animal motor neuron
      diseases), so its descendant set should not be treated as an exhaustive
      list of dismech curation gaps.
    consistency:
    - reference: MONDO
      consistent: CONSISTENT
      notes: >-
        MONDO lacks a precise current grouping term that is both clinical and
        scoped to human primary motor neuron disease across hereditary and
        acquired causes; MONDO:0020128 is the best broader alignment target.
membership_criteria:
- description: >-
    A motor neuron disorder is characterized by selective degeneration of
    motor neurons — upper motor neurons (Betz cells / corticospinal and
    corticobulbar tracts), lower motor neurons (brainstem and spinal anterior
    horn cells), or both — with relative sparing of sensory and autonomic
    systems. Every member exhibits at least one of these motor-neuron
    degeneration phenotypes.
  criteria_semantics: NECESSARY
  logic:
    operator: OR
    description: >-
      Degeneration of upper and/or lower motor neurons (the shared anatomical
      lesion of the group).
    operands:
    - criterion_predicate: HAS_PHENOTYPE
      description: Abnormal upper motor neuron morphology/degeneration.
      phenotype_term:
        preferred_term: Abnormal upper motor neuron morphology
        term:
          id: HP:0002127
          label: Abnormal upper motor neuron morphology
    - criterion_predicate: HAS_PHENOTYPE
      description: Abnormal lower motor neuron morphology/degeneration.
      phenotype_term:
        preferred_term: Abnormal lower motor neuron morphology
        term:
          id: HP:0002366
          label: Abnormal lower motor neuron morphology
    - criterion_predicate: HAS_PHENOTYPE
      description: Motor neuron atrophy.
      phenotype_term:
        preferred_term: Motor neuron atrophy
        term:
          id: HP:0007373
          label: Motor neuron atrophy
members:
- member: Amyotrophic Lateral Sclerosis
  member_type: DISEASE
  differentiating_mechanisms:
  - description: >-
      The prototype combined upper- AND lower-motor-neuron disease: progressive
      degeneration of cortical Betz cells together with brainstem and spinal
      motor neurons, converging on TDP-43 proteinopathy in ~97% of cases.
      Predominantly sporadic; the commonest genetic cause is the C9orf72
      hexanucleotide repeat expansion. Distinguished from the pure UMN and pure
      LMN members by the obligate presence of both signs and its rapid,
      relentless course.
    gene:
      preferred_term: C9orf72
      term:
        id: hgnc:28337
        label: C9orf72
- member: Amyotrophic Lateral Sclerosis-Parkinsonism-Dementia Complex
  member_type: DISEASE
  differentiating_mechanisms:
  - description: >-
      The Western Pacific (Guam/Kii Peninsula) ALS variant in which combined
      motor neuron degeneration co-occurs with parkinsonism and dementia and a
      distinctive tau-predominant (with TDP-43) neurofibrillary pathology.
      Distinguished from classic ALS by the multisystem extra-motor involvement
      and a strong geographic/environmental (rather than monogenic) etiology.
- member: Primary Lateral Sclerosis
  member_type: DISEASE
  differentiating_mechanisms:
  - description: >-
      A pure UPPER-motor-neuron disorder: progressive spasticity from
      corticospinal and corticobulbar degeneration without the clinical or
      electrophysiological lower-motor-neuron signs that define ALS.
      Distinguished by its much slower course and the diagnostic requirement
      that LMN involvement remain absent over years; a minority evolve toward
      ALS.
- member: Hereditary Spastic Paraplegia
  member_type: DISEASE
  differentiating_mechanisms:
  - description: >-
      A genetically heterogeneous group of inherited PURE (or complicated)
      upper-motor-neuron disorders in which the distal corticospinal axons
      undergo length-dependent "dying-back" degeneration, producing
      progressive lower-limb spasticity. SPAST (SPG4) is the commonest cause.
      Distinguished from PLS by its hereditary basis, earlier onset, and the
      length-dependent corticospinal (rather than global UMN) pattern.
    gene:
      preferred_term: SPAST
      term:
        id: hgnc:11233
        label: SPAST
- member: Hereditary Spastic Paraplegia 48
  member_type: DISEASE
  differentiating_mechanisms:
  - description: >-
      An autosomal recessive hereditary spastic paraplegia caused by AP5Z1
      (SPG48) variants disrupting the AP-5 adaptor complex and endolysosomal
      sorting, producing corticospinal-tract degeneration. Distinguished from
      SPAST-HSP by its recessive inheritance and the AP-5/autophagy-lysosomal
      mechanism.
    gene:
      preferred_term: AP5Z1
      term:
        id: hgnc:22197
        label: AP5Z1
- member: Spinal Muscular Atrophy
  member_type: DISEASE
  differentiating_mechanisms:
  - description: >-
      The prototype LOWER-motor-neuron / anterior-horn-cell disease: biallelic
      loss of SMN1 depletes survival motor neuron protein and causes selective
      spinal (and bulbar) motor neuron loss with no upper-motor-neuron signs.
      SMN2 copy number modifies severity. Distinguished by its recessive
      single-gene cause and its responsiveness to SMN-restoring therapy
      (nusinersen, risdiplam, onasemnogene abeparvovec).
    gene:
      preferred_term: SMN1
      term:
        id: hgnc:11117
        label: SMN1
- member: Spinal Muscular Atrophy-Progressive Myoclonic Epilepsy Syndrome
  member_type: DISEASE
  differentiating_mechanisms:
  - description: >-
      A distinct SMA caused by biallelic ASAH1 (acid ceramidase) deficiency in
      which lower-motor-neuron loss is combined with progressive myoclonic
      epilepsy — a phenotype outside the SMN spectrum. Distinguished from
      SMN-SMA by its lysosomal (sphingolipid) mechanism and the obligate
      epileptic component.
    gene:
      preferred_term: ASAH1
      term:
        id: hgnc:735
        label: ASAH1
- member: Kennedy Disease
  member_type: DISEASE
  differentiating_mechanisms:
  - description: >-
      X-linked spinobulbar muscular atrophy caused by a CAG (polyglutamine)
      repeat expansion in the androgen receptor, producing a polyglutamine
      proteinopathy that selectively kills lower (bulbar and spinal) motor
      neurons, with androgen insensitivity (gynecomastia) and sensory
      involvement. Distinguished by its ligand-dependent polyQ mechanism, slow
      course, and endocrine features.
    gene:
      preferred_term: AR
      term:
        id: hgnc:644
        label: AR
- member: Distal Hereditary Motor Neuronopathy, Autosomal Dominant
  member_type: DISEASE
  differentiating_mechanisms:
  - description: >-
      Inherited pure LOWER-motor-neuron disorders ("spinal CMT") in which
      length-dependent degeneration of distal motor axons causes distal wasting
      and weakness without sensory loss. The dominant forms include
      small-heat-shock-protein genes such as HSPB1. Distinguished from
      CMT2 by the absence of sensory involvement and from SMA by the
      length-dependent distal (rather than proximal) pattern.
    gene:
      preferred_term: HSPB1
      term:
        id: hgnc:5246
        label: HSPB1
- member: Distal Hereditary Motor Neuronopathy, Autosomal Recessive
  member_type: DISEASE
  differentiating_mechanisms:
  - description: >-
      The recessive distal hereditary motor neuronopathies, including the
      IGHMBP2-related form (which at its severe end is SMARD1, spinal muscular
      atrophy with respiratory distress). Lower-motor-neuron degeneration with
      a distal/diaphragmatic distribution. Distinguished from the dominant
      dHMNs by inheritance and from SMN-SMA by gene and the
      respiratory/diaphragmatic predilection of the IGHMBP2 form.
    gene:
      preferred_term: IGHMBP2
      term:
        id: hgnc:5542
        label: IGHMBP2
notes: >-
  Worked example of a SHARED_PHENOTYPE grouping over an anatomically defined
  vulnerable cell population (the motor neuron) with deliberately heterogeneous
  upstream mechanisms. The criterion is NECESSARY (advisory audit of listed
  members) rather than NECESSARY_AND_SUFFICIENT, because secondary motor-neuron
  involvement in length-dependent neuropathies, myelopathies, and multisystem
  degenerations means motor-neuron degeneration is not sufficient to define
  membership. Coverage is being extended; candidate members not yet curated as
  dismech entries include progressive muscular atrophy, progressive bulbar
  palsy, SMARD1 (as a distinct entry), monomelic amyotrophy (Hirayama disease),
  Brown-Vialetto-Van Laere / Fazio-Londe syndrome, Madras motor neuron disease,
  post-polio syndrome, and poliomyelitis. The upper-motor-neuron arm overlaps
  the corticospinal degenerations; the TDP-43-driven members also appear in the
  TDP-43_Proteinopathies grouping, and the spinal CMT / dHMN members overlap the
  Charcot-Marie-Tooth_Diseases grouping.
