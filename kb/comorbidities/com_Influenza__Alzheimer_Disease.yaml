name: com_Influenza__Alzheimer_Disease
creation_date: "2026-06-25T12:00:00Z"
curation_status: CANDIDATE
notes: >-
  Tentative directional trajectory: severe influenza (notably influenza with
  pneumonia) has been associated with later neurodegenerative disease, including
  Alzheimer's disease and other dementias, in biobank and cohort studies. IMPORTANT
  EVIDENCE CAVEAT: the Intercept essay cited "~4.5-5x dementia" and "~2.6-4.1x
  Alzheimer's" risk after severe influenza/pneumonia. Those specific magnitudes
  most plausibly trace to per-disease hazard ratios in the Levine 2023 (Neuron)
  biobank study, but they appear in that paper's figures/tables and could NOT be
  verified from the abstract; they are therefore NOT asserted here as quantitative
  signals. Only the verifiable qualitative abstract statements are curated. The
  adjacent Sipila 2021 cohort quantifies an infection->dementia association but is
  for ANY hospital-treated infection, not influenza specifically. Kept as CANDIDATE
  pending extraction of the influenza-specific HRs from full text.

disease_a:
  slug: Influenza

disease_b:
  slug: Alzheimer_Disease

directionality: A_BEFORE_B

literature_evidence:
- reference: PMID:36669485
  supports: SUPPORT
  evidence_source: HUMAN_CLINICAL
  snippet: "Influenza with pneumonia was significantly associated with five of the six neurodegenerative diseases studied."
  explanation: >-
    Cross-biobank study reports that influenza with pneumonia is significantly
    associated with multiple neurodegenerative diseases (the numeric per-disease
    hazard ratios are in the source tables, not the abstract).
- reference: PMID:34166620
  supports: PARTIAL
  evidence_source: HUMAN_CLINICAL
  snippet: "Hospitalisation for any infectious disease was associated with increased dementia risk in the primary cohort"
  explanation: >-
    Adjacent cohort evidence that hospital-treated infection is associated with
    increased dementia risk; not influenza-specific, so only partial support for
    the influenza->Alzheimer's trajectory.

hypotheses:
- description: >-
    Severe influenza (especially with pneumonia) may contribute to later
    neurodegeneration through systemic and neuroinflammation, cerebrovascular
    injury, and accelerated amyloid/tau pathology; an alternative/competing
    explanation is reverse causation or shared frailty/susceptibility, and the
    influenza-specific effect size on Alzheimer's disease is not yet verified
    here from primary full text.
  evidence:
  - reference: PMID:36669485
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "we identified 45 viral exposures significantly associated with increased risk of neurodegenerative disease and replicated 22 of these associations."
    explanation: >-
      Supports a broader pattern of viral exposures associated with later
      neurodegenerative disease, of which influenza-with-pneumonia is one.
