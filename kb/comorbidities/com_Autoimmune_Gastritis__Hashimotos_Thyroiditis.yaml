name: com_Autoimmune_Gastritis__Hashimotos_Thyroiditis
creation_date: '2026-07-01T00:00:00Z'
curation_status: CANDIDATE
notes: >-
  Thyrogastric syndrome: the frequent co-occurrence of autoimmune (atrophic)
  gastritis and autoimmune thyroid disease (Hashimoto thyroiditis) is the most
  characteristic polyautoimmune pairing for autoimmune gastritis, reflecting a
  shared organ-specific autoimmune susceptibility. Autoimmune gastritis also
  clusters with type 1 diabetes mellitus and vitiligo; those pairings could be
  captured as additional comorbidity entries.
