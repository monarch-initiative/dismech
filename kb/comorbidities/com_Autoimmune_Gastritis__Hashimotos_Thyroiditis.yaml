literature_evidence:
- reference: PMID:31864909
  reference_title: "Thyro-entero-gastric autoimmunity: Pathophysiology and implications for patient management."
  supports: SUPPORT
  evidence_source: HUMAN_CLINICAL
  snippet: "autoimmune thyroid disorders, in particular Hashimoto's thyroiditis, may be frequently associated with other organ-specific, immune-mediated disorders, such as autoimmune atrophic gastritis or celiac disease."
  explanation: Establishes the frequent association of Hashimoto thyroiditis with autoimmune atrophic gastritis - the thyrogastric syndrome.
- reference: PMID:28102858
  reference_title: "Luminescent Immunoprecipitation System (LIPS) for Detection of Autoantibodies Against ATP4A and ATP4B Subunits of Gastric Proton Pump H+,K+-ATPase in Atrophic Body Gastritis Patients."
  supports: SUPPORT
  evidence_source: HUMAN_CLINICAL
  snippet: "prevalence of ~2% in the general population and up to 10% in patients with other autoimmune diseases, such as type I diabetes or autoimmune thyroid disease."
  explanation: Autoimmune gastritis prevalence rises to ~10% among patients with other autoimmune diseases, including autoimmune thyroid disease.
hypotheses:
- description: >-
    Shared organ-specific autoimmune susceptibility - HLA class II haplotypes plus
    non-HLA loci such as PTPN22 - predisposes to both autoimmune gastritis and
    autoimmune thyroid disease, manifesting as thyrogastric polyautoimmunity rather
    than one condition causing the other.
  evidence:
  - reference: PMID:34145262
    reference_title: "Genome-wide association study identifies five risk loci for pernicious anemia."
    supports: SUPPORT
    evidence_source: HUMAN_CLINICAL
    snippet: "We conduct a genome-wide association study meta-analysis in 2166 cases and 659,516 European controls from population-based biobanks and identify genome-wide significant signals in or near the PTPN22"
    explanation: The PTPN22/HLA susceptibility architecture of pernicious anemia / autoimmune gastritis is shared with other organ-specific autoimmune diseases including autoimmune thyroid disease.
