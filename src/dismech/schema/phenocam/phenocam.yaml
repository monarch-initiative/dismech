id: https://w3id.org/monarch-initiative/dismech/phenocam
name: phenocam
title: PhenoCAM V2 — Phenotypic Causal Model Schema
description: >
  A structured causal model schema tracing the full mechanistic chain from
  disease-causing variant through molecular entities, molecular activities,
  cellular and tissue processes, to phenotypic manifestation.
license: BSD-3-Clause

imports:
  - linkml:types

prefixes:
  linkml: https://w3id.org/linkml/
  phenocam: https://w3id.org/monarch-initiative/dismech/phenocam/
  CHEBI: http://purl.obolibrary.org/obo/CHEBI_
  PR: http://purl.obolibrary.org/obo/PR_
  GO: http://purl.obolibrary.org/obo/GO_
  CL: http://purl.obolibrary.org/obo/CL_
  UBERON: http://purl.obolibrary.org/obo/UBERON_
  HP: http://purl.obolibrary.org/obo/HP_
  MONDO: http://purl.obolibrary.org/obo/MONDO_
  HGNC: https://www.genenames.org/data/gene-symbol-report/#!/hgnc_id/
  RO: http://purl.obolibrary.org/obo/RO_
  ECO: http://purl.obolibrary.org/obo/ECO_
  PATO: http://purl.obolibrary.org/obo/PATO_
  GENO: http://purl.obolibrary.org/obo/GENO_
  ECTO: http://purl.obolibrary.org/obo/ECTO_
  NCIT: http://purl.obolibrary.org/obo/NCIT_
  MAXO: http://purl.obolibrary.org/obo/MAXO_
  PMID: http://www.ncbi.nlm.nih.gov/pubmed/

default_prefix: phenocam
default_range: string

classes:
  Module:
    tree_root: true
    description: >
      A reusable normal-biology pathway graph. Contains molecular entities,
      molecular activities, cellular/tissue processes, and causal relations
      representing unperturbed biology.
    slots:
      - id
      - name
      - description
      - sources

slots:
  id:
    identifier: true
    range: string
    required: true
  name:
    range: string
  description:
    range: string
  sources:
    range: string
    multivalued: true
    description: >-
      Provenance references for this node or model — literature PMIDs, GO-CAM gomodel: CURIEs,
      Reactome R-HSA-* identifiers, or WikiPathways WP* identifiers.
