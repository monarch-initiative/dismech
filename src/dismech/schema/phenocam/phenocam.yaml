id: https://w3id.org/monarch-initiative/dismech/phenocam
name: phenocam
title: PhenoCAM V2 — Phenotypic Causal Model Schema
description: >
  A structured causal model schema tracing the full mechanistic chain from
  disease-causing variant through molecular entities, molecular activities,
  cellular and tissue processes, to phenotypic manifestation.
license: BSD-3-Clause

imports:
  - linkml:types

prefixes:
  linkml: https://w3id.org/linkml/
  phenocam: https://w3id.org/monarch-initiative/dismech/phenocam/
  CHEBI: http://purl.obolibrary.org/obo/CHEBI_
  PR: http://purl.obolibrary.org/obo/PR_
  GO: http://purl.obolibrary.org/obo/GO_
  CL: http://purl.obolibrary.org/obo/CL_
  UBERON: http://purl.obolibrary.org/obo/UBERON_
  HP: http://purl.obolibrary.org/obo/HP_
  MONDO: http://purl.obolibrary.org/obo/MONDO_
  HGNC: https://www.genenames.org/data/gene-symbol-report/#!/hgnc_id/
  RO: http://purl.obolibrary.org/obo/RO_
  ECO: http://purl.obolibrary.org/obo/ECO_
  PATO: http://purl.obolibrary.org/obo/PATO_
  GENO: http://purl.obolibrary.org/obo/GENO_
  ECTO: http://purl.obolibrary.org/obo/ECTO_
  NCIT: http://purl.obolibrary.org/obo/NCIT_
  MAXO: http://purl.obolibrary.org/obo/MAXO_
  PMID: http://www.ncbi.nlm.nih.gov/pubmed/

default_prefix: phenocam
default_range: string

classes:
  OntologyTerm:
    description: A reference to an ontology term with its CURIE and canonical label.
    slots:
      - id
      - label

  GeneRef:
    description: A gene reference using HGNC symbol and HGNC numeric identifier.
    slots:
      - symbol
      - hgnc_id

  EvidenceItem:
    description: A single evidence item citing a reference and optional verbatim snippet.
    slots:
      - reference
      - snippet
      - explanation

  Source:
    description: >-
      Provenance for a module or node — a GO-CAM, Reactome pathway, WikiPathways pathway,
      or literature reference.
    slots:
      - type
      - source_id
      - reference
      - source_name

  ModuleImport:
    description: Declares that a DiseaseCourse imports a named Module.
    slots:
      - module

  HypothesisGroup:
    description: >-
      An alternative etiology that causes this disease. Nodes and edges tagged with
      this hypothesis id apply only under this etiology.
    slots:
      - id
      - name
      - description
      - frequency

  Subtype:
    description: >-
      A clinical or molecular subtype of the disease group. Nodes and edges tagged
      with this subtype id apply only to this subtype.
    slots:
      - id
      - display_name
      - mondo_term
      - description

  MolecularEntity:
    description: >-
      A biomolecule (protein, cytokine, metabolite, lipid, second messenger, ECM component)
      that acts as an intermediate in the causal chain — produced by one process and received
      or consumed by another. Grounded in ChEBI (primary) or PRO (for specific proteins).
      This kind handles intercellular signaling molecules (e.g., TNF-alpha, IL-6) that are
      simultaneously outputs of one cellular_process and inputs to another.
    slots:
      - id
      - entity
      - gene
      - location
      - quality
      - description
      - display_name
      - hypotheses
      - subtypes
      - sources

  MolecularActivity:
    description: >-
      A gene product (or complex) performing a molecular function at a cellular location,
      participating in a biological process. The fundamental unit of GO-CAM-style normal
      biology and of disease-level perturbation at the molecular scale.
    slots:
      - id
      - gene
      - complex_name
      - molecular_function
      - location
      - biological_process
      - quality
      - description
      - display_name
      - hypotheses
      - subtypes
      - sources

  CellularProcess:
    description: >-
      A process primarily characterized by a cell type performing a biological process.
      Required: cell_type (CL term) and biological_process (GO BP term).
      Optional: anatomy (UBERON) when the cell is in a specific tissue context.
    slots:
      - id
      - cell_type
      - biological_process
      - anatomy
      - quality
      - description
      - display_name
      - hypotheses
      - subtypes
      - sources

  TissueProcess:
    description: >-
      A process primarily characterized by an anatomical structure performing a biological
      process. Required: anatomy (UBERON term) and biological_process (GO BP term).
      Optional: cell_type (CL) when a specific cell mediates the tissue-level process.
    slots:
      - id
      - anatomy
      - biological_process
      - cell_type
      - quality
      - description
      - display_name
      - hypotheses
      - subtypes
      - sources

  Variant:
    description: >-
      A genetic perturbation (germline or somatic) that drives the disease course.
      Grounded in GENO for variant type. Multiple variants can be declared and tagged
      with different hypothesis IDs to represent alternative etiologies.
    slots:
      - id
      - gene
      - variant_type
      - description
      - hypotheses

  ChemicalExposure:
    description: >-
      An exogenous small molecule whose presence drives the disease course
      (toxin, dietary load, drug-as-stressor). Grounded in ChEBI.
      Distinct from MolecularEntity which is an endogenous intermediate.
    slots:
      - id
      - agent
      - description
      - hypotheses

  EnvironmentalFactor:
    description: >-
      A non-chemical environmental input (UV radiation, mechanical stress, infection).
      Grounded in ECTO.
    slots:
      - id
      - factor
      - description
      - hypotheses

  Phenotype:
    description: >-
      A clinical observable connected to the disease via has_phenotype (non-causal
      classification) and to upstream processes via causal_relations edges.
      Grounded in HPO.
    slots:
      - id
      - hpo_term
      - description
      - display_name
      - hypotheses
      - subtypes

  Modulator:
    description: >-
      A therapeutic, dietary, or environmental intervention that modulates the causal
      graph. Agent grounded in ChEBI (specific small molecules), NCIT (drug classes),
      or MAXO (non-pharmacological interventions). Causal edges in causal_relations
      carry the effect: enum value.
    slots:
      - id
      - agent
      - role
      - description

  CausalRelation:
    description: >-
      A single directed causal edge between any two nodes (including modulators, inputs,
      and phenotypes). All causal claims in a module or disease course live in the
      causal_relations list — no edges hidden inside node internals.
    slots:
      - subject
      - predicate
      - object
      - hypotheses
      - subtypes
      - effect
      - eco
      - evidence

  DiseaseHasPhenotype:
    description: >-
      Non-causal annotation linking a disease to a phenotype (RO:0002200 has phenotype).
      Distinct from causal_relations edges which trace the mechanistic path to the phenotype.
    slots:
      - phenotype_ref
      - relation
      - eco
      - evidence

  BiologicalCausalModel:
    abstract: true
    description: >-
      Abstract base class shared by Module and DiseaseCourse. Holds all node-kind
      collections and the unified causal_relations block.
    slots:
      - id
      - name
      - description
      - sources
      - molecular_entities
      - molecular_activities
      - cellular_processes
      - tissue_processes
      - variants
      - chemical_exposures
      - environmental_factors
      - phenotypes
      - modulators
      - causal_relations

  Module:
    is_a: BiologicalCausalModel
    tree_root: true
    description: >-
      A reusable normal-biology pathway graph. Nodes carry no quality (wild-type implicit).
      Imported by DiseaseCourse files to provide the normal-biology backbone.

  DiseaseCourse:
    is_a: BiologicalCausalModel
    tree_root: true
    description: >-
      A disease-specific causal overlay. Imports modules for the normal-biology backbone
      and adds variants/exposures (inputs), modulators, phenotypes, and hypothesis/subtype
      tagging on nodes and edges.
    slots:
      - realises_disease
      - has_subtypes
      - hypothesis_groups
      - imports
      - has_phenotype
      - disorder_ref

slots:
  id:
    identifier: true
    range: string
    required: true
  name:
    range: string
  description:
    range: string
  sources:
    range: Source
    multivalued: true
    inlined_as_list: true
    description: >-
      Provenance references for this node or model — literature PMIDs, GO-CAM gomodel: CURIEs,
      Reactome R-HSA-* identifiers, or WikiPathways WP* identifiers.

  label:
    range: string
    description: Canonical ontology term label — must exactly match the authoritative label in the source ontology.

  display_name:
    range: string
    description: Human-readable override label for visualization; falls back to `name` when absent.

  symbol:
    range: string
    description: HGNC-approved gene symbol (e.g., SMO)

  hgnc_id:
    range: string
    description: "HGNC identifier with lowercase hgnc: prefix (e.g., hgnc:11119)"

  reference:
    range: string
    description: >-
      CURIE reference (PMID:, DOI:, NCT:, ORPHA:, gomodel:, R-HSA-*)

  snippet:
    range: string
    description: Verbatim quote from the cited source supporting the claim

  explanation:
    range: string
    description: Curator explanation of how the evidence supports the claim

  type:
    range: SourceTypeEnum
    description: Provenance type (go_cam, reactome, wikipathways, literature)

  source_id:
    range: string
    description: >-
      Identifier for the source: GO-CAM gomodel: CURIE, R-HSA-* for Reactome,
      WP* for WikiPathways.

  source_name:
    range: string
    description: Human-readable name of the source pathway or model.

  frequency:
    range: string
    description: Approximate frequency of this hypothesis or subtype (free text, e.g., "~85%")

  mondo_term:
    range: OntologyTerm
    inlined: true
    description: MONDO term for this subtype when a distinct identifier exists

  module:
    range: string
    description: Module id (must match a file in causal_models/modules/<id>.yaml)

  hypotheses:
    range: string
    multivalued: true
    description: >-
      IDs of hypothesis groups this node/edge applies to.
      Absent = applies to all hypotheses.

  subtypes:
    range: string
    multivalued: true
    description: >-
      IDs of subtypes this node/edge applies to.
      Absent = applies to all subtypes.

  evidence:
    range: EvidenceItem
    multivalued: true
    inlined_as_list: true
    description: Collection of evidence items supporting this entity, each with a reference and optional verbatim snippet.

  entity:
    range: OntologyTerm
    inlined: true
    description: >-
      ChEBI or PRO term identifying the molecular entity.
      Use PR: prefix for specific proteins; CHEBI: for all other molecules.

  gene:
    range: GeneRef
    inlined: true
    description: HGNC gene reference for the gene product.

  complex_name:
    range: string
    description: >-
      Free-text name of a multi-subunit complex when gene is not applicable
      (e.g., "BBSome", "IFT-B complex"). Mutually exclusive with gene on MolecularActivity.

  molecular_function:
    range: OntologyTerm
    inlined: true
    description: GO Molecular Function term describing what the gene product does.

  biological_process:
    range: OntologyTerm
    inlined: true
    description: GO Biological Process term for the process this node participates in.

  cell_type:
    range: OntologyTerm
    inlined: true
    description: CL (Cell Ontology) term for the cell type.

  anatomy:
    range: OntologyTerm
    inlined: true
    description: UBERON anatomical structure term.

  location:
    range: OntologyTerm
    inlined: true
    description: Subcellular or anatomical location context for this node.

  quality:
    range: PerturbationQualityEnum
    description: >-
      Perturbation state of this node in the disease context (PATO-bound).
      Absent on module nodes (normal biology = implicitly wild-type).

  molecular_entities:
    range: MolecularEntity
    multivalued: true
    inlined_as_list: true
    description: Molecular entity nodes (proteins, cytokines, metabolites) in this model.

  molecular_activities:
    range: MolecularActivity
    multivalued: true
    inlined_as_list: true
    description: Molecular activity nodes in this model.

  cellular_processes:
    range: CellularProcess
    multivalued: true
    inlined_as_list: true
    description: Cellular process nodes in this model.

  tissue_processes:
    range: TissueProcess
    multivalued: true
    inlined_as_list: true
    description: Tissue process nodes in this model.

  variant_type:
    range: OntologyTerm
    inlined: true
    description: GENO term for the variant class (e.g., loss-of-function, missense).

  agent:
    range: OntologyTerm
    inlined: true
    description: >-
      ChEBI, NCIT, or MAXO term for the agent.
      ChEBI for specific small molecules; NCIT for drug classes or biologics;
      MAXO for non-pharmacological interventions.

  factor:
    range: OntologyTerm
    inlined: true
    description: ECTO term for the environmental factor.

  hpo_term:
    range: OntologyTerm
    inlined: true
    description: HPO term for the clinical phenotype.

  role:
    range: ModulatorRoleEnum
    description: Role of the modulator (therapeutic, dietary, environmental).

  variants:
    range: Variant
    multivalued: true
    inlined_as_list: true
    description: Genetic variant input nodes in this model.

  chemical_exposures:
    range: ChemicalExposure
    multivalued: true
    inlined_as_list: true
    description: Chemical exposure input nodes in this model.

  environmental_factors:
    range: EnvironmentalFactor
    multivalued: true
    inlined_as_list: true
    description: Environmental factor input nodes in this model.

  phenotypes:
    range: Phenotype
    multivalued: true
    inlined_as_list: true
    description: Clinical phenotype outcome nodes in this model.

  modulators:
    range: Modulator
    multivalued: true
    inlined_as_list: true
    description: Modulator (drug/dietary/environmental) nodes in this model.

  subject:
    range: string
    required: true
    description: ID of the source node (any node kind including modulators and inputs).

  predicate:
    range: OntologyTerm
    inlined: true
    required: true
    description: RO relation term (e.g., RO:0002629 directly positively regulates).

  object:
    range: string
    required: true
    description: ID of the target node (any node kind including phenotypes).

  effect:
    range: ModulatorEffectEnum
    description: >-
      Clinical-mechanism flavor of modulator action; only set when subject is a Modulator.

  eco:
    range: OntologyTerm
    inlined: true
    description: ECO evidence code term.

  relation:
    range: OntologyTerm
    inlined: true
    description: RO relation term for DiseaseHasPhenotype (typically RO:0002200 has phenotype).

  phenotype_ref:
    range: string
    description: ID of the Phenotype node declared in the disease course phenotypes list.

  causal_relations:
    range: CausalRelation
    multivalued: true
    inlined_as_list: true
    description: All directed causal edges in this model.

  has_phenotype:
    range: DiseaseHasPhenotype
    multivalued: true
    inlined_as_list: true
    description: Non-causal disease-to-phenotype annotations.

  realises_disease:
    range: OntologyTerm
    inlined: true
    description: MONDO term for the disease this course models.

  has_subtypes:
    range: Subtype
    multivalued: true
    inlined_as_list: true
    description: Clinical or molecular subtypes of the disease.

  hypothesis_groups:
    range: HypothesisGroup
    multivalued: true
    inlined_as_list: true
    description: Alternative etiologies (hypotheses) for this disease.

  imports:
    range: ModuleImport
    multivalued: true
    inlined_as_list: true
    description: Normal-biology modules imported by this disease course.

  disorder_ref:
    range: string
    description: >-
      Optional cross-reference to the corresponding dismech disorder YAML filename
      (e.g., Gorlin_Syndrome.yaml). Checked by the custom validator when present.

enums:
  PerturbationQualityEnum:
    description: >-
      Controlled vocabulary for node perturbation states, bound to PATO terms.
      Uses SCREAMING_SNAKE_CASE to match ontology term naming conventions.
      Applied to perturbed nodes in disease courses; absent on normal-biology
      module nodes (which are implicitly wild-type).
    permissible_values:
      INCREASED:
        description: Increased activity, abundance, or level
        meaning: PATO:0000573
      DECREASED:
        description: Decreased activity, abundance, or level
        meaning: PATO:0000574
      ABSENT:
        description: Completely absent or null
        meaning: PATO:0000462
      GAIN_OF_FUNCTION:
        description: Pathological gain of function
        meaning: PATO:0001396
      LOSS_OF_FUNCTION:
        description: Pathological loss of function
        meaning: PATO:0001561

  ModulatorEffectEnum:
    description: Clinical-mechanism flavor of how a modulator acts on its target node.
    permissible_values:
      rescues_full:
        description: Fully restores the perturbed node to near-normal state
      rescues_partial:
        description: Partially restores the perturbed node
      reduces_load:
        description: Reduces substrate or upstream load without directly rescuing the node
      blocks_downstream:
        description: Blocks a downstream pathological node
      amplifies:
        description: Amplifies an existing perturbation (e.g., sensitizer)
      none:
        description: No net effect; used to model null results

  ModulatorRoleEnum:
    description: The role of the modulator in the disease context.
    permissible_values:
      therapeutic:
        description: A drug or biologic intervention targeting the disease mechanism
      dietary:
        description: A dietary intervention (e.g., low-Phe diet in PKU)
      environmental:
        description: An environmental modulation (e.g., UV avoidance)

  SourceTypeEnum:
    description: Provenance type for a module source entry.
    permissible_values:
      go_cam:
        description: "A GO-CAM model (gomodel: CURIE)"
      reactome:
        description: A Reactome pathway (R-HSA-* identifier)
      wikipathways:
        description: A WikiPathways pathway (WP* identifier)
      literature:
        description: Primary literature (PMID reference)
