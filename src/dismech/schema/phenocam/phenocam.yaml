id: https://w3id.org/monarch-initiative/dismech/phenocam
name: phenocam
title: PhenoCAM V2 — Phenotypic Causal Model Schema
description: >
  A structured causal model schema tracing the full mechanistic chain from
  disease-causing variant through molecular entities, molecular activities,
  cellular and tissue processes, to phenotypic manifestation.
license: BSD-3-Clause

imports:
  - linkml:types

prefixes:
  linkml: https://w3id.org/linkml/
  phenocam: https://w3id.org/monarch-initiative/dismech/phenocam/
  CHEBI: http://purl.obolibrary.org/obo/CHEBI_
  PR: http://purl.obolibrary.org/obo/PR_
  GO: http://purl.obolibrary.org/obo/GO_
  CL: http://purl.obolibrary.org/obo/CL_
  UBERON: http://purl.obolibrary.org/obo/UBERON_
  HP: http://purl.obolibrary.org/obo/HP_
  MONDO: http://purl.obolibrary.org/obo/MONDO_
  HGNC: https://www.genenames.org/data/gene-symbol-report/#!/hgnc_id/
  RO: http://purl.obolibrary.org/obo/RO_
  ECO: http://purl.obolibrary.org/obo/ECO_
  PATO: http://purl.obolibrary.org/obo/PATO_
  GENO: http://purl.obolibrary.org/obo/GENO_
  ECTO: http://purl.obolibrary.org/obo/ECTO_
  NCIT: http://purl.obolibrary.org/obo/NCIT_
  MAXO: http://purl.obolibrary.org/obo/MAXO_
  PMID: http://www.ncbi.nlm.nih.gov/pubmed/

default_prefix: phenocam
default_range: string

classes:
  OntologyTerm:
    description: A reference to an ontology term with its CURIE and canonical label.
    slots:
      - id
      - label

  GeneRef:
    description: A gene reference using HGNC symbol and HGNC numeric identifier.
    slots:
      - symbol
      - hgnc_id

  EvidenceItem:
    description: A single evidence item citing a reference and optional verbatim snippet.
    slots:
      - reference
      - snippet
      - explanation

  Source:
    description: >-
      Provenance for a module or node — a GO-CAM, Reactome pathway, WikiPathways pathway,
      or literature reference.
    slots:
      - type
      - source_id
      - reference
      - source_name

  ModuleImport:
    description: Declares that a DiseaseCourse imports a named Module.
    slots:
      - module

  HypothesisGroup:
    description: >-
      An alternative etiology that causes this disease. Nodes and edges tagged with
      this hypothesis id apply only under this etiology.
    slots:
      - id
      - name
      - description
      - frequency

  Subtype:
    description: >-
      A clinical or molecular subtype of the disease group. Nodes and edges tagged
      with this subtype id apply only to this subtype.
    slots:
      - id
      - display_name
      - mondo_term
      - description

  Module:
    tree_root: true
    description: >
      A reusable normal-biology pathway graph. Contains molecular entities,
      molecular activities, cellular/tissue processes, and causal relations
      representing unperturbed biology.
    slots:
      - id
      - name
      - description
      - sources

slots:
  id:
    identifier: true
    range: string
    required: true
  name:
    range: string
  description:
    range: string
  sources:
    range: Source
    multivalued: true
    inlined_as_list: true
    description: >-
      Provenance references for this node or model — literature PMIDs, GO-CAM gomodel: CURIEs,
      Reactome R-HSA-* identifiers, or WikiPathways WP* identifiers.

  label:
    range: string
    description: Canonical ontology term label — must exactly match the authoritative label in the source ontology.

  display_name:
    range: string
    description: Human-readable override label for visualization; falls back to `name` when absent.

  symbol:
    range: string
    description: HGNC-approved gene symbol (e.g., SMO)

  hgnc_id:
    range: string
    description: "HGNC identifier with lowercase hgnc: prefix (e.g., hgnc:11119)"

  reference:
    range: string
    description: >-
      CURIE reference (PMID:, DOI:, NCT:, ORPHA:, gomodel:, R-HSA-*)

  snippet:
    range: string
    description: Verbatim quote from the cited source supporting the claim

  explanation:
    range: string
    description: Curator explanation of how the evidence supports the claim

  type:
    range: SourceTypeEnum
    description: Provenance type (go_cam, reactome, wikipathways, literature)

  source_id:
    range: string
    description: >-
      Identifier for the source: GO-CAM gomodel: CURIE, R-HSA-* for Reactome,
      WP* for WikiPathways.

  source_name:
    range: string
    description: Human-readable name of the source pathway or model.

  frequency:
    range: string
    description: Approximate frequency of this hypothesis or subtype (free text, e.g., "~85%")

  mondo_term:
    range: OntologyTerm
    description: MONDO term for this subtype when a distinct identifier exists

  module:
    range: string
    description: Module id (must match a file in causal_models/modules/<id>.yaml)

  hypotheses:
    range: string
    multivalued: true
    description: >-
      IDs of hypothesis groups this node/edge applies to.
      Absent = applies to all hypotheses.

  subtypes:
    range: string
    multivalued: true
    description: >-
      IDs of subtypes this node/edge applies to.
      Absent = applies to all subtypes.

  evidence:
    range: EvidenceItem
    multivalued: true
    inlined_as_list: true
    description: Collection of evidence items supporting this entity, each with a reference and optional verbatim snippet.

enums:
  PerturbationQualityEnum:
    description: >-
      Controlled vocabulary for node perturbation states, bound to PATO terms.
      Uses SCREAMING_SNAKE_CASE to match ontology term naming conventions.
      Applied to perturbed nodes in disease courses; absent on normal-biology
      module nodes (which are implicitly wild-type).
    permissible_values:
      INCREASED:
        description: Increased activity, abundance, or level
        meaning: PATO:0000573
      DECREASED:
        description: Decreased activity, abundance, or level
        meaning: PATO:0000574
      ABSENT:
        description: Completely absent or null
        meaning: PATO:0000462
      GAIN_OF_FUNCTION:
        description: Pathological gain of function
        meaning: PATO:0001396
      LOSS_OF_FUNCTION:
        description: Pathological loss of function
        meaning: PATO:0001561

  ModulatorEffectEnum:
    description: Clinical-mechanism flavor of how a modulator acts on its target node.
    permissible_values:
      rescues_full:
        description: Fully restores the perturbed node to near-normal state
      rescues_partial:
        description: Partially restores the perturbed node
      reduces_load:
        description: Reduces substrate or upstream load without directly rescuing the node
      blocks_downstream:
        description: Blocks a downstream pathological node
      amplifies:
        description: Amplifies an existing perturbation (e.g., sensitizer)
      none:
        description: No net effect; used to model null results

  ModulatorRoleEnum:
    description: The role of the modulator in the disease context.
    permissible_values:
      therapeutic:
        description: A drug or biologic intervention targeting the disease mechanism
      dietary:
        description: A dietary intervention (e.g., low-Phe diet in PKU)
      environmental:
        description: An environmental modulation (e.g., UV avoidance)

  SourceTypeEnum:
    description: Provenance type for a module source entry.
    permissible_values:
      go_cam:
        description: "A GO-CAM model (gomodel: CURIE)"
      reactome:
        description: A Reactome pathway (R-HSA-* identifier)
      wikipathways:
        description: A WikiPathways pathway (WP* identifier)
      literature:
        description: Primary literature (PMID reference)
