id: https://w3id.org/monarch-initiative/dismech/classifications/harrisons_chapters
name: dismech-harrisons-chapters
title: Harrison's Principles of Internal Medicine Part Classification
description: >-
  Part-level classification for organizing disorders by organ system and clinical
  domain, following the high-level structure of Harrison's Principles of Internal
  Medicine.

imports:
  - linkml:types

prefixes:
  linkml: https://w3id.org/linkml/
  dismech: https://w3id.org/monarch-initiative/dismech/

default_prefix: dismech

enums:
  HarrisonsChapterEnum:
    description: >-
      Harrison's Principles of Internal Medicine classification by Part.
      Values correspond to the high-level Parts (organ-system or topical
      groupings) of Harrison's 21st edition (2022). The slot is named
      `harrisons_chapter` for historical reasons, but the controlled
      vocabulary lives at the Part level since this is the granularity
      that matches how curators classify disorders. A single disease may
      be assigned to multiple Parts (e.g., a hereditary skin disorder
      could be tagged DERMATOLOGY and GENETICS_ENVIRONMENT_DISEASE).
      Free-text values used in earlier curation are preserved as
      `aliases` on the closest-fit Part so that legacy entries continue
      to validate.
    permissible_values:
      GENERAL_CONSIDERATIONS:
        title: General Considerations in Clinical Medicine
        description: >-
          Approach to the patient, clinical decision-making, ethics,
          evidence-based medicine, screening, and global aspects of
          medicine. Use sparingly for diseases - most diseases fit a
          more specific organ-system Part.
      CARDINAL_MANIFESTATIONS:
        title: Cardinal Manifestations and Presentation of Diseases
        description: >-
          Cardinal symptom and sign presentations (pain, fever, fatigue,
          weight change, cough, dyspnea, etc.) and chapters on
          alterations of the skin, ear, nose, and throat. Use for
          symptom-defined entries that cut across organ systems.
      PHARMACOLOGY:
        title: Pharmacology
        description: >-
          Principles of clinical pharmacology, drug therapeutics, and
          adverse drug reactions. Rarely used for disorder entries.
      ONCOLOGY_HEMATOLOGY:
        title: Oncology and Hematology
        description: >-
          Cancers (solid tumors and hematologic malignancies) and
          non-malignant hematologic disorders including anemias,
          coagulation disorders, transfusion medicine, and bone marrow
          failure syndromes.
        aliases:
          - cancer
          - solid tumor
          - hematologic malignancy
          - hematologic disorder
          - anemia
          - coagulation disorder
          - Adenocarcinoma
          - Carcinoma
          - Embryonal Neoplasm
          - Glioma
          - Leukemia
          - Lymphoma
          - Melanoma
          - Sarcoma
          - Squamous Cell Carcinoma
      INFECTIOUS_DISEASES:
        title: Infectious Diseases
        description: >-
          Bacterial, viral, fungal, parasitic, and other microbial
          infections; antimicrobial therapy; infections in
          immunocompromised hosts; and infections by organ system when
          presented from an infectious-disease perspective.
        aliases:
          - infectious disease
          - bacterial infectious disease
          - viral infectious disease
          - fungal infectious disease
          - parasitic infectious disease
      CARDIOVASCULAR:
        title: Disorders of the Cardiovascular System
        description: >-
          Cardiac and vascular diseases including ischemic heart
          disease, heart failure, arrhythmias, cardiomyopathies,
          valvular and pericardial disease, congenital heart disease,
          and disorders of the aorta and peripheral vasculature.
        aliases:
          - cardiovascular disorder
          - cardiomyopathy
          - coronary artery disorder
          - vascular disease
          - cardiac channelopathy
      RESPIRATORY:
        title: Disorders of the Respiratory System
        description: >-
          Pulmonary diseases including obstructive lung disease
          (asthma, COPD), interstitial and restrictive lung disease,
          pulmonary vascular disease, and respiratory failure.
        aliases:
          - respiratory system disorder
          - obstructive lung disease
          - allergic disease
      CRITICAL_CARE:
        title: Critical Care Medicine
        description: >-
          Approach to the critically ill patient, including sepsis and
          septic shock, ARDS, multi-organ failure, and neurologic
          critical illness.
      KIDNEY_URINARY_TRACT:
        title: Disorders of the Kidney and Urinary Tract
        description: >-
          Renal and urinary tract diseases including glomerular and
          tubulointerstitial disorders, acute kidney injury, chronic
          kidney disease, electrolyte and acid-base disturbances, and
          urolithiasis.
        aliases:
          - kidney disorder
          - glomerular disease
          - epithelial channelopathy
      GASTROINTESTINAL:
        title: Disorders of the Gastrointestinal System
        description: >-
          Digestive-system disorders including esophageal, gastric,
          small-bowel, colonic, hepatic, biliary, and pancreatic
          disease.
        aliases:
          - digestive system disorder
          - liver disorder
          - inflammatory bowel disease
          - peptic disorder
      IMMUNE_RHEUMATOLOGIC:
        title: Immune-Mediated, Inflammatory, and Rheumatologic Disorders
        description: >-
          Autoimmune and immune-mediated conditions, connective-tissue
          diseases, vasculitides, and rheumatologic disorders.
          Musculoskeletal disorders are also covered here in Harrison's.
        aliases:
          - autoimmune disease
          - immune system disorder
          - connective tissue disease
          - inflammatory arthritis
          - collagenopathy
          - musculoskeletal system disorder
      ENDOCRINOLOGY_METABOLISM:
        title: Endocrinology and Metabolism
        description: >-
          Endocrine and metabolic diseases including diabetes mellitus,
          thyroid, adrenal, pituitary, gonadal, calcium and bone
          metabolism, lipid disorders, and inborn errors of metabolism.
        aliases:
          - endocrine system disorder
          - diabetes mellitus
          - thyroid disorder
          - adrenal disorder
          - disorder of glycogen metabolism
          - glycoproteinosis
      NEUROLOGIC:
        title: Neurologic Disorders
        description: >-
          Diseases of the central and peripheral nervous system,
          including stroke, epilepsy, neurodegenerative disease,
          movement disorders, demyelinating disease, neuromuscular
          disease, headache, and psychiatric disorders.
        aliases:
          - nervous system disorder
          - neurodegenerative disease
          - movement disorder
          - epilepsy
          - demyelinating disease
          - neuromuscular disease
          - psychiatric disorder
          - synucleinopathy
          - tauopathy
          - neurological channelopathy
          - skeletal muscle channelopathy
      DERMATOLOGY:
        title: Disorders of the Skin
        description: >-
          Skin and cutaneous disorders. In Harrison's 21st edition,
          dermatology is organized as a section within the cardinal
          manifestations Part; this enum value is provided separately
          so that disorders that are primarily dermatologic can be
          classified directly.
        aliases:
          - skin disorder
      POISONING_ENVENOMATION:
        title: Poisoning, Drug Overdose, and Envenomation
        description: >-
          Toxicology, poisoning syndromes, drug overdose, and bites
          or other venom exposures.
      ENVIRONMENTAL_EXPOSURES:
        title: Disorders Associated with Environmental Exposures
        description: >-
          Disorders attributable to environmental exposures such as
          altitude, hypothermia/hyperthermia, drowning, and radiation
          injury.
      GENETICS_ENVIRONMENT_DISEASE:
        title: Genes, the Environment, and Disease
        description: >-
          Genetic and genomic medicine, chromosomal and Mendelian
          disorders not better classified by organ system, and the
          interplay of genes and environment in disease. Use for
          mechanism-defined entries (RASopathies, ciliopathies,
          mitochondrial disease, etc.) that span multiple organ systems.
        aliases:
          - hereditary disease
          - RASopathy
          - ciliopathy
          - mitochondrial disease
          - intermediate filament disease
          - proteotoxic disease
      DISORDER_OF_EAR:
        title: Disorders of the Ear
        description: >-
          Disorders of hearing and the vestibular system. Covered in
          Harrison's under cardinal-manifestation chapters on the ear.
        aliases:
          - disorder of ear
      GLOBAL_MEDICINE:
        title: Global Medicine
        description: >-
          Diseases and health issues that are predominantly addressed
          in a global health context.
      AGING:
        title: Aging
        description: >-
          Disorders, syndromes, and physiologic considerations specific
          to older adults.
      CONSULTATIVE_MEDICINE:
        title: Consultative Medicine
        description: >-
          Approach to the patient when consulting across specialties
          (medical consultation in surgical patients, perioperative
          evaluation, etc.).
      OTHER:
        title: Other
        description: >-
          The disorder does not fit cleanly into any of the above
          Parts. Use sparingly and prefer the most relevant Part where
          possible.
