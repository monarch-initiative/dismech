      source_nodes:
        - HP:0000118  ## phenotypic abnormality
        - MONDO:0000001  ## disease (for complications/comorbidities)
      is_direct: false
      relationship_types:
        - rdfs:subClassOf
  InheritanceTerm:
    description: A term representing mode of inheritance
    reachable_from:
      source_nodes:
        - HP:0000005  ## mode of inheritance
      is_direct: false
      relationship_types:
        - rdfs:subClassOf
  AnatomicalEntityTerm:
    description: A term representing an anatomical entity
    reachable_from:
      source_nodes:
        - UBERON:0001062  ## anatomical entity
      is_direct: false
      relationship_types:
        - rdfs:subClassOf
  TreatmentActionTerm:
    description: A term representing a medical action or treatment (from MAXO or NCIT)
    reachable_from:
      source_nodes:
        - MAXO:0000001  ## medical action
        - NCIT:C25218  ## Clinical Intervention or Procedure
      is_direct: false
      relationship_types:
        - rdfs:subClassOf
  RegimenTerm:
    description: A term representing a treatment regimen (from NCIT)
    reachable_from:
      source_nodes:
        - NCIT:C15697  ## Treatment Regimen
        - NCIT:C62634  ## Chemo/immuno/hormone Therapy Regimen
      is_direct: false
      relationship_types:
        - rdfs:subClassOf
  GeographyTerm:
    description: A place or location
  PhaseTerm:
    description: A phase or stage
  LifeCycleStageTerm:
    description: A parasite life cycle stage term (from OPL)
    reachable_from:
      source_nodes:
        - UBERON:0000105  ## life cycle stage
      is_direct: false
      relationship_types:
        - rdfs:subClassOf
  TriggerTerm:
    description: A trigger
  GeneTerm:
    description: A gene term from HGNC
    comments:
      - Uses HGNC gene nomenclature committee identifiers
      - Validation requires exact label match with HGNC database
  CellTypeTerm:
    description: A cell type
    reachable_from:
      source_nodes:
        - CL:0000000  ## cell
      is_direct: false
      relationship_types:
        - rdfs:subClassOf
  BiomarkerTerm:
    description: >-
      A biomarker term from NCIT. Includes proteins, gene products, fusion products,
      and other molecular markers. No hierarchy constraint - validates term exists
      and label matches.
    comments:
      - NCIT biomarkers span multiple hierarchies (proteins, genes, fusions, hormones)
      - Validation checks term exists in NCIT with correct label
  BiomarkerReadoutRelationshipEnum:
    description: Relationship between a biomarker and the pathograph node it reports on
    permissible_values:
      READOUT_OF:
        title: Readout of
        description: The biomarker directly or indirectly measures the linked event or mechanism
      CORRELATES_WITH:
        title: Correlates with
        description: The biomarker is statistically or clinically associated with the linked event or endpoint
      PREDICTS:
        title: Predicts
        description: The biomarker predicts a later event, endpoint, or clinical outcome
      PHARMACODYNAMIC_MARKER_OF:
        title: Pharmacodynamic marker of
        description: The biomarker reports biological response to a treatment or intervention at the linked node
  BiomarkerReadoutDirectionEnum:
    description: Direction of association between biomarker value/presence and the linked event or endpoint
    permissible_values:
      POSITIVE:
        title: Positive
        description: Higher biomarker value or stronger presence tracks with more of the linked event
      NEGATIVE:
        title: Negative
        description: Higher biomarker value or stronger presence tracks with less of the linked event
      PRESENT_ABSENT:
        title: Present/absent
        description: Biomarker presence or absence, rather than monotonic level, is the interpretable signal
      THRESHOLD_DEPENDENT:
        title: Threshold dependent
        description: Interpretation depends on threshold, range, genotype, assay, or clinical context
  BiomarkerEndpointContextEnum:
    description: Endpoint or use context for a biomarker readout link
    permissible_values:
      DIAGNOSTIC:
        title: Diagnostic
        description: Used to support diagnosis or disease classification
      PROGNOSTIC:
        title: Prognostic
        description: Associated with future risk, disease severity, or clinical outcome
      MONITORING:
        title: Monitoring
        description: Used to track disease state or progression over time
      PHARMACODYNAMIC:
        title: Pharmacodynamic
        description: Used to track biological response to treatment or perturbation
      CANDIDATE_SURROGATE:
        title: Candidate surrogate
        description: Potential surrogate endpoint candidate requiring explicit outcome-link evidence
  SurrogateEndpointTableEnum:
    description: FDA surrogate endpoint table section from which a row was curated
    permissible_values:
      ADULT_NONCANCER:
        title: Adult non-cancer related
        description: Adult Surrogate Endpoints - Non-cancer Related
      ADULT_CANCER:
        title: Adult cancer related
        description: Adult Surrogate Endpoints - Cancer Related
      PEDIATRIC_NONCANCER:
        title: Pediatric non-cancer related
        description: Pediatric Surrogate Endpoints - Non-cancer Related
      PEDIATRIC_CANCER:
        title: Pediatric cancer related
        description: Pediatric Surrogate Endpoints - Cancer Related
  SurrogateEndpointApprovalTypeEnum:
    description: Regulatory approval pathway context represented in the FDA surrogate endpoint table
    permissible_values:
      ACCELERATED:
        title: Accelerated
        description: Endpoint may support accelerated approval in the curated context
      TRADITIONAL:
        title: Traditional
        description: Endpoint may support traditional approval in the curated context
      ACCELERATED_OR_TRADITIONAL:
        title: Accelerated or traditional
        description: Endpoint may support accelerated or traditional approval depending on context of use
      TRADITIONAL_AND_MONOGRAPH:
        title: Traditional and monograph
        description: Endpoint appears in FDA table as traditional and monograph
  SurrogateEndpointValidationLevelEnum:
    description: BEST-aligned regulatory validation level inferred or curated for a surrogate endpoint
    permissible_values:
      VALIDATED_SURROGATE_ENDPOINT:
        title: Validated surrogate endpoint
        description: Supported by clinical data providing strong evidence that the endpoint predicts clinical benefit
      REASONABLY_LIKELY_SURROGATE_ENDPOINT:
        title: Reasonably likely surrogate endpoint
        description: Supported by strong mechanistic and/or epidemiologic rationale, but without sufficient clinical validation for full surrogate validation
      CONTEXT_DEPENDENT_SURROGATE_ENDPOINT:
        title: Context-dependent surrogate endpoint
        description: Validation and approval pathway depend on context of use, disease setting, effect size, duration, residual uncertainty, and available therapy
  ClinicalBenefitLinkageEnum:
    description: How a surrogate endpoint is linked to clinical benefit in the regulatory context
    permissible_values:
      KNOWN_TO_PREDICT_CLINICAL_BENEFIT:
        title: Known to predict clinical benefit
        description: FDA table approval context indicates the endpoint is known to predict clinical benefit for the curated context
      REASONABLY_LIKELY_TO_PREDICT_CLINICAL_BENEFIT:
        title: Reasonably likely to predict clinical benefit
        description: FDA table approval context indicates the endpoint is reasonably likely to predict clinical benefit
      CONTEXT_DEPENDENT:
        title: Context dependent
        description: Clinical-benefit linkage depends on context of use and approval pathway
  SurrogateEndpointFootnoteEnum:
    description: Footnotes and symbols used in the FDA surrogate endpoint workbook
    permissible_values:
      COMPOSITE_BIOMARKER_SURROGATE:
        title: Composite biomarker surrogate
        description: Surrogate endpoint is part of a composite of biomarker surrogate endpoints
      MECHANISM_AGNOSTIC:
        title: Mechanism agnostic
        description: Many mechanisms of action are associated with the surrogate endpoint, so it is not directly related to a particular causal pathway
      TUMOR_BURDEN_CONTEXT_DEPENDENT:
        title: Tumor burden context dependent
        description: Tumor-burden endpoints may support accelerated or traditional approval depending on context of use
      ANTICIPATED_PRIMARY_EFFICACY_USE:
        title: Anticipated primary efficacy use
        description: FDA anticipates the endpoint could be appropriate as a primary efficacy endpoint although it has not yet supported an approved NDA or BLA
      BONE_MINERAL_DENSITY_CONTEXT:
        title: Bone mineral density context
        description: Bone mineral density footnote for male or glucocorticoid-induced osteoporosis contexts
      CLINICAL_ENDPOINTS_REQUIRED:
        title: Clinical endpoints required
        description: Clinical endpoints were required for the approvals
      ARRHYTHMIA_RESPONSE_DEFINITION:
        title: Arrhythmia response definition
        description: Specialized response definition footnote for supraventricular tachycardia endpoint
  SurrogateEndpointMappingStatusEnum:
    description: Status of mapping an FDA disease/use row to dismech disease entries
    permissible_values:
      EXACT_DISMECH_MATCH:
        title: Exact dismech match
        description: FDA disease/use maps directly to an existing dismech disease entry
      CURATED_DISMECH_MAPPING:
        title: Curated dismech mapping
        description: Mapping was manually curated despite non-identical labels
      CANDIDATE_DISMECH_MAPPING:
        title: Candidate dismech mapping
        description: Row mentions a disease represented in dismech but the FDA disease/use row is broader, multi-condition, or otherwise requires review
      NEEDS_CURATION:
        title: Needs curation
        description: No dismech disease mapping has been assigned yet
      NOT_DISEASE_SPECIFIC:
        title: Not disease specific
        description: FDA row is a use, vaccine, or broad product context rather than a directly mappable disease entry
  GeneProductTerm:
    description: >-
      A gene product term from NCIT. Includes proteins, fusion proteins, oncoproteins,
      and other gene products involved in disease mechanisms.
    reachable_from:
      source_nodes:
        - NCIT:C26548  ## Gene Product
      is_direct: false
      relationship_types:
        - rdfs:subClassOf
  HistopathologyFindingTerm:
    description: >-
      A histopathologic finding term from NCIT. Includes morphologic findings,
      architectural patterns, growth patterns, cellular features, and grading.
      Rooted at NCIT:C35867 (Morphologic Finding) and NCIT:C18000 (Histologic Grade).
    comments:
      - NCIT:C35867 Morphologic Finding - architectural patterns, dysplasia, necrosis, etc.
      - NCIT:C18000 Histologic Grade - Fuhrman, Nottingham, WHO grades, etc.
      - Also includes HP terms for rosettes (HP:0031925-HP:0031930)
    reachable_from:
      source_nodes:
        - NCIT:C35867  ## Morphologic Finding
        - NCIT:C18000  ## Histologic Grade
        - NCIT:C4741   ## Neoplasm by Morphology
        - NCIT:C7062   ## Neoplasm by Special Category
        - NCIT:C36289  ## Hematopoietic System Finding (for blast findings)
        - NCIT:C19955  ## Myeloproliferation (e.g., megakaryocyte proliferation)
        - NCIT:C188218 ## Neuroendocrine Tumor (PCC/PGL histopathology)
        - NCIT:C37008  ## Neoplastic Large Lymphocyte (e.g., Reed-Sternberg cells)
        - HP:0025461   ## Abnormal cell morphology (for rosettes, inclusion bodies)
      is_direct: false
      relationship_types:
        - rdfs:subClassOf
  DiseaseTerm:
    description: >-
      A MONDO disease, inherited disease susceptibility, or related medical
      condition term used to anchor a curated disorder entry
    reachable_from:
      source_nodes:
        - MONDO:0000001  ## disease
        - MONDO:0020573  ## inherited disease susceptibility
      is_direct: false
      relationship_types:
        - rdfs:subClassOf
  NCITDiseaseOrFindingTerm:
    description: >-
      An NCIT disease-oriented oncology term used for disease-level cancer
      mappings and subtype grounding, including neoplasm-by-morphology,
      special-category neoplasm, and clinically used disease/finding boundary
      concepts.
    comments:
      - Prefer MONDO for disease_term and subtype_term when an appropriate MONDO class exists.
      - Use this range for supplemental NCIT disease mappings on cancer entries.
      - Use this range for cancer subtype grounding when MONDO lacks the needed oncology refinement.
      - Broad rooting across NCIT disease and neoplasm branches accommodates clinically important labels such as CMML-0/1/2.
    reachable_from:
      source_nodes:
        - NCIT:C2991  ## Disease or Disorder
        - NCIT:C4741  ## Neoplasm by Morphology
        - NCIT:C7062  ## Neoplasm by Special Category
      is_direct: false
      relationship_types:
        - rdfs:subClassOf
  DiseaseOrSubtypeTerm:
    description: >-
      A MONDO disease term or NCIT cancer disease/subtype term used to ground a
      disease subtype or cancer facet value.
    reachable_from:
      source_nodes:
        - MONDO:0000001  ## disease
        - NCIT:C2991  ## Disease or Disorder
        - NCIT:C4741  ## Neoplasm by Morphology
        - NCIT:C7062  ## Neoplasm by Special Category
      is_direct: false
      relationship_types:
        - rdfs:subClassOf
  ICD10CMTerm:
    description: An ICD-10-CM diagnosis code
    reachable_from:
      source_nodes:
        - ICD10CM:A00-B99   ## Certain infectious and parasitic diseases
        - ICD10CM:C00-D49   ## Neoplasms
        - ICD10CM:D50-D89   ## Diseases of the blood and immune mechanism
        - ICD10CM:E00-E89   ## Endocrine, nutritional and metabolic diseases
        - ICD10CM:F01-F99   ## Mental, Behavioral and Neurodevelopmental disorders
        - ICD10CM:G00-G99   ## Diseases of the nervous system
        - ICD10CM:H00-H59   ## Diseases of the eye and adnexa
        - ICD10CM:H60-H95   ## Diseases of the ear and mastoid process
        - ICD10CM:I00-I99   ## Diseases of the circulatory system
        - ICD10CM:J00-J99   ## Diseases of the respiratory system
        - ICD10CM:K00-K95   ## Diseases of the digestive system
        - ICD10CM:L00-L99   ## Diseases of the skin and subcutaneous tissue
        - ICD10CM:M00-M99   ## Diseases of the musculoskeletal system and connective tissue
        - ICD10CM:N00-N99   ## Diseases of the genitourinary system
        - ICD10CM:O00-O9A   ## Pregnancy, childbirth and the puerperium
        - ICD10CM:P00-P96   ## Certain conditions originating in the perinatal period
        - ICD10CM:Q00-Q99   ## Congenital malformations, deformations and chromosomal abnormalities
        - ICD10CM:R00-R99   ## Symptoms, signs and abnormal clinical findings
        - ICD10CM:S00-T88   ## Injury, poisoning and other consequences
        - ICD10CM:U00-U85   ## Codes for special purposes
        - ICD10CM:V00-Y99   ## External causes of morbidity
        - ICD10CM:Z00-Z99   ## Factors influencing health status
      is_direct: false
      relationship_types:
        - rdfs:subClassOf
  ICD11FTerm:
    description: An ICD-11 Foundation diagnosis code
    reachable_from:
      source_nodes:
        - icd11f:455013390  ## ICD Category
      is_direct: false
      relationship_types:
        - rdfs:subClassOf
  ExposureTerm:
    description: A term representing an exposure event (from ECTO or XCO)
    comments:
      - ECTO (Environmental Conditions, Treatments, and Exposures Ontology) is preferred
      - XCO (Experimental Conditions Ontology) can also be used
    reachable_from:
      source_nodes:
        - ExO:0000002  ## exposure event (ECTO root)
        - XCO:0000000  ## experimental condition (XCO root)
      is_direct: false
      relationship_types:
        - rdfs:subClassOf
  EnvironmentTerm:
    description: A term representing an environmental context, material, or feature (from ENVO)
    comments:
      - ENVO (Environment Ontology) describes habitats, biomes, environmental features, materials, and constructed settings
    reachable_from:
      source_nodes:
        - ENVO:01000254  ## environmental system (ecosystems, biomes)
        - ENVO:00010483  ## environmental material (water, soil, air, etc.)
        - ENVO:01001886  ## landform (mountains, valleys, etc.)
        - ENVO:00000070  ## human construction (healthcare facilities, factories, transport hubs)
      is_direct: false
      relationship_types:
        - rdfs:subClassOf
  FoodTerm:
    description: A term representing a food, beverage, nutrient, mineral, or supplement source (from FOODON or CHEBI)
    comments:
      - FOODON is used for specific foods, beverages, and food products
      - CHEBI is used when the relevant dietary entity is an exact nutrient, mineral, vitamin, or supplement
    reachable_from:
      source_nodes:
        - FOODON:00001002  ## food product
        - CHEBI:33284  ## nutrient
      is_direct: false
      relationship_types:
        - rdfs:subClassOf
  OrganismTerm:
    description: A term representing an organism from NCBITaxon
    reachable_from:
      source_nodes:
        - NCBITaxon:1  ## root of taxonomy
        - NCBITaxon:10239 ## viruses (may not always be accessible from root)
      is_direct: false
      relationship_types:
        - rdfs:subClassOf
  OnsetEnum:
    description: Age of onset categories from HPO
    permissible_values:
      ANTENATAL:
        description: Antenatal onset
        meaning: HP:0030674
      EMBRYONAL:
        description: Embryonal onset
        meaning: HP:0011460
      FETAL:
        description: Fetal onset
        meaning: HP:0011461
      CONGENITAL:
        description: Congenital onset
        meaning: HP:0003577
      NEONATAL:
        description: Neonatal onset
        meaning: HP:0003623
      INFANTILE:
        description: Infantile onset
        meaning: HP:0003593
      CHILDHOOD:
        description: Childhood onset
        meaning: HP:0011463
      JUVENILE:
        description: Juvenile onset
        meaning: HP:0003621
      YOUNG_ADULT:
        description: Young adult onset
        meaning: HP:0011462
      MIDDLE_AGE:
        description: Middle age onset
        meaning: HP:0003596
      LATE:
        description: Late onset
        meaning: HP:0003584
      PUERPERAL:
        description: Puerperal onset
        aliases:
          - Puerpural onset
        meaning: HP:4000040
  ZygosityEnum:
    description: Zygosity categories from GENO
    permissible_values:
      HETEROZYGOUS:
        description: Heterozygous
        meaning: GENO:0000135
      SIMPLE_HETEROZYGOUS:
        description: Simple heterozygous
        meaning: GENO:0000458
      COMPOUND_HETEROZYGOUS:
        description: Compound heterozygous
        meaning: GENO:0000402
      HOMOZYGOUS:
        description: Homozygous
        meaning: GENO:0000136
      HEMIZYGOUS:
        description: Hemizygous
        meaning: GENO:0000134
  DatasetTypeEnum:
    description: Type of dataset or data resource
    permissible_values:
      MICROARRAY:
        description: Gene expression microarray
      BULK_RNA_SEQ:
        description: Bulk RNA sequencing
      SINGLE_CELL_RNA_SEQ:
        description: Single-cell RNA sequencing
      SPATIAL_TRANSCRIPTOMICS:
        description: Spatially resolved transcriptomics
      METHYLATION:
        description: DNA methylation profiling
      CHIP_SEQ:
        description: Chromatin immunoprecipitation sequencing
      ATAC_SEQ:
        description: Assay for transposase-accessible chromatin sequencing
      PROTEOMICS:
        description: Protein expression profiling
      METABOLOMICS:
        description: Metabolite profiling
      GWAS:
        description: Genome-wide association study
      WGS:
        description: Whole genome sequencing
      WES:
        description: Whole exome sequencing
      PHENOPACKETS:
        description: GA4GH Phenopacket collection (case-level phenotype data)
      VARIANT_DATABASE:
        description: Curated genetic variant collection
      MULTI_OMICS:
        description: Integrated multi-omics profiling (e.g., combined transcriptomics, proteomics, metabolomics)
      MULTI_OMICS_PERTURBATION:
        description: >-
          Multi-omics profiling of genetic perturbations (e.g., CRISPR knockout
          combined with transcriptomic, chromatin accessibility, and cellular phenotyping)
  ExperimentalModelTypeEnum:
    description: >-
      Broad disease-centric categories for experimental model systems, primarily
      non-animal systems curated in this section
    permissible_values:
      ORGANOID:
        description: Self-organizing three-dimensional tissue model, often stem-cell-derived
      ORGAN_ON_CHIP:
        description: Microfluidic organ- or tissue-on-chip model
      CELL_LINE:
        description: Immortalized cell line-based disease model
      IPSC_DERIVED_MODEL:
        description: Differentiated model derived from induced pluripotent stem cells
      PRIMARY_CELL_CULTURE:
        description: Primary-cell or biopsy-derived culture system, including monolayers
      CO_CULTURE:
        description: Host-microbe or multi-cell-type coculture system
      OTHER:
        description: Other experimental model type not covered above
  CurationActionEnum:
    description: Simple action types for curation audit trail
    permissible_values:
      CREATED:
        description: Initial file creation
      EDITED:
        description: File modification

  ClinicalTrialPhaseEnum:
    description: Clinical trial phase categories per FDA/NIH standards
    permissible_values:
      PHASE_I:
        description: Phase I - Initial safety and dosage assessment in small group (20-100 participants)
      PHASE_II:
        description: Phase II - Efficacy and side effects assessment in larger group (100-500 participants)
      PHASE_III:
        description: Phase III - Efficacy confirmation and monitoring in large population (1000-5000 participants)
      PHASE_IV:
        description: Phase IV - Post-market surveillance and additional benefits/risks studies
      NOT_APPLICABLE:
        description: Trial does not follow standard FDA phase classification (e.g., observational, device studies)

  ClinicalTrialStatusEnum:
    description: Clinical trial recruitment and status categories per ClinicalTrials.gov
    permissible_values:
      RECRUITING:
        description: Currently enrolling participants
      NOT_RECRUITING:
        description: Not currently enrolling but may in the future
      ACTIVE_NOT_RECRUITING:
        description: Actively recruiting previously enrolled participants (closed to new enrollment)
      COMPLETED:
        description: Trial data collection and analysis completed
      ENROLLING_BY_INVITATION:
        description: Enrollment restricted to invited participants only
      SUSPENDED:
        description: Temporarily halted pending review or administrative action
      TERMINATED:
        description: Stopped before completion, may include safety or efficacy concerns
      WITHDRAWN:
        description: Closed before enrollment began (never enrolled participants)
      UNKNOWN:
        description: Status unknown or not provided

  ComputationalModelTypeEnum:
    description: Type of computational or in-silico model
    permissible_values:
      GENOME_SCALE_METABOLIC:
        description: Genome-scale metabolic reconstruction (e.g., Recon3D, Harvey)
      FLUX_BALANCE_ANALYSIS:
        description: Constraint-based FBA model
      KINETIC:
        description: ODE-based kinetic model with rate equations
      AGENT_BASED:
        description: Agent-based simulation model
      BOOLEAN_NETWORK:
        description: Boolean gene regulatory network
      PHYSIOLOGICAL:
        description: Physiologically-based pharmacokinetic (PBPK) or organ model
      DIGITAL_TWIN:
        description: Patient-specific computational model
      MACHINE_LEARNING:
        description: ML/AI predictive model trained on disease data
      PERTURBATION_PREDICTION:
        description: Cell-based perturbation models (CRISPR screens, chemical perturbations) with gene expression readouts
      FOUNDATION_MODEL:
        description: Pre-trained single-cell foundation models (scGPT, Geneformer, scGenePT) for perturbation response prediction
      STRUCTURAL_PREDICTION:
        description: Protein structure prediction (AlphaFold, RoseTTAFold) or experimental structure (PDB X-ray, cryo-EM) used to understand disease mechanisms
      MOLECULAR_DOCKING:
        description: Computational docking or molecular dynamics simulation of drug candidates to protein targets, typically informed by PDB/AlphaFold structures

  ThresholdDirectionEnum:
    description: Whether a threshold activates when the variable goes above or below the value
    permissible_values:
      above:
        description: Activates when the variable exceeds the threshold
      below:
        description: Activates when the variable falls below the threshold

  CausalLinkTypeEnum:
    description: Degree of mechanistic directness represented by a causal edge
    permissible_values:
      DIRECT:
        description: Direct causal influence at the current graph granularity
      INDIRECT_KNOWN_INTERMEDIATES:
        description: Indirect relationship where one or more intermediates are known but omitted from the graph
      INDIRECT_UNKNOWN_INTERMEDIATES:
        description: Indirect relationship where at least one required intermediate mechanism is currently unknown
      UNKNOWN:
        description: Directness has not yet been determined

  TreatmentEffectEnum:
    description: How a treatment affects a pathophysiology mechanism node
    permissible_values:
      INHIBITS:
        description: Blocks or decreases the mechanism (e.g., TKI inhibiting constitutive kinase activity)
      ACTIVATES:
        description: Promotes or increases the mechanism (e.g., enzyme replacement restoring a deficient pathway)
      MODULATES:
        description: Alters the mechanism without clear unidirectional effect
      BYPASSES:
        description: Works around the disrupted mechanism via an alternative pathway
      RESTORES:
        description: Restores normal function of a disrupted mechanism (e.g., gene therapy, enzyme replacement)

  MechanisticHypothesisStatusEnum:
    description: Curation/maturity status for a disease-level mechanistic hypothesis
    permissible_values:
      CANONICAL:
        description: Widely accepted explanatory model used as the default disease mechanism
      ALTERNATIVE:
        description: Plausible competing or superimposed hypothesis with supporting evidence
      EMERGING:
        description: Early-stage hypothesis with limited or recently reported evidence
      DEPRECATED:
        description: Historical hypothesis no longer supported as the current model

  ComorbidityDirectionEnum:
    description: Directionality of a comorbidity/trajectory association
    permissible_values:
      A_BEFORE_B:
        description: A precedes B
      B_BEFORE_A:
        description: B precedes A
      BIDIRECTIONAL:
        description: Evidence supports both directions
      SAME_TIME:
        description: Co-incident or same-time association
      UNKNOWN:
        description: Directionality is unknown or not established

  CurationStatusEnum:
    description: Curation workflow status for an association
    permissible_values:
      CANDIDATE:
        description: Prioritized for curation
      IN_PROGRESS:
        description: Curation in progress
      CURATED:
        description: Curated with literature-backed evidence
      DEFERRED:
        description: Deferred or deprioritized

  AssociationSignalSourceEnum:
    description: Source of an association signal
    permissible_values:
      DISEASE_TRAJECTORIES:
        description: Disease Trajectories (CSH/Austria)
      COHD:
        description: Columbia Open Health Data (COHD)
      LITERATURE:
        description: Published literature source
      OTHER:
        description: Other or unspecified source

  AssociationSignalMethodEnum:
    description: Method used to derive an association signal
    permissible_values:
      EHR_TEMPORAL_COMORBIDITY:
        description: EHR-derived temporal comorbidity/trajectory signal
      EHR_COHORT_ASSOCIATION:
        description: EHR-derived cohort association (non-temporal)
      LITERATURE_ASSOCIATION:
        description: Association reported in the literature
      COMPUTATIONAL_INFERENCE:
        description: Computational inference or enrichment
      OTHER:
        description: Other or unspecified method

  SexEnum:
    description: Sex-specific stratum
    permissible_values:
      MALE:
        description: Male
      FEMALE:
        description: Female
      OTHER:
        description: Other or nonbinary
      UNKNOWN:
        description: Unknown or not specified

  ConditionCompositionEnum:
    description: Composition type for a composite condition descriptor
    permissible_values:
      SINGLE:
        description: Single condition (default)
      UNION:
        description: Union of multiple component conditions
      CATEGORY:
        description: Category code encompassing multiple conditions
      OVERLAPS:
        description: Overlapping condition set (non-exhaustive)
      SUBSET_OF:
        description: Subset of a broader condition group
      OTHER:
        description: Other or unspecified composition

  AssociationMetricTypeEnum:
    description: Type of association metric
    permissible_values:
      OR:
        description: Odds ratio
      AOR:
        description: Adjusted odds ratio
      RR:
        description: Relative risk
      HR:
        description: Hazard ratio
      PREVALENCE:
        description: Prevalence proportion
      INCIDENCE_RATE:
        description: Incidence rate
      IRR:
        description: Incidence rate ratio
      CHI_SQUARE:
        description: Chi-square association statistic
      LOG_OBS_EXP_RATIO:
        description: Natural-log observed-to-expected co-occurrence ratio
      OTHER:
        description: Other or unspecified metric
  MechanismConfidenceEnum:
    description: Level of confidence in a pathophysiology mechanism
    permissible_values:
      ESTABLISHED:
        title: Established
        description: Well-established mechanism with strong evidence from multiple independent studies
      HYPOTHETICAL:
        title: Hypothetical
        description: Hypothetical mechanism with limited or indirect evidence; plausible but not yet validated
      PROVISIONAL:
        title: Provisional
        description: Provisional mechanism under active investigation with emerging but incomplete evidence

  ReferenceTagEnum:
    description: >-
      Controlled vocabulary for tagging top-level references by authoritative source type.
      Enables queries like "which disorders lack a GeneReviews citation?"
    permissible_values:
      GeneReviews:
        title: GeneReviews
        description: >-
          Reference is a GeneReviews article published in the NCBI Bookshelf
          (https://www.ncbi.nlm.nih.gov/books/NBK1116/). GeneReviews are
          expert-authored, peer-reviewed summaries updated on a rolling basis;
          they are the gold-standard narrative resource for rare Mendelian
          disease phenotyping and management.
slots:
  name:
    examples:
      - value: Adolescent Nephronophthisis
    identifier: true
    range: string
  display_name:
    description: >-
      Human-readable display name for a subtype, used when the name (which
      serves as the FK target) is too terse for comfortable display. Optional;
      when absent, renderers should fall back to name.
    range: string
  slug:
    description: Canonical slug identifier (Title_Case_With_Underscores) for leaf conditions
    range: string
  description:
    range: string
    # recommended: true
  preferred_term:
    description: >-
      The preferred human-readable term for this descriptor. This may be more specific
      or nuanced than the linked ontology term label when the ontology does not fully
      capture the desired granularity. Note that postcomposition using the modifier
      slot may be appropriate for capturing the semantics of the preferred term.
    range: string
    required: true
  term:
    description: Optional structured ontology term reference
    range: Term
    inlined: true
    recommended: true
  modifier:
    description: Directional or qualitative modifier for a descriptor (e.g., increased, decreased, abnormal)
    range: ModifierEnum
  located_in:
    description: Anatomical location where this entity/process occurs or procedure is performed
    range: AnatomicalEntityDescriptor
    inlined: true
  laterality:
    description: Laterality qualifier (left, right, or bilateral)
    range: LateralityEnum
  spatial_extent:
    description: The spatial extent or distribution pattern applicable to this descriptor (e.g., focal, diffuse, extensive)
    range: SpatialExtentEnum
  temporality:
    description: Temporal qualifier for this descriptor (e.g., acute, chronic, recurrent)
    range: TemporalityEnum
  clinical_course:
    description: Clinical course qualifier for this descriptor (e.g., progressive, stable)
    range: ClinicalCourseEnum
  therapeutic_agent:
    description: >-
      The drug, chemical, or therapeutic agent used in a treatment. Use when the MAXO term
      is generic (e.g., pharmacotherapy) but specific drugs are involved.
    range: ChemicalEntityDescriptor
    inlined: true
    multivalued: true
    comments:
      - Bind to CHEBI for specific chemicals/drugs
      - Can also use NCIT for drug classes when CHEBI term unavailable
  dietary_modifications:
    description: >-
      Structured dietary additions, restrictions, avoidances, or substitutions associated
      with a treatment descriptor.
    range: DietaryModification
    multivalued: true
    inlined_as_list: true
    comments:
      - Use only for intentional prescribed dietary manipulations within a treatment entry
      - Do not mirror environmental risk factors here unless the treatment explicitly prescribes avoidance, restriction, or addition
  qualifiers:
    description: >-
      List of predicate-value pairs for formal post-composition. Allows OWL-like
      expressivity with controlled predicates (e.g., RO relations) and values.
    multivalued: true
    range: Qualifier
    inlined_as_list: true
    deprecated: Prefer explicit slots like located_in and laterality instead of generic qualifiers
  predicate:
    description: The relationship/predicate in a qualifier (e.g., RO:0002233 'has input')
    range: Descriptor
    inlined: true
  value:
    description: The value/filler in a qualifier
    range: Descriptor
    inlined: true
  action:
    description: The dietary action being applied
    range: DietaryModificationActionEnum
  food:
    description: The FOODON-bound food or beverage targeted by a dietary modification
    range: FoodDescriptor
    inlined: true
  id:
    description: Ontology term identifier (CURIE)
    range: uriorcurie
    identifier: true
  label:
    description: Human-readable label for the ontology term
    range: string
    comments:
      - This is automatically validated by the linkml-term-validator tool.
  evidence:
    multivalued: true
    range: EvidenceItem
    inlined_as_list: true
    recommended: true
  distinguishing_features:
    description: >-
      Key clinical, laboratory, imaging, or epidemiological features that help differentiate a related condition from the focal disease
    multivalued: true
    range: string
  review_notes:
    examples:
