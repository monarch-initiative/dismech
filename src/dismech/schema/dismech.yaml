    uri: xsd:string

enums:
  EvidenceItemSupportEnum:
    description: The level of support for an evidence item
    permissible_values:
      WRONG_STATEMENT:
        title: Wrong statement
        description: >-
          The annotated claim contains a demonstrable factual error (e.g., an incorrect
          statistic or assertion); the cited evidence documents the correct information.
          Use this when the claim is outright wrong, not merely contested.
          If the cited reference simply does not mention the claim, use NO_EVIDENCE instead.
          If the reference contradicts the claim but does not prove it factually wrong, use REFUTE.
      SUPPORT:
        title: Supports
        description: The cited evidence directly supports the claim
      REFUTE:
        title: Refutes
        description: The cited evidence directly contradicts the claim
      NO_EVIDENCE:
        title: No evidence
        description: The cited reference does not contain evidence relevant to the claim
      PARTIAL:
        title: Partially supports
        description: The cited evidence partially or indirectly supports the claim
  EvidenceSourceEnum:
    description: The provenance/source of the evidence item
    permissible_values:
      HUMAN_CLINICAL:
        title: Human clinical
        description: Human clinical observations (patients, cohorts, case reports, clinical trials, epidemiology)
      MODEL_ORGANISM:
        title: Model organism
        description: In vivo animal evidence (mouse, zebrafish, primate, veterinary case series including dog/cat/horse, other non-human animal models etc.)
      IN_VITRO:
        title: In vitro / ex vivo
        description: In vitro or ex vivo assays (cell culture, organoids, tissue slices, biochemical assays)
      COMPUTATIONAL:
        title: Computational
        description: In silico/modeling studies (simulation, docking, ML predictions, network inference) even when using clinical data inputs
      OTHER:
        title: Other
        description: Evidence not fitting the above (e.g., expert consensus without data, image atlases without cohort context)
  DefinitionTypeEnum:
    description: The type of definition or criteria set
    permissible_values:
      DIAGNOSTIC_CRITERIA:
        description: Published diagnostic criteria (clinical/serologic/imaging)
      PHENOTYPE_ALGORITHM:
        description: Algorithmic phenotype definition (e.g., PheKB-style)
      CASE_DEFINITION:
        description: Case definition for surveillance or reporting
      OTHER:
        description: Other definition type
  MappingConsistencyEnum:
    description: Consistency of a mapping relative to another reference source
    permissible_values:
      CONSISTENT:
        description: Mapping is consistent with the reference source
      INCONSISTENT:
        description: Mapping conflicts with the reference source
      MISSING:
        description: Mapping is missing from the reference source
      UNKNOWN:
        description: Consistency not assessed or unclear
  FrequencyEnum:
    description: The frequency of an event or phenomenon
    permissible_values:
      OBLIGATE:
        title: Obligate (100%)
        description: Present in all cases (100% of patients)
        meaning: HP:0040280
      VERY_FREQUENT:
        title: Very frequent (80-99%)
        description: Present in most cases (80-99% of patients)
        aliases:
          - Very frequent
        meaning: HP:0040281
      FREQUENT:
        title: Frequent (30-79%)
        description: Present in many cases (30-79% of patients)
        meaning: HP:0040282
      OCCASIONAL:
        title: Occasional (5-29%)
        description: Present in some cases (5-29% of patients)
        meaning: HP:0040283
      VERY_RARE:
        title: Very rare (<5%)
        description: Present in rare cases (<5% of patients)
        aliases:
          - Very rare
        meaning: HP:0040284
  ClinicalSignificanceEnum:
    description: The clinical significance of a variant for a condition (ACMG guidelines)
    permissible_values:
      PATHOGENIC:
        title: Pathogenic
        description: Variant is pathogenic for the condition (ACMG class 5)
        aliases:
          - pathogenic_for_condition
        meaning: GENO:0000840
      LIKELY_PATHOGENIC:
        title: Likely pathogenic
        description: Variant is likely pathogenic for the condition (ACMG class 4)
        aliases:
          - likely_pathogenic_for_condition
        meaning: GENO:0000841
      BENIGN:
        title: Benign
        description: Variant is benign for the condition (ACMG class 1)
        aliases:
          - benign_for_condition
        meaning: GENO:0000843
      LIKELY_BENIGN:
        title: Likely benign
        description: Variant is likely benign for the condition (ACMG class 2)
        aliases:
          - likely_benign_for_condition
        meaning: GENO:0000844
      UNCERTAIN_SIGNIFICANCE:
        title: Uncertain significance
        description: Clinical significance of the variant is uncertain (ACMG class 3)
        aliases:
          - has_uncertain_significance_for_condition
        meaning: GENO:0000845
  RegulatoryVariantCategoryEnum:
    description: >-
      Functional classification of non-coding gene regulatory variants
      based on their impact on gene expression patterns. Adapted from
      Cheng et al. 2024 (PMID:38436667). Includes traditional coding
      variant categories for completeness.
    permissible_values:
      LOE:
        title: Loss of expression
        description: >-
          Non-modular loss-of-expression. Diminishes or abolishes gene
          expression across all cell types that intrinsically express the gene.
          Analogous to coding amorphic or hypomorphic loss-of-function.
        see_also:
          - PMID:38436667
        notes:
          - "Defined in Cheng et al. 2024 (PMID:38436667) as non-modular LOE"
      mLOE:
        title: Modular loss of expression
        description: >-
          Modular loss-of-expression. Diminishes or abolishes gene expression
          in only a subset of cell types or developmental windows. Represents
          a disease mechanism largely unique to non-coding regulatory variants.
        see_also:
          - PMID:38436667
        notes:
          - "Defined in Cheng et al. 2024 (PMID:38436667) as modular LOE (mLOE)"
      GOE:
        title: Gain of ectopic expression
        description: >-
          Gain-of-ectopic-expression. Results in ectopic spatial and/or
          temporal expression of a gene. Can arise from enhancer adoption,
          novel TFBS creation, promoter switching, or repressor site disruption.
        see_also:
          - PMID:38436667
        notes:
          - "Defined in Cheng et al. 2024 (PMID:38436667) as gain-of-ectopic-expression (GOE)"
      LOF:
        title: Loss of function
        description: >-
          Coding loss-of-function. Loss of normal biological function via
          complete (amorphic) or partial (hypomorphic) loss of protein activity.
      GOF:
        title: Gain of function
        description: >-
          Coding gain-of-function. Creates a protein with increased activity
          (hypermorphic) or entirely new function (neomorphic).
      DN:
        title: Dominant negative
        description: >-
          Dominant-negative. Creates a protein that blocks the normal
          function of the remaining wild-type protein (antimorphic).
  RegulatoryElementTypeEnum:
    description: >-
      Type of gene regulatory element disrupted by a non-coding variant.
    permissible_values:
      PROMOTER:
        title: Promoter
        description: >-
          Promoter-proximal element overlapping the transcription start site,
          containing core TF binding elements (TATA, CAAT, GC, CACCC boxes).
      ENHANCER:
        title: Enhancer
        description: >-
          Distal regulatory element that upregulates transcriptional activity.
          May be cell-type-specific or shared across cell types.
      SILENCER:
        title: Silencer
        description: >-
          Regulatory element that represses or silences gene transcription.
      INSULATOR:
        title: Insulator
        description: >-
          Boundary element (often CTCF-bound) that compartmentalizes adjacent
          gene regulatory domains and limits enhancer-promoter interactions.
      TAD_BOUNDARY:
        title: TAD boundary
        description: >-
          Topologically associating domain boundary. Structural element
          maintaining chromatin loop domains; disruption can cause enhancer
          adoption or ectopic regulatory interactions.
      LOCUS_CONTROL_REGION:
        title: Locus control region
        description: >-
          A cluster of regulatory elements that controls expression of a
          gene cluster (e.g., the beta-globin LCR).
  GeneDiseaseRelationshipEnum:
    description: >-
      The qualitative relationship between a gene (or locus) and a disease.
      Use to constrain the free-text `association` slot to a controlled
      vocabulary aligned with ClinGen gene-disease validity concepts and
      common cancer/somatic driver classifications. The free-text
      `association` slot may still be used for narrative detail.
    permissible_values:
      CAUSATIVE:
        title: Causative
        description: >-
          Variants in the gene are sufficient to cause the disease in a
          mendelian or near-mendelian sense (corresponds to ClinGen
          "Definitive" or "Strong" gene-disease validity).
      RISK_FACTOR:
        title: Risk factor
        description: >-
          Variants in the gene increase risk of disease but are neither
          necessary nor sufficient to cause it. Includes common-variant
          associations and HLA risk alleles.
      PROTECTIVE:
        title: Protective
        description: >-
          Variants in the gene reduce the risk or severity of disease.
      MODIFIER:
        title: Modifier
        description: >-
          Variants in the gene modify the severity, age of onset, or
          expressivity of disease without being a primary driver.
      SUSCEPTIBILITY:
        title: Susceptibility
        description: >-
          Variants in the gene confer susceptibility to disease in
          combination with other genetic or environmental factors. Used
          for polygenic susceptibility loci such as GWAS hits.
      SOMATIC_DRIVER:
        title: Somatic driver
        description: >-
          Somatic alterations in the gene drive tumor initiation or
          progression (e.g., recurrent oncogenic drivers in cancer).
      COOPERATING:
        title: Cooperating alteration
        description: >-
          Co-occurring somatic or germline alterations that cooperate with
          a primary driver to shape disease behavior or therapy response.
      BIOMARKER:
        title: Biomarker
        description: >-
          Gene whose expression, mutation, or amplification status serves
          as a diagnostic, prognostic, or predictive biomarker without a
          required causal role.
      DISPUTED:
        title: Disputed
        description: >-
          Reported gene-disease association whose validity is contested
          (corresponds to ClinGen "Disputed" or "Refuted").
      UNKNOWN:
        title: Unknown
        description: >-
          The relationship between the gene and the disease is unclear or
          not yet classified.
  VariantOriginEnum:
    description: >-
      The origin of variation in a gene with respect to a disease entry.
      Bound to GENO allele origin terms.
    permissible_values:
      GERMLINE:
        title: Germline
        description: germline allele origin
        notes:
          - Variant present in the germline (inherited or constitutional).
        meaning: GENO:0000888
      SOMATIC:
        title: Somatic
        description: somatic allele origin
        notes:
          - Variant acquired in somatic tissue after fertilization.
        meaning: GENO:0000882
      DE_NOVO:
        title: De novo
        description: de novo allele origin
        notes:
          - Variant arising as a new mutation in the proband, not present in parents.
        meaning: GENO:0000880
      GERMLINE_AND_SOMATIC:
        title: Germline and somatic
        description: >-
          The gene is implicated by both germline and somatic variants in
          the disease (e.g., tumor suppressors with two-hit mechanisms).
      UNKNOWN:
        title: Unknown
        description: unknown allele origin
        notes:
          - Origin of the variant is unspecified or not determined.
        meaning: GENO:0000881
  ModifierEnum:
    description: Qualifiers for direction, intensity, or pathological state of a descriptor
    permissible_values:
      INCREASED:
        title: Increased
        description: Upregulated, hyperactive, elevated, or excessive
      DECREASED:
        title: Decreased
        description: Downregulated, hypoactive, reduced, or deficient
      ABNORMAL:
        title: Abnormal
        description: Qualitatively abnormal (e.g., misfolding, mislocalization, malformed)
      DYSREGULATED:
        title: Dysregulated
        description: Regulation is impaired (may be increased or decreased)
      ABSENT:
        title: Absent
        description: Not occurring or not present
  DietaryModificationActionEnum:
    description: Action applied to a food or beverage as part of a dietary treatment
    permissible_values:
      ADD:
        title: Add
        description: Increase intake or deliberately include the specified food or beverage
      RESTRICT:
        title: Restrict
        description: Limit intake of the specified food or beverage without full elimination
      AVOID:
        title: Avoid
        description: Eliminate or strictly avoid the specified food or beverage
      SUBSTITUTE:
        title: Substitute
        description: Use the specified food or beverage as a replacement within a dietary regimen
  PenetranceEnum:
    description: Penetrance classification for inheritance
    permissible_values:
      COMPLETE:
        title: Complete
        description: All individuals with the variant express the phenotype
      INCOMPLETE:
        title: Incomplete
        description: Not all individuals with the variant express the phenotype
      UNKNOWN:
        title: Unknown
        description: Penetrance has not been determined
  ExpressivityEnum:
    description: Expressivity classification for inheritance
    permissible_values:
      VARIABLE:
        title: Variable
        description: Phenotype severity or features vary among individuals with the same variant
      CONSISTENT:
        title: Consistent
        description: Phenotype is uniform among individuals with the same variant
      UNKNOWN:
        title: Unknown
        description: Expressivity has not been determined
  LateralityEnum:
    description: Laterality qualifier for anatomical structures or procedures
    permissible_values:
      LEFT:
        title: Left
        description: Left side of the body
      RIGHT:
        title: Right
        description: Right side of the body
      BILATERAL:
        title: Bilateral
        description: Both sides of the body
  SpatialExtentEnum:
    description: Qualifiers for the spatial extent or distribution of a phenotype or process
    permissible_values:
      FOCAL:
        title: Focal
        description: Confined to a single location or region
      MULTIFOCAL:
        title: Multifocal
        description: Affecting multiple discrete locations
      DIFFUSE:
        title: Diffuse
        description: Widespread, continuous distribution
      EXTENSIVE:
        title: Extensive
        description: Large extent, typically involving multiple segments or regions
      PATCHY:
        title: Patchy
        description: Irregular, discontinuous distribution
      SEGMENTAL:
        title: Segmental
        description: Affecting a specific segment or dermatome
  TemporalityEnum:
    description: Temporal qualifiers for descriptor post-composition
    permissible_values:
      ACUTE:
        title: Acute
        description: Acute manifestation or episode
        meaning: HP:0011009
      TRANSIENT:
        title: Transient
        description: Transient manifestation
        meaning: HP:0025153
      SUBACUTE:
        title: Subacute
        description: Subacute manifestation or episode
        meaning: HP:0011011
      CHRONIC:
        title: Chronic
        description: Chronic or persistent over time
        meaning: HP:0011010
      RECURRENT:
        title: Recurrent
        description: Repeated episodes separated by symptom-free intervals
        meaning: HP:0031796
      DIURNAL:
        title: Diurnal
        description: Manifestation occurring during the day
        meaning: HP:0025302
      NOCTURNAL:
        title: Nocturnal
        description: Manifestation occurring at night
        meaning: HP:0025301
      PROLONGED:
        title: Prolonged
        description: Manifestation lasting longer than typical
        meaning: HP:0025297
  ClinicalCourseEnum:
    description: Clinical course qualifiers for descriptor post-composition
    permissible_values:
      PROGRESSIVE:
        title: Progressive
        description: Worsening over time
        meaning: HP:0003676
      STABLE:
        title: Stable
        description: Not varying in severity or amount over time
        meaning: HP:0031915
  SeverityQualifierEnum:
    description: Severity qualifiers for descriptor post-composition
    permissible_values:
      MILD:
        title: Mild
        description: Mild severity
        meaning: HP:0012825
      MODERATE:
        title: Moderate
        description: Moderate severity
        meaning: HP:0012826
      SEVERE:
        title: Severe
        description: Severe severity
        meaning: HP:0012828
  AssayTerm:
    description: A term representing an assay
    reachable_from:
      source_nodes:
        - OBI:0000070  ## assay
      is_direct: false
      relationship_types:
        - rdfs:subClassOf
  CellularComponentTerm:
    description: A term representing a cellular component
    reachable_from:
      source_nodes:
        - GO:0005575  ## cellular_component
      is_direct: false
      relationship_types:
        - rdfs:subClassOf
  ProteinComplexTerm:
    description: A term representing a protein complex
    reachable_from:
      source_nodes:
        - GO:0032991  ## protein-containing complex
      is_direct: false
      relationship_types:
        - rdfs:subClassOf
  BiologicalProcessTerm:
    description: A term representing a biological process or pathway
    reachable_from:
      source_nodes:
        - GO:0008150  ## biological_process
      is_direct: false
      relationship_types:
        - rdfs:subClassOf
  MolecularFunctionTerm:
    description: A term representing a molecular function
    reachable_from:
      source_nodes:
        - GO:0003674  ## molecular_function
      is_direct: false
      relationship_types:
        - rdfs:subClassOf
  ChemicalEntityTerm:
