---
name: Generate Grouping Pages

# Grouping pages re-parse every disorder YAML to build their MONDO-coverage and
# member-audit tables, so a full regeneration is expensive (~2.5 min). Rather
# than rerun on every disorder edit (the most frequent change in this repo),
# this dedicated workflow regenerates grouping pages only when groupings or the
# rendering code change, plus a daily schedule to absorb disorder-driven
# coverage drift.

on:
  push:
    branches: [main]
    paths:
      - 'kb/groupings/*.yaml'
      - 'src/dismech/groupings.py'
      - 'src/dismech/render.py'
      - 'src/dismech/schema/**'
      - 'src/dismech/templates/grouping*.j2'
      - 'project.justfile'
  schedule:
    # Daily at 7:00 AM UTC to pick up disorder-driven coverage changes.
    - cron: '0 7 * * *'
  workflow_dispatch:

concurrency:
  group: generate-grouping-pages
  cancel-in-progress: true

jobs:
  generate-grouping-pages:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Close stale regen PRs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          mapfile -t stale_prs < <(
            gh pr list \
              --repo "$GITHUB_REPOSITORY" \
              --head "auto/generate-grouping-pages" \
              --state open \
              --author "app/github-actions" \
              --json number,createdAt \
              --limit 100 \
              --jq '.[] | select((now - (.createdAt | fromdateiso8601)) >= 3600) | .number'
          )

          if [ "${#stale_prs[@]}" -eq 0 ]; then
            echo "No stale grouping regen PRs to close."
            exit 0
          fi

          for pr_number in "${stale_prs[@]}"; do
            echo "Closing stale grouping regen PR #$pr_number"
            gh pr close "$pr_number" \
              --repo "$GITHUB_REPOSITORY" \
              --comment "Superseded by a newer automated grouping pages regeneration run."
          done

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v6.3.0
        with:
          python-version: "3.13"

      - name: Install just
        run: uv tool install rust-just

      - name: Install project
        run: uv sync --dev

      - name: Generate grouping HTML pages
        run: just gen-grouping-pages

      - name: Check for changes
        id: check-changes
        run: |
          if git diff --quiet pages/groupings/; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "Changed files:"
            git diff --stat pages/groupings/
          fi

      - name: Create or update Pull Request
        if: steps.check-changes.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          BRANCH_NAME="auto/generate-grouping-pages"
          git checkout -B "$BRANCH_NAME"

          git add pages/groupings/

          GROUPING_PAGE_COUNT=$(ls -1 pages/groupings/*.html 2>/dev/null | wc -l | tr -d ' ')
          GROUPING_COUNT=$(ls -1 kb/groupings/*.yaml 2>/dev/null | wc -l | tr -d ' ')

          git commit -m "$(cat <<EOF
          Regenerate grouping pages

          - $GROUPING_PAGE_COUNT grouping HTML pages from $GROUPING_COUNT groupings

          Triggered by changes to groupings/render code or the daily schedule.
          EOF
          )"

          git push --force-with-lease origin "$BRANCH_NAME"

          enable_auto_merge() {
            local pr_number="$1"

            gh pr merge "$pr_number" \
              --repo "$GITHUB_REPOSITORY" \
              --squash \
              --auto
          }

          EXISTING_BRANCH_PR_NUMBER="$(gh pr list \
            --repo "$GITHUB_REPOSITORY" \
            --head "$BRANCH_NAME" \
            --state open \
            --json number \
            --limit 1 \
            --jq '.[0].number // empty')"

          if [ -n "$EXISTING_BRANCH_PR_NUMBER" ]; then
            echo "Updated existing grouping regen PR #$EXISTING_BRANCH_PR_NUMBER; enabling auto-merge."
            enable_auto_merge "$EXISTING_BRANCH_PR_NUMBER"
            exit 0
          fi

          RECENT_REGEN_PR_NUMBER="$(gh pr list \
            --repo "$GITHUB_REPOSITORY" \
            --head "auto/generate-grouping-pages" \
            --state open \
            --author "app/github-actions" \
            --json number,createdAt,headRefName \
            --limit 100 \
            --jq '[.[] | select(.headRefName != "'"$BRANCH_NAME"'" and (now - (.createdAt | fromdateiso8601)) < 3600)][0].number // empty')"

          if [ -n "$RECENT_REGEN_PR_NUMBER" ]; then
            echo "Recent grouping regen PR #$RECENT_REGEN_PR_NUMBER already exists; skipping PR creation for $BRANCH_NAME."
            exit 0
          fi

          gh pr create \
            --repo "$GITHUB_REPOSITORY" \
            --base main \
            --head "$BRANCH_NAME" \
            --title "📄 Regenerate grouping pages ($(date +%Y-%m-%d))" \
            --body "$(cat <<EOF
          ## Summary

          Automated regeneration of disease grouping HTML pages.

          ## Generated Assets

          | Asset | Count/Status |
          |-------|--------------|
          | Grouping HTML pages | $GROUPING_PAGE_COUNT |
          | Groupings in KB | $GROUPING_COUNT |

          ## Trigger

          This PR was triggered by changes to groupings or rendering code, or the
          daily schedule that refreshes disorder-driven coverage tables:
          - \`kb/groupings/*.yaml\` - disease grouping data files
          - \`src/dismech/groupings.py\` / \`src/dismech/render.py\` - grouping logic
          - \`src/dismech/templates/grouping*.j2\` - grouping templates
          - daily schedule (disorder MONDO-coverage / member-audit drift)

          ## Review

          - [ ] Spot-check a few grouping pages render correctly
          - [ ] Verify the coverage/audit tables look right
          EOF
          )"

          CREATED_PR_NUMBER="$(gh pr list \
            --repo "$GITHUB_REPOSITORY" \
            --head "$BRANCH_NAME" \
            --state open \
            --json number \
            --limit 1 \
            --jq '.[0].number // empty')"

          if [ -z "$CREATED_PR_NUMBER" ]; then
            echo "Failed to resolve created grouping regen PR number for $BRANCH_NAME."
            exit 1
          fi

          echo "Created grouping regen PR #$CREATED_PR_NUMBER; enabling auto-merge."
          enable_auto_merge "$CREATED_PR_NUMBER"
