---
name: Generate Pages

on:
  push:
    branches: [main]
    paths:
      - 'kb/disorders/*.yaml'
      - 'kb/comorbidities/*.yaml'
      - 'src/dismech/schema/**'
      - 'src/dismech/templates/**'
      - 'src/dismech/render.py'
      - 'src/dismech/export.py'
      - 'conf/qc_config.yaml'
      - 'mkdocs.yml'
      - 'docs/**'
  workflow_dispatch:
    inputs:
      force:
        description: 'Force run even if already ran today'
        type: boolean
        default: false

concurrency:
  group: generate-pages
  cancel-in-progress: true

jobs:
  generate-pages:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Close stale regen PRs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          mapfile -t stale_prs < <(
            gh pr list \
              --repo "$GITHUB_REPOSITORY" \
              --search 'is:open author:app/github-actions Regenerate pages' \
              --json number,createdAt \
              --limit 100 \
              --jq '.[] | select((now - (.createdAt | fromdateiso8601)) >= 3600) | .number'
          )

          if [ "${#stale_prs[@]}" -eq 0 ]; then
            echo "No stale regen PRs to close."
            exit 0
          fi

          for pr_number in "${stale_prs[@]}"; do
            echo "Closing stale regen PR #$pr_number"
            gh pr close "$pr_number" \
              --repo "$GITHUB_REPOSITORY" \
              --comment "Superseded by a newer automated pages regeneration run."
          done

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.13"

      - name: Install just
        run: uv tool install rust-just

      - name: Install project
        run: uv sync --dev

      - name: Generate disorder and comorbidity HTML pages
        run: just gen-pages

      - name: Generate browser data
        run: just gen-browser-data

      - name: Generate compliance dashboard
        run: just gen-dashboard

      - name: Generate schema docs site
        run: just gen-schema-docs

      - name: Check for changes
        id: check-changes
        run: |
          if git diff --quiet pages/ app/data.js dashboard/ elements/; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "Changed files:"
            git diff --stat pages/ app/data.js dashboard/ elements/
          fi

      - name: Create or update Pull Request
        if: steps.check-changes.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          BRANCH_NAME="auto/generate-pages"
          git checkout -B "$BRANCH_NAME"

          git add pages/ app/data.js dashboard/ elements/

          PAGE_COUNT=$(ls -1 pages/disorders/*.html 2>/dev/null | wc -l | tr -d ' ')
          COMORB_PAGE_COUNT=$(ls -1 pages/comorbidities/*.html 2>/dev/null | wc -l | tr -d ' ')
          DISORDER_COUNT=$(ls -1 kb/disorders/*.yaml 2>/dev/null | wc -l | tr -d ' ')
          COMORB_COUNT=$(ls -1 kb/comorbidities/*.yaml 2>/dev/null | wc -l | tr -d ' ')

          git commit -m "$(cat <<EOF
          Regenerate pages, app data, dashboard, and schema docs

          - $PAGE_COUNT disorder HTML pages
          - $COMORB_PAGE_COUNT comorbidity HTML pages
          - Browser app data.js
          - Compliance dashboard
          - Schema docs site (MkDocs)

          Triggered by changes to KB or templates.
          EOF
          )"

          git push --force-with-lease origin "$BRANCH_NAME"

          EXISTING_BRANCH_PR_NUMBER="$(gh pr list \
            --repo "$GITHUB_REPOSITORY" \
            --head "$BRANCH_NAME" \
            --state open \
            --json number \
            --limit 1 \
            --jq '.[0].number // empty')"

          if [ -n "$EXISTING_BRANCH_PR_NUMBER" ]; then
            echo "Updated existing regen PR #$EXISTING_BRANCH_PR_NUMBER."
            exit 0
          fi

          RECENT_REGEN_PR_NUMBER="$(gh pr list \
            --repo "$GITHUB_REPOSITORY" \
            --search 'is:open author:app/github-actions Regenerate pages' \
            --json number,createdAt,headRefName \
            --limit 100 \
            --jq '[.[] | select(.headRefName != "'"$BRANCH_NAME"'" and (now - (.createdAt | fromdateiso8601)) < 3600)][0].number // empty')"

          if [ -n "$RECENT_REGEN_PR_NUMBER" ]; then
            echo "Recent regen PR #$RECENT_REGEN_PR_NUMBER already exists; skipping PR creation for $BRANCH_NAME."
            exit 0
          fi

          gh pr create \
            --repo "$GITHUB_REPOSITORY" \
            --base main \
            --head "$BRANCH_NAME" \
            --draft \
            --title "📄 Regenerate pages, dashboard, and schema docs ($(date +%Y-%m-%d))" \
            --body "$(cat <<EOF
          ## Summary

          Automated regeneration of static assets after KB or template changes.

          ## Generated Assets

          | Asset | Count/Status |
          |-------|--------------|
          | Disorder HTML pages | $PAGE_COUNT |
          | Comorbidity HTML pages | $COMORB_PAGE_COUNT |
          | Disorders in KB | $DISORDER_COUNT |
          | Comorbidities in KB | $COMORB_COUNT |
          | Browser data.js | ✅ |
          | Compliance dashboard | ✅ |
          | Schema docs site | ✅ |

          ## Trigger

          This PR was triggered by changes to:
          - \`kb/disorders/*.yaml\` - disorder data files
          - \`kb/comorbidities/*.yaml\` - comorbidity data files
          - \`src/dismech/schema/**\` - LinkML schema files
          - \`src/dismech/templates/**\` - Jinja2 templates
          - \`src/dismech/render.py\` - rendering code
          - \`src/dismech/export.py\` - export code
          - \`conf/qc_config.yaml\` - QC configuration
          - \`mkdocs.yml\` and \`docs/**\` - schema docs configuration/content

          ## Review

          - [ ] Spot-check a few HTML pages render correctly
          - [ ] Verify dashboard loads and shows charts
          - [ ] Verify schema docs load at /elements/
          EOF
          )"
