name: PhenoCAM V2 Validation

on:
  push:
    paths:
      - "causal_models/**"
      - "src/dismech/schema/phenocam/**"
      - "scripts/phenocam_validate.py"
      - "tests/test_phenocam_schema.py"
  pull_request:
    paths:
      - "causal_models/**"
      - "src/dismech/schema/phenocam/**"
      - "scripts/phenocam_validate.py"
      - "tests/test_phenocam_schema.py"

jobs:
  validate:
    name: Validate PhenoCAM files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync

      - name: Run PhenoCAM pytest suite
        run: uv run pytest tests/test_phenocam_schema.py -v

      - name: Validate all modules
        run: |
          for f in causal_models/modules/*.yaml; do
            [ -f "$f" ] || continue
            echo "=== $f ==="
            uv run linkml-validate \
              --schema src/dismech/schema/phenocam/phenocam.yaml \
              --target-class Module "$f"
            uv run python scripts/phenocam_validate.py "$f" --target-class Module
          done

      - name: Validate all disease courses
        run: |
          for f in causal_models/diseases/*.yaml; do
            [ -f "$f" ] || continue
            echo "=== $f ==="
            uv run linkml-validate \
              --schema src/dismech/schema/phenocam/phenocam.yaml \
              --target-class DiseaseCourse "$f"
            uv run python scripts/phenocam_validate.py "$f" --target-class DiseaseCourse
          done
