name: Curation Scanner

on:
  schedule:
    - cron: "0 */2   * * 0,6"
    - cron: "0 */3 * * 1-5"
  workflow_dispatch:
    inputs:
      note:
        description: "Optional note for the manual scanner run"
        required: false
        default: ""
        type: string

jobs:
  curation-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - effort: low_effort
            model: claude-haiku-4-5-20251001
            selector: "label:curation label:low_effort"
          - effort: medium_effort
            model: claude-sonnet-4-6
            selector: "label:curation label:medium_effort -label:low_effort"
          - effort: high_effort
            model: claude-opus-4-8
            selector: "label:curation -label:low_effort -label:medium_effort"
    concurrency:
      group: curation-scanner-${{ matrix.effort }}
      cancel-in-progress: true
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
    env:
      EFFORT_TIER: ${{ matrix.effort }}
      EFFORT_SELECTOR: ${{ matrix.selector }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          # Use the reviewable PR token path instead of AI4C_AGENT_* so follow-up review
          # automation can still act on the resulting work.
          token: ${{ secrets.PAT_FOR_PR }}

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install python tools
        run: |
          uv sync

      - name: Install just
        run: |
          uv tool install rust-just

      - name: Run Curation Scanner
        id: curation-scanner
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.PAT_FOR_PR }}
          show_full_output: true
          claude_args: |
            --dangerously-skip-permissions
            --mcp-config '{"mcpServers": {"ols": {"command": "uvx", "args": ["ols-mcp"]}}}'
            --model ${{ matrix.model }}
          prompt: |
            REPO: ${{ github.repository }}
            TRIGGER: ${{ github.event_name }}
            EFFORT TIER: ${{ matrix.effort }}
            EFFORT SELECTOR: ${{ matrix.selector }}
            MANUAL NOTE: ${{ inputs.note || '' }}

            You are running an automated curation scanner for the dismech repository.

            Scan only for open issues and pull requests that are unassigned and match
            EFFORT SELECTOR. Start by gathering candidate items with `gh issue list`
            and `gh pr list`, including metadata such as labels, assignees, updated
            time, review state, and reaction counts.

            Use searches equivalent to:
            - `is:open is:issue no:assignee label:curation ...effort selector...`
            - `is:open is:pr no:assignee label:curation ...effort selector...`

            Effort tier routing:
            - `low_effort`: suitable for bounded augmentation of existing disease
              entries and low-risk issue follow-up. Do not create new disease
              entries from this tier. If a task requires new disease curation,
              leave a brief comment and ensure the work is routed to `high_effort`.
            - `medium_effort`: suitable for bounded but less mechanical updates.
            - `high_effort`: default for curation work without lower-effort labels
              and for new disease entry creation.

            If an item has more than one effort label, skip it rather than guessing.

            You may scan multiple candidates, but you must choose exactly one issue or pull request
            to actively work on in this run. Leave all other items untouched.

            Rank candidates before acting. Use judgment, with these signals in mind:
            - prioritize `high-priority` items when that label is present
            - prioritize items with stronger positive reaction signals, especially `THUMBS_UP`
            - prioritize stale items that have not been updated recently
            - deprioritize `low-priority` items
            - deprioritize items that were updated very recently, unless they are clearly the best use of this run
            - prefer the single item where a safe, meaningful next step can be completed in one run

            Avoid repeatedly touching the freshest bottom-of-queue items while older unassigned
            candidates remain. If signals conflict, explain your choice briefly in the comment or PR
            you post for the selected item.

            For the single selected unassigned curation issue:
            - Analyze the request.
            - Post a concise assessment comment covering the likely disease or disease area, what work is needed, and the estimated scope/risk.
            - If the first step is straightforward and low-risk, create an initial PR.
            - Otherwise, leave the assessment comment and flag the issue for human review.

            For the single selected unassigned curation PR:
            - Inspect its current state, review history, and discussion.
            - Address review comments when the right fix is clear and safe.
            - If the branch is stale or conflicted, refresh it carefully.
            - Prefer GitHub's update-branch flow via `gh api` rather than local rebases for branch refreshes.
            - Never use a local rebase to resolve PR conflicts.
            - If the next step is unclear or risky, post a comment asking for guidance instead of guessing.

            General guidance:
            - Use judgment rather than rigid rules.
            - Be conservative. When in doubt, comment with your assessment instead of making a risky change.
            - Prefer draft PRs for new work unless the result is clearly ready for review.
            - Follow `CLAUDE.md` and the repository conventions.
            - Never create or hand-edit `references_cache/*.md`; regenerate cache entries with `just fetch-reference <ID>` if needed.
            - Validate any file edits you make with the relevant `just` or `uv run` commands before committing.
            - After choosing a target, spend the run on that one item only.
