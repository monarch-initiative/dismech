name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize]
  issue_comment:
    types: [created]
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to review (for fork PRs where OIDC fails)'
        required: true
        type: number

concurrency:
  group: claude-review-${{ github.event_name }}-${{ github.event.pull_request.number || github.event.issue.number || github.event.inputs.pr_number }}
  cancel-in-progress: true

jobs:
  claude-review:
    if: >-
      ${{
        (
          github.event_name == 'pull_request' &&
          github.event.pull_request.head.repo.full_name == github.repository
        ) ||
        github.event_name == 'workflow_dispatch' ||
        (
          github.event_name == 'issue_comment' &&
          github.event.issue.pull_request != null &&
          github.event.comment.body == '/review' &&
          contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association)
        )
      }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: read
      id-token: write

    env:
      PR_NUMBER: ${{ github.event.pull_request.number || github.event.issue.number || github.event.inputs.pr_number }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Checkout PR branch (for manual review triggers)
        if: github.event_name == 'workflow_dispatch' || github.event_name == 'issue_comment'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh pr checkout ${{ env.PR_NUMBER }}

      - name: Generate ai4c-agent token
        id: ai4c-token
        continue-on-error: true
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.AI4C_AGENT_APP_ID }}
          private-key: ${{ secrets.AI4C_AGENT_PRIVATE_KEY }}

      - name: Install Claude Code
        run: |
          curl -fsSL https://claude.ai/install.sh | bash -s 2.1.129
          "$HOME/.local/bin/claude" --version

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ steps.ai4c-token.outputs.token || github.token }}
          path_to_claude_code_executable: /home/runner/.local/bin/claude
          track_progress: ${{ github.event_name == 'pull_request' }}
          allowed_bots: 'claude,github-actions'
          claude_args: |
            --model claude-opus-4-6
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh pr review:*),Bash(gh api:*),Bash(cat:*),Bash(grep:*),Bash(head:*),Bash(tail:*),Bash(wc:*),Bash(find:*),Bash(ls:*),Bash(just:*),Bash(uv run:*)"

          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ env.PR_NUMBER }}

            Review this pull request using the dismech-pr-review skill.

            Focus on:
            - Biological and clinical validity
            - Ontology term accuracy and specificity
            - Evidence quality (PMIDs real, snippets are exact quotes, evidence_source correct)
            - Schema conformance and completeness
            - Adherence to dismech conventions (see CLAUDE.md and skills)

            Be constructive and specific. For each issue found, indicate severity:
            - 🔴 CRITICAL: Must fix (wrong data, hallucinated PMIDs, broken validation)
            - 🟡 IMPORTANT: Should fix (ontology mismatches, evidence_source errors, missing fields)
            - 🔵 SUGGESTION: Nice to have (style, additional phenotypes, deeper coverage)

            After reviewing, set the GitHub PR review status:

            **If there are any 🔴 CRITICAL or 🟡 IMPORTANT issues:**
            Submit a REQUEST_CHANGES review:
            ```
            gh pr review ${{ env.PR_NUMBER }} --request-changes --body "<your review summary>"
            ```

            **If there are only 🔵 SUGGESTIONs or no issues:**
            Submit an APPROVE review:
            ```
            gh pr review ${{ env.PR_NUMBER }} --approve --body "<your review summary>"
            ```

            Always include a summary checklist at the top of your review:
            - [ ] Schema validation would pass
            - [ ] All PMIDs verified as real
            - [ ] Evidence snippets are exact quotes
            - [ ] Ontology terms correct and specific
            - [ ] evidence_source classifications correct
            - [ ] No pathophysiology bundling (atomic entries only)
