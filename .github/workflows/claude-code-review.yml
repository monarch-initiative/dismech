name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize]

concurrency:
  group: claude-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  claude-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: read
      id-token: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          track_progress: true

          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            Review this pull request using the dismech-pr-review skill.

            Focus on:
            - Biological and clinical validity
            - Ontology term accuracy and specificity
            - Evidence quality (PMIDs real, snippets are exact quotes, evidence_source correct)
            - Schema conformance and completeness
            - Adherence to dismech conventions (see CLAUDE.md and skills)

            Be constructive and specific. For each issue found, indicate severity:
            - 🔴 CRITICAL: Must fix (wrong data, hallucinated PMIDs, broken validation)
            - 🟡 IMPORTANT: Should fix (ontology mismatches, evidence_source errors, missing fields)
            - 🔵 SUGGESTION: Nice to have (style, additional phenotypes, deeper coverage)

            After reviewing, set the GitHub PR review status:

            **If there are any 🔴 CRITICAL or 🟡 IMPORTANT issues:**
            Submit your review as REQUEST_CHANGES using the GitHub CLI:
            ```
            gh api repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/reviews \
              -f event=REQUEST_CHANGES \
              -f body="<your review summary>"
            ```

            **If there are only 🔵 SUGGESTIONs or no issues:**
            Submit your review as APPROVE (approve the PR):
            ```
            gh api repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/reviews \
              -f event=APPROVE \
              -f body="<your review summary>"
            ```

            Always include a summary checklist at the top of your review:
            - [ ] Schema validation would pass
            - [ ] All PMIDs verified as real
            - [ ] Evidence snippets are exact quotes
            - [ ] Ontology terms correct and specific
            - [ ] evidence_source classifications correct
            - [ ] No pathophysiology bundling (atomic entries only)
