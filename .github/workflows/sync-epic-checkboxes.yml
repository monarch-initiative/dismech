---
name: Sync Epic #1079 Checkboxes

# Runs after any PR that touches kb/disorders/ is merged into main.
# Reconciles the checklist in issue #1079 against the current kb/disorders/
# content, including has_subtypes entries so that LUMP_INTO_PARENT diseases
# are correctly marked as [x] when their parent is curated.

on:
  push:
    branches: [main]
    paths:
      - 'kb/disorders/*.yaml'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry-run (preview changes without updating the issue)'
        type: boolean
        default: false

jobs:
  sync-checkboxes:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install project
        run: uv sync

      - name: Sync Epic #1079 checkboxes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ARGS=""
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            ARGS="--dry-run"
          fi
          uv run python scripts/sync_epic_checkboxes.py --kb-dir kb/disorders $ARGS
