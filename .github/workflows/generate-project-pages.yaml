---
name: Generate Project Pages

# Project pages render the top-level projects/*.md curation docs to browsable
# HTML plus an index. Auto-linking resolves declared disease/module/grouping
# slugs against the corpus, so a regeneration absorbs disorder-driven drift.
# This dedicated workflow regenerates project pages when projects or the
# rendering code change, plus a daily schedule to pick up slug-resolution drift.

on:
  push:
    branches: [main]
    paths:
      - 'projects/*.md'
      - 'src/dismech/render.py'
      - 'src/dismech/schema/**'
      - 'src/dismech/templates/project*.j2'
      - 'project.justfile'
  schedule:
    # Daily at 7:30 AM UTC to pick up disorder-driven auto-link changes.
    - cron: '30 7 * * *'
  workflow_dispatch:

concurrency:
  group: generate-project-pages
  cancel-in-progress: true

jobs:
  generate-project-pages:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Close stale regen PRs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          mapfile -t stale_prs < <(
            gh pr list \
              --repo "$GITHUB_REPOSITORY" \
              --head "auto/generate-project-pages" \
              --state open \
              --author "app/github-actions" \
              --json number,createdAt \
              --limit 100 \
              --jq '.[] | select((now - (.createdAt | fromdateiso8601)) >= 3600) | .number'
          )

          if [ "${#stale_prs[@]}" -eq 0 ]; then
            echo "No stale project regen PRs to close."
            exit 0
          fi

          for pr_number in "${stale_prs[@]}"; do
            echo "Closing stale project regen PR #$pr_number"
            gh pr close "$pr_number" \
              --repo "$GITHUB_REPOSITORY" \
              --comment "Superseded by a newer automated project pages regeneration run."
          done

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.13"

      - name: Install just
        run: uv tool install rust-just

      - name: Install project
        run: uv sync --dev

      - name: Generate project HTML pages
        run: just gen-project-pages

      - name: Check for changes
        id: check-changes
        run: |
          if git diff --quiet pages/projects/; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "Changed files:"
            git diff --stat pages/projects/
          fi

      - name: Create or update Pull Request
        if: steps.check-changes.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          BRANCH_NAME="auto/generate-project-pages"
          git checkout -B "$BRANCH_NAME"

          git add pages/projects/

          PROJECT_PAGE_COUNT=$(ls -1 pages/projects/*.html 2>/dev/null | wc -l | tr -d ' ')
          PROJECT_COUNT=$(ls -1 projects/*.md 2>/dev/null | wc -l | tr -d ' ')

          git commit -m "$(cat <<EOF
          Regenerate project pages

          - $PROJECT_PAGE_COUNT project HTML pages from $PROJECT_COUNT projects

          Triggered by changes to projects/render code or the daily schedule.
          EOF
          )"

          git push --force-with-lease origin "$BRANCH_NAME"

          enable_auto_merge() {
            local pr_number="$1"

            gh pr merge "$pr_number" \
              --repo "$GITHUB_REPOSITORY" \
              --squash \
              --auto
          }

          EXISTING_BRANCH_PR_NUMBER="$(gh pr list \
            --repo "$GITHUB_REPOSITORY" \
            --head "$BRANCH_NAME" \
            --state open \
            --json number \
            --limit 1 \
            --jq '.[0].number // empty')"

          if [ -n "$EXISTING_BRANCH_PR_NUMBER" ]; then
            echo "Updated existing project regen PR #$EXISTING_BRANCH_PR_NUMBER; enabling auto-merge."
            enable_auto_merge "$EXISTING_BRANCH_PR_NUMBER"
            exit 0
          fi

          RECENT_REGEN_PR_NUMBER="$(gh pr list \
            --repo "$GITHUB_REPOSITORY" \
            --head "auto/generate-project-pages" \
            --state open \
            --author "app/github-actions" \
            --json number,createdAt,headRefName \
            --limit 100 \
            --jq '[.[] | select(.headRefName != "'"$BRANCH_NAME"'" and (now - (.createdAt | fromdateiso8601)) < 3600)][0].number // empty')"

          if [ -n "$RECENT_REGEN_PR_NUMBER" ]; then
            echo "Recent project regen PR #$RECENT_REGEN_PR_NUMBER already exists; skipping PR creation for $BRANCH_NAME."
            exit 0
          fi

          gh pr create \
            --repo "$GITHUB_REPOSITORY" \
            --base main \
            --head "$BRANCH_NAME" \
            --title "📄 Regenerate project pages ($(date +%Y-%m-%d))" \
            --body "$(cat <<EOF
          ## Summary

          Automated regeneration of curation-project HTML pages.

          ## Generated Assets

          | Asset | Count/Status |
          |-------|--------------|
          | Project HTML pages | $PROJECT_PAGE_COUNT |
          | Projects in repo | $PROJECT_COUNT |

          ## Trigger

          This PR was triggered by changes to projects or rendering code, or the
          daily schedule that refreshes disorder-driven auto-link resolution:
          - \`projects/*.md\` - curation-project markdown files
          - \`src/dismech/render.py\` - project rendering logic
          - \`src/dismech/templates/project*.j2\` - project templates
          - daily schedule (slug auto-link drift)

          ## Review

          - [ ] Spot-check a few project pages render correctly
          - [ ] Verify the index lists all projects and tag filtering works
          EOF
          )"

          CREATED_PR_NUMBER="$(gh pr list \
            --repo "$GITHUB_REPOSITORY" \
            --head "$BRANCH_NAME" \
            --state open \
            --json number \
            --limit 1 \
            --jq '.[0].number // empty')"

          if [ -z "$CREATED_PR_NUMBER" ]; then
            echo "Failed to resolve created project regen PR number for $BRANCH_NAME."
            exit 1
          fi

          echo "Created project regen PR #$CREATED_PR_NUMBER; enabling auto-merge."
          enable_auto_merge "$CREATED_PR_NUMBER"
