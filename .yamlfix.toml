# Preserve the current disorder/module YAML layout to avoid large reflow-only diffs.
# `yamllint` still carries the stricter 80-column warning for human review.
line_length = 1200
explicit_start = false
preserve_quotes = true
sequence_style = "keep_style"
indent_mapping = 2
indent_sequence = 2
indent_offset = 0
whitelines = 1
